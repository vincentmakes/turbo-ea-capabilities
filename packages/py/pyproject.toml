[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "turbo-ea-capabilities"
dynamic = ["version"]
description = "Reference Business Capability catalogue for Turbo EA - bundled JSON, no network access required."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Turbo EA Maintainers" }]
keywords = ["enterprise-architecture", "business-capability", "togaf", "catalogue"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
]

[project.urls]
Homepage = "https://business-capabilities.turbo-ea.org"
Source = "https://github.com/vincentmakes/turbo-ea-capabilities"
Issues = "https://github.com/vincentmakes/turbo-ea-capabilities/issues"

[tool.hatch.version]
source = "code"
path = "src/turbo_ea_capabilities/_version.py"
expression = "VERSION"

[tool.hatch.build.targets.wheel]
packages = ["src/turbo_ea_capabilities"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/README.md",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

# Chemical Quality Management
id: BC-4470
name: Chemical Quality Management
level: 1
industry: Chemicals
description: |
  Chemical-specific specification setting, analytical laboratory
  operations, batch release, complaint and certificate-of-analysis
  dispute handling, reference standards, and sector-specific GMP
  compliance. Distinct from cross-industry Quality Management (BC-720),
  which covers enterprise QMS.
references:
  - https://www.iso.org/standard/62085.html
  - https://www.iso.org/iso-9001-quality-management.html
  - https://ipecamericas.org/
children:

# Mineral Product Marketing Management
id: BC-4480
name: Mineral Product Marketing Management
level: 1
industry: "Mining & Metals"
description: |
  Sales, offtake, treatment- and refining-charge negotiation, provisional-
  pricing settlement, logistics coordination, and trading risk management
  for concentrates, intermediates, and finished metal products.
references:
  - https://www.lme.com/
  - https://www.lme.com/en/About/Responsibility/Responsible-sourcing
  - https://www.imo.org/en/OurWork/Safety/Pages/IMSBC-Code.aspx
  - https://www.lbma.org.uk/responsible-sourcing
children:

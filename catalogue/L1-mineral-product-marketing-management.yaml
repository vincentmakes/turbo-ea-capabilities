    name: "Concentrate & Metal Sales"
    level: 2
    industry: "Mining & Metals"
    description: |
      Spot and term sales execution and customer allocation planning for
      concentrates and finished metal.
    in_scope:
      - Spot tonne and term contract sales
      - Customer allocation planning across mines and refineries
    out_of_scope:
      - Settlement calculations under provisional pricing (BC-4480.40)
    children:
      - id: BC-4480.10.10
        name: Spot Sales Execution
        level: 3

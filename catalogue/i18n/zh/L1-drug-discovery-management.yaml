locale: zh
source: L1-drug-discovery-management.yaml
entries:
  BC-1500:
    name: 药物发现管理
    description: |
      覆盖靶点识别、苗头化合物到先导化合物、先导化合物优化的全流程管理。
  BC-1500.10:
    name: 靶点识别与验证管理
    description: |
      统筹疾病生物学研究、靶点识别及靶点验证，确保候选靶点的科学可靠性。
  BC-1500.10.10:
    name: 疾病生物学研究
    description: |
      研究疾病发生机制与信号通路，为靶点识别奠定科学基础。
  BC-1500.10.20:
    name: 靶点识别
    description: |
      通过组学分析与遗传学方法识别潜在生物靶点。
  BC-1500.10.30:
    name: 靶点验证
    description: |
      利用体外和体内模型对候选靶点进行验证，确认其与疾病的相关性。
  BC-1500.10.40:
    name: 靶点可成药性评估
    description: |
      评估靶点的可成药性与可操作性，筛选具有开发价值的靶点。
  BC-1500.20:
    name: 苗头化合物发现管理
    description: |
      统筹高通量筛选、虚拟筛选及苗头化合物识别，建立药物发现起点。
  BC-1500.20.10:
    name: 检测方法开发
    description: |
      开发生化和细胞水平检测方法，支持化合物活性评价。
  BC-1500.20.20:
    name: 高通量筛选
    description: |
      执行大规模高通量筛选活动，快速评价化合物库。
  BC-1500.20.30:
    name: 虚拟筛选与AI辅助筛选
    description: |
      运用虚拟筛选与人工智能方法驱动苗头化合物识别，提升筛选效率。
  BC-1500.20.40:
    name: 苗头化合物分级与确认
    description: |
      对筛选苗头化合物进行分级、确认与优先级排序。
  BC-1500.30:
    name: 先导化合物优化管理
    description: |
      统筹药物化学、构效关系分析与先导化合物优化，推进候选化合物质量提升。
  BC-1500.30.10:
    name: 药物化学合成
    description: |
      开展药物化学合成与结构设计，推动先导化合物迭代改造。
  BC-1500.30.20:
    name: 构效关系分析
    description: |
      通过构效关系分析驱动化合物结构优化策略。
  BC-1500.30.30:
    name: ADMET特性评估
    description: |
      对优化系列化合物开展体外ADMET特性评估，支持候选化合物筛选。
  BC-1500.30.40:
    name: 先导系列化合物遴选
    description: |
      从优化活动中遴选出具备进一步开发价值的先导系列化合物。
  BC-1500.40:
    name: 临床前候选化合物遴选管理
    description: |
      统筹候选化合物遴选与IND申报前研究，确保候选化合物满足目标产品档案要求。
  BC-1500.40.10:
    name: 临床前候选化合物特性评价
    description: |
      对照目标产品档案对临床前候选化合物开展全面特性评价。
  BC-1500.40.20:
    name: 候选化合物提名治理
    description: |
      对临床前候选化合物的提名与决策实施治理管控。
  BC-1500.40.30:
    name: IND申报前研究协调
    description: |
      协调IND申报前毒理学与安全性研究的开展。
  BC-1500.50:
    name: 转化研究管理
    description: |
      统筹转化科学与生物标志物开发，推动发现成果向临床开发顺利过渡。
  BC-1500.50.10:
    name: 转化科学
    description: |
      开展连接药物发现与临床开发的转化科学研究。
  BC-1500.50.20:
    name: 生物标志物发现与开发
    description: |
      发现并开发支持临床决策的生物标志物。
  BC-1500.50.30:
    name: 患者分层策略
    description: |
      制定用于临床试验设计的患者分层策略。
  BC-1500.60:
    name: 化合物与样品库管理
    description: |
      维护化合物库、样品及样本库，保障药物发现研究的物料供给。
  BC-1500.60.10:
    name: 化合物库管理
    description: |
      对化合物库进行整理、注册与维护，确保数据完整性。
  BC-1500.60.20:
    name: 样品与样本库管理
    description: |
      负责样品存储、检索及监管链维护。
  BC-1500.60.30:
    name: 试剂与生物材料管理
    description: |
      对研究用试剂与生物材料实施规范化管理。

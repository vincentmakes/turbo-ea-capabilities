locale: zh
source: L1-real-estate-compliance-regulatory-management.yaml
entries:
  BC-4990:
    name: 房地产合规与监管管理
    description: |
      叠加于通用企业合规之上的房地产专项监管制度合规学科，涵盖经纪人/经纪公司执照、公平住房与反歧视、房地产反洗钱与实际受益人，结算与抵押贷款披露（RESPA/TRID），建筑能效绩效，租约与租金管制，公寓/业主委员会/分层产权监管，以及基金/顾问监管合规。
    in_scope:
      - 经纪公司和经纪人执照维护
      - 《公平住房法》、《平等法》、ECOA合规
      - 房地产反洗钱、实际受益人、制裁及可疑交易报告
      - RESPA、TRID及第8条关联业务披露
      - 建筑能效信息披露及最低能效标准合规
      - 租金管制、驱逐通知、押金处理、短租登记
      - 公寓/业主委员会/分层产权发起人和储备金披露
      - AIFMD、ELTIF及《投资顾问法》基金/顾问合规
    out_of_scope:
      - 企业合规管理（BC-130）
      - 网络安全和隐私制度（BC-620）
      - 非房地产业务通用金融犯罪反洗钱（BC-1400）
      - 税务管理（BC-220）
  BC-4990.10:
    name: 经纪人与经纪公司执照合规
    description: |
      遵守经纪公司和经纪人执照制度，包括公司执照维护、继续教育及指定经纪人监管。
  BC-4990.10.10:
    name: 公司执照维护
    description: |
      在各运营地区维护经纪公司执照。
  BC-4990.10.20:
    name: 经纪人执照与继续教育
    description: |
      跟踪个人经纪人执照和继续教育要求。
  BC-4990.10.30:
    name: 指定经纪人监管
    description: |
      指定经纪人对公司受监管活动的监管工作。
  BC-4990.10.40:
    name: 执照更新与审计响应
    description: |
      开展执照更新并响应监管机构审计和检查。
  BC-4990.20:
    name: 公平住房与反歧视合规
    description: |
      在租赁、销售和贷款接触点遵守《公平住房法》、《平等法》、ECOA及等效反歧视制度。
  BC-4990.20.10:
    name: 公平住房政策维护
    description: |
      维护公平住房政策和标准操作程序。
  BC-4990.20.20:
    name: 广告与资金来源筛查
    description: |
      筛查广告内容和资金来源规则，确保符合受保护群体限制要求。
  BC-4990.20.30:
    name: 歧视投诉处理
    description: |
      处理住房歧视投诉和监管机构问询。
  BC-4990.20.40:
    name: 公平住房培训与认证
    description: |
      对经纪人和员工开展公平住房义务培训和认证工作。
  BC-4990.30:
    name: 房地产反洗钱与制裁合规
    description: |
      遵守房地产专项反洗钱规定，包括FinCEN地理目标令、FinCEN住宅房地产规则、AMLD 5/6指定非金融业务义务及实际受益人申报。
  BC-4990.30.10:
    name: 实际受益人采集
    description: |
      采集并核查房地产交易各方的实际受益人信息。
  BC-4990.30.20:
    name: 制裁与政治公众人物筛查（房地产）
    description: |
      对交易各方进行制裁名单、政治公众人物及负面媒体筛查。
  BC-4990.30.30:
    name: 可疑交易报告（房地产）
    description: |
      就纳入范围的房地产交易提交可疑交易报告。
  BC-4990.30.40:
    name: 反洗钱审计与监管检查
    description: |
      响应对房地产反洗钱项目的审计和监管检查。
  BC-4990.40:
    name: 结算与抵押贷款披露合规
    description: |
      遵守美国RESPA和TRID结算及抵押贷款披露规则及等效地区制度。
  BC-4990.40.10:
    name: 贷款估算与成交披露制作
    description: |
      在时限规定内制作TRID贷款估算书和成交披露文件。
  BC-4990.40.20:
    name: 关联业务安排披露
    description: |
      在交易规定节点披露关联业务安排。
  BC-4990.40.30:
    name: 结算服务商合规
    description: |
      遵守结算服务商推介规则和第8条禁止规定。
  BC-4990.40.40:
    name: RESPA审计响应
    description: |
      响应CFPB和州监管机构对RESPA合规的检查。
  BC-4990.50:
    name: 建筑能效绩效合规
    description: |
      遵守EPC、最低能效标准（MEES）、建筑绩效标准及基准报告法规（如纽约地方法第97号、欧盟建筑能效指令修订版）。
  BC-4990.50.10:
    name: EPC/建筑能效评级合规
    description: |
      采购并存档能效证书及等效文件。
  BC-4990.50.20:
    name: 最低能效标准合规（MEES）
    description: |
      确保出租和出售物业符合最低能效标准。
  BC-4990.50.30:
    name: 能效基准披露（LL97/建筑绩效标准）
    description: |
      依据城市能效基准法令和建筑绩效标准开展披露工作。
  BC-4990.50.40:
    name: 欧盟EPBD报告合规
    description: |
      遵守欧盟《建筑能效指令》的报告和认证要求。
  BC-4990.60:
    name: 租约与租金管制合规
    description: |
      遵守租金管制/稳定制度、驱逐通知、法定押金处理及短租登记制度。
  BC-4990.60.10:
    name: 租金管制与稳定合规
    description: |
      对管制单元遵守租金管制和租金稳定制度。
  BC-4990.60.20:
    name: 驱逐通知与程序合规
    description: |
      遵守法定驱逐通知和程序要求。
  BC-4990.60.30:
    name: 押金法定处理
    description: |
      依法处理押金，包括资金监管、利息计算和退还规则。
  BC-4990.60.40:
    name: 短租/STR登记合规
    description: |
      在受管制城市遵守短租登记和运营规则。
  BC-4990.70:
    name: 公寓、业主委员会与分层产权监管合规
    description: |
      遵守公寓、业主委员会、楼宇委员会和分层产权监管制度，包括发起人披露和储备金规则。
  BC-4990.70.10:
    name: 公寓/分层产权发起人披露
    description: |
      履行公寓和分层产权监管要求下的发起人披露义务。
  BC-4990.70.20:
    name: 业主委员会/楼宇委员会登记
    description: |
      完成业主委员会和楼宇委员会实体的登记及持续申报。
  BC-4990.70.30:
    name: 储备金披露合规
    description: |
      遵守储备金研究和披露要求。
  BC-4990.70.40:
    name: 转售证书合规
    description: |
      在公寓和业主委员会单元出售时发放转售证书及相关披露文件。
  BC-4990.80:
    name: 房地产基金与顾问合规
    description: |
      遵守管理房地产基金经理的AIFMD、ELTIF、美国《投资顾问法》及等效基金和顾问制度。
  BC-4990.80.10:
    name: 基金顾问登记
    description: |
      维护基金顾问和管理人的登记及授权资质。
  BC-4990.80.20:
    name: AIFMD/ELTIF报告合规
    description: |
      遵守AIFMD附件四和ELTIF报告义务。
  BC-4990.80.30:
    name: 营销与跨境通知
    description: |
      遵守基金跨境营销通知制度。
  BC-4990.80.40:
    name: 基金审计与检查响应
    description: |
      响应跨司法管辖区的基金监管机构审计和检查。

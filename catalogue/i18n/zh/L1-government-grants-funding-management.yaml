locale: zh
source: L1-government-grants-funding-management.yaml
entries:
  BC-3260:
    name: 政府补贴与资金管理
    description: |
      向机构、社区和个人奖励和管理竞争性及公式化补贴与政府资金，涵盖征集、申请审查、奖励、监督和结项。
  BC-3260.10:
    name: 补贴项目设计
    description: |
      设计补贴项目，包括目标、资格条件、资金分配公式和评审标准。
  BC-3260.10.10:
    name: 项目目标制定
    description: |
      制定补贴项目目标、成果和变化理论。
  BC-3260.10.20:
    name: 资金分配建模
    description: |
      对资金分配方案进行建模，包括公式化、竞争性和配套资金设计。
  BC-3260.10.30:
    name: 评审标准设定
    description: |
      设定补贴遴选的优先审查和评估标准。
  BC-3260.20:
    name: 征集与通告管理
    description: |
      发布资助机会、资金可用性通告和征集文件。
  BC-3260.20.10:
    name: 资助机会发布
    description: |
      发布补贴征集通告、资金可用性通告和征集文件。
  BC-3260.20.20:
    name: 申请方外联与支持
    description: |
      为补贴项目开展外联活动、信息说明和申请方支持。
  BC-3260.20.30:
    name: 奖励前问题处理
    description: |
      处理潜在申请方在奖励前的问题和说明请求。
  BC-3260.30:
    name: 申请接收与审查
    description: |
      接收、筛查和对补贴申请进行优先审查，包括评审小组审查和评分。
  BC-3260.30.10:
    name: 申请提交
    description: |
      提交和接收补贴申请及支持文件。
  BC-3260.30.20:
    name: 资格筛查
    description: |
      依据资格和门槛标准筛查申请。
  BC-3260.30.30:
    name: 优先审查与评分
    description: |
      由评审小组依据公布的标准对申请进行审查、评分和排序。
  BC-3260.30.40:
    name: 审查员与利益冲突管理
    description: |
      招募审查员并管理利益冲突。
  BC-3260.40:
    name: 奖励与资金决定
    description: |
      作出奖励决定，签发补贴协议，并向受益方安排资金义务。
  BC-3260.40.10:
    name: 奖励遴选
    description: |
      最终确定获奖申请和奖励金额。
  BC-3260.40.20:
    name: 补贴协议签发
    description: |
      起草和签订补贴协议及条款条件。
  BC-3260.40.30:
    name: 资金义务与发放安排
    description: |
      安排资金义务和发放计划。
  BC-3260.50:
    name: 受益方监督与报告
    description: |
      监督受益方绩效、财务报告及补贴条款合规情况。
  BC-3260.50.10:
    name: 绩效报告审查
    description: |
      审查受益方绩效和里程碑进度报告。
  BC-3260.50.20:
    name: 财务报告审查
    description: |
      审查受益方财务报告和提款申请。
  BC-3260.50.30:
    name: 现场监督与核实
    description: |
      开展现场访问，核实受益方活动和可交付成果。
  BC-3260.50.40:
    name: 子受益方监督
    description: |
      对转拨资金和子受益方安排实施监督。
  BC-3260.60:
    name: 补贴结项与审计核查
    description: |
      开展最终报告、结项、审计核查及不合规成本追缴。
  BC-3260.60.10:
    name: 最终报告与可交付成果验收
    description: |
      在项目结束时验收最终报告和可交付成果。
  BC-3260.60.20:
    name: 综合审计与合规审计核查
    description: |
      核查针对补贴受益方的综合审计和合规审计发现。
  BC-3260.60.30:
    name: 不合规成本追缴
    description: |
      在结项时追缴不合规成本和未使用结余。

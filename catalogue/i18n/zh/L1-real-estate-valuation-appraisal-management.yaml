locale: zh
source: L1-real-estate-valuation-appraisal-management.yaml
entries:
  BC-4970:
    name: 房地产估值与评估管理
    description: |
      面向房地产资产及组合的评估与估值学科，涵盖委托接入、实地检查、可比数据整理、销售/收益/成本法应用、报告与签发、定期组合按市值计量，以及符合USPAP、RICS红皮书和IVS标准的质量保证。
    in_scope:
      - 委托接入、范围界定、利益冲突检查及委托函
      - 标的物业检查及IPMS合规建筑测量
      - 可比交易和收益基准数据整理
      - 销售比较法、收益资本化法、现金流折现法和成本法
      - 符合红皮书/USPAP标准的报告起草与签发
      - 定期组合按市值计量和贷款方抵押品重估
      - 内部质量抽查、同行评审及审计响应
    out_of_scope:
      - 买卖方直接参与的收购评估（BC-4930）
      - 基金层面NAV计算（BC-4910）
      - 房产税评估申诉（BC-4920）
      - 作为经纪服务产品的经纪价值意见（BC-4960）
  BC-4970.10:
    name: 估值委托管理
    description: |
      接收客户和贷款方的入站估值委托，开展范围界定、利益冲突检查及委托函签发。
  BC-4970.10.10:
    name: 委托接入与范围界定
    description: |
      接收估值委托并定义估值范围和目的。
  BC-4970.10.20:
    name: 委托利益冲突与独立性检查
    description: |
      对新委托开展利益冲突和估价师独立性检查。
  BC-4970.10.30:
    name: 委托费用与委托函签发
    description: |
      确定委托费用并向客户签发委托函。
  BC-4970.20:
    name: 标的物业检查与数据采集
    description: |
      开展实地检查、IPMS合规建筑测量及标的物业状况和缺陷数据采集。
  BC-4970.20.10:
    name: 物业检查运营
    description: |
      由具备资质的估价师开展标的物业实地检查。
  BC-4970.20.20:
    name: 建筑测量（IPMS）
    description: |
      按IPMS及当地测量标准对建筑和租赁区域进行测量。
  BC-4970.20.30:
    name: 状况与缺陷记录
    description: |
      记录检查过程中发现的建筑状况和缺陷。
  BC-4970.30:
    name: 市场数据与可比数据整理
    description: |
      遴选和整理支持估值结论的可比交易、市场指数和收益基准数据。
  BC-4970.30.10:
    name: 可比交易采集
    description: |
      从市场来源和内部数据库采集可比交易数据。
  BC-4970.30.20:
    name: 市场指数与收益基准
    description: |
      按行业和地域维护市场指数和收益基准数据。
  BC-4970.30.30:
    name: 可比调整管理
    description: |
      管理针对时间、区位、状况和质量差异的可比调整。
  BC-4970.40:
    name: 估值方法应用
    description: |
      对标的物业应用公认的估值方法，包括销售比较法、收益资本化法、现金流折现法和成本法。
  BC-4970.40.10:
    name: 销售比较法
    description: |
      运用可比交易证据应用销售比较法。
  BC-4970.40.20:
    name: 收益资本化法
    description: |
      运用净营业收入（NOI）和收益证据应用收益资本化法。
  BC-4970.40.30:
    name: 现金流折现法
    description: |
      对多年期预测的收益物业应用现金流折现法。
  BC-4970.40.40:
    name: 成本法
    description: |
      运用重置成本和折旧分析应用成本法。
  BC-4970.50:
    name: 估值报告与签发
    description: |
      起草、内部审核并签发符合USPAP、红皮书和IVS标准的估值报告。
  BC-4970.50.10:
    name: 估值报告起草
    description: |
      按委托范围和目的起草估值报告。
  BC-4970.50.20:
    name: 审核人签发与质量控制
    description: |
      在报告发出前由审核人签发并进行质量控制。
  BC-4970.50.30:
    name: 报告发出与重新发出管理
    description: |
      发出估值报告并管理重新发出和补充说明事宜。
  BC-4970.60:
    name: 组合按市值计量与指数估值
    description: |
      为基金和贷款方开展定期组合重估，并向指数和基准提交估值数据。
  BC-4970.60.10:
    name: 定期组合重估
    description: |
      按约定周期对基金和业主组合开展定期重估。
  BC-4970.60.20:
    name: 贷款方抵押品重估
    description: |
      对贷款方抵押品进行重估，包括约定和压力测试触发条件。
  BC-4970.60.30:
    name: 指数与基准报告
    description: |
      向NCREIF、MSCI及其他绩效指数报告估值数据。
  BC-4970.70:
    name: 估值质量保证与审计
    description: |
      开展内部质量抽查、同行评审，以及响应客户和监管机构对已发出估值的审计。
  BC-4970.70.10:
    name: 内部质量抽查
    description: |
      对已发出估值进行内部质量保证抽查。
  BC-4970.70.20:
    name: 同行评审运营
    description: |
      对复杂或高价值估值开展同行评审。
  BC-4970.70.30:
    name: 监管与客户审计响应
    description: |
      响应监管机构和客户对已发出估值的审计请求。

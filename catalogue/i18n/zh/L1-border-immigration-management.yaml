locale: zh
source: L1-border-immigration-management.yaml
entries:
  BC-3300:
    name: 边境与移民管理
    description: |
      以人员为主的边境管控、签证和出行授权、庇护与难民身份认定、移民身份与居留管理、入籍及遣返运营。
  BC-3300.10:
    name: 签证与出行授权管理
    description: |
      处理签证申请、作出决定并签发签证和出行授权，包括ETA电子旅行授权式预审。
    in_scope:
      - 签证申请处理与决定
      - 电子旅行授权
      - 签证欺诈筛查
    out_of_scope:
      - 货物海关和贸易合规（由海关与贸易合规管理覆盖）
  BC-3300.10.10:
    name: 签证申请处理
    description: |
      跨各类别接收、验证和处理签证申请。
  BC-3300.10.20:
    name: 签证决定
    description: |
      对签证申请作出决定，包括拒签和附加条件。
  BC-3300.10.30:
    name: 电子旅行授权
    description: |
      签发和撤销ETA电子旅行授权。
  BC-3300.10.40:
    name: 签证欺诈筛查
    description: |
      对申请进行欺诈、证件篡改和身份证件异常筛查。
  BC-3300.20:
    name: 边境检查与入境
    description: |
      在口岸对旅行者开展一线和二线检查与入境处理。
  BC-3300.20.10:
    name: 旅行者提前信息处理
    description: |
      在旅行者抵达前处理API和PNR数据。
  BC-3300.20.20:
    name: 一线检查
    description: |
      在口岸开展一线检查，包括生物特征核验。
  BC-3300.20.30:
    name: 二线检查
    description: |
      对需要进一步审查的旅行者开展二线检查。
  BC-3300.20.40:
    name: 入境与拒绝入境决定
    description: |
      对入境、拒绝入境和入境条件作出决定。
  BC-3300.30:
    name: 庇护与难民身份认定
    description: |
      依据1951年《难民公约》和国家保护制度，接收、审查和认定庇护申请。
  BC-3300.30.10:
    name: 庇护申请接收
    description: |
      在边境和国内接收和登记庇护申请。
  BC-3300.30.20:
    name: 难民身份认定
    description: |
      依据1951年《公约》和补充保护规定裁定难民身份。
  BC-3300.30.30:
    name: 庇护接待与支援协调
    description: |
      协调庇护申请人的接待、住宿和基本生活支援。
  BC-3300.30.40:
    name: 安置与人道主义通道
    description: |
      运营安置和人道主义入境项目。
  BC-3300.40:
    name: 移民身份与居留管理
    description: |
      管理国内移民身份，包括居留许可、工作授权和家庭团聚案件。
  BC-3300.40.10:
    name: 居留许可管理
    description: |
      签发和续期居留许可及生物特征居留卡。
  BC-3300.40.20:
    name: 工作授权管理
    description: |
      管理工作许可证、担保人执照和劳动力市场测试。
  BC-3300.40.30:
    name: 家庭团聚处理
    description: |
      处理家庭团聚和随行人员申请。
  BC-3300.40.40:
    name: 身份合规监控
    description: |
      监控移民条件合规情况和身份变化。
  BC-3300.50:
    name: 入籍与公民身份管理
    description: |
      裁定入籍申请、血统或注册取得公民身份以及公民身份剥夺案件。
  BC-3300.50.10:
    name: 入籍申请处理
    description: |
      处理入籍申请和品行评估。
  BC-3300.50.20:
    name: 血统与注册取得公民身份
    description: |
      认定血统取得、注册取得和收养取得公民身份。
  BC-3300.50.30:
    name: 入籍仪式与宣誓管理
    description: |
      管理入籍仪式和效忠宣誓。
  BC-3300.50.40:
    name: 公民身份剥夺处理
    description: |
      裁定公民身份剥夺、放弃和撤销案件。
  BC-3300.60:
    name: 遣返与拘留管理
    description: |
      对无移民身份人员开展拘留、遣返和自愿遣返运营。
  BC-3300.60.10:
    name: 移民拘留运营
    description: |
      运营移民拘留设施并维护福利标准。
  BC-3300.60.20:
    name: 遣返令执行
    description: |
      执行驱逐出境和遣返令，包括押送遣返。
  BC-3300.60.30:
    name: 自愿遣返项目运营
    description: |
      协调辅助自愿遣返和重新融入项目。

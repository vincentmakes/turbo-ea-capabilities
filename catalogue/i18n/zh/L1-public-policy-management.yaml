locale: zh
source: L1-public-policy-management.yaml
entries:
  BC-3200:
    name: 公共政策管理
    description: |
      贯穿政策周期，开展以证据为基础、利益相关方咨询和影响评估为支撑的公共政策制定、分析、决策支持、实施协调和评估。
  BC-3200.10:
    name: 政策议程设置
    description: |
      识别、优先排序并接收需要政府关注的政策议题授权。
    in_scope:
      - 议题识别与前瞻扫描
      - 部长和政治授权接收
      - 政策优先排序与议程管理
    out_of_scope:
      - 立法或法规起草（由立法与法规起草管理覆盖）
      - 内阁决策执行（由政策决策支持覆盖）
  BC-3200.10.10:
    name: 政策议题识别
    description: |
      通过前瞻扫描和利益相关方信号，识别新兴议题和政策问题。
  BC-3200.10.20:
    name: 政治授权接收
    description: |
      将政治和部长授权转化为政策工作计划并进行结构化整理。
  BC-3200.10.30:
    name: 政策优先排序
    description: |
      依据工作能力、紧迫程度和政府承诺，对竞争性政策议题进行优先排序。
  BC-3200.20:
    name: 政策选项分析
    description: |
      对政策选项开展证据审查、建模和比较分析，涵盖成本、影响和可行性。
    in_scope:
      - 证据与文献综述
      - 成本效益和经济建模
      - 比较方案评估
      - 分配和公平性分析
    out_of_scope:
      - 法规草案的监管影响评估（由立法与法规起草管理覆盖）
  BC-3200.20.10:
    name: 证据与文献综述
    description: |
      系统收集和综合用于政策选项的证据信息。
  BC-3200.20.20:
    name: 政策建模与预测
    description: |
      开展政策结果的定量建模、微观模拟和预测。
  BC-3200.20.30:
    name: 方案评估
    description: |
      依据目标和约束条件对政策选项进行比较评估。
  BC-3200.20.40:
    name: 分配与公平性分析
    description: |
      分析政策对各人口群体的分配效应和公平性影响。
  BC-3200.30:
    name: 利益相关方与公众咨询
    description: |
      就政策提案，设计、开展并分析与利益相关方、公众及跨政府伙伴的咨询活动。
  BC-3200.30.10:
    name: 咨询设计
    description: |
      制定咨询策略、工具和覆盖计划。
  BC-3200.30.20:
    name: 咨询开展
    description: |
      通过在线平台、听证会和研讨会等渠道运营咨询工作。
  BC-3200.30.30:
    name: 咨询反馈分析
    description: |
      对咨询回复进行编码、分析和综合。
  BC-3200.30.40:
    name: 跨政府协调
    description: |
      就共同政策与次级政府和国际伙伴进行协调。
  BC-3200.40:
    name: 政策决策支持
    description: |
      为内阁、部长和行政决策准备情况汇报、决策备忘录和建议等文件。
  BC-3200.40.10:
    name: 情况汇报准备
    description: |
      为部长和行政领导准备政策事项情况汇报。
  BC-3200.40.20:
    name: 内阁提案管理
    description: |
      起草和协调内阁、行政机构或理事会提案。
  BC-3200.40.30:
    name: 决策记录与沟通
    description: |
      记录决策结果，向相关方传达，并向实施机构布置任务。
  BC-3200.50:
    name: 政策实施协调
    description: |
      协调跨部门政策实施，包括项目设计、排序和执行监督。
  BC-3200.50.10:
    name: 实施规划
    description: |
      将政策决策转化为实施计划、里程碑和问责机制。
  BC-3200.50.20:
    name: 跨部门协调
    description: |
      协调实施机构和联合交付安排。
  BC-3200.50.30:
    name: 实施进度跟踪
    description: |
      跟踪政策实施进度是否符合承诺和截止期限。
  BC-3200.60:
    name: 政策评估与审查
    description: |
      开展事后评估、日落条款和实施后审查，并将结果反馈至政策周期。
  BC-3200.60.10:
    name: 结果与影响评估
    description: |
      评估政策结果和影响是否达到预期目标。
  BC-3200.60.20:
    name: 日落条款与实施后审查
    description: |
      在规定时间节点对政策和文件开展法定或自主审查。
  BC-3200.60.30:
    name: 经验教训总结
    description: |
      汇集和传播经验教训，为未来政策周期提供参考。

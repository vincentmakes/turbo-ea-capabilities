locale: zh
source: L1-agricultural-inputs-management.yaml
entries:
  BC-3550:
    name: 农业投入品管理
    description: |
      农业投入品的全生命周期管理——种子与遗传材料、化肥、植保产品、动物营养品、兽药和生物制品——包括行业特有的溯源、监管和储存要求，区别于通用采购管理。
  BC-3550.10:
    name: 种子与遗传材料管理
    description: |
      认证种子采购、种子处理、系谱与性状跟踪及种植周期内的种子库存管理。
    in_scope:
      - 认证种子采购
      - 种子处理施用
      - 系谱与性状跟踪
      - 农场和储存点种子库存
    out_of_scope:
      - 植物育种研发（BC-810）
      - 品种推荐（BC-3530.40）
  BC-3550.10.10:
    name: 种子采购与认证
    description: |
      依据OECD种子计划和ISTA检测标准采购认证种子。
  BC-3550.10.20:
    name: 种子处理施用
    description: |
      播前对种子进行处理和包衣施用。
  BC-3550.10.30:
    name: 种子系谱与性状跟踪
    description: |
      跟踪种子系谱、性状叠加及监管义务。
  BC-3550.10.40:
    name: 种子库存管理
    description: |
      跨储存点和农场仓库的种子库存管理。
  BC-3550.20:
    name: 化肥投入品管理
    description: |
      固体和液体化肥的采购、储存、搬运及施用记录。
  BC-3550.20.10:
    name: 化肥采购
    description: |
      从供应商和进口商采购单质和混合化肥。
  BC-3550.20.20:
    name: 化肥储存与搬运
    description: |
      农场和储存点化肥的储存与搬运，包括防渗漏措施。
  BC-3550.20.30:
    name: 化肥施用记录
    description: |
      按地块、产品和用量记录化肥施用档案。
  BC-3550.30:
    name: 植保投入品管理
    description: |
      植保产品的采购、储存、施用记录及空容器监管。
  BC-3550.30.10:
    name: 植保产品采购
    description: |
      通过合法渠道采购经登记的植保产品。
  BC-3550.30.20:
    name: 农药储存与搬运
    description: |
      农药储存、分隔及操作人员防护管控。
  BC-3550.30.30:
    name: 农药施用记录
    description: |
      符合监管机构和保障体系要求的农药施用记录。
  BC-3550.30.40:
    name: 空容器监管
    description: |
      农药空容器的三次冲洗、回收和再生利用。
  BC-3550.40:
    name: 动物营养投入品管理
    description: |
      畜牧运营中饲料原料、预混料和饲料添加剂的采购、储存及使用跟踪。
  BC-3550.40.10:
    name: 饲料原料采购
    description: |
      采购谷物、蛋白质饼粕和粗饲料原料。
  BC-3550.40.20:
    name: 预混料与添加剂管理
    description: |
      预混料、矿物质和饲料添加剂的采购与库存管理。
  BC-3550.40.30:
    name: 饲料库存与日粮跟踪
    description: |
      农场饲料库存和日粮使用跟踪。
  BC-3550.50:
    name: 兽药投入品管理
    description: |
      农场兽药和生物制品的采购、冷链储存及使用记录。
  BC-3550.50.10:
    name: 兽药采购
    description: |
      凭处方采购兽药和生物制品。
  BC-3550.50.20:
    name: 兽药冷链储存
    description: |
      农场兽药冷链储存及温度偏差管理。
  BC-3550.50.30:
    name: 兽药使用记录
    description: |
      记录批次、剂量、动物和操作者信息的使用档案。
  BC-3550.60:
    name: 生物制品与土壤改良投入品
    description: |
      生物投入品的采购、有机肥处理及石灰和土壤改良剂供应。
  BC-3550.60.10:
    name: 生物投入品采购
    description: |
      采购生物刺激剂、生物肥料和微生物接种剂。
  BC-3550.60.20:
    name: 有机肥与堆肥管理
    description: |
      农场有机肥储存、堆肥化及养分回收运营。
  BC-3550.60.30:
    name: 石灰与土壤改良剂采购
    description: |
      采购石灰、石膏和其他土壤改良剂。

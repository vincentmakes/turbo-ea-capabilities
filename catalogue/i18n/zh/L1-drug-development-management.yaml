locale: zh
source: L1-drug-development-management.yaml
entries:
  BC-1510:
    name: 药物开发管理
    description: |
      覆盖临床前及各期临床开发的全流程管理，推动药物从候选化合物走向上市许可。
  BC-1510.10:
    name: 临床前开发管理
    description: |
      统筹临床前药理学、毒理学与ADME研究，为首次人体试验提供安全性依据。
  BC-1510.10.10:
    name: 临床前药理学
    description: |
      开展临床前药理学研究与建模，评估候选化合物的药效特征。
  BC-1510.10.20:
    name: 临床前毒理学
    description: |
      按GLP要求开展毒理学研究，为安全性评估提供数据支撑。
  BC-1510.10.30:
    name: ADME与药代动力学研究
    description: |
      开展ADME及药代动力学研究，阐明化合物体内处置规律。
  BC-1510.10.40:
    name: 临床前生物分析
    description: |
      开发并验证生物分析方法，支持临床前样品检测。
  BC-1510.20:
    name: I期临床开发管理
    description: |
      统筹首次人体试验、安全性评估及PK/PD研究，确定人体耐受性与初始剂量。
  BC-1510.20.10:
    name: 首次人体试验实施
    description: |
      规划并实施首次人体试验，获取安全性与初始药代动力学数据。
  BC-1510.20.20:
    name: I期安全性监测
    description: |
      在I期试验中开展安全性监测与剂量递增管理。
  BC-1510.20.30:
    name: 临床PK/PD建模
    description: |
      开展临床PK/PD建模分析，支持剂量选择决策。
  BC-1510.30:
    name: II期临床开发管理
    description: |
      统筹概念验证及剂量探索研究，评估药物疗效信号与最优剂量范围。
  BC-1510.30.10:
    name: II期概念验证研究
    description: |
      实施概念验证研究，确认候选药物的早期疗效信号。
  BC-1510.30.20:
    name: II期剂量探索研究
    description: |
      开展剂量探索与剂量-效应关系研究。
  BC-1510.30.30:
    name: II期适应性试验运营
    description: |
      运营适应性II期试验设计，提升开发决策效率。
  BC-1510.40:
    name: III期临床开发管理
    description: |
      统筹关键注册试验的开展，为上市许可申报提供核心证据。
  BC-1510.40.10:
    name: III期试验实施
    description: |
      实施III期关键注册试验，确保数据质量与时间节点达成。
  BC-1510.40.20:
    name: 关键试验统计分析
    description: |
      按ICH E9要求对关键试验数据开展统计分析。
  BC-1510.40.30:
    name: 关键试验结果报告
    description: |
      撰写并公开发布关键试验结果报告。
  BC-1510.50:
    name: IV期/上市后开发管理
    description: |
      统筹上市后研究与真实世界证据生成，支持产品全生命周期开发。
  BC-1510.50.10:
    name: 上市后承诺研究
    description: |
      按监管要求实施上市后承诺与义务研究。
  BC-1510.50.20:
    name: 真实世界证据生成
    description: |
      开展真实世界证据与观察性研究，补充注册证据体系。
  BC-1510.50.30:
    name: 生命周期适应症扩展
    description: |
      推进药物生命周期开发与适应症扩展研究。
  BC-1510.60:
    name: CMC开发管理
    description: |
      统筹化学、制造与质控开发，确保药物物质与制剂符合注册要求。
  BC-1510.60.10:
    name: 药物物质开发
    description: |
      开发药物物质的合成工艺与生产流程。
  BC-1510.60.20:
    name: 药物制剂开发
    description: |
      开发剂型与药物制剂处方工艺。
  BC-1510.60.30:
    name: 分析方法开发
    description: |
      开发并验证药物质量控制分析方法。
  BC-1510.60.40:
    name: 稳定性研究项目管理
    description: |
      按ICH Q1要求管理稳定性研究项目。
  BC-1510.60.50:
    name: 工艺验证
    description: |
      按ICH Q7-Q12要求开展生产工艺验证。

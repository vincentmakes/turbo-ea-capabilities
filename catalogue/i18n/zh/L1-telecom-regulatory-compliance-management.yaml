locale: zh
source: L1-telecom-regulatory-compliance-management.yaml
entries:
  BC-2700:
    name: 电信监管合规管理
    description: |
      履行电信专项监管义务，包括普遍服务、合法监听、数据留存、应急服务、无障碍访问、网络中立和许可证条件报告，以国家电信监管机构及ETSI/3GPP合法监听标准为基础。
  BC-2700.10:
    name: 普遍服务义务管理
    description: |
      履行并报告普遍服务义务及相关补贴情况。
  BC-2700.10.10:
    name: 普遍服务区域规划
    description: |
      按区域规划普遍服务覆盖和质量承诺。
  BC-2700.10.20:
    name: 普遍服务补贴报告
    description: |
      向普遍服务基金报告补贴用户数和服务交付情况。
  BC-2700.10.30:
    name: 普遍服务交付
    description: |
      提供强制性普遍服务，包括补贴资费和最低服务标准。
  BC-2700.20:
    name: 合法监听管理
    description: |
      在授权令状下开通并交付合法监听能力。
  BC-2700.20.10:
    name: 合法监听开通
    description: |
      在授权令状下对网络单元的合法监听目标进行开通。
  BC-2700.20.20:
    name: 合法监听内容移交
    description: |
      向执法监控机构交付被截获的内容和元数据。
  BC-2700.20.30:
    name: 合法监听审计与访问控制
    description: |
      对合法监听活动实施访问控制和审计，防止未授权使用。
  BC-2700.30:
    name: 电信数据留存管理
    description: |
      按国家数据留存框架采集、安全存储并授权释放留存的通信数据。
  BC-2700.30.10:
    name: 留存数据采集
    description: |
      采集受留存义务约束的通信数据。
  BC-2700.30.20:
    name: 留存数据访问工作流
    description: |
      处理有权机关访问留存数据的授权申请工作流。
  BC-2700.30.30:
    name: 留存数据清除
    description: |
      在留存期限届满时清除留存数据。
  BC-2700.40:
    name: 应急服务管理
    description: |
      提供监管机构要求的应急呼叫路由、位置信息交付和公共预警能力。
  BC-2700.40.10:
    name: 应急呼叫路由
    description: |
      将应急呼叫路由至适当的公共安全应答点。
  BC-2700.40.20:
    name: 呼叫方位置信息交付
    description: |
      按E911、eCall和AML标准向应急服务交付呼叫方位置信息。
  BC-2700.40.30:
    name: 公共预警广播
    description: |
      在获授权激活后广播基于小区广播和短信的公共预警消息。
  BC-2700.50:
    name: 电信无障碍管理
    description: |
      依据电信专项义务提供无障碍功能并处理无障碍相关投诉。
  BC-2700.50.10:
    name: 实时文本与TTY支持
    description: |
      为聋哑和听障用户提供实时文本和TTY服务支持。
  BC-2700.50.20:
    name: 无障碍功能交付
    description: |
      提供中继服务和无障碍账单等电信专项无障碍功能。
  BC-2700.50.30:
    name: 无障碍投诉处理
    description: |
      处理无障碍相关投诉及监管机构要求的报告。
  BC-2700.60:
    name: 网络中立与流量管理披露
    description: |
      披露流量管理措施并遵守网络中立制度。
  BC-2700.60.10:
    name: 流量管理政策披露
    description: |
      向客户和监管机构披露流量管理措施。
  BC-2700.60.20:
    name: 限速透明度
    description: |
      透明报告限速、优先级和零计费措施。
  BC-2700.60.30:
    name: 网络中立监管申报
    description: |
      向监管机构申报网络中立措施和投诉情况。
  BC-2700.70:
    name: 电信监管报告
    description: |
      定期向电信监管机构提交KPI、市场数据和许可证条件履行情况报告。
  BC-2700.70.10:
    name: 电信KPI申报
    description: |
      提交覆盖、质量和服务性能方面的强制KPI报告。
  BC-2700.70.20:
    name: 电信市场数据申报
    description: |
      提交用户数、收入和流量的市场数据申报。
  BC-2700.70.30:
    name: 许可证条件报告
    description: |
      报告经营许可证条件的履行情况，包括覆盖、建设和质量义务。

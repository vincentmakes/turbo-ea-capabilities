entries:
  BC-1160:
    name: 调试与移交管理
    description: |
      管理预调试、调试、性能测试与设施移交，确保工程项目顺利转入运营。
  BC-1160.10:
    name: 预调试管理
    description: |
      完成机械竣工验收、冲洗、泄漏测试与送电工作。
  BC-1160.10.10:
    name: 机械竣工验收
    description: |
      对照尾项清单验证机械竣工情况。
  BC-1160.10.20:
    name: 冲洗与清洁作业
    description: |
      开展管道冲洗、清洁与化学处理。
  BC-1160.10.30:
    name: 压力与泄漏测试
    description: |
      开展水压测试、气压测试与泄漏验证。
  BC-1160.10.40:
    name: 设备送电
    description: |
      完成设备首次送电与功能检查。
  BC-1160.20:
    name: 调试执行管理
    description: |
      开展系统调试、功能测试与集成测试。
  BC-1160.20.10:
    name: 系统调试规划
    description: |
      按系统与子系统编制调试计划。
  BC-1160.20.20:
    name: 系统功能测试
    description: |
      开展各系统的功能测试。
  BC-1160.20.30:
    name: 集成系统测试
    description: |
      开展跨系统集成测试。
  BC-1160.20.40:
    name: 调试文件
    description: |
      整理调试记录、资料与合格证书。
  BC-1160.30:
    name: 性能测试管理
    description: |
      执行性能试运行并验证验收准则。
  BC-1160.30.10:
    name: 性能测试规划
    description: |
      制定性能测试方案与验收准则。
  BC-1160.30.20:
    name: 性能测试执行
    description: |
      执行性能试运行并采集测试数据。
  BC-1160.30.30:
    name: 性能测试评估
    description: |
      评估测试结果并对照保证值进行验证。
  BC-1160.40:
    name: 移交与验收管理
    description: |
      完成最终验收、合格证书签发、尾项关闭与设施移交业主。
  BC-1160.40.10:
    name: 尾项清单关闭
    description: |
      在验收前跟踪并关闭所有尾项。
  BC-1160.40.20:
    name: 验收证书签发
    description: |
      签发临时与最终验收证书。
  BC-1160.40.30:
    name: 操作员培训与移交
    description: |
      培训运营团队并完成设施移交。
  BC-1160.40.40:
    name: 实物资产移交
    description: |
      正式向客户完成设施与资产的实物移交。
  BC-1160.50:
    name: 移交后支持管理
    description: |
      在缺陷责任期与质保期内提供技术支持。
  BC-1160.50.10:
    name: 缺陷责任管理
    description: |
      管理缺陷责任期与遗留问题整改。
  BC-1160.50.20:
    name: 质保支持
    description: |
      协调质保支持与供应商质保索赔。
  BC-1160.50.30:
    name: 剩余技术支持
    description: |
      在初始运营期间向运营方提供技术支持。

  BC-2100:
    name: 保险产品管理
    description: |
      保险产品工厂，涵盖寿险、财险、健康险和特殊险种的保障定义、条款、费率表、产品组合和全生命周期管理，包括授权市场中的项目业务和核保代理产品结构。
  BC-2100.10:
    name: 保险产品目录管理
    description: |
      保险产品目录、主数据、保障与条款库、信息披露文件及目录发布管理。
  BC-2100.10.10:
    name: 产品主数据管理
    description: |
      维护保险产品主数据和产品层级结构。
  BC-2100.10.20:
    name: 保障与条款库
    description: |
      维护标准化保障定义、保单条款及批单库。
  BC-2100.10.30:
    name: 产品信息披露文件
    description: |
      编制和维护产品信息披露文件和关键事实说明。
  BC-2100.10.40:
    name: 产品目录发布
    description: |
      跨渠道和合作伙伴发布保险产品目录。
  BC-2100.20:
    name: 产品定价与费率配置
    description: |
      配置费率算法、费率因子、报备费率、折扣及附加费。
  BC-2100.20.10:
    name: 费率算法配置
    description: |
      为保险产品配置费率算法和定价模型。
  BC-2100.20.20:
    name: 费率因子与变量维护
    description: |
      维护费率因子、费率表和费率变量。
  BC-2100.20.30:
    name: 报备费率管理
    description: |
      跨司法管辖区管理报备费率、偏差和审批。
  BC-2100.20.40:
    name: 折扣与附加费配置
    description: |
      配置保费折扣、附加费和抵扣项目。
  BC-2100.30:
    name: 产品承保资格与规则配置
    description: |
      配置产品中嵌入的资格条件、承保指引及转介和拒保规则。
  BC-2100.30.10:
    name: 资格规则配置
    description: |
      按产品配置客户和风险资格规则。
  BC-2100.30.20:
    name: 承保指引编码
    description: |
      将承保指引编码到产品配置中。
  BC-2100.30.30:
    name: 转介与拒保规则配置
    description: |
      按产品配置自动转介和拒保规则。
  BC-2100.40:
    name: 保险产品全生命周期管理
    description: |
      新产品引入、监管报备、上市准备、绩效审查及退市管理。
  BC-2100.40.10:
    name: 新产品概念
    description: |
      新保险产品的概念定义和产品委员会治理。
  BC-2100.40.20:
    name: 产品报备与审批
    description: |
      跨司法管辖区的保险产品监管报备和审批跟踪。
  BC-2100.40.30:
    name: 产品上市准备
    description: |
      保险产品发布的运营和渠道准备就绪管理。
  BC-2100.40.40:
    name: 产品绩效审查
    description: |
      保险产品的定期绩效和物有所值审查。
  BC-2100.40.50:
    name: 产品退市与替代
    description: |
      产品退市、替代及投保人迁移至后续产品的管理。
  BC-2100.50:
    name: 保险产品组合管理
    description: |
      多险种捆绑、套餐产品及组合绩效跟踪。
  BC-2100.50.10:
    name: 多险种捆绑定义
    description: |
      定义多险种产品捆绑和打包规则。
  BC-2100.50.20:
    name: 捆绑资格规则配置
    description: |
      保险产品捆绑的资格和适用规则配置。
  BC-2100.50.30:
    name: 捆绑绩效跟踪
    description: |
      跟踪捆绑产品的采用率、续保率和经济效益。
  BC-2100.60:
    name: 特殊险种与项目业务管理
    description: |
      项目业务定义、核保代理产品授权及特殊险种条款库。
  BC-2100.60.10:
    name: 项目业务定义
    description: |
      项目业务和授权核保产品结构的定义。
  BC-2100.60.20:
    name: 核保代理产品授权
    description: |
      授予核保代理的产品范围和权限定义。
  BC-2100.60.30:
    name: 特殊险种条款与批单库
    description: |
      特殊险种条款、手工批单和市场条款库管理。

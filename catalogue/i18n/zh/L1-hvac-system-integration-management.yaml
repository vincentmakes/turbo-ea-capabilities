entries:
  BC-2020:
    name: 暖通空调系统集成管理
    description: |
      针对特定建筑的暖通空调和 BAS 集成解决方案项目级工程，涵盖负荷计算、设备选型、系统原理图、BAS 点位清单和架构、操作序列编制、BIM/MEP 协调、项目规格书及报审图管理。
    in_scope:
      - 建筑专项负荷计算和设备选型
      - 项目级机械、水系统和制冷剂管路原理图设计
      - 项目用 BAS 点位清单、网络拓扑和盘柜布置
      - 项目专用操作序列编制
      - BIM 协调、项目规格书和报审图管理
    out_of_scope:
      - 设备产品工程（BC-2000）和 BAS 产品工程（BC-2010）
      - 跨专业 MEP 专业执业（BC-1100）
      - 调试服务交付（BC-2050）
      - 通用工程项目管理（BC-1110）

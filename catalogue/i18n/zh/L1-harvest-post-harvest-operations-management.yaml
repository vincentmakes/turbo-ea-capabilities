locale: zh
source: L1-harvest-post-harvest-operations-management.yaml
entries:
  BC-3560:
    name: 收获与采后处理运营管理
    description: |
      收获计划与执行、田间及采后调制、农场储存、分级与包装，以及向农食品链下一环节的到货收货。
  BC-3560.10:
    name: 收获计划与调度
    description: |
      跨地块和作物的收获窗口规划、人员与设备调度及收获物流协调。
  BC-3560.10.10:
    name: 收获窗口规划
    description: |
      依据成熟度和天气开展逐地块收获窗口规划。
  BC-3560.10.20:
    name: 收获人员与设备调度
    description: |
      调度收获人员、承包商和农机。
  BC-3560.10.30:
    name: 收获物流协调
    description: |
      协调跨活跃收获前线的卡车、料箱和拖车。
  BC-3560.20:
    name: 田间收获作业
    description: |
      机械和人工收获作业，包括田间分选和田边转运。
  BC-3560.20.10:
    name: 机械收获
    description: |
      联合收割机、割草压扁机和专用机械收获作业。
  BC-3560.20.20:
    name: 人工收获
    description: |
      园艺作物的手工采摘和选择性人工收获。
  BC-3560.20.30:
    name: 田间分选
    description: |
      收获农产品的田间分选与整理。
  BC-3560.30:
    name: 采后调制
    description: |
      收获农产品的干燥、冷却、愈伤和去污处理，以稳定品质备储或向下游流转。
    in_scope:
      - 谷物和种子干燥
      - 园艺农产品预冷
      - 块根和球茎作物愈伤处理
      - 田间清洗和去污
  BC-3560.30.10:
    name: 干燥作业
    description: |
      将谷物、种子和牧草干燥至安全含水率。
  BC-3560.30.20:
    name: 冷却与预冷作业
    description: |
      园艺农产品的水冷、真空预冷和强制通风预冷。
  BC-3560.30.30:
    name: 愈伤处理作业
    description: |
      马铃薯、洋葱、甘薯及类似作物的愈伤处理。
  BC-3560.30.40:
    name: 清洗与去污处理
    description: |
      收获农产品储前清洗与去污处理。
  BC-3560.40:
    name: 农场储存运营
    description: |
      运营农场料箱、筒仓和冷库，包括通风和储粮害虫管理。
  BC-3560.40.10:
    name: 料箱与筒仓管理
    description: |
      谷物料箱和筒仓的装仓、监测和出仓管理。
  BC-3560.40.20:
    name: 冷库运营
    description: |
      运营农场保鲜库和气调库。
  BC-3560.40.30:
    name: 储粮通风管理
    description: |
      通过通风管理维持储粮温度和水分。
  BC-3560.40.40:
    name: 储粮有害生物管理
    description: |
      仓库中昆虫和鼠害压力的监测与防治。
  BC-3560.50:
    name: 农产品分级与包装
    description: |
      农产品分级、包装车间及批次标识运营，为下游流转做好准备。
  BC-3560.50.10:
    name: 品质分级作业
    description: |
      依据大小、颜色和缺陷规格对农产品进行分级。
  BC-3560.50.20:
    name: 包装车间运营
    description: |
      包装线运营，包括清洗、打蜡和包装。
  BC-3560.50.30:
    name: 批次识别与标识
    description: |
      批次、生产批号及GS1标识分配与标签打印。
  BC-3560.60:
    name: 向加工商到货收货
    description: |
      协调农场或集货商向加工商或买方场地的到货收货。
  BC-3560.60.10:
    name: 卡车调度与收货
    description: |
      加工商入口的到货卡车调度与收货。
  BC-3560.60.20:
    name: 收货抽样
    description: |
      谷物、牲畜、牛奶和农产品到货批次的抽样检测。
  BC-3560.60.30:
    name: 收货质量检测
    description: |
      支持验收和定价的到货批次质量检测。

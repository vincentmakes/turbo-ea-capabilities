source: L1-treasury-management.yaml
entries:
  BC-210:
    name: 资金管理
    description: |
      管理现金、流动性、融资及金融市场敞口。
  BC-210.10:
    name: 现金管理
    description: |
      管理现金头寸、资金归集及内部往来融资。
  BC-210.10.10:
    name: 现金头寸监控
    description: |
      每日监控各实体及货币的现金头寸。
  BC-210.10.20:
    name: 现金归集运营
    description: |
      开展集团层面的名义及实物现金归集。
  BC-210.10.30:
    name: 内部往来融资
    description: |
      管理内部往来贷款、内部银行及内部往来结算。
  BC-210.10.40:
    name: 短期投资管理
    description: |
      开展货币市场及短期现金投资业务。
  BC-210.20:
    name: 流动性管理
    description: |
      开展流动性预测、压力测试及制定融资计划。
  BC-210.20.10:
    name: 现金流量预测
    description: |
      编制短期、中期及长期现金流量预测。
  BC-210.20.20:
    name: 流动性风险监控
    description: |
      监控流动性比率、缓冲及预警指标。
  BC-210.20.30:
    name: 流动性压力测试
    description: |
      在不利情景下测试流动性充足性。
  BC-210.20.40:
    name: 应急融资规划
    description: |
      制定应急融资计划及备用流动性安排。
  BC-210.30:
    name: 融资与债务管理
    description: |
      管理债务发行、授信安排及财务契约。
  BC-210.30.10:
    name: 债务发行
    description: |
      发行债券、商业票据及私募债。
  BC-210.30.20:
    name: 银行贷款与授信管理
    description: |
      谈判并管理信贷授信及双边贷款。
  BC-210.30.30:
    name: 债务偿还服务
    description: |
      安排并执行利息、本金及费用还款计划。
  BC-210.30.40:
    name: 财务契约与评级管理
    description: |
      监控财务契约并维护信用评级机构关系。
  BC-210.40:
    name: 外汇管理
    description: |
      管理外汇敞口、套期保值及结算。
  BC-210.40.10:
    name: 外汇敞口识别
    description: |
      识别并量化各实体的外汇敞口。
  BC-210.40.20:
    name: 外汇套期保值执行
    description: |
      执行外汇远期、掉期及期权交易。
  BC-210.40.30:
    name: 外汇结算与确认
    description: |
      开展外汇交易的结算、确认及对账。
  BC-210.40.40:
    name: 折算敞口管理
    description: |
      对净投资及折算敞口进行套期保值。
  BC-210.50:
    name: 利率风险管理
    description: |
      管理利率敞口及套期保值策略。
  BC-210.50.10:
    name: 利率敞口计量
    description: |
      计量资产负债表层面的利率敏感性。
  BC-210.50.20:
    name: 利率套期保值
    description: |
      执行利率互换、利率上限及其他衍生品交易。
  BC-210.50.30:
    name: 套期保值会计
    description: |
      按 IFRS 9 开展套期指定、有效性测试及核算。
  BC-210.60:
    name: 银行关系管理
    description: |
      管理银行账户结构及银行合作伙伴关系。
  BC-210.60.10:
    name: 银行账户全生命周期管理
    description: |
      处理银行账户的开立、变更及注销。
  BC-210.60.20:
    name: 银行授权与签字人管理
    description: |
      管理银行签字人名单、授权书及权限变更。
  BC-210.60.30:
    name: 银行服务采购
    description: |
      选择并签约银行合作伙伴及服务。
  BC-210.60.40:
    name: 银行费用与服务质量管理
    description: |
      监控银行费用、服务质量及分析评价。

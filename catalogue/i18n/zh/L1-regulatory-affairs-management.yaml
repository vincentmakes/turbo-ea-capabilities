locale: zh
source: L1-regulatory-affairs-management.yaml
entries:
  BC-1530:
    name: 法规事务管理
    description: |
      覆盖申报、批准及产品生命周期内与监管机构的持续交互，确保全球合规上市。
  BC-1530.10:
    name: 法规策略管理
    description: |
      制定法规策略并开展法规风险评估，指导产品全球注册路径规划。
  BC-1530.10.10:
    name: 全球法规策略
    description: |
      制定多地区法规策略并选择注册路径，支持高效上市布局。
  BC-1530.10.20:
    name: 法规风险评估
    description: |
      评估法规风险与应对方案，为注册决策提供依据。
  BC-1530.10.30:
    name: 目标产品档案管理
    description: |
      定义并维护目标产品档案，确保开发目标与法规要求一致。
  BC-1530.20:
    name: 法规申报管理
    description: |
      统筹IND、NDA、MAA、BLA等申报文件的准备与提交。
  BC-1530.20.10:
    name: 申报规划
    description: |
      制定申报计划与内容进度安排，确保申报节点达成。
  BC-1530.20.20:
    name: eCTD编制
    description: |
      编制eCTD格式注册申报文件。
  BC-1530.20.30:
    name: 申报文件撰写与审核
    description: |
      撰写并审核法规申报文件，确保内容准确完整。
  BC-1530.20.40:
    name: 申报递交与追踪
    description: |
      管理申报递交并追踪监管机构审评进程。
  BC-1530.30:
    name: 法规情报管理
    description: |
      持续监测法规动态与指导原则变化，为策略调整提供支撑。
  BC-1530.30.10:
    name: 法规指导原则监测
    description: |
      监测指导原则文件与法规规则变化，及时评估影响。
  BC-1530.30.20:
    name: 竞争性法规情报
    description: |
      收集竞争对手法规活动情报，支持差异化策略制定。
  BC-1530.30.30:
    name: 法规知识库
    description: |
      建立并维护法规知识库，沉淀法规专业能力。
  BC-1530.40:
    name: 法规生命周期维护管理
    description: |
      统筹变更申报、续期及批准后变更管理，维持产品上市许可的持续有效性。
  BC-1530.40.10:
    name: 变更申报
    description: |
      提交IA型、IB型及II型变更申报。
  BC-1530.40.20:
    name: 续期申报
    description: |
      提交上市许可续期申报。
  BC-1530.40.30:
    name: 批准后变更管理
    description: |
      管理CMC及说明书批准后变更。
  BC-1530.40.40:
    name: 生命周期申报规划
    description: |
      按产品制定生命周期申报活动规划。
  BC-1530.50:
    name: 监管机构交互管理
    description: |
      统筹FDA/EMA/PMDA会议及科学建议的申请与准备，提升监管沟通效率。
  BC-1530.50.10:
    name: 科学建议申请
    description: |
      向药品监管机构提交科学建议请求。
  BC-1530.50.20:
    name: 监管机构会议管理
    description: |
      准备并召开与监管机构的会议。
  BC-1530.50.30:
    name: 监管机构询问回复
    description: |
      回应监管机构的信息请求与问询。
  BC-1530.60:
    name: 说明书管理
    description: |
      管理SmPC/USPI、包装说明书及说明书变更，确保各市场说明书准确合规。
  BC-1530.60.10:
    name: 核心说明书管理
    description: |
      管理核心数据表与核心说明书，维护全球说明书一致性。
  BC-1530.60.20:
    name: 本地说明书调整
    description: |
      根据各地区要求调整并翻译SmPC/USPI。
  BC-1530.60.30:
    name: 说明书变更实施
    description: |
      在各上市市场实施说明书变更。
  BC-1530.60.40:
    name: 包装设计稿管理
    description: |
      管理包装设计稿制作与核对校验工作。

locale: zh
source: L1-specialty-formulation-blending-management.yaml
entries:
  BC-4630:
    name: 特种配方与配混管理
    description: |
      开展特种化学品（包括涂料、粘合剂、农药制剂、润滑剂、表面活性剂和精细化学品）的配方设计、配混、复配、灌装和精整。
  BC-4630.10:
    name: 配方设计与开发
    description: |
      开展特种配方的规格制定、原材料选择、实验室规模试验和成本优化。
  BC-4630.10.10:
    name: 配方规格开发
    description: |
      根据应用目标开发配方规格。
  BC-4630.10.20:
    name: 原材料选择
    description: |
      综合性能、成本和 HSE 因素选择原材料。
  BC-4630.10.30:
    name: 实验室规模配方试验
    description: |
      制备和表征候选配方的实验室规模试样。
  BC-4630.10.40:
    name: 配方成本优化
    description: |
      在规格约束下优化配方成本。
  BC-4630.20:
    name: 配混与混合运营
    description: |
      操作液体、固体、乳液和分散体配混设备。
  BC-4630.20.10:
    name: 液体配混运营
    description: |
      开展液体化学品的储罐式和在线配混。
  BC-4630.20.20:
    name: 固体配混运营
    description: |
      开展固体配方的螺旋带、V 型锥和滚筒配混。
  BC-4630.20.30:
    name: 乳化运营
    description: |
      使用转子定子和高压均质机生产乳液。
  BC-4630.20.40:
    name: 分散与研磨运营
    description: |
      操作砂磨机、三辊研磨机和分散机。
  BC-4630.30:
    name: 复合与挤出运营
    description: |
      开展聚合物复合、母料生产和特种中间体挤出。
  BC-4630.30.10:
    name: 聚合物复合
    description: |
      将聚合物与填料、稳定剂和助剂进行复合。
  BC-4630.30.20:
    name: 母料生产
    description: |
      生产色母、助剂母料和功能性母料。
  BC-4630.30.30:
    name: 挤出运营
    description: |
      操作单螺杆和双螺杆挤出生产线。
  BC-4630.40:
    name: 灌装与包装运营
    description: |
      将特种产品灌装至散装、桶装、IBC、小包装和加压容器。
  BC-4630.40.10:
    name: 散装容器灌装
    description: |
      灌装散装公路、铁路和 ISO 集装箱。
  BC-4630.40.20:
    name: 桶装与 IBC 灌装
    description: |
      灌装钢桶、塑料桶和中型散装容器（IBC）。
  BC-4630.40.30:
    name: 小包装灌装
    description: |
      对瓶、桶和消费品包装进行高速灌装。
  BC-4630.40.40:
    name: 气雾剂与加压包装灌装
    description: |
      对气雾罐和加压容器进行灌装和封口。
  BC-4630.50:
    name: 配方性能测试
    description: |
      开展特种配方的应用性能、稳定性和对比测试。
  BC-4630.50.10:
    name: 应用性能测试
    description: |
      在模拟最终使用条件下测试配方性能。
  BC-4630.50.20:
    name: 稳定性与货架寿命测试
    description: |
      开展实时和加速稳定性及货架寿命测试。
  BC-4630.50.30:
    name: 对比基准测试
    description: |
      开展配方与竞品的并行对比基准测试。
  BC-4630.60:
    name: 特种配方配方管理
    description: |
      开展多基地配方生产的主配方编制、版本控制和本地化。
  BC-4630.60.10:
    name: 主配方维护
    description: |
      按照 ISA-88 规范编制和维护主配方。
  BC-4630.60.20:
    name: 配方版本控制
    description: |
      对配方在审批和修订周期中进行版本控制。
  BC-4630.60.30:
    name: 配方本地化
    description: |
      针对场地特定设备对主配方进行本地化。

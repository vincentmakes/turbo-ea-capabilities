locale: zh
source: L1-professional-workforce-resourcing-management.yaml
entries:
  BC-4320:
    name: 专业人力资源配置管理
    description: |
      管理跨接洽组合的计费专业人员的调配、人员利用率、杠杆比率及候补管理。有别于通用人力资本管理，聚焦于作为事务所主要交付资源的计费人员。
  BC-4320.10:
    name: 资源需求预测
    description: |
      依据接洽管道、已承诺接洽及增长假设预测计费资源需求。
  BC-4320.10.10:
    name: 管道驱动的需求预测
    description: |
      从按赢率加权的拓展管道推导资源需求预测。
  BC-4320.10.20:
    name: 已承诺接洽需求规划
    description: |
      基于已接受且范围和时间表已确认的接洽进行资源需求规划。
  BC-4320.10.30:
    name: 技能专项需求汇总
    description: |
      按技能、专项、语言及资质汇总预测需求。
  BC-4320.20:
    name: 接洽人员配置管理
    description: |
      将指定专业人员分配至接洽角色，平衡接洽需求、个人发展及利用率目标。
  BC-4320.20.10:
    name: 接洽资源请求处理
    description: |
      捕获并分类接洽侧资源请求，与可用专业人员进行匹配。
  BC-4320.20.20:
    name: 人员配置决策管理
    description: |
      平衡接洽适配度、发展需求及合伙人偏好做出配置决策。
  BC-4320.20.30:
    name: 人员配置确认与通知
    description: |
      向接洽领导层和被分配专业人员确认并通知人员配置决策。
  BC-4320.30:
    name: 技能与专项匹配
    description: |
      维护专业人员技能档案，将档案与接洽技能需求进行匹配。
  BC-4320.30.10:
    name: 专业人员技能档案维护
    description: |
      捕获并保持每位专业人员的技能、资质、语言及行业经验的时效性。
  BC-4320.30.20:
    name: 接洽技能需求定义
    description: |
      定义每个接洽角色的技能、专项及资质要求。
  BC-4320.30.30:
    name: 基于技能的匹配
    description: |
      依据技能、专项和可用性将专业人员与接洽角色进行匹配。
  BC-4320.40:
    name: 人员利用率管理
    description: |
      追踪并引导计费利用率对照事务所和个人目标达成，包括生产率分析。
  BC-4320.40.10:
    name: 利用率目标设定
    description: |
      按职级、执业部门和专业人员设定计费利用率目标。
  BC-4320.40.20:
    name: 利用率追踪
    description: |
      对计费工时、非计费工时及缺勤进行日常追踪。
  BC-4320.40.30:
    name: 利用率差异处置
    description: |
      识别并处置利用率明显低于或高于目标的专业人员。
  BC-4320.50:
    name: 候补管理
    description: |
      管理未分配的计费产能，包括入职规划、候补时段非计费工作利用及主动重新部署。
  BC-4320.50.10:
    name: 候补可见性管理
    description: |
      按职级、技能和地点对可用产能保持清晰可见。
  BC-4320.50.20:
    name: 候补活动分配
    description: |
      将候补时间分配至发展培训、建议书支持、方法论工作或培训。
  BC-4320.50.30:
    name: 候补缩减行动
    description: |
      在候补超出目标时主动开展重新部署、借调或产能调整。
  BC-4320.60:
    name: 跨办公室与跨境资源配置
    description: |
      协调跨办公室、跨执业部门和跨境资源共享，包括计费专业人员的借调和全球流动。
  BC-4320.60.10:
    name: 跨办公室资源借调
    description: |
      在办公室间临时借调和出借专业人员。
  BC-4320.60.20:
    name: 国际借调管理
    description: |
      管理专业人员在事务所办公室或成员所司法管辖区间的较长期国际借调。
  BC-4320.60.30:
    name: 办公室间分摊与结算
    description: |
      对共享接洽的跨办公室工时和成本分摊进行运营结算。
  BC-4320.70:
    name: 接洽杠杆比率管理
    description: |
      管理接洽中合伙人与工作人员的杠杆比率，平衡经济效益、质量和发展。
  BC-4320.70.10:
    name: 接洽杠杆比率建模
    description: |
      按接洽类型建立合伙人、经理、高级和初级人员的组合模型。
  BC-4320.70.20:
    name: 杠杆比率差异监控
    description: |
      监控实际杠杆比率与目标的差异，并进行差异根因分析。
  BC-4320.70.30:
    name: 人员结构健康分析
    description: |
      分析职级金字塔健康状况、晋升速度及流失率对杠杆比率的影响。

locale: zh
source: L1-utility-regulatory-price-control-management.yaml
entries:
  BC-3920:
    name: 公用事业监管与价格控制管理
    description: |
      与公用事业监管机构开展互动，管理价格控制制度，包括监管机构互动、价格控制申报、费率结构设计、监管报告、服务绩效承诺、监管成本分摊，以及普遍服务和用能负担义务。
  BC-3920.10:
    name: 公用事业监管机构互动
    description: |
      与行业监管机构和消费者保护机构开展日常关系和信息流管理。
  BC-3920.10.10:
    name: 监管机构信函管理
    description: |
      处理与监管机构的往来函件和信息请求。
  BC-3920.10.20:
    name: 监管咨询回复
    description: |
      准备并提交监管咨询回复意见。
  BC-3920.10.30:
    name: 监管听证参与
    description: |
      参与监管听证、技术会议和利益相关方论坛。
  BC-3920.20:
    name: 价格控制申报管理
    description: |
      端到端准备、提交和谈判多年价格控制或费率申请商业计划。
    in_scope:
      - 商业计划汇编（RIIO、PR、费率申请）
      - 成本基准测试和全成本建模
      - 准许收入和输出指标谈判
    out_of_scope:
      - 内部投资规划（BC-3900.40）
      - 批发市场参与（BC-3850）
  BC-3920.20.10:
    name: 商业计划准备
    description: |
      准备价格控制商业计划（RIIO、PR及同等费率申请）。
  BC-3920.20.20:
    name: 成本基准测试与全成本建模
    description: |
      与监管机构和同行数据集对比，进行成本基准测试和全成本建模。
  BC-3920.20.30:
    name: 准许收入谈判
    description: |
      与监管机构谈判准许收入、输出指标和激励参数。
  BC-3920.30:
    name: 费率结构设计
    description: |
      为住宅、商业和工业客户设计受监管费率结构，包括电量费、网络费和基本费。
  BC-3920.30.10:
    name: 管网使用费率设计
    description: |
      设计配电和输电管网使用费率。
  BC-3920.30.20:
    name: 零售费率计划设计
    description: |
      设计零售费率计划，包括分时和季节性结构。
  BC-3920.30.30:
    name: 接入收费方法论
    description: |
      管理接入收费方法论及可竞争与不可竞争边界。
  BC-3920.40:
    name: 监管报告运营
    description: |
      向公用事业监管机构进行定期法定报告，包括年度绩效报告、监管账目和临时申报。
  BC-3920.40.10:
    name: 年度绩效报告
    description: |
      汇编并向监管机构提交年度绩效报告。
  BC-3920.40.20:
    name: 监管账目准备
    description: |
      按监管机构规定的会计准则编制监管账目。
  BC-3920.40.30:
    name: 临时监管申报
    description: |
      向监管机构门户提交临时数据报告和信息请求。
  BC-3920.50:
    name: 服务绩效承诺管理
    description: |
      追踪和管理监管机构规定的绩效激励和服务水平承诺。
  BC-3920.50.10:
    name: 产出交付激励追踪
    description: |
      追踪产出交付激励（ODI）、绩效承诺和激励收益。
  BC-3920.50.20:
    name: 保障性服务标准管理
    description: |
      管理向客户支付的保障性服务水平赔偿。
  BC-3920.50.30:
    name: 绩效违约金计算
    description: |
      计算监管绩效违约金和奖励。
  BC-3920.60:
    name: 监管成本分摊
    description: |
      按成本分摊方法论，将成本在受监管和非受监管业务单元之间，以及各价格控制类别之间进行分摊。
  BC-3920.60.10:
    name: 成本分摊方法论维护
    description: |
      维护监管机构批准的成本分摊方法论。
  BC-3920.60.20:
    name: 受监管与非受监管成本拆分
    description: |
      定期对受监管和非受监管活动之间的成本进行拆分。
  BC-3920.60.30:
    name: 资本支出与运营支出分类
    description: |
      按监管机构定义，对支出进行资本支出和运营支出分类。
  BC-3920.70:
    name: 普遍服务与用能负担管理
    description: |
      落实普遍服务义务及监管机构规定的用能/用水负担和能源/水贫困减缓计划。
  BC-3920.70.10:
    name: 普遍服务义务落实
    description: |
      向零售客户履行普遍服务义务要求。
  BC-3920.70.20:
    name: 能源与水贫困计划运营
    description: |
      运营能源和水贫困缓解计划。
  BC-3920.70.30:
    name: 用能负担计划报告
    description: |
      向监管机构和政府报告用能负担计划落实情况。

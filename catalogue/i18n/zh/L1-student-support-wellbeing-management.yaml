locale: zh
source: L1-student-support-wellbeing-management.yaml
entries:
  BC-4770:
    name: 学生支持与身心健康管理
    description: |
      支持学生成功与身心健康的非教学服务，包括学业辅导、心理咨询、无障碍与特殊教育支持、就业服务及生活辅导。
  BC-4770.10:
    name: 学业辅导
    description: |
      为学生提供课程规划、选课及学业进度辅导，包括对高风险学习者的专项支持。
    in_scope:
      - 课程规划辅导
      - 高风险学生辅导
      - 学业警告支持
    out_of_scope:
      - 职业规划辅导（见就业服务与安置）
      - 心理健康咨询（见咨询与心理健康服务）
  BC-4770.10.10:
    name: 课程规划辅导
    description: |
      就课程项目结构、选课及毕业路径提供辅导建议。
  BC-4770.10.20:
    name: 高风险学生辅导
    description: |
      为被标记为学业高风险的学生提供专项辅导。
  BC-4770.10.30:
    name: 学业警告支持
    description: |
      为处于学业警告状态的学生提供有针对性的支持。
  BC-4770.20:
    name: 咨询与心理健康服务
    description: |
      为学生提供心理健康评估、咨询及危机响应服务。
    in_scope:
      - 心理健康评估与分诊
      - 咨询会谈服务
      - 危机响应协调
    out_of_scope:
      - 咨询范围以外的临床医疗（见医疗机构能力或转介）
  BC-4770.20.10:
    name: 心理健康评估与分诊
    description: |
      对学生心理健康需求进行初步评估和分诊。
  BC-4770.20.20:
    name: 咨询会谈服务
    description: |
      提供个人及团体咨询会谈。
  BC-4770.20.30:
    name: 危机响应协调
    description: |
      协调危机响应与外部转介。
  BC-4770.30:
    name: 残障支持与合理便利
    description: |
      为残障学生确定并提供合理便利措施，以及辅助技术支持。
    in_scope:
      - 残障证明文件审查
      - 合理便利措施提供
      - 辅助技术支持
    out_of_scope:
      - K-12阶段法定特殊教育项目（见特殊教育服务）
      - 公民权利合规报告（见教育合规与监管报告管理）
  BC-4770.30.10:
    name: 残障证明文件审查
    description: |
      审查支持合理便利申请的残障证明文件。
  BC-4770.30.20:
    name: 合理便利措施提供
    description: |
      提供学业及考核方面的合理便利措施。
  BC-4770.30.30:
    name: 辅助技术支持
    description: |
      向学生提供和支持辅助技术工具。
  BC-4770.40:
    name: 特殊教育服务
    description: |
      主要在K-12场景下提供的法定特殊教育服务，包括个别化教育计划及相关服务。
    in_scope:
      - 个别化教育计划（IEP）制定
      - 专项教学实施
      - 相关服务协调（如言语、职业、物理治疗）
    out_of_scope:
      - 高等教育阶段便利措施（见残障支持与合理便利）
  BC-4770.40.10:
    name: 个别化教育计划制定
    description: |
      制定IEP及等效个别化计划。
  BC-4770.40.20:
    name: 专项教学实施
    description: |
      为有特定需求的学生提供专项教学。
  BC-4770.40.30:
    name: 相关服务协调
    description: |
      协调言语、职业及物理治疗等相关服务。
  BC-4770.50:
    name: 就业服务与安置
    description: |
      提供职业辅导、实习和就业安置居间服务及雇主关系管理，支持学生顺利进入职场。
    in_scope:
      - 职业辅导
      - 实习与就业安置居间服务
      - 雇主关系与校园招聘
    out_of_scope:
      - 记入学分的实习督导（见教学与学习运营管理）
  BC-4770.50.10:
    name: 职业辅导
    description: |
      为在校学生和应届毕业生提供职业辅导和规划服务。
  BC-4770.50.20:
    name: 实习与就业安置居间服务
    description: |
      提供实习和工作实践机会的居间对接服务。
  BC-4770.50.30:
    name: 雇主关系与校园招聘
    description: |
      管理雇主关系和校园招聘活动。
  BC-4770.60:
    name: 学生身心健康与生活辅导
    description: |
      提供由机构运营的生活辅导、导师指导、行为支持及身心健康项目。
    in_scope:
      - 生活辅导与导师指导
      - 学生行为与纪律支持
      - 身心健康项目运营
    out_of_scope:
      - 公民权利执法行动（见教育合规与监管报告管理）
  BC-4770.60.10:
    name: 生活辅导与导师指导
    description: |
      由辅导教师和专职工作人员对学生提供生活辅导和指导。
  BC-4770.60.20:
    name: 学生行为与纪律支持
    description: |
      提供学生行为管理和纪律处分流程支持。
  BC-4770.60.30:
    name: 身心健康项目运营
    description: |
      运营机构身心健康项目和专题活动。

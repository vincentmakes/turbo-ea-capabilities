locale: zh
source: L1-chemical-product-stewardship-management.yaml
entries:
  BC-4650:
    name: 化工产品监管管理
    description: |
      在化工产品全生命周期内开展危险分类和标签、安全数据表编制、暴露场景、高关注度物质方案和客户危害信息传达。
  BC-4650.10:
    name: 危险分类与标签
    description: |
      按照 GHS 对物质和混合物进行分类，并设计符合规范的标签。
  BC-4650.10.10:
    name: GHS 分类
    description: |
      按照联合国 GHS 危险分类方案对物质进行分类。
  BC-4650.10.20:
    name: 混合物分类
    description: |
      运用桥接原则和测试数据对混合物进行分类。
  BC-4650.10.30:
    name: 危险象形图与标签设计
    description: |
      设计符合 GHS 规范的象形图、信号词和标签版式。
  BC-4650.10.40:
    name: 多语言标签本地化
    description: |
      为目的地市场翻译和本地化标签内容。
  BC-4650.20:
    name: 安全数据表管理
    description: |
      编制、审查和分发安全数据表（SDS），包括面向下游用户的扩展安全数据表。
  BC-4650.20.10:
    name: SDS 编制
    description: |
      按 16 节格式编制安全数据表（SDS）。
  BC-4650.20.20:
    name: SDS 审查与更新
    description: |
      根据新数据和法规变化审查和更新安全数据表。
  BC-4650.20.30:
    name: SDS 分发管理
    description: |
      向客户和供应链合作伙伴分发安全数据表。
  BC-4650.20.40:
    name: 扩展 SDS 管理
    description: |
      管理包含暴露场景的扩展安全数据表附件。
  BC-4650.30:
    name: 暴露场景管理
    description: |
      为已登记物质开发和维护工人、消费者和环境暴露场景。
  BC-4650.30.10:
    name: 工人暴露场景开发
    description: |
      在典型使用条件下开发工人暴露场景。
  BC-4650.30.20:
    name: 消费者暴露场景开发
    description: |
      为最终产品用途开发消费者暴露场景。
  BC-4650.30.30:
    name: 环境释放场景开发
    description: |
      开发全生命周期内的环境释放场景。
  BC-4650.40:
    name: 高关注度物质管理
    description: |
      识别、替代和追踪产品组合中高度关注物质（SVHC）的限制情况。
  BC-4650.40.10:
    name: SVHC 清单管理
    description: |
      维护组合中 SVHC 存在情况的清单。
  BC-4650.40.20:
    name: 物质替代方案管理
    description: |
      管理更安全物质替代倡议的方案。
  BC-4650.40.30:
    name: 限制物质清单维护
    description: |
      维护内部限制物质清单和客户要求清单。
  BC-4650.50:
    name: 客户危害信息传达
    description: |
      向客户和下游用户传达危害信息。
  BC-4650.50.10:
    name: 客户监管通知
    description: |
      向客户通知与监管相关的变更事项。
  BC-4650.50.20:
    name: 危害培训材料制作
    description: |
      制作涵盖安全操作和使用的培训材料。
  BC-4650.50.30:
    name: 下游用户咨询处理
    description: |
      处理来自下游用户的产品监管咨询。
  BC-4650.60:
    name: 产品全生命周期监管
    description: |
      开展化工产品全生命周期监管，包括生命终止、可回收性和再利用考量。
  BC-4650.60.10:
    name: 产品危险档案维护
    description: |
      按产品维护综合危险档案。
  BC-4650.60.20:
    name: 生命终止监管协调
    description: |
      协调产品回收和生命终止监管安排。
  BC-4650.60.30:
    name: 可回收性与再利用评估
    description: |
      评估化工产品的可回收性和再利用潜力。

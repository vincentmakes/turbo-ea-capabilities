locale: zh
source: L1-hydrocarbon-logistics-management.yaml
entries:
  BC-3100:
    name: 油气物流管理
    description: |
      原油、成品油和LNG的海上货运、码头及散装储存运营，以及权益油提取协调和船用燃料管理。有别于跨行业运输（BC-2400系列），后者涵盖货运网络、船队管理和多式联运。
  BC-3100.10:
    name: 海上货运作业
    description: |
      在石油业务中运营原油油轮、成品油油轮、LNG船及船对船转运。
    in_scope:
      - 油轮和气体运输船运营协调
      - 船对船减载和反向减载
    out_of_scope:
      - 通用船队管理（BC-2430）
      - 班轮货运订舱（BC-2400）
  BC-3100.10.10:
    name: 原油油轮运营
    description: |
      协调航次和期租原油油轮的运营。
  BC-3100.10.20:
    name: 成品油轮运营
    description: |
      协调成品油轮运营，包括拼载货物。
  BC-3100.10.30:
    name: LNG船运营
    description: |
      协调LNG船运营，包括货舱预冷和舱压管理。
  BC-3100.10.40:
    name: 船对船转运协调
    description: |
      协调原油、成品油和LNG的船对船转运（STS）。
  BC-3100.20:
    name: 码头运营
    description: |
      运营石油进出口和中转码头，包括码头泊位、输油臂和储罐收油。
  BC-3100.20.10:
    name: 输油臂与码头泊位运营
    description: |
      运营码头设备和海上输油臂。
  BC-3100.20.20:
    name: 储罐收油作业
    description: |
      接收货物并计量入储罐储存。
  BC-3100.20.30:
    name: 储罐装船作业
    description: |
      从码头储罐向船舶和管道装载油品。
  BC-3100.20.40:
    name: 泊位调度
    description: |
      对到港船舶进行泊位分配和调度。
  BC-3100.30:
    name: 散装储存管理
    description: |
      对原油、成品油和NGL的储罐容量分配、油品移动跟踪和储罐标定进行管理。
  BC-3100.30.10:
    name: 储罐容量分配
    description: |
      将储罐容量分配给各品级、所有者和储存池。
  BC-3100.30.20:
    name: 罐间移动跟踪
    description: |
      跟踪码头内部油品移动和库存头寸。
  BC-3100.30.30:
    name: 储罐检尺与标定
    description: |
      维护储罐检尺表和标定表，以确保计量精度。
  BC-3100.40:
    name: 货运调度与权益油提取协调
    description: |
      管理石油货物的提油提名、船舶量确认和滞期费跟踪。
  BC-3100.40.10:
    name: 提油提名管理
    description: |
      接收和确认客户及权益油提油提名。
  BC-3100.40.20:
    name: 船舶量确认
    description: |
      依据合同义务确认船舶量和分批情况。
  BC-3100.40.30:
    name: 运营滞期费跟踪
    description: |
      跟踪装港和卸港的滞期费事件。
  BC-3100.50:
    name: 船用燃料管理
    description: |
      为自营和租赁船队采购船用燃料并保证其质量。
  BC-3100.50.10:
    name: 船用燃料采购
    description: |
      为船队进行现货和期限船用燃料采购。
  BC-3100.50.20:
    name: 船用燃料质量保证
    description: |
      对供应的船用燃料进行取样、检测和纠纷处理。

locale: zh
source: L1-power-generation-operations-management.yaml
entries:
  BC-3800:
    name: 发电运营管理
    description: |
      涵盖火力、核能、水力、风能、太阳能及储能资产的发电机组运营，包括调度与排程、各技术类型电厂运营、燃料与排放管理，以及机组群绩效管理。
  BC-3800.10:
    name: 发电调度与排程
    description: |
      根据系统运营商指令和市场持仓，对发电机组群进行机组组合、调度指令及短期排程。
  BC-3800.10.10:
    name: 机组组合
    description: |
      对发电机组进行日前和日内开停机决策。
  BC-3800.10.20:
    name: 经济调度
    description: |
      依据负荷对已开机机组进行实时最优化调度。
  BC-3800.10.30:
    name: 停电协调
    description: |
      与系统运营商和市场排程协调计划性及强迫停电。
  BC-3800.20:
    name: 火力发电运营
    description: |
      运营燃煤、燃气及燃油发电站，包括联合循环和热电联产电厂的日常运营。
    in_scope:
      - 锅炉和汽轮机运营
      - 热耗率和效率监测
      - 燃烧控制
    out_of_scope:
      - 核电站运营（BC-3800.40）
      - 可再生能源电厂运营（BC-3800.50）
  BC-3800.20.10:
    name: 锅炉运营
    description: |
      运营蒸汽发生设备并控制燃烧过程。
  BC-3800.20.20:
    name: 汽轮机运营
    description: |
      运营汽轮机及凝结水给水系统。
  BC-3800.20.30:
    name: 燃气轮机运营
    description: |
      运营开式循环和联合循环燃气轮机。
  BC-3800.20.40:
    name: 热电联产运营
    description: |
      运营同时向外供电和供工业或区域热量的热电联产电厂。
  BC-3800.30:
    name: 水力发电运营
    description: |
      运营常规水电站、抽水蓄能电站及径流式水电站，包括大坝和水道管理。
  BC-3800.30.10:
    name: 水力机组运营
    description: |
      对水力发电机组进行开停机、调速和负荷控制。
  BC-3800.30.20:
    name: 水库水位管理
    description: |
      结合电力、防洪和环境约束，对水库水位进行调度管理。
  BC-3800.30.30:
    name: 抽水蓄能循环运营
    description: |
      对抽水蓄能电站进行抽水和发电循环运行。
  BC-3800.30.40:
    name: 大坝安全监测
    description: |
      按安全标准监测大坝结构和渗流状况。
  BC-3800.40:
    name: 核电站运营
    description: |
      在核监管许可条件下运营核电站，包括反应堆控制、换料停堆及放射性安全监测。
  BC-3800.40.10:
    name: 反应堆运营
    description: |
      进行反应堆控制、反应性管理和负荷跟踪运行。
  BC-3800.40.20:
    name: 换料停堆运营
    description: |
      规划和执行换料及主要维修停堆。
  BC-3800.40.30:
    name: 放射性监测
    description: |
      监测放射性释放和工作人员剂量，确保在限值以内。
  BC-3800.40.40:
    name: 乏燃料水池运营
    description: |
      运营和监测乏燃料水池冷却和库存。
  BC-3800.50:
    name: 可再生能源发电运营
    description: |
      运营风能、太阳能光伏及其他可变可再生能源发电资产，包括弃电管理和发电量预测输入。
  BC-3800.50.10:
    name: 风电场运营
    description: |
      运营陆上和海上风电场，管理风机可用性。
  BC-3800.50.20:
    name: 太阳能光伏电站运营
    description: |
      运营大型太阳能光伏电站并进行组串监控。
  BC-3800.50.30:
    name: 可再生能源弃电运营
    description: |
      执行系统运营商对可变可再生能源发出的弃电指令。
  BC-3800.50.40:
    name: 可再生能源发电预测
    description: |
      对风能和太阳能出力进行短期预测，作为调度和交易的输入。
  BC-3800.60:
    name: 储能运营
    description: |
      运营电网级电池及其他储能资产，包括荷电状态管理和根据市场及辅助服务持仓进行充放电循环。
  BC-3800.60.10:
    name: 电池储能运营
    description: |
      运营电网级电池装置并管理荷电状态。
  BC-3800.60.20:
    name: 储能充放电优化
    description: |
      针对电能和辅助服务价值栈优化充放电循环。
  BC-3800.60.30:
    name: 储能衰减追踪
    description: |
      追踪电池资产的往返效率和容量衰减。
  BC-3800.70:
    name: 发电绩效管理
    description: |
      在机组群层面监测跨发电技术的可用性、热耗率、容量系数和强迫停运率。
  BC-3800.70.10:
    name: 可用性与可靠性报告
    description: |
      按GADS标准报告等效可用率和强迫停运统计数据。
  BC-3800.70.20:
    name: 热耗率与效率追踪
    description: |
      追踪热耗率和热效率，对标设计和合同目标。
  BC-3800.70.30:
    name: 容量绩效追踪
    description: |
      追踪容量系数和可信容量额定值。
  BC-3800.80:
    name: 燃料与排放管理
    description: |
      管理发电机组群的燃料供应、库存及燃烧副产品，包括大气排放和CO2监测。
  BC-3800.80.10:
    name: 燃料库存运营
    description: |
      煤炭、燃油和生物质料场运营及库存控制。
  BC-3800.80.20:
    name: 天然气供应申报
    description: |
      为燃气发电进行管道天然气申报和平衡。
  BC-3800.80.30:
    name: 大气排放监测
    description: |
      对NOx、SOx、颗粒物进行连续排放监测并上报。
  BC-3800.80.40:
    name: CO2与配额核对
    description: |
      在总量控制与交易机制下，将CO2排放量与已缴配额核对。
  BC-3800.80.50:
    name: 灰渣与燃烧残余物运营
    description: |
      处理和处置飞灰、底灰及烟气脱硫残余物。

locale: zh
source: L1-insurance-investment-management.yaml
entries:
  BC-2200:
    name: 保险投资管理
    description: |
      保险人作为资产所有者的资产侧管理，涵盖投资政策、资产负债管理、战略和战术资产配置、投资经理监督、投资风险与合规，以及投资报告管理。
  BC-2200.10:
    name: 投资政策与战略管理
    description: |
      投资政策声明、授权定义及 ESG 投资政策整合。
  BC-2200.10.10:
    name: 投资政策声明维护
    description: |
      维护投资政策声明并确保与审慎投资原则保持一致。
  BC-2200.10.20:
    name: 投资授权定义
    description: |
      按投资组合、业务线和风险状况定义投资授权。
  BC-2200.10.30:
    name: ESG 投资政策整合
    description: |
      将 ESG 和尽职管理政策整合到投资授权中。
  BC-2200.20:
    name: 资产负债管理
    description: |
      ALM 建模与现金流匹配、久期和凸性监控及流动性缓冲规模管理。
  BC-2200.20.10:
    name: ALM 建模与现金流匹配
    description: |
      对资产与保险负债进行 ALM 建模和现金流匹配。
  BC-2200.20.20:
    name: 久期与凸性监控
    description: |
      监控资产与负债之间的久期和凸性缺口。
  BC-2200.20.30:
    name: 流动性缓冲规模管理
    description: |
      按预期和压力情景下的理赔流出确定流动性缓冲规模。
  BC-2200.30:
    name: 战略与战术资产配置
    description: |
      战略和战术资产配置决策及再平衡管理。
  BC-2200.30.10:
    name: 战略资产配置设定
    description: |
      跨资产类别设定长期战略资产配置。
  BC-2200.30.20:
    name: 战术资产配置决策
    description: |
      在战略区间内进行战术配置决策。
  BC-2200.30.30:
    name: 配置再平衡
    description: |
      定期和事件驱动的再平衡至目标配置。
  BC-2200.40:
    name: 投资授权与经理监督
    description: |
      外部经理选择、授权合规、绩效审查及经理费用监督。
  BC-2200.40.10:
    name: 外部经理选择
    description: |
      选择和引入外部投资经理。
  BC-2200.40.20:
    name: 授权合规监控
    description: |
      监控授权合规情况和违规处理。
  BC-2200.40.30:
    name: 经理绩效审查
    description: |
      定期审查外部投资经理的绩效。
  BC-2200.40.40:
    name: 经理费用监督
    description: |
      监督经理费用和物有所值评估。
  BC-2200.50:
    name: 投资风险与合规监控
    description: |
      投资限额监控、交易对手和发行人限额，以及 Solvency II 资产资格监控。
  BC-2200.50.10:
    name: 投资限额监控
    description: |
      监控跨资产类别和风险因子的投资限额。
  BC-2200.50.20:
    name: 交易对手与发行人限额监控
    description: |
      监控交易对手和发行人集中度及限额。
  BC-2200.50.30:
    name: Solvency II 资产资格监控
    description: |
      按 Solvency II 及等效规则监控资产资格合规性。
  BC-2200.60:
    name: 投资绩效与报告
    description: |
      绩效计量、归因分析及向董事会和监管机构的投资报告。
  BC-2200.60.10:
    name: 投资组合绩效计量
    description: |
      对比基准和负债计量投资组合绩效。
  BC-2200.60.20:
    name: 归因分析
    description: |
      按配置、选股和货币进行绩效归因分析。
  BC-2200.60.30:
    name: 向董事会和监管机构的投资报告
    description: |
      为董事会、资产负债管理委员会和监管机构编制投资报告。

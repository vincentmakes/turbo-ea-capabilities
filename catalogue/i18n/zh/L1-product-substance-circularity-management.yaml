locale: zh
source: L1-product-substance-circularity-management.yaml
entries:
  BC-1980:
    name: 产品物质成分与循环经济管理
    description: |
      电气产品的限制物质合规、报废回收、维修、翻新、再制造及环境足迹披露管理。
  BC-1980.10:
    name: 限制物质合规管理
    description: |
      遵守 RoHS、REACH SVHC 及加州 65 号提案等限制物质法规。
  BC-1980.10.10:
    name: RoHS 合规验证
    description: |
      验证产品符合 RoHS 物质限值要求。
  BC-1980.10.20:
    name: REACH SVHC 合规
    description: |
      遵守 REACH 高度关注物质相关义务。
  BC-1980.10.30:
    name: 无卤合规
    description: |
      验证无卤产品声明的合规性。
  BC-1980.10.40:
    name: 加州 65 号提案合规
    description: |
      遵守加州 65 号提案警示义务。
  BC-1980.20:
    name: 物质声明数据管理
    description: |
      在物料清单层面收集和管理物质声明数据。
  BC-1980.20.10:
    name: 材料声明收集
    description: |
      从供应商收集完整的材料声明文件。
  BC-1980.20.20:
    name: 物质合规数据库维护
    description: |
      维护物质合规主数据库。
  BC-1980.20.30:
    name: 向客户披露物质信息
    description: |
      向客户和主管机构提供物质信息披露。
  BC-1980.30:
    name: 冲突矿产尽职调查
    description: |
      按 OECD 相关制度对锡、钨、钽和金来源进行尽职调查。
  BC-1980.30.10:
    name: 冶炼厂与精炼商映射
    description: |
      映射供应链中的冶炼厂和精炼商。
  BC-1980.30.20:
    name: 原产地调查
    description: |
      对受管控矿产进行合理的原产地调查。
  BC-1980.30.30:
    name: 冲突矿产报告
    description: |
      向法定机构和客户报告冲突矿产情况。
  BC-1980.40:
    name: 电池与包装合规管理
    description: |
      遵守欧盟电池法规等电池和包装法规要求。
  BC-1980.40.10:
    name: 电池法规合规
    description: |
      遵守欧盟电池法规及等效法规。
  BC-1980.40.20:
    name: 电池护照数据管理
    description: |
      编制和维护电池护照数据。
  BC-1980.40.30:
    name: 包装废物合规
    description: |
      遵守包装和包装废物相关义务。
  BC-1980.50:
    name: 报废回收运营
    description: |
      电气产品的回收、逆向物流及生产者责任延伸报告。
  BC-1980.50.10:
    name: WEEE 回收方案运营
    description: |
      运营 WEEE 生产者合规方案安排。
  BC-1980.50.20:
    name: 生产者责任延伸报告
    description: |
      报告投放市场和回收的重量数据。
  BC-1980.50.30:
    name: 逆向物流运营
    description: |
      报废产品和元器件的逆向物流运营。
  BC-1980.60:
    name: 维修与翻新运营
    description: |
      维修服务网络和维修权文档的运营管理。
  BC-1980.60.10:
    name: 维修服务网络运营
    description: |
      授权维修服务网络的运营管理。
  BC-1980.60.20:
    name: 维修权文档
    description: |
      按维修权法规提供维修文档。
  BC-1980.60.30:
    name: 翻新过程运营
    description: |
      将退回产品翻新至可再销售状态。
  BC-1980.70:
    name: 再制造与再利用运营
    description: |
      核心件和元器件的再制造及在新品中的再利用。
  BC-1980.70.10:
    name: 核心件回收与拆解
    description: |
      退回核心件的回收和拆解。
  BC-1980.70.20:
    name: 再制造过程执行
    description: |
      对回收核心件执行再制造过程。
  BC-1980.70.30:
    name: 再用元器件溯源
    description: |
      再用元器件进入新品生产的溯源管理。
  BC-1980.80:
    name: 产品环境足迹报告
    description: |
      编制和披露产品级环境足迹数据。
  BC-1980.80.10:
    name: 产品碳足迹计算
    description: |
      计算产品级碳足迹。
  BC-1980.80.20:
    name: 环境产品声明
    description: |
      编制环境产品声明（EPD）。
  BC-1980.80.30:
    name: 数字产品护照运营
    description: |
      按新兴法规运营数字产品护照。

locale: zh
source: L1-procurement-management.yaml
entries:
  BC-500:
    name: 采购管理
    description: |
      管理寻源、合同签订、采购及采购到付款运营。
  BC-500.10:
    name: 寻源管理
    description: |
      开展战略寻源、招标及供应商遴选。
  BC-500.10.10:
    name: 寻源策略定义
    description: |
      按品类和市场定义寻源策略。
  BC-500.10.20:
    name: 招标执行
    description: |
      编制、发布并评审信息征询书、报价邀请书及建议征询书。
  BC-500.10.30:
    name: 供应商谈判
    description: |
      与入围供应商开展商务及合同谈判。
  BC-500.10.40:
    name: 供应商遴选与定标
    description: |
      完成最终供应商遴选、定标决策及通知。
  BC-500.10.50:
    name: 反向拍卖运营
    description: |
      为竞争性标的设置、开展并定标电子拍卖。
  BC-500.20:
    name: 采购合同管理
    description: |
      管理采购合同、条款及全生命周期。
  BC-500.20.10:
    name: 合同起草与模板管理
    description: |
      管理采购合同模板、条款及谈判策略手册。
  BC-500.20.20:
    name: 合同审批与签署
    description: |
      管理采购合同的审批流程、签署及执行。
  BC-500.20.30:
    name: 合同合规监控
    description: |
      监控是否按约定供应商及合同价格采购。
  BC-500.20.40:
    name: 合同续签与重新谈判
    description: |
      管理采购合同的续签周期及重新谈判。
  BC-500.30:
    name: 采购订单管理
    description: |
      管理采购订单的创建、审批及执行。
  BC-500.30.10:
    name: 采购订单创建
    description: |
      根据申请、合同或目录生成采购订单。
  BC-500.30.20:
    name: 采购订单审批
    description: |
      按金额门槛执行采购订单审批流程。
  BC-500.30.30:
    name: 采购订单确认与变更
    description: |
      管理供应商确认及变更订单。
  BC-500.30.40:
    name: 采购订单关闭
    description: |
      完成收货、发票匹配并关闭采购订单。
  BC-500.40:
    name: 采购到付款运营管理
    description: |
      管理日常采购到付款运营、申请及收货。
  BC-500.40.10:
    name: 采购申请管理
    description: |
      受理、审批并转化采购申请。
  BC-500.40.20:
    name: 目录与外部购物管理
    description: |
      管理内部目录及供应商外部购物平台以支持自助采购。
  BC-500.40.30:
    name: 收货与服务验收
    description: |
      记录货物收据及服务入库单。
  BC-500.40.40:
    name: 发票匹配与对账
    description: |
      开展发票与采购订单及收货的双向和三向匹配。
  BC-500.40.50:
    name: 采购到付款服务台与采购员支持
    description: |
      为采购员及供应商提供采购到付款交易支持。
  BC-500.50:
    name: 采购品类管理
    description: |
      管理品类策略及各品类支出分析。
  BC-500.50.10:
    name: 品类策略开发
    description: |
      制定多年期品类策略及供应市场评估。
  BC-500.50.20:
    name: 品类绩效管理
    description: |
      按品类跟踪 KPI、节省额及价值交付。
  BC-500.50.30:
    name: 需求整合与标准化
    description: |
      跨业务单元整合需求并标准化规格。
  BC-500.50.40:
    name: 品类创新寻源
    description: |
      通过供应市场识别创新来源。
  BC-500.60:
    name: 采购支出分析管理
    description: |
      提供支出可见性、报告及节省额跟踪。
  BC-500.60.10:
    name: 支出数据聚合与清洗
    description: |
      聚合、清洗并分类企业支出数据。
  BC-500.60.20:
    name: 支出报告与分析
    description: |
      开展支出分析、仪表板展示及可管理支出识别。
  BC-500.60.30:
    name: 节省额跟踪与验证
    description: |
      记录、验证并报告采购节省额。
  BC-500.60.40:
    name: 长尾支出管理
    description: |
      识别并优化长尾支出。

locale: zh
source: L1-terminal-yard-operations-management.yaml
entries:
  BC-2470:
    name: 港口终端与堆场运营管理
    description: |
      运营港口、多式联运、铁路及空运货物终端，包括船舶与飞机装卸、堆场管理、闸口及终端设备运营。
  BC-2470.10:
    name: 船舶与飞机装卸管理
    description: |
      在港口终端对船舶和飞机进行靠泊、机坪操作及货物装卸。
    in_scope:
      - 码头侧及机坪侧货物作业
      - 终端接口层面的积载规划
    out_of_scope:
      - 干线运输中的船上作业（BC-2420.20）
  BC-2470.10.10:
    name: 船舶靠泊与积载
    description: |
      对在港船舶进行靠泊、系缆及积载规划。
  BC-2470.10.20:
    name: 飞机机坪操作
    description: |
      对飞机实施机坪操作及货物装卸。
  BC-2470.10.30:
    name: 货物装卸作业
    description: |
      对集装箱、ULD及杂货进行装卸作业。
  BC-2470.20:
    name: 堆场与堆垛管理
    description: |
      在港口终端堆场和堆区内分配并移动集装箱、拖车及铁路车厢。
  BC-2470.20.10:
    name: 堆场位置分配
    description: |
      为进出港单元分配堆场位置。
  BC-2470.20.20:
    name: 集装箱堆垛规划
    description: |
      优化堆垛规划，减少翻箱并做好装船准备。
  BC-2470.20.30:
    name: 冷藏箱与危险货物堆垛管理
    description: |
      为冷藏箱接电及危险品单元实施专项堆垛管理。
  BC-2470.30:
    name: 闸口运营管理
    description: |
      管理集卡及铁路闸口运营，包括预约闸口、入闸及出闸流程。
  BC-2470.30.10:
    name: 入闸运营
    description: |
      在港口终端闸口接收入场集卡及铁路车厢。
  BC-2470.30.20:
    name: 出闸运营
    description: |
      从港口终端闸口放行出场集卡及铁路车厢。
  BC-2470.30.30:
    name: 预约闸口与预约管理
    description: |
      管理预约闸口身份核验、单证及预约时间窗。
  BC-2470.40:
    name: 终端设备运营管理
    description: |
      运营并维护桥吊、轮胎式龙门吊、正面吊及地面服务设备等终端装卸设备。
  BC-2470.40.10:
    name: 桥吊与RTG运营
    description: |
      运营岸桥、轮胎式龙门吊及龙门吊。
  BC-2470.40.20:
    name: 地面服务设备运营
    description: |
      运营拖车、货车及装载机等地面服务设备（GSE）。
  BC-2470.40.30:
    name: 终端设备维护
    description: |
      对终端装卸设备进行维护与大修。
  BC-2470.50:
    name: 多式联运转运管理
    description: |
      在公铁联运堆场及空运中转站等多式联运节点，完成货物及运输单元的跨方式转运。
  BC-2470.50.10:
    name: 铁路堆场交换
    description: |
      完成铁路运营商之间铁路车厢及多式联运单元的交换。
  BC-2470.50.20:
    name: 公铁转运作业
    description: |
      完成集装箱和拖车在公路与铁路之间的转运。
  BC-2470.50.30:
    name: 空运货物中转
    description: |
      在枢纽机场完成航空承运商之间的货物中转。
  BC-2470.60:
    name: 终端运力与绩效管理
    description: |
      计量并改进港口终端生产率、滞留时间及吞吐量。
  BC-2470.60.10:
    name: 泊位与停机位生产率
    description: |
      计量船舶泊位及飞机停机位的生产率。
  BC-2470.60.20:
    name: 集装箱滞留管理
    description: |
      管理集装箱滞留时间及滞期费风险。
  BC-2470.60.30:
    name: 终端吞吐量报告
    description: |
      按运输方式及单元类型报告终端吞吐量。

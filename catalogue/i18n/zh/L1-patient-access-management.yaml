locale: zh
source: L1-patient-access-management.yaml
entries:
  BC-2800:
    name: 患者就诊准入管理
    description: |
      覆盖住院、门诊、日间诊疗和急诊场景的就诊前接诊、预约、挂号、资格核实、财务咨询、入院管理、转科/转院和出院管理。
  BC-2800.10:
    name: 预约与排程管理
    description: |
      管理医务人员和资源排程、预约登记、候诊管理和主动提醒，以优化产能利用率。
  BC-2800.10.10:
    name: 医务人员排程优化
    description: |
      跨班次模板和叠加配置优化医务人员、诊室和设备的排程。
  BC-2800.10.20:
    name: 预约登记
    description: |
      患者和转诊方通过多渠道发起预约登记。
  BC-2800.10.30:
    name: 候诊管理
    description: |
      维护并优先排序预约和诊疗程序的候诊名单。
  BC-2800.10.40:
    name: 预约提醒与减少爽约
    description: |
      通过多渠道提醒、确认和干预措施减少爽约。
  BC-2800.20:
    name: 患者挂号管理
    description: |
      采集和管理患者就诊所需的人口学、身份和同意数据。
  BC-2800.20.10:
    name: 人口学数据采集
    description: |
      在挂号时采集患者人口学数据。
  BC-2800.20.20:
    name: 患者身份核实
    description: |
      通过证件和生物特征核实患者身份。
  BC-2800.20.30:
    name: 知情同意与授权采集
    description: |
      采集治疗、财务和信息共享方面的同意书和授权书。
  BC-2800.20.40:
    name: 患者标识符管理
    description: |
      发放和维护病历号及企业患者标识符。
  BC-2800.30:
    name: 资格与福利核实
    description: |
      在服务提供前核实保险覆盖、福利和授权要求。
  BC-2800.30.10:
    name: 保险覆盖核实
    description: |
      核实有效保险覆盖和保险计划详情。
  BC-2800.30.20:
    name: 福利确定
    description: |
      确定患者福利、免赔额、自付额和覆盖限额。
  BC-2800.30.30:
    name: 预授权管理
    description: |
      向支付方提交、追踪和跟进预授权申请。
  BC-2800.30.40:
    name: 实时资格查询
    description: |
      对支付方系统进行实时电子资格和福利查询。
  BC-2800.40:
    name: 财务咨询与费用估算
    description: |
      提供面向患者的财务咨询、自付费用估算以及财务援助或自费安排注册。
  BC-2800.40.10:
    name: 患者财务评估
    description: |
      评估患者的财务能力和付款选项。
  BC-2800.40.20:
    name: 费用估算
    description: |
      为计划服务生成自付和总费用估算。
  BC-2800.40.30:
    name: 慈善救助与财务援助
    description: |
      确定慈善救助和财务援助项目资格并完成注册。
  BC-2800.40.40:
    name: 自费安排设置
    description: |
      设置自费安排、预付款和分期付款计划。
  BC-2800.50:
    name: 入院、转科/转院与出院管理
    description: |
      操作管理住院入院、院际转院、床位分配和出院去向采集。
  BC-2800.50.10:
    name: 住院入院
    description: |
      办理计划内和非计划来源的患者住院手续。
  BC-2800.50.20:
    name: 院际转院
    description: |
      协调患者在医疗机构和护理级别之间的转院。
  BC-2800.50.30:
    name: 床位分配
    description: |
      根据病情严重程度、隔离要求和容量进行床位分配和调整。
  BC-2800.50.40:
    name: 出院去向采集
    description: |
      采集出院去向、亚急性安置和转出目的地信息。
  BC-2800.60:
    name: 服务前准备管理
    description: |
      在服务提供前完成术前评估、文件核实和患者准备工作。
  BC-2800.60.10:
    name: 术前评估审核
    description: |
      完成计划手术的临床和麻醉评估审核。
  BC-2800.60.20:
    name: 必要文件核实
    description: |
      核实医嘱、知情同意书和病史体格检查文件是否齐全。
  BC-2800.60.30:
    name: 就诊前患者联络
    description: |
      就诊前联络患者填写表格、采集病史和完成预注册。
  BC-2800.60.40:
    name: 患者准备指引
    description: |
      向患者下发术前和就诊前准备指引。

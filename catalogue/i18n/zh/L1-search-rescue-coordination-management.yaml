locale: zh
source: L1-search-rescue-coordination-management.yaml
entries:
  BC-1260:
    name: 搜索与救援协调管理
    description: |
      负责 SAR 告警、与救援协调中心的协调及应急信标处理，保障对空中遇险事件的快速响应。
  BC-1260.10:
    name: SAR 告警管理
    description: |
      处理不明（INCERFA）、告警（ALERFA）和遇险（DETRESFA）三个告警阶段，确保及时启动 SAR 行动。
  BC-1260.10.10:
    name: 不明阶段处置
    description: |
      探测和处置 INCERFA 不明阶段，对疑似失联飞机进行初步核查。
  BC-1260.10.20:
    name: 告警阶段处置
    description: |
      处置 ALERFA 告警阶段并进行升级处理，开展进一步的搜索行动。
  BC-1260.10.30:
    name: 遇险阶段处置
    description: |
      处置 DETRESFA 遇险阶段并启动 SAR 行动，协调紧急救援资源。
  BC-1260.20:
    name: SAR 协调管理
    description: |
      与救援协调中心（RCC）开展协调，有效整合 SAR 行动资源。
  BC-1260.20.10:
    name: RCC 联络
    description: |
      与国家和区域救援协调中心保持联络，确保信息及时共享。
  BC-1260.20.20:
    name: SAR 任务协调
    description: |
      协调 SAR 任务资源和资产，提高搜救行动的效率和成功率。
  BC-1260.20.30:
    name: 跨境 SAR 协调
    description: |
      协调跨境 SAR 行动，确保在飞行情报区边界附近发生的事件得到有效处置。
  BC-1260.30:
    name: SAR 通信管理
    description: |
      管理 SAR 通信网络和协调频道，保障搜救行动中的可靠通信联络。
  BC-1260.30.10:
    name: SAR 语音通信运营
    description: |
      运营 SAR 语音频道和频率，支持搜救行动的指挥协调。
  BC-1260.30.20:
    name: SAR 数据通信运营
    description: |
      运营 SAR 数据网络和消息系统，实现搜救信息的高效传递。
  BC-1260.40:
    name: 应急定位信标管理
    description: |
      处理 ELT/EPIRB/PLB 激活事件，并与 COSPAS-SARSAT 系统接口，保障定位信标信息的准确获取。
  BC-1260.40.10:
    name: ELT 激活处置
    description: |
      探测和处置 ELT 激活事件，快速定位遇险飞机位置。
  BC-1260.40.20:
    name: COSPAS-SARSAT 接口运营
    description: |
      与 COSPAS-SARSAT 任务控制中心开展接口对接，获取卫星定位的遇险信息。
  BC-1260.40.30:
    name: 信标注册协调
    description: |
      与国家信标注册机构协调，核实信标所有人信息，提高搜救响应速度。

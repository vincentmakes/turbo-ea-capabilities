locale: zh
source: L1-smelting-refining-operations-management.yaml
entries:
  BC-4450:
    name: 冶炼与精炼运营管理
    description: |
      将精矿和中间产品经火法冶金和电化学精炼转化为 LME 可交割或规格金属，包括副产品回收、烟气处理和冶金核算。
  BC-4450.10:
    name: 精矿接收与配料
    description: |
      对进入冶炼厂的精矿开展接收采样、入炉配料和库存管理。
    in_scope:
      - 接收采样和化验
      - 冶炼厂入炉配料
      - 精矿堆场库存
    out_of_scope:
      - 精矿销售结算（BC-4480.40）
  BC-4450.10.10:
    name: 精矿接收采样
    description: |
      对第三方和自有矿山供应的精矿进行采样和化验。
  BC-4450.10.20:
    name: 冶炼厂入炉配料
    description: |
      配混精矿以满足冶炼厂入炉品位和杂质指标。
  BC-4450.10.30:
    name: 精矿库存管理
    description: |
      管理堆场、库房和料仓的精矿库存。
  BC-4450.20:
    name: 火法冶金运营
    description: |
      对硫化物和氧化物精矿开展焙烧、熔炼、吹炼和炉渣处理作业。
  BC-4450.20.10:
    name: 焙烧运营
    description: |
      操作流化床和多膛焙烧炉，进行硫化物氧化焙烧。
  BC-4450.20.20:
    name: 熔炼炉运营
    description: |
      操作闪速炉、电炉和浴熔炉。
  BC-4450.20.30:
    name: 转炉运营
    description: |
      操作 Peirce-Smith 转炉、顶吹旋转转炉和连续转炉。
  BC-4450.20.40:
    name: 炉渣处理
    description: |
      开展炉渣的放渣、水淬、贫化和处置作业。
  BC-4450.30:
    name: 电解精炼运营
    description: |
      开展生产阴极金属的电积和电解精炼槽室运营。
  BC-4450.30.10:
    name: 电积运营
    description: |
      操作电积槽，从浸出液中生产阴极产品。
  BC-4450.30.20:
    name: 电解精炼槽室运营
    description: |
      操作电解精炼槽，从阳极生产高纯度阴极产品。
  BC-4450.30.30:
    name: 阴极剥离与处理
    description: |
      对阴极进行剥离、清洗、称重和捆扎，以备销售或下游铸造。
  BC-4450.40:
    name: 副产品金属回收
    description: |
      从阳极泥、烟尘和副产品流中回收贵金属和伴生金属。
  BC-4450.40.10:
    name: 阳极泥处理
    description: |
      处理电解精炼阳极泥以回收贵金属。
  BC-4450.40.20:
    name: 贵金属精炼
    description: |
      将金、银和铂族金属精炼为金锭或海绵金属。
  BC-4450.40.30:
    name: 副产品流回收
    description: |
      从处理和精炼过程中回收硒、碲、硫酸和其他副产品流。
  BC-4450.50:
    name: 铸造与产品精整
    description: |
      按商业规格对成品金属进行铸造、标记和质量检验。
  BC-4450.50.10:
    name: 铸造运营
    description: |
      将液态金属铸造为棒、锭、坯、板和型材。
  BC-4450.50.20:
    name: 产品标记与商标
    description: |
      对铸造产品进行标记、打印和品牌标注，用于溯源和交易所验收。
  BC-4450.50.30:
    name: 成品金属质量检验
    description: |
      按规格和交易所注册要求对成品金属进行检验和认证。
  BC-4450.60:
    name: 冶炼厂烟气与酸厂运营
    description: |
      开展冶炼厂烟气净化、硫酸厂运营和烟囱排放监测。
  BC-4450.60.10:
    name: 烟气净化
    description: |
      操作冶炼厂烟气的静电除尘器、洗涤器和冷却设备。
  BC-4450.60.20:
    name: 硫酸厂运营
    description: |
      操作利用冶炼厂烟气生产硫酸的双接触双吸收装置。
  BC-4450.60.30:
    name: 烟囱排放监测
    description: |
      对二氧化硫、颗粒物和金属排放进行连续烟囱监测。
  BC-4450.70:
    name: 冶炼厂冶金核算
    description: |
      开展冶炼厂全流程的金属平衡、结算化验和代冶核算。
  BC-4450.70.10:
    name: 金属平衡与结算化验
    description: |
      开展周期性金属平衡对账和发货产品的结算品位化验。
  BC-4450.70.20:
    name: 回收率与损失报告
    description: |
      报告冶炼厂和精炼厂全流程的冶金回收率和流程损失。
  BC-4450.70.30:
    name: 代冶核算
    description: |
      对代冶第三方精矿和客户金属进行核算。

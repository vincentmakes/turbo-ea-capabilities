locale: zh
source: L1-hvac-equipment-engineering-management.yaml
entries:
  BC-2000:
    name: 暖通空调设备工程管理
    description: |
      暖通空调设备的机械、制冷和热流体产品工程，覆盖冷水机组、热泵、空气处理机组、屋顶机组、VRF、风机盘管及末端装置，直至性能验证和 AHRI/Eurovent 定级试验准备。
    in_scope:
      - 制冷循环和热泵循环设计
      - 换热器和盘管工程
      - 空气输送和水系统设备工程
      - 压缩机、驱动器和板载控制工程
      - 声学、振动及设备级性能验证
    out_of_scope:
      - 项目级系统选型和集成（BC-2020）
      - BAS 控制器产品工程（BC-2010）
      - 型式认证申请和标志许可（BC-2030）
      - 运营制冷剂核算（BC-2040）
  BC-2000.10:
    name: 制冷循环工程
    description: |
      暖通空调设备蒸气压缩、吸收式和热泵循环的工程设计。
  BC-2000.10.10:
    name: 蒸气压缩循环设计
    description: |
      冷却和供热设备蒸气压缩制冷循环的设计。
  BC-2000.10.20:
    name: 吸收式循环设计
    description: |
      吸收式冷水机组和热泵的循环设计。
  BC-2000.10.30:
    name: 热泵循环设计
    description: |
      涵盖空气源、水源和地源变体的可逆热泵循环设计。
  BC-2000.10.40:
    name: 制冷剂选型工程
    description: |
      综合热力学、法规、GWP 和可燃性目标进行制冷剂选型。
  BC-2000.10.50:
    name: 循环性能优化
    description: |
      在额定工况和部分负荷工况下优化循环性能。
  BC-2000.20:
    name: 传热与盘管工程
    description: |
      暖通空调设备中蒸发器、冷凝器、热回收轮及钎焊/管壳式换热器的工程设计。
  BC-2000.20.10:
    name: 蒸发器盘管设计
    description: |
      翅片管式和微通道蒸发器盘管的设计。
  BC-2000.20.20:
    name: 冷凝器盘管设计
    description: |
      风冷和水冷冷凝器盘管的设计。
  BC-2000.20.30:
    name: 空气-空气热回收设计
    description: |
      能量回收轮、板式换热器和环路热管的设计。
  BC-2000.20.40:
    name: 钎焊板式与管壳式换热器设计
    description: |
      用于水系统和制冷剂侧的钎焊板式和管壳式换热器设计。
  BC-2000.20.50:
    name: 盘管材料与涂层工程
    description: |
      针对环境耐久性的盘管金属材料和防护涂层选型。
  BC-2000.30:
    name: 空气输送设备工程
    description: |
      风机、鼓风机、空气处理机组、风阀和过滤器组件的工程设计。
  BC-2000.30.10:
    name: 离心风机设计
    description: |
      离心风机的气动和机械设计。
  BC-2000.30.20:
    name: 轴流与插入式风机设计
    description: |
      轴流和插入式风机的气动和机械设计。
  BC-2000.30.30:
    name: 空气处理机组工程
    description: |
      模块化空气处理机组段、机壳和气流工程设计。
  BC-2000.30.40:
    name: 风阀与百叶工程
    description: |
      调节风阀、防火/防烟阀和防雨百叶的工程设计。
  BC-2000.30.50:
    name: 过滤系统工程
    description: |
      颗粒物、气相和 HEPA 过滤段的工程设计。
  BC-2000.40:
    name: 水系统工程
    description: |
      暖通空调设备内水泵、管道、水系统回路及配套附件的工程设计。
  BC-2000.40.10:
    name: 水泵工程
    description: |
      设备橇体中循环泵和端吸泵的选型与集成。
  BC-2000.40.20:
    name: 管道与集管设计
    description: |
      成套设备内部管道、集管和歧管的设计。
  BC-2000.40.30:
    name: 冷冻水与热水回路工程
    description: |
      设备级集成冷冻水和热水回路工程。
  BC-2000.40.40:
    name: 水系统附件工程
    description: |
      膨胀罐、气体分离器和过滤器等成套附件的工程设计。
  BC-2000.50:
    name: 压缩机与驱动工程
    description: |
      压缩机系列及其驱动装置的工程设计。
  BC-2000.50.10:
    name: 涡旋压缩机工程
    description: |
      轻商用设备涡旋压缩机的工程设计。
  BC-2000.50.20:
    name: 螺杆压缩机工程
    description: |
      商业和工业冷水机组螺杆压缩机的工程设计。
  BC-2000.50.30:
    name: 离心压缩机工程
    description: |
      大冷量冷水机组离心压缩机的工程设计。
  BC-2000.50.40:
    name: 活塞压缩机工程
    description: |
      热泵和制冷设备活塞压缩机的工程设计。
  BC-2000.50.50:
    name: 变速驱动集成
    description: |
      暖通空调压缩机和风机变速驱动的集成。
  BC-2000.60:
    name: 暖通空调设备声学与振动工程
    description: |
      设备级的声学、振动和噪声工程设计。
  BC-2000.60.10:
    name: 声功率建模
    description: |
      暖通空调设备的声功率和声压建模。
  BC-2000.60.20:
    name: 隔振设计
    description: |
      压缩机、风机和水泵的隔振设计。
  BC-2000.60.30:
    name: 声学外壳工程
    description: |
      与设备集成的声学外壳和消声器工程设计。
  BC-2000.60.40:
    name: 心理声学性能调校
    description: |
      超越总声功率指标的感知音质调校。
  BC-2000.70:
    name: 设备控制与嵌入式工程
    description: |
      暖通空调设备内板载控制器、固件和连接协议栈的工程设计。
  BC-2000.70.10:
    name: 板载控制器工程
    description: |
      设备内置控制器和单元控制器的工程设计。
  BC-2000.70.20:
    name: 设备固件工程
    description: |
      暖通空调设备固件开发，包括单元控制器和驱动器。
  BC-2000.70.30:
    name: 智能设备通信工程
    description: |
      设备侧 BAS 通信工程设计，包括 BACnet 和 Modbus。
  BC-2000.70.40:
    name: 设备诊断逻辑工程
    description: |
      设备端诊断、报警和故障代码逻辑工程设计。
  BC-2000.80:
    name: 暖通空调设备验证与试验
    description: |
      设备级性能验证、AHRI/Eurovent 定级试验执行及耐久性试验。
  BC-2000.80.10:
    name: 心理湿度计试验室试验
    description: |
      在受控条件下的心理湿度计试验室内对暖通空调设备进行试验。
  BC-2000.80.20:
    name: 性能定级试验执行
    description: |
      执行暖通空调设备标准化性能定级试验。
  BC-2000.80.30:
    name: 热性能验证
    description: |
      验证冷量、COP、IPLV 和其他热性能指标。
  BC-2000.80.40:
    name: 耐久与可靠性试验
    description: |
      暖通空调设备的耐久性、加速寿命及可靠性试验。
  BC-2000.80.50:
    name: 设备试验计划编制
    description: |
      编制设备级验证和鉴定试验计划。

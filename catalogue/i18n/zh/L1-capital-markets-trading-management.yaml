locale: zh
source: L1-capital-markets-trading-management.yaml
entries:
  BC-1370:
    name: 资本市场交易管理
    description: |
      负责前台交易、做市、头寸管理和销售交易，驱动资本市场业务的收入创造和客户服务能力。
  BC-1370.10:
    name: 做市管理
    description: |
      跨资产类别开展做市业务，为客户提供持续的买卖报价和流动性支持。
  BC-1370.10.10:
    name: 报价生成
    description: |
      在各市场生成买入和卖出报价，持续提供双边报价服务。
  BC-1370.10.20:
    name: 做市库存管理
    description: |
      管理做市商的库存和风险头寸，控制头寸敞口在允许范围内。
  BC-1370.10.30:
    name: 做市定价引擎
    description: |
      运营定价引擎并管理定价参数，提供准确的市场报价。
  BC-1370.20:
    name: 交易头寸管理
    description: |
      管理交易头寸和损益归因，实现交易账户的实时风险可见性。
  BC-1370.20.10:
    name: 实时头寸维护
    description: |
      实时跟踪交易账户头寸，确保头寸信息的准确性和及时性。
  BC-1370.20.20:
    name: 交易损益计算
    description: |
      计算各交易台的交易损益，为绩效评估提供数据支撑。
  BC-1370.20.30:
    name: 损益归因分析
    description: |
      按风险因子、时间维度和交易员维度进行损益归因分析，揭示盈亏来源。
  BC-1370.30:
    name: 交易订单管理
    description: |
      管理订单采集、执行、智能路由和最佳执行，保障客户订单得到最优处理。
  BC-1370.30.10:
    name: 交易订单采集
    description: |
      采集和验证客户和自营订单，确保订单信息的准确完整。
  BC-1370.30.20:
    name: 智能订单路由
    description: |
      跨交易场所智能路由订单以实现最佳执行，降低客户交易成本。
  BC-1370.30.30:
    name: 执行质量监控
    description: |
      监控执行质量和最佳执行分析，持续评估执行效果。
  BC-1370.30.40:
    name: 订单全生命周期管理
    description: |
      管理订单全生命周期，包括修改和撤销，确保订单状态的准确跟踪。
  BC-1370.40:
    name: 算法交易管理
    description: |
      管理算法交易策略、回测和合规控制，确保算法交易的安全合规运行。
  BC-1370.40.10:
    name: 算法策略开发
    description: |
      开发和认证算法交易策略，确保策略逻辑的稳健性和合规性。
  BC-1370.40.20:
    name: 算法回测
    description: |
      对交易算法进行回测和仿真，验证策略的历史绩效。
  BC-1370.40.30:
    name: 算法交易控制
    description: |
      对算法交易实施交易前和运行时控制，防范算法失控风险。
  BC-1370.50:
    name: 销售与交易管理
    description: |
      管理客户销售台、语音和电子交易，为机构客户提供全面的交易服务。
  BC-1370.50.10:
    name: 客户销售台运营
    description: |
      运营机构客户语音销售台，提供个性化的产品推荐和交易执行服务。
  BC-1370.50.20:
    name: 电子交易运营
    description: |
      运营电子交易平台和连接接口，提供高效的电子化交易通道。
  BC-1370.50.30:
    name: 交易前研究与定价
    description: |
      提供交易前研究、参考定价和产品设计支持，助力客户作出明智的投资决策。
  BC-1370.60:
    name: 交易合规与监控管理
    description: |
      开展交易监控、市场滥用探测和 MiFID II 合规管理，防范交易不当行为。
  BC-1370.60.10:
    name: 交易监控
    description: |
      对交易活动进行监控，探测异常模式和可疑交易行为。
  BC-1370.60.20:
    name: 市场滥用探测
    description: |
      探测包括内幕交易和市场操纵在内的市场滥用行为，维护市场公平秩序。
  BC-1370.60.30:
    name: 通信监控
    description: |
      监控交易员通信和语音记录，识别违规行为和合规风险。
  BC-1370.60.40:
    name: 监管交易报告
    description: |
      依据 MiFIR、EMIR、SFTR 等监管要求提交交易和事务报告。

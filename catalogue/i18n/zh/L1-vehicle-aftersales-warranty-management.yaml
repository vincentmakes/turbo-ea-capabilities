locale: zh
source: L1-vehicle-aftersales-warranty-management.yaml
entries:
  BC-3450:
    name: 整车售后服务与质保管理
    description: |
      OEM侧售后服务——质保运营与裁定、召回与服务活动管理、技术服务信息、客户援助及工程反馈闭环，依据Magnuson-Moss法、EU消费者销售规则及NHTSA/EU召回体系开展。
  BC-3450.10:
    name: 质保政策与索赔管理
    description: |
      制定质保政策，裁定经销商质保索赔，包括供应商追偿。
  BC-3450.10.10:
    name: 质保政策定义
    description: |
      跨市场和产品线定义质保条款、期限、覆盖范围及排除条款。
  BC-3450.10.20:
    name: 质保索赔裁定
    description: |
      裁定经销商质保索赔，包括工时标准和零件验证。
  BC-3450.10.30:
    name: 善意维修与优惠管理
    description: |
      管理善意维修、优惠及客户忠诚质保延伸。
  BC-3450.10.40:
    name: 供应商追偿管理
    description: |
      依据质保费用分摊协议向责任供应商追偿质保成本。
  BC-3450.20:
    name: 服务活动与召回管理
    description: |
      端到端管理安全召回和非安全服务活动，包括通知和完成率跟踪。
  BC-3450.20.10:
    name: 召回决策与通知
    description: |
      决策并依法向主管部门和车主通知安全召回。
  BC-3450.20.20:
    name: 服务活动规划
    description: |
      规划服务活动，包括修复方案定义、零件备货及经销商指引。
  BC-3450.20.30:
    name: 车主通知管理
    description: |
      通过邮件、电子邮件及车载渠道识别并通知受影响车主。
  BC-3450.20.40:
    name: 活动完成率跟踪
    description: |
      跟踪召回和服务活动完成率及法规报告义务。
  BC-3450.30:
    name: 技术服务信息管理
    description: |
      为经销商服务网络编写并分发维修程序、技术通报及诊断信息。
  BC-3450.30.10:
    name: 维修程序编写
    description: |
      编写整车维修程序、爆炸视图及扭矩/夹紧数据。
  BC-3450.30.20:
    name: 技术服务通报管理
    description: |
      编写、发布并生命周期管理技术服务通报。
  BC-3450.30.30:
    name: 故障码库管理
    description: |
      维护DTC库、诊断树及相关引导式诊断内容。
  BC-3450.30.40:
    name: 服务工装规格
    description: |
      规范整车服务运营所需的专用工具和经销商服务设备。
  BC-3450.40:
    name: 整车诊断与车联网服务运营
    description: |
      OEM运营支持联网诊断、远程诊断数据及经销商诊断工具生态系统。
  BC-3450.40.10:
    name: 远程整车诊断运营
    description: |
      运营支持经销商服务的远程车辆健康和诊断服务。
  BC-3450.40.20:
    name: 诊断工具更新管理
    description: |
      管理经销商诊断工具软件、标定数据及安全访问。
  BC-3450.40.30:
    name: 服务数据汇聚
    description: |
      汇聚并分析来自经销商和联网车辆的服务事件数据。
  BC-3450.50:
    name: 客户援助与道路救援运营
    description: |
      OEM品牌客户援助服务，包括道路救援、代步替代方案及车辆转运。
  BC-3450.50.10:
    name: 道路救援运营
    description: |
      运营OEM品牌道路救援，提供故障与事故响应。
  BC-3450.50.20:
    name: 代步协调
    description: |
      在维修或故障期间为客户协调替代交通工具。
  BC-3450.50.30:
    name: 车辆转运协调
    description: |
      协调境外或长途故障后的车辆转运。
  BC-3450.60:
    name: 售后零件物流协调
    description: |
      协调售后零件供应链，支持经销商服务需求和召回修复零件供应。
    in_scope:
      - 与经销商的零件供需协调
      - 趴窝事件紧急零件加急
      - 跨经销商网络的召回零件分配
    out_of_scope:
      - 备件目录与定价（BC-1060 备件与售后市场管理）
      - 零件仓储与实物配送运营（BC-1060）
  BC-3450.60.10:
    name: 与经销商的零件需求协调
    description: |
      向零件供应链协调经销商零件需求可视化及补货信号。
  BC-3450.60.20:
    name: 紧急零件加急管理
    description: |
      为趴窝及高严重性客户案例加急提供关键零件。
  BC-3450.60.30:
    name: 召回零件分配
    description: |
      依据受影响人群优先级向经销商和市场分配紧缺召回零件。
  BC-3450.70:
    name: 售后绩效与质量反馈
    description: |
      分析现场故障趋势和客户反馈，并将问题反馈至工程和生产。
  BC-3450.70.10:
    name: 现场故障趋势分析
    description: |
      分析质保和服务事件数据，识别现场故障趋势和新兴问题。
  BC-3450.70.20:
    name: 售后客户声音管理
    description: |
      收集并分析售后客户声音，包括调查和经销商记录的反馈。
  BC-3450.70.30:
    name: 工程反馈闭环管理
    description: |
      将现场质量问题反馈至工程端，开展遏制、修复及经验总结。

locale: zh
source: L1-time-and-engagement-billing-management.yaml
entries:
  BC-4330:
    name: 工时与接洽计费管理
    description: |
      管理计费接洽的工时捕获、在制品管理、费用安排、开票、实现率及核销管控，以及法律执业特有的客户信托资金和保留金管理。
  BC-4330.10:
    name: 工时管理
    description: |
      在接洽和任务层面捕获、核验并提交含说明的专业人员工时记录。
  BC-4330.10.10:
    name: 工时录入
    description: |
      按接洽、任务和活动粒度进行计费和非计费工时的日常录入。
  BC-4330.10.20:
    name: 工时叙述质量管理
    description: |
      对工时叙述进行质量管控，满足客户计费指引和电子账单要求。
  BC-4330.10.30:
    name: 工时提交与审批
    description: |
      完成工时记录的提交、主管审批及锁定。
  BC-4330.20:
    name: 接洽垫付款管理
    description: |
      捕获和分摊接洽相关垫付款，如法院申请费、专家费、差旅费及印刷费，以便向客户转收。
  BC-4330.20.10:
    name: 垫付款捕获
    description: |
      将垫付款捕获至接洽档案，以便后续追收。
  BC-4330.20.20:
    name: 垫付款可收回性审查
    description: |
      依据接洽委托书和客户计费指引审查垫付款可收回性。
  BC-4330.20.30:
    name: 垫付款分摊至接洽
    description: |
      将已批准垫付款分摊至接洽在制品，以便后续开票。
  BC-4330.30:
    name: 在制品管理
    description: |
      追踪未开票在制品（WIP）余额、账龄及开票前的增收或减收决策。
  BC-4330.30.10:
    name: 在制品追踪
    description: |
      按接洽、合伙人和执业部门实时追踪未开票在制品（WIP）。
  BC-4330.30.20:
    name: 在制品账龄分析
    description: |
      对未开票在制品进行账龄分析，并对陈旧余额进行上报。
  BC-4330.30.30:
    name: 在制品增收与减收决策
    description: |
      由合伙人就开票前的在制品增收、减收及延期进行决策。
  BC-4330.40:
    name: 费用安排管理
    description: |
      维护接洽级费用结构，包括小时费率表、替代费用安排、固定费用、成功费及保留金。
  BC-4330.40.10:
    name: 费率表维护
    description: |
      维护标准、客户专属和接洽专属的小时费率表。
  BC-4330.40.20:
    name: 替代费用安排设置
    description: |
      按接洽设置固定费用、封顶费用、成功费、风险代理及保留金费用安排。
  BC-4330.40.30:
    name: 费用折扣与批量定价管理
    description: |
      跨客户接洽组合应用商定的费用折扣和批量定价。
  BC-4330.50:
    name: 发票生成管理
    description: |
      生成接洽发票，对叙述进行格式化，并满足客户电子账单格式要求。
  BC-4330.50.10:
    name: 预开票准备
    description: |
      在最终签发前准备预开票并由合伙人审查。
  BC-4330.50.20:
    name: 最终发票签发
    description: |
      签发包含叙述、垫付款及税款的最终接洽发票。
  BC-4330.50.30:
    name: 客户电子账单格式合规
    description: |
      遵守客户电子账单要求，包括LEDES、UTBMS任务代码及客户门户提交。
  BC-4330.50.40:
    name: 客户计费指引遵守
    description: |
      在工时、费率和垫付款方面遵守客户外部顾问计费指引。
  BC-4330.60:
    name: 接洽实现率管理
    description: |
      追踪开票到回款和标准到开票的实现率、核销及接洽盈利能力。
  BC-4330.60.10:
    name: 标准到开票实现率追踪
    description: |
      追踪标准费率在制品与开票金额的对比，以发现收入漏损。
  BC-4330.60.20:
    name: 开票到回款实现率追踪
    description: |
      追踪开票金额与回款现金的对比，包括坏账拨备。
  BC-4330.60.30:
    name: 接洽盈利能力报告
    description: |
      按接洽、合伙人和执业部门使用已实现收入和直接成本报告盈利能力。
  BC-4330.60.40:
    name: 核销审批与分析
    description: |
      对在制品和应收账款核销进行审批工作流和根因分析。
  BC-4330.70:
    name: 客户信托资金与保留金管理
    description: |
      管理代客持有的信托资金、IOLTA类账户及保留金余额，满足法律执业特有的隔离和对账要求。
    in_scope:
      - 客户信托账户运营
      - 保留金余额追踪
      - 信托账户对账与报告
    out_of_scope:
      - 事务所一般财务（BC-180）
  BC-4330.70.10:
    name: 客户信托账户运营
    description: |
      代表客户运营隔离信托账户，处理收款和支出。
  BC-4330.70.20:
    name: 保留金余额管理
    description: |
      追踪客户保留金余额和补充触发条件。
  BC-4330.70.30:
    name: 信托对账与报告
    description: |
      进行信托账本三方对账，并向监管机构或执业监管机构报告信托余额。

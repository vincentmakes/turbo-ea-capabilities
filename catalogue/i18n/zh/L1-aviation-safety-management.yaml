locale: zh
source: L1-aviation-safety-management.yaml
entries:
  BC-1280:
    name: 航空安全管理
    description: |
      建立和运行安全管理体系（SMS），开展风险评估、推进公正文化建设，并对安全事件实施调查，持续提升航空安全水平。
  BC-1280.10:
    name: 安全管理体系管理
    description: |
      建立和维护 SMS 框架、安全政策、安全目标和安全治理架构，确保安全管理体系的有效运行。
  BC-1280.10.10:
    name: 安全政策与目标
    description: |
      制定安全政策和安全目标，明确组织安全管理的方向和承诺。
  BC-1280.10.20:
    name: SMS 框架管理
    description: |
      依据 ICAO 附件 19 维护 SMS 框架，确保安全管理体系的规范性和完整性。
  BC-1280.10.30:
    name: 安全治理与问责
    description: |
      建立安全审查委员会和责任经理制度，落实各级安全管理责任。
  BC-1280.10.40:
    name: 安全资源管理
    description: |
      为安全职能分配必要资源，保障安全管理工作的有效实施。
  BC-1280.20:
    name: 安全风险评估管理
    description: |
      开展危险源识别、风险评估和风险缓解，系统管理运营中的安全风险。
  BC-1280.20.10:
    name: 危险源识别
    description: |
      主动和被动地识别运营中的危险源，为风险评估提供输入。
  BC-1280.20.20:
    name: 安全风险评估
    description: |
      评估安全风险的发生可能性和严重程度，确定风险优先级。
  BC-1280.20.30:
    name: 安全风险缓解
    description: |
      制定并跟踪安全风险缓解措施，将风险降低至可接受水平。
  BC-1280.20.40:
    name: 变更安全评估
    description: |
      对运营和技术变更开展安全评估，确保变更不会引入不可接受的新风险。
  BC-1280.30:
    name: 公正文化与报告管理
    description: |
      推行保密报告机制和公正文化，促进自愿安全事件报告，构建积极的安全文化氛围。
  BC-1280.30.10:
    name: 公正文化计划
    description: |
      实施公正文化计划并为报告人提供保护，鼓励员工如实报告安全事件。
  BC-1280.30.20:
    name: 自愿事件报告
    description: |
      建立自愿性和保密性事件报告渠道，扩大安全信息来源。
  BC-1280.30.30:
    name: 强制事件报告
    description: |
      向监管机构履行强制事件报告义务，满足法规合规要求。
  BC-1280.40:
    name: 事件调查管理
    description: |
      开展内部调查、根本原因分析和经验教训提炼，将事件转化为安全改进机会。
  BC-1280.40.10:
    name: 内部事件调查
    description: |
      对安全事件开展内部调查，查明事件经过和原因。
  BC-1280.40.20:
    name: 根本原因分析
    description: |
      分析事件根本原因及促成因素，提出针对性纠正措施。
  BC-1280.40.30:
    name: 调查经验教训
    description: |
      收集和传播安全经验教训，防止类似事件再次发生。
  BC-1280.50:
    name: 安全绩效监控管理
    description: |
      管理安全绩效指标（SPIs）、安全绩效目标（SPTs）和安全绩效仪表板，并向监管机构报告安全绩效。
  BC-1280.50.10:
    name: 安全绩效指标管理
    description: |
      定义和跟踪安全绩效指标（SPIs）及安全绩效目标（SPTs），量化评估安全绩效。
  BC-1280.50.20:
    name: 安全趋势分析
    description: |
      对事件发生情况和 SPI 绩效进行趋势分析，识别安全状况的变化规律。
  BC-1280.50.30:
    name: 向监管机构的安全报告
    description: |
      定期向民航主管部门提交安全绩效报告，满足监管报告要求。
  BC-1280.60:
    name: 安全促进管理
    description: |
      推行安全文化计划、安全培训和安全宣传，营造全员重视安全的组织氛围。
  BC-1280.60.10:
    name: 安全文化计划
    description: |
      开展安全文化调查和改进计划，持续提升组织安全文化水平。
  BC-1280.60.20:
    name: 安全培训实施
    description: |
      实施安全培训和 SMS 复训，增强员工的安全意识和能力。
  BC-1280.60.30:
    name: 安全沟通
    description: |
      开展安全沟通、发布安全简报和宣传活动，强化全员安全文化认同。

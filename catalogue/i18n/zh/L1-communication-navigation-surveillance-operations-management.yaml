locale: zh
source: L1-communication-navigation-surveillance-operations-management.yaml
entries:
  BC-1240:
    name: 通信、导航与监视运营管理
    description: |
      负责 CNS 基础设施的运营与维护，涵盖语音和数据通信、导航设施及雷达/ADS-B/多点定位系统，保障空中交通管制的技术支撑。
  BC-1240.10:
    name: 语音通信系统管理
    description: |
      管理空地语音、管制员与飞行员语音系统及地地语音通信，确保管制员与飞机的可靠通信。
  BC-1240.10.10:
    name: 空地语音运营
    description: |
      运营空地无线电语音通信系统，保障管制员与飞行员之间的清晰通话。
  BC-1240.10.20:
    name: 地地语音运营
    description: |
      运营中心间和扇区间地地语音线路，支持管制协调和移交工作。
  BC-1240.10.30:
    name: 语音录音与回放
    description: |
      对运营语音进行录音和回放，支持安全调查和运营审计需求。
  BC-1240.20:
    name: 数据链通信管理
    description: |
      管理 CPDLC、ADS-C、FANS 及 ATN 数据链的运营，提升管制通信效率和精确性。
  BC-1240.20.10:
    name: CPDLC 运营
    description: |
      运营管制员与飞行员数据链通信（CPDLC），提供高效可靠的数字化管制通信。
  BC-1240.20.20:
    name: ADS-C 运营
    description: |
      运营自动相关监视合同（ADS-C）系统，获取飞机位置和状态报告。
  BC-1240.20.30:
    name: ATN 与 FANS 网络运营
    description: |
      运营 ATN 和 FANS 数据链网络，支持航路和洋区管制通信。
  BC-1240.30:
    name: 导航设施管理
    description: |
      管理 VOR、DME、ILS 及 GNSS 导航服务，保障飞机精确导航能力。
  BC-1240.30.10:
    name: VOR 与 DME 运营
    description: |
      运营和维护 VOR 和 DME 导航信标，提供可靠的地基导航信号。
  BC-1240.30.20:
    name: ILS 运营
    description: |
      运营和维护 ILS 进近系统，支持精密进近着陆运营。
  BC-1240.30.30:
    name: GNSS 导航服务
    description: |
      提供 GNSS、SBAS 及 GBAS 导航服务，支持基于卫星的精密导航运营。
  BC-1240.30.40:
    name: 飞行校验
    description: |
      对导航设施进行定期飞行校验，确保设备参数符合规定的运行标准。
  BC-1240.40:
    name: 监视系统管理
    description: |
      管理一次雷达、二次雷达、ADS-B 及多点定位系统，为管制员提供准确的交通态势感知。
  BC-1240.40.10:
    name: 一次监视雷达运营
    description: |
      运营一次监视雷达系统，提供对所有飞行目标的被动探测能力。
  BC-1240.40.20:
    name: 二次监视雷达运营
    description: |
      运营 SSR Mode S 及传统 Mode A/C 系统，提供飞机识别和高度信息。
  BC-1240.40.30:
    name: ADS-B 监视运营
    description: |
      运营 ADS-B 地面站和信号处理系统，扩展监视覆盖范围。
  BC-1240.40.40:
    name: 多点定位运营
    description: |
      运营广域多点定位（WAM/MLAT）监视系统，提供补充监视能力。
  BC-1240.40.50:
    name: 监视数据融合
    description: |
      融合多源监视数据用于 ATC 显示，提供更完整准确的交通态势图。
  BC-1240.50:
    name: CNS 基础设施维护管理
    description: |
      对 CNS 设备开展现场维护和校准，以及飞行检验，确保设备持续处于适用状态。
  BC-1240.50.10:
    name: CNS 预防性维护
    description: |
      按计划对 CNS 设备实施预防性维护，降低设备故障率和不可用时间。
  BC-1240.50.20:
    name: CNS 纠正性维护
    description: |
      对 CNS 设备故障进行快速纠正维护，恢复设备正常运行状态。
  BC-1240.50.30:
    name: CNS 设备校准
    description: |
      对 CNS 设备进行校准和对准，确保技术参数满足运行要求。
  BC-1240.50.40:
    name: CNS 备件管理
    description: |
      管理 CNS 备件和消耗品的库存与供应，保障维护工作的及时开展。
  BC-1240.60:
    name: 频谱与频率管理
    description: |
      负责航空频率分配、协调及干扰处理，保障航空无线电通信的有序使用。
  BC-1240.60.10:
    name: 频率分配
    description: |
      向各航空服务分配航空频率，确保频谱资源的有效利用。
  BC-1240.60.20:
    name: 频率协调
    description: |
      开展跨境和跨服务频率协调，避免频率冲突和相互干扰。
  BC-1240.60.30:
    name: 干扰探测与处置
    description: |
      探测和处置频率干扰事件，保障航空通信的可靠运行。

locale: zh
source: L1-hydrocarbon-trading-marketing-management.yaml
entries:
  BC-3090:
    name: 油气贸易与销售管理
    description: |
      开展原油、成品油、天然气和LNG的实物及纸面交易；商品风险管理；交易结算与合规；期限合同营销；以及贸易运费租船业务。
  BC-3090.10:
    name: 实物交易运营
    description: |
      开展原油、成品油、天然气和LNG的实物交易业务。
  BC-3090.10.10:
    name: 原油交易
    description: |
      在区域市场对各类原油品级开展实物交易。
  BC-3090.10.20:
    name: 成品油交易
    description: |
      开展汽油、馏分油、航煤、燃料油及NGL的实物交易。
  BC-3090.10.30:
    name: 天然气交易
    description: |
      在各枢纽开展管道天然气实物交易。
  BC-3090.10.40:
    name: LNG交易
    description: |
      开展LNG货物实物交易，包括转向和再装船交易。
  BC-3090.20:
    name: 衍生品与纸面交易
    description: |
      开展场内和场外衍生品交易，用于套期保值和自营持仓。
  BC-3090.20.10:
    name: 期货与期权交易
    description: |
      对能源商品交易所挂牌期货和期权进行交易。
  BC-3090.20.20:
    name: 互换与套保交易
    description: |
      开展场外互换交易，用于价格和基差套期保值。
  BC-3090.20.30:
    name: 商品指数敞口管理
    description: |
      管理商品指数工具的敞口。
  BC-3090.30:
    name: 交易风险管理
    description: |
      对交易活动开展持仓风险管理、交易对手信用风险管理和商品VaR计算。
  BC-3090.30.10:
    name: 持仓风险管理
    description: |
      依据批准的交易授权和限额对持仓进行监控。
  BC-3090.30.20:
    name: 按市值计价估值
    description: |
      对交易持仓和价格曲线进行每日按市值计价估值。
  BC-3090.30.30:
    name: 交易对手信用风险管理
    description: |
      针对交易业务设定交易对手信用限额并跟踪敞口。
  BC-3090.30.40:
    name: 商品VaR计算
    description: |
      计算商品组合的风险价值和压力测试场景。
  BC-3090.40:
    name: 交易确认与结算
    description: |
      开展交易录入、确认及交易后结算和核对。
  BC-3090.40.10:
    name: 交易录入
    description: |
      将前台已执行的交易录入交易系统。
  BC-3090.40.20:
    name: 交易确认
    description: |
      与交易对手签发和核对交易确认书。
  BC-3090.40.30:
    name: 交易结算
    description: |
      对交易开展到期的现金和实物结算。
  BC-3090.40.40:
    name: 交易核对
    description: |
      与经纪商、交易所和交易对手记录核对交易。
  BC-3090.50:
    name: 交易合规管理
    description: |
      对能源交易活动开展制裁筛查、市场行为监控和监管报告。
  BC-3090.50.10:
    name: 制裁筛查
    description: |
      对交易对手和货物开展交易前和交易后制裁筛查。
  BC-3090.50.20:
    name: 市场行为监控
    description: |
      依据市场滥用标准（REMIT、多德-弗兰克法案）监控交易行为。
  BC-3090.50.30:
    name: 监管交易报告
    description: |
      依据REMIT、EMIR和多德-弗兰克法案向监管机构报告交易。
  BC-3090.60:
    name: 销售与期限合同管理
    description: |
      管理与客户的期限销售合同和提油计划。
  BC-3090.60.10:
    name: 期限合同谈判
    description: |
      与炼厂和公用事业企业谈判期限销售合同。
  BC-3090.60.20:
    name: 提油计划管理
    description: |
      管理按期限合同制定的月度和季度提油计划。
  BC-3090.60.30:
    name: 客户分配管理
    description: |
      在期限客户和现货客户之间分配受限供应量。
  BC-3090.70:
    name: 贸易运费租船
    description: |
      开展航次和期租租船及滞期费管理，以支持交易持仓。
  BC-3090.70.10:
    name: 航次租船
    description: |
      为交易货物进行油轮和气体运输船航次租船。
  BC-3090.70.20:
    name: 期租
    description: |
      开展期租租船和船位优化。
  BC-3090.70.30:
    name: 滞期费与停泊时间管理
    description: |
      计算和结算滞期费及停泊时间索赔。

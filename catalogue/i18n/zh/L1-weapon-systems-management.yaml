entries:
  BC-1710:
    name: 武器系统管理
    description: |
      覆盖武器系统与作战平台的全生命周期管理，确保系统性能满足作战需求。
  BC-1710.10:
    name: 武器系统工程管理
    description: |
      统筹武器系统工程、需求分析与体系架构设计，奠定系统开发的技术基础。
  BC-1710.10.10:
    name: 武器系统需求工程
    description: |
      开展武器系统需求工程，明确系统能力要求。
  BC-1710.10.20:
    name: 武器系统架构设计
    description: |
      开展系统架构设计与权衡分析，确定最优技术方案。
  BC-1710.10.30:
    name: 武器系统建模与仿真
    description: |
      对武器系统性能开展建模与仿真分析。
  BC-1710.20:
    name: 武器系统构型管理
    description: |
      统筹构型基线建立与构型变更控制，保障系统构型的完整性与一致性。
  BC-1710.20.10:
    name: 构型基线管理
    description: |
      定义并维护系统构型基线。
  BC-1710.20.20:
    name: 构型变更控制
    description: |
      通过构型控制委员会（CCB）管控构型变更。
  BC-1710.20.30:
    name: 构型状态核查
    description: |
      开展构型状态核查与审计。
  BC-1710.30:
    name: 武器系统集成管理
    description: |
      统筹子系统集成与综合系统开发，确保系统整体性能达标。
  BC-1710.30.10:
    name: 子系统集成
    description: |
      将各子系统集成到武器平台。
  BC-1710.30.20:
    name: 任务系统集成
    description: |
      完成任务系统与传感器的集成。
  BC-1710.30.30:
    name: 体系集成
    description: |
      与更广泛的体系架构及C5ISR系统开展集成。
  BC-1710.40:
    name: 武器系统测试与鉴定管理
    description: |
      统筹测试项目、鉴定认证，确保系统满足规范要求并具备作战能力。
  BC-1710.40.10:
    name: 测试方案规划
    description: |
      制定测试与评估方案规划。
  BC-1710.40.20:
    name: 研制试验执行
    description: |
      对样机开展研制试验。
  BC-1710.40.30:
    name: 作战试验执行
    description: |
      开展作战试验与评估。
  BC-1710.40.40:
    name: 型号合格认证
    description: |
      完成军用适航性与型号合格认证。
  BC-1710.50:
    name: 武器系统维持保障管理
    description: |
      统筹在役维持保障、大修与器材老化管理，维持系统持续作战能力。
  BC-1710.50.10:
    name: 在役工程支持
    description: |
      为部署中的系统提供在役工程支持。
  BC-1710.50.20:
    name: 基地级维修
    description: |
      开展基地级维修、翻修与复原。
  BC-1710.50.30:
    name: 器材老化与DMSMS管理
    description: |
      对在役系统开展DMSMS与器材老化管理。
  BC-1710.50.40:
    name: 基于绩效的后勤运营
    description: |
      运营基于绩效的后勤（PBL）保障安排。
  BC-1710.60:
    name: 武器系统改进与升级管理
    description: |
      统筹能力升级、中期改进与改装工作，持续提升系统作战效能。
  BC-1710.60.10:
    name: 能力升级规划
    description: |
      规划能力升级与能力注入方案。
  BC-1710.60.20:
    name: 中期改进项目管理
    description: |
      管理中期改进项目群。
  BC-1710.60.30:
    name: 改装与改型实施
    description: |
      执行现场改装与技术状态更改。

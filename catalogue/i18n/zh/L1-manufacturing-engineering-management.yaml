locale: zh
source: L1-manufacturing-engineering-management.yaml
entries:
  BC-1020:
    name: 制造工程管理
    description: |
      负责工艺工程、工装、设备设计与工业化，支撑产品高效量产。
  BC-1020.10:
    name: 生产工艺工程管理
    description: |
      设计生产工艺、工艺路线与作业指导书，确保制造过程规范受控。
  BC-1020.10.10:
    name: 工艺设计与路线
    description: |
      定义制造工艺路线与工序步骤。
  BC-1020.10.20:
    name: 作业指导书编写
    description: |
      编写标准作业与可视化作业指导书。
  BC-1020.10.30:
    name: 工艺确认
    description: |
      验证生产工艺并开展过程能力研究。
  BC-1020.10.40:
    name: 工艺变更控制
    description: |
      对制造工艺与工艺路线实施变更控制。
  BC-1020.20:
    name: 工装与夹具管理
    description: |
      管理工具、夹具与辅具的全生命周期。
  BC-1020.20.10:
    name: 工装设计
    description: |
      为生产设计工具、夹具与辅具。
  BC-1020.20.20:
    name: 工装采购与制造
    description: |
      采购、制造并验证工装。
  BC-1020.20.30:
    name: 工具维护与检验
    description: |
      对生产工具进行维护、检验与修复。
  BC-1020.20.40:
    name: 工具库存管理
    description: |
      管理工具库房及工具可追溯性。
  BC-1020.30:
    name: 设备工程管理
    description: |
      负责设备规格制定、鉴定与改造。
  BC-1020.30.10:
    name: 设备规格制定
    description: |
      编制生产设备的用户需求规格书与功能规格书。
  BC-1020.30.20:
    name: 设备鉴定
    description: |
      开展生产设备的IQ、OQ、PQ鉴定。
  BC-1020.30.30:
    name: 设备改造管理
    description: |
      管理在用设备的工程变更与升级。
  BC-1020.40:
    name: 工业化管理
    description: |
      管理从研发到生产的转移及产量爬坡。
  BC-1020.40.10:
    name: 生产转移管理
    description: |
      将产品从研发或中试转移至量产。
  BC-1020.40.20:
    name: 预产与试制生产
    description: |
      开展预产与试制批次生产及工艺学习。
  BC-1020.40.30:
    name: 生产爬坡管理
    description: |
      将产量与良率爬坡至正常水平。
  BC-1020.50:
    name: 制造方法管理
    description: |
      管理制造方法、时间研究与人机工效。
  BC-1020.50.10:
    name: 时间与动作研究
    description: |
      开展时间研究、MTM分析并设定标准工时。
  BC-1020.50.20:
    name: 工作场所人机工效
    description: |
      对工位与操作任务进行人机工效设计。
  BC-1020.50.30:
    name: 标准作业定义
    description: |
      定义标准作业与最优操作顺序。
  BC-1020.60:
    name: 制造持续改进管理
    description: |
      在生产工艺上开展改善活动，推动精益转型。
  BC-1020.60.10:
    name: 改善活动交付
    description: |
      针对生产工艺开展改善（Kaizen）活动。
  BC-1020.60.20:
    name: 精益转型管理
    description: |
      在工厂推进端到端精益转型项目群。
  BC-1020.60.30:
    name: 价值流图析
    description: |
      绘制当前状态与未来状态价值流图。
  BC-1020.60.40:
    name: 持续改进能力建设
    description: |
      开展持续改进方法能力建设与辅导。

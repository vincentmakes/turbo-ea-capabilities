locale: zh
source: L1-building-systems-commissioning-management.yaml
entries:
  BC-2050:
    name: 楼宇系统调试管理
    description: |
      暖通空调和 BAS 系统的调试服务交付，涵盖初始调试、逆向调试、再调试和基于监测的调试，以 ASHRAE Guideline 0/1.1 全楼调试流程为基础。
    in_scope:
      - 业主项目要求和设计基础审查
      - 预功能安装验证和启动检查
      - 暖通空调和 BAS 系统功能性能测试
      - 操作序列验证和集成系统测试
      - 逆向调试、再调试和基于监测的调试
      - 调试文件、系统手册和业主培训交付
    out_of_scope:
      - 项目级集成工程设计（BC-2020）
      - 移交后的持续服务运营（BC-2060）
      - 资本设备通用工程项目调试（BC-1160）
  BC-2050.10:
    name: 调试规划与范围定义
    description: |
      为项目建立调试方案、范围和验收基础。
  BC-2050.10.10:
    name: 业主项目要求审查
    description: |
      审查业主项目要求作为调试基准线。
  BC-2050.10.20:
    name: 设计基础审查
    description: |
      对照业主项目要求审查设计基础文件。
  BC-2050.10.30:
    name: 调试计划编制
    description: |
      编制调试计划，定义范围、职责和验收标准。
  BC-2050.10.40:
    name: 调试风险登记册
    description: |
      在交付过程中维护调试风险登记册。
  BC-2050.20:
    name: 预功能检查管理
    description: |
      在功能测试前验证安装完整性和启动准备就绪状态。
  BC-2050.20.10:
    name: 安装验证检查表
    description: |
      执行安装验证检查表。
  BC-2050.20.20:
    name: 启动检查
    description: |
      按制造商要求检查设备启动情况。
  BC-2050.20.30:
    name: 预功能问题记录
    description: |
      将预功能问题记入调试问题日志。
  BC-2050.20.40:
    name: 预功能签字确认
    description: |
      确认已达到预功能准备就绪状态的签字确认。
  BC-2050.30:
    name: 功能性能测试
    description: |
      按文件化标准对暖通空调和 BAS 子系统进行功能性能测试。
  BC-2050.30.10:
    name: 测试脚本编制
    description: |
      按设计意图编制功能测试脚本。
  BC-2050.30.20:
    name: 测试执行与见证
    description: |
      执行和见证暖通空调和 BAS 系统功能测试。
  BC-2050.30.30:
    name: 测试问题解决
    description: |
      解决功能测试中发现的问题。
  BC-2050.30.40:
    name: 测试结果审批
    description: |
      审批测试结果并关闭测试用例。
  BC-2050.40:
    name: 操作序列验证
    description: |
      验证已编程控制序列与设计操作序列的一致性。
  BC-2050.40.10:
    name: 控制逻辑演练
    description: |
      对照已编制的序列演练控制逻辑。
  BC-2050.40.20:
    name: 设定点与模式验证
    description: |
      验证跨运行计划的设定点和运行模式。
  BC-2050.40.30:
    name: 旁路与失效模式测试
    description: |
      测试旁路路径和失效模式行为。
  BC-2050.40.40:
    name: 基于趋势数据的验证
    description: |
      利用趋势数据验证时间维度上的序列性能。
  BC-2050.50:
    name: 集成系统测试
    description: |
      涉及暖通空调、消防生命安全和电气系统的跨系统集成行为测试。
  BC-2050.50.10:
    name: 火灾与生命安全集成测试
    description: |
      暖通空调与火灾和生命安全系统交互的集成测试。
  BC-2050.50.20:
    name: 烟控与加压测试
    description: |
      烟控和加压序列测试。
  BC-2050.50.30:
    name: 停电与减载测试
    description: |
      暖通空调在停电和减载事件中行为的测试。
  BC-2050.50.40:
    name: 楼宇网络集成测试
    description: |
      BAS 与相邻楼宇 IT 网络的集成测试。
  BC-2050.60:
    name: 逆向调试与再调试
    description: |
      应用于既有建筑的调试服务和定期再调试周期。
  BC-2050.60.10:
    name: 既有建筑调研
    description: |
      调研既有建筑与当前目标的性能差距。
  BC-2050.60.20:
    name: 性能差距分析
    description: |
      分析既有建筑的性能差距和根本原因。
  BC-2050.60.30:
    name: 逆向调试措施实施
    description: |
      在既有系统上实施逆向调试措施。
  BC-2050.60.40:
    name: 再调试周期执行
    description: |
      执行定期再调试周期以维持持续性能。
  BC-2050.70:
    name: 基于监测的调试
    description: |
      利用仪表和遥测数据进行持续数据驱动的调试。
  BC-2050.70.10:
    name: 监测计划与仪表配置
    description: |
      编制监测计划并选择配套仪表。
  BC-2050.70.20:
    name: 持续性能趋势分析
    description: |
      持续跟踪楼宇性能趋势以获取调试洞察。
  BC-2050.70.30:
    name: 异常调查
    description: |
      调查持续趋势中检测到的异常情况。
  BC-2050.70.40:
    name: 持续性验证
    description: |
      验证已调试性能随时间的持续性。
  BC-2050.80:
    name: 调试文件与收尾
    description: |
      调试交付成果的编制和调试范围的正式收尾。
  BC-2050.80.10:
    name: 调试报告编制
    description: |
      编制最终调试报告。
  BC-2050.80.20:
    name: 系统手册汇编
    description: |
      汇编供业主运营的系统手册。
  BC-2050.80.30:
    name: 业主培训交付
    description: |
      对已调试系统进行业主培训交付。
  BC-2050.80.40:
    name: 最终移交签字确认
    description: |
      最终调试签字确认并移交运营方。

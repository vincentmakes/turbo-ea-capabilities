locale: zh
source: L1-diagnostic-services-management.yaml
entries:
  BC-2860:
    name: 诊断服务管理
    description: |
      管理实验室、解剖病理学、诊断影像、心肺诊断、床旁检测以及端到端诊断结果管理。
  BC-2860.10:
    name: 实验室服务管理
    description: |
      管理标本采集、临床化学、血液学、微生物学、分子检测及实验室信息系统运营。
  BC-2860.10.10:
    name: 标本采集与转运
    description: |
      开展静脉采血、标本采集和转运物流。
  BC-2860.10.20:
    name: 临床化学与血液学
    description: |
      开展临床化学、血液学和凝血检测运营。
  BC-2860.10.30:
    name: 微生物学与分子检测
    description: |
      开展微生物学、病毒学和分子诊断检测。
  BC-2860.10.40:
    name: 实验室信息系统运营
    description: |
      运营实验室信息系统及仪器接口。
  BC-2860.20:
    name: 解剖病理学服务
    description: |
      开展组织学、细胞学、外科病理学和数字病理学运营。
  BC-2860.20.10:
    name: 组织学处理
    description: |
      开展组织学的组织处理、包埋、切片和染色。
  BC-2860.20.20:
    name: 细胞学服务
    description: |
      开展细胞学标本制备、筛查和报告。
  BC-2860.20.30:
    name: 外科病理报告
    description: |
      病理医生对外科病理病例进行解读和报告。
  BC-2860.20.40:
    name: 数字病理学运营
    description: |
      开展全玻片扫描采集、存储和数字病理工作流。
  BC-2860.30:
    name: 诊断影像服务
    description: |
      管理诊断影像的采集、阅片、存档和辐射剂量管理。
  BC-2860.30.10:
    name: 影像采集
    description: |
      采集包括放射、CT、MRI、超声和核医学的影像检查。
  BC-2860.30.20:
    name: 影像阅片与报告
    description: |
      放射科医生对影像检查进行阅片和结构化报告。
  BC-2860.30.30:
    name: 图像存档运营
    description: |
      运营影像存档和院际图像交换。
  BC-2860.30.40:
    name: 辐射剂量管理
    description: |
      开展辐射剂量追踪、优化和患者剂量报告。
  BC-2860.40:
    name: 心脏病学与心肺诊断
    description: |
      提供心电图、超声心动图、心导管检查和肺功能检测服务。
  BC-2860.40.10:
    name: 心电图与遥测监护
    description: |
      开展心电图采集、遥测监护和心律失常解读。
  BC-2860.40.20:
    name: 超声心动图
    description: |
      提供经胸、经食道和负荷超声心动图服务。
  BC-2860.40.30:
    name: 心导管检查
    description: |
      提供诊断性心导管检查和电生理检查服务。
  BC-2860.40.40:
    name: 肺功能检测
    description: |
      开展肺量计、肺容量、弥散功能和运动肺功能检测。
  BC-2860.50:
    name: 床旁检测
    description: |
      治理、质量控制、操作人员能力认证及全院床旁检测设备的结果整合。
  BC-2860.50.10:
    name: 床旁检测设备管理
    description: |
      管理床旁检测设备的库存和生命周期。
  BC-2860.50.20:
    name: 床旁检测质量控制
    description: |
      对床旁检测设备开展质量控制和能力验证。
  BC-2860.50.30:
    name: 操作人员能力管理
    description: |
      对床旁检测操作人员开展资质认证和能力评估。
  BC-2860.50.40:
    name: 床旁检测结果整合
    description: |
      将床旁检测结果整合至实验室记录和病历。
  BC-2860.60:
    name: 诊断结果管理
    description: |
      对跨检测模态的诊断结果进行验证、分发和反射规则管理。
  BC-2860.60.10:
    name: 结果验证
    description: |
      对诊断结果进行技术和临床验证。
  BC-2860.60.20:
    name: 危急值通报
    description: |
      在规定时限内向开单医务人员通报危急值。
  BC-2860.60.30:
    name: 结果分发
    description: |
      向开单医务人员、患者和外部系统分发结果。
  BC-2860.60.40:
    name: 反射检测规则
    description: |
      编写和运营反射检测规则和附加检测逻辑。

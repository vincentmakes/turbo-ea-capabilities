source: L1-refining-operations-management.yaml
entries:
  BC-3080:
    name: 炼油运营管理
    description: |
      运营原油炼厂，涵盖蒸馏、转化、精制、调和、炼厂经济学、催化剂管理及大检修协调。
  BC-3080.10:
    name: 原油蒸馏运营
    description: |
      运营常压和减压原油蒸馏装置，以及原油配方切换。
  BC-3080.10.10:
    name: 常压蒸馏运营
    description: |
      运营原油常压蒸馏塔和预闪蒸设施。
  BC-3080.10.20:
    name: 减压蒸馏运营
    description: |
      运营减压蒸馏塔和塔顶系统。
  BC-3080.10.30:
    name: 原油配方切换
    description: |
      对原油种类变更和配方切换进行运营管理。
  BC-3080.20:
    name: 转化装置运营
    description: |
      运营催化裂化、加氢裂化、焦化和重整等转化装置。
  BC-3080.20.10:
    name: 流化催化裂化运营
    description: |
      运营流化催化裂化装置和再生器。
  BC-3080.20.20:
    name: 加氢裂化运营
    description: |
      运营单段和两段加氢裂化装置。
  BC-3080.20.30:
    name: 焦化运营
    description: |
      运营延迟焦化、流化焦化和灵活焦化装置。
  BC-3080.20.40:
    name: 重整运营
    description: |
      运营催化重整装置，生产高辛烷值汽油和芳烃。
  BC-3080.30:
    name: 精制与加氢处理运营
    description: |
      运营加氢处理、硫磺回收和产品脱硫装置。
  BC-3080.30.10:
    name: 加氢处理运营
    description: |
      运营石脑油、馏分油和蜡油加氢处理装置。
  BC-3080.30.20:
    name: 硫磺回收与尾气处理运营
    description: |
      运营硫磺回收装置和尾气处理设施。
  BC-3080.30.30:
    name: 产品脱硫运营
    description: |
      运营碱洗和吸附剂产品脱硫装置。
  BC-3080.40:
    name: 产品调和运营
    description: |
      对成品油进行在线和罐式调和，以达到规格要求。
  BC-3080.40.10:
    name: 汽油调和
    description: |
      对多组分汽油进行调和，满足牌号规格。
  BC-3080.40.20:
    name: 馏分油调和
    description: |
      对柴油和煤油进行调和，包括生物燃料掺混。
  BC-3080.40.30:
    name: 船用燃料调和
    description: |
      依据ISO 8217规格进行船用燃料油调和。
  BC-3080.40.40:
    name: 规格合规调和
    description: |
      开展实时规格优化并签发质量证书。
  BC-3080.50:
    name: 炼厂规划与经济学
    description: |
      基于线性规划模型开展原油优选、效益优化和炼厂产率报告。
  BC-3080.50.10:
    name: 线性规划建模
    description: |
      维护和运行炼厂线性规划模型，用于计划编制和经济评价。
  BC-3080.50.20:
    name: 原油优选经济学
    description: |
      对候选原油采购和配方方案进行经济评价。
  BC-3080.50.30:
    name: 效益优化
    description: |
      开展短期运营效益优化和计划调整。
  BC-3080.50.40:
    name: 炼厂产率报告
    description: |
      报告实际产率对比计划和标杆的情况。
  BC-3080.60:
    name: 催化剂与炼厂化学品管理
    description: |
      对工艺催化剂和炼厂化学品库存进行全生命周期管理。
  BC-3080.60.10:
    name: 催化剂全生命周期管理
    description: |
      开展催化剂装填计划、在役监测和更换管理。
  BC-3080.60.20:
    name: 催化剂再生协调
    description: |
      协调就地和外送催化剂再生作业。
  BC-3080.60.30:
    name: 炼厂化学品库存管理
    description: |
      对工艺化学品进行库存和消耗管理。
  BC-3080.70:
    name: 大检修与重大维护协调
    description: |
      协调炼厂大检修的范围、进度和执行。
  BC-3080.70.10:
    name: 大检修范围管理
    description: |
      明确和冻结大检修范围，包括挑战审核流程。
  BC-3080.70.20:
    name: 大检修进度管理
    description: |
      编制大检修详细进度计划并开展进度控制。
  BC-3080.70.30:
    name: 停工与开工协调
    description: |
      对装置停工、清洗净化和顺序开工进行协调。

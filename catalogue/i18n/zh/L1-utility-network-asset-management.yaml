locale: zh
source: L1-utility-network-asset-management.yaml
entries:
  BC-3900:
    name: 公用事业管网资产管理
    description: |
      对电力、燃气、供水和废水等长期公用事业管网基础设施进行全生命周期管理，涵盖资产台账完整性、状态与健康状况监测、风险与关键性评分、监管资产基数感知的投资规划、更新改造计划、绩效报告，以及地理信息系统网络记录。
  BC-3900.10:
    name: 资产台账管理
    description: |
      维护公用事业资产台账，作为网络资产及其层级关系的唯一真实来源。
  BC-3900.10.10:
    name: 资产主数据管理
    description: |
      管护资产主数据属性和分类。
  BC-3900.10.20:
    name: 资产层级维护
    description: |
      维护网络资产的功能性和物理性资产层级。
  BC-3900.10.30:
    name: 资产台账核对
    description: |
      对资产台账、GIS和运营系统进行核对。
  BC-3900.20:
    name: 资产状态与健康监测
    description: |
      通过巡检、测试和在线监测获取资产状态数据，为资产健康评分和优先级排列提供依据。
  BC-3900.20.10:
    name: 巡检计划运营
    description: |
      对主要设备和网络资产执行周期性巡检计划。
  BC-3900.20.20:
    name: 在线状态监测
    description: |
      对变压器、电缆和旋转设备进行在线状态监测。
  BC-3900.20.30:
    name: 资产健康评分
    description: |
      依据巡检、测试和运营数据计算资产健康指数。
  BC-3900.30:
    name: 资产风险与关键性评估
    description: |
      结合可能性、后果和关键性进行量化资产风险评估，为干预措施排列优先级。
  BC-3900.30.10:
    name: 资产关键性评分
    description: |
      对公用事业资产进行网络和社会影响关键性评分。
  BC-3900.30.20:
    name: 故障可能性建模
    description: |
      进行统计和基于状态的故障可能性建模。
  BC-3900.30.30:
    name: 货币化风险计算
    description: |
      按监管成本效益分析框架进行货币化风险计算。
  BC-3900.40:
    name: 资产投资规划
    description: |
      跨网络类别，结合监管价格控制周期，制定受监管和非受监管项目的长期投资规划。
    in_scope:
      - 多年资本支出和全成本计划编制
      - 网络干预措施成本效益评估
      - 投资组合优先级排列
    out_of_scope:
      - 跨行业项目组合治理（BC-900）
      - 费率侧收入规划（BC-3920.30）
  BC-3900.40.10:
    name: 资本投资规划
    description: |
      按资产类别制定多年网络资本计划。
  BC-3900.40.20:
    name: 成本效益评估
    description: |
      按监管测试规则对投资选项进行成本效益评估。
  BC-3900.40.30:
    name: 投资组合优先级排列
    description: |
      在资本和资源约束下进行跨类别组合优先级排列。
  BC-3900.50:
    name: 资产更新与替换规划
    description: |
      为网络资产的更新、替换及寿命终止退役制定计划。
  BC-3900.50.10:
    name: 寿命终止预测
    description: |
      按资产类别和批次预测资产寿命终止情况。
  BC-3900.50.20:
    name: 更新计划设计
    description: |
      按资产类别和地区设计多年更新计划。
  BC-3900.50.30:
    name: 管网退役规划
    description: |
      规划退役、废弃和复原工作。
  BC-3900.60:
    name: 资产绩效报告
    description: |
      按监管和内部绩效承诺报告资产绩效和全成本支出情况。
  BC-3900.60.10:
    name: 管网绩效KPI报告
    description: |
      报告SAIDI、SAIFI、漏损及同等管网KPI。
  BC-3900.60.20:
    name: 全成本绩效报告
    description: |
      在价格控制制度下报告全成本支出与准许额度的对比情况。
  BC-3900.60.30:
    name: 资产故障趋势分析
    description: |
      分析资产故障趋势和干预措施有效性。
  BC-3900.70:
    name: GIS与管网记录管理
    description: |
      管理网络资产的地理空间记录——线路、管道、排水管及接入点——并与运营系统集成。
  BC-3900.70.10:
    name: GIS管网记录维护
    description: |
      维护管网连通性和资产位置的GIS记录。
  BC-3900.70.20:
    name: 竣工记录采集
    description: |
      将建设和更新项目的竣工变更采集到GIS中。
  BC-3900.70.30:
    name: 地下资产查询运营
    description: |
      向第三方施工方提供地下公用设施记录查询服务。

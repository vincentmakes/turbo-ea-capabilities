locale: zh
source: L1-defense-capture-bid-management.yaml
entries:
  BC-1750:
    name: 国防项目竞标管理
    description: |
      覆盖国防合同的竞标管理、客户情报与投标/建议书开发，提升竞标成功率。
  BC-1750.10:
    name: 竞标管理
    description: |
      统筹RFP发布前的竞标活动、客户塑造与制胜策略制定。
  BC-1750.10.10:
    name: 商机识别
    description: |
      识别国防商机与潜在竞标项目。
  BC-1750.10.20:
    name: 客户塑造活动
    description: |
      在RFP发布前开展客户塑造与需求影响工作。
  BC-1750.10.30:
    name: 制胜策略制定
    description: |
      制定制胜策略、主题与竞争差异化要素。
  BC-1750.10.40:
    name: 黑帽评审与竞争分析
    description: |
      开展黑帽评审与竞争态势分析。
  BC-1750.20:
    name: 国防客户情报管理
    description: |
      统筹客户关系维护与需求/预算情报收集，深化客户理解。
  BC-1750.20.10:
    name: 客户关系图谱
    description: |
      绘制客户组织架构与关键利益相关者图谱。
  BC-1750.20.20:
    name: 预算与采办情报
    description: |
      收集预算、采办周期与优先级情报信息。
  BC-1750.20.30:
    name: 需求情报采集
    description: |
      采集客户新兴需求情报。
  BC-1750.30:
    name: 国防投标管理
    description: |
      统筹投/不投标决策、投标治理与投标资源配置。
  BC-1750.30.10:
    name: 投/不投标决策
    description: |
      开展投/不投标决策治理与审批。
  BC-1750.30.20:
    name: 投标资源配置与经费
    description: |
      分配投标资源与建议书经费。
  BC-1750.30.30:
    name: 投标风险管理
    description: |
      识别并管理投标阶段风险。
  BC-1750.40:
    name: 国防建议书管理
    description: |
      统筹建议书撰写、颜色评审与建议书制作，确保高质量按时提交。
  BC-1750.40.10:
    name: 建议书撰写
    description: |
      撰写国防建议书各卷内容。
  BC-1750.40.20:
    name: 颜色评审执行
    description: |
      执行粉色、红色、金色颜色评审与最终建议书评审。
  BC-1750.40.30:
    name: 建议书制作与提交
    description: |
      按时制作并提交建议书。
  BC-1750.40.40:
    name: 建议书合规核查
    description: |
      核查建议书对RFP要求与L/M指示的合规性。
  BC-1750.50:
    name: 组队与分包策略管理
    description: |
      统筹组队协议与投标阶段分包商遴选，构建最优竞标联合体。
  BC-1750.50.10:
    name: 组队策略定义
    description: |
      为投标定义组队及主/分包策略。
  BC-1750.50.20:
    name: 组队协议谈判
    description: |
      谈判并签署组队协议与保密协议（NDA）。
  BC-1750.50.30:
    name: 投标阶段分包商遴选
    description: |
      为投标遴选分包商与小企业合作伙伴。

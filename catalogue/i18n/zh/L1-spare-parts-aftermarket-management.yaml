  BC-1060.50:
    name: 维修与大修管理
    description: |
      管理维修、换件与翻新业务。
  BC-1060.50.10:
    name: 维修工厂运营
    description: |
      运营集中维修工厂。
  BC-1060.50.20:
    name: 换件池管理
    description: |
      管理换件与循环件库存池。
  BC-1060.50.30:
    name: 翻新运营
    description: |
      对退回零件开展翻新、大修与重新认证。
  BC-1060.60:
    name: 质保管理
    description: |

  BC-1060:
    name: 备件与售后市场管理
    description: |
      管理备件供应、售后销售与已安装设备的售后服务，实现售后市场价值最大化。
  BC-1060.10:
    name: 备件目录管理
    description: |
      维护备件目录、零件识别与替代关系。
  BC-1060.10.10:
    name: 备件识别
    description: |
      开展零件识别，包括图解零件目录管理。
  BC-1060.10.20:
    name: 零件替代管理
    description: |
      管理零件替代与等效关系。
  BC-1060.10.30:
    name: 目录发布
    description: |
      发布并分发备件目录。
  BC-1060.20:

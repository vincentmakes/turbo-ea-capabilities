  BC-1060.60.20:
    name: 质保索赔处理
    description: |
      受理并裁定客户质保索赔。
  BC-1060.60.30:
    name: 向供应商追偿质保费用
    description: |
      向供应商追偿质保相关费用。
  BC-1060.60.40:
    name: 质保准备金管理
    description: |
      估算质保准备金并进行会计核算。
  BC-1060.70:

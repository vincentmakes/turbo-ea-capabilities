locale: zh
source: L1-intellectual-property-management.yaml
entries:
  BC-840:
    name: 知识产权管理
    description: |
      管理专利、商标、著作权、商业秘密及许可，保护并实现知识产权价值。
  BC-840.10:
    name: 专利组合管理
    description: |
      制定专利战略，推进申请、维护与组合评审，构建竞争壁垒。
  BC-840.10.10:
    name: 发明披露管理
    description: |
      采集、评估并决策发明披露事项。
  BC-840.10.20:
    name: 专利申请与审查
    description: |
      起草、提交专利申请并跟进审查程序。
  BC-840.10.30:
    name: 专利维护
    description: |
      按期缴纳年费并维护已授权专利。
  BC-840.10.40:
    name: 专利组合评审
    description: |
      定期评审并优化专利组合结构。
  BC-840.20:
    name: 商标管理
    description: |
      负责商标注册、监控与维权，保护品牌资产。
  BC-840.20.10:
    name: 商标查询与注册
    description: |
      开展商标可用性查询并提交商标注册申请。
  BC-840.20.20:
    name: 商标监控与预警
    description: |
      监控冲突性商标申请与侵权使用行为。
  BC-840.20.30:
    name: 商标续期管理
    description: |
      按期续期并维护商标注册。
  BC-840.30:
    name: 著作权与商业秘密管理
    description: |
      保护受著作权保护的资产、商业秘密及保密信息。
  BC-840.30.10:
    name: 著作权资产登记
    description: |
      识别并登记受著作权保护的资产。
  BC-840.30.20:
    name: 商业秘密识别与保护
    description: |
      识别商业秘密并建立有效保护措施。
  BC-840.30.30:
    name: 保密协议管理
    description: |
      管理保密协议（NDA）、保密合同及访问控制。
  BC-840.40:
    name: 知识产权许可管理
    description: |
      管理知识产权的引入许可、对外许可与特许权使用费。
  BC-840.40.10:
    name: 引入许可谈判
    description: |
      谈判并签署入境知识产权许可协议。
  BC-840.40.20:
    name: 对外许可与商业化
    description: |
      开展知识产权对外许可与专利商业化。
  BC-840.40.30:
    name: 特许权使用费管理
    description: |
      计算、收取并支付知识产权特许权使用费。
  BC-840.40.40:
    name: 交叉许可与专利池
    description: |
      管理交叉许可安排与专利池参与事项。
  BC-840.50:
    name: 知识产权防御与维权
    description: |
      监控侵权行为并采取执法行动，捍卫知识产权权益。
  BC-840.50.10:
    name: 侵权监控
    description: |
      监控疑似知识产权侵权行为。
  BC-840.50.20:
    name: 知识产权维权行动
    description: |
      发出停止侵权通知、提起异议及维权诉讼。
  BC-840.50.30:
    name: 知识产权防御与反诉
    description: |
      应对知识产权索赔并提起反诉。
  BC-840.50.40:
    name: 反假冒与品牌保护
    description: |
      检测并清除假冒商品及品牌滥用行为。

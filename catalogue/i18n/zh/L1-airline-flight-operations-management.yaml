locale: zh
source: L1-airline-flight-operations-management.yaml
entries:
  BC-4080:
    name: 航空飞行运营管理
    description: |
      面向航空承运人，提供时刻表规划、飞机航线分配、机组规划、签派、廊桥与过站协调、IROPS恢复及飞行绩效和安全报告。
    in_scope:
      - 航班时刻表规划、时刻协调及衔接波次
      - 飞机路由、机尾分配及最低设备清单追踪
      - 机组配对、排班及飞行时间限制合规
      - 航班签派及运控
      - 廊桥分配及过站协调
      - 飞机和机组的运营中断（IROPS）决策
      - 飞行绩效及安全事件报告
    out_of_scope:
      - 空中交通管制（BC-1700）
      - 预订层面的旅客重新安置（BC-4020.70）
      - 货运航班处理（BC-3270）
  BC-4080.10:
    name: 航班时刻表规划
    description: |
      编制并发布涵盖航网、时刻及衔接波次的航空公司航班时刻表。
  BC-4080.10.10:
    name: 航网与航线计划定义
    description: |
      依据需求和机队计划定义航网和航线规划。
  BC-4080.10.20:
    name: 时刻与机场协调
    description: |
      协调机场时刻和限制，包括符合IATA WSG的时刻安排。
  BC-4080.10.30:
    name: 时刻表编制与发布
    description: |
      编制已发布时刻表，并向分销合作伙伴发布SSIM文件。
  BC-4080.10.40:
    name: 衔接波次优化
    description: |
      优化枢纽衔接波次和最短连接时间。
  BC-4080.20:
    name: 飞机路由与机尾分配
    description: |
      编制飞机循环路由、机尾分配、换机操作、维修时隙协调及最低设备清单追踪。
  BC-4080.20.10:
    name: 机队循环路由规划
    description: |
      规划全网络机队循环路由，平衡飞行小时和循环次数。
  BC-4080.20.20:
    name: 机尾分配与换机操作
    description: |
      将特定机尾分配至航班并执行战术换机操作。
  BC-4080.20.30:
    name: 飞机维修时隙协调
    description: |
      对照时刻表协调维修时隙和调机飞行。
  BC-4080.20.40:
    name: 最低设备清单追踪
    description: |
      追踪最低设备清单（MEL）延缓项到期及运营影响。
  BC-4080.30:
    name: 机组规划与排班
    description: |
      规划驾驶舱和客舱机组，包括配对编制、竞标、资质追踪及飞行时间限制合规。
  BC-4080.30.10:
    name: 机组配对编制
    description: |
      在遵守合法性规则的前提下，编制贯穿时刻表的机组配对。
  BC-4080.30.20:
    name: 机组竞标与班次编制
    description: |
      运营驾驶舱和客舱机组的竞标流程和班次编制。
  BC-4080.30.30:
    name: 机组资质与近期飞行经历追踪
    description: |
      追踪机组成员的资质、近期飞行经历及现行资质状态。
  BC-4080.30.40:
    name: 飞行与值勤时间限制合规
    description: |
      在规划和执行阶段遵守飞行时间限制（FTL）和值勤时间规则。
  BC-4080.40:
    name: 航班签派与运控
    description: |
      生成运控飞行计划、制定燃油方案、天气和航行通告简令及运控决策。
  BC-4080.40.10:
    name: 飞行计划生成
    description: |
      生成涵盖航路、飞行高度及预计飞行时间的运控飞行计划。
  BC-4080.40.20:
    name: 运控燃油计算
    description: |
      计算包括备用油、应急油及机长酌情加油在内的运控燃油量。
  BC-4080.40.30:
    name: 天气与航行通告简令
    description: |
      汇编并向机组和签派员发布天气和航行通告简令。
  BC-4080.40.40:
    name: 运控中心决策
    description: |
      运控中心（OCC）就延误、备降及恢复方案进行决策。
  BC-4080.50:
    name: 廊桥与过站运营
    description: |
      规划廊桥并在机场现场协调过站，包括推出和停机坪延误处置。
  BC-4080.50.10:
    name: 廊桥分配与排序
    description: |
      跨当日运营进行廊桥和机位排序分配。
  BC-4080.50.20:
    name: 过站协调
    description: |
      实时协调过站活动，包括餐食装载、加油及登机。
  BC-4080.50.30:
    name: 推出与撤轮档操作
    description: |
      在停机位协调推出、撤轮档及滑出操作。
  BC-4080.50.40:
    name: 停机坪延误管理
    description: |
      依据法规时限和旅客关怀义务管理停机坪延误。
  BC-4080.60:
    name: 航班中断与IROPS管理
    description: |
      在中断事件中进行运营决策，涵盖备降、大规模取消及机组恢复，并与旅客侧重新预订流程协调。
    in_scope:
      - 备降和取消决策
      - 机组中断恢复和备份分配
      - 与旅客重新安置协调交接（BC-4020.70）
    out_of_scope:
      - 旅客层面重新预订和补偿认定（BC-4020.70）
  BC-4080.60.10:
    name: 备降决策操作
    description: |
      执行航路和起飞前备降的决策与执行操作。
  BC-4080.60.20:
    name: 大规模取消恢复操作
    description: |
      在大规模取消期间开展涵盖飞机、机组及时刻恢复的运营。
  BC-4080.60.30:
    name: 机组中断恢复
    description: |
      在中断期间恢复机组排班，包括备份和储备分配。
  BC-4080.60.40:
    name: 旅客重新预订协调
    description: |
      与旅客重新安置团队就恢复方案和优先排序进行协调。
  BC-4080.70:
    name: 飞行绩效与安全报告
    description: |
      报告飞行绩效、准点率KPI、航空安全报告及运营安全数据信息流。
  BC-4080.70.10:
    name: 准点率绩效报告
    description: |
      报告全网络的准点率和延误代码。
  BC-4080.70.20:
    name: 航空安全报告捕获
    description: |
      捕获并分类来自机组和运营人员的航空安全报告。
  BC-4080.70.30:
    name: 运营安全调查支持
    description: |
      支持运营安全调查，包括数据收集和后续整改。
  BC-4080.70.40:
    name: 飞行数据分析信息流
    description: |
      向安全和运营分析项目提供飞行数据分析信息流。

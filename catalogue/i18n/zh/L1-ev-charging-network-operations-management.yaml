locale: zh
source: L1-ev-charging-network-operations-management.yaml
entries:
  BC-3480:
    name: 电动车充电网络运营管理
    description: |
      面向充电桩运营商和电动出行服务商的电动车充电网络运营——场站规划、充电桩运营、能源与电价管理、客户与漫游运营、计费与结算、充电设备维护及参与电网服务。
  BC-3480.10:
    name: 充电场站规划与部署
    description: |
      充电基础设施的选址、许可、并网及实物部署。
  BC-3480.10.10:
    name: 充电场站选址
    description: |
      依据需求、土地及电网标准识别和确认充电场站。
  BC-3480.10.20:
    name: 场站许可与并网
    description: |
      充电场站的许可审批、规划审批及并网协调。
  BC-3480.10.30:
    name: 充电设备安装协调
    description: |
      协调充电设备安装、土建、调试及移交运营。
  BC-3480.20:
    name: 充电桩运营
    description: |
      充电桩的日常运营，包括通过OCPP开展监控、充电会话生命周期管理及固件管理。
  BC-3480.20.10:
    name: 充电桩监控
    description: |
      实时监控充电桩健康状态、可用性及报警状态。
  BC-3480.20.20:
    name: 充电会话生命周期管理
    description: |
      管理充电会话从授权到能量传输再到终止的全生命周期。
  BC-3480.20.30:
    name: 充电设备固件与配置管理
    description: |
      管理充电设备固件版本、配置文件及远程更新。
  BC-3480.30:
    name: 充电能源与电价管理
    description: |
      管理充电网络的能源采购协调、充电电价及分时段优化。
  BC-3480.30.10:
    name: 批发能源采购协调
    description: |
      协调支持充电运营的能源采购量、套期保值及PPA。
  BC-3480.30.20:
    name: 充电电价定义
    description: |
      跨市场定义公共、会员及漫游充电电价。
  BC-3480.30.30:
    name: 需量电费与分时段用电优化
    description: |
      依据需量电费和分时段电价结构优化充电运营。
  BC-3480.40:
    name: 充电客户与订阅管理
    description: |
      充电服务的客户引导、订阅计划及身份认证。
  BC-3480.40.10:
    name: 充电账户引导
    description: |
      引导充电客户完成身份认证、支付方式绑定及套餐选择。
  BC-3480.40.20:
    name: 充电订阅计划管理
    description: |
      管理充电客户的订阅、会员及预付费计划。
  BC-3480.40.30:
    name: 充电身份认证与授权
    description: |
      通过RFID、应用程序或即插即充对充电会话进行身份认证与授权。
  BC-3480.50:
    name: 充电计费与结算
    description: |
      对充电会话计费、与漫游合作伙伴结算及向充电客户提供收据管理。
  BC-3480.50.10:
    name: 充电会话计费
    description: |
      对直接客户和漫游客户的充电会话进行费率计算与计费。
  BC-3480.50.20:
    name: 漫游结算
    description: |
      通过OCPI及同等协议与合作CPO和EMSP结算漫游会话。
  BC-3480.50.30:
    name: 报销与收据管理
    description: |
      为充电客户开具收据、提供费用报销支持及税务文件。
  BC-3480.60:
    name: 充电网络互操作性
    description: |
      与漫游合作伙伴的互操作性及跨连接器和协议的充电标准符合性。
  BC-3480.60.10:
    name: 漫游合作伙伴管理
    description: |
      引导和管理漫游合作伙伴及漫游枢纽。
  BC-3480.60.20:
    name: 即插即充运营
    description: |
      运营基于ISO 15118即插即充的合同证书和认证流程。
  BC-3480.60.30:
    name: 充电连接器兼容性管理
    description: |
      管理CCS、NACS、CHAdeMO及GB/T连接器兼容性与适配器策略。
  BC-3480.70:
    name: 充电现场服务与维护
    description: |
      充电资产的现场服务与维护，包括派工、预防性维护及备件管理。
  BC-3480.70.10:
    name: 充电设备故障派工
    description: |
      响应充电设备故障和客户上报问题，派遣现场技术人员。
  BC-3480.70.20:
    name: 充电设备预防性维护
    description: |
      对充电资产开展计划性预防维护与检查。
  BC-3480.70.30:
    name: 充电设备备件管理
    description: |
      管理充电设备备件库存、维修件池及备件淘汰。
  BC-3480.80:
    name: 电网与能源服务参与
    description: |
      充电资产参与电网和能源市场，包括需求响应、V2G及智能充电。
    in_scope:
      - V2G能量输出与容量服务
      - 需求响应项目参与
      - 智能充电计划优化
    out_of_scope:
      - 发电资产运营与批发电力交易
  BC-3480.80.10:
    name: 车辆至电网服务运营
    description: |
      运营V2G服务，向电网和平衡市场提供能量及容量产品。
  BC-3480.80.20:
    name: 需求响应项目参与
    description: |
      参与需求响应项目，包括响应调度与结算。
  BC-3480.80.30:
    name: 智能充电计划管理
    description: |
      跨场站和车辆开展计划性智能充电，优化成本与电网影响。

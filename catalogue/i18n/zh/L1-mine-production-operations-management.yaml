locale: zh
source: L1-mine-production-operations-management.yaml
entries:
  BC-4430:
    name: 矿山生产运营管理
    description: |
      通过露天和地下作业的钻爆-铲装-运输循环、地下采场作业、品位控制、地压控制、矿山通风和排水，执行矿山生产任务。
  BC-4430.10:
    name: 钻爆运营
    description: |
      开展露天和地下作业的生产钻探、充药、起爆及爆后效果分析。
    in_scope:
      - 生产炮孔钻探
      - 充药与起爆
      - 爆后破碎度和矿石移动分析
    out_of_scope:
      - 勘探钻探（BC-4400.30）
      - 钻爆方案设计（BC-4420.40.30）
  BC-4430.10.10:
    name: 生产钻探
    description: |
      按爆破方案设计钻凿生产炮孔。
  BC-4430.10.20:
    name: 爆破充药
    description: |
      向炮孔装填炸药和起爆器材。
  BC-4430.10.30:
    name: 爆破起爆与清场
    description: |
      开展生产爆破的连线、清场、起爆和爆后清场工作。
  BC-4430.10.40:
    name: 爆破效果分析
    description: |
      分析已实施爆破的破碎度、矿石移动和振动效果。
  BC-4430.20:
    name: 铲装与运输运营
    description: |
      将爆破矿岩从工作面铲装、运输至选矿厂或废石场。
  BC-4430.20.10:
    name: 铲运机与挖掘机运营
    description: |
      操作绳铲、液压挖掘机和前端装载机。
  BC-4430.20.20:
    name: 矿用卡车运输运营
    description: |
      操作非公路矿用卡车和辅助驱动运输设备。
  BC-4430.20.30:
    name: 设备调度与远程监控
    description: |
      开展设备实时调度、任务分配和基于远程监控的生产率管理。
  BC-4430.20.40:
    name: 物料移动对账
    description: |
      将移动吨位与测量、调度和矿堆库存进行对账。
  BC-4430.30:
    name: 地下采矿生产运营
    description: |
      开展地下采矿方法特有的采场掘进、生产、充填和地下物料搬运作业。
  BC-4430.30.10:
    name: 采场掘进
    description: |
      掘进地下通道、巷道和采场基础设施。
  BC-4430.30.20:
    name: 采场生产
    description: |
      开展地下采场的生产爆破和出矿作业。
  BC-4430.30.30:
    name: 充填作业
    description: |
      向采空采场放置胶结充填料或岩石充填料。
  BC-4430.30.40:
    name: 地下物料搬运
    description: |
      操作地下输送机、溜矿井和竖井提升设备。
  BC-4430.40:
    name: 品位控制运营
    description: |
      在采矿工作面通过采样、矿块界定和路径决策，实现生产阶段矿石废石区分。
  BC-4430.40.10:
    name: 品位控制采样
    description: |
      对爆破矿岩和工作面开展生产阶段采样，以确定品位。
  BC-4430.40.20:
    name: 矿块界定
    description: |
      界定用于短期执行的可采矿块。
  BC-4430.40.30:
    name: 矿废边界标记
    description: |
      在现场标记矿废边界，供铲运机和装载机操作员使用。
  BC-4430.40.40:
    name: 原矿堆配置分配
    description: |
      将开采物料分配至原矿堆和品位堆场。
  BC-4430.50:
    name: 地压控制与岩土工程监测
    description: |
      通过对露天坑边坡和地下巷道的监测及触发响应措施，开展运营性地压控制。
  BC-4430.50.10:
    name: 边坡监测
    description: |
      利用雷达、棱镜和倾斜仪对露天坑边坡开展实时监测。
  BC-4430.50.20:
    name: 地下支护安装
    description: |
      在地下安装锚杆、钢筋网、喷射混凝土和锚索支护。
  BC-4430.50.30:
    name: 地下微震监测
    description: |
      对地下巷道开展微震监测，用于岩爆和应力管理。
  BC-4430.50.40:
    name: 岩土工程触发响应
    description: |
      在监测阈值超限时执行触发行动响应计划。
  BC-4430.60:
    name: 矿山通风与大气质量管理
    description: |
      操作主要和辅助通风系统，并监测矿山大气质量。
  BC-4430.60.10:
    name: 主要通风运营
    description: |
      操作主要地表和地下通风风机及风路。
  BC-4430.60.20:
    name: 辅助通风运营
    description: |
      在工作面操作辅助风机和风筒。
  BC-4430.60.30:
    name: 矿山大气监测
    description: |
      对矿山大气中的粉尘、气体和氧气浓度开展实时和常规监测。
  BC-4430.60.40:
    name: 柴油颗粒物管理
    description: |
      管理地下作业区域的柴油颗粒物暴露水平。
  BC-4430.70:
    name: 矿山排水运营
    description: |
      操作露天坑和地下排水系统及泵站基础设施。
  BC-4430.70.10:
    name: 露天坑排水运营
    description: |
      操作坑内水泵和周边疏干钻孔。
  BC-4430.70.20:
    name: 地下排水运营
    description: |
      操作地下水仓、水泵和排水管网。
  BC-4430.70.30:
    name: 泵站管理
    description: |
      操作和维护固定泵站及扬水管。

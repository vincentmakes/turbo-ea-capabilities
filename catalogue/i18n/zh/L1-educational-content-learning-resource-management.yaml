locale: zh
source: L1-educational-content-learning-resource-management.yaml
entries:
  BC-4790:
    name: 教育内容与学习资源管理
    description: |
      对教学中使用的教育内容和学习资源进行编写、编目、授权及发布，包括课件、数字学习对象、开放教育资源、图书馆馆藏和教材。
  BC-4790.10:
    name: 课件编写与制作
    description: |
      开展教学设计并制作课件，包括多媒体内容和课程资料汇编。
    in_scope:
      - 教学设计
      - 多媒体内容制作
      - 课程资料汇编
    out_of_scope:
      - 教学实施（见教学与学习运营管理）
  BC-4790.10.10:
    name: 教学设计
    description: |
      对课程、模块和学习体验进行教学设计。
  BC-4790.10.20:
    name: 多媒体内容制作
    description: |
      制作视频、音频及交互式多媒体学习内容。
  BC-4790.10.30:
    name: 课程资料汇编
    description: |
      汇编用于教学的课程资料包和学习资源集。
  BC-4790.20:
    name: 数字学习对象目录
    description: |
      跨课程项目和教学形式对数字学习对象进行编目、版本管理和复用。
    in_scope:
      - 学习对象编目与元数据
      - 学习对象版本管理
      - 可复用对象发现与复用
    out_of_scope:
      - LMS运营实施（见教学与学习运营管理）
  BC-4790.20.10:
    name: 学习对象编目与元数据
    description: |
      按互操作性标准对学习对象及其元数据进行编目。
  BC-4790.20.20:
    name: 学习对象版本管理
    description: |
      对学习对象进行版本控制和全生命周期管理。
  BC-4790.20.30:
    name: 可复用对象发现与复用
    description: |
      跨课程和学科发现并复用学习对象。
  BC-4790.30:
    name: 开放教育资源管理
    description: |
      遴选、授权并贡献教学中使用的开放教育资源（OER）。
    in_scope:
      - OER遴选与策划
      - OER许可合规
      - OER贡献与共享
    out_of_scope:
      - 商业教材采购（见教材与课程材料采购）
  BC-4790.30.10:
    name: OER遴选与策划
    description: |
      遴选和策划供机构使用的开放教育资源。
  BC-4790.30.20:
    name: OER许可合规
    description: |
      确保使用和复用时符合OER许可协议（如知识共享授权）。
  BC-4790.30.30:
    name: OER贡献与共享
    description: |
      将机构自主编写的内容贡献至OER生态系统。
  BC-4790.40:
    name: 图书馆与信息资源运营
    description: |
      开展图书馆馆藏建设、阅读书目管理及支持教学与科研的信息素养辅导。
    in_scope:
      - 馆藏建设
      - 阅读书目与预留资料管理
      - 信息素养辅导
    out_of_scope:
      - 非教育教学用途的公共图书馆运营
  BC-4790.40.10:
    name: 馆藏建设
    description: |
      建设图书馆纸质和电子馆藏资源。
  BC-4790.40.20:
    name: 阅读书目与预留资料管理
    description: |
      管理课程阅读书目和预留馆藏资料。
  BC-4790.40.30:
    name: 信息素养辅导
    description: |
      提供信息素养和科研技能的辅导与教学。
  BC-4790.50:
    name: 内容授权与版权管理
    description: |
      管理教学中使用第三方内容所涉及的授权、版权许可及教育豁免事项。
    in_scope:
      - 教育内容授权
      - 版权许可
      - 合理使用与教育豁免管理
    out_of_scope:
      - 机构知识产权（见跨行业知识产权管理）
  BC-4790.50.10:
    name: 教育内容授权
    description: |
      对教育用途的第三方内容进行授权许可。
  BC-4790.50.20:
    name: 版权许可
    description: |
      为教学和考核中使用的内容办理版权许可。
  BC-4790.50.30:
    name: 合理使用与教育豁免管理
    description: |
      管理合理使用、合理处理及教育版权豁免事项。
  BC-4790.60:
    name: 教材与课程材料采购
    description: |
      规范并采购教材和课程材料，包括平价教材项目。
    in_scope:
      - 必读书目规范
      - 教材采购
      - 平价教材项目（如包含访问权限的授权项目）
    out_of_scope:
      - 通用采购（见跨行业采购管理）
  BC-4790.60.10:
    name: 必读书目规范
    description: |
      规范各课程必读和推荐阅读材料。
  BC-4790.60.20:
    name: 教材采购
    description: |
      采购教材和课程材料。
  BC-4790.60.30:
    name: 平价教材项目
    description: |
      运营平价教材和包含访问权限的授权项目。

locale: zh
source: L1-vehicle-programme-management.yaml
entries:
  BC-3410:
    name: 整车项目群管理
    description: |
      覆盖概念阶段、阶段门里程碑、平台与变型策略，以及从量产启动到停产全周期的项目群级成本、重量和时间进度的多年期整车项目群治理。
  BC-3410.10:
    name: 项目群定义与启动
    description: |
      新整车及衍生车型项目群的概念定义、商业案例、项目群章程及立项审批。
    in_scope:
      - 项目群章程与商业案例审批
      - 整车概念与定位定义
      - 平台与沿用策略对齐
    out_of_scope:
      - 整车子系统详细工程（BC-3400）
      - 企业项目组合治理（BC-900）
  BC-3410.10.10:
    name: 项目群章程与商业案例
    description: |
      审批级项目群章程、财务商业案例及投资授权。
  BC-3410.10.20:
    name: 整车概念定义
    description: |
      整车概念、定位、客户配置包定义及高级别属性目标。
  BC-3410.10.30:
    name: 平台策略对齐
    description: |
      将项目群与平台路线图、沿用决策及共享模块策略进行对齐。
  BC-3410.10.40:
    name: 项目群审批门控
    description: |
      项目群初始审批门控，包括预算、时间进度及资源承诺。
  BC-3410.20:
    name: 项目群阶段门治理
    description: |
      运行整车项目群阶段门模型，包括里程碑评审、交付物保障及风险与问题管控。
  BC-3410.20.10:
    name: 里程碑规划
    description: |
      从PT、PVS到SOP及停产的项目群里程碑规划。
  BC-3410.20.20:
    name: 阶段门评审执行
    description: |
      阶段门评审执行，包括交付物评估及通过/暂缓决策。
  BC-3410.20.30:
    name: 项目群风险与问题管理
    description: |
      识别、升级及缓解项目群风险与关键问题。
  BC-3410.20.40:
    name: 项目群成熟度评估
    description: |
      依据工程、制造及供应商就绪标准评估项目群成熟度。
  BC-3410.30:
    name: 项目群成本管理
    description: |
      制定和跟踪涵盖物料清单、工装、投资及质保准备金的项目群成本目标。
  BC-3410.30.10:
    name: 项目群成本目标设定
    description: |
      设定项目群成本目标，包括BoM、转换成本及投资包络。
  BC-3410.30.20:
    name: 物料清单成本跟踪
    description: |
      跟踪整车BoM成本、供应商报价及配置决策。
  BC-3410.30.30:
    name: 变动与固定成本预测
    description: |
      预测项目群在量产启动阶段和稳定阶段的变动与固定成本。
  BC-3410.30.40:
    name: 成本削减工作跟踪
    description: |
      跟踪成本削减举措、价值工程及其相对目标的实现情况。
  BC-3410.40:
    name: 项目群重量与属性跟踪
    description: |
      在项目群层面跟踪整车重量、性能及其他属性相对目标的偏差，并进行权衡决策。
  BC-3410.40.10:
    name: 整车重量跟踪
    description: |
      按系统跟踪质量累积及相对项目群重量目标的预留量。
  BC-3410.40.20:
    name: 属性绩效跟踪
    description: |
      跟踪项目群级属性绩效和相对目标的储备量。
  BC-3410.40.30:
    name: 目标符合性报告
    description: |
      向项目群领导层和指导委员会报告目标符合状态。
  BC-3410.50:
    name: 变型与衍生车型规划
    description: |
      在项目群生命周期内规划配置级别、设备、区域及特别版变型。
  BC-3410.50.10:
    name: 配置级别与设备变型规划
    description: |
      按市场和细分市场规划配置级别、选装件及标准配置内容。
  BC-3410.50.20:
    name: 区域衍生车型规划
    description: |
      规划区域衍生车型，包括市场专属车身、动力总成及功能配置。
  BC-3410.50.30:
    name: 特别版及限量版规划
    description: |
      规划特别版、限量版及赛车衍生车型。
  BC-3410.60:
    name: 量产启动与停产协调
    description: |
      协调跨工厂及供应商网络的SOP就绪、产能爬坡及停产退出。
  BC-3410.60.10:
    name: SOP就绪协调
    description: |
      协调工程、供应商、工厂及售后SOP就绪标准。
  BC-3410.60.20:
    name: 产能爬坡规划
    description: |
      规划产能爬坡曲线、预批量生产及早期量产节奏。
  BC-3410.60.30:
    name: EOP停产协调
    description: |
      协调停产时间节点、最终采购及清库计划。
  BC-3410.70:
    name: 项目群绩效报告
    description: |
      向指导委员会和高层领导汇报项目群状态、决策及量产后绩效。
  BC-3410.70.10:
    name: 项目群状态报告
    description: |
      定期报告项目群在成本、时间进度、质量及风险方面的状态。
  BC-3410.70.20:
    name: 项目群指导委员会支持
    description: |
      准备并支持项目群指导委员会及高管评审。
  BC-3410.70.30:
    name: 量产后项目群评审
    description: |
      量产后评审，归纳经验教训并输入后续项目群启动。

locale: zh
source: L1-materials-management.yaml
entries:
  BC-1070:
    name: 物料管理
    description: |
      在工厂层面管理原材料、在制品与物料清单，确保生产物料供应及时、准确。
  BC-1070.10:
    name: 物料清单管理
    description: |
      管理BOM结构，维护工程BOM与制造BOM。
  BC-1070.10.10:
    name: 工程BOM管理
    description: |
      维护与产品设计和版本对齐的工程BOM。
  BC-1070.10.20:
    name: 制造BOM管理
    description: |
      维护反映工厂特定装配顺序的制造BOM。
  BC-1070.10.30:
    name: BOM变更与生效管理
    description: |
      管理BOM变更控制、版本与生效日期。
  BC-1070.10.40:
    name: BOM变型管理
    description: |
      管理产品选项的可配置与变型BOM。
  BC-1070.20:
    name: 原材料管理
    description: |
      管理原材料库存、质量与可追溯性，确保生产投料合规。
  BC-1070.20.10:
    name: 原材料库存控制
    description: |
      跟踪工厂与储存位置的原材料库存。
  BC-1070.20.20:
    name: 原材料质量检验
    description: |
      开展来料检验、抽样检测与原材料放行。
  BC-1070.20.30:
    name: 原材料可追溯性
    description: |
      管理原材料的批次与序列号可追溯性。
  BC-1070.30:
    name: 在制品管理
    description: |
      跟踪、估值并管控在制品（WIP）。
  BC-1070.30.10:
    name: 在制品跟踪
    description: |
      跟踪在制品在制造工序中的流转状态。
  BC-1070.30.20:
    name: 在制品估值
    description: |
      对在制品头寸进行成本归集与估值。
  BC-1070.30.30:
    name: 在制品管控与账龄分析
    description: |
      对滞留或停滞在制品进行账龄分析与管控。
  BC-1070.40:
    name: 成品管理
    description: |
      管理工厂层面的成品库存。
  BC-1070.40.10:
    name: 成品入库
    description: |
      将生产完工的成品接收入工厂库存。
  BC-1070.40.20:
    name: 成品储存
    description: |
      在工厂仓库中储存与搬运成品。
  BC-1070.40.30:
    name: 成品出库
    description: |
      向下游节点发运成品。
  BC-1070.50:
    name: 物料计划管理
    description: |
      开展MRP运算与物料需求计划，执行工厂层面的供应规划。
  BC-1070.50.10:
    name: 物料需求计划
    description: |
      运行MRP，从需求与BOM中导出净物料需求。
  BC-1070.50.20:
    name: 物料覆盖分析
    description: |
      开展覆盖分析、例外处理与采购/生产建议。
  BC-1070.50.30:
    name: 工厂层面供应计划执行
    description: |
      将物料计划转化为采购订单与生产订单。

locale: zh
source: L1-chemical-research-process-development-management.yaml
entries:
  BC-4600:
    name: 化工研发与工艺开发管理
    description: |
      开展化工产品的新分子和合成路线发现、实验室规模工艺开发、中试装置运营及向商业生产的放大研究。
  BC-4600.10:
    name: 分子与合成路线发现
    description: |
      为新颖和现有化工产品识别目标分子并筛选可行合成路线。
  BC-4600.10.10:
    name: 目标分子识别
    description: |
      根据应用目标识别候选分子。
  BC-4600.10.20:
    name: 逆合成分析
    description: |
      开展计算机辅助和专家驱动的合成路线逆合成分析。
  BC-4600.10.30:
    name: 催化剂与试剂筛选
    description: |
      开展催化剂和试剂的高通量和定向筛选。
  BC-4600.10.40:
    name: 路线选择评估
    description: |
      从收率、成本、安全性和可持续性等多维度评估候选路线。
  BC-4600.20:
    name: 反应动力学与热力学研究
    description: |
      生成化工过程建模和设计所需的动力学和热力学数据。
  BC-4600.20.10:
    name: 反应动力学测定
    description: |
      在受控条件下测定反应速率和速率常数。
  BC-4600.20.20:
    name: 热力学性质测定
    description: |
      测定反应物和产物的焓、熵和热容。
  BC-4600.20.30:
    name: 相平衡研究
    description: |
      开展气液、液液和固液平衡实验。
  BC-4600.20.40:
    name: 动力学模型开发
    description: |
      基于实测数据拟合和验证动力学模型。
  BC-4600.30:
    name: 工艺开发与优化
    description: |
      在中试试验前开展化工过程操作窗口的实验室规模开发和优化。
  BC-4600.30.10:
    name: 实验室规模实验设计
    description: |
      设计实验室规模实验，以表征过程行为。
  BC-4600.30.20:
    name: 工艺参数优化
    description: |
      优化温度、压力、停留时间和化学计量比等工艺参数。
  BC-4600.30.30:
    name: 收率与选择性提升
    description: |
      通过反应工程手段提升收率和选择性。
  BC-4600.30.40:
    name: 溶剂体系选择
    description: |
      综合平衡性能与 HSE 因素，选择和优化溶剂体系。
  BC-4600.40:
    name: 中试装置运营管理
    description: |
      规划、执行和分析中试规模试验，以降低商业放大风险。
  BC-4600.40.10:
    name: 中试活动规划
    description: |
      规划中试活动，包括目标设定和物料平衡。
  BC-4600.40.20:
    name: 中试装置执行
    description: |
      在具有代表性的工艺条件下执行中试运行。
  BC-4600.40.30:
    name: 中试数据分析
    description: |
      分析中试数据，优化动力学和收率模型。
  BC-4600.40.40:
    name: 中试装置资产管理
    description: |
      对中试装置设备和仪器仪表进行全生命周期管理。
  BC-4600.50:
    name: 工艺放大管理
    description: |
      将中试规模工艺转化为经验证的商业工艺定义。
  BC-4600.50.10:
    name: 放大建模
    description: |
      运用量纲分析和 CFD 对放大效应进行建模。
  BC-4600.50.20:
    name: 示范规模验证
    description: |
      操作示范规模设施，验证放大假设。
  BC-4600.50.30:
    name: 商业工艺定义
    description: |
      完成商业工艺基础，为前端工程设计做好准备。
  BC-4600.60:
    name: 过程安全危险筛查
    description: |
      在研发阶段早期对反应性、热稳定性和粉尘危险进行筛查。
  BC-4600.60.10:
    name: 反应性化学品筛查
    description: |
      使用 DSC、ARC 和 Calvet 量热仪筛查反应性化学品危害。
  BC-4600.60.20:
    name: 热稳定性测试
    description: |
      确定热分解起始温度和失控反应潜力。
  BC-4600.60.30:
    name: 粉尘危险特性鉴定
    description: |
      表征可燃粉尘危险，包括 Kst 和最小点火能。
  BC-4600.70:
    name: 研发知识与数据管理
    description: |
      对研发知识、实验记录和工艺数据资产进行捕获和管理。
  BC-4600.70.10:
    name: 电子实验记录本管理
    description: |
      运营化工研发电子实验记录本。
  BC-4600.70.20:
    name: 工艺知识库管理
    description: |
      整理发现、开发和放大阶段的工艺知识。
  BC-4600.70.30:
    name: 研发数据治理
    description: |
      对结构化研发实验数据进行整理、保留和复用。

locale: zh
source: L1-media-asset-management.yaml
entries:
  BC-3710:
    name: 媒体资产管理
    description: |
      涵盖媒体资产在内容生命周期中从制作到分发的全流程，包括素材接收、编目、存储、格式转换、档案保存及标识符管理。
  BC-3710.10:
    name: 资产接收与质量控制
    description: |
      将源素材接入资产平台，并在进一步使用前完成技术和编辑质量控制。
  BC-3710.10.10:
    name: 源资产接收
    description: |
      将源文件及磁带转文件、馈送转文件等采集内容接入资产平台。
  BC-3710.10.20:
    name: 质量控制检查
    description: |
      对画面、音频及元数据缺陷进行自动化和人工质量控制检查。
  BC-3710.10.30:
    name: 技术合规验证
    description: |
      依据交付规范（包括格式、帧率、响度及信号合规性）进行验证。
  BC-3710.20:
    name: 元数据编目
    description: |
      编写并维护描述性、技术性及版权元数据，使资产具有可检索性和可用性。
  BC-3710.20.10:
    name: 描述性元数据编写
    description: |
      依据受控模式，对片名、简介、创作人员及编辑属性进行编目。
  BC-3710.20.20:
    name: 技术元数据采集
    description: |
      提取并存储文件本质、容器及信号级别的技术元数据。
  BC-3710.20.30:
    name: 版权元数据关联
    description: |
      将资产记录与覆盖版权区域、窗口期及平台限制的版权记录相关联。
  BC-3710.20.40:
    name: 分类体系与受控词汇管理
    description: |
      管理全目录范围内使用的分类体系、类型及受控词汇。
  BC-3710.30:
    name: 资产存储与分级
    description: |
      在在线、近线及归档层级对媒体资产进行分层存储，平衡访问延迟与成本。
  BC-3710.30.10:
    name: 在线资产存储
    description: |
      为正在制作和分发使用中的资产提供高性能存储。
  BC-3710.30.20:
    name: 近线与归档层管理
    description: |
      按服务级别将资产迁移至近线和归档层，并提供调回服务。
  BC-3710.30.30:
    name: 存储成本优化
    description: |
      优化存储分层策略、去重及全资产库的存储占用压缩。
  BC-3710.40:
    name: 转码与格式转换
    description: |
      通过转码和封装流水线生成中间格式及分发版本。
  BC-3710.40.10:
    name: 中间格式母版生成
    description: |
      生成高质量中间格式母版，作为下游分发编码的中间文件。
  BC-3710.40.20:
    name: 分发格式编码
    description: |
      针对广播、OTT及合作伙伴的交付规范进行分发版本编码。
  BC-3710.40.30:
    name: 自适应码率封装
    description: |
      为HLS、MPEG-DASH及CMAF流媒体传输封装自适应码率阶梯。
  BC-3710.50:
    name: 长期归档与保存
    description: |
      对母版及历史资产进行长期保存，包括对历史素材的修复工作。
  BC-3710.50.10:
    name: 归档编目
    description: |
      对长期归档内容进行编目，包括历史载体和实物素材记录。
  BC-3710.50.20:
    name: 保存迁移
    description: |
      定期将归档素材迁移至新一代存储介质，以防止格式和媒介过时。
  BC-3710.50.30:
    name: 修复与重制
    description: |
      对历史素材进行画面和音频修复与重制，使其符合现代交付标准。
  BC-3710.60:
    name: 内容标识符与版本管理
    description: |
      为每个剪辑和版本分配并维护内容标识符及版本记录，确保唯一标识。
  BC-3710.60.10:
    name: 内容标识符分配
    description: |
      为作品和版本分配内部及注册系统标识符（EIDR、ISAN、ISRC、ISWC）。
  BC-3710.60.20:
    name: 版本与剪辑沿革管理
    description: |
      追踪对应父母版记录的剪辑、语言、合规及平台版本沿革。
  BC-3710.60.30:
    name: 外部标识符交叉引用映射
    description: |
      建立内部标识符与合作伙伴、零售商及注册系统标识符的交叉引用映射。

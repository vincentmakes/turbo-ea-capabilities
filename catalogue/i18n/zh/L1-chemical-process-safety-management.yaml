locale: zh
source: L1-chemical-process-safety-management.yaml
entries:
  BC-4640:
    name: 化工过程安全管理
    description: |
      预防活性、易燃和有毒化工过程中的重大事故危险，涵盖过程危害分析、设备完整性、安全仪表系统、活性和可燃危险管理、绩效报告和应急响应。有别于保留职业健康、环境和个人安全范围的跨行业 HSE 管理（BC-730）。
  BC-4640.10:
    name: 过程危害分析
    description: |
      对资产全生命周期内的重大事故危险进行结构化识别和分析。
    in_scope:
      - HAZID、HAZOP、LOPA 和蝴蝶结分析
      - 定量风险评估
    out_of_scope:
      - 人身安全风险评估（BC-730）
  BC-4640.10.10:
    name: HAZOP 研究
    description: |
      对新建和改造设施开展危险与可操作性分析（HAZOP）。
  BC-4640.10.20:
    name: HAZID 研究
    description: |
      在概念和设计早期阶段开展危险识别（HAZID）研究。
  BC-4640.10.30:
    name: LOPA 研究
    description: |
      开展保护层分析（LOPA），以确定安全完整性等级。
  BC-4640.10.40:
    name: 蝴蝶结分析
    description: |
      开展蝴蝶结分析，绘制重大事故情景的屏障映射图。
  BC-4640.10.50:
    name: 定量风险评估
    description: |
      对重大事故危险情景开展定量风险评估。
  BC-4640.20:
    name: 设备完整性管理
    description: |
      对承压设备和安全泄放装置开展检验和完整性管理。
  BC-4640.20.10:
    name: 压力容器检验
    description: |
      按照 API 510 对压力容器开展基于风险的检验。
  BC-4640.20.20:
    name: 工艺管道完整性检验
    description: |
      按照 API 570 和 ASME B31.3 对工艺管道开展检验。
  BC-4640.20.30:
    name: 储罐检验
    description: |
      按照 API 653 对常压和加压储罐开展检验。
  BC-4640.20.40:
    name: 压力泄放装置管理
    description: |
      对安全阀和爆破片进行规格设计、测试和全生命周期管理。
  BC-4640.20.50:
    name: 大气排放与火炬完整性
    description: |
      保障大气排放管、洗涤器和火炬的完整性。
  BC-4640.30:
    name: 安全仪表系统管理
    description: |
      按照 IEC 61511 开展安全仪表系统的功能安全全生命周期管理。
  BC-4640.30.10:
    name: SIL 确定
    description: |
      确定保护功能的安全完整性等级（SIL）。
  BC-4640.30.20:
    name: 安全功能验证
    description: |
      验证设计的安全仪表功能（SIF）达到所要求的 SIL。
  BC-4640.30.30:
    name: SIS 功能测试
    description: |
      对安全仪表系统开展定期功能测试。
  BC-4640.30.40:
    name: 功能安全评估
    description: |
      在全生命周期阶段门开展功能安全评估。
  BC-4640.40:
    name: 活性与可燃危险管理
    description: |
      识别和控制活性化学品、失控、可燃粉尘和点火危险。
  BC-4640.40.10:
    name: 活性化学品风险评估
    description: |
      评估活性化学品风险，包括不相容性。
  BC-4640.40.20:
    name: 失控反应预防
    description: |
      预防和缓解放热失控反应。
  BC-4640.40.30:
    name: 可燃粉尘危险控制
    description: |
      按照 NFPA 654 控制可燃粉尘危险。
  BC-4640.40.40:
    name: 静电与点火源控制
    description: |
      控制工艺区域的静电和其他点火源。
  BC-4640.50:
    name: 过程安全变更管理
    description: |
      对装置、程序和人员变更实施过程安全治理，包括开车前安全检查（PSSR）。
  BC-4640.50.10:
    name: 过程安全管理（PSM）变更申请审查
    description: |
      按照危险标准审查影响 PSM 的变更申请。
  BC-4640.50.20:
    name: 开车前安全检查
    description: |
      对新建和改造设施开展开车前安全检查（PSSR）。
  BC-4640.50.30:
    name: 临时变更管理
    description: |
      在授权期限内管理临时工艺变更。
  BC-4640.60:
    name: 过程安全绩效管理
    description: |
      按照 CCPS RBPS 及同等框架，追踪和报告过程安全先导和滞后指标。
  BC-4640.60.10:
    name: 一级与二级过程安全事件报告
    description: |
      捕获和报告一级和二级过程安全事件。
  BC-4640.60.20:
    name: 先导指标监测
    description: |
      监测三级和四级过程安全先导指标。
  BC-4640.60.30:
    name: 过程安全 KPI 报告
    description: |
      对内对外报告过程安全 KPI 绩效。
  BC-4640.70:
    name: 应急准备与响应
    description: |
      开展重大事故情景的应急响应规划、演练执行和有毒泄漏响应协调。
  BC-4640.70.10:
    name: 应急响应规划
    description: |
      维护装置和企业级应急响应预案。
  BC-4640.70.20:
    name: 演练与训练协调
    description: |
      协调应急演练和重大事故桌面推演。
  BC-4640.70.30:
    name: 有毒泄漏响应协调
    description: |
      协调有毒和易燃泄漏响应行动。
  BC-4640.70.40:
    name: 互助协调
    description: |
      协调与行业响应互助联盟的互助工作。
  BC-4640.80:
    name: 过程安全操作规程
    description: |
      编制、审查和界定过程安全关键操作规程的操作区间。
  BC-4640.80.10:
    name: 安全关键操作规程编制
    description: |
      编制过程安全关键操作规程。
  BC-4640.80.20:
    name: 操作区间定义
    description: |
      界定工艺单元的安全操作区间。
  BC-4640.80.30:
    name: 规程定期审查
    description: |
      定期审查和更新过程安全规程。

locale: zh
source: L1-connected-product-firmware-management.yaml
entries:
  BC-1950:
    name: 联网产品与固件管理
    description: |
      现场联网电气产品的运营全生命周期管理，涵盖设备身份、固件构建与发布、OTA 更新、遥测、产品网络安全及工业 IoT 平台运营。
  BC-1950.10:
    name: 设备身份与配置管理
    description: |
      设备身份及密码凭证的签发与全生命周期管理。
  BC-1950.10.10:
    name: 设备身份签发
    description: |
      在制造时为设备签发唯一身份标识。
  BC-1950.10.20:
    name: 密钥配置
    description: |
      向设备配置密码密钥。
  BC-1950.10.30:
    name: 设备接入平台
    description: |
      将设备接入联网产品平台。
  BC-1950.10.40:
    name: 设备退役
    description: |
      对退役设备进行注销和凭证撤销。
  BC-1950.20:
    name: 固件构建与发布管理
    description: |
      生产固件的构建流水线、发布审批、签名及版本清单管理。
  BC-1950.20.10:
    name: 固件构建流水线管理
    description: |
      运营固件构建和持续集成流水线。
  BC-1950.20.20:
    name: 固件发布审批
    description: |
      固件发布的阶段门审批管理。
  BC-1950.20.30:
    name: 固件签名与完整性管理
    description: |
      固件制品的代码签名和完整性保护。
  BC-1950.20.40:
    name: 固件版本清单
    description: |
      跨已安装基础的固件版本部署清单管理。
  BC-1950.30:
    name: OTA 更新管理
    description: |
      固件 OTA 更新的规划、执行与回滚管理。
  BC-1950.30.10:
    name: OTA 活动规划
    description: |
      规划 OTA 活动和分批推送队列。
  BC-1950.30.20:
    name: OTA 推送执行
    description: |
      执行 OTA 推送并跟踪进度。
  BC-1950.30.30:
    name: OTA 回滚管理
    description: |
      将失败的 OTA 更新回滚至已知良好版本。
  BC-1950.30.40:
    name: OTA 兼容性验证
    description: |
      在 OTA 发布前验证固件兼容性。
  BC-1950.40:
    name: 设备遥测与连接管理
    description: |
      遥测数据采集、连接状态、路由及运营商或 SIM 管理。
  BC-1950.40.10:
    name: 遥测数据采集运营
    description: |
      将设备遥测数据采集至平台存储。
  BC-1950.40.20:
    name: 连接状态监控
    description: |
      监控设备连接状态和可达性。
  BC-1950.40.30:
    name: 遥测数据路由
    description: |
      将遥测数据路由至下游消费者和分析系统。
  BC-1950.40.40:
    name: 网络运营商与 SIM 管理
    description: |
      管理蜂窝运营商关系和 SIM 库存。
  BC-1950.50:
    name: 联网产品网络安全管理
    description: |
      产品侧网络安全管理，涵盖威胁分析、漏洞管理、安全启动及合规认证。
  BC-1950.50.10:
    name: 产品威胁建模
    description: |
      对联网产品设计进行威胁建模分析。
  BC-1950.50.20:
    name: 漏洞披露与响应
    description: |
      对产品漏洞进行协调披露和响应处理。
  BC-1950.50.30:
    name: 安全启动与证明
    description: |
      设备上的安全启动和远程证明机制。
  BC-1950.50.40:
    name: 产品网络安全合规
    description: |
      联网产品符合 IEC 62443 及等效制度的合规管理。
  BC-1950.60:
    name: 联网产品平台运营
    description: |
      支撑联网产品的工业 IoT 平台运营管理。
  BC-1950.60.10:
    name: 工业 IoT 平台租户管理
    description: |
      工业 IoT 平台上的租户引入和隔离管理。
  BC-1950.60.20:
    name: 平台容量与性能管理
    description: |
      平台容量规划和性能管理。
  BC-1950.60.30:
    name: 平台集成服务
    description: |
      平台与企业及客户系统的集成管理。
  BC-1950.60.40:
    name: 平台 API 全生命周期管理
    description: |
      平台对外 API 和 SDK 的全生命周期管理。
  BC-1950.70:
    name: 边缘与网关运营管理
    description: |
      现场边缘应用和网关设备的运营管理。
  BC-1950.70.10:
    name: 边缘应用部署
    description: |
      将边缘应用部署到网关和控制器。
  BC-1950.70.20:
    name: 网关配置管理
    description: |
      现场网关设备的配置管理。
  BC-1950.70.30:
    name: 边缘健康监控
    description: |
      边缘设备和应用的健康状态监控。

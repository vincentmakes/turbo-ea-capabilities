locale: zh
source: L1-wholesale-interconnect-roaming-management.yaml
entries:
  BC-2680:
    name: 批发、互联与漫游管理
    description: |
      向其他运营商和合作伙伴提供批发电信服务，涵盖批发产品定价、MVNO和MVNE合作关系、互联与对等互联、漫游合作伙伴关系、运营商间结算以及IRU和暗光纤等容量安排。
  BC-2680.10:
    name: 批发产品与定价管理
    description: |
      定义、定价并商务谈判面向运营商、MVNO和大型合作伙伴的批发报价。
  BC-2680.10.10:
    name: 批发资费设计
    description: |
      设计涵盖语音、数据、短信和容量产品的批发资费。
  BC-2680.10.20:
    name: 批发报价发布
    description: |
      向合作伙伴渠道和监管要求的参考报价发布批发报价。
  BC-2680.10.30:
    name: 批发商务谈判
    description: |
      就批发协议和特殊条款进行双边商务谈判。
  BC-2680.20:
    name: MVNO与MVNE合作伙伴管理
    description: |
      开展MVNO和MVNE合作伙伴的入网对接和持续管理，包括BSS集成和商务治理。
  BC-2680.20.10:
    name: MVNO入网对接
    description: |
      按商务、监管和技术准备标准完成新MVNO和MVNE合作伙伴的入网对接。
  BC-2680.20.20:
    name: MVNO BSS集成
    description: |
      将MVNO合作伙伴与宿主BSS集成，用于开通、费率计算和报表。
  BC-2680.20.30:
    name: MVNO商务管理
    description: |
      对MVNO合作伙伴开展持续商务治理、绩效评审和退出管理。
  BC-2680.30:
    name: 互联协议管理
    description: |
      管理语音和IP互联安排，包括对等互联和转接。
  BC-2680.30.10:
    name: 对等互联协议管理
    description: |
      管理IP对等互联协议及相关商务和运营条款。
  BC-2680.30.20:
    name: 转接协议管理
    description: |
      管理与上游提供商签订的语音和IP转接协议。
  BC-2680.30.30:
    name: 流量交换量测量
    description: |
      测量与对等互联方和转接提供商交换的流量，用于结算和工程规划。
  BC-2680.40:
    name: 漫游合作伙伴管理
    description: |
      建立和运营与国际合作伙伴网络的漫游关系。
  BC-2680.40.10:
    name: 漫游协议管理
    description: |
      谈判并管理双边漫游协议的全生命周期。
  BC-2680.40.20:
    name: TAP文件交换
    description: |
      与漫游合作伙伴交换TAP文件，用于使用量结算。
  BC-2680.40.30:
    name: 漫游合作伙伴入网
    description: |
      完成新漫游合作伙伴的技术和商务入网，包括IREG和TADIG测试。
  BC-2680.50:
    name: 运营商间结算管理
    description: |
      处理漫游和互联的运营商间使用量结算和争议。
  BC-2680.50.10:
    name: TAP与NRTRDE结算
    description: |
      基于TAP和近实时NRTRDE记录进行漫游使用量结算。
  BC-2680.50.20:
    name: 互联结算
    description: |
      向互联合作伙伴计收终结、发起和转接话务的费用。
  BC-2680.50.30:
    name: 结算争议解决
    description: |
      解决运营商间结算账单上提出的争议。
  BC-2680.50.40:
    name: 结算核对
    description: |
      将运营商间结算记录与内部财务和资金进行核对。
  BC-2680.60:
    name: 批发容量与IRU管理
    description: |
      管理长期批发容量安排，包括不可撤销使用权和暗光纤租赁。
  BC-2680.60.10:
    name: 不可撤销使用权管理
    description: |
      出售和购买长途及海缆容量上的不可撤销使用权。
  BC-2680.60.20:
    name: 暗光纤管理
    description: |
      向合作伙伴出租和管理暗光纤芯资源。
  BC-2680.60.30:
    name: 容量租赁管理
    description: |
      管理城域、长途和海底路由上的周期性容量租赁。

locale: zh
source: L1-electrical-product-qualification-management.yaml
entries:
  BC-1920:
    name: 电气产品鉴定管理
    description: |
      对代表性样品进行型式试验统筹管理，涵盖介电、短路、EMC、气候、机械及寿命试验，包括认可实验室运营。
  BC-1920.10:
    name: 试验计划与规范管理
    description: |
      依据产品标准编制和审批试验计划与规范。
  BC-1920.10.10:
    name: 试验规范编制
    description: |
      编制详细的试验规范。
  BC-1920.10.20:
    name: 试验计划审批
    description: |
      由工程、质量和认证相关方审批试验计划。
  BC-1920.10.30:
    name: 试验样品分配
    description: |
      分配和管理代表性试验样品。
  BC-1920.10.40:
    name: 试验程序维护
    description: |
      标准试验程序的维护与修订。
  BC-1920.20:
    name: 介电与高压试验
    description: |
      绝缘、介电耐压、局部放电及冲击试验。
  BC-1920.20.10:
    name: 绝缘电阻测试
    description: |
      在规定条件下测量绝缘电阻。
  BC-1920.20.20:
    name: 介电耐压试验
    description: |
      在额定应力水平下进行交流和直流介电耐压试验。
  BC-1920.20.30:
    name: 局部放电测量
    description: |
      测量绝缘系统中的局部放电。
  BC-1920.20.40:
    name: 冲击电压试验
    description: |
      雷电和操作冲击耐压试验。
  BC-1920.30:
    name: 短路与开断试验
    description: |
      在额定故障条件下验证短路和开断性能。
  BC-1920.30.10:
    name: 短路关合容量试验
    description: |
      验证额定短路条件下的关合容量。
  BC-1920.30.20:
    name: 短路开断容量试验
    description: |
      验证额定故障水平下的开断容量。
  BC-1920.30.30:
    name: 开断耐久试验
    description: |
      重复开断条件下的机械和电气耐久性试验。
  BC-1920.30.40:
    name: 电弧故障试验
    description: |
      电弧故障遏制和电弧闪光性能试验。
  BC-1920.40:
    name: EMC 与 EMI 测试
    description: |
      传导和辐射发射及抗扰度测试。
  BC-1920.40.10:
    name: 传导发射测试
    description: |
      测量电源线和信号线上的传导发射。
  BC-1920.40.20:
    name: 辐射发射测试
    description: |
      测量辐射电磁发射。
  BC-1920.40.30:
    name: EMC 抗扰度测试
    description: |
      验证对传导和辐射骚扰的抗扰度。
  BC-1920.40.40:
    name: ESD 与浪涌抗扰度测试
    description: |
      静电放电和浪涌抗扰度测试。
  BC-1920.50:
    name: 环境与气候试验
    description: |
      产品的气候、腐蚀、防护及暴露试验。
  BC-1920.50.10:
    name: 温湿度循环试验
    description: |
      温湿度循环和稳态应力试验。
  BC-1920.50.20:
    name: 盐雾与腐蚀试验
    description: |
      盐雾和腐蚀性气氛暴露试验。
  BC-1920.50.30:
    name: 防护等级试验
    description: |
      针对粉尘和水的防护等级验证。
  BC-1920.50.40:
    name: 太阳辐射与紫外线暴露试验
    description: |
      太阳辐射和紫外线暴露试验。
  BC-1920.60:
    name: 机械与振动试验
    description: |
      振动、冲击、机械耐久及抗震鉴定试验。
  BC-1920.60.10:
    name: 振动与冲击试验
    description: |
      正弦、随机及冲击振动试验。
  BC-1920.60.20:
    name: 机械耐久试验
    description: |
      运行循环下的机械耐久性试验。
  BC-1920.60.30:
    name: 跌落与撞击试验
    description: |
      产品和包装的跌落、自由落体及撞击试验。
  BC-1920.60.40:
    name: 抗震鉴定试验
    description: |
      电力和变电站设备的抗震鉴定试验。
  BC-1920.70:
    name: 加速寿命与可靠性试验
    description: |
      加速寿命、应力筛选及可靠性验证试验。
  BC-1920.70.10:
    name: 高加速寿命试验
    description: |
      通过阶梯应力暴露设计裕度的 HALT 试验。
  BC-1920.70.20:
    name: 高加速应力筛选
    description: |
      检测潜在缺陷的 HASS 生产筛选试验。
  BC-1920.70.30:
    name: 可靠性验证试验
    description: |
      针对可靠性目标的验证性试验。
  BC-1920.70.40:
    name: 老化试验
    description: |
      通电老化以提前暴露早期失效。
  BC-1920.80:
    name: 试验实验室运营管理
    description: |
      认可内部试验实验室的运营管理。
  BC-1920.80.10:
    name: 试验实验室认可
    description: |
      维持 ISO/IEC 17025 认可范围。
  BC-1920.80.20:
    name: 试验设备校准
    description: |
      试验设备的校准与溯源管理。
  BC-1920.80.30:
    name: 试验数据记录管理
    description: |
      试验数据和报告的长期记录管理。
  BC-1920.80.40:
    name: 实验室间比对
    description: |
      跨实验室的能力验证轮次比对。

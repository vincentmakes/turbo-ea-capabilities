locale: zh
source: L1-mission-management.yaml
entries:
  BC-1700:
    name: 任务管理
    description: |
      覆盖任务规划、指挥控制、执行与任务后评估，确保作战任务的高效达成。
  BC-1700.10:
    name: 任务规划管理
    description: |
      统筹任务目标、路线、打击目标与兵力规划，为任务执行提供全面准备。
  BC-1700.10.10:
    name: 任务目标制定
    description: |
      明确任务目标与指挥官意图，确立行动方向。
  BC-1700.10.20:
    name: 兵力与资产规划
    description: |
      规划兵力编成与作战资产分配。
  BC-1700.10.30:
    name: 航线与打击目标规划
    description: |
      开展航线规划与打击目标选定。
  BC-1700.10.40:
    name: 任务风险评估
    description: |
      评估作战风险并确认交战规则。
  BC-1700.10.50:
    name: 任务命令生成
    description: |
      生成任务命令与任务分配文件。
  BC-1700.20:
    name: 指挥控制运营管理
    description: |
      统筹指挥控制运营、态势感知与决策支持，确保指挥链高效运转。
  BC-1700.20.10:
    name: 共同作战图维护
    description: |
      维护共同作战图，保障战场态势感知的实时准确性。
  BC-1700.20.20:
    name: 战术决策支持
    description: |
      提供决策支持工具与建议，辅助指挥员快速决策。
  BC-1700.20.30:
    name: 指挥控制通信管理
    description: |
      管理指挥控制通信网络与战术通信。
  BC-1700.20.40:
    name: 跨层级协调
    description: |
      在战役与战术各层级间开展协调配合。
  BC-1700.30:
    name: 任务执行管理
    description: |
      统筹实时任务执行与战术控制，确保任务按计划推进。
  BC-1700.30.10:
    name: 战术执行协调
    description: |
      对任务各要素开展实时战术协调。
  BC-1700.30.20:
    name: 动态重新分配
    description: |
      在执行过程中开展动态任务重新分配与计划调整。
  BC-1700.30.30:
    name: 任务效果评估
    description: |
      开展实时与战斗毁伤评估，评价任务执行效果。
  BC-1700.40:
    name: 任务预演与仿真管理
    description: |
      统筹任务预演与仿真训练，提升部队实战能力。
  BC-1700.40.10:
    name: 任务预演方案设计
    description: |
      设计任务预演演练方案。
  BC-1700.40.20:
    name: 实况、虚拟与构造仿真
    description: |
      管理LVC（实况-虚拟-构造）仿真训练环境。
  BC-1700.40.30:
    name: 预演绩效评估
    description: |
      评估部队在预演中的表现与能力水平。
  BC-1700.50:
    name: 任务讲评与经验教训管理
    description: |
      统筹任务后讲评、行动后检查与经验教训提炼，推动持续能力改进。
  BC-1700.50.10:
    name: 任务讲评实施
    description: |
      实施任务讲评与行动后检查（AAR）。
  BC-1700.50.20:
    name: 经验教训采集
    description: |
      采集并系统整理经验教训。
  BC-1700.50.30:
    name: 经验教训落实追踪
    description: |
      追踪已识别改进措施的落实情况。

entries:
  BC-610:
    name: 信息与数据管理
    description: |
      管理数据治理、主数据、数据质量、分析及人工智能。
  BC-610.10:
    name: 数据治理管理
    description: |
      管理数据所有权、数据管理员、政策及标准。
  BC-610.10.10:
    name: 数据所有权与数据管理
    description: |
      分配并运营数据所有者和数据管理员角色。
  BC-610.10.20:
    name: 数据政策与标准
    description: |
      定义数据政策、标准及参考框架。
  BC-610.10.30:
    name: 数据目录与血缘
    description: |
      管理数据目录、术语表及端到端数据血缘。
  BC-610.10.40:
    name: 数据隐私与分类
    description: |
      对数据进行分类并执行隐私控制措施。
  BC-610.10.50:
    name: 数据风险与合规监控
    description: |
      监控数据风险及监管合规情况（如 BCBS 239、GDPR）。
  BC-610.20:
    name: 主数据管理
    description: |
      管理客户、产品、供应商、员工等主数据。
  BC-610.20.10:
    name: 客户主数据
    description: |
      管理并治理客户主数据。
  BC-610.20.20:
    name: 产品主数据
    description: |
      管理并治理产品及物料主数据。
  BC-610.20.30:
    name: 供应商主数据
    description: |
      管理并治理供应商主数据。
  BC-610.20.40:
    name: 员工主数据
    description: |
      管理并治理员工主数据。
  BC-610.20.50:
    name: 参考数据管理
    description: |
      管理参考数据集、代码列表及层级体系。
  BC-610.30:
    name: 数据质量管理
    description: |
      管理数据质量监控、剖析及修复。
  BC-610.30.10:
    name: 数据质量剖析
    description: |
      开展数据质量剖析、基线建立及评估。
  BC-610.30.20:
    name: 数据质量规则管理
    description: |
      定义、部署并监控数据质量规则。
  BC-610.30.30:
    name: 数据质量问题解决
    description: |
      对数据质量问题进行分类、修复及根本原因分析。
  BC-610.30.40:
    name: 数据质量报告
    description: |
      向数据所有者及高管报告数据质量记分卡。
  BC-610.40:
    name: 数据架构管理
    description: |
      管理逻辑及物理数据架构。
  BC-610.40.10:
    name: 概念与逻辑数据建模
    description: |
      建立企业概念及逻辑数据模型。
  BC-610.40.20:
    name: 数据平台架构
    description: |
      设计数据湖、数据仓库、数据湖仓及数据网格架构。
  BC-610.40.30:
    name: 数据集成架构
    description: |
      制定批量、流式及变更数据捕获的数据集成模式。
  BC-610.40.40:
    name: 数据存储与保留设计
    description: |
      设计数据存储方案，包括保留策略、归档及分层。
  BC-610.50:
    name: 分析与商业智能管理
    description: |
      管理报告、分析及商业智能交付。
  BC-610.50.10:
    name: 报告与仪表板交付
    description: |
      交付运营及管理报告与仪表板。
  BC-610.50.20:
    name: 自助分析
    description: |
      赋能业务自助分析及数据产品。
  BC-610.50.30:
    name: 高级分析与数据科学
    description: |
      开展高级分析、数据科学模型建设及实验。
  BC-610.50.40:
    name: 分析平台运营
    description: |
      运营商业智能及分析平台与内容库。
  BC-610.60:
    name: 人工智能管理
    description: |
      管理 AI/ML 模型全生命周期、MLOps 及负责任 AI。
  BC-610.60.10:
    name: AI 用例识别
    description: |
      识别并优先排序 AI/ML 用例。
  BC-610.60.20:
    name: 机器学习模型开发
    description: |
      开展特征工程、模型训练及验证。
  BC-610.60.30:
    name: MLOps 与模型部署
    description: |
      管理模型部署、监控及生命周期（MLOps）。
  BC-610.60.40:
    name: 负责任 AI 治理
    description: |
      推行负责任 AI 原则、风险评估及偏见监控。
  BC-610.60.50:
    name: 生成式 AI 管理
    description: |
      管理生成式 AI 用例、基础模型选型及护栏设置。

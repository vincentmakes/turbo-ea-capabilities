locale: zh
source: L1-engineering-document-management.yaml
entries:
  BC-1130:
    name: 工程文件管理
    description: |
      管理受控工程文件、图纸、规格书与供应商资料，确保文件完整、受控、可追溯。
  BC-1130.10:
    name: 文件控制管理
    description: |
      建立文件编号规则、版次控制与主文件台账，实现文件全程受控。
  BC-1130.10.10:
    name: 文件编号与编码
    description: |
      制定文件编号方案、分类体系与编码规则。
  BC-1130.10.20:
    name: 版次控制
    description: |
      跟踪文件版次、状态与历史记录。
  BC-1130.10.30:
    name: 主文件台账
    description: |
      维护主文件台账与文件状态。
  BC-1130.20:
    name: 图纸管理
    description: |
      管理图纸全生命周期，包括发布与审批。
  BC-1130.20.10:
    name: 图纸生产工作流
    description: |
      建立含校核、评审与发布的图纸生产工作流。
  BC-1130.20.20:
    name: 图纸审批与发布
    description: |
      向施工方与利益相关方审批并发布图纸。
  BC-1130.20.30:
    name: 图纸生命周期跟踪
    description: |
      跟踪图纸从初稿到竣工图的全生命周期。
  BC-1130.30:
    name: 规格书管理
    description: |
      管理技术规格书、数据表与标准合规。
  BC-1130.30.10:
    name: 技术规格书编写
    description: |
      编写技术规格书与数据表。
  BC-1130.30.20:
    name: 工程标准库
    description: |
      维护工程标准库与参考标准。
  BC-1130.30.30:
    name: 规格书审批与发布
    description: |
      向采购部门审批并发布规格书。
  BC-1130.40:
    name: 供应商文件管理
    description: |
      管理供应商资料要求、提交、评审与处置。
  BC-1130.40.10:
    name: 供应商资料要求定义
    description: |
      定义采购订单对应的供应商资料要求清单。
  BC-1130.40.20:
    name: 供应商文件提交跟踪
    description: |
      跟踪供应商文件提交情况与状态。
  BC-1130.40.30:
    name: 供应商文件评审与处置
    description: |
      评审供应商文件并作出处置决定（1类/2类/3类）。
  BC-1130.50:
    name: 文件分发与传递管理
    description: |
      管理文件传递单、正式往来函件与收件跟踪。
  BC-1130.50.10:
    name: 传递单签发
    description: |
      正式签发文件传递单。
  BC-1130.50.20:
    name: 分发矩阵管理
    description: |
      维护文件分发矩阵与收件人清单。
  BC-1130.50.30:
    name: 签收确认跟踪
    description: |
      跟踪文件签收情况并留存审计记录。
  BC-1130.60:
    name: 竣工文件管理
    description: |
      管理现场红线标注、竣工图汇总与移交文件包。
  BC-1130.60.10:
    name: 现场红线标注采集
    description: |
      采集施工期间的现场红线标注。
  BC-1130.60.20:
    name: 竣工图汇总
    description: |
      将红线标注汇总整合为竣工图可交付物。
  BC-1130.60.30:
    name: 移交文件包汇编
    description: |
      汇编运维移交文件包。

    description: |
      管理办公设备、端点管理及协作工具。
  BC-600.60:
    name: IT 应用管理
    description: |
      管理应用全生命周期、合理化及应用管理服务。
  BC-600.60.10:
    name: 应用组合管理
    description: |
      管理应用目录、归属权及生命周期状态。
  BC-600.60.20:
    name: 应用开发与工程
    description: |
      管理软件开发、工程实践及 DevOps。
  BC-600.60.30:
    name: 应用维护与支持
    description: |
      提供应用管理服务、缺陷修复及小型增强交付。
  BC-600.60.40:
    name: 应用合理化
    description: |
      开展应用合理化、整合及下线。
  BC-600.60.50:
    name: 集成与 API 管理
    description: |
      管理集成平台、API 及事件流。
  BC-600.70:
    name: IT 供应商管理
    description: |
      管理 IT 供应商合同、绩效及生态系统。

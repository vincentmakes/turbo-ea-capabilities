    description: |
      管理计算、存储、网络及云基础设施。
  BC-600.50.10:
    name: 计算与服务器管理
    description: |
      供应并运营物理及虚拟计算资源。
  BC-600.50.20:
    name: 存储管理
    description: |
      管理存储供应、分层及数据保护。
  BC-600.50.30:
    name: 网络管理
    description: |

    description: |
      入驻并签约 IT 供应商及合作伙伴。
  BC-600.70.20:
    name: IT 供应商绩效管理
    description: |
      管理 IT 供应商绩效记分卡及服务水平协议。
  BC-600.70.30:
    name: 软件许可管理
    description: |
      管理软件许可、授权使用权及审计。
  BC-600.70.40:
    name: IT 寻源策略
    description: |
      制定 IT 自建与外购及托管服务的寻源策略。
  BC-600.80:
    name: IT 财务管理
    description: |
      管理 IT 支出、费用分摊/展示及 IT 成本优化。
  BC-600.80.10:
    name: IT 预算与预测
    description: |
      开展 IT 预算规划、预测及差异分析。
  BC-600.80.20:
    name: IT 成本分摊与计费
    description: |
      实施费用展示、计费及基于技术业务管理的成本分摊。
  BC-600.80.30:
    name: 云 FinOps 管理
    description: |
      推行 FinOps 实践以实现云成本可见性及优化。
  BC-600.80.40:
    name: IT 价值与收益跟踪
    description: |
      跟踪 IT 投资价值及收益实现情况。

source: L1-information-technology-management.yaml
entries:
  BC-600:
    name: 信息技术管理
    description: |
      管理 IT 战略、架构、服务及运营。
  BC-600.10:
    name: IT 战略与架构管理
    description: |
      管理 IT 战略、企业架构及技术标准。
  BC-600.10.10:
    name: IT 战略制定
    description: |
      制定与业务战略对齐的 IT 战略。
  BC-600.10.20:
    name: 企业架构管理
    description: |
      按照 TOGAF 框架管理业务、数据、应用及技术四层企业架构。
  BC-600.10.30:
    name: 技术标准管理
    description: |
      定义并治理技术标准与设计模式。
  BC-600.10.40:
    name: 技术路线图管理
    description: |
      制定多年期技术路线图及能力演进计划。
  BC-600.10.50:
    name: 架构治理与评审
    description: |
      运营架构评审委员会、设计权威机构及例外治理。
  BC-600.20:
    name: IT 组合与需求管理
    description: |
      管理 IT 组合、需求受理及优先级排序。
  BC-600.20.10:
    name: IT 需求受理
    description: |
      受理并分类来自业务的新 IT 需求。
  BC-600.20.20:
    name: IT 投资组合管理
    description: |
      提供 IT 投资、项目及收益的全组合视图。
  BC-600.20.30:
    name: IT 产能与资源规划
    description: |
      跨团队和技能规划 IT 交付产能。
  BC-600.20.40:
    name: 业务关系管理
    description: |
      管理 IT 与业务职能部门之间的合作伙伴关系。
  BC-600.30:
    name: IT 服务管理
    description: |
      管理事故、问题、变更、服务目录及 ITSM。
  BC-600.30.10:
    name: 服务目录管理
    description: |
      定义并维护服务目录及服务水平协议。
  BC-600.30.20:
    name: 事故管理
    description: |
      管理事故检测、分类、解决及沟通。
  BC-600.30.30:
    name: 问题管理
    description: |
      开展根本原因分析并防止事故重复发生。
  BC-600.30.40:
    name: 变更与发布管理
    description: |
      管理 IT 变更审批及发布流程。
  BC-600.30.50:
    name: 服务水平管理
    description: |
      定义、测量并报告服务水平。
  BC-600.30.60:
    name: 配置管理
    description: |
      管理配置项、配置管理数据库及依赖关系。
  BC-600.40:
    name: IT 运营管理
    description: |
      管理日常 IT 运营、监控及自动化。
  BC-600.40.10:
    name: 事件与监控管理
    description: |
      管理遥测、可观测性、事件关联及告警。
  BC-600.40.20:
    name: IT 作业调度与批量运营
    description: |
      管理作业调度、批量编排及工作负载自动化。
  BC-600.40.30:
    name: IT 容量与性能管理
    description: |
      跨服务开展容量规划及性能优化。
  BC-600.40.40:

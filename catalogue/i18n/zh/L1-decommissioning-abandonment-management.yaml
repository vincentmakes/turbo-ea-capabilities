locale: zh
source: L1-decommissioning-abandonment-management.yaml
entries:
  BC-3120:
    name: 退役与弃井管理
    description: |
      石油资产的晚期生命管理，涵盖油气井永久弃井、设施退役、管道退役、场地恢复、退役负债拨备及关闭后监测。
  BC-3120.10:
    name: 油气井永久弃井作业
    description: |
      设计和执行永久性油气井弃井作业。
    in_scope:
      - 永久弃井设计和屏障验证
      - 弃井作业执行
      - 井口和导管切割与回收
    out_of_scope:
      - 生产井完整性监控（BC-3020.50）
  BC-3120.10.10:
    name: 永久弃井设计
    description: |
      为油气井废弃设计永久屏障配置方案。
  BC-3120.10.20:
    name: 永久弃井执行
    description: |
      执行固井、桥塞安置和屏障验证作业。
  BC-3120.10.30:
    name: 井口切割与回收
    description: |
      切割和回收井口、导管和套管柱。
  BC-3120.20:
    name: 地面设施退役
    description: |
      对上游和中游地面及水下设施进行退役、移除和回收。
  BC-3120.20.10:
    name: 上部模块移除规划
    description: |
      对上部模块移除和反向安装方法进行工程规划。
  BC-3120.20.20:
    name: 上部模块移除执行
    description: |
      执行整体吊装、模块化或化整为零的上部模块移除作业。
  BC-3120.20.30:
    name: 水下设备回收
    description: |
      回收水下采油树、管汇、跨接管和脐带缆。
  BC-3120.30:
    name: 管道退役
    description: |
      对废弃管道进行退役、移除或就地处置决策。
  BC-3120.30.10:
    name: 管道冲洗与清洁
    description: |
      在退役前对管道进行冲洗、清洁和惰化处理。
  BC-3120.30.20:
    name: 管道退役决策
    description: |
      对管道移除与就地退役进行比较评估。
  BC-3120.30.30:
    name: 管道退役执行
    description: |
      执行管道移除、切割吊装或就地留置作业。
  BC-3120.40:
    name: 场地恢复与修复
    description: |
      开展陆上和水下场地恢复、土壤和沉积物修复及海底清场验证。
  BC-3120.40.10:
    name: 土壤与沉积物修复
    description: |
      对退役场地受污染的土壤和沉积物进行修复。
  BC-3120.40.20:
    name: 植被恢复
    description: |
      对陆上退役场地进行复绿和地形修复。
  BC-3120.40.30:
    name: 水下场地清场
    description: |
      开展水下海床清场验证和水下落物回收。
  BC-3120.50:
    name: 退役负债管理
    description: |
      对退役义务进行成本估算、拨备和担保金缴纳。
  BC-3120.50.10:
    name: 弃置费用估算
    description: |
      对退役和弃置费用进行概率性估算。
  BC-3120.50.20:
    name: 退役拨备
    description: |
      按会计准则要求维护退役拨备。
  BC-3120.50.30:
    name: 退役担保金缴纳
    description: |
      向东道国政府缴纳和续期退役担保金。
  BC-3120.60:
    name: 关闭后监测
    description: |
      关闭后开展长期环境监测和残余负债跟踪。
  BC-3120.60.10:
    name: 长期环境监测
    description: |
      开展长期地下水、土壤和海洋环境监测。
  BC-3120.60.20:
    name: 残余负债跟踪
    description: |
      跟踪关闭后的残余负债和赔偿责任。

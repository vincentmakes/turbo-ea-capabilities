locale: zh
source: L1-utility-customer-metering-management.yaml
entries:
  BC-3910:
    name: 公用事业客户计量管理
    description: |
      从供电点到计费输入的公用事业特定客户和计量运营，涵盖公用事业客户账户、电表资产、AMI/智能电表数据采集、电表读数与验证、电表到现金输入，以及服务接入和断开，以及弱势客户保护。
  BC-3910.10:
    name: 公用事业客户账户管理
    description: |
      公用事业特定客户账户全生命周期，涵盖供电点标识符、用电变更和费率分配。
  BC-3910.10.10:
    name: 供电点注册
    description: |
      注册和维护供电点标识符（MPAN、MPRN、SPID）。
  BC-3910.10.20:
    name: 用电变更运营
    description: |
      处理公用事业供电点的迁入、迁出和租户变更。
  BC-3910.10.30:
    name: 客户费率分配
    description: |
      将客户分配至适用的费率计划和产品选项。
  BC-3910.20:
    name: 电表资产管理
    description: |
      对实物电表和通信资产进行全生命周期管理，包括库存、安装、更换和回收。
  BC-3910.20.10:
    name: 电表库存运营
    description: |
      对电表资产进行库存管理、调试和退役。
  BC-3910.20.20:
    name: 电表安装运营
    description: |
      现场安装新表和换表。
  BC-3910.20.30:
    name: 电表回收与处置
    description: |
      回收、翻新和对废旧电表资产进行寿命终止处置。
  BC-3910.30:
    name: AMI数据采集运营
    description: |
      通过主站系统、通信网络和用电数据管理系统采集高级计量基础设施（AMI）数据。
    in_scope:
      - 智能电表主站运营
      - 通信网络和集中器监测
      - 用电数据管理系统数据接入
    out_of_scope:
      - 电表实物安装（BC-3910.20.20）
      - 交易侧汇总需求（BC-3850.30.10）
  BC-3910.30.10:
    name: 主站系统运营
    description: |
      运营智能电表主站系统并签发电表命令。
  BC-3910.30.20:
    name: AMI通信网络运营
    description: |
      运营射频、电力线载波和蜂窝AMI通信网络及集中器。
  BC-3910.30.30:
    name: 用电数据管理系统数据接入
    description: |
      将分时和累计读数接入用电数据管理系统。
  BC-3910.40:
    name: 电表读数与验证
    description: |
      对电表进行周期性和事件驱动的读数采集，以及用电数据的验证、估算和编辑。
  BC-3910.40.10:
    name: 人工与车载抄表运营
    description: |
      对非AMI电表进行步行路线、车载和AMR抄表作业。
  BC-3910.40.20:
    name: 验证、估算与编辑
    description: |
      对累计读数和分时读数进行VEE处理，生成计费质量数据。
  BC-3910.40.30:
    name: 用电量汇总
    description: |
      将用电量汇总至计费周期和结算曲线。
  BC-3910.50:
    name: 电表到现金运营
    description: |
      准备用于计费的公用事业特定用电数据，包括账单异常处理和收入漏损检测。
  BC-3910.50.10:
    name: 账单决定因素准备
    description: |
      为计费系统准备账单决定因素——用电量、需量和无功量。
  BC-3910.50.20:
    name: 账单异常处理
    description: |
      调查和解决账单异常及电表数据异常问题。
  BC-3910.50.30:
    name: 收入保护运营
    description: |
      检测并现场调查电表篡改和电力或水源盗用行为。
  BC-3910.60:
    name: 服务接入与断开运营
    description: |
      在客户界面激活、停用和运营预付费模式的公用事业供电。
  BC-3910.60.10:
    name: 供电激活运营
    description: |
      激活新建和恢复供电，包括远程送电。
  BC-3910.60.20:
    name: 欠费断电
    description: |
      按法律和监管保护措施执行断电程序。
  BC-3910.60.30:
    name: 预付费模式运营
    description: |
      运营预付费电表和充值渠道。
  BC-3910.70:
    name: 弱势客户管理
    description: |
      识别和保护处于弱势境况的客户，包括优先服务名册和优惠计划。
  BC-3910.70.10:
    name: 优先服务名册运营
    description: |
      维护优先服务名册和定制化支持标识。
  BC-3910.70.20:
    name: 困难补助与优惠计划运营
    description: |
      为公用事业客户管理社会性费率和困难补助金计划。
  BC-3910.70.30:
    name: 医疗设备客户管理
    description: |
      管理依赖医疗或透析设备客户的停电规划事宜。

locale: zh
source: L1-air-traffic-flow-management.yaml
entries:
  BC-1220:
    name: 空中交通流量管理
    description: |
      负责容量规划、流量调控、时隙分配及需求容量平衡，优化整个航路网络的交通流量。
  BC-1220.10:
    name: 容量规划管理
    description: |
      开展扇区和机场容量评估，设定声明容量，为流量管理决策提供依据。
  BC-1220.10.10:
    name: 扇区容量评估
    description: |
      通过工作负荷测量评估扇区容量，确定安全可接受的流量水平。
  BC-1220.10.20:
    name: 机场容量声明
    description: |
      声明机场跑道及停机坪容量，为时刻协调提供基础数据。
  BC-1220.10.30:
    name: 战略容量规划
    description: |
      制定多年期 ATC 战略容量规划，支持网络基础设施的长期发展决策。
  BC-1220.20:
    name: 流量调控管理
    description: |
      制定并实施空中交通流量与容量管理（ATFCM）措施、流量管控规定及绕飞方案。
  BC-1220.20.10:
    name: 流量措施定义
    description: |
      按扇区和机场定义 ATFCM 措施，针对性地解决容量约束问题。
  BC-1220.20.20:
    name: 绕飞方案管理
    description: |
      提出并实施绕飞方案及备选路径，在容量受限时疏导交通流量。
  BC-1220.20.30:
    name: 战术流量调整
    description: |
      实时调整战术流量措施，快速响应动态变化的交通态势。
  BC-1220.30:
    name: 时隙分配管理
    description: |
      管理计算起飞时间（CTOT）、时隙分配及时隙互换，确保流量均衡分配。
  BC-1220.30.10:
    name: 计算起飞时间签发
    description: |
      计算并向空域用户签发 CTOT，协调飞机按计划时序离港。
  BC-1220.30.20:
    name: 时隙互换与优化
    description: |
      处理时隙互换、时隙改善申请及目标时间更新，提高时隙利用效率。
  BC-1220.30.30:
    name: 离港时隙合规监控
    description: |
      监控时隙遵守情况及豁免申请，保障流量管理措施的执行效果。
  BC-1220.40:
    name: 网络绩效管理
    description: |
      监控网络绩效并生成关键绩效指标报告，支持持续改进。
  BC-1220.40.10:
    name: 网络关键绩效指标监控
    description: |
      监控网络关键绩效指标（延误、容量、可预测性），及时发现绩效偏差。
  BC-1220.40.20:
    name: 绩效报告
    description: |
      向网络管理机构和单一欧洲天空（SES）监管机构提交绩效报告。
  BC-1220.40.30:
    name: 运营后分析
    description: |
      对流量运行情况和瓶颈节点进行运营后分析，为改进措施提供数据支撑。
  BC-1220.50:
    name: 需求容量平衡管理
    description: |
      开展预战术和战术需求容量平衡，减少航班延误并提高网络整体效率。
  BC-1220.50.10:
    name: 战略需求容量平衡
    description: |
      在网络层面开展长期需求容量平衡，识别和应对结构性容量不足问题。
  BC-1220.50.20:
    name: 预战术需求容量平衡
    description: |
      在前一天（D-1）开展预战术需求容量平衡，提前优化次日流量安排。
  BC-1220.50.30:
    name: 战术需求容量平衡
    description: |
      实时开展战术需求容量平衡，动态响应当日运营中的容量变化。
  BC-1220.50.40:
    name: 协同决策
    description: |
      与空域用户和机场开展协同决策（CDM），提高整体流量管理决策质量。

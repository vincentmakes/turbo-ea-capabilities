locale: zh
source: L1-clinical-trials-management.yaml
entries:
  BC-1520:
    name: 临床试验管理
    description: |
      覆盖临床研究的规划、执行与监查，确保试验高效、合规地产出高质量数据。
  BC-1520.10:
    name: 临床试验设计管理
    description: |
      统筹方案设计、统计方法与终点定义，为试验成功奠定科学基础。
  BC-1520.10.10:
    name: 临床方案撰写
    description: |
      撰写临床研究方案，明确研究目标、设计与实施程序。
  BC-1520.10.20:
    name: 统计分析计划制定
    description: |
      制定统计方法与分析计划，确保数据分析的科学严谨性。
  BC-1520.10.30:
    name: 终点与结局定义
    description: |
      定义主要、次要及探索性终点与研究结局指标。
  BC-1520.10.40:
    name: 适应性设计管理
    description: |
      设计适应性试验与平台试验，提升临床开发灵活性。
  BC-1520.20:
    name: 临床试验中心管理
    description: |
      统筹中心遴选、激活与监督，确保研究中心按时高质量运转。
  BC-1520.20.10:
    name: 中心识别与可行性评估
    description: |
      识别研究者中心并开展可行性评估，支持中心筛选决策。
  BC-1520.20.20:
    name: 中心激活
    description: |
      完成中心激活，涵盖伦理审查、法规批准与合同签署。
  BC-1520.20.30:
    name: 研究者与中心培训
    description: |
      向研究者及中心人员提供方案与流程培训。
  BC-1520.20.40:
    name: 中心绩效管理
    description: |
      追踪中心绩效指标并实施改善措施。
  BC-1520.30:
    name: 临床试验受试者管理
    description: |
      统筹受试者招募、筛选、保留与知情同意，保障试验入组目标达成。
  BC-1520.30.10:
    name: 受试者招募
    description: |
      通过数字化等多渠道开展受试者招募。
  BC-1520.30.20:
    name: 知情同意管理
    description: |
      管理知情同意的获取流程，支持电子知情同意实施。
  BC-1520.30.30:
    name: 受试者筛选与入组
    description: |
      按纳入/排除标准开展受试者筛选与入组。
  BC-1520.30.40:
    name: 受试者保留
    description: |
      实施受试者保留策略与患者参与管理，降低脱落率。
  BC-1520.40:
    name: 临床数据管理
    description: |
      统筹电子数据采集、数据查询、标准化与数据库锁库，确保数据质量。
  BC-1520.40.10:
    name: EDC与CRF管理
    description: |
      搭建电子数据采集系统并设计病例报告表。
  BC-1520.40.20:
    name: 临床数据查询管理
    description: |
      发起、解答数据查询并完成数据清理工作。
  BC-1520.40.30:
    name: 临床数据标准化
    description: |
      按CDISC SDTM/ADaM标准开展临床数据标准化。
  BC-1520.40.40:
    name: 数据库锁库与归档
    description: |
      完成数据库锁库、归档及申报数据包准备。
  BC-1520.50:
    name: 临床试验监查管理
    description: |
      统筹现场监查、基于风险的监查与质量审计，保障试验合规性。
  BC-1520.50.10:
    name: 现场监查
    description: |
      开展现场原始数据核查与监查访视。
  BC-1520.50.20:
    name: 集中化与基于风险的监查
    description: |
      实施集中化与基于风险的监查项目。
  BC-1520.50.30:
    name: 临床质量审计
    description: |
      对试验、中心及供应商开展GCP质量审计。
  BC-1520.60:
    name: 临床试验药物供应管理
    description: |
      统筹IMP供应、分发、随机化与药物责任核查，确保试验药物全程可追溯。
  BC-1520.60.10:
    name: IMP生产与包装
    description: |
      生产并包装研究药物。
  BC-1520.60.20:
    name: IMP配送与仓库运营
    description: |
      管理IMP仓库与全球配送运营。
  BC-1520.60.30:
    name: 随机化与IRT系统运营
    description: |
      运营IRT/IWRS随机化系统与试验用药物供应管理。
  BC-1520.60.40:
    name: IMP责任核查与核对
    description: |
      管理IMP责任核查、退还与销毁流程。
  BC-1520.70:
    name: 临床外包与CRO管理
    description: |
      统筹CRO遴选、合同签署与绩效监督，确保外包活动质量达标。
  BC-1520.70.10:
    name: CRO遴选与合同签署
    description: |
      开展CRO遴选、工作范围界定与合同谈判。
  BC-1520.70.20:
    name: CRO绩效监督
    description: |
      申办方对CRO绩效与关键绩效指标的持续监督。
  BC-1520.70.30:
    name: 供应商质量监督
    description: |
      对临床供应商与实验室实施质量监督。

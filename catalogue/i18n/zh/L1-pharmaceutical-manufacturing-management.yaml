locale: zh
source: L1-pharmaceutical-manufacturing-management.yaml
entries:
  BC-1550:
    name: 制药生产管理
    description: |
      覆盖原料药与药品的GMP合规生产，确保产品质量、安全性与供应稳定性。
  BC-1550.10:
    name: 原料药生产管理
    description: |
      统筹活性药物成分（API）的生产运营，确保质量与产能满足供应需求。
  BC-1550.10.10:
    name: 小分子原料药合成
    description: |
      合成小分子活性药物成分，满足药品生产需求。
  BC-1550.10.20:
    name: 生物制品原料药生产
    description: |
      通过细胞培养与发酵工艺生产生物制品原料药。
  BC-1550.10.30:
    name: 原料药纯化
    description: |
      对活性药物成分开展下游纯化处理。
  BC-1550.20:
    name: 药品生产管理
    description: |
      统筹片剂、胶囊、液体及生物制品等药品生产运营。
  BC-1550.20.10:
    name: 固体制剂生产
    description: |
      负责片剂与胶囊的生产运营。
  BC-1550.20.20:
    name: 液体及半固体制剂生产
    description: |
      负责液体、混悬液及半固体剂型的生产运营。
  BC-1550.20.30:
    name: 生物制品药品灌装与完成
    description: |
      负责生物制品药品的灌装与完成工序。
  BC-1550.20.40:
    name: 吸入与特殊剂型生产
    description: |
      负责吸入制剂、透皮制剂及特殊剂型的生产运营。
  BC-1550.30:
    name: 无菌生产管理
    description: |
      统筹无菌灌装与终端灭菌生产，确保产品无菌保证水平达标。
  BC-1550.30.10:
    name: 无菌灌装操作
    description: |
      按附录1要求开展无菌灌装生产操作。
  BC-1550.30.20:
    name: 终端灭菌操作
    description: |
      开展药品终端灭菌工艺处理。
  BC-1550.30.30:
    name: 洁净室运营
    description: |
      运营洁净级别受控的洁净室并实施环境监测。
  BC-1550.40:
    name: 包装与贴签管理
    description: |
      统筹一级与二级包装及贴签生产运营，确保产品包装合规。
  BC-1550.40.10:
    name: 一级包装操作
    description: |
      负责药品一级包装生产操作。
  BC-1550.40.20:
    name: 二级包装操作
    description: |
      负责二级包装、装盒与捆扎操作。
  BC-1550.40.30:
    name: 贴签操作
    description: |
      完成标签粘贴与序列化标识操作。
  BC-1550.40.40:
    name: 后期定制化
    description: |
      开展后期定制化与国别特定包装操作。
  BC-1550.50:
    name: 验证与确认管理
    description: |
      统筹工艺、设备、清洁及计算机系统验证，确保GMP合规性。
  BC-1550.50.10:
    name: 工艺验证
    description: |
      按ICH Q7要求开展生产工艺验证。
  BC-1550.50.20:
    name: 设备确认
    description: |
      对GMP设备开展IQ、OQ、PQ确认。
  BC-1550.50.30:
    name: 清洁验证
    description: |
      在产品切换过程中开展清洁验证。
  BC-1550.50.40:
    name: 计算机系统验证
    description: |
      按GAMP 5及21 CFR Part 11要求开展计算机系统验证（CSV）。
  BC-1550.60:
    name: 技术转移管理
    description: |
      统筹不同生产地点间的技术转移与放大活动，实现工艺的成功迁移。
  BC-1550.60.10:
    name: 技术转移规划
    description: |
      规划生产地点间的技术转移工作。
  BC-1550.60.20:
    name: 工艺放大
    description: |
      从中试规模放大至商业化生产规模。
  BC-1550.60.30:
    name: 接收场地准备验证
    description: |
      验证接收场地具备承接技术转移的准备状态。
  BC-1550.70:
    name: GMP生产运营管理
    description: |
      统筹日常GMP生产与批记录执行，确保生产连续稳定运营。
  BC-1550.70.10:
    name: 批记录执行
    description: |
      执行纸质或电子批记录。
  BC-1550.70.20:
    name: 过程控制取样
    description: |
      开展过程控制取样与检测。
  BC-1550.70.30:
    name: 生产线清场
    description: |
      完成生产线清场与品种切换操作。
  BC-1550.70.40:
    name: GMP操作工培训
    description: |
      对操作工开展GMP培训与资格认证。

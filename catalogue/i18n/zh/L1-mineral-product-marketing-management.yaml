locale: zh
source: L1-mineral-product-marketing-management.yaml
entries:
  BC-4480:
    name: 矿产品销售管理
    description: |
      开展精矿、中间产品和成品金属的销售、包销协议、治炼费与精炼费谈判、暂定价格结算、物流协调和贸易风险管理。
  BC-4480.10:
    name: 精矿与金属销售
    description: |
      执行精矿和成品金属的即期及长期销售，并开展客户分配规划。
    in_scope:
      - 即期和长期合同销售
      - 跨矿山和精炼厂的客户分配规划
    out_of_scope:
      - 暂定价格结算计算（BC-4480.40）
  BC-4480.10.10:
    name: 即期销售执行
    description: |
      向贸易商和终端客户执行精矿和金属的即期销售。
  BC-4480.10.20:
    name: 长期合同管理
    description: |
      管理精矿和金属的多年长期销售合同。
  BC-4480.10.30:
    name: 客户分配规划
    description: |
      将可供产品分配给各客户和合同。
  BC-4480.20:
    name: 包销协议管理
    description: |
      谈判和持续管理包销协议，包括流媒和特许权使用费包销安排。
  BC-4480.20.10:
    name: 包销合同谈判
    description: |
      对包销和流媒协议进行商务和法律谈判。
  BC-4480.20.20:
    name: 包销量提名
    description: |
      按合同权利提名包销量。
  BC-4480.20.30:
    name: 包销履约监测
    description: |
      监测包销交付量、质量和交易对手履约情况。
  BC-4480.30:
    name: 治炼费与精炼费谈判
    description: |
      开展治炼费和精炼费的年度基准谈判及双边谈判，包括精矿罚款条款。
  BC-4480.30.10:
    name: 年度基准谈判
    description: |
      与冶炼厂和客户开展治炼费和精炼费的年度基准谈判。
  BC-4480.30.20:
    name: 治炼费结算追踪
    description: |
      追踪治炼费和精炼费结算相对基准和合同条款的完成情况。
  BC-4480.30.30:
    name: 罚款元素管理
    description: |
      管理砷、锑、氟及其他有害元素的罚款条款。
  BC-4480.40:
    name: 暂定价格与结算
    description: |
      开展计价期管理、暂定发票、最终结算计算和已计价金属内容的套期保值协调。
  BC-4480.40.10:
    name: 计价期管理
    description: |
      管理约定货物最终定价的计价期。
  BC-4480.40.20:
    name: 暂定发票开具
    description: |
      根据预定化验和价格，在发货时开具暂定发票。
  BC-4480.40.30:
    name: 最终结算计算
    description: |
      使用仲裁化验和计价期平均价格对货物进行最终结算。
  BC-4480.40.40:
    name: 套期保值协调
    description: |
      与财务套期保值方案协调，管理暂定计价金属敞口。
  BC-4480.50:
    name: 矿产品物流协调
    description: |
      开展散货船提名、仓库权证管理、卸货采样和散装货物法规合规。
  BC-4480.50.10:
    name: 散货船运提名
    description: |
      提名精矿和矿石运输所需的船舶、铁路车厢和驳船。
  BC-4480.50.20:
    name: 仓库权证管理
    description: |
      管理成品金属库存的 LME 和其他交易所仓库权证。
  BC-4480.50.30:
    name: 卸货精矿采样
    description: |
      协调卸货港的独立采样和化验。
  BC-4480.50.40:
    name: 散装货物规范合规
    description: |
      遵守 IMO IMSBC 规范及同等固体散装货物法规。
  BC-4480.60:
    name: 金属贸易风险管理
    description: |
      管理营销账簿中的金属价格、交易对手信用和贸易单证风险。
  BC-4480.60.10:
    name: 价格风险头寸监测
    description: |
      监测营销账簿中已计价和未计价的金属头寸。
  BC-4480.60.20:
    name: 交易对手信用管理
    description: |
      对贸易伙伴开展交易对手信用评估、设定限额和暴露监测。
  BC-4480.60.30:
    name: 贸易确认与单证
    description: |
      对交易票据和合同进行确认、归档和保存。

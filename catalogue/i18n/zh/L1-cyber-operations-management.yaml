  BC-1740:
    name: 网络行动管理
    description: |
      覆盖防御性与进攻性网络行动及网络情报，保障任务网络安全并投放授权网络效果。
  BC-1740.10:
    name: 防御性网络行动管理
    description: |
      统筹网络防御、威胁猎捕与事件响应，保护军事网络免受网络攻击。
  BC-1740.10.10:
    name: 网络防御运营
    description: |
      运营防御性网络传感器与工具，构建主动防御态势。
  BC-1740.10.20:
    name: 网络威胁猎捕
    description: |
      在军事网络中开展威胁猎捕行动。
  BC-1740.10.30:
    name: 网络事件响应
    description: |
      对任务网络开展事件检测、响应与恢复。
  BC-1740.10.40:
    name: 防御性网络机动
    description: |
      开展防御性网络机动与主动防御行动。
  BC-1740.20:
    name: 进攻性网络行动管理
    description: |
      统筹授权进攻性网络能力与网络效果投放，支持作战任务目标达成。
  BC-1740.20.10:
    name: 网络能力开发
    description: |
      依授权开发进攻性网络能力。
  BC-1740.20.20:
    name: 网络效果投放
    description: |
      对对手依授权投放网络效果。
  BC-1740.20.30:
    name: 网络行动授权
    description: |
      建立进攻性网络行动的授权框架。
  BC-1740.30:
    name: 网络情报管理
    description: |
      统筹网络威胁情报生产与对手追踪，支撑防御与进攻决策。
  BC-1740.30.10:
    name: 网络威胁情报制作
    description: |
      制作网络威胁情报评估报告。
  BC-1740.30.20:
    name: 对手追踪
    description: |
      追踪对手技战术规程与网络基础设施。
  BC-1740.30.30:
    name: 网络指标管理
    description: |
      管理网络入侵指标（IOC）。
  BC-1740.40:
    name: 网络效果管理
    description: |
      统筹网络目标选择、效果协调与去冲突，实现网络行动的精准管控。
  BC-1740.40.10:
    name: 网络目标选择
    description: |
      开展网络专项目标选择与目标开发。
  BC-1740.40.20:
    name: 网络效果协调
    description: |
      协调网络效果与实体作战行动的统筹实施。
  BC-1740.40.30:
    name: 网络行动去冲突
    description: |
      对各部队间的网络行动开展去冲突处理。
  BC-1740.50:
    name: 网络任务保证管理
    description: |
      统筹任务系统网络韧性与保证性，防范网络威胁对任务的影响。
  BC-1740.50.10:
    name: 任务系统网络风险评估
    description: |
      对任务系统开展网络风险评估。
  BC-1740.50.20:
    name: 任务韧性工程
    description: |
      为任务系统开展网络韧性工程设计。
  BC-1740.50.30:
    name: 网络任务保证报告
    description: |
      报告网络任务保证状态。

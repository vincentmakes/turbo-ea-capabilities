locale: zh
source: L1-corporate-communications-management.yaml
entries:
  BC-850:
    name: 企业传播管理
    description: |
      统筹管理企业内外部传播，维护品牌形象与利益相关方关系。
  BC-850.10:
    name: 内部传播管理
    description: |
      面向员工开展内部沟通与领导层传播，增强组织凝聚力。
  BC-850.10.10:
    name: 员工传播
    description: |
      通过员工通讯、内部网站与全员大会等渠道开展员工沟通。
  BC-850.10.20:
    name: 领导层传播
    description: |
      负责CEO及高管层的对内传播与信息沟通。
  BC-850.10.30:
    name: 变革与转型传播
    description: |
      支持变革与转型项目的内部传播工作。
  BC-850.10.40:
    name: 内部渠道管理
    description: |
      管理内部传播渠道（内部网站、即时通讯、协作平台等）。
  BC-850.20:
    name: 对外传播管理
    description: |
      构建企业对外信息架构，向外部受众传递一致的企业声音。
  BC-850.20.10:
    name: 对外信息架构
    description: |
      面向外部受众设计信息架构与传播叙事。
  BC-850.20.20:
    name: 企业声明与立场文件
    description: |
      起草企业正式声明与立场文件。
  BC-850.20.30:
    name: 企业网站与自有渠道
    description: |
      管理企业网站及自有对外渠道内容。
  BC-850.30:
    name: 公共关系管理
    description: |
      维护企业声誉，开展利益相关方公关工作。
  BC-850.30.10:
    name: 声誉管理
    description: |
      跟踪企业声誉、分析舆情并制定声誉管理战略。
  BC-850.30.20:
    name: 思想领导力管理
    description: |
      产出思想领导力内容，提升高管对外影响力。
  BC-850.30.30:
    name: 公共事务与政府关系
    description: |
      开展政府关系工作，与政策制定者保持有效沟通。
  BC-850.40:
    name: 媒体关系管理
    description: |
      管理媒体互动、新闻稿发布与媒体沟通。
  BC-850.40.10:
    name: 新闻稿管理
    description: |
      起草、审批并发布新闻稿。
  BC-850.40.20:
    name: 媒体记者沟通
    description: |
      开展记者关系维护、接受媒体采访与情况介绍。
  BC-850.40.30:
    name: 媒体监测
    description: |
      监测媒体报道与品牌声量。
  BC-850.40.40:
    name: 媒体发言人准备
    description: |
      识别发言人并开展培训与信息准备。
  BC-850.50:
    name: 危机传播管理
    description: |
      在突发危机与事件中快速响应，有效管理传播风险。
  BC-850.50.10:
    name: 危机传播规划
    description: |
      按情景预先制定危机传播预案。
  BC-850.50.20:
    name: 危机声明准备
    description: |
      事件发生时快速准备声明与问答材料。
  BC-850.50.30:
    name: 危机发言人管理
    description: |
      危机期间管理发言人并应对媒体询问。
  BC-850.50.40:
    name: 危机后声誉恢复
    description: |
      开展危机后传播工作，推动声誉恢复。
  BC-850.60:
    name: 利益相关方传播管理
    description: |
      针对特定利益相关方群体制定差异化传播策略。
  BC-850.60.10:
    name: 利益相关方图谱绘制
    description: |
      对外部利益相关方进行识别与细分。
  BC-850.60.20:
    name: 利益相关方沟通规划
    description: |
      针对各利益相关方群体制定差异化沟通计划。
  BC-850.60.30:
    name: 社区与本地利益相关方沟通
    description: |
      与当地社区及社区利益相关方开展有效沟通。

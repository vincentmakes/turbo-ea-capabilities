locale: zh
source: L1-treasury-asset-liability-management.yaml
entries:
  BC-1360:
    name: 资金管理与资产负债管理
    description: |
      负责银行资金管理、资产负债管理（ALM）、内部资金转移定价（FTP）、流动性管理和银行账户利率风险管理，保障银行资产负债结构的稳健性。
  BC-1360.10:
    name: 银行流动性管理
    description: |
      管理银行流动性，包括日间流动性和 LCR/NSFR 合规，确保银行在各类场景下的流动性安全。
  BC-1360.10.10:
    name: 流动性覆盖率管理
    description: |
      依据 Basel III 要求计算、监控和报告流动性覆盖率（LCR），保障短期流动性安全。
  BC-1360.10.20:
    name: 净稳定资金比率管理
    description: |
      计算净稳定资金比率（NSFR）并管理结构性资金稳定性，确保中长期资金来源稳定。
  BC-1360.10.30:
    name: 日间流动性管理
    description: |
      跨支付系统监控日间流动性，保障支付结算的顺畅运行。
  BC-1360.10.40:
    name: 优质流动资产管理
    description: |
      维护和管理优质流动资产（HQLA）组合，为流动性压力提供缓冲保障。
  BC-1360.20:
    name: 资产负债管理
    description: |
      开展 ALM、资产负债表管理和缺口分析，优化资产负债结构的风险收益特征。
  BC-1360.20.10:
    name: 资产负债表管理
    description: |
      开展战略性资产负债表管理和优化，提升资本利用效率。
  BC-1360.20.20:
    name: 缺口分析
    description: |
      对资产负债表开展重定价和流动性缺口分析，识别利率和流动性风险敞口。
  BC-1360.20.30:
    name: 行为模型
    description: |
      建立活期存款和提前还款的行为模型，提升 ALM 分析的准确性。
  BC-1360.20.40:
    name: ALM 压力测试
    description: |
      对资产负债错配情况开展压力测试，评估不同情景下的风险暴露。
  BC-1360.30:
    name: 内部资金转移定价管理
    description: |
      管理 FTP 方法论和内部资金定价，合理分配资金成本和收益。
  BC-1360.30.10:
    name: FTP 方法论管理
    description: |
      维护 FTP 方法论和利率曲线构建，确保内部资金定价的科学合理。
  BC-1360.30.20:
    name: FTP 利率应用
    description: |
      将 FTP 利率应用于产品和合约，实现资金成本的精准分配。
  BC-1360.30.30:
    name: FTP 报告与分析
    description: |
      出具 FTP 报告并分析对盈利能力的影响，支持业务定价决策。
  BC-1360.40:
    name: 银行融资管理
    description: |
      管理同业融资、存款筹资和资本市场融资，保障银行多元稳定的资金来源。
  BC-1360.40.10:
    name: 同业融资管理
    description: |
      管理同业无担保和担保融资，优化短期资金来源结构。
  BC-1360.40.20:
    name: 资本市场融资
    description: |
      通过债券发行、中期票据（MTN）、担保债券和证券化获取中长期资金。
  BC-1360.40.30:
    name: 央行便利工具运营
    description: |
      使用央行便利工具并管理相关抵押品，灵活获取低成本流动性支持。
  BC-1360.40.40:
    name: 融资计划管理
    description: |
      制定年度融资计划并跟踪执行情况，确保全年融资目标的顺利实现。
  BC-1360.50:
    name: 银行账户利率风险管理
    description: |
      管理银行账户利率风险（IRRBB），控制利率波动对银行经济价值和净利息收入的影响。
  BC-1360.50.10:
    name: IRRBB 计量
    description: |
      计量 IRRBB 的经济价值权益（EVE）和净利息收入（NII）敏感性，量化利率风险暴露。
  BC-1360.50.20:
    name: IRRBB 对冲
    description: |
      对银行账户利率风险进行对冲，将利率风险控制在风险偏好范围内。
  BC-1360.50.30:
    name: IRRBB 报告
    description: |
      出具 IRRBB 监管报告和管理报告，满足监管披露和内部治理要求。

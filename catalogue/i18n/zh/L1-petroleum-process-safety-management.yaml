locale: zh
source: L1-petroleum-process-safety-management.yaml
entries:
  BC-3050:
    name: 石油过程安全管理
    description: |
      预防油气处理装置重大事故危害，涵盖过程危险分析、压力设备机械完整性、安全关键要素保障、操作规程、绩效报告和应急响应。本能力有别于跨行业HSE管理（BC-730），后者保留职业健康、环境和个人安全范围。
  BC-3050.10:
    name: 过程危险分析
    description: |
      在资产全生命周期内对重大事故危害进行系统识别和分析。
    in_scope:
      - HAZID、HAZOP、LOPA和蝴蝶结分析
      - 定量风险评估
    out_of_scope:
      - 个人安全风险评估（BC-730）
  BC-3050.10.10:
    name: HAZOP研究
    description: |
      对新建和改建设施开展危险与可操作性研究。
  BC-3050.10.20:
    name: HAZID研究
    description: |
      在概念和设计早期阶段开展危险识别研究。
  BC-3050.10.30:
    name: LOPA研究
    description: |
      开展保护层分析，以确定SIL安全完整性等级。
  BC-3050.10.40:
    name: 蝴蝶结分析
    description: |
      通过蝴蝶结分析，针对重大事故场景绘制屏障图。
  BC-3050.20:
    name: 机械完整性管理
    description: |
      对承压设备和安全泄放装置进行检验和完整性管理。
  BC-3050.20.10:
    name: 压力容器检验
    description: |
      依据API 510对压力容器开展基于风险的检验。
  BC-3050.20.20:
    name: 管道与管线完整性检验
    description: |
      依据API 570和ASME B31G对工艺管道和管线进行检验。
  BC-3050.20.30:
    name: 储罐检验
    description: |
      依据API 653对常压和承压储罐进行检验。
  BC-3050.20.40:
    name: 安全泄放装置管理
    description: |
      对安全阀和爆破片进行定额计算、测试和全生命周期管理。
  BC-3050.30:
    name: 安全关键要素管理
    description: |
      识别安全关键要素并开展绩效保障，维护安全论证文件。
  BC-3050.30.10:
    name: 安全关键要素识别
    description: |
      从重大事故危害分析中识别安全关键要素（SCE）。
  BC-3050.30.20:
    name: 绩效标准制定
    description: |
      为每项安全关键要素制定绩效标准。
  BC-3050.30.30:
    name: 安全关键要素绩效验证
    description: |
      验证安全关键要素绩效是否符合规定标准。
  BC-3050.30.40:
    name: 安全论证维护
    description: |
      维护装置安全论证文件并提交监管机构。
  BC-3050.40:
    name: 过程安全操作规程
    description: |
      编制、审核和界定过程安全关键操作规程的操作包络。
  BC-3050.40.10:
    name: 操作规程编制
    description: |
      编制过程安全关键操作规程。
  BC-3050.40.20:
    name: 规程审核与更新
    description: |
      对过程安全规程进行定期审核和更新。
  BC-3050.40.30:
    name: 操作包络界定
    description: |
      界定工艺单元的安全操作包络。
  BC-3050.50:
    name: 过程安全变更管理
    description: |
      对工厂、程序和人员变更进行过程安全治理，包括开工前安全检查。
  BC-3050.50.10:
    name: PSM变更申请审查
    description: |
      依据危险标准对影响PSM的变更申请进行审查。
  BC-3050.50.20:
    name: 开工前安全检查
    description: |
      对新建和改建设施开展开工前安全检查。
  BC-3050.50.30:
    name: 临时变更管理
    description: |
      在授权有效期内管理临时工艺变更。
  BC-3050.60:
    name: 过程安全绩效管理
    description: |
      依据API RP 754及同等框架，跟踪和报告过程安全领先及滞后指标。
  BC-3050.60.10:
    name: 一级和二级过程安全事件报告
    description: |
      采集和报告一级和二级过程安全事件。
  BC-3050.60.20:
    name: 领先指标监测
    description: |
      监测三级和四级过程安全领先指标。
  BC-3050.60.30:
    name: 过程安全KPI报告
    description: |
      对外和对内报告过程安全KPI绩效。
  BC-3050.70:
    name: 应急准备与响应
    description: |
      针对重大事故场景，制定应急响应计划、开展演习并协调溢油响应。
  BC-3050.70.10:
    name: 应急响应计划
    description: |
      维护装置和公司级应急响应计划。
  BC-3050.70.20:
    name: 演习与练习协调
    description: |
      协调应急演习和重大事故演练。
  BC-3050.70.30:
    name: 溢油响应协调
    description: |
      协调油品和化学品溢漏响应作业。
  BC-3050.70.40:
    name: 互助协调
    description: |
      协调与行业应急响应联合体的互助工作。

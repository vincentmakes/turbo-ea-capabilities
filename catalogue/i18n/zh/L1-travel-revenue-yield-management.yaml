locale: zh
source: L1-travel-revenue-yield-management.yaml
entries:
  BC-4030:
    name: 旅行收益管理
    description: |
      通过需求预测、动态定价、库存管控及收益决策，最大化旅行产品的收入，独立于产品主数据、分销对接和预订生命周期之外。
    in_scope:
      - 非约束需求与预订节奏预测
      - 定价与价格策略管理（BAR、票价舱位、季节）
      - 预订限额、住宿限制、超售及嵌套管控
      - 竞争对手价格情报与市场定位
      - 促销与折扣机制
      - 收益绩效报告（RevPAR、RevPAX、ADR、收益）
    out_of_scope:
      - 产品主数据定义（BC-4000）
      - 元搜索上的渠道专属竞价（BC-4010.40.20）
      - 团体销售合同（BC-4110.10）
  BC-4030.10:
    name: 旅行需求预测
    description: |
      预测旅行产品的非约束需求、预订节奏、团体需求及未到店或取消行为。
  BC-4030.10.10:
    name: 非约束需求预测
    description: |
      预测在无容量和价格约束条件下的市场需求。
  BC-4030.10.20:
    name: 预订节奏与取量预测
    description: |
      对照历史与在册模式预测节奏和取量曲线。
  BC-4030.10.30:
    name: 团体需求预测
    description: |
      预测团体需求，包括对散客库存的置换效应。
  BC-4030.10.40:
    name: 未到店与取消预测
    description: |
      预测未到店和取消行为，作为超售和库存管控的输入依据。
  BC-4030.20:
    name: 定价与价格策略管理
    description: |
      在BAR档次、票价舱位、季节窗口及套餐定价层面制定和调整价格策略。
  BC-4030.20.10:
    name: 最优可售价格设定
    description: |
      按日期和细分市场设定最优可售价格阶梯。
  BC-4030.20.20:
    name: 票价舱位与库存桶策略
    description: |
      制定票价舱位和库存桶策略，包括开放、关闭及重新定级。
  BC-4030.20.30:
    name: 季节与日类型定价
    description: |
      制定跨季节、周内模式及活动窗口的价格差异策略。
  BC-4030.20.40:
    name: 套餐与捆绑定价
    description: |
      为套餐产品和捆绑产品定价，包括组件分摊。
  BC-4030.30:
    name: 库存与容量管控
    description: |
      实施库存管控，包括预订限额、住宿时长限制、超售策略及竞价嵌套管理。
  BC-4030.30.10:
    name: 预订限额与授权设定
    description: |
      按舱位、渠道和细分市场设定预订限额和授权级别。
  BC-4030.30.20:
    name: 住宿时长限制管理
    description: |
      管理住宿时长限制，包括最短、最长及抵达日规则。
  BC-4030.30.30:
    name: 超售策略管理
    description: |
      按日期和细分市场对超售级别进行战略管理，并以被拒服务成本为校准依据。
  BC-4030.30.40:
    name: 嵌套与竞价价格管理
    description: |
      在收益优化模型中管理库存嵌套和竞价价格阈值。
  BC-4030.40:
    name: 竞争对手价格情报
    description: |
      进行竞争对手价格比价、市场份额分析及价格定位建议。
  BC-4030.40.10:
    name: 竞争对手价格比价
    description: |
      定期比对竞争对手在特定渠道和抵达日期的价格。
  BC-4030.40.20:
    name: 市场份额与渗透率分析
    description: |
      对照竞争对手集分析市场份额、入住率指数及价格指数。
  BC-4030.40.30:
    name: 价格定位建议
    description: |
      依据竞争态势和需求状态生成价格定位建议。
  BC-4030.40.40:
    name: 竞争对手集定义与维护
    description: |
      定义并持续维护用于基准对标的竞争对手集。
  BC-4030.50:
    name: 促销与折扣管理
    description: |
      在旅行产品中定义和运营促销、折扣码、不透明定价及封闭用户群定价。
  BC-4030.50.10:
    name: 促销日历管理
    description: |
      管理跨季节和关键预订窗口的促销日历。
  BC-4030.50.20:
    name: 促销资格规则
    description: |
      制定按细分市场、渠道和入住窗口管控促销核销的资格规则。
  BC-4030.50.30:
    name: 折扣码与凭证管理
    description: |
      管理用于促销用途的折扣码、凭证及礼品卡式代金券。
  BC-4030.50.40:
    name: 不透明定价与封闭用户群定价
    description: |
      运营保护公开价格可见性的不透明渠道和封闭用户群定价机制。
  BC-4030.60:
    name: 收益绩效分析
    description: |
      报告并分析收益绩效，包括RevPAR、RevPAX、ADR、收益及预测方差。
  BC-4030.60.10:
    name: 收益KPI报告
    description: |
      报告与预算和历史同期相比的核心收益KPI。
  BC-4030.60.20:
    name: 收益方差分析
    description: |
      分析将变化归因于结构、价格和入住率效应的收益方差。
  BC-4030.60.30:
    name: 渠道收益贡献分析
    description: |
      按渠道、细分市场和价格代码分析收益贡献。
  BC-4030.60.40:
    name: 收益预测与实际对比分析
    description: |
      分析预测收益与实际收益，并归因于预测误差来源。

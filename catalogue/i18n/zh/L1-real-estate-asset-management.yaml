locale: zh
source: L1-real-estate-asset-management.yaml
entries:
  BC-4920:
    name: 房地产资产管理
    description: |
      在持有期内对存量房地产资产进行业主方管理，涵盖商业计划执行、绩效监控、资本支出排序、资产重新定位、可持续发展路径、资产风险，以及房产税/运营支出优化。作为投资人视角（BC-4910）与现场物业运营（BC-4940）之间的桥梁。
    in_scope:
      - 单项资产商业计划及持有/出售决策
      - 资产财务、租赁和运营绩效监控
      - 资本支出项目规划、排序和执行监管
      - 资产重新定位、转换及增值执行
      - 资产层面碳减排路径和ESG认证
      - 资产风险监控（实物、气候、市场、租户信用）
      - 房产税申诉、运营支出审查及公共区域维护费回收审计
    out_of_scope:
      - 基金/投资人房产组合构建（BC-4910）
      - 日常物业运营和工单（BC-4940）
      - 收购或处置交易（BC-4930）
      - 租约摘要和租金递增（BC-4950）
  BC-4920.10:
    name: 资产商业计划管理
    description: |
      定义并定期更新与基金委托、持有期和价值创造逻辑对齐的单项资产商业计划。
  BC-4920.10.10:
    name: 资产商业计划定义
    description: |
      定义涵盖投资逻辑、价值驱动因素和持有期的单项资产商业计划。
  BC-4920.10.20:
    name: 持有/出售分析
    description: |
      分析持有与出售的经济比较，并向投资委员会提出建议。
  BC-4920.10.30:
    name: 年度计划更新
    description: |
      基于实际情况和最新市场展望，对资产商业计划进行年度更新。
  BC-4920.20:
    name: 资产绩效监控
    description: |
      在资产层面对照商业计划监控财务、租赁和运营绩效。
  BC-4920.20.10:
    name: 资产财务绩效跟踪
    description: |
      对照预算和商业计划跟踪净营业收入（NOI）、现金流和收益率。
  BC-4920.20.20:
    name: 租赁与出租率绩效跟踪
    description: |
      跟踪出租率、已租比例、加权平均租约年期及租金与市场的比较。
  BC-4920.20.30:
    name: 运营KPI跟踪
    description: |
      跟踪涵盖正常运行时间、投诉、能耗强度和访客数量的运营关键绩效指标。
  BC-4920.20.40:
    name: 差异分析与预测更新
    description: |
      对实际情况与计划进行差异分析，并更新预测和退出假设。
  BC-4920.30:
    name: 资本支出项目管理
    description: |
      规划、排序并监管资产和房产组合资本支出项目的执行。
  BC-4920.30.10:
    name: 资本支出项目规划
    description: |
      按资产和房产组合制定多年期资本支出项目规划。
  BC-4920.30.20:
    name: 资本支出排序与审批
    description: |
      按投资回报率和风险标准对资本支出项目进行排序和审批。
  BC-4920.30.30:
    name: 资本支出执行监管
    description: |
      监管资本支出项目执行，包括拨款和里程碑交付。
  BC-4920.30.40:
    name: 资本支出绩效核对
    description: |
      将资本支出绩效与原评估的价值提升和NOI改善进行核对。
  BC-4920.40:
    name: 资产重新定位与增值管理
    description: |
      定义并执行改变资产用途或收入结构的重新定位、转换和租户组合战略。
  BC-4920.40.10:
    name: 重新定位战略定义
    description: |
      定义包含目标市场和价值主张的重新定位战略。
  BC-4920.40.20:
    name: 转换与用途改变项目
    description: |
      跨用途（办公转住宅、零售转综合用途）的资产转换项目。
  BC-4920.40.30:
    name: 租户组合与商业策略
    description: |
      为零售和综合用途资产定义并执行租户组合和商业排布策略。
  BC-4920.50:
    name: 资产层面可持续发展与ESG管理
    description: |
      资产层面碳减排路径、能耗强度管理、认证及GRESB提交。
  BC-4920.50.10:
    name: 资产碳减排路径
    description: |
      定义与CRREM及SBTi建筑指引对齐的资产碳减排路径。
  BC-4920.50.20:
    name: 能源与用水强度管理
    description: |
      对照目标管理资产能源和用水强度。
  BC-4920.50.30:
    name: 资产ESG认证（LEED/BREEAM/WELL）
    description: |
      申请并维护资产层面认证，包括LEED、BREEAM、WELL和Fitwel。
  BC-4920.50.40:
    name: GRESB资产提交
    description: |
      准备并提交GRESB评估所需的资产层面数据。
  BC-4920.60:
    name: 资产风险管理
    description: |
      在资产层面监控实物、气候、市场及租户信用风险，以及保险充足性。
  BC-4920.60.10:
    name: 实物与气候风险评估
    description: |
      评估资产面临的实物和气候风险，包括洪水、野火和高温暴露。
  BC-4920.60.20:
    name: 租户信用风险监控
    description: |
      按资产和房产组合监控租户信用及租金收缴风险。
  BC-4920.60.30:
    name: 市场风险监控
    description: |
      监控市场风险驱动因素，包括资本化率变动、供应管道和租金趋势。
  BC-4920.60.40:
    name: 保险充足性审查
    description: |
      定期审查物业和责任险对资产价值及风险敞口的充足性。
  BC-4920.70:
    name: 房产税与运营支出优化
    description: |
      管理房地产资产专项的房产税评估、运营支出审查、公共区域维护费回收审计及公用事业费率优化。
  BC-4920.70.10:
    name: 房产税评估与申诉
    description: |
      依据可比证据审查并申诉房产税评估。
  BC-4920.70.20:
    name: 运营支出审查
    description: |
      定期审查运营支出以开展标杆对比和节约机会识别。
  BC-4920.70.30:
    name: 公共区域维护费回收审计
    description: |
      按租约权利对租户公共区域维护费和服务费回收情况进行审计。
  BC-4920.70.40:
    name: 公用事业费率优化
    description: |
      优化房产组合内公用事业采购、费率及需求费用。

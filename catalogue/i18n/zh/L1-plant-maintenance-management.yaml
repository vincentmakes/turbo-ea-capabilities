locale: zh
source: L1-plant-maintenance-management.yaml
entries:
  BC-1030:
    name: 工厂维护管理
    description: |
      负责工厂与设备的预防性、预测性及纠正性维护，确保资产可靠稳定运行。
  BC-1030.10:
    name: 维护策略管理
    description: |
      按资产类别制定维护策略，开展以可靠性为中心的维护分析。
  BC-1030.10.10:
    name: 以可靠性为中心的维护分析
    description: |
      开展RCM分析，按资产类别定义维护策略。
  BC-1030.10.20:
    name: 维护计划定义
    description: |
      定义维护计划、任务与周期。
  BC-1030.10.30:
    name: 维护标准管理
    description: |
      制定并维护维护程序、标准与最佳实践。
  BC-1030.20:
    name: 预防性维护管理
    description: |
      制定预防性维护（PM）计划、安排排程并执行任务。
  BC-1030.20.10:
    name: PM排程管理
    description: |
      生成并管理预防性维护排程。
  BC-1030.20.20:
    name: PM执行
    description: |
      执行PM任务并验证完成情况。
  BC-1030.20.30:
    name: PM合规跟踪
    description: |
      跟踪PM合规情况与逾期任务。
  BC-1030.30:
    name: 纠正性维护管理
    description: |
      快速响应设备故障，执行修复作业，恢复正常运行。
  BC-1030.30.10:
    name: 故障应急响应
    description: |
      对设备故障与计划外事件进行第一时间响应。
  BC-1030.30.20:
    name: 设备修复执行
    description: |
      执行纠正性修复并验证结果。
  BC-1030.30.30:
    name: 故障分析与报告
    description: |
      完成纠正性作业后开展根本原因分析与故障报告。
  BC-1030.40:
    name: 预测性维护管理
    description: |
      基于设备状态监控与预测分析驱动维护决策。
  BC-1030.40.10:
    name: 状态监测
    description: |
      开展振动、热成像、油液与声学状态监测。
  BC-1030.40.20:
    name: 预测分析建模
    description: |
      基于机器学习构建故障预测模型。
  BC-1030.40.30:
    name: 处方式维护行动
    description: |
      依据预测结果生成处方式维护行动建议。
  BC-1030.50:
    name: 维护工单管理
    description: |
      管理维护工单的全生命周期。
  BC-1030.50.10:
    name: 维护通知单采集
    description: |
      采集维护通知与请求。
  BC-1030.50.20:
    name: 维护工单计划
    description: |
      规划工单所需资源与备件。
  BC-1030.50.30:
    name: 维护工单执行
    description: |
      执行并确认维护工单。
  BC-1030.50.40:
    name: 维护工单关闭
    description: |
      关闭工单、完成结算并归档记录。
  BC-1030.60:
    name: 维护备件库存管理
    description: |
      管理MRO备件的库存策略与领用。
  BC-1030.60.10:
    name: MRO库存策略
    description: |
      制定MRO备件的库存策略与储量水平。
  BC-1030.60.20:
    name: MRO备件采购
    description: |
      采购MRO备件与消耗品。
  BC-1030.60.30:
    name: MRO库房运营
    description: |
      运营MRO库房，管理备件的领用与归还。
  BC-1030.60.40:
    name: 关键备件管理
    description: |
      识别并管理关键备件与保险备件。
  BC-1030.70:
    name: 设备可靠性管理
    description: |
      开展可靠性工程分析，跟踪MTBF/MTTR，持续提升设备可靠性。
  BC-1030.70.10:
    name: 可靠性工程分析
    description: |
      对关键资产开展可靠性分析（FMEA、FTA、RBD）。
  BC-1030.70.20:
    name: MTBF与MTTR跟踪
    description: |
      跟踪平均故障间隔时间与平均修复时间。
  BC-1030.70.30:
    name: 可靠性改善项目群
    description: |
      针对高故障率资产推进可靠性改善项目群。

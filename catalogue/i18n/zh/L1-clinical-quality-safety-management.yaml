locale: zh
source: L1-clinical-quality-safety-management.yaml
entries:
  BC-2840:
    name: 临床质量与安全管理
    description: |
      管理患者安全事件、感染预防与控制、临床结果测量、认证备查、临床风险与责任，以及临床护理专项质量改进项目。
  BC-2840.10:
    name: 患者安全事件管理
    description: |
      采集、调查和管理患者安全事件，包括警示事件和未遂事件。
  BC-2840.10.10:
    name: 事件报告与采集
    description: |
      通过多渠道报告和采集患者安全事件和未遂事件。
  BC-2840.10.20:
    name: 根本原因分析
    description: |
      对患者安全事件开展根本原因和表观原因分析。
  BC-2840.10.30:
    name: 警示事件管理
    description: |
      识别、响应和报告警示事件及绝对不应发生的事件。
  BC-2840.10.40:
    name: 公正文化调查
    description: |
      从公正文化视角审查安全事件中的人为因素和问责机制。
  BC-2840.20:
    name: 感染预防与控制
    description: |
      监测、预防和控制医疗相关感染，包括暴发响应和抗菌药物管理。
  BC-2840.20.10:
    name: 医疗相关感染监测
    description: |
      监测和报告医疗相关感染。
  BC-2840.20.20:
    name: 暴发调查
    description: |
      调查和控制感染聚集和暴发事件。
  BC-2840.20.30:
    name: 消毒供应监管
    description: |
      监管消毒供应科运营和合规情况。
  BC-2840.20.40:
    name: 抗菌药物管理
    description: |
      开展抗菌药物管理项目运营和处方监督。
  BC-2840.30:
    name: 临床结果测量
    description: |
      针对核心指标、注册系统提交和患者报告结果测量并报告临床结果。
  BC-2840.30.10:
    name: 核心指标报告
    description: |
      采集和提交监管核心质量指标。
  BC-2840.30.20:
    name: 死亡率与再住院追踪
    description: |
      追踪死亡率、再住院率和风险调整结果。
  BC-2840.30.30:
    name: 专科结果注册系统提交
    description: |
      向心脏、外科和卒中等专科结果注册系统提交数据。
  BC-2840.30.40:
    name: 患者报告结果采集
    description: |
      采集和分析患者报告的结果和体验指标。
  BC-2840.40:
    name: 认证与评审备查
    description: |
      做好临床、监管和专科评审项目的认证备查工作。
  BC-2840.40.10:
    name: 模拟评审项目
    description: |
      开展模拟评审和持续备查项目运营。
  BC-2840.40.20:
    name: 追踪方法论
    description: |
      运用患者和系统追踪方法论开展认证备查。
  BC-2840.40.30:
    name: 标准合规追踪
    description: |
      追踪对认证和监管标准的合规情况。
  BC-2840.40.40:
    name: 评审响应协调
    description: |
      协调认证评审、发现问题和纠正行动计划。
  BC-2840.50:
    name: 临床风险与责任管理
    description: |
      识别和缓解临床风险，以及应对医疗护理专项责任索赔。
  BC-2840.50.10:
    name: 临床风险评估
    description: |
      识别和评估跨服务和流程的临床风险。
  BC-2840.50.20:
    name: 索赔抗辩支持
    description: |
      支持医疗事故索赔调查和抗辩工作。
  BC-2840.50.30:
    name: 披露与道歉流程
    description: |
      针对不良事件开展披露与道歉项目运营。
  BC-2840.50.40:
    name: 临床风险缓解规划
    description: |
      规划并执行临床风险缓解行动。
  BC-2840.60:
    name: 质量改进项目
    description: |
      推进绩效改进方法论、集束化措施实施和高可靠性倡议。
  BC-2840.60.10:
    name: PDSA循环管理
    description: |
      管理临床改进的计划-执行-研究-行动(PDSA)循环。
  BC-2840.60.20:
    name: 集束化措施与路径实施
    description: |
      实施循证集束化措施和临床路径。
  BC-2840.60.30:
    name: 绩效改进项目追踪
    description: |
      追踪绩效改进项目和结果。
  BC-2840.60.40:
    name: 高可靠性倡议
    description: |
      推进高可靠性组织原则和倡议管理。

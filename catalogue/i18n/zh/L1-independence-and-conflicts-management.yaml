locale: zh
source: L1-independence-and-conflicts-management.yaml
entries:
  BC-4350:
    name: 独立性与利益冲突管理
    description: |
      管理专业服务事务所特有的审计师独立性、职业利益冲突、信息隔离墙运营、个人利益声明及接洽承接与持续合规许可。
  BC-4350.10:
    name: 审计师独立性管理
    description: |
      执行审计事务所独立性规则，包括禁止服务、合伙人轮换、费用依赖限制及公共利益实体（PIE）特定要求。
  BC-4350.10.10:
    name: 审计客户识别
    description: |
      识别和维护受限审计客户群体，包括关联方和实际受益关系。
  BC-4350.10.20:
    name: 禁止服务预许可
    description: |
      对照禁止服务名单对向审计客户提供的非审计服务进行预许可审查。
  BC-4350.10.30:
    name: 审计合伙人轮换管理
    description: |
      追踪并执行审计客户的接洽合伙人和接洽质量审查合伙人的轮换要求。
  BC-4350.10.40:
    name: 费用依赖监控
    description: |
      监控审计费用和总费用占事务所收入的比例，识别费用依赖威胁。
  BC-4350.20:
    name: 利益冲突管理
    description: |
      识别、评估和解决接洽间、客户间以及客户与事务所利益间的利益冲突。
  BC-4350.20.10:
    name: 冲突检索与识别
    description: |
      检索客户和事务档案，识别潜在拓展接洽的利益冲突。
  BC-4350.20.20:
    name: 冲突评估与分类
    description: |
      对照事务所政策和执业规则评估已识别的冲突，确定冲突类别和处理方式。
  BC-4350.20.30:
    name: 冲突解决与豁免管理
    description: |
      解决冲突，包括获取知情同意、豁免及适当时拒绝承接。
  BC-4350.30:
    name: 信息隔离墙管理
    description: |
      为敏感接洽设计、部署和运营信息隔离墙和筛查安排。
  BC-4350.30.10:
    name: 信息隔离墙设计
    description: |
      为接洽定义隔离范围、被筛查人员及物理或系统管控措施。
  BC-4350.30.20:
    name: 信息隔离墙部署
    description: |
      在文件、邮件和执业系统中实施访问限制。
  BC-4350.30.30:
    name: 隔离墙违规检测与应对
    description: |
      检测和应对潜在或实际的隔离墙违规，包括上报和整改。
  BC-4350.40:
    name: 个人利益与关系管理
    description: |
      捕获、声明并监控可能威胁独立性或造成利益冲突的个人金融利益、家庭关系及前雇主情况。
  BC-4350.40.10:
    name: 个人投资声明
    description: |
      对照受限实体名单捕获和维护合伙人及工作人员的个人投资声明。
  BC-4350.40.20:
    name: 家庭与密切关联声明
    description: |
      捕获涵盖与独立性相关的直系家庭成员和其他密切关联人员的声明。
  BC-4350.40.30:
    name: 前雇主与冷却期追踪
    description: |
      追踪在审计客户处的前就业情况及接洽参与前的冷却期。
  BC-4350.50:
    name: 接洽承接许可
    description: |
      将独立性、利益冲突及诚信许可整合为单一决策输入，用于接洽承接。
  BC-4350.50.10:
    name: 许可工作流协调
    description: |
      统筹编排接洽承接前所需的独立性、利益冲突及AML许可。
  BC-4350.50.20:
    name: 许可决策记录
    description: |
      在接洽档案中记录许可决策、条件及理由。
  BC-4350.50.30:
    name: 持续接洽重新许可管理
    description: |
      对持续接洽和经常性审计关系定期重新进行独立性与利益冲突许可。
  BC-4350.60:
    name: 独立性与利益冲突监控
    description: |
      在接洽执行过程中及跨接洽组合持续监控独立性和利益冲突状况。
  BC-4350.60.10:
    name: 向审计客户新增服务监控
    description: |
      监控向现有审计客户提议的新增服务，识别禁止服务敞口。
  BC-4350.60.20:
    name: 受限实体名单维护
    description: |
      维护并向专业人员分发受限实体名单及相关提示。
  BC-4350.60.30:
    name: 独立性违规调查
    description: |
      调查并报告疑似或实际的独立性违规及整改行动。

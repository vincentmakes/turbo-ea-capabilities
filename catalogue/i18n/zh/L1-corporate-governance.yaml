  BC-110.20:
    name: 股东与股权管理
    description: |
      管理股权结构、股东名册及股东权利。
  BC-110.20.10:
    name: 股东名册维护
    description: |
      维护股东登记册及实益所有权记录。
  BC-110.20.20:
    name: 股东大会管理
    description: |
      召集年度股东大会及临时股东大会，处理通知、投票及决议。
  BC-110.20.30:
    name: 股息与分配行政管理
    description: |

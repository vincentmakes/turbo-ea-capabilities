  BC-110.20.40:
    name: 股权资本结构管理
    description: |
      管理股份类别、增资、回购及股票分割。
  BC-110.30:
    name: 公司秘书管理
    description: |
      管理法定申报、公司记录及公司规范事务。
  BC-110.30.10:
    name: 法定申报行政管理
    description: |
      向公司登记处及公司主管机关提交申报文件。
  BC-110.30.20:
    name: 公司记录管理
    description: |
      维护法定账册、登记册及公司档案。
  BC-110.30.30:
    name: 公司决议行政管理
    description: |
      起草、签署并记录董事会及股东决议。
  BC-110.40:
    name: 子公司与实体管理
    description: |
      管理集团内法律实体结构与治理。
  BC-110.40.10:
    name: 法律实体全生命周期管理
    description: |
      处理实体的注册成立、重组、休眠及清算。
  BC-110.40.20:
    name: 集团结构治理
    description: |
      维护并监督法律实体组织图及所有权链条。
  BC-110.40.30:
    name: 子公司治理标准
    description: |
      在子公司间推行集团统一治理标准。
  BC-110.40.40:
    name: 跨境实体合规
    description: |
      确保境外子公司符合当地法定及公司治理合规要求。
  BC-110.50:
    name: 授权与权限管理
    description: |
      管理权限矩阵、授权及签署权限。
  BC-110.50.10:
    name: 授权框架
    description: |
      制定权限级别、审批门槛及授权层级体系。
  BC-110.50.20:
    name: 签署权限行政管理
    description: |
      维护授权签字人名单、授权书及银行授权书。
  BC-110.50.30:
    name: 授权合规监控
    description: |
      监控决策是否符合授权权限限制。

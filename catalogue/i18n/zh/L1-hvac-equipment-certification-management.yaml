locale: zh
source: L1-hvac-equipment-certification-management.yaml
entries:
  BC-2030:
    name: 暖通空调设备认证管理
    description: |
      多司法管辖区暖通空调产品认证，涵盖性能认证（AHRI、Eurovent）、安全上市认证（UL、CSA、IEC 60335-2-40、CE 标志）、制冷剂批准（F-Gas、EPA SNAP）及能效标签（ENERGY STAR、EU Ecodesign/ErP、MEPS），直至标志许可、标签合规和标准监控。
    in_scope:
      - 跨市场的认证战略和路线图
      - 性能认证申请和定级发布
      - 设备安全上市认证和 CE 符合性评估
      - 产品级制冷剂法规批准
      - 能效标签注册和合规
      - 标志许可、标签图稿合规及标准监控
    out_of_scope:
      - 已安装设备的运营制冷剂核算（BC-2040）
      - 通用电气/电子产品认证（BC-1910）
      - 服务引发的现场不合规调查（BC-2060）
  BC-2030.10:
    name: 认证战略与路线图
    description: |
      定义跨目标市场的认证范围、方案和顺序。
  BC-2030.10.10:
    name: 市场准入要求分析
    description: |
      识别目标市场的认证和标签义务。
  BC-2030.10.20:
    name: 认证方案选择
    description: |
      选择暖通空调设备的认证方案和互认路径。
  BC-2030.10.30:
    name: 认证路线图规划
    description: |
      按设备发布里程碑排序各项认证工作。
  BC-2030.20:
    name: 性能认证管理
    description: |
      参与暖通空调性能认证项目并发布经认证的性能定级数据。
  BC-2030.20.10:
    name: 性能试验项目协调
    description: |
      协调经认可实验室的设备定级试验。
  BC-2030.20.20:
    name: 性能定级提交
    description: |
      向性能认证项目提交经认证的定级数据。
  BC-2030.20.30:
    name: 性能标志签发跟踪
    description: |
      跟踪已签发性能证书和有效期窗口。
  BC-2030.20.40:
    name: 自愿项目参与
    description: |
      参与自愿性性能和质量项目。
  BC-2030.30:
    name: 设备安全上市管理
    description: |
      跨司法管辖区参与暖通空调设备安全上市认证方案。
  BC-2030.30.10:
    name: 安全上市申请提交
    description: |
      按 IEC 60335-2-40 及等效标准提交安全上市申请。
  BC-2030.30.20:
    name: 安全标准合规验证
    description: |
      通过内部审核验证安全标准合规性。
  BC-2030.30.30:
    name: 国际安全标志协调
    description: |
      协调多个国家安全标志和互认协议。
  BC-2030.30.40:
    name: 现场安全改装管理
    description: |
      管理影响上市认证的现场安全改装和纠正措施。
  BC-2030.40:
    name: 制冷剂合规管理
    description: |
      产品级制冷剂批准、削减合规及认证物质披露管理。
  BC-2030.40.10:
    name: 制冷剂批准跟踪
    description: |
      按司法管辖区跟踪各产品族已批准的制冷剂。
  BC-2030.40.20:
    name: 制冷剂削减合规
    description: |
      产品级 HFC 削减日程和基加利承诺合规管理。
  BC-2030.40.30:
    name: GWP 与 ODP 合规记录
    description: |
      记录全球变暖潜能值和臭氧消耗潜能值对比法规阈值的情况。
  BC-2030.40.40:
    name: 制冷剂物质报告
    description: |
      认证申请文件中要求的物质报告。
  BC-2030.50:
    name: 能效标签管理
    description: |
      能效标签注册和最低能效标准项目的持续合规管理。
  BC-2030.50.10:
    name: 能效标签注册
    description: |
      向国家项目注册设备能效标签。
  BC-2030.50.20:
    name: 生态设计合规
    description: |
      遵守欧盟生态设计及等效法规要求。
  BC-2030.50.30:
    name: 最低能效性能标准合规
    description: |
      遵守各市场最低能效性能标准要求。
  BC-2030.50.40:
    name: 自愿生态标签参与
    description: |
      参与可持续设备自愿生态标签项目。
  BC-2030.60:
    name: 认证标志与标签合规管理
    description: |
      认证标志和产品标签图稿的全生命周期管理。
  BC-2030.60.10:
    name: 标志签发
    description: |
      认证标志的签发和在产品上的使用。
  BC-2030.60.20:
    name: 标志续证
    description: |
      在到期前完成认证标志续证。
  BC-2030.60.30:
    name: 标志撤销
    description: |
      已退市或不合规设备认证标志的撤销。
  BC-2030.60.40:
    name: 产品标签合规
    description: |
      依据已批准认证内容管控产品标签图稿。
  BC-2030.70:
    name: 标准监控管理
    description: |
      暖通空调标准和法规的监控，包括影响评估和路线图沟通。
  BC-2030.70.10:
    name: 暖通空调标准情报
    description: |
      新兴和修订暖通空调标准的情报收集。
  BC-2030.70.20:
    name: 标准变更影响评估
    description: |
      评估标准变更对现有认证的影响。
  BC-2030.70.30:
    name: 行业团体参与
    description: |
      参与行业标准团体和技术委员会活动。
  BC-2030.70.40:
    name: 标准路线图沟通
    description: |
      向工程和产品团队传达标准路线图信息。

entries:
  BC-410:
    name: 销售管理
    description: |
      管理从线索到订单的全流程，包括客户、销售漏斗、交易及报价。
  BC-410.10:
    name: 销售战略管理
    description: |
      制定覆盖模型、细分及销售规划。
  BC-410.10.10:
    name: 销售覆盖模型设计
    description: |
      定义销售细分市场、区域及覆盖模型。
  BC-410.10.20:
    name: 区域与客户分配
    description: |
      设计销售区域、分配客户及重新平衡资源。
  BC-410.10.30:
    name: 销售目标设定
    description: |
      开展自上而下和自下而上的销售目标及配额设定。
  BC-410.10.40:
    name: 销售产能规划
    description: |
      规划销售产能、新人爬坡期及人员编制。
  BC-410.20:
    name: 客户管理
    description: |
      管理战略客户及重点客户。
  BC-410.20.10:
    name: 客户规划
    description: |
      制定战略客户计划及空白点分析。
  BC-410.20.20:
    name: 重点客户治理
    description: |
      对重点客户实施治理及高管赞助。
  BC-410.20.30:
    name: 客户关系发展
    description: |
      开展客户关系地图绘制及利益相关方互动。
  BC-410.20.40:
    name: 客户健康监控
    description: |
      跟踪客户健康指标、记分卡及续约风险。
  BC-410.30:
    name: 机会与销售漏斗管理
    description: |
      管理线索、机会及交易全生命周期。
  BC-410.30.10:
    name: 线索资质评估与移交
    description: |
      开展线索资质评估、评分及从市场营销移交销售。
  BC-410.30.20:
    name: 机会管理
    description: |
      管理机会创建、资质评估及阶段推进。
  BC-410.30.30:
    name: 交易策略与追单
    description: |
      制定战略性追单计划、赢单策略及交易评审。
  BC-410.30.40:
    name: 销售漏斗预测
    description: |
      管理销售漏斗覆盖率、加权预测及承诺电话会。
  BC-410.40:
    name: 报价与配置管理
    description: |
      管理产品配置、定价、报价流程。
  BC-410.40.10:
    name: 产品配置
    description: |
      按规则和约束条件配置产品及解决方案。
  BC-410.40.20:
    name: 报价生成
    description: |
      为客户生成报价单及建议书。
  BC-410.40.30:
    name: 报价审批流程
    description: |
      管理折扣及非标准条款的审批流程。
  BC-410.40.40:
    name: 合同与订单转化
    description: |
      将已接受的报价转化为订单和合同。
  BC-410.50:
    name: 销售运营管理
    description: |
      管理销售流程、工具及赋能。
  BC-410.50.10:
    name: 销售流程与方法论治理
    description: |
      定义并管理销售流程与方法论。
  BC-410.50.20:
    name: 销售技术与工具
    description: |
      管理 CRM 及销售工具的配置与集成。
  BC-410.50.30:
    name: 销售赋能
    description: |
      提供销售手册、赋能内容及认证培训。
  BC-410.50.40:
    name: 销售数据与数据质量
    description: |
      维护 CRM 数据质量、治理及数据清洁项目。
  BC-410.60:
    name: 渠道销售管理
    description: |
      管理间接渠道、经销商及代理商。
  BC-410.60.10:
    name: 渠道合作伙伴招募
    description: |
      招募并引导经销商、代理商及经纪人入伙。
  BC-410.60.20:
    name: 渠道合作伙伴赋能
    description: |
      为渠道合作伙伴提供培训、认证及赋能支持。
  BC-410.60.30:
    name: 渠道项目管理
    description: |
      管理渠道项目层级、激励措施及合作规则。
  BC-410.60.40:
    name: 合作伙伴绩效管理
    description: |
      跟踪合作伙伴的销售吞吐量、卖出量及绩效指标。
  BC-410.70:
    name: 销售绩效管理
    description: |
      管理薪酬计划、配额管理及销售分析。
  BC-410.70.10:
    name: 销售薪酬计划设计
    description: |
      设计浮动薪酬计划、加速机制及销售激励项目。
  BC-410.70.20:
    name: 配额与业绩归因管理
    description: |
      管理配额分配、业绩归因规则及结转事项。
  BC-410.70.30:
    name: 销售佣金计算
    description: |
      计算、验证并支付销售佣金。
  BC-410.70.40:
    name: 销售绩效分析
    description: |
      分析赢单率、销售效率及销售人员绩效。

locale: zh
source: L1-civil-records-identity-registration-management.yaml
entries:
  BC-3290:
    name: 民事登记与身份登记管理
    description: |
      对民事和法定记录进行权威登记和管理，包括生命事件、国家身份、企业和实体注册及土地地籍，并实施认证、披露和隐私管控。
  BC-3290.10:
    name: 生命事件记录管理
    description: |
      登记出生、死亡、婚姻、民事伴侣关系和离婚等生命事件。
    in_scope:
      - 出生、死亡、婚姻和离婚登记
      - 生命事件证明签发
      - 生命统计数据提取
    out_of_scope:
      - 国家身份号签发（由国家身份登记覆盖）
  BC-3290.10.10:
    name: 出生登记
    description: |
      开展出生登记并签发出生证明。
  BC-3290.10.20:
    name: 死亡登记
    description: |
      开展死亡登记并签发死亡证明。
  BC-3290.10.30:
    name: 婚姻与民事伴侣关系登记
    description: |
      开展婚姻和民事伴侣关系登记并签发证明。
  BC-3290.10.40:
    name: 离婚与婚姻无效登记
    description: |
      开展离婚、婚姻无效和绝对离婚令登记。
  BC-3290.20:
    name: 国家身份登记
    description: |
      建立、维护和核验国家基础身份记录和凭证。
  BC-3290.20.10:
    name: 身份注册
    description: |
      将公民和居民纳入国家身份系统进行注册。
  BC-3290.20.20:
    name: 生物特征采集与去重
    description: |
      采集、去重和比对生物特征标识符。
  BC-3290.20.30:
    name: 身份凭证签发
    description: |
      制作和签发国家身份证件和数字凭证。
  BC-3290.20.40:
    name: 身份更新与全生命周期管理
    description: |
      更新身份属性、全生命周期事件记录和凭证补发。
  BC-3290.30:
    name: 企业与实体注册管理
    description: |
      登记公司、合伙企业、慈善机构和其他法律实体，并维护权威实体记录。
  BC-3290.30.10:
    name: 实体登记
    description: |
      登记公司、合伙企业、慈善机构和其他实体。
  BC-3290.30.20:
    name: 年度申报处理
    description: |
      接收和处理年度报告、账目和董事申报。
  BC-3290.30.30:
    name: 受益所有权注册管理
    description: |
      维护受益所有权和控制权披露信息。
  BC-3290.30.40:
    name: 实体注销与撤销
    description: |
      办理法律实体的撤销、注销和恢复事宜。
  BC-3290.40:
    name: 土地与地籍注册管理
    description: |
      登记土地所有权、地役权、债权和地籍宗地，并维护权威土地记录。
  BC-3290.40.10:
    name: 所有权登记
    description: |
      登记土地所有权、转让和产权权益。
  BC-3290.40.20:
    name: 负担与债权登记
    description: |
      登记抵押贷款、地役权和其他负担。
  BC-3290.40.30:
    name: 地籍测量维护
    description: |
      维护地籍宗地界限和测量记录。
  BC-3290.50:
    name: 记录认证与加签
    description: |
      对国内外使用的公共文件进行认证，包括海牙公约下的加签服务。
  BC-3290.50.10:
    name: 文件认证
    description: |
      对用于法律和行政用途的公共文件进行认证。
  BC-3290.50.20:
    name: 加签签发
    description: |
      依据1961年海牙公约签发加签证书。
  BC-3290.50.30:
    name: 公证服务协调
    description: |
      协调政府提供的公证服务。
  BC-3290.60:
    name: 记录披露与隐私
    description: |
      对民事和法定记录开展可控披露、编辑删除和隐私管理。
  BC-3290.60.10:
    name: 公众查询服务
    description: |
      在民事登记册上提供面向公众的查询和证明服务。
  BC-3290.60.20:
    name: 限制性披露处理
    description: |
      处理限制性披露，包括收养、证人保护和安全保密标注。
  BC-3290.60.30:
    name: 记录隐私与脱密处理
    description: |
      在披露前对民事记录实施隐私管控和脱密处理。

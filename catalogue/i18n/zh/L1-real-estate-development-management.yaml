locale: zh
source: L1-real-estate-development-management.yaml
entries:
  BC-4900:
    name: 房地产开发管理
    description: |
      跨商业和住宅领域的新建及重大改造房地产项目的来源拓展、可行性评估、用地权益取得、融资及交付监督。作为业主方学科，将通用施工执行（BC-1150）与房地产开发特有的上游工作（地块、用地权益、开发方案、开发融资）及下游工作（招租、稳定运营）相衔接。
    in_scope:
      - 地块来源拓展、市场分析及开发管道跟踪
      - 最高最佳使用分析及项目可行性预测
      - 规划分区、用地权益、规划许可及建设许可
      - 总体规划与概念设计监管
      - 开发融资结构设计，包括合资股权和建设贷款
      - 业主方施工监督、变更单及交付监管
      - 预租赁、开业及招租至稳定出租率
    out_of_scope:
      - 总包商及分包商承担的施工执行（BC-1150）
      - 存量资产收购（BC-4930）
      - 存量资产商业计划和资本支出（BC-4920）
      - 自用企业开发（BC-710）
  BC-4900.10:
    name: 开发管道与地块来源拓展
    description: |
      通过市场扫描、直接地块来源拓展、非公开机会拓展及按投资标准跟踪管道，开发新开发机会。
  BC-4900.10.10:
    name: 市场与子市场分析
    description: |
      分析大都市区、子市场及微观区位动态，确定开发活动目标区域。
  BC-4900.10.20:
    name: 地块识别与来源拓展
    description: |
      通过挂牌渠道、中介网络和地块数据筛查识别候选开发地块。
  BC-4900.10.30:
    name: 非公开机会拓展
    description: |
      通过地主接触和专有网络开发非公开市场机会。
  BC-4900.10.40:
    name: 开发管道跟踪
    description: |
      通过阶段关口和投资标准筛选跟踪开发机会。
  BC-4900.20:
    name: 开发可行性分析
    description: |
      从地块、开发方案和财务维度对候选开发机会进行可行性评估。
  BC-4900.20.10:
    name: 最高最佳使用分析
    description: |
      分析候选地块在法律许可、物理可行和财务可行条件下的最优使用方案。
  BC-4900.20.20:
    name: 开发方案与体量研究
    description: |
      研究开发方案组合和建筑体量，测试开发体量与建筑面积产出。
  BC-4900.20.30:
    name: 开发收益预测建模
    description: |
      构建涵盖成本、收益及无杠杆和有杠杆回报的开发收益预测模型。
  BC-4900.20.40:
    name: 土地收购评估
    description: |
      依据可行性结果对土地收购价格和结构进行评估。
  BC-4900.30:
    name: 土地使用权益与许可审批
    description: |
      取得施工所需的土地使用权、规划许可、环境审批及建设许可。
  BC-4900.30.10:
    name: 规划分区与土地使用战略
    description: |
      制定并执行规划分区变更、土地使用图修订及容积奖励的战略。
  BC-4900.30.20:
    name: 规划许可与差异申请
    description: |
      向规划主管部门申请规划许可、差异许可及特殊用途许可。
  BC-4900.30.30:
    name: 环境评审（NEPA/EIA）
    description: |
      依据NEPA、EIA或等效地区制度开展环境评审，包括影响评估和缓解措施。
  BC-4900.30.40:
    name: 建设许可与审批
    description: |
      申请并取得开工所需的建设许可及专业审批。
  BC-4900.30.50:
    name: 社区与利益相关方沟通
    description: |
      与社区委员会、邻居及政治利益相关方沟通，支持用地权益取得工作。
  BC-4900.40:
    name: 开发方案管理
    description: |
      对开发全生命周期内的进度、预算、风险及利益相关方报告实施方案级治理。
  BC-4900.40.10:
    name: 开发进度管理
    description: |
      定义并跟踪从土地交割到稳定运营的开发主进度计划。
  BC-4900.40.20:
    name: 开发预算控制
    description: |
      控制包含硬性成本、软性成本、融资成本及应急储备的开发总成本预算。
  BC-4900.40.30:
    name: 开发风险与应急储备管理
    description: |
      识别、量化和管理方案风险及应急储备动用情况。
  BC-4900.40.40:
    name: 利益相关方报告
    description: |
      向投资人、贷款方及内部治理机构报告开发进展。
  BC-4900.50:
    name: 总体规划与概念设计管理
    description: |
      制定长期总体规划，并按开发商意图监管概念及方案设计阶段。
  BC-4900.50.10:
    name: 总体规划定义
    description: |
      为多期或多地块开发项目定义总体规划，包括分期安排。
  BC-4900.50.20:
    name: 概念与方案设计监管
    description: |
      就设计任务书要求，对建筑师的概念和方案设计成果进行业主方监管。
  BC-4900.50.30:
    name: 设计标准管理
    description: |
      在顾问团队中维护和推行开发商设计标准及品牌标准。
  BC-4900.50.40:
    name: 可持续性设计任务书定义
    description: |
      为开发项目定义可持续性和绿色认证任务书（LEED、BREEAM、WELL、NABERS）。
  BC-4900.60:
    name: 开发融资结构设计
    description: |
      对完成开发所需的股权、债务及激励资本进行结构设计。
  BC-4900.60.10:
    name: 股权资本化
    description: |
      为开发项目募集和完成发起人及有限合伙人股权投资。
  BC-4900.60.20:
    name: 建设贷款发起
    description: |
      依据开发收益预测发起建设贷款和过桥贷款。
  BC-4900.60.30:
    name: 公共激励措施与税收优惠
    description: |
      申请TIF、PILOT、LIHTC及历史税收抵免等公共激励措施。
  BC-4900.60.40:
    name: 合资结构设计
    description: |
      为开发合作方设计合资载体、超额收益及分配瀑布条款。
  BC-4900.70:
    name: 施工交付监管
    description: |
      对总包商和分包商开展施工交付的业主方监管，施工执行由施工能力（BC-1150）承担。
  BC-4900.70.10:
    name: 承包商遴选与定标
    description: |
      为开发项目遴选并定标总包商及关键专业合同。
  BC-4900.70.20:
    name: 业主方施工监督
    description: |
      对施工进度、拨款及施工质量进行业主方监督。
  BC-4900.70.30:
    name: 变更单治理
    description: |
      对变更单、范围变更及对预算的应急储备动用进行治理。
  BC-4900.70.40:
    name: 质量与安全监管
    description: |
      按开发商要求和规范标准对施工质量和安全绩效进行监管。
  BC-4900.80:
    name: 招租与稳定运营管理
    description: |
      协调已竣工资产的预租赁、开业及出租率提升至稳定运营水平。
  BC-4900.80.10:
    name: 预租赁协调
    description: |
      协调在建筑竣工前开展的预租赁活动。
  BC-4900.80.20:
    name: 开业与入住协调
    description: |
      协调建筑开业、首批入住及运营移交工作。
  BC-4900.80.30:
    name: 稳定运营绩效跟踪
    description: |
      对照稳定运营收益预测，跟踪出租进度和运营绩效。
  BC-4900.80.40:
    name: 竣工检查与缺陷清单处理
    description: |
      处理交接后的竣工检查事项、潜在缺陷及承包商保修索赔。

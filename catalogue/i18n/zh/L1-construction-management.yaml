locale: zh
source: L1-construction-management.yaml
entries:
  BC-1150:
    name: 施工管理
    description: |
      负责EPC企业的施工监督与执行，确保工程按计划、按质量完成建设目标。
  BC-1150.10:
    name: 施工规划管理
    description: |
      制定施工顺序、工法与总进度计划，为施工执行提供指导依据。
  BC-1150.10.10:
    name: 施工方案
    description: |
      定义施工工法与施工顺序。
  BC-1150.10.20:
    name: 施工总进度
    description: |
      编制施工总进度与滚动展望计划。
  BC-1150.10.30:
    name: 施工资源规划
    description: |
      规划施工所需劳动力、机械与物料资源。
  BC-1150.10.40:
    name: 施工执行计划
    description: |
      编制涵盖施工战略的项目执行计划。
  BC-1150.20:
    name: 现场动员与建设管理
    description: |
      负责现场建立、临时设施搭建与场地后勤保障。
  BC-1150.20.10:
    name: 现场建立
    description: |
      搭建临时设施、办公区域与生活配套。
  BC-1150.20.20:
    name: 场地后勤规划
    description: |
      规划场地进出、临时堆放区与物料搬运。
  BC-1150.20.30:
    name: 施工机械动员
    description: |
      动员吊车、机械设备与施工设备进场。
  BC-1150.30:
    name: 施工监督管理
    description: |
      实施现场监督、施工面管理与日常现场运营。
  BC-1150.30.10:
    name: 日常现场运营
    description: |
      开展日常现场协调、早会与施工执行。
  BC-1150.30.20:
    name: 施工面管理
    description: |
      定义并推进施工作业面进展。
  BC-1150.30.30:
    name: 许可证与方案合规
    description: |
      确保符合许可要求与批准施工方案。
  BC-1150.40:
    name: 分包商管理
    description: |
      管理分包商选择、监督、绩效与付款认证。
  BC-1150.40.10:
    name: 分包商选择
    description: |
      对施工分包商开展资格预审与选择。
  BC-1150.40.20:
    name: 分包商监督
    description: |
      现场监督分包商绩效与合规情况。
  BC-1150.40.30:
    name: 付款认证
    description: |
      对分包商付款进行工程量核实与认证。
  BC-1150.40.40:
    name: 分包商变更管理
    description: |
      管理分包商变更单与索赔。
  BC-1150.50:
    name: 施工质量管理
    description: |
      在现场实施QA/QC，开展检验、停工点与见证点管理。
  BC-1150.50.10:
    name: 现场检验测试计划
    description: |
      制定ITP、停工点与见证点及检验计划。
  BC-1150.50.20:
    name: 现场质量检验
    description: |
      执行现场质量检验与测试。
  BC-1150.50.30:
    name: 不符合项与尾项清单管理
    description: |
      处理现场不符合报告并关闭尾项清单。
  BC-1150.60:
    name: 施工进度管理
    description: |
      开展进度测量、挣值分析与偏差分析。
  BC-1150.60.10:
    name: 施工进度测量
    description: |
      基于工程量开展现场进度测量。
  BC-1150.60.20:
    name: 挣值报告
    description: |
      开展挣值分析与项目绩效报告。
  BC-1150.60.30:
    name: 进度与费用偏差分析
    description: |
      开展偏差分析并制定纠偏措施。
  BC-1150.70:
    name: 现场HSE管理
    description: |
      管理现场安全、作业许可、危害管控与应急响应。
  BC-1150.70.10:
    name: 现场HSE规划
    description: |
      编制现场HSE计划与风险评估。
  BC-1150.70.20:
    name: 现场作业许可
    description: |
      管理现场作业许可与动火许可。
  BC-1150.70.30:
    name: 现场安全检查与审核
    description: |
      开展安全检查、审核与行为安全观察。
  BC-1150.70.40:
    name: 现场应急响应
    description: |
      制定现场应急预案，组织演练并管理事故。

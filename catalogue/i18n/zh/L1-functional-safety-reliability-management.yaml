locale: zh
source: L1-functional-safety-reliability-management.yaml
entries:
  BC-1970:
    name: 功能安全与可靠性管理
    description: |
      产品级功能安全分析（IEC 61508/61511/13849、ISO 26262）和可靠性工程，有别于通用质量管理和生产测试执行。
  BC-1970.10:
    name: 功能安全分析管理
    description: |
      安全相关电气产品的危害、风险及安全概念分析。
  BC-1970.10.10:
    name: 危害与风险分析
    description: |
      安全相关产品的危害识别和风险分析。
  BC-1970.10.20:
    name: 安全概念定义
    description: |
      功能安全概念和技术安全概念的定义。
  BC-1970.10.30:
    name: 安全要求分配
    description: |
      将安全要求分配至子系统和元器件。
  BC-1970.10.40:
    name: 安全案例编制
    description: |
      编制支持产品发布的安全案例文件。
  BC-1970.20:
    name: 安全完整性等级确定
    description: |
      按 IEC 61508、ISO 26262 和 ISO 13849 设定完整性目标。
  BC-1970.20.10:
    name: SIL 目标设定
    description: |
      按 IEC 61508 确定安全完整性等级。
  BC-1970.20.20:
    name: ASIL 分解
    description: |
      汽车安全相关电子产品的 ASIL 分解。
  BC-1970.20.30:
    name: 性能等级确定
    description: |
      按 ISO 13849 确定性能等级。
  BC-1970.30:
    name: 可靠性工程管理
    description: |
      可靠性要求定义、预测、分配及增长规划。
  BC-1970.30.10:
    name: 可靠性要求定义
    description: |
      定义与任务剖面相匹配的可靠性要求。
  BC-1970.30.20:
    name: 可靠性预测建模
    description: |
      使用元器件计数法和应力法进行预测建模。
  BC-1970.30.30:
    name: 可靠性分配
    description: |
      将可靠性预算自顶向下分配至各子系统。
  BC-1970.30.40:
    name: 可靠性增长规划
    description: |
      可靠性增长和纠正措施规划。
  BC-1970.40:
    name: 元器件降额与应力分析
    description: |
      对元器件进行电气、热和机械应力及降额分析。
  BC-1970.40.10:
    name: 电气应力降额
    description: |
      将电气降额规则应用于元器件。
  BC-1970.40.20:
    name: 热降额
    description: |
      元器件在其运行环境中的热降额分析。
  BC-1970.40.30:
    name: 机械应力分析
    description: |
      元器件的机械应力和疲劳分析。
  BC-1970.50:
    name: 失效模式分析
    description: |
      设计与过程 FMEA 及 FMECA 危害程度分析。
  BC-1970.50.10:
    name: 设计 FMEA
    description: |
      产品设计失效模式与影响分析。
  BC-1970.50.20:
    name: 过程 FMEA
    description: |
      生产过程的失效模式与影响分析。
  BC-1970.50.30:
    name: FMECA 危害程度分析
    description: |
      在 FMEA 输出基础上叠加危害程度分析。
  BC-1970.60:
    name: 现场失效与可靠性增长管理
    description: |
      采集和分析现场失效数据以实现可靠性增长。
  BC-1970.60.10:
    name: 现场失效数据采集
    description: |
      从已安装基础采集失效数据。
  BC-1970.60.20:
    name: 失效模式趋势分析
    description: |
      对观测到的失效模式进行趋势分析。
  BC-1970.60.30:
    name: 可靠性增长跟踪
    description: |
      跨产品代际的可靠性增长跟踪。
  BC-1970.70:
    name: 功能安全认证协调
    description: |
      与功能安全评估机构和认证机构对接协调。
  BC-1970.70.10:
    name: 功能安全评估机构对接
    description: |
      与独立功能安全评估机构的对接管理。
  BC-1970.70.20:
    name: 安全认证申请提交
    description: |
      提交功能安全认证申请文件。
  BC-1970.70.30:
    name: 功能安全监督
    description: |
      功能安全过程的定期监督审核。

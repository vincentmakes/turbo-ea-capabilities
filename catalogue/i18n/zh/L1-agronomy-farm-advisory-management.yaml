locale: zh
source: L1-agronomy-farm-advisory-management.yaml
entries:
  BC-3530:
    name: 农艺与农场咨询管理
    description: |
      土壤检测、养分与植保规划、有害生物综合防治、品种推荐、咨询服务及田间试验管理，将农艺科学转化为田间决策。
  BC-3530.10:
    name: 土壤检测与分析
    description: |
      采样、实验室分析及土壤检测结果解读，为养分和改良决策提供支撑。
  BC-3530.10.10:
    name: 土壤采样作业
    description: |
      采用网格、区域和混合方法开展田间土壤采样。
  BC-3530.10.20:
    name: 土壤检测结果解读
    description: |
      依据作物需求解读土壤检测结果。
  BC-3530.10.30:
    name: 土壤健康指标跟踪
    description: |
      跨地块随时间跟踪土壤健康指标。
  BC-3530.20:
    name: 养分管理规划
    description: |
      计算作物养分需求，生成符合4R养分管理原则的变量施肥处方。
    in_scope:
      - 养分需求计算
      - 变量施肥处方生成
      - 4R合规记录
    out_of_scope:
      - 化肥施用执行（BC-3500.40）
      - 土壤碳项目（BC-3600.50）
  BC-3530.20.10:
    name: 养分需求计算
    description: |
      按作物、产量目标和地块计算养分需求。
  BC-3530.20.20:
    name: 变量施肥处方生成
    description: |
      生成化肥和改良剂的变量施肥处方图。
  BC-3530.20.30:
    name: 4R合规记录
    description: |
      记录施肥的正确来源、用量、时间和位置，符合4R管理原则。
  BC-3530.30:
    name: 植保规划
    description: |
      风险评估、有害生物综合防治规划、喷药方案设计及抗性管理策略。
  BC-3530.30.10:
    name: 病虫害风险评估
    description: |
      利用预测模型和田间信息开展病虫害风险评估。
  BC-3530.30.20:
    name: 有害生物综合防治规划
    description: |
      结合农业防治、生物防治和化学防治措施制订IPM方案。
  BC-3530.30.30:
    name: 喷药方案设计
    description: |
      平衡防效、残留和成本的全季喷药方案设计。
  BC-3530.30.40:
    name: 抗性管理规划
    description: |
      跨作用机理的农药抗性管理规划。
  BC-3530.40:
    name: 品种与杂交种推荐
    description: |
      分析品种试验数据，向种植者发布因地制宜的品种和杂交种推荐意见。
  BC-3530.40.10:
    name: 品种试验结果分析
    description: |
      对跨站点和季节的品种试验结果进行统计分析。
  BC-3530.40.20:
    name: 区域品种推荐
    description: |
      按区域和最终用途发布品种和杂交种推荐意见。
  BC-3530.50:
    name: 农艺咨询服务
    description: |
      由农艺专业人员开展田间咨询访问、决策支持推荐及种植者培训。
  BC-3530.50.10:
    name: 田间咨询访问服务
    description: |
      到农场开展咨询访问并提供推荐意见。
  BC-3530.50.20:
    name: 决策支持推荐
    description: |
      利用决策支持工具发布农艺推荐意见。
  BC-3530.50.30:
    name: 种植者培训服务
    description: |
      举办种植者培训活动和田间日。
  BC-3530.60:
    name: 田间试验管理
    description: |
      支持农艺、品种和产品评价的重复田间试验的设计、执行和分析。
  BC-3530.60.10:
    name: 试验设计
    description: |
      重复和演示试验的统计学设计。
  BC-3530.60.20:
    name: 试验执行与数据采集
    description: |
      现场试验执行和标准化数据采集。
  BC-3530.60.30:
    name: 试验结果分析
    description: |
      试验结果统计分析及向委托方报告。

locale: zh
source: L1-chemical-commercial-trading-management.yaml
entries:
  BC-4690:
    name: 化工商业交易管理
    description: |
      开展散装和特种化学品交易、供需平衡管理、原料采购、套期保值、长期包销和价格指数参考。有别于保留企业销售和定价学科的跨行业销售（BC-410）和定价（BC-440）。
  BC-4690.10:
    name: 散装化学品交易
    description: |
      在实物市场上开展散装大宗化学品的即期和长期交易。
  BC-4690.10.10:
    name: 即期货物交易
    description: |
      按当前市场价格开展即期货物交易。
  BC-4690.10.20:
    name: 长期合同交易
    description: |
      谈判和执行长期合同交易。
  BC-4690.10.30:
    name: 急售货物销售
    description: |
      通过贸易渠道处置急售和过剩货物。
  BC-4690.20:
    name: 特种化学品商业管理
    description: |
      开展差异化特种化学品的大客户管理、分销和解决方案销售。
  BC-4690.20.10:
    name: 特种大客户管理
    description: |
      管理战略性特种化学品大客户。
  BC-4690.20.20:
    name: 分销渠道管理
    description: |
      管理间接分销渠道。
  BC-4690.20.30:
    name: 应用拉动销售
    description: |
      在下游配方商和转化商客户中开展应用拉动销售。
  BC-4690.20.40:
    name: 解决方案销售协调
    description: |
      协调针对复杂应用的多产品解决方案销售。
  BC-4690.30:
    name: 原料与石化品采购
    description: |
      为化工运营采购烃类、芳烃、生物基和无机原料。
  BC-4690.30.10:
    name: 石脑油与烯烃原料采购
    description: |
      采购裂解装置用石脑油、乙烷和烯烃原料。
  BC-4690.30.20:
    name: 芳烃原料采购
    description: |
      采购苯、甲苯和二甲苯原料。
  BC-4690.30.30:
    name: 生物基原料采购
    description: |
      在质量平衡方案下采购生物基原料。
  BC-4690.30.40:
    name: 无机原材料采购
    description: |
      采购化工生产用无机盐、矿物和矿石。
  BC-4690.40:
    name: 化工套期保值与风险管理
    description: |
      对化工账簿中的原料价格、货币和利润率敞口开展套期保值。
  BC-4690.40.10:
    name: 原料价格套期保值
    description: |
      在大宗商品市场对原料价格敞口进行套期保值。
  BC-4690.40.20:
    name: 货币敞口套期保值
    description: |
      对化工合同的外汇敞口进行套期保值。
  BC-4690.40.30:
    name: 利润率套期保值策略
    description: |
      制定和执行裂解和化工利润率套期保值策略。
  BC-4690.50:
    name: 供需平衡管理
    description: |
      汇编和对账化工产品系列的供应量、需求量和平衡情况。
  BC-4690.50.10:
    name: 需求预测汇编
    description: |
      汇编短期和中期需求预测。
  BC-4690.50.20:
    name: 供应能力汇编
    description: |
      汇编自有和代加工资产的供应能力。
  BC-4690.50.30:
    name: 平衡对账
    description: |
      对账供需平衡并识别约束因素。
  BC-4690.60:
    name: 长期包销合同管理
    description: |
      谈判、起草和绩效管理长期包销和供应协议。
  BC-4690.60.10:
    name: 包销意向书谈判
    description: |
      谈判长期包销意向书。
  BC-4690.60.20:
    name: 长期合同起草
    description: |
      起草最终长期供应和包销合同。
  BC-4690.60.30:
    name: 包销履约监测
    description: |
      监测包销合同义务的履约情况。
  BC-4690.70:
    name: 价格指数与参考管理
    description: |
      管理化工定价中使用的订阅和参考价格指数。
  BC-4690.70.10:
    name: 价格指数订阅管理
    description: |
      管理 ICIS、Argus、Platts 及类似指数的订阅。
  BC-4690.70.20:
    name: 参考价格曲线维护
    description: |
      维护内部化工品参考价格曲线。
  BC-4690.70.30:
    name: 指数挂钩定价计算
    description: |
      计算指数挂钩客户价格和合同结算金额。

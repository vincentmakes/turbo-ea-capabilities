locale: zh
source: L1-real-estate-acquisition-disposition-management.yaml
entries:
  BC-4930:
    name: 房地产收购与处置管理
    description: |
      覆盖直接、组合及实体级交易的来源拓展、项目评估、尽职调查、结构设计、谈判、交割及交割后入库的交易学科。
    in_scope:
      - 收购线索来源拓展与中介管理
      - 项目评估（现金流折现、可比交易、敏感性分析、情景分析）
      - 实物、环境、产权、租约及财务尽职调查
      - 报价策略、意向书、买卖协议及税务/载体结构设计
      - 资金监管、交割、结算清单及登记
      - 处置策略、销售营销、买方遴选
      - 交割后数据与合同入库
    out_of_scope:
      - 投资委员会治理与基金委托（BC-4910）
      - 存量资产商业计划（BC-4920）
      - 建设拨款及贷款方约定监控（BC-4980）
      - 作为服务业务的经纪服务（BC-4960）
  BC-4930.10:
    name: 收购来源拓展与初步筛查
    description: |
      通过中介、买卖方直接接触和专有渠道拓展收购机会，并按标准进行初步筛查。
  BC-4930.10.10:
    name: 收购线索来源拓展
    description: |
      通过直接渠道、中介和非公开市场渠道拓展收购线索。
  BC-4930.10.20:
    name: 中介关系管理
    description: |
      管理提供收购机会的中介和居间方关系。
  BC-4930.10.30:
    name: 初步筛查与报价决策
    description: |
      对机会进行初步筛查并决定是否参与报价。
  BC-4930.20:
    name: 收购项目评估
    description: |
      对目标资产开展财务、市场及风险评估，得出报价定价和回报预期。
  BC-4930.20.10:
    name: 现金流与现金流折现评估
    description: |
      构建资产现金流和折现现金流评估模型。
  BC-4930.20.20:
    name: 可比交易与资本化率分析
    description: |
      分析可比交易和当前资本化率以校准价值。
  BC-4930.20.30:
    name: 敏感性与情景建模
    description: |
      对租金、空置率和退出假设变化下的回报进行敏感性和情景建模。
  BC-4930.30:
    name: 尽职调查管理
    description: |
      协调并开展目标收购项目的多学科尽职调查，包括实物、环境、法律、租约和财务工作流。
  BC-4930.30.10:
    name: 实物与工程尽职调查
    description: |
      对目标资产开展实物状况评估和工程尽职调查。
  BC-4930.30.20:
    name: 环境尽职调查（第一/二阶段）
    description: |
      开展环境尽职调查，包括ASTM第一阶段和第二阶段评估。
  BC-4930.30.30:
    name: 产权、测量与规划分区尽职调查
    description: |
      对产权、测量、地役权及规划分区合规情况进行尽职调查。
  BC-4930.30.40:
    name: 租约与租户尽职调查
    description: |
      审查租约摘要、收集租户确认函并开展租户访谈。
  BC-4930.30.50:
    name: 财务与税务尽职调查
    description: |
      对运营报表、运营支出及历史税务评估进行财务和税务尽职调查。
  BC-4930.40:
    name: 交易结构设计与谈判
    description: |
      制定报价策略，开展交易结构设计，谈判约束性交易文件。
  BC-4930.40.10:
    name: 报价策略
    description: |
      定义包含定价和交易条款定位的报价策略。
  BC-4930.40.20:
    name: 意向书谈判
    description: |
      谈判意向书及独家谈判期条款。
  BC-4930.40.30:
    name: 买卖协议谈判
    description: |
      谈判并执行包含陈述与保证条款的买卖协议。
  BC-4930.40.40:
    name: 税务与载体结构设计
    description: |
      设计税务高效的收购载体，包括1031交换和实体架构。
  BC-4930.50:
    name: 交割与结算管理
    description: |
      管理已完成交易的资金监管、交割条件、结算资金及登记工作。
  BC-4930.50.10:
    name: 资金监管与交割条件
    description: |
      管理资金监管账户并跟踪交割条件至满足为止。
  BC-4930.50.20:
    name: 交割资金与结算清单
    description: |
      协调交割资金并按结算清单进行核对。
  BC-4930.50.30:
    name: 产权保险与登记
    description: |
      办理产权保险并完成房产证和抵押权的登记。
  BC-4930.60:
    name: 处置与退出管理
    description: |
      卖方端学科，涵盖处置定价、营销、买方遴选及交割后义务。
  BC-4930.60.10:
    name: 处置策略与定价
    description: |
      定义处置策略、定价及目标买方群体。
  BC-4930.60.20:
    name: 销售营销与买方参观
    description: |
      开展卖方端营销，包括信息备忘录、虚拟数据室和买方参观。
  BC-4930.60.30:
    name: 买方遴选与报价流程
    description: |
      通过征询报价、最终出价或结构性拍卖程序遴选买方。
  BC-4930.60.40:
    name: 交割后义务
    description: |
      跟踪交割后义务，包括预留款、盈利分享及赔偿索赔。
  BC-4930.70:
    name: 交割后入库
    description: |
      将新收购资产从交易团队移交至资产和物业管理团队，包括数据和合同入库。
  BC-4930.70.10:
    name: 资产数据迁移
    description: |
      将资产数据、图纸和运营档案迁移至业主系统。
  BC-4930.70.20:
    name: 租约与租户数据入库
    description: |
      将租约摘要和租户数据入库至业主系统。
  BC-4930.70.30:
    name: 供应商合同转让
    description: |
      将现有供应商和服务合同转让或替换至新业主。

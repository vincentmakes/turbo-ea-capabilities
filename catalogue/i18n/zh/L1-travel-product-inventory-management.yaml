locale: zh
source: L1-travel-product-inventory-management.yaml
entries:
  BC-4000:
    name: 旅行产品与库存管理
    description: |
      对可预订旅行产品（客房、票价、套餐、附加服务、景点）及其分类体系和内容进行主数据定义、结构化管理与库存管控，独立于销售渠道之外。
    in_scope:
      - 住宿房型、价格方案及套餐代码
      - 航空票价系列、品牌票价及票价规则
      - 组合行程（静态与动态）及附加服务目录
      - 库存池、配额及超售缓冲
      - 产品主数据、内容及图像资料
    out_of_scope:
      - 特定渠道分销对接（BC-4010）
      - 预订生命周期（BC-4020）
      - 定价策略与收益决策（BC-4030）
  BC-4000.10:
    name: 住宿产品管理
    description: |
      定义住宿产品，包括房型、价格方案、套餐代码及全企业通用的住宿分类体系。
  BC-4000.10.10:
    name: 房型与库存类别定义
    description: |
      定义房型、套房类别及库存类别，构成住宿产品的基础框架。
  BC-4000.10.20:
    name: 价格方案与价格代码定义
    description: |
      定义价格方案、价格代码及其属性，涵盖可退款性、预付款及包含规则。
  BC-4000.10.30:
    name: 住宿产品生命周期状态管理
    description: |
      管理住宿产品从拟议到上线、暂停及退市的生命周期状态。
  BC-4000.10.40:
    name: 住宿产品捆绑管理
    description: |
      构建将住宿与早餐、停车场及其他内容组合在一起的住宿套餐。
  BC-4000.20:
    name: 航空产品管理
    description: |
      定义航空票价系列、品牌票价属性、票价规则及代码共享/联程产品映射关系。
  BC-4000.20.10:
    name: 票价系列定义
    description: |
      定义用于搜索和库存管控的票价系列、舱位及票价舱位组。
  BC-4000.20.20:
    name: 品牌票价属性管理
    description: |
      管理品牌票价属性，如行李额度、选座及贵宾休息室使用权限。
  BC-4000.20.30:
    name: 票价规则编写
    description: |
      编写票价规则，涵盖提前购票、最短住宿、可组合性及更改罚金。
  BC-4000.20.40:
    name: 代码共享与联程产品映射
    description: |
      将合作航空公司产品映射至自有票价系列，用于代码共享与联程分销。
  BC-4000.30:
    name: 旅游与套餐产品管理
    description: |
      定义组合行程、多段旅行产品及动态打包组件映射关系。
  BC-4000.30.10:
    name: 静态套餐产品定义
    description: |
      定义将固定组件组合为单一可销售产品的固定套餐。
  BC-4000.30.20:
    name: 动态套餐组件映射
    description: |
      映射动态打包组件，使旅客在购物时自由组合航班、酒店与附加服务。
  BC-4000.30.30:
    name: 套餐产品版本管理
    description: |
      对套餐产品进行跨季节、手册周期及功能版本的版本管理。
  BC-4000.30.40:
    name: 套餐出发日历管理
    description: |
      定义套餐出发日历、封闭日期及季节窗口。
  BC-4000.40:
    name: 附加服务与增值产品管理
    description: |
      定义附加服务与增值产品，如餐食、行李、接送、景点、水疗及地面服务。
  BC-4000.40.10:
    name: 附加服务目录定义
    description: |
      定义附加服务目录，包括类别、变体及适用条件。
  BC-4000.40.20:
    name: 附加服务捆绑规则
    description: |
      制定附加服务与主旅行产品及其他附加服务捆绑的规则。
  BC-4000.40.30:
    name: 交叉销售资格规则
    description: |
      制定管控哪些附加服务可在哪些渠道与哪些主产品交叉销售的资格规则。
  BC-4000.40.40:
    name: 附加服务生命周期管理
    description: |
      管理附加服务从上线到退市的生命周期，包括限时优惠。
  BC-4000.50:
    name: 旅行库存分配管理
    description: |
      定义并管控旅行产品的库存池、房块、配额及预留规则。
  BC-4000.50.10:
    name: 库存池定义
    description: |
      在物业、机队或产品层级定义库存池，作为分配的基础。
  BC-4000.50.20:
    name: 配额与房块分配
    description: |
      向渠道、合作伙伴及旅行社分配配额和房块。
  BC-4000.50.30:
    name: 预留与保护舱规则
    description: |
      制定为特定细分市场、渠道或忠诚会员预留库存的规则。
  BC-4000.50.40:
    name: 超售缓冲配置
    description: |
      根据预期未到店及取消率配置超售缓冲量。
  BC-4000.60:
    name: 旅行产品主数据治理
    description: |
      对旅行产品主数据的产品分类、分类标准、属性规范及标识符完整性进行管理。
  BC-4000.60.10:
    name: 产品属性标准
    description: |
      制定产品属性标准，确保各系统与渠道间语义一致。
  BC-4000.60.20:
    name: 产品分类与标签
    description: |
      按用于搜索、商品化及报告的分类体系对产品进行分类和标签管理。
  BC-4000.60.30:
    name: 产品主数据生命周期状态
    description: |
      管理跨子产品类型的主数据生命周期状态，协调子级状态变更。
  BC-4000.60.40:
    name: 产品标识符管理
    description: |
      管理规范产品标识符，解决标识符冲突与重复问题。
  BC-4000.70:
    name: 旅行内容与图像管理
    description: |
      编写和管理描述旅行产品的说明性内容、图像、多媒体资产及评级/认证记录。
  BC-4000.70.10:
    name: 描述性内容编写
    description: |
      为旅行产品编写长篇及短篇描述性内容。
  BC-4000.70.20:
    name: 图像与多媒体资产管理
    description: |
      管理与旅行产品关联的照片、视频及360度多媒体资产。
  BC-4000.70.30:
    name: 星级评定与认证记录
    description: |
      维护旅行产品的星级评定、第三方认证及质量标志。
  BC-4000.70.40:
    name: 内容本地化
    description: |
      将产品内容本地化为各支持市场和语言版本。

locale: zh
source: L1-tour-itinerary-operations-management.yaml
entries:
  BC-4100:
    name: 旅游行程运营管理
    description: |
      运营旅行运营商和目的地管理活动，包括产品组合与供应商合同、出发决策、导游与领队交付、目的地物流、供应商协调、行程恢复及旅客文件管理。
    in_scope:
      - 旅游产品组合与供应商合同签署
      - 出发门槛与出发/取消决策
      - 导游分配、简令及在途绩效管理
      - 目的地接送和一日游交付
      - 实时行程调整和不可抗力恢复
      - 旅游客户文件和凭证签发
    out_of_scope:
      - 旅游产品主数据与库存池定义（BC-4000.30）
      - 预订生命周期（BC-4020）
      - 游轮航次运营（BC-4090）
  BC-4100.10:
    name: 旅游产品组合与合同签署
    description: |
      在各旅游品牌中完成旅游产品组合、供应商合同签署、成本核算、路线规划及产品生命周期状态管理。
  BC-4100.10.10:
    name: 供应商合同签署与配额谈判
    description: |
      签署住宿、交通及活动供应商合同，包括配额谈判。
  BC-4100.10.20:
    name: 旅游成本核算与利润构建
    description: |
      进行旅游产品成本核算，并依据目标售价构建利润。
  BC-4100.10.30:
    name: 行程组合与路线规划
    description: |
      跨目的地和供应商组件完成行程组合与路线规划。
  BC-4100.10.40:
    name: 旅游产品生命周期状态
    description: |
      管理旅游产品从概念和试运行到退市的生命周期状态。
  BC-4100.20:
    name: 旅游出发管理
    description: |
      对旅游出发进行决策，涵盖最低人数门槛、配额分配、品牌整合及取消或替换。
  BC-4100.20.10:
    name: 出发门槛与出发/取消决策
    description: |
      依据最低人数门槛决策计划出发是否执行。
  BC-4100.20.20:
    name: 出发配额与库存释放
    description: |
      跨出发批次进行座位分配和库存释放决策。
  BC-4100.20.30:
    name: 跨品牌出发整合
    description: |
      将边际出发整合至姐妹品牌或合作运营商批次。
  BC-4100.20.40:
    name: 出发取消与替换
    description: |
      取消不可行出发批次并替换至其他出发日期。
  BC-4100.30:
    name: 旅游导游与领队运营
    description: |
      完成旅游交付的导游分配、简令、绩效管理及本地导游协调。
  BC-4100.30.10:
    name: 导游与领队分配
    description: |
      按语言和行程要求将导游和领队分配至出发批次。
  BC-4100.30.20:
    name: 出发前简令与脚本管理
    description: |
      完成领队团队出发前简令，并管理行程脚本和内容。
  BC-4100.30.30:
    name: 在途导游绩效监控
    description: |
      通过宾客反馈和领队报告监控旅游交付中的导游绩效。
  BC-4100.30.40:
    name: 本地导游协调
    description: |
      依据城市和景点要求协调目的地本地导游。
  BC-4100.40:
    name: 目的地物流与接送
    description: |
      运营目的地物流，包括大巴和车辆服务、机场和酒店接送、一日游执行及活动票务。
  BC-4100.40.10:
    name: 大巴与车辆物流
    description: |
      管理行程中的大巴和车辆服务物流。
  BC-4100.40.20:
    name: 机场与酒店接送
    description: |
      运营旅游团旅客的机场和酒店接送服务。
  BC-4100.40.30:
    name: 一日游执行运营
    description: |
      在多日行程中执行一日游和观光游。
  BC-4100.40.40:
    name: 活动与景点票务运营
    description: |
      处理活动和景点票务，包括时间段分配。
  BC-4100.50:
    name: 旅游供应商协调
    description: |
      跨运营交付与目的地管理公司、住宿及活动供应商进行协调。
  BC-4100.50.10:
    name: 目的地管理公司与本地运营商协调
    description: |
      协调提供旅游服务的目的地管理公司和本地运营商。
  BC-4100.50.20:
    name: 住宿供应商协调
    description: |
      与住宿供应商协调住客安排、抵达时间及特殊要求。
  BC-4100.50.30:
    name: 景点与活动供应商协调
    description: |
      协调景点和活动供应商的进场、容量及特殊安排。
  BC-4100.50.40:
    name: 供应商绩效运营
    description: |
      依据领队反馈和旅客体验对旅游供应商进行运营绩效管理。
  BC-4100.60:
    name: 行程调整与恢复
    description: |
      实时调整旅游行程，并在中断事件（包括不可抗力及旅客主动变更）中完成恢复。
  BC-4100.60.10:
    name: 实时行程调整操作
    description: |
      在旅游进行中因运营原因实时调整行程。
  BC-4100.60.20:
    name: 不可抗力行程恢复
    description: |
      在恶劣天气、罢工及政治动荡等不可抗力事件中恢复行程。
  BC-4100.60.30:
    name: 旅客主动行程变更
    description: |
      处理影响下游供应商预订的旅客主动变更请求。
  BC-4100.60.40:
    name: 恢复补偿认定
    description: |
      在行程调整后进行补偿认定，包括退款和善意补偿。
  BC-4100.70:
    name: 旅游客户文件管理
    description: |
      签发和补发最终旅行文件、凭证、出发前信息及旅游专属旅客沟通材料。
  BC-4100.70.10:
    name: 最终旅行文件签发
    description: |
      签发最终旅行文件，包括最终行程和紧急联系信息。
  BC-4100.70.20:
    name: 凭证与服务文件签发
    description: |
      签发在旅游供应商处出示的凭证和服务文件。
  BC-4100.70.30:
    name: 出发前信息包
    description: |
      汇编出发前信息包，包括健康、签证及行李建议。
  BC-4100.70.40:
    name: 旅行文件补发操作
    description: |
      在行程调整和旅客数据变更后补发文件。

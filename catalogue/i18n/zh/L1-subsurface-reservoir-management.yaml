locale: zh
source: L1-subsurface-reservoir-management.yaml
entries:
  BC-3010:
    name: 地层与储层管理
    description: |
      贯穿生产资产全生命周期的地球科学与储层工程管理，涵盖地质描述、数值模拟、储量与资源量分类、采出策略及提高采收率方案设计。
  BC-3010.10:
    name: 地下地球科学管理
    description: |
      通过地质建模、岩石物理分析及构造解释，对生产资产进行静态地下描述。
  BC-3010.10.10:
    name: 地质建模
    description: |
      构建并更新静态地质模型和相模型。
  BC-3010.10.20:
    name: 岩石物理分析
    description: |
      开展测井分析、岩心标定及储层岩石物理评价。
  BC-3010.10.30:
    name: 构造解释
    description: |
      对生产资产进行构造和断层网络解释。
  BC-3010.10.40:
    name: 地质模型更新
    description: |
      利用新钻井、地震及生产动态数据更新地质模型。
  BC-3010.20:
    name: 储层工程
    description: |
      通过数值模拟、PVT分析、物质平衡及压力瞬变方法分析储层动态行为。
    in_scope:
      - 储层数值模拟与历史拟合
      - PVT及流体物性分析
      - 压力瞬变与试井分析
    out_of_scope:
      - 递减曲线分析与产量预测（BC-3010.50）
  BC-3010.20.10:
    name: 储层特征描述
    description: |
      对储层开展静态与动态综合特征描述。
  BC-3010.20.20:
    name: 储层数值模拟
    description: |
      开展储层数值模拟、历史拟合及预测生成。
  BC-3010.20.30:
    name: PVT与流体分析
    description: |
      开展PVT取样、实验室分析及流体物性建模。
  BC-3010.20.40:
    name: 物质平衡分析
    description: |
      利用物质平衡方法估算原地资源量和驱动机制。
  BC-3010.20.50:
    name: 压力瞬变分析
    description: |
      开展试井分析与压力瞬变解释。
  BC-3010.30:
    name: 储量与资源量管理
    description: |
      依据SPE-PRMS和SEC要求，对石油储量和或然资源量进行估算、分类及对外登记。
  BC-3010.30.10:
    name: 储量估算
    description: |
      对石油储量进行确定性和概率性估算。
  BC-3010.30.20:
    name: 储量分类
    description: |
      按SPE-PRMS类别对储量和资源量进行分类。
  BC-3010.30.30:
    name: 储量登记
    description: |
      开展年末储量登记，用于SEC及同等监管机构的信息披露。
  BC-3010.30.40:
    name: 储量审计协调
    description: |
      协调内部和第三方储量审计工作。
  BC-3010.40:
    name: 油田开发规划
    description: |
      从发现到开发批准，开展概念选择、采出策略制定及油田开发方案编制。
  BC-3010.40.10:
    name: 概念选择
    description: |
      以地下为主导，对新油田开发进行概念选择与筛选。
  BC-3010.40.20:
    name: 油田开发方案编制
    description: |
      编制用于监管机构和合作伙伴审批的油田开发方案。
  BC-3010.40.30:
    name: 采出策略制定
    description: |
      制定储层采出策略，包括泄油方案和开发井数量规划。
  BC-3010.40.40:
    name: 地下风险评估
    description: |
      评估地下不确定性及其对开发决策的商业影响。
  BC-3010.50:
    name: 产量预测
    description: |
      为资产、业务和储量规划生成并核对产量预测。
  BC-3010.50.10:
    name: 递减曲线分析
    description: |
      通过递减曲线分析预测单井和油田产量。
  BC-3010.50.20:
    name: 产量预测生成
    description: |
      综合单井、储层及设施约束条件，生成产量预测。
  BC-3010.50.30:
    name: 预测核对
    description: |
      将地下预测结果与产量核算实际数据进行核对。
  BC-3010.60:
    name: 提高与强化采收率管理
    description: |
      设计和跟踪二次采收和三次采收方案，包括注水、注气及EOR工艺。
  BC-3010.60.10:
    name: 二次采收方案设计
    description: |
      设计注水和注气二次采收方案。
  BC-3010.60.20:
    name: 三次采收方案设计
    description: |
      设计化学驱、热力采油和混相提高采收率方案。
  BC-3010.60.30:
    name: 注入策略跟踪
    description: |
      跟踪和优化注入井网及亏空补偿效果。

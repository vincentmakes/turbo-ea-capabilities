locale: zh
source: L1-field-service-management.yaml
entries:
  BC-1050:
    name: 现场服务管理
    description: |
      管理已安装设备的服务响应、现场技术人员派遣、现场维修与调试。
  BC-1050.10:
    name: 服务请求管理
    description: |
      采集、分诊并鉴定客户服务请求，确保快速响应。
  BC-1050.10.10:
    name: 服务请求受理
    description: |
      通过多渠道受理客户服务请求。
  BC-1050.10.20:
    name: 服务请求分诊
    description: |
      对服务请求进行分诊、分类与路由。
  BC-1050.10.30:
    name: 远程诊断与解决
    description: |
      开展远程诊断并尽可能实现首次远程解决。
  BC-1050.20:
    name: 服务派遣管理
    description: |
      统筹技术人员排班、路线规划与派遣。
  BC-1050.20.10:
    name: 技术人员排班
    description: |
      按技能与可用性安排技术人员排班。
  BC-1050.20.20:
    name: 路线优化
    description: |
      优化服务拜访的路线与出行安排。
  BC-1050.20.30:
    name: 派遣执行
    description: |
      实时派遣并调整服务工单。
  BC-1050.30:
    name: 服务执行管理
    description: |
      在客户现场执行服务作业并完成服务记录。
  BC-1050.30.10:
    name: 现场服务交付
    description: |
      按工单在现场执行服务任务。
  BC-1050.30.20:
    name: 服务文档采集
    description: |
      采集服务记录、照片与客户签字。
  BC-1050.30.30:
    name: 客户验收管理
    description: |
      获取客户对已完成服务的签字确认。
  BC-1050.40:
    name: 服务备件管理
    description: |
      管理现场部署备件、随车库存与补货。
  BC-1050.40.10:
    name: 随车库存管理
    description: |
      定义并管理随车库存与前置库存。
  BC-1050.40.20:
    name: 服务备件补货
    description: |
      补充前置库存点与技术人员随车库存。
  BC-1050.40.30:
    name: 服务备件退回
    description: |
      处理现场未用、缺陷或可修复备件的退回。
  BC-1050.50:
    name: 服务合同管理
    description: |
      管理服务协议、SLA与服务权益。
  BC-1050.50.10:
    name: 服务协议编制
    description: |
      编制服务合同、服务级别与合同条款。
  BC-1050.50.20:
    name: 服务权益管理
    description: |
      在服务请求与派遣环节核验服务权益。
  BC-1050.50.30:
    name: 服务合同续签
    description: |
      办理服务合同续签与价格调整。
  BC-1050.50.40:
    name: 服务计费
    description: |
      对服务合同与时间材料费用进行计费。
  BC-1050.60:
    name: 现场服务绩效管理
    description: |
      跟踪首次修复率、响应时间、NPS与技术人员生产力，持续优化服务质量。
  BC-1050.60.10:
    name: 首次修复率跟踪
    description: |
      衡量并改善首次修复率。
  BC-1050.60.20:
    name: 响应与解决时间跟踪
    description: |
      基于SLA跟踪响应与解决时间。
  BC-1050.60.30:
    name: 技术人员生产力报告
    description: |
      报告技术人员利用率、有效工时与生产力。
  BC-1050.60.40:
    name: 服务NPS与满意度
    description: |
      衡量服务相关NPS与客户满意度。
metadata:
  translator: Claude (zh automated)

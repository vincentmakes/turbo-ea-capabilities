locale: zh
source: L1-livestock-production-management.yaml
entries:
  BC-3510:
    name: 畜牧生产管理
    description: |
      陆生畜禽的农场生产——牲畜群体规划、育种、营养、动物健康、福利、分娩、生长记录及牛、羊、猪和家禽的屠宰前准备。
  BC-3510.10:
    name: 牲畜群体规划
    description: |
      跨畜牧企业的存栏量、补充及生产周期规划。
  BC-3510.10.10:
    name: 存栏量规划
    description: |
      与牧草供应和承载量相匹配的存栏量决策。
  BC-3510.10.20:
    name: 补充动物规划
    description: |
      繁殖种畜和蛋鸡群的补充率规划。
  BC-3510.10.30:
    name: 生产周期规划
    description: |
      生产周期的日历规划，包括批次分娩和季节性犊牛生产。
  BC-3510.20:
    name: 动物育种管理
    description: |
      遗传选择、配种、授精、系谱记录及育种绩效跟踪。
    in_scope:
      - 遗传与性状选择决策
      - 自然交配和人工授精
      - 系谱与亲子关系记录
      - 育种值评估
  BC-3510.20.10:
    name: 遗传选择决策
    description: |
      依据估计育种值和性状目标选择种畜。
  BC-3510.20.20:
    name: 配种与授精作业
    description: |
      自然交配、人工授精及胚胎移植作业。
  BC-3510.20.30:
    name: 系谱与亲子关系记录
    description: |
      记录系谱、亲子关系及良种登记注册。
  BC-3510.20.40:
    name: 育种绩效评估
    description: |
      评估育种绩效并更新育种值。
  BC-3510.30:
    name: 动物营养管理
    description: |
      跨畜禽类别的日粮配制、饲料投喂、草场放牧及饲料转化率跟踪。
  BC-3510.30.10:
    name: 日粮配制
    description: |
      依据品种和生产阶段要求进行最低成本日粮配制。
  BC-3510.30.20:
    name: 饲料发放与投喂
    description: |
      向围栏、畜舍和放牧区进行日常饲料发放、混合与投喂。
  BC-3510.30.30:
    name: 草场放牧管理
    description: |
      轮牧和连续放牧管理及草场残留量监测。
  BC-3510.30.40:
    name: 饲料转化率跟踪
    description: |
      跟踪饲料转化率和日均增重指标。
  BC-3510.40:
    name: 动物健康管理
    description: |
      兽医治疗、疫苗接种、寄生虫防控、疫病监测及休药期管理。
    in_scope:
      - 兽医治疗记录
      - 疫苗接种和寄生虫防控计划
      - 法定疫病监测
      - 兽药休药期跟踪
    out_of_scope:
      - 动物福利审核（BC-3510.50）
      - MRL残留监测（BC-3590.50）
  BC-3510.40.10:
    name: 兽医治疗记录
    description: |
      记录兽医治疗、处方及治疗结果。
  BC-3510.40.20:
    name: 疫苗接种计划执行
    description: |
      执行牲畜群体疫苗接种计划。
  BC-3510.40.30:
    name: 寄生虫防控计划
    description: |
      体内外寄生虫防控计划及耐药性管理。
  BC-3510.40.40:
    name: 疫病监测与报告
    description: |
      法定疫病和人畜共患病的监测与法定报告。
  BC-3510.40.50:
    name: 休药期管理
    description: |
      跟踪兽药和饲料添加剂的休药期。
  BC-3510.50:
    name: 动物福利管理
    description: |
      日常福利实践，包括饲养条件、操作规程及依据保障标准的福利监测。
  BC-3510.50.10:
    name: 饲养与存栏条件
    description: |
      各畜禽类别的圈舍、通风及存栏密度管理。
  BC-3510.50.20:
    name: 操作规程标准
    description: |
      低应激操作和畜禽饲养管理规程标准。
  BC-3510.50.30:
    name: 福利结果监测
    description: |
      福利结果测量和农场福利评审。
  BC-3510.60:
    name: 繁殖与分娩运营
    description: |
      牛、羊、猪和家禽的发情检测、分娩及新生动物护理运营。
  BC-3510.60.10:
    name: 发情检测运营
    description: |
      通过观察、传感器和同期化程序开展发情检测。
  BC-3510.60.20:
    name: 分娩运营
    description: |
      产犊、产羔、分娩和孵化运营及助产。
  BC-3510.60.30:
    name: 新生动物护理运营
    description: |
      新生动物营养、初乳管理及早期护理。
  BC-3510.70:
    name: 生长与绩效记录
    description: |
      记录生长、产奶、产蛋及胴体绩效，用于生产和育种决策。
  BC-3510.70.10:
    name: 增重记录
    description: |
      定期称重和日均增重记录。
  BC-3510.70.20:
    name: 产奶量记录
    description: |
      逐头牛和大罐奶产奶量与成分记录。
  BC-3510.70.30:
    name: 产蛋量记录
    description: |
      每栋鸡舍和鸡群的日产蛋量记录。
  BC-3510.70.40:
    name: 胴体绩效跟踪
    description: |
      跟踪胴体产量、分级及主要切块绩效。
  BC-3510.80:
    name: 屠宰前准备与出栏
    description: |
      选定育肥动物并协调向屠宰场的出栏，包括转运文件。
  BC-3510.80.10:
    name: 屠宰前选定
    description: |
      依据体重、脂肪厚度和合同规格选定育肥动物。
  BC-3510.80.20:
    name: 动物转运文件
    description: |
      转运文件和食品链信息传递。
  BC-3510.80.30:
    name: 屠宰场出栏协调
    description: |
      协调农场至屠宰场的出栏与运输。

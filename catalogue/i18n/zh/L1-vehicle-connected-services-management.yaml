locale: zh
source: L1-vehicle-connected-services-management.yaml
entries:
  BC-3460:
    name: 整车联网服务管理
    description: |
      联网车辆服务的运营——车辆连接平台、OTA软件更新、车载应用与订阅、车辆数据平台、V2X服务、车辆安全运营及联网服务客户支持。
  BC-3460.10:
    name: 车辆连接平台运营
    description: |
      运营车内连接、SIM卡配置及车辆至云端遥测平台。
  BC-3460.10.10:
    name: 整车SIM卡与连接配置
    description: |
      为联网车辆配置嵌入式SIM连接及运营商漫游。
  BC-3460.10.20:
    name: 连接网络运营
    description: |
      运营支持车辆服务的连接骨干网，包括故障切换和服务质量管理。
  BC-3460.10.30:
    name: 车辆至云端遥测运营
    description: |
      运营从车内代理到云平台的车辆遥测数据管道。
  BC-3460.20:
    name: OTA软件更新运营
    description: |
      依据UN R156及软件更新管理系统运营OTA软件更新活动。
  BC-3460.20.10:
    name: OTA活动规划
    description: |
      规划OTA软件更新活动，包括范围、资质认定及推送策略。
  BC-3460.20.20:
    name: OTA包分发
    description: |
      向车辆分发签名OTA包，并跨ECU编排安装。
  BC-3460.20.30:
    name: OTA回滚与恢复管理
    description: |
      管理更新失败时的OTA回滚、恢复及现场事件响应。
  BC-3460.30:
    name: 车载应用与订阅管理
    description: |
      运营车载应用商店、订阅生命周期及车载支付服务。
  BC-3460.30.10:
    name: 联网服务目录管理
    description: |
      维护向客户提供的联网服务和车载应用目录。
  BC-3460.30.20:
    name: 订阅生命周期管理
    description: |
      管理客户对联网服务和按需功能服务的订阅生命周期。
  BC-3460.30.30:
    name: 车载支付运营
    description: |
      运营车载支付、令牌化及交易结算。
  BC-3460.40:
    name: 车辆数据平台运营
    description: |
      运营车辆数据平台——数据摄入、存储、共享及同意管理，支持第一方和第三方使用场景。
    in_scope:
      - 车辆数据摄入与存储
      - 面向内部和合作伙伴消费方的车辆数据共享API
      - 车辆数据隐私与同意管理
    out_of_scope:
      - 通用企业数据管理（归属于企业数据与IT）
      - 功能安全用例编写（BC-3400.80）
  BC-3460.40.10:
    name: 车辆数据摄入与存储
    description: |
      以车队规模摄入、规范化并存储车辆遥测和事件数据。
  BC-3460.40.20:
    name: 车辆数据共享与API管理
    description: |
      依据数据共享协议向内部团队、经销商及外部合作伙伴提供车辆数据API。
  BC-3460.40.30:
    name: 车辆数据隐私与同意管理
    description: |
      管理车辆生成数据的客户同意、偏好及隐私控制。
  BC-3460.50:
    name: V2X与协同出行服务
    description: |
      运营V2X消息服务及与基础设施和其他车辆的协同出行服务。
  BC-3460.50.10:
    name: V2I服务运营
    description: |
      运营车辆至基础设施服务，如信号相位与配时、施工区预警及收费。
  BC-3460.50.20:
    name: V2V消息运营
    description: |
      依据SAE J2735及同等标准运营车辆至车辆消息服务和广播频道。
  BC-3460.50.30:
    name: 协同感知服务运营
    description: |
      跨混合车队运营协同感知、危险预警及编队行驶服务。
  BC-3460.60:
    name: 车辆安全运营
    description: |
      对联网车队进行运营安全监控，并响应车辆网络安全事件。
  BC-3460.60.10:
    name: 车辆威胁检测
    description: |
      检测联网车队中的网络威胁和异常行为。
  BC-3460.60.20:
    name: 车辆安全事件响应
    description: |
      响应车辆网络安全事件，包括遏制、修复及客户通知。
  BC-3460.60.30:
    name: 整车SOC运营
    description: |
      运营车辆安全运营中心及支撑遥测管道。
  BC-3460.70:
    name: 联网服务客户运营
    description: |
      面向客户的联网服务运营，包括激活支持、问题解决及账户管理。
  BC-3460.70.10:
    name: 联网服务激活支持
    description: |
      支持客户激活、转移和停用联网服务。
  BC-3460.70.20:
    name: 联网服务问题解决
    description: |
      通过客服中心、经销商和自助服务渠道解决客户上报的联网服务问题。
  BC-3460.70.30:
    name: 联网服务账户管理
    description: |
      管理联网服务客户账户、身份及与车辆挂钩的权益。

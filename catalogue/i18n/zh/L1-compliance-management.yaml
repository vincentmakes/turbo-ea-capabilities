locale: zh
source: L1-compliance-management.yaml
entries:
  BC-130:
    name: 合规管理
    description: |
      确保遵守法律法规及内部政策。
  BC-130.10:
    name: 监管合规管理
    description: |
      确保符合行业特定法规的合规要求。
  BC-130.10.10:
    name: 监管清单管理
    description: |
      梳理各司法管辖区适用法规及合规义务清单。
  BC-130.10.20:
    name: 监管变化监测
    description: |
      对监管动态进行前瞻性扫描并评估影响。
  BC-130.10.30:
    name: 合规风险评估
    description: |
      按业务线、地区及产品评估合规风险。
  BC-130.10.40:
    name: 合规监控与测试
    description: |
      执行合规监控计划、控制测试及报告。
  BC-130.10.50:
    name: 监管机构沟通管理
    description: |
      处理监管机构通知、检查及整改跟踪。
  BC-130.20:
    name: 政策管理
    description: |
      管理政策全生命周期，包括起草、审批、确认及退出。
  BC-130.20.10:
    name: 政策起草
    description: |
      起草并修订企业政策与标准。
  BC-130.20.20:
    name: 政策审批与发布
    description: |
      经治理审批后受控发布政策。
  BC-130.20.30:
    name: 政策确认
    description: |
      由员工及第三方签署确认政策已知晓。
  BC-130.20.40:
    name: 政策例外管理
    description: |
      记录并审批政策例外及豁免申请。
  BC-130.30:
    name: 道德与行为管理
    description: |
      管理行为准则、道德操守及举报项目。
  BC-130.30.10:
    name: 行为准则管理
    description: |
      维护并推行企业行为准则。
  BC-130.30.20:
    name: 利益冲突管理
    description: |
      披露并管理个人及组织层面的利益冲突。
  BC-130.30.30:
    name: 举报与畅言管理
    description: |
      建立举报渠道、受理分类及保护举报人。
  BC-130.30.40:
    name: 行为调查
    description: |
      调查涉嫌不当行为并管理纪律处分案件。
  BC-130.40:
    name: 反贿赂与反腐败管理
    description: |
      管理反腐项目、第三方尽职调查及礼品与接待事宜。
  BC-130.40.10:
    name: 反腐项目治理
    description: |
      依据 FCPA 和 UKBA 设计反贿赂与腐败项目。
  BC-130.40.20:
    name: 第三方诚信尽职调查
    description: |
      对中间商开展诚信尽职调查并持续监控。
  BC-130.40.30:
    name: 礼品、招待与赞助管理
    description: |
      对礼品、招待及赞助实施预审批和登记管理。
  BC-130.40.40:
    name: 反腐培训与意识提升
    description: |
      针对反贿赂要求开展专项培训与宣传。
  BC-130.50:
    name: 隐私与数据保护管理
    description: |
      确保符合 GDPR 或等效法规，处理数据主体权利及隐私设计。
  BC-130.50.10:
    name: 隐私项目治理
    description: |
      建立隐私框架、数据保护官职能及问责安排。
  BC-130.50.20:
    name: 处理活动记录管理
    description: |
      维护数据处理活动记录及数据流向记录。
  BC-130.50.30:
    name: 数据保护影响评估
    description: |
      对新处理活动开展数据保护影响评估及隐私设计审查。
  BC-130.50.40:
    name: 数据主体权利处理
    description: |
      受理并履行访问、更正及删除请求。
  BC-130.50.50:
    name: 个人数据泄露管理
    description: |
      检测、通报并修复个人数据泄露事件。

locale: zh
source: L1-aeronautical-meteorology-management.yaml
entries:
  BC-1250:
    name: 航空气象管理
    description: |
      提供气象观测、预报、简报及危险天气服务，支持飞行运营决策和空中交通管制工作。
  BC-1250.10:
    name: 气象观测管理
    description: |
      负责 METAR 报告、自动化观测、传感器网络及地面气象观测，为飞行运营提供实时气象数据。
  BC-1250.10.10:
    name: 地面天气观测
    description: |
      在机场开展人工和自动地面天气观测，获取准确的机场气象参数。
  BC-1250.10.20:
    name: METAR 与 SPECI 编制
    description: |
      编制并发布 METAR 和特殊天气报告（SPECI），及时通报机场气象实况。
  BC-1250.10.30:
    name: 气象传感器网络管理
    description: |
      运营自动气象观测系统和传感器网络，保障气象数据的连续采集。
  BC-1250.20:
    name: 气象预报管理
    description: |
      编制 TAF、区域预报、SIGMET、AIRMET 及 GAMET，为飞行计划和管制工作提供预报信息。
  BC-1250.20.10:
    name: 机场天气预报编制
    description: |
      编制机场终端预报（TAF）和趋势预报，为飞行机组提供机场气象预报信息。
  BC-1250.20.20:
    name: 区域预报编制
    description: |
      编制区域预报、低空气象区域预报（GAMET）及重要天气预告图，支持航路飞行规划。
  BC-1250.20.30:
    name: SIGMET 与 AIRMET 签发
    description: |
      签发 SIGMET 和 AIRMET 咨询通报，及时预警危害飞行安全的天气现象。
  BC-1250.30:
    name: 气象简报与咨询管理
    description: |
      提供飞行前简报、向 ATS 单位的咨询服务及飞行中气象通报，支持全飞行阶段的气象保障。
  BC-1250.30.10:
    name: 飞行前简报服务
    description: |
      提供自助简报和协助简报服务，帮助飞行机组全面了解飞行路线气象状况。
  BC-1250.30.20:
    name: ATS 单位气象咨询
    description: |
      向 ATS 单位和管制主任提供气象咨询，支持管制决策。
  BC-1250.30.30:
    name: 飞行中气象咨询
    description: |
      向空域用户提供飞行中气象咨询服务，保障飞行机组及时获取气象更新信息。
  BC-1250.40:
    name: 危险天气管理
    description: |
      管理火山灰咨询、强对流天气及空间天气影响，保障飞行运营免受极端天气威胁。
  BC-1250.40.10:
    name: 火山灰咨询服务
    description: |
      与火山灰咨询中心（VAACs）协调并发布火山灰咨询通报，防范火山灰对航空的威胁。
  BC-1250.40.20:
    name: 强天气警告服务
    description: |
      签发强天气警告（积雨云、颠簸、积冰），提醒飞行机组和管制员注意危险天气。
  BC-1250.40.30:
    name: 空间天气咨询服务
    description: |
      依据 ICAO 要求提供空间天气咨询，通报太阳活动对航空运营的潜在影响。

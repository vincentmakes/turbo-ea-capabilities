locale: zh
source: L1-content-origination-production-management.yaml
entries:
  BC-3700:
    name: 内容创作与制作管理
    description: |
      涵盖视听、音频及编辑内容从概念到可交付母版的全流程，包括立项审批、前期制作、主体拍摄或制作室制作、直播与新闻制作、后期制作及本地化。
  BC-3700.10:
    name: 内容委托与立项审批
    description: |
      评估概念与提案、制定节目单构成，并授权委托新制作项目或外购内容。
  BC-3700.10.10:
    name: 概念与提案评估
    description: |
      依据编辑和商业标准，对收到的提案、故事大纲及创作圣经进行结构化评审。
  BC-3700.10.20:
    name: 节目单与内容组合规划
    description: |
      按类型、预算、受众及发行窗口期构建制作节目单组合。
  BC-3700.10.30:
    name: 立项决策
    description: |
      记录立项决策的授权主体及决策内容，包括预算、排期及创作边界。
  BC-3700.10.40:
    name: 委托书管理
    description: |
      起草并维护发送给内部制作部门和外部制作公司的委托书全生命周期。
  BC-3700.20:
    name: 前期制作管理
    description: |
      剧本开发、制作预算、排期及选景与布景规划，将立项内容推进至可开拍状态。
  BC-3700.20.10:
    name: 剧本与分镜开发
    description: |
      针对剧情和非剧情制作，迭代开发剧本、分镜及拍摄清单。
  BC-3700.20.20:
    name: 制作预算规划
    description: |
      按部门和阶段编制详细的自下而上制作预算，涵盖风险储备及完工担保因素。
  BC-3700.20.30:
    name: 制作排期
    description: |
      编制拍摄条带表和拍摄日程，统筹演员及剧组档期，规划分组拍摄安排。
  BC-3700.20.40:
    name: 选景与布景规划
    description: |
      开展选景勘查、审批手续及制作室与实景的布景设计与搭建规划。
  BC-3700.30:
    name: 制作运营管理
    description: |
      执行主体拍摄或制作室制作，包括剧组人员、设备及片场工作流程的统筹。
  BC-3700.30.10:
    name: 制作室制作运营
    description: |
      面向娱乐、剧情及非剧情类节目的制作室制作，含多机位制作室搭建。
  BC-3700.30.20:
    name: 外景制作运营
    description: |
      在实景及偏远外景地执行制作，包括剧组管理及片场安全。
  BC-3700.30.30:
    name: 制作后勤与剧组运营
    description: |
      统筹剧组通告单、交通、餐饮及跨制作设备调配等后勤工作。
  BC-3700.40:
    name: 直播活动与新闻制作管理
    description: |
      实时制作直播活动、体育赛事及新闻节目，含多机位导播及直播图文制作。
  BC-3700.40.10:
    name: 直播活动制作
    description: |
      通过实时切换和音频混音制作现场娱乐活动及特别节目。
  BC-3700.40.20:
    name: 新闻节目制作
    description: |
      新闻编辑室制作新闻报道和滚动新闻，包括串联单管理及直播连线协调。
  BC-3700.40.30:
    name: 体育赛事制作
    description: |
      多机位制作体育直播，涵盖转播车及主持广播运营。
  BC-3700.40.40:
    name: 实时图文与慢动作回放
    description: |
      为直播及准直播节目提供播出图文、记分板及即时回放服务。
  BC-3700.50:
    name: 后期制作管理
    description: |
      画面、声音、调色及精修工作流程，将拍摄素材加工至可交付的母版级别。
  BC-3700.50.10:
    name: 画面剪辑与视觉特效
    description: |
      完成离线和在线画面剪辑、视觉特效合成及剪辑决定的套底工作。
  BC-3700.50.20:
    name: 音频后期制作
    description: |
      完成对白剪辑、ADR、拟音、音效设计，并按交付响度规范完成终混。
  BC-3700.50.30:
    name: 调色与精修
    description: |
      完成面向HDR和SDR交付版本的创意性及技术性调色与精修。
  BC-3700.50.40:
    name: 母版制作与套底
    description: |
      制作交付母版、IMF及广播中间格式包，并按交付规范完成套底。
  BC-3700.60:
    name: 本地化与版本管理
    description: |
      制作字幕、配音及针对地区或平台的特定剪辑版本与版本母版，用于内容分发。
  BC-3700.60.10:
    name: 字幕与隐藏字幕制作
    description: |
      以多语言、多格式制作字幕和隐藏字幕。
  BC-3700.60.20:
    name: 配音制作
    description: |
      为地区发行完成翻译、配音选角及配音录制工作。
  BC-3700.60.30:
    name: 语言版本与地区剪辑管理
    description: |
      制作语言及地区版本母版，包括针对特定地区的剪辑版本。

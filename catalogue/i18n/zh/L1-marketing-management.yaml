locale: zh
source: L1-marketing-management.yaml
entries:
  BC-400:
    name: 市场营销管理
    description: |
      管理品牌、市场情报、需求创造及市场营销运营。
  BC-400.10:
    name: 市场营销战略管理
    description: |
      制定市场营销战略、定位及市场推广计划。
  BC-400.10.10:
    name: 市场细分与目标定向
    description: |
      定义目标市场、细分市场及用户画像。
  BC-400.10.20:
    name: 定位与价值主张
    description: |
      阐明定位、核心信息及价值主张。
  BC-400.10.30:
    name: 市场推广规划
    description: |
      制定市场推广模型、上市计划及渠道策略。
  BC-400.10.40:
    name: 营销组合规划
    description: |
      制定营销组合、渠道分配及整合营销计划。
  BC-400.20:
    name: 品牌管理
    description: |
      管理品牌战略、视觉识别、品牌资产及治理。
  BC-400.20.10:
    name: 品牌战略与架构
    description: |
      管理品牌组合、架构及品牌战略。
  BC-400.20.20:
    name: 品牌视觉识别与规范
    description: |
      管理视觉识别、品牌声音、语气及品牌规范。
  BC-400.20.30:
    name: 品牌资产测量
    description: |
      跟踪品牌知名度、考量度及品牌资产。
  BC-400.20.40:
    name: 品牌合规与管理
    description: |
      监督品牌在各渠道及合作伙伴中的规范使用。
  BC-400.30:
    name: 市场情报管理
    description: |
      开展市场研究、竞争情报及客户洞察。
  BC-400.30.10:
    name: 市场研究
    description: |
      开展一手和二手市场研究及趋势分析。
  BC-400.30.20:
    name: 竞争情报
    description: |
      监控竞争对手，制作竞品分析卡及竞争分析报告。
  BC-400.30.30:
    name: 客户洞察生成
    description: |
      综合数据与定性研究提炼客户洞察。
  BC-400.30.40:
    name: 市场规模与预测
    description: |
      开展市场规模、市场份额及需求预测分析。
  BC-400.40:
    name: 需求创造管理
    description: |
      管理线索获取活动及生命周期市场营销。
  BC-400.40.10:
    name: 活动规划
    description: |
      规划活动、受众选择及优惠方案开发。
  BC-400.40.20:
    name: 线索获取
    description: |
      通过入站、出站及活动驱动方式获取线索。
  BC-400.40.30:
    name: 线索培育与评分
    description: |
      开展线索评分、培育旅程管理及营销合格线索移交销售。
  BC-400.40.40:
    name: 生命周期与留存市场营销
    description: |
      开展生命周期营销、交叉销售及客户留存活动。
  BC-400.50:
    name: 市场营销运营管理
    description: |
      管理营销预算、技术工具、流程及效果衡量。
  BC-400.50.10:
    name: 营销预算管理
    description: |
      管理营销预算编制、分配及费用跟踪。
  BC-400.50.20:
    name: 营销技术栈管理
    description: |
      选型并整合营销自动化与分析工具。
  BC-400.50.30:
    name: 营销绩效测量
    description: |
      开展营销归因、ROI 分析及绩效仪表板管理。
  BC-400.50.40:
    name: 营销合规管理
    description: |
      确保营销活动符合同意授权、隐私及广告规范。
  BC-400.60:
    name: 数字营销管理
    description: |
      管理网站、SEO、付费媒体、社交媒体及营销自动化。
  BC-400.60.10:
    name: 网站体验管理
    description: |
      管理企业网站、内容管理及个性化推荐。
  BC-400.60.20:
    name: 搜索引擎优化
    description: |
      优化自然搜索排名及内容可发现性。
  BC-400.60.30:
    name: 付费媒体管理
    description: |
      购买搜索、展示、视频及程序化付费媒体广告。
  BC-400.60.40:
    name: 社交媒体管理
    description: |
      管理社交媒体自然内容、社区运营及网红互动。
  BC-400.60.50:
    name: 营销自动化运营
    description: |
      运营电子邮件、旅程编排及营销自动化系统。
  BC-400.70:
    name: 内容营销管理
    description: |
      管理编辑规划、内容制作及内容分发。
  BC-400.70.10:
    name: 编辑规划
    description: |
      制定内容日历、主题及内容战略。
  BC-400.70.20:
    name: 内容制作
    description: |
      制作文章、视频、播客及多媒体资产。
  BC-400.70.30:
    name: 数字资产管理
    description: |
      存储、标注并复用数字营销资产。
  BC-400.70.40:
    name: 内容分发与联合发布
    description: |
      通过自有、赚取及付费渠道分发内容。

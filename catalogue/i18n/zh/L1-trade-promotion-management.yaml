locale: zh
source: L1-trade-promotion-management.yaml
entries:
  BC-2360:
    name: 贸易促销管理
    description: |
      消费品行业对零售客户的贸易投资管理，涵盖联合业务计划、贸易费用预算、门店活动执行、扣款处理及活动后提振效果衡量。
  BC-2360.10:
    name: 贸易促销策略与规划
    description: |
      制定年度贸易促销策略、客户级投资计划，并与零售客户谈判联合业务计划。
    in_scope:
      - 年度贸易促销日历
      - 客户级联合业务计划
      - 上架费与陈列费策略
  BC-2360.10.10:
    name: 年度贸易计划制定
    description: |
      制定年度贸易促销计划及活动日历。
  BC-2360.10.20:
    name: 与客户的联合业务规划
    description: |
      与战略零售客户开展联合业务规划。
  BC-2360.10.30:
    name: 上架费与陈列费策略
    description: |
      制定并谈判新品上架费及陈列费策略。
  BC-2360.20:
    name: 贸易费用预算管理
    description: |
      进行贸易费用预算、应计计提，跨客户分配资金，并对贸易投资实施财务管控。
  BC-2360.20.10:
    name: 贸易费用预算制定
    description: |
      按客户、品牌及活动制定贸易费用预算。
  BC-2360.20.20:
    name: 贸易费用应计管理
    description: |
      按客户及活动计提贸易费用负债。
  BC-2360.20.30:
    name: 贸易费用分配
    description: |
      跨客户、区域及活动分配贸易费用资金。
  BC-2360.20.40:
    name: 贸易费用财务管控
    description: |
      对贸易费用实施财务管控，包括审批权限管理。
  BC-2360.30:
    name: 促销活动执行管理
    description: |
      执行线下与线上促销活动，包括完美门店审计及业务代表落地执行。
  BC-2360.30.10:
    name: 与客户协同活动布置
    description: |
      与零售客户协同布置促销活动，包括物料及预测对接。
  BC-2360.30.20:
    name: 门店陈列与活化
    description: |
      激活门店陈列、端架及二次陈列位。
  BC-2360.30.30:
    name: 完美门店审计执行
    description: |
      开展完美门店实地审计及图像识别核查。
  BC-2360.30.40:
    name: 业务代表团队激活
    description: |
      调动业务代表团队推动活动落地执行。
  BC-2360.40:
    name: 扣款与索赔管理
    description: |
      对客户从发票中扣取的款项及促销索赔进行验证、争议处理与结案。
    in_scope:
      - 扣款录入并匹配至活动
      - 按约定条款验证
      - 争议解决与追偿
    out_of_scope:
      - 通用应收账款催收（BC-200）
  BC-2360.40.10:
    name: 扣款录入与匹配
    description: |
      录入客户扣款并与促销活动进行匹配。
  BC-2360.40.20:
    name: 扣款验证
    description: |
      按约定条款、数量及价格验证扣款合理性。
  BC-2360.40.30:
    name: 争议解决与追偿
    description: |
      与客户解决争议并追偿无效扣款。
  BC-2360.50:
    name: 贸易促销效果衡量
    description: |
      开展活动后效果评估，包括促销提振量、基线与增量对比分析，以及按活动、客户和品牌计算ROI。
  BC-2360.50.10:
    name: 基线与提振量衡量
    description: |
      衡量基线销售额与促销活动带来的增量提振。
  BC-2360.50.20:
    name: 促销ROI分析
    description: |
      按活动、客户及品牌分析贸易促销ROI。
  BC-2360.50.30:
    name: 自我蚕食与需求前置分析
    description: |
      分析自我蚕食效应及需求前置的影响。

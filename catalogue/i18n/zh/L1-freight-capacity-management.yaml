locale: zh
source: L1-freight-capacity-management.yaml
entries:
  BC-2400:
    name: 货运运力管理
    description: |
      跨船舶航次、航班、公路及铁路线路、设备池，管理运输运力的销售、分配与收益。
  BC-2400.10:
    name: 运力库存管理
    description: |
      按运输方式、线路、班期及设备类型维护可用运输运力，作为分配与预订的基础数据来源。
    in_scope:
      - 船舶、航班、车辆及机车运力记录
      - 设备池运力（集装箱、拖车、ULD）
      - 与班期挂钩的线路运力
    out_of_scope:
      - 长期网络与班期设计（BC-2410）
      - 预订与订舱受理（BC-2400.40）
  BC-2400.10.10:
    name: 船舶与运载工具运力库存
    description: |
      按船舶、飞机、列车或车辆记录载荷、甲板空间及舱位运力。
  BC-2400.10.20:
    name: 设备运力库存
    description: |
      按位置和状态盘点可用集装箱、拖车、底盘及ULD。
  BC-2400.10.30:
    name: 线路与班期运力
    description: |
      记录各线路计划服务的运力，包括中转航段。
  BC-2400.10.40:
    name: 运力共享与舱位互换
    description: |
      管理联盟共享运力及与合作承运商的舱位互换安排。
  BC-2400.20:
    name: 运力分配管理
    description: |
      将可用运力分配至客户合同、细分市场及即期需求。
  BC-2400.20.10:
    name: 合同运力分配
    description: |
      向已签订最低数量承诺及指定账户协议的客户分配运力。
  BC-2400.20.20:
    name: 即期市场运力分配
    description: |
      将开放运力分配至即期市场订舱渠道。
  BC-2400.20.30:
    name: 运力再分配与回收
    description: |
      在截止时间前对未使用或回收的运力进行再分配。
  BC-2400.30:
    name: 收益与营收管理
    description: |
      通过定价、结构优化及超售决策，提升单位运力营收。
  BC-2400.30.10:
    name: 运力需求预测
    description: |
      按服务预测预订量、未出现量及卸货风险。
  BC-2400.30.20:
    name: 收益优化
    description: |
      优化舱等及费率档位组合，最大化每吨、每舱位或每TEU收益。
  BC-2400.30.30:
    name: 超售管理
    description: |
      设定并监控超售限额及卸货风险敞口。
  BC-2400.30.40:
    name: 营收结构管理
    description: |
      管理合同、即期及附加收入之间的营收结构。
  BC-2400.40:
    name: 订舱与预订管理
    description: |
      受理、变更及取消针对已发布班期和报价的运力订舱。
  BC-2400.40.10:
    name: 运力订舱
    description: |
      按可用运力及有效运价受理订舱。
  BC-2400.40.20:
    name: 订舱变更与取消
    description: |
      处理订舱修改、调换及取消，包括空单费收取。
  BC-2400.40.30:
    name: 候补与等待名单管理
    description: |
      管理候补及等待确认运力的货物名单。
  BC-2400.50:
    name: 运力绩效管理
    description: |
      监控装载率、填充率及利用率，推动运力结构决策与网络调整。
  BC-2400.50.10:
    name: 装载率分析
    description: |
      按服务、线路及航段分析装载率。
  BC-2400.50.20:
    name: 运力利用率报告
    description: |
      向商务及运营团队报告运力利用情况。
  BC-2400.50.30:
    name: 运力绩效改进
    description: |
      推进提升单舱收益、减少空载回程的改进举措。

locale: zh
source: L1-pharmacovigilance-management.yaml
entries:
  BC-1540:
    name: 药物警戒管理
    description: |
      覆盖不良事件监测、信号检测与安全性报告，保障上市药品的患者安全。
  BC-1540.10:
    name: 不良事件病例管理
    description: |
      统筹ICSR处理与快速报告，确保安全性信息的及时收集与上报。
  BC-1540.10.10:
    name: ICSR接收与分诊
    description: |
      接收并分诊个例安全性报告。
  BC-1540.10.20:
    name: ICSR病例处理
    description: |
      对ICSR进行编码、处理与叙述性描述撰写。
  BC-1540.10.30:
    name: 快速报告与定期报告
    description: |
      按ICH E2D及EU GVP要求提交快速报告与定期安全性报告。
  BC-1540.10.40:
    name: 医学审核与因果关系评估
    description: |
      对病例开展医学审核与因果关系评估。
  BC-1540.20:
    name: 信号检测与管理
    description: |
      统筹信号检测、评估与升级处置，识别并应对潜在安全风险。
  BC-1540.20.10:
    name: 信号检测
    description: |
      开展定量与定性信号检测，识别潜在安全信号。
  BC-1540.20.20:
    name: 信号评估
    description: |
      对检测到的信号进行评估与核实。
  BC-1540.20.30:
    name: 信号处置与行动
    description: |
      将信号转化为具体行动措施与说明书变更。
  BC-1540.30:
    name: 定期安全性报告管理
    description: |
      统筹PSUR/PBRER、DSUR及其他定期报告的制作与提交。
  BC-1540.30.10:
    name: PSUR/PBRER制作
    description: |
      编制定期安全性更新报告（PSUR）与定期获益-风险评估报告（PBRER）。
  BC-1540.30.20:
    name: DSUR制作
    description: |
      编制开发期安全性更新报告（DSUR）。
  BC-1540.30.30:
    name: 汇总安全性报告
    description: |
      制作其他形式的汇总安全性报告。
  BC-1540.40:
    name: 风险管理计划管理
    description: |
      统筹风险管理计划（RMP）制定、风险最小化措施与REMS的实施。
  BC-1540.40.10:
    name: 风险管理计划撰写
    description: |
      撰写欧盟RMP与REMS文件。
  BC-1540.40.20:
    name: 风险最小化措施实施
    description: |
      实施常规与额外风险最小化措施。
  BC-1540.40.30:
    name: 风险最小化有效性评估
    description: |
      评估风险最小化措施的实施效果。
  BC-1540.50:
    name: 药物警戒审计与检查管理
    description: |
      统筹PV审计、监管检查准备与CAPA管理，维持药物警戒体系的合规状态。
  BC-1540.50.10:
    name: PV体系审计项目
    description: |
      实施覆盖药物警戒体系的内部审计项目。
  BC-1540.50.20:
    name: PV检查准备
    description: |
      为监管机构PV检查做好充分准备。
  BC-1540.50.30:
    name: PV CAPA管理
    description: |
      管理审计与检查发现事项的纠正预防措施。
  BC-1540.50.40:
    name: PSMF维护
    description: |
      维护药物警戒系统主文件（PSMF）的持续更新与合规性。

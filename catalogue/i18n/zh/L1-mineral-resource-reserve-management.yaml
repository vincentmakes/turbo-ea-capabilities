locale: zh
source: L1-mineral-resource-reserve-management.yaml
entries:
  BC-4410:
    name: 矿产资源与储量管理
    description: |
      依据 CRIRSCO 对应规范，开展地质建模、地质统计学估算、分类、有资质人员治理及矿产资源量和矿石储量的公开报告。
  BC-4410.10:
    name: 地质建模
    description: |
      构建岩性、构造、蚀变和矿化域的三维地质模型，作为资源量估算的输入依据。
    in_scope:
      - 岩性和地层建模
      - 构造和断层建模
      - 矿化域线框架构建
    out_of_scope:
      - 露天坑设计和采场设计线框架（BC-4420.40）
  BC-4410.10.10:
    name: 岩性建模
    description: |
      根据钻孔编录数据，建立岩性和地层单元的三维模型。
  BC-4410.10.20:
    name: 构造建模
    description: |
      建立控制矿化几何形态的断层、褶皱和剪切带模型。
  BC-4410.10.30:
    name: 矿化域建模
    description: |
      构建矿化包络体和品位域的线框架，作为估算边界。
  BC-4410.10.40:
    name: 隐式建模工作流
    description: |
      开展隐式和快速更新地质建模工作流，用于迭代模型优化。
  BC-4410.20:
    name: 资源量估算
    description: |
      对品位和吨位进行地质统计学估算并建立块体模型，依据公开报告规范将估算物质分类为推断、控制或探明级别。
  BC-4410.20.10:
    name: 地质统计学估算
    description: |
      开展变差函数分析，并采用克里格法或模拟法将品位估算至块体模型。
  BC-4410.20.20:
    name: 块体模型构建
    description: |
      构建和填充规则化块体模型，用于下游规划。
  BC-4410.20.30:
    name: 估算验证
    description: |
      通过统计和可视化方法，对估算品位与组合数据进行验证。
  BC-4410.20.40:
    name: 资源量分类
    description: |
      将估算矿化划分为推断、控制和探明三个类别。
  BC-4410.30:
    name: 储量估算
    description: |
      应用采矿、冶金、经济及其他修正因素，将控制资源量和探明资源量转化为可能储量和探明储量。
  BC-4410.30.10:
    name: 修正因素应用
    description: |
      对资源量应用采矿、冶金、基础设施和经济修正因素。
  BC-4410.30.20:
    name: 截止品位确定
    description: |
      在假定价格和成本条件下，计算支撑储量界定的截止品位。
  BC-4410.30.30:
    name: 采矿回采率与贫化建模
    description: |
      对原位资源量建立采矿回采率、贫化和边缘效应模型。
  BC-4410.30.40:
    name: 矿石储量分类
    description: |
      将矿石储量分类为可能储量和探明储量两个类别。
  BC-4410.40:
    name: 有资质人员治理
    description: |
      对依据公开报告规范负责资源量和储量声明的有资质人员开展治理。
  BC-4410.40.10:
    name: 有资质人员签署确认
    description: |
      由有资质人员审查并签署确认资源量和储量声明。
  BC-4410.40.20:
    name: 内部资源量审查
    description: |
      对资源量和储量估算开展内部同行评审和技术委员会审查。
  BC-4410.40.30:
    name: 外部资源量审计协调
    description: |
      协调独立第三方资源量和储量审计工作。
  BC-4410.50:
    name: 资源量与储量公开报告
    description: |
      编制并披露证券监管机构和上市规则要求的矿产资源量和矿石储量公开声明。
  BC-4410.50.10:
    name: 资源量声明编制
    description: |
      编制符合 CRIRSCO 系列规范的矿产资源量公开声明。
  BC-4410.50.20:
    name: 储量声明编制
    description: |
      编制符合 CRIRSCO 系列规范的矿石储量公开声明。
  BC-4410.50.30:
    name: 年度储量声明更新
    description: |
      年度更新资源量和储量声明，反映消耗量和新估算结果。
  BC-4410.50.40:
    name: 独立技术报告协调
    description: |
      协调资本市场、交易和披露事件所需的有资质人员技术报告。
  BC-4410.60:
    name: 资源量对账
    description: |
      将估算资源量和储量与品位控制、入选矿石及金属产量进行对账，以评估模型绩效。
  BC-4410.60.10:
    name: 矿山到磨机对账
    description: |
      将开采吨位和品位与入选矿石及回收金属进行对账。
  BC-4410.60.20:
    name: 资源量消耗追踪
    description: |
      追踪采矿活动导致的资源量和储量消耗。
  BC-4410.60.30:
    name: 模型绩效分析
    description: |
      分析资源量模型相对实际结果的绩效，以指导未来估算。

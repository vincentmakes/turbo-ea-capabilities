locale: zh
source: L1-pharmacy-medication-management.yaml
entries:
  BC-2850:
    name: 药品与用药管理
    description: |
      医疗机构侧药房运营，包括药品目录管理、住院和门诊配药、用药给药与核对、管制药品监管以及药房临床服务。
  BC-2850.10:
    name: 药品目录管理
    description: |
      管理药品目录、治疗性替代和药品短缺应对。
  BC-2850.10.10:
    name: 药品目录决策
    description: |
      基于循证证据进行药品目录的纳入、排除和层级决策。
  BC-2850.10.20:
    name: 治疗性替代
    description: |
      管理和执行治疗性替代方案。
  BC-2850.10.30:
    name: 药事与治疗委员会支持
    description: |
      为药事与治疗委员会提供运营支持。
  BC-2850.10.40:
    name: 药品短缺管理
    description: |
      识别、缓解药品短缺并制定替代方案。
  BC-2850.20:
    name: 住院药房运营
    description: |
      为住院服务开展医嘱审核、无菌和非无菌配制、配药及静脉药物配置。
  BC-2850.20.10:
    name: 医嘱审核
    description: |
      药师对药物医嘱进行安全性和适宜性审核。
  BC-2850.20.20:
    name: 无菌配制
    description: |
      开展无菌配制运营，包括危害药品配制。
  BC-2850.20.30:
    name: 单剂量配药
    description: |
      为住院给药准备和分发单剂量药品。
  BC-2850.20.40:
    name: 静脉药物配置
    description: |
      配制静脉输液、注射液和肠外营养液。
  BC-2850.30:
    name: 门诊与专科药房运营
    description: |
      开展零售、专科和邮购药房运营，包括药品折扣项目运营。
  BC-2850.30.10:
    name: 零售配药
    description: |
      在门诊药房开展零售处方配药。
  BC-2850.30.20:
    name: 专科药品管理
    description: |
      开展高价值和有限分发药品的专科药房运营。
  BC-2850.30.30:
    name: 邮购配药
    description: |
      开展邮购处方配药和配送运营。
  BC-2850.30.40:
    name: 药品折扣项目运营
    description: |
      运营法定药品折扣项目并确保符合资格机构合规要求。
  BC-2850.40:
    name: 用药给药与核对
    description: |
      管理床旁用药给药、过渡期用药核对以及患者自带药品管理。
  BC-2850.40.10:
    name: 床旁用药给药
    description: |
      护理人员在床旁通过条码验证进行用药给药。
  BC-2850.40.20:
    name: 用药核对
    description: |
      在入院、转科和出院时对家庭用药和处方药进行核对。
  BC-2850.40.30:
    name: 电子用药记录运营
    description: |
      运营电子用药管理记录。
  BC-2850.40.40:
    name: 患者自带药品处理
    description: |
      识别、储存和授权给予患者自带药品。
  BC-2850.50:
    name: 管制药品监管
    description: |
      管理管制药品的合规、流失监控、库存和处置。
  BC-2850.50.10:
    name: 管制药品监管合规
    description: |
      遵守管制药品法规，包括注册和记录保管要求。
  BC-2850.50.20:
    name: 药品流失监控
    description: |
      监测和调查疑似药品流失行为。
  BC-2850.50.30:
    name: 管制药品库存
    description: |
      对管制药品库存进行动态盘点和核对。
  BC-2850.50.40:
    name: 管制药品处置与销毁
    description: |
      对管制药品进行处置、见证销毁和反向分销。
  BC-2850.60:
    name: 药房临床服务
    description: |
      提供临床药学服务，包括抗凝管理、抗菌药物管理、用药治疗管理和血药浓度监测。
  BC-2850.60.10:
    name: 抗凝管理
    description: |
      药师主导的抗凝剂剂量调整和监测服务。
  BC-2850.60.20:
    name: 抗菌药物管理药学服务
    description: |
      药房对抗菌药物管理项目的贡献。
  BC-2850.60.30:
    name: 用药治疗管理
    description: |
      药师提供的用药治疗管理咨询服务。
  BC-2850.60.40:
    name: 血药浓度监测
    description: |
      开展血药浓度监测和个体化用药剂量服务。

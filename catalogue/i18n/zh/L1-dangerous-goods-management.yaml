locale: zh
source: L1-dangerous-goods-management.yaml
entries:
  BC-2490:
    name: 危险品管理
    description: |
      依据IMDG、IATA DGR、ADR及RID法规，管理跨公路、铁路、海运及空运方式的危险品受理、单证、操作、培训及事故应急响应。
  BC-2490.10:
    name: 危险品受理管理
    description: |
      依据运输方式规定对危险品货物进行受理前审查并作出受理决定。
    in_scope:
      - 货主申报审查
      - 相容性、隔离及数量核查
    out_of_scope:
      - 海关危险物质限制（BC-2480）
      - 危险品受损货物索赔（BC-2530.40）
  BC-2490.10.10:
    name: 货主申报审查
    description: |
      审查货主危险品申报及支持性文件。
  BC-2490.10.20:
    name: 相容性与隔离核查
    description: |
      按运输方式法规进行相容性、隔离及数量核查。
  BC-2490.10.30:
    name: 受理决定与背书
    description: |
      对危险品托运货物作出受理决定、背书或拒绝。
  BC-2490.20:
    name: 危险品单证管理
    description: |
      开具并维护危险品申报单、NOTOC及多式联运危险货物文件。
  BC-2490.20.10:
    name: 危险品申报单开具
    description: |
      按IMDG、DGR、ADR及RID规定开具危险品申报单。
  BC-2490.20.20:
    name: NOTOC与舱单准备
    description: |
      准备船长/机长通知书及危险货物舱单。
  BC-2490.20.30:
    name: 多式联运单证对账
    description: |
      对跨运输方式交接中的危险品单证进行对账。
  BC-2490.30:
    name: 危险品装卸与积载管理
    description: |
      确保危险品的实物操作和积载符合法规要求。
  BC-2490.30.10:
    name: 隔离与积载合规
    description: |
      确保船上、甲板及仓库的危险品隔离与积载合规。
  BC-2490.30.20:
    name: 限制区域存储
    description: |
      在限制、通风及有围堰防护的区域存储危险品。
  BC-2490.30.30:
    name: 专用装卸设备使用
    description: |
      使用危险品专用装卸设备及个人防护装备。
  BC-2490.40:
    name: 危险品培训与能力管理
    description: |
      对危险品操作人员开展初训和复训、能力评估及档案管理。
  BC-2490.40.10:
    name: 危险品初训
    description: |
      按运输方式主管机构要求开展危险品初始培训。
  BC-2490.40.20:
    name: 危险品复训
    description: |
      开展危险品定期复训及补充培训。
  BC-2490.40.30:
    name: 能力档案管理
    description: |
      维护危险品能力档案及审计证明材料。
  BC-2490.50:
    name: 危险品事故管理
    description: |
      对危险品事故及泄漏进行检测、应急响应、通报及报告。
  BC-2490.50.10:
    name: 危险品事故检测
    description: |
      检测装卸和运输过程中发生的危险品事故。
  BC-2490.50.20:
    name: 危险品泄漏与释放应急响应
    description: |
      开展泄漏控制、应急响应及去污处理。
  BC-2490.50.30:
    name: 主管机构通知与报告
    description: |
      向主管机构通报并报告危险品事故。

locale: zh
source: L1-air-traffic-controller-competency-management.yaml
entries:
  BC-1290:
    name: 空中交通管制员资质管理
    description: |
      负责管制员的初始训练、单位训练和持续训练，以及执照颁发和资质评估，确保管制员具备安全履职所需的能力。
  BC-1290.10:
    name: 初始训练管理
    description: |
      开展从零基础入门训练到基础课程和执照训练（通常在学院实施），培养合格的准管制员。
  BC-1290.10.10:
    name: 从零基础训练计划
    description: |
      实施空中交通管制员（ATCO）从零基础入门训练，包括基础阶段课程。
  BC-1290.10.20:
    name: 执照训练
    description: |
      开展针对不同执照类别（ACC、APP、ADC、OCN）的专项训练，培养学员的管制技能。
  BC-1290.10.30:
    name: 初始训练考核
    description: |
      在初始训练阶段开展考试和评估，检验学员的知识和技能掌握情况。
  BC-1290.20:
    name: 单位训练管理
    description: |
      在运营单位开展在岗训练，使管制员具备在特定扇区独立工作的能力。
  BC-1290.20.10:
    name: 单位训练计划制定
    description: |
      制定 ATCO 过渡转型的单位训练计划，明确训练目标和评估标准。
  BC-1290.20.20:
    name: 在岗训练实施
    description: |
      在带教教员指导下开展在岗训练（OJT），培养学员在真实运营环境中的管制能力。
  BC-1290.20.30:
    name: 单位训练验证
    description: |
      在单位训练完成后验证管制员的单位执照认可，确认其具备独立从事管制工作的资质。
  BC-1290.30:
    name: 持续训练管理
    description: |
      开展复训、转换训练及应急和非正常情况训练，维持管制员的岗位能力。
  BC-1290.30.10:
    name: 复训
    description: |
      对持照管制员开展定期复训，保持和巩固其管制技能。
  BC-1290.30.20:
    name: 转换训练
    description: |
      开展新程序、新系统或新扇区的转换训练，使管制员适应运营变化。
  BC-1290.30.30:
    name: 应急与非正常情况训练
    description: |
      开展应急、异常和非正常情况训练，提升管制员应对突发状况的能力。
  BC-1290.40:
    name: 资质评估管理
    description: |
      开展定期资质评估、航线检查和验证，确保管制员持续保持资质有效性。
  BC-1290.40.10:
    name: 资质方案维护
    description: |
      制定并维护资质评估方案，明确资质评估的标准和要求。
  BC-1290.40.20:
    name: 资质评估实施
    description: |
      开展定期资质评估和航线检查，客观评价管制员的工作能力。
  BC-1290.40.30:
    name: 资质记录管理
    description: |
      管理资质评估记录和有效期，确保管制员资质状态的可查可追溯。
  BC-1290.50:
    name: 执照与认可管理
    description: |
      负责 ATCO 执照颁发、执照类别、认可及体检合格证管理，保障执照体系的规范运行。
  BC-1290.50.10:
    name: ATCO 执照颁发
    description: |
      颁发和更新 ATCO 执照及执照类别，确保管制员持有有效执照。
  BC-1290.50.20:
    name: 认可管理
    description: |
      管理单位认可和语言能力认可，记录管制员的具体工作授权。
  BC-1290.50.30:
    name: 体检合格证管理
    description: |
      管理管制员第三类体检合格证的行政事务，确保管制员持续满足体检要求。
  BC-1290.60:
    name: 模拟机运营管理
    description: |
      管理 ATC 模拟机、训练情景设计和模拟机副驾驶操作，支持训练和资质评估工作。
  BC-1290.60.10:
    name: 模拟机情景设计
    description: |
      设计模拟机训练情景和练习方案，为各类训练和评估提供逼真的训练环境。
  BC-1290.60.20:
    name: 模拟机副驾驶运营
    description: |
      在练习期间操作模拟机副驾驶席位，模拟真实飞行员应答和交通情景。
  BC-1290.60.30:
    name: 模拟机维护与配置
    description: |
      维护和配置 ATC 模拟机，确保其技术状态满足训练需求。

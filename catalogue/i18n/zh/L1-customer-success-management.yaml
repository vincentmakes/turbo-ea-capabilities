locale: zh
source: L1-customer-success-management.yaml
entries:
  BC-4260:
    name: 客户成功管理
    description: |
      管理客户引导入驻、产品采用、健康监控、留存、扩展倡导及参考客户培育，有别于被动式客户服务。
  BC-4260.10:
    name: 客户引导入驻与激活
    description: |
      通过结构化入驻引导新客户实现首次价值和激活里程碑。
    in_scope:
      - 入驻计划、启动会及价值实现时间追踪
    out_of_scope:
      - 租户技术供给（由SaaS租户管理负责）
      - 订阅供给（由订阅生命周期管理负责）
  BC-4260.10.10:
    name: 入驻计划定义
    description: |
      按细分和用例定制入驻计划。
  BC-4260.10.20:
    name: 激活里程碑追踪
    description: |
      对照价值实现时间目标追踪激活里程碑。
  BC-4260.10.30:
    name: 实施协调
    description: |
      协调客户侧实施活动和合作伙伴参与。
  BC-4260.20:
    name: 产品采用管理
    description: |
      通过系列项目提升整个客户群的功能采用率和使用广度。
  BC-4260.20.10:
    name: 采用项目设计
    description: |
      为细分群体、产品和用户角色设计结构化采用项目。
  BC-4260.20.20:
    name: 采用活动执行
    description: |
      执行包含产品内和外发接触点的采用活动。
  BC-4260.20.30:
    name: 高级用户赋能
    description: |
      赋能客户高级用户和内部倡导者。
  BC-4260.30:
    name: 客户健康管理
    description: |
      对客户健康状态进行建模和监控，预判风险并驱动干预。
  BC-4260.30.10:
    name: 客户健康评分建模
    description: |
      从产品、支持和商业信号建立客户健康评分模型。
  BC-4260.30.20:
    name: 风险信号监控
    description: |
      监控整个客户群的风险信号。
  BC-4260.30.30:
    name: 高风险账户干预
    description: |
      对识别为高风险的账户开展协调干预。
  BC-4260.40:
    name: 客户全生命周期互动
    description: |
      开展经常性生命周期接触点，包括业务回顾、高管赞助及联合成功规划。
  BC-4260.40.10:
    name: 季度业务回顾管理
    description: |
      规划并与客户开展经常性业务回顾。
  BC-4260.40.20:
    name: 高管赞助项目
    description: |
      运营服务提供商与客户之间的高管赞助配对项目。
  BC-4260.40.30:
    name: 成功计划维护
    description: |
      维护记录客户目标和里程碑的联合成功计划。
  BC-4260.50:
    name: 留存与续签倡导
    description: |
      聚焦续签动作的倡导与干预，包括挽留策略和续签预测输入。
  BC-4260.50.10:
    name: 续签风险缓解
    description: |
      在续签日期前缓解已识别的续签风险。
  BC-4260.50.20:
    name: 挽留策略执行
    description: |
      对有意取消的账户执行挽留策略。
  BC-4260.50.30:
    name: 续签预测提报
    description: |
      基于健康和互动信号提报续签预测。
  BC-4260.60:
    name: 扩展与交叉销售倡导
    description: |
      识别和资格预审扩展机会，并与销售协调完成交叉销售。
  BC-4260.60.10:
    name: 扩展机会识别
    description: |
      从使用和互动信号中识别扩展机会。
  BC-4260.60.20:
    name: 追加销售资格预审
    description: |
      在销售介入前对追加销售机会进行资格预审。
  BC-4260.60.30:
    name: 交叉销售协调
    description: |
      跨客户群与销售就交叉销售动作进行协调。
  BC-4260.70:
    name: 客户倡导与参考
    description: |
      培育参考案例、客户案例研究，并对客户情绪进行结构化度量。
  BC-4260.70.10:
    name: 参考项目管理
    description: |
      管理客户参考项目，包括加入意愿、治理及使用规范。
  BC-4260.70.20:
    name: 案例研究开发
    description: |
      与市场部门协作开发客户案例研究。
  BC-4260.70.30:
    name: 净推荐值调研项目
    description: |
      运营NPS及同等客户情绪调研项目。

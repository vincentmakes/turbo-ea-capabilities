locale: zh
source: L1-aeronautical-information-management.yaml
entries:
  BC-1230:
    name: 航空信息管理
    description: |
      负责 AIP 出版、NOTAMs 管理、航空数据库维护、图表制作及数字化 AIM 服务，为空中交通安全运行提供权威的航空信息支撑。
  BC-1230.10:
    name: 航空信息出版物管理
    description: |
      管理 AIP、AIRAC 循环周期、修订和补充材料的编制与发布，确保航空信息的时效性和准确性。
  BC-1230.10.10:
    name: AIP 编制
    description: |
      编制《航空资料汇编》（AIP），提供完整的机场和航路运行信息。
  BC-1230.10.20:
    name: AIRAC 周期管理
    description: |
      管理 AIRAC 循环周期和生效日期，确保航空信息变更按规定时序发布。
  BC-1230.10.30:
    name: AIP 修订与补充材料签发
    description: |
      签发 AIP 修订和补充材料，及时传递程序变更和临时信息。
  BC-1230.20:
    name: NOTAMs 管理
    description: |
      负责 NOTAMs 的起草、发布、分发及到期处理，保障航空信息的完整传递。
  BC-1230.20.10:
    name: NOTAMs 起草
    description: |
      起草和编写 NOTAMs，及时通报影响飞行安全的信息。
  BC-1230.20.20:
    name: NOTAMs 发布与分发
    description: |
      通过 AFTN/AMHS 发布和分发 NOTAMs，确保相关信息覆盖所有目标用户。
  BC-1230.20.30:
    name: NOTAMs 全生命周期管理
    description: |
      管理 NOTAMs 的全生命周期，包括替换、取消和到期处理，维持信息的有效性。
  BC-1230.30:
    name: 航空数据库管理
    description: |
      保障航空数据的完整性、可追溯性、AIRAC 合规性和数据质量，支持下游系统的可靠使用。
  BC-1230.30.10:
    name: 航空数据采集
    description: |
      依据 ICAO 附件 15 进行航空数据的采集与录入，确保数据来源的权威性。
  BC-1230.30.20:
    name: 航空数据质量管理
    description: |
      对航空数据实施质量控制，保障数据的准确性、完整性和分辨率。
  BC-1230.30.30:
    name: 航空数据分发
    description: |
      向用户和应用系统分发航空数据，支持飞行运营和系统集成需求。
  BC-1230.30.40:
    name: 数据溯源与审计
    description: |
      对航空数据的数据谱系进行溯源追踪和审计，确保数据变更的可查可溯。
  BC-1230.40:
    name: 图表与程序设计管理
    description: |
      负责航空图表制作、仪表飞行程序设计及基于性能导航（PBN）程序设计，保障飞行程序的准确可用。
  BC-1230.40.10:
    name: 航空图表制作
    description: |
      制作航路、终端区及机场航图，为飞行机组和管制员提供清晰的导航参考。
  BC-1230.40.20:
    name: 仪表飞行程序设计
    description: |
      设计标准离场程序（SIDs）、标准进场程序（STARs）及仪表进近程序，保障复杂气象条件下的飞行安全。
  BC-1230.40.30:
    name: 基于性能导航程序设计
    description: |
      设计包含 RNP 和 RNAV 在内的 PBN 程序，充分利用现代导航技术提升飞行效率。
  BC-1230.40.40:
    name: 程序验证与审批
    description: |
      对飞行程序进行验证、试飞检验和监管审批，确保程序满足安全和运营要求。
  BC-1230.50:
    name: 数字化 AIM 服务管理
    description: |
      管理数字化 AIM 数据产品、SWIM 服务及机器可读 AIM 的分发，推动航空信息数字化转型。
  BC-1230.50.10:
    name: 数字数据产品管理
    description: |
      管理基于 AIXM 的数字化 AIM 数据产品，提升航空数据的互操作性。
  BC-1230.50.20:
    name: SWIM 服务提供
    description: |
      提供系统广域信息管理（SWIM）服务，支持航空信息的共享交换。
  BC-1230.50.30:
    name: 机器可读 AIM 分发
    description: |
      向订阅用户分发机器可读格式的 AIM 数据，支持自动化信息处理和应用集成。

locale: zh
source: L1-content-compliance-standards-management.yaml
entries:
  BC-3780:
    name: 内容合规与标准管理
    description: |
      跨内容组合进行内容分级评定、编辑标准执行、广播与网络内容监管合规、用户生成内容审核、无障碍合规，以及下架与通知处理。
  BC-3780.10:
    name: 内容分类与分级管理
    description: |
      跨版权区域和平台提交、应用并自行进行年龄和内容分级。
  BC-3780.10.10:
    name: 发行前分级申报
    description: |
      向分级机构申报片名，在发行前获取各版权区域的年龄分级。
  BC-3780.10.20:
    name: 分级展示合规
    description: |
      在消费者界面展示年龄分级、内容描述符和警示信息。
  BC-3780.10.30:
    name: 自我分级管理
    description: |
      运营自我分级制度，遵守平台年龄分级工具要求。
  BC-3780.20:
    name: 编辑标准管理
    description: |
      编写编辑政策、播前合规审查，及处理编辑投诉。
  BC-3780.20.10:
    name: 编辑政策管理
    description: |
      编写并维护编辑政策及公正性、准确性标准的全生命周期。
  BC-3780.20.20:
    name: 播前合规审查
    description: |
      对节目和广告时段进行播前编辑和监管标准合规审查。
  BC-3780.20.30:
    name: 编辑投诉处理
    description: |
      对来自观众和监管机构的编辑投诉进行分类、调查和回复。
  BC-3780.30:
    name: 广播监管合规
    description: |
      遵守广播和视听法规，包括排播规则、内容配额及广告守则。
  BC-3780.30.10:
    name: 分水岭与排播合规
    description: |
      遵守针对成人内容排播的分水岭和时段规则。
  BC-3780.30.20:
    name: 配额与本地内容合规
    description: |
      遵守内容配额要求，包括欧洲作品、独立制作及本地语言义务。
  BC-3780.30.30:
    name: 广告守则合规
    description: |
      确保广告和赞助符合适用守则和品类限制。
  BC-3780.40:
    name: 用户生成内容审核
    description: |
      通过自动分类、人工审核及可信举报人工作流程对用户生成内容进行审核。
  BC-3780.40.10:
    name: 自动内容分类
    description: |
      对用户生成内容进行安全和政策问题的自动分类。
  BC-3780.40.20:
    name: 人工审核队列管理
    description: |
      运营人工审核队列，包括质量保障和审核员心理健康保护措施。
  BC-3780.40.30:
    name: 可信举报人管理
    description: |
      依据网络内容法规，管理可信举报人关系和优先审核渠道。
  BC-3780.50:
    name: 无障碍合规管理
    description: |
      履行跨字幕、音频描述及手语服务的无障碍义务。
  BC-3780.50.10:
    name: 隐藏字幕合规
    description: |
      遵守隐藏字幕义务，包括覆盖率、质量和展示标准。
  BC-3780.50.20:
    name: 音频描述合规
    description: |
      遵守音频描述覆盖率和质量义务。
  BC-3780.50.30:
    name: 手语提供合规
    description: |
      遵守手语口译和画面内手语义务。
  BC-3780.60:
    name: 下架与通知管理
    description: |
      处理版权和网络内容通知，包括反通知和申诉流程。
  BC-3780.60.10:
    name: 版权通知处理
    description: |
      处理版权下架通知并执行屡犯侵权者政策。
  BC-3780.60.20:
    name: 网络内容通知处理
    description: |
      依据网络内容法规处理违法内容通知和命令。
  BC-3780.60.30:
    name: 反通知与申诉管理
    description: |
      管理内容移除决定的反通知和庭外申诉机制。

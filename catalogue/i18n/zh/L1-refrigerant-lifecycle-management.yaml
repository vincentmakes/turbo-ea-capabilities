locale: zh
source: L1-refrigerant-lifecycle-management.yaml
entries:
  BC-2040:
    name: 制冷剂全生命周期管理
    description: |
      跨已安装基础的制冷剂运营全生命周期管理，涵盖采购和库存、充注核算、回收和再生、泄漏管理、F-Gas/EPA 608 条款/基加利修正案法规申报、技术员认证、淘汰过渡及报废处置。
    in_scope:
      - 制冷剂的采购、分配和储存
      - 资产级充注核算和质量平衡对账
      - 现场回收、再生和回收制冷剂质量控制
      - 泄漏检测、修复及法规泄漏率申报
      - 技术员操作认证和能力跟踪
      - 制冷剂过渡和淘汰路线图
      - 报废销毁和合规处置
    out_of_scope:
      - 认证期间的产品级制冷剂批准（BC-2030）
      - 设备设计期间的制冷剂循环和选型（BC-2000）
      - 非制冷剂专项的通用环境合规（BC-740）
  BC-2040.10:
    name: 制冷剂采购与库存管理
    description: |
      制冷剂库存的来源采购、分配、储存和对账管理。
  BC-2040.10.10:
    name: 制冷剂采购
    description: |
      从批准供应商采购制冷剂。
  BC-2040.10.20:
    name: 配额分配管理
    description: |
      跨业务单元和市场的法规配额分配管理。
  BC-2040.10.30:
    name: 制冷剂储存与操作
    description: |
      按安全和环保要求储存和操作制冷剂瓶。
  BC-2040.10.40:
    name: 制冷剂库存对账
    description: |
      跨现场和现场库存定期对账制冷剂库存。
  BC-2040.20:
    name: 制冷剂充注核算
    description: |
      资产级制冷剂充注量、补充量和审计余额核算。
  BC-2040.20.10:
    name: 按资产充注记录
    description: |
      按设备资产记录已安装制冷剂充注量。
  BC-2040.20.20:
    name: 补充与重新充注记录
    description: |
      按设备服务事件记录补充和重新充注情况。
  BC-2040.20.30:
    name: 充注准确性审核
    description: |
      审核已安装基础充注核算的准确性。
  BC-2040.20.40:
    name: 质量平衡对账
    description: |
      对采购、使用、回收和处置的制冷剂进行质量平衡对账。
  BC-2040.30:
    name: 制冷剂回收与再生运营
    description: |
      现场回收及下游再生以供再使用。
  BC-2040.30.10:
    name: 现场回收运营
    description: |
      从维修中设备现场回收制冷剂。
  BC-2040.30.20:
    name: 制冷剂再生
    description: |
      将回收制冷剂处理至原始规格进行再生。
  BC-2040.30.30:
    name: 回收制冷剂质量验证
    description: |
      再使用前验证回收制冷剂质量。
  BC-2040.30.40:
    name: 回收制冷剂库管理
    description: |
      管理存储再生制冷剂以备再使用的制冷剂库存。
  BC-2040.40:
    name: 制冷剂泄漏管理
    description: |
      跨已安装基础的制冷剂泄漏检测、修复和申报。
  BC-2040.40.10:
    name: 泄漏检测监控
    description: |
      对设备进行连续和定期泄漏检测监控。
  BC-2040.40.20:
    name: 泄漏修复工作流
    description: |
      识别泄漏的诊断和修复工作流程。
  BC-2040.40.30:
    name: 泄漏率申报
    description: |
      按法规阈值申报泄漏率。
  BC-2040.40.40:
    name: 泄漏热点分析
    description: |
      分析反复出现的泄漏热点以推动设备或过程改进。
  BC-2040.50:
    name: 制冷剂法规申报
    description: |
      制冷剂使用、泄漏、回收和物质披露的法规申报。
  BC-2040.50.10:
    name: F-Gas 年度申报
    description: |
      按欧盟 F-Gas 法规进行年度申报。
  BC-2040.50.20:
    name: 国家制冷剂申报
    description: |
      按国家制冷剂项目申报（如美国 EPA 申报）。
  BC-2040.50.30:
    name: 基加利与蒙特利尔议定书申报
    description: |
      按基加利修正案和蒙特利尔议定书义务进行申报。
  BC-2040.50.40:
    name: 物质库存披露
    description: |
      向监管机构和相关方披露物质库存情况。
  BC-2040.60:
    name: 技术员制冷剂认证管理
    description: |
      技术员制冷剂操作认证、执照和能力管理。
  BC-2040.60.10:
    name: 技术员认证记录
    description: |
      技术员制冷剂认证记录管理。
  BC-2040.60.20:
    name: 认证续期跟踪
    description: |
      跟踪即将到期的认证续期情况。
  BC-2040.60.30:
    name: 国家制冷剂操作执照
    description: |
      管理国家制冷剂操作执照（EPA 608 条款、F-Gas 类别）。
  BC-2040.60.40:
    name: 能力验证
    description: |
      定期验证制冷剂操作技术员的能力。
  BC-2040.70:
    name: 制冷剂淘汰与过渡管理
    description: |
      制冷剂淘汰和客户过渡路线图的战略管理。
  BC-2040.70.10:
    name: 制冷剂替代路线图
    description: |
      制定以低 GWP 替代品替换被淘汰制冷剂的路线图。
  BC-2040.70.20:
    name: 改造转换规划
    description: |
      规划已安装基础转换至替代制冷剂的改造方案。
  BC-2040.70.30:
    name: 客户过渡沟通
    description: |
      向客户沟通制冷剂过渡和时间节点。
  BC-2040.70.40:
    name: 淘汰风险管理
    description: |
      管理淘汰窗口期的供应、法规和声誉风险。
  BC-2040.80:
    name: 制冷剂报废与处置
    description: |
      不再适合再使用的制冷剂的报废销毁和合规处置。
  BC-2040.80.10:
    name: 销毁协调
    description: |
      与批准的销毁机构协调销毁工作。
  BC-2040.80.20:
    name: 合规处置审计追踪
    description: |
      维护证明合规处置的审计追踪记录。
  BC-2040.80.30:
    name: 报废资产制冷剂回收
    description: |
      处置前从报废资产回收制冷剂。
  BC-2040.80.40:
    name: 处置供应商管理
    description: |
      管理批准的处置供应商和审计项目。

locale: zh
source: L1-financial-management.yaml
entries:
  BC-200:
    name: 财务管理
    description: |
      管理会计核算、财务控制、法定与管理报告及预算编制。
  BC-200.10:
    name: 总账管理
    description: |
      管理科目表、记账凭证及期末结账。
  BC-200.10.10:
    name: 科目表管理
    description: |
      定义并治理科目表及科目层级体系。
  BC-200.10.20:
    name: 记账凭证处理
    description: |
      处理手工及自动化记账凭证，并配置审批流程。
  BC-200.10.30:
    name: 内部往来核算
    description: |
      处理内部往来交易、对销及调节。
  BC-200.10.40:
    name: 期末结账
    description: |
      管理期末结账日历、应计项目及结账认证。
  BC-200.10.50:
    name: 账户调节
    description: |
      开展资产负债表账户调节及账目实证。
  BC-200.20:
    name: 应付账款管理
    description: |
      管理发票处理、付款及供应商核算。
  BC-200.20.10:
    name: 供应商发票采集与验证
    description: |
      接收、采集供应商发票并进行三方匹配。
  BC-200.20.20:
    name: 付款批次执行
    description: |
      安排并执行供应商付款批次。
  BC-200.20.30:
    name: 供应商主数据财务信息管理
    description: |
      管理供应商财务主数据、银行账户信息及税务属性。
  BC-200.20.40:
    name: 差旅与费用处理
    description: |
      处理员工费用申请、审批及报销。
  BC-200.20.50:
    name: 应付账款分类账调节
    description: |
      开展供应商对账单及应付账款明细账调节。
  BC-200.30:
    name: 应收账款管理
    description: |
      管理客户开票、催收及现金核销。
  BC-200.30.10:
    name: 客户开票
    description: |
      生成并开具客户发票及贷项通知单。
  BC-200.30.20:
    name: 现金核销
    description: |
      将收到的客户付款与未结应收款项进行匹配。
  BC-200.30.30:
    name: 催收管理
    description: |
      执行催款、制定催收策略及跟进客户付款。
  BC-200.30.40:
    name: 信用风险与客户额度
    description: |
      开展客户信用评估、设定额度及执行信用冻结。
  BC-200.30.50:
    name: 争议与扣款管理
    description: |
      调查并解决发票争议及扣款问题。
  BC-200.40:
    name: 固定资产核算
    description: |
      管理资产台账、折旧及减值。
  BC-200.40.10:
    name: 固定资产台账维护
    description: |
      管理固定资产的资本化、分类及跟踪。
  BC-200.40.20:
    name: 折旧与摊销
    description: |
      制定折旧方法、计划并完成折旧过账。
  BC-200.40.30:
    name: 资产减值与重估
    description: |
      按 IFRS 或当地 GAAP 开展资产减值测试与重估。
  BC-200.40.40:
    name: 资产处置核算
    description: |
      处理固定资产报废、出售及注销的核算。
  BC-200.50:
    name: 成本核算管理
    description: |
      管理成本对象、成本分摊及标准成本。
  BC-200.50.10:
    name: 成本对象与成本中心管理
    description: |
      定义成本中心、内部订单及项目成本对象。
  BC-200.50.20:
    name: 标准成本核算
    description: |
      制定标准成本、开展差异分析及重新估价。
  BC-200.50.30:
    name: 成本分摊与吸收
    description: |
      执行分摊周期、分摊驱动因子及间接费用吸收。
  BC-200.50.40:
    name: 产品与服务成本核算
    description: |
      核算产品、服务及客户业务的成本。
  BC-200.60:
    name: 财务报告管理
    description: |
      编制内部财务报告及合并报表。
  BC-200.60.10:
    name: 财务合并
    description: |
      合并各法律实体报表，包括对销及外币折算。
  BC-200.60.20:
    name: 内部财务报告
    description: |
      编制内部损益表、资产负债表及现金流量报告。
  BC-200.60.30:
    name: 分部与管理报告
    description: |
      按分部及管理视图编制报告。
  BC-200.60.40:
    name: 财务披露起草
    description: |
      起草财务报告的附注及披露内容。
  BC-200.70:
    name: 法定与监管报告
    description: |
      编制法定账目及监管财务申报。
  BC-200.70.10:
    name: 法定账目编制
    description: |
      编制法律实体法定财务报表。
  BC-200.70.20:
    name: 监管财务申报
    description: |
      提交行业监管财务报表及审慎性申报。
  BC-200.70.30:
    name: 外部审计协调
    description: |
      与外部审计师联络并管理审计交付成果。
  BC-200.70.40:
    name: 可持续发展与非财务报告
    description: |
      披露非财务及可持续发展信息（如 CSRD、IFRS S1/S2）。

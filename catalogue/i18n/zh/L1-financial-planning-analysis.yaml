locale: zh
source: L1-financial-planning-analysis.yaml
entries:
  BC-230:
    name: 财务规划与分析
    description: |
      管理财务预测、规划、绩效分析及管理报告。
  BC-230.10:
    name: 预算管理
    description: |
      管理年度预算流程及合并汇总。
  BC-230.10.10:
    name: 预算日历与流程治理
    description: |
      管理预算日历、模板及流程治理。
  BC-230.10.20:
    name: 自上而下目标设定
    description: |
      制定与战略对齐的自上而下财务目标。
  BC-230.10.30:
    name: 自下而上预算编制
    description: |
      按成本中心、项目及产品开展自下而上预算编制。
  BC-230.10.40:
    name: 预算合并与审批
    description: |
      完成集团预算合并、迭代优化及最终审批。
  BC-230.20:
    name: 预测管理
    description: |
      管理滚动预测及情景规划。
  BC-230.20.10:
    name: 滚动预测编制
    description: |
      按月度或季度频率滚动预测收入、成本及现金流。
  BC-230.20.20:
    name: 驱动因子预测
    description: |
      利用运营驱动因子预测财务结果。
  BC-230.20.30:
    name: 情景与敏感性建模
    description: |
      开展多情景预测及敏感性分析。
  BC-230.20.40:
    name: 预测准确性跟踪
    description: |
      按明细项目跟踪并改善预测准确性。
  BC-230.30:
    name: 管理报告
    description: |
      编制定期管理报告、KPI 及仪表板。
  BC-230.30.10:
    name: 高管与董事会报告
    description: |
      编制高管仪表板及董事会层面绩效报告。
  BC-230.30.20:
    name: 业务单元绩效报告
    description: |
      按业务单元、分部及产品线编制报告。
  BC-230.30.30:
    name: KPI 定义与治理
    description: |
      建立 KPI 分类体系、定义及指标治理。
  BC-230.30.40:
    name: 管理自助分析
    description: |
      为财务业务合伙人提供自助分析赋能。
  BC-230.40:
    name: 绩效分析管理
    description: |
      开展差异分析、盈利能力及深度分析。
  BC-230.40.10:
    name: 差异与计划实际对比分析
    description: |
      分析实际值与预算、预测之间的差异。
  BC-230.40.20:
    name: 盈利能力分析
    description: |
      分析客户、产品及渠道的盈利能力。
  BC-230.40.30:
    name: 成本与效率分析
    description: |
      开展成本驱动因子分析、效率比率及标杆对比。
  BC-230.40.40:
    name: 营运资本分析
    description: |
      分析应收账款、应付账款及库存周期。
  BC-230.50:
    name: 商业案例管理
    description: |
      管理商业案例开发、评估及实施后评价。
  BC-230.50.10:
    name: 商业案例编制
    description: |
      提供标准化商业案例模板及方法论。
  BC-230.50.20:
    name: 投资评估
    description: |
      运用 NPV、IRR、投资回收期及定性指标评估投资价值。
  BC-230.50.30:
    name: 资本配置治理
    description: |
      建立资本审批委员会、审批门槛及优先级排序机制。
  BC-230.50.40:
    name: 收益实现跟踪
    description: |
      开展实施后评价并跟踪收益实现情况。

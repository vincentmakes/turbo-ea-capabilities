entries:
  BC-1010:
    name: 制造运营管理
    description: |
      负责车间执行、工单管理与MES层面的制造运营，确保生产高效有序进行。
  BC-1010.10:
    name: 工单管理
    description: |
      管理工单的创建、下达、跟踪与关闭全过程。
  BC-1010.10.10:
    name: 工单创建
    description: |
      依据生产订单与BOM/工艺路线创建工单。
  BC-1010.10.20:
    name: 工单下达
    description: |
      完成物料检查后向车间下达工单。
  BC-1010.10.30:
    name: 工单确认
    description: |
      确认工单的作业、数量与工时记录。
  BC-1010.10.40:
    name: 工单关闭
    description: |
      完成工单的最终关闭与结算。
  BC-1010.20:
    name: 车间执行管理
    description: |
      实施车间控制与MES层面的生产执行管理。
  BC-1010.20.10:
    name: 生产定义管理
    description: |
      按ISA-95标准定义产品与工艺的生产定义。
  BC-1010.20.20:
    name: 生产资源管理
    description: |
      管理生产资源的可用性与能力。
  BC-1010.20.30:
    name: 生产执行协调
    description: |
      跨工作中心实施实时生产执行协调。
  BC-1010.20.40:
    name: 生产跟踪与谱系管理
    description: |
      管理批次、lot与序列号的谱系及实际制造记录。
  BC-1010.30:
    name: 机器运营管理
    description: |
      管理机器设置、运行、换型与状态监控。
  BC-1010.30.10:
    name: 机器设置与换型
    description: |
      执行机器设置、基于SMED的快速换型与认证。
  BC-1010.30.20:
    name: 机器运行操作
    description: |
      管理机器运行、参数控制与过程监督。
  BC-1010.30.30:
    name: 机器监控
    description: |
      实时监控机器状态与运行状况。
  BC-1010.40:
    name: 操作员指导管理
    description: |
      提供作业指导书、数字安灯与操作员支持。
  BC-1010.40.10:
    name: 数字作业指导书下发
    description: |
      在工位向操作员下发数字化作业指导书。
  BC-1010.40.20:
    name: 安灯与升级管理
    description: |
      管理安灯信号、升级流程与操作员支持。
  BC-1010.40.30:
    name: 操作员技能与授权
    description: |
      对操作员开展任务认证与操作授权管理。
  BC-1010.50:
    name: 物料搬运运营管理
    description: |
      管理内部物料转移、配套备料与产线供料。
  BC-1010.50.10:
    name: 产线边补料
    description: |
      按时按需开展产线边补料与牛奶跑循环供料。
  BC-1010.50.20:
    name: 物料配套
    description: |
      为生产线配套备料与预装配组件。
  BC-1010.50.30:
    name: 内部物料转移
    description: |
      管理工序间的内部物流与传送。
  BC-1010.60:
    name: 制造数据采集管理
    description: |
      采集传感器与机器数据，实现OT-IT系统集成。
  BC-1010.60.10:
    name: 机器数据采集
    description: |
      采集机器信号与工艺过程数据。
  BC-1010.60.20:
    name: 传感器与物联网集成
    description: |
      集成车间传感器与IIoT设备。
  BC-1010.60.30:
    name: OT-IT数据集成
    description: |
      按ISA-95标准将OT数据与IT系统集成。
  BC-1010.60.40:
    name: 制造数据历史库运营
    description: |
      基于历史数据库开展时序数据的采集与访问。
  BC-1010.70:
    name: 制造绩效管理
    description: |
      实时监控生产绩效，分析停机与微停，持续优化车间效率。
  BC-1010.70.10:
    name: 实时绩效监控
    description: |
      实时监控OEE与车间KPI。
  BC-1010.70.20:
    name: 微停分析
    description: |
      分析微停与频发损失。
  BC-1010.70.30:
    name: 班次交接报告
    description: |
      输出结构化班次交接报告与数字看板。
  BC-1010.70.40:
    name: 生产异常检测
    description: |
      对生产数据开展异常检测与告警。

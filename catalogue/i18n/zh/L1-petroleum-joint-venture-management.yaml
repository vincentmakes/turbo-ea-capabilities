locale: zh
source: L1-petroleum-joint-venture-management.yaml
entries:
  BC-3110:
    name: 石油合资管理
    description: |
      管理上游联合作业协议、特许权合同和产品分成合同，涵盖作业委员会、支出授权审批、联合利益收费、资金调用、许可证义务以及合作伙伴和东道国政府报告。
  BC-3110.10:
    name: 联合作业协议管理
    description: |
      起草、管理和治理联合作业协议，包括作业委员会流程和支出授权审批。
  BC-3110.10.10:
    name: JOA起草与重新谈判
    description: |
      对联合作业协议进行起草、审阅和定期重新谈判。
  BC-3110.10.20:
    name: 作业委员会协调
    description: |
      协调OPCOM、TECCOM及各分委员会会议。
  BC-3110.10.30:
    name: 支出授权管理
    description: |
      签发、审批和跟踪支出授权（AFE）。
  BC-3110.10.40:
    name: 表决权与审批跟踪
    description: |
      跟踪合作伙伴表决权和JOA审批门槛。
  BC-3110.20:
    name: 联合利益收费
    description: |
      编制、审计和解决联合利益发票争议。
  BC-3110.20.10:
    name: 联合利益发票编制
    description: |
      向合作伙伴编制月度联合利益发票。
  BC-3110.20.20:
    name: 联合利益审计协调
    description: |
      协调合作伙伴主导的联合利益审计。
  BC-3110.20.30:
    name: JIB争议解决
    description: |
      调查和解决联合利益收费争议。
  BC-3110.30:
    name: 资金调用与资金管理
    description: |
      签发资金调用单、接收合作伙伴注资及管理违约情况。
  BC-3110.30.10:
    name: 资金调用签发
    description: |
      向合作伙伴签发月度和补充资金调用单。
  BC-3110.30.20:
    name: 合作伙伴注资接收
    description: |
      接收并核对合作伙伴的资金调用款项。
  BC-3110.30.30:
    name: 注资违约管理
    description: |
      依据JOA救济条款管理违约方头寸。
  BC-3110.40:
    name: 许可证与特许权义务管理
    description: |
      跟踪工作计划承诺、特许权使用费和许可证放弃义务。
  BC-3110.40.10:
    name: 工作计划承诺跟踪
    description: |
      跟踪最低工作义务和勘探承诺。
  BC-3110.40.20:
    name: 特许权使用费计算
    description: |
      依据特许权合同条款计算应付东道国政府的特许权使用费。
  BC-3110.40.30:
    name: 许可证放弃管理
    description: |
      管理部分和全部许可证放弃事宜。
  BC-3110.50:
    name: 东道国政府与合作伙伴报告
    description: |
      依据产品分成合同条款向东道国政府报告，并依据JOA条款向合作伙伴报告。
  BC-3110.50.10:
    name: 东道国政府报告
    description: |
      向东道国政府报告作业、费用和产量情况。
  BC-3110.50.20:
    name: 产品分成合同报告
    description: |
      依据产品分成合同条款报告成本回收、利润油和提油情况。
  BC-3110.50.30:
    name: 合作伙伴绩效报告
    description: |
      定期向合资合作伙伴报告运营和财务绩效。
  BC-3110.60:
    name: 非作业方权益管理
    description: |
      对由其他方作业的合资企业中的权益参与进行管理。
  BC-3110.60.10:
    name: 非作业方头寸监控
    description: |
      从非作业方角度监控作业方活动和合资绩效。
  BC-3110.60.20:
    name: 非作业方联合表决
    description: |
      对作业方提出的工作计划进行内部审核并行使表决权。
  BC-3110.60.30:
    name: 非作业方费用核实
    description: |
      依据JOA会计程序核实作业方收取的费用。

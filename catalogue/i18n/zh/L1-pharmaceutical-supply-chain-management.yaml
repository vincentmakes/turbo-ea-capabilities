locale: zh
source: L1-pharmaceutical-supply-chain-management.yaml
entries:
  BC-1570:
    name: 制药供应链管理
    description: |
      覆盖冷链、序列化、分销与制药物流，确保药品安全、合规地到达患者手中。
  BC-1570.10:
    name: 冷链管理
    description: |
      统筹温控供应链与GDP合规运营，维护温度敏感药品的质量完整性。
  BC-1570.10.10:
    name: 冷链设计
    description: |
      设计并确认冷链解决方案，满足产品温控要求。
  BC-1570.10.20:
    name: 温度监控
    description: |
      在冷链全程开展端到端温度监控。
  BC-1570.10.30:
    name: 温度偏差管理
    description: |
      调查并处置温度偏差事件，保障产品质量。
  BC-1570.20:
    name: 序列化与追溯管理
    description: |
      统筹序列化、汇聚与防伪管理，满足全球药品追溯法规要求。
  BC-1570.20.10:
    name: 序列号管理
    description: |
      按市场要求生成并分配药品序列号。
  BC-1570.20.20:
    name: 汇聚与层级管理
    description: |
      管理序列化单元到束包与托盘的汇聚层级关系。
  BC-1570.20.30:
    name: 法规报告与核查
    description: |
      完成DSCSA、EU FMD等法规报告与调剂核查。
  BC-1570.30:
    name: 制药分销管理
    description: |
      统筹药品向批发商、医院与药店的分销运营，确保供应链效率。
  BC-1570.30.10:
    name: 批发商与经销商运营
    description: |
      管理面向批发商与经销商的分销运营。
  BC-1570.30.20:
    name: 医院直供配送
    description: |
      开展直供医院与直供药店的配送业务。
  BC-1570.30.30:
    name: 专科药品分销
    description: |
      为限制分销产品提供专科配送服务。
  BC-1570.40:
    name: 制药库存管理
    description: |
      统筹药品库存、有效期与产品分配管理，优化供应链资源配置。
  BC-1570.40.10:
    name: 制药库存规划
    description: |
      对药品开展库存需求规划。
  BC-1570.40.20:
    name: 有效期与货架寿命管理
    description: |
      实施先到期先出（FEFO）管理与货架寿命监控。
  BC-1570.40.30:
    name: 制药产品分配
    description: |
      在供应受限情况下跨市场分配产品。
  BC-1570.40.40:
    name: 召回与撤市协调
    description: |
      协调产品召回与撤市运营工作。
  BC-1570.50:
    name: 制药物流管理
    description: |
      统筹运输、仓储与GDP合规物流运营，保障药品配送质量。
  BC-1570.50.10:
    name: GDP合规运输
    description: |
      开展符合GDP要求的运输运营。
  BC-1570.50.20:
    name: GDP合规仓储
    description: |
      开展符合GDP要求的仓储运营。
  BC-1570.50.30:
    name: 制药海关操作
    description: |
      处理药品进出口海关清关业务。
  BC-1570.50.40:
    name: 物流服务商管理
    description: |
      管理制药供应链中的第三方物流（3PL）服务商。

locale: zh
source: L1-tailings-mine-waste-management.yaml
entries:
  BC-4460:
    name: 尾矿与矿山废弃物管理
    description: |
      依据全球尾矿管理行业标准及同等监管制度，对尾矿库、废石场、矿山水和危险矿山废弃物进行全生命周期管理。
  BC-4460.10:
    name: 尾矿库工程
    description: |
      开展尾矿库的工程设计和全生命周期规划，包括选址、坝体建设和关闭导向设计。
    in_scope:
      - 选址和概念设计
      - 坝体加高和建设工程
      - 堆排规划和滩面建模
    out_of_scope:
      - 运营期尾矿堆排（BC-4460.20）
      - 尾矿仪器监测（BC-4460.30）
  BC-4460.10.10:
    name: 尾矿库选址
    description: |
      对新建和扩建尾矿库开展多准则选址和备选方案比较分析。
  BC-4460.10.20:
    name: 坝体建设工程
    description: |
      开展尾矿坝坝体的工程设计和施工质量保证。
  BC-4460.10.30:
    name: 尾矿堆排规划
    description: |
      规划堆排顺序、滩面发育和水池位置。
  BC-4460.10.40:
    name: 关闭导向设施设计
    description: |
      开展与长期关闭和安全最终地形相符的尾矿库设计。
  BC-4460.20:
    name: 尾矿运营
    description: |
      将尾矿存入尾矿库的运营性作业，包括料浆、膏体和过滤尾矿处理及回水利用。
  BC-4460.20.10:
    name: 尾矿料浆输送
    description: |
      操作尾矿输送管道、泵站和配送系统。
  BC-4460.20.20:
    name: 尾矿堆排运营
    description: |
      按堆排计划将尾矿运营性存入尾矿库。
  BC-4460.20.30:
    name: 尾矿回水利用
    description: |
      从尾矿库回收溢清水和渗漏水供循环使用。
  BC-4460.20.40:
    name: 过滤与干堆尾矿运营
    description: |
      操作过滤尾矿装置和干堆堆放作业。
  BC-4460.30:
    name: 尾矿巡查与坝体安全
    description: |
      依据 GISTM 及同等坝体安全制度，开展尾矿库巡查、治理和应急准备。
  BC-4460.30.10:
    name: 岩土工程仪器监测
    description: |
      对尾矿库的渗压计、倾斜仪和测量棱镜进行监测。
  BC-4460.30.20:
    name: 独立尾矿审查协调
    description: |
      聘请并协调独立尾矿审查委员会和责任工程师。
  BC-4460.30.30:
    name: 尾矿应急准备
    description: |
      针对尾矿坝溃坝情景制定应急准备和响应计划。
  BC-4460.30.40:
    name: 尾矿标准符合性报告
    description: |
      按照全球尾矿管理行业标准及同等监管机构要求提交符合性报告。
  BC-4460.40:
    name: 废石管理
    description: |
      对废石场进行特性鉴定和运营管理，包括酸性和含金属废水控制措施。
  BC-4460.40.10:
    name: 废石特性鉴定
    description: |
      对废石进行地球化学特性鉴定，评估其酸性和含金属排水潜力。
  BC-4460.40.20:
    name: 废石场运营
    description: |
      将废石运营性堆放至工程化废石场和充填区域。
  BC-4460.40.30:
    name: 酸性与含金属废水管理
    description: |
      预防、收集和处理来自废石和矿石堆的酸性矿山废水和含金属废水。
  BC-4460.50:
    name: 矿山水管理
    description: |
      开展全场地矿山水量平衡、处理和排放合规管理。
  BC-4460.50.10:
    name: 矿山水量平衡运营
    description: |
      对露天坑、地下和生产过程水系统开展场地水量平衡的运营管理。
  BC-4460.50.20:
    name: 矿山水处理
    description: |
      操作石灰法、反渗透和生物法矿山水处理装置。
  BC-4460.50.30:
    name: 水排放合规监测
    description: |
      监测和报告水排放是否符合环境许可条件。
  BC-4460.60:
    name: 危险矿山废弃物管理
    description: |
      管理过程药剂废弃物、含氰废弃物和含重金属残渣。
  BC-4460.60.10:
    name: 药剂废弃物处置
    description: |
      处置废旧过程药剂和受污染容器。
  BC-4460.60.20:
    name: 氰化物废弃物管理
    description: |
      对含氰尾矿和过程残渣进行解毒和管理。
  BC-4460.60.30:
    name: 汞与重金属废弃物管理
    description: |
      管理处理和精炼过程中产生的含汞、砷及其他重金属残渣。

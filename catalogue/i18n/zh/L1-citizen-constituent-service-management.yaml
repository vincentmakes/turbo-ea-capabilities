locale: zh
source: L1-citizen-constituent-service-management.yaml
entries:
  BC-3220:
    name: 公民与选民服务管理
    description: |
      通过多渠道向公民、居民和选民提供政府服务，包括身份认证、案件管理、咨询、申诉和参与互动。
  BC-3220.10:
    name: 服务渠道运营
    description: |
      运营公民获取政府服务的线下、电话、邮政、数字和移动渠道。
    in_scope:
      - 一站式服务大厅和实体服务窗口
      - 联络中心和电话渠道
      - 数字门户和移动应用
      - 邮政和表格渠道
    out_of_scope:
      - 公民身份核验（由公民身份与认证覆盖）
  BC-3220.10.10:
    name: 一站式服务大厅运营
    description: |
      运营跨机构的实体服务中心和一站式服务窗口。
  BC-3220.10.20:
    name: 联络中心运营
    description: |
      运营跨机构的电话和在线聊天联络中心。
  BC-3220.10.30:
    name: 数字服务门户运营
    description: |
      运营面向公民的数字服务门户和移动服务应用。
  BC-3220.10.40:
    name: 服务无障碍保障
    description: |
      在各服务渠道开展WCAG和Section 508无障碍保障及辅助技术支持。
  BC-3220.20:
    name: 公民身份与认证
    description: |
      建立和核验公民数字身份、凭证及政府服务访问保证级别。
  BC-3220.20.10:
    name: 身份审查
    description: |
      依据NIST 800-63 IAL或eIDAS保证级别开展身份审查。
  BC-3220.20.20:
    name: 凭证签发
    description: |
      签发用于政府访问的认证器和凭证。
  BC-3220.20.30:
    name: 认证运营
    description: |
      对公民访问政府服务进行日常认证。
  BC-3220.20.40:
    name: 联合认证与跨境信任
    description: |
      在各机构间开展身份联合认证，并依据eIDAS或同等框架建立跨境信任。
  BC-3220.30:
    name: 公民案件管理
    description: |
      在各机构和项目中对公民互动开展端到端案件全生命周期管理。
  BC-3220.30.10:
    name: 案件接收与分诊
    description: |
      对公民案件进行接收、分类和分诊。
  BC-3220.30.20:
    name: 案件分配与转办
    description: |
      依据管辖权和规则将案件分配给案件工作人员和机构。
  BC-3220.30.30:
    name: 案件推进与解决
    description: |
      推动案件通过服务工作流程直至解决。
  BC-3220.30.40:
    name: 案件关闭与质量审查
    description: |
      对已完成案件进行关闭、质量审查和返工处理。
  BC-3220.40:
    name: 服务申请与咨询处理
    description: |
      跨渠道处理咨询、申请、投诉和信息公开申请。
  BC-3220.40.10:
    name: 一般咨询处理
    description: |
      处理一般咨询和信息申请。
  BC-3220.40.20:
    name: 投诉处理
    description: |
      接收、调查和解决公民投诉。
  BC-3220.40.30:
    name: 信息公开申请处理
    description: |
      处理信息自由和档案查阅申请。
  BC-3220.50:
    name: 申诉与监察专员管理
    description: |
      对机构决定开展独立行政复议，包括申诉、裁判所程序和监察专员调查。
  BC-3220.50.10:
    name: 行政申诉接收
    description: |
      接收和验证针对机构决定的行政申诉。
  BC-3220.50.20:
    name: 申诉审理与裁决
    description: |
      由复审机构对申诉进行审理并作出裁决。
  BC-3220.50.30:
    name: 监察专员调查
    description: |
      对行政失当投诉开展独立监察专员调查。
  BC-3220.60:
    name: 公民参与互动
    description: |
      通过参与平台、请愿和反馈渠道与公民开展双向互动。
  BC-3220.60.10:
    name: 请愿与公民倡议处理
    description: |
      接收、验证并回应请愿和公民发起的提案。
  BC-3220.60.20:
    name: 参与式平台运营
    description: |
      运营参与式预算、审议和共同创造平台。
  BC-3220.60.30:
    name: 公民满意度测量
    description: |
      测量公民满意度、信任感和服务体验。

locale: zh
source: L1-subscription-lifecycle-management.yaml
entries:
  BC-4240:
    name: 订阅生命周期管理
    description: |
      管理SaaS商业生命周期中的方案与权益设计、订阅合同签署、供给、变更、续签、取消及运行时权益执行。
  BC-4240.10:
    name: 方案与权益设计
    description: |
      定义方案、功能权益及管控哪些客户可使用哪些方案的规则。
    in_scope:
      - 方案目录与功能门控
      - 方案资格规则
    out_of_scope:
      - 定价策略与价格表治理（由定价管理负责）
  BC-4240.10.10:
    name: 方案目录定义
    description: |
      定义方案目录，包括方案等级和内容。
  BC-4240.10.20:
    name: 功能权益定义
    description: |
      定义附加在方案、附加项及定制合同上的功能权益。
  BC-4240.10.30:
    name: 方案资格规则
    description: |
      制定决定哪些客户和用例适用各方案的规则。
  BC-4240.20:
    name: 订阅合同签署
    description: |
      管理报价、生成订单表格及捕获订阅合同制品。
  BC-4240.20.10:
    name: 订阅报价管理
    description: |
      在销售流程中生成和管理订阅报价。
  BC-4240.20.20:
    name: 订单表格生成
    description: |
      为新老客户生成反映商定条款的订单表格。
  BC-4240.20.30:
    name: 订阅合同捕获
    description: |
      捕获和存储已执行的订阅合同制品及关键条款。
  BC-4240.30:
    name: 订阅供给
    description: |
      为新订阅激活服务，包括试用转付费及批量席位供给。
  BC-4240.30.10:
    name: 初始供给
    description: |
      在订阅开始时完成服务权益的初始供给。
  BC-4240.30.20:
    name: 试用转付费
    description: |
      将试用账户转换为付费订阅。
  BC-4240.30.30:
    name: 批量席位供给
    description: |
      为企业订阅批量供给席位。
  BC-4240.40:
    name: 订阅变更
    description: |
      处理活跃订阅的在网变更，包括升级、降级、席位调整及附加项激活。
  BC-4240.40.10:
    name: 方案升级管理
    description: |
      处理客户发起和系统发起的方案升级。
  BC-4240.40.20:
    name: 方案降级管理
    description: |
      处理方案降级，包括对权益和数据的影响。
  BC-4240.40.30:
    name: 席位调整
    description: |
      调整活跃订阅的席位数量。
  BC-4240.40.40:
    name: 附加项激活
    description: |
      在活跃订阅上激活可选附加权益。
  BC-4240.50:
    name: 续签管理
    description: |
      无论自动还是手动，均对订阅续签进行预测、处理和谈判。
  BC-4240.50.10:
    name: 续签预测
    description: |
      预测即将到期的续签及预期结果。
  BC-4240.50.20:
    name: 自动续签处理
    description: |
      按合同条款处理订阅自动续签。
  BC-4240.50.30:
    name: 续签谈判支持
    description: |
      为续签谈判提供数据、定价及条款变更方案支持。
  BC-4240.60:
    name: 取消与终止
    description: |
      处理自愿取消、非自愿终止及离网客户的服务收尾工作。
  BC-4240.60.10:
    name: 取消处理
    description: |
      处理客户发起的取消请求。
  BC-4240.60.20:
    name: 非自愿终止
    description: |
      因欠款、违约或合同到期终止服务。
  BC-4240.60.30:
    name: 服务收尾协调
    description: |
      协调服务收尾工作，包括数据导出和删除移交。
  BC-4240.70:
    name: 权益执行
    description: |
      解析并在运行时执行订阅权益，并保留访问决策的审计追踪。
  BC-4240.70.10:
    name: 权益解析
    description: |
      解析每个订阅、账户和用户的有效权益。
  BC-4240.70.20:
    name: 权益门控执行
    description: |
      按解析后的权益对功能和配额进行运行时门控。
  BC-4240.70.30:
    name: 权益审计追踪
    description: |
      保留权益变更和门控决策的审计级记录。

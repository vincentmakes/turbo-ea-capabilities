locale: zh
source: L1-agri-environmental-stewardship-management.yaml
entries:
  BC-3600:
    name: 农业环境管护管理
    description: |
      农场环境管护——土壤健康、水资源管护、生物多样性、农业温室气体管理、土壤碳项目、再生农业实践及参与补充企业可持续发展的农业环境计划。
  BC-3600.10:
    name: 土壤健康管护
    description: |
      耕作土地的土壤有机质管护、覆盖作物种植及侵蚀控制。
  BC-3600.10.10:
    name: 土壤有机碳监测
    description: |
      定期监测各地块土壤有机碳。
  BC-3600.10.20:
    name: 覆盖作物种植计划
    description: |
      通过覆盖作物种植计划维持土壤覆盖和生物活性。
  BC-3600.10.30:
    name: 土壤侵蚀控制计划
    description: |
      侵蚀控制计划，包括等高耕作、梯田和缓冲带措施。
  BC-3600.20:
    name: 农场水资源管护
    description: |
      农场层面的用水效率、滨岸带保护和排水水质管理。
    in_scope:
      - 用水效率监测
      - 滨岸带和水道保护
      - 排水水质管理
    out_of_scope:
      - 企业水信息披露（BC-740）
      - 灌溉计划制订（BC-3500.60.10）
  BC-3600.20.10:
    name: 用水效率监测
    description: |
      监测逐作物和逐地块的用水效率。
  BC-3600.20.20:
    name: 滨岸带与水道保护
    description: |
      保护滨岸带和农场水道。
  BC-3600.20.30:
    name: 排水水质管理
    description: |
      管理排水水质和养分流失。
  BC-3600.30:
    name: 生物多样性与栖息地管护
    description: |
      农场生物多样性管理，包括栖息地记录、传粉昆虫管护和田边缓冲带。
  BC-3600.30.10:
    name: 农场栖息地记录
    description: |
      记录农场栖息地和生物多样性特征。
  BC-3600.30.20:
    name: 传粉昆虫管护
    description: |
      传粉昆虫友好型措施，包括花带种植和IPM阈值管理。
  BC-3600.30.30:
    name: 缓冲带管理
    description: |
      管理田间边界和水道缓冲带。
  BC-3600.40:
    name: 农业温室气体管理
    description: |
      农场温室气体的量化与减排，包括肠道甲烷、氧化亚氮和农场CO2。
  BC-3600.40.10:
    name: 肠道甲烷减排计划
    description: |
      反刍牲畜肠道甲烷减排计划。
  BC-3600.40.20:
    name: 氧化亚氮减排计划
    description: |
      通过提高氮素利用效率和调整施用时间开展氧化亚氮减排。
  BC-3600.40.30:
    name: 农场排放清单
    description: |
      为信息披露服务的农场级温室气体排放清单。
  BC-3600.50:
    name: 土壤碳与碳信用项目
    description: |
      土壤碳基准测量、碳信用项目设计及公认方法学下的签发记录。
  BC-3600.50.10:
    name: 土壤碳基准测量
    description: |
      项目注册时的基准土壤碳测量活动。
  BC-3600.50.20:
    name: 碳信用项目设计
    description: |
      依据Verra、Gold Standard及同等方法学开展项目设计。
  BC-3600.50.30:
    name: 碳信用签发记录
    description: |
      记录信用额度签发、注销及受益方分配情况。
  BC-3600.60:
    name: 再生农业实践管理
    description: |
      再生农业实践的采用与记录，包括减耕、农牧一体化和农林复合。
  BC-3600.60.10:
    name: 免耕与减耕计划
    description: |
      采用和跟踪免耕与减耕计划。
  BC-3600.60.20:
    name: 农牧一体化运营
    description: |
      整合种植与畜牧运营，促进养分循环利用。
  BC-3600.60.30:
    name: 农林复合实践记录
    description: |
      记录农林复合种植和林牧结合系统。
  BC-3600.70:
    name: 农业环境计划参与
    description: |
      参与CAP生态计划、NRCS保护计划及同等农业环境付费计划。
  BC-3600.70.10:
    name: CAP生态计划参与
    description: |
      参与EU CAP生态计划和条件性要求。
  BC-3600.70.20:
    name: 保护计划参与
    description: |
      参与美国农业部NRCS EQIP、CSP及同等计划。
  BC-3600.70.30:
    name: 农业环境款项对账
    description: |
      将农业环境付款与计划承诺进行对账。

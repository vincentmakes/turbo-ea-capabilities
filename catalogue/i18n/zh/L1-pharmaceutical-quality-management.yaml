locale: zh
source: L1-pharmaceutical-quality-management.yaml
entries:
  BC-1560:
    name: 药品质量管理
    description: |
      覆盖GxP质量体系、偏差/CAPA、变更控制与批次放行，确保药品质量持续合规。
  BC-1560.10:
    name: GMP合规管理
    description: |
      建立GMP合规框架并做好监管检查准备，维持生产质量体系的持续符合性。
  BC-1560.10.10:
    name: GMP质量管理体系
    description: |
      按ICH Q10要求维护质量管理体系（QMS）。
  BC-1560.10.20:
    name: GMP检查准备
    description: |
      为FDA、EMA及PMDA检查做好充分准备。
  BC-1560.10.30:
    name: GMP审计项目
    description: |
      实施内部GMP审计项目，识别质量改进机会。
  BC-1560.20:
    name: GxP质量控制管理
    description: |
      统筹QC实验室、分析检测与稳定性检测，确保药品符合质量标准。
  BC-1560.20.10:
    name: QC实验室运营
    description: |
      运营GMP质量控制实验室，完成日常检测任务。
  BC-1560.20.20:
    name: 分析方法转移
    description: |
      将分析方法转移至QC检测场地。
  BC-1560.20.30:
    name: 稳定性检测
    description: |
      按ICH Q1要求开展稳定性检测。
  BC-1560.20.40:
    name: 超标结果调查
    description: |
      对超标（OOS）检测结果进行调查。
  BC-1560.30:
    name: GxP质量保证管理
    description: |
      统筹QA审核、批记录审核与质量监督，保障生产过程合规性。
  BC-1560.30.10:
    name: 批记录审核
    description: |
      对已执行批记录开展QA审核。
  BC-1560.30.20:
    name: GxP文件管理
    description: |
      对GxP受控文件进行规范化管理。
  BC-1560.30.30:
    name: 运营质量保证监督
    description: |
      在生产现场开展QA巡查与监督。
  BC-1560.40:
    name: 偏差与CAPA管理
    description: |
      统筹偏差处理、CAPA制定与有效性核查，持续提升生产质量水平。
  BC-1560.40.10:
    name: GxP偏差处理
    description: |
      对GxP偏差进行记录、调查与关闭。
  BC-1560.40.20:
    name: GxP CAPA管理
    description: |
      结合根本原因分析开展CAPA管理。
  BC-1560.40.30:
    name: CAPA有效性核查
    description: |
      核查已实施CAPA的有效性。
  BC-1560.50:
    name: GxP变更控制管理
    description: |
      统筹GxP变更控制与影响评估，确保变更不对产品质量造成负面影响。
  BC-1560.50.10:
    name: GxP变更请求记录
    description: |
      记录并分类GxP变更请求。
  BC-1560.50.20:
    name: GxP变更影响评估
    description: |
      评估GxP变更对产品质量的影响。
  BC-1560.50.30:
    name: GxP变更实施追踪
    description: |
      追踪已批准GxP变更的实施进展。
  BC-1560.60:
    name: 制药供应商质量管理
    description: |
      统筹供应商资质认证、审计与质量协议管理，保障供应链质量。
  BC-1560.60.10:
    name: GMP供应商资质认证
    description: |
      对GMP原料与服务供应商开展资质认证。
  BC-1560.60.20:
    name: GMP供应商审计
    description: |
      对供应商开展现场GMP审计。
  BC-1560.60.30:
    name: 质量协议管理
    description: |
      谈判并维护供应商质量协议。
  BC-1560.70:
    name: 批次放行管理
    description: |
      统筹责任人（QP）放行与批次认证，确保产品合规上市。
  BC-1560.70.10:
    name: 批次处置决策
    description: |
      对生产批次作出放行或拒绝的处置决定。
  BC-1560.70.20:
    name: 责任人认证
    description: |
      按EU附录16要求由QP完成批次认证。
  BC-1560.70.30:
    name: 市场放行协调
    description: |
      协调各地区的市场放行工作。
  BC-1560.80:
    name: 年度产品质量回顾管理
    description: |
      统筹APQR/APR制作与产品质量趋势分析，支持持续改进决策。
  BC-1560.80.10:
    name: APQR制作
    description: |
      编制年度产品质量回顾报告。
  BC-1560.80.20:
    name: 产品质量趋势分析
    description: |
      对产品质量数据开展趋势分析，识别质量改进机会。
  BC-1560.80.30:
    name: APQR行动追踪
    description: |
      追踪APQR结论所提出的改进行动落实情况。

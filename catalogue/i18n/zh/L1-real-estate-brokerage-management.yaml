locale: zh
source: L1-real-estate-brokerage-management.yaml
entries:
  BC-4960:
    name: 房地产经纪管理
    description: |
      作为服务业务线的商业及住宅房地产经纪与代理中介，涵盖委托房源获取、买方/租户代理、MLS数据管理、可比交易分析、带看运营、报价谈判、交易交割协调、佣金与合作经纪结算及经纪人生产力/名册管理。
    in_scope:
      - 卖方/业主房源获取与代理
      - 买方/租户接洽与代理
      - MLS房源采集、分发与合规
      - 可比市场分析和经纪价值意见
      - 带看、开放参观和钥匙箱/数字门禁运营
      - 报价起草、还价及多方报价处理
      - 交割协调与条件跟踪
      - 佣金、合作经纪及介绍费结算
      - 经纪人执照、担保、绩效和佣金方案管理
    out_of_scope:
      - 自有资产的业主方租赁运营（BC-4950）
      - 买卖方直接参与的收购/处置交易执行（BC-4930）
      - 估值委托（BC-4970）
      - 经纪人/执照持有人执照监管（BC-4990）
  BC-4960.10:
    name: 房源获取与代理
    description: |
      争取并转化卖方/业主委托，执行委托协议中承诺的营销计划。
  BC-4960.10.10:
    name: 房源竞标与获取
    description: |
      参与房源委托竞标，包括可比市场分析、营销方案和提案展示。
  BC-4960.10.20:
    name: 委托协议管理
    description: |
      管理委托协议，包括独家权、期限和佣金条款。
  BC-4960.10.30:
    name: 房源营销计划
    description: |
      定义并执行委托协议中承诺的营销计划。
  BC-4960.20:
    name: 买方与租户代理
    description: |
      承接并执行买方和租户代理委托，包括搜寻和入围筛选。
  BC-4960.20.10:
    name: 买方/租户接洽
    description: |
      接洽买方和租户客户，签订代理协议并完成披露。
  BC-4960.20.20:
    name: 需求定义与简报
    description: |
      定义客户需求简报，涵盖用途、面积、区位和预算。
  BC-4960.20.30:
    name: 房源搜寻与入围
    description: |
      搜寻、入围并向客户展示候选物业。
  BC-4960.30:
    name: 房源数据与MLS管理
    description: |
      管理MLS和门户网站房源数据，包括采集、媒体、分发及RESO数据标准合规。
  BC-4960.30.10:
    name: MLS房源采集
    description: |
      按RESO数据字典字段和规则采集MLS房源信息。
  BC-4960.30.20:
    name: 房源媒体与摄影
    description: |
      制作并管理房源媒体，包括摄影、视频和3D虚拟带看。
  BC-4960.30.30:
    name: 分发与门户网站推送
    description: |
      将房源信息推送至门户网站、合作平台和聚合平台。
  BC-4960.30.40:
    name: 房源合规与撤销
    description: |
      管理房源信息准确性合规、状态变更及撤销工作。
  BC-4960.40:
    name: 可比市场分析
    description: |
      为房源和买方委托制作可比市场分析报告、经纪价值意见及定价定位分析。
  BC-4960.40.10:
    name: 可比交易整理
    description: |
      从MLS和公开档案整理可比交易证据。
  BC-4960.40.20:
    name: 可比市场分析报告制作
    description: |
      制作用于客户展示的可比市场分析报告。
  BC-4960.40.30:
    name: 经纪价值意见
    description: |
      为客户和机构委托方发表经纪价值意见。
  BC-4960.50:
    name: 带看与开放参观运营
    description: |
      运营带看预约、开放参观及面向潜在买方和合作经纪人的实地和数字门禁访问。
  BC-4960.50.10:
    name: 带看预约管理
    description: |
      管理来自合作经纪人的带看预约和门禁请求。
  BC-4960.50.20:
    name: 开放参观运营
    description: |
      运营开放参观活动，包括登记和后续跟进。
  BC-4960.50.30:
    name: 钥匙箱与门禁控制
    description: |
      管理已挂牌物业的钥匙箱和数字门禁凭证。
  BC-4960.60:
    name: 报价与谈判管理
    description: |
      代表委托方起草并谈判报价、还价及多方报价情形。
  BC-4960.60.10:
    name: 报价起草
    description: |
      代表委托方起草报价及补充条款。
  BC-4960.60.20:
    name: 还价与多方报价管理
    description: |
      管理还价流程和多方报价情形，包括最终出价征询。
  BC-4960.60.30:
    name: 报价接受与合同确认
    description: |
      确认报价接受及约束性合同的成立。
  BC-4960.70:
    name: 经纪交易交割协调
    description: |
      协调经纪交易中从条件到交割的资金监管和产权转让工作。
  BC-4960.70.10:
    name: 条件跟踪
    description: |
      跟踪检查、融资及其他条件的满足或豁免情况。
  BC-4960.70.20:
    name: 资金监管/产权转让协调
    description: |
      就交割文件和资金与资金监管和产权转让方进行协调。
  BC-4960.70.30:
    name: 交割日协调
    description: |
      协调签约、钥匙交付和交割日相关事务。
  BC-4960.80:
    name: 佣金与合作经纪管理
    description: |
      采集佣金条款并结算合作经纪佣金和介绍费。
  BC-4960.80.10:
    name: 佣金协议采集
    description: |
      采集佣金协议，包括分成和条件约定。
  BC-4960.80.20:
    name: 合作经纪结算
    description: |
      在完成交割后结算应付合作经纪人的佣金。
  BC-4960.80.30:
    name: 佣金拨付
    description: |
      向经纪公司和经纪人扣减后拨付佣金。
  BC-4960.80.40:
    name: 介绍费管理
    description: |
      管理与介绍经纪人和合作方的介绍费协议。
  BC-4960.90:
    name: 经纪人生产力与名册管理
    description: |
      管理经纪公司名册中的经纪人执照担保、绩效及佣金方案管理。
  BC-4960.90.10:
    name: 经纪人执照与担保跟踪
    description: |
      跟踪经纪人执照状态和经纪公司担保安排。
  BC-4960.90.20:
    name: 经纪人绩效管理
    description: |
      按业绩目标和标准对经纪人绩效进行管理。
  BC-4960.90.30:
    name: 经纪人佣金方案管理
    description: |
      管理经纪人佣金方案、分成比例和上限。

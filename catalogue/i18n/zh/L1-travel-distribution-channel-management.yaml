locale: zh
source: L1-travel-distribution-channel-management.yaml
entries:
  BC-4010:
    name: 旅行分销渠道管理
    description: |
      管理旅行产品在直销、GDS、OTA、批发商及元搜索渠道的分销与商品化，涵盖渠道连接、内容联合分发及价格和供应量对等管理。
    in_scope:
      - 直销、GDS、OTA、批发商及元搜索渠道运营
      - 渠道管理器中枢运营及内容联合分发
      - 价格与供应量对等政策及执行
    out_of_scope:
      - 产品主数据与库存池定义（BC-4000）
      - 预订生命周期（BC-4020）
      - 定价与收益决策（BC-4030）
  BC-4010.10:
    name: 直销渠道分销管理
    description: |
      通过企业自有直销渠道（包括官网、移动端、语音及自助服务终端）分销旅行产品。
  BC-4010.10.10:
    name: 品牌官网分销管理
    description: |
      将品牌官网作为旅行产品的直销搜索和预订界面进行运营管理。
  BC-4010.10.20:
    name: 移动应用分销管理
    description: |
      将原生移动应用作为直销和服务界面进行运营管理。
  BC-4010.10.30:
    name: 语音与呼叫中心分销
    description: |
      通过语音和呼叫中心渠道提供坐席辅助搜索和预订服务。
  BC-4010.10.40:
    name: 终端机与自助服务分销
    description: |
      通过机场、酒店及合作伙伴场所的终端机提供自助分销服务。
  BC-4010.20:
    name: GDS分销管理
    description: |
      通过全球分销系统（GDS）进行分销，包括内容同步、预订舱位映射及费用管理。
  BC-4010.20.10:
    name: GDS连接运营
    description: |
      管理与GDS供应商在搜索、预订及出票流程中的连接运营。
  BC-4010.20.20:
    name: GDS内容推送与同步
    description: |
      向GDS供应商推送并同步内容、价格及供应量。
  BC-4010.20.30:
    name: GDS预订舱位映射
    description: |
      将内部产品舱位映射至GDS预订舱位和价格代码。
  BC-4010.20.40:
    name: GDS费用与附加费管理
    description: |
      管理GDS预订费、附加费及销售成本分摊。
  BC-4010.30:
    name: OTA与批发商分销管理
    description: |
      通过在线旅行社、床位银行及B2B批发商进行分销，包括商业条款及内容覆盖管理。
  BC-4010.30.10:
    name: OTA连接运营
    description: |
      管理与OTA在搜索、预订及预订后事件中的连接运营。
  BC-4010.30.20:
    name: 批发商与床位银行连接
    description: |
      管理与批发商及床位银行的B2B再分销连接运营。
  BC-4010.30.30:
    name: OTA商业条款管理
    description: |
      管理OTA商业条款，包括佣金、加价及净价模式。
  BC-4010.30.40:
    name: OTA内容覆盖管理
    description: |
      在维护品牌一致性的前提下，管理针对OTA的渠道专属内容覆盖。
  BC-4010.40:
    name: 元搜索分销管理
    description: |
      在元搜索平台上进行分销和竞价，包括信息流运营和转化追踪。
  BC-4010.40.10:
    name: 元搜索信息流运营
    description: |
      向元搜索供应商运营价格和供应量信息流。
  BC-4010.40.20:
    name: 元搜索竞价运营
    description: |
      跨市场和设备管理元搜索展位的竞价策略。
  BC-4010.40.30:
    name: 元搜索转化追踪
    description: |
      追踪元搜索流量的转化归因和竞价效果。
  BC-4010.40.40:
    name: 品牌竞价冲突管理
    description: |
      管理品牌自有竞价与OTA在元搜索及付费搜索上的竞价冲突。
  BC-4010.50:
    name: 渠道管理器运营
    description: |
      运营渠道管理器中枢，跨分销渠道同步库存、价格及限制条件。
  BC-4010.50.10:
    name: 渠道映射配置
    description: |
      配置内部产品与渠道专属目录之间的映射关系。
  BC-4010.50.20:
    name: 库存推送运营
    description: |
      将中央库存池的库存更新推送至所有已连接渠道。
  BC-4010.50.30:
    name: 价格推送运营
    description: |
      将定价引擎的价格更新推送至所有已连接渠道。
  BC-4010.50.40:
    name: 限制条件推送运营
    description: |
      跨渠道推送限制条件更新，如最短住宿、禁止抵达及停售。
  BC-4010.60:
    name: 价格与供应量对等管理
    description: |
      在直销和间接渠道间定义、监控并执行价格和供应量对等策略。
  BC-4010.60.10:
    name: 对等政策定义
    description: |
      按渠道类型和合作伙伴细分定义价格和供应量对等政策。
  BC-4010.60.20:
    name: 对等监控与审计
    description: |
      监控各渠道的对等违规情况，并对渠道组合进行例行审计。
  BC-4010.60.30:
    name: 对等违规处理
    description: |
      与渠道和合作伙伴协调处理已发现的对等违规问题。
  BC-4010.60.40:
    name: 最后房间供应管理
    description: |
      管理对企业客户和渠道合作伙伴的最后房间可用性承诺。
  BC-4010.70:
    name: 分销内容联合分发
    description: |
      向分销合作伙伴联合分发产品内容，并对格式、时效性及回退机制进行管控。
  BC-4010.70.10:
    name: 内容信息流格式管理
    description: |
      管理渠道专属内容信息流格式和规范。
  BC-4010.70.20:
    name: 内容时效性监控
    description: |
      按发布SLA对照监控分销合作伙伴界面上内容的时效性。
  BC-4010.70.30:
    name: 渠道内容回退规则
    description: |
      制定合作伙伴专属内容缺失或过时时适用的回退规则。
  BC-4010.70.40:
    name: 内容覆盖对账
    description: |
      将合作伙伴内容覆盖与主内容记录进行对账。

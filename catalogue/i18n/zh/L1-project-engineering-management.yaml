locale: zh
source: L1-project-engineering-management.yaml
entries:
  BC-1110:
    name: 项目工程管理
    description: |
      管理从FEED到移交的项目工程全过程，确保工程可交付物按质、按期、按量完成。
  BC-1110.10:
    name: 项目工程规划管理
    description: |
      制定工程工作分解结构、可交付物计划与工程进度，为工程执行奠定基础。
  BC-1110.10.10:
    name: 工程工作分解结构定义
    description: |
      定义工程WBS与各专业工作分解。
  BC-1110.10.20:
    name: 工程可交付物台账
    description: |
      建立可交付物台账，明确责任人与目标完成日期。
  BC-1110.10.30:
    name: 工程进度计划编制
    description: |
      编制含各专业相互依赖关系的工程进度计划。
  BC-1110.10.40:
    name: 工程资源投入预测
    description: |
      预测工程工时并开展资源投入规划。
  BC-1110.20:
    name: 项目工程执行管理
    description: |
      统筹多专业工程执行，实施执行监督与报告。
  BC-1110.20.10:
    name: 工程进度测量
    description: |
      测量工程可交付物进度与挣值。
  BC-1110.20.20:
    name: 工程工时管控
    description: |
      跟踪并预测工程工时消耗。
  BC-1110.20.30:
    name: 工程协调会议
    description: |
      召开跨专业工程协调会议与周报。
  BC-1110.20.40:
    name: 工程生产力改善
    description: |
      通过设计自动化与复用等措施提升生产力。
  BC-1110.30:
    name: 工程变更管理
    description: |
      管理变更请求、技术影响评估与基准控制，确保设计基准受控。
  BC-1110.30.10:
    name: 工程变更请求采集
    description: |
      采集并分类工程变更请求。
  BC-1110.30.20:
    name: 技术影响评估
    description: |
      开展多专业变更技术影响评估。
  BC-1110.30.30:
    name: 工程基准控制
    description: |
      管控工程基准与配置项。
  BC-1110.30.40:
    name: 工程变更审批与实施
    description: |
      管理变更审批委员会与实施跟踪。
  BC-1110.40:
    name: 接口管理
    description: |
      管理内外部技术接口，协调各方利益相关方。
  BC-1110.40.10:
    name: 接口识别与登记
    description: |
      识别并登记技术接口。
  BC-1110.40.20:
    name: 接口协议管理
    description: |
      与各相关方签订接口协议并明确验收准则。
  BC-1110.40.30:
    name: 接口监控与关闭
    description: |
      监控接口可交付物并正式关闭接口。
  BC-1110.50:
    name: 项目工程质量管理
    description: |
      通过工程QA/QC、技术保证、同行评审与审计确保工程质量。
  BC-1110.50.10:
    name: 工程QA项目群管理
    description: |
      按ISO 9001标准制定并管理工程QA项目群。
  BC-1110.50.20:
    name: 专业同行评审
    description: |
      对工程可交付物开展专业同行评审。
  BC-1110.50.30:
    name: 工程技术审计
    description: |
      开展独立技术审计与保证评审。
  BC-1110.50.40:
    name: 工程经验教训
    description: |
      采集并传播工程经验教训。
  BC-1110.60:
    name: 项目工程风险与问题管理
    description: |
      识别技术风险、管理技术问题并跟踪缓解措施。
  BC-1110.60.10:
    name: 技术风险识别
    description: |
      识别技术与工程风险。
  BC-1110.60.20:
    name: 技术风险评估
    description: |
      评估技术风险的可能性与影响程度。
  BC-1110.60.30:
    name: 技术问题解决
    description: |
      追踪技术问题并推动责任人解决。
  BC-1110.60.40:
    name: 技术缓解措施跟踪
    description: |
      跟踪缓解行动执行情况与剩余风险。

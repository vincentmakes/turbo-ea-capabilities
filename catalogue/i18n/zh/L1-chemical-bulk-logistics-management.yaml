locale: zh
source: L1-chemical-bulk-logistics-management.yaml
entries:
  BC-4680:
    name: 化工散货物流管理
    description: |
      跨储罐区、公路、铁路、海运、管道和仓储等运输方式开展散装化学品处理，包括危化品合规运营、代加工协调和散装交接计量。有别于在网络层面涵盖通用和多式联运货运的跨行业供应链（BC-520）和运输 L1。
  BC-4680.10:
    name: 散装储存与储罐区运营
    description: |
      运营散装储罐和储罐区，包括分配、清洗和损耗对账。
  BC-4680.10.10:
    name: 储罐区库存管理
    description: |
      管理常压和加压储罐区的库存。
  BC-4680.10.20:
    name: 储罐分配与路径规划
    description: |
      为产品分配储罐并规划进出料流向。
  BC-4680.10.30:
    name: 储罐清洗协调
    description: |
      协调产品切换之间的储罐清洗工作。
  BC-4680.10.40:
    name: 储罐区损耗对账
    description: |
      对账储罐区库存的实物损耗。
  BC-4680.20:
    name: 罐车与 ISO 罐集装箱物流
    description: |
      运营罐车和 ISO 罐集装箱车队，包括装卸站台运营和容器清洗。
  BC-4680.20.10:
    name: 罐车排程
    description: |
      排程罐车运输和停靠泊位分配。
  BC-4680.20.20:
    name: ISO 罐集装箱车队管理
    description: |
      管理 ISO 罐集装箱车队，包括位置调配和循环使用。
  BC-4680.20.30:
    name: 装卸站台运营
    description: |
      运营公路和 ISO 罐集装箱发货装卸站台。
  BC-4680.20.40:
    name: 容器清洗协调
    description: |
      协调装载间隔的已批准容器清洗工作。
  BC-4680.30:
    name: 铁路罐车物流
    description: |
      开展铁路罐车的分配、装卸和维护协调。
  BC-4680.30.10:
    name: 铁路罐车分配
    description: |
      将铁路罐车分配至产品和运输路线。
  BC-4680.30.20:
    name: 铁路装卸运营
    description: |
      运营铁路装卸站台。
  BC-4680.30.30:
    name: 铁路罐车维护协调
    description: |
      协调全车队铁路罐车的维护和资质认证。
  BC-4680.40:
    name: 海运散装化工物流
    description: |
      开展小包船和化学品液货船的海运物流，包括租船、装船和配载。
  BC-4680.40.10:
    name: 化学品液货船租船协调
    description: |
      协调化学品和小包液货船的租船事宜。
  BC-4680.40.20:
    name: 海运装卸运营
    description: |
      运营海运装卸设施。
  BC-4680.40.30:
    name: 小包船配载规划
    description: |
      规划化学品液货船上相容小包货物的配载方案。
  BC-4680.50:
    name: 管道输送协调
    description: |
      开展散装化学品管道输送的提名、排序和交接协调。
  BC-4680.50.10:
    name: 管道提名管理
    description: |
      与运营商和交易对手开展管道输送提名。
  BC-4680.50.20:
    name: 管道批次排序
    description: |
      开展带界面管理的批次排序。
  BC-4680.50.30:
    name: 管道交接协调
    description: |
      协调管道注入和交付点的交接事宜。
  BC-4680.60:
    name: 危化品仓储运营
    description: |
      在合规仓库中接收、隔离和储存危险化学品包装货物。
  BC-4680.60.10:
    name: 危化品仓库收货与上架
    description: |
      接收和上架危险包装化学品。
  BC-4680.60.20:
    name: 隔离合规管理
    description: |
      管理仓储中化学品隔离的合规工作。
  BC-4680.60.30:
    name: 桶装与 IBC 储存运营
    description: |
      开展桶装和中型散装容器（IBC）的储存运营。
  BC-4680.70:
    name: 代加工与第三方生产协调
    description: |
      协调第三方资产上的代加工，包括代加工物料对账。
  BC-4680.70.10:
    name: 代加工商选择与认证
    description: |
      选择和认证代加工合作伙伴。
  BC-4680.70.20:
    name: 代加工排程
    description: |
      在第三方资产上排程代加工活动。
  BC-4680.70.30:
    name: 代加工物料对账
    description: |
      对账代加工物料的进出数量。
  BC-4680.80:
    name: 散货交接计量
    description: |
      在交接界面开展体积、质量和采样计量。
  BC-4680.80.10:
    name: 体积与质量计量
    description: |
      在交接点开展经校准的体积和质量计量。
  BC-4680.80.20:
    name: 采样协调
    description: |
      协调交接转移点的代表性采样。
  BC-4680.80.30:
    name: 交接单证管理
    description: |
      签发和保存交接单证。

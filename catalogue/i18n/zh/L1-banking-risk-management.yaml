locale: zh
source: L1-banking-risk-management.yaml
entries:
  BC-1410:
    name: 银行风险管理
    description: |
      管理银行特有的风险类型，包括信用风险、市场风险、流动性风险、模型风险和交易对手信用风险，保障银行在风险可控的前提下稳健运营。
  BC-1410.10:
    name: 银行信用风险管理
    description: |
      管理信用风险框架、风险加权资产（RWA）和压力测试，确保银行信用风险处于可接受水平。
  BC-1410.10.10:
    name: 信用风险框架
    description: |
      制定信用风险框架和政策，明确信用风险管理的标准和规则。
  BC-1410.10.20:
    name: RWA 计算与报告
    description: |
      采用标准法和内部评级法（IRB）计算和报告风险加权资产，满足 Basel 资本监管要求。
  BC-1410.10.30:
    name: 信用压力测试
    description: |
      开展信用风险压力测试和情景分析，评估极端情况下的信用损失规模。
  BC-1410.10.40:
    name: 集中度风险管理
    description: |
      管理单一客户、行业和国家集中度风险，防止风险过度集中。
  BC-1410.20:
    name: 市场风险管理
    description: |
      管理 VaR、敏感度、市场风险限额和 FRTB 合规，控制交易账户的市场风险暴露。
  BC-1410.20.10:
    name: 市场风险计量
    description: |
      计量交易账户的 VaR、预期损失（ES）和敏感度，量化市场风险暴露。
  BC-1410.20.20:
    name: 市场风险限额管理
    description: |
      制定和监控市场风险限额，确保风险暴露在批准的限额范围内。
  BC-1410.20.30:
    name: 市场风险压力测试
    description: |
      开展市场风险压力测试和情景测试，评估不利市场条件下的潜在损失。
  BC-1410.20.40:
    name: FRTB 实施管理
    description: |
      实施和运营交易账本基本审查（FRTB）标准法（SA）和内部模型法（IMA）。
  BC-1410.30:
    name: 银行操作风险管理
    description: |
      管理操作风险框架、风险与控制自评估（RCSA）和损失事件数据，有效控制操作风险。
  BC-1410.30.10:
    name: 操作风险框架
    description: |
      制定操作风险框架、风险分类体系和操作风险政策，奠定操作风险管理基础。
  BC-1410.30.20:
    name: 风险与控制自评估
    description: |
      开展 RCSA 并更新风险状况，识别和评估关键运营风险。
  BC-1410.30.30:
    name: 操作风险损失事件采集
    description: |
      采集和分类操作风险损失事件，为风险量化和改进提供数据基础。
  BC-1410.30.40:
    name: 关键风险指标管理
    description: |
      制定关键风险指标（KRI）定义、阈值和监控机制，提前预警操作风险恶化趋势。
  BC-1410.40:
    name: 流动性风险管理
    description: |
      管理流动性风险框架、压力测试和应急资金计划，保障银行的流动性安全。
  BC-1410.40.10:
    name: 流动性风险框架
    description: |
      制定流动性风险框架、风险偏好和政策，明确流动性风险管理边界。
  BC-1410.40.20:
    name: 流动性压力测试
    description: |
      开展流动性专项压力测试和反向压力测试，评估极端情况下的流动性韧性。
  BC-1410.40.30:
    name: 应急资金计划管理
    description: |
      维护和测试应急资金计划，确保在流动性压力下的融资应急能力。
  BC-1410.50:
    name: 模型风险管理
    description: |
      管理模型验证、模型治理和模型库存，防范模型错误对决策的不利影响。
  BC-1410.50.10:
    name: 模型库存管理
    description: |
      维护全行模型库存，确保模型的全面覆盖和持续管理。
  BC-1410.50.20:
    name: 模型风险分级
    description: |
      对模型进行基于风险的分级，将有限的治理资源集中于高风险模型。
  BC-1410.50.30:
    name: 独立模型验证
    description: |
      按照 SR 11-7/TRIM 要求对模型开展独立验证，确保模型的稳健性。
  BC-1410.50.40:
    name: 模型绩效监控
    description: |
      持续监控模型绩效并进行重新校准，保持模型的预测准确性和适用性。
  BC-1410.60:
    name: 交易对手信用风险管理
    description: |
      管理交易对手信用风险（CCR）、信用估值调整（CVA）和衍生品交易对手敞口，控制衍生品业务的信用风险。
  BC-1410.60.10:
    name: 交易对手敞口计量
    description: |
      计量交易对手敞口（PFE、EEPE），量化衍生品交易的潜在信用风险。
  BC-1410.60.20:
    name: CVA 与 XVA 管理
    description: |
      管理信用估值调整（CVA）、债务估值调整（DVA）、资金估值调整（FVA）等 XVA 指标。
  BC-1410.60.30:
    name: 交易对手限额管理
    description: |
      设定和监控交易对手限额，防止对单一交易对手的信用风险集中度过高。
  BC-1410.60.40:
    name: 错向风险管理
    description: |
      识别和管理特定与一般错向风险，防范抵押品与交易对手信用质量的不利相关性。

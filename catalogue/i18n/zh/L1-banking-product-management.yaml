locale: zh
source: L1-banking-product-management.yaml
entries:
  BC-1310:
    name: 银行产品管理
    description: |
      构建银行产品工厂能力，涵盖产品目录、参数配置、定价及全生命周期管理，支持产品创新和高效上市。
  BC-1310.10:
    name: 产品目录管理
    description: |
      管理银行产品目录和产品主数据，为全行产品体系提供统一的信息来源。
  BC-1310.10.10:
    name: 产品主数据管理
    description: |
      维护产品主数据和产品层级结构，确保产品信息的标准化和一致性。
  BC-1310.10.20:
    name: 产品目录发布
    description: |
      通过各渠道和合作伙伴发布产品目录，使产品信息触达目标客群。
  BC-1310.10.30:
    name: 产品信息披露管理
    description: |
      编制和维护产品信息披露文件，满足监管要求并保障客户知情权。
  BC-1310.20:
    name: 产品参数与配置管理
    description: |
      配置产品的利率、费用、额度和资格规则等参数，精准管控产品运营规则。
  BC-1310.20.10:
    name: 产品利率配置
    description: |
      配置产品利率和利率卡，支持灵活的利率定价策略。
  BC-1310.20.20:
    name: 产品费用配置
    description: |
      配置产品费用和减免规则，实现差异化的费用管理。
  BC-1310.20.30:
    name: 产品额度配置
    description: |
      配置交易和产品额度限制，在风险可控范围内满足客户需求。
  BC-1310.20.40:
    name: 产品资格规则配置
    description: |
      配置产品资格和申请条件规则，确保产品准入的合规性。
  BC-1310.30:
    name: 银行产品定价管理
    description: |
      管理产品标准定价、促销定价和客户专属定价，提升产品竞争力。
  BC-1310.30.10:
    name: 产品标准定价
    description: |
      制定银行产品和服务的标准价格体系，满足广大客户的基本服务需求。
  BC-1310.30.20:
    name: 促销定价
    description: |
      推出促销定价活动和限时优惠，有效获取和留存目标客户。
  BC-1310.30.30:
    name: 客户专属与关系定价
    description: |
      为重要客户提供客户专属和基于关系的差异化定价，深化客户粘性。
  BC-1310.40:
    name: 产品捆绑管理
    description: |
      管理产品组合包、捆绑产品和关系定价，提升客户综合价值。
  BC-1310.40.10:
    name: 组合包定义
    description: |
      定义产品组合包、套餐方案和绑定规则，为客户提供一站式产品组合。
  BC-1310.40.20:
    name: 组合包资格管理
    description: |
      制定组合包资格规则和准入标准，确保捆绑产品的精准触达。
  BC-1310.40.30:
    name: 组合包绩效跟踪
    description: |
      跟踪组合包的销售情况和经济效益，持续优化产品组合策略。
  BC-1310.50:
    name: 银行产品全生命周期管理
    description: |
      管理产品的推出、调整和退市，确保产品组合与市场需求和监管要求保持一致。
  BC-1310.50.10:
    name: 新产品审批
    description: |
      开展新产品审批流程和产品委员会治理，确保新产品合规上市。
  BC-1310.50.20:
    name: 产品上市执行
    description: |
      执行产品上市并确认渠道就绪状态，保障产品顺利面市。
  BC-1310.50.30:
    name: 产品绩效评审
    description: |
      对产品绩效和客户价值开展定期评审，为产品迭代提供依据。
  BC-1310.50.40:
    name: 产品退市与迁移
    description: |
      执行产品退市并将客户迁移至接替产品，妥善处理产品终止运营。

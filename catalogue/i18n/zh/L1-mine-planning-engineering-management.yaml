locale: zh
source: L1-mine-planning-engineering-management.yaml
entries:
  BC-4420:
    name: 矿山规划与工程管理
    description: |
      开展战略性、长期和短期矿山规划，以及将资源量转化为可执行生产计划的矿山工程、岩土工程和水文地质工程学科。
  BC-4420.10:
    name: 矿山战略规划
    description: |
      确定矿山全生命周期开采战略、采矿方法选择、露天坑境界和资本项目排序。
    in_scope:
      - 矿山全生命周期计划及露天坑境界
      - 地下采矿方法选择
      - 资本项目排序与审批
    out_of_scope:
      - 年度预算生产计划排程（BC-4420.20）
  BC-4420.10.10:
    name: 矿山全生命周期规划
    description: |
      制定矿山全生命周期开采战略、排序和资本框架。
  BC-4420.10.20:
    name: 露天坑优化
    description: |
      依据经济和岩土工程输入，开展 Lerchs-Grossmann 及等效方法的露天坑境界优化。
  BC-4420.10.30:
    name: 地下采矿方法选择
    description: |
      根据矿体几何形态，选择块崩采矿、分段崩落或留矿采矿等地下采矿方法。
  BC-4420.10.40:
    name: 资本项目排序
    description: |
      在矿山全生命周期范围内对主要资本项目进行排序。
  BC-4420.20:
    name: 长期矿山规划
    description: |
      开展年度和多年度生产计划、矿堆战略及资本设备规划。
  BC-4420.20.10:
    name: 年度生产计划制定
    description: |
      制定年度矿山生产计划和预算。
  BC-4420.20.20:
    name: 矿堆战略规划
    description: |
      开展多年度矿堆建堆、取矿和二次搬运战略规划。
  BC-4420.20.30:
    name: 截止品位战略
    description: |
      制定矿山全生命周期内随时间变化的截止品位策略。
  BC-4420.20.40:
    name: 资本设备规划
    description: |
      开展采矿设备更新换代和新增资本设备的长期规划。
  BC-4420.30:
    name: 短期矿山规划
    description: |
      编制驱动生产执行和品位控制的季度、周度和日度矿山计划。
  BC-4420.30.10:
    name: 季度生产排程
    description: |
      编制与年度计划相对应的季度生产排程。
  BC-4420.30.20:
    name: 周度矿山计划制定
    description: |
      按台阶、采场和设备制定周度采矿计划。
  BC-4420.30.30:
    name: 日度调度规划
    description: |
      开展采矿设备作业分配的日度和班次调度规划。
  BC-4420.30.40:
    name: 品位控制规划
    description: |
      规划短期执行所需的品位控制采样和矿块路径。
  BC-4420.40:
    name: 矿山设计工程
    description: |
      开展露天坑、地下巷道、钻爆方案、运输道路和矿山通风基础设施的工程设计。
  BC-4420.40.10:
    name: 露天坑设计
    description: |
      开展露天采矿作业的台阶、坑道和露天坑境界工程设计。
  BC-4420.40.20:
    name: 地下矿山设计
    description: |
      开展地下采矿作业的巷道、斜坡道、矿井和采场工程设计。
  BC-4420.40.30:
    name: 钻爆设计
    description: |
      开展生产钻爆的钻孔布置、装药和起爆时序设计。
  BC-4420.40.40:
    name: 运输道路设计
    description: |
      开展矿山运输道路网络的几何和结构设计。
  BC-4420.40.50:
    name: 通风与配套服务设计
    description: |
      开展地下矿山通风、排水、供电和压缩空气配套服务工程设计。
  BC-4420.50:
    name: 岩土工程
    description: |
      开展露天和地下矿山边坡稳定性、支护设计和地质灾害管理的岩土工程。
  BC-4420.50.10:
    name: 边坡稳定性工程
    description: |
      开展露天采矿作业的边坡稳定性分析和坑壁设计。
  BC-4420.50.20:
    name: 地下支护设计
    description: |
      开展地下巷道锚杆、钢筋网、喷射混凝土和锚索支护的工程设计。
  BC-4420.50.30:
    name: 岩土工程监测方案制定
    description: |
      制定覆盖仪器密度、阈值和评审周期的岩土工程监测方案。
  BC-4420.50.40:
    name: 地质灾害风险评估
    description: |
      评估采矿作业中的落石、地震和地面沉降灾害风险。
  BC-4420.60:
    name: 矿山水文地质工程
    description: |
      开展涵盖地下水模型、矿山疏干设计和场地水量平衡的水文地质工程。
  BC-4420.60.10:
    name: 地下水建模
    description: |
      对矿山占地范围内的地下水行为进行数值建模。
  BC-4420.60.20:
    name: 矿山疏干设计
    description: |
      开展露天坑和地下疏干系统的工程设计。
  BC-4420.60.30:
    name: 水量平衡建模
    description: |
      开展全场地水量平衡建模，用于运营和关闭规划。

locale: zh
source: L1-defense-test-evaluation-management.yaml
entries:
  BC-1800:
    name: 国防测试与评估管理
    description: |
      覆盖研制试验与评估、作战试验与评估、靶场运营、测试计划与测试数据管理，确保系统满足使命需求。
  BC-1800.10:
    name: 研制试验与评估管理
    description: |
      统筹研制试验（DT&E）、承包商测试与鉴定测试，验证系统技术性能。
  BC-1800.10.10:
    name: 承包商测试方案
    description: |
      管理承包商主导的研制试验方案。
  BC-1800.10.20:
    name: 政府DT&E协调
    description: |
      协调政府DT&E活动的开展。
  BC-1800.10.30:
    name: 鉴定测试执行
    description: |
      按技术规范执行鉴定测试。
  BC-1800.20:
    name: 作战试验与评估管理
    description: |
      统筹作战试验（OT&E）与用户测试，评估系统作战效能与适用性。
  BC-1800.20.10:
    name: 初始作战试验与评估
    description: |
      执行IOT&E并提交评估报告。
  BC-1800.20.20:
    name: 后续作战试验
    description: |
      开展后续作战试验与评估。
  BC-1800.20.30:
    name: 作战适用性评估
    description: |
      评估系统的作战适用性与效能。
  BC-1800.30:
    name: 试验靶场运营管理
    description: |
      统筹靶场调度、靶场安全与靶场数据采集，保障测试活动安全高效实施。
  BC-1800.30.10:
    name: 靶场调度
    description: |
      统筹安排靶场使用与资产调度。
  BC-1800.30.20:
    name: 靶场安全运营
    description: |
      实施靶场安全与区域清场运营。
  BC-1800.30.30:
    name: 靶场数据采集
    description: |
      采集靶场遥测、光学与仪器数据。
  BC-1800.30.40:
    name: 靶场资产维护
    description: |
      维护靶场仪器设备与基础设施。
  BC-1800.40:
    name: 测试计划与程序管理
    description: |
      统筹测试计划、规程与测试准备评审，确保测试活动规范有序。
  BC-1800.40.10:
    name: 测试与评估总体计划
    description: |
      按项目要求维护测试与评估总体计划（TEMP）。
  BC-1800.40.20:
    name: 详细测试程序撰写
    description: |
      撰写详细测试规程与测试前卡。
  BC-1800.40.30:
    name: 测试准备评审
    description: |
      在测试执行前开展测试准备评审。
  BC-1800.50:
    name: 测试数据管理
    description: |
      统筹测试数据采集、分析与归档，支持系统性能评估与历史数据复用。
  BC-1800.50.10:
    name: 测试数据采集
    description: |
      采集遥测与仪器测试数据。
  BC-1800.50.20:
    name: 测试数据分析
    description: |
      开展测试数据规约与分析。
  BC-1800.50.30:
    name: 测试数据归档与复用
    description: |
      归档历史测试数据集并支持数据复用。
  BC-1800.50.40:
    name: 测试异常报告
    description: |
      报告并追踪测试异常与缺陷。

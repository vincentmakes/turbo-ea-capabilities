locale: zh
source: L1-advertising-sales-operations-management.yaml
entries:
  BC-3760:
    name: 广告销售与运营管理
    description: |
      涵盖跨线性、数字及联网电视界面广告业务的广告库存、直销与程序化广告销售、广告投放与决策、品牌安全与广告库存质量控制，以及收入报告。
  BC-3760.10:
    name: 广告库存管理
    description: |
      预测、分配和预定跨线性和数字界面的广告库存。
  BC-3760.10.10:
    name: 可用量预测
    description: |
      在库存预测周期内，跨库存预测可用展示次数、GRP及受众定向可用量。
  BC-3760.10.20:
    name: 库存分配
    description: |
      跨界面将广告库存分配至直销、程序化广告及内部广告池。
  BC-3760.10.30:
    name: 库存预定与保留
    description: |
      为确认交易、赞助及重磅活动预定并保留广告库存。
  BC-3760.20:
    name: 直接广告销售管理
    description: |
      通过赞助、包销及插播订单渠道直接销售广告库存。
  BC-3760.20.10:
    name: 赞助销售
    description: |
      赞助与植入交易的管道搭建及合同签署。
  BC-3760.20.20:
    name: 包销与散播销售
    description: |
      线性和数字广告库存的包销市场和散播市场销售。
  BC-3760.20.30:
    name: 插播订单与线性广告位销售
    description: |
      受理插播订单并依据可用计划进行线性广告位预订。
  BC-3760.30:
    name: 程序化广告销售管理
    description: |
      配置并运营程序化竞拍、私有市场及供给路径集成。
  BC-3760.30.10:
    name: 竞价配置
    description: |
      跨库存配置竞价底价、交易ID及竞买方资格。
  BC-3760.30.20:
    name: 私有市场交易管理
    description: |
      与买家签署并维护程序化保量和私有市场交易的全生命周期。
  BC-3760.30.30:
    name: 头部竞价与SSP集成
    description: |
      跨界面集成头部竞价合作伙伴和供给方平台。
  BC-3760.40:
    name: 广告投放与运营
    description: |
      跨线性和数字广告时段结构完成广告素材接收、广告决策与插入，以及广告位排期。
  BC-3760.40.10:
    name: 广告素材接收与质量控制
    description: |
      按技术和政策规范对广告素材进行接收和质量控制。
  BC-3760.40.20:
    name: 广告决策与插入
    description: |
      决策投放哪支广告，并通过服务器端或客户端插入线性广告时段。
  BC-3760.40.30:
    name: 广告位排期
    description: |
      构建线性广告位定位排期并优化广告时段结构。
  BC-3760.50:
    name: 品牌安全与广告库存质量管理
    description: |
      对广告库存进行品牌安全分类、检测无效流量，并为买家定向打标签。
  BC-3760.50.10:
    name: 品牌安全分类
    description: |
      依据品牌安全和适宜性框架对内容界面进行分类。
  BC-3760.50.20:
    name: 无效流量检测
    description: |
      跨自有和合作伙伴广告库存检测并排除无效流量。
  BC-3760.50.30:
    name: 适宜性标签
    description: |
      为内容界面打上适宜性和上下文属性标签，供买家定向使用。
  BC-3760.60:
    name: 广告收入报告
    description: |
      跨线性和数字销售提供广告活动投放报告、补偿核对，以及广告主账单和结算。
  BC-3760.60.10:
    name: 广告活动投放报告
    description: |
      跨界面和货币单位，提供广告活动目标的投放量和投放节奏报告。
  BC-3760.60.20:
    name: 补偿与核对
    description: |
      将实际投放展示次数与订单量核对，处理补偿和信用备忘录。
  BC-3760.60.30:
    name: 广告主账单与结算
    description: |
      向广告主和代理商开具账单，并按代理商折扣和佣金进行结算。

locale: zh
source: L1-public-benefits-entitlements-management.yaml
entries:
  BC-3230:
    name: 公共福利与权益管理
    description: |
      设计、资格认定、计算、发放、监督和追缴社会保障福利及法定权益，涵盖养老金、失业、残疾、家庭和食品救助。
  BC-3230.10:
    name: 福利项目设计与配置
    description: |
      配置法定福利项目，包括资格规则、福利计算公式和运营参数。
    in_scope:
      - 资格规则配置
      - 福利计算公式和标准设定
      - 项目参数和指数化管理
    out_of_scope:
      - 授权立法起草（由立法与法规起草管理覆盖）
  BC-3230.10.10:
    name: 资格规则配置
    description: |
      将法定资格规则转化为机器可执行形式。
  BC-3230.10.20:
    name: 福利计算公式和标准配置
    description: |
      配置福利计算公式、标准和上限。
  BC-3230.10.30:
    name: 项目参数指数化
    description: |
      依据通货膨胀或工资变化，定期对项目参数进行指数化调整。
  BC-3230.20:
    name: 资格认定
    description: |
      对申请人进行福利资格认定，包括收入调查、类别资格审查和家庭构成核实。
  BC-3230.20.10:
    name: 申请接收
    description: |
      通过数字、线下和辅助渠道接收福利申请。
  BC-3230.20.20:
    name: 经济状况调查
    description: |
      依据项目门槛对收入、资产和家庭情况进行调查。
  BC-3230.20.30:
    name: 类别资格核实
    description: |
      核实年龄、残疾或家庭状况等类别资格。
  BC-3230.20.40:
    name: 资格决定与通知
    description: |
      记录资格决定并向申请人发出资格结果通知。
  BC-3230.30:
    name: 福利计算与发放
    description: |
      计算发放金额、评估缴费记录并签发福利发放凭证。
  BC-3230.30.10:
    name: 缴费记录评估
    description: |
      评估缴费型福利（如养老金和失业）的缴费记录。
  BC-3230.30.20:
    name: 发放金额计算
    description: |
      计算含附加补贴、扣除和递减的发放金额。
  BC-3230.30.30:
    name: 发放凭证签发
    description: |
      签发并记录福利发放凭证和告知函。
  BC-3230.40:
    name: 福利发放运营
    description: |
      通过各支付渠道定期发放福利款项，并与发放凭证核对。
  BC-3230.40.10:
    name: 支付计划管理
    description: |
      维护支付计划、频率和运行日历。
  BC-3230.40.20:
    name: 支付执行
    description: |
      通过银行、预付卡、支票和实物渠道执行支付批次。
  BC-3230.40.30:
    name: 支付核对
    description: |
      核对发放款项与发放凭证及银行确认记录。
  BC-3230.40.40:
    name: 实物福利发放
    description: |
      发放实物福利，如食品救助凭证和电子福利转账。
  BC-3230.50:
    name: 受益人监控与持续资格
    description: |
      持续监控受益人情况并定期重新确定持续资格。
  BC-3230.50.10:
    name: 情况变更采集
    description: |
      采集和处理受益人自报及系统检测到的情况变更。
  BC-3230.50.20:
    name: 定期重新认定
    description: |
      定期重新认定资格和发放级别。
  BC-3230.50.30:
    name: 附条件与合规监控
    description: |
      监控受益人是否符合求职或培训等附加条件要求。
  BC-3230.60:
    name: 多付款与追缴管理
    description: |
      发现、计算和追缴福利多付款和不合规付款。
  BC-3230.60.10:
    name: 多付款发现
    description: |
      通过核对、数据比对和审查发现多付款情况。
  BC-3230.60.20:
    name: 追缴计划设置
    description: |
      制定追缴计划，包括分期还款、扣款和核销安排。
  BC-3230.60.30:
    name: 债务催收运营
    description: |
      通过扣款、民事诉讼和抵销追缴可追回债务。
  BC-3230.70:
    name: 福利欺诈调查
    description: |
      发现、调查和处置福利欺诈案件。
  BC-3230.70.10:
    name: 欺诈风险检测
    description: |
      通过数据分析和情报开展基于风险的欺诈嫌疑检测。
  BC-3230.70.20:
    name: 欺诈案件调查
    description: |
      开展欺诈嫌疑案件调查，包括证据收集和问询。
  BC-3230.70.30:
    name: 欺诈处罚与移送
    description: |
      对确认的欺诈行为进行处罚，并在适用情况下移送起诉。

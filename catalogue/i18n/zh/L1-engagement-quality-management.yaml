locale: zh
source: L1-engagement-quality-management.yaml
entries:
  BC-4340:
    name: 接洽质量管理
    description: |
      管理事务所级质量管理体系、接洽质量审查、档案审查、技术咨询、监控及跨专业服务接洽的外部执业检查应对。
  BC-4340.10:
    name: 事务所质量管理体系
    description: |
      设计、实施并运营与ISQM 1及同等制度对齐的事务所级质量管理体系（QMS）。
  BC-4340.10.10:
    name: 质量风险评估
    description: |
      识别和评估覆盖事务所接洽和运营的质量风险。
  BC-4340.10.20:
    name: 质量应对设计
    description: |
      设计回应已识别质量风险的政策和程序。
  BC-4340.10.30:
    name: 质量治理与问责制
    description: |
      将质量管理体系（QMS）的问责制分配给管理合伙人、质量领导层和接洽合伙人。
  BC-4340.10.40:
    name: 质量管理体系年度评估
    description: |
      对事务所质量管理体系的运行有效性进行年度评估。
  BC-4340.20:
    name: 接洽质量审查
    description: |
      由未参与该接洽的审查人员对符合风险或监管触发条件的接洽进行独立接洽质量审查（EQR），在报告发布前执行。
  BC-4340.20.10:
    name: EQR资格与触发评估
    description: |
      依据监管、风险或事务所政策触发条件识别需要EQR的接洽。
  BC-4340.20.20:
    name: 接洽质量审查员分配
    description: |
      为已触发的接洽分配具备资质且独立的接洽质量审查员（EQ Reviewer）。
  BC-4340.20.30:
    name: EQR执行与签字
    description: |
      执行EQR程序，并作为交付物发布的前提条件完成签字。
  BC-4340.30:
    name: 接洽档案审查
    description: |
      对已完成接洽档案样本开展发布后热审和冷审，评估是否符合事务所方法论和执业标准。
  BC-4340.30.10:
    name: 热审
    description: |
      在发布前对选定接洽进行文件预审，以加强合规保证。
  BC-4340.30.20:
    name: 冷审
    description: |
      按抽样对已发布档案进行事后回顾性审查，评估方法论合规性和质量。
  BC-4340.30.30:
    name: 档案审查发现处置
    description: |
      处置档案审查发现，包括整改措施、培训影响及对接洽合伙人的反馈。
  BC-4340.40:
    name: 技术咨询管理
    description: |
      就复杂接洽事项与全国办公室、技术或专业职能部门开展强制性和选择性技术咨询。
  BC-4340.40.10:
    name: 强制性技术咨询
    description: |
      按事务所政策就特定复杂情形（如持续经营、舞弊风险或新型事项）开展所需咨询。
  BC-4340.40.20:
    name: 选择性技术咨询
    description: |
      由接洽团队就复杂技术问题自行决定是否咨询。
  BC-4340.40.30:
    name: 技术咨询记录
    description: |
      在接洽档案中记录咨询请求、所给建议及达成的结论。
  BC-4340.50:
    name: 质量监控与整改
    description: |
      开展持续监控活动，对质量缺陷进行根因分析，并推进整改项目。
  BC-4340.50.10:
    name: 质量指标监控
    description: |
      监控跨接洽组合的领先和滞后质量指标。
  BC-4340.50.20:
    name: 缺陷根因分析
    description: |
      对已识别的质量缺陷和系统性发现进行根因分析。
  BC-4340.50.30:
    name: 整改行动管理
    description: |
      定义、执行并验证源于监控和检查的整改行动。
  BC-4340.60:
    name: 执业检查应对管理
    description: |
      协调对PCAOB、FRC、IAASA、ICAEW及同等制度等监管机构和监督机构开展的外部执业检查的应对工作。
  BC-4340.60.10:
    name: 检查档案选取协调
    description: |
      协调检查机构的档案选取和信息请求。
  BC-4340.60.20:
    name: 检查发现应对
    description: |
      起草并提交对检查发现及要求整改计划的正式回应。
  BC-4340.60.30:
    name: 检查结果沟通
    description: |
      在需要时进行检查结果的内部和外部沟通。

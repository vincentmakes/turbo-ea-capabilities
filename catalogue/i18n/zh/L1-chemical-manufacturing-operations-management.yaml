locale: zh
source: L1-chemical-manufacturing-operations-management.yaml
entries:
  BC-4620:
    name: 化工生产运营管理
    description: |
      开展反应、分离、聚合和无机工艺装置的日常运营，包括催化剂监测、生产排程和大修协调。
  BC-4620.10:
    name: 反应单元操作
    description: |
      操作连续、间歇、催化和电化学反应器系统。
  BC-4620.10.10:
    name: 连续反应器运营
    description: |
      操作连续搅拌釜式和推流反应器。
  BC-4620.10.20:
    name: 间歇反应器运营
    description: |
      按批准配方操作间歇和半间歇反应器。
  BC-4620.10.30:
    name: 催化反应器运营
    description: |
      操作固定床和流化床催化反应器。
  BC-4620.10.40:
    name: 光化学与电化学反应器运营
    description: |
      操作光化学、电化学和等离子体反应器。
  BC-4620.20:
    name: 分离单元操作
    description: |
      操作蒸馏、结晶、过滤、干燥和膜分离单元。
  BC-4620.20.10:
    name: 蒸馏运营
    description: |
      操作板式和填料蒸馏塔。
  BC-4620.20.20:
    name: 结晶运营
    description: |
      操作冷却、蒸发和反应结晶器。
  BC-4620.20.30:
    name: 过滤与固液分离
    description: |
      操作离心机、压滤机和旋转真空过滤机。
  BC-4620.20.40:
    name: 干燥运营
    description: |
      操作流化床、喷雾和接触式干燥机。
  BC-4620.20.50:
    name: 膜分离运营
    description: |
      操作反渗透、超滤和渗透汽化膜装置。
  BC-4620.30:
    name: 聚合运营
    description: |
      操作本体、溶液、悬浮和乳液聚合及下游聚合物配混。
  BC-4620.30.10:
    name: 本体聚合运营
    description: |
      操作本体和质量聚合反应器。
  BC-4620.30.20:
    name: 溶液聚合运营
    description: |
      操作溶液聚合工艺。
  BC-4620.30.30:
    name: 悬浮与乳液聚合
    description: |
      操作悬浮和乳液聚合反应器。
  BC-4620.30.40:
    name: 聚合物配混运营
    description: |
      通过熔融混炼对聚合物与助剂进行配混。
  BC-4620.40:
    name: 无机与电化学运营
    description: |
      操作氯碱、电解、煅烧及其他无机合成工艺。
  BC-4620.40.10:
    name: 氯碱电解槽运营
    description: |
      操作无汞离子交换膜和隔膜氯碱电解槽。
  BC-4620.40.20:
    name: 电解运营
    description: |
      操作金属和气体电解槽。
  BC-4620.40.30:
    name: 煅烧与焙烧运营
    description: |
      操作回转窑、流化床焙烧炉和煅烧炉。
  BC-4620.40.40:
    name: 无机合成运营
    description: |
      操作包括沉淀和溶出在内的无机合成单元。
  BC-4620.50:
    name: 催化剂与过程化学品全生命周期管理
    description: |
      开展过程催化剂和化学品的选型、监测、再生和库存管理。
  BC-4620.50.10:
    name: 催化剂选型与装填
    description: |
      选择和装填固定床和流化床催化剂。
  BC-4620.50.20:
    name: 催化剂性能监测
    description: |
      对在役催化剂的活性和选择性进行监测。
  BC-4620.50.30:
    name: 催化剂再生协调
    description: |
      协调原位和异位催化剂再生活动。
  BC-4620.50.40:
    name: 过程化学品库存管理
    description: |
      管理溶剂、助剂和过程化学品的库存和消耗。
  BC-4620.60:
    name: 过程控制与运营执行
    description: |
      从现场和中央控制室执行日常运营，包括操作区间监测。
  BC-4620.60.10:
    name: 操作人员巡检执行
    description: |
      执行结构化操作人员巡检和现场检查。
  BC-4620.60.20:
    name: DCS 操控台操作
    description: |
      开展操控台操作，包括报警响应和监督控制。
  BC-4620.60.30:
    name: 交接班管理
    description: |
      开展结构化交接班和运营日志审查。
  BC-4620.60.40:
    name: 操作区间监测
    description: |
      对安全和质量操作区间进行实时监测。
  BC-4620.70:
    name: 装置大修协调
    description: |
      协调化工装置大修和主要停工的范围、进度和执行。
  BC-4620.70.10:
    name: 大修范围管理
    description: |
      界定和冻结大修范围，包括挑战审查过程。
  BC-4620.70.20:
    name: 大修进度管理
    description: |
      开展详细大修排程和进度控制。
  BC-4620.70.30:
    name: 停工与重启协调
    description: |
      协调各单元有序停工、清洗和重启工作。
  BC-4620.80:
    name: 化工生产排程
    description: |
      开展活动期模式和连续模式生产排程及换品种规划。
  BC-4620.80.10:
    name: 活动期规划
    description: |
      规划共用资产上的多产品活动期。
  BC-4620.80.20:
    name: 生产排序
    description: |
      对产品进行排序，以减少切换和收率损失。
  BC-4620.80.30:
    name: 换品种排程
    description: |
      排程和协调牌号和产品换品种工作。

locale: zh
source: L1-health-information-management.yaml
entries:
  BC-2900:
    name: 健康信息管理
    description: |
      管理医疗机构的患者主索引、编码运营、信息发布、健康档案生命周期、临床注册系统提交和医疗互联互通运营。
  BC-2900.10:
    name: 患者主索引管理
    description: |
      管理患者主索引，解决重复和覆盖记录问题。
  BC-2900.10.10:
    name: 患者主索引维护
    description: |
      日常维护企业患者主索引。
  BC-2900.10.20:
    name: 重复记录处理
    description: |
      识别并处理重复和覆盖的患者记录。
  BC-2900.10.30:
    name: 患者匹配算法
    description: |
      配置和调优患者匹配算法。
  BC-2900.10.40:
    name: 身份交叉引用
    description: |
      跨附属机构和交换机构建立患者身份交叉引用。
  BC-2900.20:
    name: 编码运营
    description: |
      开展住院和门诊就诊的生产性编码运营，包括审计和积压管理。
  BC-2900.20.10:
    name: 住院编码生产
    description: |
      开展生产侧住院编码工作流和分配。
  BC-2900.20.20:
    name: 门诊编码生产
    description: |
      开展生产侧门诊和日间诊疗编码工作流。
  BC-2900.20.30:
    name: 编码积压管理
    description: |
      管理已出院未最终计费和编码积压工作。
  BC-2900.20.40:
    name: 编码人员审计
    description: |
      对编码人员准确性进行内部审计并反馈。
  BC-2900.30:
    name: 信息发布
    description: |
      接收、验证并履行受保护健康信息的查阅申请。
  BC-2900.30.10:
    name: 信息申请受理
    description: |
      受理患者、支付方、法律和医务人员的健康信息申请。
  BC-2900.30.20:
    name: 授权验证
    description: |
      根据隐私法规验证授权和允许的信息披露。
  BC-2900.30.30:
    name: 披露追踪
    description: |
      追踪受保护健康信息的披露情况，用于记录留存。
  BC-2900.30.40:
    name: 传票与法律申请
    description: |
      处理传票、法院命令和法律档案申请。
  BC-2900.40:
    name: 健康档案生命周期
    description: |
      管理健康档案从创建到留存和销毁的全生命周期。
  BC-2900.40.10:
    name: 就诊关闭
    description: |
      核实和追踪就诊关闭的前置条件。
  BC-2900.40.20:
    name: 病历补全追踪
    description: |
      追踪逾期未完成的病历补全和医务人员跟进。
  BC-2900.40.30:
    name: 档案留存排期
    description: |
      按监管要求制定医疗档案留存排期。
  BC-2900.40.40:
    name: 档案销毁
    description: |
      在留存期届满后授权销毁医疗档案。
  BC-2900.50:
    name: 临床注册系统与提交
    description: |
      向疾病、肿瘤、创伤和质量注册系统提交数据。
  BC-2900.50.10:
    name: 疾病注册系统提交
    description: |
      向公共卫生和疾病注册系统提交数据。
  BC-2900.50.20:
    name: 肿瘤注册运营
    description: |
      开展肿瘤注册摘录和提交运营。
  BC-2900.50.30:
    name: 创伤注册运营
    description: |
      开展创伤注册摘录和提交运营。
  BC-2900.50.40:
    name: 质量注册系统提交
    description: |
      向支持临床研究和标杆对比的专科质量注册系统提交数据。
  BC-2900.60:
    name: 医疗互联互通运营
    description: |
      运营健康信息交换连接、FHIR端点、患者发起的数据共享和医务人员目录。
  BC-2900.60.10:
    name: 健康信息交换运营
    description: |
      运营入向和出向健康信息交换连接。
  BC-2900.60.20:
    name: FHIR端点管理
    description: |
      管理供应用程序和合作伙伴集成的FHIR端点。
  BC-2900.60.30:
    name: 患者发起的数据共享
    description: |
      支持患者将健康信息主动共享至第三方应用程序。
  BC-2900.60.40:
    name: 医务人员目录维护
    description: |
      维护供内外部消费方使用的医务人员目录数据。

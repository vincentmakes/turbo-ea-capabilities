locale: zh
source: L1-cruise-voyage-operations-management.yaml
entries:
  BC-4090:
    name: 游轮航次运营管理
    description: |
      依据国际海事安全法规，运营游轮航次，包括行程规划、港口与岸上观光运营、船舱及宾客项目运营、航海与驾驶台运营、上下船及船上健康与卫生管理。
    in_scope:
      - 航次行程设计与部署
      - 港口停靠、小艇接驳及岸上观光销售与交付
      - 船舱、项目及宾客服务运营
      - 航海、驾驶台及机舱运营
      - 上下船运营
      - 船上健康与卫生运营
    out_of_scope:
      - 游轮销售与分销（BC-4010、BC-4020）
      - 物业型酒店运营（BC-4060）
  BC-4090.10:
    name: 航次行程规划
    description: |
      规划航次行程、部署、重新定位及行程替换决策。
  BC-4090.10.10:
    name: 行程设计与部署
    description: |
      设计游轮行程并将船舶分配至各季度的部署区域。
  BC-4090.10.20:
    name: 重新定位与包船航次规划
    description: |
      规划季节间的重新定位航次和包船部署。
  BC-4090.10.30:
    name: 港口顺序编排
    description: |
      依据潮汐、过站时间及合作伙伴协议编排行程内的港口顺序。
  BC-4090.10.40:
    name: 行程变更与替换
    description: |
      因天气、医疗或地缘政治事件进行行程的实时变更和替换。
  BC-4090.20:
    name: 港口与岸上观光运营
    description: |
      运营港口停靠，包括过站、小艇接驳及岸上观光目录、销售和交付。
  BC-4090.20.10:
    name: 港口过站运营
    description: |
      协调港口过站运营，包括补给、废物处理及换班。
  BC-4090.20.20:
    name: 小艇接驳运营
    description: |
      运营锚地港口的小艇接驳服务。
  BC-4090.20.30:
    name: 岸上观光目录与销售
    description: |
      通过邮轮前和船上渠道向宾客提供岸上观光目录和销售服务。
  BC-4090.20.40:
    name: 岸上观光交付协调
    description: |
      协调岸上观光交付，包括与本地运营商交接及宾客对账。
  BC-4090.30:
    name: 船舱与客舱运营
    description: |
      运营船舱和客舱，包括清洁周转、分配、航程中途升舱及高端套房服务。
  BC-4090.30.10:
    name: 客舱清洁周转运营
    description: |
      在上船日和宾客换房日运营客舱清洁周转。
  BC-4090.30.20:
    name: 舱位分配与升舱
    description: |
      在航次前和航次中执行舱位分配和升舱决策。
  BC-4090.30.30:
    name: 船舱维护运营
    description: |
      在航次期间维护舱室系统和内部装饰。
  BC-4090.30.40:
    name: 高端套房服务运营
    description: |
      为高端套房及管家服务舱室提供专项服务运营。
  BC-4090.40:
    name: 船上宾客项目运营
    description: |
      运营航次期间的船上娱乐、活动、儿童俱乐部及特色场所。
  BC-4090.40.10:
    name: 娱乐项目运营
    description: |
      运营剧院、休息室及头牌演出等船上娱乐项目。
  BC-4090.40.20:
    name: 活动与文化丰富项目运营
    description: |
      运营活动和文化丰富项目，包括讲座、课程及体育运动。
  BC-4090.40.30:
    name: 儿童与青少年项目运营
    description: |
      运营儿童和青少年项目，包括适龄活动和督导管理。
  BC-4090.40.40:
    name: 特色场所预订
    description: |
      受理船上特色餐厅、水疗及付费活动的预订。
  BC-4090.50:
    name: 航海与驾驶台运营
    description: |
      运营航海与驾驶台，涵盖导航、推进、港口文件及补给协调。
  BC-4090.50.10:
    name: 驾驶台与导航运营
    description: |
      在航次期间执行驾驶台值班和导航操作。
  BC-4090.50.20:
    name: 机舱与推进运营
    description: |
      执行机舱值班和推进系统运营。
  BC-4090.50.30:
    name: 港口文件与报关
    description: |
      准备港口文件并管理港口国及海关报关手续。
  BC-4090.50.40:
    name: 加注燃料与补给协调
    description: |
      在港口停靠时协调加注燃料和补给。
  BC-4090.60:
    name: 船上登船与下船管理
    description: |
      运营上船和下船，包括登船前证件核验、海关清关及船上行李流转。
  BC-4090.60.10:
    name: 登船前证件核验
    description: |
      在登船前核验宾客旅行证件和健康证明。
  BC-4090.60.20:
    name: 上船流程运营
    description: |
      按分批抵达窗口运营从码头到船舶的上船流程。
  BC-4090.60.30:
    name: 下船与海关清关
    description: |
      运营下船流程，包括在港口完成海关和移民清关。
  BC-4090.60.40:
    name: 船上行李运营
    description: |
      运营上船、舱内配送及下船全流程的行李转运。
  BC-4090.70:
    name: 游轮健康与卫生运营
    description: |
      运营船上健康与卫生，包括检查就绪状态、疫情侦测与应对及水和泳池卫生管理。
  BC-4090.70.10:
    name: 卫生检查就绪状态
    description: |
      保持对VSP、USPH及同等制度的检查就绪状态。
  BC-4090.70.20:
    name: 船上疫情侦测
    description: |
      通过船上监测侦测胃肠道和呼吸道疫情。
  BC-4090.70.30:
    name: 疫情应对运营
    description: |
      在疫情期间开展包括隔离和报告在内的应对运营。
  BC-4090.70.40:
    name: 饮用水与泳池卫生
    description: |
      开展船上饮用水和休闲水系统的卫生管理运营。

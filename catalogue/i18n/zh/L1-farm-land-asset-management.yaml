locale: zh
source: L1-farm-land-asset-management.yaml
entries:
  BC-3540:
    name: 农地资产管理
    description: |
      土地权属和租赁记录、地块与田区管理、农场设备与农机遥测、灌溉基础设施、农场建筑及农场能源资产管理。
  BC-3540.10:
    name: 土地权属与租赁管理
    description: |
      支持农场组合运营权利的土地所有权、权属、租赁及地役权记录。
    in_scope:
      - 所有权与权属记录
      - 租赁协议管理
      - 地役权与通行权记录
    out_of_scope:
      - 企业不动产（BC-1410）
  BC-3540.10.10:
    name: 土地所有权与权属记录
    description: |
      记录农场组合内的完全产权、租赁产权和习惯权属。
  BC-3540.10.20:
    name: 租赁协议管理
    description: |
      管理农场租赁协议及续签。
  BC-3540.10.30:
    name: 土地地役权管理
    description: |
      管理通行地役权、道路通行权及保护地役权。
  BC-3540.20:
    name: 地块与田区管理
    description: |
      地块边界记录、地块历史及地块和田区级生产力分区。
  BC-3540.20.10:
    name: 地块边界记录
    description: |
      在农场GIS系统中采集和维护地块边界。
  BC-3540.20.20:
    name: 地块历史记录
    description: |
      记录作物、投入和产量的多年期地块历史。
  BC-3540.20.30:
    name: 地块生产力分区
    description: |
      地块内生产力分区和管理区划定。
  BC-3540.30:
    name: 农场设备管理
    description: |
      农场设备台账、农机运营、ISOBUS遥测及设备共享安排。
  BC-3540.30.10:
    name: 农场设备台账
    description: |
      记录拖拉机、农具及自走式设备台账。
  BC-3540.30.20:
    name: 田间农机运营
    description: |
      日常田间农机调度和操作人员分配。
  BC-3540.30.30:
    name: ISOBUS遥测集成
    description: |
      将ISOBUS兼容农机遥测与农场管理系统集成。
  BC-3540.30.40:
    name: 设备共享与作业承包
    description: |
      设备共享、外包和定制作业安排。
  BC-3540.40:
    name: 灌溉基础设施管理
    description: |
      灌溉系统、用水配额及灌溉基础设施维护的全生命周期管理。
  BC-3540.40.10:
    name: 灌溉系统设计
    description: |
      农场灌溉系统的设计与容量规划。
  BC-3540.40.20:
    name: 用水配额合规
    description: |
      地表水和地下水配额及计量合规管理。
  BC-3540.40.30:
    name: 灌溉基础设施维护
    description: |
      维护水泵、主管、支管和滴头。
  BC-3540.50:
    name: 农场建筑与堆场管理
    description: |
      农场仓储建筑、畜禽舍、堆场及道路的运营与维护。
  BC-3540.50.10:
    name: 仓储建筑运营
    description: |
      运营粮食、干草和农化品仓储建筑。
  BC-3540.50.20:
    name: 畜禽舍运营
    description: |
      畜禽舍运营和垫料管理。
  BC-3540.50.30:
    name: 堆场与道路维护
    description: |
      维护农场堆场、道路及牲畜处理设施。
  BC-3540.60:
    name: 农场能源管理
    description: |
      农场能源发电、燃料与能源采购协调及能源使用记录。
  BC-3540.60.10:
    name: 农场能源发电
    description: |
      农场太阳能、风能和沼气发电。
  BC-3540.60.20:
    name: 燃料与能源采购协调
    description: |
      协调农场燃油、电力和天然气采购。
  BC-3540.60.30:
    name: 能源使用记录
    description: |
      按活动和资产记录农场能源使用情况。

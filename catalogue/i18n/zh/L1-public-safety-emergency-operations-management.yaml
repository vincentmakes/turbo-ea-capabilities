locale: zh
source: L1-public-safety-emergency-operations-management.yaml
entries:
  BC-3310:
    name: 公共安全与应急运营管理
    description: |
      公共安全和应急运营，涵盖应急通信与调度、警察、消防、紧急医疗服务现场响应、符合NIMS标准的事故指挥、灾害防备与恢复、公共安全调查及互助协调。
  BC-3310.10:
    name: 应急通信与调度
    description: |
      接收应急呼叫、开展计算机辅助调度，并为警察、消防和急救人员提供现场通信。
    in_scope:
      - 911/112/999电话接听
      - 计算机辅助调度
      - 公共安全无线电通信
    out_of_scope:
      - 电信普遍服务义务制度（由电信监管合规管理覆盖）
  BC-3310.10.10:
    name: 应急呼叫接听
    description: |
      接收和分诊应急电话和短信报警。
  BC-3310.10.20:
    name: 计算机辅助调度
    description: |
      基于CAD系统将警察、消防和急救单位调度至事件现场。
  BC-3310.10.30:
    name: 公共安全无线电运营
    description: |
      运营公共安全陆地移动无线电和相当于FirstNet的宽带系统。
  BC-3310.10.40:
    name: 公共预警发布
    description: |
      通过WEA、小区广播、紧急广播系统、警报器和其他渠道发布公共预警。
  BC-3310.20:
    name: 现场响应运营
    description: |
      警察、消防和急救第一响应人员的日常现场运营。
  BC-3310.20.10:
    name: 执法巡逻
    description: |
      开展常规和主动执法巡逻及响应。
  BC-3310.20.20:
    name: 灭火与救援
    description: |
      开展灭火、救援和危险品响应作业。
  BC-3310.20.30:
    name: 紧急医疗服务响应
    description: |
      开展院前紧急医疗评估、治疗和转运。
  BC-3310.20.40:
    name: 特种战术响应
    description: |
      开展特种战术、拆弹和危险品响应作业。
  BC-3310.30:
    name: 事故指挥与协调
    description: |
      依据NIMS/ICS标准开展事故指挥、多机构协调及应急运营中心运营。
  BC-3310.30.10:
    name: 事故指挥建立
    description: |
      建立事故指挥体系、统一指挥体系和ICS架构。
  BC-3310.30.20:
    name: 多机构协调
    description: |
      在事件处置期间协调各响应机构和管辖区。
  BC-3310.30.30:
    name: 应急运营中心运营
    description: |
      在紧急情况下运营地方、州和国家各级应急运营中心（EOC）。
  BC-3310.30.40:
    name: 共同作战图维护
    description: |
      跨机构维护共享的共同作战图。
  BC-3310.40:
    name: 灾害防备与减灾
    description: |
      依据仙台框架，开展危险分析、规划、演习、培训和减灾活动，做好灾害防备。
  BC-3310.40.10:
    name: 危险与风险分析
    description: |
      识别和评估自然和人为危险及风险。
  BC-3310.40.20:
    name: 应急规划
    description: |
      编制应急运营计划、危险专项计划和持续运营安排。
  BC-3310.40.30:
    name: 演练与培训
    description: |
      开展桌面推演、功能演练和全规模演习以及响应人员培训项目。
  BC-3310.40.40:
    name: 减灾项目管理
    description: |
      管理工程性和非工程性灾害减灾项目。
  BC-3310.50:
    name: 灾害响应与恢复
    description: |
      开展灾害宣布、响应作业、个人和公共救助及长期恢复协调。
  BC-3310.50.10:
    name: 灾害宣布与启动
    description: |
      宣布紧急状态并启动响应授权。
  BC-3310.50.20:
    name: 个人救助管理
    description: |
      向受灾个人和家庭管理灾害救助。
  BC-3310.50.30:
    name: 公共救助管理
    description: |
      管理用于清理废墟、基础设施和应急工程的公共救助补贴。
  BC-3310.50.40:
    name: 长期恢复协调
    description: |
      协调长期恢复和韧性重建活动。
  BC-3310.60:
    name: 公共安全调查
    description: |
      开展刑事和公共安全调查，包括证据管理、情报和案件准备。
  BC-3310.60.10:
    name: 犯罪现场勘查
    description: |
      开展犯罪现场勘查和法证物证采集。
  BC-3310.60.20:
    name: 调查案件管理
    description: |
      开展调查案件管理、嫌疑人跟踪和起诉案件准备。
  BC-3310.60.30:
    name: 警察情报运营
    description: |
      依据情报主导警务，采集、分析和传播警察情报。
  BC-3310.60.40:
    name: 证据与财物管理
    description: |
      管理扣押证据和财物的保管、监管链和处置。
  BC-3310.70:
    name: 应急资源与互助管理
    description: |
      开展跨管辖区的应急资源分类、部署和互助协议管理。
  BC-3310.70.10:
    name: 资源分类与清点
    description: |
      依据NIMS标准对应急资源进行分类和清点。
  BC-3310.70.20:
    name: 互助协议管理
    description: |
      管理管辖区内和跨管辖区互助协议。
  BC-3310.70.30:
    name: 资源部署与撤收
    description: |
      将应急资源部署到事件现场，并开展跟踪和撤收管理。

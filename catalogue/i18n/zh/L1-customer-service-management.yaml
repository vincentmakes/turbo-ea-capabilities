locale: zh
source: L1-customer-service-management.yaml
entries:
  BC-430:
    name: 客户服务管理
    description: |
      管理客户询问、投诉、支持及联络中心运营。
  BC-430.10:
    name: 客户咨询管理
    description: |
      管理入站联系、路由及问题解决。
  BC-430.10.10:
    name: 咨询受理与路由
    description: |
      通过多渠道受理、分类并路由客户咨询。
  BC-430.10.20:
    name: 案件管理
    description: |
      管理案件创建、责任归属及解决跟踪。
  BC-430.10.30:
    name: 服务请求履行
    description: |
      履行标准服务请求及账户变更事项。
  BC-430.10.40:
    name: 升级管理
    description: |
      管理升级路径、严重程度规则及已升级案件处理。
  BC-430.20:
    name: 投诉与问题管理
    description: |
      管理投诉受理、根本原因分析及解决。
  BC-430.20.10:
    name: 投诉受理与确认
    description: |
      受理、确认并分类处理客户投诉。
  BC-430.20.20:
    name: 投诉调查与解决
    description: |
      调查、补救并解决客户投诉。
  BC-430.20.30:
    name: 根本原因分析
    description: |
      对投诉开展根本原因分析并识别趋势。
  BC-430.20.40:
    name: 监管投诉报告
    description: |
      向监管机构报告投诉情况并处理申诉机构案件。
  BC-430.30:
    name: 联络中心运营管理
    description: |
      管理联络中心日常运营、劳动力管理及电话系统。
  BC-430.30.10:
    name: 联络中心劳动力管理
    description: |
      开展联络中心需求预测、排班及执行情况管理。
  BC-430.30.20:
    name: 联系路由与 IVR
    description: |
      设计 IVR、技能路由及渠道编排。
  BC-430.30.30:
    name: 质量监控与辅导
    description: |
      开展通话质量监控、评分及客服人员辅导。
  BC-430.30.40:
    name: 联络中心绩效报告
    description: |
      报告服务水平、平均处理时间、首次解决率及运营绩效。
  BC-430.40:
    name: 自助服务管理
    description: |
      管理常见问题、知识库、聊天机器人及自助门户。
  BC-430.40.10:
    name: 知识库管理
    description: |
      编写并维护面向客户的知识内容。
  BC-430.40.20:
    name: 自助门户管理
    description: |
      管理客户自助服务门户及账户自助功能。
  BC-430.40.30:
    name: 对话式 AI 管理
    description: |
      设计、训练并运营聊天机器人及语音机器人。
  BC-430.40.40:
    name: 社区支持管理
    description: |
      管理用户社区内容及点对点支持。
  BC-430.50:
    name: 客户反馈管理
    description: |
      管理调查、NPS 及客户心声项目。
  BC-430.50.10:
    name: 客户心声项目
    description: |
      在各触点构建系统化的客户心声项目。
  BC-430.50.20:
    name: 客户调查管理
    description: |
      设计、分发并分析 NPS、CSAT 及 CES 调查。
  BC-430.50.30:
    name: 闭环反馈
    description: |
      对贬低者反馈开展闭环跟进及挽回行动。
  BC-430.50.40:
    name: 客户洞察报告
    description: |
      向产品、运营及管理层报告客户洞察。

locale: zh
source: L1-software-release-deployment-management.yaml
entries:
  BC-4210:
    name: 软件发布与部署管理
    description: |
      管理SaaS产品向生产环境的持续集成（CI/CD）、环境管理、发布工程、功能标志及渐进式部署。
  BC-4210.10:
    name: 持续集成管理
    description: |
      管理构建流水线、制品生产及流水线策略执行，使集成产品持续处于可构建状态。
  BC-4210.10.10:
    name: 构建流水线管理
    description: |
      定义和运营产品组件的自动化构建流水线。
  BC-4210.10.20:
    name: 制品仓库管理
    description: |
      管理构建制品和依赖包的存储、保留及访问控制。
  BC-4210.10.30:
    name: 流水线策略执行
    description: |
      在流水线上执行必要的质量、安全及来源验证门控。
  BC-4210.20:
    name: 环境管理
    description: |
      为开发、集成及预生产验证提供和管理非生产环境。
  BC-4210.20.10:
    name: 环境供给
    description: |
      按工程和验证需求供给非生产环境。
  BC-4210.20.20:
    name: 环境配置
    description: |
      在需要时将非生产环境配置为与生产保持一致。
  BC-4210.20.30:
    name: 环境数据管理
    description: |
      在非生产环境中提供、脱敏和刷新数据。
  BC-4210.30:
    name: 发布工程管理
    description: |
      管理软件发布的节奏、版本控制、分支及发布说明规范。
  BC-4210.30.10:
    name: 发布节奏管理
    description: |
      定义和管理各产品领域的发布节奏。
  BC-4210.30.20:
    name: 版本控制与分支管理
    description: |
      制定并应用产品发布的版本控制方案和分支策略。
  BC-4210.30.30:
    name: 发布说明编写
    description: |
      为每次发布编写面向客户和运营者的发布说明。
  BC-4210.40:
    name: 部署编排
    description: |
      制定安全且受控的软件变更生产部署策略，控制影响范围。
  BC-4210.40.10:
    name: 渐进式发布
    description: |
      向不断扩大的租户或用户群体逐步发布版本。
  BC-4210.40.20:
    name: 金丝雀部署
    description: |
      向小规模金丝雀群体部署版本，并自动评估健康状态。
  BC-4210.40.30:
    name: 蓝绿部署
    description: |
      采用并行环境部署与流量切换方式，实现接近零停机时间的变更。
  BC-4210.40.40:
    name: 回滚协调
    description: |
      在出现不良信号时协调版本回滚操作。
  BC-4210.50:
    name: 功能标志管理
    description: |
      管理功能标志（Feature Flag）的生命周期和运行时管控，解耦部署与发布，并将功能定向推送至特定群体。
    in_scope:
      - 功能标志的创建、退役及审计
      - 定向规则
    out_of_scope:
      - 实验方法论和裁决（由产品遥测与实验管理负责）
  BC-4210.50.10:
    name: 功能标志生命周期
    description: |
      管理功能标志从创建到退役的完整生命周期。
  BC-4210.50.20:
    name: 定向规则管理
    description: |
      定义决定哪些对象接收特定标志变体的定向规则。
  BC-4210.50.30:
    name: 标志卫生管理
    description: |
      执行卫生实践，退役废弃标志，防止累积无效条件代码。
  BC-4210.60:
    name: 配置与密钥管理
    description: |
      管理产品服务使用的运行时配置值和密钥。
  BC-4210.60.10:
    name: 运行时配置管理
    description: |
      存储、分发和审计运行时配置值。
  BC-4210.60.20:
    name: 密钥生命周期管理
    description: |
      管理产品服务使用的密钥的签发、轮换及吊销。
  BC-4210.70:
    name: 生产变更授权
    description: |
      管理部署前审查、部署窗口治理及生产环境人员访问授权。
  BC-4210.70.10:
    name: 部署前审查
    description: |
      在生产部署前对变更进行审查和审批。
  BC-4210.70.20:
    name: 部署窗口治理
    description: |
      治理允许的部署窗口和冻结期。
  BC-4210.70.30:
    name: 生产访问授权
    description: |
      对生产系统的人员访问进行授权、即时授予及审计。

entries:
  BC-1580:
    name: 医学事务管理
    description: |
      覆盖与医疗卫生专业人员、关键意见领袖的科学交流、医学联络官运营及真实世界证据生成。
  BC-1580.10:
    name: 医学策略管理
    description: |
      制定医学策略、科学平台与证据生成规划，支持产品科学价值传递。
  BC-1580.10.10:
    name: 科学平台定义
    description: |
      定义科学平台与核心医学信息，确立产品的科学传播基础。
  BC-1580.10.20:
    name: 证据生成规划
    description: |
      规划证据生成活动，涵盖IIS与真实世界证据研究。
  BC-1580.10.30:
    name: 医学生命周期规划
    description: |
      制定各资产的医学事务生命周期计划。
  BC-1580.20:
    name: KOL与HCP互动管理
    description: |
      统筹关键意见领袖与医疗卫生专业人员的科学互动，建立长期合作关系。
  BC-1580.20.10:
    name: KOL绘图与画像
    description: |
      识别并构建关键意见领袖的详细画像。
  BC-1580.20.20:
    name: HCP顾问委员会管理
    description: |
      规划并召开医疗卫生专业人员顾问委员会。
  BC-1580.20.30:
    name: 科学互动追踪
    description: |
      追踪科学交流互动记录与洞察。
  BC-1580.30:
    name: 医学信息管理
    description: |
      统筹医学信息请求的接收与回复，提供准确及时的医学信息服务。
  BC-1580.30.10:
    name: 医学信息请求接收
    description: |
      通过多渠道接收医学信息请求。
  BC-1580.30.20:
    name: 标准回复文库
    description: |
      建立并维护标准回复文件库。
  BC-1580.30.30:
    name: 定制医学回复生成
    description: |
      针对专业医学询问生成定制化回复。
  BC-1580.40:
    name: 医学传播管理
    description: |
      统筹医学发表、学术会议策略与科学传播，提升产品科学影响力。
  BC-1580.40.10:
    name: 发表规划
    description: |
      按GPP3与ICMJE要求制定医学发表计划。
  BC-1580.40.20:
    name: 科学论文撰写
    description: |
      撰写并投稿科学论文。
  BC-1580.40.30:
    name: 学术会议与研讨会管理
    description: |
      制定学术会议策略，管理摘要投稿与卫星研讨会。
  BC-1580.50:
    name: 研究者发起研究管理
    description: |
      统筹IIS项目治理与研究者资助，推动独立科学研究的开展。
  BC-1580.50.10:
    name: IIS项目治理
    description: |
      对研究者发起研究项目实施治理管控。
  BC-1580.50.20:
    name: IIS方案审评
    description: |
      审评并决策IIS研究方案。
  BC-1580.50.30:
    name: IIS资金与支持
    description: |
      向IIS研究者提供资金支持与研究保障。
  BC-1580.60:
    name: 医学教育管理
    description: |
      统筹继续医学教育、教育资助与医学教育项目，提升医疗专业人员能力。
  BC-1580.60.10:
    name: 独立医学教育资助
    description: |
      评审并资助独立医学教育活动。
  BC-1580.60.20:
    name: 推广性医学教育
    description: |
      实施产品相关推广性医学教育项目。
  BC-1580.60.30:
    name: 教育内容开发
    description: |
      开发认证医学教育内容。
  BC-1580.70:
    name: 医学联络官运营管理
    description: |
      统筹MSL外勤运营、区域规划与绩效管理，推动科学交流落地实施。
  BC-1580.70.10:
    name: MSL区域规划与靶向管理
    description: |
      设计MSL管辖区域并确定KOL拜访目标。
  BC-1580.70.20:
    name: MSL活动规划
    description: |
      制定MSL活动计划与拜访规划。
  BC-1580.70.30:
    name: MSL绩效追踪
    description: |
      追踪MSL绩效指标、洞察收集与汇报工作。

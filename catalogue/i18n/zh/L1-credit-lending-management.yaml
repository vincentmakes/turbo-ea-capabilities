locale: zh
source: L1-credit-lending-management.yaml
entries:
  BC-1320:
    name: 信贷与贷款管理
    description: |
      覆盖信贷发起、承销、贷款服务、催收及投资组合管理的全链条，高效管理信贷业务风险和收益。
  BC-1320.10:
    name: 信贷发起管理
    description: |
      开展信贷申请受理、预筛查和发起流程管理，快速高效地推进信贷申请进入审批阶段。
  BC-1320.10.10:
    name: 信贷申请采集
    description: |
      通过各渠道采集信贷申请信息，启动信贷发起流程。
  BC-1320.10.20:
    name: 预筛查与还款能力评估
    description: |
      开展预筛查、还款能力和偿债能力评估，快速甄别符合基本条件的申请。
  BC-1320.10.30:
    name: 发起流程编排
    description: |
      编排信贷发起工作流和服务水平协议（SLA），确保申请处理的及时性和规范性。
  BC-1320.10.40:
    name: 发起材料收集
    description: |
      收集并核验信贷发起所需的支撑材料，确保审批依据的完整性。
  BC-1320.20:
    name: 信贷承销与决策管理
    description: |
      开展承销、财务分析、信贷决策和授权审批，确保信贷决策的质量和一致性。
  BC-1320.20.10:
    name: 信用风险评估
    description: |
      对申请人和风险敞口进行信用风险评估，为授信决策提供风险依据。
  BC-1320.20.20:
    name: 财务报表分析
    description: |
      对财务报表进行数据录入和比率分析，深入评估申请人的财务健康状况。
  BC-1320.20.30:
    name: 信贷决策
    description: |
      运用决策引擎和主观判断对信贷案件进行决策，平衡效率与风险管控。
  BC-1320.20.40:
    name: 信贷审批与授权
    description: |
      执行信贷审批治理和授权审批程序，确保审批权限的合规使用。
  BC-1320.20.50:
    name: 抵押品估值与管理
    description: |
      开展抵押品识别、估值和抵押权完善工作，强化信贷风险保障。
  BC-1320.30:
    name: 贷款服务管理
    description: |
      提供贷款服务，处理还款、计划变更和贷款修改，确保贷款账户的准确管理。
  BC-1320.30.10:
    name: 贷款放款
    description: |
      管理贷款放款和提款操作，确保资金及时准确到位。
  BC-1320.30.20:
    name: 还款处理
    description: |
      开展还款计划制定、还款处理和对账，保障还款流程的准确运行。
  BC-1320.30.30:
    name: 贷款变更
    description: |
      处理贷款条款变更、贷款重组和再融资，满足客户合理的变更需求。
  BC-1320.30.40:
    name: 贷款结清与关闭
    description: |
      处理贷款结清、出具清贷证明和账户关闭，规范完成贷款终止手续。
  BC-1320.40:
    name: 催收与回收管理
    description: |
      开展催收、贷款重组、回收和不良贷款（NPL）处置，有效控制信贷损失。
  BC-1320.40.10:
    name: 早期催收
    description: |
      管理早期逾期并发出还款提醒，及早介入防止逾期恶化。
  BC-1320.40.20:
    name: 后期催收
    description: |
      开展后期催收和诉讼移送，处理顽固逾期案件。
  BC-1320.40.30:
    name: 重组与宽限
    description: |
      提供重组方案、还款宽限和客户困难援助，平衡客户救助与风险管控。
  BC-1320.40.40:
    name: 回收与核销
    description: |
      开展资产回收、核销和核销后追收，最大化不良资产的价值回收。
  BC-1320.40.50:
    name: 不良贷款处置
    description: |
      对不良贷款开展处置、出售和证券化，有效出清不良资产。
  BC-1320.50:
    name: 贷款投资组合管理
    description: |
      开展组合分析、优化和资本管理，提升信贷组合的整体风险收益水平。
  BC-1320.50.10:
    name: 组合风险分析
    description: |
      开展包括年份分析、集中度分析和压力测试在内的组合分析，全面评估组合风险状况。
  BC-1320.50.20:
    name: 组合优化
    description: |
      优化组合结构、定价和风险收益比，提升组合整体盈利能力。
  BC-1320.50.30:
    name: 组合资本管理
    description: |
      依据 Basel 规则对信贷组合进行资本管理，确保资本充足合规。
  BC-1320.50.40:
    name: 组合报告
    description: |
      向风险委员会和监管机构提交组合报告，满足信息披露和监管要求。
  BC-1320.60:
    name: 信用风险模型管理
    description: |
      开发和运营 PD/LGD/EAD 模型、内部评级法（IRB）及 IFRS 9 预期信用损失（ECL）模型，为信贷风险量化提供技术支撑。
  BC-1320.60.10:
    name: PD/LGD/EAD 模型开发
    description: |
      开发违约概率（PD）、违约损失率（LGD）和违约风险敞口（EAD）模型，为信用风险评估提供量化基础。
  BC-1320.60.20:
    name: IFRS 9 ECL 建模
    description: |
      开发和运营符合 IFRS 9 要求的预期信用损失（ECL）模型，满足会计准则和监管规定。
  BC-1320.60.30:
    name: 模型验证
    description: |
      对信用风险模型开展独立验证，确保模型的稳健性和可靠性。
  BC-1320.60.40:
    name: 模型监控
    description: |
      持续监控模型绩效并进行重新校准，保持模型的预测准确性。

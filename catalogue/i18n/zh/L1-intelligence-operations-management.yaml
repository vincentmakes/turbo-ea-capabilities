locale: zh
source: L1-intelligence-operations-management.yaml
entries:
  BC-1730:
    name: 情报行动管理
    description: |
      覆盖情报收集、分析、分发与融合，为决策提供准确、及时的情报支撑。
  BC-1730.10:
    name: 情报收集管理
    description: |
      统筹HUMINT、SIGINT、GEOINT、IMINT与OSINT收集行动，满足情报需求。
  BC-1730.10.10:
    name: 收集需求管理
    description: |
      定义并管理情报收集需求，引导情报收集资源的合理调配。
  BC-1730.10.20:
    name: HUMINT收集
    description: |
      开展人力情报收集行动。
  BC-1730.10.30:
    name: SIGINT收集
    description: |
      开展信号情报收集行动。
  BC-1730.10.40:
    name: GEOINT与IMINT收集
    description: |
      开展地理空间与图像情报收集。
  BC-1730.10.50:
    name: OSINT收集
    description: |
      开展开源情报收集与整理。
  BC-1730.20:
    name: 情报分析管理
    description: |
      统筹全源分析、融合与情报产品制作，转化原始情报为决策所需评估。
  BC-1730.20.10:
    name: 全源分析
    description: |
      开展全源情报综合分析与评估。
  BC-1730.20.20:
    name: 情报融合
    description: |
      融合多源情报数据，形成综合评估结论。
  BC-1730.20.30:
    name: 情报产品撰写
    description: |
      撰写情报产品与分析评估报告。
  BC-1730.20.40:
    name: 情报质量保证
    description: |
      对情报产品实施质量审核与把关。
  BC-1730.30:
    name: 情报传发管理
    description: |
      统筹情报报告、传发与决策支持，确保情报及时送达授权用户。
  BC-1730.30.10:
    name: 情报报告
    description: |
      制作情报报告与简报材料。
  BC-1730.30.20:
    name: 情报传发控制
    description: |
      实施传发控制与知悉必要性管控。
  BC-1730.30.30:
    name: 情报用户互动
    description: |
      与情报消费者开展互动并收集反馈。
  BC-1730.40:
    name: 反情报管理
    description: |
      统筹反情报行动、内部威胁防范与欺骗侦测，保护情报能力安全。
  BC-1730.40.10:
    name: 反情报行动
    description: |
      针对境外情报机构开展反情报行动。
  BC-1730.40.20:
    name: 内部威胁项目
    description: |
      识别并管理内部威胁行为。
  BC-1730.40.30:
    name: 欺骗与隐瞒侦测
    description: |
      侦测敌方欺骗与隐瞒行动。
  BC-1730.50:
    name: 情报来源与方法管理
    description: |
      统筹情报来源管理、方法保护与分析规范，维护情报能力的安全性与有效性。
  BC-1730.50.10:
    name: 来源管理
    description: |
      管理并保护情报来源。
  BC-1730.50.20:
    name: 分析规范管理
    description: |
      维护分析规范标准（ICD 203）。
  BC-1730.50.30:
    name: 方法保护
    description: |
      保护情报收集方法不被泄露。

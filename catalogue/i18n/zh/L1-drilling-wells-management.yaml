locale: zh
source: L1-drilling-wells-management.yaml
entries:
  BC-3020:
    name: 钻井与油气井管理
    description: |
      覆盖井的全生命周期的工程、执行及完整性管理，从井身设计和钻井作业到完井、作业、修井和井控。
  BC-3020.10:
    name: 井身工程与设计
    description: |
      为钻井计划设计井身结构、套管、油管、钻井液及费用估算。
  BC-3020.10.10:
    name: 井身结构设计
    description: |
      开展井眼轨迹、井段及整体井身结构设计。
  BC-3020.10.20:
    name: 套管与油管设计
    description: |
      进行套管、尾管及油管柱设计，包括应力和抗内外压校核。
  BC-3020.10.30:
    name: 钻井液设计
    description: |
      为各钻进井段进行泥浆体系选择和流变性设计。
  BC-3020.10.40:
    name: 井费估算
    description: |
      为钻完井计划编制支出授权（AFE）费用估算。
  BC-3020.20:
    name: 钻井作业管理
    description: |
      执行钻井作业，包括钻机协调、实时监控、定向钻井和固井。
    in_scope:
      - 钻机现场钻井监督
      - 钻井数据实时监控
      - 定向钻井和控压钻井
      - 固井和下套管作业
    out_of_scope:
      - 完井安装（BC-3020.30）
      - 钻井装置过程安全（BC-3050）
  BC-3020.20.10:
    name: 钻机作业协调
    description: |
      对钻机日常作业和承包商活动进行协调。
  BC-3020.20.20:
    name: 钻井数据实时监控
    description: |
      从作业支持中心对钻井数据进行实时监控。
  BC-3020.20.30:
    name: 定向钻井执行
    description: |
      执行定向钻井、水平井及大位移井钻进。
  BC-3020.20.40:
    name: 钻井液作业
    description: |
      在钻进过程中开展泥浆工程、处理和固控作业。
  BC-3020.20.50:
    name: 固井作业
    description: |
      开展一次固井和补救固井作业。
  BC-3020.30:
    name: 完井管理
    description: |
      开展完井设计与安装，包括射孔和增产作业。
  BC-3020.30.10:
    name: 完井设计
    description: |
      设计上部和下部完井管柱，必要时包括防砂设计。
  BC-3020.30.20:
    name: 完井安装
    description: |
      下入并安装完井管柱及附件。
  BC-3020.30.30:
    name: 射孔作业
    description: |
      选择射孔枪并执行射孔，以建立流动通道。
  BC-3020.30.40:
    name: 增产作业
    description: |
      开展水力压裂、酸化及其他增产措施。
  BC-3020.40:
    name: 油气井作业与修井管理
    description: |
      覆盖全生命周期的井下作业，从电缆测井到全井修井。
  BC-3020.40.10:
    name: 连续油管作业
    description: |
      开展连续油管井下作业。
  BC-3020.40.20:
    name: 电缆与钢丝绳作业
    description: |
      开展电缆和钢丝绳数据采集及井下作业。
  BC-3020.40.30:
    name: 修井作业
    description: |
      对生产井和注入井开展大修作业。
  BC-3020.40.40:
    name: 管内作业
    description: |
      开展管内修复和增产作业。
  BC-3020.50:
    name: 井完整性管理
    description: |
      在井的全生命周期内验证和跟踪井屏障，包括环空压力和持续套管压力管理。
  BC-3020.50.10:
    name: 井屏障验证
    description: |
      依据完整性标准验证一级和二级井屏障。
  BC-3020.50.20:
    name: 环空压力监测
    description: |
      对井环空压力进行连续和定期监测。
  BC-3020.50.30:
    name: 井完整性风险评估
    description: |
      评估井组合中各井的完整性状态风险。
  BC-3020.50.40:
    name: 持续套管压力管理
    description: |
      诊断和管理持续套管压力事件。
  BC-3020.60:
    name: 井控管理
    description: |
      预防和处置井控事件，包括溢流探测、防喷器操作及井控能力培训。
  BC-3020.60.10:
    name: 溢流探测与处置
    description: |
      建立溢流探测方法和井控处置程序。
  BC-3020.60.20:
    name: 防喷器操作
    description: |
      对防喷器组合进行操作、功能测试和维护。
  BC-3020.60.30:
    name: 井控能力保障
    description: |
      协调IWCF和IADC WellCAP能力培训项目。
  BC-3020.70:
    name: 钻井承包商管理
    description: |
      对钻井钻机和服务承包商开展保障、绩效管理和合同监督。
  BC-3020.70.10:
    name: 钻机保障与审核
    description: |
      对钻机和承包商进行接收前及在役审核。
  BC-3020.70.20:
    name: 钻井承包商绩效管理
    description: |
      依据钻机合同和服务KPI开展绩效管理。
  BC-3020.70.30:
    name: 钻井服务合同管理
    description: |
      管理各类钻井服务合同（泥浆、固井、定向等）。

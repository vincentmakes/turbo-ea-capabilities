locale: zh
source: L1-student-enrolment-records-management.yaml
entries:
  BC-4720:
    name: 学籍与档案管理
    description: |
      从入学注册、学业档案、成绩单、学分转移到毕业的在校学生全生命周期行政管理，以及基础学生身份档案管理。
  BC-4720.10:
    name: 入学与注册
    description: |
      已录取学生的学期选课注册，包括课程调整及跨学期续读管理。
    in_scope:
      - 选课注册
      - 加退课与课程表调整
      - 重新入学与续读
    out_of_scope:
      - 初始录取决定（见招生与入学管理）
  BC-4720.10.10:
    name: 选课注册
    description: |
      将学生注册到课程、课组及学习单元。
  BC-4720.10.20:
    name: 加退课与课程表调整
    description: |
      在规定时间窗口内处理加退课及课程表调整。
  BC-4720.10.30:
    name: 重新入学与续读
    description: |
      管理学期和学年之间的重新入学与续读事务。
  BC-4720.20:
    name: 学业档案管理
    description: |
      维护权威性学生学业档案，包括成绩、成绩单及学业状态认定。
    in_scope:
      - 成绩与分数录入
      - 成绩单制作
      - 学业状态认定
    out_of_scope:
      - 评分流程本身（见考试与评估管理）
  BC-4720.20.10:
    name: 成绩与分数录入
    description: |
      在学生档案中权威性录入成绩与分数。
  BC-4720.20.20:
    name: 成绩单制作
    description: |
      制作并发放正式及非正式成绩单。
  BC-4720.20.30:
    name: 学业状态认定
    description: |
      认定学业状态，包括荣誉、学业警告及退学。
  BC-4720.30:
    name: 课程排课与时间表档案
    description: |
      维护课程分组时间表、教室分配及冲突处理决定的权威档案，供入学管理使用。
    in_scope:
      - 课组与班级时间表档案
      - 教室与设施分配档案
      - 课程表冲突处理档案
    out_of_scope:
      - 日常课堂教学（见教学与学习运营管理）
  BC-4720.30.10:
    name: 课组与班级时间表档案
    description: |
      按课组和班级维护权威性时间表档案。
  BC-4720.30.20:
    name: 教室与设施分配档案
    description: |
      记录教学用房及设施与排课课次的分配情况。
  BC-4720.30.30:
    name: 课程表冲突处理档案
    description: |
      记录已识别和已解决的时间表冲突。
  BC-4720.40:
    name: 学分转移与认定
    description: |
      对从其他院校转入的学分进行评估与记录，以及先前学习认定和校际衔接协议的适用。
    in_scope:
      - 转入学分评估
      - 先前学习认定（RPL）
      - 校际衔接协议适用
    out_of_scope:
      - 入学时的国际学历认定（见招生与入学管理）
  BC-4720.40.10:
    name: 转入学分评估
    description: |
      评估其他院校所获学分对本院课程项目的适用性。
  BC-4720.40.20:
    name: 先前学习认定
    description: |
      认定先前实践及非正式学习以抵免学分。
  BC-4720.40.30:
    name: 校际衔接协议适用
    description: |
      将院校间衔接协议适用于学生档案。
  BC-4720.50:
    name: 毕业与证书发放
    description: |
      毕业资格审核、学位授予及可验证证书、文凭与证书的发放。
    in_scope:
      - 毕业资格审核
      - 学位授予
      - 证书发放与后续核验
    out_of_scope:
      - 考试成绩处理（见考试与评估管理）
  BC-4720.50.10:
    name: 毕业资格审核
    description: |
      对照毕业要求审核学生档案。
  BC-4720.50.20:
    name: 学位授予
    description: |
      正式授予学位及资质。
  BC-4720.50.30:
    name: 证书发放与核验
    description: |
      发放并核验纸质和数字证书，包括可验证证书。
  BC-4720.60:
    name: 学生身份与生命周期档案
    description: |
      维护学生标识符、在籍状态标记及休退学档案，为下游行政操作提供数据基础。
    in_scope:
      - 学生标识符生命周期管理
      - 在籍状态维护
      - 退学与休学档案
    out_of_scope:
      - 身份认证与访问管理（见跨行业网络安全管理）
  BC-4720.60.10:
    name: 学生身份生命周期
    description: |
      从发放到注销的学生唯一标识符全生命周期管理。
  BC-4720.60.20:
    name: 在籍状态维护
    description: |
      维护权威性在籍状态标记（在读、休学、退学）。
  BC-4720.60.30:
    name: 退学与休学档案
    description: |
      记录学生退学、休学及复学情况。

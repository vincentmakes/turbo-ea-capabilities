locale: zh
source: L1-public-finance-budget-management.yaml
entries:
  BC-3280:
    name: 公共财政与预算管理
    description: |
      公共部门预算编制、拨款执行、政府基金会计、公共债务管理、国库运营及符合IPSAS的财政报告和信息披露。
  BC-3280.10:
    name: 预算编制
    description: |
      编制年度和多年度预算，包括支出上限、项目预算和向立法机构提交。
    in_scope:
      - 宏观财政预测
      - 项目预算和零基预算
      - 向立法机构提交预算
    out_of_scope:
      - 企业FP&A和管理会计（由财务规划与分析覆盖）
  BC-3280.10.10:
    name: 宏观财政预测
    description: |
      预测收入和支出总量以及宏观财政情景。
  BC-3280.10.20:
    name: 预算上限设定
    description: |
      在财政空间内为各机构和项目设定预算上限。
  BC-3280.10.30:
    name: 项目预算编制
    description: |
      由支出机构编制项目和绩效预算。
  BC-3280.10.40:
    name: 向立法机构提交预算
    description: |
      汇编并向立法机构提交行政预算。
  BC-3280.20:
    name: 拨款执行
    description: |
      依据拨款法律，对拨款资金开展分配、配额、承诺、义务和支出。
  BC-3280.20.10:
    name: 分配与配额管理
    description: |
      向支出机构分配和配额拨款。
  BC-3280.20.20:
    name: 承诺与义务记录
    description: |
      记录对拨款的承诺和义务。
  BC-3280.20.30:
    name: 支出与拨付处理
    description: |
      处理已安排义务资金的支出和拨付。
  BC-3280.20.40:
    name: 重新规划与转拨授权
    description: |
      管理重新规划、转拨和法定授权调整。
  BC-3280.30:
    name: 政府基金会计
    description: |
      依据IPSAS或等同国家标准，对政府基金（包括一般基金、专项基金、信托基金和循环基金）进行会计核算。
  BC-3280.30.10:
    name: 基金结构维护
    description: |
      维护政府基金结构和会计科目表。
  BC-3280.30.20:
    name: 基金层面会计
    description: |
      跨一般基金、专项基金、信托基金和循环基金过账和核对交易。
  BC-3280.30.30:
    name: 机构间结算
    description: |
      结算和核对机构间转拨和有偿服务协议。
  BC-3280.40:
    name: 公共债务管理
    description: |
      对主权和次主权债务工具进行发行、偿付和风险管理。
  BC-3280.40.10:
    name: 债务策略与发行规划
    description: |
      制定债务策略，跨工具和期限设定发行日历。
  BC-3280.40.20:
    name: 债务发行运营
    description: |
      通过拍卖、辛迪加和直接发行政府债务工具。
  BC-3280.40.30:
    name: 债务偿付
    description: |
      向债权人支付利息和本金。
  BC-3280.40.40:
    name: 债务组合风险管理
    description: |
      管理债务组合中的汇率、利率和再融资风险。
  BC-3280.50:
    name: 现金与国库运营
    description: |
      开展政府现金管理、国库单一账户运营及代理各机构处理收付款。
  BC-3280.50.10:
    name: 现金预测
    description: |
      开展政府现金流的日常和滚动预测。
  BC-3280.50.20:
    name: 国库单一账户运营
    description: |
      运营国库单一账户和集中银行安排。
  BC-3280.50.30:
    name: 政府付款运营
    description: |
      代理支出机构完成政府付款。
  BC-3280.50.40:
    name: 政府收入处理
    description: |
      处理入账政府收入并向各机构划拨。
  BC-3280.60:
    name: 财政报告与信息披露
    description: |
      编制年中和年末财政报告、IPSAS财务报表及COFOG/GFSM统计报告。
  BC-3280.60.10:
    name: 年中财政报告
    description: |
      编制月度和季度财政执行情况报告。
  BC-3280.60.20:
    name: IPSAS财务报表编制
    description: |
      编制全政府和单体IPSAS财务报表。
  BC-3280.60.30:
    name: GFSM和COFOG统计报告
    description: |
      依据IMF GFSM和COFOG分类编制财政统计数据。
  BC-3280.60.40:
    name: 开放支出信息披露
    description: |
      以开放数据形式发布支出、交易和预算执行信息。

  BC-920.40.20:
    name: 转型报告
    description: |
      输出转型进展报告与管理仪表板。
  BC-920.40.30:
    name: 转型工具管理
    description: |
      管理转型跟踪、依赖关系与效益管理工具。
  BC-920.40.40:
    name: 转型能力建设
    description: |

source: L1-supplier-management.yaml
entries:
  BC-510:
    name: 供应商管理
    description: |
      管理供应商资质认证、绩效、风险及关系。
  BC-510.10:
    name: 供应商入驻管理
    description: |
      管理供应商资质审核、注册及尽职调查。
  BC-510.10.10:
    name: 供应商注册
    description: |
      采集供应商身份信息、银行账户及税务信息。
  BC-510.10.20:
    name: 供应商资质审核与预筛选
    description: |
      对新供应商开展能力、财务及合规资质审核。
  BC-510.10.30:
    name: 供应商尽职调查
    description: |
      对供应商开展制裁筛查、反腐、ESG 及诚信尽职调查。
  BC-510.10.40:
    name: 供应商主数据管理
    description: |
      维护供应商主数据及生命周期变更。
  BC-510.20:
    name: 供应商绩效管理
    description: |
      管理绩效记分卡及服务水平协议。
  BC-510.20.10:
    name: 供应商记分卡与 KPI
    description: |
      定义并跟踪供应商绩效记分卡。
  BC-510.20.20:
    name: 服务水平协议管理
    description: |
      定义、监控并执行服务水平协议约定的补救措施。
  BC-510.20.30:
    name: 供应商审计与检查
    description: |
      对供应商能力及质量开展现场审计与检查。
  BC-510.20.40:
    name: 供应商问题与纠正预防行动管理
    description: |
      记录供应商问题并开展纠正与预防行动。
  BC-510.30:
    name: 供应商风险管理
    description: |
      管理供应商的财务、ESG、地缘政治及网络安全风险。
  BC-510.30.10:
    name: 供应商财务风险监控
    description: |
      监控供应商财务健康状况及信用风险。
  BC-510.30.20:
    name: 供应商 ESG 与可持续发展风险
    description: |
      评估供应链中的 ESG、人权及现代奴役风险。
  BC-510.30.30:
    name: 供应商网络安全与 IT 风险
    description: |
      开展第三方网络安全及 IT 风险评估与监控。
  BC-510.30.40:
    name: 供应商地缘政治与集中度风险
    description: |
      评估供应基地中的地缘政治、国别及集中度风险。
  BC-510.40:
    name: 供应商发展管理
    description: |
      管理能力建设及供应商改进项目。
  BC-510.40.10:
    name: 供应商能力建设
    description: |
      开展联合能力建设、培训及技术转让。
  BC-510.40.20:
    name: 供应商多元化项目
    description: |
      识别并发展多元化及小微企业供应商。
  BC-510.40.30:
    name: 供应商创新项目
    description: |
      推进供应商主导创新及联合开发项目。
  BC-510.50:
    name: 供应商关系管理
    description: |
      管理战略供应商关系及治理论坛。
  BC-510.50.10:
    name: 战略供应商分类
    description: |
      按关键性及价值对供应商进行分类。
  BC-510.50.20:
    name: 高管供应商互动
    description: |
      与战略供应商开展高管赞助及指导会议。
  BC-510.50.30:
    name: 联合业务规划
    description: |
      与战略供应商开展联合业务规划及价值共创。
  BC-510.50.40:
    name: 供应商门户与协作
    description: |
      管理供应商门户、自助服务及协作平台。

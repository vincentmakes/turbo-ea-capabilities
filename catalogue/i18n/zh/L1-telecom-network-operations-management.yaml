locale: zh
source: L1-telecom-network-operations-management.yaml
entries:
  BC-2600:
    name: 电信网络运营管理
    description: |
      负责固定网络、移动网络和IP网络的日常运营，覆盖无线接入、核心网、传输和边缘域，包括故障管理、配置管理、性能管理、库存管理、变更管理、安全运营及现场协调，以TMN FCAPS和eTOM资源管理与运营为基础。
  BC-2600.10:
    name: 网络故障管理
    description: |
      对接入网、核心网和传输域的网络故障进行检测、关联分析、工单管理、恢复处置和根本原因分析。
  BC-2600.10.10:
    name: 告警关联分析
    description: |
      对网络告警进行实时关联和去重，形成可操作的事件。
  BC-2600.10.20:
    name: 故障工单管理
    description: |
      对网络故障工单进行从创建到关闭的全生命周期管理。
  BC-2600.10.30:
    name: 网络中断管理
    description: |
      协调重大网络中断事件的响应、沟通通报和恢复行动。
  BC-2600.10.40:
    name: 根本原因分析
    description: |
      对反复出现或重大故障进行结构化调查，识别并消除根本原因。
  BC-2600.20:
    name: 网络配置管理
    description: |
      定义并执行网络单元配置标准，对配置变更进行受控部署。
  BC-2600.20.10:
    name: 基准配置管理
    description: |
      按网络单元类型和角色定义和维护经批准的基线配置。
  BC-2600.20.20:
    name: 网络参数管理
    description: |
      对可调整的网络参数及其授权范围进行全生命周期管理。
  BC-2600.20.30:
    name: 软件镜像管理
    description: |
      对网络单元软件镜像和固件进行保管和批准版本控制。
  BC-2600.20.40:
    name: 自动化配置部署
    description: |
      以工具驱动方式大规模部署经批准的配置变更，并提供验证和回滚能力。
  BC-2600.30:
    name: 网络性能管理
    description: |
      持续采集和分析网络性能计数器及KPI，以发现并预防性能劣化。
  BC-2600.30.10:
    name: 网络KPI采集
    description: |
      采集并存储网元级和网络级性能计数器及KPI数据。
  BC-2600.30.20:
    name: 阈值监控
    description: |
      对照工程和SLA阈值监控性能KPI。
  BC-2600.30.30:
    name: 容量利用率监控
    description: |
      跟踪资源利用率与工程容量的对比，及时发现接近饱和的状况。
  BC-2600.30.40:
    name: 客户影响关联分析
    description: |
      将网络性能信号与客户体验指标进行关联，识别影响服务的情况。
  BC-2600.40:
    name: 网络库存管理
    description: |
      维护逻辑和物理网络资源及其关系的权威记录，通过核对确保记录与实际相符。
  BC-2600.40.10:
    name: 逻辑网络库存
    description: |
      维护逻辑资源（如服务、电路、IP/VLAN分配和承载路径）的权威记录。
  BC-2600.40.20:
    name: 物理网络库存
    description: |
      维护物理资产（如节点、板卡、端口、光纤、管道和天线）的权威记录。
  BC-2600.40.30:
    name: 库存核对
    description: |
      将库存记录与自动发现、设计和现场勘测结果进行核对。
  BC-2600.40.40:
    name: 网络资源发现
    description: |
      自动发现已部署的网络单元及其状态。
  BC-2600.50:
    name: 网络变更与发布管理
    description: |
      对在网网络单元和服务的变更进行规划、审批、执行、验证和回滚。
  BC-2600.50.10:
    name: 网络变更规划
    description: |
      规划和评估网络变更的风险，包括影响时窗。
  BC-2600.50.20:
    name: 网络变更实施
    description: |
      在计划时窗内受控执行已批准的网络变更。
  BC-2600.50.30:
    name: 变更验证
    description: |
      变更后验证网络处于预期状态且性能在容差范围内。
  BC-2600.50.40:
    name: 变更回滚
    description: |
      对验证失败或引发不可接受影响的变更进行回退。
  BC-2600.60:
    name: 网络安全运营
    description: |
      针对信令、传输和核心网域开展电信网络专项安全监控和响应，作为企业网络安全的补充。
  BC-2600.60.10:
    name: 网络威胁监控
    description: |
      对信令、传输和核心网进行异常及恶意活动监控。
  BC-2600.60.20:
    name: DDoS防护
    description: |
      检测和缓解针对网络及客户端点的容量型和协议型拒绝服务攻击。
  BC-2600.60.30:
    name: 网络访问控制
    description: |
      对网络单元的管理员和机器访问控制进行执行。
  BC-2600.60.40:
    name: 网络安全事件响应
    description: |
      对已确认的网络安全事件进行遏制、清除和恢复。
  BC-2600.70:
    name: 现场运营协调
    description: |
      对网络现场作业进行派工、执行管控和站点访问协调。
  BC-2600.70.10:
    name: 现场工单派发
    description: |
      将网络工单分配给内部和承包商现场团队。
  BC-2600.70.20:
    name: 操作程序执行
    description: |
      对在网网络单元执行已批准操作程序的执行管控。
  BC-2600.70.30:
    name: 站点访问协调
    description: |
      协调对网络站点的物理访问，包括陪同、许可和安全管控。
  BC-2600.80:
    name: 网络优化管理
    description: |
      持续调优网络单元和流量路径，以最大化性能、容量和客户体验。
  BC-2600.80.10:
    name: 无线接入优化
    description: |
      调整无线接入参数、邻区关系和天线配置。
  BC-2600.80.20:
    name: 传输优化
    description: |
      调优传输网络路径、容量分配和服务质量。
  BC-2600.80.30:
    name: 流量工程
    description: |
      基于性能、成本和韧性目标，对IP和传输流量进行跨网络引导。
  BC-2600.80.40:
    name: 闭环自动化
    description: |
      通过自动化的检测-决策-执行循环，无需人工干预即可持续优化网络。

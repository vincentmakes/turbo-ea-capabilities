locale: zh
source: L1-airspace-management.yaml
entries:
  BC-1200:
    name: 空域管理
    description: |
      涵盖空域设计、扇区划分、限制区域设定及军民协调，确保空域结构安全、高效地支持空中交通服务。
  BC-1200.10:
    name: 空域设计管理
    description: |
      负责空域结构、空域类别、航路网络设计及扇区边界的规划与维护，为空中交通服务提供清晰的空间框架。
  BC-1200.10.10:
    name: 空域结构设计
    description: |
      依据 ICAO 附件 11 定义飞行情报区（FIR）、高空飞行情报区（UIR）、管制区及空域类别。
  BC-1200.10.20:
    name: ATS 航路网络设计
    description: |
      设计传统及基于性能的导航（PBN）ATS 航路网络，优化飞行路径布局。
  BC-1200.10.30:
    name: 扇区边界设计
    description: |
      划定扇区边界及基本扇区，为管制职责分工提供明确的空间界定。
  BC-1200.10.40:
    name: 自由航路空域设计
    description: |
      规划和实施自由航路空域，使运营人能够在指定空域内自主选择最优飞行路径。
  BC-1200.20:
    name: 空域扇区划分管理
    description: |
      负责扇区定义、开放方案及管制员工作负荷匹配，确保扇区配置与流量需求相适应。
  BC-1200.20.10:
    name: 扇区配置管理
    description: |
      制定并维护各类扇区配置方案，支持灵活的扇区开放与合并操作。
  BC-1200.20.20:
    name: 扇区开放方案规划
    description: |
      依据流量预测规划扇区开放方案，在保障安全的前提下优化资源利用。
  BC-1200.20.30:
    name: 基于工作负荷的扇区划分
    description: |
      依据管制员工作负荷评估结果调整扇区划分，防止单一扇区超负荷运行。
  BC-1200.30:
    name: 限制空域管理
    description: |
      管理危险区、限制区、禁区及军事活动区，确保空域用户获得及时准确的限制信息。
  BC-1200.30.10:
    name: 限制区域定义
    description: |
      定义限制区、禁区和危险区的范围、高度及适用规则，保障相关活动的安全隔离。
  BC-1200.30.20:
    name: 临时保留区域管理
    description: |
      管理临时保留区域和临时隔离区域的设立与解除，协调特殊飞行活动需求。
  BC-1200.30.30:
    name: 激活与释放协调
    description: |
      协调限制空域的激活、释放及通告，确保相关信息及时传递给空域用户和管制单位。
  BC-1200.40:
    name: 空域协调管理
    description: |
      开展军民协调、跨境空域协调及功能性空域块合作，实现空域资源的灵活共享。
  BC-1200.40.10:
    name: 军民空域协调
    description: |
      推动军民协调与空域灵活使用（FUA），最大化空域容量，减少对飞行运营的限制。
  BC-1200.40.20:
    name: 跨境空域协调
    description: |
      协调飞行情报区边界两侧的空域使用，实现跨境飞行的无缝衔接。
  BC-1200.40.30:
    name: 功能性空域块合作
    description: |
      在功能性空域块（FAB）框架内开展跨国合作，提升空域整体效能。
  BC-1200.40.40:
    name: 空域用户咨询
    description: |
      就空域设计变更征求空域用户意见，确保设计方案兼顾运营需求。

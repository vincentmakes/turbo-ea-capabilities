locale: zh
source: L1-cargo-documentation-management.yaml
entries:
  BC-2500:
    name: 货运单证管理
    description: |
      管理货运单证的开具、交换及全生命周期，包括提单、航空运单、公路及铁路运单、货物舱单及其电子等效文件。
  BC-2500.10:
    name: 提单管理
    description: |
      以可转让及不可转让形式开具、交回及管理海运及内河提单。
    in_scope:
      - 主提单及分单提单
      - 可转让、直提单及海运单等变体
    out_of_scope:
      - 贸易融资项下信用证处理（BC-1360）
  BC-2500.10.10:
    name: 提单开具
    description: |
      开具主提单及分单提单。
  BC-2500.10.20:
    name: 提单交回与货物放行
    description: |
      处理电放、提单交回及凭提单放货。
  BC-2500.10.30:
    name: 可转让及直提单变体
    description: |
      开具可转让、直提单及海运单等各类变体单据。
  BC-2500.20:
    name: 航空运单管理
    description: |
      开具并管理主航空运单及分单航空运单，包括e-AWB。
  BC-2500.20.10:
    name: 主航空运单开具
    description: |
      由航空承运商开具主航空运单。
  BC-2500.20.20:
    name: 分单航空运单开具
    description: |
      由货代及集拼商开具分单航空运单。
  BC-2500.20.30:
    name: e-AWB转换与维护
    description: |
      将纸质AWB转换为e-AWB并进行全生命周期维护。
  BC-2500.30:
    name: 公路及铁路运单管理
    description: |
      依据CMR及CIM/SMGS制度开具并管理公路及铁路运单。
  BC-2500.30.10:
    name: CMR运单开具
    description: |
      为国际公路运输开具CMR运单。
  BC-2500.30.20:
    name: CIM及SMGS运单开具
    description: |
      为国际铁路运输开具CIM及SMGS运单。
  BC-2500.30.30:
    name: 国内运单开具
    description: |
      开具国内运单及送货单。
  BC-2500.40:
    name: 舱单与货物申报管理
    description: |
      向海关、港口终端及合作承运商申报货物舱单和预到港货物申报。
  BC-2500.40.10:
    name: 进口舱单申报
    description: |
      向港口终端及海关申报进口舱单。
  BC-2500.40.20:
    name: 出口舱单申报
    description: |
      向港口终端及海关申报出口舱单。
  BC-2500.40.30:
    name: 预到港货物报告
    description: |
      依据ICS2及CBP ACE等制度提交预到港货物申报。
  BC-2500.50:
    name: 电子单证管理
    description: |
      运营电子运输单证平台，包括eBL及ONE Record数据交换。
  BC-2500.50.10:
    name: 电子提单运营
    description: |
      运营电子提单平台。
  BC-2500.50.20:
    name: e-AWB与ONE Record运营
    description: |
      运营e-AWB及ONE Record数据交换。
  BC-2500.50.30:
    name: 单证交换与核验
    description: |
      开展各方单证交换及电子签名与印章核验。

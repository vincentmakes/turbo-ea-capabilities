locale: zh
source: L1-telecom-fraud-management.yaml
entries:
  BC-2690:
    name: 电信欺诈管理
    description: |
      检测、调查、预防、追偿和跨运营商报告电信专项欺诈，涵盖订购欺诈、IRSF、Wangiri、SIM换卡、绕行和收入分成欺诈方案，以GSMA欺诈指引为基础。
  BC-2690.10:
    name: 电信欺诈检测
    description: |
      跨语音、数据和信令流量对电信专项欺诈模式进行实时和近实时检测。
  BC-2690.10.10:
    name: 订购欺诈检测
    description: |
      检测使用盗取或伪造身份进行欺诈性业务申请的行为。
  BC-2690.10.20:
    name: 国际收入分成欺诈检测
    description: |
      检测人为抬高高价目的地结算的IRSF流量模式。
  BC-2690.10.30:
    name: Wangiri欺诈检测
    description: |
      检测Wangiri回拨欺诈模式及相关号段。
  BC-2690.10.40:
    name: SIM换卡检测
    description: |
      检测欺诈性SIM和eSIM换卡企图及下游账户接管行为。
  BC-2690.10.50:
    name: 绕行欺诈检测
    description: |
      检测SIM卡箱等欺骗互联收入的绕行方案。
  BC-2690.20:
    name: 电信欺诈调查
    description: |
      对已检测欺诈进行案件调查、证据保全和执法联络。
  BC-2690.20.10:
    name: 欺诈案件调查
    description: |
      对已检测欺诈案件进行结构化调查，直至结案。
  BC-2690.20.20:
    name: 证据采集
    description: |
      对支持欺诈调查的证据进行取证采集和保全。
  BC-2690.20.30:
    name: 执法机构联络
    description: |
      就转交的欺诈案件与执法机构进行联络。
  BC-2690.30:
    name: 电信欺诈预防控制
    description: |
      针对在网流量运营预防性控制措施，包括规则、速度限制、认证升级和黑名单。
  BC-2690.30.10:
    name: 实时欺诈规则管理
    description: |
      编写和调优欺诈管理平台使用的实时规则集。
  BC-2690.30.20:
    name: 速度控制管理
    description: |
      对使用量、充值和变更实施基于速度的控制，以限制欺诈敞口。
  BC-2690.30.30:
    name: 认证升级
    description: |
      对高风险交易和自助服务操作实施阶梯式认证。
  BC-2690.30.40:
    name: 欺诈黑名单管理
    description: |
      维护涵盖号码、号段、设备和身份的欺诈相关黑名单。
  BC-2690.40:
    name: 电信欺诈损失追偿
    description: |
      在欺诈确认后追偿欺诈性费用、坏账和资产。
  BC-2690.40.10:
    name: 欺诈性费用追偿
    description: |
      追偿由已确认欺诈活动产生的费用。
  BC-2690.40.20:
    name: 坏账追偿
    description: |
      追偿与订购欺诈和账户接管欺诈相关的坏账。
  BC-2690.40.30:
    name: 资产追缴
    description: |
      追缴与欺诈订单相关的设备、SIM卡和其他资产。
  BC-2690.50:
    name: 跨运营商欺诈报告
    description: |
      在行业内共享欺诈情报，并在要求时向监管机构报告。
  BC-2690.50.10:
    name: 行业欺诈情报共享
    description: |
      向GSMA欺诈论坛等行业欺诈情报渠道贡献信息并进行消费。
  BC-2690.50.20:
    name: 监管机构欺诈报告
    description: |
      在被要求时向监管机构报告欺诈事件和总体敞口。
  BC-2690.50.30:
    name: 运营商间欺诈转介
    description: |
      将疑似欺诈活动转介发起或终结运营商进行联合处置。

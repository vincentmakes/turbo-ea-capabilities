entries:
  BC-1780:
    name: 国防维持保障管理
    description: |
      覆盖在役保障、基地级维修、RAM工程、备件与修理及老化管理，确保系统全寿命可用性。
  BC-1780.10:
    name: 在役保障管理
    description: |
      统筹全寿命保障合同与保障工程，维持系统持续作战效能。
  BC-1780.10.10:
    name: 全寿命保障合同运营
    description: |
      运营全寿命保障合同。
  BC-1780.10.20:
    name: 保障工程
    description: |
      为部署中的武器系统提供工程支持保障。
  BC-1780.10.30:
    name: 舰队管理支持
    description: |
      提供含构型追踪在内的舰队管理支持。
  BC-1780.20:
    name: 基地级维修管理
    description: |
      统筹基地级修理、翻修与翻新，维持装备完好状态。
  BC-1780.20.10:
    name: 基地修理运营
    description: |
      运营基地级修理车间。
  BC-1780.20.20:
    name: 基地翻修项目
    description: |
      实施定期基地翻修与复原项目。
  BC-1780.20.30:
    name: 基地产能管理
    description: |
      管理基地产能与周转时间。
  BC-1780.30:
    name: RAM工程管理
    description: |
      统筹可靠性、可用性与维修性工程，实现系统效能量化管理。
  BC-1780.30.10:
    name: 可靠性工程
    description: |
      开展可靠性预计、分配与增长分析。
  BC-1780.30.20:
    name: 可用性建模
    description: |
      开展作战可用性建模与分析。
  BC-1780.30.30:
    name: 维修性工程
    description: |
      开展维修性分析并影响设计改进。
  BC-1780.30.40:
    name: 后勤支援分析
    description: |
      按MIL-HDBK-502要求开展后勤支援分析。
  BC-1780.40:
    name: 国防备件与修理管理
    description: |
      统筹备件配置、修理流程与周转件管理，保障维修保障能力。
  BC-1780.40.10:
    name: 国防备件供应
    description: |
      为国防系统配置备件供应。
  BC-1780.40.20:
    name: 修理流程管理
    description: |
      管理修理与返还流程。
  BC-1780.40.30:
    name: 周转件池运营
    description: |
      运营可翻新件与周转件池。
  BC-1780.50:
    name: 技术出版物管理
    description: |
      统筹技术指令、IETM、手册与S1000D文档的制作与维护。
  BC-1780.50.10:
    name: S1000D技术文档
    description: |
      按S1000D标准撰写并维护技术出版物。
  BC-1780.50.20:
    name: 交互式电子技术手册运营
    description: |
      在现场运营并更新IETM。
  BC-1780.50.30:
    name: 技术指令变更管理
    description: |
      管理技术指令（TO）变更与现场更新。
  BC-1780.60:
    name: 国防老化管理
    description: |
      统筹DMSMS监控、老化预测与缓解措施，防范器材老化对系统保障的影响。
  BC-1780.60.10:
    name: DMSMS监控
    description: |
      开展元器件与供应商的DMSMS监控。
  BC-1780.60.20:
    name: 老化预测
    description: |
      对零部件与材料老化情况开展预测分析。
  BC-1780.60.30:
    name: 老化缓解
    description: |
      实施含最后一批次采购（LTB）、重新设计与替代品等缓解策略。
  BC-1780.60.40:
    name: 老化管理计划维护
    description: |
      维护项目级老化管理计划。

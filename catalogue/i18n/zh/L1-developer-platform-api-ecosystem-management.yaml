locale: zh
source: L1-developer-platform-api-ecosystem-management.yaml
entries:
  BC-4270:
    name: 开发者平台与API生态系统管理
    description: |
      管理SaaS生态系统的公开API、SDK、开发者门户、开发者身份、API消费治理、合作伙伴应用、软件市场上架及出站Webhook订阅。
  BC-4270.10:
    name: 公开API生命周期管理
    description: |
      对向外部开发者开放的公开API进行规范制定、版本管理和废弃处理。
  BC-4270.10.10:
    name: API规范编写
    description: |
      以机器可读形式编写和审查公开API规范。
  BC-4270.10.20:
    name: API版本管理
    description: |
      对公开API进行版本管理，并提供有据可查的兼容性保证。
  BC-4270.10.30:
    name: API废弃管理
    description: |
      在充分提前通知的前提下，沟通并执行API废弃操作。
  BC-4270.20:
    name: SDK与客户端库管理
    description: |
      管理封装公开API的SDK和客户端库的生成、语言覆盖及示例维护。
  BC-4270.20.10:
    name: SDK生成与发布
    description: |
      生成并发布与API版本对齐的SDK。
  BC-4270.20.20:
    name: SDK语言覆盖管理
    description: |
      选择和管理支持的SDK语言和运行时。
  BC-4270.20.30:
    name: SDK示例维护
    description: |
      维护SDK代码示例和快速启动项目。
  BC-4270.30:
    name: 开发者门户管理
    description: |
      管理帮助开发者集成平台的文档、交互式参考及引导入驻流程。
  BC-4270.30.10:
    name: 开发者文档编写
    description: |
      为开发者编写概念性、任务型及参考类文档。
  BC-4270.30.20:
    name: 交互式API参考
    description: |
      运营交互式API参考和即时试用体验。
  BC-4270.30.30:
    name: 开发者入驻
    description: |
      引导开发者从注册到完成首次成功API调用的入驻流程。
  BC-4270.40:
    name: 开发者身份与凭证管理
    description: |
      签发和管理开发者凭证、OAuth客户端及联合开发者身份。
  BC-4270.40.10:
    name: API密钥签发
    description: |
      签发、轮换和吊销开发者API密钥。
  BC-4270.40.20:
    name: OAuth客户端注册
    description: |
      注册和管理OAuth客户端应用程序。
  BC-4270.40.30:
    name: 开发者身份联合
    description: |
      从外部身份提供商联合开发者身份。
  BC-4270.50:
    name: API消费治理
    description: |
      管理API消费的配额、速率限制、用量分析及与商业方案等级的映射。
  BC-4270.50.10:
    name: API配额与速率限制管理
    description: |
      按消费者定义和执行API配额及速率限制。
  BC-4270.50.20:
    name: API用量分析
    description: |
      按端点、消费者和方案分析API消费模式。
  BC-4270.50.30:
    name: API等级方案映射
    description: |
      将API访问等级映射至订阅方案和权益。
  BC-4270.60:
    name: 合作伙伴应用项目管理
    description: |
      管理第三方合作伙伴应用，包括上架、认证及收益分成。
  BC-4270.60.10:
    name: 合作伙伴应用上架管理
    description: |
      在平台应用目录中上架合作伙伴应用。
  BC-4270.60.20:
    name: 合作伙伴应用认证
    description: |
      按安全和质量标准对合作伙伴应用进行认证。
  BC-4270.60.30:
    name: 合作伙伴应用收益分成
    description: |
      与合作伙伴应用开发者签署收益分成安排。
  BC-4270.70:
    name: 软件市场上架管理
    description: |
      在第三方软件市场和云市场上架并管理SaaS产品。
  BC-4270.70.10:
    name: 市场上架内容编写
    description: |
      编写市场上架内容，包括元数据、定价及资产。
  BC-4270.70.20:
    name: 市场上架内容维护
    description: |
      随产品演进持续维护市场上架内容。
  BC-4270.70.30:
    name: 市场联合销售协调
    description: |
      与市场运营商协调联合销售（Co-Sell）动作。
  BC-4270.80:
    name: Webhook与事件订阅管理
    description: |
      管理出站Webhook订阅、事件规范及交付可靠性的生命周期。
  BC-4270.80.10:
    name: Webhook订阅生命周期
    description: |
      管理出站Webhook订阅从注册到退役的完整生命周期。
  BC-4270.80.20:
    name: 事件规范目录
    description: |
      维护出站事件规范目录及其兼容性保证。
  BC-4270.80.30:
    name: Webhook交付可靠性管理
    description: |
      管理出站Webhook交付的重试、退避及死信处理。

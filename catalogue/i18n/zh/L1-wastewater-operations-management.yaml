locale: zh
source: L1-wastewater-operations-management.yaml
entries:
  BC-3890:
    name: 废水运营管理
    description: |
      收集、处理和排放市政及工业废水，涵盖排水管网运营、废水处理厂工艺运营、堵塞与洪涝响应、污泥和生物固体管理、雨水溢流运营，以及最终出水水质合规管理。
  BC-3890.10:
    name: 排水管网运营
    description: |
      运营污水、雨水和合流排水管网，包括泵站和压力管。
  BC-3890.10.10:
    name: 排水泵站运营
    description: |
      运营和监测排水泵站及压力管。
  BC-3890.10.20:
    name: 排水管网监测
    description: |
      基于遥测监测排水管网液位和泵站报警。
  BC-3890.10.30:
    name: 排水管网清淤
    description: |
      对排水管道进行计划性和应急疏通、冲洗和清淤。
  BC-3890.20:
    name: 废水处理厂运营
    description: |
      运营废水处理厂的日常工艺，包括预处理、一级、二级和三级处理。
  BC-3890.20.10:
    name: 预处理与一级处理运营
    description: |
      运营格栅、除砂和初沉工艺步骤。
  BC-3890.20.20:
    name: 二级生物处理运营
    description: |
      运营活性污泥、滴滤池和膜生物反应器（MBR）二级工艺。
  BC-3890.20.30:
    name: 三级处理运营
    description: |
      运营脱氮除磷、过滤和消毒三级工艺步骤。
  BC-3890.20.40:
    name: 过程控制与优化
    description: |
      对生物和曝气工艺步骤进行过程控制和节能优化。
  BC-3890.30:
    name: 排水堵塞与洪涝响应
    description: |
      对排水管道堵塞、室内和室外排水洪涝及污染事件进行应急响应。
  BC-3890.30.10:
    name: 堵塞应急运营
    description: |
      通过冲洗和疏通对排水管道堵塞进行现场响应。
  BC-3890.30.20:
    name: 室内排水洪涝响应
    description: |
      对客户室内排水洪涝事件进行面向客户的响应处置。
  BC-3890.30.30:
    name: 室外排水洪涝响应
    description: |
      对室外排水洪涝和道路积水事件进行响应处置。
  BC-3890.30.40:
    name: 污染事件控制
    description: |
      对流向水体的污水污染事件进行围控和整治。
  BC-3890.40:
    name: 工业废水管理
    description: |
      对向公共排水管道排放的工业废水进行审批、监测和收费。
  BC-3890.40.10:
    name: 工业废水许可证管理
    description: |
      向工业排污方签发和变更工业废水排污许可证。
  BC-3890.40.20:
    name: 工业废水采样运营
    description: |
      按许可证条件对工业废水排放进行采样和分析。
  BC-3890.40.30:
    name: 工业废水收费
    description: |
      采用莫格登公式或同等方法计算工业废水收费。
  BC-3890.50:
    name: 污泥与生物固体管理
    description: |
      对废水污泥进行处理、资源化利用和处置，包括厌氧消化和生物固体农用回填。
  BC-3890.50.10:
    name: 污泥浓缩与脱水运营
    description: |
      运营污泥浓缩、脱水和离心系统。
  BC-3890.50.20:
    name: 厌氧消化运营
    description: |
      运营中温和高温厌氧消化池及沼气系统。
  BC-3890.50.30:
    name: 生物固体农用回田
    description: |
      按安全污泥制度将生物固体施用于农业土地。
  BC-3890.50.40:
    name: 污泥焚烧与处置运营
    description: |
      运营污泥焚烧和替代处置途径。
  BC-3890.60:
    name: 雨水溢流运营
    description: |
      运营、监测和报告合流排水溢流和紧急溢流，包括溢流持续时间监测。
  BC-3890.60.10:
    name: 溢流持续时间监测
    description: |
      在雨水和紧急溢流口安装和运营溢流持续时间监测仪（EDM）遥测装置。
  BC-3890.60.20:
    name: 雨水溢流排放报告
    description: |
      向监管机构和公众报告溢流排放量和持续时间。
  BC-3890.60.30:
    name: 调蓄水池运营
    description: |
      运营废水处理厂进水端的雨水调蓄池和平衡设施。
  BC-3890.70:
    name: 最终出水水质运营
    description: |
      按排放许可条件对最终出水水质进行采样、分析和监管报告。
  BC-3890.70.10:
    name: 排放许可合规采样
    description: |
      按数值排放标准开展运营商自行监测采样。
  BC-3890.70.20:
    name: 出水水质监测
    description: |
      对最终出水的BOD、氨氮和营养盐指标进行在线和实验室监测。
  BC-3890.70.30:
    name: 排放许可报告
    description: |
      向环境监管机构进行法定排放合规报告。

locale: zh
source: L1-reservation-booking-management.yaml
entries:
  BC-4020:
    name: 预订管理
    description: |
      管理预订、PNR及酒店账单的完整生命周期——捕获、变更、取消、团体房块、确认、付款及因航班扰动触发的重新预订，独立于预订来源渠道之外。
    in_scope:
      - 单程、多乘客及多组件行程的预订捕获
      - 预订变更、取消及退款资格
      - 团体房块、住客名单、截止日期及取房
      - 确认函、凭证及电子机票签发
      - 预订层面付款及BSP/ARC结算
      - 时刻表变更及IROPS重新安置
    out_of_scope:
      - 渠道与价格对等管理（BC-4010）
      - 定价引擎与收益决策（BC-4030）
      - 飞机与机组运营中断决策（BC-4080.60）
  BC-4020.10:
    name: 预订捕获
    description: |
      通过任何来源渠道或坐席，捕获简单及复杂旅行行程的预订。
  BC-4020.10.10:
    name: 单程预订捕获
    description: |
      捕获单程预订，如单一物业入住或单程航班预订。
  BC-4020.10.20:
    name: 多乘客预订捕获
    description: |
      捕获共享相同行程段的多乘客或多宾客预订。
  BC-4020.10.30:
    name: 多组件预订捕获
    description: |
      捕获组合了航班、酒店、附加服务及地面交通的多组件预订。
  BC-4020.10.40:
    name: 旅行代理预订捕获
    description: |
      捕获零售及企业旅行代理代表旅客发出的预订。
  BC-4020.20:
    name: 预订变更与取消
    description: |
      处理预订的自愿变更和取消，包括变更费、退款资格及重新签发操作。
  BC-4020.20.10:
    name: 预订变更管理
    description: |
      管理涵盖日期、产品及旅客信息的自愿预订变更。
  BC-4020.20.20:
    name: 预订取消管理
    description: |
      管理自愿取消及库存释放回池的操作。
  BC-4020.20.30:
    name: 退款资格与计算
    description: |
      确认退款资格并计算含罚金的可退金额。
  BC-4020.20.40:
    name: 自愿重新签发操作
    description: |
      处理自愿重新签发，包括收取票价差额及文件重新签发。
  BC-4020.30:
    name: 团体房块管理
    description: |
      管理合同库存的团体房块——房块创建、住客名单、截止日期及取房追踪。
    in_scope:
      - 团体房块从合同到核减与最终取房的完整生命周期
      - 住客名单的捕获与更新
    out_of_scope:
      - 团体销售合同（BC-4110.10）
      - 宴会活动单执行（BC-4110.30）
  BC-4020.30.10:
    name: 团体房块创建
    description: |
      创建反映合同库存和价格承诺的团体房块。
  BC-4020.30.20:
    name: 住客名单管理
    description: |
      管理将个人旅客与房块库存关联的住客名单。
  BC-4020.30.30:
    name: 团体截止日期管理
    description: |
      管理团体截止日期及将未使用房块库存释放回公开销售的操作。
  BC-4020.30.40:
    name: 团体取房追踪
    description: |
      追踪合同取房情况，用于收入确认和预测。
  BC-4020.40:
    name: 预订确认与文件管理
    description: |
      向旅客和代理签发预订确认函、凭证、电子机票及行程文件。
  BC-4020.40.10:
    name: 预订确认生成
    description: |
      通过通知渠道生成并发送预订确认函。
  BC-4020.40.20:
    name: 凭证与服务文件签发
    description: |
      为酒店、旅游及活动组件签发凭证和服务文件。
  BC-4020.40.30:
    name: 电子机票签发与重新签发
    description: |
      签发和重新签发航空电子机票，包括航段状态更新。
  BC-4020.40.40:
    name: 预订行程分发
    description: |
      向旅客、旅行代理及集成旅客管理系统分发行程文件。
  BC-4020.50:
    name: 预订保留与候补名单管理
    description: |
      在供应量受限或条款需要付款宽限期时，管理临时保留、候补名单及转换操作。
  BC-4020.50.10:
    name: 临时保留管理
    description: |
      管理设有可控付款宽限期窗口的临时保留。
  BC-4020.50.20:
    name: 候补名单捕获与优先排序
    description: |
      捕获候补名单请求，并制定当库存可用时的优先排序规则。
  BC-4020.50.30:
    name: 候补名单转换操作
    description: |
      在库存释放时将候补名单请求转换为已确认预订的操作。
  BC-4020.50.40:
    name: 保留过期管理
    description: |
      管理保留过期及已保留库存的自动释放。
  BC-4020.60:
    name: 预订付款与结算
    description: |
      处理预订层面的付款、押金、费用捕获及合作伙伴结算（包括BSP和ARC）。
  BC-4020.60.10:
    name: 预订押金与预授权
    description: |
      按押金和担保政策捕获预订押金及银行卡预授权。
  BC-4020.60.20:
    name: 预订费用捕获
    description: |
      在符合资格条件时向预订层面支付工具捕获费用。
  BC-4020.60.30:
    name: BSP与ARC结算操作
    description: |
      通过BSP、ARC及同等结算计划结算代理签发预订的操作。
  BC-4020.60.40:
    name: 佣金计算与支付
    description: |
      计算并向旅行代理和分销合作伙伴支付佣金。
  BC-4020.70:
    name: 预订中断与重新预订操作
    description: |
      对因时刻表变更、取消及大规模中断而受影响的预订进行重新安置，包括沟通通知和补偿资格认定。
    in_scope:
      - 时刻表变更重新安置
      - 大规模中断重新预订（IROPS、恶劣天气、不可抗力）
      - 依据航空公司及消费者规则进行补偿资格认定
    out_of_scope:
      - 飞机、机组及签派的运营决策（BC-4080.60）
      - 旅游侧行程恢复（BC-4100.60）
  BC-4020.70.10:
    name: 时刻表变更重新安置
    description: |
      对受已公布时刻表变更影响的预订进行重新安置，并向旅客提供选项。
  BC-4020.70.20:
    name: 大规模中断重新安置
    description: |
      在恶劣天气、IROPS或不可抗力事件期间，对大量预订进行重新安置。
  BC-4020.70.30:
    name: 补偿资格认定
    description: |
      依据航空公司政策和适用的旅客权益规则认定补偿资格。
  BC-4020.70.40:
    name: 重新安置沟通通知
    description: |
      在重新安置事件全程向受影响旅客和代理发送外发通知。

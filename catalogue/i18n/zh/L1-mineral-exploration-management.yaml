locale: zh
source: L1-mineral-exploration-management.yaml
entries:
  BC-4400:
    name: 矿产勘探管理
    description: |
      通过地质、地球化学和地球物理勘测、勘探钻探及钻孔样品化验，发现新矿化并评价勘探前景，最终完成发现报告和前景成熟度决策。
  BC-4400.10:
    name: 地球科学勘测管理
    description: |
      在勘探矿权范围内开展航空和地面地球物理、地球化学及地质勘测数据的采集、处理与解释。
    in_scope:
      - 航空磁法和电磁法勘测
      - 地面重力、激发极化和地震勘测
      - 土壤、水系沉积物和岩屑地球化学
      - 1:50000及项目比例尺地质填图
    out_of_scope:
      - 资源级钻孔地质编录（BC-4400.30）
      - 生产阶段地质对账（BC-4410.60）
  BC-4400.10.10:
    name: 航空地球物理勘测
    description: |
      在勘探区块开展航空磁法、电磁法、放射性和重力勘测数据采集。
  BC-4400.10.20:
    name: 地面地球物理勘测
    description: |
      在前景目标区开展地面重力、激发极化、电磁和地震勘测数据采集。
  BC-4400.10.30:
    name: 地球化学采样
    description: |
      开展土壤、水系沉积物、生物地球化学和岩屑采样工程，用于地球化学异常圈定。
  BC-4400.10.40:
    name: 地质填图
    description: |
      开展露头及前景目标区比例尺地质填图，以厘定岩性、构造和蚀变特征。
  BC-4400.10.50:
    name: 勘测数据解释
    description: |
      综合解释地球物理和地球化学数据集，用于靶区优选。
  BC-4400.20:
    name: 勘探靶区优选
    description: |
      通过矿床系统分析和成矿潜力建模，将区域和前景数据转化为经排序的钻探靶区。
    in_scope:
      - 矿床系统及矿化模型应用
      - 数据驱动的成矿潜力建模
      - 勘探线索和靶区排序
    out_of_scope:
      - 已发现矿化的资源量估算（BC-4410.20）
  BC-4400.20.10:
    name: 矿床系统分析
    description: |
      运用来源、运移、圈闭和保存等判别标准，厘定矿化系统。
  BC-4400.20.20:
    name: 成矿潜力建模
    description: |
      开展知识驱动和数据驱动的成矿潜力填图，以预测靶区位置。
  BC-4400.20.30:
    name: 靶区排序
    description: |
      按发现概率和潜在吨位对已生成靶区进行概率排序。
  BC-4400.20.40:
    name: 勘探线索库管理
    description: |
      维护经排序的勘探线索和靶区库及其成熟度路径。
  BC-4400.30:
    name: 勘探钻探运营
    description: |
      执行反循环、金刚石岩心及其他勘探钻探工程，包括孔斜测量、样品编录和钻探承包商监管。
    in_scope:
      - 反循环和气动潜孔锤钻探
      - 金刚石岩心钻探
      - 钻孔孔斜测量
    out_of_scope:
      - 爆破充填生产钻探（BC-4430.10）
      - 边坡设计岩土工程钻探（BC-4420.50）
  BC-4400.30.10:
    name: 反循环钻探
    description: |
      开展反循环和气动潜孔锤钻探，以回收勘探样品。
  BC-4400.30.20:
    name: 金刚石岩心钻探
    description: |
      开展金刚石岩心钻探，以获取定向和连续的岩性样品。
  BC-4400.30.30:
    name: 钻探样品编录
    description: |
      对岩屑和岩心进行地质、岩土工程和构造编录。
  BC-4400.30.40:
    name: 钻孔测量管理
    description: |
      开展孔内偏斜测量和孔口位置测量控制。
  BC-4400.30.50:
    name: 钻探承包商管理
    description: |
      开展钻探承包商的招募、动员和绩效管理。
  BC-4400.40:
    name: 样品与化验管理
    description: |
      在满足公开报告标准的有据可查质量保证制度下，对勘探样品进行保管、制备和化验协调。
    in_scope:
      - 样品监管链
      - 实验室选择和周转时间管理
      - 质量控制插入和监测
    out_of_scope:
      - 选矿厂化验（BC-4440.60）
      - 冶炼厂结算化验（BC-4450.70）
  BC-4400.40.10:
    name: 样品制备
    description: |
      对勘探样品进行破碎、分样和研磨，以备化验分析。
  BC-4400.40.20:
    name: 实验室化验协调
    description: |
      开展分析实验室的选择、样品派送和周转时间管理。
  BC-4400.40.30:
    name: 质量保证方案管理
    description: |
      插入和监测标准样、空白样和重复样，以支撑可报告化验质量。
  BC-4400.40.40:
    name: 标准物质管理
    description: |
      开展认证标准物质的采购、定值和分发。
  BC-4400.50:
    name: 勘探方案指导
    description: |
      跨矿种、管辖区和风险类别对勘探组合进行战略指引，包括投资分配和发现绩效追踪。
  BC-4400.50.10:
    name: 勘探战略制定
    description: |
      按矿种、管辖区和矿床类型制定勘探战略。
  BC-4400.50.20:
    name: 勘探投资分配
    description: |
      将勘探资本分配至区域和前景目标工程。
  BC-4400.50.30:
    name: 发现绩效追踪
    description: |
      追踪发现成本、资源量增加及向储量转化情况。
  BC-4400.60:
    name: 发现报告
    description: |
      对勘探结果进行内外部沟通，包括符合公开报告规范的合作伙伴和资本市场披露。
  BC-4400.60.10:
    name: 内部发现报告
    description: |
      对勘探结果、矿化交叉和靶区成熟度状态进行内部沟通。
  BC-4400.60.20:
    name: 公开勘探结果披露
    description: |
      按照 JORC、NI 43-101、SAMREC 及同等规范，披露勘探矿化交叉和结果。
  BC-4400.60.30:
    name: 勘探合资企业报告
    description: |
      向合资企业合作方和运营商报告勘探进展、支出和结果。

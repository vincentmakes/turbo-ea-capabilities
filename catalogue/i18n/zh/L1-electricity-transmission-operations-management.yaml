locale: zh
source: L1-electricity-transmission-operations-management.yaml
entries:
  BC-3810:
    name: 输电运营管理
    description: |
      运营高压输电网，涵盖控制中心调度、倒闸操作、线路和变电站运营、停电协调、继电保护，以及大型电力系统的实体和网络安全。
  BC-3810.10:
    name: 输电控制运营
    description: |
      利用能量管理系统/SCADA、态势感知和应急分析，对输电网络实施全天候控制中心运营。
  BC-3810.10.10:
    name: EMS运营
    description: |
      运营能量管理系统 (EMS)、状态估计器及应急分析工具。
  BC-3810.10.20:
    name: 输电SCADA运营
    description: |
      对输电资产进行实时SCADA数据采集和监控。
  BC-3810.10.30:
    name: 输电值班日志管理
    description: |
      维护值班日志、交接班记录及运行事件记录。
  BC-3810.20:
    name: 输电倒闸与隔离
    description: |
      规划并执行输电系统的倒闸、隔离及带电作业操作。
  BC-3810.20.10:
    name: 倒闸方案准备
    description: |
      为计划检修工作准备并核实倒闸方案。
  BC-3810.20.20:
    name: 工作许可签发
    description: |
      签发并管控输电设备上的工作许可证和试验批准书。
  BC-3810.20.30:
    name: 带电作业运营
    description: |
      协调带电线路和设备上的带电作业和带电检修。
  BC-3810.30:
    name: 输电线路运营
    description: |
      运营、巡检架空线路、铁塔及地下输电电缆，并开展带电作业。
  BC-3810.30.10:
    name: 架空线路巡视
    description: |
      对架空输电线路开展例行巡视、登塔检查和空中巡检。
  BC-3810.30.20:
    name: 地下电缆运营
    description: |
      运营高压电缆，开展局部放电监测和接头井管理。
  BC-3810.30.30:
    name: 线路走廊与植被清理
    description: |
      按NERC FAC-003或同等标准进行植被清除和线路走廊维护。
  BC-3810.30.40:
    name: 输电铁塔维护
    description: |
      对输电铁塔进行防腐涂装、基础和结构完整性维护。
  BC-3810.40:
    name: 变电站运营
    description: |
      运营和监测高压变电站、变压器、开关设备及无功补偿装置。
  BC-3810.40.10:
    name: 电力变压器运营
    description: |
      对高压变压器进行监测、溶解气体分析和分接开关操作。
  BC-3810.40.20:
    name: 开关设备运营
    description: |
      运营高压断路器和隔离开关并进行状态监测。
  BC-3810.40.30:
    name: 无功补偿运营
    description: |
      运营并联电容器、电抗器、SVC及STATCOM提供无功支撑。
  BC-3810.40.40:
    name: 高压直流换流站运营
    description: |
      运营高压直流换流站和直流联络线控制。
  BC-3810.50:
    name: 输电停电协调
    description: |
      对输电元件的计划性和紧急停电进行规划、排程和审批，并评估对系统运营商和市场的影响。
  BC-3810.50.10:
    name: 停电计划申报
    description: |
      向系统运营商申报和修订输电停电计划。
  BC-3810.50.20:
    name: 停电风险评估
    description: |
      评估拟议停电对系统安全和市场的影响。
  BC-3810.50.30:
    name: 强迫停运报告
    description: |
      向运营商和监管机构报告强迫停运和不可用情况。
  BC-3810.60:
    name: 输电保护与控制
    description: |
      整定、监测并分析输电保护和特殊保护方案的事后事件。
  BC-3810.60.10:
    name: 保护定值管理
    description: |
      计算、审批并下发继电保护定值。
  BC-3810.60.20:
    name: 特殊保护方案运营
    description: |
      运营和监测补救措施及特殊保护方案。
  BC-3810.60.30:
    name: 扰动事件分析
    description: |
      在电网事件后分析扰动录波和保护动作情况。
  BC-3810.70:
    name: 输电系统安全管理
    description: |
      保障大型电力系统的网络和实体安全，包括落实NERC CIP控制措施、周界安全及BES影响等级资产注册。
  BC-3810.70.10:
    name: BES网络资产识别
    description: |
      按NERC CIP-002识别并评定BES网络系统。
  BC-3810.70.20:
    name: 电子安全边界运营
    description: |
      运营电子安全边界和交互式远程访问控制。
  BC-3810.70.30:
    name: 实体安全边界运营
    description: |
      对控制中心和关键变电站实施实体安全控制（NERC CIP-014）。
  BC-3810.70.40:
    name: NERC CIP合规证据管理
    description: |
      收集NERC CIP标准的合规证据、完成认证并支持审计响应。

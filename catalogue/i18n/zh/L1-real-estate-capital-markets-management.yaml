locale: zh
source: L1-real-estate-capital-markets-management.yaml
entries:
  BC-4980:
    name: 房地产资本市场管理
    description: |
      房地产专项债权和股权资本市场学科，涵盖优先级、夹层、建设及过桥债务发起，贷款服务与资产管理，CMBS和商业房地产CLO结构设计，合资股权项目，REIT公开资本募集，再融资和资本重组，以及商业房地产贷款组合风险管理。有别于通用银行信贷（BC-1320）和企业资金管理（BC-210），以房地产抵押品惯例、IRP报告及DSCR/LTV约定为核心。
    in_scope:
      - 优先级、夹层、建设及过桥贷款发起
      - 贷款入库、约定监控、修改及特殊服务
      - CMBS和商业房地产CLO入池、结构设计及IRP报告
      - 合资股权来源拓展、超额收益和瀑布结构设计及合作方报告
      - REIT公开/私募股权、债务、ATM项目及分红政策
      - 再融资和资本重组执行
      - 商业房地产贷款组合集中度、压力测试和备抵
    out_of_scope:
      - 通用银行信贷和放贷（BC-1320）
      - 通用资本市场交易（BC-1370）
      - 基金组建和LP资本募集（BC-4910）
      - 收购交易执行（BC-4930）
  BC-4980.10:
    name: 房地产债务发起
    description: |
      依据资产和发起人评估，发起优先级、夹层、建设及过桥房地产债务。
  BC-4980.10.10:
    name: 优先级抵押贷款发起
    description: |
      对存量资产发起优先级抵押贷款。
  BC-4980.10.20:
    name: 建设与过桥贷款发起
    description: |
      为开发和过渡期资产发起建设和过桥贷款。
  BC-4980.10.30:
    name: 夹层与优先股权发起
    description: |
      发起资本层中的夹层债务和优先股权。
  BC-4980.10.40:
    name: 条款表与承诺谈判
    description: |
      与借款方和发起人谈判条款表和承诺函。
  BC-4980.20:
    name: 房地产债务服务与资产管理
    description: |
      对商业房地产贷款进行入库和服务，以及主动监控、修改和必要时的不良贷款处置。
  BC-4980.20.10:
    name: 贷款入库与服务设置
    description: |
      将新增商业房地产贷款入库至服务平台并设置还款和报告流程。
  BC-4980.20.20:
    name: 约定与DSCR监控
    description: |
      持续监控贷款约定、DSCR和LTV，对照贷款协议触发条件进行管理。
  BC-4980.20.30:
    name: 贷款修改与不良贷款处置
    description: |
      就压力资产谈判贷款修改和不良贷款处置方案。
  BC-4980.20.40:
    name: 特殊服务协调
    description: |
      就证券化中的违约和接近违约贷款与特殊服务方协调。
  BC-4980.30:
    name: CMBS与证券化管理
    description: |
      汇总贷款池，设计CMBS和商业房地产CLO交易结构，以及向投资人持续进行IRP报告。
  BC-4980.30.10:
    name: 贷款池汇总
    description: |
      汇总符合证券化条件的贷款池。
  BC-4980.30.20:
    name: 证券化结构设计
    description: |
      设计CMBS和商业房地产CLO交易结构，包括分层和评级。
  BC-4980.30.30:
    name: IRP投资人报告
    description: |
      依据CREFC投资人报告包开展投资人报告工作。
  BC-4980.30.40:
    name: 受托人与服务方协调
    description: |
      就存续交易与受托人、主服务方和评级机构协调。
  BC-4980.40:
    name: 合资与股权合作方管理
    description: |
      来源拓展合资股权，设计超额收益和瀑布安排，并向合作方持续报告和分配。
  BC-4980.40.10:
    name: 合资股权来源拓展
    description: |
      向机构投资人和高净值合作方来源拓展合资股权。
  BC-4980.40.20:
    name: 超额收益与瀑布结构设计
    description: |
      在合资合伙协议中设计超额收益、门槛回报和瀑布条款。
  BC-4980.40.30:
    name: 合资合作方报告与分配
    description: |
      向合资合作方报告并执行合同规定的分配。
  BC-4980.50:
    name: REIT资本市场管理
    description: |
      REIT公开和私募股权及债务发行、ATM项目及分红政策管理。
  BC-4980.50.10:
    name: REIT公开股权发行
    description: |
      通过后续公开发行和私募配售发行REIT股权。
  BC-4980.50.20:
    name: REIT债务与债券发行
    description: |
      发行REIT无担保债务、债券和可交换票据。
  BC-4980.50.30:
    name: ATM项目管理
    description: |
      管理市价发行股权项目，包括节奏控制和信息披露。
  BC-4980.50.40:
    name: 分红政策管理
    description: |
      管理与REIT分配要求和AFFO对齐的REIT分红政策。
  BC-4980.60:
    name: 再融资与资本重组管理
    description: |
      在持有期内主动对存量资产资本层进行再融资和资本重组。
  BC-4980.60.10:
    name: 再融资战略与节奏
    description: |
      定义组合内到期日的再融资战略和节奏。
  BC-4980.60.20:
    name: 再融资执行
    description: |
      在单项资产和贷款池层面执行再融资交易。
  BC-4980.60.30:
    name: 资本重组
    description: |
      通过合作方资本重组或股权注入对资本层进行重组。
  BC-4980.70:
    name: 房地产贷款组合风险管理
    description: |
      对商业房地产贷款组合开展集中度监控、压力测试、损失备抵及观察名单管理。
  BC-4980.70.10:
    name: LTV/DSCR集中度监控
    description: |
      监控商业房地产贷款组合中LTV和DSCR的集中度。
  BC-4980.70.20:
    name: 商业房地产贷款压力测试
    description: |
      对商业房地产贷款组合开展利率、空置率和价值冲击下的压力测试。
  BC-4980.70.30:
    name: CECL/IFRS 9损失备抵（商业房地产）
    description: |
      在CECL和IFRS 9预期信用损失框架下对商业房地产组合计提损失备抵。
  BC-4980.70.40:
    name: 观察名单与违约跟踪
    description: |
      维护观察名单并跟踪组合中的违约贷款。

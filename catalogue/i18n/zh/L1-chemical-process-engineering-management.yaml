locale: zh
source: L1-chemical-process-engineering-management.yaml
entries:
  BC-4610:
    name: 化工过程工程管理
    description: |
      开展化工装置和改造项目的工艺设计、物质和能量平衡工程、模拟、设备规格制定及前端工程设计。有别于保留通用工程学科的跨行业工程学科管理（BC-1100）。
  BC-4610.10:
    name: 工艺流程设计
    description: |
      为化工过程编制方块流程图、工艺流程图和管道仪表图。
  BC-4610.10.10:
    name: 方块流程图编制
    description: |
      编制早期工艺定义的方块流程图。
  BC-4610.10.20:
    name: 工艺流程图编制
    description: |
      编制带物流条件和性质的工艺流程图。
  BC-4610.10.30:
    name: 管道仪表图编制
    description: |
      为化工工艺单元编制和修订管道仪表图（P&ID）。
  BC-4610.10.40:
    name: 公用工程流程图编制
    description: |
      编制涵盖蒸汽、冷却水和惰性气体的公用工程流程图。
  BC-4610.20:
    name: 反应器与分离设备规格
    description: |
      基于动力学、热力学和单元操作原理，对反应器和分离设备进行规格设计。
  BC-4610.20.10:
    name: 反应器设计
    description: |
      对连续搅拌釜式、推流和固定床反应器进行规格设计。
  BC-4610.20.20:
    name: 蒸馏塔设计
    description: |
      设计板式和填料蒸馏塔，包括塔内件。
  BC-4610.20.30:
    name: 换热器网络设计
    description: |
      开展夹点分析和换热器网络设计，实现能量集成。
  BC-4610.20.40:
    name: 结晶器与过滤器规格
    description: |
      对结晶器、离心机和过滤设备进行规格设计。
  BC-4610.30:
    name: 物质与能量平衡工程
    description: |
      完成全厂和单元级物质和能量平衡，并估算公用工程需求。
  BC-4610.30.10:
    name: 物料平衡计算
    description: |
      计算和对账全厂及单元物料平衡。
  BC-4610.30.20:
    name: 能量平衡计算
    description: |
      计算反应器、换热器和公用工程的能量平衡。
  BC-4610.30.30:
    name: 公用工程需求估算
    description: |
      估算蒸汽、电力、冷却水和惰性气体需求。
  BC-4610.40:
    name: 过程模拟管理
    description: |
      构建和维护支持设计和运营的稳态和动态过程模拟。
  BC-4610.40.10:
    name: 稳态过程模拟
    description: |
      构建和运行用于设计和分析的稳态模拟器。
  BC-4610.40.20:
    name: 动态过程模拟
    description: |
      构建和运行用于控制和安全研究的动态模拟器。
  BC-4610.40.30:
    name: 模拟模型验证
    description: |
      用装置或中试数据验证模拟模型。
  BC-4610.50:
    name: 设备规格管理
    description: |
      编制和全生命周期管理设备数据表及供应商图纸。
  BC-4610.50.10:
    name: 设备数据表编制
    description: |
      编制机械、电气和仪表数据表。
  BC-4610.50.20:
    name: 设备规格维护
    description: |
      对已批准设备规格进行配置管理。
  BC-4610.50.30:
    name: 供应商图纸审查
    description: |
      对照数据表和工艺要求审查供应商图纸。
  BC-4610.60:
    name: 装置布置与平面图工程
    description: |
      制定化工设施的总平面图、设备间距和危险区域划分方案。
  BC-4610.60.10:
    name: 总平面图制定
    description: |
      制定单元和全场地总平面图。
  BC-4610.60.20:
    name: 设备间距确定
    description: |
      按过程安全和施工可行性确定设备间距。
  BC-4610.60.30:
    name: 危险区域划分
    description: |
      划分用于点火源控制的危险区域。
  BC-4610.70:
    name: 过程控制哲学制定
    description: |
      为新建和改造装置制定过程控制策略、先进控制和操作规程基础。
  BC-4610.70.10:
    name: 控制回路定义
    description: |
      定义调节控制回路和整定意图。
  BC-4610.70.20:
    name: 先进过程控制策略
    description: |
      定义模型预测和先进控制策略。
  BC-4610.70.30:
    name: 操作规程基础制定
    description: |
      为新建和改造装置制定操作规程基础。
  BC-4610.80:
    name: 前端工程设计协调
    description: |
      协调化工项目的概念、基础和前端工程设计包。
  BC-4610.80.10:
    name: 概念工程协调
    description: |
      协调概念工程研究和方案筛选。
  BC-4610.80.20:
    name: 基础工程包编制
    description: |
      编制移交给详细设计的基础工程包。
  BC-4610.80.30:
    name: 前端工程设计验证
    description: |
      对照工艺和项目要求验证前端工程设计交付物。

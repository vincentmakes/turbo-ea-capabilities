locale: zh
source: L1-retail-site-network-planning-management.yaml
entries:
  BC-2350:
    name: 门店网络规划管理
    description: |
      负责实体零售网络的选址、定规模及全生命周期管理，涵盖商圈分析、格式选择、空白市场识别及逐店绩效生命周期决策。
  BC-2350.10:
    name: 商圈与客群分析
    description: |
      为潜在及现有门店划定商圈范围，开展客流量与人口微观分析，评估竞争密度。
  BC-2350.10.10:
    name: 商圈范围划定
    description: |
      利用驾车时间、人口密度及地理屏障划定商圈范围。
  BC-2350.10.20:
    name: 人口微观分析
    description: |
      对商圈开展微观人口及生活方式分析。
  BC-2350.10.30:
    name: 客流量与移动数据分析
    description: |
      分析客流规律、移动数据及行人流向。
  BC-2350.10.40:
    name: 竞争密度分析
    description: |
      分析商圈内竞争对手密度及市场份额。
  BC-2350.20:
    name: 门店格式选择管理
    description: |
      针对特定商圈及战略目标，选择合适的门店格式——大卖场、超市、便利店、专卖店或暗仓。
    in_scope:
      - 按商圈及购物目的选择格式
      - 网络格式组合管理
      - 各格式的规模与面积确定
    out_of_scope:
      - 门店内部详细设计（BC-2310.60）
  BC-2350.20.10:
    name: 按商圈选择格式
    description: |
      基于购物者目的，为各商圈选择合适的门店格式。
  BC-2350.20.20:
    name: 格式规模与面积确定
    description: |
      按各格式确定销售区、后场及总面积。
  BC-2350.20.30:
    name: 格式组合规划
    description: |
      规划网络格式组合及格式迁移路径。
  BC-2350.30:
    name: 网络布局优化
    description: |
      通过空白市场识别、自我蚕食分析及覆盖率优化，提升网络布局效率。
  BC-2350.30.10:
    name: 空白市场识别
    description: |
      识别服务不足的商圈及空白市场机会。
  BC-2350.30.20:
    name: 自我蚕食建模
    description: |
      建模分析新店开业对现有门店的自我蚕食影响。
  BC-2350.30.30:
    name: 覆盖率与辐射范围优化
    description: |
      优化目标市场的覆盖率与辐射范围。
  BC-2350.40:
    name: 门店绩效生命周期管理
    description: |
      基于绩效表现与商圈变化，对各门店进行迁址、翻新、降级或关闭等生命周期决策。
  BC-2350.40.10:
    name: 门店绩效诊断
    description: |
      诊断绩效欠佳门店，包括商圈变化分析。
  BC-2350.40.20:
    name: 门店迁址与翻新决策
    description: |
      评估并决定门店迁址或翻新方案。
  BC-2350.40.30:
    name: 门店关闭决策
    description: |
      制定门店关闭决策，评估利益相关方及库存影响。
  BC-2350.50:
    name: 零售房产需求管理
    description: |
      向企业房产团队提交零售专属选址需求，用于物业获取、租约谈判及退出。
    in_scope:
      - 零售专属选址需求文件
      - 移交企业房产采购团队（BC-710.20）
      - 零售专属退出需求（如经营限制）
    out_of_scope:
      - 租约谈判与管理（BC-710.20，BC-710.30）
  BC-2350.50.10:
    name: 零售选址需求撰写
    description: |
      撰写包含格式及邻近关系要求的零售专属选址需求文件。
  BC-2350.50.20:
    name: 零售退出需求撰写
    description: |
      撰写包含经营限制条款立场的零售专属退出需求文件。

locale: zh
source: L1-clinical-care-delivery-management.yaml
entries:
  BC-2810:
    name: 临床护理提供管理
    description: |
      在住院、门诊、急诊、外科手术、母婴、行为健康、康复和居家护理场景中提供直接临床护理服务。
  BC-2810.10:
    name: 住院护理提供
    description: |
      提供急性期、中间期和重症住院护理，包括入院评估、查房、床旁护理和重症监护运营。
  BC-2810.10.10:
    name: 入院评估
    description: |
      完成入院时的病史体格检查、护理评估和风险筛查。
  BC-2810.10.20:
    name: 临床查房
    description: |
      开展床旁多学科临床查房和护理计划制定。
  BC-2810.10.30:
    name: 床旁护理
    description: |
      提供直接护理和临床床旁护理，包括日常生活活动支持。
  BC-2810.10.40:
    name: 重症监护运营
    description: |
      开展重症监护运营，包括呼吸机管理、血流动力学监测和持续监护护理。
  BC-2810.20:
    name: 门诊护理提供
    description: |
      在门诊和日间医院场景中提供日间手术、远程医疗及门诊诊疗和治疗服务。
  BC-2810.20.10:
    name: 门诊就诊
    description: |
      开展诊室和门诊就诊，包括初级和专科会诊。
  BC-2810.20.20:
    name: 门诊诊疗操作
    description: |
      提供当日和日间诊疗操作，包括小手术和输液治疗。
  BC-2810.20.30:
    name: 远程医疗诊疗
    description: |
      提供同步和异步远程医疗诊疗服务。
  BC-2810.20.40:
    name: 门诊治疗给药
    description: |
      实施化疗、透析和输液等门诊治疗的给药。
  BC-2810.30:
    name: 急诊护理提供
    description: |
      为非计划就诊患者提供急诊分诊、稳定处置、创伤响应和去向决策服务。
  BC-2810.30.10:
    name: 急诊分诊
    description: |
      对急诊就诊患者进行分诊和病情分级。
  BC-2810.30.20:
    name: 急诊稳定处置
    description: |
      对急重症患者进行初步评估、复苏和稳定处置。
  BC-2810.30.30:
    name: 创伤响应
    description: |
      启动创伤激活、团队响应和重大创伤的损伤控制救治。
  BC-2810.30.40:
    name: 急诊去向决策
    description: |
      作出去向决策，包括从急诊科住院、转院、留观和出院。
  BC-2810.40:
    name: 外科手术与操作护理提供
    description: |
      为手术室和操作室中的外科和介入手术提供术前、术中和术后护理。
  BC-2810.40.10:
    name: 术前护理
    description: |
      完成术前评估、优化和候手术区护理。
  BC-2810.40.20:
    name: 术中管理
    description: |
      提供术中外科、麻醉和巡回团队护理。
  BC-2810.40.30:
    name: 麻醉后护理
    description: |
      提供麻醉后复苏室恢复护理和出室准备评估。
  BC-2810.40.40:
    name: 内镜与介入诊疗操作
    description: |
      提供内镜、介入放射和介入心脏病学诊疗操作服务。
  BC-2810.50:
    name: 母婴护理提供
    description: |
      在产科和新生儿科提供产前、产时、产后和新生儿护理。
  BC-2810.50.10:
    name: 产前护理
    description: |
      开展产前评估、筛查和高危妊娠住院管理。
  BC-2810.50.20:
    name: 产时护理
    description: |
      管理产程和分娩，包括剖宫产和手术助产。
  BC-2810.50.30:
    name: 产后护理
    description: |
      提供产后母体恢复、母乳喂养支持和产后宣教。
  BC-2810.50.40:
    name: 新生儿护理
    description: |
      提供健康新生儿病房护理、筛查和重症新生儿监护服务。
  BC-2810.60:
    name: 行为健康护理提供
    description: |
      提供涵盖精神科评估、住院精神病房、门诊心理治疗和物质使用治疗的行为健康护理。
  BC-2810.60.10:
    name: 精神科评估
    description: |
      开展精神科和心理评估及危机干预。
  BC-2810.60.20:
    name: 住院行为健康护理
    description: |
      提供住院精神科护理，包括治疗性环境和药物治疗。
  BC-2810.60.30:
    name: 门诊行为健康治疗
    description: |
      提供门诊心理治疗、团体治疗和部分住院项目。
  BC-2810.60.40:
    name: 物质使用治疗
    description: |
      提供脱毒、药物辅助治疗和物质使用康复服务。
  BC-2810.70:
    name: 康复与治疗服务
    description: |
      在住院和门诊场景提供物理治疗、职业治疗、言语语言治疗和心肺康复服务。
  BC-2810.70.10:
    name: 物理治疗
    description: |
      在住院和门诊场景开展物理治疗评估和治疗。
  BC-2810.70.20:
    name: 职业治疗
    description: |
      开展以功能独立性为目标的职业治疗评估和治疗。
  BC-2810.70.30:
    name: 言语语言治疗
    description: |
      提供言语、语言和吞咽治疗服务。
  BC-2810.70.40:
    name: 心脏与肺部康复
    description: |
      开展心脏和肺部康复项目的治疗服务。
  BC-2810.80:
    name: 居家与社区护理提供
    description: |
      在患者居家或社区场所提供护理，包括居家健康访视、安宁疗护和远程监护。
  BC-2810.80.10:
    name: 居家健康访视
    description: |
      提供熟练居家健康访视，包括居家护理和治疗。
  BC-2810.80.20:
    name: 安宁与姑息居家护理
    description: |
      在家中提供临终期和姑息护理服务。
  BC-2810.80.30:
    name: 社区健康访视
    description: |
      开展社区健康工作者访视和外展项目。
  BC-2810.80.40:
    name: 远程监护护理
    description: |
      为慢病和亚急性后期人群提供远程患者监护服务。

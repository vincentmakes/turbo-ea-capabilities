locale: zh
source: L1-electoral-administration-management.yaml
entries:
  BC-3330:
    name: 选举行政管理
    description: |
      选举行政管理，涵盖选民登记、选区管理、候选人和政党登记、选票设计与制作、投票运营、计票与结果汇总，以及竞选经费披露。
  BC-3330.10:
    name: 选民登记管理
    description: |
      维护权威选民名册，包括登记、地址变更和名册维护工作。
    in_scope:
      - 选民注册和重新登记
      - 选民名册维护
      - 资格核验
    out_of_scope:
      - 民事身份登记（由民事登记与身份登记管理覆盖）
  BC-3330.10.10:
    name: 选民注册
    description: |
      通过各渠道将符合条件的选民注册至选民名册。
  BC-3330.10.20:
    name: 选民名册维护
    description: |
      开展名册维护，包括地址更新、已故选民注销和重复处理。
  BC-3330.10.30:
    name: 选民资格核验
    description: |
      依据公民身份、年龄和居住地标准核验选民资格。
  BC-3330.10.40:
    name: 选民信息提供
    description: |
      提供选民卡、投票站查询和选民教育信息。
  BC-3330.20:
    name: 选区与选举区管理
    description: |
      维护选举区、投票站地理范围及选区重划周期。
  BC-3330.20.10:
    name: 选举区维护
    description: |
      维护选举区和选区边界。
  BC-3330.20.20:
    name: 投票站指定
    description: |
      指定投票站，开展无障碍评估并发布公告。
  BC-3330.20.30:
    name: 选区重划协调
    description: |
      协调法定选区重划和边界委员会周期工作。
  BC-3330.30:
    name: 候选人与政党登记
    description: |
      登记政党、候选人、提名申报和上票资格。
  BC-3330.30.10:
    name: 政党登记
    description: |
      登记和认可政党及政党标识。
  BC-3330.30.20:
    name: 候选人提名申报
    description: |
      接收和核实候选人提名及法定声明。
  BC-3330.30.30:
    name: 上票资格确定
    description: |
      确定上票资格，包括签名要求和入围门槛。
  BC-3330.40:
    name: 选票设计与制作
    description: |
      设计、排版、无障碍、翻译和制作纸质及电子格式选票。
  BC-3330.40.10:
    name: 选票版式设计
    description: |
      为选票设计排版，确保清晰度、无障碍性和语言覆盖。
  BC-3330.40.20:
    name: 选票翻译与无障碍
    description: |
      为残障选民提供翻译选票和无障碍格式。
  BC-3330.40.30:
    name: 选票制作与分发
    description: |
      印制、编程和安全分发纸质和电子选票。
  BC-3330.50:
    name: 投票运营
    description: |
      依据VVSG相关管控，在选举日运营投票站，包括投票工作人员管理、选民签到和选票投出。
  BC-3330.50.10:
    name: 投票工作人员管理
    description: |
      招募、培训和部署投票工作人员和选举官员。
  BC-3330.50.20:
    name: 选民签到
    description: |
      在投票站开展选民签到、身份核验和选票发放。
  BC-3330.50.30:
    name: 现场投票
    description: |
      在纸质或VVSG认证投票设备上开展现场投票。
  BC-3330.50.40:
    name: 缺席与邮寄投票运营
    description: |
      支持缺席投票、邮寄投票和海外投票运营。
  BC-3330.60:
    name: 计票与结果汇总
    description: |
      开展选票统计、结果汇总、审计和选举结果认证。
  BC-3330.60.10:
    name: 选票统计
    description: |
      依据法定程序统计纸质和电子选票。
  BC-3330.60.20:
    name: 结果汇总与报告
    description: |
      汇总各投票站结果并向公众报告。
  BC-3330.60.30:
    name: 选后审计
    description: |
      开展风险限制型和选后计票及设备审计。
  BC-3330.60.40:
    name: 选举认证
    description: |
      对选举结果进行法定认证，并宣布当选官员。
  BC-3330.70:
    name: 竞选经费披露
    description: |
      登记政治委员会，开展捐款和支出披露，以及竞选经费限制执法。
  BC-3330.70.10:
    name: 政治委员会登记
    description: |
      登记政治委员会、政党和PAC同等实体。
  BC-3330.70.20:
    name: 捐款与支出报告
    description: |
      接收、核实和发布捐款及支出披露信息。
  BC-3330.70.30:
    name: 竞选经费执法
    description: |
      调查和执法竞选经费限制和披露违规行为。

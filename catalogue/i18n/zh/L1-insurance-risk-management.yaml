locale: zh
source: L1-insurance-risk-management.yaml
entries:
  BC-2190:
    name: 保险风险管理
    description: |
      保险特定风险类型管理，涵盖承保风险、巨灾与积聚风险、准备金风险、偿付能力和资本风险、再保险交易对手风险、寿险与长寿风险、失效风险，以及保险运营和行为风险，有别于通用企业风险管理。
  BC-2190.10:
    name: 承保风险管理
    description: |
      承保风险偏好设定、限额监控及逆向选择监控管理。
  BC-2190.10.10:
    name: 承保风险偏好
    description: |
      定义和阐明承保风险偏好。
  BC-2190.10.20:
    name: 承保限额监控
    description: |
      监控承保权限和积聚限额。
  BC-2190.10.30:
    name: 逆向选择监控
    description: |
      监控逆向选择和反向选择模式。
  BC-2190.20:
    name: 巨灾与积聚风险管理
    description: |
      风险暴露积聚监控、PML 和现实灾难情景管理，以及巨灾缓释规划。
  BC-2190.20.10:
    name: 风险暴露积聚监控
    description: |
      按风险因素、地理区域和使用性质监控风险暴露积聚。
  BC-2190.20.20:
    name: PML 与现实灾难情景管理
    description: |
      管理 PML 和现实灾难情景。
  BC-2190.20.30:
    name: 巨灾风险缓释规划
    description: |
      规划缓释措施，包括再保险和风险转移安排。
  BC-2190.30:
    name: 保险准备金风险管理
    description: |
      准备金充足性监控、准备金波动分析及准备金风险压力测试。
  BC-2190.30.10:
    name: 准备金充足性监控
    description: |
      对比最优估计和外部基准监控准备金充足性。
  BC-2190.30.20:
    name: 准备金波动分析
    description: |
      分析准备金波动性和一年期准备金风险。
  BC-2190.30.30:
    name: 准备金风险压力测试
    description: |
      对准备金充足性进行压力和情景测试。
  BC-2190.40:
    name: 偿付能力与资本风险管理
    description: |
      资本充足性监控、ORSA 运营、偿付能力压力测试及恢复与处置规划。
  BC-2190.40.10:
    name: 资本充足性监控
    description: |
      监控偿付能力资本比率和资本触发指标。
  BC-2190.40.20:
    name: ORSA 运营
    description: |
      运营自身风险和偿付能力评估（ORSA）周期。
  BC-2190.40.30:
    name: 偿付能力压力与情景测试
    description: |
      对偿付能力状况进行压力和反向压力测试。
  BC-2190.40.40:
    name: 恢复与处置规划
    description: |
      保险人清盘情景的恢复与处置规划。
  BC-2190.50:
    name: 再保险交易对手与信用风险管理
    description: |
      再保险人交易对手监控、担保品充足性及交易对手违约压力测试。
  BC-2190.50.10:
    name: 再保险人交易对手监控
    description: |
      监控再保险人财务实力和敞口集中度。
  BC-2190.50.20:
    name: 担保品与信用证充足性监控
    description: |
      监控再保险人担保品和信用证的充足性。
  BC-2190.50.30:
    name: 交易对手违约压力测试
    description: |
      对再保险人违约对偿付能力的影响进行压力测试。
  BC-2190.60:
    name: 寿险与长寿风险管理
    description: |
      死亡率风险监控、长寿对冲监督及疫情风险管理。
  BC-2190.60.10:
    name: 死亡率风险监控
    description: |
      监控寿险和保障组合的死亡率风险。
  BC-2190.60.20:
    name: 长寿风险对冲监督
    description: |
      监督长寿对冲工具和交易对手敞口。
  BC-2190.60.30:
    name: 疫情风险管理
    description: |
      管理流行病和疫情的死亡率和发病率风险。
  BC-2190.70:
    name: 失效与持续率风险管理
    description: |
      失效风险监控和持续率压力测试管理。
  BC-2190.70.10:
    name: 失效风险监控
    description: |
      监控寿险和储蓄产品的失效率和失效驱动损失。
  BC-2190.70.20:
    name: 持续率压力测试
    description: |
      对持续率假设和动态失效行为进行压力测试。
  BC-2190.80:
    name: 保险运营与行为风险管理
    description: |
      保险行为风险、理赔处理风险及分销风险监控。
  BC-2190.80.10:
    name: 保险行为风险监控
    description: |
      监控产品、分销和理赔中的行为风险指标。
  BC-2190.80.20:
    name: 理赔处理风险监督
    description: |
      监督理赔处理风险和投保人公平对待成果。
  BC-2190.80.30:
    name: 分销风险监控
    description: |
      监控分销风险，包括销售误导和中介行为。

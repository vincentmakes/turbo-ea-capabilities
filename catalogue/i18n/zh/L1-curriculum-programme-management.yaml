locale: zh
source: L1-curriculum-programme-management.yaml
entries:
  BC-4700:
    name: 课程与课程项目管理
    description: |
      对学术课程项目、课程、模块、资质及其支撑学习成果的定义、架构设计、治理与持续改进。
  BC-4700.10:
    name: 课程项目架构设计
    description: |
      定义课程项目结构、资质层级、学分权重及学术学位的预期学习成果。
    in_scope:
      - 课程项目结构与路径定义
      - 学位及资质认证结构
      - 课程项目层面的预期学习成果
    out_of_scope:
      - 课程层面的教学大纲编写（见课程与模块设计）
      - 外部认证结果（见学术质量与认证管理）
  BC-4700.10.10:
    name: 课程项目定义
    description: |
      定义课程项目目标、目标受众、入学要求及整体结构。
  BC-4700.10.20:
    name: 资质与证书结构设计
    description: |
      设计学位、学分及可叠加证书路径的结构。
  BC-4700.10.30:
    name: 学习成果定义
    description: |
      阐明课程项目和课程层面的预期学习成果。
  BC-4700.20:
    name: 课程与模块设计
    description: |
      对构成学术课程项目的各门课程、模块及学习单元进行规格说明与编写。
    in_scope:
      - 课程规格说明与模块描述
      - 教学大纲编写与审批
      - 单元级学习目标及考核方案
    out_of_scope:
      - 教学材料的制作（见教育内容与学习资源管理）
  BC-4700.20.10:
    name: 课程规格说明
    description: |
      正式课程规格说明与课程描述的编写与审批。
  BC-4700.20.20:
    name: 模块与单元设计
    description: |
      设计课程内部的模块和学习单元。
  BC-4700.20.30:
    name: 教学大纲编写
    description: |
      编写列明每门课程内容、教学方法与考核方式的教学大纲。
  BC-4700.30:
    name: 课程体系映射与对齐
    description: |
      将课程内容映射至能力框架、资质框架以及后续技能或职业路径，实现有效对齐。
    in_scope:
      - 能力与课程体系映射
      - 与ISCED、EQF、NQF及等效框架的对齐
      - 技能与职业路径映射
    out_of_scope:
      - 学习者个人技能达成情况（见考试与评估管理）
  BC-4700.30.10:
    name: 能力框架对齐
    description: |
      将课程体系与已定义的能力框架（如CASE）进行对齐。
  BC-4700.30.20:
    name: 资质框架映射
    description: |
      将资质映射至ISCED、EQF、NQF及类似参考框架。
  BC-4700.30.30:
    name: 技能与职业路径映射
    description: |
      将课程体系映射至职业、专业及就业路径。
  BC-4700.40:
    name: 课程项目目录管理
    description: |
      面向潜在及在校学习者，对机构提供的课程项目与课程目录进行编写、版本管理与发布。
    in_scope:
      - 目录编写与编辑工作流
      - 目录版本控制与生效日期管理
      - 内部及公开目录发布
    out_of_scope:
      - 招生营销材料（见招生管理）
  BC-4700.40.10:
    name: 目录编写
    description: |
      编写课程项目、课程及模块的目录条目。
  BC-4700.40.20:
    name: 目录版本控制与生效日期管理
    description: |
      对目录条目进行版本控制和生效日期管理。
  BC-4700.40.30:
    name: 目录发布
    description: |
      向内部和公众发布课程项目与课程目录。
  BC-4700.50:
    name: 课程项目审批与治理
    description: |
      新增、修改及停办课程项目的内外部审批流程，包括暂停与关闭决策。
    in_scope:
      - 内部学术审批与治理
      - 外部监管机构与专业协会审批
      - 课程项目暂停与有序关闭
    out_of_scope:
      - 日常课程审查（见课程审查与持续改进）
      - 周期性认证（见学术质量与认证管理）
  BC-4700.50.10:
    name: 内部课程项目审批
    description: |
      对新增及修改课程项目进行内部学术审批。
  BC-4700.50.20:
    name: 外部课程项目审批
    description: |
      由外部监管机构、主管部门或专业协会对课程项目进行审批。
  BC-4700.50.30:
    name: 课程项目暂停与关闭
    description: |
      有序推进课程项目暂停、教学收尾及关闭工作。
  BC-4700.60:
    name: 课程审查与持续改进
    description: |
      基于学习成果、利益相关方反馈及外部要求，对课程内容进行定期审查与改进。
    in_scope:
      - 课程定期审查周期
      - 利益相关方、雇主及学生反馈
      - 课程变更实施跟踪
    out_of_scope:
      - 课程项目质量保证审查（见学术质量与认证管理）
  BC-4700.60.10:
    name: 课程定期审查
    description: |
      对课程有效性与相关性进行周期性审查。
  BC-4700.60.20:
    name: 利益相关方课程反馈
    description: |
      收集学生、雇主及顾问委员会对课程设计的意见。
  BC-4700.60.30:
    name: 课程变更实施
    description: |
      对已审批课程变更的跟踪与落实。

locale: zh
source: L1-mineral-processing-operations-management.yaml
entries:
  BC-4440:
    name: 选矿运营管理
    description: |
      通过破碎、选别、浸出和精矿处理，将原矿转化为可销售精矿或中间产品的选矿厂和湿法冶金运营。
  BC-4440.10:
    name: 原矿堆管理
    description: |
      管理矿山与选矿厂之间的原矿堆，包括取矿、配矿和库存对账。
    in_scope:
      - 原矿堆取矿和配矿
      - 矿堆库存对账
    out_of_scope:
      - 坑内矿块分配（BC-4430.40.40）
      - 精矿堆场（BC-4440.50.30）
  BC-4440.10.10:
    name: 原矿堆取矿
    description: |
      通过板式给料机或前端装载机从原矿堆取矿送入选矿厂。
  BC-4440.10.20:
    name: 矿石配矿
    description: |
      配混矿堆物料以达到目标品位和冶金特性。
  BC-4440.10.30:
    name: 矿堆库存对账
    description: |
      将测量、调度和取矿数据整合为矿堆库存余额。
  BC-4440.20:
    name: 碎磨运营
    description: |
      开展将矿石破碎至解离粒度的破碎、磨矿和流程优化作业。
  BC-4440.20.10:
    name: 破碎运营
    description: |
      操作一段、二段和三段破碎站。
  BC-4440.20.20:
    name: 磨矿机运营
    description: |
      操作 SAG、AG、球磨和棒磨机及配套分级设备。
  BC-4440.20.30:
    name: 碎磨流程优化
    description: |
      对碎磨流程进行处理量、P80 和能耗强度的过程优化。
  BC-4440.30:
    name: 选别运营
    description: |
      通过浮选、重力、磁选和重介质分选，对有价矿物进行物理富集。
  BC-4440.30.10:
    name: 浮选流程运营
    description: |
      操作粗选、扫选和精选浮选流程及药剂添加。
  BC-4440.30.20:
    name: 重力选矿
    description: |
      操作跳汰机、螺旋溜槽和离心选矿机，处理重力可选矿物。
  BC-4440.30.30:
    name: 磁选
    description: |
      开展铁磁性和顺磁性矿物的弱磁和强磁分选。
  BC-4440.30.40:
    name: 重介质分选
    description: |
      操作重介质旋流器和重介质桶，进行预富集。
  BC-4440.40:
    name: 湿法冶金运营
    description: |
      通过堆浸、槽浸和缸浸、溶剂萃取和吸附流程，从矿石中水溶提取金属。
  BC-4440.40.10:
    name: 堆浸运营
    description: |
      操作堆浸平台，包括筑堆、喷淋和孕液收集。
  BC-4440.40.20:
    name: 槽浸与缸浸运营
    description: |
      操作矿石和精矿的槽浸和缸浸流程。
  BC-4440.40.30:
    name: 溶剂萃取运营
    description: |
      操作溶剂萃取流程，将金属选择性转移至电解液。
  BC-4440.40.40:
    name: 炭吸附运营
    description: |
      操作炭浆法、炭浸法和炭柱法吸附-解吸-回收流程。
  BC-4440.50:
    name: 精矿处理与过滤
    description: |
      对精矿进行浓密、过滤和堆存，以备运往冶炼厂或销售。
  BC-4440.50.10:
    name: 浓密运营
    description: |
      操作高效和膏体浓密机，对精矿和尾矿进行脱水。
  BC-4440.50.20:
    name: 过滤与脱水
    description: |
      操作压滤机、真空过滤机和带式过滤机，对精矿进行脱水。
  BC-4440.50.30:
    name: 精矿堆存
    description: |
      在发运前将脱水精矿存放于室内外矿堆。
  BC-4440.60:
    name: 选矿厂冶金核算
    description: |
      对厂矿给矿、产品和尾矿进行采样、化验和金属平衡对账。
  BC-4440.60.10:
    name: 厂矿采样与化验
    description: |
      对厂矿给矿、精矿和尾矿开展跨流采样和化验。
  BC-4440.60.20:
    name: 冶金平衡
    description: |
      开展选矿厂流程图的周期性金属平衡对账。
  BC-4440.60.30:
    name: 回收率报告
    description: |
      报告金属回收率相对计划和设计的完成情况。
  BC-4440.60.40:
    name: 精矿质量报告
    description: |
      按规格报告精矿品位、有害元素和水分含量。
  BC-4440.70:
    name: 过程药剂与消耗品管理
    description: |
      管理过程药剂和消耗品，包括加药控制、库存及危险药剂的监管。
  BC-4440.70.10:
    name: 药剂加药控制
    description: |
      对浮选和湿法冶金流程中的药剂添加进行实时控制。
  BC-4440.70.20:
    name: 药剂库存管理
    description: |
      管理散装药剂和磨矿介质的库存和消耗。
  BC-4440.70.30:
    name: 氰化物监管
    description: |
      按照国际氰化物管理规范对氰化物和其他危险药剂实施监管。

locale: zh
source: L1-strategic-management.yaml
entries:
  BC-100:
    name: 战略管理
    description: |
      确立企业方向、愿景、使命及长期目标。
  BC-100.10:
    name: 战略规划
    description: |
      制定愿景、使命、战略目标及长期计划。
  BC-100.10.10:
    name: 愿景与使命定义
    description: |
      阐明企业愿景、使命及核心价值观。
  BC-100.10.20:
    name: 环境扫描
    description: |
      开展内外部分析，包括 PESTLE、SWOT 及竞争情报。
  BC-100.10.30:
    name: 战略选择制定
    description: |
      评估战略选项并确定战略方向。
  BC-100.10.40:
    name: 长期计划编制
    description: |
      制定包含战略目标、指标及资本配置的多年期计划。
  BC-100.10.50:
    name: 情景规划
    description: |
      构建可能的未来情景并制定应急战略。
  BC-100.20:
    name: 战略执行管理
    description: |
      将战略转化为目标、OKR 及平衡计分卡。
  BC-100.20.10:
    name: 战略目标逐级传导
    description: |
      将企业战略转化为业务单元及职能部门的具体目标。
  BC-100.20.20:
    name: 绩效记分卡管理
    description: |
      管理平衡计分卡、OKR 及 KPI 的定义与跟踪。
  BC-100.20.30:
    name: 战略审查与重新调整
    description: |
      定期开展战略审查周期并进行方向修正。
  BC-100.20.40:
    name: 战略举措治理
    description: |
      对战略举措实施阶段关口治理。
  BC-100.30:
    name: 企业发展管理
    description: |
      管理并购、剥离、合资企业及合作关系。
  BC-100.30.10:
    name: 并购执行
    description: |
      开展目标筛选、尽职调查、交易结构设计及交割。
  BC-100.30.20:
    name: 剥离管理
    description: |
      执行业务分拆、分离及资产与实体处置。
  BC-100.30.30:
    name: 合资企业与联盟管理
    description: |
      组建并管理合资企业、联盟及战略合作关系。
  BC-100.30.40:
    name: 并购后整合
    description: |
      制定并购后整合计划并实现协同效应。
  BC-100.40:
    name: 战略组合管理
    description: |
      管理企业层面的战略举措组合。
  BC-100.40.10:
    name: 举措组合定义
    description: |
      梳理并分类战略举措库。
  BC-100.40.20:
    name: 组合优先级排序
    description: |
      依据战略对举措进行评分、筛选及优先级排序。
  BC-100.40.30:
    name: 投资配置
    description: |
      在组合中跨项目分配资本、人员及产能。
  BC-100.40.40:
    name: 组合绩效监控
    description: |
      跟踪收益实现情况及组合整体健康状态。
  BC-100.50:
    name: 商业模式管理
    description: |
      定义、演进并创新商业模式。
  BC-100.50.10:
    name: 商业模式设计
    description: |
      阐明价值主张、客户细分及收入模式。
  BC-100.50.20:
    name: 商业模式创新
    description: |
      探索并原型化新商业模式或相邻商业模式。
  BC-100.50.30:
    name: 商业模式绩效评估
    description: |
      评估单位经济效益、可扩展性及模式适配度。

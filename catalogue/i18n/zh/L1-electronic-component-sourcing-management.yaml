locale: zh
source: L1-electronic-component-sourcing-management.yaml
entries:
  BC-1930:
    name: 电子元器件采购管理
    description: |
      电子元器件的采购与全生命周期管理，涵盖合格供应商清单、停产处理、配额分配、假冒伪劣防控、鉴定及物质数据管理。
  BC-1930.10:
    name: 合格供应商清单管理
    description: |
      维护已批准元器件来源、替代方案及交叉参考关系。
  BC-1930.10.10:
    name: 优选元器件清单管理
    description: |
      维护经工程审批的优选元器件清单。
  BC-1930.10.20:
    name: 替代来源鉴定
    description: |
      对替代元器件来源进行鉴定。
  BC-1930.10.30:
    name: 交叉参考管理
    description: |
      跨制造商同等元器件的映射管理。
  BC-1930.20:
    name: 元器件生命周期与停产管理
    description: |
      跟踪元器件生命周期状态并管理停产事件。
  BC-1930.20.10:
    name: 产品变更通知分流
    description: |
      对供应商产品变更通知进行分流和影响评估。
  BC-1930.20.20:
    name: 停产通知分流
    description: |
      对停产通知及其对物料清单的影响进行分流。
  BC-1930.20.30:
    name: 末次购买决策
    description: |
      末次购买数量和过渡库存的决策管理。
  BC-1930.20.40:
    name: 元器件生命周期预测
    description: |
      对物料清单中元器件生命周期阶段进行预测。
  BC-1930.30:
    name: 半导体配额管理
    description: |
      短缺情况下的半导体配额管理。
  BC-1930.30.10:
    name: 配额需求预测管理
    description: |
      预测需求以支持供应商配额定位。
  BC-1930.30.20:
    name: 供应商配额谈判
    description: |
      与半导体供应商谈判配额份额。
  BC-1930.30.30:
    name: 配额需求优先级排序
    description: |
      在各产品线间对已分配供应进行内部优先级排序。
  BC-1930.40:
    name: 假冒元器件防控
    description: |
      在供应链中检测和防止假冒伪劣电子元器件。
  BC-1930.40.10:
    name: 假冒风险评估
    description: |
      评估采购渠道的假冒伪劣暴露风险。
  BC-1930.40.20:
    name: 来料元器件验证
    description: |
      对来料元器件进行验证和检验。
  BC-1930.40.30:
    name: 供应链溯源
    description: |
      将元器件溯源至授权制造商。
  BC-1930.50:
    name: 电子元器件鉴定
    description: |
      对电子元器件进行生产使用鉴定。
  BC-1930.50.10:
    name: 首件检验
    description: |
      按规范对元器件进行首件检验。
  BC-1930.50.20:
    name: 元器件可靠性鉴定
    description: |
      按运行剖面对元器件进行可靠性鉴定。
  BC-1930.50.30:
    name: 汽车 AEC-Q 鉴定
    description: |
      按 AEC-Q100/AEC-Q200 应力剖面对元器件进行鉴定。
  BC-1930.50.40:
    name: 半导体 JEDEC 鉴定
    description: |
      按 JEDEC 标准对半导体进行鉴定。
  BC-1930.60:
    name: 经销商与代理商管理
    description: |
      管理授权经销商和代理商渠道。
  BC-1930.60.10:
    name: 授权经销商引入
    description: |
      引入授权电子元器件经销商。
  BC-1930.60.20:
    name: 代理商来源风险评估
    description: |
      评估独立代理商采购的风险。
  BC-1930.60.30:
    name: 经销商绩效审查
    description: |
      定期审查经销商绩效和合规情况。
  BC-1930.70:
    name: 元器件合规数据管理
    description: |
      收集和管理元器件的物质成分和合规数据。
  BC-1930.70.10:
    name: 物质数据收集
    description: |
      从元器件供应商收集物质成分数据。
  BC-1930.70.20:
    name: 冲突矿产冶炼厂数据
    description: |
      收集冶炼厂层级数据以支持冲突矿产尽职调查。
  BC-1930.70.30:
    name: REACH SVHC 跟踪
    description: |
      在元器件层面跟踪 REACH 高度关注物质。

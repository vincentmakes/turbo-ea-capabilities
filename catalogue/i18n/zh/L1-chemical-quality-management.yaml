locale: zh
source: L1-chemical-quality-management.yaml
entries:
  BC-4670:
    name: 化工质量管理
    description: |
      开展化工专属规格制定、分析实验室运营、批次放行、客户投诉和分析证书争议处理、标准物质管理及行业特定 GMP 合规。有别于保留企业 QMS 范围的跨行业质量管理（BC-720）。
  BC-4670.10:
    name: 化工规格管理
    description: |
      制定和全生命周期管理原材料、中间体和成品规格。
  BC-4670.10.10:
    name: 原材料规格制定
    description: |
      制定和修订进厂原材料规格。
  BC-4670.10.20:
    name: 中间体规格制定
    description: |
      制定生产链各环节的中间体规格。
  BC-4670.10.30:
    name: 成品规格制定
    description: |
      制定成品规格和放行标准。
  BC-4670.10.40:
    name: 规格全生命周期管理
    description: |
      对已批准规格及其变更进行全生命周期管理。
  BC-4670.20:
    name: 分析实验室运营
    description: |
      运营开展湿化学、色谱、光谱和物理性质测试的质控实验室。
  BC-4670.20.10:
    name: 湿化学实验室运营
    description: |
      运营湿化学分析工作流程。
  BC-4670.20.20:
    name: 色谱运营
    description: |
      运营 HPLC、GC 和离子色谱平台。
  BC-4670.20.30:
    name: 光谱运营
    description: |
      运营 FTIR、NMR、ICP 和质谱平台。
  BC-4670.20.40:
    name: 物理性质测试
    description: |
      测试粘度、密度和粒径等物理性质。
  BC-4670.30:
    name: 批次放行管理
    description: |
      开展生产批次的处置决策、分析证书签发和不合格品处理。
  BC-4670.30.10:
    name: 批次处置决策
    description: |
      对照规格对生产批次作出处置决策。
  BC-4670.30.20:
    name: 分析证书签发
    description: |
      向客户签发分析证书（COA）。
  BC-4670.30.30:
    name: 不合格品调查
    description: |
      调查不合格分析结果。
  BC-4670.40:
    name: 客户投诉与分析证书争议管理
    description: |
      捕获和解决客户投诉及分析证书争议。
  BC-4670.40.10:
    name: 客户投诉捕获
    description: |
      捕获和分级化工产品的客户投诉。
  BC-4670.40.20:
    name: 分析证书争议调查
    description: |
      调查分析证书数值争议。
  BC-4670.40.30:
    name: 客户样品复测
    description: |
      对保留样和客户提供样品开展复测。
  BC-4670.50:
    name: 标准物质管理
    description: |
      开展标准物质和标准品的采购、确认和稳定性监测。
  BC-4670.50.10:
    name: 标准物质采购
    description: |
      从经认可供应商采购认证标准物质。
  BC-4670.50.20:
    name: 内部标准物质确认
    description: |
      确认内部工作标准物质。
  BC-4670.50.30:
    name: 标准物质稳定性监测
    description: |
      对在用标准物质开展稳定性监测。
  BC-4670.60:
    name: 方法开发与验证
    description: |
      在各实验室间开展分析方法的开发、验证和转移。
  BC-4670.60.10:
    name: 分析方法开发
    description: |
      开发新的分析方法，以支撑规格制定。
  BC-4670.60.20:
    name: 方法验证
    description: |
      验证分析方法的准确性、精密度和稳健性。
  BC-4670.60.30:
    name: 方法转移
    description: |
      在实验室之间转移经验证的分析方法。
  BC-4670.70:
    name: 行业特定 GMP 合规
    description: |
      遵守向受监管下游市场供货的化学品特定行业 GMP 制度。
  BC-4670.70.10:
    name: EFfCI GMP 合规
    description: |
      遵守化妆品原料 EFfCI GMP 规范。
  BC-4670.70.20:
    name: IPEC GMP 合规
    description: |
      遵守药用辅料 IPEC GMP 规范。
  BC-4670.70.30:
    name: 食品接触合规
    description: |
      遵守向食品包装供货的化学品食品接触法规。

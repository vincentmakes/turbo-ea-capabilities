  BC-410.70.30:
    name: Vertriebsprovisionsberechnung
    description: |
      Berechnung, Validierung und Zahlung von Vertriebsprovisionen.
  BC-410.70.40:
    name: Vertriebsleistungsanalytik
    description: |
      Win/Loss-, Produktivitäts- und Verkäufer-Performance-Analytik.

    name: Marktforschung
    description: |
      Primäre und sekundäre Marktforschung sowie Trendanalysen.
  BC-400.30.20:
    name: Wettbewerbsbeobachtung
    description: |
      Wettbewerbermonitoring, Battlecards und Wettbewerbsanalyse.
  BC-400.30.30:
    name: Kundenerkenntnisgenerierung

    description: |
      Lead-Scoring, Nurture-Journeys und MQL-Übergabe an Vertrieb.
  BC-400.40.40:
    name: Lifecycle- und Kundenbindungsmarketing
    description: |
      Lifecycle-Marketing, Cross-Sell und Kundenbindungskampagnen.
  BC-400.50:

      Verarbeitung von Dividenden, Zinsen und Pflichtmaßnahmen.
  BC-1380.60.30:
    name: Freiwillige-Kapitalmaßnahmen-Verarbeitung
    description: |
      Verarbeitung freiwilliger Maßnahmen einschließlich Wahlangeboten.
  BC-1380.60.40:

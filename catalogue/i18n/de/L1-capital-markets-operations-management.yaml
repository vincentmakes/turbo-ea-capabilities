      Wertpapierverwahrung und Sub-Custody-Netzwerke.
  BC-1380.40.10:
    name: Wertpapierverwahrung
    description: |
      Verwahrung von Wertpapieren für Kunden und Eigenbestände.
  BC-1380.40.20:
    name: Sub-Custody-Netzwerk-Management

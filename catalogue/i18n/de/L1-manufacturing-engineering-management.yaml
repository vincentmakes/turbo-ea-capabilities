      Erstellung von Standardarbeit und visuellen Arbeitsanweisungen.
  BC-1020.10.30:
    name: Prozessvalidierung
    description: |
      Validierung von Produktionsprozessen und Fähigkeitsstudien.
  BC-1020.10.40:

entries:
  BC-1060:
    name: Ersatzteile- und Aftersales-Management
    description: |
      Ersatzteilversorgung, Aftersales-Verkauf und -Services für die Installationsbasis.
  BC-1060.10:
    name: Ersatzteilkatalog-Management
    description: |
      Katalog, Identifikation und Teilenachfolge.

    name: Reparaturwerkstatt-Betrieb
    description: |
      Betrieb zentraler Reparaturwerkstätten.
  BC-1060.50.20:
    name: Austauscheinheitenpool-Management
    description: |
      Management von Austauscheinheiten- und Rotable-Pools.

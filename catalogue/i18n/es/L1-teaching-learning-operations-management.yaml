locale: es
source: L1-teaching-learning-operations-management.yaml
entries:
  BC-4730:
    name: Gestión de operaciones de enseñanza y aprendizaje
    description: |
      Impartición diaria de la enseñanza y el aprendizaje, abarcando la instrucción
      presencial y en línea, las plataformas del entorno de aprendizaje, las
      operaciones de prácticas y estancias, la instrucción complementaria y el
      seguimiento de la participación.
  BC-4730.10:
    name: Impartición de clases y lecciones
    description: |
      Impartición presencial de la enseñanza en formatos de conferencia, seminario,
      laboratorio, estudio, taller y tutoría.
    in_scope:
      - Impartición de conferencias y seminarios
      - Impartición de laboratorios y estudios
      - Impartición de talleres y tutorías
    out_of_scope:
      - Impartición en línea y a distancia (cubierta en Operaciones de aprendizaje en línea y a distancia)
  BC-4730.10.10:
    name: Impartición de conferencias y seminarios
    description: |
      Impartición de conferencias en grupos grandes y enseñanza en formato seminario.
  BC-4730.10.20:
    name: Impartición de laboratorios y estudios
    description: |
      Impartición de enseñanza en laboratorios y estudios con actividad práctica.
  BC-4730.10.30:
    name: Impartición de talleres y tutorías
    description: |
      Impartición de talleres en grupos pequeños y tutorías.
  BC-4730.20:
    name: Operaciones de aprendizaje en línea y a distancia
    description: |
      Impartición sincrónica, asincrónica y combinada de la enseñanza mediante
      modalidades en línea y a distancia.
    in_scope:
      - Impartición de clases en línea sincrónicas
      - Impartición de cursos asincrónicos
      - Operaciones de aprendizaje combinado
    out_of_scope:
      - Elaboración de materiales de aprendizaje en línea (cubierta en Gestión de contenidos educativos y recursos de aprendizaje)
  BC-4730.20.10:
    name: Impartición de clases en línea sincrónicas
    description: |
      Clases y tutorías en línea en directo con instructor.
  BC-4730.20.20:
    name: Impartición de cursos asincrónicos
    description: |
      Impartición de cursos asincrónicos a ritmo propio con progresión estructurada.
  BC-4730.20.30:
    name: Operaciones de aprendizaje combinado
    description: |
      Impartición de cursos que combinan modalidades presencial y en línea.
  BC-4730.30:
    name: Gestión del entorno de aprendizaje
    description: |
      Operación de los sistemas de gestión del aprendizaje, plataformas de aulas
      virtuales e integración con herramientas de aprendizaje y analítica.
    in_scope:
      - Operaciones del sistema de gestión del aprendizaje (SGA)
      - Operaciones de la plataforma de aula virtual
      - Integración de LTI y herramientas de aprendizaje
    out_of_scope:
      - Infraestructura TI general (cubierta en Gestión de tecnología de la información transversal)
  BC-4730.30.10:
    name: Operaciones del sistema de gestión del aprendizaje
    description: |
      Operaciones del sistema de gestión del aprendizaje institucional.
  BC-4730.30.20:
    name: Operaciones de la plataforma de aula virtual
    description: |
      Operaciones de las plataformas de aula virtual y videoconferencia utilizadas
      para la docencia.
  BC-4730.30.30:
    name: Integración de herramientas de aprendizaje
    description: |
      Integración de herramientas de aprendizaje de terceros mediante LTI y
      estándares equivalentes.
  BC-4730.40:
    name: Operaciones de prácticas, clínicas y estancias en campo
    description: |
      Operación del aprendizaje integrado en el trabajo, incluyendo la coordinación
      de estancias, la supervisión y el seguimiento de las horas de prácticas requeridas.
    in_scope:
      - Coordinación con entidades de acogida de estancias
      - Supervisión clínica y de prácticas
      - Seguimiento de horas de prácticas y cuadernos de bitácora
    out_of_scope:
      - Colocación laboral tras la graduación (cubierta en Gestión de apoyo y bienestar del estudiante)
  BC-4730.40.10:
    name: Coordinación con entidades de acogida de estancias
    description: |
      Coordinación con las entidades externas de acogida y las organizaciones anfitrionas.
  BC-4730.40.20:
    name: Supervisión clínica y de prácticas
    description: |
      Supervisión de los estudiantes durante las estancias clínicas, profesionales
      y de prácticas.
  BC-4730.40.30:
    name: Seguimiento de horas de prácticas y cuadernos de bitácora
    description: |
      Seguimiento de las horas de prácticas, las competencias y las entradas en el
      cuaderno de bitácora.
  BC-4730.50:
    name: Tutoría e instrucción complementaria
    description: |
      Tutoría, aprendizaje entre iguales e instrucción complementaria de habilidades
      académicas que complementan la docencia principal.
    in_scope:
      - Operaciones de tutoría entre iguales
      - Impartición de talleres de habilidades académicas
      - Operaciones de tutoría específica por asignatura
    out_of_scope:
      - Orientación académica sobre planificación del programa (cubierta en Gestión de apoyo y bienestar del estudiante)
  BC-4730.50.10:
    name: Operaciones de tutoría entre iguales
    description: |
      Operación de programas de tutoría y apoyo al aprendizaje entre iguales.
  BC-4730.50.20:
    name: Impartición de talleres de habilidades académicas
    description: |
      Impartición de talleres de habilidades académicas interdisciplinares.
  BC-4730.50.30:
    name: Operaciones de tutoría específica por asignatura
    description: |
      Tutoría específica por asignatura ofrecida por el profesorado, los departamentos
      o los servicios especializados.
  BC-4730.60:
    name: Seguimiento de asistencia y participación
    description: |
      Registro y seguimiento de la asistencia y la participación del estudiante con
      activación de alertas de intervención para alumnos en riesgo.
    in_scope:
      - Registro de asistencia
      - Seguimiento de la participación del alumno
      - Activación de alertas tempranas e intervención
    out_of_scope:
      - Intervención pastoral y de orientación (cubierta en Gestión de apoyo y bienestar del estudiante)
  BC-4730.60.10:
    name: Registro de asistencia
    description: |
      Registro de la asistencia de los estudiantes en todas las actividades docentes.
  BC-4730.60.20:
    name: Seguimiento de la participación del alumno
    description: |
      Seguimiento de las señales de participación digital y conductual.
  BC-4730.60.30:
    name: Alerta temprana e intervención
    description: |
      Activación de indicadores de alerta temprana y derivación a los servicios
      de apoyo.

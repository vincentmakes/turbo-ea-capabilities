locale: es
source: L1-real-estate-leasing-management.yaml
entries:
  BC-4950:
    name: Gestión del arrendamiento inmobiliario
    description: |
      Arrendamiento de espacios comerciales, de retail y residenciales desde el lado del arrendador a lo largo del ciclo de vida del arrendamiento — fijación de precios, comercialización, gestión de prospectos, evaluación de solicitudes, negociación y formalización, administración del arrendamiento, renovación y retención, y fin de arrendamiento. Distinto del arrendamiento del ocupante corporativo (BC-710) y la intermediación como línea de servicio (BC-4960).
    in_scope:
      - Estrategia de renta solicitada y concesiones
      - Comercialización de vacantes, anuncios y visitas
      - Gestión de prospectos entrantes y calificación
      - Captura de solicitudes, evaluación y gestión de denegaciones conforme a la normativa de igualdad de vivienda
      - Hoja de condiciones del arrendamiento, redacción, firma y gestión de la fianza
      - Resumen del arrendamiento, indexación y seguimiento de opciones por parte del arrendador
      - Gestión de renovaciones y programas de retención
      - Salida, deterioros y liquidación final del arrendamiento
    out_of_scope:
      - Administración del arrendamiento del ocupante corporativo (BC-710)
      - Representación de intermediación como línea de servicio (BC-4960)
      - Operaciones de la propiedad durante la ocupación (BC-4940)
      - Regulación de rentas y postura de cumplimiento de arrendamientos (BC-4990)
  BC-4950.10:
    name: Estrategia y fijación de precios del arrendamiento
    description: |
      Definición de la estrategia de renta solicitada, los paquetes de concesiones, la combinación objetivo de inquilinos y el benchmarking de la renta del activo frente al mercado.
  BC-4950.10.10:
    name: Estrategia de renta solicitada y concesiones
    description: |
      Definición de los niveles de renta solicitada y los paquetes de concesiones por tipo de activo y unidad.
  BC-4950.10.20:
    name: Estrategia de combinación objetivo de inquilinos
    description: |
      Definición de la combinación objetivo de inquilinos y la calidad crediticia para el activo.
  BC-4950.10.30:
    name: Benchmarking de rentas de mercado
    description: |
      Benchmarking periódico de las rentas vigentes y solicitadas frente a la evidencia de mercado.
  BC-4950.20:
    name: Comercialización y anuncios de vacantes
    description: |
      Comercialización de los espacios disponibles a través de contenido de anuncios, distribución en canales y visitas en el inmueble.
  BC-4950.20.10:
    name: Producción de contenido de anuncios
    description: |
      Producción de contenido de anuncios, incluyendo fotografía, planos y visitas virtuales.
  BC-4950.20.20:
    name: Gestión de distribución y sindicación de anuncios
    description: |
      Gestión de la distribución de anuncios en portales, MLS y canales de socios.
  BC-4950.20.30:
    name: Operaciones de visitas a vacantes
    description: |
      Operación de visitas a unidades vacantes y visitas autoguiadas en el inmueble.
  BC-4950.30:
    name: Gestión de prospectos e interesados
    description: |
      Captura, calificación y seguimiento de las consultas de arrendamiento y prospectos entrantes.
  BC-4950.30.10:
    name: Captura y enrutamiento de consultas
    description: |
      Captura de consultas de arrendamiento por múltiples canales y enrutamiento al equipo de activo adecuado.
  BC-4950.30.20:
    name: Calificación de prospectos
    description: |
      Calificación de prospectos en función del uso previsto, la solvencia y la adecuación a la unidad.
  BC-4950.30.30:
    name: Programación de visitas y seguimiento
    description: |
      Programación de visitas y seguimiento posterior con los prospectos.
  BC-4950.40:
    name: Solicitud y evaluación del inquilino
    description: |
      Captura de solicitudes de inquilinos y realización de verificaciones de crédito, identidad y referencias conforme a las normas de igualdad de vivienda.
  BC-4950.40.10:
    name: Captura de solicitudes
    description: |
      Captura de solicitudes de inquilinos y documentación de respaldo.
  BC-4950.40.20:
    name: Verificación de crédito y referencias
    description: |
      Realización de verificaciones de crédito y referencias del arrendador/empleador sobre los solicitantes.
  BC-4950.40.30:
    name: Verificación de identidad y derecho de arrendamiento
    description: |
      Verificación de la identidad y el derecho de arrendamiento/ocupación según lo exigido por la jurisdicción.
  BC-4950.40.40:
    name: Gestión de denegaciones conforme a la normativa de igualdad de vivienda
    description: |
      Gestión de las decisiones de denegación de solicitudes en cumplimiento de la normativa de igualdad de vivienda y aviso de acción adversa.
  BC-4950.50:
    name: Negociación y formalización del arrendamiento
    description: |
      Negociación de hojas de condiciones del arrendamiento, redacción, gestión de revisiones, formalización y captura de fianzas y garantías.
  BC-4950.50.10:
    name: Negociación de la hoja de condiciones
    description: |
      Negociación de las hojas de condiciones del arrendamiento que cubren renta, plazo, opciones e incentivos.
  BC-4950.50.20:
    name: Redacción y gestión de revisiones del arrendamiento
    description: |
      Redacción de documentos de arrendamiento y gestión de los ciclos de revisión con los asesores del inquilino.
  BC-4950.50.30:
    name: Firma y formalización del arrendamiento
    description: |
      Firma y formalización del arrendamiento y los documentos accesorios.
  BC-4950.50.40:
    name: Captura de fianza y garantía
    description: |
      Captura de fianzas, cartas de crédito y garantías personales o corporativas.
  BC-4950.60:
    name: Administración del arrendamiento (lado del arrendador)
    description: |
      Administración del arrendador de los resúmenes de arrendamientos, la indexación de rentas, el seguimiento de opciones y el seguimiento del cumplimiento durante el plazo.
  BC-4950.60.10:
    name: Resumen de arrendamientos
    description: |
      Elaboración de resúmenes de los arrendamientos formalizados en registros estructurados de términos clave.
  BC-4950.60.20:
    name: Indexación y seguimiento de escalados de renta
    description: |
      Seguimiento y activación de los escalados de renta, incluidas las cláusulas de índice y escalonadas.
  BC-4950.60.30:
    name: Seguimiento de opciones, breaks y renovaciones
    description: |
      Seguimiento de las opciones de inquilino y arrendador, fechas de break y ventanas de renovación.
  BC-4950.60.40:
    name: Seguimiento del cumplimiento del arrendamiento
    description: |
      Seguimiento del cumplimiento del inquilino con los pactos del arrendamiento, incluyendo uso, obras y reporting.
  BC-4950.70:
    name: Gestión de renovaciones y retención
    description: |
      Gestión proactiva de la cartera de renovaciones, negociación de condiciones y programas de retención dirigidos a los inquilinos en vigor.
  BC-4950.70.10:
    name: Gestión de la cartera de renovaciones
    description: |
      Gestión de la cartera de renovaciones frente al calendario de vencimientos y los objetivos de retención.
  BC-4950.70.20:
    name: Negociación de las condiciones de renovación
    description: |
      Negociación de las condiciones de renovación, incluyendo renta, plazo e incentivos.
  BC-4950.70.30:
    name: Operaciones del programa de retención
    description: |
      Operación de los programas de retención, incluyendo la comunicación con inquilinos y las ofertas de incentivos.
  BC-4950.80:
    name: Gestión de salidas y extinción del arrendamiento
    description: |
      Gestión del preaviso del inquilino, la entrega, los deterioros, la restitución, la devolución de la fianza y la liquidación final al término del arrendamiento.
  BC-4950.80.10:
    name: Tramitación del preaviso y entrega
    description: |
      Tramitación de los preavisos de extinción y la entrega de los locales.
  BC-4950.80.20:
    name: Evaluación de deterioros y restitución
    description: |
      Evaluación de los deterioros y las obligaciones de restitución del inquilino conforme al arrendamiento.
  BC-4950.80.30:
    name: Devolución de la fianza
    description: |
      Devolución de las fianzas con las deducciones aplicables conforme a la normativa y el arrendamiento.
  BC-4950.80.40:
    name: Liquidación final al término del arrendamiento
    description: |
      Liquidación final de rentas, recuperaciones y créditos al término del arrendamiento.

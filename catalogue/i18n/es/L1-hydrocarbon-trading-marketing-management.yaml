locale: es
source: L1-hydrocarbon-trading-marketing-management.yaml
entries:
  BC-3090:
    name: Gestión de comercialización de hidrocarburos
    description: |
      Comercialización física y en papel de crudo, productos refinados,
      gas natural y GNL; gestión del riesgo de materias primas; liquidación
      y cumplimiento de operaciones; comercialización a término; y fletamento
      de buques para la actividad de trading.
  BC-3090.10:
    name: Operaciones de comercialización física
    description: |
      Mesas de comercialización física de crudo, productos refinados,
      gas natural y GNL.
  BC-3090.10.10:
    name: Comercialización de petróleo crudo
    description: |
      Comercialización física de grados de crudo en los mercados regionales.
  BC-3090.10.20:
    name: Comercialización de productos refinados
    description: |
      Comercialización física de gasolina, destilados, combustible de
      aviación, fuel oil y LGN.
  BC-3090.10.30:
    name: Comercialización de gas natural
    description: |
      Comercialización física de gas natural por ducto en los hubs.
  BC-3090.10.40:
    name: Comercialización de GNL
    description: |
      Comercialización física de cargamentos de GNL, incluyendo
      operaciones de desvío y recarga.
  BC-3090.20:
    name: Comercialización de derivados y papel
    description: |
      Comercialización de derivados en bolsa y OTC para cobertura y
      posicionamiento propio.
  BC-3090.20.10:
    name: Comercialización de futuros y opciones
    description: |
      Comercialización de futuros y opciones listados en bolsa sobre
      materias primas energéticas.
  BC-3090.20.20:
    name: Swaps y coberturas
    description: |
      Comercialización de swaps OTC para cobertura de precio y base.
  BC-3090.20.30:
    name: Gestión de la exposición a índices de materias primas
    description: |
      Gestión de la exposición a instrumentos de índices de materias primas.
  BC-3090.30:
    name: Gestión del riesgo de trading
    description: |
      Gestión del riesgo de posición, riesgo de crédito de contraparte y
      VaR de materias primas para las actividades de trading.
  BC-3090.30.10:
    name: Gestión del riesgo de posición
    description: |
      Seguimiento de posiciones frente a los mandatos y límites de
      trading aprobados.
  BC-3090.30.20:
    name: Valoración a precio de mercado
    description: |
      Valoración diaria a precio de mercado de las posiciones de trading
      y las curvas de precios.
  BC-3090.30.30:
    name: Gestión del riesgo de crédito de contraparte
    description: |
      Establecimiento de límites de crédito de contraparte y seguimiento
      de la exposición específica del trading.
  BC-3090.30.40:
    name: Cálculo del VaR de materias primas
    description: |
      Cálculo del valor en riesgo y escenarios de estrés para carteras
      de materias primas.
  BC-3090.40:
    name: Confirmación y liquidación de operaciones
    description: |
      Captura de operaciones, confirmación y liquidación y reconciliación
      post-operación.
  BC-3090.40.10:
    name: Captura de operaciones
    description: |
      Captura de las operaciones ejecutadas desde el front office en
      los sistemas de trading.
  BC-3090.40.20:
    name: Confirmación de operaciones
    description: |
      Emisión y reconciliación de confirmaciones de operaciones con
      las contrapartes.
  BC-3090.40.30:
    name: Liquidación de operaciones
    description: |
      Liquidación en efectivo y física de las operaciones hasta su
      vencimiento.
  BC-3090.40.40:
    name: Reconciliación de operaciones
    description: |
      Reconciliación de operaciones frente a los registros de corredores,
      bolsas y contrapartes.
  BC-3090.50:
    name: Gestión del cumplimiento en trading
    description: |
      Verificación de sanciones, vigilancia de la conducta de mercado
      y reporte regulatorio para las actividades de trading energético.
  BC-3090.50.10:
    name: Verificación de sanciones
    description: |
      Verificación previa y posterior a la operación de sanciones sobre
      contrapartes y cargamentos.
  BC-3090.50.20:
    name: Vigilancia de la conducta de mercado
    description: |
      Vigilancia de la conducta de trading frente a los estándares de
      abuso de mercado (REMIT, Dodd-Frank).
  BC-3090.50.30:
    name: Reporte regulatorio de operaciones
    description: |
      Reporte de operaciones a los reguladores conforme a REMIT, EMIR
      y Dodd-Frank.
  BC-3090.60:
    name: Gestión de comercialización y contratos a término
    description: |
      Gestión de los contratos de venta a término y programas de
      levantamiento con clientes.
  BC-3090.60.10:
    name: Negociación de contratos a término
    description: |
      Negociación de contratos de venta a término con refinadores
      y empresas de servicios públicos.
  BC-3090.60.20:
    name: Gestión del programa de levantamientos
    description: |
      Gestión de los programas mensuales y trimestrales de levantamiento
      frente a los contratos a término.
  BC-3090.60.30:
    name: Gestión de la asignación a clientes
    description: |
      Asignación del suministro restringido entre clientes a término
      y spot.
  BC-3090.70:
    name: Fletamento de buques para trading
    description: |
      Fletamento a viaje y a tiempo, y gestión de la estadía en apoyo
      de las posiciones de trading.
  BC-3090.70.10:
    name: Fletamento a viaje
    description: |
      Fletamento a viaje de tanqueros y buques de gas para los
      cargamentos de trading.
  BC-3090.70.20:
    name: Fletamento a tiempo
    description: |
      Fletamento a tiempo y optimización de la posición de los buques.
  BC-3090.70.30:
    name: Gestión de estadía y tiempo de plancha
    description: |
      Cálculo y liquidación de reclamaciones de estadía y tiempo de plancha.

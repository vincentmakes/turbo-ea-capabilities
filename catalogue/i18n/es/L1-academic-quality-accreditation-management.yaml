locale: es
source: L1-academic-quality-accreditation-management.yaml
entries:
  BC-4750:
    name: Gestión de calidad académica y acreditación
    description: |
      Garantía de calidad interna y externa de los programas académicos y la
      institución, incluyendo la revisión, la acreditación, la gestión del marco de
      estándares, la retroalimentación del estudiante y la mejora continua.
  BC-4750.10:
    name: Revisión y validación de programas
    description: |
      Validación de nuevos programas y revalidación periódica conforme a los estándares
      académicos institucionales y externos.
    in_scope:
      - Validación de nuevos programas
      - Revisión periódica de programas
      - Revalidación de programas
    out_of_scope:
      - Aprobación de programas (cubierta en Gestión del plan de estudios y programa)
  BC-4750.10.10:
    name: Validación de nuevos programas
    description: |
      Validación de nuevos programas frente a estándares académicos y de calidad.
  BC-4750.10.20:
    name: Revisión periódica de programas
    description: |
      Revisión periódica de calidad de los programas en funcionamiento y sus resultados.
  BC-4750.10.30:
    name: Revalidación de programas
    description: |
      Revalidación de programas al final de los ciclos de validación.
  BC-4750.20:
    name: Autoevaluación institucional
    description: |
      Autoevaluación del desempeño institucional frente a estándares de calidad y
      comparativa con instituciones pares.
    in_scope:
      - Producción del informe de autoevaluación
      - Comparativa de indicadores de calidad
      - Planificación estratégica de la calidad
    out_of_scope:
      - Visitas de acreditación externas (cubiertas en Coordinación de acreditación y auditoría externas)
  BC-4750.20.10:
    name: Producción del informe de autoevaluación
    description: |
      Producción de los informes de autoevaluación institucionales.
  BC-4750.20.20:
    name: Comparativa de indicadores de calidad
    description: |
      Comparativa de indicadores de calidad con instituciones pares.
  BC-4750.20.30:
    name: Planificación estratégica de la calidad
    description: |
      Planificación estratégica de las prioridades e inversiones en calidad académica.
  BC-4750.30:
    name: Coordinación de acreditación y auditoría externas
    description: |
      Coordinación con organismos externos de acreditación y reguladores de calidad,
      incluyendo visitas al centro, inspecciones y respuesta a los resultados.
    in_scope:
      - Relación con organismos de acreditación
      - Coordinación de visitas al centro e inspecciones
      - Respuesta a los resultados de acreditación y seguimiento de condiciones
    out_of_scope:
      - Informes regulatorios estatutarios (cubiertos en Gestión de cumplimiento normativo y reporte regulatorio en educación)
  BC-4750.30.10:
    name: Relación con organismos de acreditación
    description: |
      Gestión de la relación y los envíos a los organismos de acreditación.
  BC-4750.30.20:
    name: Coordinación de visitas al centro e inspecciones
    description: |
      Coordinación de las visitas al centro y la logística de las inspecciones de
      los acreditadores.
  BC-4750.30.30:
    name: Respuesta a los resultados de acreditación
    description: |
      Respuesta a los resultados, condiciones y recomendaciones de la acreditación.
  BC-4750.40:
    name: Gestión del marco de estándares de calidad
    description: |
      Adopción, mapeo y mantenimiento de los estándares de calidad académica y la
      política de calidad institucional.
    in_scope:
      - Adopción y mantenimiento de estándares (p. ej., ESG, ABET, AACSB)
      - Elaboración de la política de calidad
      - Mapeo de los estándares de calidad en la práctica operativa
    out_of_scope:
      - Operaciones de auditoría diaria (cubiertas en Gestión de auditoría interna transversal)
  BC-4750.40.10:
    name: Adopción y mantenimiento de estándares
    description: |
      Adopción y mantenimiento de los estándares de calidad externos en toda
      la institución.
  BC-4750.40.20:
    name: Elaboración de la política de calidad
    description: |
      Elaboración y mantenimiento de la política de calidad institucional.
  BC-4750.40.30:
    name: Mapeo de estándares de calidad
    description: |
      Mapeo de los estándares de calidad en los procesos operativos y los controles.
  BC-4750.50:
    name: Retroalimentación del estudiante y evaluación de módulos
    description: |
      Recogida, análisis y cierre del ciclo de retroalimentación del estudiante a
      nivel de módulo, programa e institución.
    in_scope:
      - Operaciones de encuestas de evaluación de módulos
      - Encuestas nacionales e interinstitucionales (p. ej., NSS, NSSE)
      - Análisis de la retroalimentación y cierre del ciclo
    out_of_scope:
      - Análisis de satisfacción de tipo comercial fuera del contexto académico (cubierto en Gestión de atención al cliente transversal)
  BC-4750.50.10:
    name: Operaciones de encuestas de evaluación de módulos
    description: |
      Operación de encuestas de evaluación a nivel de módulo.
  BC-4750.50.20:
    name: Participación en encuestas nacionales e interinstitucionales
    description: |
      Participación en encuestas de estudiantes nacionales e interinstitucionales.
  BC-4750.50.30:
    name: Análisis de la retroalimentación y cierre del ciclo
    description: |
      Análisis de la retroalimentación y cierre del ciclo de manera visible ante
      los estudiantes.
  BC-4750.60:
    name: Mejora continua y seguimiento de acciones
    description: |
      Identificación, planificación y seguimiento de las acciones de mejora de la
      calidad derivadas de revisiones, acreditaciones y retroalimentación.
    in_scope:
      - Planificación de acciones de mejora
      - Seguimiento de la implementación de acciones
      - Repositorio de lecciones aprendidas
    out_of_scope:
      - Métodos genéricos de mejora de procesos (cubiertos en Gestión de calidad transversal)
  BC-4750.60.10:
    name: Planificación de acciones de mejora
    description: |
      Planificación de acciones de mejora de la calidad académica.
  BC-4750.60.20:
    name: Seguimiento de la implementación de acciones
    description: |
      Seguimiento del estado de implementación y la eficacia de las acciones de
      calidad.
  BC-4750.60.30:
    name: Repositorio de lecciones aprendidas
    description: |
      Recopilación de lecciones aprendidas en los ciclos de revisión de calidad
      y acreditación.

locale: es
source: L1-crop-production-management.yaml
entries:
  BC-3500:
    name: Gestión de producción de cultivos
    description: |
      Operaciones de cultivo en la granja — planificación del sistema de cultivo, preparación del suelo, siembra, nutrición, protección de cultivos, riego, monitoreo y previsión de rendimiento para cultivos arables, hortícolas y especializados.
  BC-3500.10:
    name: Planificación del sistema de cultivo
    description: |
      Planificación plurianual de rotaciones de cultivos, asignación de campos, ventanas de siembra y selección de variedades en todo el portafolio de la granja.
    in_scope:
      - Diseño de rotación de cultivos
      - Asignación de cultivos por campo
      - Planificación de ventanas de siembra
      - Selección de variedades e híbridos
    out_of_scope:
      - Ejecución de ensayos de variedades (BC-3530.60)
      - Prescripciones agronómicas (BC-3530.20)
  BC-3500.10.10:
    name: Planificación de rotación de cultivos
    description: |
      Diseño de rotación de cultivos plurianual que equilibra la salud del suelo, la demanda del mercado y los ciclos de plagas.
  BC-3500.10.20:
    name: Planificación de asignación de campos
    description: |
      Asignación de cultivos a campos y parcelas específicos para la temporada de siembra.
  BC-3500.10.30:
    name: Planificación de ventanas de siembra
    description: |
      Planificación de las ventanas de siembra óptimas por cultivo, variedad y zona agro-climática.
  BC-3500.10.40:
    name: Decisiones de selección de variedades
    description: |
      Selección de variedades e híbridos para la temporada de siembra en función de criterios agronómicos y de mercado.
  BC-3500.20:
    name: Operaciones de preparación del suelo
    description: |
      Operaciones de labranza, preparación de camas y enmiendas pre-siembra para establecer un lecho de semillas viable.
  BC-3500.20.10:
    name: Operaciones de labranza
    description: |
      Operaciones de preparación de campos mediante labranza convencional, reducida y de cero labranza.
  BC-3500.20.20:
    name: Operaciones de preparación de camas
    description: |
      Formación de camas, caballones y acolchado para la producción hortícola y de cultivos en hilera.
  BC-3500.20.30:
    name: Aplicación de enmiendas pre-siembra
    description: |
      Aplicación de enmiendas pre-siembra como cal, yeso y materia orgánica.
  BC-3500.30:
    name: Operaciones de siembra y trasplante
    description: |
      Colocación de semillas y trasplantes, incluidas las decisiones de resiembra y el establecimiento del stand de plantas.
  BC-3500.30.10:
    name: Finalización del lecho de siembra
    description: |
      Preparación final del lecho de siembra inmediatamente antes de la siembra.
  BC-3500.30.20:
    name: Colocación de semillas y trasplantes
    description: |
      Colocación mecánica y manual de semillas y trasplantes en el campo.
  BC-3500.30.30:
    name: Operaciones de resiembra y relleno de espacios
    description: |
      Resiembra y relleno de espacios cuando falla el establecimiento inicial del stand.
  BC-3500.40:
    name: Operaciones de nutrición de cultivos
    description: |
      Suministro de nutrientes durante la temporada mediante métodos de aplicación sólidos, líquidos, foliares y por fertirriego.
  BC-3500.40.10:
    name: Aplicación de fertilizantes sólidos
    description: |
      Aplicación de fertilizantes sólidos al voleo, en banda y a tasa variable.
  BC-3500.40.20:
    name: Aplicación foliar de nutrientes
    description: |
      Aplicación foliar de macro y micronutrientes durante la temporada de crecimiento.
  BC-3500.40.30:
    name: Operaciones de fertirriego
    description: |
      Suministro de nutrientes a través de sistemas de riego, incluido el control de inyección y dosificación.
  BC-3500.50:
    name: Operaciones de protección de cultivos
    description: |
      Aplicación de intervenciones de protección de cultivos químicas, biológicas y mecánicas, y los registros que las respaldan.
    in_scope:
      - Aplicación de pesticidas y herbicidas
      - Aplicación de productos de control biológico
      - Control mecánico y térmico de malezas
      - Registros de aplicación y pulverización
    out_of_scope:
      - Planificación de MIP (BC-3530.30)
      - Monitoreo de conformidad con LMR (BC-3590.50)
  BC-3500.50.10:
    name: Operaciones de aplicación de pesticidas
    description: |
      Aplicación terrestre y aérea de pesticidas, incluida la gestión de la deriva de pulverización.
  BC-3500.50.20:
    name: Aplicación de control biológico
    description: |
      Liberación de agentes de control biológico y productos biopesticidas.
  BC-3500.50.30:
    name: Control mecánico y térmico de malezas
    description: |
      Control mecánico y térmico de malezas, incluida la cultivación y el desmalezado por llama.
  BC-3500.50.40:
    name: Registro de aplicaciones de pulverización
    description: |
      Registros de pulverización a nivel de campo que incluyen producto, dosis, condiciones meteorológicas y operador.
  BC-3500.60:
    name: Operaciones de riego
    description: |
      Programación diaria del riego, aplicación y decisiones de drenaje que gobiernan el estado hídrico del cultivo.
  BC-3500.60.10:
    name: Programación del riego
    description: |
      Programación del riego basada en la humedad del suelo y la demanda del cultivo.
  BC-3500.60.20:
    name: Operaciones de aplicación del riego
    description: |
      Aplicación de agua de riego mediante sistemas de aspersión, micro y superficie.
  BC-3500.60.30:
    name: Operaciones de drenaje de campos
    description: |
      Operaciones de drenaje superficial y subterráneo y control del nivel freático.
  BC-3500.70:
    name: Monitoreo y scouting de cultivos
    description: |
      Monitoreo a nivel de campo de la salud del cultivo, la presión de plagas y la fenología mediante métodos de scouting, sensores y teledetección.
  BC-3500.70.10:
    name: Operaciones de scouting en campo
    description: |
      Recorridos manuales de scouting para la evaluación de plagas, enfermedades y condición del cultivo.
  BC-3500.70.20:
    name: Vigilancia de plagas y enfermedades
    description: |
      Vigilancia de la presión de plagas y enfermedades mediante trampas y sensores.
  BC-3500.70.30:
    name: Seguimiento de fenología del cultivo
    description: |
      Seguimiento de estados de crecimiento, unidades de calor e hitos fenológicos.
  BC-3500.70.40:
    name: Monitoreo de cultivos por teledetección
    description: |
      Monitoreo del estado del cultivo mediante satélite, dron y sensores de proximidad.
  BC-3500.80:
    name: Previsión de rendimiento de cultivos
    description: |
      Estimación de rendimiento durante la temporada y previa a la cosecha para alimentar la originación, la logística y la planificación comercial.
  BC-3500.80.10:
    name: Estimación de rendimiento en temporada
    description: |
      Estimaciones de rendimiento a mitad de temporada a partir de índices de cultivo y mediciones en campo.
  BC-3500.80.20:
    name: Previsión de rendimiento previa a la cosecha
    description: |
      Previsiones de rendimiento previas a la cosecha que alimentan los planes de cosecha, almacenamiento y originación.

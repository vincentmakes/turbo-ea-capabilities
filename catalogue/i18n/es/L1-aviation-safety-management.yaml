locale: es
source: L1-aviation-safety-management.yaml
entries:
  BC-1280:
    name: Gestión de la seguridad aérea
    description: |
      Sistema de gestión de la seguridad, evaluación de riesgos, cultura justa e investigación de sucesos.
  BC-1280.10:
    name: Gestión del sistema de gestión de la seguridad
    description: |
      Marco SMS, política de seguridad, objetivos de seguridad y gobernanza de la seguridad.
  BC-1280.10.10:
    name: Política y objetivos de seguridad
    description: |
      Definición de la política de seguridad y los objetivos de seguridad.
  BC-1280.10.20:
    name: Gestión del marco SMS
    description: |
      Mantenimiento del marco SMS conforme al Anexo 19 de la OACI.
  BC-1280.10.30:
    name: Gobernanza y responsabilidad en materia de seguridad
    description: |
      Comités de revisión de la seguridad y disposiciones del gestor responsable.
  BC-1280.10.40:
    name: Gestión de recursos de seguridad
    description: |
      Asignación de recursos a la función de seguridad.
  BC-1280.20:
    name: Gestión de la evaluación de riesgos de seguridad
    description: |
      Identificación de peligros, evaluación de riesgos y mitigación de riesgos.
  BC-1280.20.10:
    name: Identificación de peligros
    description: |
      Identificación proactiva y reactiva de peligros.
  BC-1280.20.20:
    name: Evaluación de riesgos de seguridad
    description: |
      Evaluación de la probabilidad y gravedad de los riesgos de seguridad.
  BC-1280.20.30:
    name: Mitigación de riesgos de seguridad
    description: |
      Definición y seguimiento de las acciones de mitigación de riesgos de seguridad.
  BC-1280.20.40:
    name: Evaluación de la seguridad de los cambios
    description: |
      Evaluación de la seguridad de los cambios operacionales y técnicos.
  BC-1280.30:
    name: Gestión de la cultura justa y la notificación
    description: |
      Notificación confidencial, cultura justa y notificación voluntaria de sucesos.
  BC-1280.30.10:
    name: Programa de cultura justa
    description: |
      Programa de cultura justa y protecciones para los notificadores.
  BC-1280.30.20:
    name: Notificación voluntaria de sucesos
    description: |
      Canales de notificación voluntaria y confidencial de sucesos.
  BC-1280.30.30:
    name: Notificación obligatoria de sucesos
    description: |
      Notificación obligatoria de sucesos a los reguladores.
  BC-1280.40:
    name: Gestión de la investigación de sucesos
    description: |
      Investigaciones internas, análisis de causa raíz y lecciones aprendidas.
  BC-1280.40.10:
    name: Investigación interna de sucesos
    description: |
      Investigación interna de sucesos de seguridad.
  BC-1280.40.20:
    name: Análisis de causa raíz
    description: |
      Análisis de causa raíz de los sucesos y factores contribuyentes.
  BC-1280.40.30:
    name: Lecciones aprendidas de las investigaciones
    description: |
      Captura y difusión de las lecciones aprendidas en materia de seguridad.
  BC-1280.50:
    name: Gestión del seguimiento del rendimiento en materia de seguridad
    description: |
      SPI, SPT, cuadros de mando de rendimiento de seguridad e informes al regulador.
  BC-1280.50.10:
    name: Gestión de indicadores de rendimiento de seguridad
    description: |
      Definición y seguimiento de SPI y SPT.
  BC-1280.50.20:
    name: Análisis de tendencias de seguridad
    description: |
      Análisis de tendencias de sucesos y rendimiento de los SPI.
  BC-1280.50.30:
    name: Informes de seguridad al regulador
    description: |
      Informes periódicos de rendimiento en materia de seguridad a la autoridad de aviación civil.
  BC-1280.60:
    name: Gestión de la promoción de la seguridad
    description: |
      Programas de cultura de seguridad, formación, concienciación y comunicaciones.
  BC-1280.60.10:
    name: Programa de cultura de seguridad
    description: |
      Encuestas de cultura de seguridad y programas de mejora.
  BC-1280.60.20:
    name: Impartición de formación en seguridad
    description: |
      Impartición de formación en seguridad y formación SMS de reciclaje.
  BC-1280.60.30:
    name: Comunicación en materia de seguridad
    description: |
      Comunicaciones de seguridad, boletines y campañas de concienciación.

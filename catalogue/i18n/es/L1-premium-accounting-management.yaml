locale: es
source: L1-premium-accounting-management.yaml
entries:
  BC-2150:
    name: Contabilidad de primas
    description: |
      Facturación de primas, cobro de efectivo, liquidación de cuentas de corredor y comisiones,
      mecánica de reservas de primas y devengo, gestión de morosidad y
      contabilidad del impuesto sobre primas de seguros.
  BC-2150.10:
    name: Gestión de facturación de primas
    description: |
      Generación de facturas, programación de cuotas, enrutamiento de facturación y ajustes.
  BC-2150.10.10:
    name: Generación de facturas de prima
    description: |
      Generación de facturas y estados de cuenta de primas por ciclo de facturación.
  BC-2150.10.20:
    name: Configuración de planes de cuotas
    description: |
      Configuración de planes de cuotas de prima y cargos financieros.
  BC-2150.10.30:
    name: Enrutamiento de facturación directa y a través de agencia
    description: |
      Enrutamiento de la facturación entre modalidades de facturación directa y a través de agencia.
  BC-2150.10.40:
    name: Ajuste de facturación y nota de crédito
    description: |
      Emisión de ajustes de facturación y notas de crédito derivadas de endosos y cancelaciones.
  BC-2150.20:
    name: Gestión del cobro de primas
    description: |
      Recepción y aplicación de pagos, operaciones de pago recurrente, devoluciones y caja de cobros.
  BC-2150.20.10:
    name: Recepción y aplicación de pagos
    description: |
      Recepción de pagos de primas y aplicación a las cuentas de póliza.
  BC-2150.20.20:
    name: Operaciones de domiciliación bancaria y pagos recurrentes
    description: |
      Operación de esquemas de domiciliación bancaria, cargo recurrente en tarjeta y órdenes permanentes.
  BC-2150.20.30:
    name: Procesamiento de devoluciones de prima
    description: |
      Procesamiento de devoluciones de prima derivadas de endosos y cancelaciones.
  BC-2150.20.40:
    name: Caja de cobros y asignación de efectivo
    description: |
      Recepción en caja de cobros, asignación de efectivo y gestión de excepciones.
  BC-2150.30:
    name: Liquidación de cuentas con corredores y productores
    description: |
      Estados de cuenta de productores, liquidación prima neta de comisión y conciliación de cuentas de fideicomiso.
  BC-2150.30.10:
    name: Generación de estados de cuenta de productores
    description: |
      Generación de estados de cuenta de prima y comisión para productores.
  BC-2150.30.20:
    name: Liquidación prima neta de comisión
    description: |
      Liquidación de la prima neta de comisión hacia y desde los productores.
  BC-2150.30.30:
    name: Conciliación de cuentas de fideicomiso de productores
    description: |
      Conciliación de cuentas de fideicomiso de productores y saldos de cuentas bancarias intermediarias.
  BC-2150.40:
    name: Gestión de reservas de primas y devengo
    description: |
      Cálculo de prima no devengada, reconocimiento de prima devengada y seguimiento de costos de adquisición diferidos.
  BC-2150.40.10:
    name: Cálculo de prima no devengada
    description: |
      Cálculo de reservas de prima no devengada sobre las pólizas en vigor.
  BC-2150.40.20:
    name: Reconocimiento de prima devengada
    description: |
      Reconocimiento de la prima devengada por período contable.
  BC-2150.40.30:
    name: Seguimiento de costos de adquisición diferidos
    description: |
      Seguimiento de costos de adquisición diferidos (DAC) entre cohortes de productos.
  BC-2150.50:
    name: Gestión de cobros y morosidad
    description: |
      Monitoreo de cuentas por cobrar envejecidas, operaciones de recobro, cancelación por impago
      y saneamiento por incobrables.
  BC-2150.50.10:
    name: Monitoreo de cuentas por cobrar envejecidas
    description: |
      Monitoreo de las cuentas por cobrar de primas envejecidas entre tomadores y productores.
  BC-2150.50.20:
    name: Operaciones de recobro y recordatorios
    description: |
      Avisos de recobro, recordatorios y comunicaciones sobre atrasos.
  BC-2150.50.30:
    name: Gestión de cancelación por impago
    description: |
      Activación de los procesos de cancelación por prima impagada.
  BC-2150.50.40:
    name: Saneamiento por deudas incobrables
    description: |
      Aprobación y registro del saneamiento de deudas incobrables sobre primas irrecuperables.
  BC-2150.60:
    name: Contabilidad de impuestos y gravámenes
    description: |
      Cálculo del impuesto sobre primas de seguros, recaudación de timbres y gravámenes,
      y apoyo para la presentación de declaraciones del impuesto sobre primas.
  BC-2150.60.10:
    name: Cálculo del impuesto sobre primas de seguros
    description: |
      Cálculo del impuesto sobre primas de seguros por jurisdicción y tipo de producto.
  BC-2150.60.20:
    name: Recaudación de timbres y gravámenes legales
    description: |
      Recaudación y remisión de timbres fiscales y gravámenes legales.
  BC-2150.60.30:
    name: Apoyo para la declaración del impuesto sobre primas
    description: |
      Producción de datos subyacentes y conciliaciones para las declaraciones del impuesto sobre primas.

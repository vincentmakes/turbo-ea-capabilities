locale: es
source: L1-tax-management.yaml
entries:
  BC-220:
    name: Gestión fiscal
    description: |
      Planificación, cumplimiento y reporte de impuestos directos e indirectos.
  BC-220.10:
    name: Gestión del impuesto sobre la renta
    description: |
      Planificación del impuesto sobre sociedades, cumplimiento y declaraciones.
  BC-220.10.10:
    name: Provisión del impuesto sobre sociedades
    description: |
      Cálculo del impuesto corriente y diferido y provisión fiscal.
  BC-220.10.20:
    name: Declaraciones del impuesto sobre sociedades
    description: |
      Elaboración y presentación de las declaraciones del impuesto sobre sociedades.
  BC-220.10.30:
    name: Gestión de la retención en la fuente
    description: |
      Determinación, pago y certificación de las retenciones en la fuente.
  BC-220.10.40:
    name: Gestión de pérdidas fiscales y créditos
    description: |
      Uso, seguimiento y previsión de pérdidas fiscales y créditos.
  BC-220.20:
    name: Gestión de impuestos indirectos
    description: |
      IVA, GST, impuesto sobre ventas y aranceles aduaneros.
  BC-220.20.10:
    name: Determinación del IVA y el GST
    description: |
      Asignación de claves fiscales, lugar de prestación y determinación del impuesto indirecto.
  BC-220.20.20:
    name: Declaraciones de impuestos indirectos
    description: |
      Elaboración y presentación de declaraciones de IVA, GST e impuesto sobre ventas.
  BC-220.20.30:
    name: Facturación electrónica y reporte en tiempo real
    description: |
      Facturación electrónica y reporte en tiempo real a las administraciones tributarias.
  BC-220.20.40:
    name: Gestión de aranceles aduaneros e impuestos especiales
    description: |
      Valoración aduanera, clasificación y administración de impuestos especiales.
  BC-220.30:
    name: Gestión de precios de transferencia
    description: |
      Política, documentación y defensa de precios de transferencia.
  BC-220.30.10:
    name: Establecimiento de la política de precios de transferencia
    description: |
      Definición de políticas de precios de transferencia alineadas con las directrices de la OCDE.
  BC-220.30.20:
    name: Documentación de precios de transferencia
    description: |
      Informe maestro, informe local y declaración país por país.
  BC-220.30.30:
    name: Operaciones de cargos intercompañía
    description: |
      Cálculo, facturación y liquidación de los cargos intercompañía.
  BC-220.30.40:
    name: Defensa en materia de precios de transferencia
    description: |
      Defensa en inspecciones, APAs y procedimientos amistosos.
  BC-220.40:
    name: Reporte y cumplimiento fiscal
    description: |
      Declaraciones fiscales y revelaciones fiscales en los estados financieros.
  BC-220.40.10:
    name: Contabilización y revelación fiscal
    description: |
      Revelaciones fiscales en los estados financieros y análisis de la tasa efectiva impositiva.
  BC-220.40.20:
    name: Calendario de cumplimiento fiscal
    description: |
      Calendario global de declaraciones fiscales y seguimiento de obligaciones.
  BC-220.40.30:
    name: Declaración país por país
    description: |
      Presentaciones de la declaración país por país de la OCDE BEPS.
  BC-220.40.40:
    name: Datos fiscales y conciliación
    description: |
      Extracción de datos fiscales, conciliación y cuadre del balance de sumas y saldos.
  BC-220.50:
    name: Planificación y asesoría fiscal
    description: |
      Estructuración fiscal, asesoría y controversias.
  BC-220.50.10:
    name: Planificación fiscal estratégica
    description: |
      Estructuración eficiente desde el punto de vista fiscal de las operaciones, la financiación y las cadenas de suministro.
  BC-220.50.20:
    name: Asesoría fiscal en transacciones
    description: |
      Due diligence fiscal y estructuración para fusiones, adquisiciones y reorganizaciones.
  BC-220.50.30:
    name: Gestión de controversias fiscales
    description: |
      Inspecciones fiscales, controversias y resolución de conflictos.
  BC-220.50.40:
    name: Riesgo fiscal y gobierno
    description: |
      Marco de riesgo fiscal, controles y revelaciones de la estrategia fiscal.

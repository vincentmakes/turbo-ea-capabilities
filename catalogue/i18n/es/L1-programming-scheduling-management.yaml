locale: es
source: L1-programming-scheduling-management.yaml
entries:
  BC-3730:
    name: "Gestión de programación y planificación"
    description: |
      Programación de canales lineales, gestión de la guía electrónica de programas,
      curación del catálogo bajo demanda, lista de transmisión y continuidad, y conciliación
      de la demanda de programación con los derechos y los flujos de adquisición.
  BC-3730.10:
    name: "Programación de canales lineales"
    description: |
      Planificación a largo plazo, táctica y gestión de cambios en la programación
      de canales y flujos lineales.
  BC-3730.10.10:
    name: "Planificación de parrilla a largo plazo"
    description: |
      Planes de parrilla multitrimestral y estacional alineados con las ventanas
      de derechos y la estrategia de audiencia.
  BC-3730.10.20:
    name: "Construcción de parrilla táctica"
    description: |
      Construcción de la parrilla semanal hasta el nivel de programa y pausa publicitaria.
  BC-3730.10.30:
    name: "Gestión de cambios en la parrilla"
    description: |
      Gestión controlada de cambios tardíos y de emergencia en la parrilla
      con notificación a los sistemas posteriores.
  BC-3730.20:
    name: "Gestión de la guía electrónica de programas"
    description: |
      Elaboración, distribución y actualización de los datos de la guía electrónica
      de programas para operadores y dispositivos de consumo.
  BC-3730.20.10:
    name: "Elaboración de datos de la guía electrónica"
    description: |
      Elaboración de títulos, sinopsis, clasificaciones y metadatos de eventos
      de la guía electrónica para su publicación.
  BC-3730.20.20:
    name: "Distribución de la guía electrónica a operadores"
    description: |
      Distribución de los feeds de la guía electrónica a operadores de plataforma,
      agregadores y plataformas de dispositivos de consumo.
  BC-3730.20.30:
    name: "Gestión de actualizaciones en tiempo real de la guía electrónica"
    description: |
      Actualizaciones en tiempo real de los datos de la guía electrónica
      para retransmisiones largas, deportes y noticias de última hora.
  BC-3730.30:
    name: "Curación del catálogo bajo demanda"
    description: |
      Curación de títulos, colecciones y reglas de personalización
      en superficies bajo demanda y de streaming.
  BC-3730.30.10:
    name: "Selección y curación de títulos"
    description: |
      Selección y enmarcado editorial de los títulos del catálogo bajo demanda,
      incluyendo la disponibilidad territorial.
  BC-3730.30.20:
    name: "Gestión de colecciones editoriales"
    description: |
      Elaboración y ciclo de vida de colecciones editoriales, temáticas y filas
      presentadas a los espectadores.
  BC-3730.30.30:
    name: "Elaboración de reglas de personalización"
    description: |
      Elaboración de reglas de negocio que rigen la personalización junto con
      las recomendaciones de aprendizaje automático.
  BC-3730.40:
    name: "Gestión de listas de transmisión y continuidad"
    description: |
      Construcción de listas de transmisión y continuidad en antena
      para canales lineales y de streaming 24/7.
  BC-3730.40.10:
    name: "Construcción de listas de transmisión"
    description: |
      Construcción de listas de transmisión cronometradas para la emisión,
      incluyendo pausas y elementos intersticiales.
  BC-3730.40.20:
    name: "Gestión de continuidad y uniones entre programas"
    description: |
      Elaboración y gestión de anuncios de continuidad, identificadores
      y paquetes de unión entre programas.
  BC-3730.40.30:
    name: "Gestión de cortes de cumplimiento e inserciones"
    description: |
      Aplicación de cortes de cumplimiento e inserciones de versión requeridos
      para el canal y la franja horaria de destino.
  BC-3730.50:
    name: "Planificación de franjas para adquisición de programas"
    description: |
      Traducción de la demanda de franjas de programación en listas de deseos
      de adquisición y conciliación de los derechos adquiridos con las necesidades de la parrilla.
  BC-3730.50.10:
    name: "Planificación de la demanda de franjas"
    description: |
      Cuantificación de la demanda de franjas por género, franja horaria
      y objetivo de audiencia a lo largo del horizonte de programación.
  BC-3730.50.20:
    name: "Gestión de la lista de deseos de adquisición"
    description: |
      Lista de títulos, formatos y paquetes priorizados para adquisición
      con el fin de cubrir las franjas identificadas.
  BC-3730.50.30:
    name: "Conciliación de programación con derechos"
    description: |
      Conciliación de las emisiones programadas con los derechos en poder de la empresa,
      pases y consumo de ventanas.

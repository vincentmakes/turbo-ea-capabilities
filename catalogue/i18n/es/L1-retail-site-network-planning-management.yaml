locale: es
source: L1-retail-site-network-planning-management.yaml
entries:
  BC-2350:
    name: Planificación de la red de tiendas
    description: |
      Selección, dimensionamiento y ciclo de vida de la red de tiendas físicas:
      análisis de áreas de influencia, elección de formato, identificación de
      espacios sin cobertura y decisiones de ciclo de vida por tienda.
  BC-2350.10:
    name: Análisis de área comercial y área de influencia
    description: |
      Definición del área de influencia, microanálisis de afluencia y demografía,
      y evaluación de la densidad competitiva para ubicaciones prospectivas
      y existentes.
  BC-2350.10.10:
    name: Definición del área de influencia
    description: |
      Definición de las áreas de influencia mediante tiempo de desplazamiento,
      densidad y barreras.
  BC-2350.10.20:
    name: Microanálisis demográfico
    description: |
      Análisis demográfico y de estilo de vida a nivel micro de las áreas de
      influencia.
  BC-2350.10.30:
    name: Análisis de afluencia y movilidad
    description: |
      Análisis de patrones de afluencia, datos de movilidad y flujo peatonal.
  BC-2350.10.40:
    name: Análisis de densidad competitiva
    description: |
      Análisis de la densidad de la competencia y la cuota del área comercial.
  BC-2350.20:
    name: Gestión de la selección del formato de tienda
    description: |
      Selección del formato de tienda más adecuado —hipermercado, supermercado,
      conveniencia, especializado o dark store— para un área de influencia y
      estrategia determinadas.
    in_scope:
      - Elección de formato por área de influencia y misión de compra
      - Cartera de mix de formatos en la red
      - Dimensionamiento y superficie por formato
    out_of_scope:
      - Diseño detallado del interior de la tienda (BC-2310.60)
  BC-2350.20.10:
    name: Elección de formato por área de influencia
    description: |
      Selección del formato de tienda por área de influencia según la misión
      de compra.
  BC-2350.20.20:
    name: Dimensionamiento y superficie del formato
    description: |
      Dimensionamiento de la sala de ventas, zona trasera y superficie total
      por formato.
  BC-2350.20.30:
    name: Planificación de la cartera de mix de formatos
    description: |
      Planificación del mix de formatos de la red y la migración entre formatos.
  BC-2350.30:
    name: Optimización del footprint de la red
    description: |
      Optimización del footprint de la red mediante la identificación de espacios
      sin cobertura, la canibalización y la cobertura global.
  BC-2350.30.10:
    name: Identificación de espacios sin cobertura
    description: |
      Identificación de áreas comerciales desatendidas y oportunidades sin
      cobertura.
  BC-2350.30.20:
    name: Modelización de la canibalización
    description: |
      Modelización del impacto de canibalización de nuevas tiendas sobre las
      existentes.
  BC-2350.30.30:
    name: Optimización de la cobertura y el alcance
    description: |
      Optimización de la cobertura y el alcance en el mercado objetivo.
  BC-2350.40:
    name: Gestión del ciclo de vida del rendimiento de tienda
    description: |
      Decisiones de ciclo de vida para cada tienda: traslado, reforma, reducción
      de formato o cierre, basadas en el rendimiento y los cambios en el área de
      influencia.
  BC-2350.40.10:
    name: Diagnóstico del rendimiento de tienda
    description: |
      Diagnóstico de tiendas con bajo rendimiento, incluyendo cambios en el área
      de influencia.
  BC-2350.40.20:
    name: Decisiones de traslado y reforma de tienda
    description: |
      Decisiones sobre el traslado o la reforma de tiendas frente a alternativas.
  BC-2350.40.30:
    name: Toma de decisiones de cierre de tienda
    description: |
      Toma de decisiones sobre el cierre de tiendas, incluyendo el impacto en
      grupos de interés y en el stock.
  BC-2350.50:
    name: Gestión del briefing inmobiliario para retail
    description: |
      Briefings inmobiliarios específicos de retail entregados a los equipos
      corporativos de inmuebles para la adquisición de ubicaciones, la
      negociación de arrendamientos y las salidas.
    in_scope:
      - Briefings de ubicación específicos de retail
      - Transferencia al equipo corporativo de adquisición inmobiliaria (BC-710.20)
      - Briefings de salida específicos de retail (p. ej., restricciones comerciales)
    out_of_scope:
      - Negociación y administración de arrendamientos (BC-710.20, BC-710.30)
  BC-2350.50.10:
    name: Elaboración del briefing de ubicación para retail
    description: |
      Elaboración de briefings de ubicación específicos de retail, incluyendo
      requisitos de formato y adyacencias.
  BC-2350.50.20:
    name: Elaboración del briefing de salida para retail
    description: |
      Elaboración de briefings de salida específicos de retail, incluyendo la
      postura frente a restricciones comerciales.

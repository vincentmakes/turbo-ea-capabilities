locale: es
source: L1-trade-promotion-management.yaml
entries:
  BC-2360:
    name: Gestión de promociones comerciales
    description: |
      Disciplina de bienes de consumo para la inversión comercial con clientes
      minoristas: planes de negocio conjuntos, presupuestación del gasto
      comercial, ejecución de eventos en tienda, gestión de deducciones y
      medición del incremento post-evento.
  BC-2360.10:
    name: Estrategia y planificación de promociones comerciales
    description: |
      Estrategia anual de promociones comerciales, planificación de la inversión
      por cliente y planes de negocio conjuntos negociados con los clientes
      minoristas.
    in_scope:
      - Calendario anual de promociones comerciales
      - Planes de negocio conjuntos por cliente
      - Estrategia de tarifas de slotting y listing
  BC-2360.10.10:
    name: Elaboración del plan comercial anual
    description: |
      Elaboración del plan anual de promociones comerciales y el calendario de
      eventos.
  BC-2360.10.20:
    name: Planificación de negocio conjunta con clientes
    description: |
      Planificación de negocio conjunta con clientes minoristas estratégicos.
  BC-2360.10.30:
    name: Estrategia de tarifas de slotting y listing
    description: |
      Estrategia y negociación de tarifas de slotting y listing para nuevos
      artículos.
  BC-2360.20:
    name: Gestión del presupuesto de gasto comercial
    description: |
      Presupuestación del gasto comercial, devengos, asignación entre clientes
      y control financiero de las inversiones comerciales.
  BC-2360.20.10:
    name: Presupuestación del gasto comercial
    description: |
      Presupuestación del gasto comercial por cliente, marca y evento.
  BC-2360.20.20:
    name: Gestión de devengos del gasto comercial
    description: |
      Devengo de pasivos de gasto comercial por cliente y evento.
  BC-2360.20.30:
    name: Asignación del gasto comercial
    description: |
      Asignación de las partidas de gasto comercial entre clientes, regiones
      y eventos.
  BC-2360.20.40:
    name: Control financiero del gasto comercial
    description: |
      Control financiero del gasto comercial, incluyendo umbrales de aprobación.
  BC-2360.30:
    name: Gestión de la ejecución de eventos promocionales
    description: |
      Ejecución de eventos promocionales en tienda y online, incluyendo
      auditorías de tienda perfecta y activación de equipos de campo.
  BC-2360.30.10:
    name: Montaje del evento con el cliente
    description: |
      Montaje de eventos promocionales con el cliente minorista, incluyendo
      artes gráficas y previsiones.
  BC-2360.30.20:
    name: Activación y exposición en tienda
    description: |
      Activación de expositores en tienda, cabeceras de góndola y ubicaciones
      secundarias.
  BC-2360.30.30:
    name: Ejecución de auditorías de tienda perfecta
    description: |
      Ejecución en campo de auditorías de tienda perfecta y comprobaciones por
      reconocimiento de imagen.
  BC-2360.30.40:
    name: Activación del equipo de ventas de campo
    description: |
      Activación del equipo de ventas de campo para impulsar la ejecución de
      eventos.
  BC-2360.40:
    name: Gestión de deducciones y reclamaciones
    description: |
      Validación, disputa y resolución de las deducciones y reclamaciones
      promocionales de clientes tomadas contra facturas.
    in_scope:
      - Recepción de deducciones y vinculación con eventos
      - Validación frente a los términos acordados
      - Resolución de disputas y recuperación
    out_of_scope:
      - Gestión genérica de cobros (BC-200)
  BC-2360.40.10:
    name: Recepción y vinculación de deducciones
    description: |
      Recepción de deducciones de clientes y vinculación con los eventos
      promocionales correspondientes.
  BC-2360.40.20:
    name: Validación de deducciones
    description: |
      Validación de deducciones frente a los términos, volúmenes y precios
      acordados.
  BC-2360.40.30:
    name: Resolución de disputas y recuperación
    description: |
      Resolución de disputas con el cliente y recuperación de deducciones no
      válidas.
  BC-2360.50:
    name: Medición de la efectividad de las promociones comerciales
    description: |
      Medición post-evento del incremento promocional, análisis base frente a
      incremental, y ROI por evento, cliente y marca.
  BC-2360.50.10:
    name: Medición de la base y el incremento
    description: |
      Medición de las ventas base y el incremento generado por los eventos
      promocionales.
  BC-2360.50.20:
    name: Análisis del ROI de la promoción
    description: |
      Análisis del ROI de las promociones comerciales por evento, cliente y marca.
  BC-2360.50.30:
    name: Análisis de canibalización y anticipación de demanda
    description: |
      Análisis de los efectos de canibalización y anticipación de la demanda
      generados por las promociones.

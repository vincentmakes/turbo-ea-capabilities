locale: es
source: L1-saas-trust-service-compliance-management.yaml
entries:
  BC-4290:
    name: Gestión de confianza y cumplimiento de servicio SaaS
    description: |
      Atestaciones de nivel de servicio, cuestionarios de seguridad para
      clientes, divulgaciones públicas de confianza, gestión de
      subprocesadores, compromisos de privacidad del servicio y compromisos
      de resiliencia del servicio orientados al cliente para la oferta SaaS.
  BC-4290.10:
    name: Gestión de atestaciones del servicio
    description: |
      Coordinación de las atestaciones de nivel de servicio, como SOC 2,
      ISO 27001 y FedRAMP, para la oferta SaaS.
    in_scope:
      - Preparación para auditorías del servicio
      - Compromiso con el auditor y producción del informe
    out_of_scope:
      - Programa de cumplimiento a nivel empresarial (cubierto por Gestión de cumplimiento)
  BC-4290.10.10:
    name: Coordinación de la preparación para auditorías
    description: |
      Coordinación de la preparación para auditorías entre los responsables
      de los controles del servicio.
  BC-4290.10.20:
    name: Compromiso con el auditor
    description: |
      Compromiso con auditores externos y gestión del trabajo de campo
      de auditoría.
  BC-4290.10.30:
    name: Gestión de la renovación de atestaciones
    description: |
      Gestión de los ciclos de renovación de atestaciones y los acuerdos
      de auditoría continua.
  BC-4290.20:
    name: Gestión de cuestionarios de seguridad para clientes
    description: |
      Administración del repositorio de cuestionarios, redacción de respuestas
      y base de conocimiento utilizada para responder a las evaluaciones de
      riesgo de proveedores de los clientes.
  BC-4290.20.10:
    name: Gestión del repositorio de cuestionarios
    description: |
      Mantenimiento del repositorio de cuestionarios entrantes y su
      enrutamiento.
  BC-4290.20.20:
    name: Redacción de respuestas a cuestionarios
    description: |
      Redacción de respuestas a los cuestionarios de seguridad de los clientes.
  BC-4290.20.30:
    name: Mantenimiento de la base de conocimiento de cuestionarios
    description: |
      Mantenimiento de una base de conocimiento seleccionada de respuestas
      aprobadas y evidencias.
  BC-4290.30:
    name: Portal de confianza y divulgación pública
    description: |
      Operación del portal de confianza del cliente, las divulgaciones públicas
      de estado y los flujos de distribución de documentos.
  BC-4290.30.10:
    name: Gestión de contenido del portal de confianza
    description: |
      Selección del contenido publicado en el portal de confianza del cliente.
  BC-4290.30.20:
    name: Divulgación pública del estado del servicio
    description: |
      Divulgación pública del estado de los incidentes y el historial de
      disponibilidad del servicio.
  BC-4290.30.30:
    name: Flujo de trabajo de distribución de documentos
    description: |
      Distribución controlada de informes de auditoría y documentos de
      confianza a los clientes.
  BC-4290.40:
    name: Gestión de subprocesadores
    description: |
      Inventario, divulgación y notificación de cambios de subprocesadores
      que tratan datos de clientes.
  BC-4290.40.10:
    name: Inventario de subprocesadores
    description: |
      Inventario de los subprocesadores y las categorías de datos de clientes
      que tratan.
  BC-4290.40.20:
    name: Divulgación de subprocesadores
    description: |
      Divulgación orientada al cliente de la lista actual de subprocesadores.
  BC-4290.40.30:
    name: Notificación de cambios en subprocesadores
    description: |
      Notificación anticipada de las incorporaciones y bajas de subprocesadores
      conforme al contrato.
  BC-4290.50:
    name: Gestión de los compromisos de privacidad del servicio
    description: |
      Administración de los anexos de tratamiento de datos, las divulgaciones
      de flujos de datos del cliente y el enrutamiento de las solicitudes
      de los interesados.
  BC-4290.50.10:
    name: Gestión de los anexos de tratamiento de datos
    description: |
      Mantenimiento y ejecución de los anexos de tratamiento de datos con
      los clientes.
  BC-4290.50.20:
    name: Mapeo de flujos de datos del cliente
    description: |
      Mapeo de los flujos de datos del cliente para divulgación y evaluación.
  BC-4290.50.30:
    name: Enrutamiento de solicitudes de los interesados
    description: |
      Enrutamiento de las solicitudes de los interesados recibidas a través
      de los clientes hacia los responsables correspondientes.
  BC-4290.60:
    name: Gestión de los compromisos de resiliencia del servicio
    description: |
      Compromisos de nivel de servicio orientados al cliente, divulgación
      del tiempo de actividad y administración de créditos de servicio.
  BC-4290.60.10:
    name: Gestión de los compromisos de nivel de servicio
    description: |
      Definición y administración de los compromisos de nivel de servicio
      orientados al cliente.
  BC-4290.60.20:
    name: Divulgación del tiempo de actividad
    description: |
      Divulgación del tiempo de actividad histórico conforme a los niveles
      comprometidos.
  BC-4290.60.30:
    name: Administración de créditos de servicio
    description: |
      Administración de los créditos de servicio derivados del incumplimiento
      de los compromisos.

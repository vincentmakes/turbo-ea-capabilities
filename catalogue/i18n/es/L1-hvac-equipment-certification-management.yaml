locale: es
source: L1-hvac-equipment-certification-management.yaml
entries:
  BC-2030:
    name: Gestión de certificación de equipos HVAC
    description: |
      Certificación multijurisdiccional de productos HVAC — certificación de rendimiento (AHRI,
      Eurovent), listado de seguridad (UL, CSA, IEC 60335-2-40, marcado CE), aprobaciones de
      refrigerante (F-Gas, EPA SNAP) y etiquetado de eficiencia energética (ENERGY STAR,
      Ecodiseño UE / ErP, MEPS) — hasta las licencias de marcas, la conformidad del etiquetado
      y la vigilancia de normas.
    in_scope:
      - Estrategia y hoja de ruta de certificación entre mercados
      - Presentaciones de certificación de rendimiento y publicación de clasificaciones
      - Listado de seguridad de equipos y evaluación de conformidad CE
      - Aprobación regulatoria de refrigerantes a nivel de producto
      - Registro y conformidad de etiquetas de energía y eficiencia
      - Licencias de marcas, conformidad del etiquetado y vigilancia de normas
    out_of_scope:
      - Contabilidad operacional de refrigerante en equipos instalados (BC-2040)
      - Certificación de productos eléctricos/electrónicos genéricos (BC-1910)
      - Investigación de no conformidades en campo derivadas del servicio (BC-2060)
  BC-2030.10:
    name: Estrategia y hoja de ruta de certificación
    description: |
      Definición del alcance, los esquemas y la secuenciación de la certificación en los mercados objetivo.
  BC-2030.10.10:
    name: Análisis de requisitos de acceso al mercado
    description: |
      Identificación de las obligaciones de certificación y etiquetado por mercado objetivo.
  BC-2030.10.20:
    name: Selección de esquema de certificación
    description: |
      Selección de esquemas de certificación y vías de reconocimiento para equipos HVAC.
  BC-2030.10.30:
    name: Planificación de la hoja de ruta de certificación
    description: |
      Secuenciación de certificaciones frente a los hitos de lanzamiento del equipo.
  BC-2030.20:
    name: Gestión de la certificación de rendimiento
    description: |
      Relación con programas de certificación de rendimiento HVAC y publicación de rendimientos clasificados.
  BC-2030.20.10:
    name: Coordinación del programa de ensayos de rendimiento
    description: |
      Coordinación de ensayos de clasificación de equipos con laboratorios acreditados.
  BC-2030.20.20:
    name: Presentación de clasificación de rendimiento
    description: |
      Presentación de clasificaciones certificadas a los programas de certificación de rendimiento.
  BC-2030.20.30:
    name: Seguimiento de la emisión de marcas de rendimiento
    description: |
      Seguimiento de los certificados de rendimiento emitidos y sus ventanas de validez.
  BC-2030.20.40:
    name: Participación en programas voluntarios
    description: |
      Participación en programas voluntarios de rendimiento y calidad.
  BC-2030.30:
    name: Gestión del listado de seguridad de equipos
    description: |
      Relación con los esquemas de listado de seguridad de equipos HVAC en diversas jurisdicciones.
  BC-2030.30.10:
    name: Presentación de listado de seguridad
    description: |
      Presentación de listados de seguridad frente a IEC 60335-2-40 y normas equivalentes.
  BC-2030.30.20:
    name: Verificación de conformidad con normas de seguridad
    description: |
      Verificación de la conformidad con las normas de seguridad mediante auditoría interna.
  BC-2030.30.30:
    name: Coordinación de marcas de seguridad internacionales
    description: |
      Coordinación entre múltiples marcas de seguridad nacionales y acuerdos de reconocimiento.
  BC-2030.30.40:
    name: Gestión de modificaciones de seguridad en campo
    description: |
      Gestión de modificaciones de seguridad en campo y acciones correctivas que afectan a los listados.
  BC-2030.40:
    name: Gestión de la conformidad de refrigerantes
    description: |
      Aprobaciones de refrigerantes a nivel de producto, conformidad con la eliminación progresiva
      y divulgación de sustancias para certificación.
  BC-2030.40.10:
    name: Seguimiento de aprobaciones de refrigerantes
    description: |
      Seguimiento de los refrigerantes aprobados para cada familia de productos por jurisdicción.
  BC-2030.40.20:
    name: Conformidad con la eliminación progresiva de refrigerantes
    description: |
      Conformidad con los calendarios de eliminación progresiva de HFC y compromisos de Kigali a
      nivel de producto.
  BC-2030.40.30:
    name: Registros de conformidad con GWP y ODP
    description: |
      Registros del potencial de calentamiento global y del potencial de agotamiento del ozono
      frente a los umbrales regulatorios.
  BC-2030.40.40:
    name: Reporte de sustancias de refrigerante
    description: |
      Reporte de sustancias requerido como parte de los dossieres de certificación de producto.
  BC-2030.50:
    name: Gestión de etiquetas de energía y eficiencia
    description: |
      Registro y cumplimiento continuo del etiquetado de eficiencia energética y los programas
      de eficiencia mínima.
  BC-2030.50.10:
    name: Registro de etiquetas de energía
    description: |
      Registro de etiquetas de energía de equipos ante los programas nacionales.
  BC-2030.50.20:
    name: Conformidad con Ecodiseño
    description: |
      Conformidad con el Ecodiseño de la UE y regímenes equivalentes.
  BC-2030.50.30:
    name: Conformidad con estándares mínimos de rendimiento de eficiencia
    description: |
      Conformidad con los estándares mínimos de rendimiento de eficiencia en los mercados.
  BC-2030.50.40:
    name: Participación en ecoetiquetas voluntarias
    description: |
      Participación en programas de ecoetiqueta voluntaria para equipos sostenibles.
  BC-2030.60:
    name: Gestión de conformidad de marcas y etiquetas de certificación
    description: |
      Gestión del ciclo de vida de las marcas de certificación y las ilustraciones de etiquetas
      en el producto.
  BC-2030.60.10:
    name: Emisión de marcas
    description: |
      Emisión y aplicación en el producto de las marcas de certificación.
  BC-2030.60.20:
    name: Renovación de marcas
    description: |
      Renovación de las marcas de certificación antes de su vencimiento.
  BC-2030.60.30:
    name: Retirada de marcas
    description: |
      Retirada de marcas de certificación para equipos retirados o no conformes.
  BC-2030.60.40:
    name: Conformidad de etiquetas en el producto
    description: |
      Control de las ilustraciones de etiquetas en el producto frente al contenido de certificación aprobado.
  BC-2030.70:
    name: Gestión de la vigilancia de normas
    description: |
      Vigilancia de las normas y reglamentos HVAC con evaluación de impacto y comunicación de
      la hoja de ruta.
  BC-2030.70.10:
    name: Inteligencia sobre normas HVAC
    description: |
      Inteligencia sobre normas HVAC emergentes y revisadas.
  BC-2030.70.20:
    name: Evaluación del impacto de cambios normativos
    description: |
      Evaluación del impacto de los cambios normativos en las certificaciones existentes.
  BC-2030.70.30:
    name: Participación en organismos de normalización
    description: |
      Participación en organismos de normalización industriales y comités técnicos.
  BC-2030.70.40:
    name: Comunicación de la hoja de ruta de normas
    description: |
      Comunicación de las hojas de ruta de normas a los equipos de ingeniería y producto.

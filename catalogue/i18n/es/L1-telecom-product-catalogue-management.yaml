locale: es
source: L1-telecom-product-catalogue-management.yaml
entries:
  BC-2650:
    name: Catálogo de productos de telecomunicaciones
    description: |
      Diseño, configuración, ciclo de vida y publicación en canal de productos,
      tarifas, planes, paquetes y promociones de telecomunicaciones para clientes
      residenciales, empresariales y mayoristas.
  BC-2650.10:
    name: Diseño de ofertas de producto
    description: |
      Diseño de nuevas ofertas comerciales, incluyendo funcionalidades, elegibilidad y
      estructuras de precios.
  BC-2650.10.10:
    name: Especificación de oferta
    description: |
      Especificación de la composición de la oferta, sus funcionalidades y las
      condiciones orientadas al cliente.
  BC-2650.10.20:
    name: Viabilidad técnica del producto
    description: |
      Validación de que la oferta propuesta es técnicamente entregable en las redes y
      plataformas objetivo.
  BC-2650.10.30:
    name: Diseño de niveles de precio
    description: |
      Diseño de niveles de precio, reglas de elegibilidad y estructuras contractuales
      de la oferta.
  BC-2650.20:
    name: Gestión de tarifas y planes
    description: |
      Definición y ciclo de vida de tarifas, cargos recurrentes y políticas de uso
      justo que sustentan las ofertas.
  BC-2650.20.10:
    name: Definición de tarifas de uso
    description: |
      Definición de tarifas de uso por evento y por unidad según tipo de servicio y
      jurisdicción.
  BC-2650.20.20:
    name: Definición de cargos recurrentes
    description: |
      Definición de cargos recurrentes, cuotas mensuales y cargos relacionados con el
      contrato.
  BC-2650.20.30:
    name: Gestión de la política de uso justo
    description: |
      Definición y ciclo de vida de las políticas de uso justo y uso aceptable en
      planes ilimitados y de alto consumo.
  BC-2650.30:
    name: Gestión de paquetes y promociones
    description: |
      Composición y reglas de paquetes multiproducto y promociones de duración limitada.
  BC-2650.30.10:
    name: Composición de paquetes
    description: |
      Composición de paquetes multiservicio que abarcan móvil, fijo, contenidos y
      dispositivo.
  BC-2650.30.20:
    name: Reglas de elegibilidad de promociones
    description: |
      Definición de reglas de elegibilidad a nivel de cliente y oferta para las
      promociones.
  BC-2650.30.30:
    name: Reglas de acumulación de descuentos
    description: |
      Reglas que gobiernan la combinación de múltiples descuentos y promociones en una
      misma cuenta.
  BC-2650.40:
    name: Publicación del catálogo de productos
    description: |
      Publicación de versiones del catálogo en canales y socios con control de versiones
      y variantes regionales.
  BC-2650.40.10:
    name: Publicación multicanal del catálogo
    description: |
      Publicación del contenido del catálogo en canales minoristas, digitales, de
      atención al cliente y de socios.
  BC-2650.40.20:
    name: Control de versiones del catálogo
    description: |
      Control de versiones del contenido del catálogo, incluidas fechas de vigencia y
      reversión.
  BC-2650.40.30:
    name: Gestión de variantes regionales del catálogo
    description: |
      Gestión de variantes del catálogo por región y marca a partir de un maestro
      compartido.
  BC-2650.50:
    name: Gestión del ciclo de vida del producto de telecomunicaciones
    description: |
      Gestión del ciclo de vida de las ofertas desde el lanzamiento hasta la
      modificación, retirada y mantenimiento de condiciones heredadas.
  BC-2650.50.10:
    name: Lanzamiento de oferta
    description: |
      Coordinación del lanzamiento de nuevas ofertas en sistemas, canales y regiones.
  BC-2650.50.20:
    name: Modificación de oferta
    description: |
      Modificación controlada de ofertas en el mercado y migración de suscriptores
      existentes cuando corresponda.
  BC-2650.50.30:
    name: Retirada de oferta y mantenimiento de condiciones heredadas
    description: |
      Retirada de ofertas de la venta y mantenimiento de condiciones heredadas para
      los suscriptores existentes bajo términos anteriores.

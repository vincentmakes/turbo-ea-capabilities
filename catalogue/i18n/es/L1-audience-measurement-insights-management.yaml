locale: es
source: L1-audience-measurement-insights-management.yaml
entries:
  BC-3770:
    name: "Gestión de medición de audiencia e insights"
    description: |
      Captura de telemetría de audiencia, medición por panel y censo, analítica del
      rendimiento de contenidos, modelado de recomendaciones e investigación de audiencia
      en servicios de contenido lineal, bajo demanda y en vivo.
  BC-3770.10:
    name: "Captura de datos de audiencia"
    description: |
      Captura de sintonización lineal, telemetría de reproducción OTT y señales
      de censo de decodificadores en la plataforma analítica.
  BC-3770.10.10:
    name: "Captura de datos de sintonización lineal"
    description: |
      Captura de datos de sintonización lineal desde los canales de retorno
      de operadores y fuentes de socios.
  BC-3770.10.20:
    name: "Captura de telemetría de reproducción OTT"
    description: |
      Captura de telemetría de reproducción OTT desde clientes
      y servicios de origen para analítica.
  BC-3770.10.30:
    name: "Captura del censo de decodificadores"
    description: |
      Captura a nivel de censo de los eventos de visualización en decodificadores
      con controles de privacidad aplicados.
  BC-3770.20:
    name: "Medición de audiencia por panel y censo"
    description: |
      Calibración de paneles, producción de medición de moneda y deduplicación
      de audiencia multiplataforma.
  BC-3770.20.10:
    name: "Calibración de paneles"
    description: |
      Calibración de la medición basada en panel frente a señales de censo
      y marcos demográficos.
  BC-3770.20.20:
    name: "Producción de medición de moneda"
    description: |
      Producción de métricas de medición de audiencia de grado moneda
      para la negociación e informes.
  BC-3770.20.30:
    name: "Deduplicación de audiencia multiplataforma"
    description: |
      Deduplicación de audiencias en superficies lineales, OTT y digitales
      para obtener una visión unificada multiplataforma.
  BC-3770.30:
    name: "Analítica del rendimiento de contenidos"
    description: |
      Analítica del rendimiento del contenido por título, cohorte y a lo largo
      del tiempo para orientar el encargo y la adquisición.
  BC-3770.30.10:
    name: "Informes de rendimiento por título"
    description: |
      Informes de rendimiento a nivel de título sobre alcance, finalización
      y contribución.
  BC-3770.30.20:
    name: "Analítica del embudo de captación"
    description: |
      Analítica del embudo de captación, inicio, finalización y comportamientos
      de visualización posterior.
  BC-3770.30.30:
    name: "Analítica de cohortes y valor de vida del cliente"
    description: |
      Analítica de retención por cohortes y valor de vida del cliente
      para suscriptores directos al consumidor.
  BC-3770.40:
    name: "Modelado de recomendaciones de contenidos"
    description: |
      Entrenamiento, prueba y composición personalizada de recomendaciones
      de contenidos para las superficies del espectador.
  BC-3770.40.10:
    name: "Entrenamiento de modelos de recomendación"
    description: |
      Entrenamiento y ciclo de vida de los modelos de recomendación a partir
      de señales de visualización y metadatos.
  BC-3770.40.20:
    name: "Gestión de pruebas A/B de recomendaciones"
    description: |
      Pruebas A/B y bandidos multi-brazos para decisiones de política
      y superficie de recomendaciones.
  BC-3770.40.30:
    name: "Composición de catálogos personalizados"
    description: |
      Composición de portadas, filas y estantes personalizados para
      las superficies del espectador.
  BC-3770.50:
    name: "Gestión de insights y estudios de audiencia"
    description: |
      Investigación cuantitativa y cualitativa de audiencia a medida, y síntesis
      y distribución de insights al negocio.
  BC-3770.50.10:
    name: "Estudios de audiencia a medida"
    description: |
      Diseño y realización de estudios de audiencia a medida, incluyendo
      segmentación y trabajos de seguimiento.
  BC-3770.50.20:
    name: "Gestión de la investigación cualitativa"
    description: |
      Investigación cualitativa con espectadores, incluyendo grupos de enfoque
      y entrevistas en profundidad.
  BC-3770.50.30:
    name: "Síntesis y distribución de insights"
    description: |
      Síntesis de los resultados de medición e investigación en insights
      y su distribución a las audiencias del negocio.

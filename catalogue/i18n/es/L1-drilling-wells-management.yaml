locale: es
source: L1-drilling-wells-management.yaml
entries:
  BC-3020:
    name: Gestión de perforación y pozos
    description: |
      Ingeniería, ejecución e integridad durante toda la vida de los pozos,
      desde el diseño y las operaciones de perforación hasta las
      terminaciones, intervenciones, reacondicionamientos y control de pozos.
  BC-3020.10:
    name: Ingeniería y diseño de pozos
    description: |
      Diseño de la arquitectura del pozo, tubería de revestimiento, tubing,
      fluidos de perforación y estimaciones de costos para programas de perforación.
  BC-3020.10.10:
    name: Diseño de la arquitectura del pozo
    description: |
      Diseño de trayectoria, secciones de hoyo y arquitectura general del pozo.
  BC-3020.10.20:
    name: Diseño de tubería de revestimiento y tubing
    description: |
      Diseño de la tubería de revestimiento, liner y tubing, incluyendo
      verificaciones de esfuerzo y colapso-estallido.
  BC-3020.10.30:
    name: Diseño de fluidos de perforación
    description: |
      Selección del sistema de lodo y diseño reológico para las secciones
      de perforación.
  BC-3020.10.40:
    name: Estimación de costos del pozo
    description: |
      Estimación de costos por autorización de gasto (AFE) para programas
      de perforación y terminación.
  BC-3020.20:
    name: Gestión de operaciones de perforación
    description: |
      Ejecución de operaciones de perforación, incluyendo coordinación de
      equipo, monitoreo en tiempo real, perforación direccional y cementación.
    in_scope:
      - Supervisión de perforación en el equipo
      - Monitoreo de datos de perforación en tiempo real
      - Perforación direccional y con presión controlada
      - Operaciones de cementación y corrida de tuberías de revestimiento
    out_of_scope:
      - Instalación de terminación del pozo (BC-3020.30)
      - Seguridad de proceso en instalaciones de perforación (BC-3050)
  BC-3020.20.10:
    name: Coordinación de operaciones del equipo de perforación
    description: |
      Coordinación diaria de las operaciones del equipo y las actividades
      de los contratistas.
  BC-3020.20.20:
    name: Monitoreo de perforación en tiempo real
    description: |
      Monitoreo de datos de perforación en tiempo real desde centros de
      soporte a operaciones.
  BC-3020.20.30:
    name: Ejecución de perforación direccional
    description: |
      Ejecución de perforación direccional, horizontal y de alcance extendido.
  BC-3020.20.40:
    name: Operaciones de fluidos de perforación
    description: |
      Ingeniería de lodos, tratamiento y control de sólidos durante la perforación.
  BC-3020.20.50:
    name: Operaciones de cementación
    description: |
      Operaciones de cementación primaria y remedial.
  BC-3020.30:
    name: Gestión de terminaciones de pozos
    description: |
      Diseño e instalación de terminaciones, incluyendo operaciones de
      disparos y estimulación.
  BC-3020.30.10:
    name: Diseño de terminación
    description: |
      Diseño de terminaciones superiores e inferiores, incluyendo control
      de arena donde corresponda.
  BC-3020.30.20:
    name: Instalación de terminación
    description: |
      Corrida e instalación de sartas de terminación y accesorios.
  BC-3020.30.30:
    name: Operaciones de disparos
    description: |
      Selección del cañón de disparos y ejecución para establecer
      las vías de flujo.
  BC-3020.30.40:
    name: Operaciones de estimulación
    description: |
      Fracturamiento hidráulico, acidificación y otros tratamientos
      de estimulación.
  BC-3020.40:
    name: Gestión de intervenciones y reacondicionamientos de pozos
    description: |
      Intervenciones en pozos a lo largo de su vida, desde operaciones
      con wireline hasta reacondicionamientos mayores.
  BC-3020.40.10:
    name: Operaciones con coiled tubing
    description: |
      Operaciones de intervención con coiled tubing.
  BC-3020.40.20:
    name: Operaciones con wireline y slickline
    description: |
      Operaciones de adquisición de datos e intervención con wireline
      y slickline.
  BC-3020.40.30:
    name: Operaciones de reacondicionamiento
    description: |
      Operaciones de reacondicionamiento mayor en pozos productores
      e inyectores.
  BC-3020.40.40:
    name: Intervención a través del tubing
    description: |
      Intervenciones remediales y de estimulación a través del tubing.
  BC-3020.50:
    name: Gestión de integridad de pozos
    description: |
      Verificación y vigilancia de las barreras del pozo a lo largo de
      su vida útil, incluyendo la gestión de presión anular y presión
      sostenida en la tubería de revestimiento.
  BC-3020.50.10:
    name: Verificación de barreras del pozo
    description: |
      Verificación de barreras primarias y secundarias del pozo conforme
      a los estándares de integridad.
  BC-3020.50.20:
    name: Monitoreo de presión anular
    description: |
      Monitoreo continuo y periódico de las presiones en los anulares
      del pozo.
  BC-3020.50.30:
    name: Evaluación de riesgos de integridad del pozo
    description: |
      Evaluación del estado de integridad del pozo en toda la cartera
      de pozos.
  BC-3020.50.40:
    name: Gestión de presión sostenida en tubería de revestimiento
    description: |
      Diagnóstico y gestión de eventos de presión sostenida en la
      tubería de revestimiento.
  BC-3020.60:
    name: Gestión del control de pozos
    description: |
      Prevención y respuesta a eventos de control de pozos, incluyendo
      detección de influxos, operaciones del preventer de reventón y
      competencias en control de pozos.
  BC-3020.60.10:
    name: Detección y respuesta a influxos
    description: |
      Metodologías de detección de influxos y procedimientos de respuesta
      para control de pozos.
  BC-3020.60.20:
    name: Operaciones con preventer de reventón
    description: |
      Operación, pruebas funcionales y mantenimiento de conjuntos de
      preventers de reventón.
  BC-3020.60.30:
    name: Aseguramiento de competencias en control de pozos
    description: |
      Coordinación de programas de competencia IWCF e IADC WellCAP.
  BC-3020.70:
    name: Gestión de contratistas de perforación
    description: |
      Aseguramiento, gestión del desempeño y supervisión contractual de
      contratistas de equipos de perforación y servicios.
  BC-3020.70.10:
    name: Aseguramiento y auditoría del equipo de perforación
    description: |
      Auditoría previa a la aceptación y en servicio de equipos de
      perforación y contratistas.
  BC-3020.70.20:
    name: Gestión del desempeño del contratista de perforación
    description: |
      Gestión del desempeño frente a los contratos de equipo y
      los KPI de servicios.
  BC-3020.70.30:
    name: Gestión de contratos de servicios de perforación
    description: |
      Gestión de contratos de líneas de servicio de perforación
      (lodos, cementación, direccional, etc.).

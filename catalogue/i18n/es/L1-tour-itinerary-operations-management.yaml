locale: es
source: L1-tour-itinerary-operations-management.yaml
entries:
  BC-4100:
    name: Gestión de operaciones de tours e itinerarios
    description: |
      Operación de las actividades del operador turístico y de gestión de destinos —
      ensamblaje de producto y contratación de proveedores, toma de decisiones sobre
      salidas, prestación de guías y acompañantes, logística en destino, coordinación
      de proveedores, recuperación del itinerario y documentación del viajero.
    in_scope:
      - Ensamblaje del producto de tour y contratación de proveedores
      - Umbrales de salida y decisiones de salida
      - Asignación, briefing y seguimiento del rendimiento del guía en el tour
      - Traslados y prestación de tours de día en destino
      - Modificación del itinerario en tiempo real y recuperación por fuerza mayor
      - Documentación del cliente del tour y emisión de comprobantes
    out_of_scope:
      - Maestro de producto de tour y definición del grupo de inventario (BC-4000.30)
      - Ciclo de vida de reservas (BC-4020)
      - Operaciones de crucero y navegación (BC-4090)

  BC-4100.10:
    name: Ensamblaje y contratación del producto de tour
    description: |
      Ensamblaje de productos de tour, contratación de proveedores, costes, rutas y
      estado del ciclo de vida del producto en todas las marcas de tour.

  BC-4100.10.10:
    name: Contratación de proveedores y negociación de cupos
    description: |
      Contratación de proveedores de alojamiento, transporte y actividades, incluyendo
      la negociación de cupos.

  BC-4100.10.20:
    name: Costes del tour y construcción del margen
    description: |
      Cálculo del coste de los productos de tour y construcción del margen frente a
      los precios de venta objetivo.

  BC-4100.10.30:
    name: Composición del itinerario y trazado de rutas
    description: |
      Composición de itinerarios y trazado de rutas a través de destinos y componentes
      de proveedores.

  BC-4100.10.40:
    name: Estado del ciclo de vida del producto de tour
    description: |
      Estado del ciclo de vida de los productos de tour desde el concepto y piloto
      hasta su retirada.

  BC-4100.20:
    name: Gestión de salidas de tour
    description: |
      Toma de decisiones sobre las salidas de tour, cubriendo los umbrales de pasajeros
      mínimos, la asignación, la consolidación de marca y la cancelación o sustitución.

  BC-4100.20.10:
    name: Umbral de salida y decisión de salida
    description: |
      Decisión sobre si las salidas programadas operarán en función de los umbrales
      de pasajeros mínimos.

  BC-4100.20.20:
    name: Asignación de salida y liberación de inventario
    description: |
      Decisiones de asignación de plazas y liberación de inventario entre las salidas.

  BC-4100.20.30:
    name: Consolidación de salidas entre marcas
    description: |
      Consolidación de las salidas marginales entre marcas hermanas u operadores
      asociados.

  BC-4100.20.40:
    name: Cancelación y sustitución de salidas
    description: |
      Cancelación de salidas no viables y sustitución en fechas de salida alternativas.

  BC-4100.30:
    name: Operaciones de guías y acompañantes de tour
    description: |
      Asignación, briefing, gestión del rendimiento y coordinación de guías locales
      para la prestación del tour.

  BC-4100.30.10:
    name: Asignación de guías y directores de tour
    description: |
      Asignación de guías y directores de tour a las salidas conforme a los requisitos
      de idioma e itinerario.

  BC-4100.30.20:
    name: Briefing previo al tour y gestión del guion
    description: |
      Briefing previo al tour de los equipos de acompañamiento y gestión de los
      guiones e itinerarios.

  BC-4100.30.30:
    name: Seguimiento del rendimiento del guía durante el tour
    description: |
      Seguimiento del rendimiento del guía durante la prestación del tour mediante
      la retroalimentación del huésped y los informes del acompañante.

  BC-4100.30.40:
    name: Coordinación de guías locales
    description: |
      Coordinación de los guías locales en los destinos conforme a los requisitos
      específicos de ciudad y lugar.

  BC-4100.40:
    name: Logística y traslados en destino
    description: |
      Logística en destino que cubre los servicios de autocar y vehículo, los traslados
      de aeropuerto y hotel, la ejecución de tours de día y la gestión de entradas.

  BC-4100.40.10:
    name: Logística de autocar y vehículo
    description: |
      Logística de los servicios de autocar y vehículo a lo largo del itinerario.

  BC-4100.40.20:
    name: Traslados de aeropuerto y hotel
    description: |
      Operación de los traslados de aeropuerto y hotel para los viajeros del tour.

  BC-4100.40.30:
    name: Operaciones de ejecución de tours de día
    description: |
      Ejecución de tours de día y excursiones dentro de los itinerarios de varios días.

  BC-4100.40.40:
    name: Operaciones de gestión de entradas de actividades y atracciones
    description: |
      Operaciones para la gestión de entradas de actividades y atracciones, incluyendo
      la asignación de franjas horarias.

  BC-4100.50:
    name: Coordinación de proveedores del tour
    description: |
      Coordinación con empresas de gestión de destinos, alojamientos y proveedores
      de actividades durante la prestación operativa.

  BC-4100.50.10:
    name: Coordinación con DMC y operadores locales
    description: |
      Coordinación con las empresas de gestión de destinos y los operadores locales
      que prestan los servicios del tour.

  BC-4100.50.20:
    name: Coordinación con proveedores de alojamiento
    description: |
      Coordinación con los proveedores de alojamiento en relación con las habitaciones,
      los horarios de llegada y las solicitudes especiales.

  BC-4100.50.30:
    name: Coordinación con proveedores de atracciones y actividades
    description: |
      Coordinación con los proveedores de atracciones y actividades que cubren el
      acceso, la capacidad y los arreglos especiales.

  BC-4100.50.40:
    name: Operaciones de rendimiento de proveedores
    description: |
      Gestión del rendimiento operativo de los proveedores del tour basada en los
      informes de los acompañantes y la experiencia del viajero.

  BC-4100.60:
    name: Modificación y recuperación del itinerario
    description: |
      Modificación en tiempo real de los itinerarios del tour y recuperación ante
      eventos de interrupción, incluyendo la fuerza mayor y los cambios iniciados
      por el viajero.

  BC-4100.60.10:
    name: Operaciones de modificación del itinerario en tiempo real
    description: |
      Modificación en tiempo real de los itinerarios mientras un tour está en
      curso debido a factores operativos.

  BC-4100.60.20:
    name: Recuperación del itinerario por fuerza mayor
    description: |
      Recuperación de los itinerarios durante eventos de fuerza mayor como
      condiciones meteorológicas, huelgas e inestabilidad política.

  BC-4100.60.30:
    name: Cambio de itinerario iniciado por el viajero
    description: |
      Gestión de los cambios iniciados por el viajero que afectan a las reservas
      de proveedores posteriores.

  BC-4100.60.40:
    name: Determinación de la compensación por recuperación
    description: |
      Determinación de la compensación tras las modificaciones del itinerario,
      incluyendo el reembolso y el gesto de buena voluntad.

  BC-4100.70:
    name: Documentación del cliente del tour
    description: |
      Emisión y reemisión de los documentos de viaje definitivos, comprobantes,
      información previa a la salida y comunicaciones específicas del tour con el
      viajero.

  BC-4100.70.10:
    name: Emisión de documentos de viaje definitivos
    description: |
      Emisión de los documentos de viaje definitivos, incluyendo el itinerario final
      y los contactos de emergencia.

  BC-4100.70.20:
    name: Emisión de comprobantes y documentos de servicio
    description: |
      Emisión de comprobantes y documentos de servicio para presentar en los
      proveedores del tour.

  BC-4100.70.30:
    name: Pack de información previa a la salida
    description: |
      Recopilación de los packs de información previa a la salida, incluyendo
      orientaciones sobre salud, visado y equipaje.

  BC-4100.70.40:
    name: Operaciones de reemisión de documentos de viaje
    description: |
      Reemisión de documentos tras las modificaciones del itinerario y los cambios
      en los datos del viajero.

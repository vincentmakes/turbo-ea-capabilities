locale: es
source: L1-clinical-quality-safety-management.yaml
entries:
  BC-2840:
    name: Gestión de calidad y seguridad clínica
    description: |
      Gestión de eventos de seguridad del paciente, prevención y control de infecciones,
      medición de resultados clínicos, preparación para la acreditación, riesgo clínico y
      responsabilidad civil, y programas de mejora de la calidad específicos de la atención clínica.
  BC-2840.10:
    name: Gestión de eventos de seguridad del paciente
    description: |
      Captura, investigación y gestión de eventos de seguridad del paciente,
      incluyendo eventos centinela y casi-incidentes.
  BC-2840.10.10:
    name: Notificación y captura de eventos
    description: |
      Notificación y captura multicanal de eventos de seguridad del paciente y casi-incidentes.
  BC-2840.10.20:
    name: Análisis de causa raíz
    description: |
      Análisis de causa raíz y causa aparente de los eventos de seguridad del paciente.
  BC-2840.10.30:
    name: Gestión de eventos centinela
    description: |
      Identificación, respuesta y notificación de eventos centinela y eventos nunca ocurridos.
  BC-2840.10.40:
    name: Investigación con cultura justa
    description: |
      Revisión con cultura justa de los factores humanos y la responsabilidad en los eventos de seguridad.
  BC-2840.20:
    name: Prevención y control de infecciones
    description: |
      Vigilancia, prevención y control de infecciones asociadas a la atención sanitaria,
      incluyendo respuesta a brotes y gestión de antimicrobianos.
  BC-2840.20.10:
    name: Vigilancia de infecciones asociadas a la atención sanitaria
    description: |
      Vigilancia y notificación de infecciones asociadas a la atención sanitaria.
  BC-2840.20.20:
    name: Investigación de brotes
    description: |
      Investigación y contención de agrupaciones de infecciones y brotes.
  BC-2840.20.30:
    name: Supervisión del procesamiento de material estéril
    description: |
      Supervisión de las operaciones del departamento de esterilización y su cumplimiento normativo.
  BC-2840.20.40:
    name: Uso prudente de antimicrobianos
    description: |
      Operaciones del programa de uso prudente de antimicrobianos y supervisión de la prescripción.
  BC-2840.30:
    name: Medición de resultados clínicos
    description: |
      Medición e informes de resultados clínicos frente a indicadores clave, envíos a registros
      y resultados notificados por los pacientes.
  BC-2840.30.10:
    name: Notificación de indicadores clave de calidad
    description: |
      Captura y envío de indicadores de calidad regulatorios obligatorios.
  BC-2840.30.20:
    name: Seguimiento de mortalidad y reingresos
    description: |
      Seguimiento de mortalidad, reingresos y resultados ajustados por riesgo.
  BC-2840.30.30:
    name: Envío a registros de resultados por especialidad
    description: |
      Envío a registros de resultados de especialidades como los de cardiología, cirugía e ictus.
  BC-2840.30.40:
    name: Captura de resultados notificados por el paciente
    description: |
      Captura y análisis de resultados y medidas de experiencia notificados por los pacientes.
  BC-2840.40:
    name: Acreditación y preparación para inspecciones
    description: |
      Preparación para la acreditación en programas clínicos, regulatorios y de inspección por especialidad.
  BC-2840.40.10:
    name: Programas de simulacros de inspección
    description: |
      Operaciones de simulacros de inspección y programas de preparación continua.
  BC-2840.40.20:
    name: Metodología de trazadores
    description: |
      Metodología de trazadores de pacientes y sistemas para la preparación ante la acreditación.
  BC-2840.40.30:
    name: Seguimiento del cumplimiento de estándares
    description: |
      Seguimiento del cumplimiento de los estándares de acreditación y regulatorios.
  BC-2840.40.40:
    name: Coordinación de la respuesta a inspecciones
    description: |
      Coordinación de las inspecciones de acreditación, los hallazgos y los planes de acción correctiva.
  BC-2840.50:
    name: Gestión del riesgo clínico y la responsabilidad civil
    description: |
      Identificación y mitigación de riesgos clínicos y defensa ante reclamaciones de responsabilidad
      específicas de la atención médica.
  BC-2840.50.10:
    name: Valoración del riesgo clínico
    description: |
      Identificación y evaluación de riesgos clínicos en los servicios y procesos.
  BC-2840.50.20:
    name: Apoyo a la defensa de reclamaciones
    description: |
      Apoyo a la investigación y defensa de reclamaciones por negligencia médica.
  BC-2840.50.30:
    name: Proceso de divulgación y disculpa
    description: |
      Operaciones del programa de divulgación y disculpa ante eventos adversos.
  BC-2840.50.40:
    name: Planificación de la mitigación del riesgo clínico
    description: |
      Planificación y ejecución de acciones de mitigación del riesgo clínico.
  BC-2840.60:
    name: Programas de mejora de la calidad
    description: |
      Metodología de mejora del rendimiento, implementación de bundles e iniciativas de alta fiabilidad.
  BC-2840.60.10:
    name: Gestión del ciclo PDSA
    description: |
      Gestión del ciclo Planificar-Hacer-Estudiar-Actuar para la mejora clínica.
  BC-2840.60.20:
    name: Implementación de bundles y protocolos
    description: |
      Implementación de bundles basados en evidencia y protocolos clínicos.
  BC-2840.60.30:
    name: Seguimiento de proyectos de mejora del rendimiento
    description: |
      Seguimiento de proyectos de mejora del rendimiento y sus resultados.
  BC-2840.60.40:
    name: Iniciativas de alta fiabilidad
    description: |
      Principios de organización de alta fiabilidad y gestión de iniciativas asociadas.

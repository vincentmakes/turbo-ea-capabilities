locale: es
source: L1-electrical-product-qualification-management.yaml
entries:
  BC-1920:
    name: Gestión de calificación de productos eléctricos
    description: |
      Orquestación de ensayos de tipo sobre muestras representativas — dieléctricos, cortocircuito,
      EMC, climáticos, mecánicos y de vida — incluidas las operaciones de laboratorio acreditado.
  BC-1920.10:
    name: Gestión de planes y especificaciones de prueba
    description: |
      Elaboración y aprobación de planes y especificaciones de prueba derivados de normas de producto.
  BC-1920.10.10:
    name: Elaboración de especificaciones de prueba
    description: |
      Elaboración de especificaciones de prueba detalladas.
  BC-1920.10.20:
    name: Aprobación del plan de prueba
    description: |
      Aprobación de planes de prueba por las partes interesadas de ingeniería, calidad y certificación.
  BC-1920.10.30:
    name: Asignación de muestras de prueba
    description: |
      Asignación y custodia de muestras de prueba representativas.
  BC-1920.10.40:
    name: Mantenimiento de procedimientos de prueba
    description: |
      Mantenimiento y revisión de procedimientos de prueba normalizados.
  BC-1920.20:
    name: Ensayos dieléctricos y de alta tensión
    description: |
      Ensayos de aislamiento, rigidez dieléctrica, descarga parcial e impulso.
  BC-1920.20.10:
    name: Ensayo de resistencia de aislamiento
    description: |
      Medición de la resistencia de aislamiento en condiciones especificadas.
  BC-1920.20.20:
    name: Ensayo de rigidez dieléctrica
    description: |
      Ensayos de rigidez dieléctrica en AC y DC a los niveles de tensión nominales.
  BC-1920.20.30:
    name: Medición de descargas parciales
    description: |
      Medición de descargas parciales en sistemas de aislamiento.
  BC-1920.20.40:
    name: Ensayo de tensión de impulso
    description: |
      Ensayos de resistencia a impulsos de rayo y de maniobra.
  BC-1920.30:
    name: Ensayos de cortocircuito y maniobra
    description: |
      Verificación del comportamiento en cortocircuito y maniobra bajo condiciones de fallo nominales.
  BC-1920.30.10:
    name: Ensayo de capacidad de cierre en cortocircuito
    description: |
      Verificación de la capacidad de cierre ante cortocircuitos nominales.
  BC-1920.30.20:
    name: Ensayo de capacidad de corte en cortocircuito
    description: |
      Verificación de la capacidad de corte a los niveles de fallo nominales.
  BC-1920.30.30:
    name: Ensayo de resistencia a la maniobra
    description: |
      Resistencia mecánica y eléctrica bajo maniobras repetitivas.
  BC-1920.30.40:
    name: Ensayo de fallo de arco
    description: |
      Ensayos de contención de fallo de arco y comportamiento ante arco eléctrico.
  BC-1920.40:
    name: Ensayos EMC y EMI
    description: |
      Ensayos de emisiones conducidas y radiadas e inmunidad.
  BC-1920.40.10:
    name: Ensayo de emisiones conducidas
    description: |
      Medición de emisiones conducidas en líneas de alimentación y señal.
  BC-1920.40.20:
    name: Ensayo de emisiones radiadas
    description: |
      Medición de emisiones electromagnéticas radiadas.
  BC-1920.40.30:
    name: Ensayo de inmunidad EMC
    description: |
      Verificación de la inmunidad frente a perturbaciones conducidas y radiadas.
  BC-1920.40.40:
    name: Ensayo de inmunidad ESD y sobretensión
    description: |
      Ensayos de inmunidad a descargas electrostáticas y sobretensiones.
  BC-1920.50:
    name: Ensayos ambientales y climáticos
    description: |
      Ensayos climáticos, de corrosión, de protección contra ingreso y de exposición de los productos.
  BC-1920.50.10:
    name: Ciclos de temperatura y humedad
    description: |
      Ciclos de temperatura y humedad y tensión en estado estacionario.
  BC-1920.50.20:
    name: Ensayos de niebla salina y corrosión
    description: |
      Ensayos de exposición a niebla salina y atmósferas corrosivas.
  BC-1920.50.30:
    name: Ensayo de protección contra ingreso
    description: |
      Verificación del grado de protección contra polvo y agua.
  BC-1920.50.40:
    name: Ensayos de exposición solar y UV
    description: |
      Ensayos de exposición a radiación solar y ultravioleta.
  BC-1920.60:
    name: Ensayos mecánicos y de vibración
    description: |
      Ensayos de vibración, choque, resistencia mecánica y calificación sísmica.
  BC-1920.60.10:
    name: Ensayos de vibración y choque
    description: |
      Ensayos de vibración sinusoidal, aleatoria y de choque.
  BC-1920.60.20:
    name: Ensayo de resistencia mecánica
    description: |
      Resistencia mecánica bajo ciclos de operación.
  BC-1920.60.30:
    name: Ensayos de caída e impacto
    description: |
      Ensayos de caída, caída libre e impacto de productos y embalajes.
  BC-1920.60.40:
    name: Ensayo de calificación sísmica
    description: |
      Calificación sísmica para equipos de potencia y subestaciones.
  BC-1920.70:
    name: Ensayos de vida acelerada y fiabilidad
    description: |
      Ensayos de vida acelerada, cribado de tensión y demostración de fiabilidad.
  BC-1920.70.10:
    name: Ensayo de vida altamente acelerada
    description: |
      HALT para exponer márgenes de diseño mediante tensión escalonada.
  BC-1920.70.20:
    name: Cribado de tensión altamente acelerado
    description: |
      Cribado de producción HASS para detectar defectos latentes.
  BC-1920.70.30:
    name: Ensayo de demostración de fiabilidad
    description: |
      Ensayos de demostración frente a objetivos de fiabilidad.
  BC-1920.70.40:
    name: Ensayo de rodaje
    description: |
      Rodaje con alimentación para precipitar fallos de mortalidad infantil.
  BC-1920.80:
    name: Gestión de operaciones de laboratorio de prueba
    description: |
      Operación de laboratorios de prueba internos acreditados.
  BC-1920.80.10:
    name: Acreditación del laboratorio de prueba
    description: |
      Mantenimiento del alcance de acreditación ISO/IEC 17025.
  BC-1920.80.20:
    name: Calibración de equipos de prueba
    description: |
      Calibración y trazabilidad de los equipos de prueba.
  BC-1920.80.30:
    name: Gestión de registros de datos de prueba
    description: |
      Gestión a largo plazo de registros de datos e informes de prueba.
  BC-1920.80.40:
    name: Comparación interlaboratorial
    description: |
      Pruebas de aptitud interlaboratorial mediante comparación circular.

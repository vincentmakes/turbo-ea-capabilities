locale: es
source: L1-border-immigration-management.yaml
entries:
  BC-3300:
    name: Gestión de fronteras e inmigración
    description: |
      Control fronterizo de personas, autorización de visados y viajes, determinación de la
      condición de refugiado y asilo, administración del estatus migratorio y la residencia,
      naturalización y operaciones de expulsión.
  BC-3300.10:
    name: Gestión de visados y autorizaciones de viaje
    description: |
      Tramitación de solicitudes, toma de decisiones y expedición de visados y autorizaciones
      de viaje, incluida la preautorización electrónica de viaje.
    in_scope:
      - Tramitación y decisión de solicitudes de visado
      - Autorización electrónica de viaje
      - Detección de fraude en visados
    out_of_scope:
      - Aduanas y cumplimiento del comercio de mercancías (cubierto por Gestión de aduanas y cumplimiento comercial)
  BC-3300.10.10:
    name: Tramitación de solicitudes de visado
    description: |
      Recepción, validación y tramitación de las solicitudes de visado en todas las categorías.
  BC-3300.10.20:
    name: Decisión sobre visados
    description: |
      Toma de decisiones sobre las solicitudes de visado, incluida la denegación y las condiciones.
  BC-3300.10.30:
    name: Autorización electrónica de viaje
    description: |
      Expedición y revocación de autorizaciones electrónicas de viaje previas al desplazamiento.
  BC-3300.10.40:
    name: Detección de fraude en visados
    description: |
      Filtrado de solicitudes para detectar fraude, manipulación de documentos y anomalías en
      los documentos de identidad.
  BC-3300.20:
    name: Inspección fronteriza y admisión
    description: |
      Inspección y admisión de viajeros en los puertos de entrada, incluida la inspección
      primaria y secundaria.
  BC-3300.20.10:
    name: Procesamiento de información anticipada de pasajeros
    description: |
      Procesamiento de los datos API y PNR antes de la llegada del viajero.
  BC-3300.20.20:
    name: Inspección primaria
    description: |
      Inspección en la primera línea de los puertos de entrada, incluida la verificación biométrica.
  BC-3300.20.30:
    name: Inspección secundaria
    description: |
      Inspección secundaria de los viajeros que requieren un examen más detallado.
  BC-3300.20.40:
    name: Decisión de admisión o denegación
    description: |
      Toma de decisiones sobre la admisión, la denegación y las condiciones de entrada.
  BC-3300.30:
    name: Determinación del estatuto de refugiado y asilo
    description: |
      Recepción, examen y determinación de las solicitudes de asilo conforme a la Convención
      de Refugiados de 1951 y los regímenes nacionales de protección.
  BC-3300.30.10:
    name: Recepción de solicitudes de asilo
    description: |
      Recepción y registro de las solicitudes de asilo en las fronteras y en territorio nacional.
  BC-3300.30.20:
    name: Determinación del estatuto de refugiado
    description: |
      Resolución del estatuto de refugiado conforme a la Convención de 1951 y la protección
      complementaria.
  BC-3300.30.30:
    name: Coordinación de la acogida y apoyo a solicitantes de asilo
    description: |
      Coordinación de la acogida, el alojamiento y el apoyo básico para los solicitantes de asilo.
  BC-3300.30.40:
    name: Reasentamiento y vías humanitarias
    description: |
      Operación de programas de reasentamiento y admisión humanitaria.
  BC-3300.40:
    name: Gestión del estatus migratorio y la residencia
    description: |
      Administración del estatus migratorio en territorio nacional, incluidos los permisos de
      residencia, las autorizaciones de trabajo y los casos de reagrupación familiar.
  BC-3300.40.10:
    name: Administración de permisos de residencia
    description: |
      Expedición y renovación de permisos de residencia y tarjetas de residencia biométricas.
  BC-3300.40.20:
    name: Administración de autorizaciones de trabajo
    description: |
      Administración de los permisos de trabajo, las licencias de patrocinio y las pruebas de
      mercado laboral.
  BC-3300.40.30:
    name: Tramitación de reagrupación familiar
    description: |
      Tramitación de las solicitudes de reagrupación familiar y dependientes.
  BC-3300.40.40:
    name: Seguimiento del cumplimiento del estatus
    description: |
      Seguimiento del cumplimiento de las condiciones migratorias y los cambios de estatus.
  BC-3300.50:
    name: Gestión de la naturalización y la ciudadanía
    description: |
      Resolución de las solicitudes de naturalización, la ciudadanía por descendencia o
      registro y los casos de privación de la ciudadanía.
  BC-3300.50.10:
    name: Tramitación de solicitudes de naturalización
    description: |
      Tramitación de las solicitudes de naturalización y las evaluaciones de buena conducta.
  BC-3300.50.20:
    name: Ciudadanía por descendencia e inscripción
    description: |
      Determinación de la ciudadanía por descendencia, inscripción y adopción.
  BC-3300.50.30:
    name: Administración de ceremonias de ciudadanía y juramentos
    description: |
      Administración de las ceremonias de ciudadanía y los juramentos de lealtad.
  BC-3300.50.40:
    name: Gestión de la privación de la ciudadanía
    description: |
      Resolución de los casos de privación, renuncia y revocación de la ciudadanía.
  BC-3300.60:
    name: Gestión de expulsiones y detención
    description: |
      Operaciones de detención, expulsión y retorno voluntario de personas sin estatus migratorio.
  BC-3300.60.10:
    name: Operaciones de detención de inmigrantes
    description: |
      Operación de los centros de internamiento de extranjeros y los estándares de bienestar.
  BC-3300.60.20:
    name: Ejecución de órdenes de expulsión
    description: |
      Ejecución de las órdenes de expulsión y deportación, incluidas las expulsiones con escolta.
  BC-3300.60.30:
    name: Operaciones del programa de retorno voluntario
    description: |
      Coordinación de los programas de retorno voluntario asistido y reintegración.

locale: es
source: L1-mine-planning-engineering-management.yaml
entries:
  BC-4420:
    name: Gestión de planificación e ingeniería minera
    description: |
      Planificación minera estratégica, a largo plazo y a corto plazo, junto con
      las disciplinas de ingeniería minera, geotécnica e hidrogeología que
      traducen el recurso en planes de producción ejecutables.

  BC-4420.10:
    name: Planificación minera estratégica
    description: |
      Definición de la estrategia de extracción para la vida de la mina,
      selección del método de minería, límites de pit y secuenciación de
      proyectos de capital.
    in_scope:
      - Plan de vida de la mina y cáscaras de pit
      - Selección del método de minería subterránea
      - Secuenciación y aprobaciones de proyectos de capital
    out_of_scope:
      - Programación de producción presupuestada anual (BC-4420.20)

  BC-4420.10.10:
    name: Planificación para la vida de la mina
    description: |
      Definición de la estrategia de extracción, la secuenciación y el
      presupuesto de capital para la vida de la mina.

  BC-4420.10.20:
    name: Optimización de pit
    description: |
      Optimización de cáscaras de pit mediante el método de Lerchs-Grossmann y
      equivalentes en función de insumos económicos y geotécnicos.

  BC-4420.10.30:
    name: Selección del método de minería subterránea
    description: |
      Selección de métodos de minería subterránea como hundimiento por bloques,
      hundimiento por subniveles o laboreo por cámaras y pilares según la
      geometría del cuerpo mineralizado.

  BC-4420.10.40:
    name: Secuenciación de proyectos de capital
    description: |
      Secuenciación de los principales proyectos de capital a lo largo del
      horizonte de vida de la mina.

  BC-4420.20:
    name: Planificación minera a largo plazo
    description: |
      Planificación de producción anual y plurianual, estrategia de pilas de
      mineral y planificación de equipos de capital.

  BC-4420.20.10:
    name: Definición del plan de producción anual
    description: |
      Definición del plan anual de producción minera y el presupuesto.

  BC-4420.20.20:
    name: Planificación de estrategia de pilas de mineral
    description: |
      Planificación plurianual de construcción, extracción y remanejo de pilas
      de mineral.

  BC-4420.20.30:
    name: Estrategia de ley de corte
    description: |
      Estrategia de ley de corte variable en el tiempo a lo largo de la vida de
      la mina.

  BC-4420.20.40:
    name: Planificación de equipos de capital
    description: |
      Planificación a largo plazo para la renovación y adición de equipos de
      capital de la flota minera.

  BC-4420.30:
    name: Planificación minera a corto plazo
    description: |
      Programación minera trimestral, semanal y diaria que impulsa la ejecución
      de la producción y el control de leyes.

  BC-4420.30.10:
    name: Programación trimestral de producción
    description: |
      Preparación del programa de producción trimestral alineado con el plan
      anual.

  BC-4420.30.20:
    name: Definición del programa minero semanal
    description: |
      Definición del programa minero semanal por banco, stope y equipo.

  BC-4420.30.30:
    name: Planificación diaria de despacho
    description: |
      Planificación diaria y por turno de las asignaciones de la flota minera.

  BC-4420.30.40:
    name: Planificación de control de leyes
    description: |
      Planificación del muestreo de control de leyes y el enrutamiento de bloques
      de mineral para la ejecución a corto plazo.

  BC-4420.40:
    name: Ingeniería de diseño minero
    description: |
      Diseño de ingeniería de pits, excavaciones subterráneas, patrones de
      perforación y voladura, caminos de acarreo e infraestructura de ventilación
      minera.

  BC-4420.40.10:
    name: Diseño de pit a cielo abierto
    description: |
      Diseño de ingeniería de bancos, rampas y cáscaras de pit para operaciones
      a cielo abierto.

  BC-4420.40.20:
    name: Diseño de mina subterránea
    description: |
      Diseño de ingeniería de galerías, declines, piques y stopes para
      operaciones subterráneas.

  BC-4420.40.30:
    name: Diseño de perforación y voladura
    description: |
      Diseño de patrones, carga y temporización para la perforación y voladura
      de producción.

  BC-4420.40.40:
    name: Diseño de caminos de acarreo
    description: |
      Diseño geométrico y estructural de las redes de caminos de acarreo minero.

  BC-4420.40.50:
    name: Diseño de ventilación y servicios
    description: |
      Diseño de ingeniería de los sistemas de ventilación, drenaje, energía y
      aire comprimido para minas subterráneas.

  BC-4420.50:
    name: Ingeniería geotécnica
    description: |
      Ingeniería geotécnica para la estabilidad de taludes, sostenimiento del
      terreno y gestión de georriesgos en minas a cielo abierto y subterráneas.

  BC-4420.50.10:
    name: Ingeniería de estabilidad de taludes
    description: |
      Análisis de estabilidad de taludes y diseño de paredes de pit para
      operaciones a cielo abierto.

  BC-4420.50.20:
    name: Diseño de sostenimiento de terreno subterráneo
    description: |
      Diseño de ingeniería de pernos, malla, shotcrete y sostenimiento con cables
      para excavaciones subterráneas.

  BC-4420.50.30:
    name: Definición del programa de monitoreo geotécnico
    description: |
      Definición de programas de monitoreo geotécnico que cubren densidad de
      instrumentación, umbrales y ciclos de revisión.

  BC-4420.50.40:
    name: Evaluación de riesgo de georriesgos
    description: |
      Evaluación de peligros de caída de rocas, sismicidad y subsidencia en las
      operaciones mineras.

  BC-4420.60:
    name: Ingeniería hidrogeológica minera
    description: |
      Ingeniería hidrogeológica que abarca el modelado de aguas subterráneas, el
      diseño del drenaje minero y el balance hídrico del sitio.

  BC-4420.60.10:
    name: Modelado de aguas subterráneas
    description: |
      Modelado numérico del comportamiento de las aguas subterráneas alrededor
      del área de influencia de la mina.

  BC-4420.60.20:
    name: Diseño del drenaje minero
    description: |
      Diseño de ingeniería de los sistemas de drenaje de pit y subterráneos.

  BC-4420.60.30:
    name: Modelado de balance hídrico
    description: |
      Modelado del balance hídrico a escala de sitio para la planificación
      operativa y de cierre.

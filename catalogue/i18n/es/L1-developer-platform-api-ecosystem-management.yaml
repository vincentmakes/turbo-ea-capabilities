locale: es
source: L1-developer-platform-api-ecosystem-management.yaml
entries:
  BC-4270:
    name: Gestión de la plataforma de desarrolladores y ecosistema de API
    description: |
      APIs públicas, SDKs, portal de desarrolladores, identidad de desarrolladores,
      gobernanza del consumo de API, aplicaciones de socios, listados en mercados
      de software y suscripciones de webhooks salientes para el ecosistema SaaS.
  BC-4270.10:
    name: Gestión del ciclo de vida de las API públicas
    description: |
      Especificación, versionado y deprecación de las APIs públicas expuestas
      a desarrolladores externos.
  BC-4270.10.10:
    name: Redacción de especificaciones de API
    description: |
      Redacción y revisión de especificaciones de API públicas en formato
      legible por máquina.
  BC-4270.10.20:
    name: Versionado de API
    description: |
      Versionado de las APIs públicas con garantías de compatibilidad
      documentadas.
  BC-4270.10.30:
    name: Gestión de la deprecación de API
    description: |
      Comunicación y ejecución de las deprecaciones de API con aviso previo
      adecuado.
  BC-4270.20:
    name: Gestión de SDK y bibliotecas cliente
    description: |
      Generación, cobertura de lenguajes y mantenimiento de ejemplos de SDKs
      y bibliotecas cliente que envuelven las APIs públicas.
  BC-4270.20.10:
    name: Generación y lanzamiento de SDK
    description: |
      Generación y lanzamiento de SDKs alineados con las versiones de API.
  BC-4270.20.20:
    name: Gestión de la cobertura de lenguajes del SDK
    description: |
      Selección y administración de los lenguajes y entornos de ejecución
      de SDK compatibles.
  BC-4270.20.30:
    name: Mantenimiento de ejemplos del SDK
    description: |
      Mantenimiento de los ejemplos de código del SDK y los proyectos
      de inicio.
  BC-4270.30:
    name: Gestión del portal de desarrolladores
    description: |
      Documentación, referencias interactivas y flujos de incorporación que
      ayudan a los desarrolladores a integrarse con la plataforma.
  BC-4270.30.10:
    name: Redacción de documentación para desarrolladores
    description: |
      Redacción de documentación conceptual, de tareas y de referencia para
      desarrolladores.
  BC-4270.30.20:
    name: Referencia de API interactiva
    description: |
      Operación de la referencia de API interactiva y las experiencias de
      prueba en línea.
  BC-4270.30.30:
    name: Incorporación de desarrolladores
    description: |
      Flujos de incorporación que llevan a los desarrolladores desde el registro
      hasta la primera llamada de API exitosa.
  BC-4270.40:
    name: Gestión de identidad y credenciales del desarrollador
    description: |
      Emisión y administración de credenciales de desarrollador, clientes OAuth
      e identidad federada del desarrollador.
  BC-4270.40.10:
    name: Emisión de claves de API
    description: |
      Emisión, rotación y revocación de claves de API para desarrolladores.
  BC-4270.40.20:
    name: Registro de clientes OAuth
    description: |
      Registro y administración de las aplicaciones cliente OAuth.
  BC-4270.40.30:
    name: Federación de identidades del desarrollador
    description: |
      Federación de la identidad del desarrollador desde proveedores de
      identidad externos.
  BC-4270.50:
    name: Gobernanza del consumo de API
    description: |
      Cuotas, límites de velocidad, analítica de uso y asignación del consumo
      de API a los niveles de plan comercial.
  BC-4270.50.10:
    name: Gestión de cuotas y límites de velocidad de API
    description: |
      Definición y aplicación de cuotas y límites de velocidad de API por
      consumidor.
  BC-4270.50.20:
    name: Analítica de uso de API
    description: |
      Analítica de los patrones de consumo de API por punto de acceso,
      consumidor y plan.
  BC-4270.50.30:
    name: Asignación de API a niveles de plan
    description: |
      Asignación de los niveles de acceso a API a los planes de suscripción
      y derechos.
  BC-4270.60:
    name: Gestión del programa de aplicaciones de socios
    description: |
      Administración de las aplicaciones de socios externos, incluyendo
      listado, certificación y reparto de ingresos.
  BC-4270.60.10:
    name: Gestión de listados de aplicaciones de socios
    description: |
      Listado de las aplicaciones de socios en el directorio de aplicaciones
      de la plataforma.
  BC-4270.60.20:
    name: Certificación de aplicaciones de socios
    description: |
      Certificación de las aplicaciones de socios conforme a los estándares
      de seguridad y calidad.
  BC-4270.60.30:
    name: Reparto de ingresos con aplicaciones de socios
    description: |
      Acuerdos de reparto de ingresos con los desarrolladores de aplicaciones
      de socios.
  BC-4270.70:
    name: Gestión de listados en mercados de software
    description: |
      Listado y administración de la oferta SaaS en mercados de software y
      mercados en la nube de terceros.
  BC-4270.70.10:
    name: Redacción de listados en mercados
    description: |
      Redacción de listados en mercados, incluyendo metadatos, precios y
      recursos gráficos.
  BC-4270.70.20:
    name: Mantenimiento de listados en mercados
    description: |
      Mantenimiento continuo de los listados en mercados a medida que la
      oferta evoluciona.
  BC-4270.70.30:
    name: Coordinación de venta conjunta en mercados
    description: |
      Coordinación de los movimientos de venta conjunta con los operadores
      de los mercados.
  BC-4270.80:
    name: Gestión de webhooks y suscripciones a eventos
    description: |
      Ciclo de vida de las suscripciones de webhooks salientes, esquemas de
      eventos y fiabilidad de la entrega.
  BC-4270.80.10:
    name: Ciclo de vida de la suscripción de webhooks
    description: |
      Ciclo de vida de las suscripciones de webhooks salientes desde el
      registro hasta la retirada.
  BC-4270.80.20:
    name: Catálogo de esquemas de eventos
    description: |
      Catálogo de esquemas de eventos salientes y sus garantías de
      compatibilidad.
  BC-4270.80.30:
    name: Gestión de la fiabilidad de entrega de webhooks
    description: |
      Reintento, retroceso exponencial y gestión de mensajes no entregados
      para la entrega de webhooks salientes.

locale: es
source: L1-corporate-communications-management.yaml
entries:
  BC-850:
    name: Gestión de las comunicaciones corporativas
    description: |
      Planifica y ejecuta las comunicaciones internas y externas de la organización para proteger su reputación y alinear a todos los grupos de interés.
  BC-850.10:
    name: Gestión de las comunicaciones internas
    description: |
      Diseña y ejecuta comunicaciones dirigidas a empleados y líderes para mantener la alineación y el compromiso organizacional.
  BC-850.10.10:
    name: Comunicaciones a empleados
    description: |
      Gestiona boletines, la intranet y los encuentros generales para mantener informados a los empleados.
  BC-850.10.20:
    name: Comunicaciones de liderazgo
    description: |
      Elabora mensajes y comunicaciones del CEO y el equipo directivo para toda la organización.
  BC-850.10.30:
    name: Comunicaciones de cambio y transformación
    description: |
      Diseña y ejecuta comunicaciones internas de apoyo a iniciativas de cambio y transformación.
  BC-850.10.40:
    name: Gestión de canales internos
    description: |
      Administra los canales de comunicación interna, incluyendo intranet, Slack y Teams.
  BC-850.20:
    name: Gestión de las comunicaciones externas
    description: |
      Desarrolla la arquitectura de mensajes y los contenidos dirigidos a audiencias externas.
  BC-850.20.10:
    name: Arquitectura de mensajes externos
    description: |
      Define la arquitectura de mensajes y el relato corporativo para las audiencias externas.
  BC-850.20.20:
    name: Declaraciones corporativas y documentos de posición
    description: |
      Redacta declaraciones corporativas y documentos de posición para comunicaciones oficiales.
  BC-850.20.30:
    name: Sitio web corporativo y canales propios
    description: |
      Gestiona los contenidos del sitio web corporativo y los canales externos de propiedad de la organización.
  BC-850.30:
    name: Gestión de relaciones públicas
    description: |
      Protege y mejora la reputación de la organización ante sus grupos de interés clave.
  BC-850.30.10:
    name: Gestión de la reputación
    description: |
      Realiza el seguimiento de la reputación, analiza el sentimiento y define la estrategia reputacional.
  BC-850.30.20:
    name: Gestión del liderazgo de opinión
    description: |
      Desarrolla contenidos de liderazgo de opinión y posiciona a los directivos como referentes del sector.
  BC-850.30.30:
    name: Asuntos públicos y relaciones con la administración
    description: |
      Gestiona las relaciones con las administraciones públicas y el compromiso con los responsables de política.
  BC-850.40:
    name: Gestión de relaciones con los medios
    description: |
      Establece y mantiene relaciones con los medios de comunicación para asegurar una cobertura precisa y favorable.
  BC-850.40.10:
    name: Gestión de comunicados de prensa
    description: |
      Redacta, aprueba y distribuye comunicados de prensa de forma oportuna.
  BC-850.40.20:
    name: Relación con periodistas
    description: |
      Gestiona las relaciones con periodistas, entrevistas y sesiones de información.
  BC-850.40.30:
    name: Monitorización de medios
    description: |
      Monitoriza la cobertura mediática y la cuota de voz de la organización en los medios.
  BC-850.40.40:
    name: Preparación de portavoces ante los medios
    description: |
      Identifica, forma y prepara a los portavoces corporativos para su interacción con los medios.
  BC-850.50:
    name: Gestión de comunicaciones en crisis
    description: |
      Planifica y ejecuta las comunicaciones durante crisis e incidentes para proteger la reputación organizacional.
  BC-850.50.10:
    name: Planificación de la comunicación en crisis
    description: |
      Elabora planes de comunicación en crisis predefinidos por escenario para agilizar la respuesta.
  BC-850.50.20:
    name: Preparación de declaraciones en crisis
    description: |
      Redacta declaraciones y preguntas frecuentes de forma ágil durante situaciones de crisis o incidentes.
  BC-850.50.30:
    name: Gestión de portavoces en crisis
    description: |
      Coordina a los portavoces y gestiona la relación con los medios durante situaciones de crisis.
  BC-850.50.40:
    name: Recuperación reputacional post-crisis
    description: |
      Ejecuta las comunicaciones post-crisis y las acciones de recuperación de la reputación.
  BC-850.60:
    name: Gestión de comunicaciones con grupos de interés
    description: |
      Diseña y ejecuta planes de comunicación dirigidos a grupos de interés específicos para garantizar su alineación y compromiso.
  BC-850.60.10:
    name: Mapeo de grupos de interés
    description: |
      Identifica y segmenta a los grupos de interés externos relevantes para la organización.
  BC-850.60.20:
    name: Planificación del compromiso con grupos de interés
    description: |
      Diseña planes de compromiso personalizados para cada grupo de interés clave.
  BC-850.60.30:
    name: Compromiso con comunidades y grupos de interés locales
    description: |
      Gestiona el compromiso con las comunidades locales y los grupos de interés del entorno próximo.

locale: es
source: L1-cargo-documentation-management.yaml
entries:
  BC-2500:
    name: Gestión de la documentación de carga
    description: |
      Emisión, intercambio y gestión del ciclo de vida de los documentos de carga,
      incluidos conocimientos de embarque, air waybills (AWB), cartas de porte
      por carretera y ferroviario, manifiestos y sus equivalentes electrónicos.
  BC-2500.10:
    name: Gestión del conocimiento de embarque (BL)
    description: |
      Emisión, entrega y gestión de conocimientos de embarque marítimos e
      interiores en forma negociable y no negociable.
    in_scope:
      - Conocimientos de embarque maestros y de la casa
      - Variantes negociable, directo y seaway bill
    out_of_scope:
      - Gestión de cartas de crédito en financiación comercial (BC-1360)
  BC-2500.10.10:
    name: Emisión del conocimiento de embarque
    description: |
      Emisión de conocimientos de embarque maestros y de la casa.
  BC-2500.10.20:
    name: Entrega y liberación del conocimiento de embarque
    description: |
      Liberación por télex, entrega y liberación de la carga contra conocimientos
      de embarque.
  BC-2500.10.30:
    name: Variantes de BL negociable y directo
    description: |
      Emisión de variantes negociables, directas y seaway bill.
  BC-2500.20:
    name: Gestión del air waybill (AWB)
    description: |
      Emisión y gestión de air waybills maestros y de la casa, incluido el
      e-AWB.
  BC-2500.20.10:
    name: Emisión del air waybill maestro
    description: |
      Emisión de air waybills maestros por las compañías aéreas.
  BC-2500.20.20:
    name: Emisión del air waybill de la casa
    description: |
      Emisión de air waybills de la casa por transitarios y consolidadores.
  BC-2500.20.30:
    name: Conversión y mantenimiento del e-AWB
    description: |
      Conversión de AWB en papel a e-AWB y mantenimiento del ciclo de vida.
  BC-2500.30:
    name: Gestión de cartas de porte por carretera y ferroviario
    description: |
      Emisión y gestión de cartas de porte por carretera y ferroviario bajo los
      regímenes CMR y CIM/SMGS.
  BC-2500.30.10:
    name: Emisión de la carta de porte CMR
    description: |
      Emisión de cartas de porte CMR para el transporte internacional por
      carretera.
  BC-2500.30.20:
    name: Emisión de cartas de porte CIM y SMGS
    description: |
      Emisión de cartas de porte CIM y SMGS para el ferroviario internacional.
  BC-2500.30.30:
    name: Emisión de cartas de porte nacionales domésticas
    description: |
      Emisión de cartas de porte nacionales domésticas y notas de entrega.
  BC-2500.40:
    name: Gestión de manifiestos y declaraciones de carga
    description: |
      Presentación de manifiestos de carga y declaraciones de pre-llegada a
      aduanas, terminales y transportistas socios.
  BC-2500.40.10:
    name: Presentación del manifiesto de entrada
    description: |
      Presentación de manifiestos de entrada ante terminales y aduanas.
  BC-2500.40.20:
    name: Presentación del manifiesto de salida
    description: |
      Presentación de manifiestos de salida ante terminales y aduanas.
  BC-2500.40.30:
    name: Informe de carga de pre-llegada
    description: |
      Informe de pre-llegada bajo regímenes como ICS2 y CBP ACE.
  BC-2500.50:
    name: Gestión de documentación electrónica
    description: |
      Operación de plataformas de documentos de transporte electrónicos,
      incluidos el eBL y los intercambios ONE Record.
  BC-2500.50.10:
    name: Operaciones del conocimiento de embarque electrónico
    description: |
      Operación de plataformas de conocimiento de embarque electrónico.
  BC-2500.50.20:
    name: Operaciones de e-AWB y ONE Record
    description: |
      Operación de los intercambios de datos e-AWB y ONE Record.
  BC-2500.50.30:
    name: Intercambio y verificación de documentos
    description: |
      Intercambio de documentos entre partes y verificación de firmas y sellos
      electrónicos.

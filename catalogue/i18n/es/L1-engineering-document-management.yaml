locale: es
source: L1-engineering-document-management.yaml
entries:
  BC-1130:
    name: Gestión de documentos de ingeniería
    description: |
      Documentos de ingeniería controlados: planos, especificaciones y datos de proveedores.
  BC-1130.10:
    name: Gestión del control de documentos
    description: |
      Numeración de documentos, control de revisiones y registro maestro de documentos.
  BC-1130.10.10:
    name: Numeración y codificación de documentos
    description: |
      Esquemas de numeración, taxonomía y codificación de documentos.
  BC-1130.10.20:
    name: Control de revisiones
    description: |
      Seguimiento de revisiones, estado e historial de versiones.
  BC-1130.10.30:
    name: Registro maestro de documentos
    description: |
      Mantenimiento del registro maestro de documentos y sus estados.
  BC-1130.20:
    name: Gestión de planos
    description: |
      Ciclo de vida, distribución y aprobación de planos.
  BC-1130.20.10:
    name: Flujo de producción de planos
    description: |
      Flujo de producción de planos con verificación, revisión y emisión.
  BC-1130.20.20:
    name: Aprobación y emisión de planos
    description: |
      Aprobación y emisión de planos a construcción y partes interesadas.
  BC-1130.20.30:
    name: Seguimiento del ciclo de vida de planos
    description: |
      Seguimiento del ciclo de vida desde preliminar hasta conforme a obra.
  BC-1130.30:
    name: Gestión de especificaciones
    description: |
      Especificaciones técnicas, hojas de datos y cumplimiento de normas.
  BC-1130.30.10:
    name: Elaboración de especificaciones técnicas
    description: |
      Elaboración de especificaciones técnicas y hojas de datos.
  BC-1130.30.20:
    name: Biblioteca de normas de ingeniería
    description: |
      Mantenimiento de la biblioteca de normas de ingeniería y referencias.
  BC-1130.30.30:
    name: Aprobación y emisión de especificaciones
    description: |
      Aprobación y emisión de especificaciones a adquisición.
  BC-1130.40:
    name: Gestión de documentos de proveedores
    description: |
      Requisitos de datos de proveedores, entregas, revisiones y disposición.
  BC-1130.40.10:
    name: Definición de requisitos de datos de proveedores
    description: |
      Definición de listas de requisitos de datos de proveedores para órdenes de compra.
  BC-1130.40.20:
    name: Seguimiento de entregas de documentos de proveedores
    description: |
      Seguimiento de entregas y estado de los documentos de proveedores.
  BC-1130.40.30:
    name: Revisión y disposición de documentos de proveedores
    description: |
      Revisión y disposición de documentos de proveedores (código 1/2/3).
  BC-1130.50:
    name: Gestión de distribución y transmisión de documentos
    description: |
      Transmisiones, correspondencia formal y seguimiento de destinatarios.
  BC-1130.50.10:
    name: Emisión de transmisiones
    description: |
      Emisión formal de transmisiones de documentos.
  BC-1130.50.20:
    name: Gestión de la matriz de distribución
    description: |
      Matrices de distribución y definición de destinatarios.
  BC-1130.50.30:
    name: Seguimiento de acuse de recibo
    description: |
      Acuse de recibo y pista de auditoría de recepciones.
  BC-1130.60:
    name: Gestión de documentación conforme a obra
    description: |
      Marcas en rojo, consolidación conforme a obra y paquetes de documentación de entrega.
  BC-1130.60.10:
    name: Captura de marcas en rojo
    description: |
      Captura de marcas en rojo de campo durante la construcción.
  BC-1130.60.20:
    name: Consolidación conforme a obra
    description: |
      Consolidación de las marcas en rojo en entregables conforme a obra.
  BC-1130.60.30:
    name: Compilación del paquete de documentos de entrega
    description: |
      Compilación de paquetes de entrega de operación y mantenimiento.

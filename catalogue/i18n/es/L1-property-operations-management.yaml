locale: es
source: L1-property-operations-management.yaml
entries:
  BC-4060:
    name: Gestión de operaciones de propiedad
    description: |
      Operación diaria de hoteles, resorts y establecimientos de alojamiento de
      servicio — recepción, limpieza, ingeniería, conserjería, seguridad, sostenibilidad
      y cumplimiento de las normas de marca y calidad.
    in_scope:
      - Operaciones de recepción y registro de entrada y salida
      - Limpieza y objetos perdidos
      - Ingeniería y mantenimiento del establecimiento
      - Conserjería, botones, aparcacoches y transporte de huéspedes
      - Seguridad del establecimiento, protección contra incendios y gestión de incidentes
      - Operaciones de sostenibilidad a nivel del establecimiento
      - Auditoría de normas de marca y conformidad de calidad
    out_of_scope:
      - Operaciones de alimentos y bebidas (BC-4070)
      - Gestión y ejecución de bloques grupales y eventos (BC-4110)
      - Estrategia de sostenibilidad empresarial (BC-740)

  BC-4060.10:
    name: Operaciones de recepción
    description: |
      Operación de la recepción que cubre la preparación previa a la llegada, el
      registro de entrada, la asignación de habitación, el registro de salida, la
      liquidación del folio y la emisión de llaves.

  BC-4060.10.10:
    name: Preparación previa a la llegada
    description: |
      Actividades de preparación antes de la llegada, incluyendo informes de llegada,
      asignaciones de habitación y preparación de amenidades.

  BC-4060.10.20:
    name: Operaciones de registro de entrada
    description: |
      Operaciones del registro de entrada del huésped a través de los canales de
      mostrador, móvil y quiosco.

  BC-4060.10.30:
    name: Asignación de habitación y mejora de categoría
    description: |
      Asignación de habitaciones y ejecución de decisiones de mejora de categoría,
      incluyendo mejoras de pago y gratuitas.

  BC-4060.10.40:
    name: Registro de salida y liquidación del folio
    description: |
      Operaciones del registro de salida del huésped y liquidación del folio del
      establecimiento.

  BC-4060.10.50:
    name: Emisión de llaves y credenciales de acceso
    description: |
      Emisión y revocación de llaves físicas y digitales de habitación y credenciales
      de acceso.

  BC-4060.20:
    name: Operaciones de limpieza
    description: |
      Operaciones de limpieza de habitaciones, servicio de cobertura, limpieza
      profunda y objetos perdidos en el establecimiento.

  BC-4060.20.10:
    name: Operaciones de limpieza diaria
    description: |
      Limpieza diaria de habitaciones de huéspedes en estancia y de salida conforme
      a los estándares del establecimiento.

  BC-4060.20.20:
    name: Servicio de cobertura y estancia prolongada
    description: |
      Servicios de cobertura y de estancia prolongada para los huéspedes alojados.

  BC-4060.20.30:
    name: Operaciones de limpieza profunda y habitaciones fuera de servicio
    description: |
      Operación de los ciclos de limpieza profunda y gestión de las habitaciones
      fuera de orden y fuera de servicio.

  BC-4060.20.40:
    name: Operaciones de objetos perdidos
    description: |
      Registro, almacenamiento y devolución de objetos perdidos a los huéspedes a
      nivel del establecimiento.

  BC-4060.30:
    name: Ingeniería y mantenimiento del establecimiento
    description: |
      Operaciones de ingeniería y mantenimiento que cubren trabajos preventivos,
      reactivos y de renovación, e inspecciones de cumplimiento.

  BC-4060.30.10:
    name: Operaciones de mantenimiento preventivo
    description: |
      Operación del mantenimiento preventivo conforme al calendario y a los datos de
      estado.

  BC-4060.30.20:
    name: Operaciones de mantenimiento reactivo
    description: |
      Operación del mantenimiento reactivo activado por las comunicaciones de los
      huéspedes y los resultados de las inspecciones.

  BC-4060.30.30:
    name: Sustitución de activos y renovación
    description: |
      Sustitución y renovación de los activos del establecimiento en habitaciones,
      espacios públicos y zonas de servicio.

  BC-4060.30.40:
    name: Inspecciones de cumplimiento de ingeniería
    description: |
      Inspecciones de cumplimiento que cubren sistemas contra incendios, sistemas de
      protección de la vida, ascensores y sistemas a presión.

  BC-4060.40:
    name: Conserjería y servicios al huésped
    description: |
      Servicios de conserjería, botones, aparcacoches y transporte del huésped
      prestados a lo largo del recorrido del cliente.

  BC-4060.40.10:
    name: Servicios de información y reservas de conserjería
    description: |
      Servicios de conserjería que cubren información del destino y reservas de
      restaurantes y actividades.

  BC-4060.40.20:
    name: Operaciones de botones y equipaje
    description: |
      Operaciones de manejo de equipaje por parte de los botones, incluyendo
      almacenamiento y entrega.

  BC-4060.40.30:
    name: Operaciones de aparcacoches
    description: |
      Servicios de aparcacoches y manejo de vehículos en los accesos del
      establecimiento.

  BC-4060.40.40:
    name: Coordinación del transporte del huésped
    description: |
      Coordinación del transporte terrestre del huésped, incluyendo el servicio de
      lanzadera del hotel y los traslados en coche.

  BC-4060.50:
    name: Operaciones de seguridad del establecimiento
    description: |
      Operaciones de vigilancia del establecimiento, protección contra incendios,
      evacuación y gestión de incidentes.

  BC-4060.50.10:
    name: Operaciones de vigilancia del establecimiento
    description: |
      Vigilancia de los espacios públicos y operativos, incluyendo supervisión y
      revisión.

  BC-4060.50.20:
    name: Operaciones de protección contra incendios y seguridad de la vida
    description: |
      Operación de los sistemas de protección contra incendios y seguridad de la
      vida, incluyendo simulacros y preparación del equipo.

  BC-4060.50.30:
    name: Operaciones de evacuación de emergencia
    description: |
      Ejecución de la evacuación de emergencia y las operaciones de mando de
      incidentes en el establecimiento.

  BC-4060.50.40:
    name: Gestión de incidentes con huéspedes
    description: |
      Gestión de incidentes de seguridad, robo y seguridad de huéspedes en el
      establecimiento.

  BC-4060.60:
    name: Operaciones de sostenibilidad del establecimiento
    description: |
      Operación a nivel del establecimiento de los programas de energía, agua,
      residuos y reutilización de ropa de cama, coherente con los compromisos de
      marca y certificación.
    in_scope:
      - Medición y supervisión del consumo en el establecimiento
      - Programas de reutilización y gestión de residuos a nivel del establecimiento
    out_of_scope:
      - Estrategia de sostenibilidad empresarial (BC-740)

  BC-4060.60.10:
    name: Operaciones energéticas del establecimiento
    description: |
      Operación de los sistemas de energía del establecimiento y supervisión del
      consumo frente a los objetivos.

  BC-4060.60.20:
    name: Operaciones de gestión del agua
    description: |
      Gestión del consumo de agua del establecimiento, incluyendo la detección de
      fugas y medidas de reutilización.

  BC-4060.60.30:
    name: Operaciones de residuos y reciclaje
    description: |
      Operación de los programas de separación de residuos, reciclaje y residuos
      alimentarios del establecimiento.

  BC-4060.60.40:
    name: Programas de reutilización de ropa de cama y toallas
    description: |
      Operación de los programas de reutilización de ropa de cama y toallas y los
      mecanismos de adhesión voluntaria de los huéspedes.

  BC-4060.70:
    name: Auditoría de calidad y normas de marca del establecimiento
    description: |
      Auditoría de la conformidad del establecimiento con las normas de marca y
      operación, programas de cliente misterioso y operaciones de recuperación del
      servicio.

  BC-4060.70.10:
    name: Operaciones de auditoría de normas de marca
    description: |
      Auditoría de la conformidad del establecimiento con las normas de marca y
      operación.

  BC-4060.70.20:
    name: Operaciones del programa de cliente misterioso
    description: |
      Operación de los programas de cliente misterioso que evalúan la experiencia
      del huésped conforme a recorridos predefinidos.

  BC-4060.70.30:
    name: Registro de acciones de recuperación del servicio
    description: |
      Registro de las acciones de recuperación del servicio adoptadas en el
      establecimiento, incluyendo compensación y seguimiento.

  BC-4060.70.40:
    name: Cierre de mejoras de calidad
    description: |
      Cierre de los hallazgos de auditoría y retroalimentación frente a los planes
      de mejora de calidad.

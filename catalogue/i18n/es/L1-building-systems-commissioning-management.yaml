locale: es
source: L1-building-systems-commissioning-management.yaml
entries:
  BC-2050:
    name: Gestión de puesta en marcha de sistemas de edificios
    description: |
      Comisionamiento de sistemas HVAC y BAS como servicio entregable — comisionamiento inicial,
      retrocomisionamiento, recomisionamiento y comisionamiento basado en monitoreo. Anclado en
      el proceso de comisionamiento total de edificios ASHRAE Guideline 0 / Guideline 1.1.
    in_scope:
      - Revisión de los requisitos del proyecto del propietario y base del diseño
      - Verificación de la instalación prefuncional e inspección de puesta en marcha
      - Pruebas de rendimiento funcional de los sistemas HVAC y BAS
      - Verificación de la secuencia de operación y pruebas de sistemas integrados
      - Retrocomisionamiento, recomisionamiento y comisionamiento basado en monitoreo
      - Documentación de Cx, manuales del sistema y entrega de formación al propietario
    out_of_scope:
      - Diseño de integración de ingeniería a nivel de proyecto (BC-2020)
      - Operaciones de servicio continuo tras la entrega (BC-2060)
      - Comisionamiento genérico de proyectos de ingeniería de planta capital (BC-1160)
  BC-2050.10:
    name: Planificación y alcance del comisionamiento
    description: |
      Establecimiento del programa de comisionamiento, el alcance y la base de aceptación para
      el proyecto.
  BC-2050.10.10:
    name: Revisión de los requisitos del proyecto del propietario
    description: |
      Revisión de los Requisitos del Proyecto del Propietario como línea de base del comisionamiento.
  BC-2050.10.20:
    name: Revisión de la base del diseño
    description: |
      Revisión de la Base del Diseño frente a los Requisitos del Proyecto del Propietario.
  BC-2050.10.30:
    name: Elaboración del plan de comisionamiento
    description: |
      Elaboración del plan de comisionamiento que define el alcance, los roles y la aceptación.
  BC-2050.10.40:
    name: Registro de riesgos del comisionamiento
    description: |
      Mantenimiento del registro de riesgos del comisionamiento durante la ejecución.
  BC-2050.20:
    name: Gestión de la inspección prefuncional
    description: |
      Verificación de la integridad de la instalación y la preparación para la puesta en marcha
      antes de las pruebas funcionales.
  BC-2050.20.10:
    name: Listas de verificación de instalación
    description: |
      Ejecución de listas de verificación de instalación.
  BC-2050.20.20:
    name: Inspección de puesta en marcha
    description: |
      Inspección de la puesta en marcha del equipo según los requisitos del fabricante.
  BC-2050.20.30:
    name: Registro de problemas prefuncionales
    description: |
      Registro de los problemas prefuncionales en el registro de incidencias del comisionamiento.
  BC-2050.20.40:
    name: Aprobación prefuncional
    description: |
      Aprobación de que se ha alcanzado la preparación prefuncional.
  BC-2050.30:
    name: Pruebas de rendimiento funcional
    description: |
      Pruebas de rendimiento funcional de los subsistemas HVAC y BAS frente a criterios documentados.
  BC-2050.30.10:
    name: Elaboración de guiones de prueba
    description: |
      Elaboración de guiones de prueba funcionales frente a la intención del diseño.
  BC-2050.30.20:
    name: Ejecución y presencia en pruebas
    description: |
      Ejecución y presencia como testigo en las pruebas funcionales de los sistemas HVAC y BAS.
  BC-2050.30.30:
    name: Resolución de problemas de prueba
    description: |
      Resolución de los problemas identificados durante las pruebas funcionales.
  BC-2050.30.40:
    name: Aprobación de resultados de prueba
    description: |
      Aprobación de los resultados de las pruebas y cierre de los casos de prueba.
  BC-2050.40:
    name: Verificación de la secuencia de operación
    description: |
      Verificación de las secuencias de control programadas frente a las secuencias de operación
      del diseño.
  BC-2050.40.10:
    name: Revisión de la lógica de control
    description: |
      Revisión de la lógica de control frente a las secuencias elaboradas.
  BC-2050.40.20:
    name: Verificación de consignas y modos
    description: |
      Verificación de las consignas y los modos de operación en los diferentes horarios.
  BC-2050.40.30:
    name: Pruebas de anulación y modo de fallo
    description: |
      Pruebas de las vías de anulación y los comportamientos en modo de fallo.
  BC-2050.40.40:
    name: Verificación basada en tendencias
    description: |
      Uso de datos de tendencias para verificar el rendimiento de la secuencia a lo largo del tiempo.
  BC-2050.50:
    name: Pruebas de sistemas integrados
    description: |
      Pruebas de comportamientos integrados entre sistemas que involucran HVAC, seguridad vital
      y sistemas eléctricos.
  BC-2050.50.10:
    name: Prueba de integración de protección contra incendios y seguridad vital
    description: |
      Pruebas de integración que cubren la interacción del HVAC con los sistemas de protección
      contra incendios y seguridad vital.
  BC-2050.50.20:
    name: Prueba de control de humo y presurización
    description: |
      Pruebas de las secuencias de control de humo y presurización.
  BC-2050.50.30:
    name: Prueba de fallo de alimentación y reducción de carga
    description: |
      Pruebas del comportamiento del HVAC durante cortes de alimentación y eventos de reducción
      de carga.
  BC-2050.50.40:
    name: Prueba de integración de red del edificio
    description: |
      Pruebas de integración entre el BAS y las redes TI adyacentes del edificio.
  BC-2050.60:
    name: Retrocomisionamiento y recomisionamiento
    description: |
      Servicio de comisionamiento aplicado a edificios existentes y como ciclos periódicos de
      recomisionamiento.
  BC-2050.60.10:
    name: Investigación del edificio existente
    description: |
      Investigación del rendimiento del edificio existente frente a la intención actual.
  BC-2050.60.20:
    name: Análisis de brechas de rendimiento
    description: |
      Análisis de las brechas de rendimiento y las causas raíz en edificios existentes.
  BC-2050.60.30:
    name: Implementación de medidas de retrocomisionamiento
    description: |
      Implementación de medidas de retrocomisionamiento en los sistemas existentes.
  BC-2050.60.40:
    name: Ejecución del ciclo de recomisionamiento
    description: |
      Ejecución de ciclos periódicos de recomisionamiento para un rendimiento sostenido.
  BC-2050.70:
    name: Comisionamiento basado en monitoreo
    description: |
      Comisionamiento continuo basado en datos que aprovecha la instrumentación y la telemetría.
  BC-2050.70.10:
    name: Plan de monitoreo e instrumentación
    description: |
      Elaboración de planes de monitoreo y selección de la instrumentación de soporte.
  BC-2050.70.20:
    name: Seguimiento continuo del rendimiento
    description: |
      Seguimiento continuo del rendimiento del edificio para obtener información de comisionamiento.
  BC-2050.70.30:
    name: Investigación de anomalías
    description: |
      Investigación de las anomalías detectadas a partir de las tendencias continuas.
  BC-2050.70.40:
    name: Verificación de la persistencia
    description: |
      Verificación de que el rendimiento comisionado persiste a lo largo del tiempo.
  BC-2050.80:
    name: Documentación y cierre del comisionamiento
    description: |
      Producción de los entregables del comisionamiento y cierre formal del alcance del
      comisionamiento.
  BC-2050.80.10:
    name: Elaboración del informe de comisionamiento
    description: |
      Elaboración del informe final de comisionamiento.
  BC-2050.80.20:
    name: Compilación del manual del sistema
    description: |
      Compilación del manual del sistema para la operación del propietario.
  BC-2050.80.30:
    name: Entrega de formación al propietario
    description: |
      Entrega de formación al propietario sobre los sistemas comisionados.
  BC-2050.80.40:
    name: Aprobación final de entrega
    description: |
      Aprobación final del comisionamiento y entrega a operaciones.

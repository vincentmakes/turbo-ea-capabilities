locale: es
source: L1-field-service-management.yaml
entries:
  BC-1050:
    name: Gestión de servicio de campo
    description: |
      Servicio a la base instalada, técnicos de campo, reparación e instalación en sitio.
  BC-1050.10:
    name: Gestión de solicitudes de servicio
    description: |
      Recepción, triaje y calificación de solicitudes de servicio.
  BC-1050.10.10:
    name: Recepción de solicitudes de servicio
    description: |
      Recepción multicanal de solicitudes de servicio de clientes.
  BC-1050.10.20:
    name: Triaje de solicitudes de servicio
    description: |
      Triaje, clasificación y enrutamiento de solicitudes de servicio.
  BC-1050.10.30:
    name: Diagnóstico y resolución remota
    description: |
      Diagnóstico remoto y resolución en el primer contacto.
  BC-1050.20:
    name: Gestión de despacho de servicio
    description: |
      Programación, enrutamiento y despacho de técnicos.
  BC-1050.20.10:
    name: Programación de técnicos
    description: |
      Programación de técnicos según habilidades y disponibilidad.
  BC-1050.20.20:
    name: Optimización de rutas
    description: |
      Optimización de rutas y desplazamientos para visitas de servicio.
  BC-1050.20.30:
    name: Ejecución del despacho
    description: |
      Despacho y reasignación en tiempo real de trabajos de servicio.
  BC-1050.30:
    name: Gestión de ejecución del servicio
    description: |
      Ejecución y reporte del servicio en sitio.
  BC-1050.30.10:
    name: Prestación del servicio en sitio
    description: |
      Ejecución en sitio de tareas de servicio conforme a la orden de trabajo.
  BC-1050.30.20:
    name: Captura de documentación del servicio
    description: |
      Captura de notas de servicio, fotos y firmas.
  BC-1050.30.30:
    name: Gestión de aceptación del cliente
    description: |
      Firma y aceptación del cliente al completar el servicio.
  BC-1050.40:
    name: Gestión de repuestos de servicio
    description: |
      Repuestos desplegados en campo, inventario en camioneta y reabastecimiento.
  BC-1050.40.10:
    name: Gestión del inventario en camioneta
    description: |
      Definición y gestión del stock en camioneta y puntos de stock adelantado.
  BC-1050.40.20:
    name: Reabastecimiento de repuestos de servicio
    description: |
      Reabastecimiento de ubicaciones de stock adelantado y técnicos.
  BC-1050.40.30:
    name: Devoluciones de repuestos de servicio
    description: |
      Devoluciones de repuestos no utilizados, defectuosos o reparables desde el campo.
  BC-1050.50:
    name: Gestión de contratos de servicio
    description: |
      Acuerdos de servicio, SLA y derechos de servicio.
  BC-1050.50.10:
    name: Elaboración de acuerdos de servicio
    description: |
      Elaboración de contratos de servicio, niveles y términos.
  BC-1050.50.20:
    name: Gestión de derechos de servicio
    description: |
      Verificación de derechos al recibir solicitudes y despachar servicios.
  BC-1050.50.30:
    name: Renovación de contratos de servicio
    description: |
      Renovación y actualización de contratos de servicio.
  BC-1050.50.40:
    name: Facturación de servicios
    description: |
      Facturación de contratos de servicio y trabajos por tiempo y materiales.
  BC-1050.60:
    name: Gestión del desempeño del servicio de campo
    description: |
      Tasa de resolución en el primer intento, tiempos de respuesta, NPS y productividad de técnicos.
  BC-1050.60.10:
    name: Seguimiento de resolución en el primer intento
    description: |
      Medición y mejora de la tasa de resolución en el primer intento.
  BC-1050.60.20:
    name: Seguimiento de tiempos de respuesta y resolución
    description: |
      Seguimiento de tiempos de respuesta y resolución basado en SLA.
  BC-1050.60.30:
    name: Reporte de productividad de técnicos
    description: |
      Reporte de utilización, tiempo productivo y productividad de técnicos.
  BC-1050.60.40:
    name: NPS y satisfacción del servicio
    description: |
      Medición del NPS y la satisfacción relacionada con el servicio.

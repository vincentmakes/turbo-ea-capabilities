locale: es
source: L1-chemical-manufacturing-operations-management.yaml
entries:
  BC-4620:
    name: Gestión de operaciones de fabricación química
    description: |
      Operación diaria de plantas de reacción, separación, polimerización y procesos inorgánicos, incluyendo vigilancia de catalizadores, programación de la producción y coordinación de paradas.
  BC-4620.10:
    name: Operaciones unitarias de reacción
    description: |
      Operación de sistemas de reactores continuos, discontinuos, catalíticos y electroquímicos.
  BC-4620.10.10:
    name: Operaciones de reactores continuos
    description: |
      Operación de reactores de tanque agitado continuo y de flujo pistón.
  BC-4620.10.20:
    name: Operaciones de reactores discontinuos
    description: |
      Operación de reactores discontinuos y semidiscontinuos según recetas aprobadas.
  BC-4620.10.30:
    name: Operaciones de reactores catalíticos
    description: |
      Operación de reactores catalíticos de lecho fijo y lecho fluidizado.
  BC-4620.10.40:
    name: Operaciones de reactores fotoquímicos y electroquímicos
    description: |
      Operación de reactores fotoquímicos, electroquímicos y de plasma.
  BC-4620.20:
    name: Operaciones unitarias de separación
    description: |
      Operación de unidades de destilación, cristalización, filtración, secado y separación por membranas.
  BC-4620.20.10:
    name: Operaciones de destilación
    description: |
      Operación de columnas de destilación con platos y de relleno.
  BC-4620.20.20:
    name: Operaciones de cristalización
    description: |
      Operación de cristalizadores por enfriamiento, evaporación y reacción.
  BC-4620.20.30:
    name: Filtración y separación sólido-líquido
    description: |
      Operación de centrífugas, filtros prensa y filtros de vacío rotatorio.
  BC-4620.20.40:
    name: Operaciones de secado
    description: |
      Operación de secadores de lecho fluido, atomización y contacto.
  BC-4620.20.50:
    name: Operaciones de separación por membranas
    description: |
      Operación de membranas de ósmosis inversa, ultrafiltración y pervaporación.
  BC-4620.30:
    name: Operaciones de polimerización
    description: |
      Operación de polimerización en masa, solución, suspensión, emulsión y compoundización de polímeros aguas abajo.
  BC-4620.30.10:
    name: Operaciones de polimerización en masa
    description: |
      Operación de reactores de polimerización en masa.
  BC-4620.30.20:
    name: Operaciones de polimerización en solución
    description: |
      Operación de procesos de polimerización en solución.
  BC-4620.30.30:
    name: Polimerización en suspensión y emulsión
    description: |
      Operación de reactores de polimerización en suspensión y emulsión.
  BC-4620.30.40:
    name: Operaciones de compoundización de polímeros
    description: |
      Compoundización de polímeros con aditivos mediante mezcla en fundido.
  BC-4620.40:
    name: Operaciones inorgánicas y electroquímicas
    description: |
      Operación de procesos cloro-álcali, electrólisis, calcinación y otros procesos de síntesis inorgánica.
  BC-4620.40.10:
    name: Operaciones de celdas cloro-álcali
    description: |
      Operación de celdas cloro-álcali de membrana y diafragma libres de mercurio.
  BC-4620.40.20:
    name: Operaciones de electrólisis
    description: |
      Operación de celdas de electrólisis de metales y gases.
  BC-4620.40.30:
    name: Operaciones de calcinación y tostación
    description: |
      Operación de hornos rotatorios, tostadores de lecho fluidizado y calcinadores.
  BC-4620.40.40:
    name: Operaciones de síntesis inorgánica
    description: |
      Operación de unidades de síntesis inorgánica, incluyendo precipitación y digestión.
  BC-4620.50:
    name: Gestión del ciclo de vida de catalizadores y productos químicos de proceso
    description: |
      Selección, vigilancia, regeneración e inventario de catalizadores y productos químicos de proceso.
  BC-4620.50.10:
    name: Selección y carga de catalizadores
    description: |
      Selección y carga de catalizadores de lecho fijo y lecho fluidizado.
  BC-4620.50.20:
    name: Vigilancia del rendimiento de catalizadores
    description: |
      Vigilancia en servicio de la actividad y selectividad del catalizador.
  BC-4620.50.30:
    name: Coordinación de la regeneración de catalizadores
    description: |
      Coordinación de campañas de regeneración de catalizadores in situ y ex situ.
  BC-4620.50.40:
    name: Gestión del inventario de productos químicos de proceso
    description: |
      Gestión de inventario y consumo de disolventes, aditivos y productos químicos de proceso.
  BC-4620.60:
    name: Control de proceso y ejecución de operaciones
    description: |
      Ejecución diaria de operaciones desde campo y sala de control, incluyendo monitorización de la envolvente operativa.
  BC-4620.60.10:
    name: Ejecución de rondas de operadores
    description: |
      Ejecución de rondas estructuradas de operadores y comprobaciones en campo.
  BC-4620.60.20:
    name: Operaciones de consola DCS
    description: |
      Operaciones de consola, incluyendo respuesta a alarmas y control supervisor.
  BC-4620.60.30:
    name: Gestión del cambio de turno
    description: |
      Cambio de turno estructurado y revisión del registro operativo.
  BC-4620.60.40:
    name: Monitorización de la envolvente operativa
    description: |
      Monitorización en tiempo real de las envolventes operativas de seguridad y calidad.
  BC-4620.70:
    name: Coordinación de paradas de planta
    description: |
      Coordinación del alcance, calendario y ejecución de paradas y grandes mantenimientos de plantas químicas.
  BC-4620.70.10:
    name: Gestión del alcance de la parada
    description: |
      Definición y congelación del alcance de la parada, incluyendo el proceso de revisión crítica.
  BC-4620.70.20:
    name: Gestión del calendario de la parada
    description: |
      Programación detallada de la parada y control del avance.
  BC-4620.70.30:
    name: Coordinación de parada y arranque
    description: |
      Coordinación secuenciada de la parada, descontaminación y arranque de unidades.
  BC-4620.80:
    name: Programación de la producción química
    description: |
      Programación de la producción por campañas y en modo continuo, y planificación de cambios de producto.
  BC-4620.80.10:
    name: Planificación de campañas
    description: |
      Planificación de campañas multiproducto en activos compartidos.
  BC-4620.80.20:
    name: Secuenciación de la producción
    description: |
      Secuenciación de productos para minimizar transiciones y pérdidas de rendimiento.
  BC-4620.80.30:
    name: Programación de cambios de producto
    description: |
      Programación y coordinación de cambios de grado y producto.

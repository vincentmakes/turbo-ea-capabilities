locale: es
source: L1-content-rights-licensing-management.yaml
entries:
  BC-3720:
    name: "Gestión de derechos y licencias de contenidos"
    description: |
      Adquisición, inventario, concesión de licencias de salida, derechos deportivos
      y musicales, ingresos por regalías, y gestión de autorizaciones y cadena de titularidad
      para contenidos audiovisuales, sonoros y editoriales.
  BC-3720.10:
    name: "Gestión de adquisición de derechos"
    description: |
      Negociación y contratación de derechos de entrada para el contenido que la empresa
      adquiere de titulares de derechos o productores.
  BC-3720.10.10:
    name: "Apoyo a la negociación de derechos"
    description: |
      Preparación de hojas de condiciones, análisis de acuerdos comparables
      y apoyo a la negociación de contratos de contenido entrante.
  BC-3720.10.20:
    name: "Gestión de contratos de adquisición"
    description: |
      Elaboración, ejecución y gestión del ciclo de vida de contratos de derechos
      de entrada y sus modificaciones.
  BC-3720.10.30:
    name: "Seguimiento de ventanas de adquisición de derechos"
    description: |
      Seguimiento de ventanas, territorios, plataformas y términos de exclusividad
      adquiridos conforme al contrato.
  BC-3720.20:
    name: "Gestión del inventario de derechos"
    description: |
      Administración del inventario consolidado de derechos en poder de la empresa
      y consulta de disponibilidad para programación y licencias posteriores.
  BC-3720.20.10:
    name: "Seguimiento de ventanas y territorios de derechos"
    description: |
      Seguimiento de las ventanas de derechos disponibles por título, territorio,
      plataforma e idioma.
  BC-3720.20.20:
    name: "Seguimiento de restricciones y exclusividades"
    description: |
      Seguimiento de períodos de restricción y exclusividades que condicionan
      el uso posterior del contenido.
  BC-3720.20.30:
    name: "Consulta de disponibilidad de derechos"
    description: |
      Servicios de consulta que determinan si un título puede licenciarse
      para un uso, ventana y territorio concretos.
  BC-3720.30:
    name: "Gestión de licencias de salida"
    description: |
      Venta y gestión del ciclo de vida de los derechos cedidos en licencia
      a emisoras, plataformas y otros terceros.
  BC-3720.30.10:
    name: "Gestión de ventas de licencias"
    description: |
      Cartera de oportunidades, estructuración de acuerdos y cierre de contratos
      de licencia de salida por territorios y plataformas.
  BC-3720.30.20:
    name: "Gestión de contratos de salida"
    description: |
      Gestión de acuerdos de salida y volumen con múltiples títulos
      para licenciatarios posteriores.
  BC-3720.30.30:
    name: "Gestión de licencias de formato"
    description: |
      Concesión de licencias de formatos de no ficción y ficción, así como de biblias,
      a productores locales y emisoras.
  BC-3720.40:
    name: "Gestión de derechos deportivos y de eventos en vivo"
    description: |
      Puja, seguimiento y explotación de derechos deportivos y de eventos en vivo,
      incluyendo resúmenes derivados.
  BC-3720.40.10:
    name: "Licitación de derechos deportivos"
    description: |
      Preparación de ofertas, valoración y respuesta a licitaciones
      de derechos deportivos y de eventos en vivo.
  BC-3720.40.20:
    name: "Seguimiento de derechos por calendario de eventos"
    description: |
      Seguimiento de los derechos por partido o prueba frente a los derechos
      de competición y torneo en poder de la empresa.
  BC-3720.40.30:
    name: "Gestión de derechos de resúmenes y clips"
    description: |
      Gestión de derechos derivados para resúmenes, clips y explotación
      en formatos cortos para redes sociales y digital.
  BC-3720.50:
    name: "Gestión de derechos musicales y de ejecución"
    description: |
      Licencia e información de derechos musicales y de ejecución, incluyendo
      sincronización, derechos mecánicos y comunicación pública.
  BC-3720.50.10:
    name: "Licencia mecánica y de sincronización"
    description: |
      Autorización y concesión de licencias de derechos mecánicos y de sincronización
      para música utilizada en producciones y plataformas.
  BC-3720.50.20:
    name: "Información sobre derechos de ejecución"
    description: |
      Notificación de la comunicación pública y el uso en difusión
      a las entidades de gestión colectiva.
  BC-3720.50.30:
    name: "Gestión de hojas de cue musical"
    description: |
      Producción y distribución de hojas de cue musical a sociedades
      y titulares de derechos.
  BC-3720.60:
    name: "Gestión de ingresos por regalías"
    description: |
      Recepción, conciliación y distribución posterior de los ingresos por regalías
      adeudados a la empresa como titular de derechos.
  BC-3720.60.10:
    name: "Conciliación de estados de regalías"
    description: |
      Conciliación de los estados de regalías entrantes de licenciatarios
      y sociedades frente a los derechos en poder de la empresa.
  BC-3720.60.20:
    name: "Registro de ingresos por regalías"
    description: |
      Registro de los ingresos por regalías en el libro de derechos
      y reconocimiento contable posterior.
  BC-3720.60.30:
    name: "Distribución a titulares de derechos subyacentes"
    description: |
      Distribución de las regalías recibidas a los titulares de derechos subyacentes
      conforme a los términos de participación y subpublicación.
  BC-3720.70:
    name: "Gestión de autorizaciones y cadena de titularidad"
    description: |
      Verificación y documentación de los derechos subyacentes y la cadena de
      titularidad para apoyar la explotación y la cobertura de errores y omisiones.
  BC-3720.70.10:
    name: "Verificación de derechos subyacentes"
    description: |
      Verificación de los derechos literarios, musicales y de imagen subyacentes
      autorizados en la obra.
  BC-3720.70.20:
    name: "Seguimiento del estado de autorizaciones"
    description: |
      Seguimiento del estado de autorización por elemento, con gestión
      de las acciones pendientes.
  BC-3720.70.30:
    name: "Documentación de la cadena de titularidad"
    description: |
      Mantenimiento de los registros de cadena de titularidad suficientes
      para la cobertura E&O y la diligencia debida de los licenciatarios.

locale: es
source: L1-trade-finance-management.yaml
entries:
  BC-1350:
    name: Gestión de la financiación del comercio exterior
    description: |
      Créditos documentarios, garantías, financiación de cadena de suministro y préstamos comerciales.
  BC-1350.10:
    name: Gestión de créditos documentarios
    description: |
      Cartas de crédito de importación y exportación.
  BC-1350.10.10:
    name: Emisión de cartas de crédito
    description: |
      Emisión de cartas de crédito de importación conforme a las UCP 600.
  BC-1350.10.20:
    name: Notificación y confirmación de cartas de crédito
    description: |
      Notificación y confirmación de cartas de crédito de exportación.
  BC-1350.10.30:
    name: Examen de documentos y cumplimiento normativo
    description: |
      Examen de documentos para verificar el cumplimiento de UCP e ISBP.
  BC-1350.10.40:
    name: Liquidación y reembolso de créditos documentarios
    description: |
      Liquidación y reembolso bajo créditos documentarios.
  BC-1350.20:
    name: Gestión de garantías y cartas de crédito contingentes
    description: |
      Garantías bancarias, cartas de crédito contingentes y fianzas de cumplimiento.
  BC-1350.20.10:
    name: Emisión de garantías bancarias
    description: |
      Emisión de garantías bancarias y fianzas de cumplimiento.
  BC-1350.20.20:
    name: Emisión de cartas de crédito contingentes
    description: |
      Emisión de cartas de crédito contingentes conforme a las ISP98.
  BC-1350.20.30:
    name: Gestión de reclamaciones sobre garantías
    description: |
      Gestión de requerimientos y reclamaciones bajo garantías.
  BC-1350.20.40:
    name: Modificaciones y cancelación de garantías
    description: |
      Modificaciones, prórrogas y cancelación de garantías.
  BC-1350.30:
    name: Gestión de cobranzas documentarias
    description: |
      Cobranzas documentarias D/P y D/A.
  BC-1350.30.10:
    name: Operaciones de documentos contra pago
    description: |
      Operaciones de cobranza D/P conforme a las URC 522.
  BC-1350.30.20:
    name: Operaciones de documentos contra aceptación
    description: |
      Operaciones de cobranza D/A incluyendo letras de cambio.
  BC-1350.30.30:
    name: Liquidación de cobranzas
    description: |
      Liquidación y remesa bajo cobranzas documentarias.
  BC-1350.40:
    name: Gestión de la financiación de cadena de suministro
    description: |
      Factoring inverso, financiación de cuentas a pagar y descuento dinámico.
  BC-1350.40.10:
    name: Financiación de cuentas a pagar liderada por el comprador
    description: |
      Programas de factoring inverso y financiación de cuentas a pagar liderados por el comprador.
  BC-1350.40.20:
    name: Programas de financiación de cuentas a cobrar
    description: |
      Financiación de cuentas a cobrar y factoring para vendedores.
  BC-1350.40.30:
    name: Operaciones de descuento dinámico
    description: |
      Plataformas de descuento dinámico y cálculo de descuentos.
  BC-1350.50:
    name: Gestión de préstamos comerciales
    description: |
      Financiación pre-exportación y post-exportación.
  BC-1350.50.10:
    name: Financiación pre-exportación
    description: |
      Financiación pre-exportación de capital circulante y producción.
  BC-1350.50.20:
    name: Financiación post-exportación
    description: |
      Descuento post-exportación y operaciones de forfaiting.
  BC-1350.50.30:
    name: Financiación de importaciones
    description: |
      Financiación de importaciones incluyendo financiación puente y recibos de confianza.

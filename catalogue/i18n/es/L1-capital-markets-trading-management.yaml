    name: Desarrollo de estrategias algorítmicas
    description: |
      Desarrollo y certificación de estrategias algorítmicas.
  BC-1370.40.20:
    name: Pruebas retrospectivas de algoritmos
    description: |
      Pruebas retrospectivas y simulación de algoritmos de negociación.
  BC-1370.40.30:
    name: Controles de negociación algorítmica
    description: |
      Controles pre-negociación y en tiempo de ejecución sobre la negociación algorítmica.
  BC-1370.50:
    name: Gestión de ventas y negociación
    description: |
      Mesas de ventas a clientes, negociación por voz y electrónica.

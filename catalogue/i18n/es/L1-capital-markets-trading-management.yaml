locale: es
source: L1-capital-markets-trading-management.yaml
entries:
  BC-1370:
    name: Negociación en mercados de capitales
    description: |
      Negociación en front-office, creación de mercado, gestión de posiciones y ventas y negociación.
  BC-1370.10:
    name: Gestión de creación de mercado
    description: |
      Creación de mercado en todas las clases de activos.
  BC-1370.10.10:
    name: Generación de cotizaciones
    description: |
      Generación de cotizaciones de compra/venta en los distintos mercados.
  BC-1370.10.20:
    name: Gestión de inventario del creador de mercado
    description: |
      Gestión del inventario y posición de riesgo del creador de mercado.
  BC-1370.10.30:
    name: Motor de precios del creador de mercado
    description: |
      Operación del motor de precios y gestión de parámetros.
  BC-1370.20:
    name: Gestión de posiciones de negociación
    description: |
      Posiciones de negociación y atribución de P&L.
  BC-1370.20.10:
    name: Seguimiento de posiciones en tiempo real
    description: |
      Seguimiento en tiempo real de las posiciones del libro de negociación.

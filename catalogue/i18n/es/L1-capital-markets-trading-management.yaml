    name: Captura de órdenes de negociación
    description: |
      Captura y validación de órdenes de clientes y propietarias.
  BC-1370.30.20:
    name: Enrutamiento inteligente de órdenes
    description: |
      Enrutamiento inteligente de órdenes entre plataformas para lograr la mejor ejecución.
  BC-1370.30.30:
    name: Seguimiento de la calidad de ejecución
    description: |
      Seguimiento de la calidad de ejecución y analítica de mejor ejecución.
  BC-1370.30.40:
    name: Gestión del ciclo de vida de órdenes
    description: |
      Ciclo de vida de órdenes incluyendo modificaciones y cancelaciones.
  BC-1370.40:
    name: Gestión de negociación algorítmica

    description: |
      Detección de abuso de mercado incluyendo uso de información privilegiada y manipulación.
  BC-1370.60.30:
    name: Vigilancia de comunicaciones
    description: |
      Vigilancia de comunicaciones y voz de operadores.
  BC-1370.60.40:
    name: Reporte regulatorio de operaciones
    description: |
      Reporting regulatorio de operaciones y transacciones (MiFIR, EMIR, SFTR).

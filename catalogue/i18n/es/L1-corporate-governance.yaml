locale: es
source: L1-corporate-governance.yaml
entries:
  BC-110:
    name: Gobierno corporativo
    description: |
      Procesos de gobierno del consejo, de los comités y de los accionistas.
  BC-110.10:
    name: Gestión del consejo y los comités
    description: |
      Composición del consejo, reuniones, comités y documentación.
  BC-110.10.10:
    name: Gestión de la composición del consejo
    description: |
      Nombramiento, sucesión, independencia y matriz de competencias de los consejeros.
  BC-110.10.20:
    name: Administración de las reuniones del consejo
    description: |
      Órdenes del día, documentación, actas y resoluciones de las sesiones del consejo.
  BC-110.10.30:
    name: Operación de los comités
    description: |
      Operación de los comités de auditoría, riesgos, retribuciones y nombramientos.
  BC-110.10.40:
    name: Incorporación y formación de consejeros
    description: |
      Inducción, formación continua y revisiones de eficacia del consejo.
  BC-110.20:
    name: Gestión de accionistas y capital
    description: |
      Estructura de capital, registro de accionistas y derechos de los accionistas.
  BC-110.20.10:
    name: Mantenimiento del registro de accionistas
    description: |
      Mantenimiento del registro de socios y de la titularidad real.
  BC-110.20.20:
    name: Gestión de la junta de accionistas
    description: |
      Convocatoria, anuncios, votaciones y resoluciones de juntas ordinarias y extraordinarias.
  BC-110.20.30:
    name: Administración de dividendos y distribuciones
    description: |
      Declaración, pago de dividendos y distribuciones de capital.
  BC-110.20.40:
    name: Gestión de la estructura del capital social
    description: |
      Clases de acciones, ampliaciones de capital, recompras y desdoblamientos.
  BC-110.30:
    name: Gestión de la secretaría corporativa
    description: |
      Presentaciones legales, registros corporativos y formalidades societarias.
  BC-110.30.10:
    name: Administración de presentaciones legales
    description: |
      Presentaciones ante registros mercantiles y autoridades societarias.
  BC-110.30.20:
    name: Gestión de los registros corporativos
    description: |
      Mantenimiento de libros legales, registros y archivos corporativos.
  BC-110.30.30:
    name: Administración de resoluciones societarias
    description: |
      Redacción, ejecución y registro de resoluciones del consejo y de los accionistas.
  BC-110.40:
    name: Gestión de filiales y entidades
    description: |
      Estructura de entidades jurídicas y gobierno transversal del grupo.
  BC-110.40.10:
    name: Gestión del ciclo de vida de la entidad jurídica
    description: |
      Constitución, reestructuración, inactividad y liquidación de entidades.
  BC-110.40.20:
    name: Gobierno de la estructura del grupo
    description: |
      Mantenimiento y supervisión del organigrama jurídico y de las cadenas de propiedad.
  BC-110.40.30:
    name: Estándares de gobierno de filiales
    description: |
      Estándares de gobierno aplicados de forma homogénea a las filiales del grupo.
  BC-110.40.40:
    name: Cumplimiento de entidades transfronterizas
    description: |
      Cumplimiento societario y de gobierno local para filiales en el extranjero.
  BC-110.50:
    name: Gestión de delegaciones y poderes
    description: |
      Matrices de autoridad, delegaciones y poderes de firma.
  BC-110.50.10:
    name: Marco de delegación de autoridad
    description: |
      Niveles de autoridad, umbrales de aprobación y jerarquías de delegación.
  BC-110.50.20:
    name: Administración de poderes de firma
    description: |
      Listas de firmantes autorizados, poderes notariales y mandatos bancarios.
  BC-110.50.30:
    name: Supervisión del cumplimiento de las delegaciones
    description: |
      Seguimiento de las decisiones tomadas frente a los límites de autoridad delegada.

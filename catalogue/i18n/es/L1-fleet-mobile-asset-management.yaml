locale: es
source: L1-fleet-mobile-asset-management.yaml
entries:
  BC-2430:
    name: Gestión de flota y activos móviles
    description: |
      Aprovisionamiento, mantenimiento, utilización y disposición de vehículos,
      buques, aeronaves, material rodante y equipos compartidos como contenedores,
      remolques y ULDs.
  BC-2430.10:
    name: Gestión de adquisición y disposición de flota
    description: |
      Especificación, adquisición, arrendamiento, fletamento y disposición al
      final de su vida útil de activos móviles.
    in_scope:
      - Adquisición de vehículos, buques, aeronaves y material rodante
      - Acuerdos de fletamento en húmedo, en seco y a casco desnudo
      - Decisiones de fin de vida útil y reventa
    out_of_scope:
      - Adquisición genérica de bienes indirectos (BC-500)
      - Contabilidad de activos fijos (BC-200)
  BC-2430.10.10:
    name: Especificación y adquisición de flota
    description: |
      Especificación y adquisición de nuevos activos de flota.
  BC-2430.10.20:
    name: Gestión de arrendamientos y fletamentos
    description: |
      Arrendamientos operativos, arrendamientos financieros y acuerdos de
      fletamento para activos de flota.
  BC-2430.10.30:
    name: Disposición al final de la vida útil
    description: |
      Reventa, desguace y reciclaje de activos de flota retirados.
  BC-2430.20:
    name: Gestión del mantenimiento de flota
    description: |
      Mantenimiento preventivo, correctivo y pesado de vehículos, buques,
      aeronaves y material rodante.
  BC-2430.20.10:
    name: Programación del mantenimiento preventivo
    description: |
      Programación del mantenimiento preventivo basado en tiempo y condición.
  BC-2430.20.20:
    name: Ejecución del mantenimiento correctivo
    description: |
      Reparación de averías y trabajos correctivos en activos móviles.
  BC-2430.20.30:
    name: Cumplimiento de inspecciones obligatorias
    description: |
      Cumplimiento de inspecciones reglamentarias y directivas de aeronavegabilidad
      o navegabilidad.
  BC-2430.20.40:
    name: Mantenimiento pesado y revisión general
    description: |
      Revisión general, varada en dique seco y eventos de inspección pesada.
  BC-2430.30:
    name: Gestión del parque de equipos
    description: |
      Gestión de contenedores, remolques, chasis y ULDs compartidos en depósitos,
      clientes y socios.
  BC-2430.30.10:
    name: Gestión del parque de contenedores
    description: |
      Seguimiento y equilibrio de los parques de contenedores entre depósitos.
  BC-2430.30.20:
    name: Gestión del parque de remolques y chasis
    description: |
      Gestión del parque de remolques y chasis, incluido el uso compartido de
      parques neutros.
  BC-2430.30.30:
    name: Gestión del parque de ULDs
    description: |
      Seguimiento, reparación y equilibrio de ULDs entre estaciones.
  BC-2430.30.40:
    name: Operaciones de reposicionamiento de equipos vacíos
    description: |
      Ejecución de movimientos de reposicionamiento en vacío entre depósitos con
      superávit y déficit.
  BC-2430.40:
    name: Telemática y monitorización de flota
    description: |
      Monitorización continua de la posición, condición y comportamiento del
      operador de los activos para informar el mantenimiento y las operaciones.
  BC-2430.40.10:
    name: Operaciones de telemática de flota
    description: |
      Operación de plataformas de telemática que incorporan datos de posición y
      motor.
  BC-2430.40.20:
    name: Monitorización de la condición de activos
    description: |
      Monitorización de la condición de los activos móviles, incluido el estado
      del reefer y la carga.
  BC-2430.40.30:
    name: Monitorización del comportamiento del conductor
    description: |
      Monitorización de señales de comportamiento del conductor como frenado
      brusco y exceso de velocidad.
  BC-2430.50:
    name: Gestión del cumplimiento y certificación de flota
    description: |
      Registro, certificación y cumplimiento de emisiones de los activos de flota
      con reguladores y sociedades de clasificación.
  BC-2430.50.10:
    name: Registro de vehículos, buques y aeronaves
    description: |
      Registro inicial y continuo ante las autoridades nacionales e
      internacionales.
  BC-2430.50.20:
    name: Inspección reglamentaria y certificación
    description: |
      Certificados y auditorías de clase, aeronavegabilidad y aptitud para la
      circulación.
  BC-2430.50.30:
    name: Cumplimiento de emisiones y medioambiente
    description: |
      Cumplimiento de los regímenes de emisiones de vehículos, buques y
      aeronaves.
  BC-2430.60:
    name: Gestión de la utilización y el rendimiento de la flota
    description: |
      Medición de la utilización de activos, tiempos de rotación y costo total
      de propiedad para impulsar las decisiones de flota.
  BC-2430.60.10:
    name: Informe de utilización de activos
    description: |
      Reporte de la utilización por tipo de activo, carril y depósito.
  BC-2430.60.20:
    name: Análisis del tiempo de rotación de equipos
    description: |
      Análisis de los tiempos de rotación de contenedores, remolques y ULDs.
  BC-2430.60.30:
    name: Análisis del costo total de propiedad
    description: |
      Análisis del costo total de propiedad entre tipos de flota y proveedores.

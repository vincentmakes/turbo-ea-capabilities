locale: es
source: L1-vehicle-programme-management.yaml
entries:
  BC-3410:
    name: Gestión de programa de vehículos
    description: |
      Gobierno de programas de vehículos plurianuales que abarca concepto, hitos
      de fase, estrategia de plataforma y variante, y coste, peso y plazos del
      programa desde el inicio de producción hasta el fin de producción.
  BC-3410.10:
    name: Definición e inicio del programa
    description: |
      Definición del concepto, caso de negocio, carta del programa y aprobación
      para continuar en programas de vehículos nuevos y derivados.
    in_scope:
      - Carta del programa y aprobación del caso de negocio
      - Definición del concepto y posicionamiento del vehículo
      - Alineación de la estrategia de plataforma y transferencia
    out_of_scope:
      - Ingeniería detallada de subsistemas del vehículo (BC-3400)
      - Gobierno de la cartera de proyectos empresarial (BC-900)
  BC-3410.10.10:
    name: Carta del programa y caso de negocio
    description: |
      Carta del programa con nivel de aprobación, caso de negocio financiero y
      autorización de inversión.
  BC-3410.10.20:
    name: Definición del concepto del vehículo
    description: |
      Concepto del vehículo, posicionamiento, definición del paquete para el cliente
      y objetivos de atributos de alto nivel.
  BC-3410.10.30:
    name: Alineación de la estrategia de plataforma
    description: |
      Alineación de los programas con las hojas de ruta de plataforma, decisiones
      de transferencia y estrategias de módulos compartidos.
  BC-3410.10.40:
    name: Puertas de aprobación del programa
    description: |
      Puertas iniciales de aprobación del programa, incluidos compromisos de
      presupuesto, plazos y recursos.
  BC-3410.20:
    name: Gobierno de puertas de fase del programa
    description: |
      Operación del modelo de puertas de fase del programa de vehículos con
      revisiones de hitos, aseguramiento de entregables y control de riesgos
      e incidencias.
  BC-3410.20.10:
    name: Planificación de hitos
    description: |
      Planificación de hitos del programa desde PT y PVS hasta SOP y fin de
      producción.
  BC-3410.20.20:
    name: Ejecución de revisiones de fase
    description: |
      Ejecución de revisiones de puertas de fase, incluida la evaluación de
      entregables y las decisiones de paso o retención.
  BC-3410.20.30:
    name: Gestión de riesgos e incidencias del programa
    description: |
      Identificación, escalado y mitigación de riesgos e incidencias críticas
      del programa.
  BC-3410.20.40:
    name: Evaluación de madurez del programa
    description: |
      Evaluación de la madurez del programa frente a criterios de preparación
      de ingeniería, fabricación y proveedores.
  BC-3410.30:
    name: Gestión de costes del programa
    description: |
      Establecimiento y seguimiento de objetivos de coste del programa en lista
      de materiales, utillaje, inversión y provisiones de garantía.
  BC-3410.30.10:
    name: Establecimiento de objetivos de coste del programa
    description: |
      Establecimiento de objetivos de coste del programa, incluidas las envolventes
      de BoM, conversión e inversión.
  BC-3410.30.20:
    name: Seguimiento del coste de la lista de materiales
    description: |
      Seguimiento del coste de la BoM del vehículo, cotizaciones de proveedores
      y decisiones de contenido.
  BC-3410.30.30:
    name: Previsión de costes variables y fijos
    description: |
      Previsión de costes variables y fijos del programa en las fases de lanzamiento
      y producción estable.
  BC-3410.30.40:
    name: Seguimiento de iniciativas de reducción de costes
    description: |
      Seguimiento de iniciativas de reducción de costes, ingeniería de valor y su
      realización frente a los objetivos.
  BC-3410.40:
    name: Seguimiento de peso y atributos del programa
    description: |
      Seguimiento del peso, rendimiento y otros atributos del vehículo frente a
      los objetivos del programa y resolución de compromisos a nivel de programa.
  BC-3410.40.10:
    name: Seguimiento del peso del vehículo
    description: |
      Seguimiento de la acumulación de masa por sistema y reservas frente a los
      objetivos de peso del programa.
  BC-3410.40.20:
    name: Seguimiento del rendimiento de atributos
    description: |
      Seguimiento del rendimiento de atributos a nivel de programa y reservas
      frente a objetivos.
  BC-3410.40.30:
    name: Informes de conformidad con objetivos
    description: |
      Informes del estado de conformidad con objetivos para la dirección del
      programa y los comités de dirección.
  BC-3410.50:
    name: Planificación de variantes y derivados
    description: |
      Planificación de variantes de equipamiento, regionales y ediciones especiales
      a lo largo del ciclo de vida del programa.
  BC-3410.50.10:
    name: Planificación de variantes de equipamiento y nivel
    description: |
      Planificación de niveles de equipamiento, opciones y contenido de equipamiento
      estándar por mercado y segmento.
  BC-3410.50.20:
    name: Planificación de derivados regionales
    description: |
      Planificación de derivados regionales, incluidas carrocerías, trenes motrices
      y contenidos de funciones específicos de mercado.
  BC-3410.50.30:
    name: Planificación de ediciones especiales y series limitadas
    description: |
      Planificación de ediciones especiales, series limitadas y derivados de
      competición.
  BC-3410.60:
    name: Coordinación de inicio y fin de producción
    description: |
      Coordinación de la preparación para el SOP, la rampa de producción y la
      retirada progresiva al fin de producción en plantas y redes de proveedores.
  BC-3410.60.10:
    name: Coordinación de preparación para el SOP
    description: |
      Coordinación de los criterios de preparación para el SOP en ingeniería,
      proveedores, planta y posventa.
  BC-3410.60.20:
    name: Planificación de la rampa de producción
    description: |
      Planificación de las curvas de rampa de producción, fabricación de preseries
      y cadencia de volumen al inicio del lanzamiento.
  BC-3410.60.30:
    name: Coordinación de la retirada al fin de producción
    description: |
      Coordinación del calendario de fin de producción, últimas compras y planes
      de agotamiento de existencias.
  BC-3410.70:
    name: Informes de rendimiento del programa
    description: |
      Informes del estado del programa, decisiones y rendimiento posproducción
      para comités de dirección y alta dirección.
  BC-3410.70.10:
    name: Informes periódicos del estado del programa
    description: |
      Informes periódicos del estado del programa sobre coste, plazos, calidad
      y riesgos.
  BC-3410.70.20:
    name: Apoyo al comité de dirección del programa
    description: |
      Preparación y apoyo a los comités de dirección del programa y revisiones
      ejecutivas.
  BC-3410.70.30:
    name: Revisión del programa postlanzamiento
    description: |
      Revisiones postlanzamiento que recogen las lecciones aprendidas y alimentan
      el inicio de programas posteriores.

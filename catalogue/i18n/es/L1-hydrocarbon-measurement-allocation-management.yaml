locale: es
source: L1-hydrocarbon-measurement-allocation-management.yaml
entries:
  BC-3040:
    name: Gestión de medición y asignación de hidrocarburos
    description: |
      Medición de calidad fiscal y asignación de los hidrocarburos producidos:
      medición en puntos de transferencia de custodia, asignación entre
      yacimientos y copropietarios, contabilidad de producción, estados
      operativos del arrendamiento e investigación de pérdidas y varianzas.
  BC-3040.10:
    name: Medición fiscal y de transferencia de custodia
    description: |
      Operación, calibración y aseguramiento de los medidores de calidad
      fiscal en los puntos de transferencia de custodia.
  BC-3040.10.10:
    name: Operación de medidores fiscales
    description: |
      Operación diaria de medidores fiscales de líquidos y gas.
  BC-3040.10.20:
    name: Prueba y calibración de medidores
    description: |
      Prueba y calibración periódica de las instalaciones de medición fiscal.
  BC-3040.10.30:
    name: Documentación de transferencia de custodia
    description: |
      Emisión e intercambio de tickets y certificados de transferencia
      de custodia.
  BC-3040.10.40:
    name: Investigación de medición incorrecta
    description: |
      Investigación y remediación de eventos sospechosos de medición
      incorrecta de los medidores.
  BC-3040.20:
    name: Asignación de producción
    description: |
      Asignación de volúmenes medidos a pozos, yacimientos y copropietarios.
  BC-3040.20.10:
    name: Asignación por pozo
    description: |
      Asignación de la producción de la instalación a los pozos contribuyentes.
  BC-3040.20.20:
    name: Asignación por yacimiento
    description: |
      Asignación entre yacimientos y zonas en producción commingled.
  BC-3040.20.30:
    name: Asignación entre copropietarios
    description: |
      Asignación de volúmenes de producción entre los titulares de
      participación trabajadora.
  BC-3040.20.40:
    name: Reconciliación de asignaciones
    description: |
      Reconciliación de los resultados de asignación con los datos de
      medición, pruebas de pozos y contabilidad.
  BC-3040.30:
    name: Contabilidad de producción
    description: |
      Reporte diario de producción, balance de masa y cierre mensual de
      la contabilidad de producción.
  BC-3040.30.10:
    name: Reporte diario de producción
    description: |
      Reporte diario de volúmenes de producción a interesados internos
      y externos.
  BC-3040.30.20:
    name: Balance de masa de hidrocarburos
    description: |
      Balance de masa de hidrocarburos de extremo a extremo en los
      sistemas productores.
  BC-3040.30.30:
    name: Cierre de contabilidad de producción
    description: |
      Cierre mensual de los libros de contabilidad de producción y
      alimentación a los sistemas financieros.
  BC-3040.40:
    name: Gestión del estado operativo del arrendamiento
    description: |
      Preparación de estados operativos del arrendamiento, cálculo de
      volúmenes de regalías y reporte de impuestos de severance y producción.
  BC-3040.40.10:
    name: Preparación del estado operativo del arrendamiento
    description: |
      Preparación de informes de estado operativo del arrendamiento (LOS)
      para los titulares de participación trabajadora.
  BC-3040.40.20:
    name: Cálculo de volúmenes de regalías
    description: |
      Cálculo de los volúmenes y el valor de los propietarios de regalías
      a nivel del arrendamiento.
  BC-3040.40.30:
    name: Reporte de impuestos de severance y producción
    description: |
      Reporte de los impuestos de severance y producción a las autoridades
      tributarias.
  BC-3040.50:
    name: Análisis de pérdidas y varianzas
    description: |
      Investigación de varianzas de medición, eventos de pérdida y
      desequilibrios del inventario de hidrocarburos.
  BC-3040.50.10:
    name: Análisis de varianzas de medición
    description: |
      Análisis de varianzas de medición frente a los rangos de tolerancia.
  BC-3040.50.20:
    name: Investigación de pérdidas
    description: |
      Investigación de pérdidas no contabilizadas entre los puntos
      de medición.
  BC-3040.50.30:
    name: Reconciliación del inventario de hidrocarburos
    description: |
      Reconciliación del inventario físico de hidrocarburos con los
      registros contables.

locale: es
source: L1-population-health-management.yaml
entries:
  BC-2880:
    name: Gestión de la salud poblacional
    description: |
      Estratificación del riesgo, atención preventiva, gestión de enfermedades crónicas,
      operaciones de atención basada en valor, gestión de paneles y adscripción,
      y analítica poblacional para poblaciones adscritas y en riesgo.
  BC-2880.10:
    name: Estratificación e identificación del riesgo
    description: |
      Modelización predictiva e identificación de poblaciones de riesgo creciente
      y con brechas en la atención.
  BC-2880.10.10:
    name: Modelización predictiva del riesgo
    description: |
      Desarrollo y operación de modelos de riesgo predictivos para costes y resultados clínicos.
  BC-2880.10.20:
    name: Identificación de riesgo creciente
    description: |
      Identificación de pacientes con riesgo creciente para intervención temprana.
  BC-2880.10.30:
    name: Definición de cohortes
    description: |
      Definición y mantenimiento de cohortes clínicas para programas poblacionales.
  BC-2880.10.40:
    name: Identificación de brechas en la atención
    description: |
      Identificación de brechas en la atención basadas en evidencia en poblaciones.
  BC-2880.20:
    name: Atención preventiva y bienestar
    description: |
      Programas de cribado, inmunización, evaluación de riesgos para la salud y orientación sobre bienestar.
  BC-2880.20.10:
    name: Alcance para cribados preventivos
    description: |
      Alcance para cribados preventivos basados en evidencia.
  BC-2880.20.20:
    name: Programas de inmunización
    description: |
      Prestación de programas de inmunización en adultos y niños.
  BC-2880.20.30:
    name: Evaluación de riesgos para la salud
    description: |
      Aplicación de evaluaciones de riesgos para la salud y seguimiento posterior.
  BC-2880.20.40:
    name: Orientación sobre bienestar
    description: |
      Prestación de programas de orientación sobre estilo de vida y bienestar.
  BC-2880.30:
    name: Gestión de enfermedades crónicas
    description: |
      Programas de gestión específicos por enfermedad para las principales condiciones crónicas.
  BC-2880.30.10:
    name: Programas de atención a la diabetes
    description: |
      Programas de gestión de la diabetes, incluyendo educación y monitorización remota.
  BC-2880.30.20:
    name: Programas de enfermedad cardiovascular
    description: |
      Programas de gestión de la enfermedad cardiovascular e hipertensión.
  BC-2880.30.30:
    name: Integración de la salud mental
    description: |
      Integración de la salud mental en la atención primaria y la gestión de enfermedades crónicas.
  BC-2880.30.40:
    name: Programas de enfermedades respiratorias
    description: |
      Programas para asma, enfermedad pulmonar obstructiva crónica y otras enfermedades respiratorias.
  BC-2880.40:
    name: Operaciones de atención basada en valor
    description: |
      Operaciones de apoyo a la atención responsable, los pagos por episodio y los programas contractuales basados en valor.
  BC-2880.40.10:
    name: Operaciones de atención responsable
    description: |
      Operaciones de organizaciones de atención responsable y programas de ahorro compartido.
  BC-2880.40.20:
    name: Operaciones de pagos por episodio
    description: |
      Operaciones de apoyo a los programas de pago agrupado por episodio.
  BC-2880.40.30:
    name: Seguimiento del rendimiento en calidad
    description: |
      Seguimiento del rendimiento en calidad frente a los requisitos de los programas basados en valor.
  BC-2880.40.40:
    name: Conciliación del ahorro compartido
    description: |
      Conciliación de liquidaciones de ahorro compartido y reparto de riesgo con los pagadores.
  BC-2880.50:
    name: Gestión de paneles y adscripción
    description: |
      Adscripción de pacientes a proveedores, dimensionamiento del panel, seguimiento de la continuidad
      y conciliación de la atribución.
  BC-2880.50.10:
    name: Adscripción paciente-proveedor
    description: |
      Asignación de pacientes a proveedores de atención primaria y equipos asistenciales.
  BC-2880.50.20:
    name: Gestión del tamaño del panel
    description: |
      Gestión del tamaño, composición y capacidad del panel.
  BC-2880.50.30:
    name: Seguimiento de la continuidad asistencial
    description: |
      Seguimiento de indicadores de continuidad asistencial en los paneles.
  BC-2880.50.40:
    name: Conciliación de la atribución
    description: |
      Conciliación de los listados de atribución del pagador con los datos internos del panel.
  BC-2880.60:
    name: Analítica e informes poblacionales
    description: |
      Analítica a nivel poblacional que abarca equidad, rendimiento de programas de calidad,
      costes, utilización y comparación de resultados.
  BC-2880.60.10:
    name: Analítica de equidad en salud
    description: |
      Analítica sobre disparidades, determinantes sociales y resultados de equidad.
  BC-2880.60.20:
    name: Informes de programas de calidad
    description: |
      Informes frente a programas de calidad como calificaciones por estrellas e indicadores de calidad.
  BC-2880.60.30:
    name: Analítica de costes y utilización
    description: |
      Analítica sobre costes, utilización y gasto evitable.
  BC-2880.60.40:
    name: Comparación de resultados
    description: |
      Comparación de resultados clínicos frente a conjuntos de datos de referencia nacionales y de pares.

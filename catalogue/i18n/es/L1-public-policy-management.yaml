locale: es
source: L1-public-policy-management.yaml
entries:
  BC-3200:
    name: Gestión de política pública
    description: |
      Formulación, análisis, apoyo a la toma de decisiones, coordinación de la implementación y
      evaluación de la política pública a lo largo del ciclo de políticas, anclada en la evidencia,
      la consulta a partes interesadas y la evaluación de impacto.
  BC-3200.10:
    name: Establecimiento de la agenda de políticas
    description: |
      Identificación, priorización y recepción de mandatos sobre los asuntos de política pública
      que requieren atención gubernamental.
    in_scope:
      - Identificación de problemas y prospección de horizonte
      - Recepción de mandatos ministeriales y políticos
      - Priorización de políticas y gestión de la agenda
    out_of_scope:
      - Redacción de legislación o reglamentos (cubierto por Gestión de redacción legislativa y regulatoria)
      - Ejecución de decisiones del gabinete (cubierto en Apoyo a la decisión política)
  BC-3200.10.10:
    name: Identificación de problemas de política
    description: |
      Identificación de problemas emergentes y cuestiones de política pública mediante la prospección
      de horizonte y las señales de las partes interesadas.
  BC-3200.10.20:
    name: Recepción de mandato político
    description: |
      Captura y estructuración de mandatos políticos y ministeriales en programas de trabajo de política.
  BC-3200.10.30:
    name: Priorización de políticas
    description: |
      Priorización de asuntos de política en competencia según la capacidad, la urgencia y los
      compromisos gubernamentales.
  BC-3200.20:
    name: Análisis de opciones de política
    description: |
      Revisión de evidencia, modelización y análisis comparativo de opciones de política pública,
      incluidos costes, impacto y viabilidad.
    in_scope:
      - Revisión de evidencia y literatura
      - Modelización económica y análisis coste-beneficio
      - Evaluación comparativa de opciones
      - Análisis distributivo y de equidad
    out_of_scope:
      - Evaluación de impacto regulatorio para instrumentos en borrador (cubierto por Gestión de redacción legislativa y regulatoria)
  BC-3200.20.10:
    name: Revisión de evidencia y literatura
    description: |
      Recopilación sistemática y síntesis de evidencia que orienta las opciones de política pública.
  BC-3200.20.20:
    name: Modelización y previsión de política
    description: |
      Modelización cuantitativa, microsimulación y previsión de resultados de política pública.
  BC-3200.20.30:
    name: Evaluación de opciones
    description: |
      Evaluación comparativa de opciones de política frente a objetivos y restricciones.
  BC-3200.20.40:
    name: Análisis distributivo y de equidad
    description: |
      Análisis de los efectos distributivos e impactos de equidad entre grupos poblacionales.
  BC-3200.30:
    name: Consulta a partes interesadas y ciudadanía
    description: |
      Diseño, realización y análisis de consultas con partes interesadas, la ciudadanía y socios
      intergubernamentales sobre propuestas de política pública.
  BC-3200.30.10:
    name: Diseño de la consulta
    description: |
      Diseño de estrategias de consulta, instrumentos y planes de alcance.
  BC-3200.30.20:
    name: Realización de la consulta
    description: |
      Operación de canales de consulta, incluidos portales en línea, audiencias y talleres.
  BC-3200.30.30:
    name: Análisis de respuestas a la consulta
    description: |
      Codificación, análisis y síntesis de las respuestas recibidas en la consulta.
  BC-3200.30.40:
    name: Coordinación intergubernamental
    description: |
      Coordinación con socios subnacionales e internacionales en materia de política compartida.
  BC-3200.40:
    name: Apoyo a la decisión política
    description: |
      Preparación de documentos de decisión para el gabinete, los ministros y el ejecutivo,
      incluidos informes, memorandos de decisión y recomendaciones.
  BC-3200.40.10:
    name: Preparación de informes
    description: |
      Elaboración de informes ministeriales y ejecutivos sobre asuntos de política pública.
  BC-3200.40.20:
    name: Gestión de presentaciones al gabinete
    description: |
      Redacción y coordinación de presentaciones al gabinete, al ejecutivo o al consejo.
  BC-3200.40.30:
    name: Registro y comunicación de decisiones
    description: |
      Registro de decisiones, difusión de resultados y asignación de tareas a las entidades
      responsables de la implementación.
  BC-3200.50:
    name: Coordinación de la implementación de políticas
    description: |
      Coordinación de la implementación de políticas entre organismos, incluido el diseño de
      programas, la secuenciación y la supervisión de la ejecución.
  BC-3200.50.10:
    name: Planificación de la implementación
    description: |
      Conversión de las decisiones de política en planes de implementación, hitos y responsabilidades.
  BC-3200.50.20:
    name: Coordinación interagencial
    description: |
      Coordinación de los organismos responsables de la implementación y los acuerdos de ejecución conjunta.
  BC-3200.50.30:
    name: Seguimiento de la implementación
    description: |
      Seguimiento del avance en la implementación de políticas respecto a compromisos y plazos.
  BC-3200.60:
    name: Evaluación y revisión de políticas
    description: |
      Evaluación ex post, revisiones de extinción y posimplementación, y retroalimentación
      en el ciclo de políticas.
  BC-3200.60.10:
    name: Evaluación de resultados e impacto
    description: |
      Evaluación de los resultados e impactos de las políticas frente a los objetivos previstos.
  BC-3200.60.20:
    name: Revisión de extinción y posimplementación
    description: |
      Revisiones legales y discrecionales de políticas e instrumentos en intervalos definidos.
  BC-3200.60.30:
    name: Captura de lecciones aprendidas
    description: |
      Captura y difusión de lecciones aprendidas para futuros ciclos de política pública.

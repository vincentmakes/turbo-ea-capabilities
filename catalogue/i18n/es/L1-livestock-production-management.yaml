locale: es
source: L1-livestock-production-management.yaml
entries:
  BC-3510:
    name: Gestión de producción ganadera
    description: |
      Producción de ganado terrestre en la granja — planificación del hato y el rebaño, reproducción, nutrición, salud animal, bienestar, parto, registro de crecimiento y preparación para el sacrificio para bovinos, ovinos, porcinos y aves de corral.
  BC-3510.10:
    name: Planificación del hato y el rebaño
    description: |
      Planificación de la carga animal, la reposición y el ciclo productivo en las distintas explotaciones ganaderas.
  BC-3510.10.10:
    name: Planificación de la carga animal
    description: |
      Decisiones de carga animal ajustadas a la disponibilidad de forraje y la capacidad de carga.
  BC-3510.10.20:
    name: Planificación de animales de reposición
    description: |
      Planificación de la tasa de reposición para el ganado reproductor y los lotes de ponedoras.
  BC-3510.10.30:
    name: Planificación del ciclo productivo
    description: |
      Planificación calendarizada de los ciclos productivos, incluidos los partos en lotes y los partos estacionales.
  BC-3510.20:
    name: Gestión de la reproducción animal
    description: |
      Selección genética, apareamiento, inseminación, registro de genealogía y seguimiento del rendimiento reproductivo.
    in_scope:
      - Decisiones de selección genética y de caracteres
      - Monta natural e inseminación artificial
      - Registro de genealogía y filiación
      - Evaluación del valor genético
  BC-3510.20.10:
    name: Decisiones de selección genética
    description: |
      Selección del ganado reproductor en función de los valores genéticos estimados y los objetivos por carácter.
  BC-3510.20.20:
    name: Operaciones de monta e inseminación
    description: |
      Operaciones de monta natural, inseminación artificial y transferencia de embriones.
  BC-3510.20.30:
    name: Registro de genealogía y filiación
    description: |
      Registro de genealogía, filiación e inscripciones en el libro genealógico.
  BC-3510.20.40:
    name: Evaluación del rendimiento reproductivo
    description: |
      Evaluación del rendimiento reproductivo y actualización de los valores genéticos.
  BC-3510.30:
    name: Gestión de la nutrición animal
    description: |
      Formulación de raciones, suministro de alimento, manejo del pastoreo y seguimiento de la conversión alimenticia en las distintas categorías ganaderas.
  BC-3510.30.10:
    name: Formulación de raciones
    description: |
      Formulación de raciones de mínimo costo conforme a los requerimientos de la especie y la etapa productiva.
  BC-3510.30.20:
    name: Suministro y distribución de alimento
    description: |
      Suministro diario, mezclado y distribución de alimento a corrales, galpones y potreros.
  BC-3510.30.30:
    name: Gestión del pastoreo
    description: |
      Gestión del pastoreo rotacional y continuo y monitoreo del forraje residual.
  BC-3510.30.40:
    name: Seguimiento de la conversión alimenticia
    description: |
      Seguimiento de los indicadores de conversión alimenticia y ganancia diaria de peso.
  BC-3510.40:
    name: Gestión de la salud animal
    description: |
      Tratamiento veterinario, vacunación, control de parásitos, vigilancia de enfermedades y gestión de los períodos de retiro.
    in_scope:
      - Registros de tratamientos veterinarios
      - Programas de vacunación y control de parásitos
      - Vigilancia de enfermedades de declaración obligatoria
      - Seguimiento del período de retiro de medicamentos
    out_of_scope:
      - Auditorías de bienestar animal (BC-3510.50)
      - Monitoreo de residuos LMR (BC-3590.50)
  BC-3510.40.10:
    name: Registros de tratamientos veterinarios
    description: |
      Registro de tratamientos veterinarios, prescripciones y resultados.
  BC-3510.40.20:
    name: Ejecución de programas de vacunación
    description: |
      Ejecución de los programas de vacunación del hato y el rebaño.
  BC-3510.40.30:
    name: Programas de control de parásitos
    description: |
      Programas de control de parásitos internos y externos y gestión de la resistencia.
  BC-3510.40.40:
    name: Vigilancia y notificación de enfermedades
    description: |
      Vigilancia y notificación estatutaria de enfermedades de declaración obligatoria y zoonóticas.
  BC-3510.40.50:
    name: Gestión del período de retiro
    description: |
      Seguimiento de los períodos de retiro de medicamentos veterinarios y aditivos para piensos.
  BC-3510.50:
    name: Gestión del bienestar animal
    description: |
      Prácticas diarias de bienestar que incluyen alojamiento, manejo y monitoreo del bienestar conforme a las normas de aseguramiento.
  BC-3510.50.10:
    name: Condiciones de alojamiento y densidad de carga
    description: |
      Gestión del alojamiento, la ventilación y la densidad de carga para las distintas categorías ganaderas.
  BC-3510.50.20:
    name: Normas de prácticas de manejo
    description: |
      Normas de prácticas de manejo con bajo estrés y buena destreza ganadera.
  BC-3510.50.30:
    name: Monitoreo de resultados de bienestar
    description: |
      Medición de los resultados de bienestar y revisiones del bienestar en la granja.
  BC-3510.60:
    name: Operaciones de reproducción y parto
    description: |
      Operaciones de detección de celo, parto y cuidado neonatal en bovinos, ovinos, porcinos y aves de corral.
  BC-3510.60.10:
    name: Operaciones de detección de celo
    description: |
      Detección de celo mediante observación, sensores y programas de sincronización.
  BC-3510.60.20:
    name: Operaciones de parto
    description: |
      Operaciones de parto, parición, parto en cerdas e incubación, y asistencia al parto.
  BC-3510.60.30:
    name: Operaciones de cuidado neonatal
    description: |
      Nutrición neonatal, gestión del calostro y cuidado en las primeras etapas de vida.
  BC-3510.70:
    name: Registro de crecimiento y rendimiento
    description: |
      Registro del rendimiento en crecimiento, leche, huevos y canal para las decisiones de producción y reproducción.
  BC-3510.70.10:
    name: Registro de ganancia de peso
    description: |
      Pesaje periódico y registro de la ganancia diaria de peso.
  BC-3510.70.20:
    name: Registro de producción de leche
    description: |
      Registro de la producción y composición de leche por vaca y en tanque a granel.
  BC-3510.70.30:
    name: Registro de producción de huevos
    description: |
      Registro diario de la producción de huevos por galería y lote.
  BC-3510.70.40:
    name: Seguimiento del rendimiento en canal
    description: |
      Seguimiento del rendimiento en canal, la clasificación y el rendimiento en cortes primarios.
  BC-3510.80:
    name: Preparación para el sacrificio y despacho
    description: |
      Selección de animales terminados y coordinación del despacho a mataderos, incluida la documentación de movimiento.
  BC-3510.80.10:
    name: Selección previa al sacrificio
    description: |
      Selección de animales terminados conforme a las especificaciones de peso, grasa y contrato.
  BC-3510.80.20:
    name: Documentación de movimiento de animales
    description: |
      Documentación de movimientos y transferencias de información de la cadena alimentaria.
  BC-3510.80.30:
    name: Coordinación del despacho al matadero
    description: |
      Coordinación del despacho y transporte desde la granja hasta el matadero.

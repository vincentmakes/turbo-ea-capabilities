locale: es
source: L1-professional-workforce-resourcing-management.yaml
entries:
  BC-4320:
    name: Dotación de recursos de la fuerza laboral profesional
    description: |
      Asignación, utilización, apalancamiento y gestión del personal
      disponible de los profesionales facturables en toda la cartera de
      encargos. Distinta de la gestión de capital humano genérica: se centra
      en la fuerza laboral facturable como recurso principal de prestación.
  BC-4320.10:
    name: Previsión de la demanda de recursos
    description: |
      Previsión de la demanda de recursos facturables a partir del pipeline
      de encargos, los compromisos en vigor y las hipótesis de crecimiento.
  BC-4320.10.10:
    name: Previsión de demanda basada en el pipeline
    description: |
      Previsión de la demanda de recursos derivada del pipeline de
      captación, ponderada por la probabilidad de adjudicación.
  BC-4320.10.20:
    name: Planificación de demanda de encargos comprometidos
    description: |
      Planificación de la demanda de recursos de los encargos aceptados
      con alcance y plazo confirmados.
  BC-4320.10.30:
    name: Agregación de demanda por especialidad
    description: |
      Consolidación de la demanda prevista por competencia, especialización,
      idioma y habilitación.
  BC-4320.20:
    name: Gestión de la dotación de personal en encargos
    description: |
      Asignación de profesionales a roles en los encargos, equilibrando la
      necesidad del encargo, el desarrollo individual y los objetivos de
      utilización.
  BC-4320.20.10:
    name: Tramitación de solicitudes de recursos para encargos
    description: |
      Recepción y gestión de las solicitudes de recursos del encargo frente
      a los profesionales disponibles.
  BC-4320.20.20:
    name: Gestión de la decisión de dotación de personal
    description: |
      Toma de decisiones de asignación equilibrando la adecuación al
      encargo, las necesidades de desarrollo y las preferencias del socio.
  BC-4320.20.30:
    name: Confirmación y notificación de la dotación de personal
    description: |
      Comunicación de las decisiones de dotación a la dirección del encargo
      y a los profesionales asignados.
  BC-4320.30:
    name: Adecuación de competencias y especialidades
    description: |
      Mantenimiento de los perfiles de competencias de los profesionales y
      adecuación de dichos perfiles a los requisitos de cada encargo.
  BC-4320.30.10:
    name: Mantenimiento del perfil de competencias del profesional
    description: |
      Recogida y actualización de las competencias, titulaciones, idiomas
      y experiencia sectorial de cada profesional.
  BC-4320.30.20:
    name: Definición de los requisitos de competencias del encargo
    description: |
      Definición de los requisitos de competencia, especialización y
      habilitación para cada rol en el encargo.
  BC-4320.30.30:
    name: Adecuación basada en competencias
    description: |
      Correspondencia entre profesionales y roles del encargo en función
      de sus competencias, especialización y disponibilidad.
  BC-4320.40:
    name: Gestión de la utilización
    description: |
      Seguimiento y orientación de la utilización facturable respecto a los
      objetivos de la firma y de cada profesional, incluyendo analítica de
      productividad.
  BC-4320.40.10:
    name: Establecimiento de objetivos de utilización
    description: |
      Fijación de objetivos de utilización facturable por categoría, área
      de práctica y profesional.
  BC-4320.40.20:
    name: Seguimiento de la utilización
    description: |
      Registro diario de horas facturables, no facturables y ausencias.
  BC-4320.40.30:
    name: Actuación ante desviaciones de utilización
    description: |
      Identificación y corrección de los profesionales que se sitúan por
      debajo o significativamente por encima de los objetivos de utilización.
  BC-4320.50:
    name: Gestión del personal disponible sin asignación
    description: |
      Gestión de la capacidad facturable no asignada, incluyendo la
      planificación de incorporación, el aprovechamiento en trabajos no
      facturables y la reasignación proactiva.
  BC-4320.50.10:
    name: Gestión de la visibilidad del personal disponible
    description: |
      Visibilidad de la capacidad disponible por categoría, competencia
      y ubicación.
  BC-4320.50.20:
    name: Asignación de actividades al personal disponible
    description: |
      Asignación del tiempo disponible a desarrollo, apoyo a propuestas,
      trabajo metodológico o formación.
  BC-4320.50.30:
    name: Acciones de reducción del personal disponible sin asignación
    description: |
      Reasignación proactiva, adscripción temporal o ajuste de capacidad
      cuando el personal disponible supera el objetivo.
  BC-4320.60:
    name: Dotación de recursos entre oficinas y fronteras
    description: |
      Coordinación del intercambio de recursos entre oficinas, áreas de
      práctica y países, incluyendo adscripciones y movilidad global de
      profesionales facturables.
  BC-4320.60.10:
    name: Préstamo de recursos entre oficinas
    description: |
      Cesión y préstamo temporal de profesionales entre oficinas.
  BC-4320.60.20:
    name: Gestión de adscripciones internacionales
    description: |
      Adscripciones internacionales de mayor duración de profesionales
      entre oficinas de la firma o jurisdicciones de firmas miembro.
  BC-4320.60.30:
    name: Liquidación de recargas entre oficinas
    description: |
      Liquidación operativa de recargas de tiempo y costes entre oficinas
      en encargos compartidos.
  BC-4320.70:
    name: Gestión del apalancamiento del encargo
    description: |
      Gestión de los ratios de apalancamiento socio-colaboradores en los
      encargos, equilibrando rentabilidad, calidad y desarrollo profesional.
  BC-4320.70.10:
    name: Modelización del apalancamiento del encargo
    description: |
      Modelización de la combinación de socios, gerentes, seniors y juniors
      por tipo de encargo.
  BC-4320.70.20:
    name: Seguimiento de la desviación del apalancamiento
    description: |
      Seguimiento del apalancamiento real frente al objetivo y análisis de
      causa raíz de las desviaciones.
  BC-4320.70.30:
    name: Analítica de salud de la pirámide profesional
    description: |
      Análisis de la estructura de categorías, velocidad de promoción e
      impacto de la rotación en el apalancamiento.

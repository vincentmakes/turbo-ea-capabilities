locale: es
source: L1-student-recruitment-admissions-management.yaml
entries:
  BC-4710:
    name: Gestión de captación de estudiantes y admisiones
    description: |
      Atracción, tramitación de solicitudes, toma de decisiones y conversión de
      estudiantes potenciales en alumnos matriculados, incluyendo ofertas de ayuda
      financiera y gestión de admisiones internacionales.
  BC-4710.10:
    name: Captación y reclutamiento de candidatos
    description: |
      Captación activa de estudiantes potenciales mediante campañas, eventos y
      actividades de generación de contactos.
    in_scope:
      - Campañas de captación y gestión de consultas entrantes
      - Jornadas de puertas abiertas, ferias y visitas al campus
      - Captación y seguimiento de candidatos potenciales
    out_of_scope:
      - Marketing institucional de marca general (cubierto en Gestión de marketing transversal)
  BC-4710.10.10:
    name: Operaciones de campañas de captación
    description: |
      Planificación y ejecución de campañas de captación de estudiantes en
      múltiples canales.
  BC-4710.10.20:
    name: Operaciones de jornadas de puertas abiertas y visitas al campus
    description: |
      Organización de jornadas de puertas abiertas, sesiones de muestra y visitas
      de candidatos al campus.
  BC-4710.10.30:
    name: Gestión de candidatos potenciales
    description: |
      Captación, seguimiento y cualificación de candidatos potenciales.
  BC-4710.20:
    name: Gestión de solicitudes
    description: |
      Recepción y tramitación de solicitudes de estudiantes potenciales, incluyendo
      documentación de apoyo y comunicaciones con los solicitantes.
    in_scope:
      - Recepción y validación de solicitudes
      - Verificación de documentos y referencias
      - Comunicación del estado de la solicitud al candidato
    out_of_scope:
      - Decisión de admisión (cubierta en Toma de decisiones de admisión)
  BC-4710.20.10:
    name: Recepción y validación de solicitudes
    description: |
      Recepción y verificación de la completitud de solicitudes a través de todos
      los canales.
  BC-4710.20.20:
    name: Verificación de documentos de apoyo
    description: |
      Verificación de expedientes académicos, referencias y documentos de apoyo.
  BC-4710.20.30:
    name: Comunicación del estado de la solicitud
    description: |
      Comunicación del progreso de la solicitud a los candidatos.
  BC-4710.30:
    name: Toma de decisiones de admisión
    description: |
      Evaluación, puntuación, revisión por comité y emisión de decisiones de admisión
      conforme a los criterios de acceso publicados.
    in_scope:
      - Evaluación y puntuación en admisiones
      - Revisión por el comité de admisiones
      - Emisión de decisiones de admisión
    out_of_scope:
      - Concesión de ayudas financieras (cubierta en Gestión de ayudas financieras y becas)
  BC-4710.30.10:
    name: Evaluación y puntuación en admisiones
    description: |
      Evaluación y puntuación de los candidatos frente a los criterios de acceso.
  BC-4710.30.20:
    name: Revisión del comité de admisiones
    description: |
      Revisión por comité o panel de solicitudes en el límite de admisión y
      solicitudes competitivas.
  BC-4710.30.30:
    name: Emisión de decisiones
    description: |
      Emisión de ofertas, ofertas condicionadas, listas de espera y denegaciones.
  BC-4710.40:
    name: Gestión de ayudas financieras y becas
    description: |
      Determinación, concesión y desembolso de ayudas financieras, becas, subsidios
      y subvenciones que apoyan el acceso y la asequibilidad.
    in_scope:
      - Evaluación de la elegibilidad para ayudas financieras
      - Administración de la concesión de becas
      - Desembolso de subsidios y subvenciones
    out_of_scope:
      - Cumplimiento normativo de fondos públicos, como el Título IV (cubierto en Gestión de cumplimiento normativo y reporte regulatorio en educación)
  BC-4710.40.10:
    name: Evaluación de la elegibilidad para ayudas financieras
    description: |
      Evaluación de la elegibilidad para ayudas financieras por necesidad económica
      y por mérito.
  BC-4710.40.20:
    name: Administración de la concesión de becas
    description: |
      Administración de la concesión de becas de fuentes internas y externas.
  BC-4710.40.30:
    name: Desembolso de subsidios y subvenciones
    description: |
      Desembolso de subsidios, subvenciones y pagos de apoyo a la matrícula.
  BC-4710.50:
    name: Conversión de oferta a matrícula
    description: |
      Conversión de las ofertas de admisión en matrículas confirmadas, incluyendo
      la gestión de aceptaciones, la incorporación previa a la matrícula y el
      análisis de conversión.
    in_scope:
      - Seguimiento de la aceptación de la oferta
      - Actividades de incorporación previa a la matrícula
      - Análisis de rendimiento y conversión
    out_of_scope:
      - Matrícula y registro activos (cubiertos en Gestión de matrícula y expedientes de estudiantes)
  BC-4710.50.10:
    name: Emisión de ofertas y seguimiento de aceptaciones
    description: |
      Emisión de ofertas y seguimiento de aceptaciones, rechazos y aplazamientos.
  BC-4710.50.20:
    name: Incorporación previa a la matrícula
    description: |
      Tareas de incorporación completadas por los estudiantes admitidos antes de
      la matrícula formal.
  BC-4710.50.30:
    name: Gestión del rendimiento y análisis de conversión
    description: |
      Análisis del rendimiento de la oferta, la deserción y el desempeño de
      la conversión.
  BC-4710.60:
    name: Gestión de admisiones internacionales
    description: |
      Gestión especializada de candidatos internacionales, incluyendo la evaluación
      de credenciales, la competencia lingüística y la documentación para el visado.
    in_scope:
      - Evaluación de credenciales internacionales
      - Evaluación de la competencia en inglés
      - Generación de documentación para el patrocinio de visado
    out_of_scope:
      - Cumplimiento continuo del visado de estudiantes matriculados (cubierto en Gestión de cumplimiento normativo y reporte regulatorio en educación)
  BC-4710.60.10:
    name: Evaluación de credenciales internacionales
    description: |
      Evaluación de credenciales académicas extranjeras frente a equivalencias nacionales.
  BC-4710.60.20:
    name: Evaluación de la competencia en inglés
    description: |
      Evaluación de la competencia en inglés para candidatos no nativos.
  BC-4710.60.30:
    name: Documentación para el patrocinio de visado
    description: |
      Emisión de documentos de patrocinio de visado (p. ej., I-20, CAS) a los
      estudiantes admitidos.

locale: es
source: L1-hydrocarbon-exploration-management.yaml
entries:
  BC-3000:
    name: Gestión de exploración de hidrocarburos
    description: |
      Identificación y adquisición de nuevos recursos de hidrocarburos mediante
      prospección geofísica, evaluación de cuencas y prospectos, adquisición de
      licencias y concesiones, y decisiones de perforación exploratoria.
  BC-3000.10:
    name: Gestión de prospección geofísica
    description: |
      Adquisición, procesamiento e interpretación de datos geofísicos sísmicos
      y no sísmicos para obtener imágenes del subsuelo.
    in_scope:
      - Campañas de adquisición sísmica 2D y 3D
      - Procesamiento y reprocesamiento sísmico
      - Interpretación sísmica para la generación de prospectos
    out_of_scope:
      - Geomodelado a escala de yacimiento para activos en desarrollo (BC-3010)
  BC-3000.10.10:
    name: Adquisición sísmica 3D
    description: |
      Operaciones de adquisición sísmica 3D marina, terrestre y de fondo oceánico.
  BC-3000.10.20:
    name: Adquisición sísmica 2D
    description: |
      Operaciones de adquisición sísmica 2D a escala de reconocimiento.
  BC-3000.10.30:
    name: Adquisición geofísica no sísmica
    description: |
      Prospecciones de gravimetría, magnetometría, electromagnéticas y otros
      métodos geofísicos no sísmicos.
  BC-3000.10.40:
    name: Procesamiento de datos sísmicos
    description: |
      Procesamiento pre-stack y post-stack, migración en profundidad y
      reprocesamiento de datos sísmicos.
  BC-3000.10.50:
    name: Interpretación de datos sísmicos
    description: |
      Interpretación estructural y estratigráfica de volúmenes sísmicos
      para la generación de prospectos.
  BC-3000.20:
    name: Evaluación de cuencas y prospectos
    description: |
      Análisis de sistemas petroleros, mapeo de corredores de juegos y evaluación
      de riesgo y volumen de prospectos exploratorios.
    in_scope:
      - Modelado de sistemas petroleros
      - Inventario y clasificación de prospectos
      - Estimación volumétrica con riesgo
    out_of_scope:
      - Clasificación de reservas de volúmenes descubiertos (BC-3010.30)
  BC-3000.20.10:
    name: Análisis de sistemas petroleros
    description: |
      Análisis de roca madre, yacimiento, sello, trampa y cronología
      para calificar los sistemas petroleros.
  BC-3000.20.20:
    name: Mapeo de corredores de juegos
    description: |
      Mapeo de juegos regionales y segmentos de riesgo común en el acreaje.
  BC-3000.20.30:
    name: Gestión del inventario de prospectos
    description: |
      Mantenimiento del inventario clasificado de prospectos y leads
      y su proceso de maduración.
  BC-3000.20.40:
    name: Análisis de riesgo de prospectos
    description: |
      Evaluación probabilística de la probabilidad geológica de éxito
      para los prospectos.
  BC-3000.20.50:
    name: Estimación volumétrica
    description: |
      Estimación probabilística pre-perforación de volúmenes in situ
      y recuperables.
  BC-3000.30:
    name: Adquisición de licencias y concesiones
    description: |
      Adquisición de acreaje exploratorio mediante rondas de licencias,
      negociación directa y transacciones de farm-in.
    in_scope:
      - Evaluación y participación en rondas licitatorias
      - Licitación de concesiones y contratos de participación en la producción
      - Negociación de farm-in y farm-out
    out_of_scope:
      - Seguimiento continuo de obligaciones de licencia (BC-3110.40)
  BC-3000.30.10:
    name: Evaluación de rondas de licencias
    description: |
      Evaluación de rondas de licencias de gobiernos anfitriones para
      la toma de decisiones de entrada.
  BC-3000.30.20:
    name: Licitación de concesiones
    description: |
      Preparación y presentación de ofertas competitivas para concesiones
      y contratos de participación en la producción.
  BC-3000.30.30:
    name: Negociación de farm-in y farm-out
    description: |
      Negociación de transacciones de farm-in, farm-out e intercambio de acreaje.
  BC-3000.30.40:
    name: Gestión de la cartera de acreaje
    description: |
      Mantenimiento de la cartera de acreaje exploratorio y decisiones
      de racionalización.
  BC-3000.40:
    name: Gestión del programa de perforación exploratoria
    description: |
      Definición, aprobación y evaluación post-pozo de programas de perforación
      de pozos exploratorios y de apreciación.
  BC-3000.40.10:
    name: Definición del programa de pozos exploratorios
    description: |
      Definición de objetivos y secuenciación de pozos exploratorios
      y de apreciación.
  BC-3000.40.20:
    name: Aprobación de pozos exploratorios
    description: |
      Gobernanza de aprobación interna y de socios para pozos de
      exploración de tipo wildcat.
  BC-3000.40.30:
    name: Gestión del programa de pozos de apreciación
    description: |
      Gestión de programas de pozos de apreciación tras un descubrimiento.
  BC-3000.40.40:
    name: Evaluación post-pozo
    description: |
      Evaluación del subsuelo después de la perforación y captura de
      aprendizajes para el inventario de prospectos.
  BC-3000.50:
    name: Dirección estratégica de la cartera exploratoria
    description: |
      Dirección estratégica de la cartera exploratoria en geografías,
      juegos y clases de riesgo.
  BC-3000.50.10:
    name: Definición de la estrategia exploratoria
    description: |
      Definición de la estrategia exploratoria en cuencas, juegos
      y clases de riesgo.
  BC-3000.50.20:
    name: Asignación de inversión exploratoria
    description: |
      Asignación del capital exploratorio entre geografías y tipos de juego.
  BC-3000.50.30:
    name: Seguimiento del desempeño exploratorio
    description: |
      Seguimiento del costo de hallazgo, tasas de éxito y adiciones de
      recursos exploratorios.
  BC-3000.60:
    name: Reporte de descubrimientos del subsuelo
    description: |
      Notificación de descubrimientos a los gobiernos anfitriones, socios y
      mercados de capitales, y seguimiento de la maduración de recursos
      hasta la sanción de desarrollo.
  BC-3000.60.10:
    name: Notificación de descubrimientos
    description: |
      Notificación de descubrimientos a gobiernos anfitriones, socios y
      divulgaciones a los mercados de capitales.
  BC-3000.60.20:
    name: Seguimiento de maduración de recursos
    description: |
      Seguimiento de los recursos contingentes desde el descubrimiento
      hasta la sanción de desarrollo.

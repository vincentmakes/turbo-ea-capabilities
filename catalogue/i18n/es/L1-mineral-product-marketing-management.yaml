locale: es
source: L1-mineral-product-marketing-management.yaml
entries:
  BC-4480:
    name: Gestión de comercialización de productos minerales
    description: |
      Ventas, contratos de offtake, negociación de cargos de tratamiento y
      refinación, liquidación de precios provisionales, coordinación logística y
      gestión del riesgo de negociación para concentrados, intermedios y metales
      terminados.

  BC-4480.10:
    name: Ventas de concentrados y metales
    description: |
      Ejecución de ventas al contado y a término y planificación de asignación
      de clientes para concentrados y metales terminados.
    in_scope:
      - Ventas al contado y contratos de venta a término
      - Planificación de asignación de clientes entre minas y refinerías
    out_of_scope:
      - Cálculos de liquidación bajo precio provisional (BC-4480.40)

  BC-4480.10.10:
    name: Ejecución de ventas al contado
    description: |
      Ejecución de ventas al contado de concentrados y metales a traders y
      clientes finales.

  BC-4480.10.20:
    name: Gestión de contratos a término
    description: |
      Gestión de contratos de venta a término plurianuales para concentrados y
      metales.

  BC-4480.10.30:
    name: Planificación de asignación a clientes
    description: |
      Asignación de la producción disponible entre clientes y contratos.

  BC-4480.20:
    name: Gestión de contratos de offtake
    description: |
      Negociación y administración continua de contratos de offtake, incluyendo
      offtakes de streaming y regalías.

  BC-4480.20.10:
    name: Negociación de contratos de offtake
    description: |
      Negociación comercial y legal de acuerdos de offtake y streaming.

  BC-4480.20.20:
    name: Nominación de volúmenes de offtake
    description: |
      Nominación de volúmenes de offtake frente a los derechos contratados.

  BC-4480.20.30:
    name: Monitoreo del desempeño del offtake
    description: |
      Monitoreo de la entrega, la calidad y el desempeño de la contraparte del
      offtake.

  BC-4480.30:
    name: Negociación de cargos de tratamiento y refinación
    description: |
      Negociación anual de referencia y bilateral de cargos de tratamiento y
      refinación y términos de penalidades por concentrado.

  BC-4480.30.10:
    name: Negociación anual de referencia
    description: |
      Negociación anual de referencia de cargos de tratamiento y refinación con
      fundidores y clientes.

  BC-4480.30.20:
    name: Seguimiento de liquidaciones de cargos de tratamiento
    description: |
      Seguimiento de las liquidaciones de cargos de tratamiento y refinación
      frente a los términos de referencia y de contrato.

  BC-4480.30.30:
    name: Gestión de elementos penalizables
    description: |
      Gestión de los términos de penalidades por arsénico, antimonio, flúor y
      otros elementos deletéreos.

  BC-4480.40:
    name: Precio provisional y liquidación
    description: |
      Gestión del período de cotización, facturación provisional, cálculo de
      liquidación final y coordinación de cobertura para el contenido de metal
      con precio.

  BC-4480.40.10:
    name: Gestión del período de cotización
    description: |
      Gestión de los períodos de cotización que gobiernan el precio final de los
      embarques.

  BC-4480.40.20:
    name: Emisión de facturas provisionales
    description: |
      Emisión de facturas provisionales en el embarque basadas en ensayos y
      precios supuestos.

  BC-4480.40.30:
    name: Cálculo de liquidación final
    description: |
      Liquidación final de embarques utilizando ensayos de árbitro y precios
      promedio del período de cotización.

  BC-4480.40.40:
    name: Coordinación de cobertura
    description: |
      Coordinación con los programas de cobertura de tesorería para la
      exposición a metales con precio provisional.

  BC-4480.50:
    name: Coordinación logística de productos minerales
    description: |
      Nominación de embarques a granel, gestión de warrants de almacén, muestreo
      en descarga y cumplimiento normativo de carga a granel.

  BC-4480.50.10:
    name: Nominación de embarques a granel
    description: |
      Nominación de buques, convoyes ferroviarios y barcazas para embarques de
      concentrados y mineral.

  BC-4480.50.20:
    name: Gestión de warrants de almacén
    description: |
      Gestión de warrants de almacén de la LME y otras bolsas para existencias
      de metales terminados.

  BC-4480.50.30:
    name: Muestreo de concentrados en descarga
    description: |
      Coordinación del muestreo y ensayo independiente en puertos de descarga.

  BC-4480.50.40:
    name: Cumplimiento del código de carga a granel
    description: |
      Cumplimiento del Código IMSBC de la OMI y reglamentaciones equivalentes
      de carga sólida a granel.

  BC-4480.60:
    name: Gestión del riesgo de negociación de metales
    description: |
      Gestión de los riesgos de precio de metales, crédito de contrapartes y
      documentación de operaciones en el libro de comercialización.

  BC-4480.60.10:
    name: Monitoreo de posiciones de riesgo de precio
    description: |
      Monitoreo de posiciones de metales con precio y sin precio en el libro de
      comercialización.

  BC-4480.60.20:
    name: Gestión de crédito de contrapartes
    description: |
      Evaluación crediticia, límites y monitoreo de exposición a contrapartes
      de negociación.

  BC-4480.60.30:
    name: Confirmación y documentación de operaciones
    description: |
      Confirmación, documentación y archivo de tickets y contratos de
      operaciones.

locale: es
source: L1-mission-management.yaml
entries:
  BC-1700:
    name: Gestión de misión
    description: |
      Planificación de misiones, mando y control, ejecución y revisión posterior a la acción.
  BC-1700.10:
    name: Gestión de planificación de misión
    description: |
      Planificación de objetivos de misión, rutas, blancos y fuerzas.
  BC-1700.10.10:
    name: Definición de objetivos de misión
    description: |
      Definición de los objetivos de la misión e intención del comandante.
  BC-1700.10.20:
    name: Planificación de fuerzas y activos
    description: |
      Planificación de la composición de fuerzas y asignación de activos.
  BC-1700.10.30:
    name: Planificación de rutas y blancos
    description: |
      Planificación de rutas y selección de blancos.
  BC-1700.10.40:
    name: Evaluación de riesgos de misión
    description: |
      Evaluación de riesgos operacionales y confirmación de reglas de enfrentamiento.
  BC-1700.10.50:
    name: Producción de órdenes de misión
    description: |
      Producción de órdenes de misión y documentación de tareas.
  BC-1700.20:
    name: Gestión de operaciones de mando y control
    description: |
      Operaciones C2, conciencia situacional y apoyo a la decisión.
  BC-1700.20.10:
    name: Gestión del cuadro operacional común
    description: |
      Mantenimiento del cuadro operacional común.
  BC-1700.20.20:
    name: Apoyo a la decisión táctica
    description: |
      Herramientas y recomendaciones de apoyo a la decisión táctica.
  BC-1700.20.30:
    name: Gestión de comunicaciones C2
    description: |
      Redes de comunicación C2 y mensajería táctica.
  BC-1700.20.40:
    name: Coordinación entre escalones
    description: |
      Coordinación entre escalones operacionales y tácticos.
  BC-1700.30:
    name: Gestión de ejecución de misión
    description: |
      Ejecución de misiones en tiempo real y control táctico.
  BC-1700.30.10:
    name: Coordinación de ejecución táctica
    description: |
      Coordinación táctica en tiempo real de los elementos de la misión.
  BC-1700.30.20:
    name: Reasignación dinámica de tareas
    description: |
      Reasignación dinámica de tareas y replanificación durante la ejecución.
  BC-1700.30.30:
    name: Evaluación de efectos de misión
    description: |
      Evaluación en tiempo real y evaluación de daños de combate de los efectos de la misión.
  BC-1700.40:
    name: Gestión de ensayo y simulación de misión
    description: |
      Ensayo de misiones y entrenamiento basado en simulación.
  BC-1700.40.10:
    name: Diseño de ejercicios de ensayo de misión
    description: |
      Diseño de ejercicios de ensayo de misión.
  BC-1700.40.20:
    name: Simulación en vivo, virtual y constructiva
    description: |
      Gestión del entorno de simulación LVC.
  BC-1700.40.30:
    name: Evaluación del desempeño en ensayos
    description: |
      Evaluación del desempeño de las unidades durante los ensayos.
  BC-1700.50:
    name: Gestión de informes posteriores y lecciones aprendidas
    description: |
      Revisión posterior a la acción, informes y captura de lecciones aprendidas.
  BC-1700.50.10:
    name: Realización de informes posteriores a la misión
    description: |
      Realización de informes posteriores a la misión y revisiones tras la acción.
  BC-1700.50.20:
    name: Captura de lecciones aprendidas
    description: |
      Captura y codificación de lecciones aprendidas.
  BC-1700.50.30:
    name: Seguimiento de implementación de lecciones
    description: |
      Seguimiento de la implementación de las mejoras identificadas.

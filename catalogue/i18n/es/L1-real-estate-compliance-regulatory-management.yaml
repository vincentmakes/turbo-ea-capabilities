locale: es
source: L1-real-estate-compliance-regulatory-management.yaml
entries:
  BC-4990:
    name: Gestión del cumplimiento normativo inmobiliario
    description: |
      Disciplina de cumplimiento para los regímenes regulatorios específicos del sector inmobiliario que se superponen al cumplimiento corporativo genérico — licencias de agentes inmobiliarios, igualdad de trato y antidiscriminación, AML e identificación del beneficiario real en operaciones inmobiliarias, divulgaciones de liquidación e hipoteca (RESPA/TRID), eficiencia energética de edificios, regulación de arrendamientos y rentas, regulación de condominios/comunidades de propietarios y fondos/asesores.
    in_scope:
      - Mantenimiento de licencias de empresas y agentes inmobiliarios
      - Conformidad con la Ley de Igualdad de Vivienda, Equality Act y ECOA
      - AML inmobiliario, identificación del beneficiario real, sanciones y reporting de operaciones sospechosas
      - RESPA, TRID y divulgaciones de negocios vinculados de la Sección 8
      - Divulgación del certificado de eficiencia energética y cumplimiento de MEES
      - Estabilización de rentas, notificación de desahucio, gestión de fianzas y registro de alquiler turístico
      - Divulgaciones del promotor de condominios/comunidades de propietarios y reservas
      - Cumplimiento AIFMD, ELTIF y Ley de Asesores de Inversiones para gestores de fondos inmobiliarios
    out_of_scope:
      - Gestión del cumplimiento corporativo genérico (BC-130)
      - Regímenes de ciberseguridad y privacidad (BC-620)
      - AML genérico de crimen financiero en negocios no inmobiliarios (BC-1400)
      - Administración tributaria (BC-220)
  BC-4990.10:
    name: Cumplimiento de licencias de empresas y agentes
    description: |
      Cumplimiento de los regímenes de licencias de empresas y agentes, incluyendo el mantenimiento de la licencia de la empresa, la formación continua y la supervisión del agente designado.
  BC-4990.10.10:
    name: Mantenimiento de la licencia empresarial
    description: |
      Mantenimiento de las licencias de la empresa inmobiliaria en las regiones de operación.
  BC-4990.10.20:
    name: Licencias de agentes y formación continua
    description: |
      Seguimiento de las licencias individuales de los agentes y los requisitos de formación continua.
  BC-4990.10.30:
    name: Supervisión del agente designado
    description: |
      Supervisión por parte del agente designado de la actividad regulada en la empresa.
  BC-4990.10.40:
    name: Renovación de licencias y respuesta a auditorías
    description: |
      Renovación de licencias y respuesta a auditorías e inspecciones de los reguladores.
  BC-4990.20:
    name: Cumplimiento de la igualdad de trato y la antidiscriminación
    description: |
      Conformidad con la Ley de Igualdad de Vivienda, la Equality Act, la ECOA y los regímenes antidiscriminación equivalentes en los puntos de contacto de arrendamiento, ventas y financiación.
  BC-4990.20.10:
    name: Mantenimiento de la política de igualdad de vivienda
    description: |
      Mantenimiento de las políticas de igualdad de vivienda y los procedimientos operativos estándar.
  BC-4990.20.20:
    name: Supervisión de publicidad y origen de fondos
    description: |
      Supervisión del contenido publicitario y las reglas sobre el origen de los fondos para el cumplimiento de las restricciones sobre clases protegidas.
  BC-4990.20.30:
    name: Gestión de denuncias por discriminación
    description: |
      Gestión de las denuncias por discriminación en la vivienda y las consultas de los reguladores.
  BC-4990.20.40:
    name: Formación y certificación en igualdad de vivienda
    description: |
      Formación y certificación de agentes y personal sobre las obligaciones de igualdad de vivienda.
  BC-4990.30:
    name: Cumplimiento de AML y sanciones inmobiliarias
    description: |
      Cumplimiento de las normas AML específicas del sector inmobiliario, incluyendo las GTOs de FinCEN, la Norma sobre Bienes Raíces Residenciales de FinCEN, las obligaciones de negocio no financiero designado de la AMLD 5/6 y el reporting de beneficiarios reales.
  BC-4990.30.10:
    name: Captura del beneficiario real
    description: |
      Captura y verificación de la identificación del beneficiario real de las partes en las transacciones inmobiliarias.
  BC-4990.30.20:
    name: Cribado de sanciones y personas expuestas políticamente (inmobiliario)
    description: |
      Cribado de las partes en las transacciones frente a listas de sanciones, personas expuestas políticamente y medios adversos.
  BC-4990.30.30:
    name: Comunicación de operaciones sospechosas (RE)
    description: |
      Presentación de comunicaciones de operaciones sospechosas para las transacciones inmobiliarias incluidas en el ámbito.
  BC-4990.30.40:
    name: Auditoría AML e inspección regulatoria
    description: |
      Respuesta a las auditorías AML y las inspecciones de los reguladores sobre los programas AML inmobiliarios.
  BC-4990.40:
    name: Cumplimiento de divulgaciones de liquidación e hipoteca
    description: |
      Cumplimiento de las normas de divulgación de liquidación e hipoteca RESPA y TRID de EE.UU. y los regímenes regionales equivalentes.
  BC-4990.40.10:
    name: Producción de la estimación del préstamo y la divulgación de cierre
    description: |
      Producción de los documentos de Estimación del Préstamo y Divulgación de Cierre de TRID dentro de los plazos establecidos.
  BC-4990.40.20:
    name: Divulgación de acuerdos de negocios vinculados
    description: |
      Divulgación de los acuerdos de negocios vinculados en los puntos requeridos de la transacción.
  BC-4990.40.30:
    name: Cumplimiento del proveedor de servicios de liquidación
    description: |
      Cumplimiento de las normas sobre derivaciones de proveedores de servicios de liquidación y las prohibiciones de la Sección 8.
  BC-4990.40.40:
    name: Respuesta a auditorías RESPA
    description: |
      Respuesta a las inspecciones del CFPB y los reguladores estatales sobre el cumplimiento de RESPA.
  BC-4990.50:
    name: Cumplimiento del desempeño energético de los edificios
    description: |
      Cumplimiento de los certificados de eficiencia energética, MEES, estándares de desempeño de edificios y leyes de benchmarking (p. ej., Local Law 97, revisiones de la EPBD).
  BC-4990.50.10:
    name: Cumplimiento del certificado de eficiencia energética
    description: |
      Obtención y presentación de los certificados de eficiencia energética y sus equivalentes.
  BC-4990.50.20:
    name: Cumplimiento de los estándares mínimos de eficiencia energética (MEES)
    description: |
      Cumplimiento de los estándares mínimos de eficiencia energética en inmuebles arrendados y vendidos.
  BC-4990.50.30:
    name: Divulgación de benchmarking energético (LL97/BPS)
    description: |
      Divulgación bajo las ordenanzas municipales de benchmarking energético y los estándares de desempeño de edificios.
  BC-4990.50.40:
    name: Cumplimiento del reporting EPBD de la UE
    description: |
      Cumplimiento de las obligaciones de reporting y certificación de la Directiva de la UE sobre el rendimiento energético de los edificios (EPBD).
  BC-4990.60:
    name: Cumplimiento de la regulación de arrendamientos y rentas
    description: |
      Cumplimiento del control/estabilización de rentas, la notificación de desahucio, la gestión legal de fianzas y los regímenes de registro de alquiler turístico.
  BC-4990.60.10:
    name: Cumplimiento del control y la estabilización de rentas
    description: |
      Cumplimiento de los regímenes de control y estabilización de rentas en las unidades reguladas.
  BC-4990.60.20:
    name: Cumplimiento del proceso y la notificación de desahucio
    description: |
      Cumplimiento de los requisitos legales de notificación y proceso de desahucio.
  BC-4990.60.30:
    name: Gestión legal de fianzas
    description: |
      Gestión legal de las fianzas, incluyendo las normas de depósito en garantía, intereses y devolución.
  BC-4990.60.40:
    name: Cumplimiento del registro de alquiler turístico
    description: |
      Cumplimiento de las normas de registro y operación del alquiler turístico en las ciudades reguladas.
  BC-4990.70:
    name: Cumplimiento de la regulación de condominios, comunidades de propietarios y propiedad horizontal
    description: |
      Cumplimiento de los regímenes regulatorios de condominios, comunidades de propietarios y propiedad horizontal, incluyendo las divulgaciones del promotor y las normas sobre fondos de reserva.
  BC-4990.70.10:
    name: Divulgación del promotor de condominio/propiedad horizontal
    description: |
      Obligaciones de divulgación del promotor en el marco de la regulación de condominios y propiedad horizontal.
  BC-4990.70.20:
    name: Registro de la comunidad de propietarios
    description: |
      Registro y presentación de declaraciones periódicas de las entidades de comunidades de propietarios.
  BC-4990.70.30:
    name: Cumplimiento de la divulgación del fondo de reserva
    description: |
      Cumplimiento de los requisitos de estudio y divulgación del fondo de reserva.
  BC-4990.70.40:
    name: Cumplimiento del certificado de transmisión
    description: |
      Emisión de los certificados de transmisión y las divulgaciones relacionadas en las ventas de unidades de condominio y comunidades de propietarios.
  BC-4990.80:
    name: Cumplimiento regulatorio de fondos y asesores inmobiliarios
    description: |
      Cumplimiento de la AIFMD, el ELTIF, la Ley de Asesores de Inversiones de EE.UU. y los regímenes equivalentes de fondos y asesores que regulan a los gestores de fondos inmobiliarios.
  BC-4990.80.10:
    name: Registro del asesor del fondo
    description: |
      Mantenimiento de los registros y autorizaciones de asesores y gestores de fondos.
  BC-4990.80.20:
    name: Cumplimiento del reporting AIFMD/ELTIF
    description: |
      Cumplimiento de las obligaciones de reporting del Anexo IV de la AIFMD y del ELTIF.
  BC-4990.80.30:
    name: Comunicación transfronteriza y notificación de comercialización
    description: |
      Cumplimiento de los regímenes de notificación de comercialización transfronteriza para fondos.
  BC-4990.80.40:
    name: Respuesta a auditorías e inspecciones regulatorias del fondo
    description: |
      Respuesta a las auditorías e inspecciones de los reguladores de fondos en las distintas jurisdicciones.

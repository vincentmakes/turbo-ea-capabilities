locale: es
source: L1-inventory-management.yaml
entries:
  BC-530:
    name: Gestión de inventario
    description: |
      Gestión de niveles de existencias, reaprovisionamiento y asignación en toda la red de suministro para equilibrar el nivel de servicio y el coste del inventario.
  BC-530.10:
    name: Gestión de niveles de existencias
    description: |
      Establecimiento de niveles de existencias objetivo, existencias de seguridad y puntos de pedido para garantizar la disponibilidad del producto.
  BC-530.10.10:
    name: Establecimiento de existencias objetivo y de seguridad
    description: |
      Definición de los niveles de existencias objetivo y de seguridad por SKU y ubicación.
  BC-530.10.20:
    name: Gestión de punto de pedido y mínimos/máximos
    description: |
      Puntos de pedido y políticas de existencias mínimas y máximas.
  BC-530.10.30:
    name: Optimización del nivel de servicio
    description: |
      Optimización del equilibrio entre nivel de servicio y coste de inventario.
  BC-530.10.40:
    name: Segmentación de inventario y análisis ABC
    description: |
      Segmentación ABC/XYZ para diferenciar la política de inventario por producto.
  BC-530.20:
    name: Gestión del reaprovisionamiento
    description: |
      Políticas de reaprovisionamiento y ejecución automatizada para mantener los niveles de existencias adecuados.
  BC-530.20.10:
    name: Definición de la política de reaprovisionamiento
    description: |
      Definición de políticas de reaprovisionamiento (push, pull, kanban).
  BC-530.20.20:
    name: Ejecución del reaprovisionamiento automatizado
    description: |
      Ejecución de órdenes de reaprovisionamiento automatizadas hacia los nodos de suministro.
  BC-530.20.30:
    name: Operaciones de inventario gestionado por el proveedor
    description: |
      Acuerdos de inventario gestionado por el proveedor (VMI) y existencias en consignación.
  BC-530.30:
    name: Gestión de la asignación de inventario
    description: |
      Asignación de inventario disponible en la red y gestión de reservas para satisfacer la demanda de los clientes.
  BC-530.30.10:
    name: Asignación entre la red de distribución
    description: |
      Asignación del inventario disponible entre centros de distribución, tiendas y canales.
  BC-530.30.20:
    name: Reservas de clientes y pedidos
    description: |
      Reserva de inventario contra pedidos de clientes o cuentas específicas.
  BC-530.30.30:
    name: Reequilibrio de inventario
    description: |
      Reequilibrio de existencias entre ubicaciones para ajustarse a la demanda.
  BC-530.40:
    name: Gestión de la exactitud del inventario
    description: |
      Recuentos cíclicos, inventarios físicos y resolución de discrepancias para mantener la fiabilidad de los datos de existencias.
  BC-530.40.10:
    name: Recuento cíclico
    description: |
      Programas de recuento cíclico por frecuencia y clasificación ABC.
  BC-530.40.20:
    name: Inventario físico
    description: |
      Programas de recuento físico de inventario anual o periódico.
  BC-530.40.30:
    name: Investigación y ajuste de discrepancias
    description: |
      Investigación, análisis de causa raíz y ajuste de discrepancias de inventario.
  BC-530.50:
    name: Gestión de existencias de lento movimiento y obsoletas
    description: |
      Identificación, dotación de provisiones y disposición de existencias de lento movimiento y obsoletas para minimizar el capital inmovilizado.
  BC-530.50.10:
    name: Identificación de existencias de lento movimiento
    description: |
      Identificación y envejecimiento de existencias de lento movimiento y obsoletas.
  BC-530.50.20:
    name: Provisión y baja de existencias
    description: |
      Provisión, deterioro y baja de existencias obsoletas.
  BC-530.50.30:
    name: Disposición de inventario
    description: |
      Disposición de existencias obsoletas mediante liquidación o chatarrado.

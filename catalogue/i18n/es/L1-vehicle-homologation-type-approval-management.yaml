locale: es
source: L1-vehicle-homologation-type-approval-management.yaml
entries:
  BC-3420:
    name: Gestión de homologación y aprobación de tipo de vehículos
    description: |
      Certificación regulatoria de vehículos y componentes principales en todos
      los mercados — aprobación de tipo UNECE WP.29, autocertificación FMVSS,
      homologaciones regionales (CCC, KS, MLIT), homologación de emisiones y
      energía, programas de choque y valoración de consumidores, y auditorías
      de conformidad de producción.
  BC-3420.10:
    name: Estrategia y planificación de aprobación de tipo
    description: |
      Estrategia de homologación para múltiples mercados y planificación, incluida
      la interacción con las autoridades de aprobación y la ejecución del plan
      de homologación.
  BC-3420.10.10:
    name: Estrategia de aprobación de mercado
    description: |
      Estrategia de aprobación de tipo y certificación en los mercados objetivo
      y los regímenes regulatorios correspondientes.
  BC-3420.10.20:
    name: Gestión del plan de homologación
    description: |
      Gestión de los planes de homologación a nivel de programa, entregables
      e hitos.
  BC-3420.10.30:
    name: Interacción con autoridades de aprobación
    description: |
      Interacción con autoridades de aprobación y servicios técnicos en las
      diferentes jurisdicciones.
  BC-3420.20:
    name: Presentaciones de aprobación de tipo de vehículos
    description: |
      Preparación y presentación de expedientes de aprobación de tipo y
      autocertificación en los regímenes UNECE, FMVSS y regionales.
  BC-3420.20.10:
    name: Gestión del expediente de aprobación de tipo UNECE
    description: |
      Preparación, presentación y mantenimiento de expedientes de aprobación de
      tipo de vehículo completo UNECE WP.29.
  BC-3420.20.20:
    name: Gestión de autocertificación FMVSS
    description: |
      Gestión de evidencias de autocertificación para FMVSS / 49 CFR 571
      en los Estados Unidos.
  BC-3420.20.30:
    name: Gestión de presentaciones regionales
    description: |
      Gestión de presentaciones para los regímenes de aprobación de vehículos
      de motor CCC, KS, MLIT, CCG y otros regímenes regionales.
  BC-3420.20.40:
    name: Gestión de variaciones y ampliaciones de aprobación
    description: |
      Gestión de variaciones, ampliaciones y revisiones de aprobaciones a lo largo
      del ciclo de vida del vehículo.
  BC-3420.30:
    name: Homologación de emisiones y energía
    description: |
      Homologación de emisiones del vehículo, consumo de energía y autonomía de
      vehículos eléctricos frente a los ciclos WLTP, RDE, EPA, CARB, China y
      regímenes equivalentes.
  BC-3420.30.10:
    name: Ejecución de ciclos de ensayo de emisiones
    description: |
      Ejecución de ciclos de ensayo de emisiones y consumo de combustible WLTP,
      FTP-75, China y otros ciclos regulatorios.
  BC-3420.30.20:
    name: Cumplimiento de emisiones en conducción real
    description: |
      Campañas de ensayo de emisiones en conducción real y demostración de
      conformidad para la conformidad en servicio.
  BC-3420.30.30:
    name: Informes de CO2 y consumo de combustible
    description: |
      Informes regulatorios de CO2 y consumo de combustible en virtud de las
      normas de flota de CO2 de la UE, CAFE y equivalentes.
  BC-3420.30.40:
    name: Homologación de autonomía y eficiencia de vehículos eléctricos
    description: |
      Homologación de la autonomía, el consumo de energía y las métricas de
      carga de vehículos eléctricos en los distintos mercados.
  BC-3420.40:
    name: Homologación de seguridad de choque y ocupantes
    description: |
      Homologación reglamentaria de choque, protección de ocupantes y protección
      de peatones, junto con programas de valoración de consumidores.
  BC-3420.40.10:
    name: Gestión del programa de ensayos de choque
    description: |
      Planificación y ejecución de campañas de ensayos de choque para
      homologación y reglamentación.
  BC-3420.40.20:
    name: Aprobación de sistemas de retención
    description: |
      Aprobación de cinturones de seguridad, airbags y anclajes para sistemas
      de retención infantil en los distintos regímenes regulatorios.
  BC-3420.40.30:
    name: Aprobación de protección de peatones
    description: |
      Homologación de protección de peatones y usuarios vulnerables de la vía
      pública según UNECE GTR 9 y equivalentes.
  BC-3420.40.40:
    name: Gestión del programa NCAP
    description: |
      Gestión de los programas de valoración de seguridad de consumidores,
      incluidos Euro NCAP, IIHS, NHTSA NCAP y NCAPs regionales.
  BC-3420.50:
    name: Aprobación funcional y cibernética
    description: |
      Actividades de aprobación de tipo específicas para la ciberseguridad
      UN R155, las actualizaciones de software UN R156 y el ALKS/ADS UN R157,
      complementando las actividades de ingeniería de gestión de ingeniería
      de vehículos.
    in_scope:
      - Auditorías y aprobación de tipo del CSMS
      - Auditorías y aprobación de tipo del SUMS
      - Presentaciones regulatorias de ALKS/ADS
    out_of_scope:
      - Actividades de ingeniería de ciberseguridad (BC-3400.80)
      - Operaciones del SOC del vehículo (BC-3460.60)
  BC-3420.50.10:
    name: Gestión de la aprobación de tipo del CSMS
    description: |
      Aprobación de tipo del sistema de gestión de ciberseguridad según UN R155,
      incluida la preparación de auditorías y la vigilancia.
  BC-3420.50.20:
    name: Gestión de la aprobación de tipo del SUMS
    description: |
      Aprobación de tipo del sistema de gestión de actualizaciones de software
      según UN R156, incluida la preparación de auditorías y la vigilancia.
  BC-3420.50.30:
    name: Gestión de la aprobación de ALKS y ADS
    description: |
      Presentaciones de aprobación para sistemas de mantenimiento de carril
      automatizado y sistemas de conducción automatizada más amplios según
      UN R157 y reglamentaciones emergentes.
  BC-3420.60:
    name: Aprobación de tipo de componentes y sistemas
    description: |
      Aprobaciones de tipo a nivel de componente para sistemas como iluminación,
      CEM, neumáticos y frenos necesarios para la aprobación del vehículo completo.
  BC-3420.60.10:
    name: Aprobación de iluminación y señalización
    description: |
      Aprobación de faros, dispositivos de señalización y sistemas de iluminación
      adaptativa.
  BC-3420.60.20:
    name: Aprobación de CEM
    description: |
      Aprobación de compatibilidad electromagnética para el vehículo y
      subconjuntos electrónicos según UN R10.
  BC-3420.60.30:
    name: Aprobación de neumáticos y ruedas
    description: |
      Aprobación y etiquetado de neumáticos y ruedas bajo los regímenes UNECE
      y regionales.
  BC-3420.60.40:
    name: Aprobación de componentes de frenos y dirección
    description: |
      Aprobación de componentes de frenado y dirección según UN R13/R13H,
      R79 y equivalentes.
  BC-3420.70:
    name: Gestión de la conformidad de producción
    description: |
      Auditorías de conformidad de producción y verificación continua de muestras
      de producción frente a las especificaciones aprobadas.
  BC-3420.70.10:
    name: Gestión de auditorías de CoP
    description: |
      Gestión de auditorías de conformidad de producción realizadas por las
      autoridades de aprobación y los servicios técnicos.
  BC-3420.70.20:
    name: Verificación de muestras de producción
    description: |
      Verificación de muestras de producción frente a las especificaciones y
      tolerancias aprobadas por tipo.
  BC-3420.70.30:
    name: Vigilancia de conformidad en servicio
    description: |
      Ensayos y vigilancia de conformidad en servicio para confirmar el
      cumplimiento continuado tras el lanzamiento.

locale: es
source: L1-pharmaceutical-commercial-management.yaml
entries:
  BC-1590:
    name: Gestión comercial farmacéutica
    description: |
      Gestiona el relacionamiento con HCP, las muestras, los materiales promocionales, la fuerza de ventas, la marca farmacéutica y los programas de relacionamiento con el paciente.
  BC-1590.10:
    name: Gestión del relacionamiento con HCP
    description: |
      Diseña y ejecuta programas de relacionamiento multicanal con los profesionales sanitarios a través de la fuerza de ventas.
  BC-1590.10.10:
    name: Segmentación y targeting de HCP
    description: |
      Segmentación y targeting de los profesionales sanitarios relevantes.
  BC-1590.10.20:
    name: Relacionamiento multicanal con HCP
    description: |
      Orquestación del relacionamiento multicanal con profesionales sanitarios.
  BC-1590.10.30:
    name: Reporte de transparencia con HCP
    description: |
      Reporte de transparencia conforme a la Ley Sunshine y los requisitos EFPIA.
  BC-1590.20:
    name: Gestión de muestras
    description: |
      Gestiona la distribución, la contabilidad y el cumplimiento regulatorio de las muestras de producto entregadas a los profesionales sanitarios.
  BC-1590.20.10:
    name: Solicitud y distribución de muestras
    description: |
      Gestión de solicitudes y distribución de muestras a los HCP.
  BC-1590.20.20:
    name: Contabilidad y conciliación de muestras
    description: |
      Contabilidad y conciliación de muestras conforme a PDMA.
  BC-1590.20.30:
    name: Auditoría del cumplimiento de muestras
    description: |
      Auditoría de las prácticas de distribución de muestras.
  BC-1590.30:
    name: Gestión de materiales promocionales
    description: |
      Desarrolla, revisa mediante el proceso MLR y distribuye materiales promocionales cumpliendo los requisitos regulatorios.
  BC-1590.30.10:
    name: Redacción de materiales promocionales
    description: |
      Redacción de materiales y contenidos promocionales farmacéuticos.
  BC-1590.30.20:
    name: Revisión médica, legal y regulatoria
    description: |
      Proceso de revisión y aprobación MLR de los contenidos promocionales.
  BC-1590.30.30:
    name: Distribución de materiales promocionales
    description: |
      Distribución de los materiales promocionales aprobados.
  BC-1590.40:
    name: Gestión de la fuerza de ventas farmacéutica
    description: |
      Dimensiona, diseña territorios y optimiza el rendimiento de la fuerza de ventas en campo.
  BC-1590.40.10:
    name: Dimensionamiento de la fuerza de ventas
    description: |
      Dimensionamiento y diseño de la estructura de la fuerza de ventas.
  BC-1590.40.20:
    name: Diseño de territorios de ventas
    description: |
      Diseño y alineación de los territorios de ventas farmacéuticos.
  BC-1590.40.30:
    name: Targeting de la fuerza de ventas
    description: |
      Targeting y planificación de visitas para los representantes farmacéuticos.
  BC-1590.40.40:
    name: Medición de la efectividad de la fuerza de ventas
    description: |
      Medición y mejora de la efectividad de la fuerza de ventas.
  BC-1590.50:
    name: Gestión de la marca farmacéutica
    description: |
      Define y ejecuta la estrategia, el posicionamiento y la planificación del ciclo de vida de la marca por indicación.
  BC-1590.50.10:
    name: Estrategia de marca farmacéutica
    description: |
      Estrategia y posicionamiento de la marca por indicación terapéutica.
  BC-1590.50.20:
    name: Previsión de la marca
    description: |
      Previsión de la demanda y detección temprana de tendencias a nivel de marca.
  BC-1590.50.30:
    name: Planificación de la marca a lo largo del ciclo de vida
    description: |
      Planificación de la marca a lo largo del ciclo de vida, incluida la pérdida de exclusividad.
  BC-1590.60:
    name: Gestión del relacionamiento con el paciente
    description: |
      Opera los programas de apoyo al paciente, la adherencia terapéutica y el relacionamiento con organizaciones de pacientes.
  BC-1590.60.10:
    name: Operaciones de programas de apoyo al paciente
    description: |
      Operación de programas de apoyo al paciente y adherencia al tratamiento.
  BC-1590.60.20:
    name: Relacionamiento con asociaciones de pacientes
    description: |
      Relacionamiento con organizaciones y asociaciones de pacientes.
  BC-1590.60.30:
    name: Captura de insights del paciente
    description: |
      Captura e integración de insights y resultados comunicados por el paciente (PRO).

locale: es
source: L1-market-access-reimbursement-management.yaml
entries:
  BC-1600:
    name: Gestión del acceso al mercado y reembolso
    description: |
      Gestiona la estrategia de pagadores, los estudios HEOR, las presentaciones ante HTA, la fijación de precios, las licitaciones gubernamentales y los programas de acceso para el paciente.
  BC-1600.10:
    name: Gestión de la estrategia de pagadores
    description: |
      Analiza el panorama de pagadores y desarrolla propuestas de valor para sustentar las negociaciones de precio y reembolso.
  BC-1600.10.10:
    name: Análisis del panorama de pagadores
    description: |
      Análisis del panorama de pagadores y de los organismos decisores relevantes.
  BC-1600.10.20:
    name: Desarrollo de la propuesta de valor para pagadores
    description: |
      Desarrollo de propuestas de valor orientadas a los pagadores.
  BC-1600.10.30:
    name: Operaciones de relacionamiento con pagadores
    description: |
      Relacionamiento operativo con pagadores y gestores de cuentas.
  BC-1600.20:
    name: Gestión de la investigación en economía de la salud y resultados
    description: |
      Ejecuta estudios HEOR, modelos de coste-efectividad y genera RWE para respaldar las decisiones de cobertura y reembolso.
  BC-1600.20.10:
    name: Modelización de coste-efectividad
    description: |
      Modelización de coste-efectividad e impacto presupuestario.
  BC-1600.20.20:
    name: Ejecución de estudios HEOR
    description: |
      Ejecución de estudios HEOR y análisis económicos.
  BC-1600.20.30:
    name: Evidencia del mundo real para el acceso
    description: |
      Generación de RWE que respalde los requisitos de evidencia de los pagadores.
  BC-1600.20.40:
    name: Comparación indirecta de tratamientos
    description: |
      Comparación indirecta de tratamientos y metaanálisis en red.
  BC-1600.30:
    name: Gestión de presentaciones de precios y reembolso
    description: |
      Prepara y presenta los dossieres ante organismos de HTA y gestiona las negociaciones de reembolso en los distintos mercados.
  BC-1600.30.10:
    name: Redacción del dossier HTA
    description: |
      Redacción de dossieres HTA (NICE, IQWiG, HAS, CADTH).
  BC-1600.30.20:
    name: Solicitud de reembolso
    description: |
      Presentación de solicitudes de reembolso y fijación de precios.
  BC-1600.30.30:
    name: Negociación y recurso ante HTA
    description: |
      Negociación, respuesta y recurso en los procedimientos HTA.
  BC-1600.40:
    name: Gestión de licitaciones y precios gubernamentales
    description: |
      Gestiona las licitaciones públicas, los precios gubernamentales y la administración de descuentos y rebajas obligatorias.
  BC-1600.40.10:
    name: Gestión de ofertas en licitaciones
    description: |
      Preparación y presentación de ofertas en licitaciones públicas.
  BC-1600.40.20:
    name: Operaciones de precios gubernamentales
    description: |
      Operaciones de precios gubernamentales y presentaciones de precios legales.
  BC-1600.40.30:
    name: Administración de rebajas y descuentos
    description: |
      Administración de rebajas y descuentos obligatorios establecidos por la normativa.
  BC-1600.50:
    name: Gestión de programas de acceso para el paciente
    description: |
      Opera los programas de asistencia al paciente, los apoyos al copago y los programas de acceso especial antes de la aprobación.
  BC-1600.50.10:
    name: Operaciones de programas de asistencia al paciente
    description: |
      Operación de programas de asistencia y acceso para pacientes.
  BC-1600.50.20:
    name: Gestión de programas de copago y cupones
    description: |
      Gestión de los programas de apoyo al copago y de cupones para pacientes.
  BC-1600.50.30:
    name: Operaciones de programas de acceso controlado
    description: |
      Operación de programas de uso compasivo y acceso controlado.

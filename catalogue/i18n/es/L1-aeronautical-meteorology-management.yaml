locale: es
source: L1-aeronautical-meteorology-management.yaml
entries:
  BC-1250:
    name: Gestión de meteorología aeronáutica
    description: |
      Observación MET, predicción, información meteorológica y servicios de tiempo peligroso.
  BC-1250.10:
    name: Gestión de observaciones MET
    description: |
      METAR, observaciones automatizadas, redes de sensores y observaciones de superficie.
  BC-1250.10.10:
    name: Observación meteorológica de superficie
    description: |
      Observación meteorológica de superficie manual y automatizada en aeródromos.
  BC-1250.10.20:
    name: Producción de METAR y SPECI
    description: |
      Producción y difusión de informes METAR y SPECI.
  BC-1250.10.30:
    name: Gestión de la red de sensores MET
    description: |
      Operación de sistemas de observación meteorológica automatizados y sensores.
  BC-1250.20:
    name: Gestión de predicción MET
    description: |
      TAF, pronósticos de área, SIGMET, AIRMET y GAMET.
  BC-1250.20.10:
    name: Producción de pronósticos de aeródromo
    description: |
      Producción de TAF y pronósticos de tendencia para aeródromos.
  BC-1250.20.20:
    name: Producción de pronósticos de área
    description: |
      Producción de pronósticos de área, GAMET y tiempo significativo.
  BC-1250.20.30:
    name: Emisión de SIGMET y AIRMET
    description: |
      Emisión de avisos SIGMET y AIRMET.
  BC-1250.30:
    name: Gestión de información y asesoramiento MET
    description: |
      Información pre-vuelo, servicios de asesoramiento a unidades ATS e información en vuelo.
  BC-1250.30.10:
    name: Servicio de información pre-vuelo
    description: |
      Provisión de servicios de autoinforme e información asistida pre-vuelo.
  BC-1250.30.20:
    name: Asesoramiento MET a unidades ATS
    description: |
      Provisión de asesoramiento MET a unidades ATS y supervisores.
  BC-1250.30.30:
    name: Asesoramiento MET en vuelo
    description: |
      Servicios de asesoramiento MET en vuelo a los usuarios del espacio aéreo.
  BC-1250.40:
    name: Gestión del tiempo peligroso
    description: |
      Avisos de ceniza volcánica, tiempo severo y meteorología espacial.
  BC-1250.40.10:
    name: Servicio de avisos de ceniza volcánica
    description: |
      Coordinación con los VAAC y difusión de avisos de ceniza volcánica.
  BC-1250.40.20:
    name: Servicio de avisos de tiempo severo
    description: |
      Emisión de avisos de tiempo severo (CB, turbulencia, engelamiento).
  BC-1250.40.30:
    name: Servicio de avisos de meteorología espacial
    description: |
      Avisos de meteorología espacial conforme a los requisitos de la OACI.

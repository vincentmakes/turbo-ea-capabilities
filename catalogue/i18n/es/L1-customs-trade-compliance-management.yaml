locale: es
source: L1-customs-trade-compliance-management.yaml
entries:
  BC-2480:
    name: Gestión de aduanas y cumplimiento del comercio
    description: |
      Cumplimiento de los regímenes aduaneros, de sanciones, de origen y de
      operador de confianza para los movimientos transfronterizos, incluida la
      determinación de derechos e impuestos indirectos.
  BC-2480.10:
    name: Gestión de la clasificación arancelaria
    description: |
      Determinación y mantenimiento de las clasificaciones HS para las mercancías
      comercializadas.
    in_scope:
      - Determinación del HS code por artículo y envío
      - Resoluciones de información arancelaria vinculante
    out_of_scope:
      - Filtrado de sanciones y partes (BC-2480.40)
  BC-2480.10.10:
    name: Determinación del HS code
    description: |
      Determinación de los HS codes por artículo y envío.
  BC-2480.10.20:
    name: Gestión de resoluciones de clasificación
    description: |
      Solicitud y gestión de resoluciones arancelarias vinculantes.
  BC-2480.10.30:
    name: Mantenimiento de la base de datos de clasificación
    description: |
      Mantenimiento de las bases de datos maestras de clasificación para los
      artículos comercializados.
  BC-2480.20:
    name: Gestión de declaraciones aduaneras
    description: |
      Presentación de declaraciones de importación, exportación y tránsito ante
      las autoridades aduaneras.
  BC-2480.20.10:
    name: Presentación de declaraciones de importación
    description: |
      Preparación y presentación de declaraciones de importación.
  BC-2480.20.20:
    name: Presentación de declaraciones de exportación
    description: |
      Preparación y presentación de declaraciones de exportación.
  BC-2480.20.30:
    name: Gestión de declaraciones de tránsito
    description: |
      Presentación y descargo de declaraciones de tránsito, incluidos TIR y
      NCTS.
  BC-2480.30:
    name: Gestión de origen y acuerdos de libre comercio
    description: |
      Determinación y certificación del origen preferencial en virtud de acuerdos
      de libre comercio.
  BC-2480.30.10:
    name: Determinación del origen
    description: |
      Determinación del origen preferencial y no preferencial.
  BC-2480.30.20:
    name: Documentación de acreditación FTA
    description: |
      Emisión y gestión de certificados de origen FTA.
  BC-2480.30.30:
    name: Pista de auditoría de origen
    description: |
      Mantenimiento de las pruebas de apoyo para las auditorías de origen.
  BC-2480.40:
    name: Gestión del filtrado de sanciones y partes denegadas
    description: |
      Filtrado de partes, buques y mercancías frente a listas de sanciones y
      partes denegadas.
  BC-2480.40.10:
    name: Filtrado de partes y buques
    description: |
      Filtrado de clientes, destinatarios y vehículos frente a listas de
      sanciones.
  BC-2480.40.20:
    name: Gestión de listas de sanciones
    description: |
      Mantenimiento de listas consolidadas de sanciones y partes denegadas.
  BC-2480.40.30:
    name: Procesamiento de retenciones y liberaciones
    description: |
      Procesamiento de coincidencias de filtrado, retenciones y liberaciones
      autorizadas.
  BC-2480.50:
    name: Gestión de programas de operador de confianza
    description: |
      Solicitud, mantenimiento y auditoría de programas de operador de confianza
      como AEO y C-TPAT.
  BC-2480.50.10:
    name: Solicitud y mantenimiento del AEO
    description: |
      Solicitud del AEO y mantenimiento continuo del programa.
  BC-2480.50.20:
    name: Gestión del programa C-TPAT
    description: |
      Inscripción en el C-TPAT y cumplimiento de los criterios mínimos de
      seguridad.
  BC-2480.50.30:
    name: Coordinación de auditorías aduaneras
    description: |
      Coordinación de las auditorías aduaneras y de operador de confianza.
  BC-2480.60:
    name: Gestión de derechos e impuestos indirectos
    description: |
      Determinación, pago y recuperación de derechos, impuestos indirectos y
      devoluciones sobre movimientos transfronterizos.
  BC-2480.60.10:
    name: Cálculo de derechos
    description: |
      Cálculo de los derechos a pagar en importaciones y exportaciones.
  BC-2480.60.20:
    name: Determinación de impuestos indirectos
    description: |
      Determinación del IVA, GST y los impuestos especiales en los flujos
      transfronterizos.
  BC-2480.60.30:
    name: Devolución y reembolso de derechos
    description: |
      Recuperación de derechos mediante regímenes de devolución, suspensión y
      reembolso.

locale: es
source: L1-human-capital-management.yaml
entries:
  BC-300:
    name: Gestión del capital humano
    description: |
      Ciclo de vida completo del empleado, también conocido comúnmente como gestión de recursos humanos.
  BC-300.10:
    name: Gestión de adquisición de talento
    description: |
      Abarca la búsqueda, reclutamiento, contratación e incorporación de personas a la organización.
  BC-300.10.10:
    name: Búsqueda de fuerza laboral
    description: |
      Identificación y atracción de candidatos a través de canales, referencias y pipelines de talento.
  BC-300.10.20:
    name: Selección y evaluación de candidatos
    description: |
      Cribado de candidatos, evaluaciones y gestión de entrevistas para identificar a los más idóneos.
  BC-300.10.30:
    name: Gestión de ofertas y contratación
    description: |
      Elaboración de ofertas, negociación, verificación de antecedentes y formalización de contratos.
  BC-300.10.40:
    name: Incorporación de empleados
    description: |
      Pre-incorporación, experiencia del primer día y recorridos de onboarding para nuevos empleados.
  BC-300.10.50:
    name: Gestión de la marca empleadora
    description: |
      Propuesta de valor al empleado, campañas de marca empleadora y gestión de la reputación como empleador.
  BC-300.20:
    name: Gestión del talento
    description: |
      Gestión del desempeño, planificación de la sucesión y desarrollo profesional de los empleados.
  BC-300.20.10:
    name: Gestión del desempeño
    description: |
      Establecimiento de objetivos, evaluaciones de desempeño y ciclos de retroalimentación.
  BC-300.20.20:
    name: Planificación de la sucesión
    description: |
      Identificación y desarrollo de candidatos para cubrir posiciones clave en la organización.
  BC-300.20.30:
    name: Desarrollo profesional y movilidad interna
    description: |
      Definición de trayectorias profesionales, movilidad interna y planificación del desarrollo individual.
  BC-300.20.40:
    name: Revisión y calibración del talento
    description: |
      Sesiones de revisión del talento, calibración y evaluaciones de tipo nine-box.
  BC-300.20.50:
    name: Desarrollo del liderazgo
    description: |
      Creación de pipelines de liderazgo, desarrollo ejecutivo y programas de coaching.
  BC-300.30:
    name: Gestión de compensación y beneficios
    description: |
      Estructuras salariales, bonificaciones, participación accionarial y administración de beneficios.
  BC-300.30.10:
    name: Arquitectura de puestos y niveles
    description: |
      Catálogo de puestos, nivelación y estructuras de grados organizacionales.
  BC-300.30.20:
    name: Gestión del salario base
    description: |
      Bandas salariales, benchmarking de mercado y ciclos de revisión de compensación.
  BC-300.30.30:
    name: Gestión de retribución variable e incentivos
    description: |
      Administración de bonos, planes de incentivos de ventas y planes de incentivos a corto plazo.
  BC-300.30.40:
    name: Administración de acciones e incentivos a largo plazo
    description: |
      Planes de acciones, RSUs, opciones y planes de incentivos a largo plazo.
  BC-300.30.50:
    name: Administración de beneficios
    description: |
      Administración de beneficios de salud, jubilación y otros beneficios para empleados.
  BC-300.40:
    name: Gestión de aprendizaje y desarrollo
    description: |
      Formación, desarrollo de capacidades y gestión de certificaciones para los empleados.
  BC-300.40.10:
    name: Análisis de necesidades formativas
    description: |
      Identificación de brechas de habilidades y necesidades de formación por función organizacional.
  BC-300.40.20:
    name: Curaduría de contenidos de aprendizaje
    description: |
      Curaduría y creación de contenidos de aprendizaje internos y de terceros.
  BC-300.40.30:
    name: Impartición y administración del aprendizaje
    description: |
      Impartición y seguimiento de formación presencial, virtual y digital.
  BC-300.40.40:
    name: Gestión de habilidades y certificaciones
    description: |
      Inventario de habilidades, competencias y seguimiento de certificaciones.
  BC-300.40.50:
    name: Evaluación de la efectividad del aprendizaje
    description: |
      Evaluación del impacto del aprendizaje y el retorno sobre la inversión en formación.
  BC-300.50:
    name: Gestión de la planificación de la fuerza laboral
    description: |
      Planificación estratégica de la oferta y demanda de la fuerza laboral.
  BC-300.50.10:
    name: Previsión de la demanda de fuerza laboral
    description: |
      Previsión de la demanda de personal por capacidad, rol y ubicación geográfica.
  BC-300.50.20:
    name: Análisis de la oferta de fuerza laboral
    description: |
      Análisis de la oferta interna, rotación y mercado laboral externo.
  BC-300.50.30:
    name: Elaboración del plan estratégico de fuerza laboral
    description: |
      Planes estratégicos de fuerza laboral plurianuales y análisis de escenarios.
  BC-300.50.40:
    name: Planificación y control de plantilla
    description: |
      Presupuesto operativo de plantilla y flujos de aprobación de nuevas incorporaciones.
  BC-300.60:
    name: Gestión de la experiencia del empleado
    description: |
      Compromiso, comunicación interna y experiencia en el lugar de trabajo.
  BC-300.60.10:
    name: Medición del compromiso del empleado
    description: |
      Encuestas de compromiso, pulsos y programas de escucha activa.
  BC-300.60.20:
    name: Diseño del recorrido del empleado
    description: |
      Diseño de los momentos clave y mapas del recorrido del empleado.
  BC-300.60.30:
    name: Bienestar en el trabajo
    description: |
      Programas de bienestar mental, físico y financiero para los empleados.
  BC-300.60.40:
    name: Reconocimiento y recompensas
    description: |
      Programas de reconocimiento y esquemas de recompensa no monetaria.
  BC-300.70:
    name: Gestión de operaciones de RRHH
    description: |
      Registros de empleados, administración de nómina y prestación de servicios de RRHH.
  BC-300.70.10:
    name: Gestión de datos maestros del empleado
    description: |
      Registros de empleados, eventos del ciclo de vida e integridad de los datos maestros.
  BC-300.70.20:
    name: Administración de nómina
    description: |
      Procesamiento de nómina, deducciones legales y distribución de recibos de pago.
  BC-300.70.30:
    name: Gestión del tiempo y las ausencias
    description: |
      Control de tiempo, gestión de permisos y ausencias de los empleados.
  BC-300.70.40:
    name: Mesa de servicios y casos de RRHH
    description: |
      Mesa de servicios de RRHH, gestión de casos y atención de consultas de primer nivel.
  BC-300.70.50:
    name: Análisis e informes de RRHH
    description: |
      Analítica de la fuerza laboral, cuadros de mando e informes legales de RRHH.
  BC-300.80:
    name: Relaciones laborales y con empleados
    description: |
      Comités de empresa, sindicatos, quejas y cumplimiento de la legislación laboral.
  BC-300.80.10:
    name: Negociación colectiva y relación sindical
    description: |
      Negociación colectiva, convenios y gestión de las relaciones con los sindicatos.
  BC-300.80.20:
    name: Comité de empresa y representación de empleados
    description: |
      Consulta con el comité de empresa y gestión de los órganos de representación de empleados.
  BC-300.80.30:
    name: Gestión de quejas y procedimientos disciplinarios
    description: |
      Tramitación de quejas, expedientes disciplinarios e investigaciones internas.
  BC-300.80.40:
    name: Cumplimiento de la legislación laboral
    description: |
      Cumplimiento de la normativa laboral, tiempo de trabajo y estándares de empleo.
  BC-300.90:
    name: Gestión de diversidad, equidad e inclusión
    description: |
      Estrategia, programas e informes de diversidad, equidad e inclusión (DEI).
  BC-300.90.10:
    name: Estrategia y gobernanza de DEI
    description: |
      Estrategia de DEI, patrocinio ejecutivo y estructuras de gobernanza.
  BC-300.90.20:
    name: Prácticas de talento inclusivas
    description: |
      Búsqueda, contratación y promoción inclusivas de personas en la organización.
  BC-300.90.30:
    name: Ejecución de programas de DEI
    description: |
      Grupos de recursos de empleados, concienciación y programas de DEI.
  BC-300.90.40:
    name: Equidad salarial e informes de DEI
    description: |
      Análisis de equidad salarial y divulgación de métricas e indicadores de DEI.

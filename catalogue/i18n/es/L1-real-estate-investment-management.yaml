locale: es
source: L1-real-estate-investment-management.yaml
entries:
  BC-4910:
    name: Gestión de la inversión inmobiliaria
    description: |
      Disciplina del gestor de inversiones y del fondo que abarca la estrategia, la captación de capital, la cartera de operaciones, la gobernanza de decisiones, la construcción de carteras, las relaciones con inversores y el desempeño a nivel de fondo para vehículos de inversión inmobiliaria, incluyendo REITs, fondos no cotizados, cuentas segregadas y programas de empresas conjuntas.
    in_scope:
      - Definición del fondo o mandato y política de inversión
      - Captación de capital, constitución del fondo y suscripción
      - Cartera de inversiones y originación de operaciones por canales directos e indirectos
      - Gobernanza del comité de inversiones y condiciones de aprobación
      - Construcción de carteras, asignación y reequilibrio
      - Reporting a socios limitados, llamadas de capital, distribuciones y envío a INREV/NCREIF/EPRA
      - Cálculo de NAV, atribución de desempeño y cálculos de waterfall
    out_of_scope:
      - Planes de negocio y capex por activo (BC-4920)
      - Ejecución de transacciones de adquisición y disposición (BC-4930)
      - Ejecución en mercados de capitales de deuda y capital (BC-4980)
      - Tesorería corporativa genérica y relaciones con inversores (BC-210, BC-240)
  BC-4910.10:
    name: Gestión de la estrategia de inversión y el mandato
    description: |
      Definición y custodia de la estrategia de inversión, los mandatos de los fondos, los objetivos sectoriales y geográficos, y los objetivos de rentabilidad-riesgo de los vehículos bajo gestión.
  BC-4910.10.10:
    name: Definición del fondo o mandato
    description: |
      Definición de mandatos de fondo o cuenta segregada, incluyendo sector, geografía, estilo e restricciones.
  BC-4910.10.20:
    name: Asignación sectorial y geográfica
    description: |
      Establecimiento y revisión de los objetivos de asignación sectorial y geográfica entre vehículos.
  BC-4910.10.30:
    name: Objetivos de rentabilidad-riesgo
    description: |
      Definición de perfiles de rentabilidad-riesgo por estilo de inversión (core, core-plus, value-add, oportunista) y referencia de mercado.
  BC-4910.10.40:
    name: Mantenimiento de la política de inversión
    description: |
      Mantenimiento de las declaraciones de política de inversión, excepciones y consentimientos de inversores.
  BC-4910.20:
    name: Captación de capital y constitución del fondo
    description: |
      Constitución de vehículos de inversión y captación de capital de inversores, incluyendo estructuración, comercialización y cierre.
  BC-4910.20.10:
    name: Estructuración y constitución del vehículo de fondo
    description: |
      Estructuración y constitución de vehículos de fondo, feeders, blockers y estructuras de tenencia fiscalmente eficientes.
  BC-4910.20.20:
    name: Captación de inversores y suscripción
    description: |
      Segmentación de inversores objetivo, respuesta a la diligencia debida y procesamiento de suscripciones.
  BC-4910.20.30:
    name: Gestión de los cierres del fondo
    description: |
      Gestión de los cierres iniciales, intermedios y finales, incluyendo la ecualización de inversores tardíos.
  BC-4910.20.40:
    name: Gestión de coinversiones y vehículos sidecar
    description: |
      Originación y gestión de ofertas de coinversión y vehículos sidecar.
  BC-4910.30:
    name: Cartera de inversiones y originación de operaciones
    description: |
      Originación y clasificación de oportunidades de inversión en adquisiciones directas, participaciones indirectas y canales de empresa conjunta para los fondos.
  BC-4910.30.10:
    name: Originación directa de operaciones
    description: |
      Originación de oportunidades de inversión directa en activos y carteras alineadas con los mandatos.
  BC-4910.30.20:
    name: Búsqueda de inversiones indirectas y coinversiones
    description: |
      Búsqueda de participaciones indirectas, incluyendo secundarias, participaciones en fondos y coinversiones.
  BC-4910.30.30:
    name: Ritmo de ejecución de la cartera y asignación
    description: |
      Gestión del ritmo de ejecución de la cartera frente a los planes de despliegue del fondo y la asignación entre vehículos.
  BC-4910.40:
    name: Gestión de decisiones y aprobaciones de inversión
    description: |
      Gobernanza del comité de inversiones, flujos de aprobación y seguimiento de las condiciones de aprobación para nuevas inversiones.
  BC-4910.40.10:
    name: Preparación del memorándum de inversión
    description: |
      Elaboración de los memorandos de inversión para la revisión del comité, cubriendo la tesis, los términos y el riesgo.
  BC-4910.40.20:
    name: Gobernanza del comité de inversiones
    description: |
      Gobernanza del proceso del comité de inversiones, quórum y registro de decisiones.
  BC-4910.40.30:
    name: Seguimiento de condiciones de aprobación
    description: |
      Seguimiento de las condiciones precedentes y subsiguientes vinculadas a las aprobaciones de inversión.
  BC-4910.50:
    name: Construcción y asignación de la cartera
    description: |
      Construcción y reequilibrio continuo de las carteras de los fondos frente a los objetivos de mandato, apalancamiento y riesgo.
  BC-4910.50.10:
    name: Modelización de carteras
    description: |
      Modelización de la composición de la cartera, la diversificación por cosecha y el desempeño proyectado.
  BC-4910.50.20:
    name: Reequilibrio sectorial y geográfico
    description: |
      Reequilibrio de la combinación sectorial y geográfica de la cartera mediante adquisiciones y desinversiones.
  BC-4910.50.30:
    name: Objetivos de apalancamiento y cobertura
    description: |
      Definición y seguimiento del apalancamiento de la cartera y las políticas de cobertura de divisas y tipos de interés.
  BC-4910.60:
    name: Relaciones con inversores e informes
    description: |
      Comunicación con socios limitados e inversores cotizados, ejecución de llamadas de capital y distribuciones, y envío a índices del sector.
  BC-4910.60.10:
    name: Llamadas de capital y distribuciones
    description: |
      Emisión de llamadas de capital y ejecución de distribuciones, incluyendo la devolución del capital.
  BC-4910.60.20:
    name: Informes y divulgaciones a socios limitados
    description: |
      Informes trimestrales y anuales a socios limitados sobre desempeño, NAV y divulgaciones.
  BC-4910.60.30:
    name: Envío a índices y referencias de mercado
    description: |
      Envío de datos a NCREIF, INREV, EPRA y referencias regionales para la comparabilidad del desempeño.
  BC-4910.60.40:
    name: Reuniones anuales de inversores
    description: |
      Organización de reuniones anuales de inversores, comités asesores y jornadas de inversores.
  BC-4910.70:
    name: Gestión del desempeño del fondo y el NAV
    description: |
      Cálculo del NAV del fondo, atribución del desempeño y waterfalls de comisiones de gestión y de éxito, incluida la cristalización del carried interest.
  BC-4910.70.10:
    name: NAV y precio de participación
    description: |
      Cálculo del NAV del fondo y el precio de participación en el ciclo de valoración periódico.
  BC-4910.70.20:
    name: Atribución del desempeño
    description: |
      Atribución del desempeño del fondo por contribuciones de activos, sector, geografía y divisa.
  BC-4910.70.30:
    name: Cálculo de comisiones y carried interest
    description: |
      Cálculo de comisiones de gestión e interés diferido alineado con los términos económicos del LPA.
  BC-4910.70.40:
    name: Cálculo de hurdles y waterfall
    description: |
      Cálculo de las rentabilidades preferentes y los waterfalls de distribución para cada vehículo.

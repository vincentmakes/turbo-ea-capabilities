locale: es
source: L1-electrical-product-engineering-management.yaml
entries:
  BC-1900:
    name: Gestión de ingeniería de productos eléctricos
    description: |
      Diseño multidisciplinar de productos eléctricos y electrónicos: ingeniería de circuitos,
      electrónica de potencia, embebida, EMC, térmica y mecánica hasta la verificación del diseño.
  BC-1900.10:
    name: Diseño de circuitos eléctricos
    description: |
      Diseño esquemático de circuitos analógicos, digitales, de señal mixta y RF.
  BC-1900.10.10:
    name: Diseño de circuitos analógicos
    description: |
      Diseño de circuitos de acondicionamiento de señal analógica y de potencia.
  BC-1900.10.20:
    name: Diseño de circuitos digitales
    description: |
      Diseño de circuitos de lógica digital y temporización.
  BC-1900.10.30:
    name: Diseño de circuitos de señal mixta
    description: |
      Diseño de interfaces de señal mixta, subsistemas ADC/DAC y etapas de conversión.
  BC-1900.10.40:
    name: Diseño de circuitos RF
    description: |
      Diseño de interfaces de radiofrecuencia, redes de adaptación y antenas.
  BC-1900.20:
    name: Diseño de electrónica de potencia
    description: |
      Diseño de topologías de conversión de potencia, accionamiento de motores y conmutación.
  BC-1900.20.10:
    name: Diseño de convertidores de potencia
    description: |
      Diseño de convertidores de potencia AC/DC, DC/DC y DC/AC.
  BC-1900.20.20:
    name: Diseño de topología de accionamiento de motores
    description: |
      Selección de topología y diseño de accionamientos de velocidad variable para motores.
  BC-1900.20.30:
    name: Diseño de magnéticos y filtros
    description: |
      Diseño de inductores, transformadores y filtros EMI.
  BC-1900.20.40:
    name: Diseño de lazo de control de conmutación
    description: |
      Diseño de control en lazo cerrado para etapas de conmutación de potencia.
  BC-1900.30:
    name: Diseño de PCB y empaquetado electrónico
    description: |
      Layout de PCB, empaquetado electrónico e ingeniería de interconexión.
  BC-1900.30.10:
    name: Layout de PCB
    description: |
      Stack-up multicapa de PCB y layout físico.
  BC-1900.30.20:
    name: Diseño de empaquetado electrónico
    description: |
      Diseño de módulos, carcasas y empaquetado de matriz de bolas (BGA).
  BC-1900.30.30:
    name: Diseño de interconexión y arnés de cables
    description: |
      Diseño de arneses de cables, barras colectoras e interconexiones entre placas.
  BC-1900.30.40:
    name: Gestión de la biblioteca de huellas de componentes
    description: |
      Mantenimiento de bibliotecas de huellas y símbolos CAD.
  BC-1900.40:
    name: Diseño de hardware embebido
    description: |
      Diseño de hardware para microcontroladores, FPGA, interfaces de sensores y gestión de energía.
  BC-1900.40.10:
    name: Diseño de plataforma de microcontrolador
    description: |
      Selección e integración de plataformas de microcontrolador.
  BC-1900.40.20:
    name: Integración de FPGA y SoC
    description: |
      Integración de dispositivos FPGA y SoC en el hardware del producto.
  BC-1900.40.30:
    name: Diseño de interfaz de sensores y actuadores
    description: |
      Interfaces analógicas y digitales con sensores y actuadores.
  BC-1900.40.40:
    name: Diseño de circuito de gestión de energía
    description: |
      Circuitería de gestión y regulación de energía a bordo.
  BC-1900.50:
    name: Ingeniería de firmware embebido
    description: |
      Disciplina de desarrollo de firmware que abarca RTOS, controladores, lógica de aplicación
      y verificación.
  BC-1900.50.10:
    name: Arquitectura de software en tiempo real
    description: |
      Sistema operativo en tiempo real y arquitectura de tareas.
  BC-1900.50.20:
    name: Desarrollo de controladores de dispositivo
    description: |
      Desarrollo de controladores de bajo nivel y paquetes de soporte de placa.
  BC-1900.50.30:
    name: Desarrollo de aplicaciones embebidas
    description: |
      Lógica de aplicación embebida y desarrollo de funcionalidades.
  BC-1900.50.40:
    name: Verificación y prueba de firmware
    description: |
      Verificación de firmware mediante pruebas unitarias, de integración y hardware en el bucle.
  BC-1900.60:
    name: Ingeniería de EMC e integridad de señal
    description: |
      Gestión en la fase de diseño de la compatibilidad electromagnética y la integridad de señal.
  BC-1900.60.10:
    name: Análisis de diseño EMC
    description: |
      Análisis de emisiones e inmunidad en la fase de diseño.
  BC-1900.60.20:
    name: Análisis de integridad de señal
    description: |
      Análisis de integridad de señal de alta velocidad y diafonía.
  BC-1900.60.30:
    name: Diseño de apantallamiento y toma de tierra
    description: |
      Estrategias de apantallamiento, enlace y toma de tierra.
  BC-1900.60.40:
    name: Evaluación de preconformidad EMC
    description: |
      Exploraciones de preconformidad y evaluación EMC en la fase de diseño.
  BC-1900.70:
    name: Ingeniería térmica y mecánica
    description: |
      Ingeniería térmica, de carcasa y mecánica de productos eléctricos.
  BC-1900.70.10:
    name: Análisis térmico y diseño de refrigeración
    description: |
      Modelado térmico y diseño de estrategia de refrigeración.
  BC-1900.70.20:
    name: Diseño de carcasa y protección contra ingreso
    description: |
      Diseño mecánico de carcasas y cumplimiento del grado de protección contra ingreso.
  BC-1900.70.30:
    name: Ingeniería de vibración y choque
    description: |
      Robustez mecánica frente a cargas de vibración y choque.
  BC-1900.70.40:
    name: Diseño de conectores e interfaces mecánicas
    description: |
      Selección de conectores y diseño de interfaces mecánicas.
  BC-1900.80:
    name: Verificación del diseño eléctrico
    description: |
      Verificación del diseño en fase de desarrollo mediante simulación, fabricación de
      prototipos y pruebas.
  BC-1900.80.10:
    name: Simulación de diseño
    description: |
      Estudios de simulación de circuitos, electromagnética y térmica.
  BC-1900.80.20:
    name: Fabricación y puesta en marcha de prototipos
    description: |
      Ensamblaje de prototipos y puesta en marcha funcional inicial.
  BC-1900.80.30:
    name: Prueba de verificación del diseño
    description: |
      Pruebas de verificación frente a las especificaciones de diseño.
  BC-1900.80.40:
    name: Gobernanza de revisión del diseño
    description: |
      Revisiones de diseño por etapas y aseguramiento de la calidad del diseño.

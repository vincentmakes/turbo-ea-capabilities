locale: es
source: L1-independence-and-conflicts-management.yaml
entries:
  BC-4350:
    name: Gestión de independencia y conflictos
    description: |
      Independencia del auditor, conflictos de interés profesionales,
      operación de barreras de información, declaraciones de interés personal
      y autorización de aceptación y continuación de encargos, propios de
      las firmas de servicios profesionales.
  BC-4350.10:
    name: Gestión de la independencia del auditor
    description: |
      Aplicación de las normas de independencia de la firma auditora,
      incluyendo servicios prohibidos, rotación de socios, límites de
      dependencia de honorarios y requisitos específicos de entidades de
      interés público.
  BC-4350.10.10:
    name: Identificación del cliente de auditoría
    description: |
      Identificación y mantenimiento del catálogo de clientes de auditoría
      restringidos, incluidas las filiales y las relaciones de titularidad.
  BC-4350.10.20:
    name: Preautorización de servicios prohibidos
    description: |
      Preautorización de los servicios no relacionados con la auditoría
      prestados a clientes de auditoría frente a las listas de servicios
      prohibidos.
  BC-4350.10.30:
    name: Gestión de la rotación del socio de auditoría
    description: |
      Seguimiento y cumplimiento de la rotación de los socios del encargo
      y de los socios de RCE en los clientes de auditoría.
  BC-4350.10.40:
    name: Seguimiento de la dependencia de honorarios
    description: |
      Seguimiento de los honorarios de auditoría y totales en relación con
      los ingresos de la firma para identificar amenazas de dependencia de
      honorarios.
  BC-4350.20:
    name: Gestión de conflictos de interés
    description: |
      Identificación, evaluación y resolución de conflictos de interés entre
      encargos, entre clientes y entre los intereses del cliente y la firma.
  BC-4350.20.10:
    name: Búsqueda e identificación de conflictos
    description: |
      Búsqueda en los registros de clientes y asuntos para identificar
      posibles conflictos en encargos potenciales.
  BC-4350.20.20:
    name: Evaluación y categorización de conflictos
    description: |
      Evaluación de los conflictos identificados conforme a la política
      de la firma y las normas profesionales para determinar su categoría
      y tratamiento.
  BC-4350.20.30:
    name: Resolución de conflictos y gestión de renuncias
    description: |
      Resolución de conflictos, incluyendo la obtención del consentimiento
      informado, renuncias y, en su caso, el rechazo del encargo.
  BC-4350.30:
    name: Gestión de barreras de información
    description: |
      Diseño, implantación y operación de muros de información, barreras
      de confidencialidad y mecanismos de segregación en encargos sensibles.
  BC-4350.30.10:
    name: Diseño de la barrera de información
    description: |
      Definición del alcance de la barrera, el personal segregado y los
      controles físicos o de sistemas para un encargo.
  BC-4350.30.20:
    name: Implantación de la barrera de información
    description: |
      Implantación operativa de las restricciones de acceso en los sistemas
      documentales, de correo electrónico y de práctica.
  BC-4350.30.30:
    name: Detección y respuesta ante vulneraciones de la barrera
    description: |
      Detección y respuesta ante posibles o reales vulneraciones de la
      barrera, incluyendo escalado y medidas correctoras.
  BC-4350.40:
    name: Gestión de intereses y relaciones personales
    description: |
      Captura, declaración y seguimiento de intereses financieros
      personales, relaciones familiares y empleos anteriores que puedan
      amenazar la independencia o generar conflictos.
  BC-4350.40.10:
    name: Declaración de inversiones personales
    description: |
      Captura y mantenimiento de las declaraciones de inversiones personales
      de socios y personal frente a la lista de entidades restringidas.
  BC-4350.40.20:
    name: Declaración de familiares y asociados cercanos
    description: |
      Recogida de declaraciones sobre familiares directos y otras relaciones
      cercanas relevantes para la independencia.
  BC-4350.40.30:
    name: Seguimiento de empleos anteriores y períodos de carencia
    description: |
      Seguimiento de los empleos previos en clientes de auditoría y los
      períodos de carencia antes de la participación en el encargo.
  BC-4350.50:
    name: Autorización de aceptación del encargo
    description: |
      Proceso que integra las autorizaciones de independencia, conflictos
      e integridad en una única decisión de entrada para la aceptación del
      encargo.
  BC-4350.50.10:
    name: Coordinación del proceso de autorización
    description: |
      Coordinación de las autorizaciones de independencia, conflictos y
      AML necesarias antes de la aceptación del encargo.
  BC-4350.50.20:
    name: Registro de la decisión de autorización
    description: |
      Registro de las decisiones de autorización, condiciones y justificación
      en el expediente del encargo.
  BC-4350.50.30:
    name: Gestión de la reautorización en la continuación
    description: |
      Reautorización periódica de independencia y conflictos en los encargos
      en curso y las relaciones de auditoría recurrentes.
  BC-4350.60:
    name: Seguimiento de independencia y conflictos
    description: |
      Seguimiento continuo de la situación de independencia y conflictos
      durante la ejecución del encargo y en toda la cartera de encargos.
  BC-4350.60.10:
    name: Vigilancia de nuevos servicios a clientes de auditoría
    description: |
      Vigilancia de los nuevos servicios propuestos a clientes de auditoría
      existentes para detectar exposición a servicios prohibidos.
  BC-4350.60.20:
    name: Mantenimiento de la lista de entidades restringidas
    description: |
      Mantenimiento y distribución de la lista de entidades restringidas y
      los avisos correspondientes a los profesionales.
  BC-4350.60.30:
    name: Investigación de vulneraciones de independencia
    description: |
      Investigación y comunicación de posibles o reales vulneraciones de la
      independencia y las medidas correctoras adoptadas.

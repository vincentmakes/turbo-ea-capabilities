locale: es
source: L1-cruise-voyage-operations-management.yaml
entries:
  BC-4090:
    name: Gestión de operaciones de crucero y navegación
    description: |
      Operación de cruceros — planificación de itinerarios, operaciones portuarias y
      de excursiones en tierra, programas de camarotes y huéspedes a bordo, operaciones
      marinas y de puente, embarque y salud y saneamiento a bordo — prestados conforme
      a la normativa internacional de seguridad marítima.
    in_scope:
      - Diseño y despliegue del itinerario de navegación
      - Turno en puerto, botes de transbordo y venta y prestación de excursiones en tierra
      - Operaciones de camarotes, programas y servicio al huésped a bordo
      - Operaciones marinas, de puente y de sala de máquinas
      - Operaciones de embarque y desembarque
      - Operaciones de salud y saneamiento a bordo
    out_of_scope:
      - Ventas y distribución de cruceros (BC-4010, BC-4020)
      - Operaciones hoteleras de establecimientos en tierra (BC-4060)

  BC-4090.10:
    name: Planificación del itinerario de navegación
    description: |
      Planificación de los itinerarios de navegación, el despliegue, el
      reposicionamiento y las decisiones de sustitución de itinerario.

  BC-4090.10.10:
    name: Diseño y despliegue del itinerario
    description: |
      Diseño de los itinerarios de crucero y asignación de buques a los despliegues
      de temporada.

  BC-4090.10.20:
    name: Planificación de viajes de reposicionamiento y chárter
    description: |
      Planificación de los viajes de reposicionamiento y los despliegues de chárter
      entre temporadas.

  BC-4090.10.30:
    name: Secuenciación de escalas portuarias
    description: |
      Secuenciación de las escalas portuarias dentro de un itinerario en función de
      las mareas, el tiempo de turno y los acuerdos con socios.

  BC-4090.10.40:
    name: Modificación y sustitución del itinerario
    description: |
      Modificación y sustitución en tiempo real de itinerarios debidas a condiciones
      meteorológicas, médicas o eventos geopolíticos.

  BC-4090.20:
    name: Operaciones portuarias y de excursiones en tierra
    description: |
      Operaciones en las escalas portuarias, incluyendo el turno, los botes de
      transbordo y el catálogo, la venta y la prestación de excursiones en tierra.

  BC-4090.20.10:
    name: Operaciones de turno en puerto
    description: |
      Coordinación de las operaciones de turno en puerto, incluyendo el
      avituallamiento, los residuos y el cambio de tripulación.

  BC-4090.20.20:
    name: Operaciones de botes de transbordo
    description: |
      Operación de los servicios de bote de transbordo hacia y desde los puertos de
      fondeo.

  BC-4090.20.30:
    name: Catálogo y venta de excursiones en tierra
    description: |
      Catálogo y venta de excursiones en tierra a los huéspedes a través de los
      canales previos al crucero y a bordo.

  BC-4090.20.40:
    name: Coordinación de la prestación de excursiones en tierra
    description: |
      Coordinación de la prestación de excursiones en tierra, incluyendo la entrega
      al operador local y la reconciliación de huéspedes.

  BC-4090.30:
    name: Operaciones de camarotes a bordo
    description: |
      Operaciones de camarotes y cabinas a bordo, incluyendo la rotación, la
      asignación, la venta de mejoras de categoría a mitad del crucero y el servicio
      de suites de lujo.

  BC-4090.30.10:
    name: Operaciones de rotación de camarotes
    description: |
      Operación de la rotación de camarotes durante el embarque y los días de cambio
      de huésped.

  BC-4090.30.20:
    name: Asignación de cabinas y venta de mejoras de categoría
    description: |
      Asignación de cabinas y ejecución de las decisiones de mejora de categoría
      antes y durante la navegación.

  BC-4090.30.30:
    name: Operaciones de mantenimiento de cabinas
    description: |
      Mantenimiento de los sistemas y acabados de las cabinas durante la navegación.

  BC-4090.30.40:
    name: Operaciones de servicio en suites de lujo
    description: |
      Operaciones de servicio para cabinas en suites de lujo con servicio de mayordomo.

  BC-4090.40:
    name: Operaciones del programa de huéspedes a bordo
    description: |
      Entretenimiento, actividades, clubes infantiles y operaciones de espacios
      especializados a bordo durante la navegación.

  BC-4090.40.10:
    name: Operaciones del programa de entretenimiento
    description: |
      Operación de los programas de entretenimiento en teatro, salones y espectáculos
      principales a bordo.

  BC-4090.40.20:
    name: Operaciones de actividades y enriquecimiento
    description: |
      Operación de los programas de actividades y enriquecimiento, incluyendo
      conferencias, clases y deportes.

  BC-4090.40.30:
    name: Operaciones del programa infantil y juvenil
    description: |
      Operación de los programas infantiles y juveniles, incluyendo actividades
      adaptadas a la edad y supervisión.

  BC-4090.40.40:
    name: Reservas de espacios especializados
    description: |
      Reservas a bordo para restaurantes especializados, spa y eventos con entrada.

  BC-4090.50:
    name: Operaciones marinas y de puente
    description: |
      Operaciones marinas y de puente que cubren navegación, propulsión, documentación
      portuaria y coordinación del avituallamiento.

  BC-4090.50.10:
    name: Operaciones de puente y navegación
    description: |
      Guardia de puente y operaciones de navegación a lo largo de la navegación.

  BC-4090.50.20:
    name: Operaciones de sala de máquinas y propulsión
    description: |
      Guardia de sala de máquinas y operaciones de propulsión.

  BC-4090.50.30:
    name: Documentación portuaria y despacho de aduana
    description: |
      Preparación de la documentación portuaria y gestión del despacho de estado de
      puerto y aduanas.

  BC-4090.50.40:
    name: Coordinación de avituallamiento de combustible y provisiones
    description: |
      Coordinación del avituallamiento de combustible y el aprovisionamiento de
      provisiones en las escalas portuarias.

  BC-4090.60:
    name: Embarque y desembarque a bordo
    description: |
      Operaciones de embarque y desembarque, incluyendo la verificación previa al
      embarque, el despacho de aduanas y el flujo de equipaje a bordo.

  BC-4090.60.10:
    name: Verificación de documentos previos al embarque
    description: |
      Verificación de los documentos de viaje y las atestaciones de salud del
      huésped antes del embarque.

  BC-4090.60.20:
    name: Operaciones del flujo de embarque
    description: |
      Operación de los flujos de embarque desde la terminal hasta el buque en
      ventanas de llegada escalonadas.

  BC-4090.60.30:
    name: Desembarque y despacho de aduanas
    description: |
      Operación de los flujos de desembarque, incluyendo el despacho de aduanas e
      inmigración en el puerto.

  BC-4090.60.40:
    name: Operaciones de equipaje a bordo
    description: |
      Operación del flujo de equipaje en el embarque, la entrega en cabina y el
      desembarque.

  BC-4090.70:
    name: Operaciones de salud y saneamiento del crucero
    description: |
      Operaciones de salud y saneamiento a bordo, incluyendo la preparación para
      inspecciones, la detección y respuesta a brotes, y el saneamiento del agua
      potable y de las piscinas.

  BC-4090.70.10:
    name: Preparación para inspecciones de saneamiento
    description: |
      Mantenimiento de la preparación para inspecciones conforme a los regímenes
      VSP, USPH y equivalentes.

  BC-4090.70.20:
    name: Detección de brotes a bordo
    description: |
      Detección de brotes gastrointestinales y respiratorios mediante vigilancia a
      bordo.

  BC-4090.70.30:
    name: Operaciones de respuesta ante brotes
    description: |
      Operaciones de respuesta durante los brotes, incluyendo el confinamiento y la
      notificación.

  BC-4090.70.40:
    name: Saneamiento del agua potable y de piscinas
    description: |
      Operaciones de saneamiento del agua potable y de los sistemas de agua recreativa
      a bordo.

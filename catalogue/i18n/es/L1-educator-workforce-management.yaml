locale: es
source: L1-educator-workforce-management.yaml
entries:
  BC-4760:
    name: Gestión del cuerpo docente
    description: |
      Gestión del ciclo de vida del personal académico y docente específico del sector
      educativo, abarcando la selección, la acreditación, la titularidad y la promoción,
      la asignación de carga docente, el desarrollo profesional y la gestión del
      profesorado asociado y por horas.
  BC-4760.10:
    name: Selección y nombramiento del profesorado
    description: |
      Definición de puestos, búsqueda, selección y nombramiento del profesorado
      universitario, incluyendo prácticas especializadas de búsqueda académica.
    in_scope:
      - Definición de puestos del profesorado
      - Búsqueda y selección del profesorado
      - Nombramiento e incorporación del profesorado
    out_of_scope:
      - Selección de personal general (cubierta en Gestión de capital humano transversal)
  BC-4760.10.10:
    name: Definición de puestos del profesorado
    description: |
      Definición de los puestos, rangos académicos y especialidades del profesorado.
  BC-4760.10.20:
    name: Búsqueda y selección del profesorado
    description: |
      Operaciones del comité de búsqueda académica y selección de candidatos
      al profesorado.
  BC-4760.10.30:
    name: Nombramiento e incorporación del profesorado
    description: |
      Nombramiento, contratación e incorporación académica del nuevo profesorado.
  BC-4760.20:
    name: Acreditación académica y verificación de titulaciones
    description: |
      Verificación y mantenimiento continuo de las credenciales académicas y
      profesionales de los docentes y sus competencias en la materia.
    in_scope:
      - Verificación de titulaciones de los docentes
      - Acreditación en la materia
      - Mantenimiento continuo de credenciales
    out_of_scope:
      - Certificaciones de empleados de ámbito general (cubiertas en Gestión de capital humano transversal)
  BC-4760.20.10:
    name: Verificación de titulaciones de los docentes
    description: |
      Verificación de los títulos, certificaciones y licencias de los docentes.
  BC-4760.20.20:
    name: Acreditación en la materia
    description: |
      Acreditación de los docentes en las competencias de la materia y pedagógicas.
  BC-4760.20.30:
    name: Mantenimiento continuo de credenciales
    description: |
      Seguimiento de la renovación y el mantenimiento de las credenciales
      profesionales continuas.
  BC-4760.30:
    name: Gestión de la titularidad y la promoción
    description: |
      Administración de la progresión en la carrera hacia la titularidad, las
      decisiones de titularidad y los procesos de promoción académica.
    in_scope:
      - Gestión de la carrera hacia la titularidad y el período probatorio
      - Revisión y decisión de titularidad
      - Revisión y decisión de promoción
    out_of_scope:
      - Gestión del desempeño en general (cubierta en Gestión de capital humano transversal)
  BC-4760.30.10:
    name: Gestión de la carrera hacia la titularidad y el período probatorio
    description: |
      Gestión del progreso en la carrera hacia la titularidad y los períodos
      probatorios.
  BC-4760.30.20:
    name: Revisión y decisión de titularidad
    description: |
      Procesos del comité de revisión de titularidad y decisiones finales de
      titularidad.
  BC-4760.30.30:
    name: Revisión y decisión de promoción
    description: |
      Revisión y toma de decisiones de promoción académica en todos los rangos
      del profesorado.
  BC-4760.40:
    name: Gestión de la carga y el volumen de trabajo docente
    description: |
      Asignación y equilibrio de las cargas de docencia, investigación y servicio,
      y planificación de las ausencias académicas, incluidos los años sabáticos.
    in_scope:
      - Asignación de tareas docentes
      - Equilibrio de la carga entre docencia, investigación y servicio
      - Planificación de años sabáticos y permisos académicos
    out_of_scope:
      - Administración general de permisos de RR. HH. (cubierta en Gestión de capital humano transversal)
  BC-4760.40.10:
    name: Asignación de tareas docentes
    description: |
      Asignación de tareas docentes al profesorado y los instructores.
  BC-4760.40.20:
    name: Equilibrio de la carga de trabajo
    description: |
      Equilibrio de las obligaciones de docencia, investigación y servicio del
      profesorado.
  BC-4760.40.30:
    name: Planificación de años sabáticos y permisos
    description: |
      Planificación de los años sabáticos y la cobertura durante los permisos
      académicos.
  BC-4760.50:
    name: Desarrollo profesional académico
    description: |
      Desarrollo profesional centrado en la pedagogía, la disciplina y la inducción
      para el personal académico y docente.
    in_scope:
      - Desarrollo de la pedagogía y la práctica docente
      - Desarrollo en la disciplina y la materia
      - Mentoría e inducción de docentes
    out_of_scope:
      - Formación y desarrollo en general (cubiertos en Gestión de capital humano transversal)
  BC-4760.50.10:
    name: Desarrollo de la pedagogía y la práctica docente
    description: |
      Desarrollo de las capacidades pedagógicas y de práctica docente de los educadores.
  BC-4760.50.20:
    name: Desarrollo en la disciplina y la materia
    description: |
      Desarrollo de la especialización en la materia y la disciplina.
  BC-4760.50.30:
    name: Mentoría e inducción de docentes
    description: |
      Programas de mentoría e inducción para nuevos docentes.
  BC-4760.60:
    name: Evaluación del desempeño docente y revisión por pares
    description: |
      Evaluación del desempeño específica de los docentes, incluyendo la observación
      de la docencia, la revisión por pares y el reconocimiento académico.
    in_scope:
      - Observación de la docencia y revisión por pares
      - Evaluación anual del desempeño de los docentes
      - Reconocimiento y premios a los docentes
    out_of_scope:
      - Gestión del desempeño del personal en general (cubierta en Gestión de capital humano transversal)
  BC-4760.60.10:
    name: Observación de la docencia y revisión por pares
    description: |
      Observación de la docencia y revisión entre pares de la práctica educativa.
  BC-4760.60.20:
    name: Evaluación anual del desempeño
    description: |
      Evaluación anual del desempeño del personal académico y docente.
  BC-4760.60.30:
    name: Reconocimiento y premios a los docentes
    description: |
      Programas de reconocimiento y premios para los docentes.
  BC-4760.70:
    name: Gestión del profesorado asociado y por horas
    description: |
      Gestión del personal docente a tiempo parcial, por horas y asociado, incluyendo
      la captación, la contratación y el aseguramiento de la calidad.
    in_scope:
      - Captación del grupo de profesores asociados
      - Administración de contratos de docencia por horas
      - Integración de profesores asociados y aseguramiento de la calidad
    out_of_scope:
      - Gestión general de contratistas (cubierta en Gestión de proveedores transversal)
  BC-4760.70.10:
    name: Captación del grupo de profesores asociados
    description: |
      Captación y mantenimiento de un grupo activo de docentes asociados.
  BC-4760.70.20:
    name: Administración de contratos de docencia por horas
    description: |
      Administración de los contratos de docencia por horas y de profesores asociados.
  BC-4760.70.30:
    name: Integración de profesores asociados y aseguramiento de la calidad
    description: |
      Integración de los profesores asociados con las normas académicas y el
      aseguramiento continuo de la calidad.

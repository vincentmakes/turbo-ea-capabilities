locale: es
source: L1-insurance-underwriting-management.yaml
entries:
  BC-2130:
    name: Gestión de suscripción de seguros
    description: |
      Evaluación, tarificación, aceptación, rechazo y vinculación de solicitudes
      de seguro en ramos personales, comerciales y especiales,
      incluida la aplicación de la autoridad de suscripción y la dirección de cartera.
  BC-2130.10:
    name: Recepción de riesgos para suscripción
    description: |
      Triaje de envíos, recopilación de datos del riesgo, obtención del historial de siniestros
      y enriquecimiento con datos de terceros.
  BC-2130.10.10:
    name: Triaje de envíos
    description: |
      Triaje de envíos de suscripción y enrutamiento a los equipos de suscripción.
  BC-2130.10.20:
    name: Recopilación de datos del riesgo
    description: |
      Recopilación de datos relevantes del riesgo del solicitante, corredor y fuentes de inspección.
  BC-2130.10.30:
    name: Obtención del historial de siniestros
    description: |
      Obtención de historiales de siniestros de centrales, aseguradoras anteriores y registros compartidos.
  BC-2130.10.40:
    name: Enriquecimiento con datos de terceros
    description: |
      Enriquecimiento de envíos con datos de terceros, telemática e IoT.
  BC-2130.20:
    name: Evaluación y selección de riesgos
    description: |
      Puntuación de riesgos, evaluación de la acumulación de exposición, inspecciones de control de pérdidas
      y derivaciones de suscripción.
  BC-2130.20.10:
    name: Puntuación y modelado de riesgos
    description: |
      Aplicación de modelos de suscripción, cuadros de mando y puntuaciones de riesgo por aprendizaje automático.
  BC-2130.20.20:
    name: Evaluación de la acumulación de exposición
    description: |
      Evaluación de la acumulación de exposición frente a la cartera en vigor.
  BC-2130.20.30:
    name: Coordinación de inspecciones de control de pérdidas
    description: |
      Coordinación de inspecciones de control de pérdidas e informes de ingeniería de riesgos.
  BC-2130.20.40:
    name: Gestión de derivaciones de suscripción
    description: |
      Gestión de derivaciones a suscriptores superiores, autoridades de línea y reaseguradores.
  BC-2130.30:
    name: Gestión de precios de suscripción
    description: |
      Tarifación manual, créditos de tarifación programada, tarifación por experiencia y precios
      especiales a medida.
  BC-2130.30.10:
    name: Aplicación de tarifas manuales
    description: |
      Aplicación de tarifas manuales de la configuración de producto presentada.
  BC-2130.30.20:
    name: Aplicación de créditos y débitos de tarifación programada
    description: |
      Aplicación de créditos y débitos de tarifación programada.
  BC-2130.30.30:
    name: Tarifación por experiencia
    description: |
      Tarificación basada en la experiencia utilizando el historial de siniestros del tomador.
  BC-2130.30.40:
    name: Precios especiales y a medida
    description: |
      Tarificación a medida para riesgos especiales, grandes cuentas y riesgos complejos.
  BC-2130.40:
    name: Gestión de decisiones y autoridades de suscripción
    description: |
      Decisión de aceptación y rechazo, fijación de términos y condiciones, aplicación de la autoridad y vinculación.
  BC-2130.40.10:
    name: Decisión de aceptación y rechazo
    description: |
      Decisión sobre la aceptación, rechazo o contraoferta de envíos.
  BC-2130.40.20:
    name: Fijación de términos y condiciones de cobertura
    description: |
      Fijación de términos, condiciones, exclusiones y garantías de cobertura.
  BC-2130.40.30:
    name: Aplicación de la autoridad de suscripción
    description: |
      Aplicación de los límites de autoridad de suscripción y umbrales de derivación.
  BC-2130.40.40:
    name: Emisión de cotización y vinculación
    description: |
      Emisión de cotizaciones vinculantes y confirmación de cobertura.
  BC-2130.50:
    name: Gestión de cartera de suscripción
    description: |
      Monitoreo de la composición y límites de la cartera, análisis de rentabilidad
      y planificación de acciones de suscripción.
  BC-2130.50.10:
    name: Monitoreo de composición y límites de cartera
    description: |
      Monitoreo de la composición de la cartera frente al apetito y los límites de concentración.
  BC-2130.50.20:
    name: Análisis de rentabilidad de suscripción
    description: |
      Análisis de la rentabilidad de suscripción por segmento, producto y productor.
  BC-2130.50.30:
    name: Planificación de acciones de suscripción
    description: |
      Planificación de acciones de suscripción, saneamiento y salidas de segmentos.
  BC-2130.60:
    name: Gestión del fraude y la tergiversación en suscripción
    description: |
      Cribado de fraude en solicitudes, investigación de tergiversación material y reporte
      de fraude en suscripción.
  BC-2130.60.10:
    name: Cribado de fraude en solicitudes
    description: |
      Cribado de solicitudes de seguro para detectar indicadores de fraude.
  BC-2130.60.20:
    name: Investigación de tergiversación material
    description: |
      Investigación de presunta tergiversación material en solicitudes.
  BC-2130.60.30:
    name: Reporte de fraude en suscripción
    description: |
      Reporte del fraude confirmado en suscripción a registros del sector y reguladores.

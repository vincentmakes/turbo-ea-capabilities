locale: es
source: L1-compliance-management.yaml
entries:
  BC-130:
    name: Gestión del cumplimiento
    description: |
      Garantía del cumplimiento de leyes, regulaciones y políticas internas.
  BC-130.10:
    name: Gestión del cumplimiento normativo
    description: |
      Cumplimiento de las regulaciones específicas del sector.
  BC-130.10.10:
    name: Gestión del inventario regulatorio
    description: |
      Inventario de regulaciones y obligaciones aplicables por jurisdicción.
  BC-130.10.20:
    name: Vigilancia de cambios regulatorios
    description: |
      Vigilancia del horizonte regulatorio y evaluación de impactos.
  BC-130.10.30:
    name: Evaluación del riesgo de cumplimiento
    description: |
      Evaluación del riesgo de cumplimiento por línea de negocio, geografía y producto.
  BC-130.10.40:
    name: Supervisión y pruebas de cumplimiento
    description: |
      Plan de supervisión, pruebas de controles y reporte de cumplimiento.
  BC-130.10.50:
    name: Gestión de la relación con el regulador
    description: |
      Notificaciones, inspecciones y seguimiento de remediaciones con el regulador.
  BC-130.20:
    name: Gestión de políticas
    description: |
      Ciclo de vida de las políticas: redacción, aprobación, atestación y retirada.
  BC-130.20.10:
    name: Redacción de políticas
    description: |
      Redacción y revisión de las políticas y estándares corporativos.
  BC-130.20.20:
    name: Aprobación y publicación de políticas
    description: |
      Aprobación de gobierno y publicación controlada de las políticas.
  BC-130.20.30:
    name: Atestación de políticas
    description: |
      Acuse de recibo y atestación por parte de empleados y terceros.
  BC-130.20.40:
    name: Gestión de excepciones a las políticas
    description: |
      Registro y aprobación de excepciones y dispensas a las políticas.
  BC-130.30:
    name: Gestión de ética y conducta
    description: |
      Código de conducta, ética y programas de denuncia.
  BC-130.30.10:
    name: Administración del código de conducta
    description: |
      Mantenimiento y despliegue del código de conducta de la empresa.
  BC-130.30.20:
    name: Gestión de conflictos de interés
    description: |
      Declaración y gestión de conflictos personales y organizativos.
  BC-130.30.30:
    name: Gestión de denuncias y canal de alerta
    description: |
      Canales de denuncia, recepción, triaje y protección de los denunciantes.
  BC-130.30.40:
    name: Investigaciones de conducta
    description: |
      Investigación de presuntas faltas y gestión de casos disciplinarios.
  BC-130.40:
    name: Gestión antisoborno y anticorrupción
    description: |
      Programas anticorrupción, due diligence de terceros, regalos y hospitalidad.
  BC-130.40.10:
    name: Gobierno del programa antisoborno
    description: |
      Diseño del programa antisoborno alineado con la FCPA y la UKBA.
  BC-130.40.20:
    name: Due diligence de integridad de terceros
    description: |
      Due diligence de integridad y supervisión continua de intermediarios.
  BC-130.40.30:
    name: Gestión de regalos, hospitalidad y patrocinios
    description: |
      Aprobación previa y registros de regalos, hospitalidad y patrocinios.
  BC-130.40.40:
    name: Formación y concienciación antisoborno
    description: |
      Formación y comunicaciones específicas sobre requisitos antisoborno.
  BC-130.50:
    name: Gestión de privacidad y protección de datos
    description: |
      Cumplimiento del RGPD y equivalentes, derechos de los interesados, privacidad desde el diseño.
  BC-130.50.10:
    name: Gobierno del programa de privacidad
    description: |
      Marco de privacidad, función del DPO y mecanismos de rendición de cuentas.
  BC-130.50.20:
    name: Gestión del registro de actividades de tratamiento
    description: |
      Mantenimiento del registro de actividades de tratamiento y de los flujos de datos.
  BC-130.50.30:
    name: Evaluación de impacto en la protección de datos
    description: |
      EIPD y revisiones de privacidad desde el diseño de nuevas actividades de tratamiento.
  BC-130.50.40:
    name: Atención de los derechos de los interesados
    description: |
      Recepción y atención de solicitudes de acceso, rectificación y supresión.
  BC-130.50.50:
    name: Gestión de brechas de datos personales
    description: |
      Detección, notificación y remediación de brechas de datos personales.

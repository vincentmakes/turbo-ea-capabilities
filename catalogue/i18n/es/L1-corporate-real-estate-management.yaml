locale: es
source: L1-corporate-real-estate-management.yaml
entries:
  BC-710:
    name: Gestión de inmuebles corporativos
    description: |
      Gestión de la cartera inmobiliaria, arrendamientos, transacciones y planificación del espacio para optimizar la huella inmobiliaria de la organización.
  BC-710.10:
    name: Gestión de la estrategia y la cartera inmobiliaria
    description: |
      Estrategia inmobiliaria, composición de la cartera y planificación de la huella para alinear los inmuebles con las necesidades del negocio.
  BC-710.10.10:
    name: Desarrollo de la estrategia inmobiliaria
    description: |
      Estrategia inmobiliaria plurianual alineada con las necesidades del negocio.
  BC-710.10.20:
    name: Planificación de la huella del portafolio
    description: |
      Planificación de la huella, estrategia de ubicación y análisis de consolidación.
  BC-710.10.30:
    name: Gestión del rendimiento de inmuebles
    description: |
      Seguimiento del coste, la utilización y el rendimiento por inmueble.
  BC-710.10.40:
    name: Gestión del riesgo inmobiliario
    description: |
      Riesgo de mercado inmobiliario, de país y de contraparte.
  BC-710.20:
    name: Gestión de adquisiciones y ventas inmobiliarias
    description: |
      Adquisiciones, ventas y salidas de inmuebles para adaptar la cartera a la estrategia empresarial.
  BC-710.20.10:
    name: Adquisición de inmuebles
    description: |
      Adquisición de inmuebles en propiedad y en arrendamiento, incluyendo la diligencia debida.
  BC-710.20.20:
    name: Venta y salida de inmuebles
    description: |
      Venta, subarrendamiento y salida de activos inmobiliarios y arrendamientos.
  BC-710.20.30:
    name: Selección de emplazamiento y negociación
    description: |
      Análisis de ubicaciones, selección de emplazamiento y negociación de arrendamientos.
  BC-710.30:
    name: Gestión de la administración de arrendamientos
    description: |
      Ciclo de vida del arrendamiento, contabilidad y opciones para garantizar el cumplimiento contractual y financiero.
  BC-710.30.10:
    name: Gestión de documentación de arrendamientos
    description: |
      Mantenimiento de documentos de arrendamiento, resúmenes y condiciones clave.
  BC-710.30.20:
    name: Contabilidad de arrendamientos
    description: |
      Contabilidad de arrendamientos según NIIF 16 / ASC 842.
  BC-710.30.30:
    name: Pagos y reconciliación de arrendamientos
    description: |
      Pagos de renta, gastos de servicio y CAM, y su reconciliación.
  BC-710.30.40:
    name: Gestión de opciones y renovaciones de arrendamientos
    description: |
      Seguimiento y ejercicio de opciones, cláusulas de rescisión y renovaciones de arrendamientos.
  BC-710.40:
    name: Gestión de la estrategia del lugar de trabajo
    description: |
      Conceptos de lugar de trabajo, trabajo híbrido y estándares de diseño para crear entornos adecuados a las nuevas formas de trabajar.
  BC-710.40.10:
    name: Diseño del concepto de lugar de trabajo
    description: |
      Definición de conceptos de lugar de trabajo, incluyendo el trabajo basado en actividades.
  BC-710.40.20:
    name: Estándares de diseño del lugar de trabajo
    description: |
      Guías de diseño, estándares de acondicionamiento y estándares de marca para los espacios de trabajo.
  BC-710.40.30:
    name: Implantación de la política de trabajo híbrido
    description: |
      Implantación de modelos de trabajo híbrido y el espacio de soporte asociado.
  BC-710.40.40:
    name: Medición de la experiencia en el lugar de trabajo
    description: |
      Medición de la experiencia y la satisfacción en el lugar de trabajo.

locale: es
source: L1-air-traffic-controller-competency-management.yaml
entries:
  BC-1290:
    name: Gestión de la competencia del controlador de tránsito aéreo
    description: |
      Formación inicial, de unidad y continua; habilitación y evaluación de la competencia de los controladores.
  BC-1290.10:
    name: Gestión de la formación inicial
    description: |
      Formación ab initio, formación básica y de habilitación (generalmente en academia).
  BC-1290.10.10:
    name: Programa de formación ab initio
    description: |
      Formación ab initio de ATCO, incluida la fase básica.
  BC-1290.10.20:
    name: Formación de habilitación
    description: |
      Formación específica de habilitación (ACC, APP, ADC, OCN).
  BC-1290.10.30:
    name: Evaluación de la formación inicial
    description: |
      Exámenes y evaluaciones durante la formación inicial.
  BC-1290.20:
    name: Gestión de la formación de unidad
    description: |
      Formación en el puesto de trabajo en la unidad operacional.
  BC-1290.20.10:
    name: Definición del plan de formación de unidad
    description: |
      Definición de los planes de formación de unidad para la transición del ATCO.
  BC-1290.20.20:
    name: Impartición de formación en el puesto de trabajo
    description: |
      Impartición de OJT con instructores OJT.
  BC-1290.20.30:
    name: Validación de la formación de unidad
    description: |
      Validación de la habilitación de unidad al completar la formación de unidad.
  BC-1290.30:
    name: Gestión de la formación continua
    description: |
      Formación de reciclaje, de conversión y para situaciones de emergencia e inusuales.
  BC-1290.30.10:
    name: Formación de reciclaje
    description: |
      Formación periódica de reciclaje para controladores con licencia.
  BC-1290.30.20:
    name: Formación de conversión
    description: |
      Formación de conversión para nuevos procedimientos, sistemas o sectores.
  BC-1290.30.30:
    name: Formación para situaciones de emergencia e inusuales
    description: |
      Formación para situaciones de emergencia, anómalas e inusuales.
  BC-1290.40:
    name: Gestión de la evaluación de competencias
    description: |
      Evaluaciones periódicas de competencias, verificaciones de línea y validaciones.
  BC-1290.40.10:
    name: Mantenimiento del esquema de competencias
    description: |
      Definición y mantenimiento del esquema de competencias.
  BC-1290.40.20:
    name: Realización de evaluaciones de competencias
    description: |
      Realización de evaluaciones periódicas de competencias y verificaciones de línea.
  BC-1290.40.30:
    name: Gestión de registros de competencias
    description: |
      Gestión de registros de evaluación de competencias y su vigencia.
  BC-1290.50:
    name: Gestión de habilitaciones y licencias
    description: |
      Licencias ATCO, habilitaciones, endorsements y administración de la aptitud médica.
  BC-1290.50.10:
    name: Emisión de licencias ATCO
    description: |
      Emisión y renovación de licencias y habilitaciones de ATCO.
  BC-1290.50.20:
    name: Administración de endorsements
    description: |
      Administración de endorsements de unidad e idioma.
  BC-1290.50.30:
    name: Administración de la aptitud médica
    description: |
      Administración del certificado médico de Clase 3 para controladores.
  BC-1290.60:
    name: Gestión de operaciones de simulador
    description: |
      Simuladores ATC, diseño de escenarios y operaciones de piloto de simulador.
  BC-1290.60.10:
    name: Diseño de escenarios de simulador
    description: |
      Diseño de escenarios y ejercicios de formación en simulador.
  BC-1290.60.20:
    name: Operaciones del piloto de simulador
    description: |
      Operación de las posiciones del piloto de simulador durante los ejercicios.
  BC-1290.60.30:
    name: Mantenimiento y configuración del simulador
    description: |
      Mantenimiento y configuración de los simuladores ATC.

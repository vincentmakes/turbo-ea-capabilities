locale: es
source: L1-telecom-fraud-management.yaml
entries:
  BC-2690:
    name: Fraude en telecomunicaciones
    description: |
      Detección, investigación, prevención, recuperación y notificación entre operadores
      del fraude específico de telecomunicaciones: fraude de suscripción, IRSF, Wangiri,
      SIM-swap, bypass y esquemas de reparto de ingresos, siguiendo las directrices de
      fraude de GSMA.
  BC-2690.10:
    name: Detección de fraude en telecomunicaciones
    description: |
      Detección en tiempo real y en tiempo casi real de patrones de fraude específicos
      de telecomunicaciones en el tráfico de voz, datos y señalización.
  BC-2690.10.10:
    name: Detección de fraude de suscripción
    description: |
      Detección de adquisición fraudulenta de servicios mediante identidades robadas o
      fabricadas.
  BC-2690.10.20:
    name: Detección de fraude de reparto de ingresos internacional (IRSF)
    description: |
      Detección de patrones de tráfico IRSF que inflan la liquidación hacia destinos
      premium.
  BC-2690.10.30:
    name: Detección de Wangiri
    description: |
      Detección de patrones de fraude de devolución de llamada Wangiri y rangos de
      números asociados.
  BC-2690.10.40:
    name: Detección de SIM-swap
    description: |
      Detección de intentos fraudulentos de SIM-swap y eSIM y de la posterior
      apropiación de cuentas.
  BC-2690.10.50:
    name: Detección de fraude de bypass
    description: |
      Detección de esquemas de SIM-box y otros métodos de bypass que defraudan los
      ingresos de interconexión.
  BC-2690.20:
    name: Investigación de fraude en telecomunicaciones
    description: |
      Tramitación de casos de fraude detectado, preservación de evidencias y enlace con
      las fuerzas del orden.
  BC-2690.20.10:
    name: Investigación de casos de fraude
    description: |
      Investigación estructurada de casos de fraude detectados hasta su resolución.
  BC-2690.20.20:
    name: Recopilación de evidencias
    description: |
      Recopilación y preservación forense de evidencias que sustentan las investigaciones
      de fraude.
  BC-2690.20.30:
    name: Enlace con las fuerzas del orden
    description: |
      Coordinación con los cuerpos y fuerzas de seguridad en los casos de fraude
      derivados.
  BC-2690.30:
    name: Controles de prevención del fraude en telecomunicaciones
    description: |
      Controles preventivos —reglas, límites de velocidad, elevación de autenticación y
      listas negras— aplicados sobre el tráfico en tiempo real.
  BC-2690.30.10:
    name: Gestión de reglas de fraude en tiempo real
    description: |
      Creación y ajuste de conjuntos de reglas en tiempo real utilizados por las
      plataformas de gestión de fraude.
  BC-2690.30.20:
    name: Gestión de controles de velocidad
    description: |
      Controles basados en velocidad sobre uso, recargas y cambios para limitar la
      exposición al fraude.
  BC-2690.30.30:
    name: Elevación de autenticación
    description: |
      Autenticación reforzada de transacciones de alto riesgo y acciones de
      autogestión.
  BC-2690.30.40:
    name: Gestión de listas negras de fraude
    description: |
      Mantenimiento de listas negras de fraude para números, rangos, dispositivos e
      identidades.
  BC-2690.40:
    name: Recuperación de pérdidas por fraude en telecomunicaciones
    description: |
      Recuperación de cargos fraudulentos, deudas incobrables y activos cuando el
      fraude es confirmado.
  BC-2690.40.10:
    name: Recuperación de cargos fraudulentos
    description: |
      Recuperación de cargos generados por actividad fraudulenta confirmada.
  BC-2690.40.20:
    name: Recuperación de deudas incobrables
    description: |
      Recuperación de deudas incobrables asociadas al fraude de suscripción y
      apropiación de cuentas.
  BC-2690.40.30:
    name: Recuperación de activos
    description: |
      Recuperación de dispositivos, SIM y otros activos relacionados con pedidos
      fraudulentos.
  BC-2690.50:
    name: Notificación de fraude entre operadores
    description: |
      Intercambio de inteligencia sobre fraude en el sector y notificación a reguladores
      cuando sea obligatorio.
  BC-2690.50.10:
    name: Intercambio de inteligencia de fraude sectorial
    description: |
      Contribución y consumo de canales de inteligencia de fraude del sector como el
      foro de fraude de GSMA.
  BC-2690.50.20:
    name: Notificación de fraude al regulador
    description: |
      Notificación de incidentes de fraude y exposición agregada a los reguladores
      cuando sea preceptivo.
  BC-2690.50.30:
    name: Derivación de fraude entre operadores
    description: |
      Derivación de actividad fraudulenta sospechosa a operadores originantes o
      terminantes para actuación conjunta.

locale: es
source: L1-engineering-tendering-estimation-management.yaml
entries:
  BC-1140:
    name: Gestión de licitación y estimación de ingeniería
    description: |
      Preparación de ofertas y desarrollo de propuestas técnicas y comerciales.
  BC-1140.10:
    name: Gestión de la decisión de licitar o no licitar
    description: |
      Calificación de oportunidades, decisiones estratégicas de licitación y planificación de captura.
  BC-1140.10.10:
    name: Calificación de oportunidades
    description: |
      Calificación de oportunidades frente a criterios de licitación.
  BC-1140.10.20:
    name: Gobernanza de la decisión de licitar o no licitar
    description: |
      Gobernanza de las decisiones de licitar o no licitar y aprobaciones de puertas de control.
  BC-1140.10.30:
    name: Planificación de captura
    description: |
      Planes de captura, temas ganadores y posicionamiento competitivo.
  BC-1140.20:
    name: Gestión de estimación de ingeniería
    description: |
      Horas de ingeniería, factores de complejidad y estimación basada en entregables.
  BC-1140.20.10:
    name: Estimación de horas de ingeniería
    description: |
      Estimación ascendente de horas de ingeniería por disciplina.
  BC-1140.20.20:
    name: Normas y referencias de estimación
    description: |
      Mantenimiento de normas, factores y referencias de estimación.
  BC-1140.20.30:
    name: Estimación basada en entregables
    description: |
      Estimación basada en entregables incluyendo factores de complejidad.
  BC-1140.30:
    name: Gestión de estimación de costos y cronograma
    description: |
      Estimación de costos de construcción, equipos y cronograma del proyecto.
  BC-1140.30.10:
    name: Estimación de costo de equipos
    description: |
      Estimación de costos de equipos mediante cotizaciones y métodos paramétricos.
  BC-1140.30.20:
    name: Estimación de costos de construcción
    description: |
      Estimación de costos de construcción según clase AACE.
  BC-1140.30.30:
    name: Estimación del cronograma del proyecto
    description: |
      Estimación del cronograma del proyecto de arriba abajo y de abajo arriba.
  BC-1140.30.40:
    name: Aseguramiento de la calidad de la estimación
    description: |
      QA independiente de estimaciones y comparación de referencia.
  BC-1140.40:
    name: Gestión del desarrollo de propuestas
    description: |
      Elaboración de propuestas técnicas y comerciales y gestión de propuestas.
  BC-1140.40.10:
    name: Elaboración de la propuesta técnica
    description: |
      Elaboración de las secciones técnicas de la propuesta.
  BC-1140.40.20:
    name: Elaboración de la propuesta comercial
    description: |
      Elaboración de las secciones comerciales de la propuesta y tablas de precios.
  BC-1140.40.30:
    name: Producción y revisión de la propuesta
    description: |
      Producción de la propuesta, revisiones por color y verificación final de cumplimiento.
  BC-1140.50:
    name: Gestión de la presentación de ofertas
    description: |
      Proceso de presentación, aclaraciones, negociaciones y adjudicación del contrato.
  BC-1140.50.10:
    name: Logística de presentación de ofertas
    description: |
      Logística de presentación y cumplimiento de plataforma.
  BC-1140.50.20:
    name: Gestión de aclaraciones de licitación
    description: |
      Gestión de aclaraciones antes y después de la presentación.
  BC-1140.50.30:
    name: Negociación y adjudicación
    description: |
      Apoyo a la negociación y traspaso al equipo de ejecución tras la adjudicación del contrato.
  BC-1140.60:
    name: Gestión de precios y margen de licitación
    description: |
      Estrategia de precios, análisis de margen y precios de contingencia y riesgo.
  BC-1140.60.10:
    name: Estrategia de precios de oferta
    description: |
      Estrategia de precios de oferta y posicionamiento competitivo.
  BC-1140.60.20:
    name: Establecimiento de margen y contingencia
    description: |
      Decisiones de margen, contingencia y precios de riesgo.
  BC-1140.60.30:
    name: Provisión de riesgo en la oferta
    description: |
      Provisiones de riesgo incorporadas en las ofertas según el registro de riesgos.
  BC-1140.60.40:
    name: Gobernanza de aprobación de ofertas
    description: |
      Puertas de aprobación de precios de oferta y gobernanza de la alta dirección.

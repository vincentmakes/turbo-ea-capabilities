locale: es
source: L1-retail-loss-prevention-management.yaml
entries:
  BC-2340:
    name: Prevención de pérdidas en retail
    description: |
      Prevención, detección, investigación y reducción de la merma y el fraude
      en el parque de tiendas: desde el hurto y el crimen organizado hasta el
      robo interno y los abusos en el punto de venta.
  BC-2340.10:
    name: Gestión del análisis de merma
    description: |
      Medición, análisis de causas raíz e informe de la merma de stock en
      tiendas, canales y categorías.
    in_scope:
      - Medición de la pérdida de stock frente al inventario contable
      - Informes de merma por tienda, categoría y causa
      - Análisis de causas raíz de la pérdida desconocida
  BC-2340.10.10:
    name: Medición de la merma
    description: |
      Medición de la merma frente al inventario contable y los recuentos físicos.
  BC-2340.10.20:
    name: Análisis de causas raíz de la merma
    description: |
      Análisis de causas raíz de la merma en pérdidas conocidas y desconocidas.
  BC-2340.10.30:
    name: Informes y objetivos de merma
    description: |
      Informes de merma y establecimiento de objetivos de reducción por tienda
      y categoría.
  BC-2340.20:
    name: Gestión de la investigación del robo interno
    description: |
      Detección, investigación y resolución de conductas deshonestas de empleados,
      incluyendo acciones disciplinarias y de recuperación.
  BC-2340.20.10:
    name: Detección de deshonestidad del empleado
    description: |
      Detección de deshonestidad del empleado mediante líneas de denuncia,
      analítica y auditorías.
  BC-2340.20.20:
    name: Gestión de casos de investigaciones internas
    description: |
      Tramitación de casos de investigaciones internas, incluida la gestión de
      pruebas.
  BC-2340.20.30:
    name: Coordinación de recuperación y acciones disciplinarias
    description: |
      Coordinación de la recuperación, las acciones disciplinarias y el
      seguimiento con Recursos Humanos.
  BC-2340.30:
    name: Gestión del hurto externo y el crimen organizado
    description: |
      Prevención e investigación del hurto en tienda y el crimen organizado en
      retail, incluida la colaboración con fuerzas de seguridad y asociaciones
      del sector.
  BC-2340.30.10:
    name: Prevención del hurto en tienda
    description: |
      Prevención del hurto mediante disuasión, disposición de la tienda e
      intervención.
  BC-2340.30.20:
    name: Investigación del crimen organizado en retail
    description: |
      Investigación de redes y patrones de crimen organizado en retail.
  BC-2340.30.30:
    name: Colaboración con las fuerzas de seguridad
    description: |
      Colaboración con la policía y foros del sector en casos de delincuencia
      en el comercio minorista.
  BC-2340.40:
    name: Gestión de la prevención del fraude en el TPV
    description: |
      Detección y prevención del fraude en el punto de venta, incluyendo el
      fraude en devoluciones, el sweethearting y los informes basados en
      excepciones.
    in_scope:
      - Detección de fraude en devoluciones e intercambios
      - Detección de sweethearting y abuso de descuentos
      - Informes del TPV basados en excepciones
  BC-2340.40.10:
    name: Detección de fraude en devoluciones e intercambios
    description: |
      Detección de patrones de fraude en devoluciones e intercambios.
  BC-2340.40.20:
    name: Detección de sweethearting y abuso de descuentos
    description: |
      Detección de sweethearting y aplicación no autorizada de descuentos.
  BC-2340.40.30:
    name: Informes del TPV basados en excepciones
    description: |
      Informes basados en excepciones de transacciones del TPV para detectar
      anomalías.
  BC-2340.50:
    name: Gestión de seguridad física y videovigilancia
    description: |
      Seguridad física a nivel de tienda, incluyendo CCTV, sistemas antihurto
      electrónico, controles de acceso y servicios de vigilancia.
  BC-2340.50.10:
    name: Operaciones de CCTV en tienda
    description: |
      Operación, supervisión y gestión de evidencias del CCTV en tienda.
  BC-2340.50.20:
    name: Operaciones del sistema antihurto electrónico
    description: |
      Operación de portales y etiquetado antihurto, incluida la respuesta a
      alarmas.
  BC-2340.50.30:
    name: Control de acceso a la tienda
    description: |
      Control de acceso físico a almacenes traseros, oficinas de caja y zonas
      de acceso restringido.
  BC-2340.50.40:
    name: Gestión del servicio de vigilancia
    description: |
      Despliegue y gestión de vigilantes propios y contratados en tienda.

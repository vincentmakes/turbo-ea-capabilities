locale: es
source: L1-functional-safety-reliability-management.yaml
entries:
  BC-1970:
    name: Gestión de seguridad funcional y fiabilidad
    description: |
      Análisis de seguridad funcional a nivel de producto (IEC 61508/61511/13849, ISO 26262) e
      ingeniería de fiabilidad — diferenciada de la Calidad genérica y de la ejecución de pruebas
      de producción.
  BC-1970.10:
    name: Gestión del análisis de seguridad funcional
    description: |
      Análisis de peligros, riesgos y concepto de seguridad para productos eléctricos relacionados
      con la seguridad.
  BC-1970.10.10:
    name: Análisis de peligros y riesgos
    description: |
      Identificación de peligros y análisis de riesgos para productos relacionados con la seguridad.
  BC-1970.10.20:
    name: Definición del concepto de seguridad
    description: |
      Definición de conceptos de seguridad funcional y técnica.
  BC-1970.10.30:
    name: Asignación de requisitos de seguridad
    description: |
      Asignación de requisitos de seguridad a subsistemas y componentes.
  BC-1970.10.40:
    name: Elaboración del caso de seguridad
    description: |
      Elaboración de casos de seguridad que respaldan la publicación del producto.
  BC-1970.20:
    name: Determinación del nivel de integridad de seguridad
    description: |
      Establecimiento de objetivos de integridad según IEC 61508, ISO 26262 e ISO 13849.
  BC-1970.20.10:
    name: Establecimiento del objetivo SIL
    description: |
      Determinación de los niveles de integridad de seguridad según IEC 61508.
  BC-1970.20.20:
    name: Descomposición ASIL
    description: |
      Descomposición ASIL para electrónica de seguridad automotriz.
  BC-1970.20.30:
    name: Determinación del nivel de prestaciones
    description: |
      Determinación del nivel de prestaciones según ISO 13849.
  BC-1970.30:
    name: Gestión de la ingeniería de fiabilidad
    description: |
      Definición de requisitos de fiabilidad, predicción, asignación y planificación del crecimiento.
  BC-1970.30.10:
    name: Definición de requisitos de fiabilidad
    description: |
      Definición de requisitos de fiabilidad alineados con los perfiles de misión.
  BC-1970.30.20:
    name: Modelado de predicción de fiabilidad
    description: |
      Modelado de predicción mediante métodos de recuento de piezas y tensión.
  BC-1970.30.30:
    name: Asignación de fiabilidad
    description: |
      Asignación descendente de presupuestos de fiabilidad a subsistemas.
  BC-1970.30.40:
    name: Planificación del crecimiento de fiabilidad
    description: |
      Planificación del crecimiento de fiabilidad y de las acciones correctivas.
  BC-1970.40:
    name: Análisis de tensión y derating de componentes
    description: |
      Análisis de tensión eléctrica, térmica y mecánica, y derating de componentes.
  BC-1970.40.10:
    name: Derating de tensión eléctrica
    description: |
      Aplicación de reglas de derating eléctrico a los componentes.
  BC-1970.40.20:
    name: Derating térmico
    description: |
      Análisis de derating térmico de los componentes en su entorno de operación.
  BC-1970.40.30:
    name: Análisis de tensión mecánica
    description: |
      Análisis de tensión mecánica y fatiga de los componentes.
  BC-1970.50:
    name: Análisis de modos de fallo
    description: |
      FMEA de diseño y proceso, y análisis de criticidad FMECA.
  BC-1970.50.10:
    name: FMEA de diseño
    description: |
      Análisis de modos de fallo y efectos de diseño en los productos.
  BC-1970.50.20:
    name: FMEA de proceso
    description: |
      Análisis de modos de fallo y efectos de proceso en la producción.
  BC-1970.50.30:
    name: Análisis de criticidad FMECA
    description: |
      Análisis de criticidad superpuesto a los resultados de FMEA.
  BC-1970.60:
    name: Gestión de fallos en campo y crecimiento de fiabilidad
    description: |
      Captura y análisis de datos de fallos en campo para el crecimiento de la fiabilidad.
  BC-1970.60.10:
    name: Captura de datos de fallos en campo
    description: |
      Captura de datos de fallos de la base instalada.
  BC-1970.60.20:
    name: Análisis de tendencias de modos de fallo
    description: |
      Análisis de tendencias de los modos de fallo observados.
  BC-1970.60.30:
    name: Seguimiento del crecimiento de fiabilidad
    description: |
      Seguimiento del crecimiento de fiabilidad entre generaciones de producto.
  BC-1970.70:
    name: Coordinación de la certificación de seguridad funcional
    description: |
      Relación con evaluadores de seguridad funcional y organismos de certificación.
  BC-1970.70.10:
    name: Relación con evaluadores de seguridad funcional
    description: |
      Relación con evaluadores independientes de seguridad funcional.
  BC-1970.70.20:
    name: Presentación de certificación de seguridad
    description: |
      Presentación de dossieres de seguridad funcional para certificación.
  BC-1970.70.30:
    name: Vigilancia de seguridad funcional
    description: |
      Auditorías periódicas de vigilancia de los procesos de seguridad funcional.

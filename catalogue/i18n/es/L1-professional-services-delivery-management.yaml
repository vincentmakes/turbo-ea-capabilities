locale: es
source: L1-professional-services-delivery-management.yaml
entries:
  BC-4310:
    name: Gestión de la prestación de servicios profesionales
    description: |
      Ejecución de encargos de asesoramiento, legales, de auditoría y
      consultoría: planificación del trabajo, trabajo de campo, producción
      de entregables, revisión interna e informes del encargo conforme al
      alcance acordado.
  BC-4310.10:
    name: Gestión de la planificación del encargo
    description: |
      Planificación detallada del trabajo del encargo, hitos, estructura
      de entregables y procedimientos adaptados al riesgo, conforme a las
      normas profesionales aplicables.
  BC-4310.10.10:
    name: Definición del plan de trabajo del encargo
    description: |
      Definición de la estructura de desglose del trabajo, hitos y
      dependencias del encargo.
  BC-4310.10.20:
    name: Adaptación de procedimientos al riesgo del encargo
    description: |
      Adaptación de procedimientos de auditoría, análisis de asesoramiento
      o actuaciones legales al riesgo y la materialidad específicos del encargo.
  BC-4310.10.30:
    name: Definición del plan de entregables del encargo
    description: |
      Definición de la estructura, formato y puntos de revisión de los
      entregables del encargo.
  BC-4310.10.40:
    name: Gestión del calendario del encargo
    description: |
      Programación diaria de las actividades del encargo y disponibilidad
      de recursos conforme al plan de trabajo.
  BC-4310.20:
    name: Gestión de la ejecución del encargo
    description: |
      Realización diaria del trabajo del encargo: trabajo de campo, análisis
      de asesoramiento, pruebas de auditoría, redacción e interacción con
      el cliente.
  BC-4310.20.10:
    name: Ejecución de procedimientos de auditoría
    description: |
      Realización de procedimientos de auditoría y aseguramiento, incluyendo
      pruebas sustantivas, pruebas de controles y procedimientos analíticos.
  BC-4310.20.20:
    name: Ejecución de análisis de asesoramiento
    description: |
      Realización de análisis de consultoría, modelizaciones, estudios
      comparativos y elaboración de recomendaciones.
  BC-4310.20.30:
    name: Ejecución de asuntos legales
    description: |
      Trabajo jurídico sustantivo que incluye redacción, dictámenes,
      escritos judiciales, ejecución de operaciones y asesoramiento legal.
  BC-4310.20.40:
    name: Gestión de la interacción con el cliente
    description: |
      Interacción diaria con el cliente durante la ejecución: entrevistas,
      solicitudes de información, llamadas de seguimiento y talleres con
      partes interesadas.
  BC-4310.30:
    name: Gestión de entregables del encargo
    description: |
      Redacción, control de versiones y finalización de los entregables del
      encargo, tales como informes de auditoría, dictámenes, informes de
      asesoramiento y documentación de operaciones.
  BC-4310.30.10:
    name: Redacción de entregables
    description: |
      Elaboración de borradores de entregables utilizando plantillas,
      metodología y conclusiones de la firma.
  BC-4310.30.20:
    name: Control de versiones de entregables
    description: |
      Versionado, bifurcación y registro de auditoría de los borradores de
      entregables a lo largo de los ciclos de revisión.
  BC-4310.30.30:
    name: Finalización de entregables
    description: |
      Maquetación final, bloques de firma y empaquetado para la publicación
      de los entregables completados.
  BC-4310.40:
    name: Gestión de los papeles de trabajo del encargo
    description: |
      Recogida, organización y conservación de los papeles de trabajo y
      evidencias del encargo que respaldan los entregables y conclusiones.
    in_scope:
      - Papeles de trabajo del expediente del encargo
      - Indexación y referenciación cruzada de evidencias
      - Compilación y cierre del expediente
    out_of_scope:
      - Activos de metodología y precedentes reutilizables (BC-4370)
  BC-4310.40.10:
    name: Captura de papeles de trabajo
    description: |
      Incorporación de evidencias, análisis y notas al expediente de
      papeles de trabajo del encargo.
  BC-4310.40.20:
    name: Indexación y referenciación cruzada de papeles de trabajo
    description: |
      Indexación y referenciación cruzada de los papeles de trabajo con
      las afirmaciones de los entregables y los pasos de los procedimientos.
  BC-4310.40.30:
    name: Compilación y cierre del expediente del encargo
    description: |
      Compilación del expediente definitivo del encargo y cierre para
      impedir modificaciones posteriores a la emisión fuera de los
      controles establecidos.
  BC-4310.50:
    name: Gestión de la revisión interna del encargo
    description: |
      Ciclos de revisión internos del encargo a cargo de revisores, gerentes
      y socios antes de la publicación del entregable; distintos del
      seguimiento de calidad a nivel de firma.
    out_of_scope:
      - Seguimiento de calidad a nivel de firma y EQR (BC-4340)
  BC-4310.50.10:
    name: Revisión de papeles de trabajo por el gerente
    description: |
      Revisión por el gerente de los papeles de trabajo y conclusiones
      antes de la aprobación del socio.
  BC-4310.50.20:
    name: Revisión y aprobación por el socio
    description: |
      Revisión y aprobación por el socio del encargo de los entregables
      y dictámenes.
  BC-4310.50.30:
    name: Revisión técnica especializada
    description: |
      Revisión por especialistas técnicos (fiscal, valoración, tecnología,
      actuarial) en las áreas que requieren su intervención.
  BC-4310.60:
    name: Gestión de la contratación de especialistas externos
    description: |
      Contratación de coletrados, peritos, subcontratistas y especialistas
      externos en el marco de un encargo.
  BC-4310.60.10:
    name: Contratación de coletrados y subcontratistas
    description: |
      Selección y contratación de coletrados, letrados locales o
      subcontratistas de consultoría.
  BC-4310.60.20:
    name: Contratación de peritos
    description: |
      Identificación, contratación y gestión de peritos y expertos externos.
  BC-4310.60.30:
    name: Supervisión de la calidad de especialistas externos
    description: |
      Supervisión del trabajo de los especialistas externos y evaluación
      del grado de confianza en sus conclusiones para el encargo.
  BC-4310.70:
    name: Informes y comunicaciones del encargo
    description: |
      Informes de situación, comunicaciones intermedias e informes finales
      al cliente y a la dirección del encargo durante la ejecución.
  BC-4310.70.10:
    name: Informes de situación del encargo
    description: |
      Actualizaciones periódicas de situación a la dirección del encargo y
      al cliente, incluyendo avances, riesgos e incidencias.
  BC-4310.70.20:
    name: Comunicación de hallazgos preliminares
    description: |
      Comunicación intermedia de hallazgos preliminares, observaciones y
      asuntos significativos al cliente durante la ejecución.
  BC-4310.70.30:
    name: Informe final del encargo
    description: |
      Emisión de informes finales, dictámenes y cartas de recomendaciones
      como parte del cierre del encargo.

locale: es
source: L1-plant-maintenance-management.yaml
entries:
  BC-1030:
    name: Gestión de mantenimiento de planta
    description: |
      Mantenimiento preventivo, predictivo y correctivo de plantas y equipos.
  BC-1030.10:
    name: Gestión de estrategia de mantenimiento
    description: |
      Estrategia de mantenimiento por clase de activo y mantenimiento centrado en confiabilidad.
  BC-1030.10.10:
    name: Análisis de mantenimiento centrado en confiabilidad
    description: |
      Análisis RCM para definir estrategias de mantenimiento por clase de activo.
  BC-1030.10.20:
    name: Definición de planes de mantenimiento
    description: |
      Definición de planes, tareas e intervalos de mantenimiento.
  BC-1030.10.30:
    name: Gestión de estándares de mantenimiento
    description: |
      Procedimientos, estándares y mejores prácticas de mantenimiento.
  BC-1030.20:
    name: Gestión de mantenimiento preventivo
    description: |
      Planes de mantenimiento preventivo, programación y ejecución.
  BC-1030.20.10:
    name: Gestión del programa de mantenimiento preventivo
    description: |
      Generación y gestión de programas de mantenimiento preventivo.
  BC-1030.20.20:
    name: Ejecución de mantenimiento preventivo
    description: |
      Ejecución de tareas de mantenimiento preventivo y verificación de su cumplimiento.
  BC-1030.20.30:
    name: Seguimiento del cumplimiento del mantenimiento preventivo
    description: |
      Seguimiento del cumplimiento del mantenimiento preventivo y tareas vencidas.
  BC-1030.30:
    name: Gestión de mantenimiento correctivo
    description: |
      Respuesta a averías y reparaciones.
  BC-1030.30.10:
    name: Respuesta a averías
    description: |
      Primera respuesta ante averías de equipos y eventos no planificados.
  BC-1030.30.20:
    name: Ejecución de reparación de equipos
    description: |
      Ejecución de reparaciones correctivas y verificación.
  BC-1030.30.30:
    name: Análisis y reporte de fallas
    description: |
      Análisis de causa raíz y reporte de fallas tras el trabajo correctivo.
  BC-1030.40:
    name: Gestión de mantenimiento predictivo
    description: |
      Mantenimiento basado en condición y análisis predictivo.
  BC-1030.40.10:
    name: Monitoreo de condición
    description: |
      Monitoreo de condición por vibración, termografía, aceite y acústica.
  BC-1030.40.20:
    name: Modelado de análisis predictivo
    description: |
      Predicción de fallas mediante aprendizaje automático.
  BC-1030.40.30:
    name: Acciones de mantenimiento prescriptivo
    description: |
      Generación de acciones de mantenimiento prescriptivo a partir de predicciones.
  BC-1030.50:
    name: Gestión de órdenes de trabajo de mantenimiento
    description: |
      Ciclo de vida de las órdenes de trabajo de mantenimiento.
  BC-1030.50.10:
    name: Captura de notificaciones de mantenimiento
    description: |
      Captura de notificaciones y solicitudes de mantenimiento.
  BC-1030.50.20:
    name: Planificación de órdenes de trabajo de mantenimiento
    description: |
      Planificación de órdenes de trabajo incluyendo recursos y repuestos.
  BC-1030.50.30:
    name: Ejecución de órdenes de trabajo de mantenimiento
    description: |
      Ejecución y confirmación de órdenes de trabajo de mantenimiento.
  BC-1030.50.40:
    name: Cierre de órdenes de trabajo de mantenimiento
    description: |
      Cierre, liquidación y registros de las órdenes de trabajo de mantenimiento.
  BC-1030.60:
    name: Gestión de inventario de repuestos de mantenimiento
    description: |
      Almacenamiento y uso de repuestos MRO.
  BC-1030.60.10:
    name: Estrategia de stock MRO
    description: |
      Estrategia de stock y niveles de inventario para repuestos MRO.
  BC-1030.60.20:
    name: Adquisición de repuestos MRO
    description: |
      Adquisición de repuestos MRO y consumibles.
  BC-1030.60.30:
    name: Operaciones del almacén MRO
    description: |
      Operaciones del almacén incluyendo emisión y devolución de repuestos MRO.
  BC-1030.60.40:
    name: Gestión de repuestos críticos
    description: |
      Identificación y gestión de repuestos críticos y de seguro.
  BC-1030.70:
    name: Gestión de confiabilidad de equipos
    description: |
      Ingeniería de confiabilidad, análisis de fallas, MTBF y MTTR.
  BC-1030.70.10:
    name: Análisis de ingeniería de confiabilidad
    description: |
      Análisis de confiabilidad (FMEA, FTA, RBD) de activos críticos.
  BC-1030.70.20:
    name: Seguimiento de MTBF y MTTR
    description: |
      Seguimiento del tiempo medio entre fallas y los tiempos de reparación.
  BC-1030.70.30:
    name: Programas de mejora de confiabilidad
    description: |
      Programas para mejorar la confiabilidad de activos con altas tasas de falla.

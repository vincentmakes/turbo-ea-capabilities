locale: es
source: L1-public-finance-budget-management.yaml
entries:
  BC-3280:
    name: Gestión de finanzas públicas y presupuesto
    description: |
      Formulación del presupuesto del sector público, ejecución de las consignaciones, contabilidad
      de fondos públicos, gestión de la deuda pública, operaciones de tesorería e información y
      divulgación fiscal alineadas con las IPSAS.
  BC-3280.10:
    name: Formulación del presupuesto
    description: |
      Elaboración de los presupuestos anuales y plurianuales, incluidos los techos de gasto,
      la presupuestación por programas y la remisión a la autoridad legislativa.
    in_scope:
      - Previsión macrofiscal
      - Presupuestación por programas y presupuestación base cero
      - Remisión del presupuesto al legislativo
    out_of_scope:
      - Planificación financiera y contabilidad de gestión corporativa (cubierto por Planificación y análisis financiero)
  BC-3280.10.10:
    name: Previsión macrofiscal
    description: |
      Previsión de los agregados de ingresos y gastos y de los escenarios macrofiscales.
  BC-3280.10.20:
    name: Establecimiento de techos presupuestarios
    description: |
      Fijación de los techos presupuestarios de organismos y programas dentro del marco fiscal.
  BC-3280.10.30:
    name: Elaboración del presupuesto por programas
    description: |
      Elaboración de los presupuestos por programas y rendimiento por parte de los organismos
      ejecutores.
  BC-3280.10.40:
    name: Remisión del presupuesto al legislativo
    description: |
      Compilación y remisión del proyecto de presupuesto ejecutivo al legislativo.
  BC-3280.20:
    name: Ejecución de consignaciones
    description: |
      Distribución, aprobación, compromiso, obligación y desembolso de los fondos consignados
      conforme a la ley de presupuestos.
  BC-3280.20.10:
    name: Distribución y aprobación de fondos
    description: |
      Aprobación y distribución de las consignaciones a los organismos ejecutores.
  BC-3280.20.20:
    name: Registro de compromisos y obligaciones
    description: |
      Registro de compromisos y obligaciones frente a las consignaciones.
  BC-3280.20.30:
    name: Procesamiento de gastos y desembolsos
    description: |
      Procesamiento de los gastos y desembolsos contra los fondos obligados.
  BC-3280.20.40:
    name: Reprogramación y autorización de transferencias
    description: |
      Administración de las reprogramaciones, transferencias y ajustes de habilitación legal.
  BC-3280.30:
    name: Contabilidad de fondos públicos
    description: |
      Contabilidad de los fondos gubernamentales, incluidos el fondo general, los fondos especiales,
      los fondos fiduciarios y los fondos rotativos, bajo las IPSAS o sus equivalentes nacionales.
  BC-3280.30.10:
    name: Mantenimiento de la estructura de fondos
    description: |
      Mantenimiento de las estructuras de los fondos públicos y el plan de cuentas.
  BC-3280.30.20:
    name: Contabilidad a nivel de fondo
    description: |
      Registro y conciliación de transacciones en los fondos general, especial, fiduciario y
      rotativo.
  BC-3280.30.30:
    name: Liquidación interagencial
    description: |
      Liquidación y conciliación de las transferencias interagenciales y los acuerdos de
      reembolso.
  BC-3280.40:
    name: Gestión de la deuda pública
    description: |
      Emisión, servicio y gestión del riesgo de los instrumentos de deuda soberana y
      subnacional.
  BC-3280.40.10:
    name: Estrategia de deuda y planificación de emisiones
    description: |
      Establecimiento de la estrategia de endeudamiento y los calendarios de emisión entre
      instrumentos y plazos.
  BC-3280.40.20:
    name: Operaciones de emisión de deuda
    description: |
      Subasta, sindicación y emisión directa de instrumentos de deuda pública.
  BC-3280.40.30:
    name: Servicio de la deuda
    description: |
      Pago de cupones, intereses y principal a los tenedores de deuda.
  BC-3280.40.40:
    name: Gestión del riesgo de la cartera de deuda
    description: |
      Gestión del riesgo cambiario, de tipo de interés y de refinanciación de la cartera de
      deuda.
  BC-3280.50:
    name: Operaciones de caja y tesorería
    description: |
      Gestión de la tesorería gubernamental, operaciones de la cuenta única de tesorería y
      procesamiento de pagos y cobros en nombre de los organismos.
  BC-3280.50.10:
    name: Previsión de tesorería
    description: |
      Previsión diaria y continuada de los flujos de caja del gobierno.
  BC-3280.50.20:
    name: Operaciones de la cuenta única de tesorería
    description: |
      Operación de la cuenta única de tesorería y los acuerdos bancarios consolidados.
  BC-3280.50.30:
    name: Operaciones de pagos del gobierno
    description: |
      Desembolso de los pagos del gobierno en nombre de los organismos ejecutores.
  BC-3280.50.40:
    name: Procesamiento de ingresos del gobierno
    description: |
      Procesamiento de los ingresos entrantes del gobierno y abono a los organismos.
  BC-3280.60:
    name: Información y divulgación fiscal
    description: |
      Informes fiscales infraanuales y de fin de ejercicio, estados financieros conforme a las
      IPSAS e informes estadísticos COFOG/GFSM.
  BC-3280.60.10:
    name: Informes fiscales infraanuales
    description: |
      Producción de informes fiscales mensuales y trimestrales frente al presupuesto.
  BC-3280.60.20:
    name: Elaboración de estados financieros IPSAS
    description: |
      Elaboración de los estados financieros de todo el gobierno y de las entidades conforme
      a las IPSAS.
  BC-3280.60.30:
    name: Informes estadísticos GFSM y COFOG
    description: |
      Compilación de estadísticas fiscales conforme a las clasificaciones GFSM del FMI y COFOG.
  BC-3280.60.40:
    name: Divulgación de gasto abierto
    description: |
      Publicación en datos abiertos de los gastos, las transacciones y la ejecución presupuestaria.

locale: es
source: L1-petroleum-process-safety-management.yaml
entries:
  BC-3050:
    name: Gestión de seguridad de proceso en petróleo
    description: |
      Prevención de accidentes mayores en instalaciones que manejan
      hidrocarburos: análisis de peligros de proceso, integridad mecánica
      de sistemas a presión, aseguramiento de elementos críticos de
      seguridad, procedimientos operativos, reportes de desempeño y
      respuesta a emergencias. Distinta de la gestión HSE de aplicación
      transversal (BC-730), que abarca salud ocupacional, medio ambiente
      y seguridad personal.
  BC-3050.10:
    name: Análisis de peligros de proceso
    description: |
      Identificación y análisis estructurados de los peligros de accidente
      mayor a lo largo del ciclo de vida del activo.
    in_scope:
      - Estudios HAZID, HAZOP, LOPA y análisis de árbol de sucesos
      - Evaluación cuantitativa del riesgo
    out_of_scope:
      - Evaluación de riesgos de seguridad personal (BC-730)
  BC-3050.10.10:
    name: Estudios HAZOP
    description: |
      Estudios de Peligros y Operabilidad en instalaciones nuevas
      y modificadas.
  BC-3050.10.20:
    name: Estudios HAZID
    description: |
      Estudios de Identificación de Peligros durante las fases tempranas
      de concepto y diseño.
  BC-3050.10.30:
    name: Estudios LOPA
    description: |
      Análisis de Capas de Protección para definir los niveles de
      integridad de seguridad.
  BC-3050.10.40:
    name: Análisis de árbol de sucesos
    description: |
      Análisis de árbol de sucesos para mapear las barreras frente a
      los escenarios de accidente mayor.
  BC-3050.20:
    name: Gestión de integridad mecánica
    description: |
      Inspección y gestión de la integridad de los equipos que contienen
      presión y de los dispositivos de alivio de seguridad.
  BC-3050.20.10:
    name: Inspección de recipientes a presión
    description: |
      Inspección basada en riesgo de recipientes a presión conforme
      a API 510.
  BC-3050.20.20:
    name: Inspección de integridad de tuberías y ductos
    description: |
      Inspección de tuberías de proceso y ductos conforme a API 570
      y ASME B31G.
  BC-3050.20.30:
    name: Inspección de tanques de almacenamiento
    description: |
      Inspección de tanques de almacenamiento atmosféricos y presurizados
      conforme a API 653.
  BC-3050.20.40:
    name: Gestión de dispositivos de alivio de presión
    description: |
      Dimensionamiento, prueba y gestión del ciclo de vida de válvulas de
      alivio y discos de ruptura.
  BC-3050.30:
    name: Gestión de elementos críticos de seguridad
    description: |
      Identificación y aseguramiento del desempeño de los elementos
      críticos de seguridad y mantenimiento del caso de seguridad.
  BC-3050.30.10:
    name: Identificación de elementos críticos de seguridad
    description: |
      Identificación de los elementos críticos de seguridad (SCE) a partir
      del análisis de peligros de accidente mayor.
  BC-3050.30.20:
    name: Definición de estándares de desempeño
    description: |
      Definición de los estándares de desempeño para cada SCE.
  BC-3050.30.30:
    name: Verificación del desempeño de elementos críticos de seguridad
    description: |
      Verificación del desempeño de los SCE frente a los estándares
      definidos.
  BC-3050.30.40:
    name: Mantenimiento del caso de seguridad
    description: |
      Mantenimiento de los casos de seguridad de las instalaciones y
      presentación ante los reguladores.
  BC-3050.40:
    name: Procedimientos operativos de seguridad de proceso
    description: |
      Elaboración, revisión y definición del sobre operativo para
      procedimientos críticos de seguridad de proceso.
  BC-3050.40.10:
    name: Elaboración de procedimientos operativos
    description: |
      Elaboración de procedimientos operativos críticos de seguridad
      de proceso.
  BC-3050.40.20:
    name: Revisión y actualización de procedimientos
    description: |
      Revisión y actualización periódica de los procedimientos de
      seguridad de proceso.
  BC-3050.40.30:
    name: Definición del sobre operativo
    description: |
      Definición de los sobres operativos seguros para las unidades
      de proceso.
  BC-3050.50:
    name: Gestión del cambio en seguridad de proceso
    description: |
      Gobernanza de seguridad de proceso sobre cambios en la planta,
      procedimientos y personal, incluidas las revisiones de seguridad
      antes de la puesta en marcha.
  BC-3050.50.10:
    name: Revisión de solicitudes de cambio PSM
    description: |
      Revisión de solicitudes de cambio con impacto en PSM frente a
      los estándares de peligros.
  BC-3050.50.20:
    name: Revisión de seguridad antes de la puesta en marcha
    description: |
      Revisiones de seguridad antes de la puesta en marcha para
      instalaciones nuevas y modificadas.
  BC-3050.50.30:
    name: Gestión de cambios temporales
    description: |
      Gestión de los cambios de proceso temporales dentro de su
      ventana autorizada.
  BC-3050.60:
    name: Gestión del desempeño en seguridad de proceso
    description: |
      Seguimiento y reporte de indicadores líderes y rezagados de
      seguridad de proceso conforme a API RP 754 y marcos equivalentes.
  BC-3050.60.10:
    name: Reporte de eventos de seguridad de proceso de nivel 1 y 2
    description: |
      Captura y reporte de eventos de seguridad de proceso de nivel 1
      y nivel 2.
  BC-3050.60.20:
    name: Monitoreo de indicadores líderes
    description: |
      Monitoreo de los indicadores líderes de seguridad de proceso
      de nivel 3 y nivel 4.
  BC-3050.60.30:
    name: Reporte de KPI de seguridad de proceso
    description: |
      Reporte externo e interno del desempeño de los KPI de seguridad
      de proceso.
  BC-3050.70:
    name: Preparación y respuesta a emergencias
    description: |
      Planificación de la respuesta a emergencias, ejecución de simulacros
      y coordinación de la respuesta a derrames para escenarios de
      accidente mayor.
  BC-3050.70.10:
    name: Planificación de la respuesta a emergencias
    description: |
      Mantenimiento de los planes de respuesta a emergencias de las
      instalaciones y corporativos.
  BC-3050.70.20:
    name: Coordinación de simulacros y ejercicios
    description: |
      Coordinación de simulacros de emergencia y ejercicios de incidentes
      mayores.
  BC-3050.70.30:
    name: Coordinación de la respuesta a derrames
    description: |
      Coordinación de las operaciones de respuesta a derrames de
      petróleo y productos químicos.
  BC-3050.70.40:
    name: Coordinación de ayuda mutua
    description: |
      Coordinación de la ayuda mutua con cooperativas de respuesta
      de la industria.

locale: es
source: L1-insurance-claims-management.yaml
entries:
  BC-2160:
    name: Gestión de siniestros de seguros
    description: |
      Primer aviso de siniestro, triaje, investigación, provisiones, liquidación, recobros
      y subrogación, litigios, fraude y unidad de investigación especial (SIU),
      y respuesta ante catástrofes en todos los ramos de seguros.
  BC-2160.10:
    name: Gestión del primer aviso de siniestro
    description: |
      Recepción multicanal del FNOL, verificación de cobertura, registro y acuse de recibo.
  BC-2160.10.10:
    name: Recepción multicanal del FNOL
    description: |
      Recepción del primer aviso de siniestro por teléfono, canales digitales, corredor e IoT.
  BC-2160.10.20:
    name: Verificación inicial de cobertura
    description: |
      Verificación de que el siniestro se encuentra dentro de la cobertura en la fecha del evento.
  BC-2160.10.30:
    name: Registro del siniestro
    description: |
      Registro de nuevos siniestros y asignación de identificadores de siniestro.
  BC-2160.10.40:
    name: Acuse de recibo y comunicación
    description: |
      Acuse de recibo inicial al reclamante y comunicación continua sobre el estado del siniestro.
  BC-2160.20:
    name: Triaje y segmentación de siniestros
    description: |
      Puntuación de gravedad, enrutamiento automático, asignación de ajustador y enrutamiento a especialistas.
  BC-2160.20.10:
    name: Puntuación de gravedad y complejidad
    description: |
      Puntuación de la gravedad y complejidad del siniestro para las decisiones de enrutamiento.
  BC-2160.20.20:
    name: Enrutamiento de procesamiento automatizado
    description: |
      Enrutamiento de siniestros de baja gravedad a través de procesamiento automatizado.
  BC-2160.20.30:
    name: Asignación de ajustador
    description: |
      Asignación de siniestros a ajustadores en función de habilidades, capacidad y ubicación geográfica.
  BC-2160.20.40:
    name: Enrutamiento a especialistas y litigios
    description: |
      Enrutamiento de siniestros complejos, especiales y litigados a equipos dedicados.
  BC-2160.30:
    name: Investigación y liquidación de siniestros
    description: |
      Liquidación de campo y escritorio, valoración de daños, determinación de responsabilidad
      y consulta con expertos.
  BC-2160.30.10:
    name: Liquidación de campo y escritorio
    description: |
      Liquidación de campo y escritorio de siniestros, incluidas las inspecciones in situ.
  BC-2160.30.20:
    name: Evaluación de daños y pérdidas
    description: |
      Evaluación del daño, cuantía de la pérdida y alcance de la reparación o sustitución.
  BC-2160.30.30:
    name: Determinación de responsabilidad
    description: |
      Determinación de la responsabilidad y la respuesta de la póliza en reclamaciones a terceros.
  BC-2160.30.40:
    name: Consulta con expertos especializados
    description: |
      Consulta con peritos, ingenieros, expertos médicos y contadores forenses.
  BC-2160.40:
    name: Gestión de provisiones de siniestros
    description: |
      Dotación inicial de provisiones por caso, reestimación e coordinación del IBNR.
  BC-2160.40.10:
    name: Dotación inicial de provisiones por caso
    description: |
      Dotación de provisiones iniciales por caso para los siniestros registrados.
  BC-2160.40.20:
    name: Reestimación de provisiones
    description: |
      Reestimación periódica de las provisiones por caso a medida que surge nueva información.
  BC-2160.40.30:
    name: Coordinación del IBNR con el área actuarial
    description: |
      Coordinación con el área actuarial sobre las provisiones IBNR para las provisiones a nivel de cartera.
  BC-2160.50:
    name: Liquidación y pago de siniestros
    description: |
      Negociación de la liquidación, pagos de indemnización y gastos, salvamento y recobros por subrogación.
  BC-2160.50.10:
    name: Negociación de la liquidación
    description: |
      Negociación de los importes de liquidación con reclamantes y terceros.
  BC-2160.50.20:
    name: Emisión de pagos de indemnización
    description: |
      Emisión de pagos de indemnización a asegurados y terceros.
  BC-2160.50.30:
    name: Emisión de pagos de gastos
    description: |
      Emisión de pagos de gastos de liquidación de siniestros ALAE y ULAE.
  BC-2160.50.40:
    name: Disposición del salvamento
    description: |
      Disposición y recuperación del salvamento sobre siniestros liquidados.
  BC-2160.50.50:
    name: Recobro y subrogación
    description: |
      Recobro y subrogación frente a terceros y otras aseguradoras.
  BC-2160.60:
    name: Gestión de litigios de siniestros
    description: |
      Estrategia de litigios, coordinación con abogados defensores y seguimiento de costos de litigios.
  BC-2160.60.10:
    name: Estrategia de litigios
    description: |
      Definición de estrategia en siniestros litigados y decisiones de liquidación frente a juicio.
  BC-2160.60.20:
    name: Coordinación con abogados defensores
    description: |
      Coordinación con abogados defensores del panel y designados.
  BC-2160.60.30:
    name: Seguimiento de costos de litigios
    description: |
      Seguimiento de los costos de litigios frente a las tarifas del panel y presupuestos.
  BC-2160.70:
    name: Gestión del fraude en siniestros y SIU
    description: |
      Detección de siniestros sospechosos, investigación de la SIU, derivación por fraude
      y analítica antifraude.
  BC-2160.70.10:
    name: Detección de siniestros sospechosos
    description: |
      Detección de siniestros sospechosos mediante reglas, modelos e indicadores de alerta.
  BC-2160.70.20:
    name: Investigación de la SIU
    description: |
      Trabajo de casos de la unidad de investigación especial sobre siniestros presuntamente fraudulentos.
  BC-2160.70.30:
    name: Derivación por fraude y enjuiciamiento
    description: |
      Derivación de casos de fraude a las fuerzas de seguridad y registros del sector.
  BC-2160.70.40:
    name: Analítica antifraude
    description: |
      Analítica antifraude en carteras de siniestros y análisis de redes.
  BC-2160.80:
    name: Gestión de siniestros catastróficos
    description: |
      Activación del evento CAT, capacidad de respuesta adicional, seguimiento de siniestros CAT
      y coordinación de recobros CAT.
  BC-2160.80.10:
    name: Activación del evento CAT
    description: |
      Activación de los procedimientos de respuesta ante catástrofes en eventos declarados.
  BC-2160.80.20:
    name: Movilización de capacidad adicional
    description: |
      Movilización de ajustadores adicionales, contratistas y capacidad del centro de llamadas.
  BC-2160.80.30:
    name: Triaje y seguimiento de siniestros CAT
    description: |
      Triaje y seguimiento de los siniestros codificados como CAT hasta su liquidación.
  BC-2160.80.40:
    name: Coordinación de recobros CAT
    description: |
      Coordinación de recobros de reaseguro y fondos de compensación en eventos CAT.

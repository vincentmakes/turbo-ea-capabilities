locale: es
source: L1-procurement-management.yaml
entries:
  BC-500:
    name: Gestión de adquisiciones
    description: |
      Abarca el aprovisionamiento estratégico, la contratación, las compras y las operaciones de adquisición a pago para asegurar el suministro de bienes y servicios al menor coste total.
  BC-500.10:
    name: Gestión del aprovisionamiento
    description: |
      Aprovisionamiento estratégico, eventos RFx y selección de proveedores para satisfacer las necesidades de cada categoría.
  BC-500.10.10:
    name: Definición de la estrategia de aprovisionamiento
    description: |
      Definición de la estrategia de aprovisionamiento por categoría y mercado de suministro.
  BC-500.10.20:
    name: Ejecución de RFx
    description: |
      Preparación, emisión y evaluación de eventos RFI, RFQ y RFP.
  BC-500.10.30:
    name: Negociación con proveedores
    description: |
      Negociación comercial y contractual con los proveedores preseleccionados.
  BC-500.10.40:
    name: Selección y adjudicación de proveedores
    description: |
      Selección definitiva del proveedor, decisión de adjudicación y notificación.
  BC-500.10.50:
    name: Operaciones de subasta inversa
    description: |
      Configuración, conducción y adjudicación de subastas electrónicas para lotes competitivos.
  BC-500.20:
    name: Gestión de contratos de adquisiciones
    description: |
      Contratos de adquisición, condiciones y ciclo de vida contractual para garantizar el cumplimiento de los acuerdos.
  BC-500.20.10:
    name: Redacción de contratos y plantillas
    description: |
      Plantillas de contratos de adquisición, cláusulas y manuales de negociación.
  BC-500.20.20:
    name: Aprobación y formalización de contratos
    description: |
      Flujo de aprobación, firma y formalización de contratos de adquisición.
  BC-500.20.30:
    name: Seguimiento del cumplimiento contractual
    description: |
      Supervisión de las compras realizadas con proveedores y precios contratados.
  BC-500.20.40:
    name: Renovación y renegociación de contratos
    description: |
      Gestión del ciclo de renovación y renegociación de contratos de adquisición.
  BC-500.30:
    name: Gestión de órdenes de compra
    description: |
      Creación, aprobación y ejecución de órdenes de compra para satisfacer las necesidades de suministro.
  BC-500.30.10:
    name: Creación de órdenes de compra
    description: |
      Generación de órdenes de compra a partir de solicitudes, contratos o catálogos.
  BC-500.30.20:
    name: Aprobación de órdenes de compra
    description: |
      Flujos de aprobación basados en umbrales para órdenes de compra.
  BC-500.30.30:
    name: Confirmación y modificación de órdenes de compra
    description: |
      Confirmación del proveedor y gestión de órdenes de cambio.
  BC-500.30.40:
    name: Cierre de órdenes de compra
    description: |
      Finalización de recepciones, conciliación de facturas y cierre de la orden de compra.
  BC-500.40:
    name: Gestión de operaciones de adquisición a pago
    description: |
      Operaciones diarias del ciclo de adquisición a pago, incluyendo solicitudes, recepciones y soporte.
  BC-500.40.10:
    name: Gestión de solicitudes de compra
    description: |
      Captura, aprobación y conversión de solicitudes de compra.
  BC-500.40.20:
    name: Gestión de catálogos y punch-out
    description: |
      Catálogos internos y conexiones punch-out con proveedores para la compra en autoservicio.
  BC-500.40.30:
    name: Recepción de mercancías y aceptación de servicios
    description: |
      Registro de entradas de mercancías y hojas de entrada de servicios.
  BC-500.40.40:
    name: Conciliación y cotejo de facturas
    description: |
      Cotejo a dos y tres vías de facturas con órdenes de compra y recepciones.
  BC-500.40.50:
    name: Mesa de ayuda P2P y soporte al comprador
    description: |
      Soporte a compradores y proveedores para las transacciones del ciclo de adquisición a pago.
  BC-500.50:
    name: Gestión de categorías de adquisición
    description: |
      Estrategia por categoría y análisis del gasto para maximizar el valor obtenido en cada segmento de compra.
  BC-500.50.10:
    name: Desarrollo de la estrategia de categoría
    description: |
      Estrategia plurianual de categoría y evaluación del mercado de suministro.
  BC-500.50.20:
    name: Gestión del rendimiento de la categoría
    description: |
      Seguimiento de KPI, ahorros y generación de valor por categoría.
  BC-500.50.30:
    name: Agregación de la demanda y estandarización
    description: |
      Consolidación de la demanda y estandarización de especificaciones entre unidades de negocio.
  BC-500.50.40:
    name: Aprovisionamiento de innovación por categoría
    description: |
      Identificación de innovación a través de los mercados de proveedores.
  BC-500.60:
    name: Gestión del análisis del gasto en adquisiciones
    description: |
      Visibilidad del gasto, informes y seguimiento de ahorros para apoyar la toma de decisiones de compra.
  BC-500.60.10:
    name: Agregación y depuración de datos de gasto
    description: |
      Agregación, depuración y clasificación de los datos de gasto corporativo.
  BC-500.60.20:
    name: Informes y analítica del gasto
    description: |
      Analítica del gasto, paneles de control e identificación del gasto potencialmente optimizable.
  BC-500.60.30:
    name: Seguimiento y validación de ahorros
    description: |
      Captura, validación e informe de los ahorros obtenidos en adquisiciones.
  BC-500.60.40:
    name: Gestión del gasto disperso
    description: |
      Identificación y racionalización del gasto disperso de bajo valor.

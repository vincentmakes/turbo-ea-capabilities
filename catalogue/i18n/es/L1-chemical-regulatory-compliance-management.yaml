locale: es
source: L1-chemical-regulatory-compliance-management.yaml
entries:
  BC-4660:
    name: Gestión de cumplimiento normativo en química
    description: |
      Registro de sustancias, expedientes, autorizaciones, restricciones, listados en inventarios y controles de importación y exportación en virtud de REACH, TSCA, K-REACH, CWC y regímenes equivalentes. Distinta de la Gestión de Cumplimiento transversal (BC-130), que abarca el cumplimiento de políticas empresariales.
  BC-4660.10:
    name: Gestión del registro de sustancias
    description: |
      Registro de sustancias en los principales regímenes globales de inventario químico.
  BC-4660.10.10:
    name: Gestión del registro REACH
    description: |
      Gestión de los registros REACH, incluyendo SIEF y la presentación conjunta.
  BC-4660.10.20:
    name: Notificación PMN y de inventario TSCA
    description: |
      Notificación previa a la fabricación y notificación al inventario TSCA.
  BC-4660.10.30:
    name: Notificación K-REACH y Asia-Pacífico
    description: |
      Notificación en virtud de K-REACH, China, Japón y otros regímenes de Asia-Pacífico.
  BC-4660.10.40:
    name: Gestión de la notificación de polímeros
    description: |
      Gestión de notificaciones y exenciones para sustancias poliméricas.
  BC-4660.20:
    name: Gestión de autorizaciones y restricciones
    description: |
      Cumplimiento de controles de autorización, restricción y sustancias emergentes.
  BC-4660.20.10:
    name: Solicitud de autorización REACH
    description: |
      Preparación y presentación de solicitudes de autorización del Anexo XIV de REACH.
  BC-4660.20.20:
    name: Cumplimiento de restricciones REACH
    description: |
      Cumplimiento de las entradas de restricción del Anexo XVII de REACH.
  BC-4660.20.30:
    name: Seguimiento de la lista de candidatos SVHC
    description: |
      Seguimiento de las actualizaciones de la lista de candidatos SVHC y análisis de impacto.
  BC-4660.20.40:
    name: Gestión de restricciones PFAS y emergentes
    description: |
      Gestión de restricciones de PFAS, microplásticos y otras restricciones emergentes.
  BC-4660.30:
    name: Gestión de expedientes reglamentarios
    description: |
      Elaboración y mantenimiento de expedientes reglamentarios en IUCLID y formatos equivalentes.
  BC-4660.30.10:
    name: Gestión de expedientes IUCLID
    description: |
      Elaboración y mantenimiento de expedientes IUCLID 6.
  BC-4660.30.20:
    name: Preparación del informe de seguridad química
    description: |
      Preparación de informes de seguridad química según el Anexo I de REACH.
  BC-4660.30.30:
    name: Mantenimiento del perfil de identidad de la sustancia
    description: |
      Mantenimiento de perfiles de identidad de sustancias y evidencias analíticas.
  BC-4660.40:
    name: Gestión de listados en inventarios
    description: |
      Gestión de la presencia de sustancias en los inventarios EINECS, CE y nacionales.
  BC-4660.40.10:
    name: Gestión de números EINECS y CE
    description: |
      Gestión de las asignaciones y actualizaciones de números EINECS y CE.
  BC-4660.40.20:
    name: Notificación de nuevas sustancias al inventario
    description: |
      Notificación de nuevas sustancias a los inventarios nacionales.
  BC-4660.40.30:
    name: Conciliación con inventarios nacionales
    description: |
      Conciliación de la cartera frente a los inventarios químicos nacionales.
  BC-4660.50:
    name: Control de importación y exportación de productos químicos
    description: |
      Cumplimiento de los controles internacionales del comercio de productos químicos, incluyendo CWC, precursores de drogas, doble uso y PIC.
  BC-4660.50.10:
    name: Cumplimiento de las listas del CWC
    description: |
      Cumplimiento de la declaración y las licencias de las Listas 1, 2 y 3 de la OPAQ.
  BC-4660.50.20:
    name: Control de precursores de drogas
    description: |
      Cumplimiento de los regímenes de control de precursores de drogas de la JIFE y nacionales.
  BC-4660.50.30:
    name: Licencias de exportación de doble uso
    description: |
      Licencias y cumplimiento del uso final para exportaciones químicas de doble uso.
  BC-4660.50.40:
    name: Cumplimiento del consentimiento fundamentado previo
    description: |
      Cumplimiento del régimen de consentimiento fundamentado previo del Convenio de Rotterdam.
  BC-4660.60:
    name: Vigilancia e inteligencia normativa
    description: |
      Seguimiento y evaluación del impacto de la evolución de la normativa química en los mercados.
  BC-4660.60.10:
    name: Exploración del horizonte normativo
    description: |
      Exploración del horizonte de normativas químicas pendientes y emergentes.
  BC-4660.60.20:
    name: Evaluación del impacto de los cambios normativos
    description: |
      Evaluación del impacto de los cambios normativos en la cartera y las operaciones.
  BC-4660.60.30:
    name: Enlace con asociaciones del sector
    description: |
      Enlace con Cefic, ACC y asociaciones del sector equivalentes.
  BC-4660.70:
    name: Relación con las autoridades y presentación de documentación
    description: |
      Relación con las autoridades reguladoras, incluyendo presentaciones, consultas e inspecciones.
  BC-4660.70.10:
    name: Preparación de presentaciones a las autoridades
    description: |
      Preparación de presentaciones a la ECHA, la EPA y autoridades equivalentes.
  BC-4660.70.20:
    name: Respuesta a consultas de las autoridades
    description: |
      Respuesta a consultas de las autoridades sobre expedientes y registros.
  BC-4660.70.30:
    name: Preparación para inspecciones
    description: |
      Mantenimiento de la preparación para inspecciones y auditorías de los reguladores.

locale: es
source: L1-chemical-commercial-trading-management.yaml
entries:
  BC-4690:
    name: Gestión de comercialización química
    description: |
      Comercialización de productos químicos a granel y de especialidad, gestión del equilibrio oferta-demanda, aprovisionamiento de materias primas, cobertura, contratos de suministro a largo plazo y referenciación de índices de precios. Distinta de Ventas (BC-410) y Precios (BC-440) transversales, que abarcan las disciplinas de ventas y precios empresariales.
  BC-4690.10:
    name: Comercio de productos químicos a granel
    description: |
      Comercialización al contado y a plazo de productos químicos básicos a granel en mercados físicos.
  BC-4690.10.10:
    name: Comercialización de cargamentos al contado
    description: |
      Comercialización de cargamentos al contado a precios de mercado vigentes.
  BC-4690.10.20:
    name: Comercialización de contratos a plazo
    description: |
      Negociación y ejecución de operaciones de contratos a plazo.
  BC-4690.10.30:
    name: Venta de cargamentos en dificultades
    description: |
      Venta de cargamentos en dificultades y excedentes a través de canales comerciales.
  BC-4690.20:
    name: Gestión comercial de productos químicos de especialidad
    description: |
      Gestión de cuentas, distribución y venta de soluciones de productos químicos de especialidad diferenciados.
  BC-4690.20.10:
    name: Gestión de cuentas de especialidad
    description: |
      Gestión de cuentas estratégicas de productos químicos de especialidad.
  BC-4690.20.20:
    name: Gestión del canal de distribución
    description: |
      Gestión de canales de distribución indirectos.
  BC-4690.20.30:
    name: Venta de arrastre por aplicación
    description: |
      Venta de arrastre en cuentas de formuladores y transformadores aguas abajo.
  BC-4690.20.40:
    name: Coordinación de venta de soluciones
    description: |
      Coordinación de la venta de soluciones multiproducto para aplicaciones complejas.
  BC-4690.30:
    name: Aprovisionamiento de materias primas y petroquímicos
    description: |
      Aprovisionamiento de materias primas de hidrocarburos, aromáticos, bio e inorgánicos para las operaciones químicas.
  BC-4690.30.10:
    name: Aprovisionamiento de nafta y olefinas
    description: |
      Aprovisionamiento de nafta, etano y olefinas para crackers.
  BC-4690.30.20:
    name: Aprovisionamiento de materias primas aromáticas
    description: |
      Aprovisionamiento de materias primas de benceno, tolueno y xileno.
  BC-4690.30.30:
    name: Aprovisionamiento de bio-materias primas
    description: |
      Aprovisionamiento de materias primas de base biológica en esquemas de balance de masa.
  BC-4690.30.40:
    name: Aprovisionamiento de materias primas inorgánicas
    description: |
      Aprovisionamiento de sales inorgánicas, minerales y menas para el procesamiento químico.
  BC-4690.40:
    name: Cobertura y gestión del riesgo químico
    description: |
      Cobertura de la exposición al precio de materias primas, divisa y margen en el libro de químicos.
  BC-4690.40.10:
    name: Cobertura del precio de materias primas
    description: |
      Cobertura de la exposición al precio de materias primas en mercados de materias primas.
  BC-4690.40.20:
    name: Cobertura de la exposición en divisas
    description: |
      Cobertura de la exposición en divisas en contratos de productos químicos.
  BC-4690.40.30:
    name: Estrategia de cobertura de márgenes
    description: |
      Definición y ejecución de estrategias de cobertura de márgenes de cracker y de productos químicos.
  BC-4690.50:
    name: Gestión del equilibrio oferta-demanda
    description: |
      Compilación y conciliación de la oferta, la demanda y el balance en el catálogo de productos químicos.
  BC-4690.50.10:
    name: Compilación de la perspectiva de demanda
    description: |
      Compilación de perspectivas de demanda a corto y medio plazo.
  BC-4690.50.20:
    name: Compilación de la capacidad de suministro
    description: |
      Compilación de la capacidad de suministro en activos propios y de maquila.
  BC-4690.50.30:
    name: Conciliación del balance
    description: |
      Conciliación de los balances de oferta y demanda e identificación de restricciones.
  BC-4690.60:
    name: Gestión de contratos de suministro a largo plazo
    description: |
      Negociación, redacción y gestión del desempeño de contratos de suministro y take-or-pay a largo plazo.
  BC-4690.60.10:
    name: Negociación de términos de contrato de suministro
    description: |
      Negociación de términos de contrato de suministro a largo plazo.
  BC-4690.60.20:
    name: Redacción de contratos a largo plazo
    description: |
      Redacción de contratos definitivos de suministro y take-or-pay a largo plazo.
  BC-4690.60.30:
    name: Seguimiento del desempeño del suministro
    description: |
      Seguimiento del desempeño del suministro frente a las obligaciones contractuales.
  BC-4690.70:
    name: Gestión de índices y referencias de precios
    description: |
      Gestión de suscripciones a índices de precios y referencias utilizados en la fijación de precios de productos químicos.
  BC-4690.70.10:
    name: Gestión de suscripciones a índices de precios
    description: |
      Gestión de suscripciones a ICIS, Argus, Platts e índices similares.
  BC-4690.70.20:
    name: Mantenimiento de curvas de precios de referencia
    description: |
      Mantenimiento de curvas de precios de referencia internas para productos químicos.
  BC-4690.70.30:
    name: Cálculo de precios vinculados a índices
    description: |
      Cálculo de precios de clientes vinculados a índices y liquidaciones de contratos.

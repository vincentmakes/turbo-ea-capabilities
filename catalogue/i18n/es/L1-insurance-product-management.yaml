locale: es
source: L1-insurance-product-management.yaml
entries:
  BC-2100:
    name: Gestión de productos de seguro
    description: |
      Fábrica de productos de seguro: definiciones de cobertura, condiciones, tablas de tarifas,
      paquetes y ciclo de vida para ramos de vida, daños, salud y especialidades,
      incluidas las estructuras de productos de programa y tomador delegado en mercados
      de autoridad delegada.
  BC-2100.10:
    name: Gestión del catálogo de productos de seguro
    description: |
      Catálogo de productos de seguro, datos maestros, biblioteca de coberturas y formularios,
      documentación de divulgación y publicación del catálogo.
  BC-2100.10.10:
    name: Gestión de datos maestros de productos
    description: |
      Mantenimiento de los datos maestros de productos de seguro y las jerarquías de productos.
  BC-2100.10.20:
    name: Biblioteca de coberturas y formularios
    description: |
      Mantenimiento de definiciones de cobertura estandarizadas, formularios de póliza y biblioteca de endosos.
  BC-2100.10.30:
    name: Documentación de divulgación de productos
    description: |
      Producción y mantenimiento de documentos de divulgación de productos y declaraciones de datos clave.
  BC-2100.10.40:
    name: Publicación del catálogo de productos
    description: |
      Publicación del catálogo de productos de seguro a través de canales y socios.
  BC-2100.20:
    name: Configuración de tarifación y precios de productos
    description: |
      Configuración de algoritmos de tarifación, factores, tarifas presentadas, descuentos y recargos.
  BC-2100.20.10:
    name: Configuración de algoritmos de tarifación
    description: |
      Configuración de algoritmos de tarifación y modelos de precios para productos de seguro.
  BC-2100.20.20:
    name: Mantenimiento de factores y variables de tarifación
    description: |
      Mantenimiento de factores de tarifación, tablas y variables de calificación.
  BC-2100.20.30:
    name: Gestión de tarifas presentadas
    description: |
      Gestión de tarifas presentadas, desviaciones y aprobaciones por jurisdicción.
  BC-2100.20.40:
    name: Configuración de descuentos y recargos
    description: |
      Configuración de descuentos sobre primas, recargos y programas de crédito.
  BC-2100.30:
    name: Configuración de reglas de elegibilidad y suscripción de productos
    description: |
      Configuración de elegibilidad, guías de suscripción, y reglas de derivación y rechazo integradas en el producto.
  BC-2100.30.10:
    name: Configuración de reglas de elegibilidad
    description: |
      Configuración de reglas de elegibilidad de cliente y riesgo por producto.
  BC-2100.30.20:
    name: Codificación de guías de suscripción
    description: |
      Codificación de guías de suscripción en la configuración del producto.
  BC-2100.30.30:
    name: Configuración de reglas de derivación y rechazo
    description: |
      Configuración de reglas automáticas de derivación y rechazo por producto.
  BC-2100.40:
    name: Gestión del ciclo de vida del producto de seguro
    description: |
      Introducción de nuevos productos, presentación regulatoria, preparación para el lanzamiento,
      revisión de rendimiento y retirada.
  BC-2100.40.10:
    name: Concepto de nuevo producto
    description: |
      Definición del concepto para nuevos productos de seguro y gobernanza del comité de productos.
  BC-2100.40.20:
    name: Presentación y aprobación de productos
    description: |
      Presentación regulatoria de productos de seguro y seguimiento de aprobaciones por jurisdicción.
  BC-2100.40.30:
    name: Preparación para el lanzamiento de productos
    description: |
      Preparación operativa y de canal para el lanzamiento de productos de seguro.
  BC-2100.40.40:
    name: Revisión del rendimiento del producto
    description: |
      Revisiones periódicas del rendimiento y la relación calidad-precio de los productos de seguro.
  BC-2100.40.50:
    name: Retirada y sustitución de productos
    description: |
      Retirada, sustitución y migración de tomadores a productos sucesores.
  BC-2100.50:
    name: Gestión de paquetes de productos de seguro
    description: |
      Paquetes multiramo, productos combinados y seguimiento del rendimiento de los paquetes.
  BC-2100.50.10:
    name: Definición de paquetes multiramo
    description: |
      Definición de paquetes de productos multiramo y reglas de empaquetado.
  BC-2100.50.20:
    name: Configuración de reglas de elegibilidad de paquetes
    description: |
      Reglas de elegibilidad y requisitos para los paquetes de productos de seguro.
  BC-2100.50.30:
    name: Seguimiento del rendimiento de paquetes
    description: |
      Seguimiento de la adopción, retención y economía de los paquetes.
  BC-2100.60:
    name: Gestión de productos especiales y de programa
    description: |
      Definición de negocio de programa, autoridad de producto del tomador delegado y biblioteca
      de condicionados especiales.
  BC-2100.60.10:
    name: Definición de programa
    description: |
      Definición de negocio de programa y estructuras de producto de autoridad de suscripción delegada.
  BC-2100.60.20:
    name: Autoridad de producto del tomador delegado
    description: |
      Definición del alcance del producto y la autoridad concedida a los tomadores delegados.
  BC-2100.60.30:
    name: Biblioteca de condicionados especiales y endosos
    description: |
      Biblioteca de condicionados especiales, endosos a medida y cláusulas de mercado.

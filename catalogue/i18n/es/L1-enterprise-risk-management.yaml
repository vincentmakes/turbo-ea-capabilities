locale: es
source: L1-enterprise-risk-management.yaml
entries:
  BC-120:
    name: Gestión del riesgo empresarial
    description: |
      Identificación, evaluación, mitigación y supervisión de los riesgos a nivel de empresa.
  BC-120.10:
    name: Gestión del marco y el apetito de riesgo
    description: |
      Taxonomía de riesgos, marco, apetito y tolerancia al riesgo.
  BC-120.10.10:
    name: Gestión de la taxonomía de riesgos
    description: |
      Definición y mantenimiento de la taxonomía y categorías de riesgo de la empresa.
  BC-120.10.20:
    name: Definición del apetito de riesgo
    description: |
      Declaración de apetito de riesgo y umbrales de tolerancia aprobados por el consejo.
  BC-120.10.30:
    name: Gestión de políticas y estándares de riesgo
    description: |
      Políticas, estándares y metodologías de riesgo a nivel de grupo.
  BC-120.10.40:
    name: Gestión de la cultura de riesgo
    description: |
      Programas de evaluación, concienciación y rendición de cuentas de la cultura de riesgo.
  BC-120.20:
    name: Identificación y evaluación de riesgos
    description: |
      Detección, evaluación, valoración y priorización de riesgos.
  BC-120.20.10:
    name: Identificación de riesgos
    description: |
      Talleres, escaneos e insumos para detectar riesgos nuevos y emergentes.
  BC-120.20.20:
    name: Análisis y valoración de riesgos
    description: |
      Análisis de probabilidad, impacto, velocidad y riesgo inherente frente a residual.
  BC-120.20.30:
    name: Análisis de escenarios y estrés
    description: |
      Análisis prospectivo de escenarios, pruebas de estrés y estrés inverso.
  BC-120.20.40:
    name: Vigilancia de riesgos emergentes
    description: |
      Vigilancia del horizonte para detectar riesgos emergentes y señales débiles.
  BC-120.30:
    name: Gestión del tratamiento del riesgo
    description: |
      Decisiones de mitigación, transferencia, evitación y aceptación.
  BC-120.30.10:
    name: Planificación de la mitigación del riesgo
    description: |
      Definición de acciones de mitigación, responsables y fechas objetivo.
  BC-120.30.20:
    name: Gestión de la transferencia del riesgo
    description: |
      Transferencia del riesgo mediante seguros, contratos y coberturas.
  BC-120.30.30:
    name: Gobierno de la aceptación del riesgo
    description: |
      Aceptación formal de riesgos residuales por encima del apetito con aprobaciones.
  BC-120.30.40:
    name: Diseño y eficacia de controles
    description: |
      Definición y evaluación de la eficacia de los controles de riesgo.
  BC-120.40:
    name: Supervisión y reporte de riesgos
    description: |
      Indicadores de riesgo, paneles e informes a los órganos de gobierno.
  BC-120.40.10:
    name: Gestión de indicadores clave de riesgo
    description: |
      Definición, fijación de umbrales y seguimiento de los indicadores clave de riesgo.
  BC-120.40.20:
    name: Captura de eventos y pérdidas de riesgo
    description: |
      Registro de eventos de riesgo operacional, cuasi-incidentes y pérdidas.
  BC-120.40.30:
    name: Reporte y paneles de riesgo
    description: |
      Reporte periódico al comité ejecutivo, al consejo y al comité de riesgos.
  BC-120.40.40:
    name: Agregación y análisis de concentración de riesgos
    description: |
      Agregación de riesgos a nivel de empresa y análisis de concentraciones.
  BC-120.50:
    name: Gestión de seguros corporativos
    description: |
      Contratación y gestión de los programas de seguros corporativos.
  BC-120.50.10:
    name: Diseño del programa de seguros
    description: |
      Estrategia de cobertura, retenciones y límites entre los ramos de seguro.
  BC-120.50.20:
    name: Colocación y renovación de seguros
    description: |
      Gestión de corredores, colocación en mercado y renovación de pólizas.
  BC-120.50.30:
    name: Gestión de siniestros de seguros
    description: |
      Notificación, tramitación y recuperación de siniestros de seguros corporativos.
  BC-120.50.40:
    name: Gestión de seguros cautivos
    description: |
      Operación y gobierno de las cautivas de seguros.

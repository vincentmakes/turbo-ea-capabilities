locale: es
source: L1-insurance-risk-management.yaml
entries:
  BC-2190:
    name: Gestión de riesgos de seguros
    description: |
      Tipos de riesgo específicos del seguro: suscripción, catástrofe y acumulación,
      provisiones, solvencia y capital, contraparte de reaseguro, vida y longevidad,
      caducidad, y riesgo operacional y de conducta del seguro,
      diferenciados del riesgo empresarial genérico.
  BC-2190.10:
    name: Gestión del riesgo de suscripción
    description: |
      Apetito de riesgo de suscripción, monitoreo de límites y vigilancia de selección adversa.
  BC-2190.10.10:
    name: Apetito de riesgo de suscripción
    description: |
      Definición y articulación del apetito de riesgo de suscripción.
  BC-2190.10.20:
    name: Monitoreo de límites de suscripción
    description: |
      Monitoreo de las autoridades de suscripción y los límites de acumulación.
  BC-2190.10.30:
    name: Vigilancia de selección adversa
    description: |
      Vigilancia de patrones de selección adversa y antiselección.
  BC-2190.20:
    name: Gestión del riesgo de catástrofe y acumulación
    description: |
      Monitoreo de la acumulación de exposición, gestión del PML y escenarios de desastre realistas,
      y planificación de la mitigación del riesgo CAT.
  BC-2190.20.10:
    name: Monitoreo de la acumulación de exposición
    description: |
      Monitoreo de la acumulación de exposición por riesgo cubierto, geografía y uso.
  BC-2190.20.20:
    name: Gestión del PML y escenarios de desastre realistas
    description: |
      Gestión del PML y los escenarios de desastre realistas.
  BC-2190.20.30:
    name: Planificación de la mitigación del riesgo CAT
    description: |
      Planificación de las acciones de mitigación, incluidos el reaseguro y la transferencia de riesgos.
  BC-2190.30:
    name: Gestión del riesgo de provisiones técnicas
    description: |
      Monitoreo de la suficiencia de provisiones, análisis de volatilidad de provisiones
      y pruebas de estrés del riesgo de provisiones.
  BC-2190.30.10:
    name: Monitoreo de la suficiencia de provisiones
    description: |
      Monitoreo de la suficiencia de provisiones frente a la mejor estimación y referencias externas.
  BC-2190.30.20:
    name: Análisis de la volatilidad de provisiones
    description: |
      Análisis de la volatilidad de las provisiones y el riesgo de provisiones a un año.
  BC-2190.30.30:
    name: Pruebas de estrés del riesgo de provisiones
    description: |
      Pruebas de estrés y escenarios sobre la suficiencia de las provisiones.
  BC-2190.40:
    name: Gestión del riesgo de solvencia y capital
    description: |
      Monitoreo de la adecuación de capital, operaciones del ORSA, pruebas de estrés de solvencia
      y planificación de recuperación y resolución.
  BC-2190.40.10:
    name: Monitoreo de la adecuación de capital
    description: |
      Monitoreo de los ratios de capital de solvencia y los umbrales de capital.
  BC-2190.40.20:
    name: Operaciones del ORSA
    description: |
      Ejecución del ciclo de evaluación propia del riesgo y la solvencia (ORSA).
  BC-2190.40.30:
    name: Pruebas de estrés y escenarios de solvencia
    description: |
      Pruebas de estrés y de estrés inverso de las posiciones de solvencia.
  BC-2190.40.40:
    name: Planificación de recuperación y resolución
    description: |
      Planificación de recuperación y resolución para escenarios de liquidación de la aseguradora.
  BC-2190.50:
    name: Gestión del riesgo de contraparte y crédito de reaseguro
    description: |
      Monitoreo de la contraparte reaseguradora, suficiencia de garantías y pruebas de estrés
      por impago de contraparte.
  BC-2190.50.10:
    name: Monitoreo de la contraparte reaseguradora
    description: |
      Monitoreo de la solidez financiera del reasegurador y la concentración de exposición.
  BC-2190.50.20:
    name: Monitoreo de la suficiencia de garantías y cartas de crédito
    description: |
      Monitoreo de la suficiencia de garantías y cartas de crédito aportadas por los reaseguradores.
  BC-2190.50.30:
    name: Pruebas de estrés por impago de contraparte
    description: |
      Pruebas de estrés del impacto del impago del reasegurador sobre la solvencia.
  BC-2190.60:
    name: Gestión del riesgo de vida y longevidad
    description: |
      Monitoreo del riesgo de mortalidad, supervisión de la cobertura de longevidad y gestión
      del riesgo de pandemia.
  BC-2190.60.10:
    name: Monitoreo del riesgo de mortalidad
    description: |
      Monitoreo del riesgo de mortalidad en carteras de vida y protección.
  BC-2190.60.20:
    name: Supervisión de la cobertura de longevidad
    description: |
      Supervisión de los instrumentos de cobertura de longevidad y la exposición a contrapartes.
  BC-2190.60.30:
    name: Gestión del riesgo de pandemia
    description: |
      Gestión del riesgo de mortalidad y morbilidad derivado de pandemias y epidemias.
  BC-2190.70:
    name: Gestión del riesgo de caducidad y persistencia
    description: |
      Monitoreo del riesgo de caducidad y pruebas de estrés de persistencia.
  BC-2190.70.10:
    name: Monitoreo del riesgo de caducidad
    description: |
      Monitoreo de las tasas de caducidad y las pérdidas derivadas en productos de vida y ahorro.
  BC-2190.70.20:
    name: Pruebas de estrés de persistencia
    description: |
      Pruebas de estrés sobre las hipótesis de persistencia y el comportamiento dinámico de caducidad.
  BC-2190.80:
    name: Gestión del riesgo operacional y de conducta del seguro
    description: |
      Monitoreo del riesgo de conducta del seguro, riesgo en la gestión de siniestros
      y riesgo de distribución.
  BC-2190.80.10:
    name: Monitoreo del riesgo de conducta del seguro
    description: |
      Monitoreo de los indicadores de riesgo de conducta en producto, distribución y siniestros.
  BC-2190.80.20:
    name: Supervisión del riesgo en la gestión de siniestros
    description: |
      Supervisión del riesgo en la gestión de siniestros y los resultados de equidad hacia el tomador.
  BC-2190.80.30:
    name: Monitoreo del riesgo de distribución
    description: |
      Monitoreo del riesgo de distribución, incluida la venta inadecuada y la conducta de los intermediarios.

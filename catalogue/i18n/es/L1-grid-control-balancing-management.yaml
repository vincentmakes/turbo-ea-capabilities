locale: es
source: L1-grid-control-balancing-management.yaml
entries:
  BC-3830:
    name: Gestión de control y equilibrio de la red
    description: |
      Función del operador del sistema para el sistema eléctrico de alta tensión —
      equilibrio en tiempo real de la generación y la demanda, control de frecuencia
      y tensión, reservas y servicios auxiliares, planificación operativa, coordinación
      transfronteriza y preparación para el arranque en negro.
  BC-3830.10:
    name: Operaciones del sistema en tiempo real
    description: |
      Supervisión y control continuos en tiempo real de la generación, la demanda y
      los intercambios del sistema para mantener la operación segura.
  BC-3830.10.10:
    name: Conciencia situacional del sistema
    description: |
      Conciencia continua de los márgenes de generación, carga y contingencias desde
      el centro de control.
  BC-3830.10.20:
    name: Análisis de contingencias en tiempo real
    description: |
      Análisis de contingencias N-1 y N-1-1 en tiempo real y activación de acciones correctoras.
  BC-3830.10.30:
    name: Emisión de instrucciones operativas
    description: |
      Emisión de instrucciones operativas a las partes responsables del balance y a los TSOs.
  BC-3830.20:
    name: Control de frecuencia y tensión
    description: |
      Regulación activa de frecuencia y tensión mediante el control automático de
      la generación y el despacho de potencia reactiva.
  BC-3830.20.10:
    name: Control automático de la generación
    description: |
      Despacho del AGC y gestión del error de control de área para la regulación de frecuencia.
  BC-3830.20.20:
    name: Despacho de potencia reactiva
    description: |
      Despacho de recursos reactivos para mantener el perfil de tensión en toda la red.
  BC-3830.20.30:
    name: Gestión de la inercia y la respuesta de frecuencia
    description: |
      Gestión de la inercia, la respuesta rápida de frecuencia y los servicios de droop.
  BC-3830.30:
    name: Planificación operativa
    description: |
      Análisis de seguridad del sistema para el día siguiente e intradiario, evaluación
      de interrupciones y planificación del margen operativo.
  BC-3830.30.10:
    name: Análisis de seguridad para el día siguiente
    description: |
      Compromiso de unidades con restricciones de seguridad y análisis de contingencias
      para el día de operación.
  BC-3830.30.20:
    name: Re-despacho intradiario
    description: |
      Re-despacho intradiario de la generación y la demanda frente a las actualizaciones
      de la previsión.
  BC-3830.30.30:
    name: Evaluación del margen operativo estacional
    description: |
      Evaluación estacional del margen de capacidad y la suficiencia.
  BC-3830.40:
    name: Reservas y servicios auxiliares
    description: |
      Contratación y activación de reservas operativas y servicios auxiliares, incluidos
      productos de frecuencia, tensión e inercia.
  BC-3830.40.10:
    name: Contratación de reservas
    description: |
      Contratación de productos de reserva primaria, secundaria y terciaria.
  BC-3830.40.20:
    name: Activación de servicios auxiliares
    description: |
      Activación y despacho de proveedores de servicios auxiliares contratados.
  BC-3830.40.30:
    name: Monitorización del rendimiento de reservas
    description: |
      Monitorización del rendimiento y la disponibilidad de los proveedores de reservas.
  BC-3830.50:
    name: Operaciones de liquidación de desvíos
    description: |
      Cálculo y notificación por parte del operador del sistema de los volúmenes y precios
      de desvío para las partes responsables del balance.
  BC-3830.50.10:
    name: Agregación de volúmenes medidos
    description: |
      Agregación de volúmenes medidos por parte responsable del balance.
  BC-3830.50.20:
    name: Cálculo del precio de desvío del sistema
    description: |
      Cálculo de los precios de desvío del sistema según las reglas del mercado.
  BC-3830.50.30:
    name: Notificación de liquidación a la parte responsable del balance
    description: |
      Notificación de volúmenes de desvío y cargos a las partes responsables del balance.
  BC-3830.60:
    name: Coordinación transfronteriza
    description: |
      Coordinación de flujos en interconexiones, re-despachos y seguridad con los
      TSOs vecinos y los coordinadores regionales de seguridad.
  BC-3830.60.10:
    name: Programación de interconexiones
    description: |
      Programación de flujos físicos y comerciales en interconexiones.
  BC-3830.60.20:
    name: Cálculo coordinado de capacidades
    description: |
      Cálculo coordinado de capacidades entre zonas de ofertas con los vecinos.
  BC-3830.60.30:
    name: Re-despacho transfronterizo y contraoperaciones
    description: |
      Re-despacho transfronterizo y contraoperaciones para aliviar la congestión.
  BC-3830.70:
    name: Planificación del arranque en negro y la reposición del sistema
    description: |
      Mantenimiento de contratos de arranque en negro, planes de reposición y
      simulacros de reposición para escenarios de colapso total o parcial del sistema.
  BC-3830.70.10:
    name: Gestión de contratos de arranque en negro
    description: |
      Contratación y seguimiento de los contratos de servicio de arranque en negro.
  BC-3830.70.20:
    name: Mantenimiento del plan de reposición del sistema
    description: |
      Mantenimiento de las secuencias de reposición y los planes de islamiento.
  BC-3830.70.30:
    name: Simulacros y ejercicios de reposición
    description: |
      Simulacros de reposición entre operadores y empresas y revisiones post-acción.

locale: es
source: L1-research-development-management.yaml
entries:
  BC-810:
    name: Gestión de investigación y desarrollo
    description: |
      Dirige la investigación fundamental y aplicada, la experimentación y la maduración tecnológica para generar nuevas capacidades y productos.
  BC-810.10:
    name: Gestión de la investigación
    description: |
      Planifica y ejecuta programas de investigación fundamental y exploratoria.
  BC-810.10.10:
    name: Definición de programas de investigación
    description: |
      Establece los programas de investigación, sus temas y objetivos estratégicos.
  BC-810.10.20:
    name: Revisión de bibliografía y patentes
    description: |
      Realiza revisiones sistemáticas de la literatura científica y el panorama de patentes.
  BC-810.10.30:
    name: Ejecución de proyectos de investigación
    description: |
      Lleva a cabo proyectos de investigación con hitos definidos y revisiones periódicas.
  BC-810.10.40:
    name: Publicación de resultados de investigación
    description: |
      Gestiona la publicación, presentación en congresos y difusión de los resultados de investigación.
  BC-810.20:
    name: Gestión del desarrollo aplicado
    description: |
      Supervisa proyectos de desarrollo aplicado que transforman resultados de investigación en tecnología desplegable.
  BC-810.20.10:
    name: Entrega de proyectos de desarrollo aplicado
    description: |
      Ejecuta proyectos de desarrollo aplicado alcanzando hitos de madurez tecnológica (TRL).
  BC-810.20.20:
    name: Maduración tecnológica
    description: |
      Incrementa la madurez tecnológica desde el concepto hasta el despliegue operativo.
  BC-810.20.30:
    name: Herramientas y métodos de desarrollo
    description: |
      Estandariza las herramientas, métodos y cadenas de herramientas para el desarrollo.
  BC-810.30:
    name: Gestión de la experimentación y el prototipado
    description: |
      Opera laboratorios, construye prototipos y ejecuta pruebas de concepto para validar hipótesis.
  BC-810.30.10:
    name: Operaciones de laboratorio
    description: |
      Gestiona el funcionamiento de los laboratorios de investigación y desarrollo.
  BC-810.30.20:
    name: Construcción de prototipos
    description: |
      Ensambla y construye prototipos físicos y digitales para validación.
  BC-810.30.30:
    name: Ejecución de prueba de concepto
    description: |
      Diseña y ejecuta pruebas de concepto y pilotos basados en hipótesis.
  BC-810.30.40:
    name: Pruebas y validación
    description: |
      Elabora planes de prueba, recopila datos y valida resultados frente a criterios de aceptación.
  BC-810.40:
    name: Gestión de la cartera de I+D
    description: |
      Administra la cartera de proyectos de I+D equilibrando prioridades, recursos y financiación.
  BC-810.40.10:
    name: Selección de proyectos de I+D
    description: |
      Selecciona y prioriza los proyectos de I+D en función del valor estratégico y la viabilidad.
  BC-810.40.20:
    name: Asignación de recursos de I+D
    description: |
      Distribuye investigadores, laboratorios y capital entre los proyectos de la cartera.
  BC-810.40.30:
    name: Seguimiento del rendimiento de I+D
    description: |
      Monitoriza el rendimiento de la cartera de I+D y gestiona las decisiones de etapas y puertas.
  BC-810.40.40:
    name: Gestión de créditos fiscales y subvenciones de I+D
    description: |
      Captura y justifica créditos fiscales y subvenciones asociados a actividades de I+D.
  BC-810.50:
    name: Gestión de la hoja de ruta tecnológica
    description: |
      Vigila las tecnologías emergentes y elabora hojas de ruta que vinculan tecnología con productos y mercados.
  BC-810.50.10:
    name: Vigilancia tecnológica
    description: |
      Realiza una vigilancia continua de tecnologías emergentes y disruptivas.
  BC-810.50.20:
    name: Desarrollo de la hoja de ruta tecnológica
    description: |
      Elabora hojas de ruta plurianuales que relacionan tecnologías con productos y mercados.
  BC-810.50.30:
    name: Definición de la estrategia tecnológica
    description: |
      Define la estrategia tecnológica y las decisiones de plataforma a largo plazo.
  BC-810.50.40:
    name: Decisiones de fabricar o adquirir tecnología
    description: |
      Evalúa las opciones de construir, asociarse o adquirir tecnología para cubrir necesidades estratégicas.

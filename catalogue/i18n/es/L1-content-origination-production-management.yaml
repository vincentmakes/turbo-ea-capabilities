locale: es
source: L1-content-origination-production-management.yaml
entries:
  BC-3700:
    name: "Gestión de producción y creación de contenidos"
    description: |
      Selección de proyectos, preproducción, rodaje o producción en estudio,
      producción en directo y de noticias, posproducción y localización de contenidos
      audiovisuales, sonoros y editoriales desde el concepto hasta el máster listo para entrega.
  BC-3700.10:
    name: "Encargo y selección de contenidos"
    description: |
      Evaluación de conceptos y propuestas, composición del catálogo de producción
      y autoridad para encargar nuevas producciones o adquisiciones.
  BC-3700.10.10:
    name: "Evaluación de conceptos y propuestas"
    description: |
      Valoración estructurada de propuestas, tratamientos y biblias entrantes
      conforme a criterios editoriales y comerciales.
  BC-3700.10.20:
    name: "Planificación del catálogo y la cartera"
    description: |
      Composición del catálogo de producción por géneros, presupuestos, audiencias
      y ventanas de estreno.
  BC-3700.10.30:
    name: "Decisión de luz verde"
    description: |
      Autoridad y registro de la decisión de luz verde, incluyendo presupuesto,
      calendario y marco creativo.
  BC-3700.10.40:
    name: "Gestión de encargos de producción"
    description: |
      Elaboración y ciclo de vida de los encargos de producción emitidos
      a unidades internas y productores externos.
  BC-3700.20:
    name: "Gestión de la preproducción"
    description: |
      Desarrollo de guiones, presupuestación, planificación y diseño de localizaciones
      y decorados para llevar un proyecto aprobado hasta el inicio del rodaje.
  BC-3700.20.10:
    name: "Desarrollo de guion y storyboard"
    description: |
      Desarrollo iterativo de guiones, storyboards y listas de planos
      para producciones con y sin guion.
  BC-3700.20.20:
    name: "Planificación del presupuesto de producción"
    description: |
      Presupuesto de producción detallado por departamento y fase, con consideraciones
      de contingencia y garantías de finalización.
  BC-3700.20.30:
    name: "Planificación del calendario de producción"
    description: |
      Elaboración del plan de rodaje, ventanas de disponibilidad de reparto y equipo
      técnico, y divisiones de unidad.
  BC-3700.20.40:
    name: "Planificación de localizaciones y decorados"
    description: |
      Búsqueda de localizaciones, permisos y planificación del diseño y construcción
      de decorados en estudio y en exteriores.
  BC-3700.30:
    name: "Gestión de operaciones de producción"
    description: |
      Ejecución del rodaje principal o de la producción en estudio, incluyendo
      la logística de equipo técnico, equipos y flujo de trabajo en set.
  BC-3700.30.10:
    name: "Operaciones de producción en estudio"
    description: |
      Producción en plató para formatos de entretenimiento, ficción y no ficción,
      incluyendo configuraciones multicámara.
  BC-3700.30.20:
    name: "Operaciones de producción en exteriores"
    description: |
      Ejecución de la producción en localizaciones reales y remotas, incluyendo
      la gestión de unidades y la seguridad en set.
  BC-3700.30.30:
    name: "Logística de producción y operaciones de equipo"
    description: |
      Logística de hojas de llamada, transporte, catering y movimientos
      de equipo a lo largo de la producción.
  BC-3700.40:
    name: "Gestión de producción en directo y de noticias"
    description: |
      Producción en tiempo real de eventos en directo, deportes y boletines
      informativos, incluyendo dirección multicámara y gráficos en vivo.
  BC-3700.40.10:
    name: "Producción de eventos en directo"
    description: |
      Producción de entretenimiento en vivo y eventos especiales con mezcla
      de imagen y sonido en tiempo real.
  BC-3700.40.20:
    name: "Producción de boletines informativos"
    description: |
      Producción de boletines y noticias continuas en la redacción, incluyendo
      la gestión del orden del día y la coordinación de inserciones en directo.
  BC-3700.40.30:
    name: "Producción de cobertura deportiva"
    description: |
      Producción multicámara de deportes en directo, incluyendo unidades
      de exteriores y operaciones de difusión principal.
  BC-3700.40.40:
    name: "Gráficos en tiempo real y repetición instantánea"
    description: |
      Gráficos en antena, marcadores y operaciones de repetición instantánea
      para producciones en vivo y casi en vivo.
  BC-3700.50:
    name: "Gestión de posproducción"
    description: |
      Flujos de trabajo de imagen, audio, color y acabado que llevan el material
      capturado a un máster listo para entrega.
  BC-3700.50.10:
    name: "Montaje de imagen y efectos visuales"
    description: |
      Montaje offline y online, integración de efectos visuales y conform
      de las decisiones de montaje.
  BC-3700.50.20:
    name: "Posproducción de audio"
    description: |
      Edición de diálogos, ADR, foley, diseño de sonido y mezcla final
      conforme a las especificaciones de nivel de entrega.
  BC-3700.50.30:
    name: "Gradación de color y acabado"
    description: |
      Gradación de color creativa y técnica y acabado para entregas en HDR y SDR.
  BC-3700.50.40:
    name: "Masterización y conform"
    description: |
      Producción de másteres de entrega, paquetes IMF y de mezzanine para
      difusión, y conform conforme a las especificaciones de entrega.
  BC-3700.60:
    name: "Gestión de localización y versionado"
    description: |
      Subtitulación, captioning, doblaje y cortes regionales o específicos
      por plataforma y másteres de versión para distribución.
  BC-3700.60.10:
    name: "Producción de subtítulos y captioning"
    description: |
      Elaboración de subtítulos y subtítulos para personas sordas
      en múltiples idiomas y formatos.
  BC-3700.60.20:
    name: "Producción de doblaje"
    description: |
      Traducción, casting y grabación de pistas de audio doblado
      para estreno territorial.
  BC-3700.60.30:
    name: "Gestión de versiones lingüísticas y cortes regionales"
    description: |
      Producción de másteres de versiones lingüísticas y regionales,
      incluyendo montajes adaptados por territorio.

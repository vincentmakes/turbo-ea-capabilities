locale: es
source: L1-food-beverage-operations-management.yaml
entries:
  BC-4070:
    name: Gestión de operaciones de alimentos y bebidas
    description: |
      Operación de los servicios de alimentos y bebidas en restaurante, bar, servicio
      en habitación, banquetes y cocina — cubriendo la ingeniería de recetas y menús,
      aprovisionamiento, producción en cocina, servicio, higiene y cumplimiento de la
      seguridad alimentaria.
    in_scope:
      - Gestión de menús y recetas con datos de alérgenos y nutrición
      - Aprovisionamiento de A&B, bodega de bebidas y operaciones de inventario
      - Planificación de la producción en cocina y ejecución de línea
      - Operaciones de servicio en restaurante, habitación y banquete
      - Operaciones de APPCC y seguridad alimentaria
    out_of_scope:
      - Ingeniería del establecimiento a nivel de propiedad (BC-4060.30)
      - Elaboración de órdenes de eventos de banquete y ventas grupales (BC-4110)
      - Operaciones de cocina a bordo de cruceros bajo marcos específicos de buque (BC-4090)

  BC-4070.10:
    name: Ingeniería de menús y gestión de recetas
    description: |
      Ingeniería de menús y recetas, incluyendo especificaciones, declaraciones de
      alérgenos y nutrición, costes y versionado.

  BC-4070.10.10:
    name: Gestión de recetas y especificaciones
    description: |
      Gestión de recetas, subrecetas y especificaciones de producto en todos los
      establecimientos.

  BC-4070.10.20:
    name: Declaración de alérgenos y nutrición
    description: |
      Declaración de alérgenos y datos nutricionales para los elementos del menú
      conforme a la normativa vigente.

  BC-4070.10.30:
    name: Coste de recetas e ingeniería del margen
    description: |
      Cálculo del coste de las recetas e ingeniería del margen del menú frente al
      coste alimentario objetivo.

  BC-4070.10.40:
    name: Versionado y despliegue de menús
    description: |
      Versionado y despliegue de menús a través de temporadas, establecimientos y
      mercados.

  BC-4070.20:
    name: Aprovisionamiento e inventario de A&B
    description: |
      Abastecimiento de suministros de A&B, inventario de bodega de bebidas, reposición
      por nivel de referencia y análisis de la varianza teórico-real.

  BC-4070.20.10:
    name: Abastecimiento de proveedores de A&B
    description: |
      Abastecimiento de proveedores de A&B, incluyendo aprobación y condiciones
      contractuales.

  BC-4070.20.20:
    name: Gestión de inventario de bebidas y bodega
    description: |
      Gestión del inventario de bebidas y bodega, incluyendo el seguimiento de
      añada y rotación.

  BC-4070.20.30:
    name: Gestión del nivel de referencia y reposición
    description: |
      Gestión de los niveles de referencia y los ciclos de reposición en todos los
      establecimientos.

  BC-4070.20.40:
    name: Análisis de varianza teórico-real
    description: |
      Análisis de la varianza del coste teórico frente al real de alimentos y bebidas
      con atribución de la causa raíz.

  BC-4070.30:
    name: Operaciones de producción en cocina
    description: |
      Operación de la producción en cocina, incluyendo planificación, ejecución de
      línea, emplatado y disciplina de coste alimentario.

  BC-4070.30.10:
    name: Planificación de la producción y mise en place
    description: |
      Planificación de los ciclos de producción en cocina y la mise en place antes
      del servicio.

  BC-4070.30.20:
    name: Operaciones de línea y producción durante el servicio
    description: |
      Producción en línea en tiempo real y coordinación de la pase durante los
      períodos de servicio.

  BC-4070.30.30:
    name: Emplatado y control de calidad
    description: |
      Emplatado y control de calidad en la pase antes del servicio a los huéspedes.

  BC-4070.30.40:
    name: Operaciones de coste alimentario en cocina
    description: |
      Operaciones para gestionar el coste alimentario, incluyendo controles de
      rendimiento y registro de desperdicios.

  BC-4070.40:
    name: Operaciones de servicio en restaurante y establecimientos
    description: |
      Operaciones de servicio en restaurantes y establecimientos, incluyendo
      reservas, distribución de asientos, gestión de cubiertos y restablecimiento
      del establecimiento.

  BC-4070.40.10:
    name: Gestión de reservas y distribución de asientos
    description: |
      Gestión de reservas, asignación de asientos y lista de espera en todos los
      establecimientos.

  BC-4070.40.20:
    name: Gestión de cubiertos y ritmo del servicio
    description: |
      Gestión del número de cubiertos y del ritmo del servicio durante los períodos
      de servicio.

  BC-4070.40.30:
    name: Operaciones de servicio en mesa
    description: |
      Operaciones de servicio en mesa, incluyendo toma de pedidos, estándares de
      servicio y presentación de la cuenta.

  BC-4070.40.40:
    name: Operaciones de cierre y restablecimiento del establecimiento
    description: |
      Cierre del establecimiento, cuadre de caja y restablecimiento para el siguiente
      período de servicio.

  BC-4070.50:
    name: Operaciones de servicio en habitación y minibar
    description: |
      Captura y entrega de pedidos de servicio en habitación, reposición del minibar
      y operaciones de obsequios de bienvenida.

  BC-4070.50.10:
    name: Captura de pedidos de servicio en habitación
    description: |
      Captura de pedidos de servicio en habitación a través de los canales de
      teléfono, aplicación y colgador de puerta.

  BC-4070.50.20:
    name: Operaciones de entrega del servicio en habitación
    description: |
      Entrega de los pedidos del servicio en habitación dentro de los estándares de
      tiempo de servicio.

  BC-4070.50.30:
    name: Operaciones de reposición del minibar
    description: |
      Reposición y captura del consumo del inventario del minibar.

  BC-4070.50.40:
    name: Operaciones de amenidades y obsequio de bienvenida
    description: |
      Operación del aprovisionamiento de amenidades en habitación y obsequios de
      bienvenida para huéspedes VIP y de reconocimiento.

  BC-4070.60:
    name: Operaciones de banquetes y catering
    description: |
      Operaciones de banquetes y catering que cubren montaje, servicio, catering
      externo y servicio de bebidas para eventos.

  BC-4070.60.10:
    name: Operaciones de montaje y restablecimiento de banquetes
    description: |
      Montaje, cambio de configuración y restablecimiento de los salones de banquete
      entre eventos consecutivos.

  BC-4070.60.20:
    name: Operaciones de servicio emplatado y buffet
    description: |
      Operaciones de servicio para eventos de banquete con menú emplatado, buffet
      y estilo familiar.

  BC-4070.60.30:
    name: Operaciones de catering fuera del establecimiento
    description: |
      Operación de los servicios de catering prestados fuera del establecimiento
      principal.

  BC-4070.60.40:
    name: Operaciones de bebidas en banquetes
    description: |
      Operaciones de servicio de bebidas en eventos de banquete, incluyendo la
      preparación de la barra y el seguimiento del consumo.

  BC-4070.70:
    name: Operaciones de higiene y seguridad alimentaria de A&B
    description: |
      Operaciones de higiene y seguridad alimentaria, incluyendo la ejecución del
      plan APPCC, la monitorización de temperaturas, los controles de alérgenos y
      la gestión de incidentes.

  BC-4070.70.10:
    name: Ejecución del plan APPCC
    description: |
      Ejecución de los planes APPCC en las etapas de recepción, almacenamiento,
      preparación, cocinado y mantenimiento en caliente.

  BC-4070.70.20:
    name: Monitorización de temperatura y cadena de frío
    description: |
      Monitorización de la temperatura y la integridad de la cadena de frío en el
      almacenamiento y el servicio de A&B.

  BC-4070.70.30:
    name: Controles de contaminación cruzada de alérgenos
    description: |
      Operación de los controles de contaminación cruzada de alérgenos en la
      recepción, la preparación y el servicio.

  BC-4070.70.40:
    name: Gestión de incidentes de seguridad alimentaria
    description: |
      Gestión de incidentes de seguridad alimentaria, incluyendo los informes de
      sospecha de enfermedad de transmisión alimentaria.

locale: es
source: L1-public-safety-emergency-operations-management.yaml
entries:
  BC-3310:
    name: Gestión de seguridad pública y emergencias
    description: |
      Operaciones de seguridad pública y emergencias, incluidas las comunicaciones de emergencia
      y el despacho, la respuesta de campo de policía, bomberos y SMU, el mando de incidentes
      alineado con el NIMS, la preparación y recuperación ante desastres, las investigaciones
      de seguridad pública y la coordinación de asistencia mutua.
  BC-3310.10:
    name: Comunicaciones de emergencia y despacho
    description: |
      Recepción de llamadas de emergencia, despacho asistido por ordenador y comunicaciones
      de campo para los intervinientes de policía, bomberos y SMU.
    in_scope:
      - Atención de llamadas al 112/911/999
      - Despacho asistido por ordenador
      - Operaciones de radio de seguridad pública
    out_of_scope:
      - Regímenes de servicio universal de telecomunicaciones (cubierto por Gestión del cumplimiento regulatorio de telecomunicaciones)
  BC-3310.10.10:
    name: Atención de llamadas de emergencia
    description: |
      Recepción y triaje de llamadas de emergencia y mensajes de texto de emergencia.
  BC-3310.10.20:
    name: Despacho asistido por ordenador
    description: |
      Despacho de unidades de policía, bomberos y SMU mediante CAD hacia los incidentes.
  BC-3310.10.30:
    name: Operaciones de radio de seguridad pública
    description: |
      Operación de la radio móvil terrestre de seguridad pública y la banda ancha equivalente
      a FirstNet.
  BC-3310.10.40:
    name: Alertas y avisos públicos
    description: |
      Emisión de alertas públicas a través de WEA, Cell Broadcast, EAS, sirenas y otros canales.
  BC-3310.20:
    name: Operaciones de respuesta de campo
    description: |
      Operaciones de campo cotidianas de los primeros intervinientes de policía, bomberos y SMU.
  BC-3310.20.10:
    name: Patrulla de las fuerzas del orden
    description: |
      Patrulla proactiva y rutinaria de las fuerzas del orden y respuesta a incidentes.
  BC-3310.20.20:
    name: Extinción de incendios y rescate
    description: |
      Extinción de incendios, operaciones de rescate y respuesta a materiales peligrosos.
  BC-3310.20.30:
    name: Respuesta de servicios de emergencias médicas
    description: |
      Evaluación médica prehospitalaria de emergencia, tratamiento y transporte.
  BC-3310.20.40:
    name: Respuesta táctica especializada
    description: |
      Operaciones especiales de táctica, desactivación de artefactos explosivos y respuesta
      a materiales peligrosos.
  BC-3310.30:
    name: Mando y coordinación de incidentes
    description: |
      Mando de incidentes alineado con el NIMS/ICS, coordinación multiagencial y operaciones
      de los centros de operaciones de emergencia.
  BC-3310.30.10:
    name: Establecimiento del mando de incidentes
    description: |
      Establecimiento del mando del incidente, el mando unificado y las estructuras ICS.
  BC-3310.30.20:
    name: Coordinación multiagencial
    description: |
      Coordinación entre los organismos intervinientes y las jurisdicciones durante los incidentes.
  BC-3310.30.30:
    name: Operaciones del centro de operaciones de emergencia
    description: |
      Operación de los COE a nivel local, autonómico y nacional durante las emergencias.
  BC-3310.30.40:
    name: Mantenimiento del cuadro operacional común
    description: |
      Mantenimiento de un cuadro operacional común compartido entre los organismos intervinientes.
  BC-3310.40:
    name: Preparación y mitigación ante desastres
    description: |
      Análisis de amenazas, planificación, ejercicios, formación y actividades de mitigación
      para prepararse ante desastres conforme al Marco de Sendai.
  BC-3310.40.10:
    name: Análisis de amenazas y riesgos
    description: |
      Identificación y evaluación de las amenazas y los riesgos naturales y de origen humano.
  BC-3310.40.20:
    name: Planificación de emergencias
    description: |
      Elaboración de los planes de operaciones de emergencia, los planes específicos por
      amenaza y los planes de continuidad.
  BC-3310.40.30:
    name: Ejercicios y formación
    description: |
      Ejercicios de mesa, funcionales y a escala real, y programas de formación para los
      intervinientes.
  BC-3310.40.40:
    name: Administración de programas de mitigación
    description: |
      Administración de los programas de mitigación de desastres estructurales y no estructurales.
  BC-3310.50:
    name: Respuesta y recuperación ante desastres
    description: |
      Declaración de desastre, operaciones de respuesta, asistencia individual y pública, y
      coordinación de la recuperación a largo plazo.
  BC-3310.50.10:
    name: Declaración de desastre y activación
    description: |
      Declaración de estados de emergencia y activación de las autoridades de respuesta.
  BC-3310.50.20:
    name: Administración de asistencia individual
    description: |
      Administración de la asistencia por desastre a las personas y los hogares afectados.
  BC-3310.50.30:
    name: Administración de asistencia pública
    description: |
      Administración de las subvenciones de asistencia pública para el retiro de escombros,
      la infraestructura y las obras de emergencia.
  BC-3310.50.40:
    name: Coordinación de la recuperación a largo plazo
    description: |
      Coordinación de las actividades de recuperación a largo plazo y de reconstrucción
      mejorada.
  BC-3310.60:
    name: Investigaciones de seguridad pública
    description: |
      Investigaciones penales y de seguridad pública, incluida la gestión de evidencias,
      la inteligencia y la preparación de los expedientes.
  BC-3310.60.10:
    name: Investigación de la escena del crimen
    description: |
      Examen de la escena del crimen y recogida de evidencias forenses.
  BC-3310.60.20:
    name: Gestión de expedientes de investigación
    description: |
      Gestión de los expedientes de investigación, el seguimiento de sospechosos y la
      preparación del caso para la acusación.
  BC-3310.60.30:
    name: Operaciones de inteligencia policial
    description: |
      Recogida, análisis y difusión de la inteligencia policial en el marco de la policía
      orientada por la inteligencia.
  BC-3310.60.40:
    name: Gestión de evidencias y propiedades
    description: |
      Custodia, cadena de custodia y disposición de las evidencias y propiedades incautadas.
  BC-3310.70:
    name: Gestión de recursos de emergencia y asistencia mutua
    description: |
      Clasificación, despliegue y acuerdos de asistencia mutua de los recursos de emergencia
      entre jurisdicciones.
  BC-3310.70.10:
    name: Clasificación e inventario de recursos
    description: |
      Clasificación e inventario de los recursos de emergencia alineados con el NIMS.
  BC-3310.70.20:
    name: Administración de acuerdos de asistencia mutua
    description: |
      Administración de los acuerdos de asistencia mutua intra e interjurisdiccional.
  BC-3310.70.30:
    name: Despliegue y desmovilización de recursos
    description: |
      Despliegue, seguimiento y desmovilización de los recursos de emergencia hacia los
      incidentes.

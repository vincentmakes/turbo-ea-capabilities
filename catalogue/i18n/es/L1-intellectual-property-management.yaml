locale: es
source: L1-intellectual-property-management.yaml
entries:
  BC-840:
    name: Gestión de la propiedad intelectual
    description: |
      Protege y monetiza los activos de propiedad intelectual de la organización, incluyendo patentes, marcas, derechos de autor, secretos comerciales y licencias.
  BC-840.10:
    name: Gestión de la cartera de patentes
    description: |
      Define la estrategia de patentes, gestiona la tramitación y el mantenimiento, y revisa periódicamente la cartera.
  BC-840.10.10:
    name: Gestión de divulgaciones de invención
    description: |
      Captura, evalúa y toma decisiones sobre las divulgaciones de invención presentadas por los inventores.
  BC-840.10.20:
    name: Solicitud y tramitación de patentes
    description: |
      Redacta, presenta y tramita solicitudes de patente ante las oficinas competentes.
  BC-840.10.30:
    name: Mantenimiento de patentes
    description: |
      Gestiona el pago de anualidades y el mantenimiento de las patentes concedidas.
  BC-840.10.40:
    name: Revisión de la cartera de patentes
    description: |
      Revisa y racionaliza periódicamente la cartera de patentes para optimizar su valor estratégico.
  BC-840.20:
    name: Gestión de marcas
    description: |
      Tramita el registro de marcas, vigila su uso y defiende los derechos de marca ante terceros.
  BC-840.20.10:
    name: Búsqueda y registro de marcas
    description: |
      Realiza búsquedas de disponibilidad y tramita los registros de marcas en los territorios relevantes.
  BC-840.20.20:
    name: Vigilancia y supervisión de marcas
    description: |
      Monitoriza el registro y uso de marcas que puedan entrar en conflicto con las propias.
  BC-840.20.30:
    name: Gestión de renovaciones de marcas
    description: |
      Gestiona la renovación y el mantenimiento de los registros de marcas vigentes.
  BC-840.30:
    name: Gestión de derechos de autor y secretos comerciales
    description: |
      Protege los activos con derechos de autor, los secretos comerciales y la información confidencial de la organización.
  BC-840.30.10:
    name: Registro de activos con derechos de autor
    description: |
      Identifica y registra los activos susceptibles de protección por derechos de autor.
  BC-840.30.20:
    name: Identificación y protección de secretos comerciales
    description: |
      Identifica y aplica medidas de protección sobre los secretos comerciales de la organización.
  BC-840.30.30:
    name: Gestión de acuerdos de confidencialidad y NDA
    description: |
      Administra acuerdos de confidencialidad, NDA y controles de acceso a información sensible.
  BC-840.40:
    name: Gestión de licencias de propiedad intelectual
    description: |
      Negocia y administra acuerdos de licencia entrante y saliente, y gestiona el cobro de regalías.
  BC-840.40.10:
    name: Negociación de licencias entrantes
    description: |
      Negocia y formaliza licencias de PI de terceros para uso interno.
  BC-840.40.20:
    name: Concesión de licencias salientes y comercialización
    description: |
      Concede licencias de la PI propia y comercializa patentes con terceros.
  BC-840.40.30:
    name: Administración de regalías
    description: |
      Calcula, recauda y abona las regalías derivadas de los acuerdos de PI.
  BC-840.40.40:
    name: Licencias cruzadas y participación en pools de patentes
    description: |
      Gestiona acuerdos de licencias cruzadas y la participación en pools de patentes.
  BC-840.50:
    name: Defensa y aplicación de la propiedad intelectual
    description: |
      Detecta infracciones y ejecuta acciones de cumplimiento para proteger los activos de PI de la organización.
  BC-840.50.10:
    name: Monitorización de infracciones
    description: |
      Supervisa las posibles infracciones de la PI de la organización en el mercado.
  BC-840.50.20:
    name: Acciones de aplicación de la PI
    description: |
      Emite requerimientos de cese, presenta oposiciones e inicia litigios de aplicación cuando es necesario.
  BC-840.50.30:
    name: Defensa de la PI y contrademandas
    description: |
      Defiende a la organización frente a reclamaciones de PI y gestiona los procesos de contralitigation.
  BC-840.50.40:
    name: Protección de marca y lucha contra la falsificación
    description: |
      Detecta y elimina productos falsificados y casos de abuso de marca en el mercado.

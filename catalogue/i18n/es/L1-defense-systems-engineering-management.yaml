locale: es
source: L1-defense-systems-engineering-management.yaml
entries:
  BC-1770:
    name: Gestión de ingeniería de sistemas de defensa
    description: |
      Ingeniería de sistemas conforme a normas MIL-STD: requisitos, arquitectura, V&V, configuración e integración.
  BC-1770.10:
    name: Gestión de ingeniería de requisitos de defensa
    description: |
      Elicitación, descomposición y trazabilidad de requisitos.
  BC-1770.10.10:
    name: Elicitación de requisitos de las partes interesadas
    description: |
      Elicitación de las necesidades de las partes interesadas y los requisitos operacionales.
  BC-1770.10.20:
    name: Descomposición de requisitos del sistema
    description: |
      Descomposición de los requisitos del sistema en subsistemas.
  BC-1770.10.30:
    name: Trazabilidad de requisitos
    description: |
      Trazabilidad bidireccional de los requisitos con el diseño y las pruebas.
  BC-1770.10.40:
    name: Planificación de la verificación de requisitos
    description: |
      Definición de métodos de verificación y criterios de aceptación.
  BC-1770.20:
    name: Gestión de arquitectura del sistema de defensa
    description: |
      Arquitectura del sistema, modelos y líneas de base.
  BC-1770.20.10:
    name: Modelado de arquitectura operacional y del sistema
    description: |
      Modelado de arquitecturas operacionales y del sistema (DoDAF/MoDAF).
  BC-1770.20.20:
    name: Análisis de compensaciones de arquitectura
    description: |
      Análisis de compensaciones entre opciones de arquitectura.
  BC-1770.20.30:
    name: Gestión de la línea de base de arquitectura
    description: |
      Definición y control de las líneas de base de arquitectura.
  BC-1770.30:
    name: Gestión de definición de interfaces de defensa
    description: |
      Control de interfaces, documentos de control de interfaces (ICD) y planes de gestión de interfaces.
  BC-1770.30.10:
    name: Identificación de interfaces
    description: |
      Identificación de interfaces internas y externas del sistema.
  BC-1770.30.20:
    name: Gestión de documentos de control de interfaces
    description: |
      Elaboración y control de ICD e IRS.
  BC-1770.30.30:
    name: Verificación de interfaces
    description: |
      Verificación del cumplimiento de las interfaces durante la integración.
  BC-1770.40:
    name: Gestión de verificación y validación de defensa
    description: |
      Planificación, ejecución y certificación de V&V.
  BC-1770.40.10:
    name: Planificación de V&V
    description: |
      Estrategia y planificación de la verificación y validación.
  BC-1770.40.20:
    name: Ejecución de V&V
    description: |
      Ejecución de V&V mediante análisis, demostraciones, inspecciones y pruebas.
  BC-1770.40.30:
    name: Informes de resultados de V&V
    description: |
      Informes de los resultados y discrepancias de V&V.
  BC-1770.50:
    name: Gestión de configuración de defensa
    description: |
      Identificación de la configuración, control, contabilidad del estado y auditorías.
  BC-1770.50.10:
    name: Identificación de configuración de defensa
    description: |
      Identificación de la configuración conforme a MIL-HDBK-61.
  BC-1770.50.20:
    name: Control de cambios de configuración de defensa
    description: |
      Control de cambios mediante ECP, RFD y DD-1694.
  BC-1770.50.30:
    name: Contabilidad del estado de configuración de defensa
    description: |
      Contabilidad e informes del estado de configuración.
  BC-1770.50.40:
    name: Auditorías de configuración
    description: |
      Auditorías de configuración funcional y física.
  BC-1770.60:
    name: Gestión de integración del sistema de defensa
    description: |
      Integración de subsistemas, pruebas integradas e integración de sistemas de sistemas.
  BC-1770.60.10:
    name: Ejecución de la integración de subsistemas
    description: |
      Ejecución de las secuencias de integración de subsistemas.
  BC-1770.60.20:
    name: Ejecución de pruebas integradas
    description: |
      Ejecución de pruebas integradas en entornos de laboratorio y campo.
  BC-1770.60.30:
    name: Integración de sistemas de sistemas
    description: |
      Integración con sistemas de sistemas más amplios y arquitecturas conjuntas.

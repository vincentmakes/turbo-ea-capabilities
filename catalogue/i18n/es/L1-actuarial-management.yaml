locale: es
source: L1-actuarial-management.yaml
entries:
  BC-2180:
    name: Gestión actuarial
    description: |
      Modelos de tarificación, provisiones técnicas, estudios de experiencia, modelado de capital
      y solvencia, apoyo al reporte actuarial bajo IFRS 17 y modelado de catástrofes.
  BC-2180.10:
    name: Tarificación actuarial
    description: |
      Modelado del costo de siniestros, análisis de suficiencia de precios, indicación de tarifas
      y apoyo en la documentación de tarifas presentadas.
  BC-2180.10.10:
    name: Modelado del costo de siniestros
    description: |
      Modelado del costo de siniestros por segmento, riesgo cubierto y cobertura.
  BC-2180.10.20:
    name: Análisis de suficiencia de precios
    description: |
      Análisis de la suficiencia de precios frente a las pérdidas esperadas y las cargas de gastos.
  BC-2180.10.30:
    name: Producción de indicaciones de tarifa
    description: |
      Producción de indicaciones de tarifa para los comités de producto y precios.
  BC-2180.10.40:
    name: Apoyo en la documentación de tarifas presentadas
    description: |
      Producción de memorandos y anexos actuariales que respaldan los expedientes de tarifas.
  BC-2180.20:
    name: Gestión actuarial de provisiones técnicas
    description: |
      Triangulación de pérdidas, estimación del IBNR, provisiones ULAE y ALAE,
      y documentación de aprobación de provisiones.
  BC-2180.20.10:
    name: Triangulación y desarrollo de pérdidas
    description: |
      Construcción de triángulos de pérdidas y selección de factores de desarrollo.
  BC-2180.20.20:
    name: Estimación del IBNR
    description: |
      Estimación de las provisiones de siniestros incurridos pero no reportados en las carteras.
  BC-2180.20.30:
    name: Provisiones ULAE y ALAE
    description: |
      Dotación de provisiones para gastos de liquidación no asignados y asignados.
  BC-2180.20.40:
    name: Documentación de aprobación de provisiones
    description: |
      Producción de documentación del comité de provisiones y declaraciones de opinión.
  BC-2180.30:
    name: Modelado de capital y solvencia
    description: |
      Desarrollo de modelos internos de capital, cálculo de la fórmula estándar,
      asignación de capital y apoyo en el ORSA.
  BC-2180.30.10:
    name: Desarrollo del modelo interno de capital
    description: |
      Desarrollo y mantenimiento de modelos internos de capital para solvencia y calificación.
  BC-2180.30.20:
    name: Cálculo de la fórmula estándar
    description: |
      Cálculo de la fórmula estándar de Solvency II y métricas de capital regulatorio equivalentes.
  BC-2180.30.30:
    name: Asignación de capital
    description: |
      Asignación del capital requerido a ramos de negocio y segmentos.
  BC-2180.30.40:
    name: Apoyo al modelado del ORSA
    description: |
      Apoyo al modelado para los ejercicios de ORSA.
  BC-2180.40:
    name: Estudios de experiencia y gestión de hipótesis
    description: |
      Estudios de mortalidad, longevidad, caducidad, persistencia y morbilidad,
      y gobernanza de hipótesis.
  BC-2180.40.10:
    name: Estudios de mortalidad y longevidad
    description: |
      Estudios de experiencia de mortalidad y longevidad para carteras de vida y pensiones.
  BC-2180.40.20:
    name: Estudios de caducidad y persistencia
    description: |
      Estudios de experiencia de caducidad y persistencia en cohortes de productos.
  BC-2180.40.30:
    name: Estudios de morbilidad y frecuencia de siniestros
    description: |
      Estudios de experiencia de morbilidad y frecuencia de siniestros para ramos de salud y protección.
  BC-2180.40.40:
    name: Gobernanza y aprobación de hipótesis
    description: |
      Gobernanza y aprobación de las hipótesis actuariales utilizadas en tarificación, provisiones e informes.
  BC-2180.50:
    name: Apoyo al reporte actuarial bajo IFRS 17
    description: |
      Margen de servicio contractual, ajuste por riesgo, construcción de cohortes y producción
      de revelaciones bajo IFRS 17.
  BC-2180.50.10:
    name: Cálculo del CSM y el ajuste por riesgo
    description: |
      Cálculo del margen de servicio contractual (CSM) y el ajuste por riesgo para IFRS 17.
  BC-2180.50.20:
    name: Construcción de cohortes y grupos
    description: |
      Construcción de grupos de contratos de seguro y cohortes anuales.
  BC-2180.50.30:
    name: Producción de revelaciones bajo IFRS 17
    description: |
      Producción de insumos actuariales para las revelaciones y conciliaciones bajo IFRS 17.
  BC-2180.60:
    name: Modelado de catástrofes
    description: |
      Gestión de proveedores de modelos CAT, preparación de datos de exposición,
      cálculo de PML y AAL, y validación de modelos.
  BC-2180.60.10:
    name: Gestión de proveedores de modelos CAT
    description: |
      Selección y gestión de proveedores de modelos CAT y carteras de licencias.
  BC-2180.60.20:
    name: Preparación de datos de exposición
    description: |
      Preparación y acondicionamiento de datos de exposición para corridas de modelos CAT.
  BC-2180.60.30:
    name: Cálculo de PML y AAL
    description: |
      Cálculo de las métricas de pérdida máxima probable (PML) y pérdida anual promedio (AAL).
  BC-2180.60.40:
    name: Validación y ajuste del modelo CAT
    description: |
      Validación y ajuste de los resultados del modelo CAT según la visión del riesgo del asegurador.

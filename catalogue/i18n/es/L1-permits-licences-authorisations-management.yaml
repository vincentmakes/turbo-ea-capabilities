locale: es
source: L1-permits-licences-authorisations-management.yaml
entries:
  BC-3240:
    name: Gestión de permisos, licencias y autorizaciones
    description: |
      Expedición, renovación, suspensión, revocación y mantenimiento del registro de permisos,
      licencias y autorizaciones concedidos por la administración a personas, empresas y actividades,
      incluidos los permisos profesionales, medioambientales, ocupacionales y operativos.
  BC-3240.10:
    name: Recepción y triaje de solicitudes
    description: |
      Recepción, verificación de integridad y triaje de solicitudes de permisos, licencias
      y autorizaciones.
  BC-3240.10.10:
    name: Presentación de solicitudes
    description: |
      Presentación multicanal de solicitudes de permisos y licencias.
  BC-3240.10.20:
    name: Verificación de integridad
    description: |
      Verificación de que las presentaciones están completas y cumplen los requisitos documentales.
  BC-3240.10.30:
    name: Derivación de solicitudes
    description: |
      Derivación de solicitudes a la autoridad de concesión y al revisor competentes.
  BC-3240.10.40:
    name: Evaluación y cobro de tasas
    description: |
      Evaluación y cobro de las tasas de solicitud y de licencia establecidas por ley.
  BC-3240.20:
    name: Evaluación de elegibilidad y cualificación
    description: |
      Evaluación de la idoneidad, las cualificaciones y los criterios legales del solicitante
      para el permiso o la licencia solicitados.
  BC-3240.20.10:
    name: Evaluación de idoneidad e integridad
    description: |
      Evaluación de la idoneidad, la integridad y los antecedentes inhabilitantes del solicitante.
  BC-3240.20.20:
    name: Verificación de cualificaciones
    description: |
      Verificación de las cualificaciones, competencias y requisitos previos para la licencia.
  BC-3240.20.30:
    name: Coordinación de verificaciones de antecedentes
    description: |
      Coordinación de verificaciones de antecedentes, de antecedentes penales y controles de
      seguridad cuando sea necesario.
  BC-3240.20.40:
    name: Evaluación de interés público
    description: |
      Evaluación de los criterios legales de interés público, medioambientales o de uso del suelo.
  BC-3240.30:
    name: Operaciones de expedición y renovación
    description: |
      Decisión, expedición y renovación de permisos, licencias y autorizaciones, incluidas las
      condiciones, el plazo y las credenciales.
  BC-3240.30.10:
    name: Decisión de concesión de licencias
    description: |
      Toma de decisiones sobre la concesión, denegación o concesión condicional de permisos y
      licencias.
  BC-3240.30.20:
    name: Expedición de credenciales
    description: |
      Producción y expedición de credenciales de licencia físicas y digitales.
  BC-3240.30.30:
    name: Tramitación de renovaciones
    description: |
      Tramitación de solicitudes de renovación y verificaciones de elegibilidad continuada.
  BC-3240.30.40:
    name: Tramitación de modificaciones y habilitaciones
    description: |
      Tramitación de modificaciones, habilitaciones y cambios de condiciones.
  BC-3240.40:
    name: Inspección y verificación del cumplimiento
    description: |
      Inspección, auditoría y verificación del cumplimiento por el titular de la licencia de
      las condiciones del permiso y las obligaciones legales.
  BC-3240.40.10:
    name: Planificación de inspecciones
    description: |
      Planificación y programación basadas en riesgos de las inspecciones de cumplimiento.
  BC-3240.40.20:
    name: Ejecución de inspecciones de campo
    description: |
      Realización de inspecciones in situ y captura de evidencias.
  BC-3240.40.30:
    name: Revisión de informes de cumplimiento
    description: |
      Revisión de los informes de cumplimiento obligatorios y las autocertificaciones presentados
      por los titulares de licencias.
  BC-3240.50:
    name: Suspensión, revocación y sanción
    description: |
      Acciones de cumplimiento, incluidas advertencias, suspensión, revocación, sanción económica
      y penalización de los titulares incumplidores.
  BC-3240.50.10:
    name: Investigación de incumplimiento
    description: |
      Investigación de presuntos incumplimientos de las condiciones de la licencia.
  BC-3240.50.20:
    name: Decisión de medida de cumplimiento
    description: |
      Toma de decisiones sobre las medidas de cumplimiento, que van desde advertencias hasta
      la revocación.
  BC-3240.50.30:
    name: Emisión de sanciones económicas
    description: |
      Emisión, registro y cobro de sanciones económicas.
  BC-3240.50.40:
    name: Ejecución de suspensión y revocación
    description: |
      Ejecución de las órdenes de suspensión y revocación y retirada de credenciales.
  BC-3240.60:
    name: Gestión del registro de licencias
    description: |
      Mantenimiento y divulgación pública de los registros de permisos y licencias expedidos,
      suspendidos y revocados.
  BC-3240.60.10:
    name: Mantenimiento del registro
    description: |
      Mantenimiento de los registros autorizados de licencias y permisos.
  BC-3240.60.20:
    name: Divulgación del registro público
    description: |
      Publicación de los registros públicos y servicios de búsqueda.
  BC-3240.60.30:
    name: Servicios de verificación del registro
    description: |
      Prestación de servicios de verificación de credenciales a partes que confían en ellas.

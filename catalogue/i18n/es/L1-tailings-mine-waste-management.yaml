locale: es
source: L1-tailings-mine-waste-management.yaml
entries:
  BC-4460:
    name: Gestión de relaves y residuos mineros
    description: |
      Administración del ciclo de vida de depósitos de relaves, botaderos de
      estéril, agua minera y residuos mineros peligrosos bajo el Estándar
      Global de la Industria sobre la Gestión de Relaves y regímenes
      regulatorios equivalentes.

  BC-4460.10:
    name: Ingeniería de instalaciones de almacenamiento de relaves
    description: |
      Diseño de ingeniería y planificación del ciclo de vida de instalaciones
      de almacenamiento de relaves, incluyendo selección de sitio, construcción
      de diques y diseño orientado al cierre.
    in_scope:
      - Selección de sitio y diseño conceptual
      - Ingeniería de elevación y construcción de diques
      - Planificación de deposición y modelado de playas
    out_of_scope:
      - Deposición operativa de relaves (BC-4460.20)
      - Monitoreo con instrumentación de relaves (BC-4460.30)

  BC-4460.10.10:
    name: Selección de sitio para instalación de almacenamiento de relaves
    description: |
      Selección de sitio multicriteria y análisis de alternativas para
      instalaciones de relaves nuevas y ampliadas.

  BC-4460.10.20:
    name: Ingeniería de construcción de diques
    description: |
      Diseño de ingeniería y aseguramiento de la calidad de construcción de
      terraplenes de diques de relaves.

  BC-4460.10.30:
    name: Planificación de deposición de relaves
    description: |
      Planificación de secuencias de deposición, desarrollo de playas y
      ubicación de la laguna.

  BC-4460.10.40:
    name: Diseño de instalaciones orientado al cierre
    description: |
      Diseño de instalaciones de relaves orientado al cierre a largo plazo y a
      la forma final segura del terreno.

  BC-4460.20:
    name: Operaciones de relaves
    description: |
      Deposición operativa de relaves en instalaciones de almacenamiento,
      incluyendo el manejo de relaves en pulpa, pasta y filtrados, y la
      recuperación de agua.

  BC-4460.20.10:
    name: Transporte de pulpa de relaves
    description: |
      Operación de tuberías, estaciones de bombeo y sistemas de distribución de
      relaves.

  BC-4460.20.20:
    name: Operaciones de deposición de relaves
    description: |
      Deposición operativa de relaves en la instalación de almacenamiento
      conforme al plan de deposición.

  BC-4460.20.30:
    name: Recuperación de agua de relaves
    description: |
      Recuperación del agua de decantación y filtraciones de las instalaciones
      de relaves para su reutilización.

  BC-4460.20.40:
    name: Operaciones de relaves filtrados y apilados en seco
    description: |
      Operación de plantas de relaves filtrados y colocación en pilas secas.

  BC-4460.30:
    name: Vigilancia de relaves y seguridad de diques
    description: |
      Vigilancia, gobernanza y preparación de emergencias de instalaciones de
      relaves bajo el GISTM y regímenes equivalentes de seguridad de diques.

  BC-4460.30.10:
    name: Monitoreo con instrumentación geotécnica
    description: |
      Monitoreo de piezómetros, inclinómetros y prismas de topografía en
      instalaciones de relaves.

  BC-4460.30.20:
    name: Coordinación de revisión independiente de relaves
    description: |
      Contratación y coordinación de paneles de revisión independiente de
      relaves e ingenieros de registro.

  BC-4460.30.30:
    name: Preparación de emergencias de relaves
    description: |
      Planificación de preparación y respuesta ante emergencias para escenarios
      de rotura de diques de relaves.

  BC-4460.30.40:
    name: Informes de conformidad con estándares de relaves
    description: |
      Informes de conformidad con el Estándar Global de la Industria sobre la
      Gestión de Relaves y reguladores equivalentes.

  BC-4460.40:
    name: Gestión de roca estéril
    description: |
      Caracterización y gestión operativa de botaderos de roca estéril, incluyendo
      controles de drenaje ácido y con metales.

  BC-4460.40.10:
    name: Caracterización de roca estéril
    description: |
      Caracterización geoquímica de la roca estéril para evaluar el potencial de
      drenaje ácido y con metales.

  BC-4460.40.20:
    name: Operaciones de botaderos de roca estéril
    description: |
      Colocación operativa de roca estéril en botaderos diseñados y áreas de
      relleno.

  BC-4460.40.30:
    name: Gestión de drenaje ácido y con metales
    description: |
      Prevención, captura y tratamiento del drenaje ácido y con metales
      proveniente de roca estéril y pilas de mineral.

  BC-4460.50:
    name: Gestión del agua minera
    description: |
      Balance hídrico a escala de sitio, tratamiento y cumplimiento normativo
      de vertidos de agua minera.

  BC-4460.50.10:
    name: Operaciones de balance hídrico minero
    description: |
      Gestión operativa de los balances hídricos del sitio en sistemas de agua
      de pit, subterránea y de proceso.

  BC-4460.50.20:
    name: Tratamiento de agua minera
    description: |
      Operación de plantas de tratamiento de agua minera con cal, ósmosis
      inversa y procesos biológicos.

  BC-4460.50.30:
    name: Monitoreo del cumplimiento de vertido de agua
    description: |
      Monitoreo e informes del vertido de agua frente a las condiciones de la
      licencia ambiental.

  BC-4460.60:
    name: Gestión de residuos mineros peligrosos
    description: |
      Gestión de residuos de reactivos de proceso, residuos con cianuro y
      residuos con metales pesados.

  BC-4460.60.10:
    name: Disposición de residuos de reactivos
    description: |
      Disposición de reactivos de proceso agotados y envases contaminados.

  BC-4460.60.20:
    name: Gestión de residuos de cianuro
    description: |
      Detoxificación y gestión de relaves y residuos de proceso con cianuro.

  BC-4460.60.30:
    name: Gestión de residuos con mercurio y metales pesados
    description: |
      Gestión de residuos con mercurio, arsénico y otros metales pesados
      provenientes del procesamiento y la refinación.

locale: es
source: L1-wholesale-interconnect-roaming-management.yaml
entries:
  BC-2680:
    name: Interconexión mayorista y roaming
    description: |
      Servicios mayoristas de telecomunicaciones a otros operadores y socios, incluyendo
      productos y precios mayoristas, asociaciones MVNO y MVNE, interconexión y peering,
      relaciones con socios de roaming, liquidación entre operadores y acuerdos de
      capacidad como IRU y fibra oscura.
  BC-2680.10:
    name: Gestión de productos y precios mayoristas
    description: |
      Definición, tarificación y negociación comercial de ofertas mayoristas a
      operadores, MVNOs y grandes socios.
  BC-2680.10.10:
    name: Diseño de tarifas mayoristas
    description: |
      Diseño de tarifas mayoristas para productos de voz, datos, mensajería y capacidad.
  BC-2680.10.20:
    name: Publicación de ofertas mayoristas
    description: |
      Publicación de ofertas mayoristas en canales orientados a socios y ofertas de
      referencia exigidas por los reguladores.
  BC-2680.10.30:
    name: Negociación comercial mayorista
    description: |
      Negociación comercial bilateral de acuerdos mayoristas y condiciones a medida.
  BC-2680.20:
    name: Gestión de asociaciones MVNO y MVNE
    description: |
      Incorporación y gestión continua de socios MVNO y MVNE, incluyendo integración
      BSS y gobernanza comercial.
  BC-2680.20.10:
    name: Incorporación de MVNO
    description: |
      Incorporación de nuevos socios MVNO y MVNE conforme a criterios comerciales,
      regulatorios y de preparación técnica.
  BC-2680.20.20:
    name: Integración BSS de MVNO
    description: |
      Integración de socios MVNO con el BSS del operador anfitrión para
      aprovisionamiento, tarificación e informes.
  BC-2680.20.30:
    name: Gestión comercial de MVNO
    description: |
      Gobernanza comercial continua, revisiones de rendimiento y gestión de salida de
      socios MVNO.
  BC-2680.30:
    name: Gestión de acuerdos de interconexión
    description: |
      Gestión de acuerdos de interconexión de voz e IP, incluyendo peering y tránsito.
  BC-2680.30.10:
    name: Gestión de acuerdos de peering
    description: |
      Gestión de acuerdos de peering IP y sus condiciones comerciales y operativas.
  BC-2680.30.20:
    name: Gestión de acuerdos de tránsito
    description: |
      Gestión de acuerdos de tránsito de voz e IP con proveedores upstream.
  BC-2680.30.30:
    name: Medición del intercambio de tráfico
    description: |
      Medición de los volúmenes de tráfico intercambiados con socios de peering y de
      tránsito para liquidación e ingeniería.
  BC-2680.40:
    name: Gestión de socios de roaming
    description: |
      Establecimiento y operación de relaciones de roaming con redes de socios
      internacionales.
  BC-2680.40.10:
    name: Gestión de acuerdos de roaming
    description: |
      Negociación y gestión del ciclo de vida de acuerdos de roaming bilaterales.
  BC-2680.40.20:
    name: Intercambio de ficheros TAP
    description: |
      Intercambio de ficheros TAP con socios de roaming para la liquidación de uso.
  BC-2680.40.30:
    name: Incorporación de socios de roaming
    description: |
      Incorporación técnica y comercial de nuevos socios de roaming, incluidas las
      pruebas IREG y TADIG.
  BC-2680.50:
    name: Gestión de la liquidación entre operadores
    description: |
      Liquidación del uso entre operadores y gestión de disputas para roaming e
      interconexión.
  BC-2680.50.10:
    name: Liquidación TAP y NRTRDE
    description: |
      Liquidación del uso de roaming basada en registros TAP y NRTRDE en tiempo casi
      real.
  BC-2680.50.20:
    name: Facturación de interconexión
    description: |
      Facturación a socios de interconexión por tráfico terminante, originante y de
      tránsito.
  BC-2680.50.30:
    name: Resolución de disputas de liquidación
    description: |
      Resolución de disputas planteadas sobre extractos de liquidación entre operadores.
  BC-2680.50.40:
    name: Reconciliación de liquidación
    description: |
      Reconciliación de los registros de liquidación entre operadores con la contabilidad
      interna y tesorería.
  BC-2680.60:
    name: Gestión de capacidad mayorista e IRU
    description: |
      Acuerdos de capacidad mayorista a largo plazo, incluidos los derechos de uso
      indefeasibles y arrendamientos de fibra oscura.
  BC-2680.60.10:
    name: Gestión de derechos de uso indefeasibles
    description: |
      Venta y compra de derechos de uso indefeasibles en capacidad de larga distancia y
      submarina.
  BC-2680.60.20:
    name: Gestión de fibra oscura
    description: |
      Arrendamiento y gestión de hilos de fibra oscura hacia y desde socios.
  BC-2680.60.30:
    name: Gestión de arrendamientos de capacidad
    description: |
      Gestión de arrendamientos de capacidad recurrentes en rutas metro, larga distancia
      y submarinas.

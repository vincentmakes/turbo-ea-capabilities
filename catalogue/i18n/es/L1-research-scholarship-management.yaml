locale: es
source: L1-research-scholarship-management.yaml
entries:
  BC-4780:
    name: Gestión de investigación y becas
    description: |
      Gestión de la misión investigadora de la educación superior, abarcando la
      estrategia de cartera, el ciclo de vida de las subvenciones, la supervisión
      de la ética e integridad, los resultados académicos, la colaboración
      investigadora y la evaluación del impacto.
  BC-4780.10:
    name: Cartera y estrategia de investigación
    description: |
      Configuración estratégica de la cartera de investigación institucional en
      temas, centros e inversiones en capacidades.
    in_scope:
      - Estrategia de temas y centros de investigación
      - Planificación de inversiones en capacidades de investigación
      - Informes de rendimiento de la investigación
    out_of_scope:
      - Gestión genérica de carteras de proyectos (cubierta en Gestión de cartera de proyectos transversal)
  BC-4780.10.10:
    name: Estrategia de temas y centros de investigación
    description: |
      Estrategia para los temas, centros e institutos de investigación.
  BC-4780.10.20:
    name: Planificación de inversiones en capacidades de investigación
    description: |
      Planificación de las inversiones en capacidades de investigación, incluyendo
      infraestructura y personal.
  BC-4780.10.30:
    name: Informes de rendimiento de la investigación
    description: |
      Informes internos y externos sobre el rendimiento de la investigación.
  BC-4780.20:
    name: Gestión de subvenciones de investigación
    description: |
      Gestión integral de las subvenciones y contratos de investigación, desde la
      identificación de oportunidades hasta la administración posterior a la concesión.
    in_scope:
      - Identificación de oportunidades de subvención
      - Desarrollo de propuestas en la fase previa a la concesión
      - Administración de subvenciones en la fase posterior a la concesión
    out_of_scope:
      - Gestión financiera general (cubierta en Gestión financiera transversal)
  BC-4780.20.10:
    name: Identificación de oportunidades de subvención
    description: |
      Identificación de convocatorias de subvenciones y fuentes de financiación
      para los investigadores.
  BC-4780.20.20:
    name: Desarrollo de propuestas en la fase previa a la concesión
    description: |
      Elaboración de propuestas de subvención, presupuestos y expedientes de
      presentación.
  BC-4780.20.30:
    name: Administración de subvenciones en la fase posterior a la concesión
    description: |
      Administración posterior a la concesión de las subvenciones obtenidas,
      incluyendo los informes y el cumplimiento normativo.
  BC-4780.30:
    name: Supervisión de la ética e integridad en la investigación
    description: |
      Supervisión independiente de la ética e integridad de la investigación, incluyendo
      la revisión de la investigación con seres humanos y animales y la investigación
      de conducta indebida.
    in_scope:
      - Revisión de investigación con sujetos humanos (CEI/CEE)
      - Supervisión de investigación animal (IACUC/AWERB)
      - Investigación de conducta indebida en investigación
    out_of_scope:
      - Casos de fraude académico en evaluaciones (cubiertos en Gestión de evaluación y exámenes)
  BC-4780.30.10:
    name: Revisión de investigación con sujetos humanos
    description: |
      Revisión independiente de la investigación que involucra a sujetos humanos.
  BC-4780.30.20:
    name: Supervisión de investigación animal
    description: |
      Supervisión de la investigación que involucra a sujetos animales.
  BC-4780.30.30:
    name: Investigación de conducta indebida en investigación
    description: |
      Investigación de las denuncias de conducta indebida en investigación.
  BC-4780.40:
    name: Gestión de publicaciones y producción académica
    description: |
      Seguimiento y gestión de la producción académica, incluyendo publicaciones,
      acceso abierto e identificadores persistentes.
    in_scope:
      - Seguimiento de publicaciones
      - Gestión del acceso abierto y repositorios
      - Gestión de identificadores persistentes (ORCID, DOI)
    out_of_scope:
      - Comercialización de la propiedad intelectual (cubierta en Gestión de propiedad intelectual transversal)
  BC-4780.40.10:
    name: Seguimiento de publicaciones
    description: |
      Seguimiento de las publicaciones y resultados de los investigadores.
  BC-4780.40.20:
    name: Gestión del acceso abierto y repositorios
    description: |
      Gestión de la publicación en acceso abierto y los repositorios institucionales.
  BC-4780.40.30:
    name: Gestión de identificadores persistentes
    description: |
      Gestión de los identificadores persistentes de investigadores y resultados.
  BC-4780.50:
    name: Gestión de colaboraciones y alianzas de investigación
    description: |
      Establecimiento y operación de alianzas de investigación con la academia,
      la industria y colaboradores internacionales.
    in_scope:
      - Acuerdos de investigación interinstitucionales
      - Alianzas de investigación con la industria
      - Colaboración internacional en investigación
    out_of_scope:
      - Relaciones comerciales con proveedores (cubiertas en Gestión de proveedores transversal)
  BC-4780.50.10:
    name: Gestión de acuerdos de investigación interinstitucionales
    description: |
      Gestión de los acuerdos de investigación con instituciones pares.
  BC-4780.50.20:
    name: Gestión de alianzas de investigación con la industria
    description: |
      Gestión de las alianzas de investigación con la industria y la investigación
      patrocinada.
  BC-4780.50.30:
    name: Colaboración internacional en investigación
    description: |
      Establecimiento y operación de colaboraciones internacionales de investigación.
  BC-4780.60:
    name: Impacto y evaluación de la investigación
    description: |
      Evaluación del impacto de la investigación mediante estudios de caso, bibliometría
      y participación en los ejercicios nacionales de evaluación de la investigación.
    in_scope:
      - Estudios de caso de impacto de la investigación
      - Análisis bibliométrico y altmétrico
      - Presentación a la evaluación nacional de la investigación (p. ej., REF)
    out_of_scope:
      - Revisiones de acreditación académica (cubiertas en Gestión de calidad académica y acreditación)
  BC-4780.60.10:
    name: Estudios de caso de impacto de la investigación
    description: |
      Elaboración de estudios de caso del impacto de la investigación.
  BC-4780.60.20:
    name: Análisis bibliométrico y altmétrico
    description: |
      Análisis bibliométrico y altmétrico de la producción y el alcance de la
      investigación.
  BC-4780.60.30:
    name: Presentación a la evaluación nacional de la investigación
    description: |
      Presentación a los ejercicios nacionales de evaluación de la investigación.

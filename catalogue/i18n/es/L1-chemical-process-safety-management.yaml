locale: es
source: L1-chemical-process-safety-management.yaml
entries:
  BC-4640:
    name: Gestión de seguridad de procesos químicos
    description: |
      Prevención de accidentes graves en procesos químicos reactivos, inflamables y tóxicos: análisis de peligros de proceso, integridad mecánica, sistemas instrumentados de seguridad, peligros reactivos y combustibles, informes de desempeño y respuesta a emergencias. Distinta de la gestión de HSE transversal (BC-730), que abarca salud laboral, medio ambiente y seguridad personal.
  BC-4640.10:
    name: Análisis de peligros de proceso
    description: |
      Identificación y análisis estructurado de peligros de accidente grave a lo largo del ciclo de vida del activo.
    in_scope:
      - Análisis HAZID, HAZOP, LOPA y de árbol de causas y efectos
      - Evaluación cuantitativa del riesgo
    out_of_scope:
      - Evaluación del riesgo de seguridad personal (BC-730)
  BC-4640.10.10:
    name: Estudios HAZOP
    description: |
      Estudios de Peligro y Operabilidad en instalaciones nuevas y modificadas.
  BC-4640.10.20:
    name: Estudios HAZID
    description: |
      Estudios de Identificación de Peligros durante las fases tempranas de concepto y diseño.
  BC-4640.10.30:
    name: Estudios LOPA
    description: |
      Análisis de Capas de Protección para definir los niveles de integridad de seguridad.
  BC-4640.10.40:
    name: Análisis de árbol de causas y efectos
    description: |
      Análisis de árbol de causas y efectos para mapear barreras frente a escenarios de accidente grave.
  BC-4640.10.50:
    name: Evaluación cuantitativa del riesgo
    description: |
      Evaluación cuantitativa del riesgo de escenarios de accidente grave.
  BC-4640.20:
    name: Gestión de integridad mecánica
    description: |
      Inspección y gestión de integridad de equipos a presión y dispositivos de alivio de seguridad.
  BC-4640.20.10:
    name: Inspección de recipientes a presión
    description: |
      Inspección basada en riesgo de recipientes a presión según API 510.
  BC-4640.20.20:
    name: Inspección de integridad de tuberías de proceso
    description: |
      Inspección de tuberías de proceso según API 570 y ASME B31.3.
  BC-4640.20.30:
    name: Inspección de tanques de almacenamiento
    description: |
      Inspección de tanques de almacenamiento atmosférico y a presión según API 653.
  BC-4640.20.40:
    name: Gestión de dispositivos de alivio de presión
    description: |
      Dimensionado, prueba y gestión del ciclo de vida de válvulas de alivio y discos de ruptura.
  BC-4640.20.50:
    name: Integridad de venteos atmosféricos y antorchas
    description: |
      Aseguramiento de la integridad de venteos atmosféricos, depuradores y antorchas.
  BC-4640.30:
    name: Gestión de sistemas instrumentados de seguridad
    description: |
      Gestión del ciclo de vida de seguridad funcional de sistemas instrumentados de seguridad según IEC 61511.
  BC-4640.30.10:
    name: Determinación del SIL
    description: |
      Determinación de los Niveles de Integridad de Seguridad para las funciones de protección.
  BC-4640.30.20:
    name: Verificación de funciones de seguridad
    description: |
      Verificación de que las SIF diseñadas cumplen el SIL requerido.
  BC-4640.30.30:
    name: Pruebas de verificación del SIS
    description: |
      Pruebas de verificación periódicas de los sistemas instrumentados de seguridad.
  BC-4640.30.40:
    name: Evaluación de seguridad funcional
    description: |
      Evaluaciones de Seguridad Funcional en las puertas del ciclo de vida.
  BC-4640.40:
    name: Gestión de peligros reactivos y combustibles
    description: |
      Identificación y control de peligros de química reactiva, reacción desbocada, polvo combustible y fuentes de ignición.
  BC-4640.40.10:
    name: Evaluación del riesgo de química reactiva
    description: |
      Evaluación de los riesgos de química reactiva, incluyendo incompatibilidades.
  BC-4640.40.20:
    name: Prevención de reacciones desbocadas
    description: |
      Prevención y mitigación de reacciones exotérmicas desbocadas.
  BC-4640.40.30:
    name: Control de peligros de polvo combustible
    description: |
      Control de peligros de polvo combustible según NFPA 654.
  BC-4640.40.40:
    name: Control de electricidad estática y fuentes de ignición
    description: |
      Control de fuentes de ignición electrostáticas y de otro tipo en áreas de proceso.
  BC-4640.50:
    name: Gestión del cambio en seguridad de procesos
    description: |
      Gobernanza de la seguridad de procesos sobre cambios en planta, procedimientos y personal, incluyendo la revisión de seguridad previa al arranque.
  BC-4640.50.10:
    name: Revisión de solicitudes de cambio PSM
    description: |
      Revisión de solicitudes de cambio con impacto en PSM frente a estándares de peligros.
  BC-4640.50.20:
    name: Revisión de seguridad previa al arranque
    description: |
      Revisiones de seguridad previas al arranque para instalaciones nuevas y modificadas.
  BC-4640.50.30:
    name: Gestión de cambios temporales
    description: |
      Gestión de cambios temporales de proceso dentro de su ventana autorizada.
  BC-4640.60:
    name: Gestión del desempeño en seguridad de procesos
    description: |
      Seguimiento e informe de indicadores de seguridad de proceso adelantados y rezagados según el marco CCPS RBPS y equivalentes.
  BC-4640.60.10:
    name: Informe de eventos de seguridad de proceso de nivel 1 y 2
    description: |
      Registro e informe de eventos de seguridad de proceso de Nivel 1 y Nivel 2.
  BC-4640.60.20:
    name: Monitorización de indicadores adelantados
    description: |
      Monitorización de indicadores de seguridad de proceso adelantados de Nivel 3 y Nivel 4.
  BC-4640.60.30:
    name: Informe de KPI de seguridad de procesos
    description: |
      Informe externo e interno del desempeño de los KPI de seguridad de procesos.
  BC-4640.70:
    name: Preparación y respuesta ante emergencias
    description: |
      Planificación de la respuesta ante emergencias, ejecución de simulacros y coordinación de la respuesta ante liberaciones tóxicas para escenarios de accidente grave.
  BC-4640.70.10:
    name: Planificación de la respuesta ante emergencias
    description: |
      Mantenimiento de los planes de respuesta ante emergencias de instalación y corporativos.
  BC-4640.70.20:
    name: Coordinación de simulacros y ejercicios
    description: |
      Coordinación de simulacros de emergencia y ejercicios de incidente grave.
  BC-4640.70.30:
    name: Coordinación de la respuesta ante liberaciones tóxicas
    description: |
      Coordinación de las operaciones de respuesta ante liberaciones tóxicas e inflamables.
  BC-4640.70.40:
    name: Coordinación de ayuda mutua
    description: |
      Coordinación de la ayuda mutua con cooperativas de respuesta del sector.
  BC-4640.80:
    name: Procedimientos operativos de seguridad de procesos
    description: |
      Elaboración, revisión y definición de la envolvente operativa para procedimientos críticos para la seguridad de procesos.
  BC-4640.80.10:
    name: Elaboración de procedimientos críticos de seguridad
    description: |
      Elaboración de procedimientos operativos críticos para la seguridad de procesos.
  BC-4640.80.20:
    name: Definición de la envolvente operativa segura
    description: |
      Definición de envolventes operativas seguras para las unidades de proceso.
  BC-4640.80.30:
    name: Revisión periódica de procedimientos
    description: |
      Revisión y actualización periódica de los procedimientos de seguridad de procesos.

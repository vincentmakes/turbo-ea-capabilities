locale: es
source: L1-pharmacy-medication-management.yaml
entries:
  BC-2850:
    name: Gestión de farmacia y medicación
    description: |
      Operaciones farmacéuticas del proveedor, incluyendo formulario, dispensación hospitalaria
      y ambulatoria, administración y conciliación de medicamentos, gestión de sustancias controladas
      y servicios farmacéuticos clínicos.
  BC-2850.10:
    name: Gestión del formulario
    description: |
      Gestión del formulario de medicamentos, intercambio terapéutico y respuesta a desabastecimientos.
  BC-2850.10.10:
    name: Toma de decisiones sobre el formulario
    description: |
      Decisiones de inclusión, exclusión y nivel de medicamentos en el formulario basadas en evidencia.
  BC-2850.10.20:
    name: Intercambio terapéutico
    description: |
      Gestión y ejecución de protocolos de intercambio terapéutico.
  BC-2850.10.30:
    name: Apoyo al comité de farmacia y terapéutica
    description: |
      Apoyo operativo al Comité de Farmacia y Terapéutica.
  BC-2850.10.40:
    name: Gestión de desabastecimiento de medicamentos
    description: |
      Identificación, mitigación y planificación de sustituciones ante desabastecimientos de medicamentos.
  BC-2850.20:
    name: Operaciones de farmacia hospitalaria
    description: |
      Verificación de órdenes, preparación estéril y no estéril, dispensación
      y preparación de mezclas intravenosas para los servicios hospitalarios.
  BC-2850.20.10:
    name: Verificación de órdenes
    description: |
      Verificación farmacéutica de las órdenes de medicación para garantizar la seguridad y la idoneidad.
  BC-2850.20.20:
    name: Preparación estéril
    description: |
      Operaciones de preparación estéril, incluyendo la preparación de medicamentos peligrosos.
  BC-2850.20.30:
    name: Dispensación unidosis
    description: |
      Preparación y dispensación unidosis para la administración hospitalaria.
  BC-2850.20.40:
    name: Preparación de mezclas intravenosas
    description: |
      Preparación de mezclas intravenosas, infusiones y nutrición parenteral.
  BC-2850.30:
    name: Operaciones de farmacia ambulatoria y especializada
    description: |
      Operaciones de farmacia minorista, especializada y de pedidos por correo, incluyendo
      programas de medicamentos con descuento.
  BC-2850.30.10:
    name: Dispensación minorista
    description: |
      Dispensación de recetas en farmacias ambulatorias.
  BC-2850.30.20:
    name: Gestión de medicamentos especializados
    description: |
      Operaciones de farmacia especializada para medicamentos de alto coste y distribución limitada.
  BC-2850.30.30:
    name: Cumplimiento de pedidos por correo
    description: |
      Operaciones de cumplimiento y entrega de recetas por correo.
  BC-2850.30.40:
    name: Operaciones de programas de descuento de medicamentos
    description: |
      Operaciones de programas legales de descuento de medicamentos y cumplimiento de requisitos de elegibilidad.
  BC-2850.40:
    name: Administración y conciliación de medicamentos
    description: |
      Administración de medicamentos al lado del paciente, conciliación en las transiciones
      y gestión de medicamentos aportados por el paciente.
  BC-2850.40.10:
    name: Administración de medicamentos al lado del paciente
    description: |
      Administración de medicamentos al lado del paciente por enfermería con verificación por código de barras.
  BC-2850.40.20:
    name: Conciliación de medicamentos
    description: |
      Conciliación de medicamentos del domicilio y prescritos en el ingreso, traslado y alta.
  BC-2850.40.30:
    name: Operaciones del registro de administración de medicamentos
    description: |
      Operación del registro electrónico de administración de medicamentos.
  BC-2850.40.40:
    name: Gestión de medicamentos aportados por el paciente
    description: |
      Identificación, almacenamiento y administración autorizada de medicamentos aportados por el paciente.
  BC-2850.50:
    name: Gestión de sustancias controladas
    description: |
      Cumplimiento normativo, vigilancia de la desviación, inventario y eliminación de medicamentos controlados.
  BC-2850.50.10:
    name: Cumplimiento normativo de sustancias controladas
    description: |
      Cumplimiento de la normativa sobre sustancias controladas, incluyendo registro y mantenimiento de registros.
  BC-2850.50.20:
    name: Vigilancia de la desviación
    description: |
      Vigilancia e investigación de la posible desviación de medicamentos.
  BC-2850.50.30:
    name: Inventario de medicamentos controlados
    description: |
      Inventario perpetuo y conciliación de existencias de medicamentos controlados.
  BC-2850.50.40:
    name: Eliminación y destrucción de medicamentos controlados
    description: |
      Eliminación, destrucción presenciada y distribución inversa de medicamentos controlados.
  BC-2850.60:
    name: Servicios farmacéuticos clínicos
    description: |
      Servicios clínicos de farmacia, incluyendo anticoagulación, uso prudente de antimicrobianos,
      gestión de la terapia farmacológica y monitorización terapéutica de fármacos.
  BC-2850.60.10:
    name: Gestión de anticoagulación
    description: |
      Servicios de dosificación y monitorización de anticoagulantes dirigidos por farmacéuticos.
  BC-2850.60.20:
    name: Farmacia y uso prudente de antimicrobianos
    description: |
      Contribución de farmacia a los programas de uso prudente de antimicrobianos.
  BC-2850.60.30:
    name: Gestión de la terapia farmacológica
    description: |
      Consultas de gestión de la terapia farmacológica realizadas por farmacéuticos.
  BC-2850.60.40:
    name: Monitorización terapéutica de fármacos
    description: |
      Servicios de monitorización terapéutica de fármacos e individualización de dosis.

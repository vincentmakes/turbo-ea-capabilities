locale: es
source: L1-customer-success-management.yaml
entries:
  BC-4260:
    name: Gestión del éxito del cliente
    description: |
      Incorporación, adopción, seguimiento del estado del cliente, retención,
      expansión, promoción y cultivo de clientes de referencia, diferenciado
      del servicio de atención al cliente reactivo.
  BC-4260.10:
    name: Incorporación y activación del cliente
    description: |
      Incorporación estructurada de nuevos clientes hacia el primer valor y
      los hitos de activación.
    in_scope:
      - Planes de incorporación, inicio y seguimiento del tiempo hasta el valor
    out_of_scope:
      - Aprovisionamiento técnico del inquilino (tenant) (cubierto por Gestión de inquilinos SaaS)
      - Aprovisionamiento de suscripciones (cubierto por Gestión del ciclo de vida de la suscripción)
  BC-4260.10.10:
    name: Definición del plan de incorporación
    description: |
      Definición de planes de incorporación adaptados al segmento y caso
      de uso del cliente.
  BC-4260.10.20:
    name: Seguimiento de hitos de activación
    description: |
      Seguimiento de los hitos de activación conforme a los objetivos de
      tiempo hasta el valor.
  BC-4260.10.30:
    name: Coordinación de la implementación
    description: |
      Coordinación de las actividades de implementación del lado del cliente
      y la participación de socios.
  BC-4260.20:
    name: Gestión de la adopción
    description: |
      Programas que aumentan la adopción de funcionalidades y la amplitud de
      uso en toda la base de clientes.
  BC-4260.20.10:
    name: Diseño de programas de adopción
    description: |
      Diseño de programas de adopción estructurados para segmentos, productos
      y perfiles de usuario.
  BC-4260.20.20:
    name: Ejecución de campañas de adopción
    description: |
      Ejecución de campañas de adopción con puntos de contacto dentro del
      producto y de alcance externo.
  BC-4260.20.30:
    name: Habilitación de usuarios avanzados
    description: |
      Habilitación de usuarios avanzados del cliente y referentes internos.
  BC-4260.30:
    name: Gestión del estado del cliente
    description: |
      Modelado y seguimiento del estado del cliente para anticipar riesgos
      y orientar las intervenciones.
  BC-4260.30.10:
    name: Modelado de la puntuación de estado del cliente
    description: |
      Modelado de las puntuaciones de estado del cliente a partir de señales
      del producto, del soporte y comerciales.
  BC-4260.30.20:
    name: Seguimiento de señales de riesgo
    description: |
      Seguimiento de las señales de riesgo en toda la base de clientes.
  BC-4260.30.30:
    name: Intervención en cuentas en riesgo
    description: |
      Intervención coordinada en cuentas identificadas como en riesgo.
  BC-4260.40:
    name: Compromiso con el ciclo de vida del cliente
    description: |
      Puntos de contacto recurrentes del ciclo de vida, incluyendo revisiones
      de negocio, patrocinio ejecutivo y planificación de éxito conjunta.
  BC-4260.40.10:
    name: Gestión de revisiones de negocio trimestrales
    description: |
      Planificación y realización de revisiones de negocio recurrentes con
      los clientes.
  BC-4260.40.20:
    name: Programa de patrocinadores ejecutivos
    description: |
      Operación de los emparejamientos de patrocinadores ejecutivos entre
      el proveedor y el cliente.
  BC-4260.40.30:
    name: Mantenimiento del plan de éxito
    description: |
      Mantenimiento de planes de éxito conjuntos que capturan los resultados
      y los hitos del cliente.
  BC-4260.50:
    name: Promoción de la retención y la renovación
    description: |
      Promoción e intervención centradas en el proceso de renovación, incluyendo
      estrategias de retención y aportes a la previsión de renovaciones.
  BC-4260.50.10:
    name: Mitigación del riesgo de renovación
    description: |
      Mitigación de los riesgos de renovación identificados antes de la
      fecha de renovación.
  BC-4260.50.20:
    name: Ejecución de estrategias de retención
    description: |
      Ejecución de estrategias de retención en cuentas con intención de
      cancelar.
  BC-4260.50.30:
    name: Envío de previsión de renovaciones
    description: |
      Envío de previsiones de renovación basadas en señales de estado y
      compromiso del cliente.
  BC-4260.60:
    name: Promoción de la expansión y venta cruzada
    description: |
      Identificación y calificación de oportunidades de expansión y coordinación
      con ventas para la venta cruzada.
  BC-4260.60.10:
    name: Identificación de oportunidades de expansión
    description: |
      Identificación de oportunidades de expansión a partir de señales de
      uso y compromiso del cliente.
  BC-4260.60.20:
    name: Calificación de ventas adicionales
    description: |
      Calificación de oportunidades de venta adicional antes del contacto
      con el equipo de ventas.
  BC-4260.60.30:
    name: Coordinación de venta cruzada
    description: |
      Coordinación con ventas en los movimientos de venta cruzada en toda
      la base de clientes.
  BC-4260.70:
    name: Promoción del cliente y gestión de referencias
    description: |
      Cultivo de referencias, casos de estudio y medición estructurada del
      sentimiento del cliente.
  BC-4260.70.10:
    name: Gestión del programa de referencias
    description: |
      Gestión del programa de referencias de clientes, incluyendo la adhesión,
      la gobernanza y el uso.
  BC-4260.70.20:
    name: Desarrollo de casos de estudio
    description: |
      Desarrollo de casos de estudio de clientes en colaboración con el
      área de marketing.
  BC-4260.70.30:
    name: Programa de encuestas Net Promoter
    description: |
      Operación de NPS y programas equivalentes de encuestas de sentimiento
      del cliente.

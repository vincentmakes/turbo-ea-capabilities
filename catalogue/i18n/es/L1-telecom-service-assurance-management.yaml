locale: es
source: L1-telecom-service-assurance-management.yaml
entries:
  BC-2630:
    name: Aseguramiento de servicios de telecomunicaciones
    description: |
      Gestión del rendimiento, la calidad, los incidentes y la experiencia del cliente
      de los servicios frente a objetivos comprometidos, siguiendo los marcos eTOM de
      aseguramiento de servicios, la calidad de servicio ITU-T E.800 y la SLA Open API
      de TM Forum.
  BC-2630.10:
    name: Gestión del nivel de servicio
    description: |
      Definición, monitorización, reporte y gestión de incumplimientos de los acuerdos
      de nivel de servicio con clientes y socios.
  BC-2630.10.10:
    name: Definición del nivel de servicio
    description: |
      Definición de objetivos de SLA, métricas y métodos de medición por oferta de
      servicio.
  BC-2630.10.20:
    name: Monitorización del nivel de servicio
    description: |
      Monitorización del rendimiento medido del servicio frente a los compromisos de SLA.
  BC-2630.10.30:
    name: Reporte del nivel de servicio
    description: |
      Reporte de los resultados de SLA a clientes, socios y partes interesadas internas.
  BC-2630.10.40:
    name: Gestión de incumplimientos de nivel de servicio
    description: |
      Gestión de incumplimientos de SLA, incluido el cálculo de créditos y la
      remediación al cliente.
  BC-2630.20:
    name: Monitorización del rendimiento del servicio
    description: |
      Monitorización continua de KPIs del servicio extremo a extremo e indicadores de
      experiencia del cliente para detectar degradaciones.
  BC-2630.20.10:
    name: Monitorización de KPIs del servicio extremo a extremo
    description: |
      Monitorización de KPIs del servicio extremo a extremo agregados a través de los
      dominios de red subyacentes.
  BC-2630.20.20:
    name: Monitorización de indicadores de experiencia del cliente
    description: |
      Monitorización de indicadores de calidad de experiencia (QoE) que reflejan la
      calidad percibida del servicio por el cliente.
  BC-2630.20.30:
    name: Detección de degradación del servicio
    description: |
      Detección temprana de patrones de degradación del servicio antes de que impacten
      al cliente.
  BC-2630.30:
    name: Gestión de incidentes con impacto en clientes
    description: |
      Gestión extremo a extremo de incidentes que afectan a clientes: detección,
      notificación, escalado y revisión.
  BC-2630.30.10:
    name: Detección de incidentes en clientes
    description: |
      Detección de incidentes que afectan a uno o más clientes a partir de señales de
      red y de cliente.
  BC-2630.30.20:
    name: Notificación de incidentes a clientes
    description: |
      Notificación a clientes y canales afectados con información de estado, tiempo
      estimado de resolución y soluciones alternativas.
  BC-2630.30.30:
    name: Escalado de incidentes
    description: |
      Escalado de incidentes con impacto en clientes según las políticas de severidad
      y duración.
  BC-2630.30.40:
    name: Revisión post-incidente
    description: |
      Revisión estructurada de incidentes significativos con impacto en clientes para
      impulsar acciones correctivas.
  BC-2630.40:
    name: Gestión de calidad del servicio
    description: |
      Medición, modelado y reporte de la calidad del servicio y la experiencia del
      cliente, incluidos los informes a reguladores.
  BC-2630.40.10:
    name: Medición de la calidad de servicio
    description: |
      Medición de parámetros QoS como latencia, pérdida, jitter y throughput por
      servicio.
  BC-2630.40.20:
    name: Modelado de la calidad de experiencia
    description: |
      Modelado de la calidad de experiencia percibida por el cliente a partir de señales
      de red y de comportamiento.
  BC-2630.40.30:
    name: Reporte de calidad del servicio
    description: |
      Reporte de métricas de calidad del servicio a partes interesadas internas y
      reguladores.
  BC-2630.50:
    name: Coordinación de la restauración del servicio
    description: |
      Coordinación de actividades de restauración, soluciones alternativas y validación
      de la recuperación de servicios deteriorados.
  BC-2630.50.10:
    name: Flujo de trabajo de restauración del servicio
    description: |
      Orquestación de las tareas de restauración entre los equipos de red y de campo.
  BC-2630.50.20:
    name: Coordinación de soluciones alternativas
    description: |
      Coordinación de soluciones alternativas temporales y rutas de desvío durante
      afectaciones prolongadas.
  BC-2630.50.30:
    name: Validación de recuperación del servicio
    description: |
      Validación de que el servicio se ha restaurado a la línea base y de que los
      clientes ya no están afectados.
  BC-2630.60:
    name: Gestión de la experiencia del cliente
    description: |
      Medición de la experiencia del cliente en torno a eventos de servicio y contacto
      proactivo para mitigar la insatisfacción.
  BC-2630.60.10:
    name: Medición de NPS por evento de servicio
    description: |
      Medición de la satisfacción del cliente y el NPS en el contexto de eventos que
      afectan al servicio.
  BC-2630.60.20:
    name: Señalización de riesgo de abandono
    description: |
      Identificación de clientes con mayor riesgo de abandono tras incidentes de
      servicio.
  BC-2630.60.30:
    name: Contacto proactivo con clientes
    description: |
      Contacto proactivo con los clientes afectados ofreciendo disculpas, créditos y
      ofertas de retención.

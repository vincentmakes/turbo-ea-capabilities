locale: es
source: L1-change-management.yaml
entries:
  BC-910:
    name: Gestión del cambio
    description: |
      Planifica y ejecuta el cambio organizacional asegurando la adopción sostenida por parte de las personas afectadas.
  BC-910.10:
    name: Gestión de la estrategia de cambio
    description: |
      Define la visión, el relato y la estrategia que orientan la gestión del cambio organizacional.
  BC-910.10.10:
    name: Visión y relato del cambio
    description: |
      Articula la visión del cambio, el caso para el cambio y el relato que lo justifica.
  BC-910.10.20:
    name: Evaluación del impacto del cambio
    description: |
      Identifica y evalúa los impactos del cambio sobre las personas y los procesos de la organización.
  BC-910.10.30:
    name: Evaluación de la preparación para el cambio
    description: |
      Evalúa el grado de preparación organizacional para afrontar el cambio previsto.
  BC-910.10.40:
    name: Desarrollo del plan de cambio
    description: |
      Elabora planes de gestión del cambio integrados que coordinan todas las iniciativas relacionadas.
  BC-910.20:
    name: Gestión del compromiso de grupos de interés en el cambio
    description: |
      Identifica, mapea y compromete a los grupos de interés para lograr la alineación y el respaldo al cambio.
  BC-910.20.10:
    name: Identificación y mapeo de grupos de interés
    description: |
      Identifica y mapea a los grupos de interés afectados por el cambio.
  BC-910.20.20:
    name: Compromiso de patrocinadores
    description: |
      Define la coalición de patrocinio y gestiona el compromiso activo de los patrocinadores del cambio.
  BC-910.20.30:
    name: Gestión de la red de cambio
    description: |
      Crea y gestiona redes de agentes y embajadores del cambio en la organización.
  BC-910.20.40:
    name: Gestión de la resistencia
    description: |
      Identifica y gestiona la resistencia al cambio de forma proactiva.
  BC-910.30:
    name: Gestión de las comunicaciones y la formación del cambio
    description: |
      Diseña y ejecuta las comunicaciones y la formación que acompañan cada iniciativa de cambio.
  BC-910.30.10:
    name: Planificación de la comunicación del cambio
    description: |
      Elabora planes de comunicación por audiencia y canal para cada iniciativa de cambio.
  BC-910.30.20:
    name: Ejecución de la comunicación del cambio
    description: |
      Ejecuta campañas de comunicación y produce los activos de comunicación del cambio.
  BC-910.30.30:
    name: Diseño de la formación para el cambio
    description: |
      Diseña la formación y las acciones de refuerzo de capacidades vinculadas al cambio.
  BC-910.30.40:
    name: Impartición de la formación para el cambio
    description: |
      Imparte la formación necesaria durante la implantación del cambio.
  BC-910.40:
    name: Gestión de la adopción y el refuerzo del cambio
    description: |
      Mide la adopción, refuerza los nuevos comportamientos y sostiene el cambio una vez implantado.
  BC-910.40.10:
    name: Medición de la adopción
    description: |
      Mide los niveles de adopción, el uso efectivo y el cambio de comportamiento en la organización.
  BC-910.40.20:
    name: Refuerzo y sostenimiento
    description: |
      Aplica mecanismos de refuerzo para consolidar y sostener los nuevos comportamientos.
  BC-910.40.30:
    name: Gestión del período de hipersoporte
    description: |
      Provee soporte intensivo durante el período de hipersoporte inmediatamente posterior a la implantación.
  BC-910.40.40:
    name: Lecciones aprendidas del cambio
    description: |
      Captura y difunde las lecciones aprendidas de las iniciativas de gestión del cambio.

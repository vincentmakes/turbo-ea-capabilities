locale: es
source: L1-manufacturing-engineering-management.yaml
entries:
  BC-1020:
    name: Gestión de ingeniería de manufactura
    description: |
      Ingeniería de procesos, herramental, diseño de equipos e industrialización.
  BC-1020.10:
    name: Gestión de ingeniería de procesos de producción
    description: |
      Diseño de procesos de producción, rutas e instrucciones de trabajo.
  BC-1020.10.10:
    name: Diseño de procesos y rutas
    description: |
      Definición de rutas de fabricación y pasos del proceso.
  BC-1020.10.20:
    name: Elaboración de instrucciones de trabajo
    description: |
      Elaboración de trabajo estándar e instrucciones de trabajo visuales.
  BC-1020.10.30:
    name: Validación de procesos
    description: |
      Validación de procesos de producción y estudios de capacidad.
  BC-1020.10.40:
    name: Control de cambios de proceso
    description: |
      Control de cambios sobre procesos y rutas de fabricación.
  BC-1020.20:

    name: Gestión del inventario de herramientas
    description: |
      Gestión del almacén de herramientas y trazabilidad.
  BC-1020.30:
    name: Gestión de ingeniería de equipos
    description: |
      Especificación, calificación y modificación de equipos.
  BC-1020.30.10:
    name: Especificación de equipos
    description: |
      Especificación de usuario y funcional de equipos de producción.
  BC-1020.30.20:
    name: Calificación de equipos
    description: |
      Calificación IQ, OQ, PQ de equipos de producción.
  BC-1020.30.30:
    name: Gestión de modificaciones de equipos
    description: |
      Cambios de ingeniería y actualizaciones a equipos instalados.
  BC-1020.40:

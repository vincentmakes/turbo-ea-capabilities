    description: |
      Ciclo de vida de herramientas, plantillas y utillajes.
  BC-1020.20.10:
    name: Diseño de herramental
    description: |
      Diseño de herramientas, plantillas y utillajes para producción.
  BC-1020.20.20:
    name: Adquisición y fabricación de herramental
    description: |
      Adquisición, fabricación y validación de herramental.

locale: es
source: L1-driver-crew-operations-management.yaml
entries:
  BC-2440:
    name: Gestión de operaciones de conductores y tripulación
    description: |
      Habilitación, programación, cumplimiento de horas de servicio, gestión de
      la fatiga y rendimiento de conductores y tripulaciones de explotación en
      los modos carretera, ferroviario, marítimo y aéreo.
  BC-2440.10:
    name: Gestión de habilitaciones de conductores y tripulaciones
    description: |
      Mantenimiento de licencias, habilitaciones, calificaciones y registros de
      aptitud médica de conductores y tripulaciones.
    in_scope:
      - CDL, STCW, ATPL y titulaciones profesionales equivalentes
      - Registros de aptitud médica y psicológica
    out_of_scope:
      - Registros genéricos de RRHH y nómina (BC-300)
      - Competencia de controladores de tráfico aéreo (BC-1290)
  BC-2440.10.10:
    name: Seguimiento de licencias y habilitaciones
    description: |
      Seguimiento de licencias profesionales, habilitaciones y fechas de
      vencimiento.
  BC-2440.10.20:
    name: Gestión de calificaciones específicas por modo
    description: |
      Gestión de calificaciones específicas por modo, como las habilitaciones
      STCW y las calificaciones de tipo de aeronave.
  BC-2440.10.30:
    name: Certificación médica y de aptitud física
    description: |
      Certificaciones médicas y de aptitud física periódicas para el personal
      de explotación.
  BC-2440.20:
    name: Gestión de la programación y los turnos
    description: |
      Construcción de cuadros de servicio, sistemas de guardia y emparejamientos
      de tripulación frente a restricciones de servicio y reglamentarias.
  BC-2440.20.10:
    name: Planificación del cuadro de servicio
    description: |
      Planificación de cuadros de servicio por base, depósito y servicio.
  BC-2440.20.20:
    name: Emparejamiento y rotación de tripulaciones
    description: |
      Emparejamiento y rotación de tripulaciones en viajes de varios días o
      varios tramos.
  BC-2440.20.30:
    name: Gestión de reservas y guardias
    description: |
      Disposiciones de reserva, guardia y disponibilidad de guardia.
  BC-2440.30:
    name: Gestión de horas de servicio y fatiga
    description: |
      Cumplimiento de la normativa de horas de servicio y operación de sistemas
      de gestión del riesgo de fatiga.
  BC-2440.30.10:
    name: Cumplimiento de horas de servicio
    description: |
      Registro y aplicación de los límites de HOS mediante tacógrafo, ELD y
      equivalentes.
  BC-2440.30.20:
    name: Gestión del riesgo de fatiga
    description: |
      Operación de sistemas de gestión del riesgo de fatiga y modelos
      biomatemáticos.
  BC-2440.30.30:
    name: Aplicación de períodos de descanso
    description: |
      Aplicación de los períodos de descanso obligatorios, escalas y límites
      semanales.
  BC-2440.40:
    name: Gestión del rendimiento de conductores y tripulaciones
    description: |
      Puntuación del rendimiento, entrenamiento y gestión de infracciones para
      conductores y tripulaciones.
  BC-2440.40.10:
    name: Puntuación del rendimiento de conductores y tripulaciones
    description: |
      Puntuación del personal de explotación frente a KPIs de seguridad,
      consumo de combustible y servicio.
  BC-2440.40.20:
    name: Entrenamiento y formación recurrente
    description: |
      Entrenamiento, cursos de actualización y formación correctiva.
  BC-2440.40.30:
    name: Gestión de incidentes e infracciones
    description: |
      Seguimiento y resolución de incidentes operativos e infracciones
      reglamentarias.
  BC-2440.50:
    name: Gestión de viajes y alojamiento de tripulaciones
    description: |
      Viajes, alojamiento y logística de relevo de tripulaciones para rotaciones
      marítimas, aéreas y ferroviarias.
  BC-2440.50.10:
    name: Reserva de viajes para tripulaciones
    description: |
      Reserva de viajes de posicionamiento para rotaciones de tripulaciones.
  BC-2440.50.20:
    name: Gestión del alojamiento de tripulaciones
    description: |
      Gestión de hoteles y alojamiento para escalas y rotaciones.
  BC-2440.50.30:
    name: Coordinación de relevos de tripulación
    description: |
      Coordinación de los relevos de tripulación en puertos, aeropuertos y
      depósitos.

locale: es
source: L1-business-continuity-management.yaml
entries:
  BC-160:
    name: Gestión de la continuidad del negocio
    description: |
      Planificación de la resiliencia, recuperación ante desastres y respuesta a crisis.
  BC-160.10:
    name: Planificación de la continuidad del negocio
    description: |
      Análisis de impacto en el negocio, elaboración de planes y estrategias de continuidad.
  BC-160.10.10:
    name: Análisis de impacto en el negocio
    description: |
      Identificación de procesos críticos, RTO, RPO y dependencias.
  BC-160.10.20:
    name: Definición de la estrategia de continuidad
    description: |
      Selección de estrategias de continuidad y opciones de recuperación.
  BC-160.10.30:
    name: Elaboración del plan de continuidad
    description: |
      Documentación de los planes de continuidad del negocio alineados con ISO 22301.
  BC-160.10.40:
    name: Mantenimiento y actualización del plan
    description: |
      Revisión y actualización periódica de los planes de continuidad.
  BC-160.20:
    name: Gestión de la recuperación ante desastres
    description: |
      Recuperación ante desastres informáticos y operativos.
  BC-160.20.10:
    name: Planificación de la recuperación de servicios TI
    description: |
      Planes de recuperación para los servicios e infraestructuras TI críticos.
  BC-160.20.20:
    name: Gestión de copias de seguridad y restauración
    description: |
      Estrategias de copia de seguridad, inmutabilidad y validación de la restauración.
  BC-160.20.30:
    name: Operaciones de conmutación y recuperación en sitio alterno
    description: |
      Conmutación por error, activación del sitio alterno y recuperación operativa.
  BC-160.20.40:
    name: Coordinación de la recuperación operativa
    description: |
      Coordinación de las operaciones del negocio durante la activación de la recuperación.
  BC-160.30:
    name: Gestión de crisis
    description: |
      Respuesta a crisis, estructura de mando y escalación.
  BC-160.30.10:
    name: Estructura de mando ante crisis
    description: |
      Equipo de gestión de crisis, roles y estructura de mando y control.
  BC-160.30.20:
    name: Comunicación en situaciones de crisis
    description: |
      Comunicaciones internas y externas durante crisis y gestión de partes interesadas.
  BC-160.30.30:
    name: Escalación y activación de incidentes
    description: |
      Clasificación de gravedad, rutas de escalación y activación del plan.
  BC-160.30.40:
    name: Revisión posterior a la crisis
    description: |
      Lecciones aprendidas y acciones de mejora tras las crisis.
  BC-160.40:
    name: Pruebas y ejercicios de resiliencia
    description: |
      Ejercicios, simulacros y validación de planes.
  BC-160.40.10:
    name: Ejercicios de mesa y simulacros
    description: |
      Ejercicios de mesa, recorridos y simulaciones.
  BC-160.40.20:
    name: Pruebas de conmutación en vivo
    description: |
      Pruebas de conmutación y recuperación reales frente a los objetivos de RTO y RPO.
  BC-160.40.30:
    name: Gestión del programa de ejercicios
    description: |
      Calendario anual de ejercicios, alcance y cobertura de partes interesadas.
  BC-160.40.40:
    name: Seguimiento de resultados y mejoras de pruebas
    description: |
      Registro de los resultados de los ejercicios y seguimiento de las acciones de mejora.

locale: es
source: L1-mineral-exploration-management.yaml
entries:
  BC-4400:
    name: Gestión de exploración mineral
    description: |
      Descubrimiento de nuevas mineralizaciones y calificación de prospectos de
      exploración mediante relevamientos geológicos, geoquímicos y geofísicos,
      perforación exploratoria y ensayo de muestras de sondaje, culminando en
      informes de descubrimiento y decisiones de maduración de prospectos.

  BC-4400.10:
    name: Gestión de relevamientos geocientíficos
    description: |
      Adquisición, procesamiento e interpretación de datos de relevamientos
      geofísicos, geoquímicos y geológicos aéreos y terrestres sobre
      concesiones de exploración.
    in_scope:
      - Relevamientos magnéticos y electromagnéticos aéreos
      - Relevamientos terrestres de gravedad, IP y sísmica
      - Geoquímica de suelos, sedimentos de corriente y chips de roca
      - Cartografía geológica a escala 1:50k y de proyecto
    out_of_scope:
      - Registro geológico de sondajes de grado de recurso (BC-4400.30)
      - Reconciliación geológica en etapa de producción (BC-4410.60)

  BC-4400.10.10:
    name: Relevamiento geofísico aéreo
    description: |
      Adquisición de relevamientos magnéticos, electromagnéticos, radiométricos
      y gravimétricos aéreos sobre áreas de exploración.

  BC-4400.10.20:
    name: Relevamiento geofísico terrestre
    description: |
      Adquisición de relevamientos terrestres de gravedad, polarización inducida,
      electromagnéticos y sísmicos a escala de prospecto.

  BC-4400.10.30:
    name: Muestreo geoquímico
    description: |
      Programas de muestreo de suelos, sedimentos de corriente, biogeoquímica y
      chips de roca para la delineación de anomalías geoquímicas.

  BC-4400.10.40:
    name: Cartografía geológica
    description: |
      Cartografía geológica de afloramientos y a escala de prospecto para definir
      litología, estructura y alteración.

  BC-4400.10.50:
    name: Interpretación de datos de relevamiento
    description: |
      Interpretación integrada de conjuntos de datos geofísicos y geoquímicos
      para la generación de blancos.

  BC-4400.20:
    name: Generación de blancos de exploración
    description: |
      Conversión de datos regionales y de prospecto en blancos de perforación
      jerarquizados mediante el análisis de sistemas minerales y el modelado
      de prospectividad.
    in_scope:
      - Aplicación de modelos de sistemas minerales y yacimientos
      - Modelado de prospectividad basado en datos
      - Jerarquización de prospectos y blancos
    out_of_scope:
      - Estimación de recursos sobre mineralización descubierta (BC-4410.20)

  BC-4400.20.10:
    name: Análisis de sistemas minerales
    description: |
      Aplicación de criterios de fuente, transporte, trampa y preservación para
      definir sistemas mineralizados.

  BC-4400.20.20:
    name: Modelado de prospectividad
    description: |
      Mapeo de prospectividad basado en conocimiento experto y en datos para
      predecir ubicaciones de blancos.

  BC-4400.20.30:
    name: Jerarquización de blancos
    description: |
      Jerarquización probabilística de blancos generados según probabilidad de
      descubrimiento y tonelaje potencial.

  BC-4400.20.40:
    name: Gestión del inventario de prospectos de exploración
    description: |
      Mantenimiento del inventario jerarquizado de prospectos y blancos de
      exploración y su trayectoria de maduración.

  BC-4400.30:
    name: Operaciones de perforación exploratoria
    description: |
      Ejecución de programas de perforación exploratoria por circulación
      inversa, testigo diamantino y otros métodos, incluyendo relevamiento de
      sondajes, registro de muestras y supervisión de contratistas de
      perforación.
    in_scope:
      - Perforación por circulación inversa y aircore
      - Perforación de testigo diamantino
      - Relevamiento de desviación de sondajes
    out_of_scope:
      - Perforación de producción para carga de tiros (BC-4430.10)
      - Perforación geotécnica para diseño de taludes (BC-4420.50)

  BC-4400.30.10:
    name: Perforación por circulación inversa
    description: |
      Perforación por circulación inversa y aircore para la recuperación de
      muestras de exploración.

  BC-4400.30.20:
    name: Perforación de testigo diamantino
    description: |
      Perforación de testigo diamantino para la recuperación continua y orientada
      de muestras litológicas.

  BC-4400.30.30:
    name: Registro de muestras de perforación
    description: |
      Registro geológico, geotécnico y estructural de chips y testigos de
      sondaje.

  BC-4400.30.40:
    name: Gestión del relevamiento de sondajes
    description: |
      Relevamiento de desviación en profundidad y control de posición de la
      boca del sondaje.

  BC-4400.30.50:
    name: Gestión de contratistas de perforación
    description: |
      Contratación, movilización y gestión del desempeño de contratistas de
      perforación.

  BC-4400.40:
    name: Gestión de muestras y ensayos
    description: |
      Custodia, preparación y coordinación de ensayos de muestras de exploración
      bajo regímenes de aseguramiento de calidad documentados que satisfacen los
      estándares de información pública.
    in_scope:
      - Cadena de custodia de muestras
      - Selección de laboratorio y gestión de tiempos de respuesta
      - Inserción y monitoreo de controles de calidad
    out_of_scope:
      - Ensayos de planta de proceso (BC-4440.60)
      - Ensayos de liquidación de fundición (BC-4450.70)

  BC-4400.40.10:
    name: Preparación de muestras
    description: |
      Trituración, división y pulverización de muestras de exploración para
      ensayo analítico.

  BC-4400.40.20:
    name: Coordinación de ensayos de laboratorio
    description: |
      Selección, envío y gestión de tiempos de respuesta de trabajos analíticos
      de laboratorio.

  BC-4400.40.30:
    name: Gestión del programa de aseguramiento de calidad
    description: |
      Inserción y monitoreo de estándares, blancos y duplicados para respaldar
      la calidad de ensayos reportables.

  BC-4400.40.40:
    name: Gestión de materiales de referencia
    description: |
      Adquisición, caracterización y distribución de materiales de referencia
      certificados.

  BC-4400.50:
    name: Dirección del programa de exploración
    description: |
      Dirección estratégica del portafolio de exploración por commodities,
      jurisdicciones y clases de riesgo, incluyendo la asignación de inversiones
      y el seguimiento del desempeño de descubrimientos.

  BC-4400.50.10:
    name: Definición de estrategia de exploración
    description: |
      Definición de la estrategia de exploración por commodity, jurisdicción y
      clase de yacimiento.

  BC-4400.50.20:
    name: Asignación de inversión en exploración
    description: |
      Asignación de capital de exploración entre programas regionales y de
      prospecto.

  BC-4400.50.30:
    name: Seguimiento del desempeño de descubrimientos
    description: |
      Seguimiento del costo de descubrimiento, incorporación de recursos y
      conversión a reservas.

  BC-4400.60:
    name: Informes de descubrimiento
    description: |
      Comunicación interna y externa de resultados de exploración, incluyendo
      divulgaciones a socios y al mercado de capitales alineadas con los códigos
      de información pública.

  BC-4400.60.10:
    name: Informes internos de descubrimiento
    description: |
      Comunicación interna de resultados de exploración, intercepcioness y estado
      de maduración de blancos.

  BC-4400.60.20:
    name: Divulgación pública de resultados de exploración
    description: |
      Divulgación de intercepcioness y resultados de exploración bajo los códigos
      JORC, NI 43-101, SAMREC y equivalentes.

  BC-4400.60.30:
    name: Informes de asociación en participación de exploración
    description: |
      Informes del avance, el gasto y los resultados de exploración a socios
      operadores y no operadores de asociaciones en participación.

locale: es
source: L1-talent-creative-workforce-management.yaml
entries:
  BC-3790:
    name: "Gestión de talento y fuerza laboral creativa"
    description: |
      Captación y casting de talento en pantalla y creativo, contratación y vinculación
      del talento, distribución de residuos y regalías, cumplimiento de acuerdos
      con gremios y sindicatos, y relaciones a largo plazo con el talento creativo.
  BC-3790.10:
    name: "Captación y casting de talento"
    description: |
      Elaboración de briefings de casting y búsqueda, prueba y selección de talento
      en pantalla y de voz para las producciones.
  BC-3790.10.10:
    name: "Gestión de briefings de casting"
    description: |
      Elaboración de briefings y desgloses de casting emitidos
      a directores de casting y agentes.
  BC-3790.10.20:
    name: "Búsqueda y pruebas de talento"
    description: |
      Búsqueda de talento, coordinación de autograbaciones y audiciones en vivo,
      y flujos de trabajo de preselección.
  BC-3790.10.30:
    name: "Decisión de selección de casting"
    description: |
      Decisiones de selección y aprobación del casting conforme
      a criterios creativos y comerciales.
  BC-3790.20:
    name: "Contratación y vinculación del talento"
    description: |
      Negociación y contratación de compromisos de talento, incluyendo estructuras
      de préstamo y empresa de servicios.
  BC-3790.20.10:
    name: "Apoyo a la negociación de acuerdos de talento"
    description: |
      Apoyo a la negociación de acuerdos de talento, incluyendo comparación
      con acuerdos similares y preparación de hojas de condiciones.
  BC-3790.20.20:
    name: "Contratación mediante préstamo y empresa de servicios"
    description: |
      Contratación a través de estructuras de préstamo y empresa de servicios
      con consideraciones fiscales y de indemnización.
  BC-3790.20.30:
    name: "Gestión de cartas de compromiso"
    description: |
      Elaboración y ciclo de vida de las cartas de compromiso y memos de acuerdo
      resumidos para talento y equipo técnico.
  BC-3790.30:
    name: "Distribución de residuos y regalías"
    description: |
      Cálculo y pago de residuos, regalías y participaciones adeudados
      al talento y a los colaboradores creativos.
  BC-3790.30.10:
    name: "Cálculo de residuos"
    description: |
      Cálculo de los residuos conforme a las fórmulas de los gremios,
      tipos de mercado y ventanas de reutilización.
  BC-3790.30.20:
    name: "Producción de estados de distribución de regalías"
    description: |
      Producción de los estados de distribución de regalías para el talento
      y los titulares de derechos.
  BC-3790.30.30:
    name: "Seguimiento de participaciones subyacentes"
    description: |
      Seguimiento de las participaciones subyacentes, incluyendo las definiciones
      de beneficios y los niveles contables.
  BC-3790.40:
    name: "Cumplimiento con gremios y sindicatos"
    description: |
      Aplicación de los convenios colectivos, informes a los gremios,
      apoyo a auditorías y aportaciones a planes de pensiones y salud.
  BC-3790.40.10:
    name: "Aplicación de los convenios colectivos"
    description: |
      Aplicación de los mínimos del convenio colectivo, las normas de trabajo
      y las estructuras de horas extraordinarias en las producciones.
  BC-3790.40.20:
    name: "Informes y apoyo a auditorías de gremios"
    description: |
      Producción de informes para los gremios y apoyo a sus auditorías
      en las producciones.
  BC-3790.40.30:
    name: "Gestión de aportaciones a pensiones y salud"
    description: |
      Cálculo y remisión de las aportaciones a pensiones y salud
      a los planes de los gremios.
  BC-3790.50:
    name: "Gestión de relaciones con el talento creativo"
    description: |
      Gestión a largo plazo de las relaciones con el talento creativo
      y los programas que sostienen el compromiso y el desarrollo del talento.
  BC-3790.50.10:
    name: "Gestión de relaciones a largo plazo con el talento"
    description: |
      Gestión de acuerdos de primera opción, globales y de grupo
      con el talento creativo a largo plazo.
  BC-3790.50.20:
    name: "Seguimiento del rendimiento del talento"
    description: |
      Seguimiento de la contribución y el rendimiento creativo del talento
      en proyectos y carteras de producción.
  BC-3790.50.30:
    name: "Programas de captación del talento"
    description: |
      Programas de captación que incluyen salas de escritores, residencias
      y fondos de desarrollo para el talento creativo.

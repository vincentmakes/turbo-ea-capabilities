locale: es
source: L1-specialty-formulation-blending-management.yaml
entries:
  BC-4630:
    name: Gestión de formulación y mezcla de especialidades
    description: |
      Formulación, mezcla, compoundización, llenado y acabado de productos químicos de especialidad, incluyendo recubrimientos, adhesivos, agroformulaciones, lubricantes, tensioactivos y productos químicos finos.
  BC-4630.10:
    name: Diseño y desarrollo de formulaciones
    description: |
      Especificación, selección de materias primas, ensayos a escala de laboratorio y optimización de costes de formulaciones de especialidad.
  BC-4630.10.10:
    name: Desarrollo de especificaciones de formulación
    description: |
      Desarrollo de especificaciones de formulación frente a objetivos de aplicación.
  BC-4630.10.20:
    name: Selección de materias primas
    description: |
      Selección de materias primas en función del rendimiento, coste y HSE.
  BC-4630.10.30:
    name: Ensayos de formulación a escala de laboratorio
    description: |
      Preparación y caracterización a escala de laboratorio de formulaciones candidatas.
  BC-4630.10.40:
    name: Optimización del coste de formulaciones
    description: |
      Optimización del coste de formulaciones bajo restricciones de especificación.
  BC-4630.20:
    name: Operaciones de mezcla
    description: |
      Operación de activos de mezcla de líquidos, sólidos, emulsiones y dispersiones.
  BC-4630.20.10:
    name: Operaciones de mezcla de líquidos
    description: |
      Mezcla de productos químicos líquidos en tanques y en línea.
  BC-4630.20.20:
    name: Operaciones de mezcla de sólidos
    description: |
      Mezcla de formulaciones sólidas mediante mezcladoras de cinta, cónicas y de volteo.
  BC-4630.20.30:
    name: Operaciones de emulsificación
    description: |
      Producción de emulsiones mediante homogeneizadores rotor-estátor y de alta presión.
  BC-4630.20.40:
    name: Operaciones de dispersión y molienda
    description: |
      Operación de molinos de perlas, molinos de tres rodillos y dispersores.
  BC-4630.30:
    name: Operaciones de compoundización y extrusión
    description: |
      Compoundización de polímeros, producción de masterbatch y extrusión de intermedios de especialidad.
  BC-4630.30.10:
    name: Compoundización de polímeros
    description: |
      Compoundización de polímeros con cargas, estabilizantes y aditivos.
  BC-4630.30.20:
    name: Producción de masterbatch
    description: |
      Producción de masterbatches de color, aditivo y funcionales.
  BC-4630.30.30:
    name: Operaciones de extrusión
    description: |
      Operación de líneas de extrusión de husillo simple y doble husillo.
  BC-4630.40:
    name: Operaciones de llenado y envasado
    description: |
      Llenado de productos de especialidad en contenedores a granel, bidón, GRG, envase pequeño y contenedores presurizados.
  BC-4630.40.10:
    name: Llenado de contenedores a granel
    description: |
      Llenado de contenedores a granel para carretera, ferrocarril e ISO.
  BC-4630.40.20:
    name: Llenado de bidones y GRG
    description: |
      Llenado de bidones de acero y plástico y contenedores intermedios a granel.
  BC-4630.40.30:
    name: Llenado de envase pequeño
    description: |
      Llenado de alta velocidad de botellas, garrafas y envases de consumo.
  BC-4630.40.40:
    name: Llenado de aerosoles y envases presurizados
    description: |
      Llenado y cierre hermético de latas de aerosol y contenedores presurizados.
  BC-4630.50:
    name: Ensayos de rendimiento de formulaciones
    description: |
      Ensayos de rendimiento de aplicación, estabilidad y comparativa de formulaciones de especialidad.
  BC-4630.50.10:
    name: Ensayos de rendimiento de aplicación
    description: |
      Ensayos de formulaciones en condiciones simuladas de uso final.
  BC-4630.50.20:
    name: Ensayos de estabilidad y vida útil
    description: |
      Ensayos de estabilidad y vida útil en tiempo real y acelerados.
  BC-4630.50.30:
    name: Comparativa competitiva
    description: |
      Comparativa en paralelo de formulaciones frente a productos de la competencia.
  BC-4630.60:
    name: Gestión de recetas de especialidad
    description: |
      Elaboración de recetas maestras, control de versiones y localización para la producción de formulaciones en múltiples plantas.
  BC-4630.60.10:
    name: Mantenimiento de recetas maestras
    description: |
      Elaboración y mantenimiento de recetas maestras según las convenciones ISA-88.
  BC-4630.60.20:
    name: Control de versiones de recetas
    description: |
      Control de versiones de recetas a lo largo de los ciclos de aprobación y revisión.
  BC-4630.60.30:
    name: Localización de recetas
    description: |
      Localización de recetas maestras para los equipos específicos de cada planta.

locale: es
source: L1-assessment-examinations-management.yaml
entries:
  BC-4740:
    name: Gestión de evaluación y exámenes
    description: |
      Diseño, administración, corrección, moderación y calificación de las evaluaciones
      y exámenes que acreditan el aprendizaje de los estudiantes, incluida la supervisión
      de la integridad académica.
  BC-4740.10:
    name: Diseño de evaluaciones y banco de ítems
    description: |
      Diseño de instrumentos de evaluación y mantenimiento de bancos de ítems
      calibrados que sustentan una evaluación consistente y fiable.
    in_scope:
      - Definición del modelo de evaluación
      - Elaboración y calibración de ítems
      - Mantenimiento del banco de ítems
    out_of_scope:
      - Diseño del programa de estudios por curso (cubierto en Gestión del plan de estudios y programa)
  BC-4740.10.10:
    name: Definición del modelo de evaluación
    description: |
      Definición de los modelos de evaluación y su ponderación respecto a los
      resultados de aprendizaje.
  BC-4740.10.20:
    name: Elaboración y calibración de ítems
    description: |
      Elaboración y calibración estadística de los ítems de evaluación.
  BC-4740.10.30:
    name: Mantenimiento del banco de ítems
    description: |
      Mantenimiento de bancos de ítems seguros a través de versiones y ciclos
      de exposición.
  BC-4740.20:
    name: Operaciones de exámenes
    description: |
      Impartición operativa de exámenes presenciales y en línea, incluyendo
      programación, vigilancia y servicios de supervisión remota.
    in_scope:
      - Programación de exámenes
      - Lugar del examen y vigilancia
      - Supervisión en línea y remota
    out_of_scope:
      - Evaluación ordinaria en el aula (cubierta en Gestión de operaciones de enseñanza y aprendizaje)
  BC-4740.20.10:
    name: Programación de exámenes
    description: |
      Programación de exámenes por cohortes, sedes y modalidades.
  BC-4740.20.20:
    name: Sede del examen y vigilancia
    description: |
      Organización del lugar y la vigilancia de los exámenes presenciales.
  BC-4740.20.30:
    name: Supervisión en línea y remota
    description: |
      Operación de la supervisión en línea y remota para exámenes no presenciales.
  BC-4740.30:
    name: Operaciones de corrección y calificación
    description: |
      Corrección del trabajo de los estudiantes y cálculo de calificaciones, incluyendo
      la doble corrección y la corrección anónima, y las reglas de agregación de notas.
    in_scope:
      - Aplicación de criterios de corrección
      - Corrección doble y anónima
      - Agregación y cálculo de calificaciones
    out_of_scope:
      - Mantenimiento oficial del registro de calificaciones (cubierto en Gestión de matrícula y expedientes de estudiantes)
  BC-4740.30.10:
    name: Aplicación de criterios de corrección
    description: |
      Aplicación de criterios de corrección y rúbricas al trabajo de los estudiantes.
  BC-4740.30.20:
    name: Corrección doble y anónima
    description: |
      Operación de flujos de trabajo de corrección doble y corrección anónima.
  BC-4740.30.30:
    name: Agregación y cálculo de calificaciones
    description: |
      Agregación y cálculo de las notas de los componentes para obtener las
      calificaciones finales.
  BC-4740.40:
    name: Moderación y tribunales de examen
    description: |
      Moderación interna, participación de examinadores externos y toma de decisiones
      por los tribunales de examen sobre títulos y progresión.
    in_scope:
      - Moderación interna
      - Coordinación con examinadores externos
      - Toma de decisiones del tribunal de examen
    out_of_scope:
      - Revisión a nivel de programa (cubierta en Gestión de calidad académica y acreditación)
  BC-4740.40.10:
    name: Moderación interna
    description: |
      Moderación interna de las decisiones de corrección entre correctores y cohortes.
  BC-4740.40.20:
    name: Coordinación de examinadores externos
    description: |
      Coordinación de los examinadores externos y sus ciclos de informes.
  BC-4740.40.30:
    name: Toma de decisiones del tribunal de examen
    description: |
      Toma de decisiones por los tribunales de examen sobre resultados, progresión
      y títulos.
  BC-4740.50:
    name: Emisión de títulos y calificaciones
    description: |
      Publicación de resultados y emisión de títulos y calificaciones, incluyendo la
      gestión de reclamaciones.
    in_scope:
      - Publicación de resultados
      - Emisión de certificados y diplomas
      - Gestión de reclamaciones de resultados
    out_of_scope:
      - Credenciales digitales verificables (cubiertas en Gestión de matrícula y expedientes de estudiantes)
  BC-4740.50.10:
    name: Publicación de resultados
    description: |
      Publicación de resultados provisionales y ratificados a los estudiantes.
  BC-4740.50.20:
    name: Emisión de certificados y diplomas
    description: |
      Emisión de certificados y diplomas que acreditan los títulos obtenidos.
  BC-4740.50.30:
    name: Gestión de reclamaciones de resultados
    description: |
      Gestión de las reclamaciones de los estudiantes contra los resultados
      de evaluación.
  BC-4740.60:
    name: Gestión de la integridad académica
    description: |
      Detección, investigación y corrección del fraude académico, incluyendo el
      plagio y el encargo de trabajos a terceros.
    in_scope:
      - Detección de plagio
      - Investigación de infracciones
      - Sanción y corrección
    out_of_scope:
      - Mala conducta en investigación (cubierta en Gestión de investigación y becas)
  BC-4740.60.10:
    name: Detección de plagio
    description: |
      Detección de plagio y encargo de trabajos a terceros en los trabajos entregados.
  BC-4740.60.20:
    name: Investigación de infracciones
    description: |
      Investigación de los casos sospechosos de fraude académico.
  BC-4740.60.30:
    name: Sanción y corrección
    description: |
      Aplicación de sanciones y medidas correctoras en casos confirmados de fraude.

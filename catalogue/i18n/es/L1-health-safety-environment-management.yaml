locale: es
source: L1-health-safety-environment-management.yaml
entries:
  BC-730:
    name: Gestión de salud, seguridad y medio ambiente
    description: |
      Política HSE, gestión de incidentes, seguridad en los centros de trabajo y salud laboral para proteger a las personas y al entorno natural.
  BC-730.10:
    name: Gestión de la salud laboral
    description: |
      Salud ocupacional, ergonomía y bienestar para mantener la aptitud y el bienestar de los trabajadores.
  BC-730.10.10:
    name: Vigilancia de la salud
    description: |
      Vigilancia médica periódica para los grupos de trabajadores expuestos a riesgos.
  BC-730.10.20:
    name: Ergonomía y salud en el lugar de trabajo
    description: |
      Evaluaciones ergonómicas y programas de salud en el lugar de trabajo.
  BC-730.10.30:
    name: Monitorización de la higiene industrial
    description: |
      Monitorización de exposiciones a ruido, polvo, agentes químicos y biológicos.
  BC-730.10.40:
    name: Programas de bienestar de los empleados
    description: |
      Programas de bienestar físico, mental y social de los empleados.
  BC-730.20:
    name: Gestión de la seguridad
    description: |
      Seguridad en el lugar de trabajo, seguridad conductual y equipos de protección individual para prevenir accidentes y lesiones.
  BC-730.20.10:
    name: Identificación de peligros y evaluación de riesgos
    description: |
      Identificación de peligros y evaluación de riesgos para tareas y centros de trabajo.
  BC-730.20.20:
    name: Permisos de trabajo y sistemas de trabajo seguro
    description: |
      Permiso de trabajo, aislamiento y sistemas de trabajo seguro.
  BC-730.20.30:
    name: Gestión de equipos de protección individual
    description: |
      Selección, entrega, formación e inspección de EPI.
  BC-730.20.40:
    name: Programa de seguridad conductual
    description: |
      Observaciones de seguridad conductual, visitas de liderazgo y formación.
  BC-730.20.50:
    name: Gestión de la seguridad de contratistas
    description: |
      Precalificación, inducción y supervisión de la seguridad en obra de los contratistas.
  BC-730.30:
    name: Gestión medioambiental
    description: |
      Emisiones, agua, residuos y cumplimiento medioambiental para reducir el impacto de las operaciones en el entorno natural.
  BC-730.30.10:
    name: Evaluación de aspectos e impactos ambientales
    description: |
      Identificación de aspectos ambientales y evaluación de su impacto.
  BC-730.30.20:
    name: Gestión de emisiones
    description: |
      Gestión de emisiones atmosféricas, GEI y contaminantes en los centros de trabajo.
  BC-730.30.30:
    name: Gestión del agua y los efluentes
    description: |
      Consumo de agua, tratamiento de efluentes y gestión de vertidos.
  BC-730.30.40:
    name: Gestión de residuos
    description: |
      Gestión y eliminación de residuos peligrosos y no peligrosos.
  BC-730.30.50:
    name: Biodiversidad y gestión del territorio
    description: |
      Actividades de biodiversidad, uso del suelo y recuperación ambiental.
  BC-730.40:
    name: Gestión de incidentes e investigaciones
    description: |
      Incidentes HSE, cuasi accidentes e investigaciones para aprender de los fallos y prevenir su recurrencia.
  BC-730.40.10:
    name: Notificación de incidentes y cuasi accidentes
    description: |
      Captura y clasificación de incidentes HSE y cuasi accidentes.
  BC-730.40.20:
    name: Investigación de incidentes HSE
    description: |
      Metodología de investigación, análisis de causa raíz y lecciones aprendidas.
  BC-730.40.30:
    name: Preparación y respuesta ante emergencias
    description: |
      Planes de emergencia en los centros, simulacros y coordinación de la respuesta.
  BC-730.40.40:
    name: Gestión de la seguridad de procesos
    description: |
      Peligros de seguridad de procesos, gestión del cambio y controles de accidentes graves.
  BC-730.50:
    name: Cumplimiento normativo e informes HSE
    description: |
      Informes regulatorios HSE y auditorías para demostrar el cumplimiento de las obligaciones legales.
  BC-730.50.10:
    name: Cumplimiento normativo HSE
    description: |
      Identificación y seguimiento de las obligaciones regulatorias en materia de HSE.
  BC-730.50.20:
    name: Auditoría e inspección HSE
    description: |
      Auditorías e inspecciones HSE internas y externas.
  BC-730.50.30:
    name: Informes de rendimiento HSE
    description: |
      Seguimiento de KPIs HSE e informes de gestión (TRIR, LTIFR).
  BC-730.50.40:
    name: Certificación del sistema de gestión HSE
    description: |
      Certificación del sistema de gestión según ISO 45001 / ISO 14001.

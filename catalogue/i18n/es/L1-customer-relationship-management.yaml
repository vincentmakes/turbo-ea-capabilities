locale: es
source: L1-customer-relationship-management.yaml
entries:
  BC-420:
    name: Gestión de relaciones con clientes
    description: |
      Datos de clientes, segmentación, ciclo de vida y fidelización.
  BC-420.10:
    name: Gestión de datos de clientes
    description: |
      Datos maestros del cliente, resolución de identidad y registro único del cliente.
  BC-420.10.10:
    name: Gestión de datos maestros del cliente
    description: |
      Creación, mantenimiento y gobernanza de los registros maestros de clientes.
  BC-420.10.20:
    name: Resolución de identidad del cliente
    description: |
      Emparejamiento, fusión y deduplicación de registros de clientes.
  BC-420.10.30:
    name: Gestión del consentimiento y las preferencias
    description: |
      Captura y aplicación de los consentimientos y preferencias de marketing de los clientes.
  BC-420.10.40:
    name: Vista 360 del cliente
    description: |
      Visión agregada del cliente a través de productos, canales e interacciones.
  BC-420.20:
    name: Gestión de la segmentación de clientes
    description: |
      Segmentos, perfiles y estrategias de tratamiento diferenciado de clientes.
  BC-420.20.10:
    name: Segmentación conductual
    description: |
      Segmentación basada en comportamiento, RFM y señales de compromiso del cliente.
  BC-420.20.20:
    name: Segmentación basada en valor
    description: |
      Segmentación por valor de vida del cliente y rentabilidad.
  BC-420.20.30:
    name: Desarrollo de perfiles de cliente
    description: |
      Definición de perfiles (personas) y arquetipos de clientes objetivo.
  BC-420.20.40:
    name: Definición de estrategias de tratamiento
    description: |
      Estrategias de tratamiento diferenciado por segmento de clientes.
  BC-420.30:
    name: Gestión del ciclo de vida del cliente
    description: |
      Adquisición, crecimiento, retención y recuperación de clientes.
  BC-420.30.10:
    name: Gestión de la adquisición de clientes
    description: |
      Campañas de adquisición, conversión y orquestación de la incorporación de clientes.
  BC-420.30.20:
    name: Crecimiento y venta cruzada a clientes
    description: |
      Programas de venta cruzada, upselling y expansión de la relación con el cliente.
  BC-420.30.30:
    name: Gestión de la retención de clientes
    description: |
      Predicción de abandono, ofertas de retención y equipos de retención activa.
  BC-420.30.40:
    name: Gestión de la recuperación de clientes
    description: |
      Campañas de recuperación y reactivación de clientes inactivos o perdidos.
  BC-420.40:
    name: Gestión de la fidelización y retención
    description: |
      Programas de fidelización e iniciativas de retención de clientes.
  BC-420.40.10:
    name: Diseño del programa de fidelización
    description: |
      Diseño de la estructura del programa de fidelización, niveles y beneficios para los miembros.
  BC-420.40.20:
    name: Operaciones del programa de fidelización
    description: |
      Acumulación, canje y atención a los miembros del programa de fidelización.
  BC-420.40.30:
    name: Gestión del pasivo del programa de fidelización
    description: |
      Contabilidad y gestión del pasivo y la caducidad de puntos del programa de fidelización.
  BC-420.40.40:
    name: Gestión del ecosistema de socios de fidelización
    description: |
      Integración de socios, canje y acuerdos de coalición en el programa de fidelización.

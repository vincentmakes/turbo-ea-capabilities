locale: es
source: L1-regulatory-affairs-management.yaml
entries:
  BC-1530:
    name: Gestión de asuntos regulatorios
    description: |
      Gestiona la estrategia regulatoria global, las presentaciones ante las agencias, el mantenimiento del ciclo de vida de las autorizaciones y las interacciones con las autoridades sanitarias.
  BC-1530.10:
    name: Gestión de la estrategia regulatoria
    description: |
      Define la estrategia regulatoria multiregional y evalúa los riesgos para orientar el desarrollo y el registro del producto.
  BC-1530.10.10:
    name: Estrategia regulatoria global
    description: |
      Estrategia regulatoria multiregional y selección de vías de desarrollo.
  BC-1530.10.20:
    name: Evaluación del riesgo regulatorio
    description: |
      Evaluación de riesgos regulatorios y planes de contingencia.
  BC-1530.10.30:
    name: Gestión del perfil de producto objetivo
    description: |
      Definición y mantenimiento del perfil de producto objetivo.
  BC-1530.20:
    name: Gestión de presentaciones regulatorias
    description: |
      Prepara y presenta solicitudes como IND, NDA, MAA y BLA ante las autoridades reguladoras.
  BC-1530.20.10:
    name: Planificación de presentaciones
    description: |
      Planificación y programación del contenido de las presentaciones regulatorias.
  BC-1530.20.20:
    name: Compilación del eCTD
    description: |
      Compilación de las presentaciones en formato eCTD.
  BC-1530.20.30:
    name: Redacción y revisión de presentaciones
    description: |
      Redacción y revisión de los documentos de las presentaciones regulatorias.
  BC-1530.20.40:
    name: Registro y seguimiento de presentaciones
    description: |
      Registro y seguimiento de las presentaciones durante la revisión por parte de las agencias.
  BC-1530.30:
    name: Gestión de la inteligencia regulatoria
    description: |
      Monitoriza las guías regulatorias, los cambios normativos y la actividad de los competidores para anticipar el impacto en el portafolio.
  BC-1530.30.10:
    name: Monitorización de guías regulatorias
    description: |
      Monitorización de documentos de orientación y cambios normativos.
  BC-1530.30.20:
    name: Inteligencia regulatoria competitiva
    description: |
      Inteligencia sobre la actividad regulatoria de los competidores.
  BC-1530.30.30:
    name: Repositorio de conocimiento regulatorio
    description: |
      Mantenimiento del repositorio de conocimiento regulatorio corporativo.
  BC-1530.40:
    name: Gestión del mantenimiento regulatorio del ciclo de vida
    description: |
      Gestiona variaciones, renovaciones y cambios posautorización para mantener las autorizaciones de comercialización vigentes.
  BC-1530.40.10:
    name: Presentaciones de variaciones
    description: |
      Presentación de variaciones de tipo IA, IB y II.
  BC-1530.40.20:
    name: Presentaciones de renovación
    description: |
      Presentaciones de renovación de la autorización de comercialización.
  BC-1530.40.30:
    name: Gestión de cambios posautorización
    description: |
      Gestión de cambios CMC y de etiquetado tras la autorización.
  BC-1530.40.40:
    name: Planificación de presentaciones del ciclo de vida
    description: |
      Planificación de las actividades de presentación del ciclo de vida por producto.
  BC-1530.50:
    name: Gestión de interacciones con las agencias reguladoras
    description: |
      Prepara y gestiona reuniones científicas y solicitudes de asesoramiento ante FDA, EMA, PMDA y otras autoridades sanitarias.
  BC-1530.50.10:
    name: Solicitudes de asesoramiento científico
    description: |
      Solicitudes de asesoramiento científico a las autoridades sanitarias.
  BC-1530.50.20:
    name: Gestión de reuniones con autoridades sanitarias
    description: |
      Preparación y celebración de reuniones con las agencias reguladoras.
  BC-1530.50.30:
    name: Respuesta a consultas de autoridades sanitarias
    description: |
      Respuesta a las solicitudes de información de las autoridades sanitarias.
  BC-1530.60:
    name: Gestión del etiquetado
    description: |
      Desarrolla y mantiene el etiquetado central y local del producto, incluyendo SmPC/USPI, prospectos y gestión artística.
  BC-1530.60.10:
    name: Gestión del etiquetado central
    description: |
      Gestión de la ficha técnica central y el etiquetado corporativo.
  BC-1530.60.20:
    name: Adaptación del etiquetado local
    description: |
      Adaptación y traducción del SmPC/USPI local por mercado.
  BC-1530.60.30:
    name: Implementación de cambios de etiquetado
    description: |
      Implementación de cambios de etiquetado en todos los mercados.
  BC-1530.60.40:
    name: Gestión de artes gráficas
    description: |
      Gestión de las artes gráficas del envase y revisión de pruebas.

locale: es
source: L1-banking-customer-management.yaml
entries:
  BC-1300:
    name: Gestión de clientes bancarios
    description: |
      Incorporación de clientes, KYC/CDD, atención al cliente y acceso a canales para clientes bancarios.
  BC-1300.10:
    name: Gestión de incorporación de clientes
    description: |
      Apertura de cuentas, verificación de identidad y activación de cuentas.
  BC-1300.10.10:
    name: Captura de solicitudes
    description: |
      Captura de datos de solicitudes de nuevos clientes y cuentas.
  BC-1300.10.20:
    name: Verificación de identidad
    description: |
      Verificación de identidad mediante comprobaciones documentales y biométricas.
  BC-1300.10.30:
    name: Configuración y activación de cuentas
    description: |
      Configuración de cuentas, productos y activación del acceso a canales.
  BC-1300.10.40:
    name: Comunicación del estado de incorporación
    description: |
      Comunicación al cliente sobre el estado de incorporación y los pasos siguientes.
  BC-1300.20:
    name: Gestión de KYC y debida diligencia del cliente
    description: |
      KYC, CDD, EDD, revisión periódica y verificación de PEP.
  BC-1300.20.10:
    name: Calificación de riesgo del cliente
    description: |
      Calificación del riesgo de los clientes en función de los factores de riesgo AML.
  BC-1300.20.20:
    name: Recopilación de documentación KYC
    description: |
      Recopilación y validación de la documentación KYC.
  BC-1300.20.30:
    name: Verificación de sanciones y PEP
    description: |
      Verificación contra listas de sanciones, PEP y medios adversos.
  BC-1300.20.40:
    name: Debida diligencia reforzada
    description: |
      EDD para clientes de alto riesgo y estructuras complejas.
  BC-1300.20.50:
    name: Revisión periódica de KYC
    description: |
      Revisión y actualización periódica de la información KYC de los clientes.
  BC-1300.30:
    name: Gestión de atención al cliente
    description: |
      Solicitudes de atención del día a día y mantenimiento de cuentas.
  BC-1300.30.10:
    name: Mantenimiento de cuentas
    description: |
      Mantenimiento de cuentas incluyendo límites, firmantes y direcciones.
  BC-1300.30.20:
    name: Gestión de solicitudes de servicio
    description: |
      Gestión de solicitudes de atención al cliente e instrucciones.
  BC-1300.30.30:
    name: Provisión de extractos y documentos
    description: |
      Provisión de extractos, certificados y documentos para el cliente.
  BC-1300.30.40:
    name: Gestión de cancelación de clientes
    description: |
      Desincorporación de clientes y cierre de relaciones comerciales.
  BC-1300.40:
    name: Gestión de información de clientes
    description: |
      Datos del cliente, consentimientos, preferencias y registro maestro.
  BC-1300.40.10:
    name: Mantenimiento del perfil del cliente
    description: |
      Mantenimiento del perfil del cliente y datos demográficos.
  BC-1300.40.20:
    name: Gestión de titularidad real
    description: |
      Captura y mantenimiento de información sobre titulares reales.
  BC-1300.40.30:
    name: Gestión del consentimiento del cliente
    description: |
      Captura y aplicación de consentimientos de marketing y de compartición de datos.
  BC-1300.40.40:
    name: Gestión del registro maestro del cliente
    description: |
      Mantenimiento del registro maestro del cliente en todos los sistemas.
  BC-1300.50:
    name: Gestión de canales bancarios
    description: |
      Operaciones de canales de sucursal, cajero automático, online, móvil y telefonía.
  BC-1300.50.10:
    name: Operaciones del canal de sucursal
    description: |
      Operación del canal de sucursal física y servicios de caja.
  BC-1300.50.20:
    name: Operaciones de cajeros automáticos y autoservicio
    description: |
      Operación del parque de cajeros automáticos, quioscos y dispositivos de autoservicio.
  BC-1300.50.30:
    name: Operaciones de canales digitales
    description: |
      Operación de canales de banca online y móvil.
  BC-1300.50.40:
    name: Operaciones del canal de telefonía
    description: |
      Operación de canales de banca telefónica y autenticación por voz.
  BC-1300.50.50:
    name: Operaciones de banca abierta y canal API
    description: |
      Operación de APIs de banca abierta y acceso de terceros.

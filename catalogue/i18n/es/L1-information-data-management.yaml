locale: es
source: L1-information-data-management.yaml
entries:
  BC-610:
    name: Gestión de la información y los datos
    description: |
      Gobierno de datos, datos maestros, calidad de datos, analítica e inteligencia artificial para convertir los datos en un activo empresarial fiable.
  BC-610.10:
    name: Gestión del gobierno de datos
    description: |
      Propiedad, administración, políticas y estándares de datos para garantizar la confianza y el cumplimiento normativo.
  BC-610.10.10:
    name: Propiedad y administración de datos
    description: |
      Asignación y operación de los roles de propietario y administrador de datos.
  BC-610.10.20:
    name: Políticas y estándares de datos
    description: |
      Definición de políticas, estándares y marcos de referencia de datos.
  BC-610.10.30:
    name: Catalogación y linaje de datos
    description: |
      Catálogo de datos, glosario y linaje de datos de extremo a extremo.
  BC-610.10.40:
    name: Privacidad y clasificación de datos
    description: |
      Clasificación de los datos y aplicación de controles de privacidad.
  BC-610.10.50:
    name: Seguimiento del riesgo y cumplimiento normativo de datos
    description: |
      Seguimiento del riesgo de datos y del cumplimiento regulatorio (p. ej., BCBS 239, GDPR).
  BC-610.20:
    name: Gestión de datos maestros
    description: |
      MDM para clientes, productos, proveedores, empleados y otras entidades clave para garantizar una única versión de la verdad.
  BC-610.20.10:
    name: Datos maestros de clientes
    description: |
      Gobierno y consolidación de los datos maestros de clientes.
  BC-610.20.20:
    name: Datos maestros de productos
    description: |
      Gobierno y consolidación de los datos maestros de productos y materiales.
  BC-610.20.30:
    name: Datos maestros de proveedores
    description: |
      Gobierno y consolidación de los datos maestros de proveedores.
  BC-610.20.40:
    name: Datos maestros de empleados
    description: |
      Gobierno y consolidación de los datos maestros de empleados.
  BC-610.20.50:
    name: Gestión de datos de referencia
    description: |
      Conjuntos de datos de referencia, listas de códigos y jerarquías.
  BC-610.30:
    name: Gestión de la calidad de datos
    description: |
      Monitorización, perfilado y remediación de la calidad de los datos para garantizar que sean exactos, completos y oportunos.
  BC-610.30.10:
    name: Perfilado de la calidad de datos
    description: |
      Perfilado, establecimiento de línea base y evaluación de la calidad de los datos.
  BC-610.30.20:
    name: Gestión de reglas de calidad de datos
    description: |
      Definición, despliegue y monitorización de reglas de calidad de datos.
  BC-610.30.30:
    name: Resolución de incidencias de calidad de datos
    description: |
      Clasificación, remediación y análisis de causa raíz de incidencias de calidad de datos.
  BC-610.30.40:
    name: Informes de calidad de datos
    description: |
      Cuadros de mando de calidad de datos e informes para propietarios y directivos.
  BC-610.40:
    name: Gestión de la arquitectura de datos
    description: |
      Arquitectura lógica y física de datos para soportar las necesidades de información del negocio.
  BC-610.40.10:
    name: Modelado de datos conceptual y lógico
    description: |
      Modelos de datos conceptuales y lógicos a nivel empresarial.
  BC-610.40.20:
    name: Arquitectura de la plataforma de datos
    description: |
      Arquitectura de data lakes, almacenes de datos, lakehouses y mallas de datos.
  BC-610.40.30:
    name: Arquitectura de integración de datos
    description: |
      Patrones de integración de datos por lotes, en streaming y mediante CDC.
  BC-610.40.40:
    name: Diseño de almacenamiento y retención de datos
    description: |
      Diseño del almacenamiento incluyendo retención, archivado y estratificación.
  BC-610.50:
    name: Gestión de analítica e inteligencia de negocio
    description: |
      Informes, analítica y entrega de inteligencia de negocio para apoyar la toma de decisiones basada en datos.
  BC-610.50.10:
    name: Entrega de informes y paneles de control
    description: |
      Entrega de informes operativos y de gestión, y paneles de control.
  BC-610.50.20:
    name: Analítica en autoservicio
    description: |
      Habilitación de analítica en autoservicio y productos de datos para el negocio.
  BC-610.50.30:
    name: Analítica avanzada y ciencia de datos
    description: |
      Analítica avanzada, modelos de ciencia de datos y experimentación.
  BC-610.50.40:
    name: Operaciones de la plataforma de analítica
    description: |
      Operación de las plataformas de BI y analítica y sus bibliotecas de contenido.
  BC-610.60:
    name: Gestión de la inteligencia artificial
    description: |
      Ciclo de vida de modelos de IA/ML, MLOps e IA responsable para desplegar soluciones de inteligencia artificial de forma controlada.
  BC-610.60.10:
    name: Identificación de casos de uso de IA
    description: |
      Identificación y priorización de casos de uso de IA/ML.
  BC-610.60.20:
    name: Desarrollo de modelos de aprendizaje automático
    description: |
      Ingeniería de características, entrenamiento y validación de modelos de ML.
  BC-610.60.30:
    name: MLOps y despliegue de modelos
    description: |
      Despliegue, monitorización y gestión del ciclo de vida de modelos (MLOps).
  BC-610.60.40:
    name: Gobierno de IA responsable
    description: |
      Principios de IA responsable, evaluación de riesgos y monitorización de sesgos.
  BC-610.60.50:
    name: Gestión de la IA generativa
    description: |
      Casos de uso de IA generativa, selección de modelos fundacionales y controles de seguridad.

locale: es
source: L1-real-estate-brokerage-management.yaml
entries:
  BC-4960:
    name: Gestión de la intermediación inmobiliaria
    description: |
      Intermediación y agencia como línea de servicio para el sector inmobiliario comercial y residencial — captación de mandatos de exclusiva, representación de compradores/inquilinos, gestión de datos MLS, análisis comparativo, operaciones de visitas, negociación de ofertas, coordinación del cierre, liquidación de comisiones y gestión del rendimiento y el equipo de agentes.
    in_scope:
      - Captación y representación de mandatos de exclusiva del vendedor/arrendador
      - Captación y representación del comprador/inquilino
      - Captura, sindicación y cumplimiento de anuncios en MLS
      - Análisis comparativo de mercado y opinión de valor del agente
      - Operaciones de visitas, jornadas de puertas abiertas y acceso físico/digital
      - Redacción de ofertas, contraofertas y gestión de múltiples ofertas
      - Coordinación del cierre y seguimiento de contingencias
      - Liquidación de comisiones, agentes cooperantes y honorarios de captación
      - Licencias de agentes, tutela, rendimiento y planes de comisiones
    out_of_scope:
      - Operaciones de arrendamiento del arrendador en activos propios (BC-4950)
      - Ejecución de adquisiciones/disposiciones por parte de los propietarios (BC-4930)
      - Encargos de valoración de inmuebles (BC-4970)
      - Postura de cumplimiento regulatorio de licencias de agentes (BC-4990)
  BC-4960.10:
    name: Captación y representación de mandatos de exclusiva
    description: |
      Captación y conversión de mandatos de exclusiva del vendedor/arrendador y ejecución del plan de comercialización comprometido en el acuerdo de exclusiva.
  BC-4960.10.10:
    name: Presentación y captación del mandato
    description: |
      Presentación para la captación de mandatos, incluyendo análisis comparativo de mercado, propuesta de comercialización y exposición.
  BC-4960.10.20:
    name: Gestión del acuerdo de exclusiva
    description: |
      Gestión de los acuerdos de exclusiva, incluyendo los términos de exclusividad, plazo y comisión.
  BC-4960.10.30:
    name: Plan de comercialización del mandato
    description: |
      Definición y ejecución del plan de comercialización comprometido en el acuerdo de exclusiva.
  BC-4960.20:
    name: Representación de compradores e inquilinos
    description: |
      Captación y ejecución de mandatos de representación del comprador y del inquilino, incluyendo búsqueda y preselección.
  BC-4960.20.10:
    name: Captación de compradores e inquilinos
    description: |
      Captación de clientes compradores e inquilinos, incluyendo acuerdos de agencia y divulgaciones.
  BC-4960.20.20:
    name: Definición de requisitos y encargo
    description: |
      Definición del encargo del cliente cubriendo uso, superficie, localización y presupuesto.
  BC-4960.20.30:
    name: Búsqueda y preselección de inmuebles
    description: |
      Búsqueda, preselección y presentación de inmuebles candidatos al cliente.
  BC-4960.30:
    name: Gestión de datos de anuncios y MLS
    description: |
      Gestión de los datos de anuncios en MLS y portales, incluyendo captura, material gráfico, sindicación y cumplimiento de los estándares de datos RESO.
  BC-4960.30.10:
    name: Captura de anuncios en MLS
    description: |
      Captura de anuncios en MLS conforme a los campos y reglas del diccionario de datos RESO.
  BC-4960.30.20:
    name: Material gráfico y fotografía del anuncio
    description: |
      Producción y gestión del material gráfico del anuncio, incluyendo fotografía, vídeo y recorridos en 3D.
  BC-4960.30.30:
    name: Sindicación y distribución en portales
    description: |
      Distribución de anuncios en portales, sitios asociados y agregadores.
  BC-4960.30.40:
    name: Cumplimiento y retirada de anuncios
    description: |
      Gestión del cumplimiento de la exactitud de los anuncios, cambios de estado y retiradas.
  BC-4960.40:
    name: Análisis comparativo de mercado
    description: |
      Elaboración de análisis comparativos de mercado, opiniones de valor del agente y posicionamiento de precios para mandatos de exclusiva y comprador.
  BC-4960.40.10:
    name: Selección de ventas comparables
    description: |
      Selección de evidencia de ventas comparables a partir de MLS y registros públicos.
  BC-4960.40.20:
    name: Producción del informe de análisis comparativo de mercado
    description: |
      Producción de informes de análisis comparativo de mercado para presentación al cliente.
  BC-4960.40.30:
    name: Opinión de valor del agente
    description: |
      Emisión de opiniones de valor del agente para clientes y propietarios institucionales.
  BC-4960.50:
    name: Operaciones de visitas y jornadas de puertas abiertas
    description: |
      Operación de citas de visita, jornadas de puertas abiertas y acceso físico y digital para prospectos y agentes cooperantes.
  BC-4960.50.10:
    name: Gestión de citas de visita
    description: |
      Gestión de las citas de visita y las solicitudes de acceso de los agentes cooperantes.
  BC-4960.50.20:
    name: Operaciones de jornadas de puertas abiertas
    description: |
      Operación de las jornadas de puertas abiertas, incluyendo registro y seguimiento posterior.
  BC-4960.50.30:
    name: Gestión de caja de seguridad y control de acceso
    description: |
      Gestión de las cajas de seguridad y las credenciales de acceso digital para los inmuebles en exclusiva.
  BC-4960.60:
    name: Gestión de ofertas y negociación
    description: |
      Redacción y negociación de ofertas, contraofertas y escenarios de múltiples ofertas en nombre de la parte representada.
  BC-4960.60.10:
    name: Redacción de ofertas
    description: |
      Redacción de ofertas y adendas de respaldo en nombre de la parte representada.
  BC-4960.60.20:
    name: Gestión de contraofertas y múltiples ofertas
    description: |
      Gestión de contraofertas y procesos de múltiples ofertas, incluyendo convocatorias de mejor y última oferta.
  BC-4960.60.30:
    name: Aceptación y confirmación del contrato vinculante
    description: |
      Confirmación de la aceptación de la oferta y la formación del contrato vinculante.
  BC-4960.70:
    name: Coordinación del cierre de la operación de intermediación
    description: |
      Coordinación de las contingencias, el depósito en garantía y la transmisión hasta el cierre de las operaciones intermediadas.
  BC-4960.70.10:
    name: Seguimiento de contingencias
    description: |
      Seguimiento de las contingencias de inspección, financiación y otras hasta su satisfacción o renuncia.
  BC-4960.70.20:
    name: Coordinación del depósito en garantía y la transmisión
    description: |
      Coordinación con las partes de depósito en garantía y transmisión sobre los documentos y fondos de cierre.
  BC-4960.70.30:
    name: Coordinación del día del cierre
    description: |
      Coordinación de la firma, la entrega de llaves y la logística del día del cierre.
  BC-4960.80:
    name: Gestión de comisiones y agentes cooperantes
    description: |
      Captura de los términos de comisión y liquidación de las comisiones de los agentes cooperantes y los honorarios de captación.
  BC-4960.80.10:
    name: Captura del acuerdo de comisión
    description: |
      Captura de los acuerdos de comisión, incluyendo distribuciones y condiciones.
  BC-4960.80.20:
    name: Liquidación de agentes cooperantes
    description: |
      Liquidación de las comisiones adeudadas a los agentes cooperantes en operaciones cerradas.
  BC-4960.80.30:
    name: Desembolso de comisiones
    description: |
      Desembolso de comisiones a la agencia y los agentes, neto de deducciones.
  BC-4960.80.40:
    name: Gestión de honorarios de captación
    description: |
      Gestión de los acuerdos de honorarios de captación con agentes y socios referidores.
  BC-4960.90:
    name: Gestión de la productividad y el equipo de agentes
    description: |
      Gestión de la tutela de licencias de agentes, el rendimiento y la administración de los planes de comisiones en el equipo de la agencia.
  BC-4960.90.10:
    name: Seguimiento de licencias y tutela de agentes
    description: |
      Seguimiento del estado de las licencias de los agentes y los acuerdos de tutela de la agencia.
  BC-4960.90.20:
    name: Gestión del rendimiento de los agentes
    description: |
      Gestión del rendimiento de los agentes frente a los objetivos de producción y los estándares.
  BC-4960.90.30:
    name: Administración del plan de comisiones de los agentes
    description: |
      Administración de los planes de comisiones, distribuciones y topes de los agentes.

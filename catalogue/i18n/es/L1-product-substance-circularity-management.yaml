locale: es
source: L1-product-substance-circularity-management.yaml
entries:
  BC-1980:
    name: Gestión de sustancias y circularidad de productos
    description: |
      Restricciones de sustancias, recogida al final de vida, reparación, reacondicionamiento,
      refabricación y divulgación de la huella ambiental de los productos eléctricos.
  BC-1980.10:
    name: Gestión del cumplimiento de sustancias restringidas
    description: |
      Cumplimiento de los regímenes de restricción de sustancias como RoHS, SVHC REACH y
      Proposición 65.
  BC-1980.10.10:
    name: Verificación de conformidad RoHS
    description: |
      Verificación de los productos frente a los límites de sustancias de RoHS.
  BC-1980.10.20:
    name: Conformidad con SVHC REACH
    description: |
      Cumplimiento de las obligaciones de REACH relativas a sustancias extremadamente preocupantes.
  BC-1980.10.30:
    name: Conformidad libre de halógenos
    description: |
      Verificación de las declaraciones de productos libres de halógenos.
  BC-1980.10.40:
    name: Conformidad con la Proposición 65
    description: |
      Cumplimiento de las obligaciones de advertencia de la Proposición 65 de California.
  BC-1980.20:
    name: Gestión de datos de declaración de sustancias
    description: |
      Recopilación y custodia de datos de declaración de sustancias en la lista de materiales.
  BC-1980.20.10:
    name: Recopilación de declaraciones de materiales
    description: |
      Recopilación de declaraciones completas de materiales de los proveedores.
  BC-1980.20.20:
    name: Mantenimiento de la base de datos de conformidad de sustancias
    description: |
      Mantenimiento de la base de datos maestra de conformidad de sustancias.
  BC-1980.20.30:
    name: Divulgación de sustancias a clientes
    description: |
      Provisión de divulgaciones de sustancias a clientes y autoridades.
  BC-1980.30:
    name: Diligencia debida en minerales de conflicto
    description: |
      Diligencia debida sobre fuentes de estaño, tungsteno, tantalio y oro conforme a los
      regímenes alineados con la OCDE.
  BC-1980.30.10:
    name: Mapeo de fundidoras y refinerías
    description: |
      Mapeo de fundidoras y refinerías que abastecen la cadena de suministro.
  BC-1980.30.20:
    name: Consulta de país de origen
    description: |
      Consulta razonable del país de origen de los minerales cubiertos.
  BC-1980.30.30:
    name: Reporte de minerales de conflicto
    description: |
      Informes estatutarios y de cara al cliente sobre minerales de conflicto.
  BC-1980.40:
    name: Gestión del cumplimiento de baterías y embalajes
    description: |
      Cumplimiento de los regímenes de baterías y embalajes, incluido el Reglamento de Baterías
      de la UE.
  BC-1980.40.10:
    name: Conformidad con la normativa de baterías
    description: |
      Cumplimiento del Reglamento de Baterías de la UE y equivalentes.
  BC-1980.40.20:
    name: Gestión de datos del pasaporte de batería
    description: |
      Elaboración y mantenimiento de los datos del pasaporte de batería.
  BC-1980.40.30:
    name: Conformidad con residuos de envases
    description: |
      Cumplimiento de las obligaciones sobre envases y residuos de envases.
  BC-1980.50:
    name: Operaciones de recogida al final de vida
    description: |
      Recogida, logística inversa e informes de responsabilidad del productor para productos eléctricos.
  BC-1980.50.10:
    name: Operaciones del sistema de recogida WEEE
    description: |
      Operación de los acuerdos del sistema de cumplimiento de productores WEEE.
  BC-1980.50.20:
    name: Reporte de responsabilidad del productor
    description: |
      Reporte de toneladas puestas en el mercado y recuperadas.
  BC-1980.50.30:
    name: Operaciones de logística inversa
    description: |
      Logística inversa para productos y componentes al final de su vida útil.
  BC-1980.60:
    name: Operaciones de reparación y reacondicionamiento
    description: |
      Red de servicio de reparación y operaciones de documentación del derecho a reparar.
  BC-1980.60.10:
    name: Operaciones de la red de servicio de reparación
    description: |
      Operación de redes de servicio de reparación autorizadas.
  BC-1980.60.20:
    name: Documentación del derecho a reparar
    description: |
      Provisión de documentación de reparación conforme a los regímenes de derecho a reparar.
  BC-1980.60.30:
    name: Operaciones del proceso de reacondicionamiento
    description: |
      Reacondicionamiento de productos devueltos hasta condición de reventa.
  BC-1980.70:
    name: Operaciones de refabricación y reutilización
    description: |
      Refabricación y reutilización de núcleos y componentes en nuevas fabricaciones.
  BC-1980.70.10:
    name: Recuperación y desmontaje de núcleos
    description: |
      Recuperación y desmontaje de núcleos devueltos.
  BC-1980.70.20:
    name: Ejecución del proceso de refabricación
    description: |
      Ejecución de los procesos de refabricación sobre núcleos recuperados.
  BC-1980.70.30:
    name: Trazabilidad de componentes reutilizados
    description: |
      Trazabilidad de los componentes reutilizados en nuevas fabricaciones de productos.
  BC-1980.80:
    name: Reporte de la huella ambiental del producto
    description: |
      Elaboración y divulgación de datos de huella ambiental a nivel de producto.
  BC-1980.80.10:
    name: Cálculo de la huella de carbono del producto
    description: |
      Cálculo de las huellas de carbono a nivel de producto.
  BC-1980.80.20:
    name: Declaración ambiental de producto
    description: |
      Elaboración de declaraciones ambientales de producto.
  BC-1980.80.30:
    name: Operaciones del pasaporte digital de producto
    description: |
      Operación de pasaportes digitales de producto conforme a la normativa emergente.

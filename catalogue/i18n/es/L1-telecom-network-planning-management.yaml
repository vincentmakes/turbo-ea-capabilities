locale: es
source: L1-telecom-network-planning-management.yaml
entries:
  BC-2610:
    name: Planificación de red de telecomunicaciones
    description: |
      Diseño y dimensionamiento a largo plazo de redes fijas, móviles e IP, incluyendo
      previsión de demanda, planificación de cobertura y capacidad, definición de la
      evolución tecnológica, programación del despliegue de emplazamientos y coordinación
      del fin de vida de redes heredadas.
  BC-2610.10:
    name: Previsión de demanda de red
    description: |
      Previsión a largo plazo de la demanda de suscriptores, tráfico y servicios para
      orientar las decisiones de cobertura y capacidad.
  BC-2610.10.10:
    name: Previsión de crecimiento de suscriptores
    description: |
      Previsión de la población de suscriptores por segmento, tecnología y geografía.
  BC-2610.10.20:
    name: Previsión de demanda de tráfico
    description: |
      Previsión de volúmenes de tráfico de voz, datos, vídeo y señalización por dominio
      y celda.
  BC-2610.10.30:
    name: Modelado de demanda de servicios
    description: |
      Modelado de la demanda de servicios nuevos y en evolución para sustentar las hojas
      de ruta de capacidad y funcionalidades.
  BC-2610.20:
    name: Planificación de cobertura de red
    description: |
      Planificación de objetivos de cobertura geográfica y resiliencia para redes radio,
      fibra y transporte.
  BC-2610.20.10:
    name: Planificación de cobertura radio
    description: |
      Definición de objetivos de cobertura radio y modelado de propagación por banda y
      tecnología.
  BC-2610.20.20:
    name: Planificación de cobertura de fibra
    description: |
      Planificación del despliegue de fibra, hogares conectados y ubicación de nodos de
      acceso.
  BC-2610.20.30:
    name: Planificación de redundancia y resiliencia
    description: |
      Diseño de diversidad de rutas, redundancia geográfica y objetivos de resiliencia.
  BC-2610.30:
    name: Planificación de capacidad de red
    description: |
      Dimensionamiento de capacidad en los dominios de acceso radio, núcleo y transporte
      para satisfacer la demanda prevista dentro de los objetivos de rendimiento.
  BC-2610.30.10:
    name: Planificación de capacidad de acceso radio
    description: |
      Dimensionamiento de capacidad de celdas, sectores y portadoras en la red de acceso
      radio.
  BC-2610.30.20:
    name: Planificación de capacidad del núcleo
    description: |
      Dimensionamiento de capacidad de las funciones del núcleo de red móvil y fijo y de
      los repositorios de datos de suscriptores.
  BC-2610.30.30:
    name: Planificación de capacidad de transporte
    description: |
      Dimensionamiento de capacidad de transporte fronthaul, backhaul, metro y
      agregación.
  BC-2610.30.40:
    name: Planificación de capacidad del backbone IP
    description: |
      Dimensionamiento de capacidad del backbone IP y de los enlaces de peering y
      tránsito.
  BC-2610.40:
    name: Planificación de evolución tecnológica de red
    description: |
      Definición de la hoja de ruta tecnológica plurianual y la evolución de la
      arquitectura de red.
  BC-2610.40.10:
    name: Definición de hoja de ruta tecnológica
    description: |
      Definición de la hoja de ruta de evolución plurianual de tecnologías radio, de
      transporte y de núcleo.
  BC-2610.40.20:
    name: Evolución de la arquitectura de red
    description: |
      Transformación arquitectónica hacia arquitecturas de referencia objetivo, como
      núcleo cloud-native y Open RAN.
  BC-2610.40.30:
    name: Selección de tecnología de proveedor
    description: |
      Evaluación y selección de tecnologías de proveedores para nuevos dominios de red
      y ciclos de renovación.
  BC-2610.50:
    name: Planificación de emplazamientos de red
    description: |
      Identificación, inspección, aprobación y programación del despliegue de nuevos
      emplazamientos de red.
  BC-2610.50.10:
    name: Identificación de emplazamientos
    description: |
      Identificación de emplazamientos candidatos según criterios de cobertura, capacidad
      y backhaul.
  BC-2610.50.20:
    name: Inspección de emplazamiento radioeléctrico
    description: |
      Inspección de emplazamientos candidatos para evaluar rendimiento RF, viabilidad
      estructural e interferencias.
  BC-2610.50.30:
    name: Coordinación de aprobaciones de construcción
    description: |
      Coordinación de aprobaciones internas, permisos de planificación urbanística y
      zonificación para nuevos emplazamientos.
  BC-2610.50.40:
    name: Programación de despliegue
    description: |
      Programación y secuenciación de la construcción de emplazamientos en función de
      compromisos de capex, proveedores y cobertura.
  BC-2610.60:
    name: Planificación de fin de vida de red
    description: |
      Planificación del cierre de redes heredadas, migración de clientes y
      desmantelamiento de activos.
  BC-2610.60.10:
    name: Planificación del desmantelamiento de redes heredadas
    description: |
      Planificación del desmantelamiento ordenado de elementos de red heredados y activos
      asociados.
  BC-2610.60.20:
    name: Planificación de migración de clientes
    description: |
      Planificación de la migración de clientes desde tecnologías en retirada hacia
      plataformas objetivo.
  BC-2610.60.30:
    name: Planificación de obsolescencia tecnológica
    description: |
      Definición de hitos de obsolescencia tecnológica, notificaciones regulatorias y
      eventos de cierre definitivo.

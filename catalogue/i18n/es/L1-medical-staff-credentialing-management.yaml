locale: es
source: L1-medical-staff-credentialing-management.yaml
entries:
  BC-2890:
    name: Gestión de la acreditación del personal médico
    description: |
      Acreditación y otorgamiento de privilegios a los profesionales, evaluación del rendimiento
      y revisión de pares, gobernanza del personal médico, inscripción de proveedores
      y programas de salud para el personal.
  BC-2890.10:
    name: Acreditación de profesionales
    description: |
      Acreditación inicial y continua de los profesionales, incluyendo la verificación en fuente primaria.
  BC-2890.10.10:
    name: Recepción de solicitudes
    description: |
      Recepción y revisión de la integridad de las solicitudes de acreditación.
  BC-2890.10.20:
    name: Verificación en fuente primaria
    description: |
      Verificación en fuente primaria de la formación, titulación, licencias y referencias.
  BC-2890.10.30:
    name: Gestión del expediente de acreditación
    description: |
      Mantenimiento y auditoría de los expedientes de acreditación y la documentación de respaldo.
  BC-2890.10.40:
    name: Reacreditación
    description: |
      Reacreditación periódica del personal médico activo y de los profesionales de la salud aliados.
  BC-2890.20:
    name: Gestión de privilegios
    description: |
      Delimitación, otorgamiento y renovación de los privilegios clínicos.
  BC-2890.20.10:
    name: Delimitación de privilegios
    description: |
      Definición y mantenimiento de la delimitación de privilegios por departamento y especialidad.
  BC-2890.20.20:
    name: Otorgamiento inicial de privilegios
    description: |
      Otorgamiento de los privilegios clínicos iniciales a los nuevos profesionales.
  BC-2890.20.30:
    name: Renovación de privilegios
    description: |
      Renovación periódica de los privilegios clínicos en función de datos de rendimiento y competencia.
  BC-2890.20.40:
    name: Gestión de privilegios de especialidad
    description: |
      Gestión de solicitudes de privilegios de especialidad, avanzados y de procedimientos.
  BC-2890.30:
    name: Evaluación del rendimiento y revisión de pares
    description: |
      Evaluación continua y focalizada del rendimiento de los profesionales y revisión de pares.
  BC-2890.30.10:
    name: Evaluación continua del rendimiento
    description: |
      Evaluación continuada de la práctica profesional a través de indicadores específicos por especialidad.
  BC-2890.30.20:
    name: Evaluación focalizada del rendimiento
    description: |
      Evaluación focalizada de la práctica profesional desencadenada por señales de rendimiento o nuevos privilegios.
  BC-2890.30.30:
    name: Revisión de casos por pares
    description: |
      Revisión estructurada por pares de casos clínicos con implicaciones en el rendimiento.
  BC-2890.30.40:
    name: Informes de rendimiento de los profesionales
    description: |
      Informes del rendimiento de los profesionales a los comités del personal médico y a los individuos.
  BC-2890.40:
    name: Gobernanza del personal médico
    description: |
      Gobernanza del personal médico, incluyendo estatutos, comité ejecutivo y operaciones departamentales.
  BC-2890.40.10:
    name: Mantenimiento de estatutos
    description: |
      Mantenimiento y modificación de los estatutos y reglamentos del personal médico.
  BC-2890.40.20:
    name: Apoyo al comité ejecutivo médico
    description: |
      Apoyo operativo y analítico al comité ejecutivo médico.
  BC-2890.40.30:
    name: Operaciones de comités departamentales
    description: |
      Operaciones de los comités departamentales, seccionales y permanentes.
  BC-2890.40.40:
    name: Apoyo a la elección de cargos
    description: |
      Apoyo a las nominaciones y elecciones de cargos del personal médico.
  BC-2890.50:
    name: Gestión de la inscripción de proveedores
    description: |
      Inscripción de los proveedores en los pagadores y programas gubernamentales.
  BC-2890.50.10:
    name: Inscripción en pagadores
    description: |
      Inscripción de los proveedores en las redes de pagadores comerciales.
  BC-2890.50.20:
    name: Mantenimiento del repositorio centralizado de acreditaciones
    description: |
      Mantenimiento de los datos de acreditación centralizados del proveedor compartidos con los pagadores.
  BC-2890.50.30:
    name: Inscripción en programas gubernamentales
    description: |
      Inscripción de los proveedores en programas de seguro gubernamentales.
  BC-2890.50.40:
    name: Seguimiento de la reinscripción
    description: |
      Seguimiento y tramitación oportuna de los ciclos de reinscripción de los proveedores.
  BC-2890.60:
    name: Salud y bienestar del profesional
    description: |
      Programas de apoyo a la salud del profesional, la prevención del agotamiento laboral y el apoyo confidencial.
  BC-2890.60.10:
    name: Gestión del profesional con discapacidad
    description: |
      Identificación, intervención y seguimiento de profesionales con discapacidad o afectación.
  BC-2890.60.20:
    name: Operaciones del programa de bienestar
    description: |
      Operación de programas de bienestar y resiliencia para los profesionales.
  BC-2890.60.30:
    name: Vigilancia del agotamiento laboral
    description: |
      Vigilancia de los indicadores de agotamiento laboral y bienestar de los profesionales.
  BC-2890.60.40:
    name: Recursos de apoyo confidencial
    description: |
      Recursos confidenciales de salud mental, apoyo entre pares y asesoramiento para los profesionales.

locale: es
source: L1-vehicle-aftersales-warranty-management.yaml
entries:
  BC-3450:
    name: Gestión de posventa y garantía de vehículos
    description: |
      Posventa del OEM — operaciones de garantía y resolución de reclamaciones,
      gestión de campañas de servicio y retiradas, información técnica de servicio,
      asistencia al cliente y el circuito de retroalimentación de ingeniería,
      anclada en Magnuson-Moss, las normas de ventas al consumidor de la UE y
      los regímenes de retirada de la NHTSA y la UE.
  BC-3450.10:
    name: Política de garantía y gestión de reclamaciones
    description: |
      Definición de las políticas de garantía y resolución de reclamaciones de
      garantía del concesionario, incluida la recuperación del proveedor.
  BC-3450.10.10:
    name: Definición de política de garantía
    description: |
      Definición de los términos, duraciones, coberturas y exclusiones de garantía
      en los distintos mercados y líneas de producto.
  BC-3450.10.20:
    name: Resolución de reclamaciones de garantía
    description: |
      Resolución de reclamaciones de garantía del concesionario, incluidos los
      estándares de tiempo de mano de obra y la validación de piezas.
  BC-3450.10.30:
    name: Gestión de concesiones y reparaciones de buena voluntad
    description: |
      Gestión de reparaciones de buena voluntad, concesiones y extensiones de
      garantía por fidelización del cliente.
  BC-3450.10.40:
    name: Gestión de recuperación del proveedor
    description: |
      Recuperación del coste de garantía de los proveedores responsables en
      virtud de acuerdos de reparto de costes de garantía.
  BC-3450.20:
    name: Gestión de campañas de servicio y retiradas
    description: |
      Gestión integral de las retiradas de seguridad y las campañas de servicio
      no relacionadas con la seguridad, incluida la notificación y el seguimiento
      de la tasa de finalización.
  BC-3450.20.10:
    name: Decisión de retirada y notificación
    description: |
      Toma de decisiones y notificación legal de retiradas de seguridad a las
      autoridades y propietarios.
  BC-3450.20.20:
    name: Planificación de campañas de servicio
    description: |
      Planificación de campañas de servicio, incluida la definición del remedio,
      el aprovisionamiento de piezas y las instrucciones al concesionario.
  BC-3450.20.30:
    name: Gestión de la notificación al propietario
    description: |
      Identificación y notificación de los propietarios de vehículos afectados
      por correo postal, correo electrónico y canales internos del vehículo.
  BC-3450.20.40:
    name: Seguimiento de la tasa de finalización de la campaña
    description: |
      Seguimiento de las tasas de finalización de retiradas y campañas y las
      obligaciones de reporte regulatorio.
  BC-3450.30:
    name: Gestión de información técnica de servicio
    description: |
      Elaboración y distribución de procedimientos de reparación, boletines
      técnicos e información de diagnóstico para la red de servicio del
      concesionario.
  BC-3450.30.10:
    name: Elaboración de procedimientos de reparación
    description: |
      Elaboración de procedimientos de reparación del vehículo, vistas
      explosionadas y datos de par y apriete.
  BC-3450.30.20:
    name: Gestión de boletines técnicos de servicio
    description: |
      Elaboración, publicación y gestión del ciclo de vida de los boletines
      técnicos de servicio.
  BC-3450.30.30:
    name: Gestión de la biblioteca de códigos de diagnóstico
    description: |
      Mantenimiento de bibliotecas de DTC, árboles de diagnóstico y contenido
      de diagnóstico guiado relacionado.
  BC-3450.30.40:
    name: Especificación de utillaje de servicio
    description: |
      Especificación de herramientas especiales y equipos de servicio del
      concesionario para las operaciones de servicio del vehículo.
  BC-3450.40:
    name: Operaciones de diagnóstico del vehículo y servicio telemático
    description: |
      Operaciones del OEM de apoyo al diagnóstico conectado, datos de diagnóstico
      remoto y ecosistemas de herramientas de diagnóstico del concesionario.
  BC-3450.40.10:
    name: Operaciones de diagnóstico remoto del vehículo
    description: |
      Operación de servicios de salud y diagnóstico remoto del vehículo en apoyo
      del servicio del concesionario.
  BC-3450.40.20:
    name: Gestión de actualizaciones de herramientas de diagnóstico
    description: |
      Gestión del software, los datos de calibración y el acceso de seguridad de
      las herramientas de diagnóstico del concesionario.
  BC-3450.40.30:
    name: Agregación de datos de servicio
    description: |
      Agregación y análisis de datos de eventos de servicio de concesionarios y
      vehículos conectados.
  BC-3450.50:
    name: Operaciones de asistencia al cliente y asistencia en carretera
    description: |
      Servicios de asistencia al cliente con la marca del OEM, incluida la
      asistencia en carretera, el transporte alternativo y el traslado del vehículo.
  BC-3450.50.10:
    name: Operaciones de asistencia en carretera
    description: |
      Operación de la asistencia en carretera con marca del OEM para la respuesta
      a averías e incidencias.
  BC-3450.50.20:
    name: Coordinación del transporte alternativo
    description: |
      Coordinación del transporte alternativo para los clientes durante la
      reparación o la avería.
  BC-3450.50.30:
    name: Coordinación del traslado del vehículo
    description: |
      Coordinación del traslado del vehículo tras incidencias en el extranjero
      o averías de larga distancia.
  BC-3450.60:
    name: Coordinación de la logística de piezas de posventa
    description: |
      Coordinación con la cadena de suministro de piezas de posventa para
      atender la demanda de servicio del concesionario y los remedios de
      retirada.
    in_scope:
      - Coordinación de la demanda y el suministro de piezas con los concesionarios
      - Tramitación urgente de piezas críticas en casos de vehículos inmovilizados
      - Asignación de piezas de retirada en la red de concesionarios
    out_of_scope:
      - Catálogo de repuestos y precios (BC-1060 Gestión de repuestos y posventa)
      - Operaciones de almacenamiento y distribución física de piezas (BC-1060)
  BC-3450.60.10:
    name: Coordinación de la demanda de piezas con concesionarios
    description: |
      Coordinación de la visibilidad de la demanda de piezas del concesionario
      y las señales de reposición a la cadena de suministro de piezas.
  BC-3450.60.20:
    name: Gestión del aprovisionamiento urgente de piezas críticas
    description: |
      Aprovisionamiento urgente de piezas críticas para casos de vehículos
      inmovilizados y clientes de alta gravedad.
  BC-3450.60.30:
    name: Asignación de piezas de retirada
    description: |
      Asignación de piezas de retirada con restricciones de suministro a
      concesionarios y mercados según las prioridades de la población afectada.
  BC-3450.70:
    name: Rendimiento de posventa y retroalimentación de calidad
    description: |
      Análisis de las tendencias de fallos en campo y la retroalimentación del
      cliente, y encaminamiento de los problemas de vuelta a ingeniería y
      producción.
  BC-3450.70.10:
    name: Análisis de tendencias de fallos en campo
    description: |
      Análisis de datos de garantía y eventos de servicio para identificar
      tendencias de fallos en campo y problemas emergentes.
  BC-3450.70.20:
    name: Gestión de la voz del cliente de posventa
    description: |
      Captura y análisis de la voz del cliente de posventa, incluidas encuestas
      y la retroalimentación registrada por el concesionario.
  BC-3450.70.30:
    name: Gestión del circuito de retroalimentación a ingeniería
    description: |
      Encaminamiento de los problemas de calidad en campo a ingeniería para su
      contención, corrección y aprendizaje de lecciones.

locale: es
source: L1-electrical-product-certification-management.yaml
entries:
  BC-1910:
    name: Gestión de certificación de productos eléctricos
    description: |
      Certificación multijurisdiccional de seguridad de producto, EMC y energía — estrategia,
      expedientes técnicos, relación con organismos de certificación, licencias de marcas,
      vigilancia y gestión de incumplimientos en campo.
  BC-1910.10:
    name: Estrategia y hoja de ruta de certificación
    description: |
      Definición de las marcas y aprobaciones requeridas y su secuencia de obtención.
  BC-1910.10.10:
    name: Análisis de requisitos de acceso al mercado
    description: |
      Identificación de los requisitos de certificación por mercado objetivo.
  BC-1910.10.20:
    name: Selección de esquema de certificación
    description: |
      Selección de esquemas de certificación y vías de reconocimiento.
  BC-1910.10.30:
    name: Planificación de la hoja de ruta de certificación
    description: |
      Secuenciación de aprobaciones frente a los hitos de lanzamiento del producto.
  BC-1910.20:
    name: Gestión de expedientes técnicos y evidencias
    description: |
      Elaboración y custodia de expedientes de construcción técnica y evidencias de soporte.
  BC-1910.20.10:
    name: Elaboración del expediente de construcción técnica
    description: |
      Elaboración de expedientes de construcción técnica que respaldan la aprobación de tipo.
  BC-1910.20.20:
    name: Agregación de informes de prueba
    description: |
      Agregación e indexación de informes de prueba acreditados.
  BC-1910.20.30:
    name: Elaboración de declaraciones de conformidad
    description: |
      Elaboración y firma de declaraciones de conformidad.
  BC-1910.20.40:
    name: Archivo de evidencias de conformidad
    description: |
      Archivo a largo plazo de evidencias de conformidad según los requisitos normativos de retención.
  BC-1910.30:
    name: Gestión de organismos de certificación y aprobaciones
    description: |
      Relación con organismos notificados y organismos nacionales de certificación hasta la
      emisión de aprobaciones de tipo.
  BC-1910.30.10:
    name: Selección de organismo notificado
    description: |
      Selección de organismos notificados y organismos nacionales de certificación.
  BC-1910.30.20:
    name: Gestión de solicitudes de certificación
    description: |
      Presentación de dossieres de certificación y coordinación del seguimiento.
  BC-1910.30.30:
    name: Coordinación de pruebas presenciadas
    description: |
      Coordinación de ensayos presenciados por auditores en laboratorios de proveedores o internos.
  BC-1910.30.40:
    name: Seguimiento de la emisión de aprobaciones de tipo
    description: |
      Seguimiento de las aprobaciones de tipo emitidas y la validez de los certificados.
  BC-1910.40:
    name: Licencias de marcas y conformidad del etiquetado
    description: |
      Licencias de marcas de certificación y control de las ilustraciones del etiquetado de productos.
  BC-1910.40.10:
    name: Autorización de uso de marcas
    description: |
      Autorización del uso de marcas en productos certificados.
  BC-1910.40.20:
    name: Control de ilustraciones de etiquetas de producto
    description: |
      Control del contenido de etiquetas, marcados e ilustraciones de placas de datos.
  BC-1910.40.30:
    name: Declaración de royalties de marcas
    description: |
      Declaración de volúmenes de unidades para las obligaciones de royalties de marcas.
  BC-1910.50:
    name: Vigilancia y renovación de aprobaciones
    description: |
      Mantenimiento de las aprobaciones mediante auditorías de vigilancia, variaciones y renovaciones.
  BC-1910.50.10:
    name: Coordinación de inspecciones de fábrica
    description: |
      Coordinación de inspecciones de fábrica por parte del organismo certificador y acciones de seguimiento.
  BC-1910.50.20:
    name: Pruebas periódicas de vigilancia
    description: |
      Repetición de pruebas de vigilancia de productos certificados frente a la línea de base original.
  BC-1910.50.30:
    name: Presentación de variaciones de aprobación
    description: |
      Presentación de variaciones y cambios de ingeniería contra aprobaciones emitidas.
  BC-1910.50.40:
    name: Gestión de renovación de aprobaciones
    description: |
      Renovación de aprobaciones y certificados próximos a su vencimiento.
  BC-1910.60:
    name: Gestión de incidentes de conformidad en campo
    description: |
      Gestión de incumplimientos de productos descubiertos tras la comercialización.
  BC-1910.60.10:
    name: Triaje de incidentes de incumplimiento
    description: |
      Triaje de presuntos incumplimientos de productos notificados desde el campo.
  BC-1910.60.20:
    name: Notificación a autoridades reguladoras
    description: |
      Notificación obligatoria a autoridades y organismos certificadores ante incumplimientos confirmados.
  BC-1910.60.30:
    name: Coordinación de retiradas y bloqueo de envíos
    description: |
      Coordinación de retiradas, órdenes de bloqueo de envíos y campañas de acción correctiva.

locale: es
source: L1-pricing-management.yaml
entries:
  BC-440:
    name: Gestión de la fijación de precios
    description: |
      Establecimiento de precios, estructura tarifaria, descuentos y promociones.
  BC-440.10:
    name: Gestión de la estrategia de precios
    description: |
      Modelos de fijación de precios, precios basados en valor y precios por segmento.
  BC-440.10.10:
    name: Definición del modelo de precios
    description: |
      Definición de modelos de fijación de precios (coste más margen, basado en valor, suscripción).
  BC-440.10.20:
    name: Fijación de precios basada en valor
    description: |
      Análisis del valor percibido por el cliente y la disposición a pagar para determinar precios.
  BC-440.10.30:
    name: Benchmarking competitivo de precios
    description: |
      Comparación de precios de competidores y posicionamiento de precios en el mercado.
  BC-440.10.40:
    name: Fijación de precios por segmento y geografía
    description: |
      Diferenciación de precios por segmento, canal y geografía.
  BC-440.20:
    name: Gestión de listas de precios
    description: |
      Precios de lista, precios regionales y mantenimiento de catálogos de precios.
  BC-440.20.10:
    name: Mantenimiento del catálogo de precios
    description: |
      Mantenimiento de catálogos de precios, tarifas de lista y variantes por moneda.
  BC-440.20.20:
    name: Gestión de cambios de precios
    description: |
      Aprobación, comunicación e implementación de cambios en los precios vigentes.
  BC-440.20.30:
    name: Gobernanza de datos maestros de precios
    description: |
      Gobernanza de la calidad y el linaje de los datos maestros de precios.
  BC-440.30:
    name: Gestión de descuentos y promociones
    description: |
      Políticas de descuento, ofertas promocionales y rappels comerciales.
  BC-440.30.10:
    name: Gestión de la política de descuentos
    description: |
      Definición de niveles de descuento, reglas y umbrales de aprobación.
  BC-440.30.20:
    name: Planificación y ejecución de promociones
    description: |
      Calendario promocional, configuración de ofertas y ejecución de promociones.
  BC-440.30.30:
    name: Gestión de rappels y descuentos comerciales
    description: |
      Acumulación de rappels, reclamaciones y liquidación con clientes y canales.
  BC-440.30.40:
    name: Análisis de la efectividad promocional
    description: |
      Medición del ROI promocional, incremento de ventas y canibalización.
  BC-440.40:
    name: Gestión del cumplimiento y la realización de precios
    description: |
      Gestión de excepciones de precio y análisis de fugas de margen.
  BC-440.40.10:
    name: Aprobación de excepciones de precio
    description: |
      Flujo de trabajo y aprobación de excepciones de precio fuera de la política.
  BC-440.40.20:
    name: Análisis del precio neto y margen real
    description: |
      Análisis del precio neto realizado y del margen real por transacción.
  BC-440.40.30:
    name: Investigación de fugas de precio
    description: |
      Identificación y corrección de fugas de precio y descuentos no autorizados.
  BC-440.40.40:
    name: Monitoreo del cumplimiento de precios
    description: |
      Cumplimiento de la política de precios, normativa antimonopolio y reglas de comercio justo.

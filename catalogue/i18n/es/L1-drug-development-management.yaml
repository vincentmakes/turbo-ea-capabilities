locale: es
source: L1-drug-development-management.yaml
entries:
  BC-1510:
    name: Gestión del desarrollo de fármacos
    description: |
      Lleva los candidatos desde los estudios preclínicos hasta los ensayos pivotales de Fase III y los estudios poscomercialización, abarcando también el desarrollo CMC.
  BC-1510.10:
    name: Gestión del desarrollo preclínico
    description: |
      Ejecuta estudios de farmacología preclínica, toxicología bajo GLP y ADME para respaldar el progreso hacia los ensayos en humanos.
  BC-1510.10.10:
    name: Farmacología preclínica
    description: |
      Estudios y modelización de farmacología preclínica.
  BC-1510.10.20:
    name: Toxicología preclínica
    description: |
      Estudios de toxicología GLP para la evaluación de la seguridad del compuesto.
  BC-1510.10.30:
    name: Estudios ADME y PK
    description: |
      Estudios de ADME y farmacocinética para caracterizar el perfil del compuesto.
  BC-1510.10.40:
    name: Bioanálisis preclínico
    description: |
      Desarrollo de métodos bioanalíticos y análisis de muestras preclínicas.
  BC-1510.20:
    name: Gestión del desarrollo clínico de Fase I
    description: |
      Planifica y ejecuta estudios de primera administración en humanos evaluando seguridad, tolerabilidad y PK/PD.
  BC-1510.20.10:
    name: Ejecución del estudio de primera administración en humanos
    description: |
      Planificación y ejecución del estudio de primera administración en humanos.
  BC-1510.20.20:
    name: Monitorización de seguridad en Fase I
    description: |
      Monitorización de seguridad y escalada de dosis en Fase I.
  BC-1510.20.30:
    name: Modelización clínica PK/PD
    description: |
      Modelización clínica PK/PD y selección de dosis.
  BC-1510.30:
    name: Gestión del desarrollo clínico de Fase II
    description: |
      Demuestra la prueba de concepto y determina la dosis óptima mediante diseños de ensayos adaptativos y exploratorios.
  BC-1510.30.10:
    name: Estudios de prueba de concepto de Fase II
    description: |
      Ejecución de estudios de prueba de concepto en Fase II.
  BC-1510.30.20:
    name: Estudios de determinación de dosis de Fase II
    description: |
      Estudios de determinación de dosis y relación dosis-respuesta.
  BC-1510.30.30:
    name: Operaciones de ensayos adaptativos de Fase II
    description: |
      Operación de diseños adaptativos en Fase II.
  BC-1510.40:
    name: Gestión del desarrollo clínico de Fase III
    description: |
      Ejecuta los ensayos pivotales de registro con análisis estadístico e informes conforme a ICH E9.
  BC-1510.40.10:
    name: Ejecución del ensayo de Fase III
    description: |
      Ejecución de los ensayos pivotales de Fase III.
  BC-1510.40.20:
    name: Análisis estadístico del ensayo pivotal
    description: |
      Análisis estadístico de los ensayos pivotales conforme a ICH E9.
  BC-1510.40.30:
    name: Reporte del ensayo pivotal
    description: |
      Redacción y divulgación de los resultados de los ensayos pivotales.
  BC-1510.50:
    name: Gestión del desarrollo de Fase IV y poscomercialización
    description: |
      Genera evidencia del mundo real (RWE) y ejecuta estudios de compromiso poscomercialización y expansión de indicaciones.
  BC-1510.50.10:
    name: Estudios de compromiso poscomercialización
    description: |
      Ejecución de estudios de compromiso y requisitos poscomercialización.
  BC-1510.50.20:
    name: Generación de evidencia del mundo real
    description: |
      Generación de RWE mediante estudios observacionales poscomercialización.
  BC-1510.50.30:
    name: Expansión de indicaciones en el ciclo de vida
    description: |
      Desarrollo del ciclo de vida y expansión de indicaciones terapéuticas.
  BC-1510.60:
    name: Gestión del desarrollo CMC
    description: |
      Desarrolla y valida la síntesis de la sustancia activa, la formulación del producto, los métodos analíticos y los programas de estabilidad conforme a ICH.
  BC-1510.60.10:
    name: Desarrollo de la sustancia activa
    description: |
      Desarrollo del proceso de síntesis de la sustancia activa farmacéutica.
  BC-1510.60.20:
    name: Desarrollo del producto farmacéutico
    description: |
      Desarrollo de la forma farmacéutica y la formulación del producto.
  BC-1510.60.30:
    name: Desarrollo de métodos analíticos
    description: |
      Desarrollo y validación de métodos analíticos para el control del producto.
  BC-1510.60.40:
    name: Gestión del programa de estabilidad
    description: |
      Programa de estabilidad alineado con ICH Q1.
  BC-1510.60.50:
    name: Validación de procesos
    description: |
      Validación de procesos conforme a ICH Q7–Q12.

locale: es
source: L1-utility-network-asset-management.yaml
entries:
  BC-3900:
    name: Gestión de activos de red de la empresa de servicios públicos
    description: |
      Gestión del ciclo de vida completo de las infraestructuras de red de larga duración
      de las empresas de servicios públicos — activos de electricidad, gas, agua y aguas
      residuales — cubriendo la integridad del registro de activos, la vigilancia del estado
      y la salud, la puntuación de riesgos y criticidad, la planificación de inversiones
      teniendo en cuenta la base regulatoria de activos, los programas de renovación, los
      informes de rendimiento y los registros geoespaciales de la red.
  BC-3900.10:
    name: Gestión del registro de activos
    description: |
      Mantenimiento del registro de activos de la empresa de servicios públicos como fuente
      única de verdad para los activos de la red y sus relaciones jerárquicas.
  BC-3900.10.10:
    name: Custodia de los datos maestros de activos
    description: |
      Custodia de los atributos de los datos maestros de activos y su clasificación.
  BC-3900.10.20:
    name: Mantenimiento de la jerarquía de activos
    description: |
      Mantenimiento de las jerarquías funcionales y físicas de los activos de la red.
  BC-3900.10.30:
    name: Conciliación del registro de activos
    description: |
      Conciliación entre el registro de activos, el SIG y los sistemas operativos.
  BC-3900.20:
    name: Monitorización del estado y la salud de los activos
    description: |
      Inspección, ensayos y vigilancia en línea del estado de los activos que alimentan
      la puntuación del índice de salud y la priorización.
  BC-3900.20.10:
    name: Operaciones del programa de inspecciones
    description: |
      Programas de inspección cíclica para los equipos principales y los activos de la red.
  BC-3900.20.20:
    name: Monitorización del estado en línea
    description: |
      Monitorización del estado en línea de transformadores, cables y equipos rotativos.
  BC-3900.20.30:
    name: Puntuación del índice de salud de activos
    description: |
      Cálculo de los índices de salud de activos a partir de datos de inspección, ensayos
      y operación.
  BC-3900.30:
    name: Evaluación del riesgo y la criticidad de los activos
    description: |
      Evaluación cuantificada del riesgo de los activos combinando la probabilidad, las
      consecuencias y la criticidad para priorizar las intervenciones.
  BC-3900.30.10:
    name: Puntuación de la criticidad de los activos
    description: |
      Puntuación de la criticidad de la red y el impacto social de los activos de la
      empresa de servicios públicos.
  BC-3900.30.20:
    name: Modelización de la probabilidad de fallo
    description: |
      Modelización estadística y basada en condiciones de la probabilidad de fallo.
  BC-3900.30.30:
    name: Cálculo del riesgo monetizado
    description: |
      Cálculo del riesgo monetizado alineado con los marcos de análisis coste-beneficio
      regulatorios.
  BC-3900.40:
    name: Planificación de la inversión en activos
    description: |
      Planificación de inversiones a largo plazo y alineada con el periodo de revisión
      de precios para las distintas categorías de red, tanto en programas regulados como
      no regulados.
    in_scope:
      - Desarrollo del plan de capital y totex plurianual
      - Análisis coste-beneficio de intervenciones en la red
      - Priorización de la cartera de inversiones
    out_of_scope:
      - Gobernanza de la cartera de proyectos transversal (BC-900)
      - Planificación de ingresos del lado tarifario (BC-3920.30)
  BC-3900.40.10:
    name: Planificación de la inversión de capital
    description: |
      Planificación del programa de capital de la red plurianual por clase de activo.
  BC-3900.40.20:
    name: Análisis coste-beneficio
    description: |
      Análisis coste-beneficio de las opciones de inversión frente a las reglas de prueba
      regulatorias.
  BC-3900.40.30:
    name: Priorización de la cartera de inversiones
    description: |
      Priorización de la cartera entre categorías bajo restricciones de capital y recursos.
  BC-3900.50:
    name: Planificación de la renovación y la sustitución de activos
    description: |
      Planificación de los programas de renovación, sustitución y desmantelamiento al
      final de la vida útil de los activos en toda la red.
  BC-3900.50.10:
    name: Previsión del fin de vida útil
    description: |
      Previsión del fin de vida útil de los activos por clase y cohorte.
  BC-3900.50.20:
    name: Diseño del programa de renovación
    description: |
      Diseño de los programas de renovación plurianual por categoría de activo y zona geográfica.
  BC-3900.50.30:
    name: Planificación del desmantelamiento de la red
    description: |
      Planificación de los trabajos de desmantelamiento, abandono y reposición.
  BC-3900.60:
    name: Informes de rendimiento de activos
    description: |
      Notificación del rendimiento de los activos y el uso del totex frente a los
      compromisos regulatorios e internos de rendimiento.
  BC-3900.60.10:
    name: Informes de KPI de rendimiento de la red
    description: |
      Notificación de SAIDI, SAIFI, fugas y KPI equivalentes de la red.
  BC-3900.60.20:
    name: Informes de rendimiento del totex
    description: |
      Notificación del gasto en totex frente a la dotación asignada en los periodos de
      revisión de precios.
  BC-3900.60.30:
    name: Análisis de tendencias de fallos de activos
    description: |
      Análisis de tendencias de fallos de activos y de la eficacia de las intervenciones.
  BC-3900.70:
    name: Gestión de registros geoespaciales y de red
    description: |
      Registros geoespaciales de los activos de la red — circuitos, tuberías, alcantarillados
      y puntos de conexión — y su integración con los sistemas operativos.
  BC-3900.70.10:
    name: Mantenimiento de registros de la red en el SIG
    description: |
      Mantenimiento de los registros del SIG sobre la conectividad de la red y la
      ubicación de los activos.
  BC-3900.70.20:
    name: Captura de registros tal como construido
    description: |
      Captura de los cambios tal como construido procedentes de proyectos de construcción
      y renovación en el SIG.
  BC-3900.70.30:
    name: Operaciones de búsqueda de activos subterráneos
    description: |
      Respuestas a las solicitudes de búsqueda de registros de servicios subterráneos por
      parte de excavadores de terceros.

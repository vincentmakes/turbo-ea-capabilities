locale: es
source: L1-media-asset-management.yaml
entries:
  BC-3710:
    name: "Gestión de activos multimedia"
    description: |
      Ingesta, catalogación, almacenamiento, transformación, preservación archivística
      y gestión de identificadores de activos multimedia a lo largo del ciclo de vida
      del contenido, desde la producción hasta la distribución.
  BC-3710.10:
    name: "Ingesta y control de calidad de activos"
    description: |
      Incorporación del material fuente a la plataforma de activos con control de
      calidad técnico y editorial antes de su uso posterior.
  BC-3710.10.10:
    name: "Ingesta de activos fuente"
    description: |
      Ingesta de archivos fuente y captura de cinta a archivo o señal a archivo
      en la plataforma de activos.
  BC-3710.10.20:
    name: "Inspección de control de calidad"
    description: |
      Inspección de control de calidad automatizada y con operador para
      defectos de imagen, audio y metadatos.
  BC-3710.10.30:
    name: "Validación de conformidad técnica"
    description: |
      Validación conforme a las especificaciones de entrega, incluyendo formato,
      frecuencia de imágenes, nivel de sonido y cumplimiento de señal.
  BC-3710.20:
    name: "Catalogación de metadatos"
    description: |
      Autoría y curación de metadatos descriptivos, técnicos y de derechos
      que hacen los activos localizables y utilizables.
  BC-3710.20.10:
    name: "Elaboración de metadatos descriptivos"
    description: |
      Catalogación de títulos, sinopsis, colaboradores y atributos editoriales
      conforme a un esquema controlado.
  BC-3710.20.20:
    name: "Captura de metadatos técnicos"
    description: |
      Extracción y almacenamiento de metadatos técnicos de esencia, contenedor
      y nivel de señal.
  BC-3710.20.30:
    name: "Vinculación de metadatos de derechos"
    description: |
      Vinculación de registros de activos a registros de derechos que cubren
      restricciones por territorio, ventana y plataforma.
  BC-3710.20.40:
    name: "Gestión de taxonomías y vocabulario controlado"
    description: |
      Administración de taxonomías, géneros y vocabularios controlados
      utilizados en todo el catálogo.
  BC-3710.30:
    name: "Almacenamiento y niveles de activos"
    description: |
      Almacenamiento escalonado de activos multimedia en niveles en línea,
      nearline y archivo para equilibrar la latencia de acceso y el coste.
  BC-3710.30.10:
    name: "Almacenamiento en línea de activos"
    description: |
      Almacenamiento de alto rendimiento para activos en uso activo
      en producción y distribución.
  BC-3710.30.20:
    name: "Gestión del nivel nearline y de archivo"
    description: |
      Movimiento del ciclo de vida de los activos a niveles nearline y de archivo
      con niveles de servicio de recuperación.
  BC-3710.30.30:
    name: "Optimización del coste de almacenamiento"
    description: |
      Optimización de la política de niveles de almacenamiento, deduplicación
      y reducción del volumen en el parque de activos.
  BC-3710.40:
    name: "Transcodificación y conversión de formatos"
    description: |
      Producción de representaciones intermedias y de distribución mediante
      flujos de transcodificación y empaquetado.
  BC-3710.40.10:
    name: "Generación de mezzanine"
    description: |
      Producción de másteres mezzanine de alta calidad como intermedios
      para codificaciones de distribución posteriores.
  BC-3710.40.20:
    name: "Codificación para formatos de distribución"
    description: |
      Codificación de representaciones de distribución para especificaciones
      de entrega en difusión, OTT y socios.
  BC-3710.40.30:
    name: "Empaquetado de tasa de bits adaptativa"
    description: |
      Empaquetado de escaleras de tasa de bits adaptativa para entrega
      en streaming con HLS, MPEG-DASH y CMAF.
  BC-3710.50:
    name: "Archivo a largo plazo y preservación"
    description: |
      Preservación a largo plazo de másteres y activos históricos,
      incluyendo la restauración de material heredado.
  BC-3710.50.10:
    name: "Catalogación de archivo"
    description: |
      Catalogación de los fondos del archivo a largo plazo, incluyendo
      registros de soportes heredados y elementos físicos.
  BC-3710.50.20:
    name: "Migración de preservación"
    description: |
      Migración periódica del material archivado entre generaciones de almacenamiento
      para mitigar la obsolescencia de formatos y soportes.
  BC-3710.50.30:
    name: "Restauración y remasterización"
    description: |
      Restauración y remasterización de imagen y audio de material heredado
      conforme a los estándares de entrega actuales.
  BC-3710.60:
    name: "Gestión de identificadores y versionado de contenidos"
    description: |
      Asignación y linaje de identificadores de contenido y registros de versión
      que describen de forma única cada montaje y representación.
  BC-3710.60.10:
    name: "Asignación de identificadores de contenido"
    description: |
      Asignación de identificadores internos y de registro (EIDR, ISAN, ISRC, ISWC)
      a obras y representaciones.
  BC-3710.60.20:
    name: "Gestión del linaje de versiones y montajes"
    description: |
      Seguimiento del linaje de versiones por montaje, idioma, regulación
      y plataforma respecto a los registros del máster original.
  BC-3710.60.30:
    name: "Mapeo de referencias cruzadas de identificadores externos"
    description: |
      Mapeo de referencias cruzadas entre identificadores internos e identificadores
      de socios, distribuidores y registros externos.

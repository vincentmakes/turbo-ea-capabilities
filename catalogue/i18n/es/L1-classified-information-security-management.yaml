locale: es
source: L1-classified-information-security-management.yaml
entries:
  BC-1810:
    name: Gestión de seguridad de la información clasificada
    description: |
      Habilitaciones de personal, clasificación, seguridad industrial, COMSEC y amenaza interna.
  BC-1810.10:
    name: Gestión de habilitaciones de seguridad del personal
    description: |
      Solicitudes de habilitación, reinvestigación periódica e información de salida.
  BC-1810.10.10:
    name: Tramitación de solicitudes de habilitación
    description: |
      Patrocinio y tramitación de las solicitudes de habilitación de seguridad del personal.
  BC-1810.10.20:
    name: Reinvestigación periódica
    description: |
      Reinvestigación periódica y evaluación continua del personal habilitado.
  BC-1810.10.30:
    name: Adoctrinamiento e información de salida del personal habilitado
    description: |
      Adoctrinamiento de seguridad, firma de NDA e información de salida.
  BC-1810.20:
    name: Gestión de la clasificación de la información
    description: |
      Clasificación, desclasificación y avisos de manejo.
  BC-1810.20.10:
    name: Decisiones de clasificación originaria
    description: |
      Decisiones de la autoridad de clasificación originaria.
  BC-1810.20.20:
    name: Clasificación derivada
    description: |
      Clasificación derivada de nuevos documentos a partir de material existente.
  BC-1810.20.30:
    name: Revisión de desclasificación
    description: |
      Revisión sistemática y obligatoria de desclasificación.
  BC-1810.20.40:
    name: Avisos de manejo y marcado
    description: |
      Aplicación de avisos de manejo, control de difusión y marcado.
  BC-1810.30:
    name: Gestión de seguridad física de defensa
    description: |
      Instalaciones habilitadas, SCIF y áreas seguras.
  BC-1810.30.10:
    name: Acreditación de instalaciones habilitadas
    description: |
      Acreditación y mantenimiento de instalaciones habilitadas.
  BC-1810.30.20:
    name: Operaciones de SCIF
    description: |
      Operación de instalaciones de información compartimentada sensible (SCIF).
  BC-1810.30.30:
    name: Control de acceso a áreas seguras
    description: |
      Control de acceso y gestión de visitantes en áreas seguras.
  BC-1810.40:
    name: Gestión de seguridad industrial
    description: |
      NISPOM/equivalente, FOCI y seguridad de la cadena de suministro.
  BC-1810.40.10:
    name: Gestión del cumplimiento del NISPOM
    description: |
      Cumplimiento del NISPOM/32 CFR 117 o las normas nacionales equivalentes.
  BC-1810.40.20:
    name: Gestión de propiedad, control e influencia extranjeros
    description: |
      Evaluación de FOCI y acuerdos de mitigación.
  BC-1810.40.30:
    name: Verificación de la seguridad de la cadena de suministro
    description: |
      Verificación de los socios habilitados de la cadena de suministro y alineación con CMMC.
  BC-1810.40.40:
    name: Administración de seguridad de contratos clasificados
    description: |
      Administración de los requisitos de contratos clasificados del formulario DD 254.
  BC-1810.50:
    name: Gestión de COMSEC
    description: |
      Seguridad de las comunicaciones y gestión de claves criptográficas.
  BC-1810.50.10:
    name: Gestión de cuentas COMSEC
    description: |
      Operación de cuentas COMSEC y responsabilidades del custodio.
  BC-1810.50.20:
    name: Gestión de claves criptográficas
    description: |
      Gestión de claves criptográficas, incluidos EKMS/KMI.
  BC-1810.50.30:
    name: Custodia de equipos COMSEC
    description: |
      Custodia y rendición de cuentas de los equipos COMSEC.
  BC-1810.60:
    name: Gestión de amenaza interna
    description: |
      Programas de amenaza interna, monitoreo y respuesta.
  BC-1810.60.10:
    name: Operación del programa de amenaza interna
    description: |
      Operación del programa de amenaza interna conforme a la Orden Ejecutiva 13587.
  BC-1810.60.20:
    name: Monitoreo de la actividad del usuario
    description: |
      Monitoreo de la actividad de usuarios en sistemas de información clasificados.
  BC-1810.60.30:
    name: Investigación de amenaza interna
    description: |
      Investigación de indicadores e incidentes de amenaza interna.

locale: es
source: L1-electronic-component-sourcing-management.yaml
entries:
  BC-1930:
    name: Gestión de aprovisionamiento de componentes electrónicos
    description: |
      Aprovisionamiento y gestión del ciclo de vida de componentes electrónicos — listas de
      proveedores aprobados, gestión de obsolescencia, asignación, prevención de falsificaciones,
      calificación y datos de sustancias.
  BC-1930.10:
    name: Gestión de la lista de proveedores aprobados
    description: |
      Mantenimiento de fuentes de componentes aprobadas, alternativas y referencias cruzadas.
  BC-1930.10.10:
    name: Gestión de la lista de piezas preferidas
    description: |
      Mantenimiento de listas de componentes preferidos con aprobación de ingeniería.
  BC-1930.10.20:
    name: Calificación de fuentes alternativas
    description: |
      Calificación de fuentes alternativas de componentes.
  BC-1930.10.30:
    name: Gestión de referencias cruzadas
    description: |
      Mapeo de componentes equivalentes entre fabricantes.
  BC-1930.20:
    name: Gestión del ciclo de vida y obsolescencia de componentes
    description: |
      Seguimiento del estado del ciclo de vida de los componentes y gestión de eventos de obsolescencia.
  BC-1930.20.10:
    name: Triaje de notificaciones de cambio de producto
    description: |
      Triaje y evaluación del impacto de las notificaciones de cambio de producto de proveedores.
  BC-1930.20.20:
    name: Triaje de notificaciones de fin de vida
    description: |
      Triaje de notificaciones de fin de vida y su impacto en las listas de materiales.
  BC-1930.20.30:
    name: Decisión de última compra
    description: |
      Toma de decisiones sobre cantidades de última compra y stocks puente.
  BC-1930.20.40:
    name: Previsión del ciclo de vida de componentes
    description: |
      Previsión de las etapas del ciclo de vida de los componentes en la lista de materiales.
  BC-1930.30:
    name: Gestión de la asignación de semiconductores
    description: |
      Gestión de la asignación de semiconductores en condiciones de escasez.
  BC-1930.30.10:
    name: Gestión de la previsión de asignación
    description: |
      Previsión de la demanda para apoyar el posicionamiento de asignación con proveedores.
  BC-1930.30.20:
    name: Negociación de asignación con proveedores
    description: |
      Negociación de la cuota de asignación con proveedores de semiconductores.
  BC-1930.30.30:
    name: Priorización de la demanda de asignación
    description: |
      Priorización interna del suministro asignado entre líneas de producto.
  BC-1930.40:
    name: Prevención de componentes falsificados
    description: |
      Detección y prevención de componentes electrónicos falsificados en la cadena de suministro.
  BC-1930.40.10:
    name: Evaluación de riesgos de falsificación
    description: |
      Evaluación del riesgo de exposición a falsificaciones en los canales de aprovisionamiento.
  BC-1930.40.20:
    name: Autenticación de componentes entrantes
    description: |
      Autenticación e inspección de los componentes entrantes.
  BC-1930.40.30:
    name: Trazabilidad de la cadena de suministro
    description: |
      Trazabilidad de los componentes hasta los fabricantes autorizados.
  BC-1930.50:
    name: Calificación de componentes electrónicos
    description: |
      Calificación de componentes electrónicos para uso en producción.
  BC-1930.50.10:
    name: Inspección de primer artículo
    description: |
      Inspección de primer artículo de componentes frente a especificaciones.
  BC-1930.50.20:
    name: Calificación de fiabilidad de componentes
    description: |
      Calificación de fiabilidad de componentes frente a perfiles de operación.
  BC-1930.50.30:
    name: Calificación automotriz AEC-Q
    description: |
      Calificación de componentes según los perfiles de tensión AEC-Q100 / AEC-Q200.
  BC-1930.50.40:
    name: Calificación JEDEC de semiconductores
    description: |
      Calificación de semiconductores según normas JEDEC.
  BC-1930.60:
    name: Gestión de distribuidores e intermediarios
    description: |
      Gestión de canales de distribuidores autorizados e intermediarios.
  BC-1930.60.10:
    name: Incorporación de distribuidores autorizados
    description: |
      Incorporación de distribuidores autorizados de componentes electrónicos.
  BC-1930.60.20:
    name: Evaluación del riesgo de fuentes intermediarias
    description: |
      Evaluación del riesgo del aprovisionamiento a través de intermediarios independientes.
  BC-1930.60.30:
    name: Revisión del desempeño de distribuidores
    description: |
      Revisión periódica del desempeño y conformidad de los distribuidores.
  BC-1930.70:
    name: Gestión de datos de conformidad de componentes
    description: |
      Recopilación y custodia de datos de sustancias y conformidad de los componentes.
  BC-1930.70.10:
    name: Recopilación de datos de sustancias
    description: |
      Recopilación de datos de composición de sustancias de los proveedores de componentes.
  BC-1930.70.20:
    name: Datos de fundidoras de minerales de conflicto
    description: |
      Recopilación de datos a nivel de fundidora para la diligencia debida en minerales de conflicto.
  BC-1930.70.30:
    name: Seguimiento de SVHC REACH
    description: |
      Seguimiento de sustancias extremadamente preocupantes a nivel de componente.

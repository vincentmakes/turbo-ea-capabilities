locale: es
source: L1-wealth-management-operations-management.yaml
entries:
  BC-1390:
    name: Gestión de operaciones de gestión de patrimonio
    description: |
      Asesoramiento de inversiones, gestión discrecional de carteras, informes a clientes y evaluación de idoneidad.
  BC-1390.10:
    name: Gestión del asesoramiento de inversiones
    description: |
      Mandatos de asesoramiento y generación de recomendaciones.
  BC-1390.10.10:
    name: Incorporación de mandatos de asesoramiento
    description: |
      Incorporación de mandatos de asesoramiento y acuerdos con clientes.
  BC-1390.10.20:
    name: Generación de recomendaciones de inversión
    description: |
      Generación de recomendaciones de inversión personalizadas.
  BC-1390.10.30:
    name: Gestión de propuestas de inversión
    description: |
      Elaboración y aprobación de propuestas de inversión.
  BC-1390.20:
    name: Gestión discrecional de carteras
    description: |
      Mandatos discrecionales y construcción de carteras.
  BC-1390.20.10:
    name: Configuración de mandatos discrecionales
    description: |
      Configuración de mandatos discrecionales y documentación IPS.
  BC-1390.20.20:
    name: Construcción de carteras
    description: |
      Construcción de carteras y asignación de activos.
  BC-1390.20.30:
    name: Reequilibrio de carteras
    description: |
      Reequilibrio de carteras discrecionales respecto al modelo.
  BC-1390.20.40:
    name: Ejecución de operaciones para mandatos
    description: |
      Ejecución de operaciones en nombre de mandatos discrecionales.
  BC-1390.30:
    name: Gestión de informes a clientes
    description: |
      Extractos de cliente e informes de rendimiento.
  BC-1390.30.10:
    name: Extractos periódicos de clientes
    description: |
      Elaboración de extractos periódicos y valoraciones para clientes.
  BC-1390.30.20:
    name: Informes de rendimiento y actividad
    description: |
      Informes de rendimiento, actividad y fiscales para clientes.
  BC-1390.30.30:
    name: Divulgaciones regulatorias a clientes
    description: |
      Divulgaciones de costes y gastos MiFID II y otras divulgaciones regulatorias.
  BC-1390.40:
    name: Gestión de la medición del rendimiento
    description: |
      Atribución del rendimiento y comparación con índices de referencia.
  BC-1390.40.10:
    name: Cálculo del rendimiento de carteras
    description: |
      Cálculo de rentabilidades TWR, MWR y otras métricas de rendimiento.
  BC-1390.40.20:
    name: Análisis de atribución del rendimiento
    description: |
      Análisis de atribución de Brinson y basado en factores.
  BC-1390.40.30:
    name: Comparación con índices de referencia y grupos comparables
    description: |
      Comparación del rendimiento de carteras con índices de referencia y grupos comparables.
  BC-1390.50:
    name: Gestión de la idoneidad y conveniencia
    description: |
      Idoneidad MiFID/equivalente y comprobaciones de conveniencia.
  BC-1390.50.10:
    name: Perfil de riesgo del cliente
    description: |
      Evaluación de la tolerancia y capacidad de riesgo de los clientes.
  BC-1390.50.20:
    name: Evaluación de idoneidad
    description: |
      Evaluación de la idoneidad del asesoramiento y las carteras discrecionales.
  BC-1390.50.30:
    name: Evaluación de conveniencia
    description: |
      Comprobaciones de conveniencia para transacciones de solo ejecución.
  BC-1390.50.40:
    name: Captura de preferencias de sostenibilidad
    description: |
      Captura e integración de las preferencias de sostenibilidad del cliente.

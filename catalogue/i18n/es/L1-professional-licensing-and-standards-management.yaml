locale: es
source: L1-professional-licensing-and-standards-management.yaml
entries:
  BC-4380:
    name: Gestión de licencias y estándares profesionales
    description: |
      Licencias y habilitaciones de la firma e individuales, presentaciones
      ante organismos profesionales, formación profesional continua,
      adopción de nuevas normas profesionales e investigación de conducta
      profesional, propios de las firmas de servicios profesionales.
  BC-4380.10:
    name: Gestión de licencias y registros de la firma
    description: |
      Mantenimiento de las licencias y registros profesionales de la firma
      ante organismos de supervisión de auditoría, reguladores del ejercicio
      y autoridades equivalentes en las distintas jurisdicciones.
  BC-4380.10.10:
    name: Mantenimiento de registros de la firma
    description: |
      Mantenimiento de los registros de la firma tales como PCAOB, RSB de
      FRC, registro de firma del ICAEW, organismo reconocido SRA y
      autorizaciones ABS.
  BC-4380.10.20:
    name: Gestión de la renovación de licencias de la firma
    description: |
      Presentaciones periódicas de renovación, pago de tasas y declaraciones
      de apoyo para las licencias de la firma.
  BC-4380.10.30:
    name: Coordinación de licencias en múltiples jurisdicciones
    description: |
      Coordinación del licenciamiento de la firma en redes de firmas miembro
      y jurisdicciones.
  BC-4380.20:
    name: Gestión de certificados de ejercicio individuales
    description: |
      Captura y mantenimiento de los certificados de ejercicio individuales,
      habilitaciones como abogado, titulaciones de auditoría y otras
      licencias personales de los profesionales.
  BC-4380.20.10:
    name: Captura de certificados de ejercicio
    description: |
      Recogida y verificación de los certificados de ejercicio y titulaciones
      individuales.
  BC-4380.20.20:
    name: Seguimiento de la renovación de certificados de ejercicio
    description: |
      Seguimiento de los ciclos de renovación y los requisitos previos de
      los certificados de ejercicio individuales.
  BC-4380.20.30:
    name: Gestión de habilitaciones transfronterizas
    description: |
      Gestión de la habilitación transfronteriza, el estatuto de abogado
      extranjero registrado y los acuerdos de equivalencia.
  BC-4380.30:
    name: Gestión de la formación profesional continua
    description: |
      Planificación, impartición y acreditación de las horas de formación
      profesional continua (FPC/CPE) exigidas por los organismos
      profesionales y la política de la firma.
    in_scope:
      - Planificación del plan de estudios de FPC
      - Impartición y registro de cursos de FPC
      - Acreditación de FPC y remediación de deficiencias
    out_of_scope:
      - Formación y desarrollo genérico (BC-300)
  BC-4380.30.10:
    name: Seguimiento de los requisitos de FPC
    description: |
      Seguimiento de los requisitos de horas de FPC por profesional,
      titulación y jurisdicción.
  BC-4380.30.20:
    name: Impartición y registro de cursos de FPC
    description: |
      Impartición de cursos de FPC acreditados y registro de la asistencia
      y las evidencias de finalización.
  BC-4380.30.30:
    name: Remediación de deficiencias en FPC
    description: |
      Identificación y corrección de los profesionales en riesgo de
      incumplir los requisitos de FPC antes de las fechas límite de
      declaración.
  BC-4380.40:
    name: Informes ante organismos profesionales
    description: |
      Informes periódicos y notificaciones a organismos profesionales,
      autoridades de supervisión y reguladores sobre asuntos de la firma
      e individuales.
  BC-4380.40.10:
    name: Elaboración de informes anuales
    description: |
      Preparación de informes anuales y presentaciones estadísticas ante
      organismos profesionales y autoridades de supervisión.
  BC-4380.40.20:
    name: Notificación de eventos de comunicación obligatoria
    description: |
      Comunicación de eventos notificables como renuncias, cambios en la
      dirección e incumplimientos materiales.
  BC-4380.40.30:
    name: Producción del informe de transparencia
    description: |
      Elaboración de informes de transparencia estatutarios o voluntarios
      exigidos a las firmas auditoras y otras firmas reguladas.
  BC-4380.50:
    name: Gestión de la adopción de normas profesionales
    description: |
      Adopción de normas profesionales nuevas y revisadas en la metodología,
      la política y la ejecución de encargos de la firma.
  BC-4380.50.10:
    name: Vigilancia del horizonte normativo
    description: |
      Identificación de los próximos cambios en las normas profesionales y
      regulatorias relevantes para las prácticas de la firma.
  BC-4380.50.20:
    name: Evaluación del impacto de las normas
    description: |
      Evaluación del impacto en la metodología, la formación y las
      herramientas derivado de las normas nuevas o revisadas.
  BC-4380.50.30:
    name: Despliegue de la adopción de normas
    description: |
      Despliegue de las actualizaciones de metodología, política y
      herramientas que implementan las normas adoptadas.
  BC-4380.60:
    name: Gestión de investigaciones de conducta profesional
    description: |
      Investigación interna, respuesta a las investigaciones de los
      organismos profesionales y gestión de reclamaciones por
      responsabilidad civil profesional relacionadas con presuntas
      conductas irregulares.
  BC-4380.60.10:
    name: Investigación interna de conducta
    description: |
      Investigación interna de presuntos incumplimientos de las normas
      profesionales o la política de conducta de la firma.
  BC-4380.60.20:
    name: Respuesta a investigaciones de organismos profesionales
    description: |
      Coordinación de las respuestas de la firma a las investigaciones de
      organismos profesionales y tribunales disciplinarios.
  BC-4380.60.30:
    name: Gestión de reclamaciones por responsabilidad civil profesional
    description: |
      Gestión de las reclamaciones por responsabilidad civil profesional y
      las notificaciones a las aseguradoras derivadas del trabajo de encargo.

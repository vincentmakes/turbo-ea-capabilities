locale: es
source: L1-petroleum-joint-venture-management.yaml
entries:
  BC-3110:
    name: Gestión de empresa conjunta en petróleo
    description: |
      Administración de acuerdos de operación conjunta, concesiones y
      contratos de participación en la producción aguas arriba: comités
      operativos, aprobaciones de AFE, facturación de interés conjunto,
      llamadas de capital, obligaciones de licencia y reporte a socios
      y gobiernos anfitriones.
  BC-3110.10:
    name: Administración del acuerdo de operación conjunta
    description: |
      Redacción, administración y gobernanza de los acuerdos de operación
      conjunta, incluyendo los procesos del comité operativo y las
      aprobaciones de AFE.
  BC-3110.10.10:
    name: Redacción y renegociación del JOA
    description: |
      Redacción, revisión y renegociación periódica de los acuerdos
      de operación conjunta.
  BC-3110.10.20:
    name: Coordinación del comité operativo
    description: |
      Coordinación de las reuniones del OPCOM, TECCOM y subcomités.
  BC-3110.10.30:
    name: Gestión de la autorización de gastos
    description: |
      Emisión, aprobación y seguimiento de las autorizaciones de gastos (AFE).
  BC-3110.10.40:
    name: Seguimiento de derechos de voto y aprobaciones
    description: |
      Seguimiento de los derechos de voto de los socios y los umbrales
      de aprobación del JOA.
  BC-3110.20:
    name: Facturación de interés conjunto
    description: |
      Preparación, auditoría y resolución de disputas de las facturas
      de interés conjunto.
  BC-3110.20.10:
    name: Preparación de facturas de interés conjunto
    description: |
      Preparación de facturas mensuales de interés conjunto a los socios.
  BC-3110.20.20:
    name: Coordinación de auditorías de interés conjunto
    description: |
      Coordinación de las auditorías de interés conjunto realizadas
      por los socios.
  BC-3110.20.30:
    name: Resolución de disputas de facturación de interés conjunto
    description: |
      Investigación y resolución de disputas sobre facturación de
      interés conjunto.
  BC-3110.30:
    name: Gestión de llamadas de capital y financiamiento
    description: |
      Emisión de llamadas de capital, recepción del financiamiento de
      los socios y gestión de incumplimientos.
  BC-3110.30.10:
    name: Emisión de llamadas de capital
    description: |
      Emisión de llamadas de capital mensuales y suplementarias a los socios.
  BC-3110.30.20:
    name: Recepción del financiamiento de socios
    description: |
      Recepción y reconciliación del financiamiento de las llamadas de
      capital de los socios.
  BC-3110.30.30:
    name: Gestión del incumplimiento de financiamiento
    description: |
      Gestión de las posiciones del socio en incumplimiento conforme a
      los remedios del JOA.
  BC-3110.40:
    name: Gestión de obligaciones de licencias y concesiones
    description: |
      Seguimiento de los compromisos del programa de trabajo, regalías y
      obligaciones de relinquishment de licencias.
  BC-3110.40.10:
    name: Seguimiento de compromisos del programa de trabajo
    description: |
      Seguimiento de las obligaciones mínimas de trabajo y compromisos
      exploratorios.
  BC-3110.40.20:
    name: Cálculo de regalías de concesión
    description: |
      Cálculo de las regalías pagaderas a los gobiernos anfitriones
      bajo los términos de concesión.
  BC-3110.40.30:
    name: Gestión del relinquishment de licencias
    description: |
      Gestión del relinquishment parcial y total de licencias.
  BC-3110.50:
    name: Reporte al gobierno anfitrión y socios
    description: |
      Reporte a los gobiernos anfitriones bajo los términos del contrato
      de participación en la producción y a los socios bajo los términos
      del JOA.
  BC-3110.50.10:
    name: Reporte al gobierno anfitrión
    description: |
      Reporte de operaciones, costos y producción a los gobiernos anfitriones.
  BC-3110.50.20:
    name: Reporte del contrato de participación en la producción
    description: |
      Reporte de recuperación de costos, petróleo de beneficio y
      levantamientos bajo los términos del PSC.
  BC-3110.50.30:
    name: Reporte de desempeño a socios
    description: |
      Reporte operativo y financiero periódico a los socios de la
      empresa conjunta.
  BC-3110.60:
    name: Gestión de participaciones no operadas
    description: |
      Supervisión de la participación accionaria en empresas conjuntas
      operadas por otras partes.
  BC-3110.60.10:
    name: Monitoreo de la posición no operada
    description: |
      Monitoreo de las actividades del operador y el desempeño de la
      empresa conjunta desde la perspectiva del no operador.
  BC-3110.60.20:
    name: Emisión de votos en la empresa conjunta no operada
    description: |
      Revisión interna y emisión de votos sobre los programas de trabajo
      propuestos por el operador.
  BC-3110.60.30:
    name: Verificación de costos no operados
    description: |
      Verificación de los costos cargados por el operador frente a los
      procedimientos contables del JOA.

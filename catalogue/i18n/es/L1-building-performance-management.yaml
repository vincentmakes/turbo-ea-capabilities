locale: es
source: L1-building-performance-management.yaml
entries:
  BC-2070:
    name: Gestión del desempeño del edificio
    description: |
      Optimización continua y basada en datos del desempeño del edificio — medición y
      verificación de energía (IPMVP / ASHRAE Guideline 14), detección de fallos y diagnósticos,
      analítica de energía y CAI, respuesta a la demanda e interacción con la red, seguimiento
      de carbono y sostenibilidad, y reporte periódico de desempeño a los propietarios del edificio.
    in_scope:
      - Establecimiento de línea de base M&V, cálculo de ahorros y ajuste
      - Bibliotecas de reglas FDD y triaje continuo de fallos
      - Benchmarking energético del edificio, atribución, detección de anomalías y previsión
      - Analítica de calidad ambiental interior para resultados térmicos, de aire, acústicos y de iluminación
      - Respuesta a la demanda y operaciones interactivas con la red
      - Carbono operacional, asignación de renovables y métricas ESG a nivel de edificio
      - Paneles de control orientados al propietario, reporte periódico y briefings a partes interesadas
    out_of_scope:
      - Cx y FPT durante el comisionamiento del proyecto (BC-2050)
      - Ejecución de servicio de campo (BC-2060)
      - Estrategia e informes de sostenibilidad empresarial (BC-740)
      - Diseño de equipos HVAC (BC-2000) e ingeniería de productos BAS (BC-2010)
  BC-2070.10:
    name: Medición y verificación de energía
    description: |
      Establecimiento de línea de base, cálculo de ahorros y ajuste del rendimiento energético
      según IPMVP / ASHRAE Guideline 14.
  BC-2070.10.10:
    name: Modelado de línea de base
    description: |
      Modelado de las líneas de base energéticas frente a las cuales se miden los ahorros.
  BC-2070.10.20:
    name: Elaboración del plan M&V
    description: |
      Elaboración de planes de medición y verificación alineados con los protocolos reconocidos.
  BC-2070.10.30:
    name: Cálculo de ahorros
    description: |
      Cálculo de los ahorros de energía frente a la línea de base.
  BC-2070.10.40:
    name: Ajuste y normalización
    description: |
      Ajuste y normalización de los resultados M&V para factores climáticos y de ocupación.
  BC-2070.20:
    name: Operaciones de detección de fallos y diagnósticos
    description: |
      Operación de las bibliotecas de reglas FDD y triaje continuo de los fallos detectados.
  BC-2070.20.10:
    name: Gestión de la biblioteca de reglas FDD
    description: |
      Mantenimiento de las bibliotecas de reglas de detección de fallos y diagnósticos.
  BC-2070.20.20:
    name: Triaje y priorización de fallos
    description: |
      Triaje y priorización de los fallos detectados según su impacto.
  BC-2070.20.30:
    name: Análisis diagnóstico de causa raíz
    description: |
      Análisis diagnóstico para identificar las causas raíz de los fallos detectados.
  BC-2070.20.40:
    name: Ajuste de falsos positivos FDD
    description: |
      Ajuste de las reglas FDD para reducir las tasas de falsas alarmas.
  BC-2070.30:
    name: Analítica del rendimiento energético
    description: |
      Analítica del consumo de energía en el portafolio de edificios.
  BC-2070.30.10:
    name: Benchmarking y comparación entre pares
    description: |
      Benchmarking del rendimiento energético del edificio frente a pares.
  BC-2070.30.20:
    name: Atribución del consumo de energía
    description: |
      Atribución del consumo de energía entre sistemas, zonas y cargas.
  BC-2070.30.30:
    name: Detección de anomalías energéticas
    description: |
      Detección de anomalías en los patrones de consumo de energía.
  BC-2070.30.40:
    name: Previsión y fijación de objetivos
    description: |
      Previsión del consumo energético futuro y establecimiento de objetivos de mejora.
  BC-2070.40:
    name: Analítica de calidad ambiental interior
    description: |
      Analítica de los resultados de calidad ambiental interior, incluidas las métricas de
      confort, aire, acústica e iluminación.
  BC-2070.40.10:
    name: Analítica de confort térmico
    description: |
      Analítica del confort térmico frente a los criterios de ASHRAE 55 y equivalentes.
  BC-2070.40.20:
    name: Analítica de calidad del aire
    description: |
      Analítica de la calidad del aire interior frente a los criterios de ASHRAE 62.1 y equivalentes.
  BC-2070.40.30:
    name: Analítica acústica y de iluminación
    description: |
      Analítica del rendimiento acústico y de iluminación para los resultados de los ocupantes.
  BC-2070.40.40:
    name: Correlación de retroalimentación de ocupantes
    description: |
      Correlación de la retroalimentación de los ocupantes con los datos ambientales medidos.
  BC-2070.50:
    name: Gestión de la respuesta a la demanda e interacción con la red
    description: |
      Operación del comportamiento del edificio interactivo con la red y participación en
      programas de respuesta a la demanda.
  BC-2070.50.10:
    name: Inscripción en programas de respuesta a la demanda
    description: |
      Inscripción de edificios en programas de respuesta a la demanda.
  BC-2070.50.20:
    name: Ejecución de reducción de carga
    description: |
      Ejecución de eventos de reducción de carga frente a las obligaciones contratadas.
  BC-2070.50.30:
    name: Operaciones del edificio interactivo con la red
    description: |
      Operaciones de edificios eficientes interactivos con la red.
  BC-2070.50.40:
    name: Respuesta a tarifas y precios
    description: |
      Respuesta de las operaciones del edificio a las tarifas de tiempo de uso y dinámicas.
  BC-2070.60:
    name: Seguimiento del desempeño en carbono y sostenibilidad
    description: |
      Contabilidad del carbono operacional a nivel de edificio y seguimiento de los resultados
      de sostenibilidad.
  BC-2070.60.10:
    name: Contabilidad del carbono operacional
    description: |
      Contabilidad de las emisiones de carbono operacional a nivel de edificio.
  BC-2070.60.20:
    name: Asignación de energías renovables
    description: |
      Asignación de energía renovable propia y contratada a los edificios.
  BC-2070.60.30:
    name: Métricas ESG a nivel de edificio
    description: |
      Cálculo de métricas ESG a nivel de edificio para el reporte del portafolio.
  BC-2070.60.40:
    name: Seguimiento del desempeño en certificación de sostenibilidad
    description: |
      Seguimiento del desempeño frente a los criterios de certificación de edificios verdes.
  BC-2070.70:
    name: Gestión de recomendaciones de mejora del desempeño
    description: |
      Identificación y gestión de oportunidades de mejora del desempeño y casos de ahorro.
  BC-2070.70.10:
    name: Identificación de oportunidades
    description: |
      Identificación de oportunidades de mejora del desempeño a partir de la analítica.
  BC-2070.70.20:
    name: Caso de negocio de ahorros
    description: |
      Desarrollo de casos de negocio que respaldan las mejoras recomendadas.
  BC-2070.70.30:
    name: Priorización de recomendaciones
    description: |
      Priorización de las recomendaciones en todo el portafolio.
  BC-2070.70.40:
    name: Seguimiento de la implementación
    description: |
      Seguimiento de la implementación de las recomendaciones aceptadas.
  BC-2070.80:
    name: Operaciones de reporte de desempeño y paneles de control
    description: |
      Paneles de control orientados al propietario, informes periódicos y reporte regulatorio
      del desempeño.
  BC-2070.80.10:
    name: Operaciones del panel de control del propietario
    description: |
      Operación de los paneles de control de desempeño orientados al propietario.
  BC-2070.80.20:
    name: Reporte periódico de desempeño
    description: |
      Producción de informes periódicos de desempeño para los clientes.
  BC-2070.80.30:
    name: Reporte regulatorio de desempeño
    description: |
      Reporte del desempeño del edificio a los programas regulatorios (p. ej., benchmarking obligatorio).
  BC-2070.80.40:
    name: Briefings de desempeño a partes interesadas
    description: |
      Briefings a ocupantes, inversores y partes interesadas sobre el desempeño del edificio.

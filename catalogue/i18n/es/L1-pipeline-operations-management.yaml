locale: es
source: L1-pipeline-operations-management.yaml
entries:
  BC-3060:
    name: Gestión de operaciones de oleoductos y gasoductos
    description: |
      Operación, integridad y gestión comercial de los oleoductos y
      gasoductos de recolección y transmisión de hidrocarburos: despacho
      desde sala de control, inspección en línea, detección de fugas,
      programación y nominaciones, y administración de tarifas.
  BC-3060.10:
    name: Operaciones de control de ductos
    description: |
      Despacho desde sala de control y operación SCADA de ductos
      de líquidos y gas.
  BC-3060.10.10:
    name: Despacho y control de ductos
    description: |
      Despacho del ducto desde la sala de control las 24 horas,
      los 7 días de la semana.
  BC-3060.10.20:
    name: Operaciones SCADA
    description: |
      Operación de los sistemas SCADA del ducto y la telemetría de campo.
  BC-3060.10.30:
    name: Modelado hidráulico del ducto
    description: |
      Modelado hidráulico en tiempo real y fuera de línea de los regímenes
      de flujo del ducto.
  BC-3060.10.40:
    name: Gestión del simulador de entrenamiento de operadores
    description: |
      Mantenimiento de los simuladores de entrenamiento para controladores
      de ductos conforme a los requisitos regulatorios.
  BC-3060.20:
    name: Gestión de integridad del ducto
    description: |
      Inspección en línea, protección catódica y evaluación de defectos
      para el aseguramiento de la integridad del ducto.
  BC-3060.20.10:
    name: Inspección en línea
    description: |
      Campañas de inspección en línea con pig inteligente para la
      integridad del ducto.
  BC-3060.20.20:
    name: Gestión de la protección catódica
    description: |
      Diseño, operación y levantamiento de protección catódica en ductos.
  BC-3060.20.30:
    name: Evaluación de defectos en ductos
    description: |
      Evaluación crítica de ingeniería de defectos por pérdida de metal
      y fisuras.
  BC-3060.20.40:
    name: Patrullaje del derecho de vía
    description: |
      Patrullaje aéreo y terrestre del derecho de vía de los ductos.
  BC-3060.30:
    name: Detección de fugas y vigilancia del ducto
    description: |
      Sistemas de detección de fugas computacionales y externos, y
      vigilancia del ducto.
  BC-3060.30.10:
    name: Detección de fugas computacional
    description: |
      Sistemas de detección de fugas en tiempo real basados en modelo
      transitorio y estadístico.
  BC-3060.30.20:
    name: Detección de fugas externas
    description: |
      Detección de fugas externas por fibra óptica, acústica y sensores
      de vapores.
  BC-3060.30.30:
    name: Inspección aérea y a pie
    description: |
      Inspecciones aéreas y a pie de rutina de los corredores de ductos.
  BC-3060.40:
    name: Programación y nominaciones del ducto
    description: |
      Nominación de capacidad, secuenciación de baches y gestión del
      linefill para los volúmenes transportados.
  BC-3060.40.10:
    name: Gestión de nominaciones de capacidad
    description: |
      Recepción, confirmación y programación de las nominaciones de
      los embarcadores.
  BC-3060.40.20:
    name: Secuenciación de baches
    description: |
      Secuenciación de baches multiproducto en ductos de líquidos.
  BC-3060.40.30:
    name: Gestión del linefill
    description: |
      Gestión de la propiedad del linefill y las posiciones de inventario
      en los ductos.
  BC-3060.50:
    name: Gestión de tarifas del ducto
    description: |
      Presentación y administración de tarifas de ductos reguladas y
      contractuales, facturación a embarcadores y liquidación de
      desequilibrios.
  BC-3060.50.10:
    name: Presentación y mantenimiento de tarifas
    description: |
      Presentación y mantenimiento de las tarifas del ducto ante los
      reguladores.
  BC-3060.50.20:
    name: Facturación a embarcadores
    description: |
      Cálculo y emisión de facturas de transporte a los embarcadores.
  BC-3060.50.30:
    name: Liquidación de desequilibrios
    description: |
      Liquidación de desequilibrios operacionales entre los embarcadores.
  BC-3060.60:
    name: Operaciones de construcción y reparación de ductos
    description: |
      Reparaciones en servicio, operaciones de hot-tap y coordinación
      de reemplazos en ductos de transmisión y recolección.
  BC-3060.60.10:
    name: Coordinación de reemplazo de ductos
    description: |
      Coordinación del reemplazo de segmentos de ductos y su reencaminamiento.
  BC-3060.60.20:
    name: Operaciones de reparación en servicio
    description: |
      Reparaciones con parches compuestos, manguitos y sobreposiciones de
      soldadura en ductos en servicio.
  BC-3060.60.30:
    name: Operaciones de hot-tap
    description: |
      Operaciones de hot-tap y stopple para conexiones en ductos presurizados.

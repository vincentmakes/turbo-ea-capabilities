locale: es
source: L1-electrical-equipment-service-operations-management.yaml
entries:
  BC-1960:
    name: Gestión de operaciones de servicio de equipos eléctricos
    description: |
      Servicios liderados por el OEM sobre equipos suministrados — inspección de sitio, FAT y SAT,
      energización, ajustes de protección, configuración de la base instalada, retrofits, contratos
      de desempeño y monitoreo de condición.
  BC-1960.10:
    name: Ingeniería de inspección de sitio y precomisionamiento
    description: |
      Evaluación del sitio y preparación de ingeniería previa al comisionamiento del equipo.
  BC-1960.10.10:
    name: Ejecución de inspección de sitio
    description: |
      Ejecución de inspecciones de sitio para capturar las condiciones encontradas.
  BC-1960.10.20:
    name: Evaluación de preparación del sitio
    description: |
      Evaluación de la preparación del sitio para la entrega y energización del equipo.
  BC-1960.10.30:
    name: Estudios de ingeniería de precomisionamiento
    description: |
      Estudios de ingeniería previos al comisionamiento, incluida la coordinación y la puesta a tierra.
  BC-1960.20:
    name: Coordinación de pruebas de aceptación en fábrica
    description: |
      Planificación y ejecución de pruebas de aceptación en fábrica con presencia del cliente.
  BC-1960.20.10:
    name: Elaboración del plan FAT
    description: |
      Elaboración de planes FAT alineados con los requisitos contractuales.
  BC-1960.20.20:
    name: Coordinación de testigos en el FAT
    description: |
      Coordinación de testigos del cliente y del organismo certificador en el FAT.
  BC-1960.20.30:
    name: Gestión de lista de pendientes del FAT
    description: |
      Seguimiento y cierre de los puntos pendientes del FAT.
  BC-1960.30:
    name: Gestión de pruebas de aceptación en sitio y energización
    description: |
      Pruebas de aceptación en sitio, energización y supervisión de la operación inicial.
  BC-1960.30.10:
    name: Ejecución de pruebas de aceptación en sitio
    description: |
      Ejecución de pruebas de aceptación en sitio sobre el equipo instalado.
  BC-1960.30.20:
    name: Ejecución del procedimiento de energización
    description: |
      Energización controlada del equipo conforme a los procedimientos de maniobra.
  BC-1960.30.30:
    name: Supervisión de la operación inicial
    description: |
      Supervisión de la operación inicial y la puesta en marcha de fiabilidad.
  BC-1960.30.40:
    name: Documentación de entrega
    description: |
      Compilación de dossieres de entrega y registros tal como se comisionó.
  BC-1960.40:
    name: Gestión de ajustes de protección y control
    description: |
      Ingeniería y despliegue de ajustes de protección y control en equipos instalados.
  BC-1960.40.10:
    name: Estudio de coordinación de protecciones
    description: |
      Estudios de coordinación para dispositivos de protección en la red instalada.
  BC-1960.40.20:
    name: Cálculo de ajustes de relés
    description: |
      Cálculo de ajustes de relés de protección.
  BC-1960.40.30:
    name: Despliegue y verificación de archivos de ajuste
    description: |
      Despliegue de archivos de ajuste en relés y verificación en sitio.
  BC-1960.50:
    name: Gestión de la configuración de la base instalada
    description: |
      Mantenimiento de datos de configuración tal como se instaló en la base instalada global.
  BC-1960.50.10:
    name: Registro de la base instalada
    description: |
      Registro del equipo instalado por número de serie, sitio y cliente.
  BC-1960.50.20:
    name: Captura de la configuración tal como se construyó
    description: |
      Captura de la configuración tal como se construyó en el momento del comisionamiento.
  BC-1960.50.30:
    name: Registros de modificación de la base instalada
    description: |
      Registros de modificaciones posteriores al comisionamiento en equipos instalados.
  BC-1960.60:
    name: Servicios de retrofit y actualización de equipos
    description: |
      Ingeniería y ejecución de retrofits y actualizaciones de capacidades en equipos instalados.
  BC-1960.60.10:
    name: Ingeniería de retrofit
    description: |
      Diseño de ingeniería de paquetes de retrofit y actualización.
  BC-1960.60.20:
    name: Ejecución de retrofit
    description: |
      Ejecución en sitio de retrofits e instalaciones de actualización.
  BC-1960.60.30:
    name: Validación de actualización
    description: |
      Pruebas de validación tras el retrofit o la actualización.
  BC-1960.70:
    name: Operaciones de contratos de servicio basados en desempeño
    description: |
      Operación de contratos de servicio basados en desempeño y resultados.
  BC-1960.70.10:
    name: Ejecución del contrato de desempeño
    description: |
      Ejecución de las obligaciones de servicio basadas en desempeño.
  BC-1960.70.20:
    name: Reporte de resultados del nivel de servicio
    description: |
      Reporte de resultados contratados y métricas de nivel de servicio.
  BC-1960.70.30:
    name: Operaciones del mecanismo de reparto de riesgos
    description: |
      Operación de mecanismos de bonificación y penalización de reparto de riesgos.
  BC-1960.80:
    name: Prestación del servicio de monitoreo de condición
    description: |
      Prestación de servicios de monitoreo remoto de condición e información predictiva.
  BC-1960.80.10:
    name: Operaciones de monitoreo remoto de condición
    description: |
      Centro de operaciones para el monitoreo remoto de la condición de los activos instalados.
  BC-1960.80.20:
    name: Prestación de diagnósticos
    description: |
      Entrega de diagnósticos e información a los clientes.
  BC-1960.80.30:
    name: Recomendaciones de mantenimiento predictivo
    description: |
      Recomendaciones de mantenimiento predictivo para equipos instalados.

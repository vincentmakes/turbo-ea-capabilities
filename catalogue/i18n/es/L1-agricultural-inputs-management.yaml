locale: es
source: L1-agricultural-inputs-management.yaml
entries:
  BC-3550:
    name: Gestión de insumos agrícolas
    description: |
      Gestión del ciclo de vida de los insumos agrícolas — semillas y material genético, fertilizantes, protección de cultivos, nutrición animal, medicamentos veterinarios y biológicos — incluidos los requisitos específicos del sector en materia de trazabilidad, gestión responsable y almacenamiento, distintos de la adquisición genérica.
  BC-3550.10:
    name: Gestión de semillas y material genético
    description: |
      Obtención de semillas certificadas, tratamiento de semillas, seguimiento de genealogía y características, e inventario de semillas durante el ciclo de siembra.
    in_scope:
      - Obtención de semillas certificadas
      - Aplicación de tratamiento de semillas
      - Seguimiento de genealogía y características
      - Inventario de semillas en la granja y en depósito
    out_of_scope:
      - I+D en mejoramiento vegetal (BC-810)
      - Recomendación de variedades (BC-3530.40)
  BC-3550.10.10:
    name: Obtención y certificación de semillas
    description: |
      Obtención de semillas certificadas conforme a los esquemas de semillas de la OCDE y las pruebas ISTA.
  BC-3550.10.20:
    name: Aplicación de tratamiento de semillas
    description: |
      Aplicación de tratamientos y coberturas de semillas antes de la siembra.
  BC-3550.10.30:
    name: Seguimiento de genealogía y características de semillas
    description: |
      Seguimiento de la genealogía, el paquete de características y las obligaciones de gestión responsable de las semillas.
  BC-3550.10.40:
    name: Gestión del inventario de semillas
    description: |
      Gestión del inventario de semillas en depósitos y almacenamiento en la granja.
  BC-3550.20:
    name: Gestión de insumos de fertilizantes
    description: |
      Obtención, almacenamiento, manejo y registros de aplicación de fertilizantes sólidos y líquidos.
  BC-3550.20.10:
    name: Obtención de fertilizantes
    description: |
      Obtención de fertilizantes simples y compuestos de proveedores e importadores.
  BC-3550.20.20:
    name: Almacenamiento y manejo de fertilizantes
    description: |
      Almacenamiento y manejo de fertilizantes en la granja y en depósito, incluidos los diques de contención.
  BC-3550.20.30:
    name: Registros de aplicación de fertilizantes
    description: |
      Registros de aplicación de fertilizantes por campo, producto y tasa.
  BC-3550.30:
    name: Gestión de insumos de protección de cultivos
    description: |
      Obtención, almacenamiento, registros de aplicación y gestión responsable de envases vacíos de productos fitosanitarios.
  BC-3550.30.10:
    name: Obtención de productos fitosanitarios
    description: |
      Obtención de productos fitosanitarios autorizados a través de canales con licencia.
  BC-3550.30.20:
    name: Almacenamiento y manejo de pesticidas
    description: |
      Almacenamiento, segregación y controles de manejo de pesticidas por operadores.
  BC-3550.30.30:
    name: Registros de aplicación de pesticidas
    description: |
      Registros de aplicación de pesticidas que cumplen los requisitos del regulador y de aseguramiento.
  BC-3550.30.40:
    name: Gestión responsable de envases vacíos
    description: |
      Triple enjuague, devolución y reciclaje de envases vacíos de pesticidas.
  BC-3550.40:
    name: Gestión de insumos de nutrición animal
    description: |
      Obtención, almacenamiento y seguimiento del uso de ingredientes para piensos, premezclas y aditivos para piensos en las operaciones ganaderas.
  BC-3550.40.10:
    name: Obtención de ingredientes para piensos
    description: |
      Obtención de cereales, harinas proteicas e ingredientes forrajeros.
  BC-3550.40.20:
    name: Gestión de premezclas y aditivos
    description: |
      Adquisición e inventario de premezclas, minerales y aditivos para piensos.
  BC-3550.40.30:
    name: Seguimiento del inventario y las raciones de pienso
    description: |
      Seguimiento del inventario de pienso en la granja y del uso de raciones.
  BC-3550.50:
    name: Gestión de insumos de medicamentos veterinarios
    description: |
      Obtención, almacenamiento en cadena de frío y registro del uso de medicamentos veterinarios y biológicos en la granja.
  BC-3550.50.10:
    name: Obtención de medicamentos veterinarios
    description: |
      Obtención de medicamentos veterinarios y biológicos mediante prescripción.
  BC-3550.50.20:
    name: Almacenamiento en cadena de frío de medicamentos veterinarios
    description: |
      Almacenamiento en cadena de frío en la granja y gestión de desviaciones de temperatura para medicamentos veterinarios.
  BC-3550.50.30:
    name: Registro del uso de medicamentos veterinarios
    description: |
      Registro del uso con detalles de lote, dosis, animal y operador.
  BC-3550.60:
    name: Insumos biológicos y enmiendas de suelos
    description: |
      Obtención de insumos biológicos, manejo de estiércol y compost, y suministro de cal y enmiendas de suelos.
  BC-3550.60.10:
    name: Obtención de insumos biológicos
    description: |
      Obtención de bioestimulantes, biofertilizantes e inoculantes microbianos.
  BC-3550.60.20:
    name: Gestión del estiércol y el compost
    description: |
      Operaciones de almacenamiento de estiércol, compostaje y recuperación de nutrientes en la granja.
  BC-3550.60.30:
    name: Obtención de cal y enmiendas de suelos
    description: |
      Obtención de cal, yeso y otras enmiendas de suelos.

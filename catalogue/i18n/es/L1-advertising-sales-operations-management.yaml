locale: es
source: L1-advertising-sales-operations-management.yaml
entries:
  BC-3760:
    name: "Gestión de operaciones de venta publicitaria"
    description: |
      Inventario, ventas directas y programáticas, tráfico y decisión de anuncios,
      controles de seguridad de marca y calidad del inventario, e informes de ingresos
      para el negocio publicitario en superficies lineales, digitales y de televisión conectada.
  BC-3760.10:
    name: "Gestión del inventario publicitario"
    description: |
      Previsión, asignación y reserva del inventario publicitario
      en superficies lineales y digitales.
  BC-3760.10.10:
    name: "Previsión de disponibilidades"
    description: |
      Previsión de impresiones disponibles, GRP y disponibilidades segmentadas
      por audiencia a lo largo del horizonte de inventario.
  BC-3760.10.20:
    name: "Asignación de inventario"
    description: |
      Asignación del inventario a grupos directos, programáticos y propios
      en todas las superficies.
  BC-3760.10.30:
    name: "Reserva y retención de inventario"
    description: |
      Reserva y retención del inventario para acuerdos comprometidos,
      patrocinios y eventos de primer nivel.
  BC-3760.20:
    name: "Gestión de ventas publicitarias directas"
    description: |
      Venta directa del inventario publicitario a través de patrocinios,
      contratos upfront y órdenes de inserción.
  BC-3760.20.10:
    name: "Ventas de patrocinio"
    description: |
      Cartera y contratación de acuerdos de patrocinio e integración.
  BC-3760.20.20:
    name: "Ventas upfront y de dispersión"
    description: |
      Ventas upfront y de mercado de dispersión de inventario lineal y digital.
  BC-3760.20.30:
    name: "Órdenes de inserción y ventas de espacios lineales"
    description: |
      Captura de órdenes de inserción y reserva de espacios lineales
      conforme al plan de disponibilidades.
  BC-3760.30:
    name: "Gestión de ventas programáticas"
    description: |
      Configuración y operación de subastas programáticas, mercados privados
      e integraciones de ruta de suministro.
  BC-3760.30.10:
    name: "Configuración de subastas"
    description: |
      Configuración de precios mínimos de subasta, identificadores de acuerdo
      y elegibilidad de pujadores en el inventario.
  BC-3760.30.20:
    name: "Gestión de acuerdos en mercados privados"
    description: |
      Elaboración y ciclo de vida de acuerdos programáticos garantizados
      y de mercados privados con compradores.
  BC-3760.30.30:
    name: "Integración de puja de cabecera y SSP"
    description: |
      Integración de socios de puja de cabecera y plataformas del lado de la oferta
      en todas las superficies.
  BC-3760.40:
    name: "Tráfico y operaciones publicitarias"
    description: |
      Incorporación de creatividades, decisión e inserción de anuncios, y programación
      de espacios en estructuras de pausas lineales y digitales.
  BC-3760.40.10:
    name: "Incorporación y control de calidad de creatividades"
    description: |
      Incorporación y control de calidad de las creatividades publicitarias
      conforme a las especificaciones técnicas y de política.
  BC-3760.40.20:
    name: "Decisión e inserción de anuncios"
    description: |
      Decisión del anuncio a emitir e inserción en pausas lineales,
      del lado del servidor o del cliente.
  BC-3760.40.30:
    name: "Programación de espacios publicitarios"
    description: |
      Construcción de la parrilla para el posicionamiento de espacios lineales
      y la optimización de la estructura de pausas.
  BC-3760.50:
    name: "Gestión de seguridad de marca y calidad del inventario"
    description: |
      Clasificación del inventario en materia de seguridad de marca, detección
      de tráfico inválido y etiquetado de idoneidad para la segmentación de compradores.
  BC-3760.50.10:
    name: "Clasificación de seguridad de marca"
    description: |
      Clasificación de las superficies de contenido conforme a los marcos
      de seguridad e idoneidad de marca.
  BC-3760.50.20:
    name: "Detección de tráfico inválido"
    description: |
      Detección y exclusión de tráfico inválido en el inventario propio
      y de socios.
  BC-3760.50.30:
    name: "Etiquetado de idoneidad"
    description: |
      Etiquetado de las superficies de contenido con atributos de idoneidad
      y contextuales para la segmentación de compradores.
  BC-3760.60:
    name: "Informes de ingresos publicitarios"
    description: |
      Informes de entrega de campañas, conciliación de compensaciones y facturación
      y liquidación de anunciantes en ventas lineales y digitales.
  BC-3760.60.10:
    name: "Informes de entrega de campañas"
    description: |
      Informes de entrega y ritmo respecto a los objetivos de campaña
      en todas las superficies y monedas.
  BC-3760.60.20:
    name: "Compensaciones y conciliación"
    description: |
      Conciliación de las impresiones entregadas con las contratadas, con gestión
      de compensaciones y notas de crédito.
  BC-3760.60.30:
    name: "Facturación y liquidación de anunciantes"
    description: |
      Facturación a anunciantes y agencias y liquidación conforme a descuentos
      y comisiones de agencia.

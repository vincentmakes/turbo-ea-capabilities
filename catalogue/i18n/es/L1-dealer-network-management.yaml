locale: es
source: L1-dealer-network-management.yaml
entries:
  BC-3430:
    name: Gestión de red de concesionarios
    description: |
      Gobierno de la red de concesionarios franquiciados o autorizados — nombramientos,
      acuerdos, estándares de marca e instalaciones, rendimiento, formación y
      desarrollo de la red bajo el Reglamento de Exención por Categorías de la UE
      y normas de venta al por menor equivalentes.
  BC-3430.10:
    name: Estrategia y planificación de la red de concesionarios
    description: |
      Planificación estratégica de la cobertura geográfica, formato, alcance y
      estándares de marca de los concesionarios en todos los mercados.
  BC-3430.10.10:
    name: Planificación de cobertura de mercado y red
    description: |
      Análisis de lagunas de cobertura de mercado y definición de la red de
      concesionarios objetivo por zona.
  BC-3430.10.20:
    name: Optimización de la red de concesionarios
    description: |
      Optimización de la red de concesionarios existente, incluida la consolidación,
      reubicación y ampliación de capacidad.
  BC-3430.10.30:
    name: Definición de formato de red y estándares de marca
    description: |
      Definición de formatos de concesionario, conceptos de venta al por menor y
      estándares de experiencia de marca.
  BC-3430.20:
    name: Gestión de nombramientos y acuerdos de concesionarios
    description: |
      Incorporación, acuerdos y rescisión de concesionarios, incluida la gestión
      de derechos de territorio y marca.
  BC-3430.20.10:
    name: Solicitud y evaluación de candidatos a concesionario
    description: |
      Recepción y evaluación de solicitudes de concesionario, incluida la debida
      diligencia financiera, legal y operativa.
  BC-3430.20.20:
    name: Redacción y ejecución del acuerdo de concesionario
    description: |
      Redacción, negociación y ejecución de acuerdos de concesionario alineados
      con la legislación de competencia aplicable.
  BC-3430.20.30:
    name: Gestión de derechos de territorio y marca
    description: |
      Asignación y gestión de derechos de territorio y marca, incluidas las
      definiciones de área de responsabilidad.
  BC-3430.20.40:
    name: Gestión de rescisión de concesionarios
    description: |
      Gestión de la rescisión del concesionario, extinción progresiva y reasignación
      del territorio.
  BC-3430.30:
    name: Estándares y cumplimiento del concesionario
    description: |
      Mantenimiento y auditoría de los estándares de marca, instalaciones y
      operativos en la red de concesionarios.
  BC-3430.30.10:
    name: Gestión de estándares de marca e instalaciones
    description: |
      Mantenimiento de los estándares de marca, instalaciones y experiencia del
      cliente para el cumplimiento del concesionario.
  BC-3430.30.20:
    name: Auditoría de cumplimiento del concesionario
    description: |
      Auditorías periódicas de los concesionarios frente a estándares de marca,
      ventas y posventa.
  BC-3430.30.30:
    name: Gestión de acciones correctivas
    description: |
      Gestión de planes de acciones correctivas para concesionarios no conformes
      hasta su cierre.
  BC-3430.40:
    name: Gestión del rendimiento del concesionario
    description: |
      Medición y mejora del rendimiento comercial y operativo del concesionario
      mediante cuadros de mando y programas de incentivos.
  BC-3430.40.10:
    name: Gestión del cuadro de mando del concesionario
    description: |
      Definición y operación de cuadros de mando del concesionario en métricas
      de ventas, posventa y experiencia del cliente.
  BC-3430.40.20:
    name: Revisiones de rendimiento de ventas y posventa
    description: |
      Revisiones periódicas del rendimiento del concesionario y planificación
      conjunta de negocio con los gestores de zona.
  BC-3430.40.30:
    name: Gestión del programa de incentivos del concesionario
    description: |
      Diseño y operación de programas de bonificación, margen e incentivos para
      concesionarios.
  BC-3430.50:
    name: Gestión de financiación y plan de planta del concesionario
    description: |
      Financiación del inventario de vehículos mayorista del concesionario y
      gestión de cuentas por cobrar y programas de apoyo al capital de trabajo.
    in_scope:
      - Administración del plan de planta mayorista
      - Límites de crédito del concesionario y seguimiento de la exposición
      - Apoyo al capital de trabajo del concesionario respaldado por el OEM
    out_of_scope:
      - Crédito al por menor de financiación cautiva de automóviles (cubierto en crédito y préstamos empresariales)
  BC-3430.50.10:
    name: Administración del plan de planta mayorista
    description: |
      Administración de la financiación del plan de planta mayorista para el
      inventario de vehículos del concesionario.
  BC-3430.50.20:
    name: Gestión de crédito y cuentas por cobrar del concesionario
    description: |
      Gestión de límites de crédito del concesionario, antigüedad de cuentas
      por cobrar y cobros.
  BC-3430.50.30:
    name: Apoyo al capital de trabajo del concesionario
    description: |
      Apoyo al capital de trabajo respaldado por el OEM, financiación de repuestos
      y programas de asistencia estacional.
  BC-3430.60:
    name: Formación y certificación del concesionario
    description: |
      Formación y certificación del personal de ventas, posventa y dirección
      del concesionario.
  BC-3430.60.10:
    name: Certificación de ventas del concesionario
    description: |
      Certificación de los asesores de ventas del concesionario en producto,
      marca y estándares de experiencia del cliente.
  BC-3430.60.20:
    name: Certificación de técnicos de servicio del concesionario
    description: |
      Certificación de los técnicos de servicio del concesionario en procedimientos
      de diagnóstico, reparación y vehículos EV/HV.
  BC-3430.60.30:
    name: Desarrollo directivo del concesionario
    description: |
      Programas de desarrollo de liderazgo y dirección para directores de
      concesionario y responsables de departamento.
  BC-3430.70:
    name: Operaciones de sistemas y datos del concesionario
    description: |
      Operación de los sistemas orientados al concesionario y los flujos de datos
      que conectan a los concesionarios con las plataformas comerciales, técnicas
      y de informes del OEM.
  BC-3430.70.10:
    name: Integración del sistema de gestión del concesionario
    description: |
      Integración de los sistemas de gestión del concesionario con los sistemas
      troncales de pedidos, repuestos, garantía e informes del OEM.
  BC-3430.70.20:
    name: Gestión de datos maestros del concesionario
    description: |
      Mantenimiento de los datos maestros del concesionario, incluidos puntos de
      venta, contactos y autorizaciones.
  BC-3430.70.30:
    name: Informes y analítica del concesionario
    description: |
      Informes, benchmarking y analítica a nivel de concesionario en dimensiones
      comerciales y operativas.

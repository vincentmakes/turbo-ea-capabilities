locale: es
source: L1-vehicle-sales-distribution-management.yaml
entries:
  BC-3440:
    name: Gestión de ventas y distribución de vehículos
    description: |
      Ventas y distribución operativa de vehículos nuevos — planificación mayorista,
      asignación de producción de fábrica, cartera de pedidos, inventario de
      vehículos de demostración y de ocasión certificados, ventas a flotas y
      B2B, y la interfaz de entrega y matriculación al cliente minorista.
  BC-3440.10:
    name: Planificación de ventas y asignación de vehículos
    description: |
      Planificación de los volúmenes de vehículos mayoristas por mercado y
      concesionario, y asignación de cupos de producción en fábrica.
  BC-3440.10.10:
    name: Planificación de volúmenes mayoristas
    description: |
      Planificación periódica de los volúmenes de vehículos mayoristas por
      mercado, modelo y segmento.
  BC-3440.10.20:
    name: Asignación de producción a mercados
    description: |
      Asignación de la capacidad finita de planta a mercados y canales conforme
      a la demanda y las prioridades estratégicas.
  BC-3440.10.30:
    name: Gestión de cupos de producción
    description: |
      Asignación, intercambio y liberación de cupos de producción de fábrica
      a concesionarios y clientes de flota.
  BC-3440.20:
    name: Gestión de la cartera de pedidos de vehículos
    description: |
      Captura, validación de configuración y gestión del ciclo de vida de pedidos
      de vehículos en stock y de clientes.
  BC-3440.20.10:
    name: Gestión de pedidos de stock
    description: |
      Gestión de los pedidos de stock del concesionario frente a asignaciones
      y objetivos de stock.
  BC-3440.20.20:
    name: Captura de pedidos de clientes
    description: |
      Captura de pedidos de vehículos de clientes minoristas y de flota, incluida
      la configuración y el precio.
  BC-3440.20.30:
    name: Validación de configuración de pedidos
    description: |
      Validación de las configuraciones de pedidos frente a las normas de
      viabilidad, regulatorias y de precios.
  BC-3440.20.40:
    name: Seguimiento del estado del pedido
    description: |
      Seguimiento integral del estado del pedido desde su recepción hasta la
      fabricación, el transporte y la llegada al concesionario.
  BC-3440.30:
    name: Operaciones de fabricación bajo pedido y distribución
    description: |
      Coordinación de la ejecución de fabricación bajo pedido y la logística
      saliente de vehículos desde la planta hasta el concesionario.
  BC-3440.30.10:
    name: Coordinación de fabricación bajo pedido
    description: |
      Coordinación de la ejecución de fabricación bajo pedido con las operaciones
      de fabricación y las llamadas a proveedores.
  BC-3440.30.20:
    name: Coordinación de la logística de vehículos
    description: |
      Coordinación de la logística saliente de vehículos por camión, ferrocarril,
      barco y movimientos de explanada interior.
  BC-3440.30.30:
    name: Coordinación de operaciones en puerto de entrada y explanada
    description: |
      Coordinación de las operaciones en puerto de entrada, centros de
      procesamiento y explanada, incluida la personalización previa a la entrega.
  BC-3440.40:
    name: Gestión de inventario y vehículos de demostración
    description: |
      Gestión de los inventarios de stock del concesionario, vehículos de
      demostración, prensa y préstamo.
  BC-3440.40.10:
    name: Gestión del inventario de stock del concesionario
    description: |
      Visibilidad y gestión del inventario de vehículos en concesionarios y
      en tránsito.
  BC-3440.40.20:
    name: Gestión de vehículos de demostración
    description: |
      Gestión de los parques de vehículos de demostración utilizados por
      concesionarios y la fuerza de ventas de campo del OEM.
  BC-3440.40.30:
    name: Gestión de flota de prensa y préstamo
    description: |
      Gestión de flotas de prensa, marketing y préstamo, incluidas las
      configuraciones y la rotación.
  BC-3440.50:
    name: Gestión del programa de vehículos de ocasión certificados
    description: |
      Gestión de los programas de vehículos de ocasión certificados del OEM,
      incluidas la inspección, elegibilidad, marca y garantía.
    in_scope:
      - Criterios de elegibilidad e inspección de vehículos de ocasión certificados (CPO)
      - Inventario y precios de CPO
      - Programas de garantía específicos de CPO
    out_of_scope:
      - Recomercialización de vehículos de segunda mano procedentes de renting fuera del programa CPO
  BC-3440.50.10:
    name: Elegibilidad e inspección de vehículos CPO
    description: |
      Definición y ejecución de los criterios de elegibilidad e inspección
      de vehículos de ocasión certificados.
  BC-3440.50.20:
    name: Gestión del inventario de CPO
    description: |
      Gestión del inventario CPO en concesionarios y depósitos centrales.
  BC-3440.50.30:
    name: Garantía y marca del CPO
    description: |
      Diseño y comercialización del programa de garantía de vehículos de
      ocasión certificados con marca propia.
  BC-3440.60:
    name: Gestión de ventas a flotas y B2B
    description: |
      Operaciones de ventas para compradores de vehículos de flota, renting,
      alquiler y otros B2B, incluida la gestión de concursos y ofertas.
  BC-3440.60.10:
    name: Gestión de cuentas de flota
    description: |
      Gestión de grandes cuentas de flota y relaciones con clientes corporativos.
  BC-3440.60.20:
    name: Gestión de concursos y ofertas de flota
    description: |
      Respuesta a concursos, RFP y procesos de oferta estructurados para
      grandes operaciones de vehículos.
  BC-3440.60.30:
    name: Gestión de especificaciones de vehículos de flota
    description: |
      Gestión de especificaciones de vehículos para flotas, opciones y
      transformaciones.
  BC-3440.60.40:
    name: Gestión del canal de alquiler y renting
    description: |
      Gestión de las relaciones del OEM con empresas de alquiler y renting,
      incluidos los acuerdos de recompra.
  BC-3440.70:
    name: Apoyo a la entrega y matriculación de vehículos
    description: |
      Apoyo a los concesionarios para la entrega del vehículo, la matriculación
      y el acceso a la fase de experiencia del cliente.
  BC-3440.70.10:
    name: Coordinación de la inspección previa a la entrega
    description: |
      Coordinación de los estándares y aprobaciones de inspección previa a la
      entrega en concesionarios y centros de procesamiento.
  BC-3440.70.20:
    name: Coordinación de la matriculación del vehículo
    description: |
      Coordinación con las autoridades de matriculación de vehículos y
      suministro de datos de primera matriculación.
  BC-3440.70.30:
    name: Experiencia de entrega al cliente
    description: |
      Definición y aseguramiento de la experiencia de entrega al cliente
      en el momento de la entrega.

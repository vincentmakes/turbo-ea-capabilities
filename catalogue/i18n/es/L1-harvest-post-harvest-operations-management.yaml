locale: es
source: L1-harvest-post-harvest-operations-management.yaml
entries:
  BC-3560:
    name: Gestión de operaciones de cosecha y poscosecha
    description: |
      Programación y ejecución de la cosecha, acondicionamiento en campo y poscosecha, almacenamiento en la granja, clasificación y envasado, y recepción entrante al siguiente punto de la cadena agroalimentaria.
  BC-3560.10:
    name: Planificación y programación de la cosecha
    description: |
      Planificación de la ventana de cosecha, programación de cuadrillas y equipos, y coordinación logística de la cosecha en campos y cultivos.
  BC-3560.10.10:
    name: Planificación de la ventana de cosecha
    description: |
      Planificación de la ventana de cosecha campo por campo conforme a la madurez y el clima.
  BC-3560.10.20:
    name: Programación de cuadrillas y equipos de cosecha
    description: |
      Programación de cuadrillas de cosecha, contratistas y maquinaria.
  BC-3560.10.30:
    name: Coordinación logística de la cosecha
    description: |
      Coordinación de camiones, bins y remolques en los frentes de cosecha activos.
  BC-3560.20:
    name: Operaciones de cosecha en campo
    description: |
      Operaciones de cosecha mecánica y manual, incluida la clasificación en campo y la transferencia al borde del campo.
  BC-3560.20.10:
    name: Cosecha mecánica
    description: |
      Cosecha mecánica con cosechadoras, acondicionadoras de corte y equipos especializados.
  BC-3560.20.20:
    name: Cosecha manual
    description: |
      Cosecha manual selectiva y a mano de cultivos hortícolas.
  BC-3560.20.30:
    name: Clasificación en campo
    description: |
      Clasificación y corte del producto cosechado en el campo.
  BC-3560.30:
    name: Acondicionamiento poscosecha
    description: |
      Secado, enfriamiento, curado y descontaminación del producto cosechado para estabilizarlo para el almacenamiento o el uso posterior.
    in_scope:
      - Secado de grano y semillas
      - Preenfriamiento de productos hortícolas
      - Curado de cultivos de raíces y bulbos
      - Limpieza y descontaminación en campo
  BC-3560.30.10:
    name: Operaciones de secado
    description: |
      Secado de grano, semillas y forraje hasta niveles seguros de humedad.
  BC-3560.30.20:
    name: Operaciones de enfriamiento y preenfriamiento
    description: |
      Preenfriamiento hidráulico, al vacío y con aire forzado de productos hortícolas.
  BC-3560.30.30:
    name: Operaciones de curado
    description: |
      Curado de papas, cebollas, batatas y cultivos similares.
  BC-3560.30.40:
    name: Limpieza y descontaminación
    description: |
      Limpieza y descontaminación del producto cosechado antes del almacenamiento.
  BC-3560.40:
    name: Operaciones de almacenamiento en la granja
    description: |
      Operación de bins, silos y cámaras frías en la granja, incluida la aireación y el manejo de plagas en almacén.
  BC-3560.40.10:
    name: Gestión de bins y silos
    description: |
      Carga, monitoreo y descarga de bins y silos de grano.
  BC-3560.40.20:
    name: Operaciones de almacenamiento en frío
    description: |
      Operación de cámaras refrigeradas y de atmósfera controlada en la granja.
  BC-3560.40.30:
    name: Aireación de grano almacenado
    description: |
      Gestión de la aireación del grano almacenado para mantener la temperatura y la humedad.
  BC-3560.40.40:
    name: Manejo de plagas en almacenamiento
    description: |
      Monitoreo y tratamiento de la presión de insectos y roedores en los almacenes.
  BC-3560.50:
    name: Clasificación y envasado de productos
    description: |
      Operaciones de clasificación, sala de envasado y etiquetado de lotes para preparar el producto para el movimiento posterior.
  BC-3560.50.10:
    name: Operaciones de clasificación por calidad
    description: |
      Clasificación del producto conforme a las especificaciones de tamaño, color y defectos.
  BC-3560.50.20:
    name: Operaciones de sala de envasado
    description: |
      Operaciones de la línea de sala de envasado, incluidos el lavado, el encerado y el empaque.
  BC-3560.50.30:
    name: Identificación y etiquetado de lotes
    description: |
      Asignación de identificadores de lote, partida y GS1, e impresión de etiquetas.
  BC-3560.60:
    name: Recepción entrante en el procesador
    description: |
      Coordinación de la recepción entrante desde la granja o el agregador en las instalaciones del procesador o comprador.
  BC-3560.60.10:
    name: Programación y recepción de camiones
    description: |
      Programación y recepción de camiones entrantes en las puertas del procesador.
  BC-3560.60.20:
    name: Muestreo en recepción
    description: |
      Muestreo entrante de cargas de grano, ganado, leche y productos.
  BC-3560.60.30:
    name: Pruebas de calidad en recepción
    description: |
      Pruebas de calidad de las cargas entrantes para respaldar la aceptación y la fijación de precios.

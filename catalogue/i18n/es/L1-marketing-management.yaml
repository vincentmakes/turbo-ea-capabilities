locale: es
source: L1-marketing-management.yaml
entries:
  BC-400:
    name: Gestión de marketing
    description: |
      Marca, inteligencia de mercado, generación de demanda y operaciones de marketing.
  BC-400.10:
    name: Gestión de la estrategia de marketing
    description: |
      Estrategia de marketing, posicionamiento y planificación de la llegada al mercado.
  BC-400.10.10:
    name: Segmentación y targeting de mercado
    description: |
      Definición de mercados objetivo, segmentos y perfiles de cliente (personas).
  BC-400.10.20:
    name: Posicionamiento y propuesta de valor
    description: |
      Articulación del posicionamiento, mensajes clave y propuestas de valor diferenciadas.
  BC-400.10.30:
    name: Planificación de llegada al mercado
    description: |
      Modelos de go-to-market, planes de lanzamiento y estrategia de canales.
  BC-400.10.40:
    name: Planificación del mix de marketing
    description: |
      Mix de marketing, asignación de canales y planes de marketing integrado.
  BC-400.20:
    name: Gestión de marca
    description: |
      Estrategia, identidad, valor y gobernanza de la marca.
  BC-400.20.10:
    name: Estrategia y arquitectura de marca
    description: |
      Portafolio de marcas, arquitectura y estrategia de marca corporativa.
  BC-400.20.20:
    name: Identidad y estándares de marca
    description: |
      Identidad visual, voz, tono y estándares de uso de la marca.
  BC-400.20.30:
    name: Medición del valor de marca
    description: |
      Seguimiento del reconocimiento, consideración y valor percibido de la marca.
  BC-400.20.40:
    name: Cumplimiento y custodia de la marca
    description: |
      Supervisión del uso correcto de la marca en canales y por parte de socios.
  BC-400.30:
    name: Gestión de inteligencia de mercado
    description: |
      Investigación de mercado, inteligencia competitiva e insights de clientes.
  BC-400.30.10:
    name: Investigación de mercado
    description: |
      Investigación de mercado primaria y secundaria y análisis de tendencias.
  BC-400.30.20:
    name: Inteligencia competitiva
    description: |
      Monitoreo de competidores, battlecards y análisis competitivo del entorno.
  BC-400.30.30:
    name: Generación de insights de clientes
    description: |
      Síntesis de insights de clientes a partir de datos e investigación cualitativa.
  BC-400.30.40:
    name: Dimensionamiento y previsión del mercado
    description: |
      Dimensionamiento del mercado, cuota de mercado y previsión de la demanda.
  BC-400.40:
    name: Gestión de generación de demanda
    description: |
      Campañas de generación de leads y marketing del ciclo de vida del cliente.
  BC-400.40.10:
    name: Planificación de campañas
    description: |
      Planificación de campañas, selección de audiencia y desarrollo de ofertas.
  BC-400.40.20:
    name: Generación de leads
    description: |
      Generación de leads mediante canales inbound, outbound y eventos.
  BC-400.40.30:
    name: Nutrición y puntuación de leads
    description: |
      Puntuación de leads, recorridos de nutrición y traspaso de MQL a ventas.
  BC-400.40.40:
    name: Marketing de ciclo de vida y retención
    description: |
      Marketing de ciclo de vida, venta cruzada y campañas de retención de clientes.
  BC-400.50:
    name: Gestión de operaciones de marketing
    description: |
      Presupuesto, tecnología, procesos y medición del marketing.
  BC-400.50.10:
    name: Gestión del presupuesto de marketing
    description: |
      Presupuestación, asignación y seguimiento del gasto en marketing.
  BC-400.50.20:
    name: Gestión del stack tecnológico de marketing
    description: |
      Selección e integración de herramientas de automatización y analítica de marketing.
  BC-400.50.30:
    name: Medición del rendimiento del marketing
    description: |
      Atribución, ROI y cuadros de mando de rendimiento del marketing.
  BC-400.50.40:
    name: Gestión del cumplimiento en marketing
    description: |
      Cumplimiento del marketing con las normas de consentimiento, privacidad y publicidad.
  BC-400.60:
    name: Gestión del marketing digital
    description: |
      Web, SEO, medios de pago, redes sociales y automatización del marketing.
  BC-400.60.10:
    name: Gestión de la experiencia web
    description: |
      Propiedades web corporativas, gestión de contenidos y personalización.
  BC-400.60.20:
    name: Optimización en motores de búsqueda
    description: |
      Optimización de la búsqueda orgánica y visibilidad de los contenidos en línea.
  BC-400.60.30:
    name: Gestión de medios de pago
    description: |
      Compra de medios de pago en búsqueda, display, vídeo y programática.
  BC-400.60.40:
    name: Gestión de redes sociales
    description: |
      Presencia orgánica en redes sociales, gestión de comunidades y relaciones con influencers.
  BC-400.60.50:
    name: Operaciones de automatización del marketing
    description: |
      Operaciones de email, orquestación de recorridos y automatización del marketing.
  BC-400.70:
    name: Gestión del marketing de contenidos
    description: |
      Planificación editorial, producción y distribución de contenidos.
  BC-400.70.10:
    name: Planificación editorial
    description: |
      Calendario editorial, temáticas y estrategia de contenidos.
  BC-400.70.20:
    name: Producción de contenidos
    description: |
      Producción de artículos, vídeos, podcasts y activos multimedia.
  BC-400.70.30:
    name: Gestión de activos digitales
    description: |
      Almacenamiento, etiquetado y reutilización de activos de marketing digital.
  BC-400.70.40:
    name: Distribución y sindicación de contenidos
    description: |
      Distribución de contenidos a través de canales propios, ganados y de pago.

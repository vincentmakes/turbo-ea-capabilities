locale: es
source: L1-real-estate-asset-management.yaml
entries:
  BC-4920:
    name: Gestión de activos inmobiliarios
    description: |
      Custodia del activo inmobiliario en explotación durante el período de tenencia — ejecución del plan de negocio, seguimiento del desempeño, priorización del capex, reposicionamiento, hoja de ruta de sostenibilidad, riesgo del activo y optimización del impuesto sobre bienes inmuebles y los gastos operativos. Conecta la visión del inversor (BC-4910) con las operaciones de administración de propiedades (BC-4940).
    in_scope:
      - Plan de negocio por activo y decisiones de mantener o vender
      - Seguimiento del desempeño financiero, de arrendamiento y operativo del activo
      - Planificación, priorización y supervisión de la ejecución del programa de capex
      - Ejecución del reposicionamiento, la reconversión y la creación de valor
      - Hoja de ruta de descarbonización y certificación ESG del activo
      - Seguimiento del riesgo del activo (físico, climático, de mercado, crediticio del inquilino)
      - Recursos por impuesto sobre bienes inmuebles, revisión de gastos operativos y auditoría de recuperación de CAM
    out_of_scope:
      - Construcción de cartera de fondo/inversor (BC-4910)
      - Operaciones diarias de la propiedad y órdenes de trabajo (BC-4940)
      - Transacciones de adquisición o disposición (BC-4930)
      - Abstracting de arrendamientos e indexación de rentas (BC-4950)
  BC-4920.10:
    name: Gestión del plan de negocio del activo
    description: |
      Definición y actualización de los planes de negocio por activo alineados con el mandato del fondo, el horizonte de tenencia y la tesis de creación de valor.
  BC-4920.10.10:
    name: Definición del plan de negocio del activo
    description: |
      Definición de los planes de negocio por activo, cubriendo la tesis, los impulsores de valor y el horizonte de tenencia.
  BC-4920.10.20:
    name: Análisis de mantener o vender
    description: |
      Análisis de la rentabilidad de mantener frente a vender y recomendación al comité de inversiones.
  BC-4920.10.30:
    name: Actualización anual del plan
    description: |
      Actualización anual de los planes de negocio del activo frente a los resultados reales y las perspectivas de mercado revisadas.
  BC-4920.20:
    name: Seguimiento del desempeño del activo
    description: |
      Seguimiento del desempeño financiero, de arrendamiento y operativo a nivel de activo frente al plan de negocio.
  BC-4920.20.10:
    name: Seguimiento del desempeño financiero del activo
    description: |
      Seguimiento del NOI, el flujo de caja y la rentabilidad frente al presupuesto y el plan de negocio.
  BC-4920.20.20:
    name: Seguimiento del desempeño de arrendamiento y ocupación
    description: |
      Seguimiento de la ocupación, el porcentaje arrendado, el plazo medio ponderado del arrendamiento y la renta frente al mercado.
  BC-4920.20.30:
    name: Seguimiento de KPIs operativos
    description: |
      Seguimiento de los KPIs operativos que cubren disponibilidad, incidencias, intensidad energética y afluencia.
  BC-4920.20.40:
    name: Análisis de desviaciones y revisión de previsiones
    description: |
      Análisis de las desviaciones de los resultados reales frente al plan y revisión de las previsiones y supuestos de salida.
  BC-4920.30:
    name: Gestión del programa de inversiones de capital
    description: |
      Planificación, priorización y supervisión de la ejecución de los programas de capex de activos y cartera.
  BC-4920.30.10:
    name: Planificación del programa de capex
    description: |
      Planificación plurianual del programa de capex por activo y cartera.
  BC-4920.30.20:
    name: Priorización y aprobación del capex
    description: |
      Priorización y aprobación de proyectos de capex conforme a criterios de ROI y riesgo.
  BC-4920.30.30:
    name: Supervisión de la ejecución del capex
    description: |
      Supervisión de la ejecución de proyectos de capex, incluyendo disposiciones de fondos y cumplimiento de hitos.
  BC-4920.30.40:
    name: Conciliación del desempeño del capex
    description: |
      Conciliación del desempeño del capex frente a la mejora del valor y del NOI prevista en el análisis previo.
  BC-4920.40:
    name: Gestión del reposicionamiento y la creación de valor
    description: |
      Definición y ejecución de estrategias de reposicionamiento, reconversión y mezcla de inquilinos que cambian el uso o el perfil de ingresos de un activo.
  BC-4920.40.10:
    name: Definición de la estrategia de reposicionamiento
    description: |
      Definición de la estrategia de reposicionamiento, incluyendo el mercado objetivo y la propuesta de valor.
  BC-4920.40.20:
    name: Programas de reconversión y cambio de uso
    description: |
      Programas de reconversión de activos entre usos (oficinas a residencial, comercial a uso mixto).
  BC-4920.40.30:
    name: Estrategia de mezcla de inquilinos y comercialización
    description: |
      Definición y ejecución de la estrategia de mezcla de inquilinos y comercialización para activos comerciales y de uso mixto.
  BC-4920.50:
    name: Gestión de sostenibilidad y ESG del activo
    description: |
      Hoja de ruta de descarbonización del activo, gestión de la intensidad energética, certificaciones y envío a GRESB.
  BC-4920.50.10:
    name: Hoja de ruta de descarbonización del activo
    description: |
      Definición de la hoja de ruta de descarbonización del activo alineada con CRREM y la guía de edificios de SBTi.
  BC-4920.50.20:
    name: Gestión de la intensidad energética e hídrica
    description: |
      Gestión de la intensidad energética e hídrica del activo frente a los objetivos establecidos.
  BC-4920.50.30:
    name: Certificación ESG del activo (LEED / BREEAM / WELL)
    description: |
      Obtención y mantenimiento de certificaciones del activo, incluyendo LEED, BREEAM, WELL y Fitwel.
  BC-4920.50.40:
    name: Envío del activo a GRESB
    description: |
      Preparación y envío de los datos del activo a la evaluación GRESB.
  BC-4920.60:
    name: Gestión de riesgos del activo
    description: |
      Seguimiento a nivel de activo de los riesgos físicos, climáticos, de mercado y de crédito del inquilino, así como de la suficiencia del seguro.
  BC-4920.60.10:
    name: Evaluación del riesgo físico y climático
    description: |
      Evaluación de los riesgos físicos y climáticos del activo, incluyendo exposición a inundaciones, incendios forestales y calor.
  BC-4920.60.20:
    name: Seguimiento del riesgo crediticio del inquilino
    description: |
      Seguimiento del crédito del inquilino y del riesgo de cobro de rentas por activo y cartera.
  BC-4920.60.30:
    name: Seguimiento del riesgo de mercado
    description: |
      Seguimiento de los impulsores de riesgo de mercado, incluyendo variaciones de tasas de capitalización, cartera de nueva oferta y tendencias de rentas.
  BC-4920.60.40:
    name: Revisión de la suficiencia del seguro
    description: |
      Revisión periódica de la suficiencia del seguro de inmueble y responsabilidad frente al valor y la exposición del activo.
  BC-4920.70:
    name: Optimización del impuesto sobre bienes inmuebles y gastos operativos
    description: |
      Gestión de las valoraciones del impuesto sobre bienes inmuebles, revisión de gastos operativos, auditorías de recuperación de CAM y optimización de tarifas de suministros específica para activos inmobiliarios.
  BC-4920.70.10:
    name: Valoración y recurso del impuesto sobre bienes inmuebles
    description: |
      Revisión y recurso de las valoraciones del impuesto sobre bienes inmuebles frente a evidencia comparable.
  BC-4920.70.20:
    name: Revisión de gastos operativos
    description: |
      Revisión periódica de los gastos operativos para benchmarking e identificación de oportunidades de ahorro.
  BC-4920.70.30:
    name: Auditoría de recuperación de CAM
    description: |
      Auditoría de la recuperación de CAM y gastos de servicio de los inquilinos frente a los derechos del contrato de arrendamiento.
  BC-4920.70.40:
    name: Optimización de tarifas de suministros
    description: |
      Optimización de la contratación de suministros, tarifas y cargos por demanda en la cartera.

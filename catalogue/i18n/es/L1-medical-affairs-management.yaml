locale: es
source: L1-medical-affairs-management.yaml
entries:
  BC-1580:
    name: Gestión de asuntos médicos
    description: |
      Gestiona el intercambio científico con profesionales sanitarios (HCP) y líderes de opinión (KOL), las comunicaciones médicas, la información médica y las operaciones del equipo MSL.
  BC-1580.10:
    name: Gestión de la estrategia médica
    description: |
      Define la plataforma científica, el plan de generación de evidencia y el plan del ciclo de vida médico por activo.
  BC-1580.10.10:
    name: Definición de la plataforma científica
    description: |
      Definición de la plataforma científica y los mensajes clave del producto.
  BC-1580.10.20:
    name: Planificación de la generación de evidencia
    description: |
      Planificación de la generación de evidencia, incluidos estudios IIS y RWE.
  BC-1580.10.30:
    name: Planificación médica del ciclo de vida
    description: |
      Plan médico del ciclo de vida por activo terapéutico.
  BC-1580.20:
    name: Gestión del relacionamiento con KOL y HCP
    description: |
      Identifica, perfila y gestiona las relaciones con líderes de opinión clave y profesionales sanitarios relevantes.
  BC-1580.20.10:
    name: Mapeo y perfil de KOL
    description: |
      Identificación y elaboración del perfil de los líderes de opinión clave.
  BC-1580.20.20:
    name: Gestión de comités asesores de HCP
    description: |
      Planificación y celebración de comités asesores de profesionales sanitarios.
  BC-1580.20.30:
    name: Seguimiento del relacionamiento científico
    description: |
      Seguimiento de los relacionamientos e interacciones científicas con HCP.
  BC-1580.30:
    name: Gestión de la información médica
    description: |
      Gestiona la recepción de solicitudes de información médica y genera respuestas estandarizadas y personalizadas para los profesionales sanitarios.
  BC-1580.30.10:
    name: Recepción de solicitudes de información médica
    description: |
      Recepción multicanal de solicitudes de información médica.
  BC-1580.30.20:
    name: Biblioteca de documentos de respuesta estándar
    description: |
      Mantenimiento de la biblioteca de documentos de respuesta estándar.
  BC-1580.30.30:
    name: Generación de respuestas médicas personalizadas
    description: |
      Elaboración de respuestas personalizadas a las consultas médicas.
  BC-1580.40:
    name: Gestión de comunicaciones médicas
    description: |
      Planifica publicaciones, gestiona la estrategia de congresos y produce comunicaciones científicas conforme a GPP3 e ICMJE.
  BC-1580.40.10:
    name: Planificación de publicaciones
    description: |
      Planificación de publicaciones alineada con GPP3 e ICMJE.
  BC-1580.40.20:
    name: Producción de manuscritos científicos
    description: |
      Redacción y presentación de manuscritos científicos a revistas especializadas.
  BC-1580.40.30:
    name: Gestión de congresos y simposios
    description: |
      Estrategia de congresos, resúmenes y gestión de simposios.
  BC-1580.50:
    name: Gestión de estudios iniciados por investigador
    description: |
      Gestiona el programa de estudios iniciados por investigador (IIS), desde la revisión de propuestas hasta la financiación y el seguimiento.
  BC-1580.50.10:
    name: Gobernanza del programa IIS
    description: |
      Gobernanza del programa de estudios iniciados por investigador.
  BC-1580.50.20:
    name: Revisión de propuestas IIS
    description: |
      Revisión y toma de decisiones sobre las propuestas IIS recibidas.
  BC-1580.50.30:
    name: Financiación y apoyo a IIS
    description: |
      Financiación y apoyo a los investigadores que ejecutan estudios IIS.
  BC-1580.60:
    name: Gestión de la educación médica
    description: |
      Gestiona las becas para educación médica independiente y los programas de formación médica para profesionales sanitarios.
  BC-1580.60.10:
    name: Becas para educación médica independiente
    description: |
      Concesión de becas para actividades de educación médica independiente.
  BC-1580.60.20:
    name: Educación médica promocional
    description: |
      Programas de educación médica de carácter promocional.
  BC-1580.60.30:
    name: Desarrollo de contenidos educativos
    description: |
      Desarrollo de contenidos educativos acreditados para profesionales sanitarios.
  BC-1580.70:
    name: Gestión de las operaciones de los delegados de ciencias médicas
    description: |
      Gestiona las operaciones de campo del equipo MSL, incluyendo la planificación territorial, la actividad y el seguimiento del rendimiento.
  BC-1580.70.10:
    name: Territorio y objetivos del MSL
    description: |
      Diseño del territorio del MSL y segmentación de KOL objetivo.
  BC-1580.70.20:
    name: Planificación de actividades del MSL
    description: |
      Planificación de las actividades y visitas del MSL.
  BC-1580.70.30:
    name: Seguimiento del rendimiento del MSL
    description: |
      Rendimiento del MSL, captura de insights y generación de informes.

locale: es
source: L1-healthcare-revenue-cycle-management.yaml
entries:
  BC-2870:
    name: Gestión del ciclo de ingresos en salud
    description: |
      Captura de cargos y gestión del listado de precios, codificación médica, producción y envío de reclamaciones,
      gestión de denegaciones y apelaciones, registro de cobros, servicios financieros al paciente
      y gestión de contratos con pagadores para organizaciones proveedoras.
  BC-2870.10:
    name: Captura de cargos y gestión del listado de precios
    description: |
      Captura de cargos clínicos y administración del listado de precios en todas las líneas de servicio.
  BC-2870.10.10:
    name: Captura de cargos
    description: |
      Captura de cargos a partir de la documentación clínica y los sistemas auxiliares.
  BC-2870.10.20:
    name: Mantenimiento del listado de precios
    description: |
      Mantenimiento de los ítems, códigos y precios del listado de precios.
  BC-2870.10.30:
    name: Conciliación de cargos
    description: |
      Conciliación de los cargos esperados frente a los capturados por área de servicio.
  BC-2870.10.40:
    name: Auditoría de cargos
    description: |
      Auditoría interna y externa de la exactitud e integridad de los cargos.
  BC-2870.20:
    name: Gestión de la codificación médica
    description: |
      Producción de codificación para hospitalización, ambulatorio y honorarios profesionales,
      y auditoría de cumplimiento.
  BC-2870.20.10:
    name: Codificación hospitalaria
    description: |
      Codificación de episodios hospitalarios mediante la metodología de grupos relacionados por el diagnóstico.
  BC-2870.20.20:
    name: Codificación ambulatoria
    description: |
      Codificación de encuentros ambulatorios mediante la metodología de clasificación por grupos de pago ambulatorio.
  BC-2870.20.30:
    name: Codificación de honorarios profesionales
    description: |
      Codificación de servicios de honorarios profesionales mediante códigos de procedimientos y de evaluación y gestión.
  BC-2870.20.40:
    name: Auditoría y cumplimiento de la codificación
    description: |
      Programas de auditoría, cumplimiento y formación en codificación.
  BC-2870.30:
    name: Producción y envío de reclamaciones
    description: |
      Producción, revisión, envío y seguimiento del estado de las reclamaciones a los pagadores.
  BC-2870.30.10:
    name: Edición y revisión de reclamaciones
    description: |
      Aplicación de ediciones previas al envío y reglas de revisión de reclamaciones.
  BC-2870.30.20:
    name: Envío de reclamaciones
    description: |
      Envío electrónico de reclamaciones a pagadores y centros de compensación.
  BC-2870.30.30:
    name: Consulta del estado de las reclamaciones
    description: |
      Consulta electrónica y manual del estado de las reclamaciones y seguimiento posterior.
  BC-2870.30.40:
    name: Secuenciación de coordinación de prestaciones
    description: |
      Secuenciación de reclamaciones primarias, secundarias y terciarias entre pagadores.
  BC-2870.40:
    name: Gestión de denegaciones y apelaciones
    description: |
      Clasificación, apelación y prevención de denegaciones e infracompensaciones de los pagadores.
  BC-2870.40.10:
    name: Clasificación de denegaciones
    description: |
      Clasificación y enrutamiento de reclamaciones denegadas por motivo y probabilidad de recuperación.
  BC-2870.40.20:
    name: Elaboración y envío de apelaciones
    description: |
      Elaboración y envío de apelaciones clínicas y técnicas.
  BC-2870.40.30:
    name: Análisis de infracompensaciones
    description: |
      Identificación y recuperación de infracompensaciones del pagador respecto a las tarifas pactadas.
  BC-2870.40.40:
    name: Análisis preventivo de denegaciones
    description: |
      Análisis de causa raíz para prevenir denegaciones recurrentes.
  BC-2870.50:
    name: Registro de cobros y conciliación con pagadores
    description: |
      Registro de remesas de pagadores y pagos de pacientes, y conciliación
      frente al reembolso esperado.
  BC-2870.50.10:
    name: Registro de remesas
    description: |
      Registro y conciliación de avisos de remesa electrónica.
  BC-2870.50.20:
    name: Registro de pagos de pacientes
    description: |
      Registro de pagos de pacientes a través de múltiples canales.
  BC-2870.50.30:
    name: Aplicación de ajustes contractuales
    description: |
      Aplicación de ajustes contractuales basados en los acuerdos con los pagadores.
  BC-2870.50.40:
    name: Resolución de cobros no aplicados
    description: |
      Resolución y aplicación de cobros no identificados y no aplicados.
  BC-2870.60:
    name: Servicios financieros al paciente
    description: |
      Facturación, cobros, planes de pago y cesión de cuentas morosas al paciente.
  BC-2870.60.10:
    name: Generación de estados de cuenta del paciente
    description: |
      Generación de estados de cuenta del paciente en canales físicos y digitales.
  BC-2870.60.20:
    name: Cobros al paciente
    description: |
      Operaciones y gestión de cobros a pacientes de pago directo.
  BC-2870.60.30:
    name: Gestión de planes de pago
    description: |
      Configuración y gestión de planes de pago del paciente.
  BC-2870.60.40:
    name: Cesión de cuentas morosas
    description: |
      Cesión y gestión de cuentas con agencias de cobros externas.
  BC-2870.70:
    name: Gestión de contratos con pagadores
    description: |
      Modelización, apoyo a la negociación, análisis de variaciones y seguimiento del rendimiento
      de los contratos con pagadores.
  BC-2870.70.10:
    name: Modelización de contratos
    description: |
      Modelización de las condiciones contractuales y metodologías de reembolso de los pagadores.
  BC-2870.70.20:
    name: Análisis de variaciones en el reembolso
    description: |
      Análisis de variaciones entre el reembolso pactado y el reembolso real.
  BC-2870.70.30:
    name: Apoyo a la negociación de contratos
    description: |
      Apoyo analítico y operativo para la negociación de contratos con pagadores.
  BC-2870.70.40:
    name: Seguimiento del rendimiento del pagador
    description: |
      Seguimiento continuo del rendimiento del pagador respecto a los SLA contractuales.

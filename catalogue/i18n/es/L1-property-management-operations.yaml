locale: es
source: L1-property-management-operations.yaml
entries:
  BC-4940:
    name: Operaciones de administración de propiedades
    description: |
      Operación de edificios comerciales, comerciales y residenciales multifamiliares desde el lado del propietario y el administrador — servicios del edificio, gestión de proveedores y contratos, órdenes de trabajo, servicios al inquilino durante la ocupación, seguridad y seguridad vital, energía/sostenibilidad y contabilidad inmobiliaria incluida la conciliación de CAM. Distinta de las operaciones hoteleras (BC-4060) e instalaciones corporativas del ocupante (BC-700).
    in_scope:
      - Operaciones diarias del edificio, incluyendo BMS y zonas comunes
      - Mantenimiento preventivo, reactivo y normativo
      - Gestión de proveedores y contratos de servicios (limpieza, seguridad, jardinería)
      - Coordinación de mudanzas de entrada/salida de inquilinos y adecuaciones
      - Seguridad del inmueble, protección contra incendios/seguridad vital y respuesta a incidentes
      - Energía, agua, residuos y ambiente interior del inmueble
      - Contabilidad inmobiliaria, facturación a inquilinos e informes operativos
      - Conciliación de CAM y gastos de servicio
    out_of_scope:
      - Operaciones de hoteles y complejos turísticos (BC-4060)
      - Instalaciones corporativas del ocupante para uso propio (BC-700)
      - Planes de negocio de activos en explotación y estrategia de capex (BC-4920)
      - Adquisición de inquilinos y formalización de arrendamientos (BC-4950)
  BC-4940.10:
    name: Gestión de operaciones del edificio
    description: |
      Operación diaria de los servicios del edificio, los sistemas de gestión del edificio, las zonas comunes, la recepción y los horarios de funcionamiento en activos comerciales, de retail y multifamiliares.
  BC-4940.10.10:
    name: Operaciones de zonas comunes
    description: |
      Operación de zonas comunes, incluyendo vestíbulos, pasillos y servicios compartidos.
  BC-4940.10.20:
    name: Operaciones del sistema de gestión del edificio
    description: |
      Operación de los sistemas de gestión del edificio, incluyendo climatización, iluminación y controles de acceso.
  BC-4940.10.30:
    name: Recepción y operaciones de acceso al inmueble
    description: |
      Recepción, conserjería y operaciones de acceso para inquilinos y visitantes en el inmueble.
  BC-4940.10.40:
    name: Gestión de horarios de funcionamiento
    description: |
      Gestión de los horarios de funcionamiento, solicitudes fuera de horario y calendarios festivos.
  BC-4940.20:
    name: Mantenimiento y gestión de órdenes de trabajo
    description: |
      Mantenimiento preventivo, reactivo y normativo de los sistemas del edificio y los activos orientados al inquilino mediante flujos de trabajo de órdenes de trabajo.
  BC-4940.20.10:
    name: Operaciones de mantenimiento preventivo
    description: |
      Ejecución del mantenimiento preventivo conforme al calendario y a los datos de estado de los activos.
  BC-4940.20.20:
    name: Mantenimiento reactivo y órdenes de trabajo
    description: |
      Atención del mantenimiento reactivo generado por solicitudes de inquilinos y hallazgos de inspección.
  BC-4940.20.30:
    name: Inspecciones normativas y de cumplimiento
    description: |
      Inspecciones normativas y de cumplimiento que cubren ascensores, sistemas de incendios, gas y sistemas de presión.
  BC-4940.20.40:
    name: Informes de mantenimiento
    description: |
      Reporte de la actividad de mantenimiento, el backlog y el desempeño de los SLA a propietarios e inquilinos.
  BC-4940.30:
    name: Gestión de proveedores y contratos de servicios del inmueble
    description: |
      Incorporación y gestión de los proveedores y contratos de servicios a nivel de inmueble para limpieza, seguridad, jardinería y suministro de servicios públicos.
  BC-4940.30.10:
    name: Incorporación de contratos de servicio
    description: |
      Incorporación de contratos de servicio y proveedores a nivel de inmueble.
  BC-4940.30.20:
    name: Gestión del desempeño de proveedores
    description: |
      Gestión del desempeño de los proveedores del inmueble frente a los SLA y KPIs.
  BC-4940.30.30:
    name: Definición de especificaciones de servicio y SLA
    description: |
      Definición de especificaciones de servicio, alcances y SLA para los servicios contratados del inmueble.
  BC-4940.40:
    name: Servicios al inquilino y coordinación de mudanzas
    description: |
      Coordinación de la incorporación de inquilinos, mudanzas de entrada/salida, adecuaciones y gestión continua de las solicitudes de servicio en el inmueble.
  BC-4940.40.10:
    name: Coordinación de la mudanza de entrada del inquilino
    description: |
      Coordinación de la mudanza de entrada del inquilino, incluyendo acceso, señalización y orientación.
  BC-4940.40.20:
    name: Coordinación de adecuaciones del inquilino
    description: |
      Coordinación de las obras de adecuación del inquilino, el acceso de contratistas y las aprobaciones del arrendador.
  BC-4940.40.30:
    name: Mudanza de salida del inquilino y restitución
    description: |
      Coordinación de la mudanza de salida del inquilino y la restitución de los espacios arrendados.
  BC-4940.40.40:
    name: Atención de solicitudes de servicio del inquilino
    description: |
      Atención de las solicitudes de servicio del inquilino durante la ocupación a través de los distintos canales.
  BC-4940.50:
    name: Operaciones de seguridad e higiene y seguridad vital del inmueble
    description: |
      Operaciones de vigilancia, sistemas de incendios y seguridad vital, respuesta a incidentes y evacuación de emergencia en el inmueble.
  BC-4940.50.10:
    name: Operaciones de vigilancia del inmueble
    description: |
      Operación de CCTV y vigilancia en zonas comunes y de servicio.
  BC-4940.50.20:
    name: Operaciones de sistemas de incendios y seguridad vital
    description: |
      Operación de sistemas de detección y extinción de incendios y de seguridad vital, incluyendo simulacros.
  BC-4940.50.30:
    name: Respuesta a incidentes en el inmueble
    description: |
      Respuesta a incidentes en el inmueble relacionados con seguridad, robos y eventos de seguridad.
  BC-4940.50.40:
    name: Operaciones de evacuación de emergencia
    description: |
      Ejecución de planes de evacuación de emergencia y mando de incidentes en el inmueble.
  BC-4940.60:
    name: Operaciones de energía y sostenibilidad del inmueble
    description: |
      Operación de energía, agua, residuos, ambiente interior y programas de subcontadores para inquilinos a nivel de inmueble.
  BC-4940.60.10:
    name: Operaciones energéticas del inmueble
    description: |
      Operación de los sistemas energéticos del inmueble y seguimiento del consumo frente a los objetivos.
  BC-4940.60.20:
    name: Operaciones de agua y residuos
    description: |
      Operación de los programas de agua, aguas residuales y segregación de residuos del inmueble.
  BC-4940.60.30:
    name: Operaciones de calidad del ambiente interior
    description: |
      Operación de los programas de calidad del aire interior, iluminación y confort acústico.
  BC-4940.60.40:
    name: Subcontadores y asignación a inquilinos
    description: |
      Operación de subcontadores y asignación del consumo de suministros a los inquilinos.
  BC-4940.70:
    name: Contabilidad inmobiliaria e informes operativos
    description: |
      Libro mayor a nivel de inmueble, facturación y cuentas a cobrar de inquilinos, cuentas a pagar e informes al propietario.
  BC-4940.70.10:
    name: Operaciones del libro mayor del inmueble
    description: |
      Operación del libro mayor y el balance de sumas y saldos a nivel de inmueble.
  BC-4940.70.20:
    name: Facturación y cuentas a cobrar de inquilinos
    description: |
      Facturación de rentas, recuperaciones y cargos accesorios y cobro de las cuentas a cobrar.
  BC-4940.70.30:
    name: Operaciones de cuentas a pagar del inmueble
    description: |
      Cuentas a pagar a nivel de inmueble para suministros, proveedores y contratistas.
  BC-4940.70.40:
    name: Informe de gestión para el propietario
    description: |
      Paquetes periódicos de informes de gestión al propietario que cubren el desempeño operativo y las desviaciones.
  BC-4940.80:
    name: Conciliación del mantenimiento de zonas comunes
    description: |
      Ciclo contable específico entre arrendador e inquilinos que cubre la presupuestación, captura, conciliación y respuesta a auditorías de CAM y gastos de servicio.
  BC-4940.80.10:
    name: Presupuestación y estimación del CAM
    description: |
      Elaboración de los presupuestos de CAM y gastos de servicio y las estimaciones para los inquilinos para el ejercicio.
  BC-4940.80.20:
    name: Captura de gastos reales del CAM
    description: |
      Captura de los gastos reales reembolsables incluidos en el ámbito del CAM y las categorías de gastos de servicio.
  BC-4940.80.30:
    name: Conciliación y liquidación del CAM
    description: |
      Conciliación de los gastos reales del CAM frente a las estimaciones y liquidación de los ajustes con los inquilinos.
  BC-4940.80.40:
    name: Respuesta a las auditorías de CAM de los inquilinos
    description: |
      Respuesta a las solicitudes de auditoría e inspección de los inquilinos sobre los derechos de CAM y gastos de servicio.

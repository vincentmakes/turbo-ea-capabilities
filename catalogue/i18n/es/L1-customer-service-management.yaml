locale: es
source: L1-customer-service-management.yaml
entries:
  BC-430:
    name: Gestión del servicio al cliente
    description: |
      Consultas, reclamaciones, soporte y operaciones del centro de contacto.
  BC-430.10:
    name: Gestión de consultas de clientes
    description: |
      Gestión de contactos entrantes, enrutamiento y resolución de consultas.
  BC-430.10.10:
    name: Recepción y enrutamiento de consultas
    description: |
      Recepción multicanal, clasificación y enrutamiento de consultas de clientes.
  BC-430.10.20:
    name: Gestión de casos
    description: |
      Creación, asignación y seguimiento de la resolución de casos de clientes.
  BC-430.10.30:
    name: Cumplimiento de solicitudes de servicio
    description: |
      Atención de solicitudes de servicio estándar y cambios en cuentas de clientes.
  BC-430.10.40:
    name: Gestión de escaladas
    description: |
      Rutas de escalada, reglas de severidad y gestión de casos escalados.
  BC-430.20:
    name: Gestión de reclamaciones e incidencias
    description: |
      Captura de reclamaciones, análisis de causa raíz y resolución.
  BC-430.20.10:
    name: Captura y acuse de recibo de reclamaciones
    description: |
      Registro, acuse de recibo y triaje de reclamaciones de clientes.
  BC-430.20.20:
    name: Investigación y resolución de reclamaciones
    description: |
      Investigación, compensación y resolución de las reclamaciones de clientes.
  BC-430.20.30:
    name: Análisis de causa raíz
    description: |
      Análisis de causa raíz e identificación de tendencias en las reclamaciones recibidas.
  BC-430.20.40:
    name: Informes regulatorios de reclamaciones
    description: |
      Informes regulatorios de reclamaciones y gestión de casos ante el defensor del cliente.
  BC-430.30:
    name: Gestión de operaciones del centro de contacto
    description: |
      Funcionamiento del centro de contacto, gestión de la fuerza laboral y telefonía.
  BC-430.30.10:
    name: Gestión de la fuerza laboral del centro de contacto
    description: |
      Previsión, planificación y control de adherencia en las operaciones del centro de contacto.
  BC-430.30.20:
    name: Enrutamiento de contactos e IVR
    description: |
      Diseño del IVR, enrutamiento por habilidades y orquestación de canales de atención.
  BC-430.30.30:
    name: Monitoreo de calidad y coaching
    description: |
      Monitoreo de la calidad de las llamadas, puntuación y coaching de agentes.
  BC-430.30.40:
    name: Informes de rendimiento del centro de contacto
    description: |
      Informes de nivel de servicio, AHT, FCR y rendimiento operacional del centro de contacto.
  BC-430.40:
    name: Gestión del autoservicio
    description: |
      Preguntas frecuentes, base de conocimiento, chatbots y portales de autoservicio.
  BC-430.40.10:
    name: Gestión de la base de conocimiento
    description: |
      Creación y mantenimiento de contenidos de conocimiento orientados al cliente.
  BC-430.40.20:
    name: Gestión del portal de autoservicio
    description: |
      Portales de autoservicio para clientes y funcionalidades de gestión de cuentas.
  BC-430.40.30:
    name: Gestión de la IA conversacional
    description: |
      Diseño, entrenamiento y operación de chatbots y voicebots de atención al cliente.
  BC-430.40.40:
    name: Gestión del soporte comunitario
    description: |
      Moderación de comunidades de usuarios y soporte entre pares (peer-to-peer).
  BC-430.50:
    name: Gestión de la retroalimentación de clientes
    description: |
      Encuestas, NPS y programas de voz del cliente.
  BC-430.50.10:
    name: Programa de voz del cliente
    description: |
      Programa estructurado de voz del cliente a lo largo de todos los puntos de contacto.
  BC-430.50.20:
    name: Gestión de encuestas a clientes
    description: |
      Diseño, distribución y análisis de encuestas NPS, CSAT y CES.
  BC-430.50.30:
    name: Retroalimentación de ciclo cerrado
    description: |
      Seguimiento de ciclo cerrado sobre la retroalimentación de detractores y acciones de recuperación.
  BC-430.50.40:
    name: Informes de insights de clientes
    description: |
      Comunicación de insights de clientes a equipos de producto, operaciones y dirección.

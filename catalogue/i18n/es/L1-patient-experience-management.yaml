locale: es
source: L1-patient-experience-management.yaml
entries:
  BC-2910:
    name: Gestión de la experiencia del paciente
    description: |
      Participación del paciente, servicios digitales, medición de la satisfacción, defensa del paciente
      y quejas, derechos del paciente y ética, y servicios de voluntariado y auxiliares
      a lo largo del continuo asistencial.
  BC-2910.10:
    name: Participación y comunicación con el paciente
    description: |
      Comunicación multicanal con pacientes y familiares, incluyendo educación y servicios de interpretación.
  BC-2910.10.10:
    name: Comunicación multicanal con el paciente
    description: |
      Comunicación coordinada con el paciente por teléfono, mensajería segura, correo y canales digitales.
  BC-2910.10.20:
    name: Prestación de educación sanitaria
    description: |
      Prestación de educación sobre enfermedades, tratamientos y prevención a los pacientes.
  BC-2910.10.30:
    name: Comunicación con familiares y cuidadores
    description: |
      Comunicación con familiares y cuidadores autorizados durante los episodios asistenciales.
  BC-2910.10.40:
    name: Servicios de interpretación y traducción
    description: |
      Provisión de servicios de interpretación lingüística y traducción.
  BC-2910.20:
    name: Portal del paciente y servicios digitales
    description: |
      Operación de los servicios digitales orientados al paciente, incluyendo portales,
      aplicaciones móviles y herramientas de autoservicio.
  BC-2910.20.10:
    name: Operaciones del portal del paciente
    description: |
      Operación de los servicios del portal del paciente, incluyendo mensajería y acceso a registros.
  BC-2910.20.20:
    name: Operaciones de aplicaciones móviles de salud
    description: |
      Operación de aplicaciones móviles de salud orientadas al paciente.
  BC-2910.20.30:
    name: Herramientas de autoservicio del paciente
    description: |
      Herramientas de autoservicio para programación, pago y gestión previa a la visita.
  BC-2910.20.40:
    name: Gestión de la identidad digital del paciente
    description: |
      Gestión de la identidad digital, autenticación y acceso por representación del paciente.
  BC-2910.30:
    name: Medición de la satisfacción del paciente
    description: |
      Medición de la satisfacción y la experiencia del paciente mediante encuestas y en tiempo real.
  BC-2910.30.10:
    name: Operaciones de encuestas de experiencia hospitalaria
    description: |
      Operación de programas de encuestas de experiencia hospitalaria y análisis de resultados.
  BC-2910.30.20:
    name: Encuestas de experiencia ambulatoria
    description: |
      Operación de programas de encuestas de experiencia ambulatoria y de especialidades.
  BC-2910.30.30:
    name: Captura de retroalimentación en tiempo real
    description: |
      Captura de retroalimentación en tiempo real y en el punto de atención de los pacientes.
  BC-2910.30.40:
    name: Analítica de la experiencia
    description: |
      Analítica sobre los factores de la experiencia, tendencias y oportunidades de mejora.
  BC-2910.40:
    name: Defensa del paciente y quejas
    description: |
      Defensa del paciente, gestión de quejas y reclamaciones, y recuperación del servicio.
  BC-2910.40.10:
    name: Recepción de quejas del paciente
    description: |
      Recepción de quejas de los pacientes a través de múltiples canales.
  BC-2910.40.20:
    name: Investigación de reclamaciones
    description: |
      Investigación formal y resolución de las reclamaciones de los pacientes.
  BC-2910.40.30:
    name: Enlace de defensa del paciente
    description: |
      Servicios de enlace para la defensa del paciente durante los episodios asistenciales.
  BC-2910.40.40:
    name: Recuperación del servicio
    description: |
      Intervenciones de recuperación del servicio ante fallos en la prestación asistencial.
  BC-2910.50:
    name: Derechos del paciente y ética
    description: |
      Supervisión de los derechos del paciente, los procesos de consentimiento informado,
      las directivas anticipadas y la consultoría ética.
  BC-2910.50.10:
    name: Supervisión del proceso de consentimiento informado
    description: |
      Supervisión de los procesos de consentimiento informado para el tratamiento y la investigación.
  BC-2910.50.20:
    name: Gestión de directivas anticipadas
    description: |
      Captura, almacenamiento y presentación de directivas anticipadas y objetivos del cuidado.
  BC-2910.50.30:
    name: Consultoría ética
    description: |
      Servicios de consultoría ética clínica para pacientes, familiares y clínicos.
  BC-2910.50.40:
    name: Educación sobre los derechos del paciente
    description: |
      Educación a los pacientes sobre sus derechos y responsabilidades.
  BC-2910.60:
    name: Servicios de voluntariado y auxiliares
    description: |
      Operación de los programas de voluntariado y auxiliares que apoyan a pacientes y familiares.
  BC-2910.60.10:
    name: Incorporación de voluntarios
    description: |
      Captación, cribado e incorporación de voluntarios.
  BC-2910.60.20:
    name: Prestación de servicios de voluntariado
    description: |
      Coordinación y prestación de servicios de voluntariado en todos los departamentos.
  BC-2910.60.30:
    name: Programas auxiliares
    description: |
      Operación de programas auxiliares, filantrópicos y comunitarios.
  BC-2910.60.40:
    name: Servicios de apoyo al paciente
    description: |
      Servicios de apoyo como navegación del paciente, capellanía y salas para familiares.

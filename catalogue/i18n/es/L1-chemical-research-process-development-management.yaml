locale: es
source: L1-chemical-research-process-development-management.yaml
entries:
  BC-4600:
    name: Gestión de investigación química y desarrollo de procesos
    description: |
      Descubrimiento de nuevas moléculas y rutas de síntesis, desarrollo de procesos a escala de laboratorio, operación de plantas piloto y escalado a producción comercial de productos químicos.
  BC-4600.10:
    name: Descubrimiento de moléculas y rutas de síntesis
    description: |
      Identificación de moléculas objetivo y selección de rutas de síntesis viables para productos químicos nuevos y existentes.
  BC-4600.10.10:
    name: Identificación de moléculas objetivo
    description: |
      Identificación de moléculas candidatas frente a objetivos de aplicación.
  BC-4600.10.20:
    name: Análisis retrosintético
    description: |
      Análisis retrosintético asistido por computadora y por expertos de rutas de síntesis.
  BC-4600.10.30:
    name: Cribado de catalizadores y reactivos
    description: |
      Cribado de alto rendimiento y dirigido de catalizadores y reactivos.
  BC-4600.10.40:
    name: Evaluación de selección de rutas
    description: |
      Evaluación multicriterio de rutas candidatas en función del rendimiento, coste, seguridad y sostenibilidad.
  BC-4600.20:
    name: Investigación de cinética y termodinámica de reacciones
    description: |
      Generación de datos cinéticos y termodinámicos necesarios para modelar y diseñar procesos químicos.
  BC-4600.20.10:
    name: Medición de cinética de reacción
    description: |
      Medición de velocidades de reacción y constantes de velocidad en condiciones controladas.
  BC-4600.20.20:
    name: Medición de propiedades termodinámicas
    description: |
      Determinación de entalpía, entropía y capacidad calorífica de reactivos y productos.
  BC-4600.20.30:
    name: Estudios de equilibrio de fases
    description: |
      Experimentación de equilibrios vapor-líquido, líquido-líquido y sólido-líquido.
  BC-4600.20.40:
    name: Desarrollo de modelos cinéticos
    description: |
      Ajuste y validación de modelos cinéticos frente a datos medidos.
  BC-4600.30:
    name: Desarrollo y optimización de procesos
    description: |
      Desarrollo y optimización a escala de laboratorio de ventanas operativas de procesos químicos antes de las pruebas piloto.
  BC-4600.30.10:
    name: Diseño de experimentos a escala de laboratorio
    description: |
      Diseño de experimentos a escala de laboratorio para caracterizar el comportamiento del proceso.
  BC-4600.30.20:
    name: Optimización de parámetros de proceso
    description: |
      Optimización de temperatura, presión, tiempo de residencia y estequiometría.
  BC-4600.30.30:
    name: Mejora de rendimiento y selectividad
    description: |
      Mejora del rendimiento y la selectividad mediante intervenciones de ingeniería de reacción.
  BC-4600.30.40:
    name: Selección del sistema de disolventes
    description: |
      Selección y optimización de sistemas de disolventes equilibrando rendimiento y HSE.
  BC-4600.40:
    name: Gestión de operaciones de planta piloto
    description: |
      Planificación, ejecución y análisis de campañas a escala piloto para reducir el riesgo del escalado comercial.
  BC-4600.40.10:
    name: Planificación de campañas piloto
    description: |
      Planificación de campañas de planta piloto, incluyendo objetivos y balances de materiales.
  BC-4600.40.20:
    name: Ejecución de planta piloto
    description: |
      Ejecución de ensayos piloto en condiciones de proceso representativas.
  BC-4600.40.30:
    name: Análisis de datos piloto
    description: |
      Análisis de datos piloto para refinar modelos cinéticos y de rendimiento.
  BC-4600.40.40:
    name: Gestión de activos de planta piloto
    description: |
      Gestión del ciclo de vida de los equipos e instrumentación de la planta piloto.
  BC-4600.50:
    name: Gestión del escalado de procesos
    description: |
      Traducción de procesos a escala piloto en definiciones de proceso comercial validadas.
  BC-4600.50.10:
    name: Modelado del escalado
    description: |
      Uso de análisis dimensional y CFD para modelar los efectos del escalado.
  BC-4600.50.20:
    name: Validación a escala de demostración
    description: |
      Operación de instalaciones a escala de demostración para validar los supuestos de escalado.
  BC-4600.50.30:
    name: Definición del proceso comercial
    description: |
      Finalización de la base del proceso comercial lista para FEED.
  BC-4600.60:
    name: Cribado de peligros de seguridad de procesos
    description: |
      Cribado en fase temprana de peligros reactivos, térmicos y de polvo durante la investigación y el desarrollo.
  BC-4600.60.10:
    name: Cribado de química reactiva
    description: |
      Cribado de peligros de química reactiva mediante calorimetría DSC, ARC y Calvet.
  BC-4600.60.20:
    name: Ensayos de estabilidad térmica
    description: |
      Determinación de los límites de descomposición térmica y del potencial de reacción desbocada.
  BC-4600.60.30:
    name: Caracterización de peligros de polvo
    description: |
      Caracterización de peligros de polvo combustible, incluyendo Kst y MIE.
  BC-4600.70:
    name: Gestión del conocimiento y datos de I+D
    description: |
      Captura y custodia del conocimiento de I+D, registros de experimentos y activos de datos de proceso.
  BC-4600.70.10:
    name: Gestión de cuadernos de laboratorio electrónicos
    description: |
      Operación de cuadernos de laboratorio electrónicos para I+D química.
  BC-4600.70.20:
    name: Gestión del repositorio de conocimiento de procesos
    description: |
      Curación del conocimiento de procesos a lo largo del descubrimiento, desarrollo y escalado.
  BC-4600.70.30:
    name: Curación de datos de I+D
    description: |
      Curación, retención y reutilización de datos estructurados de experimentos de I+D.

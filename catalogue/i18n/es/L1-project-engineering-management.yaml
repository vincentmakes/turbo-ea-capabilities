locale: es
source: L1-project-engineering-management.yaml
entries:
  BC-1110:
    name: Gestión de ingeniería de proyectos
    description: |
      Ingeniería de proyectos desde el FEED hasta la entrega.
  BC-1110.10:
    name: Gestión de planificación de ingeniería de proyectos
    description: |
      Desglose de trabajo de ingeniería, planes de entregables y cronogramas de ingeniería.
  BC-1110.10.10:
    name: Definición del desglose de trabajo de ingeniería
    description: |
      EDT de ingeniería y desglose por disciplina.
  BC-1110.10.20:
    name: Registro de entregables de ingeniería
    description: |
      Registro de entregables, responsables y fechas objetivo.
  BC-1110.10.30:
    name: Desarrollo del cronograma de ingeniería
    description: |
      Cronograma de ingeniería con interdependencias entre disciplinas.
  BC-1110.10.40:
    name: Carga de recursos de ingeniería
    description: |
      Pronóstico de horas de ingeniería y carga de recursos.
  BC-1110.20:
    name: Gestión de ejecución de ingeniería de proyectos
    description: |
      Supervisión y reporte de la ejecución de ingeniería multidisciplinaria.
  BC-1110.20.10:
    name: Medición del avance de ingeniería
    description: |
      Medición del avance de entregables de ingeniería y valor ganado.
  BC-1110.20.20:
    name: Control de horas-hombre de ingeniería
    description: |
      Seguimiento y pronóstico del consumo de horas-hombre de ingeniería.
  BC-1110.20.30:
    name: Reuniones de coordinación de ingeniería
    description: |
      Coordinación de ingeniería multidisciplinaria y reporte semanal.
  BC-1110.20.40:
    name: Mejora de productividad de ingeniería
    description: |
      Iniciativas de productividad como automatización del diseño y reutilización.
  BC-1110.30:
    name: Gestión de cambios de ingeniería
    description: |
      Solicitudes de cambio, evaluación de impacto técnico y control de línea base.
  BC-1110.30.10:
    name: Captura de solicitudes de cambio de ingeniería
    description: |
      Captura y clasificación de solicitudes de cambio de ingeniería.
  BC-1110.30.20:
    name: Evaluación de impacto técnico
    description: |
      Evaluación de impacto técnico multidisciplinario de los cambios.
  BC-1110.30.30:
    name: Control de línea base de ingeniería
    description: |
      Control de líneas base de ingeniería y elementos de configuración.
  BC-1110.30.40:
    name: Aprobación e implementación de cambios de ingeniería
    description: |
      Comités de aprobación de cambios y seguimiento de su implementación.
  BC-1110.40:
    name: Gestión de interfaces
    description: |
      Interfaces técnicas internas y externas, coordinación con partes interesadas.
  BC-1110.40.10:
    name: Identificación y registro de interfaces
    description: |
      Identificación y registro de interfaces técnicas.
  BC-1110.40.20:
    name: Gestión de acuerdos de interfaz
    description: |
      Acuerdos de interfaz con las partes y criterios de aceptación.
  BC-1110.40.30:
    name: Seguimiento y cierre de interfaces
    description: |
      Seguimiento de entregables de interfaz y cierre formal.
  BC-1110.50:
    name: Gestión de calidad de ingeniería de proyectos
    description: |
      QA/QC de ingeniería, aseguramiento técnico, revisiones por pares y auditorías.
  BC-1110.50.10:
    name: Gestión del programa de QA de ingeniería
    description: |
      Alineación del programa de QA de ingeniería con ISO 9001.
  BC-1110.50.20:
    name: Revisión por pares de disciplina
    description: |
      Revisión por pares de entregables de ingeniería por disciplina.
  BC-1110.50.30:
    name: Auditoría técnica de ingeniería
    description: |
      Auditorías técnicas independientes y revisiones de aseguramiento.
  BC-1110.50.40:
    name: Lecciones aprendidas de ingeniería
    description: |
      Captura y difusión de lecciones aprendidas de ingeniería.
  BC-1110.60:
    name: Gestión de riesgos e incidencias de ingeniería de proyectos
    description: |
      Riesgos técnicos, incidencias técnicas y seguimiento de mitigaciones.
  BC-1110.60.10:
    name: Identificación de riesgos técnicos
    description: |
      Identificación de riesgos técnicos y de ingeniería.
  BC-1110.60.20:
    name: Evaluación de riesgos técnicos
    description: |
      Evaluación de la probabilidad e impacto de los riesgos técnicos.
  BC-1110.60.30:
    name: Resolución de incidencias técnicas
    description: |
      Seguimiento y resolución de incidencias técnicas con responsables asignados.
  BC-1110.60.40:
    name: Seguimiento de mitigaciones técnicas
    description: |
      Seguimiento de acciones de mitigación y riesgo residual.

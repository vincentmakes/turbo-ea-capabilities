locale: es
source: L1-manufacturing-operations-management.yaml
entries:
  BC-1010:
    name: Gestión de operaciones de manufactura
    description: |
      Ejecución en el taller, gestión de órdenes de trabajo y operaciones a nivel MES.
  BC-1010.10:
    name: Gestión de órdenes de trabajo
    description: |
      Creación, liberación, seguimiento y cierre de órdenes de trabajo.
  BC-1010.10.10:
    name: Creación de órdenes de trabajo
    description: |
      Creación de órdenes de trabajo a partir de órdenes de producción y listas de materiales/rutas.
  BC-1010.10.20:
    name: Liberación de órdenes de trabajo
    description: |
      Liberación de órdenes de trabajo al taller con verificación de materiales.
  BC-1010.10.30:
    name: Confirmación de órdenes de trabajo
    description: |
      Confirmación de actividades, cantidades y tiempos contra las órdenes de trabajo.
  BC-1010.10.40:
    name: Cierre de órdenes de trabajo
    description: |
      Cierre final y liquidación de órdenes de trabajo.
  BC-1010.20:
    name: Gestión de ejecución en el taller
    description: |
      Control del taller y ejecución a nivel MES.
  BC-1010.20.10:
    name: Gestión de definición de producción
    description: |
      Definición de producción ISA-95 para productos y procesos.
  BC-1010.20.20:
    name: Gestión de recursos de producción
    description: |
      Gestión de la disponibilidad y capacidad de los recursos de producción.
  BC-1010.20.30:
    name: Coordinación de ejecución de producción
    description: |
      Coordinación en tiempo real de la ejecución en todos los centros de trabajo.
  BC-1010.20.40:
    name: Seguimiento y genealogía de producción
    description: |
      Genealogía de lotes, partidas y números de serie, y registros de fabricación real.
  BC-1010.30:
    name: Gestión de operaciones de máquinas
    description: |
      Configuración, funcionamiento, cambio y monitoreo de máquinas.
  BC-1010.30.10:
    name: Configuración y cambio de máquinas
    description: |
      Configuración de máquinas, cambios basados en SMED y calificación.
  BC-1010.30.20:
    name: Operaciones de funcionamiento de máquinas
    description: |
      Operación de máquinas, control de parámetros y supervisión del proceso.
  BC-1010.30.30:
    name: Monitoreo de máquinas
    description: |
      Monitoreo en tiempo real y seguimiento del estado de las máquinas.
  BC-1010.40:
    name: Gestión de orientación al operador
    description: |
      Instrucciones de trabajo, andon digital y apoyo al operador.
  BC-1010.40.10:
    name: Entrega de instrucciones de trabajo digitales
    description: |
      Entrega de instrucciones de trabajo digitales en el puesto de trabajo.
  BC-1010.40.20:
    name: Gestión de andon y escalaciones
    description: |
      Señales andon, escalaciones y apoyo al operador.
  BC-1010.40.30:
    name: Habilidades y autorización del operador
    description: |
      Certificación y autorización del operador para tareas específicas.
  BC-1010.50:
    name: Gestión de operaciones de manejo de materiales
    description: |
      Movimiento interno de materiales, kitting y abastecimiento de línea.
  BC-1010.50.10:
    name: Reabastecimiento lateral de línea
    description: |
      Reabastecimiento lateral justo a tiempo y rutas de aprovisionamiento.
  BC-1010.50.20:
    name: Kitting de materiales
    description: |
      Preparación de kits y prearmado de componentes para líneas de producción.
  BC-1010.50.30:
    name: Movimiento interno de materiales
    description: |
      Logística interna y transporte entre operaciones.
  BC-1010.60:
    name: Gestión de adquisición de datos de manufactura
    description: |
      Datos de sensores y máquinas, integración OT-IT.
  BC-1010.60.10:
    name: Recolección de datos de máquinas
    description: |
      Recolección de señales de máquinas y datos de proceso.
  BC-1010.60.20:
    name: Integración de sensores e IoT
    description: |
      Integración de sensores y dispositivos IIoT en el taller.
  BC-1010.60.30:
    name: Integración de datos OT-IT
    description: |
      Integración de datos OT con sistemas IT alineada con ISA-95.
  BC-1010.60.40:
    name: Operaciones del historiador de datos de manufactura
    description: |
      Captura y acceso a datos de series temporales mediante historiador.
  BC-1010.70:
    name: Gestión del desempeño de manufactura
    description: |
      Desempeño en tiempo real, análisis de paros y microparos.
  BC-1010.70.10:
    name: Monitoreo de desempeño en tiempo real
    description: |
      Monitoreo en tiempo real de OEE y KPI del taller.
  BC-1010.70.20:
    name: Análisis de microparos
    description: |
      Análisis de microparos y pérdidas recurrentes.
  BC-1010.70.30:
    name: Reporte de traspaso de turno
    description: |
      Reportes estructurados de traspaso de turno y tableros digitales.
  BC-1010.70.40:
    name: Detección de anomalías de producción
    description: |
      Detección de anomalías y alertas sobre datos de producción.

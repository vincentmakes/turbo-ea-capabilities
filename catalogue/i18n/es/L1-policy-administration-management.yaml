locale: es
source: L1-policy-administration-management.yaml
entries:
  BC-2140:
    name: Administración de pólizas
    description: |
      Emisión, endosos, ajustes durante la vigencia, renovaciones, cancelaciones,
      caducidades, rehabilitaciones, gestión documental y administración de pólizas
      de grupo y maestras de contratos de seguro en vigor.
  BC-2140.10:
    name: Gestión de emisión de pólizas
    description: |
      Generación, ensamblaje y activación de nuevos contratos de póliza y documentos de apoyo.
  BC-2140.10.10:
    name: Generación de documentos de póliza
    description: |
      Generación de documentos de póliza a partir de plantillas de producto y términos vinculados.
  BC-2140.10.20:
    name: Ensamblaje de condicionado y carátula de póliza
    description: |
      Ensamblaje de carátulas, condicionados y endosos en el contrato de póliza.
  BC-2140.10.30:
    name: Activación de póliza
    description: |
      Activación de nuevas pólizas y notificación a los sistemas posteriores.
  BC-2140.20:
    name: Gestión de endosos y ajustes durante la vigencia
    description: |
      Captura, tarificación, aprobación y emisión de endosos y ajustes durante la vigencia.
  BC-2140.20.10:
    name: Captura de solicitudes de endoso
    description: |
      Captura de solicitudes de endoso de tomadores y productores.
  BC-2140.20.20:
    name: Tarificación y aprobación de endosos
    description: |
      Tarificación de endosos y aprobación de suscripción cuando sea necesario.
  BC-2140.20.30:
    name: Emisión y comunicación de endosos
    description: |
      Emisión de documentos de endoso y comunicación al tomador.
  BC-2140.30:
    name: Gestión de renovaciones de pólizas
    description: |
      Elegibilidad para la renovación, retarificación, generación de ofertas y gestión de no renovaciones.
  BC-2140.30.10:
    name: Evaluación de elegibilidad para la renovación
    description: |
      Evaluación de la elegibilidad para la renovación en función de la experiencia de siniestros y las reglas de suscripción.
  BC-2140.30.20:
    name: Retarificación de renovaciones
    description: |
      Retarificación de pólizas en renovación bajo los archivos de tarifas y la experiencia actuales.
  BC-2140.30.30:
    name: Generación de ofertas de renovación
    description: |
      Generación y envío de ofertas de renovación a los tomadores.
  BC-2140.30.40:
    name: Gestión de no renovaciones
    description: |
      Gestión de no renovaciones, incluidos los períodos de preaviso y las comunicaciones regulatorias.
  BC-2140.40:
    name: Gestión de cancelaciones y caducidades de pólizas
    description: |
      Procesamiento de cancelaciones, ajuste de primas, caducidad y rehabilitación.
  BC-2140.40.10:
    name: Procesamiento de solicitudes de cancelación
    description: |
      Procesamiento de solicitudes de cancelación de tomadores, productores o la aseguradora.
  BC-2140.40.20:
    name: Cálculo de devolución proporcional y a corto plazo
    description: |
      Cálculo de ajustes de prima proporcionales y a corto plazo en la cancelación.
  BC-2140.40.30:
    name: Gestión de caducidades
    description: |
      Procesamiento de caducidades por impago y notificación al tomador.
  BC-2140.40.40:
    name: Procesamiento de rehabilitaciones
    description: |
      Rehabilitación de pólizas caducadas o canceladas sujeta a comprobaciones de suscripción.
  BC-2140.50:
    name: Gestión de documentos y registros de pólizas
    description: |
      Repositorio de documentos de póliza, retención de registros regulatorios y pistas de auditoría de pólizas.
  BC-2140.50.10:
    name: Repositorio de documentos de póliza
    description: |
      Repositorio de documentos de póliza y correspondencia de apoyo.
  BC-2140.50.20:
    name: Retención regulatoria de registros
    description: |
      Retención de registros de pólizas conforme a los requisitos regulatorios de seguros.
  BC-2140.50.30:
    name: Mantenimiento de la pista de auditoría de pólizas
    description: |
      Mantenimiento de pistas de auditoría inmutables sobre cambios y decisiones de póliza.
  BC-2140.60:
    name: Administración de pólizas de grupo y maestras
    description: |
      Configuración de pólizas de grupo, mantenimiento de certificados y ciclos de renovación de grupo.
  BC-2140.60.10:
    name: Configuración de pólizas de grupo
    description: |
      Configuración de contratos de póliza de grupo y maestra para esquemas de empleadores y de afinidad.
  BC-2140.60.20:
    name: Mantenimiento de miembros y certificados
    description: |
      Mantenimiento de miembros del grupo, certificados y dependientes.
  BC-2140.60.30:
    name: Gestión del ciclo de renovación de grupo
    description: |
      Gestión de ciclos de renovación de grupo, retarificación y reincorporación de miembros.

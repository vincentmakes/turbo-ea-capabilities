locale: es
source: L1-engineering-discipline-management.yaml
entries:
  BC-1100:
    name: Gestión de disciplinas de ingeniería
    description: |
      Grupos de competencias de ingeniería multidisciplinaria: mecánica, eléctrica, civil, proceso, instrumentación y tuberías.
  BC-1100.10:
    name: Gestión de ingeniería mecánica
    description: |
      Experiencia en la disciplina mecánica: equipos, maquinaria rotativa y sistemas mecánicos.
  BC-1100.10.10:
    name: Ingeniería de equipos estáticos
    description: |
      Diseño de recipientes a presión, intercambiadores de calor y otros equipos estáticos.
  BC-1100.10.20:
    name: Ingeniería de equipos rotativos
    description: |
      Ingeniería de bombas, compresores, turbinas y maquinaria rotativa.
  BC-1100.10.30:
    name: Ingeniería de HVAC
    description: |
      Diseño y análisis de sistemas de climatización (HVAC).
  BC-1100.10.40:
    name: Ingeniería de materiales mecánicos y soldadura
    description: |
      Selección de materiales, especificaciones de soldadura y diseño anticorrosión.
  BC-1100.20:
    name: Gestión de ingeniería eléctrica
    description: |
      Energía, distribución eléctrica e ingeniería eléctrica de control.
  BC-1100.20.10:
    name: Ingeniería de sistemas de potencia
    description: |
      Ingeniería de sistemas de potencia en alta y media tensión.
  BC-1100.20.20:
    name: Diseño de distribución eléctrica
    description: |
      Distribución en baja tensión, tableros eléctricos y balances de carga.
  BC-1100.20.30:
    name: Especificación de equipos eléctricos
    description: |
      Especificación de motores, transformadores y equipos eléctricos.
  BC-1100.20.40:
    name: Diseño de puesta a tierra y protección contra rayos
    description: |
      Diseño de puesta a tierra, bonding y protección contra rayos.
  BC-1100.30:
    name: Gestión de ingeniería civil y estructural
    description: |
      Obras civiles, acero estructural, concreto, cimentaciones y geotecnia.
  BC-1100.30.10:
    name: Diseño de estructuras de acero
    description: |
      Diseño de estructuras metálicas y conexiones.
  BC-1100.30.20:
    name: Diseño de concreto y cimentaciones
    description: |
      Diseño de estructuras de concreto, cimentaciones y armado.
  BC-1100.30.30:
    name: Ingeniería geotécnica
    description: |
      Investigación geotécnica e ingeniería de suelos.
  BC-1100.30.40:
    name: Ingeniería de obras civiles en sitio
    description: |
      Diseño de nivelación de terrenos, drenaje e infraestructura civil en sitio.
  BC-1100.40:
    name: Gestión de ingeniería de procesos
    description: |
      Diseño de procesos, simulación, P&ID, balances de masa y energía, hidráulica.
  BC-1100.40.10:
    name: Simulación y modelado de procesos
    description: |
      Simulación de procesos en estado estacionario y dinámico.
  BC-1100.40.20:
    name: Desarrollo de P&ID y PFD
    description: |
      Diagramas de flujo de proceso y diagramas de tuberías e instrumentación.
  BC-1100.40.30:
    name: Ingeniería de balances de masa y energía
    description: |
      Balances de calor y material, y dimensionamiento de equipos de proceso.
  BC-1100.40.40:
    name: Ingeniería de seguridad de procesos
    description: |
      Sistemas de alivio y antorcha, clasificación SIL y seguridad de procesos.
  BC-1100.50:
    name: Gestión de ingeniería de instrumentación y control
    description: |
      Instrumentación de campo, automatización e ingeniería de sistemas de control.
  BC-1100.50.10:
    name: Ingeniería de instrumentación de campo
    description: |
      Especificación de transmisores, sensores y elementos finales de campo.
  BC-1100.50.20:
    name: Diseño de sistemas de control
    description: |
      Arquitectura de DCS y PLC, y diseño de lazos de control.
  BC-1100.50.30:
    name: Diseño de sistemas instrumentados de seguridad
    description: |
      Diseño de SIS según IEC 61511 y verificación de SIL.
  BC-1100.50.40:
    name: Ingeniería de software de automatización y control
    description: |
      Configuración de lógica de control e ingeniería de software de automatización.
  BC-1100.60:
    name: Gestión de ingeniería de tuberías
    description: |
      Diseño de tuberías, disposiciones, isométricos, análisis de tensiones y selección de materiales.
  BC-1100.60.10:
    name: Diseño de disposición de tuberías
    description: |
      Arreglos generales de tuberías y diseño de tuberías en 3D.
  BC-1100.60.20:
    name: Análisis de tensiones en tuberías
    description: |
      Análisis de tensiones en tuberías y diseño de soportes.
  BC-1100.60.30:
    name: Selección de materiales para tuberías
    description: |
      Clases de materiales, juntas, válvulas y selección de aislamiento para tuberías.
  BC-1100.60.40:
    name: Producción de planos isométricos
    description: |
      Producción de isométricos de tuberías y listas de materiales.
  BC-1100.70:
    name: Gestión de recursos y competencias de disciplina
    description: |
      Grupos de disciplina, marcos de competencias y trayectorias técnicas.
  BC-1100.70.10:
    name: Gestión del pool de recursos de ingeniería
    description: |
      Asignación de recursos de disciplina en proyectos.
  BC-1100.70.20:
    name: Marco de competencias de ingeniería
    description: |
      Marcos de competencias de disciplina y matrices de habilidades.
  BC-1100.70.30:
    name: Gestión de trayectorias técnicas
    description: |
      Escalas técnicas y desarrollo de ingenieros certificados.
  BC-1100.70.40:
    name: Gestión del conocimiento de ingeniería
    description: |
      Intercambio de conocimiento de ingeniería, comunidades y lecciones aprendidas.

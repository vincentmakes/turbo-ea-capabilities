locale: es
source: L1-intelligence-operations-management.yaml
entries:
  BC-1730:
    name: Gestión de operaciones de inteligencia
    description: |
      Recopilación, análisis, difusión y fusión de inteligencia.
  BC-1730.10:
    name: Gestión de recopilación de inteligencia
    description: |
      Recopilación de HUMINT, SIGINT, GEOINT, IMINT y OSINT.
  BC-1730.10.10:
    name: Gestión de requisitos de recopilación
    description: |
      Definición y gestión de los requisitos de recopilación de inteligencia.
  BC-1730.10.20:
    name: Recopilación de HUMINT
    description: |
      Operaciones de recopilación de inteligencia humana.
  BC-1730.10.30:
    name: Recopilación de SIGINT
    description: |
      Operaciones de recopilación de inteligencia de señales.
  BC-1730.10.40:
    name: Recopilación de GEOINT e IMINT
    description: |
      Recopilación de inteligencia geoespacial y de imágenes.
  BC-1730.10.50:
    name: Recopilación de OSINT
    description: |
      Recopilación y curación de inteligencia de fuentes abiertas.
  BC-1730.20:
    name: Gestión del análisis de inteligencia
    description: |
      Análisis multifuente, fusión y productos de inteligencia.
  BC-1730.20.10:
    name: Análisis multifuente
    description: |
      Análisis y evaluación de inteligencia multifuente.
  BC-1730.20.20:
    name: Fusión de inteligencia
    description: |
      Fusión de datos multi-INT en evaluaciones integradas.
  BC-1730.20.30:
    name: Elaboración de productos de inteligencia
    description: |
      Elaboración de productos y evaluaciones de inteligencia.
  BC-1730.20.40:
    name: Aseguramiento de la calidad de la inteligencia
    description: |
      Aseguramiento de la calidad de los productos de inteligencia.
  BC-1730.30:
    name: Gestión de difusión de inteligencia
    description: |
      Informes de inteligencia, difusión y apoyo a la decisión.
  BC-1730.30.10:
    name: Informes de inteligencia
    description: |
      Producción de informes e informes ejecutivos de inteligencia.
  BC-1730.30.20:
    name: Control de difusión de inteligencia
    description: |
      Control de difusión y aplicación del principio de necesidad de conocer.
  BC-1730.30.30:
    name: Participación con clientes de inteligencia
    description: |
      Participación con los consumidores de inteligencia y retroalimentación.
  BC-1730.40:
    name: Gestión de contrainteligencia
    description: |
      Contrainteligencia, amenaza interna y detección de engaño.
  BC-1730.40.10:
    name: Operaciones de contrainteligencia
    description: |
      Operaciones de contrainteligencia frente a servicios extranjeros.
  BC-1730.40.20:
    name: Programa de amenaza interna
    description: |
      Detección y gestión de amenazas internas.
  BC-1730.40.30:
    name: Detección de engaño y negación
    description: |
      Detección de actividades de engaño y negación.
  BC-1730.50:
    name: Gestión de fuentes y métodos de inteligencia
    description: |
      Gestión de fuentes, protección de métodos y técnicas de oficio.
  BC-1730.50.10:
    name: Gestión de fuentes
    description: |
      Gestión y protección de las fuentes de inteligencia.
  BC-1730.50.20:
    name: Gestión de estándares de técnicas de oficio
    description: |
      Mantenimiento de los estándares de técnicas analíticas (ICD 203).
  BC-1730.50.30:
    name: Protección de métodos
    description: |
      Protección de los métodos de recopilación de inteligencia.

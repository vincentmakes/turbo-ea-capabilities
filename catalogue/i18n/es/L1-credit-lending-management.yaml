locale: es
source: L1-credit-lending-management.yaml
entries:
  BC-1320:
    name: Gestión de crédito y préstamos
    description: |
      Originación de crédito, suscripción, administración de préstamos, cobros y gestión de cartera.
  BC-1320.10:
    name: Gestión de originación de crédito
    description: |
      Recepción de solicitudes de crédito, preselección y flujos de originación.
  BC-1320.10.10:
    name: Captura de solicitudes de crédito
    description: |
      Captura de solicitudes de crédito a través de los distintos canales.
  BC-1320.10.20:
    name: Preselección y evaluación de solvencia
    description: |
      Comprobaciones de preselección, capacidad de pago y viabilidad.
  BC-1320.10.30:
    name: Orquestación del flujo de originación
    description: |
      Orquestación de los flujos de trabajo de originación de crédito y SLAs.
  BC-1320.10.40:
    name: Recopilación de documentación de originación
    description: |
      Recopilación y verificación de documentos de soporte de la originación.
  BC-1320.20:
    name: Gestión de suscripción y decisión crediticia
    description: |
      Suscripción, análisis financiero, toma de decisiones y autoridad delegada.
  BC-1320.20.10:
    name: Evaluación del riesgo crediticio
    description: |
      Evaluación del riesgo crediticio de solicitantes y exposiciones.
  BC-1320.20.20:
    name: Análisis y desagregación financiera
    description: |
      Desagregación de estados financieros y análisis de ratios.
  BC-1320.20.30:
    name: Toma de decisiones crediticias
    description: |
      Motores de decisión y toma de decisiones discrecionales en casos de crédito.
  BC-1320.20.40:
    name: Aprobación de crédito y autoridad delegada
    description: |
      Gobierno de la aprobación de crédito y aplicación de la autoridad delegada.
  BC-1320.20.50:
    name: Valoración y gestión de garantías
    description: |
      Identificación, valoración y perfección de garantías reales.
  BC-1320.30:
    name: Gestión de administración de préstamos
    description: |
      Administración de préstamos, pagos, cambios de calendario y modificaciones.
  BC-1320.30.10:
    name: Desembolso de préstamos
    description: |
      Gestión de desembolsos y disposiciones de préstamos.
  BC-1320.30.20:
    name: Procesamiento de reembolsos
    description: |
      Programación, procesamiento y conciliación de reembolsos.
  BC-1320.30.30:
    name: Modificación de préstamos
    description: |
      Modificaciones de condiciones de préstamos, reestructuraciones y refinanciaciones.
  BC-1320.30.40:
    name: Liquidación y cierre de préstamos
    description: |
      Liquidación de préstamos, emisión de certificados de cancelación y operaciones de cierre.
  BC-1320.40:
    name: Gestión de cobros y recuperaciones
    description: |
      Cobros, reestructuración, operaciones de recuperación y gestión de NPL.
  BC-1320.40.10:
    name: Cobros en etapa temprana
    description: |
      Gestión de morosidad temprana y recordatorios de pago.
  BC-1320.40.20:
    name: Cobros en etapa avanzada
    description: |
      Cobros en etapa avanzada y derivación a litigios.
  BC-1320.40.30:
    name: Reestructuración y moratoria
    description: |
      Ofertas de reestructuración, moratoria y apoyo a clientes en dificultades.
  BC-1320.40.40:
    name: Recuperación y saneamiento
    description: |
      Operaciones de recuperación, saneamiento y actividades post-saneamiento.
  BC-1320.40.50:
    name: Gestión de créditos dudosos
    description: |
      Gestión, venta y titulización de préstamos no productivos (NPL).
  BC-1320.50:
    name: Gestión de la cartera de préstamos
    description: |
      Análisis de cartera, optimización y gestión de capital.
  BC-1320.50.10:
    name: Analítica de riesgo de cartera
    description: |
      Analítica de cartera incluyendo cosechas, concentración y estrés.
  BC-1320.50.20:
    name: Optimización de cartera
    description: |
      Optimización de la composición, precios y rentabilidad ajustada al riesgo de la cartera.
  BC-1320.50.30:
    name: Gestión del capital de la cartera
    description: |
      Gestión del capital para carteras de crédito bajo las normas de Basilea.
  BC-1320.50.40:
    name: Reporting de cartera
    description: |
      Informes de cartera para comités de riesgo y reguladores.
  BC-1320.60:
    name: Gestión de modelos de riesgo crediticio
    description: |
      Modelos PD/LGD/EAD, IRB y pérdida crediticia esperada según IFRS 9.
  BC-1320.60.10:
    name: Desarrollo de modelos PD/LGD/EAD
    description: |
      Desarrollo de modelos de PD, LGD y EAD.
  BC-1320.60.20:
    name: Modelización de pérdida crediticia esperada IFRS 9
    description: |
      Desarrollo y operación del modelo de pérdida crediticia esperada según IFRS 9.
  BC-1320.60.30:
    name: Validación de modelos
    description: |
      Validación independiente de modelos de riesgo crediticio.
  BC-1320.60.40:
    name: Seguimiento de modelos
    description: |
      Seguimiento continuo del rendimiento y recalibración de modelos.

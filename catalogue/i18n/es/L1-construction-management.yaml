locale: es
source: L1-construction-management.yaml
entries:
  BC-1150:
    name: Gestión de construcción
    description: |
      Supervisión y ejecución de la construcción para empresas EPC.
  BC-1150.10:
    name: Gestión de planificación de la construcción
    description: |
      Secuenciación de la construcción, métodos y cronogramas maestros.
  BC-1150.10.10:
    name: Declaración del método constructivo
    description: |
      Definición de métodos constructivos y secuenciación.
  BC-1150.10.20:
    name: Cronograma maestro de construcción
    description: |
      Cronograma maestro de construcción y planes de avance a corto plazo.
  BC-1150.10.30:
    name: Planificación de recursos de construcción
    description: |
      Planificación de mano de obra, equipos y materiales para la construcción.
  BC-1150.10.40:
    name: Plan de ejecución de construcción
    description: |
      Plan de ejecución del proyecto que cubre la estrategia de construcción.
  BC-1150.20:
    name: Gestión de movilización y establecimiento en sitio
    description: |
      Establecimiento del sitio, instalaciones temporales y logística en sitio.
  BC-1150.20.10:
    name: Establecimiento del sitio
    description: |
      Instalación de facilidades temporales, oficinas y servicios en sitio.
  BC-1150.20.20:
    name: Planificación de logística en sitio
    description: |
      Planificación de acceso al sitio, zonas de acopio y manejo de materiales.
  BC-1150.20.30:
    name: Movilización de equipos de construcción
    description: |
      Movilización de grúas, planta y equipos de construcción.
  BC-1150.30:
    name: Gestión de supervisión de la construcción
    description: |
      Supervisión en sitio, gestión de frentes de trabajo y operaciones diarias.
  BC-1150.30.10:
    name: Operaciones diarias en sitio
    description: |
      Coordinación diaria en sitio, reuniones de inicio y ejecución.
  BC-1150.30.20:
    name: Gestión de frentes de trabajo
    description: |
      Definición y avance de los frentes de trabajo de construcción.
  BC-1150.30.30:
    name: Cumplimiento de permisos y métodos
    description: |
      Cumplimiento de permisos y declaraciones de método aprobadas.
  BC-1150.40:
    name: Gestión de subcontratistas
    description: |
      Selección, supervisión, desempeño y certificación de pagos de subcontratistas.
  BC-1150.40.10:
    name: Selección de subcontratistas
    description: |
      Precalificación y selección de subcontratistas de construcción.
  BC-1150.40.20:
    name: Supervisión de subcontratistas
    description: |
      Supervisión en sitio del desempeño y cumplimiento de subcontratistas.
  BC-1150.40.30:
    name: Certificación de pagos
    description: |
      Medición y certificación de pagos a subcontratistas.
  BC-1150.40.40:
    name: Gestión de variaciones de subcontratistas
    description: |
      Gestión de variaciones y reclamaciones de subcontratistas.
  BC-1150.50:
    name: Gestión de calidad de la construcción
    description: |
      QA/QC en sitio, inspecciones y puntos de espera y presencia.
  BC-1150.50.10:
    name: Planes de inspección y prueba en sitio
    description: |
      Definición de ITP, puntos de espera y presencia, y cronogramas de inspección.
  BC-1150.50.20:
    name: Inspección de calidad en sitio
    description: |
      Ejecución de inspecciones y pruebas de calidad en sitio.
  BC-1150.50.30:
    name: Gestión de no conformidades y lista de pendientes
    description: |
      Reportes de no conformidad en sitio y cierre de la lista de pendientes.
  BC-1150.60:
    name: Gestión del avance de la construcción
    description: |
      Medición del avance, valor ganado y análisis de variaciones.
  BC-1150.60.10:
    name: Medición del avance de la construcción
    description: |
      Medición del avance basada en cantidades en sitio.
  BC-1150.60.20:
    name: Reporte de valor ganado
    description: |
      Análisis de valor ganado y reporte de desempeño del proyecto.
  BC-1150.60.30:
    name: Análisis de variaciones de cronograma y costo
    description: |
      Análisis de variaciones y acciones correctivas.
  BC-1150.70:
    name: Gestión de HSE en sitio
    description: |
      Seguridad en sitio, permiso de trabajo, gestión de peligros y respuesta a emergencias.
  BC-1150.70.10:
    name: Planificación de HSE en sitio
    description: |
      Planes de HSE y evaluaciones de riesgo en sitio.
  BC-1150.70.20:
    name: Permiso de trabajo en sitio
    description: |
      Sistema de permiso de trabajo y autorización de trabajos en caliente en sitio.
  BC-1150.70.30:
    name: Inspecciones y auditorías de seguridad en sitio
    description: |
      Inspecciones de seguridad, auditorías y observaciones de conducta.
  BC-1150.70.40:
    name: Respuesta a emergencias en sitio
    description: |
      Planes de respuesta a emergencias, simulacros y gestión de incidentes en sitio.

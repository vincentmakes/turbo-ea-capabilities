locale: es
source: L1-commissioning-handover-management.yaml
entries:
  BC-1160:
    name: Gestión de puesta en marcha y entrega
    description: |
      Precomisionamiento, puesta en marcha, pruebas de desempeño y entrega.
  BC-1160.10:
    name: Gestión del precomisionamiento
    description: |
      Completación mecánica, purgas, pruebas de hermeticidad y energización.
  BC-1160.10.10:
    name: Verificación de completación mecánica
    description: |
      Verificación de la completación mecánica frente a la lista de pendientes.
  BC-1160.10.20:
    name: Operaciones de purga y limpieza
    description: |
      Purga, limpieza y acondicionamiento químico de tuberías.
  BC-1160.10.30:
    name: Pruebas de presión y hermeticidad
    description: |
      Hidropruebs, pruebas neumáticas y verificación de hermeticidad.
  BC-1160.10.40:
    name: Energización de equipos
    description: |
      Primera energización y verificaciones funcionales de los equipos.
  BC-1160.20:
    name: Gestión de la ejecución del comisionamiento
    description: |
      Puesta en marcha de sistemas, pruebas funcionales y pruebas integradas.
  BC-1160.20.10:
    name: Planificación del comisionamiento de sistemas
    description: |
      Planes de comisionamiento por sistema y subsistema.
  BC-1160.20.20:
    name: Pruebas funcionales de sistemas
    description: |
      Pruebas funcionales de sistemas individuales.
  BC-1160.20.30:
    name: Pruebas integradas de sistemas
    description: |
      Pruebas integradas que abarcan múltiples sistemas.
  BC-1160.20.40:
    name: Documentación del comisionamiento
    description: |
      Registros, dossieres y certificados del comisionamiento.
  BC-1160.30:
    name: Gestión de pruebas de desempeño
    description: |
      Corridas de prueba de desempeño y validación de criterios de aceptación.
  BC-1160.30.10:
    name: Planificación de pruebas de desempeño
    description: |
      Protocolos de prueba de desempeño y criterios de aceptación.
  BC-1160.30.20:
    name: Ejecución de pruebas de desempeño
    description: |
      Ejecución de corridas de prueba de desempeño y recolección de datos.
  BC-1160.30.30:
    name: Evaluación de pruebas de desempeño
    description: |
      Evaluación de resultados de pruebas y validación frente a garantías.
  BC-1160.40:
    name: Gestión de entrega y aceptación
    description: |
      Aceptación final, certificados, cierre de lista de pendientes y transferencia al operador.
  BC-1160.40.10:
    name: Cierre de la lista de pendientes
    description: |
      Seguimiento y cierre de los elementos de la lista de pendientes previo a la aceptación.
  BC-1160.40.20:
    name: Certificación de aceptación
    description: |
      Emisión de certificados de aceptación provisional y final.
  BC-1160.40.30:
    name: Capacitación del operador y entrega
    description: |
      Capacitación del equipo de operaciones y entrega de la instalación.
  BC-1160.40.40:
    name: Transferencia de custodia
    description: |
      Transferencia formal de custodia de la instalación y sus activos al cliente.
  BC-1160.50:
    name: Gestión del soporte postentrega
    description: |
      Período de responsabilidad por defectos, período de garantía y soporte técnico residual.
  BC-1160.50.10:
    name: Gestión de la responsabilidad por defectos
    description: |
      Gestión del período de responsabilidad por defectos y corrección de observaciones.
  BC-1160.50.20:
    name: Soporte de garantía
    description: |
      Coordinación del soporte de garantía y reclamaciones de garantía a proveedores.
  BC-1160.50.30:
    name: Soporte técnico residual
    description: |
      Soporte técnico a operaciones durante el período inicial de operación.

locale: es
source: L1-water-treatment-operations-management.yaml
entries:
  BC-3870:
    name: Gestión de operaciones de tratamiento de agua
    description: |
      Producción de agua potable en plantas de tratamiento — operación de procesos,
      garantía de la calidad del agua potable, gestión de productos químicos de
      tratamiento, almacenamiento de agua tratada y gestión de residuos del tratamiento
      conforme a las normativas de agua potable y los principios del Plan de Seguridad
      del Agua de la OMS.
  BC-3870.10:
    name: Operaciones de la planta de tratamiento
    description: |
      Operación diaria de plantas de tratamiento de agua potable que producen agua
      conforme a las especificaciones y en función de la demanda.
  BC-3870.10.10:
    name: Operaciones de turno en la planta de tratamiento
    description: |
      Operación por turnos de plantas de tratamiento convencional y por membranas.
  BC-3870.10.20:
    name: Programación de la producción del tratamiento
    description: |
      Programación de la producción del tratamiento en función de la demanda de distribución
      y el estado del almacenamiento.
  BC-3870.10.30:
    name: Informes de rendimiento de la planta de tratamiento
    description: |
      Notificación de la producción, el consumo energético y las métricas de rendimiento
      de la planta de tratamiento.
  BC-3870.20:
    name: Control del proceso de tratamiento
    description: |
      Control de proceso de las operaciones unitarias de tratamiento — coagulación,
      filtración, desinfección y tratamiento avanzado — frente a la monitorización de
      la calidad en línea.
  BC-3870.20.10:
    name: Control de coagulación y clarificación
    description: |
      Control de la dosificación de coagulante, la floculación y el rendimiento del
      clarificador.
  BC-3870.20.20:
    name: Control del proceso de filtración
    description: |
      Control de los pasos de filtración rápida por gravedad, filtración lenta en arena
      y filtración por membranas.
  BC-3870.20.30:
    name: Control del proceso de desinfección
    description: |
      Control de los procesos de cloración, UV, ozono y desinfección avanzada.
  BC-3870.20.40:
    name: Control del proceso de tratamiento avanzado
    description: |
      Control de las etapas de carbón activo granular (CAG), intercambio iónico y
      oxidación avanzada.
  BC-3870.30:
    name: Operaciones de calidad del agua potable
    description: |
      Muestreo, análisis de laboratorio, vigilancia en línea y notificación regulatoria
      del cumplimiento de la calidad del agua potable.
    in_scope:
      - Muestreo reglamentario de agua potable
      - Análisis de laboratorio de parámetros microbiológicos y químicos
      - Respuesta ante incidentes de calidad del agua potable
    out_of_scope:
      - Calidad del agua en la red de distribución (BC-3880.50)
      - Calidad del efluente de aguas residuales (BC-3890.70)
  BC-3870.30.10:
    name: Programa de muestreo reglamentario
    description: |
      Operación de los programas de muestreo reglamentario de agua potable en plantas
      de tratamiento y puntos de suministro.
  BC-3870.30.20:
    name: Monitorización en línea del agua tratada
    description: |
      Monitorización en línea de la turbidez, el cloro residual y otros parámetros del
      agua tratada.
  BC-3870.30.30:
    name: Respuesta ante incidentes de agua potable
    description: |
      Investigación y corrección de incidentes y superaciones de la calidad del agua potable.
  BC-3870.30.40:
    name: Informes de calidad del agua potable
    description: |
      Informes reglamentarios a los organismos reguladores del agua potable (DWI, EPA y
      equivalentes).
  BC-3870.40:
    name: Gestión de productos químicos de tratamiento
    description: |
      Gestión operativa de los productos químicos de tratamiento, incluidos las existencias,
      la dosificación y la seguridad en la manipulación.
  BC-3870.40.10:
    name: Operaciones de existencias de productos químicos
    description: |
      Gestión del nivel de existencias de productos químicos de tratamiento en la planta.
  BC-3870.40.20:
    name: Operaciones de dosificación de productos químicos
    description: |
      Operación y calibración de los sistemas de dosificación de productos químicos de
      tratamiento.
  BC-3870.40.30:
    name: Seguridad en la manipulación de productos químicos
    description: |
      Manipulación segura y controles COSHH y DSEAR para los productos químicos de
      tratamiento en la instalación.
  BC-3870.50:
    name: Operaciones de almacenamiento de agua tratada
    description: |
      Operación de depósitos de servicio, cámaras de contacto y torres de agua que
      suministran agua tratada a la red de distribución.
  BC-3870.50.10:
    name: Operaciones de depósitos de servicio
    description: |
      Operación, control de nivel y gestión de la renovación del agua en depósitos de servicio.
  BC-3870.50.20:
    name: Operaciones de cámaras de contacto
    description: |
      Operación de cámaras de contacto de desinfección para alcanzar los valores CT
      requeridos.
  BC-3870.50.30:
    name: Inspección de depósitos de servicio
    description: |
      Inspección interna y limpieza de activos de almacenamiento de agua tratada.
  BC-3870.60:
    name: Gestión de residuos del tratamiento
    description: |
      Operación de los flujos de residuos procedentes del tratamiento — fangos de
      clarificador, agua de lavado de filtros y medios agotados — y sus vías de eliminación.
  BC-3870.60.10:
    name: Operaciones con fangos del clarificador
    description: |
      Operación del espesamiento y la deshidratación de fangos en plantas de tratamiento
      de agua.
  BC-3870.60.20:
    name: Recuperación del agua de lavado de filtros
    description: |
      Recuperación y reutilización o eliminación del agua de lavado de filtros.
  BC-3870.60.30:
    name: Eliminación de medios agotados
    description: |
      Sustitución y eliminación de medios filtrantes agotados y resinas de intercambio iónico.

locale: es
source: L1-civil-records-identity-registration-management.yaml
entries:
  BC-3290:
    name: Gestión de registro civil e identidad
    description: |
      Registro y custodia autorizados de los registros civiles y estatutarios, incluidos los
      hechos vitales, la identidad nacional, los registros de empresas y entidades y el catastro,
      junto con los controles de autenticación, divulgación y privacidad.
  BC-3290.10:
    name: Gestión del registro civil
    description: |
      Inscripción de los hechos vitales, incluidos nacimientos, defunciones, matrimonios, uniones
      civiles y divorcios.
    in_scope:
      - Inscripción de nacimientos, defunciones, matrimonios y divorcios
      - Certificación de hechos vitales
      - Extracción de estadísticas vitales
    out_of_scope:
      - Expedición del número de identidad nacional (cubierto en Registro de identidad nacional)
  BC-3290.10.10:
    name: Inscripción de nacimientos
    description: |
      Inscripción de los nacimientos y expedición de los certificados de nacimiento.
  BC-3290.10.20:
    name: Inscripción de defunciones
    description: |
      Inscripción de las defunciones y expedición de los certificados de defunción.
  BC-3290.10.30:
    name: Inscripción de matrimonios y uniones civiles
    description: |
      Inscripción de los matrimonios y las uniones civiles y expedición de los certificados
      correspondientes.
  BC-3290.10.40:
    name: Inscripción de divorcios y anulaciones
    description: |
      Inscripción de los divorcios, las anulaciones y los decretos de disolución matrimonial.
  BC-3290.20:
    name: Registro de identidad nacional
    description: |
      Establecimiento, mantenimiento y autenticación de los registros y credenciales de identidad
      nacional de base.
  BC-3290.20.10:
    name: Enrolamiento de identidad
    description: |
      Enrolamiento de ciudadanos y residentes en el sistema de identidad nacional.
  BC-3290.20.20:
    name: Captura y deduplicación biométrica
    description: |
      Captura, deduplicación y cotejo de los identificadores biométricos.
  BC-3290.20.30:
    name: Expedición de credenciales de identidad
    description: |
      Producción y expedición de documentos nacionales de identidad y credenciales digitales.
  BC-3290.20.40:
    name: Actualización y ciclo de vida de la identidad
    description: |
      Actualización de los atributos de identidad, los eventos del ciclo de vida y la reexpedición
      de credenciales.
  BC-3290.30:
    name: Gestión del registro de empresas y entidades
    description: |
      Registro de sociedades, asociaciones, entidades de beneficencia y otras entidades jurídicas,
      y mantenimiento de los registros de entidades autorizados.
  BC-3290.30.10:
    name: Registro de entidades
    description: |
      Registro de sociedades, asociaciones, entidades de beneficencia y otras entidades.
  BC-3290.30.20:
    name: Procesamiento de depósitos anuales
    description: |
      Recepción y procesamiento de las cuentas anuales, los estados financieros y los depósitos
      de administradores.
  BC-3290.30.30:
    name: Gestión del registro de titularidad real
    description: |
      Mantenimiento de las declaraciones de titularidad real y de control.
  BC-3290.30.40:
    name: Disolución y cancelación de entidades
    description: |
      Cancelación, disolución y restauración de entidades jurídicas.
  BC-3290.40:
    name: Gestión del registro de la propiedad y el catastro
    description: |
      Inscripción de títulos de propiedad, servidumbres, cargas y parcelas catastrales, y
      mantenimiento de los registros de la propiedad autorizados.
  BC-3290.40.10:
    name: Inscripción de títulos de propiedad
    description: |
      Inscripción de títulos de propiedad, transmisiones e intereses de titularidad real.
  BC-3290.40.20:
    name: Registro de cargas y gravámenes
    description: |
      Registro de hipotecas, servidumbres y otros gravámenes.
  BC-3290.40.30:
    name: Mantenimiento del catastro
    description: |
      Mantenimiento de los límites de las parcelas catastrales y los registros de levantamientos
      topográficos.
  BC-3290.50:
    name: Autenticación de documentos y apostilla
    description: |
      Autenticación de documentos públicos para uso nacional e internacional, incluidos los
      servicios de apostilla conforme al Convenio de La Haya.
  BC-3290.50.10:
    name: Autenticación de documentos
    description: |
      Autenticación de documentos públicos para uso jurídico y administrativo.
  BC-3290.50.20:
    name: Expedición de apostillas
    description: |
      Expedición de apostillas conforme al Convenio de La Haya de 1961.
  BC-3290.50.30:
    name: Coordinación de servicios notariales
    description: |
      Coordinación de los servicios notariales cuando sean prestados por la administración.
  BC-3290.60:
    name: Divulgación de registros y privacidad
    description: |
      Divulgación controlada, redacción y gestión de la privacidad de los registros civiles y
      estatutarios.
  BC-3290.60.10:
    name: Servicios de consulta pública
    description: |
      Prestación de servicios de consulta pública y de certificación sobre los registros civiles.
  BC-3290.60.20:
    name: Gestión de divulgaciones restringidas
    description: |
      Gestión de las divulgaciones restringidas, incluidas las de adopciones, protección de
      testigos y reservas de seguridad.
  BC-3290.60.30:
    name: Privacidad y redacción de registros
    description: |
      Aplicación de los controles de privacidad y la redacción a los registros civiles antes
      de su divulgación.

locale: es
source: L1-banking-risk-management.yaml
entries:
  BC-1410:
    name: Gestión del riesgo bancario
    description: |
      Tipos de riesgo específicos de la banca: riesgo de crédito, mercado, liquidez, modelos y riesgo de crédito de contraparte.
  BC-1410.10:
    name: Gestión del riesgo crediticio bancario
    description: |
      Marcos de riesgo crediticio, RWA y pruebas de estrés.
  BC-1410.10.10:
    name: Marco de riesgo crediticio
    description: |
      Definición del marco y las políticas de riesgo crediticio.
  BC-1410.10.20:
    name: Cálculo e informe de RWA
    description: |
      Cálculo e informe de RWA por método estándar e IRB.
  BC-1410.10.30:
    name: Pruebas de estrés crediticio
    description: |
      Pruebas de estrés de riesgo crediticio y análisis de escenarios.
  BC-1410.10.40:
    name: Gestión del riesgo de concentración
    description: |
      Gestión del riesgo de concentración por nombre, sector y país.
  BC-1410.20:
    name: Gestión del riesgo de mercado
    description: |
      VaR, sensibilidades, límites de riesgo de mercado y FRTB.
  BC-1410.20.10:
    name: Medición del riesgo de mercado
    description: |
      Medición del VaR, ES y sensibilidades del libro de negociación.
  BC-1410.20.20:
    name: Gestión de límites de riesgo de mercado
    description: |
      Definición y seguimiento de límites de riesgo de mercado.
  BC-1410.20.30:
    name: Pruebas de estrés de riesgo de mercado
    description: |
      Pruebas de estrés y escenarios de riesgo de mercado.
  BC-1410.20.40:
    name: Gestión de la implantación del FRTB
    description: |
      Implantación y operación del FRTB mediante SA e IMA.
  BC-1410.30:
    name: Gestión del riesgo operacional bancario
    description: |
      Marcos de riesgo operacional, RCSA y datos de eventos de pérdida.
  BC-1410.30.10:
    name: Marco de riesgo operacional
    description: |
      Marco, taxonomía y política de riesgo operacional.
  BC-1410.30.20:
    name: Autoevaluación de riesgos y controles
    description: |
      Ejecución de RCSA y actualización del perfil de riesgo.
  BC-1410.30.30:
    name: Captura de eventos de pérdida por riesgo operacional
    description: |
      Captura y clasificación de eventos de pérdida por riesgo operacional.
  BC-1410.30.40:
    name: Gestión de indicadores clave de riesgo operacional
    description: |
      Definición, umbrales y seguimiento de KRI.
  BC-1410.40:
    name: Gestión del riesgo de liquidez
    description: |
      Marcos de riesgo de liquidez, pruebas de estrés y financiación de contingencia.
  BC-1410.40.10:
    name: Marco de riesgo de liquidez
    description: |
      Marco, apetito y política de riesgo de liquidez.
  BC-1410.40.20:
    name: Pruebas de estrés de liquidez
    description: |
      Pruebas de estrés e inversas específicas de liquidez.
  BC-1410.40.30:
    name: Gestión del plan de financiación de contingencia
    description: |
      Mantenimiento y prueba del plan de financiación de contingencia.
  BC-1410.50:
    name: Gestión del riesgo de modelos
    description: |
      Validación de modelos, gobierno de modelos e inventario de modelos.
  BC-1410.50.10:
    name: Gestión del inventario de modelos
    description: |
      Mantenimiento del inventario de modelos corporativo.
  BC-1410.50.20:
    name: Clasificación por nivel de riesgo de modelos
    description: |
      Clasificación por nivel de riesgo de modelos para la atención de gobierno.
  BC-1410.50.30:
    name: Validación independiente de modelos
    description: |
      Validación independiente de modelos conforme a SR 11-7/TRIM.
  BC-1410.50.40:
    name: Seguimiento del rendimiento de modelos
    description: |
      Seguimiento continuo del rendimiento y recalibración de modelos.
  BC-1410.60:
    name: Gestión del riesgo de crédito de contraparte
    description: |
      CCR, CVA y exposición a derivados de contraparte.
  BC-1410.60.10:
    name: Medición de la exposición a la contraparte
    description: |
      Medición de la exposición a la contraparte (PFE, EEPE).
  BC-1410.60.20:
    name: Gestión de CVA y XVA
    description: |
      Gestión de CVA, DVA, FVA y otros ajustes XVA.
  BC-1410.60.30:
    name: Gestión de límites de contraparte
    description: |
      Establecimiento y seguimiento de límites de contraparte.
  BC-1410.60.40:
    name: Gestión del riesgo en sentido equivocado
    description: |
      Identificación y gestión del riesgo en sentido equivocado específico y general.

locale: es
source: L1-subsurface-reservoir-management.yaml
entries:
  BC-3010:
    name: Gestión de subsuelo y yacimientos
    description: |
      Geociencias e ingeniería de yacimientos a lo largo del ciclo de vida
      del activo productor: caracterización, simulación, clasificación de
      reservas y recursos, estrategia de agotamiento y diseño de
      recuperación mejorada.
  BC-3010.10:
    name: Gestión de geociencias del subsuelo
    description: |
      Descripción estática del subsuelo mediante modelado geológico,
      petrofísica e interpretación estructural en activos productores.
  BC-3010.10.10:
    name: Modelado geológico
    description: |
      Construcción y actualización de modelos geológicos estáticos
      y de facies.
  BC-3010.10.20:
    name: Análisis petrofísico
    description: |
      Análisis de registros, integración de núcleos y evaluación
      petrofísica de yacimientos.
  BC-3010.10.30:
    name: Interpretación estructural
    description: |
      Interpretación estructural y de redes de fallas en activos productores.
  BC-3010.10.40:
    name: Actualización del geomodelo
    description: |
      Actualización de geomodelos con nuevos datos de pozos, sísmica
      y producción.
  BC-3010.20:
    name: Ingeniería de yacimientos
    description: |
      Análisis del comportamiento dinámico del yacimiento mediante simulación,
      PVT, balance de materiales y métodos de transitorio de presión.
    in_scope:
      - Simulación de yacimientos e historia de ajuste
      - Análisis PVT y de propiedades de fluidos
      - Análisis de transitorio de presión y pruebas de pozos
    out_of_scope:
      - Análisis de curva de declinación y pronóstico de producción (BC-3010.50)
  BC-3010.20.10:
    name: Caracterización de yacimientos
    description: |
      Caracterización integrada estática y dinámica de yacimientos.
  BC-3010.20.20:
    name: Simulación de yacimientos
    description: |
      Simulación numérica de yacimientos, ajuste histórico y generación
      de pronósticos.
  BC-3010.20.30:
    name: Análisis PVT y de fluidos
    description: |
      Muestreo PVT, análisis de laboratorio y modelado de propiedades
      de fluidos.
  BC-3010.20.40:
    name: Análisis de balance de materiales
    description: |
      Análisis de balance de materiales para estimar volúmenes in situ
      y mecanismos de empuje.
  BC-3010.20.50:
    name: Análisis de transitorio de presión
    description: |
      Análisis de pruebas de pozos e interpretación de transitorios de presión.
  BC-3010.30:
    name: Gestión de reservas y recursos
    description: |
      Estimación, clasificación y registro externo de reservas de petróleo
      y recursos contingentes conforme a SPE-PRMS y requisitos de la SEC.
  BC-3010.30.10:
    name: Estimación de reservas
    description: |
      Estimación determinista y probabilística de reservas de petróleo.
  BC-3010.30.20:
    name: Clasificación de reservas
    description: |
      Clasificación de reservas y recursos conforme a las categorías
      del SPE-PRMS.
  BC-3010.30.30:
    name: Registro de reservas
    description: |
      Registro anual de reservas para las declaraciones regulatorias
      de la SEC y equivalentes.
  BC-3010.30.40:
    name: Coordinación de auditorías de reservas
    description: |
      Coordinación de auditorías internas y de terceros de las reservas.
  BC-3010.40:
    name: Planificación del desarrollo de campos
    description: |
      Selección de concepto, estrategia de agotamiento y elaboración del
      plan de desarrollo de campo desde el descubrimiento hasta la
      sanción del desarrollo.
  BC-3010.40.10:
    name: Selección de concepto
    description: |
      Selección y evaluación de conceptos liderada por el subsuelo para
      nuevos desarrollos de campo.
  BC-3010.40.20:
    name: Elaboración del plan de desarrollo de campo
    description: |
      Elaboración de planes de desarrollo de campo para aprobación
      regulatoria y de socios.
  BC-3010.40.30:
    name: Definición de la estrategia de agotamiento
    description: |
      Definición de la estrategia de agotamiento del yacimiento, incluyendo
      drenaje y número de pozos.
  BC-3010.40.40:
    name: Evaluación de riesgos del subsuelo
    description: |
      Evaluación de la incertidumbre del subsuelo y su impacto comercial
      en las decisiones de desarrollo.
  BC-3010.50:
    name: Pronóstico de producción
    description: |
      Generación y reconciliación de pronósticos de producción para la
      planificación de activos, negocios y reservas.
  BC-3010.50.10:
    name: Análisis de curva de declinación
    description: |
      Análisis de curvas de declinación para pronosticar la producción
      de pozos y campos.
  BC-3010.50.20:
    name: Generación de pronósticos de producción
    description: |
      Generación de pronósticos de producción integrando restricciones
      de pozos, yacimiento e instalaciones.
  BC-3010.50.30:
    name: Reconciliación de pronósticos
    description: |
      Reconciliación de pronósticos del subsuelo con los valores reales
      de la contabilidad de producción.
  BC-3010.60:
    name: Gestión de recuperación mejorada y adicional
    description: |
      Diseño y vigilancia de esquemas de recuperación secundaria y terciaria,
      incluyendo inyección de agua y gas y procesos EOR.
  BC-3010.60.10:
    name: Diseño de recuperación secundaria
    description: |
      Diseño de esquemas de recuperación secundaria por inundación de
      agua e inyección de gas.
  BC-3010.60.20:
    name: Diseño de recuperación terciaria
    description: |
      Diseño de esquemas de recuperación mejorada de petróleo químicos,
      térmicos y miscibles.
  BC-3010.60.30:
    name: Vigilancia de la estrategia de inyección
    description: |
      Vigilancia y optimización de los patrones de inyección y la
      reposición de volumen voidage.

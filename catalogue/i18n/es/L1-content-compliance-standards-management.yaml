locale: es
source: L1-content-compliance-standards-management.yaml
entries:
  BC-3780:
    name: "Gestión de cumplimiento y estándares de contenidos"
    description: |
      Clasificación y calificación de contenidos, estándares editoriales, cumplimiento
      normativo en difusión y contenidos en línea, moderación de contenidos generados
      por usuarios, cumplimiento de accesibilidad y gestión de retiradas y avisos
      en toda la cartera de contenidos.
  BC-3780.10:
    name: "Gestión de clasificación y calificación de contenidos"
    description: |
      Presentación, aplicación y autoclasificación de calificaciones de edad
      y contenido en territorios y plataformas.
  BC-3780.10.10:
    name: "Presentación para clasificación antes del estreno"
    description: |
      Presentación de títulos ante los organismos de clasificación para obtener
      calificaciones de edad territoriales antes del estreno.
  BC-3780.10.20:
    name: "Cumplimiento en la visualización de calificaciones"
    description: |
      Visualización de calificaciones de edad, descriptores de contenido
      y advertencias en las superficies de consumo.
  BC-3780.10.30:
    name: "Gestión de la autoclasificación"
    description: |
      Aplicación de los regímenes de autoclasificación y adherencia
      a las herramientas de calificación por edad de las plataformas.
  BC-3780.20:
    name: "Gestión de estándares editoriales"
    description: |
      Elaboración de la política editorial, revisión de cumplimiento antes
      de la transmisión y gestión de reclamaciones editoriales.
  BC-3780.20.10:
    name: "Gestión de la política editorial"
    description: |
      Elaboración y ciclo de vida de las políticas editoriales y los estándares
      de imparcialidad y precisión.
  BC-3780.20.20:
    name: "Revisión de cumplimiento antes de la transmisión"
    description: |
      Revisión previa a la transmisión de programas y pausas conforme
      a los estándares editoriales y regulatorios.
  BC-3780.20.30:
    name: "Gestión de reclamaciones editoriales"
    description: |
      Clasificación, investigación y respuesta a las reclamaciones editoriales
      de espectadores y reguladores.
  BC-3780.30:
    name: "Cumplimiento normativo en difusión"
    description: |
      Cumplimiento de la regulación en difusión y audiovisual, incluyendo
      normas de programación, cuotas de contenido y códigos publicitarios.
  BC-3780.30.10:
    name: "Cumplimiento de la horquilla de protección y programación"
    description: |
      Cumplimiento de las normas de horquilla de protección y franja horaria
      para la programación de contenidos para adultos.
  BC-3780.30.20:
    name: "Cumplimiento de cuotas y contenido local"
    description: |
      Cumplimiento de las cuotas de contenido, incluyendo obras europeas,
      producción independiente y obligaciones de idioma local.
  BC-3780.30.30:
    name: "Cumplimiento del código publicitario"
    description: |
      Cumplimiento de la publicidad y el patrocinio conforme a los códigos
      aplicables y las restricciones por categoría.
  BC-3780.40:
    name: "Moderación de contenidos generados por usuarios"
    description: |
      Moderación del contenido generado por usuarios mediante clasificación
      automatizada, revisión humana y flujos de trabajo de denunciantes de confianza.
  BC-3780.40.10:
    name: "Clasificación automatizada de contenidos"
    description: |
      Clasificación y triage automatizado del contenido generado por usuarios
      para problemas de seguridad y política.
  BC-3780.40.20:
    name: "Gestión de colas de revisión humana"
    description: |
      Operación de colas de revisión humana, incluyendo controles de calidad
      y bienestar de los revisores.
  BC-3780.40.30:
    name: "Gestión de denunciantes de confianza"
    description: |
      Gestión de las relaciones con los denunciantes de confianza y los canales
      de revisión prioritaria bajo la normativa de contenidos en línea.
  BC-3780.50:
    name: "Gestión del cumplimiento de accesibilidad"
    description: |
      Cumplimiento de las obligaciones de accesibilidad en subtitulado,
      audiodescripción e interpretación en lengua de signos.
  BC-3780.50.10:
    name: "Cumplimiento del subtitulado"
    description: |
      Cumplimiento de las obligaciones de subtitulado, incluyendo cobertura,
      calidad y estándares de presentación.
  BC-3780.50.20:
    name: "Cumplimiento de la audiodescripción"
    description: |
      Cumplimiento de las obligaciones de cobertura y calidad
      de la audiodescripción.
  BC-3780.50.30:
    name: "Cumplimiento de la provisión de lengua de signos"
    description: |
      Cumplimiento de las obligaciones de interpretación en lengua de signos
      y firma en pantalla.
  BC-3780.60:
    name: "Gestión de retiradas y avisos"
    description: |
      Gestión de los avisos de derechos de autor y de contenidos en línea,
      incluyendo los procesos de contraaviso y apelación.
  BC-3780.60.10:
    name: "Gestión de avisos de derechos de autor"
    description: |
      Gestión de las notificaciones de retirada por derechos de autor
      y la aplicación de la política de infractores reincidentes.
  BC-3780.60.20:
    name: "Gestión de avisos de contenidos en línea"
    description: |
      Gestión de los avisos y órdenes de contenido ilegal bajo
      la normativa de contenidos en línea.
  BC-3780.60.30:
    name: "Gestión de contraavisos y apelaciones"
    description: |
      Gestión de los contraavisos y los mecanismos de apelación extrajudicial
      para las decisiones de eliminación de contenidos.

locale: es
source: L1-real-estate-acquisition-disposition-management.yaml
entries:
  BC-4930:
    name: Gestión de adquisición y disposición de activos inmobiliarios
    description: |
      Disciplina transaccional que abarca la búsqueda, el análisis previo, la diligencia debida, la estructuración, la negociación, el cierre y la incorporación postcierre de adquisiciones y disposiciones inmobiliarias en operaciones directas, de cartera y a nivel de entidad.
    in_scope:
      - Búsqueda de leads de adquisición y gestión de intermediarios
      - Análisis previo (DCF, comparables, sensibilidades, escenarios)
      - Diligencia debida física, ambiental, de títulos, de arrendamientos y financiera
      - Estrategia de oferta, carta de intenciones, contrato de compraventa y estructuración fiscal/vehículo
      - Depósito en garantía, cierre, liquidación y registro
      - Estrategia de disposición, comercialización, selección de comprador
      - Incorporación de datos y contratos tras la adquisición
    out_of_scope:
      - Gobernanza del comité de inversiones y mandatos del fondo (BC-4910)
      - Planes de negocio de activos en explotación (BC-4920)
      - Disposiciones de préstamos a la construcción y seguimiento de convenios con prestamistas (BC-4980)
      - Intermediación como línea de servicio (BC-4960)
  BC-4930.10:
    name: Búsqueda y cribado de adquisiciones
    description: |
      Búsqueda de oportunidades de adquisición a través de intermediarios, propietarios directos y canales propietarios, y cribado inicial frente a los criterios establecidos.
  BC-4930.10.10:
    name: Búsqueda de leads de adquisición
    description: |
      Búsqueda de leads de adquisición a través de canales directos, de intermediarios y fuera de mercado.
  BC-4930.10.20:
    name: Gestión de intermediarios
    description: |
      Gestión de las relaciones con intermediarios que suministran oportunidades de adquisición.
  BC-4930.10.30:
    name: Cribado inicial y decisiones de oferta
    description: |
      Cribado inicial de oportunidades y decisiones de ofertar o descartar.
  BC-4930.20:
    name: Análisis previo de adquisiciones
    description: |
      Análisis financiero, de mercado y de riesgos de los activos objetivo para determinar el precio de oferta y las expectativas de rentabilidad.
  BC-4930.20.10:
    name: Análisis de flujos de caja y DCF
    description: |
      Elaboración de modelos de flujo de caja del activo y de descuento de flujos de caja (DCF).
  BC-4930.20.20:
    name: Análisis de comparables de ventas y tasas de capitalización
    description: |
      Análisis de ventas comparables y tasas de capitalización vigentes para calibrar el valor.
  BC-4930.20.30:
    name: Modelización de sensibilidades y escenarios
    description: |
      Modelización de sensibilidades y escenarios de la rentabilidad bajo distintos supuestos de renta, desocupación y precio de salida.
  BC-4930.30:
    name: Gestión de la diligencia debida
    description: |
      Coordinación y ejecución de la diligencia debida multidisciplinar sobre adquisiciones objetivo, incluyendo las líneas de trabajo física, ambiental, legal, de arrendamientos y financiera.
  BC-4930.30.10:
    name: Diligencia debida física e ingeniería
    description: |
      Evaluaciones del estado físico y diligencia de ingeniería sobre los activos objetivo.
  BC-4930.30.20:
    name: Diligencia debida ambiental (Fase I / II)
    description: |
      Diligencia debida ambiental, incluyendo evaluaciones ASTM de Fase I y Fase II.
  BC-4930.30.30:
    name: Diligencia de títulos, medición y zonificación
    description: |
      Diligencia sobre títulos, medición, servidumbres y cumplimiento normativo de zonificación.
  BC-4930.30.40:
    name: Diligencia de arrendamientos e inquilinos
    description: |
      Revisión del resumen de arrendamientos, recopilación de certificados de estoppel y entrevistas con inquilinos.
  BC-4930.30.50:
    name: Diligencia financiera y fiscal
    description: |
      Diligencia financiera y fiscal sobre cuentas de explotación, gastos operativos y valoraciones fiscales históricas.
  BC-4930.40:
    name: Estructuración y negociación de la transacción
    description: |
      Estrategia de oferta, estructuración de la operación y negociación de los documentos vinculantes de la transacción.
  BC-4930.40.10:
    name: Estrategia de oferta
    description: |
      Definición de la estrategia de oferta, incluyendo el posicionamiento del precio y las condiciones de la operación.
  BC-4930.40.20:
    name: Negociación de la carta de intenciones
    description: |
      Negociación de las cartas de intenciones y los períodos de exclusividad.
  BC-4930.40.30:
    name: Negociación del contrato de compraventa
    description: |
      Negociación y firma de los contratos de compraventa, incluyendo declaraciones y garantías.
  BC-4930.40.40:
    name: Estructuración fiscal y del vehículo
    description: |
      Estructuración de los vehículos de adquisición para la eficiencia fiscal, incluyendo canjes del artículo 1031 e instrumentos societarios.
  BC-4930.50:
    name: Gestión del cierre y la liquidación
    description: |
      Gestión del depósito en garantía, las condiciones de cierre, la financiación de la liquidación y el registro de las transacciones cerradas.
  BC-4930.50.10:
    name: Depósito en garantía y condiciones de cierre
    description: |
      Gestión de las cuentas de depósito en garantía y seguimiento de las condiciones de cierre hasta su satisfacción.
  BC-4930.50.20:
    name: Fondos de cierre y declaración de liquidación
    description: |
      Coordinación de los fondos de cierre y conciliación frente a la declaración de liquidación.
  BC-4930.50.30:
    name: Seguro de título y registro
    description: |
      Emisión del seguro de título y registro de escrituras e hipotecas.
  BC-4930.60:
    name: Gestión de la disposición y la salida
    description: |
      Disciplina del vendedor que abarca el precio de disposición, la comercialización, la selección del comprador y las obligaciones postscierre.
  BC-4930.60.10:
    name: Estrategia y precio de disposición
    description: |
      Definición de la estrategia de disposición, el precio y los grupos de compradores objetivo.
  BC-4930.60.20:
    name: Comercialización de la venta y visitas de compradores
    description: |
      Comercialización del lado vendedor, incluyendo memorándum de oferta, sala de datos virtual y visitas de compradores.
  BC-4930.60.30:
    name: Selección del comprador y proceso de licitación
    description: |
      Selección del comprador a través de convocatoria de ofertas, mejor y última oferta o procesos de subasta estructurada.
  BC-4930.60.40:
    name: Obligaciones postscierre
    description: |
      Seguimiento de las obligaciones postscierre, incluyendo retenciones, earn-outs y reclamaciones de indemnización.
  BC-4930.70:
    name: Incorporación postadquisición
    description: |
      Traspaso de los activos recién adquiridos del equipo de transacciones a la gestión de activos y administración de propiedades, incluyendo la incorporación de datos y contratos.
  BC-4930.70.10:
    name: Migración de datos del activo
    description: |
      Migración de datos del activo, planos y registros operativos a los sistemas del propietario.
  BC-4930.70.20:
    name: Incorporación de datos de arrendamientos e inquilinos
    description: |
      Incorporación de resúmenes de arrendamientos y datos de inquilinos a los sistemas del arrendador.
  BC-4930.70.30:
    name: Novación de contratos de proveedores
    description: |
      Novación o sustitución de los contratos de proveedores y servicios vigentes a favor del nuevo propietario.

locale: es
source: L1-citizen-constituent-service-management.yaml
entries:
  BC-3220:
    name: Gestión de servicios al ciudadano
    description: |
      Prestación multicanal de servicios gubernamentales a ciudadanos, residentes y administrados,
      incluida la autenticación de identidad, la gestión de casos, la atención de consultas,
      recursos e impugnaciones, y la participación ciudadana.
  BC-3220.10:
    name: Operaciones de canales de servicio
    description: |
      Operación de los canales presencial, telefónico, postal, digital y móvil a través de los
      cuales la ciudadanía accede a los servicios gubernamentales.
    in_scope:
      - Centros de servicio y ventanilla única presencial
      - Canales de centro de contacto y telefonía
      - Portales digitales y aplicaciones móviles
      - Canales postales y basados en formularios
    out_of_scope:
      - Verificación de identidad del ciudadano (cubierto en Identidad y autenticación del ciudadano)
  BC-3220.10.10:
    name: Operaciones de ventanilla única
    description: |
      Operación de centros de atención presencial y ventanillas únicas en distintos organismos.
  BC-3220.10.20:
    name: Operaciones de centros de contacto
    description: |
      Operación de centros de contacto telefónico y por chat de múltiples organismos.
  BC-3220.10.30:
    name: Operaciones del portal de servicio digital
    description: |
      Operación de portales digitales y aplicaciones móviles orientadas a la ciudadanía.
  BC-3220.10.40:
    name: Garantía de accesibilidad del servicio
    description: |
      Garantía de accesibilidad conforme a WCAG y Sección 508 en todos los canales de servicio
      y soporte de tecnología de asistencia.
  BC-3220.20:
    name: Identidad y autenticación del ciudadano
    description: |
      Establecimiento y verificación de identidades digitales, credenciales y niveles de
      garantía de la ciudadanía para el acceso a servicios gubernamentales.
  BC-3220.20.10:
    name: Comprobación de identidad
    description: |
      Comprobación de identidad alineada con los niveles de garantía IAL de NIST 800-63 o eIDAS.
  BC-3220.20.20:
    name: Emisión de credenciales
    description: |
      Emisión de autenticadores y credenciales para el acceso a servicios gubernamentales.
  BC-3220.20.30:
    name: Operaciones de autenticación
    description: |
      Autenticación cotidiana de la ciudadanía frente a los servicios gubernamentales.
  BC-3220.20.40:
    name: Federación y confianza transfronteriza
    description: |
      Federación de identidad entre organismos y confianza transfronteriza bajo eIDAS o
      marcos equivalentes.
  BC-3220.30:
    name: Gestión de casos ciudadanos
    description: |
      Gestión integral del ciclo de vida de los casos ciudadanos entre organismos y programas.
  BC-3220.30.10:
    name: Recepción y triaje de casos
    description: |
      Recepción, clasificación y triaje de casos ciudadanos.
  BC-3220.30.20:
    name: Derivación y asignación de casos
    description: |
      Derivación de casos a trabajadores sociales y organismos según jurisdicción y normativa.
  BC-3220.30.30:
    name: Avance y resolución de casos
    description: |
      Tramitación de los casos a través de los flujos de trabajo de servicio hasta su resolución.
  BC-3220.30.40:
    name: Cierre y revisión de calidad de casos
    description: |
      Cierre, revisión de calidad y revisión de casos completados.
  BC-3220.40:
    name: Atención de solicitudes de servicio y consultas
    description: |
      Atención de consultas, solicitudes, quejas y presentaciones de acceso a la información
      a través de todos los canales.
  BC-3220.40.10:
    name: Atención de consultas generales
    description: |
      Atención de consultas generales y solicitudes de información.
  BC-3220.40.20:
    name: Gestión de quejas
    description: |
      Recepción, investigación y resolución de quejas ciudadanas.
  BC-3220.40.30:
    name: Gestión de solicitudes de acceso a la información
    description: |
      Tramitación de solicitudes de acceso a la información y a registros públicos.
  BC-3220.50:
    name: Gestión de recursos y defensoría del pueblo
    description: |
      Revisión administrativa independiente de decisiones de organismos, incluidos recursos,
      tribunales e investigaciones del defensor del pueblo.
  BC-3220.50.10:
    name: Recepción de recursos administrativos
    description: |
      Recepción y validación de recursos administrativos contra decisiones de organismos.
  BC-3220.50.20:
    name: Audiencia y resolución de recursos
    description: |
      Celebración de audiencias de recursos y determinación de resultados por las autoridades
      revisoras.
  BC-3220.50.30:
    name: Investigación del defensor del pueblo
    description: |
      Investigación independiente por el defensor del pueblo de quejas por mala administración.
  BC-3220.60:
    name: Participación y compromiso ciudadano
    description: |
      Participación bidireccional con la ciudadanía a través de plataformas de participación,
      peticiones y canales de retroalimentación.
  BC-3220.60.10:
    name: Gestión de peticiones e iniciativas ciudadanas
    description: |
      Recepción, validación y respuesta a peticiones y propuestas de iniciativa ciudadana.
  BC-3220.60.20:
    name: Operaciones de plataformas participativas
    description: |
      Operación de plataformas de presupuesto participativo, deliberación y cocreación.
  BC-3220.60.30:
    name: Medición de la satisfacción ciudadana
    description: |
      Medición de la satisfacción, la confianza y la experiencia de servicio de la ciudadanía.

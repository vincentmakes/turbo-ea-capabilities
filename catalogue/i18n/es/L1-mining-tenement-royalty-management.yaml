locale: es
source: L1-mining-tenement-royalty-management.yaml
entries:
  BC-4490:
    name: Gestión de concesiones mineras y regalías
    description: |
      Adquisición, cumplimiento y gestión de portafolio de permisos de
      exploración y concesiones mineras, junto con el cálculo, la información y
      la divulgación de obligaciones de regalías gubernamentales, privadas e
      indígenas.

  BC-4490.10:
    name: Adquisición de concesiones
    description: |
      Solicitud, licitación y diligencia debida para la adquisición de permisos
      de exploración, concesiones mineras y otros títulos mineros.
    in_scope:
      - Solicitudes de permisos de exploración greenfield
      - Solicitudes y renovaciones de concesiones mineras
      - Diligencia debida en adquisición de concesiones
    out_of_scope:
      - Maduración de prospectos en etapa de descubrimiento (BC-4400.20)

  BC-4490.10.10:
    name: Solicitud de permisos de exploración
    description: |
      Preparación y presentación de solicitudes de permisos de exploración
      greenfield y brownfield.

  BC-4490.10.20:
    name: Solicitud de concesiones mineras
    description: |
      Preparación y presentación de solicitudes de concesiones mineras y
      conversiones desde títulos de exploración.

  BC-4490.10.30:
    name: Participación en licitaciones de concesiones
    description: |
      Participación en licitaciones y subastas competitivas de concesiones.

  BC-4490.10.40:
    name: Diligencia debida en adquisición de concesiones
    description: |
      Diligencia debida sobre titularidad, gravámenes y obligaciones en
      adquisiciones de concesiones.

  BC-4490.20:
    name: Cumplimiento y mantenimiento de concesiones
    description: |
      Cumplimiento de las obligaciones de gasto anual, programa de trabajo,
      canon y renovación vinculadas a los títulos mineros.

  BC-4490.20.10:
    name: Informe de gasto anual
    description: |
      Informe del gasto anual de exploración y desarrollo frente a los
      compromisos de la concesión.

  BC-4490.20.20:
    name: Cumplimiento del programa de trabajo
    description: |
      Demostración del cumplimiento de los programas de trabajo comprometidos
      en concesiones de exploración y minería.

  BC-4490.20.30:
    name: Pago de cánones y tasas estatutarias
    description: |
      Pago de cánones anuales, tasas estatutarias y depósitos de garantía sobre
      concesiones.

  BC-4490.20.40:
    name: Gestión de la renovación de concesiones
    description: |
      Gestión de las solicitudes de renovación de concesiones y variaciones de
      condiciones.

  BC-4490.30:
    name: Gestión del portafolio de concesiones
    description: |
      Mantenimiento del registro de concesiones, mapeo de límites y decisiones
      de renuncia en el portafolio.

  BC-4490.30.10:
    name: Gestión del registro de concesiones
    description: |
      Mantenimiento del registro corporativo de concesiones y los atributos
      fuente de verdad.

  BC-4490.30.20:
    name: Mapeo de límites de concesiones
    description: |
      Mapeo espacial y reconciliación de los límites de concesiones frente a los
      registros gubernamentales.

  BC-4490.30.30:
    name: Decisiones de renuncia de concesiones
    description: |
      Decisiones de renuncia parcial y total de concesiones para racionalizar el
      portafolio.

  BC-4490.40:
    name: Gestión de regalías gubernamentales
    description: |
      Cálculo, presentación y respuesta a auditorías de regalías basadas en la
      producción y ad valorem pagaderas a los gobiernos anfitriones.

  BC-4490.40.10:
    name: Cálculo de regalías de producción
    description: |
      Cálculo de regalías basadas en la producción y ad valorem sobre la
      producción mineral.

  BC-4490.40.20:
    name: Presentación de declaraciones de regalías
    description: |
      Presentación de declaraciones periódicas de regalías ante las autoridades
      tributarias del gobierno anfitrión.

  BC-4490.40.30:
    name: Respuesta a auditorías de regalías
    description: |
      Respuesta a auditorías y liquidaciones de regalías gubernamentales.

  BC-4490.50:
    name: Gestión de regalías privadas e indígenas
    description: |
      Administración de flujos de regalías privadas y obligaciones de regalías
      de participación en beneficios con pueblos indígenas.

  BC-4490.50.10:
    name: Administración de flujos de regalías privadas
    description: |
      Administración de los derechos de regalías de vendedores, financiadores y
      empresas de streaming.

  BC-4490.50.20:
    name: Administración de regalías de participación en beneficios indígenas
    description: |
      Administración de pagos de regalías y acuerdos de participación en
      beneficios con grupos indígenas y propietarios tradicionales.

  BC-4490.50.30:
    name: Informes de divulgación de regalías
    description: |
      Divulgación de pagos de regalías a inversores, reguladores y comunidades
      afectadas.

  BC-4490.60:
    name: Informes de transparencia extractiva
    description: |
      Informes de pagos a gobiernos, EITI y titularidad real bajo regímenes de
      transparencia extractiva.

  BC-4490.60.10:
    name: Informes de pagos a gobiernos
    description: |
      Informes obligatorios de pagos a gobiernos bajo los regímenes de la UE y
      equivalentes.

  BC-4490.60.20:
    name: Divulgación de transparencia extractiva
    description: |
      Informes de transparencia voluntaria del EITI y equivalentes sobre flujos
      de ingresos.

  BC-4490.60.30:
    name: Divulgación de titularidad real
    description: |
      Divulgación de la titularidad real de las entidades operadoras bajo el
      EITI y normas equivalentes.

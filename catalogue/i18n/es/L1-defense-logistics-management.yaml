locale: es
source: L1-defense-logistics-management.yaml
entries:
  BC-1720:
    name: Gestión de logística de defensa
    description: |
      Disponibilidad de material, sostenimiento, logística de despliegue y logística en teatro de operaciones.
  BC-1720.10:
    name: Gestión de disponibilidad de material
    description: |
      Informes de disponibilidad operacional y disponibilidad de flota y equipos.
  BC-1720.10.10:
    name: Seguimiento de disponibilidad de equipos
    description: |
      Seguimiento de la disponibilidad y operatividad de los equipos.
  BC-1720.10.20:
    name: Informes de disponibilidad operacional
    description: |
      Informes periódicos de disponibilidad operacional al mando.
  BC-1720.10.30:
    name: Mejora de la tasa de capacidad de misión
    description: |
      Iniciativas para mejorar las tasas de capacidad de misión.
  BC-1720.20:
    name: Gestión de inventario de defensa
    description: |
      Clases de suministro militar I-IX y reservas de guerra.
  BC-1720.20.10:
    name: Gestión de inventario clase I-V
    description: |
      Inventario de subsistencias, combustible, munición y consumibles.
  BC-1720.20.20:
    name: Gestión de inventario clase VII-IX
    description: |
      Gestión de inventario de artículos principales y repuestos.
  BC-1720.20.30:
    name: Gestión de material de reserva de guerra
    description: |
      Gestión de existencias de reserva de guerra y preposicionadas.
  BC-1720.20.40:
    name: Gestión de inventario de municiones
    description: |
      Gestión de inventario de municiones y explosivos.
  BC-1720.30:
    name: Gestión de despliegue y distribución
    description: |
      Logística de despliegue estratégico y táctico.
  BC-1720.30.10:
    name: Planificación de despliegue estratégico
    description: |
      Planificación del despliegue estratégico y TPFDD.
  BC-1720.30.20:
    name: Operaciones de transporte estratégico
    description: |
      Operaciones de transporte estratégico aéreo, marítimo y terrestre.
  BC-1720.30.30:
    name: Distribución en teatro de operaciones
    description: |
      Distribución y logística de sostenimiento en teatro de operaciones.
  BC-1720.30.40:
    name: Recepción conjunta y movimiento hacia adelante
    description: |
      Recepción conjunta, puesta en espera y movimiento hacia adelante.
  BC-1720.40:
    name: Gestión de mantenimiento de defensa
    description: |
      Mantenimiento orgánico y por contratista a nivel de depósito, intermedio y de unidad.
  BC-1720.40.10:
    name: Mantenimiento a nivel de unidad
    description: |
      Mantenimiento a nivel de unidad (O-level).
  BC-1720.40.20:
    name: Mantenimiento a nivel intermedio
    description: |
      Mantenimiento y reparación a nivel intermedio (I-level).
  BC-1720.40.30:
    name: Mantenimiento a nivel de depósito
    description: |
      Mantenimiento y revisión general a nivel de depósito (D-level).
  BC-1720.40.40:
    name: Apoyo logístico por contratista
    description: |
      Acuerdos de apoyo logístico por contratista.
  BC-1720.50:
    name: Gestión de repuestos y aprovisionamiento
    description: |
      Aprovisionamiento inicial, reposición y satisfacción de demanda.
  BC-1720.50.10:
    name: Aprovisionamiento inicial
    description: |
      Aprovisionamiento inicial de repuestos para nuevas plataformas.
  BC-1720.50.20:
    name: Reposición de repuestos
    description: |
      Reposición de repuestos en función de la demanda y las previsiones.
  BC-1720.50.30:
    name: Seguimiento de satisfacción de demanda
    description: |
      Seguimiento de la satisfacción de demanda y tasa de cobertura.
  BC-1720.50.40:
    name: Catalogación y gestión de NSN
    description: |
      Catalogación con número de existencias NATO (NSN) e identificación de artículos.

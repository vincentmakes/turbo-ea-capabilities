locale: es
source: L1-drug-discovery-management.yaml
entries:
  BC-1500:
    name: Gestión del descubrimiento de fármacos
    description: |
      Identifica y valida dianas terapéuticas, ejecuta campañas de cribado y optimiza series de compuestos hasta nominar un candidato preclínico.
  BC-1500.10:
    name: Gestión de identificación y validación de dianas
    description: |
      Abarca la biología de la enfermedad, la identificación de dianas moleculares y su validación experimental para sustentar el progreso hacia el descubrimiento de fármacos.
  BC-1500.10.10:
    name: Investigación de biología de la enfermedad
    description: |
      Investigación de los mecanismos y vías moleculares implicados en la enfermedad.
  BC-1500.10.20:
    name: Identificación de dianas
    description: |
      Identificación de dianas biológicas mediante enfoques ómicos y genéticos.
  BC-1500.10.30:
    name: Validación de dianas
    description: |
      Validación de dianas a través de modelos in vitro e in vivo.
  BC-1500.10.40:
    name: Evaluación de drogabilidad de dianas
    description: |
      Evaluación de la drogabilidad y tractabilidad de las dianas identificadas.
  BC-1500.20:
    name: Gestión del descubrimiento de hits
    description: |
      Desarrolla ensayos, ejecuta cribados de alto rendimiento y técnicas virtuales para identificar y confirmar hits de interés.
  BC-1500.20.10:
    name: Desarrollo de ensayos
    description: |
      Desarrollo de ensayos bioquímicos y celulares para cribado de compuestos.
  BC-1500.20.20:
    name: Cribado de alto rendimiento
    description: |
      Ejecución de campañas de cribado de alto rendimiento (HTS) sobre bibliotecas de compuestos.
  BC-1500.20.30:
    name: Cribado virtual y basado en IA
    description: |
      Cribado virtual e identificación de hits mediante inteligencia artificial.
  BC-1500.20.40:
    name: Clasificación y confirmación de hits
    description: |
      Clasificación, confirmación y priorización de los hits obtenidos en el cribado.
  BC-1500.30:
    name: Gestión de la optimización de leads
    description: |
      Aplica química médica, análisis SAR y perfilado ADMET para optimizar series de leads hasta la selección del candidato.
  BC-1500.30.10:
    name: Síntesis en química médica
    description: |
      Síntesis y diseño de compuestos en el contexto de la química médica.
  BC-1500.30.20:
    name: Análisis de relación estructura-actividad
    description: |
      Análisis SAR para guiar la optimización estructural de los compuestos.
  BC-1500.30.30:
    name: Perfilado ADMET
    description: |
      Perfilado ADMET in vitro de las series en optimización.
  BC-1500.30.40:
    name: Selección de series de leads
    description: |
      Selección de las series de leads resultantes de las campañas de optimización.
  BC-1500.40:
    name: Gestión de la selección del candidato preclínico
    description: |
      Perfila candidatos frente al perfil de producto objetivo, gestiona la nominación formal y coordina los estudios habilitantes para el IND.
  BC-1500.40.10:
    name: Perfilado del candidato preclínico
    description: |
      Perfilado de candidatos preclínicos frente al perfil de producto objetivo.
  BC-1500.40.20:
    name: Gobernanza de nominación de candidatos
    description: |
      Gobernanza y nominación formal de candidatos preclínicos.
  BC-1500.40.30:
    name: Coordinación de estudios habilitantes para IND
    description: |
      Coordinación de estudios de toxicología y seguridad habilitantes para el IND.
  BC-1500.50:
    name: Gestión de la investigación traslacional
    description: |
      Conecta el descubrimiento con el desarrollo clínico mediante ciencia traslacional, desarrollo de biomarcadores y estrategias de estratificación de pacientes.
  BC-1500.50.10:
    name: Ciencia traslacional
    description: |
      Ciencia traslacional que conecta el descubrimiento con el desarrollo clínico.
  BC-1500.50.20:
    name: Descubrimiento y desarrollo de biomarcadores
    description: |
      Descubrimiento y desarrollo de biomarcadores para el seguimiento clínico.
  BC-1500.50.30:
    name: Estrategia de estratificación de pacientes
    description: |
      Estrategias de estratificación de pacientes para el diseño de ensayos clínicos.
  BC-1500.60:
    name: Gestión de compuestos y bibliotecas
    description: |
      Mantiene las bibliotecas de compuestos, gestiona las muestras del repositorio y controla los materiales de reactivos y biológicos.
  BC-1500.60.10:
    name: Curación de la biblioteca de compuestos
    description: |
      Curación y registro de las bibliotecas de compuestos disponibles.
  BC-1500.60.20:
    name: Gestión de muestras y repositorio
    description: |
      Almacenamiento, recuperación y cadena de custodia de muestras.
  BC-1500.60.30:
    name: Gestión de reactivos y materiales biológicos
    description: |
      Gestión de reactivos y materiales biológicos para investigación.

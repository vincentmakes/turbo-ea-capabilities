locale: es
source: L1-design-management.yaml
entries:
  BC-1120:
    name: Gestión de diseño
    description: |
      Ciclo de vida del diseño de ingeniería desde la concepción hasta el diseño detallado y la verificación.
  BC-1120.10:
    name: Gestión del diseño conceptual
    description: |
      Estudios de concepto, factibilidad, análisis de opciones y pre-FEED.
  BC-1120.10.10:
    name: Definición del estudio de concepto
    description: |
      Alcance del estudio de concepto, base de diseño y supuestos.
  BC-1120.10.20:
    name: Análisis de factibilidad
    description: |
      Análisis de factibilidad técnica, de cronograma y económica.
  BC-1120.10.30:
    name: Análisis y selección de opciones
    description: |
      Análisis multicriterio de opciones y selección del concepto.
  BC-1120.20:
    name: Gestión del diseño de ingeniería de pre-inversión
    description: |
      FEED, ingeniería básica y definición del alcance y costo.
  BC-1120.20.10:
    name: Diseño de ingeniería básica
    description: |
      Ingeniería básica de las disciplinas de proceso, mecánica y eléctrica.
  BC-1120.20.20:
    name: Estimación de costo y cronograma del FEED
    description: |
      Estimaciones de costo y cronograma clase 3/clase 2 a partir del FEED.
  BC-1120.20.30:
    name: Producción de entregables del FEED
    description: |
      Producción de entregables del FEED y base de diseño.
  BC-1120.30:
    name: Gestión del diseño detallado
    description: |
      Ingeniería detallada, planos de trabajo, especificaciones y cómputo de obra.
  BC-1120.30.10:
    name: Cálculos detallados de ingeniería
    description: |
      Cálculos y análisis detallados por disciplina.
  BC-1120.30.20:
    name: Producción de planos de construcción
    description: |
      Producción de planos emitidos para construcción.
  BC-1120.30.30:
    name: Elaboración de especificaciones detalladas
    description: |
      Elaboración de especificaciones detalladas de equipos y materiales.
  BC-1120.30.40:
    name: Producción del cómputo de obra
    description: |
      Producción y gestión del cómputo de obra para adquisición y construcción.
  BC-1120.40:
    name: Gestión de revisión y verificación del diseño
    description: |
      HAZOP, revisiones de diseño, verificación y validación.
  BC-1120.40.10:
    name: Talleres HAZOP y HAZID
    description: |
      Facilitación de talleres de identificación de peligros y HAZOP.
  BC-1120.40.20:
    name: Puntos de control de revisión del diseño
    description: |
      Revisiones de diseño por etapa (30%, 60%, 90%).
  BC-1120.40.30:
    name: Verificación del diseño
    description: |
      Verificación del diseño frente a requisitos y normas.
  BC-1120.40.40:
    name: Validación del diseño
    description: |
      Validación del diseño frente al uso previsto y necesidades del cliente.
  BC-1120.50:
    name: Gestión de software y CAD de diseño
    description: |
      Herramientas CAD/CAE, modelado 3D, BIM y entorno digital de diseño.
  BC-1120.50.10:
    name: Gestión de estándares CAD
    description: |
      Estándares CAD, esquemas de capas y bibliotecas de plantillas.
  BC-1120.50.20:
    name: Gestión del modelo 3D
    description: |
      Gestión de modelos 3D integrados de todas las disciplinas.
  BC-1120.50.30:
    name: Gestión del entorno BIM
    description: |
      Entorno de datos compartidos BIM y alineación con ISO 19650.
  BC-1120.50.40:
    name: Administración del software de ingeniería
    description: |
      Administración y licenciamiento de herramientas de software de ingeniería.
  BC-1120.60:
    name: Gestión de coordinación multidisciplinaria del diseño
    description: |
      Coordinación entre disciplinas, detección de interferencias y gestión del modelo integrado.
  BC-1120.60.10:
    name: Detección de interferencias
    description: |
      Detección de interferencias entre modelos 3D de cada disciplina.
  BC-1120.60.20:
    name: Coordinación del modelo integrado
    description: |
      Coordinación de modelos multidisciplinarios integrados.
  BC-1120.60.30:
    name: Resolución de problemas de diseño
    description: |
      Resolución de problemas de coordinación del diseño.

locale: es
source: L1-information-technology-management.yaml
entries:
  BC-600:
    name: Gestión de tecnología de la información
    description: |
      Estrategia de TI, arquitectura, servicios y operaciones para garantizar que la tecnología respalde los objetivos del negocio de forma eficiente y segura.
  BC-600.10:
    name: Gestión de la estrategia y arquitectura de TI
    description: |
      Estrategia de TI, arquitectura empresarial y estándares tecnológicos para orientar las inversiones y decisiones técnicas.
  BC-600.10.10:
    name: Desarrollo de la estrategia de TI
    description: |
      Definición de la estrategia de TI alineada con la estrategia del negocio.
  BC-600.10.20:
    name: Gestión de la arquitectura empresarial
    description: |
      Arquitectura empresarial alineada con TOGAF en las dimensiones de negocio, datos, aplicaciones y tecnología.
  BC-600.10.30:
    name: Gestión de estándares tecnológicos
    description: |
      Definición y gobierno de estándares y patrones tecnológicos.
  BC-600.10.40:
    name: Gestión de la hoja de ruta tecnológica
    description: |
      Hojas de ruta tecnológicas plurianuales y evolución de capacidades.
  BC-600.10.50:
    name: Gobierno y revisión de arquitectura
    description: |
      Comité de revisión de arquitectura, autoridad de diseño y gobierno de excepciones.
  BC-600.20:
    name: Gestión de la cartera y la demanda de TI
    description: |
      Cartera de TI, captación de demanda y priorización para asignar recursos a las iniciativas de mayor valor.
  BC-600.20.10:
    name: Captación de demanda de TI
    description: |
      Captura y clasificación de nuevas demandas de TI procedentes del negocio.
  BC-600.20.20:
    name: Gestión de la cartera de inversiones de TI
    description: |
      Visión de cartera de inversiones, proyectos y beneficios de TI.
  BC-600.20.30:
    name: Planificación de capacidad y recursos de TI
    description: |
      Planificación de la capacidad de entrega de TI entre equipos y perfiles.
  BC-600.20.40:
    name: Gestión de relaciones con el negocio
    description: |
      Colaboración como socio de negocio entre TI y las funciones empresariales.
  BC-600.30:
    name: Gestión de servicios de TI
    description: |
      Gestión de incidentes, problemas, cambios y catálogo de servicios para mantener la calidad y disponibilidad de los servicios de TI.
  BC-600.30.10:
    name: Gestión del catálogo de servicios
    description: |
      Definición y mantenimiento del catálogo de servicios y los acuerdos de nivel de servicio.
  BC-600.30.20:
    name: Gestión de incidentes
    description: |
      Detección, clasificación, resolución y comunicación de incidentes.
  BC-600.30.30:
    name: Gestión de problemas
    description: |
      Análisis de causa raíz y prevención de incidentes recurrentes.
  BC-600.30.40:
    name: Gestión de cambios y entregas
    description: |
      Aprobación de cambios de TI y gestión de entregas.
  BC-600.30.50:
    name: Gestión del nivel de servicio
    description: |
      Definición, medición e informe de los niveles de servicio.
  BC-600.30.60:
    name: Gestión de configuraciones
    description: |
      Elementos de configuración, CMDB y gestión de dependencias.
  BC-600.40:
    name: Gestión de operaciones de TI
    description: |
      Operaciones diarias de TI, monitorización y automatización para garantizar la disponibilidad y el rendimiento de los servicios.
  BC-600.40.10:
    name: Gestión de eventos y monitorización
    description: |
      Telemetría, observabilidad, correlación de eventos y alertas.
  BC-600.40.20:
    name: Programación de trabajos y operaciones batch de TI
    description: |
      Programación de trabajos, orquestación de procesos batch y automatización de cargas de trabajo.
  BC-600.40.30:
    name: Gestión de capacidad y rendimiento de TI
    description: |
      Planificación de capacidad y optimización del rendimiento de los servicios.
  BC-600.40.40:
    name: Operaciones de continuidad del servicio de TI
    description: |
      Pruebas de continuidad y operaciones de recuperación del servicio de TI.
  BC-600.40.50:
    name: Gestión de la automatización de TI
    description: |
      Automatización, manuales de operación y orquestación para las operaciones de TI.
  BC-600.50:
    name: Gestión de la infraestructura de TI
    description: |
      Cómputo, almacenamiento, red e infraestructura en la nube para soportar los servicios y aplicaciones de TI.
  BC-600.50.10:
    name: Gestión de cómputo y servidores
    description: |
      Aprovisionamiento y operación de cómputo físico y virtual.
  BC-600.50.20:
    name: Gestión del almacenamiento
    description: |
      Aprovisionamiento, estratificación y protección del almacenamiento.
  BC-600.50.30:
    name: Gestión de redes
    description: |
      Gestión de LAN, WAN, SD-WAN y servicios de red.
  BC-600.50.40:
    name: Gestión de plataformas en la nube
    description: |
      Operaciones de plataformas en la nube pública, privada e híbrida.
  BC-600.50.50:
    name: Gestión del cómputo de usuario final
    description: |
      Dispositivos de trabajo, gestión de endpoints y herramientas de colaboración.
  BC-600.60:
    name: Gestión de aplicaciones de TI
    description: |
      Ciclo de vida de aplicaciones, racionalización y soporte para garantizar que el portafolio de aplicaciones sea adecuado y eficiente.
  BC-600.60.10:
    name: Gestión del portafolio de aplicaciones
    description: |
      Catálogo de aplicaciones, propietarios y estado del ciclo de vida.
  BC-600.60.20:
    name: Desarrollo e ingeniería de aplicaciones
    description: |
      Desarrollo de software, prácticas de ingeniería y DevOps.
  BC-600.60.30:
    name: Mantenimiento y soporte de aplicaciones
    description: |
      Servicio de mantenimiento de aplicaciones, resolución de defectos y entrega de mejoras menores.
  BC-600.60.40:
    name: Racionalización de aplicaciones
    description: |
      Racionalización, consolidación y desmantelamiento de aplicaciones.
  BC-600.60.50:
    name: Gestión de integraciones y APIs
    description: |
      Plataformas de integración, APIs y transmisión de eventos.
  BC-600.70:
    name: Gestión de proveedores de TI
    description: |
      Contratos con proveedores de TI, rendimiento y gestión del ecosistema tecnológico.
  BC-600.70.10:
    name: Incorporación de proveedores de TI
    description: |
      Incorporación y contratación de proveedores y socios de TI.
  BC-600.70.20:
    name: Gestión del rendimiento de proveedores de TI
    description: |
      Cuadros de mando de rendimiento y gestión de SLA para proveedores de TI.
  BC-600.70.30:
    name: Gestión de licencias de software
    description: |
      Licencias de software, derechos de uso y gestión de auditorías.
  BC-600.70.40:
    name: Estrategia de aprovisionamiento de TI
    description: |
      Estrategia de decisión entre desarrollo propio, compra y servicios gestionados para TI.
  BC-600.80:
    name: Gestión financiera de TI
    description: |
      Gasto de TI, repercusión de costes y optimización del gasto tecnológico para maximizar el valor de las inversiones.
  BC-600.80.10:
    name: Presupuestación y previsión de TI
    description: |
      Planificación del presupuesto de TI, previsión y análisis de desviaciones.
  BC-600.80.20:
    name: Asignación de costes y repercusión interna de TI
    description: |
      Showback, chargeback y asignación de costes basada en TBM.
  BC-600.80.30:
    name: Gestión de FinOps en la nube
    description: |
      Prácticas FinOps para la visibilidad y optimización de los costes en la nube.
  BC-600.80.40:
    name: Seguimiento del valor y beneficios de TI
    description: |
      Seguimiento del valor de las inversiones en TI y la realización de beneficios.

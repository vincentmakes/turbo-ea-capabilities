locale: es
source: L1-mining-community-social-performance-management.yaml
entries:
  BC-4500:
    name: Gestión del desempeño social y comunitario minero
    description: |
      Mantenimiento de la licencia social para operar mediante el relacionamiento
      con comunidades anfitrionas, pueblos indígenas y propietarios
      tradicionales, reasentamiento y acceso a tierras, inversión comunitaria,
      contenido local, derechos humanos e informes de desempeño social.

  BC-4500.10:
    name: Relacionamiento con comunidades anfitrionas
    description: |
      Identificación, consulta y gestión de quejas con las comunidades
      anfitrionas afectadas por las operaciones mineras.
    in_scope:
      - Identificación y mapeo de partes interesadas
      - Programas de consulta comunitaria
      - Mecanismos de quejas comunitarias
    out_of_scope:
      - Relacionamiento específico con pueblos indígenas (BC-4500.20)
      - Reasentamiento (BC-4500.30)

  BC-4500.10.10:
    name: Mapeo de partes interesadas comunitarias
    description: |
      Identificación y mapeo de las partes interesadas en el área de influencia
      de la operación minera.

  BC-4500.10.20:
    name: Programa de consulta comunitaria
    description: |
      Operación de foros estructurados de consulta comunitaria y divulgación de
      información.

  BC-4500.10.30:
    name: Gestión de quejas comunitarias
    description: |
      Mecanismo operativo de quejas comunitarias alineado con los criterios de
      efectividad de los Principios Rectores de las Naciones Unidas.

  BC-4500.20:
    name: Relacionamiento con pueblos indígenas y propietarios tradicionales
    description: |
      Relacionamiento con grupos indígenas y propietarios tradicionales,
      incluyendo título nativo, patrimonio cultural y acuerdos de participación
      en beneficios.

  BC-4500.20.10:
    name: Relacionamiento sobre título nativo y derechos sobre la tierra
    description: |
      Relacionamiento sobre el título nativo y los derechos consuetudinarios
      sobre la tierra que afectan las operaciones mineras.

  BC-4500.20.20:
    name: Gestión del patrimonio cultural
    description: |
      Identificación, protección y gestión de sitios y valores del patrimonio
      cultural.

  BC-4500.20.30:
    name: Administración de acuerdos de uso de tierras indígenas
    description: |
      Administración de acuerdos de uso de tierras indígenas y de participación
      en beneficios.

  BC-4500.30:
    name: Gestión de reasentamiento y acceso a tierras
    description: |
      Adquisición de tierras, reasentamiento involuntario y restauración de
      medios de vida para las personas afectadas por el proyecto.

  BC-4500.30.10:
    name: Negociación de adquisición de tierras
    description: |
      Negociación de adquisiciones voluntarias de tierras para la minería y la
      infraestructura asociada.

  BC-4500.30.20:
    name: Planificación del reasentamiento involuntario
    description: |
      Planificación del reasentamiento involuntario alineada con las Normas de
      Desempeño de la IFC y regímenes equivalentes.

  BC-4500.30.30:
    name: Implementación del plan de acción de reasentamiento
    description: |
      Implementación de los planes de acción de reasentamiento para los hogares
      afectados por el proyecto.

  BC-4500.30.40:
    name: Operaciones del programa de restauración de medios de vida
    description: |
      Operación de programas de restauración de medios de vida para hogares
      desplazados y comunidades anfitrionas.

  BC-4500.40:
    name: Inversión y desarrollo comunitario
    description: |
      Diseño y ejecución de programas de inversión comunitaria y coinversión en
      infraestructura y proyectos de desarrollo local.

  BC-4500.40.10:
    name: Diseño de programas de inversión comunitaria
    description: |
      Diseño de programas plurianuales de inversión comunitaria alineados con
      los planes de desarrollo local.

  BC-4500.40.20:
    name: Coinversión en infraestructura local
    description: |
      Coinversión en caminos, agua, energía e infraestructura social compartida
      con las comunidades anfitrionas.

  BC-4500.40.30:
    name: Ejecución de proyectos de desarrollo comunitario
    description: |
      Ejecución de proyectos de desarrollo comunitario en salud, educación y
      medios de vida.

  BC-4500.50:
    name: Gestión de contenido local y adquisiciones
    description: |
      Desarrollo de proveedores locales, programas de empleo local e informes
      frente a los compromisos de contenido local.

  BC-4500.50.10:
    name: Desarrollo de proveedores locales
    description: |
      Desarrollo y fortalecimiento de capacidades de proveedores locales e
      indígenas.

  BC-4500.50.20:
    name: Gestión de programas de empleo local
    description: |
      Gestión de programas de empleo, formación y aprendizaje local para
      trabajadores de las comunidades anfitrionas.

  BC-4500.50.30:
    name: Informes de contenido local
    description: |
      Informes frente a los compromisos de contenido local del gobierno anfitrión
      y contractuales.

  BC-4500.60:
    name: Gestión de derechos humanos y seguridad
    description: |
      Diligencia debida en derechos humanos, alineación con los Principios
      Voluntarios sobre Seguridad y Derechos Humanos y supervisión de la
      conducta de proveedores de seguridad.

  BC-4500.60.10:
    name: Diligencia debida en derechos humanos
    description: |
      Evaluación del impacto en derechos humanos y diligencia debida a nivel de
      sitio conforme a los Principios Rectores de la ONU.

  BC-4500.60.20:
    name: Cumplimiento de los Principios Voluntarios
    description: |
      Cumplimiento de los Principios Voluntarios sobre Seguridad y Derechos
      Humanos en las operaciones de seguridad.

  BC-4500.60.30:
    name: Supervisión de la conducta de proveedores de seguridad
    description: |
      Supervisión de la conducta de proveedores de seguridad públicos y privados
      en los sitios mineros.

  BC-4500.70:
    name: Informes de desempeño social
    description: |
      Seguimiento de indicadores de desempeño social, evaluación del impacto
      social y divulgación externa del desempeño social.

  BC-4500.70.10:
    name: Seguimiento de indicadores de desempeño social
    description: |
      Seguimiento de indicadores de desempeño social en operaciones e
      inversiones.

  BC-4500.70.20:
    name: Evaluación del impacto social
    description: |
      Evaluación periódica del impacto social de las operaciones mineras en las
      comunidades anfitrionas.

  BC-4500.70.30:
    name: Divulgación externa del desempeño social
    description: |
      Divulgación externa del desempeño social en informes de sostenibilidad y
      presentaciones regulatorias.

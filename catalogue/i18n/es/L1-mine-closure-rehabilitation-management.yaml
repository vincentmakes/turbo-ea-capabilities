locale: es
source: L1-mine-closure-rehabilitation-management.yaml
entries:
  BC-4470:
    name: Gestión de cierre y rehabilitación de minas
    description: |
      Planificación del cierre, provisión financiera, rehabilitación progresiva,
      descomisionamiento y administración postcierrre de terrenos e
      infraestructura minera.

  BC-4470.10:
    name: Planificación del cierre
    description: |
      Desarrollo de planes de cierre desde el nivel conceptual hasta el
      detallado, con participación de las partes interesadas y aprobación
      regulatoria.
    in_scope:
      - Planes de cierre conceptuales y del ciclo de vida del activo
      - Revisiones de planes detallados de cierre previas al cese
      - Consulta con reguladores y comunidades sobre el cierre
    out_of_scope:
      - Instrumentos de provisión financiera (BC-4470.20)

  BC-4470.10.10:
    name: Desarrollo del plan conceptual de cierre
    description: |
      Desarrollo de planes conceptuales de cierre durante las etapas tempranas
      del proyecto.

  BC-4470.10.20:
    name: Desarrollo del plan detallado de cierre
    description: |
      Desarrollo de planes detallados de cierre para la aprobación regulatoria
      antes del cese de operaciones.

  BC-4470.10.30:
    name: Participación de las partes interesadas en el cierre
    description: |
      Participación de reguladores, comunidades y propietarios tradicionales en
      los resultados del cierre.

  BC-4470.20:
    name: Provisión financiera para el cierre
    description: |
      Estimación de costos, gestión de instrumentos de garantía financiera y
      contabilización de provisiones de cierre.

  BC-4470.20.10:
    name: Estimación del costo de cierre
    description: |
      Estimación del costo de cierre que abarca actividades de rehabilitación,
      descomisionamiento y postcierre.

  BC-4470.20.20:
    name: Gestión de instrumentos de garantía financiera
    description: |
      Gestión de bonos, garantías e instrumentos de aval depositados ante los
      reguladores.

  BC-4470.20.30:
    name: Contabilización de provisiones de cierre
    description: |
      Remedición periódica y reconocimiento de provisiones de cierre en los
      estados financieros.

  BC-4470.30:
    name: Operaciones de rehabilitación progresiva
    description: |
      Rehabilitación concurrente de terrenos perturbados junto a las
      operaciones, incluyendo modelado de la forma del terreno, revegetación y
      reinstalación de cursos de agua.

  BC-4470.30.10:
    name: Remodelación de la forma del terreno
    description: |
      Remodelación de botaderos, paredes de pit y formas del terreno de relaves
      a perfiles de cierre estables.

  BC-4470.30.20:
    name: Reposición de suelo vegetal y revegetación
    description: |
      Reposición del suelo vegetal almacenado y establecimiento de cobertura
      vegetal nativa.

  BC-4470.30.30:
    name: Reinstalación de cursos de agua
    description: |
      Reinstalación de cursos de agua naturales y construidos en terrenos
      rehabilitados.

  BC-4470.30.40:
    name: Descomisionamiento de infraestructura
    description: |
      Descomisionamiento progresivo de infraestructura operativa redundante
      durante las operaciones.

  BC-4470.40:
    name: Descomisionamiento del sitio minero
    description: |
      Desmontaje al final de la vida útil, disposición de activos y limpieza del
      sitio al cesar las operaciones.

  BC-4470.40.10:
    name: Desmontaje de la planta
    description: |
      Desmontaje de la planta de proceso, la infraestructura minera y los
      edificios de superficie.

  BC-4470.40.20:
    name: Disposición y recuperación de activos
    description: |
      Disposición, recuperación o transferencia de activos mineros y de
      procesamiento durante el descomisionamiento.

  BC-4470.40.30:
    name: Operaciones de limpieza del sitio
    description: |
      Limpieza de suelos contaminados, hidrocarburos y materiales almacenados
      durante el descomisionamiento.

  BC-4470.50:
    name: Administración postcierre
    description: |
      Monitoreo a largo plazo, restitución y gestión de pasivos heredados tras
      el cese de las operaciones.

  BC-4470.50.10:
    name: Operaciones de monitoreo a largo plazo
    description: |
      Operación de programas de monitoreo a largo plazo de agua, geotécnica y
      revegetación.

  BC-4470.50.20:
    name: Gestión de restitución y entrega de terrenos
    description: |
      Gestión de la restitución de terrenos, la entrega de concesiones y la
      aprobación regulatoria.

  BC-4470.50.30:
    name: Seguimiento de pasivos heredados
    description: |
      Seguimiento y divulgación de pasivos ambientales heredados retenidos.

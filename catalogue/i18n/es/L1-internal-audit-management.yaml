locale: es
source: L1-internal-audit-management.yaml
entries:
  BC-140:
    name: Gestión de auditoría interna
    description: |
      Aseguramiento independiente sobre la eficacia del gobierno, el riesgo y el control.
  BC-140.10:
    name: Gestión de la planificación de auditoría
    description: |
      Planificación de auditoría basada en riesgos y gestión del universo auditable.
  BC-140.10.10:
    name: Gestión del universo auditable
    description: |
      Definición y mantenimiento del universo auditable y sus calificaciones de riesgo.
  BC-140.10.20:
    name: Elaboración del plan anual basado en riesgos
    description: |
      Plan de auditoría anual priorizado por riesgo y asignación de recursos.
  BC-140.10.30:
    name: Alcance de los compromisos de auditoría
    description: |
      Objetivos, alcance, criterios y diseño del programa de auditoría.
  BC-140.20:
    name: Gestión de la ejecución de auditorías
    description: |
      Trabajo de campo, recopilación de evidencias e informes de auditoría.
  BC-140.20.10:
    name: Trabajo de campo de auditoría
    description: |
      Recorridos, pruebas de controles y recopilación de evidencias.
  BC-140.20.20:
    name: Gestión de papeles de trabajo de auditoría
    description: |
      Documentación de evidencias, conclusiones y revisión supervisora.
  BC-140.20.30:
    name: Reporte de auditoría
    description: |
      Redacción, aprobación y emisión de informes y opiniones de auditoría.
  BC-140.20.40:
    name: Auditoría continua y basada en datos
    description: |
      Uso de analítica y supervisión continua en las auditorías.
  BC-140.30:
    name: Gestión de hallazgos y remediaciones de auditoría
    description: |
      Seguimiento de incidencias, acciones de la dirección y seguimiento posterior.
  BC-140.30.10:
    name: Captura y calificación de hallazgos
    description: |
      Captura estandarizada y calificación de los hallazgos de auditoría.
  BC-140.30.20:
    name: Seguimiento de acciones de la dirección
    description: |
      Seguimiento de las acciones acordadas por la dirección hasta su cierre.
  BC-140.30.30:
    name: Validación de la remediación
    description: |
      Validación independiente de la eficacia de la remediación.
  BC-140.40:
    name: Aseguramiento de la calidad de auditoría
    description: |
      Control de calidad sobre la metodología y la ejecución de las auditorías.
  BC-140.40.10:
    name: Gestión de la metodología de auditoría
    description: |
      Mantenimiento de la metodología de auditoría alineada con las Normas del IIA.
  BC-140.40.20:
    name: Revisiones de calidad internas
    description: |
      Revisiones periódicas internas de control de calidad de los compromisos de auditoría.
  BC-140.40.30:
    name: Evaluación de calidad externa
    description: |
      Evaluaciones de calidad externas y conformidad con los estándares profesionales.

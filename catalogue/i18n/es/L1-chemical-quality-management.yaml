locale: es
source: L1-chemical-quality-management.yaml
entries:
  BC-4670:
    name: Gestión de calidad química
    description: |
      Establecimiento de especificaciones específicas de productos químicos, operaciones de laboratorio analítico, liberación de lotes, gestión de reclamaciones y disputas sobre certificados de análisis, materiales de referencia y cumplimiento de las BPF sectoriales. Distinta de la Gestión de Calidad transversal (BC-720), que abarca el SGC empresarial.
  BC-4670.10:
    name: Gestión de especificaciones químicas
    description: |
      Establecimiento y gestión del ciclo de vida de las especificaciones de materias primas, intermedios y productos acabados.
  BC-4670.10.10:
    name: Establecimiento de especificaciones de materias primas
    description: |
      Establecimiento y revisión de especificaciones de materias primas entrantes.
  BC-4670.10.20:
    name: Establecimiento de especificaciones de intermedios
    description: |
      Establecimiento de especificaciones de intermedios a lo largo de la cadena de producción.
  BC-4670.10.30:
    name: Establecimiento de especificaciones de productos acabados
    description: |
      Establecimiento de especificaciones de productos acabados y criterios de liberación.
  BC-4670.10.40:
    name: Gestión del ciclo de vida de especificaciones
    description: |
      Gestión del ciclo de vida de las especificaciones aprobadas y sus cambios.
  BC-4670.20:
    name: Operaciones de laboratorio analítico
    description: |
      Operación de laboratorios de control de calidad que realizan química húmeda, cromatografía, espectroscopía y ensayos de propiedades físicas.
  BC-4670.20.10:
    name: Operaciones de laboratorio de química húmeda
    description: |
      Operación de flujos de trabajo analíticos de química húmeda.
  BC-4670.20.20:
    name: Operaciones de cromatografía
    description: |
      Operación de plataformas de HPLC, GC y cromatografía iónica.
  BC-4670.20.30:
    name: Operaciones de espectroscopía
    description: |
      Operación de plataformas de FTIR, RMN, ICP y espectrometría de masas.
  BC-4670.20.40:
    name: Ensayos de propiedades físicas
    description: |
      Ensayos de propiedades físicas como viscosidad, densidad y tamaño de partícula.
  BC-4670.30:
    name: Gestión de la liberación de lotes
    description: |
      Decisiones de disposición, emisión de certificados de análisis y gestión de resultados fuera de especificación para lotes químicos.
  BC-4670.30.10:
    name: Decisión de disposición de lotes
    description: |
      Decisión de disposición de lotes fabricados frente a especificación.
  BC-4670.30.20:
    name: Emisión de certificados de análisis
    description: |
      Emisión de certificados de análisis a los clientes.
  BC-4670.30.30:
    name: Investigación de resultados fuera de especificación
    description: |
      Investigación de resultados analíticos fuera de especificación.
  BC-4670.40:
    name: Gestión de reclamaciones de clientes y disputas sobre COA
    description: |
      Captura y resolución de reclamaciones de clientes y disputas sobre certificados de análisis.
  BC-4670.40.10:
    name: Captura de reclamaciones de clientes
    description: |
      Captura y clasificación de reclamaciones de clientes sobre productos químicos.
  BC-4670.40.20:
    name: Investigación de disputas sobre COA
    description: |
      Investigación de disputas sobre valores del certificado de análisis.
  BC-4670.40.30:
    name: Nuevo ensayo de muestras de clientes
    description: |
      Nuevo ensayo de muestras retenidas y suministradas por clientes.
  BC-4670.50:
    name: Gestión de materiales y estándares de referencia
    description: |
      Aprovisionamiento, cualificación y monitorización de la estabilidad de estándares y materiales de referencia.
  BC-4670.50.10:
    name: Aprovisionamiento de estándares de referencia
    description: |
      Aprovisionamiento de materiales de referencia certificados de proveedores acreditados.
  BC-4670.50.20:
    name: Cualificación de estándares de referencia internos
    description: |
      Cualificación de estándares de referencia de trabajo internos.
  BC-4670.50.30:
    name: Monitorización de la estabilidad de estándares de referencia
    description: |
      Monitorización de la estabilidad de los estándares de referencia en uso.
  BC-4670.60:
    name: Desarrollo y validación de métodos
    description: |
      Desarrollo, validación y transferencia de métodos analíticos entre laboratorios.
  BC-4670.60.10:
    name: Desarrollo de métodos analíticos
    description: |
      Desarrollo de nuevos métodos analíticos para respaldar las especificaciones.
  BC-4670.60.20:
    name: Validación de métodos
    description: |
      Validación de métodos analíticos en cuanto a exactitud, precisión y robustez.
  BC-4670.60.30:
    name: Transferencia de métodos
    description: |
      Transferencia de métodos validados entre laboratorios.
  BC-4670.70:
    name: Cumplimiento de BPF sectoriales
    description: |
      Cumplimiento de los regímenes de BPF sectoriales para productos químicos suministrados a mercados regulados aguas abajo.
  BC-4670.70.10:
    name: Cumplimiento de las BPF EFfCI
    description: |
      Cumplimiento de las BPF EFfCI para ingredientes cosméticos.
  BC-4670.70.20:
    name: Cumplimiento de las BPF IPEC
    description: |
      Cumplimiento de las BPF IPEC para excipientes farmacéuticos.
  BC-4670.70.30:
    name: Cumplimiento de normativa de contacto con alimentos
    description: |
      Cumplimiento de la normativa de contacto con alimentos para productos químicos suministrados a envases alimentarios.

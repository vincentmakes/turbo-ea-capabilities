locale: es
source: L1-aeronautical-information-management.yaml
entries:
  BC-1230:
    name: Gestión de información aeronáutica
    description: |
      AIP, NOTAM, bases de datos aeronáuticas, cartografía y AIM digital.
  BC-1230.10:
    name: Gestión de la publicación de información aeronáutica
    description: |
      AIP, ciclo AIRAC, enmiendas y suplementos.
  BC-1230.10.10:
    name: Producción del AIP
    description: |
      Producción de la Publicación de Información Aeronáutica.
  BC-1230.10.20:
    name: Gestión del ciclo AIRAC
    description: |
      Gestión del ciclo AIRAC y fechas de entrada en vigor.
  BC-1230.10.30:
    name: Emisión de enmiendas y suplementos del AIP
    description: |
      Emisión de enmiendas y suplementos del AIP.
  BC-1230.20:
    name: Gestión de NOTAM
    description: |
      Originación, publicación, difusión y caducidad de NOTAM.
  BC-1230.20.10:
    name: Originación de NOTAM
    description: |
      Originación y redacción de NOTAM.
  BC-1230.20.20:
    name: Publicación y difusión de NOTAM
    description: |
      Publicación y difusión mediante AFTN/AMHS.
  BC-1230.20.30:
    name: Gestión del ciclo de vida del NOTAM
    description: |
      Gestión del ciclo de vida, incluida la sustitución y cancelación de NOTAM.
  BC-1230.30:
    name: Gestión de bases de datos aeronáuticas
    description: |
      Integridad, trazabilidad y calidad de los datos aeronáuticos, y conformidad con el ciclo AIRAC.
  BC-1230.30.10:
    name: Originación de datos aeronáuticos
    description: |
      Originación y captura de datos aeronáuticos conforme al Anexo 15 de la OACI.
  BC-1230.30.20:
    name: Gestión de la calidad de los datos aeronáuticos
    description: |
      Controles de calidad de datos, exactitud, integridad y resolución.
  BC-1230.30.30:
    name: Distribución de datos aeronáuticos
    description: |
      Distribución de datos aeronáuticos a usuarios y herramientas.
  BC-1230.30.40:
    name: Trazabilidad y auditoría de datos
    description: |
      Trazabilidad de la procedencia de los datos aeronáuticos y auditoría.
  BC-1230.40:
    name: Gestión de cartografía y diseño de procedimientos
    description: |
      Cartas aeronáuticas, procedimientos de vuelo por instrumentos y diseño de procedimientos PBN.
  BC-1230.40.10:
    name: Producción de cartas aeronáuticas
    description: |
      Producción de cartas en ruta, terminales y de aeródromo.
  BC-1230.40.20:
    name: Diseño de procedimientos de vuelo por instrumentos
    description: |
      Diseño de SID, STAR y procedimientos de aproximación por instrumentos.
  BC-1230.40.30:
    name: Diseño de procedimientos de navegación basada en el rendimiento
    description: |
      Diseño de procedimientos PBN, incluidos RNP y RNAV.
  BC-1230.40.40:
    name: Validación y aprobación de procedimientos
    description: |
      Validación de procedimientos, verificación en vuelo y aprobación reglamentaria.
  BC-1230.50:
    name: Gestión de servicios AIM digitales
    description: |
      Productos de datos digitales, servicios SWIM y AIM legible por máquina.
  BC-1230.50.10:
    name: Gestión de productos de datos digitales
    description: |
      Gestión de productos de datos AIM digitales basados en AIXM.
  BC-1230.50.20:
    name: Provisión de servicios SWIM
    description: |
      Provisión de servicios de gestión de información de todo el sistema (SWIM).
  BC-1230.50.30:
    name: Distribución de AIM legible por máquina
    description: |
      Distribución de AIM legible por máquina a los suscriptores.

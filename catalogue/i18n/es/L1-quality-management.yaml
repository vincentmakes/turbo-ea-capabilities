locale: es
source: L1-quality-management.yaml
entries:
  BC-720:
    name: Gestión de calidad
    description: |
      Estrategia, aseguramiento y control de calidad en todos los resultados de la empresa para garantizar la satisfacción del cliente y el cumplimiento normativo.
  BC-720.10:
    name: Gestión de la estrategia y la política de calidad
    description: |
      Política, estándares y marco del sistema de gestión de calidad para orientar la cultura y el comportamiento de la organización.
  BC-720.10.10:
    name: Gestión del manual y la política de calidad
    description: |
      Manual de calidad y políticas alineados con ISO 9001 y estándares sectoriales.
  BC-720.10.20:
    name: Establecimiento de objetivos de calidad
    description: |
      Definición de objetivos de calidad, KPIs y metas.
  BC-720.10.30:
    name: Gobierno del sistema de gestión de calidad
    description: |
      Gobierno del alcance, la estructura y las responsabilidades del SGC.
  BC-720.10.40:
    name: Gestión del riesgo de calidad
    description: |
      Identificación, evaluación y tratamiento del riesgo de calidad.
  BC-720.20:
    name: Gestión del aseguramiento de la calidad
    description: |
      Sistemas de calidad, auditorías y certificación para demostrar la conformidad con los requisitos establecidos.
  BC-720.20.10:
    name: Auditorías internas de calidad
    description: |
      Planificación y ejecución de auditorías internas de calidad.
  BC-720.20.20:
    name: Gestión de la certificación externa
    description: |
      Gestión de la certificación ISO 9001 y otras certificaciones y vigilancias.
  BC-720.20.30:
    name: Validación y cualificación de procesos
    description: |
      Validación y cualificación de procesos y equipos.
  BC-720.20.40:
    name: Control de documentos y registros
    description: |
      Documentos controlados, registros y archivo de calidad.
  BC-720.30:
    name: Gestión del control de calidad
    description: |
      Inspecciones, ensayos y criterios de aceptación para verificar la conformidad de productos y procesos.
  BC-720.30.10:
    name: Planificación de la inspección
    description: |
      Planes de inspección, muestreo y criterios de aceptación.
  BC-720.30.20:
    name: Control de calidad en proceso
    description: |
      Control, medición y control estadístico de procesos en producción.
  BC-720.30.30:
    name: Inspección final y liberación
    description: |
      Inspección final, liberación de lotes y emisión de certificados de conformidad.
  BC-720.30.40:
    name: Gestión de la calibración
    description: |
      Calibración de equipos de medición y ensayo.
  BC-720.40:
    name: Gestión de no conformidades
    description: |
      Informes de no conformidad, desviaciones y CAPA para eliminar las causas de los fallos de calidad.
  BC-720.40.10:
    name: Notificación de no conformidades
    description: |
      Captura y clasificación de no conformidades y desviaciones.
  BC-720.40.20:
    name: Disposición y contención
    description: |
      Disposición del material no conforme y acciones de contención.
  BC-720.40.30:
    name: Acciones correctivas y preventivas
    description: |
      Proceso CAPA incluyendo análisis de causa raíz y verificación de eficacia.
  BC-720.40.40:
    name: Control de cambios
    description: |
      Control de cambios con impacto en la calidad.
  BC-720.50:
    name: Gestión de la mejora continua
    description: |
      Lean, Six Sigma, Kaizen y programas de mejora para elevar continuamente el rendimiento de la organización.
  BC-720.50.10:
    name: Gestión de ideas de mejora
    description: |
      Captura, evaluación y priorización de ideas de mejora.
  BC-720.50.20:
    name: Entrega de proyectos Lean y Seis Sigma
    description: |
      Metodología y entrega de proyectos Lean y Seis Sigma.
  BC-720.50.30:
    name: Formación en mejora continua
    description: |
      Formación y desarrollo de capacidades en métodos de mejora continua.
  BC-720.50.40:
    name: Seguimiento de la realización de beneficios
    description: |
      Seguimiento y verificación de los beneficios de los proyectos de mejora continua.
  BC-720.60:
    name: Gestión de la calidad orientada al cliente
    description: |
      Reclamaciones de clientes relacionadas con la calidad, devoluciones y calidad en campo para proteger la reputación y la fidelidad del cliente.
  BC-720.60.10:
    name: Gestión de reclamaciones de calidad de clientes
    description: |
      Captura, investigación y respuesta a reclamaciones de calidad de los clientes.
  BC-720.60.20:
    name: Análisis de fallos en campo
    description: |
      Análisis de fallos en campo y devoluciones en garantía.
  BC-720.60.30:
    name: Retirada de productos y notificación a clientes
    description: |
      Coordinación de retiradas de productos y notificaciones a clientes.
  BC-720.60.40:
    name: Informes de calidad orientados al cliente
    description: |
      Informes y cuadros de mando de calidad para los clientes.

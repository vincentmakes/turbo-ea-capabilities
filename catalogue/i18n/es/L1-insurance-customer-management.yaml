locale: es
source: L1-insurance-customer-management.yaml
entries:
  BC-2120:
    name: Gestión de clientes de seguros
    description: |
      Identidad del tomador, agregación de hogares y grupos, KYC, consentimientos
      y gestión del ciclo de vida de los clientes de seguros en todos los canales.
  BC-2120.10:
    name: Gestión de alta de tomadores
    description: |
      Captura de solicitudes, verificación de identidad, activación y comunicaciones de incorporación.
  BC-2120.10.10:
    name: Captura de solicitudes
    description: |
      Captura de nuevas solicitudes de tomadores a través de los canales disponibles.
  BC-2120.10.20:
    name: Verificación de identidad y titularidad real
    description: |
      Verificación de identidad e identificación de titularidad real para tomadores individuales y corporativos.
  BC-2120.10.30:
    name: Activación del tomador
    description: |
      Activación de registros, cuentas y acceso a canales del tomador.
  BC-2120.10.40:
    name: Comunicación de incorporación
    description: |
      Comunicación del estado de incorporación, paquetes de bienvenida y próximos pasos.
  BC-2120.20:
    name: Gestión de KYC y sanciones de seguros
    description: |
      Clasificación de riesgo del cliente, documentación KYC, cribado de sanciones y PEP, y actualización periódica.
  BC-2120.20.10:
    name: Clasificación de riesgo del cliente
    description: |
      Clasificación de riesgo de los clientes de seguros basada en factores de riesgo AML y de conducta.
  BC-2120.20.20:
    name: Recopilación de documentación KYC
    description: |
      Recopilación y validación de documentación KYC para clientes de seguros.
  BC-2120.20.30:
    name: Cribado de sanciones y PEP
    description: |
      Cribado de sanciones, PEP y medios adversos de tomadores y beneficiarios.
  BC-2120.20.40:
    name: Actualización periódica de KYC
    description: |
      Actualización periódica de la información KYC y reclasificación del riesgo.
  BC-2120.30:
    name: Gestión de atención al tomador
    description: |
      Mantenimiento de autoservicio, gestión de solicitudes de servicio entrantes, provisión de documentos y mantenimiento de beneficiarios.
  BC-2120.30.10:
    name: Mantenimiento de cuenta en autoservicio
    description: |
      Actualizaciones de autoservicio sobre datos de dirección, contacto y preferencias.
  BC-2120.30.20:
    name: Gestión de solicitudes de servicio entrantes
    description: |
      Gestión de solicitudes de servicio entrantes del tomador a través de los canales disponibles.
  BC-2120.30.30:
    name: Provisión de documentos y estados de cuenta
    description: |
      Provisión de documentos de póliza, estados de cuenta y certificados de seguro.
  BC-2120.30.40:
    name: Mantenimiento de beneficiarios y designados
    description: |
      Captura y mantenimiento de beneficiarios y designados en contratos de vida y pensiones.
  BC-2120.40:
    name: Gestión de información y consentimientos del cliente
    description: |
      Perfil, agregación de hogares y grupos, gestión de consentimientos y registro maestro.
  BC-2120.40.10:
    name: Mantenimiento del perfil del tomador
    description: |
      Mantenimiento del perfil y datos demográficos del tomador.
  BC-2120.40.20:
    name: Agregación de hogares y grupos
    description: |
      Agregación de tomadores en hogares, grupos y matrices corporativas.
  BC-2120.40.30:
    name: Consentimiento de marketing y uso de datos
    description: |
      Captura y aplicación de consentimientos de marketing y uso compartido de datos.
  BC-2120.40.40:
    name: Gestión del registro maestro del cliente
    description: |
      Mantenimiento del registro maestro del tomador entre sistemas.
  BC-2120.50:
    name: Gestión de experiencia y retención del cliente
    description: |
      Captura de retroalimentación, programas de fidelización, gestión de reclamaciones y predicción de abandono.
  BC-2120.50.10:
    name: Captura de retroalimentación del cliente
    description: |
      Captura de retroalimentación del cliente, señales de NPS y CSAT.
  BC-2120.50.20:
    name: Operaciones de programas de fidelización y retención
    description: |
      Operación de programas de fidelización, retención y recompensas por antigüedad.
  BC-2120.50.30:
    name: Gestión de reclamaciones y escaladas
    description: |
      Gestión de reclamaciones de tomadores, escaladas y casos ante el defensor del asegurado.
  BC-2120.50.40:
    name: Predicción de abandono y caducidad
    description: |
      Análisis predictivo del riesgo de abandono y caducidad para intervenciones de retención.

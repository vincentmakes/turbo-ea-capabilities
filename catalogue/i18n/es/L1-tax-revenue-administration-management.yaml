locale: es
source: L1-tax-revenue-administration-management.yaml
entries:
  BC-3250:
    name: Gestión de administración tributaria
    description: |
      Administración gubernamental de los ingresos tributarios y no tributarios, incluido el
      registro de contribuyentes, el procesamiento de declaraciones, la liquidación, la recaudación,
      la auditoría, la ejecución y la administración de devoluciones.
  BC-3250.10:
    name: Registro e identidad del contribuyente
    description: |
      Registro de contribuyentes, gestión de la identidad tributaria y mantenimiento de los datos
      maestros de contribuyentes.
    in_scope:
      - Registro de contribuyentes y expedición del NIF
      - Mantenimiento del perfil del contribuyente
      - Registros de titularidad real
    out_of_scope:
      - Registro de identidad civil (cubierto por Gestión de registro civil e identidad)
  BC-3250.10.10:
    name: Registro de contribuyentes
    description: |
      Registro de contribuyentes individuales y entidades y expedición de números de identificación
      fiscal.
  BC-3250.10.20:
    name: Mantenimiento del perfil del contribuyente
    description: |
      Mantenimiento de los datos maestros, los datos de contacto y el registro de obligaciones
      tributarias del contribuyente.
  BC-3250.10.30:
    name: Registro de titularidad real
    description: |
      Captura de la estructura de titularidad real y de los grupos empresariales de las entidades.
  BC-3250.20:
    name: Procesamiento de declaraciones y liquidación
    description: |
      Recepción, validación y liquidación de declaraciones tributarias en el ámbito de los
      impuestos directos, indirectos y de retención.
  BC-3250.20.10:
    name: Presentación de declaraciones
    description: |
      Recepción y registro de declaraciones tributarias e información declarativa por todos los
      canales disponibles.
  BC-3250.20.20:
    name: Validación de declaraciones
    description: |
      Validación automatizada y manual de las declaraciones en cuanto a aritmética, integridad
      y coherencia.
  BC-3250.20.30:
    name: Procesamiento de autoliquidaciones
    description: |
      Procesamiento de las autoliquidaciones y registro de las deudas declaradas.
  BC-3250.20.40:
    name: Emisión de liquidaciones provisionales
    description: |
      Emisión de liquidaciones provisionales y estimaciones razonadas para los no declarantes.
  BC-3250.30:
    name: Operaciones de recaudación de ingresos
    description: |
      Recaudación de pagos tributarios voluntarios a través de canales electrónicos, retención,
      fraccionamiento y ventanilla.
  BC-3250.30.10:
    name: Operaciones de canales de pago
    description: |
      Operación de canales de pago, incluida la transferencia bancaria, la tarjeta, el monedero
      electrónico y la ventanilla.
  BC-3250.30.20:
    name: Retención e ingresos a cuenta
    description: |
      Administración de las retenciones e ingresos a cuenta realizados por los agentes pagadores.
  BC-3250.30.30:
    name: Administración de planes de fraccionamiento
    description: |
      Configuración y seguimiento de los planes de fraccionamiento y los aplazamientos de pago
      acordados con los contribuyentes.
  BC-3250.30.40:
    name: Conciliación de ingresos
    description: |
      Conciliación de los ingresos recibidos con las cuentas de los contribuyentes y el tesoro.
  BC-3250.40:
    name: Auditoría e inspección tributaria
    description: |
      Auditoría, inspección y comprobación del cumplimiento tributario de los contribuyentes
      basadas en el riesgo.
  BC-3250.40.10:
    name: Selección de expedientes de auditoría
    description: |
      Selección basada en riesgos de los expedientes de auditoría mediante analítica e inteligencia
      tributaria.
  BC-3250.40.20:
    name: Trabajo de campo de auditoría
    description: |
      Realización del trabajo de campo de auditoría, examen de documentos y entrevistas con
      contribuyentes.
  BC-3250.40.30:
    name: Emisión de liquidaciones adicionales
    description: |
      Emisión de liquidaciones adicionales, ajustes y cartas de resolución de auditoría.
  BC-3250.40.40:
    name: Comprobación de precios de transferencia
    description: |
      Comprobación de la fijación de precios entre partes vinculadas transfronterizas conforme
      a los principios de precios de transferencia de la OCDE.
  BC-3250.50:
    name: Gestión de deuda tributaria y ejecución
    description: |
      Recuperación de deudas tributarias mediante potestades de ejecución forzosa, incluidos
      embargos, garantías, apremios y remisión para enjuiciamiento.
  BC-3250.50.10:
    name: Gestión de la cartera de deuda tributaria
    description: |
      Segmentación, antigüedad y priorización de la cartera de deuda tributaria.
  BC-3250.50.20:
    name: Medidas de ejecución forzosa
    description: |
      Ejercicio de las potestades de ejecución forzosa, incluidos embargos, garantías y apremios.
  BC-3250.50.30:
    name: Remisión por delito fiscal
    description: |
      Investigación y remisión de presuntos delitos de defraudación tributaria a la fiscalía.
  BC-3250.60:
    name: Administración de devoluciones y créditos
    description: |
      Tramitación de devoluciones tributarias, compensaciones de créditos y retenciones de
      importes disputados.
  BC-3250.60.10:
    name: Validación de devoluciones
    description: |
      Validación de las solicitudes de devolución respecto a las declaraciones, los pagos y
      los perfiles de riesgo.
  BC-3250.60.20:
    name: Emisión de devoluciones
    description: |
      Emisión de devoluciones y compensación contra deudas pendientes.
  BC-3250.60.30:
    name: Filtrado de fraude en devoluciones
    description: |
      Filtrado de las solicitudes de devolución para detectar indicios de robo de identidad y
      fraude en devoluciones.
  BC-3250.70:
    name: Administración de ingresos no tributarios
    description: |
      Administración de los ingresos públicos no tributarios, incluidas tasas, multas, regalías
      y gravámenes.
  BC-3250.70.10:
    name: Administración de tasas y derechos
    description: |
      Administración de las tasas estatutarias, los derechos y los pagos de usuarios al gobierno.
  BC-3250.70.20:
    name: Cobro de multas y sanciones
    description: |
      Cobro de multas y sanciones judiciales y administrativas.
  BC-3250.70.30:
    name: Administración de regalías y gravámenes
    description: |
      Administración de regalías sobre recursos naturales, gravámenes medioambientales y cánones
      afectados.

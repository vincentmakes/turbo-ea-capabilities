locale: es
source: L1-spectrum-frequency-management.yaml
entries:
  BC-2670:
    name: Espectro y frecuencias
    description: |
      Gestión de la cartera de espectro del operador, incluyendo adquisición y
      renovación de licencias, planificación y coordinación de frecuencias, gestión de
      interferencias y operaciones de espectro compartido.
  BC-2670.10:
    name: Gestión de la cartera de espectro
    description: |
      Mantenimiento del registro de tenencias de espectro y supervisión de las
      decisiones estratégicas de espectro.
  BC-2670.10.10:
    name: Registro de tenencias de espectro
    description: |
      Mantenimiento del registro autorizado del operador sobre tenencias de espectro
      por banda, geografía y licencia.
  BC-2670.10.20:
    name: Valoración del espectro
    description: |
      Valoración de las tenencias de espectro para decisiones financieras, de fusiones
      y adquisiciones y de subastas.
  BC-2670.10.30:
    name: Comercialización de espectro
    description: |
      Adquisición, cesión y arrendamiento de derechos de espectro con otros operadores
      donde los reguladores lo permitan.
  BC-2670.20:
    name: Gestión de licencias de espectro
    description: |
      Gestión integral de licencias de espectro desde la participación en subastas
      hasta la renovación y el cumplimiento regulatorio.
  BC-2670.20.10:
    name: Adquisición de licencias de espectro
    description: |
      Participación en subastas de espectro, concursos de méritos y asignaciones
      bilaterales.
  BC-2670.20.20:
    name: Renovación de licencias de espectro
    description: |
      Gestión de la renovación de licencias de espectro conforme a los calendarios de
      vencimiento.
  BC-2670.20.30:
    name: Reporte de cumplimiento de licencia
    description: |
      Reporte frente a las condiciones de las licencias de espectro, incluidas las
      obligaciones de cobertura y despliegue.
  BC-2670.30:
    name: Planificación y coordinación de frecuencias
    description: |
      Asignación de canales y frecuencias a elementos de red y coordinación con usuarios
      vecinos.
  BC-2670.30.10:
    name: Asignación de frecuencias a celdas
    description: |
      Asignación de frecuencias y PCI a celdas radio individuales.
  BC-2670.30.20:
    name: Planificación de canales
    description: |
      Planificación de asignaciones de canal en acceso radio y enlaces microondas.
  BC-2670.30.30:
    name: Planificación de celdas vecinas
    description: |
      Definición de relaciones de vecindad para gestionar traspasos e interferencias.
  BC-2670.40:
    name: Gestión de interferencias de espectro
    description: |
      Detección, investigación y resolución de interferencias perjudiciales de espectro
      en coordinación con los reguladores.
  BC-2670.40.10:
    name: Detección de interferencias
    description: |
      Detección de interferencias perjudiciales de fuentes internas y externas.
  BC-2670.40.20:
    name: Resolución de interferencias
    description: |
      Investigación y resolución de casos de interferencia identificados.
  BC-2670.40.30:
    name: Coordinación con el regulador
    description: |
      Coordinación con reguladores nacionales sobre interferencias entre licenciatarios
      y medidas de aplicación.
  BC-2670.50:
    name: Gestión del espectro compartido
    description: |
      Operación de regímenes de uso compartido dinámico del espectro y acceso compartido
      como CBRS.
  BC-2670.50.10:
    name: Uso compartido dinámico del espectro
    description: |
      Operación del uso compartido tipo DSS entre tecnologías radio en la misma banda.
  BC-2670.50.20:
    name: Coordinación de acceso compartido
    description: |
      Coordinación con plataformas de acceso compartido como SAS y AFC para obtener
      concesiones de canal.
  BC-2670.50.30:
    name: Coordinación de uso secundario
    description: |
      Coordinación con licenciatarios primarios e incumbentes en regímenes de uso
      secundario.

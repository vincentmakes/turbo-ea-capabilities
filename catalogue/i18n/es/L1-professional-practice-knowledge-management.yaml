locale: es
source: L1-professional-practice-knowledge-management.yaml
entries:
  BC-4370:
    name: Gestión del conocimiento de la práctica profesional
    description: |
      Mantenimiento y reutilización de precedentes de práctica, activos
      metodológicos, liderazgo de pensamiento, plantillas de entregables y
      bibliotecas de investigación que sustentan la prestación de encargos
      en firmas de servicios profesionales.
  BC-4370.10:
    name: Gestión de precedentes y plantillas
    description: |
      Curación, versionado y control de acceso de precedentes legales,
      plantillas de contratos y productos de trabajo estándar disponibles
      para su reutilización.
  BC-4370.10.10:
    name: Curación de precedentes
    description: |
      Selección, anonimización y curación de los resultados de alta calidad
      de los encargos para la biblioteca de precedentes de la firma.
  BC-4370.10.20:
    name: Mantenimiento de plantillas
    description: |
      Mantenimiento y control de versiones de plantillas de contratos,
      borradores de dictámenes y plantillas estándar de entregables.
  BC-4370.10.30:
    name: Gobernanza del acceso a precedentes
    description: |
      Gobernanza del acceso a los precedentes para equilibrar la
      reutilización con la confidencialidad del cliente y las restricciones
      de barreras de información.
  BC-4370.20:
    name: Gestión de metodología y herramientas
    description: |
      Definición, evolución y despliegue de la metodología del encargo,
      marcos analíticos y herramientas propietarias utilizadas en los encargos.
  BC-4370.20.10:
    name: Definición de la metodología
    description: |
      Definición de las metodologías de auditoría, asesoramiento y legales,
      alineadas con las normas profesionales y la política de la firma.
  BC-4370.20.20:
    name: Versionado y publicación de la metodología
    description: |
      Versionado, gestión de publicaciones y obsolescencia de los componentes
      metodológicos y aceleradores.
  BC-4370.20.30:
    name: Despliegue y formación en la metodología
    description: |
      Despliegue de nuevas versiones metodológicas, incluyendo formación,
      preguntas frecuentes y seguimiento de la adopción.
  BC-4370.30:
    name: Gestión del conocimiento y el liderazgo de pensamiento
    description: |
      Producción y distribución de puntos de vista, alertas, encuestas y
      publicaciones de liderazgo de pensamiento de la práctica.
  BC-4370.30.10:
    name: Planificación de temas de conocimiento
    description: |
      Planificación de temas de conocimiento y liderazgo de pensamiento
      alineados con la estrategia de práctica y los intereses del cliente.
  BC-4370.30.20:
    name: Producción de contenido de conocimiento
    description: |
      Producción de artículos, alertas, puntos de vista e informes de
      encuestas.
  BC-4370.30.30:
    name: Distribución y seguimiento del impacto del conocimiento
    description: |
      Distribución de contenido de conocimiento a audiencias de clientes y
      prospectos, y seguimiento del impacto.
  BC-4370.40:
    name: Gestión de la reutilización de activos del encargo
    description: |
      Identificación, extracción y etiquetado de los resultados de alto
      valor de los encargos como activos reutilizables, equilibrado con la
      confidencialidad del cliente.
  BC-4370.40.10:
    name: Identificación de activos reutilizables
    description: |
      Identificación de los resultados del encargo con valor de reutilización
      más allá del encargo original.
  BC-4370.40.20:
    name: Anonimización y redacción de activos
    description: |
      Anonimización y redacción de los activos del encargo para eliminar
      información confidencial del cliente antes de su reutilización.
  BC-4370.40.30:
    name: Etiquetado y localización de activos
    description: |
      Etiquetado y enriquecimiento de metadatos de los activos reutilizables
      para facilitar su descubrimiento en todas las prácticas.
  BC-4370.50:
    name: Gestión de la biblioteca de práctica
    description: |
      Curación y licenciamiento de bases de datos de investigación externas,
      bibliotecas legales y fiscales y contenido de suscripción utilizados
      por los profesionales.
  BC-4370.50.10:
    name: Gestión de suscripciones a investigación externa
    description: |
      Adquisición y renovación de suscripciones a bases de datos legales,
      fiscales y de investigación externas.
  BC-4370.50.20:
    name: Catálogo y búsqueda en la biblioteca
    description: |
      Catálogo y búsqueda federada a través de fuentes de investigación
      internas y externas.
  BC-4370.50.30:
    name: Analítica de uso de la biblioteca
    description: |
      Analítica del uso de las bases de datos de investigación para
      fundamentar las decisiones de renovación y racionalización.
  BC-4370.60:
    name: Gestión de la comunidad de práctica
    description: |
      Operación de grupos de práctica, comunidades de práctica y redes
      temáticas que comparten conocimiento en toda la firma.
  BC-4370.60.10:
    name: Operación del grupo de práctica
    description: |
      Funcionamiento de los grupos de práctica, incluyendo membresía,
      liderazgo y cadencia de foros.
  BC-4370.60.20:
    name: Dinamización de comunidades de práctica
    description: |
      Dinamización de comunidades de práctica transversales sobre temas y
      métodos emergentes.
  BC-4370.60.30:
    name: Red de referentes del conocimiento
    description: |
      Operación de una red de referentes del conocimiento distribuida
      por prácticas y oficinas.

locale: es
source: L1-aquaculture-operations-management.yaml
entries:
  BC-3520:
    name: Gestión de operaciones de acuicultura
    description: |
      Producción de especies acuáticas cultivadas — incubación y siembra, alimentación, calidad del agua, salud animal, operaciones de jaulas y estanques, cosecha y cumplimiento ambiental para peces, mariscos y plantas acuáticas.
  BC-3520.10:
    name: Adquisición de reproductores y operaciones de siembra
    description: |
      Obtención de reproductores, operaciones de incubación y siembra de juveniles en los sistemas de engorde.
  BC-3520.10.10:
    name: Obtención de reproductores
    description: |
      Obtención y cuarentena de reproductores para la producción en incubadoras.
  BC-3520.10.20:
    name: Operaciones de incubadora
    description: |
      Incubación de huevos, cría larvaria y producción de juveniles en incubadoras.
  BC-3520.10.30:
    name: Operaciones de siembra de juveniles
    description: |
      Siembra de juveniles en jaulas, estanques y tanques de engorde.
  BC-3520.20:
    name: Operaciones de alimentación en acuicultura
    description: |
      Planificación de raciones, distribución del alimento y monitoreo de la conversión alimenticia para las especies acuáticas cultivadas.
  BC-3520.20.10:
    name: Planificación de raciones alimentarias
    description: |
      Planificación de raciones alimentarias por especie, etapa de vida y temperatura del agua.
  BC-3520.20.20:
    name: Operaciones de distribución de alimento
    description: |
      Distribución de alimento manual, mecánica y automatizada a jaulas y estanques.
  BC-3520.20.30:
    name: Monitoreo de la conversión alimenticia
    description: |
      Monitoreo de la tasa de conversión alimenticia frente a los planes de alimentación.
  BC-3520.30:
    name: Gestión de la calidad del agua
    description: |
      Monitoreo continuo de la calidad del agua, oxigenación y tratamiento en sistemas de acuicultura de flujo continuo y recirculación.
    in_scope:
      - Monitoreo de oxígeno disuelto y temperatura
      - Operaciones de aireación y oxigenación
      - Tratamiento y recirculación del agua
  BC-3520.30.10:
    name: Monitoreo de la calidad del agua
    description: |
      Monitoreo en tiempo real de oxígeno disuelto, temperatura, salinidad y pH.
  BC-3520.30.20:
    name: Operaciones de aireación y oxigenación
    description: |
      Operación de sistemas de aireación e inyección de oxígeno.
  BC-3520.30.30:
    name: Tratamiento y recirculación del agua
    description: |
      Tratamiento mecánico, biológico y con luz UV del agua en sistemas de recirculación.
  BC-3520.40:
    name: Gestión de la salud de los animales acuáticos
    description: |
      Vigilancia de enfermedades, tratamiento, bioseguridad y registro de mortalidad para las especies acuáticas cultivadas.
  BC-3520.40.10:
    name: Vigilancia de enfermedades acuáticas
    description: |
      Vigilancia de patógenos, parásitos y enfermedades acuáticas de declaración obligatoria.
  BC-3520.40.20:
    name: Operaciones de tratamiento en acuicultura
    description: |
      Operaciones de tratamiento en agua y por baño, incluido el control del piojo de mar.
  BC-3520.40.30:
    name: Operaciones de bioseguridad en acuicultura
    description: |
      Bioseguridad del sitio, desinfección de equipos y controles de movimiento.
  BC-3520.40.40:
    name: Registro de mortalidad
    description: |
      Registro diario de mortalidad, clasificación y gestión de la eliminación.
  BC-3520.50:
    name: Operaciones de jaulas y estanques
    description: |
      Operación diaria e integridad de jaulas, estructuras y estanques de engorde, incluido el control de depredadores y el antifouling.
  BC-3520.50.10:
    name: Inspección de redes y jaulas
    description: |
      Inspección rutinaria de redes, jaulas y anclajes para verificar su integridad.
  BC-3520.50.20:
    name: Prevención de depredadores y escapes
    description: |
      Operaciones de disuasión de depredadores y prevención de escapes.
  BC-3520.50.30:
    name: Operaciones de antifouling
    description: |
      Limpieza de redes y operaciones de antifouling en la infraestructura sumergida.
  BC-3520.60:
    name: Operaciones de cosecha en acuicultura
    description: |
      Muestreo previo a la cosecha, ejecución de la cosecha y mantenimiento en vivo para procesamiento o despacho al mercado en vivo.
  BC-3520.60.10:
    name: Muestreo previo a la cosecha
    description: |
      Muestreo de tamaño, calidad y residuos previo a la cosecha.
  BC-3520.60.20:
    name: Ejecución de la cosecha
    description: |
      Concentración, bombeo, aturdimiento y ejecución de la cosecha.
  BC-3520.60.30:
    name: Mantenimiento en vivo y transferencia
    description: |
      Mantenimiento en vivo y transferencia en barco-pozo o cisterna al procesador o mercado.
  BC-3520.70:
    name: Cumplimiento ambiental en acuicultura
    description: |
      Monitoreo ambiental e informes a nivel del sitio requeridos por las licencias de acuicultura y los esquemas de certificación.
  BC-3520.70.10:
    name: Monitoreo ambiental del sitio
    description: |
      Monitoreo ambiental a nivel del sitio conforme a las condiciones de la licencia.
  BC-3520.70.20:
    name: Reporte de efluentes
    description: |
      Reporte de descargas de nutrientes y efluentes a los reguladores.
  BC-3520.70.30:
    name: Evaluación del impacto bentónico
    description: |
      Estudios de impacto bentónico y seguimiento de la remediación bajo los sitios de jaulas.

locale: es
source: L1-legislative-regulatory-drafting-management.yaml
entries:
  BC-3210:
    name: Gestión de redacción legislativa y regulatoria
    description: |
      Redacción, revisión jurídica, evaluación de impacto, coordinación del proceso parlamentario
      o legislativo y codificación de legislación primaria, reglamentos secundarios, instrumentos
      estatutarios y órdenes ejecutivas.
  BC-3210.10:
    name: Redacción legislativa
    description: |
      Redacción de legislación primaria, proyectos de ley y enmiendas por parte de los letrados
      parlamentarios o redactores legislativos.
    in_scope:
      - Redacción de proyectos de ley y enmiendas
      - Gestión de instrucciones de redacción
      - Redacción en lenguaje claro y bilingüe
    out_of_scope:
      - Reglamentos e instrumentos estatutarios (cubierto por Redacción regulatoria)
  BC-3210.10.10:
    name: Recepción de instrucciones de redacción
    description: |
      Recepción y clarificación de instrucciones de redacción de los responsables de política
      y los patrocinadores ministeriales.
  BC-3210.10.20:
    name: Redacción de proyectos de ley y enmiendas
    description: |
      Redacción de proyectos de ley, enmiendas y disposiciones consecuentes.
  BC-3210.10.30:
    name: Revisión de calidad de la redacción
    description: |
      Revisión por parte de letrados senior de los proyectos de legislación en cuanto a claridad,
      coherencia y efectividad.
  BC-3210.20:
    name: Redacción regulatoria
    description: |
      Redacción de reglamentos secundarios, instrumentos estatutarios, órdenes ejecutivas
      y normas administrativas.
  BC-3210.20.10:
    name: Redacción de reglamentos e instrumentos estatutarios
    description: |
      Redacción de reglamentos e instrumentos estatutarios al amparo de la legislación habilitante.
  BC-3210.20.20:
    name: Redacción de órdenes ejecutivas
    description: |
      Redacción de órdenes ejecutivas, decretos y proclamas.
  BC-3210.20.30:
    name: Redacción de normas administrativas
    description: |
      Redacción de normas administrativas y avisos de organismos.
  BC-3210.30:
    name: Revisión jurídica y conformidad constitucional
    description: |
      Revisión jurídica de los instrumentos en borrador en cuanto a su conformidad constitucional,
      con los derechos humanos y con el derecho internacional.
  BC-3210.30.10:
    name: Revisión de conformidad constitucional
    description: |
      Revisión de los borradores respecto a las competencias, los derechos y las limitaciones
      constitucionales.
  BC-3210.30.20:
    name: Evaluación de compatibilidad con derechos humanos
    description: |
      Evaluación de la compatibilidad con los tratados y cartas de derechos humanos.
  BC-3210.30.30:
    name: Revisión de conformidad con el derecho internacional
    description: |
      Revisión de los borradores respecto a las obligaciones derivadas de tratados y compromisos
      supranacionales.
  BC-3210.40:
    name: Evaluación de impacto regulatorio
    description: |
      Evaluación de los costes esperados, los beneficios y los efectos distributivos de los
      instrumentos propuestos conforme a los principios de mejora regulatoria de la OCDE.
  BC-3210.40.10:
    name: Delimitación del alcance del impacto
    description: |
      Delimitación de las evaluaciones de impacto regulatorio y determinación de la proporcionalidad.
  BC-3210.40.20:
    name: Análisis coste-beneficio
    description: |
      Cuantificación de los costes y beneficios regulatorios, incluida la carga de cumplimiento.
  BC-3210.40.30:
    name: Prueba para pequeñas empresas y pymes
    description: |
      Evaluación de los impactos desproporcionados sobre pequeñas empresas y pymes.
  BC-3210.40.40:
    name: Publicación de la evaluación de impacto
    description: |
      Publicación de las evaluaciones de impacto junto con el instrumento y la evidencia de respaldo.
  BC-3210.50:
    name: Coordinación del proceso legislativo
    description: |
      Coordinación del trámite parlamentario o legislativo de los proyectos de ley, incluidas las
      pruebas ante comisiones, las enmiendas y la sanción real o promulgación.
  BC-3210.50.10:
    name: Enlace parlamentario
    description: |
      Enlace con los órganos parlamentarios o legislativos sobre los proyectos de ley del gobierno.
  BC-3210.50.20:
    name: Preparación de pruebas para comisiones
    description: |
      Preparación de pruebas, informes y testigos para las comisiones legislativas.
  BC-3210.50.30:
    name: Seguimiento de enmiendas
    description: |
      Seguimiento y evaluación de las enmiendas legislativas a lo largo de las fases de tramitación.
  BC-3210.50.40:
    name: Coordinación de promulgación y sanción real
    description: |
      Coordinación de la promulgación final, la sanción real o la firma ejecutiva.
  BC-3210.60:
    name: Codificación y publicación jurídica
    description: |
      Compilación, consolidación, publicación en el diario oficial y mantenimiento de los textos
      legislativos y reglamentarios.
  BC-3210.60.10:
    name: Publicación en el diario oficial
    description: |
      Publicación de los instrumentos aprobados en el diario oficial o en el boletín oficial.
  BC-3210.60.20:
    name: Consolidación y codificación
    description: |
      Consolidación de enmiendas y codificación en cuerpos estatutarios.
  BC-3210.60.30:
    name: Mantenimiento de textos jurídicos
    description: |
      Mantenimiento continuo y publicación en formato legible por máquina de los textos legislativos
      y reglamentarios.

locale: es
source: L1-institutional-advancement-alumni-management.yaml
entries:
  BC-4800:
    name: Gestión de captación de fondos institucionales y egresados
    description: |
      Vinculación con las comunidades de egresados, cultivo de donantes y gestión
      de campañas de recaudación de fondos, donaciones, gestión de la relación con
      donantes e informes a donantes de fondos dotacionales.
  BC-4800.10:
    name: Vinculación con egresados
    description: |
      Vinculación con las comunidades de egresados a través de programas, eventos
      y comunicaciones que sostienen relaciones duraderas con la institución.
    in_scope:
      - Operaciones de la comunidad de egresados
      - Eventos y reencuentros de egresados
      - Comunicaciones con egresados
    out_of_scope:
      - Servicios de inserción para estudiantes actuales (cubiertos en Gestión de apoyo y bienestar del estudiante)
  BC-4800.10.10:
    name: Operaciones de la comunidad de egresados
    description: |
      Operación de asociaciones de egresados, delegaciones y comunidades en línea.
  BC-4800.10.20:
    name: Eventos y reencuentros de egresados
    description: |
      Planificación y realización de eventos y reencuentros de egresados.
  BC-4800.10.30:
    name: Comunicaciones con egresados
    description: |
      Canales editoriales y de comunicación dirigidos a los egresados.
  BC-4800.20:
    name: Gestión de la relación con donantes
    description: |
      Identificación, cultivo y gestión de la relación con donantes potenciales
      y existentes.
    in_scope:
      - Investigación e identificación de donantes potenciales
      - Cultivo y captación de donantes
      - Gestión de la relación con grandes donantes
    out_of_scope:
      - Operaciones genéricas de CRM (cubiertas en Gestión de la relación con el cliente transversal)
  BC-4800.20.10:
    name: Investigación e identificación de donantes potenciales
    description: |
      Investigación e identificación de donantes potenciales.
  BC-4800.20.20:
    name: Cultivo y captación de donantes
    description: |
      Cultivo y captación del apoyo de los donantes.
  BC-4800.20.30:
    name: Gestión de la relación con grandes donantes
    description: |
      Gestión personalizada de la relación con los grandes donantes.
  BC-4800.30:
    name: Gestión de campañas de recaudación de fondos
    description: |
      Planificación y operación de campañas de recaudación de fondos en los canales
      de donación anual, capitales y digitales.
    in_scope:
      - Campañas de donación anual
      - Gestión de campañas de capital
      - Campañas de micromecenazgo y entre pares
    out_of_scope:
      - Campañas de marketing no relacionadas con la recaudación de fondos (cubiertas en Gestión de marketing transversal)
  BC-4800.30.10:
    name: Campañas de donación anual
    description: |
      Operación de campañas de donación anual y donaciones periódicas.
  BC-4800.30.20:
    name: Gestión de campañas de capital
    description: |
      Gestión de campañas de capital plurianuales.
  BC-4800.30.30:
    name: Campañas de micromecenazgo y entre pares
    description: |
      Operación de campañas de micromecenazgo y recaudación entre pares.
  BC-4800.40:
    name: Administración de donaciones y compromisos
    description: |
      Recepción, registro y administración de donaciones y compromisos, incluyendo
      instrumentos de donación planificada.
    in_scope:
      - Recepción y tramitación de donaciones
      - Seguimiento de compromisos
      - Administración de donaciones planificadas y diferidas
    out_of_scope:
      - Cuentas por cobrar en general (cubiertas en Gestión financiera transversal)
  BC-4800.40.10:
    name: Recepción y tramitación de donaciones
    description: |
      Recepción y tramitación de donaciones en efectivo, cheque, en línea y en especie.
  BC-4800.40.20:
    name: Seguimiento de compromisos
    description: |
      Seguimiento de los compromisos y los calendarios de pago de compromisos.
  BC-4800.40.30:
    name: Administración de donaciones planificadas y diferidas
    description: |
      Administración de legados, fideicomisos benéficos y otros instrumentos de
      donación planificada.
  BC-4800.50:
    name: Gestión de relaciones y reconocimiento de donantes
    description: |
      Gestión de las relaciones con los donantes mediante el agradecimiento, el
      reconocimiento y la vinculación continuada de los donantes de fondos nominados.
    in_scope:
      - Agradecimiento a los donantes
      - Programas de reconocimiento de donantes
      - Gestión de fondos dotacionales
    out_of_scope:
      - Comunicaciones de relaciones públicas (cubiertas en Gestión de comunicación corporativa transversal)
  BC-4800.50.10:
    name: Agradecimiento a los donantes
    description: |
      Agradecimiento de las donaciones y compromisos de los donantes.
  BC-4800.50.20:
    name: Programas de reconocimiento de donantes
    description: |
      Operación de programas y sociedades de reconocimiento de donantes.
  BC-4800.50.30:
    name: Gestión de fondos dotacionales
    description: |
      Gestión de la relación con los donantes de fondos dotacionales y nominados.
  BC-4800.60:
    name: Informes a donantes sobre fondos dotacionales
    description: |
      Informes a los donantes sobre el uso, el rendimiento y el impacto de los
      fondos restringidos y dotacionales.
    in_scope:
      - Informes sobre el uso de fondos restringidos
      - Informes de rendimiento de fondos dotacionales nominados
      - Informes de impacto para donantes
    out_of_scope:
      - Informes financieros institucionales (cubiertos en Gestión financiera transversal)
      - Gestión de las inversiones del fondo dotacional en sí (cubierta en Gestión de tesorería transversal)
  BC-4800.60.10:
    name: Informes sobre el uso de fondos restringidos
    description: |
      Informes sobre el uso de los fondos restringidos y designados por los donantes.
  BC-4800.60.20:
    name: Informes de rendimiento de fondos dotacionales nominados
    description: |
      Informes de rendimiento de los fondos dotacionales nominados a sus donantes.
  BC-4800.60.30:
    name: Informes de impacto para donantes
    description: |
      Informes de narrativas e impacto dirigidos a los donantes.

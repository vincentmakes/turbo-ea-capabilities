locale: es
source: L1-cybersecurity-management.yaml
entries:
  BC-620:
    name: Gestión de ciberseguridad
    description: |
      Estrategia de seguridad, controles, identidad y respuesta ante amenazas para proteger los activos de información y la continuidad del negocio.
  BC-620.10:
    name: Gestión de la estrategia y el gobierno de seguridad
    description: |
      Estrategia, políticas, marcos y GRC de seguridad para establecer una postura de ciberseguridad alineada con el riesgo del negocio.
  BC-620.10.10:
    name: Desarrollo de la estrategia de seguridad
    description: |
      Estrategia de ciberseguridad plurianual alineada con el riesgo empresarial.
  BC-620.10.20:
    name: Políticas y estándares de seguridad
    description: |
      Políticas y estándares de seguridad alineados con NIST CSF e ISO 27001.
  BC-620.10.30:
    name: Gestión del riesgo de seguridad
    description: |
      Identificación, evaluación y tratamiento del riesgo cibernético.
  BC-620.10.40:
    name: Gestión del cumplimiento en seguridad
    description: |
      Cumplimiento de las regulaciones de ciberseguridad (DORA, NIS2, sectoriales).
  BC-620.10.50:
    name: Métricas e informes de seguridad
    description: |
      KPIs de seguridad, paneles de control e informes para la dirección.
  BC-620.20:
    name: Gestión de identidades y accesos
    description: |
      IAM, PAM, federación y procesos de alta, cambio y baja para controlar el acceso a los activos de información.
  BC-620.20.10:
    name: Gestión del ciclo de vida de identidades
    description: |
      Procesos de incorporación, cambio y baja, y aprovisionamiento de identidades.
  BC-620.20.20:
    name: Gestión del acceso y la autenticación
    description: |
      Autenticación, MFA, inicio de sesión único y federación de identidades.
  BC-620.20.30:
    name: Gestión del acceso privilegiado
    description: |
      PAM, acceso justo a tiempo y monitorización de sesiones privilegiadas.
  BC-620.20.40:
    name: Gobierno del acceso y recertificación
    description: |
      Revisiones de acceso, segregación de funciones y recertificaciones.
  BC-620.20.50:
    name: Gestión de identidades de clientes
    description: |
      CIAM para clientes externos, socios y consumidores.
  BC-620.30:
    name: Gestión de la detección y respuesta ante amenazas
    description: |
      SOC, SIEM y respuesta ante incidentes para detectar y neutralizar las amenazas cibernéticas de forma oportuna.
  BC-620.30.10:
    name: Monitorización de seguridad y operaciones SIEM
    description: |
      SIEM, SOAR y monitorización de telemetría de seguridad.
  BC-620.30.20:
    name: Caza de amenazas
    description: |
      Caza proactiva de amenazas basada en hipótesis.
  BC-620.30.30:
    name: Inteligencia de amenazas cibernéticas
    description: |
      Recopilación, análisis y difusión de inteligencia sobre amenazas cibernéticas.
  BC-620.30.40:
    name: Respuesta ante incidentes cibernéticos
    description: |
      Detección, contención, erradicación y recuperación ante incidentes cibernéticos.
  BC-620.30.50:
    name: Informática forense digital
    description: |
      Adquisición y análisis forense en apoyo de incidentes y litigios.
  BC-620.40:
    name: Gestión de vulnerabilidades
    description: |
      Exploración, parcheo y remediación de vulnerabilidades para reducir la superficie de ataque.
  BC-620.40.10:
    name: Exploración de vulnerabilidades
    description: |
      Exploración autenticada y no autenticada en todo el parque tecnológico.
  BC-620.40.20:
    name: Clasificación y priorización de vulnerabilidades
    description: |
      Priorización basada en riesgo de las vulnerabilidades para su remediación.
  BC-620.40.30:
    name: Gestión de parches y remediación
    description: |
      Coordinación del parcheo y la remediación entre los propietarios de activos.
  BC-620.40.40:
    name: Pruebas de penetración y ejercicios de equipo rojo
    description: |
      Pruebas de penetración, ejercicios de equipo rojo y simulaciones de adversarios.
  BC-620.50:
    name: Gestión de la arquitectura de seguridad
    description: |
      Diseño seguro, patrones de seguridad y confianza cero para integrar la seguridad en la arquitectura empresarial.
  BC-620.50.10:
    name: Patrones de arquitectura de seguridad
    description: |
      Patrones de seguridad de referencia y controles reutilizables.
  BC-620.50.20:
    name: Arquitectura de confianza cero
    description: |
      Principios de confianza cero, microsegmentación y aplicación de políticas.
  BC-620.50.30:
    name: Ingeniería de seguridad de aplicaciones
    description: |
      Prácticas de seguridad por diseño, SAST, DAST y modelado de amenazas.
  BC-620.50.40:
    name: Arquitectura de seguridad en la nube
    description: |
      Líneas base de seguridad en la nube, CSPM y diseño de controles nativos de nube.
  BC-620.50.50:
    name: Criptografía y gestión de claves
    description: |
      Estándares criptográficos, gestión de claves y operaciones PKI.
  BC-620.60:
    name: Gestión de la concienciación en seguridad
    description: |
      Formación en concienciación, simulaciones de phishing y cultura de seguridad para reducir el riesgo humano.
  BC-620.60.10:
    name: Formación en concienciación sobre seguridad
    description: |
      Formación anual y basada en roles sobre concienciación en seguridad.
  BC-620.60.20:
    name: Simulación de phishing
    description: |
      Simulaciones de phishing y sesiones de seguimiento y formación.
  BC-620.60.30:
    name: Programa de cultura de seguridad
    description: |
      Programas de cambio cultural y redes de embajadores de seguridad.
  BC-620.60.40:
    name: Comunicaciones de seguridad
    description: |
      Alertas, avisos de seguridad y comunicaciones a las partes interesadas.

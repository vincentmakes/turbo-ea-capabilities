locale: es
source: L1-pharmaceutical-supply-chain-management.yaml
entries:
  BC-1570:
    name: Gestión de la cadena de suministro farmacéutica
    description: |
      Gestiona la cadena de frío, la serialización, la distribución y la logística farmacéutica conforme a GDP para garantizar la disponibilidad e integridad del producto.
  BC-1570.10:
    name: Gestión de la cadena de frío
    description: |
      Diseña, monitoriza y gestiona la cadena de suministro con control de temperatura conforme a GDP.
  BC-1570.10.10:
    name: Diseño de la cadena de frío
    description: |
      Diseño y cualificación de soluciones de cadena de frío.
  BC-1570.10.20:
    name: Monitorización de temperatura
    description: |
      Monitorización de temperatura de extremo a extremo en la cadena de frío.
  BC-1570.10.30:
    name: Gestión de excursiones de temperatura
    description: |
      Investigación y disposición de excursiones de temperatura en la cadena de frío.
  BC-1570.20:
    name: Gestión de serialización y trazabilidad
    description: |
      Gestiona los números de serie, la agregación y el cumplimiento de los requisitos normativos de verificación en el punto de dispensación.
  BC-1570.20.10:
    name: Gestión de números de serie
    description: |
      Generación y asignación de números de serie por mercado.
  BC-1570.20.20:
    name: Gestión de la agregación y la jerarquía
    description: |
      Agregación de unidades serializadas en bultos y palés.
  BC-1570.20.30:
    name: Reporte regulatorio y verificación
    description: |
      Reporte regulatorio (DSCSA, EU FMD) y verificación en el punto de dispensación.
  BC-1570.30:
    name: Gestión de la distribución farmacéutica
    description: |
      Opera los canales de distribución a mayoristas, hospitales y farmacias, incluida la distribución especializada.
  BC-1570.30.10:
    name: Operaciones con mayoristas y distribuidores
    description: |
      Operaciones de distribución a mayoristas y distribuidores farmacéuticos.
  BC-1570.30.20:
    name: Distribución directa a hospital
    description: |
      Distribución directa a hospitales y farmacias.
  BC-1570.30.30:
    name: Distribución especializada
    description: |
      Distribución especializada para productos de distribución restringida.
  BC-1570.40:
    name: Gestión del inventario farmacéutico
    description: |
      Planifica y controla el inventario farmacéutico gestionando caducidades, asignaciones y operaciones de retirada del mercado.
  BC-1570.40.10:
    name: Planificación del inventario farmacéutico
    description: |
      Planificación del inventario de productos farmacéuticos.
  BC-1570.40.20:
    name: Gestión de caducidad y vida útil
    description: |
      Gestión FEFO y monitorización de la vida útil de los productos.
  BC-1570.40.30:
    name: Asignación farmacéutica
    description: |
      Asignación de suministros restringidos entre los distintos mercados.
  BC-1570.40.40:
    name: Coordinación de retiradas del mercado
    description: |
      Coordinación de las operaciones de retirada y retiro de productos del mercado.
  BC-1570.50:
    name: Gestión de la logística farmacéutica
    description: |
      Opera el transporte, el almacenamiento y los trámites aduaneros bajo cumplimiento GDP y con proveedores logísticos especializados.
  BC-1570.50.10:
    name: Transporte conforme a GDP
    description: |
      Operaciones de transporte conformes con las normas GDP.
  BC-1570.50.20:
    name: Almacenamiento conforme a GDP
    description: |
      Operaciones de almacenamiento conformes con las normas GDP.
  BC-1570.50.30:
    name: Operaciones aduaneras farmacéuticas
    description: |
      Operaciones aduaneras y de importación/exportación de productos farmacéuticos.
  BC-1570.50.40:
    name: Gestión de proveedores de servicios logísticos
    description: |
      Gestión de proveedores 3PL en la cadena de suministro farmacéutica.

locale: es
source: L1-retail-store-operations-management.yaml
entries:
  BC-2310:
    name: Operaciones de tienda
    description: |
      Operación diaria de las tiendas físicas: rutinas de apertura y cierre,
      ejecución en tienda, gestión de la plantilla a nivel de tienda, auditorías,
      cuidado del mobiliario y entrega consistente de la experiencia del formato
      de tienda.
  BC-2310.10:
    name: Operaciones de apertura y cierre de tienda
    description: |
      Rutinas diarias de apertura y cierre de tienda, incluida la preparación
      del cajón de caja, el cuadre al cierre y el traspaso de turno.
  BC-2310.10.10:
    name: Ejecución de la rutina de apertura de tienda
    description: |
      Ejecución de los procedimientos de apertura de tienda, incluidas las
      comprobaciones de disponibilidad operativa.
  BC-2310.10.20:
    name: Ejecución de la rutina de cierre de tienda
    description: |
      Rutinas de cierre al final del día, incluido el cuadre y el aseguramiento
      de las instalaciones.
  BC-2310.10.30:
    name: Gestión del traspaso de turno
    description: |
      Traspaso entre equipos con transmisión de tareas e incidencias pendientes.
  BC-2310.20:
    name: Gestión de la ejecución en tienda
    description: |
      Ejecución en tienda de tareas de merchandising, promoción, señalética y
      reposición para que la tienda refleje el plan de la central.
    in_scope:
      - Gestión de tareas para el personal de tienda
      - Ejecución de planogramas y señalética
      - Reposición en tienda desde el stock del almacén trasero
    out_of_scope:
      - Diseño de planogramas (BC-2300.30.10)
  BC-2310.20.10:
    name: Gestión de tareas en tienda
    description: |
      Distribución y seguimiento de tareas operativas para los equipos de tienda.
  BC-2310.20.20:
    name: Ejecución de planogramas y señalética
    description: |
      Ejecución en tienda de planogramas, señalética y montaje de promociones.
  BC-2310.20.30:
    name: Reposición en tienda
    description: |
      Reposición de estanterías desde el almacén trasero y la sala de reservas.
  BC-2310.20.40:
    name: Operaciones del almacén trasero
    description: |
      Recepción, organización y gestión del inventario del almacén y sala de
      reservas.
  BC-2310.30:
    name: Gestión de la plantilla de tienda
    description: |
      Planificación de turnos a nivel de tienda, planificación de efectivos por
      hora y gestión del rendimiento del personal de tienda.
    in_scope:
      - Previsiones de mano de obra por hora basadas en tráfico y ventas
      - Planificación de turnos y control horario
      - Rendimiento y formación del personal de tienda
    out_of_scope:
      - Gestión del capital humano corporativo (BC-300)
  BC-2310.30.10:
    name: Previsión de demanda de mano de obra
    description: |
      Previsión de la demanda de mano de obra por hora, tienda y departamento.
  BC-2310.30.20:
    name: Planificación de turnos en tienda
    description: |
      Planificación de turnos en tienda respetando la equidad y la normativa
      laboral.
  BC-2310.30.30:
    name: Gestión del control horario
    description: |
      Registro de entrada, salida y gestión de excepciones del control horario.
  BC-2310.30.40:
    name: Formación y evaluación del personal de tienda
    description: |
      Formación, reconocimiento y gestión del rendimiento del personal de tienda.
  BC-2310.40:
    name: Gestión de auditorías y cumplimiento en tienda
    description: |
      Auditorías operativas, visitas de cumplimiento, cliente misterioso y
      conformidad de la tienda con los estándares de marca y operativos.
  BC-2310.40.10:
    name: Programa de auditorías operativas
    description: |
      Programa de auditorías operativas y visitas de comprobación contra los
      estándares de tienda.
  BC-2310.40.20:
    name: Programa de cliente misterioso
    description: |
      Programa de cliente misterioso para evaluar la experiencia del cliente.
  BC-2310.40.30:
    name: Conformidad con los estándares de tienda
    description: |
      Conformidad con los estándares de marca, seguridad y operativos por tienda.
  BC-2310.50:
    name: Gestión del mantenimiento de activos de tienda
    description: |
      Cuidado a nivel de tienda del mobiliario, equipos, refrigeración y limpieza
      para mantener la tienda en condiciones óptimas de venta.
  BC-2310.50.10:
    name: Mantenimiento de mobiliario y equipos
    description: |
      Mantenimiento del mobiliario, expositores y equipos de la tienda.
  BC-2310.50.20:
    name: Gestión del funcionamiento de la refrigeración
    description: |
      Monitorización y gestión del tiempo en servicio de los equipos de
      refrigeración en tiendas de alimentación.
  BC-2310.50.30:
    name: Limpieza e higiene de la tienda
    description: |
      Rutinas de limpieza, mantenimiento e higiene en la sala de ventas.
  BC-2310.60:
    name: Gestión del formato y la experiencia de tienda
    description: |
      Definición y custodia de los estándares de experiencia del formato de
      tienda, incluidos el modelo de servicio, la imagen y el recorrido del
      cliente.
  BC-2310.60.10:
    name: Estándares del formato de tienda
    description: |
      Estándares de cada formato de tienda en distribución, servicio y ambiente.
  BC-2310.60.20:
    name: Diseño de la experiencia del cliente en tienda
    description: |
      Diseño del recorrido del cliente en tienda y las interacciones de servicio.
  BC-2310.60.30:
    name: Planificación de renovación del concepto de tienda
    description: |
      Planificación de renovaciones del concepto de tienda y despliegues piloto.

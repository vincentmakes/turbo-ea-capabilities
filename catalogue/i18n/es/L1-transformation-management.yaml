locale: es
source: L1-transformation-management.yaml
entries:
  BC-920:
    name: Gestión de la transformación
    description: |
      Dirige programas de transformación empresarial a gran escala que reconfiguran la organización para alcanzar un estado objetivo estratégico.
  BC-920.10:
    name: Gestión del programa de transformación
    description: |
      Planifica y entrega el programa de transformación de extremo a extremo, coordinando iniciativas y dependencias a escala empresarial.
  BC-920.10.10:
    name: Visión y diseño de la transformación
    description: |
      Define la visión, el estado objetivo y el diseño de la transformación organizacional.
  BC-920.10.20:
    name: Definición de la hoja de ruta de transformación
    description: |
      Elabora la hoja de ruta plurianual de transformación con las olas de cambio y sus secuencias.
  BC-920.10.30:
    name: Entrega de las líneas de trabajo de transformación
    description: |
      Gestiona la entrega de las líneas de trabajo de transformación y sus interdependencias.
  BC-920.10.40:
    name: Gestión de riesgos de la transformación
    description: |
      Identifica y gestiona los riesgos propios de la escala y complejidad de la transformación.
  BC-920.20:
    name: Gestión de la gobernanza de la transformación
    description: |
      Establece los órganos de gobierno, los derechos de decisión y los procesos de escalación que aseguran la integridad de la transformación.
  BC-920.20.10:
    name: Operaciones del órgano de dirección de la transformación
    description: |
      Gestiona el funcionamiento del comité de dirección y la autoridad de diseño de la transformación.
  BC-920.20.20:
    name: Gestión de decisiones de transformación
    description: |
      Mantiene el marco de toma de decisiones, el registro de decisiones y las rutas de escalación.
  BC-920.20.30:
    name: Aseguramiento de la transformación
    description: |
      Provee aseguramiento independiente sobre la salud y la calidad de la transformación.
  BC-920.30:
    name: Gestión de la realización de beneficios
    description: |
      Identifica, cuantifica y hace seguimiento de los beneficios de la transformación hasta su plena materialización.
  BC-920.30.10:
    name: Identificación y mapeo de beneficios
    description: |
      Identifica y mapea los beneficios esperados vinculándolos a los resultados estratégicos.
  BC-920.30.20:
    name: Establecimiento de línea base y objetivos de beneficios
    description: |
      Define la línea base de medición y los objetivos cuantificados de realización de beneficios.
  BC-920.30.30:
    name: Seguimiento y reporte de beneficios
    description: |
      Monitoriza la realización de beneficios, informa sobre su progreso y valida los resultados obtenidos.
  BC-920.30.40:
    name: Optimización de la captura de valor
    description: |
      Identifica oportunidades adicionales de captura de valor durante la ejecución de la transformación.
  BC-920.40:
    name: Gestión de las operaciones de la oficina de transformación
    description: |
      Opera la oficina de transformación proveyendo servicios de coordinación, reporting y habilitación a todos los equipos.
  BC-920.40.10:
    name: Establecimiento de la oficina de transformación
    description: |
      Constituye la oficina de transformación, define los roles y establece el modelo operativo.
  BC-920.40.20:
    name: Reporting de transformación
    description: |
      Elabora informes y cuadros de mando sobre el avance de la transformación para los órganos de gobierno.
  BC-920.40.30:
    name: Gestión de herramientas de transformación
    description: |
      Administra las herramientas de seguimiento de la transformación, dependencias y beneficios.
  BC-920.40.40:
    name: Desarrollo de capacidades de transformación
    description: |
      Impulsa el desarrollo de competencias y el coaching de los líderes de la transformación.

locale: es
source: L1-clinical-care-delivery-management.yaml
entries:
  BC-2810:
    name: Gestión de la prestación de atención clínica
    description: |
      Provisión de atención clínica directa en entornos de hospitalización, ambulatorio, urgencias,
      quirúrgico, materno-neonatal, salud mental, rehabilitación y atención domiciliaria.
  BC-2810.10:
    name: Prestación de atención hospitalaria
    description: |
      Prestación de atención hospitalaria aguda, intermedia y crítica, incluyendo
      valoración, visitas de guardia, cuidados al lado de la cama y operaciones de cuidados intensivos.
  BC-2810.10.10:
    name: Valoración al ingreso
    description: |
      Historia clínica, exploración física, valoración de enfermería y cribado de riesgos en el momento del ingreso.
  BC-2810.10.20:
    name: Rondas clínicas
    description: |
      Rondas clínicas multidisciplinares y planificación de la atención al lado del paciente.
  BC-2810.10.30:
    name: Cuidados al lado del paciente
    description: |
      Cuidados clínicos y de enfermería directos al paciente, incluido el apoyo en las actividades de la vida diaria.
  BC-2810.10.40:
    name: Operaciones de cuidados críticos
    description: |
      Operaciones de cuidados intensivos incluyendo ventilación, soporte hemodinámico y monitorización continua.
  BC-2810.20:
    name: Prestación de atención ambulatoria
    description: |
      Prestación de servicios ambulatorios, de telesalud y de procedimientos en entornos de consulta y hospital de día.
  BC-2810.20.10:
    name: Realización de consultas ambulatorias
    description: |
      Realización de consultas en clínica y consultorio, incluyendo atención primaria y especialidades.
  BC-2810.20.20:
    name: Prestación de procedimientos ambulatorios
    description: |
      Prestación de procedimientos de día y ambulatorios, incluyendo cirugía menor e infusiones.
  BC-2810.20.30:
    name: Prestación de encuentros de telesalud
    description: |
      Prestación de encuentros de telesalud síncronos y asíncronos.
  BC-2810.20.40:
    name: Administración de tratamientos ambulatorios
    description: |
      Administración de tratamientos ambulatorios como quimioterapia, diálisis e infusiones.
  BC-2810.30:
    name: Prestación de atención de urgencias
    description: |
      Prestación de triaje, estabilización, respuesta a traumatismos y decisiones de disposición
      para atención no programada en el servicio de urgencias.
  BC-2810.30.10:
    name: Triaje en urgencias
    description: |
      Triaje y asignación de nivel de gravedad a los pacientes que acuden al servicio de urgencias.
  BC-2810.30.20:
    name: Estabilización en urgencias
    description: |
      Valoración inicial, reanimación y estabilización de pacientes con enfermedad aguda o lesión grave.
  BC-2810.30.30:
    name: Respuesta ante traumatismos
    description: |
      Activación del equipo de trauma, respuesta y atención de control de daños en casos de traumatismo mayor.
  BC-2810.30.40:
    name: Disposición en urgencias
    description: |
      Decisiones de disposición, incluidas hospitalización, traslado, observación y alta desde urgencias.
  BC-2810.40:
    name: Prestación de atención quirúrgica y de procedimientos
    description: |
      Atención preoperatoria, intraoperatoria y postoperatoria para procedimientos quirúrgicos
      e intervencionistas en quirófanos y salas de procedimientos.
  BC-2810.40.10:
    name: Atención preoperatoria
    description: |
      Valoración preoperatoria, optimización y atención en el área de espera.
  BC-2810.40.20:
    name: Gestión intraoperatoria
    description: |
      Atención quirúrgica, anestésica y del equipo circulante durante la intervención.
  BC-2810.40.30:
    name: Atención post-anestesia
    description: |
      Recuperación en la unidad de cuidados post-anestesia y valoración de la aptitud para el alta.
  BC-2810.40.40:
    name: Endoscopia y procedimientos intervencionistas
    description: |
      Prestación de procedimientos endoscópicos, de radiología intervencionista y de cardiología intervencionista.
  BC-2810.50:
    name: Prestación de atención materno-neonatal
    description: |
      Atención anteparto, intraparto, posparto y neonatal en los servicios de maternidad y neonatología.
  BC-2810.50.10:
    name: Atención anteparto
    description: |
      Valoración prenatal, cribado e ingresos anteparto.
  BC-2810.50.20:
    name: Atención intraparto
    description: |
      Gestión del trabajo de parto y el parto, incluyendo cesárea y parto instrumentado.
  BC-2810.50.30:
    name: Atención posparto
    description: |
      Recuperación materna posparto, apoyo a la lactancia y educación postparto.
  BC-2810.50.40:
    name: Atención neonatal
    description: |
      Cuidados en nursery para recién nacidos sanos, cribado neonatal y atención en cuidados intensivos neonatales.
  BC-2810.60:
    name: Prestación de atención en salud mental
    description: |
      Atención en salud mental a través de valoración psiquiátrica, unidades de hospitalización,
      terapia ambulatoria y tratamiento de uso de sustancias.
  BC-2810.60.10:
    name: Valoración psiquiátrica
    description: |
      Valoración psiquiátrica y psicológica e intervención en crisis.
  BC-2810.60.20:
    name: Atención hospitalaria en salud mental
    description: |
      Atención psiquiátrica hospitalaria, incluyendo terapia de entorno y tratamiento farmacológico.
  BC-2810.60.30:
    name: Terapia ambulatoria en salud mental
    description: |
      Psicoterapia ambulatoria, terapia grupal y programas de hospitalización parcial.
  BC-2810.60.40:
    name: Atención por uso de sustancias
    description: |
      Servicios de desintoxicación, tratamiento asistido con medicación y rehabilitación por uso de sustancias.
  BC-2810.70:
    name: Servicios de rehabilitación y terapia
    description: |
      Servicios de fisioterapia, terapia ocupacional, logopedia y rehabilitación cardiopulmonar
      en entornos hospitalarios y ambulatorios.
  BC-2810.70.10:
    name: Fisioterapia
    description: |
      Valoración y tratamiento de fisioterapia en entornos hospitalarios y ambulatorios.
  BC-2810.70.20:
    name: Terapia ocupacional
    description: |
      Valoración y tratamiento de terapia ocupacional orientados a la independencia funcional.
  BC-2810.70.30:
    name: Logopedia y terapia del lenguaje
    description: |
      Servicios de terapia del habla, el lenguaje y la deglución.
  BC-2810.70.40:
    name: Rehabilitación cardíaca y pulmonar
    description: |
      Prestación de programas de rehabilitación cardíaca y pulmonar.
  BC-2810.80:
    name: Prestación de atención domiciliaria y comunitaria
    description: |
      Atención prestada en el domicilio o entorno comunitario del paciente, incluyendo
      visitas de salud a domicilio, cuidados paliativos y monitorización remota.
  BC-2810.80.10:
    name: Visitas de salud a domicilio
    description: |
      Visitas cualificadas a domicilio, incluyendo enfermería y terapia en el hogar.
  BC-2810.80.20:
    name: Atención paliativa y hospicio a domicilio
    description: |
      Atención al final de la vida y cuidados paliativos prestados en el domicilio.
  BC-2810.80.30:
    name: Visitas de salud comunitaria
    description: |
      Visitas de agentes de salud comunitaria y programas de alcance comunitario.
  BC-2810.80.40:
    name: Atención mediante monitorización remota
    description: |
      Servicios de monitorización remota del paciente para poblaciones con enfermedades crónicas y post-agudas.

locale: es
source: L1-smelting-refining-operations-management.yaml
entries:
  BC-4450:
    name: Gestión de operaciones de fundición y refinación
    description: |
      Refinación pirometalúrgica y electroquímica de concentrados e intermedios
      en metales entregables a la LME o de especificación, incluyendo la
      recuperación de subproductos, el tratamiento de gases de escape y la
      contabilidad metalúrgica.

  BC-4450.10:
    name: Recepción y homogenización de concentrados
    description: |
      Muestreo en recepción, homogenización de la alimentación e inventario de
      los concentrados que ingresan al complejo de fundición.
    in_scope:
      - Muestreo y ensayo en recepción
      - Homogenización de la alimentación de fundición
      - Inventario en patio de concentrados
    out_of_scope:
      - Liquidación de ventas de concentrados (BC-4480.40)

  BC-4450.10.10:
    name: Muestreo de concentrados en recepción
    description: |
      Muestreo y ensayo de concentrados recibidos de minas de terceros y propias.

  BC-4450.10.20:
    name: Homogenización de la alimentación de fundición
    description: |
      Homogenización de concentrados para cumplir los objetivos de ley e
      impurezas de la alimentación de fundición.

  BC-4450.10.30:
    name: Gestión del inventario de concentrados
    description: |
      Gestión del inventario de concentrados en patios, galpones y silos.

  BC-4450.20:
    name: Operaciones pirometalúrgicas
    description: |
      Tostación, fusión, conversión y manejo de escorias de concentrados
      sulfurados y oxidados.

  BC-4450.20.10:
    name: Operaciones de tostación
    description: |
      Operación de tostadores de lecho fluido y de múltiples hogares para la
      oxidación de sulfuros.

  BC-4450.20.20:
    name: Operaciones de horno de fusión
    description: |
      Operación de hornos de fusión flash, eléctricos y de baño.

  BC-4450.20.30:
    name: Operaciones de convertidor
    description: |
      Operación de convertidores Peirce-Smith, rotativos de soplado superior y
      continuos.

  BC-4450.20.40:
    name: Manejo de escorias
    description: |
      Sangría, granulación, limpieza y disposición de escoria de hornos y
      convertidores.

  BC-4450.30:
    name: Operaciones de refinación electrolítica
    description: |
      Operaciones de electrodeposición y electrorefinación en salas de
      electrólisis para la producción de metal cátodo.

  BC-4450.30.10:
    name: Operaciones de electrodeposición
    description: |
      Operación de celdas de electrodeposición que producen cátodo a partir del
      electrolito de lixiviación.

  BC-4450.30.20:
    name: Operaciones de sala de electrólisis para electrorefinación
    description: |
      Operación de celdas de electrorefinación que producen cátodo de alta
      pureza a partir de ánodos.

  BC-4450.30.30:
    name: Stripping y manejo de cátodos
    description: |
      Stripping, lavado, pesaje y empaque de cátodos para venta o colada
      posterior.

  BC-4450.40:
    name: Recuperación de metales subproductos
    description: |
      Recuperación de metales preciosos y secundarios a partir de lodos anódicos,
      polvos y corrientes de subproductos.

  BC-4450.40.10:
    name: Tratamiento de lodos anódicos
    description: |
      Tratamiento de lodos anódicos de electrorefinación para la recuperación de
      metales preciosos.

  BC-4450.40.20:
    name: Refinación de metales preciosos
    description: |
      Refinación de oro, plata y metales del grupo del platino a lingotes o
      esponja.

  BC-4450.40.30:
    name: Recuperación de corrientes de subproductos
    description: |
      Recuperación de selenio, telurio, ácido sulfúrico y otras corrientes de
      subproductos.

  BC-4450.50:
    name: Casa de colada y acabado de productos
    description: |
      Colada, marcado e inspección de calidad de productos metálicos terminados
      conforme a la especificación comercial.

  BC-4450.50.10:
    name: Operaciones de colada
    description: |
      Colada de barras, lingotes, palanquillas, planchones y formas a partir de
      metal fundido.

  BC-4450.50.20:
    name: Marcado y branding de productos
    description: |
      Marcado, estampado y aplicación de marca en productos colados para
      trazabilidad y aceptación en bolsas de metales.

  BC-4450.50.30:
    name: Inspección de calidad de metales terminados
    description: |
      Inspección y certificación del metal terminado frente a la especificación
      y los requisitos de registro en bolsas.

  BC-4450.60:
    name: Operaciones de planta de gases y ácido de fundición
    description: |
      Limpieza de gases de escape de fundición, operaciones de planta de ácido
      sulfúrico y monitoreo de emisiones de chimenea.

  BC-4450.60.10:
    name: Limpieza de gases de escape
    description: |
      Operación de precipitadores electrostáticos, scrubbers y sistemas de
      enfriamiento para los gases de escape de fundición.

  BC-4450.60.20:
    name: Operaciones de planta de ácido sulfúrico
    description: |
      Operación de plantas de ácido sulfúrico de doble contacto y doble absorción
      sobre los gases de escape de fundición.

  BC-4450.60.30:
    name: Monitoreo de emisiones de chimenea
    description: |
      Monitoreo continuo de emisiones de dióxido de azufre, material particulado
      y metales en chimenea.

  BC-4450.70:
    name: Contabilidad metalúrgica de fundición
    description: |
      Balance de metales, ensayos de liquidación y contabilidad de tratamiento a
      maquila en el complejo de fundición.

  BC-4450.70.10:
    name: Balance de metales y ensayos de liquidación
    description: |
      Reconciliación periódica del balance de metales y ensayos de grado de
      liquidación para los productos embarcados.

  BC-4450.70.20:
    name: Informes de recuperación y pérdidas
    description: |
      Informes de la recuperación metalúrgica y las pérdidas en corrientes a lo
      largo de la fundición y la refinería.

  BC-4450.70.30:
    name: Contabilidad de tratamiento a maquila
    description: |
      Contabilidad de concentrados de terceros tratados a maquila y del metal de
      propiedad del cliente.

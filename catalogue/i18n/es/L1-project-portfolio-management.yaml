locale: es
source: L1-project-portfolio-management.yaml
entries:
  BC-900:
    name: Gestión de proyectos y cartera
    description: |
      Planifica, prioriza y ejecuta proyectos y programas, y opera la Oficina de Gestión de Proyectos para maximizar el valor entregado por la organización.
  BC-900.10:
    name: Gestión de la cartera
    description: |
      Define la composición, priorización y equilibrio de la cartera de iniciativas estratégicas.
  BC-900.10.10:
    name: Definición de la composición de la cartera
    description: |
      Establece la composición de la cartera por tema estratégico, tipo de iniciativa y perfil de riesgo.
  BC-900.10.20:
    name: Priorización y selección de la cartera
    description: |
      Evalúa y selecciona las iniciativas que se incorporan a la cartera según criterios de valor y viabilidad.
  BC-900.10.30:
    name: Equilibrio de la cartera
    description: |
      Balancea la cartera entre horizontes temporales, niveles de riesgo y perfiles de retorno.
  BC-900.10.40:
    name: Reporting del rendimiento de la cartera
    description: |
      Elabora cuadros de mando, informes de estado y reporte de beneficios de la cartera.
  BC-900.20:
    name: Gestión de programas
    description: |
      Planifica, ejecuta y gobierna programas complejos que agrupan proyectos interdependientes.
  BC-900.20.10:
    name: Definición y movilización del programa
    description: |
      Define el plano director, el mandato y la movilización inicial del programa.
  BC-900.20.20:
    name: Integración del plan del programa
    description: |
      Integra los planes de proyecto, dependencias e hitos a nivel de programa.
  BC-900.20.30:
    name: Gestión de riesgos e incidencias del programa
    description: |
      Gestiona los riesgos, incidencias y dependencias a nivel de programa.
  BC-900.20.40:
    name: Cierre del programa
    description: |
      Ejecuta el cierre del programa, la transferencia a operaciones y la captura de lecciones aprendidas.
  BC-900.30:
    name: Gestión de proyectos
    description: |
      Planifica, ejecuta y controla proyectos para entregar el alcance acordado en plazo, coste y calidad.
  BC-900.30.10:
    name: Planificación del proyecto
    description: |
      Define el alcance, el cronograma, el coste y la planificación de recursos del proyecto.
  BC-900.30.20:
    name: Ejecución y seguimiento del proyecto
    description: |
      Gestiona la ejecución diaria del proyecto y el seguimiento del avance.
  BC-900.30.30:
    name: Gestión de riesgos e incidencias del proyecto
    description: |
      Identifica y gestiona los riesgos, incidencias y decisiones del proyecto.
  BC-900.30.40:
    name: Gestión de la calidad del proyecto
    description: |
      Asegura la calidad de los entregables del proyecto y gestiona la aceptación formal.
  BC-900.30.50:
    name: Cierre y transferencia del proyecto
    description: |
      Ejecuta el cierre del proyecto, la transferencia a operaciones y la revisión post-implantación.
  BC-900.40:
    name: Gestión de la gobernanza de proyectos
    description: |
      Establece las puertas de decisión, los comités de dirección y las revisiones de aseguramiento que garantizan la integridad de los proyectos.
  BC-900.40.10:
    name: Gobierno por etapas y puertas de decisión
    description: |
      Define los criterios, las puertas de etapa y los procesos de aprobación del ciclo de vida del proyecto.
  BC-900.40.20:
    name: Operaciones del comité de dirección
    description: |
      Gestiona los términos de referencia, los órdenes del día y las decisiones del comité de dirección.
  BC-900.40.30:
    name: Revisiones de aseguramiento del proyecto
    description: |
      Realiza revisiones de aseguramiento independientes y revisiones de puerta a lo largo del proyecto.
  BC-900.40.40:
    name: Auditoría de proyectos y lecciones aprendidas
    description: |
      Ejecuta auditorías post-proyecto y captura y difunde las lecciones aprendidas.
  BC-900.50:
    name: Gestión de operaciones de la PMO
    description: |
      Opera la Oficina de Gestión de Proyectos, proveyendo metodología, herramientas y servicios de apoyo a los equipos de proyecto.
  BC-900.50.10:
    name: Metodología y estándares de la PMO
    description: |
      Define la metodología de gestión de proyectos, las plantillas y los estándares (PRINCE2, PMI, ágil).
  BC-900.50.20:
    name: Herramientas y reporting de la PMO
    description: |
      Gestiona las herramientas de gestión de proyectos, los cuadros de mando y los informes.
  BC-900.50.30:
    name: Desarrollo de capacidades de la PMO
    description: |
      Impulsa el desarrollo de competencias y la certificación de los gestores de proyectos.
  BC-900.50.40:
    name: Gestión del rendimiento de la PMO
    description: |
      Realiza el seguimiento del cuadro de mando, el valor y el rendimiento de la PMO.
  BC-900.60:
    name: Gestión de la demanda y la capacidad
    description: |
      Gestiona la entrada de demanda de proyectos y la planificación de la capacidad de los recursos de entrega.
  BC-900.60.10:
    name: Registro de demanda de proyectos
    description: |
      Captura, cualifica y aprueba las nuevas solicitudes de proyecto que entran en la organización.
  BC-900.60.20:
    name: Planificación de la capacidad de recursos
    description: |
      Planifica la capacidad de los equipos de entrega y las habilidades requeridas.
  BC-900.60.30:
    name: Asignación y nivelación de recursos
    description: |
      Asigna recursos entre proyectos y resuelve los conflictos de disponibilidad.
  BC-900.60.40:
    name: Reporting de utilización de recursos
    description: |
      Informa sobre la utilización de recursos, las horas facturables y las previsiones de demanda.

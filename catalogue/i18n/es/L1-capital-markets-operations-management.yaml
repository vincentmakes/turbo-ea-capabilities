locale: es
source: L1-capital-markets-operations-management.yaml
entries:
  BC-1380:
    name: Operaciones en mercados de capitales
    description: |
      Confirmación de operaciones, compensación, liquidación, custodia, colateral, eventos corporativos y conciliación.
  BC-1380.10:
    name: Gestión de confirmación de operaciones
    description: |
      Captura, registro, confirmación y alegación de operaciones.
  BC-1380.10.10:
    name: Captura y registro de operaciones
    description: |
      Captura y registro de operaciones en sistemas de front y middle office.
  BC-1380.10.20:
    name: Conciliación de confirmaciones de operaciones
    description: |
      Conciliación y afirmación de confirmaciones de operaciones.
  BC-1380.10.30:
    name: Gestión de alegaciones de operaciones
    description: |
      Gestión de alegaciones y operaciones no conciliadas.
  BC-1380.20:
    name: Gestión de compensación
    description: |
      Compensación centralizada, CCP y membresía en cámaras de compensación.
  BC-1380.20.10:
    name: Envío de operaciones a CCP
    description: |
      Envío de operaciones compensadas a contrapartes centrales.
  BC-1380.20.20:
    name: Gestión de márgenes de compensación
    description: |
      Gestión de márgenes iniciales y de variación con las CCP.
  BC-1380.20.30:
    name: Operaciones como miembro compensador
    description: |
      Operación de servicios de compensación directa y de clientes.
  BC-1380.30:
    name: Gestión de liquidación
    description: |
      Liquidación DvP, ciclos T+1/T+2 y gestión de fallos de liquidación.
  BC-1380.30.10:
    name: Generación de instrucciones de liquidación
    description: |
      Generación de instrucciones de liquidación para las operaciones.
  BC-1380.30.20:
    name: Operaciones de liquidación de valores
    description: |
      Operaciones de liquidación DvP en CSD e ICSD.
  BC-1380.30.30:
    name: Gestión de fallos de liquidación
    description: |
      Identificación y resolución de fallos de liquidación (CSDR).
  BC-1380.40:
    name: Gestión de custodia
    description: |
      Custodia de valores y redes de subcustodia.
  BC-1380.40.10:
    name: Custodia de valores
    description: |
      Custodia de valores para clientes y cuentas propietarias.
  BC-1380.40.20:
    name: Gestión de la red de subcustodia
    description: |
      Gestión de la red de subcustodia y bancos agentes.
  BC-1380.40.30:
    name: Servicios fiscales de custodia
    description: |
      Servicios de recuperación de retenciones fiscales relacionados con la custodia.
  BC-1380.50:
    name: Gestión de colateral
    description: |
      Colateral, márgenes y optimización.
  BC-1380.50.10:
    name: Gestión de llamadas al margen
    description: |
      Emisión y respuesta a llamadas al margen bajo regímenes bilaterales y de CCP.
  BC-1380.50.20:
    name: Operaciones de movimiento de colateral
    description: |
      Movimiento operativo de colateral entre contrapartes.
  BC-1380.50.30:
    name: Optimización de colateral
    description: |
      Optimización del uso y sustitución de colateral.
  BC-1380.50.40:
    name: Gestión de elegibilidad de colateral
    description: |
      Reglas de elegibilidad de colateral y aplicación de descuentos (haircuts).
  BC-1380.60:
    name: Gestión de eventos corporativos
    description: |
      Procesamiento de eventos corporativos obligatorios y voluntarios.
  BC-1380.60.10:
    name: Notificación de eventos corporativos
    description: |
      Captura y notificación de eventos corporativos a los clientes.
  BC-1380.60.20:
    name: Procesamiento de eventos corporativos obligatorios
    description: |
      Procesamiento de dividendos, intereses y eventos obligatorios.
  BC-1380.60.30:
    name: Procesamiento de eventos corporativos voluntarios
    description: |
      Procesamiento de eventos voluntarios incluyendo elecciones.
  BC-1380.60.40:
    name: Operaciones de voto por delegación
    description: |
      Recopilación y envío de votos por delegación.
  BC-1380.70:
    name: Gestión de conciliaciones
    description: |
      Conciliación de cuentas nostro/vostro, posiciones y efectivo.
  BC-1380.70.10:
    name: Conciliación de efectivo
    description: |
      Conciliación de cuentas de efectivo incluyendo nostro/vostro.
  BC-1380.70.20:
    name: Conciliación de posiciones en valores
    description: |
      Conciliación de posiciones en valores entre sistemas y depositarios.
  BC-1380.70.30:
    name: Conciliación de operaciones front-back
    description: |
      Conciliación de operaciones de extremo a extremo entre sistemas.
  BC-1380.70.40:
    name: Investigación de diferencias de conciliación
    description: |
      Investigación y resolución de diferencias de conciliación.
  BC-1380.80:
    name: Gestión del préstamo de valores
    description: |
      Préstamo y toma prestada de valores y gestión de colateral.
  BC-1380.80.10:
    name: Originación de préstamo de valores
    description: |
      Originación de operaciones de préstamo y toma prestada de valores.
  BC-1380.80.20:
    name: Operaciones de colateral en préstamo de valores
    description: |
      Operaciones de colateral que sustentan el préstamo de valores.
  BC-1380.80.30:
    name: Cálculo de comisiones y reembolsos en préstamo de valores
    description: |
      Cálculo y liquidación de comisiones y reembolsos.
  BC-1380.80.40:
    name: Gestión de recuperación en préstamo de valores
    description: |
      Recuperación de valores prestados y operaciones de sustitución.

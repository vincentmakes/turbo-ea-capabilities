locale: es
source: L1-content-distribution-delivery-management.yaml
entries:
  BC-3740:
    name: "Gestión de distribución y entrega de contenidos"
    description: |
      Difusión lineal, entrega OTT y en streaming, operaciones de red de distribución
      de contenidos, IPTV y multidifusión, protección de contenidos, y distribución
      sindical y de afiliados a superficies de consumo y socios.
  BC-3740.10:
    name: "Distribución de difusión lineal"
    description: |
      Operación de la distribución de difusión lineal a través de vías de transporte
      digital terrestre, satélite y cable.
  BC-3740.10.10:
    name: "Operaciones de difusión terrestre"
    description: |
      Operación de cadenas de transmisión digital terrestre y transporte de múltiplex.
  BC-3740.10.20:
    name: "Operaciones de enlace ascendente por satélite"
    description: |
      Operación de cadenas de enlace ascendente por satélite para distribución
      directa al hogar y de contribución.
  BC-3740.10.30:
    name: "Operaciones de cabecera de cable"
    description: |
      Operación del transporte por cable e integración de la cabecera
      con las plataformas de operadores.
  BC-3740.20:
    name: "Entrega OTT y en streaming"
    description: |
      Operación de origen de streaming, empaquetado y streaming en vivo
      para servicios OTT directos al consumidor y de socios.
  BC-3740.20.10:
    name: "Operaciones del servicio de origen"
    description: |
      Operación de los servicios de origen de streaming que sirven contenido
      bajo demanda y en directo a las superficies de entrega.
  BC-3740.20.20:
    name: "Empaquetado de streaming adaptativo"
    description: |
      Streaming adaptativo just-in-time y preempaquetado para HLS, MPEG-DASH y CMAF.
  BC-3740.20.30:
    name: "Operaciones de streaming en vivo"
    description: |
      Operación de flujos de streaming en vivo para eventos, canales
      y servicios de flujo continuo.
  BC-3740.30:
    name: "Operaciones de la red de distribución de contenidos"
    description: |
      Gestión de capacidad, caché y rendimiento por coste de las redes
      de distribución de contenidos para la distribución de contenido.
  BC-3740.30.10:
    name: "Planificación de capacidad de la red de distribución"
    description: |
      Previsión y aprovisionamiento de capacidad de la red de distribución
      por regiones, interconexión y eventos pico.
  BC-3740.30.20:
    name: "Gestión del caché en el perímetro"
    description: |
      Gestión del volumen de caché en el perímetro, el comportamiento de llenado
      y la descarga a cachés de socios.
  BC-3740.30.30:
    name: "Optimización de coste y rendimiento de la red de distribución"
    description: |
      Enrutamiento con múltiples redes de distribución y optimización de coste
      y rendimiento entre socios de entrega.
  BC-3740.40:
    name: "Gestión de entrega IPTV y multidifusión"
    description: |
      Operación de cabeceras IPTV de grado telco, flujos de multidifusión
      y activación del servicio en decodificadores.
  BC-3740.40.10:
    name: "Operaciones de cabecera IPTV"
    description: |
      Operación de cabeceras IPTV, incluyendo adquisición de señal, codificación
      e integración de acceso condicional.
  BC-3740.40.20:
    name: "Gestión de flujos de multidifusión"
    description: |
      Gestión del aprovisionamiento de flujos de multidifusión en portadoras
      IP y de difusión 3GPP.
  BC-3740.40.30:
    name: "Activación del servicio en decodificadores"
    description: |
      Activación de decodificadores y dispositivos gestionados en el servicio IPTV,
      incluyendo el aprovisionamiento de la lista de canales.
  BC-3740.50:
    name: "Gestión de protección de contenidos y DRM"
    description: |
      Operación de sistemas de protección de contenidos, incluyendo gestión de claves
      y licencias, marcado de agua y control de flujos simultáneos.
  BC-3740.50.10:
    name: "Gestión de licencias y claves"
    description: |
      Emisión y gestión de licencias DRM y claves de contenido
      en dispositivos y plataformas.
  BC-3740.50.20:
    name: "Marcado de agua y rastreo forense"
    description: |
      Aplicación de marcas de agua de sesión y forenses para la detección
      de piratería y el rastreo del origen.
  BC-3740.50.30:
    name: "Control de flujos simultáneos"
    description: |
      Aplicación de los límites de flujos simultáneos y la política de uso
      compartido de cuentas entre espectadores y dispositivos.
  BC-3740.60:
    name: "Distribución sindical y de afiliados"
    description: |
      Distribución de programación y feeds a afiliados sindicados y plataformas
      de terceros con contabilidad de entregas.
  BC-3740.60.10:
    name: "Gestión de pedidos de sindicación"
    description: |
      Recepción y cumplimiento de pedidos de sindicación conforme a los derechos
      en poder de la empresa y las franjas de entrega.
  BC-3740.60.20:
    name: "Distribución de feeds a afiliados"
    description: |
      Distribución de feeds de red y canal a afiliados de difusión
      con transferencias de localización.
  BC-3740.60.30:
    name: "Seguimiento de entregas de programas"
    description: |
      Seguimiento de las entregas de programas a plataformas y socios,
      incluyendo prueba de entrega y gestión de excepciones.

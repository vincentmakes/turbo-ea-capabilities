locale: es
source: L1-agri-food-compliance-certification-management.yaml
entries:
  BC-3590:
    name: Gestión de cumplimiento y certificación agroalimentaria
    description: |
      Programas de cumplimiento y certificación específicos del sector — aseguramiento agrícola, ecológico, bienestar animal, indicaciones geográficas, conformidad con LMR, identificación de ganado y registros de trazabilidad anteriores a la explotación, distintos de la gestión genérica de cumplimiento y calidad.
  BC-3590.10:
    name: Gestión de certificación de aseguramiento agrícola
    description: |
      Gestión de los programas de certificación de aseguramiento agrícola, incluidos GLOBALG.A.P., LEAF Marque y esquemas nacionales equivalentes.
    in_scope:
      - GLOBALG.A.P. y aseguramiento agrícola equivalente
      - Participación en LEAF Marque
      - Coordinación de auditorías y acciones correctivas
    out_of_scope:
      - Gestión genérica de calidad (BC-720)
      - Programas de inocuidad alimentaria en el comercio minorista (BC-2380.10)
  BC-3590.10.10:
    name: Programas de certificación GLOBALG.A.P.
    description: |
      Gestión de la certificación GLOBALG.A.P. IFA, acuicultura y ganadería.
  BC-3590.10.20:
    name: LEAF Marque y programas equivalentes
    description: |
      Participación en LEAF Marque y esquemas de aseguramiento nacionales equivalentes.
  BC-3590.10.30:
    name: Coordinación de auditorías de aseguramiento agrícola
    description: |
      Coordinación de auditorías de aseguramiento agrícola y seguimiento de acciones correctivas.
  BC-3590.20:
    name: Gestión de certificación ecológica
    description: |
      Gestión de la certificación ecológica conforme al NOP del USDA, el Reglamento de Producción Ecológica de la UE, JAS Ecológico y regímenes equivalentes.
  BC-3590.20.10:
    name: Registros de conformidad con la norma ecológica
    description: |
      Registros de conformidad con la norma ecológica aplicable.
  BC-3590.20.20:
    name: Coordinación de inspecciones de certificación ecológica
    description: |
      Coordinación de inspecciones y auditorías de certificación ecológica.
  BC-3590.20.30:
    name: Autorización de insumos ecológicos
    description: |
      Verificación de que los insumos están autorizados conforme a la norma ecológica aplicable.
  BC-3590.30:
    name: Gestión de certificación de bienestar animal
    description: |
      Programas de auditoría de bienestar animal, registro de resultados de bienestar y conformidad con las normas de bienestar de la industria y el aseguramiento.
  BC-3590.30.10:
    name: Programas de auditoría de bienestar animal
    description: |
      Programas de auditoría de bienestar animal internos y de terceros.
  BC-3590.30.20:
    name: Registro de resultados de bienestar
    description: |
      Registro de las medidas de resultados de bienestar en todas las unidades ganaderas.
  BC-3590.30.30:
    name: Conformidad con la norma de bienestar
    description: |
      Evidencia de conformidad con las normas de bienestar de la industria y el aseguramiento.
  BC-3590.40:
    name: Gestión de indicación geográfica y procedencia
    description: |
      Registros y verificación que respaldan la denominación de origen protegida, la indicación geográfica y las declaraciones de procedencia.
  BC-3590.40.10:
    name: Registros de declaraciones de procedencia
    description: |
      Registros que fundamentan las declaraciones de origen, raza y procedencia.
  BC-3590.40.20:
    name: Conformidad con la indicación geográfica
    description: |
      Conformidad con DOP, IGP e indicaciones geográficas equivalentes.
  BC-3590.40.30:
    name: Verificación de origen
    description: |
      Verificación del origen mediante métodos documentales, isotópicos y de ADN.
  BC-3590.50:
    name: Gestión de residuos de pesticidas y LMR
    description: |
      Muestreo de residuos, conformidad con los LMR y cumplimiento del intervalo de retiro en los mercados de destino.
  BC-3590.50.10:
    name: Programas de muestreo de residuos
    description: |
      Programas de muestreo de residuos de pesticidas en cultivos y lotes.
  BC-3590.50.20:
    name: Monitoreo de conformidad con LMR
    description: |
      Monitoreo de conformidad con los calendarios de LMR del mercado de destino.
  BC-3590.50.30:
    name: Cumplimiento del intervalo de retiro
    description: |
      Cumplimiento de los intervalos de retiro previos a la cosecha y de la leche.
  BC-3590.60:
    name: Gestión del cumplimiento de identificación y movimiento del ganado
    description: |
      Identificación de animales, permisos de movimiento y certificación sanitaria transfronteriza para el ganado y las existencias de acuicultura.
    in_scope:
      - Identificación estatutaria de animales
      - Registro de permisos de movimiento
      - Certificación sanitaria transfronteriza
    out_of_scope:
      - Gestión genérica de cumplimiento (BC-130)
  BC-3590.60.10:
    name: Identificación de animales mediante marcas
    description: |
      Identificación estatutaria de animales mediante marcas, incluidos la identificación electrónica (EID) y las marcas auriculares.
  BC-3590.60.20:
    name: Registro de permisos de movimiento
    description: |
      Registro de permisos de movimiento estatutarios y registros de movimientos en la granja.
  BC-3590.60.30:
    name: Certificación sanitaria transfronteriza
    description: |
      Certificación sanitaria transfronteriza, incluidos los trámites en TRACES NT.
  BC-3590.70:
    name: Registros de trazabilidad anteriores a la explotación
    description: |
      Registros de trazabilidad campo-lote, animal-canal e insumo-producto que anclan los rastros EPCIS y de cadena de custodia posteriores.
  BC-3590.70.10:
    name: Trazabilidad del campo al lote
    description: |
      Trazabilidad que vincula las operaciones en campo con los lotes cosechados.
  BC-3590.70.20:
    name: Trazabilidad del animal a la canal
    description: |
      Trazabilidad que vincula los animales individuales con las canales y los cortes primarios.
  BC-3590.70.30:
    name: Registro de trazabilidad del insumo al producto
    description: |
      Registro que vincula los insumos aplicados con los lotes de productos resultantes.

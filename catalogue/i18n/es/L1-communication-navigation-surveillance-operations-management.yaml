locale: es
source: L1-communication-navigation-surveillance-operations-management.yaml
entries:
  BC-1240:
    name: Gestión de operaciones de comunicación, navegación y vigilancia
    description: |
      Infraestructura CNS: comunicaciones de voz y datos, ayudas a la navegación, radar/ADS-B/multilateración.
  BC-1240.10:
    name: Gestión de sistemas de comunicación de voz
    description: |
      Voz aire-tierra, sistemas de voz controlador-piloto y voz tierra-tierra.
  BC-1240.10.10:
    name: Operaciones de voz aire-tierra
    description: |
      Operación de comunicaciones radiotelefónicas de voz aire-tierra.
  BC-1240.10.20:
    name: Operaciones de voz tierra-tierra
    description: |
      Operación de circuitos de voz intercentros e intersectoriales.
  BC-1240.10.30:
    name: Grabación y reproducción de voz
    description: |
      Grabación y reproducción de voz operacional para fines de seguridad y auditoría.
  BC-1240.20:
    name: Gestión de comunicaciones por enlace de datos
    description: |
      CPDLC, ADS-C, FANS y enlaces de datos ATN.
  BC-1240.20.10:
    name: Operaciones CPDLC
    description: |
      Operación de las comunicaciones por enlace de datos controlador-piloto.
  BC-1240.20.20:
    name: Operaciones ADS-C
    description: |
      Operación de la vigilancia dependiente automática por contrato.
  BC-1240.20.30:
    name: Operaciones de red ATN y FANS
    description: |
      Operaciones de red de enlace de datos ATN y FANS.
  BC-1240.30:
    name: Gestión de ayudas a la navegación
    description: |
      Servicios de navegación basados en VOR, DME, ILS y GNSS.
  BC-1240.30.10:
    name: Operaciones VOR y DME
    description: |
      Operación y mantenimiento de balizas VOR y DME.
  BC-1240.30.20:
    name: Operaciones ILS
    description: |
      Operación y mantenimiento de sistemas de aproximación ILS.
  BC-1240.30.30:
    name: Servicio de navegación basado en GNSS
    description: |
      Provisión de servicio de navegación GNSS, SBAS y GBAS.
  BC-1240.30.40:
    name: Inspección en vuelo
    description: |
      Inspección periódica en vuelo de las ayudas a la navegación.
  BC-1240.40:
    name: Gestión de sistemas de vigilancia
    description: |
      Radar primario, radar secundario, ADS-B y multilateración.
  BC-1240.40.10:
    name: Operaciones de radar de vigilancia primario
    description: |
      Operación de sistemas de radar de vigilancia primario.
  BC-1240.40.20:
    name: Operaciones de radar de vigilancia secundario
    description: |
      Operación de sistemas SSR Modo S y convencionales Modo A/C.
  BC-1240.40.30:
    name: Operaciones de vigilancia ADS-B
    description: |
      Operación de estaciones terrestres ADS-B y procesamiento asociado.
  BC-1240.40.40:
    name: Operaciones de multilateración
    description: |
      Operación de vigilancia WAM/MLAT.
  BC-1240.40.50:
    name: Fusión de datos de vigilancia
    description: |
      Fusión de fuentes de vigilancia para presentación en pantalla ATC.
  BC-1240.50:
    name: Gestión del mantenimiento de la infraestructura CNS
    description: |
      Mantenimiento de campo del equipamiento CNS, calibración e inspección en vuelo.
  BC-1240.50.10:
    name: Mantenimiento preventivo CNS
    description: |
      Mantenimiento preventivo programado del equipamiento CNS.
  BC-1240.50.20:
    name: Mantenimiento correctivo CNS
    description: |
      Mantenimiento correctivo y respuesta a averías del equipamiento CNS.
  BC-1240.50.30:
    name: Calibración del equipamiento CNS
    description: |
      Calibración y ajuste del equipamiento CNS.
  BC-1240.50.40:
    name: Gestión de repuestos CNS
    description: |
      Gestión de existencias y suministro de repuestos y consumibles CNS.
  BC-1240.60:
    name: Gestión del espectro y las frecuencias
    description: |
      Asignación de frecuencias aeronáuticas, coordinación y gestión de interferencias.
  BC-1240.60.10:
    name: Asignación de frecuencias
    description: |
      Asignación de frecuencias aeronáuticas a los servicios.
  BC-1240.60.20:
    name: Coordinación de frecuencias
    description: |
      Coordinación transfronteriza e interservicios de frecuencias.
  BC-1240.60.30:
    name: Detección y resolución de interferencias
    description: |
      Detección y resolución de incidentes de interferencia de frecuencias.

locale: es
source: L1-care-coordination-management.yaml
entries:
  BC-2820:
    name: Gestión de la coordinación de la atención
    description: |
      Coordinación de la atención entre proveedores, entornos y a lo largo del tiempo, incluyendo
      derivaciones, gestión de casos, transiciones asistenciales, planificación del alta,
      gestión de la utilización y vinculación con determinantes sociales.
  BC-2820.10:
    name: Gestión de derivaciones
    description: |
      Gestión integral de las derivaciones de pacientes desde la captura de la orden hasta
      la asignación al especialista, el seguimiento y el cierre.
  BC-2820.10.10:
    name: Captura de órdenes de derivación
    description: |
      Captura de órdenes de derivación de los médicos remitentes con el contexto clínico requerido.
  BC-2820.10.20:
    name: Asignación de especialistas
    description: |
      Asignación de derivaciones a especialistas en función de la necesidad clínica, la red y el acceso.
  BC-2820.10.30:
    name: Seguimiento de derivaciones
    description: |
      Seguimiento del estado de la derivación, la programación y la finalización en toda la red.
  BC-2820.10.40:
    name: Cierre de derivaciones
    description: |
      Cierre de derivaciones con devolución del informe del especialista al médico remitente.
  BC-2820.20:
    name: Gestión de casos y atención
    description: |
      Identificación, planificación y ejecución de intervenciones de gestión de casos
      para pacientes de alto riesgo y complejidad clínica.
  BC-2820.20.10:
    name: Estratificación de casos
    description: |
      Estratificación de pacientes en niveles de gestión de casos según el riesgo clínico y social.
  BC-2820.20.20:
    name: Elaboración del plan de atención
    description: |
      Elaboración de planes de atención individualizados con objetivos centrados en el paciente.
  BC-2820.20.30:
    name: Ejecución del plan de atención
    description: |
      Ejecución y reevaluación continua de las intervenciones del plan de atención.
  BC-2820.20.40:
    name: Asignación del gestor de casos
    description: |
      Asignación y gestión de la carga de trabajo de gestores de casos y navegadores.
  BC-2820.30:
    name: Planificación del alta
    description: |
      Planificación del alta segura desde la atención hospitalaria, incluyendo evaluación de necesidades,
      derivación post-aguda y educación del paciente.
  BC-2820.30.10:
    name: Evaluación de necesidades al alta
    description: |
      Evaluación multidisciplinar de las necesidades clínicas y sociales tras el alta.
  BC-2820.30.20:
    name: Elaboración del plan de alta
    description: |
      Elaboración de planes de alta con servicios, equipamiento y seguimiento necesarios.
  BC-2820.30.30:
    name: Derivación post-aguda
    description: |
      Derivación de pacientes a centros de enfermería especializada, rehabilitación y servicios de salud a domicilio.
  BC-2820.30.40:
    name: Educación al alta
    description: |
      Educación al paciente y al cuidador sobre instrucciones de alta, medicamentos y signos de alarma.
  BC-2820.40:
    name: Transiciones de la atención
    description: |
      Coordinación de las transiciones del paciente entre proveedores y entornos para
      garantizar la continuidad, la seguridad y la responsabilidad sobre los resultados.
  BC-2820.40.10:
    name: Comunicación en el traspaso asistencial
    description: |
      Comunicación estructurada de traspaso entre proveedores y equipos en los momentos de transición.
  BC-2820.40.20:
    name: Conciliación de medicación en transiciones
    description: |
      Conciliación de medicamentos en las transiciones asistenciales.
  BC-2820.40.30:
    name: Programación de citas de seguimiento
    description: |
      Programación de citas de seguimiento tras el alta o el encuentro.
  BC-2820.40.40:
    name: Seguimiento de resultados en transiciones
    description: |
      Seguimiento de métricas de reingreso, complicaciones y resultados a lo largo de las transiciones.
  BC-2820.50:
    name: Gestión de la utilización
    description: |
      Revisión y supervisión de admisiones, estancias prolongadas y duración de la estancia
      conforme a criterios de necesidad médica y utilización.
  BC-2820.50.10:
    name: Revisión de admisión
    description: |
      Revisión de la necesidad médica de la admisión y del estatus de hospitalización frente a observación.
  BC-2820.50.20:
    name: Revisión de la estancia continuada
    description: |
      Revisión periódica de la continuación de la estancia hospitalaria conforme a criterios establecidos.
  BC-2820.50.30:
    name: Optimización de la duración de la estancia
    description: |
      Optimización de la duración de la estancia mediante identificación y resolución de barreras.
  BC-2820.50.40:
    name: Seguimiento de días evitables
    description: |
      Captura y análisis de días de hospitalización evitables y sus causas raíz.
  BC-2820.60:
    name: Determinantes sociales y vinculación comunitaria
    description: |
      Identificación de los determinantes sociales de la salud y vinculación con
      recursos comunitarios para apoyar los resultados clínicos.
  BC-2820.60.10:
    name: Cribado de necesidades sociales
    description: |
      Cribado de necesidades de vivienda, alimentación, transporte y otras necesidades sociales.
  BC-2820.60.20:
    name: Derivación a recursos comunitarios
    description: |
      Derivación a recursos comunitarios que aborden las necesidades sociales identificadas.
  BC-2820.60.30:
    name: Documentación de determinantes sociales
    description: |
      Documentación estructurada de los determinantes sociales en la historia clínica.
  BC-2820.60.40:
    name: Seguimiento de derivaciones en circuito cerrado
    description: |
      Seguimiento en circuito cerrado de las derivaciones comunitarias hasta su resultado y resolución.

locale: es
source: L1-terminal-yard-operations-management.yaml
entries:
  BC-2470:
    name: Gestión de operaciones de terminal y patio
    description: |
      Operación de terminales portuarias, intermodales, ferroviarias y de carga
      aérea, incluida la manipulación de buques y aeronaves, la gestión del
      patio, las operaciones de puerta y los equipos de terminal.
  BC-2470.10:
    name: Gestión de la manipulación de buques y aeronaves
    description: |
      Atraque, manejo en rampa y carga o descarga de mercancías de buques y
      aeronaves en las terminales.
    in_scope:
      - Operaciones de carga en muelle y rampa
      - Planificación de estiba en la interfaz de la terminal
    out_of_scope:
      - Operaciones a bordo durante el trayecto de larga distancia (BC-2420.20)
  BC-2470.10.10:
    name: Atraque y estiba de buques
    description: |
      Atraque, amarre y planificación de estiba de buques en el puerto.
  BC-2470.10.20:
    name: Manejo en rampa de aeronaves
    description: |
      Manejo en rampa y carga o descarga de mercancías de aeronaves.
  BC-2470.10.30:
    name: Operaciones de carga y descarga de mercancías
    description: |
      Carga y descarga de contenedores, ULDs y carga fraccionada.
  BC-2470.20:
    name: Gestión de patio y apilamientos
    description: |
      Asignación y movimiento de contenedores, remolques y vagones dentro de
      los patios y apilamientos de la terminal.
  BC-2470.20.10:
    name: Asignación de espacios en patio
    description: |
      Asignación de espacios en patio a las unidades entrantes y salientes.
  BC-2470.20.20:
    name: Planificación del apilamiento de contenedores
    description: |
      Planificación del apilamiento para optimizar la remanipulación y la
      preparación de la carga.
  BC-2470.20.30:
    name: Gestión de apilamientos para reefer y mercancías peligrosas
    description: |
      Gestión especializada del apilamiento para conexiones reefer y unidades
      peligrosas.
  BC-2470.30:
    name: Gestión de operaciones de puerta
    description: |
      Operaciones de puerta de camión y ferroviaria, incluidas la cita previa,
      la entrada y la salida.
  BC-2470.30.10:
    name: Operaciones de entrada por puerta
    description: |
      Recepción de camiones y vagones entrantes en la puerta de la terminal.
  BC-2470.30.20:
    name: Operaciones de salida por puerta
    description: |
      Liberación de camiones y vagones salientes desde la puerta de la
      terminal.
  BC-2470.30.30:
    name: Gestión de pre-entrada y citas
    description: |
      Gestión de identidad, documentación y ventana de cita previa a la
      entrada.
  BC-2470.40:
    name: Gestión de operaciones de equipos de terminal
    description: |
      Operación y mantenimiento de los equipos de manipulación de la terminal,
      como grúas, RTGs, reach stackers y equipos de apoyo en tierra.
  BC-2470.40.10:
    name: Operaciones de grúas y RTGs
    description: |
      Operación de grúas ship-to-shore, RTGs y grúas pórtico.
  BC-2470.40.20:
    name: Operaciones de equipos de apoyo en tierra
    description: |
      Operación de GSE como tractores, plataformas y cargadores.
  BC-2470.40.30:
    name: Mantenimiento de equipos de terminal
    description: |
      Mantenimiento y revisión general de los equipos de manipulación de la
      terminal.
  BC-2470.50:
    name: Gestión de la transferencia intermodal
    description: |
      Transferencia de mercancías y unidades entre modos en puntos intermodales,
      como patios ferroviarios y estaciones de interlínea de carga aérea.
  BC-2470.50.10:
    name: Intercambio en patio ferroviario
    description: |
      Intercambio de vagones y unidades intermodales entre operadores
      ferroviarios.
  BC-2470.50.20:
    name: Operaciones de transferencia camión-ferroviario
    description: |
      Transferencia de contenedores y remolques entre camión y ferrocarril.
  BC-2470.50.30:
    name: Interlínea de carga aérea
    description: |
      Interlínea de carga entre compañías aéreas en aeropuertos hub.
  BC-2470.60:
    name: Gestión de la capacidad y el rendimiento de la terminal
    description: |
      Medición y mejora de la productividad, el tiempo de permanencia y el
      rendimiento de la terminal.
  BC-2470.60.10:
    name: Productividad en atracaderos y posiciones
    description: |
      Medición de la productividad en los atracaderos de buques y posiciones de
      aeronaves.
  BC-2470.60.20:
    name: Gestión del tiempo de permanencia de contenedores
    description: |
      Gestión de los tiempos de permanencia de contenedores y la exposición a
      demurrage.
  BC-2470.60.30:
    name: Informe del rendimiento de la terminal
    description: |
      Reporte del rendimiento de la terminal por modo y tipo de unidad.

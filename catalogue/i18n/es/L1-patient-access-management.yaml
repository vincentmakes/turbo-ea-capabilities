locale: es
source: L1-patient-access-management.yaml
entries:
  BC-2800:
    name: Gestión del acceso del paciente
    description: |
      Incorporación previa al encuentro, programación, registro, verificación de elegibilidad,
      asesoramiento financiero, admisiones, traslados y altas en entornos de hospitalización,
      ambulatorios y de urgencias.
  BC-2800.10:
    name: Gestión de agendas y citas
    description: |
      Programación de proveedores y recursos, reserva de citas, gestión de listas de espera
      y recordatorios proactivos para optimizar la utilización de la capacidad.
  BC-2800.10.10:
    name: Optimización de agendas del proveedor
    description: |
      Optimización de las agendas de proveedores, salas y equipos mediante plantillas y superposiciones.
  BC-2800.10.20:
    name: Reserva de citas
    description: |
      Reserva de citas iniciada por el paciente o el remitente a través de múltiples canales.
  BC-2800.10.30:
    name: Gestión de listas de espera
    description: |
      Mantenimiento y priorización de listas de espera para citas y procedimientos.
  BC-2800.10.40:
    name: Recordatorios de citas y mitigación de ausencias
    description: |
      Recordatorios multicanal, confirmaciones e intervenciones para mitigar las ausencias no justificadas.
  BC-2800.20:
    name: Gestión del registro del paciente
    description: |
      Captura y administración de datos demográficos, de identidad y de consentimiento
      necesarios para registrar al paciente en un encuentro.
  BC-2800.20.10:
    name: Captura de datos demográficos
    description: |
      Captura de datos demográficos del paciente en el momento del registro.
  BC-2800.20.20:
    name: Verificación de identidad del paciente
    description: |
      Verificación de la identidad del paciente mediante documentación y controles biométricos.
  BC-2800.20.30:
    name: Captura de consentimientos y autorizaciones
    description: |
      Captura de consentimientos y autorizaciones de tratamiento, financieras y de intercambio de información.
  BC-2800.20.40:
    name: Gestión de identificadores del paciente
    description: |
      Emisión y mantenimiento de números de historia clínica e identificadores de paciente a nivel empresarial.
  BC-2800.30:
    name: Verificación de elegibilidad y prestaciones
    description: |
      Verificación de la cobertura del seguro, las prestaciones y los requisitos de autorización
      antes de la prestación del servicio.
  BC-2800.30.10:
    name: Verificación de cobertura del seguro
    description: |
      Verificación de la cobertura activa del seguro y de los detalles del plan.
  BC-2800.30.20:
    name: Determinación de prestaciones
    description: |
      Determinación de las prestaciones del paciente, deducibles, copagos y límites de cobertura.
  BC-2800.30.30:
    name: Gestión de autorizaciones previas
    description: |
      Presentación, seguimiento y seguimiento de solicitudes de autorización previa ante los pagadores.
  BC-2800.30.40:
    name: Consulta de elegibilidad en tiempo real
    description: |
      Consulta electrónica de elegibilidad y prestaciones en tiempo real ante los sistemas del pagador.
  BC-2800.40:
    name: Asesoramiento financiero y estimación de costes
    description: |
      Asesoramiento financiero al paciente, estimación del gasto propio e inscripción
      en asistencia financiera o acuerdos de pago directo.
  BC-2800.40.10:
    name: Evaluación financiera del paciente
    description: |
      Evaluación de la capacidad financiera del paciente y de las opciones de pago.
  BC-2800.40.20:
    name: Estimación de costes
    description: |
      Generación de estimaciones del gasto propio y del coste total para los servicios planificados.
  BC-2800.40.30:
    name: Atención benéfica y asistencia financiera
    description: |
      Determinación de elegibilidad e inscripción en programas de atención benéfica y asistencia financiera.
  BC-2800.40.40:
    name: Configuración de pago directo
    description: |
      Configuración de acuerdos de pago directo, prepagos y planes de cuotas.
  BC-2800.50:
    name: Gestión de admisiones, traslados y altas
    description: |
      Gestión operativa de las admisiones hospitalarias, traslados entre centros,
      asignación de camas y captura de la disposición al alta.
  BC-2800.50.10:
    name: Admisión hospitalaria
    description: |
      Admisión de pacientes en servicios de hospitalización desde fuentes programadas y no programadas.
  BC-2800.50.20:
    name: Traslado entre centros
    description: |
      Coordinación de traslados de pacientes entre centros y niveles asistenciales.
  BC-2800.50.30:
    name: Asignación de camas
    description: |
      Asignación y reasignación de camas de hospitalización en función de la gravedad, el aislamiento y la capacidad.
  BC-2800.50.40:
    name: Captura de la disposición al alta
    description: |
      Captura de la disposición al alta, la derivación post-aguda y el destino de traslado.
  BC-2800.60:
    name: Gestión de la preparación previa al servicio
    description: |
      Autorización previa al procedimiento, verificación de documentación y actividades de
      preparación del paciente completadas antes de la prestación del servicio.
  BC-2800.60.10:
    name: Autorización previa al procedimiento
    description: |
      Autorización clínica y anestésica para los procedimientos programados.
  BC-2800.60.20:
    name: Verificación de documentación requerida
    description: |
      Verificación de que las órdenes, consentimientos y documentación de historia y exploración física están completos.
  BC-2800.60.30:
    name: Contacto previo a la visita
    description: |
      Contacto previo con el paciente para formularios, historial clínico y prerregistro.
  BC-2800.60.40:
    name: Instrucciones de preparación del paciente
    description: |
      Entrega al paciente de instrucciones de preparación para el procedimiento o la visita.

locale: es
source: L1-government-grants-funding-management.yaml
entries:
  BC-3260:
    name: Gestión de subvenciones y financiación pública
    description: |
      Convocatoria y administración de subvenciones competitivas y por fórmula, así como de
      financiación gubernamental a organizaciones, comunidades y personas, incluida la solicitud,
      la revisión, la concesión, el seguimiento y el cierre.
  BC-3260.10:
    name: Diseño de programas de subvenciones
    description: |
      Diseño de los programas de subvenciones, incluidos los objetivos, la elegibilidad, las
      fórmulas de financiación y los criterios de evaluación.
  BC-3260.10.10:
    name: Definición de objetivos del programa
    description: |
      Definición de los objetivos, los resultados y la teoría del cambio del programa de
      subvenciones.
  BC-3260.10.20:
    name: Modelización de asignaciones de financiación
    description: |
      Modelización de las asignaciones de financiación, incluidos los diseños por fórmula,
      competitivos y de cofinanciación.
  BC-3260.10.30:
    name: Establecimiento de criterios de evaluación
    description: |
      Establecimiento de los criterios de revisión de méritos y evaluación para la selección
      de subvenciones.
  BC-3260.20:
    name: Gestión de convocatorias y avisos
    description: |
      Publicación de oportunidades de financiación, avisos de disponibilidad de fondos y
      documentación de la convocatoria.
  BC-3260.20.10:
    name: Publicación de oportunidades de financiación
    description: |
      Publicación de convocatorias de subvenciones, avisos de disponibilidad de fondos y
      documentación de la convocatoria.
  BC-3260.20.20:
    name: Difusión y apoyo a solicitantes
    description: |
      Difusión, sesiones informativas y apoyo a los solicitantes de programas de subvenciones.
  BC-3260.20.30:
    name: Atención de preguntas previas a la adjudicación
    description: |
      Atención de preguntas y aclaraciones previas a la adjudicación procedentes de posibles
      solicitantes.
  BC-3260.30:
    name: Recepción y revisión de solicitudes
    description: |
      Recepción, cribado y revisión de méritos de las solicitudes de subvención, incluida la
      revisión por panel y la puntuación.
  BC-3260.30.10:
    name: Presentación de solicitudes
    description: |
      Presentación y recepción de solicitudes de subvención y documentación de apoyo.
  BC-3260.30.20:
    name: Cribado de elegibilidad
    description: |
      Cribado de las solicitudes respecto a los criterios de elegibilidad y los umbrales mínimos.
  BC-3260.30.30:
    name: Revisión de méritos y puntuación
    description: |
      Revisión por panel, puntuación y clasificación de las solicitudes conforme a los criterios
      publicados.
  BC-3260.30.40:
    name: Gestión de revisores y conflictos de interés
    description: |
      Captación de revisores y gestión de los conflictos de interés.
  BC-3260.40:
    name: Adjudicación y decisión de financiación
    description: |
      Decisiones de adjudicación, emisión de acuerdos de subvención y compromiso de fondos
      a los beneficiarios.
  BC-3260.40.10:
    name: Selección de adjudicatarios
    description: |
      Selección final de las solicitudes adjudicadas y los importes de la subvención.
  BC-3260.40.20:
    name: Emisión del acuerdo de subvención
    description: |
      Redacción y ejecución de los acuerdos de subvención y sus términos y condiciones.
  BC-3260.40.30:
    name: Compromiso y configuración del desembolso
    description: |
      Compromiso de fondos y configuración de los calendarios de desembolso.
  BC-3260.50:
    name: Seguimiento e informes de beneficiarios
    description: |
      Seguimiento del rendimiento de los beneficiarios de subvenciones, informes financieros y
      cumplimiento de los términos de la subvención.
  BC-3260.50.10:
    name: Revisión de informes de rendimiento
    description: |
      Revisión de los informes de rendimiento y avance de los beneficiarios respecto a los hitos.
  BC-3260.50.20:
    name: Revisión de informes financieros
    description: |
      Revisión de los informes financieros y las solicitudes de disposición de fondos de los
      beneficiarios.
  BC-3260.50.30:
    name: Seguimiento y verificación in situ
    description: |
      Visitas in situ y verificación de las actividades y los resultados de los beneficiarios.
  BC-3260.50.40:
    name: Supervisión de subbeneficiarios
    description: |
      Supervisión de los acuerdos de transmisión y subeneficiarios.
  BC-3260.60:
    name: Cierre de subvenciones y resolución de auditorías
    description: |
      Informes finales, cierre, resolución de auditorías y recuperación de costes no admisibles.
  BC-3260.60.10:
    name: Aceptación del informe final y los resultados
    description: |
      Aceptación de los informes finales y los resultados al término del programa.
  BC-3260.60.20:
    name: Resolución de auditorías únicas y de cumplimiento
    description: |
      Resolución de los hallazgos de auditorías únicas y de cumplimiento respecto a los
      beneficiarios de subvenciones.
  BC-3260.60.30:
    name: Recuperación de costes no admisibles
    description: |
      Recuperación de costes no admisibles y saldos no comprometidos al cierre del programa.

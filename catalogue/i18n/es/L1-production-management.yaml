locale: es
source: L1-production-management.yaml
entries:
  BC-1000:
    name: Gestión de producción
    description: |
      Producción de bienes físicos, incluyendo planificación, programación y ejecución a nivel empresarial.
  BC-1000.10:
    name: Gestión de estrategia de producción
    description: |
      Huella de fabricación, estrategia de fabricar/comprar y capacidad a largo plazo.
  BC-1000.10.10:
    name: Estrategia de huella de fabricación
    description: |
      Definición a largo plazo de la huella de fabricación y el rol de cada planta.
  BC-1000.10.20:
    name: Estrategia de fabricar o comprar
    description: |
      Estrategia de fabricar o comprar y subcontratación por línea de producto.
  BC-1000.10.30:
    name: Estrategia de capacidad
    description: |
      Estrategia de capacidad a largo plazo y planificación de expansión de capital.
  BC-1000.10.40:
    name: Diseño del modelo operativo de fabricación
    description: |
      Diseño del modelo operativo y de gobernanza de fabricación.
  BC-1000.20:
    name: Gestión de planificación de producción
    description: |
      Programa maestro de producción y planificación a mediano plazo (semanas y meses).
  BC-1000.20.10:
    name: Programación maestra de producción
    description: |
      Generación del programa maestro de producción en todas las plantas.
  BC-1000.20.20:
    name: Planificación de capacidad preliminar
    description: |
      Validación preliminar de capacidad frente al programa maestro.
  BC-1000.20.30:
    name: Planificación de producción a mediano plazo
    description: |
      Planificación de producción semanal y mensual por línea.
  BC-1000.20.40:
    name: Reconciliación del plan de producción
    description: |
      Reconciliación del plan de producción con la oferta y la demanda.
  BC-1000.30:
    name: Gestión de programación de producción
    description: |
      Programación detallada y secuenciación (horas y días).
  BC-1000.30.10:
    name: Programación finita detallada
    description: |
      Programación de capacidad finita a nivel de máquina y línea.
  BC-1000.30.20:
    name: Optimización de secuencia
    description: |
      Optimización de la secuencia para minimizar cambios y desperdicios.
  BC-1000.30.30:
    name: Seguimiento del cumplimiento del programa
    description: |
      Seguimiento del cumplimiento del programa y replanificación.
  BC-1000.30.40:
    name: Liberación de órdenes de producción
    description: |
      Liberación de órdenes de producción al taller.
  BC-1000.40:
    name: Gestión de ejecución de producción
    description: |
      Supervisión de la ejecución, despacho y control en tiempo real.
  BC-1000.40.10:
    name: Despacho de órdenes de producción
    description: |
      Despacho de órdenes a centros de trabajo.
  BC-1000.40.20:
    name: Seguimiento del estado de producción
    description: |
      Seguimiento en tiempo real del estado de las órdenes de producción.
  BC-1000.40.30:
    name: Gestión de excepciones de producción
    description: |
      Gestión de excepciones de producción y escalaciones.
  BC-1000.40.40:
    name: Cierre de órdenes de producción
    description: |
      Confirmación, liquidación y cierre de órdenes de producción.
  BC-1000.50:
    name: Gestión del desempeño de producción
    description: |
      OEE, rendimiento, producción y KPI de producción.
  BC-1000.50.10:
    name: Medición de OEE
    description: |
      Medición y reporte de la efectividad global del equipo.
  BC-1000.50.20:
    name: Análisis de rendimiento y producción
    description: |
      Análisis de rendimiento, producción y rendimiento a la primera pasada.
  BC-1000.50.30:
    name: Análisis de paros y pérdidas
    description: |
      Clasificación de paros y análisis del árbol de pérdidas.
  BC-1000.50.40:
    name: Reporte de desempeño de producción
    description: |
      Reporte de desempeño de planta y comparación de referencia.
  BC-1000.60:
    name: Gestión de costos de producción
    description: |
      Costos estándar, variaciones de producción y análisis de costos.
  BC-1000.60.10:
    name: Establecimiento de costos estándar
    description: |
      Establecimiento y revaluación de costos estándar para artículos producidos.
  BC-1000.60.20:
    name: Análisis de variaciones de producción
    description: |
      Análisis de variaciones de material, mano de obra y gastos generales.
  BC-1000.60.30:
    name: Reporte de costos de producción
    description: |
      Reporte periódico de costos de producción y comparación de referencia.

locale: es
source: L1-diagnostic-services-management.yaml
entries:
  BC-2860:
    name: Gestión de los servicios de diagnóstico
    description: |
      Laboratorio, anatomía patológica, imagen diagnóstica, diagnósticos cardiopulmonares,
      pruebas en el punto de atención y gestión integral de resultados diagnósticos.
  BC-2860.10:
    name: Gestión de los servicios de laboratorio
    description: |
      Recogida de muestras, bioquímica clínica, hematología, microbiología,
      pruebas moleculares y operaciones del sistema de información de laboratorio.
  BC-2860.10.10:
    name: Recogida y transporte de muestras
    description: |
      Flebotomía, recogida de muestras y logística de transporte.
  BC-2860.10.20:
    name: Bioquímica clínica y hematología
    description: |
      Operaciones de bioquímica clínica, hematología y coagulación.
  BC-2860.10.30:
    name: Microbiología y pruebas moleculares
    description: |
      Pruebas diagnósticas de microbiología, virología y moleculares.
  BC-2860.10.40:
    name: Operaciones del sistema de información de laboratorio
    description: |
      Operación del sistema de información de laboratorio e interfaces con los instrumentos.
  BC-2860.20:
    name: Servicios de anatomía patológica
    description: |
      Operaciones de histología, citología, anatomía patológica quirúrgica y patología digital.
  BC-2860.20.10:
    name: Procesamiento histológico
    description: |
      Procesamiento, inclusión, corte y tinción de tejidos para histología.
  BC-2860.20.20:
    name: Servicios de citología
    description: |
      Preparación, cribado e informe de muestras citológicas.
  BC-2860.20.30:
    name: Informe de anatomía patológica quirúrgica
    description: |
      Interpretación e informe por el patólogo de los casos de anatomía patológica quirúrgica.
  BC-2860.20.40:
    name: Operaciones de patología digital
    description: |
      Adquisición de imágenes de portaobjetos completos, almacenamiento y flujo de trabajo de patología digital.
  BC-2860.30:
    name: Servicios de imagen diagnóstica
    description: |
      Adquisición, lectura, archivo y gestión de dosis para las modalidades de imagen diagnóstica.
  BC-2860.30.10:
    name: Adquisición de imágenes
    description: |
      Adquisición de estudios de imagen mediante radiografía, TC, RM, ecografía y medicina nuclear.
  BC-2860.30.20:
    name: Lectura e informe de imágenes
    description: |
      Lectura e informe estructurado de estudios de imagen por radiólogos.
  BC-2860.30.30:
    name: Operaciones de archivado de imágenes
    description: |
      Operación de archivos de imagen e intercambio de imágenes entre centros.
  BC-2860.30.40:
    name: Gestión de la dosis de radiación
    description: |
      Seguimiento, optimización e informe de dosis de radiación al paciente.
  BC-2860.40:
    name: Diagnósticos de cardiología y cardiopulmonares
    description: |
      Servicios de electrocardiografía, ecocardiografía, cateterismo cardíaco y pruebas de función pulmonar.
  BC-2860.40.10:
    name: Electrocardiografía y telemetría
    description: |
      Adquisición de ECG, monitorización telemétrica e interpretación de arritmias.
  BC-2860.40.20:
    name: Ecocardiografía
    description: |
      Servicios de ecocardiografía transtorácica, transesofágica y de esfuerzo.
  BC-2860.40.30:
    name: Cateterismo cardíaco
    description: |
      Servicios de cateterismo cardíaco diagnóstico y estudio electrofisiológico.
  BC-2860.40.40:
    name: Pruebas de función pulmonar
    description: |
      Espirometría, volúmenes pulmonares, difusión y pruebas de función pulmonar en ejercicio.
  BC-2860.50:
    name: Pruebas en el punto de atención
    description: |
      Gobernanza, control de calidad, competencia del operador e integración de resultados
      para las pruebas en el punto de atención en toda la organización.
  BC-2860.50.10:
    name: Gestión de dispositivos en el punto de atención
    description: |
      Gestión del inventario y el ciclo de vida de los dispositivos de pruebas en el punto de atención.
  BC-2860.50.20:
    name: Control de calidad en el punto de atención
    description: |
      Control de calidad y pruebas de aptitud para dispositivos en el punto de atención.
  BC-2860.50.30:
    name: Gestión de la competencia del operador
    description: |
      Certificación y evaluación de la competencia de los operadores para las pruebas en el punto de atención.
  BC-2860.50.40:
    name: Integración de resultados en el punto de atención
    description: |
      Integración de los resultados del punto de atención en el registro de laboratorio y la historia clínica.
  BC-2860.60:
    name: Gestión de resultados diagnósticos
    description: |
      Validación, distribución y gestión de reglas de reflejo para resultados diagnósticos de todas las modalidades.
  BC-2860.60.10:
    name: Validación de resultados
    description: |
      Validación técnica y clínica de resultados diagnósticos.
  BC-2860.60.20:
    name: Notificación de valores críticos
    description: |
      Notificación a tiempo de valores críticos a los proveedores solicitantes.
  BC-2860.60.30:
    name: Distribución de resultados
    description: |
      Distribución de resultados a los proveedores solicitantes, pacientes y sistemas externos.
  BC-2860.60.40:
    name: Reglas de pruebas de reflejo
    description: |
      Elaboración y operación de reglas de pruebas de reflejo y lógica de adición.

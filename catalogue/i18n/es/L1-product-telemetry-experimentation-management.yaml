locale: es
source: L1-product-telemetry-experimentation-management.yaml
entries:
  BC-4280:
    name: Gestión de telemetría de producto y experimentación
    description: |
      Instrumentación, gobernanza y análisis de la telemetría de uso del
      producto, así como diseño y ejecución de experimentos de funcionalidades
      que orientan las decisiones sobre el producto.
  BC-4280.10:
    name: Instrumentación de telemetría del producto
    description: |
      Captura de eventos de uso del producto desde entornos de ejecución
      de cliente y servidor conforme a esquemas de eventos definidos.
  BC-4280.10.10:
    name: Definición del esquema de eventos
    description: |
      Definición de los esquemas de eventos del producto, incluyendo
      propiedades requeridas y opcionales.
  BC-4280.10.20:
    name: Instrumentación de telemetría del cliente
    description: |
      Instrumentación de los entornos de ejecución del cliente para emitir
      eventos del producto.
  BC-4280.10.30:
    name: Instrumentación de telemetría del servidor
    description: |
      Instrumentación de los entornos de ejecución del servidor para emitir
      eventos del producto.
  BC-4280.20:
    name: Calidad y gobernanza de la telemetría
    description: |
      Gobernanza del esquema, monitoreo de la calidad del pipeline y filtrado
      de privacidad de la telemetría del producto.
  BC-4280.20.10:
    name: Gobernanza del esquema de telemetría
    description: |
      Gobernanza de los esquemas de eventos del producto en todas las
      superficies del producto.
  BC-4280.20.20:
    name: Monitoreo de la calidad del pipeline de telemetría
    description: |
      Monitoreo de la corrección, integridad y actualidad del pipeline
      de telemetría.
  BC-4280.20.30:
    name: Filtrado de privacidad de la telemetría
    description: |
      Filtrado, redacción y minimización de la telemetría conforme a los
      compromisos de privacidad.
  BC-4280.30:
    name: Analítica de uso del producto
    description: |
      Vistas analíticas del uso del producto, incluyendo embudos, cohortes
      de retención y compromiso con funcionalidades.
  BC-4280.30.10:
    name: Analítica de embudos
    description: |
      Análisis de embudos de conversión y abandono en los recorridos
      del producto.
  BC-4280.30.20:
    name: Analítica de cohortes de retención
    description: |
      Análisis basado en cohortes de la retención de usuarios a lo largo
      del tiempo.
  BC-4280.30.30:
    name: Informes de compromiso con funcionalidades
    description: |
      Informes sobre el compromiso con funcionalidades específicas en toda
      la base de usuarios.
  BC-4280.40:
    name: Gestión del programa de experimentación
    description: |
      Metodología, revisión del diseño y adjudicación de experimentos que
      orientan las decisiones sobre el producto.
  BC-4280.40.10:
    name: Estándares de metodología de experimentación
    description: |
      Estándares para la metodología de experimentación válida en todos
      los equipos de producto.
  BC-4280.40.20:
    name: Revisión del diseño de experimentos
    description: |
      Revisión de los diseños de experimentos conforme a los estándares
      de metodología y ética.
  BC-4280.40.30:
    name: Adjudicación de resultados de experimentos
    description: |
      Adjudicación de los resultados de los experimentos y las consiguientes
      decisiones sobre el producto.
  BC-4280.50:
    name: Ejecución de pruebas A/B
    description: |
      Configuración, segmentación y monitoreo de las pruebas A/B y
      multivariante en ejecución.
  BC-4280.50.10:
    name: Configuración de experimentos
    description: |
      Configuración de las variantes del experimento y las reglas de
      asignación.
  BC-4280.50.20:
    name: Segmentación de experimentos
    description: |
      Segmentación de las cohortes del experimento hacia las audiencias
      apropiadas.
  BC-4280.50.30:
    name: Monitoreo de experimentos
    description: |
      Monitoreo de los experimentos en ejecución para guardarraíles y
      detención anticipada.
  BC-4280.60:
    name: Síntesis de conocimiento del cliente
    description: |
      Síntesis de señales cuantitativas y cualitativas en decisiones sobre
      el producto y memorandos de decisión.
  BC-4280.60.10:
    name: Síntesis de conocimiento cuantitativo
    description: |
      Síntesis de hallazgos cuantitativos a partir de la telemetría y la
      experimentación.
  BC-4280.60.20:
    name: Síntesis de conocimiento cualitativo
    description: |
      Síntesis de los hallazgos de la investigación cualitativa en
      conocimientos sobre el producto.
  BC-4280.60.30:
    name: Redacción de memorandos de decisión
    description: |
      Redacción de memorandos de decisión que registran la evidencia, la
      elección y el razonamiento.

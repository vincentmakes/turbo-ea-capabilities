locale: es
source: L1-chemical-bulk-logistics-management.yaml
entries:
  BC-4680:
    name: Gestión de logística de productos químicos a granel
    description: |
      Gestión de productos químicos a granel por medios de parque de tanques, carretera, ferrocarril, marítimo, tubería y almacenamiento, incluyendo operaciones conformes con mercancías peligrosas, maquila y medición de transferencia de custodia a granel. Distinta de la Cadena de Suministro transversal (BC-520) y de los L1 de Transporte, que abarcan el flete genérico y multimodal a nivel de red.
  BC-4680.10:
    name: Operaciones de almacenamiento a granel y parque de tanques
    description: |
      Operación de tanques de almacenamiento a granel y parques de tanques, incluyendo asignación, limpieza y conciliación de pérdidas.
  BC-4680.10.10:
    name: Gestión del inventario del parque de tanques
    description: |
      Gestión del inventario en parques de tanques atmosféricos y a presión.
  BC-4680.10.20:
    name: Asignación de tanques y encaminamiento
    description: |
      Asignación de tanques a productos y encaminamiento de los flujos de entrada y salida.
  BC-4680.10.30:
    name: Coordinación de la limpieza de tanques
    description: |
      Coordinación de la limpieza de tanques entre cambios de producto.
  BC-4680.10.40:
    name: Conciliación de pérdidas del parque de tanques
    description: |
      Conciliación de las pérdidas físicas en los inventarios del parque de tanques.
  BC-4680.20:
    name: Logística de camiones cisterna y contenedores ISO
    description: |
      Operación de flotas de camiones cisterna y contenedores ISO, incluyendo operaciones de bahía de carga y limpieza de contenedores.
  BC-4680.20.10:
    name: Programación de camiones cisterna
    description: |
      Programación de los movimientos de camiones cisterna y asignación de muelles.
  BC-4680.20.20:
    name: Gestión de la flota de contenedores ISO
    description: |
      Gestión de flotas de contenedores ISO, incluyendo posicionamiento y reutilización.
  BC-4680.20.30:
    name: Operaciones de bahía de carga
    description: |
      Operación de bahías de carga para el despacho de camiones cisterna y contenedores ISO.
  BC-4680.20.40:
    name: Coordinación de la limpieza de contenedores
    description: |
      Coordinación de la limpieza aprobada de contenedores entre cargas.
  BC-4680.30:
    name: Logística de vagones cisterna
    description: |
      Asignación, carga, descarga y coordinación del mantenimiento de vagones cisterna.
  BC-4680.30.10:
    name: Asignación de vagones cisterna
    description: |
      Asignación de vagones cisterna a productos y rutas.
  BC-4680.30.20:
    name: Operaciones de carga y descarga por ferrocarril
    description: |
      Operación de rampas de carga y descarga por ferrocarril.
  BC-4680.30.30:
    name: Coordinación del mantenimiento de vagones cisterna
    description: |
      Coordinación del mantenimiento y la cualificación de la flota de vagones cisterna.
  BC-4680.40:
    name: Logística marítima de productos químicos a granel
    description: |
      Logística marítima para buques cisterna parceleros y quimiqueros, incluyendo fletamento, carga y estiba.
  BC-4680.40.10:
    name: Coordinación del fletamento de buques quimiqueros
    description: |
      Coordinación del fletamento de buques quimiqueros y parceleros.
  BC-4680.40.20:
    name: Operaciones de carga y descarga marítima
    description: |
      Operación de instalaciones de carga y descarga marítima.
  BC-4680.40.30:
    name: Planificación de la estiba en buques parceleros
    description: |
      Planificación de la estiba de cargas parceleras compatibles en buques quimiqueros.
  BC-4680.50:
    name: Coordinación de movimientos por tubería
    description: |
      Nominación, secuenciación y coordinación de la transferencia de custodia para movimientos de productos químicos a granel por tubería.
  BC-4680.50.10:
    name: Gestión de nominaciones de tubería
    description: |
      Nominación de movimientos por tubería con operadores y contrapartes.
  BC-4680.50.20:
    name: Secuenciación de lotes en tuberías
    description: |
      Secuenciación de lotes con gestión de la interfase.
  BC-4680.50.30:
    name: Coordinación de la transferencia de custodia por tubería
    description: |
      Coordinación de la transferencia de custodia en los puntos de inyección y entrega de tuberías.
  BC-4680.60:
    name: Operaciones de almacenamiento de mercancías peligrosas
    description: |
      Recepción, segregación y almacenamiento de productos químicos envasados peligrosos en almacenes conformes.
  BC-4680.60.10:
    name: Recepción y ubicación de mercancías peligrosas en almacén
    description: |
      Recepción y ubicación de productos químicos envasados peligrosos.
  BC-4680.60.20:
    name: Gestión del cumplimiento de segregación
    description: |
      Gestión del cumplimiento de la segregación química en el almacenamiento.
  BC-4680.60.30:
    name: Operaciones de almacenamiento de bidones y GRG
    description: |
      Operaciones de almacenamiento de bidones y contenedores intermedios a granel.
  BC-4680.70:
    name: Coordinación de maquila y fabricación por terceros
    description: |
      Coordinación de la fabricación por maquila en activos de terceros, incluyendo la conciliación de materiales maquilados.
  BC-4680.70.10:
    name: Selección y cualificación de maquiladores
    description: |
      Selección y cualificación de socios de fabricación por maquila.
  BC-4680.70.20:
    name: Programación de la fabricación por maquila
    description: |
      Programación de campañas de maquila en activos de terceros.
  BC-4680.70.30:
    name: Conciliación de materiales de maquila
    description: |
      Conciliación de materiales entrados y salidos de la fabricación por maquila.
  BC-4680.80:
    name: Medición de transferencia de custodia a granel
    description: |
      Medición de volumen, masa y muestreo en las interfaces de transferencia de custodia.
  BC-4680.80.10:
    name: Medición de volumen y masa
    description: |
      Medición calibrada de volumen y masa en los puntos de custodia.
  BC-4680.80.20:
    name: Coordinación del muestreo
    description: |
      Coordinación del muestreo representativo en la transferencia de custodia.
  BC-4680.80.30:
    name: Documentación de transferencia de custodia
    description: |
      Emisión y conservación de la documentación de transferencia de custodia.

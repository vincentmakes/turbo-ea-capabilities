locale: es
source: L1-engagement-quality-management.yaml
entries:
  BC-4340:
    name: Gestión de la calidad del encargo
    description: |
      Sistema de gestión de la calidad a nivel de firma, revisiones de
      calidad del encargo, revisiones de expedientes, consultas técnicas,
      seguimiento y respuesta a inspecciones externas de práctica en
      servicios profesionales.
  BC-4340.10:
    name: Sistema de gestión de la calidad de la firma
    description: |
      Diseño, implantación y funcionamiento del sistema de gestión de la
      calidad a nivel de firma, alineado con la NICC 1 y marcos equivalentes.
  BC-4340.10.10:
    name: Evaluación de riesgos de calidad
    description: |
      Identificación y valoración de los riesgos de calidad en los encargos
      y operaciones de la firma.
  BC-4340.10.20:
    name: Diseño de respuestas a los riesgos de calidad
    description: |
      Diseño de políticas y procedimientos que respondan a los riesgos de
      calidad identificados.
  BC-4340.10.30:
    name: Gobernanza y responsabilidad de la calidad
    description: |
      Asignación de responsabilidad del SGC al socio director, la dirección
      de calidad y los socios del encargo.
  BC-4340.10.40:
    name: Evaluación anual del SGC
    description: |
      Evaluación anual de la eficacia operativa del sistema de gestión de
      la calidad de la firma.
  BC-4340.20:
    name: Revisión de calidad del encargo
    description: |
      Revisión de calidad del encargo (RCE) independiente a cargo de un
      revisor ajeno al encargo, realizada antes de la emisión del informe
      en los encargos que superen umbrales de riesgo o regulatorios.
  BC-4340.20.10:
    name: Evaluación de la elegibilidad y los desencadenantes de la RCE
    description: |
      Identificación de los encargos que requieren RCE en función de
      criterios regulatorios, de riesgo o de política interna.
  BC-4340.20.20:
    name: Asignación del revisor de calidad del encargo
    description: |
      Asignación de revisores de calidad del encargo independientes y
      cualificados a los encargos activados.
  BC-4340.20.30:
    name: Ejecución y aprobación de la RCE
    description: |
      Ejecución de los procedimientos de la RCE y aprobación como condición
      previa para la publicación del entregable.
  BC-4340.30:
    name: Revisión de expedientes del encargo
    description: |
      Revisiones de expedientes en caliente y en frío, tras la emisión, de
      una muestra de expedientes cerrados para evaluar el cumplimiento de
      la metodología de la firma y las normas profesionales.
  BC-4340.30.10:
    name: Revisión de expediente en caliente
    description: |
      Revisión del expediente previa a la emisión en encargos seleccionados
      cuando se requiere un mayor nivel de aseguramiento sobre el cumplimiento.
  BC-4340.30.20:
    name: Revisión de expediente en frío
    description: |
      Revisión retrospectiva post-emisión de expedientes por muestreo para
      evaluar el cumplimiento metodológico y la calidad.
  BC-4340.30.30:
    name: Resolución de los hallazgos de la revisión de expedientes
    description: |
      Resolución de los hallazgos de la revisión de expedientes, incluyendo
      medidas correctoras, implicaciones formativas y retroalimentación al
      socio del encargo.
  BC-4340.40:
    name: Gestión de la consulta técnica
    description: |
      Consulta técnica obligatoria y voluntaria sobre asuntos complejos del
      encargo con las funciones de oficina nacional, técnica o especializada.
  BC-4340.40.10:
    name: Consulta técnica obligatoria
    description: |
      Consulta exigida por la política de la firma en situaciones complejas
      definidas, como empresa en funcionamiento, riesgo de fraude o asuntos
      novedosos.
  BC-4340.40.20:
    name: Consulta técnica voluntaria
    description: |
      Consulta discrecional solicitada por el equipo del encargo sobre
      cuestiones técnicas complejas.
  BC-4340.40.30:
    name: Documentación de la consulta técnica
    description: |
      Documentación de las solicitudes de consulta, el asesoramiento
      prestado y las conclusiones alcanzadas en el expediente del encargo.
  BC-4340.50:
    name: Seguimiento y remediación de la calidad
    description: |
      Actividades continuas de seguimiento, análisis de causa raíz de las
      deficiencias de calidad y programas de remediación.
  BC-4340.50.10:
    name: Seguimiento de indicadores de calidad
    description: |
      Seguimiento de indicadores de calidad anticipados y rezagados en toda
      la cartera de encargos.
  BC-4340.50.20:
    name: Análisis de causa raíz de deficiencias
    description: |
      Análisis de causa raíz de las deficiencias de calidad identificadas
      y los hallazgos sistémicos.
  BC-4340.50.30:
    name: Gestión de acciones de remediación
    description: |
      Definición, ejecución y verificación de las acciones de remediación
      derivadas del seguimiento e inspecciones.
  BC-4340.60:
    name: Gestión de la respuesta a inspecciones de práctica
    description: |
      Coordinación de las respuestas a las inspecciones externas de práctica
      por parte de reguladores y organismos de supervisión como PCAOB, FRC,
      IAASA, ICAEW y marcos equivalentes.
  BC-4340.60.10:
    name: Coordinación de la selección de expedientes para inspección
    description: |
      Coordinación de las selecciones de expedientes y las solicitudes de
      información de los organismos inspectores.
  BC-4340.60.20:
    name: Respuesta a los hallazgos de inspección
    description: |
      Redacción y presentación de respuestas formales a los hallazgos de
      inspección y planes de acción correctora requeridos.
  BC-4340.60.30:
    name: Comunicación de los resultados de la inspección
    description: |
      Comunicación interna y, cuando sea necesario, externa de los
      resultados de la inspección.

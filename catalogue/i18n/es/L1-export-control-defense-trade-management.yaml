locale: es
source: L1-export-control-defense-trade-management.yaml
entries:
  BC-1790:
    name: Gestión de control de exportaciones y comercio de defensa
    description: |
      Licencias de exportación, cumplimiento de ITAR/EAR, control de transferencia de tecnología y divulgación a extranjeros.
  BC-1790.10:
    name: Gestión de licencias de exportación
    description: |
      Licencias ITAR y EAR, solicitudes y condiciones.
  BC-1790.10.10:
    name: Jurisdicción y clasificación de exportaciones
    description: |
      Determinación de jurisdicción ITAR/EAR y clasificación ECCN de artículos.
  BC-1790.10.20:
    name: Solicitud de licencia de exportación
    description: |
      Solicitud de licencias DSP de ITAR y licencias BIS de EAR.
  BC-1790.10.30:
    name: Cumplimiento de condiciones de licencia
    description: |
      Seguimiento y cumplimiento de los términos y condiciones de las licencias.
  BC-1790.10.40:
    name: Informes de uso de licencias
    description: |
      Informes periódicos sobre el uso de las licencias concedidas.
  BC-1790.20:
    name: Gestión de verificación de cumplimiento comercial
    description: |
      Verificación de sanciones, partes denegadas y embargos.
  BC-1790.20.10:
    name: Verificación de partes denegadas
    description: |
      Verificación frente a listas de partes denegadas y restringidas.
  BC-1790.20.20:
    name: Verificación de países sancionados
    description: |
      Verificación de sanciones y países sometidos a embargo.
  BC-1790.20.30:
    name: Verificación de uso final restringido
    description: |
      Verificación de diligencia debida sobre uso final y usuario final.
  BC-1790.30:
    name: Gestión del control de transferencia de tecnología
    description: |
      Divulgación controlada de tecnología y acuerdos de asistencia técnica.
  BC-1790.30.10:
    name: Control de divulgación de datos técnicos
    description: |
      Control de la divulgación de datos técnicos controlados.
  BC-1790.30.20:
    name: Gestión de acuerdos de asistencia técnica
    description: |
      Gestión de TAA, MLA y acuerdos de almacenamiento.
  BC-1790.30.30:
    name: Gestión de exportaciones consideradas
    description: |
      Gestión de exportaciones consideradas a nacionales extranjeros.
  BC-1790.40:
    name: Gestión de cumplimiento aduanero y arancelario
    description: |
      Aduanas de defensa, carnés ATA y documentación de importación/exportación.
  BC-1790.40.10:
    name: Operaciones aduaneras de defensa
    description: |
      Operaciones aduaneras específicas para artículos de defensa.
  BC-1790.40.20:
    name: Gestión de carnés ATA
    description: |
      Gestión de carnés ATA para exportaciones temporales de defensa.
  BC-1790.40.30:
    name: Clasificación arancelaria y valoración
    description: |
      Clasificación arancelaria HS y valoración en aduana.
  BC-1790.50:
    name: Gestión de divulgación a extranjeros
    description: |
      Decisiones de divulgación a extranjeros, publicabilidad y divulgaciones controladas.
  BC-1790.50.10:
    name: Toma de decisiones de divulgación a extranjeros
    description: |
      Toma de decisiones sobre la divulgación de información controlada a extranjeros.
  BC-1790.50.20:
    name: Marcado de publicabilidad
    description: |
      Marcado de publicabilidad y control de difusión.
  BC-1790.50.30:
    name: Control de visitas extranjeras
    description: |
      Control de visitantes extranjeros y aprobaciones de solicitudes.

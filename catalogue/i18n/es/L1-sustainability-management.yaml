locale: es
source: L1-sustainability-management.yaml
entries:
  BC-740:
    name: Gestión de la sostenibilidad
    description: |
      Estrategia ESG, clima, economía circular e informes de sostenibilidad para integrar la responsabilidad ambiental y social en el núcleo del negocio.
  BC-740.10:
    name: Gestión de la estrategia e informes ESG
    description: |
      Estrategia ESG, evaluación de materialidad e informes de sostenibilidad para comunicar el compromiso y el progreso de la organización.
  BC-740.10.10:
    name: Desarrollo de la estrategia ESG
    description: |
      Estrategia ESG, ambiciones e integración con la estrategia empresarial.
  BC-740.10.20:
    name: Evaluación de materialidad
    description: |
      Evaluaciones de materialidad simple y doble según ESRS / GRI.
  BC-740.10.30:
    name: Informes y divulgación de sostenibilidad
    description: |
      Elaboración de informes y divulgaciones de sostenibilidad (CSRD, IFRS S1/S2, GRI).
  BC-740.10.40:
    name: Gestión y aseguramiento de datos ESG
    description: |
      Recopilación de datos ESG, controles internos y aseguramiento externo.
  BC-740.20:
    name: Gestión del clima y el carbono
    description: |
      Huella de carbono, descarbonización y divulgaciones climáticas para cumplir los compromisos de neutralidad climática.
  BC-740.20.10:
    name: Gestión del inventario de GEI
    description: |
      Inventario de gases de efecto invernadero de alcance 1, 2 y 3 según el Protocolo GEI.
  BC-740.20.20:
    name: Gestión de la hoja de ruta de descarbonización
    description: |
      Objetivos basados en la ciencia y planificación de la hoja de ruta de descarbonización.
  BC-740.20.30:
    name: Riesgo climático y análisis de escenarios
    description: |
      Riesgo climático físico y de transición, y escenarios alineados con TCFD.
  BC-740.20.40:
    name: Gestión de créditos y compensaciones de carbono
    description: |
      Adquisición y uso de créditos y compensaciones de carbono.
  BC-740.20.50:
    name: Aprovisionamiento de energía renovable
    description: |
      PPAs, certificados de energía renovable y aprovisionamiento de energías renovables.
  BC-740.30:
    name: Gestión de la economía circular
    description: |
      Circularidad, reducción de residuos y programas de retoma para extender el ciclo de vida de los materiales y productos.
  BC-740.30.10:
    name: Diseño circular de productos
    description: |
      Diseño para la reparación, reutilización, reciclaje y reducción del uso de materiales.
  BC-740.30.20:
    name: Programas de retoma y reutilización
    description: |
      Programas de retoma de clientes, reacondicionamiento y reventa.
  BC-740.30.30:
    name: Reciclaje y recuperación de materiales
    description: |
      Programas de reciclaje y reutilización de materiales recuperados.
  BC-740.30.40:
    name: Sostenibilidad del embalaje
    description: |
      Diseño de embalajes sostenibles y cumplimiento de la responsabilidad ampliada del productor.
  BC-740.40:
    name: Gestión del aprovisionamiento sostenible
    description: |
      Cadena de suministro sostenible y aprovisionamiento ético para garantizar la integridad ambiental y social del suministro.
  BC-740.40.10:
    name: Estándares de sostenibilidad para proveedores
    description: |
      Código de conducta para proveedores y estándares de sostenibilidad.
  BC-740.40.20:
    name: Evaluación ESG de proveedores
    description: |
      Calificaciones ESG, auditorías y evaluaciones de proveedores.
  BC-740.40.30:
    name: Diligencia debida en derechos humanos
    description: |
      Diligencia debida en derechos humanos y esclavitud moderna en las cadenas de suministro.
  BC-740.40.40:
    name: Aprovisionamiento responsable de materias primas
    description: |
      Aprovisionamiento responsable de minerales de conflicto, madera y materias primas.
  BC-740.50:
    name: Participación de las partes interesadas en sostenibilidad
    description: |
      Relación con ONG, comunidades y calificadoras ESG para construir confianza y alinear expectativas.
  BC-740.50.10:
    name: Relación con ONG y sociedad civil
    description: |
      Relación con ONG y sociedad civil en temas de sostenibilidad.
  BC-740.50.20:
    name: Inversión en la comunidad
    description: |
      Inversión en la comunidad, filantropía y programas de impacto social.
  BC-740.50.30:
    name: Relación con calificadoras e índices ESG
    description: |
      Relación con agencias de calificación ESG e índices de sostenibilidad.
  BC-740.50.40:
    name: Política pública y abogacía
    description: |
      Abogacía en política pública sobre cuestiones de sostenibilidad.

locale: es
source: L1-distributed-energy-resource-management.yaml
entries:
  BC-3840:
    name: Gestión de recursos energéticos distribuidos
    description: |
      Incorporación, agregación y coordinación operativa de recursos energéticos
      distribuidos conectados a la red de distribución — solar en cubierta,
      almacenamiento detrás del contador, respuesta de la demanda, carga de vehículos
      eléctricos y microrredes — y su participación en los mercados mayoristas y de
      flexibilidad.
  BC-3840.10:
    name: Registro e incorporación de recursos DER
    description: |
      Registro de recursos energéticos distribuidos, cualificación técnica y aceptación
      de la conexión bajo las reglas IEEE 1547 / Requisitos para Generadores de la UE.
  BC-3840.10.10:
    name: Evaluación de solicitudes de recursos DER
    description: |
      Evaluación de las solicitudes de conexión de recursos DER frente a la capacidad
      de acogida.
  BC-3840.10.20:
    name: Cualificación técnica de recursos DER
    description: |
      Ensayo de tipo y verificación in situ de las capacidades y protecciones de los
      recursos DER.
  BC-3840.10.30:
    name: Mantenimiento del registro de recursos DER
    description: |
      Mantenimiento del registro de activos DER conectados y sus capacidades.
  BC-3840.20:
    name: Operaciones de central eléctrica virtual
    description: |
      Agregación y despacho de recursos distribuidos como entidad operativa única en
      los mercados mayoristas y de balance.
  BC-3840.20.10:
    name: Gestión de la cartera de la central virtual
    description: |
      Composición y reequilibrio de la cartera de la central virtual por clase de activo.
  BC-3840.20.20:
    name: Operaciones de despacho de la central virtual
    description: |
      Instrucciones de despacho en tiempo real a los activos DER agregados.
  BC-3840.20.30:
    name: Liquidación del rendimiento de la central virtual
    description: |
      Liquidación del rendimiento de la central virtual frente a los compromisos de
      mercado y bilaterales.
  BC-3840.30:
    name: Operaciones de respuesta de la demanda
    description: |
      Captación, despacho y liquidación de programas de respuesta de la demanda para
      clientes residenciales, comerciales e industriales.
  BC-3840.30.10:
    name: Inscripción en programas de respuesta de la demanda
    description: |
      Inscripción de clientes y gestión del consentimiento para programas de respuesta
      de la demanda.
  BC-3840.30.20:
    name: Despacho de eventos de respuesta de la demanda
    description: |
      Despacho de eventos de respuesta de la demanda e instrucciones de reducción de
      consumo a los clientes participantes.
  BC-3840.30.30:
    name: Verificación del rendimiento de la respuesta de la demanda
    description: |
      Verificación de la entrega de la respuesta de la demanda frente a las líneas base
      de los clientes.
  BC-3840.40:
    name: Gestión de la integración de vehículos eléctricos en la red
    description: |
      Gestión de la interacción de la carga de vehículos eléctricos con la red, incluida
      la carga gestionada, V2G y las tarifas específicas para vehículos eléctricos.
  BC-3840.40.10:
    name: Operaciones de carga gestionada
    description: |
      Operación de esquemas de carga gestionada e inteligente para flotas de vehículos
      eléctricos y hogares.
  BC-3840.40.20:
    name: Coordinación vehículo-red (V2G)
    description: |
      Coordinación de la descarga bidireccional V2G a la red o detrás del contador.
  BC-3840.40.30:
    name: Análisis de capacidad de acogida de vehículos eléctricos
    description: |
      Análisis de la capacidad de acogida a nivel de alimentador para la penetración de
      carga de vehículos eléctricos.
  BC-3840.50:
    name: Coordinación del almacenamiento detrás del contador
    description: |
      Coordinación de la participación del almacenamiento en baterías detrás del contador
      en los programas de la empresa de servicios públicos y los servicios de red.
  BC-3840.50.10:
    name: Inscripción de baterías detrás del contador
    description: |
      Inscripción y consentimiento para la participación de baterías detrás del contador.
  BC-3840.50.20:
    name: Despacho del almacenamiento detrás del contador
    description: |
      Instrucciones de despacho a los activos de almacenamiento detrás del contador.
  BC-3840.50.30:
    name: Seguimiento del rendimiento del almacenamiento detrás del contador
    description: |
      Seguimiento de la entrega de las baterías detrás del contador frente a los
      compromisos con la empresa de servicios públicos.
  BC-3840.60:
    name: Previsión de recursos DER
    description: |
      Previsión a corto plazo de la generación distribuida y la carga flexible que
      contribuye a los programas del operador del sistema y del mercado.
  BC-3840.60.10:
    name: Previsión de generación solar detrás del contador
    description: |
      Previsión de la generación fotovoltaica detrás del contador a nivel de alimentador
      y zonal.
  BC-3840.60.20:
    name: Previsión de carga flexible
    description: |
      Previsión de perfiles de carga de vehículos eléctricos y carga flexible.
  BC-3840.60.30:
    name: Monitorización del rendimiento de las previsiones de recursos DER
    description: |
      Monitorización del sesgo y la calidad de las previsiones frente a los valores reales.
  BC-3840.70:
    name: Operaciones de microrredes
    description: |
      Operación de microrredes de la empresa de servicios públicos y del cliente, incluidos
      los modos conectado a la red y en isla y el control de transición sin interrupciones.
  BC-3840.70.10:
    name: Operaciones del controlador de microrred
    description: |
      Operación de los controladores de microrred y despacho de los recursos internos.
  BC-3840.70.20:
    name: Operaciones de transición al modo isla
    description: |
      Transiciones planificadas y de emergencia entre la operación conectada a la red
      y en isla.
  BC-3840.70.30:
    name: Simulacros de resiliencia de microrredes
    description: |
      Ejercicios de resiliencia y simulacros de transición sin interrupciones para
      microrredes de cargas críticas.

locale: es
source: L1-defense-capture-bid-management.yaml
entries:
  BC-1750:
    name: Gestión de captura/licitación de defensa
    description: |
      Gestión de captura, inteligencia de clientes y desarrollo de ofertas y propuestas para contratos de defensa.
  BC-1750.10:
    name: Gestión de captura
    description: |
      Actividades de captura previas a la solicitud de propuestas (RFP), orientación del cliente y estrategia de victoria.
  BC-1750.10.10:
    name: Identificación de oportunidades
    description: |
      Identificación de oportunidades y líneas de actuación en defensa.
  BC-1750.10.20:
    name: Actividades de orientación del cliente
    description: |
      Orientación del cliente antes de la RFP e influencia en los requisitos.
  BC-1750.10.30:
    name: Desarrollo de estrategia de victoria
    description: |
      Desarrollo de la estrategia de victoria, temas y diferenciadores.
  BC-1750.10.40:
    name: Análisis competitivo y de equipo contrario
    description: |
      Revisiones de equipo contrario (black hat) y análisis competitivo.
  BC-1750.20:
    name: Gestión de inteligencia de clientes de defensa
    description: |
      Relaciones con clientes e inteligencia sobre requisitos y presupuestos.
  BC-1750.20.10:
    name: Mapeo de relaciones con clientes
    description: |
      Mapeo de organizaciones de clientes y partes interesadas clave.
  BC-1750.20.20:
    name: Inteligencia de presupuestos y adquisiciones
    description: |
      Inteligencia sobre presupuestos, ciclos de adquisición y prioridades.
  BC-1750.20.30:
    name: Captura de inteligencia de requisitos
    description: |
      Captura de los requisitos emergentes de los clientes.
  BC-1750.30:
    name: Gestión de licitaciones de defensa
    description: |
      Decisiones de presentar o no presentar oferta, gobernanza de licitaciones y dotación de recursos.
  BC-1750.30.10:
    name: Decisión de presentar o no presentar oferta
    description: |
      Gobernanza y aprobaciones de la decisión de presentar o no presentar oferta.
  BC-1750.30.20:
    name: Dotación de recursos y financiación de licitaciones
    description: |
      Asignación de recursos y financiación de ofertas y propuestas.
  BC-1750.30.30:
    name: Gestión de riesgos de licitación
    description: |
      Identificación y gestión de los riesgos de licitación.
  BC-1750.40:
    name: Gestión de propuestas de defensa
    description: |
      Elaboración de propuestas, revisiones por fases y producción de propuestas.
  BC-1750.40.10:
    name: Elaboración de propuestas
    description: |
      Elaboración de los volúmenes de propuestas de defensa.
  BC-1750.40.20:
    name: Ejecución de revisiones por fases
    description: |
      Revisiones por fases (rosa, roja, dorada) y revisión final de la propuesta.
  BC-1750.40.30:
    name: Producción y presentación de propuestas
    description: |
      Producción y presentación puntual de propuestas.
  BC-1750.40.40:
    name: Verificación del cumplimiento de la propuesta
    description: |
      Verificación del cumplimiento de las instrucciones de la RFP y los criterios de evaluación.
  BC-1750.50:
    name: Gestión de estrategia de consorcios y subcontratistas
    description: |
      Acuerdos de consorcio y selección de subcontratistas para licitaciones.
  BC-1750.50.10:
    name: Definición de estrategia de consorcio
    description: |
      Definición de la estrategia de consorcio y de prime/subcontratista para licitaciones.
  BC-1750.50.20:
    name: Negociación de acuerdos de consorcio
    description: |
      Negociación y formalización de acuerdos de consorcio y NDA.
  BC-1750.50.30:
    name: Selección de subcontratistas para la licitación
    description: |
      Selección de subcontratistas y socios de pequeñas empresas para licitaciones.

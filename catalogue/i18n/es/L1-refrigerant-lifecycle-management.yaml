locale: es
source: L1-refrigerant-lifecycle-management.yaml
entries:
  BC-2040:
    name: Gestión del ciclo de vida del refrigerante
    description: |
      Ciclo de vida operativo de los refrigerantes en la base instalada — aprovisionamiento e
      inventario, contabilidad de carga, recuperación y reclamación, gestión de fugas, informes
      regulatorios bajo F-Gas / EPA Sección 608 / Enmienda de Kigali, certificación de técnicos,
      transiciones de eliminación progresiva y disposición al final de vida.
    in_scope:
      - Aprovisionamiento, asignación y almacenamiento de refrigerantes
      - Contabilidad de carga por activo y reconciliación de balance de masa
      - Recuperación en campo, reclamación y control de calidad del refrigerante reciclado
      - Detección de fugas, reparación y reporte de tasas regulatorias
      - Certificación de manipulación de refrigerantes para técnicos y seguimiento de competencias
      - Hojas de ruta de transición y eliminación progresiva de refrigerantes
      - Destrucción y disposición certificada al final de vida
    out_of_scope:
      - Aprobaciones de refrigerantes a nivel de producto durante la certificación (BC-2030)
      - Ciclo y selección de refrigerantes durante el diseño del equipo (BC-2000)
      - Conformidad ambiental general no específica de refrigerantes (BC-740)
  BC-2040.10:
    name: Gestión de aprovisionamiento e inventario de refrigerantes
    description: |
      Aprovisionamiento, asignación, almacenamiento y reconciliación de existencias de refrigerante
      en todas las operaciones.
  BC-2040.10.10:
    name: Aprovisionamiento de refrigerante
    description: |
      Aprovisionamiento de refrigerantes de proveedores aprobados.
  BC-2040.10.20:
    name: Gestión de asignación de cuotas
    description: |
      Asignación de cuotas regulatorias entre unidades de negocio y mercados.
  BC-2040.10.30:
    name: Almacenamiento y manipulación de refrigerante
    description: |
      Almacenamiento y manipulación de cilindros de refrigerante conforme a las normas de
      seguridad y medioambiente.
  BC-2040.10.40:
    name: Reconciliación del inventario de refrigerante
    description: |
      Reconciliación periódica del inventario de refrigerante en sitios y existencias en campo.
  BC-2040.20:
    name: Contabilidad de carga de refrigerante
    description: |
      Contabilidad de carga de refrigerante por activo, recargas y balance de auditoría.
  BC-2040.20.10:
    name: Registros de carga por activo
    description: |
      Registros de la carga de refrigerante instalada por activo de equipo.
  BC-2040.20.20:
    name: Registro de recargas y recargas adicionales
    description: |
      Registro de recargas adicionales y recargas frente a eventos de servicio de equipos.
  BC-2040.20.30:
    name: Auditoría de exactitud de carga
    description: |
      Auditoría de la exactitud de la contabilidad de carga en la base instalada.
  BC-2040.20.40:
    name: Reconciliación del balance de masa
    description: |
      Reconciliación del balance de masa del refrigerante aprovisionado, utilizado, recuperado
      y eliminado.
  BC-2040.30:
    name: Operaciones de recuperación y reclamación de refrigerante
    description: |
      Recuperación en campo y reclamación aguas abajo del refrigerante recuperado para su reutilización.
  BC-2040.30.10:
    name: Operaciones de recuperación en campo
    description: |
      Recuperación en sitio del refrigerante de los equipos en servicio.
  BC-2040.30.20:
    name: Reclamación de refrigerante
    description: |
      Procesamiento de reclamación del refrigerante recuperado hasta las especificaciones del
      producto virgen.
  BC-2040.30.30:
    name: Verificación de calidad del refrigerante reciclado
    description: |
      Verificación de la calidad del refrigerante reciclado antes de su reutilización.
  BC-2040.30.40:
    name: Gestión del banco de refrigerante recuperado
    description: |
      Gestión de los bancos de refrigerante que almacenan el producto reclamado para su reutilización.
  BC-2040.40:
    name: Gestión de fugas de refrigerante
    description: |
      Detección, reparación e informe de fugas de refrigerante en la base instalada.
  BC-2040.40.10:
    name: Monitoreo de detección de fugas
    description: |
      Monitoreo continuo y periódico de detección de fugas en los equipos.
  BC-2040.40.20:
    name: Flujo de trabajo de reparación de fugas
    description: |
      Flujo de trabajo para el diagnóstico y la reparación de fugas identificadas.
  BC-2040.40.30:
    name: Reporte de tasa de fugas
    description: |
      Reporte de tasas de fugas frente a los umbrales regulatorios.
  BC-2040.40.40:
    name: Análisis de puntos críticos de fugas
    description: |
      Análisis de puntos críticos de fugas recurrentes para impulsar cambios en equipos o procesos.
  BC-2040.50:
    name: Reporte regulatorio de refrigerantes
    description: |
      Reporte regulatorio del uso, fugas, recuperación y divulgaciones de sustancias de refrigerante.
  BC-2040.50.10:
    name: Informe anual F-Gas
    description: |
      Informe anual bajo las normativas de F-Gas de la UE.
  BC-2040.50.20:
    name: Reporte nacional de refrigerantes
    description: |
      Reporte bajo los programas nacionales de refrigerantes (p. ej., reporte EPA en EE. UU.).
  BC-2040.50.30:
    name: Reporte de Kigali y Montreal
    description: |
      Reporte bajo las obligaciones de la Enmienda de Kigali y el Protocolo de Montreal.
  BC-2040.50.40:
    name: Divulgación del inventario de sustancias
    description: |
      Divulgación del inventario de sustancias a reguladores y partes interesadas.
  BC-2040.60:
    name: Gestión de la certificación de técnicos en refrigerantes
    description: |
      Gestión de las certificaciones, licencias y competencias de los técnicos para la manipulación
      de refrigerantes.
  BC-2040.60.10:
    name: Registros de certificación de técnicos
    description: |
      Registros de las certificaciones de refrigerantes de los técnicos.
  BC-2040.60.20:
    name: Seguimiento de renovación de certificaciones
    description: |
      Seguimiento de las próximas renovaciones de certificaciones.
  BC-2040.60.30:
    name: Licencias nacionales de manipulación de refrigerantes
    description: |
      Gestión de licencias nacionales de manipulación de refrigerantes (EPA Sección 608,
      categorías F-Gas).
  BC-2040.60.40:
    name: Verificación de competencias
    description: |
      Verificación periódica de competencias de los técnicos que manipulan refrigerantes.
  BC-2040.70:
    name: Gestión de la eliminación progresiva y transición de refrigerantes
    description: |
      Gestión estratégica de las eliminaciones progresivas de refrigerantes y las hojas de ruta
      de transición para clientes.
  BC-2040.70.10:
    name: Hoja de ruta de sustitución de refrigerantes
    description: |
      Hoja de ruta para sustituir los refrigerantes en fase de eliminación por alternativas de
      menor GWP.
  BC-2040.70.20:
    name: Planificación de conversiones de retrofit
    description: |
      Planificación de conversiones de retrofit a refrigerantes alternativos en la base instalada.
  BC-2040.70.30:
    name: Comunicaciones de transición a clientes
    description: |
      Comunicaciones a clientes sobre transiciones de refrigerantes y plazos.
  BC-2040.70.40:
    name: Gestión de riesgos de eliminación progresiva
    description: |
      Gestión de los riesgos de suministro, regulatorios y reputacionales durante las ventanas
      de eliminación progresiva.
  BC-2040.80:
    name: Disposición y eliminación final del refrigerante
    description: |
      Destrucción y disposición certificada de los refrigerantes no aptos para su reutilización.
  BC-2040.80.10:
    name: Coordinación de destrucción
    description: |
      Coordinación con instalaciones de destrucción aprobadas.
  BC-2040.80.20:
    name: Trazabilidad de disposición certificada
    description: |
      Mantenimiento del rastro de auditoría que evidencia la disposición certificada.
  BC-2040.80.30:
    name: Reclamación de refrigerante de activos al final de vida
    description: |
      Reclamación del refrigerante de activos al final de su vida útil antes de la disposición.
  BC-2040.80.40:
    name: Gestión de proveedores de disposición
    description: |
      Gestión de los proveedores de disposición aprobados y el programa de auditoría.

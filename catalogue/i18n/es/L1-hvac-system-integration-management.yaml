locale: es
source: L1-hvac-system-integration-management.yaml
entries:
  BC-2020:
    name: Gestión de integración de sistemas HVAC
    description: |
      Ingeniería a nivel de proyecto de soluciones HVAC y BAS integradas para un edificio específico
      — cálculo de cargas, selección de equipos, diseño esquemático, lista de puntos y arquitectura
      BAS, elaboración de secuencias de operación, coordinación BIM/MEP, especificaciones del
      proyecto, gestión de envíos y soporte de ingeniería en campo.
    in_scope:
      - Cálculos de carga y selección de equipos específicos del edificio
      - Diseño esquemático mecánico, hidrónico y de refrigerante a escala de proyecto
      - Listas de puntos BAS, topología de red y disposición de paneles para proyectos
      - Elaboración de secuencias de operación específicas del proyecto
      - Coordinación BIM, especificaciones del proyecto y gestión de envíos
    out_of_scope:
      - Ingeniería de productos de equipos (BC-2000) e ingeniería de productos BAS (BC-2010)
      - Práctica de disciplina MEP interdisciplinar (BC-1100)
      - Prestación del servicio de comisionamiento (BC-2050)
      - Gestión de proyectos de ingeniería genérica (BC-1110)
  BC-2020.10:
    name: Dimensionamiento y selección de HVAC del edificio
    description: |
      Dimensionamiento de cargas y selección de equipos HVAC específicos del proyecto para
      cumplir con la intención del diseño.
  BC-2020.10.10:
    name: Cálculo de cargas de enfriamiento y calefacción
    description: |
      Cálculo de las cargas de enfriamiento y calefacción del edificio.
  BC-2020.10.20:
    name: Selección y programación de equipos
    description: |
      Selección de modelos de equipos frente a las cargas calculadas y los programas.
  BC-2020.10.30:
    name: Dimensionamiento del circuito hidrónico
    description: |
      Dimensionamiento de circuitos hidrónicos, bombas y diámetros de tuberías.
  BC-2020.10.40:
    name: Dimensionamiento de conductos y análisis de caída de presión
    description: |
      Dimensionamiento de conductos y análisis de la caída de presión del sistema.
  BC-2020.10.50:
    name: Modelado energético para selección
    description: |
      Simulación energética que apoya las compensaciones en la selección de equipos.
  BC-2020.20:
    name: Diseño esquemático del sistema HVAC
    description: |
      Diseño esquemático de los sistemas mecánicos, hidrónicos y de refrigerante integrados.
  BC-2020.20.10:
    name: Diseño esquemático mecánico
    description: |
      Diseño a nivel esquemático de sistemas de tratamiento de aire mecánicos.
  BC-2020.20.20:
    name: Diseño esquemático hidrónico
    description: |
      Diseño a nivel esquemático de circuitos de agua helada, agua caliente y agua de condensación.
  BC-2020.20.30:
    name: Diseño esquemático de tuberías de refrigerante
    description: |
      Diseño a nivel esquemático de tuberías de refrigerante para sistemas VRF y split.
  BC-2020.20.40:
    name: Diseño de esquema de control unifilar
    description: |
      Esquemas unifilares que representan la superposición de control BAS sobre los sistemas mecánicos.
  BC-2020.30:
    name: Diseño de lista de puntos y arquitectura BAS
    description: |
      Listas de puntos específicas del proyecto, topología de red BAS y asignación de paneles.
  BC-2020.30.10:
    name: Elaboración de la lista de puntos
    description: |
      Elaboración de listas de puntos BAS específicas del proyecto.
  BC-2020.30.20:
    name: Diseño de topología de red BAS
    description: |
      Diseño de topología de red BAS y segmentación para el proyecto.
  BC-2020.30.30:
    name: Asignación de controladores y disposición de paneles
    description: |
      Asignación de controladores y diseño de paneles de control para el proyecto.
  BC-2020.30.40:
    name: Aplicación de convenciones de etiquetas y nomenclatura
    description: |
      Aplicación de convenciones de etiquetas y nomenclatura a puntos y activos del proyecto.
  BC-2020.40:
    name: Elaboración de secuencias de operación
    description: |
      Elaboración específica del proyecto de secuencias de operación para sistemas HVAC.
  BC-2020.40.10:
    name: Elaboración de secuencias de zona
    description: |
      Elaboración de secuencias de control de zona a nivel de proyecto.
  BC-2020.40.20:
    name: Elaboración de secuencias de planta central
    description: |
      Elaboración de secuencias de control de planta central a nivel de proyecto.
  BC-2020.40.30:
    name: Elaboración de estrategias de ahorro de energía
    description: |
      Elaboración de estrategias de control para el ahorro de energía a nivel de proyecto.
  BC-2020.40.40:
    name: Elaboración de secuencias de alarmas y anulaciones
    description: |
      Elaboración de lógica de alarmas y secuencias de anulación del operador a nivel de proyecto.
  BC-2020.50:
    name: Coordinación BIM y MEP
    description: |
      Modelado BIM y coordinación multidisciplinar del alcance HVAC dentro del proyecto.
  BC-2020.50.10:
    name: Modelado BIM de HVAC
    description: |
      Modelado BIM del alcance HVAC para el proyecto.
  BC-2020.50.20:
    name: Detección de colisiones MEP
    description: |
      Detección de colisiones de coordinación entre disciplinas MEP.
  BC-2020.50.30:
    name: Coordinación del intercambio de modelos
    description: |
      Coordinación de formatos y entregables del intercambio de modelos BIM.
  BC-2020.50.40:
    name: Emisión del modelo de coordinación
    description: |
      Emisión de modelos BIM coordinados a las partes interesadas del proyecto.
  BC-2020.60:
    name: Elaboración de especificaciones del proyecto HVAC
    description: |
      Elaboración de especificaciones del proyecto para el alcance HVAC y de control.
  BC-2020.60.10:
    name: Elaboración de especificaciones mecánicas
    description: |
      Elaboración de especificaciones mecánicas para el proyecto.
  BC-2020.60.20:
    name: Elaboración de especificaciones de controles
    description: |
      Elaboración de especificaciones BAS y de controles para el proyecto.
  BC-2020.60.30:
    name: Elaboración de criterios de rendimiento y aceptación
    description: |
      Elaboración de criterios de rendimiento y pruebas de aceptación para el proyecto.
  BC-2020.70:
    name: Gestión de envíos de integración de sistemas
    description: |
      Gestión de envíos, planos de taller y RFI durante la fase de ejecución del proyecto.
  BC-2020.70.10:
    name: Preparación del paquete de envíos
    description: |
      Preparación de paquetes de envíos para revisión del propietario y el ingeniero.
  BC-2020.70.20:
    name: Coordinación de planos de taller
    description: |
      Coordinación de planos de taller con la intención del diseño.
  BC-2020.70.30:
    name: Gestión de respuestas a RFI
    description: |
      Gestión de RFI de diseño del contratista e integrador.
  BC-2020.70.40:
    name: Revisión de sustituciones
    description: |
      Revisión de solicitudes de sustitución de equipos y materiales.
  BC-2020.80:
    name: Soporte de ingeniería en sitio
    description: |
      Soporte de ingeniería durante la construcción e instalación, incluidas resoluciones en
      campo y registros tal como se instaló.
  BC-2020.80.10:
    name: Resolución de ingeniería en campo
    description: |
      Resolución de problemas de ingeniería en campo durante la instalación.
  BC-2020.80.20:
    name: Ingeniería de órdenes de cambio
    description: |
      Trabajo de ingeniería que respalda las órdenes de cambio durante la construcción.
  BC-2020.80.30:
    name: Actualización de planos tal como se instaló
    description: |
      Actualización de planos para reflejar las condiciones tal como se instaló.
  BC-2020.80.40:
    name: Inspección de presencia en la instalación
    description: |
      Presencia como testigo en los hitos de instalación para la aceptación de ingeniería.

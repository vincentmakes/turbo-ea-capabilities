locale: es
source: L1-events-group-operations-management.yaml
entries:
  BC-4110:
    name: Gestión de operaciones de eventos y grupos
    description: |
      Operación de eventos de reuniones, incentivos, congresos, exposiciones y banquetes
      en establecimientos de hostelería — incluyendo ventas grupales, asignación de
      espacios de función, ejecución de órdenes de eventos de banquete, gestión de bloques
      de habitaciones grupales, producción audiovisual y de escenarios, facturación y
      reporting post-evento.
    in_scope:
      - Captación de grupos, contratación y precios
      - Asignación del espacio de función y resolución de conflictos
      - Elaboración y ejecución de órdenes de eventos de banquete
      - Contrato, lista y seguimiento de ocupación del bloque de habitaciones grupal
      - Producción audiovisual, de escenarios y de eventos híbridos
      - Facturación en cuenta maestra y liquidación final
      - Reporting de bloque frente a ocupación y rendimiento post-evento
    out_of_scope:
      - Marketing de eventos empresariales genérico (BC-410)
      - Producción en cocina de banquetes y seguridad alimentaria (BC-4070)
      - Registro en recepción para llegadas de grupos (BC-4060.10)

  BC-4110.10:
    name: Gestión de ventas grupales y de eventos
    description: |
      Cualificación de captaciones grupales, operaciones de propuesta y contrato,
      concesiones de precios y reporting de pipeline para el negocio grupal.

  BC-4110.10.10:
    name: Cualificación de captaciones grupales
    description: |
      Cualificación de las captaciones grupales entrantes frente al destino, el
      espacio y el ajuste tarifario.

  BC-4110.10.20:
    name: Operaciones de propuesta y contrato grupal
    description: |
      Elaboración de propuestas y ejecución de contratos de venta grupal.

  BC-4110.10.30:
    name: Gestión de precios y concesiones grupales
    description: |
      Gestión de los precios grupales y la negociación de concesiones conforme a las
      directrices de ingresos.

  BC-4110.10.40:
    name: Reporting del pipeline grupal
    description: |
      Reporting del pipeline de ventas grupales y la conversión en las distintas
      etapas.

  BC-4110.20:
    name: Gestión del espacio de evento y la agenda de funciones
    description: |
      Definición y asignación del inventario de espacios de función, resolución de
      conflictos y planificación de configuración y capacidad.

  BC-4110.20.10:
    name: Definición del inventario de espacio de función
    description: |
      Definición del inventario de espacio de función, incluyendo capacidades,
      configuraciones y salas combinables.

  BC-4110.20.20:
    name: Reserva y asignación de espacio
    description: |
      Reserva y asignación del espacio de función para eventos confirmados y
      provisionales.

  BC-4110.20.30:
    name: Resolución de conflictos de espacio
    description: |
      Resolución de los conflictos de espacio entre solicitudes superpuestas y
      dependencias de espacios adyacentes.

  BC-4110.20.40:
    name: Planificación de configuración y capacidad
    description: |
      Planificación de las configuraciones y la capacidad por evento, teniendo en
      cuenta las restricciones de carga de incendio y accesibilidad.

  BC-4110.30:
    name: Ejecución de órdenes de eventos de banquete
    description: |
      Elaboración de órdenes de eventos de banquete, distribución a los equipos
      operativos, ejecución de montaje-servicio-desmontaje y gestión de cambios en
      las BEO.

  BC-4110.30.10:
    name: Elaboración de órdenes de eventos de banquete
    description: |
      Elaboración de las órdenes de eventos de banquete que cubren A&B, audiovisual,
      montaje y detalles de horarios.

  BC-4110.30.20:
    name: Distribución y briefing de las BEO
    description: |
      Distribución de las BEO a los equipos operativos y briefing del personal de
      ejecución.

  BC-4110.30.30:
    name: Operaciones de montaje, servicio y desmontaje
    description: |
      Operaciones de montaje, servicio y desmontaje conforme a las BEO y los horarios
      del evento.

  BC-4110.30.40:
    name: Operaciones de cambio en las BEO
    description: |
      Operaciones para gestionar los cambios en las BEO, incluyendo actualizaciones
      de los requisitos de última hora.

  BC-4110.40:
    name: Gestión del bloque de habitaciones grupales y la lista de alojamiento
    description: |
      Configuración de los contratos de bloque de habitaciones grupales, operaciones
      de lista de alojamiento, fecha límite, lavado y reporting de ocupación a nivel
      de ejecución del evento.

  BC-4110.40.10:
    name: Configuración del contrato de bloque
    description: |
      Configuración de las condiciones del contrato de bloque en los sistemas
      operativos para el evento.

  BC-4110.40.20:
    name: Operaciones de la lista de alojamiento
    description: |
      Operaciones sobre las listas de alojamiento, incluyendo actualizaciones,
      solicitudes especiales y secuenciación de llegadas.

  BC-4110.40.30:
    name: Operaciones de fecha límite y lavado del bloque
    description: |
      Operaciones de fecha límite y lavado que liberan el inventario de bloque no
      utilizado para la venta general.

  BC-4110.40.40:
    name: Reporting de ocupación del bloque
    description: |
      Reporting de la ocupación del bloque frente al contrato para la contabilidad
      de ingresos y rendimiento.

  BC-4110.50:
    name: Operaciones de audiovisual y producción del evento
    description: |
      Operaciones audiovisuales y de producción, incluyendo el audiovisual interno,
      los escenarios, la retransmisión en directo de eventos híbridos y la coordinación
      con proveedores externos.

  BC-4110.50.10:
    name: Operaciones de audiovisual interno
    description: |
      Operación del equipo y los equipos audiovisuales internos para los eventos.

  BC-4110.50.20:
    name: Producción de escenarios y decorados
    description: |
      Producción de escenarios y decorados para los eventos, incluyendo elementos
      escénicos y de rigado.

  BC-4110.50.30:
    name: Operaciones de retransmisión en directo y eventos híbridos
    description: |
      Operación de la retransmisión en directo y la prestación de eventos híbridos
      para públicos remotos y presenciales.

  BC-4110.50.40:
    name: Coordinación de proveedores externos de audiovisual
    description: |
      Coordinación de los proveedores externos de audiovisual conforme a los requisitos
      del local y de los seguros.

  BC-4110.60:
    name: Facturación del evento y gestión de la cuenta maestra
    description: |
      Configuración de cuentas maestras, facturación individual e incidental, depósitos
      y liquidación y reconciliación final del evento.

  BC-4110.60.10:
    name: Configuración de la cuenta maestra
    description: |
      Configuración de las cuentas maestras del evento y las reglas de enrutamiento
      para los elementos facturables.

  BC-4110.60.20:
    name: Operaciones de facturación individual e incidental
    description: |
      Operación de la facturación individual e incidental para los asistentes más allá
      de la cuenta maestra.

  BC-4110.60.30:
    name: Gestión de depósitos y prepagos
    description: |
      Gestión de los depósitos y prepagos frente a los hitos del evento.

  BC-4110.60.40:
    name: Liquidación y reconciliación final del evento
    description: |
      Liquidación y reconciliación final de la cuenta maestra del evento frente al
      contrato y el consumo.

  BC-4110.70:
    name: Rendimiento del evento y reporting post-evento
    description: |
      Reporting de rendimiento sobre los eventos grupales, incluyendo el bloque frente
      a la ocupación, los resultados financieros, la retroalimentación de los asistentes
      y el seguimiento de las renovaciones.

  BC-4110.70.10:
    name: Reporting de bloque frente a ocupación
    description: |
      Reporting del rendimiento de bloque frente a ocupación para los eventos
      completados.

  BC-4110.70.20:
    name: Reporting del rendimiento financiero del evento
    description: |
      Reporting del rendimiento financiero del evento frente al presupuesto y la
      previsión.

  BC-4110.70.30:
    name: Captura de retroalimentación de los asistentes
    description: |
      Captura de la retroalimentación de los asistentes a través de canales de encuesta
      post-evento y señales en tiempo real.

  BC-4110.70.40:
    name: Seguimiento de repetición de reserva y renovación
    description: |
      Seguimiento de los pipelines de repetición de reserva y las oportunidades de
      renovación derivadas de los eventos completados.

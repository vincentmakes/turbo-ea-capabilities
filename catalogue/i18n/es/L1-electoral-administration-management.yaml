locale: es
source: L1-electoral-administration-management.yaml
entries:
  BC-3330:
    name: Gestión de administración electoral
    description: |
      Administración de las elecciones, incluido el registro de electores, la gestión de
      circunscripciones electorales, el registro de candidatos y partidos, el diseño y la
      producción de papeletas, las operaciones de votación, el escrutinio y la tabulación de
      resultados, y la divulgación de la financiación de campañas.
  BC-3330.10:
    name: Gestión del registro de votantes
    description: |
      Mantenimiento del censo electoral autorizado, incluidas las altas, los cambios de
      domicilio y las operaciones de depuración del padrón.
    in_scope:
      - Alta y nueva inscripción en el censo
      - Mantenimiento del padrón electoral
      - Verificación de la elegibilidad
    out_of_scope:
      - Registro de identidad civil (cubierto por Gestión de registro civil e identidad)
  BC-3330.10.10:
    name: Inscripción de votantes
    description: |
      Inscripción de los electores habilitados en el censo electoral a través de todos los canales.
  BC-3330.10.20:
    name: Mantenimiento del padrón electoral
    description: |
      Mantenimiento del padrón, incluidas las actualizaciones de domicilio, la baja de fallecidos
      y la gestión de duplicados.
  BC-3330.10.30:
    name: Verificación de la elegibilidad del votante
    description: |
      Verificación de la elegibilidad del elector respecto a los criterios de ciudadanía, edad
      y residencia.
  BC-3330.10.40:
    name: Información al votante
    description: |
      Provisión de tarjetas censales, buscadores del lugar de votación e información de
      educación electoral.
  BC-3330.20:
    name: Gestión de circunscripciones y distritos electorales
    description: |
      Mantenimiento de los distritos electorales, las geografías de los colegios electorales
      y los ciclos de redistribución.
  BC-3330.20.10:
    name: Mantenimiento de los distritos electorales
    description: |
      Mantenimiento de los límites de los distritos y las circunscripciones electorales.
  BC-3330.20.20:
    name: Designación de colegios electorales
    description: |
      Designación, evaluación de accesibilidad y publicación de los colegios electorales.
  BC-3330.20.30:
    name: Coordinación de la redistribución electoral
    description: |
      Coordinación de los ciclos legales de redistribución y de las comisiones de delimitación.
  BC-3330.30:
    name: Registro de candidatos y partidos
    description: |
      Registro de partidos políticos, candidatos, presentación de candidaturas y acceso
      a la papeleta.
  BC-3330.30.10:
    name: Registro de partidos políticos
    description: |
      Registro y reconocimiento de los partidos políticos y sus identificadores.
  BC-3330.30.20:
    name: Presentación de candidaturas
    description: |
      Recepción y verificación de las candidaturas y las declaraciones legales de los candidatos.
  BC-3330.30.30:
    name: Determinación de acceso a la papeleta
    description: |
      Determinación del acceso a la papeleta, incluidos los requisitos de avales y los umbrales
      de habilitación.
  BC-3330.40:
    name: Diseño y producción de papeletas
    description: |
      Diseño, maquetación, accesibilidad, traducción y producción de las papeletas en formatos
      en papel y electrónico.
  BC-3330.40.10:
    name: Diseño de la maquetación de la papeleta
    description: |
      Diseño y maquetación de las papeletas para garantizar claridad, accesibilidad y cobertura
      lingüística.
  BC-3330.40.20:
    name: Traducción y accesibilidad de la papeleta
    description: |
      Provisión de papeletas traducidas y formatos accesibles para los votantes con discapacidad.
  BC-3330.40.30:
    name: Producción y distribución de papeletas
    description: |
      Impresión, programación y distribución segura de las papeletas en papel y electrónicas.
  BC-3330.50:
    name: Operaciones de votación
    description: |
      Operación de los colegios electorales el día de las elecciones, incluida la gestión de
      los apoderados, la identificación de votantes y la emisión del voto bajo los controles
      alineados con las VVSG.
  BC-3330.50.10:
    name: Gestión de los apoderados y mesas electorales
    description: |
      Captación, formación y despliegue de los miembros de las mesas electorales y los
      funcionarios de la votación.
  BC-3330.50.20:
    name: Identificación y verificación del votante
    description: |
      Identificación del votante, verificación de la identidad y entrega de la papeleta en el
      colegio electoral.
  BC-3330.50.30:
    name: Votación presencial
    description: |
      Votación presencial en papel o en equipos de votación certificados conforme a las VVSG.
  BC-3330.50.40:
    name: Operaciones de voto ausente y por correo
    description: |
      Operaciones de apoyo al voto en ausencia, por correo postal y desde el extranjero.
  BC-3330.60:
    name: Escrutinio y tabulación de resultados
    description: |
      Recuento de votos, tabulación de resultados, auditorías y proclamación de los resultados
      electorales.
  BC-3330.60.10:
    name: Recuento de votos
    description: |
      Recuento de las papeletas en papel y electrónicas conforme al procedimiento legal.
  BC-3330.60.20:
    name: Tabulación e información de resultados
    description: |
      Agregación de los resultados por colegios electorales e información pública de los mismos.
  BC-3330.60.30:
    name: Auditoría poselectoral
    description: |
      Auditorías de limitación de riesgos y poselectorales de los recuentos de votos y los
      equipos de votación.
  BC-3330.60.40:
    name: Proclamación electoral
    description: |
      Proclamación legal de los resultados electorales y declaración de los cargos electos.
  BC-3330.70:
    name: Divulgación de la financiación de campañas
    description: |
      Registro de los comités políticos, divulgación de las donaciones y los gastos, y ejecución
      de los límites de financiación electoral.
  BC-3330.70.10:
    name: Registro de comités políticos
    description: |
      Registro de los comités políticos, partidos y entidades equivalentes a los PAC.
  BC-3330.70.20:
    name: Declaración de donaciones y gastos
    description: |
      Recepción, validación y publicación de las declaraciones de donaciones y gastos.
  BC-3330.70.30:
    name: Cumplimiento de la financiación de campañas
    description: |
      Investigación y cumplimiento de las infracciones de los límites y las obligaciones de
      divulgación en la financiación electoral.

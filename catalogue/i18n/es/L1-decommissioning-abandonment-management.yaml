locale: es
source: L1-decommissioning-abandonment-management.yaml
entries:
  BC-3120:
    name: Gestión de desmantelamiento y abandono
    description: |
      Gestión del final de vida de los activos de petróleo: taponamiento
      y abandono de pozos, desmantelamiento de instalaciones, desmantelamiento
      de ductos, restauración del sitio, provisionamiento de pasivos de
      desmantelamiento y monitoreo post-cierre.
  BC-3120.10:
    name: Operaciones de taponamiento y abandono de pozos
    description: |
      Diseño y ejecución de campañas de taponamiento y abandono permanente
      de pozos.
    in_scope:
      - Diseño de P&A y verificación de barreras
      - Operaciones de ejecución de taponamiento y abandono
      - Corte y recuperación de cabezales y tuberías conductoras
    out_of_scope:
      - Vigilancia de integridad de pozos productores (BC-3020.50)
  BC-3120.10.10:
    name: Diseño de taponamiento y abandono
    description: |
      Diseño de las configuraciones de barreras permanentes para el
      abandono de pozos.
  BC-3120.10.20:
    name: Ejecución de taponamiento y abandono
    description: |
      Ejecución de operaciones de cementación, colocación de tapones
      y verificación de barreras.
  BC-3120.10.30:
    name: Corte y recuperación del cabezal de pozo
    description: |
      Corte y recuperación de cabezales de pozo, conductoras y sartas
      de tubería de revestimiento.
  BC-3120.20:
    name: Desmantelamiento de instalaciones superficiales
    description: |
      Desmantelamiento, remoción y recuperación de instalaciones
      superficiales y subsea aguas arriba y midstream.
  BC-3120.20.10:
    name: Planificación de la remoción de la cubierta superior
    description: |
      Ingeniería de la remoción de la cubierta superior y la metodología
      de instalación inversa.
  BC-3120.20.20:
    name: Ejecución de la remoción de la cubierta superior
    description: |
      Ejecución de la remoción de la cubierta superior en una sola
      operación, modular o por piezas pequeñas.
  BC-3120.20.30:
    name: Recuperación de equipo subsea
    description: |
      Recuperación de árboles subsea, manifolds, jumpers y umbilicales.
  BC-3120.30:
    name: Desmantelamiento de ductos
    description: |
      Desmantelamiento, remoción o decisión de dejada en sitio de
      ductos redundantes.
  BC-3120.30.10:
    name: Lavado y limpieza del ducto
    description: |
      Lavado, limpieza e inerting de ductos previo al desmantelamiento.
  BC-3120.30.20:
    name: Decisión de desmantelamiento del ducto
    description: |
      Evaluación comparativa de la remoción del ducto frente al
      desmantelamiento en sitio.
  BC-3120.30.30:
    name: Ejecución del desmantelamiento del ducto
    description: |
      Ejecución de la remoción, corte y izado, o dejada en sitio
      de ductos.
  BC-3120.40:
    name: Restauración y remediación del sitio
    description: |
      Restauración del sitio en tierra y subsea, remediación de suelos
      y sedimentos, y verificación del despeje del fondo marino.
  BC-3120.40.10:
    name: Remediación de suelos y sedimentos
    description: |
      Remediación de suelos y sedimentos contaminados en los sitios
      desmantelados.
  BC-3120.40.20:
    name: Restauración vegetal
    description: |
      Revegetación y remodelación del terreno en los sitios
      desmantelados en tierra.
  BC-3120.40.30:
    name: Despeje del fondo marino
    description: |
      Verificación del despeje del fondo marino subsea y recuperación
      de objetos caídos.
  BC-3120.50:
    name: Gestión del pasivo de desmantelamiento
    description: |
      Estimación de costos, provisionamiento y constitución de garantías
      para las obligaciones de desmantelamiento.
  BC-3120.50.10:
    name: Estimación del costo de abandono
    description: |
      Estimación probabilística de costos de desmantelamiento y abandono.
  BC-3120.50.20:
    name: Provisionamiento del desmantelamiento
    description: |
      Mantenimiento de las provisiones de desmantelamiento conforme a
      los estándares contables.
  BC-3120.50.30:
    name: Constitución de garantías de desmantelamiento
    description: |
      Constitución y renovación de las garantías de desmantelamiento
      ante los gobiernos anfitriones.
  BC-3120.60:
    name: Monitoreo post-cierre
    description: |
      Monitoreo ambiental a largo plazo y seguimiento de los pasivos
      residuales tras el cierre.
  BC-3120.60.10:
    name: Monitoreo ambiental a largo plazo
    description: |
      Monitoreo ambiental a largo plazo de aguas subterráneas, suelos
      y el medio marino.
  BC-3120.60.20:
    name: Seguimiento de pasivos residuales
    description: |
      Seguimiento de los pasivos e indemnizaciones residuales
      post-cierre.

locale: es
source: L1-electricity-transmission-operations-management.yaml
entries:
  BC-3810:
    name: Gestión de operaciones de transporte de electricidad
    description: |
      Operación de la red de transporte de alta tensión — despacho en sala de control,
      maniobras, operaciones de líneas y subestaciones, coordinación de interrupciones,
      protecciones y seguridad física y cibernética del sistema eléctrico de alta tensión.
  BC-3810.10:
    name: Operaciones de control del transporte
    description: |
      Operación 24/7 de la red de transporte en sala de control mediante EMS / SCADA,
      conciencia situacional y análisis de contingencias.
  BC-3810.10.10:
    name: Operaciones del EMS
    description: |
      Operación del sistema de gestión de energía, estimador de estado y herramientas
      de análisis de contingencias.
  BC-3810.10.20:
    name: Operaciones de SCADA de transporte
    description: |
      Adquisición en tiempo real de SCADA y control supervisor de activos de transporte.
  BC-3810.10.30:
    name: Gestión del libro de turno del operador de transporte
    description: |
      Mantenimiento de los libros de turno del operador, relevos de turno y registros
      de eventos operativos.
  BC-3810.20:
    name: Maniobras y aislamiento en transporte
    description: |
      Planificación y ejecución de maniobras, aislamiento y operaciones de acceso a
      instalaciones en tensión en el sistema de transporte.
  BC-3810.20.10:
    name: Preparación del programa de maniobras
    description: |
      Preparación y verificación de los programas de maniobras para trabajos planificados.
  BC-3810.20.20:
    name: Emisión de permisos de trabajo
    description: |
      Emisión y control de permisos de trabajo y autorizaciones de prueba en instalaciones
      de transporte.
  BC-3810.20.30:
    name: Operaciones en tensión y trabajos en tensión
    description: |
      Coordinación de accesos en tensión y trabajos en tensión en circuitos energizados.
  BC-3810.30:
    name: Operaciones de líneas de transporte
    description: |
      Operación, inspección y trabajo en tensión de líneas aéreas, apoyos y cables
      subterráneos de transporte.
  BC-3810.30.10:
    name: Inspección de líneas aéreas
    description: |
      Inspecciones rutinarias, en altura y aéreas de líneas de transporte aéreo.
  BC-3810.30.20:
    name: Operaciones de cables subterráneos
    description: |
      Operación, vigilancia de descargas parciales y gestión de empalmes de cables de AT.
  BC-3810.30.30:
    name: Gestión de servidumbres y desbroce de vegetación
    description: |
      Desbroce de vegetación y mantenimiento de servidumbres según normas NERC FAC-003
      o equivalentes.
  BC-3810.30.40:
    name: Mantenimiento de apoyos de transporte
    description: |
      Trabajos de pintura, cimentación e integridad estructural en apoyos de transporte.
  BC-3810.40:
    name: Operaciones de subestaciones
    description: |
      Operación y vigilancia de subestaciones de AT, transformadores, aparamenta y
      equipos de compensación reactiva.
  BC-3810.40.10:
    name: Operaciones de transformadores de potencia
    description: |
      Vigilancia, análisis de gases disueltos y operación del cambiador de tomas de
      transformadores de AT.
  BC-3810.40.20:
    name: Operaciones de aparamenta
    description: |
      Operación y vigilancia del estado de interruptores y seccionadores de AT.
  BC-3810.40.30:
    name: Operaciones de compensación reactiva
    description: |
      Operación de bancos de condensadores, reactancias, SVCs y STATCOMs para soporte reactivo.
  BC-3810.40.40:
    name: Operaciones de estaciones convertidoras HVDC
    description: |
      Operación de estaciones convertidoras HVDC y control de interconexiones en corriente continua.
  BC-3810.50:
    name: Coordinación de interrupciones en transporte
    description: |
      Planificación, programación y aprobación de interrupciones planificadas y emergentes
      en elementos de transporte con evaluación del impacto en el sistema y el mercado.
  BC-3810.50.10:
    name: Presentación del plan de interrupciones
    description: |
      Presentación y revisión de los planes de interrupción de transporte al operador del sistema.
  BC-3810.50.20:
    name: Evaluación del riesgo de interrupciones
    description: |
      Evaluación del impacto en la seguridad del sistema y el mercado de las interrupciones propuestas.
  BC-3810.50.30:
    name: Notificación de interrupciones forzadas
    description: |
      Notificación de interrupciones forzadas e indisponibilidades al operador y al regulador.
  BC-3810.60:
    name: Protección y control del transporte
    description: |
      Ajuste, vigilancia y análisis post-evento de las protecciones de transporte y
      los esquemas de protección especiales.
  BC-3810.60.10:
    name: Gestión de ajustes de protección
    description: |
      Cálculo, aprobación y emisión de los ajustes de relés de protección.
  BC-3810.60.20:
    name: Operaciones de esquemas de protección especiales
    description: |
      Operación y vigilancia de esquemas de acción correctora y protecciones especiales.
  BC-3810.60.30:
    name: Análisis de eventos perturbadores
    description: |
      Análisis de registros de perturbaciones y del comportamiento de las protecciones
      tras eventos en la red.
  BC-3810.70:
    name: Gestión de la seguridad del sistema de transporte
    description: |
      Seguridad cibernética y física del sistema eléctrico de alta tensión, incluida la
      implementación de controles NERC CIP, seguridad perimetral y registro de activos
      clasificados por impacto en el BES.
  BC-3810.70.10:
    name: Identificación de activos cibernéticos del BES
    description: |
      Identificación y clasificación de los sistemas cibernéticos del BES según NERC CIP-002.
  BC-3810.70.20:
    name: Operaciones del perímetro de seguridad electrónica
    description: |
      Operación de perímetros de seguridad electrónica y controles de acceso remoto interactivo.
  BC-3810.70.30:
    name: Operaciones del perímetro de seguridad física
    description: |
      Controles de seguridad física para centros de control y subestaciones críticas (NERC CIP-014).
  BC-3810.70.40:
    name: Gestión de evidencias de cumplimiento de NERC CIP
    description: |
      Recopilación de evidencias, atestaciones y respuesta a auditorías de las normas NERC CIP.

locale: es
source: L1-hvac-equipment-engineering-management.yaml
entries:
  BC-2000:
    name: Gestión de ingeniería de equipos HVAC
    description: |
      Ingeniería de productos mecánicos, de refrigeración y termofluidos para equipos HVAC —
      enfriadoras, bombas de calor, UTA, RTU, VRF, ventiloconvectores y unidades terminales —
      hasta la verificación de rendimiento y la preparación para ensayos de clasificación
      AHRI/Eurovent.
    in_scope:
      - Diseño de ciclo de refrigeración y ciclo de bomba de calor
      - Ingeniería de intercambiadores de calor y serpentines
      - Ingeniería de equipos de movimiento de aire e hidrónicos
      - Ingeniería de compresor, accionamiento y control a bordo
      - Verificación de rendimiento acústico, de vibración y a nivel de equipo
    out_of_scope:
      - Selección e integración de sistemas a nivel de proyecto (BC-2020)
      - Ingeniería de productos de controladores BAS (BC-2010)
      - Presentaciones de tipo-certificación y licencias de marcas (BC-2030)
      - Contabilidad operacional de refrigerante (BC-2040)
  BC-2000.10:
    name: Ingeniería del ciclo de refrigeración
    description: |
      Ingeniería de ciclos de compresión de vapor, absorción y bomba de calor para equipos HVAC.
  BC-2000.10.10:
    name: Diseño del ciclo de compresión de vapor
    description: |
      Diseño de ciclos de refrigeración por compresión de vapor para equipos de enfriamiento y calefacción.
  BC-2000.10.20:
    name: Diseño del ciclo de absorción
    description: |
      Diseño de enfriadoras y bombas de calor de ciclo de absorción.
  BC-2000.10.30:
    name: Diseño del ciclo de bomba de calor
    description: |
      Diseño de ciclos de bomba de calor reversibles en variantes de fuente de aire, agua y tierra.
  BC-2000.10.40:
    name: Ingeniería de selección de refrigerante
    description: |
      Selección de refrigerantes según objetivos termodinámicos, regulatorios, de GWP y de inflamabilidad.
  BC-2000.10.50:
    name: Optimización del rendimiento del ciclo
    description: |
      Optimización del rendimiento del ciclo en los puntos de clasificación y a carga parcial.
  BC-2000.20:
    name: Ingeniería de transferencia de calor y serpentines
    description: |
      Ingeniería de evaporadores, condensadores, ruedas de recuperación e intercambiadores de
      calor de placas soldadas y carcasa y tubos para equipos HVAC.
  BC-2000.20.10:
    name: Diseño de serpentín evaporador
    description: |
      Diseño de serpentines evaporadores de tubo aletado y microcanal.
  BC-2000.20.20:
    name: Diseño de serpentín condensador
    description: |
      Diseño de serpentines condensadores enfriados por aire y por agua.
  BC-2000.20.30:
    name: Diseño de recuperación de calor aire-aire
    description: |
      Diseño de ruedas de recuperación de energía, intercambiadores de placas y bucles de
      recirculación.
  BC-2000.20.40:
    name: Diseño de placas soldadas y carcasa y tubos
    description: |
      Diseño de intercambiadores de calor de placas soldadas y carcasa y tubos para servicio
      hidrónico y de refrigerante.
  BC-2000.20.50:
    name: Ingeniería de materiales y recubrimientos de serpentines
    description: |
      Selección de metalurgia y recubrimientos protectores para serpentines en entornos exigentes.
  BC-2000.30:
    name: Ingeniería de equipos de movimiento de aire
    description: |
      Ingeniería de ventiladores, soplantes, unidades de tratamiento de aire, compuertas y
      conjuntos de filtración.
  BC-2000.30.10:
    name: Diseño de ventiladores centrífugos
    description: |
      Diseño aerodinámico y mecánico de ventiladores centrífugos.
  BC-2000.30.20:
    name: Diseño de ventiladores axiales y de caja
    description: |
      Diseño aerodinámico y mecánico de ventiladores axiales y de caja.
  BC-2000.30.30:
    name: Ingeniería de unidades de tratamiento de aire
    description: |
      Ingeniería de secciones, carcasa y flujo de aire de UTA modulares.
  BC-2000.30.40:
    name: Ingeniería de compuertas y rejillas
    description: |
      Ingeniería de compuertas de control, compuertas cortafuego/antihumo y rejillas de
      intemperie.
  BC-2000.30.50:
    name: Ingeniería de sistemas de filtración
    description: |
      Ingeniería de secciones de filtración de partículas, fase gaseosa y HEPA.
  BC-2000.40:
    name: Ingeniería de sistemas hidrónicos y de fluidos
    description: |
      Ingeniería de bombas, tuberías, circuitos hidrónicos y accesorios de soporte dentro de
      equipos HVAC.
  BC-2000.40.10:
    name: Ingeniería de bombas
    description: |
      Selección e integración de bombas circuladoras y de succión axial en conjuntos de equipos.
  BC-2000.40.20:
    name: Diseño de tuberías y colectores
    description: |
      Diseño de tuberías internas, colectores y manifolds dentro de equipos preacondicionados.
  BC-2000.40.30:
    name: Ingeniería de circuitos de agua helada y caliente
    description: |
      Ingeniería de circuitos integrados de agua helada y agua caliente a nivel de equipo.
  BC-2000.40.40:
    name: Ingeniería de accesorios hidrónicos
    description: |
      Ingeniería de vasos de expansión, separadores de aire y filtros como accesorios preacondicionados.
  BC-2000.50:
    name: Ingeniería de compresores y accionamientos
    description: |
      Ingeniería de familias de compresores y los accionamientos que los impulsan.
  BC-2000.50.10:
    name: Ingeniería de compresores scroll
    description: |
      Ingeniería de compresores scroll utilizados en equipos de uso ligero-comercial.
  BC-2000.50.20:
    name: Ingeniería de compresores de tornillo
    description: |
      Ingeniería de compresores de tornillo utilizados en enfriadoras comerciales e industriales.
  BC-2000.50.30:
    name: Ingeniería de compresores centrífugos
    description: |
      Ingeniería de compresores centrífugos utilizados en enfriadoras de gran capacidad.
  BC-2000.50.40:
    name: Ingeniería de compresores alternativos
    description: |
      Ingeniería de compresores alternativos utilizados en bombas de calor y refrigeración.
  BC-2000.50.50:
    name: Integración de accionamientos de velocidad variable
    description: |
      Integración de accionamientos de velocidad variable con compresores y ventiladores HVAC.
  BC-2000.60:
    name: Ingeniería acústica y de vibración de equipos HVAC
    description: |
      Ingeniería acústica, de vibración y de ruido a nivel de equipo.
  BC-2000.60.10:
    name: Modelado de potencia acústica
    description: |
      Modelado de potencia acústica y presión acústica de equipos HVAC.
  BC-2000.60.20:
    name: Diseño de aislamiento de vibraciones
    description: |
      Diseño de aislamiento de vibraciones para compresores, ventiladores y bombas.
  BC-2000.60.30:
    name: Ingeniería de cabinas acústicas
    description: |
      Ingeniería de cabinas acústicas y atenuadores integrados con equipos.
  BC-2000.60.40:
    name: Ajuste del rendimiento psicoacústico
    description: |
      Ajuste de la calidad sonora percibida más allá de las métricas agregadas de potencia acústica.
  BC-2000.70:
    name: Ingeniería de control y embebida del equipo
    description: |
      Ingeniería de controladores a bordo, firmware y pilas de conectividad residentes en equipos HVAC.
  BC-2000.70.10:
    name: Ingeniería del controlador a bordo
    description: |
      Ingeniería de controladores residentes en el equipo y controladores de unidad.
  BC-2000.70.20:
    name: Ingeniería de firmware del equipo
    description: |
      Desarrollo de firmware para equipos HVAC, incluidos controladores de unidad y accionamientos.
  BC-2000.70.30:
    name: Ingeniería de comunicación del equipo inteligente
    description: |
      Ingeniería de la comunicación BAS del lado del equipo, incluidos BACnet y Modbus.
  BC-2000.70.40:
    name: Ingeniería de la lógica de diagnóstico del equipo
    description: |
      Ingeniería de la lógica de diagnóstico, alarma y código de fallo en el equipo.
  BC-2000.80:
    name: Verificación y prueba de equipos HVAC
    description: |
      Verificación del rendimiento a nivel de equipo, ejecución de ensayos de clasificación
      AHRI/Eurovent y pruebas de durabilidad.
  BC-2000.80.10:
    name: Pruebas en cámara psicrométrica
    description: |
      Pruebas de equipos HVAC en cámaras psicrométricas bajo condiciones controladas.
  BC-2000.80.20:
    name: Ejecución de ensayos de clasificación de rendimiento
    description: |
      Ejecución de ensayos de clasificación de rendimiento normalizados en equipos HVAC.
  BC-2000.80.30:
    name: Verificación del rendimiento térmico
    description: |
      Verificación de la capacidad, COP, IPLV y otras métricas de rendimiento térmico.
  BC-2000.80.40:
    name: Pruebas de durabilidad y fiabilidad
    description: |
      Pruebas de durabilidad, vida acelerada y fiabilidad de equipos HVAC.
  BC-2000.80.50:
    name: Elaboración del plan de pruebas del equipo
    description: |
      Elaboración de planes de prueba de verificación y calificación a nivel de equipo.

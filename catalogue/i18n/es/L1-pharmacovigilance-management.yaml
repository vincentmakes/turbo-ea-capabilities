locale: es
source: L1-pharmacovigilance-management.yaml
entries:
  BC-1540:
    name: Gestión de la farmacovigilancia
    description: |
      Monitoriza los eventos adversos (ADR), detecta señales de seguridad, genera informes periódicos y gestiona los planes de minimización de riesgos para garantizar la seguridad del paciente.
  BC-1540.10:
    name: Gestión de casos de eventos adversos
    description: |
      Procesa los informes individuales de seguridad (ICSR), incluida la notificación expedita a las autoridades reguladoras.
  BC-1540.10.10:
    name: Recepción y clasificación de ICSR
    description: |
      Recepción y clasificación inicial de los informes individuales de seguridad.
  BC-1540.10.20:
    name: Procesamiento de casos ICSR
    description: |
      Procesamiento, codificación y redacción de narrativas de los ICSR.
  BC-1540.10.30:
    name: Notificación expedita y periódica
    description: |
      Notificación expedita conforme a ICH E2D y GVP de la UE.
  BC-1540.10.40:
    name: Revisión médica y evaluación de causalidad
    description: |
      Revisión médica y evaluación de la causalidad de los casos de seguridad.
  BC-1540.20:
    name: Detección y gestión de señales
    description: |
      Detecta, evalúa y escala señales de seguridad mediante métodos cuantitativos y cualitativos.
  BC-1540.20.10:
    name: Detección de señales
    description: |
      Detección cuantitativa y cualitativa de señales de seguridad.
  BC-1540.20.20:
    name: Evaluación de señales
    description: |
      Evaluación y validación de las señales detectadas.
  BC-1540.20.30:
    name: Resolución y acciones sobre señales
    description: |
      Resolución de señales en acciones correctoras y cambios de etiquetado.
  BC-1540.30:
    name: Gestión de informes periódicos de seguridad
    description: |
      Produce PSUR/PBRER, DSUR y demás informes periódicos de seguridad dentro de los plazos regulatorios.
  BC-1540.30.10:
    name: Producción de PSUR/PBRER
    description: |
      Producción de los informes periódicos de beneficio-riesgo (PSUR/PBRER).
  BC-1540.30.20:
    name: Producción del DSUR
    description: |
      Producción de los informes de actualización de seguridad del desarrollo (DSUR).
  BC-1540.30.30:
    name: Notificación agregada de seguridad
    description: |
      Producción de otros informes agregados de seguridad.
  BC-1540.40:
    name: Gestión del plan de gestión de riesgos
    description: |
      Redacta y actualiza los planes de gestión de riesgos (RMP) e implementa medidas de minimización, incluidos los programas REMS.
  BC-1540.40.10:
    name: Redacción del plan de gestión de riesgos
    description: |
      Redacción de los RMP de la UE y documentos REMS.
  BC-1540.40.20:
    name: Implementación de la minimización de riesgos
    description: |
      Implementación de medidas de minimización de riesgos rutinarias y adicionales.
  BC-1540.40.30:
    name: Evaluación de la eficacia de la minimización de riesgos
    description: |
      Evaluación de la eficacia de las medidas de minimización de riesgos implementadas.
  BC-1540.50:
    name: Gestión de auditorías e inspecciones de farmacovigilancia
    description: |
      Ejecuta el programa de auditorías internas del sistema de PV y garantiza la preparación para las inspecciones de las autoridades sanitarias.
  BC-1540.50.10:
    name: Programa de auditoría del sistema de PV
    description: |
      Programa de auditoría interna que abarca el sistema de farmacovigilancia.
  BC-1540.50.20:
    name: Preparación para inspecciones de PV
    description: |
      Preparación para las inspecciones de farmacovigilancia de las autoridades sanitarias.
  BC-1540.50.30:
    name: Gestión de CAPA de PV
    description: |
      Gestión de CAPA derivadas de auditorías e inspecciones de PV.
  BC-1540.50.40:
    name: Mantenimiento del archivo maestro del sistema de PV
    description: |
      Mantenimiento del archivo maestro del sistema de farmacovigilancia (PSMF).

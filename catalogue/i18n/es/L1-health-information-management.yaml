locale: es
source: L1-health-information-management.yaml
entries:
  BC-2900:
    name: Gestión de la información de salud
    description: |
      Índice maestro de pacientes, operaciones de codificación, cesión de información,
      ciclo de vida del historial clínico, envíos a registros clínicos e interoperabilidad
      sanitaria para la organización proveedora.
  BC-2900.10:
    name: Gestión del índice maestro de pacientes
    description: |
      Administración del índice maestro de pacientes y resolución de registros
      duplicados y superpuestos.
  BC-2900.10.10:
    name: Administración del índice maestro de pacientes
    description: |
      Administración diaria del índice maestro de pacientes a nivel empresarial.
  BC-2900.10.20:
    name: Resolución de duplicados
    description: |
      Identificación y resolución de registros de pacientes duplicados y superpuestos.
  BC-2900.10.30:
    name: Algoritmos de concordancia de pacientes
    description: |
      Configuración y ajuste de los algoritmos de concordancia de pacientes.
  BC-2900.10.40:
    name: Referencia cruzada de identidades
    description: |
      Referencia cruzada de identidades de pacientes entre organizaciones afiliadas e intercambios.
  BC-2900.20:
    name: Operaciones de codificación
    description: |
      Operaciones de codificación en producción para encuentros hospitalarios y ambulatorios,
      incluyendo auditoría y gestión de la carga acumulada.
  BC-2900.20.10:
    name: Producción de codificación hospitalaria
    description: |
      Flujo de trabajo y asignación de codificación hospitalaria en producción.
  BC-2900.20.20:
    name: Producción de codificación ambulatoria
    description: |
      Flujo de trabajo de codificación ambulatoria en producción.
  BC-2900.20.30:
    name: Gestión de la carga acumulada de codificación
    description: |
      Gestión de la carga acumulada de episodios no facturados y codificación pendiente.
  BC-2900.20.40:
    name: Auditoría de codificadores
    description: |
      Auditoría interna de la exactitud de los codificadores y retroalimentación a los mismos.
  BC-2900.30:
    name: Cesión de información
    description: |
      Recepción, validación y atención de solicitudes de información sanitaria protegida.
  BC-2900.30.10:
    name: Recepción de solicitudes de información
    description: |
      Recepción de solicitudes de información de salud de pacientes, pagadores, abogados y proveedores.
  BC-2900.30.20:
    name: Validación de autorizaciones
    description: |
      Validación de autorizaciones y divulgaciones permitidas conforme a la normativa de privacidad.
  BC-2900.30.30:
    name: Seguimiento de divulgaciones
    description: |
      Seguimiento de las divulgaciones de información sanitaria protegida a efectos contables.
  BC-2900.30.40:
    name: Citaciones judiciales y solicitudes legales
    description: |
      Tramitación de citaciones judiciales, órdenes judiciales y solicitudes legales de registros.
  BC-2900.40:
    name: Ciclo de vida del historial clínico
    description: |
      Gestión del ciclo de vida de los historiales clínicos desde su creación hasta la retención y destrucción.
  BC-2900.40.10:
    name: Cierre del encuentro
    description: |
      Verificación y seguimiento de los requisitos previos al cierre del encuentro.
  BC-2900.40.20:
    name: Seguimiento de la compleción del historial
    description: |
      Seguimiento de los historiales incompletos y el seguimiento con el proveedor correspondiente.
  BC-2900.40.30:
    name: Programación de la retención de registros
    description: |
      Programación de la retención de historiales clínicos conforme a los requisitos regulatorios.
  BC-2900.40.40:
    name: Destrucción de registros
    description: |
      Destrucción autorizada de historiales clínicos al finalizar el período de retención.
  BC-2900.50:
    name: Registros clínicos y envíos
    description: |
      Envíos a registros de enfermedades, cáncer, traumatismos y calidad.
  BC-2900.50.10:
    name: Envío a registros de enfermedades
    description: |
      Envío a registros de salud pública y enfermedades.
  BC-2900.50.20:
    name: Operaciones del registro de cáncer
    description: |
      Operaciones de abstracción y envío del registro de cáncer.
  BC-2900.50.30:
    name: Operaciones del registro de traumatismos
    description: |
      Operaciones de abstracción y envío del registro de traumatismos.
  BC-2900.50.40:
    name: Envío a registros de calidad
    description: |
      Envío a registros de calidad por especialidad para la investigación clínica y la comparación.
  BC-2900.60:
    name: Operaciones de interoperabilidad sanitaria
    description: |
      Operación de conexiones de intercambio de información de salud, endpoints FHIR,
      intercambio de datos iniciado por el paciente y directorio de proveedores.
  BC-2900.60.10:
    name: Operaciones de intercambio de información de salud
    description: |
      Operaciones de las conexiones de intercambio de información de salud entrantes y salientes.
  BC-2900.60.20:
    name: Gestión de endpoints FHIR
    description: |
      Gestión de los endpoints FHIR para la integración con aplicaciones y socios.
  BC-2900.60.30:
    name: Intercambio de datos iniciado por el paciente
    description: |
      Intercambio dirigido por el paciente de su información de salud con aplicaciones de terceros.
  BC-2900.60.40:
    name: Mantenimiento del directorio de proveedores
    description: |
      Mantenimiento de los datos del directorio de proveedores para consumidores internos y externos.

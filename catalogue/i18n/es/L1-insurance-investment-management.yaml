locale: es
source: L1-insurance-investment-management.yaml
entries:
  BC-2200:
    name: Gestión de inversiones de seguros
    description: |
      Gestión del activo de los pasivos de seguros por parte de la aseguradora como propietaria de activos:
      política de inversión, ALM, asignación estratégica y táctica de activos, supervisión
      de gestores, riesgo y cumplimiento de inversiones, e informes de inversión.
  BC-2200.10:
    name: Gestión de la política y estrategia de inversión
    description: |
      Declaración de política de inversión, definición de mandatos e integración
      de la política de inversión ESG.
  BC-2200.10.10:
    name: Mantenimiento de la declaración de política de inversión
    description: |
      Mantenimiento de la declaración de política de inversión y la alineación con el principio de prudencia.
  BC-2200.10.20:
    name: Definición de mandatos de inversión
    description: |
      Definición de mandatos de inversión por cartera, ramo de negocio y perfil de riesgo.
  BC-2200.10.30:
    name: Integración de la política de inversión ESG
    description: |
      Integración de las políticas ESG y de administración responsable en los mandatos de inversión.
  BC-2200.20:
    name: Gestión de activos y pasivos (ALM)
    description: |
      Modelado ALM y calce de flujos de caja, monitoreo de duración y convexidad,
      y dimensionamiento de la reserva de liquidez.
  BC-2200.20.10:
    name: Modelado ALM y calce de flujos de caja
    description: |
      Modelado ALM y calce de los flujos de caja de los activos con los pasivos de seguros.
  BC-2200.20.20:
    name: Monitoreo de duración y convexidad
    description: |
      Monitoreo de las brechas de duración y convexidad entre activos y pasivos.
  BC-2200.20.30:
    name: Dimensionamiento de la reserva de liquidez
    description: |
      Dimensionamiento de las reservas de liquidez para atender las salidas de siniestros
      esperadas y bajo estrés.
  BC-2200.30:
    name: Asignación estratégica y táctica de activos
    description: |
      Decisiones de asignación estratégica y táctica de activos y rebalanceo.
  BC-2200.30.10:
    name: Definición de la asignación estratégica de activos
    description: |
      Definición de las asignaciones estratégicas de activos a largo plazo entre clases de activos.
  BC-2200.30.20:
    name: Toma de decisiones de asignación táctica de activos
    description: |
      Decisiones de asignación táctica dentro de los rangos estratégicos.
  BC-2200.30.30:
    name: Rebalanceo de la asignación
    description: |
      Rebalanceo periódico y por eventos hacia las asignaciones objetivo.
  BC-2200.40:
    name: Supervisión de mandatos y gestores de inversión
    description: |
      Selección de gestores externos, monitoreo del cumplimiento del mandato,
      revisión del rendimiento y supervisión de comisiones de gestión.
  BC-2200.40.10:
    name: Selección de gestores externos
    description: |
      Selección e incorporación de gestores de inversión externos.
  BC-2200.40.20:
    name: Monitoreo del cumplimiento del mandato
    description: |
      Monitoreo del cumplimiento del mandato y gestión de incumplimientos.
  BC-2200.40.30:
    name: Revisión del rendimiento del gestor
    description: |
      Revisión periódica del rendimiento de los gestores de inversión externos.
  BC-2200.40.40:
    name: Supervisión de comisiones de gestión
    description: |
      Supervisión de las comisiones de gestión y evaluaciones de la relación calidad-precio.
  BC-2200.50:
    name: Monitoreo del riesgo y cumplimiento de inversiones
    description: |
      Monitoreo de límites de inversión, límites de contraparte y emisor,
      y elegibilidad de activos bajo Solvency II.
  BC-2200.50.10:
    name: Monitoreo de límites de inversión
    description: |
      Monitoreo de los límites de inversión entre clases de activos y factores de riesgo.
  BC-2200.50.20:
    name: Monitoreo de límites de contraparte y emisor
    description: |
      Monitoreo de la concentración y los límites de contraparte y emisor.
  BC-2200.50.30:
    name: Monitoreo de elegibilidad de activos bajo Solvency II
    description: |
      Monitoreo de la elegibilidad de los activos conforme a las normas de Solvency II y equivalentes.
  BC-2200.60:
    name: Rendimiento e informes de inversión
    description: |
      Medición del rendimiento, atribución e informes de inversión al consejo y al regulador.
  BC-2200.60.10:
    name: Medición del rendimiento de la cartera
    description: |
      Medición del rendimiento de la cartera frente a referencias y pasivos.
  BC-2200.60.20:
    name: Análisis de atribución
    description: |
      Atribución del rendimiento por asignación, selección y divisa.
  BC-2200.60.30:
    name: Informes de inversión al consejo y al regulador
    description: |
      Producción de informes de inversión para el consejo, el ALCO y el regulador.

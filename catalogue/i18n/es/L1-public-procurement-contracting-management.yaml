locale: es
source: L1-public-procurement-contracting-management.yaml
entries:
  BC-3270:
    name: Gestión de contratación pública
    description: |
      Contratación y adquisición pública bajo los regímenes FAR/DFARS y de la Directiva de
      Contratación de la UE, incluida la planificación de adquisiciones, la licitación, la
      selección de fuentes, la adjudicación y administración de contratos, el rendimiento de
      proveedores, las impugnaciones y los programas socioeconómicos.
  BC-3270.10:
    name: Planificación de adquisiciones
    description: |
      Formulación de la estrategia de adquisición, investigación de mercado y planificación de
      las compras públicas.
    in_scope:
      - Investigación de mercado y consolidación de la demanda
      - Estrategia y selección del método de adquisición
      - Elaboración de la estimación independiente de costes del gobierno
    out_of_scope:
      - Estrategia de aprovisionamiento intersectorial para compras no gubernamentales (cubierto por Gestión de compras)
  BC-3270.10.10:
    name: Investigación de mercado
    description: |
      Investigación del mercado proveedor, la capacidad y los precios para el requerimiento.
  BC-3270.10.20:
    name: Estrategia de adquisición
    description: |
      Selección del método de contratación, el instrumento y el enfoque competitivo.
  BC-3270.10.30:
    name: Estimación independiente de costes
    description: |
      Elaboración de las estimaciones independientes de costes del gobierno y las reservas
      presupuestarias.
  BC-3270.10.40:
    name: Elaboración de especificaciones y declaración de trabajo
    description: |
      Elaboración de especificaciones, declaraciones de trabajo y declaraciones de trabajo
      por rendimiento.
  BC-3270.20:
    name: Gestión de licitaciones
    description: |
      Emisión de pliegos de condiciones, incluidos los documentos RFP, IFB y RFQ, las enmiendas
      y las preguntas de los licitadores.
  BC-3270.20.10:
    name: Redacción del pliego de condiciones
    description: |
      Redacción de documentación RFP, IFB, RFQ y pliegos de licitación.
  BC-3270.20.20:
    name: Publicación del pliego de condiciones
    description: |
      Publicación de las licitaciones en los sistemas de avisos oficiales y los equivalentes al
      DOUE o SAM.gov.
  BC-3270.20.30:
    name: Atención de preguntas de licitadores
    description: |
      Atención de las preguntas de los licitadores, las enmiendas y las aclaraciones durante
      la licitación.
  BC-3270.20.40:
    name: Conferencia previa a la licitación
    description: |
      Celebración de conferencias previas a la licitación y visitas a las instalaciones.
  BC-3270.30:
    name: Selección y evaluación de fuentes
    description: |
      Recepción, evaluación y selección de ofertas y propuestas conforme a los criterios publicados.
  BC-3270.30.10:
    name: Recepción de ofertas y propuestas
    description: |
      Recepción, registro y custodia de ofertas y propuestas.
  BC-3270.30.20:
    name: Evaluación técnica
    description: |
      Evaluación técnica de las propuestas conforme a los criterios establecidos.
  BC-3270.30.30:
    name: Análisis de precios y costes
    description: |
      Análisis de la razonabilidad del precio y el realismo de los costes de las ofertas.
  BC-3270.30.40:
    name: Determinación de responsabilidad
    description: |
      Determinación de la responsabilidad del contratista, la capacidad financiera y la integridad.
  BC-3270.40:
    name: Adjudicación y formalización del contrato
    description: |
      Decisión de selección, notificación de la adjudicación, debrief e información y formalización
      del contrato, incluida la firma.
  BC-3270.40.10:
    name: Decisión de selección
    description: |
      Decisión de adjudicación y documentación de la decisión de selección de fuente.
  BC-3270.40.20:
    name: Aviso de adjudicación e información a los no seleccionados
    description: |
      Aviso de adjudicación, notificación a licitadores no seleccionados e información debriefing.
  BC-3270.40.30:
    name: Firma del contrato y compromiso de fondos
    description: |
      Formalización de los documentos contractuales y compromiso de fondos.
  BC-3270.50:
    name: Administración y modificación de contratos
    description: |
      Administración cotidiana de contratos, incluidas las modificaciones, las reclamaciones y
      la supervisión del oficial de contratación.
  BC-3270.50.10:
    name: Aceptación de entregables
    description: |
      Inspección y aceptación de los entregables conforme a los requisitos del contrato.
  BC-3270.50.20:
    name: Modificación del contrato
    description: |
      Emisión de modificaciones contractuales, órdenes de cambio y ejercicio de opciones.
  BC-3270.50.30:
    name: Gestión de reclamaciones contractuales
    description: |
      Recepción y resolución de reclamaciones del contratista y ajustes equitativos.
  BC-3270.50.40:
    name: Liquidación del contrato
    description: |
      Aceptación final, desobligo y liquidación física y administrativa del contrato.
  BC-3270.60:
    name: Gestión del rendimiento de proveedores
    description: |
      Registro del historial de rendimiento, suspensión e inhabilitación, y seguimiento de la
      responsabilidad de los contratistas.
  BC-3270.60.10:
    name: Registro del historial de rendimiento
    description: |
      Registro de las evaluaciones del historial de rendimiento de los contratistas en las bases
      de datos del gobierno.
  BC-3270.60.20:
    name: Administración de suspensión e inhabilitación
    description: |
      Administración de los procedimientos de suspensión e inhabilitación contra contratistas.
  BC-3270.60.30:
    name: Seguimiento de la responsabilidad del contratista
    description: |
      Seguimiento continuo de la responsabilidad y la capacidad financiera del contratista.
  BC-3270.70:
    name: Gestión de impugnaciones y litigios
    description: |
      Recepción y resolución de impugnaciones de licitaciones y litigios contractuales a través
      de canales administrativos y judiciales.
  BC-3270.70.10:
    name: Resolución de impugnaciones de licitación
    description: |
      Resolución de impugnaciones de licitación previas y posteriores a la adjudicación.
  BC-3270.70.20:
    name: Resolución de litigios contractuales
    description: |
      Resolución administrativa y judicial de litigios contractuales.
  BC-3270.70.30:
    name: Resolución alternativa de conflictos
    description: |
      Mediación, arbitraje y métodos alternativos de resolución de conflictos en litigios
      contractuales.
  BC-3270.80:
    name: Administración de reservas y programas socioeconómicos
    description: |
      Administración de las preferencias y objetivos de contratación para pequeñas empresas,
      empresas de minorías, propiedad femenina y otros grupos socioeconómicos.
  BC-3270.80.10:
    name: Determinación de reservas de contratación
    description: |
      Determinación de la aplicabilidad de las reservas para pequeñas empresas y grupos
      socioeconómicos.
  BC-3270.80.20:
    name: Supervisión de planes de subcontratación
    description: |
      Supervisión de los planes e informes de subcontratación para pequeñas empresas.
  BC-3270.80.30:
    name: Informes de objetivos socioeconómicos
    description: |
      Seguimiento e informes de los objetivos y logros de contratación socioeconómica.

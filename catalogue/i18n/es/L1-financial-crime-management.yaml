locale: es
source: L1-financial-crime-management.yaml
entries:
  BC-1400:
    name: Gestión de delitos financieros
    description: |
      Monitorización de transacciones AML, verificación de sanciones, detección de fraude y reporte de actividades sospechosas.
  BC-1400.10:
    name: Gestión de monitorización de transacciones AML
    description: |
      Reglas de monitorización AML, alertas y escenarios.
  BC-1400.10.10:
    name: Diseño de escenarios y reglas AML
    description: |
      Diseño de escenarios, reglas y umbrales AML.
  BC-1400.10.20:
    name: Generación de alertas AML
    description: |
      Generación de alertas AML a partir de la monitorización de transacciones.
  BC-1400.10.30:
    name: Triaje de alertas AML
    description: |
      Triaje y priorización basada en riesgo de alertas AML.
  BC-1400.10.40:
    name: Ajuste y validación de modelos AML
    description: |
      Ajuste, validación y revisión de la eficacia de los modelos AML.
  BC-1400.20:
    name: Gestión de verificación de sanciones
    description: |
      Listas de sanciones, verificación de nombres y transacciones, y gestión de coincidencias.
  BC-1400.20.10:
    name: Gestión de listas de sanciones
    description: |
      Agregación y mantenimiento de listas de vigilancia de sanciones.
  BC-1400.20.20:
    name: Verificación de nombres de clientes
    description: |
      Verificación de clientes y contrapartes contra listas de sanciones.
  BC-1400.20.30:
    name: Verificación de sanciones en transacciones
    description: |
      Verificación en tiempo real de transacciones contra listas de sanciones.
  BC-1400.20.40:
    name: Gestión de coincidencias de sanciones
    description: |
      Investigación y resolución de coincidencias en listas de sanciones.
  BC-1400.30:
    name: Gestión de detección e investigación de fraude
    description: |
      Detección de fraude en productos y canales, e investigaciones.
  BC-1400.30.10:
    name: Detección de fraude en solicitudes
    description: |
      Detección de fraude en la fase de solicitud de cliente o producto.
  BC-1400.30.20:
    name: Detección de fraude en transacciones
    description: |
      Detección en tiempo real de transacciones fraudulentas.
  BC-1400.30.30:
    name: Investigación de fraude
    description: |
      Investigación y resolución de casos de fraude.
  BC-1400.30.40:
    name: Gestión de pérdidas y recuperación por fraude
    description: |
      Seguimiento de las pérdidas por fraude y los esfuerzos de recuperación.
  BC-1400.30.50:
    name: Gestión de fraude por transferencias autorizadas
    description: |
      Gestión de casos de fraude por transferencias autorizadas y reembolso.
  BC-1400.40:
    name: Gestión de reportes de actividades sospechosas
    description: |
      Presentación de SAR/STR e informes regulatorios.
  BC-1400.40.10:
    name: Redacción y presentación de SAR
    description: |
      Redacción y presentación de SAR/STR a las unidades de inteligencia financiera.
  BC-1400.40.20:
    name: Reporting regulatorio de delitos financieros
    description: |
      Reporting periódico a reguladores sobre delitos financieros.
  BC-1400.40.30:
    name: Coordinación con fuerzas del orden
    description: |
      Coordinación con fuerzas del orden y atención a solicitudes de información.
  BC-1400.50:
    name: Gestión de investigaciones de delitos financieros
    description: |
      Gestión de casos, investigaciones y escalado.
  BC-1400.50.10:
    name: Gestión de casos
    description: |
      Gestión de casos para investigaciones de delitos financieros.
  BC-1400.50.20:
    name: Ejecución de investigaciones
    description: |
      Ejecución de investigaciones y recopilación de evidencias.
  BC-1400.50.30:
    name: Escalado y cierre
    description: |
      Escalado, toma de decisiones y cierre de investigaciones.

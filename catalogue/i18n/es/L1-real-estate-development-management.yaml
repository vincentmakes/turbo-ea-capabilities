locale: es
source: L1-real-estate-development-management.yaml
entries:
  BC-4900:
    name: Gestión del desarrollo inmobiliario
    description: |
      Disciplina del lado del promotor que abarca la originación, viabilidad, derechos urbanísticos, financiación y supervisión de la entrega de proyectos inmobiliarios de nueva construcción y gran rehabilitación en los sectores comercial y residencial. Integra la gestión previa (suelo, permisos, programa, financiación promotora) y posterior (arrendamiento inicial, estabilización) a la ejecución constructiva genérica.
    in_scope:
      - Búsqueda de suelo, análisis de mercado y seguimiento de cartera de proyectos
      - Análisis de mayor y mejor uso y viabilidad mediante pro forma
      - Zonificación, derechos urbanísticos, aprobaciones de planeamiento y licencias de obras
      - Supervisión del máster plan y del diseño conceptual
      - Estructuración de la financiación promotora, incluyendo capital de JV y deuda de construcción
      - Supervisión de la construcción por parte del promotor, gestión de modificaciones y control de entrega
      - Pre-arrendamiento, apertura y arrendamiento hasta la ocupación estabilizada
    out_of_scope:
      - Ejecución de obra por contratista general y gremios (BC-1150)
      - Adquisición de activos en explotación (BC-4930)
      - Planes de negocio y capex de activos en explotación (BC-4920)
      - Desarrollo corporativo para uso propio del ocupante (BC-710)
  BC-4900.10:
    name: Cartera de desarrollo y búsqueda de suelo
    description: |
      Originación de oportunidades de desarrollo mediante prospección de mercado, búsqueda directa de suelo, generación de leads fuera de mercado y seguimiento de la cartera frente a los criterios de inversión.
  BC-4900.10.10:
    name: Análisis de mercado y submercado
    description: |
      Análisis de la dinámica metropolitana, de submercado y de microlocalización para orientar la actividad promotora.
  BC-4900.10.20:
    name: Identificación y búsqueda de suelo
    description: |
      Identificación de parcelas candidatas para el desarrollo a través de canales de oferta, redes de intermediarios y cribado de datos catastrales.
  BC-4900.10.30:
    name: Originación fuera de mercado
    description: |
      Cultivo de oportunidades fuera de mercado mediante contacto directo con propietarios y redes propietarias.
  BC-4900.10.40:
    name: Seguimiento de cartera de proyectos
    description: |
      Seguimiento de las oportunidades de desarrollo a través de hitos de proceso y filtros de criterios de inversión.
  BC-4900.20:
    name: Análisis de viabilidad del desarrollo
    description: |
      Evaluación de la viabilidad de oportunidades de desarrollo candidatas en las dimensiones de suelo, programa y financiera.
  BC-4900.20.10:
    name: Análisis de mayor y mejor uso
    description: |
      Análisis de los usos legalmente permitidos, físicamente posibles y financieramente viables para una parcela candidata.
  BC-4900.20.20:
    name: Estudios de programa y volumen edificable
    description: |
      Estudios de combinación de programa y volumen edificable para evaluar el envolvente de desarrollo y el rendimiento.
  BC-4900.20.30:
    name: Modelización de pro forma del desarrollo
    description: |
      Elaboración del pro forma de desarrollo que recoge costes, ingresos y rentabilidades apalancadas y no apalancadas.
  BC-4900.20.40:
    name: Análisis de riesgo de adquisición de suelo
    description: |
      Evaluación del precio y la estructura de adquisición del suelo frente a los resultados de viabilidad.
  BC-4900.30:
    name: Derechos urbanísticos y licencias
    description: |
      Obtención de derechos de uso del suelo, aprobaciones de planeamiento, autorizaciones ambientales y licencias de obras necesarias para construir.
    in_scope:
      - Estrategia y gestión de cambios de zonificación, modificaciones del plan de usos del suelo y bonificaciones de densidad
      - Tramitación de aprobaciones urbanísticas, variaciones y licencias de uso especial
      - Evaluación ambiental bajo NEPA, EIA o regímenes regionales equivalentes
      - Solicitud y obtención de licencias de obras y autorizaciones sectoriales
      - Relación con juntas vecinales, vecinos y grupos de interés políticos en apoyo a la tramitación
  BC-4900.30.10:
    name: Estrategia de zonificación y usos del suelo
    description: |
      Estrategia y ejecución para cambios de zonificación, modificaciones del planeamiento y aprovechamientos urbanísticos.
  BC-4900.30.20:
    name: Aprobación urbanística y variaciones
    description: |
      Tramitación de aprobaciones de planeamiento, variaciones y licencias de uso especial ante las autoridades competentes.
  BC-4900.30.30:
    name: Evaluación ambiental (NEPA / EIA)
    description: |
      Evaluación ambiental bajo NEPA, EIA o regímenes regionales equivalentes, incluida la valoración de impactos y las medidas correctoras.
  BC-4900.30.40:
    name: Licencias de obras y autorizaciones
    description: |
      Solicitud y obtención de licencias de obras y autorizaciones sectoriales necesarias para iniciar la construcción.
  BC-4900.30.50:
    name: Participación ciudadana y de grupos de interés
    description: |
      Relación con juntas vecinales, vecinos y grupos de interés políticos en apoyo a la tramitación urbanística.
  BC-4900.40:
    name: Gestión del programa de desarrollo
    description: |
      Gobernanza a nivel de programa del calendario, presupuesto, riesgos e informes a los grupos de interés a lo largo del ciclo de vida del desarrollo.
  BC-4900.40.10:
    name: Gestión del calendario de desarrollo
    description: |
      Definición y seguimiento del calendario maestro del desarrollo desde el cierre del suelo hasta la estabilización.
  BC-4900.40.20:
    name: Control del presupuesto de desarrollo
    description: |
      Control del presupuesto total del coste de desarrollo, incluidos los componentes de costes directos, indirectos, financiación y contingencia.
  BC-4900.40.30:
    name: Gestión de riesgos y contingencias del desarrollo
    description: |
      Identificación, cuantificación y gestión de los riesgos del programa y del uso de la contingencia.
  BC-4900.40.40:
    name: Informes a grupos de interés
    description: |
      Reporte del avance del desarrollo a inversores, prestamistas y órganos de gobierno internos.
  BC-4900.50:
    name: Gestión del máster plan y el diseño conceptual
    description: |
      Definición de planes directores a largo plazo y supervisión de las fases de diseño conceptual y de anteproyecto conforme a la intención del promotor.
  BC-4900.50.10:
    name: Definición del máster plan
    description: |
      Definición de planes directores para desarrollos multifase o multiparcela, incluyendo la programación por fases.
  BC-4900.50.20:
    name: Supervisión del diseño conceptual y anteproyecto
    description: |
      Supervisión por parte del promotor de los entregables de diseño conceptual y anteproyecto del arquitecto frente al encargo.
  BC-4900.50.30:
    name: Custodia de estándares de diseño
    description: |
      Custodia de los estándares de diseño y de imagen del promotor en los equipos consultores.
  BC-4900.50.40:
    name: Definición del encargo de sostenibilidad
    description: |
      Definición del encargo de sostenibilidad y certificaciones (LEED, BREEAM, WELL, NABERS) para el desarrollo.
  BC-4900.60:
    name: Estructuración de la financiación promotora
    description: |
      Estructuración del capital propio, la deuda y los instrumentos de fomento necesarios para financiar el desarrollo hasta su finalización.
  BC-4900.60.10:
    name: Capitalización de recursos propios
    description: |
      Captación y cierre del capital del promotor y de los socios limitados para el proyecto de desarrollo.
  BC-4900.60.20:
    name: Originación del préstamo promotor
    description: |
      Originación de préstamos promotores y puente contra el pro forma del desarrollo.
  BC-4900.60.30:
    name: Incentivos públicos y créditos fiscales
    description: |
      Tramitación de incentivos públicos como TIF, PILOT, LIHTC y programas de crédito fiscal por rehabilitación histórica.
  BC-4900.60.40:
    name: Estructuración de la empresa conjunta
    description: |
      Estructuración de los vehículos de empresa conjunta, el promote y los términos del waterfall para los socios promotores.
  BC-4900.70:
    name: Supervisión de la entrega constructiva
    description: |
      Supervisión por parte del promotor de la entrega constructiva por contratistas generales y gremios, dejando la ejecución a la capacidad de construcción (BC-1150).
  BC-4900.70.10:
    name: Selección y adjudicación de contratistas
    description: |
      Selección y adjudicación del contratista general y de los contratos clave de oficios para el desarrollo.
  BC-4900.70.20:
    name: Seguimiento de obra por parte del promotor
    description: |
      Seguimiento del avance de obra, disposiciones de fondos y calidad durante la ejecución por parte del promotor.
  BC-4900.70.30:
    name: Gobernanza de modificaciones de obra
    description: |
      Gobernanza de modificaciones de obra, cambios de alcance y uso de la contingencia frente al presupuesto.
  BC-4900.70.40:
    name: Supervisión de calidad y seguridad
    description: |
      Supervisión del desempeño en calidad y seguridad de la obra conforme a las expectativas del promotor y la normativa.
  BC-4900.80:
    name: Gestión del arrendamiento inicial y la estabilización
    description: |
      Pre-arrendamiento, coordinación de apertura y rampa del activo terminado hasta la ocupación y el desempeño estabilizados.
  BC-4900.80.10:
    name: Coordinación del pre-arrendamiento
    description: |
      Coordinación de las campañas de pre-arrendamiento antes de la finalización del edificio.
  BC-4900.80.20:
    name: Coordinación de la apertura y los primeros accesos
    description: |
      Coordinación de la apertura del edificio, las primeras entregas y la transición operativa.
  BC-4900.80.30:
    name: Seguimiento del desempeño de la estabilización
    description: |
      Seguimiento de la velocidad de arrendamiento y el desempeño operativo frente al pro forma de estabilización.
  BC-4900.80.40:
    name: Cierre de pendientes y defectos
    description: |
      Resolución de puntos pendientes, defectos latentes y reclamaciones de garantía al contratista tras la entrega.

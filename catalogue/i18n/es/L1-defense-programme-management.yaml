locale: es
source: L1-defense-programme-management.yaml
entries:
  BC-1760:
    name: Gestión de programa de defensa
    description: |
      Entrega de programas a gran escala, gestión del valor ganado (EVM), gobernanza del programa y gestión de subcontratos.
  BC-1760.10:
    name: Gestión de adquisición del programa
    description: |
      Estrategia de adquisición, planificación del programa y revisiones de hitos.
  BC-1760.10.10:
    name: Definición de estrategia de adquisición
    description: |
      Definición de la estrategia de adquisición alineada con DoD 5000 o equivalente.
  BC-1760.10.20:
    name: Planificación y línea de base del programa
    description: |
      Planificación del programa y establecimiento de la línea de base del calendario maestro integrado.
  BC-1760.10.30:
    name: Revisiones de decisión de hitos
    description: |
      Preparación y realización de revisiones de decisión de hitos.
  BC-1760.20:
    name: Gestión del valor ganado del programa
    description: |
      EVM, rendimiento de costes, rendimiento del calendario e IBR.
  BC-1760.20.10:
    name: Operación del sistema EVM
    description: |
      Operación de un sistema de gestión del valor ganado conforme a EIA-748.
  BC-1760.20.20:
    name: Revisión de la línea de base integrada
    description: |
      Realización de revisiones de la línea de base integrada con el cliente.
  BC-1760.20.30:
    name: Análisis de rendimiento de costes y calendario
    description: |
      Análisis de métricas y tendencias de CV, SV, CPI y SPI.
  BC-1760.20.40:
    name: Previsión de estimación al completar
    description: |
      Previsión de EAC y análisis del índice de rendimiento hasta la conclusión.
  BC-1760.30:
    name: Gestión de costes y precios del programa
    description: |
      Normas de contabilidad de costes y fijación de precios para contratos gubernamentales.
  BC-1760.30.10:
    name: Cumplimiento de normas de contabilidad de costes
    description: |
      Cumplimiento de las normas de contabilidad de costes (CAS).
  BC-1760.30.20:
    name: Fijación de precios de contratos gubernamentales
    description: |
      Fijación de precios de contratos gubernamentales conforme a FAR/DFARS.
  BC-1760.30.30:
    name: Estimación de costes del programa
    description: |
      Estimación de costes del programa y documentación de la base de estimación.
  BC-1760.30.40:
    name: Gestión de tasas indirectas
    description: |
      Cálculo de tasas de costes indirectos y negociación de tasas con el gobierno.
  BC-1760.40:
    name: Gestión del cliente gubernamental
    description: |
      Relación con el cliente gubernamental e interfaz con el oficial de contratación.
  BC-1760.40.10:
    name: Interfaz con el oficial de contratación
    description: |
      Interfaz con oficiales de contratación y sus representantes.
  BC-1760.40.20:
    name: Participación con la oficina del programa
    description: |
      Participación con oficinas de programa gubernamentales y PMOs.
  BC-1760.40.30:
    name: Informes y revisiones con el cliente
    description: |
      Informes periódicos al cliente y revisiones de gestión del programa.
  BC-1760.50:
    name: Gestión de subcontratistas de defensa
    description: |
      Cadena de suministro de defensa, transmisión de cláusulas y planes de pequeñas empresas.
  BC-1760.50.10:
    name: Selección y adjudicación de subcontratistas
    description: |
      Selección y adjudicación de subcontratistas de defensa.
  BC-1760.50.20:
    name: Administración de cláusulas transmitidas
    description: |
      Administración de cláusulas FAR/DFARS transmitidas a subcontratistas.
  BC-1760.50.30:
    name: Gestión del rendimiento de subcontratistas
    description: |
      Rendimiento y vigilancia de subcontratistas de defensa.
  BC-1760.50.40:
    name: Gestión del plan de pequeñas empresas
    description: |
      Ejecución e informes del plan de subcontratación con pequeñas empresas.
  BC-1760.60:
    name: Gestión del ciclo de vida del programa
    description: |
      Gestión del ciclo de vida conforme a DoD 5000 o equivalente, e hitos.
  BC-1760.60.10:
    name: Gestión de fases del ciclo de vida
    description: |
      Gestión de las fases del ciclo de vida del programa conforme a DoD 5000 o equivalente.
  BC-1760.60.20:
    name: Gestión de riesgos del programa
    description: |
      Gestión de riesgos y oportunidades a nivel de programa.
  BC-1760.60.30:
    name: Cierre y transición del programa
    description: |
      Cierre del programa, transición y liquidación del contrato.

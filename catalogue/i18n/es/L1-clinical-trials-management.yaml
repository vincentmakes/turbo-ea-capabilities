locale: es
source: L1-clinical-trials-management.yaml
entries:
  BC-1520:
    name: Gestión de ensayos clínicos
    description: |
      Planifica, ejecuta y monitoriza estudios clínicos desde el diseño del protocolo hasta el cierre de la base de datos y la externalización a CRO.
  BC-1520.10:
    name: Gestión del diseño del ensayo clínico
    description: |
      Define el protocolo, la metodología estadística y los criterios de valoración que fundamentan la validez científica y regulatoria del estudio.
  BC-1520.10.10:
    name: Redacción del protocolo clínico
    description: |
      Redacción de los protocolos de los estudios clínicos.
  BC-1520.10.20:
    name: Definición del plan de análisis estadístico
    description: |
      Definición de la metodología estadística y el plan de análisis del estudio.
  BC-1520.10.30:
    name: Definición de criterios de valoración y resultados
    description: |
      Definición de criterios de valoración primarios, secundarios y exploratorios.
  BC-1520.10.40:
    name: Gestión del diseño adaptativo
    description: |
      Diseño de ensayos adaptativos y de plataforma.
  BC-1520.20:
    name: Gestión de centros de ensayo clínico
    description: |
      Identifica, activa y supervisa los centros investigadores para garantizar el cumplimiento y el rendimiento del estudio.
  BC-1520.20.10:
    name: Identificación y viabilidad de centros
    description: |
      Identificación y evaluación de viabilidad de los centros investigadores.
  BC-1520.20.20:
    name: Activación de centros
    description: |
      Activación del centro, incluyendo ética, requisitos regulatorios y contratación.
  BC-1520.20.30:
    name: Formación del investigador y del centro
    description: |
      Impartición de la formación al investigador y al personal del centro.
  BC-1520.20.40:
    name: Gestión del rendimiento del centro
    description: |
      Seguimiento del rendimiento del centro y aplicación de medidas correctoras.
  BC-1520.30:
    name: Gestión de sujetos del ensayo clínico
    description: |
      Gestiona el reclutamiento, el consentimiento, la inclusión y la retención de los sujetos a lo largo del estudio.
  BC-1520.30.10:
    name: Reclutamiento de sujetos
    description: |
      Reclutamiento de sujetos, incluidos canales digitales de captación.
  BC-1520.30.20:
    name: Gestión del consentimiento informado
    description: |
      Obtención del consentimiento informado y gestión del consentimiento electrónico.
  BC-1520.30.30:
    name: Selección e inclusión de sujetos
    description: |
      Selección e inclusión de sujetos conforme a los criterios de inclusión/exclusión.
  BC-1520.30.40:
    name: Retención de sujetos
    description: |
      Estrategias de retención y fidelización de los participantes en el estudio.
  BC-1520.40:
    name: Gestión de datos clínicos
    description: |
      Captura, limpia y estandariza los datos clínicos conforme a CDISC hasta el cierre definitivo de la base de datos.
  BC-1520.40.10:
    name: Gestión de EDC y CRF
    description: |
      Sistema de captura electrónica de datos (EDC) y diseño de los CRF.
  BC-1520.40.20:
    name: Gestión de consultas de datos clínicos
    description: |
      Generación, resolución y limpieza de consultas de datos clínicos.
  BC-1520.40.30:
    name: Estandarización de datos clínicos
    description: |
      Estandarización de datos conforme a CDISC SDTM/ADaM.
  BC-1520.40.40:
    name: Cierre de base de datos y archivo
    description: |
      Cierre de la base de datos, archivado y preparación del paquete de envío.
  BC-1520.50:
    name: Gestión de la monitorización del ensayo clínico
    description: |
      Realiza visitas de monitorización en centro y centralizada basada en riesgos para garantizar la calidad e integridad de los datos.
  BC-1520.50.10:
    name: Monitorización en centro
    description: |
      Visitas de monitorización en centro con verificación de datos fuente.
  BC-1520.50.20:
    name: Monitorización centralizada y basada en riesgos
    description: |
      Programas de monitorización centralizada y basada en riesgos.
  BC-1520.50.30:
    name: Auditorías de calidad clínica
    description: |
      Auditorías GCP de ensayos, centros y proveedores.
  BC-1520.60:
    name: Gestión del suministro del ensayo clínico
    description: |
      Planifica y ejecuta la producción, distribución, aleatorización y conciliación del medicamento en investigación (IMP).
  BC-1520.60.10:
    name: Producción y acondicionamiento del IMP
    description: |
      Producción y acondicionamiento de los medicamentos en investigación.
  BC-1520.60.20:
    name: Distribución del IMP y operaciones de depósito
    description: |
      Operaciones de depósito y distribución global del IMP.
  BC-1520.60.30:
    name: Operaciones de aleatorización e IRT
    description: |
      Aleatorización mediante IRT/IWRS y gestión del suministro del ensayo.
  BC-1520.60.40:
    name: Contabilidad y conciliación del IMP
    description: |
      Contabilidad del IMP, devoluciones y destrucción.
  BC-1520.70:
    name: Gestión de externalización clínica y CRO
    description: |
      Selecciona, contrata y supervisa a los CRO para garantizar la calidad y el cumplimiento de los ensayos externalizados.
  BC-1520.70.10:
    name: Selección y contratación del CRO
    description: |
      Selección, definición del alcance y contratación del CRO.
  BC-1520.70.20:
    name: Supervisión del rendimiento del CRO
    description: |
      Supervisión del rendimiento del CRO y sus KPI por parte del promotor.
  BC-1520.70.30:
    name: Supervisión de la calidad de proveedores
    description: |
      Supervisión de calidad de proveedores clínicos y laboratorios.

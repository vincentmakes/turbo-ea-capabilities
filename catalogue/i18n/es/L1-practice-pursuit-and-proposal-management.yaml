locale: es
source: L1-practice-pursuit-and-proposal-management.yaml
entries:
  BC-4360:
    name: Gestión del desarrollo de negocio y propuestas
    description: |
      Actividades de captación de nuevos encargos en firmas de servicios
      profesionales: calificación de oportunidades, estrategia de captación,
      elaboración de propuestas y presentaciones, modelización de honorarios
      y análisis de adjudicaciones/pérdidas, distintas de la gestión
      comercial genérica.
  BC-4360.10:
    name: Gestión de la calificación de oportunidades
    description: |
      Calificación de oportunidades de captación entrantes y salientes en
      cuanto a encaje estratégico, viabilidad y atractivo comercial.
  BC-4360.10.10:
    name: Captura de oportunidades
    description: |
      Registro de oportunidades de captación procedentes de RFP, referencias
      y originación por relaciones.
  BC-4360.10.20:
    name: Puntuación de calificación de oportunidades
    description: |
      Puntuación de oportunidades conforme a criterios de encaje estratégico,
      capacidad y condiciones comerciales.
  BC-4360.10.30:
    name: Coordinación de la preautorización de captación
    description: |
      Preautorización de las oportunidades mediante comprobaciones
      preliminares de independencia y conflictos antes de la inversión
      formal en la captación.
  BC-4360.20:
    name: Gestión de la estrategia de captación
    description: |
      Definición de la estrategia de captación, el plan de adjudicación,
      la composición del equipo de captación y el posicionamiento competitivo
      de las oportunidades calificadas.
  BC-4360.20.10:
    name: Elaboración del plan de adjudicación
    description: |
      Desarrollo del plan de adjudicación con los mensajes clave,
      diferenciadores y mapa de partes interesadas.
  BC-4360.20.20:
    name: Composición del equipo de captación
    description: |
      Formación del equipo de captación con el responsable de captación,
      expertos temáticos y apoyo en precios.
  BC-4360.20.30:
    name: Síntesis de inteligencia competitiva
    description: |
      Síntesis de inteligencia competitiva sobre las firmas rivales
      esperadas en la misma oportunidad.
  BC-4360.30:
    name: Gestión del desarrollo de propuestas
    description: |
      Redacción, revisión y presentación de propuestas escritas y
      respuestas a RFP conforme a las especificaciones del cliente.
  BC-4360.30.10:
    name: Redacción de propuestas
    description: |
      Elaboración de los apartados de la propuesta, incluyendo enfoque,
      equipo y experiencia relevante.
  BC-4360.30.20:
    name: Revisión y aprobación de propuestas
    description: |
      Revisión y aprobación interna del contenido, las afirmaciones y los
      compromisos comerciales de la propuesta.
  BC-4360.30.30:
    name: Gestión de la presentación de propuestas
    description: |
      Presentación de la propuesta en el formato y canal requeridos por el
      cliente, con registro de auditoría de la presentación.
  BC-4360.30.40:
    name: Reutilización de activos de propuesta
    description: |
      Reutilización y etiquetado de contenido de propuestas, casos de éxito
      y credenciales para su uso en futuras captaciones.
  BC-4360.40:
    name: Gestión de la presentación oral y pitch
    description: |
      Preparación y realización de pitches, presentaciones orales y beauty
      parades en el marco de procesos competitivos.
  BC-4360.40.10:
    name: Preparación de materiales de pitch
    description: |
      Elaboración de presentaciones de pitch, demostraciones y materiales
      de apoyo para las presentaciones orales.
  BC-4360.40.20:
    name: Ensayo y entrenamiento del pitch
    description: |
      Ensayo del equipo de pitch y entrenamiento en mensajes, dinámica de
      grupo y gestión de preguntas.
  BC-4360.40.30:
    name: Gestión de la entrega del pitch
    description: |
      Entrega de pitches y beauty parades, incluyendo logística y
      materiales de seguimiento.
  BC-4360.50:
    name: Modelización de honorarios y precios de captación
    description: |
      Diseño de la estructura de honorarios y modelización de precios para
      las oportunidades de captación, incluyendo honorarios alternativos y
      estructuras de reparto de riesgo.
    out_of_scope:
      - Gestión de honorarios en fase de encargo (BC-4330.40)
      - Estrategia de precios a nivel de firma (BC-290)
  BC-4360.50.10:
    name: Diseño de la estructura de honorarios de captación
    description: |
      Diseño de estructuras de honorarios entre opciones de tarifa por hora,
      honorario fijo, con límite máximo, contingente y basado en resultados.
  BC-4360.50.20:
    name: Modelización de la rentabilidad de la captación
    description: |
      Modelización de la rentabilidad de la captación bajo diferentes
      hipótesis de dotación de personal, honorarios y riesgo.
  BC-4360.50.30:
    name: Aprobación del precio de captación
    description: |
      Aprobación interna del precio de captación conforme a los umbrales
      de descuento, margen y riesgo.
  BC-4360.60:
    name: Análisis de adjudicaciones y pérdidas de captación
    description: |
      Análisis estructurado de los resultados de las captaciones, analítica
      de tasas de adjudicación y captura de conocimientos en la práctica de
      captación y propuesta.
  BC-4360.60.10:
    name: Análisis del resultado de la captación
    description: |
      Análisis interno y con el cliente del resultado de la captación,
      incluyendo la evaluación de competidores.
  BC-4360.60.20:
    name: Analítica de tasas de adjudicación
    description: |
      Analítica de tasas de adjudicación segmentada por práctica, cliente,
      tipo de oportunidad y responsable de captación.
  BC-4360.60.30:
    name: Captura de lecciones aprendidas en la captación
    description: |
      Captura de las lecciones de la captación y el feedback en los
      manuales y la formación de captación.

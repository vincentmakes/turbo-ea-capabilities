locale: es
source: L1-gas-processing-lng-operations-management.yaml
entries:
  BC-3070:
    name: Gestión de procesamiento de gas y operaciones de GNL
    description: |
      Operación del tratamiento de gas, fraccionamiento de LGN, licuefacción
      de GNL, carga y envío, regasificación y aseguramiento de la calidad
      del gas a lo largo de la cadena de valor del gas midstream.
  BC-3070.10:
    name: Operaciones de la planta de gas
    description: |
      Operación de las instalaciones de recepción en entrada, tratamiento,
      deshidratación y recuperación de azufre en plantas de procesamiento
      de gas.
  BC-3070.10.10:
    name: Gestión de recepción y entrada de gas
    description: |
      Recepción, captura de tapones de líquido y acondicionamiento del
      gas de entrada.
  BC-3070.10.20:
    name: Operaciones de tratamiento de gas ácido
    description: |
      Operaciones de tratamiento de gas ácido con amina y solvente físico.
  BC-3070.10.30:
    name: Operaciones de deshidratación de gas
    description: |
      Deshidratación de gas natural con glicol y tamices moleculares.
  BC-3070.10.40:
    name: Operaciones de recuperación de azufre
    description: |
      Operaciones de proceso Claus y tratamiento de gas de cola para
      la recuperación de azufre.
  BC-3070.20:
    name: Operaciones de fraccionamiento de LGN
    description: |
      Operación de demetanizadoras, deetanizadoras y torres de
      fraccionamiento aguas abajo que producen etano, propano, butano
      y gasolina natural.
  BC-3070.20.10:
    name: Operaciones de la demetanizadora
    description: |
      Operación de columnas criogénicas de demetanización para la
      recuperación de etano.
  BC-3070.20.20:
    name: Operaciones de deetanizadora y despropanizadora
    description: |
      Operación de columnas de deetanización, despropanización y
      debutanización.
  BC-3070.20.30:
    name: Operaciones de almacenamiento de LGN
    description: |
      Operación de almacenamiento de LGN presurizado y refrigerado.
  BC-3070.30:
    name: Operaciones de licuefacción de GNL
    description: |
      Operación de trenes de licuefacción, ciclos de refrigeración y
      tanques de almacenamiento de GNL.
  BC-3070.30.10:
    name: Operaciones del ciclo de refrigeración
    description: |
      Operación de los circuitos de refrigeración de refrigerante mixto
      y en cascada.
  BC-3070.30.20:
    name: Operaciones del tren de GNL
    description: |
      Operación integral de los trenes de licuefacción de GNL.
  BC-3070.30.30:
    name: Operaciones de tanques de almacenamiento de GNL
    description: |
      Operación de los tanques criogénicos de almacenamiento de GNL,
      incluyendo la prevención de rollover.
  BC-3070.40:
    name: Operaciones de carga y envío de GNL
    description: |
      Carga de buques, enfriamiento de carga y vaporización para envío
      por ducto en terminales de licuefacción.
  BC-3070.40.10:
    name: Carga de buques de GNL
    description: |
      Operaciones de carga de buques en los muelles de exportación de GNL.
  BC-3070.40.20:
    name: Vaporización para envío
    description: |
      Vaporización para envío y exportación por ducto desde los sitios
      de licuefacción.
  BC-3070.40.30:
    name: Coordinación del enfriamiento de carga
    description: |
      Coordinación del enfriamiento de los buques de GNL antes de la carga.
  BC-3070.50:
    name: Operaciones de regasificación de GNL
    description: |
      Operación de las terminales de importación de GNL: vaporización,
      control de presión de envío y manejo del gas de evaporación.
  BC-3070.50.10:
    name: Operaciones de vaporizadores
    description: |
      Operación de vaporizadores de estante abierto, de combustión
      sumergida y de carcasa y tubos.
  BC-3070.50.20:
    name: Control de presión de envío
    description: |
      Control de la presión de envío e inyección a la red desde las
      terminales de importación.
  BC-3070.50.30:
    name: Manejo del gas de evaporación
    description: |
      Relicuefacción o envío del gas de evaporación de los tanques
      de almacenamiento.
  BC-3070.60:
    name: Gestión de la calidad del gas
    description: |
      Cumplimiento de las especificaciones de calidad de gas para ductos
      y GNL, y manejo de corrientes fuera de especificación.
  BC-3070.60.10:
    name: Monitoreo del cumplimiento de especificaciones
    description: |
      Monitoreo continuo de las especificaciones de calidad de gas para
      ductos y GNL.
  BC-3070.60.20:
    name: Muestreo y análisis de gas
    description: |
      Muestreo rutinario de gas, cromatografía y generación de certificados.
  BC-3070.60.30:
    name: Manejo de gas fuera de especificación
    description: |
      Encaminamiento, mezcla y reprocesamiento de corrientes de gas fuera
      de especificación.

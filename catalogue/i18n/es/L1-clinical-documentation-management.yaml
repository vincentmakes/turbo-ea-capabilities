locale: es
source: L1-clinical-documentation-management.yaml
entries:
  BC-2830:
    name: Gestión de la documentación clínica
    description: |
      Documentación por parte del clínico, entrada computerizada de órdenes, revisión de resultados,
      soporte a la decisión clínica, mejora de la documentación y flujos de trabajo mediados por EHR
      que sustentan el registro activo de la atención al paciente.
  BC-2830.10:
    name: Documentación de notas clínicas
    description: |
      Elaboración de notas clínicas en todos los tipos de encuentros mediante modalidades narrativas,
      estructuradas, de voz y de captura ambiental.
  BC-2830.10.10:
    name: Elaboración de notas de evolución
    description: |
      Elaboración de notas de evolución para hospitalización y consulta ambulatoria.
  BC-2830.10.20:
    name: Elaboración de notas de procedimiento
    description: |
      Elaboración de notas operatorias y de procedimientos.
  BC-2830.10.30:
    name: Elaboración de informes de alta
    description: |
      Elaboración de informes de alta y traslado.
  BC-2830.10.40:
    name: Documentación por voz y captura ambiental
    description: |
      Flujos de trabajo de dictado por voz y documentación mediante captura ambiental.
  BC-2830.20:
    name: Entrada computerizada de órdenes del proveedor
    description: |
      Entrada de órdenes de medicamentos, diagnóstico y procedimientos por parte del proveedor,
      incluyendo conjuntos de órdenes y protocolos clínicos.
  BC-2830.20.10:
    name: Entrada de órdenes de medicación
    description: |
      Entrada de órdenes de medicación por el proveedor con dosis, vía y frecuencia.
  BC-2830.20.20:
    name: Entrada de órdenes diagnósticas
    description: |
      Entrada de órdenes de laboratorio, imagen y otros diagnósticos por parte del proveedor.
  BC-2830.20.30:
    name: Entrada de órdenes de procedimientos
    description: |
      Entrada de órdenes de procedimientos y consultas por parte del proveedor.
  BC-2830.20.40:
    name: Uso de conjuntos de órdenes y protocolos
    description: |
      Uso de conjuntos de órdenes estandarizados, planes de potencia y protocolos clínicos.
  BC-2830.30:
    name: Revisión y validación de resultados
    description: |
      Encaminamiento, revisión y validación de resultados diagnósticos y gestión
      de la notificación de valores críticos.
  BC-2830.30.10:
    name: Notificación y encaminamiento de resultados
    description: |
      Encaminamiento de resultados a los proveedores solicitantes y de guardia.
  BC-2830.30.20:
    name: Acuse de recibo de resultados
    description: |
      Acuse de recibo y validación de resultados recibidos por parte del proveedor.
  BC-2830.30.30:
    name: Comunicación de resultados críticos
    description: |
      Comunicación de resultados críticos y valores de pánico dentro de los plazos establecidos.
  BC-2830.30.40:
    name: Revisión de tendencias de resultados
    description: |
      Revisión de tendencias de resultados y datos longitudinales en la historia clínica.
  BC-2830.40:
    name: Soporte a la decisión clínica
    description: |
      Soporte a la decisión clínica en tiempo real, incluyendo alertas, vías clínicas,
      puntuaciones de riesgo y avisos de mejores prácticas.
  BC-2830.40.10:
    name: Alertas de interacciones medicamentosas
    description: |
      Alertas de interacciones fármaco-fármaco, fármaco-alergia y fármaco-enfermedad.
  BC-2830.40.20:
    name: Orientación mediante vías clínicas
    description: |
      Soporte a la decisión basado en vías y guías clínicas en el punto de atención.
  BC-2830.40.30:
    name: Presentación de puntuaciones de riesgo
    description: |
      Presentación de puntuaciones de riesgo clínico, como predictores de deterioro y sepsis.
  BC-2830.40.40:
    name: Gestión de avisos de mejores prácticas
    description: |
      Elaboración, ajuste y gobernanza de los avisos de mejores prácticas.
  BC-2830.50:
    name: Mejora de la documentación clínica
    description: |
      Revisión concurrente y retrospectiva, consultas y programas de formación para mejorar
      la integridad y la especificidad de la documentación.
  BC-2830.50.10:
    name: Revisión concurrente de la documentación
    description: |
      Revisión concurrente de la documentación hospitalaria para verificar su exactitud y especificidad clínica.
  BC-2830.50.20:
    name: Gestión de consultas al proveedor
    description: |
      Generación y seguimiento de consultas de documentación clínica conformes a la normativa.
  BC-2830.50.30:
    name: Auditoría de calidad de la documentación
    description: |
      Auditoría de la calidad de la documentación clínica y su impacto en el índice de casuística.
  BC-2830.50.40:
    name: Formación del proveedor en documentación
    description: |
      Formación del proveedor sobre estándares de documentación y oportunidades de mejora.
  BC-2830.60:
    name: Gestión del flujo de trabajo del EHR
    description: |
      Flujo de trabajo del historial clínico electrónico orientado al clínico, incluyendo bandeja de entrada,
      tareas, cierre del encuentro y gestión de traspasos.
  BC-2830.60.10:
    name: Gestión de bandeja de entrada y tareas
    description: |
      Gestión de mensajes de la bandeja de entrada, tareas y colas de pendientes del clínico.
  BC-2830.60.20:
    name: Cierre del encuentro
    description: |
      Cierre del encuentro incluyendo codificación, facturación y finalización de la documentación.
  BC-2830.60.30:
    name: Documentación de cobertura transversal
    description: |
      Flujos de trabajo de documentación de cobertura y guardias.
  BC-2830.60.40:
    name: Gestión de listas de pacientes y traspasos
    description: |
      Gestión de listas de pacientes y documentación estructurada de traspasos entre turnos.

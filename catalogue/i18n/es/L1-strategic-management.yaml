locale: es
source: L1-strategic-management.yaml
entries:
  BC-100:
    name: Gestión estratégica
    description: |
      Definición de la dirección, visión, misión y objetivos a largo plazo de la empresa.
  BC-100.10:
    name: Planificación estratégica
    description: |
      Formulación de la visión, misión, objetivos estratégicos y plan a largo plazo.
  BC-100.10.10:
    name: Definición de la visión y la misión
    description: |
      Articulación de la visión, la misión y los valores fundamentales de la empresa.
  BC-100.10.20:
    name: Análisis del entorno
    description: |
      Análisis externo e interno (PESTEL, DAFO, inteligencia competitiva).
  BC-100.10.30:
    name: Formulación de opciones estratégicas
    description: |
      Evaluación de opciones estratégicas y selección de la dirección estratégica.
  BC-100.10.40:
    name: Elaboración del plan a largo plazo
    description: |
      Plan plurianual con objetivos estratégicos, metas y asignación de capital.
  BC-100.10.50:
    name: Planificación por escenarios
    description: |
      Escenarios futuros plausibles y estrategias de contingencia asociadas.
  BC-100.20:
    name: Gestión de la ejecución estratégica
    description: |
      Traducción de la estrategia en objetivos, OKR y cuadros de mando integrales.
  BC-100.20.10:
    name: Despliegue de objetivos estratégicos
    description: |
      Traducción de la estrategia corporativa en objetivos por unidad de negocio y función.
  BC-100.20.20:
    name: Gestión del cuadro de mando de desempeño
    description: |
      Cuadro de mando integral, OKR y definición y seguimiento de KPI.
  BC-100.20.30:
    name: Revisión y reorientación estratégica
    description: |
      Ciclos periódicos de revisión de la estrategia y acciones correctivas.
  BC-100.20.40:
    name: Gobierno de iniciativas estratégicas
    description: |
      Gobierno por hitos (stage-gate) de las iniciativas estratégicas.
  BC-100.30:
    name: Gestión del desarrollo corporativo
    description: |
      Fusiones y adquisiciones, desinversiones, empresas conjuntas y alianzas.
  BC-100.30.10:
    name: Ejecución de fusiones y adquisiciones
    description: |
      Identificación de objetivos, due diligence, estructuración y cierre de operaciones.
  BC-100.30.20:
    name: Gestión de desinversiones
    description: |
      Escisiones, separaciones y desinversiones de activos y entidades.
  BC-100.30.30:
    name: Gestión de empresas conjuntas y alianzas
    description: |
      Constitución y gobierno de empresas conjuntas, alianzas y asociaciones estratégicas.
  BC-100.30.40:
    name: Integración posterior a la fusión
    description: |
      Planificación de la integración y materialización de sinergias tras una fusión o adquisición.
  BC-100.40:
    name: Gestión de la cartera estratégica
    description: |
      Cartera de iniciativas estratégicas a nivel de empresa.
  BC-100.40.10:
    name: Definición de la cartera de iniciativas
    description: |
      Inventario y categorización de las iniciativas estratégicas.
  BC-100.40.20:
    name: Priorización de la cartera
    description: |
      Valoración, selección y priorización de iniciativas frente a la estrategia.
  BC-100.40.30:
    name: Asignación de inversiones
    description: |
      Asignación de capital, personas y capacidad entre las iniciativas de la cartera.
  BC-100.40.40:
    name: Seguimiento del desempeño de la cartera
    description: |
      Seguimiento de la realización de beneficios y de la salud global de la cartera.
  BC-100.50:
    name: Gestión del modelo de negocio
    description: |
      Definición, evolución e innovación del modelo de negocio.
  BC-100.50.10:
    name: Diseño del modelo de negocio
    description: |
      Articulación de la propuesta de valor, los segmentos de clientes y el modelo de ingresos.
  BC-100.50.20:
    name: Innovación del modelo de negocio
    description: |
      Exploración y prototipado de modelos de negocio nuevos o adyacentes.
  BC-100.50.30:
    name: Evaluación del desempeño del modelo de negocio
    description: |
      Evaluación de la economía unitaria, la escalabilidad y la idoneidad del modelo.

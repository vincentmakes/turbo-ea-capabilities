    description: |
      Servicio reactivo y de emergencia fuera de horario en equipos instalados.
  BC-2060.30.10:
    name: Triaje de solicitudes de servicio
    description: |
      Triaje de las solicitudes de servicio entrantes por urgencia y capacidad.
  BC-2060.30.20:
    name: Despacho de respuesta de emergencia
    description: |

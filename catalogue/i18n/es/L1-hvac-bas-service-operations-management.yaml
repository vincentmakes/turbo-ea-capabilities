locale: es
source: L1-hvac-bas-service-operations-management.yaml
entries:
  BC-2060:
    name: Gestión de operaciones de servicio HVAC/BAS
    description: |
      Servicio liderado por el OEM y por contratistas sobre equipos HVAC instalados y BAS —
      gestión de la configuración de la base instalada, mantenimiento preventivo y reactivo,
      reprogramación BAS y servicio de software, retrofit y modernización de equipos, contratos
      de servicio basados en desempeño y servicio conectado remoto.
    in_scope:
      - Registro de la configuración de equipos y BAS de la base instalada
      - Ejecución de contratos de mantenimiento preventivo y servicio reactivo/de emergencia
      - Reprogramación BAS, actualizaciones de firmware y operaciones de copia de seguridad/restauración
      - Ejecución de retrofit y modernización en equipos HVAC instalados
      - Contratos de servicio basados en desempeño y resultados
      - Servicio conectado remoto y operaciones del centro de diagnóstico
      - Gestión de acuerdos de nivel de servicio y satisfacción del cliente
    out_of_scope:
      - Servicio de campo genérico intersectorial (BC-1050) y repuestos (BC-1060)
      - Comisionamiento de proyectos y entrega de Cx (BC-2050)
      - Aprovisionamiento e informes de refrigerante (BC-2040)
      - Ingeniería de productos de equipos HVAC (BC-2000)
  BC-2060.10:
    name: Gestión de la configuración de la base instalada
    description: |
      Mantenimiento de los datos de configuración tal como se instaló y tal como se mantiene
      para la base instalada global.
  BC-2060.10.10:
    name: Registro de activos de equipos
    description: |
      Registro de equipos HVAC instalados por número de serie, sitio y cliente.
  BC-2060.10.20:
    name: Registro de configuraciones BAS
    description: |
      Registro de configuraciones BAS, controladores, puntos y secuencias en servicio.
  BC-2060.10.30:
    name: Registros tal como se mantiene
    description: |
      Registros de la configuración tal como se mantiene tras cada evento de servicio.
  BC-2060.10.40:
    name: Registros de modificación de la base instalada
    description: |
      Registros de las modificaciones posteriores a la entrega en los equipos y el BAS instalados.
  BC-2060.20:
    name: Operaciones de servicio de mantenimiento preventivo
    description: |
      Prestación del mantenimiento preventivo programado bajo contrato.
  BC-2060.20.10:
    name: Ejecución del contrato de mantenimiento
    description: |

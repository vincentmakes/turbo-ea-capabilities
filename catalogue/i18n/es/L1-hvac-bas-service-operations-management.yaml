    description: |
      Servicio rutinario de recarga de refrigerante y limpieza de serpentines.
  BC-2060.20.50:
    name: Reporte de cumplimiento del mantenimiento
    description: |
      Reporte del cumplimiento del mantenimiento preventivo a los clientes.
  BC-2060.30:

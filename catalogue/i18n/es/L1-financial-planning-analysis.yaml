locale: es
source: L1-financial-planning-analysis.yaml
entries:
  BC-230:
    name: Planificación financiera y análisis
    description: |
      Previsión, planificación, análisis del desempeño e informes de gestión.
  BC-230.10:
    name: Gestión del presupuesto
    description: |
      Proceso de elaboración del presupuesto anual y consolidación.
  BC-230.10.10:
    name: Calendario y gobierno del proceso presupuestario
    description: |
      Calendario, plantillas y gobierno del proceso presupuestario.
  BC-230.10.20:
    name: Fijación de objetivos de arriba hacia abajo
    description: |
      Establecimiento de objetivos financieros de arriba hacia abajo alineados con la estrategia.
  BC-230.10.30:
    name: Elaboración del presupuesto de abajo hacia arriba
    description: |
      Presupuestación ascendente por centro de costo, proyecto y producto.
  BC-230.10.40:
    name: Consolidación y aprobación del presupuesto
    description: |
      Consolidación a nivel de grupo, iteraciones y aprobación definitiva del presupuesto.
  BC-230.20:
    name: Gestión de previsiones
    description: |
      Previsiones continuas y planificación por escenarios.
  BC-230.20.10:
    name: Elaboración de previsiones continuas
    description: |
      Previsiones continuas de ingresos, costos y caja con periodicidad mensual o trimestral.
  BC-230.20.20:
    name: Previsión basada en inductores
    description: |
      Uso de inductores operativos para prever resultados financieros.
  BC-230.20.30:
    name: Modelado de escenarios y sensibilidades
    description: |
      Previsión multiescenario y análisis de sensibilidad.
  BC-230.20.40:
    name: Seguimiento de la precisión de las previsiones
    description: |
      Seguimiento y mejora de la precisión de las previsiones por partida.
  BC-230.30:
    name: Reporte de gestión
    description: |
      Informes periódicos de gestión, KPI y paneles de control.
  BC-230.30.10:
    name: Reporte ejecutivo y para el consejo
    description: |
      Paneles ejecutivos e informes de desempeño para el consejo de administración.
  BC-230.30.20:
    name: Reporte de desempeño por unidad de negocio
    description: |
      Reporte por unidad de negocio, segmento y línea de producto.
  BC-230.30.30:
    name: Definición y gobierno de KPI
    description: |
      Taxonomía de KPI, definiciones y gobierno de las métricas.
  BC-230.30.40:
    name: Analítica de autoservicio para la dirección
    description: |
      Habilitación del autoservicio analítico para los socios financieros de negocio.
  BC-230.40:
    name: Gestión del análisis del desempeño
    description: |
      Análisis de variaciones, rentabilidad y análisis en profundidad.
  BC-230.40.10:
    name: Análisis de variaciones y real frente a plan
    description: |
      Análisis de variaciones entre datos reales, presupuesto y previsión.
  BC-230.40.20:
    name: Análisis de rentabilidad
    description: |
      Análisis de rentabilidad por cliente, producto y canal.
  BC-230.40.30:
    name: Analítica de costos y eficiencia
    description: |
      Análisis de inductores de costo, ratios de eficiencia y benchmarking.
  BC-230.40.40:
    name: Análisis del capital de trabajo
    description: |
      Análisis de los ciclos de cobros, pagos e inventario.
  BC-230.50:
    name: Gestión de casos de negocio
    description: |
      Elaboración, evaluación y revisión posterior a la implantación de casos de negocio.
  BC-230.50.10:
    name: Elaboración del caso de negocio
    description: |
      Plantillas y metodologías estandarizadas para los casos de negocio.
  BC-230.50.20:
    name: Evaluación de inversiones
    description: |
      VAN, TIR, período de recuperación y evaluación cualitativa de inversiones.
  BC-230.50.30:
    name: Gobierno de la asignación de capital
    description: |
      Comités de aprobación de inversiones, umbrales y priorización.
  BC-230.50.40:
    name: Seguimiento de la realización de beneficios
    description: |
      Revisiones post-implantación y seguimiento de los beneficios.

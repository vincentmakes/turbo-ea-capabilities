locale: es
source: L1-chemical-product-stewardship-management.yaml
entries:
  BC-4650:
    name: Gestión de administración responsable de productos químicos
    description: |
      Clasificación y etiquetado de peligros, elaboración de fichas de datos de seguridad, escenarios de exposición, programas de sustancias preocupantes y comunicación de peligros a clientes a lo largo del ciclo de vida del producto químico.
  BC-4650.10:
    name: Clasificación y etiquetado de peligros
    description: |
      Clasificación GHS de sustancias y mezclas y diseño de etiquetas conformes.
  BC-4650.10.10:
    name: Clasificación GHS
    description: |
      Clasificación de sustancias según el sistema de peligros UN GHS.
  BC-4650.10.20:
    name: Clasificación de mezclas
    description: |
      Clasificación de mezclas mediante principios de extrapolación y datos de ensayo.
  BC-4650.10.30:
    name: Diseño de pictogramas de peligro y etiquetas
    description: |
      Diseño de pictogramas conformes con GHS, palabras de advertencia y diseño de etiquetas.
  BC-4650.10.40:
    name: Localización multilingüe de etiquetas
    description: |
      Traducción y localización de etiquetas para los mercados de destino.
  BC-4650.20:
    name: Gestión de fichas de datos de seguridad
    description: |
      Elaboración, revisión y distribución de fichas de datos de seguridad, incluyendo FDS ampliadas para usuarios intermedios.
  BC-4650.20.10:
    name: Elaboración de SDS
    description: |
      Elaboración de fichas de datos de seguridad en formato de 16 secciones.
  BC-4650.20.20:
    name: Revisión y actualización de SDS
    description: |
      Revisión y actualización de las SDS frente a nuevos datos y cambios normativos.
  BC-4650.20.30:
    name: Gestión de la distribución de SDS
    description: |
      Distribución de las SDS a clientes y socios de la cadena de suministro.
  BC-4650.20.40:
    name: Gestión de SDS ampliadas
    description: |
      Gestión de los anexos de SDS ampliadas que contienen escenarios de exposición.
  BC-4650.30:
    name: Gestión de escenarios de exposición
    description: |
      Desarrollo y mantenimiento de escenarios de exposición laboral, de consumidores y ambiental para sustancias registradas.
  BC-4650.30.10:
    name: Desarrollo de escenarios de exposición laboral
    description: |
      Desarrollo de escenarios de exposición laboral en condiciones de uso típicas.
  BC-4650.30.20:
    name: Desarrollo de escenarios de exposición de consumidores
    description: |
      Desarrollo de escenarios de exposición de consumidores para usos en productos finales.
  BC-4650.30.30:
    name: Desarrollo de escenarios de liberación ambiental
    description: |
      Desarrollo de escenarios de liberación ambiental a lo largo del ciclo de vida.
  BC-4650.40:
    name: Gestión de sustancias preocupantes
    description: |
      Identificación, sustitución y seguimiento de restricciones de sustancias de muy alta preocupación en la cartera de productos.
  BC-4650.40.10:
    name: Gestión del inventario de SVHC
    description: |
      Mantenimiento del inventario de presencia de SVHC en la cartera de productos.
  BC-4650.40.20:
    name: Gestión del programa de sustitución de sustancias
    description: |
      Gestión del programa de iniciativas de sustitución por sustancias más seguras.
  BC-4650.40.30:
    name: Mantenimiento de listas de sustancias restringidas
    description: |
      Mantenimiento de listas internas de sustancias restringidas y listas impuestas por clientes.
  BC-4650.50:
    name: Comunicación de peligros a clientes
    description: |
      Comunicación saliente de información de peligros a clientes y usuarios intermedios.
  BC-4650.50.10:
    name: Notificación de administración responsable a clientes
    description: |
      Notificación a clientes sobre cambios relevantes en materia de administración responsable.
  BC-4650.50.20:
    name: Producción de materiales de formación sobre peligros
    description: |
      Producción de materiales de formación sobre manipulación y uso seguros.
  BC-4650.50.30:
    name: Atención de consultas de usuarios intermedios
    description: |
      Atención de consultas de administración responsable de usuarios intermedios.
  BC-4650.60:
    name: Administración responsable del ciclo de vida del producto
    description: |
      Gestión responsable del ciclo de vida de los productos químicos, incluyendo consideraciones de fin de vida, reciclabilidad y reutilización.
  BC-4650.60.10:
    name: Mantenimiento del perfil de peligros del producto
    description: |
      Mantenimiento de perfiles de peligros consolidados por producto.
  BC-4650.60.20:
    name: Coordinación de la gestión responsable al final de vida
    description: |
      Coordinación de los acuerdos de retoma y gestión responsable al final de vida.
  BC-4650.60.30:
    name: Evaluación de reciclabilidad y reutilización
    description: |
      Evaluación del potencial de reciclabilidad y reutilización de los productos químicos.

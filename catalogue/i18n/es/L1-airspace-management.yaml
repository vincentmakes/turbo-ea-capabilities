locale: es
source: L1-airspace-management.yaml
entries:
  BC-1200:
    name: Gestión del espacio aéreo
    description: |
      Diseño del espacio aéreo, sectorización, áreas restringidas y coordinación civil-militar.
  BC-1200.10:
    name: Gestión del diseño del espacio aéreo
    description: |
      Estructura del espacio aéreo, clases, diseño de la red de rutas y límites de sectores.
  BC-1200.10.10:
    name: Diseño de la estructura del espacio aéreo
    description: |
      Definición de FIR, UIR, áreas de control y clases de espacio aéreo conforme al Anexo 11 de la OACI.
  BC-1200.10.20:
    name: Diseño de la red de rutas ATS
    description: |
      Diseño de redes de rutas ATS convencionales y PBN.
  BC-1200.10.30:
    name: Diseño de límites de sectores
    description: |
      Definición de límites de sectores y sectores elementales.
  BC-1200.10.40:
    name: Diseño del espacio aéreo de ruta libre
    description: |
      Diseño e implementación del espacio aéreo de ruta libre.
  BC-1200.20:
    name: Gestión de la sectorización del espacio aéreo
    description: |
      Definiciones de sectores, esquemas de apertura y alineación con la carga de trabajo del controlador.
  BC-1200.20.10:
    name: Gestión de configuraciones de sectores
    description: |
      Definición y mantenimiento de configuraciones de sectores.
  BC-1200.20.20:
    name: Planificación de esquemas de apertura de sectores
    description: |
      Planificación de esquemas de apertura de sectores según la previsión de tráfico.
  BC-1200.20.30:
    name: Sectorización basada en carga de trabajo
    description: |
      Sectorización alineada con la evaluación de la carga de trabajo del controlador.
  BC-1200.30:
    name: Gestión del espacio aéreo restringido
    description: |
      Áreas peligrosas, áreas restringidas, áreas prohibidas y zonas militares.
  BC-1200.30.10:
    name: Definición de áreas restringidas
    description: |
      Definición de áreas restringidas, prohibidas y peligrosas.
  BC-1200.30.20:
    name: Gestión de áreas reservadas temporales
    description: |
      Gestión de áreas reservadas y segregadas de carácter temporal.
  BC-1200.30.30:
    name: Coordinación de activación y liberación
    description: |
      Activación, liberación y notificación del espacio aéreo restringido.
  BC-1200.40:
    name: Gestión de la coordinación del espacio aéreo
    description: |
      Coordinación civil-militar, coordinación transfronteriza del espacio aéreo y cooperación en bloques funcionales de espacio aéreo.
  BC-1200.40.10:
    name: Coordinación civil-militar del espacio aéreo
    description: |
      Coordinación civil-militar y uso flexible del espacio aéreo.
  BC-1200.40.20:
    name: Coordinación transfronteriza del espacio aéreo
    description: |
      Coordinación del uso del espacio aéreo a través de los límites de FIR.
  BC-1200.40.30:
    name: Cooperación en bloques funcionales de espacio aéreo
    description: |
      Cooperación en bloques funcionales de espacio aéreo (FAB).
  BC-1200.40.40:
    name: Consulta con usuarios del espacio aéreo
    description: |
      Consulta con los usuarios del espacio aéreo sobre cambios de diseño.

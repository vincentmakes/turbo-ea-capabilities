locale: es
source: L1-product-lifecycle-management.yaml
entries:
  BC-820:
    name: Gestión del ciclo de vida del producto
    description: |
      Gestiona los productos de extremo a extremo, desde el concepto inicial hasta su retirada, garantizando valor para el cliente en cada etapa.
  BC-820.10:
    name: Gestión del concepto de producto
    description: |
      Desarrolla y valida conceptos de producto a partir de la inteligencia de mercado y las necesidades del cliente.
  BC-820.10.10:
    name: Ideación de producto
    description: |
      Genera conceptos de nuevos productos a partir de conocimientos de mercado y del cliente.
  BC-820.10.20:
    name: Validación del concepto
    description: |
      Valida los conceptos de producto mediante pruebas con clientes y el mercado.
  BC-820.10.30:
    name: Definición del caso de negocio
    description: |
      Elabora el caso de negocio y la justificación económica para el desarrollo de nuevos productos.
  BC-820.20:
    name: Gestión del diseño de producto
    description: |
      Dirige el diseño, la ingeniería y las revisiones formales del producto para garantizar su adecuación a los requisitos.
  BC-820.20.10:
    name: Ingeniería de diseño de producto
    description: |
      Desarrolla el diseño detallado del producto y realiza el análisis de ingeniería correspondiente.
  BC-820.20.20:
    name: Revisión y aprobación del diseño
    description: |
      Ejecuta revisiones formales del diseño y puertas de aprobación antes de avanzar en el desarrollo.
  BC-820.20.30:
    name: Diseño orientado a criterios específicos
    description: |
      Aplica criterios de diseño para fabricabilidad, sostenibilidad, mantenibilidad y coste.
  BC-820.20.40:
    name: Verificación y validación del diseño
    description: |
      Verifica y valida el diseño frente a los requisitos establecidos antes de la aprobación final.
  BC-820.30:
    name: Gestión de especificaciones de producto
    description: |
      Administra los requisitos, especificaciones y estructuras de lista de materiales del producto.
  BC-820.30.10:
    name: Gestión de requisitos de producto
    description: |
      Captura y mantiene la trazabilidad de los requisitos del producto a lo largo de su ciclo de vida.
  BC-820.30.20:
    name: Elaboración de especificaciones de producto
    description: |
      Redacta las especificaciones técnicas y la documentación técnica del producto.
  BC-820.30.30:
    name: Definición de la lista de materiales del producto
    description: |
      Define las estructuras de lista de materiales del producto y gestiona sus revisiones.
  BC-820.30.40:
    name: Gestión de datos de producto
    description: |
      Administra datos de producto, planos y ensamblajes CAD mediante herramientas de gestión de datos de producto.
  BC-820.40:
    name: Gestión de configuraciones y variantes de producto
    description: |
      Administra las configuraciones, variantes, opciones y paquetes del producto para satisfacer distintos segmentos de mercado.
  BC-820.40.10:
    name: Modelado de configuraciones de producto
    description: |
      Define modelos de configuración, opciones y reglas de validación para los productos.
  BC-820.40.20:
    name: Gestión de variantes
    description: |
      Administra las variantes de producto y las plataformas comunes que las sustentan.
  BC-820.40.30:
    name: Definición de paquetes y soluciones
    description: |
      Define paquetes, kits y soluciones combinadas orientadas al mercado.
  BC-820.50:
    name: Gestión de lanzamiento y comercialización de producto
    description: |
      Planifica y ejecuta el lanzamiento del producto coordinando a todas las funciones implicadas hasta alcanzar el ritmo de producción previsto.
  BC-820.50.10:
    name: Planificación del lanzamiento
    description: |
      Define el plan de lanzamiento y el alcance del contenido a entregar en cada versión.
  BC-820.50.20:
    name: Ejecución del lanzamiento
    description: |
      Coordina la ejecución multifuncional del lanzamiento y la preparación operativa.
  BC-820.50.30:
    name: Aceleración de la producción
    description: |
      Gestiona la aceleración de la producción y la preparación de la cadena de suministro tras el lanzamiento.
  BC-820.50.40:
    name: Seguimiento del rendimiento del lanzamiento
    description: |
      Monitoriza los KPI del lanzamiento y ejecuta acciones correctivas post-lanzamiento.
  BC-820.60:
    name: Gestión del rendimiento y la retroalimentación del producto
    description: |
      Supervisa el rendimiento en uso del producto, sintetiza la retroalimentación de clientes y gestiona la hoja de ruta de mejoras.
  BC-820.60.10:
    name: Seguimiento del rendimiento del producto en uso
    description: |
      Monitoriza el rendimiento del producto mediante métricas durante su vida operativa.
  BC-820.60.20:
    name: Síntesis de retroalimentación de clientes
    description: |
      Consolida la retroalimentación de clientes para orientar la hoja de ruta del producto.
  BC-820.60.30:
    name: Gestión de la hoja de ruta del producto
    description: |
      Define y mantiene la hoja de ruta del producto alineada con la estrategia y la demanda del mercado.
  BC-820.60.40:
    name: Analítica de producto
    description: |
      Analiza métricas de uso, telemetría e instrumentación del producto para la toma de decisiones.
  BC-820.70:
    name: Gestión del fin de vida del producto
    description: |
      Planifica y ejecuta la retirada del producto, la migración de clientes y las estrategias de sustitución.
  BC-820.70.10:
    name: Planificación del fin de vida
    description: |
      Planifica el fin de vida del producto, sus dependencias y el calendario de retirada.
  BC-820.70.20:
    name: Estrategia de migración y sustitución
    description: |
      Gestiona la migración de clientes hacia productos sustitutos y de nueva generación.
  BC-820.70.30:
    name: Última compra y soporte continuado
    description: |
      Administra la última compra, el aprovisionamiento de repuestos y el soporte durante el período de retirada.
  BC-820.70.40:
    name: Comunicaciones de retirada del producto
    description: |
      Comunica la retirada del producto a clientes y canales de distribución de forma planificada.

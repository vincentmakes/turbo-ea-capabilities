locale: es
source: L1-education-compliance-regulatory-reporting-management.yaml
entries:
  BC-4810:
    name: Gestión de cumplimiento normativo y reporte regulatorio en educación
    description: |
      Cumplimiento regulatorio y reporte estatutario específicos del sector educativo,
      incluyendo la privacidad de los datos de los estudiantes, los regímenes de
      derechos civiles, las obligaciones estatutarias de educación especial, el
      cumplimiento del visado de estudiantes internacionales y el cumplimiento de la
      financiación pública.
  BC-4810.10:
    name: Cumplimiento de la privacidad de los datos de los estudiantes
    description: |
      Cumplimiento de los regímenes sectoriales específicos de privacidad de los datos
      de los estudiantes, incluyendo FERPA, COPPA y regímenes equivalentes.
    in_scope:
      - Operaciones de cumplimiento de FERPA
      - Operaciones de cumplimiento de COPPA
      - Gestión de acuerdos de intercambio de datos de estudiantes
    out_of_scope:
      - Protección de datos en general (cubierta en Gestión de información y datos transversal)
  BC-4810.10.10:
    name: Operaciones de cumplimiento de FERPA
    description: |
      Cumplimiento diario de FERPA, consentimientos y divulgaciones.
  BC-4810.10.20:
    name: Operaciones de cumplimiento de COPPA
    description: |
      Cumplimiento de COPPA para los servicios dirigidos a menores de 13 años.
  BC-4810.10.30:
    name: Gestión de acuerdos de intercambio de datos de estudiantes
    description: |
      Negociación y gestión de los acuerdos de intercambio de datos de estudiantes
      con proveedores.
  BC-4810.20:
    name: Reporte estadístico educativo estatutario
    description: |
      Envío de estadísticas educativas estatutarias e informes de rendimiento a las
      autoridades nacionales, estatales y locales.
    in_scope:
      - Envío de estadísticas nacionales (p. ej., IPEDS, HESA)
      - Envíos a autoridades educativas estatales y locales
      - Divulgación de financiación y rendimiento
    out_of_scope:
      - Informes de rendimiento internos (cubiertos en Gestión de calidad académica y acreditación)
  BC-4810.20.10:
    name: Envío de estadísticas nacionales
    description: |
      Envío de datos a los organismos nacionales de estadísticas educativas.
  BC-4810.20.20:
    name: Envíos a autoridades educativas estatales y locales
    description: |
      Envíos a las autoridades educativas estatales, provinciales y locales.
  BC-4810.20.30:
    name: Divulgación de financiación y rendimiento
    description: |
      Divulgación pública del uso de la financiación y los indicadores de rendimiento
      educativo.
  BC-4810.30:
    name: Cumplimiento de los derechos civiles
    description: |
      Cumplimiento de los regímenes de derechos civiles específicos de la educación,
      incluyendo el Título IX, la Sección 504 y la ADA en el contexto académico.
    in_scope:
      - Investigación y reporte del Título IX
      - Cumplimiento de la Sección 504 y la ADA
      - Aplicación de la política de no discriminación
    out_of_scope:
      - Adaptaciones cotidianas (cubiertas en Gestión de apoyo y bienestar del estudiante)
  BC-4810.30.10:
    name: Investigación y reporte del Título IX
    description: |
      Recepción, investigación, audiencia y reporte estatutario del Título IX.
  BC-4810.30.20:
    name: Cumplimiento de la Sección 504 y la ADA
    description: |
      Cumplimiento de la Sección 504 y la ADA en el contexto académico y de admisiones.
  BC-4810.30.30:
    name: Aplicación de la política de no discriminación
    description: |
      Aplicación de las políticas de no discriminación en educación y gestión de
      reclamaciones.
  BC-4810.40:
    name: Cumplimiento de la educación especial
    description: |
      Cumplimiento de los regímenes estatutarios de educación especial para
      la población en edad escolar y de intervención temprana.
    in_scope:
      - Cumplimiento de la Parte B de IDEA
      - Cumplimiento de la Parte C de IDEA e intervención temprana
      - Cumplimiento estatutario equivalente de NEE/ALN
    out_of_scope:
      - Prestación de servicios de educación especial (cubierta en Gestión de apoyo y bienestar del estudiante)
  BC-4810.40.10:
    name: Cumplimiento de la Parte B de IDEA
    description: |
      Cumplimiento estatutario de la Parte B de IDEA para la educación especial
      en edad escolar.
  BC-4810.40.20:
    name: Cumplimiento de la Parte C de IDEA e intervención temprana
    description: |
      Cumplimiento de la Parte C de IDEA para los servicios de intervención temprana.
  BC-4810.40.30:
    name: Cumplimiento estatutario equivalente de NEE y ALN
    description: |
      Cumplimiento estatutario equivalente de NEE, ALN y educación inclusiva fuera
      de los EE. UU.
  BC-4810.50:
    name: Cumplimiento de normativa de estudiantes internacionales
    description: |
      Cumplimiento del patrocinio de visados y seguimiento estatutario de los
      estudiantes internacionales bajo regímenes como SEVIS y la Vía de Estudiante
      del Reino Unido.
    in_scope:
      - Operaciones de cumplimiento de SEVIS / I-20
      - Reporte de visados de estudiantes (Vía de Estudiante del Reino Unido, equivalentes)
      - Seguimiento y reporte de estudiantes internacionales
    out_of_scope:
      - Emisión inicial de documentación de patrocinio de visado (cubierta en Gestión de captación de estudiantes y admisiones)
  BC-4810.50.10:
    name: Operaciones de cumplimiento de SEVIS e I-20
    description: |
      Cumplimiento diario de SEVIS e I-20 para estudiantes patrocinados en los EE. UU.
  BC-4810.50.20:
    name: Reporte de visados de estudiantes
    description: |
      Reporte estatutario de los estudiantes patrocinados bajo regímenes de visado
      fuera de los EE. UU.
  BC-4810.50.30:
    name: Seguimiento de estudiantes internacionales
    description: |
      Seguimiento del estado, la asistencia y el domicilio de los estudiantes
      internacionales según las obligaciones de patrocinio.
  BC-4810.60:
    name: Cumplimiento del Título IV y la financiación pública
    description: |
      Cumplimiento de los regímenes públicos de ayuda al estudiante y financiación
      educativa, incluyendo el Título IV en los EE. UU. y regímenes equivalentes
      en otros países.
    in_scope:
      - Cumplimiento de la elegibilidad y el desembolso del Título IV
      - Devolución de fondos y conciliación de ayudas
      - Respuesta a auditorías de financiación pública
    out_of_scope:
      - Concesión de ofertas de ayuda financiera (cubierta en Gestión de captación de estudiantes y admisiones)
  BC-4810.60.10:
    name: Cumplimiento de la elegibilidad y el desembolso del Título IV
    description: |
      Cumplimiento de la elegibilidad institucional del Título IV y el desembolso
      de ayudas al estudiante.
  BC-4810.60.20:
    name: Devolución de fondos y conciliación de ayudas
    description: |
      Conciliación y devolución de las ayudas no devengadas según lo requieran
      los regímenes de financiación.
  BC-4810.60.30:
    name: Respuesta a auditorías de financiación pública
    description: |
      Respuesta a las auditorías y revisiones de la ayuda pública al estudiante
      y la financiación educativa.

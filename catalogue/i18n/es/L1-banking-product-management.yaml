locale: es
source: L1-banking-product-management.yaml
entries:
  BC-1310:
    name: Gestión de productos bancarios
    description: |
      Fábrica de productos bancarios: catálogo, parámetros, precios y ciclo de vida.
  BC-1310.10:
    name: Gestión del catálogo de productos
    description: |
      Catálogo de productos bancarios y maestro de productos.
  BC-1310.10.10:
    name: Gestión de datos maestros de productos
    description: |
      Mantenimiento de los datos maestros de productos y jerarquías de productos.
  BC-1310.10.20:
    name: Publicación del catálogo de productos
    description: |
      Publicación del catálogo de productos en canales y con socios.
  BC-1310.10.30:
    name: Gestión de la divulgación de productos
    description: |
      Elaboración y mantenimiento de documentos de divulgación de productos.
  BC-1310.20:
    name: Gestión de parámetros y configuración de productos
    description: |
      Tasas, comisiones, límites, reglas de elegibilidad y parámetros de productos.
  BC-1310.20.10:
    name: Configuración de tasas de productos
    description: |
      Configuración de tipos de interés y tarifas de tasas.
  BC-1310.20.20:
    name: Configuración de comisiones de productos
    description: |
      Configuración de comisiones y exenciones de productos.
  BC-1310.20.30:
    name: Configuración de límites de productos
    description: |
      Configuración de límites de transacciones y de productos.
  BC-1310.20.40:
    name: Configuración de reglas de elegibilidad de productos
    description: |
      Configuración de reglas de elegibilidad y criterios de calificación.
  BC-1310.30:
    name: Gestión de precios de productos bancarios
    description: |
      Precios de productos, promociones y precios específicos por cliente.
  BC-1310.30.10:
    name: Precios estándar de productos
    description: |
      Tarificación estándar de productos y servicios bancarios.
  BC-1310.30.20:
    name: Precios promocionales
    description: |
      Campañas de precios promocionales y ofertas por tiempo limitado.
  BC-1310.30.30:
    name: Precios específicos por cliente y relación
    description: |
      Precios adaptados al cliente y basados en la relación comercial.
  BC-1310.40:
    name: Gestión de paquetes de productos
    description: |
      Paquetes, bundles y precios por relación.
  BC-1310.40.10:
    name: Definición de paquetes
    description: |
      Definición de paquetes de productos, bundles y sus reglas.
  BC-1310.40.20:
    name: Gestión de elegibilidad de paquetes
    description: |
      Reglas de elegibilidad y criterios de calificación para paquetes.
  BC-1310.40.30:
    name: Seguimiento del rendimiento de paquetes
    description: |
      Seguimiento de la adopción y rentabilidad de los paquetes.
  BC-1310.50:
    name: Gestión del ciclo de vida de productos bancarios
    description: |
      Introducción de nuevos productos, retirada y discontinuación.
  BC-1310.50.10:
    name: Aprobación de nuevos productos
    description: |
      Proceso de aprobación de nuevos productos y gobierno del comité de productos.
  BC-1310.50.20:
    name: Ejecución del lanzamiento de productos
    description: |
      Ejecución del lanzamiento de productos y preparación de canales.
  BC-1310.50.30:
    name: Revisión del rendimiento de productos
    description: |
      Revisiones periódicas del rendimiento y de la relación calidad-precio de los productos.
  BC-1310.50.40:
    name: Retirada y migración de productos
    description: |
      Retirada de productos y migración de clientes a productos sucesores.

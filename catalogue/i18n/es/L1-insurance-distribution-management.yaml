locale: es
source: L1-insurance-distribution-management.yaml
entries:
  BC-2110:
    name: Gestión de distribución de seguros
    description: |
      Relaciones con productores, corredores, agentes, MGA y canales directos,
      incluidas nombramientos, comisiones, licencias, autoridades delegadas
      y flujo de cotizaciones y envíos hacia la suscripción.
  BC-2110.10:
    name: Gestión de productores e intermediarios
    description: |
      Alta, jerarquía, seguimiento del rendimiento y baja de productores e intermediarios.
  BC-2110.10.10:
    name: Alta de productores
    description: |
      Incorporación de productores, intermediarios, corredores y MGA.
  BC-2110.10.20:
    name: Mantenimiento de jerarquía y cuentas de productores
    description: |
      Mantenimiento de la jerarquía de productores, estructuras de cuentas y datos de contacto.
  BC-2110.10.30:
    name: Seguimiento del rendimiento de productores
    description: |
      Seguimiento de la producción, ratio de siniestralidad y rentabilidad de los productores.
  BC-2110.10.40:
    name: Baja de productores
    description: |
      Baja de productores, liquidación de carteras en vigor y liquidación final.
  BC-2110.20:
    name: Gestión de licencias y nombramientos de productores
    description: |
      Verificación de licencias, nombramientos por jurisdicción, formación continua y cumplimiento del productor.
  BC-2110.20.10:
    name: Verificación de licencias
    description: |
      Verificación de licencias de productores contra registros estatales y de jurisdicción.
  BC-2110.20.20:
    name: Gestión de nombramientos por jurisdicción
    description: |
      Gestión de nombramientos, terminaciones y renovaciones estatales y por jurisdicción.
  BC-2110.20.30:
    name: Seguimiento de formación continua
    description: |
      Seguimiento de créditos de formación continua y elegibilidad para la renovación del productor.
  BC-2110.20.40:
    name: Monitoreo del cumplimiento del productor
    description: |
      Monitoreo de la conducta de los productores, reclamaciones y acciones disciplinarias.
  BC-2110.30:
    name: Gestión de comisiones e incentivos
    description: |
      Configuración de tablas de comisiones, cálculo, sobretasas y bonos, y generación de estados de cuenta.
  BC-2110.30.10:
    name: Configuración de tablas de comisiones
    description: |
      Configuración de tablas y tasas de comisiones por producto y productor.
  BC-2110.30.20:
    name: Cálculo de comisiones
    description: |
      Cálculo de comisiones sobre eventos de prima, incluidas las reversiones por cancelación.
  BC-2110.30.30:
    name: Cálculo de sobretasas y bonos
    description: |
      Cálculo de sobretasas, participación en beneficios y bonos de incentivo.
  BC-2110.30.40:
    name: Generación de estados de comisiones
    description: |
      Generación y distribución de estados de comisiones a productores.
  BC-2110.40:
    name: Gestión de canales de distribución
    description: |
      Operación de canales de agentes, corredores, digital directo, bancaseguros, afinidad y comparadores.
  BC-2110.40.10:
    name: Operaciones del canal de agentes
    description: |
      Operación de canales de agentes vinculados e independientes.
  BC-2110.40.20:
    name: Operaciones del canal de corredores
    description: |
      Operación de canales de corredores y corredores mayoristas.
  BC-2110.40.30:
    name: Operaciones del canal digital directo
    description: |
      Operación de canales de seguros digitales directos al cliente.
  BC-2110.40.40:
    name: Operaciones del canal de bancaseguros y afinidad
    description: |
      Operación de asociaciones de bancaseguros y canales de grupos de afinidad.
  BC-2110.40.50:
    name: Operaciones del canal de comparadores y agregadores
    description: |
      Operación de canales de sitios web de comparación de precios y agregadores.
  BC-2110.50:
    name: Gestión de autoridades delegadas
    description: |
      Configuración de la autoridad del tomador delegado, monitoreo del rendimiento, recepción de bordeaux y auditoría de la autoridad.
  BC-2110.50.10:
    name: Configuración de autoridades delegadas
    description: |
      Configuración de autoridades de suscripción delegada y acuerdos de suscripción delegados.
  BC-2110.50.20:
    name: Monitoreo del rendimiento del tomador delegado
    description: |
      Monitoreo del rendimiento de suscripción del tomador delegado y la adherencia a la autoridad.
  BC-2110.50.30:
    name: Recepción y conciliación de bordeaux
    description: |
      Recepción, ingesta y conciliación de bordeaux de primas y siniestros.
  BC-2110.50.40:
    name: Auditoría y revocación de autoridad
    description: |
      Auditoría de las operaciones del tomador delegado y revocación de la autoridad de suscripción cuando sea necesario.
  BC-2110.60:
    name: Gestión de cotizaciones y envíos
    description: |
      Recepción de envíos, generación de cotizaciones, comparación y seguimiento de la conversión de cotización a vinculación.
  BC-2110.60.10:
    name: Recepción de envíos
    description: |
      Recepción de envíos de seguros a través de canales y portales de corredores.
  BC-2110.60.20:
    name: Generación de cotizaciones
    description: |
      Generación de cotizaciones de seguros a partir de la configuración de productos y tarifas.
  BC-2110.60.30:
    name: Comparación de cotizaciones y contracotización
    description: |
      Comparación de cotizaciones multiaseguradora y gestión de contracotizaciones.
  BC-2110.60.40:
    name: Seguimiento de conversión de cotización a vinculación
    description: |
      Seguimiento de tasas de conversión de cotización a vinculación y razones de no conversión.

locale: es
source: L1-real-estate-valuation-appraisal-management.yaml
entries:
  BC-4970:
    name: Gestión de la valoración y tasación inmobiliaria
    description: |
      Disciplina de tasación y valoración de activos y carteras inmobiliarias — admisión del encargo, inspección del inmueble, selección de comparables, aplicación de los enfoques de ventas/rentas/coste, redacción e informe, revaloraciones periódicas de la cartera y aseguramiento de la calidad conforme a USPAP, Red Book de RICS e IVS.
    in_scope:
      - Admisión del encargo, alcance, verificación de conflictos y cartas de encargo
      - Inspección del inmueble objeto y medición conforme a IPMS
      - Selección de transacciones comparables y referencias de rendimiento
      - Enfoque de ventas, capitalización de rentas, DCF y enfoque de coste
      - Redacción e informe conforme a Red Book / USPAP y firma
      - Revaloraciones periódicas de la cartera y revaloraciones de colateral del prestamista
      - Muestreo interno de control de calidad, revisión por pares y respuesta a auditorías
    out_of_scope:
      - Análisis previo de adquisiciones por parte de los propietarios (BC-4930)
      - Cálculo del NAV a nivel de fondo (BC-4910)
      - Recursos del impuesto sobre bienes inmuebles (BC-4920)
      - Opinión de valor del agente como producto de intermediación (BC-4960)
  BC-4970.10:
    name: Gestión del encargo de valoración
    description: |
      Admisión, alcance, verificación de conflictos y cartas de encargo para los encargos de valoración entrantes de clientes y prestamistas.
  BC-4970.10.10:
    name: Admisión y alcance del encargo
    description: |
      Admisión de los encargos de valoración y definición del alcance y propósito de la valoración.
  BC-4970.10.20:
    name: Verificación de conflictos e independencia del tasador
    description: |
      Verificación de los conflictos de interés y la independencia del tasador en los nuevos encargos.
  BC-4970.10.30:
    name: Honorarios y emisión de la carta de encargo
    description: |
      Definición y emisión de los honorarios y cartas de encargo a los clientes.
  BC-4970.20:
    name: Inspección del inmueble y captura de datos
    description: |
      Visitas de inspección, medición del edificio conforme a IPMS y captura de datos de estado y defectos en los inmuebles objeto.
  BC-4970.20.10:
    name: Operaciones de inspección del inmueble
    description: |
      Realización de inspecciones del inmueble objeto por tasadores cualificados.
  BC-4970.20.20:
    name: Medición del edificio (IPMS)
    description: |
      Medición de edificios y arrendamientos conforme a IPMS y los estándares de medición locales.
  BC-4970.20.30:
    name: Captura del estado y los defectos
    description: |
      Captura del estado del edificio y los defectos observados durante la inspección.
  BC-4970.30:
    name: Datos de mercado y selección de comparables
    description: |
      Búsqueda y selección de transacciones comparables, índices de mercado y referencias de rendimiento que sustentan las conclusiones de valoración.
  BC-4970.30.10:
    name: Captura de transacciones comparables
    description: |
      Captura de transacciones comparables a partir de fuentes de mercado y bases de datos internas.
  BC-4970.30.20:
    name: Índices de mercado y referencias de rendimiento
    description: |
      Mantenimiento de índices de mercado y referencias de rendimiento por sector y geografía.
  BC-4970.30.30:
    name: Gestión de los ajustes de comparables
    description: |
      Gestión de los ajustes de los comparables por diferencias de tiempo, localización, estado y calidad.
  BC-4970.40:
    name: Aplicación del enfoque de valoración
    description: |
      Aplicación de los enfoques de valoración reconocidos — comparación de ventas, capitalización de rentas, DCF y coste — al inmueble objeto.
  BC-4970.40.10:
    name: Enfoque de comparación de ventas
    description: |
      Aplicación del enfoque de comparación de ventas utilizando evidencia de transacciones comparables.
  BC-4970.40.20:
    name: Enfoque de capitalización de rentas
    description: |
      Aplicación del enfoque de capitalización de rentas utilizando el NOI y la evidencia de rendimientos.
  BC-4970.40.30:
    name: Enfoque de descuento de flujos de caja
    description: |
      Aplicación del enfoque de descuento de flujos de caja para inmuebles en renta con previsiones plurianuales.
  BC-4970.40.40:
    name: Enfoque de coste
    description: |
      Aplicación del enfoque de coste utilizando el coste de reposición y el análisis de depreciación.
  BC-4970.50:
    name: Informe de valoración y firma
    description: |
      Redacción, revisión interna y firma de informes de valoración conformes a USPAP, Red Book e IVS.
  BC-4970.50.10:
    name: Redacción del informe de valoración
    description: |
      Redacción de informes de valoración conforme al alcance y propósito del encargo.
  BC-4970.50.20:
    name: Firma del revisor y control de calidad
    description: |
      Firma del revisor y control de calidad de los informes de valoración antes de su emisión.
  BC-4970.50.30:
    name: Gestión de la emisión y reemisión del informe
    description: |
      Emisión de informes de valoración y gestión de las reemisiones y adendas.
  BC-4970.60:
    name: Revaloraciones de la cartera e índices de valoración
    description: |
      Revalorizaciones recurrentes de carteras para fondos y prestamistas y envío de datos de valoración a índices y referencias.
  BC-4970.60.10:
    name: Revalorización periódica de la cartera
    description: |
      Revalorización periódica de las carteras de fondos y propietarios en el ciclo contratado.
  BC-4970.60.20:
    name: Revalorización del colateral del prestamista
    description: |
      Revalorización del colateral del prestamista, incluyendo los disparadores de convenios y pruebas de resistencia.
  BC-4970.60.30:
    name: Informes de índices y referencias de mercado
    description: |
      Reporting de datos de valoración a NCREIF, MSCI y otros índices de desempeño.
  BC-4970.70:
    name: Aseguramiento de la calidad y auditoría de valoraciones
    description: |
      Muestreo interno de control de calidad, revisión por pares y respuesta a auditorías de clientes y reguladores sobre valoraciones emitidas.
  BC-4970.70.10:
    name: Muestreo interno de control de calidad
    description: |
      Muestreo de las valoraciones emitidas para revisión interna de control de calidad.
  BC-4970.70.20:
    name: Operaciones de revisión por pares
    description: |
      Realización de revisiones por pares para valoraciones complejas o de alto valor.
  BC-4970.70.30:
    name: Respuesta a auditorías regulatorias y de clientes
    description: |
      Respuesta a las solicitudes de auditoría de reguladores y clientes sobre valoraciones emitidas.

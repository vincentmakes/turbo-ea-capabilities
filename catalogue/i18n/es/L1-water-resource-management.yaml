locale: es
source: L1-water-resource-management.yaml
entries:
  BC-3860:
    name: Gestión de recursos hídricos
    description: |
      Administración sostenible de fuentes de agua bruta — protección de cuencas y
      fuentes, captación y almacenamiento de agua bruta, planificación a largo plazo
      de recursos, gestión de sequías y restricciones, cumplimiento de licencias de
      captación, y redes de monitorización de aguas superficiales y subterráneas.
  BC-3860.10:
    name: Protección de cuencas y fuentes
    description: |
      Protección de las cuencas de agua de origen mediante la participación de las partes
      interesadas, medidas de uso del suelo y evaluación del riesgo en el origen.
  BC-3860.10.10:
    name: Evaluación del riesgo en la cuenca
    description: |
      Evaluación del riesgo en la cuenca para fuentes de agua potable según los principios
      del Plan de Seguridad del Agua de la OMS.
  BC-3860.10.20:
    name: Gestión de zonas de protección de fuentes
    description: |
      Designación y gestión de zonas de protección de fuentes de aguas subterráneas y
      superficiales.
  BC-3860.10.30:
    name: Participación de las partes interesadas en la cuenca
    description: |
      Participación de propietarios de tierras, reguladores y agricultores en medidas
      de gestión de la cuenca.
  BC-3860.20:
    name: Operaciones de captación de agua bruta
    description: |
      Operación diaria de tomas, derivaciones fluviales y sondeos de agua subterránea
      que alimentan el parque de tratamiento.
  BC-3860.20.10:
    name: Operaciones de tomas de agua superficial
    description: |
      Operación de tomas fluviales y de embalse, incluido el cribado y el bombeo.
  BC-3860.20.20:
    name: Operaciones de sondeos de agua subterránea
    description: |
      Operación y gestión del caudal de sondeos y campos de pozos de agua subterránea.
  BC-3860.20.30:
    name: Operaciones de bombeo de agua bruta
    description: |
      Bombeo de agua bruta a las plantas de tratamiento y sistemas de acueducto.
  BC-3860.30:
    name: Operaciones de almacenamiento de agua bruta
    description: |
      Operación de embalses de regulación y de cabecera, presas y almacenamiento previo
      al tratamiento, incluida la vigilancia de seguridad de presas.
  BC-3860.30.10:
    name: Operaciones del nivel del embalse
    description: |
      Gestión de la curva operativa de embalses de regulación y de cabecera.
  BC-3860.30.20:
    name: Vigilancia de seguridad de presas
    description: |
      Vigilancia e inspección de presas conforme a los regímenes legales de seguridad
      de presas.
  BC-3860.30.30:
    name: Operaciones de calidad del agua en el embalse
    description: |
      Vigilancia y gestión de la calidad del agua bruta, incluidas las floraciones de algas.
  BC-3860.40:
    name: Planificación de recursos hídricos
    description: |
      Planificación a largo plazo de recursos hídricos y demanda, incluido el balance
      oferta-demanda, el ajuste por cambio climático y la evaluación de opciones.
  BC-3860.40.10:
    name: Previsión del balance oferta-demanda
    description: |
      Previsión a largo plazo de la oferta y la demanda por zona de recursos.
  BC-3860.40.20:
    name: Evaluación de opciones de recursos
    description: |
      Evaluación de opciones de nuevas fuentes, trasvases y medidas de gestión de la demanda.
  BC-3860.40.30:
    name: Ajuste de recursos por cambio climático
    description: |
      Ajuste de los rendimientos de los recursos y la demanda para escenarios de cambio climático.
  BC-3860.50:
    name: Gestión de sequías y restricciones
    description: |
      Activación de planes de sequía y restricciones de suministro mediante indicadores
      de sequía, restricciones orientadas al cliente y solicitudes de permisos de sequía
      de emergencia.
  BC-3860.50.10:
    name: Monitorización de indicadores de sequía
    description: |
      Monitorización de los indicadores de sequía de embalses, ríos y aguas subterráneas.
  BC-3860.50.20:
    name: Operaciones de restricciones por sequía
    description: |
      Implementación y levantamiento de restricciones de uso del agua para los clientes.
  BC-3860.50.30:
    name: Gestión de permisos y decretos de sequía
    description: |
      Solicitud y operación de permisos y decretos de sequía autorizados por los reguladores.
  BC-3860.60:
    name: Cumplimiento de las licencias de captación
    description: |
      Administración de las licencias de captación e informes de cumplimiento de las
      condiciones de cantidad, calendario y medioambientales.
  BC-3860.60.10:
    name: Administración de licencias de captación
    description: |
      Mantenimiento de la cartera de licencias de captación y el registro de condiciones.
  BC-3860.60.20:
    name: Notificación de volúmenes de captación
    description: |
      Notificación de los volúmenes captados y el cumplimiento de las condiciones de la licencia.
  BC-3860.60.30:
    name: Cumplimiento del caudal mínimo
    description: |
      Monitorización de las condiciones de caudal mínimo y de caudal ecológico en las
      captaciones.
  BC-3860.70:
    name: Monitorización hidrométrica
    description: |
      Operación de redes de monitorización de aguas superficiales y subterráneas que
      proporcionan datos para la planificación de recursos y las decisiones operativas.
  BC-3860.70.10:
    name: Monitorización de aguas superficiales
    description: |
      Operación de redes de monitorización de caudal fluvial, nivel y precipitación.
  BC-3860.70.20:
    name: Monitorización del nivel de aguas subterráneas
    description: |
      Operación de redes de sondeos de observación de aguas subterráneas.
  BC-3860.70.30:
    name: Gestión de la calidad de los datos hidrométricos
    description: |
      Control de calidad y gestión de las curvas de gasto para los datos hidrométricos.

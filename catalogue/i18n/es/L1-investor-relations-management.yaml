locale: es
source: L1-investor-relations-management.yaml
entries:
  BC-240:
    name: Gestión de relaciones con inversores
    description: |
      Comunicación con accionistas, analistas y mercados de capitales.
  BC-240.10:
    name: Comunicación con los mercados de capitales
    description: |
      Estrategia de relaciones con inversores, historia bursátil y días de mercados de capitales.
  BC-240.10.10:
    name: Estrategia de relaciones con inversores e historia bursátil
    description: |
      Definición de la estrategia de relaciones con inversores y la historia bursátil.
  BC-240.10.20:
    name: Gestión de días de mercados de capitales
    description: |
      Planificación y ejecución de los días de mercados de capitales y eventos para inversores.
  BC-240.10.30:
    name: Gestión de revelaciones de relaciones con inversores
    description: |
      Controles de divulgación, divulgación justa y comunicación de eventos materiales.
  BC-240.10.40:
    name: Comunicación de ESG y sostenibilidad
    description: |
      Narrativa ESG para los mercados de capitales y relación con agencias de calificación.
  BC-240.20:
    name: Gestión del ciclo de resultados
    description: |
      Comunicados de resultados trimestrales, llamadas con analistas y transcripciones.
  BC-240.20.10:
    name: Preparación del comunicado de resultados
    description: |
      Redacción y emisión de los comunicados de prensa de resultados.
  BC-240.20.20:
    name: Gestión de la conferencia de resultados
    description: |
      Guiones, preparación de preguntas y respuestas y ejecución de las llamadas con analistas.
  BC-240.20.30:
    name: Gestión del consenso y la orientación
    description: |
      Seguimiento de las estimaciones del consenso y comunicación de orientación.
  BC-240.30:
    name: Gestión del compromiso con los accionistas
    description: |
      Junta general de accionistas, reuniones y comunicación con accionistas minoristas.
  BC-240.30.10:
    name: Compromiso con inversores institucionales
    description: |
      Roadshows, reuniones individuales y diálogo continuo con inversores institucionales.
  BC-240.30.20:
    name: Compromiso con accionistas minoristas
    description: |
      Comunicaciones y programas de alcance para accionistas minoristas.
  BC-240.30.30:
    name: Coordinación de la junta general de accionistas
    description: |
      Contribución de relaciones con inversores a la logística, materiales y preguntas de la JGA.
  BC-240.30.40:
    name: Compromiso con asesores de voto y gobierno
    description: |
      Relación con asesores de voto e inversores en gobierno corporativo.
  BC-240.40:
    name: Gestión de la relación con analistas
    description: |
      Compromiso con analistas del lado vendedor y del lado comprador.
  BC-240.40.10:
    name: Gestión de la cobertura de analistas del lado vendedor
    description: |
      Desarrollo de cobertura, revisiones de modelos y relación con el lado vendedor.
  BC-240.40.20:
    name: Identificación de inversores del lado comprador
    description: |
      Identificación y captación de inversores del lado comprador.
  BC-240.40.30:
    name: Estudios de percepción de inversores
    description: |
      Estudios de percepción y encuestas de retroalimentación con la base inversora.

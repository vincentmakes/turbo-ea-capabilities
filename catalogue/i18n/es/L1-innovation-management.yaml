locale: es
source: L1-innovation-management.yaml
entries:
  BC-800:
    name: Gestión de la innovación
    description: |
      Gestiona la generación de ideas, la incubación, la cartera de innovación y las iniciativas de nuevas empresas para impulsar el crecimiento y la ventaja competitiva.
  BC-800.10:
    name: Gestión de ideas y oportunidades
    description: |
      Captura, evalúa y prioriza ideas y oportunidades de negocio procedentes de múltiples fuentes.
  BC-800.10.10:
    name: Captura y envío de ideas
    description: |
      Gestiona los canales de captación de ideas provenientes de la multitud, empleados y socios.
  BC-800.10.20:
    name: Evaluación y selección de ideas
    description: |
      Aplica criterios de selección y evaluación para preseleccionar las ideas con mayor potencial.
  BC-800.10.30:
    name: Definición de oportunidades
    description: |
      Enmarca oportunidades de negocio, declaraciones de problemas y casos de valor para su posterior desarrollo.
  BC-800.20:
    name: Gestión de la cartera de innovación
    description: |
      Administra la cartera de iniciativas de innovación equilibrando horizontes H1, H2 y H3.
  BC-800.20.10:
    name: Gestión del pipeline de innovación
    description: |
      Supervisa el avance de las iniciativas de innovación a lo largo de las distintas etapas del pipeline.
  BC-800.20.20:
    name: Equilibrio de cartera en tres horizontes
    description: |
      Balancea la cartera de innovación entre los horizontes H1, H2 y H3.
  BC-800.20.30:
    name: Gobierno por etapas y puertas de decisión
    description: |
      Establece revisiones por etapas y un gobierno de decisiones para las iniciativas de innovación.
  BC-800.20.40:
    name: Gestión de financiación de la innovación
    description: |
      Asigna financiación entre las distintas iniciativas de innovación de la cartera.
  BC-800.30:
    name: Incubación y aceleración de la innovación
    description: |
      Opera incubadoras, aceleradoras y programas de creación de empresas internas para escalar iniciativas prometedoras.
  BC-800.30.10:
    name: Operaciones de incubadoras de innovación
    description: |
      Gestiona incubadoras corporativas y laboratorios de innovación para nutrir proyectos en etapa temprana.
  BC-800.30.20:
    name: Creación de empresas internas
    description: |
      Facilita la creación de spin-outs y nuevas empresas internas a partir de proyectos validados.
  BC-800.30.30:
    name: Desarrollo de producto mínimo viable
    description: |
      Desarrolla PMV, realiza validación con clientes e itera hacia soluciones escalables.
  BC-800.30.40:
    name: Escalado de la innovación
    description: |
      Facilita la transición de innovaciones validadas hacia ofertas a escala dentro del negocio.
  BC-800.40:
    name: Gestión de inversiones corporativas en nuevas empresas
    description: |
      Gestiona inversiones de capital riesgo corporativo y asociaciones estratégicas con startups.
  BC-800.40.10:
    name: Búsqueda y captación de startups
    description: |
      Identifica startups alineadas con los temas estratégicos de la organización.
  BC-800.40.20:
    name: Inversión corporativa en nuevas empresas
    description: |
      Ejecuta inversiones de capital directo y opera fondos de capital riesgo corporativo.
  BC-800.40.30:
    name: Gestión de asociaciones con startups
    description: |
      Desarrolla asociaciones comerciales y pilotos con startups seleccionadas.
  BC-800.40.40:
    name: Gestión de la cartera de nuevas empresas
    description: |
      Monitoriza el rendimiento de las inversiones en la cartera de nuevas empresas.
  BC-800.50:
    name: Gestión de la innovación abierta
    description: |
      Aprovecha redes externas, crowdsourcing y alianzas académicas para ampliar las fuentes de innovación.
  BC-800.50.10:
    name: Alianzas con instituciones académicas y de investigación
    description: |
      Fomenta colaboraciones con universidades e instituciones de investigación para proyectos conjuntos.
  BC-800.50.20:
    name: Retos de innovación y crowdsourcing
    description: |
      Organiza retos de innovación externos, hackathones y campañas de crowdsourcing.
  BC-800.50.30:
    name: Participación en ecosistemas de innovación
    description: |
      Impulsa la vinculación con centros de innovación, aceleradoras y ecosistemas externos.
  BC-800.50.40:
    name: Captación externa de tecnología
    description: |
      Gestiona la adquisición y licencia de tecnologías externas para incorporarlas al negocio.

locale: es
source: L1-agronomy-farm-advisory-management.yaml
entries:
  BC-3530:
    name: Gestión de agronomía y asesoramiento agrícola
    description: |
      Análisis de suelos, planificación nutricional y de protección de cultivos, manejo integrado de plagas, recomendación de variedades, servicios de asesoramiento y gestión de ensayos en campo que transforman la ciencia agronómica en decisiones a nivel de campo.
  BC-3530.10:
    name: Análisis y muestreo de suelos
    description: |
      Muestreo, análisis de laboratorio e interpretación de análisis de suelos para alimentar las decisiones de nutrición y enmienda.
  BC-3530.10.10:
    name: Operaciones de muestreo de suelos
    description: |
      Muestreo de suelos en campo mediante métodos de cuadrícula, zona y compuesto.
  BC-3530.10.20:
    name: Interpretación de resultados de análisis de suelos
    description: |
      Interpretación de los resultados del análisis de suelos frente a los requerimientos del cultivo.
  BC-3530.10.30:
    name: Seguimiento de indicadores de salud del suelo
    description: |
      Seguimiento de los indicadores de salud del suelo a lo largo del tiempo en todos los campos.
  BC-3530.20:
    name: Planificación del manejo de nutrientes
    description: |
      Cálculo de los requerimientos nutricionales del cultivo y generación de prescripciones a tasa variable alineadas con la gestión de nutrientes 4R.
    in_scope:
      - Cálculo de requerimientos de nutrientes
      - Generación de prescripciones a tasa variable
      - Registro de conformidad 4R
    out_of_scope:
      - Ejecución de la aplicación de fertilizantes (BC-3500.40)
      - Programas de carbono en suelos (BC-3600.50)
  BC-3530.20.10:
    name: Cálculo de requerimientos de nutrientes
    description: |
      Cálculo de los requerimientos de nutrientes por cultivo, objetivo de rendimiento y campo.
  BC-3530.20.20:
    name: Generación de prescripciones a tasa variable
    description: |
      Generación de mapas de prescripción a tasa variable para fertilizantes y enmiendas.
  BC-3530.20.30:
    name: Registro de conformidad 4R
    description: |
      Registro de la fuente, tasa, momento y lugar correctos conforme a la gestión de nutrientes 4R.
  BC-3530.30:
    name: Planificación de protección de cultivos
    description: |
      Evaluación de riesgos, planificación del manejo integrado de plagas, diseño de programas de pulverización y estrategia de gestión de la resistencia.
  BC-3530.30.10:
    name: Evaluación del riesgo de plagas y enfermedades
    description: |
      Evaluación del riesgo de plagas y enfermedades mediante pronósticos e inteligencia de campo.
  BC-3530.30.20:
    name: Planificación del manejo integrado de plagas
    description: |
      Planificación del MIP combinando medidas culturales, biológicas y químicas.
  BC-3530.30.30:
    name: Diseño del programa de pulverización
    description: |
      Diseño del programa de pulverización para toda la temporada equilibrando eficacia, residuos y costo.
  BC-3530.30.40:
    name: Planificación del manejo de la resistencia
    description: |
      Planificación del manejo de la resistencia a pesticidas en los distintos modos de acción.
  BC-3530.40:
    name: Recomendación de variedades e híbridos
    description: |
      Análisis de datos de ensayos varietales y emisión de recomendaciones de variedades e híbridos adaptadas localmente para los productores.
  BC-3530.40.10:
    name: Análisis de resultados de ensayos de variedades
    description: |
      Análisis estadístico de los resultados de ensayos de variedades en distintos sitios y temporadas.
  BC-3530.40.20:
    name: Recomendación local de variedades
    description: |
      Emisión de recomendaciones de variedades e híbridos por zona y uso final.
  BC-3530.50:
    name: Servicios de asesoramiento agronómico
    description: |
      Visitas de asesoramiento en campo, recomendaciones de apoyo a la toma de decisiones y capacitación de productores impartidas por profesionales agrónomos.
  BC-3530.50.10:
    name: Realización de visitas de asesoramiento en campo
    description: |
      Visitas de asesoramiento en la granja y entrega de recomendaciones.
  BC-3530.50.20:
    name: Recomendación de apoyo a la toma de decisiones
    description: |
      Uso de herramientas de apoyo a la toma de decisiones para emitir recomendaciones agronómicas.
  BC-3530.50.30:
    name: Impartición de capacitación a productores
    description: |
      Impartición de eventos de capacitación a productores y días de campo.
  BC-3530.60:
    name: Gestión de ensayos en campo
    description: |
      Diseño, ejecución y análisis de ensayos en campo replicados que respaldan la evaluación de agronomía, variedades y productos.
  BC-3530.60.10:
    name: Diseño del ensayo
    description: |
      Diseño estadístico de ensayos replicados y de demostración.
  BC-3530.60.20:
    name: Ejecución del ensayo y captura de datos
    description: |
      Ejecución del ensayo en sitio y captura de datos estandarizada.
  BC-3530.60.30:
    name: Análisis de resultados del ensayo
    description: |
      Análisis estadístico de los resultados del ensayo e informes a los patrocinadores.

locale: es
source: L1-curriculum-programme-management.yaml
entries:
  BC-4700:
    name: Gestión del plan de estudios y programa
    description: |
      Definición, estructuración, gobernanza y mejora continua de programas académicos,
      cursos, módulos, titulaciones y los resultados de aprendizaje que los sustentan.
  BC-4700.10:
    name: Arquitectura de programas
    description: |
      Definición de la estructura del programa, el nivel de titulación, la ponderación
      de créditos y los resultados de aprendizaje previstos de los títulos académicos.
    in_scope:
      - Definición de la estructura y las trayectorias del programa
      - Estructura de titulación y credenciales del título
      - Resultados de aprendizaje previstos a nivel de programa
    out_of_scope:
      - Elaboración del plan de estudios por curso (cubierto en Diseño de cursos y módulos)
      - Resultados de acreditación externa (cubiertos en Gestión de calidad académica y acreditación)
  BC-4700.10.10:
    name: Definición de programas
    description: |
      Definición del propósito del programa, el colectivo objetivo, los requisitos de
      acceso y la estructura general.
  BC-4700.10.20:
    name: Estructuración de titulaciones y credenciales
    description: |
      Estructuración de títulos, valores de crédito y trayectorias de credenciales apilables.
  BC-4700.10.30:
    name: Definición de resultados de aprendizaje
    description: |
      Articulación de los resultados de aprendizaje previstos a nivel de programa y de curso.
  BC-4700.20:
    name: Diseño de cursos y módulos
    description: |
      Especificación y elaboración de cursos, módulos y unidades de aprendizaje individuales
      que componen los programas académicos.
    in_scope:
      - Especificaciones de cursos y descriptores de módulos
      - Elaboración y aprobación del programa de estudios
      - Objetivos de aprendizaje a nivel de unidad y planes de evaluación
    out_of_scope:
      - Producción de materiales didácticos (cubierta en Gestión de contenidos educativos y recursos de aprendizaje)
  BC-4700.20.10:
    name: Especificación de cursos
    description: |
      Elaboración y aprobación de especificaciones y descriptores formales de cursos.
  BC-4700.20.20:
    name: Diseño de módulos y unidades
    description: |
      Diseño de módulos y unidades de aprendizaje dentro de los cursos.
  BC-4700.20.30:
    name: Elaboración del programa de estudios
    description: |
      Elaboración de los programas de estudios que establecen contenidos, métodos y
      evaluaciones para cada oferta.
  BC-4700.30:
    name: Mapeo y alineación del plan de estudios
    description: |
      Mapeo de los contenidos curriculares con marcos de competencias, marcos de
      titulaciones y trayectorias profesionales y de habilidades.
    in_scope:
      - Mapeo de competencias al currículo
      - Alineación con ISCED, EQF, NQF y marcos equivalentes
      - Mapeo de habilidades y trayectorias profesionales
    out_of_scope:
      - Adquisición individual de habilidades por el alumno (cubierta en Gestión de evaluación y exámenes)
  BC-4700.30.10:
    name: Alineación con marcos de competencias
    description: |
      Alineación del currículo con marcos de competencias definidos (p. ej., CASE).
  BC-4700.30.20:
    name: Mapeo de marcos de titulaciones
    description: |
      Mapeo de titulaciones con ISCED, EQF, NQF y marcos de referencia similares.
  BC-4700.30.30:
    name: Mapeo de habilidades y trayectorias profesionales
    description: |
      Mapeo del currículo con trayectorias ocupacionales, profesionales y de carrera.
  BC-4700.40:
    name: Gestión del catálogo de programas
    description: |
      Elaboración, control de versiones y publicación del catálogo institucional de
      programas y cursos disponibles para estudiantes potenciales y actuales.
    in_scope:
      - Elaboración del catálogo y flujo editorial
      - Control de versiones y fechas de vigencia del catálogo
      - Publicación interna y pública del catálogo
    out_of_scope:
      - Materiales de marketing de captación (cubiertos en Gestión de captación de estudiantes y admisiones)
  BC-4700.40.10:
    name: Elaboración del catálogo
    description: |
      Elaboración de las entradas del catálogo de programas, cursos y módulos.
  BC-4700.40.20:
    name: Control de versiones y fechas de vigencia del catálogo
    description: |
      Control de versiones y gestión de fechas de vigencia de las entradas del catálogo.
  BC-4700.40.30:
    name: Publicación del catálogo
    description: |
      Publicación interna y pública del catálogo de programas y cursos.
  BC-4700.50:
    name: Aprobación y gobernanza de programas
    description: |
      Procedimientos de aprobación interna y externa para programas nuevos, modificados
      y retirados, incluidas las decisiones de suspensión y cierre.
    in_scope:
      - Aprobación académica interna y gobernanza
      - Aprobación por organismos reguladores externos y colegios profesionales
      - Suspensión y cierre ordenado de programas
    out_of_scope:
      - Revisión curricular ordinaria (cubierta en Revisión curricular y mejora continua)
      - Acreditación cíclica (cubierta en Gestión de calidad académica y acreditación)
  BC-4700.50.10:
    name: Aprobación interna de programas
    description: |
      Aprobación académica interna de programas nuevos y modificados.
  BC-4700.50.20:
    name: Aprobación externa de programas
    description: |
      Aprobación de programas por organismos reguladores externos, ministerios o
      colegios profesionales.
  BC-4700.50.30:
    name: Suspensión y cierre de programas
    description: |
      Suspensión ordenada, periodo de extinción y cierre de programas.
  BC-4700.60:
    name: Revisión curricular y mejora continua
    description: |
      Revisión y mejora periódica de los contenidos curriculares basada en resultados,
      aportaciones de los grupos de interés y requisitos externos.
    in_scope:
      - Ciclos periódicos de revisión curricular
      - Aportaciones de grupos de interés, empleadores y estudiantes
      - Seguimiento de la implementación de cambios curriculares
    out_of_scope:
      - Revisiones de garantía de calidad de programas (cubiertas en Gestión de calidad académica y acreditación)
  BC-4700.60.10:
    name: Revisión curricular periódica
    description: |
      Revisión cíclica de la efectividad y la pertinencia del currículo.
  BC-4700.60.20:
    name: Aportaciones de grupos de interés al currículo
    description: |
      Recogida de aportaciones de estudiantes, empleadores y consejos asesores al
      diseño curricular.
  BC-4700.60.30:
    name: Implementación de cambios curriculares
    description: |
      Seguimiento e implementación de los cambios curriculares aprobados.

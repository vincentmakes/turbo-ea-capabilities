locale: es
source: L1-mineral-processing-operations-management.yaml
entries:
  BC-4440:
    name: Gestión de operaciones de procesamiento mineral
    description: |
      Operaciones de concentradoras e hidrometalurgia que convierten el mineral
      run-of-mine en concentrados comercializables o productos intermedios
      mediante conminución, beneficiación, lixiviación y manejo de
      concentrados.

  BC-4440.10:
    name: Gestión de pilas de mineral run-of-mine
    description: |
      Gestión de las pilas de mineral run-of-mine entre la mina y la planta de
      procesamiento, incluyendo extracción, homogenización y reconciliación de
      inventario.
    in_scope:
      - Extracción y homogenización de pilas de ROM
      - Reconciliación del inventario de pilas
    out_of_scope:
      - Asignación de bloques de mineral en pit (BC-4430.40.40)
      - Almacenamiento de concentrados (BC-4440.50.30)

  BC-4440.10.10:
    name: Extracción de pilas de mineral run-of-mine
    description: |
      Extracción de pilas de mineral run-of-mine hacia la alimentación de planta
      mediante alimentadores de paletas o cargadoras frontales.

  BC-4440.10.20:
    name: Homogenización de mineral
    description: |
      Homogenización del material de pilas para alcanzar la ley objetivo y las
      características metalúrgicas deseadas.

  BC-4440.10.30:
    name: Reconciliación del inventario de pilas
    description: |
      Reconciliación de datos de topografía, despacho y extracción en balances
      de inventario de pilas.

  BC-4440.20:
    name: Operaciones de conminución
    description: |
      Operaciones de trituración, molienda y optimización de circuitos que
      reducen el mineral al tamaño de liberación.

  BC-4440.20.10:
    name: Operaciones de trituración
    description: |
      Operación de estaciones de trituración primaria, secundaria y terciaria.

  BC-4440.20.20:
    name: Operaciones de molinos de molienda
    description: |
      Operación de molinos SAG, AG, de bolas y de barras con la clasificación
      asociada.

  BC-4440.20.30:
    name: Optimización del circuito de conminución
    description: |
      Optimización de procesos en circuitos de conminución para la tonelada
      tratada, el P80 y la intensidad energética.

  BC-4440.30:
    name: Operaciones de beneficiación
    description: |
      Concentración física de minerales valiosos mediante flotación, gravedad,
      separación magnética y separación en medios densos.

  BC-4440.30.10:
    name: Operaciones del circuito de flotación
    description: |
      Operación de circuitos de flotación rougher, scavenger y cleaner con
      dosificación de reactivos.

  BC-4440.30.20:
    name: Concentración gravitacional
    description: |
      Operación de jigs, espirales y concentradores centrífugos para minerales
      susceptibles de concentración gravitacional.

  BC-4440.30.30:
    name: Separación magnética
    description: |
      Separación magnética de baja y alta intensidad para minerales
      ferromagnéticos y paramagnéticos.

  BC-4440.30.40:
    name: Separación en medios densos
    description: |
      Operación de ciclones y tambores de medios densos para preconcentración.

  BC-4440.40:
    name: Operaciones hidrometalúrgicas
    description: |
      Extracción acuosa de metales mediante lixiviación en pilas, en tanques y
      en bateas, extracción por solventes y circuitos de adsorción.

  BC-4440.40.10:
    name: Operaciones de lixiviación en pilas
    description: |
      Operación de plataformas de lixiviación en pilas, incluyendo apilamiento,
      irrigación y colección de solución preñada.

  BC-4440.40.20:
    name: Operaciones de lixiviación en tanques y bateas
    description: |
      Operación de circuitos de lixiviación en tanques y bateas para mineral y
      concentrado.

  BC-4440.40.30:
    name: Operaciones de extracción por solventes
    description: |
      Operación de circuitos de extracción por solventes para la transferencia
      selectiva de metales al electrolito.

  BC-4440.40.40:
    name: Operaciones de adsorción en carbón
    description: |
      Operación de circuitos de adsorción-elución-recuperación de carbón en
      pulpa, carbón en lixiviación y carbón en columna.

  BC-4440.50:
    name: Manejo y filtración de concentrados
    description: |
      Espesamiento, filtración y almacenamiento de concentrados para su envío a
      fundición o venta.

  BC-4440.50.10:
    name: Operaciones de espesamiento
    description: |
      Operación de espesadores de alta tasa y de pasta para el drenaje de
      concentrados y relaves.

  BC-4440.50.20:
    name: Filtración y drenaje
    description: |
      Operación de filtros de presión, vacío y de banda para el drenaje de
      concentrados.

  BC-4440.50.30:
    name: Almacenamiento de concentrados
    description: |
      Almacenamiento en interiores y exteriores de concentrados drenados previo
      al despacho.

  BC-4440.60:
    name: Contabilidad metalúrgica de la planta de proceso
    description: |
      Muestreo, ensayo y reconciliación del balance de metales de la alimentación
      de planta, los productos y los relaves.

  BC-4440.60.10:
    name: Muestreo y ensayo de planta
    description: |
      Muestreo transversal de flujos y ensayo de la alimentación de planta,
      concentrado y relaves.

  BC-4440.60.20:
    name: Balance metalúrgico
    description: |
      Reconciliación periódica del balance de metales a lo largo del diagrama
      de flujo de la planta.

  BC-4440.60.30:
    name: Informes de recuperación
    description: |
      Informes de la recuperación de metales frente al plan y al diseño.

  BC-4440.60.40:
    name: Informes de calidad de concentrados
    description: |
      Informes de la ley, los elementos deletéreos y la humedad del concentrado
      frente a la especificación.

  BC-4440.70:
    name: Gestión de reactivos y consumibles de proceso
    description: |
      Gestión de reactivos y consumibles de proceso, incluyendo control de
      dosificación, inventario y administración de reactivos peligrosos.

  BC-4440.70.10:
    name: Control de dosificación de reactivos
    description: |
      Control en tiempo real de la dosificación de reactivos en circuitos de
      flotación e hidrometalurgia.

  BC-4440.70.20:
    name: Gestión del inventario de reactivos
    description: |
      Gestión del inventario y consumo de reactivos a granel y medios de
      molienda.

  BC-4440.70.30:
    name: Administración del cianuro
    description: |
      Administración del cianuro y otros reactivos peligrosos conforme al Código
      Internacional de Gestión del Cianuro.

locale: es
source: L1-pharmaceutical-manufacturing-management.yaml
entries:
  BC-1550:
    name: Gestión de la fabricación farmacéutica
    description: |
      Fabrica bajo cumplimiento GMP tanto la sustancia activa (API) como el producto farmacéutico terminado, desde la síntesis hasta el envasado y la liberación.
  BC-1550.10:
    name: Gestión de la fabricación del API
    description: |
      Produce principios activos farmacéuticos mediante síntesis de moléculas pequeñas, producción biológica y procesos de purificación.
  BC-1550.10.10:
    name: Síntesis de API de molécula pequeña
    description: |
      Síntesis de principios activos farmacéuticos de molécula pequeña.
  BC-1550.10.20:
    name: Producción de API biológico
    description: |
      Producción de API biológicos mediante cultivo celular y fermentación.
  BC-1550.10.30:
    name: Purificación del API
    description: |
      Purificación downstream de los principios activos farmacéuticos.
  BC-1550.20:
    name: Gestión de la fabricación del producto farmacéutico
    description: |
      Fabrica formas farmacéuticas sólidas, líquidas, biológicas y especiales conforme a los estándares GMP.
  BC-1550.20.10:
    name: Fabricación de formas farmacéuticas sólidas
    description: |
      Operaciones de fabricación de comprimidos y cápsulas.
  BC-1550.20.20:
    name: Fabricación de formas líquidas y semisólidas
    description: |
      Fabricación de formas farmacéuticas líquidas, suspensiones y semisólidas.
  BC-1550.20.30:
    name: Llenado y acabado de productos biológicos
    description: |
      Llenado y acabado de productos farmacéuticos biológicos.
  BC-1550.20.40:
    name: Fabricación de formas de inhalación y especiales
    description: |
      Fabricación de formas farmacéuticas para inhalación, transdérmicas y especiales.
  BC-1550.30:
    name: Gestión de la fabricación en condiciones estériles
    description: |
      Opera instalaciones de llenado aséptico y esterilización terminal conforme al Anexo 1 y los requisitos GMP aplicables.
  BC-1550.30.10:
    name: Operaciones de llenado aséptico
    description: |
      Llenado aséptico conforme a los requisitos del Anexo 1.
  BC-1550.30.20:
    name: Operaciones de esterilización terminal
    description: |
      Procesamiento de esterilización terminal de productos farmacéuticos.
  BC-1550.30.30:
    name: Operaciones en salas blancas
    description: |
      Operación de salas blancas clasificadas y monitorización ambiental.
  BC-1550.40:
    name: Gestión de envasado y etiquetado
    description: |
      Ejecuta las operaciones de envasado primario, secundario y etiquetado, incluyendo la serialización y la personalización por mercado.
  BC-1550.40.10:
    name: Operaciones de envasado primario
    description: |
      Envasado primario de los productos farmacéuticos.
  BC-1550.40.20:
    name: Operaciones de envasado secundario
    description: |
      Envasado secundario, encajado y agrupado de productos farmacéuticos.
  BC-1550.40.30:
    name: Aplicación de etiquetas
    description: |
      Aplicación de etiquetas y marcas de serialización en los productos.
  BC-1550.40.40:
    name: Personalización de última etapa
    description: |
      Personalización de última etapa y envasado específico por país.
  BC-1550.50:
    name: Gestión de validación y cualificación
    description: |
      Valida y cualifica procesos, equipos, limpieza y sistemas informatizados conforme a los estándares ICH y GAMP.
  BC-1550.50.10:
    name: Validación de procesos
    description: |
      Validación de procesos alineada con ICH Q7.
  BC-1550.50.20:
    name: Cualificación de equipos
    description: |
      Cualificación IQ, OQ, PQ de equipos GMP.
  BC-1550.50.30:
    name: Validación de limpieza
    description: |
      Validación de limpieza en los cambios de producto.
  BC-1550.50.40:
    name: Validación de sistemas informatizados
    description: |
      Validación de sistemas informatizados (CSV) conforme a GAMP 5 y 21 CFR Parte 11.
  BC-1550.60:
    name: Gestión de la transferencia tecnológica
    description: |
      Planifica y ejecuta las transferencias de tecnología entre plantas y el escalado de procesos hacia producción comercial.
  BC-1550.60.10:
    name: Planificación de la transferencia tecnológica
    description: |
      Planificación de la transferencia de tecnología entre plantas de fabricación.
  BC-1550.60.20:
    name: Escalado del proceso
    description: |
      Escalado desde escala piloto hasta escala de producción comercial.
  BC-1550.60.30:
    name: Verificación de la preparación del centro receptor
    description: |
      Verificación de la preparación del centro receptor para la transferencia tecnológica.
  BC-1550.70:
    name: Gestión de las operaciones de producción GMP
    description: |
      Ejecuta la producción GMP diaria mediante registros de lote, controles en proceso y formación del personal operativo.
  BC-1550.70.10:
    name: Ejecución del registro de lote
    description: |
      Ejecución de registros de lote en papel o electrónicos.
  BC-1550.70.20:
    name: Muestreo de control en proceso
    description: |
      Muestreo y análisis de control en proceso durante la fabricación.
  BC-1550.70.30:
    name: Despeje de línea de producción
    description: |
      Operaciones de despeje de línea y cambio de producto.
  BC-1550.70.40:
    name: Formación GMP del operario
    description: |
      Formación y cualificación GMP del personal operativo de fabricación.

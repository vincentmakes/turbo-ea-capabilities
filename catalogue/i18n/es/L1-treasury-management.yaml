locale: es
source: L1-treasury-management.yaml
entries:
  BC-210:
    name: Gestión de tesorería
    description: |
      Gestión de la liquidez, la financiación y las exposiciones a mercados financieros.
  BC-210.10:
    name: Gestión de tesorería y caja
    description: |
      Posición de caja, cash pooling y financiación intercompañía.
  BC-210.10.10:
    name: Seguimiento de la posición de caja
    description: |
      Seguimiento diario de las posiciones de caja por entidad y divisa.
  BC-210.10.20:
    name: Operaciones de cash pooling
    description: |
      Cash pooling nocional y físico a nivel de grupo.
  BC-210.10.30:
    name: Financiación intercompañía
    description: |
      Préstamos intercompañía, banco interno y liquidación entre compañías.
  BC-210.10.40:
    name: Gestión de inversiones a corto plazo
    description: |
      Actividades de inversión en mercado monetario y a corto plazo.
  BC-210.20:
    name: Gestión de la liquidez
    description: |
      Previsión de liquidez, pruebas de estrés y planes de financiación.
  BC-210.20.10:
    name: Previsión de flujo de caja
    description: |
      Previsiones de flujo de caja a corto, medio y largo plazo.
  BC-210.20.20:
    name: Seguimiento del riesgo de liquidez
    description: |
      Ratios de liquidez, reservas e indicadores de alerta temprana.
  BC-210.20.30:
    name: Pruebas de estrés de liquidez
    description: |
      Pruebas de estrés de suficiencia de liquidez bajo escenarios adversos.
  BC-210.20.40:
    name: Planificación de financiación de contingencia
    description: |
      Planes de financiación de contingencia y líneas de liquidez comprometidas.
  BC-210.30:
    name: Gestión de la financiación y la deuda
    description: |
      Emisión de deuda, gestión de líneas de crédito y covenants.
  BC-210.30.10:
    name: Emisión de deuda
    description: |
      Emisión de bonos, papel comercial y colocaciones privadas.
  BC-210.30.20:
    name: Gestión de préstamos y líneas bancarias
    description: |
      Negociación y administración de líneas de crédito y préstamos bilaterales.
  BC-210.30.30:
    name: Servicio de la deuda
    description: |
      Programación y ejecución de pagos de intereses, principal y comisiones.
  BC-210.30.40:
    name: Gestión de covenants y calificaciones crediticias
    description: |
      Seguimiento de covenants y relación con agencias de calificación crediticia.
  BC-210.40:
    name: Gestión del riesgo de tipo de cambio
    description: |
      Exposición a divisas, coberturas y liquidación.
  BC-210.40.10:
    name: Identificación de exposiciones en divisas
    description: |
      Identificación y cuantificación de las exposiciones en moneda extranjera por entidad.
  BC-210.40.20:
    name: Ejecución de coberturas de tipo de cambio
    description: |
      Ejecución de forwards, swaps y opciones de divisas.
  BC-210.40.30:
    name: Liquidación y confirmación de divisas
    description: |
      Liquidación, confirmación y conciliación de operaciones de divisas.
  BC-210.40.40:
    name: Gestión de la exposición de conversión
    description: |
      Cobertura de la inversión neta y de las exposiciones de conversión.
  BC-210.50:
    name: Gestión del riesgo de tipo de interés
    description: |
      Exposición a tipos de interés y estrategias de cobertura.
  BC-210.50.10:
    name: Medición de la exposición al tipo de interés
    description: |
      Medición de la sensibilidad al tipo de interés en el balance.
  BC-210.50.20:
    name: Cobertura del tipo de interés
    description: |
      Ejecución de swaps de tipos de interés, caps y otros derivados.
  BC-210.50.30:
    name: Contabilidad de coberturas
    description: |
      Designación de coberturas, pruebas de eficacia y contabilización bajo NIIF 9.
  BC-210.60:
    name: Gestión de la relación bancaria
    description: |
      Estructura de cuentas bancarias y gestión de entidades bancarias.
  BC-210.60.10:
    name: Gestión del ciclo de vida de cuentas bancarias
    description: |
      Apertura, modificación y cierre de cuentas bancarias.
  BC-210.60.20:
    name: Gestión de mandatos bancarios y firmantes
    description: |
      Listas de firmantes autorizados, mandatos bancarios y cambios de autorización.
  BC-210.60.30:
    name: Contratación de servicios bancarios
    description: |
      Selección y contratación de entidades bancarias y servicios.
  BC-210.60.40:
    name: Gestión de comisiones bancarias y calidad del servicio
    description: |
      Seguimiento de comisiones bancarias, calidad del servicio y analítica.

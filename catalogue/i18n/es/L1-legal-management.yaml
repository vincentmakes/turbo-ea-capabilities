locale: es
source: L1-legal-management.yaml
entries:
  BC-150:
    name: Gestión jurídica
    description: |
      Asesoría jurídica, contratos, litigios y asuntos jurídicos corporativos.
  BC-150.10:
    name: Gestión de contratos
    description: |
      Ciclo de vida contractual desde la redacción hasta el cierre.
  BC-150.10.10:
    name: Redacción de contratos y plantillas
    description: |
      Mantenimiento de bibliotecas de cláusulas, plantillas y manuales de negociación.
  BC-150.10.20:
    name: Soporte a la negociación de contratos
    description: |
      Apoyo jurídico en la negociación, revisión de versiones y posición de riesgo.
  BC-150.10.30:
    name: Gestión de la ejecución de contratos
    description: |
      Flujos de aprobación, firma y control de la ejecución.
  BC-150.10.40:
    name: Repositorio de contratos y seguimiento de obligaciones
    description: |
      Repositorio central, fechas clave y seguimiento de obligaciones contractuales.
  BC-150.10.50:
    name: Renovación y rescisión de contratos
    description: |
      Administración de renovaciones, modificaciones y rescisiones contractuales.
  BC-150.20:
    name: Gestión de litigios y conflictos
    description: |
      Controversias, litigios y arbitraje.
  BC-150.20.10:
    name: Gestión prelitigiosa de conflictos
    description: |
      Cartas de requerimiento, mediación y negociación prejudicial.
  BC-150.20.20:
    name: Gestión de asuntos contenciosos
    description: |
      Gestión integral de los asuntos en litigio judicial.
  BC-150.20.30:
    name: Arbitraje y resolución alternativa de conflictos
    description: |
      Arbitraje, mediación y otros mecanismos de resolución alternativa.
  BC-150.20.40:
    name: Medida cautelar y descubrimiento electrónico
    description: |
      Notificaciones de conservación, preservación y descubrimiento electrónico.
  BC-150.30:
    name: Derecho corporativo y mercantil
    description: |
      Derecho societario, apoyo jurídico en fusiones y adquisiciones, y operaciones comerciales.
  BC-150.30.10:
    name: Asesoría de derecho corporativo
    description: |
      Asesoramiento en derecho societario, gobierno corporativo y estructuración de entidades.
  BC-150.30.20:
    name: Apoyo jurídico en fusiones y adquisiciones
    description: |
      Due diligence jurídico, documentación de transacciones y cierre.
  BC-150.30.30:
    name: Asesoría en operaciones comerciales
    description: |
      Apoyo jurídico en acuerdos comerciales, asociaciones y licencias.
  BC-150.30.40:
    name: Asesoría jurídica en valores y mercados de capitales
    description: |
      Derecho de valores, cotización y operaciones en mercados de capitales.
  BC-150.40:
    name: Asuntos jurídicos regulatorios
    description: |
      Interpretación jurídica de normativas y relación con el regulador.
  BC-150.40.10:
    name: Interpretación jurídica de la normativa
    description: |
      Opiniones jurídicas sobre la aplicabilidad e interpretación de las regulaciones.
  BC-150.40.20:
    name: Enlace y presentaciones ante el regulador
    description: |
      Apoyo jurídico en las interacciones con el regulador y las presentaciones formales.
  BC-150.40.30:
    name: Apoyo jurídico en asuntos gubernamentales y públicos
    description: |
      Apoyo jurídico en actividades de lobbying, consultas públicas y defensa de políticas.
  BC-150.50:
    name: Gestión de operaciones jurídicas
    description: |
      Operaciones del departamento jurídico, facturación electrónica y gestión de asuntos.
  BC-150.50.10:
    name: Gestión de asuntos jurídicos
    description: |
      Recepción, asignación y seguimiento del ciclo de vida de los asuntos.
  BC-150.50.20:
    name: Gestión de asesoramiento externo
    description: |
      Gestión del panel, contratación y desempeño de los abogados externos.
  BC-150.50.30:
    name: Gasto jurídico y facturación electrónica
    description: |
      Presupuesto jurídico, facturación electrónica y análisis del gasto.
  BC-150.50.40:
    name: Gestión del conocimiento jurídico
    description: |
      Precedentes, know-how y habilitación mediante tecnología jurídica.

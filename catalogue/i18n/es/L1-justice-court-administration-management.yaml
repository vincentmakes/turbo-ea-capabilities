locale: es
source: L1-justice-court-administration-management.yaml
entries:
  BC-3320:
    name: Gestión de justicia y administración judicial
    description: |
      Administración de los juzgados y tribunales, incluida la presentación de demandas, la
      gestión de la agenda y la programación, las operaciones de vistas y juicios, la ejecución
      de sentencias y resoluciones, las instituciones penitenciarias, la libertad condicional
      y vigilada, y el acceso a los registros judiciales.
  BC-3320.10:
    name: Presentación e inicio de causas
    description: |
      Presentación de causas civiles, penales, de familia y administrativas, incluida la
      tramitación electrónica, la evaluación de tasas judiciales y la clasificación inicial.
    in_scope:
      - Presentación de causas civiles y penales
      - Tramitación electrónica e ingreso de documentos
      - Evaluación de tasas judiciales
    out_of_scope:
      - Resolución de impugnaciones de licitación en contratación (cubierto por Gestión de contratación pública)
  BC-3320.10.10:
    name: Inicio de la causa
    description: |
      Recepción de demandas, cargos y documentos originadores para iniciar las causas.
  BC-3320.10.20:
    name: Tramitación electrónica judicial
    description: |
      Presentación electrónica de documentos judiciales por las partes y sus representantes.
  BC-3320.10.30:
    name: Clasificación y numeración de causas
    description: |
      Clasificación de las causas por tipo, sección y asignación de los números de expediente.
  BC-3320.10.40:
    name: Evaluación de tasas judiciales
    description: |
      Evaluación, cobro y exención de las tasas judiciales de presentación y solicitudes.
  BC-3320.20:
    name: Gestión de la agenda y la programación judicial
    description: |
      Mantenimiento de la agenda del tribunal, la calendarización y la asignación judicial de
      las causas, vistas y juicios.
  BC-3320.20.10:
    name: Mantenimiento de la agenda
    description: |
      Mantenimiento de las agendas de la sala y de las secciones y la cronología de los
      eventos de cada causa.
  BC-3320.20.20:
    name: Programación de vistas y juicios
    description: |
      Programación de vistas, juicios y calendarios de resoluciones entre salas y magistrados.
  BC-3320.20.30:
    name: Asignación judicial
    description: |
      Asignación de las causas a los magistrados y rotación entre las secciones.
  BC-3320.20.40:
    name: Gestión de aplazamientos y postergaciones
    description: |
      Gestión de las solicitudes de aplazamiento y postergación y la reprogramación de las
      actuaciones.
  BC-3320.30:
    name: Operaciones de vistas y juicios
    description: |
      Apoyo operativo a las vistas y los juicios, incluida la gestión del jurado, la logística
      de la sala y la interpretación.
  BC-3320.30.10:
    name: Gestión del jurado
    description: |
      Citación, habilitación, selección y administración del servicio de los miembros del jurado.
  BC-3320.30.20:
    name: Operaciones en sala
    description: |
      Logística de la sala, coordinación de seguridad y grabación de audio y vídeo.
  BC-3320.30.30:
    name: Servicios de interpretación judicial
    description: |
      Prestación de servicios de interpretación y traducción judiciales.
  BC-3320.30.40:
    name: Apoyo a testigos y víctimas
    description: |
      Servicios de apoyo a testigos y víctimas y coordinación de medidas especiales de
      protección.
  BC-3320.40:
    name: Ejecución de sentencias y resoluciones
    description: |
      Registro de sentencias y condenas, multas y reparaciones, y ejecución de las resoluciones
      judiciales.
  BC-3320.40.10:
    name: Registro de sentencias y condenas
    description: |
      Registro de las sentencias, las condenas y las resoluciones dispositivas.
  BC-3320.40.20:
    name: Administración de multas y reparaciones
    description: |
      Administración de las multas, las órdenes de reparación y la indemnización a las víctimas.
  BC-3320.40.30:
    name: Ejecución de sentencias civiles
    description: |
      Ejecución de las sentencias civiles mediante mandamientos, embargos e incautaciones.
  BC-3320.40.40:
    name: Expedición de órdenes judiciales
    description: |
      Expedición de órdenes de detención, órdenes de comparecencia y mandamientos de
      registro con autorización judicial.
  BC-3320.50:
    name: Administración de instituciones penitenciarias y custodia
    description: |
      Administración de la custodia de los detenidos en prisión preventiva y los penados en
      centros de detención y establecimientos penitenciarios.
  BC-3320.50.10:
    name: Ingreso y registro de internos
    description: |
      Ingreso, registro y clasificación por nivel de riesgo de los internos que ingresan en
      custodia.
  BC-3320.50.20:
    name: Operaciones de custodia
    description: |
      Operaciones cotidianas de custodia, incluida la gestión de la población interna y los
      traslados.
  BC-3320.50.30:
    name: Coordinación de asistencia sanitaria a internos
    description: |
      Coordinación de los servicios sanitarios, de salud mental y de tratamiento de adicciones
      para internos.
  BC-3320.50.40:
    name: Programas de rehabilitación para internos
    description: |
      Administración de programas educativos, de formación profesional y de rehabilitación
      en régimen de internamiento.
  BC-3320.60:
    name: Gestión de la libertad condicional y vigilada
    description: |
      Supervisión en la comunidad de los delincuentes en libertad condicional, en régimen de
      vigilancia y en libertad condicionada.
  BC-3320.60.10:
    name: Investigación previa a la sentencia
    description: |
      Informes de investigación previos a la sentencia y evaluaciones de riesgo y necesidades
      para el tribunal.
  BC-3320.60.20:
    name: Supervisión en la comunidad
    description: |
      Supervisión cotidiana de los delincuentes en la comunidad.
  BC-3320.60.30:
    name: Administración de vistas de libertad condicional
    description: |
      Administración de las vistas de la junta de libertad condicional y las resoluciones de
      libertad condicionada.
  BC-3320.60.40:
    name: Gestión de incumplimientos y revocaciones
    description: |
      Gestión de los incumplimientos de la supervisión y los procedimientos de revocación.
  BC-3320.70:
    name: Registros judiciales y acceso público
    description: |
      Mantenimiento de los registros judiciales y concesión del acceso público sujeto al
      sellado, la redacción y las restricciones legales.
  BC-3320.70.10:
    name: Mantenimiento de registros judiciales
    description: |
      Mantenimiento de los registros judiciales y los expedientes de las causas.
  BC-3320.70.20:
    name: Acceso público y servicios equivalentes a PACER
    description: |
      Prestación del acceso público a los registros judiciales mediante servicios equivalentes
      a PACER.
  BC-3320.70.30:
    name: Sellado y cancelación de antecedentes
    description: |
      Tramitación de las órdenes de sellado, cancelación y supresión de antecedentes.

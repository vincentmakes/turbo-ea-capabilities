locale: es
source: L1-farm-land-asset-management.yaml
entries:
  BC-3540:
    name: Gestión de activos de granja y tierra
    description: |
      Registros de tenencia y arrendamiento de tierras, gestión de campos y parcelas, telemetría de equipos y maquinaria en la granja, infraestructura de riego, edificaciones agrícolas y activos energéticos en la granja.
  BC-3540.10:
    name: Gestión de tenencia y arrendamiento de tierras
    description: |
      Registros de título de tierra, tenencia, arrendamientos y servidumbres que respaldan los derechos de explotación en todo el portafolio de la granja.
    in_scope:
      - Registros de título y tenencia
      - Administración de contratos de arrendamiento
      - Registros de servidumbre y derechos de acceso
    out_of_scope:
      - Bienes raíces corporativos (BC-1410)
  BC-3540.10.10:
    name: Registros de título y tenencia de la tierra
    description: |
      Registros de tenencia en plena propiedad, arrendamiento y tenencia consuetudinaria en todo el portafolio de la granja.
  BC-3540.10.20:
    name: Administración de contratos de arrendamiento
    description: |
      Administración de contratos de arrendamiento agrícola y renovaciones.
  BC-3540.10.30:
    name: Gestión de servidumbres de la tierra
    description: |
      Gestión de servidumbres de acceso, derechos de paso y servidumbres de conservación.
  BC-3540.20:
    name: Gestión de campos y parcelas
    description: |
      Registros de linderos de campos, historial de campos y zonificación de productividad a nivel de campo y parcela.
  BC-3540.20.10:
    name: Registro de linderos de campos
    description: |
      Captura y mantenimiento de los linderos de campos en sistemas SIG de la granja.
  BC-3540.20.20:
    name: Registros de historial de campos
    description: |
      Registros de historial plurianual de cultivos, insumos y rendimientos por campo.
  BC-3540.20.30:
    name: Zonificación de productividad de campos
    description: |
      Zonificación de productividad y delimitación de zonas de manejo dentro de los campos.
  BC-3540.30:
    name: Gestión de equipos de la granja
    description: |
      Inventario de equipos en la granja, operaciones de maquinaria, telemetría ISOBUS y acuerdos de compartición de equipos.
  BC-3540.30.10:
    name: Inventario de equipos de la granja
    description: |
      Inventario de tractores, implementos y equipos autopropulsados.
  BC-3540.30.20:
    name: Operaciones de maquinaria en campo
    description: |
      Despliegue diario de maquinaria en campo y asignación de operadores.
  BC-3540.30.30:
    name: Integración de telemetría ISOBUS
    description: |
      Integración de la telemetría de maquinaria compatible con ISOBUS con los sistemas de gestión de la granja.
  BC-3540.30.40:
    name: Compartición de equipos y contratación
    description: |
      Acuerdos de compartición de equipos, contratistas y operadores de servicios personalizados.
  BC-3540.40:
    name: Gestión de infraestructura de riego
    description: |
      Gestión del ciclo de vida de los sistemas de riego, asignaciones de agua y mantenimiento de la infraestructura de riego.
  BC-3540.40.10:
    name: Diseño del sistema de riego
    description: |
      Diseño y dimensionamiento de la capacidad de los sistemas de riego de la granja.
  BC-3540.40.20:
    name: Cumplimiento de asignaciones de agua
    description: |
      Cumplimiento de las asignaciones de aguas superficiales y subterráneas y la medición.
  BC-3540.40.30:
    name: Mantenimiento de la infraestructura de riego
    description: |
      Mantenimiento de bombas, tuberías principales, laterales y emisores.
  BC-3540.50:
    name: Gestión de edificios y patios de la granja
    description: |
      Operación y mantenimiento de edificios de almacenamiento, alojamiento para el ganado, patios y caminos de la granja.
  BC-3540.50.10:
    name: Operaciones de edificios de almacenamiento
    description: |
      Operación de edificios de almacenamiento de grano, heno y productos químicos.
  BC-3540.50.20:
    name: Operaciones de alojamiento para el ganado
    description: |
      Operación y gestión de la cama en los alojamientos para el ganado.
  BC-3540.50.30:
    name: Mantenimiento de patios y caminos
    description: |
      Mantenimiento de patios, caminos e instalaciones de manejo de ganado de la granja.
  BC-3540.60:
    name: Gestión de energía en la granja
    description: |
      Generación de energía en la granja, coordinación de la adquisición de combustible y energía, y registro del uso de energía.
  BC-3540.60.10:
    name: Generación de energía en la granja
    description: |
      Generación de energía solar, eólica y biogás en la granja.
  BC-3540.60.20:
    name: Coordinación de la adquisición de combustible y energía
    description: |
      Coordinación de la adquisición de combustible, electricidad y gas de la granja.
  BC-3540.60.30:
    name: Registro del uso de energía
    description: |
      Registro del uso de energía de la granja por actividad y activo.

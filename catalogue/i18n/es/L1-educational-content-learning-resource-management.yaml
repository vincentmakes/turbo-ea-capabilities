locale: es
source: L1-educational-content-learning-resource-management.yaml
entries:
  BC-4790:
    name: Gestión de contenidos educativos y recursos de aprendizaje
    description: |
      Elaboración, catalogación, licenciamiento y distribución de los contenidos
      educativos y recursos de aprendizaje utilizados en la docencia, incluyendo
      materiales del curso, objetos digitales de aprendizaje, recursos educativos
      abiertos, colecciones de biblioteca y libros de texto.
  BC-4790.10:
    name: Elaboración y producción de materiales del curso
    description: |
      Diseño instruccional y producción de materiales del curso, incluyendo
      contenido multimedia y compilación de paquetes de curso.
    in_scope:
      - Diseño instruccional
      - Producción de contenido multimedia
      - Compilación de paquetes de curso
    out_of_scope:
      - Impartición docente (cubierta en Gestión de operaciones de enseñanza y aprendizaje)
  BC-4790.10.10:
    name: Diseño instruccional
    description: |
      Diseño instruccional de cursos, módulos y experiencias de aprendizaje.
  BC-4790.10.20:
    name: Producción de contenido multimedia
    description: |
      Producción de contenido de aprendizaje en vídeo, audio e interactivo multimedia.
  BC-4790.10.30:
    name: Compilación de paquetes de curso
    description: |
      Compilación de paquetes de curso y conjuntos de aprendizaje para su distribución.
  BC-4790.20:
    name: Catálogo de objetos digitales de aprendizaje
    description: |
      Catalogación, control de versiones y reutilización de objetos digitales de
      aprendizaje en programas y modalidades.
    in_scope:
      - Catalogación y metadatos de objetos de aprendizaje
      - Control de versiones de objetos de aprendizaje
      - Descubrimiento y reutilización de objetos reutilizables
    out_of_scope:
      - Distribución operativa por el SGA (cubierta en Gestión de operaciones de enseñanza y aprendizaje)
  BC-4790.20.10:
    name: Catalogación y metadatos de objetos de aprendizaje
    description: |
      Catalogación de objetos de aprendizaje y metadatos conforme a estándares
      de interoperabilidad.
  BC-4790.20.20:
    name: Control de versiones de objetos de aprendizaje
    description: |
      Control de versiones y gestión del ciclo de vida de los objetos de aprendizaje.
  BC-4790.20.30:
    name: Descubrimiento y reutilización de objetos reutilizables
    description: |
      Descubrimiento y reutilización de objetos de aprendizaje en cursos y disciplinas.
  BC-4790.30:
    name: Gestión de recursos educativos abiertos
    description: |
      Búsqueda, licenciamiento y contribución de recursos educativos abiertos (REA)
      utilizados en la docencia.
    in_scope:
      - Búsqueda y curación de REA
      - Cumplimiento de las licencias de los REA
      - Contribución y difusión de REA
    out_of_scope:
      - Adquisición de libros de texto comerciales (cubierta en Adquisición de libros de texto y materiales del curso)
  BC-4790.30.10:
    name: Búsqueda y curación de REA
    description: |
      Búsqueda y curación de recursos educativos abiertos para uso institucional.
  BC-4790.30.20:
    name: Cumplimiento de las licencias de los REA
    description: |
      Cumplimiento de las licencias de los REA (p. ej., Creative Commons) en el uso
      y la reutilización.
  BC-4790.30.30:
    name: Contribución y difusión de REA
    description: |
      Contribución de los contenidos elaborados por la institución al ecosistema
      de REA.
  BC-4790.40:
    name: Operaciones de biblioteca y recursos de información
    description: |
      Desarrollo de la colección bibliográfica, gestión de las listas de lecturas
      y apoyo a la alfabetización informacional en la docencia y la investigación.
    in_scope:
      - Desarrollo de la colección
      - Gestión de listas de lecturas y reservas
      - Apoyo a la alfabetización informacional
    out_of_scope:
      - Operaciones de bibliotecas públicas no vinculadas a la educación
  BC-4790.40.10:
    name: Desarrollo de la colección
    description: |
      Desarrollo de las colecciones impresas y electrónicas de la biblioteca.
  BC-4790.40.20:
    name: Gestión de listas de lecturas y reservas
    description: |
      Gestión de las listas de lecturas obligatorias y las colecciones en reserva.
  BC-4790.40.30:
    name: Apoyo a la alfabetización informacional
    description: |
      Apoyo e instrucción en alfabetización informacional y habilidades de
      investigación.
  BC-4790.50:
    name: Licenciamiento de contenidos y gestión de derechos
    description: |
      Licenciamiento, autorización de derechos de autor y gestión de las excepciones
      educativas para el uso de contenidos de terceros en la docencia.
    in_scope:
      - Licenciamiento de contenidos educativos
      - Autorización de derechos de autor
      - Gestión de uso justo y excepciones educativas
    out_of_scope:
      - Propiedad intelectual institucional (cubierta en Gestión de propiedad intelectual transversal)
  BC-4790.50.10:
    name: Licenciamiento de contenidos educativos
    description: |
      Licenciamiento de contenidos de terceros para uso educativo.
  BC-4790.50.20:
    name: Autorización de derechos de autor
    description: |
      Autorización de los derechos de autor de los contenidos utilizados en la
      docencia y la evaluación.
  BC-4790.50.30:
    name: Gestión de uso justo y excepciones educativas
    description: |
      Gestión del uso justo, el trato equitativo y las excepciones de derechos de
      autor educativos.
  BC-4790.60:
    name: Adquisición de libros de texto y materiales del curso
    description: |
      Especificación y adquisición de libros de texto y materiales del curso,
      incluyendo programas de materiales asequibles.
    in_scope:
      - Especificación de lecturas obligatorias
      - Adquisición de libros de texto
      - Programas de materiales asequibles (p. ej., acceso inclusivo)
    out_of_scope:
      - Adquisiciones en general (cubiertas en Gestión de compras transversal)
  BC-4790.60.10:
    name: Especificación de lecturas obligatorias
    description: |
      Especificación de las lecturas obligatorias y recomendadas para los cursos.
  BC-4790.60.20:
    name: Adquisición de libros de texto
    description: |
      Adquisición de libros de texto y materiales del curso.
  BC-4790.60.30:
    name: Programa de materiales asequibles
    description: |
      Operación de programas de materiales asequibles y acceso inclusivo.

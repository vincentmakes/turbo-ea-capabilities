locale: es
source: L1-refining-operations-management.yaml
entries:
  BC-3080:
    name: Gestión de operaciones de refinación
    description: |
      Operación de refinerías de petróleo crudo: destilación, conversión,
      tratamiento, mezcla, economía de la refinería, gestión de catalizadores
      y coordinación de paradas de mantenimiento.
  BC-3080.10:
    name: Operaciones de destilación de crudo
    description: |
      Operación de unidades de destilación atmosférica y al vacío de
      crudo, y transiciones de dieta de crudo.
  BC-3080.10.10:
    name: Operaciones de destilación atmosférica
    description: |
      Operación de columnas de destilación atmosférica de crudo y
      trenes de pre-flash.
  BC-3080.10.20:
    name: Operaciones de destilación al vacío
    description: |
      Operación de columnas de destilación al vacío y sistemas de cabeza.
  BC-3080.10.30:
    name: Cambio de dieta de crudo
    description: |
      Gestión operativa de los cambios en la composición del crudo y
      las transiciones de dieta.
  BC-3080.20:
    name: Operaciones de unidades de conversión
    description: |
      Operación de unidades de conversión por craqueo catalítico, hidrocraqueo,
      coquización y reformado.
  BC-3080.20.10:
    name: Operaciones de craqueo catalítico fluidizado
    description: |
      Operación de las unidades de craqueo catalítico fluidizado (FCC)
      y regeneradores.
  BC-3080.20.20:
    name: Operaciones de hidrocraqueo
    description: |
      Operación de hidrocraqueadores de una y dos etapas.
  BC-3080.20.30:
    name: Operaciones de coquización
    description: |
      Operación de unidades de coque retardado, fluido y flexicoque.
  BC-3080.20.40:
    name: Operaciones de reformado
    description: |
      Operación de reformadores catalíticos para la producción de octano
      y aromáticos.
  BC-3080.30:
    name: Operaciones de tratamiento e hidroprocesamiento
    description: |
      Operación de hidrotratadoras, recuperación de azufre y unidades
      de endulzamiento de productos.
  BC-3080.30.10:
    name: Operaciones de hidrotratamiento
    description: |
      Operación de hidrotratadoras de nafta, destilados y gasóleo.
  BC-3080.30.20:
    name: Operaciones de recuperación de azufre y gas de cola
    description: |
      Operación de unidades de recuperación de azufre y tratamiento de
      gas de cola.
  BC-3080.30.30:
    name: Operaciones de endulzamiento
    description: |
      Operación de endulzamiento de productos con cáustico y adsorbentes.
  BC-3080.40:
    name: Operaciones de mezcla de productos
    description: |
      Mezcla en línea y en tanque de productos terminados a especificación.
  BC-3080.40.10:
    name: Mezcla de gasolina
    description: |
      Mezcla multicomponente de gasolina según las especificaciones de grado.
  BC-3080.40.20:
    name: Mezcla de destilados
    description: |
      Mezcla de diésel y queroseno, incluyendo la incorporación de biocombustibles.
  BC-3080.40.30:
    name: Mezcla de combustible de barcos
    description: |
      Mezcla de combustible marino para barcos conforme a las
      especificaciones ISO 8217.
  BC-3080.40.40:
    name: Mezcla con cumplimiento de especificaciones
    description: |
      Optimización de especificaciones en tiempo real y emisión de
      certificados de calidad.
  BC-3080.50:
    name: Planificación y economía de la refinería
    description: |
      Selección de crudo, optimización del margen y reporte de rendimientos
      de la refinería mediante programación lineal.
  BC-3080.50.10:
    name: Modelado de programación lineal
    description: |
      Mantenimiento y ejecución de modelos LP de la refinería para el
      plan y la economía.
  BC-3080.50.20:
    name: Economía de la selección de crudo
    description: |
      Evaluación económica de candidatos a compra de crudo y opciones
      de dieta.
  BC-3080.50.30:
    name: Optimización del margen
    description: |
      Optimización del margen operativo a corto plazo y replaneación.
  BC-3080.50.40:
    name: Reporte de rendimientos de la refinería
    description: |
      Reporte de los rendimientos reales frente al plan y al punto
      de referencia.
  BC-3080.60:
    name: Gestión de catalizadores y productos químicos de la refinería
    description: |
      Gestión del ciclo de vida de los catalizadores de proceso y del
      inventario de productos químicos de la refinería.
  BC-3080.60.10:
    name: Gestión del ciclo de vida del catalizador
    description: |
      Planificación de la carga de catalizadores, vigilancia en servicio
      y reemplazo.
  BC-3080.60.20:
    name: Coordinación de la regeneración del catalizador
    description: |
      Coordinación de campañas de regeneración in situ y ex situ
      del catalizador.
  BC-3080.60.30:
    name: Gestión del inventario de productos químicos de la refinería
    description: |
      Gestión del inventario y consumo de productos químicos de proceso.
  BC-3080.70:
    name: Coordinación de paradas y mantenimiento mayor
    description: |
      Coordinación del alcance, cronograma y ejecución de las grandes
      paradas de mantenimiento de la refinería.
  BC-3080.70.10:
    name: Gestión del alcance de la parada
    description: |
      Definición y congelamiento del alcance de la parada, incluyendo
      el proceso de impugnación.
  BC-3080.70.20:
    name: Gestión del cronograma de la parada
    description: |
      Programación detallada y control del avance de la parada.
  BC-3080.70.30:
    name: Coordinación del apagado y reinicio
    description: |
      Coordinación secuenciada del apagado de unidades, descontaminación
      y reinicio.

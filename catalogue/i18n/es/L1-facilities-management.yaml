locale: es
source: L1-facilities-management.yaml
entries:
  BC-700:
    name: Gestión de instalaciones
    description: |
      Servicios de edificios, lugar de trabajo y servicios generales blandos y duros para garantizar entornos de trabajo seguros, funcionales y eficientes.
  BC-700.10:
    name: Gestión de servicios en el lugar de trabajo
    description: |
      Recepción, correo y servicios de experiencia en el lugar de trabajo para los empleados y visitantes.
  BC-700.10.10:
    name: Recepción y gestión de visitas
    description: |
      Prerregistro de visitantes, recepción y control de acceso.
  BC-700.10.20:
    name: Servicios de correo y distribución
    description: |
      Correo entrante y saliente, paquetería y distribución interna.
  BC-700.10.30:
    name: Conserjería y mesa de ayuda del lugar de trabajo
    description: |
      Conserjería, mesa de ayuda y gestión de solicitudes de servicio en el lugar de trabajo.
  BC-700.10.40:
    name: Servicios de salas de reuniones y eventos
    description: |
      Reserva de salas de reuniones, configuración audiovisual y apoyo a eventos.
  BC-700.20:
    name: Gestión de instalaciones duras
    description: |
      Sistemas del edificio: climatización, electricidad, fontanería y estructura para garantizar la operatividad de los inmuebles.
  BC-700.20.10:
    name: Operaciones de sistemas de climatización
    description: |
      Operación y mantenimiento de los sistemas de calefacción, ventilación y aire acondicionado.
  BC-700.20.20:
    name: Operaciones de sistemas eléctricos
    description: |
      Operación y mantenimiento de los sistemas eléctricos del edificio.
  BC-700.20.30:
    name: Operaciones mecánicas y de fontanería
    description: |
      Operaciones de sistemas mecánicos, fontanería e instalaciones de agua.
  BC-700.20.40:
    name: Mantenimiento de la estructura del edificio
    description: |
      Mantenimiento de la estructura, cerramientos y envolvente del edificio.
  BC-700.20.50:
    name: Gestión energética del edificio
    description: |
      Monitorización y optimización del consumo energético del edificio.
  BC-700.30:
    name: Gestión de instalaciones blandas
    description: |
      Limpieza, restauración, vigilancia y jardinería para mantener un entorno de trabajo agradable y seguro.
  BC-700.30.10:
    name: Servicios de limpieza
    description: |
      Limpieza diaria, limpieza a fondo y servicios de higiene.
  BC-700.30.20:
    name: Servicios de restauración y alimentación
    description: |
      Servicios de restauración corporativa, vending y hospitalidad en el lugar de trabajo.
  BC-700.30.30:
    name: Operaciones de seguridad física
    description: |
      Vigilancia, rondas, CCTV y operaciones de control de acceso.
  BC-700.30.40:
    name: Jardinería y zonas exteriores
    description: |
      Mantenimiento de jardines, paisajismo y zonas exteriores.
  BC-700.30.50:
    name: Servicios de gestión de residuos
    description: |
      Recogida, segregación y reciclaje de residuos en los centros de trabajo.
  BC-700.40:
    name: Gestión del espacio
    description: |
      Planificación del espacio, gestión de la ocupación y gestión de traslados para optimizar el uso de los inmuebles.
  BC-700.40.10:
    name: Planificación del espacio
    description: |
      Planificación, asignación y estratificación del espacio de trabajo.
  BC-700.40.20:
    name: Monitorización de la ocupación
    description: |
      Sensores de ocupación, analítica de utilización y previsión.
  BC-700.40.30:
    name: Gestión de traslados
    description: |
      Planificación y ejecución de traslados, incorporaciones y cambios.
  BC-700.40.40:
    name: Reserva de puestos y trabajo flexible
    description: |
      Plataformas de reserva de puestos y operaciones de trabajo híbrido.
  BC-700.50:
    name: Gestión de salud y seguridad en instalaciones
    description: |
      Seguridad del edificio, sistemas contra incendios y de emergencia para cumplir con las obligaciones legales y proteger a las personas.
  BC-700.50.10:
    name: Gestión de la seguridad contra incendios
    description: |
      Detección de incendios, sistemas de extinción y simulacros de evacuación.
  BC-700.50.20:
    name: Coordinación de la respuesta ante emergencias
    description: |
      Respuesta ante emergencias en el centro de trabajo y coordinación de primeros auxilios.
  BC-700.50.30:
    name: Gestión de permisos de trabajo
    description: |
      Gobierno de permisos de trabajo para tareas peligrosas en instalaciones.
  BC-700.50.40:
    name: Cumplimiento normativo del edificio
    description: |
      Inspecciones periódicas y certificaciones para la seguridad del edificio.

locale: es
source: L1-air-traffic-flow-management.yaml
entries:
  BC-1220:
    name: Gestión del flujo de tránsito aéreo
    description: |
      Planificación de capacidad, regulación del flujo, asignación de franjas horarias y equilibrio entre demanda y capacidad.
  BC-1220.10:
    name: Gestión de planificación de capacidad
    description: |
      Evaluación de la capacidad de sectores y aeródromos, y establecimiento de la capacidad declarada.
  BC-1220.10.10:
    name: Evaluación de capacidad de sectores
    description: |
      Evaluación de la capacidad del sector mediante medición de la carga de trabajo.
  BC-1220.10.20:
    name: Declaración de capacidad de aeródromo
    description: |
      Declaración de la capacidad de pista y plataforma del aeródromo.
  BC-1220.10.30:
    name: Planificación estratégica de capacidad
    description: |
      Planificación estratégica plurianual de la capacidad ATC.
  BC-1220.20:
    name: Gestión de la regulación del flujo
    description: |
      Medidas de flujo de tráfico, regulaciones y reencaminamientos.
  BC-1220.20.10:
    name: Definición de medidas de flujo
    description: |
      Definición de medidas ATFCM por sector y aeródromo.
  BC-1220.20.20:
    name: Gestión de propuestas de reencaminamiento
    description: |
      Propuesta e implementación de reencaminamientos y escenarios.
  BC-1220.20.30:
    name: Ajuste táctico del flujo
    description: |
      Ajuste táctico de medidas de flujo en tiempo real.
  BC-1220.30:
    name: Gestión de asignación de franjas horarias
    description: |
      Tiempos calculados de despegue (CTOT), gestión de franjas y permutas de franjas.
  BC-1220.30.10:
    name: Emisión de tiempos calculados de despegue
    description: |
      Cálculo y emisión de CTOT a los usuarios del espacio aéreo.
  BC-1220.30.20:
    name: Permuta y mejora de franjas horarias
    description: |
      Permuta de franjas, mejora de franjas y actualización de tiempos objetivo.
  BC-1220.30.30:
    name: Cumplimiento de franjas de salida
    description: |
      Seguimiento del cumplimiento de franjas y gestión de exenciones.
  BC-1220.40:
    name: Gestión del rendimiento de la red
    description: |
      Seguimiento del rendimiento de la red e informes de KPI.
  BC-1220.40.10:
    name: Seguimiento de KPI de red
    description: |
      Seguimiento de los KPI de red (demora, capacidad, predictibilidad).
  BC-1220.40.20:
    name: Informes de rendimiento
    description: |
      Informes de rendimiento para reguladores de red y del Cielo Único Europeo.
  BC-1220.40.30:
    name: Análisis post-operacional
    description: |
      Análisis post-operacional de flujos y cuellos de botella.
  BC-1220.50:
    name: Gestión del equilibrio demanda-capacidad
    description: |
      Equilibrio demanda-capacidad pre-táctico y táctico.
  BC-1220.50.10:
    name: Equilibrio estratégico demanda-capacidad
    description: |
      Equilibrio demanda-capacidad a largo plazo en toda la red.
  BC-1220.50.20:
    name: Equilibrio pre-táctico demanda-capacidad
    description: |
      Equilibrio demanda-capacidad pre-táctico (D-1).
  BC-1220.50.30:
    name: Equilibrio táctico demanda-capacidad
    description: |
      Equilibrio demanda-capacidad táctico en tiempo real.
  BC-1220.50.40:
    name: Toma de decisiones colaborativa
    description: |
      Toma de decisiones colaborativa con usuarios del espacio aéreo y aeropuertos.

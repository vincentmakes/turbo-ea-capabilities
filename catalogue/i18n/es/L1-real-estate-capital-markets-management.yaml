locale: es
source: L1-real-estate-capital-markets-management.yaml
entries:
  BC-4980:
    name: Gestión de los mercados de capitales inmobiliarios
    description: |
      Disciplina específica de mercados de capitales de deuda y capital para el sector inmobiliario — originación de deuda senior, mezzanine, de construcción y puente; servicio y gestión de préstamos; estructuración de CMBS y CRE CLO; programas de capital de empresas conjuntas; captación de capital público de REITs; refinanciación y recapitalización; y gestión del riesgo de la cartera de préstamos CRE. Distinta del crédito bancario genérico (BC-1320) y la tesorería corporativa (BC-210) — anclada en las convenciones de garantías RE, el reporting IRP y los convenios DSCR/LTV.
    in_scope:
      - Originación de préstamos senior, mezzanine, de construcción y puente
      - Alta de préstamos, seguimiento de convenios, modificaciones y servicio especial
      - Agregación, estructuración de CMBS y CRE CLO e informes IRP
      - Búsqueda de capital de JV, estructuración de promote y waterfall, reporting a socios
      - Emisión pública/privada de capital y deuda de REITs, programas ATM y política de dividendos
      - Ejecución de refinanciaciones y recapitalizaciones
      - Concentración, pruebas de resistencia y reservas de la cartera de préstamos CRE
    out_of_scope:
      - Crédito y préstamo bancario genérico (BC-1320)
      - Negociación genérica en mercados de capitales (BC-1370)
      - Constitución de fondos y captación de capital de socios limitados (BC-4910)
      - Ejecución de transacciones de adquisición (BC-4930)
  BC-4980.10:
    name: Originación de deuda inmobiliaria
    description: |
      Originación de deuda inmobiliaria senior, mezzanine, de construcción y puente frente al análisis previo del activo y del promotor.
  BC-4980.10.10:
    name: Originación de hipoteca senior
    description: |
      Originación de préstamos hipotecarios senior sobre activos en explotación.
  BC-4980.10.20:
    name: Originación de préstamos de construcción y puente
    description: |
      Originación de préstamos de construcción y puente para activos en desarrollo y en transición.
  BC-4980.10.30:
    name: Originación de deuda mezzanine y capital preferente
    description: |
      Originación de deuda mezzanine y capital preferente en la estructura de capital.
  BC-4980.10.40:
    name: Negociación de la hoja de condiciones y el compromiso
    description: |
      Negociación de hojas de condiciones y cartas de compromiso con prestatarios y promotores.
  BC-4980.20:
    name: Servicio y gestión de deuda inmobiliaria
    description: |
      Alta y servicio de préstamos CRE, y seguimiento proactivo, modificaciones y workout cuando sea necesario.
  BC-4980.20.10:
    name: Alta del préstamo y configuración del servicio
    description: |
      Alta de nuevos préstamos CRE en la plataforma de servicio y configuración de los flujos de pagos y reporting.
  BC-4980.20.20:
    name: Seguimiento de convenios y DSCR
    description: |
      Seguimiento continuo de los convenios del préstamo, el DSCR y el LTV frente a los disparadores del contrato de préstamo.
  BC-4980.20.30:
    name: Modificación y workout del préstamo
    description: |
      Negociación de las modificaciones y el workout de préstamos sobre activos con dificultades.
  BC-4980.20.40:
    name: Coordinación del servicio especial
    description: |
      Coordinación con los servicers especiales sobre préstamos en default y próximos al default en titulizaciones.
  BC-4980.30:
    name: Gestión de CMBS y titulizaciones
    description: |
      Agregación de carteras de préstamos, estructuración de operaciones CMBS y CRE CLO, e informes IRP periódicos a los inversores.
  BC-4980.30.10:
    name: Agregación de carteras de préstamos
    description: |
      Agregación de carteras de préstamos elegibles para titulización.
  BC-4980.30.20:
    name: Estructuración de titulizaciones
    description: |
      Estructuración de operaciones CMBS y CRE CLO, incluyendo tranching y calificaciones.
  BC-4980.30.30:
    name: Reporting IRP a inversores
    description: |
      Reporting a inversores bajo el Paquete de Información al Inversor de CREFC (IRP).
  BC-4980.30.40:
    name: Coordinación con fiduciario y servicer
    description: |
      Coordinación con fiduciarios, master servicers y agencias de calificación sobre operaciones vigentes.
  BC-4980.40:
    name: Gestión de empresas conjuntas y socios de capital
    description: |
      Búsqueda de capital de empresa conjunta, estructuración de los términos de promote y waterfall, y reporting y distribuciones periódicas a los socios.
  BC-4980.40.10:
    name: Búsqueda de capital de empresa conjunta
    description: |
      Búsqueda de capital de empresa conjunta de socios institucionales y de alto patrimonio.
  BC-4980.40.20:
    name: Estructuración del promote y el waterfall
    description: |
      Estructuración del promote, los hurdles y los waterfalls en los acuerdos de empresa conjunta.
  BC-4980.40.30:
    name: Reporting y distribuciones a socios de empresa conjunta
    description: |
      Reporting a los socios de la empresa conjunta y ejecución de las distribuciones contractuales.
  BC-4980.50:
    name: Gestión de los mercados de capitales de REITs
    description: |
      Emisión de capital y deuda de REITs cotizados y no cotizados, programas ATM y gestión de la política de dividendos.
  BC-4980.50.10:
    name: Emisión de capital público de REITs
    description: |
      Emisión de capital de REITs a través de ampliaciones de capital y colocaciones privadas.
  BC-4980.50.20:
    name: Emisión de deuda y bonos de REITs
    description: |
      Emisión de deuda no garantizada, bonos y notas canjeables de REITs.
  BC-4980.50.30:
    name: Gestión del programa ATM
    description: |
      Gestión de los programas de colocación continua (ATM), incluyendo el ritmo y las divulgaciones.
  BC-4980.50.40:
    name: Gestión de la política de dividendos
    description: |
      Gestión de la política de dividendos del REIT alineada con los requisitos de distribución y el AFFO.
  BC-4980.60:
    name: Gestión de refinanciaciones y recapitalizaciones
    description: |
      Refinanciación y recapitalización proactiva de las estructuras de capital de activos en explotación durante el período de tenencia.
  BC-4980.60.10:
    name: Estrategia y ritmo de refinanciación
    description: |
      Definición de la estrategia de refinanciación y el ritmo de vencimientos en la cartera.
  BC-4980.60.20:
    name: Ejecución de refinanciaciones
    description: |
      Ejecución de operaciones de refinanciación sobre activos individuales y carteras.
  BC-4980.60.30:
    name: Reestructuración de recapitalizaciones
    description: |
      Reestructuración de las estructuras de capital mediante recapitalizaciones con socios o inyecciones de capital.
  BC-4980.70:
    name: Gestión del riesgo de la cartera de préstamos inmobiliarios
    description: |
      Seguimiento de la concentración, pruebas de resistencia, dotación de provisiones y gestión de la lista de vigilancia para las carteras de préstamos CRE.
  BC-4980.70.10:
    name: Seguimiento de la concentración de LTV/DSCR
    description: |
      Seguimiento de la concentración de LTV y DSCR en la cartera de préstamos CRE.
  BC-4980.70.20:
    name: Pruebas de resistencia de préstamos CRE
    description: |
      Pruebas de resistencia de la cartera de préstamos CRE frente a perturbaciones de tipos, desocupación y valor.
  BC-4980.70.30:
    name: Dotación de provisiones CECL/IFRS 9 (CRE)
    description: |
      Dotación de provisiones para la cartera CRE bajo los marcos de pérdida crediticia esperada CECL e IFRS 9.
  BC-4980.70.40:
    name: Lista de vigilancia y seguimiento de impagos
    description: |
      Mantenimiento de la lista de vigilancia y seguimiento de los préstamos en default en la cartera.

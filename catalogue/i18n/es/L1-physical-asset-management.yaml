locale: es
source: L1-physical-asset-management.yaml
entries:
  BC-1040:
    name: Gestión de activos físicos
    description: |
      Gestión del ciclo de vida de plantas, equipos, flotas e infraestructura.
  BC-1040.10:
    name: Gestión de estrategia y ciclo de vida de activos
    description: |
      Estrategia de activos, ciclo de vida y planificación de reemplazo.
  BC-1040.10.10:
    name: Estrategia por clase de activo
    description: |
      Estrategia por clase de activo alineada con la norma ISO 55000.
  BC-1040.10.20:
    name: Planificación del ciclo de vida de activos
    description: |
      Planificación integral de activos a lo largo de las fases de adquisición, operación y disposición.
  BC-1040.10.30:
    name: Planificación de reemplazo de activos
    description: |
      Planificación de reemplazo basada en vida útil esperada y condición.
  BC-1040.10.40:
    name: Planificación de capital de activos
    description: |
      Planificación de capital para inversiones y renovaciones de activos.
  BC-1040.20:
    name: Gestión del desempeño de activos
    description: |
      KPI de activos, disponibilidad y utilización.
  BC-1040.20.10:
    name: Definición de KPI de activos
    description: |
      Definición de KPI de desempeño de activos y objetivos.
  BC-1040.20.20:
    name: Monitoreo de disponibilidad de activos
    description: |
      Monitoreo de la disponibilidad y tiempo operativo de los activos.
  BC-1040.20.30:
    name: Reporte de utilización de activos
    description: |
      Reporte de utilización y desempeño de activos.
  BC-1040.20.40:
    name: Gestión del índice de salud de activos
    description: |
      Índices de salud compuestos y puntuación de condición de activos.
  BC-1040.30:
    name: Gestión de riesgo y criticidad de activos
    description: |
      Clasificación de criticidad y priorización basada en riesgo.
  BC-1040.30.10:
    name: Clasificación de criticidad de activos
    description: |
      Clasificación de criticidad de activos según su impacto.
  BC-1040.30.20:
    name: Evaluación de riesgo de activos
    description: |
      Evaluación de riesgo de activos incluyendo consecuencias de falla.
  BC-1040.30.30:
    name: Priorización de mantenimiento basada en riesgo
    description: |
      Priorización basada en riesgo de acciones de mantenimiento y capital.
  BC-1040.40:
    name: Gestión de información de activos
    description: |
      Datos maestros y documentación técnica de activos.
  BC-1040.40.10:
    name: Gestión de datos maestros de activos
    description: |
      Datos maestros, jerarquías y registros de equipos de activos.
  BC-1040.40.20:
    name: Documentación técnica de activos
    description: |
      Expedientes técnicos, planos y documentación del fabricante original.
  BC-1040.40.30:
    name: Gestión del gemelo digital de activos
    description: |
      Modelos de gemelo digital para operaciones y analítica de activos.
  BC-1040.50:
    name: Gestión de descomisionamiento y disposición de activos
    description: |
      Descomisionamiento, disposición y retiro de activos.
  BC-1040.50.10:
    name: Planificación del descomisionamiento
    description: |
      Planificación del descomisionamiento de activos incluyendo aspectos de HSE.
  BC-1040.50.20:
    name: Ejecución de retiro de activos
    description: |
      Retiro físico y desmantelamiento de activos retirados.
  BC-1040.50.30:
    name: Disposición y reventa de activos
    description: |
      Reventa, desecho y reciclaje de activos retirados.

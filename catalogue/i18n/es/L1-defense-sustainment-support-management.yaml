locale: es
source: L1-defense-sustainment-support-management.yaml
entries:
  BC-1780:
    name: Gestión de sostenimiento y apoyo de defensa
    description: |
      Apoyo en servicio, mantenimiento en depósito, ingeniería RAM, repuestos y reparación, y obsolescencia.
  BC-1780.10:
    name: Gestión del apoyo en servicio
    description: |
      Contratos de apoyo durante toda la vida útil e ingeniería de apoyo.
  BC-1780.10.10:
    name: Operaciones de contratos de apoyo durante toda la vida útil
    description: |
      Operación de contratos de apoyo durante toda la vida útil del sistema.
  BC-1780.10.20:
    name: Ingeniería de apoyo
    description: |
      Apoyo de ingeniería a sistemas de armas desplegados.
  BC-1780.10.30:
    name: Apoyo a la gestión de flota
    description: |
      Apoyo a la gestión de flota, incluido el seguimiento de la configuración.
  BC-1780.20:
    name: Gestión del mantenimiento en depósito
    description: |
      Reparación, revisión general y refabricación a nivel de depósito.
  BC-1780.20.10:
    name: Operaciones de reparación en depósito
    description: |
      Operación de talleres de reparación a nivel de depósito.
  BC-1780.20.20:
    name: Programas de revisión general en depósito
    description: |
      Programas periódicos de revisión general y reacondicionamiento en depósito.
  BC-1780.20.30:
    name: Gestión de la capacidad del depósito
    description: |
      Gestión de la capacidad del depósito y los tiempos de respuesta.
  BC-1780.30:
    name: Gestión de ingeniería RAM
    description: |
      Ingeniería de fiabilidad, disponibilidad y mantenibilidad.
  BC-1780.30.10:
    name: Ingeniería de fiabilidad
    description: |
      Predicción, asignación y crecimiento de la fiabilidad.
  BC-1780.30.20:
    name: Modelado de disponibilidad
    description: |
      Modelado y análisis de la disponibilidad operacional.
  BC-1780.30.30:
    name: Ingeniería de mantenibilidad
    description: |
      Análisis de mantenibilidad e influencia en el diseño.
  BC-1780.30.40:
    name: Análisis de apoyo logístico
    description: |
      Análisis de apoyo logístico conforme a MIL-HDBK-502.
  BC-1780.40:
    name: Gestión de repuestos y reparaciones de defensa
    description: |
      Repuestos, cadenas de reparación y unidades de intercambio.
  BC-1780.40.10:
    name: Aprovisionamiento de repuestos de defensa
    description: |
      Aprovisionamiento de repuestos para sistemas de defensa.
  BC-1780.40.20:
    name: Gestión de la cadena de reparación
    description: |
      Gestión de las cadenas de reparación y devolución.
  BC-1780.40.30:
    name: Operaciones del grupo de unidades de intercambio
    description: |
      Operación de grupos de unidades rotables y de intercambio.
  BC-1780.50:
    name: Gestión de publicaciones técnicas
    description: |
      Órdenes técnicas, IETM, manuales y documentación S1000D.
  BC-1780.50.10:
    name: Documentación técnica S1000D
    description: |
      Elaboración y mantenimiento de publicaciones técnicas en formato S1000D.
  BC-1780.50.20:
    name: Operaciones de manuales técnicos electrónicos interactivos
    description: |
      Operación y actualización de los IETM en el campo.
  BC-1780.50.30:
    name: Gestión de cambios en órdenes técnicas
    description: |
      Gestión de cambios en órdenes técnicas y actualizaciones en campo.
  BC-1780.60:
    name: Gestión de obsolescencia de defensa
    description: |
      DMSMS, previsión de obsolescencia y mitigación.
  BC-1780.60.10:
    name: Monitoreo de DMSMS
    description: |
      Monitoreo de DMSMS de componentes y proveedores.
  BC-1780.60.20:
    name: Previsión de obsolescencia
    description: |
      Previsión de la obsolescencia de piezas y materiales.
  BC-1780.60.30:
    name: Mitigación de la obsolescencia
    description: |
      Estrategias de mitigación que incluyen LTB, rediseño y sustitución.
  BC-1780.60.40:
    name: Mantenimiento del plan de gestión de obsolescencia
    description: |
      Mantenimiento de los planes de gestión de obsolescencia a nivel de programa.

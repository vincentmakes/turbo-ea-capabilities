locale: es
source: L1-electrical-product-catalogue-management.yaml
entries:
  BC-1940:
    name: Gestión del catálogo de productos eléctricos
    description: |
      Estructura de productos comercializables para productos eléctricos — variantes, reglas de
      configurador, SKU jurisdiccionales, incorporación y retirada de productos, fichas técnicas
      y material de marketing.
  BC-1940.10:
    name: Gestión del maestro de productos comercializables
    description: |
      Mantenimiento de registros maestros de productos comercializables y jerarquías de familias.
  BC-1940.10.10:
    name: Gestión de registros de productos comercializables
    description: |
      Creación y mantenimiento de registros maestros de productos comercializables.
  BC-1940.10.20:
    name: Gestión de jerarquía y familia de productos
    description: |
      Definición de estructuras de familia y jerarquía de productos.
  BC-1940.10.30:
    name: Estandarización de atributos de producto
    description: |
      Estandarización de atributos entre familias de productos.
  BC-1940.20:
    name: Gestión de variantes y opciones de producto
    description: |
      Gestión de variantes de tensión, frecuencia, protección, protocolo y accesorios.
  BC-1940.20.10:
    name: Gestión de variantes de tensión y frecuencia
    description: |
      Gestión de variantes de tensión y frecuencia nominales.
  BC-1940.20.20:
    name: Gestión de variantes de protección y carcasa
    description: |
      Gestión de variantes de grado de protección y carcasa.
  BC-1940.20.30:
    name: Gestión de variantes de protocolo de comunicación
    description: |
      Gestión de opciones de protocolo de comunicación en productos conectados.
  BC-1940.20.40:
    name: Gestión de accesorios y opciones
    description: |
      Gestión de definiciones de accesorios y características opcionales.
  BC-1940.30:
    name: Gestión de reglas del configurador de producto
    description: |
      Elaboración y validación de reglas de configuración bajo pedido.
  BC-1940.30.10:
    name: Elaboración de reglas de configuración
    description: |
      Elaboración de reglas de combinaciones válidas para productos configurables.
  BC-1940.30.20:
    name: Gestión de restricciones de compatibilidad
    description: |
      Gestión de restricciones de compatibilidad entre opciones.
  BC-1940.30.30:
    name: Pruebas de validación del configurador
    description: |
      Pruebas de validación de conjuntos de reglas del configurador.
  BC-1940.40:
    name: Gestión de SKU jurisdiccionales
    description: |
      Gestión de SKU específicos por jurisdicción, normas de enchufe y variantes de idioma.
  BC-1940.40.10:
    name: Definición de variantes jurisdiccionales
    description: |
      Definición de variantes comercializables requeridas por la jurisdicción de destino.
  BC-1940.40.20:
    name: Gestión de normas de enchufe y conector
    description: |
      Gestión de variantes de normas de enchufe y conector por región.
  BC-1940.40.30:
    name: Variante de documentación en idioma local
    description: |
      Manuales y variantes de etiquetado en idioma local por jurisdicción.
  BC-1940.50:
    name: Gestión de incorporación y retirada de productos
    description: |
      Activación en catálogo, mapeo de sustituciones, fin de venta y ventanas de última compra.
  BC-1940.50.10:
    name: Activación del catálogo en el lanzamiento del producto
    description: |
      Activación de nuevos productos en el catálogo comercializable en el lanzamiento.
  BC-1940.50.20:
    name: Mapeo de productos de sustitución
    description: |
      Mapeo de productos sustituidos a los SKU de reemplazo.
  BC-1940.50.30:
    name: Notificación de fin de venta
    description: |
      Notificación de fechas de fin de venta a canales y clientes.
  BC-1940.50.40:
    name: Gestión de última compra y ventana de servicio
    description: |
      Gestión de ventanas de última compra y disponibilidad exclusiva para servicio.
  BC-1940.60:
    name: Gestión de documentación y fichas técnicas del producto
    description: |
      Elaboración y mantenimiento de fichas técnicas, manuales y material de marketing vinculados a SKU.
  BC-1940.60.10:
    name: Elaboración de fichas técnicas
    description: |
      Elaboración de fichas técnicas de producto y especificaciones técnicas.
  BC-1940.60.20:
    name: Elaboración de manuales técnicos
    description: |
      Elaboración de manuales de instalación y operación.
  BC-1940.60.30:
    name: Material de marketing del catálogo
    description: |
      Material de marketing vinculado a los SKU del catálogo.

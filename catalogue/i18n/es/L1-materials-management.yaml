locale: es
source: L1-materials-management.yaml
entries:
  BC-1070:
    name: Gestión de materiales
    description: |
      Gestión de materias primas, trabajo en curso y lista de materiales a nivel de planta para garantizar la disponibilidad de los materiales correctos en el momento y lugar adecuados.
  BC-1070.10:
    name: Gestión de la lista de materiales
    description: |
      Estructura de la lista de materiales y LDM de ingeniería y fabricación para definir con exactitud la composición de los productos.
  BC-1070.10.10:
    name: Gestión de la LDM de ingeniería
    description: |
      LDM de ingeniería alineadas con el diseño del producto y sus revisiones.
  BC-1070.10.20:
    name: Gestión de la LDM de fabricación
    description: |
      LDM de fabricación que reflejan las secuencias de montaje específicas de la planta.
  BC-1070.10.30:
    name: Gestión de cambios y vigencia de la LDM
    description: |
      Control de cambios, revisiones y datación de vigencia de la LDM.
  BC-1070.10.40:
    name: Gestión de variantes de la LDM
    description: |
      LDM configurables y de variantes para las opciones del producto.
  BC-1070.20:
    name: Gestión de materias primas
    description: |
      Control de existencias, calidad y trazabilidad de las materias primas para asegurar el suministro continuo a la producción.
  BC-1070.20.10:
    name: Control de existencias de materias primas
    description: |
      Seguimiento de las existencias de materias primas en la planta y los almacenes.
  BC-1070.20.20:
    name: Inspección de calidad de materias primas
    description: |
      Inspección de entrada, muestreo y liberación de materias primas.
  BC-1070.20.30:
    name: Trazabilidad de materias primas
    description: |
      Trazabilidad por lote, partida y número de serie de las materias primas.
  BC-1070.30:
    name: Gestión del trabajo en curso
    description: |
      Seguimiento, valoración y control del trabajo en curso para mantener la visibilidad de la producción en proceso.
  BC-1070.30.10:
    name: Seguimiento del trabajo en curso
    description: |
      Seguimiento del trabajo en curso a lo largo de las operaciones de fabricación.
  BC-1070.30.20:
    name: Valoración del trabajo en curso
    description: |
      Acumulación de costes y valoración de las posiciones de trabajo en curso.
  BC-1070.30.30:
    name: Control y envejecimiento del trabajo en curso
    description: |
      Envejecimiento y control del trabajo en curso paralizado o bloqueado.
  BC-1070.40:
    name: Gestión de productos terminados
    description: |
      Control de las existencias de productos terminados a nivel de planta para garantizar su disponibilidad para la expedición.
  BC-1070.40.10:
    name: Recepción de productos terminados
    description: |
      Recepción de productos terminados desde producción al inventario de planta.
  BC-1070.40.20:
    name: Almacenamiento de productos terminados
    description: |
      Almacenamiento y manipulación de productos terminados en los almacenes de planta.
  BC-1070.40.30:
    name: Expedición de productos terminados
    description: |
      Expedición y envío de productos terminados a los nodos aguas abajo.
  BC-1070.50:
    name: Gestión de la planificación de materiales
    description: |
      MRP, necesidades de materiales y planificación de suministro a nivel de planta para asegurar la disponibilidad de materiales en el momento requerido.
  BC-1070.50.10:
    name: Planificación de necesidades de materiales
    description: |
      Ejecuciones de MRP para derivar las necesidades netas de materiales a partir de la demanda y la LDM.
  BC-1070.50.20:
    name: Análisis de cobertura de materiales
    description: |
      Análisis de cobertura, mensajes de excepción y propuestas de pedido.
  BC-1070.50.30:
    name: Ejecución del plan de suministro a nivel de planta
    description: |
      Conversión de los planes de materiales en órdenes de compra y de producción.

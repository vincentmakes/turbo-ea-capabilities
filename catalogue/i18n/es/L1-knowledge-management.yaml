locale: es
source: L1-knowledge-management.yaml
entries:
  BC-830:
    name: Gestión del conocimiento
    description: |
      Captura, organiza y comparte el conocimiento organizacional para preservar la experiencia institucional y acelerar la toma de decisiones.
  BC-830.10:
    name: Gestión de la captura de conocimiento
    description: |
      Extrae y documenta el conocimiento de expertos, proyectos y lecciones aprendidas en activos reutilizables.
  BC-830.10.10:
    name: Extracción de conocimiento tácito
    description: |
      Elicita el conocimiento tácito de expertos mediante entrevistas y técnicas de observación.
  BC-830.10.20:
    name: Captura de lecciones aprendidas
    description: |
      Registra las lecciones aprendidas en proyectos y operaciones para su uso futuro.
  BC-830.10.30:
    name: Elaboración de activos de conocimiento
    description: |
      Redacta artículos, guías de actuación y activos de procedimiento para la organización.
  BC-830.20:
    name: Gestión de la curación y taxonomía del conocimiento
    description: |
      Mantiene taxonomías, ontologías y ciclos de curación que garantizan la calidad y accesibilidad del contenido.
  BC-830.20.10:
    name: Gestión de taxonomías y ontologías
    description: |
      Mantiene las taxonomías, ontologías y esquemas de metadatos del repositorio de conocimiento.
  BC-830.20.20:
    name: Curación y revisión de contenidos
    description: |
      Ejecuta ciclos de curación y revisión de actualidad del contenido de conocimiento.
  BC-830.20.30:
    name: Gestión de búsqueda y descubrimiento
    description: |
      Optimiza la búsqueda corporativa y las experiencias de descubrimiento de contenido.
  BC-830.30:
    name: Gestión del intercambio y la colaboración en conocimiento
    description: |
      Fomenta comunidades de práctica y plataformas colaborativas que activan el intercambio de conocimiento.
  BC-830.30.10:
    name: Operaciones de comunidades de práctica
    description: |
      Administra y dinamiza las comunidades de práctica dentro de la organización.
  BC-830.30.20:
    name: Gestión de plataformas de colaboración
    description: |
      Opera las plataformas de colaboración e intranet orientadas al intercambio de conocimiento.
  BC-830.30.30:
    name: Eventos y foros de conocimiento
    description: |
      Organiza eventos internos, sesiones informales y foros de aprendizaje para difundir el conocimiento.
  BC-830.40:
    name: Gestión de buenas prácticas
    description: |
      Identifica, codifica y difunde las buenas prácticas para elevar el desempeño organizacional.
  BC-830.40.10:
    name: Identificación de buenas prácticas
    description: |
      Identifica buenas prácticas internas y externas con potencial de aplicación en la organización.
  BC-830.40.20:
    name: Codificación de buenas prácticas
    description: |
      Transforma las buenas prácticas en activos reutilizables y estándares organizacionales.
  BC-830.40.30:
    name: Difusión de buenas prácticas
    description: |
      Divulga, forma y apoya la adopción de buenas prácticas en toda la organización.

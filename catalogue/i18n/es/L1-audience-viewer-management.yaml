locale: es
source: L1-audience-viewer-management.yaml
entries:
  BC-3750:
    name: "Gestión de audiencia y espectador"
    description: |
      Identidad del espectador, suscripción y derechos de acceso, autenticación
      multidispositivo, captación y retención, y controles parentales para servicios
      de contenido directo al consumidor en plataformas OTT, IPTV y de televisión de pago.
  BC-3750.10:
    name: "Gestión de la identidad del espectador"
    description: |
      Aprovisionamiento y administración de cuentas de espectador, unidades familiares
      e identidad federada entre servicios.
  BC-3750.10.10:
    name: "Aprovisionamiento de cuentas de espectador"
    description: |
      Creación y ciclo de vida de las cuentas de espectador, incluyendo operaciones
      de fusión y división de cuentas.
  BC-3750.10.20:
    name: "Gestión de unidades familiares y perfiles"
    description: |
      Gestión de las unidades familiares y los perfiles individuales de espectador
      dentro de cuentas compartidas.
  BC-3750.10.30:
    name: "Federación de identidad"
    description: |
      Federación de la identidad del espectador con operadores, distribuidores
      y proveedores de identidad de terceros.
  BC-3750.20:
    name: "Gestión de suscripciones y derechos de acceso"
    description: |
      Ciclo de vida de las suscripciones de los espectadores y los registros de derechos
      que rigen el acceso a los servicios y niveles de contenido.
  BC-3750.20.10:
    name: "Inscripción en planes de suscripción"
    description: |
      Inscripción de espectadores en planes de suscripción, transaccionales
      y con publicidad.
  BC-3750.20.20:
    name: "Concesión y revocación de derechos de acceso"
    description: |
      Concesión y revocación de derechos de acceso a contenidos impulsados
      por suscripciones, compras y paquetes de socios.
  BC-3750.20.30:
    name: "Derechos de acceso para flujos simultáneos"
    description: |
      Control basado en derechos del número de flujos simultáneos
      y de dispositivos por cuenta.
  BC-3750.30:
    name: "Autenticación multidispositivo"
    description: |
      Autenticación de espectadores en el parque de dispositivos, incluyendo
      flujos TV-Everywhere con proveedores de identidad de operadores.
  BC-3750.30.10:
    name: "Registro de dispositivos"
    description: |
      Registro y baja de dispositivos vinculados a cuentas de espectador.
  BC-3750.30.20:
    name: "Gestión de sesiones autenticadas"
    description: |
      Gestión de sesiones de reproducción autenticadas y ciclo de vida de tokens
      en todos los dispositivos.
  BC-3750.30.30:
    name: "Autenticación TV-Everywhere"
    description: |
      Autenticación de suscriptores de televisión de pago frente a proveedores
      de identidad de operadores para el derecho de acceso por encima del nivel.
  BC-3750.40:
    name: "Gestión de captación y retención del espectador"
    description: |
      Modelado, diseño de recorridos e intervenciones para aumentar el consumo de contenidos
      y reducir la tasa de abandono en los servicios directos al consumidor.
  BC-3750.40.10:
    name: "Modelado de hábitos de visualización"
    description: |
      Modelado de los hábitos del espectador, estados de visualización y afinidad
      con el contenido para orientar las decisiones de captación.
  BC-3750.40.20:
    name: "Gestión de programas de recuperación y retención"
    description: |
      Diseño y ejecución de programas de retención, recuperación y reactivación
      para espectadores en riesgo o inactivos.
  BC-3750.40.30:
    name: "Gestión de recorridos de incorporación y activación"
    description: |
      Recorridos que incorporan a los nuevos espectadores y generan
      la primera experiencia de visualización significativa.
  BC-3750.50:
    name: "Gestión de controles parentales y restricciones de perfil"
    description: |
      Configuración y aplicación de las restricciones de contenido a nivel de perfil,
      bloqueos por PIN y límites de tiempo de visualización.
  BC-3750.50.10:
    name: "Restricción de contenidos por perfil"
    description: |
      Restricción por perfil del contenido según la clasificación por edad,
      categoría y listas de bloqueo personalizadas.
  BC-3750.50.20:
    name: "Gestión de PIN y bloqueos"
    description: |
      Gestión de PIN, bloqueo de perfil y bloqueo de compras
      en dispositivos y superficies.
  BC-3750.50.30:
    name: "Configuración de límites de visualización"
    description: |
      Configuración de límites de tiempo de visualización, restricciones
      por franja horaria y controles de tiempo de pantalla.

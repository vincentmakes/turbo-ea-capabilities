locale: es
source: L1-supplier-management.yaml
entries:
  BC-510:
    name: Gestión de proveedores
    description: |
      Calificación, rendimiento, riesgo y gestión de relaciones con proveedores para garantizar una base de suministro sólida y fiable.
  BC-510.10:
    name: Gestión de incorporación de proveedores
    description: |
      Calificación, registro y diligencia debida de nuevos proveedores antes de su incorporación a la base de suministro.
  BC-510.10.10:
    name: Registro de proveedores
    description: |
      Captura de la identificación, datos bancarios e información fiscal de los proveedores.
  BC-510.10.20:
    name: Calificación y preselección de proveedores
    description: |
      Calificación de capacidades, situación financiera y cumplimiento de nuevos proveedores.
  BC-510.10.30:
    name: Diligencia debida sobre proveedores
    description: |
      Diligencia debida en materia de sanciones, anticorrupción, ESG e integridad sobre los proveedores.
  BC-510.10.40:
    name: Gestión de datos maestros de proveedores
    description: |
      Mantenimiento de los datos maestros de proveedores y gestión de cambios en su ciclo de vida.
  BC-510.20:
    name: Gestión del rendimiento de proveedores
    description: |
      Cuadros de mando de rendimiento y gestión de acuerdos de nivel de servicio para asegurar el cumplimiento de los compromisos contractuales.
  BC-510.20.10:
    name: Cuadros de mando e indicadores de proveedores
    description: |
      Definición y seguimiento de cuadros de mando de rendimiento de proveedores.
  BC-510.20.20:
    name: Gestión de acuerdos de nivel de servicio
    description: |
      Definición, seguimiento y aplicación de medidas correctoras en los acuerdos de nivel de servicio.
  BC-510.20.30:
    name: Auditoría e inspección de proveedores
    description: |
      Auditorías e inspecciones presenciales de las capacidades y la calidad de los proveedores.
  BC-510.20.40:
    name: Gestión de incidencias y CAPA con proveedores
    description: |
      Registro de incidencias y gestión de acciones correctivas y preventivas con proveedores.
  BC-510.30:
    name: Gestión del riesgo de proveedores
    description: |
      Evaluación y seguimiento de riesgos financieros, ESG, geopolíticos y cibernéticos en la base de proveedores.
  BC-510.30.10:
    name: Seguimiento del riesgo financiero de proveedores
    description: |
      Seguimiento de la salud financiera y el riesgo de crédito de los proveedores.
  BC-510.30.20:
    name: Riesgo ESG y de sostenibilidad de proveedores
    description: |
      Riesgo ESG, de derechos humanos y de esclavitud moderna en la base de suministro.
  BC-510.30.30:
    name: Riesgo cibernético y tecnológico de proveedores
    description: |
      Evaluación y seguimiento del riesgo cibernético y tecnológico de terceros.
  BC-510.30.40:
    name: Riesgo geopolítico y de concentración de proveedores
    description: |
      Riesgo geopolítico, de país y de concentración en la base de suministro.
  BC-510.40:
    name: Gestión del desarrollo de proveedores
    description: |
      Desarrollo de capacidades y programas de mejora para fortalecer la base de proveedores.
  BC-510.40.10:
    name: Desarrollo de capacidades de proveedores
    description: |
      Desarrollo conjunto de capacidades, formación y transferencia de tecnología.
  BC-510.40.20:
    name: Programa de diversidad de proveedores
    description: |
      Identificación y desarrollo de proveedores diversos y pequeñas empresas.
  BC-510.40.30:
    name: Programa de innovación con proveedores
    description: |
      Programas para captar innovación liderada por proveedores y codesarrollo.
  BC-510.50:
    name: Gestión de relaciones con proveedores
    description: |
      Relaciones estratégicas con proveedores clave y foros de gobernanza para crear valor conjunto.
  BC-510.50.10:
    name: Segmentación estratégica de proveedores
    description: |
      Segmentación de proveedores según su criticidad y valor aportado.
  BC-510.50.20:
    name: Relación ejecutiva con proveedores
    description: |
      Patrocinio ejecutivo y dirección estratégica con proveedores estratégicos.
  BC-510.50.30:
    name: Planificación empresarial conjunta
    description: |
      Planificación empresarial conjunta y creación de valor con proveedores estratégicos.
  BC-510.50.40:
    name: Portal y colaboración con proveedores
    description: |
      Portal de proveedores, autoservicio y plataformas de colaboración.

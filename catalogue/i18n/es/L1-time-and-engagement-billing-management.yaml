locale: es
source: L1-time-and-engagement-billing-management.yaml
entries:
  BC-4330:
    name: Facturación por tiempo y encargo
    description: |
      Registro de tiempo, trabajo en curso, acuerdos de honorarios,
      facturación, realización y control de regularizaciones en encargos
      facturables, así como la gestión de fondos fiduciarios de clientes y
      anticipos a honorarios propios de la práctica legal.
  BC-4330.10:
    name: Gestión del registro de horas
    description: |
      Captura, validación y envío de los registros de tiempo de los
      profesionales con detalle narrativo por encargo y tarea.
  BC-4330.10.10:
    name: Captura de registros de tiempo
    description: |
      Registro diario de horas facturables y no facturables por encargo,
      tarea y actividad.
  BC-4330.10.20:
    name: Gestión de la calidad narrativa del tiempo
    description: |
      Control de calidad de los textos descriptivos del tiempo para
      cumplir las directrices de facturación del cliente y los requisitos
      de facturación electrónica.
  BC-4330.10.30:
    name: Envío y aprobación del tiempo
    description: |
      Envío, aprobación del supervisor y cierre de los registros de tiempo.
  BC-4330.20:
    name: Gestión de suplidos del encargo
    description: |
      Captura y asignación de suplidos relacionados con el encargo, tales
      como tasas judiciales, honorarios periciales, viajes e impresión,
      para su posterior repercusión al cliente.
  BC-4330.20.10:
    name: Captura de suplidos
    description: |
      Registro de suplidos en el expediente del encargo para su
      recuperación posterior.
  BC-4330.20.20:
    name: Revisión de la recuperabilidad de suplidos
    description: |
      Análisis de la recuperabilidad de los suplidos conforme a la carta
      de encargo y las directrices de facturación del cliente.
  BC-4330.20.30:
    name: Imputación de suplidos al encargo
    description: |
      Asignación de los suplidos aprobados al trabajo en curso del encargo
      para su posterior facturación.
  BC-4330.30:
    name: Gestión del trabajo en curso
    description: |
      Seguimiento de los saldos de trabajo en curso no facturado, su
      antigüedad y las decisiones de regularización al alza o a la baja
      antes de la facturación.
  BC-4330.30.10:
    name: Seguimiento del trabajo en curso
    description: |
      Registro en tiempo real del trabajo en curso no facturado por
      encargo, socio y área de práctica.
  BC-4330.30.20:
    name: Análisis de antigüedad del trabajo en curso
    description: |
      Análisis de la antigüedad del trabajo en curso no facturado y
      escalado de saldos sin movimiento.
  BC-4330.30.30:
    name: Decisión de regularización del trabajo en curso
    description: |
      Decisión a nivel de socio sobre regularizaciones al alza, a la baja
      y aplazamientos del trabajo en curso antes de la facturación.
  BC-4330.40:
    name: Gestión de acuerdos de honorarios
    description: |
      Mantenimiento de las estructuras de honorarios por encargo,
      incluyendo tarifas por hora, honorarios alternativos, honorarios
      fijos, honorarios de éxito y anticipos.
  BC-4330.40.10:
    name: Mantenimiento de tarifas por hora
    description: |
      Mantenimiento de las tarifas por hora estándar, específicas del
      cliente y específicas del encargo.
  BC-4330.40.20:
    name: Configuración de acuerdos de honorarios alternativos
    description: |
      Configuración de honorarios fijos, con límite máximo, de éxito,
      contingentes y de anticipo por encargo.
  BC-4330.40.30:
    name: Gestión de descuentos y precios por volumen
    description: |
      Aplicación de descuentos de honorarios acordados y precios por
      volumen en la cartera de encargos del cliente.
  BC-4330.50:
    name: Gestión de la emisión de facturas
    description: |
      Generación de facturas del encargo, formato narrativo y cumplimiento
      de los requisitos de facturación electrónica del cliente.
  BC-4330.50.10:
    name: Preparación de facturas pro forma
    description: |
      Preparación y revisión por el socio de las facturas pro forma antes
      de su emisión definitiva.
  BC-4330.50.20:
    name: Emisión de facturas definitivas
    description: |
      Emisión de facturas definitivas del encargo con detalle narrativo,
      suplidos e impuestos.
  BC-4330.50.30:
    name: Cumplimiento del formato de facturación electrónica del cliente
    description: |
      Adecuación a los requisitos de facturación electrónica del cliente,
      incluyendo LEDES, códigos de tarea UTBMS y envío por portal del cliente.
  BC-4330.50.40:
    name: Cumplimiento de las directrices de facturación del cliente
    description: |
      Aplicación de las directrices de facturación del cliente para tiempo,
      tarifas y suplidos.
  BC-4330.60:
    name: Gestión de la realización del encargo
    description: |
      Seguimiento de los ratios de realización facturado/cobrado y tarifa
      estándar/facturado, regularizaciones y rentabilidad del encargo.
  BC-4330.60.10:
    name: Seguimiento de la realización tarifa estándar/facturado
    description: |
      Seguimiento del trabajo en curso a tarifa estándar frente al importe
      facturado para identificar pérdidas de ingresos.
  BC-4330.60.20:
    name: Seguimiento de la realización facturado/cobrado
    description: |
      Seguimiento del importe facturado frente al efectivo cobrado,
      incluyendo la dotación de provisiones por insolvencias.
  BC-4330.60.30:
    name: Informes de rentabilidad del encargo
    description: |
      Informe de rentabilidad por encargo, socio y área de práctica
      utilizando ingresos realizados y costes directos.
  BC-4330.60.40:
    name: Aprobación y análisis de regularizaciones
    description: |
      Flujo de aprobación y análisis de causa raíz de las regularizaciones
      de trabajo en curso y saldos de clientes.
  BC-4330.70:
    name: Gestión de fondos fiduciarios y anticipos de clientes
    description: |
      Gestión de los fondos de clientes en fideicomiso, cuentas de tipo
      IOLTA y saldos de anticipos, con los requisitos específicos de
      segregación y conciliación propios de la práctica legal.
    in_scope:
      - Operaciones de la cuenta fiduciaria del cliente
      - Seguimiento del saldo del anticipo
      - Conciliación e informes de la cuenta fiduciaria
    out_of_scope:
      - Tesorería general de la firma (BC-180)
  BC-4330.70.10:
    name: Operaciones de la cuenta fiduciaria del cliente
    description: |
      Gestión de las cuentas fiduciarias segregadas del cliente, incluidos
      cobros y pagos en nombre del cliente.
  BC-4330.70.20:
    name: Gestión del saldo del anticipo
    description: |
      Seguimiento de los saldos de anticipos del cliente y los umbrales
      de reposición.
  BC-4330.70.30:
    name: Conciliación e informes de fondos fiduciarios
    description: |
      Conciliación tripartita de los libros fiduciarios e informes
      estatutarios o de organismos profesionales sobre saldos en fideicomiso.

locale: es
source: L1-agri-environmental-stewardship-management.yaml
entries:
  BC-3600:
    name: Gestión ambiental agrícola
    description: |
      Gestión ambiental en la granja — salud del suelo, gestión hídrica, biodiversidad, gestión de gases de efecto invernadero agrícolas, programas de carbono en suelos, prácticas regenerativas y participación en esquemas agri-ambientales que complementan la sostenibilidad corporativa.
  BC-3600.10:
    name: Gestión responsable de la salud del suelo
    description: |
      Gestión responsable de la materia orgánica del suelo, cultivos de cobertura y control de la erosión en las tierras de cultivo.
  BC-3600.10.10:
    name: Monitoreo del carbono orgánico del suelo
    description: |
      Monitoreo periódico del carbono orgánico del suelo en todos los campos.
  BC-3600.10.20:
    name: Programas de cultivos de cobertura
    description: |
      Programas de cultivos de cobertura para mantener la cobertura y la biología del suelo.
  BC-3600.10.30:
    name: Programas de control de la erosión del suelo
    description: |
      Programas de control de la erosión, incluidas prácticas de contorno, terrazas y fajas de protección.
  BC-3600.20:
    name: Gestión hídrica en la granja
    description: |
      Eficiencia en el uso del agua, protección de las zonas ribereñas y gestión de la calidad del agua de drenaje a nivel de la granja.
    in_scope:
      - Monitoreo de la eficiencia en el uso del agua
      - Protección de zonas ribereñas y cursos de agua
      - Gestión de la calidad del drenaje
    out_of_scope:
      - Divulgación corporativa del agua (BC-740)
      - Programación del riego (BC-3500.60.10)
  BC-3600.20.10:
    name: Monitoreo de la eficiencia en el uso del agua
    description: |
      Monitoreo de la eficiencia en el uso del agua por cultivo y campo.
  BC-3600.20.20:
    name: Protección de zonas ribereñas y cursos de agua
    description: |
      Protección de las zonas ribereñas y los cursos de agua en la granja.
  BC-3600.20.30:
    name: Gestión de la calidad del drenaje
    description: |
      Gestión de la calidad del agua de drenaje y las pérdidas de nutrientes.
  BC-3600.30:
    name: Gestión responsable de la biodiversidad y el hábitat
    description: |
      Gestión de la biodiversidad en la granja, incluido el registro de hábitats, la gestión responsable de los polinizadores y las fajas de protección en los márgenes de los campos.
  BC-3600.30.10:
    name: Registro de hábitats en la granja
    description: |
      Registro de los hábitats y las características de biodiversidad en la granja.
  BC-3600.30.20:
    name: Gestión responsable de los polinizadores
    description: |
      Prácticas favorables a los polinizadores, incluidas las franjas florales y los umbrales de MIP.
  BC-3600.30.30:
    name: Gestión de zonas de amortiguamiento
    description: |
      Gestión de las zonas de amortiguamiento en los márgenes de los campos y los cursos de agua.
  BC-3600.40:
    name: Gestión de los gases de efecto invernadero agrícolas
    description: |
      Cuantificación y mitigación de los gases de efecto invernadero de la granja, incluidos el metano entérico, el óxido nitroso y el CO2 en la granja.
  BC-3600.40.10:
    name: Programas de mitigación del metano entérico
    description: |
      Programas de mitigación del metano entérico en el ganado rumiante.
  BC-3600.40.20:
    name: Programas de mitigación del óxido nitroso
    description: |
      Mitigación del óxido nitroso mediante la eficiencia en el uso del nitrógeno y la programación.
  BC-3600.40.30:
    name: Inventario de emisiones de la granja
    description: |
      Inventario de emisiones de gases de efecto invernadero a nivel de la granja que alimenta las divulgaciones.
  BC-3600.50:
    name: Programas de carbono en suelos y créditos de carbono
    description: |
      Medición de la línea base de carbono en suelos, diseño de proyectos de créditos de carbono y registros de emisión conforme a metodologías reconocidas.
  BC-3600.50.10:
    name: Medición de la línea base de carbono en suelos
    description: |
      Campañas de medición de la línea base de carbono en suelos al momento de la incorporación al proyecto.
  BC-3600.50.20:
    name: Diseño de proyectos de créditos de carbono
    description: |
      Diseño de proyectos conforme a las metodologías de Verra, Gold Standard y equivalentes.
  BC-3600.50.30:
    name: Registros de emisión de créditos de carbono
    description: |
      Registros de emisión, retiro y asignación de beneficiarios de créditos de carbono.
  BC-3600.60:
    name: Gestión de prácticas regenerativas
    description: |
      Adopción y registro de prácticas regenerativas, incluidas la labranza reducida, la integración y la agrosilvicultura.
  BC-3600.60.10:
    name: Programas de cero labranza y labranza reducida
    description: |
      Adopción y seguimiento de programas de cero labranza y labranza reducida.
  BC-3600.60.20:
    name: Operaciones integradas de cultivos y ganadería
    description: |
      Integración de las operaciones de cultivo y ganadería para el reciclaje de nutrientes.
  BC-3600.60.30:
    name: Registros de prácticas de agrosilvicultura
    description: |
      Registros de las plantaciones de agrosilvicultura y los sistemas silvopastoriles.
  BC-3600.70:
    name: Participación en esquemas agri-ambientales
    description: |
      Participación en los eco-esquemas de la PAC, los programas de conservación del NRCS y los esquemas de pago agri-ambiental equivalentes.
  BC-3600.70.10:
    name: Participación en los eco-esquemas de la PAC
    description: |
      Participación en los eco-esquemas de la PAC de la UE y los requisitos de condicionalidad.
  BC-3600.70.20:
    name: Participación en programas de conservación
    description: |
      Participación en los programas EQIP, CSP del NRCS del USDA y equivalentes.
  BC-3600.70.30:
    name: Reconciliación de pagos agri-ambientales
    description: |
      Reconciliación de los pagos agri-ambientales frente a los compromisos del esquema.

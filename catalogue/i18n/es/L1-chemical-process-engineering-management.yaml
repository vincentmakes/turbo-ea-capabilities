locale: es
source: L1-chemical-process-engineering-management.yaml
entries:
  BC-4610:
    name: Gestión de ingeniería de procesos químicos
    description: |
      Diseño de procesos, ingeniería de balances de masa y energía, simulación, especificación de equipos e ingeniería de ingeniería básica para plantas químicas y proyectos de revamping. Distinta de la Gestión de Disciplinas de Ingeniería transversal (BC-1100), que abarca las disciplinas de ingeniería genéricas.
  BC-4610.10:
    name: Diseño del diagrama de flujo de proceso
    description: |
      Desarrollo de diagramas de flujo de bloque, diagramas de flujo de proceso y diagramas de tuberías e instrumentación para procesos químicos.
  BC-4610.10.10:
    name: Desarrollo de diagramas de flujo de bloque
    description: |
      Elaboración de diagramas de flujo de bloque para la definición temprana del proceso.
  BC-4610.10.20:
    name: Desarrollo de diagramas de flujo de proceso
    description: |
      Elaboración de diagramas de flujo de proceso con condiciones y propiedades de corrientes.
  BC-4610.10.30:
    name: Desarrollo de diagramas de tuberías e instrumentación
    description: |
      Elaboración y revisión de P&IDs para unidades de proceso químico.
  BC-4610.10.40:
    name: Desarrollo de diagramas de flujo de servicios
    description: |
      Elaboración de diagramas de flujo de servicios que cubren vapor, agua de enfriamiento y gas inerte.
  BC-4610.20:
    name: Dimensionado de reactores y equipos de separación
    description: |
      Dimensionado de reactores y equipos de separación basado en cinética, termodinámica y principios de operaciones unitarias.
  BC-4610.20.10:
    name: Diseño de reactores
    description: |
      Dimensionado y configuración de reactores CSTR, PFR y de lecho fijo.
  BC-4610.20.20:
    name: Diseño de columnas de destilación
    description: |
      Diseño de columnas de destilación con platos y de relleno, incluyendo internos.
  BC-4610.20.30:
    name: Diseño de redes de intercambiadores de calor
    description: |
      Diseño de redes de intercambiadores mediante análisis de pinch para la integración energética.
  BC-4610.20.40:
    name: Dimensionado de cristalizadores y filtros
    description: |
      Dimensionado de cristalizadores, centrífugas y equipos de filtración.
  BC-4610.30:
    name: Ingeniería de balances de masa y energía
    description: |
      Cierre de balances de masa y energía globales y por unidad y estimación de la demanda de servicios.
  BC-4610.30.10:
    name: Cálculo del balance de masa
    description: |
      Cálculo y reconciliación de balances de masa de planta y por unidad.
  BC-4610.30.20:
    name: Cálculo del balance de energía
    description: |
      Cálculo de balances de energía en reactores, intercambiadores y servicios.
  BC-4610.30.30:
    name: Estimación de la demanda de servicios
    description: |
      Estimación de la demanda de vapor, energía eléctrica, agua de enfriamiento y gas inerte.
  BC-4610.40:
    name: Gestión de simulación de procesos
    description: |
      Construcción y mantenimiento de simulaciones de proceso en estado estacionario y dinámico para el diseño y las operaciones.
  BC-4610.40.10:
    name: Simulación de proceso en estado estacionario
    description: |
      Construcción y ejecución de simuladores en estado estacionario para diseño y análisis.
  BC-4610.40.20:
    name: Simulación de proceso dinámico
    description: |
      Construcción y ejecución de simuladores dinámicos para estudios de control y seguridad.
  BC-4610.40.30:
    name: Validación de modelos de simulación
    description: |
      Validación de modelos de simulación frente a datos de planta o piloto.
  BC-4610.50:
    name: Gestión de especificaciones de equipos
    description: |
      Elaboración y gestión del ciclo de vida de fichas técnicas de equipos y planos de proveedores.
  BC-4610.50.10:
    name: Elaboración de fichas técnicas de equipos
    description: |
      Elaboración de fichas técnicas mecánicas, eléctricas y de instrumentación.
  BC-4610.50.20:
    name: Mantenimiento de especificaciones de equipos
    description: |
      Gestión de la configuración de las especificaciones de equipos aprobadas.
  BC-4610.50.30:
    name: Revisión de planos de proveedores
    description: |
      Revisión de planos de proveedores frente a fichas técnicas y requisitos de proceso.
  BC-4610.60:
    name: Ingeniería de disposición de planta y plano de parcela
    description: |
      Definición de planos de parcela, separaciones entre equipos y clasificación de áreas peligrosas para instalaciones químicas.
  BC-4610.60.10:
    name: Desarrollo del plano de parcela
    description: |
      Desarrollo de planos de parcela de unidades y de conjunto de la instalación.
  BC-4610.60.20:
    name: Determinación de separaciones entre equipos
    description: |
      Determinación de separaciones entre equipos según seguridad de procesos y constructabilidad.
  BC-4610.60.30:
    name: Clasificación de áreas peligrosas
    description: |
      Clasificación de áreas peligrosas para el control de fuentes de ignición.
  BC-4610.70:
    name: Desarrollo de la filosofía de control de proceso
    description: |
      Definición de estrategias de control de proceso, control avanzado y base de procedimientos operativos para plantas nuevas y modificadas.
  BC-4610.70.10:
    name: Definición de lazos de control
    description: |
      Definición de lazos de control regulatorio e intención de sintonización.
  BC-4610.70.20:
    name: Estrategia de control de proceso avanzado
    description: |
      Definición de estrategias de control predictivo por modelo y control avanzado.
  BC-4610.70.30:
    name: Desarrollo de la base de procedimientos operativos
    description: |
      Desarrollo de la base de procedimientos operativos para plantas nuevas y modificadas.
  BC-4610.80:
    name: Coordinación del diseño de ingeniería básica
    description: |
      Coordinación de paquetes de ingeniería conceptual, básica y de ingeniería básica para proyectos químicos.
  BC-4610.80.10:
    name: Coordinación de ingeniería conceptual
    description: |
      Coordinación de estudios de ingeniería conceptual y cribado de opciones.
  BC-4610.80.20:
    name: Producción del paquete de ingeniería básica
    description: |
      Producción de paquetes de ingeniería básica entregados al diseño de detalle.
  BC-4610.80.30:
    name: Verificación del FEED
    description: |
      Verificación de los entregables del FEED frente a los requisitos de proceso y proyecto.

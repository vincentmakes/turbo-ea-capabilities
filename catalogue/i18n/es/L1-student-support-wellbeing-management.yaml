locale: es
source: L1-student-support-wellbeing-management.yaml
entries:
  BC-4770:
    name: Gestión de apoyo y bienestar del estudiante
    description: |
      Servicios no docentes que apoyan el éxito y el bienestar del estudiante,
      incluyendo orientación académica, asesoramiento psicológico, adaptaciones para
      la discapacidad, servicios de inserción profesional y atención pastoral.
  BC-4770.10:
    name: Orientación académica
    description: |
      Orientación a los estudiantes sobre la planificación del programa, la selección
      de cursos y la progresión académica, incluyendo el apoyo a los alumnos en riesgo.
    in_scope:
      - Orientación en la planificación del programa
      - Orientación a estudiantes en riesgo
      - Apoyo en situación de condición probatoria
    out_of_scope:
      - Orientación profesional (cubierta en Servicios de inserción y colocación profesional)
      - Asesoramiento en salud mental (cubierto en Servicios de asesoramiento y salud mental)
  BC-4770.10.10:
    name: Orientación en la planificación del programa
    description: |
      Orientación sobre la estructura del programa, la selección de cursos y las
      trayectorias hacia la graduación.
  BC-4770.10.20:
    name: Orientación a estudiantes en riesgo
    description: |
      Orientación dirigida a los estudiantes identificados como en riesgo académico.
  BC-4770.10.30:
    name: Apoyo en condición probatoria
    description: |
      Apoyo estructurado a los estudiantes en condición probatoria académica.
  BC-4770.20:
    name: Servicios de asesoramiento y salud mental
    description: |
      Prestación de servicios de evaluación de salud mental, asesoramiento psicológico
      y respuesta a crisis para los estudiantes.
    in_scope:
      - Evaluación y triaje de salud mental
      - Prestación de sesiones de asesoramiento
      - Coordinación de la respuesta a crisis
    out_of_scope:
      - Atención médica clínica más allá del asesoramiento (cubierta en las capacidades de proveedor de salud o derivaciones)
  BC-4770.20.10:
    name: Evaluación y triaje de salud mental
    description: |
      Evaluación inicial y triaje de las necesidades de salud mental del estudiante.
  BC-4770.20.20:
    name: Prestación de sesiones de asesoramiento
    description: |
      Impartición de sesiones de asesoramiento individual y grupal.
  BC-4770.20.30:
    name: Coordinación de la respuesta a crisis
    description: |
      Coordinación de la respuesta a crisis y derivaciones externas.
  BC-4770.30:
    name: Servicios de discapacidad y adaptaciones
    description: |
      Determinación y entrega de adaptaciones razonables para estudiantes con
      discapacidad y provisión de tecnología de asistencia.
    in_scope:
      - Revisión de la documentación de discapacidad
      - Provisión de adaptaciones razonables
      - Apoyo en tecnología de asistencia
    out_of_scope:
      - Programas estatutarios de educación especial para educación primaria y secundaria (cubiertos en Servicios de educación especial)
      - Informes de cumplimiento de derechos civiles (cubiertos en Gestión de cumplimiento normativo y reporte regulatorio en educación)
  BC-4770.30.10:
    name: Revisión de la documentación de discapacidad
    description: |
      Revisión de la documentación de discapacidad que sustenta las solicitudes
      de adaptación.
  BC-4770.30.20:
    name: Provisión de adaptaciones razonables
    description: |
      Provisión de adaptaciones académicas y de evaluación.
  BC-4770.30.30:
    name: Apoyo en tecnología de asistencia
    description: |
      Provisión y soporte de tecnología de asistencia para los estudiantes.
  BC-4770.40:
    name: Servicios de educación especial
    description: |
      Servicios estatutarios de educación especial prestados principalmente en
      contextos de educación primaria y secundaria, incluyendo planes de educación
      individualizados y servicios relacionados.
    in_scope:
      - Desarrollo del plan de educación individualizado (PEI)
      - Impartición de instrucción especializada
      - Coordinación de servicios relacionados (p. ej., logopedia, terapia ocupacional, fisioterapia)
    out_of_scope:
      - Adaptaciones en la educación superior (cubiertas en Servicios de discapacidad y adaptaciones)
  BC-4770.40.10:
    name: Desarrollo del plan de educación individualizado
    description: |
      Desarrollo de los PEI y planes individualizados equivalentes.
  BC-4770.40.20:
    name: Impartición de instrucción especializada
    description: |
      Impartición de instrucción especializada a estudiantes con necesidades
      identificadas.
  BC-4770.40.30:
    name: Coordinación de servicios relacionados
    description: |
      Coordinación de servicios relacionados como logopedia, terapia ocupacional
      y fisioterapia.
  BC-4770.50:
    name: Servicios de inserción y colocación profesional
    description: |
      Orientación profesional, intermediación en prácticas y colocación, y gestión
      de las relaciones con empleadores que apoyan la incorporación de los
      estudiantes al mundo laboral.
    in_scope:
      - Asesoramiento de carrera
      - Intermediación en prácticas y colocación
      - Relaciones con empleadores y captación en el campus
    out_of_scope:
      - Supervisión de prácticas con créditos académicos (cubierta en Gestión de operaciones de enseñanza y aprendizaje)
  BC-4770.50.10:
    name: Asesoramiento de carrera
    description: |
      Asesoramiento y planificación de carrera para estudiantes y egresados recientes.
  BC-4770.50.20:
    name: Intermediación en prácticas y colocación
    description: |
      Intermediación de prácticas y oportunidades de experiencia laboral.
  BC-4770.50.30:
    name: Relaciones con empleadores y captación en el campus
    description: |
      Gestión de las relaciones con empleadores y los eventos de captación en
      el campus.
  BC-4770.60:
    name: Bienestar del estudiante y atención pastoral
    description: |
      Atención pastoral, mentoría, apoyo en materia de conducta y programas de
      bienestar operados por la institución.
    in_scope:
      - Atención pastoral y mentoría
      - Apoyo en conducta y disciplina del estudiante
      - Operaciones del programa de bienestar
    out_of_scope:
      - Acciones de aplicación de los derechos civiles (cubiertas en Gestión de cumplimiento normativo y reporte regulatorio en educación)
  BC-4770.60.10:
    name: Atención pastoral y mentoría
    description: |
      Atención pastoral y mentoría de los estudiantes por tutores y personal
      especializado.
  BC-4770.60.20:
    name: Apoyo en conducta y disciplina del estudiante
    description: |
      Apoyo en los procesos de conducta y disciplina del estudiante.
  BC-4770.60.30:
    name: Operaciones del programa de bienestar
    description: |
      Operación de los programas y campañas de bienestar institucionales.

locale: es
source: L1-wastewater-operations-management.yaml
entries:
  BC-3890:
    name: Gestión de operaciones de aguas residuales
    description: |
      Recogida, tratamiento y vertido de aguas residuales municipales e industriales —
      operación de la red de alcantarillado, operación de los procesos de las plantas
      depuradoras, respuesta ante atascos e inundaciones, gestión de fangos y biosólidos,
      operaciones de alivios de tormenta y cumplimiento de la calidad del efluente final.
  BC-3890.10:
    name: Operaciones de la red de alcantarillado
    description: |
      Operación de las redes de alcantarillado fecal, pluvial y unitario, incluidas
      las estaciones de bombeo y las tuberías de impulsión.
  BC-3890.10.10:
    name: Operaciones de estaciones de bombeo del alcantarillado
    description: |
      Operación y vigilancia de las estaciones de bombeo del alcantarillado y las
      tuberías de impulsión.
  BC-3890.10.20:
    name: Vigilancia de la red de alcantarillado
    description: |
      Vigilancia basada en telemetría de los niveles en el alcantarillado y las alarmas
      de las estaciones de bombeo.
  BC-3890.10.30:
    name: Limpieza de la red de alcantarillado
    description: |
      Limpieza planificada y reactiva, hidro-jetting y desencenagado del alcantarillado.
  BC-3890.20:
    name: Operaciones de plantas depuradoras de aguas residuales
    description: |
      Operación diaria de plantas depuradoras de aguas residuales, incluidos los procesos
      preliminar, primario, secundario y terciario.
  BC-3890.20.10:
    name: Operaciones de tratamiento preliminar y primario
    description: |
      Operación de las etapas de cribado, desarenado y decantación primaria.
  BC-3890.20.20:
    name: Operaciones de tratamiento biológico secundario
    description: |
      Operación de los procesos secundarios de fango activo, lechos bacterianos y MBR.
  BC-3890.20.30:
    name: Operaciones de tratamiento terciario
    description: |
      Operación de las etapas terciarias de eliminación de nutrientes, filtración y
      desinfección.
  BC-3890.20.40:
    name: Control y optimización del proceso
    description: |
      Control del proceso y optimización energética de las etapas biológicas y de aireación.
  BC-3890.30:
    name: Respuesta ante atascos e inundaciones del alcantarillado
    description: |
      Respuesta reactiva ante atascos del alcantarillado, inundaciones internas y externas
      del alcantarillado e incidentes de contaminación.
  BC-3890.30.10:
    name: Operaciones de respuesta ante atascos
    description: |
      Respuesta en campo a los atascos del alcantarillado mediante hidro-jetting y limpieza.
  BC-3890.30.20:
    name: Respuesta ante inundaciones internas por el alcantarillado
    description: |
      Respuesta orientada al cliente ante incidentes de inundación interna por el alcantarillado.
  BC-3890.30.30:
    name: Respuesta ante inundaciones externas por el alcantarillado
    description: |
      Respuesta ante inundaciones externas por el alcantarillado e incidentes de impacto
      en la vía pública.
  BC-3890.30.40:
    name: Contención de incidentes de contaminación
    description: |
      Contención y corrección de incidentes de contaminación de aguas superficiales por
      aguas residuales.
  BC-3890.40:
    name: Gestión de vertidos industriales
    description: |
      Autorización, monitorización y facturación de los vertidos industriales a la red
      pública de saneamiento.
  BC-3890.40.10:
    name: Administración de autorizaciones de vertido industrial
    description: |
      Emisión y modificación de autorizaciones de vertido industrial a los vertedores
      industriales.
  BC-3890.40.20:
    name: Operaciones de muestreo de vertidos industriales
    description: |
      Muestreo y análisis de los vertidos industriales frente a las condiciones de la
      autorización.
  BC-3890.40.30:
    name: Facturación de vertidos industriales
    description: |
      Cálculo de los cánones de vertido industrial mediante las fórmulas Mogden o equivalentes.
  BC-3890.50:
    name: Gestión de fangos y biosólidos
    description: |
      Tratamiento, valorización y eliminación de los fangos de aguas residuales, incluida
      la digestión anaerobia y el reciclaje de biosólidos en tierras agrícolas.
  BC-3890.50.10:
    name: Operaciones de espesamiento y deshidratación de fangos
    description: |
      Operación de sistemas de espesamiento, deshidratación y centrifugación de fangos.
  BC-3890.50.20:
    name: Operaciones de digestión anaerobia
    description: |
      Operación de digestores anaerobios mesófilos y termófilos y sistemas de biogás.
  BC-3890.50.30:
    name: Reciclaje de biosólidos en tierras agrícolas
    description: |
      Aplicación de biosólidos en tierras agrícolas bajo los regímenes de uso seguro
      de fangos.
  BC-3890.50.40:
    name: Operaciones de incineración y eliminación de fangos
    description: |
      Operación de la incineración de fangos y las vías alternativas de eliminación.
  BC-3890.60:
    name: Operaciones de alivios de tormenta
    description: |
      Operación, monitorización e informes de los alivios de alcantarillado unitario y
      de emergencia, incluida la monitorización de la duración de los eventos.
  BC-3890.60.10:
    name: Monitorización de la duración de los eventos
    description: |
      Operación de la telemetría EDM en los alivios de tormenta y de emergencia.
  BC-3890.60.20:
    name: Informes de vertidos por alivios de tormenta
    description: |
      Notificación de los volúmenes y las duraciones de los vertidos de alivio a los
      reguladores y el público.
  BC-3890.60.30:
    name: Operaciones de depósitos de tormenta
    description: |
      Operación de los depósitos de tormenta y las instalaciones de laminación en las
      entradas de las EDAR.
  BC-3890.70:
    name: Operaciones de calidad del efluente final
    description: |
      Muestreo, análisis e informes regulatorios de la calidad del efluente final frente
      a los límites de vertido autorizados.
  BC-3890.70.10:
    name: Muestreo de cumplimiento del permiso de vertido
    description: |
      Autocontrol del operador frente a los límites numéricos del permiso de vertido.
  BC-3890.70.20:
    name: Vigilancia de la calidad del efluente
    description: |
      Vigilancia en línea y de laboratorio de la DBO, el amonio y los parámetros de
      nutrientes del efluente final.
  BC-3890.70.30:
    name: Informes del permiso de vertido
    description: |
      Informes reglamentarios del cumplimiento del vertido a los organismos reguladores
      medioambientales.

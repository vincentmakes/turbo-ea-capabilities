locale: es
source: L1-financial-management.yaml
entries:
  BC-200:
    name: Gestión financiera
    description: |
      Contabilidad, control, informes financieros estatutarios y de gestión, y presupuestación.
  BC-200.10:
    name: Gestión del libro mayor
    description: |
      Plan de cuentas, asientos contables y cierre del período.
  BC-200.10.10:
    name: Gestión del plan de cuentas
    description: |
      Definición y gobierno del plan de cuentas y de las jerarquías contables.
  BC-200.10.20:
    name: Procesamiento de asientos contables
    description: |
      Asientos manuales y automatizados con flujo de aprobación.
  BC-200.10.30:
    name: Contabilidad intercompañía
    description: |
      Transacciones entre compañías, eliminaciones y conciliaciones.
  BC-200.10.40:
    name: Cierre del período contable
    description: |
      Calendario de cierre, devengos y certificaciones de cierre.
  BC-200.10.50:
    name: Conciliación de cuentas
    description: |
      Conciliaciones y sustanciación de las cuentas del balance.
  BC-200.20:
    name: Gestión de cuentas a pagar
    description: |
      Procesamiento de facturas, pagos y contabilidad de proveedores.
  BC-200.20.10:
    name: Captura y validación de facturas de proveedor
    description: |
      Recepción, captura y cotejo triple de las facturas de proveedor.
  BC-200.20.20:
    name: Ejecución de tandas de pago
    description: |
      Programación y ejecución de las tandas de pago a proveedores.
  BC-200.20.30:
    name: Gestión de datos maestros contables de proveedor
    description: |
      Datos maestros financieros del proveedor, datos bancarios y atributos fiscales.
  BC-200.20.40:
    name: Procesamiento de gastos de viaje y representación
    description: |
      Captura, aprobación y reembolso de gastos de empleados.
  BC-200.20.50:
    name: Conciliación del libro auxiliar de cuentas a pagar
    description: |
      Conciliación de estados de cuenta de proveedor y del libro auxiliar de cuentas a pagar.
  BC-200.30:
    name: Gestión de cuentas a cobrar
    description: |
      Facturación a clientes, cobros y aplicación de cobros.
  BC-200.30.10:
    name: Facturación a clientes
    description: |
      Generación y emisión de facturas y notas de crédito a clientes.
  BC-200.30.20:
    name: Aplicación de cobros
    description: |
      Cotejo de pagos entrantes de clientes con las partidas abiertas.
  BC-200.30.30:
    name: Gestión de cobros
    description: |
      Reclamaciones, estrategia de cobro y seguimiento de pagos de clientes.
  BC-200.30.40:
    name: Riesgo de crédito y límites de clientes
    description: |
      Evaluación del crédito del cliente, fijación de límites y bloqueos de crédito.
  BC-200.30.50:
    name: Gestión de disputas y deducciones
    description: |
      Investigación y resolución de disputas y deducciones en facturas.
  BC-200.40:
    name: Contabilidad de activos fijos
    description: |
      Registros de activos, amortización y deterioro.
  BC-200.40.10:
    name: Mantenimiento del registro de activos fijos
    description: |
      Capitalización, clasificación y seguimiento de los activos fijos.
  BC-200.40.20:
    name: Depreciación y amortización
    description: |
      Métodos, calendarios y registro de la depreciación y la amortización.
  BC-200.40.30:
    name: Deterioro y revaluación de activos
    description: |
      Pruebas de deterioro y revaluación de activos bajo NIIF o GAAP local.
  BC-200.40.40:
    name: Contabilización de bajas de activos
    description: |
      Contabilización de bajas, ventas y cancelaciones de activos fijos.
  BC-200.50:
    name: Gestión de la contabilidad de costos
    description: |
      Objetos de costo, asignaciones de costo y costeo estándar.
  BC-200.50.10:
    name: Gestión de objetos de costo y centros de costo
    description: |
      Definición de centros de costo, órdenes internas y objetos de costo de proyectos.
  BC-200.50.20:
    name: Costeo estándar
    description: |
      Fijación de costos estándar, análisis de variaciones y revaluación.
  BC-200.50.30:
    name: Asignación y absorción de costos
    description: |
      Ciclos de distribución, inductores y absorción de gastos generales.
  BC-200.50.40:
    name: Costeo de productos y servicios
    description: |
      Costeo de productos, servicios y compromisos con clientes.
  BC-200.60:
    name: Gestión de la presentación de informes financieros
    description: |
      Presentación de informes financieros internos y consolidación.
  BC-200.60.10:
    name: Consolidación financiera
    description: |
      Consolidación de entidades jurídicas incluyendo eliminaciones y conversión de divisas.
  BC-200.60.20:
    name: Reporte financiero interno
    description: |
      Producción de informes internos de pérdidas y ganancias, balance y flujo de caja.
  BC-200.60.30:
    name: Reporte por segmento y de gestión
    description: |
      Reporte por segmento y según la visión de gestión.
  BC-200.60.40:
    name: Redacción de revelaciones financieras
    description: |
      Redacción de notas y revelaciones que respaldan los informes financieros.
  BC-200.70:
    name: Presentación de informes estatutarios y regulatorios
    description: |
      Cuentas anuales y presentaciones financieras regulatorias.
  BC-200.70.10:
    name: Elaboración de cuentas anuales
    description: |
      Preparación de los estados financieros anuales de las entidades jurídicas.
  BC-200.70.20:
    name: Presentaciones financieras regulatorias
    description: |
      Declaraciones financieras regulatorias sectoriales y presentaciones prudenciales.
  BC-200.70.30:
    name: Coordinación con la auditoría externa
    description: |
      Relación con los auditores externos y gestión de los entregables de auditoría.
  BC-200.70.40:
    name: Presentación de informes de sostenibilidad y no financieros
    description: |
      Divulgaciones no financieras y de sostenibilidad (p. ej., CSRD, NIIF S1/S2).

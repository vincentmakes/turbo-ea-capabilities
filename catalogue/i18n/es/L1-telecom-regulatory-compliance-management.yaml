locale: es
source: L1-telecom-regulatory-compliance-management.yaml
entries:
  BC-2700:
    name: Cumplimiento regulatorio en telecomunicaciones
    description: |
      Obligaciones regulatorias específicas de telecomunicaciones: servicio universal,
      interceptación legal, retención de datos, servicios de emergencia, accesibilidad,
      neutralidad de red e informes sobre condiciones de licencia, siguiendo los
      reguladores nacionales de telecomunicaciones y las normas ETSI/3GPP de LI.
  BC-2700.10:
    name: Gestión de la obligación de servicio universal
    description: |
      Prestación e informes sobre las obligaciones de servicio universal y los subsidios
      asociados.
  BC-2700.10.10:
    name: Planificación de áreas OSU
    description: |
      Planificación de los compromisos de cobertura y calidad del servicio universal
      por área.
  BC-2700.10.20:
    name: Reporte de subvenciones OSU
    description: |
      Reporte de clientes subvencionados y prestación del servicio a los fondos de
      servicio universal.
  BC-2700.10.30:
    name: Prestación del servicio OSU
    description: |
      Prestación de los servicios OSU obligatorios, incluidas las tarifas subvencionadas
      y los niveles mínimos de servicio.
  BC-2700.20:
    name: Gestión de la interceptación legal
    description: |
      Aprovisionamiento y entrega de la capacidad de interceptación legal bajo mandatos
      autorizados.
  BC-2700.20.10:
    name: Aprovisionamiento de interceptación legal
    description: |
      Aprovisionamiento de objetivos de LI en elementos de red bajo mandatos autorizados.
  BC-2700.20.20:
    name: Entrega de interceptación legal a las autoridades
    description: |
      Entrega de contenido e metadatos interceptados a los centros de monitorización de
      las fuerzas del orden.
  BC-2700.20.30:
    name: Auditoría y control de acceso de interceptación legal
    description: |
      Control de acceso y auditoría de la actividad de LI para prevenir usos no
      autorizados.
  BC-2700.30:
    name: Gestión de la retención de datos de telecomunicaciones
    description: |
      Captura, almacenamiento seguro y entrega autorizada de datos de comunicaciones
      retenidos según los marcos nacionales de retención de datos.
  BC-2700.30.10:
    name: Captura de datos retenidos
    description: |
      Captura de datos de comunicaciones sujetos a obligaciones de retención.
  BC-2700.30.20:
    name: Flujo de trabajo de acceso a datos retenidos
    description: |
      Flujo de trabajo de solicitudes autorizadas de acceso a los datos retenidos por
      parte de autoridades competentes.
  BC-2700.30.30:
    name: Purga de datos retenidos
    description: |
      Eliminación de los datos retenidos al vencimiento de los períodos de retención.
  BC-2700.40:
    name: Gestión de servicios de emergencia
    description: |
      Enrutamiento de llamadas de emergencia, entrega de ubicación y capacidades de
      alerta pública exigidas por los reguladores.
  BC-2700.40.10:
    name: Enrutamiento de llamadas de emergencia
    description: |
      Enrutamiento de las llamadas de emergencia a los centros de respuesta de seguridad
      pública apropiados.
  BC-2700.40.20:
    name: Entrega de ubicación del llamante
    description: |
      Entrega de información de ubicación del llamante a los servicios de emergencia
      conforme a los estándares E911, eCall y AML.
  BC-2700.40.30:
    name: Difusión de alertas de emergencia
    description: |
      Difusión de mensajes de alerta pública por celda y SMS bajo activación autorizada.
  BC-2700.50:
    name: Gestión de la accesibilidad en telecomunicaciones
    description: |
      Prestación de funcionalidades de accesibilidad y resolución de reclamaciones
      relacionadas con la accesibilidad bajo las obligaciones específicas de
      telecomunicaciones.
  BC-2700.50.10:
    name: Soporte de texto en tiempo real y TTY
    description: |
      Soporte de servicios de texto en tiempo real y TTY para usuarios sordos y con
      deficiencia auditiva.
  BC-2700.50.20:
    name: Prestación de funcionalidades de accesibilidad
    description: |
      Prestación de funcionalidades de accesibilidad específicas de telecomunicaciones,
      como servicios de retransmisión y facturas accesibles.
  BC-2700.50.30:
    name: Tramitación de reclamaciones de accesibilidad
    description: |
      Tramitación de reclamaciones relacionadas con la accesibilidad y los informes
      requeridos por el regulador.
  BC-2700.60:
    name: Neutralidad de red y divulgación de gestión de tráfico
    description: |
      Divulgación de las prácticas de gestión del tráfico y cumplimiento de los regímenes
      de neutralidad de red.
  BC-2700.60.10:
    name: Divulgación de la política de gestión de tráfico
    description: |
      Divulgación de las prácticas de gestión del tráfico a clientes y reguladores.
  BC-2700.60.20:
    name: Transparencia en la limitación de velocidad
    description: |
      Reporte transparente de las prácticas de throttling, priorización y zero-rating.
  BC-2700.60.30:
    name: Presentación ante el regulador sobre neutralidad de red
    description: |
      Presentaciones ante los reguladores sobre prácticas y reclamaciones relacionadas
      con la neutralidad de red.
  BC-2700.70:
    name: Informes regulatorios de telecomunicaciones
    description: |
      Presentaciones periódicas de KPIs, datos de mercado y cumplimiento de condiciones
      de licencia ante los reguladores de telecomunicaciones.
  BC-2700.70.10:
    name: Presentación de KPIs de telecomunicaciones
    description: |
      Presentación de KPIs obligatorios sobre cobertura, calidad y rendimiento del
      servicio.
  BC-2700.70.20:
    name: Presentación de datos de mercado de telecomunicaciones
    description: |
      Presentación de datos de mercado sobre suscriptores, ingresos y tráfico.
  BC-2700.70.30:
    name: Reporte de condiciones de licencia
    description: |
      Reporte sobre el cumplimiento de las condiciones de la licencia de operación,
      incluidas las obligaciones de cobertura, despliegue y calidad.

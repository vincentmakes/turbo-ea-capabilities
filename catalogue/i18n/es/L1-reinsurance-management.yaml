locale: es
source: L1-reinsurance-management.yaml
entries:
  BC-2170:
    name: Gestión de reaseguro
    description: |
      Reaseguro cedido y aceptado: diseño de tratados, colocaciones facultativas,
      bordeaux, recobros de siniestros, contabilidad y gestión de la exposición
      a contrapartes de reaseguro.
  BC-2170.10:
    name: Diseño del programa de reaseguro cedido
    description: |
      Análisis de necesidades de reaseguro, estructuración del programa y coordinación
      con el corredor de reaseguro.
  BC-2170.10.10:
    name: Análisis de necesidades de reaseguro
    description: |
      Análisis de las necesidades de reaseguro en función de la cartera, el apetito de riesgo
      y las restricciones de capital.
  BC-2170.10.20:
    name: Estrategia de tratado y facultativo
    description: |
      Estrategia sobre cesiones en tratado frente a facultativo y estructuras proporcionales
      frente a no proporcionales.
  BC-2170.10.30:
    name: Estructuración del programa
    description: |
      Estructuración de programas de reaseguro, capas y retenciones.
  BC-2170.10.40:
    name: Coordinación con el corredor de reaseguro
    description: |
      Coordinación con corredores de reaseguro en la colocación y renovación.
  BC-2170.20:
    name: Administración del reaseguro de tratado
    description: |
      Alta de tratados, cesión de primas, producción de bordeaux y recobros de siniestros de tratado.
  BC-2170.20.10:
    name: Alta y renovación de tratados
    description: |
      Alta y renovación de tratados de reaseguro y colocación de slips.
  BC-2170.20.20:
    name: Cálculo y cesión de primas de tratado
    description: |
      Cálculo de primas de tratado y cesión a los reaseguradores participantes.
  BC-2170.20.30:
    name: Producción de bordeaux de tratado
    description: |
      Producción de bordeaux de primas y siniestros de tratado conforme a la práctica de mercado.
  BC-2170.20.40:
    name: Recobro de siniestros de tratado
    description: |
      Recobro de los pagos de siniestros de tratado de los reaseguradores.
  BC-2170.30:
    name: Administración del reaseguro facultativo
    description: |
      Envío facultativo, seguimiento de la colocación y liquidación de primas y siniestros.
  BC-2170.30.10:
    name: Envío de riesgos facultativos
    description: |
      Envío de riesgos individuales para colocación facultativa.
  BC-2170.30.20:
    name: Seguimiento de la colocación facultativa
    description: |
      Seguimiento de las firmas de colocación facultativa y participaciones entre reaseguradores.
  BC-2170.30.30:
    name: Liquidación de primas y siniestros facultativos
    description: |
      Liquidación de primas facultativas y recobros de siniestros.
  BC-2170.40:
    name: Gestión del reaseguro aceptado
    description: |
      Suscripción entrante, registro de primas, adjudicación de siniestros y coordinación de la retrocesión.
  BC-2170.40.10:
    name: Suscripción de envíos entrantes
    description: |
      Suscripción de envíos de reaseguro entrante y aceptación de riesgos.
  BC-2170.40.20:
    name: Registro de primas entrantes
    description: |
      Registro de primas de reaseguro entrante y ajustes.
  BC-2170.40.30:
    name: Adjudicación de siniestros entrantes
    description: |
      Adjudicación de siniestros de reaseguro entrante y recobros.
  BC-2170.40.40:
    name: Coordinación de la retrocesión
    description: |
      Coordinación de la retrocesión con reaseguradores de segundo nivel.
  BC-2170.50:
    name: Contabilidad y liquidación de reaseguro
    description: |
      Contabilidad de cesiones, seguimiento de recuperables, conciliación de estados de cuenta
      y garantías de contrapartes.
  BC-2170.50.10:
    name: Contabilidad de cesiones y primas
    description: |
      Contabilidad de primas cedidas, comisiones y ajustes.
  BC-2170.50.20:
    name: Seguimiento de recuperables de reaseguro
    description: |
      Seguimiento de los recuperables de reaseguro sobre siniestros pagados y pendientes.
  BC-2170.50.30:
    name: Conciliación de estados de cuenta de reaseguradores
    description: |
      Conciliación de los estados de cuenta de reaseguradores y resolución de disputas.
  BC-2170.50.40:
    name: Gestión de garantías de contrapartes
    description: |
      Gestión de cartas de crédito, fondos de fideicomiso y garantías aportadas por reaseguradores.
  BC-2170.60:
    name: Gestión del riesgo de contraparte en reaseguro
    description: |
      Evaluación crediticia del reasegurador, monitoreo de límites de contraparte y mitigación del impago.
  BC-2170.60.10:
    name: Evaluación crediticia del reasegurador
    description: |
      Evaluación crediticia y de solidez financiera de las contrapartes de reaseguro.
  BC-2170.60.20:
    name: Monitoreo de concentración y límites de contraparte
    description: |
      Monitoreo de los límites de concentración y exposición a contrapartes.
  BC-2170.60.30:
    name: Mitigación del impago del reasegurador
    description: |
      Acciones de mitigación ante escenarios de rebaja de calificación o impago del reasegurador.

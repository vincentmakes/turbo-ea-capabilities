locale: es
source: L1-sales-management.yaml
entries:
  BC-410:
    name: Gestión de ventas
    description: |
      Actividades de lead a pedido: cuentas, pipeline, acuerdos y generación de presupuestos.
  BC-410.10:
    name: Gestión de la estrategia de ventas
    description: |
      Modelo de cobertura, segmentación y planificación de ventas.
  BC-410.10.10:
    name: Diseño del modelo de cobertura de ventas
    description: |
      Definición de segmentos de ventas, territorios y modelos de cobertura comercial.
  BC-410.10.20:
    name: Asignación de territorios y cuentas
    description: |
      Diseño de territorios, asignación de cuentas y reequilibrio de la cartera.
  BC-410.10.30:
    name: Establecimiento de objetivos de ventas
    description: |
      Fijación de objetivos y cuotas de ventas mediante enfoques top-down y bottom-up.
  BC-410.10.40:
    name: Planificación de la capacidad de ventas
    description: |
      Planificación de la capacidad de ventas, curvas de aprendizaje y plantilla comercial.
  BC-410.20:
    name: Gestión de cuentas
    description: |
      Gestión de cuentas estratégicas y cuentas clave.
  BC-410.20.10:
    name: Planificación de cuentas
    description: |
      Planes estratégicos de cuenta y análisis de oportunidades de crecimiento.
  BC-410.20.20:
    name: Gobernanza de cuentas clave
    description: |
      Gobernanza y patrocinio ejecutivo de las cuentas clave de la organización.
  BC-410.20.30:
    name: Desarrollo de relaciones con cuentas
    description: |
      Mapeo de relaciones y gestión del compromiso con los interlocutores en las cuentas.
  BC-410.20.40:
    name: Seguimiento del estado de las cuentas
    description: |
      Métricas de salud de cuentas, cuadros de mando y monitoreo del riesgo de renovación.
  BC-410.30:
    name: Gestión de oportunidades y pipeline
    description: |
      Ciclo de vida del lead, la oportunidad y el acuerdo comercial.
  BC-410.30.10:
    name: Calificación y traspaso de leads
    description: |
      Calificación, puntuación y traspaso de leads provenientes de marketing.
  BC-410.30.20:
    name: Gestión de oportunidades
    description: |
      Creación, calificación y avance de oportunidades a través de las etapas del proceso de ventas.
  BC-410.30.30:
    name: Estrategia y persecución de acuerdos
    description: |
      Persecución estratégica de acuerdos, planes de cierre y revisiones de deals.
  BC-410.30.40:
    name: Previsión del pipeline
    description: |
      Cobertura del pipeline, previsión ponderada y llamadas de compromiso de ventas.
  BC-410.40:
    name: Gestión de presupuestos y configuración
    description: |
      CPQ: configuración, fijación de precios y generación de presupuestos.
  BC-410.40.10:
    name: Configuración de productos
    description: |
      Configuración de productos y soluciones con reglas y restricciones aplicables.
  BC-410.40.20:
    name: Generación de presupuestos
    description: |
      Elaboración de presupuestos y propuestas listas para presentar al cliente.
  BC-410.40.30:
    name: Flujo de aprobación de presupuestos
    description: |
      Flujos de aprobación de descuentos y condiciones no estándar en presupuestos.
  BC-410.40.40:
    name: Conversión de presupuesto a contrato y pedido
    description: |
      Conversión de presupuestos aceptados en pedidos y contratos formalizados.
  BC-410.50:
    name: Gestión de operaciones de ventas
    description: |
      Proceso de ventas, herramientas y habilitación comercial.
  BC-410.50.10:
    name: Gobernanza del proceso y metodología de ventas
    description: |
      Definición y custodia del proceso de ventas y de la metodología comercial.
  BC-410.50.20:
    name: Tecnología y herramientas de ventas
    description: |
      Administración e integración del CRM y las herramientas de apoyo a las ventas.
  BC-410.50.30:
    name: Habilitación de ventas
    description: |
      Playbooks de ventas, contenidos de habilitación y certificación comercial.
  BC-410.50.40:
    name: Datos e higiene de ventas
    description: |
      Calidad de datos del CRM, gobernanza y programas de mantenimiento de la base de datos.
  BC-410.60:
    name: Gestión de ventas por canal
    description: |
      Canales indirectos, distribuidores y revendedores.
  BC-410.60.10:
    name: Reclutamiento de socios de canal
    description: |
      Reclutamiento e incorporación de distribuidores, revendedores y agentes comerciales.
  BC-410.60.20:
    name: Habilitación de socios de canal
    description: |
      Formación, certificación y habilitación de los socios de canal.
  BC-410.60.30:
    name: Gestión del programa de canal
    description: |
      Niveles del programa de canal, incentivos y reglas de participación comercial.
  BC-410.60.40:
    name: Gestión del rendimiento de socios
    description: |
      Seguimiento de las ventas indirectas y métricas de rendimiento de los socios de canal.
  BC-410.70:
    name: Gestión del rendimiento de ventas
    description: |
      Planes de compensación, gestión de cuotas y analítica de ventas.
  BC-410.70.10:
    name: Diseño del plan de compensación de ventas
    description: |
      Diseño de planes de retribución variable, aceleradores e incentivos puntuales (SPIFs).
  BC-410.70.20:
    name: Gestión de cuotas y acreditación
    description: |
      Asignación de cuotas, reglas de acreditación y gestión de cuotas no consumidas.
  BC-410.70.30:
    name: Cálculo de comisiones de ventas
    description: |
      Cálculo, validación y pago de las comisiones del equipo de ventas.
  BC-410.70.40:
    name: Analítica del rendimiento de ventas
    description: |
      Analítica de victorias/pérdidas, productividad y rendimiento individual de los vendedores.

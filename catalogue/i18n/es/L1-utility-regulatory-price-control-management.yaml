locale: es
source: L1-utility-regulatory-price-control-management.yaml
entries:
  BC-3920:
    name: Gestión de regulación y control de precios de la empresa de servicios públicos
    description: |
      Relación con los reguladores del sector de servicios públicos y administración de
      los regímenes de control de precios — interacciones con el regulador, presentaciones
      de control de precios, diseño de la estructura tarifaria, informes regulatorios,
      compromisos de rendimiento del servicio, asignación de costes regulatorios y
      obligaciones de servicio universal y asequibilidad.
  BC-3920.10:
    name: Relación con el regulador de servicios públicos
    description: |
      Gestión cotidiana de la relación y el flujo de información con los reguladores
      sectoriales y los organismos de protección del consumidor.
  BC-3920.10.10:
    name: Gestión de la correspondencia con el regulador
    description: |
      Gestión de la correspondencia entrante y saliente y de las solicitudes de información
      de los reguladores.
  BC-3920.10.20:
    name: Respuesta a consultas regulatorias
    description: |
      Preparación y presentación de respuestas a las consultas regulatorias.
  BC-3920.10.30:
    name: Participación en audiencias regulatorias
    description: |
      Participación en audiencias regulatorias, conferencias técnicas y foros de partes
      interesadas.
  BC-3920.20:
    name: Gestión de la presentación del control de precios
    description: |
      Preparación, presentación y negociación integral de los planes de negocio plurianuales
      del control de precios o de los expedientes tarifarios.
    in_scope:
      - Compilación del plan de negocio (RIIO, PR, expediente tarifario)
      - Comparación de costes y modelización del totex
      - Negociación de los ingresos autorizados y los compromisos de producción
    out_of_scope:
      - Planificación interna de inversiones (BC-3900.40)
      - Participación en el mercado mayorista (BC-3850)
  BC-3920.20.10:
    name: Preparación del plan de negocio
    description: |
      Preparación de los planes de negocio del control de precios (RIIO, PR y equivalentes
      de expediente tarifario).
  BC-3920.20.20:
    name: Comparación de costes y modelización del totex
    description: |
      Comparación de costes y modelización del totex frente a los conjuntos de datos del
      regulador y de los pares.
  BC-3920.20.30:
    name: Negociación de los ingresos autorizados
    description: |
      Negociación con el regulador de los ingresos autorizados, los compromisos de
      producción y los parámetros de incentivos.
  BC-3920.30:
    name: Diseño de la estructura tarifaria
    description: |
      Diseño de las estructuras tarifarias reguladas — cargos de energía, cargos de red
      y cargos fijos — para clientes residenciales, comerciales e industriales.
  BC-3920.30.10:
    name: Diseño de la tarifa de uso de la red
    description: |
      Diseño de las tarifas de uso de la red de distribución y transporte.
  BC-3920.30.20:
    name: Diseño del calendario tarifario minorista
    description: |
      Diseño de los calendarios tarifarios minoristas, incluidas las estructuras por
      franjas horarias y estacionales.
  BC-3920.30.30:
    name: Metodología de cargos de conexión
    description: |
      Metodología de los cargos de conexión y gestión del límite entre actividades
      contestables y no contestables.
  BC-3920.40:
    name: Operaciones de informes regulatorios
    description: |
      Informes reglamentarios periódicos a los reguladores de servicios públicos, incluidos
      los informes anuales de rendimiento, las cuentas regulatorias y las presentaciones
      intermedias.
  BC-3920.40.10:
    name: Informes anuales de rendimiento
    description: |
      Compilación y presentación de los informes anuales de rendimiento a los reguladores.
  BC-3920.40.20:
    name: Preparación de las cuentas regulatorias
    description: |
      Preparación de las cuentas regulatorias según las directrices contables definidas
      por el regulador.
  BC-3920.40.30:
    name: Presentaciones regulatorias ad hoc
    description: |
      Envío de datos ad hoc a los portales regulatorios y atención a las solicitudes de
      información.
  BC-3920.50:
    name: Gestión de los compromisos de rendimiento del servicio
    description: |
      Seguimiento y administración de los incentivos para la entrega de compromisos de
      producción y los niveles de servicio definidos por el regulador.
  BC-3920.50.10:
    name: Seguimiento de los incentivos para la entrega de compromisos de producción
    description: |
      Seguimiento de los ODIs, los compromisos de rendimiento y las ganancias por incentivos.
  BC-3920.50.20:
    name: Administración de los estándares garantizados
    description: |
      Administración de los pagos de los estándares garantizados de servicio a los clientes.
  BC-3920.50.30:
    name: Cálculo de las penalizaciones por rendimiento regulatorio
    description: |
      Cálculo de las penalizaciones y las recompensas por rendimiento regulatorio.
  BC-3920.60:
    name: Asignación de costes regulatorios
    description: |
      Asignación de costes entre unidades de negocio reguladas y no reguladas y entre
      categorías del control de precios según la metodología de asignación de costes.
  BC-3920.60.10:
    name: Mantenimiento de la metodología de asignación de costes
    description: |
      Mantenimiento de las metodologías de asignación de costes aprobadas por el regulador.
  BC-3920.60.20:
    name: Separación de costes entre actividades reguladas y no reguladas
    description: |
      Aplicación periódica de la separación de costes entre actividades reguladas y no
      reguladas.
  BC-3920.60.30:
    name: Clasificación de gasto de capital y explotación
    description: |
      Clasificación del gasto entre inversión y explotación según las definiciones del
      regulador.
  BC-3920.70:
    name: Gestión del servicio universal y la asequibilidad
    description: |
      Ejecución de los programas de obligaciones de servicio universal y los esquemas de
      asequibilidad y pobreza energética/hídrica impuestos por el regulador.
  BC-3920.70.10:
    name: Cumplimiento de la obligación de servicio universal
    description: |
      Cumplimiento de los requisitos de la obligación de servicio universal para los
      clientes minoristas.
  BC-3920.70.20:
    name: Operaciones de programas de pobreza energética e hídrica
    description: |
      Operación de los programas de lucha contra la pobreza energética e hídrica.
  BC-3920.70.30:
    name: Informes de los esquemas de asequibilidad
    description: |
      Informes de la ejecución de los esquemas de asequibilidad al regulador y al gobierno.

locale: es
source: L1-supply-chain-management.yaml
entries:
  BC-520:
    name: Gestión de la cadena de suministro
    description: |
      Planificación, orquestación y ejecución de la cadena de suministro de extremo a extremo para garantizar la disponibilidad de producto al menor coste total.
  BC-520.10:
    name: Gestión de la planificación de la demanda
    description: |
      Previsión de la demanda y planificación estadística y consensuada para anticipar las necesidades del mercado.
  BC-520.10.10:
    name: Previsión estadística de la demanda
    description: |
      Previsiones de demanda basadas en métodos estadísticos y aprendizaje automático.
  BC-520.10.20:
    name: Planificación consensuada de la demanda
    description: |
      Consenso interfuncional sobre el plan de demanda, incluyendo el ajuste comercial.
  BC-520.10.30:
    name: Planificación de la demanda de nuevos productos
    description: |
      Planificación de la demanda para lanzamientos de nuevos productos y descatalogaciones.
  BC-520.10.40:
    name: Detección y configuración de la demanda
    description: |
      Detección de la demanda a corto plazo e iniciativas de configuración de la demanda.
  BC-520.20:
    name: Gestión de la planificación del suministro
    description: |
      Planificación de la red de suministro y equilibrio de fuentes para garantizar la cobertura de la demanda.
  BC-520.20.10:
    name: Planificación de la red de suministro
    description: |
      Planificación de la red de suministro multinivel entre plantas y centros de distribución.
  BC-520.20.20:
    name: Generación del plan de producción
    description: |
      Generación del programa maestro de producción en los centros de suministro.
  BC-520.20.30:
    name: Asignación de suministro
    description: |
      Asignación de suministro restringido entre regiones y clientes.
  BC-520.20.40:
    name: Equilibrio de fuentes de suministro
    description: |
      Equilibrio entre múltiples fuentes de suministro y doble aprovisionamiento.
  BC-520.30:
    name: Gestión de ventas y operaciones
    description: |
      Proceso de S&OP/IBP y alineación interfuncional para equilibrar demanda, suministro y finanzas.
  BC-520.30.10:
    name: Gestión del ciclo S&OP
    description: |
      Orquestación del ciclo mensual de S&OP/IBP y cadencia de reuniones.
  BC-520.30.20:
    name: Revisión de la demanda
    description: |
      Revisión interfuncional del plan de demanda sin restricciones.
  BC-520.30.30:
    name: Revisión del suministro
    description: |
      Revisión de la viabilidad del suministro y las restricciones en el ciclo S&OP.
  BC-520.30.40:
    name: Reconciliación integrada y S&OP ejecutivo
    description: |
      Reconciliación integrada y reuniones de decisión a nivel ejecutivo.
  BC-520.40:
    name: Gestión del cumplimiento de pedidos
    description: |
      Confirmación de pedidos, asignación y orquestación del cumplimiento para satisfacer a los clientes puntualmente.
  BC-520.40.10:
    name: Confirmación de pedidos y disponibilidad para suministrar
    description: |
      Confirmación de pedidos ATP/CTP basada en suministro y capacidad disponible.
  BC-520.40.20:
    name: Orquestación de pedidos
    description: |
      Orquestación del cumplimiento de pedidos entre nodos y canales.
  BC-520.40.30:
    name: Seguimiento y visibilidad de pedidos
    description: |
      Visibilidad del estado del pedido y del envío de extremo a extremo.
  BC-520.40.40:
    name: Devoluciones y cumplimiento inverso
    description: |
      Autorización de devoluciones, logística inversa y enrutamiento para reacondicionamiento.
  BC-520.50:
    name: Gestión de operaciones logísticas
    description: |
      Transporte y operaciones de almacén dentro de la cadena de suministro para mover el producto de forma eficiente.
  BC-520.50.10:
    name: Planificación del transporte
    description: |
      Selección del modo de transporte, enrutamiento y planificación de cargas.
  BC-520.50.20:
    name: Gestión de transportistas
    description: |
      Selección de transportistas, contratos y seguimiento del rendimiento.
  BC-520.50.30:
    name: Operaciones de almacén
    description: |
      Operaciones de recepción, ubicación, picking, embalaje y expedición.
  BC-520.50.40:
    name: Operaciones transfronterizas y de aduanas
    description: |
      Movimientos transfronterizos, despacho aduanero y cumplimiento del comercio exterior.
  BC-520.50.50:
    name: Operaciones de entrega de última milla
    description: |
      Enrutamiento de entrega de última milla, gestión de franjas horarias y confirmación de entrega.
  BC-520.60:
    name: Gestión del riesgo en la cadena de suministro
    description: |
      Gestión de interrupciones, visibilidad y resiliencia para proteger la continuidad de la cadena de suministro.
  BC-520.60.10:
    name: Visibilidad de extremo a extremo de la cadena de suministro
    description: |
      Visibilidad multinivel de proveedores, inventario y envíos.
  BC-520.60.20:
    name: Detección y respuesta ante interrupciones
    description: |
      Detección de interrupciones y acciones de respuesta orquestadas.
  BC-520.60.30:
    name: Diseño de resiliencia de la cadena de suministro
    description: |
      Diseño de red para la resiliencia, incluyendo doble aprovisionamiento y existencias de seguridad.
  BC-520.60.40:
    name: Cumplimiento normativo de la cadena de suministro
    description: |
      Cumplimiento de la diligencia debida en la cadena de suministro y de las regulaciones de comercio exterior.

locale: es
source: L1-hydrocarbon-production-operations-management.yaml
entries:
  BC-3030:
    name: Gestión de operaciones de producción de hidrocarburos
    description: |
      Operación de instalaciones superficiales aguas arriba desde el cabezal
      del pozo hasta el punto de exportación: separación, tratamiento, elevación
      artificial, aseguramiento de flujo, vigilancia de producción y mantenimiento
      de la presión del yacimiento.
  BC-3030.10:
    name: Gestión de operaciones en cabezal de pozo
    description: |
      Operación diaria del equipo de cabezal de pozo, gestión de chokes
      y pruebas de pozos.
  BC-3030.10.10:
    name: Vigilancia del cabezal de pozo
    description: |
      Vigilancia continua de los parámetros de presión, temperatura y
      caudal en el cabezal del pozo.
  BC-3030.10.20:
    name: Gestión de chokes en cabezal de pozo
    description: |
      Ajuste de los chokes de superficie para gestionar el caudal y
      el diferencial de presión del pozo.
  BC-3030.10.30:
    name: Operaciones de pruebas de pozos
    description: |
      Pruebas de pozos rutinarias y de vigilancia para asignación y
      datos del yacimiento.
  BC-3030.20:
    name: Operaciones de separación y tratamiento superficial
    description: |
      Operación de instalaciones superficiales para la separación
      petróleo-agua-gas, estabilización de crudo, tratamiento de agua
      producida y acondicionamiento de gas.
  BC-3030.20.10:
    name: Separación de petróleo, agua y gas
    description: |
      Separación trifásica de los fluidos producidos en instalaciones
      aguas arriba.
  BC-3030.20.20:
    name: Estabilización de crudo
    description: |
      Estabilización del crudo producido hasta las especificaciones
      de exportación.
  BC-3030.20.30:
    name: Tratamiento de agua producida
    description: |
      Tratamiento del agua producida para reinyección o descarga.
  BC-3030.20.40:
    name: Deshidratación y endulzamiento de gas
    description: |
      Deshidratación y endulzamiento en campo de las corrientes de
      gas asociado.
  BC-3030.30:
    name: Gestión de elevación artificial
    description: |
      Selección, operación y optimización de sistemas de elevación artificial.
  BC-3030.30.10:
    name: Operaciones de gas lift
    description: |
      Operaciones de gas lift continuo e intermitente y su vigilancia.
  BC-3030.30.20:
    name: Operaciones de bombas sumergibles eléctricas
    description: |
      Operación, vigilancia y gestión de la vida útil de instalaciones
      de bombas sumergibles eléctricas (ESP).
  BC-3030.30.30:
    name: Operaciones de bombas de vástago
    description: |
      Operación y vigilancia con dinamómetro de bombas de vástago.
  BC-3030.30.40:
    name: Optimización de elevación artificial
    description: |
      Optimización transversal de la selección y parámetros de los
      métodos de elevación artificial.
  BC-3030.40:
    name: Optimización y vigilancia de la producción
    description: |
      Vigilancia y optimización en tiempo real de las tasas de producción,
      cuellos de botella y desempeño de los pozos frente al pronóstico.
  BC-3030.40.10:
    name: Vigilancia de producción en tiempo real
    description: |
      Vigilancia en tiempo real de la producción de pozos y campos
      desde centros de operaciones.
  BC-3030.40.20:
    name: Diagnóstico del desempeño de pozos
    description: |
      Análisis diagnóstico de pozos con bajo rendimiento y recomendaciones
      de acciones correctivas.
  BC-3030.40.30:
    name: Contabilidad de pérdidas de producción
    description: |
      Categorización e informe de las pérdidas de producción frente
      al potencial del campo.
  BC-3030.40.40:
    name: Identificación de cuellos de botella
    description: |
      Identificación de los cuellos de botella del sistema en el yacimiento,
      los pozos y las instalaciones.
  BC-3030.50:
    name: Gestión del aseguramiento de flujo
    description: |
      Prevención y gestión de problemas de aseguramiento de flujo como
      hidratos, ceras, asfaltenos y erosión-corrosión en sistemas productores.
  BC-3030.50.10:
    name: Gestión de hidratos
    description: |
      Prevención y remediación de hidratos en líneas de flujo y risers.
  BC-3030.50.20:
    name: Gestión de ceras y asfaltenos
    description: |
      Prevención y remediación de depósitos de ceras y asfaltenos.
  BC-3030.50.30:
    name: Monitoreo de erosión y corrosión
    description: |
      Monitoreo de erosión y corrosión en líneas de flujo y equipos
      productores.
  BC-3030.50.40:
    name: Operaciones de pigging
    description: |
      Pigging operacional de líneas de flujo para limpieza e inspección.
  BC-3030.60:
    name: Gestión de productos químicos de producción
    description: |
      Selección, dosificación y monitoreo de la eficacia de los productos
      químicos de producción.
  BC-3030.60.10:
    name: Selección y dosificación de productos químicos
    description: |
      Estrategia de selección y dosificación de productos químicos de
      producción a nivel de pozo e instalación.
  BC-3030.60.20:
    name: Gestión de inhibidores de corrosión
    description: |
      Aplicación y seguimiento de los programas de inhibidores de corrosión.
  BC-3030.60.30:
    name: Gestión de inhibidores de incrustaciones
    description: |
      Gestión del tratamiento por squeeze y continuo de inhibidores
      de incrustaciones.
  BC-3030.70:
    name: Operaciones de mantenimiento de presión del yacimiento
    description: |
      Operación de sistemas de inyección de agua y gas y seguimiento
      de la reposición del volumen voidage.
  BC-3030.70.10:
    name: Operaciones de inyección de agua
    description: |
      Operación del tratamiento de agua de inyección y de los pozos
      inyectores.
  BC-3030.70.20:
    name: Operaciones de inyección de gas
    description: |
      Operación de la compresión y los pozos de inyección de gas.
  BC-3030.70.30:
    name: Seguimiento de la reposición del voidage
    description: |
      Seguimiento de las relaciones de reposición del voidage en los
      activos productores.

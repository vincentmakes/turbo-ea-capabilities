locale: es
source: L1-route-charges-management.yaml
entries:
  BC-1270:
    name: Gestión de tarifas de ruta
    description: |
      Cálculo, facturación y cobro de tasas de navegación aérea a los usuarios del espacio aéreo.
  BC-1270.10:
    name: Gestión de zonas de tarificación
    description: |
      Definiciones de zonas de tarificación, normas de facturación y establecimiento de tarifas unitarias.
  BC-1270.10.10:
    name: Definición de zonas de tarificación
    description: |
      Definición de zonas de tarificación en ruta y terminal.
  BC-1270.10.20:
    name: Cálculo de tarifas unitarias
    description: |
      Cálculo y aprobación de tarifas unitarias por zona de tarificación.
  BC-1270.10.30:
    name: Gestión de normas de tarificación
    description: |
      Mantenimiento de la fórmula de tarificación y las normas de exención.
  BC-1270.20:
    name: Gestión del cálculo de tarifas de ruta
    description: |
      Cálculo de tarifas de ruta por vuelo.
  BC-1270.20.10:
    name: Captura de datos de vuelo para tarificación
    description: |
      Captura de los datos de vuelo que sirven de entrada al motor de tarificación.
  BC-1270.20.20:
    name: Cálculo de distancia y peso
    description: |
      Cálculo de la distancia facturable y los factores de peso.
  BC-1270.20.30:
    name: Cálculo de la tarifa
    description: |
      Aplicación de la tarifa unitaria para calcular las tarifas de ruta por vuelo.
  BC-1270.30:
    name: Gestión del cobro de tarifas
    description: |
      Facturación, cobro, procesamiento de pagos y gestión de impagos.
  BC-1270.30.10:
    name: Facturación de tarifas
    description: |
      Generación de facturas mensuales de tarifas de ruta.
  BC-1270.30.20:
    name: Procesamiento de pagos
    description: |
      Recepción y procesamiento de pagos de los usuarios del espacio aéreo.
  BC-1270.30.30:
    name: Gestión de impagos y reclamaciones
    description: |
      Gestión de impagos, reclamaciones y acciones ejecutivas sobre tarifas vencidas.
  BC-1270.40:
    name: Gestión de cuentas de aerolíneas
    description: |
      Cuentas de usuarios del espacio aéreo, estados de cuenta y gestión de reclamaciones.
  BC-1270.40.10:
    name: Mantenimiento de cuentas de usuarios del espacio aéreo
    description: |
      Mantenimiento de los datos maestros de cuentas de usuarios del espacio aéreo.
  BC-1270.40.20:
    name: Provisión de estados e informes
    description: |
      Provisión de estados de cuenta e informes a los usuarios.
  BC-1270.40.30:
    name: Gestión de reclamaciones de tarifas
    description: |
      Gestión de reclamaciones y solicitudes de ajuste.
  BC-1270.50:
    name: Gestión de informes y conciliación de tarifas
    description: |
      Informes a reguladores y conciliaciones al estilo Eurocontrol.
  BC-1270.50.10:
    name: Informes al regulador y al gestor de red
    description: |
      Informes a reguladores y gestores de red equivalentes a Eurocontrol.
  BC-1270.50.20:
    name: Conciliación de tarifas
    description: |
      Conciliación entre datos de vuelo y cálculos de tarifas.
  BC-1270.50.30:
    name: Seguimiento de la recuperación de costes
    description: |
      Seguimiento de la recuperación de costes frente a la base de costes aprobada.

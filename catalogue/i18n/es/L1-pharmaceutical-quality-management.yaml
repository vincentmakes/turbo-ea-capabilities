locale: es
source: L1-pharmaceutical-quality-management.yaml
entries:
  BC-1560:
    name: Gestión de la calidad farmacéutica
    description: |
      Mantiene los sistemas de calidad GxP, gestiona desviaciones, CAPA, cambios y controles de calidad analíticos para garantizar la liberación de lotes conformes.
  BC-1560.10:
    name: Gestión del cumplimiento GMP
    description: |
      Mantiene el marco de cumplimiento GMP y prepara la organización para las inspecciones reguladoras de FDA, EMA y PMDA.
  BC-1560.10.10:
    name: Sistema de gestión de calidad GMP
    description: |
      Mantenimiento del SGC alineado con ICH Q10.
  BC-1560.10.20:
    name: Preparación para inspecciones GMP
    description: |
      Preparación para las inspecciones de FDA, EMA y PMDA.
  BC-1560.10.30:
    name: Programa de auditoría GMP
    description: |
      Programa de auditorías internas GMP.
  BC-1560.20:
    name: Gestión del control de calidad GxP
    description: |
      Opera los laboratorios de control de calidad, ejecuta los análisis de estabilidad e investiga los resultados fuera de especificación.
  BC-1560.20.10:
    name: Operaciones del laboratorio de control de calidad
    description: |
      Operación de los laboratorios de control de calidad GMP.
  BC-1560.20.20:
    name: Transferencia de métodos analíticos
    description: |
      Transferencia de métodos analíticos a los laboratorios de control de calidad.
  BC-1560.20.30:
    name: Ensayos de estabilidad
    description: |
      Ensayos de estabilidad conforme a ICH Q1.
  BC-1560.20.40:
    name: Investigación de resultados fuera de especificación
    description: |
      Investigación de los resultados fuera de especificación (OOS).
  BC-1560.30:
    name: Gestión del aseguramiento de calidad GxP
    description: |
      Proporciona la supervisión de control de calidad en las operaciones mediante la revisión de registros de lote y la vigilancia sobre el terreno.
  BC-1560.30.10:
    name: Revisión del registro de lote
    description: |
      Revisión de los registros de lote ejecutados por el aseguramiento de calidad.
  BC-1560.30.20:
    name: Gestión de documentos GxP
    description: |
      Gestión de documentos controlados en el entorno GxP.
  BC-1560.30.30:
    name: Supervisión de calidad de las operaciones
    description: |
      Supervisión del aseguramiento de calidad en planta durante las operaciones.
  BC-1560.40:
    name: Gestión de desviaciones y CAPA
    description: |
      Captura, investiga y cierra las desviaciones GxP, e implementa CAPA con verificación de eficacia.
  BC-1560.40.10:
    name: Gestión de desviaciones GxP
    description: |
      Captura, investigación y cierre de desviaciones GxP.
  BC-1560.40.20:
    name: Gestión de CAPA GxP
    description: |
      Gestión de CAPA con análisis de causa raíz en el entorno GxP.
  BC-1560.40.30:
    name: Verificación de la eficacia de CAPA
    description: |
      Verificación de la eficacia de las CAPA implementadas.
  BC-1560.50:
    name: Gestión del control de cambios GxP
    description: |
      Captura, evalúa el impacto e implementa los cambios GxP para proteger la calidad del producto a lo largo del ciclo de vida.
  BC-1560.50.10:
    name: Captura de solicitudes de cambio GxP
    description: |
      Captura y clasificación de solicitudes de cambio GxP.
  BC-1560.50.20:
    name: Evaluación del impacto de cambios GxP
    description: |
      Evaluación del impacto de los cambios GxP sobre la calidad del producto.
  BC-1560.50.30:
    name: Seguimiento de la implementación de cambios GxP
    description: |
      Seguimiento de la implementación de los cambios GxP aprobados.
  BC-1560.60:
    name: Gestión de la calidad de proveedores farmacéuticos
    description: |
      Cualifica, audita y gestiona los acuerdos de calidad con los proveedores de materiales y servicios GMP.
  BC-1560.60.10:
    name: Cualificación de proveedores GMP
    description: |
      Cualificación de proveedores de materiales y servicios GMP.
  BC-1560.60.20:
    name: Auditoría de proveedores GMP
    description: |
      Auditorías GMP en las instalaciones de los proveedores.
  BC-1560.60.30:
    name: Gestión de acuerdos de calidad
    description: |
      Negociación y mantenimiento de los acuerdos de calidad con proveedores.
  BC-1560.70:
    name: Gestión de la liberación de lotes
    description: |
      Gestiona la decisión de disposición, la certificación por la Persona Cualificada (QP) y la coordinación de la liberación al mercado.
  BC-1560.70.10:
    name: Decisión de disposición del lote
    description: |
      Decisión de disposición de los lotes fabricados.
  BC-1560.70.20:
    name: Certificación de la Persona Cualificada
    description: |
      Certificación QP conforme al Anexo 16 de la UE.
  BC-1560.70.30:
    name: Coordinación de la liberación al mercado
    description: |
      Coordinación de la liberación al mercado en las distintas regiones.
  BC-1560.80:
    name: Gestión de la revisión anual de calidad del producto
    description: |
      Produce las revisiones anuales de calidad del producto (APQR) y realiza el análisis de tendencias para identificar oportunidades de mejora.
  BC-1560.80.10:
    name: Producción del APQR
    description: |
      Producción de las revisiones anuales de calidad del producto.
  BC-1560.80.20:
    name: Análisis de tendencias de calidad del producto
    description: |
      Análisis de tendencias de los datos de calidad del producto a lo largo del tiempo.
  BC-1560.80.30:
    name: Seguimiento de acciones del APQR
    description: |
      Seguimiento de las acciones derivadas de las conclusiones del APQR.

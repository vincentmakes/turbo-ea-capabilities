locale: es
source: L1-air-traffic-control-operations-management.yaml
entries:
  BC-1210:
    name: Gestión de operaciones de control de tránsito aéreo
    description: |
      Servicios de tránsito aéreo en tiempo real: ruta, aproximación, torre de aeródromo y oceánico.
  BC-1210.10:
    name: Gestión de operaciones de control en ruta
    description: |
      Servicios ATC en ruta a gran altitud.
  BC-1210.10.10:
    name: Provisión de separación en ruta
    description: |
      Provisión de separación horizontal y vertical en el espacio aéreo en ruta.
  BC-1210.10.20:
    name: Detección y resolución de conflictos en ruta
    description: |
      Detección y resolución de conflictos entre vuelos en ruta.
  BC-1210.10.30:
    name: Coordinación en ruta
    description: |
      Coordinación intersectorial e intercentros del tráfico en ruta.
  BC-1210.10.40:
    name: Tratamiento de planes de vuelo
    description: |
      Tratamiento, activación y actualización de planes de vuelo.
  BC-1210.20:
    name: Gestión de operaciones de control de aproximación
    description: |
      Control de aproximación y salida en el área terminal.
  BC-1210.20.10:
    name: Secuenciación y regulación de llegadas
    description: |
      Secuenciación de llegadas, AMAN y operaciones de regulación.
  BC-1210.20.20:
    name: Gestión de salidas
    description: |
      Gestión de salidas, DMAN y cumplimiento de SID.
  BC-1210.20.30:
    name: Vectorización y espaciado en aproximación
    description: |
      Vectorización y espaciado para la aproximación final.
  BC-1210.20.40:
    name: Coordinación en el área terminal
    description: |
      Coordinación entre aproximación y unidades adyacentes.
  BC-1210.30:
    name: Gestión de operaciones de torre de aeródromo
    description: |
      Control de torre en aeródromos, incluido el movimiento en superficie.
  BC-1210.30.10:
    name: Control de pista
    description: |
      Control de pista, incluidas autorizaciones de despegue y aterrizaje.
  BC-1210.30.20:
    name: Control de movimiento en superficie
    description: |
      Control de movimiento en superficie de aeronaves y vehículos.
  BC-1210.30.30:
    name: Entrega de autorizaciones
    description: |
      Emisión de autorizaciones de salida e información previa al vuelo.
  BC-1210.30.40:
    name: Coordinación de aeródromo
    description: |
      Coordinación con operaciones aeroportuarias y servicios de emergencia.
  BC-1210.40:
    name: Gestión de operaciones de control oceánico
    description: |
      Servicios ATC procedimentales y oceánicos.
  BC-1210.40.10:
    name: Provisión de separación procedimental
    description: |
      Separación procedimental en espacio aéreo oceánico sin radar.
  BC-1210.40.20:
    name: Gestión de autorizaciones oceánicas
    description: |
      Emisión de autorizaciones oceánicas y re-autorizaciones.
  BC-1210.40.30:
    name: Operaciones CPDLC y ADS-C
    description: |
      Operaciones oceánicas basadas en enlace de datos mediante CPDLC y ADS-C.
  BC-1210.50:
    name: Gestión de guardia y turnos ATC
    description: |
      Supervisión de guardia, relevos de turno y asignación de posiciones.
  BC-1210.50.10:
    name: Supervisión de guardia
    description: |
      Supervisión operacional de la guardia y el rendimiento del turno.
  BC-1210.50.20:
    name: Gestión del relevo de turno
    description: |
      Briefings estructurados de relevo de turno y documentación asociada.
  BC-1210.50.30:
    name: Asignación de posiciones
    description: |
      Asignación de posiciones y gestión de la fatiga de los controladores.
  BC-1210.60:
    name: Gestión de operaciones de contingencia
    description: |
      Operaciones en modo degradado, respuesta a fallos de sistemas y procedimientos de respaldo.
  BC-1210.60.10:
    name: Operaciones en modo degradado
    description: |
      Operaciones en modo degradado con soporte de sistemas reducido.
  BC-1210.60.20:
    name: Respuesta a fallos de sistemas
    description: |
      Procedimientos de respuesta ante fallos de sistemas ATC.
  BC-1210.60.30:
    name: Transición a sistemas de respaldo
    description: |
      Transición a sistemas ATC de respaldo e instalaciones de contingencia.
  BC-1210.60.40:
    name: Mantenimiento de planes de contingencia
    description: |
      Mantenimiento y ejercitación de planes de contingencia operacional.

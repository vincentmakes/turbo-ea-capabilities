  BC-1320.60.30:
    name: Validação de modelos
    description: |
      Validação independente de modelos de risco de crédito.
  BC-1320.60.40:
    name: Monitorização de modelos
    description: |
      Monitorização contínua do desempenho e recalibração de modelos.

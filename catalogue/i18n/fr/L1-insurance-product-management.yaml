locale: fr
source: L1-insurance-product-management.yaml
entries:
  BC-2100:
    name: Gestion des produits d'assurance
    description: |
      Fabrique de produits d'assurance — définitions des garanties, conditions, tables de tarification,
      offres groupées et cycle de vie pour les branches vie, IARD, santé et spécialités, incluant
      les structures produit de programme et coverholder utilisées sur les marchés à autorités déléguées.
  BC-2100.10:
    name: Gestion du catalogue de produits d'assurance
    description: |
      Catalogue de produits d'assurance, données maîtresses, bibliothèque de garanties et clauses,
      documentation d'information et publication du catalogue.
  BC-2100.10.10:
    name: Gestion des données maîtresses produit
    description: |
      Maintenance des données maîtresses des produits d'assurance et des hiérarchies de produits.
  BC-2100.10.20:
    name: Bibliothèque de garanties et clauses
    description: |
      Maintenance des définitions standardisées de garanties, des clauses de police et de la bibliothèque d'avenants.
  BC-2100.10.30:
    name: Documentation d'information produit
    description: |
      Production et maintenance des documents d'information produit et des résumés des caractéristiques essentielles.
  BC-2100.10.40:
    name: Publication du catalogue produit
    description: |
      Publication du catalogue de produits d'assurance sur l'ensemble des canaux et partenaires.
  BC-2100.20:
    name: Configuration de la tarification et de la cotation produit
    description: |
      Configuration des algorithmes de tarification, des facteurs, des taux déposés, des remises et des surprimes.
  BC-2100.20.10:
    name: Configuration des algorithmes de tarification
    description: |
      Configuration des algorithmes de tarification et des modèles de cotation pour les produits d'assurance.
  BC-2100.20.20:
    name: Maintenance des facteurs et variables de tarification
    description: |
      Maintenance des facteurs, tables et variables de tarification.
  BC-2100.20.30:
    name: Gestion des taux déposés
    description: |
      Gestion des taux déposés, dérogations et approbations dans toutes les juridictions.
  BC-2100.20.40:
    name: Configuration des remises et surprimes
    description: |
      Configuration des remises de prime, surprimes et programmes de crédit.
  BC-2100.30:
    name: Configuration des règles d'éligibilité et de souscription produit
    description: |
      Configuration des règles d'éligibilité, des directives de souscription et des règles de renvoi et de refus intégrées dans le produit.
  BC-2100.30.10:
    name: Configuration des règles d'éligibilité
    description: |
      Configuration des règles d'éligibilité du client et du risque par produit.
  BC-2100.30.20:
    name: Encodage des directives de souscription
    description: |
      Encodage des directives de souscription dans la configuration produit.
  BC-2100.30.30:
    name: Configuration des règles de renvoi et de refus
    description: |
      Configuration des règles de renvoi automatique et de refus par produit.
  BC-2100.40:
    name: Gestion du cycle de vie des produits d'assurance
    description: |
      Introduction de nouveaux produits, dépôt réglementaire, préparation au lancement, revue de performance et retrait.
  BC-2100.40.10:
    name: Concept de nouveau produit
    description: |
      Définition du concept des nouveaux produits d'assurance et gouvernance du comité produit.
  BC-2100.40.20:
    name: Dépôt et approbation du produit
    description: |
      Dépôt réglementaire des produits d'assurance et suivi des approbations dans toutes les juridictions.
  BC-2100.40.30:
    name: Préparation au lancement du produit
    description: |
      Préparation opérationnelle et des canaux pour le lancement des produits d'assurance.
  BC-2100.40.40:
    name: Revue des performances du produit
    description: |
      Revues périodiques des performances et du rapport qualité-prix des produits d'assurance.
  BC-2100.40.50:
    name: Retrait et remplacement du produit
    description: |
      Retrait, remplacement et migration des assurés vers les produits successeurs.
  BC-2100.50:
    name: Gestion des offres groupées de produits d'assurance
    description: |
      Offres groupées multi-branches, produits packagés et suivi des performances des offres groupées.
  BC-2100.50.10:
    name: Définition des offres groupées multi-branches
    description: |
      Définition des offres groupées de produits multi-branches et des règles de packaging.
  BC-2100.50.20:
    name: Configuration des règles d'éligibilité des offres groupées
    description: |
      Règles d'éligibilité et de qualification pour les offres groupées de produits d'assurance.
  BC-2100.50.30:
    name: Suivi des performances des offres groupées
    description: |
      Suivi de l'adoption, de la rétention et de l'économie des offres groupées.
  BC-2100.60:
    name: Gestion des produits spéciaux et de programme
    description: |
      Définition des affaires de programme, autorité produit coverholder et bibliothèque de clauses spéciales.
  BC-2100.60.10:
    name: Définition du programme
    description: |
      Définition des affaires de programme et des structures produit à autorité de souscription déléguée.
  BC-2100.60.20:
    name: Autorité produit coverholder
    description: |
      Définition du périmètre produit et de l'autorité accordée aux coverholders.
  BC-2100.60.30:
    name: Bibliothèque de clauses et avenants spéciaux
    description: |
      Bibliothèque de clauses spéciales, avenants manuscrits et clauses de marché.

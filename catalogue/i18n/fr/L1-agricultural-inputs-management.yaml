locale: fr
source: L1-agricultural-inputs-management.yaml
entries:
  BC-3550:
    name: Gestion des intrants agricoles
    description: |
      Gestion du cycle de vie des intrants agricoles — semences et matériel génétique, engrais, protection des cultures, nutrition animale, médicaments vétérinaires et produits biologiques — incluant la traçabilité, la gestion responsable et les exigences de stockage spécifiques au secteur, distinctes des achats génériques.
  BC-3550.10:
    name: Gestion des semences et du matériel génétique
    description: |
      Approvisionnement en semences certifiées, traitement des semences, suivi du pedigree et des caractères, et gestion des stocks de semences sur l'ensemble du cycle de semis.
    in_scope:
      - Approvisionnement en semences certifiées
      - Application des traitements de semences
      - Suivi du pedigree et des caractères
      - Stocks de semences en dépôt et en exploitation
    out_of_scope:
      - R&D en sélection végétale (BC-810)
      - Recommandation variétale (BC-3530.40)
  BC-3550.10.10:
    name: Approvisionnement et certification des semences
    description: |
      Approvisionnement en semences certifiées selon les schémas de semences OCDE et les essais ISTA.
  BC-3550.10.20:
    name: Application des traitements de semences
    description: |
      Application des traitements et enrobages de semences avant le semis.
  BC-3550.10.30:
    name: Suivi du pedigree et des caractères des semences
    description: |
      Suivi du pedigree, de l'empilement de caractères et des obligations de gestion responsable des semences.
  BC-3550.10.40:
    name: Gestion des stocks de semences
    description: |
      Gestion des stocks de semences dans les dépôts et le stockage en exploitation.
  BC-3550.20:
    name: Gestion des intrants d'engrais
    description: |
      Approvisionnement, stockage, manutention et enregistrements d'application des engrais solides et liquides.
  BC-3550.20.10:
    name: Approvisionnement en engrais
    description: |
      Approvisionnement en engrais simples et composés auprès des fournisseurs et importateurs.
  BC-3550.20.20:
    name: Stockage et manutention des engrais
    description: |
      Stockage et manutention des engrais en exploitation et en dépôt, incluant les dispositifs de rétention.
  BC-3550.20.30:
    name: Enregistrements d'application des engrais
    description: |
      Enregistrements d'application des engrais par parcelle, produit et dose.
  BC-3550.30:
    name: Gestion des intrants de protection des cultures
    description: |
      Approvisionnement, stockage, enregistrements d'application et gestion responsable des contenants vides pour les produits phytosanitaires.
  BC-3550.30.10:
    name: Approvisionnement en produits phytosanitaires
    description: |
      Approvisionnement en produits phytosanitaires autorisés via des canaux agréés.
  BC-3550.30.20:
    name: Stockage et manipulation des pesticides
    description: |
      Stockage, ségrégation et contrôles de manipulation des pesticides par les opérateurs.
  BC-3550.30.30:
    name: Enregistrements d'application des pesticides
    description: |
      Enregistrements d'application des pesticides répondant aux exigences des régulateurs et des systèmes d'assurance.
  BC-3550.30.40:
    name: Gestion responsable des contenants vides
    description: |
      Triple rinçage, retour et recyclage des contenants vides de pesticides.
  BC-3550.40:
    name: Gestion des intrants de nutrition animale
    description: |
      Approvisionnement, stockage et suivi de l'utilisation des ingrédients alimentaires, prémix et additifs pour les élevages.
  BC-3550.40.10:
    name: Approvisionnement en ingrédients alimentaires
    description: |
      Approvisionnement en céréales, tourteaux protéinés et ingrédients fourragers.
  BC-3550.40.20:
    name: Gestion des prémix et additifs
    description: |
      Approvisionnement et gestion des stocks de prémix, minéraux et additifs alimentaires.
  BC-3550.40.30:
    name: Suivi des stocks d'aliments et des rations
    description: |
      Suivi des stocks d'aliments en exploitation et de l'utilisation des rations.
  BC-3550.50:
    name: Gestion des intrants de médicaments vétérinaires
    description: |
      Approvisionnement, stockage en chaîne du froid et enregistrement des utilisations des médicaments vétérinaires et produits biologiques en exploitation.
  BC-3550.50.10:
    name: Approvisionnement en médicaments vétérinaires
    description: |
      Approvisionnement sur ordonnance en médicaments vétérinaires et produits biologiques.
  BC-3550.50.20:
    name: Stockage en chaîne du froid des médicaments vétérinaires
    description: |
      Stockage en chaîne du froid en exploitation et gestion des excursions thermiques pour les médicaments vétérinaires.
  BC-3550.50.30:
    name: Enregistrement de l'utilisation des médicaments vétérinaires
    description: |
      Enregistrement de l'utilisation avec les détails du lot, de la dose, de l'animal et de l'opérateur.
  BC-3550.60:
    name: Intrants biologiques et amendements du sol
    description: |
      Approvisionnement en intrants biologiques, gestion du fumier et du compost, et fourniture de chaux et d'amendements du sol.
  BC-3550.60.10:
    name: Approvisionnement en intrants biologiques
    description: |
      Approvisionnement en biostimulants, biofertilisants et inoculants microbiens.
  BC-3550.60.20:
    name: Gestion du fumier et du compost
    description: |
      Stockage du fumier, compostage et opérations de valorisation des nutriments en exploitation.
  BC-3550.60.30:
    name: Approvisionnement en chaux et amendements du sol
    description: |
      Approvisionnement en chaux, gypse et autres amendements du sol.

locale: fr
source: L1-aquaculture-operations-management.yaml
entries:
  BC-3520:
    name: Gestion des opérations d'aquaculture
    description: |
      Production d'espèces aquatiques d'élevage — approvisionnement en géniteurs et empoissonnement, alimentation, qualité de l'eau, santé animale, opérations de cages et d'étangs, récolte et conformité environnementale pour les poissons, coquillages et plantes aquatiques.
  BC-3520.10:
    name: Opérations d'approvisionnement et d'empoissonnement
    description: |
      Approvisionnement en géniteurs, opérations d'écloserie et empoissonnement de juvéniles dans les systèmes de grossissement.
  BC-3520.10.10:
    name: Approvisionnement en géniteurs
    description: |
      Approvisionnement et quarantaine de géniteurs pour la production en écloserie.
  BC-3520.10.20:
    name: Opérations d'écloserie
    description: |
      Incubation des œufs, élevage larvaire et production de juvéniles en écloserie.
  BC-3520.10.30:
    name: Opérations d'empoissonnement en juvéniles
    description: |
      Empoissonnement de juvéniles dans les cages, étangs et bassins de grossissement.
  BC-3520.20:
    name: Opérations d'alimentation en aquaculture
    description: |
      Planification de l'alimentation, distribution et surveillance de l'indice de consommation pour les espèces aquatiques d'élevage.
  BC-3520.20.10:
    name: Planification des rations alimentaires
    description: |
      Planification des rations alimentaires par espèce, stade de vie et température de l'eau.
  BC-3520.20.20:
    name: Opérations de distribution des aliments
    description: |
      Distribution manuelle, mécanique et automatisée des aliments dans les cages et étangs.
  BC-3520.20.30:
    name: Surveillance de l'indice de consommation
    description: |
      Surveillance de l'indice de conversion alimentaire par rapport aux plans d'alimentation.
  BC-3520.30:
    name: Gestion de la qualité de l'eau
    description: |
      Surveillance continue de la qualité de l'eau, oxygénation et traitement dans les systèmes aquacoles à flux continu et en recirculation.
    in_scope:
      - Surveillance de l'oxygène dissous et de la température
      - Opérations d'aération et d'oxygénation
      - Traitement et recirculation de l'eau
  BC-3520.30.10:
    name: Surveillance de la qualité de l'eau
    description: |
      Surveillance en temps réel de l'oxygène dissous, de la température, de la salinité et du pH.
  BC-3520.30.20:
    name: Opérations d'aération et d'oxygénation
    description: |
      Exploitation des systèmes d'aération et d'injection d'oxygène.
  BC-3520.30.30:
    name: Traitement et recirculation de l'eau
    description: |
      Traitement mécanique, biologique et UV de l'eau dans les systèmes en recirculation.
  BC-3520.40:
    name: Gestion de la santé des animaux aquatiques
    description: |
      Surveillance des maladies, traitement, biosécurité et enregistrement de la mortalité pour les espèces aquatiques d'élevage.
  BC-3520.40.10:
    name: Surveillance des maladies aquatiques
    description: |
      Surveillance des pathogènes, des parasites et des maladies aquatiques à déclaration obligatoire.
  BC-3520.40.20:
    name: Opérations de traitement en aquaculture
    description: |
      Opérations de traitement en bain et en eau incluant le contrôle des poux de mer.
  BC-3520.40.30:
    name: Opérations de biosécurité en aquaculture
    description: |
      Biosécurité du site, désinfection des équipements et contrôles des mouvements.
  BC-3520.40.40:
    name: Enregistrement de la mortalité
    description: |
      Enregistrement quotidien de la mortalité, classification et gestion de l'élimination.
  BC-3520.50:
    name: Opérations de cages et d'étangs
    description: |
      Exploitation quotidienne et intégrité des cages, filets et étangs de grossissement, incluant la prévention de la prédation et l'antiencrassement.
  BC-3520.50.10:
    name: Inspection des filets et des cages
    description: |
      Inspection de routine des filets, cages et mouillages pour vérifier leur intégrité.
  BC-3520.50.20:
    name: Prévention de la prédation et des évasions
    description: |
      Opérations de dissuasion des prédateurs et de prévention des évasions.
  BC-3520.50.30:
    name: Opérations d'antiencrassement
    description: |
      Nettoyage des filets et opérations d'antiencrassement des infrastructures immergées.
  BC-3520.60:
    name: Opérations de récolte en aquaculture
    description: |
      Échantillonnage avant récolte, exécution de la récolte et maintien en vivant pour l'expédition en transformation ou sur les marchés du vivant.
  BC-3520.60.10:
    name: Échantillonnage avant récolte
    description: |
      Échantillonnage avant récolte de la taille, de la qualité et des résidus.
  BC-3520.60.20:
    name: Exécution de la récolte
    description: |
      Concentration, pompage, étourdissement et exécution de la récolte.
  BC-3520.60.30:
    name: Maintien en vivant et transfert
    description: |
      Maintien en vivant et transfert par bien-boat ou citerne vers le transformateur ou le marché.
  BC-3520.70:
    name: Conformité environnementale de l'aquaculture
    description: |
      Surveillance et reporting environnemental à l'échelle du site requis par les licences aquacoles et les schémas de certification.
  BC-3520.70.10:
    name: Surveillance environnementale du site
    description: |
      Surveillance environnementale à l'échelle du site selon les conditions de licence.
  BC-3520.70.20:
    name: Reporting des effluents
    description: |
      Reporting des rejets de nutriments et d'effluents aux régulateurs.
  BC-3520.70.30:
    name: Évaluation de l'impact benthique
    description: |
      Levés d'impact benthique et suivi de la remédiation sous les sites de cages.

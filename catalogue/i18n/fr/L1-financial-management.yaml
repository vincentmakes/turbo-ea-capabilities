locale: fr
source: L1-financial-management.yaml
entries:
  BC-200:
    name: Gestion financière
    description: |
      Comptabilité, contrôle de gestion, reporting statutaire et de gestion, budgétisation.
  BC-200.10:
    name: Gestion du grand livre
    description: |
      Plan comptable, écritures et clôture périodique.
  BC-200.10.10:
    name: Gestion du plan comptable
    description: |
      Définition et gouvernance du plan comptable et des hiérarchies de comptes.
  BC-200.10.20:
    name: Traitement des écritures comptables
    description: |
      Écritures manuelles et automatisées avec workflow d'approbation.
  BC-200.10.30:
    name: Comptabilité interentreprises
    description: |
      Transactions interentreprises, éliminations et rapprochements.
  BC-200.10.40:
    name: Clôture périodique
    description: |
      Calendrier de clôture, charges à payer et certifications de clôture.
  BC-200.10.50:
    name: Rapprochement des comptes
    description: |
      Rapprochements et justifications des comptes du bilan.
  BC-200.20:
    name: Gestion des comptes fournisseurs
    description: |
      Traitement des factures, paiements et comptabilité fournisseurs.
  BC-200.20.10:
    name: Réception et validation des factures fournisseurs
    description: |
      Réception, capture et rapprochement à trois voies des factures fournisseurs.
  BC-200.20.20:
    name: Exécution des campagnes de paiement
    description: |
      Programmation et exécution des campagnes de règlement fournisseurs.
  BC-200.20.30:
    name: Gestion des données comptables fournisseurs
    description: |
      Données financières de référence fournisseurs, coordonnées bancaires et attributs fiscaux.
  BC-200.20.40:
    name: Traitement des notes de frais
    description: |
      Capture, approbation et remboursement des notes de frais des employés.
  BC-200.20.50:
    name: Rapprochement du sous-livre fournisseurs
    description: |
      Rapprochement des relevés fournisseurs et du sous-livre comptes fournisseurs.
  BC-200.30:
    name: Gestion des comptes clients
    description: |
      Facturation clients, recouvrement et imputation des encaissements.
  BC-200.30.10:
    name: Facturation clients
    description: |
      Génération et émission des factures et avoirs clients.
  BC-200.30.20:
    name: Imputation des encaissements
    description: |
      Rapprochement des règlements clients avec les créances ouvertes.
  BC-200.30.30:
    name: Gestion du recouvrement
    description: |
      Relances, stratégie de recouvrement et suivi des paiements clients.
  BC-200.30.40:
    name: Risque crédit et limites clients
    description: |
      Évaluation du crédit client, fixation des limites et blocages de crédit.
  BC-200.30.50:
    name: Gestion des litiges et déductions
    description: |
      Instruction et résolution des litiges et déductions sur factures.
  BC-200.40:
    name: Comptabilité des immobilisations
    description: |
      Registres des actifs, amortissements et dépréciations.
  BC-200.40.10:
    name: Maintenance du registre des immobilisations
    description: |
      Capitalisation, classification et suivi des immobilisations.
  BC-200.40.20:
    name: Amortissement et dépréciation
    description: |
      Méthodes, tableaux et comptabilisation des amortissements.
  BC-200.40.30:
    name: Dépréciation et réévaluation des actifs
    description: |
      Tests de dépréciation et réévaluation des actifs selon les IFRS ou les normes comptables locales.
  BC-200.40.40:
    name: Comptabilisation des cessions d'actifs
    description: |
      Comptabilisation des mises au rebut, ventes et sorties d'immobilisations.
  BC-200.50:
    name: Gestion de la comptabilité analytique
    description: |
      Objets de coût, clés de répartition et coûts standards.
  BC-200.50.10:
    name: Gestion des objets de coût et des centres de coût
    description: |
      Définition des centres de coût, ordres internes et objets de coût projet.
  BC-200.50.20:
    name: Coûts standards
    description: |
      Fixation des coûts standards, analyse des écarts et réévaluation.
  BC-200.50.30:
    name: Clés de répartition et absorption des coûts
    description: |
      Cycles de répartition, inducteurs et absorption des frais généraux.
  BC-200.50.40:
    name: Coûts des produits et services
    description: |
      Détermination des coûts des produits, services et relations clients.
  BC-200.60:
    name: Gestion du reporting financier
    description: |
      Reporting financier interne et consolidation.
  BC-200.60.10:
    name: Consolidation financière
    description: |
      Consolidation des entités juridiques, y compris les éliminations et la conversion des devises.
  BC-200.60.20:
    name: Reporting financier interne
    description: |
      Production des rapports internes de résultat, de bilan et de flux de trésorerie.
  BC-200.60.30:
    name: Reporting par segment et de gestion
    description: |
      Reporting par segment et selon les vues de gestion.
  BC-200.60.40:
    name: Rédaction des informations financières à divulguer
    description: |
      Rédaction des notes et des informations à divulguer dans les rapports financiers.
  BC-200.70:
    name: Reporting statutaire et réglementaire
    description: |
      Comptes statutaires et soumissions financières réglementaires.
  BC-200.70.10:
    name: Préparation des comptes statutaires
    description: |
      Établissement des états financiers statutaires des entités juridiques.
  BC-200.70.20:
    name: Soumissions financières réglementaires
    description: |
      Déclarations financières sectorielles et soumissions prudentielles.
  BC-200.70.30:
    name: Coordination de l'audit externe
    description: |
      Liaison avec les auditeurs externes et gestion des livrables d'audit.
  BC-200.70.40:
    name: Reporting de durabilité et extra-financier
    description: |
      Informations extra-financières et de durabilité (ex. CSRD, IFRS S1/S2).

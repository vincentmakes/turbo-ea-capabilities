locale: fr
source: L1-insurance-investment-management.yaml
entries:
  BC-2200:
    name: Gestion des investissements d'assurance
    description: |
      Gestion de l'actif en couverture des engagements d'un assureur investisseur —
      politique d'investissement, gestion actif-passif, allocation stratégique et
      tactique d'actifs, supervision des gérants, risque d'investissement et
      conformité, et reporting d'investissement.

  BC-2200.10:
    name: Gestion de la politique et de la stratégie d'investissement
    description: |
      Déclaration de politique d'investissement, définition des mandats et intégration
      de la politique d'investissement ESG.

  BC-2200.10.10:
    name: Maintenance de la déclaration de politique d'investissement
    description: |
      Maintenance de la déclaration de politique d'investissement et alignement sur
      le principe de la personne prudente.

  BC-2200.10.20:
    name: Définition des mandats d'investissement
    description: |
      Définition des mandats d'investissement par portefeuille, branche et profil
      de risque.

  BC-2200.10.30:
    name: Intégration de la politique ESG
    description: |
      Intégration des politiques ESG et de gérance dans les mandats d'investissement.

  BC-2200.20:
    name: Gestion actif-passif
    description: |
      Modélisation ALM et adossement des flux de trésorerie, surveillance de la
      duration et de la convexité, et calibrage des coussins de liquidité.

  BC-2200.20.10:
    name: Modélisation ALM et adossement des flux de trésorerie
    description: |
      Modélisation ALM et adossement des flux de trésorerie des actifs aux
      engagements d'assurance.

  BC-2200.20.20:
    name: Surveillance de la duration et de la convexité
    description: |
      Surveillance des écarts de duration et de convexité entre actifs et passifs.

  BC-2200.20.30:
    name: Calibrage des coussins de liquidité
    description: |
      Calibrage des coussins de liquidité pour faire face aux sorties de sinistres
      attendues et sous stress.

  BC-2200.30:
    name: Allocation stratégique et tactique d'actifs
    description: |
      Décisions d'allocation stratégique et tactique d'actifs et rééquilibrage.

  BC-2200.30.10:
    name: Définition de l'allocation stratégique d'actifs
    description: |
      Définition des allocations stratégiques d'actifs à long terme par classe
      d'actifs.

  BC-2200.30.20:
    name: Décisions d'allocation tactique d'actifs
    description: |
      Décisions d'allocation tactique dans les fourchettes stratégiques définies.

  BC-2200.30.30:
    name: Rééquilibrage des allocations
    description: |
      Rééquilibrage périodique et événementiel vers les allocations cibles.

  BC-2200.40:
    name: Supervision des mandats et des gérants d'investissement
    description: |
      Sélection des gérants externes, conformité aux mandats, revue de performance
      et supervision des frais de gestion.

  BC-2200.40.10:
    name: Sélection des gérants externes
    description: |
      Sélection et intégration des gérants d'investissement externes.

  BC-2200.40.20:
    name: Surveillance de la conformité aux mandats
    description: |
      Surveillance du respect des mandats et gestion des dépassements.

  BC-2200.40.30:
    name: Revue de performance des gérants
    description: |
      Revue périodique de la performance des gérants d'investissement externes.

  BC-2200.40.40:
    name: Supervision des frais de gestion
    description: |
      Supervision des frais de gestion et des évaluations du rapport qualité-prix.

  BC-2200.50:
    name: Surveillance du risque d'investissement et de la conformité
    description: |
      Surveillance des limites d'investissement, des limites de contrepartie et
      d'émetteur, et de l'éligibilité des actifs sous Solvabilité II.

  BC-2200.50.10:
    name: Surveillance des limites d'investissement
    description: |
      Surveillance des limites d'investissement par classe d'actifs et facteur de
      risque.

  BC-2200.50.20:
    name: Surveillance des limites de contrepartie et d'émetteur
    description: |
      Surveillance de la concentration et des limites par contrepartie et émetteur.

  BC-2200.50.30:
    name: Surveillance de l'éligibilité des actifs sous Solvabilité II
    description: |
      Surveillance de l'éligibilité des actifs au regard des règles Solvabilité II
      et équivalentes.

  BC-2200.60:
    name: Performance et reporting d'investissement
    description: |
      Mesure et attribution de la performance, et reporting d'investissement au
      conseil d'administration et au régulateur.

  BC-2200.60.10:
    name: Mesure de la performance des portefeuilles
    description: |
      Mesure de la performance des portefeuilles par rapport aux indices de référence
      et aux engagements.

  BC-2200.60.20:
    name: Analyse d'attribution
    description: |
      Attribution de la performance par allocation, sélection et devise.

  BC-2200.60.30:
    name: Reporting d'investissement au conseil et au régulateur
    description: |
      Production du reporting d'investissement à destination du conseil
      d'administration, de l'ALCO et du régulateur.

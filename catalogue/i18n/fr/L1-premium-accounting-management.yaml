locale: fr
source: L1-premium-accounting-management.yaml
entries:
  BC-2150:
    name: Comptabilité des primes
    description: |
      Facturation des primes, encaissement, règlement des comptes courtiers et
      commissions, mécanismes de réserve et d'acquisition des primes, relances et
      comptabilité de la taxe sur les primes d'assurance.

  BC-2150.10:
    name: Gestion de la facturation des primes
    description: |
      Génération des factures, planification des échéances, acheminement de la
      facturation et ajustements.

  BC-2150.10.10:
    name: Génération des factures de prime
    description: |
      Génération des factures de prime et des relevés par cycle de facturation.

  BC-2150.10.20:
    name: Configuration des échéanciers de paiement
    description: |
      Configuration des échéanciers de paiement des primes et des frais de
      financement.

  BC-2150.10.30:
    name: Acheminement en facturation directe et par agence
    description: |
      Acheminement de la facturation entre les dispositifs de facturation directe et
      par agence.

  BC-2150.10.40:
    name: Ajustements de facturation et avoirs
    description: |
      Émission d'ajustements de facturation et d'avoirs suite aux avenants et
      résiliations.

  BC-2150.20:
    name: Gestion de l'encaissement des primes
    description: |
      Réception et imputation des paiements, opérations de prélèvement automatique,
      remboursements et gestion de la boîte aux lettres de dépôt.

  BC-2150.20.10:
    name: Réception et imputation des paiements
    description: |
      Réception des paiements de prime et imputation sur les comptes de polices.

  BC-2150.20.20:
    name: Opérations de prélèvement et paiement récurrent
    description: |
      Exploitation des dispositifs de prélèvement automatique, de carte récurrente et
      de virement permanent.

  BC-2150.20.30:
    name: Traitement des remboursements de prime
    description: |
      Traitement des remboursements de prime à la suite d'avenants et de
      résiliations.

  BC-2150.20.40:
    name: Boîte de dépôt et allocation de trésorerie
    description: |
      Réception via boîte de dépôt, allocation de trésorerie et gestion des
      exceptions.

  BC-2150.30:
    name: Règlement des comptes courtiers et producteurs
    description: |
      Relevés producteurs, règlement prime nette de commission et rapprochement des
      comptes de confiance.

  BC-2150.30.10:
    name: Génération des relevés producteurs
    description: |
      Génération des relevés de prime et de commission destinés aux producteurs.

  BC-2150.30.20:
    name: Règlement prime nette de commission
    description: |
      Règlement de la prime nette de commission à destination et en provenance des
      producteurs.

  BC-2150.30.30:
    name: Rapprochement des comptes de confiance producteurs
    description: |
      Rapprochement des comptes de confiance des producteurs et des soldes IBA.

  BC-2150.40:
    name: Gestion des réserves et de l'acquisition des primes
    description: |
      Calcul des primes non acquises, comptabilisation des primes acquises et suivi
      des coûts d'acquisition différés.

  BC-2150.40.10:
    name: Calcul des primes non acquises
    description: |
      Calcul des réserves de primes non acquises sur les polices en vigueur.

  BC-2150.40.20:
    name: Comptabilisation des primes acquises
    description: |
      Comptabilisation des primes acquises par période comptable.

  BC-2150.40.30:
    name: Suivi des coûts d'acquisition différés
    description: |
      Suivi des coûts d'acquisition différés (DAC) par cohortes de produits.

  BC-2150.50:
    name: Gestion du recouvrement et des relances
    description: |
      Surveillance des créances échues, opérations de relance, résiliation pour
      non-paiement et passage en pertes.

  BC-2150.50.10:
    name: Surveillance des créances échues
    description: |
      Surveillance des créances de prime échues auprès des assurés et des
      producteurs.

  BC-2150.50.20:
    name: Opérations de relance et rappels
    description: |
      Envoi de lettres de relance, de rappels et de communications sur les impayés.

  BC-2150.50.30:
    name: Traitement de la résiliation pour non-paiement
    description: |
      Déclenchement des procédures de résiliation pour prime impayée.

  BC-2150.50.40:
    name: Passage en pertes irrécouvrables
    description: |
      Approbation et comptabilisation des passages en pertes sur primes
      irrécouvrables.

  BC-2150.60:
    name: Comptabilité des taxes et prélèvements
    description: |
      Calcul de la taxe sur les primes d'assurance, collecte du droit de timbre et
      des prélèvements, et support aux déclarations de taxe sur les primes.

  BC-2150.60.10:
    name: Calcul de la taxe sur les primes d'assurance
    description: |
      Calcul de la taxe sur les primes d'assurance selon les juridictions et les
      types de produits.

  BC-2150.60.20:
    name: Collecte du droit de timbre et des prélèvements
    description: |
      Collecte et reversement des droits de timbre et des prélèvements statutaires.

  BC-2150.60.30:
    name: Support aux déclarations de taxe sur les primes
    description: |
      Production des données sous-jacentes et des rapprochements pour les
      déclarations de taxe sur les primes.

locale: fr
source: L1-permits-licences-authorisations-management.yaml
entries:
  BC-3240:
    name: Gestion des permis, licences et autorisations
    description: |
      Délivrance, renouvellement, suspension, révocation et tenue du registre des permis,
      licences et autorisations accordés par le gouvernement aux personnes, aux entreprises
      et aux activités, incluant les autorisations professionnelles, environnementales
      et opérationnelles.
  BC-3240.10:
    name: Réception et triage des demandes
    description: |
      Réception, vérification de la complétude et triage des demandes de permis,
      licences et autorisations.
  BC-3240.10.10:
    name: Dépôt des demandes
    description: |
      Dépôt multicanal des demandes de permis et de licences.
  BC-3240.10.20:
    name: Vérification de la complétude
    description: |
      Vérification que les dossiers sont complets et satisfont aux exigences documentaires.
  BC-3240.10.30:
    name: Routage des demandes
    description: |
      Routage des demandes vers l'autorité de délivrance et l'instructeur compétents.
  BC-3240.10.40:
    name: Évaluation et perception des droits
    description: |
      Évaluation et perception des droits statutaires de demande et de licence.
  BC-3240.20:
    name: Évaluation de l'éligibilité et des qualifications
    description: |
      Évaluation de la capacité du demandeur, de ses qualifications et des critères statutaires
      pour l'autorisation demandée.
  BC-3240.20.10:
    name: Évaluation de la probité
    description: |
      Évaluation de la probité, de l'intégrité et des antécédents disqualifiants du demandeur.
  BC-3240.20.20:
    name: Vérification des qualifications
    description: |
      Vérification des qualifications, compétences et prérequis pour la licence.
  BC-3240.20.30:
    name: Coordination des vérifications des antécédents
    description: |
      Coordination des vérifications des antécédents, du casier judiciaire et de sécurité si nécessaire.
  BC-3240.20.40:
    name: Évaluation de l'intérêt public
    description: |
      Évaluation des critères statutaires d'intérêt public, environnementaux ou d'usage des sols.
  BC-3240.30:
    name: Opérations de délivrance et de renouvellement
    description: |
      Décision, délivrance et renouvellement des permis, licences et autorisations
      incluant les conditions, la durée et les justificatifs.
  BC-3240.30.10:
    name: Décision d'octroi de licence
    description: |
      Prise de décision sur l'octroi, le refus ou l'octroi conditionnel de permis et licences.
  BC-3240.30.20:
    name: Émission des justificatifs
    description: |
      Production et émission des justificatifs de licence physiques et numériques.
  BC-3240.30.30:
    name: Traitement des renouvellements
    description: |
      Traitement des demandes de renouvellement et des vérifications d'éligibilité continue.
  BC-3240.30.40:
    name: Traitement des modifications et des endorsements
    description: |
      Traitement des modifications, des endorsements et des changements de conditions.
  BC-3240.40:
    name: Inspection et vérification de la conformité
    description: |
      Inspection, audit et vérification de la conformité des titulaires de licence aux conditions
      du permis et aux obligations statutaires.
  BC-3240.40.10:
    name: Planification des inspections
    description: |
      Planification et programmation fondées sur le risque des inspections de conformité.
  BC-3240.40.20:
    name: Exécution des inspections sur le terrain
    description: |
      Exécution des inspections sur site et collecte des preuves.
  BC-3240.40.30:
    name: Révision des rapports de conformité
    description: |
      Révision des rapports de conformité obligatoires et des auto-certifications soumis par les titulaires.
  BC-3240.50:
    name: Suspension, révocation et sanction
    description: |
      Mesures d'application incluant les mises en demeure, la suspension, la révocation,
      les pénalités civiles et les sanctions pour les titulaires non conformes.
  BC-3240.50.10:
    name: Investigation des non-conformités
    description: |
      Investigation des infractions présumées aux conditions de licence.
  BC-3240.50.20:
    name: Décision de mesure d'application
    description: |
      Prise de décision sur les mesures d'application allant des avertissements à la révocation.
  BC-3240.50.30:
    name: Émission des pénalités civiles
    description: |
      Émission, enregistrement et recouvrement des pénalités civiles.
  BC-3240.50.40:
    name: Exécution des suspensions et révocations
    description: |
      Exécution des ordres de suspension et de révocation et retrait des justificatifs.
  BC-3240.60:
    name: Gestion du registre des licences
    description: |
      Maintenance et divulgation publique des registres des permis et licences délivrés,
      suspendus et révoqués.
  BC-3240.60.10:
    name: Maintenance du registre
    description: |
      Maintenance des registres faisant autorité des licences et permis.
  BC-3240.60.20:
    name: Divulgation publique du registre
    description: |
      Publication des registres accessibles au public et des services de recherche.
  BC-3240.60.30:
    name: Services de vérification du registre
    description: |
      Fourniture de services de vérification des justificatifs aux parties utilisatrices.

locale: fr
source: L1-petroleum-joint-venture-management.yaml
entries:
  BC-3110:
    name: Gestion des coentreprises pétrolières
    description: |
      Administration des accords d'exploitation conjointe, des concessions et des contrats
      de partage de production en amont — comités d'exploitation, approbations AFE, facturation
      d'intérêts conjoints, appels de fonds, obligations de licence et rapports aux partenaires
      et aux gouvernements hôtes.
  BC-3110.10:
    name: Administration de l'accord d'exploitation conjointe
    description: |
      Rédaction, administration et gouvernance des accords d'exploitation conjointe incluant
      les processus du comité d'exploitation et les approbations AFE.
  BC-3110.10.10:
    name: Rédaction et renégociation des accords d'exploitation conjointe
    description: |
      Rédaction, annotation et renégociation périodique des accords d'exploitation conjointe.
  BC-3110.10.20:
    name: Coordination du comité d'exploitation
    description: |
      Coordination des réunions OPCOM, TECCOM et des sous-comités.
  BC-3110.10.30:
    name: Gestion des autorisations de dépenses
    description: |
      Émission, approbation et suivi des autorisations de dépenses (AFE).
  BC-3110.10.40:
    name: Suivi des droits de vote et des approbations
    description: |
      Suivi des droits de vote des partenaires et des seuils d'approbation JOA.
  BC-3110.20:
    name: Facturation des intérêts conjoints
    description: |
      Préparation, audit et résolution des litiges sur les factures d'intérêts conjoints.
  BC-3110.20.10:
    name: Préparation des factures d'intérêts conjoints
    description: |
      Préparation des factures mensuelles d'intérêts conjoints destinées aux partenaires.
  BC-3110.20.20:
    name: Coordination des audits d'intérêts conjoints
    description: |
      Coordination des audits d'intérêts conjoints menés par les partenaires.
  BC-3110.20.30:
    name: Résolution des litiges de facturation des intérêts conjoints
    description: |
      Instruction et résolution des litiges relatifs à la facturation des intérêts conjoints.
  BC-3110.30:
    name: Gestion des appels de fonds et du financement
    description: |
      Émission des appels de fonds, réception du financement des partenaires et gestion des défauts.
  BC-3110.30.10:
    name: Émission des appels de fonds
    description: |
      Émission des appels de fonds mensuels et supplémentaires aux partenaires.
  BC-3110.30.20:
    name: Réception du financement des partenaires
    description: |
      Réception et réconciliation du financement des partenaires suite aux appels de fonds.
  BC-3110.30.30:
    name: Gestion des défauts de financement
    description: |
      Gestion des positions des partenaires défaillants selon les recours prévus par le JOA.
  BC-3110.40:
    name: Gestion des obligations de licence et de concession
    description: |
      Suivi des engagements du programme de travaux, des redevances et des obligations
      de rétrocession de licence.
  BC-3110.40.10:
    name: Suivi des engagements du programme de travaux
    description: |
      Suivi des obligations minimales de travaux et des engagements d'exploration.
  BC-3110.40.20:
    name: Calcul des redevances de concession
    description: |
      Calcul des redevances dues aux gouvernements hôtes selon les termes de la concession.
  BC-3110.40.30:
    name: Gestion des rétrocessions de licence
    description: |
      Gestion des rétrocessions partielles et totales de licence.
  BC-3110.50:
    name: Rapports aux gouvernements hôtes et aux partenaires
    description: |
      Reporting aux gouvernements hôtes selon les termes PSC et aux partenaires selon les termes JOA.
  BC-3110.50.10:
    name: Rapports aux gouvernements hôtes
    description: |
      Rapport des opérations, des coûts et de la production aux gouvernements hôtes.
  BC-3110.50.20:
    name: Reporting du contrat de partage de production
    description: |
      Rapport du recouvrement des coûts, du pétrole profit et des enlèvements selon les termes PSC.
  BC-3110.50.30:
    name: Reporting de la performance des partenaires
    description: |
      Reporting périodique opérationnel et financier aux partenaires de la coentreprise.
  BC-3110.60:
    name: Gestion des participations non exploitantes
    description: |
      Gestion de la participation en capitaux propres dans les coentreprises exploitées par d'autres parties.
  BC-3110.60.10:
    name: Surveillance de la position non exploitante
    description: |
      Surveillance des activités de l'opérateur et de la performance de la coentreprise
      depuis la position non exploitante.
  BC-3110.60.20:
    name: Exercice du droit de vote non exploitant
    description: |
      Examen interne et exercice des droits de vote sur les programmes de travaux proposés par l'opérateur.
  BC-3110.60.30:
    name: Vérification des coûts non exploitants
    description: |
      Vérification des coûts facturés par l'opérateur par rapport aux procédures comptables du JOA.

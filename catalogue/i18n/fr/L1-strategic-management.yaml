locale: fr
source: L1-strategic-management.yaml
entries:
  BC-100:
    name: Gestion stratégique
    description: |
      Définition de l'orientation, de la vision, de la mission et des objectifs à long terme de l'entreprise.
  BC-100.10:
    name: Planification stratégique
    description: |
      Formulation de la vision, de la mission, des objectifs stratégiques et du plan à long terme.
  BC-100.10.10:
    name: Définition de la vision et de la mission
    description: |
      Articulation de la vision, de la mission et des valeurs fondamentales de l'entreprise.
  BC-100.10.20:
    name: Analyse de l'environnement
    description: |
      Analyse externe et interne (PESTLE, SWOT, veille concurrentielle).
  BC-100.10.30:
    name: Formulation des choix stratégiques
    description: |
      Évaluation des options stratégiques et sélection de l'orientation stratégique.
  BC-100.10.40:
    name: Élaboration du plan à long terme
    description: |
      Plan pluriannuel intégrant les objectifs stratégiques, les cibles et l'allocation du capital.
  BC-100.10.50:
    name: Planification par scénarios
    description: |
      Élaboration de scénarios futurs plausibles et de stratégies de contingence associées.
  BC-100.20:
    name: Gestion de l'exécution stratégique
    description: |
      Traduction de la stratégie en objectifs, OKR et tableaux de bord équilibrés.
  BC-100.20.10:
    name: Déclinaison des objectifs stratégiques
    description: |
      Traduction de la stratégie d'entreprise en objectifs par unité opérationnelle et par fonction.
  BC-100.20.20:
    name: Gestion du tableau de bord de performance
    description: |
      Tableau de bord équilibré, OKR, définition et suivi des KPI.
  BC-100.20.30:
    name: Révision et réorientation stratégique
    description: |
      Cycles périodiques de révision de la stratégie et mesures correctives.
  BC-100.20.40:
    name: Gouvernance des initiatives stratégiques
    description: |
      Gouvernance par jalons des initiatives stratégiques.
  BC-100.30:
    name: Gestion du développement de l'entreprise
    description: |
      Fusions-acquisitions, cessions, coentreprises et partenariats.
  BC-100.30.10:
    name: Exécution des fusions-acquisitions
    description: |
      Identification des cibles, due diligence, structuration et clôture des opérations.
  BC-100.30.20:
    name: Gestion des cessions
    description: |
      Scissions, séparations, cessions d'actifs et d'entités.
  BC-100.30.30:
    name: Gestion des coentreprises et alliances
    description: |
      Constitution et pilotage des coentreprises, alliances et partenariats stratégiques.
  BC-100.30.40:
    name: Intégration post-acquisition
    description: |
      Planification de l'intégration et réalisation des synergies à la suite de fusions-acquisitions.
  BC-100.40:
    name: Gestion du portefeuille stratégique
    description: |
      Portefeuille des initiatives stratégiques à l'échelle de l'entreprise.
  BC-100.40.10:
    name: Définition du portefeuille d'initiatives
    description: |
      Inventaire et catégorisation des initiatives stratégiques.
  BC-100.40.20:
    name: Priorisation du portefeuille
    description: |
      Notation, sélection et priorisation des initiatives par rapport à la stratégie.
  BC-100.40.30:
    name: Allocation des investissements
    description: |
      Répartition du capital, des ressources humaines et des capacités entre les initiatives du portefeuille.
  BC-100.40.40:
    name: Surveillance de la performance du portefeuille
    description: |
      Suivi de la réalisation des bénéfices et de la santé globale du portefeuille.
  BC-100.50:
    name: Gestion du modèle d'affaires
    description: |
      Définition, évolution et innovation du modèle d'affaires.
  BC-100.50.10:
    name: Conception du modèle d'affaires
    description: |
      Articulation de la proposition de valeur, des segments clients et du modèle de revenus.
  BC-100.50.20:
    name: Innovation du modèle d'affaires
    description: |
      Exploration et prototypage de modèles d'affaires nouveaux ou adjacents.
  BC-100.50.30:
    name: Évaluation de la performance du modèle d'affaires
    description: |
      Évaluation de l'économie unitaire, de la scalabilité et de la pertinence du modèle.

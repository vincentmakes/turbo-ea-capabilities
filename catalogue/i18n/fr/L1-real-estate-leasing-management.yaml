locale: fr
source: L1-real-estate-leasing-management.yaml
entries:
  BC-4950:
    name: Gestion de la location immobilière
    description: |
      Location côté bailleur d'espaces commerciaux, de commerce et résidentiels sur
      l'ensemble du cycle du bail — tarification, commercialisation, gestion des
      candidats, instruction des dossiers, négociation et signature, administration
      des baux, renouvellement et fidélisation, et fin de bail. Distinct de la
      location côté occupant entreprise (BC-710) et du courtage en tant que ligne
      de service (BC-4960).
    in_scope:
      - Stratégie de loyer demandé et de concessions
      - Commercialisation des vacances, annonces et visites
      - Gestion et qualification des candidats entrants
      - Capture et instruction des dossiers, et décisions de refus conformes à la réglementation anti-discrimination
      - Fiche de conditions du bail, rédaction, signature et gestion du dépôt de garantie
      - Abstraction des baux côté bailleur, indexation et suivi des options
      - Démarches de renouvellement et programmes de fidélisation
      - Sortie des lieux, dégradations et comptabilité de fin de bail
    out_of_scope:
      - Administration des baux côté occupant entreprise (BC-710)
      - Représentation en courtage en tant que ligne de service (BC-4960)
      - Opérations immobilières pendant l'occupation (BC-4940)
      - Conformité réglementaire sur les loyers et les baux (BC-4990)
  BC-4950.10:
    name: Stratégie locative et tarification
    description: |
      Définition de la stratégie de loyer demandé, des forfaits de concessions, du
      mix locataire cible et de la comparaison des loyers de l'actif au marché.
  BC-4950.10.10:
    name: Stratégie de loyer demandé et de concessions
    description: |
      Définition des niveaux de loyer demandé et des forfaits de concessions par actif
      et type d'unité.
  BC-4950.10.20:
    name: Stratégie de mix locataire cible
    description: |
      Définition du mix locataire cible et de la qualité de crédit pour l'actif.
  BC-4950.10.30:
    name: Benchmarking des loyers de marché
    description: |
      Benchmarking périodique des loyers en cours et des loyers demandés par rapport
      aux références de marché.
  BC-4950.20:
    name: Commercialisation des vacances et annonces
    description: |
      Commercialisation des espaces disponibles via les contenus d'annonces, la
      diffusion multicanale et les visites sur site.
  BC-4950.20.10:
    name: Production du contenu des annonces
    description: |
      Production du contenu des annonces incluant photographies, plans et visites virtuelles.
  BC-4950.20.20:
    name: Gestion des canaux de diffusion des annonces
    description: |
      Gestion de la diffusion des annonces vers les portails, MLS et canaux partenaires.
  BC-4950.20.30:
    name: Opérations de visites des surfaces vacantes
    description: |
      Opérations de visites des unités vacantes et de visites autonomes dans le bien.
  BC-4950.30:
    name: Gestion des candidats et des demandes
    description: |
      Capture, qualification et suivi des demandes de location entrantes et des candidats.
  BC-4950.30.10:
    name: Capture et orientation des demandes
    description: |
      Capture des demandes de location sur tous les canaux et orientation vers
      l'équipe de l'actif concerné.
  BC-4950.30.20:
    name: Qualification des candidats
    description: |
      Qualification des candidats selon l'usage cible, le crédit et l'adéquation
      avec l'unité.
  BC-4950.30.30:
    name: Planification des visites et suivi
    description: |
      Planification des visites et suivi post-visite avec les candidats.
  BC-4950.40:
    name: Dossier de candidature et instruction des locataires
    description: |
      Capture des dossiers de candidature et exécution des vérifications de crédit,
      d'identité et de références conformes à la réglementation anti-discrimination.
  BC-4950.40.10:
    name: Capture des dossiers de candidature
    description: |
      Capture des dossiers de candidature des locataires et des pièces justificatives.
  BC-4950.40.20:
    name: Vérifications de crédit et de références
    description: |
      Exécution des vérifications de crédit et des références employeur/bailleur
      précédent sur les candidats.
  BC-4950.40.30:
    name: Vérification d'identité et du droit d'occupation
    description: |
      Vérification de l'identité et du droit d'occuper conformément à la juridiction.
  BC-4950.40.40:
    name: Traitement des refus de dossier en conformité avec la législation anti-discrimination
    description: |
      Traitement des décisions de refus dans le respect de la réglementation
      anti-discrimination et des obligations de notification.
  BC-4950.50:
    name: Négociation et signature du bail
    description: |
      Négociation des fiches de conditions, rédaction, gestion des allers-retours,
      signature et capture des dépôts de garantie et des cautions.
  BC-4950.50.10:
    name: Négociation de la fiche de conditions
    description: |
      Négociation des fiches de conditions du bail couvrant le loyer, la durée,
      les options et les incitations.
  BC-4950.50.20:
    name: Rédaction du bail et gestion des allers-retours
    description: |
      Rédaction des documents de bail et gestion des cycles de négociation avec
      les avocats du locataire.
  BC-4950.50.30:
    name: Signature et exécution du bail
    description: |
      Signature et exécution du bail et des documents annexes.
  BC-4950.50.40:
    name: Capture du dépôt de garantie et des cautions
    description: |
      Capture des dépôts de garantie, lettres de crédit et cautions personnelles
      ou corporatives.
  BC-4950.60:
    name: Administration du bail (côté bailleur)
    description: |
      Administration côté bailleur des abstractions de baux, de l'indexation des
      loyers, du suivi des options et du suivi de la conformité aux baux pendant
      la durée.
  BC-4950.60.10:
    name: Abstraction des baux
    description: |
      Abstraction des baux signés en fiches de conditions clés structurées.
  BC-4950.60.20:
    name: Suivi de l'indexation et des escalades de loyers
    description: |
      Suivi et déclenchement des escalades de loyers incluant les clauses d'indexation
      et à paliers.
  BC-4950.60.30:
    name: Suivi des options, des résiliations et des renouvellements
    description: |
      Suivi des options locataire et bailleur, des dates de résiliation et des
      fenêtres de renouvellement.
  BC-4950.60.40:
    name: Suivi de la conformité aux baux
    description: |
      Suivi du respect par les locataires des engagements du bail incluant l'usage,
      les travaux et le reporting.
  BC-4950.70:
    name: Gestion des renouvellements et de la fidélisation
    description: |
      Gestion proactive du pipeline de renouvellement, de la négociation des conditions
      et des programmes de fidélisation ciblant les locataires en place.
  BC-4950.70.10:
    name: Gestion du pipeline de renouvellement
    description: |
      Gestion du pipeline de renouvellement par rapport au calendrier des échéances
      et aux objectifs de fidélisation.
  BC-4950.70.20:
    name: Négociation des conditions de renouvellement
    description: |
      Négociation des conditions de renouvellement incluant le loyer, la durée et
      les incitations.
  BC-4950.70.30:
    name: Opérations des programmes de fidélisation
    description: |
      Mise en œuvre des programmes de fidélisation incluant la prospection auprès
      des locataires et les offres incitatives.
  BC-4950.80:
    name: Gestion de la sortie des lieux et de la résiliation du bail
    description: |
      Gestion du préavis, de la résiliation, des dégradations, de la remise en état,
      de la restitution du dépôt de garantie et de la comptabilité finale en fin de bail.
  BC-4950.80.10:
    name: Traitement du préavis et de la résiliation
    description: |
      Traitement des préavis de résiliation et de la remise des lieux.
  BC-4950.80.20:
    name: Évaluation des dégradations et obligations de remise en état
    description: |
      Évaluation des dégradations et des obligations de remise en état du locataire
      au regard du bail.
  BC-4950.80.30:
    name: Restitution du dépôt de garantie
    description: |
      Restitution des dépôts de garantie sous réserve des retenues, conformément
      à la loi et au bail.
  BC-4950.80.40:
    name: Comptabilité finale en fin de bail
    description: |
      Comptabilité finale des loyers, récupérations et crédits en fin de bail.

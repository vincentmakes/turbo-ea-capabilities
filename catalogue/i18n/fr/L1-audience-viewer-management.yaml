locale: fr
source: L1-audience-viewer-management.yaml
entries:
  BC-3750:
    name: Gestion de l'audience et des téléspectateurs
    description: |
      Identité des téléspectateurs, abonnements et droits d'accès,
      authentification multi-appareils, engagement et fidélisation, et contrôles
      parentaux pour les services de contenu direct au consommateur sur les
      plateformes OTT, IPTV et pay-TV.
  BC-3750.10:
    name: Gestion de l'identité des téléspectateurs
    description: |
      Provisionnement et gestion des comptes téléspectateurs, structures
      foyers et identité fédérée entre services.
  BC-3750.10.10:
    name: Provisionnement des comptes téléspectateurs
    description: |
      Création et cycle de vie des comptes téléspectateurs, incluant les
      opérations de fusion et de scission de comptes.
  BC-3750.10.20:
    name: Gestion du foyer et des profils
    description: |
      Gestion des structures de foyer et des profils individuels au sein des
      comptes partagés.
  BC-3750.10.30:
    name: Fédération des identités
    description: |
      Fédération de l'identité téléspectateur avec les fournisseurs d'identité
      opérateurs, distributeurs et tiers.
  BC-3750.20:
    name: Gestion des abonnements et des droits d'accès
    description: |
      Cycle de vie des abonnements des téléspectateurs et des enregistrements
      de droits d'accès régissant l'accès aux services et niveaux de contenu.
  BC-3750.20.10:
    name: Inscription aux offres d'abonnement
    description: |
      Inscription des téléspectateurs aux offres d'abonnement, transactionnelles
      et financées par la publicité.
  BC-3750.20.20:
    name: Octroi et révocation des droits d'accès
    description: |
      Octroi et révocation des droits d'accès au contenu fondés sur les
      abonnements, achats et offres groupées partenaires.
  BC-3750.20.30:
    name: Droits d'accès aux flux simultanés
    description: |
      Contrôle des flux simultanés et du nombre d'appareils par compte fondé
      sur les droits d'accès.
  BC-3750.30:
    name: Authentification multi-appareils
    description: |
      Authentification des téléspectateurs sur l'ensemble des appareils,
      incluant les parcours TV Everywhere avec les fournisseurs d'identité
      opérateurs.
  BC-3750.30.10:
    name: Enregistrement des appareils
    description: |
      Enregistrement et désenregistrement des appareils sur les comptes
      téléspectateurs.
  BC-3750.30.20:
    name: Gestion des sessions authentifiées
    description: |
      Gestion des sessions de lecture authentifiées et du cycle de vie des
      jetons entre appareils.
  BC-3750.30.30:
    name: Authentification TV Everywhere
    description: |
      Authentification des abonnés pay-TV auprès des fournisseurs d'identité
      opérateurs pour les droits d'accès over-the-top.
  BC-3750.40:
    name: Gestion de l'engagement et de la fidélisation des téléspectateurs
    description: |
      Modélisation, conception du parcours et intervention pour développer
      l'engagement envers le contenu et réduire le désabonnement sur les
      services directs au consommateur.
  BC-3750.40.10:
    name: Modélisation des habitudes de visionnage
    description: |
      Modélisation des habitudes, états de visionnage et affinités de contenu
      des téléspectateurs pour orienter les décisions d'engagement.
  BC-3750.40.20:
    name: Gestion des programmes de reconquête et de fidélisation
    description: |
      Conception et exécution des programmes de rétention, de reconquête et de
      fidélisation pour les téléspectateurs à risque et inactifs.
  BC-3750.40.30:
    name: Gestion du parcours d'intégration et d'activation
    description: |
      Parcours d'intégration des nouveaux téléspectateurs et d'activation vers
      un premier visionnage significatif.
  BC-3750.50:
    name: Gestion des contrôles parentaux et des restrictions de profil
    description: |
      Configuration et application des restrictions de contenu au niveau du
      profil, des verrouillages par code PIN et des limites de temps de
      visionnage.
  BC-3750.50.10:
    name: Restriction de contenu au niveau du profil
    description: |
      Restriction de contenu par profil selon la classification par âge, la
      catégorie et les listes de blocage personnalisées.
  BC-3750.50.20:
    name: Gestion des codes PIN et des verrouillages
    description: |
      Gestion du code PIN, du verrouillage de profil et du verrouillage des
      achats sur les appareils et surfaces.
  BC-3750.50.30:
    name: Configuration des limites de visionnage
    description: |
      Configuration des limites de temps de visionnage, des restrictions par
      tranche horaire et des contrôles du temps d'écran.

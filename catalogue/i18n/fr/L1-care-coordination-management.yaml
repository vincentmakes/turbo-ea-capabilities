locale: fr
source: L1-care-coordination-management.yaml
entries:
  BC-2820:
    name: Gestion de la coordination des soins
    description: |
      Coordination des soins entre prestataires, structures et dans le temps, incluant les orientations, la gestion de cas, les transitions de soins, la planification des sorties, la gestion de l'utilisation et le lien avec les déterminants sociaux.
  BC-2820.10:
    name: Gestion des orientations
    description: |
      Gestion de bout en bout des orientations patients, de la saisie de la demande à la mise en relation avec le spécialiste, au suivi et à la clôture.
  BC-2820.10.10:
    name: Saisie des demandes d'orientation
    description: |
      Saisie des demandes d'orientation des médecins prescripteurs avec le contexte clinique requis.
  BC-2820.10.20:
    name: Mise en relation avec le spécialiste
    description: |
      Mise en relation des orientations avec des spécialistes en fonction du besoin clinique, du réseau et de l'accès.
  BC-2820.10.30:
    name: Suivi des orientations
    description: |
      Suivi du statut, de la planification et de l'aboutissement des orientations au sein du réseau.
  BC-2820.10.40:
    name: Clôture des orientations
    description: |
      Clôture des orientations avec retour du compte-rendu du consultant au médecin prescripteur.
  BC-2820.20:
    name: Gestion des cas et des soins
    description: |
      Identification, planification et mise en œuvre des interventions de gestion de cas pour les patients à haut risque et complexes.
  BC-2820.20.10:
    name: Stratification des cas
    description: |
      Classement des patients en niveaux de gestion de cas selon le risque clinique et social.
  BC-2820.20.20:
    name: Élaboration du plan de soins
    description: |
      Élaboration de plans de soins individualisés avec des objectifs centrés sur le patient.
  BC-2820.20.30:
    name: Exécution du plan de soins
    description: |
      Mise en œuvre et réévaluation continue des interventions prévues dans le plan de soins.
  BC-2820.20.40:
    name: Attribution des gestionnaires de cas
    description: |
      Attribution et gestion de la charge de travail des gestionnaires de cas et des navigateurs de soins.
  BC-2820.30:
    name: Planification des sorties
    description: |
      Planification d'une sortie sécurisée des soins hospitaliers, incluant l'évaluation des besoins, le placement en soins post-aigus et l'éducation du patient.
  BC-2820.30.10:
    name: Évaluation des besoins à la sortie
    description: |
      Évaluation multidisciplinaire des besoins cliniques et sociaux post-sortie.
  BC-2820.30.20:
    name: Élaboration du plan de sortie
    description: |
      Élaboration des plans de sortie incluant les services, les équipements et le suivi.
  BC-2820.30.30:
    name: Placement en soins post-aigus
    description: |
      Orientation des patients vers des services de soins infirmiers qualifiés, de rééducation et de soins à domicile.
  BC-2820.30.40:
    name: Éducation à la sortie
    description: |
      Éducation du patient et de l'aidant sur les instructions de sortie, les médicaments et les signes d'alerte.
  BC-2820.40:
    name: Transitions de soins
    description: |
      Coordination des transitions du patient entre les prestataires et les structures pour assurer la continuité, la sécurité et la responsabilité des résultats.
  BC-2820.40.10:
    name: Communication de passation de soins
    description: |
      Communication structurée de passation entre soignants et équipes lors des transitions.
  BC-2820.40.20:
    name: Réconciliation médicamenteuse lors des transitions
    description: |
      Réconciliation des médicaments lors des transitions de soins.
  BC-2820.40.30:
    name: Planification des rendez-vous de suivi
    description: |
      Planification des rendez-vous de suivi après sortie ou après consultation.
  BC-2820.40.40:
    name: Suivi des résultats des transitions
    description: |
      Suivi des indicateurs de réhospitalisation, de complications et de résultats lors des transitions.
  BC-2820.50:
    name: Gestion de l'utilisation
    description: |
      Examen et supervision des hospitalisations, des séjours prolongés et des durées de séjour par rapport aux critères de nécessité médicale et d'utilisation.
  BC-2820.50.10:
    name: Examen des admissions
    description: |
      Examen de la nécessité médicale d'une admission et du statut hospitalisation versus observation.
  BC-2820.50.20:
    name: Examen de la poursuite du séjour
    description: |
      Examen périodique de la poursuite de l'hospitalisation par rapport aux critères établis.
  BC-2820.50.30:
    name: Optimisation de la durée de séjour
    description: |
      Optimisation de la durée de séjour par l'identification et la résolution des obstacles.
  BC-2820.50.40:
    name: Suivi des journées évitables
    description: |
      Saisie et analyse des journées d'hospitalisation évitables et de leurs causes profondes.
  BC-2820.60:
    name: Déterminants sociaux et lien communautaire
    description: |
      Identification des déterminants sociaux de la santé et mise en lien avec des ressources communautaires pour soutenir les résultats cliniques.
  BC-2820.60.10:
    name: Dépistage des besoins sociaux
    description: |
      Dépistage des besoins en logement, alimentation, transport et autres besoins sociaux.
  BC-2820.60.20:
    name: Orientation vers les ressources communautaires
    description: |
      Orientation vers des ressources communautaires répondant aux besoins sociaux identifiés.
  BC-2820.60.30:
    name: Documentation des déterminants sociaux
    description: |
      Documentation structurée des déterminants sociaux dans le dossier de santé.
  BC-2820.60.40:
    name: Suivi en boucle fermée des orientations
    description: |
      Suivi en boucle fermée des orientations communautaires jusqu'au résultat et à la résolution.

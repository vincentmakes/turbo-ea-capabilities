locale: fr
source: L1-smelting-refining-operations-management.yaml
entries:
  BC-4450:
    name: Gestion des opérations de fusion et d'affinage
    description: |
      Affinage pyrométallurgique et électrochimique des concentrés et intermédiaires
      en métaux livrables au LME ou conformes aux spécifications, incluant la
      récupération des sous-produits, le traitement des gaz de sortie et la
      comptabilité métallurgique.
  BC-4450.10:
    name: Réception et mélange des concentrés
    description: |
      Échantillonnage à la réception, mélange de la charge d'alimentation et gestion
      des stocks de concentrés à l'entrée du complexe de fusion.
    in_scope:
      - Échantillonnage et dosage à la réception
      - Mélange de la charge d'alimentation du four
      - Gestion des stocks dans la cour à concentrés
    out_of_scope:
      - Règlement des ventes de concentrés (BC-4480.40)
  BC-4450.10.10:
    name: Échantillonnage des concentrés à la réception
    description: |
      Échantillonnage et dosage des concentrés reçus des mines tierces et captives.
  BC-4450.10.20:
    name: Mélange de la charge du four
    description: |
      Mélange des concentrés pour atteindre les teneurs et les objectifs en impuretés
      de la charge du four.
  BC-4450.10.30:
    name: Gestion des stocks de concentrés
    description: |
      Gestion des stocks de concentrés dans les cours, hangars et silos.
  BC-4450.20:
    name: Opérations pyrométallurgiques
    description: |
      Grillage, fusion, conversion et gestion des scories des concentrés sulfurés
      et oxydés.
  BC-4450.20.10:
    name: Opérations de grillage
    description: |
      Exploitation des grilleurs à lit fluidisé et à foyers multiples pour
      l'oxydation des sulfures.
  BC-4450.20.20:
    name: Opérations de fours de fusion
    description: |
      Exploitation des fours flash, électriques et à bain de fusion.
  BC-4450.20.30:
    name: Opérations de convertisseurs
    description: |
      Exploitation des convertisseurs Peirce-Smith, rotatifs à soufflage par le
      haut et continus.
  BC-4450.20.40:
    name: Gestion des scories
    description: |
      Coulée, granulation, épuration et élimination des scories de fours et de
      convertisseurs.
  BC-4450.30:
    name: Opérations d'affinage électrolytique
    description: |
      Opérations de tankhouse par électrolyse et par électroraffinage produisant
      du métal en cathodes.
  BC-4450.30.10:
    name: Opérations d'électrolyse
    description: |
      Exploitation des cellules d'électrolyse produisant des cathodes à partir
      de l'électrolyte de lixiviation.
  BC-4450.30.20:
    name: Opérations de tankhouse d'électroraffinage
    description: |
      Exploitation des cellules d'électroraffinage produisant des cathodes de haute
      pureté à partir des anodes.
  BC-4450.30.30:
    name: Décapage et manutention des cathodes
    description: |
      Décapage, lavage, pesage et cerclage des cathodes pour la vente ou la
      coulée en aval.
  BC-4450.40:
    name: Récupération des métaux de sous-produits
    description: |
      Récupération des métaux précieux et mineurs à partir des boues anodiques,
      poussières et flux de sous-produits.
  BC-4450.40.10:
    name: Traitement des boues anodiques
    description: |
      Traitement des boues d'électroraffinage anodiques pour récupérer les
      métaux précieux.
  BC-4450.40.20:
    name: Affinage des métaux précieux
    description: |
      Affinage de l'or, de l'argent et des métaux du groupe du platine en lingots
      ou en éponge.
  BC-4450.40.30:
    name: Récupération des flux de sous-produits
    description: |
      Récupération du sélénium, du tellure, de l'acide sulfurique et d'autres
      flux de sous-produits.
  BC-4450.50:
    name: Fonderie et finition des produits
    description: |
      Coulée, marquage et inspection qualité des produits métalliques finis selon
      les spécifications commerciales.
  BC-4450.50.10:
    name: Opérations de coulée
    description: |
      Coulée de barres, lingots, billettes, brames et profils à partir de métal
      en fusion.
  BC-4450.50.20:
    name: Marquage et estampillage des produits
    description: |
      Marquage, estampillage et application de la marque sur les produits coulés
      pour la traçabilité et l'acceptation en bourse.
  BC-4450.50.30:
    name: Inspection qualité des métaux finis
    description: |
      Inspection et certification des métaux finis selon les exigences de
      spécification et d'enregistrement en bourse.
  BC-4450.60:
    name: Opérations de traitement des gaz et de production d'acide
    description: |
      Épuration des gaz de sortie du four de fusion, opérations de l'usine
      d'acide sulfurique et surveillance des émissions à la cheminée.
  BC-4450.60.10:
    name: Épuration des gaz de sortie
    description: |
      Exploitation des précipitateurs électrostatiques, épurateurs et systèmes
      de refroidissement des gaz de sortie du four.
  BC-4450.60.20:
    name: Opérations de l'usine d'acide sulfurique
    description: |
      Exploitation des usines d'acide sulfurique à double contact et double
      absorption sur les gaz de sortie du four.
  BC-4450.60.30:
    name: Surveillance des émissions à la cheminée
    description: |
      Surveillance continue des émissions de dioxyde de soufre, de particules
      et de métaux à la cheminée.
  BC-4450.70:
    name: Comptabilité métallurgique de la fonderie
    description: |
      Bilan métallique, essai de règlement et comptabilité de traitement à façon
      dans l'ensemble du complexe de fusion.
  BC-4450.70.10:
    name: Bilan métallique et essais de règlement
    description: |
      Réconciliation périodique du bilan métallique et essais de qualité pour
      le règlement des produits expédiés.
  BC-4450.70.20:
    name: Rapport de récupération et de pertes
    description: |
      Rapport sur la récupération métallurgique et les pertes par flux à travers
      la fonderie et la raffinerie.
  BC-4450.70.30:
    name: Comptabilité du traitement à façon
    description: |
      Comptabilité des concentrés tiers traités à façon et du métal appartenant
      aux clients.

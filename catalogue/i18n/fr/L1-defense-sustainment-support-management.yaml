locale: fr
source: L1-defense-sustainment-support-management.yaml
entries:
  BC-1780:
    name: Gestion du soutien en service et du MCO de défense
    description: |
      Soutien en service, maintenance en dépôt, ingénierie RAM, pièces de rechange, réparations et obsolescence.
  BC-1780.10:
    name: Gestion du soutien en service
    description: |
      Contrats de soutien tout au long du cycle de vie et ingénierie de soutien.
  BC-1780.10.10:
    name: Opérations des contrats de soutien cycle de vie
    description: |
      Exploitation des contrats de soutien tout au long du cycle de vie.
  BC-1780.10.20:
    name: Ingénierie de soutien
    description: |
      Soutien technique aux systèmes d'armes déployés.
  BC-1780.10.30:
    name: Soutien à la gestion de flotte
    description: |
      Soutien à la gestion de flotte incluant le suivi de configuration.
  BC-1780.20:
    name: Gestion de la maintenance en dépôt
    description: |
      Réparation, révision et remise à niveau en dépôt.
  BC-1780.20.10:
    name: Opérations d'atelier de réparation en dépôt
    description: |
      Exploitation des ateliers de réparation au niveau dépôt.
  BC-1780.20.20:
    name: Programmes de révision générale en dépôt
    description: |
      Programmes périodiques de révision générale et de remise à niveau en dépôt.
  BC-1780.20.30:
    name: Gestion de la capacité du dépôt
    description: |
      Gestion de la capacité du dépôt et des délais d'exécution.
  BC-1780.30:
    name: Gestion de l'ingénierie RAM
    description: |
      Ingénierie de fiabilité, disponibilité et maintenabilité.
  BC-1780.30.10:
    name: Ingénierie de la fiabilité
    description: |
      Prédiction, allocation et croissance de la fiabilité.
  BC-1780.30.20:
    name: Modélisation de la disponibilité
    description: |
      Modélisation et analyse de la disponibilité opérationnelle.
  BC-1780.30.30:
    name: Ingénierie de la maintenabilité
    description: |
      Analyses de maintenabilité et influence sur la conception.
  BC-1780.30.40:
    name: Analyse du soutien logistique
    description: |
      Analyse du soutien logistique selon MIL-HDBK-502.
  BC-1780.40:
    name: Gestion des pièces de rechange et des réparations de défense
    description: |
      Pièces détachées, filières de réparation et unités échangeables.
  BC-1780.40.10:
    name: Approvisionnement en pièces de rechange de défense
    description: |
      Approvisionnement en pièces de rechange pour les systèmes de défense.
  BC-1780.40.20:
    name: Gestion de la filière de réparation
    description: |
      Gestion des filières de réparation et de retour.
  BC-1780.40.30:
    name: Opérations du pool d'unités échangeables
    description: |
      Exploitation des pools d'unités rotables et échangeables.
  BC-1780.50:
    name: Gestion des publications techniques
    description: |
      Ordres techniques, IETMs, manuels et documentation S1000D.
  BC-1780.50.10:
    name: Documentation technique S1000D
    description: |
      Rédaction et maintenance des publications techniques S1000D.
  BC-1780.50.20:
    name: Opérations des manuels techniques électroniques interactifs
    description: |
      Exploitation et mise à jour des IETMs sur le terrain.
  BC-1780.50.30:
    name: Gestion des modifications des ordres techniques
    description: |
      Gestion des modifications des ordres techniques et des mises à jour terrain.
  BC-1780.60:
    name: Gestion de l'obsolescence de défense
    description: |
      DMSMS, prévision de l'obsolescence et stratégies de mitigation.
  BC-1780.60.10:
    name: Surveillance DMSMS
    description: |
      Surveillance DMSMS des composants et fournisseurs.
  BC-1780.60.20:
    name: Prévision de l'obsolescence
    description: |
      Prévision de l'obsolescence des pièces et matériaux.
  BC-1780.60.30:
    name: Mitigation de l'obsolescence
    description: |
      Stratégies de mitigation incluant les achats de précaution, la reconception et la substitution.
  BC-1780.60.40:
    name: Maintenance du plan de gestion de l'obsolescence
    description: |
      Maintenance des plans de gestion de l'obsolescence au niveau programme.

locale: fr
source: L1-medical-staff-credentialing-management.yaml
entries:
  BC-2890:
    name: Gestion du personnel médical et de l'accréditation
    description: |
      Accréditation et habilitation des praticiens, évaluation des performances et revue par les pairs, gouvernance du personnel médical, inscription auprès des payeurs et programmes de santé des praticiens.
  BC-2890.10:
    name: Accréditation des praticiens
    description: |
      Accréditation initiale et continue des praticiens, incluant la vérification auprès des sources primaires.
  BC-2890.10.10:
    name: Réception des dossiers de candidature
    description: |
      Réception et vérification de la complétude des dossiers de candidature à l'accréditation.
  BC-2890.10.20:
    name: Vérification auprès des sources primaires
    description: |
      Vérification auprès des sources primaires des diplômes, de la formation, des licences et des références.
  BC-2890.10.30:
    name: Gestion des dossiers d'accréditation
    description: |
      Maintenance et audit des dossiers d'accréditation et des pièces justificatives.
  BC-2890.10.40:
    name: Renouvellement de l'accréditation
    description: |
      Renouvellement périodique de l'accréditation du personnel médical actif et des professionnels de santé paramédicaux.
  BC-2890.20:
    name: Gestion des habilitations
    description: |
      Délimitation, octroi et renouvellement des habilitations cliniques.
  BC-2890.20.10:
    name: Délimitation des habilitations
    description: |
      Définition et maintenance des délimitations des habilitations par service et spécialité.
  BC-2890.20.20:
    name: Habilitation initiale
    description: |
      Octroi des habilitations cliniques initiales aux nouveaux praticiens.
  BC-2890.20.30:
    name: Renouvellement des habilitations
    description: |
      Renouvellement périodique des habilitations cliniques fondé sur les données de performance et de compétence.
  BC-2890.20.40:
    name: Gestion des habilitations de spécialité
    description: |
      Gestion des demandes d'habilitation de spécialité, avancées et procédurales.
  BC-2890.30:
    name: Évaluation des performances et revue par les pairs
    description: |
      Évaluation continue et ciblée des performances des praticiens et revue par les pairs.
  BC-2890.30.10:
    name: Évaluation continue des performances
    description: |
      Évaluation continue de la pratique professionnelle sur des indicateurs propres à chaque spécialité.
  BC-2890.30.20:
    name: Évaluation ciblée des performances
    description: |
      Évaluation ciblée de la pratique professionnelle déclenchée par des signaux de performance ou de nouvelles habilitations.
  BC-2890.30.30:
    name: Revue par les pairs des dossiers cliniques
    description: |
      Revue structurée par les pairs des dossiers cliniques ayant des implications sur les performances.
  BC-2890.30.40:
    name: Rapports sur les performances des praticiens
    description: |
      Communication des performances des praticiens aux comités du personnel médical et aux intéressés.
  BC-2890.40:
    name: Gouvernance du personnel médical
    description: |
      Gouvernance du personnel médical incluant les statuts, le comité exécutif et les opérations des services.
  BC-2890.40.10:
    name: Maintenance des statuts
    description: |
      Maintenance et modification des statuts et règlements du personnel médical.
  BC-2890.40.20:
    name: Soutien au comité exécutif médical
    description: |
      Soutien opérationnel et analytique au comité exécutif médical.
  BC-2890.40.30:
    name: Opérations des comités de service
    description: |
      Opérations des comités de service, de section et des comités permanents.
  BC-2890.40.40:
    name: Soutien aux élections des responsables
    description: |
      Soutien aux nominations et aux élections des responsables du personnel médical.
  BC-2890.50:
    name: Gestion de l'inscription des prestataires
    description: |
      Inscription des prestataires auprès des payeurs et des programmes gouvernementaux.
  BC-2890.50.10:
    name: Inscription auprès des payeurs
    description: |
      Inscription des prestataires dans les réseaux des payeurs commerciaux.
  BC-2890.50.20:
    name: Maintenance du référentiel centralisé de données d'accréditation
    description: |
      Maintenance des données d'accréditation centralisées partagées avec les payeurs.
  BC-2890.50.30:
    name: Inscription aux programmes gouvernementaux
    description: |
      Inscription des prestataires aux programmes d'assurance maladie gouvernementaux.
  BC-2890.50.40:
    name: Suivi des renouvellements d'inscription
    description: |
      Suivi et traitement dans les délais des cycles de renouvellement d'inscription des prestataires.
  BC-2890.60:
    name: Santé et bien-être des praticiens
    description: |
      Programmes de soutien à la santé des praticiens, de prévention de l'épuisement professionnel et d'accompagnement confidentiel.
  BC-2890.60.10:
    name: Gestion des praticiens en difficulté
    description: |
      Identification, intervention et suivi des praticiens en difficulté.
  BC-2890.60.20:
    name: Opérations des programmes de bien-être
    description: |
      Animation des programmes de bien-être et de résilience des praticiens.
  BC-2890.60.30:
    name: Surveillance de l'épuisement professionnel
    description: |
      Surveillance des indicateurs d'épuisement professionnel et de bien-être des praticiens.
  BC-2890.60.40:
    name: Ressources de soutien confidentiel
    description: |
      Ressources confidentielles de santé mentale, de soutien par les pairs et de counseling pour les praticiens.

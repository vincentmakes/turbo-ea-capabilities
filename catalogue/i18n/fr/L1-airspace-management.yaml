locale: fr
source: L1-airspace-management.yaml
entries:
  BC-1200:
    name: Gestion de l'espace aérien
    description: |
      Conception de l'espace aérien, sectorisation, zones réglementées et coordination civilo-militaire.
  BC-1200.10:
    name: Gestion de la conception de l'espace aérien
    description: |
      Structure de l'espace aérien, classes, conception du réseau de routes et limites de secteurs.
  BC-1200.10.10:
    name: Conception de la structure de l'espace aérien
    description: |
      Définition des FIR, UIR, régions de contrôle et classes d'espace aérien conformément à l'Annexe 11 de l'ICAO.
  BC-1200.10.20:
    name: Conception du réseau de routes ATS
    description: |
      Conception des réseaux de routes ATS conventionnels et PBN.
  BC-1200.10.30:
    name: Conception des limites de secteurs
    description: |
      Définition des limites de secteurs et des secteurs élémentaires.
  BC-1200.10.40:
    name: Conception de l'espace aérien à routes libres
    description: |
      Conception et mise en œuvre de l'espace aérien à routes libres.
  BC-1200.20:
    name: Gestion de la sectorisation de l'espace aérien
    description: |
      Définition des secteurs, schémas d'ouverture et alignement sur la charge de travail des contrôleurs.
  BC-1200.20.10:
    name: Gestion des configurations de secteurs
    description: |
      Définition et maintien des configurations de secteurs.
  BC-1200.20.20:
    name: Planification des schémas d'ouverture de secteurs
    description: |
      Planification des schémas d'ouverture de secteurs selon les prévisions de trafic.
  BC-1200.20.30:
    name: Sectorisation basée sur la charge de travail
    description: |
      Sectorisation alignée sur l'évaluation de la charge de travail des contrôleurs.
  BC-1200.30:
    name: Gestion de l'espace aérien réglementé
    description: |
      Zones dangereuses, zones réglementées, zones interdites et zones militaires.
  BC-1200.30.10:
    name: Définition des zones réglementées
    description: |
      Définition des zones réglementées, interdites et dangereuses.
  BC-1200.30.20:
    name: Gestion des zones temporairement réservées
    description: |
      Gestion des zones temporairement réservées et ségrégées.
  BC-1200.30.30:
    name: Coordination de l'activation et de la libération
    description: |
      Activation, libération et notification des espaces aériens réglementés.
  BC-1200.40:
    name: Gestion de la coordination de l'espace aérien
    description: |
      Coordination civilo-militaire, coordination transfrontalière et coopération au sein des blocs d'espace aérien fonctionnels.
  BC-1200.40.10:
    name: Coordination civilo-militaire de l'espace aérien
    description: |
      Coordination civilo-militaire et utilisation flexible de l'espace aérien.
  BC-1200.40.20:
    name: Coordination transfrontalière de l'espace aérien
    description: |
      Coordination de l'utilisation de l'espace aérien au-delà des limites des FIR.
  BC-1200.40.30:
    name: Coopération au sein des blocs d'espace aérien fonctionnels
    description: |
      Coopération au sein des blocs d'espace aérien fonctionnels (FAB).
  BC-1200.40.40:
    name: Consultation des usagers de l'espace aérien
    description: |
      Consultation des usagers de l'espace aérien sur les modifications de conception.

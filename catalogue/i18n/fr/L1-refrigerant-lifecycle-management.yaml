locale: fr
source: L1-refrigerant-lifecycle-management.yaml
entries:
  BC-2040:
    name: Gestion du cycle de vie des fluides frigorigènes
    description: |
      Cycle de vie opérationnel des fluides frigorigènes sur le parc installé — approvisionnement
      et inventaire, comptabilité des charges, récupération et régénération, gestion des fuites,
      rapports réglementaires au titre du F-Gas / EPA Section 608 / Amendement de Kigali,
      certification des techniciens, transitions d'élimination progressive et destination finale.
    in_scope:
      - Approvisionnement, allocation et stockage des fluides frigorigènes
      - Comptabilité des charges au niveau actif et réconciliation du bilan massique
      - Récupération sur le terrain, régénération et contrôle qualité des fluides frigorigènes recyclés
      - Détection des fuites, réparation et déclaration des taux de fuite réglementaires
      - Certification de manipulation des techniciens et suivi des compétences
      - Feuilles de route de transition et d'élimination progressive des fluides frigorigènes
      - Destruction en fin de vie et élimination certifiée
    out_of_scope:
      - Homologations des fluides frigorigènes au niveau produit lors de la certification (BC-2030)
      - Cycle frigorifique et sélection pendant la conception des équipements (BC-2000)
      - Conformité environnementale générale non spécifique aux fluides frigorigènes (BC-740)
  BC-2040.10:
    name: Gestion de l'approvisionnement et des stocks de fluides frigorigènes
    description: |
      Approvisionnement, allocation, stockage et réconciliation des stocks de fluides frigorigènes sur l'ensemble des opérations.
  BC-2040.10.10:
    name: Approvisionnement en fluides frigorigènes
    description: |
      Approvisionnement en fluides frigorigènes auprès de fournisseurs agréés.
  BC-2040.10.20:
    name: Gestion de l'allocation des quotas
    description: |
      Allocation des quotas réglementaires entre les unités opérationnelles et les marchés.
  BC-2040.10.30:
    name: Stockage et manipulation des fluides frigorigènes
    description: |
      Stockage et manipulation des bouteilles de fluides frigorigènes conformément aux règles de sécurité et environnementales.
  BC-2040.10.40:
    name: Réconciliation des stocks de fluides frigorigènes
    description: |
      Réconciliation périodique des stocks de fluides frigorigènes sur les sites et les stocks de terrain.
  BC-2040.20:
    name: Comptabilité des charges de fluides frigorigènes
    description: |
      Comptabilité au niveau actif des charges de fluides frigorigènes, des appoints et de l'audit du bilan.
  BC-2040.20.10:
    name: Enregistrements des charges par actif
    description: |
      Enregistrements de la charge de fluide frigorigène installée par actif équipement.
  BC-2040.20.20:
    name: Enregistrement des appoints et recharges
    description: |
      Enregistrement des appoints et recharges par rapport aux événements de service des équipements.
  BC-2040.20.30:
    name: Audit de précision des charges
    description: |
      Audit de la précision de la comptabilité des charges sur le parc installé.
  BC-2040.20.40:
    name: Réconciliation du bilan massique
    description: |
      Réconciliation du bilan massique des fluides frigorigènes approvisionnés, utilisés, récupérés et éliminés.
  BC-2040.30:
    name: Opérations de récupération et de régénération des fluides frigorigènes
    description: |
      Récupération sur le terrain et régénération en aval des fluides frigorigènes récupérés pour leur réutilisation.
  BC-2040.30.10:
    name: Opérations de récupération sur le terrain
    description: |
      Récupération sur site des fluides frigorigènes des équipements en service.
  BC-2040.30.20:
    name: Régénération des fluides frigorigènes
    description: |
      Traitement de régénération des fluides frigorigènes récupérés aux spécifications vierges.
  BC-2040.30.30:
    name: Vérification de la qualité des fluides frigorigènes recyclés
    description: |
      Vérification de la qualité des fluides frigorigènes recyclés avant réutilisation.
  BC-2040.30.40:
    name: Gestion de la banque de fluides frigorigènes récupérés
    description: |
      Gestion des banques de fluides frigorigènes contenant les produits régénérés pour réutilisation.
  BC-2040.40:
    name: Gestion des fuites de fluides frigorigènes
    description: |
      Détection, réparation et déclaration des fuites de fluides frigorigènes sur le parc installé.
  BC-2040.40.10:
    name: Surveillance de la détection des fuites
    description: |
      Surveillance continue et périodique de la détection des fuites sur les équipements.
  BC-2040.40.20:
    name: Processus de réparation des fuites
    description: |
      Processus de diagnostic et de réparation des fuites identifiées.
  BC-2040.40.30:
    name: Rapport des taux de fuite
    description: |
      Déclaration des taux de fuite par rapport aux seuils réglementaires.
  BC-2040.40.40:
    name: Analyse des points chauds de fuite
    description: |
      Analyse des points chauds de fuite récurrents pour orienter les modifications des équipements ou des procédés.
  BC-2040.50:
    name: Rapport réglementaire sur les fluides frigorigènes
    description: |
      Rapports réglementaires sur l'utilisation des fluides frigorigènes, les fuites, la récupération et les déclarations de substances.
  BC-2040.50.10:
    name: Rapport annuel F-Gas
    description: |
      Rapport annuel au titre du règlement F-Gas de l'UE.
  BC-2040.50.20:
    name: Rapport national sur les fluides frigorigènes
    description: |
      Déclarations au titre des programmes nationaux sur les fluides frigorigènes (ex. déclaration EPA aux États-Unis).
  BC-2040.50.30:
    name: Rapport Kigali et Montréal
    description: |
      Déclarations au titre des obligations de l'Amendement de Kigali et du Protocole de Montréal.
  BC-2040.50.40:
    name: Divulgation de l'inventaire des substances
    description: |
      Divulgation de l'inventaire des substances aux autorités réglementaires et aux parties prenantes.
  BC-2040.60:
    name: Gestion de la certification des techniciens en fluides frigorigènes
    description: |
      Gestion des certifications, licences et compétences des techniciens pour la manipulation des fluides frigorigènes.
  BC-2040.60.10:
    name: Enregistrements de certification des techniciens
    description: |
      Enregistrements des certifications de manipulation des fluides frigorigènes des techniciens.
  BC-2040.60.20:
    name: Suivi du renouvellement des certifications
    description: |
      Suivi des renouvellements de certifications à venir.
  BC-2040.60.30:
    name: Licences nationales de manipulation des fluides frigorigènes
    description: |
      Gestion des licences nationales de manipulation des fluides frigorigènes (EPA Section 608, catégories F-Gas).
  BC-2040.60.40:
    name: Vérification des compétences
    description: |
      Vérification périodique des compétences des techniciens manipulant des fluides frigorigènes.
  BC-2040.70:
    name: Gestion de l'élimination progressive et de la transition des fluides frigorigènes
    description: |
      Gestion stratégique des éliminations progressives des fluides frigorigènes et des feuilles de route de transition clients.
  BC-2040.70.10:
    name: Feuille de route de substitution des fluides frigorigènes
    description: |
      Feuille de route pour substituer les fluides frigorigènes en cours d'élimination par des alternatives à GWP plus faible.
  BC-2040.70.20:
    name: Planification des conversions de modernisation
    description: |
      Planification des conversions de modernisation vers des fluides frigorigènes alternatifs dans le parc installé.
  BC-2040.70.30:
    name: Communications de transition clients
    description: |
      Communications aux clients concernant les transitions de fluides frigorigènes et les calendriers.
  BC-2040.70.40:
    name: Gestion des risques d'élimination progressive
    description: |
      Gestion des risques d'approvisionnement, réglementaires et réputationnels durant les fenêtres d'élimination progressive.
  BC-2040.80:
    name: Fin de vie et élimination des fluides frigorigènes
    description: |
      Destruction en fin de vie et élimination certifiée des fluides frigorigènes non réutilisables.
  BC-2040.80.10:
    name: Coordination de la destruction
    description: |
      Coordination avec les installations de destruction agréées.
  BC-2040.80.20:
    name: Piste d'audit d'élimination certifiée
    description: |
      Maintenance de la piste d'audit attestant de l'élimination certifiée.
  BC-2040.80.30:
    name: Récupération des actifs en fin de vie
    description: |
      Récupération des fluides frigorigènes des actifs en fin de vie avant élimination.
  BC-2040.80.40:
    name: Gestion des prestataires d'élimination
    description: |
      Gestion des prestataires d'élimination agréés et du programme d'audit.

locale: fr
source: L1-audience-measurement-insights-management.yaml
entries:
  BC-3770:
    name: Gestion de la mesure d'audience et des analyses
    description: |
      Capture de la télémétrie d'audience, mesure par panel et par census,
      analyses de performance des contenus, modélisation des recommandations et
      études d'audience sur les services de contenu linéaires, à la demande et
      en direct.
  BC-3770.10:
    name: Capture des données de visionnage
    description: |
      Capture des données de syntonisation linéaire, de la télémétrie de
      lecture OTT et des signaux census des décodeurs dans la plateforme
      d'analyse.
  BC-3770.10.10:
    name: Capture des données de syntonisation linéaire
    description: |
      Capture des données de syntonisation linéaire depuis les voies de retour
      opérateurs et les sources partenaires.
  BC-3770.10.20:
    name: Capture de la télémétrie de lecture OTT
    description: |
      Capture de la télémétrie de lecture OTT depuis les clients et les
      services d'origine pour analyse.
  BC-3770.10.30:
    name: Capture census des décodeurs
    description: |
      Capture au niveau census des événements de visionnage sur décodeurs avec
      application des contrôles de confidentialité.
  BC-3770.20:
    name: Mesure d'audience par panel et par census
    description: |
      Calibration des panels, production des mesures de référence et
      déduplication de l'audience cross-plateforme.
  BC-3770.20.10:
    name: Calibration du panel
    description: |
      Calibration de la mesure par panel par rapport aux signaux census et aux
      cadres démographiques.
  BC-3770.20.20:
    name: Production des mesures de référence
    description: |
      Production des métriques d'audience de référence pour le trading et le
      reporting.
  BC-3770.20.30:
    name: Déduplication de l'audience cross-plateforme
    description: |
      Déduplication des audiences sur les surfaces linéaires, OTT et
      numériques vers une vue cross-plateforme unifiée.
  BC-3770.30:
    name: Analyses de performance des contenus
    description: |
      Analyses de la performance des contenus par titre, cohorte et dans le
      temps pour orienter les commandes et les acquisitions.
  BC-3770.30.10:
    name: Reporting de performance par titre
    description: |
      Reporting de performance au niveau du titre sur la portée, la complétion
      et la contribution.
  BC-3770.30.20:
    name: Analyses du tunnel d'engagement
    description: |
      Analyses du tunnel sur la découverte, le démarrage, la complétion et les
      comportements de visionnage successif.
  BC-3770.30.30:
    name: Analyses par cohorte et valeur vie client
    description: |
      Analyses de rétention par cohorte et de valeur vie client pour les
      abonnés directs au consommateur.
  BC-3770.40:
    name: Modélisation des recommandations de contenu
    description: |
      Entraînement, test et composition personnalisée des recommandations de
      contenu pour les surfaces téléspectateurs.
  BC-3770.40.10:
    name: Entraînement des modèles de recommandation
    description: |
      Entraînement et cycle de vie des modèles de recommandation à partir des
      signaux de visionnage et de métadonnées.
  BC-3770.40.20:
    name: Gestion des tests A/B de recommandation
    description: |
      Tests A/B et bandits multi-bras pour les politiques de recommandation et
      les décisions de surface.
  BC-3770.40.30:
    name: Composition des sélections personnalisées
    description: |
      Composition des sélections personnalisées d'accueil, de rangées et de
      rayons pour les surfaces téléspectateurs.
  BC-3770.50:
    name: Gestion des données d'audience et de la recherche
    description: |
      Études d'audience quantitatives et qualitatives sur mesure, et synthèse
      et diffusion des analyses à l'entreprise.
  BC-3770.50.10:
    name: Études d'audience personnalisées
    description: |
      Conception et déploiement d'études d'audience sur mesure, incluant la
      segmentation et les études de suivi.
  BC-3770.50.20:
    name: Gestion de la recherche qualitative
    description: |
      Recherche qualitative auprès des téléspectateurs, incluant les groupes de
      discussion et les entretiens individuels.
  BC-3770.50.30:
    name: Synthèse et diffusion des analyses
    description: |
      Synthèse des résultats de mesure et de recherche en analyses et leur
      diffusion auprès des audiences métier.

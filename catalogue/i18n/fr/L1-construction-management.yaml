locale: fr
source: L1-construction-management.yaml
entries:
  BC-1150:
    name: Gestion de la construction
    description: |
      Supervision et exécution de la construction pour les entreprises EPC.
  BC-1150.10:
    name: Gestion de la planification de la construction
    description: |
      Séquençage de la construction, méthodes et plannings directeurs.
  BC-1150.10.10:
    name: Note de méthode de construction
    description: |
      Définition des méthodes et du séquençage de la construction.
  BC-1150.10.20:
    name: Planning directeur de construction
    description: |
      Planning directeur de construction et plans à horizon glissant.
  BC-1150.10.30:
    name: Planification des ressources de construction
    description: |
      Planification de la main-d'œuvre, des équipements et des matériaux pour la construction.
  BC-1150.10.40:
    name: Plan d'exécution de la construction
    description: |
      Plan d'exécution du projet couvrant la stratégie de construction.
  BC-1150.20:
    name: Gestion de la mobilisation et de l'installation du chantier
    description: |
      Établissement du chantier, installations provisoires et logistique du site.
  BC-1150.20.10:
    name: Établissement du chantier
    description: |
      Mise en place des installations provisoires, bureaux et équipements de vie.
  BC-1150.20.20:
    name: Planification de la logistique du chantier
    description: |
      Planification des accès, des zones de dépôt et de la manutention des matériaux.
  BC-1150.20.30:
    name: Mobilisation des engins de construction
    description: |
      Mobilisation des grues, matériels et engins de construction.
  BC-1150.30:
    name: Gestion de la supervision de la construction
    description: |
      Supervision du chantier, gestion des fronts de travail et opérations quotidiennes.
  BC-1150.30.10:
    name: Opérations quotidiennes du chantier
    description: |
      Coordination quotidienne du chantier, briefings et exécution.
  BC-1150.30.20:
    name: Gestion des fronts de travail
    description: |
      Définition et avancement des fronts de travail de construction.
  BC-1150.30.30:
    name: Conformité aux permis et méthodes
    description: |
      Conformité aux permis et aux notes de méthode approuvées.
  BC-1150.40:
    name: Gestion des sous-traitants
    description: |
      Sélection, supervision, performance et certification de paiement des sous-traitants.
  BC-1150.40.10:
    name: Sélection des sous-traitants
    description: |
      Pré-qualification et sélection des sous-traitants de construction.
  BC-1150.40.20:
    name: Supervision des sous-traitants
    description: |
      Supervision sur site de la performance et de la conformité des sous-traitants.
  BC-1150.40.30:
    name: Certification des paiements
    description: |
      Métrés et certification des paiements aux sous-traitants.
  BC-1150.40.40:
    name: Gestion des avenants sous-traitants
    description: |
      Gestion des avenants et réclamations des sous-traitants.
  BC-1150.50:
    name: Gestion de la qualité de la construction
    description: |
      Assurance et contrôle qualité sur site, inspections, points d'arrêt et de surveillance.
  BC-1150.50.10:
    name: Plans d'inspection et d'essais sur site
    description: |
      Définition des plans d'inspection et d'essais (PIE), points d'arrêt et de surveillance, et plannings d'inspection.
  BC-1150.50.20:
    name: Inspection qualité sur site
    description: |
      Réalisation des inspections qualité et des essais sur site.
  BC-1150.50.30:
    name: Gestion des non-conformités et des listes de réserves
    description: |
      Rapports de non-conformité sur site et clôture des listes de réserves.
  BC-1150.60:
    name: Gestion de l'avancement de la construction
    description: |
      Mesure de l'avancement, valeur acquise et analyse des écarts.
  BC-1150.60.10:
    name: Mesure de l'avancement de la construction
    description: |
      Mesure de l'avancement sur site basée sur les quantités.
  BC-1150.60.20:
    name: Reporting de la valeur acquise
    description: |
      Analyse de la valeur acquise et reporting de la performance du projet.
  BC-1150.60.30:
    name: Analyse des écarts de planning et de coût
    description: |
      Analyse des écarts et mesures correctives.
  BC-1150.70:
    name: Gestion HSE du chantier
    description: |
      Sécurité du chantier, permis de travail, gestion des dangers et réponse aux urgences.
  BC-1150.70.10:
    name: Planification HSE du chantier
    description: |
      Plans HSE du chantier et évaluations des risques.
  BC-1150.70.20:
    name: Permis de travail sur site
    description: |
      Permis de travail sur site et permis feu.
  BC-1150.70.30:
    name: Inspections et audits de sécurité sur site
    description: |
      Inspections de sécurité, audits et observations comportementales.
  BC-1150.70.40:
    name: Réponse aux urgences sur site
    description: |
      Plans de réponse aux urgences sur site, exercices et gestion des incidents.

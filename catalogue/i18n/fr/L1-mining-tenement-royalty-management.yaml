locale: fr
source: L1-mining-tenement-royalty-management.yaml
entries:
  BC-4490:
    name: Gestion des titres miniers et des redevances
    description: |
      Acquisition, conformité et gestion de portefeuille des permis d'exploration
      et des baux miniers, ainsi que calcul, rapport et divulgation des obligations
      en matière de redevances gouvernementales, privées et autochtones.
  BC-4490.10:
    name: Acquisition de titres miniers
    description: |
      Demande, appel d'offres et diligence raisonnable pour l'acquisition de
      permis d'exploration, de baux miniers et d'autres titres miniers.
    in_scope:
      - Demandes de permis d'exploration greenfield
      - Demandes et renouvellements de baux miniers
      - Diligence raisonnable pour l'acquisition de titres
    out_of_scope:
      - Maturation des prospects au stade de la découverte (BC-4400.20)
  BC-4490.10.10:
    name: Demande de permis d'exploration
    description: |
      Préparation et dépôt des demandes de permis d'exploration greenfield et
      brownfield.
  BC-4490.10.20:
    name: Demande de bail minier
    description: |
      Préparation et dépôt des demandes de baux miniers et des conversions
      depuis les titres d'exploration.
  BC-4490.10.30:
    name: Participation aux appels d'offres de titres
    description: |
      Participation aux appels d'offres et aux enchères de titres miniers
      compétitifs.
  BC-4490.10.40:
    name: Diligence raisonnable pour l'acquisition de titres
    description: |
      Diligence raisonnable sur le titre, les charges et les obligations lors
      des acquisitions de titres miniers.
  BC-4490.20:
    name: Conformité et entretien des titres miniers
    description: |
      Conformité aux obligations annuelles de dépenses, de programme de travaux,
      de loyer et de renouvellement attachées aux titres miniers.
  BC-4490.20.10:
    name: Rapport de dépenses annuelles
    description: |
      Rapport des dépenses annuelles d'exploration et de développement en regard
      des engagements liés aux titres.
  BC-4490.20.20:
    name: Conformité au programme de travaux
    description: |
      Démonstration de la conformité aux programmes de travaux engagés sur les
      titres d'exploration et miniers.
  BC-4490.20.30:
    name: Paiement des loyers et des redevances statutaires
    description: |
      Paiement des loyers annuels, des redevances statutaires et des dépôts de
      garantie sur les titres.
  BC-4490.20.40:
    name: Gestion du renouvellement des titres
    description: |
      Gestion des demandes de renouvellement des titres et des modifications
      des conditions.
  BC-4490.30:
    name: Gestion du portefeuille de titres miniers
    description: |
      Tenue du registre des titres, cartographie des limites et décisions de
      renonciation sur l'ensemble du portefeuille.
  BC-4490.30.10:
    name: Gestion du registre des titres
    description: |
      Tenue du registre des titres de l'entreprise et de ses attributs faisant
      foi.
  BC-4490.30.20:
    name: Cartographie des limites des titres
    description: |
      Cartographie spatiale et réconciliation des limites des titres avec les
      registres gouvernementaux.
  BC-4490.30.30:
    name: Décisions de renonciation aux titres
    description: |
      Décisions de renonciation partielle et totale aux titres pour rationaliser
      le portefeuille.
  BC-4490.40:
    name: Gestion des redevances gouvernementales
    description: |
      Calcul, dépôt et réponse aux audits des redevances de production et
      ad valorem payables aux gouvernements hôtes.
  BC-4490.40.10:
    name: Calcul des redevances de production
    description: |
      Calcul des redevances de production et ad valorem sur la production
      minière.
  BC-4490.40.20:
    name: Dépôt des déclarations de redevances
    description: |
      Dépôt des déclarations périodiques de redevances auprès des autorités
      fiscales du gouvernement hôte.
  BC-4490.40.30:
    name: Réponse aux audits de redevances
    description: |
      Réponse aux audits et évaluations gouvernementaux des redevances.
  BC-4490.50:
    name: Gestion des redevances privées et autochtones
    description: |
      Administration des flux de redevances privées et des obligations de partage
      des avantages avec les communautés autochtones.
  BC-4490.50.10:
    name: Administration des flux de redevances privées
    description: |
      Administration des droits à redevances des vendeurs, bailleurs de fonds
      et sociétés de streaming.
  BC-4490.50.20:
    name: Administration des redevances de partage des avantages autochtones
    description: |
      Administration des paiements de redevances et des arrangements de partage
      des avantages avec les groupes autochtones et propriétaires traditionnels.
  BC-4490.50.30:
    name: Rapport de divulgation des redevances
    description: |
      Divulgation des paiements de redevances aux investisseurs, aux régulateurs
      et aux communautés concernées.
  BC-4490.60:
    name: Rapport de transparence extractive
    description: |
      Rapport sur les paiements aux gouvernements, rapports EITI et de
      propriété effective dans le cadre des régimes de transparence extractive.
  BC-4490.60.10:
    name: Rapport sur les paiements aux gouvernements
    description: |
      Rapport obligatoire sur les paiements aux gouvernements en vertu des
      réglementations européennes et équivalentes.
  BC-4490.60.20:
    name: Divulgation de transparence extractive
    description: |
      Rapport de transparence volontaire EITI et équivalent sur les flux de
      revenus.
  BC-4490.60.30:
    name: Divulgation de la propriété effective
    description: |
      Divulgation de la propriété effective des entités opérationnelles en
      vertu des règles EITI et équivalentes.

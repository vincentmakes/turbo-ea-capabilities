locale: fr
source: L1-banking-customer-management.yaml
entries:
  BC-1300:
    name: Gestion de la clientèle bancaire
    description: |
      Entrée en relation, KYC/CDD, service clientèle et accès aux canaux pour les clients bancaires.
  BC-1300.10:
    name: Gestion de l'entrée en relation
    description: |
      Ouverture de compte, vérification de l'identité et activation du compte.
  BC-1300.10.10:
    name: Collecte des demandes
    description: |
      Collecte des données de demande de nouveau client et de nouveau compte.
  BC-1300.10.20:
    name: Vérification de l'identité
    description: |
      Vérification de l'identité incluant les contrôles documentaires et biométriques.
  BC-1300.10.30:
    name: Paramétrage et activation du compte
    description: |
      Paramétrage des comptes, produits et activation des accès aux canaux.
  BC-1300.10.40:
    name: Communication sur l'état d'avancement de l'entrée en relation
    description: |
      Communication au client sur l'état d'avancement et les prochaines étapes de l'entrée en relation.
  BC-1300.20:
    name: Gestion du KYC et de la vigilance clientèle
    description: |
      KYC, CDD, vigilance renforcée, revue périodique et criblage PPE.
  BC-1300.20.10:
    name: Notation du risque client
    description: |
      Notation du risque des clients sur la base des facteurs de risque LBA.
  BC-1300.20.20:
    name: Collecte des documents KYC
    description: |
      Collecte et validation des documents KYC.
  BC-1300.20.30:
    name: Criblage sanctions et PPE
    description: |
      Criblage sanctions, personnes politiquement exposées et médias défavorables.
  BC-1300.20.40:
    name: Vigilance renforcée
    description: |
      Vigilance renforcée pour les clients à haut risque et les structures complexes.
  BC-1300.20.50:
    name: Revue périodique KYC
    description: |
      Revue et actualisation périodiques des informations KYC des clients.
  BC-1300.30:
    name: Gestion du service clientèle
    description: |
      Traitement des demandes courantes et maintenance des comptes.
  BC-1300.30.10:
    name: Maintenance des comptes
    description: |
      Maintenance des comptes incluant les plafonds, signataires et adresses.
  BC-1300.30.20:
    name: Traitement des demandes de service
    description: |
      Traitement des demandes de service et des instructions des clients.
  BC-1300.30.30:
    name: Fourniture de relevés et de documents
    description: |
      Fourniture de relevés, d'attestations et de documents clients.
  BC-1300.30.40:
    name: Gestion de la clôture de la relation client
    description: |
      Départ du client et clôture des relations commerciales.
  BC-1300.40:
    name: Gestion des informations client
    description: |
      Données client, consentements, préférences et référentiel client unique.
  BC-1300.40.10:
    name: Maintenance du profil client
    description: |
      Maintenance du profil client et des données démographiques.
  BC-1300.40.20:
    name: Gestion des bénéficiaires effectifs
    description: |
      Collecte et maintenance des informations sur les bénéficiaires effectifs.
  BC-1300.40.30:
    name: Gestion du consentement client
    description: |
      Collecte et application des consentements marketing et de partage de données.
  BC-1300.40.40:
    name: Gestion du référentiel client unique
    description: |
      Maintenance du référentiel client unique entre les systèmes.
  BC-1300.50:
    name: Gestion des canaux bancaires
    description: |
      Opérations des canaux agence, ATM, en ligne, mobile et téléphonie.
  BC-1300.50.10:
    name: Opérations du canal agence
    description: |
      Exploitation du réseau d'agences physiques et des services de caissier.
  BC-1300.50.20:
    name: Opérations ATM et libre-service
    description: |
      Exploitation des ATM, bornes et appareils en libre-service.
  BC-1300.50.30:
    name: Opérations des canaux numériques
    description: |
      Exploitation des canaux bancaires en ligne et mobile.
  BC-1300.50.40:
    name: Opérations du canal téléphonique
    description: |
      Exploitation des canaux de banque par téléphone et d'authentification vocale.
  BC-1300.50.50:
    name: Opérations Open Banking et API
    description: |
      Exploitation des API open banking et des accès tiers.

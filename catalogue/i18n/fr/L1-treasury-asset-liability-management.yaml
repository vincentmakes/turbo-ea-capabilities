locale: fr
source: L1-treasury-asset-liability-management.yaml
entries:
  BC-1360:
    name: Gestion de la trésorerie et de l'actif-passif
    description: |
      Trésorerie bancaire, gestion actif-passif, prix de cession interne, liquidité et risque de taux d'intérêt du portefeuille bancaire.
  BC-1360.10:
    name: Gestion de la liquidité bancaire
    description: |
      Liquidité bancaire, liquidité intrajournalière, LCR/NSFR.
  BC-1360.10.10:
    name: Gestion du ratio de couverture des besoins de liquidité
    description: |
      Calcul, suivi et reporting du LCR conformément à Bâle III.
  BC-1360.10.20:
    name: Gestion du ratio de financement stable net
    description: |
      Calcul du NSFR et gestion du financement structurel.
  BC-1360.10.30:
    name: Gestion de la liquidité intrajournalière
    description: |
      Suivi de la liquidité intrajournalière sur l'ensemble des systèmes de paiement.
  BC-1360.10.40:
    name: Gestion des actifs liquides de haute qualité
    description: |
      Constitution et gestion du portefeuille d'actifs liquides de haute qualité (HQLA).
  BC-1360.20:
    name: Gestion actif-passif
    description: |
      Gestion actif-passif, gestion du bilan et analyse des écarts.
  BC-1360.20.10:
    name: Gestion du bilan
    description: |
      Gestion stratégique et optimisation du bilan.
  BC-1360.20.20:
    name: Analyse des écarts
    description: |
      Analyse des écarts de repricing et de liquidité sur l'ensemble du bilan.
  BC-1360.20.30:
    name: Modélisation comportementale
    description: |
      Modélisation comportementale des dépôts à vue et des remboursements anticipés.
  BC-1360.20.40:
    name: Test de résistance ALM
    description: |
      Test de résistance des déséquilibres actif-passif.
  BC-1360.30:
    name: Gestion du prix de cession interne
    description: |
      Prix de cession interne (FTP) et tarification des fonds internes.
  BC-1360.30.10:
    name: Gestion de la méthodologie FTP
    description: |
      Maintenance de la méthodologie FTP et construction des courbes.
  BC-1360.30.20:
    name: Application des taux FTP
    description: |
      Application des taux FTP aux produits et contrats.
  BC-1360.30.30:
    name: Reporting et analytique FTP
    description: |
      Reporting FTP et analyse d'impact sur la rentabilité.
  BC-1360.40:
    name: Gestion du financement bancaire
    description: |
      Financement de marché, collecte des dépôts et financements sur les marchés des capitaux.
  BC-1360.40.10:
    name: Gestion du financement de marché
    description: |
      Gestion du financement de marché non sécurisé et sécurisé.
  BC-1360.40.20:
    name: Financement sur les marchés des capitaux
    description: |
      Émissions obligataires, EMTN, obligations sécurisées et titrisation.
  BC-1360.40.30:
    name: Opérations sur les facilités de banque centrale
    description: |
      Utilisation des facilités de banque centrale et gestion des sûretés.
  BC-1360.40.40:
    name: Gestion du plan de financement
    description: |
      Plan de financement annuel et exécution par rapport au plan.
  BC-1360.50:
    name: Gestion du risque de taux d'intérêt du portefeuille bancaire
    description: |
      IRRBB et exposition aux taux d'intérêt du portefeuille bancaire.
  BC-1360.50.10:
    name: Mesure de l'IRRBB
    description: |
      Mesure des sensibilités EVE et NII pour l'IRRBB.
  BC-1360.50.20:
    name: Couverture de l'IRRBB
    description: |
      Couverture du risque de taux d'intérêt du portefeuille bancaire.
  BC-1360.50.30:
    name: Reporting de l'IRRBB
    description: |
      Reporting réglementaire et de gestion de l'IRRBB.

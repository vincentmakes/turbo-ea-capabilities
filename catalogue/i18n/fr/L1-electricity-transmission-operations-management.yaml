locale: fr
source: L1-electricity-transmission-operations-management.yaml
entries:
  BC-3810:
    name: Gestion des opérations de transport d'électricité
    description: |
      Exploitation du réseau de transport à haute tension — déclenchement en
      salle de commande, manœuvres, opérations sur lignes et postes, coordination
      des arrêts, protection, et sécurité physique et cybernétique du système
      électrique de base.
  BC-3810.10:
    name: Opérations de conduite du transport
    description: |
      Conduite 24h/24 7j/7 du réseau de transport en salle de commande à l'aide
      de l'EMS / SCADA, de la connaissance de situation et de l'analyse de
      contingences.
  BC-3810.10.10:
    name: Opérations EMS
    description: |
      Exploitation du système de gestion de l'énergie, de l'estimateur d'état
      et des outils d'analyse de contingences.
  BC-3810.10.20:
    name: Opérations SCADA transport
    description: |
      Acquisition SCADA en temps réel et commande supervisée des actifs de
      transport.
  BC-3810.10.30:
    name: Gestion du journal de bord des opérateurs de transport
    description: |
      Tenue des journaux de bord des opérateurs, passations de consignes de
      poste et enregistrements des événements d'exploitation.
  BC-3810.20:
    name: Manœuvres et isolation du transport
    description: |
      Planification et exécution des manœuvres, isolations et opérations sous
      tension sur le réseau de transport.
  BC-3810.20.10:
    name: Préparation des programmes de manœuvres
    description: |
      Préparation et vérification des programmes de manœuvres pour les travaux
      planifiés.
  BC-3810.20.20:
    name: Délivrance des permis de travail
    description: |
      Délivrance et contrôle des permis de travail et autorisations d'essai sur
      les installations de transport.
  BC-3810.20.30:
    name: Opérations sous tension et travaux au voisinage
    description: |
      Coordination des accès sous tension et des travaux au voisinage sur les
      circuits sous tension.
  BC-3810.30:
    name: Opérations sur les lignes de transport
    description: |
      Exploitation, inspection et travaux sous tension sur les lignes aériennes,
      pylônes et câbles souterrains de transport.
  BC-3810.30.10:
    name: Inspection des lignes aériennes
    description: |
      Inspections routinières, avec grimpée et aériennes des lignes de transport
      aériennes.
  BC-3810.30.20:
    name: Opérations sur les câbles souterrains
    description: |
      Exploitation, surveillance des décharges partielles et gestion des
      chambres de jonction des câbles HT souterrains.
  BC-3810.30.30:
    name: Entretien des servitudes et dégagement de végétation
    description: |
      Dégagement de végétation et entretien des servitudes selon les normes
      NERC FAC-003 et équivalentes.
  BC-3810.30.40:
    name: Maintenance des pylônes de transport
    description: |
      Peinture, fondations et travaux d'intégrité structurelle des pylônes de
      transport.
  BC-3810.40:
    name: Opérations des postes de transformation
    description: |
      Exploitation et surveillance des postes HT, transformateurs, appareillages
      de coupure et installations de compensation réactive.
  BC-3810.40.10:
    name: Opérations des transformateurs de puissance
    description: |
      Surveillance, analyse des gaz dissous et manœuvre des prises des
      transformateurs HT.
  BC-3810.40.20:
    name: Opérations des appareillages de coupure
    description: |
      Exploitation et surveillance de l'état des disjoncteurs HT et
      sectionneurs.
  BC-3810.40.30:
    name: Opérations de compensation réactive
    description: |
      Exploitation des bancs de condensateurs, réactances, SVC et STATCOM pour
      le soutien en réactif.
  BC-3810.40.40:
    name: Opérations des stations de conversion HVDC
    description: |
      Exploitation des stations de conversion HVDC et contrôle des
      interconnexions en courant continu.
  BC-3810.50:
    name: Coordination des arrêts de transport
    description: |
      Planification, programmation et approbation des arrêts planifiés et
      imprévus des éléments de transport avec évaluation de l'impact système et
      marché.
  BC-3810.50.10:
    name: Soumission des plans d'arrêt
    description: |
      Soumission et révision des plans d'arrêt de transport à l'opérateur de
      réseau.
  BC-3810.50.20:
    name: Évaluation des risques d'arrêt
    description: |
      Évaluation de la sécurité du système et de l'impact marché des arrêts
      proposés.
  BC-3810.50.30:
    name: Reporting des indisponibilités forcées
    description: |
      Reporting des indisponibilités forcées à l'opérateur et au régulateur.
  BC-3810.60:
    name: Protection et contrôle du transport
    description: |
      Réglage, surveillance et analyse post-événement des protections de
      transport et des schémas de protection spéciaux.
  BC-3810.60.10:
    name: Gestion des réglages de protection
    description: |
      Calcul, approbation et émission des réglages des relais de protection.
  BC-3810.60.20:
    name: Opérations des schémas de protection spéciaux
    description: |
      Exploitation et surveillance des schémas d'actions correctives et de
      protection spéciaux.
  BC-3810.60.30:
    name: Analyse des événements perturbateurs
    description: |
      Analyse des enregistrements de perturbations et des performances de
      protection après les incidents réseau.
  BC-3810.70:
    name: Gestion de la sécurité du réseau de transport
    description: |
      Cybersécurité et sécurité physique du système électrique de base,
      incluant la mise en œuvre des contrôles NERC CIP, la sécurité périmétrique
      et l'enregistrement des actifs classés BES.
  BC-3810.70.10:
    name: Identification des cyberactifs BES
    description: |
      Identification et évaluation des systèmes cybernétiques BES selon NERC
      CIP-002.
  BC-3810.70.20:
    name: Opérations du périmètre de sécurité électronique
    description: |
      Exploitation des périmètres de sécurité électroniques et des contrôles
      d'accès distant interactif.
  BC-3810.70.30:
    name: Opérations du périmètre de sécurité physique
    description: |
      Contrôles de sécurité physique pour les centres de conduite et postes
      critiques (NERC CIP-014).
  BC-3810.70.40:
    name: Gestion des preuves de conformité NERC CIP
    description: |
      Collecte des preuves, attestation et réponse aux audits pour les normes
      NERC CIP.

locale: fr
source: L1-real-estate-compliance-regulatory-management.yaml
entries:
  BC-4990:
    name: Gestion de la conformité et de la réglementation immobilières
    description: |
      Discipline de conformité pour les régimes réglementaires spécifiques à
      l'immobilier qui s'ajoutent à la conformité d'entreprise générique — licence
      des courtiers et agents, égalité dans le logement et anti-discrimination,
      LAB/LCB immobilier et propriété effective, divulgations sur le règlement et
      les prêts hypothécaires (RESPA/TRID), performance énergétique des bâtiments,
      régulation des baux et des loyers, réglementation des copropriétés/HOA/strata,
      et réglementation des fonds et conseillers.
    in_scope:
      - Maintenance des licences de cabinet de courtage et des agents
      - Conformité Fair Housing Act, Equality Act, ECOA
      - LAB/LCB immobilier, propriété effective, sanctions et déclarations de soupçon
      - RESPA, TRID et divulgation des arrangements d'affaires affiliées Section 8
      - Divulgation de la performance énergétique des bâtiments et conformité MEES
      - Stabilisation des loyers, préavis d'expulsion, gestion des dépôts de garantie, enregistrement des locations de courte durée
      - Divulgations du promoteur copropriété/HOA/strata et règles relatives aux fonds de réserve
      - Conformité AIFMD, ELTIF et Investment Advisers Act pour les fonds/conseillers
    out_of_scope:
      - Gestion de la conformité d'entreprise (BC-130)
      - Régimes de cybersécurité et de protection des données (BC-620)
      - LAB/LCB générique hors activités immobilières (BC-1400)
      - Administration fiscale (BC-220)
  BC-4990.10:
    name: Conformité aux licences des courtiers et agents
    description: |
      Conformité aux régimes de licence des courtiers et agents incluant la maintenance
      des licences du cabinet, la formation continue et la supervision du courtier désigné.
  BC-4990.10.10:
    name: Maintenance des licences du cabinet
    description: |
      Maintenance des licences du cabinet de courtage dans les régions d'exploitation.
  BC-4990.10.20:
    name: Licence des agents et formation continue
    description: |
      Suivi des licences individuelles des agents et des exigences de formation continue.
  BC-4990.10.30:
    name: Supervision du courtier désigné
    description: |
      Supervision par le courtier désigné des activités réglementées du cabinet.
  BC-4990.10.40:
    name: Renouvellement des licences et réponse aux audits
    description: |
      Renouvellement des licences et réponse aux audits et contrôles des régulateurs.
  BC-4990.20:
    name: Conformité à l'égalité dans le logement et à l'anti-discrimination
    description: |
      Conformité au Fair Housing Act, à l'Equality Act, à l'ECOA et aux régimes
      anti-discrimination équivalents sur les points de contact de location, de vente
      et de prêt.
  BC-4990.20.10:
    name: Maintenance des politiques d'égalité dans le logement
    description: |
      Maintenance des politiques d'égalité dans le logement et des procédures opérationnelles
      standard.
  BC-4990.20.20:
    name: Contrôle de la publicité et des sources de fonds
    description: |
      Contrôle du contenu publicitaire et des règles relatives aux sources de fonds
      pour la conformité aux restrictions liées aux classes protégées.
  BC-4990.20.30:
    name: Traitement des plaintes pour discrimination au logement
    description: |
      Traitement des plaintes pour discrimination au logement et des demandes des
      régulateurs.
  BC-4990.20.40:
    name: Formation et attestation en matière d'égalité dans le logement
    description: |
      Formation et attestation des agents et du personnel sur les obligations d'égalité
      dans le logement.
  BC-4990.30:
    name: Conformité LAB/LCB et sanctions immobilières
    description: |
      Conformité aux règles LAB/LCB spécifiques à l'immobilier incluant les GTO FinCEN,
      la règle FinCEN sur l'immobilier résidentiel, les obligations AMLD 5/6 pour les
      entreprises et professions non financières désignées, et les déclarations de
      propriété effective.
  BC-4990.30.10:
    name: Capture de la propriété effective
    description: |
      Capture et vérification de la propriété effective pour les parties aux transactions
      immobilières.
  BC-4990.30.20:
    name: Contrôle des sanctions et des PPE (immobilier)
    description: |
      Contrôle des parties aux transactions par rapport aux listes de sanctions, PPE
      et médias défavorables.
  BC-4990.30.30:
    name: Déclaration d'activités suspectes (immobilier)
    description: |
      Dépôt des déclarations d'activités suspectes pour les transactions immobilières
      dans le périmètre.
  BC-4990.30.40:
    name: Audit LAB/LCB et contrôle réglementaire
    description: |
      Réponse aux audits LAB/LCB et aux contrôles réglementaires sur les programmes
      LAB/LCB immobiliers.
  BC-4990.40:
    name: Conformité aux divulgations sur le règlement et les prêts hypothécaires
    description: |
      Conformité aux règles américaines RESPA et TRID sur les divulgations liées au
      règlement et aux prêts hypothécaires, et aux régimes régionaux équivalents.
  BC-4990.40.10:
    name: Production du récapitulatif de prêt et de la divulgation de clôture
    description: |
      Production des documents TRID récapitulatif de prêt et divulgation de clôture
      dans les délais réglementaires.
  BC-4990.40.20:
    name: Divulgation des arrangements d'affaires affiliées
    description: |
      Divulgation des arrangements d'affaires affiliées aux étapes requises de la
      transaction.
  BC-4990.40.30:
    name: Conformité des prestataires de services de règlement
    description: |
      Conformité aux règles sur les recommandations de prestataires de services de
      règlement et aux interdictions Section 8.
  BC-4990.40.40:
    name: Réponse aux audits RESPA
    description: |
      Réponse aux contrôles du CFPB et des régulateurs des États sur la conformité
      RESPA.
  BC-4990.50:
    name: Conformité à la performance énergétique des bâtiments
    description: |
      Conformité aux DPE, MEES, standards de performance des bâtiments et lois
      de benchmarking (p. ex. Local Law 97, révisions de la EPBD).
  BC-4990.50.10:
    name: Conformité DPE / notation énergétique des bâtiments
    description: |
      Obtention et dépôt des diagnostics de performance énergétique et équivalents.
  BC-4990.50.20:
    name: Conformité aux exigences minimales d'efficacité énergétique (MEES)
    description: |
      Conformité aux normes minimales d'efficacité énergétique pour les biens loués
      et vendus.
  BC-4990.50.30:
    name: Divulgation du benchmarking énergétique (LL97 / BPS)
    description: |
      Divulgation dans le cadre des ordonnances municipales de benchmarking énergétique
      et des standards de performance des bâtiments.
  BC-4990.50.40:
    name: Conformité au reporting EPBD européen
    description: |
      Conformité au reporting et à la certification de la directive européenne sur la
      performance énergétique des bâtiments (EPBD).
  BC-4990.60:
    name: Conformité à la réglementation des baux et des loyers
    description: |
      Conformité aux régimes de contrôle/stabilisation des loyers, de préavis d'expulsion,
      de gestion légale des dépôts de garantie et d'enregistrement des locations de
      courte durée.
  BC-4990.60.10:
    name: Conformité au contrôle et à la stabilisation des loyers
    description: |
      Conformité aux régimes de contrôle et de stabilisation des loyers sur les unités
      réglementées.
  BC-4990.60.20:
    name: Conformité aux procédures et préavis d'expulsion
    description: |
      Conformité aux exigences légales de préavis et de procédure d'expulsion.
  BC-4990.60.30:
    name: Gestion légale des dépôts de garantie
    description: |
      Gestion légale des dépôts de garantie incluant le séquestre, les intérêts
      et les règles de restitution.
  BC-4990.60.40:
    name: Conformité à l'enregistrement des locations de courte durée
    description: |
      Conformité aux règles d'enregistrement et d'exploitation des locations de courte
      durée dans les villes réglementées.
  BC-4990.70:
    name: Conformité à la réglementation des copropriétés, HOA et strata
    description: |
      Conformité aux régimes réglementaires des copropriétés, HOA, body corporate
      et strata incluant les divulgations du promoteur et les règles relatives aux
      fonds de réserve.
  BC-4990.70.10:
    name: Divulgations du promoteur copropriété / strata
    description: |
      Obligations de divulgation du promoteur dans le cadre de la réglementation
      des copropriétés et strata.
  BC-4990.70.20:
    name: Enregistrement HOA / body corporate
    description: |
      Enregistrement et dépôts périodiques pour les entités HOA et body corporate.
  BC-4990.70.30:
    name: Conformité aux divulgations du fonds de réserve
    description: |
      Conformité aux exigences d'étude et de divulgation du fonds de réserve.
  BC-4990.70.40:
    name: Conformité au certificat de revente
    description: |
      Délivrance des certificats de revente et des divulgations associées lors des
      ventes d'unités en copropriété et HOA.
  BC-4990.80:
    name: Conformité des fonds et conseillers immobiliers
    description: |
      Conformité à l'AIFMD, à l'ELTIF, à la loi américaine sur les conseillers en
      investissement et aux régimes équivalents de fonds et de conseillers régissant
      les gestionnaires de fonds immobiliers.
  BC-4990.80.10:
    name: Enregistrement des conseillers en fonds
    description: |
      Maintenance des enregistrements et autorisations des conseillers et gestionnaires
      de fonds.
  BC-4990.80.20:
    name: Conformité au reporting AIFMD / ELTIF
    description: |
      Conformité aux obligations de reporting de l'Annexe IV de l'AIFMD et de l'ELTIF.
  BC-4990.80.30:
    name: Commercialisation et notification transfrontalière
    description: |
      Conformité aux régimes de notification de commercialisation transfrontalière
      pour les fonds.
  BC-4990.80.40:
    name: Réponse aux audits et contrôles des fonds
    description: |
      Réponse aux audits et contrôles des régulateurs de fonds dans les différentes
      juridictions.

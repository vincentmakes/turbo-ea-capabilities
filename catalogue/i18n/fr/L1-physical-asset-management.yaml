locale: fr
source: L1-physical-asset-management.yaml
entries:
  BC-1040:
    name: Gestion des actifs physiques
    description: |
      Gestion du cycle de vie des installations, équipements, flottes et infrastructures.
  BC-1040.10:
    name: Stratégie et gestion du cycle de vie des actifs
    description: |
      Stratégie d'actifs, cycle de vie et planification des renouvellements.
  BC-1040.10.10:
    name: Stratégie par classe d'actif
    description: |
      Stratégie par classe d'actif conforme à la norme ISO 55000.
  BC-1040.10.20:
    name: Planification du cycle de vie des actifs
    description: |
      Planification sur toute la durée de vie des actifs, de l'acquisition à la cession.
  BC-1040.10.30:
    name: Planification du renouvellement des actifs
    description: |
      Planification du renouvellement fondée sur l'espérance de vie et l'état des actifs.
  BC-1040.10.40:
    name: Planification des investissements en actifs
    description: |
      Planification des investissements Capex pour les actifs et leur renouvellement.
  BC-1040.20:
    name: Gestion de la performance des actifs
    description: |
      KPI des actifs, disponibilité et taux d'utilisation.
  BC-1040.20.10:
    name: Définition des KPI des actifs
    description: |
      Définition des KPI de performance des actifs et des objectifs associés.
  BC-1040.20.20:
    name: Surveillance de la disponibilité des actifs
    description: |
      Surveillance de la disponibilité et du temps de fonctionnement des actifs.
  BC-1040.20.30:
    name: Reporting du taux d'utilisation des actifs
    description: |
      Reporting du taux d'utilisation et de la performance des actifs.
  BC-1040.20.40:
    name: Gestion de l'indice de santé des actifs
    description: |
      Indices de santé composites et notation de l'état des actifs.
  BC-1040.30:
    name: Gestion du risque et de la criticité des actifs
    description: |
      Classification de la criticité et priorisation basée sur les risques.
  BC-1040.30.10:
    name: Classification de la criticité des actifs
    description: |
      Classification de la criticité des actifs selon leur impact.
  BC-1040.30.20:
    name: Évaluation des risques liés aux actifs
    description: |
      Évaluation des risques des actifs, incluant les conséquences de défaillance.
  BC-1040.30.30:
    name: Priorisation de la maintenance par les risques
    description: |
      Priorisation des actions de maintenance et d'investissement selon les risques.
  BC-1040.40:
    name: Gestion des informations sur les actifs
    description: |
      Données de référence des actifs et documentation technique.
  BC-1040.40.10:
    name: Gestion des données de référence des actifs
    description: |
      Données de référence des actifs, hiérarchies et registres d'équipements.
  BC-1040.40.20:
    name: Documentation technique des actifs
    description: |
      Dossiers techniques, plans et documentation des fabricants.
  BC-1040.40.30:
    name: Gestion des jumeaux numériques des actifs
    description: |
      Modèles de jumeaux numériques pour les opérations et l'analytique des actifs.
  BC-1040.50:
    name: Gestion du déclassement et de la cession des actifs
    description: |
      Déclassement, cession et mise hors service des actifs.
  BC-1040.50.10:
    name: Planification du déclassement
    description: |
      Planification du déclassement des actifs incluant les aspects HSE.
  BC-1040.50.20:
    name: Exécution du retrait des actifs
    description: |
      Retrait physique et démantèlement des actifs mis hors service.
  BC-1040.50.30:
    name: Cession et revente des actifs
    description: |
      Revente, mise au rebut et recyclage des actifs mis hors service.

locale: fr
source: L1-pricing-management.yaml
entries:
  BC-440:
    name: Gestion de la tarification
    description: |
      Fixation des prix, structure tarifaire, remises et promotions.
  BC-440.10:
    name: Gestion de la stratégie de tarification
    description: |
      Modèles de tarification, tarification par la valeur et tarification par segment.
  BC-440.10.10:
    name: Définition du modèle de tarification
    description: |
      Définition des modèles de tarification (coût majoré, valeur client, abonnement).
  BC-440.10.20:
    name: Tarification par la valeur client
    description: |
      Analyse de la valeur client et du consentement à payer pour informer les prix.
  BC-440.10.30:
    name: Benchmarking des prix concurrentiels
    description: |
      Comparaison des prix concurrents et positionnement tarifaire.
  BC-440.10.40:
    name: Tarification par segment et zone géographique
    description: |
      Différenciation tarifaire par segment, canal et zone géographique.
  BC-440.20:
    name: Gestion des listes de prix
    description: |
      Prix catalogue, prix régionaux et maintenance des livres de prix.
  BC-440.20.10:
    name: Maintenance du livre de prix
    description: |
      Maintenance des livres de prix, des prix catalogue et des variantes par devise.
  BC-440.20.20:
    name: Gestion des modifications de prix
    description: |
      Approbation, communication et mise en œuvre des modifications de prix.
  BC-440.20.30:
    name: Gouvernance des données de référence des prix
    description: |
      Gouvernance de la qualité et de la traçabilité des données de référence tarifaires.
  BC-440.30:
    name: Gestion des remises et des promotions
    description: |
      Politiques de remise, offres promotionnelles et ristournes.
  BC-440.30.10:
    name: Gestion de la politique de remise
    description: |
      Définition des niveaux de remise, des règles et des seuils d'approbation.
  BC-440.30.20:
    name: Planification et exécution des promotions
    description: |
      Calendrier promotionnel, paramétrage des offres et exécution.
  BC-440.30.30:
    name: Gestion des ristournes et des remises commerciales
    description: |
      Provisions pour ristournes, réclamations et règlement avec les clients et canaux.
  BC-440.30.40:
    name: Analyse de l'efficacité des promotions
    description: |
      Mesure du ROI promotionnel, de l'uplift et de la cannibalisation.
  BC-440.40:
    name: Gestion de la réalisation et de la conformité tarifaires
    description: |
      Gestion des exceptions tarifaires et analyse des fuites.
  BC-440.40.10:
    name: Approbation des exceptions tarifaires
    description: |
      Workflow et approbation des exceptions tarifaires hors politique.
  BC-440.40.20:
    name: Analyse du prix de poche et de la marge nette
    description: |
      Analyse du prix net réalisé et de la marge de poche par transaction.
  BC-440.40.30:
    name: Investigation des fuites tarifaires
    description: |
      Identification et remédiation des fuites tarifaires et de remises.
  BC-440.40.40:
    name: Surveillance de la conformité tarifaire
    description: |
      Conformité à la politique de tarification, au droit de la concurrence et aux règles du commerce équitable.

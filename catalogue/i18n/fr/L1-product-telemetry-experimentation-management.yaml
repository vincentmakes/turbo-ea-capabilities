locale: fr
source: L1-product-telemetry-experimentation-management.yaml
entries:
  BC-4280:
    name: Gestion de la télémétrie produit et de l'expérimentation
    description: |
      Instrumentation, gouvernance et analyse de la télémétrie d'utilisation produit,
      ainsi que conception et exécution des expériences de fonctionnalités
      qui orientent les décisions produit.
  BC-4280.10:
    name: Instrumentation de la télémétrie produit
    description: |
      Capture des événements d'utilisation produit depuis les environnements
      d'exécution client et serveur selon des schémas d'événements définis.
  BC-4280.10.10:
    name: Définition des schémas d'événements
    description: |
      Définition des schémas d'événements produit, incluant les propriétés
      obligatoires et optionnelles.
  BC-4280.10.20:
    name: Instrumentation de la télémétrie client
    description: |
      Instrumentation des environnements d'exécution client pour émettre
      des événements produit.
  BC-4280.10.30:
    name: Instrumentation de la télémétrie serveur
    description: |
      Instrumentation des environnements d'exécution serveur pour émettre
      des événements produit.
  BC-4280.20:
    name: Qualité et gouvernance de la télémétrie
    description: |
      Gouvernance des schémas, surveillance de la qualité du pipeline et
      filtrage de confidentialité de la télémétrie produit.
  BC-4280.20.10:
    name: Gouvernance des schémas de télémétrie
    description: |
      Gouvernance des schémas d'événements produit sur l'ensemble des surfaces
      produit.
  BC-4280.20.20:
    name: Surveillance de la qualité du pipeline de télémétrie
    description: |
      Surveillance de la correction, de la complétude et de la fraîcheur
      du pipeline de télémétrie.
  BC-4280.20.30:
    name: Filtrage de confidentialité de la télémétrie
    description: |
      Filtrage, caviardage et minimisation de la télémétrie en cohérence
      avec les engagements de confidentialité.
  BC-4280.30:
    name: Analytique d'utilisation produit
    description: |
      Vues analytiques de l'utilisation produit, incluant les entonnoirs,
      les cohortes de rétention et l'engagement par fonctionnalité.
  BC-4280.30.10:
    name: Analytique des entonnoirs
    description: |
      Analyse en entonnoir des conversions et des abandons sur les parcours
      produit.
  BC-4280.30.20:
    name: Analytique des cohortes de rétention
    description: |
      Analyse par cohorte de la rétention des utilisateurs dans le temps.
  BC-4280.30.30:
    name: Reporting d'engagement par fonctionnalité
    description: |
      Reporting sur l'engagement avec des fonctionnalités spécifiques au
      sein de la base utilisateurs.
  BC-4280.40:
    name: Gestion du programme d'expérimentation
    description: |
      Méthodologie, revue de conception et arbitrage des expériences
      qui orientent les décisions produit.
  BC-4280.40.10:
    name: Standards de méthodologie d'expérimentation
    description: |
      Standards de méthodologie d'expérimentation valide pour les équipes
      produit.
  BC-4280.40.20:
    name: Revue de conception des expériences
    description: |
      Revue des conceptions d'expériences selon les standards de méthodologie
      et d'éthique.
  BC-4280.40.30:
    name: Arbitrage des résultats d'expériences
    description: |
      Arbitrage des résultats d'expériences et des décisions produit qui
      en découlent.
  BC-4280.50:
    name: Exécution des tests A/B
    description: |
      Configuration, ciblage et surveillance des tests A/B et multivariés
      en cours d'exécution.
  BC-4280.50.10:
    name: Configuration des expériences
    description: |
      Configuration des variantes d'expériences et des règles d'affectation.
  BC-4280.50.20:
    name: Ciblage des expériences
    description: |
      Ciblage des cohortes d'expériences vers les audiences appropriées.
  BC-4280.50.30:
    name: Surveillance des expériences
    description: |
      Surveillance des expériences en cours pour les garde-fous et
      l'arrêt anticipé.
  BC-4280.60:
    name: Synthèse des insights clients
    description: |
      Synthèse des signaux quantitatifs et qualitatifs en décisions produit
      et mémorandums de décision.
  BC-4280.60.10:
    name: Synthèse des insights quantitatifs
    description: |
      Synthèse des résultats quantitatifs issus de la télémétrie et de
      l'expérimentation.
  BC-4280.60.20:
    name: Synthèse des insights qualitatifs
    description: |
      Synthèse des résultats de recherche qualitative en insights produit.
  BC-4280.60.30:
    name: Rédaction des mémorandums de décision
    description: |
      Rédaction des mémorandums de décision enregistrant les preuves,
      le choix et le raisonnement.

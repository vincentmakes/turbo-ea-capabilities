locale: fr
source: L1-real-estate-acquisition-disposition-management.yaml
entries:
  BC-4930:
    name: Gestion des acquisitions et cessions immobilières
    description: |
      Discipline transactionnelle couvrant le sourcing, la souscription, la due
      diligence, la structuration, la négociation, la clôture et l'intégration
      post-clôture pour les acquisitions et cessions immobilières sur des opérations
      directes, en portefeuille et à l'échelle entité.
    in_scope:
      - Sourcing des leads d'acquisition et gestion des courtiers
      - Souscription (DCF, comparables, sensibilité, scénarios)
      - Due diligence physique, environnementale, titres, baux et financière
      - Stratégie d'offre, lettre d'intention, promesse de vente et structuration fiscale/véhicule
      - Séquestre, clôture, état récapitulatif et enregistrement
      - Stratégie de cession, commercialisation à la vente, sélection des acquéreurs
      - Intégration des données et contrats post-acquisition
    out_of_scope:
      - Gouvernance du comité d'investissement et mandats de fonds (BC-4910)
      - Plans d'affaires d'actifs en exploitation (BC-4920)
      - Tirages de construction et suivi des covenants prêteur (BC-4980)
      - Courtage en tant que ligne de service (BC-4960)
  BC-4930.10:
    name: Sourcing et présélection des acquisitions
    description: |
      Sourcing des opportunités d'acquisition auprès des courtiers, des propriétaires
      et des canaux propriétaires, et présélection initiale selon les critères.
  BC-4930.10.10:
    name: Sourcing des leads d'acquisition
    description: |
      Sourcing des leads d'acquisition sur les canaux directs, de courtage et
      hors marché.
  BC-4930.10.20:
    name: Gestion des courtiers et intermédiaires
    description: |
      Gestion des relations avec les courtiers et intermédiaires fournissant des
      opportunités d'acquisition.
  BC-4930.10.30:
    name: Présélection initiale et décisions d'offre
    description: |
      Présélection initiale des opportunités et décisions de soumissionner ou de
      passer.
  BC-4930.20:
    name: Souscription des acquisitions
    description: |
      Souscription financière, de marché et de risque des actifs cibles pour
      déterminer le prix d'offre et les attentes de rendement.
  BC-4930.20.10:
    name: Souscription des flux de trésorerie et DCF
    description: |
      Construction des modèles de souscription des flux de trésorerie et
      d'actualisation des flux futurs (DCF) de l'actif.
  BC-4930.20.20:
    name: Analyse des transactions comparables et des taux de capitalisation
    description: |
      Analyse des transactions comparables et des taux de capitalisation en vigueur
      pour calibrer la valeur.
  BC-4930.20.30:
    name: Modélisation de sensibilité et de scénarios
    description: |
      Modélisation de la sensibilité et des scénarios de rendements sous des
      hypothèses variées de loyers, de vacance et de sortie.
  BC-4930.30:
    name: Gestion de la due diligence
    description: |
      Coordination et exécution d'une due diligence pluridisciplinaire sur les
      acquisitions cibles incluant les dimensions physiques, environnementales,
      juridiques, locatives et financières.
  BC-4930.30.10:
    name: Due diligence physique et technique
    description: |
      Évaluations de l'état physique et due diligence technique des actifs cibles.
  BC-4930.30.20:
    name: Due diligence environnementale (Phase I / II)
    description: |
      Due diligence environnementale incluant les évaluations de Phase I et Phase II
      selon la norme ASTM.
  BC-4930.30.30:
    name: Due diligence titres, géomètre et zonage
    description: |
      Due diligence sur les titres, les plans géomètre, les servitudes et la conformité
      au zonage.
  BC-4930.30.40:
    name: Due diligence baux et occupation
    description: |
      Révision des abstractions de baux, collecte des certificats d'estoppel et
      entretiens avec les locataires.
  BC-4930.30.50:
    name: Due diligence financière et fiscale
    description: |
      Due diligence financière et fiscale sur les comptes d'exploitation, les charges
      et les évaluations fiscales historiques.
  BC-4930.40:
    name: Structuration et négociation de la transaction
    description: |
      Stratégie d'offre, structuration de l'opération et négociation des documents
      transactionnels engageants.
  BC-4930.40.10:
    name: Stratégie d'offre
    description: |
      Définition de la stratégie d'offre incluant le positionnement tarifaire et les
      conditions de l'opération.
  BC-4930.40.20:
    name: Négociation de la lettre d'intention
    description: |
      Négociation des lettres d'intention et des périodes d'exclusivité.
  BC-4930.40.30:
    name: Négociation de la promesse de vente
    description: |
      Négociation et exécution des promesses de vente incluant les déclarations et
      garanties.
  BC-4930.40.40:
    name: Structuration fiscale et juridique du véhicule
    description: |
      Structuration des véhicules d'acquisition pour l'efficacité fiscale incluant
      les échanges 1031 et les structures juridiques.
  BC-4930.50:
    name: Gestion de la clôture et du règlement
    description: |
      Gestion du séquestre, des conditions de clôture, des fonds de règlement et
      de l'enregistrement pour les transactions clôturées.
  BC-4930.50.10:
    name: Séquestre et conditions de clôture
    description: |
      Gestion des comptes séquestres et suivi des conditions de clôture jusqu'à
      leur satisfaction.
  BC-4930.50.20:
    name: Fonds de clôture et état récapitulatif
    description: |
      Coordination des fonds de clôture et réconciliation avec l'état récapitulatif
      de règlement.
  BC-4930.50.30:
    name: Assurance titres et enregistrement
    description: |
      Souscription de l'assurance titres et enregistrement des actes et hypothèques.
  BC-4930.60:
    name: Gestion de la cession et de la sortie
    description: |
      Discipline côté vendeur couvrant la tarification de cession, la commercialisation,
      la sélection des acquéreurs et les obligations post-clôture.
  BC-4930.60.10:
    name: Stratégie et tarification de la cession
    description: |
      Définition de la stratégie de cession, de la tarification et des viviers
      d'acquéreurs cibles.
  BC-4930.60.20:
    name: Commercialisation à la vente et visites acquéreurs
    description: |
      Commercialisation côté vendeur incluant le mémorandum d'information, la data room
      et les visites d'acquéreurs.
  BC-4930.60.30:
    name: Sélection de l'acquéreur et processus d'appel d'offres
    description: |
      Sélection de l'acquéreur par appel d'offres, meilleure offre finale ou processus
      d'enchères structuré.
  BC-4930.60.40:
    name: Obligations post-clôture
    description: |
      Suivi des obligations post-clôture incluant les retenues, les earnouts et les
      réclamations d'indemnisation.
  BC-4930.70:
    name: Intégration post-acquisition
    description: |
      Remise des actifs nouvellement acquis de l'équipe transactionnelle à la gestion
      d'actifs et immobilière, incluant l'intégration des données et des contrats.
  BC-4930.70.10:
    name: Migration des données de l'actif
    description: |
      Migration des données, plans et documents d'exploitation de l'actif dans les
      systèmes du propriétaire.
  BC-4930.70.20:
    name: Intégration des données de baux et de locataires
    description: |
      Intégration des abstractions de baux et des données locataires dans les
      systèmes du bailleur.
  BC-4930.70.30:
    name: Novation des contrats de prestataires
    description: |
      Novation ou remplacement des contrats de prestataires et de services en place
      au profit du nouveau propriétaire.

locale: fr
source: L1-air-traffic-control-operations-management.yaml
entries:
  BC-1210:
    name: Gestion des opérations du contrôle de la circulation aérienne
    description: |
      Services de la circulation aérienne en temps réel — en-route, approche, tour de contrôle et océanique.
  BC-1210.10:
    name: Gestion des opérations du contrôle en-route
    description: |
      Services ATC en-route à haute altitude.
  BC-1210.10.10:
    name: Fourniture de la séparation en-route
    description: |
      Fourniture de la séparation horizontale et verticale dans l'espace aérien en-route.
  BC-1210.10.20:
    name: Détection et résolution des conflits en-route
    description: |
      Détection et résolution des conflits entre vols en-route.
  BC-1210.10.30:
    name: Coordination en-route
    description: |
      Coordination inter-secteurs et inter-centres du trafic en-route.
  BC-1210.10.40:
    name: Traitement des plans de vol
    description: |
      Traitement, activation et mise à jour des plans de vol.
  BC-1210.20:
    name: Gestion des opérations du contrôle d'approche
    description: |
      Contrôle d'approche et de départ en région terminale.
  BC-1210.20.10:
    name: Séquencement et espacement des arrivées
    description: |
      Séquencement des arrivées, AMAN et opérations d'espacement.
  BC-1210.20.20:
    name: Gestion des départs
    description: |
      Gestion des départs, DMAN et respect des SID.
  BC-1210.20.30:
    name: Guidage d'approche et espacement
    description: |
      Guidage radar et espacement pour l'approche finale.
  BC-1210.20.40:
    name: Coordination en région terminale
    description: |
      Coordination entre l'approche et les unités adjacentes.
  BC-1210.30:
    name: Gestion des opérations de la tour de contrôle
    description: |
      Contrôle de la tour sur les aérodromes, y compris les mouvements au sol.
  BC-1210.30.10:
    name: Contrôle de piste
    description: |
      Contrôle de piste incluant les autorisations de décollage et d'atterrissage.
  BC-1210.30.20:
    name: Contrôle des mouvements au sol
    description: |
      Contrôle des mouvements de surface des aéronefs et des véhicules.
  BC-1210.30.30:
    name: Délivrance des autorisations
    description: |
      Délivrance des autorisations de départ et des informations pré-départ.
  BC-1210.30.40:
    name: Coordination aéroportuaire
    description: |
      Coordination avec les opérations aéroportuaires et les services d'urgence.
  BC-1210.40:
    name: Gestion des opérations du contrôle océanique
    description: |
      Services ATC procéduraux et océaniques.
  BC-1210.40.10:
    name: Fourniture de la séparation procédurale
    description: |
      Séparation procédurale dans l'espace aérien océanique sans radar.
  BC-1210.40.20:
    name: Gestion des autorisations océaniques
    description: |
      Délivrance des autorisations et des ré-autorisations océaniques.
  BC-1210.40.30:
    name: Opérations CPDLC et ADS-C
    description: |
      Opérations océaniques par liaison de données utilisant CPDLC et ADS-C.
  BC-1210.50:
    name: Gestion des quarts et des relèves ATC
    description: |
      Supervision de quart, relèves et planification des postes.
  BC-1210.50.10:
    name: Supervision du quart
    description: |
      Supervision opérationnelle du quart et de la performance du poste.
  BC-1210.50.20:
    name: Gestion des relèves de poste
    description: |
      Briefings structurés et documentation des relèves de poste.
  BC-1210.50.30:
    name: Planification des postes
    description: |
      Planification des postes et gestion de la fatigue des contrôleurs.
  BC-1210.60:
    name: Gestion des opérations de contingence
    description: |
      Opérations en mode dégradé, réponse aux pannes système et procédures de repli.
  BC-1210.60.10:
    name: Opérations en mode dégradé
    description: |
      Opérations en mode dégradé avec support système réduit.
  BC-1210.60.20:
    name: Réponse aux pannes système
    description: |
      Procédures de réponse aux pannes des systèmes ATC.
  BC-1210.60.30:
    name: Repli sur les systèmes de secours
    description: |
      Repli sur les systèmes ATC de secours et les installations de contingence.
  BC-1210.60.40:
    name: Tenue des plans de contingence
    description: |
      Tenue et exercice des plans de contingence opérationnels.

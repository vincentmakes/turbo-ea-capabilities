locale: fr
source: L1-chemical-research-process-development-management.yaml
entries:
  BC-4600:
    name: Gestion de la recherche chimique et du développement de procédés
    description: |
      Découverte de nouvelles molécules et voies de synthèse, développement de
      procédés à l'échelle laboratoire, exploitation d'unités pilotes et mise à
      l'échelle vers la production commerciale pour les produits chimiques.
  BC-4600.10:
    name: Découverte de molécules et de voies de synthèse
    description: |
      Identification des molécules cibles et sélection de voies de synthèse
      viables pour les produits chimiques nouveaux et existants.
  BC-4600.10.10:
    name: Identification des molécules cibles
    description: |
      Identification des molécules candidates en regard des objectifs
      d'application.
  BC-4600.10.20:
    name: Analyse rétrosynthétique
    description: |
      Analyse rétrosynthétique des voies de synthèse assistée par ordinateur
      et par expertise.
  BC-4600.10.30:
    name: Criblage des catalyseurs et des réactifs
    description: |
      Criblage à haut débit et ciblé des catalyseurs et des réactifs.
  BC-4600.10.40:
    name: Évaluation de la sélection des voies
    description: |
      Évaluation multicritère des voies candidates en termes de rendement, de
      coût, de sécurité et de durabilité.
  BC-4600.20:
    name: Recherche en cinétique et thermodynamique des réactions
    description: |
      Production des données cinétiques et thermodynamiques nécessaires à la
      modélisation et à la conception des procédés chimiques.
  BC-4600.20.10:
    name: Mesure de la cinétique des réactions
    description: |
      Mesure des vitesses de réaction et des constantes de vitesse dans des
      conditions contrôlées.
  BC-4600.20.20:
    name: Mesure des propriétés thermodynamiques
    description: |
      Détermination de l'enthalpie, de l'entropie et des capacités calorifiques
      des réactifs et produits.
  BC-4600.20.30:
    name: Études d'équilibre de phase
    description: |
      Expérimentation sur les équilibres vapeur-liquide, liquide-liquide et
      solide-liquide.
  BC-4600.20.40:
    name: Développement de modèles cinétiques
    description: |
      Ajustement et validation de modèles cinétiques aux données mesurées.
  BC-4600.30:
    name: Développement et optimisation des procédés
    description: |
      Développement et optimisation des procédés chimiques à l'échelle
      laboratoire avant les essais pilotes.
  BC-4600.30.10:
    name: Conception d'expériences à l'échelle laboratoire
    description: |
      Conception d'expériences à l'échelle laboratoire pour caractériser le
      comportement du procédé.
  BC-4600.30.20:
    name: Optimisation des paramètres de procédé
    description: |
      Optimisation de la température, de la pression, du temps de séjour et
      de la stœchiométrie.
  BC-4600.30.30:
    name: Amélioration du rendement et de la sélectivité
    description: |
      Amélioration du rendement et de la sélectivité par des interventions
      d'ingénierie de réaction.
  BC-4600.30.40:
    name: Sélection du système de solvants
    description: |
      Sélection et optimisation des systèmes de solvants en équilibrant les
      performances et les exigences HSE.
  BC-4600.40:
    name: Gestion des opérations d'unité pilote
    description: |
      Planification, exécution et analyse des campagnes à l'échelle pilote pour
      réduire les risques de la mise à l'échelle commerciale.
  BC-4600.40.10:
    name: Planification des campagnes pilotes
    description: |
      Planification des campagnes d'unité pilote incluant les objectifs et
      les bilans matières.
  BC-4600.40.20:
    name: Exécution de l'unité pilote
    description: |
      Exécution des essais pilotes dans des conditions de procédé représentatives.
  BC-4600.40.30:
    name: Analyse des données pilotes
    description: |
      Analyse des données pilotes pour affiner les modèles cinétiques et de
      rendement.
  BC-4600.40.40:
    name: Gestion des actifs de l'unité pilote
    description: |
      Gestion du cycle de vie des équipements et de l'instrumentation de l'unité
      pilote.
  BC-4600.50:
    name: Gestion de la mise à l'échelle des procédés
    description: |
      Transposition des procédés à l'échelle pilote en définitions de procédés
      commerciaux validés.
  BC-4600.50.10:
    name: Modélisation de la mise à l'échelle
    description: |
      Utilisation de l'analyse dimensionnelle et de la CFD pour modéliser les
      effets de mise à l'échelle.
  BC-4600.50.20:
    name: Validation à l'échelle de démonstration
    description: |
      Exploitation d'installations à l'échelle de démonstration pour valider les
      hypothèses de mise à l'échelle.
  BC-4600.50.30:
    name: Définition du procédé commercial
    description: |
      Finalisation de la base du procédé commercial prête pour l'ingénierie
      de base.
  BC-4600.60:
    name: Criblage des risques de sécurité des procédés
    description: |
      Criblage préliminaire des risques réactifs, thermiques et liés aux
      poussières lors de la recherche et du développement.
  BC-4600.60.10:
    name: Criblage de la chimie réactive
    description: |
      Criblage des risques de chimie réactive par DSC, ARC et calorimétrie
      Calvet.
  BC-4600.60.20:
    name: Tests de stabilité thermique
    description: |
      Détermination des seuils de décomposition thermique et du potentiel
      d'emballement.
  BC-4600.60.30:
    name: Caractérisation des risques liés aux poussières
    description: |
      Caractérisation des risques de poussières combustibles incluant le Kst
      et l'énergie minimale d'inflammation.
  BC-4600.70:
    name: Gestion des connaissances et des données de R&D
    description: |
      Capture et gestion des connaissances de R&D, des enregistrements
      d'expériences et des actifs de données de procédés.
  BC-4600.70.10:
    name: Gestion des cahiers de laboratoire électroniques
    description: |
      Exploitation des cahiers de laboratoire électroniques pour la R&D chimique.
  BC-4600.70.20:
    name: Gestion du référentiel des connaissances de procédés
    description: |
      Gestion des connaissances de procédés couvrant la découverte, le
      développement et la mise à l'échelle.
  BC-4600.70.30:
    name: Curation des données de R&D
    description: |
      Curation, conservation et réutilisation des données structurées
      d'expériences de R&D.

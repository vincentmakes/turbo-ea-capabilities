locale: fr
source: L1-customer-relationship-management.yaml
entries:
  BC-420:
    name: Gestion de la relation client
    description: |
      Données clients, segmentation, cycle de vie et fidélisation.
  BC-420.10:
    name: Gestion des données clients
    description: |
      Référentiel client, résolution d'identité et enregistrement de référence unique.
  BC-420.10.10:
    name: Gestion des données de référence clients
    description: |
      Création, maintenance et gouvernance des enregistrements de référence clients.
  BC-420.10.20:
    name: Résolution d'identité client
    description: |
      Rapprochement, fusion et déduplication des enregistrements clients.
  BC-420.10.30:
    name: Gestion des consentements et préférences
    description: |
      Capture et application des consentements marketing et des préférences clients.
  BC-420.10.40:
    name: Vue client à 360 degrés
    description: |
      Vue agrégée du client sur les produits, canaux et interactions.
  BC-420.20:
    name: Gestion de la segmentation client
    description: |
      Segments, personas et stratégies de traitement différenciées.
  BC-420.20.10:
    name: Segmentation comportementale
    description: |
      Segmentation fondée sur le comportement, le RFM et les signaux d'engagement.
  BC-420.20.20:
    name: Segmentation par valeur client
    description: |
      Segmentation par valeur vie client et rentabilité.
  BC-420.20.30:
    name: Développement des personas clients
    description: |
      Définition des personas et des archétypes de clients cibles.
  BC-420.20.40:
    name: Définition des stratégies de traitement
    description: |
      Stratégies de traitement différenciées par segment client.
  BC-420.30:
    name: Gestion du cycle de vie client
    description: |
      Acquisition, développement, fidélisation et réactivation.
  BC-420.30.10:
    name: Gestion de l'acquisition client
    description: |
      Campagnes d'acquisition, conversion et orchestration de l'intégration.
  BC-420.30.20:
    name: Développement et vente croisée client
    description: |
      Programmes de vente croisée, vente incitative et développement du client.
  BC-420.30.30:
    name: Gestion de la fidélisation client
    description: |
      Prédiction du churn, offres de rétention et équipes de fidélisation.
  BC-420.30.40:
    name: Gestion de la réactivation client
    description: |
      Campagnes de réactivation et reconquête des clients dormants.
  BC-420.40:
    name: Gestion de la fidélité et de la rétention
    description: |
      Programmes de fidélité et initiatives de rétention.
  BC-420.40.10:
    name: Conception du programme de fidélité
    description: |
      Conception de la structure, des niveaux et des avantages du programme de fidélité.
  BC-420.40.20:
    name: Opérations du programme de fidélité
    description: |
      Cumul, utilisation et services aux membres du programme de fidélité.
  BC-420.40.30:
    name: Gestion du passif de fidélité
    description: |
      Comptabilisation et gestion du passif et de la déchéance des points de fidélité.
  BC-420.40.40:
    name: Gestion de l'écosystème de partenaires de fidélité
    description: |
      Intégration des partenaires, remboursement et accords de coalition.

locale: fr
source: L1-agronomy-farm-advisory-management.yaml
entries:
  BC-3530:
    name: Gestion de l'agronomie et du conseil agricole
    description: |
      Analyses de sol, planification de la nutrition et de la protection des cultures, gestion intégrée des ravageurs, recommandations variétales, services de conseil et gestion des essais au champ qui transforment la science agronomique en décisions à l'échelle parcellaire.
  BC-3530.10:
    name: Analyses et tests de sol
    description: |
      Prélèvement, analyse en laboratoire et interprétation des analyses de sol pour alimenter les décisions de nutrition et d'amendement.
  BC-3530.10.10:
    name: Opérations de prélèvement de sol
    description: |
      Prélèvement de sol en champ selon des méthodes en grille, en zones et en composite.
  BC-3530.10.20:
    name: Interprétation des résultats d'analyse de sol
    description: |
      Interprétation des résultats d'analyse de sol par rapport aux besoins des cultures.
  BC-3530.10.30:
    name: Suivi des indicateurs de santé des sols
    description: |
      Suivi des indicateurs de santé des sols dans le temps sur l'ensemble des parcelles.
  BC-3530.20:
    name: Planification de la gestion des nutriments
    description: |
      Calcul des besoins en nutriments des cultures et génération de prescriptions à dose variable conformes à la gestion responsable des nutriments 4R.
    in_scope:
      - Calcul des besoins en nutriments
      - Génération de prescriptions à dose variable
      - Enregistrement de la conformité 4R
    out_of_scope:
      - Exécution de l'application d'engrais (BC-3500.40)
      - Programmes de séquestration du carbone dans les sols (BC-3600.50)
  BC-3530.20.10:
    name: Calcul des besoins en nutriments
    description: |
      Calcul des besoins en nutriments par culture, objectif de rendement et parcelle.
  BC-3530.20.20:
    name: Génération de prescriptions à dose variable
    description: |
      Génération de cartes de prescriptions à dose variable pour les engrais et amendements.
  BC-3530.20.30:
    name: Enregistrement de la conformité 4R
    description: |
      Enregistrement de la bonne source, dose, période et localisation selon la gestion responsable 4R.
  BC-3530.30:
    name: Planification de la protection des cultures
    description: |
      Évaluation des risques, planification de la protection intégrée, conception des programmes de traitement et stratégie de gestion de la résistance.
  BC-3530.30.10:
    name: Évaluation des risques ravageurs et maladies
    description: |
      Évaluation des risques ravageurs et maladies à partir des prévisions et des données de terrain.
  BC-3530.30.20:
    name: Planification de la protection intégrée des cultures
    description: |
      Planification de la protection intégrée combinant les mesures culturales, biologiques et chimiques.
  BC-3530.30.30:
    name: Conception du programme de traitement
    description: |
      Conception du programme de traitement saisonnier équilibrant efficacité, résidus et coût.
  BC-3530.30.40:
    name: Planification de la gestion de la résistance
    description: |
      Planification de la gestion de la résistance aux pesticides selon les modes d'action.
  BC-3530.40:
    name: Recommandation variétale et hybride
    description: |
      Analyse des données d'essais variétaux et émission de recommandations variétales et hybrides adaptées localement aux producteurs.
  BC-3530.40.10:
    name: Analyse des résultats d'essais variétaux
    description: |
      Analyse statistique des résultats d'essais variétaux sur les sites et les saisons.
  BC-3530.40.20:
    name: Recommandation locale de variétés
    description: |
      Émission de recommandations variétales et hybrides par zone et par usage final.
  BC-3530.50:
    name: Services de conseil agronomique
    description: |
      Visites de conseil au champ, recommandations d'aide à la décision et formation des producteurs délivrées par des professionnels en agronomie.
  BC-3530.50.10:
    name: Réalisation des visites de conseil au champ
    description: |
      Visites de conseil en exploitation et remise des recommandations.
  BC-3530.50.20:
    name: Recommandation par aide à la décision
    description: |
      Utilisation d'outils d'aide à la décision pour émettre des recommandations agronomiques.
  BC-3530.50.30:
    name: Réalisation de la formation des producteurs
    description: |
      Réalisation d'événements de formation et de journées de démonstration pour les producteurs.
  BC-3530.60:
    name: Gestion des essais au champ
    description: |
      Conception, exécution et analyse d'essais au champ répétés soutenant l'évaluation agronomique, variétale et des produits.
  BC-3530.60.10:
    name: Conception des essais
    description: |
      Conception statistique des essais répétés et de démonstration.
  BC-3530.60.20:
    name: Exécution des essais et collecte des données
    description: |
      Exécution des essais sur site et collecte standardisée des données.
  BC-3530.60.30:
    name: Analyse des résultats des essais
    description: |
      Analyse statistique des résultats des essais et reporting aux commanditaires.

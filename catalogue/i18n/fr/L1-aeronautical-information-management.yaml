locale: fr
source: L1-aeronautical-information-management.yaml
entries:
  BC-1230:
    name: Gestion de l'information aéronautique
    description: |
      AIP, NOTAM, bases de données aéronautiques, cartographie et AIM numérique.
  BC-1230.10:
    name: Gestion de la publication d'information aéronautique
    description: |
      AIP, cycle AIRAC, amendements et suppléments.
  BC-1230.10.10:
    name: Production de l'AIP
    description: |
      Production de la Publication d'Information Aéronautique.
  BC-1230.10.20:
    name: Gestion du cycle AIRAC
    description: |
      Gestion du cycle AIRAC et des dates d'entrée en vigueur.
  BC-1230.10.30:
    name: Émission des amendements et suppléments à l'AIP
    description: |
      Émission des amendements et suppléments à l'AIP.
  BC-1230.20:
    name: Gestion des NOTAM
    description: |
      Création, publication, diffusion et expiration des NOTAM.
  BC-1230.20.10:
    name: Création des NOTAM
    description: |
      Création et rédaction des NOTAM.
  BC-1230.20.20:
    name: Publication et diffusion des NOTAM
    description: |
      Publication et diffusion via AFTN/AMHS.
  BC-1230.20.30:
    name: Gestion du cycle de vie des NOTAM
    description: |
      Gestion du cycle de vie incluant le remplacement et l'annulation.
  BC-1230.30:
    name: Gestion des bases de données aéronautiques
    description: |
      Intégrité des données aéronautiques, traçabilité, conformité AIRAC et qualité des données.
  BC-1230.30.10:
    name: Création des données aéronautiques
    description: |
      Création et saisie des données aéronautiques conformément à l'Annexe 15 de l'ICAO.
  BC-1230.30.20:
    name: Gestion de la qualité des données aéronautiques
    description: |
      Contrôles de qualité des données, précision, intégrité et résolution.
  BC-1230.30.30:
    name: Distribution des données aéronautiques
    description: |
      Distribution des données aéronautiques aux usagers et aux outils.
  BC-1230.30.40:
    name: Traçabilité et audit des données
    description: |
      Traçabilité de la lignée des données aéronautiques et audit.
  BC-1230.40:
    name: Gestion de la cartographie et de la conception des procédures
    description: |
      Cartes aéronautiques, procédures de vol aux instruments et conception de procédures PBN.
  BC-1230.40.10:
    name: Production des cartes aéronautiques
    description: |
      Production des cartes en-route, terminales et aéroportuaires.
  BC-1230.40.20:
    name: Conception des procédures de vol aux instruments
    description: |
      Conception des SID, STAR et procédures d'approche aux instruments.
  BC-1230.40.30:
    name: Conception des procédures de navigation basée sur les performances
    description: |
      Conception des procédures PBN incluant RNP et RNAV.
  BC-1230.40.40:
    name: Validation et approbation des procédures
    description: |
      Validation des procédures, vérification en vol et approbation réglementaire.
  BC-1230.50:
    name: Gestion des services AIM numériques
    description: |
      Produits de données numériques, services SWIM et AIM lisibles par machine.
  BC-1230.50.10:
    name: Gestion des produits de données numériques
    description: |
      Gestion des produits de données AIM numériques (basés sur AIXM).
  BC-1230.50.20:
    name: Fourniture des services SWIM
    description: |
      Fourniture des services de gestion de l'information à l'échelle du système (SWIM).
  BC-1230.50.30:
    name: Distribution de l'AIM lisible par machine
    description: |
      Distribution de l'AIM lisible par machine aux abonnés.

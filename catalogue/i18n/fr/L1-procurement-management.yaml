locale: fr
source: L1-procurement-management.yaml
entries:
  BC-500:
    name: Gestion des achats
    description: |
      Approvisionnement, contractualisation, achat et opérations procure-to-pay.
  BC-500.10:
    name: Gestion de l'approvisionnement
    description: |
      Approvisionnement stratégique, appels d'offres et sélection des fournisseurs.
  BC-500.10.10:
    name: Définition de la stratégie d'approvisionnement
    description: |
      Définition de la stratégie d'approvisionnement par catégorie et marché.
  BC-500.10.20:
    name: Exécution des appels d'offres
    description: |
      Préparation, émission et évaluation des RFI, RFQ et RFP.
  BC-500.10.30:
    name: Négociation avec les fournisseurs
    description: |
      Négociation commerciale et contractuelle avec les fournisseurs présélectionnés.
  BC-500.10.40:
    name: Sélection et attribution aux fournisseurs
    description: |
      Sélection finale du fournisseur, décision d'attribution et notification.
  BC-500.10.50:
    name: Opérations d'enchères inversées
    description: |
      Mise en place, déroulement et attribution des enchères électroniques pour les lots concurrentiels.
  BC-500.20:
    name: Gestion des contrats d'achats
    description: |
      Contrats d'achats, conditions et cycle de vie.
  BC-500.20.10:
    name: Rédaction et modèles de contrats d'achats
    description: |
      Modèles de contrats d'achats, clauses et guides de négociation.
  BC-500.20.20:
    name: Approbation et exécution des contrats d'achats
    description: |
      Workflow d'approbation, signature et exécution des contrats d'achats.
  BC-500.20.30:
    name: Surveillance de la conformité contractuelle
    description: |
      Surveillance des achats effectués auprès des fournisseurs et aux prix contractuels.
  BC-500.20.40:
    name: Renouvellement et renégociation des contrats d'achats
    description: |
      Gestion des cycles de renouvellement et renégociation des contrats d'achats.
  BC-500.30:
    name: Gestion des bons de commande
    description: |
      Création, approbation et exécution des bons de commande.
  BC-500.30.10:
    name: Création des bons de commande
    description: |
      Génération des bons de commande à partir des demandes, contrats ou catalogues.
  BC-500.30.20:
    name: Approbation des bons de commande
    description: |
      Workflows d'approbation des bons de commande basés sur des seuils.
  BC-500.30.30:
    name: Accusé de réception et gestion des modifications de bons de commande
    description: |
      Accusé de réception fournisseur et gestion des ordres de modification.
  BC-500.30.40:
    name: Clôture des bons de commande
    description: |
      Réception complète, rapprochement des factures et clôture des bons de commande.
  BC-500.40:
    name: Gestion des opérations procure-to-pay
    description: |
      Opérations P2P quotidiennes, demandes d'achat et réceptions.
  BC-500.40.10:
    name: Gestion des demandes d'achat
    description: |
      Capture, approbation et conversion des demandes d'achat.
  BC-500.40.20:
    name: Gestion des catalogues et du punch-out
    description: |
      Catalogues internes et punch-out fournisseur pour les achats en libre-service.
  BC-500.40.30:
    name: Réception des marchandises et acceptation des services
    description: |
      Enregistrement des réceptions de marchandises et des attestations de service.
  BC-500.40.40:
    name: Rapprochement des factures
    description: |
      Rapprochement à deux et trois voies des factures avec les bons de commande et les réceptions.
  BC-500.40.50:
    name: Assistance P2P et support aux acheteurs
    description: |
      Assistance aux acheteurs et fournisseurs pour les transactions P2P.
  BC-500.50:
    name: Gestion des catégories d'achats
    description: |
      Stratégie par catégorie et analyse des dépenses par catégorie.
  BC-500.50.10:
    name: Développement de la stratégie par catégorie
    description: |
      Stratégie pluriannuelle par catégorie et évaluation du marché fournisseur.
  BC-500.50.20:
    name: Gestion de la performance par catégorie
    description: |
      Suivi des KPI, des économies et de la création de valeur par catégorie.
  BC-500.50.30:
    name: Agrégation de la demande et standardisation
    description: |
      Consolidation de la demande et standardisation des spécifications entre les unités opérationnelles.
  BC-500.50.40:
    name: Approvisionnement en innovation par catégorie
    description: |
      Identification de l'innovation via les marchés fournisseurs.
  BC-500.60:
    name: Gestion de l'analyse des dépenses d'achats
    description: |
      Visibilité des dépenses, reporting et suivi des économies.
  BC-500.60.10:
    name: Agrégation et nettoyage des données de dépenses
    description: |
      Agrégation, nettoyage et classification des données de dépenses de l'entreprise.
  BC-500.60.20:
    name: Reporting et analytique des dépenses
    description: |
      Analytique des dépenses, tableaux de bord et identification des dépenses adressables.
  BC-500.60.30:
    name: Suivi et validation des économies
    description: |
      Capture, validation et reporting des économies réalisées aux achats.
  BC-500.60.40:
    name: Gestion des dépenses de queue
    description: |
      Identification et rationalisation des dépenses de queue.

locale: fr
source: L1-electrical-product-engineering-management.yaml
entries:
  BC-1900:
    name: Gestion de l'ingénierie des produits électriques
    description: |
      Conception pluridisciplinaire des produits électriques et électroniques : circuits, électronique de puissance, embarqué, CEM, thermique et mécanique jusqu'à la vérification de conception.
  BC-1900.10:
    name: Conception de circuits électriques
    description: |
      Conception schématique des circuits analogiques, numériques, mixtes et RF.
  BC-1900.10.10:
    name: Conception de circuits analogiques
    description: |
      Conception de circuits de traitement du signal analogique et de conditionnement de puissance.
  BC-1900.10.20:
    name: Conception de circuits numériques
    description: |
      Conception de circuits logiques numériques et de circuits d'horloge.
  BC-1900.10.30:
    name: Conception de circuits mixtes
    description: |
      Conception d'interfaces mixtes, sous-systèmes ADC/DAC et étages de conversion.
  BC-1900.10.40:
    name: Conception de circuits RF
    description: |
      Conception de fronts RF, réseaux d'adaptation et antennes.
  BC-1900.20:
    name: Conception de l'électronique de puissance
    description: |
      Conception des convertisseurs de puissance, variateurs de moteur et topologies de commutation.
  BC-1900.20.10:
    name: Conception de convertisseurs de puissance
    description: |
      Conception des convertisseurs AC/DC, DC/DC et DC/AC.
  BC-1900.20.20:
    name: Conception de la topologie des variateurs de moteur
    description: |
      Sélection de la topologie et conception des variateurs de vitesse pour moteurs.
  BC-1900.20.30:
    name: Conception de magnétiques et de filtres
    description: |
      Conception d'inductances, de transformateurs et de filtres CEM.
  BC-1900.20.40:
    name: Conception de la boucle de commande de commutation
    description: |
      Conception de la commande en boucle fermée pour les étages de commutation de puissance.
  BC-1900.30:
    name: Conception de PCB et de boîtiers électroniques
    description: |
      Routage PCB, boîtiers électroniques et ingénierie des interconnexions.
  BC-1900.30.10:
    name: Routage PCB
    description: |
      Empilement multicouche et routage physique des PCB.
  BC-1900.30.20:
    name: Conception de boîtiers électroniques
    description: |
      Conception des boîtiers de modules, coffrets et BGA.
  BC-1900.30.30:
    name: Conception des câblages et faisceaux de câbles
    description: |
      Conception des faisceaux de câbles, barres omnibus et interconnexions entre cartes.
  BC-1900.30.40:
    name: Gestion de la bibliothèque d'empreintes de composants
    description: |
      Maintenance des bibliothèques d'empreintes et de symboles CAO.
  BC-1900.40:
    name: Conception matérielle embarquée
    description: |
      Conception des plateformes microcontrôleurs, FPGA, interfaces capteurs et gestion d'énergie.
  BC-1900.40.10:
    name: Conception de plateforme microcontrôleur
    description: |
      Sélection et intégration des plateformes microcontrôleurs.
  BC-1900.40.20:
    name: Intégration FPGA et SoC
    description: |
      Intégration des composants FPGA et SoC dans le matériel du produit.
  BC-1900.40.30:
    name: Conception d'interfaces capteurs et actionneurs
    description: |
      Interfaces analogiques et numériques vers les capteurs et actionneurs.
  BC-1900.40.40:
    name: Conception des circuits de gestion d'énergie
    description: |
      Circuits embarqués de gestion et de régulation de l'énergie.
  BC-1900.50:
    name: Ingénierie du firmware embarqué
    description: |
      Développement du firmware couvrant RTOS, pilotes, logique applicative et vérification.
  BC-1900.50.10:
    name: Architecture logicielle temps réel
    description: |
      Système d'exploitation temps réel et architecture des tâches.
  BC-1900.50.20:
    name: Développement des pilotes de périphériques
    description: |
      Développement des pilotes bas niveau et des paquetages de support de carte.
  BC-1900.50.30:
    name: Développement de l'application embarquée
    description: |
      Développement de la logique applicative et des fonctionnalités embarquées.
  BC-1900.50.40:
    name: Vérification et essais du firmware
    description: |
      Vérification du firmware par tests unitaires, d'intégration et matériel dans la boucle.
  BC-1900.60:
    name: Ingénierie CEM et intégrité du signal
    description: |
      Gestion en phase de conception de la compatibilité électromagnétique et de l'intégrité du signal.
  BC-1900.60.10:
    name: Analyse CEM en phase de conception
    description: |
      Analyse des émissions et de l'immunité en phase de conception.
  BC-1900.60.20:
    name: Analyse de l'intégrité du signal
    description: |
      Analyse de l'intégrité du signal haute vitesse et de la diaphonie.
  BC-1900.60.30:
    name: Conception du blindage et de la mise à la terre
    description: |
      Stratégies de blindage, de liaison et de mise à la terre.
  BC-1900.60.40:
    name: Évaluation pré-conformité CEM
    description: |
      Mesures pré-conformité et évaluation CEM en phase de conception.
  BC-1900.70:
    name: Ingénierie thermique et mécanique
    description: |
      Ingénierie thermique, boîtiers et mécanique des produits électriques.
  BC-1900.70.10:
    name: Analyse thermique et conception du refroidissement
    description: |
      Modélisation thermique et conception de la stratégie de refroidissement.
  BC-1900.70.20:
    name: Conception des boîtiers et de la protection contre les intrusions
    description: |
      Conception mécanique des boîtiers et conformité aux indices de protection.
  BC-1900.70.30:
    name: Ingénierie des vibrations et des chocs
    description: |
      Robustesse mécanique face aux sollicitations vibratoires et aux chocs.
  BC-1900.70.40:
    name: Conception des connecteurs et des interfaces mécaniques
    description: |
      Sélection des connecteurs et conception des interfaces mécaniques.
  BC-1900.80:
    name: Vérification de la conception électrique
    description: |
      Vérification de la conception par simulation, réalisation de prototypes et essais.
  BC-1900.80.10:
    name: Simulation de conception
    description: |
      Simulations de circuit, électromagnétiques et thermiques.
  BC-1900.80.20:
    name: Réalisation et mise en route des prototypes
    description: |
      Assemblage des prototypes et mise en route fonctionnelle initiale.
  BC-1900.80.30:
    name: Essais de vérification de conception
    description: |
      Essais de vérification par rapport aux spécifications de conception.
  BC-1900.80.40:
    name: Gouvernance des revues de conception
    description: |
      Revues de conception par jalons et assurance qualité de la conception.

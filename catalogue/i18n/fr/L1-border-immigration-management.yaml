locale: fr
source: L1-border-immigration-management.yaml
entries:
  BC-3300:
    name: Gestion des frontières et de l'immigration
    description: |
      Contrôle des personnes aux frontières, visas et autorisations de voyage, détermination
      du statut de réfugié et d'asile, administration du statut migratoire et de la résidence,
      naturalisation et opérations d'éloignement.
  BC-3300.10:
    name: Gestion des visas et des autorisations de voyage
    description: |
      Traitement des demandes, décision et délivrance des visas et des autorisations de voyage
      incluant la pré-autorisation de type ETA.
    in_scope:
      - Traitement et décision des demandes de visa
      - Autorisation électronique de voyage
      - Contrôle de la fraude documentaire aux visas
    out_of_scope:
      - Conformité douanière et commerciale des marchandises (couverte par la gestion des douanes et de la conformité commerciale)
  BC-3300.10.10:
    name: Traitement des demandes de visa
    description: |
      Réception, validation et traitement des demandes de visa pour toutes les catégories.
  BC-3300.10.20:
    name: Décision sur les demandes de visa
    description: |
      Prise de décision sur les demandes de visa incluant le refus et les conditions.
  BC-3300.10.30:
    name: Autorisation électronique de voyage
    description: |
      Délivrance et révocation des autorisations de voyage préalables de type ETA.
  BC-3300.10.40:
    name: Contrôle de la fraude aux visas
    description: |
      Contrôle des demandes pour détecter la fraude, la falsification de documents et les anomalies des documents d'identité.
  BC-3300.20:
    name: Inspection aux frontières et admission
    description: |
      Inspection et admission des voyageurs aux points d'entrée incluant le contrôle primaire et secondaire.
  BC-3300.20.10:
    name: Traitement des informations préalables sur les passagers
    description: |
      Traitement des données API et PNR avant l'arrivée des voyageurs.
  BC-3300.20.20:
    name: Contrôle primaire
    description: |
      Contrôle en première ligne aux points d'entrée incluant la vérification biométrique.
  BC-3300.20.30:
    name: Contrôle secondaire
    description: |
      Contrôle secondaire des voyageurs nécessitant un examen approfondi.
  BC-3300.20.40:
    name: Décision d'admission ou de refus
    description: |
      Prise de décision sur l'admission, le refus et les conditions d'entrée.
  BC-3300.30:
    name: Détermination du statut de réfugié et d'asile
    description: |
      Réception, examen et détermination des demandes d'asile en vertu de la Convention
      de 1951 relative aux réfugiés et des régimes nationaux de protection.
  BC-3300.30.10:
    name: Réception des demandes d'asile
    description: |
      Réception et enregistrement des demandes d'asile aux frontières et sur le territoire.
  BC-3300.30.20:
    name: Détermination du statut de réfugié
    description: |
      Instruction du statut de réfugié au titre de la Convention de 1951 et de la protection subsidiaire.
  BC-3300.30.30:
    name: Coordination de l'accueil et du soutien aux demandeurs d'asile
    description: |
      Coordination de l'accueil, de l'hébergement et du soutien de base aux demandeurs d'asile.
  BC-3300.30.40:
    name: Réinstallation et voies humanitaires
    description: |
      Exploitation des programmes de réinstallation et d'admission humanitaire.
  BC-3300.40:
    name: Gestion du statut migratoire et de la résidence
    description: |
      Administration du statut migratoire sur le territoire incluant les titres de séjour,
      les autorisations de travail et les cas de regroupement familial.
  BC-3300.40.10:
    name: Administration des titres de séjour
    description: |
      Délivrance et renouvellement des titres de séjour et des cartes de résidence biométriques.
  BC-3300.40.20:
    name: Administration des autorisations de travail
    description: |
      Administration des permis de travail, des licences de parrainage et des tests du marché du travail.
  BC-3300.40.30:
    name: Traitement du regroupement familial
    description: |
      Traitement des demandes de regroupement familial et des demandes de personnes à charge.
  BC-3300.40.40:
    name: Surveillance de la conformité au statut
    description: |
      Surveillance de la conformité aux conditions d'immigration et des changements de statut.
  BC-3300.50:
    name: Gestion de la naturalisation et de la citoyenneté
    description: |
      Instruction des demandes de naturalisation, de la citoyenneté par filiation ou enregistrement,
      et des cas de déchéance de nationalité.
  BC-3300.50.10:
    name: Traitement des demandes de naturalisation
    description: |
      Traitement des demandes de naturalisation et des évaluations de la bonne moralité.
  BC-3300.50.20:
    name: Citoyenneté par filiation et enregistrement
    description: |
      Détermination de la citoyenneté par filiation, enregistrement et adoption.
  BC-3300.50.30:
    name: Administration des cérémonies de citoyenneté et des serments
    description: |
      Organisation des cérémonies de naturalisation et administration des serments d'allégeance.
  BC-3300.50.40:
    name: Traitement des déchéances de nationalité
    description: |
      Instruction des cas de déchéance, de renonciation et de révocation de la citoyenneté.
  BC-3300.60:
    name: Gestion de l'éloignement et de la rétention
    description: |
      Opérations de rétention, d'éloignement et de retour volontaire des personnes
      sans statut migratoire régulier.
  BC-3300.60.10:
    name: Opérations des centres de rétention administrative
    description: |
      Exploitation des centres de rétention administrative et application des normes de bien-être.
  BC-3300.60.20:
    name: Exécution des ordres d'éloignement
    description: |
      Exécution des ordres d'éloignement et d'expulsion incluant les éloignements escortés.
  BC-3300.60.30:
    name: Opérations du programme de retour volontaire
    description: |
      Coordination des programmes d'aide au retour volontaire et à la réintégration.

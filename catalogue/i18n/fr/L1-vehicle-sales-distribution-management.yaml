locale: fr
source: L1-vehicle-sales-distribution-management.yaml
entries:
  BC-3440:
    name: Gestion des ventes et de la distribution de véhicules
    description: |
      Ventes et distribution opérationnelles de véhicules neufs — planification des volumes en gros, allocation des créneaux de fabrication, carnets de commandes, inventaires de véhicules de démonstration et de véhicules d'occasion certifiés, ventes flotte et B2B, et interface de remise et immatriculation aux clients particuliers.
  BC-3440.10:
    name: Planification des ventes et allocation des véhicules
    description: |
      Planification des volumes en gros par marché et concessionnaire, et allocation des créneaux de fabrication en conséquence.
  BC-3440.10.10:
    name: Planification des volumes en gros
    description: |
      Planification périodique des volumes de véhicules en gros par marché, modèle et segment.
  BC-3440.10.20:
    name: Allocation de la production aux marchés
    description: |
      Allocation des capacités d'usine finies aux marchés et aux canaux en fonction de la demande et des priorités stratégiques.
  BC-3440.10.30:
    name: Gestion des créneaux de fabrication
    description: |
      Allocation, échange et libération des créneaux de fabrication aux concessionnaires et aux clients flottes.
  BC-3440.20:
    name: Gestion du carnet de commandes véhicules
    description: |
      Capture, validation de la configuration et gestion du cycle de vie des commandes de stock et de véhicules clients.
  BC-3440.20.10:
    name: Gestion des commandes de stock
    description: |
      Gestion des commandes de stock des concessionnaires selon les allocations et les objectifs de stock.
  BC-3440.20.20:
    name: Saisie des commandes clients
    description: |
      Saisie des commandes de véhicules des clients particuliers et flottes incluant la configuration et la tarification.
  BC-3440.20.30:
    name: Validation de la configuration des commandes
    description: |
      Validation des configurations de commandes selon les règles de faisabilité, de réglementation et de tarification.
  BC-3440.20.40:
    name: Suivi du statut des commandes
    description: |
      Suivi de bout en bout du statut des commandes depuis la réception jusqu'à la fabrication, l'expédition et l'arrivée chez le concessionnaire.
  BC-3440.30:
    name: Opérations de fabrication et de distribution
    description: |
      Coordination de l'exécution de la fabrication sur commande et de la logistique sortante des véhicules de l'usine au concessionnaire.
  BC-3440.30.10:
    name: Coordination de la fabrication sur commande
    description: |
      Coordination de l'exécution de la fabrication sur commande avec les opérations de production et les appels fournisseurs.
  BC-3440.30.20:
    name: Coordination de la logistique véhicule
    description: |
      Coordination de la logistique sortante des véhicules par camion, rail, bateau et mouvements de parc intermédiaire.
  BC-3440.30.30:
    name: Coordination des opérations portuaires et de parc
    description: |
      Coordination des opérations au port d'entrée, dans les centres de traitement et dans les parcs, y compris l'accessoirisation avant livraison.
  BC-3440.40:
    name: Gestion des stocks et des véhicules de démonstration
    description: |
      Gestion des stocks des concessionnaires, des véhicules de démonstration, de presse et de prêt.
  BC-3440.40.10:
    name: Gestion des stocks de véhicules des concessionnaires
    description: |
      Visibilité et gestion de l'inventaire de véhicules chez les concessionnaires et en transit.
  BC-3440.40.20:
    name: Gestion des véhicules de démonstration
    description: |
      Gestion des parcs de véhicules de démonstration utilisés par les concessionnaires et la force de vente terrain du constructeur.
  BC-3440.40.30:
    name: Gestion des parcs de presse et de prêt
    description: |
      Gestion des parcs de presse, marketing et de prêt incluant les configurations et la rotation.
  BC-3440.50:
    name: Gestion du programme de véhicules d'occasion certifiés
    description: |
      Gestion des programmes de véhicules d'occasion certifiés du constructeur couvrant l'inspection, l'éligibilité, la marque et la garantie.
    in_scope:
      - Critères d'inspection et d'éligibilité des véhicules d'occasion certifiés
      - Inventaire et tarification des véhicules d'occasion certifiés
      - Programmes de garantie spécifiques aux véhicules d'occasion certifiés
    out_of_scope:
      - Commercialisation de véhicules d'occasion hors programme véhicules d'occasion certifiés
  BC-3440.50.10:
    name: Éligibilité et inspection des véhicules d'occasion certifiés
    description: |
      Définition et exécution des critères d'éligibilité et des normes d'inspection des véhicules d'occasion certifiés.
  BC-3440.50.20:
    name: Gestion des stocks de véhicules d'occasion certifiés
    description: |
      Gestion des stocks de véhicules d'occasion certifiés dans les concessionnaires et les pools centraux.
  BC-3440.50.30:
    name: Garantie et marque des véhicules d'occasion certifiés
    description: |
      Conception et commercialisation du programme de garantie des véhicules d'occasion certifiés sous marque.
  BC-3440.60:
    name: Gestion des ventes flottes et interentreprises
    description: |
      Opérations de vente pour les clients flottes, leasing, location et autres acheteurs B2B de véhicules, incluant le traitement des appels d'offres.
  BC-3440.60.10:
    name: Gestion des comptes flottes
    description: |
      Gestion des grands comptes flottes et des relations avec les clients entreprises.
  BC-3440.60.20:
    name: Gestion des appels d'offres et des soumissions flottes
    description: |
      Réponse aux appels d'offres flottes, RFP et processus d'offres structurés pour les grandes transactions de véhicules.
  BC-3440.60.30:
    name: Gestion des spécifications véhicule flottes
    description: |
      Gestion des spécifications, options et conversions de véhicules spécifiques aux flottes.
  BC-3440.60.40:
    name: Gestion des canaux location et leasing
    description: |
      Gestion des relations du constructeur avec les sociétés de location et de leasing, incluant les arrangements de reprise.
  BC-3440.70:
    name: Support à la remise et à l'immatriculation des véhicules
    description: |
      Support aux concessionnaires pour la remise, l'immatriculation des véhicules et l'entrée dans la phase d'expérience client.
  BC-3440.70.10:
    name: Coordination de l'inspection avant livraison
    description: |
      Coordination des normes et validations d'inspection avant livraison dans les concessionnaires et les centres de traitement.
  BC-3440.70.20:
    name: Liaison pour l'immatriculation des véhicules
    description: |
      Liaison avec les autorités d'immatriculation des véhicules et fourniture des données de première immatriculation.
  BC-3440.70.30:
    name: Expérience de remise client
    description: |
      Définition et assurance de l'expérience de remise client à la livraison.

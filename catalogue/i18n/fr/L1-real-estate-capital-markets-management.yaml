locale: fr
source: L1-real-estate-capital-markets-management.yaml
entries:
  BC-4980:
    name: Gestion des marchés des capitaux immobiliers
    description: |
      Discipline spécifique aux marchés des capitaux immobiliers en dette et en
      fonds propres — origination de dette senior, mezzanine, de construction et
      relais ; gestion des actifs et du service de la dette ; structuration de
      CMBS et CRE CLO ; programmes de fonds propres en coentreprise ; levée de
      capitaux publics pour les SIIC/REIT ; refinancement et recapitalisation ;
      et gestion du risque du portefeuille de prêts immobiliers commerciaux (PIC).
      Distinct du crédit bancaire générique (BC-1320) et de la trésorerie d'entreprise
      (BC-210) — ancré sur les conventions de sûretés immobilières, le reporting IRP
      et les covenants DSCR / LTV.
    in_scope:
      - Origination de prêts senior, mezzanine, de construction et relais
      - Mise en gestion, suivi des covenants, modification et service spécial des prêts PIC
      - Pooling, structuration et reporting IRP des CMBS et CRE CLO
      - Sourcing de fonds propres en JV, structuration des intéressements et cascades, reporting aux partenaires
      - Capital public/privé SIIC/REIT, dettes, programmes ATM et politique de dividende
      - Exécution du refinancement et de la recapitalisation
      - Concentration du portefeuille PIC, stress testing et provisionnement
    out_of_scope:
      - Crédit et prêts bancaires génériques (BC-1320)
      - Marchés de capitaux en trading générique (BC-1370)
      - Formation de fonds et levée de capitaux LP (BC-4910)
      - Exécution des transactions d'acquisition (BC-4930)
  BC-4980.10:
    name: Origination de la dette immobilière
    description: |
      Origination de la dette immobilière senior, mezzanine, de construction et
      relais sur la base de la souscription de l'actif et du sponsor.
  BC-4980.10.10:
    name: Origination de prêts hypothécaires seniors
    description: |
      Origination de prêts hypothécaires seniors sur actifs en exploitation.
  BC-4980.10.20:
    name: Origination de prêts de construction et relais
    description: |
      Origination de prêts de construction et relais pour les actifs en développement
      et en transition.
  BC-4980.10.30:
    name: Origination de dette mezzanine et de fonds propres préférentiels
    description: |
      Origination de dette mezzanine et de fonds propres préférentiels dans la
      structure du capital.
  BC-4980.10.40:
    name: Négociation de la term sheet et de la lettre d'engagement
    description: |
      Négociation des term sheets et des lettres d'engagement avec les emprunteurs
      et les sponsors.
  BC-4980.20:
    name: Service et gestion des actifs de la dette immobilière
    description: |
      Mise en gestion et service des prêts PIC et suivi proactif, modification
      et restructuration si nécessaire.
  BC-4980.20.10:
    name: Mise en gestion et paramétrage du service de prêt
    description: |
      Mise en gestion des nouveaux prêts PIC sur la plateforme de service et
      paramétrage des flux de paiement et de reporting.
  BC-4980.20.20:
    name: Suivi des covenants et du DSCR
    description: |
      Suivi continu des covenants du prêt, du DSCR et du LTV par rapport aux
      déclencheurs du contrat de prêt.
  BC-4980.20.30:
    name: Modification et restructuration des prêts
    description: |
      Négociation des modifications et restructurations de prêts sur les actifs
      sous tension.
  BC-4980.20.40:
    name: Coordination du service spécial
    description: |
      Coordination avec les gestionnaires spéciaux sur les prêts en défaut et
      proches du défaut dans les titrisations.
  BC-4980.30:
    name: Gestion des CMBS et des titrisations
    description: |
      Agrégation des pools de prêts, structuration des opérations CMBS et CRE CLO,
      et reporting IRP continu aux investisseurs.
  BC-4980.30.10:
    name: Agrégation des pools de prêts
    description: |
      Agrégation des pools de prêts éligibles à la titrisation.
  BC-4980.30.20:
    name: Structuration des titrisations
    description: |
      Structuration des opérations CMBS et CRE CLO incluant le tranching et les notations.
  BC-4980.30.30:
    name: Reporting IRP aux investisseurs
    description: |
      Reporting aux investisseurs dans le cadre du paquet de reporting CREFC (IRP).
  BC-4980.30.40:
    name: Coordination avec le trustee et le gestionnaire
    description: |
      Coordination avec les trustees, gestionnaires principaux et agences de notation
      sur les opérations en cours.
  BC-4980.40:
    name: Gestion des coentreprises et des partenaires en fonds propres
    description: |
      Sourcing des fonds propres en coentreprise, structuration des intéressements et
      des cascades, et reporting et distributions continus aux partenaires.
  BC-4980.40.10:
    name: Sourcing de fonds propres en coentreprise
    description: |
      Sourcing de fonds propres en coentreprise auprès de partenaires institutionnels
      et hauts patrimoines.
  BC-4980.40.20:
    name: Structuration des intéressements et des cascades
    description: |
      Structuration des intéressements, des hurdles et des cascades dans les accords
      de partenariat en JV.
  BC-4980.40.30:
    name: Reporting et distributions aux partenaires JV
    description: |
      Reporting aux partenaires JV et exécution des distributions contractuelles.
  BC-4980.50:
    name: Gestion des marchés des capitaux SIIC/REIT
    description: |
      Émission de capital et de dette publics et privés pour les SIIC/REIT, programmes
      ATM et gestion de la politique de dividende.
  BC-4980.50.10:
    name: Émission de capital public SIIC/REIT
    description: |
      Émission de capital SIIC/REIT par offres complémentaires et placements privés.
  BC-4980.50.20:
    name: Émission de dette et d'obligations SIIC/REIT
    description: |
      Émission de dette non sécurisée, d'obligations et de billets échangeables SIIC/REIT.
  BC-4980.50.30:
    name: Gestion des programmes ATM
    description: |
      Gestion des programmes de capital au prix du marché incluant le pacing et les
      divulgations.
  BC-4980.50.40:
    name: Gestion de la politique de dividende
    description: |
      Gestion de la politique de dividende SIIC/REIT alignée sur les exigences de
      distribution et l'AFFO.
  BC-4980.60:
    name: Gestion du refinancement et de la recapitalisation
    description: |
      Refinancement et recapitalisation proactifs des structures du capital des actifs
      en exploitation sur la durée de détention.
  BC-4980.60.10:
    name: Stratégie de refinancement et pacing des échéances
    description: |
      Définition de la stratégie de refinancement et du pacing des maturités à travers
      le portefeuille.
  BC-4980.60.20:
    name: Exécution des refinancements
    description: |
      Exécution des opérations de refinancement sur des actifs individuels et des
      pools.
  BC-4980.60.30:
    name: Restructuration de la recapitalisation
    description: |
      Restructuration des structures du capital par recapitalisation entre partenaires
      ou injections de fonds propres.
  BC-4980.70:
    name: Gestion du risque du portefeuille de prêts immobiliers
    description: |
      Suivi des concentrations, stress testing, provisionnement des pertes et gestion
      de la watch list pour les portefeuilles de prêts PIC.
  BC-4980.70.10:
    name: Suivi des concentrations LTV / DSCR
    description: |
      Suivi des concentrations LTV et DSCR dans le portefeuille de prêts PIC.
  BC-4980.70.20:
    name: Stress testing du portefeuille de prêts PIC
    description: |
      Stress testing du portefeuille de prêts PIC face aux chocs de taux, de vacance
      et de valeur.
  BC-4980.70.30:
    name: Provisionnement des pertes CECL / IFRS 9 (PIC)
    description: |
      Provisionnement des pertes du portefeuille PIC dans le cadre CECL et IFRS 9
      des pertes de crédit attendues.
  BC-4980.70.40:
    name: Suivi de la watch list et des défauts
    description: |
      Maintenance de la watch list et suivi des prêts en défaut dans le portefeuille.

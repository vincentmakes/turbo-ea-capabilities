locale: fr
source: L1-dangerous-goods-management.yaml
entries:
  BC-2490:
    name: Gestion des marchandises dangereuses
    description: |
      Acceptation, documentation, manutention, formation et gestion des incidents
      pour les mouvements de marchandises dangereuses sur les modes routier,
      ferroviaire, maritime et aérien sous les régimes IMDG, IATA DGR, ADR et RID.
  BC-2490.10:
    name: Gestion de l'acceptation des marchandises dangereuses
    description: |
      Examen préalable à l'acceptation des expéditions de marchandises dangereuses
      conformément aux règles modales et décision d'acceptation.
    in_scope:
      - Examen de la déclaration du chargeur
      - Vérifications de compatibilité, de ségrégation et de quantité
    out_of_scope:
      - Restrictions douanières sur les substances dangereuses (BC-2480)
      - Réclamations de fret pour DG endommagées (BC-2530.40)
  BC-2490.10.10:
    name: Examen de la déclaration du chargeur
    description: |
      Examen des déclarations de marchandises dangereuses du chargeur et de la
      documentation justificative.
  BC-2490.10.20:
    name: Vérification de compatibilité et de ségrégation
    description: |
      Vérifications de compatibilité, de ségrégation et de quantité selon les
      réglementations modales.
  BC-2490.10.30:
    name: Décision d'acceptation et endossement
    description: |
      Décision d'acceptation, endossement ou refus des envois de marchandises
      dangereuses.
  BC-2490.20:
    name: Gestion de la documentation des marchandises dangereuses
    description: |
      Émission et maintenance des déclarations de marchandises dangereuses, NOTOC
      et documentation multimodale sur les matières dangereuses.
  BC-2490.20.10:
    name: Émission des déclarations de marchandises dangereuses
    description: |
      Émission des déclarations de marchandises dangereuses conformément à
      l'IMDG, DGR, ADR et RID.
  BC-2490.20.20:
    name: Préparation du NOTOC et des manifestes
    description: |
      Préparation de la notification au commandant de bord et des manifestes de
      fret dangereux.
  BC-2490.20.30:
    name: Réconciliation de la documentation multimodale
    description: |
      Réconciliation des documents de marchandises dangereuses lors des transferts
      entre modes.
  BC-2490.30:
    name: Gestion de la manutention et de l'arrimage des marchandises dangereuses
    description: |
      Conformité de la manutention physique et de l'arrimage aux exigences
      relatives aux marchandises dangereuses.
  BC-2490.30.10:
    name: Conformité en matière de ségrégation et d'arrimage
    description: |
      Conformité de la ségrégation et de l'arrimage à bord, sur le pont et en
      entrepôt.
  BC-2490.30.20:
    name: Stockage en zone réservée
    description: |
      Stockage des marchandises dangereuses dans des zones réservées, ventilées
      et confinées.
  BC-2490.30.30:
    name: Utilisation d'équipements de manutention spécialisés
    description: |
      Utilisation d'équipements de manutention spécialisés pour les marchandises
      dangereuses et d'équipements de protection individuelle.
  BC-2490.40:
    name: Gestion de la formation et des compétences en matière de marchandises dangereuses
    description: |
      Formation initiale et périodique, évaluation des compétences et tenue des
      dossiers pour le personnel manipulant des marchandises dangereuses.
  BC-2490.40.10:
    name: Formation initiale aux marchandises dangereuses
    description: |
      Formation initiale aux marchandises dangereuses conformément aux exigences
      de l'autorité modale.
  BC-2490.40.20:
    name: Formation périodique aux marchandises dangereuses
    description: |
      Formation périodique et de remise à niveau aux marchandises dangereuses.
  BC-2490.40.30:
    name: Gestion des dossiers de compétences
    description: |
      Maintenance des dossiers de compétences en matière de marchandises
      dangereuses et des éléments probants pour les audits.
  BC-2490.50:
    name: Gestion des incidents liés aux marchandises dangereuses
    description: |
      Détection, intervention, notification et rapport pour les incidents et
      déversements de marchandises dangereuses.
  BC-2490.50.10:
    name: Détection des incidents liés aux marchandises dangereuses
    description: |
      Détection des incidents liés aux marchandises dangereuses pendant la
      manutention et le transport.
  BC-2490.50.20:
    name: Intervention en cas de déversement ou de rejet de marchandises dangereuses
    description: |
      Confinement des déversements, intervention en cas de rejet et
      décontamination.
  BC-2490.50.30:
    name: Notification et rapport aux autorités
    description: |
      Notification et rapport des incidents de marchandises dangereuses aux
      autorités compétentes.

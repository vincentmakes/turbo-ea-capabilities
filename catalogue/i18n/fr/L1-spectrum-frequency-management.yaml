locale: fr
source: L1-spectrum-frequency-management.yaml
entries:
  BC-2670:
    name: Gestion du spectre et des fréquences
    description: |
      Gestion du portefeuille de spectre de l'opérateur — acquisition et
      renouvellement des licences, planification et coordination des fréquences,
      gestion des interférences et opérations de spectre partagé.
  BC-2670.10:
    name: Gestion du portefeuille de spectre
    description: |
      Maintenance du registre des droits spectraux et supervision des décisions
      stratégiques en matière de spectre.
  BC-2670.10.10:
    name: Registre des droits spectraux
    description: |
      Maintenance du registre faisant autorité des droits spectraux de l'opérateur
      par bande, zone géographique et licence.
  BC-2670.10.20:
    name: Valorisation du spectre
    description: |
      Valorisation des droits spectraux pour les décisions financières, de fusions
      et acquisitions et d'enchères.
  BC-2670.10.30:
    name: Échange de spectre
    description: |
      Acquisition, cession et location de droits spectraux avec d'autres opérateurs
      lorsque les régulateurs l'autorisent.
  BC-2670.20:
    name: Gestion des licences spectrales
    description: |
      Gestion de bout en bout des licences spectrales, de la participation aux
      enchères au renouvellement et au reporting de conformité.
  BC-2670.20.10:
    name: Acquisition de licences spectrales
    description: |
      Participation aux enchères spectrales, appels à candidatures et attributions
      bilatérales.
  BC-2670.20.20:
    name: Renouvellement des licences spectrales
    description: |
      Gestion du renouvellement des licences spectrales selon les calendriers
      d'échéance.
  BC-2670.20.30:
    name: Reporting de conformité des licences
    description: |
      Reporting par rapport aux conditions des licences spectrales incluant les
      obligations de couverture et de déploiement.
  BC-2670.30:
    name: Planification et coordination des fréquences
    description: |
      Allocation des canaux et fréquences aux éléments réseau et coordination
      avec les utilisateurs voisins.
  BC-2670.30.10:
    name: Attribution des fréquences aux cellules
    description: |
      Attribution des fréquences et PCI aux cellules radio individuelles.
  BC-2670.30.20:
    name: Planification des canaux
    description: |
      Planification des attributions de canaux sur les accès radio et les liaisons
      micro-ondes.
  BC-2670.30.30:
    name: Planification des cellules voisines
    description: |
      Définition des relations de voisinage pour gérer les transferts et les
      interférences.
  BC-2670.40:
    name: Gestion des interférences spectrales
    description: |
      Détection, investigation et résolution des interférences spectrales
      préjudiciables, en coordination avec les régulateurs.
  BC-2670.40.10:
    name: Détection des interférences
    description: |
      Détection des interférences préjudiciables provenant de sources internes
      et externes.
  BC-2670.40.20:
    name: Résolution des interférences
    description: |
      Investigation et résolution des cas d'interférences identifiés.
  BC-2670.40.30:
    name: Coordination avec le régulateur
    description: |
      Coordination avec les régulateurs nationaux sur les interférences entre
      licenciés et les mesures coercitives.
  BC-2670.50:
    name: Gestion du partage de spectre
    description: |
      Exploitation du partage dynamique de spectre et des régimes d'accès partagé
      tels que le CBRS.
  BC-2670.50.10:
    name: Partage dynamique de spectre
    description: |
      Exploitation du partage de style DSS sur plusieurs technologies radio
      dans la même bande.
  BC-2670.50.20:
    name: Coordination de l'accès partagé
    description: |
      Coordination avec les plateformes d'accès partagé telles que SAS et AFC
      pour obtenir des attributions de canaux.
  BC-2670.50.30:
    name: Coordination des utilisations secondaires
    description: |
      Coordination avec les titulaires de licences primaires et les occupants
      dans les régimes d'utilisation secondaire.

locale: fr
source: L1-wastewater-operations-management.yaml
entries:
  BC-3890:
    name: Gestion de l'exploitation des eaux usées
    description: |
      Collecte, traitement et élimination des eaux usées municipales et industrielles — exploitation du réseau d'assainissement, conduite des stations d'épuration, gestion des obstructions et des inondations, gestion des boues et des biosolides, exploitation des déversoirs d'orage et conformité de la qualité de l'effluent final.
  BC-3890.10:
    name: Exploitation du réseau d'assainissement
    description: |
      Exploitation des réseaux d'eaux usées domestiques, pluviales et unitaires, y compris les stations de pompage et les refoulements.
  BC-3890.10.10:
    name: Exploitation des stations de pompage
    description: |
      Conduite et surveillance des stations de pompage d'eaux usées et des conduites de refoulement.
  BC-3890.10.20:
    name: Surveillance du réseau d'assainissement
    description: |
      Surveillance télémétrique des niveaux dans les égouts et des alarmes des stations de pompage.
  BC-3890.10.30:
    name: Curage du réseau d'assainissement
    description: |
      Curage planifié et réactif, hydrocurage et désenvasement des réseaux d'assainissement.
  BC-3890.20:
    name: Exploitation des stations d'épuration
    description: |
      Conduite quotidienne des stations de traitement des eaux usées, incluant les étapes de prétraitement, de traitement primaire, secondaire et tertiaire.
  BC-3890.20.10:
    name: Exploitation du prétraitement et du traitement primaire
    description: |
      Conduite des étapes de dégrillage, de dessablage et de décantation primaire.
  BC-3890.20.20:
    name: Exploitation du traitement biologique secondaire
    description: |
      Conduite des filières à boues activées, à lits bactériens et à bioréacteurs à membranes (MBR).
  BC-3890.20.30:
    name: Exploitation du traitement tertiaire
    description: |
      Conduite des étapes d'élimination des nutriments, de filtration et de désinfection tertiaires.
  BC-3890.20.40:
    name: Régulation des procédés et optimisation
    description: |
      Régulation des procédés et optimisation énergétique des étapes biologiques et d'aération.
  BC-3890.30:
    name: Réponse aux obstructions et aux inondations
    description: |
      Réponse réactive aux obstructions des réseaux d'assainissement, aux inondations internes et externes et aux incidents de pollution.
  BC-3890.30.10:
    name: Opérations de débouchage
    description: |
      Intervention terrain pour déboucher les réseaux d'assainissement par hydrocurage et nettoyage.
  BC-3890.30.20:
    name: Réponse aux inondations internes
    description: |
      Réponse orientée client lors d'incidents d'inondation interne par les eaux usées.
  BC-3890.30.30:
    name: Réponse aux inondations externes
    description: |
      Réponse aux inondations externes par les eaux usées et à leurs impacts sur la voirie.
  BC-3890.30.40:
    name: Confinement des incidents de pollution
    description: |
      Confinement et remédiation des incidents de pollution par les eaux usées dans les cours d'eau.
  BC-3890.40:
    name: Gestion des effluents industriels
    description: |
      Autorisation, surveillance et facturation des rejets d'effluents industriels dans le réseau public d'assainissement.
  BC-3890.40.10:
    name: Administration des autorisations de rejet industriel
    description: |
      Délivrance et modification des autorisations de rejet pour les établissements industriels.
  BC-3890.40.20:
    name: Prélèvement et analyse des effluents industriels
    description: |
      Prélèvement et analyse des rejets industriels par rapport aux conditions d'autorisation.
  BC-3890.40.30:
    name: Facturation des effluents industriels
    description: |
      Calcul de la redevance d'assainissement industriel selon la formule de Mogden ou équivalent.
  BC-3890.50:
    name: Gestion des boues et des biosolides
    description: |
      Traitement, valorisation et élimination des boues d'épuration, incluant la digestion anaérobie et le recyclage des biosolides en agriculture.
  BC-3890.50.10:
    name: Épaississement et déshydratation des boues
    description: |
      Conduite des installations d'épaississement, de déshydratation et de centrifugation des boues.
  BC-3890.50.20:
    name: Exploitation de la digestion anaérobie
    description: |
      Conduite des digesteurs anaérobies mésophiles et thermophiles ainsi que des installations de valorisation du biogaz.
  BC-3890.50.30:
    name: Épandage des biosolides
    description: |
      Application des biosolides sur les terres agricoles dans le cadre des réglementations sur les boues d'épuration.
  BC-3890.50.40:
    name: Incinération et élimination des boues
    description: |
      Conduite des installations d'incinération des boues et des filières d'élimination alternatives.
  BC-3890.60:
    name: Exploitation des déversoirs d'orage
    description: |
      Conduite, surveillance et déclaration des déversements des déversoirs de réseau unitaire et des déversoirs d'urgence, y compris le suivi de la durée des événements.
  BC-3890.60.10:
    name: Surveillance de la durée des événements
    description: |
      Exploitation de la télémétrie EDM sur les déversoirs d'orage et d'urgence.
  BC-3890.60.20:
    name: Déclaration des déversements
    description: |
      Déclaration des volumes et durées de déversement aux autorités réglementaires et au public.
  BC-3890.60.30:
    name: Exploitation des bassins tampons
    description: |
      Conduite des bassins tampons et des ouvrages de stockage à l'entrée des stations d'épuration.
  BC-3890.70:
    name: Gestion de la qualité de l'effluent final
    description: |
      Prélèvement, analyse et déclaration réglementaire de la qualité de l'effluent final par rapport aux autorisations de rejet.
  BC-3890.70.10:
    name: Prélèvements de conformité aux autorisations de rejet
    description: |
      Auto-surveillance des rejets par rapport aux valeurs limites numériques des autorisations.
  BC-3890.70.20:
    name: Surveillance de la qualité de l'effluent
    description: |
      Surveillance en ligne et en laboratoire des paramètres DCO, ammoniaque et nutriments de l'effluent final.
  BC-3890.70.30:
    name: Déclaration des autorisations de rejet
    description: |
      Déclaration réglementaire de la conformité des rejets aux autorités environnementales.

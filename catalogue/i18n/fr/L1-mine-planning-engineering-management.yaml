locale: fr
source: L1-mine-planning-engineering-management.yaml
entries:
  BC-4420:
    name: Gestion de la planification et de l'ingénierie minière
    description: |
      Planification minière stratégique, à long terme et à court terme,
      combinée aux disciplines d'ingénierie minière, géotechnique et
      hydrogéologique qui traduisent la ressource en plans de production
      exécutables.
  BC-4420.10:
    name: Planification minière stratégique
    description: |
      Définition de la stratégie d'extraction sur la durée de vie de la mine,
      sélection de la méthode minière, limites des fosses et séquençage des
      projets d'investissement.
    in_scope:
      - Plan de durée de vie de la mine et enveloppes de fosse
      - Sélection de la méthode minière souterraine
      - Séquençage et approbations des projets d'investissement
    out_of_scope:
      - Planification budgétaire annuelle de la production (BC-4420.20)
  BC-4420.10.10:
    name: Planification de la durée de vie de la mine
    description: |
      Définition de la stratégie d'extraction sur la durée de vie de la mine,
      du séquençage et de l'enveloppe d'investissement.
  BC-4420.10.20:
    name: Optimisation de la fosse
    description: |
      Optimisation des enveloppes de fosse par Lerchs-Grossmann et méthodes
      équivalentes selon les données économiques et géotechniques.
  BC-4420.10.30:
    name: Sélection de la méthode minière souterraine
    description: |
      Sélection des méthodes minières souterraines telles que le foudroyage
      par blocs, le foudroyage par sous-niveaux ou l'abattage par chambres
      en fonction de la géométrie du gisement.
  BC-4420.10.40:
    name: Séquençage des projets d'investissement
    description: |
      Séquençage des projets d'investissement majeurs sur l'horizon de durée
      de vie de la mine.
  BC-4420.20:
    name: Planification minière à long terme
    description: |
      Planification de la production annuelle et pluriannuelle, stratégie
      de stockpile et planification des équipements d'investissement.
  BC-4420.20.10:
    name: Définition du plan de production annuel
    description: |
      Définition du plan de production minière annuel et du budget.
  BC-4420.20.20:
    name: Planification de la stratégie de stockpile
    description: |
      Planification pluriannuelle de la constitution, du soutirage et de
      la reprise des stockpiles.
  BC-4420.20.30:
    name: Stratégie de teneur de coupure
    description: |
      Stratégie de teneur de coupure variable dans le temps sur la durée
      de vie de la mine.
  BC-4420.20.40:
    name: Planification des équipements d'investissement
    description: |
      Planification à long terme du remplacement de la flotte minière et
      des ajouts d'équipements d'investissement.
  BC-4420.30:
    name: Planification minière à court terme
    description: |
      Planification trimestrielle, hebdomadaire et quotidienne de l'exploitation
      minière pilotant l'exécution de la production et le contrôle des teneurs.
  BC-4420.30.10:
    name: Planification trimestrielle de la production
    description: |
      Préparation du programme de production trimestriel aligné sur le plan
      annuel.
  BC-4420.30.20:
    name: Définition du programme hebdomadaire
    description: |
      Définition du programme hebdomadaire d'exploitation par gradin, chantier
      et équipement.
  BC-4420.30.30:
    name: Planification quotidienne des dispatches
    description: |
      Planification quotidienne et par poste des affectations de la flotte
      minière.
  BC-4420.30.40:
    name: Planification du contrôle des teneurs
    description: |
      Planification de l'échantillonnage du contrôle des teneurs et du
      routage des blocs de minerai pour l'exécution à court terme.
  BC-4420.40:
    name: Ingénierie de conception minière
    description: |
      Conception technique des fosses, des excavations souterraines, des
      plans de minage, des pistes de transport et de l'infrastructure de
      ventilation des mines.
  BC-4420.40.10:
    name: Conception de la fosse à ciel ouvert
    description: |
      Conception technique des gradins, rampes et enveloppes de fosse pour
      les exploitations à ciel ouvert.
  BC-4420.40.20:
    name: Conception de la mine souterraine
    description: |
      Conception technique des galeries, descenderies, puits et chantiers
      pour les exploitations souterraines.
  BC-4420.40.30:
    name: Conception du minage
    description: |
      Conception des plans, charges et séquences d'amorçage pour le minage
      de production.
  BC-4420.40.40:
    name: Conception des pistes de transport
    description: |
      Conception géométrique et structurale des réseaux de pistes de transport
      minières.
  BC-4420.40.50:
    name: Conception de la ventilation et des services
    description: |
      Conception technique de la ventilation, du drainage, de l'alimentation
      électrique et des services d'air comprimé pour les mines souterraines.
  BC-4420.50:
    name: Ingénierie géotechnique
    description: |
      Ingénierie géotechnique pour la stabilité des talus, le soutènement du
      terrain et la gestion des géorisques dans les mines à ciel ouvert et
      souterraines.
  BC-4420.50.10:
    name: Ingénierie de la stabilité des talus
    description: |
      Analyse de la stabilité des talus et conception des parois de fosse
      pour les exploitations à ciel ouvert.
  BC-4420.50.20:
    name: Conception du soutènement souterrain
    description: |
      Conception technique des boulons, filets, béton projeté et câbles
      de soutènement pour les excavations souterraines.
  BC-4420.50.30:
    name: Définition du programme de surveillance géotechnique
    description: |
      Définition des programmes de surveillance géotechnique couvrant la
      densité d'instrumentation, les seuils et les cycles de révision.
  BC-4420.50.40:
    name: Évaluation des risques de géorisques
    description: |
      Évaluation des risques de chutes de roches, de séismicité et d'affaissements
      sur les opérations minières.
  BC-4420.60:
    name: Ingénierie hydrogéologique minière
    description: |
      Ingénierie hydrogéologique couvrant la modélisation des eaux souterraines,
      la conception du dénoyage et le bilan hydrique du site.
  BC-4420.60.10:
    name: Modélisation des eaux souterraines
    description: |
      Modélisation numérique du comportement des eaux souterraines autour
      de l'emprise minière.
  BC-4420.60.20:
    name: Conception du dénoyage minier
    description: |
      Conception technique des systèmes de dénoyage de fosse et souterrains.
  BC-4420.60.30:
    name: Modélisation du bilan hydrique
    description: |
      Modélisation du bilan hydrique à l'échelle du site pour la planification
      opérationnelle et de fermeture.

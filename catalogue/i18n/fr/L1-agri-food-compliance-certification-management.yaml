locale: fr
source: L1-agri-food-compliance-certification-management.yaml
entries:
  BC-3590:
    name: Gestion de la conformité et de la certification agroalimentaire
    description: |
      Programmes de conformité et de certification spécifiques au secteur — assurance de la production agricole, biologique, bien-être animal, indications géographiques, conformité aux LMR, identification des animaux d'élevage et registres de traçabilité pré-ferme distincts de la conformité et de la gestion de la qualité génériques.
  BC-3590.10:
    name: Gestion de la certification d'assurance de la production agricole
    description: |
      Gestion des programmes de certification d'assurance de la production agricole incluant GLOBALG.A.P., LEAF Marque et les schémas nationaux équivalents.
    in_scope:
      - Assurance de la production GLOBALG.A.P. et équivalents
      - Participation au LEAF Marque
      - Coordination des audits et actions correctives
    out_of_scope:
      - Gestion générique de la qualité (BC-720)
      - Programmes de sécurité alimentaire côté distribution (BC-2380.10)
  BC-3590.10.10:
    name: Programmes de certification GLOBALG.A.P.
    description: |
      Gestion de la certification GLOBALG.A.P. IFA, Aquaculture et Élevage.
  BC-3590.10.20:
    name: Programmes LEAF Marque et équivalents
    description: |
      Participation au LEAF Marque et aux schémas d'assurance nationaux équivalents.
  BC-3590.10.30:
    name: Coordination des audits d'assurance agricole
    description: |
      Coordination des audits d'assurance de la production agricole et suivi des actions correctives.
  BC-3590.20:
    name: Gestion de la certification biologique
    description: |
      Gestion de la certification biologique selon le cahier des charges USDA NOP, le règlement européen sur la production biologique, la norme JAS Organic et les régimes équivalents.
  BC-3590.20.10:
    name: Enregistrements de conformité au cahier des charges biologique
    description: |
      Enregistrements de la conformité au cahier des charges biologique applicable.
  BC-3590.20.20:
    name: Coordination des inspections biologiques
    description: |
      Coordination des inspections et audits de certification biologique.
  BC-3590.20.30:
    name: Autorisation des intrants biologiques
    description: |
      Vérification que les intrants sont autorisés dans le cadre du cahier des charges biologique applicable.
  BC-3590.30:
    name: Gestion de la certification bien-être animal
    description: |
      Programmes d'audit du bien-être animal, enregistrement des indicateurs de bien-être et conformité aux normes de bien-être sectorielles et des systèmes d'assurance.
  BC-3590.30.10:
    name: Programmes d'audit du bien-être animal
    description: |
      Programmes d'audit du bien-être animal internes et par tierce partie.
  BC-3590.30.20:
    name: Enregistrement des indicateurs de bien-être
    description: |
      Enregistrement des indicateurs de bien-être dans l'ensemble des unités d'élevage.
  BC-3590.30.30:
    name: Conformité aux normes de bien-être
    description: |
      Preuves de conformité aux normes de bien-être sectorielles et des systèmes d'assurance.
  BC-3590.40:
    name: Gestion des indications géographiques et de la provenance
    description: |
      Enregistrements et vérifications soutenant les appellations d'origine protégée, les indications géographiques protégées et les allégations de provenance.
  BC-3590.40.10:
    name: Enregistrements des allégations de provenance
    description: |
      Enregistrements étayant les allégations d'origine, de race et de provenance.
  BC-3590.40.20:
    name: Conformité aux indications géographiques
    description: |
      Conformité aux AOP, IGP et indications géographiques équivalentes.
  BC-3590.40.30:
    name: Vérification de l'origine
    description: |
      Vérification de l'origine par des méthodes documentaires, isotopiques et ADN.
  BC-3590.50:
    name: Gestion des résidus de pesticides et des LMR
    description: |
      Échantillonnage des résidus, conformité aux LMR et respect des délais d'attente selon les marchés de destination.
  BC-3590.50.10:
    name: Programmes d'échantillonnage des résidus
    description: |
      Programmes d'échantillonnage des résidus de pesticides sur les cultures et les lots.
  BC-3590.50.20:
    name: Surveillance de la conformité aux LMR
    description: |
      Surveillance de la conformité aux calendriers de LMR des marchés de destination.
  BC-3590.50.30:
    name: Conformité aux délais d'attente
    description: |
      Conformité aux délais d'attente avant récolte et aux délais d'attente lait.
  BC-3590.60:
    name: Conformité à l'identification et aux mouvements des animaux d'élevage
    description: |
      Identification des animaux, documents de mouvement et certification sanitaire transfrontalière pour les cheptels et les stocks aquacoles.
    in_scope:
      - Identification légale des animaux
      - Enregistrement des documents de mouvement
      - Certification sanitaire transfrontalière
    out_of_scope:
      - Gestion générique de la conformité (BC-130)
  BC-3590.60.10:
    name: Identification des animaux par bagues et puces
    description: |
      Identification légale des animaux par bagues électroniques (EID) et boucles auriculaires.
  BC-3590.60.20:
    name: Enregistrement des documents de mouvement
    description: |
      Enregistrement des documents de mouvement légaux et des registres de mouvements en exploitation.
  BC-3590.60.30:
    name: Certification sanitaire transfrontalière
    description: |
      Certification sanitaire transfrontalière incluant les soumissions TRACES NT.
  BC-3590.70:
    name: Registres de traçabilité pré-ferme
    description: |
      Registres de traçabilité champ-vers-lot, animal-vers-carcasse et intrant-vers-produit ancrant les traces EPCIS et de chaîne de contrôle en aval.
  BC-3590.70.10:
    name: Traçabilité du champ au lot
    description: |
      Traçabilité reliant les opérations en champ aux lots récoltés.
  BC-3590.70.20:
    name: Traçabilité de l'animal à la carcasse
    description: |
      Traçabilité reliant les animaux individuels aux carcasses et aux découpes primaires.
  BC-3590.70.30:
    name: Enregistrement de la traçabilité intrant-vers-produit
    description: |
      Enregistrement reliant les intrants appliqués aux lots de produits résultants.

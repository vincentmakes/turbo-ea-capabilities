locale: fr
source: L1-mission-management.yaml
entries:
  BC-1700:
    name: Gestion de mission
    description: |
      Planification de mission, commandement et contrôle, exécution et compte rendu de fin de mission.
  BC-1700.10:
    name: Gestion de la planification de mission
    description: |
      Objectifs de mission, itinéraire, cibles et planification des forces.
  BC-1700.10.10:
    name: Définition des objectifs de mission
    description: |
      Définition des objectifs de mission et de l'intention du commandant.
  BC-1700.10.20:
    name: Planification des forces et des moyens
    description: |
      Planification de la composition des forces et de l'attribution des moyens.
  BC-1700.10.30:
    name: Planification des itinéraires et des cibles
    description: |
      Planification des itinéraires et sélection des objectifs.
  BC-1700.10.40:
    name: Évaluation des risques de la mission
    description: |
      Évaluation des risques opérationnels et confirmation des règles d'engagement.
  BC-1700.10.50:
    name: Production des ordres de mission
    description: |
      Production des ordres de mission et de la documentation de mission.
  BC-1700.20:
    name: Gestion des opérations de commandement et contrôle
    description: |
      Opérations C2, conscience de la situation et aide à la décision.
  BC-1700.20.10:
    name: Gestion de la situation opérationnelle commune
    description: |
      Maintien de la situation opérationnelle commune.
  BC-1700.20.20:
    name: Aide à la décision tactique
    description: |
      Outils d'aide à la décision et recommandations tactiques.
  BC-1700.20.30:
    name: Gestion des communications C2
    description: |
      Réseaux de communication C2 et messagerie tactique.
  BC-1700.20.40:
    name: Coordination interéchelons
    description: |
      Coordination entre les échelons opérationnels et tactiques.
  BC-1700.30:
    name: Gestion de l'exécution de mission
    description: |
      Exécution de mission en temps réel et contrôle tactique.
  BC-1700.30.10:
    name: Coordination tactique de l'exécution
    description: |
      Coordination tactique en temps réel des éléments de la mission.
  BC-1700.30.20:
    name: Remise en mission dynamique
    description: |
      Remise en mission dynamique et replanification en cours d'exécution.
  BC-1700.30.30:
    name: Évaluation des effets de mission
    description: |
      Évaluation en temps réel et évaluation des dommages de combat des effets de mission.
  BC-1700.40:
    name: Gestion des répétitions de mission et de la simulation
    description: |
      Répétitions de mission et entraînement par simulation.
  BC-1700.40.10:
    name: Conception des exercices de répétition de mission
    description: |
      Conception des exercices de répétition de mission.
  BC-1700.40.20:
    name: Simulation vivante, virtuelle et constructive
    description: |
      Gestion des environnements de simulation LVC (Live, Virtual, Constructive).
  BC-1700.40.30:
    name: Évaluation des performances lors des répétitions
    description: |
      Évaluation des performances des unités lors des répétitions de mission.
  BC-1700.50:
    name: Gestion du debriefing et du retour d'expérience de mission
    description: |
      Compte rendu après action, debriefing et capitalisation des enseignements.
  BC-1700.50.10:
    name: Conduite du debriefing de mission
    description: |
      Conduite des debriefings de mission et comptes rendus après action.
  BC-1700.50.20:
    name: Capitalisation du retour d'expérience
    description: |
      Collecte et formalisation du retour d'expérience.
  BC-1700.50.30:
    name: Suivi de la mise en œuvre des enseignements
    description: |
      Suivi de la mise en œuvre des améliorations identifiées.

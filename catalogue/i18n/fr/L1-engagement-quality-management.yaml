locale: fr
source: L1-engagement-quality-management.yaml
entries:
  BC-4340:
    name: Gestion de la qualité des missions
    description: |
      Système de management de la qualité du cabinet, revues de qualité des missions,
      revues de dossiers, consultations techniques, surveillance et gestion des
      réponses aux inspections professionnelles externes pour les missions de
      services professionnels.
  BC-4340.10:
    name: Système de management de la qualité du cabinet
    description: |
      Conception, mise en œuvre et exploitation du système de management de la
      qualité au niveau du cabinet, aligné sur ISQM 1 et les régimes équivalents.
  BC-4340.10.10:
    name: Évaluation des risques qualité
    description: |
      Identification et évaluation des risques qualité sur les missions et
      opérations du cabinet.
  BC-4340.10.20:
    name: Conception des réponses qualité
    description: |
      Conception des politiques et procédures répondant aux risques qualité
      identifiés.
  BC-4340.10.30:
    name: Gouvernance et responsabilité qualité
    description: |
      Attribution des responsabilités du SMQ au managing partner, à la direction
      qualité et aux associés de mission.
  BC-4340.10.40:
    name: Évaluation annuelle du SMQ
    description: |
      Évaluation annuelle de l'efficacité opérationnelle du système de management
      de la qualité du cabinet.
  BC-4340.20:
    name: Revue de qualité des missions
    description: |
      Revue de qualité des missions (EQR) indépendante par un réviseur non impliqué
      dans la mission, réalisée avant la diffusion du rapport sur les missions
      déclenchant des critères de risque ou réglementaires.
  BC-4340.20.10:
    name: Évaluation de l'éligibilité et des déclencheurs EQR
    description: |
      Identification des missions nécessitant une EQR sur la base de déclencheurs
      réglementaires, de risque ou de politique du cabinet.
  BC-4340.20.20:
    name: Désignation du réviseur qualité de mission
    description: |
      Désignation de réviseurs qualité de mission qualifiés et indépendants
      sur les missions déclenchées.
  BC-4340.20.30:
    name: Exécution et validation de l'EQR
    description: |
      Exécution des procédures EQR et validation comme condition préalable
      à la diffusion du livrable.
  BC-4340.30:
    name: Revue des dossiers de mission
    description: |
      Revues de dossiers avant et après émission sur un échantillon de dossiers
      de missions terminées pour évaluer la conformité à la méthodologie du cabinet
      et aux normes professionnelles.
  BC-4340.30.10:
    name: Revue de dossier avant émission
    description: |
      Revue de dossier pré-émission sur des missions sélectionnées nécessitant
      une assurance supplémentaire sur la conformité.
  BC-4340.30.20:
    name: Revue de dossier après émission
    description: |
      Revue rétrospective post-émission sur une base d'échantillonnage pour
      évaluer la conformité méthodologique et la qualité.
  BC-4340.30.30:
    name: Traitement des conclusions des revues de dossiers
    description: |
      Traitement des conclusions des revues de dossiers, incluant la remédiation,
      les implications en formation et le feedback aux associés de mission.
  BC-4340.40:
    name: Gestion des consultations techniques
    description: |
      Consultations techniques obligatoires et facultatives sur les aspects
      complexes des missions avec les fonctions nationales, techniques ou
      spécialisées.
  BC-4340.40.10:
    name: Consultation technique obligatoire
    description: |
      Consultation requise par la politique du cabinet sur des situations
      complexes définies telles que la continuité d'exploitation, le risque
      de fraude ou les questions inédites.
  BC-4340.40.20:
    name: Consultation technique facultative
    description: |
      Consultation discrétionnaire demandée par l'équipe de mission sur
      des questions techniques complexes.
  BC-4340.40.30:
    name: Documentation des consultations techniques
    description: |
      Documentation des demandes de consultation, des conseils fournis et
      des conclusions atteintes dans le dossier de mission.
  BC-4340.50:
    name: Surveillance qualité et remédiation
    description: |
      Activités de surveillance continue, analyse des causes des insuffisances
      qualité et programmes de remédiation.
  BC-4340.50.10:
    name: Surveillance des indicateurs qualité
    description: |
      Surveillance des indicateurs qualité avancés et retardés sur le
      portefeuille de missions.
  BC-4340.50.20:
    name: Analyse des causes des insuffisances
    description: |
      Analyse des causes des insuffisances qualité identifiées et des
      constats systémiques.
  BC-4340.50.30:
    name: Gestion des actions de remédiation
    description: |
      Définition, exécution et vérification des actions de remédiation
      découlant de la surveillance et des inspections.
  BC-4340.60:
    name: Gestion des réponses aux inspections professionnelles
    description: |
      Coordination des réponses aux inspections professionnelles externes par
      les régulateurs et organismes de surveillance tels que PCAOB, FRC, IAASA,
      ICAEW et les régimes équivalents.
  BC-4340.60.10:
    name: Coordination de la sélection des dossiers d'inspection
    description: |
      Coordination des sélections de dossiers et des demandes d'information
      des organismes d'inspection.
  BC-4340.60.20:
    name: Réponse aux conclusions d'inspection
    description: |
      Rédaction et soumission des réponses formelles aux conclusions d'inspection
      et aux plans d'action correctifs requis.
  BC-4340.60.30:
    name: Communication des résultats d'inspection
    description: |
      Communication interne et, le cas échéant, externe des résultats
      d'inspection.

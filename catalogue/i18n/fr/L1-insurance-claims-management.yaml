locale: fr
source: L1-insurance-claims-management.yaml
entries:
  BC-2160:
    name: Gestion des sinistres
    description: |
      Première déclaration de sinistre, triage, instruction, provisionnement, expertise,
      règlement, recours et subrogation, contentieux, fraude et unité d'enquête
      spécialisée, et gestion des sinistres catastrophe sur l'ensemble des branches
      d'assurance.

  BC-2160.10:
    name: Gestion de la première déclaration de sinistre
    description: |
      Réception multicanal des FNOL, vérification de la garantie, enregistrement et
      accusé de réception.

  BC-2160.10.10:
    name: Réception multicanal des FNOL
    description: |
      Réception de la première déclaration de sinistre par téléphone, canal numérique,
      courtier et canaux IoT.

  BC-2160.10.20:
    name: Vérification initiale de la garantie
    description: |
      Vérification que le sinistre entre dans le champ de la garantie à la date du
      sinistre.

  BC-2160.10.30:
    name: Enregistrement du sinistre
    description: |
      Enregistrement des nouveaux sinistres et attribution des identifiants de dossier.

  BC-2160.10.40:
    name: Accusé de réception et communication
    description: |
      Accusé de réception initial au demandeur et communication continue sur l'état
      du dossier.

  BC-2160.20:
    name: Triage et segmentation des sinistres
    description: |
      Évaluation de la gravité, acheminement en traitement automatique, affectation
      des experts et orientation vers les spécialistes.

  BC-2160.20.10:
    name: Évaluation de la gravité et de la complexité
    description: |
      Évaluation de la gravité et de la complexité du sinistre pour les décisions
      d'orientation.

  BC-2160.20.20:
    name: Acheminement en traitement automatique
    description: |
      Orientation des sinistres de faible gravité vers le traitement automatique.

  BC-2160.20.30:
    name: Affectation des experts
    description: |
      Affectation des dossiers aux experts en fonction des compétences, de la capacité
      et de la localisation géographique.

  BC-2160.20.40:
    name: Orientation vers les spécialistes et le contentieux
    description: |
      Orientation des sinistres complexes, spécialisés et contentieux vers les équipes
      dédiées.

  BC-2160.30:
    name: Instruction et expertise des sinistres
    description: |
      Expertise terrain et bureau, évaluation des dommages, détermination de la
      responsabilité et consultation d'experts métier.

  BC-2160.30.10:
    name: Expertise terrain et bureau
    description: |
      Expertise terrain et bureau des sinistres, y compris les visites sur site.

  BC-2160.30.20:
    name: Évaluation des dommages et pertes
    description: |
      Évaluation des dommages, du quantum de la perte et du périmètre de
      réparation ou remplacement.

  BC-2160.30.30:
    name: Détermination de la responsabilité
    description: |
      Détermination de la responsabilité et de la réponse de la police sur les
      sinistres tiers.

  BC-2160.30.40:
    name: Consultation d'experts
    description: |
      Consultation d'experts en bâtiment, ingénierie, médecine et expertise
      comptable judiciaire.

  BC-2160.40:
    name: Gestion du provisionnement des sinistres
    description: |
      Fixation initiale des provisions de dossier, réévaluation et coordination
      IBNR.

  BC-2160.40.10:
    name: Fixation initiale des provisions de dossier
    description: |
      Fixation des provisions initiales de dossier sur les sinistres enregistrés.

  BC-2160.40.20:
    name: Réévaluation des provisions
    description: |
      Réévaluation périodique des provisions de dossier au fil des nouvelles
      informations.

  BC-2160.40.30:
    name: Coordination IBNR avec l'actuariat
    description: |
      Coordination avec l'actuariat sur les provisions IBNR pour le provisionnement
      au niveau du portefeuille.

  BC-2160.50:
    name: Règlement et paiement des sinistres
    description: |
      Négociation du règlement, paiements d'indemnité et de frais, valeur résiduelle
      et recours et subrogation.

  BC-2160.50.10:
    name: Négociation du règlement
    description: |
      Négociation des montants de règlement avec les demandeurs et les tiers.

  BC-2160.50.20:
    name: Émission des paiements d'indemnité
    description: |
      Émission des paiements d'indemnité aux assurés et aux tiers.

  BC-2160.50.30:
    name: Émission des paiements de frais
    description: |
      Émission des paiements de frais de règlement alloués et non alloués.

  BC-2160.50.40:
    name: Disposition de la valeur résiduelle
    description: |
      Cession et récupération de la valeur résiduelle sur les sinistres réglés.

  BC-2160.50.50:
    name: Recours et subrogation
    description: |
      Recours et subrogation à l'encontre des tiers et des autres assureurs.

  BC-2160.60:
    name: Gestion du contentieux sinistres
    description: |
      Stratégie contentieuse, coordination des avocats de la défense et suivi des
      coûts de contentieux.

  BC-2160.60.10:
    name: Stratégie contentieuse
    description: |
      Définition de la stratégie sur les sinistres contentieux et les décisions de
      règlement amiable ou de procès.

  BC-2160.60.20:
    name: Coordination des avocats de la défense
    description: |
      Coordination des avocats de la défense du panel et des avocats mandatés.

  BC-2160.60.30:
    name: Suivi des coûts de contentieux
    description: |
      Suivi des coûts de contentieux par rapport aux barèmes du panel et aux budgets.

  BC-2160.70:
    name: Gestion de la fraude et de l'unité d'enquête spécialisée
    description: |
      Détection des sinistres suspects, enquêtes de l'unité spécialisée, signalement
      des fraudes et analyses anti-fraude.

  BC-2160.70.10:
    name: Détection des sinistres suspects
    description: |
      Détection des sinistres suspects au moyen de règles, de modèles et d'indicateurs
      d'alerte.

  BC-2160.70.20:
    name: Enquête de l'unité spécialisée
    description: |
      Travaux d'enquête de l'unité spécialisée sur les sinistres présumés frauduleux.

  BC-2160.70.30:
    name: Signalement et poursuite des fraudes
    description: |
      Signalement des cas de fraude aux forces de l'ordre et aux registres sectoriels.

  BC-2160.70.40:
    name: Analyse anti-fraude
    description: |
      Analyses anti-fraude sur les portefeuilles de sinistres et analyse de réseaux.

  BC-2160.80:
    name: Gestion des sinistres catastrophe
    description: |
      Activation en cas d'événement CAT, mobilisation de capacité de pointe, suivi
      des sinistres CAT et coordination des recours CAT.

  BC-2160.80.10:
    name: Activation en cas d'événement CAT
    description: |
      Activation des procédures de réponse catastrophe lors d'événements déclarés.

  BC-2160.80.20:
    name: Mobilisation de capacité de pointe
    description: |
      Mobilisation d'experts en renfort, d'entreprises et de capacité de centre
      d'appels.

  BC-2160.80.30:
    name: Triage et suivi des sinistres CAT
    description: |
      Triage et suivi des sinistres codés CAT jusqu'à leur règlement.

  BC-2160.80.40:
    name: Coordination des recours CAT
    description: |
      Coordination des recours en réassurance et des recours auprès des pools sur
      les événements CAT.

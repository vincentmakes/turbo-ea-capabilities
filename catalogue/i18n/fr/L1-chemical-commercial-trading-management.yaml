locale: fr
source: L1-chemical-commercial-trading-management.yaml
entries:
  BC-4690:
    name: Gestion du commerce et du trading chimique
    description: |
      Trading de produits chimiques en vrac et spécialisés, gestion de l'équilibre
      offre-demande, approvisionnement en matières premières, couverture, offtake
      à long terme et référencement des prix d'indices.
  BC-4690.10:
    name: Trading de produits chimiques en vrac
    description: |
      Trading au comptant et à terme de produits chimiques de base en vrac sur
      les marchés physiques.
  BC-4690.10.10:
    name: Trading de cargaisons au comptant
    description: |
      Trading de cargaisons au comptant aux prix de marché en vigueur.
  BC-4690.10.20:
    name: Trading à terme contractuel
    description: |
      Négociation et exécution des trades à terme contractuels.
  BC-4690.10.30:
    name: Vente de cargaisons en détresse
    description: |
      Cession de cargaisons en détresse et excédentaires par les canaux de
      trading.
  BC-4690.20:
    name: Gestion commerciale des produits chimiques spécialisés
    description: |
      Gestion des comptes, distribution et vente de solutions pour les produits
      chimiques spécialisés différenciés.
  BC-4690.20.10:
    name: Gestion des comptes spécialisés
    description: |
      Gestion des comptes stratégiques en produits chimiques spécialisés.
  BC-4690.20.20:
    name: Gestion des canaux de distribution
    description: |
      Gestion des canaux de distribution indirects.
  BC-4690.20.30:
    name: Vente en traction applicative
    description: |
      Vente en traction auprès des formulateurs et convertisseurs en aval.
  BC-4690.20.40:
    name: Coordination de la vente de solutions
    description: |
      Coordination de la vente multi-produits pour les applications complexes.
  BC-4690.30:
    name: Approvisionnement en matières premières et pétrochimiques
    description: |
      Approvisionnement en matières premières hydrocarbonées, aromatiques,
      biosourcées et inorganiques pour les opérations chimiques.
  BC-4690.30.10:
    name: Approvisionnement en naphta et charges oléfiniques
    description: |
      Approvisionnement en naphta, éthane et charges oléfiniques pour les
      craqueurs.
  BC-4690.30.20:
    name: Approvisionnement en charges aromatiques
    description: |
      Approvisionnement en benzène, toluène et xylènes.
  BC-4690.30.30:
    name: Approvisionnement en matières premières biosourcées
    description: |
      Approvisionnement en matières premières biosourcées dans le cadre de
      systèmes de bilan massique.
  BC-4690.30.40:
    name: Approvisionnement en matières premières inorganiques
    description: |
      Approvisionnement en sels inorganiques, minéraux et minerais pour le
      traitement chimique.
  BC-4690.40:
    name: Couverture et gestion des risques chimiques
    description: |
      Couverture de l'exposition aux prix des matières premières, aux devises
      et aux marges sur le portefeuille chimique.
  BC-4690.40.10:
    name: Couverture du prix des matières premières
    description: |
      Couverture de l'exposition aux prix des matières premières sur les marchés
      de commodités.
  BC-4690.40.20:
    name: Couverture de l'exposition aux devises
    description: |
      Couverture de l'exposition aux taux de change sur les contrats chimiques.
  BC-4690.40.30:
    name: Stratégie de couverture des marges
    description: |
      Définition et exécution des stratégies de couverture des marges de craquage
      et chimiques.
  BC-4690.50:
    name: Gestion de l'équilibre offre-demande
    description: |
      Compilation et réconciliation de l'offre, de la demande et de l'équilibre
      sur la gamme de produits chimiques.
  BC-4690.50.10:
    name: Compilation des perspectives de demande
    description: |
      Compilation des perspectives de demande à court et moyen terme.
  BC-4690.50.20:
    name: Compilation de la capacité d'offre
    description: |
      Compilation de la capacité d'offre sur les actifs propres et façonnés.
  BC-4690.50.30:
    name: Réconciliation de l'équilibre
    description: |
      Réconciliation des équilibres offre-demande et identification des
      contraintes.
  BC-4690.60:
    name: Gestion des contrats d'offtake à long terme
    description: |
      Négociation, rédaction et gestion des performances des accords d'offtake
      et de fourniture à long terme.
  BC-4690.60.10:
    name: Négociation des term sheets d'offtake
    description: |
      Négociation des term sheets d'offtake à long terme.
  BC-4690.60.20:
    name: Rédaction des contrats à long terme
    description: |
      Rédaction des contrats définitifs de fourniture et d'offtake à long terme.
  BC-4690.60.30:
    name: Suivi des performances d'offtake
    description: |
      Suivi des performances d'offtake par rapport aux obligations contractuelles.
  BC-4690.70:
    name: Gestion des indices de prix et références
    description: |
      Gestion des abonnements aux indices de prix et des références utilisés
      dans la tarification chimique.
  BC-4690.70.10:
    name: Gestion des abonnements aux indices de prix
    description: |
      Gestion des abonnements aux indices ICIS, Argus, Platts et similaires.
  BC-4690.70.20:
    name: Maintenance des courbes de prix de référence
    description: |
      Maintenance des courbes de prix de référence internes pour les produits
      chimiques.
  BC-4690.70.30:
    name: Calcul des prix indexés
    description: |
      Calcul des prix clients indexés et des règlements de contrats.

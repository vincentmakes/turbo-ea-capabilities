locale: fr
source: L1-manufacturing-operations-management.yaml
entries:
  BC-1010:
    name: Gestion des opérations de fabrication
    description: |
      Exécution en atelier, gestion des ordres de fabrication et opérations au niveau MES.
  BC-1010.10:
    name: Gestion des ordres de fabrication
    description: |
      Création, lancement, suivi et clôture des ordres de fabrication.
  BC-1010.10.10:
    name: Création des ordres de fabrication
    description: |
      Création des ordres de fabrication à partir des ordres de production et de la nomenclature/gamme.
  BC-1010.10.20:
    name: Lancement des ordres de fabrication
    description: |
      Lancement des ordres de fabrication en atelier avec vérification des matières.
  BC-1010.10.30:
    name: Confirmation des ordres de fabrication
    description: |
      Confirmation des activités, quantités et temps imputés aux ordres de fabrication.
  BC-1010.10.40:
    name: Clôture des ordres de fabrication
    description: |
      Clôture définitive et solde des ordres de fabrication.
  BC-1010.20:
    name: Gestion de l'exécution en atelier
    description: |
      Pilotage de l'atelier et exécution MES.
  BC-1010.20.10:
    name: Gestion de la définition de production
    description: |
      Définition de la production selon la norme ISA-95 pour les produits et procédés.
  BC-1010.20.20:
    name: Gestion des ressources de production
    description: |
      Gestion de la disponibilité et des capacités des ressources de production.
  BC-1010.20.30:
    name: Coordination de l'exécution de la production
    description: |
      Coordination en temps réel de l'exécution entre les centres de travail.
  BC-1010.20.40:
    name: Traçabilité et généalogie de la production
    description: |
      Généalogie des lots, séries et numéros de série, ainsi que les enregistrements de l'état réel de fabrication.
  BC-1010.30:
    name: Gestion des opérations machines
    description: |
      Réglage, marche, changement de format et surveillance des machines.
  BC-1010.30.10:
    name: Réglage et changement de format des machines
    description: |
      Réglage des machines, changement de format selon la méthode SMED et qualification.
  BC-1010.30.20:
    name: Conduite des machines
    description: |
      Conduite des machines, contrôle des paramètres et supervision des procédés.
  BC-1010.30.30:
    name: Surveillance des machines
    description: |
      Surveillance en temps réel des machines et suivi de leur état.
  BC-1010.40:
    name: Gestion de l'assistance aux opérateurs
    description: |
      Instructions de travail, andon numérique et assistance aux opérateurs.
  BC-1010.40.10:
    name: Diffusion des instructions de travail numériques
    description: |
      Diffusion des instructions de travail numériques au poste de travail.
  BC-1010.40.20:
    name: Gestion des signaux andon et des escalades
    description: |
      Signaux andon, escalades et assistance aux opérateurs.
  BC-1010.40.30:
    name: Compétences et habilitations des opérateurs
    description: |
      Certification et habilitation des opérateurs pour les tâches assignées.
  BC-1010.50:
    name: Gestion des opérations de manutention des matières
    description: |
      Mouvements internes de matières, kitting et alimentation des lignes.
  BC-1010.50.10:
    name: Réapprovisionnement en bord de ligne
    description: |
      Réapprovisionnement en bord de ligne en juste-à-temps et tournées de ravitaillement.
  BC-1010.50.20:
    name: Préparation des kits de composants
    description: |
      Préparation et pré-assemblage des kits de composants pour les lignes de production.
  BC-1010.50.30:
    name: Mouvements internes de matières
    description: |
      Logistique interne et convoyage entre les opérations.
  BC-1010.60:
    name: Gestion de l'acquisition des données de fabrication
    description: |
      Données de capteurs, données machines et intégration OT-IT.
  BC-1010.60.10:
    name: Collecte des données machines
    description: |
      Collecte des signaux machines et des données de procédés.
  BC-1010.60.20:
    name: Intégration des capteurs et de l'IoT
    description: |
      Intégration des capteurs et des équipements IIoT en atelier.
  BC-1010.60.30:
    name: Intégration des données OT-IT
    description: |
      Intégration des données OT avec les systèmes IT selon la norme ISA-95.
  BC-1010.60.40:
    name: Opérations de l'historien de données de fabrication
    description: |
      Capture et accès aux données de séries temporelles via un historien.
  BC-1010.70:
    name: Gestion de la performance de fabrication
    description: |
      Performance en temps réel, arrêts et analyse des micro-arrêts.
  BC-1010.70.10:
    name: Surveillance de la performance en temps réel
    description: |
      Surveillance en temps réel du TRS et des KPI de l'atelier.
  BC-1010.70.20:
    name: Analyse des micro-arrêts
    description: |
      Analyse des micro-arrêts et des pertes récurrentes.
  BC-1010.70.30:
    name: Compte rendu de passation de poste
    description: |
      Rapports structurés de passation de poste et tableaux de bord numériques.
  BC-1010.70.40:
    name: Détection des anomalies de production
    description: |
      Détection des anomalies et alertes sur les données de production.

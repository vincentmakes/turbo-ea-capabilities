locale: fr
source: L1-professional-workforce-resourcing-management.yaml
entries:
  BC-4320:
    name: Gestion des ressources humaines professionnelles
    description: |
      Allocation, taux d'occupation, effet de levier et gestion des professionnels
      disponibles sur le portefeuille de missions. Distinct de la gestion générique
      du capital humain — centré sur les professionnels facturables comme principale
      ressource de livraison du cabinet.
  BC-4320.10:
    name: Prévision de la demande en ressources
    description: |
      Prévision de la demande en ressources facturables à partir du pipeline de
      missions, des missions engagées et des hypothèses de croissance.
  BC-4320.10.10:
    name: Prévision de la demande basée sur le pipeline
    description: |
      Prévision de la demande en ressources dérivée du pipeline de prospection,
      pondérée par la probabilité de succès.
  BC-4320.10.20:
    name: Planification de la demande pour les missions engagées
    description: |
      Planification des ressources à partir des missions acceptées avec
      un périmètre et un calendrier confirmés.
  BC-4320.10.30:
    name: Agrégation de la demande par compétence
    description: |
      Agrégation des prévisions de demande par compétence, spécialisation,
      langue et habilitation.
  BC-4320.20:
    name: Gestion du staffing des missions
    description: |
      Affectation de professionnels nommés aux rôles de mission, en équilibrant
      les besoins de la mission, le développement individuel et les objectifs
      de taux d'occupation.
  BC-4320.20.10:
    name: Traitement des demandes de ressources pour les missions
    description: |
      Collecte et traitement des demandes de ressources des missions par
      rapport aux professionnels disponibles.
  BC-4320.20.20:
    name: Gestion des décisions de staffing
    description: |
      Prise de décision d'affectation en équilibrant l'adéquation à la mission,
      les besoins de développement et les préférences des associés.
  BC-4320.20.30:
    name: Confirmation et notification du staffing
    description: |
      Confirmation des décisions de staffing à la direction de mission et
      aux professionnels affectés.
  BC-4320.30:
    name: Correspondance des compétences et des spécialisations
    description: |
      Maintenance des profils de compétences des professionnels et correspondance
      des profils avec les exigences en compétences des missions.
  BC-4320.30.10:
    name: Maintenance des profils de compétences des professionnels
    description: |
      Collecte et mise à jour des compétences, qualifications, langues et
      expériences sectorielles de chaque professionnel.
  BC-4320.30.20:
    name: Définition des exigences en compétences des missions
    description: |
      Définition des exigences en compétences, spécialisations et habilitations
      par rôle de mission.
  BC-4320.30.30:
    name: Correspondance basée sur les compétences
    description: |
      Correspondance des professionnels aux rôles de mission selon les compétences,
      la spécialisation et la disponibilité.
  BC-4320.40:
    name: Gestion du taux d'occupation
    description: |
      Suivi et pilotage du taux d'occupation facturable par rapport aux
      objectifs du cabinet et individuels, incluant l'analytique de productivité.
  BC-4320.40.10:
    name: Fixation des objectifs de taux d'occupation
    description: |
      Fixation des objectifs de taux d'occupation facturable par grade,
      pratique et professionnel.
  BC-4320.40.20:
    name: Suivi du taux d'occupation
    description: |
      Suivi quotidien des heures facturables, non facturables et des absences.
  BC-4320.40.30:
    name: Action sur les écarts de taux d'occupation
    description: |
      Identification et remédiation des professionnels dont le taux d'occupation
      est significativement inférieur ou supérieur aux objectifs.
  BC-4320.50:
    name: Gestion des professionnels disponibles
    description: |
      Gestion de la capacité facturable non affectée, incluant la planification
      de la montée en puissance, l'utilisation des temps disponibles pour des
      travaux non facturables et le redéploiement proactif.
  BC-4320.50.10:
    name: Gestion de la visibilité des capacités disponibles
    description: |
      Visibilité sur les capacités disponibles par grade, compétence et
      localisation.
  BC-4320.50.20:
    name: Allocation des activités pour les professionnels disponibles
    description: |
      Allocation des temps disponibles au développement, au soutien aux propositions,
      aux travaux méthodologiques ou à la formation.
  BC-4320.50.30:
    name: Action de réduction des temps disponibles
    description: |
      Redéploiement proactif, détachement ou ajustement de la capacité lorsque
      les temps disponibles dépassent l'objectif.
  BC-4320.60:
    name: Ressourcement inter-bureaux et transfrontalier
    description: |
      Coordination du partage de ressources entre les bureaux, les pratiques
      et les pays, incluant les détachements et la mobilité internationale des
      professionnels facturables.
  BC-4320.60.10:
    name: Prêt de ressources inter-bureaux
    description: |
      Prêt et emprunt de professionnels entre les bureaux sur une base
      temporaire.
  BC-4320.60.20:
    name: Gestion des détachements internationaux
    description: |
      Détachements internationaux plus longs de professionnels entre les bureaux
      du cabinet ou les juridictions des membres du réseau.
  BC-4320.60.30:
    name: Refacturation et règlement inter-bureaux
    description: |
      Règlement opérationnel des refacturations de temps et de coûts entre
      bureaux sur les missions partagées.
  BC-4320.70:
    name: Gestion du ratio d'encadrement des missions
    description: |
      Gestion des ratios associé-collaborateur sur les missions, en équilibrant
      les aspects économiques, la qualité et le développement.
  BC-4320.70.10:
    name: Modélisation du ratio d'encadrement des missions
    description: |
      Modélisation du mix associé, manager, senior et junior par type de mission.
  BC-4320.70.20:
    name: Surveillance des écarts de ratio d'encadrement
    description: |
      Surveillance du ratio d'encadrement réel par rapport à l'objectif et
      analyse des causes des écarts.
  BC-4320.70.30:
    name: Analytique de la santé de la pyramide des grades
    description: |
      Analyse de la santé de la pyramide des grades, de la vitesse de promotion
      et de l'impact de l'attrition sur le ratio d'encadrement.

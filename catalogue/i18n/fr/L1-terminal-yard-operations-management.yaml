locale: fr
source: L1-terminal-yard-operations-management.yaml
entries:
  BC-2470:
    name: Gestion des opérations de terminal et de parc
    description: |
      Exploitation des terminaux portuaires, intermodaux, ferroviaires et
      aéroportuaires de fret, incluant la manutention des navires et aéronefs,
      la gestion du parc, les opérations de portail et les équipements de terminal.
  BC-2470.10:
    name: Gestion de la manutention des navires et aéronefs
    description: |
      Accostage, opérations de piste et chargement ou déchargement de fret des
      navires et aéronefs dans les terminaux.
    in_scope:
      - Opérations de fret côté quai et côté piste
      - Planification de l'arrimage à l'interface terminal
    out_of_scope:
      - Opérations à bord pendant la ligne régulière (BC-2420.20)
  BC-2470.10.10:
    name: Accostage et arrimage des navires
    description: |
      Accostage, amarrage et planification de l'arrimage des navires à quai.
  BC-2470.10.20:
    name: Assistance piste des aéronefs
    description: |
      Assistance piste et chargement ou déchargement de fret des aéronefs.
  BC-2470.10.30:
    name: Opérations de chargement et déchargement
    description: |
      Chargement et déchargement de conteneurs, ULD et fret en vrac.
  BC-2470.20:
    name: Gestion du parc et des piles
    description: |
      Allocation et mouvement des conteneurs, semi-remorques et wagons au sein
      des parcs et des piles du terminal.
  BC-2470.20.10:
    name: Allocation des emplacements de parc
    description: |
      Allocation des emplacements de parc aux unités entrantes et sortantes.
  BC-2470.20.20:
    name: Planification des piles de conteneurs
    description: |
      Planification des piles pour optimiser le retraitement et la préparation
      des chargements.
  BC-2470.20.30:
    name: Gestion des piles frigorifiques et dangereuses
    description: |
      Gestion spécialisée des piles pour les branchements frigorifiques et les
      unités dangereuses.
  BC-2470.30:
    name: Gestion des opérations de portail
    description: |
      Opérations de portail camion et rail incluant la prise de rendez-vous
      préalable, l'entrée et la sortie du portail.
  BC-2470.30.10:
    name: Opérations d'entrée au portail
    description: |
      Réception des camions et wagons entrants au portail du terminal.
  BC-2470.30.20:
    name: Opérations de sortie du portail
    description: |
      Libération des camions et wagons sortants au portail du terminal.
  BC-2470.30.30:
    name: Gestion des pré-passages et des rendez-vous
    description: |
      Gestion de l'identification préalable, des documents et des créneaux de
      rendez-vous avant le portail.
  BC-2470.40:
    name: Gestion des opérations des équipements de terminal
    description: |
      Exploitation et maintenance des équipements de manutention du terminal tels
      que les grues, RTG, reach stackers et équipements de service au sol.
  BC-2470.40.10:
    name: Opérations des grues et RTG
    description: |
      Exploitation des grues de bord à quai, RTG et portiques.
  BC-2470.40.20:
    name: Opérations des équipements de service au sol
    description: |
      Exploitation des GSE tels que les tracteurs, chariots à plateformes et
      chargeurs.
  BC-2470.40.30:
    name: Maintenance des équipements de terminal
    description: |
      Maintenance et révision des équipements de manutention du terminal.
  BC-2470.50:
    name: Gestion des transferts intermodaux
    description: |
      Transfert de fret et d'unités entre modes aux points intermodaux tels que
      les parcs route-rail et les stations d'interligne aérien.
  BC-2470.50.10:
    name: Échange de wagons en gare de triage
    description: |
      Échange de wagons et d'unités intermodales entre opérateurs ferroviaires.
  BC-2470.50.20:
    name: Opérations de transfert camion-rail
    description: |
      Transfert de conteneurs et semi-remorques entre camion et rail.
  BC-2470.50.30:
    name: Interligne de fret aérien
    description: |
      Interligne de fret entre compagnies aériennes dans les aéroports de
      correspondance.
  BC-2470.60:
    name: Gestion de la capacité et des performances du terminal
    description: |
      Mesure et amélioration de la productivité, du temps de séjour et du débit
      du terminal.
  BC-2470.60.10:
    name: Productivité au poste d'accostage et au stand
    description: |
      Mesure de la productivité aux postes d'accostage des navires et aux stands
      des aéronefs.
  BC-2470.60.20:
    name: Gestion du temps de séjour des conteneurs
    description: |
      Gestion des temps de séjour des conteneurs et de l'exposition aux frais
      de surestaries.
  BC-2470.60.30:
    name: Rapports sur le débit du terminal
    description: |
      Rapports sur le débit du terminal par mode et type d'unité.

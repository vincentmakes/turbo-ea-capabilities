locale: fr
source: L1-information-technology-management.yaml
entries:
  BC-600:
    name: Gestion des technologies de l'information
    description: |
      Stratégie, architecture, services et opérations des technologies de l'information.
  BC-600.10:
    name: Gestion de la stratégie et de l'architecture IT
    description: |
      Stratégie IT, architecture d'entreprise et standards technologiques.
  BC-600.10.10:
    name: Développement de la stratégie IT
    description: |
      Définition de la stratégie IT alignée sur la stratégie d'entreprise.
  BC-600.10.20:
    name: Gestion de l'architecture d'entreprise
    description: |
      Architecture d'entreprise alignée sur TOGAF, couvrant les domaines métier, données, application et technologie.
  BC-600.10.30:
    name: Gestion des standards technologiques
    description: |
      Définition et gouvernance des standards et des modèles technologiques.
  BC-600.10.40:
    name: Gestion de la feuille de route technologique
    description: |
      Feuilles de route technologiques pluriannuelles et évolution des capacités.
  BC-600.10.50:
    name: Gouvernance et revue d'architecture
    description: |
      Comité de revue d'architecture, autorité de conception et gouvernance des exceptions.
  BC-600.20:
    name: Gestion du portefeuille et de la demande IT
    description: |
      Portefeuille IT, prise en charge de la demande et priorisation.
  BC-600.20.10:
    name: Prise en charge de la demande IT
    description: |
      Capture et triage des nouvelles demandes IT émanant du métier.
  BC-600.20.20:
    name: Gestion du portefeuille d'investissements IT
    description: |
      Vue d'ensemble des investissements, projets et bénéfices IT.
  BC-600.20.30:
    name: Planification de la capacité et des ressources IT
    description: |
      Planification de la capacité de livraison IT par équipe et par compétence.
  BC-600.20.40:
    name: Gestion des relations avec le métier
    description: |
      Partenariat entre la direction IT et les fonctions métier.
  BC-600.30:
    name: Gestion des services IT
    description: |
      Gestion des incidents, des problèmes, des changements, du catalogue de services et de l'ITSM.
  BC-600.30.10:
    name: Gestion du catalogue de services
    description: |
      Définition et maintien du catalogue de services et des SLA.
  BC-600.30.20:
    name: Gestion des incidents
    description: |
      Détection, triage, résolution et communication des incidents.
  BC-600.30.30:
    name: Gestion des problèmes
    description: |
      Analyse des causes racines et prévention des incidents récurrents.
  BC-600.30.40:
    name: Gestion des changements et des mises en production
    description: |
      Approbation des changements IT et gestion des mises en production.
  BC-600.30.50:
    name: Gestion des niveaux de service
    description: |
      Définition, mesure et reporting des niveaux de service.
  BC-600.30.60:
    name: Gestion des configurations
    description: |
      Éléments de configuration, CMDB et gestion des dépendances.
  BC-600.40:
    name: Gestion des opérations IT
    description: |
      Opérations IT quotidiennes, supervision et automatisation.
  BC-600.40.10:
    name: Gestion des événements et de la supervision
    description: |
      Télémétrie, observabilité, corrélation d'événements et alertes.
  BC-600.40.20:
    name: Ordonnancement des travaux IT et opérations par lots
    description: |
      Ordonnancement des travaux, orchestration des traitements par lots et automatisation des charges de travail.
  BC-600.40.30:
    name: Gestion de la capacité et des performances IT
    description: |
      Planification de la capacité et optimisation des performances des services.
  BC-600.40.40:
    name: Opérations de continuité des services IT
    description: |
      Tests de continuité des services IT et opérations de reprise.
  BC-600.40.50:
    name: Gestion de l'automatisation IT
    description: |
      Automatisation, manuels opératoires et orchestration pour les opérations IT.
  BC-600.50:
    name: Gestion de l'infrastructure informatique
    description: |
      Calcul, stockage, réseau et infrastructure cloud.
  BC-600.50.10:
    name: Gestion des serveurs et du calcul
    description: |
      Provisionnement et exploitation des ressources de calcul physiques et virtuelles.
  BC-600.50.20:
    name: Gestion du stockage
    description: |
      Provisionnement, hiérarchisation et protection du stockage.
  BC-600.50.30:
    name: Gestion du réseau
    description: |
      Gestion des services LAN, WAN, SD-WAN et réseau.
  BC-600.50.40:
    name: Gestion des plateformes cloud
    description: |
      Opérations des plateformes cloud publiques, privées et hybrides.
  BC-600.50.50:
    name: Gestion de l'informatique des utilisateurs finaux
    description: |
      Équipements de travail, gestion des terminaux et outils de collaboration.
  BC-600.60:
    name: Gestion des applications IT
    description: |
      Cycle de vie des applications, rationalisation et AMS.
  BC-600.60.10:
    name: Gestion du portefeuille d'applications
    description: |
      Catalogue d'applications, propriété et statut du cycle de vie.
  BC-600.60.20:
    name: Développement et ingénierie des applications
    description: |
      Développement logiciel, pratiques d'ingénierie et DevOps.
  BC-600.60.30:
    name: Maintenance et support des applications
    description: |
      AMS, résolution des défauts et livraison d'améliorations mineures.
  BC-600.60.40:
    name: Rationalisation des applications
    description: |
      Rationalisation, consolidation et décommissionnement des applications.
  BC-600.60.50:
    name: Gestion des intégrations et des API
    description: |
      Plateformes d'intégration, API et diffusion d'événements en flux continu.
  BC-600.70:
    name: Gestion des fournisseurs IT
    description: |
      Contrats, performances et écosystème des fournisseurs IT.
  BC-600.70.10:
    name: Intégration des fournisseurs IT
    description: |
      Intégration et contractualisation des fournisseurs et partenaires IT.
  BC-600.70.20:
    name: Gestion de la performance des fournisseurs IT
    description: |
      Tableaux de bord de performance et gestion des SLA pour les fournisseurs IT.
  BC-600.70.30:
    name: Gestion des licences logicielles
    description: |
      Licences logicielles, droits d'utilisation et gestion des audits.
  BC-600.70.40:
    name: Stratégie de sourcing IT
    description: |
      Stratégie de sourcing en développement interne, achat ou services gérés pour l'IT.
  BC-600.80:
    name: Gestion financière IT
    description: |
      Dépenses IT, refacturation/transparence des coûts et optimisation des coûts IT.
  BC-600.80.10:
    name: Budgétisation et prévisions IT
    description: |
      Planification budgétaire IT, prévisions et analyse des écarts.
  BC-600.80.20:
    name: Allocation des coûts IT et refacturation
    description: |
      Transparence des coûts, refacturation et allocation par TBM.
  BC-600.80.30:
    name: Gestion des FinOps cloud
    description: |
      Pratiques FinOps pour la visibilité et l'optimisation des coûts cloud.
  BC-600.80.40:
    name: Suivi de la valeur et des bénéfices IT
    description: |
      Suivi de la valeur des investissements IT et réalisation des bénéfices.

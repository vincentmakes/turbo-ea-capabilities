locale: fr
source: L1-decommissioning-abandonment-management.yaml
entries:
  BC-3120:
    name: Gestion du déclassement et de l'abandon
    description: |
      Gestion en fin de vie des actifs pétroliers — abandon et colmatage des puits,
      déclassement des installations, déclassement des pipelines, restauration des sites,
      provisionnement des passifs de déclassement et surveillance post-fermeture.
  BC-3120.10:
    name: Opérations de colmatage et d'abandon des puits
    description: |
      Conception et exécution des campagnes permanentes de colmatage et d'abandon de puits.
    in_scope:
      - Conception P&A et vérification des barrières
      - Opérations d'exécution du colmatage et de l'abandon
      - Sevrage et récupération de la tête de puits et du conducteur
    out_of_scope:
      - Surveillance de l'intégrité des puits en production (BC-3020.50)
  BC-3120.10.10:
    name: Conception du colmatage et de l'abandon
    description: |
      Conception des configurations de barrières permanentes pour l'abandon de puits.
  BC-3120.10.20:
    name: Exécution du colmatage et de l'abandon
    description: |
      Exécution des opérations de cimentation, de mise en place de bouchons et de vérification des barrières.
  BC-3120.10.30:
    name: Sevrage et récupération de la tête de puits
    description: |
      Sevrage et récupération des têtes de puits, des conducteurs et des colonnes de tubage.
  BC-3120.20:
    name: Déclassement des installations de surface
    description: |
      Déclassement, enlèvement et récupération des installations de surface et sous-marines
      en amont et en midstream.
  BC-3120.20.10:
    name: Planification de l'enlèvement des superstructures
    description: |
      Ingénierie de l'enlèvement des superstructures et de la méthodologie d'installation inverse.
  BC-3120.20.20:
    name: Exécution de l'enlèvement des superstructures
    description: |
      Exécution de l'enlèvement des superstructures en monolift, modulaire ou pièce à pièce.
  BC-3120.20.30:
    name: Récupération des équipements sous-marins
    description: |
      Récupération des arbres de Noël sous-marins, des collecteurs, des jumpers et des ombilicaux.
  BC-3120.30:
    name: Déclassement des pipelines
    description: |
      Déclassement, enlèvement ou décisions de maintien en place pour les pipelines redondants.
  BC-3120.30.10:
    name: Rinçage et nettoyage des pipelines
    description: |
      Rinçage, nettoyage et inertage des pipelines avant le déclassement.
  BC-3120.30.20:
    name: Décision de déclassement des pipelines
    description: |
      Évaluation comparative de l'enlèvement du pipeline par rapport au déclassement en place.
  BC-3120.30.30:
    name: Exécution du déclassement des pipelines
    description: |
      Exécution de l'enlèvement, de la coupe et du levage ou du maintien en place des pipelines.
  BC-3120.40:
    name: Restauration et dépollution des sites
    description: |
      Restauration des sites onshore et sous-marins, dépollution des sols et des sédiments,
      et vérification du dégagement des fonds marins.
  BC-3120.40.10:
    name: Dépollution des sols et des sédiments
    description: |
      Dépollution des sols et sédiments contaminés sur les sites déclassés.
  BC-3120.40.20:
    name: Restauration végétale
    description: |
      Revégétalisation et remodelage des sites onshore déclassés.
  BC-3120.40.30:
    name: Dégagement sous-marin des sites
    description: |
      Vérification du dégagement des fonds marins et récupération des objets tombés.
  BC-3120.50:
    name: Gestion des passifs de déclassement
    description: |
      Estimation des coûts, provisionnement et constitution de garanties pour les obligations de déclassement.
  BC-3120.50.10:
    name: Estimation des coûts d'abandon
    description: |
      Estimation probabiliste des coûts de déclassement et d'abandon.
  BC-3120.50.20:
    name: Provisionnement pour le déclassement
    description: |
      Maintien des provisions pour déclassement conformément aux normes comptables.
  BC-3120.50.30:
    name: Constitution de garanties pour le déclassement
    description: |
      Constitution et renouvellement des garanties de déclassement auprès des gouvernements hôtes.
  BC-3120.60:
    name: Surveillance post-fermeture
    description: |
      Surveillance environnementale à long terme et suivi des passifs résiduels après la fermeture.
  BC-3120.60.10:
    name: Surveillance environnementale à long terme
    description: |
      Surveillance à long terme des eaux souterraines, des sols et de l'environnement marin.
  BC-3120.60.20:
    name: Suivi des passifs résiduels
    description: |
      Suivi des passifs résiduels et des indemnités après la fermeture.

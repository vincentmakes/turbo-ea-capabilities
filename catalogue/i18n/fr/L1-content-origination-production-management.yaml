locale: fr
source: L1-content-origination-production-management.yaml
entries:
  BC-3700:
    name: Gestion de l'origination et de la production de contenu
    description: |
      Validation des projets, pré-production, tournage en studio ou sur le
      terrain, production de direct et d'actualités, post-production et
      localisation de contenu audiovisuel, audio et éditorial, du concept
      jusqu'au master prêt à la livraison.
  BC-3700.10:
    name: Commande et validation de contenu
    description: |
      Évaluation des concepts et propositions, composition du catalogue de
      projets et décision d'engager de nouvelles productions ou acquisitions.
  BC-3700.10.10:
    name: Évaluation des concepts et propositions
    description: |
      Évaluation structurée des propositions, traitements et bibles entrants
      selon des critères éditoriaux et commerciaux.
  BC-3700.10.20:
    name: Planification du catalogue et du portefeuille
    description: |
      Composition du catalogue de productions par genre, budget, audience et
      fenêtre de diffusion.
  BC-3700.10.30:
    name: Décision de validation de projet
    description: |
      Autorité et enregistrement de la décision de lancement, incluant le
      budget, le calendrier et l'enveloppe créative.
  BC-3700.10.40:
    name: Gestion des cahiers des charges de commande
    description: |
      Rédaction et cycle de vie des cahiers des charges de commande émis aux
      unités de production internes et aux producteurs externes.
  BC-3700.20:
    name: Gestion de la pré-production
    description: |
      Développement du scénario, budget de production, planification et
      préparation des décors et lieux de tournage pour amener un projet validé
      au stade du tournage.
  BC-3700.20.10:
    name: Développement du scénario et du storyboard
    description: |
      Développement itératif des scénarios, storyboards et listes de plans pour
      les productions scénarisées et non scénarisées.
  BC-3700.20.20:
    name: Planification du budget de production
    description: |
      Budget de production détaillé ascendant par département et phase, avec
      provision pour imprévus et caution d'achèvement.
  BC-3700.20.30:
    name: Planification du tournage
    description: |
      Élaboration du plan de travail et du plan de tournage, disponibilité des
      talents et techniciens, et fractionnement des équipes.
  BC-3700.20.40:
    name: Préparation des lieux et des décors
    description: |
      Repérage, autorisations et planification de la conception et construction
      des décors en studio et en lieux naturels.
  BC-3700.30:
    name: Gestion des opérations de production
    description: |
      Exécution du tournage principal ou de la production en studio, incluant
      la logistique de l'équipe, des équipements et du flux de travail sur le
      plateau.
  BC-3700.30.10:
    name: Opérations de production en studio
    description: |
      Production sur le plateau en studio pour les formats de divertissement,
      fiction et non-fiction, y compris les dispositifs multi-caméras.
  BC-3700.30.20:
    name: Opérations de production en extérieur
    description: |
      Exécution de la production dans des lieux réels et éloignés, incluant la
      gestion des équipes et la sécurité sur le tournage.
  BC-3700.30.30:
    name: Logistique de production et gestion des équipes
    description: |
      Logistique des feuilles de service, transports, restauration et
      mouvements d'équipements pour l'ensemble de la production.
  BC-3700.40:
    name: Gestion de la production d'événements en direct et d'actualités
    description: |
      Production en temps réel d'événements en direct, de sport et de
      journaux télévisés, incluant la réalisation multi-caméras et les
      graphiques en direct.
  BC-3700.40.10:
    name: Production d'événements en direct
    description: |
      Production de divertissements en direct et d'événements spéciaux avec
      mixage image et son en temps réel.
  BC-3700.40.20:
    name: Production de journaux télévisés
    description: |
      Production en rédaction des journaux et de l'actualité en continu,
      incluant la gestion du conducteur et la coordination des directs.
  BC-3700.40.30:
    name: Production de retransmissions sportives
    description: |
      Production multi-caméras de sports en direct, incluant les opérations
      cars de reportage et d'hôte de diffusion.
  BC-3700.40.40:
    name: Graphiques en temps réel et ralentis
    description: |
      Graphismes à l'antenne, tableaux de scores et opérations de ralentis
      instantanés pour les productions en direct et quasi-direct.
  BC-3700.50:
    name: Gestion de la post-production
    description: |
      Flux de travail image, audio, étalonnage et finition transformant le
      matériel capturé en master de livraison.
  BC-3700.50.10:
    name: Montage image et effets visuels
    description: |
      Montage image hors-ligne et en ligne, intégration des effets visuels et
      conformité des décisions de montage.
  BC-3700.50.20:
    name: Post-production sonore
    description: |
      Montage des dialogues, ADR, foley, design sonore et mixage final selon
      les spécifications de loudness à la livraison.
  BC-3700.50.30:
    name: Étalonnage et finition
    description: |
      Étalonnage créatif et technique, et finition pour les livrables HDR et
      SDR.
  BC-3700.50.40:
    name: Mastering et conformité
    description: |
      Production des masters de livraison, packages IMF et mezzanine broadcast,
      et vérification de conformité aux spécifications de livraison.
  BC-3700.60:
    name: Gestion de la localisation et des versions
    description: |
      Sous-titrage, sous-titrage pour sourds et malentendants, doublage et
      montages régionaux ou spécifiques à une plateforme ainsi que masters de
      version pour la distribution.
  BC-3700.60.10:
    name: Production des sous-titres et du sous-titrage SME
    description: |
      Création de sous-titres et de sous-titres codés en plusieurs langues et
      formats.
  BC-3700.60.20:
    name: Production du doublage
    description: |
      Traduction, direction de casting et enregistrement des pistes audio
      doublées pour les sorties territoriales.
  BC-3700.60.30:
    name: Gestion des versions linguistiques et des montages régionaux
    description: |
      Production des masters de versions linguistiques et régionales, incluant
      les montages territoriaux.

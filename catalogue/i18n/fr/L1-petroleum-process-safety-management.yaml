locale: fr
source: L1-petroleum-process-safety-management.yaml
entries:
  BC-3050:
    name: Gestion de la sécurité des procédés pétroliers
    description: |
      Prévention des accidents majeurs dans les installations de traitement des hydrocarbures — analyse des risques de procédé, intégrité mécanique des équipements sous pression, assurance des éléments critiques de sécurité, procédures opératoires, déclaration des performances et réponse aux urgences. Distinct de la gestion HSE intersectorielle (BC-730), qui conserve le périmètre santé au travail, environnement et sécurité individuelle.
  BC-3050.10:
    name: Analyse des risques de procédé
    description: |
      Identification et analyse structurées des risques d'accidents majeurs tout au long du cycle de vie des actifs.
    in_scope:
      - Études HAZID, HAZOP, LOPA et analyse nœud-papillon
      - Évaluation quantitative des risques
    out_of_scope:
      - Évaluation des risques de sécurité individuelle (BC-730)
  BC-3050.10.10:
    name: Études HAZOP
    description: |
      Études de risques et d'opérabilité sur les installations nouvelles et modifiées.
  BC-3050.10.20:
    name: Études HAZID
    description: |
      Études d'identification des dangers lors des phases préliminaires de concept et de conception.
  BC-3050.10.30:
    name: Études LOPA
    description: |
      Analyse des couches de protection pour définir les niveaux d'intégrité de sécurité.
  BC-3050.10.40:
    name: Analyse nœud-papillon
    description: |
      Analyse nœud-papillon pour cartographier les barrières face aux scénarios d'accidents majeurs.
  BC-3050.20:
    name: Gestion de l'intégrité mécanique
    description: |
      Inspection et gestion de l'intégrité des équipements sous pression et des dispositifs de sécurité-décharge.
  BC-3050.20.10:
    name: Inspection des appareils à pression
    description: |
      Inspection basée sur le risque des appareils à pression selon API 510.
  BC-3050.20.20:
    name: Inspection de l'intégrité des tuyauteries et pipelines
    description: |
      Inspection des tuyauteries de procédé et des pipelines selon API 570 et ASME B31G.
  BC-3050.20.30:
    name: Inspection des réservoirs de stockage
    description: |
      Inspection des réservoirs de stockage atmosphériques et sous pression selon API 653.
  BC-3050.20.40:
    name: Gestion des dispositifs de sécurité-décharge
    description: |
      Dimensionnement, essais et gestion du cycle de vie des soupapes de sécurité et disques de rupture.
  BC-3050.30:
    name: Gestion des éléments critiques de sécurité
    description: |
      Identification et assurance des performances des éléments critiques de sécurité et maintenance du dossier de sécurité.
  BC-3050.30.10:
    name: Identification des éléments critiques de sécurité
    description: |
      Identification des éléments critiques de sécurité à partir de l'analyse des risques d'accidents majeurs.
  BC-3050.30.20:
    name: Définition des standards de performance
    description: |
      Définition des standards de performance pour chaque élément critique de sécurité.
  BC-3050.30.30:
    name: Vérification des performances des éléments critiques de sécurité
    description: |
      Vérification des performances des éléments critiques de sécurité par rapport aux standards définis.
  BC-3050.30.40:
    name: Maintenance du dossier de sécurité
    description: |
      Maintenance des dossiers de sécurité des installations et soumission aux régulateurs.
  BC-3050.40:
    name: Procédures opératoires de sécurité des procédés
    description: |
      Rédaction, révision et définition des enveloppes opératoires pour les procédures critiques en matière de sécurité des procédés.
  BC-3050.40.10:
    name: Rédaction des procédures opératoires
    description: |
      Rédaction des procédures opératoires critiques en matière de sécurité des procédés.
  BC-3050.40.20:
    name: Révision et mise à jour des procédures
    description: |
      Révision et mise à jour périodiques des procédures de sécurité des procédés.
  BC-3050.40.30:
    name: Définition des enveloppes opératoires
    description: |
      Définition des enveloppes opératoires sûres pour les unités de procédé.
  BC-3050.50:
    name: Gestion des modifications de sécurité des procédés
    description: |
      Gouvernance de la sécurité des procédés pour les modifications d'installations, de procédures et de personnel, incluant la revue de sécurité avant démarrage.
  BC-3050.50.10:
    name: Revue des demandes de modification PSM
    description: |
      Revue des demandes de modification ayant un impact sur la PSM par rapport aux normes de risque.
  BC-3050.50.20:
    name: Revue de sécurité avant démarrage
    description: |
      Revues de sécurité avant démarrage pour les installations nouvelles et modifiées.
  BC-3050.50.30:
    name: Gestion des modifications temporaires
    description: |
      Gestion des modifications temporaires de procédé dans leur fenêtre autorisée.
  BC-3050.60:
    name: Gestion des performances de sécurité des procédés
    description: |
      Suivi et déclaration des indicateurs avancés et retardés de sécurité des procédés selon API RP 754 et cadres équivalents.
  BC-3050.60.10:
    name: Déclaration des événements de sécurité des procédés de niveaux 1 et 2
    description: |
      Saisie et déclaration des événements de sécurité des procédés de niveau 1 et de niveau 2.
  BC-3050.60.20:
    name: Surveillance des indicateurs avancés
    description: |
      Surveillance des indicateurs avancés de sécurité des procédés de niveaux 3 et 4.
  BC-3050.60.30:
    name: Déclaration des KPI de sécurité des procédés
    description: |
      Déclaration externe et interne des performances des KPI de sécurité des procédés.
  BC-3050.70:
    name: Préparation et réponse aux urgences
    description: |
      Planification de la réponse aux urgences, exécution des exercices et coordination de la réponse aux déversements pour les scénarios d'accidents majeurs.
  BC-3050.70.10:
    name: Planification de la réponse aux urgences
    description: |
      Maintenance des plans de réponse aux urgences d'installation et d'entreprise.
  BC-3050.70.20:
    name: Coordination des exercices et entraînements
    description: |
      Coordination des exercices d'urgence et des simulations d'incidents majeurs.
  BC-3050.70.30:
    name: Coordination de la réponse aux déversements
    description: |
      Coordination des opérations de réponse aux déversements d'hydrocarbures et de produits chimiques.
  BC-3050.70.40:
    name: Coordination de l'entraide
    description: |
      Coordination de l'entraide avec les coopératives de réponse aux incidents industriels.

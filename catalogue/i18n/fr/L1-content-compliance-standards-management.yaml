locale: fr
source: L1-content-compliance-standards-management.yaml
entries:
  BC-3780:
    name: Gestion de la conformité et des normes de contenu
    description: |
      Classification et évaluation des contenus, normes éditoriales, conformité
      réglementaire broadcast et en ligne, modération des contenus générés par
      les utilisateurs, conformité accessibilité et gestion des retraits et
      des notifications sur l'ensemble du portefeuille de contenus.
  BC-3780.10:
    name: Gestion de la classification et de l'évaluation des contenus
    description: |
      Soumission, application et auto-classification des classements d'âge et
      de contenu sur les territoires et plateformes.
  BC-3780.10.10:
    name: Soumission à la classification avant diffusion
    description: |
      Soumission des titres aux organismes de classification pour l'obtention
      des classements d'âge territoriaux avant la diffusion.
  BC-3780.10.20:
    name: Conformité d'affichage des classements
    description: |
      Affichage des classements d'âge, des descripteurs de contenu et des
      avertissements sur les surfaces grand public.
  BC-3780.10.30:
    name: Gestion de l'auto-classification
    description: |
      Exploitation des régimes d'auto-classification et respect des outils de
      classement d'âge des plateformes.
  BC-3780.20:
    name: Gestion des normes éditoriales
    description: |
      Rédaction de la politique éditoriale, revue de conformité avant
      transmission et traitement des plaintes éditoriales.
  BC-3780.20.10:
    name: Gestion de la politique éditoriale
    description: |
      Rédaction et cycle de vie des politiques éditoriales et des normes
      d'impartialité et d'exactitude.
  BC-3780.20.20:
    name: Revue de conformité avant transmission
    description: |
      Revue avant transmission des programmes et coupures par rapport aux
      normes éditoriales et réglementaires.
  BC-3780.20.30:
    name: Traitement des plaintes éditoriales
    description: |
      Triage, instruction et réponse aux plaintes éditoriales des
      téléspectateurs et des régulateurs.
  BC-3780.30:
    name: Conformité réglementaire broadcast
    description: |
      Conformité aux réglementations audiovisuelles et broadcast, incluant les
      règles de programmation, les quotas de contenu et les codes publicitaires.
  BC-3780.30.10:
    name: Conformité de la limite de diffusion nocturne et de la programmation
    description: |
      Respect des règles de limite de diffusion nocturne et de tranche horaire
      pour la programmation de contenus pour adultes.
  BC-3780.30.20:
    name: Conformité des quotas et du contenu local
    description: |
      Respect des quotas de contenu incluant les œuvres européennes, la
      production indépendante et les obligations de langue locale.
  BC-3780.30.30:
    name: Conformité aux codes publicitaires
    description: |
      Conformité de la publicité et du parrainage aux codes applicables et aux
      restrictions de catégorie.
  BC-3780.40:
    name: Modération des contenus générés par les utilisateurs
    description: |
      Modération des contenus générés par les utilisateurs par triage
      automatisé, revue humaine et flux de signaleurs de confiance.
  BC-3780.40.10:
    name: Triage automatisé des contenus
    description: |
      Triage et classification automatisés des contenus générés par les
      utilisateurs pour les problèmes de sécurité et de politique.
  BC-3780.40.20:
    name: Gestion de la file de revue humaine
    description: |
      Exploitation des files de revue humaine, incluant l'assurance qualité et
      les contrôles du bien-être des modérateurs.
  BC-3780.40.30:
    name: Gestion des signaleurs de confiance
    description: |
      Gestion des relations avec les signaleurs de confiance et des canaux de
      revue prioritaires dans le cadre de la réglementation des contenus en
      ligne.
  BC-3780.50:
    name: Gestion de la conformité accessibilité
    description: |
      Conformité aux obligations d'accessibilité en matière de sous-titrage,
      d'audiodescription et de fourniture de langue des signes.
  BC-3780.50.10:
    name: Conformité du sous-titrage codé
    description: |
      Conformité aux obligations de sous-titrage codé, incluant la couverture,
      la qualité et les normes de présentation.
  BC-3780.50.20:
    name: Conformité de l'audiodescription
    description: |
      Conformité aux obligations de couverture et de qualité de l'audiodescription.
  BC-3780.50.30:
    name: Conformité de la provision en langue des signes
    description: |
      Conformité aux obligations d'interprétation en langue des signes et de
      signature en incrustation image.
  BC-3780.60:
    name: Gestion des retraits et des notifications
    description: |
      Traitement des notifications de droits d'auteur et de contenus en ligne,
      incluant les contre-notifications et les procédures d'appel.
  BC-3780.60.10:
    name: Traitement des notifications de droits d'auteur
    description: |
      Traitement des notifications de retrait pour violation du droit d'auteur
      et application de la politique de récidive.
  BC-3780.60.20:
    name: Traitement des notifications de contenu en ligne
    description: |
      Traitement des notifications de contenus illicites et des ordonnances
      dans le cadre de la réglementation des contenus en ligne.
  BC-3780.60.30:
    name: Gestion des contre-notifications et des appels
    description: |
      Gestion des contre-notifications et des mécanismes de recours
      extrajudiciaires pour les décisions de suppression de contenu.

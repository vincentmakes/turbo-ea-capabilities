locale: fr
source: L1-retail-store-operations-management.yaml
entries:
  BC-2310:
    name: Gestion des opérations en magasin
    description: |
      Exploitation quotidienne des magasins physiques — procédures d'ouverture et
      de fermeture, exécution en magasin, gestion des effectifs, audits, entretien
      du mobilier et fourniture cohérente de l'expérience du format de magasin.

  BC-2310.10:
    name: Opérations d'ouverture et de fermeture du magasin
    description: |
      Procédures quotidiennes d'ouverture et de fermeture du magasin, incluant la
      préparation de la caisse, la réconciliation de fin de journée et la passation
      de poste.

  BC-2310.10.10:
    name: Exécution de la procédure d'ouverture du magasin
    description: |
      Exécution des procédures d'ouverture du magasin incluant les vérifications de
      préparation.

  BC-2310.10.20:
    name: Exécution de la procédure de fermeture du magasin
    description: |
      Procédures de clôture de fin de journée incluant la réconciliation et la
      sécurisation.

  BC-2310.10.30:
    name: Gestion de la passation de poste
    description: |
      Passation de poste entre les équipes avec transmission des tâches et des
      incidents.

  BC-2310.20:
    name: Gestion de l'exécution en magasin
    description: |
      Exécution des tâches de merchandising, de promotion, de signalétique et de
      réassortiment au niveau du magasin afin que celui-ci reflète le plan du siège.
    in_scope:
      - Gestion des tâches pour les employés en magasin
      - Exécution des planogrammes et de la signalétique
      - Réassortiment en magasin à partir du stock en réserve
    out_of_scope:
      - Conception des planogrammes (BC-2300.30.10)

  BC-2310.20.10:
    name: Gestion des tâches en magasin
    description: |
      Distribution et suivi des tâches opérationnelles auprès des équipes en magasin.

  BC-2310.20.20:
    name: Exécution des planogrammes et de la signalétique
    description: |
      Mise en œuvre en magasin des planogrammes, de la signalétique et de
      l'implantation promotionnelle.

  BC-2310.20.30:
    name: Réassortiment en magasin
    description: |
      Réassortiment des rayons depuis le stock en réserve et en arrière-boutique.

  BC-2310.20.40:
    name: Opérations de réserve et d'arrière-boutique
    description: |
      Réception, organisation et gestion des stocks en réserve et en arrière-boutique.

  BC-2310.30:
    name: Gestion des effectifs en magasin
    description: |
      Planification des horaires, prévision des effectifs par heure et gestion de la
      performance des employés au niveau du magasin.
    in_scope:
      - Prévisions horaires des effectifs en fonction du trafic et des ventes
      - Planification des équipes et suivi des temps et présences
      - Performance et accompagnement des employés au niveau du magasin
    out_of_scope:
      - Gestion générique du capital humain d'entreprise (BC-300)

  BC-2310.30.10:
    name: Prévision des besoins en main-d'œuvre
    description: |
      Prévision des besoins horaires en main-d'œuvre par magasin et département.

  BC-2310.30.20:
    name: Planification des équipes en magasin
    description: |
      Planification des équipes en magasin dans le respect de l'équité et des règles
      du travail.

  BC-2310.30.30:
    name: Gestion des temps et des présences
    description: |
      Saisie des pointages à l'arrivée et au départ, et gestion des anomalies.

  BC-2310.30.40:
    name: Accompagnement des employés en magasin
    description: |
      Accompagnement, reconnaissance et gestion de la performance des employés en
      magasin.

  BC-2310.40:
    name: Gestion des audits et de la conformité en magasin
    description: |
      Audits opérationnels, inspections de conformité, clients mystères et conformité
      des magasins aux standards de marque et d'exploitation.

  BC-2310.40.10:
    name: Programme d'audit opérationnel
    description: |
      Programme d'audits opérationnels et de visites d'inspection par rapport aux
      standards du magasin.

  BC-2310.40.20:
    name: Programme de client mystère
    description: |
      Programme de client mystère pour évaluer l'expérience client.

  BC-2310.40.30:
    name: Conformité aux standards du magasin
    description: |
      Conformité aux standards de marque, de sécurité et d'exploitation par magasin.

  BC-2310.50:
    name: Gestion de l'entretien des actifs du magasin
    description: |
      Entretien au niveau du magasin du mobilier, des équipements, de la
      réfrigération et de la propreté pour maintenir le magasin en état de vente.

  BC-2310.50.10:
    name: Maintenance du mobilier et des équipements
    description: |
      Maintenance du mobilier, des présentoirs et des équipements en magasin.

  BC-2310.50.20:
    name: Gestion du temps de fonctionnement de la réfrigération
    description: |
      Surveillance et gestion du temps de fonctionnement de la réfrigération dans la
      grande distribution alimentaire.

  BC-2310.50.30:
    name: Propreté et hygiène du magasin
    description: |
      Routines de propreté, d'entretien ménager et d'hygiène de la surface de vente.

  BC-2310.60:
    name: Gestion du format et de l'expérience en magasin
    description: |
      Définition et intendance des standards d'expérience du format de magasin,
      incluant le modèle de service, l'atmosphère et le parcours client.

  BC-2310.60.10:
    name: Standards du format de magasin
    description: |
      Standards de chaque format de magasin couvrant l'agencement, le service et
      l'ambiance.

  BC-2310.60.20:
    name: Conception de l'expérience client en magasin
    description: |
      Conception du parcours client en magasin et des interactions de service.

  BC-2310.60.30:
    name: Planification du rafraîchissement du concept magasin
    description: |
      Planification des rafraîchissements du concept magasin et des déploiements
      pilotes.

locale: fr
source: L1-merchandising-management.yaml
entries:
  BC-2300:
    name: Gestion du merchandising
    description: |
      Décisions relatives à l'assortiment, la catégorie, l'espace, les achats, la
      marque propre et les dépréciations qui définissent les produits vendus aux
      consommateurs, leur localisation et la profondeur de l'offre.

  BC-2300.10:
    name: Planification de l'assortiment et de la gamme
    description: |
      Architecture de gamme, nombre de références et plans d'assortiment par groupe
      de magasins qui traduisent la stratégie en SKU disponibles par point de vente.
    in_scope:
      - Architecture de gamme et structure bon-mieux-meilleur
      - Plans d'assortiment par groupe de magasins et par canal
      - Introduction de nouveaux articles et slots de déréférencement
    out_of_scope:
      - Gestion générique du cycle de vie produit (BC-820)
      - Prévision de la demande (BC-520.10)

  BC-2300.10.10:
    name: Définition de l'architecture de gamme
    description: |
      Définition de l'architecture de gamme, du positionnement par niveaux et de la
      structure bon-mieux-meilleur par catégorie.

  BC-2300.10.20:
    name: Planification de l'assortiment par groupe de magasins
    description: |
      Plans d'assortiment adaptés aux groupes de magasins selon la zone de
      chalandise et la mission d'achat.

  BC-2300.10.30:
    name: Optimisation du nombre de références
    description: |
      Optimisation du nombre de SKU par catégorie pour équilibrer variété,
      complexité et marge.

  BC-2300.10.40:
    name: Planification de l'introduction de nouveaux articles
    description: |
      Référencement et rangement des nouveaux articles, incluant le calendrier
      d'introduction et les décisions de remplacement.

  BC-2300.10.50:
    name: Planification du déréférencement
    description: |
      Décisions de sortie de gamme, choix de remplacement et disposition des
      articles déréférencés.

  BC-2300.20:
    name: Gestion des catégories
    description: |
      Stratégie de catégorie, définition des rôles et pilotage de la performance
      en traitant chaque catégorie comme une unité commerciale selon les pratiques
      CGF/ECR.
    in_scope:
      - Stratégie de catégorie et définition des rôles
      - Performance de catégorie et tableaux de bord
      - Collaboration avec les capitaines de catégorie fournisseurs

  BC-2300.20.10:
    name: Définition de la stratégie de catégorie
    description: |
      Définition de la stratégie de catégorie, du profil client cible et du
      positionnement concurrentiel.

  BC-2300.20.20:
    name: Attribution des rôles de catégorie
    description: |
      Attribution des rôles de catégorie tels que destination, routine, commodité
      ou saisonnier.

  BC-2300.20.30:
    name: Analyse de la performance des catégories
    description: |
      Tableaux de bord de catégorie, analyse des parts de marché, de la croissance
      et de la marge.

  BC-2300.20.40:
    name: Engagement avec les capitaines de catégorie
    description: |
      Engagement des fournisseurs capitaines de catégorie avec dispositifs de
      cloisonnement de l'information.

  BC-2300.30:
    name: Gestion de l'espace et des planogrammes
    description: |
      Allocation de l'espace de vente et des linéaires, planogrammes et agencements
      de mobilier qui traduisent le plan d'assortiment en rayon physique ou numérique.

  BC-2300.30.10:
    name: Conception des planogrammes
    description: |
      Conception des planogrammes par catégorie, groupe de magasins et type de
      mobilier.

  BC-2300.30.20:
    name: Allocation de l'espace en linéaire
    description: |
      Allocation de l'espace en linéaire entre catégories et marques selon la
      performance.

  BC-2300.30.30:
    name: Agencement des mobiliers et du sol
    description: |
      Aménagement du sol et disposition des mobiliers pour soutenir les adjacences
      et le flux client.

  BC-2300.30.40:
    name: Suivi de la conformité aux planogrammes
    description: |
      Suivi de la conformité aux planogrammes via les audits en magasin et les flux
      de reconnaissance d'image.

  BC-2300.40:
    name: Gestion des achats et de l'ouverture à l'achat
    description: |
      Planification de l'ouverture à l'achat, exécution du plan d'achats et
      allocation en magasin qui convertissent les plans d'assortiment en commandes
      fournisseurs.
    in_scope:
      - Budgets d'ouverture à l'achat par département et saison
      - Exécution du plan d'achats avec les fournisseurs
      - Allocation des marchandises réceptionnées entre les magasins
    out_of_scope:
      - Approvisionnement générique (BC-500)

  BC-2300.40.10:
    name: Planification de l'ouverture à l'achat
    description: |
      Budgétisation de l'ouverture à l'achat par département, classe et saison.

  BC-2300.40.20:
    name: Exécution du plan d'achats
    description: |
      Exécution des plans d'achats auprès des fournisseurs incluant la sélection des
      styles et des SKU.

  BC-2300.40.30:
    name: Allocation aux magasins et canaux
    description: |
      Allocation des marchandises réceptionnées aux magasins et canaux selon les
      attributs et la performance.

  BC-2300.40.40:
    name: Gestion des achats de réassortiment
    description: |
      Décisions d'achats de réassortiment pour les articles permanents et les
      incontournables.

  BC-2300.50:
    name: Gestion du développement des marques propres
    description: |
      Stratégie, spécification, approvisionnement et intendance de la marque pour
      les gammes sous marque propre et marque de distributeur.

  BC-2300.50.10:
    name: Stratégie marque propre
    description: |
      Stratégie de portefeuille des marques propres et positionnement par niveaux.

  BC-2300.50.20:
    name: Cahier des charges marque propre
    description: |
      Spécifications produits, briefs packaging et standards qualité pour les marques
      propres.

  BC-2300.50.30:
    name: Approvisionnement marque propre
    description: |
      Recherche de fabricants sous contrat et co-packeurs pour la production sous
      marque propre.

  BC-2300.50.40:
    name: Intendance de la marque propre
    description: |
      Intendance de l'identité des marques propres, gouvernance du packaging et
      équité de marque.

  BC-2300.60:
    name: Gestion des dépréciations et de la liquidation de stocks
    description: |
      Décisions de cadence des dépréciations, de soldes et de liquidation permettant
      de déstocker les articles en excédent et en fin de vie.
    in_scope:
      - Décisions de cadence et de profondeur des dépréciations
      - Plans de soldes de fin de saison
      - Liquidation, magasins d'usine, dons et destruction
    out_of_scope:
      - Modifications de prix courantes (BC-440.20.20)
      - Remises promotionnelles (BC-440.30)

  BC-2300.60.10:
    name: Stratégie de dépréciation
    description: |
      Stratégie de profondeur, cadence et calendrier des dépréciations par catégorie.

  BC-2300.60.20:
    name: Planification des soldes de fin de saison
    description: |
      Plans de soldes de fin de saison et gestion des prix de sortie.

  BC-2300.60.30:
    name: Acheminement de la liquidation des stocks
    description: |
      Acheminement des stocks résiduels vers les magasins d'usine, la liquidation,
      les dons ou la destruction.

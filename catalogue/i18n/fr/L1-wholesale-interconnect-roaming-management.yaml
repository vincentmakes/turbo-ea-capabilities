locale: fr
source: L1-wholesale-interconnect-roaming-management.yaml
entries:
  BC-2680:
    name: Gestion du wholesale, de l'interconnexion et de l'itinérance
    description: |
      Services télécom wholesale destinés aux autres opérateurs et partenaires
      — produits et tarification wholesale, partenariats MVNO et MVNE,
      interconnexion et peering, relations avec les partenaires d'itinérance,
      règlement inter-opérateurs et accords de capacité tels que l'IRU et la
      fibre noire.
  BC-2680.10:
    name: Gestion des produits et tarifs wholesale
    description: |
      Définition, tarification et négociation commerciale des offres wholesale
      destinées aux opérateurs, MVNO et grands partenaires.
  BC-2680.10.10:
    name: Conception des tarifs wholesale
    description: |
      Conception des tarifs wholesale sur les produits voix, données, messagerie
      et capacité.
  BC-2680.10.20:
    name: Publication des offres wholesale
    description: |
      Publication des offres wholesale sur les canaux partenaires et les offres
      de référence requises par le régulateur.
  BC-2680.10.30:
    name: Négociation commerciale wholesale
    description: |
      Négociation commerciale bilatérale des accords wholesale et des conditions
      spécifiques.
  BC-2680.20:
    name: Gestion des partenariats MVNO et MVNE
    description: |
      Intégration et gestion continue des partenaires MVNO et MVNE, incluant
      l'intégration BSS et la gouvernance commerciale.
  BC-2680.20.10:
    name: Intégration des MVNO
    description: |
      Intégration des nouveaux partenaires MVNO et MVNE selon les critères de
      préparation commerciale, réglementaire et technique.
  BC-2680.20.20:
    name: Intégration BSS des MVNO
    description: |
      Intégration des partenaires MVNO avec le BSS hébergeur pour le
      provisionnement, la tarification et le reporting.
  BC-2680.20.30:
    name: Gestion commerciale des MVNO
    description: |
      Gouvernance commerciale continue, revues de performance et gestion des
      sorties des partenaires MVNO.
  BC-2680.30:
    name: Gestion des accords d'interconnexion
    description: |
      Gestion des accords d'interconnexion voix et IP incluant le peering et
      le transit.
  BC-2680.30.10:
    name: Gestion des accords de peering
    description: |
      Gestion des accords de peering IP et des conditions commerciales et
      opérationnelles associées.
  BC-2680.30.20:
    name: Gestion des accords de transit
    description: |
      Gestion des accords de transit voix et IP avec les fournisseurs en amont.
  BC-2680.30.30:
    name: Mesure des échanges de trafic
    description: |
      Mesure des volumes de trafic échangés avec les pairs et fournisseurs de
      transit pour le règlement et l'ingénierie.
  BC-2680.40:
    name: Gestion des partenaires d'itinérance
    description: |
      Établissement et exploitation des relations d'itinérance avec les réseaux
      partenaires internationaux.
  BC-2680.40.10:
    name: Gestion des accords d'itinérance
    description: |
      Négociation et gestion du cycle de vie des accords d'itinérance bilatéraux.
  BC-2680.40.20:
    name: Échange de fichiers TAP
    description: |
      Échange de fichiers TAP avec les partenaires d'itinérance pour le règlement
      des usages.
  BC-2680.40.30:
    name: Intégration des partenaires d'itinérance
    description: |
      Intégration technique et commerciale des nouveaux partenaires d'itinérance,
      incluant les tests IREG et TADIG.
  BC-2680.50:
    name: Gestion du règlement inter-opérateurs
    description: |
      Règlement des usages et des litiges inter-opérateurs pour l'itinérance
      et l'interconnexion.
  BC-2680.50.10:
    name: Règlement TAP et NRTRDE
    description: |
      Règlement des usages d'itinérance basé sur les enregistrements TAP et
      NRTRDE quasi temps réel.
  BC-2680.50.20:
    name: Facturation d'interconnexion
    description: |
      Facturation aux partenaires d'interconnexion pour le trafic terminant,
      originant et en transit.
  BC-2680.50.30:
    name: Résolution des litiges de règlement
    description: |
      Résolution des litiges soulevés sur les relevés de règlement
      inter-opérateurs.
  BC-2680.50.40:
    name: Réconciliation du règlement
    description: |
      Réconciliation des enregistrements de règlement inter-opérateurs avec
      la comptabilité et la trésorerie internes.
  BC-2680.60:
    name: Gestion de la capacité wholesale et des IRU
    description: |
      Accords de capacité wholesale à long terme incluant le droit d'usage
      inaliénable et les locations de fibre noire.
  BC-2680.60.10:
    name: Gestion des droits d'usage inaliénables
    description: |
      Vente et achat de droits d'usage inaliénables sur les capacités longue
      distance et sous-marines.
  BC-2680.60.20:
    name: Gestion de la fibre noire
    description: |
      Location et gestion des brins de fibre noire avec et vers les partenaires.
  BC-2680.60.30:
    name: Gestion des locations de capacité
    description: |
      Gestion des locations de capacité récurrentes sur les routes métro,
      longue distance et sous-marines.

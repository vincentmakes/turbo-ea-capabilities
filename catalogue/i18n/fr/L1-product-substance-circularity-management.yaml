locale: fr
source: L1-product-substance-circularity-management.yaml
entries:
  BC-1980:
    name: Gestion des substances et de la circularité des produits
    description: |
      Restrictions sur les substances, reprise en fin de vie, réparation, remise à neuf,
      remanufacture et divulgation de l'empreinte environnementale des produits électriques.
  BC-1980.10:
    name: Gestion de la conformité aux substances restreintes
    description: |
      Conformité aux régimes de restriction des substances tels que RoHS, REACH SVHC et la Proposition 65.
  BC-1980.10.10:
    name: Vérification de conformité RoHS
    description: |
      Vérification des produits par rapport aux limites de substances RoHS.
  BC-1980.10.20:
    name: Conformité REACH SVHC
    description: |
      Conformité aux obligations relatives aux substances extrêmement préoccupantes REACH.
  BC-1980.10.30:
    name: Conformité sans halogène
    description: |
      Vérification des allégations de produits sans halogène.
  BC-1980.10.40:
    name: Conformité Proposition 65
    description: |
      Conformité aux obligations d'avertissement de la Proposition 65 de Californie.
  BC-1980.20:
    name: Gestion des données de déclaration de substances
    description: |
      Collecte et gestion des données de déclaration de substances sur l'ensemble de la nomenclature.
  BC-1980.20.10:
    name: Collecte des déclarations de matériaux
    description: |
      Collecte des déclarations complètes de matériaux auprès des fournisseurs.
  BC-1980.20.20:
    name: Maintenance de la base de données de conformité aux substances
    description: |
      Maintenance de la base de données maîtresse de conformité aux substances.
  BC-1980.20.30:
    name: Divulgation des substances aux clients
    description: |
      Fourniture des déclarations de substances aux clients et aux autorités.
  BC-1980.30:
    name: Diligence raisonnable sur les minerais de conflit
    description: |
      Diligence raisonnable sur les sources d'étain, de tungstène, de tantale et d'or conformément aux régimes alignés sur l'OCDE.
  BC-1980.30.10:
    name: Cartographie des fondeurs et affineurs
    description: |
      Cartographie des fondeurs et affineurs alimentant la chaîne d'approvisionnement.
  BC-1980.30.20:
    name: Enquête sur le pays d'origine
    description: |
      Enquête raisonnable sur le pays d'origine des minerais concernés.
  BC-1980.30.30:
    name: Rapport sur les minerais de conflit
    description: |
      Rapports statutaires et à destination des clients sur les minerais de conflit.
  BC-1980.40:
    name: Gestion de la conformité des batteries et des emballages
    description: |
      Conformité aux régimes applicables aux batteries et aux emballages, y compris le règlement européen sur les batteries.
  BC-1980.40.10:
    name: Conformité au règlement sur les batteries
    description: |
      Conformité au règlement européen sur les batteries et à ses équivalents.
  BC-1980.40.20:
    name: Gestion des données du passeport de batterie
    description: |
      Rédaction et maintenance des données du passeport de batterie.
  BC-1980.40.30:
    name: Conformité aux déchets d'emballages
    description: |
      Conformité aux obligations relatives aux emballages et aux déchets d'emballages.
  BC-1980.50:
    name: Opérations de reprise en fin de vie
    description: |
      Reprise, logistique inverse et déclaration de responsabilité du producteur pour les produits électriques.
  BC-1980.50.10:
    name: Opérations du système de reprise WEEE
    description: |
      Exploitation des dispositifs de conformité du producteur WEEE.
  BC-1980.50.20:
    name: Rapport de responsabilité du producteur
    description: |
      Déclaration des tonnages mis sur le marché et récupérés.
  BC-1980.50.30:
    name: Opérations de logistique inverse
    description: |
      Logistique inverse pour les produits et composants en fin de vie.
  BC-1980.60:
    name: Opérations de réparation et de remise à neuf
    description: |
      Réseau de services de réparation et opérations de documentation sur le droit à la réparation.
  BC-1980.60.10:
    name: Opérations du réseau de services de réparation
    description: |
      Exploitation des réseaux de services de réparation autorisés.
  BC-1980.60.20:
    name: Documentation sur le droit à la réparation
    description: |
      Mise à disposition de la documentation de réparation conformément aux régimes du droit à la réparation.
  BC-1980.60.30:
    name: Opérations de remise à neuf
    description: |
      Remise à neuf des produits retournés pour les remettre en état de revente.
  BC-1980.70:
    name: Opérations de remanufacture et de réutilisation
    description: |
      Remanufacture et réutilisation des cœurs et composants dans les nouvelles constructions.
  BC-1980.70.10:
    name: Récupération et démontage des cœurs
    description: |
      Récupération et démontage des cœurs retournés.
  BC-1980.70.20:
    name: Exécution du processus de remanufacture
    description: |
      Exécution des processus de remanufacture sur les cœurs récupérés.
  BC-1980.70.30:
    name: Traçabilité des composants réutilisés
    description: |
      Traçabilité des composants réutilisés dans les nouvelles constructions de produits.
  BC-1980.80:
    name: Rapport sur l'empreinte environnementale des produits
    description: |
      Rédaction et divulgation des données d'empreinte environnementale au niveau produit.
  BC-1980.80.10:
    name: Calcul de l'empreinte carbone des produits
    description: |
      Calcul des empreintes carbone au niveau produit.
  BC-1980.80.20:
    name: Déclaration environnementale de produit
    description: |
      Rédaction des déclarations environnementales de produit.
  BC-1980.80.30:
    name: Opérations du passeport numérique de produit
    description: |
      Exploitation des passeports numériques de produit conformément à la réglementation émergente.

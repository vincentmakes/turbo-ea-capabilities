locale: fr
source: L1-mineral-exploration-management.yaml
entries:
  BC-4400:
    name: Gestion de l'exploration minière
    description: |
      Découverte de nouvelles minéralisations et qualification des prospects
      d'exploration par des levés géologiques, géochimiques et géophysiques,
      des campagnes de forage et l'analyse d'échantillons, aboutissant à des
      rapports de découverte et des décisions de maturation des prospects.
  BC-4400.10:
    name: Gestion des levés géoscientifiques
    description: |
      Acquisition, traitement et interprétation des données de levés géophysiques,
      géochimiques et géologiques aéroportés et au sol sur les permis
      d'exploration.
    in_scope:
      - Levés magnétiques et électromagnétiques aéroportés
      - Levés de gravimétrie, polarisation induite et sismique au sol
      - Géochimie des sols, sédiments alluviaux et fragments de roches
      - Cartographie géologique à 1:50 000 et à l'échelle du projet
    out_of_scope:
      - Diagraphie géologique des forages à teneur ressource (BC-4400.30)
      - Réconciliation géologique en phase de production (BC-4410.60)
  BC-4400.10.10:
    name: Levé géophysique aéroporté
    description: |
      Acquisition de levés magnétiques, électromagnétiques, radiométriques
      et gravimétriques aéroportés sur les blocs d'exploration.
  BC-4400.10.20:
    name: Levé géophysique au sol
    description: |
      Acquisition de levés gravimétriques, de polarisation induite,
      électromagnétiques et sismiques au sol à l'échelle du prospect.
  BC-4400.10.30:
    name: Échantillonnage géochimique
    description: |
      Programmes d'échantillonnage des sols, sédiments alluviaux, biogéochimie
      et fragments de roches pour délimiter les anomalies géochimiques.
  BC-4400.10.40:
    name: Cartographie géologique
    description: |
      Cartographie géologique des affleurements et à l'échelle du prospect
      pour définir la lithologie, la structure et l'altération.
  BC-4400.10.50:
    name: Interprétation des données de levé
    description: |
      Interprétation intégrée des jeux de données géophysiques et géochimiques
      pour la génération de cibles.
  BC-4400.20:
    name: Génération de cibles d'exploration
    description: |
      Conversion des données régionales et de prospect en cibles de forage
      classées par analyse des systèmes minéraux et modélisation de la
      prospectivité.
    in_scope:
      - Application des modèles de systèmes minéraux et de gisements
      - Modélisation de la prospectivité basée sur les données
      - Classement des leads et des cibles
    out_of_scope:
      - Estimation des ressources sur les minéralisations découvertes (BC-4410.20)
  BC-4400.20.10:
    name: Analyse des systèmes minéraux
    description: |
      Application des critères de source, transport, piège et préservation
      pour définir les systèmes minéralisés.
  BC-4400.20.20:
    name: Modélisation de la prospectivité
    description: |
      Cartographie de la prospectivité par approche experte et données pour
      prédire les emplacements des cibles.
  BC-4400.20.30:
    name: Classement des cibles
    description: |
      Classement probabiliste des cibles générées selon la chance de découverte
      et le tonnage potentiel.
  BC-4400.20.40:
    name: Gestion de l'inventaire des leads d'exploration
    description: |
      Maintenance de l'inventaire classé des leads et cibles d'exploration
      et de leur parcours de maturation.
  BC-4400.30:
    name: Opérations de forage d'exploration
    description: |
      Exécution des programmes de forage à circulation inverse, carottage
      diamant et autres méthodes, incluant les mesures de déviation, la
      diagraphie des échantillons et la supervision des sous-traitants.
    in_scope:
      - Forage à circulation inverse et aircore
      - Forage carotté diamant
      - Mesure de la déviation des forages
    out_of_scope:
      - Forage de production pour le chargement en explosifs (BC-4430.10)
      - Forage géotechnique pour la conception des talus (BC-4420.50)
  BC-4400.30.10:
    name: Forage à circulation inverse
    description: |
      Forage à circulation inverse et aircore pour la récupération d'échantillons
      d'exploration.
  BC-4400.30.20:
    name: Forage carotté diamant
    description: |
      Forage carotté diamant pour la récupération continue et orientée
      d'échantillons lithologiques.
  BC-4400.30.30:
    name: Diagraphie des échantillons de forage
    description: |
      Diagraphie géologique, géotechnique et structurale des déblais
      et carottes de forage.
  BC-4400.30.40:
    name: Gestion des mesures de forage
    description: |
      Mesure de la déviation de fond de trou et contrôle de la position
      des têtes de forage.
  BC-4400.30.50:
    name: Gestion des sous-traitants de forage
    description: |
      Engagement, mobilisation et gestion de la performance des sous-traitants
      de forage.
  BC-4400.40:
    name: Gestion des échantillons et des analyses
    description: |
      Chaîne de custody, préparation et coordination des analyses des
      échantillons d'exploration dans le cadre de régimes d'assurance qualité
      documentés satisfaisant aux normes de reporting public.
    in_scope:
      - Chaîne de custody des échantillons
      - Sélection des laboratoires et gestion des délais d'exécution
      - Insertion et surveillance des contrôles qualité
    out_of_scope:
      - Analyses de l'usine de traitement (BC-4440.60)
      - Analyses de règlement fonderie (BC-4450.70)
  BC-4400.40.10:
    name: Préparation des échantillons
    description: |
      Concassage, fractionnement et pulvérisation des échantillons d'exploration
      pour l'analyse.
  BC-4400.40.20:
    name: Coordination des analyses en laboratoire
    description: |
      Sélection, expédition et gestion des délais d'exécution des travaux
      analytiques en laboratoire.
  BC-4400.40.30:
    name: Gestion du programme d'assurance qualité
    description: |
      Insertion et surveillance des standards, blancs et duplicatas pour
      garantir la qualité des analyses déclarables.
  BC-4400.40.40:
    name: Gestion des matériaux de référence
    description: |
      Approvisionnement, caractérisation et distribution des matériaux de
      référence certifiés.
  BC-4400.50:
    name: Pilotage du programme d'exploration
    description: |
      Orientation stratégique du portefeuille d'exploration par commodité,
      juridiction et classe de risque, incluant l'allocation des investissements
      et le suivi des performances de découverte.
  BC-4400.50.10:
    name: Définition de la stratégie d'exploration
    description: |
      Définition de la stratégie d'exploration par commodité, juridiction
      et classe de gisement.
  BC-4400.50.20:
    name: Allocation des investissements d'exploration
    description: |
      Allocation du capital d'exploration entre les programmes régionaux
      et de prospect.
  BC-4400.50.30:
    name: Suivi des performances de découverte
    description: |
      Suivi du coût de découverte, des ajouts de ressources et de la
      conversion en réserves.
  BC-4400.60:
    name: Reporting des découvertes
    description: |
      Communication interne et externe des résultats d'exploration, incluant
      les divulgations aux partenaires et aux marchés financiers conformément
      aux codes de reporting public.
  BC-4400.60.10:
    name: Reporting interne des découvertes
    description: |
      Communication interne des résultats d'exploration, des intersections
      et du statut de maturation des cibles.
  BC-4400.60.20:
    name: Divulgation publique des résultats d'exploration
    description: |
      Divulgation des intersections et résultats d'exploration sous JORC,
      NI 43-101, SAMREC et les codes équivalents.
  BC-4400.60.30:
    name: Reporting d'exploration en coentreprise
    description: |
      Reporting des avancées, dépenses et résultats d'exploration aux
      partenaires et opérateurs de coentreprises.

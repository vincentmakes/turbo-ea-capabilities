locale: fr
source: L1-quality-management.yaml
entries:
  BC-720:
    name: Gestion de la qualité
    description: |
      Stratégie, assurance qualité et contrôle sur l'ensemble des productions de l'entreprise.
  BC-720.10:
    name: Gestion de la stratégie et de la politique qualité
    description: |
      Politique qualité, standards et cadre du système qualité.
  BC-720.10.10:
    name: Gestion du manuel et de la politique qualité
    description: |
      Manuel qualité et politiques alignés sur ISO 9001 et les standards sectoriels.
  BC-720.10.20:
    name: Définition des objectifs qualité
    description: |
      Définition des objectifs qualité, KPI et cibles.
  BC-720.10.30:
    name: Gouvernance du système de management de la qualité
    description: |
      Gouvernance du périmètre, de la structure et des responsabilités du SMQ.
  BC-720.10.40:
    name: Gestion des risques qualité
    description: |
      Identification, évaluation et traitement des risques qualité.
  BC-720.20:
    name: Gestion de l'assurance qualité
    description: |
      Systèmes qualité, audits et certifications (ISO 9001, etc.).
  BC-720.20.10:
    name: Audits qualité internes
    description: |
      Planification et réalisation des audits qualité internes.
  BC-720.20.20:
    name: Gestion de la certification externe
    description: |
      Gestion des certifications ISO 9001 et autres, ainsi que de la surveillance.
  BC-720.20.30:
    name: Validation et qualification des processus
    description: |
      Validation et qualification des processus et des équipements.
  BC-720.20.40:
    name: Maîtrise des documents et des enregistrements
    description: |
      Documents contrôlés, enregistrements et archivage qualité.
  BC-720.30:
    name: Gestion du contrôle qualité
    description: |
      Inspections, essais et critères d'acceptation.
  BC-720.30.10:
    name: Planification des inspections
    description: |
      Plans d'inspection, échantillonnage et critères d'acceptation.
  BC-720.30.20:
    name: Contrôle qualité en cours de fabrication
    description: |
      Contrôle en cours de fabrication, mesure et maîtrise statistique des procédés.
  BC-720.30.30:
    name: Inspection finale et libération
    description: |
      Inspection finale, libération des lots et délivrance des certificats.
  BC-720.30.40:
    name: Gestion de l'étalonnage
    description: |
      Étalonnage des équipements de mesure et d'essai.
  BC-720.40:
    name: Gestion des non-conformités
    description: |
      Fiches de non-conformité, dérogations et CAPA.
  BC-720.40.10:
    name: Signalement des non-conformités
    description: |
      Capture et classification des non-conformités et dérogations.
  BC-720.40.20:
    name: Disposition et confinement
    description: |
      Disposition des matières non conformes et actions de confinement.
  BC-720.40.30:
    name: Actions correctives et préventives
    description: |
      Processus CAPA incluant l'analyse des causes racines et les contrôles d'efficacité.
  BC-720.40.40:
    name: Maîtrise des modifications
    description: |
      Maîtrise des modifications ayant un impact sur la qualité.
  BC-720.50:
    name: Gestion de l'amélioration continue
    description: |
      Lean, Six Sigma, Kaizen et programmes d'amélioration.
  BC-720.50.10:
    name: Gestion des idées d'amélioration
    description: |
      Recueil, évaluation et priorisation des idées d'amélioration.
  BC-720.50.20:
    name: Livraison de projets Lean et Six Sigma
    description: |
      Méthodologie et livraison de projets Lean et Six Sigma.
  BC-720.50.30:
    name: Accompagnement à l'amélioration continue
    description: |
      Coaching et développement des compétences en méthodes d'amélioration continue.
  BC-720.50.40:
    name: Suivi de la réalisation des bénéfices
    description: |
      Suivi et vérification des bénéfices des projets d'amélioration continue.
  BC-720.60:
    name: Gestion de la qualité client
    description: |
      Réclamations clients liées à la qualité, retours et qualité terrain.
  BC-720.60.10:
    name: Traitement des réclamations qualité clients
    description: |
      Recueil, investigation et réponse aux réclamations qualité des clients.
  BC-720.60.20:
    name: Analyse des défaillances terrain
    description: |
      Analyse des défaillances terrain et des retours sous garantie.
  BC-720.60.30:
    name: Rappel produit et notification client
    description: |
      Coordination des rappels produits et des notifications aux clients.
  BC-720.60.40:
    name: Reporting qualité client
    description: |
      Reporting qualité et tableaux de bord à destination des clients.

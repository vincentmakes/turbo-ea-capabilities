locale: fr
source: L1-pipeline-operations-management.yaml
entries:
  BC-3060:
    name: Gestion des opérations de pipeline
    description: |
      Exploitation, intégrité et gestion commerciale des pipelines de collecte et de transport des hydrocarbures — dispatching depuis la salle de contrôle, inspection en ligne, détection des fuites, programmation et nominations, et administration des tarifs.
  BC-3060.10:
    name: Opérations de contrôle des pipelines
    description: |
      Dispatching depuis la salle de contrôle et exploitation SCADA des pipelines liquides et gaziers.
  BC-3060.10.10:
    name: Dispatching et contrôle des pipelines
    description: |
      Dispatching 24h/24 depuis la salle de contrôle des opérations de pipeline.
  BC-3060.10.20:
    name: Opérations SCADA
    description: |
      Exploitation des systèmes SCADA de pipeline et de la télémétrie de terrain.
  BC-3060.10.30:
    name: Modélisation hydraulique des pipelines
    description: |
      Modélisation hydraulique en temps réel et hors ligne des régimes d'écoulement dans les pipelines.
  BC-3060.10.40:
    name: Gestion du simulateur de formation des opérateurs
    description: |
      Maintenance des simulateurs de formation des contrôleurs de pipeline conformément aux exigences réglementaires.
  BC-3060.20:
    name: Gestion de l'intégrité des pipelines
    description: |
      Inspection en ligne, protection cathodique et évaluation des défauts pour l'assurance de l'intégrité des pipelines.
  BC-3060.20.10:
    name: Inspection en ligne
    description: |
      Campagnes d'inspection en ligne par racleurs intelligents pour l'intégrité des pipelines.
  BC-3060.20.20:
    name: Gestion de la protection cathodique
    description: |
      Conception, exploitation et contrôle de la protection cathodique des pipelines.
  BC-3060.20.30:
    name: Évaluation des défauts de pipeline
    description: |
      Évaluation critique en ingénierie des défauts de perte de métal et des défauts de type fissure.
  BC-3060.20.40:
    name: Patrouille de l'emprise
    description: |
      Patrouille aérienne et terrestre de l'emprise des pipelines.
  BC-3060.30:
    name: Détection des fuites et surveillance des pipelines
    description: |
      Systèmes de détection des fuites par modèle de calcul et systèmes externes, et surveillance des pipelines.
  BC-3060.30.10:
    name: Détection des fuites par modèle de calcul
    description: |
      Systèmes de détection des fuites en temps réel basés sur des modèles transitoires et statistiques.
  BC-3060.30.20:
    name: Détection externe des fuites
    description: |
      Détection des fuites par fibre optique, acoustique et capteurs de vapeur.
  BC-3060.30.30:
    name: Survols et marches de surveillance
    description: |
      Survols et marches de surveillance routiniers des couloirs de pipeline.
  BC-3060.40:
    name: Programmation et nominations des pipelines
    description: |
      Gestion des nominations de capacité, du séquencement des lots et du linefill pour les volumes transportés.
  BC-3060.40.10:
    name: Gestion des nominations de capacité
    description: |
      Réception, confirmation et programmation des nominations des expéditeurs.
  BC-3060.40.20:
    name: Séquencement des lots
    description: |
      Séquencement des lots multi-produits dans les pipelines liquides.
  BC-3060.40.30:
    name: Gestion du linefill
    description: |
      Gestion de la propriété du linefill et des stocks dans les pipelines.
  BC-3060.50:
    name: Gestion des tarifs de pipeline
    description: |
      Dépôt et administration des tarifs de pipeline réglementés et contractuels, facturation des expéditeurs et règlement des déséquilibres.
  BC-3060.50.10:
    name: Dépôt et maintenance des tarifs
    description: |
      Dépôt et maintenance des tarifs de pipeline auprès des régulateurs.
  BC-3060.50.20:
    name: Facturation des expéditeurs
    description: |
      Calcul et émission des factures de transport aux expéditeurs.
  BC-3060.50.30:
    name: Règlement des déséquilibres
    description: |
      Règlement des déséquilibres opérationnels entre les expéditeurs.
  BC-3060.60:
    name: Opérations de construction et de réparation de pipelines
    description: |
      Réparations en service, opérations de hot-tap et coordination du remplacement pour les pipelines de transport et de collecte.
  BC-3060.60.10:
    name: Coordination du remplacement de pipelines
    description: |
      Coordination du remplacement de tronçons de pipeline et des déviations de tracé.
  BC-3060.60.20:
    name: Opérations de réparation en service
    description: |
      Réparations par manchon composite, manchon et rechargement par soudure des pipelines en service.
  BC-3060.60.30:
    name: Opérations de hot-tap
    description: |
      Opérations de hot-tap et d'obturation pour les raccordements sur pipelines sous pression.

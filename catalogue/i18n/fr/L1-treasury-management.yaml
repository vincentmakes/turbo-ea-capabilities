locale: fr
source: L1-treasury-management.yaml
entries:
  BC-210:
    name: Gestion de la trésorerie
    description: |
      Gestion de la trésorerie, des liquidités, du financement et des expositions aux marchés financiers.
  BC-210.10:
    name: Gestion de la trésorerie courante
    description: |
      Positionnement, centralisation et financement interentreprises de la trésorerie.
  BC-210.10.10:
    name: Surveillance des positions de trésorerie
    description: |
      Surveillance quotidienne des positions de trésorerie par entité et par devise.
  BC-210.10.20:
    name: Opérations de centralisation de trésorerie
    description: |
      Centralisation notionnelle et physique de la trésorerie à l'échelle du groupe.
  BC-210.10.30:
    name: Financement interentreprises
    description: |
      Prêts interentreprises, banque interne et règlements interentreprises.
  BC-210.10.40:
    name: Gestion des placements à court terme
    description: |
      Activités de placement monétaire et de trésorerie à court terme.
  BC-210.20:
    name: Gestion des liquidités
    description: |
      Prévisions de liquidités, tests de résistance et plans de financement.
  BC-210.20.10:
    name: Prévisions des flux de trésorerie
    description: |
      Prévisions de flux de trésorerie à court, moyen et long terme.
  BC-210.20.20:
    name: Surveillance du risque de liquidité
    description: |
      Ratios de liquidité, coussins et indicateurs d'alerte précoce.
  BC-210.20.30:
    name: Tests de résistance sur les liquidités
    description: |
      Tests de résistance sur l'adéquation des liquidités dans des scénarios défavorables.
  BC-210.20.40:
    name: Planification du financement de secours
    description: |
      Plans de financement de secours et facilités de liquidité confirmées.
  BC-210.30:
    name: Gestion du financement et de la dette
    description: |
      Émission de dettes, gestion des facilités et clauses restrictives.
  BC-210.30.10:
    name: Émission de titres de dette
    description: |
      Émission d'obligations, de billets de trésorerie et de placements privés.
  BC-210.30.20:
    name: Gestion des prêts bancaires et des facilités de crédit
    description: |
      Négociation et administration des facilités de crédit et des prêts bilatéraux.
  BC-210.30.30:
    name: Service de la dette
    description: |
      Programmation et exécution des paiements d'intérêts, de principal et de commissions.
  BC-210.30.40:
    name: Gestion des clauses restrictives et de la notation
    description: |
      Surveillance des clauses restrictives et relations avec les agences de notation.
  BC-210.40:
    name: Gestion des changes
    description: |
      Exposition au change, couverture et règlement.
  BC-210.40.10:
    name: Identification des expositions au change
    description: |
      Identification et quantification des expositions au change par entité.
  BC-210.40.20:
    name: Exécution des couvertures de change
    description: |
      Exécution de contrats à terme, swaps et options de change.
  BC-210.40.30:
    name: Règlement et confirmation des opérations de change
    description: |
      Règlement, confirmation et rapprochement des opérations de change.
  BC-210.40.40:
    name: Gestion de l'exposition de conversion
    description: |
      Couverture des investissements nets et des expositions de conversion.
  BC-210.50:
    name: Gestion du risque de taux d'intérêt
    description: |
      Exposition aux taux d'intérêt et stratégies de couverture.
  BC-210.50.10:
    name: Mesure de l'exposition aux taux d'intérêt
    description: |
      Mesure de la sensibilité aux taux d'intérêt sur l'ensemble du bilan.
  BC-210.50.20:
    name: Couverture du risque de taux d'intérêt
    description: |
      Exécution de swaps de taux, caps et autres instruments dérivés.
  BC-210.50.30:
    name: Comptabilité de couverture
    description: |
      Désignation des couvertures, tests d'efficacité et comptabilisation selon IFRS 9.
  BC-210.60:
    name: Gestion des relations bancaires
    description: |
      Structure des comptes bancaires et gestion des partenaires bancaires.
  BC-210.60.10:
    name: Gestion du cycle de vie des comptes bancaires
    description: |
      Ouverture, modification et clôture des comptes bancaires.
  BC-210.60.20:
    name: Gestion des mandats et des signataires bancaires
    description: |
      Listes de signataires bancaires, mandats et modifications de pouvoirs.
  BC-210.60.30:
    name: Achats de services bancaires
    description: |
      Sélection et contractualisation des partenaires et services bancaires.
  BC-210.60.40:
    name: Gestion des frais et de la qualité de service bancaire
    description: |
      Surveillance des frais bancaires, de la qualité de service et des analyses associées.

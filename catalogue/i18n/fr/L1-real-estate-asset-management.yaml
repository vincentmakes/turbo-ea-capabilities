locale: fr
source: L1-real-estate-asset-management.yaml
entries:
  BC-4920:
    name: Gestion d'actifs immobiliers
    description: |
      Gestion côté propriétaire des actifs immobiliers en exploitation sur la durée
      de détention — exécution du plan d'affaires, suivi de la performance, priorisation
      des dépenses d'investissement, repositionnement, trajectoire de durabilité, risque
      d'actif et optimisation des charges foncières et dépenses d'exploitation. Fait le
      lien entre la vision investisseur (BC-4910) et les opérations immobilières sur le
      terrain (BC-4940).
    in_scope:
      - Plan d'affaires par actif et décisions de conservation/cession
      - Suivi de la performance financière, locative et opérationnelle de l'actif
      - Planification, priorisation et supervision de l'exécution du programme de dépenses d'investissement
      - Repositionnement, conversion et exécution de la création de valeur
      - Trajectoire de décarbonation et certification ESG au niveau de l'actif
      - Suivi des risques de l'actif (physiques, climatiques, de marché, de crédit locataire)
      - Contestations fiscales foncières, révision des dépenses d'exploitation et audit de refacturation des charges communes
    out_of_scope:
      - Construction du portefeuille fonds/investisseur (BC-4910)
      - Opérations immobilières quotidiennes et ordres de travaux (BC-4940)
      - Transactions d'acquisition ou de cession (BC-4930)
      - Abstraction des baux et escalade des loyers (BC-4950)
  BC-4920.10:
    name: Gestion du plan d'affaires de l'actif
    description: |
      Définition et actualisation des plans d'affaires par actif, alignés sur le mandat
      du fonds, l'horizon de détention et la thèse de création de valeur.
  BC-4920.10.10:
    name: Définition du plan d'affaires de l'actif
    description: |
      Définition des plans d'affaires par actif couvrant la thèse, les leviers de valeur
      et l'horizon de détention.
  BC-4920.10.20:
    name: Analyse de conservation / cession
    description: |
      Analyse des économies de conservation par rapport à la cession et recommandation
      au comité d'investissement.
  BC-4920.10.30:
    name: Actualisation annuelle du plan
    description: |
      Actualisation annuelle des plans d'affaires des actifs au regard des réalisations
      et des perspectives de marché révisées.
  BC-4920.20:
    name: Suivi de la performance de l'actif
    description: |
      Suivi de la performance financière, locative et opérationnelle au niveau de
      l'actif par rapport au plan d'affaires.
  BC-4920.20.10:
    name: Suivi de la performance financière de l'actif
    description: |
      Suivi du RNE/NOI, des flux de trésorerie et du rendement par rapport au budget
      et au plan d'affaires.
  BC-4920.20.20:
    name: Suivi de la performance locative et du taux d'occupation
    description: |
      Suivi de l'occupation, du taux loué, de la durée moyenne pondérée des baux
      et des loyers par rapport au marché.
  BC-4920.20.30:
    name: Suivi des indicateurs opérationnels clés
    description: |
      Suivi des KPI opérationnels couvrant la disponibilité, les réclamations,
      l'intensité énergétique et les fréquentations.
  BC-4920.20.40:
    name: Analyse des écarts et actualisation des prévisions
    description: |
      Analyse des écarts entre réalisations et plan et actualisation des prévisions
      et des hypothèses de sortie.
  BC-4920.30:
    name: Gestion du programme de dépenses d'investissement
    description: |
      Planification, priorisation et supervision de l'exécution des programmes de
      dépenses d'investissement par actif et par portefeuille.
  BC-4920.30.10:
    name: Planification du programme de dépenses d'investissement
    description: |
      Planification pluriannuelle du programme de dépenses d'investissement par actif
      et par portefeuille.
  BC-4920.30.20:
    name: Priorisation et approbation des dépenses d'investissement
    description: |
      Priorisation et approbation des projets d'investissement selon les critères
      de ROI et de risque.
  BC-4920.30.30:
    name: Supervision de l'exécution des dépenses d'investissement
    description: |
      Supervision de l'exécution des projets d'investissement incluant les tirages
      et la réalisation des jalons.
  BC-4920.30.40:
    name: Réconciliation de la performance des dépenses d'investissement
    description: |
      Réconciliation de la performance des investissements par rapport à la plus-value
      et à l'amélioration du RNE/NOI sous-crits.
  BC-4920.40:
    name: Gestion du repositionnement et de la création de valeur des actifs
    description: |
      Définition et exécution des stratégies de repositionnement, de conversion et
      de mix locataire modifiant le profil d'usage ou de revenus d'un actif.
  BC-4920.40.10:
    name: Définition de la stratégie de repositionnement
    description: |
      Définition de la stratégie de repositionnement incluant le marché cible et
      la proposition de valeur.
  BC-4920.40.20:
    name: Programmes de conversion et de reconversion
    description: |
      Programmes de conversion d'actifs entre usages (bureaux en logements,
      commerce en usage mixte).
  BC-4920.40.30:
    name: Stratégie de mix locataire et de merchandising
    description: |
      Définition et exécution de la stratégie de mix locataire et de merchandising
      pour les actifs commerciaux et à usage mixte.
  BC-4920.50:
    name: Gestion de la durabilité et de l'ESG au niveau de l'actif
    description: |
      Trajectoire de décarbonation, gestion de l'intensité énergétique, certifications
      et soumission GRESB au niveau de l'actif.
  BC-4920.50.10:
    name: Trajectoire de décarbonation de l'actif
    description: |
      Définition de la trajectoire de décarbonation de l'actif alignée sur les
      recommandations CRREM et SBTi pour les bâtiments.
  BC-4920.50.20:
    name: Gestion de l'intensité énergétique et hydraulique
    description: |
      Gestion de l'intensité énergétique et hydraulique de l'actif par rapport
      aux objectifs.
  BC-4920.50.30:
    name: Certification ESG de l'actif (LEED / BREEAM / WELL)
    description: |
      Obtention et maintien des certifications au niveau de l'actif incluant LEED,
      BREEAM, WELL et Fitwel.
  BC-4920.50.40:
    name: Soumission GRESB de l'actif
    description: |
      Préparation et soumission des données au niveau de l'actif pour l'évaluation GRESB.
  BC-4920.60:
    name: Gestion des risques de l'actif
    description: |
      Suivi au niveau de l'actif des risques physiques, climatiques, de marché et de
      crédit locataire, ainsi que de l'adéquation des couvertures d'assurance.
  BC-4920.60.10:
    name: Évaluation des risques physiques et climatiques
    description: |
      Évaluation des risques physiques et climatiques de l'actif incluant inondation,
      incendie de forêt et exposition à la chaleur.
  BC-4920.60.20:
    name: Suivi du risque de crédit des locataires
    description: |
      Suivi du risque de crédit des locataires et du risque d'encaissement des loyers
      par actif et par portefeuille.
  BC-4920.60.30:
    name: Suivi du risque de marché
    description: |
      Suivi des facteurs de risque de marché incluant les mouvements de taux de
      capitalisation, le pipeline d'offre et les tendances locatives.
  BC-4920.60.40:
    name: Révision de l'adéquation des assurances
    description: |
      Révision périodique de l'adéquation des assurances immobilières et de responsabilité
      civile au regard de la valeur et de l'exposition de l'actif.
  BC-4920.70:
    name: Optimisation des charges foncières et des dépenses d'exploitation
    description: |
      Gestion des évaluations fiscales foncières, des révisions de dépenses d'exploitation,
      des audits de refacturation des charges communes et de l'optimisation des tarifs
      énergétiques spécifiques aux actifs immobiliers.
  BC-4920.70.10:
    name: Évaluation et contestation des charges foncières
    description: |
      Révision et contestation des évaluations de charges foncières sur la base de
      références comparables.
  BC-4920.70.20:
    name: Révision des dépenses d'exploitation
    description: |
      Révision périodique des dépenses d'exploitation pour le benchmarking et les
      opportunités d'économies.
  BC-4920.70.30:
    name: Audit de refacturation des charges communes
    description: |
      Audit de la refacturation des charges communes et des charges de service aux
      locataires au regard des droits contractuels.
  BC-4920.70.40:
    name: Optimisation des tarifs énergétiques
    description: |
      Optimisation des achats d'énergie, des tarifs et des coûts de puissance souscrite
      à travers le portefeuille.

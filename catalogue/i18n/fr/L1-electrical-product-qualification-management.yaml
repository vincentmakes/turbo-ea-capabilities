locale: fr
source: L1-electrical-product-qualification-management.yaml
entries:
  BC-1920:
    name: Gestion de la qualification des produits électriques
    description: |
      Orchestration des essais de type sur des échantillons représentatifs — essais diélectriques,
      de court-circuit, EMC, climatiques, mécaniques et de durée de vie — incluant l'exploitation
      de laboratoires accrédités.
  BC-1920.10:
    name: Gestion des plans et spécifications d'essai
    description: |
      Rédaction et approbation des plans et spécifications d'essai dérivés des normes produit.
  BC-1920.10.10:
    name: Rédaction des spécifications d'essai
    description: |
      Rédaction des spécifications d'essai détaillées.
  BC-1920.10.20:
    name: Approbation des plans d'essai
    description: |
      Approbation des plans d'essai par les parties prenantes en ingénierie, qualité et certification.
  BC-1920.10.30:
    name: Allocation des échantillons d'essai
    description: |
      Allocation et gestion des échantillons d'essai représentatifs.
  BC-1920.10.40:
    name: Maintenance des procédures d'essai
    description: |
      Maintenance et révision des procédures d'essai standard.
  BC-1920.20:
    name: Essais diélectriques et haute tension
    description: |
      Essais d'isolation, de tenue diélectrique, de décharge partielle et d'impulsion.
  BC-1920.20.10:
    name: Essai de résistance d'isolement
    description: |
      Mesure de la résistance d'isolement dans des conditions spécifiées.
  BC-1920.20.20:
    name: Essai de tenue diélectrique
    description: |
      Essais de tenue diélectrique en courant alternatif et continu aux niveaux de contrainte nominaux.
  BC-1920.20.30:
    name: Mesure des décharges partielles
    description: |
      Mesure des décharges partielles dans les systèmes d'isolation.
  BC-1920.20.40:
    name: Essai de tenue aux chocs de tension
    description: |
      Essais de tenue aux chocs de foudre et de manœuvre.
  BC-1920.30:
    name: Essais de court-circuit et de commutation
    description: |
      Vérification des performances en court-circuit et en commutation dans des conditions de défaut nominales.
  BC-1920.30.10:
    name: Essai de pouvoir de fermeture en court-circuit
    description: |
      Vérification du pouvoir de fermeture sur des courts-circuits nominaux.
  BC-1920.30.20:
    name: Essai de pouvoir de coupure en court-circuit
    description: |
      Vérification du pouvoir de coupure aux niveaux de défaut nominaux.
  BC-1920.30.30:
    name: Essai d'endurance à la commutation
    description: |
      Endurance mécanique et électrique sous commutations répétitives.
  BC-1920.30.40:
    name: Essai de défaut d'arc
    description: |
      Essais de confinement des défauts d'arc et de performance vis-à-vis des flashs d'arc.
  BC-1920.40:
    name: Essais EMC et EMI
    description: |
      Essais d'émissions conduites et rayonnées et d'immunité.
  BC-1920.40.10:
    name: Essai d'émissions conduites
    description: |
      Mesure des émissions conduites sur les lignes d'alimentation et de signaux.
  BC-1920.40.20:
    name: Essai d'émissions rayonnées
    description: |
      Mesure des émissions électromagnétiques rayonnées.
  BC-1920.40.30:
    name: Essai d'immunité EMC
    description: |
      Vérification de l'immunité aux perturbations conduites et rayonnées.
  BC-1920.40.40:
    name: Essais d'immunité aux ESD et aux surtensions
    description: |
      Essais d'immunité aux décharges électrostatiques et aux surtensions.
  BC-1920.50:
    name: Essais environnementaux et climatiques
    description: |
      Essais climatiques, de corrosion, d'étanchéité et d'exposition des produits.
  BC-1920.50.10:
    name: Cycles de température et d'humidité
    description: |
      Cyclages de température et d'humidité et contraintes en régime stationnaire.
  BC-1920.50.20:
    name: Essais au brouillard salin et à la corrosion
    description: |
      Essais d'exposition au brouillard salin et aux atmosphères corrosives.
  BC-1920.50.30:
    name: Essais de protection contre les intrusions
    description: |
      Vérification de l'indice de protection contre la poussière et l'eau.
  BC-1920.50.40:
    name: Essais d'exposition solaire et UV
    description: |
      Essais d'exposition au rayonnement solaire et aux ultraviolets.
  BC-1920.60:
    name: Essais mécaniques et de vibrations
    description: |
      Essais de vibration, de choc, d'endurance mécanique et de qualification sismique.
  BC-1920.60.10:
    name: Essais de vibration et de choc
    description: |
      Essais de vibration sinusoïdale, aléatoire et de choc.
  BC-1920.60.20:
    name: Essai d'endurance mécanique
    description: |
      Endurance mécanique sous cycles de fonctionnement.
  BC-1920.60.30:
    name: Essais de chute et d'impact
    description: |
      Essais de chute, de chute libre et d'impact des produits et de leurs emballages.
  BC-1920.60.40:
    name: Essai de qualification sismique
    description: |
      Qualification sismique pour les équipements de production et de sous-stations électriques.
  BC-1920.70:
    name: Essais de durée de vie accélérée et de fiabilité
    description: |
      Essais de durée de vie accélérée, de dépistage sous contrainte et de démonstration de fiabilité.
  BC-1920.70.10:
    name: Essai de durée de vie hautement accélérée
    description: |
      HALT pour exposer les marges de conception par contraintes croissantes.
  BC-1920.70.20:
    name: Dépistage sous contrainte hautement accéléré
    description: |
      Dépistage HASS en production pour détecter les défauts latents.
  BC-1920.70.30:
    name: Essai de démonstration de fiabilité
    description: |
      Essais de démonstration par rapport aux objectifs de fiabilité.
  BC-1920.70.40:
    name: Essai de rodage
    description: |
      Rodage sous tension pour précipiter les défaillances de mortalité infantile.
  BC-1920.80:
    name: Gestion des opérations du laboratoire d'essai
    description: |
      Exploitation de laboratoires d'essai internes accrédités.
  BC-1920.80.10:
    name: Accréditation du laboratoire d'essai
    description: |
      Maintien du domaine d'accréditation ISO/IEC 17025.
  BC-1920.80.20:
    name: Étalonnage des équipements d'essai
    description: |
      Étalonnage et traçabilité des équipements d'essai.
  BC-1920.80.30:
    name: Gestion des enregistrements de données d'essai
    description: |
      Gestion à long terme des enregistrements des données et rapports d'essai.
  BC-1920.80.40:
    name: Comparaison interlaboratoires
    description: |
      Essais de compétence en mode circulaire entre laboratoires.

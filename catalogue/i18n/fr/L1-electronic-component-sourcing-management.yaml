locale: fr
source: L1-electronic-component-sourcing-management.yaml
entries:
  BC-1930:
    name: Gestion de l'approvisionnement en composants électroniques
    description: |
      Approvisionnement et gestion du cycle de vie des composants électroniques — listes de
      fournisseurs approuvés, gestion de l'obsolescence, allocation, prévention des contrefaçons,
      qualification et données sur les substances.
  BC-1930.10:
    name: Gestion de la liste des fournisseurs approuvés
    description: |
      Maintenance des sources de composants approuvées, des alternatives et des références croisées.
  BC-1930.10.10:
    name: Gestion de la liste des composants préférés
    description: |
      Maintenance des listes de composants préférés avec approbation de l'ingénierie.
  BC-1930.10.20:
    name: Qualification des sources alternatives
    description: |
      Qualification des sources alternatives de composants.
  BC-1930.10.30:
    name: Gestion des références croisées
    description: |
      Cartographie des composants équivalents entre fabricants.
  BC-1930.20:
    name: Gestion du cycle de vie et de l'obsolescence des composants
    description: |
      Suivi du statut du cycle de vie des composants et gestion des événements d'obsolescence.
  BC-1930.20.10:
    name: Triage des notifications de modification produit
    description: |
      Triage et évaluation de l'impact des notifications de modification produit fournisseur.
  BC-1930.20.20:
    name: Triage des avis de fin de vie
    description: |
      Triage des avis de fin de vie et impact sur les nomenclatures.
  BC-1930.20.30:
    name: Décision de dernier achat
    description: |
      Prise de décision sur les quantités de dernier achat et les stocks tampons.
  BC-1930.20.40:
    name: Prévision du cycle de vie des composants
    description: |
      Prévision des stades du cycle de vie des composants sur l'ensemble de la nomenclature.
  BC-1930.30:
    name: Gestion de l'allocation des semi-conducteurs
    description: |
      Gestion de l'allocation des semi-conducteurs en période de pénurie.
  BC-1930.30.10:
    name: Gestion des prévisions d'allocation
    description: |
      Prévision de la demande pour soutenir le positionnement en matière d'allocation fournisseur.
  BC-1930.30.20:
    name: Négociation de l'allocation fournisseur
    description: |
      Négociation de la part d'allocation avec les fournisseurs de semi-conducteurs.
  BC-1930.30.30:
    name: Priorisation de la demande allouée
    description: |
      Priorisation interne de l'approvisionnement alloué entre les lignes de produits.
  BC-1930.40:
    name: Prévention des composants contrefaits
    description: |
      Détection et prévention des composants électroniques contrefaits dans la chaîne d'approvisionnement.
  BC-1930.40.10:
    name: Évaluation du risque de contrefaçon
    description: |
      Évaluation du risque d'exposition à la contrefaçon dans les canaux d'approvisionnement.
  BC-1930.40.20:
    name: Authentification des composants entrants
    description: |
      Authentification et inspection des composants entrants.
  BC-1930.40.30:
    name: Traçabilité de la chaîne fournisseur
    description: |
      Traçabilité des composants jusqu'aux fabricants autorisés.
  BC-1930.50:
    name: Qualification des composants électroniques
    description: |
      Qualification des composants électroniques pour une utilisation en production.
  BC-1930.50.10:
    name: Inspection du premier article
    description: |
      Inspection du premier article des composants par rapport aux spécifications.
  BC-1930.50.20:
    name: Qualification de fiabilité des composants
    description: |
      Qualification de fiabilité des composants par rapport aux profils d'utilisation.
  BC-1930.50.30:
    name: Qualification AEC-Q automobile
    description: |
      Qualification des composants selon les profils de contrainte AEC-Q100 / AEC-Q200.
  BC-1930.50.40:
    name: Qualification JEDEC des semi-conducteurs
    description: |
      Qualification des semi-conducteurs selon les normes JEDEC.
  BC-1930.60:
    name: Gestion des distributeurs et courtiers
    description: |
      Gestion des canaux de distribution autorisés et de courtage.
  BC-1930.60.10:
    name: Intégration des distributeurs autorisés
    description: |
      Intégration des distributeurs autorisés de composants électroniques.
  BC-1930.60.20:
    name: Évaluation du risque des sources de courtage
    description: |
      Évaluation du risque lié à l'approvisionnement auprès de courtiers indépendants.
  BC-1930.60.30:
    name: Évaluation périodique des performances des distributeurs
    description: |
      Évaluation périodique des performances et de la conformité des distributeurs.
  BC-1930.70:
    name: Gestion des données de conformité des composants
    description: |
      Collecte et gestion des données sur les substances et la conformité des composants.
  BC-1930.70.10:
    name: Collecte des données sur les substances
    description: |
      Collecte des données de composition en substances auprès des fournisseurs de composants.
  BC-1930.70.20:
    name: Données sur les fondeurs de minerais de conflit
    description: |
      Collecte des données au niveau des fondeurs pour le devoir de diligence sur les minerais de conflit.
  BC-1930.70.30:
    name: Suivi REACH SVHC
    description: |
      Suivi des substances extrêmement préoccupantes au niveau des composants conformément à REACH.

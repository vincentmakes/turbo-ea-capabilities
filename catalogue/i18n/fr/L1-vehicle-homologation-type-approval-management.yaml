locale: fr
source: L1-vehicle-homologation-type-approval-management.yaml
entries:
  BC-3420:
    name: Gestion de l'homologation et de la réception par type des véhicules
    description: |
      Certification réglementaire des véhicules et composants majeurs sur l'ensemble des marchés — réception par type UNECE WP.29, auto-certification FMVSS, approbations régionales (CCC, KS, MLIT), homologation des émissions et de l'énergie, programmes de choc et d'évaluation consommateur, et audits de conformité de la production.
  BC-3420.10:
    name: Stratégie et planification de la réception par type
    description: |
      Stratégie d'homologation multi-marchés et planification incluant l'engagement avec les autorités d'approbation et l'exécution des plans d'homologation.
  BC-3420.10.10:
    name: Stratégie d'approbation marché
    description: |
      Stratégie de réception par type et de certification sur les marchés cibles et les régimes réglementaires.
  BC-3420.10.20:
    name: Gestion du plan d'homologation
    description: |
      Gestion des plans d'homologation au niveau programme, des livrables et des jalons.
  BC-3420.10.30:
    name: Engagement avec les autorités d'approbation
    description: |
      Engagement avec les autorités d'approbation et les services techniques dans chaque juridiction.
  BC-3420.20:
    name: Soumissions de réception par type véhicule
    description: |
      Préparation et soumission des dossiers de réception par type et d'auto-certification selon les régimes UNECE, FMVSS et régionaux.
  BC-3420.20.10:
    name: Gestion du dossier de réception par type UNECE
    description: |
      Préparation, soumission et maintien des dossiers de réception par type de véhicule complet UNECE WP.29.
  BC-3420.20.20:
    name: Gestion de l'auto-certification FMVSS
    description: |
      Gestion des preuves d'auto-certification FMVSS/49 CFR 571 aux États-Unis.
  BC-3420.20.30:
    name: Gestion des soumissions régionales
    description: |
      Gestion des soumissions pour les régimes d'approbation CCC, KS, MLIT, GCC et autres régimes régionaux.
  BC-3420.20.40:
    name: Gestion des modifications et extensions d'approbation
    description: |
      Gestion des modifications, extensions et révisions d'approbation sur l'ensemble du cycle de vie du véhicule.
  BC-3420.30:
    name: Homologation des émissions et de l'énergie
    description: |
      Homologation des émissions, de la consommation d'énergie et de l'autonomie des véhicules électriques selon les cycles WLTP, RDE, EPA, CARB, Chine et régimes équivalents.
  BC-3420.30.10:
    name: Exécution des cycles d'essais d'émissions
    description: |
      Exécution des cycles d'essais réglementaires d'émissions et de consommation de carburant WLTP, FTP-75, Chine et autres.
  BC-3420.30.20:
    name: Conformité aux émissions en conditions réelles de conduite
    description: |
      Campagnes d'essais d'émissions en conditions réelles de conduite et démonstration de conformité pour la conformité en service.
  BC-3420.30.30:
    name: Reporting CO2 et consommation de carburant
    description: |
      Reporting réglementaire du CO2 et de la consommation de carburant selon les règles UE sur les émissions de CO2 de la flotte, le CAFE et les équivalents.
  BC-3420.30.40:
    name: Homologation de l'autonomie et de l'efficacité des véhicules électriques
    description: |
      Homologation de l'autonomie, de la consommation d'énergie et des métriques de recharge des véhicules électriques sur l'ensemble des marchés.
  BC-3420.40:
    name: Homologation des chocs et de la sécurité des occupants
    description: |
      Homologation réglementaire des chocs, de la protection des occupants et des piétons, ainsi que des programmes d'évaluation consommateur.
  BC-3420.40.10:
    name: Gestion du programme d'essais de choc
    description: |
      Planification et exécution des campagnes d'essais de choc réglementaires et d'homologation.
  BC-3420.40.20:
    name: Approbation des systèmes de retenue
    description: |
      Approbation des ceintures de sécurité, airbags et ancrages de sièges enfants selon les régimes réglementaires.
  BC-3420.40.30:
    name: Approbation de la protection des piétons
    description: |
      Homologation de la protection des piétons et usagers vulnérables de la route selon le GTR 9 UNECE et équivalents.
  BC-3420.40.40:
    name: Gestion des programmes NCAP
    description: |
      Gestion des programmes d'évaluation des chocs consommateur incluant Euro NCAP, IIHS, NHTSA NCAP et les NCAP régionaux.
  BC-3420.50:
    name: Approbation fonctionnelle et cybersécurité
    description: |
      Activités de réception par type spécifiques à la cybersécurité UN R155, aux mises à jour logicielles UN R156 et à l'ALKS/ADS UN R157, en complément des activités d'ingénierie relevant de la gestion de l'ingénierie véhicule.
    in_scope:
      - Audits et réception par type du CSMS
      - Audits et réception par type du SUMS
      - Soumissions réglementaires ALKS/ADS
    out_of_scope:
      - Activités d'ingénierie de la cybersécurité (BC-3400.80)
      - Opérations du SOC véhicule (BC-3460.60)
  BC-3420.50.10:
    name: Gestion de la réception par type du CSMS
    description: |
      Réception par type du système de management de la cybersécurité selon UN R155, incluant la préparation aux audits et la surveillance.
  BC-3420.50.20:
    name: Gestion de la réception par type du SUMS
    description: |
      Réception par type du système de management des mises à jour logicielles selon UN R156, incluant la préparation aux audits et la surveillance.
  BC-3420.50.30:
    name: Gestion de l'approbation ALKS et ADS
    description: |
      Soumissions d'approbation pour les systèmes de maintien de voie automatisé et les systèmes de conduite automatisée plus larges selon UN R157 et les réglementations émergentes.
  BC-3420.60:
    name: Réception par type des composants et systèmes
    description: |
      Réceptions par type au niveau composant pour des systèmes tels que l'éclairage, la compatibilité électromagnétique, les pneumatiques et le freinage, nécessaires à l'appui de la réception par type du véhicule complet.
  BC-3420.60.10:
    name: Approbation de l'éclairage et de la signalisation
    description: |
      Approbation des phares, dispositifs de signalisation et systèmes d'éclairage adaptatifs.
  BC-3420.60.20:
    name: Approbation CEM
    description: |
      Approbation de la compatibilité électromagnétique pour le véhicule et les sous-ensembles électroniques selon UN R10.
  BC-3420.60.30:
    name: Approbation des pneumatiques et roues
    description: |
      Approbation et étiquetage des pneumatiques et roues selon les régimes UNECE et régionaux.
  BC-3420.60.40:
    name: Approbation des composants de freinage et de direction
    description: |
      Approbation des composants de freinage et de direction selon UN R13/R13H, R79 et équivalents.
  BC-3420.70:
    name: Gestion de la conformité de la production
    description: |
      Audits de conformité de la production et vérification continue d'échantillons de production par rapport aux spécifications approuvées.
  BC-3420.70.10:
    name: Gestion des audits de conformité de la production
    description: |
      Gestion des audits de conformité de la production par les autorités d'approbation et les services techniques.
  BC-3420.70.20:
    name: Vérification des échantillons de production
    description: |
      Vérification des échantillons de production par rapport aux spécifications et tolérances homologuées.
  BC-3420.70.30:
    name: Surveillance de la conformité en service
    description: |
      Essais et surveillance de la conformité en service pour confirmer le maintien de la conformité après le lancement.

locale: fr
source: L1-public-safety-emergency-operations-management.yaml
entries:
  BC-3310:
    name: Gestion des opérations de sécurité publique et d'urgence
    description: |
      Opérations de sécurité publique et d'urgence incluant les communications d'urgence
      et la répartition, les interventions de terrain de la police, des pompiers et du SAMU,
      le commandement des incidents selon NIMS, la préparation aux catastrophes et la relèvement,
      les enquêtes de sécurité publique et la coordination de l'entraide.
  BC-3310.10:
    name: Communications d'urgence et répartition
    description: |
      Réception des appels d'urgence, répartition assistée par ordinateur et communications
      de terrain pour les intervenants de la police, des pompiers et du SAMU.
    in_scope:
      - Traitement des appels 911/112/999
      - Répartition assistée par ordinateur
      - Opérations radio de sécurité publique
    out_of_scope:
      - Régimes d'obligation de service universel des télécommunications (couverts par la gestion de la conformité réglementaire des télécommunications)
  BC-3310.10.10:
    name: Traitement des appels d'urgence
    description: |
      Réception et triage des appels d'urgence et des messages de texte vers le numéro d'urgence.
  BC-3310.10.20:
    name: Répartition assistée par ordinateur
    description: |
      Répartition par RAO des unités de police, de pompiers et du SAMU vers les incidents.
  BC-3310.10.30:
    name: Opérations radio de sécurité publique
    description: |
      Exploitation des réseaux radio mobiles terrestres de sécurité publique et du haut débit équivalent à FirstNet.
  BC-3310.10.40:
    name: Alertes et avertissements au public
    description: |
      Émission d'alertes publiques par WEA, Cell Broadcast, EAS, sirènes et autres canaux.
  BC-3310.20:
    name: Opérations d'intervention de terrain
    description: |
      Opérations quotidiennes de terrain des premiers intervenants de la police, des pompiers et du SAMU.
  BC-3310.20.10:
    name: Patrouille des forces de l'ordre
    description: |
      Patrouille routinière et proactive et intervention des forces de l'ordre.
  BC-3310.20.20:
    name: Lutte contre l'incendie et sauvetage
    description: |
      Opérations de lutte contre l'incendie, de sauvetage et d'intervention en cas de matières dangereuses.
  BC-3310.20.30:
    name: Intervention des services médicaux d'urgence
    description: |
      Évaluation médicale d'urgence préhospitalière, traitement et transport.
  BC-3310.20.40:
    name: Intervention tactique spécialisée
    description: |
      Opérations d'intervention tactique spécialisée, de désobusage et de matières dangereuses.
  BC-3310.30:
    name: Commandement et coordination des incidents
    description: |
      Commandement des incidents aligné sur NIMS/ICS, coordination multi-agences et
      opérations des centres des opérations d'urgence.
  BC-3310.30.10:
    name: Établissement du commandement des incidents
    description: |
      Établissement du commandement des incidents, du commandement unifié et des structures ICS.
  BC-3310.30.20:
    name: Coordination multi-agences
    description: |
      Coordination entre les agences intervenantes et les juridictions pendant les incidents.
  BC-3310.30.30:
    name: Opérations des centres des opérations d'urgence
    description: |
      Exploitation des COE aux niveaux local, régional et national pendant les urgences.
  BC-3310.30.40:
    name: Maintenance de la représentation opérationnelle commune
    description: |
      Maintenance d'une représentation opérationnelle commune partagée entre les agences.
  BC-3310.40:
    name: Préparation et atténuation des catastrophes
    description: |
      Analyse des risques, planification, exercices, formation et activités d'atténuation
      pour se préparer aux catastrophes dans le cadre du Cadre de Sendai.
  BC-3310.40.10:
    name: Analyse des aléas et des risques
    description: |
      Identification et évaluation des aléas naturels et d'origine humaine et des risques associés.
  BC-3310.40.20:
    name: Planification des situations d'urgence
    description: |
      Préparation des plans d'opérations d'urgence, des plans spécifiques aux aléas
      et des dispositifs de continuité.
  BC-3310.40.30:
    name: Exercices et formation
    description: |
      Exercices sur table, fonctionnels et à grande échelle, et programmes de formation des intervenants.
  BC-3310.40.40:
    name: Administration des programmes d'atténuation
    description: |
      Administration des programmes d'atténuation des catastrophes structurels et non structurels.
  BC-3310.50:
    name: Réponse aux catastrophes et relèvement
    description: |
      Déclaration de catastrophe, opérations de réponse, aide individuelle et publique,
      et coordination du relèvement à long terme.
  BC-3310.50.10:
    name: Déclaration de catastrophe et activation
    description: |
      Déclaration des états d'urgence et activation des autorités de réponse.
  BC-3310.50.20:
    name: Administration de l'aide individuelle
    description: |
      Administration de l'aide en cas de catastrophe aux personnes et ménages affectés.
  BC-3310.50.30:
    name: Administration de l'aide publique
    description: |
      Administration des subventions d'aide publique pour le déblaiement, les infrastructures et les travaux d'urgence.
  BC-3310.50.40:
    name: Coordination du relèvement à long terme
    description: |
      Coordination des activités de relèvement à long terme et de reconstruction améliorée.
  BC-3310.60:
    name: Enquêtes de sécurité publique
    description: |
      Enquêtes criminelles et de sécurité publique incluant la gestion des preuves,
      le renseignement et la préparation des dossiers.
  BC-3310.60.10:
    name: Investigation de scène de crime
    description: |
      Examen de la scène de crime et collecte des preuves médico-légales.
  BC-3310.60.20:
    name: Gestion des dossiers d'enquête
    description: |
      Gestion des dossiers d'enquête, suivi des suspects et préparation des dossiers pour les poursuites.
  BC-3310.60.30:
    name: Opérations de renseignement policier
    description: |
      Collecte, analyse et diffusion du renseignement policier dans le cadre du policing fondé sur le renseignement.
  BC-3310.60.40:
    name: Gestion des pièces à conviction et des biens
    description: |
      Conservation, chaîne de custody et disposition des pièces à conviction et biens saisis.
  BC-3310.70:
    name: Gestion des ressources d'urgence et de l'entraide
    description: |
      Typage des ressources d'urgence, déploiement et accords d'entraide entre juridictions.
  BC-3310.70.10:
    name: Typage et inventaire des ressources
    description: |
      Typage et inventaire des ressources d'urgence selon NIMS.
  BC-3310.70.20:
    name: Administration des accords d'entraide
    description: |
      Administration des accords d'entraide intra- et inter-juridictionnels.
  BC-3310.70.30:
    name: Déploiement et démobilisation des ressources
    description: |
      Déploiement, suivi et démobilisation des ressources d'urgence sur les incidents.

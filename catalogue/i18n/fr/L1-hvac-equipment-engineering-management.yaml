locale: fr
source: L1-hvac-equipment-engineering-management.yaml
entries:
  BC-2000:
    name: Gestion de l'ingénierie des équipements HVAC
    description: |
      Ingénierie mécanique, frigorifique et thermofluide des équipements HVAC — refroidisseurs,
      pompes à chaleur, centrales de traitement d'air, unités de toiture, VRF, ventilo-convecteurs,
      terminaux — jusqu'à la vérification des performances et à la préparation aux essais de notation AHRI/Eurovent.
    in_scope:
      - Conception du cycle frigorifique et du cycle pompe à chaleur
      - Ingénierie des échangeurs de chaleur et des serpentins
      - Ingénierie des équipements de déplacement d'air et hydroniques
      - Ingénierie des compresseurs, variateurs et régulation embarquée
      - Vérification acoustique, vibratoire et des performances au niveau équipement
    out_of_scope:
      - Sélection et intégration de systèmes au niveau projet (BC-2020)
      - Ingénierie des produits contrôleurs GTB (BC-2010)
      - Soumissions de certification de type et licence de marque (BC-2030)
      - Comptabilité opérationnelle des fluides frigorigènes (BC-2040)
  BC-2000.10:
    name: Ingénierie du cycle frigorifique
    description: |
      Ingénierie des cycles à compression de vapeur, à absorption et à pompe à chaleur pour les équipements HVAC.
  BC-2000.10.10:
    name: Conception du cycle à compression de vapeur
    description: |
      Conception des cycles frigorifiques à compression de vapeur pour les équipements de refroidissement et de chauffage.
  BC-2000.10.20:
    name: Conception du cycle à absorption
    description: |
      Conception des refroidisseurs et pompes à chaleur à cycle à absorption.
  BC-2000.10.30:
    name: Conception du cycle pompe à chaleur
    description: |
      Conception des cycles réversibles de pompe à chaleur pour les variantes à source d'air, d'eau et de sol.
  BC-2000.10.40:
    name: Ingénierie de sélection des fluides frigorigènes
    description: |
      Sélection des fluides frigorigènes en fonction des objectifs thermodynamiques, réglementaires, GWP et d'inflammabilité.
  BC-2000.10.50:
    name: Optimisation des performances du cycle
    description: |
      Optimisation des performances du cycle sur les points de notation et en conditions de charge partielle.
  BC-2000.20:
    name: Ingénierie du transfert thermique et des serpentins
    description: |
      Ingénierie des évaporateurs, condenseurs, roues de récupération et échangeurs brasés/à tubes et calandre utilisés dans les équipements HVAC.
  BC-2000.20.10:
    name: Conception du serpentin évaporateur
    description: |
      Conception des serpentins évaporateurs à tubes ailettés et à microcanaux.
  BC-2000.20.20:
    name: Conception du serpentin condenseur
    description: |
      Conception des serpentins condenseurs refroidis par air et par eau.
  BC-2000.20.30:
    name: Conception de la récupération de chaleur air-air
    description: |
      Conception des roues de récupération d'énergie, échangeurs à plaques et boucles à runaround.
  BC-2000.20.40:
    name: Conception de plaques brasées et de tubes et calandre
    description: |
      Conception des échangeurs à plaques brasées et à tubes et calandre pour les services hydroniques et frigorigènes.
  BC-2000.20.50:
    name: Ingénierie des matériaux et revêtements des serpentins
    description: |
      Sélection de la métallurgie des serpentins et des revêtements protecteurs pour la durabilité environnementale.
  BC-2000.30:
    name: Ingénierie des équipements de déplacement d'air
    description: |
      Ingénierie des ventilateurs, soufflantes, centrales de traitement d'air, volets et ensembles de filtration.
  BC-2000.30.10:
    name: Conception des ventilateurs centrifuges
    description: |
      Conception aérodynamique et mécanique des ventilateurs centrifuges.
  BC-2000.30.20:
    name: Conception des ventilateurs axiaux et à carter
    description: |
      Conception aérodynamique et mécanique des ventilateurs axiaux et à carter.
  BC-2000.30.30:
    name: Ingénierie des centrales de traitement d'air
    description: |
      Ingénierie des sections modulaires des centrales de traitement d'air, des carrosseries et des flux d'air.
  BC-2000.30.40:
    name: Ingénierie des volets et des grilles
    description: |
      Ingénierie des volets de régulation, coupe-feu/fumée et des grilles météo.
  BC-2000.30.50:
    name: Ingénierie des systèmes de filtration
    description: |
      Ingénierie des sections de filtration particulaire, en phase gazeuse et HEPA.
  BC-2000.40:
    name: Ingénierie des systèmes hydroniques et fluidiques
    description: |
      Ingénierie des pompes, tuyauteries, boucles hydroniques et accessoires intégrés dans les équipements HVAC.
  BC-2000.40.10:
    name: Ingénierie des pompes
    description: |
      Sélection et intégration des pompes de circulation et à aspiration en bout dans les ensembles équipements.
  BC-2000.40.20:
    name: Conception des tuyauteries et collecteurs
    description: |
      Conception des tuyauteries internes, collecteurs et rampes dans les équipements emballés.
  BC-2000.40.30:
    name: Ingénierie des boucles eau glacée et eau chaude
    description: |
      Ingénierie des boucles intégrées d'eau glacée et d'eau chaude au niveau équipement.
  BC-2000.40.40:
    name: Ingénierie des accessoires hydroniques
    description: |
      Ingénierie des vases d'expansion, dégazeurs et filtres comme accessoires emballés.
  BC-2000.50:
    name: Ingénierie des compresseurs et variateurs
    description: |
      Ingénierie des familles de compresseurs et des variateurs qui les alimentent.
  BC-2000.50.10:
    name: Ingénierie des compresseurs scroll
    description: |
      Ingénierie des compresseurs scroll utilisés dans les équipements tertiaires légers.
  BC-2000.50.20:
    name: Ingénierie des compresseurs à vis
    description: |
      Ingénierie des compresseurs à vis utilisés dans les refroidisseurs commerciaux et industriels.
  BC-2000.50.30:
    name: Ingénierie des compresseurs centrifuges
    description: |
      Ingénierie des compresseurs centrifuges utilisés dans les refroidisseurs de grande puissance.
  BC-2000.50.40:
    name: Ingénierie des compresseurs alternatifs
    description: |
      Ingénierie des compresseurs alternatifs utilisés dans les pompes à chaleur et la réfrigération.
  BC-2000.50.50:
    name: Intégration des variateurs de vitesse
    description: |
      Intégration des variateurs de vitesse avec les compresseurs et ventilateurs HVAC.
  BC-2000.60:
    name: Ingénierie acoustique et vibratoire des équipements HVAC
    description: |
      Ingénierie acoustique, vibratoire et du bruit au niveau équipement.
  BC-2000.60.10:
    name: Modélisation de la puissance acoustique
    description: |
      Modélisation de la puissance acoustique et de la pression acoustique des équipements HVAC.
  BC-2000.60.20:
    name: Conception de l'isolation vibratoire
    description: |
      Conception de l'isolation vibratoire pour les compresseurs, ventilateurs et pompes.
  BC-2000.60.30:
    name: Ingénierie des caissons acoustiques
    description: |
      Ingénierie des caissons acoustiques et atténuateurs intégrés aux équipements.
  BC-2000.60.40:
    name: Réglage des performances psychoacoustiques
    description: |
      Réglage de la qualité sonore perçue au-delà des métriques globales de puissance acoustique.
  BC-2000.70:
    name: Ingénierie des régulations et de l'embarqué des équipements
    description: |
      Ingénierie des contrôleurs embarqués, du firmware et des piles de connectivité résidant dans les équipements HVAC.
  BC-2000.70.10:
    name: Ingénierie des contrôleurs embarqués
    description: |
      Ingénierie des contrôleurs résidant dans les équipements et des contrôleurs d'unité.
  BC-2000.70.20:
    name: Ingénierie du firmware des équipements
    description: |
      Développement du firmware pour les équipements HVAC, incluant les contrôleurs d'unité et variateurs.
  BC-2000.70.30:
    name: Ingénierie de la communication des équipements intelligents
    description: |
      Ingénierie de la communication GTB côté équipement, incluant BACnet et Modbus.
  BC-2000.70.40:
    name: Ingénierie de la logique de diagnostic des équipements
    description: |
      Ingénierie de la logique de diagnostic, d'alarme et de codes défaut embarquée dans les équipements.
  BC-2000.80:
    name: Vérification et essais des équipements HVAC
    description: |
      Vérification des performances au niveau équipement, exécution des essais de notation AHRI/Eurovent et essais de durabilité.
  BC-2000.80.10:
    name: Essais en chambre psychrométrique
    description: |
      Essais des équipements HVAC en chambre psychrométrique dans des conditions contrôlées.
  BC-2000.80.20:
    name: Exécution des essais de notation de performance
    description: |
      Exécution des essais de notation de performance standardisés sur les équipements HVAC.
  BC-2000.80.30:
    name: Vérification des performances thermiques
    description: |
      Vérification de la capacité, du COP, de l'IPLV et des autres indicateurs de performance thermique.
  BC-2000.80.40:
    name: Essais d'endurance et de fiabilité
    description: |
      Essais d'endurance, de durée de vie accélérée et de fiabilité des équipements HVAC.
  BC-2000.80.50:
    name: Rédaction des plans d'essai des équipements
    description: |
      Rédaction des plans de vérification et de qualification au niveau équipement.

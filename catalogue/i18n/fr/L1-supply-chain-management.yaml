locale: fr
source: L1-supply-chain-management.yaml
entries:
  BC-520:
    name: Gestion de la chaîne d'approvisionnement
    description: |
      Planification, orchestration et exécution de la chaîne d'approvisionnement de bout en bout.
  BC-520.10:
    name: Gestion de la planification de la demande
    description: |
      Prévisions de la demande, planification statistique et consensuelle.
  BC-520.10.10:
    name: Prévisions statistiques de la demande
    description: |
      Prévisions de la demande fondées sur des méthodes statistiques et l'apprentissage automatique.
  BC-520.10.20:
    name: Planification consensuelle de la demande
    description: |
      Consensus interfonctionnel sur la demande, incluant les ajustements commerciaux.
  BC-520.10.30:
    name: Planification de la demande pour les nouveaux produits
    description: |
      Planification de la demande pour les introductions et les abandons de nouveaux produits.
  BC-520.10.40:
    name: Détection et modulation de la demande
    description: |
      Détection à court terme de la demande et initiatives de modulation de la demande.
  BC-520.20:
    name: Gestion de la planification de l'offre
    description: |
      Planification du réseau d'approvisionnement et équilibrage des sources.
  BC-520.20.10:
    name: Planification du réseau d'approvisionnement
    description: |
      Planification multi-échelon du réseau d'approvisionnement entre les usines et les centres de distribution.
  BC-520.20.20:
    name: Génération du plan de production
    description: |
      Établissement des programmes directeurs de production pour l'ensemble des sites d'approvisionnement.
  BC-520.20.30:
    name: Allocation de l'offre
    description: |
      Allocation de l'offre contrainte entre les régions et les clients.
  BC-520.20.40:
    name: Équilibrage des sources
    description: |
      Équilibrage entre plusieurs sources d'approvisionnement et double sourcing.
  BC-520.30:
    name: Gestion des ventes et opérations
    description: |
      S&OP / IBP, alignement interfonctionnel.
  BC-520.30.10:
    name: Gestion du cycle S&OP
    description: |
      Orchestration du cycle S&OP/IBP mensuel et cadence des réunions.
  BC-520.30.20:
    name: Revue de la demande
    description: |
      Revue interfonctionnelle du plan de demande non contraint.
  BC-520.30.30:
    name: Revue de l'offre
    description: |
      Revue de la faisabilité et des contraintes d'approvisionnement dans le cycle S&OP.
  BC-520.30.40:
    name: Réconciliation intégrée et S&OP exécutif
    description: |
      Réconciliation intégrée et réunions de décision exécutives.
  BC-520.40:
    name: Gestion de l'exécution des commandes
    description: |
      Promesse de commande, allocation et orchestration de l'exécution.
  BC-520.40.10:
    name: Promesse de commande et disponibilité à la vente
    description: |
      Promesse de commande ATP/CTP fondée sur l'offre et la capacité disponibles.
  BC-520.40.20:
    name: Orchestration des commandes
    description: |
      Orchestration de l'exécution des commandes entre les nœuds et les canaux.
  BC-520.40.30:
    name: Suivi et visibilité des commandes
    description: |
      Visibilité de bout en bout sur le statut des commandes et les expéditions.
  BC-520.40.40:
    name: Retours et exécution inverse
    description: |
      Autorisation de retour, logistique inverse et routage vers la remise en état.
  BC-520.50:
    name: Gestion des opérations logistiques
    description: |
      Transport et opérations d'entreposage dans la chaîne d'approvisionnement.
  BC-520.50.10:
    name: Planification du transport
    description: |
      Sélection du mode de transport, routage et planification des chargements.
  BC-520.50.20:
    name: Gestion des transporteurs
    description: |
      Sélection des transporteurs, contrats et suivi des performances.
  BC-520.50.30:
    name: Opérations d'entrepôt
    description: |
      Opérations de réception, rangement, prélèvement, emballage et expédition.
  BC-520.50.40:
    name: Opérations transfrontalières et douanières
    description: |
      Mouvements transfrontaliers, dédouanement et conformité commerciale.
  BC-520.50.50:
    name: Opérations de livraison du dernier kilomètre
    description: |
      Routage de livraison du dernier kilomètre, gestion des créneaux et preuve de livraison.
  BC-520.60:
    name: Gestion des risques de la chaîne d'approvisionnement
    description: |
      Perturbations, visibilité et résilience de la chaîne d'approvisionnement.
  BC-520.60.10:
    name: Visibilité de bout en bout de la chaîne d'approvisionnement
    description: |
      Visibilité multi-niveaux sur les fournisseurs, les stocks et les expéditions.
  BC-520.60.20:
    name: Détection des perturbations et réponse
    description: |
      Détection des perturbations et actions de réponse orchestrées.
  BC-520.60.30:
    name: Conception de la résilience de la chaîne d'approvisionnement
    description: |
      Conception du réseau pour la résilience, incluant le double sourcing et les stocks tampons.
  BC-520.60.40:
    name: Conformité de la chaîne d'approvisionnement
    description: |
      Conformité avec les obligations de diligence raisonnable et les réglementations commerciales.

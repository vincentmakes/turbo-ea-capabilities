locale: fr
source: L1-livestock-production-management.yaml
entries:
  BC-3510:
    name: Gestion de la production animale
    description: |
      Production de bétail terrestre en exploitation — planification du cheptel et du troupeau, sélection génétique, nutrition, santé animale, bien-être, mise-bas, enregistrement de la croissance et préparation à l'abattage pour les bovins, ovins, porcins et volailles.
  BC-3510.10:
    name: Planification du cheptel et du troupeau
    description: |
      Planification des effectifs, des remplacements et des cycles de production dans les élevages.
  BC-3510.10.10:
    name: Planification du taux de chargement
    description: |
      Décisions de taux de chargement adaptées à la disponibilité fourragère et à la capacité de charge.
  BC-3510.10.20:
    name: Planification des animaux de renouvellement
    description: |
      Planification du taux de renouvellement du cheptel reproducteur et des poulettes pondeuses.
  BC-3510.10.30:
    name: Planification des cycles de production
    description: |
      Planification calendaire des cycles de production incluant la mise-bas en lots et le vêlage saisonnier.
  BC-3510.20:
    name: Gestion de la sélection animale
    description: |
      Sélection génétique, accouplement, insémination, enregistrement des pedigrees et suivi des performances de reproduction.
    in_scope:
      - Décisions de sélection génétique et des caractères
      - Saillie naturelle et insémination artificielle
      - Enregistrement des pedigrees et des filiations
      - Évaluation des valeurs d'élevage
  BC-3510.20.10:
    name: Décisions de sélection génétique
    description: |
      Sélection des reproducteurs selon les valeurs d'élevage estimées et les objectifs de caractères.
  BC-3510.20.20:
    name: Opérations de saillie et d'insémination
    description: |
      Opérations de saillie naturelle, d'insémination artificielle et de transfert d'embryons.
  BC-3510.20.30:
    name: Enregistrement des pedigrees et des filiations
    description: |
      Enregistrement des pedigrees, des filiations et des inscriptions au herd-book.
  BC-3510.20.40:
    name: Évaluation des performances de reproduction
    description: |
      Évaluation des performances de reproduction et mise à jour des valeurs d'élevage.
  BC-3510.30:
    name: Gestion de la nutrition animale
    description: |
      Formulation des rations, distribution des aliments, pâturage et suivi de l'indice de consommation dans toutes les catégories d'animaux.
  BC-3510.30.10:
    name: Formulation des rations
    description: |
      Formulation de rations au moindre coût selon les besoins de l'espèce et du stade de production.
  BC-3510.30.20:
    name: Distribution et livraison des aliments
    description: |
      Distribution quotidienne des aliments, mélange et livraison aux parcs, bâtiments et pâturages.
  BC-3510.30.30:
    name: Gestion du pâturage
    description: |
      Gestion du pâturage en rotation et en continu, et suivi des résidus de pâturage.
  BC-3510.30.40:
    name: Suivi de l'indice de consommation
    description: |
      Suivi de l'indice de consommation et des métriques de croissance moyenne quotidienne.
  BC-3510.40:
    name: Gestion de la santé animale
    description: |
      Traitements vétérinaires, vaccination, contrôle des parasites, surveillance des maladies et gestion des délais d'attente.
    in_scope:
      - Enregistrements des traitements vétérinaires
      - Programmes de vaccination et de contrôle des parasites
      - Surveillance des maladies à déclaration obligatoire
      - Suivi des délais d'attente des médicaments
    out_of_scope:
      - Audits de bien-être animal (BC-3510.50)
      - Surveillance des résidus LMR (BC-3590.50)
  BC-3510.40.10:
    name: Enregistrements des traitements vétérinaires
    description: |
      Enregistrement des traitements vétérinaires, des prescriptions et des résultats.
  BC-3510.40.20:
    name: Exécution des programmes de vaccination
    description: |
      Exécution des programmes de vaccination du cheptel et des troupeaux.
  BC-3510.40.30:
    name: Programmes de contrôle des parasites
    description: |
      Programmes de contrôle des parasites internes et externes et gestion de la résistance.
  BC-3510.40.40:
    name: Surveillance et déclaration des maladies
    description: |
      Surveillance et déclaration légale des maladies à déclaration obligatoire et zoonotiques.
  BC-3510.40.50:
    name: Gestion des délais d'attente
    description: |
      Suivi des délais d'attente pour les médicaments vétérinaires et les additifs alimentaires.
  BC-3510.50:
    name: Gestion du bien-être animal
    description: |
      Pratiques quotidiennes de bien-être couvrant le logement, la manipulation et la surveillance du bien-être selon les normes d'assurance.
  BC-3510.50.10:
    name: Conditions de logement et de densité
    description: |
      Gestion du logement, de la ventilation et de la densité d'occupation pour les catégories d'animaux.
  BC-3510.50.20:
    name: Normes de manipulation
    description: |
      Normes de manipulation à faible stress et de soins aux animaux.
  BC-3510.50.30:
    name: Surveillance des indicateurs de bien-être
    description: |
      Mesure des indicateurs de bien-être et revues de bien-être en exploitation.
  BC-3510.60:
    name: Opérations de reproduction et de mise-bas
    description: |
      Opérations de détection des chaleurs, de mise-bas et de soins aux nouveau-nés chez les bovins, ovins, porcins et volailles.
  BC-3510.60.10:
    name: Opérations de détection des chaleurs
    description: |
      Détection des chaleurs par observation, capteurs et programmes de synchronisation.
  BC-3510.60.20:
    name: Opérations de mise-bas
    description: |
      Opérations de vêlage, agnelage, mise-bas porcine et éclosion, et assistance associée.
  BC-3510.60.30:
    name: Opérations de soins aux nouveau-nés
    description: |
      Nutrition néonatale, gestion du colostrum et soins en début de vie.
  BC-3510.70:
    name: Enregistrement de la croissance et des performances
    description: |
      Enregistrement des performances de croissance, de production laitière, de production d'œufs et de carcasse pour les décisions de production et de sélection.
  BC-3510.70.10:
    name: Enregistrement du gain de poids
    description: |
      Pesées périodiques et enregistrement du gain moyen quotidien.
  BC-3510.70.20:
    name: Enregistrement de la production laitière
    description: |
      Enregistrement de la production laitière et de la composition par vache et en cuve de collecte.
  BC-3510.70.30:
    name: Enregistrement de la production d'œufs
    description: |
      Enregistrement quotidien de la production d'œufs par bâtiment et par troupeau.
  BC-3510.70.40:
    name: Suivi des performances de carcasse
    description: |
      Suivi du rendement carcasse, de la classification et des performances en découpe.
  BC-3510.80:
    name: Préparation à l'abattage et expédition
    description: |
      Sélection des animaux finis et coordination de l'expédition vers les abattoirs, incluant la documentation des mouvements.
  BC-3510.80.10:
    name: Sélection en pré-abattage
    description: |
      Sélection des animaux finis selon les spécifications de poids, d'engraissement et de contrat.
  BC-3510.80.20:
    name: Documentation des mouvements d'animaux
    description: |
      Documentation des mouvements et transferts d'information sur la chaîne alimentaire.
  BC-3510.80.30:
    name: Coordination de l'expédition vers l'abattoir
    description: |
      Coordination de l'expédition et du transport de l'exploitation vers l'abattoir.

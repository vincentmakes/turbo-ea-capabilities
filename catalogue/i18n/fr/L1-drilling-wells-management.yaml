locale: fr
source: L1-drilling-wells-management.yaml
entries:
  BC-3020:
    name: Gestion du forage et des puits
    description: |
      Ingénierie, exécution et intégrité tout au long de la vie des puits — de la conception et des opérations de forage aux complétion, interventions, opérations de workover et contrôle de puits.
  BC-3020.10:
    name: Ingénierie et conception des puits
    description: |
      Conception de l'architecture de puits, du tubage, de la colonne de production, des fluides de forage et des estimations de coûts pour les programmes de forage.
  BC-3020.10.10:
    name: Conception de l'architecture de puits
    description: |
      Conception de la trajectoire, des sections et de l'architecture générale du puits.
  BC-3020.10.20:
    name: Conception du tubage et de la colonne de production
    description: |
      Conception des colonnes de tubage, de liner et de production incluant les vérifications de contrainte et d'écrasement-éclatement.
  BC-3020.10.30:
    name: Conception des fluides de forage
    description: |
      Sélection du système de boue et conception rhéologique pour les sections de forage.
  BC-3020.10.40:
    name: Estimation des coûts de puits
    description: |
      Estimation des coûts pour autorisation d'engagements pour les programmes de forage et de complétion.
  BC-3020.20:
    name: Gestion des opérations de forage
    description: |
      Exécution des opérations de forage incluant la coordination des appareils de forage, la surveillance en temps réel, le forage directionnel et la cimentation.
    in_scope:
      - Supervision du forage sur appareil
      - Surveillance en temps réel des données de forage
      - Forage directionnel et à pression gérée
      - Opérations de cimentation et de descente de tubage
    out_of_scope:
      - Installation de la complétion de puits (BC-3020.30)
      - Sécurité des procédés sur les installations de forage (BC-3050)
  BC-3020.20.10:
    name: Coordination des opérations sur appareil
    description: |
      Coordination quotidienne des opérations sur l'appareil de forage et des activités des sous-traitants.
  BC-3020.20.20:
    name: Surveillance en temps réel des opérations de forage
    description: |
      Surveillance en temps réel des données de forage depuis les centres de support opérationnel.
  BC-3020.20.30:
    name: Exécution du forage directionnel
    description: |
      Exécution du forage directionnel, horizontal et à grand déport.
  BC-3020.20.40:
    name: Opérations des fluides de forage
    description: |
      Ingénierie des boues, traitement et contrôle des solides durant le forage.
  BC-3020.20.50:
    name: Opérations de cimentation
    description: |
      Opérations de cimentation primaire et de remédiation.
  BC-3020.30:
    name: Gestion des complétion de puits
    description: |
      Conception et installation des complétion incluant les opérations de perforation et de stimulation.
  BC-3020.30.10:
    name: Conception de la complétion
    description: |
      Conception des complétion haute et basse incluant le contrôle du sable si applicable.
  BC-3020.30.20:
    name: Installation de la complétion
    description: |
      Descente et installation des colonnes de complétion et des accessoires.
  BC-3020.30.30:
    name: Opérations de perforation
    description: |
      Sélection du canon de perforation et exécution pour établir les voies d'écoulement.
  BC-3020.30.40:
    name: Opérations de stimulation
    description: |
      Fracturation hydraulique, acidification et autres traitements de stimulation.
  BC-3020.40:
    name: Gestion des interventions et workovers de puits
    description: |
      Interventions sur puits tout au long de la vie du champ, des opérations de câblage aux workovers complets.
  BC-3020.40.10:
    name: Opérations de coiled tubing
    description: |
      Opérations d'intervention par coiled tubing.
  BC-3020.40.20:
    name: Opérations de câblage et slickline
    description: |
      Acquisition de données et opérations d'intervention par câblage et slickline.
  BC-3020.40.30:
    name: Opérations de workover
    description: |
      Opérations de workover majeur sur les puits producteurs et injecteurs.
  BC-3020.40.40:
    name: Interventions à travers la colonne de production
    description: |
      Interventions de remédiation et de stimulation à travers la colonne de production.
  BC-3020.50:
    name: Gestion de l'intégrité des puits
    description: |
      Vérification et surveillance des barrières de puits tout au long de la vie du puits, incluant la gestion des pressions annulaires et des pressions annulaires soutenues.
  BC-3020.50.10:
    name: Vérification des barrières de puits
    description: |
      Vérification des barrières primaires et secondaires de puits selon les normes d'intégrité.
  BC-3020.50.20:
    name: Surveillance des pressions annulaires
    description: |
      Surveillance continue et périodique des pressions annulaires des puits.
  BC-3020.50.30:
    name: Évaluation du risque d'intégrité des puits
    description: |
      Évaluation du risque d'intégrité des puits sur l'ensemble du portefeuille.
  BC-3020.50.40:
    name: Gestion des pressions annulaires soutenues
    description: |
      Diagnostic et gestion des événements de pression annulaire soutenue.
  BC-3020.60:
    name: Gestion du contrôle de puits
    description: |
      Prévention et réponse aux événements de contrôle de puits incluant la détection des venues, les opérations des obturateurs de puits et la compétence en contrôle de puits.
  BC-3020.60.10:
    name: Détection et réponse aux venues
    description: |
      Méthodes de détection des venues et procédures de réponse au contrôle de puits.
  BC-3020.60.20:
    name: Opérations des obturateurs de puits
    description: |
      Exploitation, tests fonctionnels et maintenance des chapeaux d'obturateurs de puits.
  BC-3020.60.30:
    name: Assurance des compétences en contrôle de puits
    description: |
      Coordination des programmes de compétence IWCF et IADC WellCAP.
  BC-3020.70:
    name: Gestion des prestataires de forage
    description: |
      Assurance, gestion des performances et supervision contractuelle des sous-traitants d'appareils de forage et de services de forage.
  BC-3020.70.10:
    name: Assurance et audit des appareils de forage
    description: |
      Audit de pré-acceptation et en service des appareils de forage et des sous-traitants.
  BC-3020.70.20:
    name: Gestion des performances des sous-traitants de forage
    description: |
      Gestion des performances par rapport aux contrats d'appareil et aux KPI de service.
  BC-3020.70.30:
    name: Gestion des contrats de services de forage
    description: |
      Gestion des contrats de services de forage (boues, cimentation, directionnel, etc.).

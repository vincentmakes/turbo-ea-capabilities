locale: fr
source: L1-banking-product-management.yaml
entries:
  BC-1310:
    name: Gestion des produits bancaires
    description: |
      Fabrique de produits bancaires — catalogue, paramétrage, tarification et cycle de vie.
  BC-1310.10:
    name: Gestion du catalogue de produits
    description: |
      Catalogue de produits bancaires et référentiel produits.
  BC-1310.10.10:
    name: Gestion des données de référence produits
    description: |
      Maintenance des données de référence produits et des hiérarchies de produits.
  BC-1310.10.20:
    name: Publication du catalogue de produits
    description: |
      Publication du catalogue de produits sur les canaux et auprès des partenaires.
  BC-1310.10.30:
    name: Gestion de la documentation produit
    description: |
      Production et maintenance des documents d'information sur les produits.
  BC-1310.20:
    name: Gestion des paramètres et de la configuration des produits
    description: |
      Taux, frais, plafonds, règles d'éligibilité et paramètres produits.
  BC-1310.20.10:
    name: Configuration des taux des produits
    description: |
      Configuration des taux d'intérêt et des grilles de taux.
  BC-1310.20.20:
    name: Configuration des frais des produits
    description: |
      Configuration des frais et des exonérations de frais des produits.
  BC-1310.20.30:
    name: Configuration des plafonds des produits
    description: |
      Configuration des plafonds de transactions et de produits.
  BC-1310.20.40:
    name: Configuration des règles d'éligibilité aux produits
    description: |
      Configuration des règles d'éligibilité et de qualification.
  BC-1310.30:
    name: Gestion de la tarification des produits bancaires
    description: |
      Tarification des produits, promotions et tarification personnalisée.
  BC-1310.30.10:
    name: Tarification standard des produits
    description: |
      Tarification standard des produits et services bancaires.
  BC-1310.30.20:
    name: Tarification promotionnelle
    description: |
      Campagnes de tarification promotionnelle et offres à durée limitée.
  BC-1310.30.30:
    name: Tarification personnalisée et relationnelle
    description: |
      Tarification spécifique au client et fondée sur la relation commerciale.
  BC-1310.40:
    name: Gestion des offres groupées de produits
    description: |
      Offres groupées, packages et tarification relationnelle.
  BC-1310.40.10:
    name: Définition des offres groupées
    description: |
      Définition des offres groupées de produits, packages et règles associées.
  BC-1310.40.20:
    name: Gestion de l'éligibilité aux offres groupées
    description: |
      Règles d'éligibilité et critères de qualification aux offres groupées.
  BC-1310.40.30:
    name: Suivi des performances des offres groupées
    description: |
      Suivi du taux de souscription et de la rentabilité des offres groupées.
  BC-1310.50:
    name: Gestion du cycle de vie des produits bancaires
    description: |
      Lancement de nouveaux produits, retrait et fin de vie.
  BC-1310.50.10:
    name: Approbation des nouveaux produits
    description: |
      Processus d'approbation des nouveaux produits et gouvernance du comité produits.
  BC-1310.50.20:
    name: Mise en marché des produits
    description: |
      Exécution du lancement produit et préparation des canaux de distribution.
  BC-1310.50.30:
    name: Revue des performances des produits
    description: |
      Revues périodiques des performances des produits et de leur rapport qualité-prix.
  BC-1310.50.40:
    name: Retrait des produits et migration des clients
    description: |
      Retrait des produits et migration des clients vers les produits successeurs.

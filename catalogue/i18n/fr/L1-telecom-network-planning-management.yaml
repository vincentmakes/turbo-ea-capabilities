locale: fr
source: L1-telecom-network-planning-management.yaml
entries:
  BC-2610:
    name: Gestion de la planification réseau télécom
    description: |
      Conception et dimensionnement à long terme des réseaux fixes, mobiles et
      IP — prévision de la demande, planification de la couverture et de la
      capacité, définition de l'évolution technologique, planification du
      déploiement des sites et coordination de la fin de vie des réseaux
      hérités.
  BC-2610.10:
    name: Prévision de la demande réseau
    description: |
      Prévision à long terme des abonnés, du trafic et de la demande de services
      pour orienter les décisions de couverture et de capacité.
  BC-2610.10.10:
    name: Prévision de la croissance des abonnés
    description: |
      Prévision de la population d'abonnés par segment, technologie et zone
      géographique.
  BC-2610.10.20:
    name: Prévision de la demande de trafic
    description: |
      Prévision des volumes de trafic voix, données, vidéo et signalisation
      par domaine et cellule.
  BC-2610.10.30:
    name: Modélisation de la demande de services
    description: |
      Modélisation de la demande pour les services nouveaux et en évolution afin
      d'ancrer les feuilles de route de capacité et de fonctionnalités.
  BC-2610.20:
    name: Planification de la couverture réseau
    description: |
      Planification des objectifs de couverture géographique et de résilience
      pour les réseaux radio, fibre et transport.
  BC-2610.20.10:
    name: Planification de la couverture radio
    description: |
      Définition des objectifs de couverture radio et modélisation de la
      propagation par bande et technologie.
  BC-2610.20.20:
    name: Planification de la couverture fibre
    description: |
      Planification de l'empreinte fibre, des foyers couverts et du placement
      des nœuds d'accès.
  BC-2610.20.30:
    name: Planification de la redondance et de la résilience
    description: |
      Conception de la diversité des routes, de la redondance géographique et
      des objectifs de résilience.
  BC-2610.30:
    name: Planification de la capacité réseau
    description: |
      Dimensionnement de la capacité sur les domaines d'accès radio, cœur et
      transport pour répondre à la demande prévisionnelle dans les limites de
      performance.
  BC-2610.30.10:
    name: Planification de la capacité de l'accès radio
    description: |
      Dimensionnement de la capacité des cellules, secteurs et porteuses du
      réseau d'accès radio.
  BC-2610.30.20:
    name: Planification de la capacité du cœur
    description: |
      Dimensionnement de la capacité des fonctions du cœur de réseau mobile et
      fixe et des magasins de données abonnés.
  BC-2610.30.30:
    name: Planification de la capacité du transport
    description: |
      Dimensionnement de la capacité du fronthaul, backhaul, métro et transport
      d'agrégation.
  BC-2610.30.40:
    name: Planification de la capacité du backbone IP
    description: |
      Dimensionnement de la capacité du backbone IP, des liens de peering et
      de transit.
  BC-2610.40:
    name: Planification de l'évolution technologique du réseau
    description: |
      Définition de la feuille de route technologique réseau pluriannuelle et
      de l'évolution de l'architecture.
  BC-2610.40.10:
    name: Définition de la feuille de route technologique
    description: |
      Définition de la feuille de route d'évolution pluriannuelle sur les
      technologies radio, transport et cœur.
  BC-2610.40.20:
    name: Évolution de l'architecture réseau
    description: |
      Transformation architecturale vers les architectures de référence cibles
      telles que le cœur cloud-native et l'Open RAN.
  BC-2610.40.30:
    name: Sélection des technologies fournisseurs
    description: |
      Évaluation et sélection des technologies fournisseurs pour les nouveaux
      domaines réseau et les cycles de renouvellement.
  BC-2610.50:
    name: Planification des sites réseau
    description: |
      Identification, reconnaissance, approbation et planification du déploiement
      de nouveaux sites réseau.
  BC-2610.50.10:
    name: Identification des sites
    description: |
      Identification des sites candidats selon les critères de couverture, de
      capacité et de backhaul.
  BC-2610.50.20:
    name: Reconnaissance radiofréquence des sites
    description: |
      Reconnaissance des sites candidats pour les performances RF, la faisabilité
      structurelle et les interférences.
  BC-2610.50.30:
    name: Coordination des approbations de construction
    description: |
      Coordination des approbations internes, des permis d'urbanisme et du
      zonage pour les nouveaux sites.
  BC-2610.50.40:
    name: Planification du déploiement
    description: |
      Planification et séquencement des constructions de sites selon les
      engagements de CAPEX, fournisseurs et couverture.
  BC-2610.60:
    name: Planification de la fin de vie du réseau
    description: |
      Planification de la mise hors service des réseaux hérités, de la migration
      des clients et du déclassement des actifs.
  BC-2610.60.10:
    name: Planification du déclassement des réseaux hérités
    description: |
      Planification du déclassement ordonné des éléments et actifs des réseaux
      hérités.
  BC-2610.60.20:
    name: Planification de la migration des clients
    description: |
      Planification de la migration des clients quittant les technologies en
      extinction vers les plateformes cibles.
  BC-2610.60.30:
    name: Planification de l'extinction technologique
    description: |
      Définition des jalons d'extinction technologique, des notifications
      réglementaires et des événements d'arrêt définitif.

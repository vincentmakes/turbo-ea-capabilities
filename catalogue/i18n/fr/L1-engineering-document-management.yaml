locale: fr
source: L1-engineering-document-management.yaml
entries:
  BC-1130:
    name: Gestion des documents d'ingénierie
    description: |
      Documents d'ingénierie contrôlés, plans, spécifications et données fournisseurs.
  BC-1130.10:
    name: Gestion du contrôle documentaire
    description: |
      Numérotation des documents, contrôle des révisions et registre maître des documents.
  BC-1130.10.10:
    name: Numérotation et codification des documents
    description: |
      Schémas de numérotation, taxonomie et codification des documents.
  BC-1130.10.20:
    name: Contrôle des révisions
    description: |
      Suivi des révisions, statuts et historique des versions.
  BC-1130.10.30:
    name: Registre maître des documents
    description: |
      Tenue du registre maître des documents et de leurs statuts.
  BC-1130.20:
    name: Gestion des plans
    description: |
      Cycle de vie des plans, diffusion et approbations.
  BC-1130.20.10:
    name: Flux de production des plans
    description: |
      Flux de production des plans avec vérification, revue et émission.
  BC-1130.20.20:
    name: Approbation et émission des plans
    description: |
      Approbation et émission des plans vers le chantier et les parties prenantes.
  BC-1130.20.30:
    name: Suivi du cycle de vie des plans
    description: |
      Suivi du cycle de vie des plans, du stade préliminaire aux plans de recollement.
  BC-1130.30:
    name: Gestion des spécifications
    description: |
      Spécifications techniques, fiches de données et conformité aux normes.
  BC-1130.30.10:
    name: Rédaction des spécifications techniques
    description: |
      Rédaction des spécifications techniques et des fiches de données.
  BC-1130.30.20:
    name: Bibliothèque des normes d'ingénierie
    description: |
      Tenue de la bibliothèque des normes d'ingénierie et des références.
  BC-1130.30.30:
    name: Approbation et émission des spécifications
    description: |
      Approbation et émission des spécifications vers les achats.
  BC-1130.40:
    name: Gestion des documents fournisseurs
    description: |
      Exigences en données fournisseurs, soumissions, revues et dispositions.
  BC-1130.40.10:
    name: Définition des exigences en données fournisseurs
    description: |
      Définition des listes d'exigences en données fournisseurs pour les commandes d'achat.
  BC-1130.40.20:
    name: Suivi des soumissions de documents fournisseurs
    description: |
      Suivi des soumissions de documents fournisseurs et de leur statut.
  BC-1130.40.30:
    name: Revue et disposition des documents fournisseurs
    description: |
      Revue et disposition des documents fournisseurs (codes 1/2/3).
  BC-1130.50:
    name: Gestion de la diffusion et des transmissions de documents
    description: |
      Transmettals, correspondance officielle et suivi des destinataires.
  BC-1130.50.10:
    name: Émission des transmettals
    description: |
      Émission formelle des transmettals de documents.
  BC-1130.50.20:
    name: Gestion des matrices de diffusion
    description: |
      Matrices de diffusion et définition des destinataires.
  BC-1130.50.30:
    name: Suivi des accusés de réception
    description: |
      Accusés de réception et piste d'audit des reçus.
  BC-1130.60:
    name: Gestion de la documentation de recollement
    description: |
      Annotations terrain, consolidation des plans de recollement et dossiers de remise en exploitation.
  BC-1130.60.10:
    name: Saisie des annotations terrain
    description: |
      Saisie des annotations terrain lors de la construction.
  BC-1130.60.20:
    name: Consolidation des plans de recollement
    description: |
      Consolidation des annotations terrain en livrables de recollement.
  BC-1130.60.30:
    name: Compilation du dossier de remise en exploitation
    description: |
      Compilation des dossiers de remise en exploitation pour les opérations et la maintenance.

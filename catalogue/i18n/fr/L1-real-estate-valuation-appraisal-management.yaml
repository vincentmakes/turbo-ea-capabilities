locale: fr
source: L1-real-estate-valuation-appraisal-management.yaml
entries:
  BC-4970:
    name: Gestion de l'évaluation et de l'expertise immobilières
    description: |
      Discipline d'expertise et d'évaluation immobilière pour les actifs et portefeuilles —
      réception des missions, inspection du bien étudié, curation des données comparables,
      application des approches par comparaison des ventes, revenus et coût, rédaction et
      validation des rapports, réévaluation périodique des portefeuilles à la valeur de
      marché, et assurance qualité conformes à l'USPAP, au Red Book RICS et aux IVS.
    in_scope:
      - Réception des missions, cadrage, vérification des conflits d'intérêts et lettres de mission
      - Inspection du bien et mesures conformes aux IPMS
      - Curation des transactions comparables et benchmarks de rendement
      - Approches par comparaison des ventes, capitalisation du revenu, DCF et coût
      - Rédaction et validation des rapports conformes au Red Book / USPAP
      - Réévaluation périodique des portefeuilles à la valeur de marché et revalorisation des sûretés prêteur
      - Contrôle qualité interne par sondage, révision par les pairs et réponse aux audits
    out_of_scope:
      - Souscription des acquisitions par les mandants (BC-4930)
      - Calcul de la ANR/NAV au niveau du fonds (BC-4910)
      - Contestations des évaluations fiscales foncières (BC-4920)
      - Avis de valeur courtier en tant que produit de courtage (BC-4960)
  BC-4970.10:
    name: Gestion des missions d'évaluation
    description: |
      Réception, cadrage, vérification des conflits d'intérêts et lettres de mission
      pour les mandats d'évaluation entrants des clients et prêteurs.
  BC-4970.10.10:
    name: Réception et cadrage des missions
    description: |
      Réception des missions d'évaluation et définition du périmètre et de l'objet
      de l'évaluation.
  BC-4970.10.20:
    name: Vérification des conflits et de l'indépendance
    description: |
      Vérification des conflits d'intérêts et de l'indépendance de l'évaluateur sur
      les nouvelles missions.
  BC-4970.10.30:
    name: Définition et émission des honoraires et lettres de mission
    description: |
      Définition et émission des honoraires et des lettres de mission aux clients.
  BC-4970.20:
    name: Inspection du bien étudié et capture des données
    description: |
      Visites d'inspection, mesures conformes aux IPMS et capture des données d'état
      et de défauts sur les biens étudiés.
  BC-4970.20.10:
    name: Opérations d'inspection du bien
    description: |
      Inspection du bien étudié par des évaluateurs qualifiés.
  BC-4970.20.20:
    name: Mesure du bâtiment (IPMS)
    description: |
      Mesure des bâtiments et des surfaces louées conformément aux IPMS et aux normes
      de mesure locales.
  BC-4970.20.30:
    name: Capture de l'état et des défauts
    description: |
      Capture de l'état du bâtiment et des défauts observés lors de l'inspection.
  BC-4970.30:
    name: Curation des données de marché et des comparables
    description: |
      Sourcing et curation des transactions comparables, des indices de marché et
      des benchmarks de rendement étayant les conclusions de l'évaluation.
  BC-4970.30.10:
    name: Capture des transactions comparables
    description: |
      Capture des transactions comparables issues des sources de marché et des bases
      de données internes.
  BC-4970.30.20:
    name: Indices de marché et benchmarks de rendement
    description: |
      Maintenance des indices de marché et des benchmarks de rendement par secteur
      et géographie.
  BC-4970.30.30:
    name: Gestion des ajustements des comparables
    description: |
      Gestion des ajustements des comparables pour les différences de date, de
      localisation, d'état et de qualité.
  BC-4970.40:
    name: Application des approches d'évaluation
    description: |
      Application des approches d'évaluation reconnues — comparaison des ventes,
      capitalisation du revenu, DCF et coût — au bien étudié.
  BC-4970.40.10:
    name: Approche par comparaison des ventes
    description: |
      Application de l'approche par comparaison des ventes à partir des preuves de
      transactions comparables.
  BC-4970.40.20:
    name: Approche par capitalisation du revenu
    description: |
      Application de l'approche par capitalisation du revenu à partir du RNE/NOI et
      des références de rendement.
  BC-4970.40.30:
    name: Approche par actualisation des flux futurs (DCF)
    description: |
      Application de l'approche par actualisation des flux futurs (DCF) pour les biens
      de rapport avec des prévisions pluriannuelles.
  BC-4970.40.40:
    name: Approche par le coût
    description: |
      Application de l'approche par le coût à partir du coût de remplacement et de
      l'analyse des dépréciations.
  BC-4970.50:
    name: Rédaction et validation des rapports d'évaluation
    description: |
      Rédaction, révision interne et validation des rapports d'évaluation conformes
      aux normes USPAP, Red Book et IVS.
  BC-4970.50.10:
    name: Rédaction du rapport d'évaluation
    description: |
      Rédaction des rapports d'évaluation selon le périmètre et l'objet de la mission.
  BC-4970.50.20:
    name: Validation du réviseur et contrôle qualité
    description: |
      Validation par le réviseur et contrôle qualité des rapports d'évaluation avant
      émission.
  BC-4970.50.30:
    name: Émission des rapports et gestion des réémissions
    description: |
      Émission des rapports d'évaluation et gestion des réémissions et addendums.
  BC-4970.60:
    name: Réévaluation périodique des portefeuilles et évaluation d'indices
    description: |
      Réévaluation récurrente des portefeuilles pour les fonds et prêteurs et
      soumission des données de valorisation aux indices et benchmarks.
  BC-4970.60.10:
    name: Réévaluation périodique des portefeuilles
    description: |
      Réévaluation périodique des portefeuilles de fonds et de propriétaires selon
      le cycle contractuel.
  BC-4970.60.20:
    name: Réévaluation des sûretés prêteur
    description: |
      Réévaluation des sûretés prêteur incluant les déclencheurs de covenants et de
      tests de résistance.
  BC-4970.60.30:
    name: Reporting aux indices et benchmarks
    description: |
      Reporting des données de valorisation à NCREIF, MSCI et autres indices de
      performance.
  BC-4970.70:
    name: Assurance qualité et audit des évaluations
    description: |
      Contrôle qualité interne par sondage, révision par les pairs et réponse aux
      audits des clients et régulateurs sur les évaluations émises.
  BC-4970.70.10:
    name: Contrôle qualité interne par sondage
    description: |
      Sondage des évaluations émises pour la révision du contrôle qualité interne.
  BC-4970.70.20:
    name: Opérations de révision par les pairs
    description: |
      Mise en œuvre de la révision par les pairs pour les évaluations complexes ou
      de haute valeur.
  BC-4970.70.30:
    name: Réponse aux audits réglementaires et clients
    description: |
      Réponse aux demandes d'audit des régulateurs et des clients sur les évaluations
      émises.

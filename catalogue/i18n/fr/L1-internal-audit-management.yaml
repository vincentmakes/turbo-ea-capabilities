locale: fr
source: L1-internal-audit-management.yaml
entries:
  BC-140:
    name: Gestion de l'audit interne
    description: |
      Assurance indépendante sur l'efficacité de la gouvernance, des risques et des contrôles.
  BC-140.10:
    name: Gestion de la planification de l'audit
    description: |
      Planification de l'audit fondée sur les risques et gestion de l'univers d'audit.
  BC-140.10.10:
    name: Gestion de l'univers d'audit
    description: |
      Définition et maintenance de l'univers auditable et des cotations de risque associées.
  BC-140.10.20:
    name: Élaboration du plan annuel fondé sur les risques
    description: |
      Plan d'audit annuel priorisé par les risques et allocation des ressources.
  BC-140.10.30:
    name: Délimitation du périmètre des missions d'audit
    description: |
      Objectifs, périmètre, critères et programme de chaque mission d'audit.
  BC-140.20:
    name: Gestion de l'exécution des audits
    description: |
      Travaux de terrain, collecte de preuves et établissement des rapports d'audit.
  BC-140.20.10:
    name: Travaux de terrain d'audit
    description: |
      Revues de procédures, tests de contrôles et collecte de preuves.
  BC-140.20.20:
    name: Gestion des dossiers de travail d'audit
    description: |
      Documentation des preuves, des conclusions et de la revue hiérarchique.
  BC-140.20.30:
    name: Établissement des rapports d'audit
    description: |
      Rédaction, validation et émission des rapports et avis d'audit.
  BC-140.20.40:
    name: Audit continu et analytique
    description: |
      Utilisation de l'analytique et de la surveillance continue dans les missions d'audit.
  BC-140.30:
    name: Gestion des constats et de la remédiation d'audit
    description: |
      Suivi des constats, actions de la direction et vérification de clôture.
  BC-140.30.10:
    name: Capture et notation des constats
    description: |
      Enregistrement et notation standardisés des constats d'audit.
  BC-140.30.20:
    name: Suivi des actions de la direction
    description: |
      Suivi des actions convenues avec la direction jusqu'à leur clôture.
  BC-140.30.30:
    name: Validation de la remédiation
    description: |
      Validation indépendante de l'efficacité des actions de remédiation.
  BC-140.40:
    name: Assurance qualité de l'audit
    description: |
      Contrôle qualité de la méthodologie et de l'exécution des audits.
  BC-140.40.10:
    name: Gestion de la méthodologie d'audit
    description: |
      Maintenance de la méthodologie d'audit alignée sur les normes IIA.
  BC-140.40.20:
    name: Revues qualité internes
    description: |
      Revues qualité internes périodiques des missions d'audit.
  BC-140.40.30:
    name: Évaluation qualité externe
    description: |
      Évaluations qualité externes et conformité aux normes professionnelles.

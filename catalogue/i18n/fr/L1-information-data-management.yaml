locale: fr
source: L1-information-data-management.yaml
entries:
  BC-610:
    name: Gestion de l'information et des données
    description: |
      Gouvernance des données, données de référence, qualité des données, analytique et IA.
  BC-610.10:
    name: Gestion de la gouvernance des données
    description: |
      Propriété des données, intendance, politiques et standards.
  BC-610.10.10:
    name: Propriété et intendance des données
    description: |
      Attribution et exercice des rôles de propriétaire et d'intendant des données.
  BC-610.10.20:
    name: Politiques et standards des données
    description: |
      Définition des politiques, standards et cadres de référence des données.
  BC-610.10.30:
    name: Catalogage et traçabilité des données
    description: |
      Catalogue de données, glossaire et traçabilité des données de bout en bout.
  BC-610.10.40:
    name: Confidentialité et classification des données
    description: |
      Classification des données et mise en œuvre des contrôles de confidentialité.
  BC-610.10.50:
    name: Suivi des risques et de la conformité des données
    description: |
      Surveillance du risque lié aux données et de la conformité réglementaire (ex. BCBS 239, GDPR).
  BC-610.20:
    name: Gestion des données de référence
    description: |
      MDM pour les clients, produits, fournisseurs, employés, etc.
  BC-610.20.10:
    name: Données de référence client
    description: |
      Maîtrise et gouvernance des données de référence client.
  BC-610.20.20:
    name: Données de référence produit
    description: |
      Maîtrise et gouvernance des données de référence produit et matières.
  BC-610.20.30:
    name: Données de référence fournisseur
    description: |
      Maîtrise et gouvernance des données de référence fournisseur.
  BC-610.20.40:
    name: Données de référence employé
    description: |
      Maîtrise et gouvernance des données de référence employé.
  BC-610.20.50:
    name: Gestion des données de référence communes
    description: |
      Jeux de données de référence, listes de codes et hiérarchies.
  BC-610.30:
    name: Gestion de la qualité des données
    description: |
      Supervision, profilage et remédiation de la qualité des données.
  BC-610.30.10:
    name: Profilage de la qualité des données
    description: |
      Profilage, établissement de la ligne de base et évaluation de la qualité des données.
  BC-610.30.20:
    name: Gestion des règles de qualité des données
    description: |
      Définition, déploiement et surveillance des règles de qualité des données.
  BC-610.30.30:
    name: Résolution des problèmes de qualité des données
    description: |
      Triage, remédiation et analyse des causes racines des problèmes de qualité des données.
  BC-610.30.40:
    name: Rapport sur la qualité des données
    description: |
      Tableaux de bord de qualité des données et reporting aux propriétaires et à la direction.
  BC-610.40:
    name: Gestion de l'architecture des données
    description: |
      Architecture logique et physique des données.
  BC-610.40.10:
    name: Modélisation conceptuelle et logique des données
    description: |
      Modèles de données conceptuels et logiques à l'échelle de l'entreprise.
  BC-610.40.20:
    name: Architecture de la plateforme de données
    description: |
      Architecture des lacs de données, entrepôts de données, lakehouse et maillages de données.
  BC-610.40.30:
    name: Architecture d'intégration des données
    description: |
      Modèles d'intégration des données par lots, en flux continu et par CDC.
  BC-610.40.40:
    name: Conception du stockage et de la rétention des données
    description: |
      Conception du stockage incluant la rétention, l'archivage et la hiérarchisation.
  BC-610.50:
    name: Gestion de l'analytique et de la BI
    description: |
      Reporting, analytique et production de la business intelligence.
  BC-610.50.10:
    name: Production de rapports et tableaux de bord
    description: |
      Production de rapports opérationnels, de gestion et de tableaux de bord.
  BC-610.50.20:
    name: Analytique en libre-service
    description: |
      Mise à disposition de l'analytique en libre-service et des produits de données pour le métier.
  BC-610.50.30:
    name: Analytique avancée et science des données
    description: |
      Analytique avancée, modèles de science des données et expérimentation.
  BC-610.50.40:
    name: Opérations des plateformes analytiques
    description: |
      Exploitation des plateformes BI et analytiques et des bibliothèques de contenu.
  BC-610.60:
    name: Gestion de l'intelligence artificielle
    description: |
      Cycle de vie des modèles IA/ML, MLOps et IA responsable.
  BC-610.60.10:
    name: Identification des cas d'usage de l'IA
    description: |
      Identification et priorisation des cas d'usage IA/ML.
  BC-610.60.20:
    name: Développement de modèles ML
    description: |
      Ingénierie des caractéristiques, entraînement et validation des modèles ML.
  BC-610.60.30:
    name: MLOps et déploiement des modèles
    description: |
      Déploiement, supervision et gestion du cycle de vie des modèles (MLOps).
  BC-610.60.40:
    name: Gouvernance de l'IA responsable
    description: |
      Principes d'IA responsable, évaluation des risques et surveillance des biais.
  BC-610.60.50:
    name: Gestion de l'IA générative
    description: |
      Cas d'usage de l'IA générative, sélection des modèles de fondation et garde-fous.

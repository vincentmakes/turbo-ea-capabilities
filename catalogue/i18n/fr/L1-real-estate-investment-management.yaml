locale: fr
source: L1-real-estate-investment-management.yaml
entries:
  BC-4910:
    name: Gestion de l'investissement immobilier
    description: |
      Discipline côté société de gestion et fonds couvrant la stratégie, la levée
      de capitaux, le pipeline, la gouvernance des décisions, la construction de
      portefeuille, les relations investisseurs et la performance à l'échelle du
      fonds pour les véhicules d'investissement immobilier incluant les SIIC/REIT,
      fonds non cotés, comptes séparés et programmes de coentreprise.
    in_scope:
      - Définition du fonds / mandat et politique d'investissement
      - Levée de capitaux, formation du fonds et souscriptions
      - Pipeline d'investissement et origination des opérations sur canaux directs et indirects
      - Gouvernance du comité d'investissement et conditions d'approbation
      - Construction de portefeuille, allocation et rééquilibrage
      - Reporting LP, appels de fonds, distributions et soumissions INREV/NCREIF/EPRA
      - Calcul de la ANR/NAV, attribution de la performance et calculs de cascade
    out_of_scope:
      - Plans d'affaires et dépenses d'investissement par actif (BC-4920)
      - Exécution des transactions d'acquisition et de cession (BC-4930)
      - Marchés des capitaux immobiliers en dette et en fonds propres (BC-4980)
      - Trésorerie d'entreprise générique et Relations Investisseurs (BC-210, BC-240)
  BC-4910.10:
    name: Gestion de la stratégie d'investissement et du mandat
    description: |
      Définition et supervision de la stratégie d'investissement, des mandats de
      fonds, du ciblage sectoriel et géographique, et des objectifs rendement-risque
      pour les véhicules sous gestion.
  BC-4910.10.10:
    name: Définition du fonds / mandat
    description: |
      Définition des mandats de fonds ou de comptes séparés incluant le secteur, la
      géographie, le style et les contraintes.
  BC-4910.10.20:
    name: Allocation sectorielle et géographique
    description: |
      Définition et révision des cibles d'allocation sectorielle et géographique
      entre les véhicules.
  BC-4910.10.30:
    name: Ciblage rendement-risque
    description: |
      Ciblage des profils rendement-risque par style (core, core-plus, value-add,
      opportuniste) et benchmark.
  BC-4910.10.40:
    name: Maintenance de la politique d'investissement
    description: |
      Maintenance des déclarations de politique d'investissement, des exceptions et
      des consentements des investisseurs.
  BC-4910.20:
    name: Levée de capitaux et formation du fonds
    description: |
      Formation des véhicules d'investissement et levée des capitaux des investisseurs,
      incluant la structuration, la commercialisation et la clôture.
  BC-4910.20.10:
    name: Structuration du fonds et mise en place du véhicule
    description: |
      Structuration et mise en place des véhicules de fonds, feeders, blockers et
      structures de détention fiscalement efficaces.
  BC-4910.20.20:
    name: Ciblage des investisseurs et souscriptions
    description: |
      Ciblage des segments d'investisseurs, réponse à la due diligence et traitement
      des souscriptions.
  BC-4910.20.30:
    name: Gestion des clôtures du fonds
    description: |
      Gestion des premières, intermédiaires et finales clôtures incluant l'égalisation
      des investisseurs tardifs.
  BC-4910.20.40:
    name: Gestion des co-investissements et véhicules sidecar
    description: |
      Origination et gestion des offres de co-investissement et des véhicules sidecar.
  BC-4910.30:
    name: Pipeline d'investissement et origination des opérations
    description: |
      Origination et triage des opportunités d'investissement sur les canaux
      d'acquisitions directes, d'intérêts indirects et de coentreprises pour les fonds.
  BC-4910.30.10:
    name: Origination d'opérations directes
    description: |
      Origination d'opportunités d'investissement en actifs directs et portefeuilles
      alignées sur les mandats.
  BC-4910.30.20:
    name: Sourcing d'intérêts indirects et de co-investissements
    description: |
      Sourcing d'intérêts indirects incluant les secondaires, les participations
      en fonds et les co-investissements.
  BC-4910.30.30:
    name: Pacing du pipeline et allocation
    description: |
      Pacing du pipeline par rapport aux plans de déploiement du fonds et allocation
      entre les véhicules.
  BC-4910.40:
    name: Gestion des décisions et approbations d'investissement
    description: |
      Gouvernance du comité d'investissement, workflows d'approbation et suivi des
      conditions d'approbation pour les nouveaux investissements.
  BC-4910.40.10:
    name: Préparation du mémorandum d'investissement
    description: |
      Préparation des mémorandums d'investissement pour examen par le comité, couvrant
      la thèse, les conditions et le risque.
  BC-4910.40.20:
    name: Gouvernance du comité d'investissement
    description: |
      Gouvernance du processus du comité d'investissement, quorum et archivage des décisions.
  BC-4910.40.30:
    name: Suivi des conditions d'approbation
    description: |
      Suivi des conditions préalables et conditions subséquentes attachées aux approbations
      d'investissement.
  BC-4910.50:
    name: Construction et allocation du portefeuille
    description: |
      Construction et rééquilibrage continu des portefeuilles de fonds au regard des
      cibles de mandat, d'effet de levier et de risque.
  BC-4910.50.10:
    name: Modélisation du portefeuille
    description: |
      Modélisation de la composition du portefeuille, de la diversification par
      millésime et de la performance projetée.
  BC-4910.50.20:
    name: Rééquilibrage sectoriel et géographique
    description: |
      Rééquilibrage du mix sectoriel et géographique du portefeuille par acquisitions
      et cessions.
  BC-4910.50.30:
    name: Ciblage de l'effet de levier et de la couverture
    description: |
      Ciblage et suivi de l'effet de levier du portefeuille et des politiques de
      couverture change et taux.
  BC-4910.60:
    name: Relations investisseurs et reporting
    description: |
      Communication avec les limited partners et les investisseurs cotés, exécution
      des appels de fonds et distributions, et soumission aux indices sectoriels.
  BC-4910.60.10:
    name: Appels de fonds et distributions
    description: |
      Émission des appels de fonds et exécution des distributions incluant le retour
      de capital.
  BC-4910.60.20:
    name: Reporting et divulgations LP
    description: |
      Reporting trimestriel et annuel aux limited partners couvrant la performance,
      la ANR/NAV et les divulgations.
  BC-4910.60.30:
    name: Soumission aux indices et benchmarks
    description: |
      Soumission à NCREIF, INREV, EPRA et aux benchmarks régionaux pour la
      comparabilité des performances.
  BC-4910.60.40:
    name: Assemblées annuelles des investisseurs
    description: |
      Organisation des assemblées annuelles des investisseurs, des conseils consultatifs
      et des journées investisseurs.
  BC-4910.70:
    name: Gestion de la performance et de la ANR du fonds
    description: |
      Calcul de la ANR/NAV du fonds, attribution de la performance et cascades des
      frais de gestion et de performance incluant la cristallisation des carries.
  BC-4910.70.10:
    name: ANR/NAV et valorisation des parts
    description: |
      Calcul de la ANR/NAV du fonds et de la valeur des parts sur le cycle de
      valorisation périodique.
  BC-4910.70.20:
    name: Attribution de la performance
    description: |
      Attribution de la performance du fonds selon les contributions par actif,
      secteur, géographie et devise.
  BC-4910.70.30:
    name: Calcul des frais et du carried interest
    description: |
      Calcul des frais de gestion et du carried interest aligné sur les conditions
      économiques du LPA.
  BC-4910.70.40:
    name: Calcul des hurdles et des cascades de distribution
    description: |
      Calcul des hurdles de rendement préférentiel et des cascades de distribution
      pour chaque véhicule.

locale: fr
source: L1-subsurface-reservoir-management.yaml
entries:
  BC-3010:
    name: Gestion du sous-sol et des réservoirs
    description: |
      Géosciences et ingénierie de réservoir tout au long du cycle de vie des actifs producteurs — caractérisation, simulation, classification des réserves et ressources, stratégie de déplétition et conception de la récupération améliorée.
  BC-3010.10:
    name: Gestion des géosciences sous-sol
    description: |
      Description statique du sous-sol par la modélisation géologique, la pétrophysique et l'interprétation structurale des actifs producteurs.
  BC-3010.10.10:
    name: Modélisation géologique
    description: |
      Construction et mise à jour des modèles géologiques et de faciès statiques.
  BC-3010.10.20:
    name: Analyse pétrophysique
    description: |
      Analyse des diagraphies, intégration des carottes et évaluation pétrophysique des réservoirs.
  BC-3010.10.30:
    name: Interprétation structurale
    description: |
      Interprétation structurale et du réseau de failles pour les actifs producteurs.
  BC-3010.10.40:
    name: Mise à jour du géomodèle
    description: |
      Mise à jour des géomodèles avec de nouvelles données de puits, sismiques et de production.
  BC-3010.20:
    name: Ingénierie de réservoir
    description: |
      Analyse du comportement dynamique du réservoir par simulation, analyse PVT, bilan matière et méthodes transitoires de pression.
    in_scope:
      - Simulation de réservoir et calage historique
      - Analyse PVT et des propriétés des fluides
      - Analyse transiente de pression et analyse de tests de puits
    out_of_scope:
      - Analyse des courbes de déclin et prévision de production (BC-3010.50)
  BC-3010.20.10:
    name: Caractérisation du réservoir
    description: |
      Caractérisation statique et dynamique intégrée des réservoirs.
  BC-3010.20.20:
    name: Simulation de réservoir
    description: |
      Simulation numérique de réservoir, calage historique et génération de prévisions.
  BC-3010.20.30:
    name: Analyse PVT et des fluides
    description: |
      Échantillonnage PVT, analyse en laboratoire et modélisation des propriétés des fluides.
  BC-3010.20.40:
    name: Analyse par bilan matière
    description: |
      Analyse par bilan matière pour estimer les volumes en place et les mécanismes de production.
  BC-3010.20.50:
    name: Analyse transiente de pression
    description: |
      Analyse des tests de puits et interprétation des transitoires de pression.
  BC-3010.30:
    name: Gestion des réserves et des ressources
    description: |
      Estimation, classification et comptabilisation externe des réserves pétrolières et des ressources contingentes conformément aux normes SPE-PRMS et SEC.
  BC-3010.30.10:
    name: Estimation des réserves
    description: |
      Estimation déterministe et probabiliste des réserves pétrolières.
  BC-3010.30.20:
    name: Classification des réserves
    description: |
      Classification des réserves et des ressources selon les catégories SPE-PRMS.
  BC-3010.30.30:
    name: Comptabilisation des réserves
    description: |
      Comptabilisation annuelle des réserves pour les déclarations réglementaires SEC et équivalentes.
  BC-3010.30.40:
    name: Coordination des audits de réserves
    description: |
      Coordination des audits de réserves internes et par des tiers.
  BC-3010.40:
    name: Planification du développement des champs
    description: |
      Sélection de concept, stratégie de déplétition et rédaction du plan de développement des champs depuis la découverte jusqu'à la sanction du développement.
  BC-3010.40.10:
    name: Sélection de concept
    description: |
      Sélection et sélection de concept à dominante sous-sol pour les nouveaux développements de champs.
  BC-3010.40.20:
    name: Rédaction du plan de développement des champs
    description: |
      Rédaction des plans de développement des champs pour approbation réglementaire et partenaire.
  BC-3010.40.30:
    name: Définition de la stratégie de déplétition
    description: |
      Définition de la stratégie de déplétition du réservoir incluant le drainage et le nombre de puits.
  BC-3010.40.40:
    name: Évaluation du risque sous-sol
    description: |
      Évaluation de l'incertitude sous-sol et de son impact commercial sur les décisions de développement.
  BC-3010.50:
    name: Prévision de production
    description: |
      Génération et réconciliation des prévisions de production pour la planification des actifs, des activités et des réserves.
  BC-3010.50.10:
    name: Analyse des courbes de déclin
    description: |
      Analyse des courbes de déclin pour prévoir la production des puits et des champs.
  BC-3010.50.20:
    name: Génération des prévisions de production
    description: |
      Génération des prévisions de production intégrant les contraintes de puits, de réservoir et d'installations.
  BC-3010.50.30:
    name: Réconciliation des prévisions
    description: |
      Réconciliation des prévisions sous-sol avec les données réelles de comptabilisation de la production.
  BC-3010.60:
    name: Gestion de la récupération améliorée et renforcée
    description: |
      Conception et surveillance des schémas de récupération secondaire et tertiaire, incluant l'injection d'eau et de gaz et les procédés EOR.
  BC-3010.60.10:
    name: Conception de la récupération secondaire
    description: |
      Conception des schémas de récupération secondaire par injection d'eau et de gaz.
  BC-3010.60.20:
    name: Conception de la récupération tertiaire
    description: |
      Conception des schémas de récupération améliorée chimique, thermique et miscible.
  BC-3010.60.30:
    name: Surveillance de la stratégie d'injection
    description: |
      Surveillance et optimisation des schémas d'injection et du remplacement de voidage.

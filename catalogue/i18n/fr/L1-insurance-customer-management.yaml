locale: fr
source: L1-insurance-customer-management.yaml
entries:
  BC-2120:
    name: Gestion des clients en assurance
    description: |
      Identité des assurés, agrégation des ménages et groupes, KYC, consentements
      et gestion du cycle de vie des clients d'assurance sur tous les canaux.
  BC-2120.10:
    name: Gestion de l'intégration des assurés
    description: |
      Saisie des demandes, vérification d'identité, activation et communications d'intégration.
  BC-2120.10.10:
    name: Saisie des demandes
    description: |
      Saisie des nouvelles demandes d'assurés sur tous les canaux.
  BC-2120.10.20:
    name: Vérification de l'identité et du bénéficiaire effectif
    description: |
      Vérification de l'identité et identification du bénéficiaire effectif pour les assurés individuels et corporatifs.
  BC-2120.10.30:
    name: Activation des assurés
    description: |
      Activation des dossiers assurés, des comptes et des accès aux canaux.
  BC-2120.10.40:
    name: Communication d'intégration
    description: |
      Communication du statut d'intégration, des packs de bienvenue et des prochaines étapes.
  BC-2120.20:
    name: Gestion KYC et des sanctions en assurance
    description: |
      Notation du risque client, documentation KYC, criblage des sanctions et PPE et actualisation périodique.
  BC-2120.20.10:
    name: Notation du risque client
    description: |
      Notation du risque des clients d'assurance sur la base des facteurs de risque LCB et de conduite.
  BC-2120.20.20:
    name: Collecte des documents KYC
    description: |
      Collecte et validation des documents KYC pour les clients d'assurance.
  BC-2120.20.30:
    name: Criblage des sanctions et PPE
    description: |
      Criblage des sanctions, PPE et des médias défavorables des assurés et bénéficiaires.
  BC-2120.20.40:
    name: Actualisation périodique KYC
    description: |
      Actualisation périodique des informations KYC et nouvelle notation du risque.
  BC-2120.30:
    name: Gestion du service aux assurés
    description: |
      Maintenance en libre-service, traitement des demandes de service, fourniture de documents et maintenance des bénéficiaires.
  BC-2120.30.10:
    name: Maintenance en libre-service du compte
    description: |
      Mises à jour en libre-service des données d'adresse, de contact et de préférences.
  BC-2120.30.20:
    name: Traitement des demandes de service entrantes
    description: |
      Traitement des demandes de service entrantes des assurés sur tous les canaux.
  BC-2120.30.30:
    name: Fourniture de documents et relevés
    description: |
      Fourniture des documents de police, relevés et certificats d'assurance.
  BC-2120.30.40:
    name: Maintenance des bénéficiaires et représentants
    description: |
      Saisie et maintenance des bénéficiaires et représentants sur les contrats vie et retraite.
  BC-2120.40:
    name: Gestion des informations clients et des consentements
    description: |
      Profil, agrégation des ménages et groupes, gestion des consentements et enregistrement de référence.
  BC-2120.40.10:
    name: Maintenance du profil de l'assuré
    description: |
      Maintenance du profil et des données démographiques de l'assuré.
  BC-2120.40.20:
    name: Agrégation des ménages et groupes
    description: |
      Agrégation des assurés en ménages, groupes et entités corporate parentes.
  BC-2120.40.30:
    name: Consentement marketing et partage de données
    description: |
      Collecte et application des consentements marketing et de partage de données.
  BC-2120.40.40:
    name: Gestion de l'enregistrement de référence client
    description: |
      Maintenance de l'enregistrement de référence de l'assuré sur l'ensemble des systèmes.
  BC-2120.50:
    name: Gestion de l'expérience et de la rétention des clients
    description: |
      Collecte des retours, programmes de fidélité, gestion des réclamations et prédiction du churn.
  BC-2120.50.10:
    name: Collecte des retours clients
    description: |
      Collecte des retours clients, des signaux NPS et CSAT.
  BC-2120.50.20:
    name: Opérations des programmes de fidélité et de rétention
    description: |
      Exploitation des programmes de fidélité, de rétention et de récompenses basées sur l'ancienneté.
  BC-2120.50.30:
    name: Traitement des réclamations et escalades
    description: |
      Traitement des réclamations, escalades et dossiers de médiation des assurés.
  BC-2120.50.40:
    name: Prédiction du churn et des lapses
    description: |
      Analyses prédictives du risque de churn et de lapse pour les interventions de rétention.

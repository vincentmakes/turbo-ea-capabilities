locale: fr
source: L1-government-grants-funding-management.yaml
entries:
  BC-3260:
    name: Gestion des subventions publiques et du financement
    description: |
      Attribution et administration des subventions compétitives et formulaires ainsi que
      du financement public aux organisations, communautés et particuliers, incluant la
      sollicitation, l'examen des candidatures, l'attribution, le suivi et la clôture.
  BC-3260.10:
    name: Conception des programmes de subventions
    description: |
      Conception des programmes de subventions incluant les objectifs, l'éligibilité,
      les formules de financement et les critères d'évaluation.
  BC-3260.10.10:
    name: Définition des objectifs du programme
    description: |
      Définition des objectifs, des résultats et de la théorie du changement du programme de subventions.
  BC-3260.10.20:
    name: Modélisation de l'allocation des financements
    description: |
      Modélisation des allocations de financement incluant les formules, les approches compétitives
      et les financements avec contrepartie.
  BC-3260.10.30:
    name: Définition des critères d'évaluation
    description: |
      Définition des critères d'examen au mérite et d'évaluation pour la sélection des subventions.
  BC-3260.20:
    name: Gestion des appels à candidatures et des avis
    description: |
      Publication des opportunités de financement, des avis de disponibilité des financements
      et de la documentation des appels.
  BC-3260.20.10:
    name: Publication des opportunités de financement
    description: |
      Publication des appels à subventions, des avis de disponibilité des financements et de la documentation des appels.
  BC-3260.20.20:
    name: Sensibilisation et soutien aux candidats
    description: |
      Sensibilisation, sessions d'information et soutien aux candidats pour les programmes de subventions.
  BC-3260.20.30:
    name: Traitement des questions préalables à l'attribution
    description: |
      Traitement des questions et clarifications préalables à l'attribution de la part des candidats potentiels.
  BC-3260.30:
    name: Réception et examen des candidatures
    description: |
      Réception, sélection et examen au mérite des candidatures incluant l'examen par un jury et la notation.
  BC-3260.30.10:
    name: Dépôt des candidatures
    description: |
      Dépôt et réception des candidatures aux subventions et des pièces justificatives.
  BC-3260.30.20:
    name: Contrôle d'éligibilité
    description: |
      Contrôle des candidatures par rapport aux critères d'éligibilité et aux seuils.
  BC-3260.30.30:
    name: Examen au mérite et notation
    description: |
      Examen par jury, notation et classement des candidatures par rapport aux critères publiés.
  BC-3260.30.40:
    name: Gestion des évaluateurs et des conflits d'intérêts
    description: |
      Recrutement des évaluateurs et gestion des conflits d'intérêts.
  BC-3260.40:
    name: Décision d'attribution et de financement
    description: |
      Décisions d'attribution, émission des conventions de subvention et engagement
      des fonds en faveur des bénéficiaires.
  BC-3260.40.10:
    name: Sélection des bénéficiaires
    description: |
      Sélection finale des candidatures retenues et des montants attribués.
  BC-3260.40.20:
    name: Émission des conventions de subvention
    description: |
      Rédaction et exécution des conventions de subvention et des termes et conditions.
  BC-3260.40.30:
    name: Engagement et mise en place des versements
    description: |
      Engagement des fonds et mise en place des calendriers de versement.
  BC-3260.50:
    name: Suivi et reporting des bénéficiaires
    description: |
      Suivi de la performance des bénéficiaires, du reporting financier et de la conformité
      aux conditions de la subvention.
  BC-3260.50.10:
    name: Examen des rapports de performance
    description: |
      Examen des rapports de performance et d'avancement des bénéficiaires par rapport aux jalons.
  BC-3260.50.20:
    name: Examen des rapports financiers
    description: |
      Examen des rapports financiers des bénéficiaires et des demandes de tirage.
  BC-3260.50.30:
    name: Suivi sur site et vérification
    description: |
      Visites sur site et vérification des activités et livrables des bénéficiaires.
  BC-3260.50.40:
    name: Supervision des sous-bénéficiaires
    description: |
      Supervision des dispositifs de transfert et des sous-bénéficiaires.
  BC-3260.60:
    name: Clôture des subventions et résolution des audits
    description: |
      Rapport final, clôture, résolution des audits et recouvrement des coûts non admissibles.
  BC-3260.60.10:
    name: Acceptation du rapport final et des livrables
    description: |
      Acceptation des rapports finaux et des livrables à la fin du programme.
  BC-3260.60.20:
    name: Résolution des audits uniques et de conformité
    description: |
      Résolution des constatations d'audit unique et de conformité vis-à-vis des bénéficiaires de subventions.
  BC-3260.60.30:
    name: Recouvrement des coûts non admissibles
    description: |
      Recouvrement des coûts non admissibles et des soldes non engagés à la clôture.

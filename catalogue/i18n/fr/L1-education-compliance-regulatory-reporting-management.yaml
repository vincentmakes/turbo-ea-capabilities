locale: fr
source: L1-education-compliance-regulatory-reporting-management.yaml
entries:
  BC-4810:
    name: Gestion de la conformité et des déclarations réglementaires en éducation
    description: |
      Conformité réglementaire et déclarations statutaires spécifiques au secteur
      éducatif, incluant la protection des données des étudiants, les régimes de
      droits civils, les obligations légales d'éducation spécialisée, la conformité
      en matière de visa pour les étudiants étrangers et la conformité au financement
      public. Complète la Gestion de la conformité – transverse pour les obligations
      réglementaires générales.
  BC-4810.10:
    name: Conformité à la protection des données des étudiants
    description: |
      Conformité aux régimes de protection des données des étudiants propres au secteur,
      notamment FERPA, COPPA et les régimes équivalents.
    in_scope:
      - Opérations de conformité FERPA
      - Opérations de conformité COPPA
      - Gestion des accords de partage de données des étudiants
    out_of_scope:
      - Protection des données générale (couverte par la Gestion de l'information et des données – transverse)
  BC-4810.10.10:
    name: Opérations de conformité FERPA
    description: |
      Conformité FERPA au quotidien, consentements et divulgations.
  BC-4810.10.20:
    name: Opérations de conformité COPPA
    description: |
      Conformité COPPA pour les services destinés aux enfants de moins de 13 ans.
  BC-4810.10.30:
    name: Gestion des accords de partage de données des étudiants
    description: |
      Négociation et gestion des accords de partage de données des étudiants avec les prestataires.
  BC-4810.20:
    name: Déclarations éducatives statutaires
    description: |
      Soumission des statistiques éducatives statutaires et des rapports de performance
      aux autorités nationales, régionales et locales.
    in_scope:
      - Soumission des statistiques nationales (p. ex. IPEDS, HESA)
      - Déclarations aux autorités éducatives régionales et locales
      - Divulgation des financements et des performances
    out_of_scope:
      - Reporting interne de la performance (couvert par la Gestion de la qualité académique et de l'accréditation)
  BC-4810.20.10:
    name: Soumission des statistiques nationales
    description: |
      Soumission des déclarations aux agences nationales de statistiques éducatives.
  BC-4810.20.20:
    name: Déclarations aux autorités éducatives régionales et locales
    description: |
      Déclarations aux autorités éducatives régionales, provinciales et locales.
  BC-4810.20.30:
    name: Divulgation des financements et des performances
    description: |
      Divulgation publique de l'utilisation des financements et des indicateurs de performance éducative.
  BC-4810.30:
    name: Conformité aux droits civils
    description: |
      Conformité aux régimes de droits civils spécifiques à l'éducation, notamment
      le Titre IX, la Section 504 et l'ADA dans le contexte académique.
    in_scope:
      - Investigation et reporting Titre IX
      - Conformité Section 504 / ADA
      - Application des politiques de non-discrimination
    out_of_scope:
      - Aménagements quotidiens (couverts par la Gestion du soutien aux étudiants et du bien-être)
  BC-4810.30.10:
    name: Investigation et reporting Titre IX
    description: |
      Réception, investigation, audition et reporting statutaire au titre du Titre IX.
  BC-4810.30.20:
    name: Conformité Section 504 / ADA
    description: |
      Conformité Section 504 et ADA dans le contexte académique et des admissions.
  BC-4810.30.30:
    name: Application des politiques de non-discrimination
    description: |
      Application des politiques de non-discrimination en éducation et traitement des plaintes.
  BC-4810.40:
    name: Conformité à l'éducation spécialisée
    description: |
      Conformité aux régimes statutaires d'éducation spécialisée couvrant les
      populations d'âge scolaire et d'intervention précoce.
    in_scope:
      - Conformité IDEA Partie B
      - Conformité IDEA Partie C / intervention précoce
      - Conformité statutaire équivalente SEN/ALN
    out_of_scope:
      - Prestation de services d'éducation spécialisée (couverte par la Gestion du soutien aux étudiants et du bien-être)
  BC-4810.40.10:
    name: Conformité IDEA Partie B
    description: |
      Conformité statutaire IDEA Partie B pour l'éducation spécialisée d'âge scolaire.
  BC-4810.40.20:
    name: Conformité IDEA Partie C / intervention précoce
    description: |
      Conformité IDEA Partie C pour les services d'intervention précoce.
  BC-4810.40.30:
    name: Conformité statutaire équivalente SEN / ALN
    description: |
      Conformité statutaire équivalente SEN, ALN et éducation inclusive hors des États-Unis.
  BC-4810.50:
    name: Conformité relative aux étudiants étrangers
    description: |
      Conformité au parrainage de visa et suivi statutaire des étudiants étrangers
      dans le cadre de régimes tels que SEVIS et la voie étudiante britannique.
    in_scope:
      - Opérations de conformité SEVIS / I-20
      - Reporting des visas étudiants (voie étudiante britannique, équivalents)
      - Suivi et reporting des étudiants étrangers
    out_of_scope:
      - Délivrance initiale de la documentation de parrainage de visa (couverte par la Gestion du recrutement et des admissions des étudiants)
  BC-4810.50.10:
    name: Opérations de conformité SEVIS / I-20
    description: |
      Conformité SEVIS et I-20 au quotidien pour les étudiants parrainés aux États-Unis.
  BC-4810.50.20:
    name: Reporting des visas étudiants
    description: |
      Reporting statutaire sur les étudiants parrainés dans le cadre des régimes de visa non américains.
  BC-4810.50.30:
    name: Suivi des étudiants étrangers
    description: |
      Suivi du statut, de la présence et de l'adresse des étudiants étrangers conformément aux obligations de parrainage.
  BC-4810.60:
    name: Conformité au Titre IV et aux financements publics
    description: |
      Conformité aux régimes publics d'aide aux étudiants et de financement de
      l'éducation, notamment le Titre IV aux États-Unis et les régimes équivalents.
    in_scope:
      - Conformité à l'éligibilité et au décaissement du Titre IV
      - Remboursement des fonds et réconciliation des aides
      - Réponse aux audits de financement public
    out_of_scope:
      - Attribution des offres d'aide financière (couverte par la Gestion du recrutement et des admissions des étudiants)
  BC-4810.60.10:
    name: Conformité à l'éligibilité et au décaissement du Titre IV
    description: |
      Conformité institutionnelle au Titre IV et conformité au décaissement des aides aux étudiants.
  BC-4810.60.20:
    name: Remboursement des fonds et réconciliation des aides
    description: |
      Réconciliation et remboursement des aides non acquises conformément aux régimes de financement.
  BC-4810.60.30:
    name: Réponse aux audits de financement public
    description: |
      Réponse aux audits et révisions de l'aide publique aux étudiants et du financement de l'éducation.

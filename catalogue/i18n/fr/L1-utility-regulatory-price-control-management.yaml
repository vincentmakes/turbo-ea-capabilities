locale: fr
source: L1-utility-regulatory-price-control-management.yaml
entries:
  BC-3920:
    name: Gestion de la réglementation et du contrôle tarifaire
    description: |
      Relations avec les régulateurs sectoriels et administration des régimes de contrôle tarifaire — interactions réglementaires, soumissions tarifaires, conception des structures de tarifs, reporting réglementaire, engagements de niveau de service, allocation des coûts réglementés et obligations de service universel et d'accessibilité tarifaire.
  BC-3920.10:
    name: Relations avec les régulateurs
    description: |
      Gestion au quotidien des relations et des flux d'information avec les régulateurs sectoriels et les organes de protection des consommateurs.
  BC-3920.10.10:
    name: Gestion de la correspondance réglementaire
    description: |
      Traitement de la correspondance entrante et sortante et des demandes d'information des régulateurs.
  BC-3920.10.20:
    name: Réponse aux consultations réglementaires
    description: |
      Préparation et soumission des réponses aux consultations réglementaires.
  BC-3920.10.30:
    name: Participation aux audiences réglementaires
    description: |
      Participation aux audiences réglementaires, conférences techniques et forums parties prenantes.
  BC-3920.20:
    name: Gestion des soumissions tarifaires
    description: |
      Préparation, soumission et négociation complètes des plans d'activités pluriannuels dans le cadre des contrôles tarifaires ou des procédures de fixation des tarifs.
    in_scope:
      - Élaboration du plan d'activités (RIIO, PR, procédures de fixation des tarifs)
      - Benchmarking des coûts et modélisation du totex
      - Négociation des recettes autorisées et des livrables
    out_of_scope:
      - Planification interne des investissements (BC-3900.40)
      - Participation aux marchés de gros (BC-3850)
  BC-3920.20.10:
    name: Élaboration du plan d'activités
    description: |
      Élaboration des plans d'activités dans le cadre des contrôles tarifaires (RIIO, PR et équivalents).
  BC-3920.20.20:
    name: Benchmarking des coûts et modélisation du totex
    description: |
      Benchmarking des coûts et modélisation du totex par rapport aux données des régulateurs et des pairs.
  BC-3920.20.30:
    name: Négociation des recettes autorisées
    description: |
      Négociation des recettes autorisées, des livrables et des paramètres d'incitation avec le régulateur.
  BC-3920.30:
    name: Conception des structures tarifaires
    description: |
      Conception des structures tarifaires réglementées — charges d'énergie, charges réseau et abonnements — pour les clients résidentiels, commerciaux et industriels.
  BC-3920.30.10:
    name: Conception des tarifs d'utilisation du réseau
    description: |
      Conception des tarifs d'utilisation des réseaux de distribution et de transport.
  BC-3920.30.20:
    name: Conception des grilles tarifaires au détail
    description: |
      Conception des grilles tarifaires au détail incluant les structures à heures pleines/creuses et saisonnières.
  BC-3920.30.30:
    name: Méthodologie de facturation des raccordements
    description: |
      Méthodologie de facturation des raccordements et gestion de la frontière contestable/non contestable.
  BC-3920.40:
    name: Reporting réglementaire
    description: |
      Reporting réglementaire périodique aux autorités de régulation, incluant les rapports annuels de performance, les comptes réglementaires et les soumissions intermédiaires.
  BC-3920.40.10:
    name: Reporting annuel de performance
    description: |
      Élaboration et soumission des rapports annuels de performance aux régulateurs.
  BC-3920.40.20:
    name: Préparation des comptes réglementaires
    description: |
      Préparation des comptes réglementaires conformément aux lignes directrices comptables définies par le régulateur.
  BC-3920.40.30:
    name: Soumissions réglementaires ad hoc
    description: |
      Soumissions ponctuelles de données aux portails des régulateurs et réponses aux demandes d'information.
  BC-3920.50:
    name: Gestion des engagements de niveau de service
    description: |
      Suivi et administration des incitations à la livraison des résultats et des engagements de niveau de service définis par le régulateur.
  BC-3920.50.10:
    name: Suivi des incitations à la livraison des résultats
    description: |
      Suivi des indicateurs de performance, des engagements et des incitations financières.
  BC-3920.50.20:
    name: Administration des standards garantis
    description: |
      Administration des paiements de standards garantis de service aux clients.
  BC-3920.50.30:
    name: Calcul des pénalités de performance
    description: |
      Calcul des pénalités et des récompenses liées à la performance réglementaire.
  BC-3920.60:
    name: Allocation des coûts réglementaires
    description: |
      Allocation des coûts entre les entités réglementées et non réglementées et entre les catégories de contrôle tarifaire selon les méthodologies d'allocation approuvées.
  BC-3920.60.10:
    name: Maintenance de la méthodologie d'allocation des coûts
    description: |
      Maintenance des méthodologies d'allocation des coûts approuvées par le régulateur.
  BC-3920.60.20:
    name: Ventilation des coûts réglementés et non réglementés
    description: |
      Application périodique de la ventilation des coûts entre activités réglementées et non réglementées.
  BC-3920.60.30:
    name: Classification capex / opex
    description: |
      Classification des dépenses en capex et opex selon les définitions du régulateur.
  BC-3920.70:
    name: Gestion du service universel et de l'accessibilité tarifaire
    description: |
      Déploiement des obligations de service universel et des dispositifs de lutte contre la précarité énergétique et hydrique imposés par le régulateur.
  BC-3920.70.10:
    name: Livraison des obligations de service universel
    description: |
      Mise en œuvre des obligations de service universel auprès des clients au détail.
  BC-3920.70.20:
    name: Opérations des programmes de lutte contre la précarité énergétique et hydrique
    description: |
      Pilotage des programmes d'atténuation de la précarité énergétique et hydrique.
  BC-3920.70.30:
    name: Reporting des dispositifs d'accessibilité tarifaire
    description: |
      Reporting de la mise en œuvre des dispositifs d'accessibilité tarifaire au régulateur et aux pouvoirs publics.

locale: fr
source: L1-events-group-operations-management.yaml
entries:
  BC-4110:
    name: Gestion des opérations MICE et groupes
    description: |
      Exploitation des réunions, incentives, conférences, expositions et banquets dans les établissements hôteliers — incluant la vente groupes, l'allocation des espaces de réunion, l'exécution des bons de commande banquet, la gestion des blocs chambre groupes, l'audiovisuel et la production, la facturation et le reporting post-événement.
    in_scope:
      - Prospection, contractualisation et tarification des groupes
      - Allocation des espaces de réunion et résolution des conflits
      - Rédaction et exécution des bons de commande banquet
      - Contrat, liste et pickup du bloc chambre groupe
      - Audiovisuel, scénographie et production d'événements hybrides
      - Facturation sur compte maître et règlement final
      - Reporting des performances bloc/pickup et post-événement
    out_of_scope:
      - Marketing événementiel de l'entreprise (BC-410)
      - Production de cuisine banquet et sécurité alimentaire (BC-4070)
      - Enregistrement à la réception pour les arrivées groupes (BC-4060.10)
  BC-4110.10:
    name: Gestion des ventes groupes et événements
    description: |
      Qualification des prospects groupes, opérations de proposition et contractualisation, concessions tarifaires et reporting du pipeline pour le segment groupe.
  BC-4110.10.10:
    name: Qualification des prospects groupes
    description: |
      Qualification des prospects groupes entrants par rapport à la destination, aux espaces disponibles et à la pertinence tarifaire.
  BC-4110.10.20:
    name: Opérations de proposition et contractualisation groupes
    description: |
      Rédaction des propositions et exécution des contrats de vente groupes.
  BC-4110.10.30:
    name: Gestion de la tarification et des concessions groupes
    description: |
      Gestion de la tarification et de la négociation des concessions groupes dans le cadre des directives de revenus.
  BC-4110.10.40:
    name: Reporting du pipeline groupes
    description: |
      Reporting du pipeline de ventes groupes et des taux de conversion par étape.
  BC-4110.20:
    name: Gestion des espaces événementiels et du planning fonctionnel
    description: |
      Définition et allocation de l'inventaire des espaces de réunion, résolution des conflits, et planification des configurations et des capacités.
  BC-4110.20.10:
    name: Définition de l'inventaire des espaces de réunion
    description: |
      Définition de l'inventaire des espaces de réunion incluant les capacités, les configurations et les salles combinables.
  BC-4110.20.20:
    name: Réservation et allocation des espaces
    description: |
      Réservation et allocation des espaces de réunion pour les événements confirmés et en option.
  BC-4110.20.30:
    name: Résolution des conflits d'espaces
    description: |
      Résolution des conflits d'espaces entre demandes concurrentes et dépendances d'espaces adjacents.
  BC-4110.20.40:
    name: Planification des configurations et des capacités
    description: |
      Planification des configurations de salle et des capacités par événement tenant compte des contraintes de charge au feu et d'accessibilité.
  BC-4110.30:
    name: Exécution des bons de commande banquet
    description: |
      Rédaction des bons de commande banquet, distribution aux équipes opérationnelles, exécution des opérations d'installation-service-démontage et gestion des modifications.
  BC-4110.30.10:
    name: Rédaction des bons de commande banquet
    description: |
      Rédaction des bons de commande banquet couvrant la restauration, l'audiovisuel, l'installation et les détails de timing.
  BC-4110.30.20:
    name: Distribution et briefing des bons de commande banquet
    description: |
      Distribution des bons de commande aux équipes opérationnelles et briefing du personnel d'exécution.
  BC-4110.30.30:
    name: Opérations d'installation, de service et de démontage
    description: |
      Opérations d'installation, de service et de démontage selon le bon de commande et le timing de l'événement.
  BC-4110.30.40:
    name: Opérations de modification des bons de commande
    description: |
      Opérations de gestion des modifications des bons de commande incluant les mises à jour de dernière minute.
  BC-4110.40:
    name: Gestion du bloc chambre et des listes de chambres groupes
    description: |
      Configuration des contrats de bloc chambre groupe, opérations sur les listes de chambres, date limite, wash et reporting du pickup au niveau de la délivrance de l'événement.
  BC-4110.40.10:
    name: Configuration des contrats de bloc
    description: |
      Configuration des termes du contrat de bloc dans les systèmes opérationnels pour l'événement.
  BC-4110.40.20:
    name: Opérations sur les listes de chambres
    description: |
      Opérations sur les listes de chambres incluant les mises à jour, les demandes spéciales et le séquençage des arrivées.
  BC-4110.40.30:
    name: Opérations de date limite et de wash du bloc
    description: |
      Opérations de date limite et de wash libérant l'inventaire de bloc non utilisé vers la vente générale.
  BC-4110.40.40:
    name: Reporting du pickup de bloc
    description: |
      Reporting du pickup de bloc par rapport au contrat pour la comptabilité des revenus et des performances.
  BC-4110.50:
    name: Opérations audiovisuelles et de production événementielle
    description: |
      Opérations audiovisuelles et de production incluant l'AV en régie interne, la scénographie, la diffusion hybride en direct et la coordination des prestataires externes.
  BC-4110.50.10:
    name: Opérations AV en régie interne
    description: |
      Exploitation des équipements et équipes AV en régie interne pour les événements.
  BC-4110.50.20:
    name: Scénographie et décors
    description: |
      Scénographie et décors pour les événements incluant les éléments de décor et de gréage.
  BC-4110.50.30:
    name: Opérations de diffusion en direct et d'événements hybrides
    description: |
      Exploitation de la diffusion en direct et de la délivrance d'événements hybrides couvrant les audiences distantes et en salle.
  BC-4110.50.40:
    name: Coordination des prestataires AV externes
    description: |
      Coordination des prestataires AV externes selon les exigences de l'établissement et d'assurance.
  BC-4110.60:
    name: Facturation et gestion du compte maître événementiel
    description: |
      Ouverture des comptes maîtres, facturation individuelle et accessoire, acomptes et règlement et réconciliation finale de l'événement.
  BC-4110.60.10:
    name: Ouverture du compte maître
    description: |
      Ouverture des comptes maîtres événementiels et règles d'imputation des postes facturables.
  BC-4110.60.20:
    name: Opérations de facturation individuelle et accessoire
    description: |
      Exploitation de la facturation individuelle et accessoire pour les participants au-delà du compte maître.
  BC-4110.60.30:
    name: Gestion des acomptes et des prépaiements
    description: |
      Gestion des acomptes et prépaiements par rapport aux jalons de l'événement.
  BC-4110.60.40:
    name: Règlement et réconciliation finale de l'événement
    description: |
      Règlement et réconciliation finale du compte maître par rapport au contrat et aux consommations.
  BC-4110.70:
    name: Reporting des performances et post-événement
    description: |
      Reporting des performances des événements groupes incluant le bloc/pickup, les résultats financiers, les retours des participants et le suivi des renouvellements.
  BC-4110.70.10:
    name: Reporting bloc/pickup
    description: |
      Reporting des performances bloc/pickup pour les événements réalisés.
  BC-4110.70.20:
    name: Reporting des performances financières de l'événement
    description: |
      Reporting des performances financières de l'événement par rapport au budget et aux prévisions.
  BC-4110.70.30:
    name: Saisie des retours des participants
    description: |
      Saisie des retours des participants via les enquêtes post-événement et les canaux de signaux en direct.
  BC-4110.70.40:
    name: Suivi des reconductions et des renouvellements
    description: |
      Suivi des pipelines de reconductions et des opportunités de renouvellement issus des événements réalisés.

locale: fr
source: L1-customer-success-management.yaml
entries:
  BC-4260:
    name: Gestion du succès client
    description: |
      Intégration des clients, adoption, suivi de la santé, fidélisation,
      développement, plaidoyer et cultivation des clients de référence,
      distinct du service client réactif.
  BC-4260.10:
    name: Intégration et activation des clients
    description: |
      Intégration structurée des nouveaux clients vers la première valeur
      et les jalons d'activation.
    in_scope:
      - Plans d'intégration, lancement et suivi du délai de création de valeur
    out_of_scope:
      - Provisionnement technique des locataires (couvert par la gestion des locataires SaaS)
      - Provisionnement des abonnements (couvert par la gestion du cycle de vie de l'abonnement)
  BC-4260.10.10:
    name: Définition du plan d'intégration
    description: |
      Définition des plans d'intégration adaptés au segment et au cas d'usage.
  BC-4260.10.20:
    name: Suivi des jalons d'activation
    description: |
      Suivi des jalons d'activation par rapport aux objectifs de délai de
      création de valeur.
  BC-4260.10.30:
    name: Coordination de l'implémentation
    description: |
      Coordination des activités d'implémentation côté client et de
      l'engagement des partenaires.
  BC-4260.20:
    name: Gestion de l'adoption
    description: |
      Programmes visant à accroître l'adoption des fonctionnalités et
      l'étendue d'utilisation au sein de la base clients.
  BC-4260.20.10:
    name: Conception des programmes d'adoption
    description: |
      Conception de programmes d'adoption structurés par segment, produit
      et persona.
  BC-4260.20.20:
    name: Exécution des campagnes d'adoption
    description: |
      Exécution des campagnes d'adoption avec des points de contact
      intégrés au produit et en sortant.
  BC-4260.20.30:
    name: Activation des utilisateurs avancés
    description: |
      Activation des utilisateurs avancés et des champions internes
      chez le client.
  BC-4260.30:
    name: Gestion de la santé client
    description: |
      Modélisation et surveillance de la santé client pour anticiper les risques
      et déclencher des interventions.
  BC-4260.30.10:
    name: Modélisation du score de santé client
    description: |
      Modélisation des scores de santé client à partir des signaux produit,
      support et commerciaux.
  BC-4260.30.20:
    name: Surveillance des signaux de risque
    description: |
      Surveillance des signaux de risque au sein de la base clients.
  BC-4260.30.30:
    name: Intervention sur les comptes à risque
    description: |
      Intervention coordonnée sur les comptes identifiés comme à risque.
  BC-4260.40:
    name: Engagement tout au long du cycle de vie client
    description: |
      Points de contact récurrents tout au long du cycle de vie, incluant
      les bilans d'activité, le parrainage exécutif et la planification
      du succès conjoint.
  BC-4260.40.10:
    name: Gestion des bilans d'activité trimestriels
    description: |
      Planification et conduite des bilans d'activité récurrents avec
      les clients.
  BC-4260.40.20:
    name: Programme de parrainage exécutif
    description: |
      Animation des binômes de parrainage exécutif entre le prestataire
      et le client.
  BC-4260.40.30:
    name: Maintenance des plans de succès
    description: |
      Maintenance des plans de succès conjoints capturant les résultats
      attendus et les jalons du client.
  BC-4260.50:
    name: Plaidoyer pour la fidélisation et le renouvellement
    description: |
      Plaidoyer et interventions centrés sur le renouvellement, incluant
      les actions de rétention et la contribution aux prévisions de renouvellement.
  BC-4260.50.10:
    name: Atténuation des risques de renouvellement
    description: |
      Atténuation des risques de renouvellement identifiés avant la date
      d'échéance.
  BC-4260.50.20:
    name: Exécution des actions de rétention
    description: |
      Exécution des actions de rétention sur les comptes ayant l'intention
      de résilier.
  BC-4260.50.30:
    name: Soumission des prévisions de renouvellement
    description: |
      Soumission des prévisions de renouvellement basées sur les signaux
      de santé et d'engagement.
  BC-4260.60:
    name: Plaidoyer pour le développement et la vente croisée
    description: |
      Identification et qualification des opportunités de développement et
      coordination avec les ventes pour la vente croisée.
  BC-4260.60.10:
    name: Identification des opportunités de développement
    description: |
      Identification des opportunités de développement à partir des signaux
      d'utilisation et d'engagement.
  BC-4260.60.20:
    name: Qualification des opportunités de montée en gamme
    description: |
      Qualification des opportunités de montée en gamme avant l'engagement
      commercial.
  BC-4260.60.30:
    name: Coordination de la vente croisée
    description: |
      Coordination avec les ventes sur les actions de vente croisée au sein
      de la base clients.
  BC-4260.70:
    name: Plaidoyer client et programme de référence
    description: |
      Cultivation des références, des études de cas et mesure structurée
      du sentiment client.
  BC-4260.70.10:
    name: Gestion du programme de référence
    description: |
      Gestion du programme de référence clients, incluant l'inscription,
      la gouvernance et l'utilisation.
  BC-4260.70.20:
    name: Développement des études de cas
    description: |
      Développement d'études de cas clients en collaboration avec le marketing.
  BC-4260.70.30:
    name: Programme d'enquête NPS
    description: |
      Animation des programmes d'enquête NPS et équivalents mesurant le
      sentiment client.

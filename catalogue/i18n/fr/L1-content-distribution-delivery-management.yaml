locale: fr
source: L1-content-distribution-delivery-management.yaml
entries:
  BC-3740:
    name: Gestion de la distribution et de la diffusion de contenu
    description: |
      Diffusion linéaire, distribution OTT et en streaming, opérations CDN,
      IPTV et multicast, protection du contenu, et distribution en syndication
      et affiliés vers les surfaces grand public et les partenaires.
  BC-3740.10:
    name: Distribution broadcast linéaire
    description: |
      Opération de la distribution broadcast linéaire sur les voies de
      transport numérique terrestre, satellite et câble.
  BC-3740.10.10:
    name: Opérations de diffusion terrestre
    description: |
      Exploitation des chaînes de transmission numérique terrestre et du
      transport en multiplex.
  BC-3740.10.20:
    name: Opérations de montée satellite
    description: |
      Exploitation des chaînes de montée satellite pour la distribution
      directe au foyer et en contribution.
  BC-3740.10.30:
    name: Opérations de tête de réseau câble
    description: |
      Exploitation du transport câble et intégration de la tête de réseau avec
      les plateformes opérateurs.
  BC-3740.20:
    name: Diffusion OTT et en streaming
    description: |
      Opération de l'origine streaming, du packaging et du direct en streaming
      pour les services OTT grand public et partenaires.
  BC-3740.20.10:
    name: Opérations du service d'origine
    description: |
      Exploitation des services d'origine streaming fournissant les contenus
      à la demande et en direct vers les surfaces de diffusion.
  BC-3740.20.20:
    name: Packaging en streaming adaptatif
    description: |
      Packaging adaptatif just-in-time et pré-packagé pour HLS, MPEG-DASH et
      CMAF.
  BC-3740.20.30:
    name: Opérations de streaming en direct
    description: |
      Exploitation des pipelines de streaming en direct pour les événements,
      les chaînes et les services fast.
  BC-3740.30:
    name: Opérations du réseau de diffusion de contenu
    description: |
      Gestion de la capacité, de la mise en cache et de la performance/coût
      des CDN pour la distribution de contenu.
  BC-3740.30.10:
    name: Planification de la capacité CDN
    description: |
      Prévision et provisionnement de la capacité CDN par région, peering et
      événements de pointe.
  BC-3740.30.20:
    name: Gestion du cache périphérique
    description: |
      Gestion de l'empreinte du cache périphérique, du comportement de
      remplissage et du déchargement vers les caches partenaires.
  BC-3740.30.30:
    name: Optimisation des coûts et performances CDN
    description: |
      Pilotage multi-CDN et optimisation coût-performance entre les partenaires
      de diffusion.
  BC-3740.40:
    name: Gestion de la diffusion IPTV et multicast
    description: |
      Exploitation des têtes de réseau IPTV grade télécom, des flux multicast
      et de l'activation des décodeurs.
  BC-3740.40.10:
    name: Opérations de la tête de réseau IPTV
    description: |
      Exploitation des têtes de réseau IPTV incluant l'acquisition du signal,
      l'encodage et l'intégration de l'accès conditionnel.
  BC-3740.40.20:
    name: Gestion des flux multicast
    description: |
      Gestion du provisionnement des flux multicast sur les supports IP et
      broadcast 3GPP.
  BC-3740.40.30:
    name: Activation des décodeurs
    description: |
      Activation des décodeurs et des appareils gérés sur le service IPTV,
      incluant le provisionnement du plan de chaînes.
  BC-3740.50:
    name: Gestion de la protection du contenu et du DRM
    description: |
      Exploitation des systèmes de protection du contenu incluant la gestion
      des clés et licences, le tatouage numérique et le contrôle des flux
      simultanés.
  BC-3740.50.10:
    name: Gestion des licences et des clés
    description: |
      Émission et gestion des licences DRM et des clés de contenu sur les
      appareils et plateformes.
  BC-3740.50.20:
    name: Tatouage numérique et traçage forensique
    description: |
      Application de tatouages de session et forensiques pour la détection du
      piratage et la traçabilité de la source.
  BC-3740.50.30:
    name: Contrôle des flux simultanés
    description: |
      Application des limites de flux simultanés et de la politique de partage
      de compte entre téléspectateurs et appareils.
  BC-3740.60:
    name: Distribution en syndication et aux affiliés
    description: |
      Distribution des programmes et des flux aux affiliés syndiqués et aux
      plateformes tierces avec comptabilité de livraison.
  BC-3740.60.10:
    name: Gestion des commandes de syndication
    description: |
      Saisie et exécution des commandes de syndication par rapport aux droits
      détenus et aux créneaux de livraison.
  BC-3740.60.20:
    name: Distribution des flux aux affiliés
    description: |
      Distribution des flux réseau et de chaînes aux affiliés broadcast avec
      transfert de localisation.
  BC-3740.60.30:
    name: Suivi des livraisons de programmes
    description: |
      Suivi des livraisons de programmes aux plateformes et partenaires,
      incluant la preuve de livraison et la gestion des exceptions.

locale: fr
source: L1-clinical-care-delivery-management.yaml
entries:
  BC-2810:
    name: Gestion de la prestation de soins cliniques
    description: |
      Fourniture de soins cliniques directs dans les contextes hospitalier, ambulatoire, d'urgence, chirurgical, maternel, de santé mentale, de rééducation et de soins à domicile.
  BC-2810.10:
    name: Prestation de soins hospitaliers
    description: |
      Fourniture de soins hospitaliers aigus, intermédiaires et intensifs, notamment l'évaluation à l'admission, les visites de soins, les soins au chevet et les opérations de soins intensifs.
  BC-2810.10.10:
    name: Évaluation à l'admission
    description: |
      Anamnèse et examen physique, évaluation infirmière et dépistage des risques à l'admission.
  BC-2810.10.20:
    name: Visites cliniques de soins
    description: |
      Visites cliniques multidisciplinaires et planification des soins au chevet du patient.
  BC-2810.10.30:
    name: Soins au chevet
    description: |
      Soins infirmiers et cliniques directs au chevet, incluant le soutien aux activités de la vie quotidienne.
  BC-2810.10.40:
    name: Opérations de soins intensifs
    description: |
      Opérations de réanimation incluant la ventilation mécanique, la surveillance hémodynamique et la surveillance continue.
  BC-2810.20:
    name: Prestation de soins ambulatoires
    description: |
      Fourniture de services ambulatoires, de télémédecine et de soins procéduraux en consultation externe et en hôpital de jour.
  BC-2810.20.10:
    name: Conduite des consultations ambulatoires
    description: |
      Réalisation des consultations en cabinet et en clinique, incluant les consultations de médecine générale et de spécialité.
  BC-2810.20.20:
    name: Prestation de procédures ambulatoires
    description: |
      Réalisation de procédures en ambulatoire et en hôpital de jour, notamment la chirurgie mineure et les perfusions.
  BC-2810.20.30:
    name: Prestation de consultations en télémédecine
    description: |
      Fourniture de consultations en télémédecine synchrones et asynchrones.
  BC-2810.20.40:
    name: Administration de traitements ambulatoires
    description: |
      Administration de traitements en consultation externe tels que la chimiothérapie, la dialyse et les perfusions.
  BC-2810.30:
    name: Prestation de soins d'urgence
    description: |
      Triage, stabilisation, prise en charge des traumatismes et décisions d'orientation aux urgences pour les soins non programmés.
  BC-2810.30.10:
    name: Triage aux urgences
    description: |
      Triage et attribution du niveau de gravité pour les patients se présentant aux urgences.
  BC-2810.30.20:
    name: Stabilisation aux urgences
    description: |
      Évaluation initiale, réanimation et stabilisation des patients en état critique ou traumatisés.
  BC-2810.30.30:
    name: Prise en charge des traumatismes
    description: |
      Activation du protocole traumatologique, mobilisation de l'équipe et soins de contrôle des dommages pour les traumatismes majeurs.
  BC-2810.30.40:
    name: Orientation depuis les urgences
    description: |
      Décisions d'orientation incluant l'hospitalisation, le transfert, l'observation et la sortie depuis les urgences.
  BC-2810.40:
    name: Prestation de soins chirurgicaux et procéduraux
    description: |
      Soins pré-, intra- et post-opératoires pour les procédures chirurgicales et interventionnelles dans les blocs opératoires et les salles de procédure.
  BC-2810.40.10:
    name: Soins préopératoires
    description: |
      Évaluation préopératoire, optimisation et prise en charge en salle d'attente préopératoire.
  BC-2810.40.20:
    name: Gestion peropératoire
    description: |
      Soins chirurgicaux, anesthésiques et de l'équipe circulante en peropératoire.
  BC-2810.40.30:
    name: Soins post-anesthésie
    description: |
      Réveil en salle de soins post-anesthésiques et évaluation de l'aptitude à la sortie.
  BC-2810.40.40:
    name: Endoscopie et procédures interventionnelles
    description: |
      Réalisation de procédures endoscopiques, de radiologie interventionnelle et de cardiologie interventionnelle.
  BC-2810.50:
    name: Prestation de soins maternels et néonatals
    description: |
      Soins anténatals, intrapartum, post-partum et néonatals dans les services de maternité et de néonatologie.
  BC-2810.50.10:
    name: Soins anténatals
    description: |
      Évaluation prénatale, dépistage et hospitalisations anténatales.
  BC-2810.50.20:
    name: Soins intrapartum
    description: |
      Gestion du travail et de l'accouchement, incluant la césarienne et l'accouchement instrumental.
  BC-2810.50.30:
    name: Soins post-partum
    description: |
      Rétablissement maternel post-partum, soutien à l'allaitement et éducation post-partum.
  BC-2810.50.40:
    name: Soins du nouveau-né
    description: |
      Soins en pouponnière, dépistage néonatal et soins en unité de soins intensifs néonatals.
  BC-2810.60:
    name: Prestation de soins en santé mentale
    description: |
      Soins de santé mentale comprenant l'évaluation psychiatrique, les unités psychiatriques hospitalières, la thérapie ambulatoire et le traitement des addictions.
  BC-2810.60.10:
    name: Évaluation psychiatrique
    description: |
      Évaluation psychiatrique et psychologique et intervention en situation de crise.
  BC-2810.60.20:
    name: Soins psychiatriques hospitaliers
    description: |
      Soins psychiatriques hospitaliers incluant la thérapie de milieu et le traitement pharmacologique.
  BC-2810.60.30:
    name: Thérapie comportementale ambulatoire
    description: |
      Psychothérapie ambulatoire, thérapie de groupe et programmes d'hospitalisation partielle.
  BC-2810.60.40:
    name: Soins pour les troubles liés aux substances
    description: |
      Services de désintoxication, de traitement médicamenteux de l'addiction et de réhabilitation.
  BC-2810.70:
    name: Services de rééducation et de thérapie
    description: |
      Services de kinésithérapie, d'ergothérapie, d'orthophonie et de réhabilitation cardiorespiratoire en milieu hospitalier et ambulatoire.
  BC-2810.70.10:
    name: Kinésithérapie
    description: |
      Évaluation et traitement en kinésithérapie dans les contextes hospitalier et ambulatoire.
  BC-2810.70.20:
    name: Ergothérapie
    description: |
      Évaluation et traitement en ergothérapie axés sur l'autonomie fonctionnelle.
  BC-2810.70.30:
    name: Orthophonie
    description: |
      Services de thérapie de la parole, du langage et de la déglutition.
  BC-2810.70.40:
    name: Rééducation cardiaque et pulmonaire
    description: |
      Mise en œuvre des programmes de réhabilitation cardiaque et pulmonaire.
  BC-2810.80:
    name: Prestation de soins à domicile et en communauté
    description: |
      Soins dispensés au domicile du patient ou en milieu communautaire, incluant les visites de soins à domicile, les soins palliatifs et la télésurveillance.
  BC-2810.80.10:
    name: Visites de soins à domicile
    description: |
      Visites de soins infirmiers et de thérapie qualifiés à domicile.
  BC-2810.80.20:
    name: Soins palliatifs et d'accompagnement à domicile
    description: |
      Soins de fin de vie et palliatifs dispensés au domicile du patient.
  BC-2810.80.30:
    name: Visites de santé communautaire
    description: |
      Visites de travailleurs de santé communautaire et programmes de sensibilisation.
  BC-2810.80.40:
    name: Soins par télésurveillance
    description: |
      Services de télésurveillance des patients pour les populations atteintes de maladies chroniques ou en post-aigu.

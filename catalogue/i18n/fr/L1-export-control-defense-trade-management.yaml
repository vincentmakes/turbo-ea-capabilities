locale: fr
source: L1-export-control-defense-trade-management.yaml
entries:
  BC-1790:
    name: Gestion du contrôle des exportations et du commerce de défense
    description: |
      Licences d'exportation, conformité ITAR/EAR, contrôle des transferts de technologie et divulgation à l'étranger.
  BC-1790.10:
    name: Gestion des licences d'exportation
    description: |
      Licences ITAR et EAR, demandes et conditions.
  BC-1790.10.10:
    name: Détermination de juridiction et classification à l'exportation
    description: |
      Détermination de juridiction ITAR/EAR et classification ECCN des articles.
  BC-1790.10.20:
    name: Demande de licence d'exportation
    description: |
      Demande de licences DSP (ITAR) et licences BIS (EAR).
  BC-1790.10.30:
    name: Conformité aux conditions des licences
    description: |
      Suivi et respect des conditions et stipulations des licences.
  BC-1790.10.40:
    name: Reporting d'utilisation des licences
    description: |
      Reporting périodique sur l'utilisation des licences accordées.
  BC-1790.20:
    name: Gestion du filtrage de conformité commerciale
    description: |
      Sanctions, parties interdites et filtrage des embargos.
  BC-1790.20.10:
    name: Filtrage des parties interdites
    description: |
      Filtrage par rapport aux listes de parties interdites et restreintes.
  BC-1790.20.20:
    name: Filtrage des pays sous sanctions
    description: |
      Filtrage des sanctions et des pays sous embargo.
  BC-1790.20.30:
    name: Filtrage des utilisations finales restreintes
    description: |
      Vérification diligente de l'utilisation finale et de l'utilisateur final.
  BC-1790.30:
    name: Gestion du contrôle des transferts de technologie
    description: |
      Diffusion contrôlée de la technologie et accords d'assistance technique.
  BC-1790.30.10:
    name: Contrôle de la diffusion des données techniques
    description: |
      Maîtrise de la diffusion des données techniques contrôlées.
  BC-1790.30.20:
    name: Gestion des accords d'assistance technique
    description: |
      Gestion des TAA, MLA et accords d'entrepôt.
  BC-1790.30.30:
    name: Gestion des exportations présumées
    description: |
      Gestion des exportations présumées aux ressortissants étrangers.
  BC-1790.40:
    name: Gestion de la conformité douanière et tarifaire
    description: |
      Douane de défense, carnets ATA et documentation import/export.
  BC-1790.40.10:
    name: Opérations douanières de défense
    description: |
      Opérations douanières spécifiques aux articles de défense.
  BC-1790.40.20:
    name: Gestion des carnets ATA
    description: |
      Gestion des carnets ATA pour les exportations temporaires de défense.
  BC-1790.40.30:
    name: Classification tarifaire et valorisation douanière
    description: |
      Classification tarifaire HS et valorisation en douane.
  BC-1790.50:
    name: Gestion de la divulgation aux pays étrangers
    description: |
      Décisions de divulgation, communicabilité et diffusions contrôlées.
  BC-1790.50.10:
    name: Décisions de divulgation aux pays étrangers
    description: |
      Prise de décision sur la divulgation d'informations contrôlées à des pays étrangers.
  BC-1790.50.20:
    name: Marquage de communicabilité
    description: |
      Marquage de communicabilité et contrôle de la diffusion.
  BC-1790.50.30:
    name: Contrôle des visites étrangères
    description: |
      Contrôle des visiteurs étrangers et approbation des demandes de visite.

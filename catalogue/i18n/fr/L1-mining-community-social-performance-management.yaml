locale: fr
source: L1-mining-community-social-performance-management.yaml
entries:
  BC-4500:
    name: Gestion des relations communautaires et de la performance sociale minière
    description: |
      Maintien de la licence sociale d'exploitation par l'engagement auprès des
      communautés hôtes, des peuples autochtones et propriétaires traditionnels,
      la réinstallation et l'accès aux terres, l'investissement communautaire,
      la contenu local, les droits humains et le rapport de performance sociale.
  BC-4500.10:
    name: Engagement des communautés hôtes
    description: |
      Identification, consultation et traitement des griefs des communautés hôtes
      affectées par les activités minières.
    in_scope:
      - Identification et cartographie des parties prenantes
      - Programmes de consultation communautaire
      - Mécanismes de gestion des griefs communautaires
    out_of_scope:
      - Engagement spécifique aux peuples autochtones (BC-4500.20)
      - Réinstallation (BC-4500.30)
  BC-4500.10.10:
    name: Cartographie des parties prenantes communautaires
    description: |
      Identification et cartographie des parties prenantes dans la zone
      d'influence de l'exploitation minière.
  BC-4500.10.20:
    name: Programme de consultation communautaire
    description: |
      Exploitation de forums de consultation communautaire structurés et de
      divulgation d'informations.
  BC-4500.10.30:
    name: Gestion des griefs communautaires
    description: |
      Mécanisme opérationnel de gestion des griefs communautaires aligné sur
      les critères d'efficacité des principes directeurs de l'ONU.
  BC-4500.20:
    name: Engagement des peuples autochtones et des propriétaires traditionnels
    description: |
      Engagement auprès des peuples autochtones et des propriétaires traditionnels,
      incluant les droits fonciers autochtones, le patrimoine culturel et les
      accords de partage des avantages.
  BC-4500.20.10:
    name: Engagement sur le titre autochtone et les droits fonciers
    description: |
      Engagement sur les droits fonciers autochtones et coutumiers affectant
      les opérations minières.
  BC-4500.20.20:
    name: Gestion du patrimoine culturel
    description: |
      Identification, protection et gestion des sites et valeurs du patrimoine
      culturel.
  BC-4500.20.30:
    name: Administration des accords d'utilisation des terres autochtones
    description: |
      Administration des accords d'utilisation des terres et de partage des
      avantages avec les communautés autochtones.
  BC-4500.30:
    name: Gestion de la réinstallation et de l'accès aux terres
    description: |
      Acquisition de terres, réinstallation involontaire et restauration des
      moyens de subsistance pour les populations affectées par les projets.
  BC-4500.30.10:
    name: Négociation de l'acquisition de terres
    description: |
      Négociation d'acquisitions volontaires de terres pour l'exploitation
      minière et les infrastructures associées.
  BC-4500.30.20:
    name: Planification de la réinstallation involontaire
    description: |
      Planification de la réinstallation involontaire conformément aux normes
      de performance de la SFI et aux régimes équivalents.
  BC-4500.30.30:
    name: Mise en œuvre du plan d'action de réinstallation
    description: |
      Mise en œuvre des plans d'action de réinstallation pour les ménages
      affectés par les projets.
  BC-4500.30.40:
    name: Opérations du programme de restauration des moyens de subsistance
    description: |
      Exploitation de programmes de restauration des moyens de subsistance pour
      les ménages déplacés et les communautés hôtes.
  BC-4500.40:
    name: Investissement et développement communautaires
    description: |
      Conception et mise en œuvre de programmes d'investissement communautaire
      et co-investissement dans les infrastructures et projets de développement
      locaux.
  BC-4500.40.10:
    name: Conception du programme d'investissement communautaire
    description: |
      Conception de programmes d'investissement communautaire pluriannuels
      alignés sur les plans de développement locaux.
  BC-4500.40.20:
    name: Co-investissement dans les infrastructures locales
    description: |
      Co-investissement dans les routes, l'eau, l'électricité et les
      infrastructures sociales partagées avec les communautés hôtes.
  BC-4500.40.30:
    name: Mise en œuvre des projets de développement communautaire
    description: |
      Mise en œuvre de projets de développement communautaire dans les domaines
      de la santé, de l'éducation et des moyens de subsistance.
  BC-4500.50:
    name: Gestion du contenu local et des achats
    description: |
      Développement des fournisseurs locaux, programmes d'emploi local et rapport
      sur les engagements en matière de contenu local.
  BC-4500.50.10:
    name: Développement des fournisseurs locaux
    description: |
      Développement et renforcement des capacités des fournisseurs locaux et
      appartenant à des autochtones.
  BC-4500.50.20:
    name: Gestion du programme d'emploi local
    description: |
      Gestion des programmes d'emploi local, de formation et d'apprentissage
      pour les travailleurs des communautés hôtes.
  BC-4500.50.30:
    name: Rapport sur le contenu local
    description: |
      Rapport sur les engagements de contenu local du gouvernement hôte et
      contractuels.
  BC-4500.60:
    name: Gestion des droits humains et de la sécurité
    description: |
      Diligence raisonnable en matière de droits humains, alignement sur les
      Principes volontaires sur la sécurité et les droits humains, et supervision
      de la conduite des prestataires de sécurité.
  BC-4500.60.10:
    name: Diligence raisonnable en matière de droits humains
    description: |
      Évaluation des impacts sur les droits humains au niveau du site et
      diligence raisonnable conformément aux principes directeurs de l'ONU.
  BC-4500.60.20:
    name: Conformité aux principes volontaires
    description: |
      Conformité aux Principes volontaires sur la sécurité et les droits humains
      dans l'ensemble des opérations de sécurité.
  BC-4500.60.30:
    name: Supervision de la conduite des prestataires de sécurité
    description: |
      Supervision de la conduite des prestataires de sécurité publics et privés
      autour des sites miniers.
  BC-4500.70:
    name: Rapport de performance sociale
    description: |
      Suivi des indicateurs de performance sociale, évaluation des impacts
      sociaux et divulgation externe de la performance sociale.
  BC-4500.70.10:
    name: Suivi des indicateurs de performance sociale
    description: |
      Suivi des indicateurs de performance sociale dans l'ensemble des opérations
      et des investissements.
  BC-4500.70.20:
    name: Évaluation des impacts sociaux
    description: |
      Évaluation périodique des impacts sociaux des opérations minières sur les
      communautés hôtes.
  BC-4500.70.30:
    name: Divulgation externe de la performance sociale
    description: |
      Divulgation externe de la performance sociale dans les rapports de
      développement durable et les dossiers réglementaires.

locale: fr
source: L1-population-health-management.yaml
entries:
  BC-2880:
    name: Gestion de la santé des populations
    description: |
      Stratification du risque, soins préventifs, gestion des maladies chroniques, opérations de soins à valeur ajoutée, gestion des panels et de la patientèle, et analyse de la population pour les cohortes attribuées et à risque.
  BC-2880.10:
    name: Stratification et identification du risque
    description: |
      Modélisation prédictive et identification des populations à risque croissant et présentant des lacunes dans les soins.
  BC-2880.10.10:
    name: Modélisation prédictive du risque
    description: |
      Développement et exploitation de modèles de risque prédictifs pour les coûts et les résultats cliniques.
  BC-2880.10.20:
    name: Identification des patients à risque croissant
    description: |
      Identification des patients à risque croissant pour une intervention précoce.
  BC-2880.10.30:
    name: Définition des cohortes
    description: |
      Définition et maintenance des cohortes cliniques pour les programmes de santé des populations.
  BC-2880.10.40:
    name: Identification des lacunes dans les soins
    description: |
      Identification des lacunes dans les soins fondées sur les données probantes au sein des populations.
  BC-2880.20:
    name: Soins préventifs et promotion de la santé
    description: |
      Programmes de dépistage, de vaccination, d'évaluation du risque de santé et de coaching en bien-être.
  BC-2880.20.10:
    name: Actions de sensibilisation au dépistage
    description: |
      Sensibilisation aux dépistages préventifs fondés sur les données probantes.
  BC-2880.20.20:
    name: Programmes de vaccination
    description: |
      Mise en œuvre des programmes de vaccination pour les adultes et les enfants.
  BC-2880.20.30:
    name: Évaluation du risque de santé
    description: |
      Réalisation et suivi des évaluations du risque de santé.
  BC-2880.20.40:
    name: Coaching en bien-être
    description: |
      Mise en œuvre des programmes de coaching de mode de vie et de bien-être.
  BC-2880.30:
    name: Gestion des maladies chroniques
    description: |
      Programmes de gestion spécifiques aux maladies chroniques les plus répandues.
  BC-2880.30.10:
    name: Programmes de prise en charge du diabète
    description: |
      Programmes de gestion du diabète incluant l'éducation thérapeutique et la télésurveillance.
  BC-2880.30.20:
    name: Programmes de prise en charge des maladies cardiovasculaires
    description: |
      Programmes de gestion des maladies cardiovasculaires et de l'hypertension.
  BC-2880.30.30:
    name: Intégration de la santé mentale
    description: |
      Intégration de la santé mentale dans la gestion des soins primaires et des maladies chroniques.
  BC-2880.30.40:
    name: Programmes de prise en charge des maladies respiratoires
    description: |
      Programmes pour l'asthme, la bronchopneumopathie chronique obstructive et les maladies respiratoires.
  BC-2880.40:
    name: Opérations de soins à valeur ajoutée
    description: |
      Opérations soutenant les organisations de soins responsables, les paiements groupés et les programmes contractuels à valeur ajoutée.
  BC-2880.40.10:
    name: Opérations des organisations de soins responsables
    description: |
      Opérations des organisations de soins responsables et des programmes de partage des économies.
  BC-2880.40.20:
    name: Opérations des paiements groupés
    description: |
      Opérations soutenant les programmes de paiements groupés par épisode.
  BC-2880.40.30:
    name: Suivi des performances qualité
    description: |
      Suivi des performances qualité par rapport aux exigences des programmes à valeur ajoutée.
  BC-2880.40.40:
    name: Réconciliation du partage des économies
    description: |
      Réconciliation des règlements de partage des économies et de partage du risque avec les payeurs.
  BC-2880.50:
    name: Gestion des panels et de la patientèle
    description: |
      Inscription des patients auprès des soignants, dimensionnement des panels, suivi de la continuité et réconciliation de l'attribution.
  BC-2880.50.10:
    name: Inscription patient-soignant
    description: |
      Attribution des patients aux soignants de médecine générale et aux équipes de soins.
  BC-2880.50.20:
    name: Gestion de la taille du panel
    description: |
      Gestion de la taille, de la composition et de la capacité du panel.
  BC-2880.50.30:
    name: Suivi de la continuité des soins
    description: |
      Suivi des indicateurs de continuité des soins au sein des panels.
  BC-2880.50.40:
    name: Réconciliation de l'attribution
    description: |
      Réconciliation des listes d'attribution des payeurs avec les données internes du panel.
  BC-2880.60:
    name: Analyse et rapports sur la population
    description: |
      Analyses au niveau populationnel couvrant l'équité, les performances des programmes qualité, les coûts, l'utilisation et l'étalonnage des résultats.
  BC-2880.60.10:
    name: Analyse de l'équité en santé
    description: |
      Analyse des disparités, des déterminants sociaux et des résultats en matière d'équité.
  BC-2880.60.20:
    name: Déclarations des programmes qualité
    description: |
      Rapports sur les programmes qualité tels que les évaluations par étoiles et les indicateurs de qualité.
  BC-2880.60.30:
    name: Analyse des coûts et de l'utilisation
    description: |
      Analyse des coûts, de l'utilisation et des dépenses évitables.
  BC-2880.60.40:
    name: Étalonnage des résultats
    description: |
      Comparaison des résultats cliniques avec des données de référence nationales et par pairs.

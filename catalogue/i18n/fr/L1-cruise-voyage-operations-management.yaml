locale: fr
source: L1-cruise-voyage-operations-management.yaml
entries:
  BC-4090:
    name: Gestion des opérations de croisière
    description: |
      Exploitation des voyages en croisière — planification des itinéraires, opérations portuaires et d'excursions à terre, opérations à bord dans les cabines et programmes passagers, opérations marines et de passerelle, embarquement, et hygiène et assainissement à bord — dans le respect des réglementations maritimes internationales.
    in_scope:
      - Conception et déploiement des itinéraires de voyage
      - Escales, opérations de tender et vente et délivrance d'excursions à terre
      - Opérations de cabines, programmes et service aux passagers à bord
      - Opérations marines, de passerelle et de salle des machines
      - Opérations d'embarquement et de débarquement
      - Opérations d'hygiène et d'assainissement à bord
    out_of_scope:
      - Vente et distribution de croisières (BC-4010, BC-4020)
      - Opérations hôtelières dans les établissements terrestres (BC-4060)
  BC-4090.10:
    name: Planification des itinéraires de voyage
    description: |
      Planification des itinéraires de voyage, du déploiement, des repositionnements et des décisions de substitution d'itinéraire.
  BC-4090.10.10:
    name: Conception et déploiement des itinéraires
    description: |
      Conception des itinéraires de croisière et affectation des navires aux saisons de déploiement.
  BC-4090.10.20:
    name: Planification des repositionnements et des voyages charters
    description: |
      Planification des voyages de repositionnement et des déploiements charters entre les saisons.
  BC-4090.10.30:
    name: Séquençage des escales
    description: |
      Séquençage des escales dans un itinéraire en tenant compte des marées, des temps de rotation et des accords partenaires.
  BC-4090.10.40:
    name: Modification et substitution d'itinéraire
    description: |
      Modification et substitution en direct des itinéraires en raison d'événements météorologiques, médicaux ou géopolitiques.
  BC-4090.20:
    name: Opérations portuaires et d'excursions à terre
    description: |
      Opérations lors des escales incluant les rotations en escale, les opérations de tender, et le catalogue, la vente et la délivrance d'excursions à terre.
  BC-4090.20.10:
    name: Opérations de rotation en escale
    description: |
      Coordination des opérations de rotation en escale incluant l'avitaillement, les déchets et les changements d'équipage.
  BC-4090.20.20:
    name: Opérations de tender
    description: |
      Exploitation des services de tender vers et depuis les ports en rade.
  BC-4090.20.30:
    name: Catalogue et vente d'excursions à terre
    description: |
      Catalogue et vente d'excursions à terre aux passagers via les canaux avant la croisière et à bord.
  BC-4090.20.40:
    name: Coordination de la délivrance des excursions à terre
    description: |
      Coordination de la délivrance des excursions à terre incluant la passation aux opérateurs locaux et le rapprochement des passagers.
  BC-4090.30:
    name: Opérations de cabines et suites à bord
    description: |
      Opérations de cabines et suites à bord incluant les changements de configuration, l'attribution, la vente d'upsell en cours de voyage et le service en suite de prestige.
  BC-4090.30.10:
    name: Opérations de changement de configuration des cabines
    description: |
      Opérations de changement de configuration des cabines lors de l'embarquement et des jours de changement de passagers.
  BC-4090.30.20:
    name: Attribution des cabines et upsell
    description: |
      Attribution des cabines et exécution des décisions d'upsell avant et pendant le voyage.
  BC-4090.30.30:
    name: Opérations de maintenance des cabines
    description: |
      Maintenance des équipements et des finitions des cabines pendant le voyage.
  BC-4090.30.40:
    name: Opérations de service en suite de prestige
    description: |
      Opérations de service pour les suites de prestige et les cabines avec service de majordome.
  BC-4090.40:
    name: Opérations du programme passagers à bord
    description: |
      Animation, activités, clubs enfants et exploitation des espaces spécialisés à bord pendant le voyage.
  BC-4090.40.10:
    name: Opérations du programme de divertissement
    description: |
      Exploitation des programmes de divertissement en théâtre, salon et spectacles vedettes à bord.
  BC-4090.40.20:
    name: Opérations d'activités et d'enrichissement
    description: |
      Exploitation des programmes d'activités et d'enrichissement incluant les conférences, ateliers et sports.
  BC-4090.40.30:
    name: Opérations des programmes enfants et jeunesse
    description: |
      Exploitation des programmes enfants et jeunesse incluant des activités adaptées à l'âge et la supervision.
  BC-4090.40.40:
    name: Réservations des espaces spécialisés
    description: |
      Réservations à bord pour les restaurants gastronomiques, le spa et les événements payants.
  BC-4090.50:
    name: Opérations marines et de passerelle
    description: |
      Opérations marines et de passerelle couvrant la navigation, la propulsion, la documentation portuaire et la coordination de l'avitaillement.
  BC-4090.50.10:
    name: Opérations de passerelle et de navigation
    description: |
      Quarts de veille à la passerelle et opérations de navigation pendant le voyage.
  BC-4090.50.20:
    name: Opérations de salle des machines et de propulsion
    description: |
      Quarts de veille en salle des machines et opérations de propulsion.
  BC-4090.50.30:
    name: Documentation portuaire et dédouanement
    description: |
      Préparation de la documentation portuaire et gestion du contrôle par l'État du port et du dédouanement.
  BC-4090.50.40:
    name: Coordination de l'avitaillement et de l'approvisionnement
    description: |
      Coordination de l'avitaillement en combustible et de l'approvisionnement lors des escales.
  BC-4090.60:
    name: Opérations d'embarquement et de débarquement
    description: |
      Opérations d'embarquement et de débarquement incluant la vérification des documents avant l'embarquement, le dédouanement et la gestion des bagages à bord.
  BC-4090.60.10:
    name: Vérification des documents avant l'embarquement
    description: |
      Vérification des documents de voyage et des attestations sanitaires des passagers avant l'embarquement.
  BC-4090.60.20:
    name: Opérations de flux d'embarquement
    description: |
      Exploitation des flux d'embarquement du terminal au navire selon les fenêtres d'arrivée par groupes.
  BC-4090.60.30:
    name: Débarquement et dédouanement
    description: |
      Exploitation des flux de débarquement incluant le contrôle douanier et l'immigration au port.
  BC-4090.60.40:
    name: Opérations de bagages à bord
    description: |
      Exploitation du flux des bagages à l'embarquement, la livraison en cabine et le débarquement.
  BC-4090.70:
    name: Opérations d'hygiène et d'assainissement à bord
    description: |
      Opérations d'hygiène et d'assainissement à bord incluant la préparation aux inspections, la détection et la réponse aux épidémies, et l'assainissement de l'eau et des piscines.
  BC-4090.70.10:
    name: Préparation aux inspections d'assainissement
    description: |
      Maintien de la préparation aux inspections selon les régimes VSP, USPH et équivalents.
  BC-4090.70.20:
    name: Détection des épidémies à bord
    description: |
      Détection des épidémies gastro-intestinales et respiratoires par la surveillance à bord.
  BC-4090.70.30:
    name: Opérations de réponse aux épidémies
    description: |
      Opérations de réponse lors des épidémies incluant le confinement et le reporting.
  BC-4090.70.40:
    name: Assainissement de l'eau potable et des piscines
    description: |
      Opérations d'assainissement des systèmes d'eau potable et des eaux de loisirs à bord.

    name: Définition du cas d'affaires
    description: |
      Cas d'affaires et justification économique pour les nouveaux produits.
  BC-820.20:
    name: Gestion de la conception produit
    description: |
      Conception produit, ingénierie et revues de conception.
  BC-820.20.10:
    name: Ingénierie de conception produit
    description: |
      Conception détaillée du produit et analyse d'ingénierie.

    description: |
      Rédaction des spécifications produit et de la documentation technique.
  BC-820.30.30:
    name: Définition de la nomenclature produit
    description: |
      Définition des structures de nomenclature et des révisions.
  BC-820.30.40:
    name: Gestion des données produit
    description: |
      PDM pour les données produit, plans et assemblages CAO.
  BC-820.40:
    name: Gestion des configurations et variantes produit
    description: |

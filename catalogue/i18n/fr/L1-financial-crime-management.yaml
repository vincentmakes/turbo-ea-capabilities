locale: fr
source: L1-financial-crime-management.yaml
entries:
  BC-1400:
    name: Gestion de la criminalité financière
    description: |
      Surveillance des transactions LBA, criblage des sanctions, détection de la fraude et déclaration d'activités suspectes.
  BC-1400.10:
    name: Gestion de la surveillance des transactions LBA
    description: |
      Règles, alertes et scénarios de surveillance LBA.
  BC-1400.10.10:
    name: Conception des scénarios et règles LBA
    description: |
      Conception des scénarios, règles et seuils de surveillance LBA.
  BC-1400.10.20:
    name: Génération des alertes LBA
    description: |
      Génération des alertes LBA issues de la surveillance des transactions.
  BC-1400.10.30:
    name: Triage des alertes LBA
    description: |
      Triage et priorisation des alertes LBA fondée sur le risque.
  BC-1400.10.40:
    name: Calibration et validation des modèles LBA
    description: |
      Calibration, validation et revue d'efficacité des modèles LBA.
  BC-1400.20:
    name: Gestion du criblage des sanctions
    description: |
      Listes de sanctions, criblage des noms et des transactions, traitement des correspondances.
  BC-1400.20.10:
    name: Gestion des listes de sanctions
    description: |
      Agrégation et maintenance des listes de surveillance des sanctions.
  BC-1400.20.20:
    name: Criblage des noms clients
    description: |
      Criblage des clients et contreparties par rapport aux sanctions.
  BC-1400.20.30:
    name: Criblage des transactions sur sanctions
    description: |
      Criblage en temps réel des transactions par rapport aux listes de sanctions.
  BC-1400.20.40:
    name: Traitement des correspondances sanctions
    description: |
      Investigation et traitement des correspondances identifiées.
  BC-1400.30:
    name: Gestion de la détection et de l'investigation de la fraude
    description: |
      Détection de la fraude sur les produits et canaux, investigations.
  BC-1400.30.10:
    name: Détection de la fraude à la souscription
    description: |
      Détection de la fraude au stade de la demande client ou produit.
  BC-1400.30.20:
    name: Détection de la fraude transactionnelle
    description: |
      Détection en temps réel des transactions frauduleuses.
  BC-1400.30.30:
    name: Investigation sur la fraude
    description: |
      Investigation et résolution des dossiers de fraude.
  BC-1400.30.40:
    name: Gestion des pertes et récupérations liées à la fraude
    description: |
      Suivi des pertes liées à la fraude et des efforts de récupération.
  BC-1400.30.50:
    name: Traitement de la fraude par virement autorisé
    description: |
      Traitement des dossiers de fraude par virement autorisé et remboursement.
  BC-1400.40:
    name: Gestion des déclarations d'activités suspectes
    description: |
      Dépôt des SAR/STR et déclarations réglementaires.
  BC-1400.40.10:
    name: Rédaction et dépôt des SAR
    description: |
      Rédaction et dépôt des SAR/STR auprès des cellules de renseignement financier.
  BC-1400.40.20:
    name: Reporting réglementaire sur la criminalité financière
    description: |
      Reporting réglementaire périodique sur la criminalité financière.
  BC-1400.40.30:
    name: Liaison avec les autorités judiciaires
    description: |
      Liaison avec les autorités judiciaires et traitement des demandes d'information.
  BC-1400.50:
    name: Gestion des enquêtes sur la criminalité financière
    description: |
      Gestion des dossiers, investigations et escalade.
  BC-1400.50.10:
    name: Gestion des dossiers
    description: |
      Gestion des dossiers d'enquête sur la criminalité financière.
  BC-1400.50.20:
    name: Conduite des investigations
    description: |
      Conduite des investigations et collecte des preuves.
  BC-1400.50.30:
    name: Escalade et clôture
    description: |
      Escalade, prise de décision et clôture des dossiers d'enquête.

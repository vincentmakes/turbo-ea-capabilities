locale: fr
source: L1-civil-records-identity-registration-management.yaml
entries:
  BC-3290:
    name: Gestion de l'état civil et de l'enregistrement de l'identité
    description: |
      Enregistrement officiel et gestion des actes civils et statutaires incluant les événements
      d'état civil, l'identité nationale, les registres des entreprises et des entités,
      et le cadastre, ainsi que les contrôles d'authentification, de divulgation et de protection
      de la vie privée.
  BC-3290.10:
    name: Gestion des actes d'état civil
    description: |
      Enregistrement des événements d'état civil incluant les naissances, les décès, les mariages,
      les unions civiles et les divorces.
    in_scope:
      - Enregistrement des naissances, décès, mariages et divorces
      - Certification des événements d'état civil
      - Extraction des statistiques de l'état civil
    out_of_scope:
      - Attribution du numéro d'identité nationale (couverte par l'enregistrement de l'identité nationale)
  BC-3290.10.10:
    name: Enregistrement des naissances
    description: |
      Enregistrement des naissances et délivrance des actes de naissance.
  BC-3290.10.20:
    name: Enregistrement des décès
    description: |
      Enregistrement des décès et délivrance des actes de décès.
  BC-3290.10.30:
    name: Enregistrement des mariages et des unions civiles
    description: |
      Enregistrement des mariages et des unions civiles et délivrance des certificats.
  BC-3290.10.40:
    name: Enregistrement des divorces et des annulations
    description: |
      Enregistrement des divorces, des annulations et des jugements de dissolution.
  BC-3290.20:
    name: Enregistrement de l'identité nationale
    description: |
      Établissement, maintenance et authentification des dossiers et justificatifs
      d'identité nationale fondatrice.
  BC-3290.20.10:
    name: Enrôlement d'identité
    description: |
      Enrôlement des citoyens et des résidents dans le système d'identité nationale.
  BC-3290.20.20:
    name: Capture biométrique et déduplication
    description: |
      Capture, déduplication et appariement des identifiants biométriques.
  BC-3290.20.30:
    name: Émission des justificatifs d'identité
    description: |
      Production et émission des cartes d'identité nationale et des justificatifs numériques.
  BC-3290.20.40:
    name: Mise à jour et cycle de vie de l'identité
    description: |
      Mise à jour des attributs d'identité, gestion des événements du cycle de vie et renouvellement des justificatifs.
  BC-3290.30:
    name: Gestion du registre des entreprises et des entités
    description: |
      Immatriculation des sociétés, des partenariats, des associations et des autres entités
      juridiques et maintenance des dossiers d'entités faisant autorité.
  BC-3290.30.10:
    name: Immatriculation des entités
    description: |
      Immatriculation des sociétés, des partenariats, des associations et des autres entités.
  BC-3290.30.20:
    name: Traitement des dépôts annuels
    description: |
      Réception et traitement des rapports annuels, des comptes et des dépôts des administrateurs.
  BC-3290.30.30:
    name: Gestion du registre des bénéficiaires effectifs
    description: |
      Maintenance des divulgations de bénéficiaires effectifs et de contrôle.
  BC-3290.30.40:
    name: Dissolution et radiation des entités
    description: |
      Radiation, dissolution et réhabilitation des entités juridiques.
  BC-3290.40:
    name: Gestion du registre foncier et du cadastre
    description: |
      Enregistrement des titres fonciers, des servitudes, des charges et des parcelles cadastrales
      et maintenance des dossiers fonciers faisant autorité.
  BC-3290.40.10:
    name: Enregistrement des titres
    description: |
      Enregistrement des titres fonciers, des transferts et des droits réels.
  BC-3290.40.20:
    name: Enregistrement des charges et des sûretés
    description: |
      Enregistrement des hypothèques, servitudes et autres charges.
  BC-3290.40.30:
    name: Maintenance du levé cadastral
    description: |
      Maintenance des limites des parcelles cadastrales et des dossiers de levé.
  BC-3290.50:
    name: Authentification des actes et apostille
    description: |
      Authentification des documents publics pour usage national et international
      incluant les services d'apostille en vertu de la Convention de La Haye.
  BC-3290.50.10:
    name: Authentification des documents
    description: |
      Authentification des documents publics à des fins juridiques et administratives.
  BC-3290.50.20:
    name: Délivrance des apostilles
    description: |
      Délivrance des certifications d'apostille en vertu de la Convention de La Haye de 1961.
  BC-3290.50.30:
    name: Coordination des services notariaux
    description: |
      Coordination des services notariaux lorsqu'ils sont fournis par le gouvernement.
  BC-3290.60:
    name: Divulgation des actes et protection de la vie privée
    description: |
      Divulgation contrôlée, caviardage et gestion de la vie privée des actes civils et statutaires.
  BC-3290.60.10:
    name: Services de recherche publique
    description: |
      Fourniture de services de recherche et de certification accessibles au public sur les registres civils.
  BC-3290.60.20:
    name: Traitement des divulgations restreintes
    description: |
      Traitement des divulgations restreintes incluant les adoptions, la protection des témoins et les restrictions de sécurité.
  BC-3290.60.30:
    name: Protection de la vie privée et caviardage des actes
    description: |
      Application des contrôles de protection de la vie privée et du caviardage aux actes civils avant divulgation.

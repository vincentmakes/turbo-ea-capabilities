locale: fr
source: L1-telecom-service-assurance-management.yaml
entries:
  BC-2630:
    name: Gestion de l'assurance de service télécom
    description: |
      Gestion des performances de niveau de service, de la qualité, des incidents
      et de l'expérience client par rapport aux objectifs contractuels — ancrée
      sur l'eTOM Service Assurance, l'ITU-T E.800 et l'Open API SLA du TM Forum.
  BC-2630.10:
    name: Gestion des niveaux de service
    description: |
      Définition, surveillance, reporting et gestion des manquements aux accords
      de niveau de service avec les clients et partenaires.
  BC-2630.10.10:
    name: Définition des niveaux de service
    description: |
      Définition des objectifs de SLA, des métriques et des méthodes de mesure
      par offre de service.
  BC-2630.10.20:
    name: Surveillance des niveaux de service
    description: |
      Surveillance des performances de service mesurées par rapport aux
      engagements de SLA.
  BC-2630.10.30:
    name: Reporting des niveaux de service
    description: |
      Reporting des résultats de SLA aux clients, partenaires et parties prenantes
      internes.
  BC-2630.10.40:
    name: Gestion des manquements aux niveaux de service
    description: |
      Traitement des manquements aux SLA incluant le calcul des crédits et la
      remédiation client.
  BC-2630.20:
    name: Surveillance des performances des services
    description: |
      Surveillance continue des KPI de service de bout en bout et des indicateurs
      d'expérience client pour détecter les dégradations.
  BC-2630.20.10:
    name: Surveillance des KPI de service de bout en bout
    description: |
      Surveillance des KPI de service de bout en bout agrégés sur les domaines
      réseau sous-jacents.
  BC-2630.20.20:
    name: Surveillance des indicateurs d'expérience client
    description: |
      Surveillance des indicateurs de style QoE reflétant la qualité de service
      perçue par le client.
  BC-2630.20.30:
    name: Détection de la dégradation des services
    description: |
      Détection précoce des schémas de dégradation de service avant l'impact
      sur les clients.
  BC-2630.30:
    name: Gestion des incidents affectant les clients
    description: |
      Gestion de bout en bout des incidents affectant les clients — détection,
      notification, escalade et revue.
  BC-2630.30.10:
    name: Détection des incidents clients
    description: |
      Détection des incidents impactant un ou plusieurs clients, s'appuyant
      sur les signaux réseau et client.
  BC-2630.30.20:
    name: Notification des incidents clients
    description: |
      Notification des clients et canaux impactés avec les informations de
      statut, ETA et solutions de contournement.
  BC-2630.30.30:
    name: Escalade des incidents
    description: |
      Escalade des incidents impactant les clients selon les politiques de
      sévérité et de durée.
  BC-2630.30.40:
    name: Revue post-incident
    description: |
      Revue structurée des incidents significatifs affectant les clients pour
      conduire des actions correctives.
  BC-2630.40:
    name: Gestion de la qualité de service
    description: |
      Mesure, modélisation et reporting de la qualité de service et de
      l'expérience client, incluant les rapports réglementaires.
  BC-2630.40.10:
    name: Mesure de la qualité de service
    description: |
      Mesure des paramètres de QoS tels que la latence, les pertes, la gigue
      et le débit par service.
  BC-2630.40.20:
    name: Modélisation de la qualité d'expérience
    description: |
      Modélisation de la qualité d'expérience perçue par le client à partir
      des signaux réseau et comportementaux.
  BC-2630.40.30:
    name: Reporting de la qualité de service
    description: |
      Reporting des métriques de qualité de service aux parties prenantes internes
      et aux régulateurs.
  BC-2630.50:
    name: Coordination de la restauration des services
    description: |
      Coordination des activités de restauration, des solutions de contournement
      et de la validation du rétablissement pour les services dégradés.
  BC-2630.50.10:
    name: Flux de travail de restauration des services
    description: |
      Orchestration des tâches de restauration entre les équipes réseau et
      terrain.
  BC-2630.50.20:
    name: Coordination des solutions de contournement
    description: |
      Coordination des solutions de contournement temporaires et des routes
      alternatives pendant les perturbations prolongées.
  BC-2630.50.30:
    name: Validation du rétablissement des services
    description: |
      Validation que le service a été rétabli à la référence et que les clients
      ne sont plus impactés.
  BC-2630.60:
    name: Gestion de l'expérience client
    description: |
      Mesure de l'expérience client autour des événements de service et
      sensibilisation proactive pour atténuer l'insatisfaction.
  BC-2630.60.10:
    name: Mesure du NPS lié aux événements de service
    description: |
      Mesure de la satisfaction client et du NPS dans le contexte des événements
      affectant le service.
  BC-2630.60.20:
    name: Signalement du risque de résiliation
    description: |
      Identification des clients présentant un risque de résiliation accru suite
      aux incidents de service.
  BC-2630.60.30:
    name: Sensibilisation proactive des clients
    description: |
      Prise de contact proactive avec les clients impactés avec des excuses,
      des crédits et des offres de fidélisation.

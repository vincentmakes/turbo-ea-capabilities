locale: fr
source: L1-refining-operations-management.yaml
entries:
  BC-3080:
    name: Gestion des opérations de raffinage
    description: |
      Exploitation des raffineries de pétrole brut — distillation, conversion,
      traitement, mélange, économie de raffinerie, gestion des catalyseurs et
      coordination des arrêts de maintenance.
  BC-3080.10:
    name: Opérations de distillation du brut
    description: |
      Exploitation des unités de distillation atmosphérique et sous vide du pétrole brut
      et gestion des transitions de slate de brut.
  BC-3080.10.10:
    name: Opérations de distillation atmosphérique
    description: |
      Exploitation des colonnes de distillation atmosphérique du brut et des trains de pré-flash.
  BC-3080.10.20:
    name: Opérations de distillation sous vide
    description: |
      Exploitation des colonnes de distillation sous vide et des systèmes de tête.
  BC-3080.10.30:
    name: Changement de qualité de brut
    description: |
      Gestion opérationnelle des changements de composition du brut et des transitions de slate.
  BC-3080.20:
    name: Opérations des unités de conversion
    description: |
      Exploitation des unités de craquage catalytique, d'hydrocraquage, de cokéfaction
      et de reformage.
  BC-3080.20.10:
    name: Opérations de craquage catalytique en lit fluidisé
    description: |
      Exploitation des unités de craquage catalytique en lit fluidisé et des régénérateurs.
  BC-3080.20.20:
    name: Opérations d'hydrocraquage
    description: |
      Exploitation des hydrocrackers à simple et à double étage.
  BC-3080.20.30:
    name: Opérations de cokéfaction
    description: |
      Exploitation des unités de cokéfaction différée, de cokéfaction en lit fluidisé et de flexicoker.
  BC-3080.20.40:
    name: Opérations de reformage
    description: |
      Exploitation des reformeurs catalytiques pour la production d'octane et d'aromatiques.
  BC-3080.30:
    name: Opérations de traitement et d'hydrotraitement
    description: |
      Exploitation des unités d'hydrotraitement, de récupération du soufre et d'adoucissement des produits.
  BC-3080.30.10:
    name: Opérations d'hydrotraitement
    description: |
      Exploitation des unités d'hydrotraitement du naphta, des distillats et du gazole.
  BC-3080.30.20:
    name: Opérations de récupération du soufre et de traitement des gaz de queue
    description: |
      Exploitation des unités de récupération du soufre et de traitement des gaz de queue.
  BC-3080.30.30:
    name: Opérations d'adoucissement
    description: |
      Exploitation des unités d'adoucissement des produits à base de caustique et d'adsorbants.
  BC-3080.40:
    name: Opérations de mélange des produits
    description: |
      Mélange en ligne et en réservoir des produits finis selon spécification.
  BC-3080.40.10:
    name: Mélange d'essence
    description: |
      Mélange multi-composants d'essence selon les spécifications de grade.
  BC-3080.40.20:
    name: Mélange de distillats
    description: |
      Mélange de diesel et de kérosène incluant l'incorporation de biocarburants.
  BC-3080.40.30:
    name: Mélange de soutes marines
    description: |
      Mélange de combustibles marins selon les spécifications ISO 8217.
  BC-3080.40.40:
    name: Mélange de conformité aux spécifications
    description: |
      Optimisation des spécifications en temps réel et émission de certificats de qualité.
  BC-3080.50:
    name: Planification et économie de la raffinerie
    description: |
      Sélection du brut par programmation linéaire, optimisation des marges et rapports sur
      les rendements de raffinerie.
  BC-3080.50.10:
    name: Modélisation par programmation linéaire
    description: |
      Maintenance et exploitation des modèles LP de raffinerie pour la planification et l'économie.
  BC-3080.50.20:
    name: Économie de sélection du brut
    description: |
      Évaluation économique des achats de brut candidats et des options de slate.
  BC-3080.50.30:
    name: Optimisation des marges
    description: |
      Optimisation à court terme des marges d'exploitation et replanification.
  BC-3080.50.40:
    name: Rapports sur les rendements de raffinerie
    description: |
      Rapport des rendements réels par rapport au plan et aux références de marché.
  BC-3080.60:
    name: Gestion des catalyseurs et des produits chimiques de raffinerie
    description: |
      Gestion du cycle de vie des catalyseurs de procédé et des stocks de produits chimiques de raffinerie.
  BC-3080.60.10:
    name: Gestion du cycle de vie des catalyseurs
    description: |
      Planification du chargement, surveillance en service et remplacement des catalyseurs.
  BC-3080.60.20:
    name: Coordination de la régénération des catalyseurs
    description: |
      Coordination des campagnes de régénération in situ et ex situ des catalyseurs.
  BC-3080.60.30:
    name: Gestion des stocks de produits chimiques de raffinerie
    description: |
      Gestion des stocks et de la consommation des produits chimiques de procédé.
  BC-3080.70:
    name: Coordination des arrêts et de la maintenance majeure
    description: |
      Coordination du périmètre, du calendrier et de l'exécution des grands arrêts de raffinerie.
  BC-3080.70.10:
    name: Gestion du périmètre des arrêts
    description: |
      Définition et gel du périmètre des arrêts incluant le processus de remise en cause.
  BC-3080.70.20:
    name: Gestion du calendrier des arrêts
    description: |
      Planification détaillée des arrêts et contrôle de l'avancement.
  BC-3080.70.30:
    name: Coordination de l'arrêt et du redémarrage
    description: |
      Coordination séquencée de l'arrêt, de la décontamination et du redémarrage des unités.

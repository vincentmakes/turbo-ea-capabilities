locale: fr
source: L1-defense-logistics-management.yaml
entries:
  BC-1720:
    name: Gestion de la logistique de défense
    description: |
      Disponibilité du matériel, soutien en service, logistique de déploiement et logistique en théâtre.
  BC-1720.10:
    name: Gestion de la disponibilité du matériel
    description: |
      Comptes rendus de disponibilité opérationnelle et disponibilité des flottes et équipements.
  BC-1720.10.10:
    name: Suivi de la disponibilité des équipements
    description: |
      Suivi de la disponibilité et de l'état de serviceabilité des équipements.
  BC-1720.10.20:
    name: Compte rendu de disponibilité opérationnelle
    description: |
      Comptes rendus périodiques de disponibilité opérationnelle au commandement.
  BC-1720.10.30:
    name: Amélioration du taux de disponibilité opérationnelle
    description: |
      Initiatives d'amélioration du taux de disponibilité opérationnelle.
  BC-1720.20:
    name: Gestion des stocks de défense
    description: |
      Classes I à IX de ravitaillement militaire et réserves de guerre.
  BC-1720.20.10:
    name: Gestion des stocks classes I à V
    description: |
      Gestion des stocks de subsistance, carburant, munitions et consommables.
  BC-1720.20.20:
    name: Gestion des stocks classes VII à IX
    description: |
      Gestion des stocks de grands équipements et de pièces de rechange.
  BC-1720.20.30:
    name: Gestion des réserves de guerre
    description: |
      Gestion des réserves de guerre et des stocks pré-positionnés.
  BC-1720.20.40:
    name: Gestion des stocks de munitions
    description: |
      Gestion des stocks de munitions et d'explosifs.
  BC-1720.30:
    name: Gestion du déploiement et de la distribution
    description: |
      Logistique de déploiement stratégique et tactique.
  BC-1720.30.10:
    name: Planification du déploiement stratégique
    description: |
      Planification du déploiement stratégique et du TPFDD.
  BC-1720.30.20:
    name: Opérations de transport stratégique
    description: |
      Opérations de transport stratégique aérien, maritime et terrestre.
  BC-1720.30.30:
    name: Distribution en théâtre
    description: |
      Distribution et logistique de soutien en théâtre d'opérations.
  BC-1720.30.40:
    name: Réception interarmées et acheminement
    description: |
      Réception, mise en condition et acheminement interarmées.
  BC-1720.40:
    name: Gestion de la maintenance de défense
    description: |
      Maintenance organique et sous contrat aux niveaux dépôt, intermédiaire et unité.
  BC-1720.40.10:
    name: Maintenance au niveau unité
    description: |
      Maintenance au niveau unité (niveau O).
  BC-1720.40.20:
    name: Maintenance au niveau intermédiaire
    description: |
      Maintenance et réparation au niveau intermédiaire (niveau I).
  BC-1720.40.30:
    name: Maintenance au niveau dépôt
    description: |
      Maintenance et révision au niveau dépôt (niveau D).
  BC-1720.40.40:
    name: Soutien logistique contractuel
    description: |
      Arrangements de soutien logistique par prestataires.
  BC-1720.50:
    name: Gestion des pièces de rechange et de l'approvisionnement
    description: |
      Approvisionnement initial, réapprovisionnement et satisfaction des besoins.
  BC-1720.50.10:
    name: Approvisionnement initial
    description: |
      Approvisionnement initial en pièces de rechange pour les nouvelles plateformes.
  BC-1720.50.20:
    name: Réapprovisionnement en pièces de rechange
    description: |
      Réapprovisionnement en pièces de rechange selon la demande et les prévisions.
  BC-1720.50.30:
    name: Suivi de la satisfaction des besoins
    description: |
      Suivi de la satisfaction des besoins et du taux de service.
  BC-1720.50.40:
    name: Catalogage et gestion des NSN
    description: |
      Catalogage des numéros de stock OTAN et identification des articles.

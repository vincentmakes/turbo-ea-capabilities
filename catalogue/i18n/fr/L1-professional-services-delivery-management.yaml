locale: fr
source: L1-professional-services-delivery-management.yaml
entries:
  BC-4310:
    name: Gestion de la prestation de services professionnels
    description: |
      Exécution des missions de conseil, juridiques, d'audit et de consulting —
      planification des travaux, fieldwork, production des livrables, revue interne
      et reporting de mission dans le cadre du périmètre convenu.
  BC-4310.10:
    name: Gestion de la planification de la mission
    description: |
      Planification détaillée des travaux, des jalons, de la structure des livrables
      et des procédures adaptées au risque, conformément aux normes professionnelles
      applicables.
  BC-4310.10.10:
    name: Définition du plan de travail de la mission
    description: |
      Définition de la structure de décomposition des travaux, des jalons
      et des dépendances de la mission.
  BC-4310.10.20:
    name: Adaptation des procédures selon le risque de la mission
    description: |
      Adaptation des procédures d'audit, des analyses de conseil ou des étapes
      juridiques en fonction du risque et de la matérialité de la mission.
  BC-4310.10.30:
    name: Définition du plan de livrables de la mission
    description: |
      Définition de la structure, du format et des points de contrôle de
      révision des livrables.
  BC-4310.10.40:
    name: Gestion du calendrier de la mission
    description: |
      Planification quotidienne des activités de mission et de la disponibilité
      des ressources par rapport au plan de travail.
  BC-4310.20:
    name: Gestion de l'exécution de la mission
    description: |
      Réalisation quotidienne des travaux de mission — fieldwork, analyses de conseil,
      tests d'audit, rédaction et interactions client.
  BC-4310.20.10:
    name: Exécution des procédures d'audit
    description: |
      Réalisation des procédures d'audit et d'assurance, incluant les tests
      substantifs, les tests de contrôles et les procédures analytiques.
  BC-4310.20.20:
    name: Exécution des analyses de conseil
    description: |
      Réalisation des analyses de consulting, modélisations, benchmarkings
      et développements de recommandations.
  BC-4310.20.30:
    name: Exécution des missions juridiques
    description: |
      Travaux juridiques substantifs incluant la rédaction, les avis,
      les conclusions judiciaires, l'exécution transactionnelle et le conseil.
  BC-4310.20.40:
    name: Gestion des interactions client
    description: |
      Interactions quotidiennes avec le client lors de l'exécution — entretiens,
      demandes d'information, points de situation et ateliers avec les parties prenantes.
  BC-4310.30:
    name: Gestion des livrables de la mission
    description: |
      Rédaction, gestion des versions et finalisation des livrables de mission
      tels que les rapports d'audit, les avis, les rapports de conseil et
      la documentation transactionnelle.
  BC-4310.30.10:
    name: Rédaction des livrables
    description: |
      Production des versions préliminaires des livrables à partir des modèles,
      de la méthodologie et des conclusions de la mission.
  BC-4310.30.20:
    name: Gestion des versions des livrables
    description: |
      Versionnement, gestion des branches et piste d'audit sur les versions
      des livrables tout au long des cycles de révision.
  BC-4310.30.30:
    name: Finalisation des livrables
    description: |
      Mise en forme finale, blocs de signature et conditionnement pour la
      diffusion des livrables terminés.
  BC-4310.40:
    name: Gestion des dossiers de travail de la mission
    description: |
      Collecte, organisation et conservation des dossiers de travail et des
      éléments probants étayant les livrables et les conclusions.
    in_scope:
      - Dossiers de travail du dossier de mission
      - Indexation et référencement croisé des éléments probants
      - Assemblage et verrouillage du dossier
    out_of_scope:
      - Actifs méthodologiques et précédents réutilisables (BC-4370)
  BC-4310.40.10:
    name: Collecte des dossiers de travail
    description: |
      Collecte des éléments probants, analyses et notes dans le dossier
      de travail de la mission.
  BC-4310.40.20:
    name: Indexation et référencement croisé des dossiers de travail
    description: |
      Indexation et référencement croisé des dossiers de travail vers les
      assertions des livrables et les étapes des procédures.
  BC-4310.40.30:
    name: Assemblage et verrouillage du dossier de mission
    description: |
      Assemblage du dossier de mission final et verrouillage pour prévenir
      les modifications post-émission en dehors des contrôles autorisés.
  BC-4310.50:
    name: Gestion de la revue interne de la mission
    description: |
      Cycles de revue interne par les réviseurs, managers et associés avant
      la diffusion des livrables ; distinct de la surveillance qualité au
      niveau du cabinet.
    out_of_scope:
      - Surveillance qualité du cabinet et EQR (BC-4340)
  BC-4310.50.10:
    name: Revue des dossiers de travail par le manager
    description: |
      Revue des dossiers de travail et des conclusions par le manager avant
      la validation de l'associé.
  BC-4310.50.20:
    name: Revue et validation de l'associé
    description: |
      Revue et validation de l'associé de mission sur les livrables et
      les avis.
  BC-4310.50.30:
    name: Revue technique spécialisée
    description: |
      Revue par des spécialistes techniques (fiscal, évaluation, informatique,
      actuariat) sur les domaines nécessitant un avis spécialisé.
  BC-4310.60:
    name: Gestion des spécialistes externes de la mission
    description: |
      Engagement des co-conseils, experts témoins, sous-traitants et spécialistes
      tiers intervenant dans une mission.
  BC-4310.60.10:
    name: Engagement des co-conseils et sous-traitants
    description: |
      Sélection et engagement des co-conseils, conseils locaux ou sous-traitants
      de conseil.
  BC-4310.60.20:
    name: Engagement des experts témoins
    description: |
      Identification, engagement et gestion des experts témoins et experts
      externes.
  BC-4310.60.30:
    name: Supervision qualité des spécialistes externes
    description: |
      Supervision des travaux des spécialistes externes et évaluation de la
      fiabilité accordée aux conclusions de la mission.
  BC-4310.70:
    name: Reporting et communication de la mission
    description: |
      Reporting d'avancement, communications intermédiaires et reporting final
      au client et à la direction de mission pendant l'exécution.
  BC-4310.70.10:
    name: Reporting d'avancement de la mission
    description: |
      Points de situation périodiques à la direction de mission et au client,
      incluant l'avancement, les risques et les problèmes.
  BC-4310.70.20:
    name: Communication des conclusions intermédiaires
    description: |
      Communication intermédiaire des conclusions préliminaires, observations
      et problèmes significatifs au client en cours d'exécution.
  BC-4310.70.30:
    name: Rapport final de la mission
    description: |
      Émission des rapports finaux, avis et lettres de direction dans le cadre
      de la clôture de la mission.

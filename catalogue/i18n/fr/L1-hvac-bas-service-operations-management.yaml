locale: fr
source: L1-hvac-bas-service-operations-management.yaml
entries:
  BC-2060:
    name: Gestion des opérations de service HVAC et GTB
    description: |
      Service sur les équipements HVAC installés et les GTB, piloté par l'OEM et les entrepreneurs
      — gestion de la configuration du parc installé, maintenance préventive et réactive,
      reprogrammation GTB et service logiciel, modernisation des équipements, contrats de
      service à la performance et service connecté à distance.
    in_scope:
      - Registre de configuration des équipements et GTB du parc installé
      - Livraison des contrats de maintenance préventive et service réactif/d'urgence
      - Reprogrammation GTB, mises à niveau du firmware et opérations de sauvegarde/restauration
      - Exécution des modernisations sur les équipements HVAC installés
      - Contrats de service à la performance et aux résultats
      - Service connecté à distance et opérations du centre de diagnostic
      - Gestion des accords de niveau de service et de la satisfaction client
    out_of_scope:
      - Service de terrain générique multi-industrie (BC-1050) et pièces détachées (BC-1060)
      - Mise en service du projet et livraison Cx (BC-2050)
      - Approvisionnement et déclarations des fluides frigorigènes (BC-2040)
      - Ingénierie des produits équipements HVAC (BC-2000)

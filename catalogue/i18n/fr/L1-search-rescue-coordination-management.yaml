locale: fr
source: L1-search-rescue-coordination-management.yaml
entries:
  BC-1260:
    name: Gestion de la coordination recherche et sauvetage
    description: |
      Alertes SAR, coordination avec les centres de sauvetage, traitement des radiobalises de détresse.
  BC-1260.10:
    name: Gestion des alertes SAR
    description: |
      Phases d'alerte — incertitude, alerte, détresse.
  BC-1260.10.10:
    name: Traitement de la phase d'incertitude
    description: |
      Détection et traitement de la phase d'incertitude INCERFA.
  BC-1260.10.20:
    name: Traitement de la phase d'alerte
    description: |
      Traitement de la phase d'alerte ALERFA et escalade.
  BC-1260.10.30:
    name: Traitement de la phase de détresse
    description: |
      Traitement de la phase de détresse DETRESFA et déclenchement du SAR.
  BC-1260.20:
    name: Gestion de la coordination SAR
    description: |
      Coordination avec les centres de coordination de sauvetage (RCC).
  BC-1260.20.10:
    name: Liaison avec les RCC
    description: |
      Liaison avec les centres de coordination de sauvetage nationaux et régionaux.
  BC-1260.20.20:
    name: Coordination des missions SAR
    description: |
      Coordination des ressources et des moyens des missions de recherche et sauvetage.
  BC-1260.20.30:
    name: Coordination SAR transfrontalière
    description: |
      Coordination transfrontalière des opérations de recherche et sauvetage.
  BC-1260.30:
    name: Gestion des communications SAR
    description: |
      Réseaux de communication SAR et canaux de coordination.
  BC-1260.30.10:
    name: Opérations de communication vocale SAR
    description: |
      Exploitation des canaux vocaux et des fréquences SAR.
  BC-1260.30.20:
    name: Opérations de communication de données SAR
    description: |
      Exploitation des réseaux de données et de la messagerie SAR.
  BC-1260.40:
    name: Gestion des radiobalises de localisation
    description: |
      Traitement des activations ELT/EPIRB/PLB, interface COSPAS-SARSAT.
  BC-1260.40.10:
    name: Traitement des activations ELT
    description: |
      Détection et traitement des activations de radiobalises de localisation d'urgence.
  BC-1260.40.20:
    name: Opérations d'interface COSPAS-SARSAT
    description: |
      Interface avec les centres de contrôle de mission COSPAS-SARSAT.
  BC-1260.40.30:
    name: Coordination de l'enregistrement des balises
    description: |
      Coordination avec les registres nationaux de radiobalises.

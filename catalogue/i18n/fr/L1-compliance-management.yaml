locale: fr
source: L1-compliance-management.yaml
entries:
  BC-130:
    name: Gestion de la conformité
    description: |
      Respect des lois, des réglementations et des politiques internes de l'entreprise.
  BC-130.10:
    name: Gestion de la conformité réglementaire
    description: |
      Conformité aux réglementations sectorielles applicables.
  BC-130.10.10:
    name: Gestion de l'inventaire réglementaire
    description: |
      Inventaire des réglementations applicables et des obligations dans les différentes juridictions.
  BC-130.10.20:
    name: Surveillance des évolutions réglementaires
    description: |
      Veille prospective des développements réglementaires et évaluation de leur impact.
  BC-130.10.30:
    name: Évaluation du risque de conformité
    description: |
      Évaluation du risque de conformité par ligne métier, zone géographique et produit.
  BC-130.10.40:
    name: Surveillance et contrôle de la conformité
    description: |
      Plan de surveillance de la conformité, tests de contrôle et reporting.
  BC-130.10.50:
    name: Gestion des relations avec les régulateurs
    description: |
      Notifications aux régulateurs, inspections et suivi des plans de remédiation.
  BC-130.20:
    name: Gestion des politiques internes
    description: |
      Cycle de vie des politiques internes : rédaction, approbation, attestation et retrait.
  BC-130.20.10:
    name: Rédaction des politiques internes
    description: |
      Élaboration et révision des politiques et normes de l'entreprise.
  BC-130.20.20:
    name: Approbation et publication des politiques internes
    description: |
      Approbation par la gouvernance et publication contrôlée des politiques internes.
  BC-130.20.30:
    name: Attestation des politiques internes
    description: |
      Reconnaissance et attestation par les employés et les tiers.
  BC-130.20.40:
    name: Gestion des dérogations aux politiques internes
    description: |
      Enregistrement et approbation des dérogations et exemptions aux politiques internes.
  BC-130.30:
    name: Gestion de l'éthique et de la conduite
    description: |
      Code de conduite, éthique et programmes d'alerte éthique.
  BC-130.30.10:
    name: Administration du code de conduite
    description: |
      Maintenance et déploiement du code de conduite de l'entreprise.
  BC-130.30.20:
    name: Gestion des conflits d'intérêts
    description: |
      Divulgation et gestion des conflits personnels et organisationnels.
  BC-130.30.30:
    name: Gestion du signalement et de l'alerte éthique
    description: |
      Canaux de signalement, réception, triage et protection des lanceurs d'alerte.
  BC-130.30.40:
    name: Enquêtes sur les manquements à la conduite
    description: |
      Investigation des manquements présumés et gestion des dossiers disciplinaires.
  BC-130.40:
    name: Gestion de la lutte anti-corruption
    description: |
      Programmes ABC, due diligence sur les tiers, cadeaux et hospitalité.
  BC-130.40.10:
    name: Gouvernance du programme anti-corruption
    description: |
      Conception du programme de lutte contre la corruption aligné avec le FCPA et le UKBA.
  BC-130.40.20:
    name: Due diligence d'intégrité sur les tiers
    description: |
      Due diligence d'intégrité et surveillance continue des intermédiaires.
  BC-130.40.30:
    name: Gestion des cadeaux, de l'hospitalité et des parrainages
    description: |
      Pré-approbation et registres des cadeaux, de l'hospitalité et des parrainages.
  BC-130.40.40:
    name: Formation et sensibilisation à la lutte anti-corruption
    description: |
      Formation ciblée et communication sur les exigences anti-corruption.
  BC-130.50:
    name: Gestion de la confidentialité et de la protection des données
    description: |
      Conformité au RGPD et équivalents, droits des personnes concernées, protection des données dès la conception.
  BC-130.50.10:
    name: Gouvernance du programme de confidentialité
    description: |
      Cadre de protection des données, fonction DPO et dispositifs de responsabilisation.
  BC-130.50.20:
    name: Gestion des registres de traitement
    description: |
      Tenue des registres des activités de traitement et des flux de données.
  BC-130.50.30:
    name: Analyse d'impact sur la protection des données
    description: |
      AIPD et revues de protection des données dès la conception pour les nouvelles activités de traitement.
  BC-130.50.40:
    name: Traitement des droits des personnes concernées
    description: |
      Réception et traitement des demandes d'accès, de rectification et d'effacement.
  BC-130.50.50:
    name: Gestion des violations de données personnelles
    description: |
      Détection, notification et remédiation des violations de données personnelles.

locale: fr
source: L1-advertising-sales-operations-management.yaml
entries:
  BC-3760:
    name: Gestion des ventes et des opérations publicitaires
    description: |
      Inventaire, ventes directes et programmatiques, routage et décision
      publicitaire, sécurité des marques et contrôles de qualité de
      l'inventaire, et reporting des revenus publicitaires sur les surfaces
      linéaires, numériques et TV connectée.
  BC-3760.10:
    name: Gestion de l'inventaire publicitaire
    description: |
      Prévision, allocation et réservation de l'inventaire publicitaire sur
      les surfaces linéaires et numériques.
  BC-3760.10.10:
    name: Prévision des disponibilités
    description: |
      Prévision des impressions disponibles, des GRP et des disponibilités
      ciblées par audience sur l'horizon d'inventaire.
  BC-3760.10.20:
    name: Allocation de l'inventaire
    description: |
      Allocation de l'inventaire aux pools directs, programmatiques et maison
      sur toutes les surfaces.
  BC-3760.10.30:
    name: Réservation et gel de l'inventaire
    description: |
      Réservation et gel de l'inventaire pour les deals engagés, les
      parrainages et les événements majeurs.
  BC-3760.20:
    name: Gestion des ventes publicitaires directes
    description: |
      Vente directe d'inventaire publicitaire par les canaux de parrainage,
      upfront et ordre d'insertion.
  BC-3760.20.10:
    name: Ventes de parrainage
    description: |
      Pipeline et contractualisation des deals de parrainage et d'intégration.
  BC-3760.20.20:
    name: Ventes upfront et scatter
    description: |
      Ventes upfront et scatter market d'inventaire linéaire et numérique.
  BC-3760.20.30:
    name: Ordres d'insertion et ventes de spots linéaires
    description: |
      Saisie des ordres d'insertion et réservation de spots linéaires par
      rapport au plan de disponibilités.
  BC-3760.30:
    name: Gestion des ventes programmatiques
    description: |
      Configuration et exploitation des enchères programmatiques, des places de
      marché privées et des intégrations supply-path.
  BC-3760.30.10:
    name: Configuration des enchères
    description: |
      Configuration des planchers d'enchères, des ID de deals et de
      l'éligibilité des enchérisseurs sur l'inventaire.
  BC-3760.30.20:
    name: Gestion des deals sur place de marché privée
    description: |
      Création et cycle de vie des deals programmatiques garantis et de place
      de marché privée avec les acheteurs.
  BC-3760.30.30:
    name: Intégration header bidding et SSP
    description: |
      Intégration des partenaires de header bidding et des plateformes
      supply-side sur toutes les surfaces.
  BC-3760.40:
    name: Routage et opérations publicitaires
    description: |
      Intégration des créatifs, décision et insertion publicitaire, et
      programmation des spots dans les structures de coupure linéaires et
      numériques.
  BC-3760.40.10:
    name: Intégration et contrôle qualité des créatifs
    description: |
      Intégration et contrôle qualité des créatifs publicitaires selon les
      spécifications techniques et de politique.
  BC-3760.40.20:
    name: Décision et insertion publicitaire
    description: |
      Décision de la publicité à servir et insertion dans les coupures
      linéaires, côté serveur ou côté client.
  BC-3760.40.30:
    name: Programmation des spots
    description: |
      Construction de la grille pour le positionnement des spots linéaires et
      l'optimisation des structures de coupure.
  BC-3760.50:
    name: Gestion de la sécurité des marques et de la qualité de l'inventaire
    description: |
      Classification de l'inventaire pour la sécurité des marques, détection
      du trafic invalide et étiquetage de pertinence pour le ciblage acheteur.
  BC-3760.50.10:
    name: Classification pour la sécurité des marques
    description: |
      Classification des surfaces de contenu selon les référentiels de sécurité
      et de pertinence pour les marques.
  BC-3760.50.20:
    name: Détection du trafic invalide
    description: |
      Détection et exclusion du trafic invalide sur l'inventaire propre et
      partenaire.
  BC-3760.50.30:
    name: Étiquetage de pertinence
    description: |
      Étiquetage des surfaces de contenu avec des attributs de pertinence et
      de contexte pour le ciblage acheteur.
  BC-3760.60:
    name: Reporting des revenus publicitaires
    description: |
      Reporting de diffusion de campagne, rapprochement des compensations et
      facturation des annonceurs et règlement sur les ventes linéaires et
      numériques.
  BC-3760.60.10:
    name: Reporting de diffusion des campagnes
    description: |
      Reporting de diffusion et de rythme par rapport aux objectifs de campagne
      sur les surfaces et devises.
  BC-3760.60.20:
    name: Compensations et rapprochements
    description: |
      Rapprochement des impressions livrées par rapport aux commandes, avec
      gestion des compensations et avoirs.
  BC-3760.60.30:
    name: Facturation des annonceurs et règlement
    description: |
      Facturation des annonceurs et agences et règlement par rapport aux remises
      et commissions d'agences.

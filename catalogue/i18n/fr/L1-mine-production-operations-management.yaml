locale: fr
source: L1-mine-production-operations-management.yaml
entries:
  BC-4430:
    name: Gestion des opérations de production minière
    description: |
      Exécution de la production minière par les cycles de forage-minage-chargement-
      transport, l'abattage souterrain, le contrôle des teneurs, le contrôle
      du massif, la ventilation et le dénoyage dans les exploitations à ciel
      ouvert et souterraines.
  BC-4430.10:
    name: Opérations de forage et de minage
    description: |
      Forage de production, chargement, amorçage et analyse des performances
      post-tir pour les exploitations à ciel ouvert et souterraines.
    in_scope:
      - Forage des trous de mine de production
      - Chargement et amorçage
      - Analyse de la fragmentation et du déplacement post-tir
    out_of_scope:
      - Forage d'exploration (BC-4400.30)
      - Conception des plans de minage (BC-4420.40.30)
  BC-4430.10.10:
    name: Forage de production
    description: |
      Forage des trous de mine de production conformément à la conception
      du plan de minage.
  BC-4430.10.20:
    name: Chargement des explosifs
    description: |
      Chargement des explosifs et accessoires dans les trous de mine.
  BC-4430.10.30:
    name: Amorçage et dégagement du tir
    description: |
      Raccordement, dégagement, amorçage et dégagement post-tir des tirs
      de production.
  BC-4430.10.40:
    name: Analyse des performances du tir
    description: |
      Analyse de la fragmentation, du déplacement et des vibrations des tirs
      exécutés.
  BC-4430.20:
    name: Opérations de chargement et de transport
    description: |
      Chargement, transport et dispatch de la roche abattue depuis le front
      de taille jusqu'à l'usine de traitement ou le terril à stériles.
  BC-4430.20.10:
    name: Opérations de pelles et d'excavatrices
    description: |
      Exploitation des pelles à câble, des excavatrices hydrauliques et des
      chargeuses frontales.
  BC-4430.20.20:
    name: Opérations de camions de transport
    description: |
      Exploitation des camions de transport hors route et du transport
      par trolley.
  BC-4430.20.30:
    name: Dispatch de flotte et télématique
    description: |
      Dispatch en temps réel, affectation et gestion de la productivité
      de la flotte par télématique.
  BC-4430.20.40:
    name: Réconciliation des mouvements de matériaux
    description: |
      Réconciliation des tonnes transportées par rapport aux données de levé,
      de dispatch et aux soldes des stockpiles.
  BC-4430.30:
    name: Opérations de production souterraine
    description: |
      Développement des chantiers, production, remblayage et manutention
      de matériaux souterrains spécifiques aux méthodes minières souterraines.
  BC-4430.30.10:
    name: Développement des chantiers
    description: |
      Développement des accès souterrains, galeries et infrastructure
      des chantiers.
  BC-4430.30.20:
    name: Production des chantiers
    description: |
      Abattage et chargement de la production dans les chantiers souterrains.
  BC-4430.30.30:
    name: Mise en place du remblai
    description: |
      Mise en place du remblai cimenté ou rocheux dans les chantiers abattus.
  BC-4430.30.40:
    name: Manutention souterraine des matériaux
    description: |
      Exploitation des convoyeurs souterrains, cheminées à minerai et
      du chevalement.
  BC-4430.40:
    name: Opérations de contrôle des teneurs
    description: |
      Discrimination opérationnelle du minerai et des stériles par échantillonnage,
      définition des blocs de minerai et décisions de routage au front de taille.
  BC-4430.40.10:
    name: Échantillonnage du contrôle des teneurs
    description: |
      Échantillonnage en phase de production de la roche abattue et des
      fronts pour la détermination des teneurs.
  BC-4430.40.20:
    name: Définition des blocs de minerai
    description: |
      Définition des blocs de minerai exploitables pour l'exécution à court
      terme.
  BC-4430.40.30:
    name: Marquage des limites minerai-stérile
    description: |
      Marquage terrain des limites minerai-stérile pour les opérateurs de
      pelles et de chargeuses.
  BC-4430.40.40:
    name: Allocation aux stockpiles de tout-venant
    description: |
      Affectation des matériaux extraits aux stockpiles de tout-venant et
      aux stockpiles de teneur.
  BC-4430.50:
    name: Contrôle du massif et surveillance géotechnique
    description: |
      Contrôle opérationnel du massif par la surveillance et les plans
      d'action déclenchés sur les talus de fosse et les excavations souterraines.
  BC-4430.50.10:
    name: Surveillance des talus
    description: |
      Surveillance en temps réel des talus de fosse par radar, prismes
      et inclinomètres.
  BC-4430.50.20:
    name: Installation du soutènement du terrain
    description: |
      Installation de boulons, filets, béton projeté et câbles de soutènement
      en souterrain.
  BC-4430.50.30:
    name: Surveillance sismique souterraine
    description: |
      Surveillance microsismique des excavations souterraines pour la gestion
      des coups de terrain et des contraintes.
  BC-4430.50.40:
    name: Plan d'action déclenché géotechnique
    description: |
      Exécution des plans d'action déclenchés lorsque les seuils de surveillance
      sont dépassés.
  BC-4430.60:
    name: Ventilation et gestion de l'atmosphère minière
    description: |
      Exploitation des systèmes de ventilation principale et auxiliaire et
      surveillance de la qualité de l'atmosphère de la mine.
  BC-4430.60.10:
    name: Opérations de ventilation principale
    description: |
      Exploitation des ventilateurs et voies d'aérage de surface et souterrains
      principaux.
  BC-4430.60.20:
    name: Opérations de ventilation auxiliaire
    description: |
      Exploitation des ventilateurs auxiliaires et des gaines au front de taille.
  BC-4430.60.30:
    name: Surveillance de l'atmosphère minière
    description: |
      Surveillance en temps réel et de routine des niveaux de poussière, gaz
      et d'oxygène dans l'atmosphère de la mine.
  BC-4430.60.40:
    name: Gestion des particules diesel
    description: |
      Gestion de l'exposition aux particules diesel dans les chantiers souterrains.
  BC-4430.70:
    name: Opérations de dénoyage minier
    description: |
      Exploitation des systèmes de dénoyage de fosse et souterrains et de
      l'infrastructure des stations de pompage.
  BC-4430.70.10:
    name: Opérations de dénoyage à ciel ouvert
    description: |
      Exploitation du pompage en fosse et des forages de dénoyage périmétriques.
  BC-4430.70.20:
    name: Opérations de dénoyage souterrain
    description: |
      Exploitation des puisards, pompes et réseaux de dénoyage souterrains.
  BC-4430.70.30:
    name: Gestion des stations de pompage
    description: |
      Exploitation et maintenance des stations de pompage fixes et des
      colonnes montantes.

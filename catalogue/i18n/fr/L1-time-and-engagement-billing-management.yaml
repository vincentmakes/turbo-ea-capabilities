locale: fr
source: L1-time-and-engagement-billing-management.yaml
entries:
  BC-4330:
    name: Gestion de la facturation au temps et aux prestations
    description: |
      Saisie des temps, travaux en cours, modalités d'honoraires, facturation,
      taux de réalisation et contrôle des abandons pour les missions facturables,
      ainsi que gestion des fonds en fiducie clients et des provisions propres
      à la pratique juridique.
  BC-4330.10:
    name: Gestion des temps
    description: |
      Saisie, validation et soumission des entrées de temps des professionnels
      avec le détail narratif au niveau de la mission et de la tâche.
  BC-4330.10.10:
    name: Saisie des temps
    description: |
      Saisie quotidienne des temps facturables et non facturables au niveau
      de la mission, de la tâche et de l'activité.
  BC-4330.10.20:
    name: Gestion de la qualité des narratifs de temps
    description: |
      Contrôle qualité des narratifs de temps pour respecter les directives
      de facturation client et les exigences de facturation électronique.
  BC-4330.10.30:
    name: Soumission et approbation des temps
    description: |
      Soumission, approbation par le superviseur et verrouillage des
      enregistrements de temps.
  BC-4330.20:
    name: Gestion des débours de mission
    description: |
      Saisie et imputation des débours liés aux missions, tels que les frais
      de greffe, les honoraires d'experts, les frais de déplacement et d'impression,
      en vue de leur refacturation au client.
  BC-4330.20.10:
    name: Saisie des débours
    description: |
      Saisie des débours sur le dossier de mission en vue de leur récupération.
  BC-4330.20.20:
    name: Revue de la recouvrabilité des débours
    description: |
      Revue de la recouvrabilité des débours par rapport à la lettre de mission
      et aux directives de facturation du client.
  BC-4330.20.30:
    name: Imputation des débours à la mission
    description: |
      Imputation des débours approuvés aux travaux en cours de la mission
      en vue de la facturation.
  BC-4330.30:
    name: Gestion des travaux en cours
    description: |
      Suivi des soldes de travaux en cours non facturés, de leur ancienneté
      et des décisions de valorisation ou de dévalorisation avant facturation.
  BC-4330.30.10:
    name: Suivi des travaux en cours
    description: |
      Suivi en temps réel des travaux en cours non facturés par mission,
      associé et pratique.
  BC-4330.30.20:
    name: Analyse de l'ancienneté des travaux en cours
    description: |
      Analyse de l'ancienneté des travaux en cours non facturés et escalade
      des soldes dormants.
  BC-4330.30.30:
    name: Décision de valorisation et de dévalorisation des travaux en cours
    description: |
      Décision d'associé sur la valorisation, la dévalorisation et les reports
      des travaux en cours avant facturation.
  BC-4330.40:
    name: Gestion des modalités d'honoraires
    description: |
      Maintenance des structures d'honoraires au niveau de la mission, incluant
      les grilles tarifaires horaires, les arrangements alternatifs d'honoraires,
      les honoraires forfaitaires, les honoraires de succès et les provisions.
  BC-4330.40.10:
    name: Maintenance des grilles tarifaires
    description: |
      Maintenance des grilles tarifaires horaires standard, spécifiques au
      client et à la mission.
  BC-4330.40.20:
    name: Mise en place des arrangements alternatifs d'honoraires
    description: |
      Mise en place des arrangements d'honoraires forfaitaires, plafonnés,
      de succès, conditionnels et de provision par mission.
  BC-4330.40.30:
    name: Gestion des remises et de la tarification par volume
    description: |
      Application des remises d'honoraires convenues et de la tarification
      par volume sur l'ensemble du portefeuille de missions du client.
  BC-4330.50:
    name: Gestion de la génération des factures
    description: |
      Production des factures de mission, mise en forme des narratifs et
      conformité aux exigences de format de facturation électronique du client.
  BC-4330.50.10:
    name: Préparation des factures pro forma
    description: |
      Préparation et revue de l'associé des factures pro forma avant leur
      émission définitive.
  BC-4330.50.20:
    name: Émission des factures définitives
    description: |
      Émission des factures de mission définitives incluant les narratifs,
      les débours et les taxes.
  BC-4330.50.30:
    name: Conformité au format de facturation électronique client
    description: |
      Conformité aux exigences de facturation électronique du client, incluant
      LEDES, les codes de tâche UTBMS et la soumission via le portail client.
  BC-4330.50.40:
    name: Respect des directives de facturation client
    description: |
      Application des directives de facturation external counsel du client
      sur les temps, les tarifs et les débours.
  BC-4330.60:
    name: Gestion du taux de réalisation des missions
    description: |
      Suivi des taux de réalisation facturé-encaissé et standard-facturé,
      des abandons et de la rentabilité des missions.
  BC-4330.60.10:
    name: Suivi du taux de réalisation standard-facturé
    description: |
      Suivi des travaux en cours au tarif standard par rapport au montant
      facturé pour identifier les pertes de revenus.
  BC-4330.60.20:
    name: Suivi du taux de réalisation facturé-encaissé
    description: |
      Suivi du montant facturé par rapport aux encaissements, incluant
      les provisions pour créances douteuses.
  BC-4330.60.30:
    name: Reporting de la rentabilité des missions
    description: |
      Reporting de la rentabilité par mission, associé et pratique en
      utilisant les revenus réalisés et les coûts directs.
  BC-4330.60.40:
    name: Approbation et analyse des abandons
    description: |
      Processus d'approbation et analyse des causes des abandons de travaux
      en cours et de créances.
  BC-4330.70:
    name: Gestion des fonds en fiducie clients et des provisions
    description: |
      Gestion des fonds clients détenus en fiducie, des comptes de type IOLTA
      et des soldes de provision, avec des exigences distinctes de ségrégation
      et de réconciliation applicables à la pratique juridique.
    in_scope:
      - Opérations des comptes en fiducie clients
      - Suivi des soldes de provision
      - Réconciliation et reporting des comptes en fiducie
    out_of_scope:
      - Trésorerie générale du cabinet (BC-180)
  BC-4330.70.10:
    name: Opérations des comptes en fiducie clients
    description: |
      Fonctionnement des comptes en fiducie clients ségrégués, incluant les
      encaissements et les décaissements pour le compte du client.
  BC-4330.70.20:
    name: Gestion des soldes de provision
    description: |
      Suivi des soldes de provision clients et des seuils de réapprovisionnement.
  BC-4330.70.30:
    name: Réconciliation et reporting des fonds en fiducie
    description: |
      Réconciliation trilatérale des livres de fiducie et reporting statutaire
      ou auprès des organismes professionnels sur les soldes en fiducie.

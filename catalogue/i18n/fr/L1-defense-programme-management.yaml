locale: fr
source: L1-defense-programme-management.yaml
entries:
  BC-1760:
    name: Gestion de programme de défense
    description: |
      Exécution de grands programmes, gestion de la valeur acquise, gouvernance et gestion des sous-traitants.
  BC-1760.10:
    name: Gestion de l'acquisition de programme
    description: |
      Stratégie d'acquisition, planification et revues jalons.
  BC-1760.10.10:
    name: Définition de la stratégie d'acquisition
    description: |
      Définition de la stratégie d'acquisition conformément à DoD 5000 ou équivalent.
  BC-1760.10.20:
    name: Planification et ligne de base du programme
    description: |
      Planification du programme et mise en ligne de base du calendrier directeur intégré.
  BC-1760.10.30:
    name: Revues jalons
    description: |
      Préparation et conduite des revues jalons.
  BC-1760.20:
    name: Gestion de la valeur acquise du programme
    description: |
      Valeur acquise, performance coût, performance calendaire et IBR.
  BC-1760.20.10:
    name: Exploitation du système de valeur acquise
    description: |
      Exploitation d'un système de valeur acquise conforme EIA-748.
  BC-1760.20.20:
    name: Revue de la ligne de base intégrée
    description: |
      Conduite des revues de ligne de base intégrée avec le client.
  BC-1760.20.30:
    name: Analyse des performances coût et calendaire
    description: |
      Analyse des métriques CV, SV, CPI, SPI et de leurs tendances.
  BC-1760.20.40:
    name: Prévision du coût final estimé
    description: |
      Prévision du coût final estimé et analyse de l'indice de performance à compléter.
  BC-1760.30:
    name: Gestion des coûts et de la tarification du programme
    description: |
      Normes comptables de coûts et tarification des contrats gouvernementaux.
  BC-1760.30.10:
    name: Conformité aux normes comptables de coûts
    description: |
      Conformité aux normes comptables de coûts (CAS).
  BC-1760.30.20:
    name: Tarification des contrats gouvernementaux
    description: |
      Tarification des contrats gouvernementaux incluant FAR/DFARS.
  BC-1760.30.30:
    name: Estimation des coûts de programme
    description: |
      Estimation des coûts de programme et documentation des bases d'estimation.
  BC-1760.30.40:
    name: Gestion des taux de frais indirects
    description: |
      Calcul des taux de frais indirects et négociation avec l'administration.
  BC-1760.40:
    name: Gestion de la relation client gouvernemental
    description: |
      Relation avec le client gouvernemental et interface avec le responsable des contrats.
  BC-1760.40.10:
    name: Interface avec le responsable des contrats
    description: |
      Interface avec les responsables et représentants des contrats gouvernementaux.
  BC-1760.40.20:
    name: Engagement avec le bureau de programme
    description: |
      Engagement avec les bureaux de programme gouvernementaux et les PMOs.
  BC-1760.40.30:
    name: Reporting et revues client
    description: |
      Reporting périodique au client et revues de management de programme.
  BC-1760.50:
    name: Gestion des sous-traitants de défense
    description: |
      Chaîne d'approvisionnement de défense, clauses transmises et plans PME.
  BC-1760.50.10:
    name: Sélection et attribution des sous-traitants
    description: |
      Sélection et attribution des marchés aux sous-traitants de défense.
  BC-1760.50.20:
    name: Administration des clauses transmises
    description: |
      Administration des clauses FAR/DFARS transmises aux sous-traitants.
  BC-1760.50.30:
    name: Gestion de la performance des sous-traitants
    description: |
      Suivi et surveillance des performances des sous-traitants de défense.
  BC-1760.50.40:
    name: Gestion du plan PME
    description: |
      Exécution et reporting du plan de sous-traitance avec les petites entreprises.
  BC-1760.60:
    name: Gestion du cycle de vie du programme
    description: |
      Gestion du cycle de vie selon DoD 5000 ou équivalent, jalons.
  BC-1760.60.10:
    name: Gestion des phases du cycle de vie
    description: |
      Gestion des phases du cycle de vie du programme selon DoD 5000 ou équivalent.
  BC-1760.60.20:
    name: Gestion des risques du programme
    description: |
      Gestion des risques et des opportunités au niveau programme.
  BC-1760.60.30:
    name: Clôture et transition du programme
    description: |
      Clôture du programme, transition et clôture des contrats.

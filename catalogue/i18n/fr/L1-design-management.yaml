locale: fr
source: L1-design-management.yaml
entries:
  BC-1120:
    name: Gestion de la conception
    description: |
      Cycle de vie de la conception technique, du concept à la conception détaillée et à la vérification.
  BC-1120.10:
    name: Gestion de la conception conceptuelle
    description: |
      Études de concept, faisabilité, analyse des options et avant-projet sommaire.
  BC-1120.10.10:
    name: Définition de l'étude de concept
    description: |
      Périmètre de l'étude de concept, base de conception et hypothèses.
  BC-1120.10.20:
    name: Analyse de faisabilité
    description: |
      Analyse de faisabilité technique, calendaire et économique.
  BC-1120.10.30:
    name: Analyse et sélection des options
    description: |
      Analyse multicritère des options et sélection du concept.
  BC-1120.20:
    name: Gestion de l'avant-projet détaillé
    description: |
      FEED, ingénierie de base et définition du périmètre et des coûts.
  BC-1120.20.10:
    name: Conception d'ingénierie de base
    description: |
      Ingénierie de base des disciplines procédés, mécanique et électrique.
  BC-1120.20.20:
    name: Estimation des coûts et délais du FEED
    description: |
      Estimations de coût et délai de classe 3/classe 2 issues du FEED.
  BC-1120.20.30:
    name: Production des livrables du FEED
    description: |
      Production des livrables du FEED et de la base de conception.
  BC-1120.30:
    name: Gestion de la conception détaillée
    description: |
      Ingénierie détaillée, plans d'exécution, spécifications et métrés.
  BC-1120.30.10:
    name: Calculs d'ingénierie détaillée
    description: |
      Calculs et analyses détaillés par discipline.
  BC-1120.30.20:
    name: Production des plans d'exécution
    description: |
      Production des plans émis pour construction.
  BC-1120.30.30:
    name: Rédaction des spécifications détaillées
    description: |
      Rédaction des spécifications détaillées d'équipements et de matériaux.
  BC-1120.30.40:
    name: Production des métrés
    description: |
      Production et gestion des métrés pour l'approvisionnement et la construction.
  BC-1120.40:
    name: Gestion des revues et de la vérification de la conception
    description: |
      HAZOP, revues de conception, vérification et validation.
  BC-1120.40.10:
    name: Ateliers HAZOP et HAZID
    description: |
      Identification des dangers et animation des ateliers HAZOP.
  BC-1120.40.20:
    name: Jalons de revue de conception
    description: |
      Revues de conception aux jalons (30 %, 60 %, 90 %).
  BC-1120.40.30:
    name: Vérification de la conception
    description: |
      Vérification de la conception par rapport aux exigences et aux normes.
  BC-1120.40.40:
    name: Validation de la conception
    description: |
      Validation de la conception par rapport à l'usage prévu et aux besoins du client.
  BC-1120.50:
    name: Gestion des logiciels de conception et du CAD
    description: |
      Outils CAD/CAE, modélisation 3D, BIM et environnement de conception numérique.
  BC-1120.50.10:
    name: Gestion des standards CAD
    description: |
      Standards CAD, schémas de calques et bibliothèques de gabarits.
  BC-1120.50.20:
    name: Gestion des maquettes 3D
    description: |
      Gestion des maquettes 3D intégrées entre disciplines.
  BC-1120.50.30:
    name: Gestion de l'environnement BIM
    description: |
      Environnement commun de données BIM et alignement avec la norme ISO 19650.
  BC-1120.50.40:
    name: Administration des logiciels d'ingénierie
    description: |
      Administration et gestion des licences des outils logiciels d'ingénierie.
  BC-1120.60:
    name: Gestion de la coordination multidisciplinaire de la conception
    description: |
      Coordination interdisciplinaire, détection des conflits et gestion de la maquette intégrée.
  BC-1120.60.10:
    name: Détection des conflits
    description: |
      Détection des conflits entre maquettes 3D des disciplines.
  BC-1120.60.20:
    name: Coordination de la maquette intégrée
    description: |
      Coordination des maquettes multidisciplinaires intégrées.
  BC-1120.60.30:
    name: Résolution des problèmes de conception
    description: |
      Résolution des problèmes de coordination de conception.

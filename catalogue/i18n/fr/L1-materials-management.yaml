locale: fr
source: L1-materials-management.yaml
entries:
  BC-1070:
    name: Gestion des matières
    description: |
      Gestion des matières premières, des en-cours de production et des nomenclatures au niveau de l'usine.
  BC-1070.10:
    name: Gestion de la nomenclature
    description: |
      Structure de la nomenclature, nomenclatures d'étude et de fabrication.
  BC-1070.10.10:
    name: Gestion de la nomenclature d'étude
    description: |
      Nomenclatures d'étude alignées avec la conception produit et ses révisions.
  BC-1070.10.20:
    name: Gestion de la nomenclature de fabrication
    description: |
      Nomenclatures de fabrication reflétant les séquences de montage propres à l'usine.
  BC-1070.10.30:
    name: Gestion des modifications et de l'applicabilité des nomenclatures
    description: |
      Contrôle des modifications, révisions et dates d'applicabilité des nomenclatures.
  BC-1070.10.40:
    name: Gestion des variantes de nomenclature
    description: |
      Nomenclatures configurables et variantes pour les options produit.
  BC-1070.20:
    name: Gestion des matières premières
    description: |
      Stock de matières premières, qualité et traçabilité.
  BC-1070.20.10:
    name: Contrôle des stocks de matières premières
    description: |
      Suivi des stocks de matières premières en usine et dans les emplacements de stockage.
  BC-1070.20.20:
    name: Inspection qualité des matières premières
    description: |
      Contrôle à réception, échantillonnage et libération des matières premières.
  BC-1070.20.30:
    name: Traçabilité des matières premières
    description: |
      Traçabilité par lot, série et numéro de série pour les matières premières.
  BC-1070.30:
    name: Gestion des en-cours de production
    description: |
      Suivi, valorisation et contrôle des en-cours de production.
  BC-1070.30.10:
    name: Suivi des en-cours de production
    description: |
      Suivi des en-cours tout au long des opérations de fabrication.
  BC-1070.30.20:
    name: Valorisation des en-cours de production
    description: |
      Accumulation des coûts et valorisation des positions en en-cours.
  BC-1070.30.30:
    name: Contrôle et vieillissement des en-cours de production
    description: |
      Vieillissement et contrôle des en-cours bloqués ou immobilisés.
  BC-1070.40:
    name: Gestion des produits finis
    description: |
      Stock de produits finis au niveau de l'usine.
  BC-1070.40.10:
    name: Réception des produits finis
    description: |
      Réception des produits finis en provenance de la production dans le stock de l'usine.
  BC-1070.40.20:
    name: Stockage des produits finis
    description: |
      Entreposage et manutention des produits finis dans les entrepôts de l'usine.
  BC-1070.40.30:
    name: Expédition des produits finis
    description: |
      Expédition et envoi des produits finis vers les nœuds aval.
  BC-1070.50:
    name: Gestion de la planification des matières
    description: |
      MRP, besoins en matières et planification de l'approvisionnement au niveau de l'usine.
  BC-1070.50.10:
    name: Planification des besoins en matières
    description: |
      Calcul MRP pour dériver les besoins nets en matières à partir de la demande et des nomenclatures.
  BC-1070.50.20:
    name: Analyse de la couverture des matières
    description: |
      Analyse de couverture, messages d'exception et propositions de commandes.
  BC-1070.50.30:
    name: Exécution du plan d'approvisionnement de l'usine
    description: |
      Conversion des plans matières en ordres d'achat et de production.

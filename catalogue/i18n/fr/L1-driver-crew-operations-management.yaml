locale: fr
source: L1-driver-crew-operations-management.yaml
entries:
  BC-2440:
    name: Gestion des opérations conducteurs et équipages
    description: |
      Qualification, planification des rôles, conformité aux règles d'heures de service,
      gestion de la fatigue et suivi des performances des conducteurs et équipages
      d'exploitation sur les modes routier, ferroviaire, maritime et aérien.
  BC-2440.10:
    name: Gestion des qualifications des conducteurs et équipages
    description: |
      Maintien des licences, habilitations, ratings et dossiers d'aptitude médicale
      pour les conducteurs et équipages.
    in_scope:
      - CDL, STCW, ATPL et qualifications professionnelles équivalentes
      - Dossiers d'aptitude médicale et psychologique
    out_of_scope:
      - Dossiers RH génériques et paie (BC-300)
      - Compétences des contrôleurs aériens (BC-1290)
  BC-2440.10.10:
    name: Suivi des licences et habilitations
    description: |
      Suivi des licences professionnelles, habilitations et dates d'expiration.
  BC-2440.10.20:
    name: Gestion des ratings spécifiques au mode
    description: |
      Gestion des ratings propres à chaque mode, tels que les habilitations STCW
      et les qualifications de type aéronef.
  BC-2440.10.30:
    name: Certification médicale et d'aptitude physique
    description: |
      Certifications médicales et d'aptitude physique périodiques pour le personnel
      d'exploitation.
  BC-2440.20:
    name: Gestion des roulements et de la planification
    description: |
      Élaboration des roulements de service, des systèmes de quart et des pairings
      d'équipage en tenant compte des contraintes de service et réglementaires.
  BC-2440.20.10:
    name: Planification des roulements de service
    description: |
      Planification des roulements de service par base, dépôt et ligne.
  BC-2440.20.20:
    name: Pairing et rotation des équipages
    description: |
      Pairing et rotation des équipages sur des voyages de plusieurs jours ou
      plusieurs tronçons.
  BC-2440.20.30:
    name: Gestion des réserves et des permanences
    description: |
      Dispositifs de réserve, de disponibilité et d'astreinte.
  BC-2440.30:
    name: Gestion des heures de service et de la fatigue
    description: |
      Conformité aux règles d'heures de service et exploitation des systèmes de
      gestion du risque de fatigue.
  BC-2440.30.10:
    name: Conformité aux heures de service
    description: |
      Enregistrement et contrôle des limites d'heures de service via tachygraphe,
      ELD et équivalents.
  BC-2440.30.20:
    name: Gestion du risque de fatigue
    description: |
      Exploitation des systèmes de gestion du risque de fatigue et modélisation
      biomathématique.
  BC-2440.30.30:
    name: Contrôle des périodes de repos
    description: |
      Application des périodes de repos obligatoires, des escales et des limites
      hebdomadaires.
  BC-2440.40:
    name: Gestion des performances des conducteurs et équipages
    description: |
      Notation des performances, coaching et traitement des infractions pour les
      conducteurs et équipages.
  BC-2440.40.10:
    name: Notation des performances des conducteurs et équipages
    description: |
      Notation du personnel d'exploitation selon les KPI de sécurité, de carburant
      et de service.
  BC-2440.40.20:
    name: Coaching et formation continue
    description: |
      Coaching, cours de remise à niveau et formation remediale.
  BC-2440.40.30:
    name: Gestion des incidents et des infractions
    description: |
      Suivi et résolution des incidents d'exploitation et des infractions
      réglementaires.
  BC-2440.50:
    name: Gestion des déplacements et hébergements des équipages
    description: |
      Déplacements, hébergement et logistique des relèves d'équipage pour les
      rotations maritimes, aériennes et ferroviaires.
  BC-2440.50.10:
    name: Réservation des déplacements d'équipage
    description: |
      Réservation des déplacements de positionnement pour les rotations
      d'équipage.
  BC-2440.50.20:
    name: Gestion de l'hébergement des équipages
    description: |
      Gestion des hôtels et hébergements pour les escales et rotations.
  BC-2440.50.30:
    name: Coordination des relèves d'équipage
    description: |
      Coordination des relèves d'équipage dans les ports, aéroports et dépôts.

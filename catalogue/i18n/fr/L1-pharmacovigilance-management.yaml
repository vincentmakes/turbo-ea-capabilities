locale: fr
source: L1-pharmacovigilance-management.yaml
entries:
  BC-1540:
    name: Gestion de la pharmacovigilance
    description: |
      Surveillance des effets indésirables, détection des signaux et établissement des rapports de sécurité.
  BC-1540.10:
    name: Gestion des cas d'effets indésirables
    description: |
      Traitement des ICSRs et rapports expéditifs.
  BC-1540.10.10:
    name: Réception et triage des ICSRs
    description: |
      Réception et triage des rapports de cas individuels de sécurité.
  BC-1540.10.20:
    name: Traitement des cas ICSRs
    description: |
      Traitement, codage et rédaction des narratifs des ICSRs.
  BC-1540.10.30:
    name: Rapports expéditifs et périodiques
    description: |
      Rapports expéditifs conformes à ICH E2D et EU GVP.
  BC-1540.10.40:
    name: Revue médicale et évaluation de la causalité
    description: |
      Revue médicale et évaluation de la causalité des cas.
  BC-1540.20:
    name: Détection et gestion des signaux
    description: |
      Détection, évaluation et escalade des signaux de pharmacovigilance.
  BC-1540.20.10:
    name: Détection des signaux
    description: |
      Détection quantitative et qualitative des signaux de pharmacovigilance.
  BC-1540.20.20:
    name: Évaluation des signaux
    description: |
      Évaluation et validation des signaux détectés.
  BC-1540.20.30:
    name: Disposition et actions sur les signaux
    description: |
      Disposition des signaux en actions correctives et modifications d'étiquetage.
  BC-1540.30:
    name: Gestion des rapports de sécurité périodiques
    description: |
      PSURs/PBRERs, DSURs et rapports périodiques de sécurité.
  BC-1540.30.10:
    name: Production des PSURs/PBRERs
    description: |
      Production des rapports périodiques de sécurité (PSURs et PBRERs).
  BC-1540.30.20:
    name: Production des DSURs
    description: |
      Production des rapports de mise à jour de sécurité en développement.
  BC-1540.30.30:
    name: Rapports de sécurité agrégés
    description: |
      Production des autres rapports de sécurité agrégés.
  BC-1540.40:
    name: Gestion du plan de gestion des risques
    description: |
      Plans de gestion des risques, mesures de minimisation des risques et REMS.
  BC-1540.40.10:
    name: Rédaction du plan de gestion des risques
    description: |
      Rédaction des plans de gestion des risques EU et des documents REMS.
  BC-1540.40.20:
    name: Mise en œuvre de la minimisation des risques
    description: |
      Mise en œuvre des mesures de minimisation des risques routinières et additionnelles.
  BC-1540.40.30:
    name: Évaluation de l'efficacité de la minimisation des risques
    description: |
      Évaluation de l'efficacité des mesures de minimisation des risques.
  BC-1540.50:
    name: Gestion des audits et inspections de pharmacovigilance
    description: |
      Audits PV, inspections réglementaires et CAPA.
  BC-1540.50.10:
    name: Programme d'audit du système de pharmacovigilance
    description: |
      Programme d'audit interne couvrant le système de pharmacovigilance.
  BC-1540.50.20:
    name: Préparation aux inspections de pharmacovigilance
    description: |
      Préparation aux inspections de pharmacovigilance des autorités de santé.
  BC-1540.50.30:
    name: Gestion des CAPA de pharmacovigilance
    description: |
      Gestion des CAPA issus des audits et inspections de pharmacovigilance.
  BC-1540.50.40:
    name: Maintenance du fichier maître du système de pharmacovigilance
    description: |
      Maintenance du fichier maître du système de pharmacovigilance (PSMF).

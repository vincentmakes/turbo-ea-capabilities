locale: fr
source: L1-intellectual-property-management.yaml
entries:
  BC-840:
    name: Gestion de la propriété intellectuelle
    description: |
      Brevets, marques, droits d'auteur, secrets commerciaux et licences.
  BC-840.10:
    name: Gestion du portefeuille de brevets
    description: |
      Stratégie de brevets, dépôts, maintenance et revue du portefeuille.
  BC-840.10.10:
    name: Gestion des déclarations d'invention
    description: |
      Capture, évaluation et décision sur les déclarations d'invention.
  BC-840.10.20:
    name: Dépôt et procédure de brevet
    description: |
      Rédaction des demandes de brevet, dépôt et gestion de la procédure.
  BC-840.10.30:
    name: Maintenance des brevets
    description: |
      Paiement des annuités et maintenance des brevets accordés.
  BC-840.10.40:
    name: Revue du portefeuille de brevets
    description: |
      Revue périodique et rationalisation du portefeuille de brevets.
  BC-840.20:
    name: Gestion des marques
    description: |
      Dépôt, veille et défense des marques.
  BC-840.20.10:
    name: Recherche d'antériorité et dépôt de marques
    description: |
      Recherches d'antériorité et dépôts de marques.
  BC-840.20.20:
    name: Veille et surveillance des marques
    description: |
      Surveillance des dépôts et utilisations de marques concurrentes.
  BC-840.20.30:
    name: Gestion des renouvellements de marques
    description: |
      Renouvellement et maintenance des enregistrements de marques.
  BC-840.30:
    name: Gestion des droits d'auteur et des secrets commerciaux
    description: |
      Actifs protégés par le droit d'auteur, secrets commerciaux et confidentialité.
  BC-840.30.10:
    name: Enregistrement des actifs soumis au droit d'auteur
    description: |
      Identification et enregistrement des actifs protégeables par le droit d'auteur.
  BC-840.30.20:
    name: Identification et protection des secrets commerciaux
    description: |
      Identification et protection des secrets commerciaux.
  BC-840.30.30:
    name: Gestion de la confidentialité et des NDA
    description: |
      NDA, accords de confidentialité et contrôles d'accès.
  BC-840.40:
    name: Gestion des licences de propriété intellectuelle
    description: |
      Licences entrantes, licences sortantes et redevances.
  BC-840.40.10:
    name: Négociation des licences entrantes
    description: |
      Négociation et exécution des licences de PI entrantes.
  BC-840.40.20:
    name: Licences sortantes et commercialisation
    description: |
      Octroi de licences sortantes et commercialisation des brevets.
  BC-840.40.30:
    name: Administration des redevances
    description: |
      Calcul, perception et versement des redevances de PI.
  BC-840.40.40:
    name: Licences croisées et mutualisées
    description: |
      Accords de licences croisées et participation à des pools de brevets.
  BC-840.50:
    name: Défense et mise en oeuvre de la propriété intellectuelle
    description: |
      Détection des contrefaçons et actions d'application des droits.
  BC-840.50.10:
    name: Surveillance des contrefaçons
    description: |
      Surveillance des atteintes présumées à la propriété intellectuelle.
  BC-840.50.20:
    name: Actions d'application des droits de PI
    description: |
      Mises en demeure, oppositions et contentieux d'application des droits.
  BC-840.50.30:
    name: Défense et contre-attaque en matière de PI
    description: |
      Défense contre les revendications de PI et contre-contentieux.
  BC-840.50.40:
    name: Lutte contre la contrefaçon et protection de la marque
    description: |
      Détection et suppression des produits contrefaits et des atteintes à la marque.

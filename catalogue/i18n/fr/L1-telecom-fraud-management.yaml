locale: fr
source: L1-telecom-fraud-management.yaml
entries:
  BC-2690:
    name: Gestion de la fraude télécom
    description: |
      Détection, investigation, prévention, recouvrement et signalement
      inter-opérateurs de la fraude spécifique aux télécoms — fraude à
      l'abonnement, IRSF, Wangiri, échange de SIM, contournement et schémas
      de partage des revenus — ancré sur les orientations de la GSMA en matière
      de fraude.
  BC-2690.10:
    name: Détection de la fraude télécom
    description: |
      Détection en temps réel et quasi temps réel des schémas de fraude
      spécifiques aux télécoms sur le trafic voix, données et signalisation.
  BC-2690.10.10:
    name: Détection de la fraude à l'abonnement
    description: |
      Détection de l'acquisition frauduleuse de services utilisant des identités
      volées ou fabriquées.
  BC-2690.10.20:
    name: Détection de la fraude au partage de revenus internationaux
    description: |
      Détection des schémas de trafic IRSF gonflant le règlement vers des
      destinations premium.
  BC-2690.10.30:
    name: Détection du Wangiri
    description: |
      Détection des schémas de fraude au rappel Wangiri et des plages de numéros
      associées.
  BC-2690.10.40:
    name: Détection de l'échange de SIM
    description: |
      Détection des tentatives frauduleuses d'échange de SIM et eSIM et de la
      prise de contrôle de compte en aval.
  BC-2690.10.50:
    name: Détection de la fraude au contournement
    description: |
      Détection des schémas de SIM-box et autres contournements qui fraudent
      les revenus d'interconnexion.
  BC-2690.20:
    name: Investigation de la fraude télécom
    description: |
      Traitement des dossiers de fraude détectée, conservation des preuves et
      liaison avec les forces de l'ordre.
  BC-2690.20.10:
    name: Investigation des dossiers de fraude
    description: |
      Investigation structurée des dossiers de fraude détectée jusqu'au résultat.
  BC-2690.20.20:
    name: Collecte des éléments de preuve
    description: |
      Collecte et conservation forensique des éléments de preuve appuyant les
      investigations de fraude.
  BC-2690.20.30:
    name: Liaison avec les forces de l'ordre
    description: |
      Liaison avec les organismes d'application de la loi sur les dossiers de
      fraude transmis.
  BC-2690.30:
    name: Contrôles préventifs de la fraude télécom
    description: |
      Contrôles préventifs — règles, limites de vélocité, renforcement de
      l'authentification et listes noires — appliqués au trafic en temps réel.
  BC-2690.30.10:
    name: Gestion des règles de fraude en temps réel
    description: |
      Création et ajustement des ensembles de règles en temps réel utilisés
      par les plateformes de gestion de la fraude.
  BC-2690.30.20:
    name: Gestion des contrôles de vélocité
    description: |
      Contrôles basés sur la vélocité des usages, rechargements et modifications
      pour limiter l'exposition à la fraude.
  BC-2690.30.30:
    name: Renforcement de l'authentification
    description: |
      Authentification renforcée des transactions à risque élevé et des actions
      en libre-service.
  BC-2690.30.40:
    name: Gestion des listes noires de fraude
    description: |
      Maintenance des listes noires liées à la fraude pour les numéros, plages,
      terminaux et identités.
  BC-2690.40:
    name: Recouvrement des pertes dues à la fraude télécom
    description: |
      Recouvrement des frais frauduleux, des créances irrécouvrables et des
      actifs lorsque la fraude est confirmée.
  BC-2690.40.10:
    name: Recouvrement des frais frauduleux
    description: |
      Recouvrement des frais générés par des activités frauduleuses confirmées.
  BC-2690.40.20:
    name: Recouvrement des créances irrécouvrables
    description: |
      Recouvrement des créances irrécouvrables liées à la fraude à l'abonnement
      et à la prise de contrôle de compte.
  BC-2690.40.30:
    name: Recouvrement des actifs
    description: |
      Recouvrement des terminaux, SIM et autres actifs liés à des commandes
      frauduleuses.
  BC-2690.50:
    name: Reporting de fraude inter-opérateurs
    description: |
      Partage du renseignement sur la fraude au sein de l'industrie et signalement
      aux régulateurs lorsque requis.
  BC-2690.50.10:
    name: Partage du renseignement sur la fraude au niveau industriel
    description: |
      Contribution et consommation des canaux de renseignement sur la fraude
      au niveau industriel tels que le forum fraude de la GSMA.
  BC-2690.50.20:
    name: Signalement de la fraude aux régulateurs
    description: |
      Signalement des incidents de fraude et de l'exposition globale aux
      régulateurs lorsque cela est imposé.
  BC-2690.50.30:
    name: Transmission de fraude inter-opérateurs
    description: |
      Transmission des activités frauduleuses suspectées aux opérateurs
      originants ou terminants pour action conjointe.

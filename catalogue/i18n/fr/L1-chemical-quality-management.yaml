locale: fr
source: L1-chemical-quality-management.yaml
entries:
  BC-4670:
    name: Gestion de la qualité chimique
    description: |
      Définition des spécifications chimiques, opérations des laboratoires
      analytiques, libération des lots, gestion des réclamations clients et
      des litiges sur certificats d'analyse, étalons de référence et conformité
      aux BPF spécifiques au secteur.
  BC-4670.10:
    name: Gestion des spécifications chimiques
    description: |
      Définition et gestion du cycle de vie des spécifications des matières
      premières, intermédiaires et produits finis.
  BC-4670.10.10:
    name: Définition des spécifications des matières premières
    description: |
      Définition et révision des spécifications d'entrée des matières premières.
  BC-4670.10.20:
    name: Définition des spécifications des intermédiaires
    description: |
      Définition des spécifications des intermédiaires tout au long de la
      chaîne de production.
  BC-4670.10.30:
    name: Définition des spécifications des produits finis
    description: |
      Définition des spécifications des produits finis et des critères de
      libération.
  BC-4670.10.40:
    name: Gestion du cycle de vie des spécifications
    description: |
      Gestion du cycle de vie des spécifications approuvées et de leurs
      modifications.
  BC-4670.20:
    name: Opérations des laboratoires analytiques
    description: |
      Exploitation des laboratoires de contrôle qualité réalisant la chimie
      en phase humide, la chromatographie, la spectroscopie et les tests de
      propriétés physiques.
  BC-4670.20.10:
    name: Opérations de laboratoire de chimie en phase humide
    description: |
      Exploitation des flux de travail analytiques de chimie en phase humide.
  BC-4670.20.20:
    name: Opérations de chromatographie
    description: |
      Exploitation des plateformes HPLC, GC et chromatographie ionique.
  BC-4670.20.30:
    name: Opérations de spectroscopie
    description: |
      Exploitation des plateformes FTIR, RMN, ICP et spectrométrie de masse.
  BC-4670.20.40:
    name: Tests des propriétés physiques
    description: |
      Tests des propriétés physiques telles que la viscosité, la densité et
      la granulométrie.
  BC-4670.30:
    name: Gestion de la libération des lots
    description: |
      Décisions de disposition, émission des certificats d'analyse et gestion
      des non-conformités pour les lots chimiques.
  BC-4670.30.10:
    name: Décision de disposition des lots
    description: |
      Décision de disposition des lots fabriqués par rapport aux spécifications.
  BC-4670.30.20:
    name: Émission des certificats d'analyse
    description: |
      Émission des certificats d'analyse aux clients.
  BC-4670.30.30:
    name: Investigation des non-conformités
    description: |
      Investigation des résultats analytiques hors spécification.
  BC-4670.40:
    name: Gestion des réclamations clients et des litiges sur certificats d'analyse
    description: |
      Capture et résolution des réclamations clients et des litiges sur les
      certificats d'analyse.
  BC-4670.40.10:
    name: Capture des réclamations clients
    description: |
      Capture et triage des réclamations clients sur les produits chimiques.
  BC-4670.40.20:
    name: Investigation des litiges sur certificats d'analyse
    description: |
      Investigation des litiges portant sur les valeurs des certificats d'analyse.
  BC-4670.40.30:
    name: Contre-analyse des échantillons clients
    description: |
      Contre-analyse des échantillons conservés et fournis par les clients.
  BC-4670.50:
    name: Gestion des matériaux de référence et des étalons
    description: |
      Approvisionnement, qualification et surveillance de la stabilité des
      étalons et matériaux de référence.
  BC-4670.50.10:
    name: Approvisionnement en étalons de référence
    description: |
      Approvisionnement en matériaux de référence certifiés auprès de
      fournisseurs accrédités.
  BC-4670.50.20:
    name: Qualification des étalons de référence internes
    description: |
      Qualification des étalons de référence de travail internes.
  BC-4670.50.30:
    name: Surveillance de la stabilité des étalons de référence
    description: |
      Surveillance de la stabilité des étalons de référence en utilisation.
  BC-4670.60:
    name: Développement et validation des méthodes analytiques
    description: |
      Développement, validation et transfert des méthodes analytiques entre
      laboratoires.
  BC-4670.60.10:
    name: Développement des méthodes analytiques
    description: |
      Développement de nouvelles méthodes analytiques pour soutenir les
      spécifications.
  BC-4670.60.20:
    name: Validation des méthodes
    description: |
      Validation des méthodes analytiques pour l'exactitude, la précision et
      la robustesse.
  BC-4670.60.30:
    name: Transfert des méthodes
    description: |
      Transfert des méthodes validées entre laboratoires.
  BC-4670.70:
    name: Conformité aux BPF spécifiques au secteur
    description: |
      Conformité aux régimes de BPF spécifiques au secteur pour les produits
      chimiques fournis aux marchés aval réglementés.
  BC-4670.70.10:
    name: Conformité aux BPF EFfCI
    description: |
      Conformité aux BPF EFfCI pour les ingrédients cosmétiques.
  BC-4670.70.20:
    name: Conformité aux BPF IPEC
    description: |
      Conformité aux BPF IPEC pour les excipients pharmaceutiques.
  BC-4670.70.30:
    name: Conformité au contact alimentaire
    description: |
      Conformité aux réglementations sur le contact alimentaire pour les produits
      chimiques fournis aux emballages alimentaires.

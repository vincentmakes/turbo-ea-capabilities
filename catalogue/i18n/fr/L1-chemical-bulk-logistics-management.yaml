locale: fr
source: L1-chemical-bulk-logistics-management.yaml
entries:
  BC-4680:
    name: Gestion de la logistique en vrac chimique
    description: |
      Manutention des produits chimiques en vrac par les modes parc de réservoirs,
      routier, ferroviaire, maritime, pipeline et entrepôt — incluant les
      opérations conformes aux exigences matières dangereuses, le façonnage et
      la mesure au transfert de garde du vrac.
  BC-4680.10:
    name: Opérations de stockage en vrac et de parc de réservoirs
    description: |
      Exploitation des réservoirs de stockage en vrac et des parcs de réservoirs,
      incluant l'allocation, le nettoyage et la réconciliation des pertes.
  BC-4680.10.10:
    name: Gestion des stocks du parc de réservoirs
    description: |
      Gestion des stocks dans les parcs de réservoirs atmosphériques et sous
      pression.
  BC-4680.10.20:
    name: Allocation et routage des réservoirs
    description: |
      Allocation des réservoirs aux produits et routage des flux entrants et
      sortants.
  BC-4680.10.30:
    name: Coordination du nettoyage des réservoirs
    description: |
      Coordination du nettoyage des réservoirs entre les changements de produit.
  BC-4680.10.40:
    name: Réconciliation des pertes du parc de réservoirs
    description: |
      Réconciliation des pertes physiques dans les stocks du parc de réservoirs.
  BC-4680.20:
    name: Logistique des camions-citernes et conteneurs ISO-tank
    description: |
      Exploitation des flottes de camions-citernes et d'ISO-tank incluant les
      opérations de quais de chargement et le nettoyage des conteneurs.
  BC-4680.20.10:
    name: Planification des camions-citernes
    description: |
      Planification des mouvements de camions-citernes et allocation des quais.
  BC-4680.20.20:
    name: Gestion de la flotte d'ISO-tank
    description: |
      Gestion des flottes d'ISO-tank incluant le positionnement et la réutilisation.
  BC-4680.20.30:
    name: Opérations des quais de chargement
    description: |
      Exploitation des quais de chargement pour l'expédition routière et en
      ISO-tank.
  BC-4680.20.40:
    name: Coordination du nettoyage des conteneurs
    description: |
      Coordination du nettoyage approuvé des conteneurs entre les chargements.
  BC-4680.30:
    name: Logistique des wagons-citernes ferroviaires
    description: |
      Allocation, chargement, déchargement et coordination de la maintenance
      des wagons-citernes ferroviaires.
  BC-4680.30.10:
    name: Allocation des wagons-citernes ferroviaires
    description: |
      Allocation des wagons-citernes ferroviaires aux produits et aux routes.
  BC-4680.30.20:
    name: Opérations de chargement et déchargement ferroviaires
    description: |
      Exploitation des rampes de chargement et de déchargement ferroviaires.
  BC-4680.30.30:
    name: Coordination de la maintenance des wagons-citernes
    description: |
      Coordination de la maintenance et de la qualification à l'échelle de la
      flotte des wagons-citernes.
  BC-4680.40:
    name: Logistique maritime des produits chimiques en vrac
    description: |
      Logistique maritime pour les chimiquiers et cargaisons en lot, incluant
      l'affrètement, le chargement et l'arrimage.
  BC-4680.40.10:
    name: Coordination de l'affrètement des chimiquiers
    description: |
      Coordination de l'affrètement des chimiquiers et transporteurs en lot.
  BC-4680.40.20:
    name: Opérations de chargement et déchargement maritimes
    description: |
      Exploitation des installations de chargement et de déchargement maritimes.
  BC-4680.40.30:
    name: Planification de l'arrimage des cargaisons en lot
    description: |
      Planification de l'arrimage des cargaisons compatibles en lot sur les
      chimiquiers.
  BC-4680.50:
    name: Coordination des mouvements par pipeline
    description: |
      Nomination, séquencement et coordination du transfert de garde pour les
      mouvements de produits chimiques en vrac par pipeline.
  BC-4680.50.10:
    name: Gestion des nominations de pipeline
    description: |
      Nomination des mouvements de pipeline avec les opérateurs et contreparties.
  BC-4680.50.20:
    name: Séquencement des lots en pipeline
    description: |
      Séquencement des lots avec gestion des interfaces.
  BC-4680.50.30:
    name: Coordination du transfert de garde par pipeline
    description: |
      Coordination du transfert de garde aux points d'injection et de livraison
      du pipeline.
  BC-4680.60:
    name: Opérations d'entreposage de matières dangereuses
    description: |
      Réception, ségrégation et stockage des produits chimiques conditionnés
      dangereux dans des entrepôts conformes.
  BC-4680.60.10:
    name: Réception et mise en stock des matières dangereuses
    description: |
      Réception et mise en stock des produits chimiques conditionnés dangereux.
  BC-4680.60.20:
    name: Gestion de la conformité à la ségrégation
    description: |
      Gestion de la conformité à la ségrégation des produits chimiques en
      entrepôt.
  BC-4680.60.30:
    name: Opérations de stockage de fûts et de GRV
    description: |
      Opérations de stockage des fûts et grands récipients intermédiaires pour
      vrac.
  BC-4680.70:
    name: Coordination du façonnage et de la fabrication pour compte de tiers
    description: |
      Coordination de la fabrication à façon sur les actifs tiers incluant la
      réconciliation des matières façonnées.
  BC-4680.70.10:
    name: Sélection et qualification des façonniers
    description: |
      Sélection et qualification des partenaires de fabrication à façon.
  BC-4680.70.20:
    name: Planification de la fabrication à façon
    description: |
      Planification des campagnes de façonnage sur les actifs tiers.
  BC-4680.70.30:
    name: Réconciliation des matières façonnées
    description: |
      Réconciliation des matières entrant et sortant de la fabrication à façon.
  BC-4680.80:
    name: Mesure au transfert de garde du vrac
    description: |
      Mesure du volume, de la masse et échantillonnage aux interfaces de transfert
      de garde.
  BC-4680.80.10:
    name: Mesure du volume et de la masse
    description: |
      Mesure calibrée du volume et de la masse aux points de transfert.
  BC-4680.80.20:
    name: Coordination de l'échantillonnage
    description: |
      Coordination de l'échantillonnage représentatif au transfert de garde.
  BC-4680.80.30:
    name: Documentation du transfert de garde
    description: |
      Émission et conservation de la documentation de transfert de garde.

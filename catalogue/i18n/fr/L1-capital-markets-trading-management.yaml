locale: fr
source: L1-capital-markets-trading-management.yaml
entries:
  BC-1370:
    name: Gestion du trading sur les marchés des capitaux
    description: |
      Trading en salle des marchés, tenue de marché, gestion des positions, vente et trading.
  BC-1370.10:
    name: Gestion de la tenue de marché
    description: |
      Tenue de marché sur l'ensemble des classes d'actifs.
  BC-1370.10.10:
    name: Génération de cotations
    description: |
      Génération de cotations à l'achat et à la vente sur les marchés.
  BC-1370.10.20:
    name: Gestion de l'inventaire du teneur de marché
    description: |
      Gestion de l'inventaire et de la position de risque du teneur de marché.
  BC-1370.10.30:
    name: Moteur de pricing du teneur de marché
    description: |
      Exploitation du moteur de pricing et gestion des paramètres.
  BC-1370.20:
    name: Gestion des positions de trading
    description: |
      Positions de trading et attribution des profits et pertes.
  BC-1370.20.10:
    name: Tenue des positions en temps réel
    description: |
      Suivi en temps réel des positions du portefeuille de négociation.
  BC-1370.20.20:
    name: Calcul des profits et pertes de trading
    description: |
      Calcul des profits et pertes de trading par desk.
  BC-1370.20.30:
    name: Analyse d'attribution des profits et pertes
    description: |
      Attribution des profits et pertes par facteur de risque, période et trader.
  BC-1370.30:
    name: Gestion des ordres de trading
    description: |
      Collecte, exécution, routage intelligent et meilleure exécution des ordres.
  BC-1370.30.10:
    name: Collecte des ordres de trading
    description: |
      Collecte et validation des ordres clients et propriétaires.
  BC-1370.30.20:
    name: Routage intelligent des ordres
    description: |
      Routage intelligent des ordres sur les plateformes pour obtenir la meilleure exécution.
  BC-1370.30.30:
    name: Suivi de la qualité d'exécution
    description: |
      Suivi de la qualité d'exécution et analytique de meilleure exécution.
  BC-1370.30.40:
    name: Gestion du cycle de vie des ordres
    description: |
      Cycle de vie des ordres incluant les modifications et annulations.
  BC-1370.40:
    name: Gestion du trading algorithmique
    description: |
      Stratégies algorithmiques, backtesting et conformité.
  BC-1370.40.10:
    name: Développement des stratégies algorithmiques
    description: |
      Développement et certification des stratégies algorithmiques.
  BC-1370.40.20:
    name: Backtesting algorithmique
    description: |
      Backtesting et simulation des algorithmes de trading.
  BC-1370.40.30:
    name: Contrôles du trading algorithmique
    description: |
      Contrôles pré-négociation et en cours d'exploitation sur le trading algorithmique.
  BC-1370.50:
    name: Gestion de la vente et du trading
    description: |
      Desks de vente clients, trading vocal et électronique.
  BC-1370.50.10:
    name: Opérations des desks de vente clients
    description: |
      Exploitation des desks de vente vocaux pour les clients institutionnels.
  BC-1370.50.20:
    name: Opérations de trading électronique
    description: |
      Exploitation des plateformes de trading électronique et des connexions.
  BC-1370.50.30:
    name: Recherche pré-négociation et pricing
    description: |
      Recherche pré-négociation, pricing indicatif et support à la structuration.
  BC-1370.60:
    name: Gestion de la conformité et de la surveillance du trading
    description: |
      Surveillance des transactions, détection des abus de marché et MiFID II.
  BC-1370.60.10:
    name: Surveillance des transactions
    description: |
      Surveillance des transactions et détection de comportements suspects.
  BC-1370.60.20:
    name: Détection des abus de marché
    description: |
      Détection des abus de marché incluant le délit d'initié et la manipulation.
  BC-1370.60.30:
    name: Surveillance des communications
    description: |
      Surveillance des communications et des conversations vocales des traders.
  BC-1370.60.40:
    name: Déclaration réglementaire des transactions
    description: |
      Déclaration réglementaire des transactions (MiFIR, EMIR, SFTR).

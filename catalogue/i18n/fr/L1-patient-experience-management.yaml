locale: fr
source: L1-patient-experience-management.yaml
entries:
  BC-2910:
    name: Gestion de l'expérience patient
    description: |
      Engagement du patient, services numériques, mesure de la satisfaction, défense des droits et gestion des réclamations, droits des patients et éthique, services bénévoles et auxiliaires tout au long du parcours de soins.
  BC-2910.10:
    name: Engagement et communication des patients
    description: |
      Communication multicanale avec les patients et leurs familles, incluant l'éducation et les services linguistiques.
  BC-2910.10.10:
    name: Communication multicanale avec les patients
    description: |
      Communication coordonnée avec les patients par téléphone, messagerie sécurisée, courrier et canaux numériques.
  BC-2910.10.20:
    name: Éducation thérapeutique
    description: |
      Délivrance aux patients d'informations sur les maladies, les traitements et la prévention.
  BC-2910.10.30:
    name: Communication avec les familles et les aidants
    description: |
      Communication avec les familles et les aidants autorisés durant les épisodes de soins.
  BC-2910.10.40:
    name: Services linguistiques et d'interprétation
    description: |
      Fourniture de services d'interprétation et de traduction linguistiques.
  BC-2910.20:
    name: Portail patient et services numériques
    description: |
      Exploitation des services numériques destinés aux patients, incluant les portails, les applications mobiles et les outils en libre-service.
  BC-2910.20.10:
    name: Opérations du portail patient
    description: |
      Exploitation des services du portail patient, notamment la messagerie et l'accès aux dossiers.
  BC-2910.20.20:
    name: Opérations des applications mobiles de santé
    description: |
      Exploitation des applications mobiles de santé destinées aux patients.
  BC-2910.20.30:
    name: Outils en libre-service pour les patients
    description: |
      Outils en libre-service pour la prise de rendez-vous, le paiement et la préparation avant la visite.
  BC-2910.20.40:
    name: Gestion de l'identité numérique des patients
    description: |
      Gestion de l'identité numérique, de l'authentification et des accès par mandataire des patients.
  BC-2910.30:
    name: Mesure de la satisfaction des patients
    description: |
      Mesure par enquête et en temps réel de la satisfaction et de l'expérience des patients.
  BC-2910.30.10:
    name: Opérations des enquêtes de satisfaction en hospitalisation
    description: |
      Animation des programmes d'enquêtes de satisfaction en hospitalisation et analyse des résultats.
  BC-2910.30.20:
    name: Enquêtes de satisfaction en ambulatoire
    description: |
      Animation des programmes d'enquêtes de satisfaction en ambulatoire et en spécialité.
  BC-2910.30.30:
    name: Collecte des retours en temps réel
    description: |
      Collecte des retours en temps réel et au point de contact auprès des patients.
  BC-2910.30.40:
    name: Analyse de l'expérience
    description: |
      Analyse des facteurs influençant l'expérience, des thèmes et des opportunités d'amélioration.
  BC-2910.40:
    name: Défense des droits et réclamations des patients
    description: |
      Défense des droits des patients, traitement des plaintes et des réclamations formelles, et service de récupération.
  BC-2910.40.10:
    name: Réception des plaintes des patients
    description: |
      Réception des plaintes des patients sur l'ensemble des canaux.
  BC-2910.40.20:
    name: Instruction des réclamations
    description: |
      Investigation formelle et résolution des réclamations des patients.
  BC-2910.40.30:
    name: Défense des droits des patients
    description: |
      Services de défense des droits des patients durant les épisodes de soins.
  BC-2910.40.40:
    name: Service de récupération
    description: |
      Interventions de service de récupération suite aux défaillances de service.
  BC-2910.50:
    name: Droits des patients et éthique
    description: |
      Supervision des droits des patients, des processus de consentement éclairé, des directives anticipées et des consultations éthiques.
  BC-2910.50.10:
    name: Supervision du processus de consentement éclairé
    description: |
      Supervision des processus de consentement éclairé pour les soins et la recherche.
  BC-2910.50.20:
    name: Gestion des directives anticipées
    description: |
      Collecte, stockage et présentation des directives anticipées et des objectifs de soins.
  BC-2910.50.30:
    name: Consultation éthique
    description: |
      Services de consultation éthique clinique pour les patients, les familles et les cliniciens.
  BC-2910.50.40:
    name: Éducation aux droits des patients
    description: |
      Information des patients sur leurs droits et leurs responsabilités.
  BC-2910.60:
    name: Services bénévoles et auxiliaires
    description: |
      Animation des programmes de bénévolat et des programmes auxiliaires au soutien des patients et des familles.
  BC-2910.60.10:
    name: Intégration des bénévoles
    description: |
      Recrutement, sélection et intégration des bénévoles.
  BC-2910.60.20:
    name: Prestation des services bénévoles
    description: |
      Coordination et mise en œuvre des services bénévoles dans l'ensemble des services.
  BC-2910.60.30:
    name: Programmes auxiliaires
    description: |
      Animation des programmes auxiliaires, philanthropiques et communautaires.
  BC-2910.60.40:
    name: Services de soutien aux patients
    description: |
      Services de soutien tels que la navigation patients, l'aumônerie et les salons familiaux.

locale: fr
source: L1-mineral-resource-reserve-management.yaml
entries:
  BC-4410:
    name: Gestion des ressources et réserves minières
    description: |
      Modélisation géologique, estimation géostatistique, classification,
      gouvernance des personnes compétentes et reporting public des ressources
      minérales et des réserves minières conformément aux codes de la famille
      CRIRSCO.
  BC-4410.10:
    name: Modélisation géologique
    description: |
      Construction de modèles géologiques tridimensionnels de la lithologie,
      de la structure, de l'altération et des domaines de minéralisation
      comme données d'entrée pour l'estimation des ressources.
    in_scope:
      - Modélisation lithologique et stratigraphique
      - Modélisation structurale et des failles
      - Wireframing des domaines de minéralisation
    out_of_scope:
      - Wireframes de conception de fosse et de chantier (BC-4420.40)
  BC-4410.10.10:
    name: Modélisation lithologique
    description: |
      Modélisation tridimensionnelle des unités lithologiques et stratigraphiques
      à partir de la diagraphie des forages.
  BC-4410.10.20:
    name: Modélisation structurale
    description: |
      Modélisation des failles, plis et zones de cisaillement contrôlant
      la géométrie de la minéralisation.
  BC-4410.10.30:
    name: Modélisation des domaines de minéralisation
    description: |
      Wireframing des enveloppes de minéralisation et des domaines de teneur
      utilisés comme limites d'estimation.
  BC-4410.10.40:
    name: Workflows de modélisation implicite
    description: |
      Workflows de modélisation géologique implicite et à mise à jour rapide
      pour le raffinement itératif des modèles.
  BC-4410.20:
    name: Estimation des ressources
    description: |
      Estimation géostatistique de la teneur et de la tonnage dans des modèles
      en blocs et classification du matériel estimé en ressources Inférées,
      Indiquées ou Mesurées conformément aux codes de reporting public.
  BC-4410.20.10:
    name: Estimation géostatistique
    description: |
      Variographie et estimation par krigeage ou simulation de la teneur
      dans les modèles en blocs.
  BC-4410.20.20:
    name: Construction du modèle en blocs
    description: |
      Construction et population de modèles en blocs régularisés pour la
      planification en aval.
  BC-4410.20.30:
    name: Validation de l'estimation
    description: |
      Validation statistique et visuelle des teneurs estimées par rapport
      aux données composites.
  BC-4410.20.40:
    name: Classification des ressources
    description: |
      Classification de la minéralisation estimée en catégories Inférées,
      Indiquées et Mesurées.
  BC-4410.30:
    name: Estimation des réserves
    description: |
      Application des facteurs modificateurs miniers, métallurgiques, économiques
      et autres pour convertir les ressources Indiquées et Mesurées en réserves
      Probables et Prouvées.
  BC-4410.30.10:
    name: Application des facteurs modificateurs
    description: |
      Application des facteurs modificateurs miniers, métallurgiques,
      infrastructurels et économiques aux ressources.
  BC-4410.30.20:
    name: Détermination de la teneur de coupure
    description: |
      Calcul des teneurs de coupure soutenant la définition des réserves
      selon des hypothèses de prix et de coûts.
  BC-4410.30.30:
    name: Modélisation de la récupération minière et de la dilution
    description: |
      Modélisation de la récupération minière, de la dilution et des effets
      de bord appliqués aux ressources en place.
  BC-4410.30.40:
    name: Classification des réserves minières
    description: |
      Classification des réserves minières en catégories Probables et Prouvées.
  BC-4410.40:
    name: Gouvernance des personnes compétentes
    description: |
      Gouvernance des personnes compétentes et qualifiées prenant la responsabilité
      des déclarations de ressources et réserves conformément aux codes de
      reporting public.
  BC-4410.40.10:
    name: Validation par la personne compétente
    description: |
      Revue et validation par la personne compétente ou qualifiée des
      déclarations de ressources et réserves.
  BC-4410.40.20:
    name: Revue interne des ressources
    description: |
      Revue interne par les pairs et le comité technique des estimations
      de ressources et réserves.
  BC-4410.40.30:
    name: Coordination des audits externes des ressources
    description: |
      Coordination des audits indépendants de ressources et réserves par
      des tiers.
  BC-4410.50:
    name: Reporting public des ressources et réserves
    description: |
      Préparation et divulgation des déclarations publiques de ressources
      minérales et de réserves minières requises par les régulateurs des valeurs
      mobilières et les règles de cotation.
  BC-4410.50.10:
    name: Préparation de la déclaration de ressources
    description: |
      Préparation des déclarations publiques de ressources minérales alignées
      sur les codes de la famille CRIRSCO.
  BC-4410.50.20:
    name: Préparation de la déclaration de réserves
    description: |
      Préparation des déclarations publiques de réserves minières alignées
      sur les codes de la famille CRIRSCO.
  BC-4410.50.30:
    name: Mise à jour annuelle de la déclaration de réserves
    description: |
      Mise à jour annuelle des déclarations de ressources et réserves reflétant
      l'épuisement et les nouvelles estimations.
  BC-4410.50.40:
    name: Coordination des rapports techniques indépendants
    description: |
      Coordination des rapports techniques de personnes qualifiées pour les
      marchés financiers, les transactions et les événements de divulgation.
  BC-4410.60:
    name: Réconciliation des ressources
    description: |
      Réconciliation des ressources et réserves estimées par rapport au contrôle
      de teneur, à l'alimentation de l'usine et à la production métallique
      pour évaluer les performances du modèle.
  BC-4410.60.10:
    name: Réconciliation mine-usine
    description: |
      Réconciliation des tonnes et teneurs extraites par rapport à l'alimentation
      de l'usine et au métal récupéré.
  BC-4410.60.20:
    name: Suivi de l'épuisement des ressources
    description: |
      Suivi de l'épuisement des ressources et réserves résultant de l'activité
      minière.
  BC-4410.60.30:
    name: Analyse des performances du modèle
    description: |
      Analyse des performances du modèle de ressources par rapport aux données
      réelles pour éclairer les futures estimations.

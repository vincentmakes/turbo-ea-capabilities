locale: fr
source: L1-aviation-safety-management.yaml
entries:
  BC-1280:
    name: Gestion de la sécurité aérienne
    description: |
      Système de gestion de la sécurité, évaluation des risques, culture juste et enquête sur les événements.
  BC-1280.10:
    name: Gestion du système de gestion de la sécurité
    description: |
      Cadre SMS, politique de sécurité, objectifs de sécurité et gouvernance de la sécurité.
  BC-1280.10.10:
    name: Politique et objectifs de sécurité
    description: |
      Définition de la politique de sécurité et des objectifs de sécurité.
  BC-1280.10.20:
    name: Gestion du cadre SMS
    description: |
      Maintenance du cadre SMS conformément à l'Annexe 19 de l'ICAO.
  BC-1280.10.30:
    name: Gouvernance et responsabilité en matière de sécurité
    description: |
      Comités de revue de sécurité et dispositions relatives au gestionnaire responsable.
  BC-1280.10.40:
    name: Gestion des ressources dédiées à la sécurité
    description: |
      Allocation des ressources à la fonction sécurité.
  BC-1280.20:
    name: Gestion de l'évaluation des risques de sécurité
    description: |
      Identification des dangers, évaluation des risques et atténuation des risques.
  BC-1280.20.10:
    name: Identification des dangers
    description: |
      Identification proactive et réactive des dangers.
  BC-1280.20.20:
    name: Évaluation des risques de sécurité
    description: |
      Évaluation de la probabilité et de la gravité des risques de sécurité.
  BC-1280.20.30:
    name: Atténuation des risques de sécurité
    description: |
      Définition et suivi des actions d'atténuation des risques de sécurité.
  BC-1280.20.40:
    name: Évaluation de la sécurité lors des changements
    description: |
      Évaluation de la sécurité des changements opérationnels et techniques.
  BC-1280.30:
    name: Gestion de la culture juste et du reporting
    description: |
      Reporting confidentiel, culture juste et signalement volontaire d'événements.
  BC-1280.30.10:
    name: Programme de culture juste
    description: |
      Programme de culture juste et protection des personnes qui signalent des événements.
  BC-1280.30.20:
    name: Signalement volontaire des événements
    description: |
      Canaux de signalement volontaire et confidentiel des événements.
  BC-1280.30.30:
    name: Signalement obligatoire des événements
    description: |
      Signalement obligatoire des événements aux autorités de régulation.
  BC-1280.40:
    name: Gestion des enquêtes sur les événements
    description: |
      Enquêtes internes, analyse des causes profondes et retours d'expérience.
  BC-1280.40.10:
    name: Enquête interne sur les événements
    description: |
      Enquête interne sur les événements de sécurité.
  BC-1280.40.20:
    name: Analyse des causes profondes
    description: |
      Analyse des causes profondes des événements et des facteurs contributifs.
  BC-1280.40.30:
    name: Retours d'expérience des enquêtes
    description: |
      Capitalisation et diffusion des enseignements tirés en matière de sécurité.
  BC-1280.50:
    name: Gestion du suivi des performances de sécurité
    description: |
      Indicateurs de performance de sécurité (SPI), cibles (SPT), tableaux de bord et reporting aux régulateurs.
  BC-1280.50.10:
    name: Gestion des indicateurs de performance de sécurité
    description: |
      Définition et suivi des SPI et des SPT.
  BC-1280.50.20:
    name: Analyse des tendances de sécurité
    description: |
      Analyse des tendances des événements et des performances des SPI.
  BC-1280.50.30:
    name: Reporting de sécurité au régulateur
    description: |
      Reporting périodique des performances de sécurité à l'autorité de l'aviation civile.
  BC-1280.60:
    name: Gestion de la promotion de la sécurité
    description: |
      Programmes de culture de sécurité, formation, sensibilisation et communication.
  BC-1280.60.10:
    name: Programme de culture de sécurité
    description: |
      Enquêtes sur la culture de sécurité et programmes d'amélioration.
  BC-1280.60.20:
    name: Dispensation de la formation à la sécurité
    description: |
      Dispensation de la formation à la sécurité et de la formation SMS récurrente.
  BC-1280.60.30:
    name: Communication en matière de sécurité
    description: |
      Communications de sécurité, bulletins et campagnes de sensibilisation.

locale: fr
source: L1-public-procurement-contracting-management.yaml
entries:
  BC-3270:
    name: Gestion de la passation des marchés publics et de la contractualisation
    description: |
      Marchés publics et contractualisation dans le cadre des régimes FAR/DFARS et des directives
      européennes sur les marchés publics, incluant la planification des achats, la sollicitation,
      la sélection des sources, l'attribution et l'administration des marchés, la performance
      des fournisseurs, les recours et les programmes socio-économiques.
  BC-3270.10:
    name: Planification des achats
    description: |
      Formulation de la stratégie d'achat, étude de marché et planification des marchés publics.
    in_scope:
      - Étude de marché et consolidation des besoins
      - Stratégie d'achat et sélection de la méthode
      - Préparation de l'estimation indépendante des coûts par le gouvernement
    out_of_scope:
      - Stratégie d'approvisionnement inter-industries pour les marchés non gouvernementaux (couverte par la gestion des achats)
  BC-3270.10.10:
    name: Étude de marché
    description: |
      Étude de marché portant sur la base de fournisseurs, les capacités et la tarification pour le besoin.
  BC-3270.10.20:
    name: Stratégie d'achat
    description: |
      Sélection de la méthode de contractualisation, du véhicule et de l'approche concurrentielle.
  BC-3270.10.30:
    name: Estimation indépendante des coûts
    description: |
      Préparation des estimations indépendantes des coûts du gouvernement et des réservations budgétaires.
  BC-3270.10.40:
    name: Élaboration des spécifications et des cahiers des charges
    description: |
      Élaboration des spécifications, des cahiers des charges et des énoncés des travaux à réaliser.
  BC-3270.20:
    name: Gestion des appels d'offres
    description: |
      Émission des appels d'offres incluant RFP, IFB et RFQ, les avenants et les questions des soumissionnaires.
  BC-3270.20.10:
    name: Rédaction des appels d'offres
    description: |
      Rédaction des RFP, IFB, RFQ et de la documentation d'appel d'offres.
  BC-3270.20.20:
    name: Publication des appels d'offres
    description: |
      Publication des appels d'offres sur les systèmes d'avis officiels et les équivalents OJEU/SAM.gov.
  BC-3270.20.30:
    name: Traitement des questions des soumissionnaires
    description: |
      Traitement des questions, avenants et clarifications des soumissionnaires pendant la sollicitation.
  BC-3270.20.40:
    name: Conférence préalable à la soumission
    description: |
      Conduite des conférences préalables à la soumission et des visites de sites.
  BC-3270.30:
    name: Sélection des sources et évaluation
    description: |
      Réception, évaluation et sélection des offres et propositions par rapport aux critères publiés.
  BC-3270.30.10:
    name: Réception des offres et propositions
    description: |
      Réception, enregistrement et sauvegarde des offres et propositions.
  BC-3270.30.20:
    name: Évaluation technique
    description: |
      Évaluation technique des propositions par rapport aux critères énoncés.
  BC-3270.30.30:
    name: Analyse des prix et des coûts
    description: |
      Analyse du caractère raisonnable des prix et du réalisme des coûts des offres.
  BC-3270.30.40:
    name: Détermination de la responsabilité
    description: |
      Détermination de la responsabilité du contractant, de sa capacité financière et de son intégrité.
  BC-3270.40:
    name: Attribution et formation du marché
    description: |
      Décision de sélection, notification d'attribution, compte rendu et formation du marché
      incluant la signature.
  BC-3270.40.10:
    name: Décision de sélection
    description: |
      Décision d'attribution et documentation de la décision de sélection de la source.
  BC-3270.40.20:
    name: Avis d'attribution et compte rendu
    description: |
      Avis d'attribution, notification aux soumissionnaires non retenus et compte rendu.
  BC-3270.40.30:
    name: Signature du marché et engagement
    description: |
      Exécution des documents contractuels et engagement des fonds.
  BC-3270.50:
    name: Administration et modification du marché
    description: |
      Administration quotidienne du marché incluant les modifications, les réclamations
      et la supervision par l'agent contractant.
  BC-3270.50.10:
    name: Acceptation des livrables
    description: |
      Inspection et acceptation des livrables par rapport aux exigences contractuelles.
  BC-3270.50.20:
    name: Modification du marché
    description: |
      Émission des modifications, des ordres de changement et des exercices d'options contractuelles.
  BC-3270.50.30:
    name: Traitement des réclamations contractuelles
    description: |
      Réception et instruction des réclamations des contractants et des ajustements équitables.
  BC-3270.50.40:
    name: Clôture du marché
    description: |
      Acceptation finale, désengagement et clôture physique et administrative du marché.
  BC-3270.60:
    name: Gestion de la performance des fournisseurs
    description: |
      Enregistrement des performances passées, exclusion et suspension, et suivi
      de la responsabilité des contractants.
  BC-3270.60.10:
    name: Enregistrement des performances passées
    description: |
      Enregistrement des évaluations de performance passée des contractants dans les bases de données gouvernementales.
  BC-3270.60.20:
    name: Administration des suspensions et exclusions
    description: |
      Administration des procédures de suspension et d'exclusion à l'encontre des contractants.
  BC-3270.60.30:
    name: Surveillance de la responsabilité des contractants
    description: |
      Surveillance continue de la responsabilité et de la capacité financière des contractants.
  BC-3270.70:
    name: Traitement des recours et des litiges
    description: |
      Réception et traitement des recours en matière d'appel d'offres et des litiges contractuels
      par les voies administratives et judiciaires.
  BC-3270.70.10:
    name: Traitement des recours en matière d'appel d'offres
    description: |
      Traitement des recours préalables et postérieurs à l'attribution en matière d'appel d'offres.
  BC-3270.70.20:
    name: Résolution des litiges contractuels
    description: |
      Résolution administrative et judiciaire des litiges contractuels.
  BC-3270.70.30:
    name: Résolution alternative des litiges
    description: |
      Médiation, arbitrage et modes alternatifs de résolution des litiges contractuels.
  BC-3270.80:
    name: Administration des réservations et des programmes socio-économiques
    description: |
      Administration des préférences et objectifs d'achats en faveur des petites entreprises,
      des minorités, des femmes et d'autres catégories socio-économiques.
  BC-3270.80.10:
    name: Détermination des réservations
    description: |
      Détermination de l'applicabilité des réservations aux petites entreprises et aux catégories socio-économiques.
  BC-3270.80.20:
    name: Supervision des plans de sous-traitance
    description: |
      Supervision des plans et rapports de sous-traitance aux petites entreprises.
  BC-3270.80.30:
    name: Reporting des objectifs socio-économiques
    description: |
      Suivi et reporting des objectifs et des résultats des marchés socio-économiques.

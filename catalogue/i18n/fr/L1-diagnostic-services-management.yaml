locale: fr
source: L1-diagnostic-services-management.yaml
entries:
  BC-2860:
    name: Gestion des services diagnostiques
    description: |
      Biologie médicale, anatomopathologie, imagerie diagnostique, explorations cardiopulmonaires, tests au point de soins et gestion de bout en bout des résultats diagnostiques.
  BC-2860.10:
    name: Gestion des services de biologie médicale
    description: |
      Prélèvement des échantillons, biochimie clinique, hématologie, microbiologie, tests moléculaires et opérations du système d'information de laboratoire.
  BC-2860.10.10:
    name: Prélèvement et transport des échantillons
    description: |
      Phlébotomie, prélèvement des échantillons et logistique de transport.
  BC-2860.10.20:
    name: Biochimie clinique et hématologie
    description: |
      Opérations de biochimie clinique, d'hématologie et de tests de coagulation.
  BC-2860.10.30:
    name: Microbiologie et tests moléculaires
    description: |
      Tests diagnostiques en microbiologie, virologie et biologie moléculaire.
  BC-2860.10.40:
    name: Opérations du système d'information de laboratoire
    description: |
      Exploitation du système d'information de laboratoire et des interfaces avec les automates.
  BC-2860.20:
    name: Services d'anatomopathologie
    description: |
      Opérations en histologie, cytologie, anatomopathologie chirurgicale et pathologie numérique.
  BC-2860.20.10:
    name: Traitement histologique
    description: |
      Traitement des tissus, inclusion, coupe et coloration pour l'histologie.
  BC-2860.20.20:
    name: Services de cytologie
    description: |
      Préparation, dépistage et compte-rendu des prélèvements cytologiques.
  BC-2860.20.30:
    name: Compte-rendu d'anatomopathologie chirurgicale
    description: |
      Interprétation et compte-rendu des cas d'anatomopathologie chirurgicale par le pathologiste.
  BC-2860.20.40:
    name: Opérations de pathologie numérique
    description: |
      Acquisition d'images numériques de lames entières, stockage et flux de travail en pathologie numérique.
  BC-2860.30:
    name: Services d'imagerie diagnostique
    description: |
      Acquisition, lecture, archivage et gestion de la dosimétrie pour les modalités d'imagerie diagnostique.
  BC-2860.30.10:
    name: Acquisition des examens d'imagerie
    description: |
      Acquisition des examens d'imagerie en radiographie, tomodensitométrie, IRM, échographie et médecine nucléaire.
  BC-2860.30.20:
    name: Lecture et compte-rendu des images
    description: |
      Lecture et compte-rendu structuré des examens d'imagerie par le radiologue.
  BC-2860.30.30:
    name: Opérations d'archivage des images
    description: |
      Exploitation des archives d'imagerie et échange d'images entre établissements.
  BC-2860.30.40:
    name: Gestion de la dosimétrie
    description: |
      Suivi, optimisation et déclaration de la dose de rayonnement reçue par les patients.
  BC-2860.40:
    name: Explorations cardiologiques et cardiopulmonaires
    description: |
      Services d'électrocardiographie, d'échocardiographie, de cathétérisme cardiaque et d'explorations fonctionnelles respiratoires.
  BC-2860.40.10:
    name: Électrocardiographie et télémétrie
    description: |
      Acquisition d'ECG, surveillance par télémétrie et interprétation des arythmies.
  BC-2860.40.20:
    name: Échocardiographie
    description: |
      Services d'échographie transthoracique, transoesophagienne et de stress.
  BC-2860.40.30:
    name: Cathétérisme cardiaque
    description: |
      Services de cathétérisme cardiaque diagnostique et d'exploration électrophysiologique.
  BC-2860.40.40:
    name: Explorations fonctionnelles respiratoires
    description: |
      Spirométrie, mesure des volumes pulmonaires, diffusion et épreuves d'effort respiratoires.
  BC-2860.50:
    name: Tests au point de soins
    description: |
      Gouvernance, contrôle de qualité, compétence des opérateurs et intégration des résultats pour les tests au point de soins dans l'ensemble de l'établissement.
  BC-2860.50.10:
    name: Gestion des dispositifs de tests au point de soins
    description: |
      Gestion du parc et du cycle de vie des dispositifs de tests au point de soins.
  BC-2860.50.20:
    name: Contrôle de qualité des tests au point de soins
    description: |
      Contrôle de qualité et tests de compétence pour les dispositifs de tests au point de soins.
  BC-2860.50.30:
    name: Gestion des compétences des opérateurs
    description: |
      Certification et évaluation des compétences des opérateurs pour les tests au point de soins.
  BC-2860.50.40:
    name: Intégration des résultats des tests au point de soins
    description: |
      Intégration des résultats des tests au point de soins dans le dossier de laboratoire et le dossier patient.
  BC-2860.60:
    name: Gestion des résultats diagnostiques
    description: |
      Validation, distribution et gestion des règles de réflexe pour les résultats diagnostiques de toutes les modalités.
  BC-2860.60.10:
    name: Validation des résultats
    description: |
      Validation technique et clinique des résultats diagnostiques.
  BC-2860.60.20:
    name: Notification des valeurs critiques
    description: |
      Notification dans les délais impartis des valeurs critiques aux soignants prescripteurs.
  BC-2860.60.30:
    name: Distribution des résultats
    description: |
      Distribution des résultats aux soignants prescripteurs, aux patients et aux systèmes externes.
  BC-2860.60.40:
    name: Règles de tests réflexes
    description: |
      Rédaction et application des règles de tests réflexes et de la logique d'ajout.

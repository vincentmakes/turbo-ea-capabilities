locale: fr
source: L1-developer-platform-api-ecosystem-management.yaml
entries:
  BC-4270:
    name: Gestion de la plateforme développeur et de l'écosystème API
    description: |
      API publiques, SDK, portail développeur, identité développeur, gouvernance
      de la consommation des API, applications partenaires, référencements sur les
      marketplaces logicielles et abonnements webhooks sortants pour l'écosystème SaaS.
  BC-4270.10:
    name: Gestion du cycle de vie des API publiques
    description: |
      Spécification, versionnement et dépréciation des API publiques exposées
      aux développeurs externes.
  BC-4270.10.10:
    name: Rédaction des spécifications API
    description: |
      Rédaction et révision des spécifications d'API publiques sous forme
      lisible par machine.
  BC-4270.10.20:
    name: Versionnement des API
    description: |
      Versionnement des API publiques avec des garanties de compatibilité
      documentées.
  BC-4270.10.30:
    name: Gestion de la dépréciation des API
    description: |
      Communication et exécution des dépréciations d'API avec un préavis
      suffisant.
  BC-4270.20:
    name: Gestion des SDK et des bibliothèques clientes
    description: |
      Génération, couverture linguistique et maintenance des exemples des SDK
      et bibliothèques clientes encapsulant les API publiques.
  BC-4270.20.10:
    name: Génération et publication des SDK
    description: |
      Génération et publication des SDK alignés sur les versions des API.
  BC-4270.20.20:
    name: Gestion de la couverture linguistique des SDK
    description: |
      Sélection et gestion des langages et environnements d'exécution
      pris en charge par les SDK.
  BC-4270.20.30:
    name: Maintenance des exemples SDK
    description: |
      Maintenance des exemples de code et des projets de démarrage pour
      les SDK.
  BC-4270.30:
    name: Gestion du portail développeur
    description: |
      Documentation, références interactives et parcours d'intégration aidant
      les développeurs à s'intégrer à la plateforme.
  BC-4270.30.10:
    name: Rédaction de la documentation développeur
    description: |
      Rédaction de la documentation conceptuelle, procédurale et de référence
      destinée aux développeurs.
  BC-4270.30.20:
    name: Référence API interactive
    description: |
      Exploitation de la référence API interactive et des expériences
      d'essai en ligne.
  BC-4270.30.30:
    name: Intégration des développeurs
    description: |
      Parcours d'intégration guidant les développeurs depuis l'inscription
      jusqu'au premier appel API réussi.
  BC-4270.40:
    name: Gestion de l'identité et des accréditations développeur
    description: |
      Émission et gestion des accréditations développeur, des clients OAuth
      et de l'identité développeur fédérée.
  BC-4270.40.10:
    name: Émission des clés API
    description: |
      Émission, rotation et révocation des clés API développeur.
  BC-4270.40.20:
    name: Enregistrement des clients OAuth
    description: |
      Enregistrement et gestion des applications clientes OAuth.
  BC-4270.40.30:
    name: Fédération d'identité développeur
    description: |
      Fédération de l'identité développeur depuis des fournisseurs d'identité
      externes.
  BC-4270.50:
    name: Gouvernance de la consommation des API
    description: |
      Quotas, limites de débit, analytique d'utilisation et correspondance
      de la consommation des API avec les niveaux d'offre commerciaux.
  BC-4270.50.10:
    name: Gestion des quotas et limites de débit des API
    description: |
      Définition et application des quotas et limites de débit des API
      par consommateur.
  BC-4270.50.20:
    name: Analytique de consommation des API
    description: |
      Analyse des modes de consommation des API par endpoint, consommateur
      et offre.
  BC-4270.50.30:
    name: Correspondance des niveaux d'accès API aux offres
    description: |
      Correspondance des niveaux d'accès aux API avec les offres d'abonnement
      et les droits associés.
  BC-4270.60:
    name: Gestion du programme d'applications partenaires
    description: |
      Gestion des applications partenaires tierces, incluant le référencement,
      la certification et le partage des revenus.
  BC-4270.60.10:
    name: Gestion du référencement des applications partenaires
    description: |
      Référencement des applications partenaires dans le répertoire d'applications
      de la plateforme.
  BC-4270.60.20:
    name: Certification des applications partenaires
    description: |
      Certification des applications partenaires selon les critères de sécurité
      et de qualité.
  BC-4270.60.30:
    name: Partage des revenus des applications partenaires
    description: |
      Arrangements de partage des revenus avec les développeurs d'applications
      partenaires.
  BC-4270.70:
    name: Gestion du référencement sur les marketplaces logicielles
    description: |
      Référencement et gestion de l'offre SaaS sur les marketplaces logicielles
      et cloud tierces.
  BC-4270.70.10:
    name: Rédaction des fiches marketplace
    description: |
      Rédaction des fiches marketplace incluant les métadonnées, la tarification
      et les éléments visuels.
  BC-4270.70.20:
    name: Maintenance des fiches marketplace
    description: |
      Maintenance continue des fiches marketplace à mesure que l'offre évolue.
  BC-4270.70.30:
    name: Coordination de la co-vente marketplace
    description: |
      Coordination des actions de co-vente avec les opérateurs de marketplace.
  BC-4270.80:
    name: Gestion des webhooks et des abonnements aux événements
    description: |
      Cycle de vie des abonnements webhooks sortants, des schémas d'événements
      et de la fiabilité de livraison.
  BC-4270.80.10:
    name: Cycle de vie des abonnements webhook
    description: |
      Cycle de vie des abonnements webhooks sortants, de l'enregistrement
      à la clôture.
  BC-4270.80.20:
    name: Catalogue des schémas d'événements
    description: |
      Catalogue des schémas d'événements sortants et de leurs garanties
      de compatibilité.
  BC-4270.80.30:
    name: Gestion de la fiabilité de livraison des webhooks
    description: |
      Gestion des nouvelles tentatives, du backoff et des files de lettres
      mortes pour la livraison des webhooks sortants.

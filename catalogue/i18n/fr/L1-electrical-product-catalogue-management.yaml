locale: fr
source: L1-electrical-product-catalogue-management.yaml
entries:
  BC-1940:
    name: Gestion du catalogue de produits électriques
    description: |
      Structure des produits commercialisables pour les produits électriques — variantes,
      règles du configurateur, références juridictionnelles, introduction et retrait des produits,
      fiches techniques et supports marketing.
  BC-1940.10:
    name: Gestion des données maîtresses des produits commercialisables
    description: |
      Maintenance des données maîtresses des produits commercialisables et des hiérarchies de familles.
  BC-1940.10.10:
    name: Gestion des données maîtresses des produits commercialisables
    description: |
      Création et maintenance des données maîtresses des produits commercialisables.
  BC-1940.10.20:
    name: Gestion de la hiérarchie et des familles de produits
    description: |
      Définition des structures de famille et de hiérarchie des produits.
  BC-1940.10.30:
    name: Standardisation des attributs produit
    description: |
      Standardisation des attributs entre les familles de produits.
  BC-1940.20:
    name: Gestion des variantes et options de produit
    description: |
      Gestion des variantes de tension, fréquence, protection, protocole et accessoires.
  BC-1940.20.10:
    name: Gestion des variantes de tension et de fréquence
    description: |
      Gestion des variantes de calibre de tension et de fréquence.
  BC-1940.20.20:
    name: Gestion des variantes de protection et d'enveloppe
    description: |
      Gestion des variantes d'indice de protection et d'enveloppe.
  BC-1940.20.30:
    name: Gestion des variantes de protocole de communication
    description: |
      Gestion des options de protocole de communication sur les produits connectés.
  BC-1940.20.40:
    name: Gestion des accessoires et options
    description: |
      Gestion des définitions d'accessoires et de fonctionnalités optionnelles.
  BC-1940.30:
    name: Gestion des règles du configurateur de produit
    description: |
      Rédaction et validation des règles de configuration à la commande.
  BC-1940.30.10:
    name: Rédaction des règles de configuration
    description: |
      Rédaction des règles de combinaisons valides pour les produits configurables.
  BC-1940.30.20:
    name: Gestion des contraintes de compatibilité
    description: |
      Gestion des contraintes de compatibilité entre les options.
  BC-1940.30.30:
    name: Tests de validation du configurateur
    description: |
      Tests de validation des jeux de règles du configurateur.
  BC-1940.40:
    name: Gestion des références juridictionnelles
    description: |
      Gestion des références spécifiques aux juridictions, des standards de prises et des variantes linguistiques.
  BC-1940.40.10:
    name: Définition des variantes juridictionnelles
    description: |
      Définition des variantes commercialisables requises par la juridiction cible.
  BC-1940.40.20:
    name: Gestion des standards de prises et connecteurs
    description: |
      Gestion des variantes de standards de prises et connecteurs par région.
  BC-1940.40.30:
    name: Variante de documentation en langue locale
    description: |
      Manuels et variantes d'étiquetage en langue locale par juridiction.
  BC-1940.50:
    name: Gestion de l'introduction et du retrait des produits
    description: |
      Activation du catalogue, correspondance de remplacement, fin de vente et fenêtres de dernier achat.
  BC-1940.50.10:
    name: Activation du catalogue au lancement produit
    description: |
      Activation des nouveaux produits dans le catalogue commercialisable au lancement.
  BC-1940.50.20:
    name: Cartographie des produits de remplacement
    description: |
      Cartographie des produits remplacés vers les références de substitution.
  BC-1940.50.30:
    name: Notification de fin de vente
    description: |
      Notification des dates de fin de vente aux canaux et aux clients.
  BC-1940.50.40:
    name: Gestion du dernier achat et de la fenêtre de service
    description: |
      Gestion des fenêtres de dernier achat et de la disponibilité en mode service uniquement.
  BC-1940.60:
    name: Gestion de la documentation produit et des fiches techniques
    description: |
      Rédaction et maintenance des fiches techniques, manuels et supports marketing liés aux références.
  BC-1940.60.10:
    name: Rédaction des fiches techniques
    description: |
      Rédaction des fiches techniques produit et des spécifications techniques.
  BC-1940.60.20:
    name: Rédaction des manuels techniques
    description: |
      Rédaction des manuels d'installation et d'utilisation.
  BC-1940.60.30:
    name: Supports marketing du catalogue
    description: |
      Supports marketing liés aux références du catalogue.

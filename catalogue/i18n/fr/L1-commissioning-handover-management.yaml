locale: fr
source: L1-commissioning-handover-management.yaml
entries:
  BC-1160:
    name: Gestion de la mise en service et de la remise en exploitation
    description: |
      Pré-mise en service, mise en service, essais de performance et remise en exploitation.
  BC-1160.10:
    name: Gestion de la pré-mise en service
    description: |
      Achèvement mécanique, rinçage, essais d'étanchéité et mise sous tension.
  BC-1160.10.10:
    name: Vérification de l'achèvement mécanique
    description: |
      Vérification de l'achèvement mécanique par rapport aux listes de réserves.
  BC-1160.10.20:
    name: Opérations de rinçage et de nettoyage
    description: |
      Rinçage des tuyauteries, nettoyage et conditionnement chimique.
  BC-1160.10.30:
    name: Essais de pression et d'étanchéité
    description: |
      Essais hydrostatiques, essais pneumatiques et vérification de l'étanchéité.
  BC-1160.10.40:
    name: Mise sous tension des équipements
    description: |
      Première mise sous tension et vérifications fonctionnelles des équipements.
  BC-1160.20:
    name: Gestion de l'exécution de la mise en service
    description: |
      Mise en service des systèmes, essais fonctionnels et essais intégrés.
  BC-1160.20.10:
    name: Planification de la mise en service des systèmes
    description: |
      Plans de mise en service par système et sous-système.
  BC-1160.20.20:
    name: Essais fonctionnels des systèmes
    description: |
      Essais fonctionnels des systèmes individuels.
  BC-1160.20.30:
    name: Essais d'intégration des systèmes
    description: |
      Essais intégrés entre plusieurs systèmes.
  BC-1160.20.40:
    name: Documentation de la mise en service
    description: |
      Dossiers de mise en service, procès-verbaux et certificats.
  BC-1160.30:
    name: Gestion des essais de performance
    description: |
      Campagnes d'essais de performance et validation des critères d'acceptation.
  BC-1160.30.10:
    name: Planification des essais de performance
    description: |
      Protocoles d'essais de performance et critères d'acceptation.
  BC-1160.30.20:
    name: Exécution des essais de performance
    description: |
      Réalisation des campagnes d'essais de performance et collecte des données.
  BC-1160.30.30:
    name: Évaluation des essais de performance
    description: |
      Évaluation des résultats des essais et validation par rapport aux garanties.
  BC-1160.40:
    name: Gestion de la remise en exploitation et de l'acceptation
    description: |
      Acceptation finale, certificats, clôture des réserves et transfert à l'exploitant.
  BC-1160.40.10:
    name: Clôture des listes de réserves
    description: |
      Suivi et clôture des réserves avant l'acceptation.
  BC-1160.40.20:
    name: Certification d'acceptation
    description: |
      Émission des certificats d'acceptation provisoire et définitive.
  BC-1160.40.30:
    name: Formation des opérateurs et remise en exploitation
    description: |
      Formation de l'équipe d'exploitation et remise en exploitation de l'installation.
  BC-1160.40.40:
    name: Transfert de garde
    description: |
      Transfert formel de la garde de l'installation et des actifs au client.
  BC-1160.50:
    name: Gestion du support post-remise en exploitation
    description: |
      Période de responsabilité des défauts, période de garantie et support technique résiduel.
  BC-1160.50.10:
    name: Gestion de la responsabilité des défauts
    description: |
      Gestion de la période de responsabilité des défauts et rectification des malfaçons.
  BC-1160.50.20:
    name: Support sous garantie
    description: |
      Coordination du support sous garantie et des réclamations de garantie fournisseurs.
  BC-1160.50.30:
    name: Support technique résiduel
    description: |
      Support technique aux opérations pendant la période de démarrage.

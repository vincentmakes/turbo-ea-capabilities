locale: fr
source: L1-legislative-regulatory-drafting-management.yaml
entries:
  BC-3210:
    name: Gestion de la rédaction législative et réglementaire
    description: |
      Rédaction, révision juridique, évaluation d'impact, coordination du processus parlementaire
      ou législatif, et codification de la législation primaire, des réglementations secondaires,
      des instruments statutaires et des ordonnances exécutives.
  BC-3210.10:
    name: Rédaction législative
    description: |
      Rédaction de la législation primaire, des projets de loi et des amendements par les
      juristes parlementaires ou les rédacteurs législatifs.
    in_scope:
      - Rédaction des projets de loi et des amendements
      - Traitement des instructions de rédaction
      - Rédaction en langage clair et bilingue
    out_of_scope:
      - Règlements et instruments statutaires (couverts par la rédaction réglementaire)
  BC-3210.10.10:
    name: Réception des instructions de rédaction
    description: |
      Réception et clarification des instructions de rédaction émanant des responsables
      de politique publique et des commanditaires ministériels.
  BC-3210.10.20:
    name: Rédaction des projets de loi et des amendements
    description: |
      Rédaction des projets de loi, des amendements et des dispositions corrélatives.
  BC-3210.10.30:
    name: Révision de la qualité de rédaction
    description: |
      Révision par un juriste senior du projet de législation pour la clarté, la cohérence et l'effet.
  BC-3210.20:
    name: Rédaction réglementaire
    description: |
      Rédaction des réglementations secondaires, des instruments statutaires, des ordonnances
      exécutives et des règles administratives.
  BC-3210.20.10:
    name: Rédaction des règlements et instruments statutaires
    description: |
      Rédaction des règlements et instruments statutaires en vertu de la législation habilitante.
  BC-3210.20.20:
    name: Rédaction des ordonnances exécutives
    description: |
      Rédaction des ordonnances exécutives, des décrets et des proclamations.
  BC-3210.20.30:
    name: Rédaction des règles administratives
    description: |
      Rédaction des règles administratives et des avis des agences.
  BC-3210.30:
    name: Révision juridique et conformité constitutionnelle
    description: |
      Contrôle juridique des projets d'instruments quant à leur conformité constitutionnelle,
      aux droits de l'homme et au droit international.
  BC-3210.30.10:
    name: Révision de la conformité constitutionnelle
    description: |
      Révision des projets au regard des compétences constitutionnelles, des droits et des limites.
  BC-3210.30.20:
    name: Évaluation de la compatibilité avec les droits de l'homme
    description: |
      Évaluation de la compatibilité avec les traités et chartes relatifs aux droits de l'homme.
  BC-3210.30.30:
    name: Révision de la conformité au droit international
    description: |
      Révision des projets quant à leur conformité aux obligations conventionnelles et supranationales.
  BC-3210.40:
    name: Évaluation d'impact réglementaire
    description: |
      Évaluation des coûts, avantages et effets distributifs attendus des instruments proposés
      selon les principes de meilleure réglementation de l'OCDE.
  BC-3210.40.10:
    name: Cadrage de l'impact
    description: |
      Cadrage des évaluations d'impact réglementaire et détermination de la proportionnalité.
  BC-3210.40.20:
    name: Analyse coûts-avantages
    description: |
      Quantification des coûts et avantages réglementaires incluant la charge de conformité.
  BC-3210.40.30:
    name: Test pour les petites entreprises et les PME
    description: |
      Évaluation des impacts disproportionnés sur les petites entreprises et les PME.
  BC-3210.40.40:
    name: Publication de l'évaluation d'impact
    description: |
      Publication des évaluations d'impact en accompagnement de l'instrument et des données probantes.
  BC-3210.50:
    name: Coordination du processus législatif
    description: |
      Coordination du passage parlementaire ou législatif des projets de loi, incluant
      les témoignages en commission, les amendements et la sanction royale ou la promulgation.
  BC-3210.50.10:
    name: Liaison parlementaire
    description: |
      Liaison avec les organes parlementaires ou législatifs sur les projets de loi gouvernementaux.
  BC-3210.50.20:
    name: Préparation des témoignages en commission
    description: |
      Préparation des témoignages, des notes de synthèse et des témoins pour les commissions législatives.
  BC-3210.50.30:
    name: Suivi des amendements
    description: |
      Suivi et évaluation des amendements législatifs tout au long des étapes d'examen.
  BC-3210.50.40:
    name: Coordination de la promulgation et de la sanction royale
    description: |
      Coordination de la promulgation définitive, de la sanction royale ou de la signature exécutive.
  BC-3210.60:
    name: Codification juridique et publication
    description: |
      Compilation, consolidation, publication au Journal officiel et maintenance
      des textes législatifs et réglementaires.
  BC-3210.60.10:
    name: Publication au Journal officiel
    description: |
      Publication des instruments promulgués au Journal officiel ou au journal d'annonces légales.
  BC-3210.60.20:
    name: Consolidation et codification
    description: |
      Consolidation des amendements et codification dans les codes législatifs.
  BC-3210.60.30:
    name: Maintenance des textes juridiques
    description: |
      Maintenance continue et publication lisible par machine des textes législatifs et réglementaires.

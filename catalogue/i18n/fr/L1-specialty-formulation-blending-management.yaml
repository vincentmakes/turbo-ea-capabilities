locale: fr
source: L1-specialty-formulation-blending-management.yaml
entries:
  BC-4630:
    name: Gestion de la formulation spécialisée et du mélange
    description: |
      Formulation, mélange, compoundage, remplissage et finition des produits
      chimiques spécialisés incluant les peintures, adhésifs, formulations
      agrochimiques, lubrifiants, tensioactifs et produits de chimie fine.
  BC-4630.10:
    name: Conception et développement de formulations
    description: |
      Spécification, sélection des matières premières, essais à l'échelle
      laboratoire et optimisation des coûts des formulations spécialisées.
  BC-4630.10.10:
    name: Développement des spécifications de formulation
    description: |
      Développement des spécifications de formulation en regard des objectifs
      d'application.
  BC-4630.10.20:
    name: Sélection des matières premières
    description: |
      Sélection des matières premières en fonction des performances, du coût
      et des exigences HSE.
  BC-4630.10.30:
    name: Essais de formulation à l'échelle laboratoire
    description: |
      Préparation et caractérisation d'essais à l'échelle laboratoire de
      formulations candidates.
  BC-4630.10.40:
    name: Optimisation du coût des formulations
    description: |
      Optimisation du coût des formulations sous les contraintes de
      spécification.
  BC-4630.20:
    name: Opérations de mélange
    description: |
      Exploitation des équipements de mélange de liquides, solides, émulsions
      et dispersions.
  BC-4630.20.10:
    name: Opérations de mélange de liquides
    description: |
      Mélange en cuve et en ligne de produits chimiques liquides.
  BC-4630.20.20:
    name: Opérations de mélange de solides
    description: |
      Mélange de formulations solides par mélangeurs à ruban, coniques et
      rotatifs.
  BC-4630.20.30:
    name: Opérations d'émulsification
    description: |
      Production d'émulsions par homogénéisateurs rotor-stator et à haute
      pression.
  BC-4630.20.40:
    name: Opérations de dispersion et de broyage
    description: |
      Exploitation des broyeurs à billes, laminoirs à trois cylindres et
      disperseurs.
  BC-4630.30:
    name: Opérations de compoundage et d'extrusion
    description: |
      Compoundage de polymères, production de mélanges-maîtres et extrusion
      d'intermédiaires spécialisés.
  BC-4630.30.10:
    name: Compoundage de polymères
    description: |
      Compoundage de polymères avec des charges, stabilisants et additifs.
  BC-4630.30.20:
    name: Production de mélanges-maîtres
    description: |
      Production de mélanges-maîtres colorants, additifs et fonctionnels.
  BC-4630.30.30:
    name: Opérations d'extrusion
    description: |
      Exploitation des lignes d'extrusion monovis et bivis.
  BC-4630.40:
    name: Opérations de remplissage et de conditionnement
    description: |
      Remplissage des produits spécialisés dans des conteneurs en vrac, fûts,
      conteneurs intermédiaires pour vrac (GRV), petits emballages et récipients
      sous pression.
  BC-4630.40.10:
    name: Remplissage des conteneurs en vrac
    description: |
      Remplissage des conteneurs routiers, ferroviaires et ISO en vrac.
  BC-4630.40.20:
    name: Remplissage de fûts et de GRV
    description: |
      Remplissage de fûts en acier et en plastique et de grands récipients pour
      vrac (GRV).
  BC-4630.40.30:
    name: Remplissage en petits conditionnements
    description: |
      Remplissage à grande cadence de bouteilles, bidons et emballages grand
      public.
  BC-4630.40.40:
    name: Remplissage d'aérosols et de récipients sous pression
    description: |
      Remplissage et sertissage des aérosols et récipients sous pression.
  BC-4630.50:
    name: Tests de performance des formulations
    description: |
      Tests de performance applicative, de stabilité et de comparaison des
      formulations spécialisées.
  BC-4630.50.10:
    name: Tests de performance applicative
    description: |
      Tests des formulations dans des conditions d'utilisation finale simulées.
  BC-4630.50.20:
    name: Tests de stabilité et de durée de conservation
    description: |
      Tests de stabilité et de durée de conservation en temps réel et accélérés.
  BC-4630.50.30:
    name: Comparaison concurrentielle
    description: |
      Comparaison côte à côte des formulations par rapport aux produits
      concurrents.
  BC-4630.60:
    name: Gestion des recettes spécialisées
    description: |
      Rédaction des recettes maîtresses, contrôle de version et localisation
      pour la production de formulations sur plusieurs sites.
  BC-4630.60.10:
    name: Maintenance des recettes maîtresses
    description: |
      Rédaction et maintenance des recettes maîtresses selon les conventions
      ISA-88.
  BC-4630.60.20:
    name: Contrôle de version des recettes
    description: |
      Contrôle de version des recettes sur les cycles d'approbation et de
      révision.
  BC-4630.60.30:
    name: Localisation des recettes
    description: |
      Localisation des recettes maîtresses pour les équipements spécifiques
      au site.

locale: fr
source: L1-public-finance-budget-management.yaml
entries:
  BC-3280:
    name: Gestion des finances publiques et du budget
    description: |
      Formulation du budget public, exécution des crédits, comptabilité publique des fonds,
      gestion de la dette publique, opérations de trésorerie et reporting fiscal ainsi que
      divulgation conformes aux normes IPSAS.
  BC-3280.10:
    name: Formulation du budget
    description: |
      Préparation des budgets annuels et pluriannuels incluant les plafonds,
      le budget par programme et la soumission à l'autorité législative.
    in_scope:
      - Prévisions macroéconomiques et budgétaires
      - Budgétisation par programme et à base zéro
      - Soumission du budget au législateur
    out_of_scope:
      - Planification financière d'entreprise et comptabilité de gestion (couverte par la planification et l'analyse financières)
  BC-3280.10.10:
    name: Prévisions macroéconomiques et budgétaires
    description: |
      Prévision des agrégats de recettes et de dépenses et des scénarios macroéconomiques.
  BC-3280.10.20:
    name: Fixation des plafonds budgétaires
    description: |
      Fixation des plafonds budgétaires des agences et programmes dans l'enveloppe fiscale.
  BC-3280.10.30:
    name: Préparation du budget par programme
    description: |
      Préparation des budgets par programme et de performance par les agences dépensières.
  BC-3280.10.40:
    name: Soumission du budget au législateur
    description: |
      Compilation et soumission du budget exécutif au législateur.
  BC-3280.20:
    name: Exécution des crédits
    description: |
      Répartition, notification, engagement, obligation et décaissement des crédits alloués
      conformément à la loi budgétaire.
  BC-3280.20.10:
    name: Répartition et notification des crédits
    description: |
      Notification et répartition des crédits aux agences dépensières.
  BC-3280.20.20:
    name: Enregistrement des engagements et des obligations
    description: |
      Enregistrement des engagements et des obligations sur les crédits.
  BC-3280.20.30:
    name: Traitement des dépenses et des décaissements
    description: |
      Traitement des dépenses et des décaissements sur les fonds engagés.
  BC-3280.20.40:
    name: Autorité de reprogrammation et de transfert
    description: |
      Administration des reprogrammations, des transferts et des ajustements d'autorité statutaire.
  BC-3280.30:
    name: Comptabilité des fonds publics
    description: |
      Comptabilité des fonds publics incluant le fonds général, les fonds spéciaux,
      les fonds fiduciaires et les fonds renouvelables selon les normes IPSAS ou équivalents nationaux.
  BC-3280.30.10:
    name: Maintenance de la structure des fonds
    description: |
      Maintenance des structures des fonds publics et du plan de comptes.
  BC-3280.30.20:
    name: Comptabilité au niveau des fonds
    description: |
      Enregistrement et réconciliation des transactions entre les fonds général, spéciaux, fiduciaires et renouvelables.
  BC-3280.30.30:
    name: Règlement interagences
    description: |
      Règlement et réconciliation des transferts interagences et des accords de remboursement.
  BC-3280.40:
    name: Gestion de la dette publique
    description: |
      Émission, service et gestion du risque des instruments de dette souveraine et infra-souveraine.
  BC-3280.40.10:
    name: Stratégie d'endettement et planification des émissions
    description: |
      Définition de la stratégie d'endettement et des calendriers d'émission pour tous les instruments et maturités.
  BC-3280.40.20:
    name: Opérations d'émission de dette
    description: |
      Adjudication, syndication et émission directe des instruments de dette publique.
  BC-3280.40.30:
    name: Service de la dette
    description: |
      Paiement des coupons, intérêts et remboursements du principal aux détenteurs de dette.
  BC-3280.40.40:
    name: Gestion du risque du portefeuille de dette
    description: |
      Gestion du risque de change, de taux d'intérêt et de refinancement dans le portefeuille de dette.
  BC-3280.50:
    name: Gestion de la trésorerie et opérations de caisse
    description: |
      Gestion de la trésorerie publique, opérations du compte unique du Trésor et traitement
      des paiements et recettes pour le compte des agences.
  BC-3280.50.10:
    name: Prévision de trésorerie
    description: |
      Prévision quotidienne et glissante des flux de trésorerie de l'État.
  BC-3280.50.20:
    name: Opérations du compte unique du Trésor
    description: |
      Exploitation du compte unique du Trésor et des dispositifs bancaires consolidés.
  BC-3280.50.30:
    name: Opérations de paiements de l'État
    description: |
      Décaissement des paiements de l'État pour le compte des agences dépensières.
  BC-3280.50.40:
    name: Traitement des recettes de l'État
    description: |
      Traitement des recettes entrantes de l'État et créditation aux agences.
  BC-3280.60:
    name: Reporting fiscal et divulgation
    description: |
      Rapports fiscaux infra-annuels et de fin d'année, états financiers IPSAS et
      reporting statistique COFOG/GFSM.
  BC-3280.60.10:
    name: Reporting fiscal infra-annuel
    description: |
      Production de rapports fiscaux mensuels et trimestriels par rapport au budget.
  BC-3280.60.20:
    name: Production des états financiers IPSAS
    description: |
      Préparation des états financiers IPSAS pour l'ensemble du gouvernement et pour les entités.
  BC-3280.60.30:
    name: Reporting statistique GFSM et COFOG
    description: |
      Compilation des statistiques budgétaires selon les classifications IMF GFSM et COFOG.
  BC-3280.60.40:
    name: Divulgation des dépenses publiques ouvertes
    description: |
      Publication en données ouvertes des dépenses, transactions et exécution budgétaire.

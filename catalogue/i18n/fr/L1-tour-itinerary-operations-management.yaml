locale: fr
source: L1-tour-itinerary-operations-management.yaml
entries:
  BC-4100:
    name: Gestion des opérations de circuits et d'itinéraires
    description: |
      Exploitation des activités des voyagistes et des gestionnaires de destination — assemblage de produits et contractualisation des fournisseurs, décisions de départ, animation et accompagnement, logistique sur destination, coordination des fournisseurs, récupération d'itinéraire et documentation des voyageurs.
    in_scope:
      - Assemblage des produits circuit et contractualisation des fournisseurs
      - Seuils de départ et décisions de maintien ou d'annulation
      - Affectation, briefing et suivi des performances des guides
      - Transferts et circuits journée sur destination
      - Modification en direct des itinéraires et récupération en cas de force majeure
      - Documentation des voyageurs et émission des bons
    out_of_scope:
      - Définition du référentiel produits circuit et des pools d'inventaire (BC-4000.30)
      - Cycle de vie des réservations (BC-4020)
      - Opérations de croisière (BC-4090)
  BC-4100.10:
    name: Assemblage et contractualisation des produits circuit
    description: |
      Assemblage des produits circuit, contractualisation des fournisseurs, tarification, routage et statut du cycle de vie des produits sur l'ensemble des marques circuit.
  BC-4100.10.10:
    name: Contractualisation des fournisseurs et négociation des contingents
    description: |
      Contractualisation des fournisseurs d'hébergement, de transport et d'activités incluant la négociation des contingents.
  BC-4100.10.20:
    name: Tarification et construction des marges circuit
    description: |
      Tarification des produits circuit et construction de la marge par rapport aux prix de vente cibles.
  BC-4100.10.30:
    name: Composition des itinéraires et routage
    description: |
      Composition des itinéraires et routage sur les destinations et composants fournisseurs.
  BC-4100.10.40:
    name: Statut du cycle de vie des produits circuit
    description: |
      Statut du cycle de vie des produits circuit du concept et du pilote au retrait.
  BC-4100.20:
    name: Gestion des départs
    description: |
      Prise de décision sur les départs couvrant les seuils de nombre minimum de participants, les allocations, les regroupements de marques et les annulations ou substitutions.
  BC-4100.20.10:
    name: Décision de seuil de départ et de maintien ou d'annulation
    description: |
      Décision sur le maintien ou l'annulation des départs programmés par rapport aux seuils minimum de participants.
  BC-4100.20.20:
    name: Allocation des départs et libération des stocks
    description: |
      Décisions d'allocation des places et de libération des stocks sur l'ensemble des départs.
  BC-4100.20.30:
    name: Regroupement des départs entre marques
    description: |
      Regroupement des départs marginaux entre marques sœurs ou opérateurs partenaires.
  BC-4100.20.40:
    name: Annulation et substitution des départs
    description: |
      Annulation des départs non viables et substitution sur d'autres dates de départ.
  BC-4100.30:
    name: Opérations des guides et accompagnateurs
    description: |
      Affectation, briefing, gestion des performances et coordination des guides locaux pour la délivrance des circuits.
  BC-4100.30.10:
    name: Affectation des guides et directeurs de circuit
    description: |
      Affectation des guides et directeurs de circuit aux départs selon les exigences linguistiques et d'itinéraire.
  BC-4100.30.20:
    name: Briefing pré-circuit et gestion des scripts
    description: |
      Briefing pré-circuit des équipes d'accompagnement et gestion des scripts et contenus d'itinéraire.
  BC-4100.30.30:
    name: Suivi des performances des guides pendant le circuit
    description: |
      Suivi des performances des guides pendant la délivrance du circuit à l'aide des retours clients et des rapports d'accompagnement.
  BC-4100.30.40:
    name: Coordination des guides locaux
    description: |
      Coordination des guides locaux sur les destinations selon les exigences propres aux villes et aux sites.
  BC-4100.40:
    name: Logistique sur destination et transferts
    description: |
      Logistique sur destination couvrant les services de cars et véhicules, les transferts aéroport et hôtel, l'exécution des circuits journée et la billetterie des activités.
  BC-4100.40.10:
    name: Logistique cars et véhicules
    description: |
      Logistique des services de cars et véhicules sur l'ensemble de l'itinéraire.
  BC-4100.40.20:
    name: Transferts aéroport et hôtel
    description: |
      Exploitation des transferts aéroport et hôtel pour les voyageurs en circuit.
  BC-4100.40.30:
    name: Opérations d'exécution des circuits journée
    description: |
      Exécution des circuits journée et excursions dans le cadre des itinéraires multi-jours.
  BC-4100.40.40:
    name: Opérations de billetterie des activités et attractions
    description: |
      Opérations de billetterie des activités et attractions incluant l'allocation des créneaux horaires.
  BC-4100.50:
    name: Coordination des fournisseurs circuit
    description: |
      Coordination avec les gestionnaires de destination, les hébergeurs et les fournisseurs d'activités pour la délivrance opérationnelle.
  BC-4100.50.10:
    name: Coordination avec les DMC et les opérateurs locaux
    description: |
      Coordination avec les gestionnaires de destination et les opérateurs locaux délivrant les services circuit.
  BC-4100.50.20:
    name: Coordination avec les fournisseurs d'hébergement
    description: |
      Coordination avec les fournisseurs d'hébergement sur les listes de chambres, les heures d'arrivée et les demandes spéciales.
  BC-4100.50.30:
    name: Coordination avec les fournisseurs d'activités et d'attractions
    description: |
      Coordination avec les fournisseurs d'activités et d'attractions couvrant l'accès, la capacité et les arrangements spéciaux.
  BC-4100.50.40:
    name: Opérations de gestion des performances des fournisseurs
    description: |
      Gestion opérationnelle des performances des fournisseurs circuit à partir des retours des accompagnateurs et de l'expérience des voyageurs.
  BC-4100.60:
    name: Modification et récupération des itinéraires
    description: |
      Modification en direct des itinéraires et récupération après des événements perturbateurs incluant la force majeure et les modifications à l'initiative des voyageurs.
  BC-4100.60.10:
    name: Opérations de modification en direct des itinéraires
    description: |
      Modification en direct des itinéraires en cours de circuit en raison de déclencheurs opérationnels.
  BC-4100.60.20:
    name: Récupération des itinéraires en cas de force majeure
    description: |
      Récupération des itinéraires lors d'événements de force majeure tels que la météo, les grèves et les troubles politiques.
  BC-4100.60.30:
    name: Modification d'itinéraire à l'initiative du voyageur
    description: |
      Gestion des modifications d'itinéraire à l'initiative des voyageurs affectant les réservations des fournisseurs en aval.
  BC-4100.60.40:
    name: Détermination des compensations suite aux modifications
    description: |
      Détermination des compensations suite aux modifications d'itinéraire incluant les remboursements et les gestes commerciaux.
  BC-4100.70:
    name: Documentation des voyageurs en circuit
    description: |
      Émission et réémission des documents de voyage finaux, bons, informations de pré-départ et communications de voyage propres aux circuits.
  BC-4100.70.10:
    name: Émission des documents de voyage finaux
    description: |
      Émission des documents de voyage finaux incluant l'itinéraire définitif et les contacts d'urgence.
  BC-4100.70.20:
    name: Émission des bons et documents de service
    description: |
      Émission des bons et documents de service à présenter aux fournisseurs du circuit.
  BC-4100.70.30:
    name: Dossier d'informations pré-départ
    description: |
      Élaboration des dossiers d'informations pré-départ incluant les conseils de santé, visa et bagages.
  BC-4100.70.40:
    name: Opérations de réémission des documents de voyage
    description: |
      Réémission des documents après modifications d'itinéraire et changements de données voyageur.

locale: fr
source: L1-practice-pursuit-and-proposal-management.yaml
entries:
  BC-4360:
    name: Gestion de la prospection et des propositions commerciales
    description: |
      Activités de prospection pour les cabinets de services professionnels —
      qualification des opportunités, stratégie de conquête, développement des
      propositions et présentations, modélisation des honoraires et analyse
      succès/échec — distinct de la gestion commerciale générique.
  BC-4360.10:
    name: Gestion de la qualification des opportunités
    description: |
      Qualification des opportunités de prospection entrantes et sortantes
      selon l'adéquation stratégique, la faisabilité et l'attractivité commerciale.
  BC-4360.10.10:
    name: Capture des opportunités
    description: |
      Collecte des opportunités de prospection issues des appels d'offres,
      des recommandations et de l'origination par les relations.
  BC-4360.10.20:
    name: Scoring de qualification des opportunités
    description: |
      Scoring des opportunités selon des critères d'adéquation stratégique,
      de compétence et commerciaux.
  BC-4360.10.30:
    name: Coordination de la pré-autorisation des prospections
    description: |
      Pré-autorisation des opportunités via des vérifications indicatives
      d'indépendance et de conflits avant tout investissement formel dans la
      prospection.
  BC-4360.20:
    name: Gestion de la stratégie de prospection
    description: |
      Définition de la stratégie de conquête, du plan de victoire, de la
      composition de l'équipe de prospection et du positionnement concurrentiel
      pour les opportunités qualifiées.
  BC-4360.20.10:
    name: Développement du plan de victoire
    description: |
      Développement du plan de conquête incluant les messages clés, les facteurs
      de différenciation et la cartographie des parties prenantes.
  BC-4360.20.20:
    name: Composition de l'équipe de prospection
    description: |
      Composition de l'équipe de prospection incluant le responsable de la
      prospection, les experts métier et le support à la tarification.
  BC-4360.20.30:
    name: Synthèse de l'intelligence concurrentielle
    description: |
      Synthèse de l'intelligence concurrentielle sur les cabinets rivaux
      attendus sur la même opportunité.
  BC-4360.30:
    name: Gestion du développement des propositions
    description: |
      Rédaction, révision et soumission des propositions écrites et des réponses
      aux appels d'offres selon les spécifications du client.
  BC-4360.30.10:
    name: Rédaction des propositions
    description: |
      Rédaction des sections de la proposition incluant l'approche, l'équipe
      et les références pertinentes.
  BC-4360.30.20:
    name: Revue et approbation des propositions
    description: |
      Revue interne et approbation du contenu de la proposition, des affirmations
      et des engagements commerciaux.
  BC-4360.30.30:
    name: Gestion de la soumission des propositions
    description: |
      Soumission de la proposition dans le format et le canal requis par le
      client, avec piste d'audit de la soumission.
  BC-4360.30.40:
    name: Réutilisation des actifs de proposition
    description: |
      Réutilisation et indexation du contenu des propositions, des études de
      cas et des références sur les prospections.
  BC-4360.40:
    name: Gestion des présentations et des pitches
    description: |
      Préparation et réalisation des pitches, revues comparatives et présentations
      orales dans le cadre des prospections concurrentielles.
  BC-4360.40.10:
    name: Préparation des supports de pitch
    description: |
      Préparation des supports de présentation, des démonstrations et des
      matériaux d'appui pour les présentations orales.
  BC-4360.40.20:
    name: Répétition et coaching des pitches
    description: |
      Répétition des équipes de pitch et coaching sur la messagerie, la dynamique
      et la gestion des questions-réponses.
  BC-4360.40.30:
    name: Gestion de la réalisation des pitches
    description: |
      Réalisation des pitches et revues comparatives, incluant la logistique
      et les matériaux de suivi.
  BC-4360.50:
    name: Modélisation des honoraires et tarification des prospections
    description: |
      Conception de la structure des honoraires et modélisation du prix pour
      les opportunités de prospection, incluant les arrangements alternatifs
      d'honoraires et les constructions de partage du risque.
    out_of_scope:
      - Gestion des honoraires en phase de mission (BC-4330.40)
      - Stratégie tarifaire à l'échelle du cabinet (BC-290)
  BC-4360.50.10:
    name: Conception de la structure des honoraires de prospection
    description: |
      Conception des structures d'honoraires parmi les options horaires,
      forfaitaires, plafonnées, conditionnelles et basées sur les résultats.
  BC-4360.50.20:
    name: Modélisation de la rentabilité de la prospection
    description: |
      Modélisation de la rentabilité de la prospection dans différents scénarios
      de staffing, d'honoraires et de risque.
  BC-4360.50.30:
    name: Approbation de la tarification de la prospection
    description: |
      Approbation interne de la tarification de la prospection par rapport
      aux seuils de remise, de marge et de risque.
  BC-4360.60:
    name: Analyse succès/échec des prospections
    description: |
      Bilan structuré des résultats de prospection, analytique des taux de
      succès et capitalisation des enseignements dans la pratique de prospection
      et de proposition.
  BC-4360.60.10:
    name: Bilan des résultats de prospection
    description: |
      Bilans internes et avec le client des résultats de prospection, incluant
      l'évaluation des concurrents.
  BC-4360.60.20:
    name: Analytique des taux de succès
    description: |
      Analytique des taux de succès segmentée par pratique, client, type
      d'opportunité et responsable de prospection.
  BC-4360.60.30:
    name: Capitalisation des enseignements de prospection
    description: |
      Capitalisation des enseignements et retours de prospection dans les
      playbooks et la formation.

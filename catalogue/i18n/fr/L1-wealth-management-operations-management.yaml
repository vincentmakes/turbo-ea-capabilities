locale: fr
source: L1-wealth-management-operations-management.yaml
entries:
  BC-1390:
    name: Gestion des opérations de gestion de patrimoine
    description: |
      Conseil en investissement, gestion discrétionnaire de portefeuille, reporting client et adéquation.
  BC-1390.10:
    name: Gestion du conseil en investissement
    description: |
      Mandats de conseil et génération de recommandations.
  BC-1390.10.10:
    name: Entrée en relation pour les mandats de conseil
    description: |
      Mise en place des mandats de conseil et des conventions clients.
  BC-1390.10.20:
    name: Génération de recommandations d'investissement
    description: |
      Génération de recommandations d'investissement personnalisées.
  BC-1390.10.30:
    name: Gestion des propositions d'investissement
    description: |
      Production et approbation des propositions d'investissement.
  BC-1390.20:
    name: Gestion discrétionnaire de portefeuille
    description: |
      Mandats discrétionnaires et construction de portefeuille.
  BC-1390.20.10:
    name: Mise en place des mandats discrétionnaires
    description: |
      Mise en place des mandats discrétionnaires et documentation IPS.
  BC-1390.20.20:
    name: Construction du portefeuille
    description: |
      Construction du portefeuille et allocation d'actifs.
  BC-1390.20.30:
    name: Rééquilibrage du portefeuille
    description: |
      Rééquilibrage des portefeuilles discrétionnaires par rapport au modèle.
  BC-1390.20.40:
    name: Exécution des transactions pour les mandats
    description: |
      Exécution des transactions pour le compte des mandats discrétionnaires.
  BC-1390.30:
    name: Gestion du reporting client
    description: |
      Relevés clients et rapports de performance.
  BC-1390.30.10:
    name: Relevés périodiques clients
    description: |
      Production des relevés et valorisations périodiques des clients.
  BC-1390.30.20:
    name: Rapports de performance et d'activité
    description: |
      Rapports de performance, d'activité et fiscaux pour les clients.
  BC-1390.30.30:
    name: Obligations d'information réglementaire envers les clients
    description: |
      Informations sur les coûts et charges MiFID II et autres obligations d'information réglementaire.
  BC-1390.40:
    name: Gestion de la mesure des performances
    description: |
      Attribution des performances et comparaison aux indices de référence.
  BC-1390.40.10:
    name: Calcul des performances du portefeuille
    description: |
      Calcul du TRI, de la performance pondérée par le temps et autres indicateurs de performance.
  BC-1390.40.20:
    name: Analyse d'attribution des performances
    description: |
      Analyse d'attribution selon Brinson et par facteurs.
  BC-1390.40.30:
    name: Comparaison aux indices de référence et aux pairs
    description: |
      Comparaison des performances du portefeuille aux indices de référence et aux pairs.
  BC-1390.50:
    name: Gestion de l'adéquation et du caractère approprié
    description: |
      Adéquation MiFID et équivalent, vérifications du caractère approprié.
  BC-1390.50.10:
    name: Profilage du risque client
    description: |
      Profilage de la tolérance au risque et de la capacité à supporter les pertes.
  BC-1390.50.20:
    name: Évaluation de l'adéquation
    description: |
      Évaluation de l'adéquation des conseils et des portefeuilles discrétionnaires.
  BC-1390.50.30:
    name: Évaluation du caractère approprié
    description: |
      Vérification du caractère approprié pour les transactions en exécution simple.
  BC-1390.50.40:
    name: Collecte des préférences en matière de durabilité
    description: |
      Collecte et intégration des préférences des clients en matière de durabilité.

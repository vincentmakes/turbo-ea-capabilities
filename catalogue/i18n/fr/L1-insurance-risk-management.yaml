locale: fr
source: L1-insurance-risk-management.yaml
entries:
  BC-2190:
    name: Gestion du risque d'assurance
    description: |
      Types de risques spécifiques à l'assurance — risque de souscription,
      catastrophe et accumulation, réserves, solvabilité et capital, contrepartie
      de réassurance, vie et longévité, déchéance, et risques opérationnels et de
      conduite — distincts de la gestion des risques d'entreprise générique.

  BC-2190.10:
    name: Gestion du risque de souscription
    description: |
      Appétit au risque de souscription, surveillance des limites et détection de
      l'antisélection.

  BC-2190.10.10:
    name: Appétit au risque de souscription
    description: |
      Définition et articulation de l'appétit au risque de souscription.

  BC-2190.10.20:
    name: Surveillance des limites de souscription
    description: |
      Surveillance des délégations de souscription et des limites d'agrégation.

  BC-2190.10.30:
    name: Surveillance de l'antisélection
    description: |
      Surveillance des schémas d'antisélection et de sélection adverse.

  BC-2190.20:
    name: Gestion du risque de catastrophe et d'accumulation
    description: |
      Surveillance de l'agrégation des expositions, gestion des scénarios PML et
      de sinistres réalistes, et planification des mesures d'atténuation CAT.

  BC-2190.20.10:
    name: Surveillance de l'agrégation des expositions
    description: |
      Surveillance de l'agrégation des expositions par péril, zone géographique et
      type d'occupation.

  BC-2190.20.20:
    name: Gestion des scénarios PML et de sinistres réalistes
    description: |
      Gestion des scénarios de perte maximale probable et de sinistres réalistes.

  BC-2190.20.30:
    name: Planification de l'atténuation du risque CAT
    description: |
      Planification des mesures d'atténuation incluant la réassurance et le transfert
      de risque.

  BC-2190.30:
    name: Gestion du risque de réserves
    description: |
      Surveillance de l'adéquation des réserves, analyse de la volatilité et tests
      de résistance du risque de réserve.

  BC-2190.30.10:
    name: Surveillance de l'adéquation des réserves
    description: |
      Surveillance de l'adéquation des réserves par rapport à la meilleure
      estimation et aux références externes.

  BC-2190.30.20:
    name: Analyse de la volatilité des réserves
    description: |
      Analyse de la volatilité des réserves et du risque de réserve sur un an.

  BC-2190.30.30:
    name: Tests de résistance du risque de réserve
    description: |
      Tests de résistance et de scénarios sur l'adéquation des réserves.

  BC-2190.40:
    name: Gestion du risque de solvabilité et de capital
    description: |
      Surveillance de l'adéquation du capital, opérations ORSA, tests de résistance
      de solvabilité et planification du redressement et de la résolution.

  BC-2190.40.10:
    name: Surveillance de l'adéquation du capital
    description: |
      Surveillance des ratios de capital de solvabilité et des seuils de déclenchement.

  BC-2190.40.20:
    name: Opérations ORSA
    description: |
      Conduite du cycle d'évaluation interne des risques et de la solvabilité (ORSA).

  BC-2190.40.30:
    name: Tests de résistance de solvabilité et scénarios
    description: |
      Tests de résistance et de résistance inverse des positions de solvabilité.

  BC-2190.40.40:
    name: Planification du redressement et de la résolution
    description: |
      Planification du redressement et de la résolution pour les scénarios de
      liquidation d'un assureur.

  BC-2190.50:
    name: Gestion du risque de contrepartie et de crédit de réassurance
    description: |
      Surveillance des contreparties réassureurs, adéquation des sûretés et tests
      de résistance au défaut de contrepartie.

  BC-2190.50.10:
    name: Surveillance des contreparties réassureurs
    description: |
      Surveillance de la solidité financière des réassureurs et de la concentration
      des expositions.

  BC-2190.50.20:
    name: Surveillance de l'adéquation des sûretés et lettres de crédit
    description: |
      Surveillance de l'adéquation des sûretés et des lettres de crédit remises par
      les réassureurs.

  BC-2190.50.30:
    name: Tests de résistance au défaut de contrepartie
    description: |
      Tests de résistance sur l'impact du défaut d'un réassureur sur la solvabilité.

  BC-2190.60:
    name: Gestion du risque vie et longévité
    description: |
      Surveillance du risque de mortalité, supervision de la couverture du risque de
      longévité et gestion du risque pandémique.

  BC-2190.60.10:
    name: Surveillance du risque de mortalité
    description: |
      Surveillance du risque de mortalité sur les portefeuilles vie et prévoyance.

  BC-2190.60.20:
    name: Supervision de la couverture du risque de longévité
    description: |
      Supervision des instruments de couverture du risque de longévité et de
      l'exposition aux contreparties.

  BC-2190.60.30:
    name: Gestion du risque pandémique
    description: |
      Gestion du risque de mortalité et de morbidité lié aux pandémies et épidémies.

  BC-2190.70:
    name: Gestion du risque de déchéance et de persistance
    description: |
      Surveillance du risque de déchéance et tests de résistance sur la persistance.

  BC-2190.70.10:
    name: Surveillance du risque de déchéance
    description: |
      Surveillance des taux de déchéance et des pertes liées aux déchéances sur les
      produits vie et épargne.

  BC-2190.70.20:
    name: Tests de résistance sur la persistance
    description: |
      Tests de résistance sur les hypothèses de persistance et le comportement
      dynamique de déchéance.

  BC-2190.80:
    name: Gestion du risque opérationnel et de conduite en assurance
    description: |
      Surveillance du risque de conduite, du risque lié à la gestion des sinistres
      et du risque de distribution en assurance.

  BC-2190.80.10:
    name: Surveillance du risque de conduite en assurance
    description: |
      Surveillance des indicateurs de risque de conduite sur les produits, la
      distribution et les sinistres.

  BC-2190.80.20:
    name: Supervision du risque de gestion des sinistres
    description: |
      Supervision du risque lié à la gestion des sinistres et aux résultats
      d'équité envers les assurés.

  BC-2190.80.30:
    name: Surveillance du risque de distribution
    description: |
      Surveillance du risque de distribution, notamment la vente abusive et la
      conduite des intermédiaires.

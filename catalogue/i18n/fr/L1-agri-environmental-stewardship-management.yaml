locale: fr
source: L1-agri-environmental-stewardship-management.yaml
entries:
  BC-3600:
    name: Gestion de l'intendance agri-environnementale
    description: |
      Intendance environnementale à la ferme — santé des sols, gestion de l'eau,
      biodiversité, gestion des gaz à effet de serre agricoles, programmes de
      carbone dans les sols, pratiques régénératrices et participation aux
      dispositifs agri-environnementaux complémentaires à la durabilité
      d'entreprise.
  BC-3600.10:
    name: Intendance de la santé des sols
    description: |
      Gestion de la matière organique du sol, cultures de couverture et lutte
      contre l'érosion sur les terres cultivées.
  BC-3600.10.10:
    name: Surveillance du carbone organique des sols
    description: |
      Surveillance périodique du carbone organique du sol dans les parcelles.
  BC-3600.10.20:
    name: Programmes de cultures de couverture
    description: |
      Programmes de cultures de couverture pour maintenir la couverture et la
      biologie du sol.
  BC-3600.10.30:
    name: Programmes de lutte contre l'érosion des sols
    description: |
      Programmes de lutte contre l'érosion incluant les pratiques de courbes de
      niveau, de terrasses et de zones tampons.
  BC-3600.20:
    name: Gestion de l'eau à la ferme
    description: |
      Efficience d'utilisation de l'eau, protection des zones riveraines et
      gestion de la qualité des eaux de drainage à l'échelle de l'exploitation.
    in_scope:
      - Surveillance de l'efficience d'utilisation de l'eau
      - Protection des zones riveraines et des cours d'eau
      - Gestion de la qualité des eaux de drainage
    out_of_scope:
      - Déclaration d'entreprise sur l'eau (BC-740)
      - Planification de l'irrigation (BC-3500.60.10)
  BC-3600.20.10:
    name: Surveillance de l'efficience d'utilisation de l'eau
    description: |
      Surveillance de l'efficience d'utilisation de l'eau par culture et par
      parcelle.
  BC-3600.20.20:
    name: Protection des zones riveraines et des cours d'eau
    description: |
      Protection des zones riveraines et des cours d'eau à la ferme.
  BC-3600.20.30:
    name: Gestion de la qualité des eaux de drainage
    description: |
      Gestion de la qualité des eaux de drainage et des pertes en nutriments.
  BC-3600.30:
    name: Intendance de la biodiversité et des habitats
    description: |
      Gestion de la biodiversité à la ferme, notamment l'inventaire des
      habitats, l'intendance des pollinisateurs et les zones tampons en bordure
      de parcelles.
  BC-3600.30.10:
    name: Inventaire des habitats à la ferme
    description: |
      Recensement des habitats et des éléments de biodiversité présents sur
      l'exploitation.
  BC-3600.30.20:
    name: Intendance des pollinisateurs
    description: |
      Pratiques favorables aux pollinisateurs, notamment bandes fleuries et
      seuils de lutte intégrée contre les ravageurs.
  BC-3600.30.30:
    name: Gestion des zones tampons
    description: |
      Gestion des zones tampons en bordure de parcelles et le long des
      cours d'eau.
  BC-3600.40:
    name: Gestion des gaz à effet de serre agricoles
    description: |
      Quantification et atténuation des gaz à effet de serre d'origine
      agricole, notamment le méthane entérique, le protoxyde d'azote et le CO2
      produit à la ferme.
  BC-3600.40.10:
    name: Programmes d'atténuation du méthane entérique
    description: |
      Programmes d'atténuation du méthane entérique chez les ruminants.
  BC-3600.40.20:
    name: Programmes d'atténuation du protoxyde d'azote
    description: |
      Atténuation du protoxyde d'azote par l'amélioration de l'efficience et du
      calendrier d'utilisation de l'azote.
  BC-3600.40.30:
    name: Inventaire des émissions à la ferme
    description: |
      Inventaire des émissions de gaz à effet de serre à l'échelle de
      l'exploitation, servant aux déclarations réglementaires.
  BC-3600.50:
    name: Programmes carbone des sols et de crédits carbone
    description: |
      Mesure de référence du carbone des sols, conception de projets de crédits
      carbone et enregistrements d'émission dans le cadre de méthodologies
      reconnues.
  BC-3600.50.10:
    name: Mesure de référence du carbone des sols
    description: |
      Campagnes de mesure de référence du carbone des sols lors de l'adhésion
      à un projet.
  BC-3600.50.20:
    name: Conception de projets de crédits carbone
    description: |
      Conception de projets dans le cadre des méthodologies Verra, Gold
      Standard et équivalentes.
  BC-3600.50.30:
    name: Registres d'émission de crédits carbone
    description: |
      Registres d'émission, de retrait et d'attribution des crédits aux
      bénéficiaires.
  BC-3600.60:
    name: Gestion des pratiques régénératrices
    description: |
      Adoption et enregistrement des pratiques régénératrices, notamment le
      travail réduit du sol, l'intégration et l'agroforesterie.
  BC-3600.60.10:
    name: Programmes de semis direct et de travail réduit du sol
    description: |
      Adoption et suivi des programmes de semis direct et de travail réduit du
      sol.
  BC-3600.60.20:
    name: Exploitation intégrée cultures-élevage
    description: |
      Intégration des activités de grandes cultures et d'élevage pour le
      recyclage des éléments nutritifs.
  BC-3600.60.30:
    name: Registres des pratiques agroforestières
    description: |
      Enregistrements des plantations agroforestières et des systèmes
      sylvopastoraux.
  BC-3600.70:
    name: Participation aux dispositifs agri-environnementaux
    description: |
      Participation aux éco-régimes de la PAC, aux programmes de conservation
      du NRCS et aux dispositifs de paiements agri-environnementaux équivalents.
  BC-3600.70.10:
    name: Participation aux éco-régimes de la PAC
    description: |
      Participation aux éco-régimes de la PAC de l'UE et respect des exigences
      de conditionnalité.
  BC-3600.70.20:
    name: Participation aux programmes de conservation
    description: |
      Participation aux programmes EQIP, CSP du NRCS de l'USDA et équivalents.
  BC-3600.70.30:
    name: Rapprochement des paiements agri-environnementaux
    description: |
      Rapprochement des paiements agri-environnementaux par rapport aux
      engagements pris dans le cadre des dispositifs.

locale: fr
source: L1-classified-information-security-management.yaml
entries:
  BC-1810:
    name: Gestion de la sécurité de l'information classifiée
    description: |
      Habilitations de sécurité du personnel, classification, sécurité industrielle, COMSEC et menace interne.
  BC-1810.10:
    name: Gestion des habilitations de sécurité du personnel
    description: |
      Demandes d'habilitation, réinvestigations périodiques et débriefing.
  BC-1810.10.10:
    name: Traitement des demandes d'habilitation
    description: |
      Parrainage et traitement des demandes d'habilitation de sécurité du personnel.
  BC-1810.10.20:
    name: Réinvestigation périodique
    description: |
      Réinvestigation périodique et évaluation continue du personnel habilité.
  BC-1810.10.30:
    name: Séance d'initiation et débriefing du personnel habilité
    description: |
      Séance d'initiation à la sécurité, signature des NDA et débriefing.
  BC-1810.20:
    name: Gestion de la classification de l'information
    description: |
      Classification, déclassification et marquages de manipulation.
  BC-1810.20.10:
    name: Décisions de classification originale
    description: |
      Décisions d'autorité de classification originale.
  BC-1810.20.20:
    name: Classification dérivée
    description: |
      Classification dérivée de nouveaux documents à partir de documents existants.
  BC-1810.20.30:
    name: Revue de déclassification
    description: |
      Revue de déclassification systématique et obligatoire.
  BC-1810.20.40:
    name: Marquages de manipulation et de diffusion
    description: |
      Application des marquages de manipulation, contrôle de diffusion et marquage des documents.
  BC-1810.30:
    name: Gestion de la sécurité physique de défense
    description: |
      Installations habilitées, SCIFs et zones sécurisées.
  BC-1810.30.10:
    name: Accréditation des installations habilitées
    description: |
      Accréditation et maintenance des installations habilitées.
  BC-1810.30.20:
    name: Opérations des SCIF
    description: |
      Exploitation des espaces compartimentés sensibles (SCIF).
  BC-1810.30.30:
    name: Contrôle d'accès aux zones sécurisées
    description: |
      Contrôle des accès et gestion des visiteurs pour les zones sécurisées.
  BC-1810.40:
    name: Gestion de la sécurité industrielle
    description: |
      NISPOM/équivalent, FOCI et sécurité de la chaîne d'approvisionnement.
  BC-1810.40.10:
    name: Gestion de la conformité NISPOM
    description: |
      Conformité au NISPOM/32 CFR 117 ou aux règles nationales équivalentes.
  BC-1810.40.20:
    name: Gestion du contrôle de la propriété étrangère et de l'influence
    description: |
      Évaluation et arrangements d'atténuation des FOCI.
  BC-1810.40.30:
    name: Vérification de la sécurité de la chaîne d'approvisionnement
    description: |
      Vérification des partenaires de la chaîne d'approvisionnement habilitée et alignement CMMC.
  BC-1810.40.40:
    name: Administration des contrats classifiés
    description: |
      Administration des exigences classifiées des contrats (DD Form 254).
  BC-1810.50:
    name: Gestion COMSEC
    description: |
      Sécurité des communications et gestion des clés cryptographiques.
  BC-1810.50.10:
    name: Gestion des comptes COMSEC
    description: |
      Exploitation des comptes COMSEC et responsabilités du dépositaire.
  BC-1810.50.20:
    name: Gestion des clés cryptographiques
    description: |
      Gestion des clés cryptographiques incluant EKMS/KMI.
  BC-1810.50.30:
    name: Garde des équipements COMSEC
    description: |
      Garde et traçabilité des équipements COMSEC.
  BC-1810.60:
    name: Gestion de la menace interne
    description: |
      Programmes de lutte contre la menace interne, surveillance et réponse.
  BC-1810.60.10:
    name: Opération du programme de lutte contre la menace interne
    description: |
      Exploitation du programme de lutte contre la menace interne conformément à l'E.O. 13587.
  BC-1810.60.20:
    name: Surveillance des activités utilisateurs
    description: |
      Surveillance des activités des utilisateurs sur les systèmes d'information classifiés.
  BC-1810.60.30:
    name: Investigation des menaces internes
    description: |
      Investigation des indicateurs et incidents de menace interne.

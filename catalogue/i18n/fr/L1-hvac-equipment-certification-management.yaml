locale: fr
source: L1-hvac-equipment-certification-management.yaml
entries:
  BC-2030:
    name: Gestion de la certification des équipements HVAC
    description: |
      Certification multi-juridiction des produits HVAC — certification de performance (AHRI, Eurovent),
      homologation de sécurité (UL, CSA, IEC 60335-2-40, marquage CE), homologations des fluides
      frigorigènes (F-Gas, EPA SNAP) et étiquetage d'efficacité énergétique (ENERGY STAR,
      Ecodesign UE / ErP, MEPS) — jusqu'à la licence de marque, la conformité des étiquettes
      et la surveillance des normes.
    in_scope:
      - Stratégie de certification et feuille de route sur les marchés
      - Soumissions de certification de performance et publication des notations
      - Homologation de sécurité des équipements et évaluation de conformité CE
      - Homologation réglementaire des fluides frigorigènes au niveau produit
      - Enregistrement des étiquettes énergie et efficacité et conformité
      - Licence de marque, conformité des maquettes d'étiquette et surveillance des normes
    out_of_scope:
      - Comptabilité opérationnelle des fluides frigorigènes sur les équipements installés (BC-2040)
      - Certification des produits électriques/électroniques génériques (BC-1910)
      - Enquête sur les non-conformités terrain issues du service (BC-2060)
  BC-2030.10:
    name: Stratégie et feuille de route de certification
    description: |
      Définition du périmètre de certification, des schémas et du séquençage sur les marchés cibles.
  BC-2030.10.10:
    name: Analyse des exigences d'accès au marché
    description: |
      Identification des obligations de certification et d'étiquetage par marché cible.
  BC-2030.10.20:
    name: Sélection du schéma de certification
    description: |
      Sélection des schémas de certification et des voies de reconnaissance pour les équipements HVAC.
  BC-2030.10.30:
    name: Planification de la feuille de route de certification
    description: |
      Séquençage des certifications par rapport aux jalons de lancement des équipements.
  BC-2030.20:
    name: Gestion de la certification de performance
    description: |
      Engagement auprès des programmes de certification de performance HVAC et publication des performances notées.
  BC-2030.20.10:
    name: Coordination du programme d'essais de performance
    description: |
      Coordination des essais de notation des équipements avec des laboratoires accrédités.
  BC-2030.20.20:
    name: Soumission des notations de performance
    description: |
      Soumission des notations certifiées aux programmes de certification de performance.
  BC-2030.20.30:
    name: Suivi de la délivrance des marques de performance
    description: |
      Suivi des certificats de performance délivrés et des fenêtres de validité.
  BC-2030.20.40:
    name: Engagement dans les programmes volontaires
    description: |
      Engagement dans les programmes volontaires de performance et de qualité.
  BC-2030.30:
    name: Gestion des homologations de sécurité des équipements
    description: |
      Engagement auprès des schémas d'homologation de sécurité des équipements HVAC dans toutes les juridictions.
  BC-2030.30.10:
    name: Soumission d'homologation de sécurité
    description: |
      Soumission des homologations de sécurité conformément à IEC 60335-2-40 et aux normes équivalentes.
  BC-2030.30.20:
    name: Vérification de la conformité aux normes de sécurité
    description: |
      Vérification de la conformité aux normes de sécurité par audit interne.
  BC-2030.30.30:
    name: Coordination des marques de sécurité internationales
    description: |
      Coordination entre les multiples marques de sécurité nationales et les accords de reconnaissance.
  BC-2030.30.40:
    name: Gestion des modifications de sécurité sur le terrain
    description: |
      Gestion des modifications de sécurité sur le terrain et des actions correctives affectant les homologations.
  BC-2030.40:
    name: Gestion de la conformité des fluides frigorigènes
    description: |
      Homologations des fluides frigorigènes au niveau produit, conformité à l'élimination progressive et divulgation des substances pour la certification.
  BC-2030.40.10:
    name: Suivi des homologations de fluides frigorigènes
    description: |
      Suivi des fluides frigorigènes approuvés pour chaque famille de produits par juridiction.
  BC-2030.40.20:
    name: Conformité à l'élimination progressive des fluides frigorigènes
    description: |
      Conformité aux calendriers d'élimination progressive des HFC et aux engagements de Kigali au niveau produit.
  BC-2030.40.30:
    name: Enregistrements de conformité GWP et ODP
    description: |
      Enregistrements du potentiel de réchauffement global et du potentiel d'appauvrissement de la couche d'ozone par rapport aux seuils réglementaires.
  BC-2030.40.40:
    name: Rapport sur les substances des fluides frigorigènes
    description: |
      Déclaration des substances requise dans les dossiers de certification produit.
  BC-2030.50:
    name: Gestion des étiquettes énergie et efficacité
    description: |
      Enregistrement et conformité continue aux programmes d'étiquetage d'efficacité énergétique et d'efficacité minimale.
  BC-2030.50.10:
    name: Enregistrement des étiquettes énergie
    description: |
      Enregistrement des étiquettes énergie des équipements auprès des programmes nationaux.
  BC-2030.50.20:
    name: Conformité Ecodesign
    description: |
      Conformité aux régimes Ecodesign UE et équivalents.
  BC-2030.50.30:
    name: Conformité aux normes de performance minimale d'efficacité
    description: |
      Conformité aux normes de performance minimale d'efficacité sur les marchés.
  BC-2030.50.40:
    name: Engagement dans les écolabels volontaires
    description: |
      Engagement dans les programmes d'écolabels volontaires pour les équipements durables.
  BC-2030.60:
    name: Gestion de la conformité des marques de certification et des étiquettes
    description: |
      Gestion du cycle de vie des marques de certification et des maquettes d'étiquettes sur les produits.
  BC-2030.60.10:
    name: Délivrance des marques
    description: |
      Délivrance et apposition sur les produits des marques de certification.
  BC-2030.60.20:
    name: Renouvellement des marques
    description: |
      Renouvellement des marques de certification avant leur expiration.
  BC-2030.60.30:
    name: Retrait des marques
    description: |
      Retrait des marques de certification pour les équipements retirés ou non conformes.
  BC-2030.60.40:
    name: Conformité des étiquettes sur les produits
    description: |
      Contrôle des maquettes d'étiquettes sur les produits par rapport au contenu de certification approuvé.
  BC-2030.70:
    name: Gestion de la surveillance des normes
    description: |
      Surveillance des normes et réglementations HVAC, avec évaluation d'impact et communication de la feuille de route.
  BC-2030.70.10:
    name: Veille sur les normes HVAC
    description: |
      Veille sur les normes HVAC émergentes et révisées.
  BC-2030.70.20:
    name: Évaluation de l'impact des changements de normes
    description: |
      Évaluation de l'impact des modifications de normes sur les certifications existantes.
  BC-2030.70.30:
    name: Participation aux organismes de normalisation
    description: |
      Participation aux organismes de normalisation et aux comités techniques du secteur.
  BC-2030.70.40:
    name: Communication de la feuille de route des normes
    description: |
      Communication des feuilles de route des normes aux équipes d'ingénierie et de produit.

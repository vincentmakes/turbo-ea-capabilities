locale: fr
source: L1-chemical-product-stewardship-management.yaml
entries:
  BC-4650:
    name: Gestion de la responsabilité produit chimique
    description: |
      Classification et étiquetage des dangers, rédaction des fiches de données
      de sécurité, scénarios d'exposition, programmes relatifs aux substances
      préoccupantes et communication des risques aux clients tout au long du
      cycle de vie des produits chimiques.
  BC-4650.10:
    name: Classification et étiquetage des dangers
    description: |
      Classification SGH des substances et mélanges et conception des étiquettes
      conformes.
  BC-4650.10.10:
    name: Classification SGH
    description: |
      Classification des substances selon le système SGH de l'ONU.
  BC-4650.10.20:
    name: Classification des mélanges
    description: |
      Classification des mélanges par les principes d'interpolation et les
      données d'essais.
  BC-4650.10.30:
    name: Conception des pictogrammes et étiquettes de danger
    description: |
      Conception des pictogrammes conformes au SGH, des mentions d'avertissement
      et de la maquette des étiquettes.
  BC-4650.10.40:
    name: Localisation multilingue des étiquettes
    description: |
      Traduction et localisation des étiquettes pour les marchés de destination.
  BC-4650.20:
    name: Gestion des fiches de données de sécurité
    description: |
      Rédaction, revue et distribution des fiches de données de sécurité (FDS)
      incluant les FDS étendues pour les utilisateurs en aval.
  BC-4650.20.10:
    name: Rédaction des FDS
    description: |
      Rédaction des fiches de données de sécurité au format en 16 sections.
  BC-4650.20.20:
    name: Revue et mise à jour des FDS
    description: |
      Revue et mise à jour des FDS en fonction des nouvelles données et des
      évolutions réglementaires.
  BC-4650.20.30:
    name: Gestion de la distribution des FDS
    description: |
      Distribution des FDS aux clients et partenaires de la chaîne
      d'approvisionnement.
  BC-4650.20.40:
    name: Gestion des FDS étendues
    description: |
      Gestion des annexes des FDS étendues contenant les scénarios d'exposition.
  BC-4650.30:
    name: Gestion des scénarios d'exposition
    description: |
      Développement et maintenance des scénarios d'exposition pour les
      travailleurs, les consommateurs et l'environnement pour les substances
      enregistrées.
  BC-4650.30.10:
    name: Développement des scénarios d'exposition des travailleurs
    description: |
      Développement des scénarios d'exposition des travailleurs dans les
      conditions d'utilisation typiques.
  BC-4650.30.20:
    name: Développement des scénarios d'exposition des consommateurs
    description: |
      Développement des scénarios d'exposition des consommateurs pour les
      utilisations en produits finis.
  BC-4650.30.30:
    name: Développement des scénarios de rejet dans l'environnement
    description: |
      Développement des scénarios de rejet dans l'environnement sur l'ensemble
      du cycle de vie.
  BC-4650.40:
    name: Gestion des substances préoccupantes
    description: |
      Identification, substitution et suivi des restrictions pour les substances
      extrêmement préoccupantes (SVHC) dans le portefeuille de produits.
  BC-4650.40.10:
    name: Gestion de l'inventaire des SVHC
    description: |
      Tenue de l'inventaire de la présence des SVHC dans le portefeuille.
  BC-4650.40.20:
    name: Gestion du programme de substitution des substances
    description: |
      Gestion de programme des initiatives de substitution par des substances
      plus sûres.
  BC-4650.40.30:
    name: Maintenance de la liste des substances restreintes
    description: |
      Maintenance des listes internes de substances restreintes et des listes
      imposées par les clients.
  BC-4650.50:
    name: Communication des risques aux clients
    description: |
      Communication sortante des informations sur les dangers aux clients et
      aux utilisateurs en aval.
  BC-4650.50.10:
    name: Notification de responsabilité produit aux clients
    description: |
      Notification aux clients des changements pertinents en matière de
      responsabilité produit.
  BC-4650.50.20:
    name: Production de supports de formation sur les dangers
    description: |
      Production de supports de formation couvrant la manipulation et
      l'utilisation sûres.
  BC-4650.50.30:
    name: Traitement des demandes des utilisateurs en aval
    description: |
      Traitement des demandes relatives à la responsabilité produit émanant
      des utilisateurs en aval.
  BC-4650.60:
    name: Intendance du cycle de vie des produits
    description: |
      Intendance du cycle de vie des produits chimiques incluant les considérations
      de fin de vie, de recyclabilité et de réutilisation.
  BC-4650.60.10:
    name: Maintenance du profil de danger des produits
    description: |
      Maintenance des profils de danger consolidés par produit.
  BC-4650.60.20:
    name: Coordination de l'intendance en fin de vie
    description: |
      Coordination des dispositifs de reprise et d'intendance en fin de vie.
  BC-4650.60.30:
    name: Évaluation de la recyclabilité et de la réutilisation
    description: |
      Évaluation du potentiel de recyclabilité et de réutilisation des produits
      chimiques.

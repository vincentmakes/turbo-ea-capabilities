locale: fr
source: L1-insurance-distribution-management.yaml
entries:
  BC-2110:
    name: Gestion de la distribution en assurance
    description: |
      Relations avec les producteurs, courtiers, agents, MGA et canaux directs — nominations,
      commissions, licences, autorités déléguées et flux de cotations et de soumissions vers
      la souscription.
  BC-2110.10:
    name: Gestion des producteurs et intermédiaires
    description: |
      Intégration, hiérarchie, suivi des performances et départ des producteurs et intermédiaires.
  BC-2110.10.10:
    name: Intégration des producteurs
    description: |
      Intégration des producteurs, intermédiaires, courtiers et MGA.
  BC-2110.10.20:
    name: Hiérarchie et maintenance des comptes producteurs
    description: |
      Maintenance de la hiérarchie des producteurs, des structures de comptes et des données de contact.
  BC-2110.10.30:
    name: Suivi des performances des producteurs
    description: |
      Suivi de la production, du ratio sinistres et de la rentabilité des producteurs.
  BC-2110.10.40:
    name: Départ des producteurs
    description: |
      Départ des producteurs, gestion en extinction du portefeuille en vigueur et règlement final.
  BC-2110.20:
    name: Gestion des licences et nominations des producteurs
    description: |
      Vérification des licences, nominations juridictionnelles, formation continue et conformité des producteurs.
  BC-2110.20.10:
    name: Vérification des licences
    description: |
      Vérification des licences des producteurs par rapport aux registres étatiques et juridictionnels.
  BC-2110.20.20:
    name: Gestion des nominations juridictionnelles
    description: |
      Gestion des nominations, résiliations et renouvellements étatiques et juridictionnels.
  BC-2110.20.30:
    name: Suivi de la formation continue
    description: |
      Suivi des crédits de formation continue des producteurs et de l'éligibilité au renouvellement.
  BC-2110.20.40:
    name: Surveillance de la conformité des producteurs
    description: |
      Surveillance de la conduite, des réclamations et des mesures disciplinaires des producteurs.
  BC-2110.30:
    name: Gestion des commissions et incitations
    description: |
      Configuration des grilles de commission, calcul, dérogation et bonus, et génération des relevés.
  BC-2110.30.10:
    name: Configuration des grilles de commission
    description: |
      Configuration des grilles de commission et des taux par produit et par producteur.
  BC-2110.30.20:
    name: Calcul des commissions
    description: |
      Calcul des commissions sur les événements de prime, incluant les contre-passations à l'annulation.
  BC-2110.30.30:
    name: Calcul des dérogations et bonus
    description: |
      Calcul des dérogations, des participations aux bénéfices et des bonus d'incitation.
  BC-2110.30.40:
    name: Génération des relevés de commissions
    description: |
      Génération et distribution des relevés de commissions des producteurs.
  BC-2110.40:
    name: Gestion des canaux de distribution
    description: |
      Exploitation des canaux agents, courtiers, numérique direct, bancassurance, affinité et agrégateurs.
  BC-2110.40.10:
    name: Opérations du canal agents
    description: |
      Exploitation des canaux agents liés et indépendants.
  BC-2110.40.20:
    name: Opérations du canal courtiers
    description: |
      Exploitation des canaux courtiers et courtiers en gros.
  BC-2110.40.30:
    name: Opérations du canal numérique direct
    description: |
      Exploitation des canaux d'assurance numériques directs au client.
  BC-2110.40.40:
    name: Opérations des canaux bancassurance et affinité
    description: |
      Exploitation des partenariats de bancassurance et des canaux de groupes affinitaires.
  BC-2110.40.50:
    name: Opérations des canaux agrégateurs et comparateurs
    description: |
      Exploitation des canaux agrégateurs et de sites de comparaison de prix.
  BC-2110.50:
    name: Gestion des autorités déléguées
    description: |
      Mise en place de l'autorité coverholder, surveillance des performances, réception des bordereaux et audit des autorités.
  BC-2110.50.10:
    name: Mise en place des autorités déléguées
    description: |
      Mise en place des conventions d'autorité de souscription déléguée.
  BC-2110.50.20:
    name: Surveillance des performances coverholder
    description: |
      Surveillance des performances de souscription des coverholders et du respect des autorités.
  BC-2110.50.30:
    name: Réception et réconciliation des bordereaux
    description: |
      Réception, ingestion et réconciliation des bordereaux de primes et de sinistres.
  BC-2110.50.40:
    name: Audit et retrait des autorités
    description: |
      Audit des opérations des coverholders et retrait des autorités déléguées si nécessaire.
  BC-2110.60:
    name: Gestion des cotations et soumissions
    description: |
      Réception des soumissions, génération des cotations, comparaison et suivi de la conversion cotation-souscription.
  BC-2110.60.10:
    name: Réception des soumissions
    description: |
      Réception des soumissions d'assurance sur tous les canaux et portails courtiers.
  BC-2110.60.20:
    name: Génération des cotations
    description: |
      Génération des cotations d'assurance à partir de la configuration produit et de tarification.
  BC-2110.60.30:
    name: Comparaison des cotations et contre-cotation
    description: |
      Comparaison multi-assureurs des cotations et gestion des contre-cotations.
  BC-2110.60.40:
    name: Suivi de la conversion cotation-souscription
    description: |
      Suivi des taux de conversion cotation-souscription et des motifs de non-conversion.

locale: fr
source: L1-student-support-wellbeing-management.yaml
entries:
  BC-4770:
    name: Gestion du soutien aux étudiants et du bien-être
    description: |
      Services non pédagogiques favorisant la réussite et le bien-être des étudiants,
      incluant le conseil académique, le soutien psychologique, les aménagements
      pour les étudiants en situation de handicap, les services de carrière et
      l'accompagnement pastoral.
  BC-4770.10:
    name: Conseil académique
    description: |
      Accompagnement des étudiants dans la planification de leur parcours, le choix
      des cours et la progression académique, incluant le soutien aux étudiants à risque.
    in_scope:
      - Conseil en planification de parcours
      - Conseil aux étudiants à risque
      - Soutien aux étudiants en probation académique
    out_of_scope:
      - Conseil en orientation professionnelle (couvert par les Services de carrière et de placement)
      - Soutien psychologique (couvert par les Services de conseil et de santé mentale)
  BC-4770.10.10:
    name: Conseil en planification de parcours
    description: |
      Accompagnement dans la structure du programme, le choix des cours et les voies vers la diplomation.
  BC-4770.10.20:
    name: Conseil aux étudiants à risque
    description: |
      Accompagnement ciblé pour les étudiants identifiés comme étant à risque académique.
  BC-4770.10.30:
    name: Soutien aux étudiants en probation académique
    description: |
      Soutien structuré pour les étudiants placés en probation académique.
  BC-4770.20:
    name: Services de conseil et de santé mentale
    description: |
      Prestation de services d'évaluation de la santé mentale, de conseil et de
      réponse aux crises pour les étudiants.
    in_scope:
      - Évaluation et triage de la santé mentale
      - Prestation de séances de conseil
      - Coordination de la réponse aux crises
    out_of_scope:
      - Soins médicaux cliniques au-delà du conseil (couverts par les capacités des prestataires de soins de santé ou les orientations)
  BC-4770.20.10:
    name: Évaluation et triage de la santé mentale
    description: |
      Évaluation initiale et triage des besoins en santé mentale des étudiants.
  BC-4770.20.20:
    name: Prestation de séances de conseil
    description: |
      Prestation de séances de conseil individuel et de groupe.
  BC-4770.20.30:
    name: Coordination de la réponse aux crises
    description: |
      Coordination de la réponse aux crises et des orientations externes.
  BC-4770.30:
    name: Services aux étudiants en situation de handicap et aménagements
    description: |
      Détermination et mise en œuvre des aménagements raisonnables pour les étudiants
      en situation de handicap et fourniture de technologies d'assistance.
    in_scope:
      - Révision de la documentation relative au handicap
      - Mise en place des aménagements raisonnables
      - Soutien aux technologies d'assistance
    out_of_scope:
      - Programmes d'éducation spécialisée statutaires pour le K-12 (couverts par les Services d'éducation spécialisée)
      - Déclarations réglementaires relatives aux droits civils (couvertes par la Gestion de la conformité et des déclarations réglementaires en éducation)
  BC-4770.30.10:
    name: Révision de la documentation relative au handicap
    description: |
      Révision de la documentation relative au handicap soutenant les demandes d'aménagement.
  BC-4770.30.20:
    name: Mise en place des aménagements raisonnables
    description: |
      Mise en place des aménagements académiques et d'évaluation.
  BC-4770.30.30:
    name: Soutien aux technologies d'assistance
    description: |
      Fourniture et soutien des technologies d'assistance aux étudiants.
  BC-4770.40:
    name: Services d'éducation spécialisée
    description: |
      Services d'éducation spécialisée statutaires dispensés principalement dans
      le contexte K-12, incluant les plans d'éducation individualisés et les services associés.
    in_scope:
      - Élaboration du programme d'éducation individualisé (PEI)
      - Prestation d'enseignement spécialisé
      - Coordination des services associés (p. ex. orthophonie, ergothérapie, physiothérapie)
    out_of_scope:
      - Aménagements dans l'enseignement supérieur (couverts par les Services aux étudiants en situation de handicap et aménagements)
  BC-4770.40.10:
    name: Élaboration du programme d'éducation individualisé
    description: |
      Élaboration des PEI et des plans individualisés équivalents.
  BC-4770.40.20:
    name: Prestation d'enseignement spécialisé
    description: |
      Prestation d'un enseignement spécialisé aux étudiants ayant des besoins identifiés.
  BC-4770.40.30:
    name: Coordination des services associés
    description: |
      Coordination des services associés tels que l'orthophonie, l'ergothérapie et la physiothérapie.
  BC-4770.50:
    name: Services de carrière et de placement
    description: |
      Conseil en carrière, intermédiation pour les stages et placements, et gestion
      des relations avec les employeurs favorisant les transitions vers l'emploi.
    in_scope:
      - Conseil en orientation professionnelle
      - Intermédiation pour les stages et placements
      - Relations employeurs et recrutement sur campus
    out_of_scope:
      - Supervision de placement avec crédit académique (couverte par la Gestion des opérations d'enseignement et d'apprentissage)
  BC-4770.50.10:
    name: Conseil en orientation professionnelle
    description: |
      Conseil en orientation professionnelle et planification de carrière pour les étudiants et récents diplômés.
  BC-4770.50.20:
    name: Intermédiation pour les stages et placements
    description: |
      Intermédiation pour les stages et les opportunités d'expérience professionnelle.
  BC-4770.50.30:
    name: Relations employeurs et recrutement sur campus
    description: |
      Gestion des relations avec les employeurs et des événements de recrutement sur campus.
  BC-4770.60:
    name: Bien-être des étudiants et accompagnement pastoral
    description: |
      Accompagnement pastoral, mentorat, soutien disciplinaire et programmes de
      bien-être opérés par l'établissement.
    in_scope:
      - Accompagnement pastoral et mentorat
      - Soutien aux procédures disciplinaires des étudiants
      - Opérations des programmes de bien-être
    out_of_scope:
      - Actions d'application des droits civils (couvertes par la Gestion de la conformité et des déclarations réglementaires en éducation)
  BC-4770.60.10:
    name: Accompagnement pastoral et mentorat
    description: |
      Accompagnement pastoral et mentorat des étudiants par les tuteurs et le personnel dédié.
  BC-4770.60.20:
    name: Soutien aux procédures disciplinaires des étudiants
    description: |
      Soutien aux étudiants dans les processus disciplinaires.
  BC-4770.60.30:
    name: Opérations des programmes de bien-être
    description: |
      Mise en œuvre des programmes et campagnes institutionnels de bien-être.

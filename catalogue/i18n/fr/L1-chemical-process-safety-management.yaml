locale: fr
source: L1-chemical-process-safety-management.yaml
entries:
  BC-4640:
    name: Gestion de la sécurité des procédés chimiques
    description: |
      Prévention des accidents majeurs dans les procédés chimiques réactifs,
      inflammables et toxiques — analyse des risques de procédé, intégrité
      mécanique, systèmes instrumentés de sécurité, risques réactifs et de
      combustion, rapport de performance et intervention d'urgence.
  BC-4640.10:
    name: Analyse des risques de procédé
    description: |
      Identification et analyse structurées des risques d'accidents majeurs sur
      l'ensemble du cycle de vie des actifs.
    in_scope:
      - Études HAZID, HAZOP, LOPA et analyse nœud papillon
      - Évaluation quantitative des risques
    out_of_scope:
      - Évaluation des risques de sécurité personnelle (BC-730)
  BC-4640.10.10:
    name: Études HAZOP
    description: |
      Études de danger et d'exploitabilité (HAZOP) sur les installations
      nouvelles et modifiées.
  BC-4640.10.20:
    name: Études HAZID
    description: |
      Études d'identification des dangers (HAZID) lors des phases de conception
      conceptuelle et préliminaire.
  BC-4640.10.30:
    name: Études LOPA
    description: |
      Analyse des couches de protection (LOPA) pour définir les niveaux
      d'intégrité de sécurité (SIL).
  BC-4640.10.40:
    name: Analyse nœud papillon
    description: |
      Analyse nœud papillon pour cartographier les barrières face aux scénarios
      d'accidents majeurs.
  BC-4640.10.50:
    name: Évaluation quantitative des risques
    description: |
      Évaluation quantitative des risques pour les scénarios d'accidents majeurs.
  BC-4640.20:
    name: Gestion de l'intégrité mécanique
    description: |
      Inspection et gestion de l'intégrité des équipements sous pression et des
      dispositifs de sécurité à décharge.
  BC-4640.20.10:
    name: Inspection des appareils à pression
    description: |
      Inspection basée sur les risques des appareils à pression selon API 510.
  BC-4640.20.20:
    name: Inspection de l'intégrité des tuyauteries de procédé
    description: |
      Inspection des tuyauteries de procédé selon API 570 et ASME B31.3.
  BC-4640.20.30:
    name: Inspection des réservoirs de stockage
    description: |
      Inspection des réservoirs de stockage atmosphériques et sous pression
      selon API 653.
  BC-4640.20.40:
    name: Gestion des dispositifs de protection contre la surpression
    description: |
      Dimensionnement, essais et gestion du cycle de vie des soupapes de sécurité
      et disques de rupture.
  BC-4640.20.50:
    name: Intégrité des évents atmosphériques et des torchères
    description: |
      Assurance d'intégrité des évents atmosphériques, épurateurs et torchères.
  BC-4640.30:
    name: Gestion des systèmes instrumentés de sécurité
    description: |
      Gestion du cycle de vie de la sécurité fonctionnelle des systèmes
      instrumentés de sécurité conformément à IEC 61511.
  BC-4640.30.10:
    name: Détermination du SIL
    description: |
      Détermination des niveaux d'intégrité de sécurité (SIL) pour les fonctions
      de protection.
  BC-4640.30.20:
    name: Vérification des fonctions de sécurité
    description: |
      Vérification que les fonctions instrumentées de sécurité (SIF) conçues
      satisfont le SIL requis.
  BC-4640.30.30:
    name: Tests périodiques des SIS
    description: |
      Tests périodiques de vérification des systèmes instrumentés de sécurité.
  BC-4640.30.40:
    name: Évaluation de la sécurité fonctionnelle
    description: |
      Évaluations de la sécurité fonctionnelle aux jalons du cycle de vie.
  BC-4640.40:
    name: Gestion des risques réactifs et des risques de combustion
    description: |
      Identification et maîtrise des risques de chimie réactive, d'emballement,
      de poussières combustibles et d'ignition.
  BC-4640.40.10:
    name: Évaluation des risques de chimie réactive
    description: |
      Évaluation des risques de chimie réactive incluant les incompatibilités.
  BC-4640.40.20:
    name: Prévention des réactions d'emballement
    description: |
      Prévention et atténuation des réactions exothermiques incontrôlées.
  BC-4640.40.30:
    name: Maîtrise des risques de poussières combustibles
    description: |
      Maîtrise des risques de poussières combustibles selon NFPA 654.
  BC-4640.40.40:
    name: Maîtrise de l'électricité statique et des sources d'ignition
    description: |
      Maîtrise des sources d'ignition électrostatiques et autres dans les zones
      de procédé.
  BC-4640.50:
    name: Gestion des modifications en sécurité des procédés
    description: |
      Gouvernance de la sécurité des procédés pour les modifications d'installation,
      de procédure et de personnel, incluant la revue de sécurité avant démarrage.
  BC-4640.50.10:
    name: Revue des demandes de modification PSM
    description: |
      Revue des demandes de modification ayant un impact sur la sécurité des
      procédés selon les normes de danger.
  BC-4640.50.20:
    name: Revue de sécurité avant démarrage
    description: |
      Revues de sécurité avant démarrage pour les installations nouvelles et
      modifiées.
  BC-4640.50.30:
    name: Gestion des modifications temporaires
    description: |
      Gestion des modifications temporaires de procédé dans leur fenêtre
      autorisée.
  BC-4640.60:
    name: Gestion de la performance en sécurité des procédés
    description: |
      Suivi et rapport des indicateurs avancés et retardés de sécurité des
      procédés selon le CCPS RBPS et les référentiels équivalents.
  BC-4640.60.10:
    name: Rapport des événements de sécurité des procédés de niveaux 1 et 2
    description: |
      Capture et rapport des événements de sécurité des procédés de niveaux 1
      et 2.
  BC-4640.60.20:
    name: Surveillance des indicateurs avancés
    description: |
      Surveillance des indicateurs avancés de sécurité des procédés de niveaux
      3 et 4.
  BC-4640.60.30:
    name: Rapport des KPI de sécurité des procédés
    description: |
      Rapport interne et externe des performances des KPI de sécurité des
      procédés.
  BC-4640.70:
    name: Préparation aux urgences et intervention
    description: |
      Planification des interventions d'urgence, exécution des exercices et
      coordination des interventions en cas de rejet toxique pour les scénarios
      d'accidents majeurs.
  BC-4640.70.10:
    name: Planification des interventions d'urgence
    description: |
      Maintenance des plans d'intervention d'urgence d'installation et
      d'entreprise.
  BC-4640.70.20:
    name: Coordination des exercices et simulations
    description: |
      Coordination des exercices d'urgence et des simulations d'incidents
      majeurs.
  BC-4640.70.30:
    name: Coordination des interventions en cas de rejet toxique
    description: |
      Coordination des opérations d'intervention en cas de rejets toxiques et
      inflammables.
  BC-4640.70.40:
    name: Coordination de l'entraide
    description: |
      Coordination de l'entraide avec les coopératives d'intervention
      industrielle.
  BC-4640.80:
    name: Procédures d'exploitation en sécurité des procédés
    description: |
      Rédaction, revue et définition des enveloppes d'exploitation pour les
      procédures critiques en matière de sécurité des procédés.
  BC-4640.80.10:
    name: Rédaction des procédures critiques de sécurité
    description: |
      Rédaction des procédures d'exploitation critiques en matière de sécurité
      des procédés.
  BC-4640.80.20:
    name: Définition des enveloppes d'exploitation
    description: |
      Définition des enveloppes d'exploitation sûres pour les unités de procédé.
  BC-4640.80.30:
    name: Revue périodique des procédures
    description: |
      Revue et mise à jour périodiques des procédures de sécurité des procédés.

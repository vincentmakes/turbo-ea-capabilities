locale: fr
source: L1-banking-risk-management.yaml
entries:
  BC-1410:
    name: Gestion des risques bancaires
    description: |
      Types de risques spécifiques à la banque — risque de crédit, de marché, de liquidité, de modèle et risque de crédit de contrepartie.
  BC-1410.10:
    name: Gestion du risque de crédit bancaire
    description: |
      Cadres de risque de crédit, RWA et tests de résistance.
  BC-1410.10.10:
    name: Cadre du risque de crédit
    description: |
      Définition du cadre et des politiques de risque de crédit.
  BC-1410.10.20:
    name: Calcul et reporting des RWA
    description: |
      Calcul et reporting des RWA selon les approches standard et NI.
  BC-1410.10.30:
    name: Test de résistance au risque de crédit
    description: |
      Tests de résistance et analyses de scénarios sur le risque de crédit.
  BC-1410.10.40:
    name: Gestion du risque de concentration
    description: |
      Gestion du risque de concentration par nom, secteur et pays.
  BC-1410.20:
    name: Gestion du risque de marché
    description: |
      VaR, sensibilités, limites de risque de marché et FRTB.
  BC-1410.20.10:
    name: Mesure du risque de marché
    description: |
      Mesure de la VaR, ES et sensibilités du portefeuille de négociation.
  BC-1410.20.20:
    name: Gestion des limites de risque de marché
    description: |
      Définition et suivi des limites de risque de marché.
  BC-1410.20.30:
    name: Test de résistance au risque de marché
    description: |
      Tests de résistance et de scénarios sur le risque de marché.
  BC-1410.20.40:
    name: Gestion de la mise en œuvre du FRTB
    description: |
      Mise en œuvre et exploitation de l'approche standard et du modèle interne FRTB.
  BC-1410.30:
    name: Gestion du risque opérationnel bancaire
    description: |
      Cadres de risque opérationnel, RCSA et données sur les pertes.
  BC-1410.30.10:
    name: Cadre du risque opérationnel
    description: |
      Cadre, taxonomie et politique de risque opérationnel.
  BC-1410.30.20:
    name: Autoévaluation des risques et des contrôles
    description: |
      Réalisation des RCSA et mise à jour du profil de risque.
  BC-1410.30.30:
    name: Collecte des événements de perte opérationnelle
    description: |
      Collecte et classification des événements de perte opérationnelle.
  BC-1410.30.40:
    name: Gestion des indicateurs clés de risque opérationnel
    description: |
      Définition, seuils et suivi des indicateurs clés de risque (KRI).
  BC-1410.40:
    name: Gestion du risque de liquidité
    description: |
      Cadres de risque de liquidité, tests de résistance et plan de financement d'urgence.
  BC-1410.40.10:
    name: Cadre du risque de liquidité
    description: |
      Cadre, appétit et politique de risque de liquidité.
  BC-1410.40.20:
    name: Test de résistance à la liquidité
    description: |
      Tests de résistance et de résistance inversée spécifiques à la liquidité.
  BC-1410.40.30:
    name: Gestion du plan de financement d'urgence
    description: |
      Maintenance et test du plan de financement d'urgence.
  BC-1410.50:
    name: Gestion du risque de modèle
    description: |
      Validation des modèles, gouvernance et inventaire des modèles.
  BC-1410.50.10:
    name: Gestion de l'inventaire des modèles
    description: |
      Maintenance de l'inventaire des modèles de l'entreprise.
  BC-1410.50.20:
    name: Niveaux de risque des modèles
    description: |
      Classification des modèles par niveau de risque pour la gouvernance.
  BC-1410.50.30:
    name: Validation indépendante des modèles
    description: |
      Validation indépendante des modèles conformément à SR 11-7 / TRIM.
  BC-1410.50.40:
    name: Suivi des performances des modèles
    description: |
      Suivi continu des performances et recalibration des modèles.
  BC-1410.60:
    name: Gestion du risque de crédit de contrepartie
    description: |
      CCR, CVA et exposition aux dérivés sur contreparties.
  BC-1410.60.10:
    name: Mesure de l'exposition sur contrepartie
    description: |
      Mesure de l'exposition sur contrepartie (PFE, EEPE).
  BC-1410.60.20:
    name: Gestion de la CVA et des XVA
    description: |
      Gestion de la CVA, DVA, FVA et autres XVA.
  BC-1410.60.30:
    name: Gestion des limites sur contrepartie
    description: |
      Fixation et suivi des limites sur contrepartie.
  BC-1410.60.40:
    name: Gestion du risque de corrélation défavorable
    description: |
      Identification et gestion du risque de corrélation défavorable spécifique et général.

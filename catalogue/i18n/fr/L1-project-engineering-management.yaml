locale: fr
source: L1-project-engineering-management.yaml
entries:
  BC-1110:
    name: Gestion de l'ingénierie de projet
    description: |
      Ingénierie des projets depuis l'avant-projet détaillé (FEED) jusqu'à la remise en exploitation.
  BC-1110.10:
    name: Gestion de la planification de l'ingénierie de projet
    description: |
      Décomposition des travaux d'ingénierie, plan des livrables et planning d'ingénierie.
  BC-1110.10.10:
    name: Définition de la décomposition des travaux d'ingénierie
    description: |
      WBS d'ingénierie et décomposition par discipline.
  BC-1110.10.20:
    name: Registre des livrables d'ingénierie
    description: |
      Registre des livrables, responsables et dates cibles.
  BC-1110.10.30:
    name: Élaboration du planning d'ingénierie
    description: |
      Planning d'ingénierie avec les interdépendances entre disciplines.
  BC-1110.10.40:
    name: Chargement des ressources d'ingénierie
    description: |
      Prévision des heures d'ingénierie et chargement des ressources.
  BC-1110.20:
    name: Gestion de l'exécution de l'ingénierie de projet
    description: |
      Pilotage et reporting de l'exécution de l'ingénierie multidisciplinaire.
  BC-1110.20.10:
    name: Mesure de l'avancement de l'ingénierie
    description: |
      Mesure de l'avancement des livrables d'ingénierie et valeur acquise.
  BC-1110.20.20:
    name: Contrôle des heures d'ingénierie
    description: |
      Suivi et prévision de la consommation des heures d'ingénierie.
  BC-1110.20.30:
    name: Réunions de coordination d'ingénierie
    description: |
      Coordination interdisciplinaire et reporting hebdomadaire d'ingénierie.
  BC-1110.20.40:
    name: Amélioration de la productivité de l'ingénierie
    description: |
      Initiatives de productivité telles que l'automatisation de la conception et la réutilisation.
  BC-1110.30:
    name: Gestion des modifications d'ingénierie
    description: |
      Demandes de modification, évaluation de l'impact technique et contrôle des référentiels.
  BC-1110.30.10:
    name: Saisie des demandes de modification d'ingénierie
    description: |
      Saisie et classification des demandes de modification d'ingénierie.
  BC-1110.30.20:
    name: Évaluation de l'impact technique
    description: |
      Évaluation multidisciplinaire de l'impact technique des modifications.
  BC-1110.30.30:
    name: Contrôle du référentiel d'ingénierie
    description: |
      Contrôle des référentiels d'ingénierie et des éléments de configuration.
  BC-1110.30.40:
    name: Approbation et mise en œuvre des modifications d'ingénierie
    description: |
      Comités d'approbation des modifications et suivi de leur mise en œuvre.
  BC-1110.40:
    name: Gestion des interfaces
    description: |
      Interfaces techniques internes et externes, coordination avec les parties prenantes.
  BC-1110.40.10:
    name: Identification et enregistrement des interfaces
    description: |
      Identification et enregistrement des interfaces techniques.
  BC-1110.40.20:
    name: Gestion des accords d'interface
    description: |
      Accords d'interface avec les parties et critères d'acceptation.
  BC-1110.40.30:
    name: Surveillance et clôture des interfaces
    description: |
      Surveillance des livrables d'interface et clôture formelle.
  BC-1110.50:
    name: Gestion de la qualité de l'ingénierie de projet
    description: |
      Assurance et contrôle qualité en ingénierie, revues techniques, audits.
  BC-1110.50.10:
    name: Gestion du programme d'assurance qualité en ingénierie
    description: |
      Programme d'assurance qualité en ingénierie conforme à la norme ISO 9001.
  BC-1110.50.20:
    name: Revue par les pairs de la discipline
    description: |
      Revue par les pairs des livrables d'ingénierie par discipline.
  BC-1110.50.30:
    name: Audit technique en ingénierie
    description: |
      Audits techniques indépendants et revues d'assurance.
  BC-1110.50.40:
    name: Retours d'expérience en ingénierie
    description: |
      Capitalisation et diffusion des retours d'expérience en ingénierie.
  BC-1110.60:
    name: Gestion des risques et des problèmes d'ingénierie de projet
    description: |
      Risques techniques, problèmes techniques et suivi des mesures d'atténuation.
  BC-1110.60.10:
    name: Identification des risques techniques
    description: |
      Identification des risques techniques et d'ingénierie.
  BC-1110.60.20:
    name: Évaluation des risques techniques
    description: |
      Évaluation de la probabilité et de l'impact des risques techniques.
  BC-1110.60.30:
    name: Résolution des problèmes techniques
    description: |
      Suivi et résolution des problèmes techniques avec désignation des responsables.
  BC-1110.60.40:
    name: Suivi des mesures d'atténuation techniques
    description: |
      Suivi des actions d'atténuation et du risque résiduel.

locale: fr
source: L1-defense-systems-engineering-management.yaml
entries:
  BC-1770:
    name: Gestion de l'ingénierie système de défense
    description: |
      Ingénierie système selon les normes MIL-STD : exigences, architecture, V&V, configuration et intégration.
  BC-1770.10:
    name: Gestion de l'ingénierie des exigences de défense
    description: |
      Élicitation, décomposition et traçabilité des exigences.
  BC-1770.10.10:
    name: Élicitation des exigences des parties prenantes
    description: |
      Élicitation des besoins des parties prenantes et des exigences opérationnelles.
  BC-1770.10.20:
    name: Décomposition des exigences système
    description: |
      Décomposition des exigences système vers les sous-systèmes.
  BC-1770.10.30:
    name: Traçabilité des exigences
    description: |
      Traçabilité bidirectionnelle des exigences vers la conception et les essais.
  BC-1770.10.40:
    name: Planification de la vérification des exigences
    description: |
      Définition des méthodes de vérification et des critères d'acceptation.
  BC-1770.20:
    name: Gestion de l'architecture système de défense
    description: |
      Architecture système, modèles et lignes de base.
  BC-1770.20.10:
    name: Modélisation des architectures opérationnelle et système
    description: |
      Modélisation des architectures opérationnelle et système (DoDAF/MoDAF).
  BC-1770.20.20:
    name: Analyse des compromis architecturaux
    description: |
      Analyse des compromis entre les options architecturales.
  BC-1770.20.30:
    name: Gestion des lignes de base d'architecture
    description: |
      Définition et maîtrise des lignes de base d'architecture.
  BC-1770.30:
    name: Gestion de la définition des interfaces de défense
    description: |
      Maîtrise des interfaces, documents de contrôle d'interface et plans de gestion.
  BC-1770.30.10:
    name: Identification des interfaces
    description: |
      Identification des interfaces internes et externes du système.
  BC-1770.30.20:
    name: Gestion des documents de contrôle d'interface
    description: |
      Rédaction et maîtrise des ICDs et IRSs.
  BC-1770.30.30:
    name: Vérification des interfaces
    description: |
      Vérification de la conformité des interfaces lors de l'intégration.
  BC-1770.40:
    name: Gestion de la vérification et validation de défense
    description: |
      Planification et exécution de la V&V, certification.
  BC-1770.40.10:
    name: Planification de la V&V
    description: |
      Stratégie et planification de la vérification et validation.
  BC-1770.40.20:
    name: Exécution de la V&V
    description: |
      Exécution de la V&V par analyses, démonstrations, inspections et essais.
  BC-1770.40.30:
    name: Reporting des résultats de V&V
    description: |
      Reporting des résultats et des non-conformités de V&V.
  BC-1770.50:
    name: Gestion de la configuration de défense
    description: |
      Identification, maîtrise, comptabilisation des états et audits de configuration.
  BC-1770.50.10:
    name: Identification de la configuration de défense
    description: |
      Identification de la configuration selon MIL-HDBK-61.
  BC-1770.50.20:
    name: Maîtrise des changements de configuration de défense
    description: |
      Maîtrise des changements ECP, RFD et DD-1694.
  BC-1770.50.30:
    name: Comptabilisation des états de configuration de défense
    description: |
      Comptabilisation et reporting des états de configuration.
  BC-1770.50.40:
    name: Audits de configuration
    description: |
      Audits fonctionnels et physiques de configuration.
  BC-1770.60:
    name: Gestion de l'intégration système de défense
    description: |
      Intégration des sous-systèmes, essais intégrés et intégration système de systèmes.
  BC-1770.60.10:
    name: Exécution de l'intégration des sous-systèmes
    description: |
      Exécution des séquences d'intégration des sous-systèmes.
  BC-1770.60.20:
    name: Exécution des essais intégrés
    description: |
      Exécution des essais intégrés en laboratoire et sur le terrain.
  BC-1770.60.30:
    name: Intégration système de systèmes
    description: |
      Intégration avec le système de systèmes élargi et les architectures interarmées.

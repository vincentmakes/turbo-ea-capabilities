locale: fr
source: L1-professional-practice-knowledge-management.yaml
entries:
  BC-4370:
    name: Gestion des connaissances du cabinet professionnel
    description: |
      Maintenance et réutilisation des précédents, des actifs méthodologiques,
      du leadership éclairé, des modèles de livrables et des bibliothèques de
      recherche qui soutiennent la livraison des missions dans les cabinets de
      services professionnels.
  BC-4370.10:
    name: Gestion des précédents et des modèles
    description: |
      Curation, versionnement et contrôle d'accès des précédents juridiques,
      des modèles de contrats et des produits de travail standard disponibles
      pour la réutilisation.
  BC-4370.10.10:
    name: Curation des précédents
    description: |
      Sélection, expurgation et curation des livrables de haute qualité des
      missions pour la bibliothèque de précédents du cabinet.
  BC-4370.10.20:
    name: Maintenance des modèles
    description: |
      Maintenance et gestion des versions des modèles de contrats, des coques
      d'avis et des modèles de livrables standard.
  BC-4370.10.30:
    name: Gouvernance de l'accès aux précédents
    description: |
      Gouvernance de l'accès aux précédents pour équilibrer la réutilisation
      avec la confidentialité des clients et les contraintes de cloisons éthiques.
  BC-4370.20:
    name: Gestion de la méthodologie et des outils
    description: |
      Définition, évolution et déploiement de la méthodologie des missions,
      des cadres analytiques et des outils propriétaires utilisés sur les missions.
  BC-4370.20.10:
    name: Définition de la méthodologie
    description: |
      Définition des méthodologies d'audit, de conseil et juridiques alignées
      sur les normes professionnelles et la politique du cabinet.
  BC-4370.20.20:
    name: Versionnement et publication de la méthodologie
    description: |
      Versionnement, gestion des mises en production et dépréciation des
      composants méthodologiques et des accélérateurs.
  BC-4370.20.30:
    name: Déploiement et formation à la méthodologie
    description: |
      Déploiement des nouvelles versions de méthodologie incluant la formation,
      les FAQ et le suivi de l'adoption.
  BC-4370.30:
    name: Gestion des insights et du leadership éclairé
    description: |
      Production et diffusion des points de vue de pratique, des alertes,
      des enquêtes et des publications de leadership éclairé.
  BC-4370.30.10:
    name: Planification des sujets d'insight
    description: |
      Planification des sujets d'insight et de leadership éclairé alignés
      sur la stratégie de pratique et les intérêts des clients.
  BC-4370.30.20:
    name: Production des insights
    description: |
      Production d'articles, d'alertes, de points de vue et de rapports
      d'enquête.
  BC-4370.30.30:
    name: Distribution des insights et suivi de l'engagement
    description: |
      Distribution des insights aux audiences clients et prospects et suivi
      de l'engagement.
  BC-4370.40:
    name: Gestion de la réutilisation des actifs de mission
    description: |
      Identification, collecte et indexation des livrables de haute valeur
      des missions comme actifs réutilisables, en préservant la confidentialité
      des clients.
  BC-4370.40.10:
    name: Identification des actifs réutilisables
    description: |
      Identification des livrables de missions présentant une valeur de
      réutilisation au-delà de la mission d'origine.
  BC-4370.40.20:
    name: Assainissement et expurgation des actifs
    description: |
      Assainissement et expurgation des actifs de missions pour supprimer
      les informations confidentielles des clients avant la réutilisation.
  BC-4370.40.30:
    name: Indexation et découvrabilité des actifs
    description: |
      Indexation et enrichissement des métadonnées des actifs réutilisables
      pour favoriser leur découvrabilité dans les pratiques.
  BC-4370.50:
    name: Gestion de la bibliothèque du cabinet
    description: |
      Curation et licence des bases de données de recherche externes, des
      bibliothèques juridiques et fiscales et des contenus d'abonnement utilisés
      par les professionnels.
  BC-4370.50.10:
    name: Gestion des abonnements de recherche externe
    description: |
      Acquisition et renouvellement des abonnements aux bases de données
      juridiques, fiscales et de recherche externes.
  BC-4370.50.20:
    name: Catalogue et recherche de la bibliothèque
    description: |
      Catalogue et recherche fédérée sur les sources de recherche internes
      et externes.
  BC-4370.50.30:
    name: Analytique d'utilisation de la bibliothèque
    description: |
      Analytique d'utilisation des bases de données de recherche pour
      éclairer les décisions de renouvellement et de rationalisation.
  BC-4370.60:
    name: Gestion des communautés de pratique
    description: |
      Animation des groupes de pratique, des communautés de pratique et
      des réseaux thématiques partageant les connaissances à travers le cabinet.
  BC-4370.60.10:
    name: Animation des groupes de pratique
    description: |
      Animation des groupes de pratique incluant l'adhésion, le leadership
      et la cadence des forums.
  BC-4370.60.20:
    name: Facilitation des communautés de pratique
    description: |
      Facilitation des communautés de pratique transversales sur les sujets
      émergents et les méthodes.
  BC-4370.60.30:
    name: Réseau des champions de la connaissance
    description: |
      Animation d'un réseau de champions de la connaissance distribués à travers
      les pratiques et les bureaux.

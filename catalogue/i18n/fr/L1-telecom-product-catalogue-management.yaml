locale: fr
source: L1-telecom-product-catalogue-management.yaml
entries:
  BC-2650:
    name: Gestion du catalogue de produits télécom
    description: |
      Conception, configuration, cycle de vie et publication multicanale des
      produits, tarifs, plans, offres groupées et promotions télécom pour les
      segments grand public, entreprise et wholesale.
  BC-2650.10:
    name: Conception des offres commerciales
    description: |
      Conception des nouvelles offres commerciales incluant les fonctionnalités,
      l'éligibilité et les structures tarifaires.
  BC-2650.10.10:
    name: Spécification des offres
    description: |
      Spécification de la composition de l'offre, des fonctionnalités et des
      conditions orientées client.
  BC-2650.10.20:
    name: Faisabilité technique du produit
    description: |
      Validation que l'offre proposée est techniquement délivrable sur les
      réseaux et plateformes ciblés.
  BC-2650.10.30:
    name: Conception des niveaux tarifaires
    description: |
      Conception des niveaux tarifaires, des règles d'éligibilité et des
      structures contractuelles de l'offre.
  BC-2650.20:
    name: Gestion des tarifs et des plans
    description: |
      Définition et cycle de vie des tarifs, frais récurrents et politiques
      d'utilisation équitable sous-jacents aux offres.
  BC-2650.20.10:
    name: Définition des tarifs à l'usage
    description: |
      Définition des tarifs à l'événement et à l'unité par type de service et
      juridiction.
  BC-2650.20.20:
    name: Définition des frais récurrents
    description: |
      Définition des frais récurrents, abonnements mensuels et frais liés au
      contrat.
  BC-2650.20.30:
    name: Gestion des politiques d'utilisation équitable
    description: |
      Définition et cycle de vie des politiques d'utilisation équitable et
      acceptable sur les plans illimités et à forte consommation.
  BC-2650.30:
    name: Gestion des offres groupées et des promotions
    description: |
      Composition et règles des offres multi-produits groupées et des promotions
      à durée limitée.
  BC-2650.30.10:
    name: Composition des offres groupées
    description: |
      Composition d'offres groupées multi-services couvrant le mobile, le fixe,
      le contenu et le terminal.
  BC-2650.30.20:
    name: Règles d'éligibilité aux promotions
    description: |
      Définition des règles d'éligibilité au niveau client et offre pour les
      promotions.
  BC-2650.30.30:
    name: Règles de cumul des remises
    description: |
      Règles régissant la combinaison de plusieurs remises et promotions sur
      un même compte.
  BC-2650.40:
    name: Publication du catalogue de produits
    description: |
      Publication des versions du catalogue sur les canaux et partenaires avec
      contrôle des versions et variantes régionales.
  BC-2650.40.10:
    name: Publication multicanale du catalogue
    description: |
      Publication du contenu du catalogue sur les canaux boutique, numérique,
      centre de contact et partenaires.
  BC-2650.40.20:
    name: Contrôle des versions du catalogue
    description: |
      Contrôle des versions du contenu du catalogue incluant les dates d'effet
      et le rollback.
  BC-2650.40.30:
    name: Gestion des variantes régionales du catalogue
    description: |
      Gestion des variantes de catalogue régionales et par marque à partir
      d'un master partagé.
  BC-2650.50:
    name: Gestion du cycle de vie des produits télécom
    description: |
      Gestion du cycle de vie des offres du lancement à la modification, au
      retrait et au grandfathering.
  BC-2650.50.10:
    name: Lancement des offres
    description: |
      Coordination des lancements de nouvelles offres sur les systèmes, canaux
      et régions.
  BC-2650.50.20:
    name: Modification des offres
    description: |
      Modification contrôlée des offres en cours de commercialisation et
      migration des abonnés existants le cas échéant.
  BC-2650.50.30:
    name: Retrait des offres et grandfathering
    description: |
      Retrait des offres de la vente et maintien des abonnés existants sous
      les conditions historiques.

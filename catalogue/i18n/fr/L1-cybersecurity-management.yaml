locale: fr
source: L1-cybersecurity-management.yaml
entries:
  BC-620:
    name: Gestion de la cybersécurité
    description: |
      Stratégie de sécurité, contrôles, gestion des identités et réponse aux menaces.
  BC-620.10:
    name: Gestion de la stratégie et de la gouvernance de la sécurité
    description: |
      Stratégie, politiques, cadres et GRC de sécurité.
  BC-620.10.10:
    name: Développement de la stratégie de sécurité
    description: |
      Stratégie de cybersécurité pluriannuelle alignée sur le risque métier.
  BC-620.10.20:
    name: Politiques et standards de sécurité
    description: |
      Politiques et standards de sécurité alignés sur NIST CSF et ISO 27001.
  BC-620.10.30:
    name: Gestion des risques de sécurité
    description: |
      Identification, évaluation et traitement des risques cyber.
  BC-620.10.40:
    name: Gestion de la conformité en matière de sécurité
    description: |
      Conformité aux réglementations cyber (DORA, NIS2, sectorielles).
  BC-620.10.50:
    name: Indicateurs et reporting de sécurité
    description: |
      KPI de sécurité, tableaux de bord et reporting au conseil d'administration.
  BC-620.20:
    name: Gestion des identités et des accès
    description: |
      IAM, PAM, fédération et gestion des arrivées-mobilités-départs.
  BC-620.20.10:
    name: Gestion du cycle de vie des identités
    description: |
      Processus d'arrivée, de mobilité et de départ et provisionnement des identités.
  BC-620.20.20:
    name: Gestion des accès et authentification
    description: |
      Authentification, MFA, authentification unique et fédération.
  BC-620.20.30:
    name: Gestion des accès à privilèges
    description: |
      PAM, accès en temps réel et surveillance des sessions à privilèges.
  BC-620.20.40:
    name: Gouvernance des accès et recertification
    description: |
      Revues des accès, séparation des tâches et recertification.
  BC-620.20.50:
    name: Gestion des identités clients
    description: |
      CIAM pour les clients, partenaires et consommateurs externes.
  BC-620.30:
    name: Gestion de la détection des menaces et de la réponse
    description: |
      SOC, SIEM et réponse aux incidents.
  BC-620.30.10:
    name: Supervision de la sécurité et opérations SIEM
    description: |
      Supervision par SIEM, SOAR et télémétrie de sécurité.
  BC-620.30.20:
    name: Chasse aux menaces
    description: |
      Chasse aux menaces proactive et pilotée par des hypothèses.
  BC-620.30.30:
    name: Renseignement sur les cybermenaces
    description: |
      Collecte, analyse et diffusion du renseignement sur les cybermenaces.
  BC-620.30.40:
    name: Réponse aux cyberincidents
    description: |
      Détection, confinement, éradication et reprise après incident cyber.
  BC-620.30.50:
    name: Criminalistique numérique
    description: |
      Acquisition et analyse forensique en appui aux incidents et aux litiges.
  BC-620.40:
    name: Gestion des vulnérabilités
    description: |
      Analyse des vulnérabilités, correction et remédiation.
  BC-620.40.10:
    name: Analyse des vulnérabilités
    description: |
      Analyse authentifiée et non authentifiée du parc applicatif et infrastructurel.
  BC-620.40.20:
    name: Triage et priorisation des vulnérabilités
    description: |
      Priorisation basée sur les risques des vulnérabilités à remédier.
  BC-620.40.30:
    name: Gestion des correctifs et de la remédiation
    description: |
      Coordination de l'application des correctifs et de la remédiation entre les responsables.
  BC-620.40.40:
    name: Tests d'intrusion et exercices red team
    description: |
      Tests d'intrusion, exercices red team et simulation d'adversaires.
  BC-620.50:
    name: Gestion de l'architecture de sécurité
    description: |
      Conception sécurisée, modèles de sécurité et confiance zéro.
  BC-620.50.10:
    name: Modèles d'architecture de sécurité
    description: |
      Modèles de sécurité de référence et contrôles réutilisables.
  BC-620.50.20:
    name: Architecture de confiance zéro
    description: |
      Principes de confiance zéro, micro-segmentation et application des politiques.
  BC-620.50.30:
    name: Ingénierie de la sécurité des applications
    description: |
      Pratiques de sécurité dès la conception, SAST, DAST et modélisation des menaces.
  BC-620.50.40:
    name: Architecture de sécurité cloud
    description: |
      Lignes de base de sécurité cloud, CSPM et conception des contrôles natifs cloud.
  BC-620.50.50:
    name: Cryptographie et gestion des clés
    description: |
      Standards cryptographiques, gestion des clés et opérations d'infrastructure à clé publique.
  BC-620.60:
    name: Gestion de la sensibilisation à la sécurité
    description: |
      Formations de sensibilisation, simulations de phishing et culture de sécurité.
  BC-620.60.10:
    name: Formation à la sensibilisation à la sécurité
    description: |
      Formations annuelles et par rôle à la sensibilisation à la sécurité.
  BC-620.60.20:
    name: Simulation de phishing
    description: |
      Simulations de phishing et accompagnement post-simulation.
  BC-620.60.30:
    name: Programme de culture de sécurité
    description: |
      Programmes de changement culturel et réseaux de champions de la sécurité.
  BC-620.60.40:
    name: Communications de sécurité
    description: |
      Alertes, avis de sécurité et communications aux parties prenantes.

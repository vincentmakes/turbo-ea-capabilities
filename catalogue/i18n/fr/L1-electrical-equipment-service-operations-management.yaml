locale: fr
source: L1-electrical-equipment-service-operations-management.yaml
entries:
  BC-1960:
    name: Gestion des opérations de service des équipements électriques
    description: |
      Services menés par l'OEM sur les équipements livrés — visite de site, essais FAT et SAT,
      mise sous tension, paramètres de protection, configuration du parc installé, modernisations,
      contrats de performance et surveillance de l'état.
  BC-1960.10:
    name: Ingénierie de visite de site et de pré-mise en service
    description: |
      Évaluation du site et préparation de l'ingénierie avant la mise en service de l'équipement.
  BC-1960.10.10:
    name: Exécution de la visite de site
    description: |
      Réalisation des visites de site pour recenser les conditions existantes.
  BC-1960.10.20:
    name: Évaluation de la disponibilité du site
    description: |
      Évaluation de la disponibilité du site pour la livraison et la mise sous tension de l'équipement.
  BC-1960.10.30:
    name: Études d'ingénierie de pré-mise en service
    description: |
      Études d'ingénierie préalables à la mise en service, incluant la coordination et la mise à la terre.
  BC-1960.20:
    name: Coordination des essais de réception en usine
    description: |
      Planification et exécution des essais de réception en usine avec témoin du client.
  BC-1960.20.10:
    name: Rédaction du plan FAT
    description: |
      Rédaction des plans FAT conformément aux exigences contractuelles.
  BC-1960.20.20:
    name: Coordination des témoins FAT
    description: |
      Coordination des témoins client et certificateur lors du FAT.
  BC-1960.20.30:
    name: Gestion de la liste des réserves FAT
    description: |
      Suivi et clôture des points de la liste des réserves FAT.
  BC-1960.30:
    name: Gestion des essais de réception sur site et de la mise sous tension
    description: |
      Essais de réception sur site, mise sous tension et supervision de l'exploitation initiale.
  BC-1960.30.10:
    name: Exécution des essais de réception sur site
    description: |
      Exécution des essais de réception sur site sur les équipements installés.
  BC-1960.30.20:
    name: Exécution de la procédure de mise sous tension
    description: |
      Mise sous tension contrôlée de l'équipement conformément aux procédures de manœuvre.
  BC-1960.30.30:
    name: Supervision de l'exploitation initiale
    description: |
      Supervision de l'exploitation initiale et de la période de rodage de fiabilité.
  BC-1960.30.40:
    name: Documentation de remise
    description: |
      Constitution des dossiers de remise et des enregistrements tels que mis en service.
  BC-1960.40:
    name: Gestion des paramètres de protection et de contrôle
    description: |
      Ingénierie et déploiement des paramètres de protection et de contrôle sur les équipements installés.
  BC-1960.40.10:
    name: Étude de coordination de protection
    description: |
      Études de coordination pour les dispositifs de protection sur le réseau installé.
  BC-1960.40.20:
    name: Calcul des réglages de relais
    description: |
      Calcul des réglages des relais de protection.
  BC-1960.40.30:
    name: Déploiement et vérification des fichiers de réglage
    description: |
      Déploiement des fichiers de réglage sur les relais et vérification sur site.
  BC-1960.50:
    name: Gestion de la configuration du parc installé
    description: |
      Maintenance des données de configuration telles qu'installées sur le parc mondial installé.
  BC-1960.50.10:
    name: Registre du parc installé
    description: |
      Registre des équipements installés par numéro de série, site et client.
  BC-1960.50.20:
    name: Saisie de la configuration telle que construite
    description: |
      Saisie de la configuration telle que construite lors de la mise en service.
  BC-1960.50.30:
    name: Enregistrements des modifications du parc installé
    description: |
      Enregistrements des modifications post-mise en service apportées aux équipements installés.
  BC-1960.60:
    name: Services de modernisation et de mise à niveau des équipements
    description: |
      Ingénierie et exécution des modernisations et mises à niveau des équipements installés.
  BC-1960.60.10:
    name: Ingénierie de modernisation
    description: |
      Conception d'ingénierie des kits de modernisation et de mise à niveau.
  BC-1960.60.20:
    name: Exécution de la modernisation
    description: |
      Exécution sur site des modernisations et installations de mise à niveau.
  BC-1960.60.30:
    name: Validation de la mise à niveau
    description: |
      Tests de validation après modernisation ou mise à niveau.
  BC-1960.70:
    name: Opérations des contrats de service à la performance
    description: |
      Exploitation des contrats de service à la performance et aux résultats.
  BC-1960.70.10:
    name: Exécution des contrats de performance
    description: |
      Exécution des obligations de service à la performance.
  BC-1960.70.20:
    name: Reporting des résultats du niveau de service
    description: |
      Reporting des résultats contractuels et des indicateurs de niveau de service.
  BC-1960.70.30:
    name: Opérations des mécanismes de partage des risques
    description: |
      Exploitation des mécanismes de bonus et de pénalité pour le partage des risques.
  BC-1960.80:
    name: Prestation de services de surveillance de l'état
    description: |
      Prestation de services de surveillance à distance de l'état et d'informations prédictives.
  BC-1960.80.10:
    name: Opérations de surveillance à distance de l'état
    description: |
      Centre d'opérations pour la surveillance à distance de l'état des actifs installés.
  BC-1960.80.20:
    name: Prestation d'informations de diagnostic
    description: |
      Prestation d'informations de diagnostic aux clients.
  BC-1960.80.30:
    name: Recommandations de maintenance prédictive
    description: |
      Recommandations de maintenance prédictive pour les équipements installés.

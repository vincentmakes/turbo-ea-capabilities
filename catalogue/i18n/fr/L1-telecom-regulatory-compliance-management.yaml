locale: fr
source: L1-telecom-regulatory-compliance-management.yaml
entries:
  BC-2700:
    name: Gestion de la conformité réglementaire télécoms
    description: |
      Obligations réglementaires propres aux télécommunications — service universel, interception légale, conservation des données, services d'urgence, accessibilité, neutralité du net et déclarations de conformité aux conditions de licence — ancrées sur les régulateurs nationaux et les normes ETSI / 3GPP LI.
  BC-2700.10:
    name: Gestion des obligations de service universel
    description: |
      Exécution et déclaration des obligations de service universel et des subventions associées.
  BC-2700.10.10:
    name: Planification des zones de service universel
    description: |
      Planification de la couverture et des engagements de qualité du service universel par zone géographique.
  BC-2700.10.20:
    name: Déclaration des subventions de service universel
    description: |
      Déclaration du nombre de clients subventionnés et de la prestation de services aux fonds de service universel.
  BC-2700.10.30:
    name: Prestation des services de service universel
    description: |
      Fourniture des services de service universel obligatoires, notamment les tarifs subventionnés et les niveaux de service minimaux.
  BC-2700.20:
    name: Gestion de l'interception légale
    description: |
      Provisionnement et livraison de la capacité d'interception légale dans le cadre de mandats autorisés.
  BC-2700.20.10:
    name: Provisionnement de l'interception légale
    description: |
      Provisionnement des cibles d'interception légale dans les éléments de réseau en vertu de mandats autorisés.
  BC-2700.20.20:
    name: Livraison des interceptions légales
    description: |
      Transmission du contenu intercepté et des métadonnées aux centres de surveillance des services d'application de la loi.
  BC-2700.20.30:
    name: Audit et contrôle d'accès de l'interception légale
    description: |
      Contrôle d'accès et audit des activités d'interception légale pour prévenir toute utilisation non autorisée.
  BC-2700.30:
    name: Gestion de la conservation des données télécoms
    description: |
      Collecte, stockage sécurisé et divulgation autorisée des données de communications conservées conformément aux cadres nationaux de conservation des données.
  BC-2700.30.10:
    name: Collecte des données conservées
    description: |
      Collecte des données de communications soumises aux obligations de conservation.
  BC-2700.30.20:
    name: Flux de demande d'accès aux données conservées
    description: |
      Processus de demande autorisée d'accès aux données conservées par les autorités compétentes.
  BC-2700.30.30:
    name: Purge des données conservées
    description: |
      Suppression des données conservées à l'expiration des délais de conservation applicables.
  BC-2700.40:
    name: Gestion des services d'urgence
    description: |
      Acheminement des appels d'urgence, fourniture de la localisation et capacités d'alerte à la population imposées par les régulateurs.
  BC-2700.40.10:
    name: Acheminement des appels d'urgence
    description: |
      Acheminement des appels d'urgence vers les centres de réponse de sécurité publique appropriés.
  BC-2700.40.20:
    name: Fourniture de la localisation de l'appelant
    description: |
      Transmission de la localisation de l'appelant aux services d'urgence conformément aux normes E911, eCall et AML.
  BC-2700.40.30:
    name: Diffusion des alertes à la population
    description: |
      Diffusion de messages d'alerte à la population par diffusion cellulaire et SMS sur activation autorisée.
  BC-2700.50:
    name: Gestion de l'accessibilité télécoms
    description: |
      Fourniture des fonctionnalités d'accessibilité et traitement des réclamations liées à l'accessibilité dans le cadre des obligations spécifiques aux télécommunications.
  BC-2700.50.10:
    name: Prise en charge du texte en temps réel et TTY
    description: |
      Prise en charge des services de texte en temps réel et TTY pour les utilisateurs sourds et malentendants.
  BC-2700.50.20:
    name: Fourniture des fonctionnalités d'accessibilité
    description: |
      Fourniture des fonctionnalités d'accessibilité spécifiques aux télécommunications, telles que les services de relais et les factures accessibles.
  BC-2700.50.30:
    name: Traitement des réclamations d'accessibilité
    description: |
      Traitement des réclamations liées à l'accessibilité et production des rapports exigés par les régulateurs.
  BC-2700.60:
    name: Neutralité du net et transparence de la gestion du trafic
    description: |
      Publication des pratiques de gestion du trafic et conformité aux régimes de neutralité du net.
  BC-2700.60.10:
    name: Publication des politiques de gestion du trafic
    description: |
      Communication aux clients et aux régulateurs des pratiques de gestion du trafic.
  BC-2700.60.20:
    name: Transparence des pratiques de limitation
    description: |
      Déclaration transparente des pratiques de limitation, de priorisation et d'offres sans décompte de données.
  BC-2700.60.30:
    name: Dépôts réglementaires sur la neutralité du net
    description: |
      Soumissions aux régulateurs portant sur les pratiques et les réclamations en matière de neutralité du net.
  BC-2700.70:
    name: Déclarations réglementaires télécoms
    description: |
      Soumissions périodiques d'indicateurs de performance, de données de marché et de conformité aux conditions de licence auprès des régulateurs télécoms.
  BC-2700.70.10:
    name: Soumissions d'indicateurs de performance télécoms
    description: |
      Transmission des indicateurs obligatoires de couverture, de qualité et de performance de service.
  BC-2700.70.20:
    name: Dépôts de données de marché télécoms
    description: |
      Soumission des déclarations de données de marché portant sur les abonnés, le chiffre d'affaires et le trafic.
  BC-2700.70.30:
    name: Déclarations relatives aux conditions de licence
    description: |
      Déclarations de conformité aux conditions des licences d'exploitation, notamment la couverture, le déploiement et les obligations de qualité.

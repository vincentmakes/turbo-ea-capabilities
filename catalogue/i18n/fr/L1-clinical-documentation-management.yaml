locale: fr
source: L1-clinical-documentation-management.yaml
entries:
  BC-2830:
    name: Gestion de la documentation clinique
    description: |
      Documentation des cliniciens, saisie informatisée des prescriptions, consultation des résultats, aide à la décision clinique, amélioration de la documentation et gestion des flux de travail dans le DPI, constituant le dossier actif des soins au patient.
  BC-2830.10:
    name: Documentation des notes cliniques
    description: |
      Rédaction des notes cliniques pour tous types de consultations à l'aide de modalités narratives, structurées, vocales et de capture ambiante.
  BC-2830.10.10:
    name: Rédaction des notes d'évolution
    description: |
      Rédaction des notes d'évolution en hospitalisation et en ambulatoire.
  BC-2830.10.20:
    name: Rédaction des comptes-rendus opératoires
    description: |
      Rédaction des comptes-rendus opératoires et de procédure.
  BC-2830.10.30:
    name: Rédaction des lettres de sortie
    description: |
      Rédaction des lettres de sortie et des résumés de transfert.
  BC-2830.10.40:
    name: Documentation vocale et ambiante
    description: |
      Flux de travail de documentation par dictée vocale et capture ambiante.
  BC-2830.20:
    name: Saisie informatisée des prescriptions
    description: |
      Saisie des prescriptions médicamenteuses, diagnostiques et procédurales par les soignants, incluant les ensembles d'ordonnances et les protocoles cliniques.
  BC-2830.20.10:
    name: Saisie des prescriptions médicamenteuses
    description: |
      Saisie des ordonnances médicamenteuses par le soignant avec posologie, voie d'administration et fréquence.
  BC-2830.20.20:
    name: Saisie des prescriptions diagnostiques
    description: |
      Saisie par le soignant des ordonnances de biologie, d'imagerie et d'autres examens diagnostiques.
  BC-2830.20.30:
    name: Saisie des prescriptions de procédures
    description: |
      Saisie des ordonnances de procédures et de consultations par le soignant.
  BC-2830.20.40:
    name: Utilisation des ensembles d'ordonnances et protocoles
    description: |
      Utilisation d'ensembles d'ordonnances standardisés, de plans de prise en charge et de protocoles cliniques.
  BC-2830.30:
    name: Consultation et validation des résultats
    description: |
      Acheminement, consultation et validation des résultats diagnostiques et gestion des notifications de valeurs critiques.
  BC-2830.30.10:
    name: Notification et acheminement des résultats
    description: |
      Acheminement des résultats vers les soignants prescripteurs et remplaçants.
  BC-2830.30.20:
    name: Accusé de réception des résultats
    description: |
      Accusé de réception et validation des résultats reçus par le soignant.
  BC-2830.30.30:
    name: Communication des résultats critiques
    description: |
      Communication dans les délais requis des résultats critiques et de valeurs panique.
  BC-2830.30.40:
    name: Examen des tendances des résultats
    description: |
      Consultation des tendances des résultats et des données longitudinales dans le dossier patient.
  BC-2830.40:
    name: Aide à la décision clinique
    description: |
      Aide à la décision clinique en temps réel incluant les alertes, les parcours de soins, la mise en évidence des scores de risque et les recommandations de bonnes pratiques.
  BC-2830.40.10:
    name: Alertes d'interactions médicamenteuses
    description: |
      Alertes sur les interactions médicament-médicament, médicament-allergie et médicament-pathologie.
  BC-2830.40.20:
    name: Aide aux parcours cliniques
    description: |
      Aide à la décision basée sur les parcours et les recommandations au point de soins.
  BC-2830.40.30:
    name: Mise en évidence des scores de risque
    description: |
      Affichage des scores de risque clinique tels que les prédicteurs de dégradation et de sepsis.
  BC-2830.40.40:
    name: Gestion des recommandations de bonnes pratiques
    description: |
      Rédaction, ajustement et gouvernance des recommandations de bonnes pratiques cliniques.
  BC-2830.50:
    name: Amélioration de la documentation clinique
    description: |
      Programmes de revue concurrente et rétrospective, de requêtes et de formation pour améliorer l'exhaustivité et la précision de la documentation.
  BC-2830.50.10:
    name: Revue concurrente de la documentation
    description: |
      Revue concurrente de la documentation hospitalière pour en vérifier l'exactitude et la précision clinique.
  BC-2830.50.20:
    name: Gestion des requêtes aux soignants
    description: |
      Génération et suivi des requêtes de documentation clinique conformes.
  BC-2830.50.30:
    name: Audit de la qualité de la documentation
    description: |
      Audit de la qualité de la documentation clinique et de son impact sur l'indice de case-mix.
  BC-2830.50.40:
    name: Formation des soignants à la documentation
    description: |
      Formation des soignants aux normes de documentation et aux opportunités d'amélioration.
  BC-2830.60:
    name: Gestion des flux de travail dans le DPI
    description: |
      Flux de travail du dossier patient informatisé destinés aux cliniciens, incluant la messagerie, les tâches, la clôture des consultations et la gestion des transmissions.
  BC-2830.60.10:
    name: Gestion de la messagerie et des tâches
    description: |
      Gestion des messages entrants, des tâches et des listes à faire des cliniciens.
  BC-2830.60.20:
    name: Clôture des consultations
    description: |
      Clôture des consultations incluant la codification, la facturation et la complétion de la documentation.
  BC-2830.60.30:
    name: Documentation en couverture croisée
    description: |
      Flux de travail de documentation en garde et en couverture croisée.
  BC-2830.60.40:
    name: Gestion des listes patients et des transmissions
    description: |
      Gestion des listes de patients et de la documentation structurée des transmissions entre équipes.

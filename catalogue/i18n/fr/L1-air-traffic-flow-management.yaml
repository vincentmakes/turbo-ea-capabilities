locale: fr
source: L1-air-traffic-flow-management.yaml
entries:
  BC-1220:
    name: Gestion des flux de circulation aérienne
    description: |
      Planification de la capacité, régulation des flux, allocation des créneaux et équilibrage offre-demande.
  BC-1220.10:
    name: Gestion de la planification de la capacité
    description: |
      Évaluation de la capacité des secteurs et des aérodromes, et fixation de la capacité déclarée.
  BC-1220.10.10:
    name: Évaluation de la capacité des secteurs
    description: |
      Évaluation de la capacité des secteurs par mesure de la charge de travail.
  BC-1220.10.20:
    name: Déclaration de la capacité des aérodromes
    description: |
      Déclaration de la capacité des pistes et des aires de trafic des aérodromes.
  BC-1220.10.30:
    name: Planification stratégique de la capacité
    description: |
      Planification stratégique pluriannuelle de la capacité ATC.
  BC-1220.20:
    name: Gestion de la régulation des flux
    description: |
      Mesures de régulation du trafic, régulations et déviations de routes.
  BC-1220.20.10:
    name: Définition des mesures de flux
    description: |
      Définition des mesures ATFCM par secteur et aérodrome.
  BC-1220.20.20:
    name: Gestion des propositions de déviations de routes
    description: |
      Proposition et mise en œuvre des déviations de routes et des scénarios alternatifs.
  BC-1220.20.30:
    name: Ajustement tactique des flux
    description: |
      Ajustement tactique en temps réel des mesures de flux.
  BC-1220.30:
    name: Gestion de l'allocation des créneaux
    description: |
      Heures de décollage calculées (CTOT), gestion et échange des créneaux.
  BC-1220.30.10:
    name: Émission des heures de décollage calculées
    description: |
      Calcul et émission des CTOT aux usagers de l'espace aérien.
  BC-1220.30.20:
    name: Échange et amélioration des créneaux
    description: |
      Échange de créneaux, amélioration des créneaux et mise à jour des heures cibles.
  BC-1220.30.30:
    name: Conformité aux créneaux de départ
    description: |
      Surveillance du respect des créneaux et gestion des exemptions.
  BC-1220.40:
    name: Gestion de la performance du réseau
    description: |
      Surveillance de la performance du réseau et reporting des KPI.
  BC-1220.40.10:
    name: Surveillance des KPI du réseau
    description: |
      Surveillance des KPI du réseau (retards, capacité, prévisibilité).
  BC-1220.40.20:
    name: Reporting de la performance
    description: |
      Reporting de la performance aux régulateurs du réseau et de l'espace aérien unique européen.
  BC-1220.40.30:
    name: Analyse post-opérationnelle
    description: |
      Analyse post-opérationnelle des flux et des goulots d'étranglement.
  BC-1220.50:
    name: Gestion de l'équilibrage offre-demande
    description: |
      Équilibrage offre-demande pré-tactique et tactique.
  BC-1220.50.10:
    name: Équilibrage offre-demande stratégique
    description: |
      Équilibrage offre-demande à long terme à l'échelle du réseau.
  BC-1220.50.20:
    name: Équilibrage offre-demande pré-tactique
    description: |
      Équilibrage offre-demande pré-tactique (J-1).
  BC-1220.50.30:
    name: Équilibrage offre-demande tactique
    description: |
      Équilibrage offre-demande tactique en temps réel.
  BC-1220.50.40:
    name: Prise de décision collaborative
    description: |
      Prise de décision collaborative avec les usagers de l'espace aérien et les aéroports.

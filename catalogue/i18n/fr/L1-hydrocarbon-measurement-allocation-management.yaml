locale: fr
source: L1-hydrocarbon-measurement-allocation-management.yaml
entries:
  BC-3040:
    name: Gestion de la mesure et de l'allocation des hydrocarbures
    description: |
      Mesure à qualité fiscale et allocation des hydrocarbures produits — métrologie de transfert de garde, allocation entre réservoirs et copropriétaires, comptabilisation de la production, états opératoires de location et investigation des pertes et écarts.
  BC-3040.10:
    name: Métrologie fiscale et de transfert de garde
    description: |
      Exploitation, étalonnage et assurance des compteurs à qualité fiscale aux points de transfert de garde.
  BC-3040.10.10:
    name: Exploitation des compteurs fiscaux
    description: |
      Exploitation quotidienne des compteurs fiscaux liquides et gazeux.
  BC-3040.10.20:
    name: Étalonnage et vérification des compteurs
    description: |
      Vérification et étalonnage périodiques des installations de métrologie fiscale.
  BC-3040.10.30:
    name: Documentation du transfert de garde
    description: |
      Émission et échange des bons et certificats de transfert de garde.
  BC-3040.10.40:
    name: Investigation des erreurs de mesure
    description: |
      Investigation et remédiation des événements présumés d'erreur de mesure.
  BC-3040.20:
    name: Allocation de la production
    description: |
      Allocation des volumes mesurés aux puits, réservoirs et copropriétaires.
  BC-3040.20.10:
    name: Allocation par puits
    description: |
      Allocation de la production des installations aux puits contributeurs.
  BC-3040.20.20:
    name: Allocation par réservoir
    description: |
      Allocation entre réservoirs commingués et gisements.
  BC-3040.20.30:
    name: Allocation entre copropriétaires
    description: |
      Allocation des volumes de production entre les détenteurs de quotes-parts.
  BC-3040.20.40:
    name: Réconciliation des allocations
    description: |
      Réconciliation des résultats d'allocation entre données de métrologie, tests de puits et comptabilité.
  BC-3040.30:
    name: Comptabilisation de la production
    description: |
      Déclaration quotidienne de la production, bilan matière et clôture mensuelle de la comptabilisation de la production.
  BC-3040.30.10:
    name: Déclaration quotidienne de la production
    description: |
      Déclaration quotidienne des volumes de production aux parties prenantes internes et externes.
  BC-3040.30.20:
    name: Bilan matière des hydrocarbures
    description: |
      Bilan matière des hydrocarbures de bout en bout sur l'ensemble des systèmes producteurs.
  BC-3040.30.30:
    name: Clôture de la comptabilisation de la production
    description: |
      Clôture mensuelle des livres de comptabilisation de la production et alimentation des systèmes financiers.
  BC-3040.40:
    name: Gestion des états opératoires de location
    description: |
      Préparation des états opératoires de location, calcul des volumes de redevances et déclaration des taxes de production et de prélèvement.
  BC-3040.40.10:
    name: Préparation des états opératoires de location
    description: |
      Préparation des rapports d'état opératoire de location pour les détenteurs de quotes-parts.
  BC-3040.40.20:
    name: Calcul des volumes de redevances
    description: |
      Calcul des volumes et de la valeur revenant aux bénéficiaires de redevances au niveau de la location.
  BC-3040.40.30:
    name: Déclaration des taxes de production et de prélèvement
    description: |
      Déclaration des taxes de production et de prélèvement aux autorités fiscales.
  BC-3040.50:
    name: Analyse des pertes et des écarts
    description: |
      Investigation des écarts de mesure, des événements de perte et des déséquilibres d'inventaire d'hydrocarbures.
  BC-3040.50.10:
    name: Analyse des écarts de mesure
    description: |
      Analyse des écarts de mesure par rapport aux seuils de tolérance.
  BC-3040.50.20:
    name: Investigation des pertes
    description: |
      Investigation des pertes non comptabilisées entre les points de mesure.
  BC-3040.50.30:
    name: Réconciliation de l'inventaire d'hydrocarbures
    description: |
      Réconciliation de l'inventaire physique d'hydrocarbures avec les données comptables.

locale: fr
source: L1-capital-markets-operations-management.yaml
entries:
  BC-1380:
    name: Gestion des opérations sur les marchés des capitaux
    description: |
      Confirmation des transactions, compensation, règlement-livraison, conservation, gestion du collatéral, opérations sur titres et réconciliation.
  BC-1380.10:
    name: Gestion de la confirmation des transactions
    description: |
      Saisie, enregistrement, confirmation et réclamation des transactions.
  BC-1380.10.10:
    name: Saisie et enregistrement des transactions
    description: |
      Saisie et enregistrement des transactions dans les systèmes front et middle office.
  BC-1380.10.20:
    name: Rapprochement des confirmations de transaction
    description: |
      Rapprochement et affirmation des confirmations de transaction.
  BC-1380.10.30:
    name: Traitement des réclamations de transaction
    description: |
      Traitement des réclamations et des transactions non rapprochées.
  BC-1380.20:
    name: Gestion de la compensation
    description: |
      Compensation centrale, contreparties centrales (CCP) et adhésion à la chambre de compensation.
  BC-1380.20.10:
    name: Soumission des transactions compensées aux CCP
    description: |
      Soumission des transactions compensées aux contreparties centrales.
  BC-1380.20.20:
    name: Gestion des marges de compensation
    description: |
      Gestion des appels de marge initiale et de variation avec les CCP.
  BC-1380.20.30:
    name: Opérations des membres compensateurs
    description: |
      Exploitation des services de membre compensateur direct et pour compte de tiers.
  BC-1380.30:
    name: Gestion du règlement-livraison
    description: |
      Règlement DvP, cycles T+1/T+2 et gestion des défauts de règlement.
  BC-1380.30.10:
    name: Génération des instructions de règlement
    description: |
      Génération des instructions de règlement pour les transactions.
  BC-1380.30.20:
    name: Opérations de règlement des titres
    description: |
      Opérations de règlement DvP auprès des dépositaires centraux et internationaux.
  BC-1380.30.30:
    name: Gestion des défauts de règlement
    description: |
      Identification et résolution des défauts de règlement (CSDR).
  BC-1380.40:
    name: Gestion de la conservation
    description: |
      Conservation des titres et réseaux de sous-dépositaires.
  BC-1380.40.10:
    name: Conservation des titres
    description: |
      Conservation des titres pour les comptes clients et propriétaires.
  BC-1380.40.20:
    name: Gestion du réseau de sous-dépositaires
    description: |
      Gestion du réseau de sous-dépositaires et des banques agents.
  BC-1380.40.30:
    name: Services fiscaux liés à la conservation
    description: |
      Récupération de retenue à la source et autres services fiscaux liés à la conservation.
  BC-1380.50:
    name: Gestion du collatéral
    description: |
      Collatéral, appels de marge et optimisation.
  BC-1380.50.10:
    name: Gestion des appels de marge
    description: |
      Émission et réponse aux appels de marge dans le cadre des régimes bilatéraux et CCP.
  BC-1380.50.20:
    name: Opérations de mouvement de collatéral
    description: |
      Mouvements opérationnels de collatéral entre contreparties.
  BC-1380.50.30:
    name: Optimisation du collatéral
    description: |
      Optimisation de l'utilisation et de la substitution du collatéral.
  BC-1380.50.40:
    name: Gestion de l'éligibilité du collatéral
    description: |
      Règles d'éligibilité du collatéral et application des décotes (haircuts).
  BC-1380.60:
    name: Gestion des opérations sur titres
    description: |
      Traitement des opérations sur titres obligatoires et facultatives.
  BC-1380.60.10:
    name: Notification des opérations sur titres
    description: |
      Collecte et notification des opérations sur titres aux clients.
  BC-1380.60.20:
    name: Traitement des opérations sur titres obligatoires
    description: |
      Traitement des dividendes, coupons et opérations obligatoires.
  BC-1380.60.30:
    name: Traitement des opérations sur titres facultatives
    description: |
      Traitement des opérations facultatives incluant les choix d'option.
  BC-1380.60.40:
    name: Opérations de vote par procuration
    description: |
      Collecte et transmission des votes par procuration.
  BC-1380.70:
    name: Gestion de la réconciliation
    description: |
      Réconciliation nostro/vostro, de positions et de trésorerie.
  BC-1380.70.10:
    name: Réconciliation de trésorerie
    description: |
      Réconciliation des comptes de trésorerie incluant les comptes nostro/vostro.
  BC-1380.70.20:
    name: Réconciliation des positions en titres
    description: |
      Réconciliation des positions en titres entre les systèmes et les dépositaires.
  BC-1380.70.30:
    name: Réconciliation des transactions front-back
    description: |
      Réconciliation front-to-back des transactions entre les systèmes.
  BC-1380.70.40:
    name: Investigation des écarts de réconciliation
    description: |
      Investigation et résolution des écarts de réconciliation.
  BC-1380.80:
    name: Gestion du prêt de titres
    description: |
      Prêt, emprunt de titres et gestion du collatéral.
  BC-1380.80.10:
    name: Origination des opérations de prêt de titres
    description: |
      Origination des opérations de prêt et d'emprunt de titres.
  BC-1380.80.20:
    name: Opérations de collatéral pour le prêt de titres
    description: |
      Opérations de collatéral liées au prêt de titres.
  BC-1380.80.30:
    name: Calcul des commissions et remises sur prêt de titres
    description: |
      Calcul et règlement des commissions et remises.
  BC-1380.80.40:
    name: Gestion des rappels de titres prêtés
    description: |
      Rappel des titres prêtés et opérations de substitution.

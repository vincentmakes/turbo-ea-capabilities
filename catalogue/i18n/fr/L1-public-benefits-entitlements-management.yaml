locale: fr
source: L1-public-benefits-entitlements-management.yaml
entries:
  BC-3230:
    name: Gestion des prestations sociales et des droits
    description: |
      Conception, détermination de l'éligibilité, calcul, versement, suivi et recouvrement
      des prestations de protection sociale et des droits statutaires incluant les pensions,
      le chômage, le handicap, la famille et l'aide alimentaire.
  BC-3230.10:
    name: Conception et configuration des programmes de prestations
    description: |
      Configuration des programmes de prestations statutaires incluant les règles d'éligibilité,
      les formules de calcul et les paramètres opérationnels.
    in_scope:
      - Configuration des règles d'éligibilité
      - Paramétrage des formules et taux de calcul des prestations
      - Gestion des paramètres et de l'indexation des programmes
    out_of_scope:
      - Rédaction de la législation habilitante (couverte par la gestion de la rédaction législative et réglementaire)
  BC-3230.10.10:
    name: Configuration des règles d'éligibilité
    description: |
      Codification des règles d'éligibilité statutaires sous forme exécutable par machine.
  BC-3230.10.20:
    name: Configuration des formules et taux de calcul des prestations
    description: |
      Configuration des formules de calcul des prestations, des taux et des plafonds.
  BC-3230.10.30:
    name: Indexation des paramètres du programme
    description: |
      Indexation et ajustement périodiques des paramètres du programme à l'inflation ou à l'évolution des salaires.
  BC-3230.20:
    name: Détermination de l'éligibilité
    description: |
      Détermination de l'éligibilité des demandeurs aux prestations incluant les tests de ressources,
      l'éligibilité catégorielle et la composition du ménage.
  BC-3230.20.10:
    name: Réception des demandes
    description: |
      Réception des demandes de prestations sur tous les canaux incluant le numérique, le présentiel et l'assisté.
  BC-3230.20.20:
    name: Test de ressources
    description: |
      Évaluation des revenus, des actifs et de la situation du ménage par rapport aux seuils du programme.
  BC-3230.20.30:
    name: Vérification de l'éligibilité catégorielle
    description: |
      Vérification de l'éligibilité catégorielle telle que l'âge, le handicap ou la situation familiale.
  BC-3230.20.40:
    name: Décision d'éligibilité et notification
    description: |
      Enregistrement de la décision et notification aux demandeurs des résultats d'éligibilité.
  BC-3230.30:
    name: Calcul et attribution des prestations
    description: |
      Calcul des montants attribués, évaluation du dossier de cotisations et émission des attributions.
  BC-3230.30.10:
    name: Évaluation du dossier de cotisations
    description: |
      Évaluation des dossiers de cotisations pour les prestations contributives telles que les pensions et le chômage.
  BC-3230.30.20:
    name: Calcul de l'attribution
    description: |
      Calcul des montants d'attribution incluant les suppléments, les déductions et les écrêtements.
  BC-3230.30.30:
    name: Émission de l'attribution
    description: |
      Émission et enregistrement des attributions de prestations et des lettres d'attribution.
  BC-3230.40:
    name: Opérations de versement des prestations
    description: |
      Versement périodique des prestations sur l'ensemble des canaux de paiement
      et réconciliation par rapport aux attributions.
  BC-3230.40.10:
    name: Gestion du calendrier des paiements
    description: |
      Maintenance des calendriers de paiement, des fréquences et des plannings de traitement.
  BC-3230.40.20:
    name: Exécution des paiements
    description: |
      Exécution des traitements de paiement par virement bancaire, carte prépayée, chèque et en nature.
  BC-3230.40.30:
    name: Réconciliation des paiements
    description: |
      Réconciliation des versements par rapport aux attributions et aux confirmations bancaires.
  BC-3230.40.40:
    name: Distribution des prestations en nature
    description: |
      Distribution des prestations en nature telles que les bons d'aide alimentaire et le virement électronique de prestations.
  BC-3230.50:
    name: Suivi des bénéficiaires et éligibilité continue
    description: |
      Suivi continu de la situation des bénéficiaires et redétermination périodique
      de l'éligibilité continue.
  BC-3230.50.10:
    name: Capture des changements de situation
    description: |
      Capture et traitement des changements de situation déclarés par les bénéficiaires ou détectés.
  BC-3230.50.20:
    name: Redétermination périodique
    description: |
      Redétermination périodique de l'éligibilité et du niveau d'attribution.
  BC-3230.50.30:
    name: Surveillance du conditionnement et de la conformité
    description: |
      Surveillance du respect par les bénéficiaires des conditions telles que la recherche d'emploi ou les exigences de formation.
  BC-3230.60:
    name: Gestion des trop-perçus et du recouvrement
    description: |
      Détection, calcul et recouvrement des trop-perçus de prestations et des paiements indus.
  BC-3230.60.10:
    name: Détection des trop-perçus
    description: |
      Détection des trop-perçus par réconciliation, croisement de données et révisions.
  BC-3230.60.20:
    name: Mise en place du plan de recouvrement
    description: |
      Mise en place des plans de recouvrement incluant les versements échelonnés, les déductions et les abandances de créances.
  BC-3230.60.30:
    name: Opérations de recouvrement de créances
    description: |
      Recouvrement des créances recouvrables par déductions, action civile et compensation.
  BC-3230.70:
    name: Investigation des fraudes aux prestations
    description: |
      Détection, investigation et traitement des cas de fraude aux prestations.
  BC-3230.70.10:
    name: Détection du risque de fraude
    description: |
      Détection fondée sur le risque de fraudes présumées par l'analyse et le renseignement.
  BC-3230.70.20:
    name: Investigation des cas de fraude
    description: |
      Investigation des cas de fraude présumée incluant la collecte de preuves et les entretiens.
  BC-3230.70.30:
    name: Sanction pour fraude et renvoi en justice
    description: |
      Sanction des fraudes avérées et renvoi pour poursuites judiciaires le cas échéant.

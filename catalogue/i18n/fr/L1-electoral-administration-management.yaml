locale: fr
source: L1-electoral-administration-management.yaml
entries:
  BC-3330:
    name: Gestion de l'administration électorale
    description: |
      Administration des élections incluant l'inscription des électeurs, la gestion des
      circonscriptions électorales, l'enregistrement des candidats et des partis, la conception
      et la production des bulletins de vote, les opérations de scrutin, le dépouillement
      et la tabulation des résultats, et la divulgation du financement des campagnes.
  BC-3330.10:
    name: Gestion de l'inscription des électeurs
    description: |
      Maintenance des listes électorales faisant autorité incluant l'inscription,
      les changements d'adresse et les activités de maintenance des listes.
    in_scope:
      - Inscription et réinscription des électeurs
      - Maintenance des listes électorales
      - Vérification de l'éligibilité
    out_of_scope:
      - Enregistrement de l'identité civile (couvert par la gestion de l'état civil et de l'enregistrement de l'identité)
  BC-3330.10.10:
    name: Inscription des électeurs
    description: |
      Inscription des électeurs éligibles sur la liste électorale par tous les canaux.
  BC-3330.10.20:
    name: Maintenance des listes électorales
    description: |
      Maintenance des listes incluant les mises à jour d'adresse, la suppression des décédés et la gestion des doublons.
  BC-3330.10.30:
    name: Vérification de l'éligibilité des électeurs
    description: |
      Vérification de l'éligibilité des électeurs selon les critères de citoyenneté, d'âge et de résidence.
  BC-3330.10.40:
    name: Fourniture d'information aux électeurs
    description: |
      Fourniture des cartes d'électeur, des recherches de bureau de vote et des informations d'éducation civique.
  BC-3330.20:
    name: Gestion des circonscriptions et des districts électoraux
    description: |
      Maintenance des circonscriptions électorales, des géographies des bureaux de vote
      et des cycles de redécoupage.
  BC-3330.20.10:
    name: Maintenance des circonscriptions électorales
    description: |
      Maintenance des limites des circonscriptions et des districts électoraux.
  BC-3330.20.20:
    name: Désignation des bureaux de vote
    description: |
      Désignation, évaluation de l'accessibilité et publication des bureaux de vote.
  BC-3330.20.30:
    name: Coordination du redécoupage électoral
    description: |
      Coordination des cycles de redécoupage statutaire et des commissions de délimitation.
  BC-3330.30:
    name: Enregistrement des candidats et des partis
    description: |
      Enregistrement des partis politiques, des candidats, des dépôts de candidature
      et de l'accès au scrutin.
  BC-3330.30.10:
    name: Enregistrement des partis politiques
    description: |
      Enregistrement et reconnaissance des partis politiques et de leurs identifiants.
  BC-3330.30.20:
    name: Dépôt des candidatures
    description: |
      Réception et vérification des candidatures et des déclarations statutaires.
  BC-3330.30.30:
    name: Détermination de l'accès au scrutin
    description: |
      Détermination de l'accès au scrutin incluant les exigences de signatures et les seuils de qualification.
  BC-3330.40:
    name: Conception et production des bulletins de vote
    description: |
      Conception, mise en page, accessibilité, traduction et production des bulletins de vote
      au format papier et électronique.
  BC-3330.40.10:
    name: Conception de la mise en page du bulletin de vote
    description: |
      Conception et mise en page des bulletins de vote pour la clarté, l'accessibilité et la couverture linguistique.
  BC-3330.40.20:
    name: Traduction et accessibilité du bulletin de vote
    description: |
      Fourniture des bulletins de vote traduits et des formats accessibles pour les électeurs handicapés.
  BC-3330.40.30:
    name: Production et distribution des bulletins de vote
    description: |
      Impression, programmation et distribution sécurisée des bulletins de vote papier et électroniques.
  BC-3330.50:
    name: Opérations de scrutin
    description: |
      Exploitation des bureaux de vote le jour du scrutin incluant la gestion des assesseurs,
      la vérification des électeurs et le vote sous les contrôles alignés sur les VVSG.
  BC-3330.50.10:
    name: Gestion des assesseurs électoraux
    description: |
      Recrutement, formation et déploiement des assesseurs et des responsables électoraux.
  BC-3330.50.20:
    name: Vérification des électeurs à l'entrée
    description: |
      Vérification des électeurs, contrôle d'identité et remise du bulletin de vote au bureau de vote.
  BC-3330.50.30:
    name: Vote en présentiel
    description: |
      Vote en présentiel sur papier ou sur équipement de vote certifié VVSG.
  BC-3330.50.40:
    name: Opérations du vote par correspondance et par procuration
    description: |
      Opérations de soutien au vote par correspondance, par voie postale et des Français de l'étranger.
  BC-3330.60:
    name: Dépouillement et tabulation des résultats
    description: |
      Dépouillement des bulletins, tabulation des résultats, audits et certification des résultats électoraux.
  BC-3330.60.10:
    name: Dépouillement des bulletins de vote
    description: |
      Dépouillement des bulletins papier et électroniques conformément à la procédure statutaire.
  BC-3330.60.20:
    name: Tabulation et publication des résultats
    description: |
      Agrégation des résultats par bureau de vote et publication au public.
  BC-3330.60.30:
    name: Audit post-électoral
    description: |
      Audits à limitation de risque et post-électoraux des résultats du scrutin et des équipements.
  BC-3330.60.40:
    name: Certification de l'élection
    description: |
      Certification statutaire des résultats électoraux et déclaration des élus.
  BC-3330.70:
    name: Divulgation du financement des campagnes
    description: |
      Enregistrement des comités politiques, divulgation des dons et des dépenses,
      et application des plafonds de financement des campagnes.
  BC-3330.70.10:
    name: Enregistrement des comités politiques
    description: |
      Enregistrement des comités politiques, des partis et des entités équivalentes aux PAC.
  BC-3330.70.20:
    name: Déclaration des dons et des dépenses
    description: |
      Réception, validation et publication des déclarations de dons et de dépenses.
  BC-3330.70.30:
    name: Application des règles de financement des campagnes
    description: |
      Investigation et application des infractions aux plafonds et aux obligations de divulgation
      du financement des campagnes.

locale: fr
source: L1-healthcare-revenue-cycle-management.yaml
entries:
  BC-2870:
    name: Gestion du cycle des revenus de santé
    description: |
      Saisie des actes et gestion du tarificateur, codification médicale, production et soumission des factures, gestion des refus et des appels, enregistrement des encaissements, services financiers aux patients et gestion des contrats avec les payeurs pour les organisations prestataires.
  BC-2870.10:
    name: Saisie des actes et gestion du tarificateur
    description: |
      Saisie des actes cliniques et administration du tarificateur dans l'ensemble des lignes de service.
  BC-2870.10.10:
    name: Saisie des actes
    description: |
      Saisie des actes à partir de la documentation clinique et des systèmes auxiliaires.
  BC-2870.10.20:
    name: Maintenance du tarificateur
    description: |
      Maintenance des éléments, codes et tarifs du tarificateur.
  BC-2870.10.30:
    name: Réconciliation des actes
    description: |
      Réconciliation des actes attendus et saisis par zone de service.
  BC-2870.10.40:
    name: Audit des actes
    description: |
      Audit interne et externe de l'exactitude et de l'exhaustivité des actes.
  BC-2870.20:
    name: Gestion de la codification médicale
    description: |
      Production de la codification en hospitalisation, en ambulatoire et en honoraires, et audit de la conformité.
  BC-2870.20.10:
    name: Codification en hospitalisation
    description: |
      Codification des séjours hospitaliers selon la méthodologie des groupes homogènes de malades.
  BC-2870.20.20:
    name: Codification en ambulatoire
    description: |
      Codification des consultations ambulatoires selon la méthodologie des classifications des actes ambulatoires.
  BC-2870.20.30:
    name: Codification des honoraires
    description: |
      Codification des actes en honoraires à l'aide des codes de procédure et de consultation.
  BC-2870.20.40:
    name: Audit et conformité de la codification
    description: |
      Programmes d'audit, de conformité et de formation en matière de codification.
  BC-2870.30:
    name: Production et soumission des factures
    description: |
      Production, contrôle, soumission et suivi du statut des factures auprès des payeurs.
  BC-2870.30.10:
    name: Contrôle et vérification des factures
    description: |
      Application des contrôles pré-soumission et des règles de vérification des factures.
  BC-2870.30.20:
    name: Soumission des factures
    description: |
      Soumission électronique des factures aux payeurs et aux organismes de compensation.
  BC-2870.30.30:
    name: Suivi du statut des factures
    description: |
      Suivi du statut des factures et relances par voie électronique et manuelle.
  BC-2870.30.40:
    name: Séquencement de la coordination des prestations
    description: |
      Séquencement des factures primaires, secondaires et tertiaires entre les payeurs.
  BC-2870.40:
    name: Gestion des refus et des appels
    description: |
      Triage, appel et prévention des refus et paiements insuffisants des payeurs.
  BC-2870.40.10:
    name: Triage des refus
    description: |
      Triage et acheminement des factures refusées selon le motif et la probabilité de récupération.
  BC-2870.40.20:
    name: Rédaction et soumission des appels
    description: |
      Rédaction et soumission des appels cliniques et techniques.
  BC-2870.40.30:
    name: Analyse des paiements insuffisants
    description: |
      Identification et récupération des paiements insuffisants des payeurs par rapport aux tarifs contractuels.
  BC-2870.40.40:
    name: Analyse de la prévention des refus
    description: |
      Analyse des causes profondes pour prévenir les refus récurrents.
  BC-2870.50:
    name: Enregistrement des encaissements et réconciliation avec les payeurs
    description: |
      Enregistrement des remboursements des payeurs et des paiements des patients et réconciliation par rapport au remboursement attendu.
  BC-2870.50.10:
    name: Enregistrement des remboursements
    description: |
      Enregistrement et réconciliation des avis de remboursement électroniques.
  BC-2870.50.20:
    name: Enregistrement des paiements des patients
    description: |
      Enregistrement des paiements des patients sur l'ensemble des canaux.
  BC-2870.50.30:
    name: Application des ajustements contractuels
    description: |
      Application des ajustements contractuels basés sur les accords avec les payeurs.
  BC-2870.50.40:
    name: Résolution des encaissements non imputés
    description: |
      Résolution et imputation des encaissements non identifiés et non imputés.
  BC-2870.60:
    name: Services financiers aux patients
    description: |
      Facturation, recouvrement, plans de paiement et placement en créances irrécouvrables pour les patients.
  BC-2870.60.10:
    name: Génération des relevés de compte patients
    description: |
      Génération des relevés de compte patients sur les canaux papier et numérique.
  BC-2870.60.20:
    name: Recouvrement auprès des patients
    description: |
      Opérations de recouvrement et de relance auprès des patients en paiement direct.
  BC-2870.60.30:
    name: Gestion des plans de paiement
    description: |
      Mise en place et gestion des plans de paiement échelonné pour les patients.
  BC-2870.60.40:
    name: Placement en créances irrécouvrables
    description: |
      Placement et gestion des créances auprès d'agences de recouvrement externe.
  BC-2870.70:
    name: Gestion des contrats avec les payeurs
    description: |
      Modélisation, soutien à la négociation, analyse des écarts et suivi des performances des contrats avec les payeurs.
  BC-2870.70.10:
    name: Modélisation des contrats
    description: |
      Modélisation des termes et des méthodologies de remboursement des contrats avec les payeurs.
  BC-2870.70.20:
    name: Analyse des écarts de remboursement
    description: |
      Analyse des écarts entre le remboursement contractuel et le remboursement effectif.
  BC-2870.70.30:
    name: Soutien à la négociation des contrats
    description: |
      Soutien analytique et opérationnel aux négociations des contrats avec les payeurs.
  BC-2870.70.40:
    name: Suivi des performances des payeurs
    description: |
      Surveillance continue des performances des payeurs par rapport aux SLA contractuels.

locale: fr
source: L1-chemical-process-engineering-management.yaml
entries:
  BC-4610:
    name: Gestion de l'ingénierie des procédés chimiques
    description: |
      Conception des procédés, ingénierie des bilans matière et énergie,
      simulation, spécification des équipements et ingénierie préliminaire pour
      les nouvelles usines chimiques et les révisions d'installations existantes.
  BC-4610.10:
    name: Conception du schéma de procédé
    description: |
      Développement des schémas fonctionnels de blocs, des diagrammes de flux
      de procédé et des schémas de tuyauterie et d'instrumentation pour les
      procédés chimiques.
  BC-4610.10.10:
    name: Développement du diagramme de blocs fonctionnels
    description: |
      Élaboration des diagrammes de blocs fonctionnels pour la définition
      préliminaire du procédé.
  BC-4610.10.20:
    name: Développement du diagramme de flux de procédé
    description: |
      Élaboration des diagrammes de flux de procédé avec les conditions et
      propriétés des flux.
  BC-4610.10.30:
    name: Développement des schémas de tuyauterie et d'instrumentation
    description: |
      Élaboration et révision des P&ID pour les unités de procédé chimique.
  BC-4610.10.40:
    name: Développement des diagrammes de flux utilitaires
    description: |
      Élaboration des diagrammes de flux utilitaires couvrant la vapeur, l'eau
      de refroidissement et le gaz inerte.
  BC-4610.20:
    name: Dimensionnement des réacteurs et des équipements de séparation
    description: |
      Dimensionnement des réacteurs et des équipements de séparation basé sur
      la cinétique, la thermodynamique et les principes des opérations unitaires.
  BC-4610.20.10:
    name: Conception des réacteurs
    description: |
      Dimensionnement et configuration des réacteurs CSTR, PFR et à lit fixe.
  BC-4610.20.20:
    name: Conception des colonnes de distillation
    description: |
      Conception des colonnes de distillation à plateaux et à garnissage,
      incluant les internes.
  BC-4610.20.30:
    name: Conception du réseau d'échangeurs de chaleur
    description: |
      Conception par pincement et réseau d'échangeurs pour l'intégration
      énergétique.
  BC-4610.20.40:
    name: Dimensionnement des cristalliseurs et filtres
    description: |
      Dimensionnement des cristalliseurs, centrifugeuses et équipements de
      filtration.
  BC-4610.30:
    name: Ingénierie des bilans matière et énergie
    description: |
      Clôture des bilans matière et énergie globaux et unitaires, et estimation
      des besoins en utilités.
  BC-4610.30.10:
    name: Calcul du bilan matière
    description: |
      Calcul et réconciliation des bilans matière d'usine et d'unité.
  BC-4610.30.20:
    name: Calcul du bilan énergétique
    description: |
      Calcul des bilans énergétiques sur les réacteurs, échangeurs et utilités.
  BC-4610.30.30:
    name: Estimation de la demande en utilités
    description: |
      Estimation de la demande en vapeur, électricité, eau de refroidissement
      et gaz inerte.
  BC-4610.40:
    name: Gestion de la simulation de procédé
    description: |
      Construction et maintenance des simulations de procédé en régime permanent
      et dynamique pour la conception et les opérations.
  BC-4610.40.10:
    name: Simulation de procédé en régime permanent
    description: |
      Construction et exécution de simulateurs en régime permanent pour la
      conception et l'analyse.
  BC-4610.40.20:
    name: Simulation dynamique de procédé
    description: |
      Construction et exécution de simulateurs dynamiques pour les études de
      contrôle et de sécurité.
  BC-4610.40.30:
    name: Validation des modèles de simulation
    description: |
      Validation des modèles de simulation par rapport aux données d'usine ou
      pilotes.
  BC-4610.50:
    name: Gestion des spécifications des équipements
    description: |
      Élaboration et gestion du cycle de vie des fiches techniques des
      équipements et des plans fournisseurs.
  BC-4610.50.10:
    name: Élaboration des fiches techniques des équipements
    description: |
      Élaboration des fiches techniques mécaniques, électriques et
      d'instrumentation.
  BC-4610.50.20:
    name: Maintenance des spécifications des équipements
    description: |
      Gestion de la configuration des spécifications d'équipements approuvées.
  BC-4610.50.30:
    name: Revue des plans fournisseurs
    description: |
      Revue des plans fournisseurs par rapport aux fiches techniques et aux
      exigences de procédé.
  BC-4610.60:
    name: Ingénierie d'implantation et de plan de masse
    description: |
      Définition des plans de masse, des distances de séparation entre
      équipements et du classement des zones dangereuses pour les installations
      chimiques.
  BC-4610.60.10:
    name: Développement du plan de masse
    description: |
      Développement des plans de masse d'unité et de site global.
  BC-4610.60.20:
    name: Détermination des distances de séparation
    description: |
      Détermination des distances de séparation entre équipements en regard de
      la sécurité des procédés et de la constructibilité.
  BC-4610.60.30:
    name: Classification des zones dangereuses
    description: |
      Classification des zones dangereuses pour le contrôle des sources
      d'ignition.
  BC-4610.70:
    name: Développement de la philosophie de contrôle des procédés
    description: |
      Définition des stratégies de contrôle des procédés, du contrôle avancé et
      de la base des procédures d'exploitation pour les installations nouvelles
      et modifiées.
  BC-4610.70.10:
    name: Définition des boucles de régulation
    description: |
      Définition des boucles de régulation et de l'intention de réglage.
  BC-4610.70.20:
    name: Stratégie de contrôle avancé des procédés
    description: |
      Définition des stratégies de commande prédictive et de contrôle avancé.
  BC-4610.70.30:
    name: Développement de la base des procédures d'exploitation
    description: |
      Développement de la base des procédures d'exploitation pour les
      installations nouvelles et modifiées.
  BC-4610.80:
    name: Coordination de l'ingénierie préliminaire
    description: |
      Coordination des études de conception conceptuelle, de base et d'ingénierie
      préliminaire pour les projets chimiques.
  BC-4610.80.10:
    name: Coordination de l'ingénierie conceptuelle
    description: |
      Coordination des études d'ingénierie conceptuelle et de criblage des options.
  BC-4610.80.20:
    name: Production du dossier d'ingénierie de base
    description: |
      Production des dossiers d'ingénierie de base transmis à la conception
      détaillée.
  BC-4610.80.30:
    name: Vérification de l'ingénierie préliminaire
    description: |
      Vérification des livrables d'ingénierie préliminaire par rapport aux
      exigences de procédé et de projet.

locale: fr
source: L1-health-safety-environment-management.yaml
entries:
  BC-730:
    name: Gestion de la santé, de la sécurité et de l'environnement
    description: |
      Politique SSE, incidents, sécurité des sites et santé au travail.
  BC-730.10:
    name: Gestion de la santé au travail
    description: |
      Santé au travail, ergonomie et bien-être.
  BC-730.10.10:
    name: Surveillance médicale
    description: |
      Surveillance médicale périodique pour les groupes de travailleurs exposés.
  BC-730.10.20:
    name: Ergonomie et santé en milieu de travail
    description: |
      Évaluations ergonomiques et programmes de santé en milieu de travail.
  BC-730.10.30:
    name: Surveillance de l'hygiène industrielle
    description: |
      Surveillance des expositions au bruit, aux poussières, aux produits chimiques et aux agents biologiques.
  BC-730.10.40:
    name: Programmes de bien-être des employés
    description: |
      Programmes de bien-être mental, physique et social.
  BC-730.20:
    name: Gestion de la sécurité (SST)
    description: |
      Sécurité au travail, sécurité comportementale et EPI.
  BC-730.20.10:
    name: Identification des dangers et évaluation des risques
    description: |
      Identification des dangers et évaluation des risques pour les tâches et les sites.
  BC-730.20.20:
    name: Permis de travail et systèmes de travail sécurisés
    description: |
      Permis de travail, consignation et systèmes de travail sécurisés.
  BC-730.20.30:
    name: Gestion des équipements de protection individuelle
    description: |
      Sélection, délivrance, formation et inspection des EPI.
  BC-730.20.40:
    name: Programme de sécurité comportementale
    description: |
      Observations de sécurité comportementale, visites de terrain et accompagnement.
  BC-730.20.50:
    name: Gestion de la sécurité des sous-traitants
    description: |
      Pré-qualification, induction et supervision de la sécurité sur site des sous-traitants.
  BC-730.30:
    name: Gestion environnementale
    description: |
      Émissions, eau, déchets et conformité environnementale.
  BC-730.30.10:
    name: Identification des aspects et évaluation des impacts environnementaux
    description: |
      Identification des aspects environnementaux et évaluation de leurs impacts.
  BC-730.30.20:
    name: Gestion des émissions
    description: |
      Gestion des émissions atmosphériques, GES et polluants sur les sites.
  BC-730.30.30:
    name: Gestion de l'eau et des effluents
    description: |
      Consommation d'eau, traitement des effluents et gestion des rejets.
  BC-730.30.40:
    name: Gestion des déchets
    description: |
      Gestion et élimination des déchets dangereux et non dangereux.
  BC-730.30.50:
    name: Biodiversité et gestion foncière responsable
    description: |
      Activités relatives à la biodiversité, à l'utilisation des terres et à la remédiation.
  BC-730.40:
    name: Gestion des incidents et des enquêtes
    description: |
      Incidents SSE, presqu'accidents et enquêtes.
  BC-730.40.10:
    name: Signalement des incidents et presqu'accidents
    description: |
      Capture et classification des incidents SSE et des presqu'accidents.
  BC-730.40.20:
    name: Enquête sur les incidents SSE
    description: |
      Méthodologie d'enquête, analyse des causes racines et retours d'expérience.
  BC-730.40.30:
    name: Préparation aux situations d'urgence et réponse
    description: |
      Plans d'urgence sur site, exercices et coordination des interventions.
  BC-730.40.40:
    name: Gestion de la sécurité des procédés
    description: |
      Dangers liés à la sécurité des procédés, gestion des modifications et contrôles des risques d'accidents majeurs.
  BC-730.50:
    name: Conformité SSE et reporting
    description: |
      Reporting réglementaire SSE et audits.
  BC-730.50.10:
    name: Conformité réglementaire SSE
    description: |
      Identification et suivi des obligations réglementaires SSE.
  BC-730.50.20:
    name: Audit et inspection SSE
    description: |
      Audits et inspections SSE internes et externes.
  BC-730.50.30:
    name: Reporting de la performance SSE
    description: |
      Suivi des KPI SSE et reporting de gestion (TRIR, LTIFR).
  BC-730.50.40:
    name: Certification du système de management SSE
    description: |
      Certification des systèmes de management ISO 45001 / ISO 14001.

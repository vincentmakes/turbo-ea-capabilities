locale: fr
source: L1-programming-scheduling-management.yaml
entries:
  BC-3730:
    name: Gestion de la programmation et de la grille des programmes
    description: |
      Planification de la grille linéaire, gestion du guide électronique des
      programmes, curation du catalogue à la demande, liste de diffusion et
      continuité, et rapprochement de la demande de programmation avec les
      droits et les pipelines d'acquisition.
  BC-3730.10:
    name: Planification de la grille des chaînes linéaires
    description: |
      Planification à long terme, tactique et de modification de la grille des
      chaînes et flux linéaires.
  BC-3730.10.10:
    name: Planification de la grille à long terme
    description: |
      Plans de grille sur plusieurs trimestres et saisons, alignés sur les
      fenêtres de droits et la stratégie d'audience.
  BC-3730.10.20:
    name: Construction de la grille tactique
    description: |
      Construction de la grille hebdomadaire jusqu'au niveau de l'émission et
      de la coupure.
  BC-3730.10.30:
    name: Gestion des modifications de grille
    description: |
      Gestion contrôlée des modifications tardives et d'urgence de la grille
      avec notification aux services en aval.
  BC-3730.20:
    name: Gestion du guide électronique des programmes
    description: |
      Rédaction, distribution et mise à jour des données du guide électronique
      des programmes (EPG) auprès des opérateurs et des appareils grand public.
  BC-3730.20.10:
    name: Rédaction des données EPG
    description: |
      Rédaction des titres, synopsis, classements et métadonnées d'événements
      EPG pour publication.
  BC-3730.20.20:
    name: Distribution de l'EPG aux opérateurs
    description: |
      Distribution des flux EPG aux opérateurs de plateformes, aux agrégateurs
      et aux plateformes d'appareils grand public.
  BC-3730.20.30:
    name: Gestion des mises à jour en temps réel de l'EPG
    description: |
      Mises à jour en temps réel des données EPG pour les dépassements de
      direct, le sport et les actualités urgentes.
  BC-3730.30:
    name: Curation du catalogue à la demande
    description: |
      Curation des titres, collections et règles de personnalisation sur les
      surfaces à la demande et en streaming.
  BC-3730.30.10:
    name: Sélection et curation des titres
    description: |
      Sélection et cadrage éditorial des titres dans le catalogue à la demande,
      incluant la disponibilité territoriale.
  BC-3730.30.20:
    name: Gestion des collections éditoriales
    description: |
      Création et cycle de vie des collections éditoriales, thèmes et rangées
      présentés aux téléspectateurs.
  BC-3730.30.30:
    name: Rédaction des règles de personnalisation
    description: |
      Rédaction des règles métier régissant la personnalisation aux côtés des
      recommandations par apprentissage automatique.
  BC-3730.40:
    name: Gestion de la liste de diffusion et de la continuité
    description: |
      Construction des listes de diffusion et de la continuité à l'antenne
      pour les chaînes linéaires et en streaming 24h/24 7j/7.
  BC-3730.40.10:
    name: Construction de la liste de diffusion
    description: |
      Construction des listes de diffusion horodatées pour la diffusion,
      incluant les coupures et les éléments intercalaires.
  BC-3730.40.20:
    name: Gestion de la continuité et des junctions
    description: |
      Rédaction et gestion des annonces de continuité, des habillages et des
      packages de jonction.
  BC-3730.40.30:
    name: Gestion des coupures de conformité et des insertions
    description: |
      Application des coupures de conformité et des insertions de version
      requises pour la chaîne et le créneau horaire cibles.
  BC-3730.50:
    name: Planification des créneaux d'acquisition de programmes
    description: |
      Traduction de la demande de créneaux de programmation en listes de
      souhaits d'acquisition et rapprochement des droits acquis avec les besoins
      de la grille.
  BC-3730.50.10:
    name: Planification de la demande de créneaux
    description: |
      Quantification de la demande de créneaux par genre, tranche horaire et
      cible d'audience sur l'horizon de programmation.
  BC-3730.50.20:
    name: Gestion de la liste de souhaits d'acquisition
    description: |
      Liste de souhaits de titres, formats et packages prioritaires pour
      l'acquisition afin de remplir les créneaux identifiés.
  BC-3730.50.30:
    name: Rapprochement programmation-droits
    description: |
      Rapprochement des diffusions programmées avec les droits détenus, les
      passages et la consommation des fenêtres.

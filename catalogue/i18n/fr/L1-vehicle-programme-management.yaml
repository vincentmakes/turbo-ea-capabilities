locale: fr
source: L1-vehicle-programme-management.yaml
entries:
  BC-3410:
    name: Gestion du programme véhicule
    description: |
      Gouvernance pluriannuelle des programmes véhicule couvrant le concept, les jalons de passage de phase, la stratégie de plateforme et de variantes, ainsi que le coût, la masse et le timing au niveau programme, de la mise en production jusqu'à la fin de production.
  BC-3410.10:
    name: Définition et lancement du programme
    description: |
      Définition du concept, dossier d'affaires, charte de programme et autorisation de lancement pour les programmes véhicule nouveaux et dérivés.
    in_scope:
      - Charte de programme et approbation du dossier d'affaires
      - Définition du concept et du positionnement véhicule
      - Alignement sur la stratégie de plateforme et de report
    out_of_scope:
      - Ingénierie détaillée des sous-systèmes véhicule (BC-3400)
      - Gouvernance du portefeuille de projets d'entreprise (BC-900)
  BC-3410.10.10:
    name: Charte de programme et dossier d'affaires
    description: |
      Charte de programme de niveau approbation, dossier d'affaires financier et autorisation d'investissement.
  BC-3410.10.20:
    name: Définition du concept véhicule
    description: |
      Concept véhicule, positionnement, définition du pack client et objectifs d'attributs de haut niveau.
  BC-3410.10.30:
    name: Alignement sur la stratégie de plateforme
    description: |
      Alignement des programmes sur les feuilles de route des plateformes, les décisions de report et les stratégies de modules partagés.
  BC-3410.10.40:
    name: Jalons d'approbation du programme
    description: |
      Jalons d'approbation initiaux du programme comprenant le budget, le timing et les engagements de ressources.
  BC-3410.20:
    name: Gouvernance des jalons de programme
    description: |
      Fonctionnement du modèle de jalons de programme véhicule avec revues de jalons, assurance des livrables et contrôle des risques et problèmes.
  BC-3410.20.10:
    name: Planification des jalons
    description: |
      Planification des jalons de programme de la mise au point préliminaire à la mise en production et à la fin de production.
  BC-3410.20.20:
    name: Conduite des revues de jalons
    description: |
      Conduite des revues de jalons incluant l'évaluation des livrables et les décisions de passage ou de report.
  BC-3410.20.30:
    name: Gestion des risques et problèmes programme
    description: |
      Identification, escalade et mitigation des risques et problèmes critiques du programme.
  BC-3410.20.40:
    name: Évaluation de la maturité programme
    description: |
      Évaluation de la maturité du programme selon les critères de préparation en ingénierie, fabrication et fournisseurs.
  BC-3410.30:
    name: Gestion des coûts programme
    description: |
      Définition et suivi des objectifs de coûts du programme couvrant la nomenclature, l'outillage, l'investissement et les provisions garantie.
  BC-3410.30.10:
    name: Définition des objectifs de coûts programme
    description: |
      Définition des objectifs de coûts du programme incluant les enveloppes nomenclature, conversion et investissement.
  BC-3410.30.20:
    name: Suivi des coûts de nomenclature
    description: |
      Suivi du coût de la nomenclature véhicule, des offres fournisseurs et des décisions de contenu.
  BC-3410.30.30:
    name: Prévision des coûts variables et fixes
    description: |
      Prévision des coûts variables et fixes du programme sur les phases de lancement et de régime établi.
  BC-3410.30.40:
    name: Suivi des plans de réduction de coûts
    description: |
      Suivi des initiatives de réduction de coûts, de l'ingénierie de la valeur et de leur réalisation par rapport aux objectifs.
  BC-3410.40:
    name: Suivi de la masse et des attributs programme
    description: |
      Suivi de la masse véhicule, des performances et autres attributs par rapport aux objectifs du programme et résolution des compromis au niveau programme.
  BC-3410.40.10:
    name: Suivi de la masse véhicule
    description: |
      Suivi de la montée en masse par système et des réserves par rapport aux objectifs de masse du programme.
  BC-3410.40.20:
    name: Suivi des performances d'attributs
    description: |
      Suivi des performances d'attributs et des réserves au niveau programme par rapport aux objectifs.
  BC-3410.40.30:
    name: Reporting de conformité aux objectifs
    description: |
      Reporting du statut de conformité aux objectifs à la direction de programme et aux comités de pilotage.
  BC-3410.50:
    name: Planification des variantes et dérivés
    description: |
      Planification des variantes de finition, d'équipements, régionales et d'éditions spéciales sur l'ensemble du cycle de vie du programme.
  BC-3410.50.10:
    name: Planification des variantes de finition et d'équipements
    description: |
      Planification des niveaux de finition, des options et du contenu d'équipement standard par marché et segment.
  BC-3410.50.20:
    name: Planification des dérivés régionaux
    description: |
      Planification des dérivés régionaux incluant les carrosseries, groupes motopropulseurs et contenus de fonctionnalités spécifiques aux marchés.
  BC-3410.50.30:
    name: Planification des éditions spéciales et séries limitées
    description: |
      Planification des éditions spéciales, séries limitées et dérivés issus du sport automobile.
  BC-3410.60:
    name: Coordination de la mise en production et de la fin de production
    description: |
      Coordination de la préparation à la mise en production, de la montée en cadence et de la phase de fin de production dans les usines et réseaux fournisseurs.
  BC-3410.60.10:
    name: Coordination de la préparation à la mise en production
    description: |
      Coordination des critères de préparation ingénierie, fournisseur, usine et après-vente pour la mise en production.
  BC-3410.60.20:
    name: Planification de la montée en cadence
    description: |
      Planification des courbes de montée en cadence, des véhicules de pré-série et du rythme de volumes au lancement.
  BC-3410.60.30:
    name: Coordination de la phase de fin de production
    description: |
      Coordination du timing de fin de production, des derniers approvisionnements et des plans de liquidation du stock.
  BC-3410.70:
    name: Reporting de la performance programme
    description: |
      Reporting du statut du programme, des décisions et de la performance post-lancement aux comités de pilotage et à la direction générale.
  BC-3410.70.10:
    name: Reporting d'avancement programme
    description: |
      Reporting périodique de l'avancement programme sur les coûts, le timing, la qualité et les risques.
  BC-3410.70.20:
    name: Support des comités de pilotage programme
    description: |
      Préparation et support des comités de pilotage programme et des revues de direction générale.
  BC-3410.70.30:
    name: Revue post-lancement du programme
    description: |
      Revues post-lancement capturant les retours d'expérience et alimentant l'initiation des programmes suivants.

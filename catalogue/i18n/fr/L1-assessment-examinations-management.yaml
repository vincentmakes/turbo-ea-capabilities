locale: fr
source: L1-assessment-examinations-management.yaml
entries:
  BC-4740:
    name: Gestion des évaluations et examens
    description: |
      Conception, administration, correction, modération et délivrance des évaluations
      et examens attestant les apprentissages des étudiants, incluant la supervision
      de l'intégrité académique.
  BC-4740.10:
    name: Conception des évaluations et banque d'items
    description: |
      Conception des instruments d'évaluation et maintenance des banques d'items
      calibrés servant de base à des évaluations cohérentes et fiables.
    in_scope:
      - Définition du plan directeur d'évaluation
      - Rédaction et calibration des items
      - Maintenance de la banque d'items
    out_of_scope:
      - Conception du syllabus au niveau du cours (couverte par la Gestion des curricula et des programmes)
  BC-4740.10.10:
    name: Définition du plan directeur d'évaluation
    description: |
      Définition des plans directeurs d'évaluation et de la pondération par rapport aux résultats d'apprentissage.
  BC-4740.10.20:
    name: Rédaction et calibration des items
    description: |
      Rédaction et calibration statistique des items d'évaluation.
  BC-4740.10.30:
    name: Maintenance de la banque d'items
    description: |
      Maintenance de banques d'items sécurisées à travers les versions et les cycles d'exposition.
  BC-4740.20:
    name: Opérations d'examen
    description: |
      Organisation opérationnelle des examens en présentiel et en ligne, incluant
      la planification, la surveillance et les services de surveillance à distance.
    in_scope:
      - Planification des examens
      - Salles d'examen et surveillance
      - Surveillance en ligne et à distance
    out_of_scope:
      - Évaluation quotidienne en classe (couverte par la Gestion des opérations d'enseignement et d'apprentissage)
  BC-4740.20.10:
    name: Planification des examens
    description: |
      Planification des examens à travers les promotions, les salles et les modalités.
  BC-4740.20.20:
    name: Salles d'examen et surveillance
    description: |
      Organisation des salles et surveillance des examens en présentiel.
  BC-4740.20.30:
    name: Surveillance en ligne et à distance
    description: |
      Mise en œuvre de la surveillance en ligne et à distance pour les examens à distance.
  BC-4740.30:
    name: Opérations de correction et notation
    description: |
      Correction des travaux des étudiants et calcul des notes, incluant la double
      correction, la correction anonyme et les règles d'agrégation des notes.
    in_scope:
      - Application des barèmes de correction
      - Double correction et correction anonyme
      - Agrégation et calcul des notes
    out_of_scope:
      - Tenue du registre officiel des notes (couverte par la Gestion des inscriptions et des dossiers étudiants)
  BC-4740.30.10:
    name: Application des barèmes de correction
    description: |
      Application des barèmes et des grilles d'évaluation aux travaux des étudiants.
  BC-4740.30.20:
    name: Double correction et correction anonyme
    description: |
      Mise en œuvre des procédures de double correction et de correction anonyme.
  BC-4740.30.30:
    name: Agrégation et calcul des notes
    description: |
      Agrégation et calcul des notes partielles en notes finales.
  BC-4740.40:
    name: Modération et jurys d'examen
    description: |
      Modération interne, participation des examinateurs externes et prise de décision
      par les jurys d'examen sur les diplômes et la progression.
    in_scope:
      - Modération interne
      - Coordination des examinateurs externes
      - Prise de décision du jury d'examen
    out_of_scope:
      - Révision au niveau du programme (couverte par la Gestion de la qualité académique et de l'accréditation)
  BC-4740.40.10:
    name: Modération interne
    description: |
      Modération interne des décisions de correction entre les correcteurs et les promotions.
  BC-4740.40.20:
    name: Coordination des examinateurs externes
    description: |
      Coordination des examinateurs externes et de leurs cycles de rapport.
  BC-4740.40.30:
    name: Prise de décision du jury d'examen
    description: |
      Prise de décision par les jurys d'examen sur les résultats, la progression et les diplômes.
  BC-4740.50:
    name: Délivrance des diplômes et qualifications
    description: |
      Publication des résultats et délivrance des diplômes et qualifications,
      incluant le traitement des recours sur les résultats.
    in_scope:
      - Publication des résultats
      - Délivrance des certificats et diplômes
      - Traitement des recours sur les résultats
    out_of_scope:
      - Attestations numériques vérifiables (couvertes par la Gestion des inscriptions et des dossiers étudiants)
  BC-4740.50.10:
    name: Publication des résultats
    description: |
      Publication des résultats provisoires et définitifs aux étudiants.
  BC-4740.50.20:
    name: Délivrance des certificats et diplômes
    description: |
      Délivrance des certificats et diplômes attestant les qualifications obtenues.
  BC-4740.50.30:
    name: Traitement des recours sur les résultats
    description: |
      Traitement des recours des étudiants contre les résultats d'évaluation.
  BC-4740.60:
    name: Gestion de l'intégrité académique
    description: |
      Détection, investigation et remédiation des manquements à l'intégrité académique,
      incluant le plagiat et la fraude contractuelle.
    in_scope:
      - Détection du plagiat
      - Investigation des manquements
      - Sanction et remédiation
    out_of_scope:
      - Manquements à l'intégrité de la recherche (couverts par la Gestion de la recherche et de la bourse académique)
  BC-4740.60.10:
    name: Détection du plagiat
    description: |
      Détection du plagiat et de la fraude contractuelle dans les travaux soumis.
  BC-4740.60.20:
    name: Investigation des manquements
    description: |
      Investigation des cas présumés de manquement à l'intégrité académique.
  BC-4740.60.30:
    name: Sanction et remédiation
    description: |
      Application des sanctions et des mesures de remédiation pour les manquements avérés.

locale: fr
source: L1-route-charges-management.yaml
entries:
  BC-1270:
    name: Gestion des redevances de route
    description: |
      Calcul, facturation et recouvrement des redevances de navigation aérienne auprès des usagers de l'espace aérien.
  BC-1270.10:
    name: Gestion des zones de redevances
    description: |
      Définition des zones de redevances, règles de facturation et fixation des taux unitaires.
  BC-1270.10.10:
    name: Définition des zones de redevances
    description: |
      Définition des zones de redevances en route et terminales.
  BC-1270.10.20:
    name: Calcul des taux unitaires
    description: |
      Calcul et approbation des taux unitaires par zone de redevances.
  BC-1270.10.30:
    name: Gestion des règles de redevances
    description: |
      Maintenance de la formule de redevances et des règles d'exemption.
  BC-1270.20:
    name: Gestion du calcul des redevances de route
    description: |
      Calcul des redevances de route par vol.
  BC-1270.20.10:
    name: Collecte des données de vol pour la facturation
    description: |
      Collecte des données de vol utilisées comme entrées du moteur de facturation.
  BC-1270.20.20:
    name: Calcul de la distance et de la masse
    description: |
      Calcul de la distance facturée et des facteurs de masse.
  BC-1270.20.30:
    name: Calcul des redevances
    description: |
      Application du taux unitaire pour déterminer les redevances de route par vol.
  BC-1270.30:
    name: Gestion du recouvrement des redevances
    description: |
      Facturation, recouvrement, traitement des paiements et relance.
  BC-1270.30.10:
    name: Facturation des redevances
    description: |
      Émission des factures mensuelles de redevances de route.
  BC-1270.30.20:
    name: Traitement des paiements
    description: |
      Réception et traitement des paiements des usagers de l'espace aérien.
  BC-1270.30.30:
    name: Relance et recouvrement
    description: |
      Relance, recouvrement et mise en œuvre sur les redevances en souffrance.
  BC-1270.40:
    name: Gestion des comptes compagnies aériennes
    description: |
      Comptes des usagers de l'espace aérien, relevés de compte et traitement des litiges.
  BC-1270.40.10:
    name: Maintenance des comptes des usagers de l'espace aérien
    description: |
      Maintenance des données de référence des comptes des usagers de l'espace aérien.
  BC-1270.40.20:
    name: Fourniture de relevés et de rapports
    description: |
      Mise à disposition des relevés et rapports de compte aux usagers.
  BC-1270.40.30:
    name: Traitement des litiges sur les redevances
    description: |
      Traitement des contestations et des demandes d'ajustement.
  BC-1270.50:
    name: Gestion du reporting et de la réconciliation des redevances
    description: |
      Reporting aux autorités de régulation et réconciliations de type Eurocontrol.
  BC-1270.50.10:
    name: Reporting aux régulateurs et au gestionnaire de réseau
    description: |
      Reporting aux autorités de régulation et aux gestionnaires de réseau équivalents à Eurocontrol.
  BC-1270.50.20:
    name: Réconciliation des redevances
    description: |
      Réconciliation entre les données de vol et les calculs de redevances.
  BC-1270.50.30:
    name: Suivi du recouvrement des coûts
    description: |
      Suivi du recouvrement des coûts par rapport à la base de coûts approuvée.

locale: fr
source: L1-real-estate-development-management.yaml
entries:
  BC-4900:
    name: Gestion de la promotion immobilière
    description: |
      Origination, faisabilité, droits fonciers, financement et supervision de la
      livraison pour les projets immobiliers neufs ou de réhabilitation majeure dans
      les secteurs commercial et résidentiel. Discipline côté maître d'ouvrage encadrant
      l'exécution de la construction (BC-1150) avec les travaux en amont (site, droits,
      programme, financement) et en aval (commercialisation, stabilisation) propres
      à la promotion immobilière.
    in_scope:
      - Sourcing de sites, analyse de marché et suivi du pipeline
      - Meilleure utilisation et faisabilité financière pro forma
      - Zonage, droits fonciers, permis de construire et autorisations
      - Supervision du plan directeur et de la conception de principe
      - Structuration du financement incluant fonds propres en coentreprise et dette de construction
      - Suivi de la construction côté maître d'ouvrage, ordres de modification et supervision de la livraison
      - Pré-commercialisation, ouverture et montée en occupation jusqu'à la stabilisation
    out_of_scope:
      - Exécution de la construction par les entreprises générales et corps de métier (BC-1150)
      - Acquisition d'actifs existants (BC-4930)
      - Plans d'affaires d'actifs en exploitation et dépenses d'investissement (BC-4920)
      - Développement d'occupation propre d'entreprise (BC-710)
  BC-4900.10:
    name: Pipeline de développement et sourcing de sites
    description: |
      Origination d'opportunités de développement par des analyses de marché, sourcing
      direct de sites, génération de leads hors marché et suivi du pipeline selon les
      critères d'investissement.
  BC-4900.10.10:
    name: Analyse du marché et des sous-marchés
    description: |
      Analyse des dynamiques métropolitaines, de sous-marchés et de micro-localisation
      pour cibler l'activité de développement.
  BC-4900.10.20:
    name: Identification et sourcing de sites
    description: |
      Identification des sites de développement candidats via les canaux d'annonces,
      les réseaux de courtiers et l'analyse des données parcellaires.
  BC-4900.10.30:
    name: Origination hors marché
    description: |
      Cultivation d'opportunités hors marché par la prospection auprès des propriétaires
      fonciers et les réseaux propriétaires.
  BC-4900.10.40:
    name: Suivi du pipeline
    description: |
      Suivi des opportunités de développement à travers les étapes clés et les filtres
      de critères d'investissement.
  BC-4900.20:
    name: Analyse de faisabilité du développement
    description: |
      Évaluation de la faisabilité des opportunités de développement candidates sous
      les dimensions foncière, programmatique et financière.
  BC-4900.20.10:
    name: Analyse de la meilleure utilisation
    description: |
      Analyse des usages légalement permis, physiquement possibles et financièrement
      rentables pour un site candidat.
  BC-4900.20.20:
    name: Études de programme et de gabarit
    description: |
      Études de mix programmatique et de gabarit pour tester l'enveloppe de développement
      et le rendement.
  BC-4900.20.30:
    name: Modélisation du pro forma de développement
    description: |
      Construction du pro forma de développement couvrant les coûts, les revenus et les
      rendements avec et sans effet de levier.
  BC-4900.20.40:
    name: Évaluation du prix d'acquisition foncière
    description: |
      Évaluation du prix et de la structure d'acquisition foncière au regard des résultats
      de faisabilité.
  BC-4900.30:
    name: Droits fonciers et obtention des permis
    description: |
      Obtention des droits d'utilisation du sol, du permis de construire, des autorisations
      environnementales et des permis nécessaires à la construction.
  BC-4900.30.10:
    name: Stratégie de zonage et d'utilisation du sol
    description: |
      Stratégie et mise en œuvre pour les modifications de zonage, les amendments du plan
      d'urbanisme et les bonus de densité.
  BC-4900.30.20:
    name: Permis de construire et dérogations
    description: |
      Obtention du permis de construire, des dérogations et des autorisations spéciales
      d'usage auprès des autorités d'urbanisme.
  BC-4900.30.30:
    name: Instruction environnementale (NEPA / EIA)
    description: |
      Instruction environnementale dans le cadre du NEPA, de l'EIA ou des régimes régionaux
      équivalents, incluant l'évaluation des impacts et les mesures d'atténuation.
  BC-4900.30.40:
    name: Permis de construire et autorisations
    description: |
      Dépôt et obtention des permis de construire et autorisations de corps de métier
      nécessaires au lancement des travaux.
  BC-4900.30.50:
    name: Engagement des communautés et parties prenantes
    description: |
      Engagement avec les conseils de quartier, les riverains et les acteurs politiques
      en soutien à l'obtention des droits fonciers.
  BC-4900.40:
    name: Gestion du programme de développement
    description: |
      Gouvernance programmatique du calendrier de développement, du budget, des risques
      et du reporting aux parties prenantes sur l'ensemble du cycle de développement.
  BC-4900.40.10:
    name: Gestion du calendrier de développement
    description: |
      Définition et suivi du calendrier directeur de développement, de la clôture foncière
      jusqu'à la stabilisation.
  BC-4900.40.20:
    name: Contrôle du budget de développement
    description: |
      Contrôle du budget total du coût de développement incluant les composantes travaux,
      honoraires, financement et provisions.
  BC-4900.40.30:
    name: Gestion des risques et des provisions du développement
    description: |
      Identification, quantification et gestion des risques du programme et des appels
      sur provisions.
  BC-4900.40.40:
    name: Reporting aux parties prenantes
    description: |
      Reporting sur l'avancement du développement auprès des investisseurs, prêteurs
      et organes de gouvernance internes.
  BC-4900.50:
    name: Gestion du plan directeur et de la conception de principe
    description: |
      Définition des plans directeurs à long terme et supervision des phases de conception
      de principe et d'avant-projet au regard des intentions du promoteur.
  BC-4900.50.10:
    name: Définition du plan directeur
    description: |
      Définition des plans directeurs pour les opérations de développement multi-phases
      ou multi-parcelles incluant le phasage.
  BC-4900.50.20:
    name: Supervision de la conception de principe et de l'avant-projet
    description: |
      Supervision côté maître d'ouvrage des livrables de conception de principe et
      d'avant-projet de l'architecte au regard du programme.
  BC-4900.50.30:
    name: Intendance des standards de conception
    description: |
      Intendance des standards de conception et de marque du promoteur auprès des
      équipes de consultants.
  BC-4900.50.40:
    name: Définition du cahier des charges environnemental
    description: |
      Définition des cahiers des charges environnementaux et de certification (LEED,
      BREEAM, WELL, NABERS) pour l'opération.
  BC-4900.60:
    name: Structuration du financement du développement
    description: |
      Structuration des fonds propres, de la dette et des incitations nécessaires
      au financement du développement jusqu'à la livraison.
  BC-4900.60.10:
    name: Capitalisation en fonds propres
    description: |
      Levée et clôture des fonds propres du promoteur et des limited partners pour
      l'opération de développement.
  BC-4900.60.20:
    name: Origination du prêt de construction
    description: |
      Origination des prêts de construction et prêts relais sur la base du pro forma
      de développement.
  BC-4900.60.30:
    name: Incitations publiques et crédits d'impôt
    description: |
      Obtention des incitations publiques telles que TIF, PILOT, LIHTC et programmes
      de crédit d'impôt pour les monuments historiques.
  BC-4900.60.40:
    name: Structuration des coentreprises
    description: |
      Structuration des véhicules de coentreprise, des intéressements et des modalités
      de partage des profits avec les partenaires de développement.
  BC-4900.70:
    name: Supervision de la livraison de la construction
    description: |
      Supervision côté maître d'ouvrage de la livraison de la construction par les
      entreprises générales et corps de métier, laissant l'exécution à la capacité
      construction (BC-1150).
  BC-4900.70.10:
    name: Sélection et attribution aux entreprises
    description: |
      Sélection et attribution aux entreprises générales et aux marchés de lots
      techniques clés pour l'opération.
  BC-4900.70.20:
    name: Suivi de la construction côté maître d'ouvrage
    description: |
      Suivi côté maître d'ouvrage de l'avancement des travaux, des tirages et de la
      qualité pendant l'exécution.
  BC-4900.70.30:
    name: Gouvernance des ordres de modification
    description: |
      Gouvernance des ordres de modification, des modifications de périmètre et des
      appels sur provisions par rapport au budget.
  BC-4900.70.40:
    name: Supervision de la qualité et de la sécurité
    description: |
      Supervision de la qualité de la construction et de la performance sécurité selon
      les exigences du promoteur et les réglementations.
  BC-4900.80:
    name: Gestion de la commercialisation et de la stabilisation
    description: |
      Pré-commercialisation, coordination de l'ouverture et montée en occupation
      de l'actif livré jusqu'à l'occupation et la performance stabilisées.
  BC-4900.80.10:
    name: Coordination de la pré-commercialisation
    description: |
      Coordination des campagnes de pré-commercialisation avant l'achèvement de l'immeuble.
  BC-4900.80.20:
    name: Coordination de l'ouverture et des premières entrées dans les lieux
    description: |
      Coordination de l'ouverture de l'immeuble, des premières entrées dans les lieux
      et de la remise opérationnelle.
  BC-4900.80.30:
    name: Suivi de la performance de stabilisation
    description: |
      Suivi de la vitesse de commercialisation et de la performance opérationnelle
      par rapport au pro forma de stabilisation.
  BC-4900.80.40:
    name: Levée des réserves et des défauts
    description: |
      Levée des réserves, des défauts latents et des réclamations sous garantie
      entrepreneur après réception.

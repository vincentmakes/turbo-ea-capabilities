locale: fr
source: L1-production-management.yaml
entries:
  BC-1000:
    name: Gestion de la production
    description: |
      Production de biens physiques — planification, ordonnancement et exécution à l'échelle de l'entreprise.
  BC-1000.10:
    name: Gestion de la stratégie de production
    description: |
      Empreinte de production, make/buy et stratégie de capacité.
  BC-1000.10.10:
    name: Stratégie d'empreinte industrielle
    description: |
      Stratégie d'empreinte industrielle à long terme et définition du rôle de chaque site.
  BC-1000.10.20:
    name: Stratégie de fabrication interne ou sous-traitance
    description: |
      Stratégie de fabrication interne ou d'externalisation par ligne de produits.
  BC-1000.10.30:
    name: Stratégie de capacité
    description: |
      Stratégie de capacité à long terme et planification des investissements d'expansion.
  BC-1000.10.40:
    name: Conception du modèle opérationnel industriel
    description: |
      Conception du modèle opérationnel et de la gouvernance industrielle.
  BC-1000.20:
    name: Gestion de la planification de la production
    description: |
      Programme directeur de production, planification à moyen terme (semaines-mois).
  BC-1000.20.10:
    name: Établissement du programme directeur de production
    description: |
      Établissement du programme directeur de production pour l'ensemble des usines.
  BC-1000.20.20:
    name: Planification grossière des capacités
    description: |
      Validation grossière des capacités par rapport au programme directeur.
  BC-1000.20.30:
    name: Planification de la production à moyen terme
    description: |
      Planification de la production hebdomadaire et mensuelle par ligne.
  BC-1000.20.40:
    name: Réconciliation du plan de production
    description: |
      Réconciliation du plan de production avec l'offre et la demande.
  BC-1000.30:
    name: Gestion de l'ordonnancement de la production
    description: |
      Ordonnancement détaillé et séquençage (heures-jours).
  BC-1000.30.10:
    name: Ordonnancement détaillé en capacité finie
    description: |
      Ordonnancement en capacité finie au niveau de la machine et de la ligne.
  BC-1000.30.20:
    name: Optimisation de la séquence
    description: |
      Optimisation de la séquence pour minimiser les changements de série et les pertes.
  BC-1000.30.30:
    name: Suivi du respect du programme
    description: |
      Suivi du respect du programme et replanification.
  BC-1000.30.40:
    name: Lancement des ordres de fabrication
    description: |
      Lancement des ordres de fabrication vers l'atelier.
  BC-1000.40:
    name: Gestion de l'exécution de la production
    description: |
      Supervision de l'exécution, dispatch et contrôle en temps réel.
  BC-1000.40.10:
    name: Dispatch des ordres de fabrication
    description: |
      Dispatch des ordres vers les postes de travail.
  BC-1000.40.20:
    name: Suivi de l'avancement de la production
    description: |
      Suivi en temps réel de l'avancement des ordres de fabrication.
  BC-1000.40.30:
    name: Gestion des exceptions de production
    description: |
      Traitement des exceptions de production et escalades.
  BC-1000.40.40:
    name: Clôture des ordres de fabrication
    description: |
      Confirmation, solde et clôture des ordres de fabrication.
  BC-1000.50:
    name: Gestion de la performance de production
    description: |
      TRS, débit, rendement et KPI de production.
  BC-1000.50.10:
    name: Mesure du TRS
    description: |
      Mesure et reporting du taux de rendement synthétique (TRS).
  BC-1000.50.20:
    name: Analyse du débit et du rendement
    description: |
      Analyse du débit, du rendement et du taux de bon du premier coup.
  BC-1000.50.30:
    name: Analyse des arrêts et des pertes
    description: |
      Classification des arrêts et analyse de l'arbre des pertes.
  BC-1000.50.40:
    name: Reporting de la performance de production
    description: |
      Reporting de la performance des usines et benchmarking.
  BC-1000.60:
    name: Gestion du coût de production
    description: |
      Coûts standards, écarts de production et analyse des coûts.
  BC-1000.60.10:
    name: Définition des coûts standards
    description: |
      Définition et réévaluation des coûts standards pour les articles fabriqués.
  BC-1000.60.20:
    name: Analyse des écarts de production
    description: |
      Analyse des écarts sur matières, main-d'œuvre et frais généraux.
  BC-1000.60.30:
    name: Reporting des coûts de production
    description: |
      Reporting périodique des coûts de production et benchmarking.

locale: fr
source: L1-pharmacy-medication-management.yaml
entries:
  BC-2850:
    name: Gestion de la pharmacie et des médicaments
    description: |
      Opérations pharmaceutiques côté prestataire incluant le formulaire, la dispensation hospitalière et ambulatoire, l'administration et la réconciliation médicamenteuse, la gestion des substances contrôlées et les services cliniques de pharmacie.
  BC-2850.10:
    name: Gestion du formulaire médicamenteux
    description: |
      Gestion du formulaire médicamenteux, de la substitution thérapeutique et de la réponse aux pénuries de médicaments.
  BC-2850.10.10:
    name: Décisions relatives au formulaire
    description: |
      Décisions d'inclusion, d'exclusion et de niveau dans le formulaire fondées sur les données probantes.
  BC-2850.10.20:
    name: Substitution thérapeutique
    description: |
      Gestion et mise en œuvre des protocoles de substitution thérapeutique.
  BC-2850.10.30:
    name: Soutien au comité de pharmacologie et de thérapeutique
    description: |
      Soutien opérationnel au comité de pharmacologie et de thérapeutique.
  BC-2850.10.40:
    name: Gestion des pénuries de médicaments
    description: |
      Identification, atténuation et planification des substitutions lors de pénuries de médicaments.
  BC-2850.20:
    name: Opérations de pharmacie hospitalière
    description: |
      Validation des ordonnances, préparation stérile et non stérile, dispensation et préparation des mélanges intraveineux pour les services d'hospitalisation.
  BC-2850.20.10:
    name: Validation des ordonnances
    description: |
      Validation pharmacologique des ordonnances médicamenteuses pour la sécurité et le bon usage.
  BC-2850.20.20:
    name: Préparation stérile
    description: |
      Opérations de préparation stérile incluant les préparations de médicaments dangereux.
  BC-2850.20.30:
    name: Dispensation en dose unitaire
    description: |
      Préparation et dispensation en dose unitaire pour l'administration en hospitalisation.
  BC-2850.20.40:
    name: Préparation des mélanges intraveineux
    description: |
      Préparation des mélanges intraveineux, des perfusions et de la nutrition parentérale.
  BC-2850.30:
    name: Opérations de pharmacie ambulatoire et de spécialité
    description: |
      Opérations de pharmacie de ville, de spécialité et par correspondance, incluant les programmes de médicaments à tarif réduit.
  BC-2850.30.10:
    name: Dispensation en officine
    description: |
      Dispensation d'ordonnances en officine ambulatoire.
  BC-2850.30.20:
    name: Gestion des médicaments de spécialité
    description: |
      Opérations de pharmacie de spécialité pour les médicaments coûteux à distribution limitée.
  BC-2850.30.30:
    name: Exécution des ordonnances par correspondance
    description: |
      Exécution et livraison des ordonnances par correspondance.
  BC-2850.30.40:
    name: Opérations des programmes de médicaments à tarif réduit
    description: |
      Opérations des programmes de médicaments à tarif légal réduit et conformité des entités éligibles.
  BC-2850.40:
    name: Administration et réconciliation médicamenteuse
    description: |
      Administration des médicaments au chevet, réconciliation lors des transitions et gestion des médicaments apportés par le patient.
  BC-2850.40.10:
    name: Administration médicamenteuse au chevet
    description: |
      Administration médicamenteuse au chevet avec vérification par code-barres par le personnel infirmier.
  BC-2850.40.20:
    name: Réconciliation médicamenteuse
    description: |
      Réconciliation des médicaments du domicile et prescrits lors de l'admission, du transfert et de la sortie.
  BC-2850.40.30:
    name: Opérations du dossier d'administration des médicaments
    description: |
      Gestion du dossier électronique d'administration des médicaments.
  BC-2850.40.40:
    name: Gestion des médicaments apportés par le patient
    description: |
      Identification, stockage et administration autorisée des médicaments apportés par le patient.
  BC-2850.50:
    name: Gestion des substances contrôlées
    description: |
      Conformité réglementaire, surveillance des détournements, inventaire et destruction des médicaments contrôlés.
  BC-2850.50.10:
    name: Conformité réglementaire pour les substances contrôlées
    description: |
      Conformité aux réglementations relatives aux substances contrôlées, notamment l'enregistrement et la tenue des registres.
  BC-2850.50.20:
    name: Surveillance des détournements
    description: |
      Surveillance et investigation des détournements présumés de médicaments.
  BC-2850.50.30:
    name: Inventaire des médicaments contrôlés
    description: |
      Inventaire permanent et réconciliation des stocks de médicaments contrôlés.
  BC-2850.50.40:
    name: Destruction des médicaments contrôlés
    description: |
      Destruction avec témoin et retour à la distribution des médicaments contrôlés.
  BC-2850.60:
    name: Services cliniques de pharmacie
    description: |
      Services cliniques de pharmacie incluant la gestion des anticoagulants, la gestion des antimicrobiens, la gestion thérapeutique des médicaments et la surveillance thérapeutique des médicaments.
  BC-2850.60.10:
    name: Gestion des anticoagulants
    description: |
      Services de dosage et de surveillance des anticoagulants pilotés par le pharmacien.
  BC-2850.60.20:
    name: Pharmacie de gestion des antimicrobiens
    description: |
      Contribution de la pharmacie aux programmes de gestion des antimicrobiens.
  BC-2850.60.30:
    name: Gestion thérapeutique des médicaments
    description: |
      Consultations de gestion thérapeutique des médicaments dispensées par le pharmacien.
  BC-2850.60.40:
    name: Surveillance thérapeutique des médicaments
    description: |
      Services de surveillance thérapeutique et d'individualisation de la posologie.

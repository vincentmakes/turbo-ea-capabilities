locale: fr
source: L1-crop-production-management.yaml
entries:
  BC-3500:
    name: Gestion de la production végétale
    description: |
      Opérations de production agricole en champ — planification du système de culture, préparation du sol, plantation, nutrition, protection des cultures, irrigation, surveillance et prévision de rendement pour les cultures arables, horticoles et spécialisées.
  BC-3500.10:
    name: Planification du système de culture
    description: |
      Planification pluriannuelle des rotations culturales, des allocations parcellaires, des fenêtres de semis et de la sélection variétale sur l'ensemble du portefeuille de l'exploitation.
    in_scope:
      - Conception de la rotation des cultures
      - Allocation des cultures par parcelle
      - Planification des fenêtres de semis
      - Sélection des variétés et hybrides
    out_of_scope:
      - Exécution des essais variétaux (BC-3530.60)
      - Prescriptions agronomiques (BC-3530.20)
  BC-3500.10.10:
    name: Planification de la rotation des cultures
    description: |
      Conception pluriannuelle de la rotation des cultures équilibrant la santé des sols, la demande du marché et les cycles des ravageurs.
  BC-3500.10.20:
    name: Planification de l'allocation parcellaire
    description: |
      Allocation des cultures aux parcelles et champs spécifiques pour la saison de semis.
  BC-3500.10.30:
    name: Planification des fenêtres de semis
    description: |
      Planification des fenêtres de semis optimales par culture, variété et zone agroclimatique.
  BC-3500.10.40:
    name: Décisions de sélection variétale
    description: |
      Sélection des variétés et hybrides pour la saison de semis selon des critères agronomiques et commerciaux.
  BC-3500.20:
    name: Opérations de préparation du sol
    description: |
      Opérations de travail du sol, de formation du lit de semences et d'amendement du sol avant la plantation pour établir un lit de semences viable.
  BC-3500.20.10:
    name: Opérations de travail du sol
    description: |
      Opérations de préparation du sol en labour conventionnel, réduit et sans labour.
  BC-3500.20.20:
    name: Opérations de formation des planches
    description: |
      Formation de planches, buttage et paillage pour la production horticole et en rangs.
  BC-3500.20.30:
    name: Application d'amendements du sol en pré-plantation
    description: |
      Application d'amendements en pré-plantation tels que la chaux, le gypse et la matière organique.
  BC-3500.30:
    name: Opérations de plantation et de semis
    description: |
      Mise en place des semences et des plants, y compris les décisions de replantation et l'établissement du couvert végétal.
  BC-3500.30.10:
    name: Finalisation du lit de semences
    description: |
      Préparation finale du lit de semences immédiatement avant la plantation.
  BC-3500.30.20:
    name: Mise en place des semences et des plants
    description: |
      Mise en place mécanique et manuelle des semences et des plants en champ.
  BC-3500.30.30:
    name: Opérations de replantation et de comblement
    description: |
      Replantation et comblement des manques lorsque l'établissement initial du couvert végétal échoue.
  BC-3500.40:
    name: Opérations de nutrition des cultures
    description: |
      Apport de nutriments en cours de saison par des méthodes d'application solide, liquide, foliaire et par fertigation.
  BC-3500.40.10:
    name: Application d'engrais solides
    description: |
      Application d'engrais solides en épandage, en bande et à doses variables.
  BC-3500.40.20:
    name: Application de nutrition foliaire
    description: |
      Application foliaire de macroéléments et microéléments pendant la saison de croissance.
  BC-3500.40.30:
    name: Opérations de fertigation
    description: |
      Apport de nutriments par les systèmes d'irrigation incluant l'injection et le contrôle du dosage.
  BC-3500.50:
    name: Opérations de protection des cultures
    description: |
      Application d'interventions phytosanitaires chimiques, biologiques et mécaniques et enregistrement des traitements.
    in_scope:
      - Application de pesticides et d'herbicides
      - Application de produits de biocontrôle
      - Désherbage mécanique et thermique
      - Enregistrements des traitements et applications
    out_of_scope:
      - Planification de la protection intégrée (BC-3530.30)
      - Surveillance de la conformité aux LMR (BC-3590.50)
  BC-3500.50.10:
    name: Opérations d'application des pesticides
    description: |
      Application terrestre et aérienne de pesticides incluant la gestion de la dérive de pulvérisation.
  BC-3500.50.20:
    name: Application de biocontrôle
    description: |
      Lâchers d'agents de biocontrôle et de produits biopesticides.
  BC-3500.50.30:
    name: Désherbage mécanique et thermique
    description: |
      Désherbage mécanique et thermique incluant le binage et le désherbage à la flamme.
  BC-3500.50.40:
    name: Enregistrement des applications de pulvérisation
    description: |
      Enregistrements des pulvérisations par parcelle couvrant le produit, la dose, les conditions météorologiques et l'opérateur.
  BC-3500.60:
    name: Opérations d'irrigation
    description: |
      Planification quotidienne de l'irrigation, application et décisions de drainage qui déterminent l'état hydrique des cultures.
  BC-3500.60.10:
    name: Planification de l'irrigation
    description: |
      Planification de l'irrigation basée sur l'humidité du sol et les besoins en eau des cultures.
  BC-3500.60.20:
    name: Opérations d'application de l'irrigation
    description: |
      Application de l'eau d'irrigation par aspersion, micro-irrigation et systèmes gravitaires.
  BC-3500.60.30:
    name: Opérations de drainage parcellaire
    description: |
      Opérations de drainage de surface et souterrain et contrôle de la nappe phréatique.
  BC-3500.70:
    name: Surveillance et prospection des cultures
    description: |
      Surveillance à l'échelle parcellaire de la santé des cultures, de la pression des ravageurs et de la phénologie par des méthodes de prospection, de capteurs et de télédétection.
  BC-3500.70.10:
    name: Opérations de prospection au champ
    description: |
      Sorties de prospection manuelles pour l'évaluation des ravageurs, des maladies et de l'état des cultures.
  BC-3500.70.20:
    name: Surveillance des ravageurs et des maladies
    description: |
      Surveillance par pièges et capteurs de la pression des ravageurs et des maladies.
  BC-3500.70.30:
    name: Suivi de la phénologie des cultures
    description: |
      Suivi des stades de développement, des sommes de températures et des jalons phénologiques.
  BC-3500.70.40:
    name: Surveillance des cultures par télédétection
    description: |
      Surveillance de l'état des cultures par satellite, drone et capteurs de proximité.
  BC-3500.80:
    name: Prévision du rendement des cultures
    description: |
      Estimation du rendement en cours de saison et avant récolte alimentant l'approvisionnement, la logistique et la planification commerciale.
  BC-3500.80.10:
    name: Estimation du rendement en cours de saison
    description: |
      Estimations de rendement en milieu de saison à partir des indices de culture et des mesures au champ.
  BC-3500.80.20:
    name: Prévision du rendement avant récolte
    description: |
      Prévisions de rendement avant récolte alimentant les plans de récolte, de stockage et d'approvisionnement.

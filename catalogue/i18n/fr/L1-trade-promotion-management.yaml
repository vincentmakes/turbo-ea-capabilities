locale: fr
source: L1-trade-promotion-management.yaml
entries:
  BC-2360:
    name: Gestion des promotions commerciales
    description: |
      Discipline de l'industrie des biens de grande consommation relative aux
      investissements commerciaux auprès des clients distributeurs — plans
      d'affaires conjoints, budgets de promotion commerciale, exécution des
      opérations en magasin, gestion des déductions et mesure de l'impact
      post-événement.

  BC-2360.10:
    name: Stratégie et planification des promotions commerciales
    description: |
      Stratégie annuelle de promotion commerciale, planification des investissements
      par client et plans d'affaires conjoints négociés avec les clients distributeurs.
    in_scope:
      - Calendrier annuel des promotions commerciales
      - Plans d'affaires conjoints par client
      - Stratégie de frais de référencement et de mise en avant

  BC-2360.10.10:
    name: Élaboration du plan commercial annuel
    description: |
      Élaboration du plan annuel de promotions commerciales et du calendrier
      des événements.

  BC-2360.10.20:
    name: Planification d'affaires conjointe avec les clients
    description: |
      Planification d'affaires conjointe avec les clients distributeurs stratégiques.

  BC-2360.10.30:
    name: Stratégie de frais de référencement et de mise en avant
    description: |
      Stratégie et négociation des frais de référencement et de mise en avant pour
      les nouveaux articles.

  BC-2360.20:
    name: Gestion du budget de promotion commerciale
    description: |
      Budgétisation des dépenses commerciales, provisions comptables, allocation
      entre clients et contrôle financier des investissements commerciaux.

  BC-2360.20.10:
    name: Budgétisation des dépenses commerciales
    description: |
      Budgétisation des dépenses commerciales par client, marque et événement.

  BC-2360.20.20:
    name: Gestion des provisions de dépenses commerciales
    description: |
      Comptabilisation des provisions de dépenses commerciales par client et
      événement.

  BC-2360.20.30:
    name: Allocation des dépenses commerciales
    description: |
      Allocation des enveloppes de dépenses commerciales entre clients, régions et
      événements.

  BC-2360.20.40:
    name: Contrôle financier des dépenses commerciales
    description: |
      Contrôle financier des dépenses commerciales incluant les seuils d'approbation.

  BC-2360.30:
    name: Gestion de l'exécution des événements promotionnels
    description: |
      Exécution des événements promotionnels en magasin et en ligne incluant les
      audits magasin parfait et l'activation des équipes terrain.

  BC-2360.30.10:
    name: Mise en place de l'événement avec le client
    description: |
      Mise en place des événements promotionnels avec le client distributeur
      incluant les visuels et les prévisions.

  BC-2360.30.20:
    name: Activation en magasin et mise en avant
    description: |
      Activation des têtes de gondole, des displays et des emplacements secondaires
      en magasin.

  BC-2360.30.30:
    name: Exécution des audits magasin parfait
    description: |
      Exécution terrain des audits magasin parfait et des contrôles par
      reconnaissance d'image.

  BC-2360.30.40:
    name: Activation des équipes de vente terrain
    description: |
      Activation des équipes de vente terrain pour piloter l'exécution des
      événements.

  BC-2360.40:
    name: Gestion des déductions et des réclamations
    description: |
      Validation, contestation et résolution des déductions et réclamations
      promotionnelles prises par les clients sur les factures.
    in_scope:
      - Réception et rapprochement des déductions avec les événements
      - Validation par rapport aux conditions convenues
      - Résolution des litiges et recouvrement
    out_of_scope:
      - Recouvrement créances client générique (BC-200)

  BC-2360.40.10:
    name: Réception et rapprochement des déductions
    description: |
      Réception des déductions clients et rapprochement avec les événements
      promotionnels.

  BC-2360.40.20:
    name: Validation des déductions
    description: |
      Validation des déductions par rapport aux conditions, volumes et prix
      convenus.

  BC-2360.40.30:
    name: Résolution des litiges et recouvrement
    description: |
      Résolution des litiges avec le client et recouvrement des déductions
      non valides.

  BC-2360.50:
    name: Mesure de l'efficacité des promotions commerciales
    description: |
      Mesure post-événement de l'impact promotionnel, analyse de la base et de
      l'incrémental, et ROI par événement, client et marque.

  BC-2360.50.10:
    name: Mesure de la base et de l'impact incrémental
    description: |
      Mesure des ventes de base et de l'impact incrémental des événements
      promotionnels.

  BC-2360.50.20:
    name: Analyse du ROI promotionnel
    description: |
      Analyse du ROI des promotions commerciales par événement, client et marque.

  BC-2360.50.30:
    name: Analyse de la cannibalisation et de l'anticipation de la demande
    description: |
      Analyse des effets de cannibalisation et d'anticipation de la demande.

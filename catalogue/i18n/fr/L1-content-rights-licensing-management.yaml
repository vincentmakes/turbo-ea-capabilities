locale: fr
source: L1-content-rights-licensing-management.yaml
entries:
  BC-3720:
    name: Gestion des droits et des licences de contenu
    description: |
      Acquisition, inventaire, licence sortante, droits sportifs et musicaux,
      redevances entrantes, autorisation et chaîne des titres pour les contenus
      audiovisuels, audio et éditoriaux.
  BC-3720.10:
    name: Gestion de l'acquisition de droits
    description: |
      Négociation et contractualisation des droits entrants pour les contenus
      acquis par l'entreprise auprès des détenteurs de droits ou des producteurs.
  BC-3720.10.10:
    name: Soutien à la négociation des droits
    description: |
      Préparation des term sheets, analyse des transactions comparables et
      soutien à la négociation pour les acquisitions de contenu.
  BC-3720.10.20:
    name: Gestion des contrats d'acquisition
    description: |
      Rédaction, signature et gestion du cycle de vie des contrats de droits
      entrants et de leurs avenants.
  BC-3720.10.30:
    name: Suivi des fenêtres d'acquisition de droits
    description: |
      Suivi des fenêtres, territoires, plateformes et termes d'exclusivité
      acquis par rapport au contrat.
  BC-3720.20:
    name: Gestion de l'inventaire des droits
    description: |
      Gouvernance de l'inventaire consolidé des droits détenus et consultation
      de leur disponibilité pour la programmation et l'octroi de licences en
      aval.
  BC-3720.20.10:
    name: Suivi des fenêtres de droits et des territoires
    description: |
      Suivi des fenêtres de droits disponibles par titre, territoire,
      plateforme et langue.
  BC-3720.20.20:
    name: Suivi des périodes de gel et d'exclusivité
    description: |
      Suivi des périodes de gel et des restrictions d'exclusivité conditionnant
      l'exploitation en aval.
  BC-3720.20.30:
    name: Requête de disponibilité des droits
    description: |
      Services de requête permettant de déterminer si un titre peut être licencié
      pour un usage, une fenêtre et un territoire donnés.
  BC-3720.30:
    name: Gestion des licences sortantes
    description: |
      Vente et gestion du cycle de vie des droits accordés en licence aux
      diffuseurs, plateformes et autres tiers.
  BC-3720.30.10:
    name: Gestion des ventes de licences
    description: |
      Pipeline, structuration et conclusion d'accords de licence sortants sur
      les territoires et plateformes.
  BC-3720.30.20:
    name: Gestion des accords de production de sortie
    description: |
      Gestion des accords de production de sortie multi-titres et en volume
      avec les licenciés en aval.
  BC-3720.30.30:
    name: Gestion des licences de formats
    description: |
      Licence de formats non scénarisés et scénarisés ainsi que de bibles à
      des producteurs locaux et des diffuseurs.
  BC-3720.40:
    name: Gestion des droits sportifs et d'événements en direct
    description: |
      Soumission d'offres, suivi et exploitation des droits sportifs et
      d'événements en direct, y compris les résumés dérivés.
  BC-3720.40.10:
    name: Soumission d'offres pour les droits sportifs
    description: |
      Préparation des offres, évaluation et réponses aux appels d'offres pour
      les droits sportifs et d'événements en direct.
  BC-3720.40.20:
    name: Suivi des droits par calendrier d'événements
    description: |
      Suivi des droits par match ou rencontre par rapport aux droits de
      compétitions et tournois détenus.
  BC-3720.40.30:
    name: Gestion des droits de résumés et d'extraits
    description: |
      Gestion des droits dérivés pour les résumés, extraits et exploitation
      courte durée sur les réseaux sociaux et le numérique.
  BC-3720.50:
    name: Gestion des droits musicaux et d'interprétation
    description: |
      Licence et déclaration des droits musicaux et d'interprétation, incluant
      la synchronisation, les droits mécaniques et la représentation publique.
  BC-3720.50.10:
    name: Licence mécanique et de synchronisation
    description: |
      Autorisation et licence des droits mécaniques et de synchronisation pour
      la musique utilisée dans les productions et sur les plateformes.
  BC-3720.50.20:
    name: Déclaration des droits d'interprétation
    description: |
      Déclaration des utilisations en représentation publique et en diffusion
      aux organismes de gestion collective.
  BC-3720.50.30:
    name: Gestion des feuilles de minutage musical
    description: |
      Production et diffusion des feuilles de minutage musical aux sociétés et
      détenteurs de droits.
  BC-3720.60:
    name: Gestion des redevances entrantes
    description: |
      Réception, rapprochement et redistribution des revenus de redevances dus
      à l'entreprise en tant que détenteur de droits.
  BC-3720.60.10:
    name: Rapprochement des relevés de redevances
    description: |
      Rapprochement des relevés de redevances entrants des licenciés et sociétés
      par rapport aux droits détenus.
  BC-3720.60.20:
    name: Comptabilisation des encaissements de redevances
    description: |
      Comptabilisation des encaissements de redevances dans le grand livre des
      droits et reconnaissance comptable en aval.
  BC-3720.60.30:
    name: Distribution aux détenteurs de droits sous-jacents
    description: |
      Distribution des redevances reçues aux détenteurs de droits sous-jacents
      selon les termes de participation et de sous-édition.
  BC-3720.70:
    name: Gestion de l'autorisation et de la chaîne des titres
    description: |
      Vérification et documentation des droits sous-jacents et de la chaîne des
      titres pour soutenir l'exploitation et la couverture erreurs et omissions.
  BC-3720.70.10:
    name: Vérification des droits sous-jacents
    description: |
      Vérification des droits littéraires, musicaux et photographiques
      sous-jacents intégrés dans l'œuvre.
  BC-3720.70.20:
    name: Suivi du statut des autorisations
    description: |
      Suivi du statut des autorisations par élément avec gestion des actions en
      suspens.
  BC-3720.70.30:
    name: Documentation de la chaîne des titres
    description: |
      Maintien des dossiers de chaîne des titres suffisants pour la couverture
      E&O et la diligence raisonnable des licenciés en aval.

locale: fr
source: L1-talent-creative-workforce-management.yaml
entries:
  BC-3790:
    name: Gestion des talents créatifs et des effectifs
    description: |
      Sourcing et casting des talents à l'écran et créatifs, contractualisation
      et engagement des talents, distribution des residuals et redevances,
      conformité aux accords de guilde et de syndicat, et relations à long terme
      avec les talents créatifs.
  BC-3790.10:
    name: Sourcing et casting des talents
    description: |
      Rédaction des notes de casting et recherche, audition et sélection des
      talents à l'écran et comédiens de voix pour les productions.
  BC-3790.10.10:
    name: Gestion des notes de casting
    description: |
      Rédaction des notes de casting et des descriptions de rôles adressées aux
      directeurs de casting et aux agents.
  BC-3790.10.20:
    name: Recherche et audition des talents
    description: |
      Recherche de talents, coordination des auto-cassettes et des auditions en
      présentiel, et flux de présélection.
  BC-3790.10.30:
    name: Décision de sélection au casting
    description: |
      Décisions de sélection et validation du casting selon des critères
      créatifs et commerciaux.
  BC-3790.20:
    name: Contractualisation et engagement des talents
    description: |
      Négociation et contractualisation des engagements de talents, incluant
      les structures loan-out et société de services.
  BC-3790.20.10:
    name: Soutien à la négociation des deals talents
    description: |
      Soutien à la négociation des deals talents, incluant le benchmarking sur
      des transactions comparables et la préparation des term sheets.
  BC-3790.20.20:
    name: Contractualisation via loan-out et société de services
    description: |
      Contractualisation par le biais de structures loan-out et société de
      services avec prise en compte des aspects fiscaux et d'indemnisation.
  BC-3790.20.30:
    name: Gestion des lettres d'engagement
    description: |
      Rédaction et cycle de vie des lettres d'engagement et des mémos de deal
      courts pour les talents et techniciens.
  BC-3790.30:
    name: Distribution des residuals et des redevances
    description: |
      Calcul et versement des residuals, redevances et participations dus aux
      talents et contributeurs créatifs.
  BC-3790.30.10:
    name: Calcul des residuals
    description: |
      Calcul des residuals selon les formules de guilde, les types de marchés
      et les fenêtres de réutilisation.
  BC-3790.30.20:
    name: Production des relevés de distribution de redevances
    description: |
      Production des relevés de distribution de redevances pour les talents et
      les détenteurs de droits.
  BC-3790.30.30:
    name: Suivi des participations sous-jacentes
    description: |
      Suivi des participations sous-jacentes incluant les définitions de
      bénéfice net et les niveaux comptables.
  BC-3790.40:
    name: Conformité aux accords de guilde et de syndicat
    description: |
      Application des conventions collectives, soutien au reporting et à
      l'audit des guildes, et gestion des cotisations retraite et santé.
  BC-3790.40.10:
    name: Application des conventions collectives
    description: |
      Application des minima conventionnels, règles de travail et structures
      des heures supplémentaires sur les productions.
  BC-3790.40.20:
    name: Reporting et soutien à l'audit de guilde
    description: |
      Production des rapports de guilde et soutien aux audits de guilde sur les
      productions.
  BC-3790.40.30:
    name: Gestion des cotisations retraite et santé
    description: |
      Calcul et versement des cotisations retraite et santé aux régimes de
      guilde.
  BC-3790.50:
    name: Gestion de la relation avec les talents créatifs
    description: |
      Gestion des relations à long terme avec les talents créatifs et des
      programmes qui soutiennent l'engagement et le développement des talents.
  BC-3790.50.10:
    name: Gestion des relations à long terme avec les talents
    description: |
      Gestion des deals first-look, globaux et de pods à long terme avec les
      talents créatifs.
  BC-3790.50.20:
    name: Suivi de la performance des talents
    description: |
      Suivi de la contribution des talents et de leur performance créative sur
      les projets et les catalogues de production.
  BC-3790.50.30:
    name: Programmes d'engagement des talents
    description: |
      Programmes d'engagement incluant les ateliers d'écriture, résidences et
      fonds de développement pour les talents créatifs.

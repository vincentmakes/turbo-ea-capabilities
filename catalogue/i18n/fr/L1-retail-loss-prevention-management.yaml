locale: fr
source: L1-retail-loss-prevention-management.yaml
entries:
  BC-2340:
    name: Gestion de la prévention des pertes en distribution
    description: |
      Prévention, détection, investigation et réduction des pertes de stocks et des
      fraudes dans l'ensemble du réseau de distribution — du vol à l'étalage et de
      la délinquance organisée au vol interne et aux abus au point de vente.

  BC-2340.10:
    name: Gestion de l'analyse de la démarque
    description: |
      Mesure, analyse des causes profondes et reporting de la démarque sur les
      magasins, canaux et catégories.
    in_scope:
      - Mesure de la démarque par rapport au stock théorique
      - Reporting de la démarque par magasin, catégorie et cause
      - Analyse des causes profondes des pertes inconnues

  BC-2340.10.10:
    name: Mesure de la démarque
    description: |
      Mesure de la démarque par rapport au stock théorique et aux inventaires
      physiques.

  BC-2340.10.20:
    name: Analyse des causes profondes de la démarque
    description: |
      Analyse des causes profondes de la démarque entre pertes connues et inconnues.

  BC-2340.10.30:
    name: Reporting et objectifs de démarque
    description: |
      Reporting de la démarque et définition des objectifs de réduction par magasin
      et catégorie.

  BC-2340.20:
    name: Gestion des enquêtes sur les vols internes
    description: |
      Détection, investigation et résolution des actes de malhonnêteté des employés,
      incluant les mesures disciplinaires et les actions de recouvrement.

  BC-2340.20.10:
    name: Détection de la malhonnêteté des employés
    description: |
      Détection de la malhonnêteté des employés par signalements, analyses et
      audits.

  BC-2340.20.20:
    name: Instruction des enquêtes internes
    description: |
      Instruction des enquêtes internes incluant la gestion des preuves.

  BC-2340.20.30:
    name: Coordination du recouvrement et des mesures disciplinaires
    description: |
      Coordination du recouvrement, des mesures disciplinaires et des suites RH.

  BC-2340.30:
    name: Gestion des vols externes et de la délinquance organisée
    description: |
      Prévention et investigation du vol à l'étalage et de la délinquance
      organisée en commerce de détail, incluant la liaison avec les forces de
      l'ordre et les associations professionnelles.

  BC-2340.30.10:
    name: Prévention du vol à l'étalage
    description: |
      Prévention du vol à l'étalage par la dissuasion, l'aménagement et
      l'intervention.

  BC-2340.30.20:
    name: Investigation de la délinquance organisée
    description: |
      Investigation des réseaux et schémas de délinquance organisée en commerce
      de détail.

  BC-2340.30.30:
    name: Liaison avec les forces de l'ordre
    description: |
      Liaison avec la police et les forums sectoriels sur les affaires de
      délinquance en commerce de détail.

  BC-2340.40:
    name: Gestion de la prévention de la fraude au point de vente
    description: |
      Détection et prévention de la fraude au point de vente, incluant la fraude
      au remboursement, le vol en complicité et le reporting basé sur les exceptions.
    in_scope:
      - Détection de la fraude aux remboursements et échanges
      - Détection du vol en complicité et des abus de remise
      - Reporting basé sur les exceptions au PDV

  BC-2340.40.10:
    name: Détection de la fraude aux remboursements et échanges
    description: |
      Détection des schémas de fraude aux remboursements et aux échanges.

  BC-2340.40.20:
    name: Détection du vol en complicité et des abus de remise
    description: |
      Détection du vol en complicité et de l'application non autorisée de remises.

  BC-2340.40.30:
    name: Reporting basé sur les exceptions au PDV
    description: |
      Reporting basé sur les exceptions des transactions PDV pour identifier les
      anomalies.

  BC-2340.50:
    name: Gestion de la sécurité physique et de la surveillance
    description: |
      Sécurité physique au niveau du magasin incluant la vidéosurveillance, l'EAS,
      les contrôles d'accès et les services de gardiennage.

  BC-2340.50.10:
    name: Exploitation de la vidéosurveillance en magasin
    description: |
      Exploitation, surveillance et gestion des preuves issues de la
      vidéosurveillance en magasin.

  BC-2340.50.20:
    name: Exploitation de la surveillance électronique des articles
    description: |
      Exploitation des portiques EAS et du système d'étiquetage, incluant la
      réponse aux alarmes.

  BC-2340.50.30:
    name: Contrôle d'accès en magasin
    description: |
      Contrôle d'accès physique aux réserves, caisses et arrière-boutiques.

  BC-2340.50.40:
    name: Gestion des services de gardiennage
    description: |
      Déploiement et gestion des agents de sécurité en magasin et des prestataires
      de gardiennage.

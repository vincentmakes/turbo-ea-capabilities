locale: fr
source: L1-professional-licensing-and-standards-management.yaml
entries:
  BC-4380:
    name: Gestion des agréments et des normes professionnelles
    description: |
      Agrément et inscription du cabinet et des individus, dépôts auprès des
      organismes professionnels, développement professionnel continu, adoption
      de nouvelles normes professionnelles et gestion des enquêtes de conduite
      professionnelle, propres aux cabinets de services professionnels.
  BC-4380.10:
    name: Gestion des agréments et inscriptions du cabinet
    description: |
      Maintenance des agréments professionnels et inscriptions du cabinet auprès
      des autorités de surveillance de l'audit, des régulateurs du barreau et
      des autorités équivalentes dans les différentes juridictions.
  BC-4380.10.10:
    name: Maintenance des inscriptions du cabinet
    description: |
      Maintenance des inscriptions du cabinet telles que PCAOB, FRC RSB,
      inscription cabinet ICAEW, organisme reconnu SRA et autorisations ABS.
  BC-4380.10.20:
    name: Gestion du renouvellement des agréments du cabinet
    description: |
      Dépôts périodiques de renouvellement, paiements des droits et déclarations
      d'accompagnement pour les agréments du cabinet.
  BC-4380.10.30:
    name: Coordination des agréments multi-juridictions
    description: |
      Coordination des agréments du cabinet à travers les réseaux de membres
      et les juridictions.
  BC-4380.20:
    name: Gestion des certificats d'exercice individuels
    description: |
      Collecte et maintenance des certificats d'exercice individuels, des
      admissions au barreau, des qualifications d'audit et autres licences
      personnelles détenues par les professionnels.
  BC-4380.20.10:
    name: Collecte des certificats d'exercice
    description: |
      Collecte et vérification des certificats d'exercice et qualifications
      individuels.
  BC-4380.20.20:
    name: Suivi du renouvellement des certificats d'exercice
    description: |
      Suivi des cycles de renouvellement et des prérequis pour les certificats
      d'exercice individuels.
  BC-4380.20.30:
    name: Gestion des admissions transfrontalières
    description: |
      Gestion des admissions transfrontalières, du statut d'avocat étranger
      enregistré et des arrangements d'équivalence.
  BC-4380.30:
    name: Gestion de la formation professionnelle continue
    description: |
      Planification, réalisation et justification des heures de développement
      professionnel continu (DPC/CPD) requises par les organismes professionnels
      et la politique du cabinet.
    in_scope:
      - Planification du curriculum DPC
      - Réalisation et enregistrement des formations DPC
      - Justification du DPC et remédiation des insuffisances
    out_of_scope:
      - Formation et développement générique (BC-300)
  BC-4380.30.10:
    name: Suivi des exigences DPC
    description: |
      Suivi des exigences en heures DPC par professionnel, qualification
      et juridiction.
  BC-4380.30.20:
    name: Réalisation et enregistrement des formations DPC
    description: |
      Réalisation des formations DPC accréditées et enregistrement des
      présences et des preuves de complétion.
  BC-4380.30.30:
    name: Remédiation des insuffisances DPC
    description: |
      Identification et remédiation des professionnels à risque d'insuffisance
      DPC avant les échéances de déclaration.
  BC-4380.40:
    name: Reporting auprès des organismes professionnels
    description: |
      Déclarations et notifications périodiques aux organismes professionnels,
      aux autorités de surveillance et aux régulateurs sur les affaires du
      cabinet et des individus.
  BC-4380.40.10:
    name: Préparation des déclarations annuelles
    description: |
      Préparation des déclarations annuelles et des dépôts statistiques
      auprès des organismes professionnels et des autorités de surveillance.
  BC-4380.40.20:
    name: Déclaration des événements notifiables
    description: |
      Déclaration des événements notifiables tels que les démissions, les
      changements de direction et les manquements significatifs.
  BC-4380.40.30:
    name: Production des rapports de transparence
    description: |
      Production des rapports de transparence statutaires ou volontaires
      requis des cabinets d'audit et autres cabinets réglementés.
  BC-4380.50:
    name: Gestion de l'adoption des normes professionnelles
    description: |
      Adoption des normes professionnelles nouvelles et révisées dans la
      méthodologie, la politique et l'exécution des missions du cabinet.
  BC-4380.50.10:
    name: Veille sur les évolutions des normes
    description: |
      Veille sur les évolutions à venir des normes professionnelles et
      réglementaires pertinentes pour les pratiques du cabinet.
  BC-4380.50.20:
    name: Évaluation de l'impact des normes
    description: |
      Évaluation de l'impact sur la méthodologie, la formation et les outils
      découlant des normes nouvelles ou révisées.
  BC-4380.50.30:
    name: Déploiement de l'adoption des normes
    description: |
      Déploiement des mises à jour de méthodologie, de politique et d'outils
      implémentant les normes adoptées.
  BC-4380.60:
    name: Gestion des enquêtes de conduite professionnelle
    description: |
      Investigation interne, réponse aux enquêtes des organismes professionnels
      et gestion des réclamations en responsabilité civile professionnelle
      relatives à des manquements professionnels présumés.
  BC-4380.60.10:
    name: Investigation interne de conduite
    description: |
      Investigation interne des manquements présumés aux normes professionnelles
      ou à la politique de conduite du cabinet.
  BC-4380.60.20:
    name: Réponse aux enquêtes des organismes professionnels
    description: |
      Coordination des réponses du cabinet aux enquêtes des organismes
      professionnels et des tribunaux disciplinaires.
  BC-4380.60.30:
    name: Gestion des réclamations en responsabilité civile professionnelle
    description: |
      Gestion des réclamations en responsabilité civile professionnelle et
      des notifications aux assureurs découlant des travaux de mission.

locale: fr
source: L1-institutional-advancement-alumni-management.yaml
entries:
  BC-4800:
    name: Gestion du développement institutionnel et des relations avec les anciens étudiants
    description: |
      Engagement auprès des communautés d'anciens étudiants, cultivation des donateurs
      et gestion des campagnes de collecte de fonds, des dons, de l'intendance et
      du reporting aux donateurs lié aux dotations.
  BC-4800.10:
    name: Engagement des anciens étudiants
    description: |
      Engagement des communautés d'alumni à travers des programmes, des événements
      et des communications entretenant des relations durables avec l'établissement.
    in_scope:
      - Opérations des communautés alumni
      - Événements et retrouvailles des alumni
      - Communications avec les alumni
    out_of_scope:
      - Services de carrière pour les étudiants en cours de formation (couverts par la Gestion du soutien aux étudiants et du bien-être)
  BC-4800.10.10:
    name: Opérations des communautés alumni
    description: |
      Animation des associations d'alumni, des sections et des communautés en ligne.
  BC-4800.10.20:
    name: Événements et retrouvailles des alumni
    description: |
      Planification et organisation des événements et retrouvailles des alumni.
  BC-4800.10.30:
    name: Communications avec les alumni
    description: |
      Canaux éditoriaux et de communication destinés aux audiences alumni.
  BC-4800.20:
    name: Gestion des relations avec les donateurs
    description: |
      Identification, cultivation et gestion des relations avec les donateurs
      potentiels et existants.
    in_scope:
      - Recherche et identification des prospects
      - Cultivation et sollicitation des donateurs
      - Gestion des relations avec les grands donateurs
    out_of_scope:
      - Opérations générales de CRM (couvertes par la Gestion de la relation client – transverse)
  BC-4800.20.10:
    name: Recherche et identification des prospects
    description: |
      Recherche et identification des donateurs potentiels.
  BC-4800.20.20:
    name: Cultivation et sollicitation des donateurs
    description: |
      Cultivation et sollicitation du soutien des donateurs.
  BC-4800.20.30:
    name: Gestion des relations avec les grands donateurs
    description: |
      Gestion individualisée des relations avec les grands donateurs.
  BC-4800.30:
    name: Gestion des campagnes de collecte de fonds
    description: |
      Planification et mise en œuvre des campagnes de collecte de fonds sur les canaux
      de don annuel, de capital et numériques.
    in_scope:
      - Campagnes de dons annuels
      - Gestion des campagnes de capital
      - Campagnes de financement participatif et entre pairs
    out_of_scope:
      - Campagnes marketing sans lien avec la collecte de fonds (couvertes par la Gestion marketing – transverse)
  BC-4800.30.10:
    name: Campagnes de dons annuels
    description: |
      Mise en œuvre des campagnes de dons annuels et de dons récurrents.
  BC-4800.30.20:
    name: Gestion des campagnes de capital
    description: |
      Gestion des campagnes de capital pluriannuelles.
  BC-4800.30.30:
    name: Campagnes de financement participatif et entre pairs
    description: |
      Mise en œuvre des campagnes de financement participatif et entre pairs.
  BC-4800.40:
    name: Administration des dons et des promesses de don
    description: |
      Réception, enregistrement et administration des dons et des promesses de don,
      incluant les instruments de legs.
    in_scope:
      - Réception et traitement des dons
      - Suivi des promesses de don
      - Administration des dons planifiés et différés
    out_of_scope:
      - Comptes clients généraux (couverts par la Gestion financière – transverse)
  BC-4800.40.10:
    name: Réception et traitement des dons
    description: |
      Réception et traitement des dons en espèces, chèque, en ligne et en nature.
  BC-4800.40.20:
    name: Suivi des promesses de don
    description: |
      Suivi des promesses de don et des échéanciers de paiement.
  BC-4800.40.30:
    name: Administration des dons planifiés et différés
    description: |
      Administration des legs, fiducies charitables et autres instruments de dons planifiés.
  BC-4800.50:
    name: Intendance et reconnaissance des donateurs
    description: |
      Intendance des relations avec les donateurs à travers la reconnaissance, la
      valorisation et l'engagement continu des donateurs de fonds nominatifs.
    in_scope:
      - Remerciement des donateurs
      - Programmes de reconnaissance des donateurs
      - Intendance des fonds de dotation
    out_of_scope:
      - Communications de relations publiques (couvertes par la Gestion des communications corporate – transverse)
  BC-4800.50.10:
    name: Remerciement des donateurs
    description: |
      Remerciement des donateurs pour leurs dons et promesses de don.
  BC-4800.50.20:
    name: Programmes de reconnaissance des donateurs
    description: |
      Mise en œuvre des programmes et cercles de reconnaissance des donateurs.
  BC-4800.50.30:
    name: Intendance des fonds de dotation
    description: |
      Intendance des donateurs de fonds de dotation et de fonds nominatifs.
  BC-4800.60:
    name: Reporting aux donateurs lié aux dotations
    description: |
      Reporting aux donateurs sur l'utilisation, la performance et l'impact des
      fonds affectés et de dotation.
    in_scope:
      - Reporting sur l'utilisation des fonds affectés
      - Reporting de la performance des dotations nominatives
      - Reporting de l'impact pour les donateurs
    out_of_scope:
      - Reporting financier institutionnel (couvert par la Gestion financière – transverse)
      - Gestion des investissements de la dotation (couverte par la Gestion de la trésorerie – transverse)
  BC-4800.60.10:
    name: Reporting sur l'utilisation des fonds affectés
    description: |
      Reporting sur l'utilisation des fonds affectés et désignés par les donateurs.
  BC-4800.60.20:
    name: Reporting de la performance des dotations nominatives
    description: |
      Reporting de la performance des fonds de dotation nominatifs auprès de leurs donateurs.
  BC-4800.60.30:
    name: Reporting de l'impact pour les donateurs
    description: |
      Reporting des récits et résultats d'impact orientés vers les donateurs.

locale: fr
source: L1-sales-management.yaml
entries:
  BC-410:
    name: Gestion des ventes
    description: |
      Activités de la gestion des leads à la commande : comptes, pipeline, offres et devis.
  BC-410.10:
    name: Gestion de la stratégie commerciale
    description: |
      Modèle de couverture, segmentation et planification commerciale.
  BC-410.10.10:
    name: Conception du modèle de couverture commerciale
    description: |
      Définition des segments commerciaux, des territoires et des modèles de couverture.
  BC-410.10.20:
    name: Attribution des territoires et des comptes
    description: |
      Conception des territoires, attribution des comptes et rééquilibrage.
  BC-410.10.30:
    name: Fixation des objectifs commerciaux
    description: |
      Fixation des objectifs et quotas commerciaux descendants et ascendants.
  BC-410.10.40:
    name: Planification de la capacité commerciale
    description: |
      Planification de la capacité commerciale, de la montée en compétences et des effectifs.
  BC-410.20:
    name: Gestion de compte
    description: |
      Gestion des comptes stratégiques et grands comptes.
  BC-410.20.10:
    name: Planification des comptes
    description: |
      Plans de comptes stratégiques et analyse des opportunités non exploitées.
  BC-410.20.20:
    name: Gouvernance des grands comptes
    description: |
      Gouvernance et parrainage exécutif des grands comptes.
  BC-410.20.30:
    name: Développement des relations avec les comptes
    description: |
      Cartographie des relations et engagement des parties prenantes au sein des comptes.
  BC-410.20.40:
    name: Surveillance de la santé des comptes
    description: |
      Indicateurs de santé des comptes, tableaux de bord et surveillance du risque de renouvellement.
  BC-410.30:
    name: Gestion des opportunités et du pipeline commercial
    description: |
      Cycle de vie des leads, opportunités et transactions.
  BC-410.30.10:
    name: Qualification et transfert des leads
    description: |
      Qualification, scoring et transfert des leads depuis le marketing.
  BC-410.30.20:
    name: Gestion des opportunités
    description: |
      Création, qualification et progression des opportunités dans le cycle de vente.
  BC-410.30.30:
    name: Stratégie et poursuite des transactions
    description: |
      Poursuite stratégique des transactions, plans de conquête et revues de transactions.
  BC-410.30.40:
    name: Prévision du pipeline commercial
    description: |
      Couverture du pipeline, prévisions pondérées et engagements commerciaux.
  BC-410.40:
    name: Gestion des devis et de la configuration
    description: |
      CPQ : configuration, tarification et devis.
  BC-410.40.10:
    name: Configuration des produits
    description: |
      Configuration des produits et solutions avec règles et contraintes.
  BC-410.40.20:
    name: Génération des devis
    description: |
      Génération de devis et propositions commerciales prêts à l'envoi au client.
  BC-410.40.30:
    name: Workflow d'approbation des devis
    description: |
      Workflows d'approbation des remises et des conditions hors standard.
  BC-410.40.40:
    name: Conversion des devis en commandes et contrats
    description: |
      Conversion des devis acceptés en commandes et contrats.
  BC-410.50:
    name: Gestion des opérations commerciales
    description: |
      Processus commercial, outils et enablement.
  BC-410.50.10:
    name: Gouvernance du processus et de la méthodologie commerciale
    description: |
      Définition et intendance du processus et de la méthodologie de vente.
  BC-410.50.20:
    name: Technologie et outils commerciaux
    description: |
      Administration et intégration du CRM et des outils commerciaux.
  BC-410.50.30:
    name: Enablement commercial
    description: |
      Guides de vente, contenus d'enablement et certifications commerciales.
  BC-410.50.40:
    name: Données commerciales et hygiène du CRM
    description: |
      Qualité des données, gouvernance et programmes d'hygiène du CRM.
  BC-410.60:
    name: Gestion des ventes indirectes
    description: |
      Canaux indirects, distributeurs et revendeurs.
  BC-410.60.10:
    name: Recrutement de partenaires de distribution
    description: |
      Recrutement et intégration des distributeurs, revendeurs et agents.
  BC-410.60.20:
    name: Enablement des partenaires de distribution
    description: |
      Formation, certification et enablement des partenaires de distribution.
  BC-410.60.30:
    name: Gestion du programme de distribution
    description: |
      Niveaux du programme de distribution, incitations et règles d'engagement.
  BC-410.60.40:
    name: Gestion de la performance des partenaires
    description: |
      Suivi des ventes sorties, ventes finales et indicateurs de performance des partenaires.
  BC-410.70:
    name: Gestion de la performance commerciale
    description: |
      Plans de rémunération, gestion des quotas et analytique commerciale.
  BC-410.70.10:
    name: Conception des plans de rémunération commerciale
    description: |
      Conception des plans de rémunération variable, accélérateurs et primes ponctuelles.
  BC-410.70.20:
    name: Gestion des quotas et des attributions
    description: |
      Allocation des quotas, règles d'attribution et reports.
  BC-410.70.30:
    name: Calcul des commissions commerciales
    description: |
      Calcul, validation et versement des commissions commerciales.
  BC-410.70.40:
    name: Analytique de la performance commerciale
    description: |
      Analytique des victoires/défaites, de la productivité et de la performance individuelle.

locale: fr
source: L1-engineering-tendering-estimation-management.yaml
entries:
  BC-1140:
    name: Gestion des appels d'offres et de l'estimation en ingénierie
    description: |
      Préparation des offres et développement des propositions techniques et commerciales.
  BC-1140.10:
    name: Gestion de la décision de soumissionner
    description: |
      Qualification des opportunités, décisions stratégiques de soumission et plan de capture.
  BC-1140.10.10:
    name: Qualification des opportunités
    description: |
      Qualification des opportunités selon les critères de soumission.
  BC-1140.10.20:
    name: Gouvernance de la décision de soumissionner
    description: |
      Gouvernance des décisions de soumission et approbations aux jalons.
  BC-1140.10.30:
    name: Planification de la capture commerciale
    description: |
      Plans de capture, thèmes gagnants et positionnement concurrentiel.
  BC-1140.20:
    name: Gestion de l'estimation en ingénierie
    description: |
      Heures d'ingénierie, facteurs de complexité et estimation basée sur les livrables.
  BC-1140.20.10:
    name: Estimation des heures d'ingénierie
    description: |
      Estimation ascendante des heures d'ingénierie par discipline.
  BC-1140.20.20:
    name: Normes et références d'estimation
    description: |
      Tenue des normes, facteurs et références d'estimation.
  BC-1140.20.30:
    name: Estimation basée sur les livrables
    description: |
      Estimation basée sur les livrables incluant les facteurs de complexité.
  BC-1140.30:
    name: Gestion de l'estimation des coûts et délais
    description: |
      Estimation du coût de construction, du coût des équipements et du planning du projet.
  BC-1140.30.10:
    name: Estimation du coût des équipements
    description: |
      Estimation du coût des équipements par devis et méthodes paramétriques.
  BC-1140.30.20:
    name: Estimation du coût de construction
    description: |
      Estimation du coût de construction selon la classification AACE.
  BC-1140.30.30:
    name: Estimation du planning du projet
    description: |
      Estimation du planning du projet par les méthodes descendante et ascendante.
  BC-1140.30.40:
    name: Assurance qualité de l'estimation
    description: |
      Assurance qualité indépendante des estimations et comparaison aux références.
  BC-1140.40:
    name: Gestion du développement des propositions
    description: |
      Rédaction des propositions techniques et commerciales, gestion des offres.
  BC-1140.40.10:
    name: Rédaction de la proposition technique
    description: |
      Rédaction des sections techniques de la proposition.
  BC-1140.40.20:
    name: Rédaction de la proposition commerciale
    description: |
      Rédaction des sections commerciales et des tableaux de prix de la proposition.
  BC-1140.40.30:
    name: Production et revue de la proposition
    description: |
      Production de la proposition, revues de couleur et vérification finale de conformité.
  BC-1140.50:
    name: Gestion de la soumission des offres
    description: |
      Processus de soumission, clarifications, négociations et attribution du contrat.
  BC-1140.50.10:
    name: Logistique de la soumission
    description: |
      Logistique de soumission et conformité aux plateformes de dépôt.
  BC-1140.50.20:
    name: Gestion des demandes de clarification
    description: |
      Traitement des demandes de clarification avant et après la soumission.
  BC-1140.50.30:
    name: Négociation et attribution
    description: |
      Appui à la négociation et passation de marché vers l'équipe de réalisation.
  BC-1140.60:
    name: Gestion de la tarification et des marges des appels d'offres
    description: |
      Stratégie de tarification, analyse des marges, tarification des contingences et des risques.
  BC-1140.60.10:
    name: Stratégie de tarification de l'offre
    description: |
      Stratégie de tarification de l'offre et positionnement concurrentiel.
  BC-1140.60.20:
    name: Fixation des marges et des contingences
    description: |
      Décisions relatives aux marges, contingences et tarification des risques.
  BC-1140.60.30:
    name: Provision pour risque dans l'offre
    description: |
      Provisions pour risque intégrées dans les offres sur la base du registre des risques.
  BC-1140.60.40:
    name: Gouvernance d'approbation des offres
    description: |
      Jalons d'approbation des prix et gouvernance de la direction générale.

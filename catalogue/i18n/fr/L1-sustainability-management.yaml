locale: fr
source: L1-sustainability-management.yaml
entries:
  BC-740:
    name: Gestion du développement durable
    description: |
      Stratégie ESG, climat, économie circulaire et reporting en matière de durabilité.
  BC-740.10:
    name: Gestion de la stratégie et du reporting ESG
    description: |
      Stratégie ESG, matérialité et rapports de durabilité.
  BC-740.10.10:
    name: Développement de la stratégie ESG
    description: |
      Stratégie ESG, ambitions et intégration à la stratégie d'entreprise.
  BC-740.10.20:
    name: Évaluation de la matérialité
    description: |
      Évaluations de matérialité simple et double conformément aux ESRS / GRI.
  BC-740.10.30:
    name: Reporting et publication en matière de durabilité
    description: |
      Production de rapports de durabilité et de publications (CSRD, IFRS S1/S2, GRI).
  BC-740.10.40:
    name: Gestion et assurance des données ESG
    description: |
      Collecte des données ESG, contrôles et assurance externe.
  BC-740.20:
    name: Gestion du climat et du carbone
    description: |
      Empreinte carbone, décarbonation et publications sur le climat.
  BC-740.20.10:
    name: Gestion de l'inventaire des GES
    description: |
      Inventaire des gaz à effet de serre des scopes 1, 2 et 3 selon le Protocole GES.
  BC-740.20.20:
    name: Gestion de la feuille de route de décarbonation
    description: |
      Objectifs fondés sur la science et planification de la feuille de route de décarbonation.
  BC-740.20.30:
    name: Analyse des risques climatiques et des scénarios
    description: |
      Risques climatiques physiques et de transition et scénarios alignés sur la TCFD.
  BC-740.20.40:
    name: Gestion des crédits et compensations carbone
    description: |
      Acquisition et utilisation de crédits et compensations carbone.
  BC-740.20.50:
    name: Approvisionnement en énergie renouvelable
    description: |
      Contrats d'achat d'électricité (PPA), certificats d'énergie renouvelable et approvisionnement en énergie verte.
  BC-740.30:
    name: Gestion de l'économie circulaire
    description: |
      Circularité, réduction des déchets et programmes de reprise.
  BC-740.30.10:
    name: Éco-conception des produits
    description: |
      Conception pour la réparation, le réemploi, le recyclage et la réduction de l'utilisation des matériaux.
  BC-740.30.20:
    name: Programmes de reprise et de réemploi
    description: |
      Programmes de reprise client, de remise en état et de revente.
  BC-740.30.30:
    name: Recyclage et valorisation des matériaux
    description: |
      Programmes de recyclage et réutilisation des matériaux récupérés.
  BC-740.30.40:
    name: Durabilité des emballages
    description: |
      Conception d'emballages durables et conformité à la responsabilité élargie du producteur.
  BC-740.40:
    name: Gestion des achats durables
    description: |
      Chaîne d'approvisionnement durable et achats responsables.
  BC-740.40.10:
    name: Standards de durabilité fournisseurs
    description: |
      Code de conduite fournisseurs et standards de durabilité.
  BC-740.40.20:
    name: Évaluation ESG des fournisseurs
    description: |
      Notations ESG, audits et évaluations des fournisseurs.
  BC-740.40.30:
    name: Diligence raisonnable en matière de droits humains
    description: |
      Diligence raisonnable sur les droits humains et le travail forcé dans les chaînes d'approvisionnement.
  BC-740.40.40:
    name: Approvisionnement responsable en matières premières
    description: |
      Approvisionnement responsable en minerais de conflit, bois et matières premières.
  BC-740.50:
    name: Mobilisation des parties prenantes en matière de durabilité
    description: |
      Engagement des ONG, des communautés et des agences de notation ESG.
  BC-740.50.10:
    name: Engagement des ONG et de la société civile
    description: |
      Engagement avec les ONG et la société civile sur les questions de durabilité.
  BC-740.50.20:
    name: Investissement communautaire
    description: |
      Investissement communautaire, philanthropie et programmes à impact social.
  BC-740.50.30:
    name: Engagement auprès des agences de notation ESG
    description: |
      Engagement avec les agences de notation ESG et les indices de durabilité.
  BC-740.50.40:
    name: Politique publique et plaidoyer
    description: |
      Plaidoyer en faveur de politiques publiques sur les enjeux de durabilité.

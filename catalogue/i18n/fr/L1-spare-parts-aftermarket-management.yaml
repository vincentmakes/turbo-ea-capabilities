locale: fr
source: L1-spare-parts-aftermarket-management.yaml
entries:
  BC-1060:
    name: Gestion des pièces détachées et de l'après-vente
    description: |
      Approvisionnement en pièces détachées, ventes et services après-vente pour la base installée.
  BC-1060.10:
    name: Gestion du catalogue de pièces détachées
    description: |
      Catalogue, identification et gestion des substitutions de pièces.
  BC-1060.10.10:
    name: Identification des pièces détachées
    description: |
      Identification des pièces, y compris les catalogues illustrés de pièces détachées.
  BC-1060.10.20:
    name: Gestion des substitutions de pièces
    description: |
      Gestion des substitutions et équivalences de pièces.
  BC-1060.10.30:
    name: Publication du catalogue
    description: |
      Publication et diffusion des catalogues de pièces détachées.
  BC-1060.20:
    name: Gestion de la tarification des pièces détachées
    description: |
      Stratégie de prix, tarifs publics et tarification spécifique aux clients.
  BC-1060.20.10:
    name: Stratégie de tarification des pièces
    description: |
      Stratégie de tarification et segmentation pour les pièces détachées.
  BC-1060.20.20:
    name: Fixation des prix des pièces
    description: |
      Fixation des tarifs publics et tarification des pièces selon la valeur.
  BC-1060.20.30:
    name: Tarification spécifique aux clients
    description: |
      Tarification spécifique aux clients et tarification contractuelle pour les pièces.
  BC-1060.30:
    name: Prévision de la demande de pièces détachées
    description: |
      Prévision de la demande de pièces (articles à rotation lente, demande intermittente).
  BC-1060.30.10:
    name: Prévision de la demande intermittente
    description: |
      Prévision de la demande pour les pièces à rotation lente et à demande intermittente.
  BC-1060.30.20:
    name: Prévision basée sur la base installée
    description: |
      Prévision de la demande fondée sur les données de la base installée.
  BC-1060.30.30:
    name: Plan de stockage des pièces
    description: |
      Plans de stockage des pièces dans les centres de distribution.
  BC-1060.40:
    name: Gestion des ventes après-vente
    description: |
      Ventes commerciales après-vente, renouvellements et ventes additionnelles.
  BC-1060.40.10:
    name: Génération de leads après-vente
    description: |
      Génération de leads après-vente à partir des données de la base installée.
  BC-1060.40.20:
    name: Gestion des commandes après-vente
    description: |
      Saisie et traitement des commandes après-vente.
  BC-1060.40.30:
    name: Ventes croisées et additionnelles après-vente
    description: |
      Ventes croisées et additionnelles de produits et services après-vente.
  BC-1060.50:
    name: Gestion des services et des réparations
    description: |
      Réparations, unités d'échange et remise en état.
  BC-1060.50.10:
    name: Opérations de l'atelier de réparation
    description: |
      Exploitation des ateliers de réparation centraux.
  BC-1060.50.20:
    name: Gestion du pool d'unités d'échange
    description: |
      Gestion des pools d'unités d'échange et de pièces rotatives.
  BC-1060.50.30:
    name: Opérations de remise en état
    description: |
      Remise en état, révision et recertification des pièces retournées.
  BC-1060.60:
    name: Gestion des garanties
    description: |
      Droits à garantie, réclamations et recouvrement.
  BC-1060.60.10:
    name: Gestion de la politique de garantie
    description: |
      Définition des conditions de garantie, durées et exclusions.
  BC-1060.60.20:
    name: Traitement des réclamations sous garantie
    description: |
      Saisie et examen des réclamations de garantie des clients.
  BC-1060.60.30:
    name: Recouvrement de garantie auprès des fournisseurs
    description: |
      Recouvrement des coûts de garantie auprès des fournisseurs.
  BC-1060.60.40:
    name: Gestion des provisions pour garantie
    description: |
      Estimation et comptabilisation des provisions pour garantie.
  BC-1060.70:
    name: Gestion de la base installée
    description: |
      Données de la base installée, connectivité des actifs et analyse du cycle de vie.
  BC-1060.70.10:
    name: Gestion des données de la base installée
    description: |
      Saisie et gestion des données de la base installée.
  BC-1060.70.20:
    name: Opérations des actifs connectés
    description: |
      Exploitation des actifs connectés et télémétrie IoT.
  BC-1060.70.30:
    name: Analytique de la base installée
    description: |
      Analyse de l'utilisation, de l'état et du cycle de vie de la base installée.

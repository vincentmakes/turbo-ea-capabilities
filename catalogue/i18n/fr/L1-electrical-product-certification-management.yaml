locale: fr
source: L1-electrical-product-certification-management.yaml
entries:
  BC-1910:
    name: Gestion de la certification des produits électriques
    description: |
      Certification de sécurité des produits, EMC et énergétique multi-juridiction — stratégie,
      dossiers techniques, engagement auprès des organismes de certification, licence de marque,
      surveillance et gestion des non-conformités sur le terrain.
  BC-1910.10:
    name: Stratégie et feuille de route de certification
    description: |
      Définition des marques et homologations requises ainsi que de leur séquençage.
  BC-1910.10.10:
    name: Analyse des exigences d'accès au marché
    description: |
      Identification des exigences de certification par marché cible.
  BC-1910.10.20:
    name: Sélection du schéma de certification
    description: |
      Sélection des schémas de certification et des voies de reconnaissance.
  BC-1910.10.30:
    name: Planification de la feuille de route de certification
    description: |
      Séquençage des homologations par rapport aux jalons de lancement produit.
  BC-1910.20:
    name: Gestion du dossier technique et des preuves
    description: |
      Rédaction et gestion des dossiers de construction technique et des preuves à l'appui.
  BC-1910.20.10:
    name: Rédaction du dossier de construction technique
    description: |
      Rédaction des dossiers de construction technique à l'appui de l'homologation de type.
  BC-1910.20.20:
    name: Agrégation des rapports d'essai
    description: |
      Agrégation et indexation des rapports d'essai accrédités.
  BC-1910.20.30:
    name: Rédaction de la déclaration de conformité
    description: |
      Rédaction et signature des déclarations de conformité.
  BC-1910.20.40:
    name: Archive des preuves de conformité
    description: |
      Archivage à long terme des preuves de conformité conformément aux exigences réglementaires de conservation.
  BC-1910.30:
    name: Gestion des organismes de certification et des homologations
    description: |
      Engagement auprès des organismes notifiés et des organismes de certification nationaux jusqu'à la délivrance de l'homologation de type.
  BC-1910.30.10:
    name: Sélection de l'organisme notifié
    description: |
      Sélection des organismes notifiés et des organismes de certification nationaux.
  BC-1910.30.20:
    name: Gestion des soumissions de certification
    description: |
      Soumission des dossiers de certification et coordination du suivi.
  BC-1910.30.30:
    name: Coordination des essais témoins
    description: |
      Coordination des essais témoins réalisés par des auditeurs dans des laboratoires fournisseurs ou internes.
  BC-1910.30.40:
    name: Suivi de la délivrance des homologations de type
    description: |
      Suivi des homologations de type délivrées et de la validité des certificats.
  BC-1910.40:
    name: Licence de marque et conformité des étiquettes
    description: |
      Licence des marques de certification et contrôle des maquettes d'étiquetage des produits.
  BC-1910.40.10:
    name: Autorisation d'utilisation de la marque
    description: |
      Autorisation d'utilisation de la marque sur les produits certifiés.
  BC-1910.40.20:
    name: Contrôle des maquettes d'étiquette produit
    description: |
      Contrôle du contenu des étiquettes, du marquage et des maquettes de plaque signalétique.
  BC-1910.40.30:
    name: Déclaration des redevances de marque
    description: |
      Déclaration des volumes d'unités au titre des obligations de redevances de marque.
  BC-1910.50:
    name: Surveillance et renouvellement des homologations
    description: |
      Maintien des homologations par le biais d'audits de surveillance, de modifications et de renouvellements.
  BC-1910.50.10:
    name: Coordination des inspections d'usine
    description: |
      Coordination des inspections d'usine par les certificateurs et des actions de suivi.
  BC-1910.50.20:
    name: Essais de surveillance périodiques
    description: |
      Réessais de surveillance des produits certifiés par rapport à la référence initiale.
  BC-1910.50.30:
    name: Dépôt de modifications d'homologation
    description: |
      Dépôt des modifications et des changements d'ingénierie sur les homologations délivrées.
  BC-1910.50.40:
    name: Gestion du renouvellement des homologations
    description: |
      Renouvellement des homologations et certificats arrivant à expiration.
  BC-1910.60:
    name: Gestion des incidents de conformité sur le terrain
    description: |
      Traitement des non-conformités produit découvertes après la mise sur le marché.
  BC-1910.60.10:
    name: Triage des incidents de non-conformité
    description: |
      Triage des non-conformités produit suspectées signalées depuis le terrain.
  BC-1910.60.20:
    name: Notification aux autorités réglementaires
    description: |
      Notification obligatoire aux autorités et aux certificateurs en cas de non-conformités confirmées.
  BC-1910.60.30:
    name: Coordination des rappels et des blocages d'expédition
    description: |
      Coordination des rappels, des ordres de blocage d'expédition et des campagnes d'actions correctives.

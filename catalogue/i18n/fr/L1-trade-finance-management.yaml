locale: fr
source: L1-trade-finance-management.yaml
entries:
  BC-1350:
    name: Gestion du financement du commerce international
    description: |
      Crédits documentaires, garanties, financement de la chaîne d'approvisionnement et prêts commerciaux.
  BC-1350.10:
    name: Gestion des crédits documentaires
    description: |
      Lettres de crédit à l'import et à l'export.
  BC-1350.10.10:
    name: Émission de lettres de crédit
    description: |
      Émission de lettres de crédit à l'import conformément aux RUU 600.
  BC-1350.10.20:
    name: Notification et confirmation des lettres de crédit
    description: |
      Notification et confirmation des lettres de crédit à l'export.
  BC-1350.10.30:
    name: Examen des documents et vérification de la conformité
    description: |
      Examen des documents au regard de la conformité aux RUU et RPIS.
  BC-1350.10.40:
    name: Règlement et remboursement sous lettre de crédit
    description: |
      Règlement et remboursement dans le cadre des crédits documentaires.
  BC-1350.20:
    name: Gestion des garanties et des lettres de crédit stand-by
    description: |
      Garanties bancaires, lettres de crédit stand-by et cautions de bonne exécution.
  BC-1350.20.10:
    name: Émission de garanties bancaires
    description: |
      Émission de garanties bancaires et de cautions de bonne exécution.
  BC-1350.20.20:
    name: Émission de lettres de crédit stand-by
    description: |
      Émission de lettres de crédit stand-by conformément aux ISP98.
  BC-1350.20.30:
    name: Traitement des appels en garantie
    description: |
      Traitement des demandes et appels en garantie.
  BC-1350.20.40:
    name: Amendements et annulation des garanties
    description: |
      Amendements, prorogations et annulation des garanties.
  BC-1350.30:
    name: Gestion des remises documentaires
    description: |
      Remises documentaires D/P et D/A.
  BC-1350.30.10:
    name: Opérations de documents contre paiement
    description: |
      Opérations de remise D/P conformément aux RUE 522.
  BC-1350.30.20:
    name: Opérations de documents contre acceptation
    description: |
      Opérations de remise D/A incluant les effets.
  BC-1350.30.30:
    name: Règlement des remises
    description: |
      Règlement et remise de fonds dans le cadre des remises documentaires.
  BC-1350.40:
    name: Gestion du financement de la chaîne d'approvisionnement
    description: |
      Affacturage inversé, financement des fournisseurs et escompte dynamique.

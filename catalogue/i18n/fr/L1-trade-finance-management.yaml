    name: Financement des fournisseurs à l'initiative de l'acheteur
    description: |
      Programmes d'affacturage inversé et de financement des fournisseurs à l'initiative de l'acheteur.
  BC-1350.40.20:
    name: Programmes de financement des créances
    description: |
      Financement des créances et affacturage pour les vendeurs.
  BC-1350.40.30:
    name: Opérations d'escompte dynamique
    description: |
      Plateformes d'escompte dynamique et calcul des décotes.
  BC-1350.50:
    name: Gestion des prêts commerciaux
    description: |
      Financement commercial avant et après exportation.
  BC-1350.50.10:
    name: Financement commercial avant exportation
    description: |
      Financement du fonds de roulement et de la production avant exportation.
  BC-1350.50.20:
    name: Financement commercial après exportation
    description: |
      Escompte et forfaitage après exportation.
  BC-1350.50.30:
    name: Financement commercial à l'importation
    description: |
      Financement à l'importation incluant les crédits relais et les warrants.

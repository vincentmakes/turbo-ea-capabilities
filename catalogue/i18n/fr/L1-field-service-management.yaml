locale: fr
source: L1-field-service-management.yaml
entries:
  BC-1050:
    name: Gestion du service sur site
    description: |
      Service sur la base installée, techniciens de terrain, réparation et mise en service sur site.
  BC-1050.10:
    name: Gestion des demandes de service
    description: |
      Saisie, tri et qualification des demandes de service.
  BC-1050.10.10:
    name: Réception des demandes de service
    description: |
      Réception multicanal des demandes de service client.
  BC-1050.10.20:
    name: Tri des demandes de service
    description: |
      Tri, classification et acheminement des demandes de service.
  BC-1050.10.30:
    name: Diagnostic à distance et résolution
    description: |
      Diagnostic à distance et résolution au premier contact à distance.
  BC-1050.20:
    name: Gestion de la planification et de l'envoi des techniciens
    description: |
      Planification, optimisation des tournées et envoi des techniciens.
  BC-1050.20.10:
    name: Planification des techniciens
    description: |
      Planification des techniciens selon les compétences et la disponibilité.
  BC-1050.20.20:
    name: Optimisation des tournées
    description: |
      Optimisation des itinéraires et des déplacements pour les interventions.
  BC-1050.20.30:
    name: Exécution des envois
    description: |
      Envoi et réaffectation en temps réel des missions de service.
  BC-1050.30:
    name: Gestion de l'exécution du service
    description: |
      Exécution des interventions sur site et compte rendu.
  BC-1050.30.10:
    name: Exécution des interventions sur site
    description: |
      Exécution des tâches de service sur site conformément à l'ordre de travail.
  BC-1050.30.20:
    name: Saisie de la documentation de service
    description: |
      Saisie des notes d'intervention, photos et signatures.
  BC-1050.30.30:
    name: Gestion de l'acceptation client
    description: |
      Signature et acceptation du client à la fin du service.
  BC-1050.40:
    name: Gestion des pièces de service
    description: |
      Pièces déployées sur le terrain, stock véhicule et réapprovisionnement.
  BC-1050.40.10:
    name: Gestion du stock véhicule
    description: |
      Définition et gestion du stock embarqué et des stocks avancés.
  BC-1050.40.20:
    name: Réapprovisionnement des pièces de service
    description: |
      Réapprovisionnement des stocks avancés et des techniciens.
  BC-1050.40.30:
    name: Retours de pièces de service
    description: |
      Retours de pièces inutilisées, défectueuses ou réparables depuis le terrain.
  BC-1050.50:
    name: Gestion des contrats de service
    description: |
      Contrats de service, SLA et droits à service.
  BC-1050.50.10:
    name: Rédaction des contrats de service
    description: |
      Rédaction des contrats de service, niveaux de service et conditions.
  BC-1050.50.20:
    name: Gestion des droits à service
    description: |
      Vérification des droits lors de la demande de service et de l'envoi.
  BC-1050.50.30:
    name: Renouvellement des contrats de service
    description: |
      Renouvellement et révision des contrats de service.
  BC-1050.50.40:
    name: Facturation du service
    description: |
      Facturation des contrats de service et des travaux en régie.
  BC-1050.60:
    name: Gestion de la performance du service sur site
    description: |
      Résolution au premier passage, délais de réponse, NPS et productivité des techniciens.
  BC-1050.60.10:
    name: Suivi de la résolution au premier passage
    description: |
      Mesure et amélioration du taux de résolution au premier passage.
  BC-1050.60.20:
    name: Suivi des délais de réponse et de résolution
    description: |
      Suivi des délais de réponse et de résolution selon les SLA.
  BC-1050.60.30:
    name: Reporting de la productivité des techniciens
    description: |
      Reporting du taux d'utilisation, du temps productif et de la productivité des techniciens.
  BC-1050.60.40:
    name: NPS et satisfaction du service
    description: |
      Mesure du NPS et de la satisfaction liés au service.

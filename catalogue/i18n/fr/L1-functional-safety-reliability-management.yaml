locale: fr
source: L1-functional-safety-reliability-management.yaml
entries:
  BC-1970:
    name: Gestion de la sécurité fonctionnelle et de la fiabilité
    description: |
      Analyse de sécurité fonctionnelle au niveau produit (IEC 61508/61511/13849, ISO 26262)
      et ingénierie de fiabilité — distincte de la qualité générique et de l'exécution des essais de production.
  BC-1970.10:
    name: Gestion de l'analyse de sécurité fonctionnelle
    description: |
      Analyse des risques et des dangers, et analyse du concept de sécurité pour les produits électriques liés à la sécurité.
  BC-1970.10.10:
    name: Analyse des dangers et des risques
    description: |
      Identification des dangers et analyse des risques pour les produits liés à la sécurité.
  BC-1970.10.20:
    name: Définition du concept de sécurité
    description: |
      Définition des concepts de sécurité fonctionnels et techniques.
  BC-1970.10.30:
    name: Allocation des exigences de sécurité
    description: |
      Allocation des exigences de sécurité aux sous-systèmes et composants.
  BC-1970.10.40:
    name: Rédaction du dossier de sécurité
    description: |
      Rédaction des dossiers de sécurité à l'appui de la mise en production.
  BC-1970.20:
    name: Détermination du niveau d'intégrité de sécurité
    description: |
      Définition des objectifs d'intégrité conformément à IEC 61508, ISO 26262 et ISO 13849.
  BC-1970.20.10:
    name: Définition des objectifs SIL
    description: |
      Détermination des niveaux d'intégrité de sécurité conformément à IEC 61508.
  BC-1970.20.20:
    name: Décomposition ASIL
    description: |
      Décomposition ASIL pour l'électronique automobile liée à la sécurité.
  BC-1970.20.30:
    name: Détermination du niveau de performance
    description: |
      Détermination du niveau de performance conformément à ISO 13849.
  BC-1970.30:
    name: Gestion de l'ingénierie de fiabilité
    description: |
      Définition des exigences de fiabilité, prédiction, allocation et planification de la croissance.
  BC-1970.30.10:
    name: Définition des exigences de fiabilité
    description: |
      Définition des exigences de fiabilité alignées sur les profils de mission.
  BC-1970.30.20:
    name: Modélisation de la prédiction de fiabilité
    description: |
      Modélisation de la prédiction par les méthodes de comptage de composants et de contrainte.
  BC-1970.30.30:
    name: Allocation de fiabilité
    description: |
      Allocation descendante des budgets de fiabilité aux sous-systèmes.
  BC-1970.30.40:
    name: Planification de la croissance de fiabilité
    description: |
      Planification de la croissance de fiabilité et des actions correctives.
  BC-1970.40:
    name: Déclassement des composants et analyse des contraintes
    description: |
      Analyse des contraintes électriques, thermiques et mécaniques et déclassement des composants.
  BC-1970.40.10:
    name: Déclassement des contraintes électriques
    description: |
      Application des règles de déclassement électrique aux composants.
  BC-1970.40.20:
    name: Déclassement thermique
    description: |
      Analyse de déclassement thermique pour les composants dans leur environnement de fonctionnement.
  BC-1970.40.30:
    name: Analyse des contraintes mécaniques
    description: |
      Analyse des contraintes mécaniques et de la fatigue des composants.
  BC-1970.50:
    name: Analyse des modes de défaillance
    description: |
      AMDEC de conception et de procédé, et analyse de criticité FMECA.
  BC-1970.50.10:
    name: AMDEC de conception
    description: |
      Analyse des modes de défaillance et de leurs effets en conception des produits.
  BC-1970.50.20:
    name: AMDEC de procédé
    description: |
      Analyse des modes de défaillance et de leurs effets en production.
  BC-1970.50.30:
    name: Analyse de criticité FMECA
    description: |
      Analyse de criticité superposée aux résultats de l'AMDEC.
  BC-1970.60:
    name: Gestion des défaillances terrain et de la croissance de fiabilité
    description: |
      Collecte et analyse des données de défaillances terrain pour la croissance de fiabilité.
  BC-1970.60.10:
    name: Collecte des données de défaillances terrain
    description: |
      Collecte des données de défaillance à partir du parc installé.
  BC-1970.60.20:
    name: Analyse des tendances de modes de défaillance
    description: |
      Analyse des tendances sur les modes de défaillance observés.
  BC-1970.60.30:
    name: Suivi de la croissance de fiabilité
    description: |
      Suivi de la croissance de fiabilité entre les générations de produits.
  BC-1970.70:
    name: Coordination de la certification de sécurité fonctionnelle
    description: |
      Engagement auprès des évaluateurs de sécurité fonctionnelle et des organismes de certification.
  BC-1970.70.10:
    name: Engagement auprès des évaluateurs de sécurité fonctionnelle
    description: |
      Engagement auprès d'évaluateurs indépendants de sécurité fonctionnelle.
  BC-1970.70.20:
    name: Soumission de certification de sécurité
    description: |
      Soumission des dossiers de sécurité fonctionnelle pour certification.
  BC-1970.70.30:
    name: Surveillance de la sécurité fonctionnelle
    description: |
      Audits de surveillance périodiques des processus de sécurité fonctionnelle.

locale: fr
source: L1-real-estate-brokerage-management.yaml
entries:
  BC-4960:
    name: Gestion du courtage immobilier
    description: |
      Courtage et intermédiation immobilière en tant que ligne de service pour
      l'immobilier commercial et résidentiel — acquisition de mandats de vente,
      représentation des acquéreurs et locataires, gestion des données MLS, analyse
      comparative, opérations de visites, négociation des offres, coordination de
      la clôture, règlement des commissions et des courtiers co-mandataires, et
      gestion de la productivité et du registre des agents.
    in_scope:
      - Acquisition et représentation des mandats vendeurs/bailleurs
      - Engagement et représentation des acquéreurs/locataires
      - Capture, diffusion et conformité des annonces MLS
      - Analyse comparative de marché et avis de valeur courtier
      - Opérations de visites, portes ouvertes et boîtes à clés/accès numérique
      - Rédaction des offres, contre-offres et gestion des offres multiples
      - Coordination de la clôture et suivi des conditions suspensives
      - Règlement des commissions, des courtiers co-mandataires et des honoraires de référencement
      - Licence, parrainage, performance et plans de commission des agents
    out_of_scope:
      - Opérations de location côté bailleur sur actifs détenus (BC-4950)
      - Exécution des acquisitions/cessions par les mandants (BC-4930)
      - Missions d'évaluation immobilière (BC-4970)
      - Conformité réglementaire de la licence des courtiers/agents (BC-4990)
  BC-4960.10:
    name: Acquisition et représentation des mandats
    description: |
      Démarchage et conversion des mandats vendeurs/bailleurs et exécution du plan
      de commercialisation engagé dans le mandat.
  BC-4960.10.10:
    name: Prospection et remise du mandat
    description: |
      Prospection pour l'obtention de mandats incluant l'analyse comparative de marché,
      la proposition de commercialisation et la présentation.
  BC-4960.10.20:
    name: Gestion des mandats
    description: |
      Gestion des mandats incluant l'exclusivité, la durée et les conditions de
      commission.
  BC-4960.10.30:
    name: Plan de commercialisation du mandat
    description: |
      Définition et exécution du plan de commercialisation engagé dans le mandat.
  BC-4960.20:
    name: Représentation des acquéreurs et des locataires
    description: |
      Engagement et exécution des mandats de représentation côté acquéreur et locataire
      incluant la recherche et la présélection.
  BC-4960.20.10:
    name: Engagement des acquéreurs / locataires
    description: |
      Engagement des clients acquéreurs et locataires incluant les mandats de
      représentation et les divulgations.
  BC-4960.20.20:
    name: Définition des besoins et du cahier des charges
    description: |
      Définition du cahier des charges client couvrant l'usage, la surface, la
      localisation et le budget.
  BC-4960.20.30:
    name: Recherche et présélection de biens
    description: |
      Recherche, présélection et présentation de biens candidats au client.
  BC-4960.30:
    name: Gestion des annonces et des données MLS
    description: |
      Gestion des données d'annonces MLS et portails incluant la capture, les médias,
      la diffusion et la conformité aux standards de données RESO.
  BC-4960.30.10:
    name: Capture des annonces MLS
    description: |
      Capture des annonces MLS selon les champs et règles du dictionnaire de données RESO.
  BC-4960.30.20:
    name: Médias et photographie des annonces
    description: |
      Production et gestion des médias d'annonces incluant photographies, vidéos
      et visites 3D.
  BC-4960.30.30:
    name: Diffusion sur les portails
    description: |
      Diffusion des annonces sur les portails, sites partenaires et agrégateurs.
  BC-4960.30.40:
    name: Conformité et retrait des annonces
    description: |
      Gestion de la conformité à l'exactitude des annonces, des changements de
      statut et des retraits.
  BC-4960.40:
    name: Analyse comparative de marché
    description: |
      Production des analyses comparatives de marché, des avis de valeur courtier
      et du positionnement tarifaire pour les mandats et les acquéreurs.
  BC-4960.40.10:
    name: Curation des transactions comparables
    description: |
      Curation des preuves de transactions comparables issues du MLS et des registres
      publics.
  BC-4960.40.20:
    name: Production du rapport d'analyse comparative de marché
    description: |
      Production des rapports d'analyse comparative de marché pour la présentation
      aux clients.
  BC-4960.40.30:
    name: Avis de valeur courtier
    description: |
      Émission des avis de valeur courtier pour les clients et les mandants institutionnels.
  BC-4960.50:
    name: Opérations de visites et de portes ouvertes
    description: |
      Opérations des rendez-vous de visite, portes ouvertes et accès physique et
      numérique pour les candidats et les agents co-mandataires.
  BC-4960.50.10:
    name: Gestion des rendez-vous de visite
    description: |
      Gestion des rendez-vous de visite et des demandes d'accès des agents
      co-mandataires.
  BC-4960.50.20:
    name: Opérations des portes ouvertes
    description: |
      Organisation des portes ouvertes incluant l'enregistrement et le suivi.
  BC-4960.50.30:
    name: Boîtes à clés et contrôle d'accès
    description: |
      Gestion des boîtes à clés et des accréditations d'accès numérique pour les
      biens en vente.
  BC-4960.60:
    name: Gestion des offres et de la négociation
    description: |
      Rédaction et négociation des offres, contre-offres et situations d'offres
      multiples pour le compte de la partie représentée.
  BC-4960.60.10:
    name: Rédaction des offres
    description: |
      Rédaction des offres et des avenants pour le compte de la partie représentée.
  BC-4960.60.20:
    name: Gestion des contre-offres et des offres multiples
    description: |
      Gestion des contre-offres et des processus d'offres multiples incluant les
      appels à meilleures offres.
  BC-4960.60.30:
    name: Acceptation et confirmation de l'engagement
    description: |
      Confirmation de l'acceptation de l'offre et de la formation du contrat engageant.
  BC-4960.70:
    name: Coordination de la clôture des transactions de courtage
    description: |
      Coordination des conditions suspensives, du séquestre et du transfert de
      propriété jusqu'à la clôture pour les transactions de courtage.
  BC-4960.70.10:
    name: Suivi des conditions suspensives
    description: |
      Suivi des conditions d'inspection, de financement et autres conditions
      suspensives jusqu'à leur levée ou renonciation.
  BC-4960.70.20:
    name: Coordination du séquestre / transfert de propriété
    description: |
      Coordination avec les parties du séquestre et du transfert de propriété sur
      les documents et les fonds de clôture.
  BC-4960.70.30:
    name: Coordination du jour de clôture
    description: |
      Coordination de la signature, de la remise des clés et de la logistique du
      jour de clôture.
  BC-4960.80:
    name: Gestion des commissions et des courtiers co-mandataires
    description: |
      Capture des conditions de commission et règlement des commissions des courtiers
      co-mandataires et des honoraires de référencement.
  BC-4960.80.10:
    name: Capture des accords de commission
    description: |
      Capture des accords de commission incluant les partages et les conditions.
  BC-4960.80.20:
    name: Règlement des courtiers co-mandataires
    description: |
      Règlement des commissions dues aux courtiers co-mandataires sur les transactions
      clôturées.
  BC-4960.80.30:
    name: Décaissement des commissions
    description: |
      Décaissement des commissions au cabinet de courtage et aux agents déduction
      faite des retenues.
  BC-4960.80.40:
    name: Gestion des honoraires de référencement
    description: |
      Gestion des accords d'honoraires de référencement avec les courtiers et partenaires
      prescripteurs.
  BC-4960.90:
    name: Gestion de la productivité et du registre des agents
    description: |
      Gestion du parrainage de licence, de la performance et de l'administration des
      plans de commission des agents sur l'ensemble du registre du cabinet.
  BC-4960.90.10:
    name: Suivi des licences et du parrainage des agents
    description: |
      Suivi du statut des licences des agents et des dispositions de parrainage du cabinet.
  BC-4960.90.20:
    name: Gestion de la performance des agents
    description: |
      Gestion de la performance des agents au regard des objectifs de production et
      des standards.
  BC-4960.90.30:
    name: Administration des plans de commission des agents
    description: |
      Administration des plans de commission, des partages et des plafonds des agents.

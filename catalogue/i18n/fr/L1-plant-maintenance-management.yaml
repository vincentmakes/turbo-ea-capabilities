locale: fr
source: L1-plant-maintenance-management.yaml
entries:
  BC-1030:
    name: Gestion de la maintenance des installations
    description: |
      Maintenance préventive, prédictive et corrective des installations et équipements.
  BC-1030.10:
    name: Gestion de la stratégie de maintenance
    description: |
      Stratégie de maintenance par classe d'actif et analyse RCM.
  BC-1030.10.10:
    name: Analyse de la maintenance centrée sur la fiabilité
    description: |
      Analyse RCM pour définir les stratégies de maintenance par classe d'actif.
  BC-1030.10.20:
    name: Définition des plans de maintenance
    description: |
      Définition des plans de maintenance, des tâches et des intervalles.
  BC-1030.10.30:
    name: Gestion des standards de maintenance
    description: |
      Procédures, standards et bonnes pratiques de maintenance.
  BC-1030.20:
    name: Gestion de la maintenance préventive
    description: |
      Plans de maintenance préventive, planification et exécution.
  BC-1030.20.10:
    name: Gestion du planning de maintenance préventive
    description: |
      Génération et gestion des plannings de maintenance préventive.
  BC-1030.20.20:
    name: Exécution de la maintenance préventive
    description: |
      Exécution des tâches de maintenance préventive et vérification de leur achèvement.
  BC-1030.20.30:
    name: Suivi de la conformité de la maintenance préventive
    description: |
      Suivi de la conformité de la maintenance préventive et des tâches en retard.
  BC-1030.30:
    name: Gestion de la maintenance corrective
    description: |
      Intervention sur panne et réparations.
  BC-1030.30.10:
    name: Intervention sur panne
    description: |
      Première intervention sur les pannes d'équipements et les événements non planifiés.
  BC-1030.30.20:
    name: Exécution des réparations d'équipements
    description: |
      Exécution des réparations correctives et vérification.
  BC-1030.30.30:
    name: Analyse des défaillances et compte rendu
    description: |
      Analyse des causes racines et compte rendu des défaillances après intervention corrective.
  BC-1030.40:
    name: Gestion de la maintenance prédictive
    description: |
      Maintenance basée sur la condition et pilotée par l'analytique prédictive.
  BC-1030.40.10:
    name: Surveillance de l'état des équipements
    description: |
      Surveillance de l'état par vibration, thermographie, analyse d'huile et acoustique.
  BC-1030.40.20:
    name: Modélisation analytique prédictive
    description: |
      Prédiction des défaillances par apprentissage automatique.
  BC-1030.40.30:
    name: Actions de maintenance prescriptive
    description: |
      Génération d'actions de maintenance prescriptives à partir des prédictions.
  BC-1030.50:
    name: Gestion des ordres de travaux de maintenance
    description: |
      Cycle de vie des ordres de travaux de maintenance.
  BC-1030.50.10:
    name: Saisie des notifications de maintenance
    description: |
      Saisie des notifications et demandes de maintenance.
  BC-1030.50.20:
    name: Planification des ordres de travaux de maintenance
    description: |
      Planification des ordres de travaux incluant les ressources et les pièces.
  BC-1030.50.30:
    name: Exécution des ordres de travaux de maintenance
    description: |
      Exécution et confirmation des ordres de travaux de maintenance.
  BC-1030.50.40:
    name: Clôture des ordres de travaux de maintenance
    description: |
      Clôture, solde et archivage des ordres de travaux de maintenance.
  BC-1030.60:
    name: Gestion des stocks de pièces détachées de maintenance
    description: |
      Stockage et utilisation des pièces détachées MRO.
  BC-1030.60.10:
    name: Stratégie de stock MRO
    description: |
      Stratégie de stockage et niveaux de stock pour les pièces MRO.
  BC-1030.60.20:
    name: Approvisionnement en pièces MRO
    description: |
      Approvisionnement en pièces MRO et consommables.
  BC-1030.60.30:
    name: Opérations du magasin MRO
    description: |
      Opérations du magasin, incluant la sortie et le retour des pièces MRO.
  BC-1030.60.40:
    name: Gestion des pièces de rechange critiques
    description: |
      Identification et gestion des pièces de rechange critiques et d'assurance.
  BC-1030.70:
    name: Gestion de la fiabilité des équipements
    description: |
      Ingénierie de la fiabilité, analyse des défaillances, MTBF/MTTR.
  BC-1030.70.10:
    name: Analyse de l'ingénierie de la fiabilité
    description: |
      Analyse de fiabilité (AMDEC, FTA, RBD) des actifs critiques.
  BC-1030.70.20:
    name: Suivi du MTBF et du MTTR
    description: |
      Suivi de la moyenne des temps entre défaillances et des temps de réparation.
  BC-1030.70.30:
    name: Programmes d'amélioration de la fiabilité
    description: |
      Programmes d'amélioration de la fiabilité des actifs à forte occurrence de défaillances.

locale: fr
source: L1-business-continuity-management.yaml
entries:
  BC-160:
    name: Gestion de la continuité d'activité
    description: |
      Planification de la résilience, reprise après sinistre et gestion des crises.
  BC-160.10:
    name: Planification de la continuité d'activité
    description: |
      Analyse d'impact, élaboration des plans et stratégies de continuité.
  BC-160.10.10:
    name: Analyse d'impact sur l'activité
    description: |
      Identification des processus critiques, des RTO, RPO et des dépendances.
  BC-160.10.20:
    name: Définition de la stratégie de continuité
    description: |
      Sélection des stratégies de continuité et des options de reprise.
  BC-160.10.30:
    name: Élaboration des plans de continuité
    description: |
      Documentation des plans de continuité d'activité alignés sur la norme ISO 22301.
  BC-160.10.40:
    name: Maintenance et actualisation des plans
    description: |
      Révision et mise à jour périodiques des plans de continuité.
  BC-160.20:
    name: Gestion de la reprise après sinistre
    description: |
      Reprise après sinistre informatique et opérationnelle.
  BC-160.20.10:
    name: Planification de la reprise des services informatiques
    description: |
      Plans de reprise pour les services informatiques et infrastructures critiques.
  BC-160.20.20:
    name: Gestion des sauvegardes et de la restauration
    description: |
      Stratégies de sauvegarde, immuabilité et validation de la restauration.
  BC-160.20.30:
    name: Opérations de basculement et de reprise sur site secondaire
    description: |
      Basculement, activation du site de secours et reprise opérationnelle.
  BC-160.20.40:
    name: Coordination de la reprise opérationnelle
    description: |
      Coordination des opérations métier lors de l'activation de la reprise.
  BC-160.30:
    name: Gestion de crise
    description: |
      Réponse aux crises, structure de commandement et escalade.
  BC-160.30.10:
    name: Structure de commandement en cas de crise
    description: |
      Équipe de gestion de crise, rôles et structure de commandement et de contrôle.
  BC-160.30.20:
    name: Communication de crise
    description: |
      Communications de crise internes et externes et gestion des parties prenantes.
  BC-160.30.30:
    name: Escalade et activation des incidents
    description: |
      Classification de la sévérité, chemins d'escalade et activation des plans.
  BC-160.30.40:
    name: Revue post-crise
    description: |
      Retours d'expérience et actions d'amélioration à la suite de crises.
  BC-160.40:
    name: Tests et exercices de résilience
    description: |
      Exercices, simulations et validation des plans.
  BC-160.40.10:
    name: Exercices de simulation et ateliers
    description: |
      Exercices de type table-top, revues procédurales et simulations.
  BC-160.40.20:
    name: Tests de basculement réel
    description: |
      Tests de basculement et de reprise réels par rapport aux objectifs RTO et RPO.
  BC-160.40.30:
    name: Gestion du programme d'exercices
    description: |
      Calendrier annuel des exercices, périmètre et couverture des parties prenantes.
  BC-160.40.40:
    name: Résultats des tests et suivi des améliorations
    description: |
      Enregistrement des résultats des exercices et suivi des actions d'amélioration.

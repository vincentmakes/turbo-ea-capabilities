locale: fr
source: L1-chemical-regulatory-compliance-management.yaml
entries:
  BC-4660:
    name: Gestion de la conformité réglementaire chimique
    description: |
      Enregistrement des substances, dossiers, autorisations, restrictions,
      inscriptions aux inventaires et contrôles d'importation/exportation dans
      le cadre des réglementations REACH, TSCA, K-REACH, CWC et équivalentes.
  BC-4660.10:
    name: Gestion de l'enregistrement des substances
    description: |
      Enregistrement des substances dans les principaux régimes mondiaux
      d'inventaires chimiques.
  BC-4660.10.10:
    name: Gestion des enregistrements REACH
    description: |
      Gestion des enregistrements REACH incluant les SIEF et les soumissions
      conjointes.
  BC-4660.10.20:
    name: Notification PMN et inventaire TSCA
    description: |
      Notification préalable à la fabrication et notification à l'inventaire
      TSCA.
  BC-4660.10.30:
    name: Notification K-REACH et Asie-Pacifique
    description: |
      Notification dans le cadre de K-REACH, Chine, Japon et autres régimes
      Asie-Pacifique.
  BC-4660.10.40:
    name: Gestion des notifications pour polymères
    description: |
      Gestion des notifications et des exemptions pour les substances polymères.
  BC-4660.20:
    name: Gestion des autorisations et restrictions
    description: |
      Conformité aux contrôles d'autorisation, de restriction et des substances
      émergentes.
  BC-4660.20.10:
    name: Demande d'autorisation REACH
    description: |
      Préparation et soumission des demandes d'autorisation en vertu de l'Annexe
      XIV de REACH.
  BC-4660.20.20:
    name: Conformité aux restrictions REACH
    description: |
      Conformité aux entrées de restriction de l'Annexe XVII de REACH.
  BC-4660.20.30:
    name: Suivi de la liste candidate SVHC
    description: |
      Suivi des mises à jour de la liste candidate SVHC et analyse d'impact.
  BC-4660.20.40:
    name: Gestion des restrictions PFAS et des restrictions émergentes
    description: |
      Gestion des restrictions liées aux PFAS, microplastiques et autres
      restrictions émergentes.
  BC-4660.30:
    name: Gestion des dossiers réglementaires
    description: |
      Rédaction et maintenance des dossiers réglementaires dans IUCLID et les
      formats équivalents.
  BC-4660.30.10:
    name: Gestion des dossiers IUCLID
    description: |
      Rédaction et maintenance des dossiers IUCLID 6.
  BC-4660.30.20:
    name: Préparation du rapport sur la sécurité chimique
    description: |
      Préparation des rapports sur la sécurité chimique selon l'Annexe I de
      REACH.
  BC-4660.30.30:
    name: Maintenance du profil d'identité des substances
    description: |
      Maintenance des profils d'identité des substances et des preuves
      analytiques.
  BC-4660.40:
    name: Gestion des inscriptions aux inventaires
    description: |
      Gestion de la présence des substances dans les inventaires EINECS, CE et
      nationaux.
  BC-4660.40.10:
    name: Gestion des numéros EINECS et CE
    description: |
      Gestion des attributions et mises à jour des numéros EINECS et CE.
  BC-4660.40.20:
    name: Notification des nouvelles substances aux inventaires
    description: |
      Notification des nouvelles substances aux inventaires chimiques nationaux.
  BC-4660.40.30:
    name: Réconciliation des inventaires nationaux
    description: |
      Réconciliation du portefeuille par rapport aux inventaires chimiques
      nationaux.
  BC-4660.50:
    name: Contrôle des importations et exportations de produits chimiques
    description: |
      Conformité aux contrôles internationaux du commerce des produits chimiques
      incluant la CWC, les précurseurs de drogues, le double usage et le PIC.
  BC-4660.50.10:
    name: Conformité aux listes de la CWC
    description: |
      Conformité aux déclarations et licences des listes 1, 2 et 3 de l'OIAC.
  BC-4660.50.20:
    name: Contrôle des précurseurs de drogues
    description: |
      Conformité aux régimes de contrôle des précurseurs de drogues de l'OICS
      et nationaux.
  BC-4660.50.30:
    name: Licences d'exportation à double usage
    description: |
      Délivrance de licences et conformité à l'utilisation finale pour les
      exportations de produits chimiques à double usage.
  BC-4660.50.40:
    name: Conformité au consentement préalable en connaissance de cause
    description: |
      Conformité au régime de consentement préalable en connaissance de cause
      de la Convention de Rotterdam.
  BC-4660.60:
    name: Veille et intelligence réglementaire
    description: |
      Surveillance et évaluation d'impact des évolutions des réglementations
      chimiques sur les marchés.
  BC-4660.60.10:
    name: Veille réglementaire prospective
    description: |
      Veille des réglementations chimiques en cours et émergentes.
  BC-4660.60.20:
    name: Évaluation d'impact des changements réglementaires
    description: |
      Évaluation de l'impact des changements réglementaires sur le portefeuille
      et les opérations.
  BC-4660.60.30:
    name: Liaison avec les associations professionnelles
    description: |
      Liaison avec le Cefic, l'ACC et les associations professionnelles
      équivalentes.
  BC-4660.70:
    name: Engagement des autorités et soumissions
    description: |
      Engagement auprès des autorités réglementaires incluant les soumissions,
      demandes de clarification et inspections.
  BC-4660.70.10:
    name: Préparation des soumissions aux autorités
    description: |
      Préparation des soumissions à l'ECHA, l'EPA et les autorités équivalentes.
  BC-4660.70.20:
    name: Réponse aux demandes des autorités
    description: |
      Réponse aux demandes des autorités sur les dossiers et enregistrements.
  BC-4660.70.30:
    name: Préparation aux inspections
    description: |
      Maintien de l'état de préparation aux inspections et audits des
      régulateurs.

locale: fr
source: L1-mine-closure-rehabilitation-management.yaml
entries:
  BC-4470:
    name: Gestion de la fermeture de mine et de la réhabilitation
    description: |
      Planification de la fermeture, provisionnement financier, réhabilitation
      progressive, déclassement et intendance post-fermeture des terrains et
      infrastructures miniers.
  BC-4470.10:
    name: Planification de la fermeture
    description: |
      Élaboration de plans de fermeture conceptuels à détaillés avec consultation
      des parties prenantes et approbation des régulateurs.
    in_scope:
      - Plans de fermeture conceptuels et de durée de vie des actifs
      - Révisions détaillées du plan de fermeture avant la cessation
      - Consultation des régulateurs et des communautés sur la fermeture
    out_of_scope:
      - Instruments de provisionnement financier (BC-4470.20)
  BC-4470.10.10:
    name: Élaboration du plan de fermeture conceptuel
    description: |
      Élaboration de plans de fermeture conceptuels lors des premières phases
      du projet.
  BC-4470.10.20:
    name: Élaboration du plan de fermeture détaillé
    description: |
      Élaboration de plans de fermeture détaillés pour approbation réglementaire
      avant la cessation des activités.
  BC-4470.10.30:
    name: Consultation des parties prenantes sur la fermeture
    description: |
      Engagement des régulateurs, des communautés et des propriétaires
      traditionnels sur les résultats de la fermeture.
  BC-4470.20:
    name: Provisionnement financier pour la fermeture
    description: |
      Estimation des coûts, gestion des instruments de garantie financière et
      comptabilisation des provisions pour fermeture.
  BC-4470.20.10:
    name: Estimation des coûts de fermeture
    description: |
      Estimation des coûts de fermeture pour la réhabilitation, le déclassement
      et les activités post-fermeture.
  BC-4470.20.20:
    name: Gestion des instruments de garantie financière
    description: |
      Gestion des cautionnements, garanties et instruments de sûreté déposés
      auprès des régulateurs.
  BC-4470.20.30:
    name: Comptabilisation des provisions de fermeture
    description: |
      Réévaluation périodique et comptabilisation des provisions de fermeture
      dans les états financiers.
  BC-4470.30:
    name: Opérations de réhabilitation progressive
    description: |
      Réhabilitation simultanée des terrains perturbés pendant les opérations,
      incluant le remodelage du terrain, la revégétalisation et la remise en
      état des cours d'eau.
  BC-4470.30.10:
    name: Remodelage des formes de terrain
    description: |
      Remodelage des haldes, parois de fosse et formes de terrain de résidus
      pour atteindre des profils de fermeture stables.
  BC-4470.30.20:
    name: Remplacement de la terre végétale et revégétalisation
    description: |
      Remise en place de la terre végétale stockée et établissement du couvert
      végétal indigène.
  BC-4470.30.30:
    name: Remise en état des cours d'eau
    description: |
      Remise en état des cours d'eau naturels et construits sur les terrains
      réhabilités.
  BC-4470.30.40:
    name: Déclassement des infrastructures
    description: |
      Déclassement progressif des infrastructures opérationnelles redondantes
      pendant les opérations.
  BC-4470.40:
    name: Déclassement du site minier
    description: |
      Démantèlement en fin de vie, cession des actifs et nettoyage du site à
      la cessation des opérations.
  BC-4470.40.10:
    name: Démantèlement des installations
    description: |
      Démantèlement de l'usine de traitement, des infrastructures minières et
      des bâtiments de surface.
  BC-4470.40.20:
    name: Cession et récupération des actifs
    description: |
      Cession, récupération ou transfert des actifs miniers et de traitement
      lors du déclassement.
  BC-4470.40.30:
    name: Opérations de nettoyage du site
    description: |
      Nettoyage des sols contaminés, des hydrocarbures et des matériaux stockés
      lors du déclassement.
  BC-4470.50:
    name: Intendance post-fermeture
    description: |
      Surveillance à long terme, rétrocession et gestion des passifs résiduels
      après la cessation des opérations.
  BC-4470.50.10:
    name: Opérations de surveillance à long terme
    description: |
      Exploitation de programmes de surveillance à long terme de l'eau, de la
      géotechnique et de la revégétalisation.
  BC-4470.50.20:
    name: Gestion de la rétrocession et de la renonciation
    description: |
      Gestion de la rétrocession des terrains, de la renonciation aux baux et
      de la validation réglementaire.
  BC-4470.50.30:
    name: Suivi des passifs résiduels
    description: |
      Suivi et divulgation des passifs environnementaux résiduels conservés.

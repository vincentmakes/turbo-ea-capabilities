locale: fr
source: L1-gas-processing-lng-operations-management.yaml
entries:
  BC-3070:
    name: Gestion des opérations de traitement du gaz et GNL
    description: |
      Exploitation des installations de traitement du gaz, de fractionnement des LGN, de liquéfaction GNL,
      de chargement et d'envoi, de regazéification et d'assurance qualité du gaz
      dans les chaînes de valeur du gaz midstream.
  BC-3070.10:
    name: Opérations des usines de traitement du gaz
    description: |
      Exploitation des installations de réception, de traitement, de déshydratation et de récupération
      du soufre dans les usines de traitement du gaz.
  BC-3070.10.10:
    name: Gestion de la réception et de l'admission du gaz
    description: |
      Réception, séparation des bouchons liquides et conditionnement à l'entrée du gaz de charge.
  BC-3070.10.20:
    name: Opérations de traitement du gaz acide
    description: |
      Opérations de traitement du gaz acide par solvants aminés et solvants physiques.
  BC-3070.10.30:
    name: Opérations de déshydratation du gaz
    description: |
      Déshydratation du gaz naturel par glycol et tamis moléculaires.
  BC-3070.10.40:
    name: Opérations de récupération du soufre
    description: |
      Opérations de procédé Claus et de traitement des gaz de queue pour la récupération du soufre.
  BC-3070.20:
    name: Opérations de fractionnement des LGN
    description: |
      Exploitation des démethaniseurs, dééthaniseurs et colonnes de fractionnement en aval
      produisant de l'éthane, du propane, du butane et de l'essence naturelle.
  BC-3070.20.10:
    name: Opérations du démethaniseur
    description: |
      Exploitation des colonnes cryogéniques de démethanisation pour la récupération de l'éthane.
  BC-3070.20.20:
    name: Opérations du dééthaniseur et du dépropaniseur
    description: |
      Exploitation des colonnes de dééthanisation, dépropanisation et débutanisation.
  BC-3070.20.30:
    name: Opérations de stockage des LGN
    description: |
      Exploitation du stockage des LGN sous pression et réfrigéré.
  BC-3070.30:
    name: Opérations de liquéfaction GNL
    description: |
      Exploitation des trains de liquéfaction, des cycles de réfrigération et des réservoirs de stockage GNL.
  BC-3070.30.10:
    name: Opérations du cycle de réfrigération
    description: |
      Exploitation des boucles de réfrigération à frigorigène mixte et en cascade.
  BC-3070.30.20:
    name: Opérations des trains de GNL
    description: |
      Exploitation de bout en bout des trains de liquéfaction GNL.
  BC-3070.30.30:
    name: Opérations des réservoirs de stockage GNL
    description: |
      Exploitation des réservoirs cryogéniques de stockage GNL incluant la prévention du retournement thermique.
  BC-3070.40:
    name: Opérations de chargement et d'envoi GNL
    description: |
      Chargement des navires, refroidissement des cargaisons et vaporisation pour l'envoi en pipeline
      depuis les terminaux de liquéfaction.
  BC-3070.40.10:
    name: Chargement des navires GNL
    description: |
      Opérations de chargement des navires aux appontements d'exportation GNL.
  BC-3070.40.20:
    name: Vaporisation pour l'envoi
    description: |
      Vaporisation pour l'envoi et exportation par pipeline depuis les sites de liquéfaction.
  BC-3070.40.30:
    name: Coordination du refroidissement des cargaisons
    description: |
      Coordination du refroidissement des méthaniers avant le chargement.
  BC-3070.50:
    name: Opérations de regazéification GNL
    description: |
      Exploitation des terminaux d'importation GNL — vaporisation, régulation de pression d'envoi
      et gestion du gaz d'évaporation.
  BC-3070.50.10:
    name: Opérations des vaporiseurs
    description: |
      Exploitation des vaporiseurs à ruissellement, à combustion immergée et à tube et calandre.
  BC-3070.50.20:
    name: Régulation de la pression d'envoi
    description: |
      Régulation de la pression d'envoi et injection en réseau depuis les terminaux d'importation.
  BC-3070.50.30:
    name: Gestion du gaz d'évaporation
    description: |
      Reliquéfaction ou envoi du gaz d'évaporation provenant des réservoirs de stockage.
  BC-3070.60:
    name: Gestion de la qualité du gaz
    description: |
      Conformité aux spécifications de qualité du gaz pour les pipelines et le GNL, et gestion
      des flux hors spécification.
  BC-3070.60.10:
    name: Surveillance de la conformité aux spécifications
    description: |
      Surveillance continue des spécifications de qualité du gaz pour pipelines et GNL.
  BC-3070.60.20:
    name: Échantillonnage et analyse du gaz
    description: |
      Échantillonnage de routine, chromatographie et génération de certificats de qualité.
  BC-3070.60.30:
    name: Gestion du gaz hors spécification
    description: |
      Routage, mélange et retraitement des flux de gaz hors spécification.

locale: fr
source: L1-independence-and-conflicts-management.yaml
entries:
  BC-4350:
    name: Gestion de l'indépendance et des conflits d'intérêts
    description: |
      Indépendance de l'auditeur, conflits d'intérêts professionnels, gestion
      des barrières d'information, déclarations d'intérêts personnels et
      autorisation d'acceptation et de continuité des missions, propres aux
      cabinets de services professionnels.
  BC-4350.10:
    name: Gestion de l'indépendance de l'auditeur
    description: |
      Application des règles d'indépendance des cabinets d'audit, incluant
      les services interdits, la rotation des associés, les limites de dépendance
      aux honoraires et les exigences spécifiques aux EIP.
  BC-4350.10.10:
    name: Identification des clients d'audit
    description: |
      Identification et maintenance de la liste des clients d'audit restreints,
      incluant les filiales et les relations bénéficiaires.
  BC-4350.10.20:
    name: Pré-autorisation des services interdits
    description: |
      Pré-autorisation des services non-audit aux clients d'audit par rapport
      aux listes de services interdits.
  BC-4350.10.30:
    name: Gestion de la rotation des associés d'audit
    description: |
      Suivi et application de la rotation des associés de mission et des
      associés EQR sur les clients d'audit.
  BC-4350.10.40:
    name: Surveillance de la dépendance aux honoraires
    description: |
      Surveillance des honoraires d'audit et totaux par rapport aux revenus
      du cabinet pour identifier les risques de dépendance aux honoraires.
  BC-4350.20:
    name: Gestion des conflits d'intérêts
    description: |
      Identification, évaluation et résolution des conflits d'intérêts entre
      missions, entre clients, et entre les intérêts du client et du cabinet.
  BC-4350.20.10:
    name: Recherche et identification des conflits
    description: |
      Recherche dans les dossiers clients et les affaires pour identifier les
      conflits potentiels sur les missions prospectives.
  BC-4350.20.20:
    name: Évaluation et catégorisation des conflits
    description: |
      Évaluation des conflits identifiés par rapport à la politique du cabinet
      et aux règles professionnelles pour déterminer la catégorie et le traitement.
  BC-4350.20.30:
    name: Résolution des conflits et gestion des renonciations
    description: |
      Résolution des conflits, incluant l'obtention du consentement éclairé,
      des renonciations et le refus de mission le cas échéant.
  BC-4350.30:
    name: Gestion des barrières d'information
    description: |
      Conception, déploiement et exploitation des cloisons éthiques, des barrières
      d'information et des arrangements de filtrage pour les missions sensibles.
  BC-4350.30.10:
    name: Conception des barrières d'information
    description: |
      Définition du périmètre de la barrière, du personnel filtré et des
      contrôles physiques ou systèmes pour une mission.
  BC-4350.30.20:
    name: Déploiement des barrières d'information
    description: |
      Déploiement opérationnel des restrictions d'accès dans les systèmes
      documentaires, e-mail et de pratique.
  BC-4350.30.30:
    name: Détection et réponse aux violations de barrière
    description: |
      Détection et réponse aux violations potentielles ou avérées de barrière,
      incluant l'escalade et la remédiation.
  BC-4350.40:
    name: Gestion des intérêts et relations personnels
    description: |
      Collecte, déclaration et surveillance des intérêts financiers personnels,
      des liens familiaux et des emplois antérieurs susceptibles de menacer
      l'indépendance ou de créer des conflits.
  BC-4350.40.10:
    name: Déclaration des investissements personnels
    description: |
      Collecte et maintenance des déclarations d'investissements personnels
      des associés et collaborateurs par rapport à la liste des entités restreintes.
  BC-4350.40.20:
    name: Déclaration des liens familiaux et proches
    description: |
      Collecte des déclarations couvrant les membres de la famille proche et
      autres associations proches pertinentes pour l'indépendance.
  BC-4350.40.30:
    name: Suivi des emplois antérieurs et des périodes de refroidissement
    description: |
      Suivi des emplois antérieurs auprès de clients d'audit et des périodes
      de refroidissement avant toute implication dans une mission.
  BC-4350.50:
    name: Autorisation d'acceptation des missions
    description: |
      Processus combinant les autorisations d'indépendance, de conflits et
      d'intégrité en une seule décision alimentant l'acceptation des missions.
  BC-4350.50.10:
    name: Coordination du workflow d'autorisation
    description: |
      Orchestration des autorisations d'indépendance, de conflits et de
      conformité AML requises avant l'acceptation de la mission.
  BC-4350.50.20:
    name: Enregistrement des décisions d'autorisation
    description: |
      Enregistrement des décisions d'autorisation, des conditions et du
      raisonnement dans le dossier de mission.
  BC-4350.50.30:
    name: Gestion de la réautorisation pour la continuité
    description: |
      Réautorisation périodique de l'indépendance et des conflits sur les
      missions continues et les relations d'audit récurrentes.
  BC-4350.60:
    name: Surveillance de l'indépendance et des conflits
    description: |
      Surveillance continue de la position d'indépendance et de conflits
      pendant l'exécution des missions et sur l'ensemble du portefeuille.
  BC-4350.60.10:
    name: Surveillance des nouveaux services aux clients d'audit
    description: |
      Surveillance des nouveaux services proposés aux clients d'audit existants
      pour détecter les expositions aux services interdits.
  BC-4350.60.20:
    name: Maintenance de la liste des entités restreintes
    description: |
      Maintenance et distribution de la liste des entités restreintes et
      des avis associés aux professionnels.
  BC-4350.60.30:
    name: Investigation des violations d'indépendance
    description: |
      Investigation et signalement des violations d'indépendance suspectées
      ou avérées et des mesures correctives.

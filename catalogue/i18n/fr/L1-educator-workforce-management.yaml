locale: fr
source: L1-educator-workforce-management.yaml
entries:
  BC-4760:
    name: Gestion des effectifs enseignants
    description: |
      Gestion du cycle de vie du personnel académique et enseignant, couvrant le
      recrutement, la certification, la titularisation et la promotion, l'allocation
      des charges d'enseignement, le développement professionnel et la gestion des
      vacataires. Complète la Gestion du capital humain – transverse pour les RH générales.
  BC-4760.10:
    name: Recrutement et nomination du corps enseignant
    description: |
      Définition, recherche, sélection et nomination du corps enseignant,
      incluant les pratiques spécifiques aux concours académiques.
    in_scope:
      - Définition des postes d'enseignant
      - Recherche et sélection du corps enseignant
      - Nomination et intégration du corps enseignant
    out_of_scope:
      - Recrutement du personnel général (couvert par la Gestion du capital humain – transverse)
  BC-4760.10.10:
    name: Définition des postes d'enseignant
    description: |
      Définition des postes, des grades et des orientations disciplinaires du corps enseignant.
  BC-4760.10.20:
    name: Recherche et sélection du corps enseignant
    description: |
      Opérations des comités de recherche académique et sélection des candidats enseignants.
  BC-4760.10.30:
    name: Nomination et intégration du corps enseignant
    description: |
      Nomination, contractualisation et intégration académique des nouveaux enseignants.
  BC-4760.20:
    name: Certification académique et vérification des qualifications des enseignants
    description: |
      Vérification et maintien à jour des qualifications académiques, professionnelles
      et des compétences disciplinaires des enseignants.
    in_scope:
      - Vérification des qualifications des enseignants
      - Certification disciplinaire
      - Maintien continu des certifications
    out_of_scope:
      - Certifications générales des employés (couvertes par la Gestion du capital humain – transverse)
  BC-4760.20.10:
    name: Vérification des qualifications des enseignants
    description: |
      Vérification des diplômes, certifications et licences détenus par les enseignants.
  BC-4760.20.20:
    name: Certification disciplinaire
    description: |
      Certification des enseignants au regard de leurs compétences disciplinaires et pédagogiques.
  BC-4760.20.30:
    name: Maintien continu des certifications
    description: |
      Suivi des certifications professionnelles continues et de leurs renouvellements.
  BC-4760.30:
    name: Gestion de la titularisation et de la promotion
    description: |
      Administration de la progression sur la voie de la titularisation, des décisions
      de titularisation et des procédures de promotion académique.
    in_scope:
      - Gestion du parcours de titularisation et de la période probatoire
      - Révision et décision de titularisation
      - Révision et décision de promotion
    out_of_scope:
      - Gestion générale de la performance (couverte par la Gestion du capital humain – transverse)
  BC-4760.30.10:
    name: Gestion du parcours de titularisation et de la période probatoire
    description: |
      Gestion de la progression sur la voie de la titularisation et des périodes probatoires.
  BC-4760.30.20:
    name: Révision et décision de titularisation
    description: |
      Processus du comité de révision de la titularisation et décisions finales.
  BC-4760.30.30:
    name: Révision et décision de promotion
    description: |
      Révision des promotions académiques et prise de décision à travers les grades du corps enseignant.
  BC-4760.40:
    name: Gestion de la charge et de la charge de travail d'enseignement
    description: |
      Allocation et équilibrage des charges d'enseignement, de recherche et de service,
      ainsi que planification des congés académiques incluant les sabbatiques.
    in_scope:
      - Allocation des missions d'enseignement
      - Équilibrage de la charge de travail entre enseignement, recherche et service
      - Planification des sabbatiques et congés académiques
    out_of_scope:
      - Administration générale des congés RH (couverte par la Gestion du capital humain – transverse)
  BC-4760.40.10:
    name: Allocation des missions d'enseignement
    description: |
      Allocation des missions d'enseignement aux enseignants et formateurs.
  BC-4760.40.20:
    name: Équilibrage de la charge de travail
    description: |
      Équilibrage des obligations d'enseignement, de recherche et de service entre enseignants.
  BC-4760.40.30:
    name: Planification des sabbatiques et congés
    description: |
      Planification des sabbatiques et des remplacements en cas de congé académique.
  BC-4760.50:
    name: Développement professionnel académique
    description: |
      Développement professionnel centré sur la pédagogie, la discipline et l'intégration
      pour le personnel académique et enseignant.
    in_scope:
      - Développement des pratiques pédagogiques et d'enseignement
      - Développement de l'expertise disciplinaire
      - Mentorat et intégration des enseignants
    out_of_scope:
      - Formation et développement généraux (couverts par la Gestion du capital humain – transverse)
  BC-4760.50.10:
    name: Développement des pratiques pédagogiques et d'enseignement
    description: |
      Développement des compétences pédagogiques et des pratiques d'enseignement des formateurs.
  BC-4760.50.20:
    name: Développement de l'expertise disciplinaire
    description: |
      Développement de l'expertise dans les disciplines et domaines de spécialité.
  BC-4760.50.30:
    name: Mentorat et intégration des enseignants
    description: |
      Programmes de mentorat et d'intégration pour les nouveaux enseignants.
  BC-4760.60:
    name: Évaluation de la performance et révision par les pairs des enseignants
    description: |
      Révision de performance spécifique aux enseignants, incluant l'observation
      en classe, la révision par les pairs et la reconnaissance académique.
    in_scope:
      - Observation en classe et révision par les pairs
      - Révision annuelle de la performance des enseignants
      - Reconnaissance et récompenses des enseignants
    out_of_scope:
      - Gestion générale de la performance du personnel (couverte par la Gestion du capital humain – transverse)
  BC-4760.60.10:
    name: Observation en classe et révision par les pairs
    description: |
      Observation en classe et révision par les pairs des pratiques d'enseignement.
  BC-4760.60.20:
    name: Révision annuelle de la performance
    description: |
      Révision annuelle de la performance du personnel académique et enseignant.
  BC-4760.60.30:
    name: Reconnaissance et récompenses des enseignants
    description: |
      Programmes de reconnaissance et de récompense pour les enseignants.
  BC-4760.70:
    name: Gestion des enseignants vacataires et à temps partiel
    description: |
      Gestion du personnel enseignant à temps partiel, vacataire et chargé de cours,
      incluant le sourcing, la contractualisation et l'assurance qualité.
    in_scope:
      - Sourcing du vivier de vacataires
      - Administration des contrats vacataires
      - Intégration des vacataires et assurance qualité
    out_of_scope:
      - Gestion générale des prestataires (couverte par la Gestion des fournisseurs – transverse)
  BC-4760.70.10:
    name: Sourcing du vivier de vacataires
    description: |
      Sourcing et maintenance d'un vivier actif d'enseignants vacataires.
  BC-4760.70.20:
    name: Administration des contrats vacataires
    description: |
      Administration des contrats d'enseignement vacataires et à temps partiel.
  BC-4760.70.30:
    name: Intégration des vacataires et assurance qualité
    description: |
      Intégration des vacataires aux normes académiques et assurance qualité continue.

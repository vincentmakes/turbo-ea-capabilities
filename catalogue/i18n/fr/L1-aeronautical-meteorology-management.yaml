locale: fr
source: L1-aeronautical-meteorology-management.yaml
entries:
  BC-1250:
    name: Gestion de la météorologie aéronautique
    description: |
      Observation météorologique, prévisions météorologiques, briefing et services météorologiques pour phénomènes dangereux.
  BC-1250.10:
    name: Gestion des observations météorologiques
    description: |
      METAR, observations automatisées, réseaux de capteurs et observations de surface.
  BC-1250.10.10:
    name: Observation météorologique de surface
    description: |
      Observation météorologique de surface manuelle et automatisée sur les aérodromes.
  BC-1250.10.20:
    name: Production des METAR et SPECI
    description: |
      Production et diffusion des messages METAR et SPECI.
  BC-1250.10.30:
    name: Gestion du réseau de capteurs météorologiques
    description: |
      Exploitation des systèmes automatisés d'observation météorologique et des capteurs.
  BC-1250.20:
    name: Gestion des prévisions météorologiques
    description: |
      TAF, prévisions de zone, SIGMET, AIRMET et GAMET.
  BC-1250.20.10:
    name: Production des prévisions d'aérodrome
    description: |
      Production des TAF et des prévisions tendance pour les aérodromes.
  BC-1250.20.20:
    name: Production des prévisions de zone
    description: |
      Production des prévisions de zone, GAMET et des prévisions de temps significatif.
  BC-1250.20.30:
    name: Émission des SIGMET et AIRMET
    description: |
      Émission des avis SIGMET et AIRMET.
  BC-1250.30:
    name: Gestion du briefing et des conseils météorologiques
    description: |
      Briefings pré-vol, services consultatifs aux unités ATS et avis météorologiques en vol.
  BC-1250.30.10:
    name: Service de briefing pré-vol
    description: |
      Fourniture de services de briefing en libre-service et assisté.
  BC-1250.30.20:
    name: Avis météorologiques aux unités ATS
    description: |
      Fourniture d'avis météorologiques aux unités ATS et aux superviseurs.
  BC-1250.30.30:
    name: Avis météorologiques en vol
    description: |
      Services d'avis météorologiques en vol aux usagers de l'espace aérien.
  BC-1250.40:
    name: Gestion des phénomènes météorologiques dangereux
    description: |
      Avis de cendres volcaniques, phénomènes météorologiques sévères et météorologie spatiale.
  BC-1250.40.10:
    name: Service d'avis sur les cendres volcaniques
    description: |
      Coordination avec les VAAC et diffusion des avis sur les cendres volcaniques.
  BC-1250.40.20:
    name: Service d'avertissement de phénomènes météorologiques sévères
    description: |
      Émission d'avertissements de phénomènes météorologiques sévères (CB, turbulence, givrage).
  BC-1250.40.30:
    name: Service d'avis de météorologie spatiale
    description: |
      Avis de météorologie spatiale conformes aux exigences de l'ICAO.

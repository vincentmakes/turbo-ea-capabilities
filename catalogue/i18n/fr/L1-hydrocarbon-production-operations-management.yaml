locale: fr
source: L1-hydrocarbon-production-operations-management.yaml
entries:
  BC-3030:
    name: Gestion des opérations de production des hydrocarbures
    description: |
      Exploitation des installations de surface en amont de la tête de puits jusqu'à l'export — séparation, traitement, extraction artificielle, assurance d'écoulement, surveillance de la production et maintien de la pression du réservoir.
  BC-3030.10:
    name: Gestion des opérations de tête de puits
    description: |
      Exploitation quotidienne des équipements de tête de puits, gestion des étrangleurs et tests de puits.
  BC-3030.10.10:
    name: Surveillance des têtes de puits
    description: |
      Surveillance continue des paramètres de pression, température et débit en tête de puits.
  BC-3030.10.20:
    name: Gestion des étrangleurs de tête de puits
    description: |
      Réglage des étrangleurs de surface pour gérer le débit et la dépression des puits.
  BC-3030.10.30:
    name: Opérations de tests de puits
    description: |
      Tests de puits routiniers et de surveillance pour l'allocation et les données de réservoir.
  BC-3030.20:
    name: Opérations de séparation et de traitement de surface
    description: |
      Exploitation des installations de surface pour la séparation huile-eau-gaz, la stabilisation du brut, le traitement de l'eau produite et le conditionnement du gaz.
  BC-3030.20.10:
    name: Séparation huile, eau et gaz
    description: |
      Séparation triphasique des fluides produits dans les installations en amont.
  BC-3030.20.20:
    name: Stabilisation du brut
    description: |
      Stabilisation du brut produit aux spécifications d'export.
  BC-3030.20.30:
    name: Traitement de l'eau produite
    description: |
      Traitement de l'eau produite pour réinjection ou rejet.
  BC-3030.20.40:
    name: Déshydratation et désulfuration du gaz
    description: |
      Déshydratation et désulfuration sur site des courants de gaz associé.
  BC-3030.30:
    name: Gestion de l'extraction artificielle
    description: |
      Sélection, exploitation et optimisation des systèmes d'extraction artificielle.
  BC-3030.30.10:
    name: Opérations de gas lift
    description: |
      Opérations de gas lift continu et intermittent et surveillance.
  BC-3030.30.20:
    name: Opérations de pompes électrosubmersibles
    description: |
      Exploitation, surveillance et gestion de la durée de vie des installations de pompes électrosubmersibles.
  BC-3030.30.30:
    name: Opérations de pompes à tiges
    description: |
      Exploitation et surveillance par dynamomètre des pompes à tiges.
  BC-3030.30.40:
    name: Optimisation de l'extraction artificielle
    description: |
      Optimisation inter-méthodes de la sélection et des paramètres d'extraction artificielle.
  BC-3030.40:
    name: Optimisation et surveillance de la production
    description: |
      Surveillance en temps réel et optimisation des débits de production, des goulots d'étranglement et des performances des puits par rapport aux prévisions.
  BC-3030.40.10:
    name: Surveillance de la production en temps réel
    description: |
      Surveillance en temps réel de la production des puits et des champs depuis les centres opérationnels.
  BC-3030.40.20:
    name: Diagnostic des performances des puits
    description: |
      Analyse diagnostique des puits sous-performants et recommandations de remédiation.
  BC-3030.40.30:
    name: Comptabilisation des pertes de production
    description: |
      Catégorisation et déclaration des pertes de production par rapport au potentiel.
  BC-3030.40.40:
    name: Identification des goulots d'étranglement
    description: |
      Identification des goulots d'étranglement du système entre le réservoir, le puits et les installations.
  BC-3030.50:
    name: Gestion de l'assurance d'écoulement
    description: |
      Prévention et gestion des problèmes d'assurance d'écoulement tels que les hydrates, la paraffine, les asphaltènes et l'érosion-corrosion dans les systèmes producteurs.
  BC-3030.50.10:
    name: Gestion des hydrates
    description: |
      Prévention et remédiation des hydrates dans les conduites et les risers.
  BC-3030.50.20:
    name: Gestion de la paraffine et des asphaltènes
    description: |
      Prévention et remédiation des dépôts de paraffine et d'asphaltènes.
  BC-3030.50.30:
    name: Surveillance de l'érosion et de la corrosion
    description: |
      Surveillance de l'érosion et de la corrosion dans les conduites et équipements producteurs.
  BC-3030.50.40:
    name: Opérations de raclage
    description: |
      Raclage opérationnel des conduites pour le nettoyage et l'inspection.
  BC-3030.60:
    name: Gestion des produits chimiques de production
    description: |
      Sélection, dosage et surveillance de l'efficacité des produits chimiques de production.
  BC-3030.60.10:
    name: Sélection et dosage des produits chimiques
    description: |
      Stratégie de sélection et de dosage des produits chimiques de production au niveau du puits et des installations.
  BC-3030.60.20:
    name: Gestion des inhibiteurs de corrosion
    description: |
      Application et surveillance des programmes d'inhibiteurs de corrosion.
  BC-3030.60.30:
    name: Gestion des inhibiteurs d'entartrage
    description: |
      Gestion des traitements par injection d'inhibiteurs d'entartrage et en continu.
  BC-3030.70:
    name: Opérations de maintien de la pression du réservoir
    description: |
      Exploitation des systèmes d'injection d'eau et de gaz et suivi du remplacement de voidage.
  BC-3030.70.10:
    name: Opérations d'injection d'eau
    description: |
      Exploitation du traitement de l'eau d'injection et des puits injecteurs.
  BC-3030.70.20:
    name: Opérations d'injection de gaz
    description: |
      Exploitation de la compression et des puits d'injection de gaz.
  BC-3030.70.30:
    name: Suivi du remplacement de voidage
    description: |
      Suivi des taux de remplacement de voidage sur l'ensemble des actifs producteurs.

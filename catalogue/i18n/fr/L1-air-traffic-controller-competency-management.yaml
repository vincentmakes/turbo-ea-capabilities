locale: fr
source: L1-air-traffic-controller-competency-management.yaml
entries:
  BC-1290:
    name: Gestion des compétences des contrôleurs de la circulation aérienne
    description: |
      Formation initiale, de unité et continue ; certification et évaluation des compétences des contrôleurs.
  BC-1290.10:
    name: Gestion de la formation initiale
    description: |
      Formation ab-initio, formation de base et de qualification (généralement en académie).
  BC-1290.10.10:
    name: Programme de formation ab-initio
    description: |
      Formation ab-initio des ATCO incluant la phase de base.
  BC-1290.10.20:
    name: Formation de qualification
    description: |
      Formation spécifique aux qualifications (ACC, APP, ADC, OCN).
  BC-1290.10.30:
    name: Évaluation de la formation initiale
    description: |
      Examens et évaluations durant la formation initiale.
  BC-1290.20:
    name: Gestion de la formation d'unité
    description: |
      Formation en cours d'emploi à l'unité opérationnelle.
  BC-1290.20.10:
    name: Définition du plan de formation d'unité
    description: |
      Définition des plans de formation d'unité pour la transition des ATCO.
  BC-1290.20.20:
    name: Dispensation de la formation en cours d'emploi
    description: |
      Dispensation de la formation OJT par des instructeurs OJT.
  BC-1290.20.30:
    name: Validation de la formation d'unité
    description: |
      Validation de l'habilitation d'unité à l'issue de la formation d'unité.
  BC-1290.30:
    name: Gestion de la formation continue
    description: |
      Formation de recyclage, de conversion et formation aux situations d'urgence et inhabituelles.
  BC-1290.30.10:
    name: Formation de recyclage
    description: |
      Formation de recyclage périodique pour les contrôleurs certifiés.
  BC-1290.30.20:
    name: Formation de conversion
    description: |
      Formation de conversion pour de nouvelles procédures, de nouveaux systèmes ou de nouveaux secteurs.
  BC-1290.30.30:
    name: Formation aux situations d'urgence et inhabituelles
    description: |
      Formation aux situations d'urgence, anormales et inhabituelles.
  BC-1290.40:
    name: Gestion de l'évaluation des compétences
    description: |
      Évaluations périodiques des compétences, contrôles en ligne et validation.
  BC-1290.40.10:
    name: Maintenance du référentiel de compétences
    description: |
      Définition et maintenance du référentiel de compétences.
  BC-1290.40.20:
    name: Conduite des évaluations de compétences
    description: |
      Réalisation des évaluations périodiques de compétences et des contrôles en ligne.
  BC-1290.40.30:
    name: Gestion des dossiers de compétences
    description: |
      Gestion des dossiers d'évaluation des compétences et de leur validité.
  BC-1290.50:
    name: Gestion des licences et des habilitations
    description: |
      Licences ATCO, qualifications, habilitations et administration de l'aptitude médicale.
  BC-1290.50.10:
    name: Délivrance des licences ATCO
    description: |
      Délivrance et renouvellement des licences et qualifications ATCO.
  BC-1290.50.20:
    name: Administration des habilitations
    description: |
      Administration des habilitations d'unité et des habilitations linguistiques.
  BC-1290.50.30:
    name: Administration de l'aptitude médicale
    description: |
      Administration de l'aptitude médicale de classe 3 pour les contrôleurs.
  BC-1290.60:
    name: Gestion des opérations de simulation
    description: |
      Simulateurs ATC, conception de scénarios et opérations de pilotes de simulation.
  BC-1290.60.10:
    name: Conception des scénarios de simulation
    description: |
      Conception des scénarios et exercices de formation sur simulateur.
  BC-1290.60.20:
    name: Opérations des pilotes de simulation
    description: |
      Tenue des postes de pilotes de simulation lors des exercices.
  BC-1290.60.30:
    name: Maintenance et configuration des simulateurs
    description: |
      Maintenance et configuration des simulateurs ATC.

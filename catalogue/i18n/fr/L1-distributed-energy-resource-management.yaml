locale: fr
source: L1-distributed-energy-resource-management.yaml
entries:
  BC-3840:
    name: Gestion des ressources énergétiques distribuées
    description: |
      Intégration, agrégation et coordination opérationnelle des ressources
      énergétiques distribuées (RED) connectées au réseau de distribution —
      solaire en toiture, stockage derrière le compteur, effacement, recharge
      de véhicules électriques et microgrids — et leur participation aux marchés
      de gros et de flexibilité.
  BC-3840.10:
    name: Enregistrement et intégration des RED
    description: |
      Enregistrement des ressources énergétiques distribuées, qualification
      technique et acceptation de raccordement selon les règles IEEE 1547 / EU
      Requirements for Generators.
  BC-3840.10.10:
    name: Évaluation des demandes de raccordement RED
    description: |
      Évaluation des demandes de raccordement des RED par rapport à la capacité
      d'accueil.
  BC-3840.10.20:
    name: Qualification technique des RED
    description: |
      Qualification sur essais de type et vérification sur site des capacités
      et protections des RED.
  BC-3840.10.30:
    name: Maintenance du registre des RED
    description: |
      Maintenance du registre des actifs RED connectés et de leurs capacités.
  BC-3840.20:
    name: Opérations de centrale virtuelle
    description: |
      Agrégation et déclenchement des ressources distribuées comme entité
      opérationnelle unique sur les marchés de gros et d'équilibrage.
  BC-3840.20.10:
    name: Gestion du portefeuille de centrale virtuelle
    description: |
      Composition et rééquilibrage du portefeuille de centrale virtuelle sur
      l'ensemble des classes d'actifs.
  BC-3840.20.20:
    name: Opérations de déclenchement de la centrale virtuelle
    description: |
      Instructions de déclenchement en temps réel sur l'ensemble des actifs RED
      agrégés.
  BC-3840.20.30:
    name: Règlement de performance de la centrale virtuelle
    description: |
      Règlement de la performance de la centrale virtuelle par rapport aux
      engagements de marché et bilatéraux.
  BC-3840.30:
    name: Opérations d'effacement
    description: |
      Recrutement, déclenchement et règlement des programmes d'effacement côté
      demande pour les clients résidentiels, commerciaux et industriels.
  BC-3840.30.10:
    name: Inscription aux programmes d'effacement
    description: |
      Inscription des clients et gestion du consentement pour les programmes
      d'effacement.
  BC-3840.30.20:
    name: Déclenchement des événements d'effacement
    description: |
      Déclenchement des événements d'effacement et instructions de délestage
      aux clients participants.
  BC-3840.30.30:
    name: Vérification de la performance des effacements
    description: |
      Vérification de la livraison des effacements par rapport aux lignes de
      base clients.
  BC-3840.40:
    name: Gestion de l'intégration des véhicules électriques au réseau
    description: |
      Gestion de l'interaction de la recharge des véhicules électriques avec le
      réseau, incluant la recharge pilotée, le V2G et les tarifs spécifiques
      aux VE.
  BC-3840.40.10:
    name: Opérations de recharge pilotée
    description: |
      Exploitation des schémas de recharge pilotée et intelligente pour les
      flottes et particuliers en VE.
  BC-3840.40.20:
    name: Coordination vehicle-to-grid
    description: |
      Coordination de la décharge bidirectionnelle V2G vers le réseau ou
      derrière le compteur.
  BC-3840.40.30:
    name: Analyse de la capacité d'accueil des VE
    description: |
      Analyse de la capacité d'accueil au niveau du départ pour la pénétration
      de la recharge VE.
  BC-3840.50:
    name: Coordination du stockage derrière le compteur
    description: |
      Coordination de la participation des batteries derrière le compteur aux
      programmes des gestionnaires de réseau et aux services réseau.
  BC-3840.50.10:
    name: Inscription des batteries derrière le compteur
    description: |
      Inscription et gestion du consentement pour la participation des batteries
      derrière le compteur.
  BC-3840.50.20:
    name: Déclenchement du stockage derrière le compteur
    description: |
      Instructions de déclenchement aux actifs de stockage derrière le compteur.
  BC-3840.50.30:
    name: Suivi de la performance du stockage derrière le compteur
    description: |
      Suivi de la livraison des batteries derrière le compteur par rapport aux
      engagements du gestionnaire.
  BC-3840.60:
    name: Prévision des RED
    description: |
      Prévision à court terme de la production distribuée et de la charge
      flexible alimentant les programmes de l'opérateur de réseau et de marché.
  BC-3840.60.10:
    name: Prévision du solaire derrière le compteur
    description: |
      Prévision de la production photovoltaïque derrière le compteur au niveau
      du départ et de la zone.
  BC-3840.60.20:
    name: Prévision de la charge flexible
    description: |
      Prévision des profils de recharge VE et de charge flexible.
  BC-3840.60.30:
    name: Surveillance de la performance des prévisions RED
    description: |
      Surveillance du biais et de la compétence des prévisions par rapport aux
      réalisations.
  BC-3840.70:
    name: Opérations des microgrids
    description: |
      Exploitation des microgrids de gestionnaires et clients, incluant les
      modes connecté au réseau et en îlot, et le contrôle des transitions
      transparentes.
  BC-3840.70.10:
    name: Opérations du contrôleur de microgrid
    description: |
      Exploitation des contrôleurs de microgrid et déclenchement des ressources
      internes.
  BC-3840.70.20:
    name: Opérations de transition en mode îlot
    description: |
      Transitions planifiées et d'urgence entre le mode connecté au réseau et
      le mode en îlot.
  BC-3840.70.30:
    name: Exercices de résilience des microgrids
    description: |
      Exercices de résilience et de transition transparente pour les microgrids
      à charges critiques.

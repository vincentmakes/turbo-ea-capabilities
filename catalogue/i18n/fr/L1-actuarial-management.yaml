# Gestion actuarielle (fr) — translations for L1-actuarial-management.yaml
locale: fr
source: L1-actuarial-management.yaml
entries:
  BC-2180:
    name: Gestion actuarielle
    description: |
      Modèles de tarification, provisionnement, études d'expérience,
      modélisation du capital et de la solvabilité, support au reporting
      actuariel IFRS 17, et modélisation des catastrophes.

  BC-2180.10:
    name: Tarification actuarielle
    description: |
      Modélisation des coûts de sinistres, analyse d'adéquation tarifaire,
      production d'indications de taux et support à la documentation des taux déposés.
  BC-2180.10.10:
    name: Modélisation des coûts de sinistres
    description: |
      Modélisation des coûts de sinistres par segment, péril et garantie.
  BC-2180.10.20:
    name: Analyse d'adéquation tarifaire
    description: |
      Analyse de l'adéquation tarifaire au regard des sinistres attendus
      et des chargements de frais.
  BC-2180.10.30:
    name: Production d'indications de taux
    description: |
      Production d'indications de taux à destination des comités produit
      et tarification.
  BC-2180.10.40:
    name: Support à la documentation des taux déposés
    description: |
      Production des mémoires actuariels et annexes en support aux dépôts tarifaires.

  BC-2180.20:
    name: Provisionnement actuariel
    description: |
      Triangulation des sinistres, estimation des IBNR, provisionnement
      ULAE et ALAE, et documentation de validation du provisionnement.
  BC-2180.20.10:
    name: Triangulation et développement des sinistres
    description: |
      Construction des triangles de sinistres et sélection des facteurs de développement.
  BC-2180.20.20:
    name: Estimation des IBNR
    description: |
      Estimation des provisions IBNR (sinistres survenus mais non déclarés)
      par portefeuille.
  BC-2180.20.30:
    name: Provisionnement ULAE et ALAE
    description: |
      Provisionnement des frais de gestion des sinistres alloués et non alloués.
  BC-2180.20.40:
    name: Documentation de validation du provisionnement
    description: |
      Production de la documentation du comité de provisionnement et des
      déclarations d'opinion actuarielle.

  BC-2180.30:
    name: Modélisation du capital et de la solvabilité
    description: |
      Développement de modèles internes de capital, calcul de la formule
      standard, allocation du capital et support ORSA.
  BC-2180.30.10:
    name: Développement du modèle interne de capital
    description: |
      Développement et maintenance des modèles internes de capital pour
      la solvabilité et la notation.
  BC-2180.30.20:
    name: Calcul de la formule standard
    description: |
      Calcul de la formule standard Solvabilité II et des métriques
      équivalentes de capital réglementaire.
  BC-2180.30.30:
    name: Allocation du capital
    description: |
      Allocation du capital requis aux branches d'activité et aux segments.
  BC-2180.30.40:
    name: Support à la modélisation ORSA
    description: |
      Support à la modélisation pour les exercices d'évaluation interne
      des risques et de la solvabilité (ORSA).

  BC-2180.40:
    name: Études d'expérience et gestion des hypothèses
    description: |
      Études de mortalité, longévité, chute, persistance et morbidité,
      et gouvernance des hypothèses.
  BC-2180.40.10:
    name: Études de mortalité et de longévité
    description: |
      Études d'expérience de mortalité et de longévité pour les portefeuilles
      vie et retraite.
  BC-2180.40.20:
    name: Études de chute et de persistance
    description: |
      Études d'expérience de chute et de persistance par cohortes de produits.
  BC-2180.40.30:
    name: Études de morbidité et de fréquence de sinistres
    description: |
      Études d'expérience de morbidité et de fréquence de sinistres pour
      les branches santé et prévoyance.
  BC-2180.40.40:
    name: Gouvernance et validation des hypothèses
    description: |
      Gouvernance et validation des hypothèses actuarielles utilisées en
      tarification, provisionnement et reporting.

  BC-2180.50:
    name: Support au reporting actuariel IFRS 17
    description: |
      Marge de service contractuelle, ajustement pour risque, construction
      de cohortes et production des informations à fournir IFRS 17.
  BC-2180.50.10:
    name: Calcul de la CSM et de l'ajustement pour risque
    description: |
      Calcul de la marge de service contractuelle (CSM) et de l'ajustement
      pour risque IFRS 17.
  BC-2180.50.20:
    name: Construction des cohortes et groupes
    description: |
      Construction des groupes de contrats d'assurance et des cohortes annuelles.
  BC-2180.50.30:
    name: Production des informations à fournir IFRS 17
    description: |
      Production des données actuarielles pour les informations à fournir
      et les rapprochements IFRS 17.

  BC-2180.60:
    name: Modélisation des catastrophes
    description: |
      Gestion des fournisseurs de modèles CAT, préparation des données
      d'exposition, calcul des PML et AAL et validation des modèles.
  BC-2180.60.10:
    name: Gestion des fournisseurs de modèles CAT
    description: |
      Sélection et gestion des fournisseurs de modèles CAT et des
      portefeuilles de licences.
  BC-2180.60.20:
    name: Préparation des données d'exposition
    description: |
      Préparation et mise en forme des données d'exposition pour les
      exécutions de modèles CAT.
  BC-2180.60.30:
    name: Calcul des PML et AAL
    description: |
      Calcul des métriques de perte maximale probable (PML) et de perte
      annuelle moyenne (AAL).
  BC-2180.60.40:
    name: Validation et ajustement des modèles CAT
    description: |
      Validation et ajustement de la vue du risque des sorties de modèles CAT.

metadata:
  status: draft
  reviewer: pending
  notes: |
    Initial fixture demonstrating the sidecar shape; needs native-speaker review
    before being considered authoritative.

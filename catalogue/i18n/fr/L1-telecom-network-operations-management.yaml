locale: fr
source: L1-telecom-network-operations-management.yaml
entries:
  BC-2600:
    name: Gestion des opérations réseau télécom
    description: |
      Exploitation au quotidien des réseaux fixes, mobiles et IP couvrant l'accès
      radio, le cœur, le transport et la périphérie — incluant la gestion des
      pannes, de la configuration, des performances, de l'inventaire, des
      changements, des opérations de sécurité et la coordination terrain, ancrée
      sur le TMN FCAPS et l'eTOM Gestion et Opérations des Ressources.
  BC-2600.10:
    name: Gestion des pannes réseau
    description: |
      Détection, corrélation, billetterie, restauration et analyse des causes
      racines des pannes réseau sur les domaines d'accès, cœur et transport.
  BC-2600.10.10:
    name: Corrélation des alarmes
    description: |
      Corrélation et déduplication en temps réel des alarmes réseau en événements
      exploitables.
  BC-2600.10.20:
    name: Gestion des tickets d'incident
    description: |
      Gestion du cycle de vie des tickets d'incident réseau, de la création à
      la clôture.
  BC-2600.10.30:
    name: Gestion des coupures réseau
    description: |
      Coordination de la réponse aux coupures réseau majeures, des communications
      et des actions de rétablissement.
  BC-2600.10.40:
    name: Analyse des causes racines
    description: |
      Investigation structurée des pannes récurrentes ou majeures pour identifier
      et éliminer les causes sous-jacentes.
  BC-2600.20:
    name: Gestion de la configuration réseau
    description: |
      Définition et mise en application des standards de configuration des
      éléments réseau et déploiement contrôlé des modifications de configuration.
  BC-2600.20.10:
    name: Gestion des configurations de référence
    description: |
      Définition et maintenance des configurations de référence approuvées par
      type et rôle d'élément réseau.
  BC-2600.20.20:
    name: Gestion des paramètres réseau
    description: |
      Gestion du cycle de vie des paramètres réseau ajustables et de leurs
      plages autorisées.
  BC-2600.20.30:
    name: Gestion des images logicielles
    description: |
      Gestion et contrôle des versions approuvées des images logicielles et
      micrologiciels des éléments réseau.
  BC-2600.20.40:
    name: Déploiement automatisé de configuration
    description: |
      Déploiement à grande échelle des modifications de configuration approuvées
      par outillage, avec vérification et rollback.
  BC-2600.30:
    name: Gestion des performances réseau
    description: |
      Collecte et analyse continue des compteurs de performance et KPI réseau
      pour détecter et anticiper les dégradations.
  BC-2600.30.10:
    name: Collecte des KPI réseau
    description: |
      Collecte et stockage des compteurs de performance et KPI au niveau des
      éléments et du réseau.
  BC-2600.30.20:
    name: Surveillance des seuils
    description: |
      Surveillance des KPI de performance par rapport aux seuils d'ingénierie
      et de SLA.
  BC-2600.30.30:
    name: Surveillance du taux d'utilisation des capacités
    description: |
      Suivi de l'utilisation des ressources par rapport à la capacité dimensionnée
      pour signaler les conditions proches de la saturation.
  BC-2600.30.40:
    name: Corrélation de l'impact client
    description: |
      Corrélation des signaux de performance réseau avec les indicateurs
      d'expérience client pour identifier les conditions affectant le service.
  BC-2600.40:
    name: Gestion de l'inventaire réseau
    description: |
      Registre faisant autorité des ressources réseau logiques et physiques et
      de leurs relations, maintenu synchronisé avec la réalité par réconciliation.
  BC-2600.40.10:
    name: Inventaire réseau logique
    description: |
      Registre faisant autorité des ressources logiques telles que les services,
      circuits, attributions IP/VLAN et chemins porteurs.
  BC-2600.40.20:
    name: Inventaire réseau physique
    description: |
      Registre faisant autorité des actifs physiques tels que les nœuds, cartes,
      ports, fibres, conduites et antennes.
  BC-2600.40.30:
    name: Réconciliation de l'inventaire
    description: |
      Réconciliation des enregistrements d'inventaire avec la découverte, la
      conception et les relevés terrain.
  BC-2600.40.40:
    name: Découverte des ressources réseau
    description: |
      Découverte automatisée des éléments réseau déployés et de leur état.
  BC-2600.50:
    name: Gestion des changements et des mises en production réseau
    description: |
      Planification, approbation, exécution, vérification et annulation des
      changements apportés aux éléments et services réseau en production.
  BC-2600.50.10:
    name: Planification des changements réseau
    description: |
      Planification et évaluation des risques des changements réseau, incluant
      les fenêtres d'impact.
  BC-2600.50.20:
    name: Mise en œuvre des changements réseau
    description: |
      Exécution contrôlée des changements réseau approuvés dans les fenêtres
      planifiées.
  BC-2600.50.30:
    name: Vérification des changements
    description: |
      Vérification post-changement que le réseau est dans l'état attendu et
      fonctionne dans les tolérances.
  BC-2600.50.40:
    name: Annulation des changements
    description: |
      Annulation des changements qui échouent à la vérification ou provoquent
      un impact inacceptable.
  BC-2600.60:
    name: Opérations de sécurité réseau
    description: |
      Surveillance et réponse à la sécurité spécifique au réseau télécom couvrant
      les domaines de signalisation, transport et cœur, en complément de la
      cybersécurité d'entreprise.
  BC-2600.60.10:
    name: Surveillance des menaces réseau
    description: |
      Surveillance des réseaux de signalisation, de transport et cœur pour
      détecter les activités anormales et malveillantes.
  BC-2600.60.20:
    name: Protection contre les DDoS
    description: |
      Détection et atténuation des attaques volumétriques et protocolaires par
      déni de service contre les points d'accès réseau et client.
  BC-2600.60.30:
    name: Contrôle d'accès au réseau
    description: |
      Application des contrôles d'accès administratifs et machine aux éléments
      réseau.
  BC-2600.60.40:
    name: Réponse aux incidents de sécurité réseau
    description: |
      Confinement, éradication et rétablissement suite à des incidents de
      sécurité réseau confirmés.
  BC-2600.70:
    name: Coordination des opérations terrain
    description: |
      Déploiement, contrôle d'exécution et coordination d'accès aux sites pour
      les activités réseau terrain.
  BC-2600.70.10:
    name: Déploiement des ordres de travail terrain
    description: |
      Affectation des ordres de travail réseau aux équipes terrain internes et
      sous-traitantes.
  BC-2600.70.20:
    name: Exécution des méthodes d'intervention
    description: |
      Contrôle de l'exécution des méthodes d'intervention approuvées sur les
      éléments réseau en production.
  BC-2600.70.30:
    name: Coordination des accès aux sites
    description: |
      Coordination de l'accès physique aux sites réseau, incluant l'escorte,
      les permis et les contrôles de sécurité.
  BC-2600.80:
    name: Gestion de l'optimisation réseau
    description: |
      Ajustement continu des éléments et chemins de trafic réseau pour maximiser
      les performances, la capacité et l'expérience client.
  BC-2600.80.10:
    name: Optimisation de l'accès radio
    description: |
      Ajustement des paramètres radio, des relations de voisinage et de la
      configuration des antennes.
  BC-2600.80.20:
    name: Optimisation du transport
    description: |
      Ajustement des chemins du réseau de transport, de l'allocation de capacité
      et de la qualité de service.
  BC-2600.80.30:
    name: Ingénierie du trafic
    description: |
      Acheminement du trafic IP et transport sur le réseau pour des objectifs
      de performance, de coût et de résilience.
  BC-2600.80.40:
    name: Automatisation en boucle fermée
    description: |
      Boucles automatisées de détection-décision-action qui optimisent en
      continu le réseau sans intervention manuelle.

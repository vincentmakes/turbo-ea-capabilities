locale: fr
source: L1-media-asset-management.yaml
entries:
  BC-3710:
    name: Gestion des actifs médias
    description: |
      Ingestion, catalogage, stockage, transformation, archivage et gestion des
      identifiants des actifs médias tout au long du cycle de vie du contenu,
      de la production à la distribution.
  BC-3710.10:
    name: Ingestion et contrôle qualité des actifs
    description: |
      Intégration du matériel source dans la plateforme d'actifs avec contrôle
      qualité technique et éditorial avant toute utilisation ultérieure.
  BC-3710.10.10:
    name: Ingestion des actifs sources
    description: |
      Ingestion des fichiers sources et capture bande-vers-fichier ou
      flux-vers-fichier dans la plateforme d'actifs.
  BC-3710.10.20:
    name: Inspection du contrôle qualité
    description: |
      Inspection automatisée et manuelle du contrôle qualité pour détecter les
      défauts image, audio et de métadonnées.
  BC-3710.10.30:
    name: Validation de la conformité technique
    description: |
      Validation par rapport aux spécifications de livraison, notamment le
      format, la cadence d'images, le loudness et la conformité du signal.
  BC-3710.20:
    name: Catalogage des métadonnées
    description: |
      Rédaction et gestion des métadonnées descriptives, techniques et de
      droits rendant les actifs découvrables et utilisables.
  BC-3710.20.10:
    name: Rédaction des métadonnées descriptives
    description: |
      Catalogage des titres, synopsis, contributeurs et attributs éditoriaux
      selon un schéma contrôlé.
  BC-3710.20.20:
    name: Capture des métadonnées techniques
    description: |
      Extraction et stockage des métadonnées techniques relatives à l'essence,
      au conteneur et au signal.
  BC-3710.20.30:
    name: Association des métadonnées de droits
    description: |
      Liaison des enregistrements d'actifs aux enregistrements de droits
      couvrant les restrictions territoriales, de fenêtre et de plateforme.
  BC-3710.20.40:
    name: Gestion de la taxonomie et du vocabulaire contrôlé
    description: |
      Gouvernance des taxonomies, genres et vocabulaires contrôlés utilisés
      dans l'ensemble du catalogue.
  BC-3710.30:
    name: Stockage et hiérarchisation des actifs
    description: |
      Stockage hiérarchisé des actifs médias en ligne, nearline et archive pour
      équilibrer latence d'accès et coûts.
  BC-3710.30.10:
    name: Stockage en ligne des actifs
    description: |
      Stockage haute performance pour les actifs en cours de production et de
      distribution actives.
  BC-3710.30.20:
    name: Gestion des niveaux nearline et archive
    description: |
      Migration des actifs vers les niveaux nearline et archive avec des niveaux
      de service de rappel définis.
  BC-3710.30.30:
    name: Optimisation des coûts de stockage
    description: |
      Optimisation de la politique de hiérarchisation, de la déduplication et
      de la réduction de l'empreinte de stockage sur l'ensemble du parc
      d'actifs.
  BC-3710.40:
    name: Transcodage et conversion de format
    description: |
      Production de rendus intermédiaires et de distribution via des pipelines
      de transcodage et de packaging.
  BC-3710.40.10:
    name: Génération de masters mezzanine
    description: |
      Production de masters mezzanine haute qualité comme intermédiaires pour
      les encodages de distribution en aval.
  BC-3710.40.20:
    name: Encodage des formats de distribution
    description: |
      Encodage des rendus de distribution selon les spécifications de livraison
      broadcast, OTT et partenaires.
  BC-3710.40.30:
    name: Packaging à débit adaptatif
    description: |
      Packaging des échelles de débit adaptatif pour la diffusion HLS,
      MPEG-DASH et CMAF.
  BC-3710.50:
    name: Archivage et préservation à long terme
    description: |
      Préservation sur le long terme des masters et actifs historiques,
      incluant la restauration du matériel d'archives.
  BC-3710.50.10:
    name: Catalogage des archives
    description: |
      Catalogage des fonds d'archives à long terme, y compris les supports
      anciens et les éléments physiques.
  BC-3710.50.20:
    name: Migration de préservation
    description: |
      Migration périodique des matériaux archivés vers de nouvelles
      générations de supports pour prévenir l'obsolescence des formats et des
      médias.
  BC-3710.50.30:
    name: Restauration et remastering
    description: |
      Restauration image et audio, et remastering des archives pour les amener
      aux normes de livraison actuelles.
  BC-3710.60:
    name: Gestion des identifiants de contenu et des versions
    description: |
      Attribution et traçabilité des identifiants de contenu et des versions
      décrivant de manière unique chaque montage et chaque rendu.
  BC-3710.60.10:
    name: Attribution des identifiants de contenu
    description: |
      Attribution d'identifiants internes et de registre (EIDR, ISAN, ISRC,
      ISWC) aux œuvres et aux rendus.
  BC-3710.60.20:
    name: Gestion des versions et de la généalogie des montages
    description: |
      Suivi de la généalogie des versions de montage, linguistiques,
      réglementaires et de plateforme par rapport aux enregistrements du master
      parent.
  BC-3710.60.30:
    name: Cartographie des références croisées d'identifiants externes
    description: |
      Cartographie des références croisées entre identifiants internes et
      identifiants partenaires, distributeurs et registres externes.

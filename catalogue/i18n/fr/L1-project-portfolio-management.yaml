locale: fr
source: L1-project-portfolio-management.yaml
entries:
  BC-900:
    name: Gestion de projet et de portefeuille
    description: |
      Exécution des projets, priorisation du portefeuille et PMO.
  BC-900.10:
    name: Gestion du portefeuille
    description: |
      Composition, priorisation et équilibre du portefeuille.
  BC-900.10.10:
    name: Définition de la composition du portefeuille
    description: |
      Composition du portefeuille par thème stratégique, type et niveau de risque.
  BC-900.10.20:
    name: Priorisation et sélection du portefeuille
    description: |
      Notation et sélection des initiatives pour l'inclusion dans le portefeuille.
  BC-900.10.30:
    name: Équilibrage du portefeuille
    description: |
      Équilibrage du portefeuille entre horizons, risque et rendement.
  BC-900.10.40:
    name: Reporting de la performance du portefeuille
    description: |
      Tableaux de bord, statut et reporting des bénéfices du portefeuille.
  BC-900.20:
    name: Gestion de programme
    description: |
      Planification, exécution et gouvernance des programmes.
  BC-900.20.10:
    name: Définition et mobilisation du programme
    description: |
      Plan directeur du programme, mandat et mobilisation.
  BC-900.20.20:
    name: Intégration des plans de programme
    description: |
      Intégration des plans de projets, dépendances et jalons.
  BC-900.20.30:
    name: Gestion des risques et enjeux du programme
    description: |
      Gestion des risques, enjeux et dépendances au niveau du programme.
  BC-900.20.40:
    name: Clôture du programme
    description: |
      Clôture du programme, transfert et retours d'expérience.
  BC-900.30:
    name: Gestion de projet
    description: |
      Exécution, planification et suivi des projets.
  BC-900.30.10:
    name: Planification de projet
    description: |
      Planification du périmètre, du calendrier, des coûts et des ressources du projet.
  BC-900.30.20:
    name: Exécution et suivi du projet
    description: |
      Exécution quotidienne du projet et suivi de l'avancement.
  BC-900.30.30:
    name: Gestion des risques et enjeux du projet
    description: |
      Gestion des risques, enjeux et décisions du projet.
  BC-900.30.40:
    name: Gestion de la qualité du projet
    description: |
      Qualité des livrables du projet et acceptation.
  BC-900.30.50:
    name: Clôture et transfert du projet
    description: |
      Clôture du projet, transfert aux opérations et revue post-implémentation.
  BC-900.40:
    name: Gestion de la gouvernance de projet
    description: |
      Jalons de décision, comités de pilotage et assurance.
  BC-900.40.10:
    name: Gouvernance des jalons de décision
    description: |
      Définition des jalons, critères et approbations.
  BC-900.40.20:
    name: Opérations des comités de pilotage
    description: |
      Termes de référence, ordres du jour et décisions des comités de pilotage.
  BC-900.40.30:
    name: Revues d'assurance des projets
    description: |
      Revues d'assurance indépendantes et revues de franchissement de jalons.
  BC-900.40.40:
    name: Audit de projet et retours d'expérience
    description: |
      Audit post-projet, capture et diffusion des retours d'expérience.
  BC-900.50:
    name: Gestion des opérations du PMO
    description: |
      Services, méthodologie et outillage du PMO.
  BC-900.50.10:
    name: Méthodologie et standards du PMO
    description: |
      Méthodologie de gestion de projet, gabarits et standards (PRINCE2, PMI, agile).
  BC-900.50.20:
    name: Outillage et reporting du PMO
    description: |
      Outils de gestion de projet, tableaux de bord et reporting.
  BC-900.50.30:
    name: Développement des compétences du PMO
    description: |
      Renforcement des compétences des chefs de projet et certification.
  BC-900.50.40:
    name: Gestion de la performance du PMO
    description: |
      Tableau de bord, valeur et suivi de la performance du PMO.
  BC-900.60:
    name: Gestion de la demande et des capacités
    description: |
      Prise en charge de la demande de projets et planification des capacités de ressources.
  BC-900.60.10:
    name: Prise en charge de la demande de projets
    description: |
      Capture, qualification et approbation des nouvelles demandes de projets.
  BC-900.60.20:
    name: Planification des capacités de ressources
    description: |
      Planification des capacités entre les équipes de livraison et les compétences.
  BC-900.60.30:
    name: Allocation et nivellement des ressources
    description: |
      Allocation des ressources entre les projets et résolution des conflits.
  BC-900.60.40:
    name: Reporting de l'utilisation des ressources
    description: |
      Reporting de l'utilisation des ressources, des heures facturables et des prévisions de demande.

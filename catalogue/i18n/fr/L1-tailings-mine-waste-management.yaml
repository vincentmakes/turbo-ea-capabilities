locale: fr
source: L1-tailings-mine-waste-management.yaml
entries:
  BC-4460:
    name: Gestion des résidus miniers et des déchets de mine
    description: |
      Gestion du cycle de vie des installations de stockage des résidus, des
      haldes à stériles, des eaux de mine et des déchets miniers dangereux,
      conformément à la norme mondiale de gestion des résidus et aux régimes
      réglementaires équivalents.
  BC-4460.10:
    name: Ingénierie des installations de stockage de résidus
    description: |
      Conception technique et planification du cycle de vie des installations de
      stockage des résidus, incluant le choix du site, la construction des digues
      et la conception orientée vers la fermeture.
    in_scope:
      - Choix du site et conception conceptuelle
      - Ingénierie de rehaussement et de construction des digues
      - Planification du dépôt et modélisation de la plage
    out_of_scope:
      - Dépôt opérationnel des résidus (BC-4460.20)
      - Surveillance instrumentale des résidus (BC-4460.30)
  BC-4460.10.10:
    name: Choix du site de l'installation de stockage des résidus
    description: |
      Sélection multicritère du site et analyse des alternatives pour les
      installations de résidus nouvelles et agrandies.
  BC-4460.10.20:
    name: Ingénierie de construction des digues
    description: |
      Conception technique et assurance qualité de la construction des digues
      de résidus.
  BC-4460.10.30:
    name: Planification du dépôt des résidus
    description: |
      Planification des séquences de dépôt, du développement de la plage et de
      l'emplacement du bassin.
  BC-4460.10.40:
    name: Conception des installations alignée sur la fermeture
    description: |
      Conception des installations de résidus alignée sur la fermeture à long
      terme et la forme finale du terrain sécurisé.
  BC-4460.20:
    name: Opérations de dépôt des résidus
    description: |
      Placement opérationnel des résidus dans les installations de stockage,
      incluant la manutention des résidus en pulpe, en pâte et filtrés ainsi
      que la récupération de l'eau.
  BC-4460.20.10:
    name: Transport de la pulpe de résidus
    description: |
      Exploitation des pipelines de résidus, des stations de pompage et des
      systèmes de distribution.
  BC-4460.20.20:
    name: Opérations de dépôt des résidus
    description: |
      Dépôt opérationnel des résidus dans l'installation de stockage conformément
      au plan de dépôt.
  BC-4460.20.30:
    name: Récupération d'eau des résidus
    description: |
      Récupération de l'eau de décantation et de percolation des installations de
      résidus pour réutilisation.
  BC-4460.20.40:
    name: Opérations de résidus filtrés et en empilement à sec
    description: |
      Exploitation des usines de résidus filtrés et placement en empilement à sec.
  BC-4460.30:
    name: Surveillance des résidus et sécurité des digues
    description: |
      Surveillance, gouvernance et préparation aux urgences des installations de
      résidus conformément à la norme GISTM et aux régimes équivalents de sécurité
      des digues.
  BC-4460.30.10:
    name: Surveillance de l'instrumentation géotechnique
    description: |
      Surveillance des piézomètres, inclinomètres et prismes de nivellement sur
      les installations de résidus.
  BC-4460.30.20:
    name: Coordination des revues indépendantes des résidus
    description: |
      Engagement et coordination des comités d'examen indépendants des résidus
      et des ingénieurs responsables.
  BC-4460.30.30:
    name: Préparation aux urgences liées aux résidus
    description: |
      Planification de la préparation et de l'intervention en cas d'urgence pour
      les scénarios de rupture de digue de résidus.
  BC-4460.30.40:
    name: Rapport de conformité aux normes sur les résidus
    description: |
      Rapport de conformité à la norme mondiale de gestion des résidus et aux
      organismes de réglementation équivalents.
  BC-4460.40:
    name: Gestion des stériles
    description: |
      Caractérisation et gestion opérationnelle des haldes à stériles, incluant
      les mesures de contrôle du drainage acide et métallique.
  BC-4460.40.10:
    name: Caractérisation des stériles
    description: |
      Caractérisation géochimique des stériles pour le potentiel de drainage
      acide et métallique.
  BC-4460.40.20:
    name: Opérations de haldes à stériles
    description: |
      Placement opérationnel des stériles dans les haldes aménagées et les
      zones de remblayage.
  BC-4460.40.30:
    name: Gestion du drainage acide et métallique
    description: |
      Prévention, captage et traitement du drainage acide et métallique provenant
      des stériles et des stocks de minerai.
  BC-4460.50:
    name: Gestion des eaux de mine
    description: |
      Bilan hydrique à l'échelle du site, traitement des eaux et conformité
      des rejets.
  BC-4460.50.10:
    name: Opérations de bilan hydrique de mine
    description: |
      Gestion opérationnelle des bilans hydriques du site pour les eaux de fosse,
      souterraines et de procédé.
  BC-4460.50.20:
    name: Traitement des eaux de mine
    description: |
      Exploitation des usines de traitement des eaux de mine à la chaux, par
      osmose inverse et par voie biologique.
  BC-4460.50.30:
    name: Surveillance de la conformité des rejets d'eau
    description: |
      Surveillance et rapport des rejets d'eau par rapport aux conditions de
      la licence environnementale.
  BC-4460.60:
    name: Gestion des déchets miniers dangereux
    description: |
      Gestion des déchets de réactifs de procédé, des déchets contenant du cyanure
      et des résidus chargés en métaux lourds.
  BC-4460.60.10:
    name: Élimination des déchets de réactifs
    description: |
      Élimination des réactifs de procédé usés et des contenants contaminés.
  BC-4460.60.20:
    name: Gestion des déchets cyanurés
    description: |
      Détoxification et gestion des résidus et déchets de procédé contenant du
      cyanure.
  BC-4460.60.30:
    name: Gestion des déchets de mercure et de métaux lourds
    description: |
      Gestion des résidus contenant du mercure, de l'arsenic et d'autres métaux
      lourds issus du traitement et de l'affinage.

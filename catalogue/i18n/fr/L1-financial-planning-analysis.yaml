locale: fr
source: L1-financial-planning-analysis.yaml
entries:
  BC-230:
    name: Planification et analyse financières
    description: |
      Prévisions, planification, analyse de la performance et reporting de gestion.
  BC-230.10:
    name: Gestion du budget
    description: |
      Processus budgétaire annuel et consolidation.
  BC-230.10.10:
    name: Calendrier budgétaire et gouvernance du processus
    description: |
      Calendrier, modèles et gouvernance du processus budgétaire.
  BC-230.10.20:
    name: Fixation des objectifs descendants
    description: |
      Définition des cibles financières descendantes alignées sur la stratégie.
  BC-230.10.30:
    name: Construction ascendante du budget
    description: |
      Budgétisation ascendante par centre de coût, projet et produit.
  BC-230.10.40:
    name: Consolidation et approbation du budget
    description: |
      Consolidation de groupe, itérations et approbation finale du budget.
  BC-230.20:
    name: Gestion des prévisions
    description: |
      Prévisions glissantes et planification par scénarios.
  BC-230.20.10:
    name: Production des prévisions glissantes
    description: |
      Prévisions glissantes de revenus, de coûts et de trésorerie sur une base mensuelle ou trimestrielle.
  BC-230.20.20:
    name: Prévisions basées sur les inducteurs
    description: |
      Utilisation des inducteurs opérationnels pour prévoir les résultats financiers.
  BC-230.20.30:
    name: Modélisation par scénarios et analyses de sensibilité
    description: |
      Prévisions multi-scénarios et analyses de sensibilité.
  BC-230.20.40:
    name: Suivi de la précision des prévisions
    description: |
      Suivi et amélioration de la précision des prévisions par ligne de compte.
  BC-230.30:
    name: Reporting de gestion
    description: |
      Reporting de gestion périodique, KPI et tableaux de bord.
  BC-230.30.10:
    name: Reporting à la direction générale et au conseil d'administration
    description: |
      Tableaux de bord de direction et rapports de performance destinés au conseil d'administration.
  BC-230.30.20:
    name: Reporting de performance par unité opérationnelle
    description: |
      Reporting par unité opérationnelle, segment et ligne de produits.
  BC-230.30.30:
    name: Définition et gouvernance des KPI
    description: |
      Taxonomie des KPI, définitions et gouvernance des indicateurs de performance.
  BC-230.30.40:
    name: Analytique en libre-service pour la gestion
    description: |
      Mise en place de l'analytique en libre-service pour les partenaires financiers opérationnels.
  BC-230.40:
    name: Gestion de l'analyse de la performance
    description: |
      Analyse des écarts, de la rentabilité et analyses approfondies.
  BC-230.40.10:
    name: Analyse des écarts et des réalisations par rapport au plan
    description: |
      Analyse des écarts entre les réalisations, le budget et les prévisions.
  BC-230.40.20:
    name: Analyse de la rentabilité
    description: |
      Analyse de la rentabilité par client, produit et canal.
  BC-230.40.30:
    name: Analytique des coûts et de l'efficience
    description: |
      Analyse des inducteurs de coûts, ratios d'efficience et benchmarking.
  BC-230.40.40:
    name: Analyse du besoin en fonds de roulement
    description: |
      Analyse des cycles de créances, de dettes et de stocks.
  BC-230.50:
    name: Gestion des cas d'affaires
    description: |
      Élaboration de cas d'affaires, évaluation et revue post-mise en œuvre.
  BC-230.50.10:
    name: Élaboration du cas d'affaires
    description: |
      Modèles et méthodologies standardisés pour les cas d'affaires.
  BC-230.50.20:
    name: Évaluation des investissements
    description: |
      VAN, TRI, délai de récupération et évaluation qualitative des investissements.
  BC-230.50.30:
    name: Gouvernance de l'allocation du capital
    description: |
      Comités d'approbation du capital, seuils et priorisation.
  BC-230.50.40:
    name: Suivi de la réalisation des bénéfices
    description: |
      Revues post-mise en œuvre et suivi de la réalisation des bénéfices.

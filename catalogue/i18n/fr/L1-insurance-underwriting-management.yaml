locale: fr
source: L1-insurance-underwriting-management.yaml
entries:
  BC-2130:
    name: Gestion de la souscription en assurance
    description: |
      Évaluation des risques, tarification, acceptation, refus et souscription des demandes
      d'assurance en branches particuliers, professionnels et spécialités, incluant le respect
      des délégations de souscription et le pilotage du portefeuille.
  BC-2130.10:
    name: Réception des risques en souscription
    description: |
      Triage des soumissions, collecte des données de risque, récupération de l'historique sinistres et enrichissement par des données tierces.
  BC-2130.10.10:
    name: Triage des soumissions
    description: |
      Triage des soumissions de souscription et routage vers les équipes de souscription.
  BC-2130.10.20:
    name: Collecte des données de risque
    description: |
      Collecte des données de risque pertinentes auprès du demandeur, du courtier et des sources d'expertise.
  BC-2130.10.30:
    name: Récupération de l'historique sinistres
    description: |
      Récupération des historiques sinistres auprès des bureaux, assureurs précédents et registres partagés.
  BC-2130.10.40:
    name: Enrichissement par des données tierces
    description: |
      Enrichissement des soumissions avec des données tierces, télémétriques et IoT.
  BC-2130.20:
    name: Évaluation et sélection des risques
    description: |
      Notation des risques, agrégation des expositions, expertises de prévention et renvois de souscription.
  BC-2130.20.10:
    name: Notation et modélisation des risques
    description: |
      Application des modèles de souscription, cartes de score et scores de risque par apprentissage automatique.
  BC-2130.20.20:
    name: Évaluation de l'agrégation des expositions
    description: |
      Évaluation de l'agrégation des expositions par rapport au portefeuille en vigueur.
  BC-2130.20.30:
    name: Coordination des expertises de prévention
    description: |
      Coordination des expertises de prévention et des rapports d'ingénierie des risques.
  BC-2130.20.40:
    name: Traitement des renvois de souscription
    description: |
      Traitement des renvois aux souscripteurs seniors, aux délégations et aux réassureurs.
  BC-2130.30:
    name: Gestion de la tarification en souscription
    description: |
      Tarification manuelle, crédits de tarification au barème, tarification à l'expérience et tarification sur mesure en spécialités.
  BC-2130.30.10:
    name: Application de la tarification manuelle
    description: |
      Application des taux manuels issus de la configuration produit déposée.
  BC-2130.30.20:
    name: Application de la tarification au barème et des crédits
    description: |
      Application des crédits et débits de tarification au barème.
  BC-2130.30.30:
    name: Tarification à l'expérience
    description: |
      Tarification basée sur l'expérience utilisant l'historique sinistres de l'assuré.
  BC-2130.30.40:
    name: Tarification sur mesure et en spécialités
    description: |
      Tarification sur mesure pour les spécialités, grands comptes et risques complexes.
  BC-2130.40:
    name: Gestion des décisions et autorités de souscription
    description: |
      Décisions d'acceptation et de refus, définition des termes et conditions, respect des autorités et souscription.
  BC-2130.40.10:
    name: Décision d'acceptation et de refus
    description: |
      Prise de décision sur l'acceptation, le refus ou la contre-offre des soumissions.
  BC-2130.40.20:
    name: Définition des termes et conditions de garantie
    description: |
      Définition des termes, conditions, exclusions et garanties de couverture.
  BC-2130.40.30:
    name: Respect des autorités de souscription
    description: |
      Respect des limites d'autorité de souscription et des seuils de renvoi.
  BC-2130.40.40:
    name: Émission de cotations et souscription
    description: |
      Émission des cotations engageantes et confirmation de la couverture.
  BC-2130.50:
    name: Gestion du portefeuille de souscription
    description: |
      Surveillance du mix et des limites du portefeuille, analyse de la rentabilité et planification des actions de souscription.
  BC-2130.50.10:
    name: Surveillance du mix et des limites du portefeuille
    description: |
      Surveillance du mix du portefeuille par rapport à l'appétit et aux limites de concentration.
  BC-2130.50.20:
    name: Analyse de la rentabilité de souscription
    description: |
      Analyse de la rentabilité de souscription par segment, produit et producteur.
  BC-2130.50.30:
    name: Planification des actions de souscription
    description: |
      Planification des actions de souscription, de la remédiation et des sorties de segment.
  BC-2130.60:
    name: Gestion de la fraude et des fausses déclarations en souscription
    description: |
      Criblage de la fraude à la souscription, investigation des fausses déclarations substantielles et reporting.
  BC-2130.60.10:
    name: Criblage de la fraude à la souscription
    description: |
      Criblage des demandes d'assurance pour les indicateurs de fraude.
  BC-2130.60.20:
    name: Investigation des fausses déclarations substantielles
    description: |
      Investigation des fausses déclarations substantielles suspectées sur les demandes.
  BC-2130.60.30:
    name: Rapport de fraude en souscription
    description: |
      Signalement des fraudes confirmées en souscription aux registres sectoriels et aux autorités.

locale: fr
source: L1-student-recruitment-admissions-management.yaml
entries:
  BC-4710:
    name: Gestion du recrutement et des admissions des étudiants
    description: |
      Attraction, traitement des candidatures, décisions d'admission et
      conversion des étudiants potentiels en apprenants inscrits, incluant les
      offres d'aide financière et la gestion des admissions internationales.
  BC-4710.10:
    name: Sensibilisation et recrutement des prospects
    description: |
      Recrutement sortant d'étudiants potentiels par des campagnes, des
      événements et des activités de génération de prospects.
    in_scope:
      - Campagnes de recrutement et traitement des demandes entrantes
      - Journées portes ouvertes, salons et visites de campus
      - Capture et maturation des prospects
    out_of_scope:
      - Marketing institutionnel général (couvert sous Gestion du marketing transversal)
  BC-4710.10.10:
    name: Opérations de campagnes de recrutement
    description: |
      Planification et exécution des campagnes de recrutement d'étudiants sur
      tous les canaux.
  BC-4710.10.20:
    name: Opérations des journées portes ouvertes et visites de campus
    description: |
      Organisation des journées portes ouvertes, sessions de découverte et
      visites de campus pour les candidats potentiels.
  BC-4710.10.30:
    name: Gestion des prospects
    description: |
      Capture, maturation et qualification des prospects étudiants potentiels.
  BC-4710.20:
    name: Gestion des candidatures
    description: |
      Réception et traitement des candidatures des étudiants potentiels, incluant
      les pièces justificatives et les communications avec les candidats.
    in_scope:
      - Réception et validation des candidatures
      - Vérification des documents et références
      - Communication sur l'état des candidatures
    out_of_scope:
      - Décision d'admission (couvert sous Décision d'admission)
  BC-4710.20.10:
    name: Réception et validation des candidatures
    description: |
      Réception et validation de la complétude des candidatures sur tous les
      canaux.
  BC-4710.20.20:
    name: Vérification des documents justificatifs
    description: |
      Vérification des relevés de notes, références et documents justificatifs.
  BC-4710.20.30:
    name: Communication sur l'état des candidatures
    description: |
      Communication de l'avancement des candidatures aux candidats.
  BC-4710.30:
    name: Décision d'admission
    description: |
      Évaluation, notation, revue en comité et émission des décisions d'admission
      selon les critères d'entrée publiés.
    in_scope:
      - Évaluation et notation des admissions
      - Revue en comité d'admission
      - Émission des décisions d'admission
    out_of_scope:
      - Attribution de l'aide financière (couvert sous Gestion de l'aide financière et des bourses)
  BC-4710.30.10:
    name: Évaluation et notation des admissions
    description: |
      Évaluation et notation des candidats selon les critères d'entrée.
  BC-4710.30.20:
    name: Revue en comité d'admission
    description: |
      Revue en comité ou en jury des candidatures à la limite et compétitives.
  BC-4710.30.30:
    name: Émission des décisions
    description: |
      Émission des offres, offres conditionnelles, listes d'attente et refus.
  BC-4710.40:
    name: Gestion de l'aide financière et des bourses
    description: |
      Détermination, attribution et versement de l'aide financière, des bourses,
      allocations et subventions favorisant l'accès et l'accessibilité financière.
    in_scope:
      - Évaluation de l'éligibilité à l'aide financière
      - Administration de l'attribution des bourses
      - Versement des allocations et subventions
    out_of_scope:
      - Conformité au financement public (couvert sous Gestion de la conformité et des rapports réglementaires)
  BC-4710.40.10:
    name: Évaluation de l'éligibilité à l'aide financière
    description: |
      Évaluation de l'éligibilité à l'aide financière basée sur les besoins et
      le mérite.
  BC-4710.40.20:
    name: Administration de l'attribution des bourses
    description: |
      Administration des attributions de bourses de sources internes et externes.
  BC-4710.40.30:
    name: Versement des allocations et subventions
    description: |
      Versement des allocations, subventions et aides au paiement des frais de
      scolarité.
  BC-4710.50:
    name: Conversion des offres en inscriptions
    description: |
      Conversion des offres d'admission en inscriptions confirmées, incluant la
      gestion des acceptations, l'intégration pré-inscription et les analyses
      de conversion.
    in_scope:
      - Suivi des acceptations d'offres
      - Activités d'intégration pré-inscription
      - Analyse du rendement et de la conversion
    out_of_scope:
      - Inscription et enregistrement actifs (couvert sous Gestion des inscriptions et dossiers étudiants)
  BC-4710.50.10:
    name: Émission des offres et suivi des acceptations
    description: |
      Émission des offres et suivi des acceptations, refus et reports.
  BC-4710.50.20:
    name: Intégration pré-inscription
    description: |
      Tâches d'intégration accomplies par les étudiants admis avant l'inscription
      formelle.
  BC-4710.50.30:
    name: Gestion du rendement et analyse de la conversion
    description: |
      Analyse du rendement des offres, des annulations et des performances de
      conversion.
  BC-4710.60:
    name: Gestion des admissions internationales
    description: |
      Traitement spécialisé des candidats internationaux incluant l'évaluation
      des diplômes, la maîtrise de la langue et la documentation de parrainage
      de visa.
    in_scope:
      - Évaluation des diplômes étrangers
      - Évaluation de la maîtrise de l'anglais
      - Génération de la documentation de parrainage de visa
    out_of_scope:
      - Conformité visa continue pour les étudiants inscrits (couvert sous Gestion de la conformité et des rapports réglementaires)
  BC-4710.60.10:
    name: Évaluation des diplômes étrangers
    description: |
      Évaluation des diplômes académiques étrangers par rapport à l'équivalence
      nationale.
  BC-4710.60.20:
    name: Évaluation de la maîtrise de l'anglais
    description: |
      Évaluation de la maîtrise de l'anglais pour les candidats non natifs.
  BC-4710.60.30:
    name: Documentation de parrainage de visa
    description: |
      Émission des documents de parrainage de visa (ex. I-20, CAS) aux étudiants
      admis.

locale: fr
source: L1-policy-administration-management.yaml
entries:
  BC-2140:
    name: Administration des polices
    description: |
      Émission, avenants, ajustements en cours de période, renouvellements, résiliations,
      déchéances, remises en vigueur, gestion documentaire et administration des polices
      collectives et maîtresses des contrats d'assurance en vigueur.

  BC-2140.10:
    name: Gestion de l'émission des polices
    description: |
      Génération, constitution et activation de nouveaux contrats de police et des
      documents justificatifs associés.

  BC-2140.10.10:
    name: Génération des documents de police
    description: |
      Génération des documents de police à partir des modèles produits et des conditions
      souscrites.

  BC-2140.10.20:
    name: Constitution des annexes et libellés de police
    description: |
      Constitution des annexes, libellés et avenants de police dans le contrat final.

  BC-2140.10.30:
    name: Activation de la police
    description: |
      Activation des nouvelles polices et notification aux systèmes en aval.

  BC-2140.20:
    name: Avenants et ajustements en cours de période
    description: |
      Saisie, tarification, approbation et émission des avenants et des ajustements en
      cours de période.

  BC-2140.20.10:
    name: Saisie des demandes d'avenant
    description: |
      Saisie des demandes d'avenant émanant des assurés et des producteurs.

  BC-2140.20.20:
    name: Tarification et approbation des avenants
    description: |
      Tarification des avenants et approbation par la souscription lorsque requis.

  BC-2140.20.30:
    name: Émission et communication des avenants
    description: |
      Émission des documents d'avenant et communication à l'assuré.

  BC-2140.30:
    name: Gestion du renouvellement des polices
    description: |
      Éligibilité au renouvellement, rétarification, génération des offres et gestion
      des non-renouvellements.

  BC-2140.30.10:
    name: Évaluation de l'éligibilité au renouvellement
    description: |
      Évaluation de l'éligibilité au renouvellement sur la base de l'expérience
      sinistres et des règles de souscription.

  BC-2140.30.20:
    name: Rétarification au renouvellement
    description: |
      Rétarification des polices renouvelées selon les tarifications en vigueur et
      l'expérience constatée.

  BC-2140.30.30:
    name: Génération des offres de renouvellement
    description: |
      Génération et envoi des offres de renouvellement aux assurés.

  BC-2140.30.40:
    name: Traitement des non-renouvellements
    description: |
      Traitement des non-renouvellements, y compris les délais de préavis et les
      communications réglementaires.

  BC-2140.40:
    name: Gestion des résiliations et déchéances de polices
    description: |
      Traitement des résiliations, ajustement de prime, déchéance et remise en vigueur.

  BC-2140.40.10:
    name: Traitement des demandes de résiliation
    description: |
      Traitement des demandes de résiliation émanant des assurés, des producteurs ou
      de la compagnie.

  BC-2140.40.20:
    name: Calcul au prorata et au prorata réduit
    description: |
      Calcul des ajustements de prime au prorata et au prorata réduit lors d'une
      résiliation.

  BC-2140.40.30:
    name: Traitement des déchéances
    description: |
      Traitement des déchéances pour non-paiement et notification à l'assuré.

  BC-2140.40.40:
    name: Traitement des remises en vigueur
    description: |
      Remise en vigueur des polices déchues ou résiliées sous réserve de vérifications
      de souscription.

  BC-2140.50:
    name: Gestion des documents et archives de polices
    description: |
      Référentiel des documents de police, conservation des archives réglementaires et
      pistes d'audit des polices.

  BC-2140.50.10:
    name: Référentiel des documents de police
    description: |
      Référentiel des documents de police et des correspondances associées.

  BC-2140.50.20:
    name: Conservation réglementaire des archives
    description: |
      Conservation des archives de police conformément aux exigences réglementaires
      en assurance.

  BC-2140.50.30:
    name: Maintenance de la piste d'audit des polices
    description: |
      Maintenance de pistes d'audit immuables sur les modifications et décisions
      relatives aux polices.

  BC-2140.60:
    name: Administration des polices collectives et maîtresses
    description: |
      Mise en place des polices collectives, maintenance des certificats et cycles de
      renouvellement collectifs.

  BC-2140.60.10:
    name: Mise en place des polices collectives
    description: |
      Mise en place des contrats de polices collectives et maîtresses pour les
      régimes employeurs et les groupements d'affinité.

  BC-2140.60.20:
    name: Maintenance des membres et certificats
    description: |
      Maintenance des membres du groupe, des certificats et des personnes à charge.

  BC-2140.60.30:
    name: Gestion des cycles de renouvellement collectif
    description: |
      Gestion des cycles de renouvellement collectif, de la rétarification et de la
      réadhésion des membres.

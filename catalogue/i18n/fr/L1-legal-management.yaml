locale: fr
source: L1-legal-management.yaml
entries:
  BC-150:
    name: Gestion juridique
    description: |
      Conseil juridique, gestion des contrats, contentieux et affaires juridiques de l'entreprise.
  BC-150.10:
    name: Gestion des contrats
    description: |
      Cycle de vie des contrats, de la rédaction à la clôture.
  BC-150.10.10:
    name: Rédaction des contrats et bibliothèques de clauses
    description: |
      Maintenance des bibliothèques de clauses, modèles et guides de négociation.
  BC-150.10.20:
    name: Assistance à la négociation contractuelle
    description: |
      Appui juridique à la négociation, à la révision des textes et à la définition des positions de risque.
  BC-150.10.30:
    name: Gestion de l'exécution des contrats
    description: |
      Workflows d'approbation, signature et contrôle de l'exécution.
  BC-150.10.40:
    name: Référentiel de contrats et suivi des obligations
    description: |
      Référentiel centralisé, dates clés et surveillance des obligations contractuelles.
  BC-150.10.50:
    name: Renouvellement et résiliation des contrats
    description: |
      Administration des renouvellements, avenants et résiliations contractuelles.
  BC-150.20:
    name: Gestion des contentieux et des litiges
    description: |
      Litiges, contentieux et arbitrages.
  BC-150.20.10:
    name: Gestion des litiges pré-contentieux
    description: |
      Mises en demeure, médiation et négociation avant contentieux.
  BC-150.20.20:
    name: Gestion des dossiers de contentieux
    description: |
      Gestion de bout en bout des procédures judiciaires.
  BC-150.20.30:
    name: Arbitrage et modes alternatifs de résolution des conflits
    description: |
      Arbitrage, médiation et autres mécanismes de résolution amiable.
  BC-150.20.40:
    name: Conservation légale et divulgation électronique
    description: |
      Avis de conservation, préservation des preuves et discovery électronique.
  BC-150.30:
    name: Droit des sociétés et droit commercial
    description: |
      Droit des sociétés, appui juridique aux fusions-acquisitions et transactions commerciales.
  BC-150.30.10:
    name: Conseil en droit des sociétés
    description: |
      Conseils en droit des sociétés, gouvernance et structuration des entités.
  BC-150.30.20:
    name: Appui juridique aux fusions-acquisitions
    description: |
      Due diligence juridique, documentation des transactions et clôture.
  BC-150.30.30:
    name: Conseil en transactions commerciales
    description: |
      Appui juridique aux opérations commerciales, partenariats et licences.
  BC-150.30.40:
    name: Conseil juridique en valeurs mobilières et marchés de capitaux
    description: |
      Droit des valeurs mobilières, cotation et opérations sur les marchés de capitaux.
  BC-150.40:
    name: Affaires juridiques réglementaires
    description: |
      Interprétation juridique des réglementations et engagement avec les régulateurs.
  BC-150.40.10:
    name: Interprétation juridique des réglementations
    description: |
      Avis juridiques sur l'applicabilité et l'interprétation des réglementations.
  BC-150.40.20:
    name: Liaison avec les régulateurs et soumissions
    description: |
      Appui juridique aux interactions avec les régulateurs et aux soumissions formelles.
  BC-150.40.30:
    name: Appui juridique aux affaires gouvernementales et publiques
    description: |
      Appui juridique au lobbying, aux consultations publiques et aux démarches de plaidoyer.
  BC-150.50:
    name: Gestion des opérations juridiques
    description: |
      Opérations du département juridique, facturation électronique et gestion des dossiers.
  BC-150.50.10:
    name: Gestion des dossiers juridiques
    description: |
      Réception, attribution et suivi du cycle de vie des dossiers juridiques.
  BC-150.50.20:
    name: Gestion des avocats externes
    description: |
      Gestion des panels, mandats et performance des conseils externes.
  BC-150.50.30:
    name: Gestion des coûts juridiques et facturation électronique
    description: |
      Budgétisation juridique, facturation électronique et analyse des dépenses.
  BC-150.50.40:
    name: Gestion des connaissances juridiques
    description: |
      Précédents, savoir-faire et mise en œuvre des technologies juridiques.

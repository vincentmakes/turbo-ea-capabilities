locale: fr
source: L1-dealer-network-management.yaml
entries:
  BC-3430:
    name: Gestion du réseau de concessionnaires
    description: |
      Gouvernance du réseau de concessionnaires agréés ou franchisés — nominations, accords, normes de marque et d'installation, performance, formation et développement du réseau dans le cadre du règlement d'exemption par catégorie de l'UE et des règles équivalentes de distribution au détail.
  BC-3430.10:
    name: Stratégie et planification du réseau de concessionnaires
    description: |
      Planification stratégique de l'empreinte, du format, de la couverture et des normes de marque du réseau de concessionnaires sur l'ensemble des marchés.
  BC-3430.10.10:
    name: Planification de la couverture marché et réseau
    description: |
      Analyse des lacunes de couverture de marché et définition de l'empreinte cible du réseau de concessionnaires par zone.
  BC-3430.10.20:
    name: Optimisation de l'empreinte du réseau de concessionnaires
    description: |
      Optimisation du réseau existant de concessionnaires incluant consolidation, relocalisation et extension de capacité.
  BC-3430.10.30:
    name: Définition du format réseau et des normes de marque
    description: |
      Définition des formats de concessionnaires, des concepts de vente au détail et des normes d'expérience de marque.
  BC-3430.20:
    name: Gestion des nominations et accords de concessionnaires
    description: |
      Intégration, accord et résiliation des concessionnaires, incluant la gestion des territoires et des droits de marque.
  BC-3430.20.10:
    name: Candidature et sélection des concessionnaires
    description: |
      Réception et analyse des candidatures de concessionnaires incluant la diligence raisonnable financière, juridique et opérationnelle.
  BC-3430.20.20:
    name: Rédaction et exécution des accords de concessionnaires
    description: |
      Rédaction, négociation et exécution des accords de concessionnaires conformes au droit de la concurrence applicable.
  BC-3430.20.30:
    name: Gestion des territoires et droits de marque
    description: |
      Allocation et gestion des territoires et droits de marque, y compris les définitions de zones de responsabilité.
  BC-3430.20.40:
    name: Gestion de la résiliation des concessionnaires
    description: |
      Gestion de la résiliation, de la liquidation et de la réattribution du territoire des concessionnaires.
  BC-3430.30:
    name: Normes et conformité des concessionnaires
    description: |
      Maintien et audit des normes de marque, d'installation et opérationnelles dans l'ensemble du réseau de concessionnaires.
  BC-3430.30.10:
    name: Gestion des normes de marque et d'installation
    description: |
      Maintien des normes de marque, d'installation et d'expérience client pour la conformité des concessionnaires.
  BC-3430.30.20:
    name: Audit de conformité des concessionnaires
    description: |
      Audit périodique des concessionnaires selon les normes de marque, de vente et d'après-vente.
  BC-3430.30.30:
    name: Gestion des actions correctives
    description: |
      Gestion des plans d'action corrective pour les concessionnaires non conformes jusqu'à leur clôture.
  BC-3430.40:
    name: Gestion de la performance des concessionnaires
    description: |
      Mesure et amélioration de la performance commerciale et opérationnelle des concessionnaires par des tableaux de bord et des programmes d'incitation.
  BC-3430.40.10:
    name: Gestion du tableau de bord des concessionnaires
    description: |
      Définition et exploitation des tableaux de bord des concessionnaires couvrant les métriques de ventes, d'après-vente et d'expérience client.
  BC-3430.40.20:
    name: Revues de performance ventes et après-vente
    description: |
      Revues périodiques de performance des concessionnaires et planification d'activité conjointe avec les responsables de zone.
  BC-3430.40.30:
    name: Gestion des programmes d'incitation des concessionnaires
    description: |
      Conception et exploitation des programmes de bonus, de marge et d'incitation des concessionnaires.
  BC-3430.50:
    name: Gestion du financement et du plan de stock des concessionnaires
    description: |
      Financement de l'inventaire en gros des concessionnaires et gestion des créances et des programmes de soutien au fonds de roulement.
    in_scope:
      - Administration du plan de stock en gros
      - Limites de crédit des concessionnaires et suivi des expositions
      - Soutien au fonds de roulement des concessionnaires par le constructeur
    out_of_scope:
      - Crédit retail de financement automobile captif (couvert dans le cadre du crédit et du prêt d'entreprise)
  BC-3430.50.10:
    name: Administration du plan de stock en gros
    description: |
      Administration du financement du plan de stock en gros pour l'inventaire de véhicules des concessionnaires.
  BC-3430.50.20:
    name: Gestion du crédit et des créances des concessionnaires
    description: |
      Gestion des limites de crédit, du vieillissement des créances et des recouvrements des concessionnaires.
  BC-3430.50.30:
    name: Soutien au fonds de roulement des concessionnaires
    description: |
      Soutien au fonds de roulement des concessionnaires par le constructeur, financement des pièces et programmes d'assistance saisonnière.
  BC-3430.60:
    name: Formation et certification des concessionnaires
    description: |
      Formation et certification du personnel de vente, d'après-vente et de direction des concessionnaires.
  BC-3430.60.10:
    name: Certification des vendeurs concessionnaires
    description: |
      Certification des conseillers de vente des concessionnaires sur les produits, la marque et les normes d'expérience client.
  BC-3430.60.20:
    name: Certification des techniciens de service des concessionnaires
    description: |
      Certification des techniciens de service des concessionnaires sur les procédures de diagnostic, de réparation et sur les véhicules électriques/haute tension.
  BC-3430.60.30:
    name: Développement du management des concessionnaires
    description: |
      Programmes de développement du leadership et du management pour les directeurs de concession et les responsables de département.
  BC-3430.70:
    name: Opérations systèmes et données des concessionnaires
    description: |
      Exploitation des systèmes et flux de données orientés concessionnaires reliant les concessionnaires aux plateformes commerciales, techniques et de reporting du constructeur.
  BC-3430.70.10:
    name: Intégration des systèmes de gestion des concessionnaires
    description: |
      Intégration des systèmes de gestion des concessionnaires avec les systèmes de commandes, pièces, garantie et reporting du constructeur.
  BC-3430.70.20:
    name: Gestion des données de référence des concessionnaires
    description: |
      Maintien des données de référence des concessionnaires incluant les points de vente, contacts et autorisations.
  BC-3430.70.30:
    name: Reporting et analytique des concessionnaires
    description: |
      Reporting, benchmarking et analytique au niveau concessionnaire sur les dimensions commerciales et opérationnelles.

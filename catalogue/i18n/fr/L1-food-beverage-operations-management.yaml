locale: fr
source: L1-food-beverage-operations-management.yaml
entries:
  BC-4070:
    name: Gestion des opérations de restauration
    description: |
      Exploitation des services de restauration dans les restaurants, bars, room-service, banquets et cuisines — couvrant l'ingénierie des recettes et menus, les achats, la production en cuisine, le service, l'hygiène et la sécurité alimentaire.
    in_scope:
      - Gestion des menus et recettes avec données allergènes et nutritionnelles
      - Achats, cave et gestion des stocks de restauration
      - Planification de la production en cuisine et exécution en ligne
      - Opérations de service au restaurant, en room-service et en banquet
      - Opérations HACCP et sécurité alimentaire
    out_of_scope:
      - Maintenance technique de l'établissement (BC-4060.30)
      - Création des bons de commande banquet et ventes groupes (BC-4110)
      - Opérations de cuisine à bord des navires de croisière (BC-4090)
  BC-4070.10:
    name: Ingénierie des menus et gestion des recettes
    description: |
      Ingénierie des menus et recettes incluant les spécifications, les déclarations d'allergènes et nutritionnelles, la rentabilité et les versions.
  BC-4070.10.10:
    name: Gestion des recettes et des spécifications
    description: |
      Gestion des recettes, sous-recettes et spécifications produits sur l'ensemble des points de vente.
  BC-4070.10.20:
    name: Déclaration des allergènes et des valeurs nutritionnelles
    description: |
      Déclaration des allergènes et des valeurs nutritionnelles des articles de menu conformément à la réglementation.
  BC-4070.10.30:
    name: Calcul du coût des recettes et ingénierie des marges
    description: |
      Calcul du coût des recettes et ingénierie des marges du menu par rapport au food cost cible.
  BC-4070.10.40:
    name: Gestion des versions et déploiement des menus
    description: |
      Gestion des versions et déploiement des menus selon les saisons, les points de vente et les marchés.
  BC-4070.20:
    name: Achats et stocks de restauration
    description: |
      Approvisionnement en produits de restauration, gestion de la cave, réapprovisionnement aux niveaux de référence et analyse des écarts théoriques/réels.
  BC-4070.20.10:
    name: Sélection des fournisseurs de restauration
    description: |
      Sélection des fournisseurs de restauration incluant l'agrément et les conditions contractuelles.
  BC-4070.20.20:
    name: Gestion des stocks de boissons et de la cave
    description: |
      Gestion des stocks de boissons et de cave incluant le suivi par millésime et la rotation.
  BC-4070.20.30:
    name: Gestion des niveaux de référence et du réapprovisionnement
    description: |
      Gestion des niveaux de référence et des cycles de réapprovisionnement sur l'ensemble des points de vente.
  BC-4070.20.40:
    name: Analyse des écarts théoriques/réels
    description: |
      Analyse des écarts de coût alimentaire et boissons théoriques/réels avec identification des causes racines.
  BC-4070.30:
    name: Opérations de production en cuisine
    description: |
      Exploitation de la production en cuisine incluant la planification, l'exécution en ligne, le dressage et la maîtrise des coûts alimentaires.
  BC-4070.30.10:
    name: Planification de la production et mise en place
    description: |
      Planification des cycles de production en cuisine et de la mise en place avant le service.
  BC-4070.30.20:
    name: Opérations de production en ligne et de service
    description: |
      Production en ligne en direct et coordination au passe pendant les services.
  BC-4070.30.30:
    name: Dressage et contrôle qualité
    description: |
      Dressage et contrôle qualité au passe avant le service aux clients.
  BC-4070.30.40:
    name: Maîtrise des coûts alimentaires en cuisine
    description: |
      Opérations de maîtrise des coûts alimentaires incluant les contrôles de rendement et la saisie des déchets.
  BC-4070.40:
    name: Opérations de service au restaurant et dans les points de vente
    description: |
      Opérations de service dans les restaurants et points de vente incluant la réservation, le placement, la gestion des couverts et la remise en état.
  BC-4070.40.10:
    name: Gestion des réservations et du placement en salle
    description: |
      Gestion des réservations, de l'attribution des tables et de la liste d'attente dans les points de vente.
  BC-4070.40.20:
    name: Gestion des couverts et du rythme du service
    description: |
      Gestion du nombre de couverts et du rythme du service tout au long des périodes de service.
  BC-4070.40.30:
    name: Opérations de service en salle
    description: |
      Opérations de service en salle incluant la prise de commande, les standards de service et la présentation de l'addition.
  BC-4070.40.40:
    name: Fermeture et remise en état du point de vente
    description: |
      Fermeture, clôture de caisse et remise en état pour la prochaine période de service.
  BC-4070.50:
    name: Opérations de room-service et de minibar
    description: |
      Prise de commande et livraison en room-service, réapprovisionnement du minibar et opérations de cadeaux de bienvenue.
  BC-4070.50.10:
    name: Prise de commande en room-service
    description: |
      Prise de commande en room-service via les canaux téléphone, application et porte-menu.
  BC-4070.50.20:
    name: Opérations de livraison en room-service
    description: |
      Livraison des commandes en room-service dans les délais standards de service.
  BC-4070.50.30:
    name: Opérations de réapprovisionnement du minibar
    description: |
      Réapprovisionnement et saisie des consommations du stock minibar.
  BC-4070.50.40:
    name: Opérations de dotations et de cadeaux de bienvenue
    description: |
      Exploitation des dotations en chambre et de l'approvisionnement en cadeaux de bienvenue pour les clients VIP et reconnus.
  BC-4070.60:
    name: Opérations de banquet et de traiteur
    description: |
      Opérations de banquet et de traiteur couvrant l'installation, le service, la restauration hors site et le service des boissons pour les événements.
  BC-4070.60.10:
    name: Opérations d'installation et de remise en état du banquet
    description: |
      Installation, changement de configuration et remise en état des salles de banquet entre événements consécutifs.
  BC-4070.60.20:
    name: Opérations de service servi et buffet
    description: |
      Opérations de service pour les banquets servis, en buffet et en service familial.
  BC-4070.60.30:
    name: Opérations de traiteur hors site
    description: |
      Exploitation des services de traiteur délivrés en dehors de l'établissement d'accueil.
  BC-4070.60.40:
    name: Opérations de service des boissons en banquet
    description: |
      Opérations de service des boissons lors des événements de banquet incluant l'installation du bar et le suivi des consommations.
  BC-4070.70:
    name: Opérations d'hygiène et de sécurité alimentaire
    description: |
      Opérations d'hygiène et de sécurité alimentaire incluant l'exécution des plans HACCP, le suivi des températures, les contrôles allergènes et la gestion des incidents.
  BC-4070.70.10:
    name: Exécution du plan HACCP
    description: |
      Exécution des plans HACCP aux étapes de réception, stockage, préparation, cuisson et maintien en température.
  BC-4070.70.20:
    name: Surveillance des températures et de la chaîne du froid
    description: |
      Surveillance des températures et de l'intégrité de la chaîne du froid sur l'ensemble du stockage et du service de restauration.
  BC-4070.70.30:
    name: Contrôles des contaminations croisées par allergènes
    description: |
      Exploitation des contrôles de contamination croisée par allergènes à la réception, en préparation et au service.
  BC-4070.70.40:
    name: Gestion des incidents de sécurité alimentaire
    description: |
      Gestion des incidents de sécurité alimentaire incluant les signalements de toxi-infections alimentaires présumées.

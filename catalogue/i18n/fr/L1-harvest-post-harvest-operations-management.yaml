locale: fr
source: L1-harvest-post-harvest-operations-management.yaml
entries:
  BC-3560:
    name: Gestion des opérations de récolte et post-récolte
    description: |
      Planification et exécution de la récolte, conditionnement en champ et post-récolte, stockage en exploitation, tri et conditionnement, et réception entrante au point suivant de la chaîne agroalimentaire.
  BC-3560.10:
    name: Planification et ordonnancement de la récolte
    description: |
      Planification des fenêtres de récolte, ordonnancement des équipes et équipements, et coordination de la logistique de récolte sur les champs et les cultures.
  BC-3560.10.10:
    name: Planification des fenêtres de récolte
    description: |
      Planification des fenêtres de récolte parcelle par parcelle selon la maturité et les conditions météorologiques.
  BC-3560.10.20:
    name: Ordonnancement des équipes et équipements de récolte
    description: |
      Ordonnancement des équipes de récolte, des prestataires et des machines.
  BC-3560.10.30:
    name: Coordination de la logistique de récolte
    description: |
      Coordination des camions, bennes et remorques sur les fronts de récolte actifs.
  BC-3560.20:
    name: Opérations de récolte au champ
    description: |
      Opérations de récolte mécanisée et manuelle incluant le tri en champ et le transfert en bord de champ.
  BC-3560.20.10:
    name: Récolte mécanisée
    description: |
      Récolte mécanisée par moissonneuse-batteuse, faucheuse-conditionneuse et équipements spécialisés.
  BC-3560.20.20:
    name: Récolte manuelle
    description: |
      Récolte manuelle sélective des productions horticoles.
  BC-3560.20.30:
    name: Tri en champ
    description: |
      Tri et parage des productions récoltées en champ.
  BC-3560.30:
    name: Conditionnement post-récolte
    description: |
      Séchage, refroidissement, ressuage et décontamination des productions récoltées pour les stabiliser en vue du stockage ou de l'utilisation en aval.
    in_scope:
      - Séchage des céréales et semences
      - Pré-refroidissement des productions horticoles
      - Ressuage des légumes racines et à bulbes
      - Nettoyage et décontamination en champ
  BC-3560.30.10:
    name: Opérations de séchage
    description: |
      Séchage des céréales, semences et fourrages à des teneurs en humidité sûres.
  BC-3560.30.20:
    name: Opérations de refroidissement et de pré-refroidissement
    description: |
      Pré-refroidissement par hydrorefroidissement, sous vide et à air forcé des productions horticoles.
  BC-3560.30.30:
    name: Opérations de ressuage
    description: |
      Ressuage des pommes de terre, oignons, patates douces et cultures similaires.
  BC-3560.30.40:
    name: Nettoyage et décontamination
    description: |
      Nettoyage et décontamination des productions récoltées avant le stockage.
  BC-3560.40:
    name: Opérations de stockage en exploitation
    description: |
      Exploitation des bennes, silos et chambres froides en exploitation incluant l'aération et la gestion des ravageurs de stockage.
  BC-3560.40.10:
    name: Gestion des bennes et silos
    description: |
      Chargement, surveillance et vidange des bennes et silos à céréales.
  BC-3560.40.20:
    name: Opérations de stockage frigorifique
    description: |
      Exploitation des entrepôts réfrigérés et en atmosphère contrôlée en exploitation.
  BC-3560.40.30:
    name: Aération des céréales stockées
    description: |
      Gestion de l'aération des céréales stockées pour maintenir la température et l'humidité.
  BC-3560.40.40:
    name: Gestion des ravageurs de stockage
    description: |
      Surveillance et traitement des insectes et rongeurs dans les entrepôts.
  BC-3560.50:
    name: Tri et conditionnement des productions
    description: |
      Opérations de tri, de station de conditionnement et d'étiquetage des lots préparant les productions pour les mouvements en aval.
  BC-3560.50.10:
    name: Opérations de tri qualitatif
    description: |
      Tri des productions selon les spécifications de calibre, de couleur et de défauts.
  BC-3560.50.20:
    name: Opérations de station de conditionnement
    description: |
      Opérations de la chaîne de conditionnement incluant lavage, cirage et emballage.
  BC-3560.50.30:
    name: Identification des lots et étiquetage
    description: |
      Attribution des identifiants de lot, de série et GS1 et impression des étiquettes.
  BC-3560.60:
    name: Réception entrante chez le transformateur
    description: |
      Coordination de la réception entrante depuis l'exploitation ou l'agrégateur vers les sites du transformateur ou de l'acheteur.
  BC-3560.60.10:
    name: Ordonnancement et réception des camions
    description: |
      Ordonnancement et réception des camions entrants aux portes du transformateur.
  BC-3560.60.20:
    name: Échantillonnage à la réception
    description: |
      Échantillonnage à la réception des chargements de céréales, animaux, lait et productions.
  BC-3560.60.30:
    name: Tests qualité à la réception
    description: |
      Tests qualité des chargements entrants soutenant l'acceptation et la tarification.

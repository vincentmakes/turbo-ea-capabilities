locale: fr
source: L1-commodity-origination-merchandising-management.yaml
entries:
  BC-3570:
    name: Gestion de l'origination et de la commercialisation des matières premières agricoles
    description: |
      Programmes d'origination avec les producteurs, contractualisation des matières premières, pesée et échantillonnage, positions d'inventaire physique, trading au comptant et sur la base, couverture et règlement pour les céréales, oléagineux, produits tropicaux, bétail et produits laitiers.
  BC-3570.10:
    name: Gestion du programme d'origination
    description: |
      Contractualisation des producteurs, gestion des relations avec les producteurs et prévisions d'origination alimentant le carnet d'approvisionnement.
  BC-3570.10.10:
    name: Programmes de contractualisation des producteurs
    description: |
      Conception et exécution des programmes de contractualisation des producteurs par région.
  BC-3570.10.20:
    name: Gestion des relations avec les producteurs
    description: |
      Gestion des relations avec les producteurs distincte du CRM générique.
  BC-3570.10.30:
    name: Prévisions d'origination
    description: |
      Prévisions des volumes d'origination attendus par région et par culture.
  BC-3570.20:
    name: Gestion des contrats de matières premières
    description: |
      Émission et suivi de l'exécution des contrats à terme, de production et à prix différé sur les matières premières.
    in_scope:
      - Contrats à terme avec les producteurs et les contreparties
      - Contrats de production avec spécifications qualitatives
      - Suivi de l'exécution des contrats
    out_of_scope:
      - Gestion générique des contrats juridiques (BC-150)
  BC-3570.20.10:
    name: Émission de contrats à terme
    description: |
      Émission de contrats à terme à prix fixe et sur la base.
  BC-3570.20.20:
    name: Gestion des contrats de production
    description: |
      Gestion des contrats de production avec les spécifications qualitatives et de livraison.
  BC-3570.20.30:
    name: Suivi de l'exécution des contrats
    description: |
      Suivi des tonnes livrées par rapport à l'exécution des contrats.
  BC-3570.30:
    name: Pesée et échantillonnage à la réception
    description: |
      Opérations de pont-bascule, échantillonnage et classification qualitatifs, et calcul du règlement à la réception au point d'entrée.
  BC-3570.30.10:
    name: Opérations de pont-bascule
    description: |
      Opérations de pont-bascule entrant et sortant et émission des tickets de pesée.
  BC-3570.30.20:
    name: Échantillonnage et classification qualitatifs
    description: |
      Échantillonnage et classification à la réception selon les spécifications commerciales.
  BC-3570.30.30:
    name: Calcul du règlement à la réception
    description: |
      Calcul des décotes et primes de qualité à la réception.
  BC-3570.40:
    name: Gestion des positions d'inventaire de matières premières
    description: |
      Suivi des positions physiques de matières premières, décisions de mélange et positions en transit sur l'ensemble du réseau.
  BC-3570.40.10:
    name: Suivi des positions physiques
    description: |
      Suivi des positions physiques longues et courtes par site et par grade.
  BC-3570.40.20:
    name: Décisions de mélange qualitatif
    description: |
      Décisions de mélange pour répondre aux spécifications qualitatives des contrats.
  BC-3570.40.30:
    name: Suivi des positions en transit
    description: |
      Suivi des positions en transit par navire, rail et camion.
  BC-3570.50:
    name: Opérations de trading de matières premières
    description: |
      Trading au comptant et sur la base, exécution des ventes au comptant et gestion des spreads inter-produits sur les carnets de matières premières physiques.
  BC-3570.50.10:
    name: Trading au comptant et sur la base
    description: |
      Trading des positions au comptant et sur la base dans les matières premières physiques.
  BC-3570.50.20:
    name: Exécution des ventes au comptant
    description: |
      Exécution des ventes au comptant aux transformateurs et exportateurs.
  BC-3570.50.30:
    name: Gestion des spreads inter-produits
    description: |
      Gestion des spreads inter-produits tels que les marges de broyage et de raffinage.
  BC-3570.60:
    name: Couverture et gestion des positions de risque
    description: |
      Exécution et rapprochement des couvertures en contrats à terme et en options contre les positions physiques de matières premières.
  BC-3570.60.10:
    name: Exécution des couvertures en contrats à terme
    description: |
      Exécution des couvertures en contrats à terme sur les bourses réglementées.
  BC-3570.60.20:
    name: Exécution des couvertures en options
    description: |
      Exécution des couvertures en options pour gérer le risque de queue de prix.
  BC-3570.60.30:
    name: Rapprochement des positions de couverture
    description: |
      Rapprochement des positions de couverture avec les expositions physiques sous-jacentes.
  BC-3570.70:
    name: Règlement et tarification des matières premières
    description: |
      Tarification finale, émission des relevés de règlement et résolution des réclamations qualitatives avec les contreparties.
  BC-3570.70.10:
    name: Tarification finale et calcul des décotes
    description: |
      Tarification finale incluant l'application des décotes et primes de qualité.
  BC-3570.70.20:
    name: Émission des relevés de règlement
    description: |
      Émission des relevés de règlement aux producteurs et contreparties.
  BC-3570.70.30:
    name: Résolution des réclamations qualitatives
    description: |
      Résolution des réclamations qualitatives avec les producteurs, acheteurs et organes d'arbitrage.

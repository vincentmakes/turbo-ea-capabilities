locale: fr
source: L1-water-resource-management.yaml
entries:
  BC-3860:
    name: Gestion de la ressource en eau
    description: |
      Gestion durable des sources d'eau brute — protection des bassins versants
      et des captages, prélèvements et stockage d'eau brute, planification
      à long terme des ressources, gestion de la sécheresse et des restrictions,
      conformité aux autorisations de prélèvement, et réseaux de surveillance
      des eaux de surface et souterraines.
  BC-3860.10:
    name: Protection des bassins versants et des captages
    description: |
      Protection des bassins versants des captages d'eau potable par
      l'engagement des parties prenantes, les mesures d'utilisation des terres
      et l'évaluation des risques liés aux sources.
  BC-3860.10.10:
    name: Évaluation des risques du bassin versant
    description: |
      Évaluation des risques du bassin versant pour les captages d'eau potable
      selon les principes du Plan de sécurité sanitaire de l'eau de l'OMS.
  BC-3860.10.20:
    name: Gestion des périmètres de protection des captages
    description: |
      Délimitation et gestion des périmètres de protection des captages d'eau
      souterraine et de surface.
  BC-3860.10.30:
    name: Engagement des parties prenantes du bassin versant
    description: |
      Engagement auprès des propriétaires fonciers, régulateurs et agriculteurs
      sur les mesures de gestion du bassin versant.
  BC-3860.20:
    name: Opérations de prélèvement d'eau brute
    description: |
      Exploitation quotidienne des prises d'eau, des dérivations fluviales et
      des forages alimentant le parc de traitement.
  BC-3860.20.10:
    name: Opérations des prises d'eau de surface
    description: |
      Exploitation des prises en rivière et en réservoir, incluant le tamisage
      et le pompage.
  BC-3860.20.20:
    name: Opérations des forages d'eau souterraine
    description: |
      Exploitation et gestion du débit des forages et captages d'eau
      souterraine.
  BC-3860.20.30:
    name: Opérations de pompage d'eau brute
    description: |
      Pompage de l'eau brute vers les usines de traitement et les systèmes
      d'aqueduc.
  BC-3860.30:
    name: Opérations de stockage d'eau brute
    description: |
      Exploitation des réservoirs de retenue et de régulation, des barrages et
      des stockages de prétraitement, incluant la surveillance de la sécurité
      des barrages.
  BC-3860.30.10:
    name: Opérations du niveau des réservoirs
    description: |
      Gestion selon les courbes de consigne des réservoirs de retenue et de
      régulation.
  BC-3860.30.20:
    name: Surveillance de la sécurité des barrages
    description: |
      Surveillance et inspection des barrages selon les régimes légaux de
      sécurité des barrages.
  BC-3860.30.30:
    name: Opérations de qualité de l'eau des réservoirs
    description: |
      Surveillance et gestion de la qualité de l'eau brute, incluant les
      proliférations algales.
  BC-3860.40:
    name: Planification de la ressource en eau
    description: |
      Planification à long terme des ressources en eau et de la demande,
      incluant l'équilibre offre-demande, l'ajustement au changement climatique
      et l'évaluation des options.
  BC-3860.40.10:
    name: Prévision de l'équilibre offre-demande
    description: |
      Prévision à long terme de l'offre et de la demande par zone ressource.
  BC-3860.40.20:
    name: Évaluation des options de ressource
    description: |
      Évaluation des options de nouvelles sources, transferts et mesures de
      gestion de la demande.
  BC-3860.40.30:
    name: Ajustement des ressources au changement climatique
    description: |
      Ajustement des apports en ressources et de la demande selon les scénarios
      de changement climatique.
  BC-3860.50:
    name: Gestion de la sécheresse et des restrictions
    description: |
      Activation des plans de sécheresse et des restrictions d'approvisionnement
      par le biais de seuils de sécheresse, de restrictions aux clients et de
      demandes de dérogation d'urgence.
  BC-3860.50.10:
    name: Surveillance des seuils de sécheresse
    description: |
      Surveillance des seuils de sécheresse des réservoirs, rivières et eaux
      souterraines.
  BC-3860.50.20:
    name: Opérations de restriction en cas de sécheresse
    description: |
      Mise en place et levée des restrictions d'utilisation de l'eau pour les
      clients.
  BC-3860.50.30:
    name: Gestion des autorisations et arrêtés de sécheresse
    description: |
      Demande et exploitation des autorisations et arrêtés de sécheresse
      accordés par les régulateurs.
  BC-3860.60:
    name: Conformité aux autorisations de prélèvement
    description: |
      Administration des autorisations de prélèvement et reporting de conformité
      concernant les volumes, la chronologie et les conditions environnementales.
  BC-3860.60.10:
    name: Administration des autorisations de prélèvement
    description: |
      Tenue du portefeuille d'autorisations de prélèvement et du registre des
      conditions.
  BC-3860.60.20:
    name: Reporting des volumes prélevés
    description: |
      Déclaration des volumes prélevés et respect des conditions d'autorisation.
  BC-3860.60.30:
    name: Conformité aux débits réservés
    description: |
      Surveillance du respect des débits réservés et des conditions de débit
      écologique sur les prélèvements.
  BC-3860.70:
    name: Surveillance hydrométrique
    description: |
      Exploitation des réseaux de surveillance des eaux de surface et
      souterraines fournissant des données pour la planification des ressources
      et les décisions opérationnelles.
  BC-3860.70.10:
    name: Surveillance des eaux de surface
    description: |
      Exploitation des réseaux de mesure des débits, niveaux et pluviométrie
      des cours d'eau.
  BC-3860.70.20:
    name: Surveillance du niveau des eaux souterraines
    description: |
      Exploitation des réseaux de piézomètres d'observation des eaux
      souterraines.
  BC-3860.70.30:
    name: Gestion de la qualité des données hydrométriques
    description: |
      Contrôle qualité et gestion des courbes de tarage pour les données
      hydrométriques.

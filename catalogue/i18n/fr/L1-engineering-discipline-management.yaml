locale: fr
source: L1-engineering-discipline-management.yaml
entries:
  BC-1100:
    name: Gestion des disciplines d'ingénierie
    description: |
      Pools de compétences en ingénierie multidisciplinaire — mécanique, électrique, génie civil, procédés, instrumentation et tuyauterie.
  BC-1100.10:
    name: Gestion de l'ingénierie mécanique
    description: |
      Expertise de la discipline mécanique — équipements, machines tournantes et systèmes mécaniques.
  BC-1100.10.10:
    name: Ingénierie des équipements statiques
    description: |
      Conception des appareils à pression, échangeurs de chaleur et autres équipements statiques.
  BC-1100.10.20:
    name: Ingénierie des équipements tournants
    description: |
      Ingénierie des pompes, compresseurs, turbines et machines tournantes.
  BC-1100.10.30:
    name: Ingénierie HVAC
    description: |
      Conception et analyse des systèmes HVAC.
  BC-1100.10.40:
    name: Ingénierie des matériaux mécaniques et du soudage
    description: |
      Sélection des matériaux, spécifications de soudage et conception contre la corrosion.
  BC-1100.20:
    name: Gestion de l'ingénierie électrique
    description: |
      Ingénierie de la puissance, de la distribution électrique et du contrôle-commande électrique.
  BC-1100.20.10:
    name: Ingénierie des systèmes de puissance
    description: |
      Ingénierie des systèmes électriques haute et moyenne tension.
  BC-1100.20.20:
    name: Conception de la distribution électrique
    description: |
      Distribution basse tension, tableaux électriques et bilans de puissance.
  BC-1100.20.30:
    name: Spécification des équipements électriques
    description: |
      Spécification des moteurs, transformateurs et équipements électriques.
  BC-1100.20.40:
    name: Conception de la mise à la terre et de la protection foudre
    description: |
      Conception de la mise à la terre, de la liaison équipotentielle et de la protection foudre.
  BC-1100.30:
    name: Gestion de l'ingénierie génie civil et structurelle
    description: |
      Travaux de génie civil, charpente métallique, béton, fondations et géotechnique.
  BC-1100.30.10:
    name: Conception des structures métalliques
    description: |
      Conception des structures métalliques et des assemblages.
  BC-1100.30.20:
    name: Conception du béton et des fondations
    description: |
      Conception des structures en béton, fondations et armatures.
  BC-1100.30.30:
    name: Ingénierie géotechnique
    description: |
      Reconnaissance géotechnique et ingénierie des sols.
  BC-1100.30.40:
    name: Ingénierie des aménagements de chantier
    description: |
      Nivellement du site, drainage et conception des infrastructures de génie civil.
  BC-1100.40:
    name: Gestion de l'ingénierie des procédés
    description: |
      Conception des procédés, simulation, schémas P&ID, bilans matière et énergie, hydraulique.
  BC-1100.40.10:
    name: Simulation et modélisation des procédés
    description: |
      Simulation des procédés en régime permanent et dynamique.
  BC-1100.40.20:
    name: Élaboration des P&ID et des PFD
    description: |
      Diagrammes de flux de procédés et schémas de tuyauterie et d'instrumentation.
  BC-1100.40.30:
    name: Ingénierie des bilans matière et énergie
    description: |
      Bilans thermiques et matières, et dimensionnement des équipements de procédé.
  BC-1100.40.40:
    name: Ingénierie de la sécurité des procédés
    description: |
      Systèmes de détente et de torche, classification SIL et sécurité des procédés.
  BC-1100.50:
    name: Gestion de l'ingénierie en instrumentation et contrôle-commande
    description: |
      Instrumentation de terrain, automatisation et ingénierie des systèmes de contrôle.
  BC-1100.50.10:
    name: Ingénierie de l'instrumentation de terrain
    description: |
      Spécification des transmetteurs, capteurs et éléments finaux de terrain.
  BC-1100.50.20:
    name: Conception des systèmes de contrôle-commande
    description: |
      Architecture DCS et API, et conception des boucles de régulation.
  BC-1100.50.30:
    name: Conception des systèmes instrumentés de sécurité
    description: |
      Conception des SIS selon la norme IEC 61511 et vérification SIL.
  BC-1100.50.40:
    name: Ingénierie logicielle d'automatisation et de contrôle
    description: |
      Configuration de la logique de contrôle et ingénierie des logiciels d'automatisation.
  BC-1100.60:
    name: Gestion de l'ingénierie de tuyauterie
    description: |
      Conception des tuyauteries, implantations, isométriques, analyse de contraintes et sélection des matériaux.
  BC-1100.60.10:
    name: Conception de l'implantation des tuyauteries
    description: |
      Plans d'ensemble des tuyauteries et implantation 3D des tuyauteries.
  BC-1100.60.20:
    name: Analyse des contraintes des tuyauteries
    description: |
      Analyse des contraintes des tuyauteries et conception des supports.
  BC-1100.60.30:
    name: Sélection des matériaux de tuyauterie
    description: |
      Classes de matériaux de tuyauterie, joints, robinetterie et sélection de l'isolation.
  BC-1100.60.40:
    name: Production des isométriques de tuyauterie
    description: |
      Production des isométriques de tuyauterie et des nomenclatures associées.
  BC-1100.70:
    name: Gestion des ressources et des compétences disciplinaires
    description: |
      Pools de disciplines, référentiels de compétences et parcours de carrière technique.
  BC-1100.70.10:
    name: Gestion du pool de ressources d'ingénierie
    description: |
      Affectation des ressources disciplinaires sur les projets.
  BC-1100.70.20:
    name: Référentiel de compétences en ingénierie
    description: |
      Référentiels de compétences disciplinaires et matrices de compétences.
  BC-1100.70.30:
    name: Gestion des parcours de carrière technique
    description: |
      Filières techniques et développement des ingénieurs habilités.
  BC-1100.70.40:
    name: Gestion des connaissances en ingénierie
    description: |
      Partage des connaissances, communautés de pratiques et retours d'expérience en ingénierie.

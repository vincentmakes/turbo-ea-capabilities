locale: fr
source: L1-corporate-communications-management.yaml
entries:
  BC-850:
    name: Gestion de la communication d'entreprise
    description: |
      Communications d'entreprise internes et externes.
  BC-850.10:
    name: Gestion des communications internes
    description: |
      Communications aux employés et communications de la direction.
  BC-850.10.10:
    name: Communications aux employés
    description: |
      Lettres d'information, intranet et assemblées générales des employés.
  BC-850.10.20:
    name: Communications de la direction
    description: |
      Communications et messages du PDG et des dirigeants.
  BC-850.10.30:
    name: Communications liées au changement et à la transformation
    description: |
      Communications internes en appui aux initiatives de changement et de transformation.
  BC-850.10.40:
    name: Gestion des canaux de communication interne
    description: |
      Gestion des canaux internes (intranet, Slack, Teams).
  BC-850.20:
    name: Gestion des communications externes
    description: |
      Messagerie institutionnelle externe et déclarations.
  BC-850.20.10:
    name: Architecture des messages externes
    description: |
      Architecture des messages et narrative institutionnelle pour les publics externes.
  BC-850.20.20:
    name: Déclarations d'entreprise et notes de position
    description: |
      Rédaction de déclarations d'entreprise et de notes de position.
  BC-850.20.30:
    name: Site web d'entreprise et canaux détenus
    description: |
      Contenu du site web d'entreprise et des canaux externes détenus.
  BC-850.30:
    name: Gestion des relations publiques
    description: |
      Gestion de la réputation et relations publiques avec les parties prenantes.
  BC-850.30.10:
    name: Gestion de la réputation
    description: |
      Suivi de la réputation, analyse des sentiments et stratégie de réputation.
  BC-850.30.20:
    name: Gestion du leadership éclairé
    description: |
      Contenu de leadership éclairé et positionnement des dirigeants.
  BC-850.30.30:
    name: Affaires publiques et relations gouvernementales
    description: |
      Relations avec les gouvernements et engagement auprès des décideurs publics.
  BC-850.40:
    name: Gestion des relations avec les médias
    description: |
      Relations médias, communiqués de presse et séances d'information.
  BC-850.40.10:
    name: Gestion des communiqués de presse
    description: |
      Rédaction, approbation et diffusion des communiqués de presse.
  BC-850.40.20:
    name: Engagement avec les journalistes
    description: |
      Relations avec les journalistes, interviews et séances d'information.
  BC-850.40.30:
    name: Veille médias
    description: |
      Suivi de la couverture médiatique et de la part de voix.
  BC-850.40.40:
    name: Préparation des porte-parole médias
    description: |
      Identification des porte-parole, formation et préparation des messages.
  BC-850.50:
    name: Gestion des communications de crise
    description: |
      Communications en situation de crise ou d'incident.
  BC-850.50.10:
    name: Planification des communications de crise
    description: |
      Plans de communication de crise pré-établis par scénario.
  BC-850.50.20:
    name: Préparation des déclarations de crise
    description: |
      Préparation rapide de déclarations et de questions-réponses lors d'incidents.
  BC-850.50.30:
    name: Gestion des porte-parole en situation de crise
    description: |
      Gestion des porte-parole et relations avec les médias en situation de crise.
  BC-850.50.40:
    name: Rétablissement de la réputation après une crise
    description: |
      Communications post-crise et rétablissement de la réputation.
  BC-850.60:
    name: Gestion des communications avec les parties prenantes
    description: |
      Communications ciblées vers des groupes de parties prenantes spécifiques.
  BC-850.60.10:
    name: Cartographie des parties prenantes
    description: |
      Cartographie et segmentation des parties prenantes externes.
  BC-850.60.20:
    name: Planification de la mobilisation des parties prenantes
    description: |
      Plans de mobilisation sur mesure pour les groupes de parties prenantes.
  BC-850.60.30:
    name: Engagement communautaire et parties prenantes locales
    description: |
      Engagement avec les communautés locales et les parties prenantes locales.

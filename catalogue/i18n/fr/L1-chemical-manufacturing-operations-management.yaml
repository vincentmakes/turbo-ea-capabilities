locale: fr
source: L1-chemical-manufacturing-operations-management.yaml
entries:
  BC-4620:
    name: Gestion des opérations de fabrication chimique
    description: |
      Exploitation quotidienne des unités de réaction, séparation, polymérisation
      et procédés inorganiques, incluant la surveillance des catalyseurs, la
      planification de la production et la coordination des arrêts.
  BC-4620.10:
    name: Opérations unitaires de réaction
    description: |
      Exploitation des systèmes de réacteurs continus, discontinus, catalytiques
      et électrochimiques.
  BC-4620.10.10:
    name: Opérations de réacteurs continus
    description: |
      Exploitation des réacteurs à cuve agitée en continu et à flux piston.
  BC-4620.10.20:
    name: Opérations de réacteurs discontinus
    description: |
      Exploitation des réacteurs discontinus et semi-continus selon les recettes
      approuvées.
  BC-4620.10.30:
    name: Opérations de réacteurs catalytiques
    description: |
      Exploitation des réacteurs catalytiques à lit fixe et à lit fluidisé.
  BC-4620.10.40:
    name: Opérations de réacteurs photochimiques et électrochimiques
    description: |
      Exploitation des réacteurs photochimiques, électrochimiques et à plasma.
  BC-4620.20:
    name: Opérations unitaires de séparation
    description: |
      Exploitation des unités de distillation, cristallisation, filtration,
      séchage et séparation par membrane.
  BC-4620.20.10:
    name: Opérations de distillation
    description: |
      Exploitation des colonnes de distillation à plateaux et à garnissage.
  BC-4620.20.20:
    name: Opérations de cristallisation
    description: |
      Exploitation des cristalliseurs par refroidissement, évaporation et
      réactifs.
  BC-4620.20.30:
    name: Filtration et séparation solide-liquide
    description: |
      Exploitation des centrifugeuses, filtres-presses et filtres rotatifs
      sous vide.
  BC-4620.20.40:
    name: Opérations de séchage
    description: |
      Exploitation des sécheurs à lit fluidisé, par atomisation et à contact.
  BC-4620.20.50:
    name: Opérations de séparation par membrane
    description: |
      Exploitation des membranes d'osmose inverse, d'ultrafiltration et de
      pervaporation.
  BC-4620.30:
    name: Opérations de polymérisation
    description: |
      Exploitation des procédés de polymérisation en masse, en solution, en
      suspension et en émulsion, ainsi que le compoundage de polymères en aval.
  BC-4620.30.10:
    name: Opérations de polymérisation en masse
    description: |
      Exploitation des réacteurs de polymérisation en masse.
  BC-4620.30.20:
    name: Opérations de polymérisation en solution
    description: |
      Exploitation des procédés de polymérisation en solution.
  BC-4620.30.30:
    name: Polymérisation en suspension et en émulsion
    description: |
      Exploitation des réacteurs de polymérisation en suspension et en émulsion.
  BC-4620.30.40:
    name: Opérations de compoundage des polymères
    description: |
      Compoundage des polymères avec des additifs par mélange à l'état fondu.
  BC-4620.40:
    name: Opérations inorganiques et électrochimiques
    description: |
      Exploitation des procédés chlore-soude, d'électrolyse, de calcination et
      autres synthèses inorganiques.
  BC-4620.40.10:
    name: Opérations des cellules chlore-soude
    description: |
      Exploitation des cellules chlore-soude à membrane et à diaphragme sans
      mercure.
  BC-4620.40.20:
    name: Opérations d'électrolyse
    description: |
      Exploitation des cellules d'électrolyse des métaux et des gaz.
  BC-4620.40.30:
    name: Opérations de calcination et de grillage
    description: |
      Exploitation des fours rotatifs, grilleurs à lit fluidisé et calcinateurs.
  BC-4620.40.40:
    name: Opérations de synthèse inorganique
    description: |
      Exploitation des unités de synthèse inorganique incluant la précipitation
      et la digestion.
  BC-4620.50:
    name: Gestion du cycle de vie des catalyseurs et produits chimiques de procédé
    description: |
      Sélection, surveillance, régénération et gestion des stocks de catalyseurs
      et produits chimiques de procédé.
  BC-4620.50.10:
    name: Sélection et chargement des catalyseurs
    description: |
      Sélection et chargement des catalyseurs à lit fixe et à lit fluidisé.
  BC-4620.50.20:
    name: Surveillance des performances des catalyseurs
    description: |
      Surveillance en service de l'activité et de la sélectivité des catalyseurs.
  BC-4620.50.30:
    name: Coordination de la régénération des catalyseurs
    description: |
      Coordination des campagnes de régénération in situ et ex situ des
      catalyseurs.
  BC-4620.50.40:
    name: Gestion des stocks de produits chimiques de procédé
    description: |
      Gestion des stocks et de la consommation des solvants, additifs et produits
      chimiques de procédé.
  BC-4620.60:
    name: Contrôle des procédés et exécution des opérations
    description: |
      Exécution quotidienne des opérations depuis le terrain et la salle de
      contrôle, incluant la surveillance des enveloppes opératoires.
  BC-4620.60.10:
    name: Exécution des rondes opérateurs
    description: |
      Exécution des rondes structurées et des contrôles terrain des opérateurs.
  BC-4620.60.20:
    name: Opérations de console DCS
    description: |
      Opérations de console incluant la réponse aux alarmes et le contrôle
      de supervision.
  BC-4620.60.30:
    name: Gestion des passations de poste
    description: |
      Passations de poste structurées et revue du journal des opérations.
  BC-4620.60.40:
    name: Surveillance de l'enveloppe opératoire
    description: |
      Surveillance en temps réel des enveloppes opératoires de sécurité et de
      qualité.
  BC-4620.70:
    name: Coordination des arrêts d'usine
    description: |
      Coordination du périmètre, du calendrier et de l'exécution des arrêts
      et grands arrêts des usines chimiques.
  BC-4620.70.10:
    name: Gestion du périmètre de l'arrêt
    description: |
      Définition et gel du périmètre de l'arrêt incluant le processus de
      contestation.
  BC-4620.70.20:
    name: Gestion du calendrier de l'arrêt
    description: |
      Planification détaillée et contrôle de l'avancement de l'arrêt.
  BC-4620.70.30:
    name: Coordination de l'arrêt et du redémarrage
    description: |
      Coordination séquencée de l'arrêt, de la décontamination et du
      redémarrage des unités.
  BC-4620.80:
    name: Planification de la production chimique
    description: |
      Planification de la production par campagnes et en mode continu, et
      gestion des transitions.
  BC-4620.80.10:
    name: Planification des campagnes
    description: |
      Planification des campagnes multi-produits sur des actifs partagés.
  BC-4620.80.20:
    name: Séquencement de la production
    description: |
      Séquencement des produits pour minimiser les transitions et les pertes
      de rendement.
  BC-4620.80.30:
    name: Planification des transitions de production
    description: |
      Planification et coordination des transitions de grade et de produit.

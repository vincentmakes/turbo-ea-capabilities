locale: fr
source: L1-human-capital-management.yaml
entries:
  BC-300:
    name: Gestion du capital humain
    description: |
      Cycle de vie complet des employés. Également désigné sous le nom de gestion des ressources humaines.
  BC-300.10:
    name: Gestion de l'acquisition des talents
    description: |
      Approvisionnement, recrutement, embauche et intégration des employés.
  BC-300.10.10:
    name: Approvisionnement en effectifs
    description: |
      Identification de candidats via les canaux, la cooptation et les viviers de talents.
  BC-300.10.20:
    name: Sélection et présélection des candidats
    description: |
      Présélection, évaluations et gestion des entretiens de recrutement.
  BC-300.10.30:
    name: Gestion des offres et de l'embauche
    description: |
      Rédaction des offres, négociation, vérification des antécédents et contractualisation.
  BC-300.10.40:
    name: Intégration des employés
    description: |
      Pré-intégration, expérience du premier jour et parcours d'intégration.
  BC-300.10.50:
    name: Gestion de la marque employeur
    description: |
      Proposition de valeur employeur, campagnes de marque employeur et réputation.
  BC-300.20:
    name: Gestion des talents
    description: |
      Performance, succession et développement de carrière.
  BC-300.20.10:
    name: Gestion de la performance
    description: |
      Fixation des objectifs, évaluations de performance et cycles de retour d'information.
  BC-300.20.20:
    name: Planification de la succession
    description: |
      Identification et développement des successeurs pour les postes clés.
  BC-300.20.30:
    name: Développement de carrière et mobilité interne
    description: |
      Parcours de carrière, mobilité interne et plans de développement individuel.
  BC-300.20.40:
    name: Revue et calibration des talents
    description: |
      Revues des talents, calibrations et évaluations en grille 9 cases.
  BC-300.20.50:
    name: Développement du leadership
    description: |
      Viviers de leadership, développement des dirigeants et coaching.
  BC-300.30:
    name: Gestion de la rémunération et des avantages sociaux
    description: |
      Structures salariales, primes, actions et administration des avantages sociaux.
  BC-300.30.10:
    name: Architecture des emplois et classification
    description: |
      Catalogue des emplois, niveaux de classification et structures de grades.
  BC-300.30.20:
    name: Gestion de la rémunération de base
    description: |
      Grilles salariales, benchmarking marché et cycles de révision salariale.
  BC-300.30.30:
    name: Gestion de la rémunération variable et des incitations
    description: |
      Administration des primes, plans d'incitation commerciale et plans d'incitation à court terme.
  BC-300.30.40:
    name: Administration des actions et des incitations à long terme
    description: |
      Plans d'actions, unités d'actions restreintes, options et plans d'incitation à long terme.
  BC-300.30.50:
    name: Administration des avantages sociaux
    description: |
      Administration des avantages sociaux en matière de santé, retraite et autres prestations.
  BC-300.40:
    name: Gestion de la formation et du développement
    description: |
      Formation, développement des compétences et certifications.
  BC-300.40.10:
    name: Analyse des besoins en formation
    description: |
      Identification des lacunes en compétences et des besoins de formation par fonction.
  BC-300.40.20:
    name: Curation des contenus de formation
    description: |
      Curation et création de contenus de formation internes et tiers.
  BC-300.40.30:
    name: Déploiement et administration de la formation
    description: |
      Déploiement et suivi des formations en présentiel et en apprentissage numérique.
  BC-300.40.40:
    name: Gestion des compétences et des certifications
    description: |
      Inventaire des compétences, référentiels de compétences et suivi des certifications.
  BC-300.40.50:
    name: Évaluation de l'efficacité de la formation
    description: |
      Évaluation de l'impact de la formation et du ROI de l'investissement en formation.
  BC-300.50:
    name: Gestion de la planification des effectifs
    description: |
      Planification stratégique de l'offre et de la demande en effectifs.
  BC-300.50.10:
    name: Prévision de la demande en effectifs
    description: |
      Prévision de la demande en effectifs par compétence, rôle et localisation.
  BC-300.50.20:
    name: Analyse de l'offre en effectifs
    description: |
      Offre interne, attrition et analyse du marché du travail.
  BC-300.50.30:
    name: Élaboration du plan stratégique des effectifs
    description: |
      Plans stratégiques pluriannuels des effectifs et scénarios associés.
  BC-300.50.40:
    name: Planification et contrôle des effectifs
    description: |
      Budgétisation opérationnelle des effectifs et workflows d'approbation.
  BC-300.60:
    name: Gestion de l'expérience employé
    description: |
      Engagement, communications internes et expérience de travail.
  BC-300.60.10:
    name: Mesure de l'engagement des employés
    description: |
      Enquêtes d'engagement, sondages rapides et programmes d'écoute.
  BC-300.60.20:
    name: Conception du parcours employé
    description: |
      Conception des moments clés et des cartographies du parcours employé.
  BC-300.60.30:
    name: Bien-être au travail
    description: |
      Programmes de bien-être mental, physique et financier.
  BC-300.60.40:
    name: Reconnaissance et récompenses
    description: |
      Programmes de reconnaissance et dispositifs de récompense non monétaire.
  BC-300.70:
    name: Gestion des opérations RH
    description: |
      Dossiers des employés, administration de la paie et prestation de services RH.
  BC-300.70.10:
    name: Gestion des données de référence des employés
    description: |
      Dossiers des employés, événements du cycle de vie et intégrité des données de référence.
  BC-300.70.20:
    name: Administration de la paie
    description: |
      Traitement de la paie, déductions légales et distribution des bulletins de paie.
  BC-300.70.30:
    name: Gestion du temps et des absences
    description: |
      Suivi du temps, gestion des congés et des absences.
  BC-300.70.40:
    name: Centre de services et assistance RH
    description: |
      Centre de services RH, gestion des dossiers et traitement des demandes de niveau 1.
  BC-300.70.50:
    name: Analytique et reporting RH
    description: |
      Analytique des effectifs, tableaux de bord et reporting RH statutaire.
  BC-300.80:
    name: Relations sociales et droit du travail
    description: |
      Comités d'entreprise, syndicats, réclamations et droit du travail.
  BC-300.80.10:
    name: Négociation collective et engagement syndical
    description: |
      Négociation collective, conventions et relations syndicales.
  BC-300.80.20:
    name: Comité d'entreprise et représentation des employés
    description: |
      Consultation du comité d'entreprise et des organes représentatifs des employés.
  BC-300.80.30:
    name: Gestion des réclamations et des procédures disciplinaires
    description: |
      Traitement des réclamations, des dossiers disciplinaires et des enquêtes.
  BC-300.80.40:
    name: Conformité au droit du travail
    description: |
      Conformité au droit du travail, au temps de travail et aux normes sociales.
  BC-300.90:
    name: Gestion de la diversité, de l'équité et de l'inclusion
    description: |
      Stratégie DEI, programmes et reporting.
  BC-300.90.10:
    name: Stratégie et gouvernance DEI
    description: |
      Stratégie DEI, parrainage et structures de gouvernance associées.
  BC-300.90.20:
    name: Pratiques de talents inclusives
    description: |
      Pratiques inclusives d'approvisionnement, de recrutement et de progression de carrière.
  BC-300.90.30:
    name: Déploiement des programmes DEI
    description: |
      Groupes de ressources des employés, sensibilisation et programmes DEI.
  BC-300.90.40:
    name: Équité salariale et reporting DEI
    description: |
      Analyse de l'équité salariale et indicateurs et divulgations DEI.

locale: fr
source: L1-innovation-management.yaml
entries:
  BC-800:
    name: Gestion de l'innovation
    description: |
      Génération d'idées, incubation, portefeuille d'innovation et capital-risque d'entreprise.
  BC-800.10:
    name: Gestion des idées et des opportunités
    description: |
      Capture des idées, filtrage et évaluation des opportunités.
  BC-800.10.10:
    name: Capture et soumission d'idées
    description: |
      Canaux de capture d'idées issus de la foule, des employés et des partenaires.
  BC-800.10.20:
    name: Filtrage et évaluation des idées
    description: |
      Filtrage, évaluation et présélection des idées.
  BC-800.10.30:
    name: Formalisation des opportunités
    description: |
      Formalisation des opportunités d'affaires, des énoncés de problèmes et des arguments de valeur.
  BC-800.20:
    name: Gestion du portefeuille d'innovation
    description: |
      Portefeuille d'innovation selon les horizons (H1/H2/H3).
  BC-800.20.10:
    name: Gestion du pipeline d'innovation
    description: |
      Pipeline des initiatives d'innovation à travers les différentes étapes.
  BC-800.20.20:
    name: Équilibrage du portefeuille selon les trois horizons
    description: |
      Équilibrage du portefeuille entre les horizons H1, H2 et H3.
  BC-800.20.30:
    name: Gouvernance des jalons de décision
    description: |
      Revue par jalons et gouvernance des décisions pour les innovations.
  BC-800.20.40:
    name: Gestion du financement de l'innovation
    description: |
      Allocation des financements entre les initiatives d'innovation.
  BC-800.30:
    name: Incubation et accélération de l'innovation
    description: |
      Incubateurs, accélérateurs et entrepreneuriat interne.
  BC-800.30.10:
    name: Opérations des incubateurs d'innovation
    description: |
      Exploitation des incubateurs d'entreprise et des laboratoires d'innovation.
  BC-800.30.20:
    name: Entrepreneuriat interne
    description: |
      Essaimage et création de ventures internes.
  BC-800.30.30:
    name: Développement du produit minimum viable
    description: |
      Développement du MVP, validation client et itération.
  BC-800.30.40:
    name: Passage à l'échelle de l'innovation
    description: |
      Transition des innovations validées vers des offres à grande échelle.
  BC-800.40:
    name: Gestion du capital-risque d'entreprise
    description: |
      Investissements en CVC et partenariats avec des startups.
  BC-800.40.10:
    name: Identification et prospection de startups
    description: |
      Identification de startups alignées avec les thèmes stratégiques.
  BC-800.40.20:
    name: Investissement en capital-risque d'entreprise
    description: |
      Prise de participation directe et opérations de fonds CVC.
  BC-800.40.30:
    name: Gestion des partenariats avec les startups
    description: |
      Partenariats commerciaux et projets pilotes avec des startups.
  BC-800.40.40:
    name: Gestion du portefeuille de ventures
    description: |
      Suivi de la performance des investissements du portefeuille de ventures.
  BC-800.50:
    name: Gestion de l'innovation ouverte
    description: |
      Réseaux d'innovation externes, crowdsourcing et partenariats académiques.
  BC-800.50.10:
    name: Partenariats académiques et de recherche
    description: |
      Partenariats avec les universités et les institutions de recherche.
  BC-800.50.20:
    name: Défis d'innovation et crowdsourcing
    description: |
      Défis d'innovation externes, hackathons et crowdsourcing.
  BC-800.50.30:
    name: Engagement dans l'écosystème d'innovation
    description: |
      Engagement avec les hubs d'innovation, accélérateurs et écosystèmes.
  BC-800.50.40:
    name: Sourcing de technologies externes
    description: |
      Licence entrante et acquisition de technologies externes.

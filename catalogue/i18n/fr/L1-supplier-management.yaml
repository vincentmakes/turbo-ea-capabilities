locale: fr
source: L1-supplier-management.yaml
entries:
  BC-510:
    name: Gestion des fournisseurs
    description: |
      Qualification, performance, risque et gestion des relations fournisseurs.
  BC-510.10:
    name: Gestion de l'intégration des fournisseurs
    description: |
      Qualification, enregistrement et due diligence des fournisseurs.
  BC-510.10.10:
    name: Enregistrement des fournisseurs
    description: |
      Capture des informations d'identification, bancaires et fiscales des fournisseurs.
  BC-510.10.20:
    name: Qualification et présélection des fournisseurs
    description: |
      Qualification des capacités, de la solidité financière et de la conformité des nouveaux fournisseurs.
  BC-510.10.30:
    name: Due diligence fournisseurs
    description: |
      Due diligence en matière de sanctions, ABC, ESG et intégrité sur les fournisseurs.
  BC-510.10.40:
    name: Gestion des données de référence fournisseurs
    description: |
      Maintenance des données de référence fournisseurs et des modifications du cycle de vie.
  BC-510.20:
    name: Gestion de la performance fournisseur
    description: |
      Tableaux de bord de performance et gestion des accords de niveau de service.
  BC-510.20.10:
    name: Tableaux de bord et KPI fournisseurs
    description: |
      Définition et suivi des tableaux de bord de performance fournisseurs.
  BC-510.20.20:
    name: Gestion des accords de niveau de service
    description: |
      Définition, surveillance et application des remèdes des accords de niveau de service.
  BC-510.20.30:
    name: Audit et inspection des fournisseurs
    description: |
      Audits sur site et inspections des capacités et de la qualité des fournisseurs.
  BC-510.20.40:
    name: Gestion des problèmes et des actions correctives fournisseurs
    description: |
      Enregistrement des problèmes et actions correctives et préventives avec les fournisseurs.
  BC-510.30:
    name: Gestion du risque fournisseur
    description: |
      Risques financiers, ESG, géopolitiques et cyber liés aux fournisseurs.
  BC-510.30.10:
    name: Surveillance du risque financier fournisseur
    description: |
      Surveillance de la santé financière et du risque de crédit des fournisseurs.
  BC-510.30.20:
    name: Risque ESG et durabilité fournisseur
    description: |
      Risques ESG, droits de l'homme et esclavage moderne dans la base fournisseurs.
  BC-510.30.30:
    name: Risque cyber et informatique fournisseur
    description: |
      Évaluation et surveillance du risque cyber et informatique des tiers.
  BC-510.30.40:
    name: Risque géopolitique et de concentration fournisseur
    description: |
      Risques géopolitiques, pays et de concentration dans la base fournisseurs.
  BC-510.40:
    name: Gestion du développement fournisseur
    description: |
      Développement des capacités et programmes d'amélioration fournisseurs.
  BC-510.40.10:
    name: Développement des capacités fournisseurs
    description: |
      Développement conjoint des capacités, formation et transfert de technologie.
  BC-510.40.20:
    name: Programme de diversité fournisseurs
    description: |
      Identification et développement de fournisseurs diversifiés et de petites entreprises.
  BC-510.40.30:
    name: Programme d'innovation fournisseurs
    description: |
      Programmes pour sourcer l'innovation portée par les fournisseurs et la co-développer.
  BC-510.50:
    name: Gestion des relations fournisseurs
    description: |
      Relations stratégiques avec les fournisseurs et forums de gouvernance.
  BC-510.50.10:
    name: Segmentation stratégique des fournisseurs
    description: |
      Segmentation des fournisseurs par criticité et valeur.
  BC-510.50.20:
    name: Engagement exécutif avec les fournisseurs
    description: |
      Parrainage exécutif et pilotage des relations avec les fournisseurs stratégiques.
  BC-510.50.30:
    name: Planification conjointe des affaires
    description: |
      Planification conjointe des affaires et création de valeur avec les fournisseurs stratégiques.
  BC-510.50.40:
    name: Portail fournisseur et collaboration
    description: |
      Portail fournisseur, libre-service et plateformes de collaboration.

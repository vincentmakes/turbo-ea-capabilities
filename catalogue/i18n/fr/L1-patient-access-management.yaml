locale: fr
source: L1-patient-access-management.yaml
entries:
  BC-2800:
    name: Gestion de l'accès patient
    description: |
      Prise en charge pré-consultation, planification, admission, vérification de l'éligibilité, conseil financier, hospitalisations, transferts et sorties dans les contextes hospitalier, ambulatoire et d'urgence.
  BC-2800.10:
    name: Planification et gestion des rendez-vous
    description: |
      Planification des soignants et des ressources, prise de rendez-vous, gestion des listes d'attente et rappels proactifs pour optimiser l'utilisation des capacités.
  BC-2800.10.10:
    name: Optimisation du calendrier des soignants
    description: |
      Optimisation des calendriers des soignants, des salles et des équipements à partir de gabarits et de superpositions.
  BC-2800.10.20:
    name: Prise de rendez-vous
    description: |
      Réservation de rendez-vous à l'initiative du patient ou du prescripteur via différents canaux.
  BC-2800.10.30:
    name: Gestion des listes d'attente
    description: |
      Gestion et priorisation des listes d'attente pour les rendez-vous et les procédures.
  BC-2800.10.40:
    name: Rappels de rendez-vous et prévention des absences
    description: |
      Rappels multicanaux, confirmations et interventions de prévention des absences.
  BC-2800.20:
    name: Gestion de l'enregistrement des patients
    description: |
      Collecte et gestion des données démographiques, d'identité et de consentement nécessaires à l'enregistrement d'un patient pour une consultation.
  BC-2800.20.10:
    name: Collecte des données démographiques
    description: |
      Saisie des données démographiques du patient lors de l'enregistrement.
  BC-2800.20.20:
    name: Vérification de l'identité du patient
    description: |
      Vérification de l'identité du patient à l'aide de documents et de contrôles biométriques.
  BC-2800.20.30:
    name: Collecte des consentements et autorisations
    description: |
      Recueil des consentements et autorisations de traitement, financiers et de partage d'informations.
  BC-2800.20.40:
    name: Gestion des identifiants patients
    description: |
      Émission et maintenance des numéros de dossier médical et des identifiants patients d'entreprise.
  BC-2800.30:
    name: Vérification de l'éligibilité et des prestations
    description: |
      Vérification de la couverture d'assurance, des prestations et des exigences d'autorisation avant la prestation de services.
  BC-2800.30.10:
    name: Vérification de la couverture d'assurance
    description: |
      Vérification de la couverture d'assurance active et des détails du régime.
  BC-2800.30.20:
    name: Détermination des prestations
    description: |
      Détermination des prestations du patient, des franchises, des tickets modérateurs et des plafonds de couverture.
  BC-2800.30.30:
    name: Gestion des autorisations préalables
    description: |
      Soumission, suivi et relance des demandes d'autorisation préalable auprès des payeurs.
  BC-2800.30.40:
    name: Consultation d'éligibilité en temps réel
    description: |
      Consultation électronique en temps réel de l'éligibilité et des prestations auprès des systèmes des payeurs.
  BC-2800.40:
    name: Conseil financier et estimation des coûts
    description: |
      Conseil financier aux patients, estimation des frais à leur charge et inscription aux programmes d'aide financière ou aux arrangements de paiement direct.
  BC-2800.40.10:
    name: Évaluation financière du patient
    description: |
      Évaluation de la capacité financière du patient et des options de paiement disponibles.
  BC-2800.40.20:
    name: Estimation des coûts
    description: |
      Production d'estimations des frais restant à charge et du coût total pour les services planifiés.
  BC-2800.40.30:
    name: Aide caritative et assistance financière
    description: |
      Détermination de l'éligibilité et inscription aux programmes d'aide caritative et d'assistance financière.
  BC-2800.40.40:
    name: Mise en place du paiement direct
    description: |
      Mise en place des arrangements de paiement direct, des prépaiements et des plans d'échelonnement.
  BC-2800.50:
    name: Gestion des admissions, transferts et sorties
    description: |
      Gestion opérationnelle des hospitalisations, des transferts inter-établissements, de l'attribution des lits et de la saisie des modalités de sortie.
  BC-2800.50.10:
    name: Hospitalisation
    description: |
      Admission des patients en hospitalisation à partir de sources programmées et non programmées.
  BC-2800.50.20:
    name: Transfert inter-établissements
    description: |
      Coordination des transferts de patients entre établissements et niveaux de prise en charge.
  BC-2800.50.30:
    name: Attribution des lits
    description: |
      Attribution et réattribution des lits hospitaliers en fonction de la sévérité, de l'isolement et des capacités disponibles.
  BC-2800.50.40:
    name: Saisie des modalités de sortie
    description: |
      Saisie de la modalité de sortie, du placement en soins post-aigus et de la destination de transfert.
  BC-2800.60:
    name: Gestion de la préparation avant service
    description: |
      Autorisation pré-procédure, vérification documentaire et activités de préparation du patient réalisées avant la prestation de services.
  BC-2800.60.10:
    name: Autorisation pré-procédure
    description: |
      Autorisation clinique et anesthésique pour les procédures programmées.
  BC-2800.60.20:
    name: Vérification de la documentation requise
    description: |
      Vérification que les prescriptions, consentements et antécédents médicaux sont complets.
  BC-2800.60.30:
    name: Prise de contact pré-visite
    description: |
      Contact préalable à la visite pour les formulaires, les antécédents et la pré-inscription du patient.
  BC-2800.60.40:
    name: Instructions de préparation du patient
    description: |
      Transmission des instructions de préparation pré-procédure et pré-visite aux patients.

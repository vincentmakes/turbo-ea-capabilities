locale: fr
source: L1-research-scholarship-management.yaml
entries:
  BC-4780:
    name: Gestion de la recherche et de la bourse académique
    description: |
      Gestion de la mission de recherche de l'enseignement supérieur couvrant la stratégie
      de portefeuille, le cycle de vie des subventions, la supervision éthique et de
      l'intégrité, les publications scientifiques, la collaboration et l'évaluation de l'impact.
  BC-4780.10:
    name: Portefeuille et stratégie de recherche
    description: |
      Orientation stratégique du portefeuille de recherche de l'établissement à travers
      les thématiques, les centres et les investissements en capacités.
    in_scope:
      - Stratégie des thématiques et centres de recherche
      - Planification des investissements en capacités de recherche
      - Reporting de la performance de la recherche
    out_of_scope:
      - Gestion générale du portefeuille de projets (couverte par la Gestion du portefeuille de projets – transverse)
  BC-4780.10.10:
    name: Stratégie des thématiques et centres de recherche
    description: |
      Stratégie pour les thématiques de recherche, les centres et les instituts.
  BC-4780.10.20:
    name: Planification des investissements en capacités de recherche
    description: |
      Planification des investissements en capacités de recherche, notamment les infrastructures et le personnel.
  BC-4780.10.30:
    name: Reporting de la performance de la recherche
    description: |
      Reporting interne et externe de la performance de la recherche.
  BC-4780.20:
    name: Gestion des subventions de recherche
    description: |
      Gestion de bout en bout des subventions et contrats de recherche, de
      l'identification des opportunités à l'administration post-attribution.
    in_scope:
      - Identification des opportunités de financement
      - Développement des dossiers de candidature avant attribution
      - Administration des subventions après attribution
    out_of_scope:
      - Gestion financière générale (couverte par la Gestion financière – transverse)
  BC-4780.20.10:
    name: Identification des opportunités de financement
    description: |
      Identification des opportunités de financement et de subventions pour les chercheurs.
  BC-4780.20.20:
    name: Développement des dossiers de candidature avant attribution
    description: |
      Développement des dossiers de candidature, des budgets et des dossiers de soumission.
  BC-4780.20.30:
    name: Administration des subventions après attribution
    description: |
      Administration post-attribution des subventions incluant le reporting et la conformité.
  BC-4780.30:
    name: Supervision de l'éthique et de l'intégrité de la recherche
    description: |
      Supervision indépendante de l'éthique et de l'intégrité de la recherche, incluant
      la révision des recherches impliquant des sujets humains et animaux, et l'investigation des manquements.
    in_scope:
      - Révision de la recherche sur les sujets humains (IRB/REC)
      - Supervision de la recherche sur les animaux (IACUC/AWERB)
      - Investigation des manquements à l'intégrité de la recherche
    out_of_scope:
      - Cas de manquement à l'intégrité académique (évaluation) (couverts par la Gestion des évaluations et examens)
  BC-4780.30.10:
    name: Révision de la recherche sur les sujets humains
    description: |
      Révision indépendante des recherches impliquant des sujets humains.
  BC-4780.30.20:
    name: Supervision de la recherche sur les animaux
    description: |
      Supervision des recherches impliquant des sujets animaux.
  BC-4780.30.30:
    name: Investigation des manquements à l'intégrité de la recherche
    description: |
      Investigation des allégations de manquement à l'intégrité de la recherche.
  BC-4780.40:
    name: Gestion des publications et de la production scientifique
    description: |
      Suivi et gestion de la production scientifique incluant les publications,
      le libre accès et les identifiants pérennes.
    in_scope:
      - Suivi des publications
      - Gestion du libre accès et des dépôts institutionnels
      - Gestion des identifiants pérennes (ORCID, DOI)
    out_of_scope:
      - Valorisation de la propriété intellectuelle (couverte par la Gestion de la propriété intellectuelle – transverse)
  BC-4780.40.10:
    name: Suivi des publications
    description: |
      Suivi des publications et des productions des chercheurs.
  BC-4780.40.20:
    name: Gestion du libre accès et des dépôts institutionnels
    description: |
      Gestion de la publication en libre accès et des dépôts institutionnels.
  BC-4780.40.30:
    name: Gestion des identifiants pérennes
    description: |
      Gestion des identifiants pérennes des chercheurs et de leurs productions.
  BC-4780.50:
    name: Gestion des collaborations et partenariats de recherche
    description: |
      Établissement et animation des partenariats de recherche avec le monde académique,
      l'industrie et les collaborateurs internationaux.
    in_scope:
      - Accords de recherche inter-institutionnels
      - Partenariats de recherche avec l'industrie
      - Collaboration internationale en recherche
    out_of_scope:
      - Relations avec les fournisseurs commerciaux (couvertes par la Gestion des fournisseurs – transverse)
  BC-4780.50.10:
    name: Gestion des accords de recherche inter-institutionnels
    description: |
      Gestion des accords de recherche avec les établissements pairs.
  BC-4780.50.20:
    name: Gestion des partenariats de recherche avec l'industrie
    description: |
      Gestion des partenariats de recherche industrielle et des recherches sponsorisées.
  BC-4780.50.30:
    name: Collaboration internationale en recherche
    description: |
      Établissement et animation des collaborations de recherche internationales.
  BC-4780.60:
    name: Impact et évaluation de la recherche
    description: |
      Évaluation de l'impact de la recherche à travers des études de cas, la bibliométrie
      et la participation aux exercices nationaux d'évaluation de la recherche.
    in_scope:
      - Études de cas d'impact de la recherche
      - Analyse bibliométrique et altmétrique
      - Soumission aux évaluations nationales de la recherche (p. ex. REF)
    out_of_scope:
      - Révisions d'accréditation académique (couvertes par la Gestion de la qualité académique et de l'accréditation)
  BC-4780.60.10:
    name: Études de cas d'impact de la recherche
    description: |
      Développement d'études de cas illustrant l'impact de la recherche.
  BC-4780.60.20:
    name: Analyse bibliométrique et altmétrique
    description: |
      Analyse bibliométrique et altmétrique des productions et de la portée de la recherche.
  BC-4780.60.30:
    name: Soumission aux évaluations nationales de la recherche
    description: |
      Soumission aux exercices nationaux d'évaluation de la recherche.

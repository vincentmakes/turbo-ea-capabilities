locale: fr
source: L1-corporate-real-estate-management.yaml
entries:
  BC-710:
    name: Gestion de l'immobilier d'entreprise
    description: |
      Portefeuille immobilier, baux, transactions et planification des espaces.
  BC-710.10:
    name: Gestion de la stratégie et du portefeuille immobilier
    description: |
      Stratégie immobilière, forme du portefeuille et planification de l'empreinte.
  BC-710.10.10:
    name: Développement de la stratégie immobilière
    description: |
      Stratégie immobilière pluriannuelle alignée sur les besoins de l'entreprise.
  BC-710.10.20:
    name: Planification de l'empreinte immobilière
    description: |
      Planification de l'empreinte, stratégie d'implantation et analyse de consolidation.
  BC-710.10.30:
    name: Gestion de la performance immobilière
    description: |
      Suivi des coûts, de l'utilisation et de la performance de chaque propriété.
  BC-710.10.40:
    name: Gestion des risques immobiliers
    description: |
      Risques de marché immobilier, pays et contrepartie.
  BC-710.20:
    name: Gestion des acquisitions et cessions immobilières
    description: |
      Acquisitions, cessions et sorties immobilières.
  BC-710.20.10:
    name: Acquisition immobilière
    description: |
      Acquisition de propriétés en pleine propriété ou en bail, incluant la diligence raisonnable.
  BC-710.20.20:
    name: Cession et sortie immobilière
    description: |
      Vente, sous-location et sortie d'actifs immobiliers et de baux.
  BC-710.20.30:
    name: Sélection de sites et négociation
    description: |
      Analyse de localisation, sélection de sites et négociation de baux.
  BC-710.30:
    name: Gestion de l'administration des baux
    description: |
      Cycle de vie des baux, comptabilisation et options.
  BC-710.30.10:
    name: Gestion de la documentation des baux
    description: |
      Maintenance des documents de bail, des résumés et des clauses essentielles.
  BC-710.30.20:
    name: Comptabilisation des baux
    description: |
      Comptabilisation des baux selon IFRS 16 / ASC 842.
  BC-710.30.30:
    name: Paiement des loyers et réconciliation
    description: |
      Paiements de loyers, charges de services et CAM, et réconciliation.
  BC-710.30.40:
    name: Gestion des options et renouvellements de baux
    description: |
      Suivi et exercice des options, clauses de résiliation et renouvellements de baux.
  BC-710.40:
    name: Gestion de la stratégie du milieu de travail
    description: |
      Concepts de lieu de travail, travail hybride et standards d'aménagement.
  BC-710.40.10:
    name: Conception du concept de lieu de travail
    description: |
      Définition des concepts de lieu de travail, incluant le travail par activités.
  BC-710.40.20:
    name: Standards de conception du milieu de travail
    description: |
      Guides de conception, standards d'aménagement et standards de marque pour les lieux de travail.
  BC-710.40.30:
    name: Mise en œuvre de la politique de travail hybride
    description: |
      Implémentation des modèles de travail hybride et des espaces associés.
  BC-710.40.40:
    name: Mesure de l'expérience en milieu de travail
    description: |
      Mesure de l'expérience et de la satisfaction en milieu de travail.

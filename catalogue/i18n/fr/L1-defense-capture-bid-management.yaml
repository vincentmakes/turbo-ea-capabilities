    name: Définition de la stratégie de partenariat
    description: |
      Définition de la stratégie de partenariat et du rôle de maître d'œuvre/sous-traitant.
  BC-1750.50.20:
    name: Négociation des accords de partenariat
    description: |
      Négociation et exécution des accords de partenariat et de confidentialité.
  BC-1750.50.30:
    name: Sélection des sous-traitants pour les offres
    description: |
      Sélection des sous-traitants et partenaires PME pour les offres.

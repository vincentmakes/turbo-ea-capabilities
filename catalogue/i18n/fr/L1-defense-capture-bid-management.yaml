locale: fr
source: L1-defense-capture-bid-management.yaml
entries:
  BC-1750:
    name: Gestion des réponses aux appels d'offres de défense
    description: |
      Gestion de la capture, renseignement client et développement des offres pour les contrats de défense.
  BC-1750.10:
    name: Gestion de la capture
    description: |
      Activités de capture pré-RFP, influence sur le client et stratégie de succès.
  BC-1750.10.10:
    name: Identification des opportunités
    description: |
      Identification des opportunités et des cibles d'affaires de défense.
  BC-1750.10.20:
    name: Actions d'influence sur le client
    description: |
      Actions pré-RFP d'influence sur le client et les exigences.
  BC-1750.10.30:
    name: Développement de la stratégie de succès
    description: |
      Développement de la stratégie de succès, des thèmes et des facteurs différenciants.
  BC-1750.10.40:
    name: Revue concurrentielle et analyse de la concurrence
    description: |
      Revues concurrentielles (black hat) et analyse de la concurrence.
  BC-1750.20:
    name: Gestion du renseignement client de défense
    description: |
      Relations client et renseignement sur les exigences et les budgets.
  BC-1750.20.10:
    name: Cartographie des relations client
    description: |
      Cartographie des organisations clientes et des parties prenantes clés.
  BC-1750.20.20:
    name: Renseignement sur les budgets et les acquisitions
    description: |
      Renseignement sur les budgets, les cycles d'acquisition et les priorités.
  BC-1750.20.30:
    name: Collecte du renseignement sur les exigences
    description: |
      Collecte des exigences émergentes des clients.
  BC-1750.30:
    name: Gestion des offres de défense
    description: |
      Décisions offre/no offre, gouvernance des offres et ressources.
  BC-1750.30.10:
    name: Décision offre/no offre
    description: |
      Gouvernance et approbations de la décision offre/no offre.
  BC-1750.30.20:
    name: Ressources et financement des offres
    description: |
      Allocation des ressources et financement des offres de défense.
  BC-1750.30.30:
    name: Gestion des risques liés aux offres
    description: |
      Identification et gestion des risques liés aux offres.
  BC-1750.40:
    name: Gestion des propositions de défense
    description: |
      Rédaction des propositions, revues et production.
  BC-1750.40.10:
    name: Rédaction des propositions
    description: |
      Rédaction des volumes de propositions de défense.
  BC-1750.40.20:
    name: Exécution des revues colorées
    description: |
      Revues colorées (rose, rouge, or) et revue finale des propositions.
  BC-1750.40.30:
    name: Production et soumission des propositions
    description: |
      Production et soumission dans les délais des propositions.
  BC-1750.40.40:
    name: Vérification de conformité des propositions
    description: |
      Vérification de conformité aux instructions du RFP.
  BC-1750.50:
    name: Gestion de la stratégie de partenariat et sous-traitance
    description: |
      Accords de partenariat et sélection des sous-traitants pour les offres.

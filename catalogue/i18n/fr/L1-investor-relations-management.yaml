locale: fr
source: L1-investor-relations-management.yaml
entries:
  BC-240:
    name: Gestion des relations investisseurs
    description: |
      Communications avec les actionnaires, les analystes et les marchés de capitaux.
  BC-240.10:
    name: Communication avec les marchés de capitaux
    description: |
      Stratégie de relations investisseurs, récit actionnarial et journées marchés de capitaux.
  BC-240.10.10:
    name: Stratégie de relations investisseurs et récit actionnarial
    description: |
      Définition de la stratégie de relations investisseurs et du récit actionnarial.
  BC-240.10.20:
    name: Gestion des journées marchés de capitaux
    description: |
      Planification et organisation des journées marchés de capitaux et événements investisseurs.
  BC-240.10.30:
    name: Gestion de la divulgation aux relations investisseurs
    description: |
      Contrôles de divulgation, divulgation équitable et communication des événements significatifs.
  BC-240.10.40:
    name: Communication ESG et durabilité
    description: |
      Récit ESG destiné aux marchés de capitaux et aux agences de notation.
  BC-240.20:
    name: Gestion du cycle des résultats
    description: |
      Communiqués de résultats trimestriels, conférences et transcriptions.
  BC-240.20.10:
    name: Préparation des communiqués de résultats
    description: |
      Rédaction et diffusion des communiqués de presse sur les résultats financiers.
  BC-240.20.20:
    name: Gestion des conférences de résultats
    description: |
      Scripts, préparation aux questions-réponses et animation des conférences d'analystes.
  BC-240.20.30:
    name: Gestion du consensus et des orientations
    description: |
      Suivi des estimations de consensus et communication des orientations financières.
  BC-240.30:
    name: Gestion de l'engagement actionnarial
    description: |
      Assemblées générales, réunions d'actionnaires et actions auprès des actionnaires individuels.
  BC-240.30.10:
    name: Engagement des investisseurs institutionnels
    description: |
      Roadshows, entretiens individuels et dialogue continu avec les investisseurs institutionnels.
  BC-240.30.20:
    name: Engagement des actionnaires individuels
    description: |
      Communications et programmes d'outreach auprès des actionnaires individuels.
  BC-240.30.30:
    name: Coordination de l'assemblée générale ordinaire
    description: |
      Contribution des relations investisseurs à la logistique, aux documents et aux questions-réponses de l'AGO.
  BC-240.30.40:
    name: Engagement sur la gouvernance et les mandats
    description: |
      Engagement avec les conseillers en vote et les investisseurs axés sur la gouvernance.
  BC-240.40:
    name: Gestion des relations avec les analystes
    description: |
      Engagement avec les analystes côté vente et côté achat.
  BC-240.40.10:
    name: Gestion de la couverture des analystes côté vente
    description: |
      Développement de la couverture, revues de modèles et engagement côté vente.
  BC-240.40.20:
    name: Ciblage des investisseurs côté achat
    description: |
      Identification et ciblage des investisseurs côté achat.
  BC-240.40.30:
    name: Études de perception des investisseurs
    description: |
      Études de perception et enquêtes de retour d'information auprès de la base d'investisseurs.

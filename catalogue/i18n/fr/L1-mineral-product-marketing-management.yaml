locale: fr
source: L1-mineral-product-marketing-management.yaml
entries:
  BC-4480:
    name: Gestion de la commercialisation des produits miniers
    description: |
      Ventes, accords d'offtake, négociation des frais de traitement et d'affinage,
      règlement à prix provisoires, coordination logistique et gestion des risques
      de trading pour les concentrés, intermédiaires et produits métalliques finis.
  BC-4480.10:
    name: Ventes de concentrés et de métaux
    description: |
      Exécution des ventes au comptant et à terme, et planification de l'allocation
      aux clients pour les concentrés et les métaux finis.
    in_scope:
      - Ventes au comptant et contrats à terme
      - Planification de l'allocation clients entre mines et raffineries
    out_of_scope:
      - Calculs de règlement en prix provisoires (BC-4480.40)
  BC-4480.10.10:
    name: Exécution des ventes au comptant
    description: |
      Exécution des ventes au comptant de concentrés et de métaux aux négociants
      et clients finaux.
  BC-4480.10.20:
    name: Gestion des contrats à terme
    description: |
      Gestion des contrats de vente à terme pluriannuels pour les concentrés
      et les métaux.
  BC-4480.10.30:
    name: Planification de l'allocation clients
    description: |
      Répartition de la production disponible entre les clients et les contrats.
  BC-4480.20:
    name: Gestion des accords d'offtake
    description: |
      Négociation et administration continue des accords d'offtake, incluant
      les offtakes en streaming et en redevances.
  BC-4480.20.10:
    name: Négociation des contrats d'offtake
    description: |
      Négociation commerciale et juridique des accords d'offtake et de streaming.
  BC-4480.20.20:
    name: Nomination des volumes d'offtake
    description: |
      Nomination des volumes d'offtake en regard des droits contractuels.
  BC-4480.20.30:
    name: Suivi des performances d'offtake
    description: |
      Suivi des livraisons, de la qualité et des performances des contreparties
      dans le cadre des offtakes.
  BC-4480.30:
    name: Négociation des frais de traitement et d'affinage
    description: |
      Négociation annuelle de référence et bilatérale des frais de traitement et
      d'affinage ainsi que des pénalités sur les concentrés.
  BC-4480.30.10:
    name: Négociation annuelle de référence
    description: |
      Négociation annuelle des frais de traitement et d'affinage de référence
      avec les fonderies et les clients.
  BC-4480.30.20:
    name: Suivi du règlement des frais de traitement
    description: |
      Suivi des règlements des frais de traitement et d'affinage par rapport aux
      conditions de référence et contractuelles.
  BC-4480.30.30:
    name: Gestion des éléments pénalisants
    description: |
      Gestion des clauses de pénalité pour l'arsenic, l'antimoine, le fluor et
      autres éléments délétères.
  BC-4480.40:
    name: Prix provisoires et règlement final
    description: |
      Gestion des périodes de cotation, facturation provisoire, calcul du
      règlement final et coordination de la couverture pour le contenu métallique
      valorisé.
  BC-4480.40.10:
    name: Gestion des périodes de cotation
    description: |
      Gestion des périodes de cotation régissant la valorisation finale des
      expéditions.
  BC-4480.40.20:
    name: Émission des factures provisoires
    description: |
      Émission de factures provisoires à l'expédition sur la base des teneurs
      et prix supposés.
  BC-4480.40.30:
    name: Calcul du règlement final
    description: |
      Règlement final des expéditions sur la base des teneurs arbitrales et des
      prix moyens de la période de cotation.
  BC-4480.40.40:
    name: Coordination de la couverture
    description: |
      Coordination avec les programmes de couverture de la trésorerie pour les
      expositions sur métaux en prix provisoires.
  BC-4480.50:
    name: Coordination logistique des produits miniers
    description: |
      Nomination des expéditions en vrac, gestion des warrants d'entrepôt,
      échantillonnage au déchargement et conformité réglementaire des cargaisons
      en vrac.
  BC-4480.50.10:
    name: Nomination des expéditions en vrac
    description: |
      Nomination des navires, rames de wagons et barges pour les expéditions
      de concentrés et de minerais.
  BC-4480.50.20:
    name: Gestion des warrants d'entrepôt
    description: |
      Gestion des warrants d'entrepôts LME et d'autres bourses pour les stocks
      de métaux finis.
  BC-4480.50.30:
    name: Échantillonnage des concentrés au déchargement
    description: |
      Coordination de l'échantillonnage et du dosage indépendants aux ports de
      déchargement.
  BC-4480.50.40:
    name: Conformité au code des cargaisons en vrac solides
    description: |
      Conformité au code IMSBC de l'OMI et aux réglementations équivalentes sur
      les cargaisons en vrac solides.
  BC-4480.60:
    name: Gestion des risques de trading des métaux
    description: |
      Gestion des risques de prix des métaux, de crédit des contreparties et de
      documentation commerciale sur le portefeuille de commercialisation.
  BC-4480.60.10:
    name: Surveillance des positions de risque de prix
    description: |
      Surveillance des positions en métaux valorisés et non valorisés sur le
      portefeuille de commercialisation.
  BC-4480.60.20:
    name: Gestion du crédit des contreparties
    description: |
      Évaluation du crédit des contreparties, limites et surveillance des
      expositions pour les partenaires commerciaux.
  BC-4480.60.30:
    name: Confirmation et documentation des transactions
    description: |
      Confirmation, documentation et conservation des tickets et contrats
      de transaction.

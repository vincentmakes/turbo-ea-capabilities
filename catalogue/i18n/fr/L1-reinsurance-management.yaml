locale: fr
source: L1-reinsurance-management.yaml
entries:
  BC-2170:
    name: Gestion de la réassurance
    description: |
      Réassurance cédée et acceptée — conception des traités, placements facultatifs,
      bordereaux, recours sur sinistres, comptabilité et gestion de l'exposition aux
      contreparties de réassurance.

  BC-2170.10:
    name: Conception du programme de réassurance cédée
    description: |
      Analyse des besoins en réassurance, structuration du programme et coordination
      avec les courtiers de réassurance.

  BC-2170.10.10:
    name: Analyse des besoins en réassurance
    description: |
      Analyse des besoins en réassurance selon le portefeuille, l'appétit au risque
      et les contraintes en capital.

  BC-2170.10.20:
    name: Stratégie traité et facultative
    description: |
      Stratégie sur les cessions en traité versus facultative et les structures
      proportionnelles versus non-proportionnelles.

  BC-2170.10.30:
    name: Structuration du programme
    description: |
      Structuration des programmes de réassurance, tranches et rétentions.

  BC-2170.10.40:
    name: Coordination avec les courtiers de réassurance
    description: |
      Coordination avec les courtiers de réassurance pour le placement et le
      renouvellement.

  BC-2170.20:
    name: Administration des traités de réassurance
    description: |
      Intégration des traités, cession des primes, production des bordereaux et
      recours sur sinistres en traité.

  BC-2170.20.10:
    name: Intégration et renouvellement des traités
    description: |
      Intégration et renouvellement des traités de réassurance et placement des
      slips.

  BC-2170.20.20:
    name: Calcul et cession des primes de traité
    description: |
      Calcul des primes de traité et cession aux réassureurs participants.

  BC-2170.20.30:
    name: Production des bordereaux de traité
    description: |
      Production des bordereaux de prime et de sinistres de traité selon les
      pratiques de marché.

  BC-2170.20.40:
    name: Recours sur sinistres en traité
    description: |
      Récupération des paiements de sinistres en traité auprès des réassureurs.

  BC-2170.30:
    name: Administration de la réassurance facultative
    description: |
      Soumission facultative, suivi du placement et règlement des primes et sinistres.

  BC-2170.30.10:
    name: Soumission de risques facultatifs
    description: |
      Soumission de risques individuels pour placement en facultative.

  BC-2170.30.20:
    name: Suivi du placement facultatif
    description: |
      Suivi des signatures de placement facultatif et des quotes-parts auprès des
      réassureurs.

  BC-2170.30.30:
    name: Règlement des primes et sinistres facultatifs
    description: |
      Règlement des primes facultatives et des recours sur sinistres.

  BC-2170.40:
    name: Gestion de la réassurance acceptée
    description: |
      Souscription en acceptation, comptabilisation des primes, liquidation des
      sinistres et coordination de la rétrocession.

  BC-2170.40.10:
    name: Souscription des soumissions en acceptation
    description: |
      Souscription des soumissions de réassurance en acceptation et acceptation des
      risques.

  BC-2170.40.20:
    name: Comptabilisation des primes en acceptation
    description: |
      Comptabilisation des primes de réassurance en acceptation et des ajustements.

  BC-2170.40.30:
    name: Liquidation des sinistres en acceptation
    description: |
      Liquidation des sinistres et recours en réassurance acceptée.

  BC-2170.40.40:
    name: Coordination de la rétrocession
    description: |
      Coordination de la rétrocession vers les réassureurs de second rang.

  BC-2170.50:
    name: Comptabilité et règlement de la réassurance
    description: |
      Comptabilité des cessions, suivi des recouvrables, rapprochement des relevés
      et gestion des sûretés des contreparties.

  BC-2170.50.10:
    name: Comptabilité des cessions et des primes
    description: |
      Comptabilité des primes cédées, des commissions et des ajustements.

  BC-2170.50.20:
    name: Suivi des recouvrables de réassurance
    description: |
      Suivi des recouvrables de réassurance sur les sinistres payés et en suspens.

  BC-2170.50.30:
    name: Rapprochement des relevés réassureurs
    description: |
      Rapprochement des relevés des réassureurs et résolution des litiges.

  BC-2170.50.40:
    name: Gestion des sûretés des contreparties
    description: |
      Gestion des lettres de crédit, des fonds fiduciaires et des sûretés remis par
      les réassureurs.

  BC-2170.60:
    name: Gestion du risque de contrepartie réassurance
    description: |
      Évaluation du crédit des réassureurs, surveillance des limites de contrepartie
      et atténuation du risque de défaut.

  BC-2170.60.10:
    name: Évaluation du crédit des réassureurs
    description: |
      Évaluation de la solidité financière et du crédit des contreparties de
      réassurance.

  BC-2170.60.20:
    name: Surveillance des limites de concentration et de contrepartie
    description: |
      Surveillance des limites de concentration et d'exposition aux contreparties.

  BC-2170.60.30:
    name: Atténuation du risque de défaut des réassureurs
    description: |
      Actions d'atténuation en cas de dégradation ou de défaut d'un réassureur.

locale: fr
source: L1-marketing-management.yaml
entries:
  BC-400:
    name: Gestion du marketing
    description: |
      Marque, intelligence de marché, génération de la demande et opérations marketing.
  BC-400.10:
    name: Gestion de la stratégie marketing
    description: |
      Stratégie marketing, positionnement et planification de la mise sur le marché.
  BC-400.10.10:
    name: Segmentation et ciblage du marché
    description: |
      Définition des marchés cibles, segments et personas.
  BC-400.10.20:
    name: Positionnement et proposition de valeur
    description: |
      Articulation du positionnement, des messages et des propositions de valeur.
  BC-400.10.30:
    name: Planification de la mise sur le marché
    description: |
      Modèles de mise sur le marché, plans de lancement et stratégie de canaux.
  BC-400.10.40:
    name: Planification du mix marketing
    description: |
      Mix marketing, allocation par canal et plans marketing intégrés.
  BC-400.20:
    name: Gestion de la marque
    description: |
      Stratégie, identité, valeur et gouvernance de la marque.
  BC-400.20.10:
    name: Stratégie et architecture de marque
    description: |
      Portefeuille de marques, architecture et stratégie de marque.
  BC-400.20.20:
    name: Identité et standards de marque
    description: |
      Identité visuelle, voix, ton et standards de marque.
  BC-400.20.30:
    name: Mesure de la valeur de marque
    description: |
      Suivi de la notoriété, de la considération et de la valeur de la marque.
  BC-400.20.40:
    name: Conformité à la marque et intendance
    description: |
      Intendance de l'utilisation de la marque sur les canaux et chez les partenaires.
  BC-400.30:
    name: Gestion de l'intelligence de marché
    description: |
      Études de marché, veille concurrentielle et insights clients.
  BC-400.30.10:
    name: Étude de marché
    description: |
      Études de marché primaires et secondaires et analyse des tendances.
  BC-400.30.20:
    name: Veille concurrentielle
    description: |
      Surveillance des concurrents, fiches de combat et analyse concurrentielle.
  BC-400.30.30:
    name: Génération d'insights clients
    description: |
      Synthèse des insights clients à partir des données et de la recherche qualitative.
  BC-400.30.40:
    name: Dimensionnement et prévision du marché
    description: |
      Dimensionnement du marché, parts de marché et prévisions de la demande.
  BC-400.40:
    name: Gestion de la génération de la demande
    description: |
      Campagnes de génération de leads et marketing du cycle de vie.
  BC-400.40.10:
    name: Planification des campagnes marketing
    description: |
      Planification des campagnes, sélection des audiences et développement des offres.
  BC-400.40.20:
    name: Génération de leads
    description: |
      Génération de leads entrants, sortants et par l'événementiel.
  BC-400.40.30:
    name: Nurturing et scoring des leads
    description: |
      Scoring des leads, parcours de nurturing et remise des MQL aux ventes.
  BC-400.40.40:
    name: Marketing du cycle de vie et fidélisation
    description: |
      Marketing du cycle de vie, vente croisée et campagnes de fidélisation clients.
  BC-400.50:
    name: Gestion des opérations marketing
    description: |
      Budget marketing, technologie, processus et mesure.
  BC-400.50.10:
    name: Gestion du budget marketing
    description: |
      Budgétisation, allocation et suivi des dépenses marketing.
  BC-400.50.20:
    name: Gestion du stack technologique marketing
    description: |
      Sélection et intégration des outils d'automatisation marketing et d'analytique.
  BC-400.50.30:
    name: Mesure de la performance marketing
    description: |
      Attribution marketing, ROI et tableaux de bord de performance.
  BC-400.50.40:
    name: Gestion de la conformité marketing
    description: |
      Conformité marketing aux exigences de consentement, de confidentialité et de publicité.
  BC-400.60:
    name: Gestion du marketing numérique
    description: |
      Web, SEO, médias payants, réseaux sociaux et automatisation marketing.
  BC-400.60.10:
    name: Gestion de l'expérience web
    description: |
      Propriétés web de l'entreprise, gestion de contenu et personnalisation.
  BC-400.60.20:
    name: Optimisation pour les moteurs de recherche
    description: |
      Optimisation de la recherche organique et visibilité des contenus.
  BC-400.60.30:
    name: Gestion des médias payants
    description: |
      Achat de médias payants en search, display, vidéo et programmatique.
  BC-400.60.40:
    name: Gestion des réseaux sociaux
    description: |
      Présence organique sur les réseaux sociaux, gestion de communauté et engagement des influenceurs.
  BC-400.60.50:
    name: Opérations d'automatisation marketing
    description: |
      E-mail, orchestration des parcours et opérations d'automatisation marketing.
  BC-400.70:
    name: Gestion du marketing de contenu
    description: |
      Planification éditoriale, production et distribution de contenu.
  BC-400.70.10:
    name: Planification éditoriale
    description: |
      Calendrier éditorial, thématiques et stratégie de contenu.
  BC-400.70.20:
    name: Production de contenu
    description: |
      Production d'articles, de vidéos, de podcasts et d'actifs multimédias.
  BC-400.70.30:
    name: Gestion des actifs numériques
    description: |
      Stockage, indexation et réutilisation des actifs marketing numériques.
  BC-400.70.40:
    name: Distribution et syndication de contenu
    description: |
      Distribution de contenu sur les canaux propriétaires, gagnés et payants.

locale: fr
source: L1-enterprise-risk-management.yaml
entries:
  BC-120:
    name: Gestion des risques d'entreprise
    description: |
      Identification, évaluation, atténuation et surveillance des risques au niveau de l'entreprise.
  BC-120.10:
    name: Gestion du cadre de risque et de l'appétit pour le risque
    description: |
      Taxonomie des risques, cadre, appétit pour le risque et tolérances.
  BC-120.10.10:
    name: Gestion de la taxonomie des risques
    description: |
      Définition et maintenance de la taxonomie et des catégories de risques de l'entreprise.
  BC-120.10.20:
    name: Définition de l'appétit pour le risque
    description: |
      Déclarations d'appétit pour le risque et seuils de tolérance approuvés par le conseil d'administration.
  BC-120.10.30:
    name: Gestion des politiques et normes de risque
    description: |
      Politiques internes, normes et méthodologies de gestion des risques à l'échelle du groupe.
  BC-120.10.40:
    name: Gestion de la culture du risque
    description: |
      Évaluation de la culture du risque, sensibilisation et programmes de responsabilisation.
  BC-120.20:
    name: Identification et évaluation des risques
    description: |
      Détection, évaluation, notation et priorisation des risques.
  BC-120.20.10:
    name: Identification des risques
    description: |
      Ateliers, analyses et contributions permettant de détecter les risques nouveaux et émergents.
  BC-120.20.20:
    name: Analyse et notation des risques
    description: |
      Analyse de la probabilité, de l'impact, de la vélocité et du risque inhérent par rapport au risque résiduel.
  BC-120.20.30:
    name: Analyse de scénarios et de stress
    description: |
      Analyse prospective par scénarios, stress et stress inversé.
  BC-120.20.40:
    name: Surveillance des risques émergents
    description: |
      Veille prospective sur les risques émergents et les signaux faibles.
  BC-120.30:
    name: Gestion du traitement des risques
    description: |
      Décisions d'atténuation, de transfert, d'évitement et d'acceptation des risques.
  BC-120.30.10:
    name: Planification de l'atténuation des risques
    description: |
      Définition des actions d'atténuation, des responsables et des délais cibles.
  BC-120.30.20:
    name: Gestion du transfert de risque
    description: |
      Transfert de risque par l'assurance, les contrats et les instruments de couverture.
  BC-120.30.30:
    name: Gouvernance de l'acceptation des risques
    description: |
      Acceptation formelle des risques résiduels dépassant l'appétit, avec approbations requises.
  BC-120.30.40:
    name: Conception et efficacité des contrôles
    description: |
      Définition et évaluation de l'efficacité des contrôles de risque.
  BC-120.40:
    name: Surveillance et reporting des risques
    description: |
      Indicateurs de risque, tableaux de bord et reporting aux instances de gouvernance.
  BC-120.40.10:
    name: Gestion des indicateurs clés de risque
    description: |
      Définition, fixation des seuils et suivi des indicateurs clés de risque.
  BC-120.40.20:
    name: Capture des événements et pertes liés aux risques
    description: |
      Enregistrement des événements de risque opérationnel, des quasi-incidents et des pertes.
  BC-120.40.30:
    name: Reporting et tableaux de bord des risques
    description: |
      Reporting périodique au comité de direction, au conseil d'administration et au comité des risques.
  BC-120.40.40:
    name: Agrégation et analyse de concentration des risques
    description: |
      Agrégation des risques à l'échelle de l'entreprise et analyses de concentration.
  BC-120.50:
    name: Gestion des assurances de l'entreprise
    description: |
      Souscription et gestion des programmes d'assurance de l'entreprise.
  BC-120.50.10:
    name: Conception du programme d'assurance
    description: |
      Stratégie de couverture, rétention et limites par ligne d'assurance.
  BC-120.50.20:
    name: Placement et renouvellement des assurances
    description: |
      Gestion des courtiers, placement sur le marché et renouvellement des polices.
  BC-120.50.30:
    name: Gestion des sinistres d'assurance
    description: |
      Déclaration, instruction et recouvrement des sinistres d'assurance de l'entreprise.
  BC-120.50.40:
    name: Gestion de la captive d'assurance
    description: |
      Exploitation et gouvernance des véhicules d'assurance captive.

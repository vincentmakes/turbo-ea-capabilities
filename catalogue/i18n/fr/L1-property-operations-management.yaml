locale: fr
source: L1-property-operations-management.yaml
entries:
  BC-4060:
    name: Gestion des opérations hôtelières
    description: |
      Exploitation quotidienne des hôtels, resorts et hébergements avec services — réception, housekeeping, technique, conciergerie, sécurité, développement durable et respect des standards de marque et de qualité.
    in_scope:
      - Opérations de réception et check-in / check-out
      - Housekeeping et objets trouvés
      - Maintenance et ingénierie de l'établissement
      - Conciergerie, bagagerie, voiturier et transport client
      - Sécurité de l'établissement, sécurité incendie et gestion des incidents
      - Opérations de développement durable à l'échelle de l'établissement
      - Audit des standards de marque et conformité qualité
    out_of_scope:
      - Opérations de restauration (BC-4070)
      - Exécution des événements et blocs groupes (BC-4110)
      - Stratégie développement durable de l'entreprise (BC-740)
  BC-4060.10:
    name: Opérations de réception
    description: |
      Exploitation de la réception couvrant la préparation à l'arrivée, le check-in, l'attribution des chambres, le check-out, la clôture du folio et la remise des clés.
  BC-4060.10.10:
    name: Préparation à l'arrivée
    description: |
      Activités préparatoires avant l'arrivée, incluant les rapports d'arrivée, les attributions de chambres et la préparation des attentions.
  BC-4060.10.20:
    name: Opérations de check-in
    description: |
      Opérations de check-in client via les canaux réception, mobile et borne.
  BC-4060.10.30:
    name: Attribution de chambre et surclassement
    description: |
      Attribution des chambres et exécution des décisions de surclassement, incluant les surclassements payants et gratuits.
  BC-4060.10.40:
    name: Check-out et clôture du folio
    description: |
      Opérations de check-out client et clôture du folio de l'établissement.
  BC-4060.10.50:
    name: Remise des clés et des accréditations d'accès
    description: |
      Remise et révocation des clés de chambre physiques et numériques et des accréditations d'accès.
  BC-4060.20:
    name: Opérations de housekeeping
    description: |
      Opérations de nettoyage des chambres, service de couverture, nettoyage approfondi et objets trouvés sur l'ensemble de l'établissement.
  BC-4060.20.10:
    name: Opérations de nettoyage quotidien
    description: |
      Nettoyage quotidien des chambres occupées et libérées selon les standards de l'établissement.
  BC-4060.20.20:
    name: Service de couverture et nettoyage de chambre occupée
    description: |
      Services de couverture et nettoyage des chambres pour les clients en résidence.
  BC-4060.20.30:
    name: Nettoyage approfondi et gestion des chambres hors service
    description: |
      Réalisation des cycles de nettoyage approfondi et gestion des chambres hors service et hors d'usage.
  BC-4060.20.40:
    name: Opérations des objets trouvés
    description: |
      Journalisation, stockage et restitution aux clients des objets trouvés sur l'établissement.
  BC-4060.30:
    name: Maintenance et ingénierie de l'établissement
    description: |
      Opérations de maintenance couvrant les travaux préventifs, réactifs et de rénovation ainsi que les inspections de conformité.
  BC-4060.30.10:
    name: Opérations de maintenance préventive
    description: |
      Réalisation de la maintenance préventive selon le planning et les données d'état.
  BC-4060.30.20:
    name: Opérations de maintenance réactive
    description: |
      Réalisation de la maintenance réactive déclenchée par les signalements clients et les constats d'inspection.
  BC-4060.30.30:
    name: Remplacement et rénovation des actifs
    description: |
      Remplacement et rénovation des actifs de l'établissement dans les chambres, les espaces publics et les zones de travail.
  BC-4060.30.40:
    name: Inspections de conformité techniques
    description: |
      Inspections de conformité couvrant les systèmes incendie, de sécurité des personnes, les ascenseurs et les équipements sous pression.
  BC-4060.40:
    name: Services de conciergerie et aux clients
    description: |
      Services de conciergerie, bagagerie, voiturier et transport client sur l'ensemble du parcours client.
  BC-4060.40.10:
    name: Services d'information et de réservation de conciergerie
    description: |
      Services de conciergerie couvrant les informations sur la destination, les réservations de restaurants et d'activités.
  BC-4060.40.20:
    name: Opérations de bagagerie
    description: |
      Opérations de prise en charge et de manutention des bagages, incluant le stockage et la livraison.
  BC-4060.40.30:
    name: Opérations de voiturier
    description: |
      Services de voiturier et prise en charge des véhicules aux entrées de l'établissement.
  BC-4060.40.40:
    name: Coordination du transport client
    description: |
      Coordination du transport terrestre client incluant la navette hôtelière et les arrangements de voiture.
  BC-4060.50:
    name: Opérations de sécurité et de sûreté de l'établissement
    description: |
      Exploitation de la surveillance, de la sécurité incendie, des évacuations et de la gestion des incidents sur l'établissement.
  BC-4060.50.10:
    name: Opérations de surveillance de l'établissement
    description: |
      Surveillance des espaces publics et opérationnels incluant le monitoring et les revues.
  BC-4060.50.20:
    name: Opérations de sécurité incendie et des personnes
    description: |
      Exploitation des systèmes de sécurité incendie et des personnes incluant les exercices et la disponibilité des équipements.
  BC-4060.50.30:
    name: Opérations d'évacuation d'urgence
    description: |
      Exécution des évacuations d'urgence et des opérations de commandement d'incident sur l'établissement.
  BC-4060.50.40:
    name: Gestion des incidents clients
    description: |
      Gestion des incidents de sécurité, de vol et incidents sécuritaires concernant les clients sur l'établissement.
  BC-4060.60:
    name: Opérations de développement durable de l'établissement
    description: |
      Exploitation à l'échelle de l'établissement des programmes d'énergie, d'eau, de déchets et de réutilisation du linge, cohérents avec les engagements de marque et de certification.
    in_scope:
      - Comptage et surveillance de la consommation de l'établissement
      - Programmes de réutilisation et de gestion des déchets à l'échelle de l'établissement
    out_of_scope:
      - Stratégie développement durable de l'entreprise (BC-740)
  BC-4060.60.10:
    name: Opérations énergétiques de l'établissement
    description: |
      Exploitation des systèmes énergétiques de l'établissement et surveillance de la consommation par rapport aux objectifs.
  BC-4060.60.20:
    name: Opérations de gestion de l'eau
    description: |
      Gestion de la consommation d'eau de l'établissement incluant la détection des fuites et les mesures de réutilisation.
  BC-4060.60.30:
    name: Opérations de gestion des déchets et du recyclage
    description: |
      Exploitation des programmes de tri des déchets, de recyclage et de valorisation des déchets alimentaires.
  BC-4060.60.40:
    name: Programmes de réutilisation du linge et des serviettes
    description: |
      Exploitation des programmes de réutilisation du linge et des serviettes et des mécaniques d'opt-in client.
  BC-4060.70:
    name: Audit qualité et standards de marque
    description: |
      Audit de la conformité de l'établissement aux standards de marque et d'exploitation, programmes clients mystère et opérations de rattrapage du service.
  BC-4060.70.10:
    name: Opérations d'audit des standards de marque
    description: |
      Audit de la conformité de l'établissement aux standards de marque et d'exploitation.
  BC-4060.70.20:
    name: Opérations du programme client mystère
    description: |
      Exploitation des programmes clients mystère évaluant l'expérience client sur des parcours scriptés.
  BC-4060.70.30:
    name: Journalisation des actions de rattrapage du service
    description: |
      Journalisation des actions de rattrapage du service sur l'établissement incluant les compensations et le suivi.
  BC-4060.70.40:
    name: Clôture des améliorations qualité
    description: |
      Clôture des constats d'audit et de retour d'information par rapport aux plans d'amélioration de la qualité.

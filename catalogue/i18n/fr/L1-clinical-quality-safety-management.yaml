locale: fr
source: L1-clinical-quality-safety-management.yaml
entries:
  BC-2840:
    name: Gestion de la qualité et de la sécurité cliniques
    description: |
      Gestion des événements indésirables, prévention et contrôle des infections, mesure des résultats cliniques, préparation aux accréditations, risque clinique et responsabilité, et programmes d'amélioration de la qualité propres aux soins cliniques.
  BC-2840.10:
    name: Gestion des événements indésirables
    description: |
      Signalement, investigation et gestion des événements indésirables, incluant les événements sentinelles et les presqu'accidents.
  BC-2840.10.10:
    name: Signalement et saisie des événements
    description: |
      Signalement et saisie multicanaux des événements indésirables et presqu'accidents.
  BC-2840.10.20:
    name: Analyse des causes profondes
    description: |
      Analyse des causes profondes et des causes apparentes des événements indésirables.
  BC-2840.10.30:
    name: Gestion des événements sentinelles
    description: |
      Identification, réponse et déclaration des événements sentinelles et jamais-événements.
  BC-2840.10.40:
    name: Enquête en culture juste
    description: |
      Examen en culture juste des facteurs humains et des responsabilités dans les événements de sécurité.
  BC-2840.20:
    name: Prévention et contrôle des infections
    description: |
      Surveillance, prévention et contrôle des infections associées aux soins, incluant la gestion des épidémies et la gestion des antimicrobiens.
  BC-2840.20.10:
    name: Surveillance des infections associées aux soins
    description: |
      Surveillance et déclaration des infections associées aux soins.
  BC-2840.20.20:
    name: Enquête sur les épidémies
    description: |
      Investigation et maîtrise des clusters infectieux et des épidémies.
  BC-2840.20.30:
    name: Supervision de la stérilisation
    description: |
      Supervision des opérations et de la conformité du service de stérilisation.
  BC-2840.20.40:
    name: Gestion des antimicrobiens
    description: |
      Opérations du programme de gestion des antimicrobiens et supervision des prescriptions.
  BC-2840.30:
    name: Mesure des résultats cliniques
    description: |
      Mesure et déclaration des résultats cliniques par rapport aux indicateurs de référence, aux soumissions aux registres et aux résultats rapportés par les patients.
  BC-2840.30.10:
    name: Déclaration des indicateurs de qualité réglementaires
    description: |
      Collecte et soumission des indicateurs de qualité réglementaires de référence.
  BC-2840.30.20:
    name: Suivi de la mortalité et des réhospitalisations
    description: |
      Suivi de la mortalité, des réhospitalisations et des résultats ajustés au risque.
  BC-2840.30.30:
    name: Soumission aux registres de résultats de spécialité
    description: |
      Soumission aux registres de résultats de spécialité tels que les registres cardiaques, chirurgicaux et d'AVC.
  BC-2840.30.40:
    name: Collecte des résultats rapportés par les patients
    description: |
      Collecte et analyse des résultats et des mesures d'expérience rapportés par les patients.
  BC-2840.40:
    name: Préparation aux accréditations et aux inspections
    description: |
      Préparation aux accréditations dans le cadre de programmes d'inspection cliniques, réglementaires et de spécialité.
  BC-2840.40.10:
    name: Programmes d'inspection simulée
    description: |
      Opérations des programmes d'inspection simulée et de préparation continue.
  BC-2840.40.20:
    name: Méthodologie tracer
    description: |
      Application de la méthodologie tracer patient et système pour la préparation aux accréditations.
  BC-2840.40.30:
    name: Suivi de la conformité aux normes
    description: |
      Suivi de la conformité aux normes d'accréditation et réglementaires.
  BC-2840.40.40:
    name: Coordination des inspections
    description: |
      Coordination des inspections d'accréditation, des constats et des plans d'actions correctives.
  BC-2840.50:
    name: Gestion du risque clinique et de la responsabilité
    description: |
      Identification et atténuation des risques cliniques et défense des réclamations en responsabilité propres aux soins médicaux.
  BC-2840.50.10:
    name: Évaluation du risque clinique
    description: |
      Identification et évaluation des risques cliniques dans l'ensemble des services et des processus.
  BC-2840.50.20:
    name: Soutien à la défense des réclamations
    description: |
      Soutien à l'investigation et à la défense des réclamations en responsabilité médicale.
  BC-2840.50.30:
    name: Processus de divulgation et d'excuse
    description: |
      Opérations du programme de divulgation et d'excuse pour les événements indésirables.
  BC-2840.50.40:
    name: Planification de l'atténuation du risque clinique
    description: |
      Planification et mise en œuvre des actions d'atténuation du risque clinique.
  BC-2840.60:
    name: Programmes d'amélioration de la qualité
    description: |
      Méthodologie d'amélioration des performances, mise en œuvre de faisceaux de mesures et initiatives de haute fiabilité.
  BC-2840.60.10:
    name: Gestion des cycles PDSA
    description: |
      Gestion des cycles Planifier-Faire-Étudier-Agir pour l'amélioration clinique.
  BC-2840.60.20:
    name: Mise en œuvre de faisceaux et protocoles
    description: |
      Mise en œuvre de faisceaux de mesures et de protocoles cliniques fondés sur les données probantes.
  BC-2840.60.30:
    name: Suivi des projets d'amélioration des performances
    description: |
      Suivi des projets d'amélioration des performances et de leurs résultats.
  BC-2840.60.40:
    name: Initiatives de haute fiabilité
    description: |
      Application des principes d'organisation à haute fiabilité et gestion des initiatives associées.

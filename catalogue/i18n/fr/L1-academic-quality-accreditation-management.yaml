locale: fr
source: L1-academic-quality-accreditation-management.yaml
entries:
  BC-4750:
    name: Gestion de la qualité académique et de l'accréditation
    description: |
      Assurance qualité interne et externe des programmes académiques et de
      l'établissement, couvrant la révision, l'accréditation, la gestion des
      référentiels de normes, les retours des étudiants et l'amélioration continue.
  BC-4750.10:
    name: Révision et validation des programmes
    description: |
      Validation des nouveaux programmes et revalidation périodique au regard
      des normes académiques institutionnelles et externes.
    in_scope:
      - Validation des nouveaux programmes
      - Révision périodique des programmes
      - Revalidation des programmes
    out_of_scope:
      - Étapes d'approbation des programmes (couvertes par la Gestion des curricula et des programmes)
  BC-4750.10.10:
    name: Validation des nouveaux programmes
    description: |
      Validation des nouveaux programmes au regard des normes académiques et de qualité.
  BC-4750.10.20:
    name: Révision périodique des programmes
    description: |
      Révision périodique de la qualité des programmes en cours et de leurs résultats.
  BC-4750.10.30:
    name: Revalidation des programmes
    description: |
      Revalidation des programmes à l'expiration des cycles de validation.
  BC-4750.20:
    name: Auto-évaluation institutionnelle
    description: |
      Auto-évaluation de la performance institutionnelle au regard des normes de
      qualité et comparaison avec des établissements pairs.
    in_scope:
      - Production du rapport d'auto-évaluation
      - Benchmarking des indicateurs de qualité
      - Planification stratégique de la qualité
    out_of_scope:
      - Visites d'accréditation externes (couvertes par la Coordination des accréditations et audits externes)
  BC-4750.20.10:
    name: Production du rapport d'auto-évaluation
    description: |
      Production des rapports d'auto-évaluation institutionnelle.
  BC-4750.20.20:
    name: Benchmarking des indicateurs de qualité
    description: |
      Comparaison des indicateurs de qualité avec ceux des établissements pairs.
  BC-4750.20.30:
    name: Planification stratégique de la qualité
    description: |
      Planification stratégique des priorités et des investissements en matière de qualité académique.
  BC-4750.30:
    name: Coordination des accréditations et audits externes
    description: |
      Coordination avec les organismes d'accréditation externes et les régulateurs
      qualité, incluant les visites de site, les inspections et la réponse aux résultats.
    in_scope:
      - Relations avec les organismes d'accréditation
      - Coordination des visites de site et inspections
      - Réponse aux résultats d'accréditation et suivi des conditions
    out_of_scope:
      - Déclarations réglementaires statutaires (couvertes par la Gestion de la conformité et des déclarations réglementaires en éducation)
  BC-4750.30.10:
    name: Relations avec les organismes d'accréditation
    description: |
      Gestion des relations et des soumissions auprès des organismes d'accréditation.
  BC-4750.30.20:
    name: Coordination des visites de site et inspections
    description: |
      Coordination des visites de site et de la logistique des inspections des accréditations.
  BC-4750.30.30:
    name: Réponse aux résultats d'accréditation
    description: |
      Réponse aux résultats, conditions et recommandations des accréditations.
  BC-4750.40:
    name: Gestion du référentiel de normes qualité
    description: |
      Adoption, cartographie et maintenance des normes de qualité académique
      et de la politique qualité institutionnelle.
    in_scope:
      - Adoption et maintenance des normes (p. ex. ESG, ABET, AACSB)
      - Rédaction des politiques qualité
      - Cartographie des normes qualité dans les pratiques opérationnelles
    out_of_scope:
      - Opérations d'audit courantes (couvertes par la Gestion de l'audit interne – transverse)
  BC-4750.40.10:
    name: Adoption et maintenance des normes
    description: |
      Adoption et maintenance des normes de qualité externes à travers l'établissement.
  BC-4750.40.20:
    name: Rédaction des politiques qualité
    description: |
      Rédaction et maintenance de la politique qualité institutionnelle.
  BC-4750.40.30:
    name: Cartographie des normes qualité
    description: |
      Cartographie des normes qualité dans les processus opérationnels et les contrôles.
  BC-4750.50:
    name: Retours des étudiants et évaluation des modules
    description: |
      Collecte, analyse et clôture des retours des étudiants au niveau des modules,
      des programmes et de l'établissement.
    in_scope:
      - Opérations des enquêtes d'évaluation des modules
      - Enquêtes nationales et inter-institutionnelles (p. ex. NSS, NSSE)
      - Analyse des retours et clôture de la boucle
    out_of_scope:
      - Analyses de satisfaction de type client hors contexte académique (couvertes par la Gestion du service client – transverse)
  BC-4750.50.10:
    name: Opérations des enquêtes d'évaluation des modules
    description: |
      Mise en œuvre des enquêtes d'évaluation au niveau des modules.
  BC-4750.50.20:
    name: Participation aux enquêtes nationales et inter-institutionnelles
    description: |
      Participation aux enquêtes nationales et inter-institutionnelles auprès des étudiants.
  BC-4750.50.30:
    name: Analyse des retours et clôture de la boucle
    description: |
      Analyse des retours et communication visible des actions menées auprès des étudiants.
  BC-4750.60:
    name: Amélioration continue et suivi des actions
    description: |
      Identification, planification et suivi des actions d'amélioration de la qualité
      issues des révisions, accréditations et retours des étudiants.
    in_scope:
      - Planification des actions d'amélioration
      - Suivi de la mise en œuvre des actions
      - Référentiel de leçons apprises
    out_of_scope:
      - Méthodes génériques d'amélioration des processus (couvertes par la Gestion de la qualité – transverse)
  BC-4750.60.10:
    name: Planification des actions d'amélioration
    description: |
      Planification des actions d'amélioration de la qualité académique.
  BC-4750.60.20:
    name: Suivi de la mise en œuvre des actions
    description: |
      Suivi de l'avancement et de l'efficacité des actions qualité.
  BC-4750.60.30:
    name: Référentiel de leçons apprises
    description: |
      Capitalisation des leçons apprises issues des révisions qualité et des cycles d'accréditation.

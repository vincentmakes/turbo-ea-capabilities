locale: fr
source: L1-corporate-governance.yaml
entries:
  BC-110:
    name: Gouvernance d'entreprise
    description: |
      Processus de gouvernance du conseil d'administration, des comités et des actionnaires.
  BC-110.10:
    name: Gestion du conseil d'administration et des comités
    description: |
      Composition du conseil, réunions, comités et documentation.
  BC-110.10.10:
    name: Gestion de la composition du conseil d'administration
    description: |
      Nomination des administrateurs, succession, indépendance et matrice des compétences.
  BC-110.10.20:
    name: Administration des réunions du conseil d'administration
    description: |
      Ordres du jour, documents, procès-verbaux et résolutions des réunions du conseil.
  BC-110.10.30:
    name: Opérations des comités
    description: |
      Fonctionnement des comités d'audit, des risques, de rémunération et des nominations.
  BC-110.10.40:
    name: Intégration et formation des administrateurs
    description: |
      Induction, formation continue et évaluations de l'efficacité du conseil.
  BC-110.20:
    name: Gestion des actionnaires et des capitaux propres
    description: |
      Structure des capitaux propres, registre des actionnaires et droits des actionnaires.
  BC-110.20.10:
    name: Tenue du registre des actionnaires
    description: |
      Maintenance du registre des membres et des enregistrements de propriété effective.
  BC-110.20.20:
    name: Gestion des assemblées d'actionnaires
    description: |
      Convocation, avis, vote et résolutions des assemblées générales ordinaires et extraordinaires.
  BC-110.20.30:
    name: Administration des dividendes et distributions
    description: |
      Déclarations de dividendes, paiements et distributions de capital.
  BC-110.20.40:
    name: Gestion de la structure du capital
    description: |
      Classes d'actions, augmentations de capital, rachats et divisions d'actions.
  BC-110.30:
    name: Gestion du secrétariat social
    description: |
      Dépôts légaux, registres sociaux et formalités d'entreprise.
  BC-110.30.10:
    name: Administration des dépôts légaux
    description: |
      Dépôts auprès des registres du commerce et des autorités compétentes.
  BC-110.30.20:
    name: Gestion des registres sociaux
    description: |
      Tenue des livres statutaires, registres et archives sociales.
  BC-110.30.30:
    name: Administration des résolutions sociales
    description: |
      Rédaction, exécution et enregistrement des résolutions du conseil et des actionnaires.
  BC-110.40:
    name: Gestion des filiales et des entités
    description: |
      Structure juridique des entités et gouvernance au sein du groupe.
  BC-110.40.10:
    name: Gestion du cycle de vie des entités juridiques
    description: |
      Constitution, restructuration, mise en sommeil et liquidation des entités.
  BC-110.40.20:
    name: Gouvernance de la structure du groupe
    description: |
      Maintenance et supervision de l'organigramme juridique et des chaînes de détention.
  BC-110.40.30:
    name: Normes de gouvernance des filiales
    description: |
      Normes de gouvernance applicables à l'ensemble des filiales du groupe.
  BC-110.40.40:
    name: Conformité des entités transfrontalières
    description: |
      Conformité statutaire et de gouvernance d'entreprise pour les filiales étrangères.
  BC-110.50:
    name: Gestion des délégations et des pouvoirs
    description: |
      Matrices de délégation, pouvoirs et droits de signature.
  BC-110.50.10:
    name: Cadre de délégation de pouvoirs
    description: |
      Niveaux de délégation, seuils d'approbation et hiérarchies de délégation.
  BC-110.50.20:
    name: Administration des pouvoirs de signature
    description: |
      Listes de signataires autorisés, procurations et mandats bancaires.
  BC-110.50.30:
    name: Surveillance de la conformité aux délégations
    description: |
      Contrôle des décisions prises dans les limites des délégations accordées.

locale: fr
source: L1-facilities-management.yaml
entries:
  BC-700:
    name: Gestion des installations
    description: |
      Services aux bâtiments, milieu de travail, services généraux techniques et non techniques.
  BC-700.10:
    name: Gestion des services du milieu de travail
    description: |
      Accueil, courrier et services d'expérience en milieu de travail.
  BC-700.10.10:
    name: Accueil et gestion des visiteurs
    description: |
      Pré-enregistrement des visiteurs, accueil et contrôle d'accès.
  BC-700.10.20:
    name: Services de courrier et de distribution
    description: |
      Courrier entrant et sortant, colis et distribution interne.
  BC-700.10.30:
    name: Conciergerie et assistance du milieu de travail
    description: |
      Conciergerie, assistance et traitement des demandes de services en milieu de travail.
  BC-700.10.40:
    name: Services de salles de réunion et d'événements
    description: |
      Réservation de salles de réunion, configuration audiovisuelle et support événementiel.
  BC-700.20:
    name: Gestion technique des installations
    description: |
      Systèmes du bâtiment — CVC, électricité, plomberie, structure.
  BC-700.20.10:
    name: Opérations des systèmes CVC
    description: |
      Exploitation et maintenance des systèmes de chauffage, ventilation et climatisation.
  BC-700.20.20:
    name: Opérations des systèmes électriques
    description: |
      Exploitation et maintenance des installations électriques du bâtiment.
  BC-700.20.30:
    name: Opérations mécaniques et de plomberie
    description: |
      Opérations des systèmes mécaniques, de plomberie et d'eau.
  BC-700.20.40:
    name: Maintenance du clos et du couvert
    description: |
      Maintenance du clos, de la structure et de l'enveloppe du bâtiment.
  BC-700.20.50:
    name: Gestion énergétique du bâtiment
    description: |
      Suivi et optimisation de la consommation énergétique du bâtiment.
  BC-700.30:
    name: Gestion non technique des installations
    description: |
      Nettoyage, restauration, sécurité et espaces verts.
  BC-700.30.10:
    name: Services de nettoyage
    description: |
      Nettoyage quotidien, grand nettoyage et services d'hygiène.
  BC-700.30.20:
    name: Services de restauration et d'alimentation
    description: |
      Restauration en milieu de travail, distributeurs automatiques et services d'hôtellerie.
  BC-700.30.30:
    name: Opérations de sécurité physique
    description: |
      Gardiennage, rondes, vidéosurveillance et contrôle d'accès physique.
  BC-700.30.40:
    name: Espaces verts et aménagement paysager
    description: |
      Entretien des espaces verts, aménagement paysager et espaces extérieurs.
  BC-700.30.50:
    name: Services de gestion des déchets
    description: |
      Collecte, tri et recyclage des déchets sur les sites.
  BC-700.40:
    name: Gestion de l'espace
    description: |
      Planification des espaces, gestion de l'occupation et déménagements.
  BC-700.40.10:
    name: Planification des espaces
    description: |
      Planification, allocation et plan de répartition des espaces.
  BC-700.40.20:
    name: Suivi de l'occupation
    description: |
      Capteurs d'occupation, analytique de l'utilisation et prévisions.
  BC-700.40.30:
    name: Gestion des déménagements
    description: |
      Planification et exécution des déménagements, ajouts et modifications.
  BC-700.40.40:
    name: Réservation de postes de travail et flex office
    description: |
      Plateformes de réservation de postes et opérations en milieu de travail hybride.
  BC-700.50:
    name: Gestion de la santé et de la sécurité des installations
    description: |
      Sécurité des bâtiments, incendie et systèmes d'urgence.
  BC-700.50.10:
    name: Gestion de la sécurité incendie
    description: |
      Détection d'incendie, extinction et exercices d'évacuation.
  BC-700.50.20:
    name: Coordination des interventions d'urgence
    description: |
      Intervention d'urgence sur site et coordination des premiers secours.
  BC-700.50.30:
    name: Gestion des permis de travail
    description: |
      Gouvernance des permis de travail pour les tâches dangereuses en installations.
  BC-700.50.40:
    name: Conformité réglementaire du bâtiment
    description: |
      Inspections réglementaires et certifications pour la sécurité des bâtiments.

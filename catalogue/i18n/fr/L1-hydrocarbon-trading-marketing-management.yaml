locale: fr
source: L1-hydrocarbon-trading-marketing-management.yaml
entries:
  BC-3090:
    name: Gestion du commerce et de la commercialisation des hydrocarbures
    description: |
      Commerce physique et sur papier du pétrole brut, des produits raffinés, du gaz naturel
      et du GNL ; gestion du risque sur les matières premières ; règlement et conformité des
      transactions ; commercialisation à terme ; et affrètement pour le négoce.
  BC-3090.10:
    name: Opérations de négoce physique
    description: |
      Desks de négoce physique pour le pétrole brut, les produits raffinés, le gaz naturel et le GNL.
  BC-3090.10.10:
    name: Négoce de pétrole brut
    description: |
      Négoce physique de grades de pétrole brut sur les marchés régionaux.
  BC-3090.10.20:
    name: Négoce de produits raffinés
    description: |
      Négoce physique d'essence, de distillats, de carburant aviation, de fuel et de LGN.
  BC-3090.10.30:
    name: Négoce de gaz naturel
    description: |
      Négoce physique de gaz naturel en pipeline entre les hubs.
  BC-3090.10.40:
    name: Négoce de GNL
    description: |
      Négoce physique de cargaisons GNL incluant les opérations de déroutement et de rechargement.
  BC-3090.20:
    name: Négoce de dérivés et sur papier
    description: |
      Négoce de dérivés cotés en bourse et de gré à gré pour la couverture et le positionnement propriétaire.
  BC-3090.20.10:
    name: Négoce de futures et d'options
    description: |
      Négoce de futures et d'options listés en bourse sur les matières premières énergétiques.
  BC-3090.20.20:
    name: Swaps et opérations de couverture
    description: |
      Négoce de swaps OTC pour la couverture de prix et de base.
  BC-3090.20.30:
    name: Gestion de l'exposition aux indices de matières premières
    description: |
      Gestion de l'exposition aux instruments indexés sur les matières premières.
  BC-3090.30:
    name: Gestion du risque de négoce
    description: |
      Gestion du risque de position, du risque de crédit des contreparties et de la VaR
      sur matières premières dans les activités de négoce.
  BC-3090.30.10:
    name: Gestion du risque de position
    description: |
      Surveillance des positions par rapport aux mandats et limites de négoce approuvés.
  BC-3090.30.20:
    name: Valorisation au prix de marché
    description: |
      Valorisation quotidienne au prix de marché des positions et des courbes de négoce.
  BC-3090.30.30:
    name: Gestion du risque de crédit des contreparties
    description: |
      Fixation des limites de crédit des contreparties et suivi de l'exposition spécifique au négoce.
  BC-3090.30.40:
    name: Calcul de la VaR sur matières premières
    description: |
      Calcul de la valeur à risque et des scénarios de stress pour les portefeuilles de matières premières.
  BC-3090.40:
    name: Confirmation et règlement des transactions
    description: |
      Saisie, confirmation et règlement post-transaction avec réconciliation.
  BC-3090.40.10:
    name: Saisie des transactions
    description: |
      Saisie des transactions exécutées depuis le front office dans les systèmes de négoce.
  BC-3090.40.20:
    name: Confirmation des transactions
    description: |
      Émission et réconciliation des confirmations de transactions avec les contreparties.
  BC-3090.40.30:
    name: Règlement des transactions
    description: |
      Règlement en espèces et en physique des transactions jusqu'à l'échéance.
  BC-3090.40.40:
    name: Réconciliation des transactions
    description: |
      Réconciliation des transactions par rapport aux enregistrements des courtiers, bourses et contreparties.
  BC-3090.50:
    name: Gestion de la conformité du négoce
    description: |
      Contrôle des sanctions, surveillance de la conduite sur les marchés et reporting réglementaire
      pour les activités de négoce d'énergie.
  BC-3090.50.10:
    name: Contrôle des sanctions
    description: |
      Contrôle des sanctions pre-transaction et post-transaction sur les contreparties et les cargaisons.
  BC-3090.50.20:
    name: Surveillance de la conduite sur les marchés
    description: |
      Surveillance de la conduite de négoce par rapport aux normes d'abus de marché (REMIT, Dodd-Frank).
  BC-3090.50.30:
    name: Reporting réglementaire des transactions
    description: |
      Déclaration des transactions aux régulateurs conformément à REMIT, EMIR et Dodd-Frank.
  BC-3090.60:
    name: Gestion de la commercialisation et des contrats à terme
    description: |
      Gestion des contrats de vente à terme et des programmes d'enlèvement avec les clients.
  BC-3090.60.10:
    name: Négociation de contrats à terme
    description: |
      Négociation de contrats de vente à terme avec les raffineurs et les services publics.
  BC-3090.60.20:
    name: Gestion des programmes d'enlèvement
    description: |
      Gestion des programmes d'enlèvement mensuels et trimestriels par rapport aux contrats à terme.
  BC-3090.60.30:
    name: Gestion des allocations clients
    description: |
      Allocation de l'approvisionnement contraint entre les clients à terme et spot.
  BC-3090.70:
    name: Affrètement pour le négoce
    description: |
      Affrètement au voyage et à temps, et gestion des surestaries en soutien des positions de négoce.
  BC-3090.70.10:
    name: Affrètement au voyage
    description: |
      Affrètement au voyage de pétroliers et de transporteurs de gaz pour les cargaisons de négoce.
  BC-3090.70.20:
    name: Affrètement à temps
    description: |
      Affrètement à temps et optimisation du positionnement des navires.
  BC-3090.70.30:
    name: Gestion des surestaries et du temps d'arrêt
    description: |
      Calcul et règlement des réclamations de surestaries et de temps d'arrêt.

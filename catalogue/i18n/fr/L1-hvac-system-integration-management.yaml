locale: fr
source: L1-hvac-system-integration-management.yaml
entries:
  BC-2020:
    name: Gestion de l'intégration des systèmes HVAC
    description: |
      Ingénierie au niveau projet des solutions HVAC et GTB intégrées pour un bâtiment spécifique
      — calcul des charges, sélection des équipements, conception schématique, liste de points GTB
      et architecture, rédaction des séquences d'opération, coordination BIM/CVC, spécifications
      de projet, gestion des soumissions et support d'ingénierie sur le terrain.
    in_scope:
      - Calculs de charges et sélection d'équipements spécifiques au bâtiment
      - Conception schématique des systèmes mécaniques, hydroniques et frigorigènes à l'échelle projet
      - Listes de points GTB, topologie réseau et agencement des armoires pour les projets
      - Rédaction des séquences d'opération spécifiques au projet
      - Coordination BIM, spécifications de projet et gestion des soumissions
    out_of_scope:
      - Ingénierie des produits équipements (BC-2000) et ingénierie des produits GTB (BC-2010)
      - Pratique MEP interdiciplinaire (BC-1100)
      - Prestation de services de mise en service (BC-2050)
      - Gestion générique des projets d'ingénierie (BC-1110)
  BC-2020.10:
    name: Dimensionnement et sélection HVAC du bâtiment
    description: |
      Dimensionnement des charges et sélection des équipements HVAC pour répondre à l'intention de conception du projet.
  BC-2020.10.10:
    name: Calcul des charges de refroidissement et de chauffage
    description: |
      Calcul des charges de refroidissement et de chauffage du bâtiment.
  BC-2020.10.20:
    name: Sélection des équipements et planning
    description: |
      Sélection des modèles d'équipements en fonction des charges calculées et des plannings.
  BC-2020.10.30:
    name: Dimensionnement des boucles hydroniques
    description: |
      Dimensionnement des boucles hydroniques, pompes et diamètres de tuyauteries.
  BC-2020.10.40:
    name: Dimensionnement des gaines et analyse des pertes de charge
    description: |
      Dimensionnement des gaines et analyse des pertes de charge du système.
  BC-2020.10.50:
    name: Simulation énergétique pour la sélection
    description: |
      Simulation énergétique à l'appui des arbitrages de sélection des équipements.
  BC-2020.20:
    name: Conception schématique des systèmes HVAC
    description: |
      Conception schématique des systèmes mécaniques, hydroniques et frigorigènes intégrés.
  BC-2020.20.10:
    name: Conception schématique mécanique
    description: |
      Conception schématique des systèmes mécaniques côté air.
  BC-2020.20.20:
    name: Conception schématique hydronique
    description: |
      Conception schématique des boucles d'eau glacée, d'eau chaude et d'eau de condenseur.
  BC-2020.20.30:
    name: Conception schématique de la tuyauterie frigorigène
    description: |
      Conception schématique de la tuyauterie frigorigène pour les systèmes VRF et split.
  BC-2020.20.40:
    name: Conception du schéma de contrôle unifilaire
    description: |
      Schémas unifilaires représentant la superposition de régulation GTB sur les systèmes mécaniques.
  BC-2020.30:
    name: Liste de points GTB et conception de l'architecture
    description: |
      Listes de points spécifiques au projet, topologie réseau GTB et allocation des armoires.
  BC-2020.30.10:
    name: Rédaction de la liste de points
    description: |
      Rédaction des listes de points GTB spécifiques au projet.
  BC-2020.30.20:
    name: Conception de la topologie réseau GTB
    description: |
      Conception de la topologie réseau GTB et de la segmentation pour le projet.
  BC-2020.30.30:
    name: Allocation des contrôleurs et agencement des armoires
    description: |
      Allocation des contrôleurs et conception des armoires de régulation pour le projet.
  BC-2020.30.40:
    name: Application des conventions de nommage et de taguage
    description: |
      Application des conventions de nommage et de taguage aux points et actifs du projet.
  BC-2020.40:
    name: Rédaction des séquences d'opération

  BC-2020.40.10:
    name: Rédaction des séquences de zone
    description: |
      Rédaction des séquences de régulation au niveau zone du projet.
  BC-2020.40.20:
    name: Rédaction des séquences de centrale
    description: |
      Rédaction des séquences de régulation de la centrale du projet.
  BC-2020.40.30:
    name: Rédaction des stratégies d'économies d'énergie
    description: |

locale: fr
source: L1-property-management-operations.yaml
entries:
  BC-4940:
    name: Opérations de gestion immobilière
    description: |
      Exploitation côté propriétaire et gestionnaire d'immeubles commerciaux, de
      commerce et résidentiels multi-familles — services techniques, gestion des
      prestataires et des marchés, ordres de travaux, services aux locataires pendant
      l'occupation, sécurité et protection des personnes, énergie et durabilité, et
      comptabilité immobilière incluant la réconciliation des charges communes. Distinct
      des opérations hôtelières (BC-4060) et des locaux d'entreprise occupés par leur
      propriétaire (BC-700).
    in_scope:
      - Opérations quotidiennes de l'immeuble incluant GTB et parties communes
      - Maintenance préventive, réactive et réglementaire
      - Gestion des prestataires et des marchés de services (nettoyage, sécurité, espaces verts)
      - Coordination des entrées/sorties de locataires et des travaux d'aménagement
      - Sécurité du bien, protection incendie/personnes et gestion des incidents
      - Énergie, eau, déchets et environnement intérieur du bien
      - Comptabilité immobilière, facturation locataire et reporting d'exploitation
      - Réconciliation des charges communes et des charges de service
    out_of_scope:
      - Opérations hôtelières et resort (BC-4060)
      - Locaux d'entreprise occupés par leur propriétaire (BC-700)
      - Plans d'affaires d'actifs en exploitation et stratégie d'investissement (BC-4920)
      - Acquisition de locataires et exécution des baux (BC-4950)
  BC-4940.10:
    name: Gestion des opérations de l'immeuble
    description: |
      Exploitation au quotidien des services techniques, des systèmes de gestion
      technique du bâtiment (GTB), des parties communes, de l'accueil et des
      horaires d'exploitation des actifs commerciaux, de commerce et résidentiels.
  BC-4940.10.10:
    name: Opérations des parties communes
    description: |
      Exploitation des parties communes incluant halls d'entrée, circulations et
      équipements collectifs.
  BC-4940.10.20:
    name: Opérations des systèmes de gestion technique du bâtiment
    description: |
      Exploitation des systèmes GTB incluant CVC, éclairage et contrôles d'accès.
  BC-4940.10.30:
    name: Accueil et contrôle d'accès du bien
    description: |
      Accueil, conciergerie et opérations de contrôle d'accès pour les locataires
      et visiteurs du bien.
  BC-4940.10.40:
    name: Gestion des horaires et des plannings d'exploitation
    description: |
      Gestion des horaires d'exploitation, des demandes hors horaires et des
      plannings de jours fériés.
  BC-4940.20:
    name: Maintenance du bien et gestion des ordres de travaux
    description: |
      Maintenance préventive, réactive et réglementaire des systèmes de l'immeuble
      et des équipements locatifs à travers des workflows d'ordres de travaux.
  BC-4940.20.10:
    name: Opérations de maintenance préventive
    description: |
      Mise en œuvre de la maintenance préventive selon le planning et les données
      d'état des équipements.
  BC-4940.20.20:
    name: Maintenance réactive et ordres de travaux
    description: |
      Traitement des maintenances réactives déclenchées par les demandes des
      locataires et les résultats d'inspections.
  BC-4940.20.30:
    name: Inspections réglementaires et de conformité
    description: |
      Inspections réglementaires et de conformité couvrant les ascenseurs, les
      systèmes incendie, le gaz et les systèmes sous pression.
  BC-4940.20.40:
    name: Reporting de maintenance
    description: |
      Reporting de l'activité de maintenance, du carnet d'ordres et de la performance
      des SLA aux propriétaires et locataires.
  BC-4940.30:
    name: Gestion des prestataires et marchés de services du bien
    description: |
      Intégration et gestion des prestataires de services et des marchés au niveau
      du bien pour le nettoyage, la sécurité, les espaces verts et l'approvisionnement
      en énergie.
  BC-4940.30.10:
    name: Intégration des marchés de services
    description: |
      Intégration des marchés de services et des prestataires au niveau du bien.
  BC-4940.30.20:
    name: Gestion de la performance des prestataires
    description: |
      Gestion de la performance des prestataires du bien selon les SLA et KPI.
  BC-4940.30.30:
    name: Définition des spécifications de service et des SLA
    description: |
      Définition des spécifications de service, des périmètres et des SLA pour
      les services externalisés du bien.
  BC-4940.40:
    name: Services aux locataires et coordination des déménagements
    description: |
      Coordination de l'intégration des locataires, des entrées/sorties dans les
      lieux, des travaux d'aménagement et du traitement des demandes de services
      pendant l'occupation.
  BC-4940.40.10:
    name: Coordination de l'entrée du locataire dans les lieux
    description: |
      Coordination de l'entrée du locataire dans les lieux incluant les accès, la
      signalétique et l'orientation.
  BC-4940.40.20:
    name: Coordination des travaux d'aménagement du locataire
    description: |
      Coordination des travaux d'aménagement du locataire, des accès des entreprises
      et des autorisations du bailleur.
  BC-4940.40.30:
    name: Sortie du locataire et remise en état
    description: |
      Coordination de la sortie du locataire et de la remise en état des surfaces
      louées.
  BC-4940.40.40:
    name: Traitement des demandes de services des locataires
    description: |
      Traitement des demandes de services des locataires pendant l'occupation sur
      tous les canaux.
  BC-4940.50:
    name: Opérations de sécurité et de protection des personnes
    description: |
      Opérations de surveillance, de systèmes incendie et de sécurité, de réponse
      aux incidents et d'évacuation d'urgence dans le bien.
  BC-4940.50.10:
    name: Opérations de surveillance du bien
    description: |
      Exploitation de la vidéosurveillance dans les parties communes et les zones
      de service.
  BC-4940.50.20:
    name: Opérations des systèmes incendie et de sécurité
    description: |
      Exploitation des systèmes de détection incendie, de suppression et de
      sécurité des personnes incluant les exercices.
  BC-4940.50.30:
    name: Réponse aux incidents du bien
    description: |
      Réponse aux incidents au niveau du bien couvrant la sécurité, le vol et
      les événements de sécurité.
  BC-4940.50.40:
    name: Opérations d'évacuation d'urgence
    description: |
      Exécution des plans d'évacuation d'urgence et commandement des incidents
      dans le bien.
  BC-4940.60:
    name: Opérations énergétiques et de durabilité du bien
    description: |
      Exploitation au niveau du bien des programmes d'énergie, d'eau, de déchets,
      d'environnement intérieur et de sous-comptage des locataires.
  BC-4940.60.10:
    name: Opérations énergétiques du bien
    description: |
      Exploitation des systèmes énergétiques du bien et suivi de la consommation
      par rapport aux objectifs.
  BC-4940.60.20:
    name: Opérations eau et déchets
    description: |
      Exploitation des programmes de gestion de l'eau, des eaux usées et de
      tri des déchets du bien.
  BC-4940.60.30:
    name: Opérations de qualité de l'environnement intérieur
    description: |
      Exploitation des programmes de qualité de l'air intérieur, d'éclairage et
      de confort acoustique.
  BC-4940.60.40:
    name: Sous-comptage et allocation aux locataires
    description: |
      Exploitation du sous-comptage et de l'allocation de la consommation d'énergie
      aux locataires.
  BC-4940.70:
    name: Comptabilité immobilière et reporting d'exploitation
    description: |
      Grand livre au niveau du bien, facturation et créances locataires, charges
      à payer et reporting propriétaire.
  BC-4940.70.10:
    name: Opérations du grand livre immobilier
    description: |
      Exploitation du grand livre et de la balance de vérification au niveau du bien.
  BC-4940.70.20:
    name: Facturation et créances locataires
    description: |
      Facturation des loyers, récupérations et charges accessoires et encaissement
      des créances.
  BC-4940.70.30:
    name: Opérations des charges à payer du bien
    description: |
      Comptes fournisseurs au niveau du bien pour les énergies, prestataires et
      entreprises.
  BC-4940.70.40:
    name: Rapport de gestion propriétaire
    description: |
      Rapports de gestion périodiques pour le propriétaire couvrant la performance
      d'exploitation et les écarts.
  BC-4940.80:
    name: Réconciliation des charges communes
    description: |
      Cycle comptable spécifique bailleur-locataire couvrant la budgétisation, la
      capture, la réconciliation et la réponse aux audits des charges communes et
      de service.
  BC-4940.80.10:
    name: Établissement du budget et des provisions pour charges communes
    description: |
      Établissement des budgets de charges communes et de service et des provisions
      locataires pour l'exercice.
  BC-4940.80.20:
    name: Capture des dépenses réelles de charges communes
    description: |
      Capture des dépenses réelles remboursables dans le périmètre des charges communes
      et de service.
  BC-4940.80.30:
    name: Réconciliation et règlement des charges communes
    description: |
      Réconciliation des charges communes réelles par rapport aux provisions et
      règlement des régularisations avec les locataires.
  BC-4940.80.40:
    name: Réponse aux audits de charges communes des locataires
    description: |
      Réponse aux demandes d'audit et d'inspection des locataires sur les charges
      communes et les droits contractuels de service.

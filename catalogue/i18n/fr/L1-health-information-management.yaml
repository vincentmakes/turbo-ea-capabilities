locale: fr
source: L1-health-information-management.yaml
entries:
  BC-2900:
    name: Gestion de l'information de santé
    description: |
      Index maître patient, opérations de codification, communication des informations de santé, cycle de vie du dossier médical, soumissions aux registres cliniques et opérations d'interopérabilité de santé pour l'organisation prestataire.
  BC-2900.10:
    name: Gestion de l'index maître patient
    description: |
      Administration de l'index maître patient et résolution des doublons et des enregistrements superposés.
  BC-2900.10.10:
    name: Administration de l'index maître patient
    description: |
      Administration quotidienne de l'index maître patient d'entreprise.
  BC-2900.10.20:
    name: Résolution des doublons
    description: |
      Identification et résolution des doublons et des enregistrements patients superposés.
  BC-2900.10.30:
    name: Algorithmes de rapprochement des patients
    description: |
      Configuration et ajustement des algorithmes de rapprochement des patients.
  BC-2900.10.40:
    name: Référencement croisé des identités
    description: |
      Référencement croisé des identités des patients entre les organisations affiliées et les échanges.
  BC-2900.20:
    name: Opérations de codification
    description: |
      Opérations de codification en production pour les séjours hospitaliers et les consultations ambulatoires, incluant l'audit et la gestion des retards.
  BC-2900.20.10:
    name: Production de la codification hospitalière
    description: |
      Flux de travail et attribution de la codification hospitalière côté production.
  BC-2900.20.20:
    name: Production de la codification ambulatoire
    description: |
      Flux de travail de codification ambulatoire côté production.
  BC-2900.20.30:
    name: Gestion du retard de codification
    description: |
      Gestion des séjours sortis non facturés définitivement et des retards de codification.
  BC-2900.20.40:
    name: Audit des codificateurs
    description: |
      Audit interne de la précision des codificateurs et retour d'information.
  BC-2900.30:
    name: Communication des informations de santé
    description: |
      Réception, validation et traitement des demandes d'informations de santé protégées.
  BC-2900.30.10:
    name: Réception des demandes d'information
    description: |
      Réception des demandes d'information de santé émanant des patients, des payeurs, des juristes et des prestataires.
  BC-2900.30.20:
    name: Validation des autorisations
    description: |
      Validation des autorisations et des divulgations permises au titre des réglementations sur la confidentialité.
  BC-2900.30.30:
    name: Suivi des divulgations
    description: |
      Suivi des divulgations d'informations de santé protégées à des fins de comptabilisation.
  BC-2900.30.40:
    name: Traitement des assignations et demandes judiciaires
    description: |
      Traitement des assignations à comparaître, des ordonnances judiciaires et des demandes de dossiers à des fins légales.
  BC-2900.40:
    name: Cycle de vie du dossier médical
    description: |
      Gestion du cycle de vie des dossiers médicaux de leur création à leur conservation et destruction.
  BC-2900.40.10:
    name: Clôture des consultations
    description: |
      Vérification et suivi des conditions préalables à la clôture des consultations.
  BC-2900.40.20:
    name: Suivi de la complétion des dossiers
    description: |
      Suivi des dossiers en retard de complétion et relance des soignants.
  BC-2900.40.30:
    name: Planification de la conservation des dossiers
    description: |
      Planification de la conservation des dossiers médicaux conformément aux exigences réglementaires.
  BC-2900.40.40:
    name: Destruction des dossiers
    description: |
      Destruction autorisée des dossiers médicaux à l'issue de la période de conservation.
  BC-2900.50:
    name: Registres cliniques et soumissions
    description: |
      Soumissions aux registres des maladies, du cancer, des traumatismes et de la qualité.
  BC-2900.50.10:
    name: Soumission aux registres des maladies
    description: |
      Soumission aux registres de santé publique et de maladies.
  BC-2900.50.20:
    name: Opérations du registre du cancer
    description: |
      Opérations d'abstraction et de soumission au registre du cancer.
  BC-2900.50.30:
    name: Opérations du registre des traumatismes
    description: |
      Opérations d'abstraction et de soumission au registre des traumatismes.
  BC-2900.50.40:
    name: Soumission aux registres de qualité
    description: |
      Soumission aux registres de qualité de spécialité soutenant la recherche clinique et l'étalonnage.
  BC-2900.60:
    name: Opérations d'interopérabilité de santé
    description: |
      Exploitation des connexions d'échange d'informations de santé, des points de terminaison FHIR, du partage de données à l'initiative du patient et du répertoire des prestataires.
  BC-2900.60.10:
    name: Opérations d'échange d'informations de santé
    description: |
      Exploitation des connexions entrantes et sortantes d'échange d'informations de santé.
  BC-2900.60.20:
    name: Gestion des points de terminaison FHIR
    description: |
      Gestion des points de terminaison FHIR pour l'intégration des applications et des partenaires.
  BC-2900.60.30:
    name: Partage de données à l'initiative du patient
    description: |
      Partage dirigé par le patient de ses informations de santé avec des applications tierces.
  BC-2900.60.40:
    name: Maintenance du répertoire des prestataires
    description: |
      Maintenance des données du répertoire des prestataires pour les consommateurs internes et externes.

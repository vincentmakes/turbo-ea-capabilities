locale: fr
source: L1-customer-service-management.yaml
entries:
  BC-430:
    name: Gestion du service client
    description: |
      Demandes, réclamations, assistance et opérations des centres de contact.
  BC-430.10:
    name: Gestion des demandes clients
    description: |
      Contacts entrants, orientation et résolution.
  BC-430.10.10:
    name: Réception et orientation des demandes
    description: |
      Réception multicanal, classification et orientation des demandes.
  BC-430.10.20:
    name: Gestion des dossiers
    description: |
      Création, attribution et suivi de la résolution des dossiers.
  BC-430.10.30:
    name: Traitement des demandes de service
    description: |
      Traitement des demandes de service standard et modifications de compte.
  BC-430.10.40:
    name: Gestion de l'escalade
    description: |
      Chemins d'escalade, règles de sévérité et gestion des dossiers escaladés.
  BC-430.20:
    name: Gestion des réclamations et des problèmes
    description: |
      Capture, analyse des causes racines et résolution des réclamations.
  BC-430.20.10:
    name: Capture et accusé de réception des réclamations
    description: |
      Capture, accusé de réception et triage des réclamations clients.
  BC-430.20.20:
    name: Investigation et résolution des réclamations
    description: |
      Investigation, réparation et résolution des réclamations clients.
  BC-430.20.30:
    name: Analyse des causes racines
    description: |
      Analyse des causes racines et identification des tendances sur l'ensemble des réclamations.
  BC-430.20.40:
    name: Reporting réglementaire des réclamations
    description: |
      Reporting réglementaire des réclamations et traitement des dossiers auprès du médiateur.
  BC-430.30:
    name: Gestion des opérations du centre de contact
    description: |
      Pilotage du centre de contact, gestion des effectifs et téléphonie.
  BC-430.30.10:
    name: Gestion des effectifs du centre de contact
    description: |
      Prévisions, planification et respect des plannings dans les opérations du centre de contact.
  BC-430.30.20:
    name: Orientation des contacts et SVI
    description: |
      Conception du SVI, orientation par compétences et orchestration multicanal.
  BC-430.30.30:
    name: Surveillance de la qualité et coaching
    description: |
      Surveillance de la qualité des appels, scoring et coaching des agents.
  BC-430.30.40:
    name: Reporting de performance du centre de contact
    description: |
      Reporting des niveaux de service, du DMT, du taux de résolution au premier contact et de la performance opérationnelle.
  BC-430.40:
    name: Gestion du libre-service
    description: |
      FAQ, base de connaissances, chatbots et portails en libre-service.
  BC-430.40.10:
    name: Gestion de la base de connaissances
    description: |
      Rédaction et maintenance du contenu de connaissance destiné aux clients.
  BC-430.40.20:
    name: Gestion du portail en libre-service
    description: |
      Portails clients en libre-service et fonctionnalités de gestion de compte.
  BC-430.40.30:
    name: Gestion de l'IA conversationnelle
    description: |
      Conception, entraînement et opérations des chatbots et voicebots.
  BC-430.40.40:
    name: Gestion de l'assistance communautaire
    description: |
      Modération de la communauté d'utilisateurs et assistance entre pairs.
  BC-430.50:
    name: Gestion des retours clients
    description: |
      Enquêtes, NPS et programmes voix du client.
  BC-430.50.10:
    name: Programme voix du client
    description: |
      Programme structuré de voix du client sur l'ensemble des points de contact.
  BC-430.50.20:
    name: Gestion des enquêtes clients
    description: |
      Conception, diffusion et analyse des enquêtes NPS, CSAT et CES.
  BC-430.50.30:
    name: Boucle de retour fermée
    description: |
      Suivi des retours négatifs et actions de récupération auprès des clients détracteurs.
  BC-430.50.40:
    name: Reporting des insights clients
    description: |
      Reporting des insights clients vers les équipes produit, opérations et direction.

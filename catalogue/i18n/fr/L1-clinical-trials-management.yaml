locale: fr
source: L1-clinical-trials-management.yaml
entries:
  BC-1520:
    name: Gestion des essais cliniques
    description: |
      Planification, exécution et suivi des études cliniques.
  BC-1520.10:
    name: Gestion de la conception des essais cliniques
    description: |
      Conception du protocole, méthodologie statistique et critères d'évaluation.
  BC-1520.10.10:
    name: Rédaction du protocole clinique
    description: |
      Rédaction des protocoles d'études cliniques.
  BC-1520.10.20:
    name: Définition du plan d'analyse statistique
    description: |
      Définition de la méthodologie statistique et du plan d'analyse.
  BC-1520.10.30:
    name: Définition des critères d'évaluation
    description: |
      Définition des critères d'évaluation principaux, secondaires et exploratoires.
  BC-1520.10.40:
    name: Gestion de la conception adaptative
    description: |
      Conception des essais adaptatifs et des plateformes d'essais.
  BC-1520.20:
    name: Gestion des sites d'essais cliniques
    description: |
      Sélection, activation et supervision des sites.
  BC-1520.20.10:
    name: Identification et faisabilité des sites
    description: |
      Identification et évaluation de la faisabilité des sites investigateurs.
  BC-1520.20.20:
    name: Activation des sites
    description: |
      Activation des sites incluant les aspects éthiques, réglementaires et contractuels.
  BC-1520.20.30:
    name: Formation des investigateurs et des sites
    description: |
      Dispensation de la formation aux investigateurs et aux équipes des sites.
  BC-1520.20.40:
    name: Gestion des performances des sites
    description: |
      Suivi et remédiation des performances des sites.
  BC-1520.30:
    name: Gestion des sujets d'essais cliniques
    description: |
      Recrutement, sélection, fidélisation et consentement éclairé.
  BC-1520.30.10:
    name: Recrutement des sujets
    description: |
      Recrutement des sujets incluant les canaux de recrutement numériques.
  BC-1520.30.20:
    name: Gestion du consentement éclairé
    description: |
      Collecte du consentement éclairé et consentement électronique.
  BC-1520.30.30:
    name: Sélection et inclusion des sujets
    description: |
      Sélection et inclusion selon les critères d'inclusion/exclusion.
  BC-1520.30.40:
    name: Fidélisation des sujets
    description: |
      Stratégies de fidélisation et d'engagement des patients.
  BC-1520.40:
    name: Gestion des données cliniques
    description: |
      EDC, collecte des données, gestion des requêtes et verrouillage de la base.
  BC-1520.40.10:
    name: Gestion de l'EDC et des cahiers d'observation
    description: |
      Système de collecte électronique des données et conception des cahiers d'observation.
  BC-1520.40.20:
    name: Gestion des requêtes de données cliniques
    description: |
      Génération, résolution et nettoyage des requêtes.
  BC-1520.40.30:
    name: Standardisation des données cliniques
    description: |
      Standardisation des données selon CDISC SDTM/ADaM.
  BC-1520.40.40:
    name: Verrouillage et archivage de la base de données
    description: |
      Verrouillage de la base, archivage et préparation du dossier de soumission.
  BC-1520.50:
    name: Gestion du monitoring des essais cliniques
    description: |
      Monitoring sur site, monitoring fondé sur le risque et audits.
  BC-1520.50.10:
    name: Monitoring sur site
    description: |
      Vérification des données source et visites de monitoring sur site.
  BC-1520.50.20:
    name: Monitoring centralisé et fondé sur le risque
    description: |
      Programmes de monitoring centralisé et fondé sur le risque.
  BC-1520.50.30:
    name: Audits de qualité clinique
    description: |
      Audits BPC des essais, sites et prestataires.
  BC-1520.60:
    name: Gestion des approvisionnements des essais cliniques
    description: |
      Approvisionnement en IMP, distribution, randomisation et comptabilité des médicaments.
  BC-1520.60.10:
    name: Production et conditionnement des IMP
    description: |
      Production et conditionnement des médicaments expérimentaux.
  BC-1520.60.20:
    name: Distribution des IMP et opérations de dépôt
    description: |
      Opérations de dépôt et de distribution mondiale des IMP.
  BC-1520.60.30:
    name: Opérations de randomisation et IRT
    description: |
      Randomisation IRT/IWRS et gestion des approvisionnements.
  BC-1520.60.40:
    name: Comptabilité et réconciliation des IMP
    description: |
      Comptabilité, retour et destruction des médicaments expérimentaux.
  BC-1520.70:
    name: Gestion de la sous-traitance clinique et des ORC
    description: |
      Sélection des ORC, contractualisation et supervision.
  BC-1520.70.10:
    name: Sélection et contractualisation des ORC
    description: |
      Sélection, cadrage et contractualisation des ORC.
  BC-1520.70.20:
    name: Supervision des performances des ORC
    description: |
      Supervision par le promoteur des performances et indicateurs clés des ORC.
  BC-1520.70.30:
    name: Supervision qualité des prestataires
    description: |
      Supervision qualité des prestataires et laboratoires cliniques.

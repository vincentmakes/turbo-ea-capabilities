locale: fr
source: L1-tax-management.yaml
entries:
  BC-220:
    name: Gestion de la fiscalité
    description: |
      Planification, conformité et reporting en matière de fiscalité directe et indirecte.
  BC-220.10:
    name: Gestion de la fiscalité directe
    description: |
      Planification, conformité et déclarations de l'impôt sur les sociétés.
  BC-220.10.10:
    name: Provisionnement de l'impôt sur les sociétés
    description: |
      Calculs d'impôt courant et différé et provisionnement fiscal.
  BC-220.10.20:
    name: Déclarations d'impôt sur les sociétés
    description: |
      Préparation et dépôt des déclarations d'impôt sur les sociétés.
  BC-220.10.30:
    name: Gestion de la retenue à la source
    description: |
      Détermination, paiement et certification de la retenue à la source.
  BC-220.10.40:
    name: Gestion des déficits fiscaux et des crédits d'impôt
    description: |
      Utilisation, surveillance et prévision des déficits fiscaux et crédits d'impôt.
  BC-220.20:
    name: Gestion de la fiscalité indirecte
    description: |
      TVA, taxe sur les produits et services, taxes sur les ventes et droits de douane.
  BC-220.20.10:
    name: Détermination de la TVA et de la taxe sur les produits et services
    description: |
      Codification fiscale, lieu de livraison et détermination de la fiscalité indirecte.
  BC-220.20.20:
    name: Déclarations de fiscalité indirecte
    description: |
      Préparation et dépôt des déclarations de TVA, taxe sur les produits et services et taxes sur les ventes.
  BC-220.20.30:
    name: Facturation électronique et reporting en temps réel
    description: |
      Facturation électronique et reporting en temps réel aux autorités fiscales.
  BC-220.20.40:
    name: Gestion des droits de douane et accises
    description: |
      Valorisation douanière, classification et administration des droits d'accises.
  BC-220.30:
    name: Gestion des prix de transfert
    description: |
      Politique, documentation et défense en matière de prix de transfert.
  BC-220.30.10:
    name: Définition de la politique de prix de transfert
    description: |
      Définition des politiques de prix de transfert alignées sur les directives de l'OCDE.
  BC-220.30.20:
    name: Documentation des prix de transfert
    description: |
      Fichier principal, fichier local et déclaration pays par pays.
  BC-220.30.30:
    name: Opérations de refacturation interentreprises
    description: |
      Calcul, facturation et règlement des charges interentreprises.
  BC-220.30.40:
    name: Défense en matière de prix de transfert
    description: |
      Défense lors des contrôles fiscaux, accords préalables en matière de prix et procédures amiables.
  BC-220.40:
    name: Reporting et conformité fiscale
    description: |
      Déclarations fiscales et informations fiscales statutaires.
  BC-220.40.10:
    name: Comptabilisation et divulgation fiscale
    description: |
      Informations fiscales dans les états financiers et analyse du taux d'imposition effectif.
  BC-220.40.20:
    name: Calendrier de conformité fiscale
    description: |
      Calendrier mondial des obligations déclaratives fiscales et suivi des échéances.
  BC-220.40.30:
    name: Déclaration pays par pays
    description: |
      Soumissions de la déclaration pays par pays au titre du plan BEPS de l'OCDE.
  BC-220.40.40:
    name: Données fiscales et rapprochements
    description: |
      Extraction des données fiscales, rapprochements et concordance entre la balance et la déclaration.
  BC-220.50:
    name: Planification et conseil fiscal
    description: |
      Structuration fiscale, conseil et gestion des contentieux.
  BC-220.50.10:
    name: Planification fiscale stratégique
    description: |
      Structuration fiscalement efficiente des opérations, du financement et des chaînes d'approvisionnement.
  BC-220.50.20:
    name: Conseil fiscal sur les transactions
    description: |
      Due diligence fiscale et structuration pour les fusions-acquisitions et restructurations.
  BC-220.50.30:
    name: Gestion des contentieux fiscaux
    description: |
      Contrôles fiscaux, contentieux et résolution des différends.
  BC-220.50.40:
    name: Risque fiscal et gouvernance
    description: |
      Cadre de risque fiscal, contrôles et divulgations de la stratégie fiscale.

locale: fr
source: L1-communication-navigation-surveillance-operations-management.yaml
entries:
  BC-1240:
    name: Gestion des opérations de communication, navigation et surveillance
    description: |
      Infrastructure CNS — communications vocales et de données, aides à la navigation, radar/ADS-B/multilatération.
  BC-1240.10:
    name: Gestion des systèmes de communication vocale
    description: |
      Communications vocales sol-bord, systèmes de communication contrôleur-pilote et communications sol-sol.
  BC-1240.10.10:
    name: Opérations de communication vocale sol-bord
    description: |
      Exploitation des communications radio vocales sol-bord.
  BC-1240.10.20:
    name: Opérations de communication vocale sol-sol
    description: |
      Exploitation des circuits vocaux inter-centres et inter-secteurs.
  BC-1240.10.30:
    name: Enregistrement et réécoute des communications vocales
    description: |
      Enregistrement et réécoute des communications vocales opérationnelles à des fins de sécurité et d'audit.
  BC-1240.20:
    name: Gestion des communications par liaison de données
    description: |
      CPDLC, ADS-C, FANS et liaisons de données ATN.
  BC-1240.20.10:
    name: Opérations CPDLC
    description: |
      Exploitation des communications par liaison de données contrôleur-pilote.
  BC-1240.20.20:
    name: Opérations ADS-C
    description: |
      Exploitation de la surveillance dépendante automatique par contrat.
  BC-1240.20.30:
    name: Opérations des réseaux ATN et FANS
    description: |
      Opérations des réseaux de liaison de données ATN et FANS.
  BC-1240.30:
    name: Gestion des aides à la navigation
    description: |
      Services de navigation VOR, DME, ILS et GNSS.
  BC-1240.30.10:
    name: Opérations VOR et DME
    description: |
      Exploitation et maintenance des balises VOR et DME.
  BC-1240.30.20:
    name: Opérations ILS
    description: |
      Exploitation et maintenance des systèmes d'atterrissage aux instruments ILS.
  BC-1240.30.30:
    name: Service de navigation basé sur le GNSS
    description: |
      Fourniture de services de navigation GNSS, SBAS et GBAS.
  BC-1240.30.40:
    name: Inspection en vol
    description: |
      Inspection en vol périodique des aides à la navigation.
  BC-1240.40:
    name: Gestion des systèmes de surveillance
    description: |
      Radar primaire, radar secondaire, ADS-B et multilatération.
  BC-1240.40.10:
    name: Opérations du radar de surveillance primaire
    description: |
      Exploitation des systèmes de radar de surveillance primaire.
  BC-1240.40.20:
    name: Opérations du radar de surveillance secondaire
    description: |
      Exploitation des systèmes SSR Mode S et des systèmes conventionnels Mode A/C.
  BC-1240.40.30:
    name: Opérations de surveillance ADS-B
    description: |
      Exploitation des stations au sol ADS-B et de leur traitement.
  BC-1240.40.40:
    name: Opérations de multilatération
    description: |
      Exploitation de la surveillance WAM/MLAT.
  BC-1240.40.50:
    name: Fusion des données de surveillance
    description: |
      Fusion des sources de surveillance pour l'affichage ATC.
  BC-1240.50:
    name: Gestion de la maintenance de l'infrastructure CNS
    description: |
      Maintenance sur site des équipements CNS, étalonnage et inspection en vol.
  BC-1240.50.10:
    name: Maintenance préventive CNS
    description: |
      Maintenance préventive programmée des équipements CNS.
  BC-1240.50.20:
    name: Maintenance corrective CNS
    description: |
      Maintenance corrective et intervention sur pannes des équipements CNS.
  BC-1240.50.30:
    name: Étalonnage des équipements CNS
    description: |
      Étalonnage et alignement des équipements CNS.
  BC-1240.50.40:
    name: Gestion des pièces détachées CNS
    description: |
      Stock et approvisionnement en pièces détachées et consommables CNS.
  BC-1240.60:
    name: Gestion du spectre et des fréquences
    description: |
      Allocation des fréquences aéronautiques, coordination et gestion des interférences.
  BC-1240.60.10:
    name: Allocation des fréquences
    description: |
      Allocation des fréquences aéronautiques aux services.
  BC-1240.60.20:
    name: Coordination des fréquences
    description: |
      Coordination transfrontalière et inter-services des fréquences.
  BC-1240.60.30:
    name: Détection et résolution des interférences
    description: |
      Détection et résolution des incidents d'interférence de fréquences.

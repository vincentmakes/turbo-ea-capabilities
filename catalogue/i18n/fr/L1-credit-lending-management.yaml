locale: fr
source: L1-credit-lending-management.yaml
entries:
  BC-1320:
    name: Gestion du crédit et de l'octroi de crédit
    description: |
      Origination du crédit, analyse du risque de crédit, gestion des prêts, recouvrement et gestion du portefeuille.
  BC-1320.10:
    name: Gestion de l'origination du crédit
    description: |
      Collecte des demandes de crédit, présélection et processus d'origination.
  BC-1320.10.10:
    name: Collecte des demandes de crédit
    description: |
      Collecte des demandes de crédit sur l'ensemble des canaux.
  BC-1320.10.20:
    name: Présélection et évaluation de la solvabilité
    description: |
      Présélection, évaluation de la solvabilité et de la capacité de remboursement.
  BC-1320.10.30:
    name: Orchestration du processus d'origination
    description: |
      Orchestration des processus d'origination du crédit et des SLA.
  BC-1320.10.40:
    name: Collecte des documents d'origination
    description: |
      Collecte et vérification des pièces justificatives pour l'origination.
  BC-1320.20:
    name: Gestion de l'analyse et de la décision de crédit
    description: |
      Analyse du risque de crédit, étalement financier, prise de décision et délégation de pouvoirs.
  BC-1320.20.10:
    name: Évaluation du risque de crédit
    description: |
      Évaluation du risque de crédit des demandeurs et des expositions.
  BC-1320.20.20:
    name: Étalement financier et analyse
    description: |
      Étalement des états financiers et analyse des ratios.
  BC-1320.20.30:
    name: Décision de crédit
    description: |
      Moteurs de décision et analyse subjective des dossiers de crédit.
  BC-1320.20.40:
    name: Approbation du crédit et délégation de pouvoirs
    description: |
      Gouvernance d'approbation du crédit et application des délégations de pouvoirs.
  BC-1320.20.50:
    name: Évaluation et gestion des sûretés
    description: |
      Identification, évaluation et prise de sûreté sur les garanties.
  BC-1320.30:
    name: Gestion des prêts
    description: |
      Gestion des prêts, paiements, modifications de calendrier et restructurations.
  BC-1320.30.10:
    name: Déblocage des prêts
    description: |
      Gestion du déblocage et des tirages des prêts.
  BC-1320.30.20:
    name: Traitement des remboursements
    description: |
      Planification, traitement et réconciliation des remboursements.
  BC-1320.30.30:
    name: Modification des prêts
    description: |
      Modifications des conditions de prêt, restructurations et refinancements.
  BC-1320.30.40:
    name: Remboursement anticipé et clôture des prêts
    description: |
      Remboursement anticipé, émission de relevé de clôture et opérations de clôture.
  BC-1320.40:
    name: Gestion du recouvrement et des récupérations
    description: |
      Recouvrement, restructuration, opérations de récupération et traitement des créances douteuses.
  BC-1320.40.10:
    name: Recouvrement précoce
    description: |
      Gestion des premiers impayés et envoi de rappels.
  BC-1320.40.20:
    name: Recouvrement tardif
    description: |
      Recouvrement tardif et transmission au contentieux.
  BC-1320.40.30:
    name: Restructuration et mesures d'accompagnement
    description: |
      Offres de restructuration, mesures d'accompagnement et soutien aux clients en difficulté.
  BC-1320.40.40:
    name: Récupération et abandon de créances
    description: |
      Opérations de récupération, passage en perte et activités post-abandon.
  BC-1320.40.50:
    name: Traitement des créances non performantes
    description: |
      Traitement, cession et titrisation des créances non performantes.
  BC-1320.50:
    name: Gestion du portefeuille de prêts
    description: |
      Analytique de portefeuille, optimisation et gestion du capital.
  BC-1320.50.10:
    name: Analytique des risques de portefeuille
    description: |
      Analytique de portefeuille incluant les analyses par millésime, concentration et stress.
  BC-1320.50.20:
    name: Optimisation du portefeuille
    description: |
      Optimisation de la composition, de la tarification et du couple risque-rendement du portefeuille.
  BC-1320.50.30:
    name: Gestion du capital du portefeuille
    description: |
      Gestion du capital des portefeuilles de crédit selon les règles de Bâle.
  BC-1320.50.40:
    name: Reporting du portefeuille
    description: |
      Reporting du portefeuille aux comités des risques et aux régulateurs.
  BC-1320.60:
    name: Gestion de la modélisation du risque de crédit
    description: |
      Modèles PD/LGD/EAD, approche NI et pertes de crédit attendues IFRS 9.
  BC-1320.60.10:
    name: Développement des modèles PD/LGD/EAD
    description: |
      Développement des modèles de probabilité de défaut, de perte en cas de défaut et d'exposition en cas de défaut.
  BC-1320.60.20:
    name: Modélisation des pertes de crédit attendues IFRS 9
    description: |
      Développement et exploitation du modèle de pertes de crédit attendues IFRS 9.
  BC-1320.60.30:
    name: Validation des modèles
    description: |
      Validation indépendante des modèles de risque de crédit.
  BC-1320.60.40:
    name: Suivi des modèles
    description: |
      Suivi continu des performances et recalibration des modèles.

locale: fr
source: L1-curriculum-programme-management.yaml
entries:
  BC-4700:
    name: Gestion des programmes d'études et des cursus
    description: |
      Définition, structuration, gouvernance et amélioration continue des
      programmes académiques, cours, modules, qualifications et résultats
      d'apprentissage qui les sous-tendent.
  BC-4700.10:
    name: Architecture des programmes
    description: |
      Définition de la structure du programme, du niveau de qualification, de
      la pondération des crédits et des résultats d'apprentissage visés des
      diplômes académiques.
    in_scope:
      - Définition de la structure et des parcours du programme
      - Structure des diplômes et des qualifications
      - Résultats d'apprentissage visés au niveau du programme
    out_of_scope:
      - Rédaction du syllabus de cours (couvert sous Conception des cours et modules)
      - Résultats d'accréditation externe (couvert sous Gestion de la qualité académique et de l'accréditation)
  BC-4700.10.10:
    name: Définition du programme
    description: |
      Définition de la finalité du programme, du public cible, des conditions
      d'entrée et de la structure générale.
  BC-4700.10.20:
    name: Structuration des qualifications et titres
    description: |
      Structuration des diplômes, des valeurs en crédits et des parcours de
      qualifications empilables.
  BC-4700.10.30:
    name: Définition des résultats d'apprentissage
    description: |
      Formulation des résultats d'apprentissage visés au niveau du programme
      et des cours.
  BC-4700.20:
    name: Conception des cours et modules
    description: |
      Spécification et rédaction des cours, modules et unités d'apprentissage
      individuels qui composent les programmes académiques.
    in_scope:
      - Spécifications de cours et descriptifs de modules
      - Rédaction et approbation des syllabi
      - Objectifs d'apprentissage et plans d'évaluation à l'échelle de l'unité
    out_of_scope:
      - Production des supports pédagogiques (couvert sous Gestion des contenus pédagogiques et ressources d'apprentissage)
  BC-4700.20.10:
    name: Spécification des cours
    description: |
      Rédaction et approbation des spécifications et descriptifs formels de cours.
  BC-4700.20.20:
    name: Conception des modules et unités
    description: |
      Conception des modules et unités d'apprentissage au sein des cours.
  BC-4700.20.30:
    name: Rédaction des syllabi
    description: |
      Rédaction des syllabi présentant le contenu, les méthodes et les
      évaluations par offre.
  BC-4700.30:
    name: Cartographie et alignement du programme d'études
    description: |
      Cartographie du contenu curriculaire sur les référentiels de compétences,
      les cadres de qualifications et les parcours de compétences ou de carrière.
    in_scope:
      - Cartographie compétences-curriculum
      - Alignement sur les référentiels ISCED, EQF, NQF et équivalents
      - Cartographie des parcours de compétences et de carrière
    out_of_scope:
      - Atteinte individuelle des compétences par l'apprenant (couvert sous Gestion des évaluations et des examens)
  BC-4700.30.10:
    name: Alignement sur les référentiels de compétences
    description: |
      Alignement du curriculum sur les référentiels de compétences définis
      (ex. CASE).
  BC-4700.30.20:
    name: Cartographie des cadres de qualifications
    description: |
      Cartographie des qualifications sur les référentiels ISCED, EQF, NQF et
      équivalents.
  BC-4700.30.30:
    name: Cartographie des parcours de compétences et de carrière
    description: |
      Cartographie du curriculum sur les parcours professionnels, métiers et
      de carrière.
  BC-4700.40:
    name: Gestion du catalogue des programmes
    description: |
      Rédaction, versionnage et publication du catalogue institutionnel des
      programmes et cours disponibles pour les apprenants potentiels et actuels.
    in_scope:
      - Rédaction du catalogue et flux éditorial
      - Versionnage et dates d'entrée en vigueur du catalogue
      - Publication interne et publique du catalogue
    out_of_scope:
      - Supports de marketing pour le recrutement (couvert sous Gestion du recrutement et des admissions)
  BC-4700.40.10:
    name: Rédaction du catalogue
    description: |
      Rédaction des entrées du catalogue pour les programmes, cours et modules.
  BC-4700.40.20:
    name: Versionnage et dates d'entrée en vigueur du catalogue
    description: |
      Contrôle de version et gestion des dates d'entrée en vigueur des entrées
      du catalogue.
  BC-4700.40.30:
    name: Publication du catalogue
    description: |
      Publication interne et publique du catalogue des programmes et cours.
  BC-4700.50:
    name: Approbation et gouvernance des programmes
    description: |
      Parcours d'approbation internes et externes pour les programmes nouveaux,
      modifiés et retirés, incluant les décisions de suspension et de fermeture.
    in_scope:
      - Approbation et gouvernance académiques internes
      - Approbation externe des régulateurs et des organismes professionnels
      - Suspension et fermeture ordonnée des programmes
    out_of_scope:
      - Revue curriculaire au quotidien (couvert sous Revue et amélioration continue du curriculum)
      - Accréditation cyclique (couvert sous Gestion de la qualité académique et de l'accréditation)
  BC-4700.50.10:
    name: Approbation interne des programmes
    description: |
      Approbation académique interne des programmes nouveaux et modifiés.
  BC-4700.50.20:
    name: Approbation externe des programmes
    description: |
      Approbation des programmes par les régulateurs, ministères ou organismes
      professionnels.
  BC-4700.50.30:
    name: Suspension et fermeture des programmes
    description: |
      Suspension ordonnée, maintien en fonctionnement résiduel et fermeture des
      programmes.
  BC-4700.60:
    name: Revue et amélioration continue du curriculum
    description: |
      Revue et amélioration périodiques du contenu curriculaire sur la base des
      résultats, des contributions des parties prenantes et des exigences
      externes.
    in_scope:
      - Cycles périodiques de revue du curriculum
      - Contributions des parties prenantes, employeurs et étudiants
      - Suivi de la mise en œuvre des changements curriculaires
    out_of_scope:
      - Revues d'assurance qualité des programmes (couvert sous Gestion de la qualité académique et de l'accréditation)
  BC-4700.60.10:
    name: Revue périodique du curriculum
    description: |
      Revue cyclique de l'efficacité et de la pertinence du curriculum.
  BC-4700.60.20:
    name: Contribution des parties prenantes au curriculum
    description: |
      Recueil des contributions des étudiants, employeurs et comités consultatifs
      à la conception curriculaire.
  BC-4700.60.30:
    name: Mise en œuvre des changements curriculaires
    description: |
      Suivi et mise en œuvre des changements curriculaires approuvés.

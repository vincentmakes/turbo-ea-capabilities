locale: fr
source: L1-justice-court-administration-management.yaml
entries:
  BC-3320:
    name: Gestion de la justice et de l'administration judiciaire
    description: |
      Administration judiciaire incluant le dépôt des affaires, la gestion des rôles et des
      audiences, les opérations d'audience et de procès, l'application des peines et des ordonnances,
      les services correctionnels et la détention, la probation et la liberté conditionnelle,
      et l'accès aux dossiers judiciaires.
  BC-3320.10:
    name: Dépôt et introduction des affaires
    description: |
      Dépôt des affaires civiles, pénales, familiales et administratives incluant le dépôt
      électronique, l'évaluation des frais et la classification initiale des affaires.
    in_scope:
      - Dépôt des affaires civiles et pénales
      - Dépôt électronique et réception des documents
      - Évaluation des frais de dossier
    out_of_scope:
      - Instruction des recours relatifs aux marchés publics (couverte par la gestion de la passation des marchés publics)
  BC-3320.10.10:
    name: Introduction des affaires
    description: |
      Réception des plaintes, des actes de poursuite et des documents introductifs pour ouvrir les affaires.
  BC-3320.10.20:
    name: Dépôt électronique au tribunal
    description: |
      Dépôt électronique des pièces de procédure par les parties et leurs conseils.
  BC-3320.10.30:
    name: Classification et numérotation des affaires
    description: |
      Classification des affaires par type, division et attribution des numéros de dossier.
  BC-3320.10.40:
    name: Évaluation des frais de greffe
    description: |
      Évaluation, perception et exonération des frais de dépôt et de procédure.
  BC-3320.20:
    name: Gestion du rôle et de la planification des audiences
    description: |
      Maintenance des rôles d'audience, des calendriers et de la désignation judiciaire
      des affaires, audiences et procès.
  BC-3320.20.10:
    name: Maintenance du rôle
    description: |
      Maintenance des rôles principaux et divisionnaires et de la chronologie des événements de l'affaire.
  BC-3320.20.20:
    name: Planification des audiences et des procès
    description: |
      Planification des audiences, des procès et des calendriers de procédure dans les salles d'audience.
  BC-3320.20.30:
    name: Désignation du juge
    description: |
      Désignation des affaires aux juges et rotation entre les divisions.
  BC-3320.20.40:
    name: Traitement des renvois et des ajournements
    description: |
      Traitement des demandes de renvoi et d'ajournement et reprogrammation.
  BC-3320.30:
    name: Opérations d'audience et de procès
    description: |
      Soutien opérationnel aux audiences et procès incluant la gestion du jury,
      la logistique de la salle d'audience et l'interprétation.
  BC-3320.30.10:
    name: Gestion du jury
    description: |
      Convocation, qualification, sélection et administration du service des jurés.
  BC-3320.30.20:
    name: Opérations de la salle d'audience
    description: |
      Logistique de la salle d'audience, coordination de la sécurité et enregistrement audio-vidéo.
  BC-3320.30.30:
    name: Services d'interprétation judiciaire
    description: |
      Fourniture de services d'interprétation et de traduction judiciaires.
  BC-3320.30.40:
    name: Soutien aux témoins et aux victimes
    description: |
      Services de soutien aux témoins et aux victimes et coordination des mesures spéciales.
  BC-3320.40:
    name: Application des peines et des ordonnances
    description: |
      Enregistrement des jugements et des peines, des amendes et des réparations,
      et application des ordonnances judiciaires.
  BC-3320.40.10:
    name: Enregistrement des jugements et des peines
    description: |
      Enregistrement des jugements, des peines et des ordonnances de disposition.
  BC-3320.40.20:
    name: Administration des amendes et des réparations
    description: |
      Administration des amendes, des ordonnances de réparation et des indemnités aux victimes.
  BC-3320.40.30:
    name: Exécution des jugements civils
    description: |
      Exécution des jugements civils par les voies des brefs, des saisies-arrêts et des saisies.
  BC-3320.40.40:
    name: Émission des mandats judiciaires
    description: |
      Émission des mandats d'arrêt, des mandats de comparution et des mandats de perquisition sur autorité judiciaire.
  BC-3320.50:
    name: Administration des services correctionnels et de la détention
    description: |
      Administration de la détention des prévenus en détention provisoire et des condamnés
      dans les maisons d'arrêt et les établissements pénitentiaires.
  BC-3320.50.10:
    name: Prise en charge et écrou des détenus
    description: |
      Prise en charge, écrou et classification des risques des détenus entrant en détention.
  BC-3320.50.20:
    name: Opérations de détention
    description: |
      Opérations quotidiennes de détention incluant la gestion de la population et les mouvements.
  BC-3320.50.30:
    name: Coordination des soins de santé des détenus
    description: |
      Coordination des soins de santé, de santé mentale et de lutte contre les addictions pour les détenus.
  BC-3320.50.40:
    name: Programmes et réhabilitation des détenus
    description: |
      Administration des programmes d'éducation, de formation professionnelle et de réhabilitation en détention.
  BC-3320.60:
    name: Gestion de la probation et de la liberté conditionnelle
    description: |
      Supervision en milieu ouvert des personnes condamnées sous probation, liberté conditionnelle
      et libération sous conditions.
  BC-3320.60.10:
    name: Enquête présentencielle
    description: |
      Rapports d'enquête présentenciels et évaluations des besoins et des risques pour le tribunal.
  BC-3320.60.20:
    name: Supervision en milieu ouvert
    description: |
      Supervision quotidienne des personnes condamnées dans la communauté.
  BC-3320.60.30:
    name: Administration des audiences de liberté conditionnelle
    description: |
      Administration des audiences des commissions de libération conditionnelle et des décisions de libération sous conditions.
  BC-3320.60.40:
    name: Traitement des violations et des révocations
    description: |
      Traitement des violations des conditions de supervision et des procédures de révocation.
  BC-3320.70:
    name: Dossiers judiciaires et accès du public
    description: |
      Maintenance des dossiers judiciaires et accès du public sous réserve du scellement,
      du caviardage et des restrictions légales.
  BC-3320.70.10:
    name: Maintenance des dossiers judiciaires
    description: |
      Maintenance des dossiers judiciaires et des dossiers d'affaires faisant autorité.
  BC-3320.70.20:
    name: Accès public et services équivalents PACER
    description: |
      Fourniture d'un accès public aux dossiers judiciaires par des services équivalents à PACER.
  BC-3320.70.30:
    name: Scellement et effacement
    description: |
      Traitement des ordonnances de scellement, d'effacement et de suppression des dossiers.

locale: fr
source: L1-water-treatment-operations-management.yaml
entries:
  BC-3870:
    name: Gestion des opérations de traitement de l'eau
    description: |
      Production d'eau potable aux usines de traitement — exploitation des
      procédés, assurance qualité de l'eau potable, gestion des réactifs de
      traitement, stockage de l'eau traitée, et gestion des sous-produits de
      traitement conformément aux réglementations sur l'eau potable et aux
      principes du Plan de sécurité sanitaire de l'eau de l'OMS.
  BC-3870.10:
    name: Opérations des usines de traitement
    description: |
      Exploitation quotidienne des usines de traitement d'eau potable
      produisant une eau conforme aux spécifications et à la demande.
  BC-3870.10.10:
    name: Exploitation par équipes des usines de traitement
    description: |
      Exploitation par équipes des usines de traitement conventionnelles et à
      membranes.
  BC-3870.10.20:
    name: Planification de la production de l'usine
    description: |
      Planification de la production de l'usine en fonction de la demande de
      distribution et de l'état du stockage.
  BC-3870.10.30:
    name: Reporting de performance de l'usine de traitement
    description: |
      Reporting de la production, de la consommation d'énergie et des
      indicateurs de performance de l'usine.
  BC-3870.20:
    name: Contrôle des procédés de traitement
    description: |
      Contrôle des procédés unitaires de traitement — coagulation, filtration,
      désinfection et traitement avancé — en fonction de la surveillance de la
      qualité en ligne.
  BC-3870.20.10:
    name: Contrôle de la coagulation et de la clarification
    description: |
      Contrôle du dosage en coagulant, de la floculation et des performances
      des clarificateurs.
  BC-3870.20.20:
    name: Contrôle des procédés de filtration
    description: |
      Contrôle des étapes de filtration à sable rapide, à sable lent et sur
      membranes.
  BC-3870.20.30:
    name: Contrôle des procédés de désinfection
    description: |
      Contrôle des procédés de chloration, UV, ozone et désinfection avancée.
  BC-3870.20.40:
    name: Contrôle des procédés de traitement avancé
    description: |
      Contrôle des étapes GAC, échange d'ions et oxydation avancée.
  BC-3870.30:
    name: Opérations de qualité de l'eau potable
    description: |
      Prélèvements, analyses en laboratoire, surveillance en ligne et reporting
      réglementaire de la conformité de la qualité de l'eau potable.
    in_scope:
      - Prélèvements réglementaires d'eau potable
      - Analyse en laboratoire des paramètres microbiologiques et chimiques
      - Réponse aux incidents de qualité de l'eau potable
    out_of_scope:
      - Qualité de l'eau dans le réseau de distribution (BC-3880.50)
      - Qualité des effluents d'eaux usées (BC-3890.70)
  BC-3870.30.10:
    name: Programme de prélèvement réglementaire
    description: |
      Gestion des programmes de prélèvements réglementaires d'eau potable aux
      usines et aux points de distribution.
  BC-3870.30.20:
    name: Surveillance en ligne de l'eau traitée
    description: |
      Surveillance en ligne de la turbidité, du chlore résiduel et d'autres
      paramètres de l'eau traitée.
  BC-3870.30.30:
    name: Réponse aux incidents de qualité de l'eau potable
    description: |
      Investigation et remédiation des incidents et dépassements de qualité de
      l'eau potable.
  BC-3870.30.40:
    name: Reporting de la qualité de l'eau potable
    description: |
      Reporting réglementaire aux autorités de contrôle de l'eau potable (DWI,
      EPA, équivalents).
  BC-3870.40:
    name: Gestion des réactifs de traitement
    description: |
      Gestion opérationnelle des réactifs de traitement en lien avec les achats,
      incluant les stocks, le dosage et la sécurité de manipulation des produits
      chimiques.
  BC-3870.40.10:
    name: Opérations de gestion des stocks de réactifs
    description: |
      Gestion des niveaux de stock des réactifs de traitement sur les
      installations.
  BC-3870.40.20:
    name: Opérations de dosage des réactifs
    description: |
      Exploitation et étalonnage des systèmes de dosage des réactifs de
      traitement.
  BC-3870.40.30:
    name: Sécurité de manipulation des produits chimiques
    description: |
      Manipulation sécurisée et contrôles COSHH et DSEAR pour les réactifs de
      traitement sur site.
  BC-3870.50:
    name: Opérations de stockage de l'eau traitée
    description: |
      Exploitation des réservoirs de service, cuves de contact et châteaux
      d'eau fournissant l'eau traitée au réseau de distribution.
  BC-3870.50.10:
    name: Opérations des réservoirs de service
    description: |
      Exploitation, contrôle du niveau et gestion du renouvellement des
      réservoirs de service.
  BC-3870.50.20:
    name: Opérations des cuves de contact
    description: |
      Exploitation des cuves de contact de désinfection pour les valeurs CT
      requises.
  BC-3870.50.30:
    name: Inspection des réservoirs de service
    description: |
      Inspection interne et nettoyage des actifs de stockage d'eau traitée.
  BC-3870.60:
    name: Gestion des sous-produits de traitement
    description: |
      Exploitation des flux de déchets issus du traitement — boues de
      clarificateur, eaux de lavage des filtres et médias usagés — et leurs
      filières d'élimination.
  BC-3870.60.10:
    name: Opérations de traitement des boues de clarificateur
    description: |
      Exploitation de l'épaississement et du déshydratation des boues aux
      usines de traitement d'eau.
  BC-3870.60.20:
    name: Récupération des eaux de lavage des filtres
    description: |
      Récupération, recyclage ou élimination des eaux de lavage des filtres.
  BC-3870.60.30:
    name: Élimination des médias usagés
    description: |
      Remplacement et élimination des médias filtrants usagés et des résines
      échangeuses d'ions.

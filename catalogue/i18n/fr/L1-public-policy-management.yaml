locale: fr
source: L1-public-policy-management.yaml
entries:
  BC-3200:
    name: Gestion de la politique publique
    description: |
      Formulation, analyse, aide à la décision, coordination de la mise en œuvre et évaluation
      des politiques publiques tout au long du cycle des politiques, fondées sur des données probantes,
      la consultation des parties prenantes et l'évaluation des impacts.
  BC-3200.10:
    name: Définition de l'agenda des politiques
    description: |
      Identification, priorisation et réception des mandats relatifs aux enjeux de politique publique
      nécessitant une attention gouvernementale.
    in_scope:
      - Identification des enjeux et veille prospective
      - Réception des mandats ministériels et politiques
      - Priorisation des politiques et gestion de l'agenda
    out_of_scope:
      - Rédaction de la législation ou de la réglementation (couverte par la gestion de la rédaction législative et réglementaire)
      - Exécution des décisions du Conseil des ministres (couverte par l'aide à la décision des politiques)
  BC-3200.10.10:
    name: Identification des enjeux de politique publique
    description: |
      Identification des enjeux émergents et des problèmes de politique publique par la veille
      prospective et les signaux des parties prenantes.
  BC-3200.10.20:
    name: Réception des mandats politiques
    description: |
      Capture et structuration des mandats politiques et ministériels en programmes de travail de politique publique.
  BC-3200.10.30:
    name: Priorisation des politiques
    description: |
      Priorisation des enjeux de politique publique concurrents en fonction des capacités,
      de l'urgence et des engagements gouvernementaux.
  BC-3200.20:
    name: Analyse des options de politique publique
    description: |
      Revue des données probantes, modélisation et analyse comparative des options de politique publique
      incluant le coût, l'impact et la faisabilité.
    in_scope:
      - Revue des données probantes et de la littérature
      - Modélisation économique et analyse coûts-avantages
      - Évaluation comparative des options
      - Analyse distributive et de l'équité
    out_of_scope:
      - Évaluation d'impact réglementaire pour les instruments en cours de rédaction (couverte par la gestion de la rédaction législative et réglementaire)
  BC-3200.20.10:
    name: Revue des données probantes et de la littérature
    description: |
      Collecte systématique et synthèse des données probantes éclairant les options de politique publique.
  BC-3200.20.20:
    name: Modélisation et prévision des politiques
    description: |
      Modélisation quantitative, microsimulation et prévision des résultats des politiques publiques.
  BC-3200.20.30:
    name: Évaluation des options
    description: |
      Évaluation comparative des options de politique publique par rapport aux objectifs et aux contraintes.
  BC-3200.20.40:
    name: Analyse distributive et de l'équité
    description: |
      Analyse des effets distributifs et des impacts sur l'équité entre les groupes de population.
  BC-3200.30:
    name: Consultation des parties prenantes et du public
    description: |
      Conception, conduite et analyse des consultations avec les parties prenantes, le public
      et les partenaires intergouvernementaux sur les propositions de politique publique.
  BC-3200.30.10:
    name: Conception de la consultation
    description: |
      Conception des stratégies de consultation, des instruments et des plans de portée.
  BC-3200.30.20:
    name: Conduite de la consultation
    description: |
      Exploitation des canaux de consultation incluant portails en ligne, auditions et ateliers.
  BC-3200.30.30:
    name: Analyse des réponses à la consultation
    description: |
      Codification, analyse et synthèse des réponses à la consultation.
  BC-3200.30.40:
    name: Coordination intergouvernementale
    description: |
      Coordination avec les partenaires infranationaux et internationaux sur les politiques communes.
  BC-3200.40:
    name: Aide à la décision des politiques
    description: |
      Préparation des documents de décision pour le Conseil des ministres, les ministres et les
      instances exécutives, incluant notes de synthèse, mémos de décision et recommandations.
  BC-3200.40.10:
    name: Préparation des notes de synthèse
    description: |
      Préparation de notes de synthèse ministérielles et exécutives sur les enjeux de politique publique.
  BC-3200.40.20:
    name: Gestion des dossiers soumis au Conseil des ministres
    description: |
      Rédaction et coordination des dossiers soumis au Conseil des ministres, aux instances
      exécutives ou au conseil.
  BC-3200.40.30:
    name: Enregistrement et communication des décisions
    description: |
      Enregistrement des décisions, diffusion des résultats et tasking des entités chargées de la mise en œuvre.
  BC-3200.50:
    name: Coordination de la mise en œuvre des politiques
    description: |
      Coordination de la mise en œuvre interagences des politiques publiques incluant
      la conception des programmes, le séquençage et la supervision de la livraison.
  BC-3200.50.10:
    name: Planification de la mise en œuvre
    description: |
      Conversion des décisions de politique publique en plans de mise en œuvre, jalons et responsabilités.
  BC-3200.50.20:
    name: Coordination interagences
    description: |
      Coordination des agences de mise en œuvre et des dispositifs de livraison conjoints.
  BC-3200.50.30:
    name: Suivi de la mise en œuvre
    description: |
      Suivi de l'avancement de la mise en œuvre des politiques par rapport aux engagements et aux échéances.
  BC-3200.60:
    name: Évaluation et révision des politiques
    description: |
      Évaluation ex post, révisions à échéance et post-mise en œuvre, et rétroaction
      dans le cycle des politiques publiques.
  BC-3200.60.10:
    name: Évaluation des résultats et des impacts
    description: |
      Évaluation des résultats et des impacts des politiques par rapport aux objectifs visés.
  BC-3200.60.20:
    name: Révision à échéance et post-mise en œuvre
    description: |
      Révisions statutaires et discrétionnaires des politiques et des instruments à intervalles définis.
  BC-3200.60.30:
    name: Capitalisation des enseignements tirés
    description: |
      Capitalisation et diffusion des enseignements tirés pour les futurs cycles de politique publique.

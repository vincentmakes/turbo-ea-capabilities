locale: fr
source: L1-educational-content-learning-resource-management.yaml
entries:
  BC-4790:
    name: Gestion du contenu pédagogique et des ressources d'apprentissage
    description: |
      Création, catalogage, licence et mise à disposition de contenus pédagogiques
      et ressources d'apprentissage utilisés dans l'enseignement, incluant les
      supports de cours, les objets d'apprentissage numériques, les ressources
      éducatives libres, les collections de bibliothèque et les manuels.
  BC-4790.10:
    name: Conception et production des supports de cours
    description: |
      Ingénierie pédagogique et production des supports de cours, incluant les
      contenus multimédias et la compilation des recueils de cours.
    in_scope:
      - Ingénierie pédagogique
      - Production de contenus multimédias
      - Compilation des recueils de cours
    out_of_scope:
      - Prestation d'enseignement (couverte par la Gestion des opérations d'enseignement et d'apprentissage)
  BC-4790.10.10:
    name: Ingénierie pédagogique
    description: |
      Ingénierie pédagogique des cours, modules et expériences d'apprentissage.
  BC-4790.10.20:
    name: Production de contenus multimédias
    description: |
      Production de contenus pédagogiques vidéo, audio et interactifs multimédias.
  BC-4790.10.30:
    name: Compilation des recueils de cours
    description: |
      Compilation des recueils de cours et des ensembles de ressources pédagogiques pour la mise à disposition.
  BC-4790.20:
    name: Catalogue des objets d'apprentissage numériques
    description: |
      Catalogage, versionnage et réutilisation des objets d'apprentissage numériques
      à travers les programmes et les modalités.
    in_scope:
      - Catalogage et métadonnées des objets d'apprentissage
      - Versionnage des objets d'apprentissage
      - Découverte et réutilisation des objets réutilisables
    out_of_scope:
      - Mise à disposition opérationnelle via LMS (couverte par la Gestion des opérations d'enseignement et d'apprentissage)
  BC-4790.20.10:
    name: Catalogage et métadonnées des objets d'apprentissage
    description: |
      Catalogage des objets d'apprentissage et des métadonnées selon les normes d'interopérabilité.
  BC-4790.20.20:
    name: Versionnage des objets d'apprentissage
    description: |
      Versionnage et gestion du cycle de vie des objets d'apprentissage.
  BC-4790.20.30:
    name: Découverte et réutilisation des objets réutilisables
    description: |
      Découverte et réutilisation des objets d'apprentissage à travers les cours et disciplines.
  BC-4790.30:
    name: Gestion des ressources éducatives libres
    description: |
      Sourcing, licence et contribution aux ressources éducatives libres (REL)
      utilisées dans l'enseignement.
    in_scope:
      - Sourcing et curation des REL
      - Conformité aux licences REL
      - Contribution et partage des REL
    out_of_scope:
      - Achats de manuels commerciaux (couverts par les Achats de manuels et matériels de cours)
  BC-4790.30.10:
    name: Sourcing et curation des ressources éducatives libres
    description: |
      Sourcing et curation des ressources éducatives libres pour un usage institutionnel.
  BC-4790.30.20:
    name: Conformité aux licences des ressources éducatives libres
    description: |
      Conformité aux licences REL (p. ex. Creative Commons) lors de l'utilisation et de la réutilisation.
  BC-4790.30.30:
    name: Contribution et partage des ressources éducatives libres
    description: |
      Contribution du contenu produit par l'établissement à l'écosystème des REL.
  BC-4790.40:
    name: Opérations des bibliothèques et des ressources documentaires
    description: |
      Développement des collections, gestion des listes de lecture et soutien
      à la maîtrise de l'information pour l'enseignement et la recherche.
    in_scope:
      - Développement des collections
      - Gestion des listes de lecture et des réserves
      - Soutien à la maîtrise de l'information
    out_of_scope:
      - Opérations de bibliothèques publiques non liées à la formation
  BC-4790.40.10:
    name: Développement des collections
    description: |
      Développement des collections imprimées et électroniques de bibliothèque.
  BC-4790.40.20:
    name: Gestion des listes de lecture et des réserves
    description: |
      Gestion des listes de lecture de cours et des collections de réserve.
  BC-4790.40.30:
    name: Soutien à la maîtrise de l'information
    description: |
      Soutien et enseignement de la maîtrise de l'information et des compétences documentaires.
  BC-4790.50:
    name: Gestion des licences et des droits sur les contenus
    description: |
      Gestion des licences, des autorisations de droit d'auteur et des exceptions
      pédagogiques pour l'utilisation de contenus tiers dans l'enseignement.
    in_scope:
      - Licences de contenus pédagogiques
      - Autorisation de droit d'auteur
      - Gestion des exceptions pour usage raisonnable et usage éducatif
    out_of_scope:
      - Propriété intellectuelle institutionnelle (couverte par la Gestion de la propriété intellectuelle – transverse)
  BC-4790.50.10:
    name: Licences de contenus pédagogiques
    description: |
      Octroi de licences sur des contenus tiers à des fins pédagogiques.
  BC-4790.50.20:
    name: Autorisation de droit d'auteur
    description: |
      Autorisation des droits d'auteur sur les contenus utilisés dans l'enseignement et l'évaluation.
  BC-4790.50.30:
    name: Gestion des exceptions pour usage raisonnable et usage éducatif
    description: |
      Gestion des exceptions pour usage raisonnable, usage loyal et exceptions pédagogiques au droit d'auteur.
  BC-4790.60:
    name: Achats de manuels et matériels de cours
    description: |
      Spécification et acquisition des manuels et matériels de cours,
      incluant les programmes de matériels abordables.
    in_scope:
      - Spécification des lectures obligatoires
      - Achats de manuels
      - Programmes de matériels abordables (p. ex. accès inclusif)
    out_of_scope:
      - Achats généraux (couverts par la Gestion des achats – transverse)
  BC-4790.60.10:
    name: Spécification des lectures obligatoires
    description: |
      Spécification des lectures obligatoires et recommandées pour les cours.
  BC-4790.60.20:
    name: Achats de manuels
    description: |
      Acquisition des manuels et matériels de cours.
  BC-4790.60.30:
    name: Programme de matériels abordables
    description: |
      Mise en œuvre des programmes de matériels abordables et d'accès inclusif.

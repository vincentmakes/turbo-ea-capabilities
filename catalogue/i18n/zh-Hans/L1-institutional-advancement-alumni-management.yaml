locale: zh-Hans
source: L1-institutional-advancement-alumni-management.yaml
entries:
  BC-4800:
    name: 机构发展与校友管理
    description: |
      开展校友社区互动、培育捐赠人关系，以及筹款活动、捐赠、捐赠人关怀与捐赠基金相关捐赠人报告的管理工作。
  BC-4800.10:
    name: 校友互动
    description: |
      通过项目、活动和通讯渠道开展校友社区互动，维系校友与母校的终身纽带。
    in_scope:
      - 校友社区运营
      - 校友活动与同学会
      - 校友通讯
    out_of_scope:
      - 在校学生就业服务（见学生支持与身心健康管理）
  BC-4800.10.10:
    name: 校友社区运营
    description: |
      运营校友会、地区分会及线上社区。
  BC-4800.10.20:
    name: 校友活动与同学会
    description: |
      策划并举办校友活动和同学会。
  BC-4800.10.30:
    name: 校友通讯
    description: |
      面向校友受众的内容编辑和通讯渠道管理。
  BC-4800.20:
    name: 捐赠人关系管理
    description: |
      识别、培育潜在捐赠人并管理现有捐赠人关系。
    in_scope:
      - 潜在捐赠人研究与识别
      - 捐赠人培育与劝募
      - 大额捐赠人关系管理
    out_of_scope:
      - 通用CRM运营（见跨行业客户关系管理）
  BC-4800.20.10:
    name: 潜在捐赠人研究与识别
    description: |
      开展潜在捐赠人研究并识别捐赠意向人士。
  BC-4800.20.20:
    name: 捐赠人培育与劝募
    description: |
      培育捐赠人关系并开展劝募工作。
  BC-4800.20.30:
    name: 大额捐赠人关系管理
    description: |
      为大额捐赠人提供个性化关系管理服务。
  BC-4800.30:
    name: 筹款活动管理
    description: |
      规划并运营年度捐赠、资本项目及数字渠道等多类型筹款活动。
    in_scope:
      - 年度捐赠活动
      - 资本项目活动管理
      - 众筹和点对点捐赠活动
    out_of_scope:
      - 非筹款类营销活动（见跨行业营销管理）
  BC-4800.30.10:
    name: 年度捐赠活动
    description: |
      运营年度捐赠和定期捐赠活动。
  BC-4800.30.20:
    name: 资本项目活动管理
    description: |
      管理多年期资本项目活动。
  BC-4800.30.30:
    name: 众筹与点对点捐赠活动
    description: |
      运营众筹和点对点筹款活动。
  BC-4800.40:
    name: 捐赠与承诺管理
    description: |
      接收、记录并管理捐赠和捐赠承诺，包括身后捐赠工具。
    in_scope:
      - 捐赠接收与处理
      - 捐赠承诺跟踪
      - 身后及递延捐赠管理
    out_of_scope:
      - 通用应收账款（见跨行业财务管理）
  BC-4800.40.10:
    name: 捐赠接收与处理
    description: |
      接收并处理现金、支票、线上及实物捐赠。
  BC-4800.40.20:
    name: 捐赠承诺跟踪
    description: |
      跟踪捐赠承诺及承诺付款计划。
  BC-4800.40.30:
    name: 身后及递延捐赠管理
    description: |
      管理遗产捐赠、慈善信托及其他身后捐赠工具。
  BC-4800.50:
    name: 捐赠人关怀与表彰
    description: |
      通过感谢、表彰及对命名基金捐赠人的持续互动，维护捐赠人关系。
    in_scope:
      - 捐赠人致谢
      - 捐赠人表彰项目
      - 捐赠基金关怀
    out_of_scope:
      - 公共关系传播（见跨行业企业传播管理）
  BC-4800.50.10:
    name: 捐赠人致谢
    description: |
      对捐赠人的捐赠和承诺表示致谢。
  BC-4800.50.20:
    name: 捐赠人表彰项目
    description: |
      运营捐赠人表彰项目和荣誉会员计划。
  BC-4800.50.30:
    name: 捐赠基金关怀
    description: |
      为捐赠基金和命名基金捐赠人提供专项关怀服务。
  BC-4800.60:
    name: 捐赠基金相关捐赠人报告
    description: |
      就定向和捐赠基金的使用、绩效及影响力向捐赠人报告。
    in_scope:
      - 定向基金使用报告
      - 命名捐赠基金绩效报告
      - 捐赠人影响力报告
    out_of_scope:
      - 机构财务报告（见跨行业财务管理）
      - 捐赠基金投资管理（见跨行业资金管理）
  BC-4800.60.10:
    name: 定向基金使用报告
    description: |
      报告定向及捐赠人指定基金的使用情况。
  BC-4800.60.20:
    name: 命名捐赠基金绩效报告
    description: |
      向命名捐赠基金捐赠人报告基金绩效。
  BC-4800.60.30:
    name: 捐赠人影响力报告
    description: |
      撰写面向捐赠人的影响力叙述和成果报告。
metadata:
  translator: Claude (zh-Hans automated)

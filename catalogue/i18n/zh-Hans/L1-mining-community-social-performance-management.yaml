locale: zh-Hans
source: L1-mining-community-social-performance-management.yaml
entries:
  BC-4500:
    name: 矿区社区与社会绩效管理
    description: |
      通过与东道社区、原住民和传统土地所有者的沟通协作、搬迁安置和土地使用、社区投资、本地化采购、人权保护及社会绩效报告，维护社会许可。
  BC-4500.10:
    name: 东道社区参与
    description: |
      识别、咨询受采矿作业影响的东道社区并处理其投诉。
    in_scope:
      - 利益相关方识别和制图
      - 社区咨询方案
      - 社区投诉机制
    out_of_scope:
      - 原住民专项参与（BC-4500.20）
      - 搬迁安置（BC-4500.30）
  BC-4500.10.10:
    name: 社区利益相关方制图
    description: |
      识别并绘制矿山影响范围内利益相关方分布图。
  BC-4500.10.20:
    name: 社区咨询方案
    description: |
      运营结构化社区咨询论坛并开展信息披露。
  BC-4500.10.30:
    name: 社区投诉处理
    description: |
      按照联合国指导原则有效性标准运营社区投诉机制。
  BC-4500.20:
    name: 原住民与传统土地所有者参与
    description: |
      与原住民和传统土地所有者群体开展参与，涵盖原住民权益、文化遗产和利益分享协议。
  BC-4500.20.10:
    name: 原住民权益与土地权利参与
    description: |
      就影响采矿作业的原住民权益和习惯土地权利开展参与。
  BC-4500.20.20:
    name: 文化遗产管理
    description: |
      对文化遗址和文化价值进行识别、保护和管理。
  BC-4500.20.30:
    name: 原住民土地使用协议管理
    description: |
      管理原住民土地使用和利益分享协议。
  BC-4500.30:
    name: 搬迁安置与土地使用管理
    description: |
      开展项目受影响人口的土地征收、非自愿搬迁安置和生计恢复工作。
  BC-4500.30.10:
    name: 土地征收谈判
    description: |
      就采矿和配套基础设施所需土地开展自愿征收谈判。
  BC-4500.30.20:
    name: 非自愿搬迁安置规划
    description: |
      按照 IFC 绩效标准及同等制度规划非自愿搬迁安置方案。
  BC-4500.30.30:
    name: 搬迁行动计划实施
    description: |
      为项目受影响家庭实施搬迁行动计划。
  BC-4500.30.40:
    name: 生计恢复方案运营
    description: |
      为被搬迁家庭和东道社区运营生计恢复方案。
  BC-4500.40:
    name: 社区投资与发展
    description: |
      设计和实施社区投资方案，并共同投资当地基础设施和发展项目。
  BC-4500.40.10:
    name: 社区投资方案设计
    description: |
      设计与地方发展规划相符的多年期社区投资方案。
  BC-4500.40.20:
    name: 当地基础设施共同投资
    description: |
      共同投资与东道社区共享的道路、水、电和社会基础设施。
  BC-4500.40.30:
    name: 社区发展项目交付
    description: |
      在卫生、教育和生计领域交付社区发展项目。
  BC-4500.50:
    name: 本地化采购与采购管理
    description: |
      开展本地供应商培育、本地就业方案及本地化承诺报告。
  BC-4500.50.10:
    name: 本地供应商培育
    description: |
      培育和提升本地及原住民拥有的供应商能力。
  BC-4500.50.20:
    name: 本地就业方案管理
    description: |
      管理面向东道社区工人的本地就业、培训和学徒方案。
  BC-4500.50.30:
    name: 本地化含量报告
    description: |
      按东道国政府和合同要求报告本地化承诺完成情况。
  BC-4500.60:
    name: 人权与安全管理
    description: |
      开展人权尽职调查、遵守《自愿原则》，并监督安全提供者行为。
  BC-4500.60.10:
    name: 人权尽职调查
    description: |
      按联合国指导原则开展场地级人权影响评估和尽职调查。
  BC-4500.60.20:
    name: 自愿原则合规
    description: |
      在安全运营中遵守《安全与人权自愿原则》。
  BC-4500.60.30:
    name: 安全提供者行为监督
    description: |
      监督矿山周边公共和私人安全提供者的行为。
  BC-4500.70:
    name: 社会绩效报告
    description: |
      追踪社会绩效指标、开展社会影响评估并对外披露社会绩效。
  BC-4500.70.10:
    name: 社会绩效指标追踪
    description: |
      追踪运营和投资的社会绩效指标。
  BC-4500.70.20:
    name: 社会影响评估
    description: |
      定期评估采矿作业对东道社区的社会影响。
  BC-4500.70.30:
    name: 社会绩效对外披露
    description: |
      在可持续发展和监管文件中对外披露社会绩效。

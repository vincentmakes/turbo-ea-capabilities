locale: zh-Hans
source: L1-talent-creative-workforce-management.yaml
entries:
  BC-3790:
    name: 创意人才管理
    description: |
      涵盖荧幕及创意人才的寻源与选角、人才合同与聘用、残差版税分配、行会与工会合规，以及长期创意人才关系管理。
  BC-3790.10:
    name: 人才寻源与选角
    description: |
      编写选角委托书，为制作项目搜寻、试镜并选定荧幕和配音人才。
  BC-3790.10.10:
    name: 选角委托书管理
    description: |
      编写并向选角导演和经纪公司发出选角委托书和角色拆分说明。
  BC-3790.10.20:
    name: 人才搜寻与试镜
    description: |
      开展人才搜寻、自录试镜和现场试镜协调，以及候选人筛选工作流程。
  BC-3790.10.30:
    name: 选角决策
    description: |
      依据创意和商业标准作出选角决定并完成选角审批。
  BC-3790.20:
    name: 人才合同与聘用
    description: |
      谈判并签署人才聘用合同，包括借调和服务公司架构。
  BC-3790.20.10:
    name: 人才交易谈判支持
    description: |
      为人才交易提供谈判支持，包括同类交易基准分析和条款清单拟定。
  BC-3790.20.20:
    name: 借调与服务公司合同
    description: |
      通过借调和服务公司架构签署合同，并考虑税务和赔偿事项。
  BC-3790.20.30:
    name: 聘用信管理
    description: |
      为人才和剧组起草并维护聘用信及简式交易备忘录的全生命周期。
  BC-3790.30:
    name: 残差版税分配
    description: |
      计算并向人才及创意贡献者支付应得的残差版税和参与收益。
  BC-3790.30.10:
    name: 残差计算
    description: |
      依据行会公式、市场类型及复用窗口期计算残差。
  BC-3790.30.20:
    name: 版税分配对账单制作
    description: |
      为人才和版权所有方制作版税分配对账单。
  BC-3790.30.30:
    name: 底层参与权追踪
    description: |
      追踪底层参与权，包括利润定义和会计分层。
  BC-3790.40:
    name: 行会与工会合规
    description: |
      执行集体谈判协议，支持行会报告与审计，并缴纳养老金及健康保险金。
  BC-3790.40.10:
    name: 集体谈判协议执行
    description: |
      跨制作项目执行CBA最低标准、工作规则及加班结构。
  BC-3790.40.20:
    name: 行会报告与审计支持
    description: |
      制作行会报告并支持跨制作项目的行会审计。
  BC-3790.40.30:
    name: 养老金与健康保险金管理
    description: |
      计算并向行会计划汇缴养老金和健康保险金。
  BC-3790.50:
    name: 创意人才关系管理
    description: |
      维护与创意人才的长期关系，并通过相关计划持续推动人才参与和发展。
  BC-3790.50.10:
    name: 长期人才关系管理
    description: |
      管理与创意人才签订的长期优先看稿协议、整体协议及制作单元协议。
  BC-3790.50.20:
    name: 人才绩效追踪
    description: |
      跨项目和节目单追踪人才贡献及创意绩效。
  BC-3790.50.30:
    name: 人才参与计划
    description: |
      面向创意人才开展剧本工作坊、驻留及开发基金等参与计划。

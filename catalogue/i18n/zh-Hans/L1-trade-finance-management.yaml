locale: zh-Hans
source: L1-trade-finance-management.yaml
entries:
  BC-1350:
    name: 贸易融资管理
    description: |
      提供跟单信用证、担保函、供应链融资和贸易贷款等贸易融资产品，支持客户的国内外贸易结算和融资需求。
  BC-1350.10:
    name: 跟单信用证管理
    description: |
      管理进出口信用证业务，保障贸易双方在国际结算中的权益。
  BC-1350.10.10:
    name: 信用证开证
    description: |
      按照 UCP 600 规则为进口商开立信用证，为卖方提供付款保证。
  BC-1350.10.20:
    name: 信用证通知与保兑
    description: |
      为出口商通知和保兑信用证，增强出口收汇保障。
  BC-1350.10.30:
    name: 单据审核与合规
    description: |
      依据 UCP 和 ISBP 对单据进行审核，确保单证相符的合规性。
  BC-1350.10.40:
    name: 信用证结算与偿付
    description: |
      完成跟单信用证项下的结算和偿付，确保资金及时准确到位。
  BC-1350.20:
    name: 担保函与备用信用证管理
    description: |
      管理银行保函、备用信用证和履约保证金业务，为客户的履约义务提供信用背书。
  BC-1350.20.10:
    name: 银行保函开立
    description: |
      为客户开立银行保函和履约保证金，支持客户的商业承诺履约。
  BC-1350.20.20:
    name: 备用信用证开立
    description: |
      按照 ISP98 规则开立备用信用证，提供灵活的支付保证工具。
  BC-1350.20.30:
    name: 担保索赔处理
    description: |
      处理担保函和保证金项下的索赔请求，依规进行审核和付款。
  BC-1350.20.40:
    name: 担保修改与注销
    description: |
      处理担保函的条款修改、延期和注销请求，维护担保函的有效状态。
  BC-1350.30:
    name: 跟单托收管理
    description: |
      管理即期付款交单（D/P）和承兑交单（D/A）跟单托收业务，为贸易双方提供单据传递和资金收付服务。
  BC-1350.30.10:
    name: 付款交单运营
    description: |
      按照 URC 522 规则运营付款交单（D/P）托收业务。
  BC-1350.30.20:
    name: 承兑交单运营
    description: |
      运营包括汇票承兑在内的承兑交单（D/A）托收业务。
  BC-1350.30.30:
    name: 托收结算
    description: |
      完成跟单托收项下的结算和汇款，确保货款按时入账。
  BC-1350.40:
    name: 供应链融资管理
    description: |
      提供反向保理、应付账款融资和动态折扣服务，优化供应链各方的营运资金管理。
  BC-1350.40.10:
    name: 买方主导的应付账款融资
    description: |
      运营反向保理和买方主导的应付账款融资计划，帮助供应商提前回收应收账款。
  BC-1350.40.20:
    name: 应收账款融资计划
    description: |
      为卖方提供应收账款融资和保理服务，改善卖方现金流状况。
  BC-1350.40.30:
    name: 动态折扣运营
    description: |
      运营动态折扣平台并计算折扣金额，实现买卖双方的共赢利益安排。
  BC-1350.50:
    name: 贸易贷款管理
    description: |
      提供出口前和出口后贸易融资，满足进出口商在贸易各阶段的融资需求。
  BC-1350.50.10:
    name: 出口前贸易融资
    description: |
      为出口前营运资金和生产备货提供融资，帮助出口商备货应订。
  BC-1350.50.20:
    name: 出口后贸易融资
    description: |
      提供出口后票据贴现和福费廷业务，助力出口商提前收回货款。
  BC-1350.50.30:
    name: 进口贸易融资
    description: |
      提供包括过渡融资和信托提货在内的进口融资，满足进口商的资金需求。

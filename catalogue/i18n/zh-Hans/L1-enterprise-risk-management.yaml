locale: zh-Hans
source: L1-enterprise-risk-management.yaml
entries:
  BC-120:
    name: 企业风险管理
    description: |
      在企业层面识别、评估、缓解及监控风险。
  BC-120.10:
    name: 风险框架与风险偏好管理
    description: |
      建立风险分类体系、框架、偏好及容忍度。
  BC-120.10.10:
    name: 风险分类体系管理
    description: |
      定义并维护企业风险分类体系与类别。
  BC-120.10.20:
    name: 风险偏好定义
    description: |
      制定经董事会批准的风险偏好声明及容忍度阈值。
  BC-120.10.30:
    name: 风险政策与标准管理
    description: |
      制定并维护集团层面的风险政策、标准及方法论。
  BC-120.10.40:
    name: 风险文化管理
    description: |
      开展风险文化评估、意识提升及责任担当项目。
  BC-120.20:
    name: 风险识别与评估
    description: |
      发现、评估、评分及优先排序风险。
  BC-120.20.10:
    name: 风险识别
    description: |
      通过研讨会、扫描及信息输入，识别新兴风险。
  BC-120.20.20:
    name: 风险分析与评分
    description: |
      分析风险的可能性、影响、速度及固有风险与残余风险。
  BC-120.20.30:
    name: 情景与压力分析
    description: |
      开展前瞻性情景分析、压力测试及反向压力测试。
  BC-120.20.40:
    name: 新兴风险监测
    description: |
      对新兴风险及弱信号进行前瞻性扫描。
  BC-120.30:
    name: 风险应对管理
    description: |
      制定风险缓解、转移、规避及接受决策。
  BC-120.30.10:
    name: 风险缓解规划
    description: |
      定义缓解行动、责任人及目标完成日期。
  BC-120.30.20:
    name: 风险转移管理
    description: |
      通过保险、合同及套期保值转移风险。
  BC-120.30.30:
    name: 风险接受治理
    description: |
      对超出偏好的残余风险进行正式审批接受。
  BC-120.30.40:
    name: 控制设计与有效性
    description: |
      定义并评估风险控制措施的有效性。
  BC-120.40:
    name: 风险监控与报告
    description: |
      管理风险指标、仪表板及向治理机构的报告。
  BC-120.40.10:
    name: 关键风险指标管理
    description: |
      定义、设置阈值并跟踪关键风险指标。
  BC-120.40.20:
    name: 风险事件与损失记录
    description: |
      记录操作风险事件、未遂事件及损失。
  BC-120.40.30:
    name: 风险报告与仪表板
    description: |
      向执行委员会、董事会及风险委员会定期报告风险情况。
  BC-120.40.40:
    name: 风险聚合与集中度分析
    description: |
      汇总企业层面风险并进行集中度视图分析。
  BC-120.50:
    name: 企业保险管理
    description: |
      采购并管理企业保险项目。
  BC-120.50.10:
    name: 保险方案设计
    description: |
      制定各险种的承保策略、自留额及保额。
  BC-120.50.20:
    name: 保险安排与续保
    description: |
      管理经纪人关系、市场询价及保单续保。
  BC-120.50.30:
    name: 保险理赔管理
    description: |
      处理企业保险理赔的申报、处理及追偿。
  BC-120.50.40:
    name: 自保公司管理
    description: |
      运营并治理自保保险载体。
metadata:
  translator: Claude (zh-Hans automated)

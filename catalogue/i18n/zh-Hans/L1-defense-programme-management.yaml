locale: zh-Hans
source: L1-defense-programme-management.yaml
entries:
  BC-1760:
    name: 国防项目群管理
    description: |
      覆盖大型项目群交付、挣值管理、项目治理与分包商管理，确保国防合同的高效执行。
  BC-1760.10:
    name: 项目采办管理
    description: |
      统筹采办策略制定、项目规划与里程碑评审，推动项目顺利推进。
  BC-1760.10.10:
    name: 采办策略制定
    description: |
      制定符合DoD 5000或等效标准的采办策略。
  BC-1760.10.20:
    name: 项目规划与基线制定
    description: |
      开展项目规划与综合主进度计划基线制定。
  BC-1760.10.30:
    name: 里程碑决策评审
    description: |
      准备并主持里程碑决策评审。
  BC-1760.20:
    name: 项目挣值管理
    description: |
      统筹挣值管理（EVM）、费用/进度绩效分析与综合基线评审，实现项目绩效透明化。
  BC-1760.20.10:
    name: 挣值管理系统运营
    description: |
      运营符合EIA-748标准的挣值管理系统。
  BC-1760.20.20:
    name: 综合基线评审
    description: |
      与客户共同开展综合基线评审。
  BC-1760.20.30:
    name: 费用与进度绩效分析
    description: |
      分析CV、SV、CPI、SPI等指标及趋势。
  BC-1760.20.40:
    name: 完工估算预测
    description: |
      开展EAC完工估算预测与完工绩效指数分析。
  BC-1760.30:
    name: 项目费用与定价管理
    description: |
      统筹费用会计准则合规与政府合同定价，确保合同财务规范性。
  BC-1760.30.10:
    name: 费用会计准则合规
    description: |
      确保符合费用会计准则（CAS）要求。
  BC-1760.30.20:
    name: 政府合同定价
    description: |
      按FAR/DFARS要求开展政府合同定价。
  BC-1760.30.30:
    name: 项目费用估算
    description: |
      开展项目费用估算并编制估算依据文件。
  BC-1760.30.40:
    name: 间接费率管理
    description: |
      测算间接费率并与政府开展费率谈判。
  BC-1760.40:
    name: 政府客户管理
    description: |
      统筹政府客户关系与合同官接口管理，维护良好的政府合作关系。
  BC-1760.40.10:
    name: 合同官接口管理
    description: |
      与合同官及合同官代表开展日常接口管理。
  BC-1760.40.20:
    name: 项目管理办公室互动
    description: |
      与政府项目管理办公室和PMO开展工作互动。
  BC-1760.40.30:
    name: 客户报告与评审
    description: |
      定期提交客户报告并开展项目管理评审。
  BC-1760.50:
    name: 国防分包商管理
    description: |
      统筹国防供应链、条款流通与小企业计划管理，确保供应链合规高效。
  BC-1760.50.10:
    name: 分包商遴选与授标
    description: |
      遴选并授标给国防分包商。
  BC-1760.50.20:
    name: 流通条款管理
    description: |
      向分包商管理FAR/DFARS流通条款。
  BC-1760.50.30:
    name: 分包商绩效管理
    description: |
      对国防分包商开展绩效监控与质量监督。
  BC-1760.50.40:
    name: 小企业计划管理
    description: |
      执行小企业分包计划并提交报告。
  BC-1760.60:
    name: 项目生命周期管理
    description: |
      按DoD 5000或等效框架开展项目生命周期管理，确保里程碑达成。
  BC-1760.60.10:
    name: 生命周期阶段管理
    description: |
      按DoD 5000或等效标准管理项目生命周期各阶段。
  BC-1760.60.20:
    name: 项目风险管理
    description: |
      开展项目级风险与机遇管理。
  BC-1760.60.30:
    name: 项目收尾与移交
    description: |
      完成项目收尾、移交与合同收尾工作。

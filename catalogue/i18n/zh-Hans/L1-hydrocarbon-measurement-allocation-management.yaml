locale: zh-Hans
source: L1-hydrocarbon-measurement-allocation-management.yaml
entries:
  BC-3040:
    name: 油气计量与分配管理
    description: |
      对采出油气开展贸易级计量和分配，涵盖交接计量、跨储层和合作伙伴的产量分配、生产核算、租赁经营报表及计量偏差调查。
  BC-3040.10:
    name: 贸易计量与交接计量
    description: |
      在交接计量点运营、校准和保证贸易级计量仪表。
  BC-3040.10.10:
    name: 贸易计量表运营
    description: |
      对贸易级液体和气体计量表进行日常运营。
  BC-3040.10.20:
    name: 计量表核验与校准
    description: |
      对贸易计量装置进行定期核验和校准。
  BC-3040.10.30:
    name: 交接计量文件管理
    description: |
      签发和交换交接计量单据和证明文件。
  BC-3040.10.40:
    name: 计量误差调查
    description: |
      调查和纠正疑似计量误差事件。
  BC-3040.20:
    name: 产量分配
    description: |
      将计量产量分配回单井、储层和合作伙伴。
  BC-3040.20.10:
    name: 单井产量分配
    description: |
      将设施产出分配回各贡献井。
  BC-3040.20.20:
    name: 储层产量分配
    description: |
      在混采储层和油藏之间进行产量分配。
  BC-3040.20.30:
    name: 合作伙伴产量分配
    description: |
      在权益份额持有人之间分配产量。
  BC-3040.20.40:
    name: 分配核对
    description: |
      对计量数据、产能测试和核算数据的分配结果进行核对。
  BC-3040.30:
    name: 生产核算
    description: |
      开展日产量报告、质量守恒平衡和月度生产核算结账。
  BC-3040.30.10:
    name: 日产量报告
    description: |
      向内外部利益相关方报告日产量数据。
  BC-3040.30.20:
    name: 油气质量守恒平衡
    description: |
      对生产系统进行端对端油气质量守恒平衡。
  BC-3040.30.30:
    name: 生产核算月度结账
    description: |
      完成月度生产核算账目关账并向财务系统传输数据。
  BC-3040.40:
    name: 租赁经营报表管理
    description: |
      编制租赁经营报表、计算特许权使用费及申报采掘税和产量税。
  BC-3040.40.10:
    name: 租赁经营报表编制
    description: |
      为权益份额持有人编制LOS报告。
  BC-3040.40.20:
    name: 特许权使用费计算
    description: |
      在租赁层面计算特许权使用费所有者的产量和价值。
  BC-3040.40.30:
    name: 采掘税与产量税申报
    description: |
      向税务机关申报采掘税和产量税。
  BC-3040.50:
    name: 损耗与偏差分析
    description: |
      调查计量偏差、损耗事件和油气库存失衡问题。
  BC-3040.50.10:
    name: 计量偏差分析
    description: |
      分析计量偏差是否超出允许范围。
  BC-3040.50.20:
    name: 损耗调查
    description: |
      调查各计量点间不可解释的损耗。
  BC-3040.50.30:
    name: 油气库存核对
    description: |
      将实物油气库存与账面记录进行核对。

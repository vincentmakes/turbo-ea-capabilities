locale: zh-Hans
source: L1-crop-production-management.yaml
entries:
  BC-3500:
    name: 作物生产管理
    description: |
      农场耕作运营——耕作制度规划、土壤准备、种植、施肥、植保、灌溉、监测及旱地、园艺和特种作物的产量预测。
  BC-3500.10:
    name: 耕作制度规划
    description: |
      跨农场组合的多季节轮作规划、地块分配、种植窗口及品种选择。
    in_scope:
      - 作物轮作设计
      - 逐地块作物分配
      - 种植窗口规划
      - 品种与杂交种选择
    out_of_scope:
      - 品种试验执行（BC-3530.60）
      - 农艺处方（BC-3530.20）
  BC-3500.10.10:
    name: 轮作规划
    description: |
      平衡土壤健康、市场需求和病虫害周期的多年期轮作设计。
  BC-3500.10.20:
    name: 地块分配规划
    description: |
      为种植季将作物分配至具体地块和田区。
  BC-3500.10.30:
    name: 种植窗口规划
    description: |
      按作物、品种和农业气候区规划最优种植窗口。
  BC-3500.10.40:
    name: 品种选择决策
    description: |
      基于农艺和市场标准选定当季种植的品种和杂交种。
  BC-3500.20:
    name: 土壤准备运营
    description: |
      耕整地、作床及播前土壤改良作业，以建立适宜苗床。
  BC-3500.20.10:
    name: 耕整地作业
    description: |
      常规耕作、少耕及免耕整地作业。
  BC-3500.20.20:
    name: 作床作业
    description: |
      园艺和行间作物生产的起垄、覆膜及作床。
  BC-3500.20.30:
    name: 播前土壤改良施用
    description: |
      施用石灰、石膏和有机质等播前改良剂。
  BC-3500.30:
    name: 种植与播种运营
    description: |
      种子和移栽苗的定植，包括补种决策和植株建成。
  BC-3500.30.10:
    name: 苗床整理
    description: |
      播种前的苗床最终整理。
  BC-3500.30.20:
    name: 种子与移栽苗定植
    description: |
      机械和人工将种子与移栽苗定植于田间。
  BC-3500.30.30:
    name: 补种与补苗作业
    description: |
      初始植株建成失败时的补种与补苗作业。
  BC-3500.40:
    name: 作物施肥运营
    description: |
      通过固体、液体、叶面喷施及水肥一体化方式开展季内养分供给。
  BC-3500.40.10:
    name: 固体化肥施用
    description: |
      撒施、条施及变量施肥等固体化肥施用作业。
  BC-3500.40.20:
    name: 叶面营养施用
    description: |
      生长季内大量元素和微量元素的叶面喷施。
  BC-3500.40.30:
    name: 水肥一体化运营
    description: |
      通过灌溉系统施用养分，包括注入和剂量控制。
  BC-3500.50:
    name: 植保作业运营
    description: |
      化学、生物及机械植保措施的施用及相关记录。
    in_scope:
      - 农药与除草剂施用
      - 生物防控产品施用
      - 机械与热力除草
      - 喷药与施用记录
    out_of_scope:
      - IPM规划（BC-3530.30）
      - MRL符合性监控（BC-3590.50）
  BC-3500.50.10:
    name: 农药施用作业
    description: |
      地面和航空农药施用，包括飘移管理。
  BC-3500.50.20:
    name: 生物防控施用
    description: |
      天敌和生物农药产品的释放施用。
  BC-3500.50.30:
    name: 机械与热力除草
    description: |
      中耕和火焰除草等机械与热力除草作业。
  BC-3500.50.40:
    name: 喷药施用记录
    description: |
      记录包含产品、用量、天气及操作者的田间喷药档案。
  BC-3500.60:
    name: 灌溉运营
    description: |
      控制作物水分状态的日常灌溉计划制订、施水和排水决策。
  BC-3500.60.10:
    name: 灌溉计划制订
    description: |
      基于土壤墒情和作物需水量制订灌溉计划。
  BC-3500.60.20:
    name: 灌溉施水作业
    description: |
      通过喷灌、微灌和地面灌溉系统施水。
  BC-3500.60.30:
    name: 田间排水作业
    description: |
      地表和地下排水作业及地下水位控制。
  BC-3500.70:
    name: 作物监测与田间巡视
    description: |
      通过巡视、传感器及遥感方法开展田间作物健康、病虫害压力和物候的监测。
  BC-3500.70.10:
    name: 田间巡查作业
    description: |
      人工巡查病虫害和作物状况。
  BC-3500.70.20:
    name: 病虫害监测
    description: |
      基于诱捕器和传感器的病虫害压力监测。
  BC-3500.70.30:
    name: 作物物候跟踪
    description: |
      跟踪生育期、积温及物候关键期。
  BC-3500.70.40:
    name: 遥感作物监测
    description: |
      基于卫星、无人机和近地传感器的作物状态监测。
  BC-3500.80:
    name: 作物产量预测
    description: |
      季内及采前产量估算，为采购、物流和商业规划提供支撑。
  BC-3500.80.10:
    name: 季内产量估算
    description: |
      基于作物指数和田间测量的中期产量估算。
  BC-3500.80.20:
    name: 采前产量预测
    description: |
      为收获、储存和采购计划提供支撑的采前产量预测。

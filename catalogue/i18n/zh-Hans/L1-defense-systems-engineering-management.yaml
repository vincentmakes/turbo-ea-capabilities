locale: zh-Hans
source: L1-defense-systems-engineering-management.yaml
entries:
  BC-1770:
    name: 国防系统工程管理
    description: |
      按MIL-STD开展系统工程管理，覆盖需求、体系架构、验证与确认、构型及集成，确保系统满足使命需求。
  BC-1770.10:
    name: 国防需求工程管理
    description: |
      统筹需求获取、分解与追踪，确保系统需求完整、可追溯、可验证。
  BC-1770.10.10:
    name: 利益相关者需求获取
    description: |
      获取利益相关者需求与作战使用需求。
  BC-1770.10.20:
    name: 系统需求分解
    description: |
      将系统需求分解至各子系统层级。
  BC-1770.10.30:
    name: 需求追溯性管理
    description: |
      实现需求到设计和测试的双向追溯。
  BC-1770.10.40:
    name: 需求验证规划
    description: |
      定义验证方法与验收准则。
  BC-1770.20:
    name: 国防系统架构管理
    description: |
      统筹系统架构建模与基线管理，支撑体系架构决策。
  BC-1770.20.10:
    name: 作战与系统架构建模
    description: |
      按DoDAF/MoDAF框架开展作战与系统架构建模。
  BC-1770.20.20:
    name: 架构权衡分析
    description: |
      对不同架构方案开展权衡分析，支持最优方案选择。
  BC-1770.20.30:
    name: 架构基线管理
    description: |
      定义并管控架构基线。
  BC-1770.30:
    name: 国防接口定义管理
    description: |
      统筹接口控制、接口控制文件与接口管理计划，确保系统接口明确受控。
  BC-1770.30.10:
    name: 接口识别
    description: |
      识别系统内部与外部接口。
  BC-1770.30.20:
    name: 接口控制文件管理
    description: |
      撰写并管控接口控制文件（ICD）与接口需求规范（IRS）。
  BC-1770.30.30:
    name: 接口验证
    description: |
      在集成过程中验证接口符合性。
  BC-1770.40:
    name: 国防验证与确认管理
    description: |
      统筹V&V规划与执行，确保系统满足规定要求并适合预期使用。
  BC-1770.40.10:
    name: V&V规划
    description: |
      制定验证与确认策略及计划。
  BC-1770.40.20:
    name: V&V执行
    description: |
      通过分析、演示、检查与测试等方式执行V&V活动。
  BC-1770.40.30:
    name: V&V结果报告
    description: |
      报告V&V结果与不符合项。
  BC-1770.50:
    name: 国防构型管理
    description: |
      统筹构型标识、变更控制、状态核查与审计，维护系统构型完整性。
  BC-1770.50.10:
    name: 国防构型标识
    description: |
      按MIL-HDBK-61要求开展构型标识。
  BC-1770.50.20:
    name: 国防构型变更控制
    description: |
      管控工程变更建议（ECP）、技术状态偏离申请（RFD）与DD-1694变更。
  BC-1770.50.30:
    name: 国防构型状态核查
    description: |
      开展构型状态核查与报告。
  BC-1770.50.40:
    name: 构型审计
    description: |
      开展功能构型审计（FCA）与物理构型审计（PCA）。
  BC-1770.60:
    name: 国防系统集成管理
    description: |
      统筹子系统集成、综合测试与体系集成，验证系统整体性能。
  BC-1770.60.10:
    name: 子系统集成执行
    description: |
      按序执行子系统集成工作。
  BC-1770.60.20:
    name: 综合测试执行
    description: |
      在实验室与外场环境中执行综合测试。
  BC-1770.60.30:
    name: 体系集成
    description: |
      与更广泛的体系架构和联合作战架构开展集成。
metadata:
  translator: Claude (zh-Hans automated)

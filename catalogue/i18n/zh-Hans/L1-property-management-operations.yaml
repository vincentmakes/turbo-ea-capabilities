locale: zh-Hans
source: L1-property-management-operations.yaml
entries:
  BC-4940:
    name: 物业运营
    description: |
      商业、零售和多家庭住宅楼宇的业主方及物业管理方运营，涵盖楼宇服务、供应商和合同管理、工单、入住期间租户服务、安保与生命安全、能源/可持续发展，以及包含公共区域维护费核对的物业会计。有别于酒店物业运营（BC-4060）和企业自用设施（BC-700）。
    in_scope:
      - 日常楼宇运营，包括楼宇管理系统和公共区域
      - 预防性、响应性和法定维保
      - 供应商和服务合同管理（清洁、安保、园艺绿化）
      - 租户迁入/迁出及装修协调
      - 物业安保、消防/生命安全及事故响应
      - 物业能源、用水、废弃物及室内环境
      - 物业会计、租户账单及运营报告
      - 公共区域维护费和服务费核对
    out_of_scope:
      - 酒店及度假村物业运营（BC-4060）
      - 企业自用设施（BC-700）
      - 存量资产商业计划与资本支出战略（BC-4920）
      - 租户获取与租约执行（BC-4950）
  BC-4940.10:
    name: 楼宇运营管理
    description: |
      跨商业、零售和多家庭资产的楼宇服务、楼宇管理系统、公共区域、前台及运营时间计划的日常管理。
  BC-4940.10.10:
    name: 公共区域运营
    description: |
      运营公共区域，包括大堂、走廊和共享配套设施。
  BC-4940.10.20:
    name: 楼宇管理系统运营
    description: |
      运营楼宇管理系统，包括暖通空调、照明和门禁控制。
  BC-4940.10.30:
    name: 物业前台与门禁运营
    description: |
      为租户和访客提供前台、礼宾及门禁服务。
  BC-4940.10.40:
    name: 运营时间与计划管理
    description: |
      管理运营时间、非工作时间请求及节假日安排。
  BC-4940.20:
    name: 物业维保与工单管理
    description: |
      通过工单流程对楼宇系统和面向租户资产进行预防性、响应性和法定维保。
  BC-4940.20.10:
    name: 预防性维保运营
    description: |
      依据计划和资产状况数据开展预防性维保工作。
  BC-4940.20.20:
    name: 响应性维保与工单
    description: |
      处理由租户请求和检查发现触发的响应性维保工单。
  BC-4940.20.30:
    name: 法定与合规检查
    description: |
      开展涵盖电梯、消防系统、燃气和压力系统的法定和合规检查。
  BC-4940.20.40:
    name: 维保报告
    description: |
      向业主和租户报告维保活动、积压情况和服务水平协议绩效。
  BC-4940.30:
    name: 物业供应商与服务合同管理
    description: |
      对清洁、安保、园艺绿化和公用事业供应等物业服务供应商及合同进行入库和管理。
  BC-4940.30.10:
    name: 服务合同入库
    description: |
      对物业服务合同和供应商进行入库管理。
  BC-4940.30.20:
    name: 供应商绩效管理
    description: |
      依据服务水平协议和关键绩效指标对物业供应商绩效进行管理。
  BC-4940.30.30:
    name: 服务规范与服务水平协议定义
    description: |
      为合同物业服务定义服务规范、工作范围和服务水平协议。
  BC-4940.40:
    name: 租户服务与迁移协调
    description: |
      协调租户入驻、迁入/迁出、装修及物业内日常租户服务请求处理。
  BC-4940.40.10:
    name: 租户迁入协调
    description: |
      协调租户迁入，包括门禁、标识和入住引导。
  BC-4940.40.20:
    name: 租户装修协调
    description: |
      协调租户装修施工、承包商进场及业主审批。
  BC-4940.40.30:
    name: 租户迁出与复原
    description: |
      协调租户迁出及租赁区域的复原工作。
  BC-4940.40.40:
    name: 租户服务请求处理
    description: |
      处理入住期间各渠道的租户服务请求。
  BC-4940.50:
    name: 物业安保与生命安全运营
    description: |
      运营物业内的监控、消防与生命安全系统、事故响应及紧急疏散。
  BC-4940.50.10:
    name: 物业监控运营
    description: |
      运营覆盖公共区域和后台区域的闭路电视及监控系统。
  BC-4940.50.20:
    name: 消防与生命安全系统运营
    description: |
      运营火灾探测、灭火及生命安全系统，包括演练。
  BC-4940.50.30:
    name: 物业事故响应
    description: |
      开展涵盖安全、盗窃和安保事件的物业级事故响应。
  BC-4940.50.40:
    name: 紧急疏散运营
    description: |
      在物业执行紧急疏散预案和事故指挥工作。
  BC-4940.60:
    name: 物业能源与可持续发展运营
    description: |
      物业层面能源、用水、废弃物、室内环境及租户分表计量项目的运营。
  BC-4940.60.10:
    name: 物业能源运营
    description: |
      运营物业能源系统并对照目标监控能耗。
  BC-4940.60.20:
    name: 用水与废弃物运营
    description: |
      运营物业用水、废水和废弃物分类项目。
  BC-4940.60.30:
    name: 室内环境质量运营
    description: |
      运营室内空气质量、照明和声学舒适度项目。
  BC-4940.60.40:
    name: 分表计量与租户用量分摊
    description: |
      运营分表计量和租户公用事业消耗分摊系统。
  BC-4940.70:
    name: 物业会计与运营报告
    description: |
      物业层面总账、租户账单和应收款、应付款及业主报告管理。
  BC-4940.70.10:
    name: 物业总账运营
    description: |
      运营物业层面总账和试算平衡。
  BC-4940.70.20:
    name: 租户账单与应收款
    description: |
      开具租金、回收费用及其他费用账单并收缴应收款项。
  BC-4940.70.30:
    name: 物业应付款运营
    description: |
      处理公用事业、供应商和承包商的物业应付账款。
  BC-4940.70.40:
    name: 业主报告包
    description: |
      定期编制涵盖运营绩效和差异情况的业主报告包。
  BC-4940.80:
    name: 公共区域维护费核对
    description: |
      特定的业主-租户会计周期，涵盖公共区域维护费和服务费预算、费用采集、核对及租户审计响应。
  BC-4940.80.10:
    name: 公共区域维护费预算与估算设定
    description: |
      设定年度公共区域维护费和服务费预算及租户估算金额。
  BC-4940.80.20:
    name: 公共区域维护费实际费用采集
    description: |
      采集属于公共区域维护费和服务费范畴的实际可报销费用。
  BC-4940.80.30:
    name: 公共区域维护费核对与结算
    description: |
      核对公共区域维护费实际费用与估算，并与租户完成差额结算。
  BC-4940.80.40:
    name: 租户公共区域维护费审计响应
    description: |
      响应租户对公共区域维护费和服务费权利的审计和检查请求。

locale: zh-Hans
source: L1-change-management.yaml
entries:
  BC-910:
    name: 变革管理
    description: |
      系统规划与执行组织变革，确保变革目标得到有效落地与持续。
  BC-910.10:
    name: 变革战略管理
    description: |
      构建变革愿景、叙事与战略，为变革行动提供方向与依据。
  BC-910.10.10:
    name: 变革愿景与叙事
    description: |
      阐明变革愿景、变革理由与传播叙事。
  BC-910.10.20:
    name: 变革影响评估
    description: |
      识别并评估变革对人员与流程的影响。
  BC-910.10.30:
    name: 变革准备度评估
    description: |
      评估组织对变革的准备程度。
  BC-910.10.40:
    name: 变革计划制定
    description: |
      制定一体化变革管理计划。
  BC-910.20:
    name: 变革利益相关方参与管理
    description: |
      识别并有效参与利益相关方，建立变革支持联盟。
  BC-910.20.10:
    name: 利益相关方识别与图谱绘制
    description: |
      识别并绘制受影响的利益相关方图谱。
  BC-910.20.20:
    name: 赞助者参与
    description: |
      定义赞助联盟并推动高层参与。
  BC-910.20.30:
    name: 变革网络管理
    description: |
      构建并管理变革大使与变革推动者网络。
  BC-910.20.40:
    name: 阻力管理
    description: |
      识别并管理对变革的抵制情绪与行为。
  BC-910.30:
    name: 变革传播与培训管理
    description: |
      通过定向传播与培训支撑变革落地，提升受众变革能力。
  BC-910.30.10:
    name: 变革传播规划
    description: |
      按受众与渠道为变革项目制定传播计划。
  BC-910.30.20:
    name: 变革传播执行
    description: |
      执行传播活动并制作传播素材。
  BC-910.30.30:
    name: 变革培训设计
    description: |
      设计变革培训方案与能力提升路径。
  BC-910.30.40:
    name: 变革培训交付
    description: |
      在变革实施期间开展培训。
  BC-910.40:
    name: 变革采纳与强化管理
    description: |
      跟踪采纳情况并通过强化机制确保变革成果持续。
  BC-910.40.10:
    name: 采纳度衡量
    description: |
      衡量变革的采纳率、使用情况与行为改变。
  BC-910.40.20:
    name: 强化与持续
    description: |
      建立强化机制，巩固新行为方式。
  BC-910.40.30:
    name: 变革过渡期保障管理
    description: |
      实施上线后过渡期（Hypercare）保障支持。
  BC-910.40.40:
    name: 变革经验教训
    description: |
      采集并传播变革经验教训。

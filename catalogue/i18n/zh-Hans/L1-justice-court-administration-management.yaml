locale: zh-Hans
source: L1-justice-court-administration-management.yaml
entries:
  BC-3320:
    name: 司法与法院行政管理
    description: |
      法院行政管理，涵盖案件立案、案件目录与排期、审讯和庭审运营、判决与执行令，以及羁押、缓刑和假释管理及法院记录公开访问。
  BC-3320.10:
    name: 案件立案与启动
    description: |
      受理民事、刑事、家事和行政案件，包括电子立案、费用核定和案件初始分类。
    in_scope:
      - 民事和刑事案件立案
      - 电子立案和文件接收
      - 立案费核定
    out_of_scope:
      - 采购投标抗议裁决（由公共采购与合同管理覆盖）
  BC-3320.10.10:
    name: 案件启动
    description: |
      接收诉状、指控书和立案文件以启动案件。
  BC-3320.10.20:
    name: 法院电子立案
    description: |
      当事人和律师通过电子方式提交法院文件。
  BC-3320.10.30:
    name: 案件分类与编号
    description: |
      按案件类型和庭室进行分类，并分配案件编号。
  BC-3320.10.40:
    name: 法院费用核定
    description: |
      核定、收缴和减免法院立案及动议费用。
  BC-3320.20:
    name: 法院案件目录与排期管理
    description: |
      维护法院案件目录，对案件、听证和庭审进行排期和法官分配。
  BC-3320.20.10:
    name: 案件目录维护
    description: |
      维护总目录和分庭目录及案件事项时间线。
  BC-3320.20.20:
    name: 听证与庭审排期
    description: |
      跨法庭和法官对听证、庭审和动议议程进行排期。
  BC-3320.20.30:
    name: 法官分配
    description: |
      将案件分配给法官并在各庭室之间轮换。
  BC-3320.20.40:
    name: 延期与推迟处理
    description: |
      处理延期和推迟申请及重新排期。
  BC-3320.30:
    name: 听证与庭审运营
    description: |
      为听证和庭审提供运营支持，包括陪审团管理、法庭事务和口译服务。
  BC-3320.30.10:
    name: 陪审团管理
    description: |
      管理陪审员传唤、资格审查、遴选和服务。
  BC-3320.30.20:
    name: 法庭运营
    description: |
      开展法庭事务、安保协调和音视频录制。
  BC-3320.30.30:
    name: 法庭口译服务
    description: |
      提供法庭口译和翻译服务。
  BC-3320.30.40:
    name: 证人与受害者支持
    description: |
      提供证人和受害者支持服务及特殊措施协调。
  BC-3320.40:
    name: 判决与执行令
    description: |
      记录判决和刑罚，开展罚款和赔偿管理，以及法院命令执行。
  BC-3320.40.10:
    name: 判决与刑罚记录
    description: |
      记录判决、刑罚和处置命令。
  BC-3320.40.20:
    name: 罚款与赔偿管理
    description: |
      管理罚款、赔偿令和受害者补偿。
  BC-3320.40.30:
    name: 民事判决执行
    description: |
      通过令状、扣押和查封执行民事判决。
  BC-3320.40.40:
    name: 法院令状签发
    description: |
      依据司法授权签发逮捕令、出庭令和搜查令。
  BC-3320.50:
    name: 羁押与行政管理
    description: |
      对羁押前被告和已判刑犯人开展监狱行政管理。
  BC-3320.50.10:
    name: 在押人员入所与登记
    description: |
      对入所在押人员开展入所登记和风险分类。
  BC-3320.50.20:
    name: 羁押运营
    description: |
      开展日常羁押运营，包括在押人员数量管理和移送。
  BC-3320.50.30:
    name: 在押人员医疗协调
    description: |
      协调在押人员医疗、心理健康和戒瘾服务。
  BC-3320.50.40:
    name: 在押人员项目与康复
    description: |
      管理羁押期间的教育、职业技能和康复项目。
  BC-3320.60:
    name: 缓刑与假释管理
    description: |
      对缓刑、假释和附条件释放的罪犯开展社区监督。
  BC-3320.60.10:
    name: 判前调查
    description: |
      为法院编制判前调查报告和风险需求评估。
  BC-3320.60.20:
    name: 社区监督
    description: |
      对社区中的罪犯开展日常监督。
  BC-3320.60.30:
    name: 假释听证管理
    description: |
      管理假释委员会听证和附条件释放决定。
  BC-3320.60.40:
    name: 违规与撤销处理
    description: |
      处理监督违规和撤销程序。
  BC-3320.70:
    name: 法院记录与公众访问
    description: |
      维护法院记录，并在封存、删除和法定限制条件下向公众提供访问。
  BC-3320.70.10:
    name: 法院记录维护
    description: |
      维护权威法院记录和案件档案。
  BC-3320.70.20:
    name: 公众访问与PACER同等服务
    description: |
      通过PACER同等服务向公众提供法院记录访问。
  BC-3320.70.30:
    name: 记录封存与清除
    description: |
      处理记录封存、清除和记录压制命令。

locale: zh-Hans
source: L1-premium-accounting-management.yaml
entries:
  BC-2150:
    name: 保费核算管理
    description: |
      保费账单、现金收取、经纪人和佣金账户结算、保费准备金和收益机制、催收及保险保费税核算管理。
  BC-2150.10:
    name: 保费账单管理
    description: |
      账单生成、分期付款安排、账单路由和调整管理。
  BC-2150.10.10:
    name: 保费账单生成
    description: |
      按账单周期生成保费账单和对账单。
  BC-2150.10.20:
    name: 分期付款方案配置
    description: |
      配置保费分期付款方案和融资费用。
  BC-2150.10.30:
    name: 直接账单与代理账单路由
    description: |
      在直接账单和代理账单安排之间路由账单。
  BC-2150.10.40:
    name: 账单调整与贷项通知单
    description: |
      批改和注销后签发账单调整和贷项通知单。
  BC-2150.20:
    name: 保费收取管理
    description: |
      付款接收和入账、循环付款运营、退款及锁箱管理。
  BC-2150.20.10:
    name: 付款接收与入账
    description: |
      接收保费付款并入账至保单账户。
  BC-2150.20.20:
    name: 直接借记与循环付款运营
    description: |
      运营直接借记、循环刷卡和长期授权付款方案。
  BC-2150.20.30:
    name: 保费退款处理
    description: |
      批改和注销后的保费退款处理。
  BC-2150.20.40:
    name: 锁箱与现金分配
    description: |
      锁箱接收、现金分配和例外处理。
  BC-2150.30:
    name: 经纪人与代理账户结算
    description: |
      代理对账单、扣除佣金后的保费净额结算及信托账户对账。
  BC-2150.30.10:
    name: 代理对账单生成
    description: |
      为代理生成保费和佣金对账单。
  BC-2150.30.20:
    name: 保费扣除佣金后净额结算
    description: |
      与代理进行扣除佣金后的保费净额结算。
  BC-2150.30.30:
    name: 代理信托账户对账
    description: |
      代理信托账户和 IBA 余额的对账管理。
  BC-2150.40:
    name: 保费准备金与收益管理
    description: |
      未到期保费计算、已赚保费确认及递延获客成本跟踪。
  BC-2150.40.10:
    name: 未到期保费计算
    description: |
      计算在效保单的未到期保费准备金。
  BC-2150.40.20:
    name: 已赚保费确认
    description: |
      按会计期间确认已赚保费。
  BC-2150.40.30:
    name: 递延获客成本跟踪
    description: |
      跨产品队列跟踪递延获客成本（DAC）。
  BC-2150.50:
    name: 催收与追款管理
    description: |
      应收账龄监控、催收运营、欠费注销及坏账核销。
  BC-2150.50.10:
    name: 应收账龄监控
    description: |
      监控投保人和代理的欠费应收账龄。
  BC-2150.50.20:
    name: 催收与提醒运营
    description: |
      催款通知、提醒和欠费沟通管理。
  BC-2150.50.30:
    name: 欠费注销处理
    description: |
      触发未缴保费的注销处理程序。
  BC-2150.50.40:
    name: 坏账核销
    description: |
      对无法收回保费的坏账进行审批和记账核销。
  BC-2150.60:
    name: 税费核算
    description: |
      保险保费税计算、印花税和征费收取及保费税申报支持。
  BC-2150.60.10:
    name: 保险保费税计算
    description: |
      跨司法管辖区和产品类型计算保险保费税。
  BC-2150.60.20:
    name: 印花税与征费收取
    description: |
      收取和缴纳印花税和法定征费。
  BC-2150.60.30:
    name: 保费税申报支持
    description: |
      生成保费税申报所需的基础数据和对账资料。

locale: zh-Hans
source: L1-professional-licensing-and-standards-management.yaml
entries:
  BC-4380:
    name: 执业许可与标准管理
    description: |
      管理专业服务事务所特有的事务所和个人执照、执业机构申报、继续职业教育（CPD/CPE）、新执业标准采纳及职业行为调查。
  BC-4380.10:
    name: 事务所执照与注册管理
    description: |
      跨司法管辖区维护事务所在审计监管机构、律师监管机构及同等机构的执业许可和注册。
  BC-4380.10.10:
    name: 事务所注册维护
    description: |
      维护事务所注册，如PCAOB、FRC RSB、ICAEW事务所注册、SRA认可机构及ABS授权。
  BC-4380.10.20:
    name: 事务所执照续期管理
    description: |
      办理定期续期申报、费用缴纳及事务所执照的配套声明。
  BC-4380.10.30:
    name: 跨司法管辖区执照协调
    description: |
      跨成员所网络和司法管辖区协调事务所执照事宜。
  BC-4380.20:
    name: 个人执业证书管理
    description: |
      捕获和维护专业人员持有的个人执业证书、律师资格、审计资质及其他个人执照。
  BC-4380.20.10:
    name: 执业证书捕获
    description: |
      捕获和核验个人执业证书和资质。
  BC-4380.20.20:
    name: 执业证书续期追踪
    description: |
      追踪个人执业证书的续期周期和前提条件。
  BC-4380.20.30:
    name: 跨境准入管理
    description: |
      管理跨境准入、注册外国律师身份及同等互认安排。
  BC-4380.30:
    name: 继续职业教育管理
    description: |
      规划、交付并记录执业机构和事务所政策要求的继续职业教育（CPD/CPE）学时。
    in_scope:
      - CPD课程规划
      - CPD课程交付与记录
      - CPD证明与学时不足补救
    out_of_scope:
      - 通用学习与发展（BC-300）
  BC-4380.30.10:
    name: CPD要求追踪
    description: |
      按专业人员、资质和司法管辖区追踪CPD学时要求。
  BC-4380.30.20:
    name: CPD课程交付与记录
    description: |
      交付认可的CPD课程，并记录出勤和完成证明。
  BC-4380.30.30:
    name: CPD学时不足补救
    description: |
      在报告截止日期前识别并补救存在CPD学时不足风险的专业人员。
  BC-4380.40:
    name: 执业机构报告
    description: |
      向执业机构、监管机构及监督机构就事务所和个人事项提交定期报告和通知。
  BC-4380.40.10:
    name: 年度报告准备
    description: |
      向执业机构和监管机构准备年度报告和统计申报材料。
  BC-4380.40.20:
    name: 应申报事项报告
    description: |
      报告应申报事项，如辞任、领导层变更及重大违规。
  BC-4380.40.30:
    name: 透明度报告生成
    description: |
      生成审计及其他受监管事务所的法定或自愿透明度报告。
  BC-4380.50:
    name: 执业标准采纳管理
    description: |
      将新修订的执业标准纳入事务所方法论、政策及接洽执行。
  BC-4380.50.10:
    name: 标准变化地平线扫描
    description: |
      扫描与事务所执业相关的执业和监管标准即将发生的变化。
  BC-4380.50.20:
    name: 标准影响评估
    description: |
      评估新标准或修订标准对方法论、培训和工具的影响。
  BC-4380.50.30:
    name: 标准采纳推广
    description: |
      推广实施已采纳标准的方法论、政策和工具更新。
  BC-4380.60:
    name: 职业行为调查管理
    description: |
      管理针对疑似职业不当行为的内部调查、对执业机构调查的应对及专业责任索赔处理。
  BC-4380.60.10:
    name: 内部行为调查
    description: |
      对疑似违反执业标准或事务所行为政策的情况进行内部调查。
  BC-4380.60.20:
    name: 执业机构调查应对
    description: |
      协调事务所对执业机构和纪律裁判所调查的应对工作。
  BC-4380.60.30:
    name: 专业责任索赔管理
    description: |
      管理因接洽工作产生的专业责任索赔及向保险公司的通知。

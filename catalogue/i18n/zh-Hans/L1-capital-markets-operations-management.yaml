locale: zh-Hans
source: L1-capital-markets-operations-management.yaml
entries:
  BC-1380:
    name: 资本市场运营管理
    description: |
      提供交易确认、清算、结算、托管、抵押品、公司行动和对账的全链条后台运营能力，保障资本市场交易的安全准时交割。
  BC-1380.10:
    name: 交易确认管理
    description: |
      负责交易采集、预订、确认和异议处理，确保前台交易准确进入后台处理流程。
  BC-1380.10.10:
    name: 交易采集与预订
    description: |
      将交易采集和预订至前台和中台系统，确保交易记录的准确性。
  BC-1380.10.20:
    name: 交易确认匹配
    description: |
      对交易确认书进行匹配和确认，减少因确认不符引发的结算风险。
  BC-1380.10.30:
    name: 交易异议处理
    description: |
      处理交易异议和未匹配交易，及时消除后台差异。
  BC-1380.20:
    name: 清算管理
    description: |
      管理中央对手方（CCP）清算和清算成员服务，提升交易对手风险管理能力。
  BC-1380.20.10:
    name: CCP 交易提交
    description: |
      向中央对手方（CCP）提交需清算交易，进行集中清算处理。
  BC-1380.20.20:
    name: 清算保证金管理
    description: |
      管理与 CCP 的初始保证金和变动保证金，确保保证金及时足额缴纳。
  BC-1380.20.30:
    name: 清算成员运营
    description: |
      运营直接和客户清算成员服务，为客户提供清算通道。
  BC-1380.30:
    name: 结算管理
    description: |
      管理券款对付（DvP）结算、T+1/T+2 结算周期和结算失败管理，确保证券交易的准时交割。
  BC-1380.30.10:
    name: 交易结算指令生成
    description: |
      为交易生成结算指令，启动证券和资金的交割流程。
  BC-1380.30.20:
    name: 证券结算运营
    description: |
      在中央证券存管机构（CSD）和国际中央证券存管机构（ICSD）开展 DvP 结算运营。
  BC-1380.30.30:
    name: 结算失败管理
    description: |
      识别和处置结算失败（CSDR 框架），降低结算失败对交易方的影响。
  BC-1380.40:
    name: 托管管理
    description: |
      提供证券安全保管和次托管网络管理，保障客户资产的安全持有。
  BC-1380.40.10:
    name: 证券安全保管
    description: |
      为客户和自营账户提供证券安全保管服务，确保资产安全可靠地持有。
  BC-1380.40.20:
    name: 次托管网络管理
    description: |
      管理次托管网络和代理行，确保全球市场的证券持有覆盖。
  BC-1380.40.30:
    name: 托管税务服务
    description: |
      提供与托管相关的税款退还和预扣税服务，为客户最大化税后收益。
  BC-1380.50:
    name: 抵押品管理
    description: |
      管理抵押品、保证金和优化配置，提升抵押品资源的利用效率。
  BC-1380.50.10:
    name: 保证金追缴管理
    description: |
      在双边和 CCP 制度下发出和响应保证金追缴通知，确保保证金及时补缴。
  BC-1380.50.20:
    name: 抵押品调动运营
    description: |
      在各交易对手之间进行抵押品的运营性调动，保障抵押品按时到位。
  BC-1380.50.30:
    name: 抵押品优化
    description: |
      优化抵押品使用和替换方案，降低抵押品持有成本。
  BC-1380.50.40:
    name: 抵押品资格管理
    description: |
      管理抵押品资格规则和折价率的应用，确保抵押品质量符合要求。
  BC-1380.60:
    name: 公司行动管理
    description: |
      处理强制性和自愿性公司行动，确保客户权益得到准确及时的处置。
  BC-1380.60.10:
    name: 公司行动通知
    description: |
      采集公司行动信息并通知客户，确保客户知悉相关权益事项。
  BC-1380.60.20:
    name: 强制性公司行动处理
    description: |
      处理股息、利息和其他强制性公司行动事件，保障客户权益自动到账。
  BC-1380.60.30:
    name: 自愿性公司行动处理
    description: |
      处理包括选择权行使在内的自愿性公司行动，支持客户的主动决策。
  BC-1380.60.40:
    name: 代理投票运营
    description: |
      收集并提交代理投票指令，代表客户行使股东投票权。
  BC-1380.70:
    name: 对账管理
    description: |
      开展往来账户、头寸和现金对账，确保账面记录与实际持有的一致性。
  BC-1380.70.10:
    name: 现金对账
    description: |
      对现金账户（包括往来账户）进行对账，及时发现和处理差异。
  BC-1380.70.20:
    name: 证券头寸对账
    description: |
      对系统和托管机构之间的证券头寸进行对账，确保持仓记录一致。
  BC-1380.70.30:
    name: 交易与前后台对账
    description: |
      开展各系统间的前后台交易对账，识别和消除系统间差异。
  BC-1380.70.40:
    name: 对账差异调查
    description: |
      调查和解决对账差异，确保账务记录的准确性和完整性。
  BC-1380.80:
    name: 证券借贷管理
    description: |
      管理证券借贷业务和相关抵押品运营，为做市和交割需求提供证券流动性支持。
  BC-1380.80.10:
    name: 证券借贷发起
    description: |
      发起证券借出和借入交易，满足市场做市和空头平仓需求。
  BC-1380.80.20:
    name: 证券借贷抵押品运营
    description: |
      管理支持证券借贷业务的抵押品运营，保障抵押品质量和数量满足要求。
  BC-1380.80.30:
    name: 证券借贷费率与返还费计算
    description: |
      计算并完成证券借贷费率和返还费的结算，确保费用收取的准确性。
  BC-1380.80.40:
    name: 证券借贷召回管理
    description: |
      管理借出证券的召回和替代操作，保障证券持有方权益的及时实现。

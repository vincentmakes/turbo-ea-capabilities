locale: zh-Hans
source: L1-audience-viewer-management.yaml
entries:
  BC-3750:
    name: 受众与观众管理
    description: |
      涵盖OTT、IPTV及付费电视平台上直接面向消费者内容服务的观众身份、订阅与权益、多设备认证、互动与留存，以及家长控制管理。
  BC-3750.10:
    name: 观众身份管理
    description: |
      跨服务供给并管理观众账号、家庭构成及联合身份认证。
  BC-3750.10.10:
    name: 观众账号供给
    description: |
      创建并维护观众账号的生命周期，包括账号合并和拆分操作。
  BC-3750.10.20:
    name: 家庭与用户档案管理
    description: |
      在共享账号内管理家庭构成和每位观众的个人档案。
  BC-3750.10.30:
    name: 身份联合认证
    description: |
      将观众身份与运营商、零售商及第三方身份提供方进行联合认证。
  BC-3750.20:
    name: 订阅与权益管理
    description: |
      管理观众订阅及控制内容服务和等级访问权限的权益记录的生命周期。
  BC-3750.20.10:
    name: 订阅套餐注册
    description: |
      将观众注册到订阅、按次付费及广告支持套餐。
  BC-3750.20.20:
    name: 权益授予与撤销
    description: |
      根据订阅、购买及合作伙伴捆绑包授予和撤销内容权益。
  BC-3750.20.30:
    name: 并发流权益
    description: |
      基于权益控制每个账号的并发流数和设备数量。
  BC-3750.30:
    name: 多设备认证
    description: |
      跨设备体系对观众进行认证，包括通过运营商身份提供方的TV-Everywhere流程。
  BC-3750.30.10:
    name: 设备注册
    description: |
      向观众账号注册和注销设备。
  BC-3750.30.20:
    name: 认证会话管理
    description: |
      跨设备管理认证播放会话及令牌生命周期。
  BC-3750.30.30:
    name: TV-Everywhere认证
    description: |
      通过运营商身份提供方对付费电视订户进行认证，以获取OTT权益。
  BC-3750.40:
    name: 观众互动与留存管理
    description: |
      通过建模、旅程设计及干预措施，提升直接面向消费者服务上的内容互动率并降低流失率。
  BC-3750.40.10:
    name: 观看习惯建模
    description: |
      对观众习惯、观看状态及内容偏好进行建模，以驱动互动决策。
  BC-3750.40.20:
    name: 召回与留存计划管理
    description: |
      针对流失风险及已流失观众，设计并执行挽留、召回及留存计划。
  BC-3750.40.30:
    name: 引导激活旅程管理
    description: |
      设计引导新观众完成注册并驱动首次有效观看激活的用户旅程。
  BC-3750.50:
    name: 家长控制与档案限制管理
    description: |
      配置并执行用户档案级内容限制、PIN锁及观看时长限制。
  BC-3750.50.10:
    name: 档案级内容限制
    description: |
      按每个档案对内容进行年龄分级、类别及自定义屏蔽列表限制。
  BC-3750.50.20:
    name: PIN与锁定管理
    description: |
      跨设备和界面管理PIN码、档案锁及购买锁。
  BC-3750.50.30:
    name: 观看限制配置
    description: |
      配置观看时长限制、时段限制及屏幕使用时间控制。

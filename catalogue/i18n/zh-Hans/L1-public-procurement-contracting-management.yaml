locale: zh-Hans
source: L1-public-procurement-contracting-management.yaml
entries:
  BC-3270:
    name: 公共采购与合同管理
    description: |
      依据FAR/DFARS和欧盟采购指令制度开展公共部门采购和合同管理，涵盖采购规划、招标、来源选择、合同授予与执行、供应商绩效、抗议及社会经济项目管理。
  BC-3270.10:
    name: 采购规划
    description: |
      制定采购策略、开展市场调研并规划公共采购工作。
    in_scope:
      - 市场调研与需求整合
      - 采购策略和方法选择
      - 独立政府费用估算编制
    out_of_scope:
      - 非政府采购的跨行业采购策略（由采购管理覆盖）
  BC-3270.10.10:
    name: 市场调研
    description: |
      对需求的供应基础、能力和价格开展市场调研。
  BC-3270.10.20:
    name: 采购策略
    description: |
      选择合同方式、载体和竞争方式。
  BC-3270.10.30:
    name: 独立费用估算
    description: |
      编制独立政府费用估算和预算预留。
  BC-3270.10.40:
    name: 规格与工作说明书编制
    description: |
      编制规格、工作说明书和绩效工作说明书。
  BC-3270.20:
    name: 招标管理
    description: |
      签发招标文件，包括RFP、IFB和RFQ文件、修正案及投标方问题解答。
  BC-3270.20.10:
    name: 招标文件起草
    description: |
      起草RFP、IFB、RFQ和投标文件。
  BC-3270.20.20:
    name: 招标公告发布
    description: |
      在官方通知系统及OJEU/SAM.gov同类平台上发布招标公告。
  BC-3270.20.30:
    name: 投标方问题处理
    description: |
      在招标期间处理投标方问题、修正案和说明。
  BC-3270.20.40:
    name: 投标前会议
    description: |
      召开投标前会议和现场考察。
  BC-3270.30:
    name: 来源选择与评估
    description: |
      依据公布的标准接收、评估和选择投标及方案。
  BC-3270.30.10:
    name: 投标与方案接收
    description: |
      接收、登记和妥善保管投标和方案。
  BC-3270.30.20:
    name: 技术评估
    description: |
      依据规定标准对方案进行技术评估。
  BC-3270.30.30:
    name: 价格与成本分析
    description: |
      对报价进行价格合理性和成本真实性分析。
  BC-3270.30.40:
    name: 资质确定
    description: |
      确定承包商的资质、财务能力和诚信情况。
  BC-3270.40:
    name: 合同授予与签订
    description: |
      作出选择决定、发出授予通知、进行情况通报及签订合同。
  BC-3270.40.10:
    name: 选择决定
    description: |
      作出授予决定并形成来源选择决定文件。
  BC-3270.40.20:
    name: 授予通知与情况通报
    description: |
      发出授予通知、向未中标方发出通知及提供情况通报。
  BC-3270.40.30:
    name: 合同签署与资金义务
    description: |
      签署合同文件并安排资金义务。
  BC-3270.50:
    name: 合同执行与修改
    description: |
      开展日常合同管理，包括合同修改、索赔和合同官员监督。
  BC-3270.50.10:
    name: 可交付成果验收
    description: |
      依据合同要求对可交付成果开展检查和验收。
  BC-3270.50.20:
    name: 合同修改
    description: |
      签发合同修改单、变更令和选项行使文件。
  BC-3270.50.30:
    name: 合同索赔处理
    description: |
      接收和裁决承包商索赔和公平调整申请。
  BC-3270.50.40:
    name: 合同结项
    description: |
      开展最终验收、撤销资金义务及实体和行政结项。
  BC-3270.60:
    name: 供应商绩效管理
    description: |
      记录历史绩效、管理暂停/禁止投标及跟踪承包商资质。
  BC-3270.60.10:
    name: 历史绩效记录
    description: |
      将承包商历史绩效评价录入政府数据库。
  BC-3270.60.20:
    name: 暂停与禁止投标管理
    description: |
      管理针对承包商的暂停和禁止投标程序。
  BC-3270.60.30:
    name: 承包商资质监控
    description: |
      持续监控承包商资质和财务能力。
  BC-3270.70:
    name: 抗议与争议处理
    description: |
      通过行政和法律渠道接收和处理投标抗议和合同争议。
  BC-3270.70.10:
    name: 投标抗议处理
    description: |
      处理授予前和授予后的投标抗议。
  BC-3270.70.20:
    name: 合同争议解决
    description: |
      通过行政和司法途径解决合同争议。
  BC-3270.70.30:
    name: 替代性争议解决
    description: |
      通过调解、仲裁和替代性争议解决方式处理合同争议。
  BC-3270.80:
    name: 专项预留与社会经济项目管理
    description: |
      管理小型企业、少数族裔、女性所有企业及其他社会经济采购优惠和指标。
  BC-3270.80.10:
    name: 专项预留确定
    description: |
      确定小企业和社会经济专项预留的适用性。
  BC-3270.80.20:
    name: 分包计划监督
    description: |
      监督小企业分包计划和报告执行情况。
  BC-3270.80.30:
    name: 社会经济指标报告
    description: |
      跟踪和报告社会经济采购指标和实现情况。

locale: zh-Hans
source: L1-hydrocarbon-production-operations-management.yaml
entries:
  BC-3030:
    name: 油气生产运营管理
    description: |
      从井口到外输的上游地面设施运营，涵盖分离处理、人工举升、流动保障、生产监控及储层压力保持。
  BC-3030.10:
    name: 井口运营管理
    description: |
      井口设备的日常运营、油嘴管理及产能测试。
  BC-3030.10.10:
    name: 井口监控
    description: |
      对井口压力、温度和流量参数进行连续监控。
  BC-3030.10.20:
    name: 井口油嘴管理
    description: |
      通过调整地面油嘴控制产量和生产压差。
  BC-3030.10.30:
    name: 产能测试作业
    description: |
      开展用于产量分配和储层研究的常规及监测性产能测试。
  BC-3030.20:
    name: 地面分离与处理运营
    description: |
      运营油、水、气三相分离、原油稳定、采出水处理及天然气调质的地面设施。
  BC-3030.20.10:
    name: 油、水、气三相分离
    description: |
      在上游设施中对采出流体进行三相分离。
  BC-3030.20.20:
    name: 原油稳定
    description: |
      将采出原油稳定至外输规格要求。
  BC-3030.20.30:
    name: 采出水处理
    description: |
      对采出水进行处理，以满足回注或排放要求。
  BC-3030.20.40:
    name: 天然气脱水与脱硫
    description: |
      对伴生气进行现场脱水和脱硫处理。
  BC-3030.30:
    name: 人工举升管理
    description: |
      人工举升系统的选择、运营和优化。
  BC-3030.30.10:
    name: 气举作业
    description: |
      开展连续和间歇气举作业及监控。
  BC-3030.30.20:
    name: 电潜泵作业
    description: |
      对电潜泵装置进行运营、监控和寿命管理。
  BC-3030.30.30:
    name: 抽油泵作业
    description: |
      对抽油机进行运营和示功图监控。
  BC-3030.30.40:
    name: 人工举升优化
    description: |
      跨举升方式开展人工举升选型和参数综合优化。
  BC-3030.40:
    name: 生产优化与监控
    description: |
      对产量、瓶颈和单井生产绩效进行实时监控和优化，并与预测值进行对比。
  BC-3030.40.10:
    name: 实时生产监控
    description: |
      从作业中心对单井和油田产量进行实时监控。
  BC-3030.40.20:
    name: 单井生产诊断
    description: |
      对低产井开展诊断分析并提出整改建议。
  BC-3030.40.30:
    name: 产量损失核算
    description: |
      对照潜在产量对产量损失进行分类和报告。
  BC-3030.40.40:
    name: 瓶颈识别
    description: |
      识别储层、井筒及地面设施系统的生产瓶颈。
  BC-3030.50:
    name: 流动保障管理
    description: |
      预防和管理生产系统中的水合物、石蜡、沥青质及侵蚀腐蚀等流动保障问题。
  BC-3030.50.10:
    name: 水合物管理
    description: |
      防止和消除流线及立管中的水合物堵塞。
  BC-3030.50.20:
    name: 石蜡与沥青质管理
    description: |
      预防和处理石蜡及沥青质沉积问题。
  BC-3030.50.30:
    name: 侵蚀与腐蚀监测
    description: |
      监控生产流线和设备的侵蚀和腐蚀状况。
  BC-3030.50.40:
    name: 清管作业
    description: |
      对流线进行清洁和检测性清管作业。
  BC-3030.60:
    name: 生产化学品管理
    description: |
      生产化学品的选择、加注及效果监测。
  BC-3030.60.10:
    name: 化学品选型与加注
    description: |
      在井和设施层面制定生产化学品选型和加注策略。
  BC-3030.60.20:
    name: 缓蚀剂管理
    description: |
      实施并监控缓蚀剂处理方案。
  BC-3030.60.30:
    name: 阻垢剂管理
    description: |
      管理阻垢剂挤注和连续处理方案。
  BC-3030.70:
    name: 储层压力保持运营
    description: |
      运营注水和注气系统，并跟踪亏空补偿情况。
  BC-3030.70.10:
    name: 注水作业
    description: |
      运营注入水处理和注水井系统。
  BC-3030.70.20:
    name: 注气作业
    description: |
      运营注气压缩机和注气井系统。
  BC-3030.70.30:
    name: 亏空补偿跟踪
    description: |
      跟踪各生产资产的亏空补偿率。

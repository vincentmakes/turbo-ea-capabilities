locale: zh-Hans
source: L1-guest-traveller-management.yaml
entries:
  BC-4040:
    name: 宾客与旅客管理
    description: |
      在全企业范围内管理单一宾客和旅客记录，涵盖身份、偏好、同意授权、识别、细分及旅行证件/合规数据，独立于任何单一渠道或物业之外。
    in_scope:
      - 单一宾客和旅客档案与身份
      - 偏好、饮食及无障碍需求
      - 同意授权、营销许可及数据主体权利
      - 识别信号传递及等级状态交付
      - 宾客细分与全生命周期价值洞察
      - 旅行证件、APIS及观察名单筛查数据
    out_of_scope:
      - 忠诚度积分累计/兑换引擎（BC-4050）
      - 前台入住执行（BC-4060.10）
      - 通用跨行业CRM运营（BC-400）
  BC-4040.10:
    name: 宾客档案与身份管理
    description: |
      在预订和运营系统间创建、去重并核验单一宾客档案。
  BC-4040.10.10:
    name: 宾客档案创建
    description: |
      从任何来源渠道或接触点创建宾客档案。
  BC-4040.10.20:
    name: 宾客档案去重
    description: |
      通过确定性和概率性匹配对宾客档案进行去重处理。
  BC-4040.10.30:
    name: 宾客身份核验
    description: |
      在高价值或受监管互动场景下核验宾客身份。
  BC-4040.10.40:
    name: 档案合并与主记录决策
    description: |
      合并重复档案并解决属性主记录冲突。
  BC-4040.20:
    name: 宾客偏好与个性化管理
    description: |
      捕获并管理宾客偏好，涵盖入住、饮食及无障碍需求，以及个性化规则。
  BC-4040.20.10:
    name: 入住偏好捕获
    description: |
      捕获入住偏好，如床型、楼层及抵达时间偏好。
  BC-4040.20.20:
    name: 饮食与过敏偏好管理
    description: |
      管理餐饮（F&B）和机上服务的饮食、宗教及过敏偏好。
  BC-4040.20.30:
    name: 无障碍需求管理
    description: |
      管理旅行各接触点的无障碍需求及特殊协助需求。
  BC-4040.20.40:
    name: 个性化规则定义
    description: |
      定义将偏好应用于服务和商品化互动的个性化规则。
  BC-4040.30:
    name: 宾客同意与隐私管理
    description: |
      管理旅行数据中的宾客同意授权、营销许可、数据主体权利及跨境传输合规。
  BC-4040.30.10:
    name: 同意捕获与管理
    description: |
      跨目的和渠道捕获并持续管理同意记录。
  BC-4040.30.20:
    name: 营销许可管理
    description: |
      管理营销许可，包括渠道专属选择加入和退出状态。
  BC-4040.30.30:
    name: 数据主体请求处理
    description: |
      处理数据主体的访问、可携带性、更正及删除请求。
  BC-4040.30.40:
    name: 跨境传输合规
    description: |
      遵守适用于旅客和宾客数据的跨境传输合规要求。
  BC-4040.40:
    name: 宾客识别与等级状态交付
    description: |
      向运营团队传递识别信号和等级状态，确保宾客在各接触点获得一致识别。
    in_scope:
      - 抵达前和物业内识别提示
      - 识别交付记录与闭环
    out_of_scope:
      - 忠诚度计划设计及积分/兑换（BC-4050）
  BC-4040.40.10:
    name: 抵达前识别提示
    description: |
      在宾客抵达前向运营团队传递识别期望提示。
  BC-4040.40.20:
    name: 物业内识别交付
    description: |
      在宾客入住期间由前台、餐饮（F&B）及礼宾团队完成识别交付。
  BC-4040.40.30:
    name: 识别服务记录
    description: |
      记录识别交付事件，用于服务审计和反馈循环。
  BC-4040.40.40:
    name: 识别闭环报告
    description: |
      报告识别闭环率与抵达前识别提示的对比情况。
  BC-4040.50:
    name: 宾客细分与洞察管理
    description: |
      定义宾客细分、建立全生命周期价值和流失模型，生成同期群和行为洞察。
  BC-4040.50.10:
    name: 宾客细分定义
    description: |
      定义并维护用于营销和商品化的宾客细分群体。
  BC-4040.50.20:
    name: 全生命周期价值建模
    description: |
      建立宾客全生命周期价值模型，作为投入和识别决策的依据。
  BC-4040.50.30:
    name: 宾客流失与留存分析
    description: |
      跨细分群体分析宾客流失驱动因素和留存机会。
  BC-4040.50.40:
    name: 同期群与行为洞察
    description: |
      从预订、入住及互动事件中生成同期群和行为洞察。
  BC-4040.60:
    name: 旅客证件与合规数据管理
    description: |
      管理满足承运义务和边境管控要求所需的旅行证件、APIS、签证及观察名单数据。
  BC-4040.60.10:
    name: 旅行证件捕获
    description: |
      捕获护照、身份证及签证数据，用于旅行资格和证件核验。
  BC-4040.60.20:
    name: APIS与预先旅客信息报送
    description: |
      向边境管控机构报送APIS和预先旅客信息。
  BC-4040.60.30:
    name: 签证与ESTA资格参考查询
    description: |
      对照签证、ESTA及同等资格制度进行参考查询。
  BC-4040.60.40:
    name: 安全飞行与禁飞观察名单筛查
    description: |
      对照安全飞行及同等禁飞和观察名单项目筛查旅客。

locale: zh-Hans
source: L1-payments-card-management.yaml
entries:
  BC-1340:
    name: 支付与卡管理
    description: |
      提供支付发起、处理、清算/结算、卡片发行和交易处理的全链条能力，支持安全高效的资金划转服务。
  BC-1340.10:
    name: 支付发起管理
    description: |
      负责支付指令的采集、验证和授权，确保每笔支付指令的准确性和合规性。
  BC-1340.10.10:
    name: 支付指令采集
    description: |
      通过各渠道采集支付指令，启动支付处理流程。
  BC-1340.10.20:
    name: 支付验证
    description: |
      验证支付指令和收款人信息，防范错误支付和欺诈风险。
  BC-1340.10.30:
    name: 支付授权
    description: |
      进行支付授权、身份验证和强客户验证（SCA），保障支付安全。
  BC-1340.10.40:
    name: 支付预通知
    description: |
      对支付发送预通知并确认收款方信息，提升支付透明度和准确性。
  BC-1340.20:
    name: 支付处理管理
    description: |
      开展支付处理、路由和格式转换（ISO 20022），确保支付报文的标准化传递。
  BC-1340.20.10:
    name: 支付报文补充与格式化
    description: |
      对支付报文进行信息补充和 ISO 20022 格式转换，满足不同支付网络的报文规范。
  BC-1340.20.20:
    name: 支付路由
    description: |
      将支付指令路由至适当的支付通道和代理行，优化支付路径。
  BC-1340.20.30:
    name: 支付制裁筛查
    description: |
      对支付指令进行制裁和受限方筛查，确保支付合规性。
  BC-1340.20.40:
    name: 支付查询处理
    description: |
      处理失败、退回和查询支付，确保异常支付得到及时妥善的处置。
  BC-1340.30:
    name: 清算与结算管理
    description: |
      运营国内清算体系（ACH、BACS、SEPA、FPS）及相关结算流程，确保资金准确及时到账。
  BC-1340.30.10:
    name: ACH 与批量清算
    description: |
      运营 ACH、BACS 和批量清算系统，高效处理批量支付指令。
  BC-1340.30.20:
    name: SEPA 清算运营
    description: |
      运营 SEPA 信用转账和直接借记业务，支持欧元区支付一体化。
  BC-1340.30.30:
    name: RTGS 与净额结算
    description: |
      运营实时全额结算（RTGS）和延迟净额结算，满足不同支付场景的结算需求。
  BC-1340.30.40:
    name: 往来账户对账
    description: |
      对我行往来账户和代理行账户进行对账，及时处理对账差异。
  BC-1340.40:
    name: 跨境支付管理
    description: |
      管理国际支付、代理行关系和外汇转换，为客户提供高效便捷的跨境资金服务。
  BC-1340.40.10:
    name: 代理行管理
    description: |
      管理代理行关系和 RMA 授权，建立稳固的跨境支付网络。
  BC-1340.40.20:
    name: 跨境支付路由
    description: |
      通过 SWIFT 和替代支付通道路由跨境支付，寻找最优的支付路径。
  BC-1340.40.30:
    name: 支付外汇转换
    description: |
      为支付业务提供外汇转换、汇率获取和定价服务。
  BC-1340.40.40:
    name: SWIFT GPI 追踪
    description: |
      跟踪 SWIFT GPI 支付状态并向客户提供透明的支付进展信息。
  BC-1340.50:
    name: 实时支付管理
    description: |
      运营实时/即时支付通道，满足 7×24 小时即时到账的客户需求。
  BC-1340.50.10:
    name: 即时支付方案运营
    description: |
      运营 FPS、SCT Inst 及其他即时支付方案，提供秒级到账体验。
  BC-1340.50.20:
    name: 付款请求运营
    description: |
      管理付款请求（Request to Pay）消息和全生命周期，支持新型支付交互场景。
  BC-1340.50.30:
    name: 实时支付流动性
    description: |
      管理 7×24 小时即时支付通道的流动性，确保即时支付的资金保障。
  BC-1340.60:
    name: 卡片发行管理
    description: |
      管理卡片制作、个性化、配送和激活，保障卡片及时准确地交付客户。
  BC-1340.60.10:
    name: 卡片制作与个性化
    description: |
      完成卡片制作、压纹和个性化操作，确保卡片质量符合规范。
  BC-1340.60.20:
    name: 卡片配送与投递
    description: |
      完成实体卡片的配送和密码信函投递，确保卡片安全到达持卡人。
  BC-1340.60.30:
    name: 卡片激活
    description: |
      完成卡片激活和密码管理流程，帮助持卡人快速开始使用卡片。
  BC-1340.60.40:
    name: 数字卡与钱包供给
    description: |
      完成数字卡发行和钱包供给（令牌化），支持移动支付和数字钱包服务。
  BC-1340.70:
    name: 卡片交易处理管理
    description: |
      提供卡片转接、授权、欺诈筛查和争议处理能力，保障卡片交易的安全可靠。
  BC-1340.70.10:
    name: 卡片授权转接
    description: |
      提供实时授权转接和路由服务，确保卡片交易快速准确获得授权。
  BC-1340.70.20:
    name: 卡片欺诈筛查
    description: |
      对卡片交易进行实时欺诈筛查，保护持卡人免受欺诈损失。
  BC-1340.70.30:
    name: 卡片结算与交换费
    description: |
      完成与卡组织的结算、交换费清算，确保资金准确清算到位。
  BC-1340.70.40:
    name: 拒付与争议管理
    description: |
      处理拒付案件和卡组织争议解决，维护持卡人权益。

locale: zh-Hans
source: L1-tax-management.yaml
entries:
  BC-220:
    name: 税务管理
    description: |
      管理直接税和间接税的筹划、合规及申报。
  BC-220.10:
    name: 直接税管理
    description: |
      管理企业所得税筹划、合规及申报。
  BC-220.10.10:
    name: 企业所得税拨备
    description: |
      计算当期税及递延税，制定税务拨备。
  BC-220.10.20:
    name: 企业所得税申报
    description: |
      编制并提交企业所得税申报表。
  BC-220.10.30:
    name: 预提税管理
    description: |
      确定预提税应纳税额、完成缴纳及开具完税证明。
  BC-220.10.40:
    name: 税收亏损与税收抵免管理
    description: |
      利用、监控并预测税收亏损及税收抵免。
  BC-220.20:
    name: 间接税管理
    description: |
      管理增值税、商品和服务税、销售税及关税。
  BC-220.20.10:
    name: 增值税与商品和服务税确定
    description: |
      进行税码映射、供应地点分析及间接税确定。
  BC-220.20.20:
    name: 间接税申报
    description: |
      编制并提交增值税、商品和服务税及销售税申报表。
  BC-220.20.30:
    name: 电子发票与实时申报
    description: |
      向税务机关开具电子发票并实时申报。
  BC-220.20.40:
    name: 关税与消费税管理
    description: |
      开展海关估价、商品归类及消费税行政管理。
  BC-220.30:
    name: 转让定价管理
    description: |
      制定转让定价政策、文档及应对措施。
  BC-220.30.10:
    name: 转让定价政策制定
    description: |
      依据 OECD 指南定义转让定价政策。
  BC-220.30.20:
    name: 转让定价文档
    description: |
      编制主体文档、本地文档及逐国报告。
  BC-220.30.30:
    name: 内部往来收费运营
    description: |
      计算、开票并结算内部往来费用。
  BC-220.30.40:
    name: 转让定价应对
    description: |
      处理税务稽查应对、预约定价安排及相互协商程序。
  BC-220.40:
    name: 税务申报与合规
    description: |
      管理税务申报及法定税务披露。
  BC-220.40.10:
    name: 税务核算与披露
    description: |
      在财务报表中进行税务披露并分析有效税率。
  BC-220.40.20:
    name: 税务合规日历
    description: |
      管理全球税务申报日历及义务跟踪。
  BC-220.40.30:
    name: 逐国报告
    description: |
      提交 OECD BEPS 逐国报告。
  BC-220.40.40:
    name: 税务数据与调节
    description: |
      提取、调节税务数据并完成账面利润与税务申报的勾稽。
  BC-220.50:
    name: 税务筹划与咨询
    description: |
      提供税务架构、咨询及争议处理服务。
  BC-220.50.10:
    name: 战略税务筹划
    description: |
      为运营、融资及供应链设计税务高效架构。
  BC-220.50.20:
    name: 交易税务咨询
    description: |
      为并购及重组提供税务尽职调查及架构设计服务。
  BC-220.50.30:
    name: 税务争议管理
    description: |
      处理税务稽查、争议及争议解决。
  BC-220.50.40:
    name: 税务风险与治理
    description: |
      建立税务风险框架、控制措施及税务战略披露。

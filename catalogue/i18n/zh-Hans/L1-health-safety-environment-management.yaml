locale: zh-Hans
source: L1-health-safety-environment-management.yaml
entries:
  BC-730:
    name: 健康、安全与环境管理
    description: |
      管理 HSE 政策、事件、场所安全及职业健康。
  BC-730.10:
    name: 职业健康管理
    description: |
      管理职业健康、人体工程学及员工健康。
  BC-730.10.10:
    name: 健康监测
    description: |
      对高风险员工群体定期开展职业健康监测。
  BC-730.10.20:
    name: 人体工程学与工作场所健康
    description: |
      开展人体工程学评估及工作场所健康项目。
  BC-730.10.30:
    name: 职业卫生监测
    description: |
      监测噪声、粉尘、化学品及生物暴露情况。
  BC-730.10.40:
    name: 员工健康项目
    description: |
      开展心理、身体及社会健康项目。
  BC-730.20:
    name: 安全管理
    description: |
      管理工作场所安全、行为安全及个人防护装备。
  BC-730.20.10:
    name: 危害识别与风险评估
    description: |
      对作业任务及场所开展危害识别与风险评估。
  BC-730.20.20:
    name: 作业许可证与安全作业系统
    description: |
      管理作业许可证、隔离及安全作业系统。
  BC-730.20.30:
    name: 个人防护装备管理
    description: |
      管理个人防护装备的选型、发放、培训及检查。
  BC-730.20.40:
    name: 行为安全项目
    description: |
      开展行为安全观察、领导力巡查及辅导。
  BC-730.20.50:
    name: 承包商安全管理
    description: |
      对承包商开展资质预审、入厂培训及现场安全监督。
  BC-730.30:
    name: 环境管理
    description: |
      管理排放、水资源、废弃物及环保合规。
  BC-730.30.10:
    name: 环境因素与影响评估
    description: |
      识别环境因素并开展环境影响评估。
  BC-730.30.20:
    name: 排放管理
    description: |
      管理各场所的大气排放、温室气体及污染物。
  BC-730.30.30:
    name: 水资源与废水管理
    description: |
      管理用水、废水处理及排放。
  BC-730.30.40:
    name: 废弃物管理
    description: |
      管理危险及非危险废弃物的处置。
  BC-730.30.50:
    name: 生物多样性与土地管理
    description: |
      开展生物多样性保护、土地利用及修复活动。
  BC-730.40:
    name: 事件与调查管理
    description: |
      管理 HSE 事件、未遂事件及调查。
  BC-730.40.10:
    name: 事件与未遂事件报告
    description: |
      记录并分类 HSE 事件及未遂事件。
  BC-730.40.20:
    name: HSE 事件调查
    description: |
      运用调查方法论开展根本原因分析并总结经验教训。
  BC-730.40.30:
    name: 应急准备与响应
    description: |
      制定场所应急预案、开展演练及协调响应。
  BC-730.40.40:
    name: 过程安全管理
    description: |
      管理过程安全危害、变更管理及重大事故危险控制措施。
  BC-730.50:
    name: HSE 合规与报告
    description: |
      管理 HSE 监管报告及审核。
  BC-730.50.10:
    name: HSE 监管合规
    description: |
      识别并跟踪 HSE 监管义务。
  BC-730.50.20:
    name: HSE 审核与检查
    description: |
      开展内部及外部 HSE 审核与检查。
  BC-730.50.30:
    name: HSE 绩效报告
    description: |
      跟踪 HSE KPI 并向管理层报告（总可记录事故率、工时损失频率等）。
  BC-730.50.40:
    name: HSE 管理体系认证
    description: |
      获取 ISO 45001/ISO 14001 管理体系认证。

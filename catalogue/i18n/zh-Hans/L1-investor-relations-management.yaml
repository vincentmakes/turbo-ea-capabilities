  BC-240.30.20:
    name: 散户股东互动
    description: |
      开展散户股东沟通及推广项目。
  BC-240.30.30:
    name: 年度股东大会协调
    description: |
      协助筹备年度股东大会的物流安排、材料制作及问答。
  BC-240.30.40:
    name: 委托投票与治理互动
    description: |
      与代理顾问及治理型投资者开展互动。
  BC-240.40:
    name: 分析师关系管理
    description: |
      管理卖方和买方分析师互动。
  BC-240.40.10:
    name: 卖方分析师覆盖管理
    description: |
      开展覆盖范围拓展、模型审查及卖方分析师互动。
  BC-240.40.20:
    name: 买方投资者定向开发
    description: |
      识别并定向开发买方投资者。
  BC-240.40.30:
    name: 投资者认知研究
    description: |
      在投资者群体中开展认知研究及反馈调研。

    description: |
      向资本市场传递 ESG 叙事并与评级机构互动。
  BC-240.20:
    name: 业绩周期管理
    description: |
      管理季度业绩公告、分析师电话会及会议记录。
  BC-240.20.10:
    name: 业绩公告准备
    description: |
      起草并发布业绩新闻稿。
  BC-240.20.20:
    name: 分析师电话会管理
    description: |
      准备电话会脚本、问答材料并执行分析师电话会。
  BC-240.20.30:
    name: 市场一致预期与业绩指引管理
    description: |
      跟踪市场一致预期并发布业绩指引。
  BC-240.30:
    name: 股东互动管理
    description: |
      管理年度股东大会、股东会议及散户投资者沟通。
  BC-240.30.10:
    name: 机构投资者互动
    description: |

locale: zh-Hans
source: L1-engineering-discipline-management.yaml
entries:
  BC-1100:
    name: 工程专业管理
    description: |
      管理多专业工程能力资源池，涵盖机械、电气、土建、工艺、仪表与管道专业。
  BC-1100.10:
    name: 机械工程管理
    description: |
      管理机械专业能力，涵盖设备、旋转机械与机械系统工程。
  BC-1100.10.10:
    name: 静设备工程
    description: |
      设计压力容器、热交换器及其他静设备。
  BC-1100.10.20:
    name: 旋转设备工程
    description: |
      负责泵、压缩机、汽轮机及旋转机械工程。
  BC-1100.10.30:
    name: HVAC工程
    description: |
      开展HVAC系统设计与分析。
  BC-1100.10.40:
    name: 机械材料与焊接工程
    description: |
      负责材料选型、焊接规程及防腐设计。
  BC-1100.20:
    name: 电气工程管理
    description: |
      负责电力系统、电气配电与控制电气工程。
  BC-1100.20.10:
    name: 电力系统工程
    description: |
      开展高压与中压电力系统工程设计。
  BC-1100.20.20:
    name: 电气配电设计
    description: |
      设计低压配电、开关柜与负荷清单。
  BC-1100.20.30:
    name: 电气设备规格
    description: |
      制定电动机、变压器与电气设备规格书。
  BC-1100.20.40:
    name: 接地与防雷设计
    description: |
      设计接地、等电位联结与防雷系统。
  BC-1100.30:
    name: 土建与结构工程管理
    description: |
      负责土建工程、钢结构、混凝土、基础与岩土工程。
  BC-1100.30.10:
    name: 钢结构设计
    description: |
      设计钢结构构件与连接节点。
  BC-1100.30.20:
    name: 混凝土与基础设计
    description: |
      设计混凝土结构、基础与配筋方案。
  BC-1100.30.30:
    name: 岩土工程
    description: |
      开展岩土勘察与地基工程。
  BC-1100.30.40:
    name: 场地施工工程
    description: |
      设计场地平整、排水与场地基础设施。
  BC-1100.40:
    name: 工艺工程管理
    description: |
      负责工艺设计、模拟、P&ID、物料与能量平衡及水力计算。
  BC-1100.40.10:
    name: 工艺模拟与建模
    description: |
      开展稳态与动态工艺模拟。
  BC-1100.40.20:
    name: P&ID与PFD开发
    description: |
      编制工艺流程图与管道仪表图。
  BC-1100.40.30:
    name: 物料与能量平衡工程
    description: |
      开展热量与物料平衡及工艺设备选型。
  BC-1100.40.40:
    name: 工艺安全工程
    description: |
      设计泄放与火炬系统，开展SIL分类与工艺安全分析。
  BC-1100.50:
    name: 仪表与控制工程管理
    description: |
      负责现场仪表、自动化与控制系统工程。
  BC-1100.50.10:
    name: 现场仪表工程
    description: |
      制定现场变送器、传感器与执行元件规格。
  BC-1100.50.20:
    name: 控制系统设计
    description: |
      设计DCS与PLC架构及控制回路。
  BC-1100.50.30:
    name: 安全仪表系统设计
    description: |
      按IEC 61511标准设计SIS并开展SIL验证。
  BC-1100.50.40:
    name: 自动化与控制软件工程
    description: |
      开展控制逻辑配置与自动化软件工程。
  BC-1100.60:
    name: 管道工程管理
    description: |
      负责管道设计、布局、轴测图、应力分析与材料选型。
  BC-1100.60.10:
    name: 管道布局设计
    description: |
      绘制管道总布置图与三维管道布局。
  BC-1100.60.20:
    name: 管道应力分析
    description: |
      开展管道应力分析与支架设计。
  BC-1100.60.30:
    name: 管道材料选型
    description: |
      选定管道材料等级、垫片、阀门与保温材料。
  BC-1100.60.40:
    name: 轴测图绘制
    description: |
      绘制管道轴测图并编制物料清单。
  BC-1100.70:
    name: 专业资源与能力管理
    description: |
      管理各专业人才资源池、能力框架与技术职业发展路径。
  BC-1100.70.10:
    name: 工程资源池管理
    description: |
      跨项目分配各专业工程资源。
  BC-1100.70.20:
    name: 工程能力框架
    description: |
      建立专业能力框架与技能矩阵。
  BC-1100.70.30:
    name: 技术职业发展路径管理
    description: |
      管理技术职业晋升通道与特许工程师发展路径。
  BC-1100.70.40:
    name: 工程知识管理
    description: |
      推动工程知识共享、实践社区建设与经验教训积累。

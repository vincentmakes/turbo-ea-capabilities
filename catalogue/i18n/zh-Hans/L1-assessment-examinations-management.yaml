locale: zh-Hans
source: L1-assessment-examinations-management.yaml
entries:
  BC-4740:
    name: 考核与考试管理
    description: |
      对评估与考试进行设计、组织、评分、调控及成绩认定，以证明学生学习成效，并包括学术诚信监督。
  BC-4740.10:
    name: 评估设计与题库管理
    description: |
      设计评估工具并维护经过校准的题库，以支撑一致可靠的考核。
    in_scope:
      - 评估蓝图定义
      - 题目编写与校准
      - 题库维护
    out_of_scope:
      - 课程层面的教学大纲设计（见课程与课程项目管理）
  BC-4740.10.10:
    name: 评估蓝图定义
    description: |
      定义评估蓝图及各考核点与学习成果的权重。
  BC-4740.10.20:
    name: 题目编写与校准
    description: |
      编写评估题目并进行统计校准。
  BC-4740.10.30:
    name: 题库维护
    description: |
      跨版本和曝光周期维护安全题库。
  BC-4740.20:
    name: 考试运营
    description: |
      开展现场及在线考试的运营工作，包括考试安排、监考及远程监考服务。
    in_scope:
      - 考试安排
      - 考场安排与监考
      - 在线与远程监考
    out_of_scope:
      - 日常课堂考核（见教学与学习运营管理）
  BC-4740.20.10:
    name: 考试安排
    description: |
      跨班级、考场及考试形式安排考试。
  BC-4740.20.20:
    name: 考场安排与监考
    description: |
      安排现场考试的考场及监考工作。
  BC-4740.20.30:
    name: 在线与远程监考
    description: |
      运营在线考试的在线与远程监考系统。
  BC-4740.30:
    name: 评分与成绩运营
    description: |
      对学生作品进行评分并计算成绩，包括双评、匿名评分及成绩汇总规则。
    in_scope:
      - 评分标准适用
      - 双评与匿名评分
      - 成绩汇总与计算
    out_of_scope:
      - 权威成绩档案维护（见学籍与档案管理）
  BC-4740.30.10:
    name: 评分标准适用
    description: |
      将评分标准和评分细则应用于学生作品。
  BC-4740.30.20:
    name: 双评与匿名评分
    description: |
      运营双评和匿名评分工作流。
  BC-4740.30.30:
    name: 成绩汇总与计算
    description: |
      将各项分数汇总计算为最终成绩。
  BC-4740.40:
    name: 调控与考试委员会
    description: |
      开展内部调控、外部考官参与，以及考试委员会对成绩认定和升级的决策。
    in_scope:
      - 内部调控
      - 外部考官协调
      - 考试委员会决策
    out_of_scope:
      - 课程项目层面审查（见学术质量与认证管理）
  BC-4740.40.10:
    name: 内部调控
    description: |
      对各评分者和各班级的评分决定进行内部调控。
  BC-4740.40.20:
    name: 外部考官协调
    description: |
      协调外部考官及其报告周期。
  BC-4740.40.30:
    name: 考试委员会决策
    description: |
      由考试委员会就成绩、升级及学位授予作出决定。
  BC-4740.50:
    name: 成绩认定与学位发放
    description: |
      发布成绩并发放学位及资质，包括处理成绩申诉。
    in_scope:
      - 成绩发布
      - 证书与文凭发放
      - 成绩申诉处理
    out_of_scope:
      - 可验证数字证书（见学籍与档案管理）
  BC-4740.50.10:
    name: 成绩发布
    description: |
      向学生发布初步及经审定的成绩。
  BC-4740.50.20:
    name: 证书与文凭发放
    description: |
      发放证明学位授予的证书与文凭。
  BC-4740.50.30:
    name: 成绩申诉处理
    description: |
      处理学生对考核结果的申诉。
  BC-4740.60:
    name: 学术诚信管理
    description: |
      检测、调查和处置学术违规行为，包括抄袭和代写。
    in_scope:
      - 抄袭检测
      - 违规调查
      - 处分与补救
    out_of_scope:
      - 科研不端行为（见科研与奖学金管理）
  BC-4740.60.10:
    name: 抄袭检测
    description: |
      检测提交作品中的抄袭和代写行为。
  BC-4740.60.20:
    name: 违规调查
    description: |
      调查疑似学术违规案例。
  BC-4740.60.30:
    name: 处分与补救
    description: |
      对确认的违规行为实施处分并推进补救措施。

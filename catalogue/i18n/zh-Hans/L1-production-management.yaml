locale: zh-Hans
source: L1-production-management.yaml
entries:
  BC-1000:
    name: 生产管理
    description: |
      在企业层面统筹物理产品的生产规划、调度与执行，确保产量与成本目标达成。
  BC-1000.10:
    name: 生产战略管理
    description: |
      制定生产布局、自制/外包与产能战略，支撑长期制造竞争力。
  BC-1000.10.10:
    name: 制造布局战略
    description: |
      规划长期制造布局与各工厂职能定位。
  BC-1000.10.20:
    name: 自制或外包战略
    description: |
      按产品线制定自制/外包与外委战略。
  BC-1000.10.30:
    name: 产能战略
    description: |
      制定长期产能战略与资本扩张规划。
  BC-1000.10.40:
    name: 制造运营模式设计
    description: |
      设计制造运营模式与治理架构。
  BC-1000.20:
    name: 生产计划管理
    description: |
      制定主生产计划，开展中期（周至月度）生产规划。
  BC-1000.20.10:
    name: 主生产计划编制
    description: |
      跨工厂生成主生产计划。
  BC-1000.20.20:
    name: 粗产能规划
    description: |
      对照主计划开展粗产能校验。
  BC-1000.20.30:
    name: 中期生产规划
    description: |
      按生产线开展周度与月度生产计划制定。
  BC-1000.20.40:
    name: 生产计划平衡
    description: |
      平衡生产计划与供需实际情况。
  BC-1000.30:
    name: 生产排程管理
    description: |
      开展详细排程与顺序优化（以小时至天为单位）。
  BC-1000.30.10:
    name: 有限产能详细排程
    description: |
      在机器与产线层面开展有限产能排程。
  BC-1000.30.20:
    name: 顺序优化
    description: |
      优化生产顺序以减少换型损失与浪费。
  BC-1000.30.30:
    name: 计划达成率监控
    description: |
      监控计划达成情况并开展滚动调整。
  BC-1000.30.40:
    name: 生产工单下达
    description: |
      向车间下达生产工单。
  BC-1000.40:
    name: 生产执行管理
    description: |
      实施生产执行监控、派工与实时管控，确保计划按时完成。
  BC-1000.40.10:
    name: 生产工单派工
    description: |
      向工作中心派发生产工单。
  BC-1000.40.20:
    name: 生产状态跟踪
    description: |
      实时跟踪生产工单状态。
  BC-1000.40.30:
    name: 生产异常处理
    description: |
      处理生产异常与升级事项。
  BC-1000.40.40:
    name: 生产工单结算
    description: |
      确认、结算并关闭生产工单。
  BC-1000.50:
    name: 生产绩效管理
    description: |
      管理OEE、产量、良率与生产KPI，推动生产效率持续提升。
  BC-1000.50.10:
    name: OEE测量
    description: |
      测量并报告设备综合效率（OEE）。
  BC-1000.50.20:
    name: 产量与良率分析
    description: |
      分析生产产量、良率与首通率。
  BC-1000.50.30:
    name: 停机与损失分析
    description: |
      对停机进行分类，开展损失树分析。
  BC-1000.50.40:
    name: 生产绩效报告
    description: |
      输出工厂绩效报告与对标分析。
  BC-1000.60:
    name: 生产成本管理
    description: |
      管理标准成本、生产差异与成本分析，提升成本透明度。
  BC-1000.60.10:
    name: 标准成本设定
    description: |
      设定并重估产品标准成本。
  BC-1000.60.20:
    name: 生产差异分析
    description: |
      分析材料、人工与制造费用差异。
  BC-1000.60.30:
    name: 生产成本报告
    description: |
      定期输出生产成本报告与对标分析。

locale: zh-Hans
source: L1-telecom-product-catalogue-management.yaml
entries:
  BC-2650:
    name: 电信产品目录管理
    description: |
      面向消费者、企业和批发市场，对电信产品、资费、套餐、捆绑包和促销的设计、配置、生命周期管理和渠道发布进行管理。
  BC-2650.10:
    name: 产品报价设计
    description: |
      设计新商业报价，包括功能特性、资格条件和定价结构。
  BC-2650.10.10:
    name: 报价规格定义
    description: |
      定义报价的构成内容、功能特性和面向客户的条款。
  BC-2650.10.20:
    name: 技术产品可行性验证
    description: |
      验证拟推出的报价在目标网络和平台上是否具备技术可交付性。
  BC-2650.10.30:
    name: 定价层级设计
    description: |
      为报价设计定价层级、资格规则和合同结构。
  BC-2650.20:
    name: 资费与套餐管理
    description: |
      定义和管理支撑报价的资费、月租费和合理使用政策的全生命周期。
  BC-2650.20.10:
    name: 使用量资费定义
    description: |
      按业务类型和司法管辖区定义按事件和按单位计算的使用量资费。
  BC-2650.20.20:
    name: 月租费定义
    description: |
      定义月租费、包月费和合同相关费用。
  BC-2650.20.30:
    name: 合理使用政策管理
    description: |
      定义和管理不限量及高用量套餐的合理使用和可接受使用政策的全生命周期。
  BC-2650.30:
    name: 捆绑包与促销管理
    description: |
      组合多产品捆绑包的构成方式和限时促销规则。
  BC-2650.30.10:
    name: 捆绑包组合
    description: |
      组合涵盖移动、固定、内容和设备的多业务捆绑包。
  BC-2650.30.20:
    name: 促销资格规则
    description: |
      定义促销活动的客户级和报价级资格规则。
  BC-2650.30.30:
    name: 折扣叠加规则
    description: |
      规范同一账户上多个折扣和促销的叠加规则。
  BC-2650.40:
    name: 产品目录发布
    description: |
      向渠道和合作伙伴发布目录版本，并进行版本控制和区域差异化管理。
  BC-2650.40.10:
    name: 多渠道目录发布
    description: |
      向零售、数字、呼叫中心和合作伙伴渠道发布目录内容。
  BC-2650.40.20:
    name: 目录版本控制
    description: |
      对目录内容进行版本控制，包括生效日期和回滚管理。
  BC-2650.40.30:
    name: 区域目录差异管理
    description: |
      基于共享主版本管理区域和品牌级目录差异。
  BC-2650.50:
    name: 电信产品生命周期管理
    description: |
      管理报价从上市、修改、退市到保留遗留套餐的全生命周期。
  BC-2650.50.10:
    name: 报价上市
    description: |
      协调新报价在系统、渠道和区域的上市推广。
  BC-2650.50.20:
    name: 报价修改
    description: |
      对在售报价进行受控修改，并在适用时迁移现有订户。
  BC-2650.50.30:
    name: 报价退市与遗留套餐保留
    description: |
      将报价从在售状态下架，并为现有订户保留旧条款。

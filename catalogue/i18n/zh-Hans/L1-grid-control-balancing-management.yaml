locale: zh-Hans
source: L1-grid-control-balancing-management.yaml
entries:
  BC-3830:
    name: 电网调控与平衡管理
    description: |
      大型电力系统的系统运营商职能，包括发电和负荷的实时平衡、频率和电压控制、备用和辅助服务、运行规划、跨境协调，以及黑启动应急准备。
  BC-3830.10:
    name: 实时系统运营
    description: |
      对系统发电、负荷和联络线交换进行持续实时监控，维持安全运行。
  BC-3830.10.10:
    name: 系统态势感知
    description: |
      在控制中心对发电、负荷和应急裕度保持持续感知。
  BC-3830.10.20:
    name: 实时应急分析
    description: |
      进行实时N-1和N-1-1应急分析，并触发补救措施。
  BC-3830.10.30:
    name: 运行指令签发
    description: |
      向平衡责任方和输电系统运营商签发运行指令。
  BC-3830.20:
    name: 频率与电压控制
    description: |
      通过自动发电控制和无功功率调度实现有功频率和电压的自动调节。
  BC-3830.20.10:
    name: 自动发电控制
    description: |
      AGC调度和区域控制误差管理，实现频率调节。
  BC-3830.20.20:
    name: 无功功率调度
    description: |
      调度无功资源，维持电网电压分布。
  BC-3830.20.30:
    name: 惯量与频率响应管理
    description: |
      管理惯量、快速频率响应及调差服务。
  BC-3830.30:
    name: 运行规划
    description: |
      进行日前和日内系统安全分析、停电评估和运行裕度规划。
  BC-3830.30.10:
    name: 日前安全分析
    description: |
      对运行日进行考虑安全约束的机组组合和应急分析。
  BC-3830.30.20:
    name: 日内再调度
    description: |
      根据预测更新对发电和负荷进行日内再调度。
  BC-3830.30.30:
    name: 季节性运行裕度评估
    description: |
      进行季节性容量裕度和充裕性评估。
  BC-3830.40:
    name: 备用与辅助服务
    description: |
      采购并激活运行备用和辅助服务，包括频率、电压和惯量产品。
  BC-3830.40.10:
    name: 备用采购
    description: |
      采购一次、二次和三次备用产品。
  BC-3830.40.20:
    name: 辅助服务激活
    description: |
      激活并调度已签约辅助服务提供商。
  BC-3830.40.30:
    name: 备用绩效监测
    description: |
      监测备用提供商的绩效和可用性。
  BC-3830.50:
    name: 不平衡结算运营
    description: |
      由系统运营商侧计算并通知平衡责任方的不平衡电量和价格。
  BC-3830.50.10:
    name: 计量电量汇总
    description: |
      按平衡责任方汇总计量电量。
  BC-3830.50.20:
    name: 不平衡电价计算
    description: |
      按市场规则计算系统不平衡电价。
  BC-3830.50.30:
    name: 平衡责任方结算通知
    description: |
      向平衡责任方通知不平衡电量和费用。
  BC-3830.60:
    name: 跨境协调
    description: |
      与邻区输电系统运营商和区域安全协调员协调联络线潮流、再调度和安全运行。
  BC-3830.60.10:
    name: 联络线排程
    description: |
      安排联络线上的物理和商业潮流。
  BC-3830.60.20:
    name: 协调容量计算
    description: |
      与邻区跨竞价区进行协调容量计算。
  BC-3830.60.30:
    name: 跨境再调度与反向交易
    description: |
      实施跨境再调度和反向交易以缓解阻塞。
  BC-3830.70:
    name: 黑启动与恢复规划
    description: |
      维护黑启动合同、恢复方案及针对全系统或局部系统崩溃情景的恢复演练。
  BC-3830.70.10:
    name: 黑启动合同管理
    description: |
      采购和监管黑启动服务合同。
  BC-3830.70.20:
    name: 系统恢复方案维护
    description: |
      维护系统恢复顺序和孤岛方案。
  BC-3830.70.30:
    name: 恢复演练与应急练习
    description: |
      开展运营人员和跨公司恢复演练，并进行事后评审。

locale: zh-Hans
source: L1-insurance-underwriting-management.yaml
entries:
  BC-2130:
    name: 保险承保管理
    description: |
      跨个人、商业和特殊险种的风险评估、定价、承保、拒保和绑定，包括承保权限执行和组合管理。
  BC-2130.10:
    name: 承保风险接收
    description: |
      递交分流、风险数据收集、出险历史检索及第三方数据增强。
  BC-2130.10.10:
    name: 递交分流
    description: |
      对承保递交进行分流并路由至承保团队。
  BC-2130.10.20:
    name: 风险数据收集
    description: |
      从申请人、经纪人和勘查来源收集风险相关数据。
  BC-2130.10.30:
    name: 出险历史检索
    description: |
      从行业机构、前任保险人和共享登记系统检索出险历史。
  BC-2130.10.40:
    name: 第三方数据增强
    description: |
      通过第三方、车联网和 IoT 数据对递交信息进行增强。
  BC-2130.20:
    name: 风险评估与筛选
    description: |
      风险评分、风险集中评估、损失控制勘查及承保转介处理。
  BC-2130.20.10:
    name: 风险评分与建模
    description: |
      应用承保模型、评分卡和机器学习风险评分。
  BC-2130.20.20:
    name: 风险集中评估
    description: |
      评估对在效组合的风险集中情况。
  BC-2130.20.30:
    name: 损失控制勘查协调
    description: |
      协调损失控制勘查和风险工程报告。
  BC-2130.20.40:
    name: 承保转介处理
    description: |
      处理转交高级承保人、权限机构和再保险人的转介事项。
  BC-2130.30:
    name: 承保定价管理
    description: |
      手动定价、计划费率抵扣、经验定价及特殊险种个性化定价。
  BC-2130.30.10:
    name: 手动费率应用
    description: |
      应用已报备产品配置中的手动费率。
  BC-2130.30.20:
    name: 计划费率与抵扣应用
    description: |
      应用计划费率抵扣和附加项。
  BC-2130.30.30:
    name: 经验定价
    description: |
      利用投保人出险历史进行经验定价。
  BC-2130.30.40:
    name: 特殊险种与个性化定价
    description: |
      特殊险种、大型账户和复杂风险的个性化定价。
  BC-2130.40:
    name: 承保决策与权限管理
    description: |
      承保和拒保决策、条款和条件设定、权限执行及绑定。
  BC-2130.40.10:
    name: 承保与拒保决策
    description: |
      对递交进行承保、拒保或反报价决策。
  BC-2130.40.20:
    name: 保障条款与条件设定
    description: |
      设定保障条款、条件、除外责任和保证。
  BC-2130.40.30:
    name: 承保权限执行
    description: |
      执行承保权限限额和转介阈值。
  BC-2130.40.40:
    name: 报价签发与绑定
    description: |
      签发绑定报价和确认承保。
  BC-2130.50:
    name: 承保组合管理
    description: |
      组合结构和限额监控、盈利能力分析及承保行动规划。
  BC-2130.50.10:
    name: 组合结构与限额监控
    description: |
      监控组合结构是否符合风险偏好和集中限额。
  BC-2130.50.20:
    name: 承保盈利能力分析
    description: |
      按细分市场、产品和经纪人分析承保盈利能力。
  BC-2130.50.30:
    name: 承保行动规划
    description: |
      规划承保行动、整改和细分退出措施。
  BC-2130.60:
    name: 承保欺诈与虚假陈述管理
    description: |
      投保申请欺诈筛查、重大虚假陈述调查及承保欺诈报告。
  BC-2130.60.10:
    name: 投保申请欺诈筛查
    description: |
      对保险申请进行欺诈指标筛查。
  BC-2130.60.20:
    name: 重大虚假陈述调查
    description: |
      调查申请中疑似重大虚假陈述。
  BC-2130.60.30:
    name: 承保欺诈报告
    description: |
      向行业登记系统和监管机构报告已确认的承保欺诈。

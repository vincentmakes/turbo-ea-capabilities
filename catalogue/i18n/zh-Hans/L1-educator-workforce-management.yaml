locale: zh-Hans
source: L1-educator-workforce-management.yaml
entries:
  BC-4760:
    name: 教职人员管理
    description: |
      面向教育行业的学术和教学人员全生命周期管理，涵盖招聘、资质认证、终身教职与晋升、教学工作量分配、专业发展及兼职教师管理。与跨行业人力资本管理共同支撑通用人力资源职能。
  BC-4760.10:
    name: 教职人员招聘与任命
    description: |
      定义学术职位，开展面向学术教职人员的搜寻、遴选与任命工作。
    in_scope:
      - 教职职位定义
      - 教职人员搜寻与遴选
      - 教职人员任命与入职
    out_of_scope:
      - 通用员工招聘（见跨行业人力资本管理）
  BC-4760.10.10:
    name: 教职职位定义
    description: |
      定义教职职位、学术职级及学科方向。
  BC-4760.10.20:
    name: 教职人员搜寻与遴选
    description: |
      学术搜寻委员会运营及教职候选人遴选。
  BC-4760.10.30:
    name: 教职人员任命与入职
    description: |
      新教职人员的任命、合同签订及学术入职工作。
  BC-4760.20:
    name: 学术资质认证与资格核查
    description: |
      核查并持续维护教育工作者的学术与专业资质及学科能力。
    in_scope:
      - 教育工作者资格核查
      - 学科资质认证
      - 持续资质维护
    out_of_scope:
      - 跨行业员工认证（见跨行业人力资本管理）
  BC-4760.20.10:
    name: 教育工作者资格核查
    description: |
      核查教育工作者持有的学位、认证及执照。
  BC-4760.20.20:
    name: 学科资质认证
    description: |
      对教育工作者的学科知识和教学能力进行认证。
  BC-4760.20.30:
    name: 持续资质维护
    description: |
      跟踪持续专业资质及更新情况。
  BC-4760.30:
    name: 终身教职与晋升管理
    description: |
      管理终身教职晋升通道、终身教职评审决定及学术晋升流程。
    in_scope:
      - 终身教职通道与试用期管理
      - 终身教职评审与决定
      - 晋升评审与决定
    out_of_scope:
      - 通用绩效管理（见跨行业人力资本管理）
  BC-4760.30.10:
    name: 终身教职通道与试用期管理
    description: |
      管理终身教职通道进展及试用期事务。
  BC-4760.30.20:
    name: 终身教职评审与决定
    description: |
      终身教职评审委员会流程及最终决定。
  BC-4760.30.30:
    name: 晋升评审与决定
    description: |
      跨教职职级的学术晋升评审与决策。
  BC-4760.40:
    name: 教学工作量管理
    description: |
      分配并平衡教学、科研及服务工作量，规划含学术休假在内的学术假期。
    in_scope:
      - 教学任务分配
      - 教学、科研与服务工作量平衡
      - 学术休假规划
    out_of_scope:
      - 通用人力资源假期管理（见跨行业人力资本管理）
  BC-4760.40.10:
    name: 教学任务分配
    description: |
      向教职人员和讲师分配教学任务。
  BC-4760.40.20:
    name: 工作量平衡
    description: |
      平衡教职人员在教学、科研和服务方面的工作量。
  BC-4760.40.30:
    name: 学术休假规划
    description: |
      规划学术休假及休假期间的教学替代安排。
  BC-4760.50:
    name: 学术专业发展
    description: |
      面向学术和教学人员的教学法、学科及入职导向专业发展。
    in_scope:
      - 教学法与教学实践发展
      - 学科专业发展
      - 教育工作者导师指导与入职
    out_of_scope:
      - 通用学习与发展（见跨行业人力资本管理）
  BC-4760.50.10:
    name: 教学法与教学实践发展
    description: |
      提升教育工作者的教学法和教学实践能力。
  BC-4760.50.20:
    name: 学科专业发展
    description: |
      发展学科和专业领域专业知识。
  BC-4760.50.30:
    name: 教育工作者导师指导与入职
    description: |
      为新教育工作者提供导师指导和入职培训项目。
  BC-4760.60:
    name: 教育工作者绩效与同行评审
    description: |
      开展教育工作者专项绩效评审，包括教学观察、同行评审及学术表彰。
    in_scope:
      - 教学观察与同行评审
      - 教育工作者年度绩效评审
      - 教育工作者表彰与奖励
    out_of_scope:
      - 通用员工绩效管理（见跨行业人力资本管理）
  BC-4760.60.10:
    name: 教学观察与同行评审
    description: |
      开展教育工作者教学实践的观察和同行评审。
  BC-4760.60.20:
    name: 年度绩效评审
    description: |
      对学术和教学人员开展年度绩效评审。
  BC-4760.60.30:
    name: 教育工作者表彰与奖励
    description: |
      设立并运营教育工作者表彰和奖励计划。
  BC-4760.70:
    name: 兼职教师管理
    description: |
      管理兼职、课时制及客座教学人员，包括来源拓展、合同管理及质量保证。
    in_scope:
      - 兼职教师资源拓展
      - 课时合同管理
      - 兼职教师融合与质量保证
    out_of_scope:
      - 通用承包商管理（见跨行业供应商管理）
  BC-4760.70.10:
    name: 兼职教师资源拓展
    description: |
      拓展并维护活跃的兼职教师人才库。
  BC-4760.70.20:
    name: 课时合同管理
    description: |
      管理课时制和兼职教学合同。
  BC-4760.70.30:
    name: 兼职教师融合与质量保证
    description: |
      推动兼职教师融入学术规范并持续开展质量保证。

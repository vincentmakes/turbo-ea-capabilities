locale: zh-Hans
source: L1-travel-loyalty-programme-management.yaml
entries:
  BC-4050:
    name: 旅行忠诚度计划管理
    description: |
      设计和运营旅客忠诚度计划，涵盖等级架构、积分累计与兑换引擎、合作伙伴积分、状态管理及会员沟通，独立于宾客记录和渠道平台之外。
    in_scope:
      - 计划等级架构与权益目录
      - 积分累计与兑换引擎，包括合作伙伴积分
      - 等级资格认定、保级及软着陆
      - 会员沟通与里程碑识别运营
    out_of_scope:
      - 宾客档案与身份（BC-4040）
      - 物业内识别交付（BC-4040.40）
      - 营销渠道执行（BC-410）
  BC-4050.10:
    name: 忠诚度计划设计
    description: |
      设计计划架构，包括等级结构、权益目录、积分规则参数及计划条款。
  BC-4050.10.10:
    name: 计划等级架构
    description: |
      设计忠诚度等级架构，包括门槛、权益及晋升规则。
  BC-4050.10.20:
    name: 会员权益目录
    description: |
      制定跨产品和合作伙伴界面的会员权益目录。
  BC-4050.10.30:
    name: 积分规则与倍增定义
    description: |
      定义基础积分规则及等级和产品倍增系数。
  BC-4050.10.40:
    name: 计划条款与条件管理
    description: |
      管理计划条款与条件，包括不同司法管辖区的变体版本。
  BC-4050.20:
    name: 忠诚度积分引擎运营
    description: |
      运营涵盖入住、航班、合作伙伴消费、促销奖励及补录申请的积分引擎。
  BC-4050.20.10:
    name: 入住与航班积分处理
    description: |
      处理来自入住、航班及旅游完成事件的积分。
  BC-4050.20.20:
    name: 合作伙伴消费积分处理
    description: |
      处理来自联名卡及合作伙伴零售消费的积分事件。
  BC-4050.20.30:
    name: 促销奖励积分
    description: |
      按活动规则积累促销奖励积分。
  BC-4050.20.40:
    name: 补录申请处理
    description: |
      处理补录申请及追溯积分调整。
  BC-4050.30:
    name: 忠诚度兑换运营
    description: |
      运营兑换流程，包括奖励可用性计算、现金加积分混合支付及库存结算。
  BC-4050.30.10:
    name: 奖励可用性计算
    description: |
      依据收益库存和预留规则计算奖励可用性。
  BC-4050.30.20:
    name: 奖励兑换预订
    description: |
      在自有品牌和合作伙伴库存中完成奖励兑换预订。
  BC-4050.30.30:
    name: 现金加积分混合兑换
    description: |
      处理同一预订中现金与积分组合支付的兑换流程。
  BC-4050.30.40:
    name: 兑换库存结算
    description: |
      在品牌与合作伙伴账本间结算兑换库存消耗。
  BC-4050.40:
    name: 等级状态管理
    description: |
      运营等级资格认定、晋升、降级、状态匹配计划及软着陆规则。
  BC-4050.40.10:
    name: 等级资格追踪
    description: |
      在计划年度内追踪会员资格活动与等级门槛的对比情况。
  BC-4050.40.20:
    name: 等级晋升与降级操作
    description: |
      在周期边界执行会员晋升、降级和重新认定操作。
  BC-4050.40.30:
    name: 状态匹配与挑战计划
    description: |
      运营面向定向拉新的状态匹配和等级挑战计划。
  BC-4050.40.40:
    name: 软着陆保级规则
    description: |
      为高价值会员制定在资格期内软化等级降级的保级规则。
  BC-4050.50:
    name: 忠诚度合作伙伴计划管理
    description: |
      管理忠诚度合作伙伴，包括信用卡、零售及航空酒店合作伙伴的入驻、配置及结算。
  BC-4050.50.10:
    name: 合作伙伴入驻与合同签署
    description: |
      完成新忠诚度合作伙伴的入驻和合同签署，包括尽职调查和集成。
  BC-4050.50.20:
    name: 合作伙伴积分规则配置
    description: |
      为每个忠诚度合作伙伴配置积分规则和奖励结构。
  BC-4050.50.30:
    name: 合作伙伴结算与对账
    description: |
      结算并对账合作伙伴签发的积分和积分费用。
  BC-4050.50.40:
    name: 合作伙伴绩效管理
    description: |
      依据合同KPI对忠诚度合作伙伴进行绩效管理。
  BC-4050.60:
    name: 忠诚度沟通与识别运营
    description: |
      在忠诚度生命周期中运营会员沟通、里程碑识别及惊喜关怀互动。
  BC-4050.60.10:
    name: 会员生命周期沟通
    description: |
      在入驻、活跃及重新激活阶段向会员发送生命周期沟通。
  BC-4050.60.20:
    name: 里程碑与周年纪念识别
    description: |
      识别会员里程碑、入会周年纪念及等级晋升。
  BC-4050.60.30:
    name: 惊喜关怀运营
    description: |
      运营由会员行为或服务事件触发的惊喜关怀互动。
  BC-4050.60.40:
    name: 会员账单生成
    description: |
      生成涵盖余额、活动及等级进度的会员账单。

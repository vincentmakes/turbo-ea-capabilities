locale: zh-Hans
source: L1-care-coordination-management.yaml
entries:
  BC-2820:
    name: 护理协调管理
    description: |
      协调跨医疗机构、护理场所和诊疗周期的护理，包括转诊管理、案例管理、护理过渡、出院规划、利用率管理和社会决定因素资源对接。
  BC-2820.10:
    name: 转诊管理
    description: |
      端到端管理患者转诊，从医嘱受理到专科匹配、追踪和结案。
  BC-2820.10.10:
    name: 转诊医嘱受理
    description: |
      采集转诊方的转诊医嘱及所需临床背景信息。
  BC-2820.10.20:
    name: 专科匹配
    description: |
      根据临床需求、医疗网络和可及性将转诊与专科医生匹配。
  BC-2820.10.30:
    name: 转诊追踪
    description: |
      跨网络追踪转诊状态、预约和完成情况。
  BC-2820.10.40:
    name: 转诊结案
    description: |
      完成转诊结案，并将会诊报告反馈给转诊方。
  BC-2820.20:
    name: 案例与护理管理
    description: |
      识别、规划并执行针对高风险和复杂患者的案例管理干预。
  BC-2820.20.10:
    name: 案例分层
    description: |
      根据临床和社会风险将患者分层至案例管理级别。
  BC-2820.20.20:
    name: 护理计划制定
    description: |
      制定以患者为中心、包含个性化目标的护理计划。
  BC-2820.20.30:
    name: 护理计划执行
    description: |
      执行并持续评估护理计划干预措施。
  BC-2820.20.40:
    name: 护理管理师分配
    description: |
      分配护理管理师和导航员，并管理案例量。
  BC-2820.30:
    name: 出院规划
    description: |
      规划患者安全出院，包括需求评估、亚急性安置和患者宣教。
  BC-2820.30.10:
    name: 出院需求评估
    description: |
      多学科评估出院后的临床和社会需求。
  BC-2820.30.20:
    name: 出院计划制定
    description: |
      制定包含服务、设备和随访安排的出院计划。
  BC-2820.30.30:
    name: 亚急性安置
    description: |
      将患者安置至熟练护理机构、康复机构和居家健康服务。
  BC-2820.30.40:
    name: 出院宣教
    description: |
      向患者和照护者宣教出院指导、用药和警示症状。
  BC-2820.40:
    name: 护理过渡
    description: |
      协调患者在医疗机构和护理场所之间的过渡，确保连续性、安全性和结果责任。
  BC-2820.40.10:
    name: 护理交接沟通
    description: |
      在过渡节点开展医疗机构和护理团队之间的结构化交接沟通。
  BC-2820.40.20:
    name: 过渡期用药核对
    description: |
      在护理过渡期进行跨过渡节点的用药核对。
  BC-2820.40.30:
    name: 随访预约安排
    description: |
      安排出院后和就诊后的随访预约。
  BC-2820.40.40:
    name: 过渡结果追踪
    description: |
      追踪跨过渡节点的再住院、并发症和结果指标。
  BC-2820.50:
    name: 利用率管理
    description: |
      对照医疗必要性和利用率标准审查和监督入院、持续住院和住院天数。
  BC-2820.50.10:
    name: 入院审查
    description: |
      审查入院的医疗必要性及住院与观察状态的区分。
  BC-2820.50.20:
    name: 持续住院审查
    description: |
      定期审查持续住院是否符合标准。
  BC-2820.50.30:
    name: 住院天数优化
    description: |
      通过识别和解决障碍优化住院天数。
  BC-2820.50.40:
    name: 可避免住院日追踪
    description: |
      采集和分析可避免住院日及其根本原因。
  BC-2820.60:
    name: 社会决定因素与社区资源对接
    description: |
      识别健康社会决定因素，并对接社区资源以支持临床结果。
  BC-2820.60.10:
    name: 社会需求筛查
    description: |
      筛查住房、食品、交通等社会需求。
  BC-2820.60.20:
    name: 社区资源转介
    description: |
      转介至能够满足已识别社会需求的社区资源。
  BC-2820.60.30:
    name: 社会决定因素文档记录
    description: |
      在健康档案中对社会决定因素进行结构化记录。
  BC-2820.60.40:
    name: 闭环转介追踪
    description: |
      对社区转介进行闭环追踪，直至结果和问题解决。

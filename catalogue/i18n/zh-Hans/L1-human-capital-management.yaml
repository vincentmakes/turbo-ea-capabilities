locale: zh-Hans
source: L1-human-capital-management.yaml
entries:
  BC-300:
    name: 人力资本管理
    description: |
      管理员工全生命周期，通常也称为人力资源管理。
  BC-300.10:
    name: 人才招募管理
    description: |
      管理人才寻访、招聘、录用及入职。
  BC-300.10.10:
    name: 劳动力寻访
    description: |
      通过多渠道、内部推荐及人才管道寻访候选人。
  BC-300.10.20:
    name: 候选人筛选与甄选
    description: |
      开展候选人筛选、测评及面试管理。
  BC-300.10.30:
    name: 录用与入职管理
    description: |
      处理录用函发放、谈判、背景调查及劳动合同签订。
  BC-300.10.40:
    name: 员工入职
    description: |
      设计入职前准备、首日体验及入职旅程。
  BC-300.10.50:
    name: 雇主品牌管理
    description: |
      塑造雇主价值主张、雇主品牌活动及雇主声誉。
  BC-300.20:
    name: 人才管理
    description: |
      管理绩效、继任及职业发展。
  BC-300.20.10:
    name: 绩效管理
    description: |
      管理目标设定、绩效评估及反馈周期。
  BC-300.20.20:
    name: 继任规划
    description: |
      识别并培养关键岗位的继任候选人。
  BC-300.20.30:
    name: 职业发展与内部流动
    description: |
      规划职业路径、内部流动及发展计划。
  BC-300.20.40:
    name: 人才盘点与校准
    description: |
      开展人才盘点、校准及九宫格评估。
  BC-300.20.50:
    name: 领导力发展
    description: |
      建立领导力梯队，开展高管发展及教练辅导。
  BC-300.30:
    name: 薪酬与福利管理
    description: |
      管理薪资结构、奖金、股权及福利行政。
  BC-300.30.10:
    name: 岗位体系与职级管理
    description: |
      建立岗位目录、职级及薪级结构。
  BC-300.30.20:
    name: 基本工资管理
    description: |
      管理薪资区间、市场对标及薪资调整周期。
  BC-300.30.30:
    name: 浮动薪酬与激励管理
    description: |
      管理奖金、销售激励及短期激励计划的行政执行。
  BC-300.30.40:
    name: 股权与长期激励行政管理
    description: |
      管理股权计划、限制性股票单位、股票期权及长期激励计划。
  BC-300.30.50:
    name: 福利行政管理
    description: |
      管理医疗、退休及其他员工福利的行政事务。
  BC-300.40:
    name: 学习与发展管理
    description: |
      管理培训、能力建设及认证。
  BC-300.40.10:
    name: 培训需求分析
    description: |
      按职能识别技能差距及培训需求。
  BC-300.40.20:
    name: 学习内容策划
    description: |
      策划并创建内外部学习内容。
  BC-300.40.30:
    name: 学习交付与行政管理
    description: |
      交付并跟踪线下课堂及数字化学习培训。
  BC-300.40.40:
    name: 技能与认证管理
    description: |
      管理技能清单、胜任力及认证跟踪。
  BC-300.40.50:
    name: 学习效果评估
    description: |
      评估学习效果及培训投资 ROI。
  BC-300.50:
    name: 劳动力规划管理
    description: |
      开展劳动力供需战略规划。
  BC-300.50.10:
    name: 劳动力需求预测
    description: |
      按能力、岗位及地点预测劳动力需求。
  BC-300.50.20:
    name: 劳动力供给分析
    description: |
      分析内部供给、人员流失及劳动力市场状况。
  BC-300.50.30:
    name: 战略劳动力计划编制
    description: |
      制定多年期战略劳动力计划及情景方案。
  BC-300.50.40:
    name: 人员编制规划与管控
    description: |
      管理运营层面的人员编制预算及审批流程。
  BC-300.60:
    name: 员工体验管理
    description: |
      管理员工敬业度、内部沟通及工作场所体验。
  BC-300.60.10:
    name: 员工敬业度测量
    description: |
      开展敬业度调查、脉冲调查及倾听项目。
  BC-300.60.20:
    name: 员工旅程设计
    description: |
      设计员工关键时刻及旅程地图。
  BC-300.60.30:
    name: 职场健康
    description: |
      开展心理、身体及财务健康项目。
  BC-300.60.40:
    name: 认可与奖励
    description: |
      推行员工认可项目及非货币性奖励方案。
  BC-300.70:
    name: 人力资源运营管理
    description: |
      管理员工档案、薪资行政及人力资源服务交付。
  BC-300.70.10:
    name: 员工主数据管理
    description: |
      管理员工档案、生命周期事件及主数据完整性。
  BC-300.70.20:
    name: 薪资行政管理
    description: |
      处理薪资核算、法定扣缴及工资单分发。
  BC-300.70.30:
    name: 考勤与缺勤管理
    description: |
      管理工时记录、请假及缺勤管理。
  BC-300.70.40:
    name: 人力资源案件与服务台
    description: |
      提供人力资源服务台、案件管理及一级咨询处理。
  BC-300.70.50:
    name: 人力资源分析与报告
    description: |
      提供劳动力分析、仪表板及法定人力资源报告。
  BC-300.80:
    name: 员工与劳动关系
    description: |
      管理职工代表大会、工会、申诉及劳动法事务。
  BC-300.80.10:
    name: 集体谈判与工会互动
    description: |
      开展集体谈判、协议签订及工会关系维护。
  BC-300.80.20:
    name: 职工代表大会与员工代表制度
    description: |
      开展职工代表大会协商及管理员工代表机构。
  BC-300.80.30:
    name: 申诉与纪律管理
    description: |
      处理申诉、纪律案件及调查事项。
  BC-300.80.40:
    name: 劳动法合规
    description: |
      确保符合劳动法律法规、工时制度及劳工标准。
  BC-300.90:
    name: 多元化、公平与包容管理
    description: |
      管理多元化、公平与包容战略、项目及报告。
  BC-300.90.10:
    name: 多元化战略与治理
    description: |
      制定多元化战略、赞助机制及治理结构。
  BC-300.90.20:
    name: 包容性人才实践
    description: |
      推行包容性人才寻访、招聘及晋升实践。
  BC-300.90.30:
    name: 多元化项目推进
    description: |
      运营员工资源小组、开展意识提升及多元化项目。
  BC-300.90.40:
    name: 薪酬公平与多元化报告
    description: |
      开展薪酬公平分析并披露多元化指标。

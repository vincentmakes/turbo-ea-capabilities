locale: zh-Hans
source: L1-telecom-subscriber-management.yaml
entries:
  BC-2640:
    name: 电信订户管理
    description: |
      管理移动和固定网络中的订户身份、SIM和eSIM全生命周期、号码资源、号码携带、设备身份以及认证和授权。
  BC-2640.10:
    name: 订户身份管理
    description: |
      在订户数据层对订户标识符和档案进行全生命周期管理。
  BC-2640.10.10:
    name: IMSI业务开通
    description: |
      在订户数据存储中分配并开通IMSI及等效标识符。
  BC-2640.10.20:
    name: 订户档案管理
    description: |
      管理HLR、HSS、UDM及等效系统中的订户档案记录。
  BC-2640.10.30:
    name: 订户身份撤销
    description: |
      在销户、欺诈或监管要求情况下撤销订户身份。
  BC-2640.20:
    name: SIM与eSIM生命周期管理
    description: |
      管理实体SIM卡和eSIM档案的全生命周期，包括个人化、分发、换卡和补卡。
  BC-2640.20.10:
    name: 实体SIM开通
    description: |
      完成实体SIM卡的个人化制作和分发。
  BC-2640.20.20:
    name: eSIM档案管理
    description: |
      通过SM-DP+、SM-SR及等效平台管理eSIM档案。
  BC-2640.20.30:
    name: 档案换卡与补卡
    description: |
      处理订户SIM和eSIM档案的换卡和补卡，包括防欺诈流程。
  BC-2640.30:
    name: 号码资源管理
    description: |
      管理监管机构授予的电话号码资源及其业务分配。
  BC-2640.30.10:
    name: 号码块分配
    description: |
      从监管机构获取号码块并分配至内部库存。
  BC-2640.30.20:
    name: 号码库存管理
    description: |
      管理可用、预留、已分配和隔离号码库存。
  BC-2640.30.30:
    name: 号码预留与归还
    description: |
      为订单预留号码，并将未使用号码归还至号码池或监管机构。
  BC-2640.40:
    name: 号码携带管理
    description: |
      处理移动和固定号码的携入和携出，并维护路由参考数据。
  BC-2640.40.10:
    name: 携入管理
    description: |
      处理来自其他运营商的入网号码携带请求。
  BC-2640.40.20:
    name: 携出管理
    description: |
      处理向其他运营商的出网号码携带请求。
  BC-2640.40.30:
    name: 携带路由参考数据维护
    description: |
      维护号码携带路由数据，包括ENUM和中央参考数据库。
  BC-2640.50:
    name: 设备身份管理
    description: |
      注册和控制设备标识符，用于业务资格审核和被盗设备黑名单管理。
  BC-2640.50.10:
    name: IMEI注册
    description: |
      注册设备IMEI并与订户关联，进行业务资格核查。
  BC-2640.50.20:
    name: 设备身份寄存器维护
    description: |
      维护白名单、灰名单和黑名单设备的EIR数据。
  BC-2640.50.30:
    name: 被盗设备黑名单管理
    description: |
      与行业和执法机构注册库合作，将被盗和遗失设备列入黑名单。
  BC-2640.60:
    name: 订户认证与授权
    description: |
      跨接入技术对订户和设备进行认证、授权和计费管理。
  BC-2640.60.10:
    name: 订户认证
    description: |
      使用AAA协议对移动、固定和Wi-Fi接入的订户进行认证。
  BC-2640.60.20:
    name: 授权策略管理
    description: |
      按订户和设备管理业务授权和策略规则。
  BC-2640.60.30:
    name: 计费记录管理
    description: |
      生成和管理AAA计费记录，用于下游计费和分析。
metadata:
  translator: Claude (zh-Hans automated)

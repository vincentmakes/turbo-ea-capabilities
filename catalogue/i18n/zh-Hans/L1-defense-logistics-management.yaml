locale: zh-Hans
source: L1-defense-logistics-management.yaml
entries:
  BC-1720:
    name: 国防后勤管理
    description: |
      覆盖装备战备、维持保障、部署后勤与战区内后勤，确保部队持续作战能力。
  BC-1720.10:
    name: 装备战备管理
    description: |
      统筹战备状态报告与装备/舰队可用率管理，支持作战准备评估。
  BC-1720.10.10:
    name: 装备可用率追踪
    description: |
      追踪装备可用率与可用状态。
  BC-1720.10.20:
    name: 战备状态报告
    description: |
      定期向指挥机构提交战备状态报告。
  BC-1720.10.30:
    name: 任务能力提升
    description: |
      实施提升装备任务能力率的改进举措。
  BC-1720.20:
    name: 国防库存管理
    description: |
      统筹I至IX类军需物资与战争储备品的库存管理。
  BC-1720.20.10:
    name: I至V类物资库存管理
    description: |
      管理给养、燃油、弹药及消耗品库存。
  BC-1720.20.20:
    name: VII至IX类物资库存管理
    description: |
      管理主要装备及维修零部件的库存。
  BC-1720.20.30:
    name: 战争储备物资管理
    description: |
      管理战争储备物资与预置物资库存。
  BC-1720.20.40:
    name: 弹药库存管理
    description: |
      管理弹药与爆炸物库存。
  BC-1720.30:
    name: 部署与运输管理
    description: |
      统筹战略与战术部署后勤，确保兵力与物资的快速投送。
  BC-1720.30.10:
    name: 战略部署规划
    description: |
      制定战略部署与TPFDD（部队配置与部署数据）规划。
  BC-1720.30.20:
    name: 战略运力运营
    description: |
      开展航空、海运与陆运战略运力运营。
  BC-1720.30.30:
    name: 战区内分发
    description: |
      实施战区内分发与维持保障后勤。
  BC-1720.30.40:
    name: 联合接收与后续行动
    description: |
      组织联合接收、集结与后续行动。
  BC-1720.40:
    name: 国防维修保障管理
    description: |
      统筹部队级、中间级与基地级维修，维持装备持续可用性。
  BC-1720.40.10:
    name: 部队级维修
    description: |
      开展部队级（O级）维修保障。
  BC-1720.40.20:
    name: 中间级维修
    description: |
      开展中间级（I级）维修与修理。
  BC-1720.40.30:
    name: 基地级维修
    description: |
      开展基地级（D级）维修与翻修。
  BC-1720.40.40:
    name: 承包商后勤支援
    description: |
      管理承包商后勤支援保障安排。
  BC-1720.50:
    name: 备件与供应管理
    description: |
      统筹初始供应、补充申请与需求满足，确保备件供应充足及时。
  BC-1720.50.10:
    name: 初始供应配置
    description: |
      为新型装备配置初始备件供应。
  BC-1720.50.20:
    name: 备件补充
    description: |
      依据需求与预测开展备件补充申请。
  BC-1720.50.30:
    name: 需求满足追踪
    description: |
      追踪需求满足情况与供应填充率。
  BC-1720.50.40:
    name: 目录编制与编目号管理
    description: |
      开展NATO库存号（NSN）编目与器材识别管理。
metadata:
  translator: Claude (zh-Hans automated)

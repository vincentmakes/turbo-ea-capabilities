locale: zh-Hans
source: L1-content-rights-licensing-management.yaml
entries:
  BC-3720:
    name: 内容版权与许可管理
    description: |
      涵盖视听、音频及编辑内容的版权购入、版权库存、对外许可、体育和音乐版权、版税收入，以及版权清晰与权利链管理。
  BC-3720.10:
    name: 版权购入管理
    description: |
      与版权所有方或制作公司谈判并签署入库内容的版权合同。
  BC-3720.10.10:
    name: 版权谈判支持
    description: |
      为入库内容交易提供条款清单拟定、同类交易分析及谈判支持。
  BC-3720.10.20:
    name: 购入合同管理
    description: |
      起草、签署并维护入库版权合同及补充协议的全生命周期。
  BC-3720.10.30:
    name: 版权窗口期购入追踪
    description: |
      依据合同追踪已购窗口期、版权区域、平台及独家条款。
  BC-3720.20:
    name: 版权库存管理
    description: |
      对已持有版权进行统一库存管理，并为下游节目编排和许可提供可用性查询服务。
  BC-3720.20.10:
    name: 版权窗口期与区域追踪
    description: |
      按片名、版权区域、平台及语言追踪可用版权窗口期。
  BC-3720.20.20:
    name: 禁播期与独家权追踪
    description: |
      追踪制约下游使用的禁播期和独家限制条款。
  BC-3720.20.30:
    name: 版权可用性查询
    description: |
      提供查询服务，判断某片名在特定用途、窗口期及版权区域内是否可授权。
  BC-3720.30:
    name: 对外授权管理
    description: |
      向广播公司、平台及其他第三方出售并全程管理已授权版权的生命周期。
  BC-3720.30.10:
    name: 授权销售管理
    description: |
      跨版权区域和平台的对外授权交易管道、交易结构及成交管理。
  BC-3720.30.20:
    name: 产出协议管理
    description: |
      与下游被许可方签署多片名产出协议和批量交易的管理。
  BC-3720.30.30:
    name: 版权格式许可管理
    description: |
      向本地制作公司和广播商授权非剧情及剧情版权格式与创作圣经。
  BC-3720.40:
    name: 体育与直播活动版权管理
    description: |
      竞标、追踪及利用体育和直播活动版权，包括衍生集锦版权。
  BC-3720.40.10:
    name: 体育版权竞标
    description: |
      为体育和直播活动版权准备投标方案、进行估值并提交应标文件。
  BC-3720.40.20:
    name: 赛事日程版权追踪
    description: |
      依据所持赛事和联赛版权，追踪具体赛事的版权使用情况。
  BC-3720.40.30:
    name: 集锦与片段版权管理
    description: |
      管理用于集锦、短片及社交媒体和数字渠道开发的衍生版权。
  BC-3720.50:
    name: 音乐与表演版权管理
    description: |
      许可并报告音乐和表演版权，包括同步权、机械复制权及公开表演权。
  BC-3720.50.10:
    name: 机械复制权与同步权许可
    description: |
      清理并许可制作和平台中使用音乐的机械复制权和同步权。
  BC-3720.50.20:
    name: 表演权报告
    description: |
      向集体管理组织报告公开表演和广播使用情况。
  BC-3720.50.30:
    name: 音乐使用单管理
    description: |
      向版权组织和权利人制作并分发音乐使用单。
  BC-3720.60:
    name: 版税收入管理
    description: |
      接收、核对并向本企业作为版权所有方的版税收入进行分配。
  BC-3720.60.10:
    name: 版税对账单核对
    description: |
      将被许可方和版权组织发来的版税对账单与持有版权进行核对。
  BC-3720.60.20:
    name: 版税收款入账
    description: |
      将版税收款登记至版权分类账并进行后续会计确认。
  BC-3720.60.30:
    name: 底层版权所有方分配
    description: |
      依据参与条款和分包出版协议，将收到的版税分配给底层版权所有方。
  BC-3720.70:
    name: 版权清晰与权利链管理
    description: |
      核实并记录底层版权和权利链，以支持内容开发并保障错误与遗漏险承保。
  BC-3720.70.10:
    name: 底层版权核实
    description: |
      核实作品中已清理入库的底层文学、音乐及图像版权。
  BC-3720.70.20:
    name: 清晰状态追踪
    description: |
      按素材追踪清晰状态，并管理待处理事项。
  BC-3720.70.30:
    name: 权利链文件管理
    description: |
      维护足以满足错误与遗漏险承保及下游被许可方尽职调查要求的权利链记录。

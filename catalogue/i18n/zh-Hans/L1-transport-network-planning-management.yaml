locale: zh-Hans
source: L1-transport-network-planning-management.yaml
entries:
  BC-2410:
    name: 运输网络规划管理
    description: |
      设计运输网络、线路、枢纽、班期及运输方式组合，确定承运商或第三方物流的服务组合。
  BC-2410.10:
    name: 网络设计管理
    description: |
      对支撑服务组合的枢纽、门户、线路及运输方式组合进行长周期规划与设计。
    in_scope:
      - 枢纽辐射式与点对点结构决策
      - 公路、铁路、海运及空运的多式联运方式设计
    out_of_scope:
      - 货主侧需求驱动的网络设计（BC-520）
  BC-2410.10.10:
    name: 枢纽与门户设计
    description: |
      选址并确定枢纽、门户及集拼中心的规模。
  BC-2410.10.20:
    name: 线路与服务设计
    description: |
      定义起讫地线路及在其上运营的服务产品。
  BC-2410.10.30:
    name: 运输方式组合设计
    description: |
      为各线路及服务层级选择运输方式及多式联运组合。
  BC-2410.20:
    name: 班期规划管理
    description: |
      构建船舶、航班、列车及汽车发班的主班期、舱位及服务时间窗。
  BC-2410.20.10:
    name: 主班期设计
    description: |
      设计定期航次、航班、列车及汽车班次。
  BC-2410.20.20:
    name: 舱位与时间窗规划
    description: |
      为计划服务分配泊位、跑道及廊桥时间窗。
  BC-2410.20.30:
    name: 班期发布
    description: |
      向客户、合作伙伴及订舱渠道发布班期信息。
  BC-2410.30:
    name: 服务产品管理
    description: |
      定义服务产品、时效层级及向客户提供的服务目录。
  BC-2410.30.10:
    name: 服务等级定义
    description: |
      定义快速、标准、延迟及多式联运等服务层级及其承诺时效。
  BC-2410.30.20:
    name: 全程时效设计
    description: |
      设计跨航段及中转的端到端运输时效。
  BC-2410.30.30:
    name: 服务目录管理
    description: |
      维护已发布运输服务目录。
  BC-2410.40:
    name: 运力需求匹配管理
    description: |
      将计划运力与预测需求进行匹配，包括空载设备回运规划。
  BC-2410.40.10:
    name: 需求预测整合
    description: |
      将客户及市场需求预测融入网络规划。
  BC-2410.40.20:
    name: 运力计划对账
    description: |
      将计划运力与需求及约束条件进行对账。
  BC-2410.40.30:
    name: 空载设备回运规划
    description: |
      规划集装箱、拖车及ULD的空载回运。
  BC-2410.50:
    name: 网络优化与仿真
    description: |
      对网络方案及中断场景进行建模、仿真与标杆对比。
  BC-2410.50.10:
    name: 网络建模
    description: |
      构建运输网络分析模型。
  BC-2410.50.20:
    name: 场景仿真
    description: |
      模拟需求变化、中断事件及设计替代方案。
  BC-2410.50.30:
    name: 网络绩效基准测试
    description: |
      将网络成本与服务水平与竞争对手及历史配置进行基准对比。

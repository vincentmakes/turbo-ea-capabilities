locale: zh-Hans
source: L1-programming-scheduling-management.yaml
entries:
  BC-3730:
    name: 节目编排管理
    description: |
      涵盖线性频道排播、电子节目指南管理、点播目录策划、播出列表与串场管理，以及将节目编排需求与版权和采购管道进行匹配协调。
  BC-3730.10:
    name: 线性频道排播
    description: |
      对线性频道和流进行长期、战术性及变更性排播安排。
  BC-3730.10.10:
    name: 长期排播规划
    description: |
      制定与版权窗口期和受众策略对齐的多季度及季节性排播计划。
  BC-3730.10.20:
    name: 战术排播构建
    description: |
      细化到节目和广告时段级别的本周播出排期构建。
  BC-3730.10.30:
    name: 排播变更管理
    description: |
      对临时和紧急排播变更进行受控处理，并向下游发出通知。
  BC-3730.20:
    name: 电子节目指南管理
    description: |
      编写、分发并更新向运营商和终端设备提供的电子节目指南数据。
  BC-3730.20.10:
    name: EPG数据编写
    description: |
      编写用于发布的EPG片名、简介、分级及节目元数据。
  BC-3730.20.20:
    name: EPG向运营商分发
    description: |
      向平台运营商、聚合商及终端设备平台分发EPG数据馈送。
  BC-3730.20.30:
    name: EPG实时更新管理
    description: |
      针对直播超时、体育赛事及突发新闻对EPG数据进行实时更新。
  BC-3730.30:
    name: 点播目录策划
    description: |
      在点播和流媒体界面上策划片名、专题合集及个性化规则。
  BC-3730.30.10:
    name: 片名筛选与策划
    description: |
      在点播目录中对片名进行筛选和编辑包装，包括版权区域可用性管理。
  BC-3730.30.20:
    name: 编辑合集管理
    description: |
      创建并维护面向观众呈现的编辑合集、主题专区及内容行。
  BC-3730.30.30:
    name: 个性化规则编写
    description: |
      编写与机器学习推荐共同作用的个性化业务规则。
  BC-3730.40:
    name: 播出列表与串场管理
    description: |
      为线性频道和全天候流媒体频道构建播出列表及串场内容。
  BC-3730.40.10:
    name: 播出列表构建
    description: |
      构建包含广告时段和间隔内容的定时播出列表，用于自动播出。
  BC-3730.40.20:
    name: 串场与节间管理
    description: |
      编写并管理串场口播、频道标识及节间包装内容。
  BC-3730.40.30:
    name: 合规剪辑与插入管理
    description: |
      针对目标频道和时间段，应用合规剪辑和版本插入。
  BC-3730.50:
    name: 节目采购时段规划
    description: |
      将节目时段需求转化为采购愿望清单，并将已采购版权与排播需求进行匹配。
  BC-3730.50.10:
    name: 时段需求规划
    description: |
      在排播周期内，按类型、时段及目标受众量化时段需求。
  BC-3730.50.20:
    name: 采购愿望清单管理
    description: |
      按优先级排列用于填补已识别时段的片名、版权格式及内容包采购愿望清单。
  BC-3730.50.30:
    name: 节目与版权匹配核对
    description: |
      将已排播次数与持有版权、播出次数及窗口期消耗进行核对。

locale: zh-Hans
source: L1-client-engagement-management.yaml
entries:
  BC-4300:
    name: 客户接洽管理
    description: |
      管理跨法律事务、咨询接洽及审计鉴证接洽的客户接纳、接洽承接、范围界定、动员、变更管控、收尾及持续客户管理的完整生命周期。
  BC-4300.10:
    name: 客户接纳管理
    description: |
      在接受任何接洽之前，完成新客户关系的引入，包括KYC、AML筛查、制裁与PEP核查及实际受益人核实。
    in_scope:
      - 新客户KYC及AML许可
      - 对潜在客户的制裁与PEP筛查
      - 实际受益人和资金来源核查
      - 定期刷新客户KYC档案
    out_of_scope:
      - 独立性与利益冲突评估（BC-4350）
      - 接洽专项风险接受（BC-4300.20）
  BC-4300.10.10:
    name: 客户KYC信息捕获
    description: |
      为潜在和现有客户捕获身份、实际受益人及资金来源信息。
  BC-4300.10.20:
    name: 客户制裁与PEP筛查
    description: |
      对照制裁名单、PEP名单及负面媒体名单筛查客户及实际受益人。
  BC-4300.10.30:
    name: 客户风险评级
    description: |
      对客户关系进行风险评级，以指导尽职调查深度和审查频率。
  BC-4300.10.40:
    name: 定期客户尽职调查刷新
    description: |
      按规定周期刷新客户KYC、所有权及风险评级。
  BC-4300.20:
    name: 接洽承接管理
    description: |
      通过决策工作流决定是否接受或拒绝特定接洽，综合考量独立性与利益冲突许可、产能评估、费用可行性及接洽专项风险评估。
    in_scope:
      - 接洽风险评估
      - 产能与能力核查
      - 接洽出发/取消决策
    out_of_scope:
      - 独立性与利益冲突实质性核查（BC-4350）
      - 拓展与建议书活动（BC-4360）
  BC-4300.20.10:
    name: 接洽风险评估
    description: |
      评估接洽专项风险，包括主题复杂性、客户诚信度及费用可收回性。
  BC-4300.20.20:
    name: 产能与能力核查
    description: |
      确认事务所具备交付该接洽所需的技术能力和人员产能。
  BC-4300.20.30:
    name: 接洽出发/取消决策
    description: |
      由合伙人综合风险、利益冲突、独立性、产能及商业输入做出出发/取消决策。
  BC-4300.30:
    name: 接洽范围与条款管理
    description: |
      定义接洽范围、交付物、假设、费用条款及接洽委托书或保留协议。
    in_scope:
      - 服务范围定义
      - 费用结构与条款起草
      - 接洽委托书或保留协议签发
    out_of_scope:
      - 事务所层面定价策略（BC-4360.50）
      - 拓展阶段建议书（BC-4360.30）
  BC-4300.30.10:
    name: 接洽范围定义
    description: |
      定义接洽的服务内容、交付物、假设、排除项及依赖关系。
  BC-4300.30.20:
    name: 接洽委托书起草
    description: |
      按事务所模板和适用执业标准起草接洽委托书和保留协议。
  BC-4300.30.30:
    name: 接洽条款谈判
    description: |
      与客户就接洽条款进行谈判，包括责任上限、适用法律及争议解决条款。
  BC-4300.30.40:
    name: 接洽委托书执行
    description: |
      完成接洽委托书的签署、对签及存档，作为接洽动员的前提条件。
  BC-4300.40:
    name: 接洽动员管理
    description: |
      完成已接受接洽的运营启动，包括团队组建、启动会、安全数据访问及接洽基础设施搭建。
  BC-4300.40.10:
    name: 接洽团队组建
    description: |
      确认接洽团队中合伙人、经理和工作人员的角色分配。
  BC-4300.40.20:
    name: 接洽启动会管理
    description: |
      组织内部和面向客户的启动会，准备简报材料并确认目标和工作方式。
  BC-4300.40.30:
    name: 接洽数据访问搭建
    description: |
      供给接洽专属的安全数据室、客户门户及访问凭证。
  BC-4300.40.40:
    name: 接洽基础设施搭建
    description: |
      在事务所执业系统中搭建接洽代码、账单结构及事务编号。
  BC-4300.50:
    name: 接洽变更管理
    description: |
      在接洽委托书执行后管控接洽范围、费用、时间表或团队构成的变更。
  BC-4300.50.10:
    name: 范围变更请求处理
    description: |
      捕获、评估并处理来自客户或接洽团队的范围变更请求。
  BC-4300.50.20:
    name: 费用变更审批
    description: |
      审批费用调整、追加保留金及超范围工作授权的工作流。
  BC-4300.50.30:
    name: 接洽委托书修订
    description: |
      签发并执行反映已批准接洽变更的修订和附函。
  BC-4300.60:
    name: 接洽收尾管理
    description: |
      完成已结束接洽的收尾工作，包括交付物移交、工作底稿保留、最终账单触发及接洽复盘。
  BC-4300.60.10:
    name: 交付物移交管理
    description: |
      将报告、意见书及工作成果附带传送单最终交付给客户。
  BC-4300.60.20:
    name: 接洽档案保留设置
    description: |
      关闭接洽档案，配置保留、检索和销毁策略。
  BC-4300.60.30:
    name: 接洽复盘与经验总结
    description: |
      与接洽团队开展接洽后复盘，总结经验教训和改进举措。
  BC-4300.60.40:
    name: 客户收尾沟通
    description: |
      向客户发送收尾沟通，包括最终报告、满意度调查及后续安排。
  BC-4300.70:
    name: 客户管理管理
    description: |
      持续管理战略客户关系，包括关系合伙人问责制、客户账户规划及跨执业部门协调。
    in_scope:
      - 关系合伙人分配
      - 跨多个接洽的客户账户规划
      - 客户满意度追踪
    out_of_scope:
      - 拓展与建议书活动（BC-4360）
      - 通用CRM（BC-3060）
  BC-4300.70.10:
    name: 关系合伙人分配
    description: |
      为每位战略客户分配和轮换主要关系合伙人。
  BC-4300.70.20:
    name: 客户账户规划
    description: |
      跨单一客户的接洽组合进行账户级规划，包括钱包份额和关系目标。
  BC-4300.70.30:
    name: 客户满意度追踪
    description: |
      捕获客户反馈、NPS或同等指标，并对不满意信号进行上报。
  BC-4300.70.40:
    name: 跨执业部门客户协调
    description: |
      协调服务于共同客户的各执业部门和地区。

locale: zh-Hans
source: L1-mine-closure-rehabilitation-management.yaml
entries:
  BC-4470:
    name: 矿山关闭与修复管理
    description: |
      开展矿业用地和基础设施的关闭规划、资金预提、渐进式复垦、退役、关闭后管护工作。
  BC-4470.10:
    name: 关闭规划
    description: |
      从概念到详细关闭计划的制定，包括利益相关方参与和监管机构审批。
    in_scope:
      - 概念和资产全生命周期关闭计划
      - 停产前详细关闭计划修订
      - 监管机构和社区关闭咨询
    out_of_scope:
      - 资金保证工具（BC-4470.20）
  BC-4470.10.10:
    name: 概念关闭计划编制
    description: |
      在项目早期阶段编制概念关闭计划。
  BC-4470.10.20:
    name: 详细关闭计划编制
    description: |
      编制在停产前供监管机构审批的详细关闭计划。
  BC-4470.10.30:
    name: 利益相关方关闭协商
    description: |
      与监管机构、社区和传统土地所有者就关闭结果开展协商。
  BC-4470.20:
    name: 关闭资金预提
    description: |
      开展关闭费用估算、资金保证工具管理和关闭预留金核算。
  BC-4470.20.10:
    name: 关闭费用估算
    description: |
      估算复垦、退役和关闭后活动的关闭费用。
  BC-4470.20.20:
    name: 资金保证工具管理
    description: |
      管理向监管机构缴存的担保金、保函和保证书。
  BC-4470.20.30:
    name: 关闭预留金核算
    description: |
      在财务报表中定期重新计量和确认关闭预留金。
  BC-4470.30:
    name: 渐进式复垦运营
    description: |
      在运营期间同步开展受扰土地的修复工作，包括地形整形、植被恢复和水道修复。
  BC-4470.30.10:
    name: 地形整形
    description: |
      对废石场、坑壁和尾矿地形进行整形，达到稳定的关闭轮廓。
  BC-4470.30.20:
    name: 表土回覆与植被恢复
    description: |
      回覆库存表土并建立本地植被覆盖。
  BC-4470.30.30:
    name: 水道修复
    description: |
      修复已复垦土地上的自然和人工水道。
  BC-4470.30.40:
    name: 基础设施退役
    description: |
      在运营期间对多余运营基础设施进行渐进式退役。
  BC-4470.40:
    name: 矿山场地退役
    description: |
      在停产时开展设施拆除、资产处置和场地清理工作。
  BC-4470.40.10:
    name: 工厂拆除
    description: |
      拆除选矿厂、采矿基础设施和地表建筑。
  BC-4470.40.20:
    name: 资产处置与残值利用
    description: |
      在退役时对采矿和加工资产进行处置、残值利用或转让。
  BC-4470.40.30:
    name: 场地清理运营
    description: |
      在退役时清理受污染土壤、烃类和存储物料。
  BC-4470.50:
    name: 关闭后管护
    description: |
      在停产后开展长期监测、土地归还及遗留负债管理。
  BC-4470.50.10:
    name: 长期监测运营
    description: |
      运营长期水质、岩土工程和植被监测方案。
  BC-4470.50.20:
    name: 土地归还与租赁注销管理
    description: |
      管理土地归还、租赁注销和监管机构最终审批。
  BC-4470.50.30:
    name: 遗留负债追踪
    description: |
      追踪和披露已保留的遗留环境负债。
metadata:
  translator: Claude (zh-Hans automated)

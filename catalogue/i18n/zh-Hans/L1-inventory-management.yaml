locale: zh-Hans
source: L1-inventory-management.yaml
entries:
  BC-530:
    name: 库存管理
    description: |
      管理供应网络中的库存水平、补货及分配。
  BC-530.10:
    name: 库存水平管理
    description: |
      管理目标库存水平、安全库存及补货点。
  BC-530.10.10:
    name: 目标库存与安全库存设定
    description: |
      按 SKU 及库位设定目标库存水平与安全库存。
  BC-530.10.20:
    name: 补货点与最小最大库存管理
    description: |
      管理补货点、最小及最大库存策略。
  BC-530.10.30:
    name: 服务水平优化
    description: |
      在服务水平与库存成本之间进行权衡优化。
  BC-530.10.40:
    name: 库存分类与 ABC 分析
    description: |
      通过 ABC/XYZ 分类实施差异化库存策略。
  BC-530.20:
    name: 补货管理
    description: |
      管理补货策略及自动化补货执行。
  BC-530.20.10:
    name: 补货策略定义
    description: |
      定义补货策略（推式、拉式、看板）。
  BC-530.20.20:
    name: 自动化补货执行
    description: |
      向供应节点执行自动化补货订单。
  BC-530.20.30:
    name: 供应商管理库存运营
    description: |
      管理与供应商的 VMI 及寄售库存安排。
  BC-530.30:
    name: 库存分配管理
    description: |
      管理网络内库存分配及预留。
  BC-530.30.10:
    name: 跨网络分配
    description: |
      在配送中心、门店及渠道间分配可用库存。
  BC-530.30.20:
    name: 客户与订单预留
    description: |
      针对客户订单或账户预留库存。
  BC-530.30.30:
    name: 库存再平衡
    description: |
      在各库位间再平衡库存以匹配需求。
  BC-530.40:
    name: 库存准确性管理
    description: |
      管理循环盘点、全面盘点及差异处理。
  BC-530.40.10:
    name: 循环盘点
    description: |
      按频率和 ABC 分类开展循环盘点项目。
  BC-530.40.20:
    name: 全面实物盘点
    description: |
      开展年度或定期全面实物盘点项目。
  BC-530.40.30:
    name: 差异调查与调整
    description: |
      调查、分析根本原因并调整库存差异。
  BC-530.50:
    name: 滞销与呆滞库存管理
    description: |
      识别、计提并处置滞销库存。
  BC-530.50.10:
    name: 滞销库存识别
    description: |
      识别并统计滞销及呆滞库存账龄。
  BC-530.50.20:
    name: 库存计提与核销
    description: |
      对过期库存进行计提减值及核销处理。
  BC-530.50.30:
    name: 库存处置
    description: |
      通过清仓变卖或报废处置过期库存。

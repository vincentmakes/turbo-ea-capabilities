locale: zh-Hans
source: L1-legal-management.yaml
entries:
  BC-150:
    name: 法律管理
    description: |
      提供法律咨询、合同管理、诉讼及公司法律事务服务。
  BC-150.10:
    name: 合同管理
    description: |
      管理从起草到终止的合同全生命周期。
  BC-150.10.10:
    name: 合同起草与模板管理
    description: |
      维护条款库、模板及谈判策略手册。
  BC-150.10.20:
    name: 合同谈判支持
    description: |
      为谈判、逐行批注及风险立场提供法律支持。
  BC-150.10.30:
    name: 合同签署管理
    description: |
      管理审批流程、签署及执行控制。
  BC-150.10.40:
    name: 合同存储库与义务跟踪
    description: |
      建立中央存储库，跟踪关键日期及合同义务。
  BC-150.10.50:
    name: 合同续签与终止
    description: |
      处理合同续签、修订及终止行政事务。
  BC-150.20:
    name: 诉讼与争议管理
    description: |
      管理争议、诉讼及仲裁事项。
  BC-150.20.10:
    name: 诉前争议处理
    description: |
      处理律师函、调解及诉前谈判。
  BC-150.20.20:
    name: 诉讼案件管理
    description: |
      全程管理法院诉讼事项。
  BC-150.20.30:
    name: 仲裁与替代性争议解决
    description: |
      运用仲裁、调解及其他 ADR 机制解决争议。
  BC-150.20.40:
    name: 诉讼保全与电子取证
    description: |
      处理诉讼保全通知、证据保存及电子取证。
  BC-150.30:
    name: 公司与商事法律
    description: |
      提供公司法、并购法律支持及商业交易服务。
  BC-150.30.10:
    name: 公司法律咨询
    description: |
      就公司法、治理及实体架构提供法律意见。
  BC-150.30.20:
    name: 并购法律支持
    description: |
      提供法律尽职调查、交易文件及交割支持。
  BC-150.30.30:
    name: 商业交易法律咨询
    description: |
      为商业交易、合作关系及授权提供法律支持。
  BC-150.30.40:
    name: 证券与资本市场法律咨询
    description: |
      提供证券法、上市及资本市场交易法律支持。
  BC-150.40:
    name: 监管法律事务
    description: |
      开展法规的法律解释及监管机构沟通。
  BC-150.40.10:
    name: 监管法律解释
    description: |
      就法规的适用性及解释出具法律意见。
  BC-150.40.20:
    name: 监管机构联络与申报
    description: |
      为监管机构互动及正式申报提供法律支持。
  BC-150.40.30:
    name: 政府与公共事务法律支持
    description: |
      为游说、公众咨询及政策倡导提供法律支持。
  BC-150.50:
    name: 法律运营管理
    description: |
      管理法律部门运营、电子账单及事务管理。
  BC-150.50.10:
    name: 事务管理
    description: |
      处理事务受理、分配及全生命周期跟踪。
  BC-150.50.20:
    name: 外部律师管理
    description: |
      管理律师事务所名单、委托及绩效表现。
  BC-150.50.30:
    name: 法律费用与电子账单
    description: |
      管理法律预算、电子账单及费用分析。
  BC-150.50.40:
    name: 法律知识管理
    description: |
      管理范本、专业知识及法律技术赋能。

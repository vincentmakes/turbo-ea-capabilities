locale: zh-Hans
source: L1-wealth-management-operations-management.yaml
entries:
  BC-1390:
    name: 财富管理运营管理
    description: |
      提供投资咨询、全权委托投资组合管理、客户报告和适当性评估等财富管理核心能力，支持客户财富的保值增值目标。
  BC-1390.10:
    name: 投资咨询管理
    description: |
      管理咨询授权和投资建议生成，为客户提供个性化的专业投资咨询服务。
  BC-1390.10.10:
    name: 咨询授权入网
    description: |
      完成咨询授权的入网和客户协议签署，建立规范的投资咨询服务关系。
  BC-1390.10.20:
    name: 投资建议生成
    description: |
      为客户生成个性化的投资建议，结合客户风险偏好和目标提供针对性方案。
  BC-1390.10.30:
    name: 投资建议书管理
    description: |
      编制和审批投资建议书，向客户呈现完整的投资策略和方案。
  BC-1390.20:
    name: 全权委托投资组合管理
    description: |
      管理全权委托授权和投资组合构建，代表客户进行主动的资产配置和组合管理。
  BC-1390.20.10:
    name: 全权委托授权设立
    description: |
      设立全权委托授权和投资政策说明书（IPS）文件，明确投资目标和约束条件。
  BC-1390.20.20:
    name: 投资组合构建
    description: |
      开展投资组合构建和资产配置，实现客户的风险收益目标。
  BC-1390.20.30:
    name: 投资组合再平衡
    description: |
      对全权委托组合进行模型再平衡，保持资产配置符合既定策略。
  BC-1390.20.40:
    name: 授权委托交易执行
    description: |
      代表全权委托客户执行交易，实现投资决策的准确落地。
  BC-1390.30:
    name: 客户报告管理
    description: |
      生成客户对账单和绩效报告，向客户透明披露投资组合的绩效和活动情况。
  BC-1390.30.10:
    name: 定期客户对账单
    description: |
      编制定期客户对账单和估值报告，帮助客户全面了解资产持有情况。
  BC-1390.30.20:
    name: 绩效与活动报告
    description: |
      为客户编制绩效、活动和税务报告，满足客户的信息知情需求。
  BC-1390.30.30:
    name: 监管客户信息披露
    description: |
      按照 MiFID II 和其他监管要求披露成本费用及其他信息，保障客户权益。
  BC-1390.40:
    name: 绩效计量管理
    description: |
      开展绩效归因分析和基准比较，客观评估投资组合的绩效水平。
  BC-1390.40.10:
    name: 投资组合绩效计算
    description: |
      计算时间加权收益率（TWR）、金额加权收益率（MWR）等绩效指标，量化投资回报。
  BC-1390.40.20:
    name: 绩效归因分析
    description: |
      开展 Brinson 模型和因子模型的绩效归因分析，揭示超额收益来源。
  BC-1390.40.30:
    name: 基准与同业比较
    description: |
      将投资组合绩效与基准和同类机构进行比较，客观评价投资管理能力。
  BC-1390.50:
    name: 适当性与合适性管理
    description: |
      依据 MiFID 及等效法规开展适当性和合适性评估，确保投资建议和产品符合客户需求。
  BC-1390.50.10:
    name: 客户风险画像
    description: |
      对客户进行风险承受能力和风险承担能力评估，建立客户风险画像。
  BC-1390.50.20:
    name: 适当性评估
    description: |
      对投资建议和全权委托组合开展适当性评估，确保推荐方案与客户情况相符。
  BC-1390.50.30:
    name: 合适性评估
    description: |
      对仅执行产品交易开展合适性核查，保障执行业务的合规性。
  BC-1390.50.40:
    name: 可持续发展偏好采集
    description: |
      采集并整合客户的可持续发展偏好，确保投资方案与客户 ESG 价值观一致。

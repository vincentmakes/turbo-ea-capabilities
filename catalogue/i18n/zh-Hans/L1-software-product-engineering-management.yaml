locale: zh-Hans
source: L1-software-product-engineering-management.yaml
entries:
  BC-4200:
    name: 软件产品工程管理
    description: |
      对SaaS产品进行从创意到发布就绪构建的全过程管理，包括探索发现、需求规格、设计、实现、代码审查及质量工程。
  BC-4200.10:
    name: 产品探索与待办事项管理
    description: |
      通过机会研究、构思、验证及待办事项管理，将市场和客户信号转化为优先级排序的工作体系。
    in_scope:
      - 用户与市场研究
      - 待办事项梳理与优先级排序
      - 路线图定义与刷新
    out_of_scope:
      - 定量产品分析（由产品遥测与实验管理负责）
      - 营销需求生成
  BC-4200.10.10:
    name: 用户研究
    description: |
      与用户开展生成性和评估性研究，挖掘需求、摩擦点及支付意愿。
  BC-4200.10.20:
    name: 待办事项精化
    description: |
      持续精化产品待办事项，包括规模估算、分解及重新排序。
  BC-4200.10.30:
    name: 路线图定义
    description: |
      定义并定期刷新产品路线图和主题投入领域。
  BC-4200.10.40:
    name: 客户反馈综合
    description: |
      综合来自支持、成功、销售及社区的入站反馈，形成可落地的产品信号。
  BC-4200.20:
    name: 产品规格管理
    description: |
      捕获预期行为、约束条件及验收标准，确保工程工作可预期地执行。
    in_scope:
      - 功能性和非功能性规格
      - 验收标准
    out_of_scope:
      - 视觉与交互设计（由软件设计管理负责）
  BC-4200.20.10:
    name: 功能规格
    description: |
      规范功能和能力的预期行为及用户可见结果。
  BC-4200.20.20:
    name: 非功能规格
    description: |
      规范非功能性需求，如可用性、延迟、吞吐量及安全态势。
  BC-4200.20.30:
    name: 验收标准定义
    description: |
      定义可测试的验收标准，锚定功能和故事的"完成"定义。
  BC-4200.30:
    name: 软件设计管理
    description: |
      基于共享设计系统，为软件产品开展用户体验、系统及无障碍设计。
  BC-4200.30.10:
    name: 用户体验设计
    description: |
      设计产品界面的交互、信息架构及视觉效果。
  BC-4200.30.20:
    name: 系统设计
    description: |
      设计软件组件、服务、数据流及外部接口的架构。
  BC-4200.30.30:
    name: 设计系统管理
    description: |
      管理共享设计系统，包括组件、设计令牌及使用指导。
  BC-4200.30.40:
    name: 无障碍设计
    description: |
      确保产品界面的设计符合无障碍标准。
  BC-4200.40:
    name: 软件构建管理
    description: |
      管理实现实践，包括源代码管理、代码审查及协作编码规范。
  BC-4200.40.10:
    name: 源代码管理
    description: |
      管理源代码仓库、分支策略及代码所有权。
  BC-4200.40.20:
    name: 代码审查实践
    description: |
      按工程和安全标准对代码变更进行同行审查。
  BC-4200.40.30:
    name: 结对编程与集体编程实践
    description: |
      采用协作编码实践，在选定工作上共享知识、提升质量。
  BC-4200.50:
    name: 软件质量工程
    description: |
      制定测试策略、管理自动化测试套件并进行软件产品缺陷管理。
    in_scope:
      - 产品自动化单元、集成、端到端测试
      - 缺陷分类与解决
    out_of_scope:
      - 全企业质量管理体系（由质量管理负责）
      - 运行中服务的性能和韧性测试（由SaaS平台运营管理负责）
  BC-4200.50.10:
    name: 测试策略定义
    description: |
      定义跨单元、集成、端到端及探索性层次的测试策略。
  BC-4200.50.20:
    name: 自动化测试套件管理
    description: |
      管理自动化测试套件，包括覆盖率、不稳定性及运行时间。
  BC-4200.50.30:
    name: 缺陷分类与解决
    description: |
      对产品提出的缺陷进行分类和解决。
  BC-4200.50.40:
    name: 回归覆盖管理
    description: |
      随产品界面演进管理回归测试覆盖率。
  BC-4200.60:
    name: 开源软件管理
    description: |
      管理产品中嵌入开源软件的入站使用、出站贡献及供应链制品。
  BC-4200.60.10:
    name: 入站开源合规
    description: |
      遵守入站开源许可证和声明义务。
  BC-4200.60.20:
    name: 出站开源贡献
    description: |
      治理向开源项目的出站贡献及开源项目管理。
  BC-4200.60.30:
    name: 软件物料清单管理
    description: |
      以标准格式生成、分发和维护软件物料清单（SBOM）。
  BC-4200.70:
    name: 工程效率管理
    description: |
      通过内部开发者平台、工具链及工程绩效度量提升持续交付产出。
  BC-4200.70.10:
    name: 开发者工具链管理
    description: |
      在工程组织内选择和管理开发者工具链。
  BC-4200.70.20:
    name: 内部开发者平台管理
    description: |
      运营内部平台，为工程师抽象基础设施和标准化工作流。
  BC-4200.70.30:
    name: 工程绩效指标
    description: |
      运用交付和开发者体验指标度量工程绩效。

locale: zh-Hans
source: L1-property-operations-management.yaml
entries:
  BC-4060:
    name: 物业运营管理
    description: |
      管理酒店、度假村及服务式公寓物业的日常运营，涵盖前台、客房服务、工程、礼宾、安保、可持续发展及品牌和质量标准合规。
    in_scope:
      - 前台运营及入住/退房
      - 客房服务及失物招领
      - 物业工程与维护
      - 礼宾、行李、代客泊车及宾客交通
      - 物业安保、消防生命安全及事件处置
      - 物业级可持续运营
      - 品牌标准审计及质量合规
    out_of_scope:
      - 餐饮（F&B）运营（BC-4070）
      - 团体房块与活动执行（BC-4110）
      - 企业可持续发展战略（BC-740）
  BC-4060.10:
    name: 前台运营
    description: |
      运营前台，涵盖抵达前准备、入住、房间分配、退房、账单结算及房卡签发。
  BC-4060.10.10:
    name: 抵达前准备
    description: |
      抵达前的准备工作，包括抵达报告、房间分配及设施布置。
  BC-4060.10.20:
    name: 入住操作
    description: |
      通过前台、移动端及自助终端渠道完成宾客入住操作。
  BC-4060.10.30:
    name: 房间分配与升级
    description: |
      分配房间并执行升级决策，包括付费和免费升级。
  BC-4060.10.40:
    name: 退房与账单结算
    description: |
      完成宾客退房并结算物业账单。
  BC-4060.10.50:
    name: 房卡与门禁凭证签发
    description: |
      签发和吊销实体及数字房卡和门禁凭证。
  BC-4060.20:
    name: 客房服务运营
    description: |
      运营客房清洁、夜床服务、深度清洁及全物业失物招领管理。
  BC-4060.20.10:
    name: 日常清洁操作
    description: |
      按物业标准对续住和退房客房进行日常清洁。
  BC-4060.20.20:
    name: 夜床与续住服务
    description: |
      为在住宾客提供夜床和续住清洁服务。
  BC-4060.20.30:
    name: 深度清洁与停用房间管理
    description: |
      执行深度清洁周期并管理停用和停止服务的房间。
  BC-4060.20.40:
    name: 失物招领运营
    description: |
      物业级失物招领的登记、保管及归还宾客工作。
  BC-4060.30:
    name: 物业工程与维护
    description: |
      运营工程与维护，包括预防性、应对性及翻新工作和合规检查。
  BC-4060.30.10:
    name: 预防性维护运营
    description: |
      依据计划和状态数据开展预防性维护作业。
  BC-4060.30.20:
    name: 应对性维护运营
    description: |
      响应宾客报告和检查发现，开展应对性维护作业。
  BC-4060.30.30:
    name: 资产更换与翻新
    description: |
      对客房、公共空间及后台区域的物业资产进行更换和翻新。
  BC-4060.30.40:
    name: 工程合规检查
    description: |
      开展涵盖消防系统、生命安全系统、电梯及压力设备的合规检查。
  BC-4060.40:
    name: 礼宾与宾客服务
    description: |
      在宾客旅程中提供礼宾、行李、代客泊车及宾客交通服务。
  BC-4060.40.10:
    name: 礼宾信息与预订服务
    description: |
      提供目的地信息、餐厅及活动预订等礼宾服务。
  BC-4060.40.20:
    name: 行李运营
    description: |
      提供行李搬运服务，包括寄存和配送。
  BC-4060.40.30:
    name: 代客泊车运营
    description: |
      在物业入口提供代客泊车服务和车辆管理。
  BC-4060.40.40:
    name: 宾客交通协调
    description: |
      协调宾客地面交通，包括酒店班车及用车安排。
  BC-4060.50:
    name: 物业安保与安全运营
    description: |
      运营物业监控、消防生命安全、疏散及物业事件处置。
  BC-4060.50.10:
    name: 物业监控运营
    description: |
      对公共和运营区域进行监控和回放管理。
  BC-4060.50.20:
    name: 消防与生命安全运营
    description: |
      运营消防和生命安全系统，包括演练和设备就绪检查。
  BC-4060.50.30:
    name: 紧急疏散运营
    description: |
      在物业执行紧急疏散和事件指挥操作。
  BC-4060.50.40:
    name: 宾客事件处置
    description: |
      处理物业内宾客安全、盗窃及安保事件。
  BC-4060.60:
    name: 物业可持续运营
    description: |
      在物业层面运营能源、水资源、废物及床单重复使用计划，与品牌和认证承诺保持一致。
    in_scope:
      - 物业计量和能耗监测
      - 物业级重复使用和废物计划
    out_of_scope:
      - 企业可持续发展战略（BC-740）
  BC-4060.60.10:
    name: 物业能源运营
    description: |
      运营物业能源系统，并对照目标监测能耗。
  BC-4060.60.20:
    name: 水资源管理运营
    description: |
      管理物业用水，包括渗漏检测和再利用措施。
  BC-4060.60.30:
    name: 废物与回收运营
    description: |
      运营物业废物分类、回收及餐厨垃圾计划。
  BC-4060.60.40:
    name: 床单与毛巾重复使用计划
    description: |
      运营床单和毛巾重复使用计划及宾客自愿参与机制。
  BC-4060.70:
    name: 物业质量审计与品牌标准
    description: |
      审计物业对品牌和运营标准的合规情况、暗访宾客计划及服务补救操作。
  BC-4060.70.10:
    name: 品牌标准审计运营
    description: |
      审计物业对品牌和运营标准的合规情况。
  BC-4060.70.20:
    name: 暗访宾客计划运营
    description: |
      运营暗访宾客计划，依据脚本旅程评估宾客体验。
  BC-4060.70.30:
    name: 服务补救记录
    description: |
      记录物业采取的服务补救措施，包括补偿和后续跟进。
  BC-4060.70.40:
    name: 质量改进闭环
    description: |
      对照质量改进计划对审计和反馈发现进行闭环处理。

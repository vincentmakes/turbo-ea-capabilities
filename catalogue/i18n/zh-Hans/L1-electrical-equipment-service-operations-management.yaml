locale: zh-Hans
source: L1-electrical-equipment-service-operations-management.yaml
entries:
  BC-1960:
    name: 电气设备服务运营管理
    description: |
      针对已交付设备的 OEM 主导服务，涵盖现场勘查、FAT 和 SAT、投运、保护整定、已安装基础配置、改造、绩效合同及状态监测。
  BC-1960.10:
    name: 现场勘查与预调试工程
    description: |
      设备调试前的现场评估和工程准备。
  BC-1960.10.10:
    name: 现场勘查执行
    description: |
      执行现场勘查以记录现有条件。
  BC-1960.10.20:
    name: 现场准备评估
    description: |
      评估设备交付和投运的现场准备情况。
  BC-1960.10.30:
    name: 预调试工程研究
    description: |
      调试前的工程研究，包括协调配合及接地分析。
  BC-1960.20:
    name: 工厂验收试验协调
    description: |
      规划和执行有客户见证的工厂验收试验。
  BC-1960.20.10:
    name: FAT 计划编制
    description: |
      按合同要求编制 FAT 计划。
  BC-1960.20.20:
    name: FAT 见证协调
    description: |
      协调客户和认证机构在 FAT 现场见证。
  BC-1960.20.30:
    name: FAT 问题跟踪管理
    description: |
      跟踪和关闭 FAT 问题清单条目。
  BC-1960.30:
    name: 现场验收试验与投运管理
    description: |
      现场验收试验、投运及初期运行监督。
  BC-1960.30.10:
    name: 现场验收试验执行
    description: |
      对已安装设备执行现场验收试验。
  BC-1960.30.20:
    name: 投运程序执行
    description: |
      按倒闸操作规程对设备进行受控投运。
  BC-1960.30.30:
    name: 初期运行监督
    description: |
      对初期运行和可靠性运行进行监督。
  BC-1960.30.40:
    name: 移交文件
    description: |
      整理移交资料和竣工记录。
  BC-1960.40:
    name: 保护与控制整定管理
    description: |
      为已安装设备整定和下装保护及控制参数。
  BC-1960.40.10:
    name: 保护协调研究
    description: |
      对已安装网络保护设备进行协调研究。
  BC-1960.40.20:
    name: 继电保护整定计算
    description: |
      保护继电器整定值计算。
  BC-1960.40.30:
    name: 整定文件下装与验证
    description: |
      向继电器下装整定文件并进行现场验证。
  BC-1960.50:
    name: 已安装基础配置管理
    description: |
      维护全球已安装基础的竣工配置数据。
  BC-1960.50.10:
    name: 已安装基础注册表
    description: |
      按序列号、现场和客户建立已安装设备注册表。
  BC-1960.50.20:
    name: 竣工配置记录
    description: |
      在调试时记录竣工配置。
  BC-1960.50.30:
    name: 已安装基础改动记录
    description: |
      记录已安装设备的调试后改动情况。
  BC-1960.60:
    name: 设备改造与升级服务
    description: |
      已安装设备改造和能力升级的工程设计与执行。
  BC-1960.60.10:
    name: 改造工程设计
    description: |
      改造和升级方案的工程设计。
  BC-1960.60.20:
    name: 改造执行
    description: |
      改造和升级安装的现场执行。
  BC-1960.60.30:
    name: 升级确认验证
    description: |
      改造或升级后的确认验证测试。
  BC-1960.70:
    name: 基于绩效的服务合同运营
    description: |
      基于绩效和结果的服务合同运营管理。
  BC-1960.70.10:
    name: 绩效合同执行
    description: |
      执行基于绩效的服务义务。
  BC-1960.70.20:
    name: 服务水平结果报告
    description: |
      报告合同约定结果和服务水平指标。
  BC-1960.70.30:
    name: 风险共担机制运营
    description: |
      运营奖惩风险共担机制。
  BC-1960.80:
    name: 状态监测服务交付
    description: |
      远程状态监测和预测性洞察服务的交付。
  BC-1960.80.10:
    name: 远程状态监测运营
    description: |
      已安装资产远程状态监测的运营中心管理。
  BC-1960.80.20:
    name: 诊断洞察交付
    description: |
      向客户交付诊断洞察成果。
  BC-1960.80.30:
    name: 预测性维护建议
    description: |
      针对已安装设备的预测性维护建议。

locale: zh-Hans
source: L1-merchandising-management.yaml
entries:
  BC-2300:
    name: 商品管理
    description: |
      涵盖商品组合、品类、卖场空间、采购、自有品牌及降价决策，决定向消费者销售哪些产品、在哪里销售以及选择深度。
  BC-2300.10:
    name: 商品组合与范围规划
    description: |
      通过范围架构、选项数量及门店集群商品组合计划，将战略转化为各门店陈列的SKU清单。
    in_scope:
      - 范围架构及好-更好-最好分层结构
      - 集群与渠道商品组合计划
      - 新品引入与下架名额管理
    out_of_scope:
      - 通用产品生命周期管理（BC-820）
      - 需求预测（BC-520.10）
  BC-2300.10.10:
    name: 范围架构定义
    description: |
      跨品类定义范围架构、分层及好-更好-最好结构。
  BC-2300.10.20:
    name: 门店集群商品组合规划
    description: |
      按商圈及购物目的，为门店集群制定定制化商品组合计划。
  BC-2300.10.30:
    name: 选项数量优化
    description: |
      优化各品类SKU数量，在多样性、复杂性与毛利之间取得平衡。
  BC-2300.10.40:
    name: 新品引入规划
    description: |
      规划新品上架，包括引入节奏及替换决策。
  BC-2300.10.50:
    name: 下架规划
    description: |
      制定商品退出决策，包括替换选择及下架商品的处理方案。
  BC-2300.20:
    name: 品类管理
    description: |
      按CGF/ECR实践，将每个品类作为业务单元，进行品类战略、角色定义与绩效管理。
    in_scope:
      - 品类战略与角色定义
      - 品类绩效及记分卡
      - 与供应商的品类队长协作
  BC-2300.20.10:
    name: 品类战略定义
    description: |
      定义品类战略、目标购物者及竞争定位。
  BC-2300.20.20:
    name: 品类角色分配
    description: |
      分配品类角色，如目的地型、日常型、便利型或季节型。
  BC-2300.20.30:
    name: 品类绩效分析
    description: |
      对品类记分卡、市场份额、增长率及毛利进行分析。
  BC-2300.20.40:
    name: 品类队长协作
    description: |
      在信息防火墙管控下，与供应商品类队长开展协作。
  BC-2300.30:
    name: 卖场空间与货架陈列图管理
    description: |
      通过卖场及货架空间分配、货架陈列图和货架布局，将商品组合计划转化为实体或数字货架陈列。
  BC-2300.30.10:
    name: 货架陈列图设计
    description: |
      按品类、门店集群及货架类型设计货架陈列图。
  BC-2300.30.20:
    name: 货架空间分配
    description: |
      按绩效表现，跨品类及品牌分配货架空间。
  BC-2300.30.30:
    name: 货架与卖场布局
    description: |
      规划卖场布局与货架摆放，以支撑商品邻近关系及购物动线。
  BC-2300.30.40:
    name: 货架陈列图合规追踪
    description: |
      通过门店巡查和图像识别数据，追踪货架陈列图执行合规情况。
  BC-2300.40:
    name: 采购与备货预算管理
    description: |
      通过备货预算规划、采购计划执行及门店分配，将商品组合计划转化为供应商采购承诺。
    in_scope:
      - 按部门和季节划定备货预算
      - 与供应商协同执行采购计划
      - 按门店分配收货商品
    out_of_scope:
      - 通用采购（BC-500）
  BC-2300.40.10:
    name: 备货预算规划
    description: |
      按部门、品类及季节制定备货预算。
  BC-2300.40.20:
    name: 采购计划执行
    description: |
      与供应商协同执行采购计划，包括款式及SKU遴选。
  BC-2300.40.30:
    name: 门店与渠道分配
    description: |
      按属性与绩效，将收货商品分配至各门店及渠道。
  BC-2300.40.40:
    name: 补货采购管理
    description: |
      针对主力款及常规不缺货商品，制定补货采购决策。
  BC-2300.50:
    name: 自有品牌开发管理
    description: |
      制定自有品牌和私标产品线的战略、规格、采购及品牌管护。
  BC-2300.50.10:
    name: 自有品牌战略
    description: |
      制定自有品牌组合战略及跨自有品牌的分层定位。
  BC-2300.50.20:
    name: 自有品牌规格定义
    description: |
      制定自有品牌的产品规格、包装简报及质量标准。
  BC-2300.50.30:
    name: 自有品牌采购
    description: |
      为自有品牌生产寻源委托制造商及联合包装商。
  BC-2300.50.40:
    name: 自有品牌管护
    description: |
      管护自有品牌形象、包装治理及品牌资产。
  BC-2300.60:
    name: 降价与库存处置管理
    description: |
      通过降价节奏、清仓及处置决策，清退过剩和生命周期终结的零售库存。
    in_scope:
      - 降价节奏与幅度决策
      - 季末清仓计划
      - 变现、折扣渠道、捐赠及销毁等处置方式
    out_of_scope:
      - 日常价格调整（BC-440.20.20）
      - 促销折扣（BC-440.30）
  BC-2300.60.10:
    name: 降价策略
    description: |
      制定跨品类的降价幅度、节奏与时机策略。
  BC-2300.60.20:
    name: 季末清仓规划
    description: |
      制定季末清仓计划及退出价格管理方案。
  BC-2300.60.30:
    name: 库存处置路由
    description: |
      将剩余库存路由至折扣渠道、变现、捐赠或销毁。

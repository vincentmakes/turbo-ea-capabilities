locale: zh-Hans
source: L1-hydrocarbon-exploration-management.yaml
entries:
  BC-3000:
    name: 油气勘探管理
    description: |
      通过地球物理勘察、盆地与圈闭评价、许可证与特许权获取及勘探钻井决策，识别和获取新的油气资源。
  BC-3000.10:
    name: 地球物理勘察管理
    description: |
      采集、处理和解释地震及非地震地球物理数据，以实现地下成像。
    in_scope:
      - 二维和三维地震采集作业
      - 地震数据处理与重新处理
      - 面向圈闭生成的地震解释
    out_of_scope:
      - 开发资产的储层尺度地质建模（BC-3010）
  BC-3000.10.10:
    name: 三维地震采集
    description: |
      开展海洋、陆地及海底三维地震采集作业。
  BC-3000.10.20:
    name: 二维地震采集
    description: |
      开展区域侦查性二维地震采集作业。
  BC-3000.10.30:
    name: 非地震地球物理采集
    description: |
      开展重力、磁力、电磁及其他非地震勘探采集作业。
  BC-3000.10.40:
    name: 地震数据处理
    description: |
      对地震数据进行叠前和叠后处理、深度偏移及重新处理。
  BC-3000.10.50:
    name: 地震数据解释
    description: |
      对地震数据体进行构造和地层解释，以生成勘探圈闭。
  BC-3000.20:
    name: 盆地与圈闭评价
    description: |
      开展含油气系统分析、有利区带图编制及勘探圈闭的风险-资源量评估。
    in_scope:
      - 含油气系统建模
      - 圈闭目录编制与排序
      - 风险资源量估算
    out_of_scope:
      - 已发现储量的储量分类（BC-3010.30）
  BC-3000.20.10:
    name: 含油气系统分析
    description: |
      对烃源岩、储层、盖层、圈闭及时间配置进行分析，以评价含油气系统。
  BC-3000.20.20:
    name: 有利区带图编制
    description: |
      在矿权区块内编制区域性区带图和共同风险段图。
  BC-3000.20.30:
    name: 圈闭目录管理
    description: |
      维护已排序的圈闭和潜力目录，并推动其持续成熟。
  BC-3000.20.40:
    name: 圈闭风险评估
    description: |
      对勘探圈闭开展概率性地质成功率评估。
  BC-3000.20.50:
    name: 资源量估算
    description: |
      在钻前阶段对原地资源量和可采资源量进行概率性估算。
  BC-3000.30:
    name: 许可证与特许权获取
    description: |
      通过许可证轮次、直接谈判和作价进入等方式获取勘探区块。
    in_scope:
      - 竞标轮次筛选与参与
      - 特许权和产品分成合同竞标
      - 作价进入与作价退出谈判
    out_of_scope:
      - 持续的许可证义务跟踪（BC-3110.40）
  BC-3000.30.10:
    name: 许可证轮次筛选
    description: |
      对东道国政府许可证轮次进行筛选，以支撑参与决策。
  BC-3000.30.20:
    name: 特许权竞标
    description: |
      为特许权和产品分成合同编制并提交竞争性投标方案。
  BC-3000.30.30:
    name: 作价进入与作价退出谈判
    description: |
      谈判作价进入、作价退出及区块互换交易。
  BC-3000.30.40:
    name: 区块组合管理
    description: |
      维护勘探区块组合并做出合理化处置决策。
  BC-3000.40:
    name: 勘探钻井计划管理
    description: |
      制定、审批并开展野猫井和评价井钻井计划的完钻评价。
  BC-3000.40.10:
    name: 勘探井计划制定
    description: |
      制定野猫井和评价井的目标及钻井顺序。
  BC-3000.40.20:
    name: 野猫井审批
    description: |
      对野猫勘探井实施内部及合作伙伴审批治理。
  BC-3000.40.30:
    name: 评价井计划管理
    description: |
      管理发现后评价井计划的实施。
  BC-3000.40.40:
    name: 完钻地质评价
    description: |
      完钻后开展地下评价并将经验纳入圈闭目录。
  BC-3000.50:
    name: 勘探组合战略指导
    description: |
      跨地区、区带和风险类别对勘探组合进行战略性指导。
  BC-3000.50.10:
    name: 勘探战略制定
    description: |
      跨盆地、区带和风险类别制定勘探战略。
  BC-3000.50.20:
    name: 勘探投资分配
    description: |
      跨地区和区带类型分配勘探资本。
  BC-3000.50.30:
    name: 勘探绩效跟踪
    description: |
      跟踪勘探发现成本、成功率及资源量新增情况。
  BC-3000.60:
    name: 地下发现报告
    description: |
      向东道国政府、合作伙伴及资本市场通告发现情况，并跟踪资源量从发现到开发批准的成熟进程。
  BC-3000.60.10:
    name: 发现通告
    description: |
      向东道国政府、合作伙伴及资本市场发布发现通告及信息披露。
  BC-3000.60.20:
    name: 资源量成熟跟踪
    description: |
      跟踪或然资源量从发现到开发批准的成熟进程。

locale: zh-Hans
source: L1-building-automation-system-engineering-management.yaml
entries:
  BC-2010:
    name: 楼宇自动化系统工程管理
    description: |
      BAS 控制器、现场设备、监控软件、可复用控制序列库、通信协议栈、语义数据模型及 BAS 网络安全的产品工程，以 ISO 16484/ASHRAE 135（BACnet）和 ASHRAE Guideline 36 为核心标准。
    in_scope:
      - 专用 BAS 控制器和现场设备产品工程
      - 监控服务器、报警及历史数据软件工程
      - 可复用操作序列库（Guideline 36 及高级控制）
      - BACnet、KNX、LonWorks、Modbus、DALI、OPC UA、MQTT 协议栈
      - Brick/Haystack 语义数据建模
      - 安全设计的 BAS 控制器和 BAS 网络安全
    out_of_scope:
      - BC-1900 涵盖的通用电子产品工程
      - 项目级点位清单和序列定制（BC-2020）
      - 暖通空调机械设备工程（BC-2000）
      - 现场调试和服务运营（BC-2050、BC-2060）
  BC-2010.10:
    name: BAS 控制器产品工程
    description: |
      楼宇控制器产品工程，包括区域控制器、空气处理机组控制器、冷热源控制器、可编程控制器和边缘网关。
  BC-2010.10.10:
    name: 区域控制器工程
    description: |
      用于 VAV、风机盘管和单元控制的区域控制器工程设计。
  BC-2010.10.20:
    name: 空气处理机组控制器工程
    description: |
      内置序列支持的空气处理机组控制器工程设计。
  BC-2010.10.30:
    name: 冷热源控制器工程
    description: |
      冷水机组和锅炉系统冷热源控制器的工程设计。
  BC-2010.10.40:
    name: 可编程控制器工程
    description: |
      自由可编程 BAS 控制器的工程设计。
  BC-2010.10.50:
    name: 边缘网关工程
    description: |
      BAS 与 IoT/云平台之间协议转换边缘网关的工程设计。
  BC-2010.20:
    name: BAS 现场设备工程
    description: |
      接入 BAS 的传感器、阀门、风阀及无线现场设备的工程设计。
  BC-2010.20.10:
    name: 传感器产品工程
    description: |
      温度、湿度、压力、CO₂ 和室内空气质量传感器的 BAS 设备工程设计。
  BC-2010.20.20:
    name: 阀门与执行器工程
    description: |
      水系统控制阀和阀门执行器的工程设计。
  BC-2010.20.30:
    name: 风阀执行器工程
    description: |
      空气侧 BAS 控制风阀执行器的工程设计。
  BC-2010.20.40:
    name: 无线现场设备工程
    description: |
      用于改造和 IoT 应用的无线传感器和执行器工程设计。
  BC-2010.30:
    name: BAS 监控软件工程
    description: |
      监控服务器、操作界面、报警引擎和历史数据系统的工程设计。
  BC-2010.30.10:
    name: 监控服务器工程
    description: |
      管理控制器网络的前端监控服务器工程设计。
  BC-2010.30.20:
    name: 操作界面工程
    description: |
      图形操作界面和仪表板的工程设计。
  BC-2010.30.30:
    name: 报警与事件引擎工程
    description: |
      报警处理、优先级排序和通知引擎的工程设计。
  BC-2010.30.40:
    name: 趋势与历史数据工程
    description: |
      趋势记录和时间序列历史数据子系统的工程设计。
  BC-2010.40:
    name: 控制序列库工程
    description: |
      暖通空调子系统可复用、厂商无关操作序列库的工程设计。
  BC-2010.40.10:
    name: VAV 序列库
    description: |
      变风量区域控制的可复用控制序列。
  BC-2010.40.20:
    name: 空气处理机组序列库
    description: |
      空气处理机组控制的可复用控制序列。
  BC-2010.40.30:
    name: 冷热源序列库
    description: |
      冷水机组和锅炉系统控制的可复用控制序列。
  BC-2010.40.40:
    name: 高级控制序列库
    description: |
      模型预测和优化控制的可复用高级控制序列。
  BC-2010.50:
    name: BAS 通信协议工程
    description: |
      楼宇自动化通信协议栈和驱动程序的工程设计。
  BC-2010.50.10:
    name: BACnet 协议栈工程
    description: |
      BACnet/IP 和 BACnet/MSTP 协议栈的工程设计。
  BC-2010.50.20:
    name: KNX 与 LonWorks 协议栈工程
    description: |
      KNX 和 LonWorks 协议栈的工程设计。
  BC-2010.50.30:
    name: Modbus 与 DALI 驱动工程
    description: |
      用于暖通空调和照明集成的 Modbus 和 DALI 驱动工程设计。
  BC-2010.50.40:
    name: OPC UA 服务器工程
    description: |
      工业级 BAS 互操作 OPC UA 服务器的工程设计。
  BC-2010.50.50:
    name: MQTT 与 IoT 消息工程
    description: |
      云连接 MQTT 和 IoT 消息接口的工程设计。
  BC-2010.60:
    name: 楼宇语义数据模型工程
    description: |
      使 BAS 数据可机器解读的语义模型、本体和命名规范工程设计。
  BC-2010.60.10:
    name: Brick 模式建模
    description: |
      描述楼宇拓扑和设备的 Brick Schema 模型工程设计。
  BC-2010.60.20:
    name: Haystack 标签库工程
    description: |
      Haystack 标签库和标签规范的工程设计。
  BC-2010.60.30:
    name: 点位与命名规范库
    description: |
      点位名称和标签命名规范库的维护管理。
  BC-2010.60.40:
    name: 资产本体工程
    description: |
      将 BAS 数据与设备和位置关联的资产本体工程设计。
  BC-2010.70:
    name: BAS 网络安全工程
    description: |
      BAS 产品、网络和身份控制的安全设计工程。
  BC-2010.70.10:
    name: 安全控制器架构
    description: |
      安全启动、安全更新和加固型控制器架构设计。
  BC-2010.70.20:
    name: BAS 网络分段设计
    description: |
      BAS 网络的分段模式和区域划分设计。
  BC-2010.70.30:
    name: 认证与身份工程
    description: |
      BAS 设备、用户和服务身份的工程设计。
  BC-2010.70.40:
    name: BAS 漏洞管理工程
    description: |
      BAS 产品漏洞分流、补丁和披露的工程管理。
  BC-2010.80:
    name: BAS 产品验证与合规
    description: |
      BAS 产品协议合规、互操作性和上市准备的验证。
  BC-2010.80.10:
    name: 协议合规测试
    description: |
      针对 BACnet、LonMark、KNX 等协议合规套件的产品测试。
  BC-2010.80.20:
    name: 互操作性实验室测试
    description: |
      在专用实验室进行多厂商互操作性测试。
  BC-2010.80.30:
    name: 协议回归测试
    description: |
      跨固件版本的协议栈回归测试。
  BC-2010.80.40:
    name: 合规文档编制
    description: |
      PICS、BIBB 及等效合规文档的编制。

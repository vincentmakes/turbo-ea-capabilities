locale: zh-Hans
source: L1-physical-asset-management.yaml
entries:
  BC-1040:
    name: 实物资产管理
    description: |
      对工厂、设备、车队与基础设施进行全生命周期管理，确保资产价值最大化。
  BC-1040.10:
    name: 资产战略与全生命周期管理
    description: |
      制定资产战略，规划全生命周期并统筹更换计划。
  BC-1040.10.10:
    name: 资产类别战略
    description: |
      依据ISO 55000标准，按资产类别制定战略。
  BC-1040.10.20:
    name: 资产全生命周期规划
    description: |
      对资产从采购、运营到报废进行全生命规划。
  BC-1040.10.30:
    name: 资产更换规划
    description: |
      基于预期寿命与状态开展资产更换规划。
  BC-1040.10.40:
    name: 资产资本规划
    description: |
      规划资产投资与更新的资本支出。
  BC-1040.20:
    name: 资产绩效管理
    description: |
      管理资产KPI、可用性与利用率，确保资产高效运行。
  BC-1040.20.10:
    name: 资产KPI定义
    description: |
      定义资产绩效KPI与目标值。
  BC-1040.20.20:
    name: 资产可用性监控
    description: |
      监控资产可用性与运行时间。
  BC-1040.20.30:
    name: 资产利用率报告
    description: |
      报告资产利用率与绩效情况。
  BC-1040.20.40:
    name: 资产健康指数管理
    description: |
      建立综合健康指数并评估资产状态评分。
  BC-1040.30:
    name: 资产风险与关键度管理
    description: |
      对资产进行关键度分类并基于风险开展优先级排序。
  BC-1040.30.10:
    name: 资产关键度分类
    description: |
      按影响程度对资产进行关键度分类。
  BC-1040.30.20:
    name: 资产风险评估
    description: |
      开展资产风险评估，包括故障后果分析。
  BC-1040.30.30:
    name: 基于风险的维护优先级排序
    description: |
      基于风险对维护与资本行动进行优先级排序。
  BC-1040.40:
    name: 资产信息管理
    description: |
      管理资产主数据与技术文档，确保信息准确完整。
  BC-1040.40.10:
    name: 资产主数据管理
    description: |
      管理资产主数据、层级结构与设备台账。
  BC-1040.40.20:
    name: 资产技术文档
    description: |
      管理技术档案、图纸与OEM文档。
  BC-1040.40.30:
    name: 资产数字孪生管理
    description: |
      构建并管理用于资产运营与分析的数字孪生模型。
  BC-1040.50:
    name: 资产退役与处置管理
    description: |
      统筹资产报废、处置与退役，确保安全合规。
  BC-1040.50.10:
    name: 退役规划
    description: |
      规划资产退役方案，涵盖HSE要求。
  BC-1040.50.20:
    name: 资产拆除执行
    description: |
      执行退役资产的物理拆除与拆解。
  BC-1040.50.30:
    name: 资产处置与变卖
    description: |
      对退役资产进行转售、报废与回收处理。

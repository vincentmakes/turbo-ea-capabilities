locale: zh-Hans
source: L1-academic-quality-accreditation-management.yaml
entries:
  BC-4750:
    name: 学术质量与认证管理
    description: |
      对学术课程项目和机构整体开展内外部质量保证，涵盖审查、认证、质量标准体系管理、学生反馈及持续改进。
  BC-4750.10:
    name: 课程项目审查与认证
    description: |
      对新课程项目进行认证，并按周期对照机构及外部学术标准重新认证。
    in_scope:
      - 新课程项目认证
      - 课程项目定期审查
      - 课程项目重新认证
    out_of_scope:
      - 课程项目审批节点（见课程与课程项目管理）
  BC-4750.10.10:
    name: 新课程项目认证
    description: |
      依据学术和质量标准对新课程项目进行认证。
  BC-4750.10.20:
    name: 课程项目定期审查
    description: |
      对运行中课程项目及其成果进行定期质量审查。
  BC-4750.10.30:
    name: 课程项目重新认证
    description: |
      在认证周期届满时对课程项目进行重新认证。
  BC-4750.20:
    name: 机构自我评估
    description: |
      对照质量标准开展机构绩效自评，并与同类机构进行标杆对比。
    in_scope:
      - 自评报告撰写
      - 质量指标标杆对比
      - 战略质量规划
    out_of_scope:
      - 外部认证实地检查（见外部认证与审计协调）
  BC-4750.20.10:
    name: 自评报告撰写
    description: |
      撰写机构自我评估报告。
  BC-4750.20.20:
    name: 质量指标标杆对比
    description: |
      将质量指标与同类机构进行标杆对比。
  BC-4750.20.30:
    name: 质量战略规划
    description: |
      制定学术质量重点事项与投入的战略规划。
  BC-4750.30:
    name: 外部认证与审计协调
    description: |
      与外部认证机构和质量监管部门协调，包括实地检查、检视及结果响应。
    in_scope:
      - 与认证机构的互动
      - 实地检查与检视协调
      - 认证结果响应与整改跟踪
    out_of_scope:
      - 法定监管报告（见教育合规与监管报告管理）
  BC-4750.30.10:
    name: 认证机构互动
    description: |
      与认证机构进行互动并管理材料提交工作。
  BC-4750.30.20:
    name: 实地检查与检视协调
    description: |
      协调认证机构实地检查与检视的相关事务。
  BC-4750.30.30:
    name: 认证结果响应
    description: |
      对认证结果、整改条件及建议作出响应。
  BC-4750.40:
    name: 质量标准框架管理
    description: |
      采纳、映射并维护学术质量标准及机构质量政策。
    in_scope:
      - 标准采纳与维护（如ESG、ABET、AACSB）
      - 质量政策编写
      - 质量标准融入运营实践的映射
    out_of_scope:
      - 日常审计运营（见跨行业内部审计管理）
  BC-4750.40.10:
    name: 标准采纳与维护
    description: |
      在机构范围内采纳并维护外部质量标准。
  BC-4750.40.20:
    name: 质量政策编写
    description: |
      编写并维护机构质量政策。
  BC-4750.40.30:
    name: 质量标准映射
    description: |
      将质量标准映射至运营流程与控制措施。
  BC-4750.50:
    name: 学生反馈与模块评估
    description: |
      在模块、课程项目及机构层面收集、分析学生反馈并形成闭环。
    in_scope:
      - 模块评估调查运营
      - 全国性及跨机构调查参与（如NSS、NSSE）
      - 反馈分析与闭环响应
    out_of_scope:
      - 学术场景以外的客户满意度分析（见跨行业客户服务管理）
  BC-4750.50.10:
    name: 模块评估调查运营
    description: |
      运营模块层面的评估调查。
  BC-4750.50.20:
    name: 全国及跨机构调查参与
    description: |
      参与全国性和跨机构学生调查。
  BC-4750.50.30:
    name: 反馈分析与闭环响应
    description: |
      分析反馈数据并向学生展示可见的闭环改进成果。
  BC-4750.60:
    name: 持续改进与行动跟踪
    description: |
      识别、规划和跟踪因审查、认证及反馈而产生的质量改进行动。
    in_scope:
      - 改进行动规划
      - 行动落实跟踪
      - 经验教训知识库
    out_of_scope:
      - 通用流程改进方法（见跨行业质量管理）
  BC-4750.60.10:
    name: 改进行动规划
    description: |
      规划学术质量改进行动。
  BC-4750.60.20:
    name: 行动落实跟踪
    description: |
      跟踪质量改进行动的落实进度与效果。
  BC-4750.60.30:
    name: 经验教训知识库
    description: |
      整理保存质量审查和认证周期中的经验教训。

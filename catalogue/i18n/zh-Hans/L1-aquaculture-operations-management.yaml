locale: zh-Hans
source: L1-aquaculture-operations-management.yaml
entries:
  BC-3520:
    name: 水产养殖运营管理
    description: |
      养殖水生物种生产——孵化与放苗、投喂、水质管理、动物健康、网箱与池塘运营、收获及鱼类、贝类和水生植物的环境合规。
  BC-3520.10:
    name: 苗种采购与放苗运营
    description: |
      亲本采购、孵化运营及幼体放入养殖系统。
  BC-3520.10.10:
    name: 亲本采购
    description: |
      为孵化生产采购和隔离检疫亲本。
  BC-3520.10.20:
    name: 孵化运营
    description: |
      孵化场的卵孵化、幼体培育及苗种生产。
  BC-3520.10.30:
    name: 幼体放苗运营
    description: |
      将幼体放入养殖网箱、池塘和水槽。
  BC-3520.20:
    name: 水产养殖投喂运营
    description: |
      养殖水生物种的饲料规划、分发及饲料转化率监测。
  BC-3520.20.10:
    name: 饲料配方规划
    description: |
      按品种、生长阶段和水温规划饲料配方。
  BC-3520.20.20:
    name: 饲料分发运营
    description: |
      向网箱和池塘进行人工、机械和自动饲料分发。
  BC-3520.20.30:
    name: 饲料转化率监测
    description: |
      对照投喂计划监测饲料转化比。
  BC-3520.30:
    name: 水质管理
    description: |
      流水式和循环水养殖系统中的持续水质监测、增氧及水处理。
    in_scope:
      - 溶解氧和水温监测
      - 增氧运营
      - 水处理与循环利用
  BC-3520.30.10:
    name: 水质监测
    description: |
      实时监测溶解氧、水温、盐度和pH值。
  BC-3520.30.20:
    name: 增氧运营
    description: |
      运营增氧和纯氧注入系统。
  BC-3520.30.30:
    name: 水处理与循环利用
    description: |
      循环水系统中的机械、生物和紫外线水处理。
  BC-3520.40:
    name: 水生动物健康管理
    description: |
      养殖水生物种的疫病监测、治疗、生物安全及死亡量记录。
  BC-3520.40.10:
    name: 水生疫病监测
    description: |
      监测病原体、寄生虫及法定水生疫病。
  BC-3520.40.20:
    name: 水产养殖治疗运营
    description: |
      水中和浸浴治疗作业，包括海虱防控。
  BC-3520.40.30:
    name: 水产养殖生物安全运营
    description: |
      场地生物安全、设备消毒及转移管控。
  BC-3520.40.40:
    name: 死亡量记录
    description: |
      日常死亡量记录、分类及无害化处理管理。
  BC-3520.50:
    name: 网箱与池塘运营
    description: |
      养殖网箱、笼具和池塘的日常运营与完整性维护，包括天敌防控和防污损。
  BC-3520.50.10:
    name: 网具与笼具检查
    description: |
      定期检查网具、笼具及锚泊系统完整性。
  BC-3520.50.20:
    name: 天敌防控与逃逸预防
    description: |
      天敌驱离和逃逸预防运营。
  BC-3520.50.30:
    name: 防污损运营
    description: |
      水下基础设施的网具清洗和防污损作业。
  BC-3520.60:
    name: 水产养殖收获运营
    description: |
      采前抽样、收获执行及面向加工或活鱼市场的暂养运输。
  BC-3520.60.10:
    name: 采前抽样
    description: |
      采前规格、品质及残留抽样检测。
  BC-3520.60.20:
    name: 收获执行
    description: |
      集鱼、泵取、致昏及收获执行。
  BC-3520.60.30:
    name: 活鱼暂养与转运
    description: |
      活鱼暂养及通过活鱼船或罐车转运至加工商或市场。
  BC-3520.70:
    name: 水产养殖环境合规
    description: |
      场地级环境监测与报告，满足养殖许可证和认证计划要求。
  BC-3520.70.10:
    name: 场地环境监测
    description: |
      依据许可证条件开展场地级环境监测。
  BC-3520.70.20:
    name: 排污报告
    description: |
      向监管机构报告营养物质和废水排放。
  BC-3520.70.30:
    name: 底栖影响评估
    description: |
      网箱底部底栖影响调查及修复跟踪。
metadata:
  translator: Claude (zh-Hans automated)

locale: zh-Hans
source: L1-subscription-billing-revenue-management.yaml
entries:
  BC-4250:
    name: 订阅计费与收入管理
    description: |
      管理SaaS商业模式的用量计量、费率计算、开票、催款、订阅收入确认、订阅税务处理及经常性收入分析。
  BC-4250.10:
    name: 用量计量
    description: |
      采集和汇聚用量事件，为下游费率计算和分析提供数据输入。
  BC-4250.10.10:
    name: 用量事件采集
    description: |
      从产品服务将用量事件采集至计量流水线。
  BC-4250.10.20:
    name: 用量汇聚
    description: |
      按租户和计量维度将用量事件汇聚为可计费量。
  BC-4250.10.30:
    name: 计量数量对账
    description: |
      将计量数量与数据来源及客户可见计数器进行对账。
  BC-4250.20:
    name: 费率计算与计费
    description: |
      应用订阅费率、用量费率、按比例分摊及折扣计算应收费用。
  BC-4250.20.10:
    name: 订阅费率计算
    description: |
      按周期计算订阅经常性费用。
  BC-4250.20.20:
    name: 用量费率计算
    description: |
      从计量数量和费率表计算用量费用。
  BC-4250.20.30:
    name: 按比例分摊计算
    description: |
      计算周期中途变更产生的按比例分摊费用。
  BC-4250.20.40:
    name: 折扣应用
    description: |
      对计算出的费用应用商定折扣和抵扣额度。
  BC-4250.30:
    name: 开票与账单管理
    description: |
      生成、交付和调整发票，并处理客户账单争议。
  BC-4250.30.10:
    name: 发票生成
    description: |
      根据计算费用和合同条款生成发票。
  BC-4250.30.20:
    name: 发票交付
    description: |
      通过门户、邮件及合作伙伴渠道向客户交付发票。
  BC-4250.30.30:
    name: 发票调整
    description: |
      针对抵扣额度、错误及合同差异调整发票。
  BC-4250.30.40:
    name: 客户账单争议处理
    description: |
      分类和解决客户账单争议。
  BC-4250.40:
    name: 付款收取与催款
    description: |
      管理支付方式、付款授权、催款及非自愿流失恢复。
  BC-4250.40.10:
    name: 支付方式管理
    description: |
      捕获和管理客户支付方式及令牌。
  BC-4250.40.20:
    name: 付款授权
    description: |
      通过支付处理商授权和捕获经常性付款。
  BC-4250.40.30:
    name: 催款工作流
    description: |
      针对付款失败和账龄余额执行自动催款序列。
  BC-4250.40.40:
    name: 非自愿流失恢复
    description: |
      恢复因银行卡过期、硬拒付及类似付款失败而流失的订阅。
  BC-4250.50:
    name: 订阅收入确认
    description: |
      识别履约义务并按ASC 606/IFRS 15管理收入进度表。
  BC-4250.50.10:
    name: 履约义务识别
    description: |
      从订阅合同中识别单独的履约义务。
  BC-4250.50.20:
    name: 收入进度表管理
    description: |
      跨合同生命周期生成和维护收入确认进度表。
  BC-4250.50.30:
    name: 递延收入对账
    description: |
      将递延收入余额与已开票和已确认金额进行对账。
  BC-4250.60:
    name: 订阅税务管理
    description: |
      确定税务管辖区并计算经常性和基于用量的费用税额，处理税务豁免。
  BC-4250.60.10:
    name: 税务管辖区确定
    description: |
      按客户和费用确定适用的税务管辖区。
  BC-4250.60.20:
    name: 订阅税额计算
    description: |
      计算订阅和用量费用的间接税。
  BC-4250.60.30:
    name: 税务豁免处理
    description: |
      捕获和应用客户税务豁免证明。
  BC-4250.70:
    name: 订阅收入分析
    description: |
      计算和分析经常性收入健康指标，包括ARR、MRR、NRR、GRR及同期群视图。
  BC-4250.70.10:
    name: ARR与MRR计算
    description: |
      从订阅状态计算年度经常性收入（ARR）和月度经常性收入（MRR）。
  BC-4250.70.20:
    name: 净收入保留率与总收入保留率分析
    description: |
      跨客户同期群分析净收入保留率（NRR）和总收入保留率（GRR）。
  BC-4250.70.30:
    name: 同期群收入分析
    description: |
      基于同期群分析收入演变和保留动态。

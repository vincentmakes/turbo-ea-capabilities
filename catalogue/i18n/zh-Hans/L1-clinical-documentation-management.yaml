locale: zh-Hans
source: L1-clinical-documentation-management.yaml
entries:
  BC-2830:
    name: 临床文档管理
    description: |
      支撑患者护理现行记录的临床医生文档记录、计算机化医嘱录入、结果审阅、临床决策支持、文档改进及电子健康档案工作流管理。
  BC-2830.10:
    name: 临床病历记录
    description: |
      通过叙述性、结构化、语音和环境采集等方式，跨就诊类型撰写临床病历。
  BC-2830.10.10:
    name: 病程记录撰写
    description: |
      撰写住院和门诊病程记录。
  BC-2830.10.20:
    name: 操作记录撰写
    description: |
      撰写手术和诊疗操作记录。
  BC-2830.10.30:
    name: 出院小结撰写
    description: |
      撰写出院和转科/转院小结。
  BC-2830.10.40:
    name: 语音与环境采集文档
    description: |
      开展语音口述和环境采集文档工作流。
  BC-2830.20:
    name: 计算机化医嘱录入
    description: |
      医务人员录入药物、诊断和诊疗操作医嘱，包括套餐医嘱和临床路径。
  BC-2830.20.10:
    name: 药物医嘱录入
    description: |
      医务人员录入含剂量、给药途径和频次的药物医嘱。
  BC-2830.20.20:
    name: 诊断医嘱录入
    description: |
      医务人员录入检验、影像及其他诊断医嘱。
  BC-2830.20.30:
    name: 诊疗操作医嘱录入
    description: |
      医务人员录入诊疗操作和会诊医嘱。
  BC-2830.20.40:
    name: 套餐医嘱与路径使用
    description: |
      使用标准化套餐医嘱、计划医嘱和临床路径。
  BC-2830.30:
    name: 结果审阅与确认
    description: |
      路由、审阅和确认诊断结果，并管理危急值通报。
  BC-2830.30.10:
    name: 结果通知与路由
    description: |
      将结果路由至开单和值班医务人员。
  BC-2830.30.20:
    name: 结果确认
    description: |
      医务人员对已接收结果进行确认和签收。
  BC-2830.30.30:
    name: 危急结果沟通
    description: |
      在规定时限内沟通危急和恐慌值结果。
  BC-2830.30.40:
    name: 结果趋势审阅
    description: |
      在病历中审阅结果趋势和纵向数据。
  BC-2830.40:
    name: 临床决策支持
    description: |
      提供实时临床决策支持，包括警报、路径、风险评分展示和最佳实践建议。
  BC-2830.40.10:
    name: 药物相互作用警报
    description: |
      提供药物-药物、药物-过敏和药物-疾病相互作用警报。
  BC-2830.40.20:
    name: 临床路径指引
    description: |
      在诊疗点提供基于路径和指南的决策支持。
  BC-2830.40.30:
    name: 风险评分展示
    description: |
      展示临床风险评分，如病情恶化和脓毒症预测指标。
  BC-2830.40.40:
    name: 最佳实践建议管理
    description: |
      编写、调优和治理最佳实践建议。
  BC-2830.50:
    name: 临床文档改进
    description: |
      通过并发和回顾性审查、查询及宣教项目，提升文档完整性和特异性。
  BC-2830.50.10:
    name: 并发文档审查
    description: |
      对住院文档进行并发审查，确保临床准确性和特异性。
  BC-2830.50.20:
    name: 医务人员查询管理
    description: |
      生成和追踪合规的临床文档查询。
  BC-2830.50.30:
    name: 文档质量审计
    description: |
      审计临床文档质量及其对病例组合指数的影响。
  BC-2830.50.40:
    name: 医务人员文档宣教
    description: |
      对医务人员开展文档标准和改进机会的宣教。
  BC-2830.60:
    name: 电子健康档案工作流管理
    description: |
      管理临床医生的电子健康档案工作流，包括收件箱、任务、就诊关闭和交接管理。
  BC-2830.60.10:
    name: 收件箱与任务管理
    description: |
      管理临床医生收件箱消息、任务和待办队列。
  BC-2830.60.20:
    name: 就诊关闭
    description: |
      完成就诊关闭，包括临床编码、计费和文档补全。
  BC-2830.60.30:
    name: 代班文档记录
    description: |
      开展代班和值班文档工作流。
  BC-2830.60.40:
    name: 患者列表与交接管理
    description: |
      管理患者列表和班次间的结构化交接文档。
metadata:

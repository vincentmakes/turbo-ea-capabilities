locale: zh-Hans
source: L1-healthcare-revenue-cycle-management.yaml
entries:
  BC-2870:
    name: 医疗收费周期管理
    description: |
      管理医疗机构的费用采集和收费价格表、临床编码、医疗索赔生成和提交、拒付与申诉、现金过账、患者财务服务以及支付方合同管理。
  BC-2870.10:
    name: 费用采集与收费价格表管理
    description: |
      采集临床费用并跨服务线管理收费价格表。
  BC-2870.10.10:
    name: 费用采集
    description: |
      从临床文档和辅助系统采集费用。
  BC-2870.10.20:
    name: 收费价格表维护
    description: |
      维护收费价格表条目、编码和定价。
  BC-2870.10.30:
    name: 费用核对
    description: |
      按服务区域核对预期与实际采集的费用。
  BC-2870.10.40:
    name: 费用审计
    description: |
      对费用准确性和完整性开展内部和外部审计。
  BC-2870.20:
    name: 临床编码管理
    description: |
      开展住院、门诊和专业费用的编码生产和合规审计。
  BC-2870.20.10:
    name: 住院编码
    description: |
      使用诊断相关分组方法对住院就诊进行编码。
  BC-2870.20.20:
    name: 门诊编码
    description: |
      使用门诊预付款分类方法对门诊就诊进行编码。
  BC-2870.20.30:
    name: 专业费用编码
    description: |
      使用诊疗程序和评估管理编码对专业费用服务进行编码。
  BC-2870.20.40:
    name: 编码审计与合规
    description: |
      开展编码审计、合规和宣教项目。
  BC-2870.30:
    name: 医疗索赔生成与提交
    description: |
      生成、审核、提交并追踪向支付方提交的医疗索赔状态。
  BC-2870.30.10:
    name: 索赔编辑与审核
    description: |
      在提交前应用编辑规则和索赔审核规则。
  BC-2870.30.20:
    name: 索赔提交
    description: |
      向支付方和票据交换所电子提交医疗索赔。
  BC-2870.30.30:
    name: 索赔状态查询
    description: |
      通过电子和人工方式查询和跟进索赔状态。
  BC-2870.30.40:
    name: 赔付协调顺序
    description: |
      确定跨支付方的主要、次要和第三方索赔提交顺序。
  BC-2870.40:
    name: 拒付与申诉管理
    description: |
      对支付方拒付和少付进行分诊、申诉和预防。
  BC-2870.40.10:
    name: 拒付分诊
    description: |
      按拒付原因和追回概率对被拒索赔进行分诊和路由。
  BC-2870.40.20:
    name: 申诉起草与提交
    description: |
      起草和提交临床和技术申诉。
  BC-2870.40.30:
    name: 少付分析
    description: |
      识别和追偿支付方相对于合同费率的少付金额。
  BC-2870.40.40:
    name: 拒付预防分析
    description: |
      通过根本原因分析预防反复出现的拒付。
  BC-2870.50:
    name: 现金过账与支付方核对
    description: |
      过账支付方汇款和患者付款，并与预期报销金额核对。
  BC-2870.50.10:
    name: 汇款过账
    description: |
      进行电子汇款通知过账和核对。
  BC-2870.50.20:
    name: 患者付款过账
    description: |
      过账跨渠道的患者付款。
  BC-2870.50.30:
    name: 合同调整应用
    description: |
      根据支付方协议应用合同调整。
  BC-2870.50.40:
    name: 未过账现金处理
    description: |
      解决和应用未识别和未过账的现金。
  BC-2870.60:
    name: 患者财务服务
    description: |
      管理患者账单、催收、分期付款计划和坏账处置。
  BC-2870.60.10:
    name: 患者账单生成
    description: |
      通过纸质和数字渠道生成患者账单。
  BC-2870.60.20:
    name: 患者催收
    description: |
      开展自费患者催收运营和外联。
  BC-2870.60.30:
    name: 分期付款计划管理
    description: |
      设置和管理患者分期付款计划。
  BC-2870.60.40:
    name: 坏账处置
    description: |
      将账户移交外部催收机构并进行管理。
  BC-2870.70:
    name: 支付方合同管理
    description: |
      对支付方合同进行建模、谈判支持、差异分析和绩效监控。
  BC-2870.70.10:
    name: 合同建模
    description: |
      对支付方合同条款和报销方法进行建模。
  BC-2870.70.20:
    name: 报销差异分析
    description: |
      分析合同约定与实际报销之间的差异。
  BC-2870.70.30:
    name: 合同谈判支持
    description: |
      为支付方合同谈判提供分析和运营支持。
  BC-2870.70.40:
    name: 支付方绩效监控
    description: |
      持续监控支付方对合同SLA的履行情况。

locale: zh-Hans
source: L1-student-recruitment-admissions-management.yaml
entries:
  BC-4710:
    name: 招生与入学管理
    description: |
      对潜在学生进行全流程的吸引、申请处理、录取决策及转化，包括经济援助发放和国际生入学处理，最终将其转化为在校学习者。
  BC-4710.10:
    name: 招生推广
    description: |
      通过活动、招生宣传会及潜在生源挖掘，开展面向潜在学生的对外招生工作。
    in_scope:
      - 招生宣传活动及入站咨询处理
      - 开放日、招生宣传会及校园参观
      - 潜在生源捕获与培育
    out_of_scope:
      - 机构整体品牌营销（见跨行业营销管理）
  BC-4710.10.10:
    name: 招生活动运营
    description: |
      跨渠道规划与执行学生招募活动。
  BC-4710.10.20:
    name: 开放日与校园参观运营
    description: |
      组织开放日、体验课及潜在生校园参观活动。
  BC-4710.10.30:
    name: 潜在生源管理
    description: |
      捕获、培育及筛选潜在学生生源。
  BC-4710.20:
    name: 申请管理
    description: |
      接收和处理潜在学生的申请，包括支持材料和申请状态沟通。
    in_scope:
      - 申请接收与验证
      - 文件与推荐信核查
      - 申请状态沟通
    out_of_scope:
      - 入学决定（见入学决策）
  BC-4710.20.10:
    name: 申请接收与验证
    description: |
      通过各渠道接收申请并验证完整性。
  BC-4710.20.20:
    name: 支持文件核查
    description: |
      核查成绩单、推荐信及支持文件。
  BC-4710.20.30:
    name: 申请状态沟通
    description: |
      向申请人沟通申请处理进度。
  BC-4710.30:
    name: 入学决策
    description: |
      依据公布的入学标准对申请进行评估、评分、委员会审查并发出入学决定。
    in_scope:
      - 入学评估与评分
      - 入学委员会审查
      - 发出入学决定
    out_of_scope:
      - 经济援助发放（见经济援助与奖学金管理）
  BC-4710.30.10:
    name: 入学评估与评分
    description: |
      按入学标准对申请人进行评估和评分。
  BC-4710.30.20:
    name: 入学委员会审查
    description: |
      委员会或专家组对边缘案例及竞争性申请进行审查。
  BC-4710.30.30:
    name: 决定通知
    description: |
      发出录取通知、有条件录取、候补及拒绝通知。
  BC-4710.40:
    name: 经济援助与奖学金管理
    description: |
      确定、发放并拨付经济援助、奖学金、助学金及补助，支持入学机会与学费可承受性。
    in_scope:
      - 经济援助资格评估
      - 奖学金发放管理
      - 助学金与补助拨付
    out_of_scope:
      - 第四章/公共资助合规（见教育合规与监管报告管理）
  BC-4710.40.10:
    name: 经济援助资格评估
    description: |
      评估需求型和绩效型经济援助资格。
  BC-4710.40.20:
    name: 奖学金发放管理
    description: |
      管理来自内外部来源的奖学金发放工作。
  BC-4710.40.30:
    name: 助学金与补助拨付
    description: |
      拨付助学金、补助及学费支持款项。
  BC-4710.50:
    name: 录取通知转化与入学确认
    description: |
      将录取通知转化为确认入学，包括录取接受处理、入学前导入及转化分析。
    in_scope:
      - 录取接受跟踪
      - 入学前导入活动
      - 录取率与转化分析
    out_of_scope:
      - 正式入学与注册（见学籍与档案管理）
  BC-4710.50.10:
    name: 录取通知发放与接受跟踪
    description: |
      发放录取通知并跟踪接受、拒绝及延迟入学情况。
  BC-4710.50.20:
    name: 入学前导入
    description: |
      已录取学生在正式入学前完成的导入任务。
  BC-4710.50.30:
    name: 录取率管理与转化分析
    description: |
      分析录取率、流失率及转化绩效数据。
  BC-4710.60:
    name: 国际生入学管理
    description: |
      对国际申请人进行专项处理，包括学历认定、语言能力评估及签证担保文件生成。
    in_scope:
      - 国际学历认定
      - 英语语言能力评估
      - 签证担保文件生成
    out_of_scope:
      - 在校国际生持续签证合规（见教育合规与监管报告管理）
  BC-4710.60.10:
    name: 国际学历认定
    description: |
      对照国内等效标准评定海外学历。
  BC-4710.60.20:
    name: 英语语言能力评估
    description: |
      评估非母语申请人的英语语言能力。
  BC-4710.60.30:
    name: 签证担保文件
    description: |
      向已录取学生发放签证担保文件（如I-20、CAS）。

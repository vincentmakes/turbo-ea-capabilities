locale: zh-Hans
source: L1-audience-measurement-insights-management.yaml
entries:
  BC-3770:
    name: 受众测量与洞察管理
    description: |
      跨线性、点播及直播内容服务，采集收视遥测数据，进行抽样与普查测量，开展内容绩效分析、推荐建模及受众研究。
  BC-3770.10:
    name: 收视数据采集
    description: |
      将线性收视、OTT播放遥测及机顶盒普查信号采集至分析平台。
  BC-3770.10.10:
    name: 线性收视数据采集
    description: |
      从运营商回传链路和合作伙伴来源采集线性收视数据。
  BC-3770.10.20:
    name: OTT播放遥测采集
    description: |
      从客户端和源站服务采集OTT播放遥测数据用于分析。
  BC-3770.10.30:
    name: 机顶盒普查数据采集
    description: |
      普查级采集机顶盒收视事件并应用隐私保护控制。
  BC-3770.20:
    name: 受众抽样与普查测量
    description: |
      校准收视率调查样本，生成货币化测量指标，并进行跨平台受众去重。
  BC-3770.20.10:
    name: 调查样本校准
    description: |
      将基于样本的测量结果与普查信号和人口特征框架进行校准。
  BC-3770.20.20:
    name: 货币化测量指标生成
    description: |
      为交易和报告生成货币化级别的受众测量指标。
  BC-3770.20.30:
    name: 跨平台受众去重
    description: |
      对线性、OTT及数字界面的受众进行去重，形成统一的跨平台视图。
  BC-3770.30:
    name: 内容绩效分析
    description: |
      按片名、受众群及时间维度分析内容绩效，为委托和采购决策提供依据。
  BC-3770.30.10:
    name: 片名绩效报告
    description: |
      提供片名级别的触达率、完播率及贡献度绩效报告。
  BC-3770.30.20:
    name: 互动漏斗分析
    description: |
      对发现、启动、完播及后续观看行为进行漏斗分析。
  BC-3770.30.30:
    name: 受众群与生命周期价值分析
    description: |
      针对直接面向消费者订户进行受众群留存和生命周期价值分析。
  BC-3770.40:
    name: 内容推荐建模
    description: |
      训练、测试并为观众界面个性化组合内容推荐。
  BC-3770.40.10:
    name: 推荐模型训练
    description: |
      基于观看和元数据信号训练并维护推荐模型的生命周期。
  BC-3770.40.20:
    name: 推荐A/B测试管理
    description: |
      对推荐策略和界面决策开展A/B测试和多臂老虎机实验。
  BC-3770.40.30:
    name: 个性化内容单元组合
    description: |
      为观众界面组合个性化首页、行及货架内容单元。
  BC-3770.50:
    name: 受众洞察与研究管理
    description: |
      开展定制化定量和定性受众研究，并向业务团队综合分发研究洞察。
  BC-3770.50.10:
    name: 定制受众研究
    description: |
      设计并开展定制受众研究，包括受众分层和追踪研究。
  BC-3770.50.20:
    name: 定性研究管理
    description: |
      与观众开展定性研究，包括焦点小组和深度访谈。
  BC-3770.50.30:
    name: 洞察综合与分发
    description: |
      将测量和研究成果综合为洞察，并向业务受众分发。
metadata:

locale: zh-Hans
source: L1-financial-crime-management.yaml
entries:
  BC-1400:
    name: 金融犯罪管理
    description: |
      提供反洗钱（AML）交易监控、制裁筛查、欺诈探测和可疑交易报告等能力，保护银行及其客户免受金融犯罪威胁。
  BC-1400.10:
    name: AML 交易监控管理
    description: |
      管理 AML 监控规则、告警和情景模型，有效识别潜在的洗钱活动。
  BC-1400.10.10:
    name: AML 情景与规则设计
    description: |
      设计 AML 监控情景、规则和阈值，精准捕获异常交易模式。
  BC-1400.10.20:
    name: AML 告警生成
    description: |
      从交易监控系统生成 AML 告警，为进一步调查提供线索。
  BC-1400.10.30:
    name: AML 告警分拣
    description: |
      对 AML 告警进行分拣和基于风险的优先级排序，提高调查资源的使用效率。
  BC-1400.10.40:
    name: AML 模型调优与验证
    description: |
      对 AML 模型进行调优、验证和有效性评审，保持模型的检测准确性。
  BC-1400.20:
    name: 制裁筛查管理
    description: |
      管理制裁名单、名称和交易筛查及命中处置，确保制裁合规的全面覆盖。
  BC-1400.20.10:
    name: 制裁名单管理
    description: |
      汇总和维护制裁监控名单，确保名单的完整性和及时更新。
  BC-1400.20.20:
    name: 客户名称筛查
    description: |
      对客户和交易对手开展制裁名单筛查，识别受制裁主体。
  BC-1400.20.30:
    name: 交易制裁筛查
    description: |
      对交易进行实时制裁名单筛查，拦截涉及受制裁主体的交易。
  BC-1400.20.40:
    name: 制裁命中处置
    description: |
      调查和处置制裁筛查命中，作出合规的处理决定。
  BC-1400.30:
    name: 欺诈探测与调查管理
    description: |
      跨产品和渠道开展欺诈探测和调查，最大限度降低欺诈损失。
  BC-1400.30.10:
    name: 申请欺诈探测
    description: |
      在客户或产品申请阶段探测欺诈行为，防范身份欺诈和虚假申请。
  BC-1400.30.20:
    name: 交易欺诈探测
    description: |
      对交易进行实时欺诈探测，快速识别和拦截欺诈交易。
  BC-1400.30.30:
    name: 欺诈调查
    description: |
      调查和处置欺诈案件，追查欺诈资金并维护客户权益。
  BC-1400.30.40:
    name: 欺诈损失与追收管理
    description: |
      跟踪欺诈损失情况并开展追收工作，将欺诈损失降至最低。
  BC-1400.30.50:
    name: 授权推送支付欺诈处置
    description: |
      处理授权推送支付（APP）欺诈案件和赔偿事宜，保护受害客户。
  BC-1400.40:
    name: 可疑交易报告管理
    description: |
      向金融情报机构（FIU）提交可疑交易报告（SAR/STR）并履行监管报告义务。
  BC-1400.40.10:
    name: SAR 起草与提交
    description: |
      起草并向金融情报机构提交 SAR/STR，履行反洗钱报告义务。
  BC-1400.40.20:
    name: 金融犯罪监管报告
    description: |
      定期向监管机构报告金融犯罪情况，满足监管合规要求。
  BC-1400.40.30:
    name: 执法机构联络
    description: |
      与执法机构开展联络，配合响应信息调取请求和刑事调查。
  BC-1400.50:
    name: 金融犯罪调查管理
    description: |
      开展案件管理、金融犯罪调查和升级处理，确保案件的规范高效处置。
  BC-1400.50.10:
    name: 案件管理
    description: |
      管理金融犯罪调查的案件台账，追踪案件进展和处置状态。
  BC-1400.50.20:
    name: 调查执行
    description: |
      开展调查和证据收集，为案件决策提供充分的事实依据。
  BC-1400.50.30:
    name: 升级与结案
    description: |
      对调查案件进行升级处理、决策和结案，确保每个案件得到妥善处置。

locale: zh-Hans
source: L1-deposits-savings-management.yaml
entries:
  BC-1330:
    name: 存款与储蓄管理
    description: |
      管理活期账户、储蓄账户和定期存款的全生命周期，为客户提供安全稳定的资金存放和增值服务。
  BC-1330.10:
    name: 存款账户管理
    description: |
      管理活期存款账户和结算账户，保障客户日常资金收付的顺畅运转。
  BC-1330.10.10:
    name: 活期账户运营
    description: |
      运营活期账户，包括透支额度管理，满足客户日常交易结算需求。
  BC-1330.10.20:
    name: 联名与授权账户管理
    description: |
      管理联名账户、信托账户和授权账户的行政事务，规范特殊账户的开立和维护。
  BC-1330.10.30:
    name: 存款账户对账单
    description: |
      为存款账户生成并发送对账单，帮助客户核对账户资金变动情况。
  BC-1330.20:
    name: 储蓄产品管理
    description: |
      管理储蓄存款、定期储蓄和免税储蓄产品的运营，满足客户多元化的储蓄需求。
  BC-1330.20.10:
    name: 随存随取储蓄运营
    description: |
      运营随存随取和通知储蓄账户，为客户提供灵活便捷的储蓄方式。
  BC-1330.20.20:
    name: 定期储蓄计划运营
    description: |
      运营定期储蓄计划和自动转账安排，帮助客户建立规律的储蓄习惯。
  BC-1330.20.30:
    name: 税收优惠储蓄运营
    description: |
      运营 ISA、IRA 及等效税收优惠储蓄产品，为客户提供合规的税收规划工具。
  BC-1330.30:
    name: 定期存款管理
    description: |
      管理定期存款、存款凭证（CD）和结构性存款的全流程，为客户提供稳定的固定收益储蓄选择。
  BC-1330.30.10:
    name: 定期存款预订
    description: |
      完成定期存款的预订和确认，明确定存条款和利率。
  BC-1330.30.20:
    name: 定期存款到期处理
    description: |
      处理定期存款到期、滚存和续存选项，为客户提供灵活的到期处置方式。
  BC-1330.30.30:
    name: 结构性存款运营
    description: |
      运营结构性存款和双货币存款产品，满足寻求增强收益客户的差异化需求。
  BC-1330.30.40:
    name: 提前支取与违约金计算
    description: |
      处理定期存款提前支取并计算违约成本，平衡客户流动性需求与产品条款约定。
  BC-1330.40:
    name: 账户全生命周期运营管理
    description: |
      管理账户开立、休眠和注销的全流程运营，确保账户状态的合规管理。
  BC-1330.40.10:
    name: 账户开立运营
    description: |
      完成新存款账户的运营性开立，确保账户信息设置准确无误。
  BC-1330.40.20:
    name: 休眠账户管理
    description: |
      识别和管理休眠账户，按照监管要求规范处置长期不活动账户。
  BC-1330.40.30:
    name: 账户注销运营
    description: |
      执行账户注销运营和最终清算，妥善完成账户终止手续。
  BC-1330.40.40:
    name: 无人认领余额报告
    description: |
      上报并移交无人认领余额，满足监管要求并保障客户利益。
  BC-1330.50:
    name: 存款定价与利息管理
    description: |
      管理存款利率、对账单和利息计提，确保客户利息收益的准确计算和及时支付。
  BC-1330.50.10:
    name: 存款利率设定
    description: |
      设定存款利率和利率卡，支持竞争性的存款定价策略。
  BC-1330.50.20:
    name: 利息计提与计算
    description: |
      每日计提利息并定期入账，保证利息计算的准确性。
  BC-1330.50.30:
    name: 存款利息预扣税
    description: |
      对存款利息进行预扣税处理和报告，满足税务合规要求。
  BC-1330.50.40:
    name: 存款保险报告
    description: |
      向存款保险制度提交报告并缴纳保费，保障存款人利益。
metadata:
  translator: Claude (zh-Hans automated)

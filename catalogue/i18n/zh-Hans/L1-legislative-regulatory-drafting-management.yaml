locale: zh-Hans
source: L1-legislative-regulatory-drafting-management.yaml
entries:
  BC-3210:
    name: 立法与法规起草管理
    description: |
      开展主要立法、附属法规、法定文书和行政命令的起草、法律审查、影响评估、议会或立法机关程序协调及法典化工作。
  BC-3210.10:
    name: 立法起草
    description: |
      由议会法律顾问或立法起草员对主要立法、法案及修正案进行起草。
    in_scope:
      - 法案和修正案起草
      - 起草指令处理
      - 简明语言和双语起草
    out_of_scope:
      - 法规和法定文书（由法规起草覆盖）
  BC-3210.10.10:
    name: 起草指令接收
    description: |
      接收并厘清政策和部长发起人的起草指令。
  BC-3210.10.20:
    name: 法案和修正案起草
    description: |
      起草法案、修正案和附带条款。
  BC-3210.10.30:
    name: 起草质量审查
    description: |
      由资深法律顾问对立法草案进行清晰度、一致性和效力审查。
  BC-3210.20:
    name: 法规起草
    description: |
      起草附属法规、法定文书、行政命令和行政规则。
  BC-3210.20.10:
    name: 法规和法定文书起草
    description: |
      依据授权立法起草法规和法定文书。
  BC-3210.20.20:
    name: 行政命令起草
    description: |
      起草行政命令、法令和公告。
  BC-3210.20.30:
    name: 行政规则起草
    description: |
      起草机构行政规则和通知。
  BC-3210.30:
    name: 法律审查与合宪性审查
    description: |
      对草案文件进行合宪性、人权及国际法符合性法律审查。
  BC-3210.30.10:
    name: 合宪性审查
    description: |
      依据宪法权力、权利和限制审查草案。
  BC-3210.30.20:
    name: 人权相容性评估
    description: |
      评估草案与人权条约和宪章的相容性。
  BC-3210.30.30:
    name: 国际法符合性审查
    description: |
      审查草案是否符合条约和超国家义务。
  BC-3210.40:
    name: 监管影响评估
    description: |
      依据经合组织更好监管原则，评估拟议文件的预期成本、效益和分配效应。
  BC-3210.40.10:
    name: 影响范围界定
    description: |
      界定监管影响评估范围并确定相称性。
  BC-3210.40.20:
    name: 成本效益分析
    description: |
      量化监管成本和效益，包括合规负担。
  BC-3210.40.30:
    name: 中小企业测试
    description: |
      评估对小企业和中小企业的不相称影响。
  BC-3210.40.40:
    name: 影响评估发布
    description: |
      与文件及配套证据一并发布影响评估报告。
  BC-3210.50:
    name: 立法程序协调
    description: |
      协调法案通过议会或立法机关的程序，包括委员会证词、修正案及御准或颁布。
  BC-3210.50.10:
    name: 议会联络
    description: |
      就政府法案与议会或立法机关进行联络。
  BC-3210.50.20:
    name: 委员会证词准备
    description: |
      为立法委员会准备证词、情况汇报和证人。
  BC-3210.50.30:
    name: 修正案跟踪
    description: |
      跟踪和评估立法修正案在各审议阶段的进展。
  BC-3210.50.40:
    name: 颁布与御准协调
    description: |
      协调最终颁布、御准或行政首长签署工作。
  BC-3210.60:
    name: 法律法规汇编与发布
    description: |
      对法规和规章文本进行汇编、整合、官方公报发布和持续维护。
  BC-3210.60.10:
    name: 官方公报发布
    description: |
      在官方公报或期刊上发布已颁布的文件。
  BC-3210.60.20:
    name: 整合与法典化
    description: |
      对修正案进行整合并编入法典。
  BC-3210.60.30:
    name: 法律文本维护
    description: |
      持续维护并以机器可读形式发布法规和规章文本。

locale: zh-Hans
source: L1-permits-licences-authorisations-management.yaml
entries:
  BC-3240:
    name: 许可证、执照与授权管理
    description: |
      对政府向人员、企业和活动颁发的许可证、执照和授权进行签发、续期、暂停、撤销和注册维护，涵盖职业、环境、专业和经营许可。
  BC-3240.10:
    name: 申请接收与分诊
    description: |
      接收许可证、执照和授权申请，进行完整性审查和分诊。
  BC-3240.10.10:
    name: 申请提交
    description: |
      通过多渠道接收许可证和执照申请提交。
  BC-3240.10.20:
    name: 完整性审查
    description: |
      核实申请材料是否完整并满足文件要求。
  BC-3240.10.30:
    name: 申请分发
    description: |
      将申请分发至相应的许可机构和审核人员。
  BC-3240.10.40:
    name: 费用核定与收缴
    description: |
      核定和收缴法定申请费和许可证费。
  BC-3240.20:
    name: 资格与条件评估
    description: |
      评估申请人是否符合申请许可的适格性、资质和法定标准。
  BC-3240.20.10:
    name: 适格性评估
    description: |
      评估申请人的适格性、诚信度和违规历史。
  BC-3240.20.20:
    name: 资质核实
    description: |
      核实许可证所需的资质、能力和先决条件。
  BC-3240.20.30:
    name: 背景调查协调
    description: |
      协调所需的背景调查、犯罪记录和安全审查。
  BC-3240.20.40:
    name: 公共利益评估
    description: |
      评估法定的公共利益、环境或土地利用标准。
  BC-3240.30:
    name: 签发与续期运营
    description: |
      对许可证、执照和授权作出决定、进行签发和续期，包括附加条件、有效期和凭证。
  BC-3240.30.10:
    name: 许可决定
    description: |
      对许可证和执照的批准、拒绝或附条件批准作出决定。
  BC-3240.30.20:
    name: 凭证签发
    description: |
      制作和签发实体及数字许可证凭证。
  BC-3240.30.30:
    name: 续期处理
    description: |
      处理续期申请并开展持续资格审查。
  BC-3240.30.40:
    name: 变更与背书处理
    description: |
      处理许可证变更、背书和条件修改申请。
  BC-3240.40:
    name: 检查与合规核实
    description: |
      对被许可方就许可条件和法定义务的合规情况开展检查、审计和核实。
  BC-3240.40.10:
    name: 检查规划
    description: |
      基于风险规划和排期合规检查工作。
  BC-3240.40.20:
    name: 现场检查执行
    description: |
      开展现场检查和证据采集。
  BC-3240.40.30:
    name: 合规报告审核
    description: |
      审核被许可方提交的强制合规报告和自我认证材料。
  BC-3240.50:
    name: 暂停、撤销与处罚
    description: |
      对不合规被许可方采取执法行动，包括警告通知、暂停、撤销、民事处罚和制裁。
  BC-3240.50.10:
    name: 违规调查
    description: |
      调查疑似违反许可证条件的行为。
  BC-3240.50.20:
    name: 执法行动决定
    description: |
      对从警告到撤销的各类执法行动作出决定。
  BC-3240.50.30:
    name: 民事处罚签发
    description: |
      签发、记录和收缴民事处罚款项。
  BC-3240.50.40:
    name: 暂停与撤销执行
    description: |
      执行暂停和撤销命令，撤回许可凭证。
  BC-3240.60:
    name: 许可证注册管理
    description: |
      维护已签发、暂停和撤销许可证及执照的注册并向公众公开。
  BC-3240.60.10:
    name: 注册维护
    description: |
      维护许可证和执照的权威注册记录。
  BC-3240.60.20:
    name: 公开注册披露
    description: |
      发布面向公众的注册查询和检索服务。
  BC-3240.60.30:
    name: 注册核实服务
    description: |
      向依赖方提供凭证核实服务。

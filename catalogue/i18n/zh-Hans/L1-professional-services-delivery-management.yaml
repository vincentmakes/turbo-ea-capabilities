locale: zh-Hans
source: L1-professional-services-delivery-management.yaml
entries:
  BC-4310:
    name: 专业服务交付管理
    description: |
      执行咨询、法律、审计及顾问接洽，包括工作规划、现场工作、交付物生产、内部审查及依据商定接洽范围开展接洽报告。
  BC-4310.10:
    name: 接洽规划管理
    description: |
      对接洽工作、里程碑、交付物结构及与适用执业标准一致的风险定制程序进行详细规划。
  BC-4310.10.10:
    name: 接洽工作计划定义
    description: |
      定义接洽的工作分解、里程碑及依赖关系。
  BC-4310.10.20:
    name: 接洽基于风险的程序定制
    description: |
      按接洽专项风险和重要性定制审计程序、咨询分析或法律步骤。
  BC-4310.10.30:
    name: 接洽交付物计划定义
    description: |
      定义交付物结构、格式及审查检查点。
  BC-4310.10.40:
    name: 接洽日程管理
    description: |
      按工作计划进行接洽活动和资源可用性的日常调度。
  BC-4310.20:
    name: 接洽执行管理
    description: |
      开展接洽工作的日常交付——现场工作、咨询分析、审计测试、起草及客户互动。
  BC-4310.20.10:
    name: 审计程序执行
    description: |
      执行审计和鉴证程序，包括实质性测试、控制测试及分析程序。
  BC-4310.20.20:
    name: 咨询分析执行
    description: |
      开展咨询分析、建模、基准对标及建议方案开发。
  BC-4310.20.30:
    name: 法律事务执行
    description: |
      开展实质性法律工作，包括起草、意见书、法院提交文件、交易执行及法律顾问服务。
  BC-4310.20.40:
    name: 客户互动管理
    description: |
      在执行期间进行日常客户互动——访谈、信息请求、状态电话及利益相关方研讨会。
  BC-4310.30:
    name: 接洽交付物管理
    description: |
      起草、版本管控并完成审计报告、意见书、咨询报告及交易文件等接洽交付物。
  BC-4310.30.10:
    name: 交付物起草
    description: |
      使用事务所模板、方法论和接洽发现生产交付物草稿。
  BC-4310.30.20:
    name: 交付物版本管控
    description: |
      在审查周期中对交付物草稿进行版本控制、分支管理及审计追踪。
  BC-4310.30.30:
    name: 交付物定稿
    description: |
      完成交付物的最终格式化、签名栏及发布打包。
  BC-4310.40:
    name: 接洽工作底稿管理
    description: |
      捕获、组织和保留支持交付物和结论的接洽工作底稿及证据。
    in_scope:
      - 接洽档案工作底稿
      - 证据索引与交叉引用
      - 档案组装与锁定
    out_of_scope:
      - 可复用的方法论和先例资产（BC-4370）
  BC-4310.40.10:
    name: 工作底稿捕获
    description: |
      将证据、分析及备注捕获至接洽工作底稿档案。
  BC-4310.40.20:
    name: 工作底稿索引与交叉引用
    description: |
      将工作底稿与交付物断言和程序步骤进行索引和交叉引用。
  BC-4310.40.30:
    name: 接洽档案组装与锁定
    description: |
      组装最终接洽档案并在规定管控之外锁定，防止签发后被修改。
  BC-4310.50:
    name: 接洽内部审查管理
    description: |
      在交付物发布前，由审查人员、经理和合伙人开展接洽内审查周期；有别于事务所级质量监控。
    out_of_scope:
      - 事务所级质量监控和EQR（BC-4340）
  BC-4310.50.10:
    name: 经理对工作底稿的审查
    description: |
      在合伙人签字前由经理级别审查工作底稿和结论。
  BC-4310.50.20:
    name: 合伙人审查与签字
    description: |
      由接洽合伙人审查并签字确认交付物和意见书。
  BC-4310.50.30:
    name: 专业技术审查
    description: |
      由技术专家（税务、估值、IT、精算）在需要专业输入的领域开展审查。
  BC-4310.60:
    name: 外部专家接洽管理
    description: |
      在接洽中接洽联合顾问、专家证人、分包商及第三方专家。
  BC-4310.60.10:
    name: 联合顾问与分包商接洽
    description: |
      选择并接洽联合顾问、本地顾问或咨询分包商。
  BC-4310.60.20:
    name: 专家证人接洽
    description: |
      识别、接洽并管理专家证人和外部专家。
  BC-4310.60.30:
    name: 外部专家质量监督
    description: |
      监督外部专家的工作成果，评估其对接洽结论的依赖程度。
  BC-4310.70:
    name: 接洽报告与沟通
    description: |
      在执行过程中向客户和接洽领导层进行状态报告、阶段性沟通及最终报告。
  BC-4310.70.10:
    name: 接洽状态报告
    description: |
      定期向接洽领导层和客户更新状态，包括进展、风险和问题。
  BC-4310.70.20:
    name: 阶段性发现沟通
    description: |
      在执行过程中向客户阶段性沟通初步发现、观察及重大问题。
  BC-4310.70.30:
    name: 最终接洽报告
    description: |
      作为接洽收尾的一部分，签发最终报告、意见书及管理建议书。

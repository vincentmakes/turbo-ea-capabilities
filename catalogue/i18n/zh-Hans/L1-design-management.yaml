locale: zh-Hans
source: L1-design-management.yaml
entries:
  BC-1120:
    name: 设计管理
    description: |
      管理从概念到详细设计与验证的工程设计全生命周期，确保设计符合要求并通过验证。
  BC-1120.10:
    name: 概念设计管理
    description: |
      开展概念研究、可行性分析与方案比选，为项目立项提供依据。
  BC-1120.10.10:
    name: 概念研究定义
    description: |
      界定概念研究范围、设计基础与假设条件。
  BC-1120.10.20:
    name: 可行性分析
    description: |
      开展技术、进度与经济可行性分析。
  BC-1120.10.30:
    name: 方案分析与选择
    description: |
      开展多准则方案分析并完成概念选型。
  BC-1120.20:
    name: 前端工程设计管理
    description: |
      开展FEED、基础工程与范围及费用确定。
  BC-1120.20.10:
    name: 基础工程设计
    description: |
      完成工艺、机械与电气专业的基础工程设计。
  BC-1120.20.20:
    name: FEED费用与进度估算
    description: |
      基于FEED成果编制3类/2类费用与进度估算。
  BC-1120.20.30:
    name: FEED可交付物产出
    description: |
      产出FEED可交付物与设计基础文件。
  BC-1120.30:
    name: 详细设计管理
    description: |
      完成详细工程计算、施工图与规格书，为采购与施工提供完整依据。
  BC-1120.30.10:
    name: 详细工程计算
    description: |
      完成各专业详细计算与分析。
  BC-1120.30.20:
    name: 施工图产出
    description: |
      产出已批准用于施工的图纸。
  BC-1120.30.30:
    name: 详细规格书编写
    description: |
      编写详细设备与材料规格书。
  BC-1120.30.40:
    name: 工程量清单编制
    description: |
      为采购与施工编制并维护工程量清单（BOQ）。
  BC-1120.40:
    name: 设计评审与验证管理
    description: |
      通过HAZOP、设计评审、验证与确认确保设计质量与安全。
  BC-1120.40.10:
    name: HAZOP与HAZID研讨
    description: |
      主持危险识别与HAZOP研讨会。
  BC-1120.40.20:
    name: 设计评审节点
    description: |
      组织阶段设计评审（30%、60%、90%）。
  BC-1120.40.30:
    name: 设计验证
    description: |
      验证设计符合需求与标准。
  BC-1120.40.40:
    name: 设计确认
    description: |
      确认设计满足预期用途与客户需求。
  BC-1120.50:
    name: 设计软件与CAD管理
    description: |
      管理CAD/CAE工具、三维建模、BIM与数字化设计环境。
  BC-1120.50.10:
    name: CAD标准管理
    description: |
      制定并维护CAD标准、图层方案与模板库。
  BC-1120.50.20:
    name: 三维模型管理
    description: |
      管理跨专业集成三维模型。
  BC-1120.50.30:
    name: BIM环境管理
    description: |
      管理BIM公共数据环境并对齐ISO 19650标准。
  BC-1120.50.40:
    name: 工程软件管理
    description: |
      管理工程软件工具的管理与许可。
  BC-1120.60:
    name: 多专业设计协调管理
    description: |
      开展跨专业协调、碰撞检测与集成模型管理。
  BC-1120.60.10:
    name: 碰撞检测
    description: |
      对各专业三维模型开展碰撞检测。
  BC-1120.60.20:
    name: 集成模型协调
    description: |
      协调跨专业集成模型。
  BC-1120.60.30:
    name: 设计问题解决
    description: |
      解决设计协调过程中产生的问题。

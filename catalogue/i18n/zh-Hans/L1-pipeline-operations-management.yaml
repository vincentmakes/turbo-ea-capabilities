locale: zh-Hans
source: L1-pipeline-operations-management.yaml
entries:
  BC-3060:
    name: 管道运营管理
    description: |
      油气集输和长输管道的运营、完整性及商务管理，涵盖调度室调控、内检测、泄漏检测、运输计划与申报及管输费管理。
  BC-3060.10:
    name: 管道控制运营
    description: |
      对液体和气体管道进行调度室调控和SCADA操作。
  BC-3060.10.10:
    name: 管道调度与控制
    description: |
      对管道运营进行24小时调度室调控。
  BC-3060.10.20:
    name: SCADA运营
    description: |
      运营管道SCADA系统和现场遥测装置。
  BC-3060.10.30:
    name: 管道水力建模
    description: |
      对管道流态进行实时和离线水力建模。
  BC-3060.10.40:
    name: 操作员培训模拟器管理
    description: |
      依据监管要求维护管道控制器培训模拟器。
  BC-3060.20:
    name: 管道完整性管理
    description: |
      对管道完整性开展内检测、阴极保护和缺陷评价。
  BC-3060.20.10:
    name: 管道内检测
    description: |
      开展智能清管内检测作业，以保障管道完整性。
  BC-3060.20.20:
    name: 阴极保护管理
    description: |
      对管道进行阴极保护设计、运营和检测。
  BC-3060.20.30:
    name: 管道缺陷评价
    description: |
      对金属损失和裂纹类缺陷开展工程关键评估。
  BC-3060.20.40:
    name: 管道巡查
    description: |
      对管道作业带进行空中和地面巡查。
  BC-3060.30:
    name: 泄漏检测与管道监控
    description: |
      建立计算机和外部泄漏检测系统，并开展管道监控。
  BC-3060.30.10:
    name: 计算机泄漏检测
    description: |
      基于实时瞬态模型和统计方法的泄漏检测系统。
  BC-3060.30.20:
    name: 外部泄漏检测
    description: |
      采用光纤、声学及气体传感器的外部泄漏检测系统。
  BC-3060.30.30:
    name: 空中与徒步巡线
    description: |
      对管道走廊开展定期空中和徒步巡线作业。
  BC-3060.40:
    name: 管道运输计划与申报
    description: |
      对输送量进行容量申报、批次顺序安排和管内存量管理。
  BC-3060.40.10:
    name: 容量申报管理
    description: |
      接收、确认和排程托运人的容量申报。
  BC-3060.40.20:
    name: 批次顺序安排
    description: |
      在液体管道中对多产品批次进行顺序安排。
  BC-3060.40.30:
    name: 管内存量管理
    description: |
      管理各管道的管内存量所有权和库存。
  BC-3060.50:
    name: 管输费管理
    description: |
      申报和管理受监管和合同管输费，以及托运人收费和失衡结算。
  BC-3060.50.10:
    name: 管输费申报与维护
    description: |
      向监管机构申报和维护管道管输费。
  BC-3060.50.20:
    name: 托运人收费
    description: |
      计算并向托运人发出运输发票。
  BC-3060.50.30:
    name: 失衡结算
    description: |
      对托运人之间的运营失衡进行结算。
  BC-3060.60:
    name: 管道建设与维修运营
    description: |
      对输气和集输管道开展在役修复、热开孔作业及更换协调。
  BC-3060.60.10:
    name: 管道更换协调
    description: |
      协调管道管段更换和改线工作。
  BC-3060.60.20:
    name: 在役修复作业
    description: |
      对在役管道进行复合材料、套筒和堆焊覆盖修复。
  BC-3060.60.30:
    name: 热开孔作业
    description: |
      对带压管道进行热开孔和封堵作业以实现连接。

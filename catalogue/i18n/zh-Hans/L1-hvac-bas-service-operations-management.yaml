locale: zh-Hans
source: L1-hvac-bas-service-operations-management.yaml
entries:
  BC-2060:
    name: 暖通空调与 BAS 服务运营管理
    description: |
      OEM 主导和承包商主导的已安装暖通空调设备和 BAS 服务，涵盖已安装基础配置管理、预防性和响应性维护、BAS 重编程和软件服务、设备改造与现代化改造、基于绩效的服务合同及远程联网服务。
    in_scope:
      - 已安装基础设备和 BAS 配置注册表
      - 预防性维护合同交付和响应性/紧急服务
      - BAS 重编程、固件升级及备份/恢复运营
      - 已安装暖通空调设备的改造和现代化改造执行
      - 基于绩效和结果的服务合同
      - 远程联网服务和诊断中心运营
      - 服务水平协议和客户满意度管理
    out_of_scope:
      - 跨行业通用现场服务（BC-1050）和备件（BC-1060）
      - 项目调试和 Cx 交付（BC-2050）
      - 制冷剂采购和申报（BC-2040）
      - 暖通空调设备产品工程（BC-2000）
  BC-2060.10:
    name: 已安装基础配置管理
    description: |
      维护全球已安装基础的竣工和维护后配置数据。
  BC-2060.10.10:
    name: 设备资产注册表
    description: |
      按序列号、现场和客户建立已安装暖通空调设备注册表。
  BC-2060.10.20:
    name: BAS 配置注册表
    description: |
      在用 BAS 配置、控制器、点位和序列的注册表。
  BC-2060.10.30:
    name: 维护后记录
    description: |
      每次服务事件后的维护后配置记录。
  BC-2060.10.40:
    name: 已安装基础改动记录
    description: |
      已安装设备和 BAS 移交后改动的记录。
  BC-2060.20:
    name: 预防性维护服务运营
    description: |
      按合同提供计划预防性维护服务。
  BC-2060.20.10:
    name: 维护合同执行
    description: |
      按合同范围执行预防性维护。
  BC-2060.20.20:
    name: 计划拜访路由
    description: |
      计划服务拜访的路由和派遣管理。
  BC-2060.20.30:
    name: 过滤器与皮带服务
    description: |
      过滤器、皮带和耗材的例行更换服务。
  BC-2060.20.40:
    name: 制冷剂与盘管服务
    description: |
      制冷剂例行补充和盘管清洗服务。
  BC-2060.20.50:
    name: 维护合规报告
    description: |
      向客户报告预防性维护合规情况。
  BC-2060.30:
    name: 响应性与紧急服务运营
    description: |
      已安装设备的响应性和非工作时间紧急服务。
  BC-2060.30.10:
    name: 服务请求分流
    description: |
      按紧急程度和能力对来访服务请求进行分流。
  BC-2060.30.20:
    name: 紧急响应派遣
    description: |
      关键设备故障的紧急响应人员派遣。
  BC-2060.30.30:
    name: 现场维修执行
    description: |
      服务技术员现场维修执行。
  BC-2060.30.40:
    name: 制冷剂泄漏紧急响应
    description: |
      制冷剂泄漏和重大泄露的紧急响应处置。
  BC-2060.40:
    name: BAS 重编程与软件服务
    description: |
      已安装 BAS 的软件侧服务，包括序列更新、固件升级和配置变更。
  BC-2060.40.10:
    name: 序列更新部署
    description: |
      向已安装控制器部署更新的操作序列。
  BC-2060.40.20:
    name: 控制器固件升级
    description: |
      已安装 BAS 控制器的固件升级。
  BC-2060.40.30:
    name: 点位与时间表修改
    description: |
      BAS 点位、时间表和趋势的现场修改。
  BC-2060.40.40:
    name: BAS 备份与恢复运营
    description: |
      BAS 配置备份和故障恢复运营。
  BC-2060.50:
    name: 暖通空调设备改造与现代化改造服务
    description: |
      已安装暖通空调基础的改造、更换和现代化改造服务。
  BC-2060.50.10:
    name: 现场改造工程
    description: |
      针对安装现场定制改造方案的现场工程。
  BC-2060.50.20:
    name: 设备更换执行
    description: |
      设备更换范围的现场执行。
  BC-2060.50.30:
    name: 制冷剂转换服务
    description: |
      已安装设备转换至替代制冷剂的服务。
  BC-2060.50.40:
    name: 改造验证测试
    description: |
      改造或现代化改造后的验证测试。
  BC-2060.60:
    name: 绩效服务合同运营
    description: |
      基于绩效和结果的服务合同运营管理。
  BC-2060.60.10:
    name: 绩效合同执行
    description: |
      执行基于绩效的服务义务。
  BC-2060.60.20:
    name: 保证节能跟踪
    description: |
      跟踪对比基准线的保证节能成果。
  BC-2060.60.30:
    name: 风险共担机制运营
    description: |
      运营奖惩风险共担机制。
  BC-2060.60.40:
    name: 成果报告
    description: |
      向客户和管理层报告合同约定成果和服务水平指标。
  BC-2060.70:
    name: 远程联网服务运营
    description: |
      利用联网暖通空调和 BAS 数据的远程服务中心运营。
  BC-2060.70.10:
    name: 远程诊断中心运营
    description: |
      联网设备远程诊断中心的运营管理。
  BC-2060.70.20:
    name: 远程问题分流
    description: |
      通过远程遥测识别的问题分流处理。
  BC-2060.70.30:
    name: 远程解决执行
    description: |
      无需现场拜访即可远程解决的问题执行管理。
  BC-2060.70.40:
    name: 联网服务客户引入
    description: |
      客户接入联网服务产品的引入管理。
  BC-2060.80:
    name: 服务质量与 SLA 管理
    description: |
      服务质量、服务水平协议和客户满意度管理。
  BC-2060.80.10:
    name: 服务水平协议跟踪
    description: |
      跟踪服务水平协议绩效。
  BC-2060.80.20:
    name: 客户满意度采集
    description: |
      跨服务互动采集客户满意度数据。
  BC-2060.80.30:
    name: 服务升级管理
    description: |
      服务升级和恢复措施的管理。
  BC-2060.80.40:
    name: 服务绩效报告
    description: |
      向客户和管理层定期报告服务绩效。

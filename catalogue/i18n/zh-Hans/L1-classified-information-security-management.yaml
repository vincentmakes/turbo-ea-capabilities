locale: zh-Hans
source: L1-classified-information-security-management.yaml
entries:
  BC-1810:
    name: 涉密信息与安全管理
    description: |
      覆盖人员安全许可、密级管理、工业安全、通信安全与内部威胁管理，保护国家安全信息。
  BC-1810.10:
    name: 人员安全许可管理
    description: |
      统筹安全许可申请、定期复查与离职解密，维护获密人员的持续适格性。
  BC-1810.10.10:
    name: 安全许可申请处理
    description: |
      受理并处理人员安全许可申请。
  BC-1810.10.20:
    name: 定期复查
    description: |
      对获密人员开展定期复查与持续评估。
  BC-1810.10.30:
    name: 获密人员入职教育与离职解密
    description: |
      开展安全教育、保密协议签署与离职解密工作。
  BC-1810.20:
    name: 信息密级管理
    description: |
      统筹定密、解密与处理要求标注，确保涉密信息得到正确标识与管控。
  BC-1810.20.10:
    name: 原始定密决策
    description: |
      由原始定密权限机构作出定密决策。
  BC-1810.20.20:
    name: 衍生定密
    description: |
      依据现有资料对新文件开展衍生定密。
  BC-1810.20.30:
    name: 解密审查
    description: |
      开展系统性与强制性解密审查。
  BC-1810.20.40:
    name: 处理要求与标注
    description: |
      对涉密信息施加处理要求、传发控制标注。
  BC-1810.30:
    name: 国防实体安全管理
    description: |
      统筹获密设施、SCIF与安全区域的实体安全管理，防止未授权访问。
  BC-1810.30.10:
    name: 获密设施认证
    description: |
      开展获密设施的认证与持续维护。
  BC-1810.30.20:
    name: SCIF运营
    description: |
      运营敏感划密信息设施（SCIF）。
  BC-1810.30.30:
    name: 安全区域访问控制
    description: |
      对安全区域实施访问控制与来访人员管理。
  BC-1810.40:
    name: 工业安全管理
    description: |
      统筹NISPOM/等效法规合规、外资控制与供应链安全管理。
  BC-1810.40.10:
    name: NISPOM合规管理
    description: |
      确保符合NISPOM/32 CFR 117或等效国家法规要求。
  BC-1810.40.20:
    name: 外资所有权控制与影响管理
    description: |
      开展FOCI评估与缓解安排管理。
  BC-1810.40.30:
    name: 供应链安全核查
    description: |
      核查获密供应链合作方及CMMC符合性。
  BC-1810.40.40:
    name: 保密合同安全管理
    description: |
      管理DD Form 254涉密合同安全要求。
  BC-1810.50:
    name: 通信安全管理
    description: |
      统筹通信安全（COMSEC）与密码密钥管理，保障涉密通信安全。
  BC-1810.50.10:
    name: COMSEC账户管理
    description: |
      运营COMSEC账户并履行保管员职责。
  BC-1810.50.20:
    name: 密码密钥管理
    description: |
      管理含EKMS/KMI在内的密码密钥。
  BC-1810.50.30:
    name: COMSEC设备保管
    description: |
      负责COMSEC设备的保管与责任核查。
  BC-1810.60:
    name: 内部威胁管理
    description: |
      统筹内部威胁项目运营、监控与调查，防范内部人员对涉密信息的威胁。
  BC-1810.60.10:
    name: 内部威胁项目运营
    description: |
      按E.O. 13587要求运营内部威胁项目。
  BC-1810.60.20:
    name: 用户活动监控
    description: |
      对涉密信息系统上的用户活动实施监控。
  BC-1810.60.30:
    name: 内部威胁调查
    description: |
      调查内部威胁迹象与安全事件。
metadata:
  translator: Claude (zh-Hans automated)

locale: zh-Hans
source: L1-product-lifecycle-management.yaml
entries:
  BC-820:
    name: 产品生命周期管理
    description: |
      端到端管理产品从概念到退市的全生命周期。
  BC-820.10:
    name: 产品概念管理
    description: |
      负责概念开发、创意生成与市场验证，确保新产品方向与市场需求相符。
  BC-820.10.10:
    name: 产品创意生成
    description: |
      基于市场与客户洞察，生成新产品概念创意。
  BC-820.10.20:
    name: 概念验证
    description: |
      通过客户与市场测试对产品概念进行验证。
  BC-820.10.30:
    name: 商业案例定义
    description: |
      为新产品构建商业案例并进行经济可行性论证。
  BC-820.20:
    name: 产品设计管理
    description: |
      负责产品设计、工程分析与设计评审，确保产品可制造且满足技术要求。
  BC-820.20.10:
    name: 产品设计工程
    description: |
      开展详细产品设计与工程分析。
  BC-820.20.20:
    name: 设计评审与批准
    description: |
      执行正式设计评审与审批节点。
  BC-820.20.30:
    name: 面向X的设计
    description: |
      面向可制造性、可持续性、可维护性及成本的设计优化。
  BC-820.20.40:
    name: 设计验证与确认
    description: |
      验证并确认设计符合既定需求。
  BC-820.30:
    name: 产品规格管理
    description: |
      负责产品规格、需求及BOM定义，确保产品技术文档的完整性与可追溯性。
  BC-820.30.10:
    name: 产品需求管理
    description: |
      捕获产品需求并建立可追溯性。
  BC-820.30.20:
    name: 产品规格编制
    description: |
      编制产品规格与技术文档。
  BC-820.30.30:
    name: 产品BOM定义
    description: |
      定义产品BOM结构与版本。
  BC-820.30.40:
    name: 产品数据管理
    description: |
      管理产品数据、图纸及CAD装配体的PDM系统。
  BC-820.40:
    name: 产品配置与变型管理
    description: |
      管理产品配置、变型、选项与套件，满足多样化客户需求。
  BC-820.40.10:
    name: 产品配置建模
    description: |
      构建配置模型、选项规则及约束关系。
  BC-820.40.20:
    name: 变型管理
    description: |
      管理产品变型与产品平台。
  BC-820.40.30:
    name: 套件与解决方案定义
    description: |
      定义套件、配件组合及综合解决方案。
  BC-820.50:
    name: 产品发布与上市管理
    description: |
      负责发布规划、上市执行与产量爬坡，确保产品按时、高质量推向市场。
  BC-820.50.10:
    name: 发布规划
    description: |
      规划发布内容与范围。
  BC-820.50.20:
    name: 上市执行
    description: |
      跨职能协同推进上市执行与就绪评估。
  BC-820.50.30:
    name: 生产爬坡
    description: |
      管理上市后的生产爬坡与供应链就绪。
  BC-820.50.40:
    name: 上市绩效跟踪
    description: |
      跟踪上市KPI并推进上市后纠偏行动。
  BC-820.60:
    name: 产品绩效与反馈管理
    description: |
      收集在用产品绩效数据与客户反馈，驱动产品路线图持续优化。
  BC-820.60.10:
    name: 在用产品绩效监控
    description: |
      通过在用指标持续监控产品绩效表现。
  BC-820.60.20:
    name: 客户反馈综合分析
    description: |
      综合分析客户反馈，为产品路线图提供输入。
  BC-820.60.30:
    name: 产品路线图管理
    description: |
      定义并维护产品路线图。
  BC-820.60.40:
    name: 产品分析
    description: |
      分析产品使用数据、遥测信息与产品埋点。
  BC-820.70:
    name: 产品退市管理
    description: |
      制定EOL规划、日落策略与替代方案，确保产品有序退出市场。
  BC-820.70.10:
    name: 退市规划
    description: |
      规划EOL时间节点、依赖关系与退市路径。
  BC-820.70.20:
    name: 迁移与替代策略
    description: |
      推动客户迁移至后续替代产品。
  BC-820.70.30:
    name: 末次采购与持续支持
    description: |
      管理末次采购、备件供应与EOL持续支持。
  BC-820.70.40:
    name: 产品日落沟通
    description: |
      向客户及渠道传达产品日落信息。

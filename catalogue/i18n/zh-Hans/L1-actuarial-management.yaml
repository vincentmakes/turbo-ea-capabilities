locale: zh-Hans
source: L1-actuarial-management.yaml
entries:
  BC-2180:
    name: 精算管理
    description: |
      定价模型、准备金、经验研究、资本和偿付能力建模、IFRS 17 精算报告支持及巨灾建模管理。
  BC-2180.10:
    name: 定价精算管理
    description: |
      损失成本建模、定价充足性分析、费率指示和报备费率文件支持。
  BC-2180.10.10:
    name: 损失成本建模
    description: |
      按细分市场、风险因素和保障进行损失成本建模。
  BC-2180.10.20:
    name: 定价充足性分析
    description: |
      对比预期损失和费用负担分析定价充足性。
  BC-2180.10.30:
    name: 费率指示生成
    description: |
      为产品和定价委员会生成费率指示。
  BC-2180.10.40:
    name: 报备费率文件支持
    description: |
      编制支持费率报备的精算备忘录和附件。
  BC-2180.20:
    name: 准备金精算管理
    description: |
      损失发展三角、IBNR 估计、ULAE 和 ALAE 准备金及准备金签署文件管理。
  BC-2180.20.10:
    name: 损失发展三角建立
    description: |
      建立损失发展三角和选择发展因子。
  BC-2180.20.20:
    name: IBNR 估计
    description: |
      估计跨组合的未决赔款准备金（IBNR）。
  BC-2180.20.30:
    name: ULAE 与 ALAE 准备金
    description: |
      未分摊和已分摊损失调整费用的准备金计提。
  BC-2180.20.40:
    name: 准备金签署文件
    description: |
      编制准备金委员会文件和意见书。
  BC-2180.30:
    name: 资本与偿付能力建模
    description: |
      内部资本模型开发、标准公式计算、资本分配及 ORSA 支持。
  BC-2180.30.10:
    name: 内部资本模型开发
    description: |
      开发和维护用于偿付能力和评级的内部资本模型。
  BC-2180.30.20:
    name: 标准公式计算
    description: |
      计算 Solvency II 标准公式及等效监管资本指标。
  BC-2180.30.30:
    name: 资本分配
    description: |
      向业务线和细分市场分配所需资本。
  BC-2180.30.40:
    name: ORSA 建模支持
    description: |
      为自身风险和偿付能力评估（ORSA）提供建模支持。
  BC-2180.40:
    name: 经验研究与假设管理
    description: |
      死亡率、长寿、失效、持续率和发病率研究，以及假设治理管理。
  BC-2180.40.10:
    name: 死亡率与长寿研究
    description: |
      寿险和养老金组合的死亡率与长寿经验研究。
  BC-2180.40.20:
    name: 失效与持续率研究
    description: |
      跨产品队列的失效和持续率经验研究。
  BC-2180.40.30:
    name: 发病率与理赔频率研究
    description: |
      健康险和保障险种的发病率和理赔频率经验研究。
  BC-2180.40.40:
    name: 假设治理与签署
    description: |
      定价、准备金和报告中使用的精算假设的治理和签署管理。
  BC-2180.50:
    name: IFRS 17 精算报告支持
    description: |
      CSM、风险调整、保险合同组构建及 IFRS 17 披露编制管理。
  BC-2180.50.10:
    name: CSM 与风险调整计算
    description: |
      计算 IFRS 17 的合同服务边际（CSM）和风险调整。
  BC-2180.50.20:
    name: 保险合同组构建
    description: |
      构建保险合同组和年度队列。
  BC-2180.50.30:
    name: IFRS 17 披露编制
    description: |
      编制 IFRS 17 披露和对账的精算输入数据。
  BC-2180.60:
    name: 巨灾建模
    description: |
      巨灾模型供应商管理、风险暴露数据准备、PML 和 AAL 计算及模型验证。
  BC-2180.60.10:
    name: 巨灾模型供应商管理
    description: |
      选择和管理巨灾模型供应商及许可证组合。
  BC-2180.60.20:
    name: 风险暴露数据准备
    description: |
      准备和调整用于巨灾模型运行的风险暴露数据。
  BC-2180.60.30:
    name: PML 与 AAL 计算
    description: |
      计算可能最大损失（PML）和年均预期损失（AAL）指标。
  BC-2180.60.40:
    name: 巨灾模型验证与调整
    description: |
      对巨灾模型输出进行验证和风险视角调整。

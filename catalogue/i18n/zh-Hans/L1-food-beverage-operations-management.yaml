locale: zh-Hans
source: L1-food-beverage-operations-management.yaml
entries:
  BC-4070:
    name: 餐饮运营管理
    description: |
      运营餐厅、酒吧、客房服务、宴会及厨房各业态的餐饮（F&B）服务，涵盖菜单与配方工程、采购、厨房生产、服务、卫生及食品安全合规。
    in_scope:
      - 含过敏原和营养数据的菜单与配方管理
      - 餐饮（F&B）采购、酒窖库存及运营
      - 厨房生产规划和出单执行
      - 餐厅、客房服务及宴会服务运营
      - HACCP及食品安全运营
    out_of_scope:
      - 物业级工程（BC-4060.30）
      - 宴会活动单发起和团体销售（BC-4110）
      - 游轮特定框架下的船上厨房运营（BC-4090）
  BC-4070.10:
    name: 菜单工程与配方管理
    description: |
      进行菜单和配方工程，包括规格制定、过敏原和营养声明、成本核算及版本管理。
  BC-4070.10.10:
    name: 配方与规格管理
    description: |
      管理各门店的配方、子配方及产品规格。
  BC-4070.10.20:
    name: 过敏原与营养声明
    description: |
      按法规要求声明菜单项目的过敏原和营养数据。
  BC-4070.10.30:
    name: 配方成本与利润工程
    description: |
      对配方进行成本核算，并依据目标食材成本进行菜单利润工程。
  BC-4070.10.40:
    name: 菜单版本与上线管理
    description: |
      跨季节、门店和市场进行菜单版本管理和上线推广。
  BC-4070.20:
    name: 餐饮采购与库存
    description: |
      进行餐饮供应采购、酒窖库存管理、安全库存补货及理论与实际差异分析。
  BC-4070.20.10:
    name: 餐饮供应商寻源
    description: |
      寻找和评估餐饮供应商，包括审核和合同条款谈判。
  BC-4070.20.20:
    name: 饮品与酒窖库存管理
    description: |
      管理饮品和酒窖库存，包括年份追踪和轮换管理。
  BC-4070.20.30:
    name: 安全库存与补货管理
    description: |
      跨门店管理安全库存水位和补货周期。
  BC-4070.20.40:
    name: 理论与实际差异分析
    description: |
      分析食材和饮品的理论与实际成本差异，并进行根因归因。
  BC-4070.30:
    name: 厨房生产运营
    description: |
      运营厨房生产，包括规划、出单执行、摆盘及食材成本管控。
  BC-4070.30.10:
    name: 生产规划与预备
    description: |
      规划厨房生产周期，在服务前完成预备工作。
  BC-4070.30.20:
    name: 出单与服务生产运营
    description: |
      在服务时段进行实时出单和传菜口协调。
  BC-4070.30.30:
    name: 摆盘与质量管控
    description: |
      在传菜前对出品进行摆盘和质量管控。
  BC-4070.30.40:
    name: 厨房食材成本运营
    description: |
      通过出成率检查和废料记录管控食材成本。
  BC-4070.40:
    name: 餐厅与门店服务运营
    description: |
      运营各餐厅和门店的服务，包括预订、座位安排、台位管理及门店重置。
  BC-4070.40.10:
    name: 预订与座位管理
    description: |
      管理各门店的预订、座位安排及候位名单。
  BC-4070.40.20:
    name: 台位与服务节奏管理
    description: |
      在服务时段管理台位数量和服务节奏。
  BC-4070.40.30:
    name: 桌边服务运营
    description: |
      提供桌边服务，包括点单、服务标准及账单呈递。
  BC-4070.40.40:
    name: 门店收市与重置运营
    description: |
      完成门店收市、结账及下一个服务时段的重置准备。
  BC-4070.50:
    name: 客房餐饮与迷你吧运营
    description: |
      运营客房餐饮点单捕获和配送、迷你吧补货及迎宾礼品服务。
  BC-4070.50.10:
    name: 客房餐饮点单捕获
    description: |
      通过电话、应用及房门悬挂卡渠道捕获客房餐饮点单。
  BC-4070.50.20:
    name: 客房餐饮配送运营
    description: |
      在服务时限标准内完成客房餐饮配送。
  BC-4070.50.30:
    name: 迷你吧补货运营
    description: |
      补货迷你吧并记录消费情况。
  BC-4070.50.40:
    name: 设施品与迎宾礼品运营
    description: |
      为VIP及识别宾客运营客房设施品和迎宾礼品供应。
  BC-4070.60:
    name: 宴会与餐饮外包运营
    description: |
      运营宴会和餐饮外包，包括布场、服务、场外餐饮及活动饮品服务。
  BC-4070.60.10:
    name: 宴会布场与重置运营
    description: |
      完成连续活动的宴会厅布场、转换和重置工作。
  BC-4070.60.20:
    name: 分餐与自助餐服务运营
    description: |
      为分餐式、自助式及家庭式宴会活动提供服务运营。
  BC-4070.60.30:
    name: 场外餐饮运营
    description: |
      运营在主场地外提供的餐饮外包服务。
  BC-4070.60.40:
    name: 宴会饮品运营
    description: |
      在宴会活动中提供饮品服务，包括吧台布置和消费追踪。
  BC-4070.70:
    name: 餐饮卫生与食品安全运营
    description: |
      运营卫生和食品安全工作，包括HACCP计划执行、温度监控、过敏原管控及事件处置。
  BC-4070.70.10:
    name: HACCP计划执行
    description: |
      在收货、储存、备料、烹饪及保温各环节执行HACCP计划。
  BC-4070.70.20:
    name: 温度与冷链监控
    description: |
      监控餐饮（F&B）储存和服务全程的温度和冷链完整性。
  BC-4070.70.30:
    name: 过敏原交叉污染管控
    description: |
      在收货、备料和服务环节执行过敏原交叉污染管控措施。
  BC-4070.70.40:
    name: 食品安全事件处置
    description: |
      处理食品安全事件，包括疑似食源性疾病报告。

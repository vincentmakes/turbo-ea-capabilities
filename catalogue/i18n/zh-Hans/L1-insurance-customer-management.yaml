locale: zh-Hans
source: L1-insurance-customer-management.yaml
entries:
  BC-2120:
    name: 保险客户管理
    description: |
      投保人身份识别、家庭和团体整合、KYC、同意管理及跨所有渠道的保险客户全生命周期服务。
  BC-2120.10:
    name: 投保人引入管理
    description: |
      申请受理、身份验证、激活及引入沟通管理。
  BC-2120.10.10:
    name: 申请受理
    description: |
      跨渠道受理新投保人申请。
  BC-2120.10.20:
    name: 身份与实际受益人核验
    description: |
      个人和企业投保人的身份核验和实际受益人识别。
  BC-2120.10.30:
    name: 投保人激活
    description: |
      激活投保人记录、账户和渠道访问权限。
  BC-2120.10.40:
    name: 引入沟通
    description: |
      沟通引入状态、欢迎资料和后续步骤。
  BC-2120.20:
    name: 保险 KYC 与制裁管理
    description: |
      客户风险评级、KYC 文件、制裁和政治敏感人士筛查及定期更新。
  BC-2120.20.10:
    name: 客户风险评级
    description: |
      基于反洗钱和行为风险因素对保险客户进行风险评级。
  BC-2120.20.20:
    name: KYC 文件收集
    description: |
      收集和核验保险客户的 KYC 文件。
  BC-2120.20.30:
    name: 制裁与政治敏感人士筛查
    description: |
      对投保人和受益人进行制裁、政治敏感人士和负面媒体筛查。
  BC-2120.20.40:
    name: 定期 KYC 更新
    description: |
      定期更新 KYC 信息和重新评级。
  BC-2120.30:
    name: 投保人服务管理
    description: |
      自助维护、来访服务请求、文件提供及受益人维护管理。
  BC-2120.30.10:
    name: 自助账户维护
    description: |
      投保人地址、联系方式和偏好数据的自助更新。
  BC-2120.30.20:
    name: 来访服务请求处理
    description: |
      跨渠道处理投保人来访服务请求。
  BC-2120.30.30:
    name: 文件与对账单提供
    description: |
      提供保单文件、对账单和保险证明。
  BC-2120.30.40:
    name: 受益人与被提名人维护
    description: |
      在寿险和养老金合同上记录和维护受益人与被提名人信息。
  BC-2120.40:
    name: 客户信息与同意管理
    description: |
      档案管理、家庭和团体整合、同意管理及黄金记录维护。
  BC-2120.40.10:
    name: 投保人档案维护
    description: |
      维护投保人档案和人口统计数据。
  BC-2120.40.20:
    name: 家庭与团体整合
    description: |
      将投保人整合到家庭、团体和企业母公司中。
  BC-2120.40.30:
    name: 营销与数据共享同意
    description: |
      采集和执行营销及数据共享同意。
  BC-2120.40.40:
    name: 客户黄金记录管理
    description: |
      跨系统维护投保人黄金记录。
  BC-2120.50:
    name: 客户体验与留存管理
    description: |
      反馈采集、忠诚度项目、投诉处理及流失预测管理。
  BC-2120.50.10:
    name: 客户反馈采集
    description: |
      采集客户反馈、NPS 和 CSAT 信号。
  BC-2120.50.20:
    name: 忠诚度与留存项目运营
    description: |
      运营忠诚度、留存和基于资历的奖励项目。
  BC-2120.50.30:
    name: 投诉与升级处理
    description: |
      处理投保人投诉、升级和监察专员案件。
  BC-2120.50.40:
    name: 流失与失效预测
    description: |
      对流失和失效风险进行预测分析以支持留存干预。

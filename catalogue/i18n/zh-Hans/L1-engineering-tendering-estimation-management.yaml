locale: zh-Hans
source: L1-engineering-tendering-estimation-management.yaml
entries:
  BC-1140:
    name: 工程招标与估算管理
    description: |
      负责投标准备、技术与商务方案编制，将工程机会转化为中标合同。
  BC-1140.10:
    name: 投标决策管理
    description: |
      开展机会鉴定、投标战略决策与中标规划。
  BC-1140.10.10:
    name: 机会鉴定
    description: |
      按投标准则对商机进行资格鉴定。
  BC-1140.10.20:
    name: 投标决策治理
    description: |
      管理投标/放弃投标决策与审批节点。
  BC-1140.10.30:
    name: 中标规划
    description: |
      制定中标规划、制胜主题与竞争定位。
  BC-1140.20:
    name: 工程估算管理
    description: |
      开展工程工时估算，建立复杂度系数与基于可交付物的估算体系。
  BC-1140.20.10:
    name: 工程工时估算
    description: |
      按专业进行自下而上的工程工时估算。
  BC-1140.20.20:
    name: 估算基准与对标
    description: |
      维护估算基准、系数与对标数据。
  BC-1140.20.30:
    name: 基于可交付物的估算
    description: |
      采用含复杂度系数的可交付物估算方法。
  BC-1140.30:
    name: 费用与进度估算管理
    description: |
      开展施工费用、设备费用与项目进度估算。
  BC-1140.30.10:
    name: 设备费用估算
    description: |
      通过询价与参数法估算设备费用。
  BC-1140.30.20:
    name: 施工费用估算
    description: |
      按AACE等级开展施工费用估算。
  BC-1140.30.30:
    name: 项目进度估算
    description: |
      开展自上而下与自下而上的项目进度估算。
  BC-1140.30.40:
    name: 估算质量保证
    description: |
      对估算开展独立QA审查与对标分析。
  BC-1140.40:
    name: 方案编制管理
    description: |
      编制技术与商务方案，管理投标方案全过程。
  BC-1140.40.10:
    name: 技术方案编写
    description: |
      编写投标书技术章节。
  BC-1140.40.20:
    name: 商务方案编写
    description: |
      编写投标书商务章节与报价表。
  BC-1140.40.30:
    name: 方案制作与评审
    description: |
      完成方案制作、颜色评审与最终合规检查。
  BC-1140.50:
    name: 招标提交管理
    description: |
      管理提交流程、澄清函、谈判与合同授标。
  BC-1140.50.10:
    name: 招标提交事务
    description: |
      处理提交事务与平台合规要求。
  BC-1140.50.20:
    name: 招标澄清管理
    description: |
      处理投标前与投标后的澄清问题。
  BC-1140.50.30:
    name: 谈判与授标
    description: |
      提供谈判支持并完成合同授标移交。
  BC-1140.60:
    name: 招标定价与利润管理
    description: |
      制定投标定价策略，开展利润分析与应急风险定价。
  BC-1140.60.10:
    name: 投标定价策略
    description: |
      制定投标定价策略与竞争定位方案。
  BC-1140.60.20:
    name: 利润率与应急费用设定
    description: |
      确定利润率、应急费用与风险定价决策。
  BC-1140.60.30:
    name: 投标风险备用金
    description: |
      基于风险登记册将风险备用金纳入投标价格。
  BC-1140.60.40:
    name: 投标审批治理
    description: |
      管理投标定价审批节点与高层管理治理。

locale: zh-Hans
source: L1-events-group-operations-management.yaml
entries:
  BC-4110:
    name: 活动与团体运营管理
    description: |
      在酒店场地运营会议、奖励旅游、大会、展览及宴会活动（MICE），包括团体销售、功能空间分配、宴会活动单执行、团体房块管理、视听与制作、账单及活动后报告。
    in_scope:
      - 团体线索开发、合同签署及定价
      - 功能空间分配及冲突解决
      - 宴会活动单编写及执行
      - 团体房块合同、名单及取房追踪
      - 视听、舞台及混合活动制作
      - 主账户账单及最终结算
      - 房块与取房对比及活动后绩效报告
    out_of_scope:
      - 通用企业活动营销（BC-410）
      - 宴会厨房生产和食品安全（BC-4070）
      - 团体抵达的前台入住（BC-4060.10）
  BC-4110.10:
    name: 团体与活动销售管理
    description: |
      对团体线索进行资格审核、建议书与合同操作、价格优惠及团体业务管道报告。
  BC-4110.10.10:
    name: 团体线索资格审核
    description: |
      依据目的地、场地及价格匹配度对入站团体线索进行资格审核。
  BC-4110.10.20:
    name: 团体建议书与合同操作
    description: |
      编写建议书并执行团体销售合同。
  BC-4110.10.30:
    name: 团体定价与优惠管理
    description: |
      依据收益指引管理团体定价和优惠谈判。
  BC-4110.10.40:
    name: 团体管道报告
    description: |
      报告各阶段的团体销售管道和转化情况。
  BC-4110.20:
    name: 活动场地与功能日历管理
    description: |
      定义并分配功能空间库存，解决冲突，规划布置方式和容量。
  BC-4110.20.10:
    name: 功能空间库存定义
    description: |
      定义功能空间库存，包括容量、布置方式及可合并会议室。
  BC-4110.20.20:
    name: 场地预订与分配
    description: |
      在已确认和暂定活动间完成功能空间的预订和分配。
  BC-4110.20.30:
    name: 场地冲突解决
    description: |
      解决重叠申请和相邻场地依赖引发的场地冲突。
  BC-4110.20.40:
    name: 布置方式与容量规划
    description: |
      规划反映消防荷载和无障碍限制的每场活动布置方式和容量。
  BC-4110.30:
    name: 宴会活动单执行
    description: |
      编写宴会活动单、分发至运营团队、执行布场-服务-撤场及处理活动单变更。
  BC-4110.30.10:
    name: 宴会活动单编写
    description: |
      编写涵盖餐饮（F&B）、视听、布场及时间安排的宴会活动单。
  BC-4110.30.20:
    name: 宴会活动单分发与简令
    description: |
      向运营团队分发宴会活动单并对执行人员进行简令。
  BC-4110.30.30:
    name: 布场、服务与撤场运营
    description: |
      依据宴会活动单和活动时间表完成布场、服务及撤场运营。
  BC-4110.30.40:
    name: 宴会活动单变更操作
    description: |
      处理宴会活动单变更，包括临时需求更新。
  BC-4110.40:
    name: 团体房块与住客名单管理
    description: |
      在活动交付层面配置团体房块合同、住客名单操作、截止日期、核减及取房报告。
  BC-4110.40.10:
    name: 房块合同配置
    description: |
      在运营系统中为活动配置房块合同条款。
  BC-4110.40.20:
    name: 住客名单操作
    description: |
      处理住客名单，包括更新、特殊要求及抵达顺序安排。
  BC-4110.40.30:
    name: 房块截止日期与核减操作
    description: |
      执行截止日期和核减操作，将未使用的房块库存释放回公开销售。
  BC-4110.40.40:
    name: 房块取房报告
    description: |
      报告合同取房情况，用于收入和绩效核算。
  BC-4110.50:
    name: 活动视听与制作运营
    description: |
      运营视听和制作，包括自有视听设备、舞台搭建、混合直播及外部供应商协调。
  BC-4110.50.10:
    name: 自有视听运营
    description: |
      运营活动自有视听设备和人员。
  BC-4110.50.20:
    name: 舞台与布景制作
    description: |
      为活动进行舞台搭建和布景制作，包括装饰和吊挂元素。
  BC-4110.50.30:
    name: 直播与混合活动运营
    description: |
      运营直播和混合活动交付，覆盖远程和现场观众。
  BC-4110.50.40:
    name: 外部视听供应商协调
    description: |
      依据场地和保险要求协调外部视听供应商。
  BC-4110.60:
    name: 活动账单与主账户管理
    description: |
      设置主账户、个人及杂项账单、押金及活动最终结算与对账。
  BC-4110.60.10:
    name: 主账户设置
    description: |
      设置活动主账户和应收费项目的路由规则。
  BC-4110.60.20:
    name: 个人与杂项账单操作
    description: |
      运营主账户以外的参会者个人和杂项账单。
  BC-4110.60.30:
    name: 押金与预付款管理
    description: |
      按活动里程碑管理押金和预付款。
  BC-4110.60.40:
    name: 活动最终结算与对账
    description: |
      依据合同和实际消费完成活动主账户的最终结算与对账。
  BC-4110.70:
    name: 活动绩效与活动后报告
    description: |
      报告团体活动绩效，包括房块与取房对比、财务结果、参会者反馈及续约追踪。
  BC-4110.70.10:
    name: 房块与取房对比报告
    description: |
      报告已完成活动的房块与取房绩效对比。
  BC-4110.70.20:
    name: 活动财务绩效报告
    description: |
      报告活动财务绩效与预算和预测的对比情况。
  BC-4110.70.30:
    name: 参会者反馈捕获
    description: |
      通过活动后调查和实时信号渠道捕获参会者反馈。
  BC-4110.70.40:
    name: 复购与续约追踪
    description: |
      追踪已完成活动产生的复购管道和续约机会。

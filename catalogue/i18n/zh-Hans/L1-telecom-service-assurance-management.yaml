locale: zh-Hans
source: L1-telecom-service-assurance-management.yaml
entries:
  BC-2630:
    name: 电信服务保障管理
    description: |
      按照承诺目标进行服务级别性能、质量、事件和客户体验管理，以eTOM服务保障、ITU-T E.800服务质量标准和TM Forum SLA开放API为基础。
  BC-2630.10:
    name: 服务级别管理
    description: |
      定义、监控、报告与客户及合作伙伴签订的服务级别协议，并处理违约情况。
  BC-2630.10.10:
    name: 服务级别定义
    description: |
      按服务产品定义SLA目标、度量指标和测量方法。
  BC-2630.10.20:
    name: 服务级别监控
    description: |
      对照SLA承诺监控实测服务性能。
  BC-2630.10.30:
    name: 服务级别报告
    description: |
      向客户、合作伙伴和内部相关方报告SLA执行情况。
  BC-2630.10.40:
    name: 服务级别违约处理
    description: |
      处理SLA违约，包括信用额计算和客户补救措施。
  BC-2630.20:
    name: 服务性能监控
    description: |
      持续监控端到端服务KPI和客户体验指标，以发现性能劣化。
  BC-2630.20.10:
    name: 端到端服务KPI监控
    description: |
      监控跨底层网络域汇聚的端到端服务KPI。
  BC-2630.20.20:
    name: 客户体验指标监控
    description: |
      监控反映客户感知服务质量的QoE类指标。
  BC-2630.20.30:
    name: 服务劣化检测
    description: |
      在客户受影响之前提前检测服务劣化模式。
  BC-2630.30:
    name: 客户影响事件管理
    description: |
      端到端管理影响客户的事件，包括检测、通知、升级和复盘。
  BC-2630.30.10:
    name: 客户事件检测
    description: |
      综合网络和客户信号检测影响一个或多个客户的事件。
  BC-2630.30.20:
    name: 客户事件通知
    description: |
      向受影响的客户和渠道通报状态、预计恢复时间和临时解决方案。
  BC-2630.30.30:
    name: 事件升级
    description: |
      按严重性和持续时长策略对客户影响事件进行升级处理。
  BC-2630.30.40:
    name: 事后复盘
    description: |
      对重大客户影响事件进行结构化复盘，推动纠正措施落实。
  BC-2630.40:
    name: 服务质量管理
    description: |
      测量、建模和报告服务质量与客户体验，包括面向监管机构的报告。
  BC-2630.40.10:
    name: 服务质量 (QoS) 测量
    description: |
      按服务测量延迟、丢包、抖动和吞吐量等QoS参数。
  BC-2630.40.20:
    name: 用户体验质量建模
    description: |
      基于网络和行为信号对客户感知的体验质量进行建模。
  BC-2630.40.30:
    name: 服务质量报告
    description: |
      向内部相关方和监管机构报告服务质量指标。
  BC-2630.50:
    name: 服务恢复协调
    description: |
      协调受损服务的恢复活动、临时替代方案和恢复验证。
  BC-2630.50.10:
    name: 服务恢复工作流
    description: |
      协调网络和现场团队的恢复任务编排。
  BC-2630.50.20:
    name: 临时方案协调
    description: |
      在长时间故障期间协调临时解决方案和旁路路由。
  BC-2630.50.30:
    name: 服务恢复验证
    description: |
      验证服务已恢复至基线水平且客户不再受影响。
  BC-2630.60:
    name: 客户体验管理
    description: |
      围绕服务事件测量客户体验，并主动触达客户以减少不满。
  BC-2630.60.10:
    name: 服务事件NPS测量
    description: |
      结合服务影响事件背景测量客户满意度和NPS。
  BC-2630.60.20:
    name: 离网风险信号识别
    description: |
      识别在服务事件后离网风险升高的客户群体。
  BC-2630.60.30:
    name: 主动客户触达
    description: |
      主动联系受影响客户，提供致歉、补偿和留存优惠。

locale: zh-Hans
source: L1-tax-revenue-administration-management.yaml
entries:
  BC-3250:
    name: 税收征管管理
    description: |
      政府侧税收和非税收入征管，涵盖纳税人登记、申报处理、评估、征收、稽查、执法和退税管理。
  BC-3250.10:
    name: 纳税人登记与身份管理
    description: |
      开展纳税人登记、纳税人身份管理和纳税人主数据维护。
    in_scope:
      - 纳税人登记和纳税人识别号签发
      - 纳税人档案维护
      - 受益所有权记录
    out_of_scope:
      - 民事身份登记（由民事登记与身份登记管理覆盖）
  BC-3250.10.10:
    name: 纳税人登记
    description: |
      对个人和企业纳税人进行登记，签发纳税人识别号。
  BC-3250.10.20:
    name: 纳税人档案维护
    description: |
      维护纳税人主数据、联系方式和税收义务登记。
  BC-3250.10.30:
    name: 受益所有权登记
    description: |
      采集企业的受益所有权和集团架构信息。
  BC-3250.20:
    name: 申报处理与评估
    description: |
      接收、验证和评估直接税、间接税及代扣代缴税的纳税申报和声明。
  BC-3250.20.10:
    name: 申报受理
    description: |
      通过各渠道接收和受理纳税申报及信息申报。
  BC-3250.20.20:
    name: 申报审核
    description: |
      对申报进行自动化和人工审核，包括算术、完整性和一致性检查。
  BC-3250.20.30:
    name: 自我评估处理
    description: |
      处理自我评估申报并记录申报的应纳税款。
  BC-3250.20.40:
    name: 缺席评估签发
    description: |
      对未申报纳税人签发缺席和最优判断评估。
  BC-3250.30:
    name: 税收征收运营
    description: |
      通过电子、代扣代缴、分期和柜台渠道征收自愿纳税款项。
  BC-3250.30.10:
    name: 缴税渠道运营
    description: |
      运营银行转账、银行卡、电子钱包和柜台等缴税渠道。
  BC-3250.30.20:
    name: 代扣代缴与源泉扣缴
    description: |
      由代扣义务人代为管理代扣代缴税和源泉扣缴方案。
  BC-3250.30.30:
    name: 分期还款计划管理
    description: |
      设置和跟踪纳税人分期还款计划和延期缴纳安排。
  BC-3250.30.40:
    name: 税款入账核对
    description: |
      将税款收入与纳税人账户和国库进行核对。
  BC-3250.40:
    name: 税务稽查与审查
    description: |
      开展基于风险的稽查、审查和对纳税合规的重新评估。
  BC-3250.40.10:
    name: 稽查案件选择
    description: |
      利用数据分析和情报，基于风险选择稽查案件。
  BC-3250.40.20:
    name: 稽查外勤工作
    description: |
      开展稽查外勤工作，包括文件审查和纳税人问询。
  BC-3250.40.30:
    name: 重新评估签发
    description: |
      签发重新评估、调整和稽查决定书。
  BC-3250.40.40:
    name: 转让定价审查
    description: |
      依据经合组织转让定价原则，审查跨境关联方定价。
  BC-3250.50:
    name: 税收欠款与执法管理
    description: |
      通过扣押、留置、查封和移送起诉等法定执法权力追缴税收欠款。
  BC-3250.50.10:
    name: 税收欠款组合管理
    description: |
      对税收欠款组合进行分层、账龄分析和优先排序。
  BC-3250.50.20:
    name: 法定执法行动
    description: |
      行使扣押、留置和查封等法定执法权力。
  BC-3250.50.30:
    name: 税收犯罪移送
    description: |
      调查涉嫌逃税和税收犯罪行为，并移送检察机关。
  BC-3250.60:
    name: 退税与抵扣管理
    description: |
      处理税款退还、抵扣冲抵和争议金额搁置。
  BC-3250.60.10:
    name: 退税审核
    description: |
      依据申报、付款和风险情况审核退税申请。
  BC-3250.60.20:
    name: 退税签发
    description: |
      签发退税款项并与未结税款进行抵扣。
  BC-3250.60.30:
    name: 退税欺诈筛查
    description: |
      对退税申请进行身份盗用和退税欺诈指标筛查。
  BC-3250.70:
    name: 非税收入征管
    description: |
      征管非税政府收入，包括费用、罚款、特许权使用费和附加税。
  BC-3250.70.10:
    name: 费用与收费征管
    description: |
      征管法定费用、收费和用户向政府缴纳的款项。
  BC-3250.70.20:
    name: 罚款与处罚征收
    description: |
      征收司法和行政罚款及处罚款项。
  BC-3250.70.30:
    name: 特许权使用费与附加税征管
    description: |
      征管自然资源特许权使用费、环境附加税和专项收费。

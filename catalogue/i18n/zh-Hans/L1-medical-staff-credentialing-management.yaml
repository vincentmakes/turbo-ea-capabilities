locale: zh-Hans
source: L1-medical-staff-credentialing-management.yaml
entries:
  BC-2890:
    name: 医疗人员资质认证管理
    description: |
      管理执业人员资质认证、执业权限、绩效与同行评审、医疗人员治理、医务人员注册以及执业人员健康项目。
  BC-2890.10:
    name: 执业人员资质认证
    description: |
      开展执业人员初始和持续资质认证，包括原始资料核实。
  BC-2890.10.10:
    name: 申请受理
    description: |
      受理并审查资质认证申请的完整性。
  BC-2890.10.20:
    name: 原始资料核实
    description: |
      核实教育、培训、执照和推荐信的原始资料。
  BC-2890.10.30:
    name: 资质档案管理
    description: |
      维护和审计资质认证档案及支撑材料。
  BC-2890.10.40:
    name: 再认证
    description: |
      对在岗医疗人员和联合医疗执业人员进行定期再认证。
  BC-2890.20:
    name: 执业权限管理
    description: |
      划定、授予和更新临床执业权限。
  BC-2890.20.10:
    name: 执业权限划定
    description: |
      按科室和专业划定和维护执业权限。
  BC-2890.20.20:
    name: 初始执业权限授予
    description: |
      向新执业人员授予初始临床执业权限。
  BC-2890.20.30:
    name: 执业权限更新
    description: |
      基于绩效和能力数据定期更新临床执业权限。
  BC-2890.20.40:
    name: 专科执业权限管理
    description: |
      管理专科、高级和操作执业权限申请。
  BC-2890.30:
    name: 绩效与同行评审
    description: |
      开展执业人员持续和专项绩效评价与同行评审。
  BC-2890.30.10:
    name: 持续绩效评价
    description: |
      跨专科专项指标开展持续专业实践评价。
  BC-2890.30.20:
    name: 专项绩效评价
    description: |
      针对绩效信号或新执业权限触发专项专业实践评价。
  BC-2890.30.30:
    name: 同行评审案例审查
    description: |
      对具有绩效影响的临床案例开展结构化同行评审。
  BC-2890.30.40:
    name: 执业人员绩效报告
    description: |
      向医疗人员委员会和个人报告执业人员绩效。
  BC-2890.40:
    name: 医疗人员治理
    description: |
      管理医疗人员治理，包括章程、执行委员会和科室运营。
  BC-2890.40.10:
    name: 章程维护
    description: |
      维护和修订医疗人员章程和规则。
  BC-2890.40.20:
    name: 医疗执行委员会支持
    description: |
      为医疗执行委员会提供运营和分析支持。
  BC-2890.40.30:
    name: 科室委员会运营
    description: |
      开展科室、专业组和常设委员会运营。
  BC-2890.40.40:
    name: 委员选举支持
    description: |
      支持医疗人员委员提名和选举工作。
  BC-2890.50:
    name: 医务人员注册管理
    description: |
      向支付方和政府项目注册医务人员。
  BC-2890.50.10:
    name: 支付方注册
    description: |
      向商业支付方网络注册医务人员。
  BC-2890.50.20:
    name: 集中资质数据库维护
    description: |
      维护与支付方共享的集中医务人员资质数据。
  BC-2890.50.30:
    name: 政府项目注册
    description: |
      向政府保险项目注册医务人员。
  BC-2890.50.40:
    name: 再注册追踪
    description: |
      追踪并及时处理医务人员再注册周期。
  BC-2890.60:
    name: 执业人员健康与福祉
    description: |
      开展支持执业人员健康、预防职业倦怠和提供保密支持的项目。
  BC-2890.60.10:
    name: 受损执业人员管理
    description: |
      识别、干预和监测受损执业人员。
  BC-2890.60.20:
    name: 健康项目运营
    description: |
      运营执业人员健康和抗逆力项目。
  BC-2890.60.30:
    name: 职业倦怠监测
    description: |
      监测执业人员职业倦怠和福祉指标。
  BC-2890.60.40:
    name: 保密支持资源
    description: |
      为执业人员提供心理健康、同伴支持和咨询保密资源。

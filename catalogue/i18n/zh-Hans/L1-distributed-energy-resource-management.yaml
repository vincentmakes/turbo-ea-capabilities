locale: zh-Hans
source: L1-distributed-energy-resource-management.yaml
entries:
  BC-3840:
    name: 分布式能源管理
    description: |
      对接入配电网的分布式能源进行接入注册、聚合和运营协调，包括屋顶太阳能、表后储能、需求响应、电动汽车充电及微电网，以及其参与批发和灵活性市场。
  BC-3840.10:
    name: 分布式能源注册与接入
    description: |
      按IEEE 1547/欧盟发电机要求规则，对分布式能源进行注册、技术资格认定和并网验收。
  BC-3840.10.10:
    name: 分布式能源申请评估
    description: |
      依据托管容量评估分布式能源并网申请。
  BC-3840.10.20:
    name: 分布式能源技术资格认定
    description: |
      对分布式能源的能力和保护装置进行型式试验和现场核查。
  BC-3840.10.30:
    name: 分布式能源注册台账维护
    description: |
      维护已接入分布式能源资产及其能力的注册台账。
  BC-3840.20:
    name: 虚拟电厂运营
    description: |
      将分布式资源聚合为单一运营实体，参与批发和平衡市场。
  BC-3840.20.10:
    name: VPP组合管理
    description: |
      跨资产类别构建和再平衡VPP (虚拟电厂) 组合。
  BC-3840.20.20:
    name: VPP调度运营
    description: |
      向聚合后的分布式能源资产发出实时调度指令。
  BC-3840.20.30:
    name: VPP绩效结算
    description: |
      按市场和双边承诺结算VPP (虚拟电厂) 绩效。
  BC-3840.30:
    name: 需求响应运营
    description: |
      对家庭、商业和工业客户的需求侧响应项目进行招募、调度和结算。
  BC-3840.30.10:
    name: 需求响应项目注册
    description: |
      管理客户加入需求响应项目的注册和同意流程。
  BC-3840.30.20:
    name: 需求响应事件调度
    description: |
      向参与客户发出需求响应事件和削减指令。
  BC-3840.30.30:
    name: 需求响应绩效验证
    description: |
      依据客户基准核实需求响应交付量。
  BC-3840.40:
    name: 电动汽车并网管理
    description: |
      管理电动汽车充电与电网的互动，包括有序充电、车网互动（V2G）及电动汽车专项费率。
  BC-3840.40.10:
    name: 有序充电运营
    description: |
      为电动汽车车队和家庭用户运营有序和智能充电方案。
  BC-3840.40.20:
    name: 车网互动协调
    description: |
      协调双向V2G放电，向电网或表后系统供电。
  BC-3840.40.30:
    name: 电动汽车托管容量分析
    description: |
      在馈线层面对电动汽车充电渗透率进行托管容量分析。
  BC-3840.50:
    name: 表后储能协调
    description: |
      协调表后电池储能参与公用事业项目和电网服务。
  BC-3840.50.10:
    name: 表后电池注册
    description: |
      管理表后电池参与的注册和同意流程。
  BC-3840.50.20:
    name: 表后储能调度
    description: |
      向表后储能资产发出调度指令。
  BC-3840.50.30:
    name: 表后储能绩效追踪
    description: |
      追踪表后电池相对于公用事业承诺的交付绩效。
  BC-3840.60:
    name: 分布式能源预测
    description: |
      对分布式发电和灵活负荷进行短期预测，作为系统运营商和市场排程的输入。
  BC-3840.60.10:
    name: 表后太阳能预测
    description: |
      在馈线和分区层面预测表后光伏发电量。
  BC-3840.60.20:
    name: 灵活负荷预测
    description: |
      预测电动汽车充电和灵活负荷曲线。
  BC-3840.60.30:
    name: 分布式能源预测绩效监测
    description: |
      监测预测偏差及相对实际值的预测精度。
  BC-3840.70:
    name: 微电网运营
    description: |
      运营公用事业级和客户级微电网，包括并网和孤岛模式以及无缝切换控制。
  BC-3840.70.10:
    name: 微电网控制器运营
    description: |
      运营微电网控制器并调度内部资源。
  BC-3840.70.20:
    name: 孤岛模式切换运营
    description: |
      执行并网和孤岛运行模式间的计划性和紧急切换。
  BC-3840.70.30:
    name: 微电网韧性演练
    description: |
      为关键负荷微电网开展韧性演练和无缝切换演习。

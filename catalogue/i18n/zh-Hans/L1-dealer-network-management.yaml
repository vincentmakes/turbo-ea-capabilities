locale: zh-Hans
source: L1-dealer-network-management.yaml
entries:
  BC-3430:
    name: 经销商网络管理
    description: |
      特许或授权经销商网络的治理——资质授予、协议管理、品牌与设施标准、绩效管理、培训及网络发展，依据EU豁免块规定及同等零售规则开展。
  BC-3430.10:
    name: 经销商网络策略与规划
    description: |
      跨市场经销商布点、模式、覆盖范围及品牌标准的战略规划。
  BC-3430.10.10:
    name: 市场与网络覆盖规划
    description: |
      分析市场覆盖缺口，按区域定义目标经销商布点。
  BC-3430.10.20:
    name: 经销商布点优化
    description: |
      优化现有经销商布点，包括整合、迁址及扩容。
  BC-3430.10.30:
    name: 网络模式与品牌标准定义
    description: |
      定义经销商模式、零售概念及品牌体验标准。
  BC-3430.20:
    name: 经销商任命与协议管理
    description: |
      经销商的引入、协议签订及退出管理，包括区域和品牌授权管理。
  BC-3430.20.10:
    name: 经销商申请与审核
    description: |
      受理并审核经销商申请，包括财务、法律及运营尽职调查。
  BC-3430.20.20:
    name: 经销商协议起草与执行
    description: |
      依据适用竞争法起草、谈判并签订经销商协议。
  BC-3430.20.30:
    name: 区域与品牌授权管理
    description: |
      分配和管理区域与品牌授权，包括责任区域定义。
  BC-3430.20.40:
    name: 经销商退出管理
    description: |
      管理经销商退出、清库及区域重新分配。
  BC-3430.30:
    name: 经销商标准与合规
    description: |
      维护并审核经销商网络的品牌、设施及运营标准。
  BC-3430.30.10:
    name: 品牌与设施标准管理
    description: |
      维护经销商合规所需的品牌、设施及客户体验标准。
  BC-3430.30.20:
    name: 经销商合规审核
    description: |
      定期审核经销商在品牌、销售及售后标准方面的符合情况。
  BC-3430.30.30:
    name: 纠正措施管理
    description: |
      管理不合规经销商的纠正行动计划直至关闭。
  BC-3430.40:
    name: 经销商绩效管理
    description: |
      通过记分卡和激励计划衡量并提升经销商商业及运营绩效。
  BC-3430.40.10:
    name: 经销商记分卡管理
    description: |
      定义并运行涵盖销售、售后及客户体验指标的经销商记分卡。
  BC-3430.40.20:
    name: 销售与售后绩效评审
    description: |
      与区域经理开展定期经销商绩效评审和联合业务规划。
  BC-3430.40.30:
    name: 经销商激励计划管理
    description: |
      设计并运行经销商奖励、利润及激励计划。
  BC-3430.50:
    name: 经销商融资与库存融资管理
    description: |
      为经销商批量库存提供融资，并管理经销商应收款及营运资金支持计划。
    in_scope:
      - 批量库存融资管理
      - 经销商信用额度与风险敞口监控
      - OEM支持的经销商营运资金项目
    out_of_scope:
      - 汽车金融公司零售信贷（归属于企业信贷与借贷）
  BC-3430.50.10:
    name: 批量库存融资管理
    description: |
      管理经销商整车库存的批量库存融资。
  BC-3430.50.20:
    name: 经销商信贷与应收款管理
    description: |
      管理经销商信用额度、应收账款账龄及催收。
  BC-3430.50.30:
    name: 经销商营运资金支持
    description: |
      OEM支持的营运资金援助、零部件融资及季节性辅助计划。
  BC-3430.60:
    name: 经销商培训与认证
    description: |
      对经销商销售、售后及管理人员开展培训与认证。
  BC-3430.60.10:
    name: 经销商销售认证
    description: |
      对经销商销售顾问进行产品、品牌及客户体验标准认证。
  BC-3430.60.20:
    name: 经销商服务技师认证
    description: |
      对经销商服务技师进行诊断、维修及EV/HV操作程序认证。
  BC-3430.60.30:
    name: 经销商管理层发展
    description: |
      为经销商负责人和部门主管提供领导力与管理层发展计划。
  BC-3430.70:
    name: 经销商系统与数据运营
    description: |
      运营经销商端系统及数据流，将经销商与OEM商业、技术及报告平台连接。
  BC-3430.70.10:
    name: 经销商管理系统集成
    description: |
      将经销商管理系统与OEM订单、零部件、质保及报告主干系统集成。
  BC-3430.70.20:
    name: 经销商主数据管理
    description: |
      维护经销商主数据，包括网点、联系人及授权信息。
  BC-3430.70.30:
    name: 经销商报告与分析
    description: |
      在商业和运营维度开展经销商级报告、基准分析与数据分析。

locale: zh-Hans
source: L1-insurance-claims-management.yaml
entries:
  BC-2160:
    name: 保险理赔管理
    description: |
      跨所有险种的出险首报、分流、调查、准备金、理算、结案、追偿和代位追偿、诉讼、欺诈/特别调查及巨灾应急响应管理。
  BC-2160.10:
    name: 出险首报管理
    description: |
      多渠道 FNOL 受理、保障核实、登记和确认管理。
  BC-2160.10.10:
    name: FNOL 多渠道受理
    description: |
      通过电话、数字渠道、经纪人和 IoT 渠道受理出险首报。
  BC-2160.10.20:
    name: 初始保障核实
    description: |
      核实损失是否在出险日期的保障范围内。
  BC-2160.10.30:
    name: 理赔登记
    description: |
      登记新理赔并分配理赔标识符。
  BC-2160.10.40:
    name: 确认与沟通
    description: |
      向索赔人发送初始确认并持续沟通理赔状态。
  BC-2160.20:
    name: 理赔分流与细分
    description: |
      损失金额评分、直通路由、理算员分配及专家路由管理。
  BC-2160.20.10:
    name: 损失金额与复杂度评分
    description: |
      对理赔损失金额和复杂度进行评分以支持路由决策。
  BC-2160.20.20:
    name: 直通处理路由
    description: |
      将低损失金额理赔路由至直通处理流程。
  BC-2160.20.30:
    name: 理算员分配
    description: |
      按技能、产能和地域分配理赔给理算员。
  BC-2160.20.40:
    name: 专家与诉讼路由
    description: |
      将复杂、专业和涉诉理赔路由至专职团队。
  BC-2160.30:
    name: 理赔调查与理算
    description: |
      现场和案头理算、损失评估、责任认定及专业顾问咨询。
  BC-2160.30.10:
    name: 现场与案头理算
    description: |
      理赔的现场和案头理算，包括现场检查。
  BC-2160.30.20:
    name: 损失与赔偿金额评估
    description: |
      评估损失、赔偿金额及维修/更换范围。
  BC-2160.30.30:
    name: 责任认定
    description: |
      对第三者责任理赔进行责任认定和保单响应。
  BC-2160.30.40:
    name: 专业顾问咨询
    description: |
      咨询测量师、工程师、医疗专家和法证会计师。
  BC-2160.40:
    name: 理赔准备金管理
    description: |
      初始案件准备金设定、重新估计及 IBNR 协调管理。
  BC-2160.40.10:
    name: 初始案件准备金设定
    description: |
      对已登记理赔设定初始案件准备金。
  BC-2160.40.20:
    name: 准备金重新估计
    description: |
      随新信息出现定期重新估计案件准备金。
  BC-2160.40.30:
    name: IBNR 与精算协调
    description: |
      与精算部门协调组合级未决赔款准备金的 IBNR 计提。
  BC-2160.50:
    name: 理赔结案与赔付
    description: |
      结案谈判、赔款和费用赔付、残值及追偿/代位追偿管理。
  BC-2160.50.10:
    name: 结案谈判
    description: |
      与索赔人和第三方谈判结案金额。
  BC-2160.50.20:
    name: 赔款赔付签发
    description: |
      向被保险人和第三方签发赔款赔付。
  BC-2160.50.30:
    name: 费用赔付签发
    description: |
      签发已分摊和未分摊损失调整费用赔付。
  BC-2160.50.40:
    name: 残值处置
    description: |
      已结案理赔的残值处置和回收。
  BC-2160.50.50:
    name: 追偿与代位追偿
    description: |
      向第三方和其他保险人追偿和行使代位追偿权。
  BC-2160.60:
    name: 理赔诉讼管理
    description: |
      诉讼策略、辩护律师协调及诉讼费用跟踪。
  BC-2160.60.10:
    name: 诉讼策略
    description: |
      涉诉理赔的策略制定和和解与开庭决策。
  BC-2160.60.20:
    name: 辩护律师协调
    description: |
      协调指定和委派辩护律师。
  BC-2160.60.30:
    name: 诉讼费用跟踪
    description: |
      按律师费率和预算跟踪诉讼费用。
  BC-2160.70:
    name: 理赔欺诈与特别调查管理
    description: |
      可疑理赔检测、特别调查、欺诈转介及反欺诈分析管理。
  BC-2160.70.10:
    name: 可疑理赔检测
    description: |
      利用规则、模型和红旗指标检测可疑理赔。
  BC-2160.70.20:
    name: 特别调查
    description: |
      特别调查部门对疑似欺诈理赔的案件工作。
  BC-2160.70.30:
    name: 欺诈转介与起诉
    description: |
      将欺诈案件转介至执法机构和行业登记系统。
  BC-2160.70.40:
    name: 反欺诈分析
    description: |
      理赔组合和网络分析的反欺诈分析。
  BC-2160.80:
    name: 巨灾理赔管理
    description: |
      巨灾事件启动、应急产能、巨灾理赔跟踪及巨灾回收协调。
  BC-2160.80.10:
    name: 巨灾事件启动
    description: |
      在已宣告事件上启动巨灾响应程序。
  BC-2160.80.20:
    name: 应急产能动员
    description: |
      动员应急理算员、承包商和呼叫中心产能。
  BC-2160.80.30:
    name: 巨灾理赔分流与跟踪
    description: |
      对标记为巨灾的理赔进行分流和跟踪直至结案。
  BC-2160.80.40:
    name: 巨灾回收协调
    description: |
      协调巨灾事件的再保险和风险池回收。

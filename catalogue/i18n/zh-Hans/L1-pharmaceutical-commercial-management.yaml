locale: zh-Hans
source: L1-pharmaceutical-commercial-management.yaml
entries:
  BC-1590:
    name: 制药商业化管理
    description: |
      覆盖HCP互动、样品管理、推广材料、销售团队、品牌及患者参与，推动药品商业成功。
  BC-1590.10:
    name: HCP互动管理
    description: |
      统筹HCP互动项目与销售拜访，提升医疗卫生专业人员对产品的认知与使用。
  BC-1590.10.10:
    name: HCP目标定向与分层
    description: |
      对医疗卫生专业人员进行精准定向与分层管理。
  BC-1590.10.20:
    name: HCP多渠道互动
    description: |
      统筹多渠道HCP互动策略与执行。
  BC-1590.10.30:
    name: HCP透明度报告
    description: |
      按阳光法案及EFPIA要求提交HCP互动透明度报告。
  BC-1590.20:
    name: 样品管理
    description: |
      统筹样品配送、责任核查与法规合规，确保样品管理合规运营。
  BC-1590.20.10:
    name: 样品申请与配送
    description: |
      处理样品申请并向HCP配送样品。
  BC-1590.20.20:
    name: 样品责任核查与核对
    description: |
      按PDMA要求开展样品责任核查与核对。
  BC-1590.20.30:
    name: 样品合规审计
    description: |
      对样品配送实践开展合规审计。
  BC-1590.30:
    name: 推广材料管理
    description: |
      统筹推广材料开发、医学/法规/法务审核与治理，确保推广内容合规。
  BC-1590.30.10:
    name: 推广材料撰写
    description: |
      撰写推广材料与内容。
  BC-1590.30.20:
    name: 医学、法务与法规审核
    description: |
      对推广内容开展MLR审核与审批流程管理。
  BC-1590.30.30:
    name: 推广材料分发
    description: |
      分发已获批的推广材料。
  BC-1590.40:
    name: 制药销售团队管理
    description: |
      统筹外勤规划、区域设计、目标定向与人员部署，提升销售效率。
  BC-1590.40.10:
    name: 销售团队规模规划
    description: |
      开展销售团队规模测算与架构设计。
  BC-1590.40.20:
    name: 销售区域设计
    description: |
      设计并调整制药销售区域划分。
  BC-1590.40.30:
    name: 销售目标定向
    description: |
      制定制药销售代表的目标定向与拜访计划。
  BC-1590.40.40:
    name: 销售团队效能评估
    description: |
      评估并持续提升销售团队效能。
  BC-1590.50:
    name: 制药品牌管理
    description: |
      统筹品牌策略、定位与生命周期管理，塑造强势品牌。
  BC-1590.50.10:
    name: 制药品牌策略
    description: |
      制定各适应症的品牌策略与定位。
  BC-1590.50.20:
    name: 品牌预测
    description: |
      开展品牌级别需求预测与需求感知。
  BC-1590.50.30:
    name: 生命周期品牌规划
    description: |
      制定涵盖专利到期策略的品牌生命周期规划。
  BC-1590.60:
    name: 患者参与管理
    description: |
      统筹患者服务项目、支持计划与患者权益倡导，提升患者用药依从性。
  BC-1590.60.10:
    name: 患者支持项目运营
    description: |
      运营患者支持与用药依从性项目。
  BC-1590.60.20:
    name: 患者权益组织互动
    description: |
      与患者权益组织开展合作互动。
  BC-1590.60.30:
    name: 患者洞察收集
    description: |
      收集并整合患者洞察与患者报告结局（PRO）数据。

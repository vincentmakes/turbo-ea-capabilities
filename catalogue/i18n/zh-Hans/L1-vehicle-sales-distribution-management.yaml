locale: zh-Hans
source: L1-vehicle-sales-distribution-management.yaml
entries:
  BC-3440:
    name: 整车销售与分销管理
    description: |
      新车的运营性销售与分销——批发规划、工厂产能分配、订单库、演示车及认证二手车库存、车队与B2B销售，以及面向零售客户的交车与登记注册接口。
  BC-3440.10:
    name: 整车销售规划与分配
    description: |
      按市场和经销商规划批发整车量并据此分配工厂产能。
  BC-3440.10.10:
    name: 批发量规划
    description: |
      按市场、车型和细分市场定期规划批发整车量。
  BC-3440.10.20:
    name: 产能至市场分配
    description: |
      依据需求和战略优先级将有限工厂产能分配至各市场和渠道。
  BC-3440.10.30:
    name: 产能槽管理
    description: |
      向经销商和车队客户分配、调换和释放工厂产能槽。
  BC-3440.20:
    name: 整车订单库管理
    description: |
      对库存车和客户整车订单进行录入、配置验证及全生命周期管理。
  BC-3440.20.10:
    name: 库存订单管理
    description: |
      管理经销商库存订单，对应分配量和库存目标。
  BC-3440.20.20:
    name: 客户订单录入
    description: |
      录入零售及车队客户整车订单，包括配置与定价。
  BC-3440.20.30:
    name: 订单配置验证
    description: |
      依据可行性、法规及定价规则验证订单配置。
  BC-3440.20.40:
    name: 订单状态跟踪
    description: |
      从接单到生产、发运及到达经销商的全流程订单状态跟踪。
  BC-3440.30:
    name: 工厂生产与分销运营
    description: |
      协调按单生产执行及从工厂到经销商的出厂整车物流。
  BC-3440.30.10:
    name: 按单生产协调
    description: |
      与制造运营及供应商协调按单生产的执行。
  BC-3440.30.20:
    name: 整车物流协调
    description: |
      协调卡车、铁路、船运及内陆堆场转运等出厂整车物流。
  BC-3440.30.30:
    name: 进口港与堆场运营协调
    description: |
      协调进口港、处理中心及堆场运营，包括交车前加装工作。
  BC-3440.40:
    name: 整车库存与演示车管理
    description: |
      管理经销商库存、演示车、媒体试驾车及代步车库存。
  BC-3440.40.10:
    name: 经销商库存管理
    description: |
      对经销商在库及在途整车库存进行可视化管理。
  BC-3440.40.20:
    name: 演示车管理
    description: |
      管理经销商和OEM区域销售使用的演示车车队。
  BC-3440.40.30:
    name: 媒体与代步车管理
    description: |
      管理媒体试驾车、市场营销车及代步车队，包括配置与轮换。
  BC-3440.50:
    name: 认证二手车项目管理
    description: |
      管理OEM认证二手车项目，涵盖检验、资质认定、品牌及质保。
    in_scope:
      - CPO检验与资质认定标准
      - CPO库存与定价
      - CPO专属质保计划
    out_of_scope:
      - CPO计划以外的到期租赁车二手车处置
  BC-3440.50.10:
    name: CPO整车资质认定与检验
    description: |
      定义并执行CPO资质认定标准和检验规范。
  BC-3440.50.20:
    name: CPO库存管理
    description: |
      管理跨经销商和中央车池的CPO库存。
  BC-3440.50.30:
    name: CPO质保与品牌
    description: |
      设计品牌CPO质保计划并开展市场推广。
  BC-3440.60:
    name: 车队与B2B销售管理
    description: |
      面向车队、租赁、租车及其他B2B购车方的销售运营，包括招标与竞标处理。
  BC-3440.60.10:
    name: 车队客户管理
    description: |
      管理大型车队客户和企业客户关系。
  BC-3440.60.20:
    name: 车队招标与竞标管理
    description: |
      应对车队招标、RFP及结构化竞标流程中的大宗整车交易。
  BC-3440.60.30:
    name: 车队整车规格管理
    description: |
      管理车队专属整车规格、选装项及改装方案。
  BC-3440.60.40:
    name: 租车与融资租赁渠道管理
    description: |
      管理OEM与租车和融资租赁公司的关系，包括回购安排。
  BC-3440.70:
    name: 整车交车与登记注册支持
    description: |
      为经销商提供整车交车、登记注册及进入客户体验阶段的支持。
  BC-3440.70.10:
    name: 交车前检查协调
    description: |
      协调经销商和处理中心的PDI标准及签发。
  BC-3440.70.20:
    name: 整车登记注册联络
    description: |
      与车辆登记注册主管部门联络并提供首次登记数据。
  BC-3440.70.30:
    name: 客户交车体验
    description: |
      定义并保障交付时的客户交车体验。

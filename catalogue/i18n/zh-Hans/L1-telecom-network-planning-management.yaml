locale: zh-Hans
source: L1-telecom-network-planning-management.yaml
entries:
  BC-2610:
    name: 电信网络规划管理
    description: |
      对固定网络、移动网络和IP网络进行长期规划和容量设计，包括需求预测、覆盖和容量规划、技术演进路线定义、站点建设排期以及遗留网络退网协调。
  BC-2610.10:
    name: 网络需求预测
    description: |
      对长期用户、流量和业务需求进行预测，以驱动覆盖和容量决策。
  BC-2610.10.10:
    name: 用户增长预测
    description: |
      按细分市场、技术和地域预测用户规模增长。
  BC-2610.10.20:
    name: 流量需求预测
    description: |
      按域和小区预测语音、数据、视频和信令流量。
  BC-2610.10.30:
    name: 业务需求建模
    description: |
      对新业务和演进业务的需求进行建模，以支撑容量和功能路线图。
  BC-2610.20:
    name: 网络覆盖规划
    description: |
      规划无线、光纤和传输网络的地理覆盖目标及韧性要求。
  BC-2610.20.10:
    name: 无线覆盖规划
    description: |
      定义各频段和技术的无线覆盖目标并进行传播建模。
  BC-2610.20.20:
    name: 光纤覆盖规划
    description: |
      规划光纤覆盖范围、覆盖家庭数量和接入节点位置。
  BC-2610.20.30:
    name: 冗余与韧性规划
    description: |
      设计路由多样性、地理冗余和韧性目标。
  BC-2610.30:
    name: 网络容量规划
    description: |
      在无线接入、核心网和传输域进行容量规划，以在性能目标范围内满足预测需求。
  BC-2610.30.10:
    name: 无线接入容量规划
    description: |
      对无线接入网中的小区、扇区和载波进行容量设计。
  BC-2610.30.20:
    name: 核心网容量规划
    description: |
      对移动和固定核心网功能及用户数据存储进行容量设计。
  BC-2610.30.30:
    name: 传输容量规划
    description: |
      对前传、回传、城域和汇聚传输进行容量设计。
  BC-2610.30.40:
    name: IP骨干容量规划
    description: |
      对IP骨干、对等互联和转接链路进行容量设计。
  BC-2610.40:
    name: 网络技术演进规划
    description: |
      定义多年期网络技术路线图和架构演进方向。
  BC-2610.40.10:
    name: 技术路线图定义
    description: |
      定义涵盖无线、传输和核心技术的多年期演进路线图。
  BC-2610.40.20:
    name: 网络架构演进
    description: |
      向目标参考架构（如云原生核心网和Open RAN）进行架构转型。
  BC-2610.40.30:
    name: 厂商技术选型
    description: |
      对新网络域和刷新周期的厂商技术进行评估和选择。
  BC-2610.50:
    name: 网络站点规划
    description: |
      识别、勘察、审批和排期新建网络站点。
  BC-2610.50.10:
    name: 站点识别
    description: |
      根据覆盖、容量和回传标准识别候选站点。
  BC-2610.50.20:
    name: 无线频率站点勘察
    description: |
      对候选站点进行RF性能、结构可行性和干扰勘察。
  BC-2610.50.30:
    name: 建设审批协调
    description: |
      协调新建站点的内部审批、规划许可和分区审批。
  BC-2610.50.40:
    name: 建设排期
    description: |
      根据资本支出、供应商和覆盖承诺对站点建设进行排期和排序。
  BC-2610.60:
    name: 网络退网规划
    description: |
      规划遗留网络退网、用户迁移和资产退役。
  BC-2610.60.10:
    name: 遗留网络退役规划
    description: |
      规划遗留网络单元及相关资产的有序退役。
  BC-2610.60.20:
    name: 用户迁移规划
    description: |
      规划用户从退网技术迁移至目标平台的方案。
  BC-2610.60.30:
    name: 技术退网规划
    description: |
      定义技术退网里程碑、监管通知和最终关停事件。

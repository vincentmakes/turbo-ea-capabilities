locale: zh-Hans
source: L1-air-traffic-control-operations-management.yaml
entries:
  BC-1210:
    name: 空中交通管制运营管理
    description: |
      提供实时空中交通服务，涵盖航路、进近、机场塔台及洋区管制，确保飞行安全与有序运行。
  BC-1210.10:
    name: 航路管制运营管理
    description: |
      提供高空航路空中交通管制服务，保障飞机在航路阶段的安全间隔与顺畅运行。
  BC-1210.10.10:
    name: 航路间隔提供
    description: |
      在航路空域内提供水平和垂直间隔，防止飞机之间发生冲突。
  BC-1210.10.20:
    name: 航路冲突探测与解脱
    description: |
      探测航路飞行冲突并采取解脱措施，确保飞行安全。
  BC-1210.10.30:
    name: 航路协调
    description: |
      开展扇区间及中心间的航路交通协调，实现飞行管制移交的顺畅衔接。
  BC-1210.10.40:
    name: 飞行计划处理
    description: |
      对飞行计划进行处理、激活和更新，为管制工作提供准确的飞行信息。
  BC-1210.20:
    name: 进近管制运营管理
    description: |
      提供终端区进近和离场管制服务，保障飞机在机场终端区内的有序运行。
  BC-1210.20.10:
    name: 进场排序与计量
    description: |
      执行进场排序、到达管理（AMAN）及流量计量操作，优化进场飞机的间隔。
  BC-1210.20.20:
    name: 离场管理
    description: |
      执行离场管理、离场管理系统（DMAN）操作，监控标准离场程序（SID）的遵守情况。
  BC-1210.20.30:
    name: 进近引导与间距
    description: |
      为飞机提供最终进近阶段的雷达引导和间距管理，确保安全有序降落。
  BC-1210.20.40:
    name: 终端区协调
    description: |
      协调进近管制单位与相邻管制单位之间的工作，保障飞行管制的无缝移交。
  BC-1210.30:
    name: 机场塔台运营管理
    description: |
      在机场塔台提供管制服务，包括地面运动控制，保障飞机起降和地面运行安全。
  BC-1210.30.10:
    name: 跑道管制
    description: |
      提供跑道管制服务，包括签发起飞和着陆许可，确保跑道安全使用。
  BC-1210.30.20:
    name: 地面运动管制
    description: |
      对机场地面运动的飞机和车辆实施管制，防止地面冲突和跑道侵入。
  BC-1210.30.30:
    name: 放行许可签发
    description: |
      签发离场许可和起飞前通报信息，确保飞行机组获得准确的放行内容。
  BC-1210.30.40:
    name: 机场协调
    description: |
      协调机场运营部门和应急服务机构，保障机场整体运行安全。
  BC-1210.40:
    name: 洋区管制运营管理
    description: |
      提供程序管制和洋区空中交通管制服务，保障无雷达覆盖洋区内的飞行安全。
  BC-1210.40.10:
    name: 程序间隔提供
    description: |
      在非雷达洋区空域内采用程序间隔方法保障飞机安全间隔。
  BC-1210.40.20:
    name: 洋区许可管理
    description: |
      签发洋区飞行许可和重新许可，满足洋区飞行的特殊管制需求。
  BC-1210.40.30:
    name: CPDLC 与 ADS-C 运营
    description: |
      利用 CPDLC 和 ADS-C 开展基于数据链的洋区管制运营，提高洋区通信效率。
  BC-1210.50:
    name: 管制值班与班次管理
    description: |
      负责值班监督、班次移交和席位排班，确保管制运营持续有效运转。
  BC-1210.50.10:
    name: 值班监督
    description: |
      对值班状态和班次绩效实施运营监督，保障管制工作质量。
  BC-1210.50.20:
    name: 班次移交管理
    description: |
      规范化班次移交简报和文档记录，确保接班管制员全面了解当前情况。
  BC-1210.50.30:
    name: 席位排班
    description: |
      制定管制员席位排班计划并实施疲劳管理，保障管制员工作状态。
  BC-1210.60:
    name: 应急运营管理
    description: |
      管理降级模式运营、系统故障响应及备用程序，确保在异常情况下维持管制服务。
  BC-1210.60.10:
    name: 降级模式运营
    description: |
      在系统支持减弱的降级模式下维持管制运营，保障基本管制服务的连续性。
  BC-1210.60.20:
    name: 系统故障响应
    description: |
      按照既定程序响应空管系统故障，将故障对运营的影响降至最低。
  BC-1210.60.30:
    name: 切换至备用系统
    description: |
      在主系统失效时切换至备用空管系统和应急设施，维持管制服务不中断。
  BC-1210.60.40:
    name: 应急预案维护
    description: |
      维护和演练运营应急预案，确保预案的实用性和有效性。

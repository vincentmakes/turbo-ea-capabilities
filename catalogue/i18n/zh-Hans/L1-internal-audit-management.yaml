locale: zh-Hans
source: L1-internal-audit-management.yaml
entries:
  BC-140:
    name: 内部审计管理
    description: |
      对治理、风险及控制有效性提供独立保证。
  BC-140.10:
    name: 审计规划管理
    description: |
      制定基于风险的审计计划并管理审计宇宙。
  BC-140.10.10:
    name: 审计宇宙管理
    description: |
      定义并维护可审计单元及风险评级。
  BC-140.10.20:
    name: 基于风险的年度计划编制
    description: |
      制定按风险优先排序的年度审计计划并分配资源。
  BC-140.10.30:
    name: 审计项目范围界定
    description: |
      确定审计目标、范围、标准及审计方案设计。
  BC-140.20:
    name: 审计执行管理
    description: |
      开展现场审计、收集证据及出具审计报告。
  BC-140.20.10:
    name: 审计现场工作
    description: |
      开展穿行测试、控制测试及证据收集。
  BC-140.20.20:
    name: 审计工作底稿管理
    description: |
      记录证据、结论并进行审督复核。
  BC-140.20.30:
    name: 审计报告
    description: |
      起草、清稿并出具审计报告及审计意见。
  BC-140.20.40:
    name: 持续与数据驱动审计
    description: |
      在审计工作中运用数据分析及持续监控手段。
  BC-140.30:
    name: 审计发现与整改管理
    description: |
      跟踪审计问题、管理层行动及后续跟进。
  BC-140.30.10:
    name: 发现记录与评级
    description: |
      按标准格式记录并对审计发现进行评级。
  BC-140.30.20:
    name: 管理层行动跟踪
    description: |
      跟踪已商定管理层行动直至关闭。
  BC-140.30.30:
    name: 整改验证
    description: |
      独立验证整改措施的有效性。
  BC-140.40:
    name: 审计质量保证
    description: |
      对审计方法论及执行质量实施质量保证。
  BC-140.40.10:
    name: 审计方法论管理
    description: |
      维护符合 IIA 准则的审计方法论。
  BC-140.40.20:
    name: 内部质量审查
    description: |
      对审计项目定期开展内部质量保证审查。
  BC-140.40.30:
    name: 外部质量评估
    description: |
      接受外部质量评估并确认符合专业准则。

locale: zh-Hans
source: L1-real-estate-leasing-management.yaml
entries:
  BC-4950:
    name: 房地产租赁管理
    description: |
      业主方对商业、零售和住宅空间的全租约生命周期租赁管理，包括定价、营销、潜在租户接待、申请筛查、谈判与执行、租约管理、续约与留客及租约终止。有别于企业承租方租赁（BC-710）和作为服务业务的经纪服务（BC-4960）。
    in_scope:
      - 要价租金和优惠条件战略
      - 空置营销、挂牌和带看
      - 入站潜在租户接待与资格审查
      - 租户申请采集、筛查及符合公平住房原则的拒绝通知
      - 租约条款表、起草、签署及押金收取
      - 业主方租约摘要、指数化及选项跟踪
      - 续约推进和留客项目
      - 迁出、缺陷赔偿及租约终止结算
    out_of_scope:
      - 承租方自用的企业租约管理（BC-710）
      - 作为服务业务的经纪代理（BC-4960）
      - 入住期间物业运营（BC-4940）
      - 租金管制与租赁合规（BC-4990）
  BC-4950.10:
    name: 租赁战略与定价
    description: |
      定义要价租金战略、优惠条件组合、目标租户组合，并对资产租金与市场进行基准比较。
  BC-4950.10.10:
    name: 要价租金与优惠条件战略
    description: |
      按资产和单元类型定义要价租金水平和优惠条件组合。
  BC-4950.10.20:
    name: 目标租户组合战略
    description: |
      定义资产的目标租户组合及信用质量。
  BC-4950.10.30:
    name: 市场租金基准比较
    description: |
      定期对在租和要价租金与市场数据进行基准比较。
  BC-4950.20:
    name: 空置营销与挂牌
    description: |
      通过挂牌内容、渠道分发和现场带看对可租空间进行营销。
  BC-4950.20.10:
    name: 挂牌内容制作
    description: |
      制作包含摄影、平面图和虚拟带看的挂牌内容。
  BC-4950.20.20:
    name: 挂牌渠道与分发管理
    description: |
      管理挂牌信息向门户网站、MLS和合作渠道的分发。
  BC-4950.20.30:
    name: 空置单元带看运营
    description: |
      运营物业内的空置单元带看和自助看房服务。
  BC-4950.30:
    name: 潜在租户与询盘管理
    description: |
      采集、资格审查和跟进入站租赁询盘及潜在租户。
  BC-4950.30.10:
    name: 询盘采集与路由
    description: |
      采集各渠道租赁询盘并路由至对应资产团队。
  BC-4950.30.20:
    name: 潜在租户资格审查
    description: |
      按目标用途、信用和单元匹配度审查潜在租户资格。
  BC-4950.30.30:
    name: 带看安排与跟进
    description: |
      安排带看并对潜在租户进行看房后跟进。
  BC-4950.40:
    name: 租户申请与筛查
    description: |
      采集租户申请并开展符合公平住房规定的信用、身份和背景调查。
  BC-4950.40.10:
    name: 申请采集
    description: |
      采集租户申请及支持文件。
  BC-4950.40.20:
    name: 信用与背景调查
    description: |
      对申请人开展信用调查及业主/雇主背景核查。
  BC-4950.40.30:
    name: 身份与居住权核查
    description: |
      按司法管辖区要求核查申请人身份和居住权。
  BC-4950.40.40:
    name: 公平住房拒绝申请处理
    description: |
      依据公平住房规定和不利申请决定通知规则处理拒绝申请。
  BC-4950.50:
    name: 租约谈判与执行
    description: |
      谈判租约条款表、起草、修改管理、执行，以及收取押金和担保。
  BC-4950.50.10:
    name: 条款表谈判
    description: |
      谈判涵盖租金、租期、选项和激励条款的租约条款表。
  BC-4950.50.20:
    name: 租约起草与修改管理
    description: |
      起草租约文件并管理与租户律师的修改轮次。
  BC-4950.50.30:
    name: 租约签署与执行
    description: |
      完成租约及附属文件的签署与执行。
  BC-4950.50.40:
    name: 押金与担保收取
    description: |
      收取押金、信用证及个人或企业担保。
  BC-4950.60:
    name: 租约管理（业主方）
    description: |
      业主方对租约摘要、租金指数化、选项跟踪及租期内租约合规监控的管理。
  BC-4950.60.10:
    name: 租约摘要
    description: |
      将已执行租约摘录为结构化关键条款档案。
  BC-4950.60.20:
    name: 租金指数化与递增跟踪
    description: |
      跟踪并触发租金递增，包括指数化和阶梯式条款。
  BC-4950.60.30:
    name: 选项、终止权与续约跟踪
    description: |
      跟踪租户和业主选项、终止日期及续约窗口。
  BC-4950.60.40:
    name: 租约合规监控
    description: |
      监控租户对租约约定的合规情况，包括用途、装修和报告义务。
  BC-4950.70:
    name: 续约与留客管理
    description: |
      主动管理续约管道、条款谈判及针对在租租户的留客项目。
  BC-4950.70.10:
    name: 续约管道管理
    description: |
      按到期日历和留客目标管理续约管道。
  BC-4950.70.20:
    name: 续约条款谈判
    description: |
      谈判包含租金、期限和激励条款的续约条件。
  BC-4950.70.30:
    name: 留客项目运营
    description: |
      运营包含租户接触和激励措施的留客项目。
  BC-4950.80:
    name: 迁出与租约终止管理
    description: |
      管理租约终止时的通知、退租、缺陷赔偿、复原、押金退还及最终结算。
  BC-4950.80.10:
    name: 通知与退租处理
    description: |
      处理终止通知和物业退还手续。
  BC-4950.80.20:
    name: 缺陷赔偿与复原评估
    description: |
      按租约评估缺陷赔偿和租户复原义务。
  BC-4950.80.30:
    name: 押金退还
    description: |
      按法规和租约扣减后退还押金。
  BC-4950.80.40:
    name: 租约终止最终结算
    description: |
      在租约终止时完成租金、回收费用及抵扣款项的最终结算。

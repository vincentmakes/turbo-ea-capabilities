locale: zh-Hans
source: L1-chemical-regulatory-compliance-management.yaml
entries:
  BC-4660:
    name: 化工法规合规管理
    description: |
      依据 REACH、TSCA、K-REACH、CWC 及同等制度，开展物质登记、档案管理、授权申请、限制合规、清单申报及进出口管制。有别于保留企业政策合规范围的跨行业合规管理（BC-130）。
  BC-4660.10:
    name: 物质登记管理
    description: |
      在主要全球化学品清单制度下开展物质登记。
  BC-4660.10.10:
    name: REACH 登记管理
    description: |
      管理 REACH 登记，包括物质信息交流论坛（SIEF）和联合提交。
  BC-4660.10.20:
    name: TSCA 预制造申报与清单申报
    description: |
      开展预制造申报（PMN）和 TSCA 清单申报。
  BC-4660.10.30:
    name: K-REACH 与亚太申报
    description: |
      开展 K-REACH、中国、日本及其他亚太制度下的申报。
  BC-4660.10.40:
    name: 聚合物申报管理
    description: |
      管理聚合物物质的申报和豁免。
  BC-4660.20:
    name: 授权与限制管理
    description: |
      遵守授权申请、限制和新兴物质管控要求。
  BC-4660.20.10:
    name: REACH 授权申请
    description: |
      编制和提交 REACH 附件 XIV 授权申请材料。
  BC-4660.20.20:
    name: REACH 限制合规
    description: |
      遵守 REACH 附件 XVII 限制条款。
  BC-4660.20.30:
    name: SVHC 候选清单追踪
    description: |
      追踪 SVHC 候选清单更新及影响分析。
  BC-4660.20.40:
    name: PFAS 与新兴限制管理
    description: |
      管理 PFAS、微塑料及其他新兴限制事项。
  BC-4660.30:
    name: 监管档案管理
    description: |
      在 IUCLID 及同等格式中编制和维护监管档案。
  BC-4660.30.10:
    name: IUCLID 档案管理
    description: |
      编制和维护 IUCLID 6 档案。
  BC-4660.30.20:
    name: 化学品安全报告编制
    description: |
      按照 REACH 附件 I 编制化学品安全报告。
  BC-4660.30.30:
    name: 物质身份档案维护
    description: |
      维护物质身份档案和分析证据。
  BC-4660.40:
    name: 清单申报管理
    description: |
      管理物质在 EINECS、EC 和国家化学品清单中的收录情况。
  BC-4660.40.10:
    name: EINECS 与 EC 编号管理
    description: |
      管理 EINECS 和 EC 编号的分配和更新。
  BC-4660.40.20:
    name: 新物质清单申报
    description: |
      向国家化学品清单申报新物质。
  BC-4660.40.30:
    name: 国家清单对账
    description: |
      将产品组合与各国化学品清单进行对账。
  BC-4660.50:
    name: 化学品进出口管制
    description: |
      遵守国际化学品贸易管控，包括 CWC、毒品前体物、两用品和事先知情同意制度。
  BC-4660.50.10:
    name: CWC 附表合规
    description: |
      遵守禁止化学武器组织（OPCW）一、二、三类附表的申报和许可要求。
  BC-4660.50.20:
    name: 毒品前体物管制
    description: |
      遵守国际麻醉品管制局（INCB）和国家毒品前体物管制制度。
  BC-4660.50.30:
    name: 两用品出口许可
    description: |
      对两用化学品出口开展许可和最终用途合规管理。
  BC-4660.50.40:
    name: 事先知情同意合规
    description: |
      遵守《鹿特丹公约》事先知情同意制度。
  BC-4660.60:
    name: 法规监控与情报
    description: |
      监测和评估各市场化学品法规的演变情况及影响。
  BC-4660.60.10:
    name: 法规前瞻扫描
    description: |
      开展待出台和新兴化学品法规的前瞻扫描。
  BC-4660.60.20:
    name: 法规变化影响评估
    description: |
      评估法规变化对产品组合和运营的影响。
  BC-4660.60.30:
    name: 行业协会联络
    description: |
      与 Cefic、ACC 及同等行业协会开展联络。
  BC-4660.70:
    name: 主管机构参与与提交
    description: |
      与监管机构开展参与，包括提交、答疑和检查应对。
  BC-4660.70.10:
    name: 主管机构提交材料编制
    description: |
      编制向 ECHA、EPA 及同等主管机构的提交材料。
  BC-4660.70.20:
    name: 主管机构询问答复
    description: |
      答复主管机构就档案和登记提出的询问。
  BC-4660.70.30:
    name: 检查准备就绪
    description: |
      持续保持应对监管机构检查和审计的准备状态。

locale: zh-Hans
source: L1-sustainability-management.yaml
entries:
  BC-740:
    name: 可持续发展管理
    description: |
      管理 ESG 战略、气候、循环经济及可持续发展报告。
  BC-740.10:
    name: ESG 战略与报告管理
    description: |
      管理 ESG 战略、重要性评估及可持续发展报告。
  BC-740.10.10:
    name: ESG 战略制定
    description: |
      制定 ESG 战略、目标及与业务战略的整合方案。
  BC-740.10.20:
    name: 重要性评估
    description: |
      按 ESRS/GRI 开展单一及双重重要性评估。
  BC-740.10.30:
    name: 可持续发展报告与披露
    description: |
      编制可持续发展报告及披露文件（CSRD、IFRS S1/S2、GRI）。
  BC-740.10.40:
    name: ESG 数据管理与鉴证
    description: |
      管理 ESG 数据收集、控制及外部鉴证。
  BC-740.20:
    name: 气候与碳管理
    description: |
      管理碳足迹、脱碳路径及气候信息披露。
  BC-740.20.10:
    name: 温室气体清单管理
    description: |
      按温室气体核算体系管理范围一、二、三的温室气体清单。
  BC-740.20.20:
    name: 脱碳路线图管理
    description: |
      制定基于科学的减排目标及脱碳路线图规划。
  BC-740.20.30:
    name: 气候风险与情景分析
    description: |
      开展物理及转型气候风险分析及 TCFD 情景分析。
  BC-740.20.40:
    name: 碳信用与碳抵消管理
    description: |
      采购并使用碳信用及碳抵消额度。
  BC-740.20.50:
    name: 可再生能源采购
    description: |
      通过购电协议、可再生能源证书等方式采购可再生能源。
  BC-740.30:
    name: 循环经济管理
    description: |
      管理循环性、废弃物减少及以旧换新项目。
  BC-740.30.10:
    name: 循环产品设计
    description: |
      设计易于维修、再利用、回收及减少材料使用的产品。
  BC-740.30.20:
    name: 以旧换新与再利用项目
    description: |
      推行客户以旧换新、翻新及转售项目。
  BC-740.30.30:
    name: 回收与材料回收
    description: |
      开展回收项目及可回收材料的再利用。
  BC-740.30.40:
    name: 包装可持续性
    description: |
      开展可持续包装设计及生产者责任延伸合规。
  BC-740.40:
    name: 可持续采购管理
    description: |
      管理可持续供应链及负责任采购。
  BC-740.40.10:
    name: 可持续供应商标准
    description: |
      制定供应商行为准则及可持续发展标准。
  BC-740.40.20:
    name: 供应商 ESG 评估
    description: |
      对供应商开展 ESG 评级、审核及评估。
  BC-740.40.30:
    name: 人权尽职调查
    description: |
      在供应链中开展人权及现代奴役尽职调查。
  BC-740.40.40:
    name: 负责任原材料采购
    description: |
      负责任采购冲突矿产、木材及大宗商品。
  BC-740.50:
    name: 可持续发展利益相关方互动
    description: |
      管理与非政府组织、社区及 ESG 评级机构的互动。
  BC-740.50.10:
    name: 非政府组织与公民社会互动
    description: |
      就可持续发展议题与非政府组织及公民社会开展互动。
  BC-740.50.20:
    name: 社区投资
    description: |
      开展社区投资、公益慈善及社会影响项目。
  BC-740.50.30:
    name: ESG 评级机构与指数互动
    description: |
      与 ESG 评级机构及可持续发展指数开展互动。
  BC-740.50.40:
    name: 公共政策与倡导
    description: |
      就可持续发展议题开展公共政策倡导。

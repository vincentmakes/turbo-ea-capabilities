locale: zh-Hans
source: L1-driver-crew-operations-management.yaml
entries:
  BC-2440:
    name: 驾驶员与机组运营管理
    description: |
      跨公路、铁路、海运及空运方式，管理驾驶员与运营机组的资质认定、排班、服务时限合规、疲劳管理及绩效。
  BC-2440.10:
    name: 驾驶员与机组资质管理
    description: |
      维护驾驶员及机组人员的执照、附加资质、职级及健康适任记录。
    in_scope:
      - CDL、STCW、ATPL及同等专业资质
      - 健康与心理适任记录
    out_of_scope:
      - 通用人力资源档案及薪资（BC-300）
      - 空中交通管制员能力（BC-1290）
  BC-2440.10.10:
    name: 执照与附加资质追踪
    description: |
      追踪专业执照、附加资质及到期日期。
  BC-2440.10.20:
    name: 方式专属职级管理
    description: |
      管理方式专属职级，如STCW背书及飞机机型资质。
  BC-2440.10.30:
    name: 健康与适任认证
    description: |
      对运营人员开展定期健康及适任认证。
  BC-2440.20:
    name: 排班与计划管理
    description: |
      在服务及法规约束下编制值班轮次、值班制度及机组配对计划。
  BC-2440.20.10:
    name: 值班轮次规划
    description: |
      按基地、站点及服务规划值班轮次。
  BC-2440.20.20:
    name: 机组配对与轮换
    description: |
      安排机组跨多日或多航段的配对与轮换。
  BC-2440.20.30:
    name: 备班与应急管理
    description: |
      安排备班、预备及随叫随到的值班覆盖。
  BC-2440.30:
    name: 服务时限与疲劳管理
    description: |
      遵守服务时限规定，并运营疲劳风险管理系统。
  BC-2440.30.10:
    name: 服务时限合规
    description: |
      通过行驶记录仪、ELD及同等设备记录并执行服务时限规定。
  BC-2440.30.20:
    name: 疲劳风险管理
    description: |
      运营疲劳风险管理系统及生物数学建模工具。
  BC-2440.30.30:
    name: 休息时间执行
    description: |
      执行强制休息时间、中转停留及每周时限规定。
  BC-2440.40:
    name: 驾驶员与机组绩效管理
    description: |
      对驾驶员及机组人员开展绩效评分、辅导及违规处理。
  BC-2440.40.10:
    name: 驾驶员与机组绩效评分
    description: |
      按安全、燃油及服务KPI对运营人员进行绩效评分。
  BC-2440.40.20:
    name: 辅导与复训
    description: |
      开展辅导、复训课程及补充培训。
  BC-2440.40.30:
    name: 事故与违规管理
    description: |
      追踪并处理运营事故及规则违规行为。
  BC-2440.50:
    name: 机组差旅与住宿管理
    description: |
      管理海运、空运及铁路轮换机组的差旅、住宿及换班保障。
  BC-2440.50.10:
    name: 机组差旅预订
    description: |
      为机组轮换预订就位差旅。
  BC-2440.50.20:
    name: 机组住宿管理
    description: |
      管理中转停留及轮换期间的酒店及住宿安排。
  BC-2440.50.30:
    name: 换班协调
    description: |
      协调港口、机场及车站的机组换班工作。
metadata:

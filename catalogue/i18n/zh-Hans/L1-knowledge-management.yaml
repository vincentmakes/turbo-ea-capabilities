entries:
  BC-830:
    name: 知识管理
    description: |
      捕获、整理与共享组织知识，提升整体学习能力与运营效率。
  BC-830.10:
    name: 知识采集管理
    description: |
      从专家、项目及经验教训中系统采集知识，形成可复用资产。
  BC-830.10.10:
    name: 隐性知识挖掘
    description: |
      通过访谈与跟岗方式挖掘专家的隐性知识。
  BC-830.10.20:
    name: 经验教训采集
    description: |
      系统采集项目与运营过程中的经验教训。
  BC-830.10.30:
    name: 知识资产编写
    description: |
      编写文章、操作手册及程序性知识资产。
  BC-830.20:
    name: 知识整理与分类管理
    description: |
      建立分类体系与本体，对知识内容进行系统整理与质量维护。
  BC-830.20.10:
    name: 分类体系与本体管理
    description: |
      维护知识分类体系、本体及元数据方案。
  BC-830.20.20:
    name: 内容整理与评审
    description: |
      定期开展知识内容整理与时效性评审。
  BC-830.20.30:
    name: 搜索与发现管理
    description: |
      优化企业搜索与知识内容发现体验。
  BC-830.30:
    name: 知识共享与协作管理
    description: |
      通过实践社区与协作平台促进组织内部知识流通与共享。
  BC-830.30.10:
    name: 实践社区运营
    description: |
      管理与运营各类实践社区。
  BC-830.30.20:
    name: 协作平台管理
    description: |
      运营用于知识共享的协作平台与内部网站。
  BC-830.30.30:
    name: 知识活动与论坛
    description: |
      组织内部知识分享活动、午餐学习会与学习论坛。
  BC-830.40:
    name: 最佳实践管理
    description: |
      识别、提炼并推广最佳实践，提升组织整体能力水平。
  BC-830.40.10:
    name: 最佳实践识别
    description: |
      识别内外部最佳实践。
  BC-830.40.20:
    name: 最佳实践提炼
    description: |
      将最佳实践提炼为可复用资产与标准。
  BC-830.40.30:
    name: 最佳实践推广
    description: |
      推广最佳实践并提供培训与落地支持。

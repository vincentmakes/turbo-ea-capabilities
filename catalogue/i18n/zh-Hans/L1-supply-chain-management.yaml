entries:
  BC-520:
    name: 供应链管理
    description: |
      管理端到端供应链规划、协调及执行。
  BC-520.10:
    name: 需求规划管理
    description: |
      开展需求预测、统计及共识规划。
  BC-520.10.10:
    name: 统计需求预测
    description: |
      运用统计及机器学习方法开展需求预测。
  BC-520.10.20:
    name: 共识需求规划
    description: |
      跨职能共识需求计划，包括销售调整。
  BC-520.10.30:
    name: 新品需求规划
    description: |
      开展新品导入及停产产品的需求规划。
  BC-520.10.40:
    name: 需求感知与塑造
    description: |
      开展短期需求感知及需求塑造举措。
  BC-520.20:
    name: 供应规划管理
    description: |
      开展供应网络规划及供应来源平衡。
  BC-520.20.10:
    name: 供应网络规划
    description: |
      跨工厂及配送中心开展多级供应网络规划。
  BC-520.20.20:
    name: 生产计划生成
    description: |
      跨供应基地生成主生产计划。
  BC-520.20.30:
    name: 供应分配
    description: |
      在区域及客户间分配受限供应资源。
  BC-520.20.40:
    name: 供应来源平衡
    description: |
      在多个供应来源间平衡，包括双源采购。
  BC-520.30:
    name: 销售与运营规划管理
    description: |
      管理 S&OP 及综合业务规划，实现跨职能协同。
  BC-520.30.10:
    name: S&OP 周期管理
    description: |
      协调月度 S&OP/综合业务规划周期及会议节奏。
  BC-520.30.20:
    name: 需求评审
    description: |
      跨职能评审非受限需求计划。
  BC-520.30.30:
    name: 供应评审
    description: |
      在 S&OP 周期中审查供应可行性及约束条件。
  BC-520.30.40:
    name: 综合协调与高管 S&OP
    description: |
      开展综合协调及高管决策会议。
  BC-520.40:
    name: 订单履行管理
    description: |
      管理订单承诺、分配及履行协调。
  BC-520.40.10:
    name: 订单承诺与可供应量
    description: |
      基于供应和产能开展 ATP/CTP 订单承诺。
  BC-520.40.20:
    name: 订单协调
    description: |
      协调跨节点和渠道的订单履行。
  BC-520.40.30:
    name: 订单跟踪与可见性
    description: |
      提供端到端订单状态及货运可见性。
  BC-520.40.40:
    name: 退货与逆向履行
    description: |
      管理退货授权、逆向物流及翻新路由。
  BC-520.50:
    name: 物流运营管理
    description: |
      管理供应链中的运输及仓储运营。
  BC-520.50.10:
    name: 运输规划
    description: |
      开展运输方式选择、路线规划及装载规划。
  BC-520.50.20:
    name: 承运商管理
    description: |
      管理承运商遴选、合同及绩效。
  BC-520.50.30:
    name: 仓库运营
    description: |
      管理收货、上架、拣货、包装及发货运营。
  BC-520.50.40:
    name: 跨境与海关运营
    description: |
      管理跨境货物流转、清关及贸易合规。
  BC-520.50.50:
    name: 最后一公里配送运营
    description: |
      管理最后一公里配送路线、时段管理及签收确认。
  BC-520.60:
    name: 供应链风险管理
    description: |
      管理供应链中断、可见性及韧性。
  BC-520.60.10:
    name: 端到端供应链可见性
    description: |
      实现跨供应商、库存及货运的多级可见性。
  BC-520.60.20:
    name: 中断检测与响应
    description: |
      检测供应中断并协调响应行动。
  BC-520.60.30:
    name: 供应链韧性设计
    description: |
      通过双源采购及安全库存等方式设计韧性网络。
  BC-520.60.40:
    name: 供应链合规
    description: |
      确保符合供应链尽职调查及贸易法规要求。

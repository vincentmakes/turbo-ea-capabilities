locale: zh-Hans
source: L1-professional-practice-knowledge-management.yaml
entries:
  BC-4370:
    name: 专业执业知识管理
    description: |
      维护和复用支撑专业服务事务所接洽交付的执业先例、方法论资产、思想领导力成果、交付物模板及研究资料库。
  BC-4370.10:
    name: 先例与模板管理
    description: |
      对可供复用的法律先例、合同模板及标准工作成果进行精选、版本管理和访问管控。
  BC-4370.10.10:
    name: 先例精选
    description: |
      将高质量接洽成果经筛选、脱敏后纳入事务所先例库。
  BC-4370.10.20:
    name: 模板维护
    description: |
      维护合同模板、意见书框架及标准交付物模板的版本管控。
  BC-4370.10.30:
    name: 先例访问治理
    description: |
      在复用便利性与客户保密和信息隔离墙约束之间取得平衡，治理先例访问权限。
  BC-4370.20:
    name: 方法论与工具管理
    description: |
      定义、演进并推广在接洽中使用的方法论、分析框架及专有工具。
  BC-4370.20.10:
    name: 方法论定义
    description: |
      定义符合执业标准和事务所政策的审计、咨询及法律方法论。
  BC-4370.20.20:
    name: 方法论版本管理与发布
    description: |
      对方法论和加速器组件进行版本管理、发布管理及废弃处理。
  BC-4370.20.30:
    name: 方法论推广与培训
    description: |
      推广新方法论版本，包括培训、FAQ及采用率追踪。
  BC-4370.30:
    name: 执业洞察与思想领导力管理
    description: |
      生产和分发执业观点、提示、调研及思想领导力出版物。
  BC-4370.30.10:
    name: 洞察议题规划
    description: |
      规划与执业战略和客户兴趣相符的洞察及思想领导力议题。
  BC-4370.30.20:
    name: 洞察生产
    description: |
      生产文章、提示、观点及调研报告。
  BC-4370.30.30:
    name: 洞察分发与互动追踪
    description: |
      向客户和潜在客户分发洞察，并追踪互动情况。
  BC-4370.40:
    name: 接洽资产复用管理
    description: |
      在保护客户保密性的前提下，识别、提炼和标记高价值接洽成果为可复用资产。
  BC-4370.40.10:
    name: 可复用资产识别
    description: |
      识别具有超越原始接洽复用价值的接洽成果。
  BC-4370.40.20:
    name: 资产脱敏与隐去
    description: |
      对接洽资产进行脱敏和隐去处理，在复用前删除客户保密信息。
  BC-4370.40.30:
    name: 资产标记与可发现性
    description: |
      对可复用资产进行标记和元数据富化，以提升跨执业部门的可发现性。
  BC-4370.50:
    name: 执业资料库管理
    description: |
      采购和授权专业人员使用的外部研究数据库、法律税务资料库及订阅内容。
  BC-4370.50.10:
    name: 外部研究订阅管理
    description: |
      采购和续签法律、税务及研究外部数据库的订阅。
  BC-4370.50.20:
    name: 资料库目录与检索
    description: |
      建立跨内外部研究来源的目录和联合检索功能。
  BC-4370.50.30:
    name: 资料库使用分析
    description: |
      分析研究数据库的使用情况，为续签和精简决策提供依据。
  BC-4370.60:
    name: 执业社区管理
    description: |
      运营在事务所内共享知识的执业群体、实践社区及专题网络。
  BC-4370.60.10:
    name: 执业群体运营
    description: |
      运营执业群体，包括成员管理、领导团队及论坛节奏。
  BC-4370.60.20:
    name: 实践社区促进
    description: |
      促进跨执业部门围绕新兴议题和方法论的实践社区交流。
  BC-4370.60.30:
    name: 知识倡导者网络
    description: |
      运营分布在各执业部门和办公室的知识倡导者网络。

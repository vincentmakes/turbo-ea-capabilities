locale: zh-Hans
source: L1-gas-processing-lng-operations-management.yaml
entries:
  BC-3070:
    name: 天然气处理与LNG运营管理
    description: |
      在中游天然气价值链上运营天然气处理、NGL分馏、LNG液化、装船与外输、再气化及天然气质量保证设施。
  BC-3070.10:
    name: 天然气处理厂运营
    description: |
      运营天然气处理厂的进站接收、净化、脱水及硫磺回收设施。
  BC-3070.10.10:
    name: 天然气接收与进站管理
    description: |
      开展进站天然气接收、段塞捕集和调质处理。
  BC-3070.10.20:
    name: 酸气净化运营
    description: |
      开展胺法和物理溶剂法酸气净化作业。
  BC-3070.10.30:
    name: 天然气脱水运营
    description: |
      对天然气进行乙二醇和分子筛脱水处理。
  BC-3070.10.40:
    name: 硫磺回收运营
    description: |
      开展克劳斯法和尾气处理硫磺回收作业。
  BC-3070.20:
    name: NGL分馏运营
    description: |
      运营脱甲烷塔、脱乙烷塔及下游分馏塔，生产乙烷、丙烷、丁烷和轻汽油。
  BC-3070.20.10:
    name: 脱甲烷塔运营
    description: |
      运营深冷脱甲烷塔进行乙烷回收。
  BC-3070.20.20:
    name: 脱乙烷塔与脱丙烷塔运营
    description: |
      运营脱乙烷塔、脱丙烷塔和脱丁烷塔。
  BC-3070.20.30:
    name: NGL储存运营
    description: |
      运营加压和冷冻NGL储存设施。
  BC-3070.30:
    name: LNG液化运营
    description: |
      运营液化系列、制冷循环和LNG储罐。
  BC-3070.30.10:
    name: 制冷循环运营
    description: |
      运营混合制冷剂和级联制冷回路。
  BC-3070.30.20:
    name: LNG系列运营
    description: |
      对LNG液化系列开展端对端运营。
  BC-3070.30.30:
    name: LNG储罐运营
    description: |
      运营低温LNG储罐，包括翻滚预防。
  BC-3070.40:
    name: LNG装船与外输运营
    description: |
      在液化终端开展船舶装载、货舱预冷和管道外输气化。
  BC-3070.40.10:
    name: LNG船舶装载
    description: |
      在LNG出口码头开展船舶装载作业。
  BC-3070.40.20:
    name: 外输气化
    description: |
      从液化站点开展外输气化和管道出口作业。
  BC-3070.40.30:
    name: 货舱预冷协调
    description: |
      协调LNG船舶在装载前的货舱预冷工作。
  BC-3070.50:
    name: LNG再气化运营
    description: |
      运营LNG进口终端，包括气化、外输压力控制和蒸发气处理。
  BC-3070.50.10:
    name: 气化器运营
    description: |
      运营开架式、浸没燃烧式和管壳式气化器。
  BC-3070.50.20:
    name: 外输压力控制
    description: |
      从进口终端进行外输压力控制和并网注入。
  BC-3070.50.30:
    name: 蒸发气处理
    description: |
      对储罐蒸发气进行再液化或外输处理。
  BC-3070.60:
    name: 天然气质量管理
    description: |
      确保符合管道和LNG天然气质量规格要求，并处理不合格气流。
  BC-3070.60.10:
    name: 规格符合性监测
    description: |
      持续监测管道气和LNG的质量规格符合情况。
  BC-3070.60.20:
    name: 天然气取样与分析
    description: |
      开展常规天然气取样、色谱分析和证书生成。
  BC-3070.60.30:
    name: 不合格天然气处理
    description: |
      对不合格气流进行改道、混配和再处理。

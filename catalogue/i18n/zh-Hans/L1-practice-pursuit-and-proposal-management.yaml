locale: zh-Hans
source: L1-practice-pursuit-and-proposal-management.yaml
entries:
  BC-4360:
    name: 业务拓展与建议书管理
    description: |
      管理专业服务事务所的拓展阶段活动，包括机会资格预审、拓展策略、建议书与演示材料开发、费用建模及赢/输分析，有别于通用销售管理。
  BC-4360.10:
    name: 机会资格预审管理
    description: |
      对入站和出站拓展机会进行战略契合度、可交付性及商业吸引力的资格预审。
  BC-4360.10.10:
    name: 机会捕获
    description: |
      从RFP、推荐及关系驱动的开发中捕获拓展机会。
  BC-4360.10.20:
    name: 机会资格评分
    description: |
      按战略契合度、能力及商业标准对机会进行评分。
  BC-4360.10.30:
    name: 拓展预许可协调
    description: |
      在正式拓展投入前，通过初步独立性和利益冲突核查对机会进行预许可。
  BC-4360.20:
    name: 拓展策略管理
    description: |
      为已通过资格预审的机会制定拓展策略、赢单计划、拓展团队构成及竞争定位。
  BC-4360.20.10:
    name: 赢单计划开发
    description: |
      开发拓展赢单计划，包括核心信息、差异化要素及利益相关方映射。
  BC-4360.20.20:
    name: 拓展团队构成
    description: |
      组建拓展团队，包括拓展负责人、主题专家及定价支持。
  BC-4360.20.30:
    name: 竞争情报综合
    description: |
      综合预计参与同一机会的竞争事务所的竞争情报。
  BC-4360.30:
    name: 建议书开发管理
    description: |
      按客户要求起草、审查并提交书面建议书和RFP应标文件。
  BC-4360.30.10:
    name: 建议书起草
    description: |
      起草建议书各章节，包括方法论、团队及相关经验。
  BC-4360.30.20:
    name: 建议书审查与审批
    description: |
      对建议书内容、声明及商业承诺进行内部审查和审批。
  BC-4360.30.30:
    name: 建议书提交管理
    description: |
      按客户要求的格式和渠道提交建议书，并保留提交审计追踪。
  BC-4360.30.40:
    name: 建议书资产复用
    description: |
      跨拓展复用和标记建议书内容、案例研究及资历。
  BC-4360.40:
    name: 演示与路演管理
    description: |
      作为竞争性拓展的一部分，准备和呈现路演、选拔展示及口头演示。
  BC-4360.40.10:
    name: 演示材料准备
    description: |
      为口头演示准备路演PPT、演示资产及辅助材料。
  BC-4360.40.20:
    name: 演示排练与辅导
    description: |
      对拓展团队进行演示排练，辅导信息传递、团队协作及Q&A应对。
  BC-4360.40.30:
    name: 演示交付管理
    description: |
      管理路演和选拔展示的交付，包括后勤安排和后续材料。
  BC-4360.50:
    name: 拓展费用建模与定价
    description: |
      为拓展机会设计费用结构和价格模型，包括替代费用安排和风险分担方案。
    out_of_scope:
      - 接洽阶段费用管理（BC-4330.40）
      - 事务所全局定价策略（BC-290）
  BC-4360.50.10:
    name: 拓展费用结构设计
    description: |
      跨小时费、固定费、封顶费、风险代理及成果导向方案设计费用结构。
  BC-4360.50.20:
    name: 拓展盈利能力建模
    description: |
      在不同人员配置、费用及风险情景下建立拓展盈利能力模型。
  BC-4360.50.30:
    name: 拓展定价审批
    description: |
      按折扣、利润率和风险阈值对拓展定价进行内部审批。
  BC-4360.60:
    name: 拓展赢/输分析
    description: |
      对拓展结果进行结构化复盘、赢率分析及将洞察总结纳入拓展和建议书执业。
  BC-4360.60.10:
    name: 拓展结果复盘
    description: |
      开展含竞争对手评估的拓展结果内部和客户复盘。
  BC-4360.60.20:
    name: 赢率分析
    description: |
      按执业部门、客户、机会类型和拓展负责人细分赢率分析。
  BC-4360.60.30:
    name: 拓展经验总结
    description: |
      将拓展经验和反馈总结纳入拓展手册和培训。

locale: zh-Hans
source: L1-patient-experience-management.yaml
entries:
  BC-2910:
    name: 患者体验管理
    description: |
      在整个护理连续体中管理患者参与、数字服务、满意度测量、权益倡导与申诉、患者权利与伦理以及志愿者和辅助服务。
  BC-2910.10:
    name: 患者参与与沟通
    description: |
      通过多渠道与患者及家属沟通，提供健康教育和语言服务。
  BC-2910.10.10:
    name: 多渠道患者沟通
    description: |
      通过电话、安全信息、邮件和数字渠道协调患者沟通。
  BC-2910.10.20:
    name: 健康教育提供
    description: |
      向患者提供疾病、治疗和预防方面的健康教育。
  BC-2910.10.30:
    name: 家属与照护者沟通
    description: |
      在诊疗周期中与家属和授权照护者进行沟通。
  BC-2910.10.40:
    name: 语言与口译服务
    description: |
      提供语言口译和翻译服务。
  BC-2910.20:
    name: 患者门户与数字服务
    description: |
      运营面向患者的数字服务，包括门户、移动应用和自助服务工具。
  BC-2910.20.10:
    name: 患者门户运营
    description: |
      运营患者门户服务，包括消息和档案查阅。
  BC-2910.20.20:
    name: 移动健康应用运营
    description: |
      运营面向患者的移动健康应用程序。
  BC-2910.20.30:
    name: 患者自助服务工具
    description: |
      提供预约、缴费和就诊前准备自助服务工具。
  BC-2910.20.40:
    name: 患者数字身份管理
    description: |
      管理患者数字身份、认证和代理访问。
  BC-2910.30:
    name: 患者满意度测量
    description: |
      通过问卷调查和实时方式测量患者满意度和体验。
  BC-2910.30.10:
    name: 住院体验调查运营
    description: |
      运营住院体验调查项目并进行结果分析。
  BC-2910.30.20:
    name: 门诊体验调查
    description: |
      运营门诊和专科体验调查项目。
  BC-2910.30.30:
    name: 实时反馈采集
    description: |
      在就诊节点采集患者实时和即时反馈。
  BC-2910.30.40:
    name: 体验分析
    description: |
      分析体验驱动因素、主题和改进机会。
  BC-2910.40:
    name: 患者权益倡导与申诉
    description: |
      提供患者权益倡导、投诉和申诉处理及服务补救。
  BC-2910.40.10:
    name: 患者投诉受理
    description: |
      通过多渠道受理患者投诉。
  BC-2910.40.20:
    name: 申诉调查
    description: |
      对患者申诉进行正式调查和处理。
  BC-2910.40.30:
    name: 患者权益倡导联络
    description: |
      在诊疗周期中提供患者权益倡导联络服务。
  BC-2910.40.40:
    name: 服务补救
    description: |
      针对服务失效事件开展服务补救干预。
  BC-2910.50:
    name: 患者权利与伦理
    description: |
      监督患者权利、知情同意流程、预立医疗指示和伦理咨询。
  BC-2910.50.10:
    name: 知情同意流程监督
    description: |
      监督治疗和研究的知情同意流程。
  BC-2910.50.20:
    name: 预立医疗指示管理
    description: |
      采集、存储和展示预立医疗指示及护理目标。
  BC-2910.50.30:
    name: 伦理咨询
    description: |
      为患者、家属和临床医生提供临床伦理咨询服务。
  BC-2910.50.40:
    name: 患者权利宣教
    description: |
      向患者宣教其权利和责任。
  BC-2910.60:
    name: 志愿者与辅助服务
    description: |
      运营支持患者和家属的志愿者和辅助项目。
  BC-2910.60.10:
    name: 志愿者入职
    description: |
      招募、筛查和入职志愿者。
  BC-2910.60.20:
    name: 志愿者服务提供
    description: |
      协调和提供跨科室的志愿者服务。
  BC-2910.60.30:
    name: 辅助项目
    description: |
      运营辅助、慈善和社区项目。
  BC-2910.60.40:
    name: 患者支持服务
    description: |
      提供患者导航、医院牧师和家属休息室等支持服务。

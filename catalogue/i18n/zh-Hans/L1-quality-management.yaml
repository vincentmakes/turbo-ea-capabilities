locale: zh-Hans
source: L1-quality-management.yaml
entries:
  BC-720:
    name: 质量管理
    description: |
      管理企业全部输出物的质量战略、保证及控制。
  BC-720.10:
    name: 质量战略与政策管理
    description: |
      管理质量政策、标准及框架。
  BC-720.10.10:
    name: 质量政策与手册管理
    description: |
      维护符合 ISO 9001 及行业标准的质量手册与政策。
  BC-720.10.20:
    name: 质量目标设定
    description: |
      定义质量目标、KPI 及指标。
  BC-720.10.30:
    name: 质量管理体系治理
    description: |
      治理质量管理体系的范围、结构及职责。
  BC-720.10.40:
    name: 质量风险管理
    description: |
      识别、评估并应对质量风险。
  BC-720.20:
    name: 质量保证管理
    description: |
      管理质量体系、审核及认证（ISO 9001 等）。
  BC-720.20.10:
    name: 内部质量审核
    description: |
      规划并执行内部质量审核。
  BC-720.20.20:
    name: 外部认证管理
    description: |
      管理 ISO 9001 及其他认证的获取及监督审核。
  BC-720.20.30:
    name: 过程验证与确认
    description: |
      对过程及设备开展验证与确认。
  BC-720.20.40:
    name: 文件与记录控制
    description: |
      管理受控文件、质量记录及档案。
  BC-720.30:
    name: 质量控制管理
    description: |
      管理检验、测试及验收准则。
  BC-720.30.10:
    name: 检验规划
    description: |
      制定检验计划、抽样方案及验收准则。
  BC-720.30.20:
    name: 过程质量控制
    description: |
      开展过程内控制、测量及统计过程控制。
  BC-720.30.30:
    name: 最终检验与放行
    description: |
      开展最终检验、批次放行及合格证出具。
  BC-720.30.40:
    name: 计量器具管理
    description: |
      对测量及检验设备进行校准管理。
  BC-720.40:
    name: 不合格品管理
    description: |
      管理不合格报告、偏差及纠正预防行动。
  BC-720.40.10:
    name: 不合格报告
    description: |
      记录并分类不合格品及偏差。
  BC-720.40.20:
    name: 处置与遏制
    description: |
      处置不合格品并采取遏制措施。
  BC-720.40.30:
    name: 纠正与预防行动
    description: |
      执行包含根本原因分析及有效性验证的纠正预防行动流程。
  BC-720.40.40:
    name: 变更控制
    description: |
      对影响质量的变更实施变更控制。
  BC-720.50:
    name: 持续改进管理
    description: |
      管理精益、六西格玛、改善及改进项目。
  BC-720.50.10:
    name: 改进建议管理
    description: |
      收集、评估并优先排序改进建议。
  BC-720.50.20:
    name: 精益与六西格玛项目交付
    description: |
      运用精益及六西格玛方法论交付改进项目。
  BC-720.50.30:
    name: 持续改进辅导
    description: |
      在持续改进方法上开展辅导及能力建设。
  BC-720.50.40:
    name: 收益实现跟踪
    description: |
      跟踪并验证持续改进项目的收益。
  BC-720.60:
    name: 客户质量管理
    description: |
      管理客户质量投诉、退货及现场质量问题。
  BC-720.60.10:
    name: 客户质量投诉处理
    description: |
      受理、调查并回复客户质量投诉。
  BC-720.60.20:
    name: 现场失效分析
    description: |
      分析现场失效及保修退货问题。
  BC-720.60.30:
    name: 召回与客户通知
    description: |
      协调产品召回及客户通知事宜。
  BC-720.60.40:
    name: 客户质量报告
    description: |
      向客户提供质量报告及记分卡。
metadata:
  translator: Claude (zh-Hans automated)

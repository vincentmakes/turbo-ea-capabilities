locale: zh-Hans
source: L1-mobility-services-operations-management.yaml
entries:
  BC-3490:
    name: 出行服务运营管理
    description: |
      共享与按需出行服务的运营——网约车、共享汽车及微出行，以及出行即服务（MaaS）聚合——包括服务目录、行程运营、车队再平衡、司机与乘客运营、动态定价、合作伙伴集成及城市/监管机构沟通。
  BC-3490.10:
    name: 出行服务目录管理
    description: |
      定义出行服务类型、定价计划及地理覆盖区域。
  BC-3490.10.10:
    name: 服务类型定义
    description: |
      定义点对点、自由浮动、固定站点及拼车等服务类型。
  BC-3490.10.20:
    name: 服务定价计划配置
    description: |
      配置起步费、时间与里程计费及会员计划。
  BC-3490.10.30:
    name: 服务地理围栏与覆盖管理
    description: |
      管理运营地理围栏、禁止区域及覆盖范围。
  BC-3490.20:
    name: 行程与预约运营
    description: |
      出行预约的录入、匹配、调度及全生命周期管理。
  BC-3490.20.10:
    name: 行程预约录入
    description: |
      通过应用程序、网页及合作伙伴渠道录入行程预约。
  BC-3490.20.20:
    name: 行程匹配与调度
    description: |
      将乘客与车辆或司机匹配并调度确认行程。
  BC-3490.20.30:
    name: 行程生命周期管理
    description: |
      管理进行中行程的全生命周期，包括取消、改道及完成。
  BC-3490.30:
    name: 共享车队运营
    description: |
      共享车队的运营处理，包括再平衡、现场服务及损坏管控。
    in_scope:
      - 跨区域和站点的车辆再平衡
      - 路边清洁、充电及加油
      - 共享车辆损坏与丢失管理
    out_of_scope:
      - 通用企业车队资产核算（BC-2430）
      - 电动车充电站运营（BC-3480）
  BC-3490.30.10:
    name: 车辆再平衡运营
    description: |
      在区域、站点及需求热点之间再平衡共享车辆。
  BC-3490.30.20:
    name: 车辆清洁与充电协调
    description: |
      协调现场车辆清洁、充电及加油活动。
  BC-3490.30.30:
    name: 车辆损坏与丢失管理
    description: |
      管理共享车辆的损坏评估、维修安排及损失追偿。
  BC-3490.40:
    name: 司机与服务商运营
    description: |
      司机和其他服务商的引导、合规、结算及绩效管理。
  BC-3490.40.10:
    name: 司机引导与合规
    description: |
      开展司机引导，包括驾照核查、背景调查及持续合规管理。
  BC-3490.40.20:
    name: 司机收益与结算
    description: |
      计算并支付司机收益、小费及激励奖励。
  BC-3490.40.30:
    name: 司机绩效管理
    description: |
      管理司机绩效，包括评分、辅导及停用处理。
  BC-3490.50:
    name: 乘客运营
    description: |
      出行服务乘客和最终客户的引导、支持及信任安全运营。
  BC-3490.50.10:
    name: 乘客引导与身份认证
    description: |
      开展乘客引导，包括身份核验、支付方式绑定及同意确认。
  BC-3490.50.20:
    name: 乘客支持运营
    description: |
      为乘客提供行程前、行程中及行程后全程支持。
  BC-3490.50.30:
    name: 乘客安全与信任管理
    description: |
      开展信任与安全运营，包括事件处理、滥用预防及安全功能保障。
  BC-3490.60:
    name: 动态定价与需求管理
    description: |
      出行服务的需求预测及动态定价、峰时溢价和促销引擎的运营。
  BC-3490.60.10:
    name: 需求预测
    description: |
      按区域、时段及服务类型开展短期需求预测。
  BC-3490.60.20:
    name: 动态定价引擎运营
    description: |
      运营动态定价与峰时溢价引擎，包括价格护栏与审计。
  BC-3490.60.30:
    name: 促销与激励运营
    description: |
      跨活动运营乘客和司机促销及激励计划。
  BC-3490.70:
    name: 多模式聚合与合作伙伴运营
    description: |
      MaaS合作伙伴聚合、多模式行程组合及跨出行合作伙伴的运营商间结算。
  BC-3490.70.10:
    name: MaaS合作伙伴引导
    description: |
      将公共交通、网约车及微出行合作伙伴引入MaaS平台。
  BC-3490.70.20:
    name: 多模式行程组合
    description: |
      组合公共交通与按需出行的多模式行程。
  BC-3490.70.30:
    name: 运营商间结算
    description: |
      结算MaaS聚合商与底层出行运营商之间的收入与费用。
  BC-3490.80:
    name: 出行监管与城市运营
    description: |
      与城市和监管机构在许可证、数据共享及路缘/停车运营方面的沟通协作。
  BC-3490.80.10:
    name: 城市许可与授权管理
    description: |
      跨司法管辖区管理城市运营许可证、车辆数量上限及授权。
  BC-3490.80.20:
    name: 向城市共享运营数据
    description: |
      依据MDS、GBFS及同等规范与城市共享运营数据。
  BC-3490.80.30:
    name: 路缘与停车协调
    description: |
      与城市主管部门协调路缘使用权、停车及候客区。

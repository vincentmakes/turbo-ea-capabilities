locale: zh-Hans
source: L1-electricity-distribution-operations-management.yaml
entries:
  BC-3820:
    name: 配电运营管理
    description: |
      运营中低压配电网，涵盖控制中心调度、故障响应与恢复、倒闸操作、一次和二次变电站运营，以及向终端客户供电的现场班组协调。
  BC-3820.10:
    name: 配电控制运营
    description: |
      利用配电管理系统/停电管理系统/ADMS、态势感知和潮流分析，对配电网进行全天候控制中心运营。
  BC-3820.10.10:
    name: ADMS运营
    description: |
      运营高级配电管理系统 (ADMS) 进行监控。
  BC-3820.10.20:
    name: 配电SCADA运营
    description: |
      对配电馈线和开关进行实时SCADA采集和控制。
  BC-3820.10.30:
    name: 网络拓扑管理
    description: |
      在控制系统中维护运行中的网络拓扑结构。
  BC-3820.20:
    name: 倒闸与恢复运营
    description: |
      在计划性和非计划停电后进行网络重构和供电恢复，包括基于FLISR的自愈操作。
  BC-3820.20.10:
    name: 倒闸方案执行
    description: |
      经授权执行配电倒闸方案。
  BC-3820.20.20:
    name: 故障定位、隔离与供电恢复
    description: |
      基于FLISR对故障馈线实施检测、隔离和供电恢复。
  BC-3820.20.30:
    name: 反馈电与孤岛协调
    description: |
      协调馈线反馈电和有意孤岛运行以实现恢复供电。
  BC-3820.30:
    name: 故障响应运营
    description: |
      从检测到现场修复和客户通知，对配电网故障进行端到端响应。
    in_scope:
      - 故障检测与巡线
      - 向故障抢修工单分配班组
      - 向客户发送停电通知
    out_of_scope:
      - 分布式能源相关停电处置（BC-3840）
      - 批发发电停电（BC-3800.10）
  BC-3820.30.10:
    name: 故障分类
    description: |
      对来自现场、客户和遥测的故障报告进行分类处理。
  BC-3820.30.20:
    name: 现场故障巡线
    description: |
      对架空线路和地下资产开展现场巡线以定位并确认故障。
  BC-3820.30.30:
    name: 停电恢复追踪
    description: |
      追踪停电恢复进度和客户停电分钟数统计。
  BC-3820.30.40:
    name: 重大事件响应
    description: |
      应对风暴及重大事件的配电响应，包括互助班组协调。
  BC-3820.40:
    name: 现场班组调度运营
    description: |
      调度、路由和支持配电现场班组处理故障、计划工作及客户工单。
  BC-3820.40.10:
    name: 班组排班
    description: |
      编制班组日常排班和应急轮值安排。
  BC-3820.40.20:
    name: 工单派发与路由
    description: |
      通过工作管理系统向现场班组派发并路由工单。
  BC-3820.40.30:
    name: 现场工单收尾
    description: |
      在工单收尾时采集竣工变更记录、材料消耗及工时信息。
  BC-3820.50:
    name: 配电资产巡检运营
    description: |
      对架空线路、电杆、地下电缆及配电变电站进行例行和状态驱动巡检。
  BC-3820.50.10:
    name: 电杆与架空线路巡检
    description: |
      对电杆和架空线路进行周期性巡检，包括红外热像调查。
  BC-3820.50.20:
    name: 地下网络巡检
    description: |
      对地下馈线、连接箱和电缆接头进行巡检和状态评估。
  BC-3820.50.30:
    name: 配电变电站巡检
    description: |
      对主变电站、二次变电站和客户变电站进行例行巡检。
  BC-3820.60:
    name: 植被与线路走廊管理
    description: |
      对配电线路进行植被清除和线路走廊维护，管理停电风险和法定间距。
  BC-3820.60.10:
    name: 植被周期规划
    description: |
      对配电线路植被工作进行周期性和基于风险的排程规划。
  BC-3820.60.20:
    name: 植被现场运营
    description: |
      现场执行修剪、砍伐和除草剂喷洒作业。
  BC-3820.60.30:
    name: 山火风险缓解运营
    description: |
      在山火风险区域实施PSPS（预防性断电）、快速跳闸和线路加固运营。
  BC-3820.70:
    name: 新接入运营
    description: |
      为家庭、商业及工业客户和开发商提供新建和变更电力接入服务。
  BC-3820.70.10:
    name: 接入申请评估
    description: |
      对新接入申请进行技术评估，核查容量可用性。
  BC-3820.70.20:
    name: 接入设计
    description: |
      完成详细接入设计、接入点选定及增强需求确定。
  BC-3820.70.30:
    name: 接入调试
    description: |
      对新接入工程进行调试和送电验收。
  BC-3820.80:
    name: 电能质量管理
    description: |
      监测和整改配电电压水平、闪变、谐波及客户电能质量投诉。
  BC-3820.80.10:
    name: 电压监测
    description: |
      监测馈线电压分布，确保符合法定限值。
  BC-3820.80.20:
    name: 谐波与闪变监测
    description: |
      对网络谐波畸变和电压闪变进行监测。
  BC-3820.80.30:
    name: 客户电能质量调查
    description: |
      调查和整改客户报告的电能质量问题。

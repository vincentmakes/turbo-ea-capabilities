locale: zh-Hans
source: L1-banking-customer-management.yaml
entries:
  BC-1300:
    name: 银行客户管理
    description: |
      负责银行客户的入网开户、了解客户（KYC）/尽职调查（CDD）、日常服务及渠道访问管理，构建全面的客户关系运营能力。
  BC-1300.10:
    name: 客户入网管理
    description: |
      开展账户开立、身份核验和账户激活，高效、合规地完成新客户入网。
  BC-1300.10.10:
    name: 申请信息采集
    description: |
      采集新客户和账户申请的基础信息，启动入网流程。
  BC-1300.10.20:
    name: 身份核验
    description: |
      开展包括证件审核和生物识别在内的身份核验，确认客户真实身份。
  BC-1300.10.30:
    name: 账户设立与激活
    description: |
      完成账户、产品设立及渠道访问激活，使客户正式开始使用银行服务。
  BC-1300.10.40:
    name: 入网状态通知
    description: |
      向客户通报入网状态和后续步骤，提升客户入网体验。
  BC-1300.20:
    name: KYC 与客户尽职调查管理
    description: |
      开展 KYC、一般尽职调查（CDD）、加强尽职调查（EDD）、定期复审及政治公众人物（PEP）筛查，管控客户层面的合规风险。
  BC-1300.20.10:
    name: 客户风险评级
    description: |
      依据反洗钱风险因素对客户进行风险评级，分层管理客户合规风险。
  BC-1300.20.20:
    name: KYC 文件收集
    description: |
      收集并核验 KYC 文件，确保客户身份信息的合规完整。
  BC-1300.20.30:
    name: 制裁与 PEP 筛查
    description: |
      对客户开展制裁名单、PEP 及负面媒体筛查，识别潜在合规风险。
  BC-1300.20.40:
    name: 加强尽职调查
    description: |
      对高风险客户和复杂业务结构开展加强尽职调查，深度了解客户风险状况。
  BC-1300.20.50:
    name: KYC 定期复审
    description: |
      定期复审和更新客户 KYC 信息，保持客户档案的时效性和准确性。
  BC-1300.30:
    name: 客户服务管理
    description: |
      处理日常服务请求和账户维护工作，满足客户的持续服务需求。
  BC-1300.30.10:
    name: 账户维护
    description: |
      维护账户信息，包括额度、签章授权和地址变更等。
  BC-1300.30.20:
    name: 服务请求处理
    description: |
      处理客户服务请求和指令，及时响应客户需求。
  BC-1300.30.30:
    name: 对账单与文件提供
    description: |
      向客户提供对账单、证明书和其他客户文件。
  BC-1300.30.40:
    name: 客户离网管理
    description: |
      开展客户离网程序和关闭客户关系，规范处理客户账户注销。
  BC-1300.40:
    name: 客户信息管理
    description: |
      管理客户数据、同意授权、偏好设置和黄金记录，确保客户信息的准确一致。
  BC-1300.40.10:
    name: 客户档案维护
    description: |
      维护客户档案和人口统计数据，保持客户基础信息的完整性。
  BC-1300.40.20:
    name: 实际受益人管理
    description: |
      采集并维护实际受益人信息，满足反洗钱合规要求。
  BC-1300.40.30:
    name: 客户同意管理
    description: |
      采集并执行营销和数据共享同意授权，保障客户隐私权益。
  BC-1300.40.40:
    name: 客户黄金记录管理
    description: |
      跨系统维护客户黄金记录，确保全行客户视图的统一一致。
  BC-1300.50:
    name: 银行渠道管理
    description: |
      运营网点、ATM、网银、移动银行和电话银行渠道，提供全渠道的客户服务能力。
  BC-1300.50.10:
    name: 网点渠道运营
    description: |
      运营实体网点渠道和柜员服务，为客户提供面对面的银行服务。
  BC-1300.50.20:
    name: ATM 与自助设备运营
    description: |
      运营 ATM、自助终端和自助设备机群，满足客户自助服务需求。
  BC-1300.50.30:
    name: 数字渠道运营
    description: |
      运营网银和手机银行渠道，提供便捷的线上金融服务。
  BC-1300.50.40:
    name: 电话银行渠道运营
    description: |
      运营电话银行渠道和声纹认证，提供远程语音服务。
  BC-1300.50.50:
    name: 开放银行与 API 渠道运营
    description: |
      运营开放银行 API 和第三方访问接口，支持金融生态合作。

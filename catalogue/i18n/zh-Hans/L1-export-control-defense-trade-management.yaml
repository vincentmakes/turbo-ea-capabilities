source: L1-export-control-defense-trade-management.yaml
entries:
  BC-1790:
    name: 出口管制与国防贸易管理
    description: |
      覆盖出口许可证管理、ITAR/EAR合规、技术转让控制与境外披露，确保国防贸易全面合规。
  BC-1790.10:
    name: 出口许可证管理
    description: |
      统筹ITAR、EAR许可证申请与条件合规，确保出口活动依法合规开展。
  BC-1790.10.10:
    name: 出口管辖权与分类
    description: |
      对物项开展ITAR/EAR管辖权认定与ECCN分类。
  BC-1790.10.20:
    name: 出口许可证申请
    description: |
      申请ITAR DSP许可证与EAR BIS许可证。
  BC-1790.10.30:
    name: 许可证条件合规
    description: |
      追踪并确保遵守许可证附加条件与规定。
  BC-1790.10.40:
    name: 许可证使用报告
    description: |
      定期报告已获批许可证的使用情况。
  BC-1790.20:
    name: 贸易合规筛查管理
    description: |
      统筹制裁、拒绝交易方与禁运筛查，防范贸易合规风险。
  BC-1790.20.10:
    name: 拒绝交易方筛查
    description: |
      对照拒绝交易方与受限方名单开展筛查。
  BC-1790.20.20:
    name: 制裁国家筛查
    description: |
      开展制裁与禁运国家筛查。
  BC-1790.20.30:
    name: 受限最终用途筛查
    description: |
      开展最终用途与最终用户尽职调查筛查。
  BC-1790.30:
    name: 技术转让控制管理
    description: |
      统筹受控技术发布、技术援助协议管理，确保敏感技术信息安全流转。
  BC-1790.30.10:
    name: 技术数据发布控制
    description: |
      对受控技术数据的发布实施管控。
  BC-1790.30.20:
    name: 技术援助协议管理
    description: |
      管理TAA、MLA与仓储协议。
  BC-1790.30.30:
    name: 视同出口管理
    description: |
      管理向外籍人员的视同出口事宜。
  BC-1790.40:
    name: 海关与关税合规管理
    description: |
      统筹国防物品的海关通关、ATA单证册与进出口文件管理。
  BC-1790.40.10:
    name: 国防海关操作
    description: |
      处理国防物品的专项海关通关事务。
  BC-1790.40.20:
    name: ATA单证册管理
    description: |
      管理国防物品临时出口的ATA单证册。
  BC-1790.40.30:
    name: 税则分类与估价
    description: |
      开展HS税则归类与海关估价。
  BC-1790.50:
    name: 境外披露管理
    description: |
      统筹境外披露决策、可发布性标注与受控信息的发布授权。
  BC-1790.50.10:
    name: 境外披露决策
    description: |
      对受控信息的境外披露作出决策。
  BC-1790.50.20:
    name: 可发布性标注
    description: |
      对文件实施可发布性标注与传发控制。
  BC-1790.50.30:
    name: 境外来访人员管控
    description: |
      对境外来访人员实施访问管控与访问请求审批。

locale: zh-Hans
source: L1-real-estate-investment-management.yaml
entries:
  BC-4910:
    name: 房地产投资管理
    description: |
      投资机构和基金层面的战略制定、资本募集、项目管道、决策治理、房产组合构建、投资人关系及房地产投资载体（包括REIT、非上市基金、独立账户及合资项目）的基金级绩效管理。
    in_scope:
      - 基金/委托定义与投资政策
      - 资本募集、基金组建与认购
      - 直接及间接渠道的投资管道与交易来源拓展
      - 投资委员会治理与审批条件
      - 房产组合构建、配置与再平衡
      - LP报告、资本催缴、分配及INREV/NCREIF/EPRA提交
      - NAV计算、绩效归因及瀑布计算
    out_of_scope:
      - 单项资产商业计划与资本支出（BC-4920）
      - 收购与处置交易执行（BC-4930）
      - 债权和股权资本市场执行（BC-4980）
      - 通用企业资金管理和投资人关系（BC-210、BC-240）
  BC-4910.10:
    name: 投资战略与委托管理
    description: |
      定义并维护所管理载体的投资战略、基金委托、行业/地域目标及风险收益目标。
  BC-4910.10.10:
    name: 基金/委托定义
    description: |
      定义基金或独立账户委托，包括行业、地域、风格及约束条件。
  BC-4910.10.20:
    name: 行业与地域配置
    description: |
      跨载体设定并调整行业和地域配置目标。
  BC-4910.10.30:
    name: 风险收益目标设定
    description: |
      按风格箱（核心、核心增益、增值、机会型）和基准设定风险收益目标。
  BC-4910.10.40:
    name: 投资政策维护
    description: |
      维护投资政策声明、例外情况及投资人同意事项。
  BC-4910.20:
    name: 资本募集与基金组建
    description: |
      组建投资载体并募集投资人资本，包括结构设计、营销及完成募集。
  BC-4910.20.10:
    name: 基金结构设计与载体设立
    description: |
      设计并设立基金载体、馈入基金、阻隔架构及税务优化持有结构。
  BC-4910.20.20:
    name: 投资人定向与认购
    description: |
      定向目标投资人群体，处理尽职调查回复及认购事务。
  BC-4910.20.30:
    name: 基金关闭管理
    description: |
      管理首次、中间及最终关闭，包括后期投资人均摊计算。
  BC-4910.20.40:
    name: 跟投与附属载体管理
    description: |
      开发并管理跟投机会和附属载体。
  BC-4910.30:
    name: 投资管道与交易来源拓展
    description: |
      跨直接收购、间接权益和合资渠道开发和筛选基金投资机会。
  BC-4910.30.10:
    name: 直接交易开发
    description: |
      开发符合委托要求的直接资产和房产组合投资机会。
  BC-4910.30.20:
    name: 间接及跟投来源拓展
    description: |
      来源拓展间接权益，包括二手权益、基金份额和跟投机会。
  BC-4910.30.30:
    name: 管道节奏与配置
    description: |
      按基金部署计划安排管道节奏，并跨载体进行配置。
  BC-4910.40:
    name: 投资决策与审批管理
    description: |
      投资委员会治理、审批流程及新投资审批条件跟踪。
  BC-4910.40.10:
    name: 投资备忘录编制
    description: |
      编制涵盖投资逻辑、条款和风险的委员会审查投资备忘录。
  BC-4910.40.20:
    name: 投资委员会治理
    description: |
      治理投资委员会流程、法定人数及决策记录。
  BC-4910.40.30:
    name: 审批条件跟踪
    description: |
      跟踪投资审批所附前提条件和后续条件的满足情况。
  BC-4910.50:
    name: 房产组合构建与配置
    description: |
      依据委托、杠杆及风险目标构建并持续再平衡基金房产组合。
  BC-4910.50.10:
    name: 房产组合建模
    description: |
      对房产组合构成、年份分散化及预期绩效进行建模。
  BC-4910.50.20:
    name: 行业与地域再平衡
    description: |
      通过收购和处置对房产组合行业和地域结构进行再平衡。
  BC-4910.50.30:
    name: 杠杆与对冲目标
    description: |
      制定并监控房产组合杠杆及外汇/利率对冲政策目标。
  BC-4910.60:
    name: 投资人关系与报告
    description: |
      与有限合伙人和上市投资人沟通，执行资本催缴和分配，并向行业指数提交数据。
  BC-4910.60.10:
    name: 资本催缴与分配
    description: |
      发出资本催缴通知并执行分配，包括本金归还。
  BC-4910.60.20:
    name: LP报告与信息披露
    description: |
      向有限合伙人提交涵盖绩效、NAV及披露事项的季度和年度报告。
  BC-4910.60.30:
    name: 指数与基准提交
    description: |
      向NCREIF、INREV、EPRA及地区基准提交绩效可比数据。
  BC-4910.60.40:
    name: 年度投资人会议
    description: |
      举办年度投资人会议、顾问委员会及投资人日活动。
  BC-4910.70:
    name: 基金绩效与NAV管理
    description: |
      计算基金NAV、绩效归因，以及管理费/绩效费瀑布，包括超额收益结算。
  BC-4910.70.10:
    name: NAV与单位定价
    description: |
      按定期估值周期计算基金NAV和单位定价。
  BC-4910.70.20:
    name: 绩效归因
    description: |
      对基金绩效按资产、行业、地域及货币贡献进行归因分析。
  BC-4910.70.30:
    name: 费用与超额收益计算
    description: |
      依据有限合伙协议经济条款计算管理费和超额收益。
  BC-4910.70.40:
    name: 优先回报与瀑布计算
    description: |
      为各载体计算优先回报门槛和分配瀑布。

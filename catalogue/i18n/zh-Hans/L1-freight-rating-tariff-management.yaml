locale: zh-Hans
source: L1-freight-rating-tariff-management.yaml
entries:
  BC-2520:
    name: 运价制定与运费表管理
    description: |
      定义并运营货运运价、运费表、合同定价、即期定价、附加费，以及为货物运输计价的运价引擎。
  BC-2520.10:
    name: 运费表与基础运价管理
    description: |
      定义、发布并对公开运费表和基础运价表进行版本管理。
    in_scope:
      - 按线路及单元定义基础运价表
      - 有要求时进行公开运费表备案
    out_of_scope:
      - 货代情境下的面向客户报价（BC-2450.10）
      - 通用企业定价方法（BC-440）
  BC-2520.10.10:
    name: 基础运价定义
    description: |
      按线路、单元及服务层级定义基础货运运价。
  BC-2520.10.20:
    name: 公开运费表备案
    description: |
      在有要求的情况下向监管机构及运价协议组织备案公开运费表。
  BC-2520.10.30:
    name: 运价表版本管理
    description: |
      对运价表进行版本控制及有效日期管理。
  BC-2520.20:
    name: 合同运价管理
    description: |
      建立并维护与指定客户签订的协议合同运价及数量承诺。
  BC-2520.20.10:
    name: 合同运价设置
    description: |
      按指定客户合同设置协商运价。
  BC-2520.20.20:
    name: 数量承诺追踪
    description: |
      追踪客户数量承诺及最低数量目标完成情况。
  BC-2520.20.30:
    name: 合同运价续签
    description: |
      续签并重新谈判到期合同运价。
  BC-2520.30:
    name: 即期运价管理
    description: |
      对即期市场货运运价进行定价、受理及基准对比。
  BC-2520.30.10:
    name: 即期运价报价
    description: |
      按批次货物提供即期市场运价报价。
  BC-2520.30.20:
    name: 即期运价受理
    description: |
      受理并确认即期运价订舱。
  BC-2520.30.30:
    name: 即期运价指数基准对比
    description: |
      将即期运价与市场指数进行基准对比。
  BC-2520.40:
    name: 附加费与附加收费管理
    description: |
      定义并应用附加费、附加收费、滞期费及超期使用费运费表。
  BC-2520.40.10:
    name: 燃油附加费管理
    description: |
      定义并应用燃油及船用燃油附加费。
  BC-2520.40.20:
    name: 附加费定义
    description: |
      定义等候、特殊操作及设备等附加费项目。
  BC-2520.40.30:
    name: 滞期费与超期使用费运费表
    description: |
      定义设备及港口终端使用的滞期费与超期使用费运费表。
  BC-2520.50:
    name: 运价引擎运营管理
    description: |
      运营跨订单和货物计算并验证货运费用的运价引擎。
  BC-2520.50.10:
    name: 运价计算执行
    description: |
      跨订单及货物执行运价计算。
  BC-2520.50.20:
    name: 运价表分发
    description: |
      向客户、合作伙伴及渠道分发运价表。
  BC-2520.50.30:
    name: 运价审计与验证
    description: |
      对照合同及运费表基准验证已应用的运价。

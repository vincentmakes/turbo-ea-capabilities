locale: zh-Hans
source: L1-route-charges-management.yaml
entries:
  BC-1270:
    name: 航路收费管理
    description: |
      负责空中导航费用的计算、账单生成和向空域用户的收费回收，保障空管服务的财务可持续性。
  BC-1270.10:
    name: 收费区域管理
    description: |
      定义收费区域、账单规则及单价费率，为航路收费提供合规的计费框架。
  BC-1270.10.10:
    name: 收费区域定义
    description: |
      定义航路和终端收费区域的范围，明确不同区域的计费适用规则。
  BC-1270.10.20:
    name: 单价计算
    description: |
      计算和审批各收费区域的单价费率，确保费率设定符合监管要求。
  BC-1270.10.30:
    name: 收费规则管理
    description: |
      维护收费公式和豁免规则，确保计费逻辑的一致性和准确性。
  BC-1270.20:
    name: 航路费用计算管理
    description: |
      基于飞行数据计算各航班的航路费用，实现精准计费。
  BC-1270.20.10:
    name: 计费飞行数据采集
    description: |
      采集用于计费引擎的飞行数据输入，确保计费数据的完整性。
  BC-1270.20.20:
    name: 距离与重量计算
    description: |
      计算可收费距离和重量因子，为费用计算提供准确的基础参数。
  BC-1270.20.30:
    name: 费用计算
    description: |
      将单价费率应用于计费参数，得出每个航班的航路费用。
  BC-1270.30:
    name: 费用征收管理
    description: |
      负责发票开具、费用征收、付款处理及催缴，确保应收费用的及时回收。
  BC-1270.30.10:
    name: 费用开票
    description: |
      生成月度航路费用发票，向空域用户发出收费账单。
  BC-1270.30.20:
    name: 付款处理
    description: |
      接收和处理空域用户的付款，更新账户余额。
  BC-1270.30.30:
    name: 催缴与欠款处理
    description: |
      对逾期未付费用进行催缴、收欠和强制执行，保障收费回收率。
  BC-1270.40:
    name: 航空公司账户管理
    description: |
      管理空域用户账户、对账单及争议处理，维护良好的客户账务关系。
  BC-1270.40.10:
    name: 空域用户账户维护
    description: |
      维护空域用户账户主数据，确保账户信息的准确性和完整性。
  BC-1270.40.20:
    name: 对账单与报告提供
    description: |
      向用户提供对账单和账户报告，支持用户财务核对工作。
  BC-1270.40.30:
    name: 费用争议处理
    description: |
      处理费用争议和调整申请，维护公平的收费秩序。
  BC-1270.50:
    name: 费用报告与对账管理
    description: |
      向监管机构报告并开展类欧控风格的对账，确保收费数据的一致性和透明度。
  BC-1270.50.10:
    name: 监管机构与网络管理机构报告
    description: |
      向监管机构和欧控等效网络管理机构提交收费报告，满足监管合规要求。
  BC-1270.50.20:
    name: 费用对账
    description: |
      对飞行数据与费用计算结果进行对账，确保计费数据的一致性。
  BC-1270.50.30:
    name: 成本回收监控
    description: |
      监控实际成本回收情况与批复成本基础的对比，支持费率设定的周期性评审。

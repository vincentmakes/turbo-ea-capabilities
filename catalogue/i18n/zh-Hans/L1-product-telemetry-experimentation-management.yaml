locale: zh-Hans
source: L1-product-telemetry-experimentation-management.yaml
entries:
  BC-4280:
    name: 产品遥测与实验管理
    description: |
      管理产品使用遥测数据的采集、治理和分析，以及指导产品决策的功能实验的设计和执行。
  BC-4280.10:
    name: 产品遥测埋点
    description: |
      按定义的事件规范从客户端和服务端运行时采集产品使用事件。
  BC-4280.10.10:
    name: 事件规范定义
    description: |
      定义包含必选和可选属性的产品事件规范。
  BC-4280.10.20:
    name: 客户端遥测埋点
    description: |
      对客户端运行时进行埋点，使其能够发出产品事件。
  BC-4280.10.30:
    name: 服务端遥测埋点
    description: |
      对服务端运行时进行埋点，使其能够发出产品事件。
  BC-4280.20:
    name: 遥测质量与治理
    description: |
      对产品遥测数据进行规范治理、流水线质量监控及隐私过滤。
  BC-4280.20.10:
    name: 遥测规范治理
    description: |
      跨产品界面治理产品事件规范。
  BC-4280.20.20:
    name: 遥测流水线质量监控
    description: |
      监控遥测流水线的正确性、完整性及时效性。
  BC-4280.20.30:
    name: 遥测隐私过滤
    description: |
      按隐私承诺对遥测数据进行过滤、脱敏及最小化处理。
  BC-4280.30:
    name: 产品使用分析
    description: |
      提供产品使用的分析视图，包括漏斗分析、留存同期群及功能互动分析。
  BC-4280.30.10:
    name: 漏斗分析
    description: |
      分析产品旅程中的转化和流失漏斗。
  BC-4280.30.20:
    name: 留存同期群分析
    description: |
      基于同期群分析用户随时间的留存情况。
  BC-4280.30.30:
    name: 功能互动报告
    description: |
      报告整个用户群对特定功能的互动情况。
  BC-4280.40:
    name: 实验项目管理
    description: |
      管理推动产品决策的实验的方法论、设计评审及裁决。
  BC-4280.40.10:
    name: 实验方法论标准
    description: |
      制定跨产品团队的有效实验方法论标准。
  BC-4280.40.20:
    name: 实验设计评审
    description: |
      按方法论和伦理标准评审实验设计。
  BC-4280.40.30:
    name: 实验结果裁决
    description: |
      裁决实验结果并做出相应产品决策。
  BC-4280.50:
    name: A/B测试执行
    description: |
      配置、定向并监控运行中的A/B测试和多变量测试。
  BC-4280.50.10:
    name: 实验配置
    description: |
      配置实验变体和分配规则。
  BC-4280.50.20:
    name: 实验定向
    description: |
      将实验同期群定向至适当受众。
  BC-4280.50.30:
    name: 实验监控
    description: |
      监控运行中的实验，关注护栏指标和提前停止条件。
  BC-4280.60:
    name: 客户洞察综合
    description: |
      将定量和定性信号综合为产品决策和决策备忘录。
  BC-4280.60.10:
    name: 定量洞察综合
    description: |
      综合来自遥测和实验的定量发现。
  BC-4280.60.20:
    name: 定性洞察综合
    description: |
      将定性研究发现综合为产品洞察。
  BC-4280.60.30:
    name: 决策备忘录编写
    description: |
      编写记录证据、选择及推理过程的决策备忘录。
metadata:

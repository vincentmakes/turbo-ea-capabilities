locale: zh-Hans
source: L1-agri-food-compliance-certification-management.yaml
entries:
  BC-3590:
    name: 农食品合规与认证管理
    description: |
      行业特定的合规与认证计划——农场保障体系、有机认证、动物福利认证、地理标志、MRL符合性、牲畜标识及产前溯源记录，区别于通用合规和质量管理。
  BC-3590.10:
    name: 农场保障认证管理
    description: |
      管理农场保障认证计划，包括GlobalG.A.P.、LEAF Marque及同等国家体系。
    in_scope:
      - GlobalG.A.P.及同等农场保障体系
      - LEAF Marque参与
      - 审核协调与纠正措施
    out_of_scope:
      - 通用质量管理（BC-720）
      - 零售侧食品安全计划（BC-2380.10）
  BC-3590.10.10:
    name: GlobalG.A.P.认证计划
    description: |
      管理GlobalG.A.P. IFA、水产养殖及牲畜认证。
  BC-3590.10.20:
    name: LEAF Marque及同等计划
    description: |
      参与LEAF Marque及同等国家保障体系。
  BC-3590.10.30:
    name: 农场保障审核协调
    description: |
      协调农场保障审核及纠正措施跟踪。
  BC-3590.20:
    name: 有机认证管理
    description: |
      依据USDA NOP、EU有机法规、JAS有机及同等体系管理有机认证。
  BC-3590.20.10:
    name: 有机标准符合性记录
    description: |
      记录符合适用有机标准的证据。
  BC-3590.20.20:
    name: 有机检查协调
    description: |
      协调有机认证检查和审核。
  BC-3590.20.30:
    name: 有机投入品授权
    description: |
      核实投入品是否获得适用有机标准的授权。
  BC-3590.30:
    name: 动物福利认证管理
    description: |
      动物福利审核计划、福利结果记录及行业和保障福利标准的符合性。
  BC-3590.30.10:
    name: 动物福利审核计划
    description: |
      内部和第三方动物福利审核计划。
  BC-3590.30.20:
    name: 福利结果记录
    description: |
      记录跨牲畜单元的福利结果指标。
  BC-3590.30.30:
    name: 福利标准符合性
    description: |
      行业和保障福利标准的符合性证据。
  BC-3590.40:
    name: 地理标志与产地管理
    description: |
      支持原产地名称保护、地理标志及产地声明的记录与验证。
  BC-3590.40.10:
    name: 产地声明记录
    description: |
      记录证明产地、品种及出处声明的证据。
  BC-3590.40.20:
    name: 地理标志符合性
    description: |
      符合PDO、PGI及同等地理标志的要求。
  BC-3590.40.30:
    name: 产地验证
    description: |
      通过文件、同位素和DNA方法开展产地验证。
  BC-3590.50:
    name: 农药残留与MRL管理
    description: |
      跨目的地市场开展残留取样、MRL符合性及休药期合规管理。
  BC-3590.50.10:
    name: 残留抽样计划
    description: |
      跨作物和批次的农药残留抽样计划。
  BC-3590.50.20:
    name: MRL符合性监控
    description: |
      依据目的地市场MRL清单开展符合性监控。
  BC-3590.50.30:
    name: 休药期合规
    description: |
      遵守采前和牛奶休药间隔期要求。
  BC-3590.60:
    name: 牲畜标识与转运合规
    description: |
      牲畜和水产养殖种群的动物标识、转运许可及跨境健康证书管理。
    in_scope:
      - 法定动物标识
      - 转运许可记录
      - 跨境健康证书
    out_of_scope:
      - 通用合规管理（BC-130）
  BC-3590.60.10:
    name: 动物标识耳标
    description: |
      法定动物标识耳标，包括EID和耳标。
  BC-3590.60.20:
    name: 转运许可记录
    description: |
      记录法定转运许可和农场转运台账。
  BC-3590.60.30:
    name: 跨境健康证书
    description: |
      跨境健康证书，包括TRACES NT申报。
  BC-3590.70:
    name: 产前溯源记录
    description: |
      锚定下游EPCIS和监管链溯源的地块至批次、动物至胴体及投入品至产出品溯源记录。
  BC-3590.70.10:
    name: 地块至批次溯源
    description: |
      将田间作业与收获批次挂钩的溯源记录。
  BC-3590.70.20:
    name: 动物至胴体溯源
    description: |
      将个体动物与胴体和主要切块挂钩的溯源记录。
  BC-3590.70.30:
    name: 投入品至产出品溯源记录
    description: |
      记录施用投入品与相应产出批次的关联。

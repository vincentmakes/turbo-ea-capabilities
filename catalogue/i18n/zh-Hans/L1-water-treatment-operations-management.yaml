locale: zh-Hans
source: L1-water-treatment-operations-management.yaml
entries:
  BC-3870:
    name: 水处理运营管理
    description: |
      按照饮用水法规和世卫组织水安全计划原则，在水处理厂生产饮用水，涵盖工艺运营、饮用水水质保障、处理药剂管理、净水储存及处理残余物处置。
  BC-3870.10:
    name: 水处理厂运营
    description: |
      按规格和需求量运营饮用水处理厂，稳定输出合格净水。
  BC-3870.10.10:
    name: 水处理厂班组运营
    description: |
      对常规和膜处理工艺的水处理厂进行班组值守运营。
  BC-3870.10.20:
    name: 处理产水排程
    description: |
      按配水需求和储水状态安排处理产水量。
  BC-3870.10.30:
    name: 水处理厂绩效报告
    description: |
      报告水处理厂产水量、能耗和绩效指标。
  BC-3870.20:
    name: 水处理过程控制
    description: |
      依据在线水质监测，对混凝、过滤、消毒和深度处理等单元工艺进行过程控制。
  BC-3870.20.10:
    name: 混凝与澄清控制
    description: |
      控制混凝剂投加、絮凝及澄清池运行效果。
  BC-3870.20.20:
    name: 过滤过程控制
    description: |
      控制快速重力过滤、慢速砂滤和膜过滤工艺步骤。
  BC-3870.20.30:
    name: 消毒过程控制
    description: |
      控制加氯消毒、紫外线、臭氧及深度消毒工艺。
  BC-3870.20.40:
    name: 深度处理过程控制
    description: |
      控制活性炭吸附（GAC）、离子交换和高级氧化工艺步骤。
  BC-3870.30:
    name: 饮用水水质运营
    description: |
      对饮用水水质合规情况进行采样、实验室分析、在线监测和监管报告。
    in_scope:
      - 法定饮用水采样
      - 微生物和化学指标实验室分析
      - 饮用水水质事件响应
    out_of_scope:
      - 配水管网水质（BC-3880.50）
      - 废水出水水质（BC-3890.70）
  BC-3870.30.10:
    name: 法定采样计划
    description: |
      在水处理厂和供水点实施法定饮用水采样计划。
  BC-3870.30.20:
    name: 净水在线监测
    description: |
      对净水浊度、余氯及其他指标进行在线监测。
  BC-3870.30.30:
    name: 饮用水事件响应
    description: |
      调查和整改饮用水水质事件和超标问题。
  BC-3870.30.40:
    name: 饮用水水质报告
    description: |
      向饮用水监管机构（DWI、EPA等）进行法定报告。
  BC-3870.40:
    name: 处理药剂管理
    description: |
      对水处理药剂进行采购协调性运营管理，包括库存、投加和药剂安全处置。
  BC-3870.40.10:
    name: 药剂库存运营
    description: |
      管理水处理厂处理药剂的库存水平。
  BC-3870.40.20:
    name: 药剂投加运营
    description: |
      运营和标定处理药剂投加系统。
  BC-3870.40.30:
    name: 药剂安全处置
    description: |
      对现场处理药剂实施安全处置、COSHH及DSEAR管控。
  BC-3870.50:
    name: 净水储存运营
    description: |
      运营清水池、接触池和水塔，将净水输配至供水管网。
  BC-3870.50.10:
    name: 清水池运营
    description: |
      运营清水池，进行水位控制和水量周转管理。
  BC-3870.50.20:
    name: 接触池运营
    description: |
      运营消毒接触池，满足所需的CT值要求。
  BC-3870.50.30:
    name: 清水池检查
    description: |
      对净水储存设施进行内部检查和清洗。
  BC-3870.60:
    name: 处理残余物管理
    description: |
      运营处理产生的废物流——澄清池污泥、滤池反冲洗水及废旧滤料，并确定处置途径。
  BC-3870.60.10:
    name: 澄清池污泥运营
    description: |
      运营水处理厂的污泥浓缩和脱水设施。
  BC-3870.60.20:
    name: 滤池反冲洗水回收
    description: |
      回收并循环利用或处置滤池反冲洗水。
  BC-3870.60.30:
    name: 废旧滤料处置
    description: |
      更换和处置废旧滤料及离子交换树脂。

locale: zh-Hans
source: L1-cybersecurity-management.yaml
entries:
  BC-620:
    name: 网络安全管理
    description: |
      管理安全战略、控制措施、身份管理及威胁响应。
  BC-620.10:
    name: 安全战略与治理管理
    description: |
      管理安全战略、政策、框架及治理、风险与合规。
  BC-620.10.10:
    name: 安全战略制定
    description: |
      制定与业务风险对齐的多年期网络安全战略。
  BC-620.10.20:
    name: 安全政策与标准
    description: |
      制定符合 NIST CSF 及 ISO 27001 的安全政策与标准。
  BC-620.10.30:
    name: 安全风险管理
    description: |
      识别、评估并应对网络安全风险。
  BC-620.10.40:
    name: 安全合规管理
    description: |
      确保符合网络安全法规要求（DORA、NIS2 及行业特定法规）。
  BC-620.10.50:
    name: 安全指标与报告
    description: |
      管理安全 KPI、仪表板及董事会报告。
  BC-620.20:
    name: 身份与访问管理
    description: |
      管理 IAM、PAM、联合身份及员工入离调全流程。
  BC-620.20.10:
    name: 身份全生命周期管理
    description: |
      管理员工入职、调岗、离职流程及身份供应。
  BC-620.20.20:
    name: 访问管理与身份认证
    description: |
      管理身份认证、多因素认证、单点登录及联合身份。
  BC-620.20.30:
    name: 特权访问管理
    description: |
      管理 PAM、即时访问及特权会话监控。
  BC-620.20.40:
    name: 访问治理与重新认证
    description: |
      开展访问评审、职责分离及定期重认证。
  BC-620.20.50:
    name: 客户身份管理
    description: |
      管理外部客户、合作伙伴及消费者的 CIAM。
  BC-620.30:
    name: 威胁检测与响应管理
    description: |
      管理安全运营中心、SIEM 及事件响应。
  BC-620.30.10:
    name: 安全监控与 SIEM 运营
    description: |
      运营 SIEM、SOAR 及安全遥测监控。
  BC-620.30.20:
    name: 威胁猎取
    description: |
      开展主动式假设驱动的威胁猎取。
  BC-620.30.30:
    name: 网络威胁情报
    description: |
      收集、分析并传播网络威胁情报。
  BC-620.30.40:
    name: 网络安全事件响应
    description: |
      处理网络安全事件的检测、遏制、清除及恢复。
  BC-620.30.50:
    name: 数字取证
    description: |
      为事件处理及诉讼提供取证获取与分析支持。
  BC-620.40:
    name: 漏洞管理
    description: |
      管理漏洞扫描、补丁修复及整改。
  BC-620.40.10:
    name: 漏洞扫描
    description: |
      对整个资产范围开展认证及非认证漏洞扫描。
  BC-620.40.20:
    name: 漏洞分类与优先级排序
    description: |
      对漏洞进行基于风险的优先级排序以指导整改。
  BC-620.40.30:
    name: 补丁与整改管理
    description: |
      协调跨责任人的补丁修复及整改工作。
  BC-620.40.40:
    name: 渗透测试与红队演练
    description: |
      开展渗透测试、红队演练及对手模拟。
  BC-620.50:
    name: 安全架构管理
    description: |
      管理安全设计、安全模式及零信任架构。
  BC-620.50.10:
    name: 安全架构模式
    description: |
      制定参考安全模式及可复用控制措施。
  BC-620.50.20:
    name: 零信任架构
    description: |
      推行零信任原则、微隔离及策略执行。
  BC-620.50.30:
    name: 应用安全工程
    description: |
      推行安全设计实践、SAST、DAST 及威胁建模。
  BC-620.50.40:
    name: 云安全架构
    description: |
      制定云安全基线、云安全态势管理及云原生控制设计。
  BC-620.50.50:
    name: 密码学与密钥管理
    description: |
      管理密码标准、密钥管理及 PKI 运营。
  BC-620.60:
    name: 安全意识管理
    description: |
      管理安全意识培训、钓鱼模拟及安全文化。
  BC-620.60.10:
    name: 安全意识培训
    description: |
      开展年度及基于角色的安全意识培训。
  BC-620.60.20:
    name: 钓鱼模拟
    description: |
      开展钓鱼模拟演练及后续辅导。
  BC-620.60.30:
    name: 安全文化项目
    description: |
      推行文化变革项目及安全文化大使网络。
  BC-620.60.40:
    name: 安全沟通
    description: |
      发布安全预警、咨询及利益相关方沟通通知。
metadata:

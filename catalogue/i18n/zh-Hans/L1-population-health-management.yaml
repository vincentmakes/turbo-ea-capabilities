locale: zh-Hans
source: L1-population-health-management.yaml
entries:
  BC-2880:
    name: 人口健康管理
    description: |
      针对归属和风险人群开展风险分层、预防性护理、慢病管理、价值医疗运营、患者管理与分配管理以及人口健康分析。
  BC-2880.10:
    name: 风险分层与识别
    description: |
      通过预测建模识别风险上升和存在护理差距的人群。
  BC-2880.10.10:
    name: 预测风险建模
    description: |
      开发和运营用于成本和临床结果的预测风险模型。
  BC-2880.10.20:
    name: 风险上升患者识别
    description: |
      识别风险上升的患者，以便早期干预。
  BC-2880.10.30:
    name: 队列定义
    description: |
      为人口健康项目定义和维护临床队列。
  BC-2880.10.40:
    name: 护理差距识别
    description: |
      识别人群中循证护理差距。
  BC-2880.20:
    name: 预防性护理与健康促进
    description: |
      开展筛查、免疫接种、健康风险评估和健康指导项目。
  BC-2880.20.10:
    name: 筛查外联
    description: |
      开展循证预防筛查外联活动。
  BC-2880.20.20:
    name: 免疫接种项目
    description: |
      提供成人和儿童免疫接种项目服务。
  BC-2880.20.30:
    name: 健康风险评估
    description: |
      开展健康风险评估并进行后续随访。
  BC-2880.20.40:
    name: 健康指导
    description: |
      提供生活方式和健康指导项目服务。
  BC-2880.30:
    name: 慢病管理
    description: |
      针对主要慢性病开展疾病专项管理项目。
  BC-2880.30.10:
    name: 糖尿病护理项目
    description: |
      开展包括教育和远程监护的糖尿病管理项目。
  BC-2880.30.20:
    name: 心血管疾病项目
    description: |
      开展心血管疾病和高血压管理项目。
  BC-2880.30.30:
    name: 行为健康整合
    description: |
      将行为健康整合至初级和慢病管理。
  BC-2880.30.40:
    name: 呼吸道疾病项目
    description: |
      开展哮喘、慢性阻塞性肺疾病及呼吸道疾病管理项目。
  BC-2880.40:
    name: 价值医疗运营
    description: |
      支撑责任医疗、捆绑付款和价值医疗合同项目的运营。
  BC-2880.40.10:
    name: 责任医疗运营
    description: |
      运营责任医疗组织和共担节余项目。
  BC-2880.40.20:
    name: 捆绑付款运营
    description: |
      支撑基于诊疗周期的捆绑付款项目运营。
  BC-2880.40.30:
    name: 质量绩效追踪
    description: |
      追踪对价值医疗项目要求的质量绩效。
  BC-2880.40.40:
    name: 节余共担核对
    description: |
      与支付方核对节余共担和风险分担结算。
  BC-2880.50:
    name: 患者管理与分配管理
    description: |
      将患者分配至医务人员、管理面板规模、追踪连续性和核对归属。
  BC-2880.50.10:
    name: 患者与医务人员分配
    description: |
      将患者分配至初级保健医务人员和护理团队。
  BC-2880.50.20:
    name: 面板规模管理
    description: |
      管理面板规模、构成和容量。
  BC-2880.50.30:
    name: 护理连续性追踪
    description: |
      追踪跨面板的护理连续性指标。
  BC-2880.50.40:
    name: 归属核对
    description: |
      将支付方归属名单与内部面板数据进行核对。
  BC-2880.60:
    name: 人口健康分析与报告
    description: |
      开展覆盖健康公平、质量项目绩效、成本、利用率和结果标杆对比的人口级分析。
  BC-2880.60.10:
    name: 健康公平分析
    description: |
      分析健康差距、社会决定因素和公平结果。
  BC-2880.60.20:
    name: 质量项目报告
    description: |
      报告星级评定和质量指标等质量项目的执行情况。
  BC-2880.60.30:
    name: 成本与利用率分析
    description: |
      分析成本、利用率和可避免支出。
  BC-2880.60.40:
    name: 结果标杆对比
    description: |
      将临床结果与同类机构和全国数据集进行标杆对比。

locale: zh-Hans
source: L1-vehicle-homologation-type-approval-management.yaml
entries:
  BC-3420:
    name: 整车型式认证与型式批准管理
    description: |
      跨市场的整车及主要部件法规认证——UNECE WP.29型式批准、FMVSS自我认证、区域审批（CCC、KS、MLIT）、排放与能耗型式认证、碰撞与消费者评级项目，以及生产符合性审核。
  BC-3420.10:
    name: 型式批准策略与规划
    description: |
      跨市场型式认证策略与规划，包括与审批机构的沟通协调及型式认证计划执行。
  BC-3420.10.10:
    name: 市场审批策略
    description: |
      面向目标市场和监管体系的型式批准与认证策略。
  BC-3420.10.20:
    name: 型式认证计划管理
    description: |
      管理项目群级型式认证计划、交付物及里程碑。
  BC-3420.10.30:
    name: 审批机构沟通
    description: |
      与各司法管辖区的审批机构和技术服务机构开展沟通协调。
  BC-3420.20:
    name: 整车型式批准申报
    description: |
      针对UNECE、FMVSS及区域体系编制并提交型式批准和自我认证档案。
  BC-3420.20.10:
    name: UNECE型式批准档案管理
    description: |
      编制、提交并维护UNECE WP.29整车型式批准档案。
  BC-3420.20.20:
    name: FMVSS自我认证管理
    description: |
      管理美国FMVSS/49 CFR 571的自我认证证据。
  BC-3420.20.30:
    name: 区域申报管理
    description: |
      管理CCC、KS、MLIT、GCC及其他区域机动车审批体系的申报工作。
  BC-3420.20.40:
    name: 审批变更与延伸管理
    description: |
      管理整车全生命周期内的审批变更、延伸与修订。
  BC-3420.30:
    name: 排放与能耗型式认证
    description: |
      依据WLTP、RDE、EPA、CARB、中国及同等法规体系开展整车排放、能耗及EV续航的型式认证。
  BC-3420.30.10:
    name: 排放测试循环执行
    description: |
      执行WLTP、FTP-75、中国及其他法规性排放和燃油经济性测试循环。
  BC-3420.30.20:
    name: 实际行驶排放合规
    description: |
      开展RDE测试活动并证明在用符合性。
  BC-3420.30.30:
    name: CO2与燃油经济性报告
    description: |
      依据EU CO2车队法规、CAFE及同等法规提交CO2和燃油经济性监管报告。
  BC-3420.30.40:
    name: EV续航与能效型式认证
    description: |
      跨市场开展纯电动车续航、能耗及充电指标的型式认证。
  BC-3420.40:
    name: 碰撞与乘员安全型式认证
    description: |
      开展法规性碰撞、乘员保护及行人保护型式认证，并参与消费者评级项目。
  BC-3420.40.10:
    name: 碰撞测试项目管理
    description: |
      规划并执行法规性和型式认证碰撞测试活动。
  BC-3420.40.20:
    name: 约束系统批准
    description: |
      在各法规体系下批准安全带、气囊及儿童约束锚固装置。
  BC-3420.40.30:
    name: 行人保护批准
    description: |
      依据UNECE GTR 9及同等法规开展行人与弱势道路使用者保护型式认证。
  BC-3420.40.40:
    name: NCAP项目管理
    description: |
      管理消费者碰撞评级项目，包括Euro NCAP、IIHS、NHTSA NCAP及区域NCAP。
  BC-3420.50:
    name: 功能与网络安全审批
    description: |
      针对UN R155网络安全、UN R156软件更新及UN R157 ALKS/ADS的型式批准活动，补充整车工程管理下的工程活动。
    in_scope:
      - CSMS审核与型式批准
      - SUMS审核与型式批准
      - ALKS/ADS法规申报
    out_of_scope:
      - 网络安全工程活动（BC-3400.80）
      - 整车SOC运营（BC-3460.60）
  BC-3420.50.10:
    name: CSMS型式批准管理
    description: |
      依据UN R155对网络安全管理系统进行型式批准，包括审核准备与监督。
  BC-3420.50.20:
    name: SUMS型式批准管理
    description: |
      依据UN R156对软件更新管理系统进行型式批准，包括审核准备与监督。
  BC-3420.50.30:
    name: ALKS与ADS审批管理
    description: |
      依据UN R157及新兴法规提交自动车道保持和更广泛自动驾驶系统的审批申请。
  BC-3420.60:
    name: 零部件与系统型式批准
    description: |
      对照明、EMC、轮胎和制动等系统进行零部件级型式批准，以支持整车审批。
  BC-3420.60.10:
    name: 照明与信号装置批准
    description: |
      批准前照灯、信号装置及自适应照明系统。
  BC-3420.60.20:
    name: EMC批准
    description: |
      依据UN R10对整车及电子总成进行电磁兼容性批准。
  BC-3420.60.30:
    name: 轮胎与车轮批准
    description: |
      依据UNECE及区域法规体系进行轮胎与车轮批准及标识。
  BC-3420.60.40:
    name: 制动与转向零部件批准
    description: |
      依据UN R13/R13H、R79及同等法规批准制动和转向零部件。
  BC-3420.70:
    name: 生产符合性管理
    description: |
      开展生产符合性审核及持续性生产样件验证，确保与批准规格一致。
  BC-3420.70.10:
    name: CoP审核管理
    description: |
      管理审批机构和技术服务机构开展的生产符合性审核。
  BC-3420.70.20:
    name: 生产样件验证
    description: |
      验证生产样件是否符合型式批准规格和公差。
  BC-3420.70.30:
    name: 在用符合性监督
    description: |
      开展在用符合性测试与监督，确认量产后持续合规。

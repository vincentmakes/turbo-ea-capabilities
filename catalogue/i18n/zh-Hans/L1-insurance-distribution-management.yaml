locale: zh-Hans
source: L1-insurance-distribution-management.yaml
entries:
  BC-2110:
    name: 保险分销管理
    description: |
      经纪人、代理人、MGA 和直销渠道关系管理，包括委任、佣金、执照、授权承保及报价和递交流程进入承保环节的管理。
  BC-2110.10:
    name: 经纪人与中介管理
    description: |
      经纪人和中介的引入、层级管理、绩效跟踪及离职管理。
  BC-2110.10.10:
    name: 经纪人引入
    description: |
      引入经纪人、中介、保险经纪和 MGA。
  BC-2110.10.20:
    name: 经纪人层级与账户维护
    description: |
      维护经纪人层级、账户结构和联系信息。
  BC-2110.10.30:
    name: 经纪人绩效跟踪
    description: |
      跟踪经纪人承保量、赔付率和盈利能力。
  BC-2110.10.40:
    name: 经纪人离职管理
    description: |
      经纪人离职、在效业务了结及最终结算管理。
  BC-2110.20:
    name: 经纪人执照与委任管理
    description: |
      执照核验、司法管辖区委任、继续教育及经纪人合规管理。
  BC-2110.20.10:
    name: 执照核验
    description: |
      在州和司法管辖区注册系统中核验经纪人执照。
  BC-2110.20.20:
    name: 司法管辖区委任管理
    description: |
      管理州和司法管辖区的委任、终止及续期。
  BC-2110.20.30:
    name: 继续教育跟踪
    description: |
      跟踪经纪人继续教育学分和续期资格。
  BC-2110.20.40:
    name: 经纪人合规监控
    description: |
      监控经纪人行为、投诉和纪律处分情况。
  BC-2110.30:
    name: 佣金与激励管理
    description: |
      佣金方案配置、计算、超额佣金和奖励，以及对账单生成。
  BC-2110.30.10:
    name: 佣金方案配置
    description: |
      按产品和经纪人配置佣金方案和费率。
  BC-2110.30.20:
    name: 佣金计算
    description: |
      计算保费事件的佣金，包括注销撤销。
  BC-2110.30.30:
    name: 超额佣金与奖励计算
    description: |
      计算超额佣金、利润分享和激励奖励。
  BC-2110.30.40:
    name: 佣金对账单生成
    description: |
      生成和分发经纪人佣金对账单。
  BC-2110.40:
    name: 分销渠道管理
    description: |
      代理人、经纪人、直销数字渠道、银行保险、亲和力团体和比价网站渠道的运营管理。
  BC-2110.40.10:
    name: 代理人渠道运营
    description: |
      专属和独立代理人渠道的运营管理。
  BC-2110.40.20:
    name: 经纪人渠道运营
    description: |
      经纪人和批发经纪人渠道的运营管理。
  BC-2110.40.30:
    name: 直销数字渠道运营
    description: |
      直接面向客户的数字保险渠道运营管理。
  BC-2110.40.40:
    name: 银行保险与亲和力渠道运营
    description: |
      银行保险合作和亲和力团体渠道的运营管理。
  BC-2110.40.50:
    name: 比价网站渠道运营
    description: |
      价格比较网站渠道的运营管理。
  BC-2110.50:
    name: 授权承保管理
    description: |
      核保代理授权设置、绩效监控、账单数据接收及授权审核。
  BC-2110.50.10:
    name: 授权承保设置
    description: |
      设置授权承保协议和授权核保协议。
  BC-2110.50.20:
    name: 核保代理绩效监控
    description: |
      监控核保代理的承保绩效和权限合规情况。
  BC-2110.50.30:
    name: 账单数据接收与对账
    description: |
      接收、录入和对账保费及赔款账单数据。
  BC-2110.50.40:
    name: 授权审核与撤销
    description: |
      审核核保代理运营情况并在必要时撤销授权承保权。
  BC-2110.60:
    name: 报价与递交管理
    description: |
      递交接收、报价生成、比价及报价到承保转化跟踪。
  BC-2110.60.10:
    name: 递交接收
    description: |
      跨渠道和经纪人门户接收保险递交材料。
  BC-2110.60.20:
    name: 报价生成
    description: |
      依据产品和费率配置生成保险报价。
  BC-2110.60.30:
    name: 报价比较与反报价
    description: |
      多家公司报价比较和反报价处理。
  BC-2110.60.40:
    name: 报价到承保转化跟踪
    description: |
      跟踪报价到承保转化率及未转化原因。

locale: zh-Hans
source: L1-spectrum-frequency-management.yaml
entries:
  BC-2670:
    name: 频谱与频率管理
    description: |
      管理运营商的频谱资产组合，包括许可证获取和续期、频率规划与协调、干扰管理以及共享频谱运营。
  BC-2670.10:
    name: 频谱资产组合管理
    description: |
      维护频谱持有台账，并对战略性频谱决策实施监督。
  BC-2670.10.10:
    name: 频谱持有台账
    description: |
      按频段、地域和许可证维护运营商频谱持有的权威台账。
  BC-2670.10.20:
    name: 频谱估值
    description: |
      为财务、并购和拍卖决策对频谱持有进行估值。
  BC-2670.10.30:
    name: 频谱交易
    description: |
      在监管机构允许的范围内，与其他运营商进行频谱权益的购买、处置和租赁。
  BC-2670.20:
    name: 频谱许可证管理
    description: |
      从参与拍卖到续期和合规报告，对频谱许可证进行端到端管理。
  BC-2670.20.10:
    name: 频谱许可证获取
    description: |
      参与频谱拍卖、选美竞标和双边分配。
  BC-2670.20.20:
    name: 频谱许可证续期
    description: |
      按到期日历管理频谱许可证的续期工作。
  BC-2670.20.30:
    name: 许可证合规报告
    description: |
      报告频谱许可证条件的履行情况，包括覆盖和建设义务。
  BC-2670.30:
    name: 频率规划与协调
    description: |
      为网络单元分配信道和频率，并与相邻用户进行协调。
  BC-2670.30.10:
    name: 小区频率分配
    description: |
      为各无线小区分配频率和PCI。
  BC-2670.30.20:
    name: 信道规划
    description: |
      规划无线接入和微波链路的信道分配。
  BC-2670.30.30:
    name: 邻区规划
    description: |
      定义邻区关系，以管理切换和干扰。
  BC-2670.40:
    name: 频谱干扰管理
    description: |
      检测、调查和解决有害频谱干扰，并与监管机构协调。
  BC-2670.40.10:
    name: 干扰检测
    description: |
      检测来自内部和外部来源的有害干扰。
  BC-2670.40.20:
    name: 干扰解决
    description: |
      调查并解决已识别的干扰案例。
  BC-2670.40.30:
    name: 监管机构协调
    description: |
      就跨许可证干扰和执法问题与国家监管机构进行协调。
  BC-2670.50:
    name: 频谱共享管理
    description: |
      运营动态频谱共享和共享接入机制（如CBRS）。
  BC-2670.50.10:
    name: 动态频谱共享
    description: |
      在同一频段上运营DSS类型的跨无线技术共享。
  BC-2670.50.20:
    name: 共享接入协调
    description: |
      与SAS和AFC等共享接入平台协调，获取信道授权。
  BC-2670.50.30:
    name: 二次使用协调
    description: |
      在二次使用机制下与主许可证持有人和在网用户进行协调。

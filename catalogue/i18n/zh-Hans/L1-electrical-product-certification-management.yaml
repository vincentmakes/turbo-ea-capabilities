locale: zh-Hans
source: L1-electrical-product-certification-management.yaml
entries:
  BC-1910:
    name: 电气产品认证管理
    description: |
      覆盖多司法管辖区的产品安全、EMC 及能效认证，包括认证战略、技术文件、认证机构对接、标志许可、监督及现场不合规处理。
  BC-1910.10:
    name: 认证战略与路线图
    description: |
      确定所需标志和批准事项及其优先顺序。
  BC-1910.10.10:
    name: 市场准入要求分析
    description: |
      识别目标市场的认证要求。
  BC-1910.10.20:
    name: 认证方案选择
    description: |
      选择认证方案和互认路径。
  BC-1910.10.30:
    name: 认证路线图规划
    description: |
      按产品发布里程碑排序各项批准事项。
  BC-1910.20:
    name: 技术文件与证据管理
    description: |
      技术构造文件及支撑证据的编制与管理。
  BC-1910.20.10:
    name: 技术构造文件编制
    description: |
      编制支持型式批准的技术构造文件。
  BC-1910.20.20:
    name: 测试报告汇编
    description: |
      汇编和归档经认可的测试报告。
  BC-1910.20.30:
    name: 符合性声明编制
    description: |
      编制和签署符合性声明。
  BC-1910.20.40:
    name: 合规证据存档
    description: |
      按法规保留要求长期存档合规证据。
  BC-1910.30:
    name: 认证机构与批准管理
    description: |
      与公告机构和国家认证机构对接，直至型式批准签发。
  BC-1910.30.10:
    name: 公告机构选择
    description: |
      选择公告机构和国家认证机构。
  BC-1910.30.20:
    name: 认证申请管理
    description: |
      提交认证申请文件并跟进协调。
  BC-1910.30.30:
    name: 见证测试协调
    description: |
      协调审核员在供应商或内部实验室的见证测试。
  BC-1910.30.40:
    name: 型式批准签发跟踪
    description: |
      跟踪已签发型式批准和证书的有效性。
  BC-1910.40:
    name: 标志许可与标签合规
    description: |
      认证标志许可及产品标签图稿的管控。
  BC-1910.40.10:
    name: 标志使用授权
    description: |
      授权在认证产品上使用认证标志。
  BC-1910.40.20:
    name: 产品标签图稿管控
    description: |
      标签内容、标注及铭牌图稿的管控。
  BC-1910.40.30:
    name: 标志版税申报
    description: |
      申报标志版税义务的产品数量。
  BC-1910.50:
    name: 批准监督与续证
    description: |
      通过监督审核、变更申报和续证维持批准有效性。
  BC-1910.50.10:
    name: 工厂检查协调
    description: |
      协调认证机构工厂检查及后续整改措施。
  BC-1910.50.20:
    name: 定期监督测试
    description: |
      对认证产品按原基准进行监督复测。
  BC-1910.50.30:
    name: 批准变更申报
    description: |
      针对已签发批准申报变更和工程更改。
  BC-1910.50.40:
    name: 批准续证管理
    description: |
      对即将到期的批准和证书进行续证。
  BC-1910.60:
    name: 现场合规事件管理
    description: |
      处理产品上市后发现的不合规问题。
  BC-1910.60.10:
    name: 不合规事件分流
    description: |
      对现场报告的疑似产品不合规事项进行分流处理。
  BC-1910.60.20:
    name: 监管机构通报
    description: |
      就确认的不合规事项向主管机构和认证机构进行强制通报。
  BC-1910.60.30:
    name: 现场召回与禁运协调
    description: |
      协调召回、禁运令及纠正措施活动。
metadata:
  translator: Claude (zh-Hans automated)

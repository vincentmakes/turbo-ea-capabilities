locale: zh-Hans
source: L1-education-compliance-regulatory-reporting-management.yaml
entries:
  BC-4810:
    name: 教育合规与监管报告管理
    description: |
      教育行业专项监管合规与法定报告，包括学生数据隐私、公民权利制度、特殊教育法定义务、国际学生签证合规及公共资助合规。与跨行业合规管理共同涵盖一般监管义务。
  BC-4810.10:
    name: 学生数据隐私合规
    description: |
      遵守行业专项学生数据隐私制度，包括FERPA、COPPA及等效制度。
    in_scope:
      - FERPA合规运营
      - COPPA合规运营
      - 学生数据共享协议管理
    out_of_scope:
      - 通用数据保护（见跨行业信息与数据管理）
  BC-4810.10.10:
    name: FERPA合规运营
    description: |
      开展FERPA日常合规、知情同意及信息披露工作。
  BC-4810.10.20:
    name: COPPA合规运营
    description: |
      对13岁以下儿童适用服务的COPPA合规管理。
  BC-4810.10.30:
    name: 学生数据共享协议管理
    description: |
      与供应商谈判并管理学生数据共享协议。
  BC-4810.20:
    name: 教育法定报告
    description: |
      向国家、州及地方主管部门提交教育统计数据和绩效报告。
    in_scope:
      - 国家统计数据提交（如IPEDS、HESA）
      - 州及地方教育主管部门报告
      - 资助与绩效信息披露
    out_of_scope:
      - 内部绩效报告（见学术质量与认证管理）
  BC-4810.20.10:
    name: 国家统计数据提交
    description: |
      向国家教育统计机构提交报告。
  BC-4810.20.20:
    name: 州及地方教育主管部门报告
    description: |
      向州、省及地方教育主管部门提交报告。
  BC-4810.20.30:
    name: 资助与绩效信息披露
    description: |
      公开披露资金使用情况和教育绩效指标。
  BC-4810.30:
    name: 公民权利合规
    description: |
      遵守教育领域专项公民权利制度，包括第九章、第504条及学术场景下的美国残障人士法（ADA）。
    in_scope:
      - 第九章调查与报告
      - 第504条/ADA合规
      - 反歧视政策执行
    out_of_scope:
      - 日常便利措施安排（见学生支持与身心健康管理）
  BC-4810.30.10:
    name: 第九章调查与报告
    description: |
      开展第九章受理、调查、听证及法定报告工作。
  BC-4810.30.20:
    name: 第504条/ADA合规
    description: |
      在学术和招生场景下的第504条及ADA合规管理。
  BC-4810.30.30:
    name: 反歧视政策执行
    description: |
      执行教育反歧视政策并处理投诉。
  BC-4810.40:
    name: 特殊教育合规
    description: |
      遵守涵盖学龄及早期干预人群的法定特殊教育制度。
    in_scope:
      - 《残障人教育法》B部分合规
      - 《残障人教育法》C部分/早期干预合规
      - 等效SEN/ALN法定合规
    out_of_scope:
      - 特殊教育服务实施（见学生支持与身心健康管理）
  BC-4810.40.10:
    name: 《残障人教育法》B部分合规
    description: |
      学龄阶段特殊教育的IDEA B部分法定合规。
  BC-4810.40.20:
    name: 《残障人教育法》C部分/早期干预合规
    description: |
      早期干预服务的IDEA C部分合规。
  BC-4810.40.30:
    name: 等效SEN/ALN法定合规
    description: |
      美国以外地区的等效SEN、ALN及融合教育法定合规。
  BC-4810.50:
    name: 国际学生合规
    description: |
      依据SEVIS和英国学生签证路线等制度，对国际学生进行签证担保合规和法定跟踪管理。
    in_scope:
      - SEVIS/I-20合规运营
      - 学生签证报告（英国学生签证路线及等效制度）
      - 国际学生跟踪与报告
    out_of_scope:
      - 入学时签证担保文件发放（见招生与入学管理）
  BC-4810.50.10:
    name: SEVIS/I-20合规运营
    description: |
      针对美国担保学生开展SEVIS和I-20日常合规工作。
  BC-4810.50.20:
    name: 学生签证报告
    description: |
      依据非美国签证制度开展担保学生法定报告工作。
  BC-4810.50.30:
    name: 国际学生跟踪
    description: |
      按担保义务要求跟踪国际学生在籍状态、出勤及住址。
  BC-4810.60:
    name: 第四章/公共资助合规
    description: |
      遵守公共学生资助和教育资助制度，包括美国第四章及等效制度。
    in_scope:
      - 第四章资格与拨付合规
      - 资金退还与资助核对
      - 公共资助审计响应
    out_of_scope:
      - 经济援助资格发放（见招生与入学管理）
  BC-4810.60.10:
    name: 第四章资格与拨付合规
    description: |
      第四章机构资格和学生资助拨付合规管理。
  BC-4810.60.20:
    name: 资金退还与资助核对
    description: |
      依资助制度要求开展未获学分资助的核对与退还工作。
  BC-4810.60.30:
    name: 公共资助审计响应
    description: |
      响应公共学生资助和教育资助的审计与检查。

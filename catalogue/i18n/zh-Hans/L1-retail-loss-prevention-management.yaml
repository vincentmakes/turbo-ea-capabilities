locale: zh-Hans
source: L1-retail-loss-prevention-management.yaml
entries:
  BC-2340:
    name: 零售损耗防控管理
    description: |
      在整个零售网络中预防、发现、调查并减少库存损失与欺诈，涵盖入店行窃、有组织零售犯罪、内部盗窃及POS层面滥权行为。
  BC-2340.10:
    name: 货损分析管理
    description: |
      跨门店、渠道和品类计量、分析和报告库存货损。
    in_scope:
      - 对比账面库存计量货损
      - 按门店、品类及原因出具货损报告
      - 未知损失根因分析
  BC-2340.10.10:
    name: 货损计量
    description: |
      对比账面库存与实物盘点计量货损。
  BC-2340.10.20:
    name: 货损根因分析
    description: |
      对已知和未知损失进行货损根因分析。
  BC-2340.10.30:
    name: 货损报告与目标设定
    description: |
      按门店和品类出具货损报告并设定减损目标。
  BC-2340.20:
    name: 内部盗窃调查管理
    description: |
      发现、调查并处置员工不诚信行为，包括纪律处分及追偿行动。
  BC-2340.20.10:
    name: 员工不诚信行为发现
    description: |
      通过举报热线、数据分析及审计发现员工不诚信行为。
  BC-2340.20.20:
    name: 内部调查案件处理
    description: |
      开展内部调查案件工作，包括证据管理。
  BC-2340.20.30:
    name: 追偿与纪律处分协调
    description: |
      协调追偿、纪律处分及人力资源后续跟进。
  BC-2340.30:
    name: 外部盗窃与有组织零售犯罪管理
    description: |
      预防和调查入店行窃及有组织零售犯罪，包括与执法部门及行业协会的联络合作。
  BC-2340.30.10:
    name: 入店行窃防控
    description: |
      通过威慑、布局优化及干预手段防控入店行窃。
  BC-2340.30.20:
    name: 有组织零售犯罪调查
    description: |
      调查有组织零售犯罪团伙及作案规律。
  BC-2340.30.30:
    name: 执法部门联络
    description: |
      就零售犯罪案件与警方及行业论坛保持联络。
  BC-2340.40:
    name: POS欺诈防控管理
    description: |
      发现和防控销售终端欺诈行为，包括退款欺诈、人情交易及基于异常的报告分析。
    in_scope:
      - 退款与换货欺诈检测
      - 人情交易与折扣滥用检测
      - POS异常报告
  BC-2340.40.10:
    name: 退款与换货欺诈检测
    description: |
      发现基于退款和换货的欺诈行为模式。
  BC-2340.40.20:
    name: 人情交易与折扣滥用检测
    description: |
      检测人情交易及未经授权折扣应用行为。
  BC-2340.40.30:
    name: POS异常报告
    description: |
      对POS交易开展基于异常的报告分析，发现可疑行为。
  BC-2340.50:
    name: 实体安保与监控管理
    description: |
      门店级实体安全管理，包括CCTV、EAS、门禁管控及安保服务。
  BC-2340.50.10:
    name: 门店CCTV运营
    description: |
      运营、监控并管理门店CCTV及相关证据。
  BC-2340.50.20:
    name: 电子商品防盗系统运营
    description: |
      运营EAS门禁及防盗标签，包括报警响应。
  BC-2340.50.30:
    name: 门店出入管控
    description: |
      对库房、现金室及后场区域实施实体出入管控。
  BC-2340.50.40:
    name: 安保服务管理
    description: |
      部署和管理门店驻场及外包安保服务。

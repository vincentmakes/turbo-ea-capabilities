locale: zh-Hans
source: L1-food-beverage-processing-operations-management.yaml
entries:
  BC-3580:
    name: 食品饮料加工运营管理
    description: |
      工业化食品饮料制造运营——原料收货、初加工和深加工、包装、冷链制造、卫生清洁、饲料制造及肉类、乳品、粮食加工、酿造、烘焙和鲜切领域的副产品回收。
  BC-3580.10:
    name: 原料收货与检验
    description: |
      收货、感官及实验室检测，以及农业原料进入加工厂的批次验收。
  BC-3580.10.10:
    name: 原料收货
    description: |
      收货牲畜、牛奶、谷物、水果和蔬菜等原料。
  BC-3580.10.20:
    name: 原料感官与质量检测
    description: |
      对到货原料开展感官和实验室检测。
  BC-3580.10.30:
    name: 原料批次验收
    description: |
      批次验收、拒收和重新分级决策。
  BC-3580.20:
    name: 初加工运营
    description: |
      农业原料的第一阶段转化——屠宰与分割、牛奶分离、粮食加工及农产品预处理。
    in_scope:
      - 屠宰与胴体分割
      - 牛奶收货与分离
      - 谷物磨粉与油料压榨
      - 水果和蔬菜预处理
    out_of_scope:
      - 通用制造运营（BC-1010）
  BC-3580.20.10:
    name: 屠宰与胴体分割
    description: |
      牲畜和家禽的屠宰、分割与冷却。
  BC-3580.20.20:
    name: 牛奶收货与分离
    description: |
      牛奶收货、标准化及奶油分离运营。
  BC-3580.20.30:
    name: 谷物磨粉与油料压榨
    description: |
      谷物磨粉与油料压榨，包括螺旋压榨和溶剂浸出。
  BC-3580.20.40:
    name: 水果和蔬菜预处理
    description: |
      水果和蔬菜的清洗、去皮、切割和漂烫。
  BC-3580.30:
    name: 深加工运营
    description: |
      生产成品食品饮料的混合、蒸煮、发酵和浓缩运营。
  BC-3580.30.10:
    name: 混合与调配运营
    description: |
      按配方混合和调配食品饮料原料。
  BC-3580.30.20:
    name: 蒸煮与热处理
    description: |
      蒸煮、巴氏杀菌和灭菌运营。
  BC-3580.30.30:
    name: 发酵与酿造运营
    description: |
      饮料和发酵乳制品的发酵、酿造和陈酿。
  BC-3580.30.40:
    name: 干燥与浓缩运营
    description: |
      液体产品的喷雾干燥、蒸发和浓缩。
  BC-3580.40:
    name: 包装与灌装运营
    description: |
      成品食品饮料的灌装、密封、贴标及码垛运营。
  BC-3580.40.10:
    name: 灌装与密封运营
    description: |
      瓶装、罐装、袋装和硬质容器的灌装与密封。
  BC-3580.40.20:
    name: 贴标运营
    description: |
      贴标、日期标记和防篡改封口施用。
  BC-3580.40.30:
    name: 装箱与码垛运营
    description: |
      成品装箱、热缩包装和码垛运营。
  BC-3580.50:
    name: 冷链制造运营
    description: |
      加工线和包装线上的厂内制冷、冷冻及冷链监控。
  BC-3580.50.10:
    name: 制冷与冷冻运营
    description: |
      运营厂内冷库、速冻机和冷冻隧道。
  BC-3580.50.20:
    name: 厂内冷链监控
    description: |
      跨厂内区域和储存室的冷链监控。
  BC-3580.60:
    name: 卫生清洁与过敏原管控运营
    description: |
      就地清洗、过敏原切换管控及环境监测计划，保障产品安全。
    in_scope:
      - 就地清洗计划
      - 过敏原切换验证
      - 环境病原体监测
    out_of_scope:
      - 零售侧食品安全计划（BC-2380.10）
  BC-3580.60.10:
    name: 就地清洗运营
    description: |
      跨产品切换的就地清洗执行与验证。
  BC-3580.60.20:
    name: 过敏原切换管控
    description: |
      过敏原切换管控与验证棉签采样。
  BC-3580.60.30:
    name: 环境监测计划
    description: |
      跨厂区区域的环境病原体监测。
  BC-3580.70:
    name: 饲料制造运营
    description: |
      复合饲料制造，包括原料收货、混合、制粒及面向下游牲畜使用的药物饲料生产。
  BC-3580.70.10:
    name: 饲料原料收货
    description: |
      饲料厂的谷物、蛋白质饼粕和添加剂收货。
  BC-3580.70.20:
    name: 饲料混合与制粒
    description: |
      按日粮配方进行复合饲料混合与制粒。
  BC-3580.70.30:
    name: 药物饲料生产
    description: |
      凭处方生产药物饲料，执行交叉污染管控。
  BC-3580.80:
    name: 副产品与联产品管理
    description: |
      回收和转移加工过程中的副产品和联产品，如炼制品、乳清和酒糟，用于下游利用。
  BC-3580.80.10:
    name: 炼制运营
    description: |
      将肉类加工副产品炼制为动物油脂和肉粉。
  BC-3580.80.20:
    name: 乳清与渗透液回收
    description: |
      乳品加工中乳清和渗透液的回收。
  BC-3580.80.30:
    name: 酒糟回收
    description: |
      酿酒厂和蒸馏厂酒糟的回收与转移利用。

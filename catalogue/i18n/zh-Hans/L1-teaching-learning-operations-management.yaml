locale: zh-Hans
source: L1-teaching-learning-operations-management.yaml
entries:
  BC-4730:
    name: 教学与学习运营管理
    description: |
      教学与学习的日常实施，涵盖课堂与在线授课、学习环境平台、实习实训运营、辅导教学及学习参与跟踪。
  BC-4730.10:
    name: 课堂与课次教学
    description: |
      以讲座、研讨课、实验室、工作室、工作坊及辅导课等形式开展面授教学。
    in_scope:
      - 讲座与研讨课教学
      - 实验室与工作室教学
      - 工作坊与辅导课教学
    out_of_scope:
      - 在线与远程教学（见在线与远程学习运营）
  BC-4730.10.10:
    name: 讲座与研讨课教学
    description: |
      开展大班讲座和研讨式教学。
  BC-4730.10.20:
    name: 实验室与工作室教学
    description: |
      开展以实践操作为主的实验室和工作室教学。
  BC-4730.10.30:
    name: 工作坊与辅导课教学
    description: |
      开展小组工作坊和辅导课教学。
  BC-4730.20:
    name: 在线与远程学习运营
    description: |
      通过同步、异步和混合模式开展在线及远程教学。
    in_scope:
      - 同步在线课堂教学
      - 异步课程教学
      - 混合式学习运营
    out_of_scope:
      - 在线学习材料编写（见教育内容与学习资源管理）
  BC-4730.20.10:
    name: 同步在线课堂教学
    description: |
      开展由教师主导的实时在线课堂和辅导。
  BC-4730.20.20:
    name: 异步课程教学
    description: |
      以结构化进度提供自主节奏的异步课程学习。
  BC-4730.20.30:
    name: 混合式学习运营
    description: |
      提供面授与在线相结合的混合式课程教学。
  BC-4730.30:
    name: 学习环境管理
    description: |
      运营学习管理系统、虚拟课堂平台，并与下游学习工具和分析系统集成。
    in_scope:
      - 学习管理系统（LMS）运营
      - 虚拟课堂平台运营
      - LTI与学习工具集成
    out_of_scope:
      - 通用IT基础设施（见跨行业信息技术管理）
  BC-4730.30.10:
    name: 学习管理系统运营
    description: |
      运营机构级学习管理系统（LMS）。
  BC-4730.30.20:
    name: 虚拟课堂平台运营
    description: |
      运营用于教学的虚拟课堂和会议平台。
  BC-4730.30.30:
    name: 学习工具集成
    description: |
      通过LTI及等效标准集成第三方学习工具。
  BC-4730.40:
    name: 实习、临床与现场实训运营
    description: |
      运营工学结合学习项目，包括实训点协调、督导及实训学时跟踪。
    in_scope:
      - 实训点协调
      - 临床与实习督导
      - 实训学时与日志跟踪
    out_of_scope:
      - 毕业后就业安置（见学生支持与身心健康管理）
  BC-4730.40.10:
    name: 实训点协调
    description: |
      与外部实训点及接收单位进行协调。
  BC-4730.40.20:
    name: 临床与实习督导
    description: |
      在临床、专业及实习期间对学生实施督导。
  BC-4730.40.30:
    name: 实训学时与日志跟踪
    description: |
      跟踪实训学时、能力点及日志记录。
  BC-4730.50:
    name: 辅导课与辅助教学
    description: |
      提供辅导、同伴学习及学业技能辅助教学，以补充主课教学。
    in_scope:
      - 同伴辅导运营
      - 学业技能工作坊教学
      - 学科专项辅导运营
    out_of_scope:
      - 课程规划学业辅导（见学生支持与身心健康管理）
  BC-4730.50.10:
    name: 同伴辅导运营
    description: |
      运营由同学主导的辅导和学习支持项目。
  BC-4730.50.20:
    name: 学业技能工作坊教学
    description: |
      开展跨学科学业技能工作坊。
  BC-4730.50.30:
    name: 学科专项辅导运营
    description: |
      由教职人员、院系或专项服务机构提供的学科专项辅导。
  BC-4730.60:
    name: 出勤与参与度跟踪
    description: |
      采集并监控学生出勤情况和学习参与度，为高风险学习者触发干预机制。
    in_scope:
      - 出勤采集
      - 学习参与度监控
      - 早期预警与干预触发
    out_of_scope:
      - 辅导与咨询干预（见学生支持与身心健康管理）
  BC-4730.60.10:
    name: 出勤采集
    description: |
      采集学生参与各教学活动的出勤数据。
  BC-4730.60.20:
    name: 学习参与度监控
    description: |
      监控数字端与行为端的参与度信号。
  BC-4730.60.30:
    name: 早期预警与干预
    description: |
      触发早期预警标记并将其转介至支持服务。

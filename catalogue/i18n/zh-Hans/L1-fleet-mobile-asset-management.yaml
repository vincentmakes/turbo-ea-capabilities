locale: zh-Hans
source: L1-fleet-mobile-asset-management.yaml
entries:
  BC-2430:
    name: 车队与移动资产管理
    description: |
      负责车辆、船舶、飞机、机车及集装箱、拖车、ULD等共享设备的配置、维护、利用率及处置管理。
  BC-2430.10:
    name: 车队采购与处置管理
    description: |
      对移动资产进行规格设计、采购、租赁、租船及生命周期末端处置。
    in_scope:
      - 车辆、船舶、飞机及机车采购
      - 湿租、光租及裸船租约安排
      - 生命周期末端及转售决策
    out_of_scope:
      - 间接商品通用采购（BC-500）
      - 固定资产核算（BC-200）
  BC-2430.10.10:
    name: 车队规格设计与采购
    description: |
      设计并采购新车队资产。
  BC-2430.10.20:
    name: 租赁与租船管理
    description: |
      管理车队资产的经营租赁、融资租赁及租船协议。
  BC-2430.10.30:
    name: 生命周期末端处置
    description: |
      对退役车队资产进行转售、报废及回收处理。
  BC-2430.20:
    name: 车队维护管理
    description: |
      对车辆、船舶、飞机及机车开展预防性、纠正性及大修维护。
  BC-2430.20.10:
    name: 预防性维护排程
    description: |
      基于时间和状态制定预防性维护计划。
  BC-2430.20.20:
    name: 纠正性维护执行
    description: |
      对移动资产进行故障抢修及纠正性维修。
  BC-2430.20.30:
    name: 强制检验合规
    description: |
      符合法定检验及适航性或适航状态指令要求。
  BC-2430.20.40:
    name: 大修与翻新
    description: |
      开展重大修缮、进坞检修及大修作业。
  BC-2430.30:
    name: 设备池管理
    description: |
      跨仓库、客户及合作伙伴管理集装箱、拖车、底盘及ULD共享设备池。
  BC-2430.30.10:
    name: 集装箱池管理
    description: |
      跨各仓库追踪并平衡集装箱队。
  BC-2430.30.20:
    name: 拖车与底盘池管理
    description: |
      管理拖车及底盘共享池，包括灰池共享安排。
  BC-2430.30.30:
    name: ULD池管理
    description: |
      跨站追踪、维修并平衡ULD设备。
  BC-2430.30.40:
    name: 空载设备回运作业
    description: |
      执行从盈余仓库向短缺仓库的空载回运任务。
  BC-2430.40:
    name: 车队远程信息处理与监控
    description: |
      持续监控资产位置、状态及驾驶员行为，为维护与运营决策提供依据。
  BC-2430.40.10:
    name: 车队远程信息处理运营
    description: |
      运营接入位置及发动机数据的远程信息处理平台。
  BC-2430.40.20:
    name: 资产状态监控
    description: |
      监控移动资产状态，包括冷藏及货物状况。
  BC-2430.40.30:
    name: 驾驶员行为监控
    description: |
      监控急刹车、超速等驾驶员行为信号。
  BC-2430.50:
    name: 车队合规与认证管理
    description: |
      管理车队资产在监管机构及船级社的登记、认证及排放合规事宜。
  BC-2430.50.10:
    name: 车辆、船舶及飞机登记
    description: |
      向国内外主管机构完成初始及持续登记。
  BC-2430.50.20:
    name: 法定检验与认证
    description: |
      获取船级社、适航性及道路适用性证书，并完成相关审计。
  BC-2430.50.30:
    name: 排放与环保合规
    description: |
      符合车辆、船舶及飞机排放法规要求。
  BC-2430.60:
    name: 车队利用率与绩效管理
    description: |
      计量资产利用率、周转时间及全生命周期成本，推动车队决策优化。
  BC-2430.60.10:
    name: 资产利用率报告
    description: |
      按资产类型、线路及仓库报告利用率。
  BC-2430.60.20:
    name: 设备周转时间分析
    description: |
      分析集装箱、拖车及ULD的周转时间。
  BC-2430.60.30:
    name: 全生命周期成本分析
    description: |
      跨车队类型及供应商开展全生命周期成本分析。
metadata:
  translator: Claude (zh-Hans automated)

entries:
  BC-900:
    name: 项目与组合管理
    description: |
      统筹项目执行、组合优先级排序与PMO运营，确保战略投资得到有效交付。
  BC-900.10:
    name: 组合管理
    description: |
      定义组合结构，开展优先级排序与组合平衡，实现战略资源的最优配置。
  BC-900.10.10:
    name: 组合结构定义
    description: |
      按战略主题、类型与风险定义组合构成。
  BC-900.10.20:
    name: 组合优先级排序与选择
    description: |
      对候选项目评分并选择纳入组合。
  BC-900.10.30:
    name: 组合平衡
    description: |
      在时间跨度、风险与回报之间实现组合均衡。
  BC-900.10.40:
    name: 组合绩效报告
    description: |
      输出组合仪表板、状态报告与效益报告。
  BC-900.20:
    name: 项目群管理
    description: |
      统筹项目群规划、执行与治理，确保各项目协同推进。
  BC-900.20.10:
    name: 项目群定义与动员
    description: |
      制定项目群蓝图、授权书并完成动员准备。
  BC-900.20.20:
    name: 项目群计划整合
    description: |
      整合各项目计划、依赖关系与里程碑。
  BC-900.20.30:
    name: 项目群风险与问题管理
    description: |
      管理项目群层面的风险、问题与依赖关系。
  BC-900.20.40:
    name: 项目群收尾
    description: |
      完成项目群收尾、移交与经验教训总结。
  BC-900.30:
    name: 项目管理
    description: |
      执行项目规划、跟踪与交付，保障项目目标如期达成。
  BC-900.30.10:
    name: 项目规划
    description: |
      规划项目范围、进度、成本与资源。
  BC-900.30.20:
    name: 项目执行与跟踪
    description: |
      开展日常项目执行并跟踪进展。
  BC-900.30.30:
    name: 项目风险与问题管理
    description: |
      管理项目风险、问题与决策事项。
  BC-900.30.40:
    name: 项目质量管理
    description: |
      管控项目可交付物质量与验收标准。
  BC-900.30.50:
    name: 项目收尾与移交
    description: |
      完成项目收尾、移交运营并开展实施后评估。
  BC-900.40:
    name: 项目治理管理
    description: |
      通过阶段门评审、指导委员会与保证机制确保项目决策质量。
  BC-900.40.10:
    name: 阶段门治理
    description: |
      定义阶段门标准与审批要求。
  BC-900.40.20:
    name: 指导委员会运营
    description: |
      管理指导委员会的职责范围、议程与决策。
  BC-900.40.30:
    name: 项目保证评审
    description: |
      开展独立保证评审与关口评审。
  BC-900.40.40:
    name: 项目审计与经验教训
    description: |
      开展项目后审计、采集并传播经验教训。
  BC-900.50:
    name: PMO运营管理
    description: |
      提供PMO服务、方法论与工具支持，提升项目交付能力。
  BC-900.50.10:
    name: PMO方法论与标准
    description: |
      制定并维护项目方法论、模板与标准（PRINCE2、PMI、敏捷等）。
  BC-900.50.20:
    name: PMO工具与报告
    description: |
      管理项目管理工具、仪表板与报告体系。
  BC-900.50.30:
    name: PMO能力发展
    description: |
      开展项目经理能力建设与认证培训。
  BC-900.50.40:
    name: PMO绩效管理
    description: |
      管理PMO计分卡、价值衡量与绩效跟踪。
  BC-900.60:
    name: 需求与产能管理
    description: |
      管理项目需求受理与资源产能规划，确保供需平衡。
  BC-900.60.10:
    name: 项目需求受理
    description: |
      捕获、鉴定并批准新项目需求。
  BC-900.60.20:
    name: 资源产能规划
    description: |
      规划交付团队与各类技能的产能。
  BC-900.60.30:
    name: 资源分配与均衡
    description: |
      跨项目分配资源并解决资源冲突。
  BC-900.60.40:
    name: 资源利用报告
    description: |
      报告资源利用率、计费工时与需求预测。

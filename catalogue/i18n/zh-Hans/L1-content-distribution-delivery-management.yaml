locale: zh-Hans
source: L1-content-distribution-delivery-management.yaml
entries:
  BC-3740:
    name: 内容分发与传输管理
    description: |
      涵盖线性广播、OTT及流媒体传输、CDN运营、IPTV与组播、内容保护，以及向消费者界面和合作伙伴进行内容联播授权与附属机构分发。
  BC-3740.10:
    name: 线性广播分发
    description: |
      通过数字地面、卫星及有线传输路径运营线性广播分发。
  BC-3740.10.10:
    name: 地面广播运营
    description: |
      运营数字地面传输链路和复用载波。
  BC-3740.10.20:
    name: 卫星上行链路运营
    description: |
      运营面向直播到户和馈送分发的卫星上行链路。
  BC-3740.10.30:
    name: 有线前端运营
    description: |
      运营有线传输与前端，与运营商平台集成。
  BC-3740.20:
    name: OTT与流媒体传输
    description: |
      为直接面向消费者及合作伙伴OTT服务运营流媒体源站、封装及直播流媒体。
  BC-3740.20.10:
    name: 源站服务运营
    description: |
      运营向传输界面提供点播和直播内容的流媒体源站服务。
  BC-3740.20.20:
    name: 自适应流媒体封装
    description: |
      为HLS、MPEG-DASH及CMAF提供即时及预封装自适应流媒体服务。
  BC-3740.20.30:
    name: 直播流媒体运营
    description: |
      为活动、频道及FAST频道运营直播流媒体管道。
  BC-3740.30:
    name: CDN运营
    description: |
      管理内容分发网络的容量、缓存及成本性能，用于内容传输。
  BC-3740.30.10:
    name: CDN容量规划
    description: |
      跨地区、对等节点及峰值活动的CDN容量预测与供给规划。
  BC-3740.30.20:
    name: 边缘缓存管理
    description: |
      管理边缘缓存规模、填充策略及向合作伙伴缓存的卸载。
  BC-3740.30.30:
    name: CDN成本与性能优化
    description: |
      跨传输合作伙伴实施多CDN调度与成本性能优化。
  BC-3740.40:
    name: IPTV与组播传输管理
    description: |
      运营电信级IPTV前端、组播流及机顶盒服务激活。
  BC-3740.40.10:
    name: IPTV前端运营
    description: |
      运营IPTV前端，包括信号采集、编码及条件访问集成。
  BC-3740.40.20:
    name: 组播流管理
    description: |
      管理跨IP及3GPP广播承载的组播流供给。
  BC-3740.40.30:
    name: 机顶盒服务激活
    description: |
      在IPTV服务上激活机顶盒和受管设备，包括频道列表供给。
  BC-3740.50:
    name: 内容保护与DRM管理
    description: |
      运营内容保护系统，包括密钥与许可证管理、水印及并发流控制。
  BC-3740.50.10:
    name: 许可证与密钥管理
    description: |
      跨设备和平台签发并管理DRM许可证和内容密钥。
  BC-3740.50.20:
    name: 水印与取证溯源
    description: |
      应用会话级和取证水印，用于盗版检测和来源追溯。
  BC-3740.50.30:
    name: 并发流控制
    description: |
      跨观众和设备执行并发流上限及账号共享策略。
  BC-3740.60:
    name: 内容联播授权与附属机构分发
    description: |
      向内容联播授权附属机构和第三方平台分发节目和馈送，并进行交付记账。
  BC-3740.60.10:
    name: 联播授权订单管理
    description: |
      按持有版权和交付时段受理并履行内容联播授权订单。
  BC-3740.60.20:
    name: 附属机构馈送分发
    description: |
      向广播附属机构分发网络和频道馈送，并完成本地化交接。
  BC-3740.60.30:
    name: 节目交付追踪
    description: |
      追踪向平台和合作伙伴的节目交付情况，包括交付凭证和异常处理。

entries:
  BC-160:
    name: 业务连续性管理
    description: |
      开展韧性规划、灾难恢复及危机响应。
  BC-160.10:
    name: 业务连续性规划
    description: |
      开展业务影响分析、编制连续性计划及制定连续性策略。
  BC-160.10.10:
    name: 业务影响分析
    description: |
      识别关键流程、恢复时间目标、恢复点目标及依赖关系。
  BC-160.10.20:
    name: 连续性策略定义
    description: |
      选择连续性策略及恢复方案。
  BC-160.10.30:
    name: 连续性计划编制
    description: |
      依据 ISO 22301 编制业务连续性计划文件。
  BC-160.10.40:
    name: 计划维护与时效性
    description: |
      定期审查并更新连续性计划。
  BC-160.20:
    name: 灾难恢复管理
    description: |
      管理 IT 及运营灾难恢复。
  BC-160.20.10:
    name: IT 服务恢复规划
    description: |
      制定关键 IT 服务及基础设施的恢复计划。
  BC-160.20.20:
    name: 备份与恢复管理
    description: |
      制定备份策略、确保不可变性并验证恢复有效性。
  BC-160.20.30:
    name: 故障切换与站点恢复运营
    description: |
      执行故障切换、备用站点激活及运营恢复。
  BC-160.20.40:
    name: 运营恢复协调
    description: |
      在恢复激活期间协调业务运营。
  BC-160.30:
    name: 危机管理
    description: |
      管理危机响应、指挥结构及上报机制。
  BC-160.30.10:
    name: 危机指挥结构
    description: |
      建立危机管理团队、角色及指挥控制结构。
  BC-160.30.20:
    name: 危机沟通
    description: |
      管理内外部危机沟通及利益相关方管理。
  BC-160.30.30:
    name: 事件上报与激活
    description: |
      开展严重程度分类、上报路径及计划激活。
  BC-160.30.40:
    name: 危机后复盘
    description: |
      总结危机后的经验教训并制定改进行动。
  BC-160.40:
    name: 韧性测试与演练
    description: |
      开展演练、实战演习及计划验证。
  BC-160.40.10:
    name: 桌面推演与模拟演练
    description: |
      开展桌面演练、走查演练及情景模拟演练。
  BC-160.40.20:
    name: 实战故障切换测试
    description: |
      按恢复时间目标与恢复点目标开展实战故障切换及恢复测试。
  BC-160.40.30:
    name: 演练计划管理
    description: |
      制定年度演练日历、范围及利益相关方覆盖计划。
  BC-160.40.40:
    name: 测试结果与改进跟踪
    description: |
      记录演练结果并跟踪改进行动的落实情况。

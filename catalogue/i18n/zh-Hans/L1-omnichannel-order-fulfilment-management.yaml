locale: zh-Hans
source: L1-omnichannel-order-fulfilment-management.yaml
entries:
  BC-2330:
    name: 全渠道订单履行管理
    description: |
      跨渠道统筹消费者订单，实现任意渠道下单、任意节点承诺，并通过门店、配送中心、平台、供应商直发或最后一公里合作伙伴完成履行。
  BC-2330.10:
    name: 渠道统筹管理
    description: |
      实现消费者订单跨渠道单一视图、渠道路由，并在数字、门店及平台间保持状态一致性。
    in_scope:
      - 渠道路由规则与节点选择
      - 跨渠道订单单一视图
      - 渠道组合经济性与履行成本权衡
    out_of_scope:
      - 通用订单履行（BC-520.40）
  BC-2330.10.10:
    name: 渠道路由规则管理
    description: |
      定义按成本与服务水平选择履行节点的路由规则。
  BC-2330.10.20:
    name: 跨渠道订单视图
    description: |
      跨渠道统一呈现订单、状态及历史记录。
  BC-2330.10.30:
    name: 渠道组合经济性分析
    description: |
      分析各渠道及履行路径的单位经济效益。
  BC-2330.20:
    name: 网购自提运营管理
    description: |
      线上下单门店自提、路边取货及储物柜取货运营，将数字订单与实体取货点连接起来。
  BC-2330.20.10:
    name: 门店拣货打包运营
    description: |
      由门店员工完成线上订单的拣货与打包。
  BC-2330.20.20:
    name: 顾客取货交接
    description: |
      完成顾客取货交接，包括身份核验及异常处理。
  BC-2330.20.30:
    name: 路边取货与储物柜取货
    description: |
      执行路边交货及储物柜取货运营。
  BC-2330.30:
    name: 分布式订单履行管理
    description: |
      从分布式库存池出发，通过门店发货、暗仓及供应商直发，将商品履行至消费者目的地。
    in_scope:
      - 门店发货运营
      - 暗仓与微型履行中心运营
      - 供应商直发统筹
  BC-2330.30.10:
    name: 门店发货运营
    description: |
      从实体门店完成线上订单的拣货、打包与发货。
  BC-2330.30.20:
    name: 暗仓与微型履行中心运营
    description: |
      运营专为数字订单服务的暗仓及微型履行中心。
  BC-2330.30.30:
    name: 供应商直发统筹
    description: |
      统筹供应商直发，包括采购订单路由及货物追踪。
  BC-2330.40:
    name: 平台卖家运营管理
    description: |
      作为卖家在第三方平台运营商品列表，以及管理自营平台上的第三方卖家。
  BC-2330.40.10:
    name: 平台商品列表管理
    description: |
      在第三方平台上架商品，包括内容适配。
  BC-2330.40.20:
    name: 平台订单采集
    description: |
      采集平台订单并转入零售商订单处理流程。
  BC-2330.40.30:
    name: 第三方卖家入驻
    description: |
      将第三方卖家引入零售商自营平台。
  BC-2330.40.40:
    name: 第三方卖家绩效管理
    description: |
      管理第三方卖家服务绩效与政策合规情况。
  BC-2330.50:
    name: 消费者配送时段管理
    description: |
      为消费者提供配送时段预订、时间窗定价及快递调度协调，用于上门配送。
  BC-2330.50.10:
    name: 配送时段预订
    description: |
      消费者按可用性与运力逻辑预订配送时段。
  BC-2330.50.20:
    name: 时间窗定价
    description: |
      按需求及路线密度对配送时间窗进行动态定价。
  BC-2330.50.30:
    name: 快递调度协调
    description: |
      与自有及第三方最后一公里快递开展调度协调。
metadata:
  translator: Claude (zh-Hans automated)
  generated: 2026-04-29

locale: zh-Hans
source: L1-research-scholarship-management.yaml
entries:
  BC-4780:
    name: 科研与奖学金管理
    description: |
      高等教育科研使命管理，涵盖研究组合战略、科研经费全生命周期、伦理与诚信监督、学术成果产出、研究合作及影响力评估。
  BC-4780.10:
    name: 科研组合与战略
    description: |
      跨研究主题、研究中心及能力投入，对机构科研组合进行战略布局。
    in_scope:
      - 研究主题与研究中心战略
      - 科研能力投入规划
      - 科研绩效报告
    out_of_scope:
      - 通用项目组合管理（见跨行业项目组合管理）
  BC-4780.10.10:
    name: 研究主题与研究中心战略
    description: |
      制定研究主题、研究中心及研究院所的战略规划。
  BC-4780.10.20:
    name: 科研能力投入规划
    description: |
      规划科研能力投入，包括基础设施和人员配置。
  BC-4780.10.30:
    name: 科研绩效报告
    description: |
      开展内外部科研绩效报告工作。
  BC-4780.20:
    name: 科研经费管理
    description: |
      从机会识别到奖后管理，开展科研经费和合同的全生命周期管理。
    in_scope:
      - 经费机会识别
      - 申报前期项目申请开发
      - 奖后经费管理
    out_of_scope:
      - 通用财务管理（见跨行业财务管理）
  BC-4780.20.10:
    name: 经费机会识别
    description: |
      为研究人员识别经费和资助机会。
  BC-4780.20.20:
    name: 申报前期项目申请开发
    description: |
      开发项目申请书、经费预算及提交材料。
  BC-4780.20.30:
    name: 奖后经费管理
    description: |
      开展已获批经费的奖后管理工作，包括报告和合规事宜。
  BC-4780.30:
    name: 科研伦理与诚信监督
    description: |
      对科研伦理和诚信实施独立监督，包括涉人和涉动物研究审查及科研不端调查。
    in_scope:
      - 人类受试者研究审查（IRB/REC）
      - 动物研究监督（IACUC/AWERB）
      - 科研不端调查
    out_of_scope:
      - 学术违规（考核）案例（见考试与评估管理）
  BC-4780.30.10:
    name: 人类受试者研究审查
    description: |
      对涉及人类受试者的研究进行独立审查。
  BC-4780.30.20:
    name: 动物研究监督
    description: |
      对涉及动物受试者的研究实施监督。
  BC-4780.30.30:
    name: 科研不端调查
    description: |
      调查科研不端行为举报。
  BC-4780.40:
    name: 学术成果与发表管理
    description: |
      跟踪和管理学术成果，包括发表物、开放获取及持久标识符。
    in_scope:
      - 发表物跟踪
      - 开放获取与知识库管理
      - 持久标识符管理（ORCID、DOI）
    out_of_scope:
      - 知识产权商业化（见跨行业知识产权管理）
  BC-4780.40.10:
    name: 发表物跟踪
    description: |
      跟踪研究人员的发表物和学术成果。
  BC-4780.40.20:
    name: 开放获取与知识库管理
    description: |
      管理开放获取出版和机构知识库。
  BC-4780.40.30:
    name: 持久标识符管理
    description: |
      管理研究人员和学术成果的持久标识符。
  BC-4780.50:
    name: 科研合作与伙伴关系管理
    description: |
      建立并运营跨学术界、产业界和国际合作者的研究伙伴关系。
    in_scope:
      - 机构间科研协议
      - 产学研合作
      - 国际科研合作
    out_of_scope:
      - 商业供应商关系（见跨行业供应商管理）
  BC-4780.50.10:
    name: 机构间科研协议管理
    description: |
      管理与同类机构的科研协议。
  BC-4780.50.20:
    name: 产学研合作管理
    description: |
      管理产学研合作和委托研究。
  BC-4780.50.30:
    name: 国际科研合作
    description: |
      建立并运营国际科研合作项目。
  BC-4780.60:
    name: 科研影响力与评估
    description: |
      通过案例研究、文献计量及参与全国科研评估活动，评估科研影响力。
    in_scope:
      - 科研影响力案例研究
      - 文献计量与替代计量分析
      - 提交全国科研评估（如REF）
    out_of_scope:
      - 学术认证评审（见学术质量与认证管理）
  BC-4780.60.10:
    name: 科研影响力案例研究
    description: |
      开发科研影响力案例研究材料。
  BC-4780.60.20:
    name: 文献计量与替代计量分析
    description: |
      对科研成果和传播范围进行文献计量和替代计量分析。
  BC-4780.60.30:
    name: 全国科研评估提交
    description: |
      提交全国科研评估材料。
metadata:

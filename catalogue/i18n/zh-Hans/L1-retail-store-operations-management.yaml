locale: zh-Hans
source: L1-retail-store-operations-management.yaml
entries:
  BC-2310:
    name: 零售门店运营管理
    description: |
      涵盖实体零售门店的日常运营，包括开店与关店流程、门店执行、门店级劳动力管理、运营审计、货架维护及门店格式体验的一致性交付。
  BC-2310.10:
    name: 开店与关店运营
    description: |
      每日开店与关店流程，包括备用金准备、日结对账及班次交接。
  BC-2310.10.10:
    name: 开店流程执行
    description: |
      执行门店开店程序，包括营业就绪检查。
  BC-2310.10.20:
    name: 关店流程执行
    description: |
      执行日终关店流程，包括对账及安全交接。
  BC-2310.10.30:
    name: 班次交接管理
    description: |
      各班次团队之间完成任务与事故信息的交接。
  BC-2310.20:
    name: 门店执行管理
    description: |
      在门店层面执行商品陈列、促销、标识及补货任务，确保门店与总部计划保持一致。
    in_scope:
      - 门店员工任务管理
      - 货架陈列图与标识执行
      - 从后场库存补货至货架
    out_of_scope:
      - 货架陈列图设计（BC-2300.30.10）
  BC-2310.20.10:
    name: 门店任务管理
    description: |
      向门店团队分配并追踪运营任务。
  BC-2310.20.20:
    name: 货架陈列图与标识执行
    description: |
      在门店执行货架陈列图、标识及促销陈列布置。
  BC-2310.20.30:
    name: 门店补货
    description: |
      从后场及库房库存向货架补货。
  BC-2310.20.40:
    name: 库房与后场运营
    description: |
      后场库存的收货、整理及管理。
  BC-2310.30:
    name: 门店劳动力管理
    description: |
      门店级劳动力排班、按小时人员规划及员工绩效管理。
    in_scope:
      - 基于客流量与销售额的小时劳动力预测
      - 排班及考勤管理
      - 门店级员工绩效与辅导
    out_of_scope:
      - 企业级人力资本管理（BC-300）
  BC-2310.30.10:
    name: 劳动力需求预测
    description: |
      按门店及部门预测小时劳动力需求。
  BC-2310.30.20:
    name: 门店班次排班
    description: |
      在公平性与劳动法规约束下安排门店班次。
  BC-2310.30.30:
    name: 考勤管理
    description: |
      记录打卡及异常情况管理。
  BC-2310.30.40:
    name: 员工绩效辅导
    description: |
      对门店员工开展辅导、表彰及绩效管理。
  BC-2310.40:
    name: 门店审计与合规管理
    description: |
      开展运营审计、合规巡查、神秘顾客及门店品牌与运营标准符合性检查。
  BC-2310.40.10:
    name: 运营审计计划
    description: |
      按门店标准制定运营审计与巡查计划。
  BC-2310.40.20:
    name: 神秘顾客计划
    description: |
      开展神秘顾客项目，评估顾客体验。
  BC-2310.40.30:
    name: 门店标准符合性
    description: |
      按门店评估品牌、安全及运营标准的符合情况。
  BC-2310.50:
    name: 门店资产维护管理
    description: |
      维护门店货架、设备、冷藏及清洁卫生，确保门店始终保持销售就绪状态。
  BC-2310.50.10:
    name: 货架与设备维护
    description: |
      维护门店货架、展架及设备。
  BC-2310.50.20:
    name: 冷藏设备正常运行管理
    description: |
      监控并管理食品零售冷藏设备的正常运行状态。
  BC-2310.50.30:
    name: 门店保洁与卫生
    description: |
      执行销售区清洁、保洁及卫生例行程序。
  BC-2310.60:
    name: 门店格式与体验管理
    description: |
      定义并管护门店格式体验标准，包括服务模式、外观感受及顾客旅程。
  BC-2310.60.10:
    name: 门店格式标准
    description: |
      为每种门店格式制定布局、服务及氛围标准。
  BC-2310.60.20:
    name: 门店顾客体验设计
    description: |
      设计门店内顾客旅程及服务互动方式。
  BC-2310.60.30:
    name: 门店概念更新规划
    description: |
      规划门店概念焕新及试点推广方案。
metadata:

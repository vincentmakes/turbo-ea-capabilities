locale: zh-Hans
source: L1-mining-tenement-royalty-management.yaml
entries:
  BC-4490:
    name: 矿权与特许权使用费管理
    description: |
      开展勘探许可证和采矿租约的获取、合规和组合管理，以及政府、私人和原住民特许权使用费义务的计算、报告和披露。
  BC-4490.10:
    name: 矿权取得
    description: |
      开展勘探许可证、采矿租约及其他矿权的申请、招标和取得尽职调查。
    in_scope:
      - 绿地勘探许可证申请
      - 采矿租约申请与续期
      - 矿权取得尽职调查
    out_of_scope:
      - 发现阶段前景目标成熟（BC-4400.20）
  BC-4490.10.10:
    name: 勘探许可证申请
    description: |
      编制并提交绿地和棕地勘探许可证申请材料。
  BC-4490.10.20:
    name: 采矿租约申请
    description: |
      编制并提交采矿租约申请及勘探地权转化材料。
  BC-4490.10.30:
    name: 矿权招标参与
    description: |
      参与竞争性矿权招标和拍卖。
  BC-4490.10.40:
    name: 矿权取得尽职调查
    description: |
      开展矿权取得的权属、负担和义务尽职调查。
  BC-4490.20:
    name: 矿权合规与维护
    description: |
      履行矿权附加的年度支出、工作计划、租金和续期义务。
  BC-4490.20.10:
    name: 年度支出报告
    description: |
      报告矿权承诺范围内的年度勘探和开发支出。
  BC-4490.20.20:
    name: 工作计划合规
    description: |
      证明勘探和采矿矿权已履行承诺工作计划。
  BC-4490.20.30:
    name: 租金与法定费用缴纳
    description: |
      缴纳矿权年租金、法定费用和保证金。
  BC-4490.20.40:
    name: 矿权续期管理
    description: |
      管理矿权续期申请和条件变更事宜。
  BC-4490.30:
    name: 矿权组合管理
    description: |
      维护矿权登记册、边界制图，并在组合范围内作出放弃决策。
  BC-4490.30.10:
    name: 矿权登记册管理
    description: |
      维护企业矿权登记册和权威属性信息。
  BC-4490.30.20:
    name: 矿权边界制图
    description: |
      开展矿权边界的空间制图，并与政府登记册进行对账。
  BC-4490.30.30:
    name: 矿权放弃决策
    description: |
      就部分和全部矿权放弃作出决策，以精简组合。
  BC-4490.40:
    name: 政府特许权使用费管理
    description: |
      计算、申报和回应向东道国政府缴纳的基于产量和从价特许权使用费的审计。
  BC-4490.40.10:
    name: 生产特许权使用费计算
    description: |
      计算矿物产出的基于产量和从价特许权使用费。
  BC-4490.40.20:
    name: 特许权使用费申报提交
    description: |
      向东道国财政税务机关提交定期特许权使用费申报。
  BC-4490.40.30:
    name: 特许权使用费审计应对
    description: |
      应对政府特许权使用费审计和评估。
  BC-4490.50:
    name: 私人与原住民特许权使用费管理
    description: |
      管理私人特许权使用费流及原住民利益分享特许权使用费义务。
  BC-4490.50.10:
    name: 私人特许权使用费管理
    description: |
      管理卖方、融资方和流媒公司的特许权使用费权利。
  BC-4490.50.20:
    name: 原住民利益分享特许权使用费管理
    description: |
      管理与原住民和传统土地所有者群体的特许权使用费支付和利益分享安排。
  BC-4490.50.30:
    name: 特许权使用费披露报告
    description: |
      向投资者、监管机构和受影响社区披露特许权使用费支付情况。
  BC-4490.60:
    name: 采掘业透明度报告
    description: |
      依据采掘业透明度制度开展政府付款、EITI 和受益所有权报告。
  BC-4490.60.10:
    name: 政府付款报告
    description: |
      按照欧盟及同等制度履行强制性政府付款报告义务。
  BC-4490.60.20:
    name: 采掘业透明度披露
    description: |
      开展 EITI 及同等自愿透明度报告，披露税收流向。
  BC-4490.60.30:
    name: 受益所有权披露
    description: |
      按照 EITI 及同等规则披露运营主体的受益所有权。

locale: zh-Hans
source: L1-water-resource-management.yaml
entries:
  BC-3860:
    name: 水资源管理
    description: |
      对原水水源进行可持续管护，包括汇水区和水源保护、原水取水与储存、长期资源规划、干旱与限水管理、取水许可合规，以及地表水和地下水监测网络。
  BC-3860.10:
    name: 汇水区与水源保护
    description: |
      通过利益相关方参与、土地利用措施和水源风险评估，保护水源汇水区。
  BC-3860.10.10:
    name: 汇水区风险评估
    description: |
      按照世卫组织水安全计划原则，对饮用水水源进行汇水区风险评估。
  BC-3860.10.20:
    name: 水源保护区管理
    description: |
      划定并管理地下水和地表水水源保护区。
  BC-3860.10.30:
    name: 汇水区利益相关方参与
    description: |
      与土地所有者、监管机构和农民就汇水区保护措施开展参与活动。
  BC-3860.20:
    name: 原水取水运营
    description: |
      日常运营向水处理设施供水的取水口、河道引水口和地下水钻孔。
  BC-3860.20.10:
    name: 地表水取水运营
    description: |
      运营河道和水库取水口，包括格栅和泵送装置。
  BC-3860.20.20:
    name: 地下水钻孔运营
    description: |
      运营地下水钻孔和井场并进行出水量管理。
  BC-3860.20.30:
    name: 原水泵送运营
    description: |
      将原水泵送至水处理厂和输水系统。
  BC-3860.30:
    name: 原水储存运营
    description: |
      运营蓄水水库、调节水库、大坝及预处理储水设施，包括大坝安全监测。
  BC-3860.30.10:
    name: 水库水位运营
    description: |
      按运行曲线管理蓄水和调节水库水位。
  BC-3860.30.20:
    name: 大坝安全监测
    description: |
      按法定大坝安全制度对大坝进行监测和检查。
  BC-3860.30.30:
    name: 水库水质运营
    description: |
      监测和管理原水水质，包括藻类暴发应急处置。
  BC-3860.40:
    name: 水资源规划
    description: |
      开展长期水资源和需求规划，包括供需平衡、气候变化调整和方案评估。
  BC-3860.40.10:
    name: 供需平衡预测
    description: |
      按资源分区进行长期供需预测。
  BC-3860.40.20:
    name: 资源方案评估
    description: |
      对新水源、水量调配和需求管理措施进行方案评估。
  BC-3860.40.30:
    name: 气候变化资源调整
    description: |
      针对气候变化情景调整资源产水量和需求量。
  BC-3860.50:
    name: 干旱与限水管理
    description: |
      通过干旱触发条件、面向客户的用水限制及紧急干旱许可申请，启动干旱应急预案和供水限制。
  BC-3860.50.10:
    name: 干旱触发监测
    description: |
      监测水库、河道和地下水的干旱触发指标。
  BC-3860.50.20:
    name: 干旱限水运营
    description: |
      执行和解除客户用水限制措施。
  BC-3860.50.30:
    name: 干旱许可与命令管理
    description: |
      申请并执行监管机构批准的干旱许可证和命令。
  BC-3860.60:
    name: 取水许可合规
    description: |
      管理取水许可证，并按水量、时间及环境条件上报合规情况。
  BC-3860.60.10:
    name: 取水许可证管理
    description: |
      维护取水许可证档案和条件登记册。
  BC-3860.60.20:
    name: 取水量报告
    description: |
      上报取水量并遵守许可证条件要求。
  BC-3860.60.30:
    name: 最低下泄流量合规
    description: |
      监测取水的最低下泄流量和生态流量条件。
  BC-3860.70:
    name: 水文监测
    description: |
      运营地表水和地下水监测网络，为资源规划和运营决策提供输入数据。
  BC-3860.70.10:
    name: 地表水监测
    description: |
      运营河道流量、水位和降雨量监测网络。
  BC-3860.70.20:
    name: 地下水水位监测
    description: |
      运营地下水观测钻孔网络。
  BC-3860.70.30:
    name: 水文数据质量管理
    description: |
      对水文数据进行质量控制和水位流量关系管理。

    description: |
      Calendario di chiusura del periodo, ratei e certificazioni di chiusura.
  BC-200.10.50:
    name: Riconciliazione dei conti
    description: |
      Riconciliazioni e substantiation dei conti patrimoniali.
  BC-200.20:

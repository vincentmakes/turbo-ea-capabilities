    description: |
      Segnalazione obbligatoria degli eventi ai regolatori.
  BC-1280.40:
    name: Gestione delle indagini sugli eventi
    description: |
      Indagini interne, analisi delle cause radice, lezioni apprese.
  BC-1280.40.10:
    name: Indagine interna sugli eventi

# Управление банковскими рисками (ru) — translations for L1-banking-risk-management.yaml
locale: ru
source: L1-banking-risk-management.yaml
entries:
  BC-1410:
    name: Управление банковскими рисками
    description: |
      Специфические банковские риски — кредитный, рыночный, ликвидности, модельный, риск контрагента.
  BC-1410.10:
    name: Управление кредитным риском банка
    description: |
      Кредитные риск-фреймворки, RWA, стресс-тестирование.
  BC-1410.10.10:
    name: Риск-фреймворк кредитного риска
    description: |
      Определение риск-фреймворка и политик в области кредитного риска.
  BC-1410.10.20:
    name: Расчёт и отчётность RWA
    description: |
      Расчёт и отчётность RWA по стандартизированному подходу и IRB.
  BC-1410.10.30:
    name: Стресс-тестирование кредитного риска
    description: |
      Стресс-тестирование кредитного риска и сценарный анализ.
  BC-1410.10.40:
    name: Управление концентрационным риском
    description: |
      Управление риском концентрации по одному заёмщику, отрасли и стране.
  BC-1410.20:
    name: Управление рыночным риском
    description: |
      VaR, чувствительности, лимиты рыночного риска, FRTB.
  BC-1410.20.10:
    name: Измерение рыночного риска
    description: |
      Измерение VaR, ES и чувствительностей торгового портфеля.
  BC-1410.20.20:
    name: Управление лимитами рыночного риска
    description: |
      Установление и мониторинг лимитов рыночного риска.
  BC-1410.20.30:
    name: Стресс-тестирование рыночного риска
    description: |
      Стрессовое и сценарное тестирование рыночного риска.
  BC-1410.20.40:
    name: Управление внедрением FRTB
    description: |
      Внедрение и эксплуатация стандартизированного подхода и IMA по FRTB.
  BC-1410.30:
    name: Управление операционным риском банка
    description: |
      Фреймворки операционного риска, RCSA, данные о событиях убытков.
  BC-1410.30.10:
    name: Риск-фреймворк операционного риска
    description: |
      Риск-фреймворк, таксономия и политика операционного риска.
  BC-1410.30.20:
    name: Самооценка рисков и контролей
    description: |
      Проведение RCSA и обновление профиля риска.
  BC-1410.30.30:
    name: Фиксация событий убытков операционного риска
    description: |
      Фиксация и классификация событий убытков операционного риска.
  BC-1410.30.40:
    name: Управление ключевыми индикаторами операционного риска
    description: |
      Определение KRI, установление пороговых значений и мониторинг.
  BC-1410.40:
    name: Управление риском ликвидности
    description: |
      Риск-фреймворки ликвидности, стресс-тестирование, экстренное фондирование.
  BC-1410.40.10:
    name: Риск-фреймворк ликвидности
    description: |
      Риск-фреймворк ликвидности, аппетит к риску и политика.
  BC-1410.40.20:
    name: Стресс-тестирование ликвидности
    description: |
      Стрессовые и обратные стресс-тесты специфики ликвидности.
  BC-1410.40.30:
    name: Управление планом экстренного фондирования
    description: |
      Ведение и тестирование плана экстренного фондирования.
  BC-1410.50:
    name: Управление модельным риском
    description: |
      Валидация моделей, корпоративное управление моделями, реестр моделей.
  BC-1410.50.10:
    name: Управление реестром моделей
    description: |
      Ведение корпоративного реестра моделей.
  BC-1410.50.20:
    name: Ранжирование модельного риска
    description: |
      Риск-ориентированное ранжирование моделей для определения приоритетов управления.
  BC-1410.50.30:
    name: Независимая валидация моделей
    description: |
      Независимая валидация моделей в соответствии с SR 11-7 / TRIM.
  BC-1410.50.40:
    name: Мониторинг работы моделей
    description: |
      Постоянный мониторинг работы и перекалибровка моделей.
  BC-1410.60:
    name: Управление риском контрагента
    description: |
      Риск контрагента, CVA, подверженность по деривативам.
  BC-1410.60.10:
    name: Измерение подверженности контрагента
    description: |
      Измерение подверженности контрагента (PFE, EEPE).
  BC-1410.60.20:
    name: Управление CVA и XVA
    description: |
      Управление CVA, DVA, FVA и иными корректировками XVA.
  BC-1410.60.30:
    name: Управление лимитами по контрагентам
    description: |
      Установление и мониторинг лимитов на контрагентов.
  BC-1410.60.40:
    name: Управление риском неправильного направления
    description: |
      Выявление и управление специфическим и общим риском неправильного направления.

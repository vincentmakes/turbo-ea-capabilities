# Управление авиационной метеорологией (ru) — translations for L1-aeronautical-meteorology-management.yaml
locale: ru
source: L1-aeronautical-meteorology-management.yaml
entries:
  BC-1250:
    name: Управление авиационной метеорологией
    description: |
      Метеорологические наблюдения, прогнозирование, брифинги, сервисы предупреждения об опасных явлениях погоды.
  BC-1250.10:
    name: Управление метеорологическими наблюдениями
    description: |
      METAR, автоматические наблюдения, сети датчиков, наземные наблюдения.
  BC-1250.10.10:
    name: Наземные метеорологические наблюдения
    description: |
      Ручные и автоматические наземные метеорологические наблюдения на аэродромах.
  BC-1250.10.20:
    name: Подготовка METAR и SPECI
    description: |
      Подготовка и распространение METAR и SPECI.
  BC-1250.10.30:
    name: Управление сетью метеорологических датчиков
    description: |
      Эксплуатация автоматических метеорологических систем наблюдения и датчиков.
  BC-1250.20:
    name: Управление метеорологическим прогнозированием
    description: |
      TAF, районные прогнозы, SIGMET, AIRMET, GAMET.
  BC-1250.20.10:
    name: Подготовка аэродромных прогнозов
    description: |
      Подготовка TAF и прогнозов по тенденции для аэродромов.
  BC-1250.20.20:
    name: Подготовка районных прогнозов
    description: |
      Подготовка районных прогнозов, GAMET и прогнозов значительной погоды.
  BC-1250.20.30:
    name: Выпуск SIGMET и AIRMET
    description: |
      Выпуск предупреждений SIGMET и AIRMET.
  BC-1250.30:
    name: Управление метеорологическими брифингами и консультациями
    description: |
      Предполётные брифинги, консультации для органов ОВД, консультации в полёте.
  BC-1250.30.10:
    name: Предполётный брифинг
    description: |
      Предоставление сервисов самостоятельного и вспомогательного предполётного брифинга.
  BC-1250.30.20:
    name: Метеорологические консультации для органов ОВД
    description: |
      Предоставление метеорологических консультаций органам ОВД и дежурным руководителям.
  BC-1250.30.30:
    name: Метеорологические консультации в полёте
    description: |
      Метеорологические консультации для пользователей воздушного пространства в полёте.
  BC-1250.40:
    name: Управление опасными метеорологическими явлениями
    description: |
      Консультации по вулканическому пеплу, опасные явления погоды, космическая погода.
  BC-1250.40.10:
    name: Сервис консультаций по вулканическому пеплу
    description: |
      Координация с VAAC и распространение консультаций по вулканическому пеплу.
  BC-1250.40.20:
    name: Сервис предупреждений об опасных явлениях погоды
    description: |
      Выпуск предупреждений об опасных явлениях погоды (CB, турбулентность, обледенение).
  BC-1250.40.30:
    name: Сервис консультаций о космической погоде
    description: |
      Консультации о космической погоде в соответствии с требованиями ICAO.
metadata:
  status: draft
  reviewer: pending

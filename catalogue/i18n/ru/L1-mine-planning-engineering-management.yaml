# Планирование и инженерное обеспечение горных работ (ru) — translations for L1-mine-planning-engineering-management.yaml
locale: ru
source: L1-mine-planning-engineering-management.yaml
entries:
  BC-4420:
    name: Планирование и инженерное обеспечение горных работ
    description: |
      Стратегическое, долгосрочное и краткосрочное планирование горных
      работ, а также горно-техническое, геотехническое и гидрогеологическое
      инженерное обеспечение, переводящее ресурсы в исполнимые планы добычи.

  BC-4420.10:
    name: Стратегическое планирование горных работ
    description: |
      Определение стратегии отработки месторождения на весь срок службы,
      выбор системы разработки, контуров карьера и очерёдности реализации
      капитальных проектов.
    in_scope:
      - Генеральный план горных работ и контуры карьера
      - Выбор системы подземной разработки
      - Очерёдность и согласование капитальных проектов
    out_of_scope:
      - Бюджетное планирование годового производства (BC-4420.20)

  BC-4420.10.10:
    name: Долгосрочный план горного предприятия
    description: |
      Определение стратегии извлечения запасов, последовательности и
      капитального бюджета на весь срок службы месторождения.

  BC-4420.10.20:
    name: Оптимизация контура карьера
    description: |
      Оптимизация контура карьера методом Лерша–Гроссмана и аналогичными
      методами с учётом экономических и геотехнических параметров.

  BC-4420.10.30:
    name: Выбор системы подземной разработки
    description: |
      Выбор систем подземной разработки — блокового обрушения, подэтажного
      обрушения или камерной системы — исходя из морфологии рудного тела.

  BC-4420.10.40:
    name: Очерёдность реализации капитальных проектов
    description: |
      Определение последовательности крупных капитальных проектов на весь
      срок службы горного предприятия.

  BC-4420.20:
    name: Долгосрочное планирование горных работ
    description: |
      Годовое и многолетнее производственное планирование, стратегия
      управления рудными складами и планирование горного оборудования.

  BC-4420.20.10:
    name: Разработка годового производственного плана
    description: |
      Формирование годового производственного плана горного предприятия
      и бюджета.

  BC-4420.20.20:
    name: Планирование рудных складов
    description: |
      Многолетняя стратегия формирования, расходования и перебуртовки
      рудных складов.

  BC-4420.20.30:
    name: Стратегия бортового содержания
    description: |
      Стратегия изменяемого во времени бортового содержания на протяжении
      всего срока службы месторождения.

  BC-4420.20.40:
    name: Планирование горного оборудования
    description: |
      Долгосрочное планирование замены горного флота и приобретения
      нового основного оборудования.

  BC-4420.30:
    name: Краткосрочное планирование горных работ
    description: |
      Квартальное, недельное и посменное планирование горных работ,
      определяющее исполнение производственного плана и управление
      качеством руды.

  BC-4420.30.10:
    name: Квартальное планирование производства
    description: |
      Подготовка квартального производственного плана в увязке с годовым
      планом.

  BC-4420.30.20:
    name: Недельное планирование горных работ
    description: |
      Разработка недельного плана горных работ по уступам, очистным
      блокам и оборудованию.

  BC-4420.30.30:
    name: Сменное диспетчерское планирование
    description: |
      Посменное планирование назначения горного флота на рабочие забои.

  BC-4420.30.40:
    name: Планирование оперативного контроля качества
    description: |
      Планирование опробования и маршрутизации рудных блоков в рамках
      оперативного контроля качества.

  BC-4420.40:
    name: Горно-техническое проектирование
    description: |
      Инженерное проектирование карьеров, подземных горных выработок,
      буровзрывных паспортов, карьерных дорог и вентиляции.

  BC-4420.40.10:
    name: Проектирование открытого карьера
    description: |
      Проектирование уступов, съездов и контуров карьера для открытой
      разработки.

  BC-4420.40.20:
    name: Проектирование подземных горных выработок
    description: |
      Проектирование штреков, уклонов, стволов и очистных камер для
      подземной разработки.

  BC-4420.40.30:
    name: Проектирование буровзрывных работ
    description: |
      Разработка схем расположения скважин, величин зарядов и схем
      инициирования для производственных взрывных работ.

  BC-4420.40.40:
    name: Проектирование карьерных дорог
    description: |
      Геометрическое и конструктивное проектирование сети карьерных дорог.

  BC-4420.40.50:
    name: Проектирование вентиляции и инженерных систем
    description: |
      Инженерное проектирование вентиляции, водоотлива, электроснабжения
      и пневмоснабжения подземных горных работ.

  BC-4420.50:
    name: Геотехническая инженерия
    description: |
      Геотехническое инженерное обеспечение устойчивости откосов, крепления
      горных выработок и управления геотехническими опасностями при
      открытой и подземной разработке.

  BC-4420.50.10:
    name: Инженерный анализ устойчивости откосов
    description: |
      Анализ устойчивости откосов и проектирование бортов карьера для
      открытых горных работ.

  BC-4420.50.20:
    name: Проектирование крепления подземных выработок
    description: |
      Проектирование анкерного, сетчатого, набрызгбетонного и канатного
      крепления подземных выработок.

  BC-4420.50.30:
    name: Программа геотехнического мониторинга
    description: |
      Разработка программ геотехнического мониторинга с определением
      плотности датчиков, пороговых значений и периодичности контроля.

  BC-4420.50.40:
    name: Оценка геотехнических опасностей
    description: |
      Оценка рисков обрушения горных пород, сейсмической активности и
      оседания в зонах горных работ.

  BC-4420.60:
    name: Горная гидрогеология
    description: |
      Гидрогеологическое инженерное обеспечение, включая моделирование
      подземных вод, проектирование систем водоотлива и водный баланс.

  BC-4420.60.10:
    name: Моделирование подземных вод
    description: |
      Численное моделирование поведения подземных вод в пределах
      горного отвода.

  BC-4420.60.20:
    name: Проектирование системы водоотлива
    description: |
      Инженерное проектирование систем водоотлива карьера и подземных
      горных выработок.

  BC-4420.60.30:
    name: Моделирование водного баланса
    description: |
      Моделирование общего водного баланса объекта для целей
      эксплуатации и ликвидации.


# Управление пусконаладкой инженерных систем зданий (ru) — translations for L1-building-systems-commissioning-management.yaml
locale: ru
source: L1-building-systems-commissioning-management.yaml
entries:
  BC-2050:
    name: Управление пусконаладкой инженерных систем зданий
    description: |
      Пусконаладка систем ОВКВ и BAS как сервисный результат — первоначальная пусконаладка, ретропусконаладка, повторная пусконаладка и пусконаладка на основе мониторинга. Основана на процессе комплексной пусконаладки зданий ASHRAE Guideline 0 / Guideline 1.1.
    in_scope:
      - Проверка требований заказчика к проекту и основания для проектирования
      - Предфункциональная верификация монтажа и предпусковая инспекция
      - Функциональные испытания характеристик систем ОВКВ и BAS
      - Верификация последовательностей управления и комплексные испытания систем
      - Ретропусконаладка, повторная пусконаладка и пусконаладка на основе мониторинга
      - Пусконаладочная документация, эксплуатационные руководства и обучение заказчика
    out_of_scope:
      - Инженерная интеграция на уровне проекта (BC-2020)
      - Текущие сервисные операции после передачи объекта (BC-2060)
      - Общая пусконаладка капитальных установок инженерного проекта (BC-1160)
  BC-2050.10:
    name: Планирование и определение объёма пусконаладки
    description: |
      Формирование программы, объёма и приёмочной основы пусконаладки для проекта.
  BC-2050.10.10:
    name: Проверка требований заказчика к проекту
    description: |
      Проверка требований заказчика к проекту как базовой линии пусконаладки.
  BC-2050.10.20:
    name: Проверка основания для проектирования
    description: |
      Проверка основания для проектирования на соответствие требованиям заказчика.
  BC-2050.10.30:
    name: Разработка плана пусконаладки
    description: |
      Разработка плана пусконаладки, определяющего объём, роли и критерии приёмки.
  BC-2050.10.40:
    name: Реестр рисков пусконаладки
    description: |
      Ведение реестра рисков пусконаладки в ходе выполнения работ.
  BC-2050.20:
    name: Управление предфункциональной инспекцией
    description: |
      Верификация полноты монтажа и готовности к пуску перед функциональными испытаниями.
  BC-2050.20.10:
    name: Контрольные листы верификации монтажа
    description: |
      Выполнение контрольных листов верификации монтажа.
  BC-2050.20.20:
    name: Предпусковая инспекция
    description: |
      Инспекция пуска оборудования в соответствии с требованиями производителя.
  BC-2050.20.30:
    name: Регистрация предфункциональных замечаний
    description: |
      Регистрация предфункциональных замечаний в журнале пусконаладки.
  BC-2050.20.40:
    name: Подписание предфункциональной готовности
    description: |
      Подтверждение достижения предфункциональной готовности.
  BC-2050.30:
    name: Функциональные испытания характеристик
    description: |
      Функциональные испытания характеристик подсистем ОВКВ и BAS по задокументированным критериям.
  BC-2050.30.10:
    name: Разработка сценариев испытаний
    description: |
      Разработка сценариев функциональных испытаний согласно проектному замыслу.
  BC-2050.30.20:
    name: Проведение и наблюдение испытаний
    description: |
      Проведение и наблюдение функциональных испытаний систем ОВКВ и BAS.
  BC-2050.30.30:
    name: Устранение замечаний по испытаниям
    description: |
      Устранение замечаний, выявленных в ходе функциональных испытаний.
  BC-2050.30.40:
    name: Утверждение результатов испытаний
    description: |
      Утверждение результатов испытаний и закрытие тест-кейсов.
  BC-2050.40:
    name: Верификация последовательностей управления
    description: |
      Верификация запрограммированных последовательностей управления относительно проектных последовательностей.
  BC-2050.40.10:
    name: Проверка логики управления
    description: |
      Проверка логики управления по разработанным последовательностям.
  BC-2050.40.20:
    name: Верификация уставок и режимов
    description: |
      Верификация уставок и рабочих режимов по расписаниям.
  BC-2050.40.30:
    name: Испытания блокировок и отказоустойчивых режимов
    description: |
      Испытания путей блокировок и поведения в отказоустойчивых режимах.
  BC-2050.40.40:
    name: Верификация на основе трендов
    description: |
      Использование данных трендов для верификации характеристик последовательностей во времени.
  BC-2050.50:
    name: Комплексные испытания систем
    description: |
      Испытания интегрированного поведения различных систем ОВКВ, противопожарной защиты и электрических систем.
  BC-2050.50.10:
    name: Испытание интеграции с системами пожарной и жизнеобеспечивающей безопасности
    description: |
      Комплексные испытания взаимодействия ОВКВ с системами пожарной и жизнеобеспечивающей безопасности.
  BC-2050.50.20:
    name: Испытание систем дымоудаления и подпора воздуха
    description: |
      Испытания последовательностей дымоудаления и подпора воздуха.
  BC-2050.50.30:
    name: Испытание при отключении питания и сбросе нагрузки
    description: |
      Испытания поведения ОВКВ при отключении питания и событиях сброса нагрузки.
  BC-2050.50.40:
    name: Испытание интеграции сети здания
    description: |
      Комплексные испытания BAS и смежных ИТ-сетей здания.
  BC-2050.60:
    name: Ретропусконаладка и повторная пусконаладка
    description: |
      Пусконаладка для существующих зданий и в виде периодических циклов повторной пусконаладки.
  BC-2050.60.10:
    name: Обследование существующего здания
    description: |
      Обследование характеристик существующего здания на соответствие актуальным требованиям.
  BC-2050.60.20:
    name: Анализ разрывов в характеристиках
    description: |
      Анализ разрывов в характеристиках и первопричин в существующих зданиях.
  BC-2050.60.30:
    name: Реализация мероприятий ретропусконаладки
    description: |
      Реализация мероприятий ретропусконаладки на существующих системах.
  BC-2050.60.40:
    name: Выполнение цикла повторной пусконаладки
    description: |
      Выполнение периодических циклов повторной пусконаладки для поддержания характеристик.
  BC-2050.70:
    name: Пусконаладка на основе мониторинга
    description: |
      Непрерывная, управляемая данными пусконаладка с использованием КИП и телеметрии.
  BC-2050.70.10:
    name: План мониторинга и КИП
    description: |
      Разработка планов мониторинга и выбор вспомогательного КИП.
  BC-2050.70.20:
    name: Непрерывное отслеживание характеристик здания
    description: |
      Непрерывное отслеживание характеристик здания для целей пусконаладки.
  BC-2050.70.30:
    name: Расследование аномалий
    description: |
      Расследование выявленных аномалий на основе непрерывных трендов.
  BC-2050.70.40:
    name: Верификация устойчивости характеристик
    description: |
      Верификация сохранения достигнутых характеристик во времени.
  BC-2050.80:
    name: Документирование и завершение пусконаладки
    description: |
      Подготовка пусконаладочных поставляемых документов и официальное закрытие объёма пусконаладки.
  BC-2050.80.10:
    name: Разработка пусконаладочного отчёта
    description: |
      Разработка итогового пусконаладочного отчёта.
  BC-2050.80.20:
    name: Составление эксплуатационного руководства
    description: |
      Составление эксплуатационного руководства для обслуживающего персонала заказчика.
  BC-2050.80.30:
    name: Проведение обучения заказчика
    description: |
      Проведение обучения заказчика работе со сданными системами.
  BC-2050.80.40:
    name: Окончательное подписание и передача
    description: |
      Окончательное подписание пусконаладки и передача в эксплуатацию.

# Управление системной интеграцией ОВКВ (ru) — translations for L1-hvac-system-integration-management.yaml
locale: ru
source: L1-hvac-system-integration-management.yaml
entries:
  BC-2020:
    name: Управление системной интеграцией ОВКВ
    description: |
      Инженерия интегрированных решений ОВКВ и BAS для конкретного здания на уровне проекта — расчёт нагрузок, выбор оборудования, принципиальное проектирование, список точек BAS и архитектура, разработка последовательностей управления, координация BIM/MEP, проектные спецификации, управление комплектами документации и инженерная поддержка на объекте.
    in_scope:
      - Расчёты нагрузок и выбор оборудования для конкретного здания
      - Принципиальное проектирование механических, гидравлических и холодильных систем в масштабе проекта
      - Списки точек BAS, сетевая топология и размещение панелей для проектов
      - Разработка последовательностей управления для конкретного проекта
      - Координация BIM, проектные спецификации и управление комплектами документации
    out_of_scope:
      - Инженерия продуктов оборудования (BC-2000) и инженерия продуктов BAS (BC-2010)
      - Межотраслевая практика MEP (BC-1100)
      - Выполнение пусконаладки (BC-2050)
      - Общее управление инженерными проектами (BC-1110)

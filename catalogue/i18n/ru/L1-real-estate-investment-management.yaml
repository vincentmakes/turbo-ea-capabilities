# Управление инвестициями в недвижимость (ru) — translations for L1-real-estate-investment-management.yaml
locale: ru
source: L1-real-estate-investment-management.yaml
entries:
  BC-4910:
    name: Управление инвестициями в недвижимость
    description: |
      Дисциплина инвестиционного дома и фондовой стороны в части
      стратегии, привлечения капитала, пайплайна, управления решениями,
      построения портфеля, отношений с инвесторами и результатов
      деятельности на уровне фонда для инвестиционных инструментов в
      недвижимость, включая REIT, нелистинговые фонды, раздельные счета
      и программы совместных предприятий.
    in_scope:
      - Определение фонда / мандата и инвестиционной политики
      - Привлечение капитала, формирование фонда и подписка
      - Пайплайн инвестиций и поиск сделок по прямым и косвенным каналам
      - Управление инвестиционным комитетом и условия согласования
      - Построение портфеля, распределение и ребалансировка
      - Отчётность для LP, запросы на капитал, распределения и подача в INREV/NCREIF/EPRA
      - Расчёт NAV, атрибуция результатов и расчёты водопадного распределения
    out_of_scope:
      - Бизнес-планы и капвложения по отдельным активам (BC-4920)
      - Исполнение сделок по приобретению и продаже (BC-4930)
      - Исполнение сделок на рынках долгового и акционерного капитала (BC-4980)
      - Корпоративное казначейство и общие отношения с инвесторами (BC-210, BC-240)
  BC-4910.10:
    name: Управление инвестиционной стратегией и мандатом
    description: |
      Разработка и поддержание инвестиционной стратегии, мандатов
      фондов, секторального и географического таргетинга и
      соотношения риска и доходности для управляемых инструментов.
  BC-4910.10.10:
    name: Определение фонда и мандата
    description: |
      Определение мандатов фонда или раздельного счёта, включая
      сектор, географию, стиль и ограничения.
  BC-4910.10.20:
    name: Секторальное и географическое распределение
    description: |
      Установление и пересмотр целевых показателей секторального и
      географического распределения по инструментам.
  BC-4910.10.30:
    name: Таргетинг соотношения риска и доходности
    description: |
      Таргетинг профилей риска и доходности по стилевым ячейкам
      (core, core-plus, value-add, opportunistic) и бенчмарку.
  BC-4910.10.40:
    name: Поддержание инвестиционной политики
    description: |
      Поддержание заявлений об инвестиционной политике, исключений и
      согласий инвесторов.
  BC-4910.20:
    name: Привлечение капитала и формирование фонда
    description: |
      Формирование инвестиционных инструментов и привлечение
      инвесторского капитала, включая структурирование, маркетинг и
      закрытие.
  BC-4910.20.10:
    name: Структурирование фонда и создание инструмента
    description: |
      Структурирование и создание фондовых инструментов, фидеров,
      блокеров и налогово-эффективных холдинговых структур.
  BC-4910.20.20:
    name: Таргетинг инвесторов и подписка
    description: |
      Таргетинг сегментов инвесторов, ответы на запросы по Due Diligence
      и обработка подписки.
  BC-4910.20.30:
    name: Управление закрытием фонда
    description: |
      Управление первым, промежуточными и финальным закрытиями,
      включая выравнивание поздних инвесторов.
  BC-4910.20.40:
    name: Управление со-инвестициями и параллельными инструментами
    description: |
      Инициирование и управление предложениями со-инвестиций и
      параллельными инструментами.
  BC-4910.30:
    name: Пайплайн инвестиций и поиск сделок
    description: |
      Инициирование и отбор инвестиционных возможностей по прямым
      приобретениям, косвенным долям и каналам СП для фондов.
  BC-4910.30.10:
    name: Инициирование прямых сделок
    description: |
      Инициирование возможностей прямого инвестирования в активы и
      портфели в соответствии с мандатами.
  BC-4910.30.20:
    name: Поиск косвенных сделок и со-инвестиций
    description: |
      Поиск косвенных долей, включая вторичный рынок, доли фондов и
      со-инвестиции.
  BC-4910.30.30:
    name: Темп пайплайна и распределение
    description: |
      Управление темпом пайплайна в соответствии с планами размещения
      фонда и распределением по инструментам.
  BC-4910.40:
    name: Управление инвестиционными решениями и согласованием
    description: |
      Управление инвестиционным комитетом, рабочие процессы согласования
      и отслеживание условий согласования новых инвестиций.
  BC-4910.40.10:
    name: Подготовка инвестиционного меморандума
    description: |
      Подготовка инвестиционных меморандумов для рассмотрения
      комитетом, охватывающих тезис, условия и риски.
  BC-4910.40.20:
    name: Управление инвестиционным комитетом
    description: |
      Управление процессом инвестиционного комитета, кворумом и
      фиксацией решений.
  BC-4910.40.30:
    name: Отслеживание условий согласования
    description: |
      Отслеживание предварительных и последующих условий, приложенных
      к инвестиционным согласованиям.
  BC-4910.50:
    name: Построение и распределение портфеля
    description: |
      Построение и постоянная ребалансировка портфелей фондов в
      соответствии с мандатом, уровнем долга и целевыми показателями
      риска.
  BC-4910.50.10:
    name: Моделирование портфеля
    description: |
      Моделирование состава портфеля, диверсификации по vintages и
      прогнозируемых результатов.
  BC-4910.50.20:
    name: Секторальная и географическая ребалансировка
    description: |
      Ребалансировка секторального и географического состава портфеля
      через приобретения и продажи.
  BC-4910.50.30:
    name: Таргетинг долга и хеджирования
    description: |
      Таргетинг и мониторинг долгового плеча портфеля и политик
      хеджирования валютного курса и процентных ставок.
  BC-4910.60:
    name: Отношения с инвесторами и отчётность
    description: |
      Коммуникации с ограниченными партнёрами и листинговыми
      инвесторами, исполнение запросов на капитал и распределений и
      подача в отраслевые индексы.
  BC-4910.60.10:
    name: Запросы на капитал и распределения
    description: |
      Выставление запросов на капитал и исполнение распределений,
      включая возврат капитала.
  BC-4910.60.20:
    name: Отчётность и раскрытие информации для LP
    description: |
      Ежеквартальная и годовая отчётность для ограниченных партнёров,
      охватывающая результаты, NAV и раскрытие информации.
  BC-4910.60.30:
    name: Подача данных в индексы и бенчмарки
    description: |
      Подача данных в NCREIF, INREV, EPRA и региональные бенчмарки для
      сопоставимости результатов.
  BC-4910.60.40:
    name: Ежегодные встречи с инвесторами
    description: |
      Проведение ежегодных встреч с инвесторами, консультативных
      советов и дней инвестора.
  BC-4910.70:
    name: Управление результатами фонда и NAV
    description: |
      Расчёт NAV фонда, атрибуция результатов и водопадное
      распределение управленческих и поощрительных вознаграждений,
      включая кристаллизацию кэрри.
  BC-4910.70.10:
    name: NAV и юнит-прайсинг
    description: |
      Расчёт NAV фонда и юнит-прайсинга в рамках периодического
      оценочного цикла.
  BC-4910.70.20:
    name: Атрибуция результатов
    description: |
      Атрибуция результатов фонда по активам, секторам, географии и
      вкладу валют.
  BC-4910.70.30:
    name: Расчёт вознаграждений и кэрри
    description: |
      Расчёт управленческих вознаграждений и кэрри-интереса в
      соответствии с экономическими условиями LPA.
  BC-4910.70.40:
    name: Расчёт хёрдла и водопадного распределения
    description: |
      Расчёт хёрдлов привилегированной доходности и водопадного
      распределения для каждого инструмента.

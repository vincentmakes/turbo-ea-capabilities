# Клиническая документация (ru) — translations for L1-clinical-documentation-management.yaml
locale: ru
source: L1-clinical-documentation-management.yaml
entries:
  BC-2830:
    name: Клиническая документация
    description: |
      Клиническая документация, компьютеризированный ввод назначений, просмотр результатов, поддержка принятия решений, улучшение документации и рабочие процессы EHR, лежащие в основе активной медицинской карты пациента.
  BC-2830.10:
    name: Клинические заметки
    description: |
      Составление клинических заметок по типам приёма с использованием нарративных, структурированных, голосовых и автоматизированных методов ввода.
  BC-2830.10.10:
    name: Составление историй болезни
    description: |
      Составление стационарных и амбулаторных историй болезни.
  BC-2830.10.20:
    name: Составление протоколов операций
    description: |
      Составление операционных и процедурных протоколов.
  BC-2830.10.30:
    name: Составление выписных эпикризов
    description: |
      Составление выписных и переводных эпикризов.
  BC-2830.10.40:
    name: Голосовая и автоматизированная документация
    description: |
      Рабочие процессы диктовки и автоматизированного захвата документации.
  BC-2830.20:
    name: Компьютеризированный ввод назначений
    description: |
      Ввод назначений на лекарственные препараты, диагностику и процедуры, включая наборы назначений и клинические протоколы.
  BC-2830.20.10:
    name: Ввод лекарственных назначений
    description: |
      Ввод назначений лекарственных препаратов с указанием дозы, пути введения и кратности.
  BC-2830.20.20:
    name: Ввод диагностических назначений
    description: |
      Ввод направлений на лабораторные, инструментальные и иные диагностические исследования.
  BC-2830.20.30:
    name: Ввод процедурных назначений
    description: |
      Ввод назначений на процедуры и консультации.
  BC-2830.20.40:
    name: Использование наборов назначений и протоколов
    description: |
      Использование стандартизированных наборов назначений, планов мощности и клинических протоколов.
  BC-2830.30:
    name: Просмотр и подтверждение результатов
    description: |
      Маршрутизация, просмотр и подтверждение результатов диагностики, управление уведомлениями о критических значениях.
  BC-2830.30.10:
    name: Уведомление и маршрутизация результатов
    description: |
      Маршрутизация результатов к назначившим и дежурным врачам.
  BC-2830.30.20:
    name: Подтверждение результатов врачом
    description: |
      Просмотр и подтверждение полученных результатов врачом.
  BC-2830.30.30:
    name: Передача критических результатов
    description: |
      Своевременная передача критических и паник-значений результатов.
  BC-2830.30.40:
    name: Анализ динамики результатов
    description: |
      Анализ динамики результатов и продольных данных в медицинской карте.
  BC-2830.40:
    name: Клиническая поддержка принятия решений
    description: |
      Клиническая поддержка принятия решений в режиме реального времени: предупреждения, маршруты, оценки риска и рекомендации по лучшим практикам.
  BC-2830.40.10:
    name: Предупреждения о лекарственных взаимодействиях
    description: |
      Предупреждения о лекарственных взаимодействиях, аллергиях и болезнях.
  BC-2830.40.20:
    name: Руководство по клиническим маршрутам
    description: |
      Поддержка принятия решений на основе маршрутов и руководств в точке помощи.
  BC-2830.40.30:
    name: Отображение оценок риска
    description: |
      Отображение клинических оценок риска, включая предикторы ухудшения и сепсиса.
  BC-2830.40.40:
    name: Управление рекомендациями по лучшим практикам
    description: |
      Разработка, настройка и управление рекомендациями по лучшим практикам.
  BC-2830.50:
    name: Улучшение клинической документации
    description: |
      Текущая и ретроспективная проверка, запросы и обучающие программы для повышения полноты и специфичности документации.
  BC-2830.50.10:
    name: Текущая проверка документации
    description: |
      Текущая проверка стационарной документации на клиническую точность и специфичность.
  BC-2830.50.20:
    name: Управление запросами к врачу
    description: |
      Формирование и отслеживание корректных запросов по клинической документации.
  BC-2830.50.30:
    name: Аудит качества документации
    description: |
      Аудит качества клинической документации и влияния на индекс структуры случаев.
  BC-2830.50.40:
    name: Обучение врачей по документации
    description: |
      Обучение врачей стандартам документации и возможностям улучшения.
  BC-2830.60:
    name: Управление рабочими процессами EHR
    description: |
      Клинические рабочие процессы электронной медицинской карты: входящие, задачи, закрытие приёмов и управление передачами.
  BC-2830.60.10:
    name: Входящие и управление задачами
    description: |
      Управление входящими сообщениями, задачами и очередями дел клинициста.
  BC-2830.60.20:
    name: Закрытие приёма
    description: |
      Закрытие приёма, включая кодирование, выставление счёта и завершение документации.
  BC-2830.60.30:
    name: Документация при передаче дежурства
    description: |
      Рабочие процессы документации при смене дежурного врача и при работе на подмену.
  BC-2830.60.40:
    name: Управление списком пациентов и передачами
    description: |
      Управление списками пациентов и структурированной документацией при передаче между сменами.

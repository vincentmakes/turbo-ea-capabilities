# Инженерия химических процессов (ru) — translations for L1-chemical-process-engineering-management.yaml
locale: ru
source: L1-chemical-process-engineering-management.yaml
entries:
  BC-4610:
    name: Инженерия химических процессов
    description: |
      Проектирование процессов, инженерия материальных и энергетических балансов,
      моделирование, спецификация оборудования и предпроектное инжиниринговое
      обеспечение химических установок и реконструкций.
  BC-4610.10:
    name: Разработка технологической схемы
    description: |
      Разработка блок-схем, технологических схем и схем трубопроводов и
      приборов для химических процессов.
  BC-4610.10.10:
    name: Разработка блок-схем
    description: |
      Составление блок-схем для раннего определения процесса.
  BC-4610.10.20:
    name: Разработка технологических схем
    description: |
      Составление технологических схем с параметрами и свойствами потоков.
  BC-4610.10.30:
    name: Разработка схем трубопроводов и приборов
    description: |
      Разработка и обновление схем трубопроводов и приборов химических
      технологических узлов.
  BC-4610.10.40:
    name: Разработка схем вспомогательных систем
    description: |
      Составление схем вспомогательных систем по пару, охлаждающей воде и
      инертному газу.
  BC-4610.20:
    name: Подбор оборудования реакторов и разделения
    description: |
      Подбор реакторов и разделительного оборудования по кинетике,
      термодинамике и принципам единичных операций.
  BC-4610.20.10:
    name: Проектирование реакторов
    description: |
      Подбор и компоновка реакторов с мешалкой, идеального вытеснения и
      неподвижного слоя.
  BC-4610.20.20:
    name: Проектирование ректификационных колонн
    description: |
      Проектирование тарельчатых и насадочных ректификационных колонн,
      включая внутренние устройства.
  BC-4610.20.30:
    name: Проектирование теплообменных сетей
    description: |
      Пинч-анализ и проектирование теплообменных сетей для энергетической
      интеграции.
  BC-4610.20.40:
    name: Подбор кристаллизаторов и фильтров
    description: |
      Подбор кристаллизаторов, центрифуг и фильтрационного оборудования.
  BC-4610.30:
    name: Инженерия материальных и энергетических балансов
    description: |
      Замыкание суммарных и поузловых материальных и энергетических балансов,
      а также оценка потребности в коммунальных ресурсах.
  BC-4610.30.10:
    name: Расчёт материального баланса
    description: |
      Расчёт и согласование материальных балансов по установке и узлам.
  BC-4610.30.20:
    name: Расчёт энергетического баланса
    description: |
      Расчёт энергетических балансов по реакторам, теплообменникам и
      вспомогательным системам.
  BC-4610.30.30:
    name: Оценка потребности в коммунальных ресурсах
    description: |
      Оценка потребности в паре, электроэнергии, охлаждающей воде и инертном
      газе.
  BC-4610.40:
    name: Управление моделированием процессов
    description: |
      Создание и сопровождение стационарных и динамических моделей процессов
      для проектирования и эксплуатации.
  BC-4610.40.10:
    name: Стационарное моделирование процессов
    description: |
      Создание и запуск стационарных симуляторов для проектирования и анализа.
  BC-4610.40.20:
    name: Динамическое моделирование процессов
    description: |
      Создание и запуск динамических симуляторов для исследований управления
      и безопасности.
  BC-4610.40.30:
    name: Валидация моделей моделирования
    description: |
      Валидация моделей симуляторов по данным промышленных или опытных установок.
  BC-4610.50:
    name: Управление спецификациями оборудования
    description: |
      Разработка и управление жизненным циклом технических листов данных и
      чертежей поставщиков.
  BC-4610.50.10:
    name: Составление технических листов данных
    description: |
      Составление механических, электрических и приборных листов данных.
  BC-4610.50.20:
    name: Поддержание спецификаций оборудования
    description: |
      Конфигурационное управление утверждёнными спецификациями оборудования.
  BC-4610.50.30:
    name: Проверка чертежей поставщиков
    description: |
      Проверка чертежей поставщиков на соответствие листам данных и требованиям
      процесса.
  BC-4610.60:
    name: Планировка установки и разработка генерального плана
    description: |
      Определение генеральных планов, расстояний между оборудованием и
      классификации взрывоопасных зон для химических объектов.
  BC-4610.60.10:
    name: Разработка генерального плана
    description: |
      Разработка поузловых и общеплощадочных генеральных планов.
  BC-4610.60.20:
    name: Определение расстояний между оборудованием
    description: |
      Определение расстояний между оборудованием по требованиям промышленной
      безопасности и условиям строительства.
  BC-4610.60.30:
    name: Классификация взрывоопасных зон
    description: |
      Классификация взрывоопасных зон для управления источниками зажигания.
  BC-4610.70:
    name: Разработка концепции управления процессом
    description: |
      Определение стратегий управления процессом, расширенного управления
      и основ рабочих инструкций для новых и модернизируемых установок.
  BC-4610.70.10:
    name: Определение контуров управления
    description: |
      Определение регуляторных контуров управления и настроечных параметров.
  BC-4610.70.20:
    name: Стратегия расширенного управления процессом
    description: |
      Определение стратегий управления с прогностической моделью и
      расширенного управления.
  BC-4610.70.30:
    name: Разработка основ рабочих инструкций
    description: |
      Разработка основ рабочих инструкций для новых и модернизируемых установок.
  BC-4610.80:
    name: Координация предпроектного инжиниринга
    description: |
      Координация концептуальных, базовых и предпроектных инжиниринговых
      комплектов для химических проектов.
  BC-4610.80.10:
    name: Координация концептуального инжиниринга
    description: |
      Координация концептуальных инжиниринговых исследований и предварительного
      отбора вариантов.
  BC-4610.80.20:
    name: Разработка базового инжинирингового пакета
    description: |
      Разработка базовых инжиниринговых пакетов, передаваемых на детальное
      проектирование.
  BC-4610.80.30:
    name: Верификация FEED
    description: |
      Верификация материалов FEED на соответствие требованиям процесса и
      проекта.

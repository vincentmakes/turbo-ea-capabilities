# Управление операциями автономного вождения (ru) — translations for L1-autonomous-driving-operations-management.yaml
locale: ru
source: L1-autonomous-driving-operations-management.yaml
entries:
  BC-3470:
    name: Управление операциями автономного вождения
    description: |
      Оперативное управление парками автоматизированного вождения —
      управление областью операционного применения, библиотеки сценариев,
      кейс безопасности ADS, симуляционная и дорожная валидация, телеуправление
      и взаимодействие с регуляторами по разрешениям и отчётности об инцидентах
      на основе ISO 21448, SAE J3016 и UN R157.
  BC-3470.10:
    name: Управление областью операционного применения
    description: |
      Определение, мониторинг соответствия и управление жизненным циклом
      области операционного применения для каждой функции автоматизированного вождения.
  BC-3470.10.10:
    name: Управление определением ODD
    description: |
      Определение области операционного применения, включая географические,
      экологические и поведенческие границы.
  BC-3470.10.20:
    name: Мониторинг соответствия ODD
    description: |
      Мониторинг эксплуатационного соответствия ODD и обнаружение
      операций за пределами определённой области.
  BC-3470.10.30:
    name: Управление обновлением границ ODD
    description: |
      Управление расширениями и ограничениями ODD на протяжении
      жизненного цикла, включая одобрение и развёртывание.
  BC-3470.20:
    name: Управление каталогом сценариев вождения и испытаний
    description: |
      Ведение библиотеки сценариев вождения и каталога испытаний,
      используемых для разработки, симуляции и валидации систем автоматизированного вождения.
  BC-3470.20.10:
    name: Ведение библиотеки сценариев
    description: |
      Ведение структурированных библиотек сценариев, используемых
      для проектирования и валидации ADS.
  BC-3470.20.20:
    name: Захват и сортировка пограничных случаев
    description: |
      Захват, сортировка и приоритизация пограничных случаев,
      наблюдаемых при симуляции, испытаниях и в эксплуатации.
  BC-3470.20.30:
    name: Отчётность об охвате сценариев
    description: |
      Отчётность об охвате сценариев и остаточных пробелах
      относительно требований ODD.
  BC-3470.30:
    name: Операции автономного парка
    description: |
      Повседневные операции испытательных, пилотных и коммерческих парков
      автоматизированного вождения, включая диспетчеризацию, мониторинг и оборот.
    in_scope:
      - Диспетчеризация и маршрутизация автономных транспортных средств
      - Мониторинг состояния парка и наземная телеметрия
      - Координация зарядки, уборки и оборота
    out_of_scope:
      - Бронирование и ценообразование для пассажиров услуг шеринга (BC-3490)
      - Разработка транспортного средства и ПО (BC-3400)
  BC-3470.30.10:
    name: Диспетчерские операции автономных транспортных средств
    description: |
      Диспетчеризация и маршрутизация автономных транспортных средств
      для испытательных, пилотных и коммерческих миссий.
  BC-3470.30.20:
    name: Мониторинг состояния автономного парка
    description: |
      Мониторинг состояния автономных парков в реальном времени,
      включая калибровку датчиков и статус ПО.
  BC-3470.30.30:
    name: Координация зарядки и уборки автономных транспортных средств
    description: |
      Координация зарядки, уборки и оборотных операций
      автономных парков на базах.
  BC-3470.40:
    name: Дистанционные операции и телеассистанс
    description: |
      Функционирование центров телеассистанса, обеспечивающих дистанционную
      поддержку и авторизованные вмешательства для парков автоматизированного вождения.
  BC-3470.40.10:
    name: Операции центра телеассистанса
    description: |
      Функционирование центров дистанционного телеассистанса, включая
      управление сменами и пути эскалации.
  BC-3470.40.20:
    name: Управление решениями о дистанционных вмешательствах
    description: |
      Структуры принятия решений и авторизации дистанционных вмешательств
      от консультативных до прямого управления транспортным средством.
  BC-3470.40.30:
    name: Управление персоналом телеоператоров
    description: |
      Найм, обучение, сертификация и управление эффективностью
      персонала телеоператоров.
  BC-3470.50:
    name: Управление кейсом безопасности и гарантиями
    description: |
      Ведение эксплуатационного кейса безопасности ADS и показателей,
      контролирующих его продолжающуюся действительность.
  BC-3470.50.10:
    name: Разработка кейса безопасности
    description: |
      Разработка структурированного кейса безопасности ADS, включая
      утверждения, аргументы и доказательства.
  BC-3470.50.20:
    name: Поддержание аргументов безопасности
    description: |
      Поддержание аргументов безопасности по мере эволюции системы,
      ODD и операционного контекста.
  BC-3470.50.30:
    name: Отслеживание показателей безопасности
    description: |
      Определение и отслеживание опережающих и запаздывающих показателей
      безопасности для развёрнутого парка.
  BC-3470.60:
    name: Операции валидации автономного вождения
    description: |
      Оперативное проведение кампаний валидации — симуляция, закрытый полигон
      и общедоступные дороги — для получения доказательств кейса безопасности.
  BC-3470.60.10:
    name: Операции валидации на основе симуляции
    description: |
      Функционирование масштабных симуляционных ферм и регрессионных
      тестов сценариев для валидации ADS.
  BC-3470.60.20:
    name: Операции валидации на закрытом полигоне
    description: |
      Функционирование программ закрытых полигонных испытаний и
      кампаний на испытательных трассах для валидации ADS.
  BC-3470.60.30:
    name: Операции испытаний на общедоступных дорогах
    description: |
      Проведение контролируемых испытаний на общедоступных дорогах,
      включая дисциплину водителей безопасности и управление инцидентами.
  BC-3470.70:
    name: Регуляторное взаимодействие по ADS
    description: |
      Взаимодействие с регуляторами и общественностью по авторизациям
      автоматизированного вождения, отчётности об инцидентах и укреплению доверия.
  BC-3470.70.10:
    name: Управление разрешениями и авторизациями ADS
    description: |
      Управление разрешениями, исключениями и авторизациями для
      развёртывания ADS в каждой юрисдикции.
  BC-3470.70.20:
    name: Отчётность об инцидентах регуляторам
    description: |
      Отчётность об инцидентах ADS и отключениях системы регуляторам
      и координация с расследованиями.
  BC-3470.70.30:
    name: Взаимодействие с общественностью и заинтересованными сторонами
    description: |
      Взаимодействие с городами, сообществами и заинтересованными сторонами
      по вопросам развёртывания ADS, безопасности и преимуществ.

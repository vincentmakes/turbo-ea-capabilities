# Создание и производство контента (ru) — translations for L1-content-origination-production-management.yaml
locale: ru
source: L1-content-origination-production-management.yaml
entries:
  BC-3700:
    name: Создание и производство контента
    description: |
      Утверждение проектов, подготовительный период, основные съёмки или
      студийное производство, прямые трансляции и выпуск новостей, постпродакшн
      и локализация аудиовизуального, аудио- и редакционного контента от концепции
      до доставляемого мастера.
  BC-3700.10:
    name: Заказ и утверждение контента
    description: |
      Оценка концепций и питчей, формирование портфеля
      и принятие решений о заказе новых производств или приобретений.
  BC-3700.10.10:
    name: Оценка концепций и питчей
    description: |
      Структурированная оценка входящих питчей, тритментов и
      библий по редакционным и коммерческим критериям.
  BC-3700.10.20:
    name: Планирование портфеля производств
    description: |
      Формирование производственного портфеля по жанрам, бюджетам,
      аудиториям и окнам выпуска.
  BC-3700.10.30:
    name: Решение о запуске производства
    description: |
      Полномочие и запись решения о запуске производства,
      включая бюджет, график и творческие рамки.
  BC-3700.10.40:
    name: Управление производственными заданиями
    description: |
      Разработка и жизненный цикл производственных заданий,
      выдаваемых внутренним подразделениям и внешним продюсерам.
  BC-3700.20:
    name: Управление подготовительным периодом
    description: |
      Разработка сценария, производственный бюджет, планирование и
      выбор мест съёмок, переводящие утверждённый проект в готовность к съёмкам.
  BC-3700.20.10:
    name: Разработка сценария и раскадровки
    description: |
      Итеративная разработка сценариев, раскадровок и планов съёмок
      для игровых и неигровых производств.
  BC-3700.20.20:
    name: Планирование производственного бюджета
    description: |
      Детальный постатейный производственный бюджет по отделам
      и фазам с учётом резервов и завершения.
  BC-3700.20.30:
    name: Производственное планирование
    description: |
      Составление стрипборда и съёмочного графика, окна доступности
      творческой группы и операторов, разделение съёмочных групп.
  BC-3700.20.40:
    name: Выбор и подготовка мест съёмок
    description: |
      Поиск мест, разрешения, проектирование и строительство
      декораций в студии и на натуре.
  BC-3700.30:
    name: Управление производственными операциями
    description: |
      Проведение основных съёмок или студийного производства,
      включая логистику съёмочной группы, оборудования и рабочих процессов.
  BC-3700.30.10:
    name: Студийные производственные операции
    description: |
      Студийное производство для развлекательных, игровых и неигровых
      форматов, включая многокамерные студийные конфигурации.
  BC-3700.30.20:
    name: Производственные операции на натуре
    description: |
      Проведение съёмок на натуре и в удалённых местах,
      включая управление группами и безопасность на площадке.
  BC-3700.30.30:
    name: Логистика производства и съёмочной группы
    description: |
      Логистика колл-листов, транспорта, питания и перемещения
      оборудования на производстве.
  BC-3700.40:
    name: Прямые и новостные производства
    description: |
      Производство прямых трансляций, спорта и новостных выпусков
      в реальном времени, включая режиссуру и живую графику.
  BC-3700.40.10:
    name: Производство прямых мероприятий
    description: |
      Производство прямых развлекательных и специальных мероприятий
      с видеомикшированием и аудиомикшированием в реальном времени.
  BC-3700.40.20:
    name: Производство новостных выпусков
    description: |
      Производство новостных выпусков и непрерывного вещания
      в ньюсруме, включая управление порядком и прямые включения.
  BC-3700.40.30:
    name: Производство спортивных трансляций
    description: |
      Многокамерное производство прямых спортивных трансляций,
      включая выездные съёмки и операции хост-вещателя.
  BC-3700.40.40:
    name: Графика и повторы в реальном времени
    description: |
      Эфирная графика, счётчики и операции мгновенного повтора
      для прямых и квазипрямых производств.
  BC-3700.50:
    name: Управление постпродакшном
    description: |
      Монтаж изображения, аудио, цвет и финишные рабочие процессы,
      превращающие снятый материал в мастер уровня доставки.
  BC-3700.50.10:
    name: Монтаж и визуальные эффекты
    description: |
      Черновой и чистовой монтаж изображения, интеграция
      визуальных эффектов и конформация монтажных решений.
  BC-3700.50.20:
    name: Аудиопостпродакшн
    description: |
      Монтаж диалога, ADR, фоли, звуковой дизайн и финальный микс
      до уровня громкости поставки.
  BC-3700.50.30:
    name: Цветокоррекция и финишинг
    description: |
      Творческая и техническая цветокоррекция и финишинг
      для HDR и SDR поставок.
  BC-3700.50.40:
    name: Мастеринг и конформация
    description: |
      Создание мастеров поставки, пакетов IMF и вещательного
      мезанина, конформация под спецификации поставки.
  BC-3700.60:
    name: Локализация и управление версиями
    description: |
      Субтитрирование, тайтлинг, дублирование и региональные
      или платформенные версии для дистрибуции.
  BC-3700.60.10:
    name: Производство субтитров и тайтлов
    description: |
      Создание субтитров и скрытых субтитров
      на нескольких языках и в различных форматах.
  BC-3700.60.20:
    name: Производство дублирования
    description: |
      Перевод, кастинг и запись дублированных аудиодорожек
      для территориального выпуска.
  BC-3700.60.30:
    name: Управление языковыми и региональными версиями
    description: |
      Создание языковых и региональных мастеров версий,
      включая территориальный монтаж.

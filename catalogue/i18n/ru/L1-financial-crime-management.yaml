# Управление финансовыми преступлениями (ru) — translations for L1-financial-crime-management.yaml
locale: ru
source: L1-financial-crime-management.yaml
entries:
  BC-1400:
    name: Управление финансовыми преступлениями
    description: |
      Мониторинг транзакций на предмет AML, проверка по санкционным спискам, обнаружение мошенничества, отчётность о подозрительных операциях.
  BC-1400.10:
    name: Управление мониторингом транзакций AML
    description: |
      Правила и сценарии мониторинга AML, оповещения.
  BC-1400.10.10:
    name: Разработка сценариев и правил AML
    description: |
      Разработка сценариев, правил и пороговых значений AML.
  BC-1400.10.20:
    name: Генерация оповещений AML
    description: |
      Генерация оповещений AML по результатам мониторинга транзакций.
  BC-1400.10.30:
    name: Сортировка оповещений AML
    description: |
      Сортировка и риск-ориентированная приоритизация оповещений AML.
  BC-1400.10.40:
    name: Настройка и валидация AML-моделей
    description: |
      Настройка, валидация и проверка эффективности AML-моделей.
  BC-1400.20:
    name: Управление проверкой по санкционным спискам
    description: |
      Санкционные списки, проверка имён и транзакций, обработка совпадений.
  BC-1400.20.10:
    name: Управление санкционными списками
    description: |
      Агрегация и ведение санкционных списков наблюдения.
  BC-1400.20.20:
    name: Проверка имён клиентов
    description: |
      Проверка клиентов и контрагентов по санкционным спискам.
  BC-1400.20.30:
    name: Проверка транзакций по санкциям
    description: |
      Проверка транзакций в режиме реального времени по санкционным спискам.
  BC-1400.20.40:
    name: Обработка совпадений с санкционными списками
    description: |
      Расследование и вынесение решений по совпадениям с санкционными списками.
  BC-1400.30:
    name: Управление обнаружением и расследованием мошенничества
    description: |
      Обнаружение мошенничества по продуктам и каналам, расследования.
  BC-1400.30.10:
    name: Обнаружение мошенничества при подаче заявок
    description: |
      Обнаружение мошенничества на этапе заявки клиента или продукта.
  BC-1400.30.20:
    name: Обнаружение мошенничества при транзакциях
    description: |
      Обнаружение мошеннических транзакций в режиме реального времени.
  BC-1400.30.30:
    name: Расследование мошенничества
    description: |
      Расследование и урегулирование случаев мошенничества.
  BC-1400.30.40:
    name: Управление убытками от мошенничества и их возмещением
    description: |
      Учёт убытков от мошенничества и меры по их возмещению.
  BC-1400.30.50:
    name: Обработка мошенничества с авторизованным переводом
    description: |
      Обработка случаев мошенничества с авторизованным переводом денежных средств и возмещение убытков.
  BC-1400.40:
    name: Управление отчётностью о подозрительных операциях
    description: |
      Подготовка и подача SAR/STR, регуляторная отчётность.
  BC-1400.40.10:
    name: Подготовка и подача SAR
    description: |
      Подготовка и подача SAR/STR в финансовые разведывательные подразделения.
  BC-1400.40.20:
    name: Регуляторная отчётность по финансовым преступлениям
    description: |
      Периодическая регуляторная отчётность по финансовым преступлениям.
  BC-1400.40.30:
    name: Взаимодействие с правоохранительными органами
    description: |
      Взаимодействие с правоохранительными органами и обработка запросов информации.
  BC-1400.50:
    name: Управление расследованиями финансовых преступлений
    description: |
      Управление делами, расследования, эскалация.
  BC-1400.50.10:
    name: Управление делами
    description: |
      Управление делами по расследованиям финансовых преступлений.
  BC-1400.50.20:
    name: Проведение расследований
    description: |
      Проведение расследований и сбор доказательств.
  BC-1400.50.30:
    name: Эскалация и закрытие дел
    description: |
      Эскалация, вынесение решений и закрытие расследований.

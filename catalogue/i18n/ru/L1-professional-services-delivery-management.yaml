# Управление исполнением профессиональных услуг (ru) — translations for L1-professional-services-delivery-management.yaml
locale: ru
source: L1-professional-services-delivery-management.yaml
entries:
  BC-4310:
    name: Управление исполнением профессиональных услуг
    description: |
      Выполнение advisory-, юридических, аудиторских и консалтинговых заданий — планирование работ, полевые работы, подготовка результатов, внутренний ревью и отчётность по заданию в соответствии со согласованным скоупом.
  BC-4310.10:
    name: Управление планированием задания
    description: |
      Детальное планирование работ, контрольных точек, структуры результатов и риск-ориентированных процедур в соответствии с применимыми профессиональными стандартами.
  BC-4310.10.10:
    name: Определение рабочего плана задания
    description: |
      Определение декомпозиции работ, контрольных точек и зависимостей для задания.
  BC-4310.10.20:
    name: Риск-ориентированная адаптация процедур задания
    description: |
      Адаптация аудиторских процедур, advisory-анализов или юридических шагов к специфическому риску и существенности задания.
  BC-4310.10.30:
    name: Определение плана результатов задания
    description: |
      Определение структуры, формата и контрольных точек ревью результатов задания.
  BC-4310.10.40:
    name: Управление расписанием задания
    description: |
      Ежедневное планирование мероприятий задания и доступности ресурсов относительно рабочего плана.
  BC-4310.20:
    name: Управление выполнением задания
    description: |
      Ежедневное выполнение работ по заданию: полевые работы, advisory-анализ, аудиторское тестирование, подготовка проектов и взаимодействие с клиентом.
  BC-4310.20.10:
    name: Выполнение аудиторских процедур
    description: |
      Выполнение аудиторских и assurance-процедур, включая существенные тесты, тестирование контролей и аналитические процедуры.
  BC-4310.20.20:
    name: Выполнение advisory-анализа
    description: |
      Проведение консалтинговых анализов, моделирования, бенчмаркинга и разработки рекомендаций.
  BC-4310.20.30:
    name: Выполнение юридических поручений
    description: |
      Существенная юридическая работа, включая подготовку проектов, заключений, судебных документов, транзакционное исполнение и консультирование.
  BC-4310.20.40:
    name: Управление взаимодействием с клиентом
    description: |
      Ежедневное взаимодействие с клиентом в ходе выполнения: интервью, информационные запросы, статус-звонки и семинары со стейкхолдерами.
  BC-4310.30:
    name: Управление результатами задания
    description: |
      Подготовка, контроль версий и финализация результатов задания: аудиторские отчёты, заключения, advisory-отчёты и транзакционная документация.
  BC-4310.30.10:
    name: Подготовка проектов результатов
    description: |
      Подготовка проектов результатов с использованием шаблонов фирмы, методологии и выводов задания.
  BC-4310.30.20:
    name: Контроль версий результатов
    description: |
      Версионирование, ветвление и аудит-след по проектам результатов в ходе ревью-циклов.
  BC-4310.30.30:
    name: Финализация результатов
    description: |
      Финальное форматирование, блоки подписей и пакетирование завершённых результатов для выпуска.
  BC-4310.40:
    name: Управление рабочими материалами задания
    description: |
      Сбор, организация и хранение рабочих материалов задания и доказательств, подтверждающих результаты и выводы.
    in_scope:
      - Рабочие материалы дела задания
      - Индексирование и перекрёстные ссылки доказательств
      - Сборка и блокировка дела
    out_of_scope:
      - Многоразовые методологические и прецедентные активы (BC-4370)
  BC-4310.40.10:
    name: Сбор рабочих материалов
    description: |
      Внесение доказательств, анализов и заметок в рабочие материалы дела задания.
  BC-4310.40.20:
    name: Индексирование и перекрёстные ссылки рабочих материалов
    description: |
      Индексирование и перекрёстные ссылки рабочих материалов по утверждениям результатов и шагам процедур.
  BC-4310.40.30:
    name: Сборка и блокировка дела задания
    description: |
      Сборка финального дела задания и его блокировка для предотвращения постфактных изменений вне разрешённых контролей.
  BC-4310.50:
    name: Управление внутренним ревью задания
    description: |
      Внутриплановые ревью-циклы ревьюерами, менеджерами и партнёрами до выпуска результатов, отличный от ревью качества на уровне фирмы.
    out_of_scope:
      - Мониторинг качества на уровне фирмы и EQR (BC-4340)
  BC-4310.50.10:
    name: Менеджерский ревью рабочих материалов
    description: |
      Менеджерский ревью рабочих материалов и выводов перед утверждением партнёром.
  BC-4310.50.20:
    name: Ревью и утверждение партнёром
    description: |
      Ревью и утверждение результатов и заключений партнёром задания.
  BC-4310.50.30:
    name: Специализированный технический ревью
    description: |
      Ревью техническими специалистами (налоговыми, оценочными, IT, актуарными) по областям, требующим специальных знаний.
  BC-4310.60:
    name: Управление привлечением внешних специалистов
    description: |
      Привлечение соадвокатов, экспертных свидетелей, субподрядчиков и сторонних специалистов в рамках задания.
  BC-4310.60.10:
    name: Привлечение соадвоката и субподрядчика
    description: |
      Выбор и привлечение соадвокатов, местных юрисконсультов или консалтинговых субподрядчиков.
  BC-4310.60.20:
    name: Привлечение экспертных свидетелей
    description: |
      Выявление, привлечение и управление экспертными свидетелями и внешними экспертами.
  BC-4310.60.30:
    name: Надзор за качеством работы внешних специалистов
    description: |
      Надзор за результатами работы внешних специалистов и оценка достаточности для выводов задания.
  BC-4310.70:
    name: Отчётность и коммуникация по заданию
    description: |
      Статусная отчётность, промежуточные коммуникации и финальная отчётность клиенту и руководству задания в ходе выполнения.
  BC-4310.70.10:
    name: Статусная отчётность по заданию
    description: |
      Периодические статус-обновления руководству задания и клиенту, включая прогресс, риски и проблемы.
  BC-4310.70.20:
    name: Коммуникация промежуточных выводов
    description: |
      Промежуточная коммуникация предварительных выводов, наблюдений и значимых проблем клиенту в ходе выполнения.
  BC-4310.70.30:
    name: Финальная отчётность по заданию
    description: |
      Выпуск финальных отчётов, заключений и управленческих писем в рамках закрытия задания.

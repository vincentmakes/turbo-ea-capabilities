# Тарификация грузоперевозок (ru) — translations for L1-freight-rating-tariff-management.yaml
locale: ru
source: L1-freight-rating-tariff-management.yaml
entries:
  BC-2520:
    name: Управление тарификацией грузоперевозок
    description: |
      Определение и применение грузовых тарифов, контрактного ценообразования,
      спотового ценообразования, дополнительных сборов и тарифного механизма
      для ценообразования грузовых перевозок.
  BC-2520.10:
    name: Управление тарифом и тарифной картой
    description: |
      Определение, публикация и версионирование публичных тарифов и базовых тарифных карт.
    in_scope:
      - Определение базовой тарифной карты по маршруту и единице
      - Подача публичных тарифов при необходимости
    out_of_scope:
      - Котирование на стороне клиента в контексте экспедирования (BC-2450.10)
      - Общие методы корпоративного ценообразования (BC-440)
  BC-2520.10.10:
    name: Определение базовых тарифов
    description: |
      Определение базовых грузовых тарифов по маршруту, единице и уровню сервиса.
  BC-2520.10.20:
    name: Подача публичного тарифа
    description: |
      Подача публичных тарифов регуляторам и конференциям при необходимости.
  BC-2520.10.30:
    name: Версионирование тарифной карты
    description: |
      Управление версиями и датами вступления в силу тарифных карт.
  BC-2520.20:
    name: Управление контрактными тарифами
    description: |
      Настройка и ведение согласованных контрактных тарифов для именных клиентов
      и объёмных обязательств.
  BC-2520.20.10:
    name: Настройка контрактных тарифов
    description: |
      Настройка согласованных тарифов по именным клиентским контрактам.
  BC-2520.20.20:
    name: Отслеживание объёмных обязательств
    description: |
      Отслеживание объёмных обязательств клиентов и целевых минимальных количеств.
  BC-2520.20.30:
    name: Возобновление контрактных тарифов
    description: |
      Возобновление и пересмотр истекающих контрактных тарифов.
  BC-2520.30:
    name: Управление спотовыми тарифами
    description: |
      Ценообразование, принятие и бенчмаркинг спотовых тарифов на грузоперевозки.
  BC-2520.30.10:
    name: Котирование спотовых тарифов
    description: |
      Котирование спотовых тарифов по отправке.
  BC-2520.30.20:
    name: Принятие спотовых тарифов
    description: |
      Принятие и подтверждение бронирований по спотовым тарифам.
  BC-2520.30.30:
    name: Бенчмаркинг спотовых тарифов по индексам
    description: |
      Сравнение спотовых тарифов с рыночными индексами.
  BC-2520.40:
    name: Управление дополнительными сборами и надбавками
    description: |
      Определение и применение дополнительных сборов, надбавок, демерреджа
      и тарифов за пользование оборудованием.
  BC-2520.40.10:
    name: Управление топливной надбавкой
    description: |
      Определение и применение топливных и бункерных надбавок.
  BC-2520.40.20:
    name: Определение дополнительных сборов
    description: |
      Определение дополнительных сборов за простой, специальную обработку
      и использование оборудования.
  BC-2520.40.30:
    name: Тарифы демерреджа и задержки оборудования
    description: |
      Определение тарифов демерреджа и задержки оборудования на терминалах.
  BC-2520.50:
    name: Управление тарифным механизмом
    description: |
      Эксплуатация тарифного механизма для расчёта и проверки грузовых сборов
      по заказам и отправкам.
  BC-2520.50.10:
    name: Выполнение расчёта тарифов
    description: |
      Выполнение расчётов тарифов по заказам и отправкам.
  BC-2520.50.20:
    name: Рассылка тарифных листов
    description: |
      Рассылка тарифных листов клиентам, партнёрам и каналам.
  BC-2520.50.30:
    name: Аудит и проверка тарифов
    description: |
      Проверка применённых тарифов по контрактным и базовым значениям.
metadata:
  status: draft
  reviewer: pending

# Управление операциями сети зарядки электромобилей (ru) — translations for L1-ev-charging-network-operations-management.yaml
locale: ru
source: L1-ev-charging-network-operations-management.yaml
entries:
  BC-3480:
    name: Управление операциями сети зарядки электромобилей
    description: |
      Операции сетей зарядки ЭМ для операторов зарядных точек и поставщиков
      сервисов э-мобильности — планирование площадок, операции зарядных точек,
      управление энергией и тарифами, клиентские и роуминговые операции,
      биллинг и расчёты, обслуживание зарядного оборудования и участие в
      сетевых сервисах.
  BC-3480.10:
    name: Планирование и развёртывание зарядных площадок
    description: |
      Выбор площадок, получение разрешений, подключение к сети и
      физическое развёртывание зарядной инфраструктуры.
  BC-3480.10.10:
    name: Выбор зарядных площадок
    description: |
      Идентификация и квалификация зарядных площадок по критериям
      спроса, земельным и сетевым.
  BC-3480.10.20:
    name: Получение разрешений и подключение к сети
    description: |
      Разрешения, проектное согласование и координация подключения
      к сети для зарядных площадок.
  BC-3480.10.30:
    name: Координация монтажа зарядного оборудования
    description: |
      Координация монтажа зарядного оборудования, строительных работ,
      ввода в эксплуатацию и передачи в операционную службу.
  BC-3480.20:
    name: Операции зарядных точек
    description: |
      Повседневное функционирование зарядных точек, включая мониторинг,
      жизненный цикл сессии и управление прошивкой через OCPP.
  BC-3480.20.10:
    name: Мониторинг зарядных точек
    description: |
      Мониторинг состояния, доступности и аварийных состояний
      зарядных точек в реальном времени.
  BC-3480.20.20:
    name: Управление жизненным циклом зарядной сессии
    description: |
      Управление жизненным циклом зарядной сессии от авторизации
      через доставку энергии до завершения.
  BC-3480.20.30:
    name: Управление прошивкой и конфигурацией зарядного оборудования
    description: |
      Управление версиями прошивки, профилями конфигурации
      и удалёнными обновлениями зарядного оборудования.
  BC-3480.30:
    name: Управление энергией и тарифами зарядки
    description: |
      Управление координацией закупок энергии, тарифами зарядки
      и оптимизацией потребления по всей зарядной сети.
  BC-3480.30.10:
    name: Координация оптовых закупок энергии
    description: |
      Координация с закупками энергии по объёмам, хеджированию и PPA,
      поддерживающим операции зарядки.
  BC-3480.30.20:
    name: Определение тарифов на зарядку
    description: |
      Определение публичных, членских и роуминговых тарифов
      на зарядку по рынкам.
  BC-3480.30.30:
    name: Оптимизация пикового спроса и дифференцированного потребления
    description: |
      Оптимизация операций зарядки относительно структур пикового
      спроса и дифференцированных тарифов на энергию.
  BC-3480.40:
    name: Управление клиентами и подписками зарядки
    description: |
      Онбординг клиентов, подписные планы и аутентификация
      для зарядных сервисов.
  BC-3480.40.10:
    name: Онбординг зарядных аккаунтов
    description: |
      Онбординг клиентов зарядки, включая идентификацию,
      оплату и выбор плана.
  BC-3480.40.20:
    name: Управление подписными планами на зарядку
    description: |
      Управление подписными, членскими и предоплатными планами
      для клиентов зарядки.
  BC-3480.40.30:
    name: Аутентификация и авторизация зарядки
    description: |
      Аутентификация и авторизация зарядных сессий через RFID,
      приложение или Plug-and-Charge.
  BC-3480.50:
    name: Биллинг и расчёты зарядки
    description: |
      Биллинг зарядных сессий, расчёты с роуминговыми партнёрами
      и управление квитанциями для клиентов зарядки.
  BC-3480.50.10:
    name: Биллинг зарядных сессий
    description: |
      Тарификация и биллинг зарядных сессий для прямых
      и роуминговых клиентов.
  BC-3480.50.20:
    name: Роуминговые расчёты
    description: |
      Расчёты по роуминговым сессиям с партнёрскими CPO и EMSP
      по OCPI и эквивалентным протоколам.
  BC-3480.50.30:
    name: Управление возмещением и квитанциями
    description: |
      Выдача квитанций, поддержка возмещения расходов и налоговая
      документация для клиентов зарядки.
  BC-3480.60:
    name: Совместимость зарядной сети
    description: |
      Совместимость с роуминговыми партнёрами и соответствие стандартам
      зарядки по разъёмам и протоколам.
  BC-3480.60.10:
    name: Управление роуминговыми партнёрами
    description: |
      Онбординг и управление роуминговыми партнёрами
      и хабами.
  BC-3480.60.20:
    name: Операции Plug-and-Charge
    description: |
      Функционирование контрактных сертификатов ISO 15118
      Plug-and-Charge и потоков аутентификации.
  BC-3480.60.30:
    name: Управление совместимостью разъёмов зарядного оборудования
    description: |
      Управление совместимостью разъёмов CCS, NACS, CHAdeMO и GB/T
      и стратегиями адаптеров.
  BC-3480.70:
    name: Полевое обслуживание и техническое обслуживание зарядного оборудования
    description: |
      Полевое обслуживание зарядных активов, включая диспетчеризацию,
      планово-предупредительное техническое обслуживание и запасные части.
  BC-3480.70.10:
    name: Диспетчеризация при неисправностях зарядного оборудования
    description: |
      Диспетчеризация полевых техников в ответ на неисправности
      зарядного оборудования и обращения клиентов.
  BC-3480.70.20:
    name: Планово-предупредительное обслуживание зарядного оборудования
    description: |
      Плановое техническое обслуживание и инспекция
      зарядных активов.
  BC-3480.70.30:
    name: Управление запасными частями зарядного оборудования
    description: |
      Управление запасами запасных частей, ремонтными пулами
      и устареванием зарядного оборудования.
  BC-3480.80:
    name: Участие в сетевых и энергетических сервисах
    description: |
      Участие зарядных активов в сетевых и энергетических рынках,
      включая управление спросом, V2G и умную зарядку.
    in_scope:
      - V2G-экспорт энергии и сервисы мощности
      - Участие в программах управления спросом
      - Оптимизация графиков умной зарядки
    out_of_scope:
      - Операции генерирующих активов и оптовая торговля энергией
  BC-3480.80.10:
    name: Операции сервисов V2G
    description: |
      Функционирование V2G-сервисов, поставляющих энергию и продукты
      мощности на балансирующие рынки.
  BC-3480.80.20:
    name: Участие в программах управления спросом
    description: |
      Участие в программах управления спросом, включая ответ на
      диспетчеризацию и расчёты.
  BC-3480.80.30:
    name: Управление графиками умной зарядки
    description: |
      Управление умной зарядкой по расписанию на площадках и
      транспортных средствах для оптимизации затрат и воздействия на сеть.

# Управление доходностью (ru) — translations for L1-travel-revenue-yield-management.yaml
locale: ru
source: L1-travel-revenue-yield-management.yaml
entries:
  BC-4030:
    name: Управление доходностью туристических продуктов
    description: |
      Прогнозирование спроса, динамическое ценообразование, управление инвентарём и решения по доходности для максимизации выручки от туристических продуктов.
    in_scope:
      - Прогнозирование неограниченного спроса и темпа накопления бронирований
      - Управление ценовой стратегией (BAR, тарифные классы, сезонность)
      - Лимиты бронирования, ограничения по сроку пребывания, овербукинг, вложение
      - Конкурентная разведка цен и рыночное позиционирование
      - Акции и механизмы скидок
      - Отчётность по доходности (RevPAR, RevPAX, ADR, yield)
    out_of_scope:
      - Определение мастер-продукта (BC-4000)
      - Канальные ставки в метапоиске (BC-4010.40.20)
      - Заключение групповых договоров продаж (BC-4110.10)
  BC-4030.10:
    name: Прогнозирование туристического спроса
    description: |
      Прогнозирование неограниченного спроса, темпа бронирований, группового спроса, а также неявок и отмен для туристических продуктов.
  BC-4030.10.10:
    name: Прогнозирование неограниченного спроса
    description: |
      Прогнозирование спроса без учёта ограничений по ёмкости и цене.
  BC-4030.10.20:
    name: Прогнозирование темпа и накопления бронирований
    description: |
      Прогнозирование кривых темпа и накопления бронирований на основе исторических данных и текущих резервирований.
  BC-4030.10.30:
    name: Прогнозирование группового спроса
    description: |
      Прогнозирование группового спроса, включая эффекты вытеснения индивидуального инвентаря.
  BC-4030.10.40:
    name: Прогнозирование неявок и отмен
    description: |
      Прогнозирование поведения неявок и отмен как входных данных для управления овербукингом и инвентарём.
  BC-4030.20:
    name: Управление ценообразованием и тарифной стратегией
    description: |
      Определение и корректировка тарифной стратегии по уровням BAR, тарифным классам, сезонным окнам и ценообразованию пакетов.
  BC-4030.20.10:
    name: Установка наилучшего доступного тарифа
    description: |
      Установка лестниц наилучшего доступного тарифа по датам и сегментам.
  BC-4030.20.20:
    name: Стратегия тарифных классов и бакетов
    description: |
      Стратегия тарифных классов и бакетов инвентаря, включая открытие, закрытие и перебалансировку.
  BC-4030.20.30:
    name: Сезонное и посуточное ценообразование
    description: |
      Дифференцированное ценообразование по сезонам, дням недели и периодам событий.
  BC-4030.20.40:
    name: Ценообразование пакетов и бандлов
    description: |
      Ценообразование пакетных продуктов и бандлов, включая распределение стоимости компонентов.
  BC-4030.30:
    name: Управление инвентарём и ёмкостью
    description: |
      Управление инвентарём: лимиты бронирования, ограничения по сроку пребывания, стратегия овербукинга и вложение по ценовому порогу.
  BC-4030.30.10:
    name: Установка лимитов бронирования
    description: |
      Установка лимитов бронирования и уровней авторизации по классам, каналам и сегментам.
  BC-4030.30.20:
    name: Управление ограничениями по сроку пребывания
    description: |
      Управление ограничениями по сроку пребывания: минимальные, максимальные и правила по дате заезда.
  BC-4030.30.30:
    name: Управление стратегией овербукинга
    description: |
      Стратегическое управление уровнями овербукинга по датам и сегментам с учётом затрат на отказ в обслуживании.
  BC-4030.30.40:
    name: Управление вложением и ценовым порогом
    description: |
      Управление вложением инвентаря и пороговыми ценами в моделях оптимизации доходности.
  BC-4030.40:
    name: Конкурентная разведка цен
    description: |
      Мониторинг цен конкурентов, анализ доли рынка и рекомендации по ценовому позиционированию.
  BC-4030.40.10:
    name: Мониторинг конкурентных цен
    description: |
      Регулярный мониторинг тарифов конкурентов по выбранным каналам и датам заезда.
  BC-4030.40.20:
    name: Анализ доли рынка и пенетрации
    description: |
      Анализ доли рынка, индексов загрузки и тарифных индексов в сравнении с конкурентами.
  BC-4030.40.30:
    name: Рекомендации по ценовому позиционированию
    description: |
      Формирование рекомендаций по ценовому позиционированию относительно конкурентов и состояния спроса.
  BC-4030.40.40:
    name: Определение и ведение конкурентного набора
    description: |
      Определение и периодическое обновление конкурентных наборов для бенчмаркинга.
  BC-4030.50:
    name: Управление акциями и скидками
    description: |
      Определение и управление акциями, скидочными кодами, непрозрачным и закрытым ценообразованием для туристических продуктов.
  BC-4030.50.10:
    name: Управление календарём акций
    description: |
      Управление календарём акций по сезонам и ключевым окнам бронирования.
  BC-4030.50.20:
    name: Правила применимости акций
    description: |
      Правила применения акций по сегменту, каналу и периоду проживания.
  BC-4030.50.30:
    name: Управление скидочными кодами и ваучерами
    description: |
      Управление скидочными кодами, ваучерами и токенами в виде подарочных карт для акционных целей.
  BC-4030.50.40:
    name: Непрозрачное и закрытое ценообразование
    description: |
      Управление механизмами непрозрачных каналов и закрытых групп пользователей, скрывающих публичные тарифы.
  BC-4030.60:
    name: Анализ доходности
    description: |
      Отчётность и анализ показателей доходности: RevPAR, RevPAX, ADR, yield и отклонения от прогноза.
  BC-4030.60.10:
    name: Отчётность по KPI доходности
    description: |
      Отчётность по ключевым KPI доходности в сравнении с бюджетом и прошлым периодом.
  BC-4030.60.20:
    name: Анализ отклонений доходности
    description: |
      Анализ отклонений доходности с разложением на эффекты микса, тарифа и загрузки.
  BC-4030.60.30:
    name: Анализ вклада каналов в выручку
    description: |
      Анализ вклада в выручку по каналу, сегменту и коду тарифа.
  BC-4030.60.40:
    name: Анализ прогноза против факта
    description: |
      Анализ прогнозной и фактической выручки с атрибуцией источников ошибок прогноза.

# Налоговое и доходное администрирование (ru) — translations for L1-tax-revenue-administration-management.yaml
locale: ru
source: L1-tax-revenue-administration-management.yaml
entries:
  BC-3250:
    name: Налоговое и доходное администрирование
    description: |
      Государственное администрирование налоговых и неналоговых поступлений, включая регистрацию налогоплательщиков, обработку деклараций, начисление, сбор, проверку, принудительное взыскание и администрирование возвратов.
  BC-3250.10:
    name: Регистрация и идентификация налогоплательщиков
    description: |
      Регистрация налогоплательщиков, управление их идентификацией и ведение основных данных налогоплательщиков.
    in_scope:
      - Регистрация налогоплательщиков и присвоение ИНН
      - Ведение профиля налогоплательщика
      - Записи о бенефициарном владении
    out_of_scope:
      - Регистрация актов гражданского состояния (относится к управлению гражданскими записями и регистрации личности)
  BC-3250.10.10:
    name: Регистрация налогоплательщиков
    description: |
      Регистрация физических лиц и юридических лиц в качестве налогоплательщиков и присвоение идентификационных номеров.
  BC-3250.10.20:
    name: Ведение профиля налогоплательщика
    description: |
      Ведение основных данных налогоплательщика, контактных данных и реестра налоговых обязательств.
  BC-3250.10.30:
    name: Фиксация данных о бенефициарном владении
    description: |
      Фиксация сведений о бенефициарном владении и групповых структурах юридических лиц.
  BC-3250.20:
    name: Обработка деклараций и начисление
    description: |
      Приём, валидация и начисление по налоговым декларациям по прямым, косвенным и удержанным налогам.
  BC-3250.20.10:
    name: Подача деклараций
    description: |
      Приём и регистрация налоговых деклараций и информационных отчётов по всем каналам.
  BC-3250.20.20:
    name: Валидация деклараций
    description: |
      Автоматизированная и ручная проверка деклараций, включая арифметику, полноту и согласованность.
  BC-3250.20.30:
    name: Обработка самооценок
    description: |
      Обработка деклараций на основе самооценки и фиксация задекларированных обязательств.
  BC-3250.20.40:
    name: Выпуск расчётов по умолчанию
    description: |
      Выпуск расчётов по умолчанию и расчётов по наилучшему суждению для лиц, не подавших декларации.
  BC-3250.30:
    name: Операции по взиманию доходов
    description: |
      Взимание добровольных налоговых платежей через электронные каналы, удержание у источника, рассрочку и очные каналы.
  BC-3250.30.10:
    name: Операции платёжных каналов
    description: |
      Работа платёжных каналов, включая банковский перевод, карты, электронные кошельки и очный приём.
  BC-3250.30.20:
    name: Удержание у источника
    description: |
      Администрирование удержания налогов у источника плательщиками.
  BC-3250.30.30:
    name: Администрирование рассрочки
    description: |
      Настройка и контроль планов рассрочки налогоплательщиков и соглашений об отсрочке.
  BC-3250.30.40:
    name: Сверка поступлений
    description: |
      Сверка налоговых поступлений с лицевыми счетами налогоплательщиков и казначейством.
  BC-3250.40:
    name: Налоговая проверка
    description: |
      Риск-ориентированная проверка, обследование и переначисление соответствия налогоплательщиков.
  BC-3250.40.10:
    name: Отбор дел для проверки
    description: |
      Риск-ориентированный отбор дел для проверки с использованием аналитики и разведывательных данных.
  BC-3250.40.20:
    name: Полевые мероприятия по проверке
    description: |
      Проведение полевых проверок, изучение документов и беседы с налогоплательщиками.
  BC-3250.40.30:
    name: Выпуск переначислений
    description: |
      Выпуск переначислений, корректировок и писем с решениями по проверкам.
  BC-3250.40.40:
    name: Проверка трансфертного ценообразования
    description: |
      Проверка трансграничного ценообразования между связанными сторонами по принципам ОЭСР по трансфертному ценообразованию.
  BC-3250.50:
    name: Управление налоговой задолженностью и принудительным взысканием
    description: |
      Взыскание налоговых долгов с использованием законодательных принудительных полномочий, включая обращение взыскания, залоги, изъятие имущества и направление в суд.
  BC-3250.50.10:
    name: Управление портфелем налоговой задолженности
    description: |
      Сегментация, классификация по срокам и приоритизация портфеля налоговой задолженности.
  BC-3250.50.20:
    name: Принудительное взыскание
    description: |
      Применение законодательных принудительных полномочий, включая обращение взыскания, залоги и изъятие имущества.
  BC-3250.50.30:
    name: Направление дел о налоговых преступлениях
    description: |
      Расследование и направление подозреваемых дел об уклонении от уплаты налогов и налоговых преступлениях в прокуратуру.
  BC-3250.60:
    name: Администрирование возвратов и кредитов
    description: |
      Обработка налоговых возвратов, зачётов кредитов и удержание спорных сумм.
  BC-3250.60.10:
    name: Валидация возвратов
    description: |
      Валидация требований о возврате по декларациям, платежам и профилям риска.
  BC-3250.60.20:
    name: Выпуск возвратов
    description: |
      Выплата возвратов и зачёт против непогашенных обязательств.
  BC-3250.60.30:
    name: Проверка мошенничества с возвратами
    description: |
      Проверка требований о возврате на предмет признаков кражи персональных данных и мошенничества.
  BC-3250.70:
    name: Администрирование неналоговых доходов
    description: |
      Администрирование неналоговых государственных поступлений, включая сборы, штрафы, роялти и налоги.
  BC-3250.70.10:
    name: Администрирование сборов и платежей
    description: |
      Администрирование установленных законом сборов, платежей и пользовательских взносов в пользу государства.
  BC-3250.70.20:
    name: Взыскание штрафов
    description: |
      Взыскание судебных и административных штрафов и взысканий.
  BC-3250.70.30:
    name: Администрирование роялти и сборов
    description: |
      Администрирование роялти за природные ресурсы, экологических сборов и целевых платежей.

# Управление объектами недвижимости (ru) — translations for L1-property-management-operations.yaml
locale: ru
source: L1-property-management-operations.yaml
entries:
  BC-4940:
    name: Управление объектами недвижимости
    description: |
      Эксплуатация коммерческих, торговых и многоквартирных жилых
      зданий со стороны арендодателя и управляющей компании —
      инженерные системы здания, управление поставщиками и договорами,
      ордера на работы, обслуживание арендаторов в период аренды,
      безопасность и пожарная охрана, энергетика и устойчивое
      развитие, учёт имущества, включая сверку CAM. Отличается от
      эксплуатации гостиничного имущества (BC-4060) и корпоративных
      объектов (BC-700).
    in_scope:
      - Повседневная эксплуатация здания, включая BMS и общие зоны
      - Техническое обслуживание: плановое, реактивное и обязательное
      - Управление поставщиками и сервисными договорами (клининг, охрана, озеленение)
      - Координация въезда / выезда арендаторов и чистовой отделки
      - Охрана объекта, пожарная и противопожарная безопасность, реагирование на инциденты
      - Энергетика, водоснабжение, отходы и микроклимат объекта
      - Учёт имущества, выставление счетов арендаторам и операционная отчётность
      - Сверка CAM и сервисных сборов
    out_of_scope:
      - Эксплуатация гостиниц и курортов (BC-4060)
      - Корпоративные объекты для собственного использования (BC-700)
      - Бизнес-планы по действующим активам и стратегия капвложений (BC-4920)
      - Привлечение арендаторов и заключение договоров аренды (BC-4950)
  BC-4940.10:
    name: Управление эксплуатацией здания
    description: |
      Повседневная эксплуатация инженерных систем здания, систем
      управления зданием, общих зон, ресепшена и графиков работы
      коммерческих, торговых и многоквартирных объектов.
  BC-4940.10.10:
    name: Эксплуатация общих зон
    description: |
      Эксплуатация общих зон, включая холлы, коридоры и общие
      удобства.
  BC-4940.10.20:
    name: Эксплуатация систем управления зданием
    description: |
      Эксплуатация систем управления зданием, включая HVAC,
      освещение и системы контроля доступа.
  BC-4940.10.30:
    name: Ресепшен и контроль доступа
    description: |
      Служба ресепшена, консьерж и управление доступом арендаторов
      и посетителей объекта.
  BC-4940.10.40:
    name: Управление режимом работы и расписанием
    description: |
      Управление режимом работы, заявками на нерабочее время и
      праздничными расписаниями.
  BC-4940.20:
    name: Техническое обслуживание и управление ордерами на работы
    description: |
      Плановое, реактивное и обязательное техническое обслуживание
      инженерных систем здания и объектов, контактирующих с
      арендаторами, через рабочие процессы ордеров на работы.
  BC-4940.20.10:
    name: Плановое техническое обслуживание
    description: |
      Проведение планового технического обслуживания по графику и
      данным о состоянии активов.
  BC-4940.20.20:
    name: Реактивное обслуживание и ордера на работы
    description: |
      Обработка заявок на реактивное обслуживание от арендаторов и
      по результатам проверок.
  BC-4940.20.30:
    name: Обязательные и нормативные проверки
    description: |
      Обязательные и нормативные проверки лифтов, систем
      пожаротушения, газовых и напорных систем.
  BC-4940.20.40:
    name: Отчётность по техническому обслуживанию
    description: |
      Отчётность о деятельности по техническому обслуживанию, бэклоге
      и соответствии SLA для владельцев и арендаторов.
  BC-4940.30:
    name: Управление поставщиками и сервисными договорами
    description: |
      Онбординг и управление поставщиками и сервисными договорами на
      уровне объекта для клининга, охраны, озеленения и снабжения
      коммунальными услугами.
  BC-4940.30.10:
    name: Онбординг сервисных договоров
    description: |
      Онбординг сервисных договоров и поставщиков на уровне объекта.
  BC-4940.30.20:
    name: Управление результатами поставщиков
    description: |
      Управление результатами поставщиков объекта в соответствии с
      SLA и KPI.
  BC-4940.30.30:
    name: Определение спецификаций и SLA
    description: |
      Определение спецификаций, объёмов и SLA для договорных
      сервисных услуг объекта.
  BC-4940.40:
    name: Сервисное обслуживание арендаторов и координация переездов
    description: |
      Координация онбординга арендаторов, въезда и выезда, чистовой
      отделки и обработки текущих заявок на обслуживание.
  BC-4940.40.10:
    name: Координация въезда арендатора
    description: |
      Координация въезда арендатора, включая доступ, вывески и
      ознакомление.
  BC-4940.40.20:
    name: Координация чистовой отделки арендатора
    description: |
      Координация работ по чистовой отделке арендатора, доступа
      подрядчиков и согласований арендодателя.
  BC-4940.40.30:
    name: Выезд и восстановление помещения
    description: |
      Координация выезда арендатора и восстановления сданных площадей
      в первоначальное состояние.
  BC-4940.40.40:
    name: Обработка заявок арендаторов
    description: |
      Обработка заявок арендаторов на обслуживание в период аренды
      по различным каналам.
  BC-4940.50:
    name: Охрана объекта и обеспечение безопасности
    description: |
      Эксплуатация систем видеонаблюдения, пожарной и противопожарной
      безопасности, реагирование на инциденты и экстренная эвакуация
      на объекте.
  BC-4940.50.10:
    name: Видеонаблюдение объекта
    description: |
      Эксплуатация систем видеонаблюдения в общих зонах и служебных
      помещениях.
  BC-4940.50.20:
    name: Пожарная и противопожарная системы
    description: |
      Эксплуатация систем пожарного обнаружения, пожаротушения и
      противопожарной безопасности, включая учения.
  BC-4940.50.30:
    name: Реагирование на инциденты объекта
    description: |
      Реагирование на инциденты объекта, связанные с безопасностью,
      кражами и охранными событиями.
  BC-4940.50.40:
    name: Экстренная эвакуация
    description: |
      Выполнение планов экстренной эвакуации и управление инцидентами
      на объекте.
  BC-4940.60:
    name: Энергетика и устойчивое развитие объекта
    description: |
      Управление энергетикой, водоснабжением, отходами, микроклиматом
      и программами субучёта коммунальных услуг арендаторов на уровне
      объекта.
  BC-4940.60.10:
    name: Энергетика объекта
    description: |
      Эксплуатация энергосистем объекта и мониторинг потребления
      относительно целевых показателей.
  BC-4940.60.20:
    name: Водоснабжение и управление отходами
    description: |
      Эксплуатация программ водоснабжения, водоотведения и
      раздельного сбора отходов на объекте.
  BC-4940.60.30:
    name: Качество внутренней среды
    description: |
      Реализация программ качества воздуха, освещения и акустического
      комфорта внутренней среды.
  BC-4940.60.40:
    name: Субучёт и распределение потребления арендаторов
    description: |
      Эксплуатация систем субучёта и распределения потребления
      коммунальных услуг арендаторами.
  BC-4940.70:
    name: Учёт имущества и операционная отчётность
    description: |
      Главная книга объекта, выставление счетов и дебиторская
      задолженность арендаторов, кредиторская задолженность и
      отчётность для владельца.
  BC-4940.70.10:
    name: Ведение главной книги объекта
    description: |
      Ведение главной книги объекта и оборотно-сальдовой ведомости.
  BC-4940.70.20:
    name: Выставление счетов и дебиторская задолженность арендаторов
    description: |
      Выставление счетов на аренду, возмещения и дополнительные
      сборы, а также взыскание дебиторской задолженности.
  BC-4940.70.30:
    name: Кредиторская задолженность объекта
    description: |
      Кредиторская задолженность объекта по коммунальным услугам,
      поставщикам и подрядчикам.
  BC-4940.70.40:
    name: Пакет отчётности для владельца
    description: |
      Периодические пакеты отчётности для владельца по операционным
      показателям и отклонениям.
  BC-4940.80:
    name: Сверка расходов на обслуживание общих зон
    description: |
      Специфический расчётный цикл арендодатель-арендатор,
      охватывающий бюджетирование и оценку CAM, учёт затрат,
      сверку и ответы на аудит арендаторов.
  BC-4940.80.10:
    name: Бюджет CAM и установление смет
    description: |
      Установление бюджетов CAM и сервисных сборов и смет для
      арендаторов на год.
  BC-4940.80.20:
    name: Учёт фактических расходов CAM
    description: |
      Учёт фактических возмещаемых расходов в составе категорий CAM
      и сервисных сборов.
  BC-4940.80.30:
    name: Сверка и расчёт CAM
    description: |
      Сверка фактических расходов CAM со сметой и расчёт
      доначислений с арендаторами.
  BC-4940.80.40:
    name: Ответы на аудит CAM арендаторов
    description: |
      Ответы на запросы арендаторов о проведении аудита и проверки
      прав на CAM и сервисные сборы.

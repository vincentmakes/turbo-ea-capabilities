# Управление фармацевтическим производством (ru) — translations for L1-pharmaceutical-manufacturing-management.yaml
locale: ru
source: L1-pharmaceutical-manufacturing-management.yaml
entries:
  BC-1550:
    name: Управление фармацевтическим производством
    description: |
      Производство активных фармацевтических субстанций и готовых лекарственных форм в соответствии с требованиями GMP.
  BC-1550.10:
    name: Управление производством АФС
    description: |
      Производство активных фармацевтических субстанций (АФС). Охватывает синтез малых молекул, биотехнологическое производство и очистку.
  BC-1550.10.10:
    name: Синтез малых молекул АФС
    description: |
      Синтез активных фармацевтических субстанций из малых молекул.
  BC-1550.10.20:
    name: Производство биологических АФС
    description: |
      Производство биологических АФС методами клеточных культур и ферментации.
  BC-1550.10.30:
    name: Очистка АФС
    description: |
      Нисходящая очистка активных фармацевтических субстанций.
  BC-1550.20:
    name: Управление производством готовых лекарственных форм
    description: |
      Производство готовых лекарственных форм: таблетки, капсулы, жидкие формы, биологические препараты.
  BC-1550.20.10:
    name: Производство твёрдых лекарственных форм
    description: |
      Производственные операции по выпуску таблеток и капсул.
  BC-1550.20.20:
    name: Производство жидких и полутвёрдых форм
    description: |
      Производство жидких форм, суспензий и полутвёрдых лекарственных форм.
  BC-1550.20.30:
    name: Розлив и финишная обработка биологических препаратов
    description: |
      Розлив и финишная обработка биологических лекарственных препаратов.
  BC-1550.20.40:
    name: Производство ингаляционных и специальных форм
    description: |
      Производство ингаляционных, трансдермальных и специальных лекарственных форм.
  BC-1550.30:
    name: Управление стерильным производством
    description: |
      Асептическое производство и производство с терминальной стерилизацией.
  BC-1550.30.10:
    name: Асептические операции наполнения
    description: |
      Асептическое наполнение в соответствии с требованиями Приложения 1.
  BC-1550.30.20:
    name: Операции терминальной стерилизации
    description: |
      Операции терминальной стерилизационной обработки.
  BC-1550.30.30:
    name: Работа в чистых помещениях
    description: |
      Эксплуатация классифицированных чистых помещений и мониторинг окружающей среды.
  BC-1550.40:
    name: Управление упаковкой и маркировкой
    description: |
      Первичная и вторичная упаковка, операции маркировки лекарственных препаратов.
  BC-1550.40.10:
    name: Операции первичной упаковки
    description: |
      Операции первичной упаковки лекарственных препаратов.
  BC-1550.40.20:
    name: Операции вторичной упаковки
    description: |
      Вторичная упаковка, картонирование и формирование связок.
  BC-1550.40.30:
    name: Нанесение этикеток
    description: |
      Нанесение этикеток и сериализационных меток.
  BC-1550.40.40:
    name: Позднее стадийное кастомизирование
    description: |
      Позднее стадийное кастомизирование и страновая упаковка.
  BC-1550.50:
    name: Управление валидацией и квалификацией
    description: |
      Валидация процессов, квалификация оборудования, валидация очистки и компьютерных систем.
  BC-1550.50.10:
    name: Валидация процессов
    description: |
      Валидация производственных процессов в соответствии с ICH Q7.
  BC-1550.50.20:
    name: Квалификация оборудования
    description: |
      Квалификация GMP-оборудования: IQ, OQ, PQ.
  BC-1550.50.30:
    name: Валидация очистки
    description: |
      Валидация очистки при смене продуктов.
  BC-1550.50.40:
    name: Валидация компьютерных систем
    description: |
      Валидация компьютерных систем (CSV) по GAMP 5 и 21 CFR Part 11.
  BC-1550.60:
    name: Управление технологическим трансфером
    description: |
      Технологический трансфер между площадками и масштабирование производства.
  BC-1550.60.10:
    name: Планирование технологического трансфера
    description: |
      Планирование передачи технологии между производственными площадками.
  BC-1550.60.20:
    name: Масштабирование процессов
    description: |
      Масштабирование от пилотного до коммерческого производства.
  BC-1550.60.30:
    name: Верификация готовности площадки
    description: |
      Верификация готовности принимающей площадки к технологическому трансферу.
  BC-1550.70:
    name: Управление производственными операциями GMP
    description: |
      Ежедневные производственные операции GMP и исполнение серийных записей.
  BC-1550.70.10:
    name: Исполнение серийных записей
    description: |
      Исполнение бумажных или электронных серийных записей производства.
  BC-1550.70.20:
    name: Отбор проб внутрипроизводственного контроля
    description: |
      Отбор проб и испытания в рамках внутрипроизводственного контроля.
  BC-1550.70.30:
    name: Очистка производственной линии
    description: |
      Очистка линии и операции по переналадке.
  BC-1550.70.40:
    name: Обучение операторов GMP
    description: |
      Обучение операторов требованиям GMP и их квалификация / аттестация.

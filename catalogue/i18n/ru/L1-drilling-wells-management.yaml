# Бурение и скважины (ru) — translations for L1-drilling-wells-management.yaml
locale: ru
source: L1-drilling-wells-management.yaml
entries:
  BC-3020:
    name: Бурение и скважины
    description: |
      Проектирование, строительство и обеспечение целостности скважин на протяжении всего жизненного цикла: проектирование скважин, буровые операции, заканчивание, интервенции, капитальный ремонт и контроль скважин.
  BC-3020.10:
    name: Проектирование скважин
    description: |
      Проектирование конструкции скважин, обсадных и насосно-компрессорных колонн, буровых растворов и сметной стоимости буровых программ.
  BC-3020.10.10:
    name: Проектирование конструкции скважины
    description: |
      Проектирование траектории, интервалов и общей конструкции скважины.
  BC-3020.10.20:
    name: Проектирование обсадных и насосно-компрессорных колонн
    description: |
      Проектирование обсадных и НКТ колонн с расчётом напряжений на смятие и разрыв.
  BC-3020.10.30:
    name: Проектирование бурового раствора
    description: |
      Выбор системы промывочной жидкости и проектирование реологии для интервалов бурения.
  BC-3020.10.40:
    name: Сметная стоимость скважины
    description: |
      Сметная стоимость по авторизации затрат для программ бурения и заканчивания.
  BC-3020.20:
    name: Управление буровыми операциями
    description: |
      Проведение буровых операций: координация буровой, мониторинг в реальном времени, направленное бурение и цементирование.
    in_scope:
      - Буровой надзор на объекте
      - Мониторинг данных бурения в реальном времени
      - Направленное и регулируемое бурение с постоянным контролем давления
      - Цементирование и спуск обсадных колонн
    out_of_scope:
      - Монтаж заканчивания скважин (BC-3020.30)
      - Промышленная безопасность на буровых установках (BC-3050)
  BC-3020.20.10:
    name: Координация операций буровой установки
    description: |
      Ежедневная координация операций буровой и деятельности подрядчиков.
  BC-3020.20.20:
    name: Мониторинг бурения в реальном времени
    description: |
      Мониторинг данных бурения в реальном времени из центров управления операциями.
  BC-3020.20.30:
    name: Направленное бурение
    description: |
      Проведение наклонного, горизонтального и расширенного бурения.
  BC-3020.20.40:
    name: Операции буровых растворов
    description: |
      Промывка, обработка и разделение твёрдых частиц при бурении.
  BC-3020.20.50:
    name: Операции цементирования
    description: |
      Первичное и восстановительное цементирование.
  BC-3020.30:
    name: Управление заканчиванием скважин
    description: |
      Проектирование и монтаж заканчивания, включая перфорационные и стимуляционные операции.
  BC-3020.30.10:
    name: Проектирование заканчивания
    description: |
      Проектирование верхнего и нижнего заканчивания, включая пескоконтроль при необходимости.
  BC-3020.30.20:
    name: Монтаж заканчивания
    description: |
      Спуск и монтаж колонн заканчивания и аксессуаров.
  BC-3020.30.30:
    name: Перфорационные операции
    description: |
      Выбор перфоратора и создание каналов притока.
  BC-3020.30.40:
    name: Стимуляционные операции
    description: |
      Гидравлический разрыв пласта, кислотная обработка и прочие методы интенсификации притока.
  BC-3020.40:
    name: Интервенции и капитальный ремонт скважин
    description: |
      Долгожизненные интервенции: от каротажных работ до полного капитального ремонта.
  BC-3020.40.10:
    name: Операции с гибкими трубами
    description: |
      Интервенционные операции с гибкими трубами.
  BC-3020.40.20:
    name: Операции каротажа на кабеле и слик-лайна
    description: |
      Сбор данных и интервенционные операции каротажа на кабеле и слик-лайна.
  BC-3020.40.30:
    name: Капитальный ремонт скважин
    description: |
      Капитальный ремонт добывающих и нагнетательных скважин.
  BC-3020.40.40:
    name: Интервенции через НКТ
    description: |
      Ремонтные и стимуляционные интервенции через насосно-компрессорные трубы.
  BC-3020.50:
    name: Управление целостностью скважин
    description: |
      Верификация и мониторинг барьеров скважин на протяжении жизненного цикла, включая управление давлением в затрубном пространстве.
  BC-3020.50.10:
    name: Верификация барьеров скважины
    description: |
      Верификация первичных и вторичных барьеров скважин по стандартам целостности.
  BC-3020.50.20:
    name: Мониторинг давления в затрубном пространстве
    description: |
      Непрерывный и периодический мониторинг давления в затрубных пространствах скважин.
  BC-3020.50.30:
    name: Оценка рисков целостности скважин
    description: |
      Оценка рисков состояния целостности скважин по всему портфелю.
  BC-3020.50.40:
    name: Управление устойчивым давлением в обсадной колонне
    description: |
      Диагностика и управление устойчивым давлением в обсадных колоннах.
  BC-3020.60:
    name: Управление контролем скважин
    description: |
      Предотвращение и реагирование на события контроля скважин: обнаружение притока, операции противовыбросового превентора и обеспечение компетентности.
  BC-3020.60.10:
    name: Обнаружение и реагирование на приток
    description: |
      Методы обнаружения притока и процедуры реагирования при контроле скважин.
  BC-3020.60.20:
    name: Операции противовыбросового превентора
    description: |
      Эксплуатация, функциональные проверки и обслуживание противовыбросовых превенторных стеков.
  BC-3020.60.30:
    name: Подтверждение компетентности контроля скважин
    description: |
      Координация программ компетентности IWCF и IADC WellCAP.
  BC-3020.70:
    name: Управление буровыми подрядчиками
    description: |
      Аудит деятельности, управление производительностью и договорный надзор буровых и сервисных подрядчиков.
  BC-3020.70.10:
    name: Аудит буровых установок
    description: |
      Приёмочный и эксплуатационный аудит буровых установок и подрядчиков.
  BC-3020.70.20:
    name: Управление производительностью бурового подрядчика
    description: |
      Управление производительностью по договорам буровых установок и КПЭ сервисов.
  BC-3020.70.30:
    name: Управление договорами буровых сервисов
    description: |
      Управление договорами сервисных линий бурения (раствор, цементирование, направленное бурение и пр.).

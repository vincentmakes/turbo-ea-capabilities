# Управление продуктовой телеметрией и экспериментами (ru) — translations for L1-product-telemetry-experimentation-management.yaml
locale: ru
source: L1-product-telemetry-experimentation-management.yaml
entries:
  BC-4280:
    name: Управление продуктовой телеметрией и экспериментами
    description: |
      Инструментирование, управление и анализ телеметрии использования продукта, а также разработка и проведение функциональных экспериментов, формирующих продуктовые решения.
  BC-4280.10:
    name: Инструментирование продуктовой телеметрии
    description: |
      Сбор событий использования продукта из клиентских и серверных рантаймов в соответствии с определёнными схемами событий.
  BC-4280.10.10:
    name: Определение схем событий
    description: |
      Определение схем продуктовых событий, включая обязательные и опциональные свойства.
  BC-4280.10.20:
    name: Инструментирование клиентской телеметрии
    description: |
      Инструментирование клиентских рантаймов для генерации продуктовых событий.
  BC-4280.10.30:
    name: Инструментирование серверной телеметрии
    description: |
      Инструментирование серверных рантаймов для генерации продуктовых событий.
  BC-4280.20:
    name: Качество и управление телеметрией
    description: |
      Управление схемами, мониторинг качества конвейера и фильтрация приватности продуктовой телеметрии.
  BC-4280.20.10:
    name: Управление схемами телеметрии
    description: |
      Управление схемами продуктовых событий по поверхностям продукта.
  BC-4280.20.20:
    name: Мониторинг качества конвейера телеметрии
    description: |
      Мониторинг корректности, полноты и свежести конвейера телеметрии.
  BC-4280.20.30:
    name: Фильтрация приватности телеметрии
    description: |
      Фильтрация, редактирование и минимизация телеметрии в соответствии с обязательствами по приватности.
  BC-4280.30:
    name: Аналитика использования продукта
    description: |
      Аналитические представления использования продукта: воронки, когорты удержания и вовлечённость функций.
  BC-4280.30.10:
    name: Воронковая аналитика
    description: |
      Анализ воронки конверсии и отказов по продуктовым сценариям.
  BC-4280.30.20:
    name: Когортная аналитика удержания
    description: |
      Когортный анализ удержания пользователей с течением времени.
  BC-4280.30.30:
    name: Отчётность о вовлечённости функций
    description: |
      Отчётность о вовлечённости в отдельные функции по пользовательской базе.
  BC-4280.40:
    name: Управление программой экспериментов
    description: |
      Методология, ревью дизайна и принятие решений по экспериментам, влияющим на продуктовые решения.
  BC-4280.40.10:
    name: Стандарты методологии экспериментов
    description: |
      Стандарты валидной методологии экспериментов по продуктовым командам.
  BC-4280.40.20:
    name: Ревью дизайна экспериментов
    description: |
      Ревью дизайна экспериментов на соответствие стандартам методологии и этики.
  BC-4280.40.30:
    name: Принятие решений по результатам экспериментов
    description: |
      Принятие решений по результатам экспериментов и вытекающим продуктовым решениям.
  BC-4280.50:
    name: Проведение A/B-тестов
    description: |
      Конфигурирование, таргетинг и мониторинг текущих A/B и многовариантных тестов.
  BC-4280.50.10:
    name: Конфигурирование экспериментов
    description: |
      Конфигурирование вариантов эксперимента и правил назначения.
  BC-4280.50.20:
    name: Таргетинг экспериментов
    description: |
      Таргетинг когорт эксперимента на соответствующие аудитории.
  BC-4280.50.30:
    name: Мониторинг экспериментов
    description: |
      Мониторинг текущих экспериментов по защитным барьерам и досрочной остановке.
  BC-4280.60:
    name: Синтез клиентской аналитики
    description: |
      Синтез количественных и качественных сигналов в продуктовые решения и аналитические меморандумы.
  BC-4280.60.10:
    name: Синтез количественных данных
    description: |
      Синтез количественных выводов из телеметрии и экспериментов.
  BC-4280.60.20:
    name: Синтез качественных данных
    description: |
      Синтез выводов качественных исследований в продуктовые инсайты.
  BC-4280.60.30:
    name: Подготовка аналитических меморандумов
    description: |
      Подготовка аналитических меморандумов, фиксирующих доказательства, выбор и обоснование.

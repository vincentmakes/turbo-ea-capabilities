# Управление операциями рынков капитала (ru) — translations for L1-capital-markets-operations-management.yaml
locale: ru
source: L1-capital-markets-operations-management.yaml
entries:
  BC-1380:
    name: Управление операциями рынков капитала
    description: |
      Подтверждение сделок, клиринг, расчёты, кастодиальные услуги, обеспечение, корпоративные действия, выверка.
  BC-1380.10:
    name: Управление подтверждением сделок
    description: |
      Ввод и бронирование сделок, подтверждение, allegement.
  BC-1380.10.10:
    name: Ввод и бронирование сделок
    description: |
      Ввод и бронирование сделок в системах фронт- и мидл-офиса.
  BC-1380.10.20:
    name: Сверка подтверждений сделок
    description: |
      Сверка и подтверждение торговых подтверждений.
  BC-1380.10.30:
    name: Обработка allegements
    description: |
      Обработка allegements и несопоставленных сделок.
  BC-1380.20:
    name: Управление клирингом
    description: |
      Центральный клиринг, ЦКА, членство в клиринге.
  BC-1380.20.10:
    name: Подача сделок в ЦКА
    description: |
      Подача клиринговых сделок центральным контрагентам.
  BC-1380.20.20:
    name: Управление клиринговой маржей
    description: |
      Управление начальной и вариационной маржей с ЦКА.
  BC-1380.20.30:
    name: Операции члена клиринга
    description: |
      Функционирование прямых и клиентских клиринговых услуг.
  BC-1380.30:
    name: Управление расчётами
    description: |
      Расчёты DvP, циклы T+1/T+2, управление неисполнением.
  BC-1380.30.10:
    name: Формирование расчётных инструкций
    description: |
      Формирование расчётных инструкций по сделкам.
  BC-1380.30.20:
    name: Операции расчётов по ценным бумагам
    description: |
      Операции расчётов DvP через ЦД и МЦБД.
  BC-1380.30.30:
    name: Управление неисполнением расчётов
    description: |
      Выявление и урегулирование неисполнений расчётов (CSDR).
  BC-1380.40:
    name: Управление кастодиальными услугами
    description: |
      Хранение ценных бумаг, сети субкастодианов.
  BC-1380.40.10:
    name: Хранение ценных бумаг
    description: |
      Хранение ценных бумаг для клиентов и проприетарных счетов.
  BC-1380.40.20:
    name: Управление сетью субкастодианов
    description: |
      Управление сетью субкастодианов и банков-агентов.
  BC-1380.40.30:
    name: Кастодиальные налоговые сервисы
    description: |
      Кастодиальные услуги по возврату налогов и удержанию налога у источника.
  BC-1380.50:
    name: Управление обеспечением
    description: |
      Обеспечение, маржинирование, оптимизация.
  BC-1380.50.10:
    name: Управление маржин-коллами
    description: |
      Выставление и реагирование на маржин-коллы в двусторонних и ЦКА-режимах.
  BC-1380.50.20:
    name: Операции по движению обеспечения
    description: |
      Операционное движение обеспечения между контрагентами.
  BC-1380.50.30:
    name: Оптимизация обеспечения
    description: |
      Оптимизация использования и замены обеспечения.
  BC-1380.50.40:
    name: Управление допустимостью обеспечения
    description: |
      Правила допустимости обеспечения и применение дисконтов.
  BC-1380.60:
    name: Управление корпоративными действиями
    description: |
      Обработка обязательных и добровольных корпоративных действий.
  BC-1380.60.10:
    name: Уведомление о корпоративном действии
    description: |
      Фиксация и уведомление клиентов о корпоративных действиях.
  BC-1380.60.20:
    name: Обработка обязательных корпоративных действий
    description: |
      Обработка дивидендов, процентов и обязательных событий.
  BC-1380.60.30:
    name: Обработка добровольных корпоративных действий
    description: |
      Обработка добровольных событий, включая выборы.
  BC-1380.60.40:
    name: Операции по голосованию через доверенность
    description: |
      Сбор и подача голосов через доверенность.
  BC-1380.70:
    name: Управление выверкой
    description: |
      Выверка ностро/востро, позиций, денежных средств.
  BC-1380.70.10:
    name: Выверка денежных средств
    description: |
      Выверка счетов денежных средств, включая ностро/востро.
  BC-1380.70.20:
    name: Выверка позиций по ценным бумагам
    description: |
      Выверка позиций по ценным бумагам в разных системах и кастодианах.
  BC-1380.70.30:
    name: Выверка сделок и фронт-бэк
    description: |
      Выверка сделок между фронт- и бэк-офисом по системам.
  BC-1380.70.40:
    name: Расследование расхождений при выверке
    description: |
      Расследование и урегулирование расхождений при выверке.
  BC-1380.80:
    name: Управление операциями по займу ценных бумаг
    description: |
      Займ ценных бумаг, кредитование, управление обеспечением.
  BC-1380.80.10:
    name: Организация займа ценных бумаг
    description: |
      Организация сделок по займу и кредитованию ценных бумаг.
  BC-1380.80.20:
    name: Операции с обеспечением при займе ценных бумаг
    description: |
      Операции с обеспечением, поддерживающим займ ценных бумаг.
  BC-1380.80.30:
    name: Расчёт комиссий и вознаграждений по займу ценных бумаг
    description: |
      Расчёт и расчёт комиссий и вознаграждений.
  BC-1380.80.40:
    name: Управление отзывом займа ценных бумаг
    description: |
      Отзыв переданных в займ ценных бумаг и операции замены.

# Управление информационными технологиями (ru) — translations for L1-information-technology-management.yaml
locale: ru
source: L1-information-technology-management.yaml
entries:
  BC-600:
    name: Управление информационными технологиями
    description: |
      ИТ-стратегия, архитектура, сервисы и операции.
  BC-600.10:
    name: Управление ИТ-стратегией и архитектурой
    description: |
      ИТ-стратегия, корпоративная архитектура, технологические стандарты.
  BC-600.10.10:
    name: Разработка ИТ-стратегии
    description: |
      Определение ИТ-стратегии, согласованной с бизнес-стратегией.
  BC-600.10.20:
    name: Управление корпоративной архитектурой
    description: |
      Корпоративная архитектура в соответствии с TOGAF по бизнес-, данным-, прикладному и технологическому уровням.
  BC-600.10.30:
    name: Управление технологическими стандартами
    description: |
      Определение и управление технологическими стандартами и паттернами.
  BC-600.10.40:
    name: Управление технологической дорожной картой
    description: |
      Многолетние технологические дорожные карты и эволюция возможностей.
  BC-600.10.50:
    name: Управление и рецензирование архитектуры
    description: |
      Совет по архитектуре, орган дизайна и управление исключениями.
  BC-600.20:
    name: Управление ИТ-портфелем и спросом
    description: |
      ИТ-портфель, приём спроса, приоритизация.
  BC-600.20.10:
    name: Приём ИТ-спроса
    description: |
      Сбор и сортировка новых ИТ-потребностей от бизнеса.
  BC-600.20.20:
    name: Управление инвестиционным ИТ-портфелем
    description: |
      Портфельный обзор ИТ-инвестиций, проектов и выгод.
  BC-600.20.30:
    name: Планирование ИТ-мощностей и ресурсов
    description: |
      Планирование мощностей ИТ-доставки по командам и навыкам.
  BC-600.20.40:
    name: Управление бизнес-отношениями
    description: |
      Бизнес-партнёрство между ИТ и бизнес-функциями.
  BC-600.30:
    name: Управление ИТ-сервисами
    description: |
      Инциденты, проблемы, изменения, каталог сервисов, ITSM.
  BC-600.30.10:
    name: Управление каталогом сервисов
    description: |
      Определение и ведение каталога сервисов и SLA.
  BC-600.30.20:
    name: Управление инцидентами
    description: |
      Обнаружение, сортировка, устранение и коммуникации по инцидентам.
  BC-600.30.30:
    name: Управление проблемами
    description: |
      Анализ первопричин и предотвращение повторяющихся инцидентов.
  BC-600.30.40:
    name: Управление изменениями и релизами
    description: |
      Согласование ИТ-изменений и управление релизами.
  BC-600.30.50:
    name: Управление уровнями сервиса
    description: |
      Определение, измерение и отчётность по уровням сервиса.
  BC-600.30.60:
    name: Управление конфигурациями
    description: |
      Конфигурационные единицы, CMDB и управление зависимостями.
  BC-600.40:
    name: Управление ИТ-операциями
    description: |
      Ежедневные ИТ-операции, мониторинг, автоматизация.
  BC-600.40.10:
    name: Управление событиями и мониторинг
    description: |
      Телеметрия, наблюдаемость, корреляция событий и оповещение.
  BC-600.40.20:
    name: Планирование задач и пакетные операции
    description: |
      Планировщик задач, оркестрация пакетной обработки и автоматизация рабочих нагрузок.
  BC-600.40.30:
    name: Управление ИТ-мощностями и производительностью
    description: |
      Планирование мощностей и оптимизация производительности сервисов.
  BC-600.40.40:
    name: Обеспечение непрерывности ИТ-сервисов
    description: |
      Тестирование непрерывности ИТ-сервисов и операции восстановления.
  BC-600.40.50:
    name: Управление ИТ-автоматизацией
    description: |
      Автоматизация, runbook'и и оркестрация ИТ-операций.
  BC-600.50:
    name: Управление ИТ-инфраструктурой
    description: |
      Вычисления, хранение данных, сети, облачная инфраструктура.
  BC-600.50.10:
    name: Управление вычислительными ресурсами и серверами
    description: |
      Предоставление и эксплуатация физических и виртуальных вычислительных ресурсов.
  BC-600.50.20:
    name: Управление хранилищами данных
    description: |
      Предоставление, тиерирование и защита хранилищ данных.
  BC-600.50.30:
    name: Управление сетями
    description: |
      Управление LAN, WAN, SD-WAN и сетевыми сервисами.
  BC-600.50.40:
    name: Управление облачными платформами
    description: |
      Эксплуатация публичных, частных и гибридных облачных платформ.
  BC-600.50.50:
    name: Управление конечными устройствами пользователей
    description: |
      Рабочие устройства, управление конечными точками и инструменты совместной работы.
  BC-600.60:
    name: Управление ИТ-приложениями
    description: |
      Жизненный цикл приложений, рационализация, AMS.
  BC-600.60.10:
    name: Управление портфелем приложений
    description: |
      Каталог приложений, владение и статус жизненного цикла.
  BC-600.60.20:
    name: Разработка и инженерия приложений
    description: |
      Разработка программного обеспечения, инженерные практики и DevOps.
  BC-600.60.30:
    name: Поддержка и обслуживание приложений
    description: |
      AMS, устранение дефектов и реализация небольших улучшений.
  BC-600.60.40:
    name: Рационализация приложений
    description: |
      Рационализация, консолидация и вывод из эксплуатации приложений.
  BC-600.60.50:
    name: Управление интеграцией и API
    description: |
      Интеграционные платформы, API и потоковая передача событий.
  BC-600.70:
    name: Управление ИТ-вендорами
    description: |
      Договоры с ИТ-вендорами, управление результативностью, экосистема.
  BC-600.70.10:
    name: Подключение ИТ-вендоров
    description: |
      Подключение и заключение договоров с ИТ-поставщиками и партнёрами.
  BC-600.70.20:
    name: Управление результативностью ИТ-вендоров
    description: |
      Карты показателей и управление SLA для ИТ-вендоров.
  BC-600.70.30:
    name: Управление программными лицензиями
    description: |
      Программные лицензии, права использования и управление аудитами.
  BC-600.70.40:
    name: Стратегия ИТ-sourcing'а
    description: |
      Стратегия «сделать или купить» и sourcing'а управляемых услуг для ИТ.
  BC-600.80:
    name: Финансовое управление ИТ
    description: |
      ИТ-расходы, chargeback/showback, оптимизация ИТ-затрат.
  BC-600.80.10:
    name: Бюджетирование и прогнозирование ИТ
    description: |
      Планирование ИТ-бюджета, прогнозирование и анализ отклонений.
  BC-600.80.20:
    name: Распределение ИТ-затрат и chargeback
    description: |
      Showback, chargeback и распределение затрат на основе TBM.
  BC-600.80.30:
    name: Управление Cloud FinOps
    description: |
      Практики FinOps для обеспечения видимости и оптимизации облачных затрат.
  BC-600.80.40:
    name: Отслеживание ИТ-ценности и выгод
    description: |
      Отслеживание ценности ИТ-инвестиций и реализации выгод.

# Предотвращение потерь в розничной торговле (ru) — translations for L1-retail-loss-prevention-management.yaml
locale: ru
source: L1-retail-loss-prevention-management.yaml
entries:
  BC-2340:
    name: Управление предотвращением потерь в розничной торговле
    description: |
      Предотвращение, выявление, расследование и сокращение товарных потерь и мошенничества
      в розничной сети — от краж покупателями и организованной торговой преступности до
      внутренних хищений и злоупотреблений на уровне POS.
  BC-2340.10:
    name: Управление анализом потерь
    description: |
      Измерение, анализ первопричин и отчётность по товарным потерям
      в разрезе магазинов, каналов и категорий.
    in_scope:
      - Измерение потерь товаров относительно балансового учёта
      - Отчётность по потерям по магазину, категории и причине
      - Анализ первопричин неустановленных потерь
  BC-2340.10.10:
    name: Измерение потерь
    description: |
      Измерение потерь относительно балансового учёта и фактических инвентаризаций.
  BC-2340.10.20:
    name: Анализ первопричин потерь
    description: |
      Анализ первопричин потерь по установленным и неустановленным причинам.
  BC-2340.10.30:
    name: Отчётность по потерям и целевые показатели
    description: |
      Отчётность по потерям и установление целей по их снижению в разрезе магазина и категории.
  BC-2340.20:
    name: Управление расследованием внутренних хищений
    description: |
      Выявление, расследование и разрешение случаев нечестности сотрудников,
      включая дисциплинарные меры и взыскание ущерба.
  BC-2340.20.10:
    name: Выявление нечестности сотрудников
    description: |
      Выявление нечестности сотрудников через горячие линии, аналитику и аудиты.
  BC-2340.20.20:
    name: Ведение внутренних расследований
    description: |
      Ведение внутренних расследований, включая работу с доказательствами.
  BC-2340.20.30:
    name: Координация взыскания и дисциплинарных мер
    description: |
      Координация взыскания ущерба, дисциплинарных и кадровых мер.
  BC-2340.30:
    name: Управление внешними хищениями и организованной торговой преступностью
    description: |
      Предотвращение и расследование краж покупателями и организованной торговой преступности,
      включая взаимодействие с правоохранительными органами и отраслевыми организациями.
  BC-2340.30.10:
    name: Предотвращение краж покупателями
    description: |
      Предотвращение краж покупателями посредством профилактики, организации торгового пространства и вмешательства.
  BC-2340.30.20:
    name: Расследование организованной торговой преступности
    description: |
      Расследование сетей и схем организованной торговой преступности.
  BC-2340.30.30:
    name: Взаимодействие с правоохранительными органами
    description: |
      Взаимодействие с полицией и отраслевыми форумами по делам о розничных кражах.
  BC-2340.40:
    name: Управление предотвращением мошенничества в POS
    description: |
      Выявление и предотвращение мошенничества в торговых точках, включая мошенничество
      при возвратах, сговор кассиров и отчётность по исключениям.
    in_scope:
      - Выявление мошенничества при возвратах и обменах
      - Выявление сговора кассиров и злоупотребления скидками
      - Отчётность по исключениям в POS
  BC-2340.40.10:
    name: Выявление мошенничества при возвратах и обменах
    description: |
      Выявление схем мошенничества при возвратах и обменах товаров.
  BC-2340.40.20:
    name: Выявление сговора кассиров и злоупотреблений скидками
    description: |
      Выявление сговора кассиров с покупателями и несанкционированного применения скидок.
  BC-2340.40.30:
    name: Отчётность по исключениям в POS
    description: |
      Отчётность по исключениям в POS-транзакциях для выявления аномалий.
  BC-2340.50:
    name: Управление физической безопасностью и видеонаблюдением
    description: |
      Физическая безопасность магазина, включая систему видеонаблюдения, EAS,
      контроль доступа и охранные службы.
  BC-2340.50.10:
    name: Операции системы видеонаблюдения
    description: |
      Эксплуатация, мониторинг и работа с доказательной базой системы видеонаблюдения в магазине.
  BC-2340.50.20:
    name: Операции электронного защитного маркирования
    description: |
      Эксплуатация ворот и маркеров EAS, включая реагирование на срабатывание сигнализации.
  BC-2340.50.30:
    name: Контроль доступа в магазине
    description: |
      Физический контроль доступа в складские помещения, кассовые комнаты и служебные зоны.
  BC-2340.50.40:
    name: Управление охранными службами
    description: |
      Развёртывание и управление штатными и сторонними охранными службами в магазине.

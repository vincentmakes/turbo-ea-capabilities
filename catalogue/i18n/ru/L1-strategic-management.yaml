# Стратегическое управление (ru) — translations for L1-strategic-management.yaml
locale: ru
source: L1-strategic-management.yaml
entries:
  BC-100:
    name: Стратегическое управление
    description: |
      Определение направления развития, видения, миссии и долгосрочных целей предприятия.
  BC-100.10:
    name: Стратегическое планирование
    description: |
      Формулирование видения, миссии, стратегических целей и долгосрочных планов.
  BC-100.10.10:
    name: Определение видения и миссии
    description: |
      Формулирование видения, миссии и ключевых ценностей предприятия.
  BC-100.10.20:
    name: Анализ внешней и внутренней среды
    description: |
      Внешний и внутренний анализ с применением методов PESTLE, SWOT и конкурентной разведки.
  BC-100.10.30:
    name: Формулирование стратегического выбора
    description: |
      Оценка стратегических альтернатив и выбор стратегического направления развития.
  BC-100.10.40:
    name: Разработка долгосрочного плана
    description: |
      Многолетний план со стратегическими целями, ориентирами и распределением капитала.
  BC-100.10.50:
    name: Сценарное планирование
    description: |
      Разработка вероятных сценариев будущего и contingency-стратегий.
  BC-100.20:
    name: Управление исполнением стратегии
    description: |
      Преобразование стратегии в цели, OKR и сбалансированные системы показателей.
  BC-100.20.10:
    name: Каскадирование стратегических целей
    description: |
      Преобразование корпоративной стратегии в цели бизнес-единиц и функциональных подразделений.
  BC-100.20.20:
    name: Управление стратегическими показателями
    description: |
      Сбалансированная система показателей, OKR, определение и отслеживание KPI.
  BC-100.20.30:
    name: Пересмотр и корректировка стратегии
    description: |
      Периодические циклы анализа стратегии и корректирующие действия.
  BC-100.20.40:
    name: Управление стратегическими инициативами
    description: |
      Стейдж-гейт управление стратегическими инициативами.
  BC-100.30:
    name: Управление корпоративным развитием
    description: |
      M&A, отчуждения активов, совместные предприятия, партнёрства.
  BC-100.30.10:
    name: Исполнение сделок M&A
    description: |
      Поиск целей, due diligence, структурирование и закрытие сделок.
  BC-100.30.20:
    name: Управление отчуждением активов
    description: |
      Выделение, разделение, продажа активов и юридических лиц.
  BC-100.30.30:
    name: Управление совместными предприятиями и альянсами
    description: |
      Создание и управление JV, альянсами и стратегическими партнёрствами.
  BC-100.30.40:
    name: Интеграция после слияния
    description: |
      Планирование интеграции и реализация синергий после сделок M&A.
  BC-100.40:
    name: Управление стратегическим портфелем
    description: |
      Портфель стратегических инициатив в масштабах предприятия.
  BC-100.40.10:
    name: Определение портфеля инициатив
    description: |
      Инвентаризация и классификация стратегических инициатив.
  BC-100.40.20:
    name: Приоритизация портфеля
    description: |
      Оценка, отбор и приоритизация инициатив в соответствии со стратегией.
  BC-100.40.30:
    name: Распределение инвестиций
    description: |
      Распределение капитала, людей и мощностей в рамках портфеля.
  BC-100.40.40:
    name: Мониторинг результативности портфеля
    description: |
      Отслеживание реализации выгод и состояния портфеля.
  BC-100.50:
    name: Управление бизнес-моделью
    description: |
      Определение, развитие и обновление бизнес-модели.
  BC-100.50.10:
    name: Проектирование бизнес-модели
    description: |
      Формулирование ценностного предложения, клиентских сегментов и модели доходов.
  BC-100.50.20:
    name: Инновации бизнес-модели
    description: |
      Исследование и прототипирование новых и смежных бизнес-моделей.
  BC-100.50.30:
    name: Оценка результативности бизнес-модели
    description: |
      Анализ юнит-экономики, масштабируемости и соответствия бизнес-модели рынку.
metadata:
  status: draft
  reviewer: pending

# Управление операциями обогащения минерального сырья (ru) — translations for L1-mineral-processing-operations-management.yaml
locale: ru
source: L1-mineral-processing-operations-management.yaml
entries:
  BC-4440:
    name: Управление операциями обогащения минерального сырья
    description: |
      Операции обогатительного и гидрометаллургического передела, переводящие
      рядовую руду в товарные концентраты или промежуточные продукты посредством
      дробления, измельчения, обогащения, выщелачивания и обезвоживания.

  BC-4440.10:
    name: Управление складом рядовой руды
    description: |
      Управление складами рядовой руды между рудником и обогатительной фабрикой,
      включая погрузку, усреднение и инвентаризационную сверку.
    in_scope:
      - Усреднение и погрузка со склада рядовой руды
      - Инвентаризационная сверка склада
    out_of_scope:
      - Распределение рудных блоков в карьере (BC-4430.40.40)
      - Складирование концентрата (BC-4440.50.30)

  BC-4440.10.10:
    name: Погрузка рядовой руды со склада
    description: |
      Погрузка рядовой руды со склада в питание фабрики посредством
      пластинчатых питателей или фронтальных погрузчиков.

  BC-4440.10.20:
    name: Усреднение руды
    description: |
      Усреднение материала склада для достижения целевого содержания и
      металлургических характеристик питания.

  BC-4440.10.30:
    name: Инвентаризационная сверка склада
    description: |
      Сверка данных маркшейдерской съёмки, диспетчерской системы и
      погрузки в инвентаризационные балансы склада.

  BC-4440.20:
    name: Операции дробления и измельчения
    description: |
      Дробление, измельчение и оптимизация схем, уменьшающие крупность
      руды до степени раскрытия минералов.

  BC-4440.20.10:
    name: Операции дробления
    description: |
      Эксплуатация корпусов первичного, вторичного и третичного дробления.

  BC-4440.20.20:
    name: Операции мельниц
    description: |
      Эксплуатация мельниц ПСИ, АГ, шаровых и стержневых с соответствующей
      классификацией.

  BC-4440.20.30:
    name: Оптимизация схемы рудоподготовки
    description: |
      Технологическая оптимизация схем рудоподготовки по производительности,
      P80 и энергоёмкости.

  BC-4440.30:
    name: Операции обогащения
    description: |
      Физическое концентрирование ценных минералов флотацией, гравитационными,
      магнитными методами и разделением в тяжёлых средах.

  BC-4440.30.10:
    name: Операции флотационной схемы
    description: |
      Эксплуатация флотационных схем основной, контрольной и перечистной
      флотации с дозированием реагентов.

  BC-4440.30.20:
    name: Гравитационное обогащение
    description: |
      Эксплуатация отсадочных машин, спиральных и центробежных концентраторов
      для гравитационно-извлекаемых минералов.

  BC-4440.30.30:
    name: Магнитная сепарация
    description: |
      Слабая и сильная магнитная сепарация ферро- и парамагнитных минералов.

  BC-4440.30.40:
    name: Разделение в тяжёлых средах
    description: |
      Эксплуатация гидроциклонов и барабанов в тяжёлых средах для
      предварительного обогащения.

  BC-4440.40:
    name: Гидрометаллургические операции
    description: |
      Водное извлечение металлов кучным, чановым и вальным выщелачиванием,
      экстракцией растворителями и адсорбционными схемами.

  BC-4440.40.10:
    name: Операции кучного выщелачивания
    description: |
      Эксплуатация подушек кучного выщелачивания, включая укладку руды,
      орошение и сбор продуктивных растворов.

  BC-4440.40.20:
    name: Операции чанового и вального выщелачивания
    description: |
      Эксплуатация чановых и вальных схем выщелачивания руды и концентрата.

  BC-4440.40.30:
    name: Операции экстракции растворителями
    description: |
      Эксплуатация схем экстракции растворителями для избирательного
      перевода металла в электролит.

  BC-4440.40.40:
    name: Операции угольной адсорбции
    description: |
      Эксплуатация схем «уголь в пульпе», «уголь в растворе» и «уголь
      в колонне» с десорбцией и регенерацией.

  BC-4440.50:
    name: Обезвоживание и складирование концентрата
    description: |
      Сгущение, фильтрация и складирование концентратов для отгрузки
      на плавку или продажи.

  BC-4440.50.10:
    name: Операции сгущения
    description: |
      Эксплуатация высокопроизводительных и пастовых сгустителей для
      обезвоживания концентрата и хвостов.

  BC-4440.50.20:
    name: Фильтрация и обезвоживание
    description: |
      Эксплуатация пресс-, вакуумных и ленточных фильтров для
      обезвоживания концентрата.

  BC-4440.50.30:
    name: Складирование концентрата
    description: |
      Закрытое и открытое складирование обезвоженного концентрата перед
      отгрузкой.

  BC-4440.60:
    name: Металлургический учёт обогатительной фабрики
    description: |
      Опробование, анализ и балансовая сверка питания, продуктов и хвостов
      обогатительной фабрики.

  BC-4440.60.10:
    name: Опробование и анализ потоков фабрики
    description: |
      Поперечное опробование и анализ питания, концентрата и хвостов фабрики.

  BC-4440.60.20:
    name: Металлургический баланс
    description: |
      Периодическая балансовая сверка металла по всей технологической
      схеме фабрики.

  BC-4440.60.30:
    name: Отчётность по извлечению
    description: |
      Отчётность по извлечению металла относительно плана и проектных
      показателей.

  BC-4440.60.40:
    name: Отчётность по качеству концентрата
    description: |
      Отчётность по содержанию концентрата, вредным примесям и влажности
      относительно технических условий.

  BC-4440.70:
    name: Управление реагентами и расходными материалами
    description: |
      Управление технологическими реагентами и расходными материалами:
      дозирование, складской учёт и надзор за опасными реагентами.

  BC-4440.70.10:
    name: Управление дозированием реагентов
    description: |
      Оперативное управление дозированием реагентов во флотационных и
      гидрометаллургических схемах в режиме реального времени.

  BC-4440.70.20:
    name: Управление запасами реагентов
    description: |
      Инвентаризационный и расходный учёт навальных реагентов и
      мелющих тел.

  BC-4440.70.30:
    name: Надзор за обращением с цианидами
    description: |
      Надзор за обращением с цианидами и другими опасными реагентами
      в соответствии с Международным кодексом управления цианидами.


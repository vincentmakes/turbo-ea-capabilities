# Зачисление студентов и ведение документации (ru) — translations for L1-student-enrolment-records-management.yaml
locale: ru
source: L1-student-enrolment-records-management.yaml
entries:
  BC-4720:
    name: Зачисление студентов и ведение документации
    description: |
      Администрирование активного жизненного цикла студента от зачисления и
      регистрации через академические документы, выписки, перезачёт кредитов
      и выпуск, включая управление идентификаторами студентов.
  BC-4720.10:
    name: Зачисление и регистрация
    description: |
      Зачисление на курсы и регистрация принятых студентов по семестрам,
      включая изменения расписания и продолжение обучения.
    in_scope:
      - Регистрация на курсы
      - Добавление/исключение курсов и изменения расписания
      - Повторное зачисление и продолжение обучения
    out_of_scope:
      - Первоначальные решения о приёме (охватываются разделом «Набор и приём студентов»)
  BC-4720.10.10:
    name: Регистрация на курсы
    description: |
      Регистрация студентов на курсы, потоки и учебные единицы.
  BC-4720.10.20:
    name: Добавление/исключение курсов и изменения расписания
    description: |
      Обработка добавления/исключения курсов и изменений расписания в
      установленные сроки.
  BC-4720.10.30:
    name: Повторное зачисление и продолжение обучения
    description: |
      Повторное зачисление и продолжение обучения по академическим семестрам
      и годам.
  BC-4720.20:
    name: Управление академическими документами
    description: |
      Ведение авторитетных академических документов студентов, включая оценки,
      выписки и определение академического статуса.
    in_scope:
      - Запись оценок и баллов
      - Оформление выписок
      - Определение академического статуса
    out_of_scope:
      - Сам процесс проверки работ (охватывается разделом «Оценивание и экзамены»)
  BC-4720.20.10:
    name: Запись оценок и баллов
    description: |
      Авторитетная запись оценок и баллов в документы студента.
  BC-4720.20.20:
    name: Оформление выписок
    description: |
      Оформление и выдача официальных и неофициальных академических выписок.
  BC-4720.20.30:
    name: Определение академического статуса
    description: |
      Определение академического статуса, отличия, академической задолженности
      и отчисления.
  BC-4720.30:
    name: Документация расписания и учебного плана
    description: |
      Авторитетная документация расписания курсов, распределения аудиторий
      и решений об устранении конфликтов.
    in_scope:
      - Записи расписания по потокам и учебным группам
      - Записи о распределении аудиторий и помещений
      - Записи об устранении конфликтов расписания
    out_of_scope:
      - Ежедневная аудиторная работа (охватывается разделом «Организация учебного процесса»)
  BC-4720.30.10:
    name: Документация расписания по потокам и учебным группам
    description: |
      Авторитетная документация расписания по потокам и учебным группам.
  BC-4720.30.20:
    name: Документация о распределении аудиторий и помещений
    description: |
      Записи о распределении учебных аудиторий и помещений по расписанию.
  BC-4720.30.30:
    name: Документация об устранении конфликтов расписания
    description: |
      Документация о выявленных и устранённых конфликтах расписания.
  BC-4720.40:
    name: Перезачёт кредитов и признание результатов обучения
    description: |
      Оценка и регистрация кредитов, перезачтённых из других учебных заведений,
      признание предшествующего обучения и применение соглашений об
      академической мобильности.
    in_scope:
      - Оценка переводных кредитов
      - Признание предшествующего обучения (RPL)
      - Применение соглашений об академической мобильности
    out_of_scope:
      - Нострификация иностранных документов при поступлении (охватывается разделом «Набор и приём студентов»)
  BC-4720.40.10:
    name: Оценка переводных кредитов
    description: |
      Оценка кредитов, полученных в других учебных заведениях, относительно
      программ учебного заведения.
  BC-4720.40.20:
    name: Признание предшествующего обучения
    description: |
      Признание предшествующего практического и неформального обучения в
      зачёт кредитов.
  BC-4720.40.30:
    name: Применение соглашений об академической мобильности
    description: |
      Применение межинституциональных соглашений об академической мобильности
      в документах студентов.
  BC-4720.50:
    name: Выпуск и присвоение квалификаций
    description: |
      Проверка соответствия требованиям выпуска, присвоение квалификаций и
      выдача верифицируемых удостоверений, дипломов и свидетельств.
    in_scope:
      - Проверка соответствия требованиям выпуска
      - Присвоение квалификаций
      - Выдача и последующая верификация удостоверений
    out_of_scope:
      - Обработка результатов экзаменов (охватывается разделом «Оценивание и экзамены»)
  BC-4720.50.10:
    name: Проверка соответствия требованиям выпуска
    description: |
      Проверка документов студента на соответствие требованиям выпуска.
  BC-4720.50.20:
    name: Присвоение квалификаций
    description: |
      Официальное присвоение учёных степеней и квалификаций.
  BC-4720.50.30:
    name: Выдача и верификация удостоверений
    description: |
      Выдача и верификация бумажных и цифровых документов об образовании,
      включая верифицируемые электронные удостоверения.
  BC-4720.60:
    name: Документация по идентификаторам и жизненному циклу студента
    description: |
      Ведение идентификаторов студентов, статусных отметок зачисления и
      записей об отчислении/академическом отпуске.
    in_scope:
      - Управление жизненным циклом идентификаторов студентов
      - Поддержание статуса зачисления
      - Документация об отчислениях и академических отпусках
    out_of_scope:
      - Аутентификация и управление доступом (охватываются управлением кибербезопасностью)
  BC-4720.60.10:
    name: Жизненный цикл идентификаторов студентов
    description: |
      Жизненный цикл уникальных идентификаторов студентов от создания до
      закрытия.
  BC-4720.60.20:
    name: Поддержание статуса зачисления
    description: |
      Поддержание авторитетных статусных отметок зачисления (активен,
      в академическом отпуске, отчислен).
  BC-4720.60.30:
    name: Документация об отчислениях и академических отпусках
    description: |
      Документация об отчислениях студентов, академических отпусках и
      повторных зачислениях.

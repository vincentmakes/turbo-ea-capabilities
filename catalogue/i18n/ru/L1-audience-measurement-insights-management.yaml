# Измерение аудитории и аналитика (ru) — translations for L1-audience-measurement-insights-management.yaml
locale: ru
source: L1-audience-measurement-insights-management.yaml
entries:
  BC-3770:
    name: Измерение аудитории и аналитика
    description: |
      Сбор телеметрии просмотра, панельные и цензовые измерения, аналитика
      производительности контента, моделирование рекомендаций и аудиторные
      исследования на линейных, по запросу и прямых контентных сервисах.
  BC-3770.10:
    name: Сбор данных о просмотре
    description: |
      Сбор данных линейного тюнинга, OTT-телеметрии воспроизведения
      и цензовых сигналов set-top box в аналитическую платформу.
  BC-3770.10.10:
    name: Сбор данных линейного тюнинга
    description: |
      Сбор данных линейного тюнинга из обратных каналов
      операторов и партнёрских источников.
  BC-3770.10.20:
    name: Сбор OTT-телеметрии воспроизведения
    description: |
      Сбор OTT-телеметрии воспроизведения с клиентов
      и источников для аналитики.
  BC-3770.10.30:
    name: Цензовый сбор данных set-top box
    description: |
      Цензовый сбор событий просмотра set-top box
      с применением средств защиты конфиденциальности.
  BC-3770.20:
    name: Панельные и цензовые измерения аудитории
    description: |
      Калибровка панелей, создание валютных измерений
      и дедупликация аудитории на кросс-платформе.
  BC-3770.20.10:
    name: Калибровка панели
    description: |
      Калибровка панельных измерений против цензовых сигналов
      и демографических фреймов.
  BC-3770.20.20:
    name: Создание валютных измерений
    description: |
      Создание метрик аудитории валютного класса
      для трейдинга и отчётности.
  BC-3770.20.30:
    name: Кросс-платформенная дедупликация аудитории
    description: |
      Дедупликация аудитории на линейных, OTT и цифровых поверхностях
      до единого кросс-платформенного представления.
  BC-3770.30:
    name: Аналитика производительности контента
    description: |
      Аналитика производительности контента по названию, когорте
      и динамике для информирования заказов и приобретений.
  BC-3770.30.10:
    name: Отчётность по производительности названий
    description: |
      Отчётность о производительности по охвату, завершению
      и вкладу на уровне названия.
  BC-3770.30.20:
    name: Аналитика воронки вовлечённости
    description: |
      Аналитика воронки по обнаружению, запуску, завершению
      и последующему поведению при просмотре.
  BC-3770.30.30:
    name: Когортная аналитика и пожизненная ценность
    description: |
      Когортная удержание и аналитика пожизненной ценности
      для прямых потребительских подписчиков.
  BC-3770.40:
    name: Моделирование рекомендаций контента
    description: |
      Обучение, тестирование и персонализированное составление
      рекомендаций контента для пользовательских поверхностей.
  BC-3770.40.10:
    name: Обучение моделей рекомендаций
    description: |
      Обучение и жизненный цикл моделей рекомендаций
      на основе сигналов просмотра и метаданных.
  BC-3770.40.20:
    name: Управление A/B-тестированием рекомендаций
    description: |
      A/B-тестирование и многорукие бандиты для политики
      рекомендаций и решений по поверхностям.
  BC-3770.40.30:
    name: Составление персонализированных подборок
    description: |
      Составление персонализированных подборок главной страницы,
      рядов и полок для пользовательских поверхностей.
  BC-3770.50:
    name: Аудиторные инсайты и исследования
    description: |
      Пользовательские количественные и качественные аудиторные
      исследования, синтез и распространение инсайтов в бизнес.
  BC-3770.50.10:
    name: Пользовательские аудиторные исследования
    description: |
      Разработка и проведение пользовательских аудиторных
      исследований, включая сегментацию и трекерные работы.
  BC-3770.50.20:
    name: Управление качественными исследованиями
    description: |
      Качественные исследования зрителей, включая фокус-группы
      и глубинные интервью.
  BC-3770.50.30:
    name: Синтез и распространение инсайтов
    description: |
      Синтез измерений и результатов исследований в инсайты
      и их распространение бизнес-аудиториям.

# Управление знаниями профессиональной практики (ru) — translations for L1-professional-practice-knowledge-management.yaml
locale: ru
source: L1-professional-practice-knowledge-management.yaml
entries:
  BC-4370:
    name: Управление знаниями профессиональной практики
    description: |
      Ведение и повторное использование прецедентов практики, методологических активов, интеллектуального лидерства, шаблонов результатов и исследовательских библиотек, лежащих в основе выполнения заданий в профессиональных сервисных фирмах.
  BC-4370.10:
    name: Управление прецедентами и шаблонами
    description: |
      Подготовка, версионирование и контроль доступа к юридическим прецедентам, шаблонам контрактов и стандартным рабочим продуктам, доступным для повторного использования.
  BC-4370.10.10:
    name: Подготовка прецедентов
    description: |
      Отбор, редактирование и подготовка высококачественных результатов заданий в библиотеку прецедентов фирмы.
  BC-4370.10.20:
    name: Ведение шаблонов
    description: |
      Ведение и версионирование шаблонов контрактов, заготовок заключений и стандартных шаблонов результатов.
  BC-4370.10.30:
    name: Управление доступом к прецедентам
    description: |
      Управление доступом к прецедентам с балансированием повторного использования и требований конфиденциальности клиента и информационных барьеров.
  BC-4370.20:
    name: Управление методологией и инструментарием
    description: |
      Определение, развитие и внедрение методологии задания, аналитических фреймворков и проприетарного инструментария для заданий.
  BC-4370.20.10:
    name: Определение методологии
    description: |
      Определение аудиторской, advisory и юридической методологий в соответствии с профессиональными стандартами и политикой фирмы.
  BC-4370.20.20:
    name: Версионирование и выпуск методологии
    description: |
      Версионирование, управление выпусками и вывод из эксплуатации методологии и компонентов-акселераторов.
  BC-4370.20.30:
    name: Внедрение методологии и обучение
    description: |
      Внедрение новых методологических выпусков, включая обучение, FAQ и отслеживание принятия.
  BC-4370.30:
    name: Управление аналитикой практики и интеллектуальным лидерством
    description: |
      Подготовка и распространение точек зрения практики, оповещений, обзоров и публикаций в области интеллектуального лидерства.
  BC-4370.30.10:
    name: Планирование тематики аналитики
    description: |
      Планирование тем аналитики и интеллектуального лидерства в соответствии со стратегией практики и интересами клиентов.
  BC-4370.30.20:
    name: Производство аналитики
    description: |
      Подготовка статей, оповещений, точек зрения и обзорных отчётов.
  BC-4370.30.30:
    name: Распространение аналитики и отслеживание вовлечённости
    description: |
      Распространение аналитики клиентской и перспективной аудиториям и отслеживание вовлечённости.
  BC-4370.40:
    name: Управление повторным использованием активов заданий
    description: |
      Выявление, сбор и тегирование высокоценных результатов заданий как многократно используемых активов с учётом конфиденциальности клиентов.
  BC-4370.40.10:
    name: Выявление многократно используемых активов
    description: |
      Выявление результатов заданий с ценностью повторного использования за пределами исходного задания.
  BC-4370.40.20:
    name: Обезличивание и редактирование активов
    description: |
      Обезличивание и редактирование активов заданий для удаления конфиденциальной информации клиента перед повторным использованием.
  BC-4370.40.30:
    name: Тегирование и поисковая доступность активов
    description: |
      Тегирование и обогащение метаданными многократно используемых активов для повышения обнаруживаемости по практикам.
  BC-4370.50:
    name: Управление библиотекой практики
    description: |
      Подготовка и лицензирование внешних исследовательских баз данных, правовых и налоговых библиотек и подписного контента для специалистов.
  BC-4370.50.10:
    name: Управление внешними исследовательскими подписками
    description: |
      Закупка и продление подписок на внешние правовые, налоговые и исследовательские базы данных.
  BC-4370.50.20:
    name: Каталог библиотеки и поиск
    description: |
      Каталог и федеративный поиск по внутренним и внешним исследовательским источникам.
  BC-4370.50.30:
    name: Аналитика использования библиотеки
    description: |
      Аналитика использования исследовательских баз данных для обоснования решений по продлению и рационализации.
  BC-4370.60:
    name: Управление сообществами практики
    description: |
      Функционирование практических групп, сообществ практики и предметных сетей для обмена знаниями в фирме.
  BC-4370.60.10:
    name: Функционирование практических групп
    description: |
      Функционирование практических групп, включая членство, руководство и каденцию форумов.
  BC-4370.60.20:
    name: Фасилитация сообществ практики
    description: |
      Фасилитация кросс-практических сообществ по актуальным темам и методам.
  BC-4370.60.30:
    name: Сеть чемпионов по знаниям
    description: |
      Функционирование сети чемпионов по знаниям, распределённых по практикам и офисам.

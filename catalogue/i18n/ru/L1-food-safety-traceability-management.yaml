# Управление безопасностью пищевых продуктов и прослеживаемостью (ru) — translations for L1-food-safety-traceability-management.yaml
locale: ru
source: L1-food-safety-traceability-management.yaml
entries:
  BC-2380:
    name: Управление безопасностью и прослеживаемостью пищевых продуктов
    description: |
      Программы пищевой безопасности, прослеживаемость партий, координация отзывов,
      управление сроками годности скоропортящейся продукции и соответствие требованиям
      холодовой цепи для продуктовой розницы и пищевого производства.
  BC-2380.10:
    name: Управление программой пищевой безопасности
    description: |
      Политика пищевой безопасности, HACCP и программы сертификации (BRCGS, SQF,
      FSSC 22000, IFS Food, ISO 22000), регулирующие обращение с пищевыми продуктами.
    in_scope:
      - HACCP и политика пищевой безопасности
      - Сторонняя сертификация (BRCGS, SQF, FSSC 22000, IFS Food)
      - Управление инцидентами пищевой безопасности
    out_of_scope:
      - Общее управление качеством (BC-720)
  BC-2380.10.10:
    name: Управление политикой пищевой безопасности
    description: |
      Разработка и актуализация политики пищевой безопасности по всей сети.
  BC-2380.10.20:
    name: Управление планом HACCP
    description: |
      Разработка плана HACCP, анализ опасностей и мониторинг критических контрольных точек.
  BC-2380.10.30:
    name: Управление сертификацией пищевой безопасности
    description: |
      Сертификация по BRCGS, SQF, FSSC 22000, IFS Food и ISO 22000.
  BC-2380.10.40:
    name: Управление инцидентами пищевой безопасности
    description: |
      Обработка инцидентов пищевой безопасности, включая выявление патогенов.
  BC-2380.20:
    name: Управление прослеживаемостью партий
    description: |
      Прослеживаемость партий «один вверх / один вниз» по цепочке поставок
      с использованием захвата событий GS1 EPCIS и обмена данными с торговыми партнёрами.
  BC-2380.20.10:
    name: Маркировка партий
    description: |
      Формирование и печать кодов партий по стандартам GS1.
  BC-2380.20.20:
    name: Захват событий EPCIS
    description: |
      Захват событий EPCIS (ввод в оборот, отгрузка, приёмка) по цепочке поставок.
  BC-2380.20.30:
    name: Прослеживаемость «один вверх / один вниз»
    description: |
      Прослеживаемость входящих и исходящих потоков в каждом узле обработки.
  BC-2380.20.40:
    name: Обмен данными прослеживаемости с торговыми партнёрами
    description: |
      Обмен данными прослеживаемости с поставщиками и торговыми партнёрами.
  BC-2380.30:
    name: Управление отзывами и изъятиями продукции
    description: |
      Координация отзывов и изъятий продовольственных и потребительских товаров,
      включая уведомление регулятора и информирование потребителей.
    in_scope:
      - Классификация отзывов и принятие решений
      - Уведомление регуляторов и отчётность
      - Информирование потребителей и торговых партнёров
  BC-2380.30.10:
    name: Решение об отзыве и классификация
    description: |
      Принятие решения об отзыве и его классификация по масштабу и тяжести.
  BC-2380.30.20:
    name: Уведомление регуляторов
    description: |
      Уведомление регуляторов пищевой безопасности согласно юрисдикционным требованиям.
  BC-2380.30.30:
    name: Информирование потребителей и торговых партнёров
    description: |
      Информирование потребителей и торговых партнёров о действиях по отзыву продукции.
  BC-2380.30.40:
    name: Верификация эффективности отзыва
    description: |
      Верификация эффективности отзыва и уровней возврата продукции.
  BC-2380.40:
    name: Управление сроками годности скоропортящейся продукции
    description: |
      Мониторинг сроков годности, ротация по принципу FEFO, дисциплина датирования
      и сокращение отходов по категориям скоропортящейся продукции.
  BC-2380.40.10:
    name: Срок годности и датировка
    description: |
      Определение и печать сроков годности и датировки согласно требованиям рынка.
  BC-2380.40.20:
    name: Ротация по принципу FEFO
    description: |
      Ротация FEFO в магазинах и распределительных центрах.
  BC-2380.40.30:
    name: Координация уценки скоропортящихся товаров
    description: |
      Координация уценки скоропортящихся товаров перед истечением срока годности для сокращения отходов.
  BC-2380.40.40:
    name: Программы сокращения пищевых отходов
    description: |
      Программы сокращения пищевых отходов, пожертвования и циркулярной утилизации.
  BC-2380.50:
    name: Управление соблюдением требований холодовой цепи
    description: |
      Целостность холодовой цепи для охлаждённых и замороженных продуктов, включая
      мониторинг температуры, обработку нарушений и решения по утилизации.
    in_scope:
      - Мониторинг температуры холодовой цепи по узлам
      - Расследование нарушений и утилизация продукции
      - СОП и аудиты холодовой цепи
    out_of_scope:
      - Фармацевтическая холодовая цепь (BC-1570.10)
  BC-2380.50.10:
    name: Мониторинг температуры холодовой цепи
    description: |
      Сквозной мониторинг температуры в пищевой холодовой цепи.
  BC-2380.50.20:
    name: Обработка нарушений холодовой цепи
    description: |
      Расследование и утилизация продукции при нарушениях температурного режима.
  BC-2380.50.30:
    name: Аудит и верификация холодовой цепи
    description: |
      Аудит и верификация практики поддержания холодовой цепи по всей сети.

# Управление грузовой ёмкостью (ru) — translations for L1-freight-capacity-management.yaml
locale: ru
source: L1-freight-capacity-management.yaml
entries:
  BC-2400:
    name: Управление грузовой ёмкостью
    description: |
      Продажа, распределение и управление доходностью транспортной ёмкости по судовым
      рейсам, авиарейсам, автомобильным и железнодорожным маршрутам и пулам оборудования.
  BC-2400.10:
    name: Управление запасами ёмкости
    description: |
      Ведение доступной транспортной ёмкости по виду транспорта, маршруту, расписанию
      и типу оборудования как основы для распределения и бронирования.
    in_scope:
      - Записи о ёмкости судов, самолётов, транспортных средств и подвижного состава
      - Ёмкость пула оборудования (контейнеры, трейлеры, ULD)
      - Ёмкость маршрутов по расписанию
    out_of_scope:
      - Долгосрочное планирование сети и расписания (BC-2410)
      - Приём бронирований (BC-2400.40)
  BC-2400.10.10:
    name: Ёмкость судов и транспортных средств
    description: |
      Учёт ёмкости по полезной нагрузке, палубному пространству и вместимости
      по судну, воздушному судну, поезду или транспортному средству.
  BC-2400.10.20:
    name: Запасы оборудования
    description: |
      Учёт доступных контейнеров, трейлеров, шасси и ULD по месту нахождения и состоянию.
  BC-2400.10.30:
    name: Ёмкость маршрута и расписания
    description: |
      Ёмкость по плановому рейсу на маршруте, включая стыковочные участки.
  BC-2400.10.40:
    name: Совместное использование ёмкости и обмен слотами
    description: |
      Объединённая ёмкость в рамках альянсов и договорённостей об обмене слотами
      с партнёрами-перевозчиками.
  BC-2400.20:
    name: Управление распределением ёмкости
    description: |
      Распределение доступной ёмкости по клиентским контрактам, рыночным сегментам
      и спотовому спросу.
  BC-2400.20.10:
    name: Распределение ёмкости по контрактам
    description: |
      Распределение ёмкости для клиентов, охваченных обязательствами по минимальным
      объёмам и именными соглашениями.
  BC-2400.20.20:
    name: Распределение ёмкости на спотовом рынке
    description: |
      Распределение ёмкости, выставленной на спотовые каналы бронирования.
  BC-2400.20.30:
    name: Перераспределение и восстановление ёмкости
    description: |
      Перераспределение неиспользованной или освободившейся ёмкости до времени отсечения.
  BC-2400.30:
    name: Управление доходностью и выручкой
    description: |
      Оптимизация выручки на единицу ёмкости через решения по ценообразованию,
      составу и перебронированию.
  BC-2400.30.10:
    name: Прогнозирование спроса на ёмкость
    description: |
      Прогнозирование бронирований, отказов от поездки и риска отгрузки по сервису.
  BC-2400.30.20:
    name: Оптимизация доходности
    description: |
      Оптимизация состава тарифных классов для максимизации доходности
      на тонну, слот или TEU.
  BC-2400.30.30:
    name: Управление перебронированием
    description: |
      Установление и мониторинг лимитов перебронирования и риска отгрузки.
  BC-2400.30.40:
    name: Управление структурой выручки
    description: |
      Управление структурой выручки между контрактными, спотовыми и вспомогательными направлениями.
  BC-2400.40:
    name: Управление бронированием
    description: |
      Приём, изменение и отмена бронирований ёмкости по опубликованным
      расписаниям и котировкам.
  BC-2400.40.10:
    name: Бронирование ёмкости
    description: |
      Приём бронирований по доступной ёмкости и действующим тарифам.
  BC-2400.40.20:
    name: Изменение и отмена бронирования
    description: |
      Изменения, перенос и отмена бронирований, включая сборы за неявку.
  BC-2400.40.30:
    name: Управление резервными местами и листом ожидания
    description: |
      Управление резервными местами и листом ожидания на подтверждённую ёмкость.
  BC-2400.50:
    name: Управление эффективностью ёмкости
    description: |
      Мониторинг коэффициента загрузки, заполнения и утилизации для принятия
      решений по составу ёмкости и изменениям сети.
  BC-2400.50.10:
    name: Анализ коэффициента загрузки
    description: |
      Анализ коэффициента загрузки по рейсам, маршрутам и сегментам.
  BC-2400.50.20:
    name: Отчётность по утилизации ёмкости
    description: |
      Отчётность по утилизации ёмкости для коммерческих и операционных подразделений.
  BC-2400.50.30:
    name: Повышение эффективности ёмкости
    description: |
      Инициативы по повышению выручки на слот и сокращению порожнего репозиционирования.

# Управление государственной политикой (ru) — translations for L1-public-policy-management.yaml
locale: ru
source: L1-public-policy-management.yaml
entries:
  BC-3200:
    name: Управление государственной политикой
    description: |
      Формирование, анализ, поддержка принятия решений, координация реализации и оценка государственной политики на всех этапах цикла государственной политики на основе доказательной базы, консультаций с заинтересованными сторонами и оценки воздействия.
  BC-3200.10:
    name: Формирование политической повестки
    description: |
      Выявление, приоритизация и фиксация политических вопросов, требующих внимания правительства.
    in_scope:
      - Выявление проблем и мониторинг горизонта
      - Фиксация министерских и политических мандатов
      - Расстановка приоритетов и управление повесткой
    out_of_scope:
      - Разработка законодательных или нормативных актов (относится к управлению законодательной и нормативной деятельностью)
      - Исполнение решений кабинета (относится к поддержке принятия политических решений)
  BC-3200.10.10:
    name: Выявление политических проблем
    description: |
      Выявление актуальных проблем и политических вопросов методами мониторинга горизонта и сигналами заинтересованных сторон.
  BC-3200.10.20:
    name: Фиксация политических мандатов
    description: |
      Фиксация и структурирование политических и министерских мандатов в рабочих программах по политике.
  BC-3200.10.30:
    name: Расстановка приоритетов политики
    description: |
      Расстановка приоритетов конкурирующих политических вопросов с учётом возможностей, срочности и обязательств правительства.
  BC-3200.20:
    name: Анализ вариантов политики
    description: |
      Анализ доказательной базы, моделирование и сравнительный анализ вариантов политики, включая затраты, воздействие и осуществимость.
    in_scope:
      - Анализ доказательной базы и литературы
      - Анализ затрат и выгод и экономическое моделирование
      - Сравнительная оценка вариантов
      - Дистрибутивный и социальный анализ
    out_of_scope:
      - Оценка регулятивного воздействия для проектов нормативных актов (относится к управлению законодательной и нормативной деятельностью)
  BC-3200.20.10:
    name: Анализ доказательной базы и литературы
    description: |
      Систематический сбор и синтез доказательной базы для формирования вариантов политики.
  BC-3200.20.20:
    name: Моделирование и прогнозирование политики
    description: |
      Количественное моделирование, микросимуляция и прогнозирование результатов политики.
  BC-3200.20.30:
    name: Оценка вариантов политики
    description: |
      Сравнительная оценка вариантов политики по целям и ограничениям.
  BC-3200.20.40:
    name: Дистрибутивный и социальный анализ
    description: |
      Анализ распределительных эффектов и социального воздействия политики на группы населения.
  BC-3200.30:
    name: Консультации с заинтересованными сторонами и общественностью
    description: |
      Проектирование, проведение и анализ результатов консультаций с заинтересованными сторонами, общественностью и межправительственными партнёрами по политическим предложениям.
  BC-3200.30.10:
    name: Проектирование консультаций
    description: |
      Разработка стратегий, инструментов и планов охвата для консультаций.
  BC-3200.30.20:
    name: Проведение консультаций
    description: |
      Работа каналов консультаций, включая онлайн-порталы, слушания и семинары.
  BC-3200.30.30:
    name: Анализ ответов на консультации
    description: |
      Кодирование, анализ и синтез ответов на консультации.
  BC-3200.30.40:
    name: Межправительственная координация
    description: |
      Координация с субнациональными и международными партнёрами по совместной политике.
  BC-3200.40:
    name: Поддержка принятия политических решений
    description: |
      Подготовка документов для принятия кабинетных, министерских и исполнительных решений: брифингов, меморандумов и рекомендаций.
  BC-3200.40.10:
    name: Подготовка брифингов
    description: |
      Подготовка министерских и исполнительных брифингов по вопросам политики.
  BC-3200.40.20:
    name: Управление кабинетными представлениями
    description: |
      Разработка и согласование кабинетных, исполнительных или совещательных представлений.
  BC-3200.40.30:
    name: Фиксация и информирование о решениях
    description: |
      Фиксация решений, доведение результатов и постановка задач исполнительным органам.
  BC-3200.50:
    name: Координация реализации политики
    description: |
      Координация межведомственной реализации политики, включая разработку программ, последовательность действий и надзор за исполнением.
  BC-3200.50.10:
    name: Планирование реализации
    description: |
      Преобразование политических решений в планы реализации, контрольные точки и закреплённые обязанности.
  BC-3200.50.20:
    name: Межведомственная координация
    description: |
      Координация исполнительных ведомств и совместных механизмов реализации.
  BC-3200.50.30:
    name: Мониторинг реализации
    description: |
      Отслеживание хода реализации политики по обязательствам и срокам.
  BC-3200.60:
    name: Оценка и пересмотр политики
    description: |
      Ретроспективная оценка, суперсет-пересмотр и обратная связь в цикл государственной политики.
  BC-3200.60.10:
    name: Оценка результатов и воздействия
    description: |
      Оценка результатов и воздействия политики относительно заявленных целей.
  BC-3200.60.20:
    name: Суперсет-пересмотр и постреализационная проверка
    description: |
      Законодательные и дискреционные проверки политики и инструментов в установленные сроки.
  BC-3200.60.30:
    name: Фиксация извлечённых уроков
    description: |
      Фиксация и распространение извлечённых уроков для будущих циклов политики.

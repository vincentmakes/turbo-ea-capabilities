# Управление брокерской деятельностью в недвижимости (ru) — translations for L1-real-estate-brokerage-management.yaml
locale: ru
source: L1-real-estate-brokerage-management.yaml
entries:
  BC-4960:
    name: Управление брокерской деятельностью в недвижимости
    description: |
      Брокерское и агентское посредничество как бизнес-направление в
      коммерческой и жилой недвижимости — получение листинговых
      мандатов, представительство покупателей и арендаторов,
      управление данными MLS, анализ сопоставимых сделок, проведение
      показов, переговоры по предложениям, координация закрытия,
      урегулирование комиссионных и управление продуктивностью и
      составом агентов.
    in_scope:
      - Получение и представительство по листингам продавцов и арендодателей
      - Взаимодействие и представительство покупателей и арендаторов
      - Ввод листингов в MLS, синдикация и контроль соответствия
      - Анализ сопоставимых сделок и брокерское мнение о стоимости
      - Показы, дни открытых дверей и управление ключницами / цифровым доступом
      - Составление предложений, встречные предложения и работа с множественными предложениями
      - Координация закрытия и отслеживание условий
      - Урегулирование комиссионных, вознаграждений сотрудничающих брокеров и реферальных платежей
      - Лицензирование, спонсорство, результативность и планы комиссионных агентов
    out_of_scope:
      - Арендные операции арендодателя по собственным активам (BC-4950)
      - Исполнение сделок по приобретению и продаже принципалами (BC-4930)
      - Заказные оценки имущества (BC-4970)
      - Лицензионный режим брокеров / агентов (BC-4990)
  BC-4960.10:
    name: Получение листингов и представительство продавца
    description: |
      Привлечение и получение листинговых мандатов продавцов и
      арендодателей и реализация маркетингового плана по листинговому
      соглашению.
  BC-4960.10.10:
    name: Представление и получение листингового мандата
    description: |
      Презентация для получения листинговых мандатов, включая CMA,
      маркетинговое предложение и представление.
  BC-4960.10.20:
    name: Управление листинговым соглашением
    description: |
      Управление листинговыми соглашениями, включая эксклюзивность,
      срок и условия комиссионных.
  BC-4960.10.30:
    name: Маркетинговый план листинга
    description: |
      Разработка и реализация маркетингового плана, предусмотренного
      листинговым соглашением.
  BC-4960.20:
    name: Представительство покупателей и арендаторов
    description: |
      Взаимодействие и реализация мандатов на представительство
      стороны покупателя и арендатора, включая поиск и составление
      шортлиста.
  BC-4960.20.10:
    name: Взаимодействие с покупателями и арендаторами
    description: |
      Привлечение клиентов-покупателей и арендаторов, включая
      агентские соглашения и раскрытие информации.
  BC-4960.20.20:
    name: Определение требований и брифа клиента
    description: |
      Определение брифа требований клиента по использованию,
      площади, местоположению и бюджету.
  BC-4960.20.30:
    name: Поиск объектов и составление шортлиста
    description: |
      Поиск, составление шортлиста и представление объектов клиенту.
  BC-4960.30:
    name: Управление листинговыми данными и MLS
    description: |
      Управление данными листингов MLS и порталов, включая ввод,
      медиа, синдикацию и контроль соответствия стандартам RESO.
  BC-4960.30.10:
    name: Ввод листингов в MLS
    description: |
      Ввод листингов в MLS в соответствии с полями и правилами
      словаря данных RESO.
  BC-4960.30.20:
    name: Медиа и фотография листингов
    description: |
      Производство и управление медиа листингов, включая фото,
      видео и 3D-туры.
  BC-4960.30.30:
    name: Синдикация и распространение по порталам
    description: |
      Распространение листингов на порталы, партнёрские сайты и
      агрегаторы.
  BC-4960.30.40:
    name: Соответствие листингов и отзыв
    description: |
      Управление соответствием точности листингов, изменениями
      статуса и отзывом.
  BC-4960.40:
    name: Анализ сопоставимых рыночных сделок
    description: |
      Подготовка анализа сопоставимых рыночных сделок, брокерских
      мнений о стоимости и ценового позиционирования для листинговых
      и покупательских взаимодействий.
  BC-4960.40.10:
    name: Подборка сопоставимых сделок
    description: |
      Подборка данных о сопоставимых сделках из MLS и публичных
      записей.
  BC-4960.40.20:
    name: Подготовка CMA-отчётов
    description: |
      Подготовка отчётов анализа сопоставимых рыночных сделок для
      представления клиентам.
  BC-4960.40.30:
    name: Брокерское мнение о стоимости
    description: |
      Выдача брокерских мнений о стоимости для клиентов и
      институциональных принципалов.
  BC-4960.50:
    name: Показы и дни открытых дверей
    description: |
      Организация записей на показы, дней открытых дверей и
      физического и цифрового доступа для потенциальных арендаторов
      и сотрудничающих агентов.
  BC-4960.50.10:
    name: Управление записью на показы
    description: |
      Управление записью на показы и запросами доступа от
      сотрудничающих агентов.
  BC-4960.50.20:
    name: Проведение дней открытых дверей
    description: |
      Проведение мероприятий дней открытых дверей, включая
      регистрацию и последующую работу.
  BC-4960.50.30:
    name: Управление ключницами и контролем доступа
    description: |
      Управление ключницами и учётными данными цифрового доступа
      к выставленным объектам.
  BC-4960.60:
    name: Управление предложениями и переговорами
    description: |
      Составление и переговоры по предложениям, встречным предложениям
      и ситуациям с множественными предложениями от имени
      представляемой стороны.
  BC-4960.60.10:
    name: Составление предложений
    description: |
      Составление предложений и дополнений от имени представляемой
      стороны.
  BC-4960.60.20:
    name: Встречные и множественные предложения
    description: |
      Управление встречными предложениями и процессами множественных
      предложений, включая запросы лучших и финальных предложений.
  BC-4960.60.30:
    name: Принятие и подтверждение договора
    description: |
      Подтверждение принятия предложения и заключение обязывающего
      договора.
  BC-4960.70:
    name: Координация закрытия брокерских сделок
    description: |
      Координация условий, эскроу и передачи права собственности
      до закрытия брокерских сделок.
  BC-4960.70.10:
    name: Отслеживание условий
    description: |
      Отслеживание условий проверки, финансирования и иных условий
      до их выполнения или отказа.
  BC-4960.70.20:
    name: Координация эскроу и передачи прав
    description: |
      Координация с эскроу и юридическими организациями по
      закрывающим документам и средствам.
  BC-4960.70.30:
    name: Координация дня закрытия
    description: |
      Координация подписания, передачи ключей и логистики дня
      закрытия.
  BC-4960.80:
    name: Управление комиссионными и сотрудничающими брокерами
    description: |
      Фиксация условий комиссионных и урегулирование вознаграждений
      сотрудничающих брокеров и реферальных платежей.
  BC-4960.80.10:
    name: Фиксация комиссионных соглашений
    description: |
      Фиксация комиссионных соглашений, включая разделение и
      условия.
  BC-4960.80.20:
    name: Урегулирование с сотрудничающими брокерами
    description: |
      Урегулирование вознаграждений сотрудничающим брокерам по
      закрытым сделкам.
  BC-4960.80.30:
    name: Выплата комиссионных
    description: |
      Выплата комиссионных брокерской компании и агентам за вычетом
      удержаний.
  BC-4960.80.40:
    name: Управление реферальными платежами
    description: |
      Управление соглашениями о реферальных платежах с
      направляющими брокерами и партнёрами.
  BC-4960.90:
    name: Управление продуктивностью и составом агентов
    description: |
      Управление лицензионным спонсорством, результативностью и
      администрированием планов комиссионных агентов в составе
      брокерской организации.
  BC-4960.90.10:
    name: Учёт лицензий и спонсорства агентов
    description: |
      Учёт статуса лицензий агентов и договорённостей о брокерском
      спонсорстве.
  BC-4960.90.20:
    name: Управление результативностью агентов
    description: |
      Управление результативностью агентов по показателям
      продуктивности и стандартам.
  BC-4960.90.30:
    name: Администрирование планов комиссионных агентов
    description: |
      Администрирование планов комиссионных, разделения и потолков
      для агентов.

# Управление секретной информацией и безопасностью (ru) — translations for L1-classified-information-security-management.yaml
locale: ru
source: L1-classified-information-security-management.yaml
entries:
  BC-1810:
    name: Управление секретной информацией и безопасностью
    description: |
      Допуски персонала, классификация информации, промышленная безопасность, COMSEC и внутренние угрозы.
  BC-1810.10:
    name: Управление допусками персонала к секретной информации
    description: |
      Заявки на допуск, периодическая переаттестация и прекращение допуска.
  BC-1810.10.10:
    name: Обработка заявок на допуск
    description: |
      Спонсирование и обработка заявок на допуск персонала к секретным сведениям.
  BC-1810.10.20:
    name: Периодическая переаттестация
    description: |
      Периодическая переаттестация и непрерывная проверка допущенного персонала.
  BC-1810.10.30:
    name: Инструктаж и прекращение допуска персонала
    description: |
      Инструктаж по безопасности, заключение соглашений о неразглашении и прекращение допуска.
  BC-1810.20:
    name: Управление классификацией информации
    description: |
      Засекречивание, рассекречивание и предупредительные пометки об обращении.
  BC-1810.20.10:
    name: Решения о первоначальном засекречивании
    description: |
      Решения органа первоначального засекречивания.
  BC-1810.20.20:
    name: Производное засекречивание
    description: |
      Производное засекречивание новых документов на основе имеющихся материалов.
  BC-1810.20.30:
    name: Проверка на предмет рассекречивания
    description: |
      Систематическая и обязательная проверка на предмет рассекречивания.
  BC-1810.20.40:
    name: Предупредительные пометки и маркировка
    description: |
      Нанесение предупредительных пометок об обращении, ограничений на распространение и маркировки.
  BC-1810.30:
    name: Управление физической защитой в оборонном секторе
    description: |
      Объекты с допуском к секретным работам, SCIF и защищённые зоны.
  BC-1810.30.10:
    name: Аккредитация объектов, допущенных к секретным работам
    description: |
      Аккредитация и поддержание объектов, допущенных к секретным работам.
  BC-1810.30.20:
    name: Операции SCIF
    description: |
      Функционирование специализированных засекреченных информационных объектов (SCIF).
  BC-1810.30.30:
    name: Управление доступом в защищённые зоны
    description: |
      Управление доступом и учёт посетителей в защищённых зонах.
  BC-1810.40:
    name: Управление промышленной безопасностью
    description: |
      NISPOM и аналоги, иностранная собственность и контроль влияния, безопасность цепочки поставок.
  BC-1810.40.10:
    name: Управление соответствием NISPOM
    description: |
      Соответствие NISPOM/32 CFR 117 или эквивалентным национальным нормам.
  BC-1810.40.20:
    name: Управление иностранным владением и контролем влияния
    description: |
      Оценка FOCI и мероприятия по снижению рисков.
  BC-1810.40.30:
    name: Верификация безопасности цепочки поставок
    description: |
      Верификация допущенных партнёров по цепочке поставок и соответствие CMMC.
  BC-1810.40.40:
    name: Администрирование секретных контрактных требований
    description: |
      Администрирование требований DD Form 254 к засекреченным контрактам.
  BC-1810.50:
    name: Управление COMSEC
    description: |
      Безопасность связи, управление криптографическими ключами.
  BC-1810.50.10:
    name: Управление учётными записями COMSEC
    description: |
      Функционирование учётных записей COMSEC и обязанности хранителей.
  BC-1810.50.20:
    name: Управление криптографическими ключами
    description: |
      Управление криптографическими ключами, включая EKMS/KMI.
  BC-1810.50.30:
    name: Учёт оборудования COMSEC
    description: |
      Учёт и ответственность за оборудование COMSEC.
  BC-1810.60:
    name: Управление внутренними угрозами
    description: |
      Программы по внутренним угрозам, мониторинг и реагирование.
  BC-1810.60.10:
    name: Функционирование программы по внутренним угрозам
    description: |
      Функционирование программы по внутренним угрозам согласно E.O. 13587.
  BC-1810.60.20:
    name: Мониторинг действий пользователей
    description: |
      Мониторинг действий пользователей в засекреченных информационных системах.
  BC-1810.60.30:
    name: Расследование внутренних угроз
    description: |
      Расследование индикаторов и инцидентов внутренних угроз.

# Диагностические услуги (ru) — translations for L1-diagnostic-services-management.yaml
locale: ru
source: L1-diagnostic-services-management.yaml
entries:
  BC-2860:
    name: Диагностические услуги
    description: |
      Лабораторные, паталогоанатомические, визуализационные, кардиопульмональные диагностические услуги, прикроватное тестирование и сквозное управление результатами диагностики.
  BC-2860.10:
    name: Управление лабораторными услугами
    description: |
      Взятие биоматериала, клиническая химия, гематология, микробиология, молекулярное тестирование и эксплуатация лабораторной информационной системы.
  BC-2860.10.10:
    name: Взятие и транспортировка биоматериала
    description: |
      Флеботомия, взятие биоматериала и логистика транспортировки.
  BC-2860.10.20:
    name: Клиническая химия и гематология
    description: |
      Операции клинической химии, гематологии и коагулологии.
  BC-2860.10.30:
    name: Микробиология и молекулярное тестирование
    description: |
      Микробиологическое, вирусологическое и молекулярно-диагностическое тестирование.
  BC-2860.10.40:
    name: Эксплуатация лабораторной информационной системы
    description: |
      Эксплуатация лабораторной информационной системы и интерфейсов с приборами.
  BC-2860.20:
    name: Паталогоанатомические услуги
    description: |
      Гистология, цитология, хирургическая патология и цифровая патология.
  BC-2860.20.10:
    name: Гистологическая обработка
    description: |
      Обработка тканей, заливка, нарезка и окраска для гистологии.
  BC-2860.20.20:
    name: Цитологические услуги
    description: |
      Подготовка цитологического материала, скрининг и оформление результатов.
  BC-2860.20.30:
    name: Хирургическая патология
    description: |
      Интерпретация и описание препаратов хирургической патологии патологоанатомом.
  BC-2860.20.40:
    name: Цифровая патология
    description: |
      Получение цифровых препаратов, хранение и рабочие процессы цифровой патологии.
  BC-2860.30:
    name: Служба диагностической визуализации
    description: |
      Получение, описание, архивирование и управление дозой при диагностических модальностях.
  BC-2860.30.10:
    name: Получение изображений
    description: |
      Получение изображений при рентгенографии, КТ, МРТ, УЗИ и ядерной медицине.
  BC-2860.30.20:
    name: Описание изображений
    description: |
      Описание рентгенологом и структурированное оформление протоколов исследований.
  BC-2860.30.30:
    name: Архивирование изображений
    description: |
      Эксплуатация архивов изображений и межучрежденческий обмен изображениями.
  BC-2860.30.40:
    name: Управление дозой облучения
    description: |
      Отслеживание, оптимизация и отчётность о дозе облучения пациентов.
  BC-2860.40:
    name: Кардиология и кардиопульмональная диагностика
    description: |
      Электрокардиография, эхокардиография, катетеризация сердца и функциональные лёгочные пробы.
  BC-2860.40.10:
    name: Электрокардиография и телемониторинг
    description: |
      Запись ЭКГ, телемониторинг и интерпретация нарушений ритма.
  BC-2860.40.20:
    name: Эхокардиография
    description: |
      Трансторакальная, транспищеводная и стресс-эхокардиография.
  BC-2860.40.30:
    name: Катетеризация сердца
    description: |
      Диагностическая катетеризация сердца и электрофизиологические исследования.
  BC-2860.40.40:
    name: Исследование функции внешнего дыхания
    description: |
      Спирометрия, определение объёмов лёгких, диффузионная способность и нагрузочное тестирование.
  BC-2860.50:
    name: Прикроватное тестирование
    description: |
      Управление, контроль качества, компетентность операторов и интеграция результатов прикроватного тестирования по всему учреждению.
  BC-2860.50.10:
    name: Управление приборами прикроватного тестирования
    description: |
      Инвентаризация и управление жизненным циклом приборов прикроватного тестирования.
  BC-2860.50.20:
    name: Контроль качества прикроватного тестирования
    description: |
      Контроль качества и профессиональное тестирование для приборов прикроватного тестирования.
  BC-2860.50.30:
    name: Управление компетентностью операторов
    description: |
      Сертификация и оценка компетентности операторов прикроватного тестирования.
  BC-2860.50.40:
    name: Интеграция результатов прикроватного тестирования
    description: |
      Интеграция результатов прикроватного тестирования в лабораторную запись и медицинскую карту.
  BC-2860.60:
    name: Управление результатами диагностики
    description: |
      Валидация, распределение и управление правилами рефлекторного тестирования по диагностическим результатам.
  BC-2860.60.10:
    name: Валидация результатов
    description: |
      Техническая и клиническая валидация диагностических результатов.
  BC-2860.60.20:
    name: Уведомление о критических значениях
    description: |
      Своевременное уведомление о критических значениях назначившего врача.
  BC-2860.60.30:
    name: Распределение результатов
    description: |
      Распределение результатов назначившим врачам, пациентам и внешним системам.
  BC-2860.60.40:
    name: Правила рефлекторного тестирования
    description: |
      Разработка и применение правил рефлекторного и дополнительного тестирования.

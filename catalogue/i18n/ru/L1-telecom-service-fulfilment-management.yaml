# Управление выполнением телеком-сервисов (ru) — translations for L1-telecom-service-fulfilment-management.yaml
locale: ru
source: L1-telecom-service-fulfilment-management.yaml
entries:
  BC-2620:
    name: Управление выполнением телеком-сервисов
    description: |
      Приём сервисных заказов, декомпозиция, провизионирование, активация,
      приёмочное тестирование и монтаж оборудования у клиентов для потребительских,
      корпоративных и оптовых сервисов на основе eTOM и TM Forum Open APIs.
  BC-2620.10:
    name: Приём сервисных заказов
    description: |
      Многоканальный приём сервисных заказов с проверкой выполнимости и
      кредитоспособности перед отправкой.
  BC-2620.10.10:
    name: Омниканальный приём заказов
    description: |
      Приём сервисных заказов через розничные, цифровые, контактно-центровые
      и партнёрские каналы.
  BC-2620.10.20:
    name: Проверка выполнимости сервиса
    description: |
      Проверка выполнимости по адресу, покрытию и ресурсам для запрошенных
      сервисов.
  BC-2620.10.30:
    name: Кредитный анализ и оценка рисков
    description: |
      Оценка кредитоспособности и проверка риска мошенничества перед
      принятием заказа.
  BC-2620.10.40:
    name: Подача заказа
    description: |
      Валидация, сохранение и передача принятых сервисных заказов
      в нижестоящие системы.
  BC-2620.20:
    name: Декомпозиция сервисных заказов
    description: |
      Декомпозиция клиентских заказов в ресурсно-ориентированные задачи
      и упорядочивание зависимостей.
  BC-2620.20.10:
    name: Декомпозиция сервисов до ресурсов
    description: |
      Декомпозиция клиентских сервисов в ресурсно-ориентированные сервисы
      и элементы.
  BC-2620.20.20:
    name: Формирование рабочих нарядов
    description: |
      Формирование сетевых и полевых нарядов из декомпозированных сервисных
      заказов.
  BC-2620.20.30:
    name: Упорядочивание зависимостей
    description: |
      Упорядочивание зависимых работ по сетевым доменам для обеспечения
      сквозного сервиса.
  BC-2620.30:
    name: Провизионирование сервисов
    description: |
      Выделение сетевых ресурсов и оркестрация изменений конфигурации
      для создания экземпляров сервисов.
  BC-2620.30.10:
    name: Выделение сетевых ресурсов
    description: |
      Выделение пропускной способности, портов, IP-адресов и других ресурсов
      для конкретного экземпляра сервиса.
  BC-2620.30.20:
    name: Оркестрация сервисов
    description: |
      Оркестрованное выполнение шагов провизионирования на физических
      и виртуализированных сетевых функциях.
  BC-2620.30.30:
    name: Применение конфигурации
    description: |
      Применение конфигурации, специфичной для сервиса, к целевым
      сетевым элементам.
  BC-2620.40:
    name: Активация сервисов
    description: |
      Окончательный ввод провизионированных сервисов в эксплуатацию
      и уведомление клиента и нижестоящих систем.
  BC-2620.40.10:
    name: Ввод сервиса в эксплуатацию
    description: |
      Перевод провизионированных сервисов в рабочее состояние.
  BC-2620.40.20:
    name: Регистрация абонентов
    description: |
      Регистрация абонентов в системах аутентификации, авторизации и политик
      для нового сервиса.
  BC-2620.40.30:
    name: Активация биллинга
    description: |
      Передача событий активации в биллинг для запуска тарификации
      и отсчёта срока контракта.
  BC-2620.40.40:
    name: Уведомление клиента об активации
    description: |
      Уведомление клиентов и каналов о том, что сервис запущен и готов
      к использованию.
  BC-2620.50:
    name: Приёмочное тестирование сервисов
    description: |
      Сквозное тестирование и захват базовых параметров перед официальной
      передачей новых сервисов.
  BC-2620.50.10:
    name: Сквозное тестирование сервиса
    description: |
      Выполнение сквозных функциональных и нагрузочных тестов на вновь
      провизионированных сервисах.
  BC-2620.50.20:
    name: Захват базового уровня сервиса
    description: |
      Захват базовых показателей производительности сервиса для последующего
      мониторинга SLA.
  BC-2620.50.30:
    name: Приёмочное подтверждение
    description: |
      Официальная приёмка и передача сервисов операционным командам
      и клиенту.
  BC-2620.60:
    name: Координация монтажа у клиента
    description: |
      Координация монтажа клиентского оборудования и сопутствующих работ
      на объекте клиента.
  BC-2620.60.10:
    name: Планирование визитов для монтажа
    description: |
      Планирование визитов к клиентам для проведения монтажных работ.
  BC-2620.60.20:
    name: Координация монтажных работ на месте
    description: |
      Координация действий монтажников, материалов и доступа на объекте клиента.
  BC-2620.60.30:
    name: Регистрация клиентского оборудования
    description: |
      Регистрация установленного клиентского оборудования и его привязка
      к экземпляру сервиса.

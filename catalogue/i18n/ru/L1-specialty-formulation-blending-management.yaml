# Специализированное составление рецептур и смешивание (ru) — translations for L1-specialty-formulation-blending-management.yaml
locale: ru
source: L1-specialty-formulation-blending-management.yaml
entries:
  BC-4630:
    name: Специализированное составление рецептур и смешивание
    description: |
      Рецептурная разработка, смешивание, компаундирование, фасовка и
      финишная обработка специальных химических продуктов, включая
      покрытия, клеи, агрохимические препараты, смазочные материалы,
      поверхностно-активные вещества и тонкие химикаты.
  BC-4630.10:
    name: Разработка рецептур
    description: |
      Разработка спецификаций, выбор сырья, лабораторные испытания и оптимизация
      стоимости специальных рецептур.
  BC-4630.10.10:
    name: Разработка спецификаций рецептур
    description: |
      Разработка спецификаций рецептур в соответствии с прикладными требованиями.
  BC-4630.10.20:
    name: Выбор сырья
    description: |
      Выбор сырья по критериям эффективности, стоимости и охраны труда.
  BC-4630.10.30:
    name: Лабораторные испытания рецептур
    description: |
      Приготовление и характеризация рецептур-кандидатов в лабораторном
      масштабе.
  BC-4630.10.40:
    name: Оптимизация стоимости рецептур
    description: |
      Оптимизация стоимости рецептур при соблюдении спецификационных ограничений.
  BC-4630.20:
    name: Операции смешивания и перемешивания
    description: |
      Эксплуатация активов для смешивания жидкостей, твёрдых веществ, эмульсий
      и дисперсий.
  BC-4630.20.10:
    name: Смешивание жидкостей
    description: |
      Смешивание жидких химических продуктов в резервуарах и в потоке.
  BC-4630.20.20:
    name: Смешивание твёрдых веществ
    description: |
      Смешивание твёрдых рецептур в ленточных, V-образных и барабанных
      смесителях.
  BC-4630.20.30:
    name: Операции эмульгирования
    description: |
      Производство эмульсий с применением роторно-статорных устройств и
      высокодавлений гомогенизаторов.
  BC-4630.20.40:
    name: Диспергирование и измельчение
    description: |
      Эксплуатация бисерных мельниц, трёхвалковых мельниц и диспергаторов.
  BC-4630.30:
    name: Компаундирование и экструзия
    description: |
      Компаундирование полимеров, производство маточных смесей и экструзия
      специальных полупродуктов.
  BC-4630.30.10:
    name: Компаундирование полимеров
    description: |
      Компаундирование полимеров с наполнителями, стабилизаторами и добавками.
  BC-4630.30.20:
    name: Производство маточных смесей
    description: |
      Производство колеровочных, функциональных и аддитивных маточных смесей.
  BC-4630.30.30:
    name: Экструзионные операции
    description: |
      Эксплуатация одно- и двухшнековых экструзионных линий.
  BC-4630.40:
    name: Операции фасовки и упаковки
    description: |
      Фасовка специальных продуктов в крупногабаритные ёмкости, бочки, МКР,
      малую тару и сосуды под давлением.
  BC-4630.40.10:
    name: Наполнение крупногабаритных ёмкостей
    description: |
      Наполнение автомобильных цистерн, железнодорожных цистерн и ISO-контейнеров.
  BC-4630.40.20:
    name: Наполнение бочек и МКР
    description: |
      Наполнение стальных и пластиковых бочек и средних контейнеров для
      сыпучих материалов.
  BC-4630.40.30:
    name: Фасовка в малую тару
    description: |
      Высокоскоростная фасовка во флаконы, канистры и потребительскую упаковку.
  BC-4630.40.40:
    name: Наполнение аэрозольных и баллонных упаковок
    description: |
      Наполнение и укупорка аэрозольных баллонов и сосудов под давлением.
  BC-4630.50:
    name: Испытания эксплуатационных характеристик рецептур
    description: |
      Испытания прикладных характеристик, стабильности и сравнительные испытания
      специальных рецептур.
  BC-4630.50.10:
    name: Испытания прикладных характеристик
    description: |
      Испытания рецептур в условиях, имитирующих конечное применение.
  BC-4630.50.20:
    name: Испытания стабильности и срока годности
    description: |
      Испытания стабильности и срока годности в реальном времени и в ускоренных
      условиях.
  BC-4630.50.30:
    name: Сравнительное тестирование
    description: |
      Сравнительные испытания рецептур с продуктами конкурентов.
  BC-4630.60:
    name: Управление специальными рецептурами
    description: |
      Разработка, ведение версий и локализация основных рецептур для
      многоплощадочного производства.
  BC-4630.60.10:
    name: Поддержание основных рецептур
    description: |
      Разработка и поддержание основных рецептур по соглашениям ISA-88.
  BC-4630.60.20:
    name: Управление версиями рецептур
    description: |
      Управление версиями рецептур в циклах согласования и пересмотра.
  BC-4630.60.30:
    name: Локализация рецептур
    description: |
      Локализация основных рецептур для оборудования конкретных площадок.

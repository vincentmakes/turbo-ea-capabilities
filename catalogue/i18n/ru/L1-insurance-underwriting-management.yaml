# Управление андеррайтингом в страховании (ru) — translations for L1-insurance-underwriting-management.yaml
locale: ru
source: L1-insurance-underwriting-management.yaml
entries:
  BC-2130:
    name: Управление андеррайтингом в страховании
    description: |
      Оценка риска, ценообразование, акцепт, отказ и связывание страховых заявлений по личным, коммерческим и специальным линиям, включая соблюдение андеррайтинговых полномочий и управление портфелем.
  BC-2130.10:
    name: Приём рисков в андеррайтинг
    description: |
      Триаж заявлений, сбор данных о риске, получение истории убытков и обогащение данными третьих сторон.
  BC-2130.10.10:
    name: Триаж заявлений
    description: |
      Триаж андеррайтинговых заявлений и маршрутизация в андеррайтинговые команды.
  BC-2130.10.20:
    name: Сбор данных о риске
    description: |
      Сбор данных о риске от заявителя, брокера и источников инспекций.
  BC-2130.10.30:
    name: Получение истории убытков
    description: |
      Получение историй убытков из бюро, предыдущих страховщиков и общих реестров.
  BC-2130.10.40:
    name: Обогащение данными третьих сторон
    description: |
      Обогащение заявлений данными третьих сторон, телематикой и данными IoT.
  BC-2130.20:
    name: Оценка и отбор рисков
    description: |
      Скоринг рисков, агрегация экспозиций, инспекции по контролю убытков и направление в андеррайтинг.
  BC-2130.20.10:
    name: Скоринг и моделирование рисков
    description: |
      Применение андеррайтинговых моделей, скоркарт и скоров риска на основе машинного обучения.
  BC-2130.20.20:
    name: Оценка агрегации экспозиций
    description: |
      Оценка агрегации экспозиций относительно действующего портфеля.
  BC-2130.20.30:
    name: Координация инспекций по контролю убытков
    description: |
      Координация инспекций по контролю убытков и отчётов инженеров по рискам.
  BC-2130.20.40:
    name: Обработка направлений в андеррайтинг
    description: |
      Обработка направлений к старшим андеррайтерам, органам линейных полномочий и перестраховщикам.
  BC-2130.30:
    name: Управление ценообразованием в андеррайтинге
    description: |
      Ручная тарификация, кредиты по расписанию, тарификация по опыту и индивидуальное ценообразование для специальных рисков.
  BC-2130.30.10:
    name: Применение ручной тарификации
    description: |
      Применение ручных тарифов из конфигурации зафилированных продуктов.
  BC-2130.30.20:
    name: Применение кредитов по расписанию
    description: |
      Применение кредитов и дебетов тарификации по расписанию.
  BC-2130.30.30:
    name: Тарификация по опыту
    description: |
      Ценообразование на основе опыта с использованием истории убытков страхователя.
  BC-2130.30.40:
    name: Специальное и индивидуальное ценообразование
    description: |
      Индивидуальное ценообразование для специальных, крупных и сложных рисков.
  BC-2130.40:
    name: Управление андеррайтинговым решением и полномочиями
    description: |
      Акцепт и решение об отказе, установление условий покрытия, соблюдение полномочий и связывание.
  BC-2130.40.10:
    name: Принятие решений об акцепте и отказе
    description: |
      Принятие решений об акцепте, отказе или встречном предложении по заявлениям.
  BC-2130.40.20:
    name: Установление условий и положений покрытия
    description: |
      Установление условий, положений, исключений и гарантий покрытия.
  BC-2130.40.30:
    name: Соблюдение андеррайтинговых полномочий
    description: |
      Соблюдение лимитов андеррайтинговых полномочий и порогов направления.
  BC-2130.40.40:
    name: Выставление котировки и связывание
    description: |
      Выставление обязывающих котировок и подтверждение покрытия.
  BC-2130.50:
    name: Управление андеррайтинговым портфелем
    description: |
      Мониторинг состава и лимитов портфеля, анализ рентабельности и планирование андеррайтинговых действий.
  BC-2130.50.10:
    name: Мониторинг состава и лимитов портфеля
    description: |
      Мониторинг состава портфеля относительно аппетита и лимитов концентрации.
  BC-2130.50.20:
    name: Анализ рентабельности андеррайтинга
    description: |
      Анализ рентабельности андеррайтинга по сегментам, продуктам и продьюсерам.
  BC-2130.50.30:
    name: Планирование андеррайтинговых действий
    description: |
      Планирование андеррайтинговых действий, исправлений и выходов из сегментов.
  BC-2130.60:
    name: Управление мошенничеством и дезинформацией в андеррайтинге
    description: |
      Скрининг мошенничества в заявлениях, расследование существенного введения в заблуждение и отчётность.
  BC-2130.60.10:
    name: Скрининг мошенничества в заявлениях
    description: |
      Скрининг страховых заявлений на индикаторы мошенничества.
  BC-2130.60.20:
    name: Расследование существенного введения в заблуждение
    description: |
      Расследование предполагаемого существенного введения в заблуждение при подаче заявления.
  BC-2130.60.30:
    name: Отчётность о мошенничестве в андеррайтинге
    description: |
      Отчётность о подтверждённом мошенничестве в андеррайтинге в отраслевые реестры и регуляторам.

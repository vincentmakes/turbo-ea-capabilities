    description: |
      Развёртывание, мониторинг и управление жизненным циклом моделей (MLOps).
  BC-610.60.40:
    name: Управление ответственным ИИ
    description: |
      Принципы ответственного ИИ, оценка рисков и мониторинг предвзятости.
  BC-610.60.50:
    name: Управление генеративным ИИ
    description: |
      Варианты использования генеративного ИИ, выбор базовых моделей и ограничители.

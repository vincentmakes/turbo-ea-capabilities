  BC-610.20.30:
    name: Мастер-данные поставщиков
    description: |
      Мастеризация и управление мастер-данными поставщиков.
  BC-610.20.40:
    name: Мастер-данные сотрудников
    description: |
      Мастеризация и управление мастер-данными сотрудников.

  BC-610.50.30:
    name: Продвинутая аналитика и наука о данных
    description: |
      Продвинутая аналитика, модели data science и экспериментирование.
  BC-610.50.40:
    name: Операции аналитических платформ
    description: |
      Эксплуатация платформ бизнес-интеллекта и аналитики и библиотек контента.
  BC-610.60:

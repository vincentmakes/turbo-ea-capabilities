    description: |
      Управление данными, мастер-данные, качество данных, аналитика и ИИ.
  BC-610.10:
    name: Управление данными (governance)
    description: |
      Владение данными, стюардство, политики, стандарты.
  BC-610.10.10:
    name: Владение и стюардство данных
    description: |
      Назначение и функционирование ролей владельца и стюарда данных.
  BC-610.10.20:

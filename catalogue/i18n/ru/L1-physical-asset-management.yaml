# Управление физическими активами (ru) — translations for L1-physical-asset-management.yaml
locale: ru
source: L1-physical-asset-management.yaml
entries:
  BC-1040:
    name: Управление физическими активами
    description: |
      Управление жизненным циклом производственных объектов, оборудования, флота и инфраструктуры.
  BC-1040.10:
    name: Стратегия и управление жизненным циклом активов
    description: |
      Стратегия активов, жизненный цикл, планирование замены.
  BC-1040.10.10:
    name: Стратегия по классам активов
    description: |
      Стратегия по классам активов, согласованная с ISO 55000.
  BC-1040.10.20:
    name: Планирование жизненного цикла активов
    description: |
      Планирование полного жизненного цикла активов через стадии приобретения, эксплуатации и выбытия.
  BC-1040.10.30:
    name: Планирование замены активов
    description: |
      Планирование замены активов с учётом срока службы и состояния.
  BC-1040.10.40:
    name: Капитальное планирование для активов
    description: |
      Капитальное планирование инвестиций в активы и их обновление.
  BC-1040.20:
    name: Управление показателями эффективности активов
    description: |
      KPI активов, доступность, использование.
  BC-1040.20.10:
    name: Определение KPI активов
    description: |
      Определение KPI и целевых показателей эффективности активов.
  BC-1040.20.20:
    name: Мониторинг доступности активов
    description: |
      Мониторинг доступности и времени безотказной работы активов.
  BC-1040.20.30:
    name: Отчётность об использовании активов
    description: |
      Составление отчётов об использовании и эффективности активов.
  BC-1040.20.40:
    name: Управление индексом технического состояния активов
    description: |
      Комплексные индексы технического состояния и оценка состояния активов.
  BC-1040.30:
    name: Управление рисками и критичностью активов
    description: |
      Классификация критичности, приоритизация на основе риска.
  BC-1040.30.10:
    name: Классификация критичности активов
    description: |
      Классификация активов по критичности с учётом последствий отказа.
  BC-1040.30.20:
    name: Оценка рисков активов
    description: |
      Оценка рисков активов, включая последствия отказов.
  BC-1040.30.30:
    name: Приоритизация обслуживания на основе риска
    description: |
      Приоритизация работ по техническому обслуживанию и капитальным вложениям на основе риска.
  BC-1040.40:
    name: Управление информацией об активах
    description: |
      Основные данные об активах, техническая документация.
  BC-1040.40.10:
    name: Управление основными данными активов
    description: |
      Основные данные активов, иерархии и реестры оборудования.
  BC-1040.40.20:
    name: Техническая документация на активы
    description: |
      Технические досье, чертежи и документация производителей оборудования.
  BC-1040.40.30:
    name: Управление цифровыми двойниками активов
    description: |
      Цифровые двойники активов для операций и аналитики.
  BC-1040.50:
    name: Управление выводом из эксплуатации и утилизацией активов
    description: |
      Вывод из эксплуатации, утилизация и списание активов.
  BC-1040.50.10:
    name: Планирование вывода из эксплуатации
    description: |
      Планирование вывода активов из эксплуатации с учётом требований охраны труда и безопасности.
  BC-1040.50.20:
    name: Демонтаж активов
    description: |
      Физический демонтаж и разборка выведенных из эксплуатации активов.
  BC-1040.50.30:
    name: Утилизация и продажа активов
    description: |
      Перепродажа, списание и переработка выведенных из эксплуатации активов.

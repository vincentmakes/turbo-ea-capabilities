# Управление доверием и соответствием SaaS-сервиса (ru) — translations for L1-saas-trust-service-compliance-management.yaml
locale: ru
source: L1-saas-trust-service-compliance-management.yaml
entries:
  BC-4290:
    name: Управление доверием и соответствием SaaS-сервиса
    description: |
      Аттестации уровня сервиса, опросники безопасности клиентов, публичное раскрытие доверия, управление субпроцессорами, обязательства по конфиденциальности сервиса и клиентские обязательства по устойчивости сервиса для SaaS-предложения.
  BC-4290.10:
    name: Управление аттестациями сервиса
    description: |
      Координация аттестаций уровня сервиса, таких как SOC 2, ISO 27001 и FedRAMP, для SaaS-предложения.
    in_scope:
      - Готовность к аудиту сервиса
      - Взаимодействие с аудиторами и подготовка отчётов
    out_of_scope:
      - Корпоративная программа соответствия (входит в Управление соответствием)
  BC-4290.10.10:
    name: Координация готовности к аудиту
    description: |
      Координация готовности к аудиту по владельцам контролей для сервиса.
  BC-4290.10.20:
    name: Взаимодействие с аудиторами
    description: |
      Взаимодействие с внешними аудиторами и управление аудиторскими полевыми работами.
  BC-4290.10.30:
    name: Управление обновлением аттестаций
    description: |
      Управление циклами обновления аттестаций и соглашениями о непрерывном аудите.
  BC-4290.20:
    name: Управление опросниками безопасности клиентов
    description: |
      Управление репозиторием опросников, разработка ответов и база знаний для ответов на оценки рисков поставщиков клиентов.
  BC-4290.20.10:
    name: Управление репозиторием опросников
    description: |
      Ведение репозитория входящих опросников и маршрутизация.
  BC-4290.20.20:
    name: Разработка ответов на опросники
    description: |
      Разработка ответов на опросники безопасности клиентов.
  BC-4290.20.30:
    name: Ведение базы знаний опросников
    description: |
      Ведение отобранной базы знаний утверждённых ответов и доказательств.
  BC-4290.30:
    name: Портал доверия и публичное раскрытие
    description: |
      Эксплуатация клиентского портала доверия, публичное раскрытие статуса и рабочие процессы распространения документов.
  BC-4290.30.10:
    name: Управление контентом портала доверия
    description: |
      Подготовка контента, публикуемого на клиентском портале доверия.
  BC-4290.30.20:
    name: Публичное раскрытие статуса
    description: |
      Публичное раскрытие статуса инцидентов и исторического состояния сервиса.
  BC-4290.30.30:
    name: Рабочий процесс распространения документов
    description: |
      Контролируемое распространение аудиторских отчётов и документов доверия клиентам.
  BC-4290.40:
    name: Управление субпроцессорами
    description: |
      Инвентаризация, раскрытие и уведомление об изменениях субпроцессоров, обрабатывающих данные клиентов.
  BC-4290.40.10:
    name: Инвентаризация субпроцессоров
    description: |
      Инвентаризация субпроцессоров и категорий клиентских данных, которые они обрабатывают.
  BC-4290.40.20:
    name: Раскрытие субпроцессоров
    description: |
      Клиентское раскрытие актуального списка субпроцессоров.
  BC-4290.40.30:
    name: Уведомление об изменениях субпроцессоров
    description: |
      Предварительное уведомление о добавлении и удалении субпроцессоров по контракту.
  BC-4290.50:
    name: Управление обязательствами по конфиденциальности сервиса
    description: |
      Управление дополнениями об обработке данных, раскрытиями потоков данных клиентов и маршрутизацией запросов субъектов данных.
  BC-4290.50.10:
    name: Управление дополнениями об обработке данных
    description: |
      Ведение и подписание дополнений об обработке данных с клиентами.
  BC-4290.50.20:
    name: Картирование потоков данных клиентов
    description: |
      Картирование потоков данных клиентов для раскрытия и оценки.
  BC-4290.50.30:
    name: Маршрутизация запросов субъектов данных
    description: |
      Маршрутизация запросов субъектов данных, полученных через клиентов, соответствующим обработчикам.
  BC-4290.60:
    name: Управление обязательствами по устойчивости сервиса
    description: |
      Клиентские обязательства по уровню сервиса, раскрытие доступности и администрирование сервисных кредитов.
  BC-4290.60.10:
    name: Управление обязательствами по уровню сервиса
    description: |
      Определение и управление клиентскими обязательствами по уровню сервиса.
  BC-4290.60.20:
    name: Раскрытие доступности
    description: |
      Раскрытие исторической доступности относительно взятых обязательств.
  BC-4290.60.30:
    name: Администрирование сервисных кредитов
    description: |
      Администрирование сервисных кредитов, возникающих при невыполнении обязательств.

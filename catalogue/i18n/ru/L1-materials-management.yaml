# Управление материалами (ru) — translations for L1-materials-management.yaml
locale: ru
source: L1-materials-management.yaml
entries:
  BC-1070:
    name: Управление материалами
    description: |
      Управление сырьём, незавершённым производством и спецификациями на уровне производственного объекта.
  BC-1070.10:
    name: Управление спецификациями
    description: |
      Структура спецификаций, конструкторские и производственные спецификации (BOM).
  BC-1070.10.10:
    name: Управление конструкторскими спецификациями
    description: |
      Конструкторские спецификации, привязанные к проектированию продукта и ревизиям.
  BC-1070.10.20:
    name: Управление производственными спецификациями
    description: |
      Производственные спецификации, отражающие последовательность сборки для конкретного производственного объекта.
  BC-1070.10.30:
    name: Управление изменениями и введением в действие спецификаций
    description: |
      Управление изменениями, ревизиями и датами введения в действие спецификаций.
  BC-1070.10.40:
    name: Управление вариантными спецификациями
    description: |
      Конфигурируемые и вариантные спецификации для опций продукта.
  BC-1070.20:
    name: Управление сырьём
    description: |
      Запасы, качество и прослеживаемость сырья.
  BC-1070.20.10:
    name: Контроль запасов сырья
    description: |
      Учёт запасов сырья на производственном объекте и складских местах.
  BC-1070.20.20:
    name: Контроль качества входящего сырья
    description: |
      Входной контроль, выборочная проверка и приёмка сырья.
  BC-1070.20.30:
    name: Прослеживаемость сырья
    description: |
      Прослеживаемость по партии, серии и серийному номеру для сырья.
  BC-1070.30:
    name: Управление незавершённым производством
    description: |
      Отслеживание, оценка и контроль НЗП.
  BC-1070.30.10:
    name: Отслеживание НЗП
    description: |
      Отслеживание незавершённого производства по ходу производственных операций.
  BC-1070.30.20:
    name: Оценка НЗП
    description: |
      Накопление затрат и оценка позиций незавершённого производства.
  BC-1070.30.30:
    name: Контроль и старение НЗП
    description: |
      Контроль и мониторинг старения зависшего или незапущенного НЗП.
  BC-1070.40:
    name: Управление готовой продукцией
    description: |
      Запасы готовой продукции на уровне производственного объекта.
  BC-1070.40.10:
    name: Приёмка готовой продукции
    description: |
      Приёмка готовой продукции из производства на склад.
  BC-1070.40.20:
    name: Хранение готовой продукции
    description: |
      Хранение и обработка готовой продукции на производственных складах.
  BC-1070.40.30:
    name: Отгрузка готовой продукции
    description: |
      Отгрузка и транспортировка готовой продукции нижестоящим узлам.
  BC-1070.50:
    name: Управление планированием материалов
    description: |
      MRP, потребности в материалах, планирование поставок на уровне объекта.
  BC-1070.50.10:
    name: Планирование потребности в материалах
    description: |
      Расчёт MRP для определения нетто-потребности в материалах на основе спроса и спецификаций.
  BC-1070.50.20:
    name: Анализ обеспеченности материалами
    description: |
      Анализ покрытия, сообщения об исключениях и предложения по заказам.
  BC-1070.50.30:
    name: Исполнение плана поставок на уровне объекта
    description: |
      Преобразование планов материального обеспечения в заказы на закупку и производственные заказы.
metadata:
  status: draft
  reviewer: pending

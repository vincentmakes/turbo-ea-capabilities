# Каналы дистрибуции (ru) — translations for L1-travel-distribution-channel-management.yaml
locale: ru
source: L1-travel-distribution-channel-management.yaml
entries:
  BC-4010:
    name: Каналы дистрибуции туристических продуктов
    description: |
      Управление дистрибуцией и мерчандайзингом туристических продуктов через прямые каналы, GDS, OTA, оптовиков и метапоисковые системы, включая подключение каналов, синдикацию контента и паритет цен и доступности.
    in_scope:
      - Управление прямыми, GDS-, OTA-, оптовыми и метапоисковыми каналами
      - Операции channel-manager хаба и синдикация контента
      - Политика паритета цен и доступности и её соблюдение
    out_of_scope:
      - Мастер-данные продуктов и пулы инвентаря (BC-4000)
      - Жизненный цикл бронирований (BC-4020)
      - Решения по ценообразованию и управлению доходностью (BC-4030)
  BC-4010.10:
    name: Управление прямым каналом дистрибуции
    description: |
      Дистрибуция туристических продуктов через собственные прямые каналы: веб-сайт, мобильное приложение, голосовые каналы и самообслуживание.
  BC-4010.10.10:
    name: Управление дистрибуцией через брендовый сайт
    description: |
      Управление официальным сайтом как прямой площадкой поиска и бронирования туристических продуктов.
  BC-4010.10.20:
    name: Управление дистрибуцией через мобильное приложение
    description: |
      Управление нативными мобильными приложениями как прямым каналом дистрибуции и обслуживания.
  BC-4010.10.30:
    name: Голосовой и колл-центровый канал дистрибуции
    description: |
      Дистрибуция через голосовые каналы и колл-центр с помощью операторов для поиска и бронирования.
  BC-4010.10.40:
    name: Дистрибуция через киоски и самообслуживание
    description: |
      Дистрибуция через киоски самообслуживания в аэропортах, отелях и на площадках партнёров.
  BC-4010.20:
    name: Управление дистрибуцией через GDS
    description: |
      Дистрибуция через глобальные дистрибутивные системы, включая синхронизацию контента, маппинг классов бронирования и управление расходами.
  BC-4010.20.10:
    name: Операции подключения к GDS
    description: |
      Управление подключением к GDS-провайдерам для процессов поиска, бронирования и оформления билетов.
  BC-4010.20.20:
    name: Передача и синхронизация контента с GDS
    description: |
      Передача и синхронизация контента, цен и доступности с GDS-провайдерами.
  BC-4010.20.30:
    name: Маппинг классов бронирования в GDS
    description: |
      Сопоставление внутренних классов продуктов с классами бронирования и кодами тарифов GDS.
  BC-4010.20.40:
    name: Управление GDS-сборами и надбавками
    description: |
      Управление сборами за бронирование в GDS, надбавками и распределением стоимости продажи.
  BC-4010.30:
    name: Управление дистрибуцией через OTA и оптовиков
    description: |
      Дистрибуция через онлайн-агентства, bed-банки и B2B-оптовиков с управлением коммерческими условиями и переопределением контента.
  BC-4010.30.10:
    name: Операции подключения к OTA
    description: |
      Управление подключением к OTA для процессов поиска, бронирования и постбронирования.
  BC-4010.30.20:
    name: Подключение к оптовикам и bed-банкам
    description: |
      Управление подключением к оптовикам и bed-банкам для B2B-перераспределения.
  BC-4010.30.30:
    name: Управление коммерческими условиями OTA
    description: |
      Управление коммерческими условиями OTA: комиссия, наценка и модели нетто-тарифов.
  BC-4010.30.40:
    name: Управление переопределением контента OTA
    description: |
      Управление переопределением контента для OTA при сохранении единства бренда.
  BC-4010.40:
    name: Управление дистрибуцией через метапоиск
    description: |
      Дистрибуция и ставки на метапоисковых платформах, включая операции с фидами и отслеживание конверсий.
  BC-4010.40.10:
    name: Операции с метапоисковыми фидами
    description: |
      Управление фидами цен и доступности для метапоисковых провайдеров.
  BC-4010.40.20:
    name: Управление ставками в метапоиске
    description: |
      Управление стратегиями ставок в метапоисковых плейсментах на разных рынках и устройствах.
  BC-4010.40.30:
    name: Отслеживание конверсии в метапоиске
    description: |
      Отслеживание атрибуции конверсий и эффективности ставок для метапоискового трафика.
  BC-4010.40.40:
    name: Управление конфликтами брендовых ставок
    description: |
      Управление конфликтами ставок между собственным брендом и OTA в метапоиске и платном поиске.
  BC-4010.50:
    name: Операции channel-manager
    description: |
      Управление хабом channel-manager, синхронизирующим инвентарь, цены и ограничения по всем каналам дистрибуции.
  BC-4010.50.10:
    name: Настройка маппинга каналов
    description: |
      Настройка маппинга внутренних продуктов на каталоги конкретных каналов.
  BC-4010.50.20:
    name: Операции передачи инвентаря
    description: |
      Управление обновлениями инвентаря из центрального пула во все подключённые каналы.
  BC-4010.50.30:
    name: Операции передачи тарифов
    description: |
      Управление обновлениями тарифов из движков ценообразования во все подключённые каналы.
  BC-4010.50.40:
    name: Операции передачи ограничений
    description: |
      Управление передачей ограничений: минимальный срок проживания, закрытие заезда, стоп-продажа по каналам.
  BC-4010.60:
    name: Управление паритетом цен и доступности
    description: |
      Определение, мониторинг и соблюдение паритета цен и доступности по прямым и непрямым каналам.
  BC-4010.60.10:
    name: Определение политики паритета
    description: |
      Определение политики паритета цен и доступности по типам каналов и сегментам партнёров.
  BC-4010.60.20:
    name: Мониторинг и аудит паритета
    description: |
      Мониторинг каналов на нарушения паритета и плановый аудит по всему каналовому миксу.
  BC-4010.60.30:
    name: Устранение нарушений паритета
    description: |
      Разрешение выявленных нарушений паритета с каналами и партнёрами.
  BC-4010.60.40:
    name: Управление доступностью последнего номера
    description: |
      Управление обязательствами по доступности последнего номера перед корпоративными и канальными партнёрами.
  BC-4010.70:
    name: Синдикация дистрибутивного контента
    description: |
      Синдикация контента продуктов дистрибутивным партнёрам с контролем формата, актуальности и запасных вариантов.
  BC-4010.70.10:
    name: Управление форматами контентных фидов
    description: |
      Управление форматами и схемами контентных фидов для конкретных каналов.
  BC-4010.70.20:
    name: Мониторинг актуальности контента
    description: |
      Контроль актуальности контента на площадках партнёров-дистрибьюторов в соответствии с SLA публикации.
  BC-4010.70.30:
    name: Правила запасного контента для каналов
    description: |
      Правила применения запасного контента при его отсутствии или устаревании у партнёра.
  BC-4010.70.40:
    name: Сверка переопределений контента
    description: |
      Сверка переопределений контента партнёров с мастер-записью контента.

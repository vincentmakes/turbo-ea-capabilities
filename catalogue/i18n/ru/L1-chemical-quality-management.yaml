# Управление качеством химической продукции (ru) — translations for L1-chemical-quality-management.yaml
locale: ru
source: L1-chemical-quality-management.yaml
entries:
  BC-4670:
    name: Управление качеством химической продукции
    description: |
      Разработка спецификаций, аналитические лабораторные операции, выпуск
      партий, урегулирование претензий и споров по сертификатам анализа,
      эталонные стандарты и соблюдение отраслевых требований GMP.
  BC-4670.10:
    name: Управление химическими спецификациями
    description: |
      Установление и управление жизненным циклом спецификаций на сырьё,
      промежуточные и готовые продукты.
  BC-4670.10.10:
    name: Установление спецификаций на сырьё
    description: |
      Установление и пересмотр спецификаций на входящее сырьё.
  BC-4670.10.20:
    name: Установление спецификаций на промежуточные продукты
    description: |
      Установление спецификаций на промежуточные продукты в производственной
      цепочке.
  BC-4670.10.30:
    name: Установление спецификаций на готовую продукцию
    description: |
      Установление спецификаций на готовую продукцию и критериев выпуска.
  BC-4670.10.40:
    name: Управление жизненным циклом спецификаций
    description: |
      Управление жизненным циклом утверждённых спецификаций и изменений.
  BC-4670.20:
    name: Аналитические лабораторные операции
    description: |
      Эксплуатация лабораторий контроля качества, выполняющих мокрую химию,
      хроматографию, спектроскопию и испытания физических свойств.
  BC-4670.20.10:
    name: Мокрохимические лабораторные операции
    description: |
      Выполнение аналитических процедур мокрой химии.
  BC-4670.20.20:
    name: Хроматографические операции
    description: |
      Работа на платформах ВЭЖХ, ГХ и ионной хроматографии.
  BC-4670.20.30:
    name: Спектроскопические операции
    description: |
      Работа на платформах FTIR, ЯМР, ИСП и масс-спектрометрии.
  BC-4670.20.40:
    name: Испытания физических свойств
    description: |
      Испытания физических свойств, таких как вязкость, плотность и
      гранулометрический состав.
  BC-4670.30:
    name: Управление выпуском партий
    description: |
      Принятие решений о пригодности, выдача сертификатов анализа и работа
      с выходящими за пределы спецификации результатами.
  BC-4670.30.10:
    name: Принятие решений о пригодности партий
    description: |
      Принятие решений о пригодности произведённых партий относительно
      спецификации.
  BC-4670.30.20:
    name: Выдача сертификатов анализа
    description: |
      Выдача сертификатов анализа покупателям.
  BC-4670.30.30:
    name: Расследование отклонений от спецификации
    description: |
      Расследование аналитических результатов, выходящих за пределы
      спецификации.
  BC-4670.40:
    name: Управление претензиями покупателей и спорами по сертификатам анализа
    description: |
      Приём и урегулирование претензий покупателей и споров по сертификатам
      анализа.
  BC-4670.40.10:
    name: Приём претензий покупателей
    description: |
      Приём и сортировка претензий покупателей по химической продукции.
  BC-4670.40.20:
    name: Расследование споров по сертификатам анализа
    description: |
      Расследование споров по значениям сертификатов анализа.
  BC-4670.40.30:
    name: Повторное испытание образцов покупателей
    description: |
      Повторное испытание хранящихся и предоставленных покупателями образцов.
  BC-4670.50:
    name: Управление эталонными материалами и стандартами
    description: |
      Приобретение, квалификация и мониторинг стабильности эталонных стандартов
      и материалов.
  BC-4670.50.10:
    name: Приобретение эталонных стандартов
    description: |
      Приобретение сертифицированных эталонных материалов у аккредитованных
      поставщиков.
  BC-4670.50.20:
    name: Квалификация внутрифирменных эталонных стандартов
    description: |
      Квалификация внутрифирменных рабочих эталонных стандартов.
  BC-4670.50.30:
    name: Мониторинг стабильности эталонных стандартов
    description: |
      Мониторинг стабильности используемых эталонных стандартов.
  BC-4670.60:
    name: Разработка и валидация методик
    description: |
      Разработка, валидация и межлабораторная передача аналитических методик.
  BC-4670.60.10:
    name: Разработка аналитических методик
    description: |
      Разработка новых аналитических методик для подтверждения спецификаций.
  BC-4670.60.20:
    name: Валидация методик
    description: |
      Валидация аналитических методик по точности, прецизионности и
      робастности.
  BC-4670.60.30:
    name: Передача методик
    description: |
      Межлабораторная передача валидированных аналитических методик.
  BC-4670.70:
    name: Отраслевое соответствие GMP
    description: |
      Соблюдение отраслевых требований GMP для химической продукции,
      поставляемой на регулируемые рынки последующей переработки.
  BC-4670.70.10:
    name: Соответствие GMP EFfCI
    description: |
      Соблюдение требований GMP EFfCI для ингредиентов косметики.
  BC-4670.70.20:
    name: Соответствие GMP IPEC
    description: |
      Соблюдение требований GMP IPEC для фармацевтических вспомогательных
      веществ.
  BC-4670.70.30:
    name: Соответствие требованиям контакта с пищевыми продуктами
    description: |
      Соблюдение требований к химической продукции, поставляемой для
      упаковки пищевых продуктов.

# Управление страховыми рисками (ru) — translations for L1-insurance-risk-management.yaml
locale: ru
source: L1-insurance-risk-management.yaml
entries:
  BC-2190:
    name: Управление страховыми рисками
    description: |
      Специфические для страхования виды рисков — андеррайтинговый риск, катастрофический риск
      и риск накопления, риск резервов, риск платёжеспособности и капитала, риск перестраховочного
      контрагента, риски жизни и долголетия, риск расторжений, а также операционный и поведенческий
      риски — в отличие от общекорпоративного риска.
  BC-2190.10:
    name: Управление андеррайтинговым риском
    description: |
      Аппетит к андеррайтинговому риску, мониторинг лимитов и надзор за неблагоприятным отбором.
  BC-2190.10.10:
    name: Аппетит к андеррайтинговому риску
    description: |
      Определение и формулировка аппетита к андеррайтинговому риску.
  BC-2190.10.20:
    name: Мониторинг андеррайтинговых лимитов
    description: |
      Мониторинг полномочий по андеррайтингу и лимитов накопления.
  BC-2190.10.30:
    name: Надзор за неблагоприятным отбором
    description: |
      Надзор за признаками неблагоприятного отбора в портфеле.
  BC-2190.20:
    name: Управление катастрофическим риском и риском накопления
    description: |
      Мониторинг накопления рисков, управление PML и сценариями реалистичных катастроф, планирование мер снижения риска.
  BC-2190.20.10:
    name: Мониторинг накопления рисков
    description: |
      Мониторинг накопления рисков по опасному явлению, географии и виду объекта страхования.
  BC-2190.20.20:
    name: Управление PML и сценариями реалистичных катастроф
    description: |
      Управление показателями PML и сценариями реалистичных катастроф.
  BC-2190.20.30:
    name: Планирование мер снижения катастрофического риска
    description: |
      Планирование мер снижения рисков, включая перестрахование и передачу рисков.
  BC-2190.30:
    name: Управление резервным риском
    description: |
      Мониторинг достаточности резервов, анализ волатильности резервов и стресс-тестирование резервного риска.
  BC-2190.30.10:
    name: Мониторинг достаточности резервов
    description: |
      Мониторинг достаточности резервов относительно наилучшей оценки и внешних ориентиров.
  BC-2190.30.20:
    name: Анализ волатильности резервов
    description: |
      Анализ волатильности резервов и однолетнего резервного риска.
  BC-2190.30.30:
    name: Стресс-тестирование резервного риска
    description: |
      Стресс-тестирование и сценарное тестирование достаточности резервов.
  BC-2190.40:
    name: Управление риском платёжеспособности и капитала
    description: |
      Мониторинг достаточности капитала, проведение ORSA, стресс-тестирование платёжеспособности и планирование восстановления и урегулирования.
  BC-2190.40.10:
    name: Мониторинг достаточности капитала
    description: |
      Мониторинг коэффициентов капитала платёжеспособности и триггеров капитала.
  BC-2190.40.20:
    name: Проведение ORSA
    description: |
      Проведение цикла собственной оценки рисков и платёжеспособности.
  BC-2190.40.30:
    name: Стресс-тестирование платёжеспособности
    description: |
      Прямое и обратное стресс-тестирование позиций платёжеспособности.
  BC-2190.40.40:
    name: Планирование восстановления и урегулирования
    description: |
      Планирование восстановления и урегулирования для сценариев ликвидации страховщика.
  BC-2190.50:
    name: Управление кредитным риском перестраховочного контрагента
    description: |
      Мониторинг перестраховочных контрагентов, достаточность обеспечения и стресс-тестирование дефолта контрагентов.
  BC-2190.50.10:
    name: Мониторинг перестраховочных контрагентов
    description: |
      Мониторинг финансовой устойчивости и концентрации подверженности риску перестраховщиков.
  BC-2190.50.20:
    name: Мониторинг достаточности обеспечения и аккредитивов
    description: |
      Мониторинг достаточности залогового обеспечения и аккредитивов от перестраховщиков.
  BC-2190.50.30:
    name: Стресс-тестирование дефолта контрагентов
    description: |
      Стресс-тестирование влияния дефолта перестраховщиков на платёжеспособность.
  BC-2190.60:
    name: Управление риском жизни и долголетия
    description: |
      Мониторинг риска смертности, надзор за хеджированием риска долголетия и управление пандемическим риском.
  BC-2190.60.10:
    name: Мониторинг риска смертности
    description: |
      Мониторинг риска смертности по портфелям страхования жизни и защиты.
  BC-2190.60.20:
    name: Надзор за хеджированием риска долголетия
    description: |
      Надзор за инструментами хеджирования риска долголетия и подверженностью риску контрагентов.
  BC-2190.60.30:
    name: Управление пандемическим риском
    description: |
      Управление риском пандемической и эпидемической смертности и заболеваемости.
  BC-2190.70:
    name: Управление риском расторжений и сохраняемости
    description: |
      Мониторинг риска расторжений и стресс-тестирование сохраняемости.
  BC-2190.70.10:
    name: Мониторинг риска расторжений
    description: |
      Мониторинг уровней расторжений и убытков, вызванных расторжениями, по продуктам страхования жизни и накопительного страхования.
  BC-2190.70.20:
    name: Стресс-тестирование сохраняемости
    description: |
      Стресс-тестирование допущений о сохраняемости и динамике расторжений.
  BC-2190.80:
    name: Управление операционным и поведенческим риском в страховании
    description: |
      Мониторинг поведенческого риска, риска урегулирования убытков и риска дистрибуции.
  BC-2190.80.10:
    name: Мониторинг поведенческого риска в страховании
    description: |
      Мониторинг индикаторов поведенческого риска по продуктам, дистрибуции и урегулированию убытков.
  BC-2190.80.20:
    name: Надзор за риском урегулирования убытков
    description: |
      Надзор за риском урегулирования убытков и соблюдением интересов страхователей.
  BC-2190.80.30:
    name: Мониторинг риска дистрибуции
    description: |
      Мониторинг рисков дистрибуции, включая недобросовестные продажи и поведение посредников.

# Горный отвод и роялти (ru) — translations for L1-mining-tenement-royalty-management.yaml
locale: ru
source: L1-mining-tenement-royalty-management.yaml
entries:
  BC-4490:
    name: Горный отвод и роялти
    description: |
      Приобретение, соблюдение требований и управление портфелем разведочных
      лицензий и горных отводов, а также расчёт, отчётность и раскрытие
      информации о государственных, частных и индигенных роялти.
  BC-4490.10:
    name: Приобретение горных отводов
    description: |
      Подача заявок, участие в тендерах и комплексная проверка при приобретении
      разведочных лицензий, горных отводов и иных прав на недра.
    in_scope:
      - Заявки на получение разведочных лицензий на новых площадях
      - Заявки на оформление и продление горных отводов
      - Комплексная проверка при приобретении горных отводов
    out_of_scope:
      - Доразведка перспективных площадей на стадии открытия (BC-4400.20)
  BC-4490.10.10:
    name: Подача заявок на разведочные лицензии
    description: |
      Подготовка и подача заявок на получение разведочных лицензий на новых и
      уже освоенных площадях.
  BC-4490.10.20:
    name: Подача заявок на горные отводы
    description: |
      Подготовка и подача заявок на оформление горных отводов и перевод из
      разведочной лицензии.
  BC-4490.10.30:
    name: Участие в тендерах на горные отводы
    description: |
      Участие в конкурентных тендерах и аукционах на право пользования горными
      отводами.
  BC-4490.10.40:
    name: Комплексная проверка при приобретении горных отводов
    description: |
      Проверка правового титула, обременений и обязательств при приобретении
      горных отводов.
  BC-4490.20:
    name: Соблюдение требований и поддержание горных отводов
    description: |
      Соблюдение обязательств по ежегодным расходам, рабочей программе, аренде
      и возобновлению горных отводов.
  BC-4490.20.10:
    name: Отчётность по ежегодным расходам
    description: |
      Отчётность о ежегодных затратах на геологоразведку и разработку в
      сравнении с обязательствами по горным отводам.
  BC-4490.20.20:
    name: Соблюдение рабочей программы
    description: |
      Подтверждение соблюдения рабочих программ по разведочным и горным
      отводам.
  BC-4490.20.30:
    name: Уплата арендных платежей и обязательных сборов
    description: |
      Уплата ежегодной арендной платы, обязательных сборов и залогов по
      горным отводам.
  BC-4490.20.40:
    name: Управление продлением горных отводов
    description: |
      Управление заявками на продление горных отводов и изменениями условий.
  BC-4490.30:
    name: Управление портфелем горных отводов
    description: |
      Ведение реестра горных отводов, картографирование границ и принятие
      решений о частичном отказе от прав в рамках портфеля.
  BC-4490.30.10:
    name: Ведение реестра горных отводов
    description: |
      Ведение корпоративного реестра горных отводов и актуализация их
      атрибутов.
  BC-4490.30.20:
    name: Картографирование границ горных отводов
    description: |
      Пространственное картографирование и сверка границ горных отводов с
      государственными реестрами.
  BC-4490.30.30:
    name: Принятие решений о частичном отказе от горных отводов
    description: |
      Принятие решений о частичном или полном отказе от прав на горные отводы
      для оптимизации портфеля.
  BC-4490.40:
    name: Управление государственными роялти
    description: |
      Расчёт, подача отчётности и ответы на аудиты по добычным и адвалорным
      роялти, уплачиваемым принимающим государствам.
  BC-4490.40.10:
    name: Расчёт добычных роялти
    description: |
      Расчёт добычных и адвалорных роялти с объёма добытых полезных ископаемых.
  BC-4490.40.20:
    name: Подача деклараций по роялти
    description: |
      Подача периодических деклараций по роялти в налоговые органы
      принимающих государств.
  BC-4490.40.30:
    name: Ответы на аудиты по роялти
    description: |
      Ответы на государственные аудиты и проверки по роялти.
  BC-4490.50:
    name: Управление частными и индигенными роялти
    description: |
      Администрирование частных роялти и обязательств по соглашениям о
      разделе прибыли с коренными народами.
  BC-4490.50.10:
    name: Администрирование частных роялти
    description: |
      Администрирование прав на роялти поставщиков, финансирующих организаций
      и стриминговых компаний.
  BC-4490.50.20:
    name: Администрирование роялти коренных народов
    description: |
      Администрирование выплат роялти и соглашений о разделе прибыли с
      коренными народами и традиционными владельцами.
  BC-4490.50.30:
    name: Отчётность о раскрытии роялти
    description: |
      Раскрытие информации о платежах роялти инвесторам, регуляторам и
      затронутым сообществам.
  BC-4490.60:
    name: Отчётность в рамках горнодобывающей прозрачности
    description: |
      Отчётность о платежах правительствам, EITI и раскрытие информации о
      конечных бенефициарах в рамках режимов прозрачности добывающих отраслей.
  BC-4490.60.10:
    name: Отчётность о платежах правительствам
    description: |
      Обязательная отчётность о платежах правительствам в рамках ЕС и
      эквивалентных режимов.
  BC-4490.60.20:
    name: Раскрытие информации в рамках горнодобывающей прозрачности
    description: |
      Добровольная отчётность в формате EITI о потоках доходов от добычи.
  BC-4490.60.30:
    name: Раскрытие информации о конечных бенефициарах
    description: |
      Раскрытие информации о конечных бенефициарах операционных юридических
      лиц в рамках EITI и эквивалентных правил.

# Управление нефтяными совместными предприятиями (ru) — translations for L1-petroleum-joint-venture-management.yaml
locale: ru
source: L1-petroleum-joint-venture-management.yaml
entries:
  BC-3110:
    name: Управление нефтяными совместными предприятиями
    description: |
      Администрирование договоров о совместной деятельности, концессий и соглашений о разделе продукции: операционные комитеты, утверждение AFE, выставление счетов по долевым интересам, запросы денежных средств, лицензионные обязательства, а также отчётность перед партнёрами и принимающими правительствами.
  BC-3110.10:
    name: Администрирование договоров о совместной деятельности
    description: |
      Составление, администрирование и управление договорами о совместной деятельности, включая процессы операционного комитета и утверждение AFE.
  BC-3110.10.10:
    name: Составление и пересмотр JOA
    description: |
      Составление, корректировка и периодический пересмотр договоров о совместной деятельности.
  BC-3110.10.20:
    name: Координация операционного комитета
    description: |
      Координация заседаний OPCOM, TECCOM и подкомитетов.
  BC-3110.10.30:
    name: Управление AFE
    description: |
      Выпуск, утверждение и отслеживание полномочий на расходование средств (AFE).
  BC-3110.10.40:
    name: Отслеживание прав голоса и согласований
    description: |
      Отслеживание прав голоса партнёров и порогов утверждения по JOA.
  BC-3110.20:
    name: Выставление счетов по долевым интересам
    description: |
      Подготовка, аудит и урегулирование споров по счетам за долевые интересы.
  BC-3110.20.10:
    name: Подготовка счетов по долевым интересам
    description: |
      Подготовка ежемесячных счетов по долевым интересам для партнёров.
  BC-3110.20.20:
    name: Координация аудита долевых интересов
    description: |
      Координация аудитов долевых интересов, инициированных партнёрами.
  BC-3110.20.30:
    name: Урегулирование споров по JIB
    description: |
      Расследование и урегулирование споров по выставлению счетов за долевые интересы.
  BC-3110.30:
    name: Управление запросами денежных средств и финансированием
    description: |
      Выпуск запросов денежных средств, получение финансирования от партнёров и управление дефолтами.
  BC-3110.30.10:
    name: Выпуск запросов денежных средств
    description: |
      Выпуск ежемесячных и внеплановых запросов денежных средств партнёрам.
  BC-3110.30.20:
    name: Получение финансирования от партнёров
    description: |
      Получение и сверка денежных поступлений по запросам финансирования от партнёров.
  BC-3110.30.30:
    name: Управление дефолтом финансирования
    description: |
      Управление позициями партнёров-нарушителей в соответствии с положениями JOA.
  BC-3110.40:
    name: Управление лицензионными и концессионными обязательствами
    description: |
      Отслеживание обязательств по рабочим программам, роялти и обязательствам по возврату лицензий.
  BC-3110.40.10:
    name: Отслеживание обязательств рабочих программ
    description: |
      Отслеживание минимальных рабочих обязательств и геологоразведочных обязательств.
  BC-3110.40.20:
    name: Расчёт роялти по концессии
    description: |
      Расчёт роялти, подлежащих уплате принимающим правительствам по условиям концессии.
  BC-3110.40.30:
    name: Управление возвратом лицензий
    description: |
      Управление частичным и полным возвратом лицензий.
  BC-3110.50:
    name: Отчётность перед принимающим правительством и партнёрами
    description: |
      Отчётность перед принимающими правительствами по условиям СРП и перед партнёрами по условиям JOA.
  BC-3110.50.10:
    name: Отчётность перед принимающим правительством
    description: |
      Отчётность об операциях, затратах и добыче перед принимающими правительствами.
  BC-3110.50.20:
    name: Отчётность по соглашению о разделе продукции
    description: |
      Отчётность по возмещению затрат, прибыльной нефти и отгрузкам по условиям СРП.
  BC-3110.50.30:
    name: Отчётность по показателям для партнёров
    description: |
      Периодическая операционная и финансовая отчётность для партнёров по СП.
  BC-3110.60:
    name: Управление неоперирующим участием
    description: |
      Управление долевым участием в СП, управляемых другими сторонами.
  BC-3110.60.10:
    name: Мониторинг неоперирующей позиции
    description: |
      Мониторинг деятельности оператора и показателей СП с позиции неоперирующего участника.
  BC-3110.60.20:
    name: Участие в голосовании неоперирующего участника
    description: |
      Внутренняя проверка и голосование по рабочим программам, предложенным оператором.
  BC-3110.60.30:
    name: Верификация затрат неоперирующего участника
    description: |
      Верификация затрат, выставленных оператором, в соответствии с процедурами бухгалтерского учёта JOA.

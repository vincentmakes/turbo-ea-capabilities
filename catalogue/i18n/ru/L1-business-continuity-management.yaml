# Управление непрерывностью бизнеса (ru) — translations for L1-business-continuity-management.yaml
locale: ru
source: L1-business-continuity-management.yaml
entries:
  BC-160:
    name: Управление непрерывностью бизнеса
    description: |
      Планирование устойчивости, восстановление после сбоев и антикризисное реагирование.
  BC-160.10:
    name: Планирование непрерывности бизнеса
    description: |
      Анализ влияния на бизнес, разработка планов, стратегии обеспечения непрерывности.
  BC-160.10.10:
    name: Анализ влияния на бизнес
    description: |
      Выявление критически важных процессов, показателей RTO, RPO и зависимостей.
  BC-160.10.20:
    name: Определение стратегий непрерывности
    description: |
      Выбор стратегий обеспечения непрерывности и вариантов восстановления.
  BC-160.10.30:
    name: Разработка планов непрерывности
    description: |
      Документирование планов непрерывности бизнеса в соответствии с ISO 22301.
  BC-160.10.40:
    name: Поддержание актуальности планов
    description: |
      Периодический пересмотр и актуализация планов непрерывности.
  BC-160.20:
    name: Управление восстановлением после сбоев
    description: |
      Восстановление ИТ-систем и операционной деятельности после сбоев.
  BC-160.20.10:
    name: Планирование восстановления ИТ-сервисов
    description: |
      Планы восстановления для критически важных ИТ-сервисов и инфраструктуры.
  BC-160.20.20:
    name: Управление резервным копированием и восстановлением
    description: |
      Стратегии резервного копирования, неизменяемость данных и проверка восстановления.
  BC-160.20.30:
    name: Операции по отказоустойчивому переключению и восстановлению площадки
    description: |
      Отказоустойчивое переключение, активация резервной площадки и операционное восстановление.
  BC-160.20.40:
    name: Координация операционного восстановления
    description: |
      Координация деятельности при активации процедур восстановления.
  BC-160.30:
    name: Антикризисное управление
    description: |
      Реагирование на кризисы, командная структура, эскалация.
  BC-160.30.10:
    name: Командная структура кризисного управления
    description: |
      Кризисная команда, роли и структура управления в кризисной ситуации.
  BC-160.30.20:
    name: Кризисные коммуникации
    description: |
      Внутренние и внешние кризисные коммуникации и управление заинтересованными сторонами.
  BC-160.30.30:
    name: Эскалация и активация плана реагирования
    description: |
      Классификация серьёзности, маршруты эскалации и активация планов.
  BC-160.30.40:
    name: Анализ после кризиса
    description: |
      Извлечённые уроки и мероприятия по совершенствованию по итогам кризисов.
  BC-160.40:
    name: Тестирование устойчивости и учения
    description: |
      Учения, тренировки, проверка планов.
  BC-160.40.10:
    name: Настольные и имитационные учения
    description: |
      Настольные, сквозные и имитационные учения.
  BC-160.40.20:
    name: Тестирование отказоустойчивого переключения в реальных условиях
    description: |
      Реальное тестирование отказоустойчивого переключения и восстановления по целевым показателям RTO и RPO.
  BC-160.40.30:
    name: Управление программой учений
    description: |
      Годовой календарь учений, область охвата и вовлечённость заинтересованных сторон.
  BC-160.40.40:
    name: Отслеживание результатов учений и совершенствование
    description: |
      Фиксация результатов учений и отслеживание мероприятий по совершенствованию.

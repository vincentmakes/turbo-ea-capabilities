# Планирование транспортной сети (ru) — translations for L1-transport-network-planning-management.yaml
locale: ru
source: L1-transport-network-planning-management.yaml
entries:
  BC-2410:
    name: Планирование транспортной сети
    description: |
      Проектирование транспортных сетей, маршрутов, узлов, расписаний и модального
      состава, определяющих портфель услуг перевозчика или провайдера 3PL.
  BC-2410.10:
    name: Управление проектированием сети
    description: |
      Долгосрочное проектирование узлов, шлюзов, маршрутов и модального состава,
      обеспечивающего портфель услуг.
    in_scope:
      - Решения о структуре «ступица-спицы» и прямого сообщения
      - Проектирование модального состава по дороге, железной дороге, морю и воздуху
    out_of_scope:
      - Проектирование сети со стороны грузоотправителей (BC-520)
  BC-2410.10.10:
    name: Проектирование узлов и шлюзов
    description: |
      Выбор и масштабирование узлов, шлюзов и точек консолидации.
  BC-2410.10.20:
    name: Проектирование маршрутов и сервисов
    description: |
      Определение маршрутов «пункт отправления — пункт назначения» и сервисов на них.
  BC-2410.10.30:
    name: Проектирование модального состава
    description: |
      Выбор вида транспорта и интермодального состава для каждого маршрута и уровня сервиса.
  BC-2410.20:
    name: Управление планированием расписания
    description: |
      Разработка основных расписаний, слотов и сервисных окон для рейсов,
      авиарейсов, поездов и грузовых автомобилей.
  BC-2410.20.10:
    name: Разработка основного расписания
    description: |
      Разработка регулярных расписаний рейсов, авиарейсов, поездов и грузовиков.
  BC-2410.20.20:
    name: Планирование слотов и окон
    description: |
      Распределение причальных, взлётно-посадочных и шлюзовых окон для плановых сервисов.
  BC-2410.20.30:
    name: Публикация расписания
    description: |
      Публикация расписаний для клиентов, партнёров и каналов бронирования.
  BC-2410.30:
    name: Управление типологией сервисов
    description: |
      Определение продуктов сервиса, уровней транзитного времени и каталога
      услуг, предлагаемых клиентам.
  BC-2410.30.10:
    name: Определение уровня сервиса
    description: |
      Определение экспресс-, стандартных, отложенных и интермодальных уровней
      сервиса с соответствующими обязательствами.
  BC-2410.30.20:
    name: Инжиниринг транзитного времени
    description: |
      Расчёт сквозного транзитного времени по участкам и стыковкам.
  BC-2410.30.30:
    name: Управление каталогом сервисов
    description: |
      Ведение опубликованного каталога транспортных услуг.
  BC-2410.40:
    name: Управление балансировкой ёмкости и спроса
    description: |
      Согласование плановой ёмкости с прогнозным спросом, включая
      репозиционирование порожнего оборудования.
  BC-2410.40.10:
    name: Интеграция прогноза спроса
    description: |
      Интеграция клиентских и рыночных прогнозов спроса в планы сети.
  BC-2410.40.20:
    name: Согласование плана ёмкости
    description: |
      Согласование плановой ёмкости со спросом и ограничениями.
  BC-2410.40.30:
    name: Планирование репозиционирования порожнего оборудования
    description: |
      Планирование перемещений порожних контейнеров, трейлеров и ULD.
  BC-2410.50:
    name: Оптимизация и моделирование сети
    description: |
      Моделирование, симуляция и бенчмаркинг вариантов сети и сценариев нарушений.
  BC-2410.50.10:
    name: Моделирование сети
    description: |
      Построение аналитических моделей транспортной сети.
  BC-2410.50.20:
    name: Сценарное моделирование
    description: |
      Моделирование спроса, нарушений и альтернатив проектирования.
  BC-2410.50.30:
    name: Бенчмаркинг производительности сети
    description: |
      Бенчмаркинг стоимости и сервиса сети относительно конкурентов и предыдущих конфигураций.
metadata:
  status: draft
  reviewer: pending

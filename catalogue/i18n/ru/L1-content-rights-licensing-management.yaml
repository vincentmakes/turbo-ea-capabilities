# Управление правами и лицензированием контента (ru) — translations for L1-content-rights-licensing-management.yaml
locale: ru
source: L1-content-rights-licensing-management.yaml
entries:
  BC-3720:
    name: Управление правами и лицензированием контента
    description: |
      Приобретение, инвентаризация, исходящее лицензирование, спортивные
      и музыкальные права, входящие роялти, клиринг и цепочка правового
      титула для аудиовизуального, аудио- и редакционного контента.
  BC-3720.10:
    name: Управление приобретением прав
    description: |
      Переговоры и заключение договоров о входящих правах на контент,
      приобретаемый предприятием у правообладателей или продюсеров.
  BC-3720.10.10:
    name: Поддержка переговоров о правах
    description: |
      Подготовка тёрм-листов, анализ сопоставимых сделок
      и поддержка переговоров по входящим контентным сделкам.
  BC-3720.10.20:
    name: Управление договорами приобретения
    description: |
      Разработка, исполнение и управление жизненным циклом
      входящих договоров прав и поправок к ним.
  BC-3720.10.30:
    name: Отслеживание приобретённых окон прав
    description: |
      Отслеживание приобретённых окон, территорий, платформ
      и условий эксклюзивности по договору.
  BC-3720.20:
    name: Управление инвентарём прав
    description: |
      Управление сводным инвентарём удерживаемых прав и запрос
      о наличии для последующего программирования и лицензирования.
  BC-3720.20.10:
    name: Отслеживание окон и территорий прав
    description: |
      Отслеживание доступных окон прав по названию, территории,
      платформе и языку.
  BC-3720.20.20:
    name: Отслеживание ограничений и эксклюзивности
    description: |
      Отслеживание периодов ограничений и ограничений эксклюзивности,
      блокирующих последующее использование.
  BC-3720.20.30:
    name: Запрос о наличии прав
    description: |
      Сервисы запросов, отвечающие на вопрос о лицензируемости
      названия для данного использования, окна и территории.
  BC-3720.30:
    name: Управление исходящим лицензированием
    description: |
      Продажа и управление жизненным циклом прав, лицензируемых
      вещателям, платформам и третьим сторонам.
  BC-3720.30.10:
    name: Управление продажами лицензий
    description: |
      Конвейер, структурирование и закрытие исходящих
      лицензионных сделок по территориям и платформам.
  BC-3720.30.20:
    name: Управление выходными сделками
    description: |
      Управление многотитульными выходными и объёмными
      сделками с нижестоящими лицензиатами.
  BC-3720.30.30:
    name: Управление лицензированием форматов
    description: |
      Лицензирование неигровых и игровых форматов и библий
      местным продюсерам и вещателям.
  BC-3720.40:
    name: Управление спортивными и событийными правами
    description: |
      Участие в торгах, отслеживание и использование спортивных
      прав и прав на прямые трансляции, включая производные хайлайты.
  BC-3720.40.10:
    name: Торги на спортивные права
    description: |
      Подготовка заявок, оценка и участие в тендерах
      на спортивные и событийные права.
  BC-3720.40.20:
    name: Отслеживание прав по расписанию событий
    description: |
      Отслеживание прав на уровне матча против удерживаемых
      прав на соревнования и турниры.
  BC-3720.40.30:
    name: Управление правами на хайлайты и клипы
    description: |
      Управление производными правами на хайлайты, клипы
      и короткий контент для социального и цифрового использования.
  BC-3720.50:
    name: Управление музыкальными и исполнительскими правами
    description: |
      Лицензирование и отчётность по музыкальным и исполнительским
      правам, включая синхронизацию, механические и публичное исполнение.
  BC-3720.50.10:
    name: Механическое и синхронизационное лицензирование
    description: |
      Клиринг и лицензирование механических и синхронизационных прав
      на музыку, используемую в производстве и на платформах.
  BC-3720.50.20:
    name: Отчётность по правам исполнения
    description: |
      Отчётность о публичном исполнении и вещательном использовании
      в организации коллективного управления.
  BC-3720.50.30:
    name: Управление музыкальными кью-листами
    description: |
      Создание и распространение музыкальных кью-листов
      в общества и правообладателям.
  BC-3720.60:
    name: Управление входящими роялти
    description: |
      Получение, сверка и последующее распределение дохода от роялти,
      причитающегося предприятию как правообладателю.
  BC-3720.60.10:
    name: Сверка отчётов о роялти
    description: |
      Сверка входящих отчётов о роялти от лицензиатов
      и обществ с удерживаемыми правами.
  BC-3720.60.20:
    name: Проводка поступлений роялти
    description: |
      Проводка поступлений роялти в правовой реестр
      и последующее бухгалтерское признание.
  BC-3720.60.30:
    name: Распределение по базовым правообладателям
    description: |
      Распределение полученных роялти по базовым правообладателям
      согласно условиям участия и субиздания.
  BC-3720.70:
    name: Клиринг прав и цепочка правового титула
    description: |
      Верификация и документирование базовых прав и цепочки правового
      титула для использования и покрытия ошибок и упущений.
  BC-3720.70.10:
    name: Верификация базовых прав
    description: |
      Верификация базовых литературных, музыкальных и изобразительных
      прав, включённых в произведение.
  BC-3720.70.20:
    name: Отслеживание статуса клиринга
    description: |
      Отслеживание статуса клиринга по элементу
      с управлением незакрытыми действиями.
  BC-3720.70.30:
    name: Документация цепочки правового титула
    description: |
      Ведение записей цепочки правового титула, достаточных
      для покрытия E&O и должной осмотрительности лицензиата.

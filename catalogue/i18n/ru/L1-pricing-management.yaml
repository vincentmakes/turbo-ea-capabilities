entries:
  BC-440:
    name: Управление ценообразованием
    description: |
      Установка цен, структура цен, скидки, акции.
  BC-440.10:
    name: Управление стратегией ценообразования
    description: |
      Модели ценообразования, ценностное ценообразование, сегментное ценообразование.
  BC-440.10.10:
    name: Определение модели ценообразования
    description: |
      Определение моделей ценообразования (затраты плюс, ценностное, подписочное).
  BC-440.10.20:
    name: Ценностное ценообразование
    description: |
      Анализ потребительской ценности и готовности платить для обоснования цены.
  BC-440.10.30:
    name: Конкурентный бенчмаркинг цен
    description: |
      Бенчмаркинг цен конкурентов и ценовое позиционирование.
  BC-440.10.40:
    name: Сегментное и географическое ценообразование
    description: |
      Дифференциация цен по сегментам, каналам и географии.
  BC-440.20:
    name: Управление прайс-листами
    description: |
      Прейскурантные цены, региональные цены, ведение прайс-листов.
  BC-440.20.10:
    name: Ведение прайс-листов
    description: |
      Ведение прайс-листов, прейскурантных цен и валютных вариантов.
  BC-440.20.20:
    name: Управление изменениями цен
    description: |
      Согласование, уведомление и внедрение изменений цен.
  BC-440.20.30:
    name: Управление мастер-данными цен
    description: |
      Управление качеством и прослеживаемостью мастер-данных цен.
  BC-440.30:
    name: Управление скидками и акциями
    description: |
      Политики скидок, промоакции, ретробонусы.
  BC-440.30.10:
    name: Управление политикой скидок
    description: |
      Определение уровней скидок, правил и порогов согласования.
  BC-440.30.20:
    name: Планирование и проведение акций
    description: |
      Акционный календарь, настройка предложений и проведение акций.
  BC-440.30.30:
    name: Управление ретробонусами и торговыми надбавками
    description: |
      Начисление, претензии и расчёт ретробонусов с клиентами и каналами.
  BC-440.30.40:
    name: Анализ эффективности акций
    description: |
      Измерение ROI акций, прироста продаж и каннибализации.
  BC-440.40:
    name: Управление реализацией цен и соответствием
    description: |
      Управление исключениями по ценам, анализ утечки.
  BC-440.40.10:
    name: Согласование исключений по ценам
    description: |
      Процедуры и согласование исключений из ценовой политики.
  BC-440.40.20:
    name: Анализ чистой цены и маржи
    description: |
      Анализ чистой реализованной цены и маржи по транзакциям.
  BC-440.40.30:
    name: Расследование утечки цен
    description: |
      Выявление и устранение утечки по ценам и скидкам.
  BC-440.40.40:
    name: Мониторинг соответствия ценовой политике
    description: |
      Соответствие ценовой политике, антимонопольному законодательству и правилам честной торговли.

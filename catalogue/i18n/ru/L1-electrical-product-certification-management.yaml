# Управление сертификацией электротехнической продукции (ru) — translations for L1-electrical-product-certification-management.yaml
locale: ru
source: L1-electrical-product-certification-management.yaml
entries:
  BC-1910:
    name: Управление сертификацией электротехнической продукции
    description: |
      Многоюрисдикционная сертификация безопасности, EMC и энергоэффективности: стратегия, технические досье, взаимодействие с органами сертификации, лицензирование знаков, надзор и устранение несоответствий в полевых условиях.
  BC-1910.10:
    name: Стратегия и план сертификации
    description: |
      Определение необходимых знаков и разрешений, а также последовательности их получения.
  BC-1910.10.10:
    name: Анализ требований для доступа на рынок
    description: |
      Определение требований к сертификации для целевых рынков.
  BC-1910.10.20:
    name: Выбор схемы сертификации
    description: |
      Выбор схем сертификации и маршрутов взаимного признания.
  BC-1910.10.30:
    name: Планирование дорожной карты сертификации
    description: |
      Последовательное планирование получения разрешений в привязке к вехам запуска продукта.
  BC-1910.20:
    name: Управление техническими досье и доказательствами
    description: |
      Подготовка и сопровождение технических конструктивных досье и подтверждающих доказательств.
  BC-1910.20.10:
    name: Составление технического конструктивного досье
    description: |
      Составление технических конструктивных досье для типового утверждения.
  BC-1910.20.20:
    name: Сводка испытательных протоколов
    description: |
      Сводка и индексация аккредитованных протоколов испытаний.
  BC-1910.20.30:
    name: Составление декларации о соответствии
    description: |
      Составление и подписание деклараций о соответствии.
  BC-1910.20.40:
    name: Архив доказательств соответствия
    description: |
      Долгосрочное архивирование доказательств соответствия согласно нормативным срокам хранения.
  BC-1910.30:
    name: Управление органами сертификации и разрешениями
    description: |
      Взаимодействие с нотифицированными органами и национальными органами сертификации вплоть до выдачи типового разрешения.
  BC-1910.30.10:
    name: Выбор нотифицированного органа
    description: |
      Выбор нотифицированных и национальных органов сертификации.
  BC-1910.30.20:
    name: Управление подачей документов на сертификацию
    description: |
      Подача сертификационных досье и координация последующих действий.
  BC-1910.30.30:
    name: Координация испытаний в присутствии аудитора
    description: |
      Координация испытаний в присутствии аудитора в лабораториях поставщика или собственных лабораториях.
  BC-1910.30.40:
    name: Отслеживание выдачи типовых разрешений
    description: |
      Отслеживание выданных типовых разрешений и сроков действия сертификатов.
  BC-1910.40:
    name: Лицензирование знаков и соответствие маркировки
    description: |
      Лицензирование сертификационных знаков и контроль маркировки продукции.
  BC-1910.40.10:
    name: Авторизация использования знаков
    description: |
      Авторизация использования знаков на сертифицированных продуктах.
  BC-1910.40.20:
    name: Контроль оформления этикетки продукции
    description: |
      Контроль содержания этикетки, маркировки и оформления информационной таблички.
  BC-1910.40.30:
    name: Отчётность о роялти за использование знаков
    description: |
      Отчётность об объёме выпуска для расчёта обязательств по роялти за знаки.
  BC-1910.50:
    name: Надзор за разрешениями и их обновление
    description: |
      Поддержание разрешений путём надзорных аудитов, внесения изменений и обновлений.
  BC-1910.50.10:
    name: Координация заводских инспекций
    description: |
      Координация заводских инспекций органа по сертификации и последующих действий.
  BC-1910.50.20:
    name: Периодические надзорные испытания
    description: |
      Надзорные повторные испытания сертифицированных продуктов по первоначальной базовой версии.
  BC-1910.50.30:
    name: Подача документов об изменениях в разрешениях
    description: |
      Подача документов об изменениях и технических изменениях к выданным разрешениям.
  BC-1910.50.40:
    name: Управление обновлением разрешений
    description: |
      Обновление разрешений и сертификатов с истекающим сроком действия.
  BC-1910.60:
    name: Управление инцидентами несоответствия в полевых условиях
    description: |
      Обработка несоответствий продукции, выявленных после выхода на рынок.
  BC-1910.60.10:
    name: Сортировка инцидентов несоответствия
    description: |
      Сортировка предполагаемых несоответствий продукции, поступивших из полевых условий.
  BC-1910.60.20:
    name: Уведомление регуляторного органа
    description: |
      Обязательное уведомление органов власти и органов сертификации о подтверждённых несоответствиях.
  BC-1910.60.30:
    name: Координация отзыва и запрета отгрузки
    description: |
      Координация отзывов, запретов на отгрузку и кампаний по корректирующим действиям.

# Управление составом веществ и цикличностью продуктов (ru) — translations for L1-product-substance-circularity-management.yaml
locale: ru
source: L1-product-substance-circularity-management.yaml
entries:
  BC-1980:
    name: Управление составом веществ и цикличностью продуктов
    description: |
      Ограничения по веществам, приём продуктов в конце срока службы, ремонт, восстановление, реманифактура и раскрытие экологического следа для электротехнической продукции.
  BC-1980.10:
    name: Управление соответствием по ограниченным веществам
    description: |
      Соответствие требованиям ограничения веществ RoHS, REACH SVHC и Предложения 65.
  BC-1980.10.10:
    name: Верификация соответствия RoHS
    description: |
      Верификация соответствия продуктов лимитам веществ RoHS.
  BC-1980.10.20:
    name: Соответствие REACH SVHC
    description: |
      Соответствие обязательствам REACH в отношении веществ, вызывающих очень высокую озабоченность.
  BC-1980.10.30:
    name: Соответствие требованиям бесхлорности
    description: |
      Верификация заявлений о продуктах без галогенов.
  BC-1980.10.40:
    name: Соответствие Предложению 65 Калифорнии
    description: |
      Соответствие обязательствам по предупредительной маркировке согласно Предложению 65 штата Калифорния.
  BC-1980.20:
    name: Управление данными о декларировании веществ
    description: |
      Сбор и сопровождение данных о декларировании веществ по всей ведомости материалов.
  BC-1980.20.10:
    name: Сбор деклараций о составе материалов
    description: |
      Сбор полных деклараций о составе материалов от поставщиков.
  BC-1980.20.20:
    name: Ведение базы данных соответствия веществ
    description: |
      Ведение основной базы данных соответствия веществ.
  BC-1980.20.30:
    name: Раскрытие информации о составе веществ заказчикам
    description: |
      Предоставление информации о составе веществ заказчикам и органам власти.
  BC-1980.30:
    name: Надлежащая проверка конфликтных минералов
    description: |
      Надлежащая проверка источников олова, вольфрама, тантала и золота по режимам ОЭСР.
  BC-1980.30.10:
    name: Картирование плавильщиков и аффинажных заводов
    description: |
      Картирование плавильщиков и аффинажных заводов в цепочке поставок.
  BC-1980.30.20:
    name: Запрос информации о стране происхождения
    description: |
      Разумный запрос информации о стране происхождения в отношении охватываемых минералов.
  BC-1980.30.30:
    name: Отчётность по конфликтным минералам
    description: |
      Законодательная и клиентская отчётность по конфликтным минералам.
  BC-1980.40:
    name: Управление соответствием по батареям и упаковке
    description: |
      Соответствие регуляторным требованиям по батареям и упаковке, включая Регламент ЕС о батареях.
  BC-1980.40.10:
    name: Соответствие регуляторным требованиям по батареям
    description: |
      Соответствие Регламенту ЕС о батареях и аналогичным требованиям.
  BC-1980.40.20:
    name: Управление данными паспорта батареи
    description: |
      Подготовка и ведение данных паспорта батареи.
  BC-1980.40.30:
    name: Соответствие требованиям по упаковочным отходам
    description: |
      Соответствие обязательствам по упаковке и упаковочным отходам.
  BC-1980.50:
    name: Операции приёма продуктов в конце срока службы
    description: |
      Приём, обратная логистика и отчётность производителя об ответственности за электротехнические продукты.
  BC-1980.50.10:
    name: Операции схем приёма WEEE
    description: |
      Функционирование схем соответствия производителей по WEEE.
  BC-1980.50.20:
    name: Отчётность об ответственности производителя
    description: |
      Отчётность о введённых в оборот и собранных тоннажах.
  BC-1980.50.30:
    name: Операции обратной логистики
    description: |
      Обратная логистика для продуктов и компонентов, достигших конца срока службы.
  BC-1980.60:
    name: Операции ремонта и восстановления
    description: |
      Сервисная сеть ремонта и операции с документацией о праве на ремонт.
  BC-1980.60.10:
    name: Операции сети ремонтных сервисов
    description: |
      Функционирование авторизованных сетей ремонтных сервисов.
  BC-1980.60.20:
    name: Документация о праве на ремонт
    description: |
      Предоставление ремонтной документации в соответствии с режимами права на ремонт.
  BC-1980.60.30:
    name: Операции процесса восстановления
    description: |
      Восстановление возвращённых продуктов до товарного состояния.
  BC-1980.70:
    name: Операции реманифактуры и повторного использования
    description: |
      Реманифактура и повторное использование компонентов при создании новой продукции.
  BC-1980.70.10:
    name: Восстановление и разборка основ
    description: |
      Восстановление и разборка возвращённых основ.
  BC-1980.70.20:
    name: Выполнение процессов реманифактуры
    description: |
      Выполнение процессов реманифактуры на восстановленных основах.
  BC-1980.70.30:
    name: Прослеживаемость повторно используемых компонентов
    description: |
      Прослеживаемость повторно используемых компонентов в новые продукты.
  BC-1980.80:
    name: Отчётность об экологическом следе продуктов
    description: |
      Подготовка и раскрытие данных об экологическом следе на уровне продукта.
  BC-1980.80.10:
    name: Расчёт углеродного следа продукта
    description: |
      Расчёт углеродного следа на уровне продукта.
  BC-1980.80.20:
    name: Экологическая декларация продукта
    description: |
      Подготовка экологических деклараций продуктов.
  BC-1980.80.30:
    name: Операции цифрового паспорта продукта
    description: |
      Функционирование цифровых паспортов продуктов в соответствии с формирующимися требованиями.

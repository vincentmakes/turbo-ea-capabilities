# Аптека / лекарственные препараты (ru) — translations for L1-pharmacy-medication-management.yaml
locale: ru
source: L1-pharmacy-medication-management.yaml
entries:
  BC-2850:
    name: Аптека / лекарственные препараты
    description: |
      Аптечные операции на стороне провайдера: формуляр, стационарное и амбулаторное отпускание препаратов, введение и сверка лекарственных средств, контроль оборота наркотиков и клинические фармацевтические услуги.
  BC-2850.10:
    name: Управление формуляром
    description: |
      Управление формуляром лекарственных препаратов, терапевтической заменой и реагированием на дефектуру.
  BC-2850.10.10:
    name: Принятие решений по формуляру
    description: |
      Доказательные решения о включении, исключении и уровне лекарственных препаратов в формуляре.
  BC-2850.10.20:
    name: Терапевтическая замена
    description: |
      Управление и реализация протоколов терапевтической замены.
  BC-2850.10.30:
    name: Поддержка фармакологического и терапевтического комитета
    description: |
      Операционное обеспечение работы фармакологического и терапевтического комитета.
  BC-2850.10.40:
    name: Управление дефектурой препаратов
    description: |
      Выявление, снижение последствий и планирование замены при дефектуре препаратов.
  BC-2850.20:
    name: Стационарные аптечные операции
    description: |
      Проверка назначений, стерильное и нестерильное изготовление, отпуск и приготовление внутривенных смесей для стационара.
  BC-2850.20.10:
    name: Проверка назначений
    description: |
      Фармацевтическая проверка назначений на безопасность и обоснованность.
  BC-2850.20.20:
    name: Стерильное изготовление
    description: |
      Стерильное изготовление, включая работу с цитотоксическими препаратами.
  BC-2850.20.30:
    name: Поштучный отпуск препаратов
    description: |
      Поштучная подготовка и отпуск для стационарного введения.
  BC-2850.20.40:
    name: Приготовление внутривенных смесей
    description: |
      Приготовление внутривенных инфузий и растворов для парентерального питания.
  BC-2850.30:
    name: Амбулаторные и специализированные аптечные операции
    description: |
      Розничные, специализированные и почтово-отпускные аптечные операции, включая программы льготного лекарственного обеспечения.
  BC-2850.30.10:
    name: Розничный отпуск препаратов
    description: |
      Розничный отпуск рецептурных препаратов в амбулаторных аптеках.
  BC-2850.30.20:
    name: Управление специализированными препаратами
    description: |
      Операции специализированной аптеки для дорогостоящих и ограниченно распределяемых препаратов.
  BC-2850.30.30:
    name: Выполнение почтовых заказов
    description: |
      Выполнение рецептурных заказов и доставка по почте.
  BC-2850.30.40:
    name: Операции программ льготного лекарственного обеспечения
    description: |
      Операции по законодательным программам льготного лекарственного обеспечения и соответствие требованиям.
  BC-2850.40:
    name: Введение и сверка лекарственных средств
    description: |
      Прикроватное введение лекарственных средств, сверка при переходах и управление препаратами, принесёнными пациентом.
  BC-2850.40.10:
    name: Прикроватное введение лекарственных средств
    description: |
      Прикроватное введение лекарственных средств с штрихкодовой верификацией медсестрой.
  BC-2850.40.20:
    name: Сверка лекарственных средств
    description: |
      Сверка домашних и назначенных лекарственных средств при поступлении, переводе и выписке.
  BC-2850.40.30:
    name: Операции листа назначений
    description: |
      Эксплуатация электронного листа назначений лекарственных средств.
  BC-2850.40.40:
    name: Работа с препаратами пациента
    description: |
      Идентификация, хранение и санкционированное введение препаратов, принесённых пациентом.
  BC-2850.50:
    name: Контроль оборота наркотических средств
    description: |
      Соответствие требованиям, мониторинг диверсии, инвентаризация и уничтожение наркотических средств.
  BC-2850.50.10:
    name: Соответствие требованиям по наркотическим средствам
    description: |
      Соответствие нормативным требованиям по наркотическим средствам, включая регистрацию и учёт.
  BC-2850.50.20:
    name: Мониторинг диверсии
    description: |
      Надзор и расследование предполагаемой диверсии наркотических средств.
  BC-2850.50.30:
    name: Инвентаризация наркотических средств
    description: |
      Непрерывная инвентаризация и сверка запасов наркотических средств.
  BC-2850.50.40:
    name: Уничтожение наркотических средств
    description: |
      Уничтожение с присутствием свидетелей и возврат наркотических средств.
  BC-2850.60:
    name: Клинические фармацевтические услуги
    description: |
      Клинические фармацевтические услуги: антикоагулянтная терапия, антимикробный стюардшип, управление лекарственной терапией и терапевтический лекарственный мониторинг.
  BC-2850.60.10:
    name: Управление антикоагулянтной терапией
    description: |
      Фармацевтический контроль дозирования и мониторинга антикоагулянтной терапии.
  BC-2850.60.20:
    name: Антимикробный стюардшип в аптеке
    description: |
      Вклад аптеки в программы антимикробного стюардшипа.
  BC-2850.60.30:
    name: Управление лекарственной терапией
    description: |
      Консультации по управлению лекарственной терапией, проводимые фармацевтом.
  BC-2850.60.40:
    name: Терапевтический лекарственный мониторинг
    description: |
      Терапевтический лекарственный мониторинг и индивидуализация дозирования.

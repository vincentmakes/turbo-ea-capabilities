# Управление страховыми клиентами (ru) — translations for L1-insurance-customer-management.yaml
locale: ru
source: L1-insurance-customer-management.yaml
entries:
  BC-2120:
    name: Управление страховыми клиентами
    description: |
      Идентификация страхователей, агрегация домохозяйств и групп, KYC, согласия и жизненный цикл обслуживания страховых клиентов по всем каналам.
  BC-2120.10:
    name: Управление подключением страхователей
    description: |
      Сбор заявлений, верификация личности, активация и коммуникации при подключении.
  BC-2120.10.10:
    name: Сбор заявлений
    description: |
      Сбор новых заявлений страхователей по каналам.
  BC-2120.10.20:
    name: Верификация личности и бенефициарного владения
    description: |
      Верификация личности и идентификация бенефициарных владельцев для физических и юридических страхователей.
  BC-2120.10.30:
    name: Активация страхователя
    description: |
      Активация учётных записей страхователей, аккаунтов и доступа к каналам.
  BC-2120.10.40:
    name: Коммуникация при подключении
    description: |
      Информирование о статусе подключения, рассылка приветственных материалов и следующих шагах.
  BC-2120.20:
    name: Управление KYC и санкциями в страховании
    description: |
      Оценка риска клиента, документация KYC, проверка по санкциям и PEP, периодическое обновление.
  BC-2120.20.10:
    name: Оценка риска клиента
    description: |
      Оценка риска страховых клиентов на основе факторов AML и поведенческого риска.
  BC-2120.20.20:
    name: Сбор документов KYC
    description: |
      Сбор и верификация документов KYC для страховых клиентов.
  BC-2120.20.30:
    name: Проверка по санкциям и PEP
    description: |
      Проверка страхователей и выгодоприобретателей по санкционным спискам, PEP и негативным СМИ.
  BC-2120.20.40:
    name: Периодическое обновление KYC
    description: |
      Периодическое обновление информации KYC и переоценка риска.
  BC-2120.30:
    name: Управление обслуживанием страхователей
    description: |
      Самообслуживание, обработка входящих запросов, предоставление документов и ведение данных выгодоприобретателей.
  BC-2120.30.10:
    name: Самостоятельное обслуживание аккаунта
    description: |
      Самостоятельное обновление адреса, контактных данных и предпочтений.
  BC-2120.30.20:
    name: Обработка входящих сервисных запросов
    description: |
      Обработка входящих сервисных запросов страхователей по каналам.
  BC-2120.30.30:
    name: Предоставление документов и выписок
    description: |
      Предоставление полисных документов, выписок и страховых сертификатов.
  BC-2120.30.40:
    name: Ведение данных выгодоприобретателей и номинантов
    description: |
      Сбор и ведение данных выгодоприобретателей и номинантов по договорам страхования жизни и пенсионным.
  BC-2120.40:
    name: Управление информацией о клиентах и согласиями
    description: |
      Профиль, агрегация домохозяйств и групп, управление согласиями и «золотая запись».
  BC-2120.40.10:
    name: Ведение профиля страхователя
    description: |
      Ведение профиля страхователя и демографических данных.
  BC-2120.40.20:
    name: Агрегация домохозяйств и групп
    description: |
      Агрегация страхователей в домохозяйства, группы и корпоративные структуры.
  BC-2120.40.30:
    name: Согласие на маркетинг и передачу данных
    description: |
      Сбор и применение согласий на маркетинг и передачу данных.
  BC-2120.40.40:
    name: Управление «золотой записью» клиента
    description: |
      Ведение «золотой записи» страхователя во всех системах.
  BC-2120.50:
    name: Управление клиентским опытом и удержанием
    description: |
      Сбор обратной связи, программы лояльности, обработка жалоб и прогнозирование оттока.
  BC-2120.50.10:
    name: Сбор обратной связи клиентов
    description: |
      Сбор обратной связи, NPS и CSAT от клиентов.
  BC-2120.50.20:
    name: Операции программ лояльности и удержания
    description: |
      Операции программ лояльности, удержания и поощрения за стаж.
  BC-2120.50.30:
    name: Обработка жалоб и эскалаций
    description: |
      Обработка жалоб страхователей, эскалаций и дел омбудсмена.
  BC-2120.50.40:
    name: Прогнозирование оттока и расторжения
    description: |
      Прогнозная аналитика риска оттока и расторжения для вмешательства по удержанию.

# Управление инженерией электротехнической продукции (ru) — translations for L1-electrical-product-engineering-management.yaml
locale: ru
source: L1-electrical-product-engineering-management.yaml
entries:
  BC-1900:
    name: Управление инженерией электротехнической продукции
    description: |
      Многодисциплинарное проектирование электрических и электронных продуктов: схемотехника, силовая электроника, встроенные системы, EMC, тепловая и механическая инженерия — вплоть до верификации конструкции.
  BC-1900.10:
    name: Проектирование электрических схем
    description: |
      Схемотехническое проектирование аналоговых, цифровых, смешанных и радиочастотных схем.
  BC-1900.10.10:
    name: Проектирование аналоговых схем
    description: |
      Проектирование аналоговых схем обработки сигналов и преобразования мощности.
  BC-1900.10.20:
    name: Проектирование цифровых схем
    description: |
      Проектирование цифровой логики и тактовых схем.
  BC-1900.10.30:
    name: Проектирование смешанных схем
    description: |
      Проектирование смешанных интерфейсов, подсистем АЦП/ЦАП и каскадов преобразования.
  BC-1900.10.40:
    name: Проектирование радиочастотных схем
    description: |
      Проектирование радиочастотных входных каскадов, согласующих цепей и антенн.
  BC-1900.20:
    name: Проектирование силовой электроники
    description: |
      Проектирование преобразователей мощности, приводов электродвигателей и ключевых топологий.
  BC-1900.20.10:
    name: Проектирование преобразователей мощности
    description: |
      Проектирование преобразователей AC/DC, DC/DC и DC/AC.
  BC-1900.20.20:
    name: Проектирование топологий приводов электродвигателей
    description: |
      Выбор топологий и проектирование регулируемых приводов электродвигателей.
  BC-1900.20.30:
    name: Проектирование магнитных элементов и фильтров
    description: |
      Проектирование дросселей, трансформаторов и EMI-фильтров.
  BC-1900.20.40:
    name: Проектирование контуров управления ключевыми схемами
    description: |
      Проектирование замкнутых контуров управления для ключевых силовых каскадов.
  BC-1900.30:
    name: Проектирование печатных плат и электронной упаковки
    description: |
      Разводка печатных плат, электронная упаковка и инженерия межсоединений.
  BC-1900.30.10:
    name: Разводка печатных плат
    description: |
      Стековая структура и физическая разводка многослойных печатных плат.
  BC-1900.30.20:
    name: Проектирование электронной упаковки
    description: |
      Проектирование модульной, корпусной и BGA-упаковки.
  BC-1900.30.30:
    name: Проектирование жгутов проводов и межблочных соединений
    description: |
      Проектирование жгутов проводов, токопроводящих шин и межплатных соединений.
  BC-1900.30.40:
    name: Управление библиотекой посадочных мест компонентов
    description: |
      Ведение библиотек посадочных мест и символов САПР.
  BC-1900.40:
    name: Проектирование встроенного аппаратного обеспечения
    description: |
      Проектирование аппаратного обеспечения на основе микроконтроллеров, FPGA, интерфейсов датчиков и цепей управления питанием.
  BC-1900.40.10:
    name: Проектирование платформы микроконтроллера
    description: |
      Выбор и интеграция платформ микроконтроллеров.
  BC-1900.40.20:
    name: Интеграция FPGA и SoC
    description: |
      Интеграция устройств FPGA и SoC в аппаратное обеспечение продукта.
  BC-1900.40.30:
    name: Проектирование интерфейсов датчиков и исполнительных устройств
    description: |
      Аналоговые и цифровые интерфейсы к датчикам и исполнительным устройствам.
  BC-1900.40.40:
    name: Проектирование схем управления питанием
    description: |
      Схемы управления питанием и стабилизации на плате.
  BC-1900.50:
    name: Инженерия встроенного программного обеспечения (прошивки)
    description: |
      Разработка встроенного программного обеспечения (прошивки): ОСРВ, драйверы, логика приложений и верификация.
  BC-1900.50.10:
    name: Архитектура программного обеспечения реального времени
    description: |
      Операционная система реального времени и архитектура задач.
  BC-1900.50.20:
    name: Разработка драйверов устройств
    description: |
      Разработка низкоуровневых драйверов и пакетов поддержки плат.
  BC-1900.50.30:
    name: Разработка встроенных приложений
    description: |
      Разработка логики и функций встроенных приложений.
  BC-1900.50.40:
    name: Верификация и тестирование встроенного ПО
    description: |
      Модульное, интеграционное и аппаратное тестирование встроенного ПО.
  BC-1900.60:
    name: Инженерия EMC и целостности сигналов
    description: |
      Управление электромагнитной совместимостью и целостностью сигналов на этапе проектирования.
  BC-1900.60.10:
    name: Анализ конструкции на EMC
    description: |
      Анализ излучений и помехоустойчивости на этапе проектирования.
  BC-1900.60.20:
    name: Анализ целостности сигналов
    description: |
      Анализ целостности высокочастотных сигналов и перекрёстных помех.
  BC-1900.60.30:
    name: Проектирование экранирования и заземления
    description: |
      Стратегии экранирования, соединения и заземления.
  BC-1900.60.40:
    name: Предварительная оценка соответствия EMC
    description: |
      Предварительные измерения и оценка EMC на этапе проектирования.
  BC-1900.70:
    name: Тепловая и механическая инженерия
    description: |
      Тепловая, корпусная и механическая инженерия электротехнических продуктов.
  BC-1900.70.10:
    name: Тепловой анализ и проектирование системы охлаждения
    description: |
      Тепловое моделирование и проектирование системы охлаждения.
  BC-1900.70.20:
    name: Проектирование корпуса и степени защиты IP
    description: |
      Механическое проектирование корпуса и обеспечение степени защиты IP.
  BC-1900.70.30:
    name: Инженерия вибрации и ударных нагрузок
    description: |
      Механическая прочность к вибрации и ударным нагрузкам.
  BC-1900.70.40:
    name: Проектирование разъёмов и механических интерфейсов
    description: |
      Выбор разъёмов и проектирование механических интерфейсов.
  BC-1900.80:
    name: Верификация электрической конструкции
    description: |
      Верификация конструкции путём моделирования, изготовления прототипов и испытаний.
  BC-1900.80.10:
    name: Моделирование конструкции
    description: |
      Схемотехническое, электромагнитное и тепловое моделирование.
  BC-1900.80.20:
    name: Изготовление прототипа и начало испытаний
    description: |
      Сборка прототипа и первоначальное функциональное испытание.
  BC-1900.80.30:
    name: Испытания верификации конструкции
    description: |
      Верификационные испытания по конструкторским спецификациям.
  BC-1900.80.40:
    name: Управление проверкой конструкции
    description: |
      Контрольные проверки конструкции по этапам и обеспечение качества конструкции.

# Средства производства в сельском хозяйстве (ru) — translations for L1-agricultural-inputs-management.yaml
locale: ru
source: L1-agricultural-inputs-management.yaml
entries:
  BC-3550:
    name: Средства производства в сельском хозяйстве
    description: |
      Управление жизненным циклом сельскохозяйственных ресурсов — семян и
      генетического материала, удобрений, средств защиты растений, кормов,
      ветеринарных препаратов и биологических препаратов — включая специфическую
      для отрасли прослеживаемость, ответственное применение и требования к хранению.
  BC-3550.10:
    name: Управление семенами и генетическим материалом
    description: |
      Закупка сертифицированных семян, протравливание, отслеживание родословной
      и признаков, а также запасы семян в посевном цикле.
    in_scope:
      - Закупка сертифицированных семян
      - Нанесение протравителей
      - Отслеживание родословной и признаков
      - Запасы семян на ферме и на складах
    out_of_scope:
      - НИОКР в области селекции растений (BC-810)
      - Сортовые рекомендации (BC-3530.40)
  BC-3550.10.10:
    name: Закупка и сертификация семян
    description: |
      Закупка сертифицированных семян по схемам ОЭСР
      и испытаниям ISTA.
  BC-3550.10.20:
    name: Нанесение протравителей
    description: |
      Нанесение протравителей и покрытий на семена
      перед посевом.
  BC-3550.10.30:
    name: Отслеживание родословной и признаков семян
    description: |
      Отслеживание родословной семян, стека признаков
      и обязательств по ответственному применению.
  BC-3550.10.40:
    name: Управление запасами семян
    description: |
      Управление запасами семян на складах
      и в хранилищах хозяйств.
  BC-3550.20:
    name: Управление минеральными удобрениями
    description: |
      Закупка, хранение, обращение и записи о применении
      твёрдых и жидких удобрений.
  BC-3550.20.10:
    name: Закупка удобрений
    description: |
      Закупка простых и смешанных удобрений
      у поставщиков и импортёров.
  BC-3550.20.20:
    name: Хранение и обращение с удобрениями
    description: |
      Хранение и обращение с удобрениями на ферме и складах,
      включая обваловку.
  BC-3550.20.30:
    name: Записи о внесении удобрений
    description: |
      Записи о внесении удобрений по полю, препарату и норме.
  BC-3550.30:
    name: Управление средствами защиты растений
    description: |
      Закупка, хранение, записи о применении и ответственное
      обращение с тарой для препаратов защиты растений.
  BC-3550.30.10:
    name: Закупка препаратов защиты растений
    description: |
      Закупка авторизованных препаратов защиты растений
      по лицензионным каналам.
  BC-3550.30.20:
    name: Хранение и обращение с пестицидами
    description: |
      Хранение пестицидов, их разделение и контроль
      обращения оператора.
  BC-3550.30.30:
    name: Записи о применении пестицидов
    description: |
      Записи о применении пестицидов, соответствующие требованиям
      регуляторов и схем сертификации.
  BC-3550.30.40:
    name: Ответственное обращение с тарой
    description: |
      Тройная промывка, возврат и рециклинг пустой
      тары из-под пестицидов.
  BC-3550.40:
    name: Управление кормовыми ресурсами
    description: |
      Закупка, хранение и учёт использования кормовых ингредиентов,
      премиксов и кормовых добавок для животноводства.
  BC-3550.40.10:
    name: Закупка кормовых ингредиентов
    description: |
      Закупка зерна, белковых шротов и объёмистых
      кормовых ингредиентов.
  BC-3550.40.20:
    name: Управление премиксами и добавками
    description: |
      Закупка и инвентаризация премиксов, минералов
      и кормовых добавок.
  BC-3550.40.30:
    name: Учёт запасов корма и рациона
    description: |
      Учёт запасов корма и расхода рациона в хозяйстве.
  BC-3550.50:
    name: Управление ветеринарными препаратами
    description: |
      Закупка, хранение в холодовой цепи и запись использования
      ветеринарных препаратов и биологических препаратов на ферме.
  BC-3550.50.10:
    name: Закупка ветеринарных препаратов
    description: |
      Закупка ветеринарных препаратов и биологических
      препаратов по рецепту.
  BC-3550.50.20:
    name: Хранение ветеринарных препаратов в холодовой цепи
    description: |
      Хранение ветеринарных препаратов в холодовой цепи
      на ферме и управление отклонениями.
  BC-3550.50.30:
    name: Запись использования ветеринарных препаратов
    description: |
      Запись использования с указанием серии, дозы,
      животного и оператора.
  BC-3550.60:
    name: Биологические и почвенные поправки
    description: |
      Закупка биологических ресурсов, обращение с навозом
      и компостом, а также снабжение известью и почвенными поправками.
  BC-3550.60.10:
    name: Закупка биологических ресурсов
    description: |
      Закупка биостимуляторов, биоудобрений
      и микробных инокулянтов.
  BC-3550.60.20:
    name: Управление навозом и компостом
    description: |
      Хранение навоза, компостирование и
      рекуперация питательных веществ в хозяйстве.
  BC-3550.60.30:
    name: Закупка извести и почвенных поправок
    description: |
      Закупка извести, гипса и других почвенных поправок.

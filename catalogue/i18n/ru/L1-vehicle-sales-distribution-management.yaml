# Продажи и дистрибуция транспортных средств (ru) — translations for L1-vehicle-sales-distribution-management.yaml
locale: ru
source: L1-vehicle-sales-distribution-management.yaml
entries:
  BC-3440:
    name: Продажи и дистрибуция транспортных средств
    description: |
      Оперативные продажи и дистрибуция новых транспортных средств — оптовое
      планирование, распределение заводских слотов, банки заказов, демонстрационный
      и сертифицированный подержанный инвентарь, корпоративные продажи и B2B, а
      также интерфейс передачи и регистрации для розничных покупателей.
  BC-3440.10:
    name: Планирование и распределение продаж транспортных средств
    description: |
      Планирование оптовых объёмов по рынкам и дилерам
      и распределение заводских слотов сборки.
  BC-3440.10.10:
    name: Оптовое планирование объёмов
    description: |
      Периодическое планирование оптовых объёмов транспортных средств
      по рынкам, моделям и сегментам.
  BC-3440.10.20:
    name: Распределение производства по рынкам
    description: |
      Распределение ограниченных производственных мощностей завода по
      рынкам и каналам с учётом спроса и стратегических приоритетов.
  BC-3440.10.30:
    name: Управление слотами сборки
    description: |
      Распределение, замена и высвобождение заводских слотов сборки
      для дилеров и корпоративных покупателей.
  BC-3440.20:
    name: Управление банком заказов
    description: |
      Приём, валидация конфигурации и управление жизненным циклом
      складских и клиентских заказов на транспортные средства.
  BC-3440.20.10:
    name: Управление складскими заказами
    description: |
      Управление складскими заказами дилеров в рамках выделенных
      лимитов и целевых показателей запасов.
  BC-3440.20.20:
    name: Приём клиентских заказов
    description: |
      Приём заказов розничных и корпоративных покупателей,
      включая конфигурацию и ценообразование.
  BC-3440.20.30:
    name: Валидация конфигурации заказа
    description: |
      Валидация конфигурации заказа на осуществимость, соответствие
      нормативным требованиям и правилам ценообразования.
  BC-3440.20.40:
    name: Отслеживание статуса заказа
    description: |
      Сквозное отслеживание статуса заказа от получения через
      сборку, отгрузку и прибытие к дилеру.
  BC-3440.30:
    name: Операции по сборке и дистрибуции
    description: |
      Координация исполнения заказов на сборку и исходящей
      логистики транспортных средств от завода до дилера.
  BC-3440.30.10:
    name: Координация сборки под заказ
    description: |
      Координация исполнения заказов на сборку с производственными
      операциями и звонками поставщикам.
  BC-3440.30.20:
    name: Координация логистики транспортных средств
    description: |
      Координация исходящей логистики транспортных средств
      автомобильным, железнодорожным, морским транспортом и перемещениями на площадках.
  BC-3440.30.30:
    name: Координация операций порта назначения и площадки
    description: |
      Координация операций порта назначения, центров обработки
      и площадок, включая предпродажный аксессуаризм.
  BC-3440.40:
    name: Управление запасом и демонстрационными транспортными средствами
    description: |
      Управление запасами транспортных средств дилеров, демонстрационных,
      пресс- и кредитных автомобилей.
  BC-3440.40.10:
    name: Управление складским запасом дилера
    description: |
      Видимость и управление запасом транспортных средств у
      дилеров и в пути.
  BC-3440.40.20:
    name: Управление демонстрационными транспортными средствами
    description: |
      Управление парком демонстрационных транспортных средств
      для дилеров и полевых продаж OEM.
  BC-3440.40.30:
    name: Управление пресс-флотом и кредитными автомобилями
    description: |
      Управление пресс-, маркетинговым и кредитным парком,
      включая конфигурации и ротацию.
  BC-3440.50:
    name: Управление программой сертифицированных подержанных автомобилей
    description: |
      Управление программами сертифицированных подержанных автомобилей OEM,
      охватывающими осмотр, критерии, брендинг и гарантию.
    in_scope:
      - Осмотр и критерии CPO
      - Запас и ценообразование CPO
      - Специфические гарантийные программы CPO
    out_of_scope:
      - Ремаркетинг подержанных автомобилей вне программы CPO
  BC-3440.50.10:
    name: Осмотр и критерии CPO
    description: |
      Определение и исполнение критериев соответствия CPO
      и стандартов осмотра.
  BC-3440.50.20:
    name: Управление запасом CPO
    description: |
      Управление запасом CPO у дилеров и в центральных пулах.
  BC-3440.50.30:
    name: Гарантия и брендинг CPO
    description: |
      Разработка фирменной гарантийной программы CPO и её продвижение.
  BC-3440.60:
    name: Управление корпоративными и B2B-продажами
    description: |
      Продажи корпоративным, лизинговым, прокатным и другим B2B-покупателям
      транспортных средств, включая обработку тендеров и конкурсных предложений.
  BC-3440.60.10:
    name: Управление корпоративными аккаунтами
    description: |
      Управление крупными корпоративными аккаунтами и отношениями
      с корпоративными клиентами.
  BC-3440.60.20:
    name: Управление тендерами и конкурсными предложениями
    description: |
      Ответы на тендеры, RFP и структурированные конкурсные процессы
      по крупным сделкам с транспортными средствами.
  BC-3440.60.30:
    name: Управление спецификациями корпоративных транспортных средств
    description: |
      Управление специфическими для корпоративного флота спецификациями,
      опциями и переоборудованием.
  BC-3440.60.40:
    name: Управление прокатным и лизинговым каналом
    description: |
      Управление отношениями OEM с прокатными и лизинговыми компаниями,
      включая договорённости об обратном выкупе.
  BC-3440.70:
    name: Поддержка передачи и регистрации транспортного средства
    description: |
      Поддержка дилеров при передаче транспортных средств покупателям,
      регистрации и переходе в фазу клиентского опыта.
  BC-3440.70.10:
    name: Координация предпродажной инспекции
    description: |
      Координация стандартов и подтверждений предпродажной инспекции
      у дилеров и в центрах обработки.
  BC-3440.70.20:
    name: Взаимодействие с органами регистрации
    description: |
      Взаимодействие с органами регистрации транспортных средств
      и предоставление данных первичной регистрации.
  BC-3440.70.30:
    name: Клиентский опыт при передаче транспортного средства
    description: |
      Определение и обеспечение клиентского опыта
      при передаче транспортного средства.

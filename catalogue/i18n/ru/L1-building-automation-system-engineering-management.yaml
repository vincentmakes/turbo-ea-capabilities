# Управление инженерией систем автоматизации зданий (ru) — translations for L1-building-automation-system-engineering-management.yaml
locale: ru
source: L1-building-automation-system-engineering-management.yaml
entries:
  BC-2010:
    name: Управление инженерией систем автоматизации зданий
    description: |
      Инженерия продуктов контроллеров BAS, полевых устройств, программного обеспечения супервизора, библиотек последовательностей управления, стеков протоколов связи, семантических моделей данных и кибербезопасности BAS — на базе ISO 16484 / ASHRAE 135 (BACnet) и ASHRAE Guideline 36.
    in_scope:
      - Инженерия продуктов контроллеров BAS и полевых устройств специального применения
      - Инженерия серверов супервизора, сигнализации и ПО архивирования трендов
      - Библиотеки последовательностей управления для повторного использования (Guideline 36 и расширенное управление)
      - Стеки протоколов BACnet, KNX, LonWorks, Modbus, DALI, OPC UA, MQTT
      - Семантическое моделирование данных по Brick/Haystack
      - Контроллеры BAS и кибербезопасность сети BAS по принципу security-by-design
    out_of_scope:
      - Инженерия общей электронной продукции (BC-1900)
      - Списки точек и настройка последовательностей на уровне проекта (BC-2020)
      - Инженерия механического оборудования ОВКВ (BC-2000)
      - Пусконаладка и сервисные операции на объекте (BC-2050, BC-2060)
  BC-2010.10:
    name: Инженерия продуктов контроллеров BAS
    description: |
      Инженерия продуктов контроллеров зданий специального применения — зональных, для ПВУ, центральных установок, программируемых контроллеров и граничных шлюзов.
  BC-2010.10.10:
    name: Инженерия зональных контроллеров
    description: |
      Инженерия зональных контроллеров для управления VAV, фанкойлами и автономным оборудованием.
  BC-2010.10.20:
    name: Инженерия контроллеров ПВУ
    description: |
      Инженерия контроллеров приточно-вытяжных установок со встроенной поддержкой последовательностей.
  BC-2010.10.30:
    name: Инженерия контроллеров центральных установок
    description: |
      Инженерия контроллеров центральных установок для чиллерных и котельных систем.
  BC-2010.10.40:
    name: Инженерия программируемых контроллеров
    description: |
      Инженерия свободно программируемых контроллеров BAS.
  BC-2010.10.50:
    name: Инженерия граничных шлюзов
    description: |
      Инженерия граничных шлюзов для трансляции между BAS и платформами IoT/облако.
  BC-2010.20:
    name: Инженерия полевых устройств BAS
    description: |
      Инженерия датчиков, клапанов, заслонок и беспроводных полевых устройств, интегрируемых в BAS.
  BC-2010.20.10:
    name: Инженерия продуктов датчиков
    description: |
      Инженерия датчиков температуры, влажности, давления, CO2 и качества воздуха как устройств BAS.
  BC-2010.20.20:
    name: Инженерия клапанов и приводов
    description: |
      Инженерия регулирующих клапанов и клапанных приводов для гидравлических систем.
  BC-2010.20.30:
    name: Инженерия приводов заслонок
    description: |
      Инженерия приводов заслонок для воздушного управления BAS.
  BC-2010.20.40:
    name: Инженерия беспроводных полевых устройств
    description: |
      Инженерия беспроводных датчиков и приводов для ретрофита и применений IoT.
  BC-2010.30:
    name: Инженерия программного обеспечения супервизора BAS
    description: |
      Инженерия серверов супервизора, операторских интерфейсов, механизмов сигнализации и архивов.
  BC-2010.30.10:
    name: Инженерия серверов супервизора
    description: |
      Инженерия головных серверов супервизора, управляющих сетями контроллеров.
  BC-2010.30.20:
    name: Инженерия операторских интерфейсов
    description: |
      Инженерия графических операторских интерфейсов и информационных панелей.
  BC-2010.30.30:
    name: Инженерия механизмов сигнализации и событий
    description: |
      Инженерия механизмов обработки сигнализации, расстановки приоритетов и уведомления.
  BC-2010.30.40:
    name: Инженерия трендов и архивов
    description: |
      Инженерия подсистем журналирования трендов и архивирования временных рядов.
  BC-2010.40:
    name: Инженерия библиотек последовательностей управления
    description: |
      Инженерия повторно используемых, независимых от поставщика библиотек последовательностей управления для подсистем ОВКВ.
  BC-2010.40.10:
    name: Библиотека последовательностей VAV
    description: |
      Повторно используемые последовательности для управления зонами с переменным расходом воздуха.
  BC-2010.40.20:
    name: Библиотека последовательностей ПВУ
    description: |
      Повторно используемые последовательности для управления приточно-вытяжными установками.
  BC-2010.40.30:
    name: Библиотека последовательностей центральных установок
    description: |
      Повторно используемые последовательности для управления чиллерными и котельными системами.
  BC-2010.40.40:
    name: Библиотека последовательностей расширенного управления
    description: |
      Повторно используемые последовательности для управления на основе прогнозных моделей и оптимизации.
  BC-2010.50:
    name: Инженерия протоколов связи BAS
    description: |
      Инженерия стеков протоколов и драйверов связи для автоматизации зданий.
  BC-2010.50.10:
    name: Инженерия стека BACnet
    description: |
      Инженерия стеков протоколов BACnet/IP и BACnet/MSTP.
  BC-2010.50.20:
    name: Инженерия стеков KNX и LonWorks
    description: |
      Инженерия стеков протоколов KNX и LonWorks.
  BC-2010.50.30:
    name: Инженерия драйверов Modbus и DALI
    description: |
      Инженерия драйверов Modbus и DALI для интеграции ОВКВ и освещения.
  BC-2010.50.40:
    name: Инженерия сервера OPC UA
    description: |
      Инженерия серверов OPC UA для промышленной совместимости BAS.
  BC-2010.50.50:
    name: Инженерия обмена сообщениями MQTT и IoT
    description: |
      Инженерия интерфейсов обмена сообщениями MQTT и IoT для подключения к облаку.
  BC-2010.60:
    name: Инженерия семантических моделей данных зданий
    description: |
      Инженерия семантических моделей, онтологий и соглашений об именовании для обеспечения машинной интерпретируемости данных BAS.
  BC-2010.60.10:
    name: Моделирование по схеме Brick
    description: |
      Инженерия моделей Brick Schema, описывающих топологию здания и оборудование.
  BC-2010.60.20:
    name: Инженерия библиотек тегов Haystack
    description: |
      Инженерия библиотек тегов Haystack и соглашений о тегировании.
  BC-2010.60.30:
    name: Библиотека точек и соглашений об именовании
    description: |
      Сопровождение библиотек соглашений об именовании точек и тегов.
  BC-2010.60.40:
    name: Инженерия онтологий активов
    description: |
      Инженерия онтологий активов, связывающих данные BAS с оборудованием и местоположениями.
  BC-2010.70:
    name: Инженерия кибербезопасности BAS
    description: |
      Инженерия продуктов BAS, сетей и средств управления идентификацией по принципу security-by-design.
  BC-2010.70.10:
    name: Защищённая архитектура контроллера
    description: |
      Защищённая загрузка, защищённое обновление и защищённая архитектура контроллера.
  BC-2010.70.20:
    name: Проектирование сегментации сети BAS
    description: |
      Шаблоны сегментации и зонирования сетей BAS.
  BC-2010.70.30:
    name: Инженерия аутентификации и идентификации
    description: |
      Инженерия идентификации устройств, пользователей и сервисов для BAS.
  BC-2010.70.40:
    name: Инженерия управления уязвимостями BAS
    description: |
      Инженерия триажа уязвимостей продуктов, применения исправлений и раскрытия информации для продуктов BAS.
  BC-2010.80:
    name: Верификация и соответствие продуктов BAS
    description: |
      Верификация продуктов BAS на соответствие протоколам, совместимость и готовность к листингу.
  BC-2010.80.10:
    name: Испытания на соответствие протоколам
    description: |
      Испытания продуктов на соответствие наборам тестов BACnet, LonMark, KNX и других протоколов.
  BC-2010.80.20:
    name: Испытания на совместимость в лаборатории
    description: |
      Испытания на многовендорную совместимость в специализированных лабораториях.
  BC-2010.80.30:
    name: Регрессионное тестирование протоколов
    description: |
      Регрессионное тестирование стеков протоколов между версиями встроенного ПО.
  BC-2010.80.40:
    name: Документация соответствия
    description: |
      Подготовка документации PICS, BIBB и аналогичной документации соответствия.

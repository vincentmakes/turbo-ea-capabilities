# Управление операциями электрораспределения (ru) — translations for L1-electricity-distribution-operations-management.yaml
locale: ru
source: L1-electricity-distribution-operations-management.yaml
entries:
  BC-3820:
    name: Управление операциями электрораспределения
    description: |
      Эксплуатация среднего и низкого напряжения распределительных
      сетей — диспетчерская служба, ликвидация аварий и восстановление,
      переключения, операции первичных и вторичных подстанций,
      координация полевых бригад для электроснабжения конечных потребителей.
  BC-3820.10:
    name: Управление диспетчерскими операциями
    description: |
      Круглосуточные операции диспетчерского центра распределительной
      сети с использованием DMS/OMS/ADMS, ситуационной осведомлённости и расчёта нагрузок.
  BC-3820.10.10:
    name: Операции ADMS
    description: |
      Эксплуатация расширенных систем управления распределением
      для мониторинга и управления.
  BC-3820.10.20:
    name: Операции SCADA распределения
    description: |
      Сбор данных SCADA в реальном времени и управление
      фидерами и коммутаторами распределения.
  BC-3820.10.30:
    name: Управление топологией сети
    description: |
      Поддержание оперативной топологии сети
      в системе управления.
  BC-3820.20:
    name: Операции переключений и восстановления
    description: |
      Реконфигурация сети и восстановление электроснабжения
      после плановых и внеплановых отключений, включая самовосстановление FLISR.
  BC-3820.20.10:
    name: Выполнение программ переключений
    description: |
      Авторизованное выполнение программ переключений
      в распределительных сетях.
  BC-3820.20.20:
    name: Определение, локализация аварии и восстановление
    description: |
      Обнаружение, изоляция и восстановление питания
      по повреждённым фидерам на основе FLISR.
  BC-3820.20.30:
    name: Координация резервного питания и острова
    description: |
      Координация резервного питания фидеров и преднамеренного
      островного режима для восстановления.
  BC-3820.30:
    name: Ликвидация аварий
    description: |
      Комплексное реагирование на аварии в распределительной сети
      от обнаружения до полевого ремонта и уведомления потребителей.
    in_scope:
      - Обнаружение аварий и патрулирование
      - Назначение бригад на аварийные работы
      - Уведомление потребителей об отключениях
    out_of_scope:
      - Обработка отключений, связанных с ВИЭ (BC-3840)
      - Оптовые отключения генерации (BC-3800.10)
  BC-3820.30.10:
    name: Сортировка аварий
    description: |
      Сортировка сообщений об авариях от полевых, потребительских
      и телеметрических источников.
  BC-3820.30.20:
    name: Полевое патрулирование при авариях
    description: |
      Полевые объезды для обнаружения и подтверждения аварий
      на воздушных и подземных активах.
  BC-3820.30.30:
    name: Отслеживание восстановления электроснабжения
    description: |
      Отслеживание хода восстановления и статистики
      потребителе-минут отключения.
  BC-3820.30.40:
    name: Реагирование на крупные аварийные события
    description: |
      Реагирование на штормы и крупные события в распределительных
      сетях, включая взаимопомощь бригад.
  BC-3820.40:
    name: Диспетчеризация полевых бригад
    description: |
      Диспетчеризация, маршрутизация и поддержка выполнения
      работ полевыми бригадами по авариям, плановым и потребительским работам.
  BC-3820.40.10:
    name: Составление графиков бригад
    description: |
      Ежедневное составление графиков смен бригад
      и оперативных дежурств.
  BC-3820.40.20:
    name: Диспетчеризация и маршрутизация заявок
    description: |
      Диспетчеризация и маршрутизация заявок
      полевым бригадам из систем управления работами.
  BC-3820.40.30:
    name: Закрытие полевых заявок
    description: |
      Фиксация изменений в исполнении, использованных материалов
      и времени при закрытии заявки.
  BC-3820.50:
    name: Осмотр распределительных активов
    description: |
      Плановые и состоянийные осмотры воздушных линий, опор,
      подземных кабелей и распределительных подстанций.
  BC-3820.50.10:
    name: Осмотр опор и воздушных линий
    description: |
      Циклический осмотр опор и воздушных линий,
      включая тепловизионные съёмки.
  BC-3820.50.20:
    name: Осмотр подземной сети
    description: |
      Осмотр и обследование состояния подземных фидеров,
      муфт-перемычек и соединительных муфт.
  BC-3820.50.30:
    name: Осмотр распределительных подстанций
    description: |
      Плановый осмотр первичных, вторичных
      и абонентских подстанций.
  BC-3820.60:
    name: Управление растительностью и трассами
    description: |
      Расчистка растительности и обслуживание трасс
      на распределительных линиях для снижения риска отключений.
  BC-3820.60.10:
    name: Планирование циклов расчистки растительности
    description: |
      Циклическое и рискориентированное планирование работ
      по растительности на распределительных линиях.
  BC-3820.60.20:
    name: Полевые работы по растительности
    description: |
      Полевое выполнение обрезки, удаления
      и обработки гербицидами.
  BC-3820.60.30:
    name: Операции по снижению рисков лесных пожаров
    description: |
      Операции PSPS, быстрого отключения и усиления линий
      в зонах риска лесных пожаров.
  BC-3820.70:
    name: Операции новых технологических присоединений
    description: |
      Реализация новых и модифицированных подключений
      для бытовых, коммерческих и промышленных потребителей.
  BC-3820.70.10:
    name: Оценка заявок на технологическое присоединение
    description: |
      Техническая оценка заявок на присоединение
      и наличия мощности.
  BC-3820.70.20:
    name: Проектирование технологического присоединения
    description: |
      Детальное проектирование присоединения, точки подключения
      и требований к усилению.
  BC-3820.70.30:
    name: Ввод технологического присоединения в работу
    description: |
      Ввод новых присоединений в работу
      и приёмка энергоснабжения.
  BC-3820.80:
    name: Управление качеством электроэнергии
    description: |
      Надзор и устранение нарушений уровней напряжения, флика,
      гармоник и жалоб потребителей на качество электроэнергии.
  BC-3820.80.10:
    name: Надзор за напряжением
    description: |
      Надзор за профилями напряжения фидеров
      против установленных пределов.
  BC-3820.80.20:
    name: Мониторинг гармоник и флика
    description: |
      Сетевой мониторинг гармонических искажений
      и флика напряжения.
  BC-3820.80.30:
    name: Расследование жалоб на качество электроэнергии
    description: |
      Расследование и устранение проблем качества электроэнергии,
      заявленных потребителями.

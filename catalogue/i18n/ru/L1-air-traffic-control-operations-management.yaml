# Управление операциями управления воздушным движением (ru) — translations for L1-air-traffic-control-operations-management.yaml
locale: ru
source: L1-air-traffic-control-operations-management.yaml
entries:
  BC-1210:
    name: Управление операциями управления воздушным движением
    description: |
      Обслуживание воздушного движения в реальном времени — на воздушных трассах, в районе подхода, с вышки аэродрома, в океаническом пространстве.
  BC-1210.10:
    name: Управление операциями районного диспетчерского центра
    description: |
      Обслуживание воздушного движения на воздушных трассах большой высоты.
  BC-1210.10.10:
    name: Обеспечение эшелонирования на воздушных трассах
    description: |
      Обеспечение горизонтального и вертикального эшелонирования в воздушном пространстве воздушных трасс.
  BC-1210.10.20:
    name: Обнаружение и урегулирование конфликтов на воздушных трассах
    description: |
      Обнаружение и урегулирование конфликтов между воздушными судами на трассах.
  BC-1210.10.30:
    name: Координация на воздушных трассах
    description: |
      Межсекторная и межцентровая координация трафика на воздушных трассах.
  BC-1210.10.40:
    name: Обработка планов полётов
    description: |
      Обработка, активация и обновление планов полётов.
  BC-1210.20:
    name: Управление операциями диспетчерской подхода
    description: |
      Управление прилётом и вылетом в районе аэродрома.
  BC-1210.20.10:
    name: Последовательность и регулирование прилётов
    description: |
      Построение очерёдности прилётов, AMAN и регулирование потоков.
  BC-1210.20.20:
    name: Управление вылетами
    description: |
      Управление вылетами, DMAN и выдерживание SID.
  BC-1210.20.30:
    name: Векторение и выдерживание интервалов при заходе
    description: |
      Векторение и выдерживание интервалов при заходе на посадку.
  BC-1210.20.40:
    name: Координация в районе аэродрома
    description: |
      Координация между диспетчерской подхода и смежными органами.
  BC-1210.30:
    name: Управление операциями вышки аэродрома
    description: |
      Управление с вышки аэродрома, включая руление.
  BC-1210.30.10:
    name: Управление взлётно-посадочной полосой
    description: |
      Управление ВПП, включая выдачу разрешений на взлёт и посадку.
  BC-1210.30.20:
    name: Управление наземным движением
    description: |
      Управление наземным движением воздушных судов и транспортных средств.
  BC-1210.30.30:
    name: Выдача диспетчерских разрешений
    description: |
      Выдача разрешений на вылет и предполётной информации.
  BC-1210.30.40:
    name: Координация на аэродроме
    description: |
      Координация с аэропортовыми службами и аварийно-спасательными службами.
  BC-1210.40:
    name: Управление операциями океанического управления
    description: |
      Процедурное и океаническое обслуживание воздушного движения.
  BC-1210.40.10:
    name: Обеспечение процедурного эшелонирования
    description: |
      Процедурное эшелонирование в безрадиолокационном океаническом воздушном пространстве.
  BC-1210.40.20:
    name: Управление океаническими разрешениями
    description: |
      Выдача и корректировка океанических разрешений.
  BC-1210.40.30:
    name: Операции CPDLC и ADS-C
    description: |
      Океанические операции на основе канала передачи данных CPDLC и ADS-C.
  BC-1210.50:
    name: Управление дежурством и сменами в УВД
    description: |
      Надзор за дежурством, смена смен, расстановка по рабочим местам.
  BC-1210.50.10:
    name: Надзор за дежурством
    description: |
      Оперативный надзор за дежурством и результатами смены.
  BC-1210.50.20:
    name: Управление сменой смен
    description: |
      Структурированный инструктаж при смене смен и документирование.
  BC-1210.50.30:
    name: Расстановка по рабочим местам
    description: |
      Расстановка диспетчеров по рабочим местам и управление усталостью.
  BC-1210.60:
    name: Управление операциями в нештатных ситуациях
    description: |
      Операции в деградированном режиме, реагирование на отказы систем, резервные процедуры.
  BC-1210.60.10:
    name: Операции в деградированном режиме
    description: |
      Операции в деградированном режиме с ограниченной поддержкой систем.
  BC-1210.60.20:
    name: Реагирование на отказы систем
    description: |
      Процедуры реагирования на отказы систем УВД.
  BC-1210.60.30:
    name: Переход на резервные системы
    description: |
      Переход на резервные системы УВД и запасные объекты.
  BC-1210.60.40:
    name: Поддержание планов нештатных ситуаций
    description: |
      Поддержание и тренировки по оперативным планам на случай нештатных ситуаций.

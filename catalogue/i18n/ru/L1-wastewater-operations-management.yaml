# Управление сточными водами (ru) — translations for L1-wastewater-operations-management.yaml
locale: ru
source: L1-wastewater-operations-management.yaml
entries:
  BC-3890:
    name: Управление сточными водами
    description: |
      Сбор, очистка и утилизация муниципальных и промышленных сточных вод — эксплуатация канализационной сети, технологическое обслуживание очистных сооружений, ликвидация засоров и подтоплений, управление осадком и биоудобрениями, управление ливневыми переливами и контроль качества очищенных стоков.
  BC-3890.10:
    name: Эксплуатация канализационной сети
    description: |
      Обслуживание бытовой, ливневой и смешанной канализационных сетей, включая насосные станции и напорные коллекторы.
  BC-3890.10.10:
    name: Эксплуатация канализационных насосных станций
    description: |
      Обслуживание и контроль канализационных насосных станций и напорных коллекторов.
  BC-3890.10.20:
    name: Мониторинг канализационной сети
    description: |
      Телеметрический контроль уровней в канализационной сети и аварийной сигнализации насосных станций.
  BC-3890.10.30:
    name: Промывка канализационной сети
    description: |
      Плановая и аварийная промывка, гидродинамическая очистка и удаление илового осадка из канализационных коллекторов.
  BC-3890.20:
    name: Эксплуатация канализационных очистных сооружений
    description: |
      Ежедневное обслуживание очистных сооружений, включая предварительную, первичную, вторичную и третичную очистку.
  BC-3890.20.10:
    name: Предварительная и первичная очистка
    description: |
      Обслуживание решёточных установок, пескоотделителей и первичных отстойников.
  BC-3890.20.20:
    name: Вторичная биологическая очистка
    description: |
      Обслуживание аэротенков, капельных биофильтров и мембранных биореакторов (МБР).
  BC-3890.20.30:
    name: Третичная очистка
    description: |
      Обслуживание установок удаления биогенных элементов, фильтрации и дезинфекции.
  BC-3890.20.40:
    name: Управление технологическим процессом и оптимизация
    description: |
      Управление и энергетическая оптимизация биологических и аэрационных технологических этапов.
  BC-3890.30:
    name: Ликвидация засоров и подтоплений канализации
    description: |
      Оперативное реагирование на засоры канализации, внутренние и внешние подтопления, а также инциденты загрязнения.
  BC-3890.30.10:
    name: Ликвидация засоров
    description: |
      Выездное устранение засоров канализации методом гидроочистки.
  BC-3890.30.20:
    name: Реагирование на внутреннее затопление канализации
    description: |
      Взаимодействие с потребителями при инцидентах внутреннего затопления канализации.
  BC-3890.30.30:
    name: Реагирование на внешнее затопление канализации
    description: |
      Ликвидация последствий внешнего затопления канализационной сети и дорожного покрытия.
  BC-3890.30.40:
    name: Локализация инцидентов загрязнения
    description: |
      Локализация и устранение последствий загрязнения водоёмов канализационными стоками.
  BC-3890.40:
    name: Управление промышленными стоками
    description: |
      Выдача разрешений, мониторинг и тарификация сбросов промышленных сточных вод в городскую канализацию.
  BC-3890.40.10:
    name: Администрирование разрешений на сброс промышленных стоков
    description: |
      Выдача и изменение разрешений на сброс промышленных сточных вод предприятиям.
  BC-3890.40.20:
    name: Отбор проб промышленных сточных вод
    description: |
      Отбор и анализ проб промышленных сточных вод для проверки соответствия условиям разрешений.
  BC-3890.40.30:
    name: Тарификация промышленных стоков
    description: |
      Расчёт платежей за промышленные сточные воды по формуле Могдена или аналогичным методикам.
  BC-3890.50:
    name: Управление осадком и биоудобрениями
    description: |
      Обработка, полезное использование и утилизация осадка сточных вод, включая анаэробное сбраживание и рекультивацию биологических удобрений.
  BC-3890.50.10:
    name: Уплотнение и обезвоживание осадка
    description: |
      Эксплуатация установок уплотнения, обезвоживания и центрифугирования осадка.
  BC-3890.50.20:
    name: Анаэробное сбраживание
    description: |
      Эксплуатация мезофильных и термофильных анаэробных реакторов и систем использования биогаза.
  BC-3890.50.30:
    name: Внесение биоудобрений на почву
    description: |
      Использование биологических удобрений в сельском хозяйстве в соответствии с регламентами безопасного применения осадка.
  BC-3890.50.40:
    name: Сжигание и утилизация осадка
    description: |
      Эксплуатация установок сжигания осадка и альтернативных маршрутов утилизации.
  BC-3890.60:
    name: Управление ливневыми переливами
    description: |
      Эксплуатация, мониторинг и отчётность по ливневым и аварийным сбросам смешанной канализации, включая мониторинг продолжительности событий.
  BC-3890.60.10:
    name: Мониторинг продолжительности событий
    description: |
      Эксплуатация телеметрии EDM для контроля ливневых и аварийных переливов.
  BC-3890.60.20:
    name: Отчётность по объёмам ливневых сбросов
    description: |
      Информирование регуляторов и общественности об объёмах и продолжительности переливов.
  BC-3890.60.30:
    name: Эксплуатация ливневых резервуаров
    description: |
      Обслуживание ливневых резервуаров и регулирующих сооружений на входных точках канализационных очистных станций.
  BC-3890.70:
    name: Контроль качества очищенных стоков
    description: |
      Отбор проб, анализ и отчётность перед регуляторами по качеству очищенных стоков в соответствии с условиями разрешений на сброс.
  BC-3890.70.10:
    name: Отбор проб для контроля соблюдения условий разрешений
    description: |
      Самомониторинг сброса в соответствии с количественными показателями разрешений.
  BC-3890.70.20:
    name: Мониторинг качества стоков
    description: |
      Автоматический и лабораторный контроль показателей БПК, аммония и биогенных элементов в очищенных стоках.
  BC-3890.70.30:
    name: Отчётность по разрешениям на сброс
    description: |
      Statutory-отчётность о соблюдении норм сброса перед природоохранными регуляторами.

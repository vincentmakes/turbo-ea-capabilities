# Дистрибуция и доставка контента (ru) — translations for L1-content-distribution-delivery-management.yaml
locale: ru
source: L1-content-distribution-delivery-management.yaml
entries:
  BC-3740:
    name: Дистрибуция и доставка контента
    description: |
      Линейное вещание, OTT и стриминговая доставка, операции сети
      доставки контента, IPTV и многоадресная рассылка, защита контента,
      синдикация и дистрибуция аффилиатам на потребительские поверхности и партнёрам.
  BC-3740.10:
    name: Линейная вещательная дистрибуция
    description: |
      Эксплуатация инфраструктуры линейного вещания
      по цифровым наземным, спутниковым и кабельным путям.
  BC-3740.10.10:
    name: Операции наземного вещания
    description: |
      Эксплуатация цифровых наземных передающих цепочек
      и мультиплексной передачи.
  BC-3740.10.20:
    name: Операции спутникового аплинка
    description: |
      Эксплуатация спутниковых аплинк-цепочек для прямого
      домашнего и контрибюционного вещания.
  BC-3740.10.30:
    name: Операции кабельного хедэнда
    description: |
      Эксплуатация кабельных каналов и интеграция хедэнда
      с операторскими платформами.
  BC-3740.20:
    name: OTT и стриминговая доставка
    description: |
      Эксплуатация стримингового источника, упаковки и прямой
      трансляции для прямых и партнёрских OTT-сервисов.
  BC-3740.20.10:
    name: Операции источника стриминга
    description: |
      Эксплуатация стриминговых источников для доставки
      контента по запросу и прямых трансляций.
  BC-3740.20.20:
    name: Упаковка адаптивного стриминга
    description: |
      Упаковка адаптивного стриминга «в момент» и предварительная
      для HLS, MPEG-DASH и CMAF.
  BC-3740.20.30:
    name: Операции прямой трансляции
    description: |
      Эксплуатация конвейеров прямой трансляции для событий,
      каналов и FAST-сервисов.
  BC-3740.30:
    name: Операции сети доставки контента
    description: |
      Управление ёмкостью, кэшированием и стоимостью/производительностью
      сетей доставки контента.
  BC-3740.30.10:
    name: Планирование ёмкости CDN
    description: |
      Прогнозирование и обеспечение ёмкости CDN по регионам,
      пирингу и пиковым событиям.
  BC-3740.30.20:
    name: Управление граничным кэшем
    description: |
      Управление объёмом граничного кэша, поведением заполнения
      и разгрузкой на партнёрские кэши.
  BC-3740.30.30:
    name: Оптимизация стоимости и производительности CDN
    description: |
      Управление мультиCDN и оптимизация стоимости и производительности
      у партнёров по доставке.
  BC-3740.40:
    name: Управление IPTV и многоадресной доставкой
    description: |
      Эксплуатация хедэндов IPTV телекоммуникационного класса,
      многоадресных потоков и активации set-top box.
  BC-3740.40.10:
    name: Операции хедэнда IPTV
    description: |
      Эксплуатация хедэндов IPTV, включая приём сигнала,
      кодирование и интеграцию системы условного доступа.
  BC-3740.40.20:
    name: Управление многоадресными потоками
    description: |
      Управление многоадресными потоками по IP и
      вещательным носителям 3GPP.
  BC-3740.40.30:
    name: Активация услуг set-top box
    description: |
      Активация set-top box и управляемых устройств в сервисе IPTV,
      включая настройку линейки каналов.
  BC-3740.50:
    name: Защита контента и управление DRM
    description: |
      Эксплуатация систем защиты контента, включая управление ключами
      и лицензиями, водяные знаки и контроль одновременных потоков.
  BC-3740.50.10:
    name: Управление лицензиями и ключами
    description: |
      Выдача и управление DRM-лицензиями и ключами контента
      на устройствах и платформах.
  BC-3740.50.20:
    name: Водяные знаки и криминалистическое отслеживание
    description: |
      Применение сессионных и криминалистических водяных знаков
      для обнаружения пиратства и отслеживания источника.
  BC-3740.50.30:
    name: Контроль одновременных потоков
    description: |
      Соблюдение ограничений одновременных потоков и политики
      обмена аккаунтами на устройствах и зрителях.
  BC-3740.60:
    name: Синдикация и дистрибуция аффилиатам
    description: |
      Дистрибуция программ и фидов синдицированным аффилиатам
      и сторонним платформам с учётом доставки.
  BC-3740.60.10:
    name: Управление синдикационными заказами
    description: |
      Приём и выполнение синдикационных заказов
      по удерживаемым правам и слотам поставки.
  BC-3740.60.20:
    name: Дистрибуция фидов аффилиатам
    description: |
      Дистрибуция сетевых и канальных фидов вещательным
      аффилиатам с локализационными передачами.
  BC-3740.60.30:
    name: Отслеживание доставки программ
    description: |
      Отслеживание поставок программ платформам и партнёрам,
      включая подтверждение доставки и обработку исключений.

# Логистика углеводородов (ru) — translations for L1-hydrocarbon-logistics-management.yaml
locale: ru
source: L1-hydrocarbon-logistics-management.yaml
entries:
  BC-3100:
    name: Логистика углеводородов
    description: |
      Морские грузовые, терминальные и наливные операции с сырой нефтью, нефтепродуктами и СПГ, а также координация отгрузки и управление бункерным топливом. Не включает межотраслевые транспортные операции (серия BC-2400).
  BC-3100.10:
    name: Морские грузовые операции
    description: |
      Эксплуатация сырьевых танкеров, нефтепродуктовых танкеров, газовозов и выполнение операций судно-судно в нефтяном сервисе.
    in_scope:
      - Оперативная координация танкеров и газовозов
      - Операции лихтерования и обратного лихтерования судно-судно
    out_of_scope:
      - Управление общим флотом (BC-2430)
      - Линейные грузовые бронирования (BC-2400)
  BC-3100.10.10:
    name: Операции сырьевых танкеров
    description: |
      Оперативная координация сырьевых танкеров в рейсовом и тайм-чартере.
  BC-3100.10.20:
    name: Операции нефтепродуктовых танкеров
    description: |
      Оперативная координация нефтепродуктовых танкеров, включая партионные грузы.
  BC-3100.10.30:
    name: Операции газовозов СПГ
    description: |
      Оперативная координация газовозов СПГ, включая охлаждение и управление давлением в танках.
  BC-3100.10.40:
    name: Координация операций судно-судно
    description: |
      Координация перегрузки судно-судно для сырой нефти, нефтепродуктов и СПГ.
  BC-3100.20:
    name: Терминальные операции
    description: |
      Эксплуатация импортных, экспортных и транзитных нефтяных терминалов: причалы, погрузочные стендеры и приём в резервуары.
  BC-3100.20.10:
    name: Операции стендеров и причалов
    description: |
      Эксплуатация причального оборудования и морских погрузочных стендеров.
  BC-3100.20.20:
    name: Приём в резервуары
    description: |
      Приём и замер грузов в терминальные резервуары.
  BC-3100.20.30:
    name: Налив из резервуаров
    description: |
      Налив из терминальных резервуаров в суда и трубопроводы.
  BC-3100.20.40:
    name: Расстановка по причалам
    description: |
      Распределение причальных мест и планирование прихода судов.
  BC-3100.30:
    name: Управление наливным хранением
    description: |
      Распределение резервуарного парка, отслеживание движений и тарировка резервуаров для сырой нефти, нефтепродуктов и ШФЛУ.
  BC-3100.30.10:
    name: Распределение резервуарного парка
    description: |
      Распределение ёмкости резервуаров по маркам продуктов, владельцам и пулам.
  BC-3100.30.20:
    name: Отслеживание перекачек между резервуарами
    description: |
      Отслеживание внутрипарковых перекачек и позиций запасов.
  BC-3100.30.30:
    name: Тарировка и калибровка резервуаров
    description: |
      Проведение тарировки резервуаров и ведение калибровочных таблиц для обеспечения фискальной точности.
  BC-3100.40:
    name: Планирование грузов и координация отгрузок
    description: |
      Номинации отгрузок, подтверждение стемов и отслеживание демереджа по нефтяным грузам.
  BC-3100.40.10:
    name: Управление номинациями отгрузок
    description: |
      Приём и подтверждение номинаций отгрузок от покупателей и по долевому участию.
  BC-3100.40.20:
    name: Подтверждение стемов судов
    description: |
      Подтверждение стемов и партий груза в соответствии с контрактными обязательствами.
  BC-3100.40.30:
    name: Оперативное отслеживание демереджа
    description: |
      Оперативное отслеживание событий демереджа в портах погрузки и выгрузки.
  BC-3100.50:
    name: Управление бункером и морским топливом
    description: |
      Закупка бункера и контроль качества для собственного и зафрахтованного флота.
  BC-3100.50.10:
    name: Закупка бункера
    description: |
      Спотовая и контрактная закупка морского топлива для флота.
  BC-3100.50.20:
    name: Контроль качества бункера
    description: |
      Отбор проб, испытания и урегулирование претензий по поставленному бункеру.

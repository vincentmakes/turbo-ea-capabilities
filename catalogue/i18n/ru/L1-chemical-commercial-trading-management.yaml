# Торговля химической продукцией (ru) — translations for L1-chemical-commercial-trading-management.yaml
locale: ru
source: L1-chemical-commercial-trading-management.yaml
entries:
  BC-4690:
    name: Торговля химической продукцией
    description: |
      Торговля насыпными и специальными химикатами, управление балансом
      спроса и предложения, закупки сырья, хеджирование, долгосрочный
      офтейк и ценовые индексные справочники.
  BC-4690.10:
    name: Торговля насыпными химикатами
    description: |
      Спотовая и срочная торговля насыпными товарными химикатами на
      физических рынках.
  BC-4690.10.10:
    name: Торговля спотовыми грузами
    description: |
      Торговля спотовыми грузами по текущим рыночным ценам.
  BC-4690.10.20:
    name: Торговля по срочным контрактам
    description: |
      Заключение и исполнение срочных контрактов.
  BC-4690.10.30:
    name: Продажа вынужденных грузов
    description: |
      Реализация вынужденных и избыточных грузов через торговые каналы.
  BC-4690.20:
    name: Коммерческое управление специальными химикатами
    description: |
      Управление ключевыми клиентами, дистрибуцией и решенческими продажами
      дифференцированных специальных химикатов.
  BC-4690.20.10:
    name: Управление ключевыми клиентами в специальных химикатах
    description: |
      Управление стратегическими клиентами в области специальных химикатов.
  BC-4690.20.20:
    name: Управление дистрибьюторскими каналами
    description: |
      Управление косвенными каналами дистрибуции.
  BC-4690.20.30:
    name: Pull-through продажи по применениям
    description: |
      Pull-through продажи конечным потребителям у рецептурщиков и
      конвертеров.
  BC-4690.20.40:
    name: Координация решенческих продаж
    description: |
      Координация многопродуктовых решенческих продаж для сложных применений.
  BC-4690.30:
    name: Закупки сырья и нефтехимии
    description: |
      Закупки углеводородного, ароматического, биологического и неорганического
      сырья для химического производства.
  BC-4690.30.10:
    name: Закупки нафты и олефинов
    description: |
      Закупки нафты, этана и олефиновых сырьевых компонентов для крекингов.
  BC-4690.30.20:
    name: Закупки ароматического сырья
    description: |
      Закупки бензола, толуола и ксилольных сырьевых компонентов.
  BC-4690.30.30:
    name: Закупки биосырья
    description: |
      Закупки биосырья по схемам массового баланса.
  BC-4690.30.40:
    name: Закупки неорганического сырья
    description: |
      Закупки неорганических солей, минералов и руд для химического
      производства.
  BC-4690.40:
    name: Хеджирование химических рисков
    description: |
      Хеджирование ценовой экспозиции сырья, валюты и маржи в химической
      книге.
  BC-4690.40.10:
    name: Хеджирование ценового риска сырья
    description: |
      Хеджирование ценовой экспозиции сырья на товарных рынках.
  BC-4690.40.20:
    name: Хеджирование валютного риска
    description: |
      Хеджирование валютного риска по химическим контрактам.
  BC-4690.40.30:
    name: Стратегия хеджирования маржи
    description: |
      Разработка и реализация стратегий хеджирования маржи крекинга и
      химической маржи.
  BC-4690.50:
    name: Управление балансом спроса и предложения
    description: |
      Составление и согласование баланса спроса и предложения по продуктовому
      ассортименту.
  BC-4690.50.10:
    name: Составление прогноза спроса
    description: |
      Составление краткосрочного и среднесрочного прогноза спроса.
  BC-4690.50.20:
    name: Составление прогноза производственных мощностей
    description: |
      Составление прогноза производственных мощностей собственных и
      толлинговых активов.
  BC-4690.50.30:
    name: Согласование баланса
    description: |
      Согласование баланса спроса и предложения и выявление ограничений.
  BC-4690.60:
    name: Управление долгосрочными офтейк-контрактами
    description: |
      Переговоры, разработка и мониторинг исполнения долгосрочных офтейк- и
      договоров поставки.
  BC-4690.60.10:
    name: Переговоры по условиям долгосрочного офтейка
    description: |
      Переговоры по основным условиям долгосрочных офтейк-соглашений.
  BC-4690.60.20:
    name: Разработка долгосрочных контрактов
    description: |
      Разработка окончательных долгосрочных договоров поставки и офтейка.
  BC-4690.60.30:
    name: Мониторинг исполнения офтейк-контрактов
    description: |
      Мониторинг исполнения офтейк-контрактов по договорным обязательствам.
  BC-4690.70:
    name: Управление ценовыми индексами и справочниками
    description: |
      Управление подписками и справочными ценовыми индексами, применяемыми
      в ценообразовании химической продукции.
  BC-4690.70.10:
    name: Управление подписками на ценовые индексы
    description: |
      Управление подписками на ICIS, Argus, Platts и аналогичные индексы.
  BC-4690.70.20:
    name: Поддержание кривых справочных цен
    description: |
      Поддержание внутренних кривых справочных цен на химическую продукцию.
  BC-4690.70.30:
    name: Расчёт индексно-привязанных цен
    description: |
      Расчёт индексно-привязанных цен для покупателей и расчётов по
      контрактам.

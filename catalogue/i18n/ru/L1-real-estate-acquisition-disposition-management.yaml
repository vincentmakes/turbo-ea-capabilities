# Управление сделками купли-продажи недвижимости (ru) — translations for L1-real-estate-acquisition-disposition-management.yaml
locale: ru
source: L1-real-estate-acquisition-disposition-management.yaml
entries:
  BC-4930:
    name: Управление сделками купли-продажи недвижимости
    description: |
      Транзакционная дисциплина, охватывающая поиск, андеррайтинг,
      due diligence, структурирование, переговоры, закрытие и
      пост-транзакционный онбординг при приобретении и продаже
      недвижимости по прямым, портфельным и корпоративным сделкам.
    in_scope:
      - Поиск возможностей для приобретения и управление брокерами
      - Андеррайтинг (DCF, сопоставимые сделки, чувствительность, сценарии)
      - Физический, экологический, правовой, арендный и финансовый due diligence
      - Стратегия предложения, LOI, PSA и налоговое / корпоративное структурирование
      - Эскроу, закрытие, расчётный лист и регистрация
      - Стратегия продажи, маркетинг, выбор покупателя
      - Онбординг данных и договоров после приобретения
    out_of_scope:
      - Управление инвестиционным комитетом и мандаты фондов (BC-4910)
      - Бизнес-планы по действующим активам (BC-4920)
      - Строительные выплаты и мониторинг ковенантов кредитора (BC-4980)
      - Брокерские услуги как бизнес-направление (BC-4960)
  BC-4930.10:
    name: Поиск и отбор объектов для приобретения
    description: |
      Поиск возможностей для приобретения через брокеров, принципалов
      и собственные каналы и первичный отбор по критериям.
  BC-4930.10.10:
    name: Поиск объектов для приобретения
    description: |
      Поиск объектов для приобретения по прямым, брокерским и
      внебиржевым каналам.
  BC-4930.10.20:
    name: Управление брокерами и посредниками
    description: |
      Управление брокерскими и посредническими отношениями,
      обеспечивающими возможности для приобретения.
  BC-4930.10.30:
    name: Первичный отбор и решения о предложении
    description: |
      Первичный отбор возможностей и решения о подаче предложения или
      отказе.
  BC-4930.20:
    name: Андеррайтинг приобретения
    description: |
      Финансовый, рыночный и риск-андеррайтинг целевых активов для
      определения цены предложения и ожидаемой доходности.
  BC-4930.20.10:
    name: Андеррайтинг денежных потоков и DCF
    description: |
      Построение моделей денежных потоков актива и андеррайтинга на
      основе дисконтированных денежных потоков.
  BC-4930.20.20:
    name: Анализ сопоставимых сделок и капставок
    description: |
      Анализ сопоставимых сделок и текущих капставок для оценки
      стоимости.
  BC-4930.20.30:
    name: Анализ чувствительности и сценариев
    description: |
      Анализ чувствительности и сценариев доходности при различных
      предположениях об арендной плате, вакантности и выходе.
  BC-4930.30:
    name: Управление due diligence
    description: |
      Координация и проведение многодисциплинарного due diligence
      по целевым приобретениям, включая физические, экологические,
      правовые, арендные и финансовые направления.
  BC-4930.30.10:
    name: Физический и инженерный due diligence
    description: |
      Оценки технического состояния и инженерный due diligence
      целевых активов.
  BC-4930.30.20:
    name: Экологический due diligence (Фаза I / II)
    description: |
      Экологический due diligence, включая оценки Фазы I и Фазы II
      по ASTM.
  BC-4930.30.30:
    name: Due diligence по праву собственности и зонированию
    description: |
      Due diligence по праву собственности, съёмке, обременениям и
      соответствию зонированию.
  BC-4930.30.40:
    name: Due diligence по аренде и арендаторам
    description: |
      Анализ договоров аренды, сбор эстоппельных сертификатов и
      интервью с арендаторами.
  BC-4930.30.50:
    name: Финансовый и налоговый due diligence
    description: |
      Финансовый и налоговый due diligence по операционным отчётам,
      расходам и историческим налоговым оценкам.
  BC-4930.40:
    name: Структурирование и переговоры по сделке
    description: |
      Стратегия предложения, структурирование сделки и переговоры по
      обязывающим транзакционным документам.
  BC-4930.40.10:
    name: Стратегия предложения
    description: |
      Определение стратегии предложения, включая ценовое
      позиционирование и условия сделки.
  BC-4930.40.20:
    name: Переговоры по письму о намерениях
    description: |
      Переговоры по письмам о намерениях и периодам эксклюзивности.
  BC-4930.40.30:
    name: Переговоры по договору купли-продажи
    description: |
      Переговоры и исполнение договоров купли-продажи, включая
      заверения и гарантии.
  BC-4930.40.40:
    name: Налоговое и корпоративное структурирование
    description: |
      Структурирование приобретательных инструментов для налоговой
      эффективности, включая обмены 1031 и корпоративные обёртки.
  BC-4930.50:
    name: Управление закрытием и расчётом
    description: |
      Управление эскроу, условиями закрытия, финансированием расчёта
      и регистрацией закрытых сделок.
  BC-4930.50.10:
    name: Эскроу и условия закрытия
    description: |
      Управление эскроу-счетами и отслеживание условий закрытия до
      их выполнения.
  BC-4930.50.20:
    name: Средства закрытия и расчётный лист
    description: |
      Координация средств закрытия и сверка с расчётным листом.
  BC-4930.50.30:
    name: Страхование титула и регистрация
    description: |
      Выдача страхования титула и регистрация актов и ипотеки.
  BC-4930.60:
    name: Управление продажей и выходом
    description: |
      Дисциплина продавца, включая ценообразование продажи, маркетинг,
      выбор покупателя и пост-закрытие.
  BC-4930.60.10:
    name: Стратегия и ценообразование продажи
    description: |
      Определение стратегии продажи, ценообразования и целевых пулов
      покупателей.
  BC-4930.60.20:
    name: Маркетинг и туры для покупателей
    description: |
      Маркетинг со стороны продавца, включая информационный меморандум,
      дата-рум и туры для покупателей.
  BC-4930.60.30:
    name: Выбор покупателя и процесс торгов
    description: |
      Выбор покупателя через запрос предложений, лучшие и
      окончательные предложения или структурированный аукцион.
  BC-4930.60.40:
    name: Пост-закрытие и обязательства
    description: |
      Отслеживание пост-закрытных обязательств, включая удержания,
      earnout и претензии по компенсации.
  BC-4930.70:
    name: Онбординг после приобретения
    description: |
      Передача вновь приобретённых активов от транзакционной команды
      к управлению активом и объектом, включая онбординг данных и
      договоров.
  BC-4930.70.10:
    name: Миграция данных актива
    description: |
      Миграция данных актива, чертежей и операционных записей в
      системы владельца.
  BC-4930.70.20:
    name: Онбординг данных аренды и арендаторов
    description: |
      Онбординг аннотаций договоров аренды и данных арендаторов в
      системы арендодателя.
  BC-4930.70.30:
    name: Замена договоров с поставщиками
    description: |
      Замена или переоформление действующих договоров с поставщиками
      и сервисными организациями на нового владельца.

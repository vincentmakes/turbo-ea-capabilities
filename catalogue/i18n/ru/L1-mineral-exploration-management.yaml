# Управление разведкой минеральных ресурсов (ru) — translations for L1-mineral-exploration-management.yaml
locale: ru
source: L1-mineral-exploration-management.yaml
entries:
  BC-4400:
    name: Управление разведкой минеральных ресурсов
    description: |
      Обнаружение новой минерализации и квалификация разведочных объектов посредством геологических, геохимических и геофизических съёмок, разведочного бурения и опробования буровых проб, завершающихся отчётностью об открытии и решениями о зрелости объекта.
  BC-4400.10:
    name: Управление геонаучными съёмками
    description: |
      Получение, обработка и интерпретация воздушных и наземных геофизических, геохимических и геологических данных съёмок на разведочных лицензионных участках.
    in_scope:
      - Воздушные магнитные и электромагнитные съёмки
      - Наземные гравиметрические, ВП и сейсмические съёмки
      - Почвенные, донные и литохимические пробы
      - Геологическое картирование в масштабе 1:50 000 и площадочного масштаба
    out_of_scope:
      - Геологическое документирование скважин на стадии ресурсной оценки (BC-4400.30)
      - Геологическое согласование на стадии добычи (BC-4410.60)
  BC-4400.10.10:
    name: Воздушная геофизическая съёмка
    description: |
      Воздушная магнитная, электромагнитная, радиометрическая и гравиметрическая съёмка на разведочных площадях.
  BC-4400.10.20:
    name: Наземная геофизическая съёмка
    description: |
      Наземная гравиметрическая, вызванной поляризации, электромагнитная и сейсмическая съёмка в масштабе объекта.
  BC-4400.10.30:
    name: Геохимическое опробование
    description: |
      Программы отбора почвенных, донных, биогеохимических и литохимических проб для выявления геохимических аномалий.
  BC-4400.10.40:
    name: Геологическое картирование
    description: |
      Геологическое картирование выходов и объекта для определения литологии, структур и изменений.
  BC-4400.10.50:
    name: Интерпретация данных съёмок
    description: |
      Комплексная интерпретация геофизических и геохимических данных для генерации целей.
  BC-4400.20:
    name: Генерация разведочных целей
    description: |
      Преобразование региональных и площадочных данных в ранжированные буровые цели через анализ минеральных систем и прогностическое моделирование.
    in_scope:
      - Применение минеральных систем и моделей месторождений
      - Прогностическое моделирование на основе данных
      - Ранжирование перспектив и целей
    out_of_scope:
      - Оценка ресурсов выявленной минерализации (BC-4410.20)
  BC-4400.20.10:
    name: Анализ минеральных систем
    description: |
      Применение критериев источника, переноса, ловушки и сохранности для определения минерализованных систем.
  BC-4400.20.20:
    name: Прогностическое моделирование
    description: |
      Экспертное и дата-ориентированное прогностическое картирование для предсказания местоположений целей.
  BC-4400.20.30:
    name: Ранжирование целей
    description: |
      Вероятностное ранжирование генерированных целей по шансу открытия и потенциальным тоннажам.
  BC-4400.20.40:
    name: Управление базой разведочных перспектив
    description: |
      Ведение ранжированной базы разведочных перспектив и целей с путём их созревания.
  BC-4400.30:
    name: Операции разведочного бурения
    description: |
      Выполнение программ бурения методами обратной циркуляции, алмазного бурения и другими методами, включая съёмку скважин, документирование проб и надзор за буровыми подрядчиками.
    in_scope:
      - Бурение методами обратной циркуляции и пневмоударного бурения
      - Алмазное бурение
      - Инклинометрия буровых скважин
    out_of_scope:
      - Эксплуатационное бурение на забойное взрывание (BC-4430.10)
      - Геотехническое бурение для проектирования откосов (BC-4420.50)
  BC-4400.30.10:
    name: Бурение методом обратной циркуляции
    description: |
      Бурение методом обратной циркуляции и пневмоударного бурения для отбора разведочных проб.
  BC-4400.30.20:
    name: Алмазное бурение
    description: |
      Алмазное бурение для ориентированного и непрерывного литологического отбора проб.
  BC-4400.30.30:
    name: Геологическое документирование буровых проб
    description: |
      Геологическое, геотехническое и структурное документирование буровых шламов и керна.
  BC-4400.30.40:
    name: Управление инклинометрией скважин
    description: |
      Скважинная инклинометрия и контроль координат устьев скважин.
  BC-4400.30.50:
    name: Управление буровыми подрядчиками
    description: |
      Привлечение, мобилизация и управление эффективностью буровых подрядчиков.
  BC-4400.40:
    name: Управление опробованием и анализами
    description: |
      Хранение, подготовка и координация анализов разведочных проб по задокументированным программам контроля качества, удовлетворяющим стандартам публичной отчётности.
    in_scope:
      - Цепочка хранения проб
      - Выбор лаборатории и управление сроками
      - Внесение и мониторинг контрольных образцов
    out_of_scope:
      - Анализы обогатительной фабрики (BC-4440.60)
      - Расчётные анализы плавильного завода (BC-4450.70)
  BC-4400.40.10:
    name: Подготовка проб
    description: |
      Дробление, деление и истирание разведочных проб для аналитического анализа.
  BC-4400.40.20:
    name: Координация лабораторных анализов
    description: |
      Выбор, отправка и управление сроками аналитических лабораторных работ.
  BC-4400.40.30:
    name: Управление программой контроля качества
    description: |
      Внесение и мониторинг стандартов, пустых и дублирующих проб для обеспечения качества анализов для целей публичной отчётности.
  BC-4400.40.40:
    name: Управление стандартными образцами
    description: |
      Закупка, аттестация и распределение сертифицированных стандартных образцов.
  BC-4400.50:
    name: Управление разведочной программой
    description: |
      Стратегическое руководство разведочным портфелем по commodities, юрисдикциям и классам риска, включая распределение инвестиций и отслеживание эффективности открытий.
  BC-4400.50.10:
    name: Определение стратегии разведки
    description: |
      Определение стратегии разведки по commodity, юрисдикции и классу месторождения.
  BC-4400.50.20:
    name: Распределение разведочных инвестиций
    description: |
      Распределение разведочного капитала по региональным и площадочным программам.
  BC-4400.50.30:
    name: Отслеживание эффективности открытий
    description: |
      Отслеживание стоимости открытий, приращений ресурсов и конвертации в запасы.
  BC-4400.60:
    name: Отчётность об открытиях
    description: |
      Внутреннее и внешнее сообщение о результатах разведки, включая партнёрские и раскрытия для рынков капитала в соответствии с кодексами публичной отчётности.
  BC-4400.60.10:
    name: Внутренняя отчётность об открытиях
    description: |
      Внутреннее сообщение о результатах разведки, пересечениях и статусе созревания целей.
  BC-4400.60.20:
    name: Публичное раскрытие результатов разведки
    description: |
      Раскрытие разведочных пересечений и результатов в соответствии с JORC, NI 43-101, SAMREC и аналогичными кодексами.
  BC-4400.60.30:
    name: Отчётность разведочного СП
    description: |
      Отчётность о прогрессе, затратах и результатах разведки партнёрам и операторам совместных предприятий.

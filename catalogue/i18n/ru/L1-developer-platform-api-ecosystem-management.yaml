# Управление платформой разработчиков и API-экосистемой (ru) — translations for L1-developer-platform-api-ecosystem-management.yaml
locale: ru
source: L1-developer-platform-api-ecosystem-management.yaml
entries:
  BC-4270:
    name: Управление платформой разработчиков и API-экосистемой
    description: |
      Публичные API, SDK, портал разработчиков, идентичность разработчиков, управление потреблением API, партнёрские приложения, листинги на программных маркетплейсах и управление исходящими webhook-подписками для SaaS-экосистемы.
  BC-4270.10:
    name: Управление жизненным циклом публичных API
    description: |
      Спецификация, версионирование и вывод из эксплуатации публичных API, открытых для внешних разработчиков.
  BC-4270.10.10:
    name: Разработка спецификаций API
    description: |
      Разработка и ревью спецификаций публичных API в машиночитаемом формате.
  BC-4270.10.20:
    name: Версионирование API
    description: |
      Версионирование публичных API с задокументированными гарантиями совместимости.
  BC-4270.10.30:
    name: Управление выводом API из эксплуатации
    description: |
      Коммуникация и выполнение вывода API из эксплуатации с достаточным уведомлением.
  BC-4270.20:
    name: Управление SDK и клиентскими библиотеками
    description: |
      Генерация, охват языков и поддержка примеров SDK и клиентских библиотек, оборачивающих публичные API.
  BC-4270.20.10:
    name: Генерация и выпуск SDK
    description: |
      Генерация и выпуск SDK в соответствии с версиями API.
  BC-4270.20.20:
    name: Управление языковым охватом SDK
    description: |
      Выбор и управление поддерживаемыми языками и рантаймами SDK.
  BC-4270.20.30:
    name: Поддержка примеров SDK
    description: |
      Поддержка примеров кода SDK и стартовых проектов.
  BC-4270.30:
    name: Управление порталом разработчиков
    description: |
      Документация, интерактивные справочники и потоки онбординга, помогающие разработчикам интегрироваться с платформой.
  BC-4270.30.10:
    name: Разработка документации для разработчиков
    description: |
      Разработка концептуальной, задачной и справочной документации для разработчиков.
  BC-4270.30.20:
    name: Интерактивный справочник API
    description: |
      Эксплуатация интерактивного справочника API и возможностей опробования на практике.
  BC-4270.30.30:
    name: Онбординг разработчиков
    description: |
      Потоки онбординга, ведущие разработчиков от регистрации до первого успешного вызова API.
  BC-4270.40:
    name: Управление идентичностью и учётными данными разработчиков
    description: |
      Выдача и управление учётными данными разработчиков, OAuth-клиентами и федерацией идентичности разработчиков.
  BC-4270.40.10:
    name: Выдача API-ключей
    description: |
      Выдача, ротация и отзыв API-ключей разработчиков.
  BC-4270.40.20:
    name: Регистрация OAuth-клиентов
    description: |
      Регистрация и управление OAuth-клиентскими приложениями.
  BC-4270.40.30:
    name: Федерация идентичности разработчиков
    description: |
      Федерация идентичности разработчиков от внешних провайдеров идентичности.
  BC-4270.50:
    name: Управление потреблением API
    description: |
      Квоты, лимиты частоты запросов, аналитика использования и сопоставление потребления API с тарифными уровнями.
  BC-4270.50.10:
    name: Управление квотами и лимитами частоты запросов API
    description: |
      Определение и применение квот и лимитов частоты запросов API для каждого потребителя.
  BC-4270.50.20:
    name: Аналитика использования API
    description: |
      Аналитика паттернов потребления API по эндпоинтам, потребителям и тарифным планам.
  BC-4270.50.30:
    name: Сопоставление тарифных уровней API
    description: |
      Сопоставление уровней доступа к API с тарифными планами подписки и правами доступа.
  BC-4270.60:
    name: Управление программой партнёрских приложений
    description: |
      Управление сторонними партнёрскими приложениями: листинг, сертификация и разделение выручки.
  BC-4270.60.10:
    name: Управление листингом партнёрских приложений
    description: |
      Листинг партнёрских приложений в директории приложений платформы.
  BC-4270.60.20:
    name: Сертификация партнёрских приложений
    description: |
      Сертификация партнёрских приложений по требованиям безопасности и качества.
  BC-4270.60.30:
    name: Разделение выручки партнёрских приложений
    description: |
      Соглашения о разделении выручки с разработчиками партнёрских приложений.
  BC-4270.70:
    name: Управление листингом на программных маркетплейсах
    description: |
      Листинг и управление SaaS-предложением на сторонних программных и облачных маркетплейсах.
  BC-4270.70.10:
    name: Разработка листингов на маркетплейсах
    description: |
      Разработка листингов на маркетплейсах, включая метаданные, ценообразование и ассеты.
  BC-4270.70.20:
    name: Поддержка листингов на маркетплейсах
    description: |
      Текущая поддержка листингов на маркетплейсах по мере развития предложения.
  BC-4270.70.30:
    name: Координация совместных продаж на маркетплейсах
    description: |
      Координация процессов совместных продаж с операторами маркетплейсов.
  BC-4270.80:
    name: Управление webhook-подписками и событийными каналами
    description: |
      Жизненный цикл исходящих webhook-подписок, схемы событий и надёжность доставки.
  BC-4270.80.10:
    name: Жизненный цикл webhook-подписок
    description: |
      Жизненный цикл исходящих webhook-подписок от регистрации до вывода из эксплуатации.
  BC-4270.80.20:
    name: Каталог схем событий
    description: |
      Каталог схем исходящих событий и гарантий их совместимости.
  BC-4270.80.30:
    name: Управление надёжностью доставки webhook
    description: |
      Повторные попытки, алгоритм отступления и обработка недоставленных сообщений для исходящей доставки webhook.
metadata:
  status: draft
  reviewer: pending

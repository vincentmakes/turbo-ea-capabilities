# Управление запасами (ru) — translations for L1-inventory-management.yaml
locale: ru
source: L1-inventory-management.yaml
entries:
  BC-530:
    name: Управление запасами
    description: |
      Уровни запасов, пополнение, распределение по сети поставок.
  BC-530.10:
    name: Управление уровнями запасов
    description: |
      Целевые уровни запасов, страховые запасы, точки заказа.
  BC-530.10.10:
    name: Установка целевых и страховых запасов
    description: |
      Установка целевых уровней и страховых запасов по SKU и локации.
  BC-530.10.20:
    name: Управление точками заказа и минимум/максимум
    description: |
      Точки заказа, минимальные и максимальные политики запасов.
  BC-530.10.30:
    name: Оптимизация уровня сервиса
    description: |
      Оптимизация компромисса между уровнем сервиса и стоимостью запасов.
  BC-530.10.40:
    name: Сегментирование запасов и ABC-анализ
    description: |
      ABC/XYZ-сегментирование для дифференциации политики управления запасами.
  BC-530.20:
    name: Управление пополнением запасов
    description: |
      Политики пополнения, автоматическое пополнение.
  BC-530.20.10:
    name: Определение политики пополнения
    description: |
      Определение политик пополнения (push, pull, kanban).
  BC-530.20.20:
    name: Исполнение автоматического пополнения
    description: |
      Исполнение автоматических заказов на пополнение в узлы поставок.
  BC-530.20.30:
    name: Операции управляемых поставщиком запасов
    description: |
      Схемы VMI и консигнационных запасов с поставщиками.
  BC-530.30:
    name: Управление распределением запасов
    description: |
      Распределение по сети, резервирование.
  BC-530.30.10:
    name: Распределение по сети
    description: |
      Распределение доступных запасов по РЦ, магазинам и каналам.
  BC-530.30.20:
    name: Резервирование для клиентов и заказов
    description: |
      Резервирование запасов под заказы или аккаунты клиентов.
  BC-530.30.30:
    name: Перебалансировка запасов
    description: |
      Перебалансировка запасов между локациями в соответствии со спросом.
  BC-530.40:
    name: Управление точностью запасов
    description: |
      Скользящая инвентаризация, физическая инвентаризация, устранение расхождений.
  BC-530.40.10:
    name: Скользящая инвентаризация
    description: |
      Программы скользящей инвентаризации по частоте и ABC-классификации.
  BC-530.40.20:
    name: Физическая инвентаризация
    description: |
      Ежегодные или периодические программы полной физической инвентаризации.
  BC-530.40.30:
    name: Расследование расхождений и корректировка
    description: |
      Расследование, анализ первопричин и корректировка расхождений в запасах.
  BC-530.50:
    name: Управление медленно оборачиваемыми и устаревшими запасами
    description: |
      Выявление SLOB, списание, ликвидация.
  BC-530.50.10:
    name: Выявление медленно оборачиваемых запасов
    description: |
      Выявление и анализ устаревания медленно оборачиваемых и устаревших запасов.
  BC-530.50.20:
    name: Резервирование и списание запасов
    description: |
      Резервирование, обесценение и списание устаревших запасов.
  BC-530.50.30:
    name: Ликвидация запасов
    description: |
      Ликвидация устаревших запасов путём продажи со скидкой или утилизации.

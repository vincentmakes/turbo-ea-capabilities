# Пограничный контроль и миграция (ru) — translations for L1-border-immigration-management.yaml
locale: ru
source: L1-border-immigration-management.yaml
entries:
  BC-3300:
    name: Пограничный контроль и миграция
    description: |
      Пограничный контроль в отношении людей, управление визами и разрешениями на въезд, определение статуса беженца и убежища, администрирование иммиграционного статуса и проживания, натурализация и операции по выдворению.
  BC-3300.10:
    name: Управление визами и разрешениями на въезд
    description: |
      Обработка заявлений, принятие решений и выдача виз и разрешений на въезд, включая электронное предварительное разрешение типа ETA.
    in_scope:
      - Обработка и рассмотрение визовых заявлений
      - Электронное разрешение на въезд
      - Проверка визового мошенничества
    out_of_scope:
      - Таможенный контроль товаров и торговый комплаенс (относится к управлению таможней и торговым комплаенсом)
  BC-3300.10.10:
    name: Обработка визовых заявлений
    description: |
      Приём, валидация и обработка визовых заявлений по различным категориям.
  BC-3300.10.20:
    name: Принятие визового решения
    description: |
      Принятие решений по визовым заявлениям, включая отказ и условия.
  BC-3300.10.30:
    name: Электронное разрешение на въезд
    description: |
      Выдача и отзыв предварительного разрешения типа ETA.
  BC-3300.10.40:
    name: Проверка визового мошенничества
    description: |
      Проверка заявлений на предмет мошенничества, фальсификации документов и аномалий в удостоверяющих документах.
  BC-3300.20:
    name: Пограничная инспекция и пропуск
    description: |
      Инспекция и пропуск путешественников в пунктах пропуска, включая первичный и вторичный досмотр.
  BC-3300.20.10:
    name: Обработка предварительной информации о пассажирах
    description: |
      Обработка данных API и PNR до прибытия путешественников.
  BC-3300.20.20:
    name: Первичный досмотр
    description: |
      Первичный досмотр в пунктах пропуска, включая биометрическую верификацию.
  BC-3300.20.30:
    name: Вторичный досмотр
    description: |
      Вторичный досмотр путешественников, требующих дополнительной проверки.
  BC-3300.20.40:
    name: Решение о пропуске или отказе
    description: |
      Принятие решений о пропуске, отказе во въезде и условиях въезда.
  BC-3300.30:
    name: Убежище и определение статуса беженца
    description: |
      Приём, рассмотрение и определение ходатайств об убежище в соответствии с Конвенцией 1951 года и национальными режимами защиты.
  BC-3300.30.10:
    name: Приём ходатайств об убежище
    description: |
      Приём и регистрация ходатайств об убежище на границе и на территории страны.
  BC-3300.30.20:
    name: Определение статуса беженца
    description: |
      Рассмотрение статуса беженца по Конвенции 1951 года и дополнительной защите.
  BC-3300.30.30:
    name: Координация приёма и поддержки просителей убежища
    description: |
      Координация приёма, размещения и базовой поддержки просителей убежища.
  BC-3300.30.40:
    name: Программы переселения и гуманитарных каналов
    description: |
      Работа программ переселения и гуманитарного допуска.
  BC-3300.40:
    name: Управление иммиграционным статусом и проживанием
    description: |
      Администрирование иммиграционного статуса на территории страны, включая виды на жительство, разрешения на работу и дела по воссоединению семей.
  BC-3300.40.10:
    name: Администрирование видов на жительство
    description: |
      Выдача и продление видов на жительство и биометрических карт резидента.
  BC-3300.40.20:
    name: Администрирование разрешений на работу
    description: |
      Администрирование разрешений на работу, лицензий спонсоров и тестов рынка труда.
  BC-3300.40.30:
    name: Обработка дел о воссоединении семей
    description: |
      Обработка заявлений о воссоединении семей и иждивенцев.
  BC-3300.40.40:
    name: Мониторинг соответствия иммиграционным условиям
    description: |
      Мониторинг соответствия иммиграционным условиям и изменений статуса.
  BC-3300.50:
    name: Управление натурализацией и гражданством
    description: |
      Рассмотрение заявлений о натурализации, гражданства по рождению или регистрации и дел о лишении гражданства.
  BC-3300.50.10:
    name: Обработка заявлений о натурализации
    description: |
      Обработка заявлений о натурализации и оценка добросовестности.
  BC-3300.50.20:
    name: Гражданство по рождению и регистрации
    description: |
      Определение гражданства по происхождению, регистрации и усыновлению.
  BC-3300.50.30:
    name: Администрирование гражданских церемоний и присяги
    description: |
      Проведение гражданских церемоний и приёма присяги на верность.
  BC-3300.50.40:
    name: Обработка дел о лишении гражданства
    description: |
      Рассмотрение дел о лишении, отказе и отзыве гражданства.
  BC-3300.60:
    name: Управление выдворением и содержанием под стражей
    description: |
      Содержание под стражей, выдворение и операции по добровольному возвращению лиц без иммиграционного статуса.
  BC-3300.60.10:
    name: Операции иммиграционного задержания
    description: |
      Работа центров иммиграционного задержания и стандарты содержания.
  BC-3300.60.20:
    name: Исполнение постановлений о выдворении
    description: |
      Исполнение постановлений о выдворении и депортации, включая сопровождаемое выдворение.
  BC-3300.60.30:
    name: Операции программы добровольного возвращения
    description: |
      Координация программ добровольного возвращения с помощью и реинтеграции.

# Управление запасными частями и послепродажным обслуживанием (ru) — translations for L1-spare-parts-aftermarket-management.yaml
locale: ru
source: L1-spare-parts-aftermarket-management.yaml
entries:
  BC-1060:
    name: Управление запасными частями и послепродажным обслуживанием
    description: |
      Поставка запасных частей, послепродажные продажи и услуги для установленного парка оборудования.
  BC-1060.10:
    name: Управление каталогом запасных частей
    description: |
      Каталог, идентификация, управление заменами запасных частей.
  BC-1060.10.10:
    name: Идентификация запасных частей
    description: |
      Идентификация деталей, включая иллюстрированные каталоги запасных частей.
  BC-1060.10.20:
    name: Управление заменами деталей
    description: |
      Управление заменами и эквивалентами деталей.
  BC-1060.10.30:
    name: Публикация каталога
    description: |
      Публикация и распространение каталогов запасных частей.
  BC-1060.20:
    name: Управление ценообразованием запасных частей
    description: |
      Ценовая стратегия, прейскурантные и индивидуальные цены.
  BC-1060.20.10:
    name: Ценовая стратегия для запасных частей
    description: |
      Ценовая стратегия и сегментация для запасных частей.
  BC-1060.20.20:
    name: Установление цен на детали
    description: |
      Установление прейскурантных и ценностно-ориентированных цен на запасные части.
  BC-1060.20.30:
    name: Индивидуальное ценообразование для клиентов
    description: |
      Индивидуальные и контрактные цены на детали для конкретных клиентов.
  BC-1060.30:
    name: Прогнозирование спроса на запасные части
    description: |
      Прогнозирование спроса на запасные части (медленно реализуемые, нерегулярный спрос).
  BC-1060.30.10:
    name: Прогнозирование нерегулярного спроса
    description: |
      Прогнозирование спроса на медленно реализуемые и нерегулярно потребляемые детали.
  BC-1060.30.20:
    name: Прогнозирование на основе данных об установленном парке
    description: |
      Прогнозирование спроса на основе данных об установленном парке оборудования.
  BC-1060.30.30:
    name: Plan складских запасов деталей
    description: |
      Планы складских запасов деталей в распределительных центрах.
  BC-1060.40:
    name: Управление послепродажными продажами
    description: |
      Коммерческие послепродажные продажи, продления, дополнительные продажи.
  BC-1060.40.10:
    name: Генерация послепродажных лидов
    description: |
      Генерация лидов послепродажного обслуживания на основе данных установленного парка.
  BC-1060.40.20:
    name: Управление послепродажными заказами
    description: |
      Приём и обработка послепродажных заказов.
  BC-1060.40.30:
    name: Перекрёстные и дополнительные продажи в послепродажном обслуживании
    description: |
      Перекрёстные и дополнительные продажи послепродажных продуктов и услуг.
  BC-1060.50:
    name: Управление сервисом и ремонтом
    description: |
      Ремонты, обменные агрегаты, восстановление.
  BC-1060.50.10:
    name: Операции центрального ремонтного цеха
    description: |
      Функционирование центральных ремонтных мастерских.
  BC-1060.50.20:
    name: Управление пулом обменных агрегатов
    description: |
      Управление пулами обменных и восстановленных агрегатов.
  BC-1060.50.30:
    name: Операции по восстановлению и капитальному ремонту
    description: |
      Восстановление, капитальный ремонт и повторная сертификация возвращённых деталей.
  BC-1060.60:
    name: Управление гарантией
    description: |
      Гарантийные права, претензии, регрессные требования.
  BC-1060.60.10:
    name: Управление гарантийной политикой
    description: |
      Определение условий, сроков и исключений гарантии.
  BC-1060.60.20:
    name: Обработка гарантийных претензий
    description: |
      Приём и рассмотрение гарантийных претензий клиентов.
  BC-1060.60.30:
    name: Регрессные требования к поставщикам по гарантии
    description: |
      Взыскание гарантийных расходов с поставщиков.
  BC-1060.60.40:
    name: Управление гарантийными резервами
    description: |
      Оценка и учёт гарантийных резервов.
  BC-1060.70:
    name: Управление установленным парком оборудования
    description: |
      Данные об установленном парке, подключённые активы, аналитика жизненного цикла.
  BC-1060.70.10:
    name: Управление данными установленного парка
    description: |
      Сбор и ведение данных об установленном парке оборудования.
  BC-1060.70.20:
    name: Операции с подключёнными активами
    description: |
      Эксплуатация подключённых активов и IoT-телеметрии.
  BC-1060.70.30:
    name: Аналитика установленного парка
    description: |
      Аналитика использования, состояния и жизненного цикла установленного парка.

# Регуляторное соответствие в телекоммуникациях (ru) — translations for L1-telecom-regulatory-compliance-management.yaml
locale: ru
source: L1-telecom-regulatory-compliance-management.yaml
entries:
  BC-2700:
    name: Регуляторное соответствие в телекоммуникациях
    description: |
      Отраслевые регуляторные обязательства телекоммуникационных операторов — универсальные услуги, законный перехват, хранение данных, экстренные службы, доступность, сетевой нейтралитет и отчётность об условиях лицензии.
  BC-2700.10:
    name: Управление обязательствами по универсальным услугам
    description: |
      Выполнение и отчётность по обязательствам в области универсальных услуг и связанным субсидиям.
  BC-2700.10.10:
    name: Планирование зон USO
    description: |
      Планирование охвата и качественных обязательств универсальных услуг по зонам.
  BC-2700.10.20:
    name: Отчётность по субсидиям USO
    description: |
      Отчётность о количестве субсидируемых абонентов и оказании услуг в фонды USO.
  BC-2700.10.30:
    name: Оказание услуг USO
    description: |
      Предоставление обязательных услуг USO, включая субсидированные тарифы и минимальные уровни сервиса.
  BC-2700.20:
    name: Управление законным перехватом
    description: |
      Предоставление и реализация возможностей законного перехвата по санкционированным ордерам.
  BC-2700.20.10:
    name: Provisioning законного перехвата
    description: |
      Настройка целей LI в сетевых элементах по санкционированным ордерам.
  BC-2700.20.20:
    name: Передача данных законного перехвата
    description: |
      Передача перехваченного контента и метаданных в объекты мониторинга правоохранительных органов.
  BC-2700.20.30:
    name: Аудит и контроль доступа LI
    description: |
      Контроль доступа и аудит деятельности LI для предотвращения несанкционированного использования.
  BC-2700.30:
    name: Управление хранением телекоммуникационных данных
    description: |
      Захват, безопасное хранение и санкционированное раскрытие сохранённых данных связи в соответствии с национальными режимами хранения данных.
  BC-2700.30.10:
    name: Захват сохраняемых данных
    description: |
      Захват данных связи, подлежащих хранению по обязательствам.
  BC-2700.30.20:
    name: Рабочий процесс доступа к сохранённым данным
    description: |
      Рабочий процесс санкционированных запросов на доступ к сохранённым данным со стороны компетентных органов.
  BC-2700.30.30:
    name: Уничтожение сохранённых данных
    description: |
      Уничтожение сохранённых данных по истечении сроков хранения.
  BC-2700.40:
    name: Управление экстренными службами
    description: |
      Маршрутизация экстренных вызовов, передача данных о местоположении и функции оповещения населения, установленные регуляторами.
  BC-2700.40.10:
    name: Маршрутизация экстренных вызовов
    description: |
      Маршрутизация экстренных вызовов в соответствующие пункты ответа на вызовы экстренных служб.
  BC-2700.40.20:
    name: Передача местоположения звонящего
    description: |
      Передача информации о местоположении звонящего в экстренные службы согласно стандартам E911, eCall и AML.
  BC-2700.40.30:
    name: Широковещательное оповещение населения
    description: |
      Рассылка предупреждений по сети Cell Broadcast и SMS при санкционированной активации.
  BC-2700.50:
    name: Управление доступностью в телекоммуникациях
    description: |
      Предоставление функций доступности и рассмотрение жалоб, связанных с доступностью, в соответствии с отраслевыми обязательствами.
  BC-2700.50.10:
    name: Поддержка RTT и TTY
    description: |
      Поддержка сервисов текста в реальном времени и TTY для глухих и слабослышащих пользователей.
  BC-2700.50.20:
    name: Предоставление функций доступности
    description: |
      Предоставление отраслевых функций доступности: услуги ретрансляции и доступные счета.
  BC-2700.50.30:
    name: Рассмотрение жалоб по доступности
    description: |
      Рассмотрение жалоб, связанных с доступностью, и предоставление обязательной отчётности регулятору.
  BC-2700.60:
    name: Сетевой нейтралитет и раскрытие управления трафиком
    description: |
      Раскрытие практики управления трафиком и соблюдение режимов сетевого нейтралитета.
  BC-2700.60.10:
    name: Раскрытие политики управления трафиком
    description: |
      Раскрытие практики управления трафиком клиентам и регуляторам.
  BC-2700.60.20:
    name: Прозрачность ограничения скорости
    description: |
      Прозрачная отчётность о практике ограничения скорости, приоритизации и нулевого рейтинга.
  BC-2700.60.30:
    name: Подача документов о сетевом нейтралитете
    description: |
      Подача отчётов регуляторам о практике сетевого нейтралитета и жалобах.
  BC-2700.70:
    name: Регуляторная отчётность в телекоммуникациях
    description: |
      Периодическая подача КПЭ, рыночных данных и отчётности о соответствии условиям лицензии регуляторам связи.
  BC-2700.70.10:
    name: Подача телекоммуникационных КПЭ
    description: |
      Представление обязательных КПЭ по охвату, качеству и производительности услуг.
  BC-2700.70.20:
    name: Подача рыночных данных в телекоммуникациях
    description: |
      Подача отчётности по рыночным данным об абонентах, выручке и трафике.
  BC-2700.70.30:
    name: Отчётность об условиях лицензии
    description: |
      Отчётность о соблюдении условий операционной лицензии, включая охват, развёртывание и качество.

# Управление фармацевтической цепочкой поставок (ru) — translations for L1-pharmaceutical-supply-chain-management.yaml
locale: ru
source: L1-pharmaceutical-supply-chain-management.yaml
entries:
  BC-1570:
    name: Управление фармацевтической цепочкой поставок
    description: |
      Холодовая цепь, сериализация, дистрибуция и логистика фармацевтической продукции. Обеспечивает соответствие требованиям GDP на всех этапах.
  BC-1570.10:
    name: Управление холодовой цепью
    description: |
      Цепь поставок с контролем температуры в соответствии с требованиями GDP.
  BC-1570.10.10:
    name: Проектирование холодовой цепи
    description: |
      Проектирование и квалификация решений для холодовой цепи.
  BC-1570.10.20:
    name: Мониторинг температуры
    description: |
      Сквозной мониторинг температуры по всей холодовой цепи.
  BC-1570.10.30:
    name: Управление температурными отклонениями
    description: |
      Расследование и оценка статуса при температурных отклонениях.
  BC-1570.20:
    name: Управление сериализацией и отслеживаемостью
    description: |
      Сериализация, агрегация и защита от фальсификаций фармацевтической продукции.
  BC-1570.20.10:
    name: Управление серийными номерами
    description: |
      Генерация и присвоение серийных номеров для каждого рынка.
  BC-1570.20.20:
    name: Управление агрегацией и иерархией
    description: |
      Агрегация сериализованных единиц в связки и паллеты.
  BC-1570.20.30:
    name: Регуляторная отчётность и верификация
    description: |
      Регуляторная отчётность (DSCSA, EU FMD) и верификация при отпуске.
  BC-1570.30:
    name: Управление фармацевтической дистрибуцией
    description: |
      Дистрибуция продукции оптовым дистрибьюторам, больницам и аптекам.
  BC-1570.30.10:
    name: Операции с оптовиками и дистрибьюторами
    description: |
      Дистрибуционные операции с оптовиками и дистрибьюторами.
  BC-1570.30.20:
    name: Прямая поставка в больницы
    description: |
      Прямые поставки в больницы и аптеки.
  BC-1570.30.30:
    name: Специализированная дистрибуция
    description: |
      Специализированная дистрибуция продуктов с ограниченным доступом.
  BC-1570.40:
    name: Управление фармацевтическими запасами
    description: |
      Управление запасами фармацевтической продукции, контроль сроков годности и распределение.
  BC-1570.40.10:
    name: Планирование фармацевтических запасов
    description: |
      Планирование запасов фармацевтической продукции.
  BC-1570.40.20:
    name: Управление сроками годности
    description: |
      Управление по принципу FEFO и мониторинг сроков годности.
  BC-1570.40.30:
    name: Распределение фармацевтической продукции
    description: |
      Распределение ограниченных поставок между рынками.
  BC-1570.40.40:
    name: Координация отзывов и изъятий
    description: |
      Координация операций по отзыву и изъятию продукции с рынка.
  BC-1570.50:
    name: Управление фармацевтической логистикой
    description: |
      Транспортировка, складирование и логистика в соответствии с требованиями GDP.
  BC-1570.50.10:
    name: Транспортировка в соответствии с GDP
    description: |
      Транспортные операции, соответствующие требованиям GDP.
  BC-1570.50.20:
    name: Складирование в соответствии с GDP
    description: |
      Складские операции, соответствующие требованиям GDP.
  BC-1570.50.30:
    name: Таможенные операции для фармацевтики
    description: |
      Таможенные операции и импортно-экспортные операции для фармацевтической продукции.
  BC-1570.50.40:
    name: Управление логистическими провайдерами
    description: |
      Управление провайдерами 3PL в фармацевтической цепочке поставок.

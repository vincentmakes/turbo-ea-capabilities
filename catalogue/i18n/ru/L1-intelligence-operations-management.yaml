# Управление разведывательными операциями (ru) — translations for L1-intelligence-operations-management.yaml
locale: ru
source: L1-intelligence-operations-management.yaml
entries:
  BC-1730:
    name: Управление разведывательными операциями
    description: |
      Сбор разведывательных данных, анализ, распространение и синтез разведывательной информации.
  BC-1730.10:
    name: Управление сбором разведывательных данных
    description: |
      Сбор данных HUMINT, SIGINT, GEOINT, IMINT, OSINT.
  BC-1730.10.10:
    name: Управление задачами по сбору данных
    description: |
      Определение и управление задачами по сбору разведывательных данных.
  BC-1730.10.20:
    name: Сбор данных HUMINT
    description: |
      Операции по сбору разведывательных данных через агентурную сеть.
  BC-1730.10.30:
    name: Сбор данных SIGINT
    description: |
      Операции по сбору разведывательных данных из технических источников.
  BC-1730.10.40:
    name: Сбор данных GEOINT и IMINT
    description: |
      Сбор геопространственной и оптической разведывательной информации.
  BC-1730.10.50:
    name: Сбор данных OSINT
    description: |
      Сбор и обработка разведывательных данных из открытых источников.
  BC-1730.20:
    name: Управление разведывательным анализом
    description: |
      Комплексный анализ, синтез данных и подготовка разведывательных продуктов.
  BC-1730.20.10:
    name: Комплексный разведывательный анализ
    description: |
      Комплексный анализ и оценка разведывательной информации.
  BC-1730.20.20:
    name: Синтез разведывательных данных
    description: |
      Синтез данных из нескольких источников в интегрированные оценки.
  BC-1730.20.30:
    name: Подготовка разведывательных продуктов
    description: |
      Подготовка разведывательных продуктов и оценок.
  BC-1730.20.40:
    name: Контроль качества разведывательных продуктов
    description: |
      Контроль качества разведывательных продуктов.
  BC-1730.30:
    name: Управление распространением разведывательных данных
    description: |
      Разведывательная отчётность, распространение данных и поддержка принятия решений.
  BC-1730.30.10:
    name: Разведывательная отчётность
    description: |
      Подготовка разведывательных докладов и брифингов.
  BC-1730.30.20:
    name: Управление доступом к разведывательным данным
    description: |
      Контроль доступа к разведывательным данным по принципу необходимости знать.
  BC-1730.30.30:
    name: Взаимодействие с потребителями разведки
    description: |
      Взаимодействие с потребителями разведывательной информации и получение обратной связи.
  BC-1730.40:
    name: Управление контрразведкой
    description: |
      Контрразведка, угрозы изнутри и выявление дезинформации.
  BC-1730.40.10:
    name: Контрразведывательные операции
    description: |
      Контрразведывательные операции против иностранных спецслужб.
  BC-1730.40.20:
    name: Программа выявления угроз изнутри
    description: |
      Выявление и управление внутренними угрозами.
  BC-1730.40.30:
    name: Выявление дезинформации и маскировки
    description: |
      Выявление деятельности по дезинформации и маскировке намерений.
  BC-1730.50:
    name: Управление источниками и методами разведки
    description: |
      Управление источниками, защита методов и профессионализм разведчика.
  BC-1730.50.10:
    name: Управление источниками
    description: |
      Управление и защита источников разведывательных данных.
  BC-1730.50.20:
    name: Управление стандартами разведывательного мастерства
    description: |
      Поддержание аналитических стандартов разведывательного мастерства (ICD 203).
  BC-1730.50.30:
    name: Защита методов разведки
    description: |
      Защита методов сбора разведывательных данных.

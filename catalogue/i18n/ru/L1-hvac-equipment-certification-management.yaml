# Управление сертификацией оборудования ОВКВ (ru) — translations for L1-hvac-equipment-certification-management.yaml
locale: ru
source: L1-hvac-equipment-certification-management.yaml
entries:
  BC-2030:
    name: Управление сертификацией оборудования ОВКВ
    description: |
      Многорегиональная сертификация продуктов ОВКВ — сертификация рабочих характеристик (AHRI, Eurovent), листинг по безопасности (UL, CSA, IEC 60335-2-40, CE), разрешения на хладагенты (F-Gas, EPA SNAP) и маркировка энергоэффективности (ENERGY STAR, EU Ecodesign/ErP, MEPS) — вплоть до лицензирования знаков, соответствия этикеток и надзора за стандартами.
    in_scope:
      - Стратегия и дорожная карта сертификации для рынков
      - Подача заявок на сертификацию рабочих характеристик и публикация рейтингов
      - Листинг безопасности оборудования и оценка соответствия для CE
      - Разрешение на хладагент на уровне продукта
      - Регистрация и соответствие маркировке энергоэффективности
      - Лицензирование знаков, соответствие художественного оформления этикеток и надзор за стандартами
    out_of_scope:
      - Операционный учёт хладагентов на установленном оборудовании (BC-2040)
      - Сертификация общей электрической/электронной продукции (BC-1910)
      - Расследование полевых несоответствий по результатам сервиса (BC-2060)
  BC-2030.10:
    name: Стратегия и дорожная карта сертификации
    description: |
      Определение объёма сертификации, схем и последовательности для целевых рынков.
  BC-2030.10.10:
    name: Анализ требований для выхода на рынок
    description: |
      Идентификация обязательств по сертификации и маркировке для целевых рынков.
  BC-2030.10.20:
    name: Выбор схем сертификации
    description: |
      Выбор схем сертификации и маршрутов взаимного признания для оборудования ОВКВ.
  BC-2030.10.30:
    name: Планирование дорожной карты сертификации
    description: |
      Упорядочение сертификаций по вехам запуска оборудования.
  BC-2030.20:
    name: Управление сертификацией рабочих характеристик
    description: |
      Взаимодействие с программами сертификации характеристик ОВКВ и публикация сертифицированных рейтингов.
  BC-2030.20.10:
    name: Координация программы испытаний характеристик
    description: |
      Координация рейтинговых испытаний оборудования с аккредитованными лабораториями.
  BC-2030.20.20:
    name: Подача рейтингов характеристик
    description: |
      Подача сертифицированных рейтингов в программы сертификации рабочих характеристик.
  BC-2030.20.30:
    name: Отслеживание выдачи знаков характеристик
    description: |
      Отслеживание выданных сертификатов характеристик и сроков их действия.
  BC-2030.20.40:
    name: Участие в добровольных программах
    description: |
      Участие в добровольных программах оценки характеристик и качества.
  BC-2030.30:
    name: Управление листингом безопасности оборудования
    description: |
      Взаимодействие со схемами листинга безопасности для оборудования ОВКВ в различных юрисдикциях.
  BC-2030.30.10:
    name: Подача заявок на листинг безопасности
    description: |
      Подача заявок на листинг по безопасности согласно IEC 60335-2-40 и аналогичным стандартам.
  BC-2030.30.20:
    name: Верификация соответствия стандартам безопасности
    description: |
      Верификация соответствия стандартам безопасности через внутренний аудит.
  BC-2030.30.30:
    name: Координация международных знаков безопасности
    description: |
      Координация множества национальных знаков безопасности и соглашений о взаимном признании.
  BC-2030.30.40:
    name: Управление полевыми модификациями безопасности
    description: |
      Управление полевыми модификациями безопасности и корректирующими действиями, влияющими на листинги.
  BC-2030.40:
    name: Управление соответствием по хладагентам
    description: |
      Разрешения на хладагенты на уровне продукта, соответствие фазовому выводу и раскрытие информации о веществах для сертификации.
  BC-2030.40.10:
    name: Отслеживание одобрения хладагентов
    description: |
      Отслеживание одобренных хладагентов для каждого семейства продуктов в разрезе юрисдикций.
  BC-2030.40.20:
    name: Соответствие графику вывода HFC
    description: |
      Соответствие графикам фазового вывода HFC и обязательствам по Кигальской поправке на уровне продукта.
  BC-2030.40.30:
    name: Учётные записи по GWP и ODP
    description: |
      Записи о потенциале глобального потепления и разрушения озонового слоя относительно нормативных порогов.
  BC-2030.40.40:
    name: Отчётность о веществах в хладагентах
    description: |
      Отчётность о веществах, требуемая в досье по сертификации продукта.
  BC-2030.50:
    name: Управление маркировкой энергоэффективности
    description: |
      Регистрация и постоянное соответствие программам маркировки и минимальных требований к эффективности.
  BC-2030.50.10:
    name: Регистрация энергетической маркировки
    description: |
      Регистрация энергетических этикеток оборудования в национальных программах.
  BC-2030.50.20:
    name: Соответствие требованиям Ecodesign
    description: |
      Соответствие требованиям EU Ecodesign и аналогичным режимам.
  BC-2030.50.30:
    name: Соответствие минимальным стандартам эффективности
    description: |
      Соответствие минимальным стандартам эффективности на всех рынках.
  BC-2030.50.40:
    name: Участие в добровольных экомаркировках
    description: |
      Участие в добровольных программах экомаркировки для устойчивого оборудования.
  BC-2030.60:
    name: Управление знаками и этикетками сертификации
    description: |
      Управление жизненным циклом знаков сертификации и художественного оформления этикеток на продукте.
  BC-2030.60.10:
    name: Выдача знаков
    description: |
      Выдача и нанесение знаков сертификации на продукт.
  BC-2030.60.20:
    name: Продление знаков
    description: |
      Продление знаков сертификации до истечения срока действия.
  BC-2030.60.30:
    name: Отзыв знаков
    description: |
      Отзыв знаков сертификации для снятого с производства или несоответствующего оборудования.
  BC-2030.60.40:
    name: Соответствие этикеток на продукте
    description: |
      Контроль художественного оформления этикеток на продукте согласно утверждённому содержанию сертификации.
  BC-2030.70:
    name: Управление надзором за стандартами
    description: |
      Надзор за стандартами и нормативными актами ОВКВ с оценкой влияния и информированием о дорожной карте.
  BC-2030.70.10:
    name: Мониторинг стандартов ОВКВ
    description: |
      Мониторинг разрабатываемых и пересматриваемых стандартов ОВКВ.
  BC-2030.70.20:
    name: Оценка влияния изменений стандартов
    description: |
      Оценка влияния изменений стандартов на действующие сертификации.
  BC-2030.70.30:
    name: Участие в отраслевых органах
    description: |
      Участие в отраслевых организациях по стандартизации и технических комитетах.
  BC-2030.70.40:
    name: Информирование о дорожной карте стандартов
    description: |
      Информирование инженерных и продуктовых команд о дорожных картах стандартов.

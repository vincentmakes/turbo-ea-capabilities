# Правовое управление (ru) — translations for L1-legal-management.yaml
locale: ru
source: L1-legal-management.yaml
entries:
  BC-150:
    name: Правовое управление
    description: |
      Правовое консультирование, договорная работа, судебные споры и корпоративно-правовые вопросы.
  BC-150.10:
    name: Управление договорами
    description: |
      Жизненный цикл договора от разработки до закрытия.
  BC-150.10.10:
    name: Разработка договоров и шаблонов
    description: |
      Ведение библиотеки условий, шаблонов и сборников договорных позиций.
  BC-150.10.20:
    name: Поддержка договорных переговоров
    description: |
      Юридическое сопровождение переговоров, правки текстов и позиционирования по рискам.
  BC-150.10.30:
    name: Управление исполнением договоров
    description: |
      Процедуры согласования, подписание и контроль исполнения договоров.
  BC-150.10.40:
    name: Репозиторий договоров и мониторинг обязательств
    description: |
      Центральный репозиторий, ключевые даты и мониторинг договорных обязательств.
  BC-150.10.50:
    name: Пролонгация и прекращение договоров
    description: |
      Администрирование пролонгации, внесения изменений и прекращения договоров.
  BC-150.20:
    name: Управление судебными спорами и разногласиями
    description: |
      Споры, судебное разбирательство, арбитраж.
  BC-150.20.10:
    name: Урегулирование споров до обращения в суд
    description: |
      Досудебные претензии, медиация и переговоры.
  BC-150.20.20:
    name: Управление судебными делами
    description: |
      Сквозное ведение судебных дел.
  BC-150.20.30:
    name: Арбитраж и альтернативные способы разрешения споров
    description: |
      Арбитраж, медиация и другие механизмы альтернативного разрешения споров.
  BC-150.20.40:
    name: Правовое удержание и электронное раскрытие
    description: |
      Уведомления о правовом удержании, хранение и электронное раскрытие информации.
  BC-150.30:
    name: Корпоративное и коммерческое право
    description: |
      Корпоративное право, юридическое сопровождение M&A, коммерческие сделки.
  BC-150.30.10:
    name: Консультирование по корпоративному праву
    description: |
      Консультации по корпоративному праву, корпоративному управлению и структурированию юридических лиц.
  BC-150.30.20:
    name: Юридическое сопровождение M&A
    description: |
      Правовой due diligence, документация по сделке и её закрытие.
  BC-150.30.30:
    name: Консультирование по коммерческим сделкам
    description: |
      Юридическое сопровождение коммерческих сделок, партнёрств и лицензирования.
  BC-150.30.40:
    name: Консультирование по ценным бумагам и рынкам капитала
    description: |
      Законодательство о ценных бумагах, листинг и сделки на рынках капитала.
  BC-150.40:
    name: Правовые вопросы взаимодействия с регуляторами
    description: |
      Правовое толкование нормативных актов, взаимодействие с регуляторами.
  BC-150.40.10:
    name: Правовое толкование нормативных актов
    description: |
      Правовые заключения о применимости и толковании нормативных актов.
  BC-150.40.20:
    name: Связь с регуляторами и подача документов
    description: |
      Юридическое сопровождение взаимодействия с регуляторами и официальных обращений.
  BC-150.40.30:
    name: Правовое сопровождение в сфере GR
    description: |
      Юридическое сопровождение лоббирования, публичных консультаций и защиты позиций.
  BC-150.50:
    name: Управление операционной деятельностью юридической службы
    description: |
      Операции юридического департамента, электронное биллинг, управление делами.
  BC-150.50.10:
    name: Управление юридическими делами
    description: |
      Приём, распределение и отслеживание жизненного цикла юридических дел.
  BC-150.50.20:
    name: Управление внешними юридическими советниками
    description: |
      Управление панелью внешних консультантов, взаимодействие и оценка результативности.
  BC-150.50.30:
    name: Управление юридическими расходами и электронным биллингом
    description: |
      Бюджетирование юридических расходов, электронный биллинг и аналитика затрат.
  BC-150.50.40:
    name: Управление правовыми знаниями
    description: |
      Прецеденты, ноу-хау и применение правовых технологий.

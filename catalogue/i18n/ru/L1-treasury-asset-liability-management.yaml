# Управление казначейством и активами и пассивами (ru) — translations for L1-treasury-asset-liability-management.yaml
locale: ru
source: L1-treasury-asset-liability-management.yaml
entries:
  BC-1360:
    name: Управление казначейством и активами и пассивами
    description: |
      Банковское казначейство, управление активами и пассивами, трансфертное ценообразование, ликвидность, процентный риск банковского портфеля.
  BC-1360.10:
    name: Управление банковской ликвидностью
    description: |
      Банковская ликвидность, внутридневная ликвидность, LCR/NSFR.
  BC-1360.10.10:
    name: Управление коэффициентом покрытия ликвидности
    description: |
      Расчёт, мониторинг и отчётность LCR в соответствии с Базелем III.
  BC-1360.10.20:
    name: Управление показателем чистого стабильного финансирования
    description: |
      Расчёт NSFR и управление структурным финансированием.
  BC-1360.10.30:
    name: Управление внутридневной ликвидностью
    description: |
      Мониторинг внутридневной ликвидности по платёжным системам.
  BC-1360.10.40:
    name: Управление высококачественными ликвидными активами
    description: |
      Ведение и управление портфелем высококачественных ликвидных активов (HQLA).
  BC-1360.20:
    name: Управление активами и пассивами
    description: |
      Управление активами и пассивами, управление балансом, гэп-анализ.
  BC-1360.20.10:
    name: Управление балансом
    description: |
      Стратегическое управление и оптимизация баланса.
  BC-1360.20.20:
    name: Гэп-анализ
    description: |
      Гэп-анализ переоценки и ликвидности по балансу.
  BC-1360.20.30:
    name: Поведенческое моделирование
    description: |
      Поведенческое моделирование депозитов до востребования и досрочного погашения.
  BC-1360.20.40:
    name: Стресс-тестирование активов и пассивов
    description: |
      Стресс-тестирование несоответствий активов и пассивов.
  BC-1360.30:
    name: Управление трансфертным ценообразованием фондирования
    description: |
      Трансфертное ценообразование фондирования, внутреннее ценообразование средств.
  BC-1360.30.10:
    name: Управление методологией трансфертного ценообразования
    description: |
      Ведение методологии трансфертного ценообразования и построение кривых.
  BC-1360.30.20:
    name: Применение ставок трансфертного ценообразования
    description: |
      Применение ставок трансфертного ценообразования к продуктам и контрактам.
  BC-1360.30.30:
    name: Отчётность и аналитика трансфертного ценообразования
    description: |
      Отчётность по трансфертному ценообразованию и анализ влияния на прибыльность.
  BC-1360.40:
    name: Управление фондированием банка
    description: |
      Оптовое фондирование, привлечение депозитов, фондирование через рынки капитала.
  BC-1360.40.10:
    name: Управление оптовым фондированием
    description: |
      Управление необеспеченным и обеспеченным оптовым фондированием.
  BC-1360.40.20:
    name: Фондирование через рынки капитала
    description: |
      Выпуск облигаций, MTN, покрытых облигаций и секьюритизации.
  BC-1360.40.30:
    name: Операции с инструментами центрального банка
    description: |
      Использование инструментов центрального банка и управление обеспечением.
  BC-1360.40.40:
    name: Управление планом фондирования
    description: |
      Годовой план фондирования и исполнение в соответствии с планом.
  BC-1360.50:
    name: Управление процентным риском банковского портфеля
    description: |
      IRRBB, процентная подверженность банковского портфеля.
  BC-1360.50.10:
    name: Измерение IRRBB
    description: |
      Измерение чувствительностей EVE и NII для IRRBB.
  BC-1360.50.20:
    name: Хеджирование IRRBB
    description: |
      Хеджирование процентного риска банковского портфеля.
  BC-1360.50.30:
    name: Отчётность по IRRBB
    description: |
      Регуляторная и управленческая отчётность по IRRBB.

# Управление транспортным парком (ru) — translations for L1-fleet-mobile-asset-management.yaml
locale: ru
source: L1-fleet-mobile-asset-management.yaml
entries:
  BC-2430:
    name: Управление транспортным парком и мобильными активами
    description: |
      Комплектование, техническое обслуживание, использование и утилизация транспортных
      средств, судов, воздушных судов, подвижного состава и пула оборудования —
      контейнеров, трейлеров и ULD.
  BC-2430.10:
    name: Управление приобретением и утилизацией транспортного парка
    description: |
      Спецификация, приобретение, лизинг, фрахт и утилизация мобильных активов
      в конце срока службы.
    in_scope:
      - Закупки транспортных средств, судов, воздушных судов и подвижного состава
      - Договорённости о мокром, сухом и bareboat-фрахте
      - Решения о конце срока службы и перепродаже
    out_of_scope:
      - Общие закупки косвенных товаров (BC-500)
      - Учёт основных средств (BC-200)
  BC-2430.10.10:
    name: Спецификация и закупка транспортного парка
    description: |
      Разработка спецификаций и закупка новых транспортных активов.
  BC-2430.10.20:
    name: Управление лизингом и фрахтом
    description: |
      Операционный и финансовый лизинг, а также чартерные соглашения для активов парка.
  BC-2430.10.30:
    name: Утилизация в конце срока службы
    description: |
      Перепродажа, утилизация и переработка выведенных из эксплуатации активов парка.
  BC-2430.20:
    name: Управление техническим обслуживанием парка
    description: |
      Профилактическое, корректирующее и капитальное техническое обслуживание
      транспортных средств, судов, воздушных судов и подвижного состава.
  BC-2430.20.10:
    name: Планирование профилактического обслуживания
    description: |
      Планирование профилактического технического обслуживания по времени и состоянию.
  BC-2430.20.20:
    name: Выполнение корректирующего обслуживания
    description: |
      Ремонт поломок и корректирующие работы на мобильных активах.
  BC-2430.20.30:
    name: Соблюдение требований обязательных инспекций
    description: |
      Соблюдение требований законодательных инспекций и директив
      по лётной или мореходной годности.
  BC-2430.20.40:
    name: Капитальный ремонт и техосмотр
    description: |
      Капитальный ремонт, постановка в сухой dok и плановые проверки.
  BC-2430.30:
    name: Управление пулом оборудования
    description: |
      Управление пулом контейнеров, трейлеров, шасси и ULD
      по депо, клиентам и партнёрам.
  BC-2430.30.10:
    name: Управление пулом контейнеров
    description: |
      Отслеживание и балансировка флота контейнеров по депо.
  BC-2430.30.20:
    name: Управление пулом трейлеров и шасси
    description: |
      Управление пулом трейлеров и шасси, включая совместное использование пулов.
  BC-2430.30.30:
    name: Управление пулом ULD
    description: |
      Отслеживание, ремонт и балансировка ULD по станциям.
  BC-2430.30.40:
    name: Операции по репозиционированию порожнего оборудования
    description: |
      Выполнение перемещений порожнего оборудования между избыточными и дефицитными депо.
  BC-2430.40:
    name: Телематика и мониторинг транспортного парка
    description: |
      Непрерывный мониторинг местоположения, состояния активов и поведения
      операторов для обеспечения обслуживания и операций.
  BC-2430.40.10:
    name: Операции телематики транспортного парка
    description: |
      Эксплуатация телематических платформ, обрабатывающих данные о местоположении и двигателе.
  BC-2430.40.20:
    name: Мониторинг состояния активов
    description: |
      Мониторинг состояния мобильных активов, включая статус рефрижераторов и груза.
  BC-2430.40.30:
    name: Мониторинг поведения водителей
    description: |
      Мониторинг сигналов поведения водителей: резкое торможение и превышение скорости.
  BC-2430.50:
    name: Управление соответствием и сертификацией парка
    description: |
      Регистрация, сертификация и соответствие экологическим требованиям
      транспортных активов у регуляторов и классификационных обществ.
  BC-2430.50.10:
    name: Регистрация транспортных средств, судов и воздушных судов
    description: |
      Первичная и постоянная регистрация в национальных и международных органах.
  BC-2430.50.20:
    name: Обязательные инспекции и сертификация
    description: |
      Классификационные, лётные и технические сертификаты и аудиты.
  BC-2430.50.30:
    name: Экологическое соответствие и выбросы
    description: |
      Соблюдение требований по выбросам транспортных средств, судов и воздушных судов.
  BC-2430.60:
    name: Управление использованием и эффективностью парка
    description: |
      Измерение коэффициента использования активов, времени оборота и совокупной
      стоимости владения для принятия решений по парку.
  BC-2430.60.10:
    name: Отчётность по использованию активов
    description: |
      Отчётность по использованию по типу актива, маршруту и депо.
  BC-2430.60.20:
    name: Анализ времени оборота оборудования
    description: |
      Анализ времени оборота контейнеров, трейлеров и ULD.
  BC-2430.60.30:
    name: Анализ совокупной стоимости владения
    description: |
      Анализ совокупной стоимости владения по типам парка и поставщикам.

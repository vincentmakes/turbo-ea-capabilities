# Оценка и экспертиза недвижимости (ru) — translations for L1-real-estate-valuation-appraisal-management.yaml
locale: ru
source: L1-real-estate-valuation-appraisal-management.yaml
entries:
  BC-4970:
    name: Оценка и экспертиза недвижимости
    description: |
      Дисциплина оценки и экспертизы активов и портфелей недвижимости —
      приём заявок, обследование объектов, подборка сопоставимых
      данных, применение сравнительного, доходного и затратного
      подходов, подготовка и подписание отчётов, периодическая
      переоценка портфеля по рыночной стоимости и контроль качества
      в соответствии с USPAP, Red Book RICS и IVS.
    in_scope:
      - Приём заявок, согласование объёма, проверка конфликтов и письма об условиях
      - Обследование объекта и измерение по стандарту IPMS
      - Подборка данных о сопоставимых сделках и бенчмарки доходности
      - Сравнительный, доходный с капитализацией, DCF и затратный подходы
      - Составление и подписание отчётов в соответствии с Red Book / USPAP
      - Периодическая переоценка портфеля и переоценка залогового обеспечения кредитора
      - Внутреннее выборочное обеспечение качества, экспертная проверка и ответы на аудит
    out_of_scope:
      - Андеррайтинг приобретений принципалами (BC-4930)
      - Расчёт NAV на уровне фонда (BC-4910)
      - Оспаривание оценок по налогу на имущество (BC-4920)
      - Брокерское мнение о стоимости как брокерский продукт (BC-4960)
  BC-4970.10:
    name: Управление заявками на оценку
    description: |
      Приём, согласование объёма, проверка конфликтов и выставление
      писем об условиях по входящим заявкам на оценку от клиентов и
      кредиторов.
  BC-4970.10.10:
    name: Приём заявок и согласование объёма
    description: |
      Приём заявок на оценку и определение объёма и цели оценки.
  BC-4970.10.20:
    name: Проверка конфликтов и независимости оценщика
    description: |
      Проверка конфликтов интересов и независимости оценщика по
      новым заявкам.
  BC-4970.10.30:
    name: Вознаграждение и выставление письма об условиях
    description: |
      Определение и выставление вознаграждения и писем об условиях
      клиентам.
  BC-4970.20:
    name: Обследование объекта и сбор данных
    description: |
      Выезды для обследования, измерение здания по стандарту IPMS и
      фиксация данных о состоянии и дефектах объектов.
  BC-4970.20.10:
    name: Проведение обследования объекта
    description: |
      Проведение обследований объектов квалифицированными
      оценщиками.
  BC-4970.20.20:
    name: Измерение здания по IPMS
    description: |
      Измерение зданий и арендуемых площадей в соответствии с IPMS
      и местными стандартами измерений.
  BC-4970.20.30:
    name: Фиксация состояния и дефектов
    description: |
      Фиксация состояния здания и дефектов, выявленных при
      обследовании.
  BC-4970.30:
    name: Рыночные данные и подборка сопоставимых сделок
    description: |
      Поиск и подборка данных о сопоставимых сделках, рыночных
      индексах и бенчмарках доходности для обоснования выводов
      об оценке.
  BC-4970.30.10:
    name: Сбор данных о сопоставимых сделках
    description: |
      Сбор данных о сопоставимых сделках из рыночных источников и
      внутренних баз данных.
  BC-4970.30.20:
    name: Рыночные индексы и бенчмарки доходности
    description: |
      Ведение рыночных индексов и бенчмарков доходности по секторам
      и географии.
  BC-4970.30.30:
    name: Управление корректировками по сопоставимым сделкам
    description: |
      Управление корректировками по сопоставимым сделкам с учётом
      времени, местоположения, состояния и качества.
  BC-4970.40:
    name: Применение подходов к оценке
    description: |
      Применение признанных подходов к оценке — сравнительного,
      доходного с капитализацией, DCF и затратного — к оцениваемому
      объекту.
  BC-4970.40.10:
    name: Сравнительный подход
    description: |
      Применение сравнительного подхода с использованием данных о
      сопоставимых сделках.
  BC-4970.40.20:
    name: Доходный подход с капитализацией
    description: |
      Применение доходного подхода с капитализацией с использованием
      NOI и данных о доходности.
  BC-4970.40.30:
    name: Подход дисконтированных денежных потоков
    description: |
      Применение подхода DCF для доходных объектов с
      многолетними прогнозами.
  BC-4970.40.40:
    name: Затратный подход
    description: |
      Применение затратного подхода с использованием восстановительной
      стоимости и анализа амортизации.
  BC-4970.50:
    name: Подготовка и подписание отчётов об оценке
    description: |
      Составление, внутренняя проверка и подписание отчётов об оценке
      в соответствии со стандартами USPAP, Red Book и IVS.
  BC-4970.50.10:
    name: Составление отчёта об оценке
    description: |
      Составление отчётов об оценке в соответствии с согласованным
      объёмом и целью.
  BC-4970.50.20:
    name: Подписание проверяющего и контроль качества
    description: |
      Подписание проверяющего и контроль качества отчётов об оценке
      до выдачи.
  BC-4970.50.30:
    name: Выдача и управление повторной выдачей отчётов
    description: |
      Выдача отчётов об оценке и управление повторной выдачей и
      дополнениями.
  BC-4970.60:
    name: Периодическая переоценка портфеля и подача в индексы
    description: |
      Периодическая переоценка портфелей для фондов и кредиторов и
      представление данных об оценке в индексы и бенчмарки.
  BC-4970.60.10:
    name: Периодическая переоценка портфеля
    description: |
      Периодическая переоценка портфелей фондов и владельцев по
      договорному циклу.
  BC-4970.60.20:
    name: Переоценка залогового обеспечения кредитора
    description: |
      Переоценка залогового обеспечения кредитора, включая триггеры
      ковенантов и стресс-тестирования.
  BC-4970.60.30:
    name: Отчётность в индексы и бенчмарки
    description: |
      Представление данных об оценке в NCREIF, MSCI и другие
      индексы результативности.
  BC-4970.70:
    name: Контроль качества и аудит оценок
    description: |
      Внутренняя выборочная проверка, экспертный анализ и реагирование
      на аудиты клиентов и регуляторов по выданным оценкам.
  BC-4970.70.10:
    name: Внутренняя выборочная проверка
    description: |
      Выборочная проверка выданных оценок для внутреннего контроля
      качества.
  BC-4970.70.20:
    name: Экспертная проверка оценок
    description: |
      Проведение экспертной проверки сложных и высокостоимостных
      оценок.
  BC-4970.70.30:
    name: Ответы на аудит регуляторов и клиентов
    description: |
      Ответы на запросы регуляторов и клиентов об аудите выданных
      оценок.

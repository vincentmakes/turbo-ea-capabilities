# Управление маршрутными сборами (ru) — translations for L1-route-charges-management.yaml
locale: ru
source: L1-route-charges-management.yaml
entries:
  BC-1270:
    name: Управление маршрутными сборами
    description: |
      Расчёт, выставление счетов и взыскание аэронавигационных сборов с пользователей воздушного пространства.
  BC-1270.10:
    name: Управление зонами начисления сборов
    description: |
      Определение зон начисления сборов, правила выставления счетов, установление единичных ставок.
  BC-1270.10.10:
    name: Определение зон начисления сборов
    description: |
      Определение маршрутных и терминальных зон начисления сборов.
  BC-1270.10.20:
    name: Расчёт единичных ставок
    description: |
      Расчёт и утверждение единичных ставок по зонам начисления сборов.
  BC-1270.10.30:
    name: Управление правилами начисления сборов
    description: |
      Ведение расчётных формул и правил об освобождении от сборов.
  BC-1270.20:
    name: Управление расчётом маршрутных сборов
    description: |
      Расчёт маршрутных сборов на основе данных о полёте.
  BC-1270.20.10:
    name: Сбор данных о полёте для начисления сборов
    description: |
      Сбор входных данных о полёте для расчётного механизма.
  BC-1270.20.20:
    name: Расчёт расстояния и массы
    description: |
      Расчёт оплачиваемого расстояния и весовых коэффициентов.
  BC-1270.20.30:
    name: Расчёт сборов
    description: |
      Применение единичной ставки для определения маршрутных сборов за полёт.
  BC-1270.30:
    name: Управление взысканием сборов
    description: |
      Выставление счетов, взыскание, обработка платежей, напоминания.
  BC-1270.30.10:
    name: Выставление счетов за сборы
    description: |
      Формирование ежемесячных счетов за маршрутные сборы.
  BC-1270.30.20:
    name: Обработка платежей
    description: |
      Приём и обработка платежей от пользователей воздушного пространства.
  BC-1270.30.30:
    name: Напоминания и взыскание задолженности
    description: |
      Напоминания, взыскание и применение мер к просроченным задолженностям.
  BC-1270.40:
    name: Управление счетами авиакомпаний
    description: |
      Счета пользователей воздушного пространства, выписки, урегулирование споров.
  BC-1270.40.10:
    name: Ведение счетов пользователей воздушного пространства
    description: |
      Ведение основных данных счетов пользователей воздушного пространства.
  BC-1270.40.20:
    name: Предоставление выписок и отчётов
    description: |
      Предоставление выписок и отчётов по счетам пользователям.
  BC-1270.40.30:
    name: Урегулирование споров по сборам
    description: |
      Урегулирование споров и претензий на корректировку сборов.
  BC-1270.50:
    name: Управление отчётностью и сверкой сборов
    description: |
      Отчётность для регуляторов, сверки в формате Евроконтроля.
  BC-1270.50.10:
    name: Отчётность для регуляторов и сетевых менеджеров
    description: |
      Отчётность для регуляторов и эквивалентных Евроконтролю сетевых менеджеров.
  BC-1270.50.20:
    name: Сверка сборов
    description: |
      Сверка между данными о полётах и расчётами сборов.
  BC-1270.50.30:
    name: Мониторинг возмещения затрат
    description: |
      Мониторинг возмещения затрат в сравнении с утверждённой базой затрат.

# Учёт потребления (ru) — translations for L1-utility-customer-metering-management.yaml
locale: ru
source: L1-utility-customer-metering-management.yaml
entries:
  BC-3910:
    name: Учёт потребления коммунальных услуг
    description: |
      Специфические для коммунальной отрасли операции с клиентами и приборами учёта — от точки поставки до формирования расчётных данных: управление лицевыми счетами, реестр приборов учёта, сбор данных AMI и интеллектуальных счётчиков, снятие и проверка показаний, подготовка к выставлению счётов, подключение и отключение от услуг, а также защита уязвимых потребителей.
  BC-3910.10:
    name: Управление лицевыми счетами потребителей
    description: |
      Жизненный цикл лицевого счёта коммунального потребителя: идентификаторы точек поставки, смена жильцов и присвоение тарифов.
  BC-3910.10.10:
    name: Регистрация точек поставки
    description: |
      Регистрация и ведение идентификаторов точек поставки (MPAN, MPRN, SPID).
  BC-3910.10.20:
    name: Операции смены жильцов
    description: |
      Обработка въезда, выезда и смены арендатора по точкам поставки.
  BC-3910.10.30:
    name: Присвоение тарифа потребителю
    description: |
      Отнесение потребителей к действующим тарифным расписаниям и продуктовым опциям.
  BC-3910.20:
    name: Управление активами приборов учёта
    description: |
      Управление жизненным циклом физических приборов учёта и коммуникационного оборудования, включая складирование, монтаж, замену и снятие.
  BC-3910.20.10:
    name: Управление запасами приборов учёта
    description: |
      Управление запасами, вводом в эксплуатацию и списанием приборов учёта.
  BC-3910.20.20:
    name: Монтаж приборов учёта
    description: |
      Полевой монтаж новых и заменяемых приборов учёта.
  BC-3910.20.30:
    name: Снятие и утилизация приборов учёта
    description: |
      Снятие, восстановительный ремонт и утилизация приборов учёта по истечении срока службы.
  BC-3910.30:
    name: Сбор данных AMI
    description: |
      Получение данных с продвинутой измерительной инфраструктуры через головные системы, сети связи и системы управления данными приборов учёта.
    in_scope:
      - Эксплуатация головной системы интеллектуальных счётчиков
      - Мониторинг коммуникационной сети и концентраторов
      - Приём данных системы управления данными приборов учёта
    out_of_scope:
      - Физический монтаж приборов учёта (BC-3910.20.20)
      - Агрегированный торговый спрос (BC-3850.30.10)
  BC-3910.30.10:
    name: Эксплуатация головной системы
    description: |
      Обслуживание головных систем интеллектуальных счётчиков и рассылка команд.
  BC-3910.30.20:
    name: Эксплуатация коммуникационных сетей AMI
    description: |
      Обслуживание радиочастотных, PLC и сотовых коммуникационных сетей AMI и концентраторов.
  BC-3910.30.30:
    name: Приём данных в систему управления
    description: |
      Приём интервальных и интегральных показаний в систему управления данными приборов учёта.
  BC-3910.40:
    name: Снятие и проверка показаний
    description: |
      Циклическое и событийное снятие показаний, проверка, оценка и корректировка данных потребления.
  BC-3910.40.10:
    name: Ручное и маршрутное снятие показаний
    description: |
      Пешеходные, маршрутные и AMR-считывания для приборов без AMI.
  BC-3910.40.20:
    name: Проверка, оценка и корректировка
    description: |
      Обработка VEE для интегральных и интервальных показаний для получения расчётных данных.
  BC-3910.40.30:
    name: Агрегирование потребления
    description: |
      Суммирование потребления по расчётным периодам и профилям урегулирования.
  BC-3910.50:
    name: Операции «от счётчика до выставления счёта»
    description: |
      Специфические для коммунальной отрасли операции по подготовке данных потребления к выставлению счетов и контролю выручки, включая обработку расчётных исключений и выявление утечек дохода.
  BC-3910.50.10:
    name: Подготовка расчётных детерминантов
    description: |
      Формирование расчётных детерминантов — потребления, мощности и реактивной энергии — для биллинговых систем.
  BC-3910.50.20:
    name: Обработка расчётных исключений
    description: |
      Расследование и устранение расчётных исключений и аномалий данных приборов учёта.
  BC-3910.50.30:
    name: Защита доходов
    description: |
      Выявление и полевое расследование вмешательства в работу приборов учёта, хищения энергии или воды.
  BC-3910.60:
    name: Подключение и отключение от услуг
    description: |
      Активация, деактивация и режим предоплаты для коммунальных услуг.
  BC-3910.60.10:
    name: Активация подачи ресурса
    description: |
      Активация новых и повторных подключений, включая дистанционное подключение.
  BC-3910.60.20:
    name: Отключение за неплатёж
    description: |
      Процедуры отключения с соблюдением законодательных и регуляторных норм защиты.
  BC-3910.60.30:
    name: Операции в режиме предоплаты
    description: |
      Управление предоплатными приборами учёта и каналами пополнения.
  BC-3910.70:
    name: Управление уязвимыми потребителями
    description: |
      Выявление и защита потребителей в уязвимом положении, включая реестры приоритетного обслуживания и программы доступности услуг.
  BC-3910.70.10:
    name: Ведение реестра приоритетного обслуживания
    description: |
      Ведение реестра приоритетного обслуживания и флагов адресной поддержки.
  BC-3910.70.20:
    name: Программы помощи малоимущим и доступности услуг
    description: |
      Администрирование социальных тарифов и программ фонда помощи для коммунальных потребителей.
  BC-3910.70.30:
    name: Управление счетами потребителей медицинского оборудования
    description: |
      Учёт потребителей, использующих медицинское или диализное оборудование, при планировании отключений.

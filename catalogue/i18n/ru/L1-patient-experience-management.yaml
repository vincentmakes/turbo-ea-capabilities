# Опыт пациента (ru) — translations for L1-patient-experience-management.yaml
locale: ru
source: L1-patient-experience-management.yaml
entries:
  BC-2910:
    name: Опыт пациента
    description: |
      Вовлечённость пациентов, цифровые сервисы, измерение удовлетворённости, защита прав и рассмотрение жалоб, права пациентов и биоэтика, а также волонтёрские и вспомогательные службы.
  BC-2910.10:
    name: Вовлечённость и коммуникация с пациентами
    description: |
      Многоканальная коммуникация с пациентами и их семьями, включая просветительскую работу и языковые услуги.
  BC-2910.10.10:
    name: Многоканальная коммуникация с пациентами
    description: |
      Координированная коммуникация с пациентами по телефону, защищённой почте, обычной почте и цифровым каналам.
  BC-2910.10.20:
    name: Санитарное просвещение
    description: |
      Обучение пациентов заболеваниям, лечению и профилактике.
  BC-2910.10.30:
    name: Коммуникация с семьёй и ухаживающими лицами
    description: |
      Коммуникация с семьями и уполномоченными ухаживающими лицами в процессе лечения.
  BC-2910.10.40:
    name: Языковые и переводческие услуги
    description: |
      Предоставление услуг устного и письменного перевода.
  BC-2910.20:
    name: Пациентский портал и цифровые сервисы
    description: |
      Эксплуатация цифровых сервисов для пациентов, включая порталы, мобильные приложения и инструменты самообслуживания.
  BC-2910.20.10:
    name: Операции пациентского портала
    description: |
      Эксплуатация пациентского портала, включая обмен сообщениями и доступ к записям.
  BC-2910.20.20:
    name: Операции мобильных медицинских приложений
    description: |
      Эксплуатация мобильных медицинских приложений для пациентов.
  BC-2910.20.30:
    name: Инструменты самообслуживания пациентов
    description: |
      Инструменты самостоятельной записи, оплаты и предварительного заполнения форм.
  BC-2910.20.40:
    name: Управление цифровой идентичностью пациента
    description: |
      Управление цифровой идентичностью пациента, аутентификацией и доступом по доверенности.
  BC-2910.30:
    name: Измерение удовлетворённости пациентов
    description: |
      Измерение удовлетворённости и опыта пациентов на основе опросов и в режиме реального времени.
  BC-2910.30.10:
    name: Операции стационарных опросов опыта
    description: |
      Проведение программ опросов стационарных пациентов и анализ результатов.
  BC-2910.30.20:
    name: Амбулаторные опросы опыта
    description: |
      Проведение программ амбулаторных и специализированных опросов опыта.
  BC-2910.30.30:
    name: Сбор обратной связи в реальном времени
    description: |
      Сбор обратной связи от пациентов в режиме реального времени и в точках контакта.
  BC-2910.30.40:
    name: Аналитика опыта
    description: |
      Аналитика факторов опыта, тематик и возможностей для улучшения.
  BC-2910.40:
    name: Защита прав пациентов и рассмотрение жалоб
    description: |
      Защита прав пациентов, рассмотрение жалоб и претензий, а также восстановление сервиса.
  BC-2910.40.10:
    name: Приём жалоб пациентов
    description: |
      Приём жалоб пациентов по различным каналам.
  BC-2910.40.20:
    name: Расследование претензий
    description: |
      Официальное расследование и разрешение претензий пациентов.
  BC-2910.40.30:
    name: Омбудсмен по правам пациентов
    description: |
      Услуги омбудсмена по правам пациентов в процессе лечения.
  BC-2910.40.40:
    name: Восстановление сервиса
    description: |
      Вмешательства по восстановлению сервиса при сбоях в обслуживании.
  BC-2910.50:
    name: Права пациентов и биоэтика
    description: |
      Надзор за правами пациентов, процессами информированного согласия, заблаговременными распоряжениями и этическими консультациями.
  BC-2910.50.10:
    name: Надзор за информированным согласием
    description: |
      Надзор за процессами информированного согласия на лечение и исследования.
  BC-2910.50.20:
    name: Управление заблаговременными распоряжениями
    description: |
      Сбор, хранение и отображение заблаговременных распоряжений и целей лечения.
  BC-2910.50.30:
    name: Биоэтическая консультация
    description: |
      Биоэтические консультации для пациентов, семей и врачей.
  BC-2910.50.40:
    name: Обучение прав пациентов
    description: |
      Информирование пациентов об их правах и обязанностях.
  BC-2910.60:
    name: Волонтёрские и вспомогательные службы
    description: |
      Эксплуатация волонтёрских и вспомогательных программ для поддержки пациентов и их семей.
  BC-2910.60.10:
    name: Onboarding волонтёров
    description: |
      Набор, отбор и onboarding волонтёров.
  BC-2910.60.20:
    name: Оказание волонтёрских услуг
    description: |
      Координация и оказание волонтёрских услуг по подразделениям.
  BC-2910.60.30:
    name: Вспомогательные программы
    description: |
      Реализация вспомогательных, благотворительных и общественных программ.
  BC-2910.60.40:
    name: Услуги поддержки пациентов
    description: |
      Вспомогательные услуги: навигация пациентов, пасторская помощь, семейные комнаты ожидания.

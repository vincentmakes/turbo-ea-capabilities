# Управление коммерческой деятельностью в фармацевтике (ru) — translations for L1-pharmaceutical-commercial-management.yaml
locale: ru
source: L1-pharmaceutical-commercial-management.yaml
entries:
  BC-1590:
    name: Управление коммерческой деятельностью в фармацевтике
    description: |
      Взаимодействие с медицинскими работниками, управление образцами, промоционными материалами, полевыми силами, брендом и программами работы с пациентами.
  BC-1590.10:
    name: Управление взаимодействием с медработниками
    description: |
      Программы взаимодействия с медицинскими работниками и работа полевых сил.
  BC-1590.10.10:
    name: Таргетинг и сегментация медработников
    description: |
      Таргетинг и сегментация медицинских работников.
  BC-1590.10.20:
    name: Многоканальное взаимодействие с медработниками
    description: |
      Оркестрация многоканального взаимодействия с медицинскими работниками.
  BC-1590.10.30:
    name: Прозрачная отчётность по взаимодействию с медработниками
    description: |
      Отчётность по Sunshine Act и EFPIA в части прозрачности взаимодействий.
  BC-1590.20:
    name: Управление образцами
    description: |
      Распределение образцов, учёт и соответствие регуляторным требованиям.
  BC-1590.20.10:
    name: Запрос и распределение образцов
    description: |
      Обработка запросов на образцы и их распределение медицинским работникам.
  BC-1590.20.20:
    name: Учёт и сверка образцов
    description: |
      Учёт и сверка образцов в соответствии с PDMA.
  BC-1590.20.30:
    name: Аудит соответствия в работе с образцами
    description: |
      Аудит практик распределения образцов.
  BC-1590.30:
    name: Управление промоционными материалами
    description: |
      Разработка промоционных материалов, экспертиза MLR и управление соответствием.
  BC-1590.30.10:
    name: Создание промоционных материалов
    description: |
      Создание промоционных материалов и контента.
  BC-1590.30.20:
    name: Медицинская, юридическая и регуляторная экспертиза
    description: |
      Экспертиза MLR и рабочий процесс одобрения промоционного контента.
  BC-1590.30.30:
    name: Распространение промоционных материалов
    description: |
      Распространение утверждённых промоционных материалов.
  BC-1590.40:
    name: Управление фармацевтическими полевыми силами
    description: |
      Планирование полевых сил, территориальное управление, таргетинг и развёртывание.
  BC-1590.40.10:
    name: Определение численности полевых сил
    description: |
      Определение численности и структуры полевых сил.
  BC-1590.40.20:
    name: Проектирование территорий продаж
    description: |
      Проектирование и выравнивание территорий фармацевтических продаж.
  BC-1590.40.30:
    name: Таргетинг полевых сил
    description: |
      Таргетинг и планирование визитов для представителей фармацевтических продаж.
  BC-1590.40.40:
    name: Оценка эффективности полевых сил
    description: |
      Измерение и повышение эффективности полевых сил.
  BC-1590.50:
    name: Управление фармацевтическим брендом
    description: |
      Брендовая стратегия, позиционирование и управление жизненным циклом.
  BC-1590.50.10:
    name: Фармацевтическая брендовая стратегия
    description: |
      Брендовая стратегия и позиционирование по каждому показанию.
  BC-1590.50.20:
    name: Брендовое прогнозирование
    description: |
      Прогнозирование на уровне бренда и оценка спроса.
  BC-1590.50.30:
    name: Планирование жизненного цикла бренда
    description: |
      Планирование жизненного цикла бренда, включая потерю эксклюзивности.
  BC-1590.60:
    name: Управление взаимодействием с пациентами
    description: |
      Программы поддержки пациентов, сервисы помощи и работа с пациентскими организациями.
  BC-1590.60.10:
    name: Операции программы поддержки пациентов
    description: |
      Функционирование программ поддержки пациентов и приверженности лечению.
  BC-1590.60.20:
    name: Взаимодействие с пациентскими организациями
    description: |
      Взаимодействие с организациями по защите прав пациентов.
  BC-1590.60.30:
    name: Сбор инсайтов пациентов
    description: |
      Сбор и интеграция инсайтов пациентов и результатов, сообщаемых пациентами (PRO).

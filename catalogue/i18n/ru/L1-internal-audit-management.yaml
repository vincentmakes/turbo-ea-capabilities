entries:
  BC-140:
    name: Управление внутренним аудитом
    description: |
      Независимая оценка эффективности корпоративного управления, рисков и контролей.
  BC-140.10:
    name: Управление планированием аудита
    description: |
      Планирование аудита на основе рисков, управление аудиторской вселенной.
  BC-140.10.10:
    name: Управление аудиторской вселенной
    description: |
      Определение и поддержание аудиторской вселенной и оценок рисков.
  BC-140.10.20:
    name: Разработка годового плана аудита на основе рисков
    description: |
      Годовой план аудита, приоритизированный по рискам, с распределением ресурсов.
  BC-140.10.30:
    name: Определение области охвата аудиторского задания
    description: |
      Цели, область охвата, критерии и разработка программы аудиторского задания.
  BC-140.20:
    name: Управление проведением аудита
    description: |
      Полевые работы, сбор доказательств, подготовка аудиторских отчётов.
  BC-140.20.10:
    name: Полевые аудиторские работы
    description: |
      Процедуры прохождения, тестирование контролей и сбор доказательств.
  BC-140.20.20:
    name: Управление рабочими документами аудита
    description: |
      Документирование доказательств, выводов и контрольная проверка руководителем.
  BC-140.20.30:
    name: Аудиторская отчётность
    description: |
      Составление, согласование и выпуск аудиторских отчётов и заключений.
  BC-140.20.40:
    name: Непрерывный и аналитический аудит
    description: |
      Применение аналитики и непрерывного мониторинга в аудиторской деятельности.
  BC-140.30:
    name: Управление аудиторскими результатами и устранением замечаний
    description: |
      Отслеживание замечаний, управленческие действия, последующий контроль.
  BC-140.30.10:
    name: Фиксация и рейтингование замечаний
    description: |
      Стандартизированная фиксация и оценка аудиторских замечаний.
  BC-140.30.20:
    name: Отслеживание управленческих действий
    description: |
      Контроль выполнения согласованных управленческих действий до их завершения.
  BC-140.30.30:
    name: Валидация устранения замечаний
    description: |
      Независимая проверка эффективности устранения аудиторских замечаний.
  BC-140.40:
    name: Управление качеством аудита
    description: |
      Контроль качества методологии и проведения аудита.
  BC-140.40.10:
    name: Управление методологией аудита
    description: |
      Поддержание аудиторской методологии в соответствии со Стандартами МИВа.
  BC-140.40.20:
    name: Внутренние проверки качества
    description: |
      Периодические внутренние проверки качества аудиторских заданий.
  BC-140.40.30:
    name: Внешняя оценка качества
    description: |
      Внешние оценки качества и соответствие профессиональным стандартам.

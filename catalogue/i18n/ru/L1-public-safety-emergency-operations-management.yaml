# Общественная безопасность и антикризисное управление (ru) — translations for L1-public-safety-emergency-operations-management.yaml
locale: ru
source: L1-public-safety-emergency-operations-management.yaml
entries:
  BC-3310:
    name: Общественная безопасность и антикризисное управление
    description: |
      Обеспечение общественной безопасности и антикризисное управление, включая экстренные коммуникации и диспетчеризацию, полевое реагирование полиции, пожарной охраны и СМП, командование инцидентами по NIMS, готовность к катастрофам и восстановление, расследования в области общественной безопасности и координация взаимопомощи.
  BC-3310.10:
    name: Экстренные коммуникации и диспетчеризация
    description: |
      Приём экстренных вызовов, компьютеризированная диспетчеризация и полевые коммуникации для полиции, пожарной охраны и СМП.
    in_scope:
      - Приём вызовов на номера 911/112/999
      - Компьютеризированная диспетчеризация
      - Операции радиосвязи общественной безопасности
    out_of_scope:
      - Режимы универсальной услуги связи (относится к управлению регуляторным соответствием телекоммуникаций)
  BC-3310.10.10:
    name: Приём экстренных вызовов
    description: |
      Приём и сортировка экстренных вызовов и экстренных SMS-сообщений.
  BC-3310.10.20:
    name: Компьютеризированная диспетчеризация
    description: |
      Диспетчеризация подразделений полиции, пожарной охраны и СМП по системе CAD.
  BC-3310.10.30:
    name: Операции радиосвязи общественной безопасности
    description: |
      Работа наземной подвижной радиосвязи общественной безопасности и широкополосных сетей типа FirstNet.
  BC-3310.10.40:
    name: Оповещение и предупреждение населения
    description: |
      Выпуск оповещений через WEA, Cell Broadcast, EAS, сирены и иные каналы.
  BC-3310.20:
    name: Операции полевого реагирования
    description: |
      Повседневные полевые операции полиции, пожарной охраны и первых респондентов СМП.
  BC-3310.20.10:
    name: Патрулирование правоохранительных органов
    description: |
      Плановое и превентивное патрулирование и реагирование правоохранительных органов.
  BC-3310.20.20:
    name: Тушение пожаров и спасательные операции
    description: |
      Тушение пожаров, спасательные операции и реагирование на опасные вещества.
  BC-3310.20.30:
    name: Реагирование экстренных медицинских служб
    description: |
      Догоспитальная медицинская оценка, лечение и транспортировка.
  BC-3310.20.40:
    name: Специализированное тактическое реагирование
    description: |
      Специализированные тактические операции, обезвреживание взрывоопасных предметов и реагирование на опасные вещества.
  BC-3310.30:
    name: Командование инцидентами и координация
    description: |
      Командование инцидентами по NIMS/ICS, координация многоведомственных действий и работа центров экстренных операций.
  BC-3310.30.10:
    name: Создание штаба командования инцидентом
    description: |
      Создание единого командования инцидентом и структур ICS.
  BC-3310.30.20:
    name: Многоведомственная координация
    description: |
      Координация между реагирующими ведомствами и юрисдикциями при инцидентах.
  BC-3310.30.30:
    name: Работа центров экстренных операций
    description: |
      Работа ЦЭО на местном, региональном и национальном уровнях при чрезвычайных ситуациях.
  BC-3310.30.40:
    name: Ведение единой оперативной картины
    description: |
      Ведение единой оперативной картины между ведомствами.
  BC-3310.40:
    name: Готовность к катастрофам и снижение рисков
    description: |
      Анализ опасностей, планирование, учения, обучение и деятельность по снижению рисков катастроф в рамках Сендайской рамочной программы.
  BC-3310.40.10:
    name: Анализ опасностей и рисков
    description: |
      Выявление и оценка природных и техногенных опасностей и рисков.
  BC-3310.40.20:
    name: Планирование чрезвычайного реагирования
    description: |
      Подготовка планов экстренных операций, специализированных планов для конкретных опасностей и планов непрерывности.
  BC-3310.40.30:
    name: Учения и обучение
    description: |
      Командно-штабные, функциональные и полномасштабные учения и программы обучения респондентов.
  BC-3310.40.40:
    name: Администрирование программ снижения рисков
    description: |
      Администрирование конструктивных и неконструктивных программ снижения риска катастроф.
  BC-3310.50:
    name: Реагирование на катастрофы и восстановление
    description: |
      Объявление катастрофы, операции реагирования, индивидуальная и общественная помощь и координация долгосрочного восстановления.
  BC-3310.50.10:
    name: Объявление чрезвычайного положения и активация
    description: |
      Объявление режима чрезвычайного положения и активация полномочий реагирования.
  BC-3310.50.20:
    name: Администрирование индивидуальной помощи
    description: |
      Администрирование помощи пострадавшим физическим лицам и домохозяйствам.
  BC-3310.50.30:
    name: Администрирование общественной помощи
    description: |
      Администрирование грантов общественной помощи для расчистки завалов, восстановления инфраструктуры и аварийных работ.
  BC-3310.50.40:
    name: Координация долгосрочного восстановления
    description: |
      Координация долгосрочного восстановления и деятельности по принципу «восстановить лучше прежнего».
  BC-3310.60:
    name: Расследования в области общественной безопасности
    description: |
      Уголовные расследования и расследования в области общественной безопасности, включая управление вещественными доказательствами, разведку и подготовку дел.
  BC-3310.60.10:
    name: Осмотр места происшествия
    description: |
      Осмотр места происшествия и сбор криминалистических доказательств.
  BC-3310.60.20:
    name: Управление расследовательскими делами
    description: |
      Управление расследовательскими делами, отслеживание подозреваемых и подготовка дел к обвинению.
  BC-3310.60.30:
    name: Полицейские разведывательные операции
    description: |
      Сбор, анализ и распространение полицейских разведывательных данных в рамках разведывательного полицейского контроля.
  BC-3310.60.40:
    name: Управление вещественными доказательствами и имуществом
    description: |
      Хранение, цепочка хранения и уничтожение изъятых вещественных доказательств и имущества.
  BC-3310.70:
    name: Управление экстренными ресурсами и взаимопомощью
    description: |
      Классификация экстренных ресурсов, развёртывание и соглашения о взаимопомощи между юрисдикциями.
  BC-3310.70.10:
    name: Классификация и инвентаризация ресурсов
    description: |
      Классификация ресурсов по NIMS и инвентаризация экстренных ресурсов.
  BC-3310.70.20:
    name: Администрирование соглашений о взаимопомощи
    description: |
      Администрирование внутри- и межюрисдикционных соглашений о взаимопомощи.
  BC-3310.70.30:
    name: Развёртывание и демобилизация ресурсов
    description: |
      Развёртывание, отслеживание и демобилизация экстренных ресурсов на инциденты.

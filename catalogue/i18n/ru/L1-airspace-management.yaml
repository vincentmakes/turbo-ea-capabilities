# Управление воздушным пространством (ru) — translations for L1-airspace-management.yaml
locale: ru
source: L1-airspace-management.yaml
entries:
  BC-1200:
    name: Управление воздушным пространством
    description: |
      Проектирование структуры воздушного пространства, секторизация, запретные зоны, координация гражданской и военной авиации.
  BC-1200.10:
    name: Управление проектированием воздушного пространства
    description: |
      Структура воздушного пространства, классы, проектирование сети маршрутов, границы секторов.
  BC-1200.10.10:
    name: Проектирование структуры воздушного пространства
    description: |
      Определение районов полётной информации, верхнего воздушного пространства, районов управления и классов воздушного пространства в соответствии с Приложением 11 ICAO.
  BC-1200.10.20:
    name: Проектирование сети маршрутов ОВД
    description: |
      Проектирование традиционных и PBN маршрутов обслуживания воздушного движения.
  BC-1200.10.30:
    name: Проектирование границ секторов
    description: |
      Определение границ секторов и элементарных секторов.
  BC-1200.10.40:
    name: Проектирование воздушного пространства со свободными маршрутами
    description: |
      Проектирование и внедрение воздушного пространства со свободными маршрутами.
  BC-1200.20:
    name: Управление секторизацией воздушного пространства
    description: |
      Определения секторов, схемы открытия, распределение нагрузки диспетчеров.
  BC-1200.20.10:
    name: Управление конфигурациями секторов
    description: |
      Определение и поддержание конфигураций секторов.
  BC-1200.20.20:
    name: Планирование схем открытия секторов
    description: |
      Планирование схем открытия секторов по прогнозу трафика.
  BC-1200.20.30:
    name: Секторизация по рабочей нагрузке
    description: |
      Секторизация, согласованная с оценкой рабочей нагрузки диспетчеров.
  BC-1200.30:
    name: Управление ограниченным воздушным пространством
    description: |
      Опасные зоны, запретные зоны, зоны ограниченного полёта, военные зоны.
  BC-1200.30.10:
    name: Определение ограниченных зон
    description: |
      Определение запретных зон, зон ограниченного полёта и опасных зон.
  BC-1200.30.20:
    name: Управление временно зарезервированными зонами
    description: |
      Управление временно зарезервированными и выделенными зонами.
  BC-1200.30.30:
    name: Координация активации и деактивации зон
    description: |
      Активация, деактивация и уведомление об ограниченном воздушном пространстве.
  BC-1200.40:
    name: Управление координацией воздушного пространства
    description: |
      Гражданско-военная координация, трансграничная координация, сотрудничество в рамках FAB.
  BC-1200.40.10:
    name: Гражданско-военная координация воздушного пространства
    description: |
      Гражданско-военная координация и гибкое использование воздушного пространства.
  BC-1200.40.20:
    name: Трансграничная координация воздушного пространства
    description: |
      Координация использования воздушного пространства через границы районов полётной информации.
  BC-1200.40.30:
    name: Сотрудничество в рамках функциональных блоков воздушного пространства
    description: |
      Сотрудничество в функциональных блоках воздушного пространства (FAB).
  BC-1200.40.40:
    name: Консультации с пользователями воздушного пространства
    description: |
      Консультации с пользователями воздушного пространства по изменениям структуры.

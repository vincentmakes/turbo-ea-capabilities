# Управление профессиональным лицензированием и стандартами (ru) — translations for L1-professional-licensing-and-standards-management.yaml
locale: ru
source: L1-professional-licensing-and-standards-management.yaml
entries:
  BC-4380:
    name: Управление профессиональным лицензированием и стандартами
    description: |
      Лицензирование фирмы и физических лиц, подача документов в профессиональные организации, непрерывное профессиональное развитие, принятие новых профессиональных стандартов и расследование профессиональных нарушений, специфические для профессиональных сервисных фирм.
  BC-4380.10:
    name: Управление лицензированием и регистрацией фирмы
    description: |
      Поддержание профессиональных лицензий и регистраций фирмы в органах надзора за аудитом, регуляторах адвокатуры и аналогичных органах по юрисдикциям.
  BC-4380.10.10:
    name: Ведение регистраций фирмы
    description: |
      Ведение регистраций фирмы: PCAOB, FRC RSB, ICAEW, признанный субъект SRA и авторизации ABS.
  BC-4380.10.20:
    name: Управление продлением лицензий фирмы
    description: |
      Периодические подачи на продление, уплата взносов и подтверждающие декларации для лицензий фирмы.
  BC-4380.10.30:
    name: Координация лицензирования по юрисдикциям
    description: |
      Координация лицензирования фирмы по сетям участников и юрисдикциям.
  BC-4380.20:
    name: Управление индивидуальными практикующими удостоверениями
    description: |
      Сбор и ведение индивидуальных практикующих удостоверений, допусков адвокатуры, аудиторских квалификаций и иных личных лицензий специалистов.
  BC-4380.20.10:
    name: Сбор практикующих удостоверений
    description: |
      Сбор и верификация индивидуальных практикующих удостоверений и квалификаций.
  BC-4380.20.20:
    name: Отслеживание продления практикующих удостоверений
    description: |
      Отслеживание циклов продления и предварительных условий для индивидуальных практикующих удостоверений.
  BC-4380.20.30:
    name: Управление трансграничными допусками
    description: |
      Управление трансграничными допусками, статусом иностранного адвоката и соглашениями об эквивалентности.
  BC-4380.30:
    name: Управление непрерывным профессиональным развитием
    description: |
      Планирование, проведение и документирование часов непрерывного профессионального развития (НПД/НПО), требуемых профессиональными организациями и политикой фирмы.
    in_scope:
      - Планирование учебного плана НПД
      - Проведение курсов НПД и учёт
      - Документирование НПД и устранение отставания
    out_of_scope:
      - Общее обучение и развитие (BC-300)
  BC-4380.30.10:
    name: Отслеживание требований НПД
    description: |
      Отслеживание требований к часам НПД по специалисту, квалификации и юрисдикции.
  BC-4380.30.20:
    name: Проведение курсов НПД и учёт посещаемости
    description: |
      Проведение аккредитованных курсов НПД и учёт посещаемости и доказательств завершения.
  BC-4380.30.30:
    name: Устранение отставания по НПД
    description: |
      Выявление специалистов, рискующих не набрать требуемые часы НПД до сроков отчётности, и принятие корректирующих мер.
  BC-4380.40:
    name: Отчётность в профессиональные организации
    description: |
      Периодические отчёты и уведомления в профессиональные организации, регуляторы по вопросам фирмы и физических лиц.
  BC-4380.40.10:
    name: Подготовка ежегодной отчётности
    description: |
      Подготовка ежегодных отчётов и статистических данных для профессиональных организаций и органов надзора.
  BC-4380.40.20:
    name: Отчётность о уведомляемых событиях
    description: |
      Отчётность об уведомляемых событиях: отставки, изменения в руководстве и существенные нарушения.
  BC-4380.40.30:
    name: Подготовка отчётов о прозрачности
    description: |
      Подготовка предусмотренных законом или добровольных отчётов о прозрачности, требуемых от аудиторских и иных регулируемых фирм.
  BC-4380.50:
    name: Управление принятием профессиональных стандартов
    description: |
      Принятие новых и пересмотренных профессиональных стандартов в методологию фирмы, политику и выполнение заданий.
  BC-4380.50.10:
    name: Мониторинг изменений профессиональных стандартов
    description: |
      Мониторинг предстоящих изменений профессиональных и регуляторных стандартов, применимых к практикам фирмы.
  BC-4380.50.20:
    name: Оценка влияния стандартов
    description: |
      Оценка влияния новых или пересмотренных стандартов на методологию, обучение и инструментарий.
  BC-4380.50.30:
    name: Внедрение принятых стандартов
    description: |
      Внедрение обновлений методологии, политик и инструментария, реализующих принятые стандарты.
  BC-4380.60:
    name: Управление расследованиями профессиональных нарушений
    description: |
      Внутренние расследования, реагирование на расследования профессиональных организаций и управление требованиями по профессиональному страхованию ответственности, связанными с предполагаемыми профессиональными нарушениями.
  BC-4380.60.10:
    name: Внутренние расследования нарушений
    description: |
      Внутренние расследования предполагаемых нарушений профессиональных стандартов или политики поведения фирмы.
  BC-4380.60.20:
    name: Реагирование на расследования профессиональных организаций
    description: |
      Координация ответов фирмы на расследования профессиональных организаций и дисциплинарных трибуналов.
  BC-4380.60.30:
    name: Управление требованиями по профессиональному страхованию ответственности
    description: |
      Управление требованиями по профессиональному страхованию ответственности и уведомлениями страховщиков, возникающими в связи с заданиями.

# Педагогический персонал (ru) — translations for L1-educator-workforce-management.yaml
locale: ru
source: L1-educator-workforce-management.yaml
entries:
  BC-4760:
    name: Педагогический персонал
    description: |
      Управление жизненным циклом академического и преподавательского персонала
      в образовании, охватывающее набор, подтверждение квалификации, тенюру
      и продвижение, распределение нагрузки, профессиональное развитие и
      управление почасовыми преподавателями.
  BC-4760.10:
    name: Набор и назначение преподавателей
    description: |
      Определение, поиск, отбор и назначение академических преподавателей,
      включая специализированные практики академического поиска.
    in_scope:
      - Определение должностей преподавателей
      - Поиск и отбор преподавателей
      - Назначение и введение в должность преподавателей
    out_of_scope:
      - Общий набор персонала (охватывается управлением человеческим капиталом)
  BC-4760.10.10:
    name: Определение должностей преподавателей
    description: |
      Определение должностей преподавателей, академических звений и
      дисциплинарной специализации.
  BC-4760.10.20:
    name: Поиск и отбор преподавателей
    description: |
      Работа академических поисковых комиссий и отбор кандидатов.
  BC-4760.10.30:
    name: Назначение и введение в должность преподавателей
    description: |
      Назначение, заключение договоров и академическое введение в должность
      новых преподавателей.
  BC-4760.20:
    name: Академическая аттестация и проверка квалификации
    description: |
      Верификация и поддержание академических и профессиональных квалификаций
      педагогов и их предметной компетентности.
    in_scope:
      - Проверка квалификации педагогов
      - Аттестация по предметной области
      - Поддержание актуальности квалификаций
    out_of_scope:
      - Межотраслевые сертификаты сотрудников (охватываются управлением человеческим капиталом)
  BC-4760.20.10:
    name: Проверка квалификации педагогов
    description: |
      Проверка дипломов, сертификатов и лицензий педагогов.
  BC-4760.20.20:
    name: Аттестация по предметной области
    description: |
      Аттестация педагогов по предметной и педагогической компетентности.
  BC-4760.20.30:
    name: Поддержание актуальности квалификаций
    description: |
      Отслеживание продолжающегося профессионального образования и
      переаттестации.
  BC-4760.30:
    name: Управление тенюрой и продвижением
    description: |
      Администрирование тенюрного продвижения, решений о тенюре и
      академического продвижения.
    in_scope:
      - Управление тенюрным треком и испытательным сроком
      - Проверка и решение о тенюре
      - Проверка и решение о продвижении
    out_of_scope:
      - Общее управление эффективностью (охватывается управлением человеческим капиталом)
  BC-4760.30.10:
    name: Управление тенюрным треком и испытательным сроком
    description: |
      Управление прогрессом по тенюрному треку и испытательными сроками.
  BC-4760.30.20:
    name: Проверка и решение о тенюре
    description: |
      Процессы комиссии по тенюре и окончательные решения о тенюре.
  BC-4760.30.30:
    name: Проверка и решение о продвижении
    description: |
      Проверка академического продвижения и принятие решений по всем
      преподавательским должностям.
  BC-4760.40:
    name: Управление педагогической нагрузкой
    description: |
      Распределение и балансировка учебной, исследовательской и общественной
      нагрузки, а также планирование академических отпусков.
    in_scope:
      - Распределение учебных поручений
      - Балансировка нагрузки по преподаванию, исследованиям и общественной работе
      - Планирование саббатикала и академических отпусков
    out_of_scope:
      - Общее кадровое администрирование отпусков (охватывается управлением человеческим капиталом)
  BC-4760.40.10:
    name: Распределение учебных поручений
    description: |
      Распределение учебных поручений преподавателям и инструкторам.
  BC-4760.40.20:
    name: Балансировка нагрузки
    description: |
      Балансировка учебных, исследовательских и общественных обязанностей
      преподавателей.
  BC-4760.40.30:
    name: Планирование саббатикала и академических отпусков
    description: |
      Планирование саббатикалов и замещения во время академических отпусков.
  BC-4760.50:
    name: Академическое профессиональное развитие
    description: |
      Педагогическое, предметное и ориентировочное профессиональное развитие
      академического и преподавательского персонала.
    in_scope:
      - Развитие педагогики и преподавательской практики
      - Предметно-дисциплинарное развитие
      - Наставничество и введение в должность педагогов
    out_of_scope:
      - Общее обучение и развитие (охватывается управлением человеческим капиталом)
  BC-4760.50.10:
    name: Развитие педагогики и преподавательской практики
    description: |
      Развитие педагогических компетенций и преподавательской практики
      педагогов.
  BC-4760.50.20:
    name: Предметно-дисциплинарное развитие
    description: |
      Развитие предметной и дисциплинарной экспертизы.
  BC-4760.50.30:
    name: Наставничество и введение в должность педагогов
    description: |
      Программы наставничества и введения в должность для новых педагогов.
  BC-4760.60:
    name: Оценка эффективности педагогов и взаимное рецензирование
    description: |
      Специфическая оценка эффективности педагогов, включая наблюдение за
      преподаванием, взаимное рецензирование и академическое признание.
    in_scope:
      - Наблюдение за преподаванием и взаимное рецензирование
      - Ежегодная оценка эффективности педагогов
      - Признание и награждение педагогов
    out_of_scope:
      - Общее управление эффективностью персонала (охватывается управлением человеческим капиталом)
  BC-4760.60.10:
    name: Наблюдение за преподаванием и взаимное рецензирование
    description: |
      Наблюдение за преподаванием и взаимное рецензирование практики педагогов.
  BC-4760.60.20:
    name: Ежегодная оценка эффективности
    description: |
      Ежегодная оценка эффективности академического и преподавательского
      персонала.
  BC-4760.60.30:
    name: Признание и награждение педагогов
    description: |
      Программы признания и награждения педагогов.
  BC-4760.70:
    name: Управление почасовыми преподавателями
    description: |
      Управление частичной занятостью, почасовыми и приглашёнными
      преподавателями, включая поиск, заключение договоров и контроль
      качества.
    in_scope:
      - Формирование пула приглашённых преподавателей
      - Администрирование договоров с почасовыми преподавателями
      - Интеграция и контроль качества приглашённых преподавателей
    out_of_scope:
      - Общее управление подрядчиками (охватывается управлением поставщиками)
  BC-4760.70.10:
    name: Формирование пула приглашённых преподавателей
    description: |
      Формирование и поддержание активного пула приглашённых педагогов.
  BC-4760.70.20:
    name: Администрирование договоров с почасовыми преподавателями
    description: |
      Администрирование договоров с почасовыми и приглашёнными преподавателями.
  BC-4760.70.30:
    name: Интеграция и контроль качества приглашённых преподавателей
    description: |
      Интеграция приглашённых преподавателей в академическую среду и текущий
      контроль качества.
metadata:
  status: draft
  reviewer: pending

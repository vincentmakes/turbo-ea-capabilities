# Клиническое качество и безопасность (ru) — translations for L1-clinical-quality-safety-management.yaml
locale: ru
source: L1-clinical-quality-safety-management.yaml
entries:
  BC-2840:
    name: Клиническое качество и безопасность
    description: |
      Управление инцидентами безопасности пациентов, инфекционный контроль и профилактика, измерение клинических исходов, готовность к аккредитации, клинические риски и ответственность, а также программы повышения качества медицинской помощи.
  BC-2840.10:
    name: Управление инцидентами безопасности пациентов
    description: |
      Фиксация, расследование и управление инцидентами безопасности пациентов, включая сигнальные события и почти произошедшие инциденты.
  BC-2840.10.10:
    name: Сообщение об инцидентах и их фиксация
    description: |
      Многоканальное сообщение и фиксация инцидентов безопасности и почти произошедших случаев.
  BC-2840.10.20:
    name: Анализ первопричин
    description: |
      Анализ первопричин и явных причин инцидентов безопасности пациентов.
  BC-2840.10.30:
    name: Управление сигнальными событиями
    description: |
      Выявление, реагирование и отчётность по сигнальным событиям и никогда не происходящим событиям.
  BC-2840.10.40:
    name: Расследование в рамках справедливой культуры
    description: |
      Анализ человеческого фактора и ответственности при инцидентах безопасности в рамках справедливой культуры.
  BC-2840.20:
    name: Профилактика и контроль инфекций
    description: |
      Надзор, профилактика и контроль инфекций, связанных с оказанием медицинской помощи, включая расследование вспышек и антимикробный стюардшип.
  BC-2840.20.10:
    name: Надзор за инфекциями, связанными с оказанием помощи
    description: |
      Надзор и отчётность об инфекциях, связанных с оказанием медицинской помощи.
  BC-2840.20.20:
    name: Расследование вспышек
    description: |
      Расследование и сдерживание скоплений случаев инфекций и вспышек.
  BC-2840.20.30:
    name: Надзор за стерилизацией
    description: |
      Надзор за работой отделения стерилизации и соответствием требованиям.
  BC-2840.20.40:
    name: Антимикробный стюардшип
    description: |
      Операции программы антимикробного стюардшипа и надзор за назначением.
  BC-2840.30:
    name: Измерение клинических исходов
    description: |
      Измерение и отчётность клинических исходов по основным показателям, в регистры и по результатам, сообщённым пациентами.
  BC-2840.30.10:
    name: Отчётность по основным показателям
    description: |
      Сбор и представление регуляторных основных показателей качества.
  BC-2840.30.20:
    name: Отслеживание смертности и повторных госпитализаций
    description: |
      Отслеживание смертности, повторных госпитализаций и скорректированных по риску исходов.
  BC-2840.30.30:
    name: Подача в регистры специализированных исходов
    description: |
      Подача данных в регистры специализированных исходов — кардиологические, хирургические и инсультные.
  BC-2840.30.40:
    name: Фиксация результатов, сообщённых пациентами
    description: |
      Сбор и анализ результатов, сообщённых пациентами, и показателей опыта.
  BC-2840.40:
    name: Готовность к аккредитации и проверкам
    description: |
      Готовность к аккредитации в рамках клинических, регуляторных и специализированных программ проверки.
  BC-2840.40.10:
    name: Программы учебных проверок
    description: |
      Операции программ учебных проверок и постоянной готовности.
  BC-2840.40.20:
    name: Трассирующая методология
    description: |
      Трассирующая методология пациента и системы для готовности к аккредитации.
  BC-2840.40.30:
    name: Отслеживание соответствия стандартам
    description: |
      Отслеживание соответствия требованиям аккредитации и регуляторным стандартам.
  BC-2840.40.40:
    name: Координация ответа на проверки
    description: |
      Координация аккредитационных проверок, результатов и корректирующих планов.
  BC-2840.50:
    name: Клинические риски и управление ответственностью
    description: |
      Выявление и снижение клинических рисков, защита по претензиям о врачебной ошибке.
  BC-2840.50.10:
    name: Клиническая оценка рисков
    description: |
      Выявление и оценка клинических рисков по службам и процессам.
  BC-2840.50.20:
    name: Поддержка защиты по претензиям
    description: |
      Поддержка расследования и защиты по претензиям о врачебной халатности.
  BC-2840.50.30:
    name: Процедура раскрытия и принесения извинений
    description: |
      Операции программы раскрытия и принесения извинений при нежелательных событиях.
  BC-2840.50.40:
    name: Планирование снижения клинических рисков
    description: |
      Планирование и реализация мер по снижению клинических рисков.
  BC-2840.60:
    name: Программы повышения качества
    description: |
      Методология улучшения показателей, внедрение пакетов мер и инициативы высокой надёжности.
  BC-2840.60.10:
    name: Управление циклом PDSA
    description: |
      Управление циклами «Планируй-Делай-Изучай-Действуй» для клинического улучшения.
  BC-2840.60.20:
    name: Внедрение пакетов мер и протоколов
    description: |
      Внедрение доказательных пакетов мер и клинических протоколов.
  BC-2840.60.30:
    name: Отслеживание проектов по улучшению показателей
    description: |
      Отслеживание проектов и результатов по улучшению показателей.
  BC-2840.60.40:
    name: Инициативы высокой надёжности
    description: |
      Принципы организации высокой надёжности и управление инициативами.

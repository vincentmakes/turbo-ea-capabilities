# Управление оборонной логистикой (ru) — translations for L1-defense-logistics-management.yaml
locale: ru
source: L1-defense-logistics-management.yaml
entries:
  BC-1720:
    name: Управление оборонной логистикой
    description: |
      Готовность материальной части, техническое сопровождение, логистика развёртывания и театральная логистика.
  BC-1720.10:
    name: Управление готовностью материальной части
    description: |
      Отчётность о боеготовности, наличие и исправность техники и вооружения.
  BC-1720.10.10:
    name: Отслеживание наличия техники
    description: |
      Отслеживание наличия и исправности техники.
  BC-1720.10.20:
    name: Отчётность о боеготовности
    description: |
      Периодическая отчётность о боеготовности для командования.
  BC-1720.10.30:
    name: Повышение процента боеспособных единиц
    description: |
      Мероприятия по повышению процента боеспособных единиц.
  BC-1720.20:
    name: Управление оборонными запасами
    description: |
      Запасы военного снабжения классов I–IX, военные резервы.
  BC-1720.20.10:
    name: Управление запасами классов I–V
    description: |
      Управление запасами продовольствия, топлива, боеприпасов и расходных материалов.
  BC-1720.20.20:
    name: Управление запасами классов VII–IX
    description: |
      Управление запасами основных изделий и запасных частей.
  BC-1720.20.30:
    name: Управление военными резервами
    description: |
      Управление военными резервами и предварительно размещёнными запасами.
  BC-1720.20.40:
    name: Управление запасами боеприпасов
    description: |
      Управление запасами боеприпасов и взрывчатых веществ.
  BC-1720.30:
    name: Управление развёртыванием и распределением
    description: |
      Стратегическая и тактическая логистика развёртывания.
  BC-1720.30.10:
    name: Стратегическое планирование развёртывания
    description: |
      Стратегическое планирование развёртывания и TPFDD.
  BC-1720.30.20:
    name: Операции стратегической переброски
    description: |
      Операции стратегической переброски по воздуху, морю и суше.
  BC-1720.30.30:
    name: Театральное распределение
    description: |
      Театральное распределение и логистика снабжения.
  BC-1720.30.40:
    name: Совместный приём и дальнейшее движение
    description: |
      Совместный приём, сосредоточение и дальнейшее движение.
  BC-1720.40:
    name: Управление оборонным техническим обслуживанием
    description: |
      Органическое и контрактное обслуживание на депо-, промежуточном и организационном уровнях.
  BC-1720.40.10:
    name: Техническое обслуживание на организационном уровне
    description: |
      Техническое обслуживание на уровне подразделения (О-уровень).
  BC-1720.40.20:
    name: Техническое обслуживание на промежуточном уровне
    description: |
      Техническое обслуживание и ремонт на промежуточном уровне (I-уровень).
  BC-1720.40.30:
    name: Техническое обслуживание на деповском уровне
    description: |
      Деповское техническое обслуживание и капитальный ремонт (D-уровень).
  BC-1720.40.40:
    name: Контрактная логистическая поддержка
    description: |
      Соглашения о контрактной логистической поддержке.
  BC-1720.50:
    name: Управление запасными частями и снабжением
    description: |
      Первоначальное снабжение, пополнение запасов и удовлетворение потребностей.
  BC-1720.50.10:
    name: Первоначальное снабжение
    description: |
      Первоначальное снабжение запасными частями для новых платформ.
  BC-1720.50.20:
    name: Пополнение запасных частей
    description: |
      Пополнение запасов запасных частей на основе спроса и прогнозов.
  BC-1720.50.30:
    name: Отслеживание удовлетворения потребностей
    description: |
      Отслеживание удовлетворения потребностей и процента выполнения заявок.
  BC-1720.50.40:
    name: Каталогизация и управление NSN
    description: |
      Каталогизация натовских номеров запасов и идентификация изделий.

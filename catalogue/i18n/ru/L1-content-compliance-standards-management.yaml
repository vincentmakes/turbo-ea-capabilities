# Соответствие контента и стандарты (ru) — translations for L1-content-compliance-standards-management.yaml
locale: ru
source: L1-content-compliance-standards-management.yaml
entries:
  BC-3780:
    name: Соответствие контента и стандарты
    description: |
      Классификация и рейтинг контента, редакционные стандарты,
      соответствие вещательному и онлайн-регулированию, модерация
      пользовательского контента, соответствие требованиям доступности
      и управление уведомлениями об удалении.
  BC-3780.10:
    name: Классификация и рейтинг контента
    description: |
      Подача, применение и самоклассификация возрастных рейтингов
      по территориям и платформам.
  BC-3780.10.10:
    name: Предрелизная подача на классификацию
    description: |
      Подача названий в классификационные органы для получения
      территориальных возрастных рейтингов до выпуска.
  BC-3780.10.20:
    name: Соответствие отображению рейтингов
    description: |
      Отображение возрастных рейтингов, дескрипторов контента
      и предупреждений на потребительских поверхностях.
  BC-3780.10.30:
    name: Управление самоклассификацией
    description: |
      Эксплуатация режимов самоклассификации и соблюдение
      платформенных инструментов возрастного рейтинга.
  BC-3780.20:
    name: Управление редакционными стандартами
    description: |
      Разработка редакционной политики, предэфирная проверка
      соответствия и обработка редакционных жалоб.
  BC-3780.20.10:
    name: Управление редакционной политикой
    description: |
      Разработка и жизненный цикл редакционной политики
      и стандартов беспристрастности и точности.
  BC-3780.20.20:
    name: Предэфирная проверка соответствия
    description: |
      Предэфирная проверка программ и блоков на соответствие
      редакционным и регуляторным стандартам.
  BC-3780.20.30:
    name: Обработка редакционных жалоб
    description: |
      Сортировка, расследование и реагирование на редакционные
      жалобы от зрителей и регуляторов.
  BC-3780.30:
    name: Вещательное регуляторное соответствие
    description: |
      Соответствие вещательным и аудиовизуальным регламентам,
      включая правила планирования, квоты и рекламные кодексы.
  BC-3780.30.10:
    name: Соответствие ватершеду и планированию
    description: |
      Соответствие правилам ватершеда и временных полос
      для планирования взрослого контента.
  BC-3780.30.20:
    name: Соответствие квотам и местному контенту
    description: |
      Соответствие квотам контента, включая европейские
      произведения, независимое производство и местный язык.
  BC-3780.30.30:
    name: Соответствие рекламным кодексам
    description: |
      Соответствие рекламы и спонсорства применимым
      кодексам и ограничениям по категориям.
  BC-3780.40:
    name: Модерация пользовательского контента
    description: |
      Модерация пользовательского контента через автоматическую
      сортировку, ручную проверку и рабочие процессы доверенных сигнальщиков.
  BC-3780.40.10:
    name: Автоматическая сортировка контента
    description: |
      Автоматическая сортировка и классификация пользовательского
      контента по вопросам безопасности и политики.
  BC-3780.40.20:
    name: Управление очередью ручной проверки
    description: |
      Эксплуатация очередей ручной проверки, включая контроль
      качества и меры по благополучию рецензентов.
  BC-3780.40.30:
    name: Управление доверенными сигнальщиками
    description: |
      Управление отношениями с доверенными сигнальщиками и приоритетными
      каналами рассмотрения в рамках регулирования онлайн-контента.
  BC-3780.50:
    name: Управление доступностью контента
    description: |
      Соответствие обязательствам по доступности в части
      субтитрирования, аудиодескрипции и жестового перевода.
  BC-3780.50.10:
    name: Соответствие скрытым субтитрам
    description: |
      Соответствие обязательствам по скрытым субтитрам,
      включая охват, качество и стандарты представления.
  BC-3780.50.20:
    name: Соответствие аудиодескрипции
    description: |
      Соответствие обязательствам по охвату
      и качеству аудиодескрипции.
  BC-3780.50.30:
    name: Соответствие жестовому переводу
    description: |
      Соответствие обязательствам по сурдопереводу
      и встроенному жестовому переводу.
  BC-3780.60:
    name: Управление уведомлениями об удалении
    description: |
      Обработка уведомлений об авторских правах и онлайн-контенте,
      включая встречные уведомления и апелляционные процессы.
  BC-3780.60.10:
    name: Обработка уведомлений об авторских правах
    description: |
      Обработка уведомлений об удалении нарушений авторских прав
      и соблюдение политики в отношении повторных нарушителей.
  BC-3780.60.20:
    name: Обработка уведомлений об онлайн-контенте
    description: |
      Обработка уведомлений о незаконном контенте и предписаний
      в рамках регулирования онлайн-контента.
  BC-3780.60.30:
    name: Управление встречными уведомлениями и апелляциями
    description: |
      Управление встречными уведомлениями и внесудебными
      апелляционными механизмами по решениям об удалении контента.

# Управление операциями электропередачи (ru) — translations for L1-electricity-transmission-operations-management.yaml
locale: ru
source: L1-electricity-transmission-operations-management.yaml
entries:
  BC-3810:
    name: Управление операциями электропередачи
    description: |
      Эксплуатация высоковольтной сети передачи — диспетчерская
      служба, переключения, эксплуатация ЛЭП и подстанций, координация
      плановых остановов, защита, а также физическая и кибербезопасность
      объединённой энергосистемы.
  BC-3810.10:
    name: Управление диспетчерскими операциями
    description: |
      Круглосуточные диспетчерские операции на сети передачи
      с использованием EMS/SCADA, ситуационной осведомлённости и анализа послеаварийных ситуаций.
  BC-3810.10.10:
    name: Операции EMS
    description: |
      Эксплуатация системы управления энергией, оценщика состояния
      и инструментов анализа послеаварийных ситуаций.
  BC-3810.10.20:
    name: Операции SCADA передачи
    description: |
      Сбор данных SCADA в реальном времени и диспетчерское управление
      объектами передачи.
  BC-3810.10.30:
    name: Управление журналами диспетчеров
    description: |
      Ведение журналов диспетчеров, передача смен
      и записи оперативных событий.
  BC-3810.20:
    name: Переключения и изоляция в сети передачи
    description: |
      Планирование и выполнение переключений, изоляции
      и работ под напряжением на сети передачи.
  BC-3810.20.10:
    name: Подготовка программ переключений
    description: |
      Подготовка и проверка программ переключений
      для плановых работ.
  BC-3810.20.20:
    name: Выдача нарядов-допусков
    description: |
      Выдача и контроль нарядов-допусков и допусков к испытаниям
      на оборудовании передачи.
  BC-3810.20.30:
    name: Работы под напряжением
    description: |
      Координация работ под напряжением и контактных работ
      на токоведущих линиях.
  BC-3810.30:
    name: Эксплуатация ЛЭП
    description: |
      Эксплуатация, осмотры и работы под напряжением
      на воздушных линиях, опорах и подземных кабелях передачи.
  BC-3810.30.10:
    name: Осмотр воздушных линий
    description: |
      Плановые, скалолазные и воздушные осмотры
      воздушных линий передачи.
  BC-3810.30.20:
    name: Операции с подземными кабелями
    description: |
      Эксплуатация, мониторинг частичных разрядов и управление
      кабельными муфтами ВН.
  BC-3810.30.30:
    name: Расчистка трасс и растительности
    description: |
      Расчистка растительности и обслуживание трасс по стандартам
      NERC FAC-003 или эквивалентным.
  BC-3810.30.40:
    name: Техническое обслуживание опор
    description: |
      Окраска, основания и работы по конструктивной
      целостности опор передачи.
  BC-3810.40:
    name: Операции подстанций
    description: |
      Эксплуатация и надзор за подстанциями ВН, трансформаторами,
      коммутационным оборудованием и компенсирующими устройствами.
  BC-3810.40.10:
    name: Операции силовых трансформаторов
    description: |
      Надзор, хроматографический анализ масла и управление
      переключателями ответвлений трансформаторов ВН.
  BC-3810.40.20:
    name: Операции коммутационного оборудования
    description: |
      Эксплуатация и контроль состояния высоковольтных выключателей
      и разъединителей.
  BC-3810.40.30:
    name: Операции реактивной компенсации
    description: |
      Управление конденсаторными батареями, реакторами, СТК
      и СТАТКОМ для реактивной поддержки.
  BC-3810.40.40:
    name: Операции преобразовательных станций HVDC
    description: |
      Эксплуатация преобразовательных станций HVDC
      и управление постоянным током межсистемных вставок.
  BC-3810.50:
    name: Координация плановых остановов в передаче
    description: |
      Планирование, составление графиков и утверждение плановых
      и внеплановых остановов элементов передачи с оценкой воздействия.
  BC-3810.50.10:
    name: Подача заявок на плановые остановы
    description: |
      Подача и пересмотр планов остановов в передаче
      системному оператору.
  BC-3810.50.20:
    name: Оценка рисков остановов
    description: |
      Оценка влияния предлагаемых остановов
      на безопасность системы и рынок.
  BC-3810.50.30:
    name: Отчётность о вынужденных остановах
    description: |
      Отчётность о вынужденных остановах и недоступности
      оператору и регулятору.
  BC-3810.60:
    name: Защита и управление в передаче
    description: |
      Уставки, надзор и анализ постсобытийный защиты передачи
      и специальных схем защиты.
  BC-3810.60.10:
    name: Управление уставками защит
    description: |
      Расчёт, согласование и выдача уставок
      релейной защиты.
  BC-3810.60.20:
    name: Операции специальных схем защиты
    description: |
      Эксплуатация и надзор за устройствами автоматики
      и специальными схемами защиты.
  BC-3810.60.30:
    name: Анализ аварийных событий
    description: |
      Анализ осциллограмм и работы защит
      после событий в энергосистеме.
  BC-3810.70:
    name: Управление безопасностью системы передачи
    description: |
      Кибер- и физическая безопасность объединённой энергосистемы,
      включая NERC CIP, периметральную безопасность и реестр активов.
  BC-3810.70.10:
    name: Идентификация BES-киберактивов
    description: |
      Идентификация и рейтинг BES-киберсистем
      по NERC CIP-002.
  BC-3810.70.20:
    name: Операции электронного защитного периметра
    description: |
      Эксплуатация электронных защитных периметров
      и управление интерактивным удалённым доступом.
  BC-3810.70.30:
    name: Операции физического защитного периметра
    description: |
      Физическая безопасность диспетчерских центров
      и критических подстанций (NERC CIP-014).
  BC-3810.70.40:
    name: Управление свидетельствами соответствия NERC CIP
    description: |
      Сбор свидетельств, аттестация и поддержка аудитов
      по стандартам NERC CIP.

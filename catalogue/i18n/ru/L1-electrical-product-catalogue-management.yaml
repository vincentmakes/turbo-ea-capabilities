# Управление каталогом электротехнической продукции (ru) — translations for L1-electrical-product-catalogue-management.yaml
locale: ru
source: L1-electrical-product-catalogue-management.yaml
entries:
  BC-1940:
    name: Управление каталогом электротехнической продукции
    description: |
      Структура товарного ассортимента электротехнической продукции: варианты, правила конфигуратора, юрисдикционные SKU, ввод и вывод из каталога, технические описания и маркетинговые материалы.
  BC-1940.10:
    name: Управление основными данными товарных позиций
    description: |
      Ведение основных записей товарных позиций и иерархий семейств продуктов.
  BC-1940.10.10:
    name: Управление записями товарных позиций
    description: |
      Создание и ведение основных записей товарных позиций.
  BC-1940.10.20:
    name: Управление иерархией и семействами продуктов
    description: |
      Определение структур семейств и иерархий продуктов.
  BC-1940.10.30:
    name: Стандартизация атрибутов продуктов
    description: |
      Стандартизация атрибутов по семействам продуктов.
  BC-1940.20:
    name: Управление вариантами и опциями продуктов
    description: |
      Управление вариантами по напряжению, частоте, степени защиты, протоколам и аксессуарам.
  BC-1940.20.10:
    name: Управление вариантами по напряжению и частоте
    description: |
      Управление вариантами номинального напряжения и частоты.
  BC-1940.20.20:
    name: Управление вариантами степени защиты и корпуса
    description: |
      Управление вариантами степени защиты IP и исполнения корпуса.
  BC-1940.20.30:
    name: Управление вариантами протоколов связи
    description: |
      Управление опциями протоколов связи для подключённых продуктов.
  BC-1940.20.40:
    name: Управление аксессуарами и опциями
    description: |
      Управление определениями аксессуаров и дополнительных функций.
  BC-1940.30:
    name: Управление правилами конфигуратора продуктов
    description: |
      Составление и проверка правил конфигурации под заказ.
  BC-1940.30.10:
    name: Составление правил конфигурации
    description: |
      Составление правил допустимых комбинаций для настраиваемых продуктов.
  BC-1940.30.20:
    name: Управление ограничениями совместимости
    description: |
      Управление ограничениями совместимости между опциями.
  BC-1940.30.30:
    name: Проверка конфигуратора
    description: |
      Проверка наборов правил конфигуратора.
  BC-1940.40:
    name: Управление юрисдикционными SKU
    description: |
      Управление юрисдикционными SKU, стандартами разъёмов и языковыми вариантами.
  BC-1940.40.10:
    name: Определение юрисдикционных вариантов
    description: |
      Определение товарных вариантов для целевых юрисдикций.
  BC-1940.40.20:
    name: Управление стандартами разъёмов
    description: |
      Управление вариантами стандартов разъёмов по регионам.
  BC-1940.40.30:
    name: Вариант документации на местном языке
    description: |
      Руководства и варианты маркировки на местном языке для каждой юрисдикции.
  BC-1940.50:
    name: Управление вводом и выводом продуктов из каталога
    description: |
      Активация каталога, сопоставление замен, прекращение продаж и окна последних закупок.
  BC-1940.50.10:
    name: Активация продуктов в каталоге при запуске
    description: |
      Активация новых продуктов в товарном каталоге при запуске.
  BC-1940.50.20:
    name: Сопоставление замещающих продуктов
    description: |
      Сопоставление устаревших продуктов с заменяющими SKU.
  BC-1940.50.30:
    name: Уведомление о прекращении продаж
    description: |
      Уведомление каналов и клиентов о датах прекращения продаж.
  BC-1940.50.40:
    name: Управление последними закупками и сервисным окном
    description: |
      Управление окнами последних закупок и доступностью только для сервисного обслуживания.
  BC-1940.60:
    name: Управление документацией и техническими описаниями продуктов
    description: |
      Составление и ведение технических описаний, руководств и маркетинговых материалов, привязанных к SKU.
  BC-1940.60.10:
    name: Составление технических описаний
    description: |
      Составление технических описаний продуктов и технических спецификаций.
  BC-1940.60.20:
    name: Составление технических руководств
    description: |
      Составление руководств по установке и эксплуатации.
  BC-1940.60.30:
    name: Маркетинговые материалы каталога
    description: |
      Маркетинговые материалы, привязанные к SKU каталога.

# Управление фармаконадзором (ru) — translations for L1-pharmacovigilance-management.yaml
locale: ru
source: L1-pharmacovigilance-management.yaml
entries:
  BC-1540:
    name: Управление фармаконадзором
    description: |
      Мониторинг нежелательных явлений, выявление сигналов безопасности и регуляторная отчётность. Обеспечивает постоянный контроль безопасности лекарственных препаратов на протяжении всего жизненного цикла.
  BC-1540.10:
    name: Управление случаями нежелательных явлений
    description: |
      Обработка индивидуальных отчётов о безопасности (ICSR) и экстренная отчётность. Включает приём, классификацию и медицинскую экспертизу случаев.
  BC-1540.10.10:
    name: Приём и сортировка ICSR
    description: |
      Приём и первичная сортировка индивидуальных отчётов о безопасности случаев.
  BC-1540.10.20:
    name: Обработка случаев ICSR
    description: |
      Обработка, кодирование и составление нарративов для индивидуальных отчётов о безопасности.
  BC-1540.10.30:
    name: Срочная и периодическая отчётность
    description: |
      Экстренная отчётность в соответствии с ICH E2D и руководством ЕС по GVP.
  BC-1540.10.40:
    name: Медицинская экспертиза и оценка причинности
    description: |
      Медицинская экспертиза случаев и оценка причинно-следственной связи нежелательных явлений.
  BC-1540.20:
    name: Выявление сигналов безопасности и управление ими
    description: |
      Выявление, оценка и эскалация сигналов безопасности. Включает количественные и качественные методы обнаружения.
  BC-1540.20.10:
    name: Выявление сигналов безопасности
    description: |
      Количественное и качественное выявление сигналов безопасности в базах данных нежелательных явлений.
  BC-1540.20.20:
    name: Оценка сигналов безопасности
    description: |
      Оценка и верификация выявленных сигналов безопасности.
  BC-1540.20.30:
    name: Принятие решений по сигналам и действия
    description: |
      Принятие решений по сигналам и их трансформация в корректирующие меры и изменения маркировки.
  BC-1540.30:
    name: Управление периодической отчётностью по безопасности
    description: |
      Подготовка PSUR/PBRER, DSUR и иных периодических отчётов по безопасности. Обеспечивает соответствие регуляторным требованиям.
  BC-1540.30.10:
    name: Подготовка PSUR/PBRER
    description: |
      Подготовка периодических отчётов об обновлении данных по безопасности (PSUR) и периодических отчётов о соотношении пользы и риска (PBRER).
  BC-1540.30.20:
    name: Подготовка DSUR
    description: |
      Подготовка ежегодных отчётов об обновлении данных по безопасности в ходе разработки (DSUR).
  BC-1540.30.30:
    name: Агрегированная отчётность по безопасности
    description: |
      Подготовка иных агрегированных отчётов по безопасности.
  BC-1540.40:
    name: Управление планом управления рисками
    description: |
      Разработка и сопровождение планов управления рисками (RMP), мер по минимизации рисков и REMS.
  BC-1540.40.10:
    name: Составление плана управления рисками
    description: |
      Составление планов управления рисками ЕС (EU RMP) и документов REMS.
  BC-1540.40.20:
    name: Внедрение мер по минимизации рисков
    description: |
      Внедрение плановых и дополнительных мер по минимизации рисков.
  BC-1540.40.30:
    name: Оценка эффективности мер по минимизации рисков
    description: |
      Оценка эффективности применяемых мер по минимизации рисков.
  BC-1540.50:
    name: Управление аудитом и инспекциями по фармаконадзору
    description: |
      Аудиты системы фармаконадзора, инспекции регуляторных органов и управление CAPA.
  BC-1540.50.10:
    name: Программа аудита системы фармаконадзора
    description: |
      Программа внутренних аудитов, охватывающая систему фармаконадзора.
  BC-1540.50.20:
    name: Готовность к инспекции по фармаконадзору
    description: |
      Обеспечение готовности к инспекциям системы фармаконадзора со стороны органов здравоохранения.
  BC-1540.50.30:
    name: Управление CAPA по фармаконадзору
    description: |
      Управление корректирующими и предупреждающими действиями (CAPA) по результатам аудитов и инспекций.
  BC-1540.50.40:
    name: Ведение основного файла системы фармаконадзора
    description: |
      Ведение основного файла системы фармаконадзора (PSMF).

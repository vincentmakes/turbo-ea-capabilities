# Управление творческими кадрами и талантами (ru) — translations for L1-talent-creative-workforce-management.yaml
locale: ru
source: L1-talent-creative-workforce-management.yaml
entries:
  BC-3790:
    name: Управление творческими кадрами и талантами
    description: |
      Поиск и кастинг экранных и творческих кадров, контрактование
      и привлечение талантов, распределение остаточных и роялти,
      соответствие нормам гильдий и профсоюзов, а также долгосрочные
      отношения с творческими кадрами.
  BC-3790.10:
    name: Поиск и кастинг талантов
    description: |
      Разработка кастинговых заданий, поиск, прослушивание
      и отбор экранных и голосовых талантов для производств.
  BC-3790.10.10:
    name: Управление кастинговыми заданиями
    description: |
      Разработка кастинговых заданий и разбивок,
      направляемых кастинговым директорам и агентам.
  BC-3790.10.20:
    name: Поиск и прослушивание талантов
    description: |
      Поиск талантов, координация самозаписи и очных прослушиваний,
      рабочие процессы составления шортлиста.
  BC-3790.10.30:
    name: Решения о кастинговом отборе
    description: |
      Решения об отборе и утверждение кастинга
      по творческим и коммерческим критериям.
  BC-3790.20:
    name: Контрактование и привлечение талантов
    description: |
      Переговоры и заключение договоров на привлечение талантов,
      включая структуры loan-out и сервисных компаний.
  BC-3790.20.10:
    name: Поддержка переговоров по сделкам с талантами
    description: |
      Поддержка переговоров по сделкам, включая бенчмаркинг
      сопоставимых сделок и подготовку тёрм-листов.
  BC-3790.20.20:
    name: Контрактование через loan-out и сервисные компании
    description: |
      Контрактование через loan-out и сервисно-компанейские структуры
      с учётом налоговых и индемнификационных аспектов.
  BC-3790.20.30:
    name: Управление письмами о привлечении
    description: |
      Разработка и жизненный цикл писем о привлечении и кратких
      меморандумов по сделкам для талантов и съёмочной группы.
  BC-3790.30:
    name: Распределение остаточных и роялти
    description: |
      Расчёт и выплата остаточных, роялти и участий,
      причитающихся талантам и творческим участникам.
  BC-3790.30.10:
    name: Расчёт остаточных выплат
    description: |
      Расчёт остаточных выплат по формулам гильдий,
      типам рынков и окнам повторного использования.
  BC-3790.30.20:
    name: Создание отчётов по распределению роялти
    description: |
      Создание отчётов по распределению роялти
      для талантов и правообладателей.
  BC-3790.30.30:
    name: Отслеживание базовых участий
    description: |
      Отслеживание базовых участий, включая определения прибыли
      и уровни бухгалтерского учёта.
  BC-3790.40:
    name: Соответствие нормам гильдий и профсоюзов
    description: |
      Применение коллективных договоров, поддержка отчётности
      и аудита гильдий, а также взносы в пенсионные и медицинские фонды.
  BC-3790.40.10:
    name: Применение коллективного договора
    description: |
      Применение минимумов КД, рабочих правил и структур
      сверхурочных на производствах.
  BC-3790.40.20:
    name: Отчётность и поддержка аудита гильдий
    description: |
      Создание отчётов гильдий и поддержка аудитов
      гильдий на производствах.
  BC-3790.40.30:
    name: Управление пенсионными и медицинскими взносами
    description: |
      Расчёт и перечисление пенсионных и медицинских
      взносов в гильдейские планы.
  BC-3790.50:
    name: Управление отношениями с творческими кадрами
    description: |
      Долгосрочное управление отношениями с творческими кадрами
      и программами для поддержания вовлечённости и развития.
  BC-3790.50.10:
    name: Долгосрочное управление отношениями с талантами
    description: |
      Управление долгосрочными сделками первого права, общими
      и подовыми сделками с творческими кадрами.
  BC-3790.50.20:
    name: Отслеживание результатов работы талантов
    description: |
      Отслеживание вклада и творческих результатов
      талантов по проектам и портфелям.
  BC-3790.50.30:
    name: Программы вовлечённости талантов
    description: |
      Программы вовлечённости, включая писательские комнаты,
      резиденции и фонды развития для творческих кадров.

# Организация потоков воздушного движения (ru) — translations for L1-air-traffic-flow-management.yaml
locale: ru
source: L1-air-traffic-flow-management.yaml
entries:
  BC-1220:
    name: Организация потоков воздушного движения
    description: |
      Планирование пропускной способности, регулирование потоков, распределение слотов, балансировка спроса и пропускной способности.
  BC-1220.10:
    name: Управление планированием пропускной способности
    description: |
      Оценка пропускной способности секторов и аэродромов, установление заявленной пропускной способности.
  BC-1220.10.10:
    name: Оценка пропускной способности секторов
    description: |
      Оценка пропускной способности секторов путём измерения рабочей нагрузки.
  BC-1220.10.20:
    name: Декларирование пропускной способности аэродрома
    description: |
      Декларирование пропускной способности ВПП и перрона аэродрома.
  BC-1220.10.30:
    name: Стратегическое планирование пропускной способности
    description: |
      Многолетнее стратегическое планирование пропускной способности УВД.
  BC-1220.20:
    name: Управление регулированием потоков
    description: |
      Меры по регулированию потоков воздушного движения, регуляции, перемаршрутизации.
  BC-1220.20.10:
    name: Определение мер регулирования потоков
    description: |
      Определение мер ATFCM по секторам и аэродромам.
  BC-1220.20.20:
    name: Управление предложениями по перемаршрутизации
    description: |
      Предложение и реализация перемаршрутизаций и сценариев.
  BC-1220.20.30:
    name: Тактическая корректировка потоков
    description: |
      Тактическая корректировка мер регулирования потоков в реальном времени.
  BC-1220.30:
    name: Управление распределением слотов
    description: |
      Расчётное время взлёта (CTOT), управление слотами, обмен слотами.
  BC-1220.30.10:
    name: Выдача расчётного времени взлёта
    description: |
      Расчёт и выдача CTOT пользователям воздушного пространства.
  BC-1220.30.20:
    name: Обмен и улучшение слотов
    description: |
      Обмен слотами, улучшение слотов и обновление целевого времени.
  BC-1220.30.30:
    name: Соблюдение слотов вылета
    description: |
      Контроль соблюдения слотов и обработки исключений.
  BC-1220.40:
    name: Управление сетевой производительностью
    description: |
      Мониторинг производительности сети, отчётность по KPI.
  BC-1220.40.10:
    name: Мониторинг KPI сети
    description: |
      Мониторинг KPI сети (задержки, пропускная способность, предсказуемость).
  BC-1220.40.20:
    name: Отчётность о производительности
    description: |
      Отчётность о производительности для регуляторов сети и ЕВП.
  BC-1220.40.30:
    name: Послеоперационный анализ
    description: |
      Послеоперационный анализ потоков и узких мест.
  BC-1220.50:
    name: Управление балансировкой спроса и пропускной способности
    description: |
      Предтактическая и тактическая балансировка спроса и пропускной способности.
  BC-1220.50.10:
    name: Стратегическая балансировка спроса и пропускной способности
    description: |
      Долгосрочная балансировка спроса и пропускной способности по всей сети.
  BC-1220.50.20:
    name: Предтактическая балансировка спроса и пропускной способности
    description: |
      Предтактическая (День-1) балансировка спроса и пропускной способности.
  BC-1220.50.30:
    name: Тактическая балансировка спроса и пропускной способности
    description: |
      Тактическая балансировка спроса и пропускной способности в реальном времени.
  BC-1220.50.40:
    name: Совместное принятие решений
    description: |
      Совместное принятие решений с пользователями воздушного пространства и аэропортами.

# Управление привлечением клиентов и предложениями (ru) — translations for L1-practice-pursuit-and-proposal-management.yaml
locale: ru
source: L1-practice-pursuit-and-proposal-management.yaml
entries:
  BC-4360:
    name: Управление привлечением клиентов и предложениями
    description: |
      Деятельность на стадии привлечения для профессиональных сервисных фирм: квалификация возможностей, стратегия привлечения, разработка предложений и питчей, моделирование вознаграждения и анализ побед/поражений — в отличие от общего управления продажами.
  BC-4360.10:
    name: Управление квалификацией возможностей
    description: |
      Квалификация входящих и исходящих возможностей привлечения по стратегическому соответствию, исполнимости и коммерческой привлекательности.
  BC-4360.10.10:
    name: Выявление возможностей
    description: |
      Выявление возможностей привлечения из RFP, рекомендаций и отношений-ориентированного происхождения.
  BC-4360.10.20:
    name: Скоринг квалификации возможностей
    description: |
      Скоринг возможностей по критериям стратегического соответствия, компетенций и коммерческой привлекательности.
  BC-4360.10.30:
    name: Предварительное разрешение перед привлечением
    description: |
      Предварительное разрешение возможностей через индикативные проверки независимости и конфликтов перед формальными инвестициями в привлечение.
  BC-4360.20:
    name: Управление стратегией привлечения
    description: |
      Определение стратегии привлечения, плана победы, состава команды привлечения и конкурентного позиционирования для квалифицированных возможностей.
  BC-4360.20.10:
    name: Разработка плана победы
    description: |
      Разработка плана победы в привлечении, включая ключевые сообщения, дифференциаторы и картирование стейкхолдеров.
  BC-4360.20.20:
    name: Состав команды привлечения
    description: |
      Формирование команды привлечения, включая руководителя привлечения, предметных экспертов и поддержку по ценообразованию.
  BC-4360.20.30:
    name: Синтез конкурентной разведки
    description: |
      Синтез конкурентной разведки о конкурирующих фирмах, претендующих на ту же возможность.
  BC-4360.30:
    name: Управление разработкой предложений
    description: |
      Подготовка, ревью и подача письменных предложений и ответов на RFP в соответствии со спецификациями клиента.
  BC-4360.30.10:
    name: Подготовка предложения
    description: |
      Подготовка разделов предложения, включая подход, команду и релевантный опыт.
  BC-4360.30.20:
    name: Ревью и утверждение предложения
    description: |
      Внутренний ревью и утверждение содержания предложения, заявлений и коммерческих обязательств.
  BC-4360.30.30:
    name: Управление подачей предложения
    description: |
      Подача предложения в требуемом клиентом формате и канале с аудит-следом подачи.
  BC-4360.30.40:
    name: Повторное использование материалов предложений
    description: |
      Повторное использование и тегирование содержания предложений, кейс-стади и портфолио по различным привлечениям.
  BC-4360.40:
    name: Управление питчами и презентациями
    description: |
      Подготовка и проведение питчей, конкурсных презентаций и устных выступлений в ходе конкурентных привлечений.
  BC-4360.40.10:
    name: Подготовка материалов питча
    description: |
      Подготовка питч-деков, демонстрационных материалов и вспомогательных материалов для устных презентаций.
  BC-4360.40.20:
    name: Репетиция и коучинг питча
    description: |
      Репетиция питч-команд и коучинг по ключевым сообщениям, динамике и отработке вопросов.
  BC-4360.40.30:
    name: Управление проведением питча
    description: |
      Проведение питчей и конкурсных презентаций, включая логистику и вспомогательные материалы.
  BC-4360.50:
    name: Моделирование вознаграждения и ценообразование привлечений
    description: |
      Разработка структур вознаграждения и моделирование цен для возможностей привлечения, включая альтернативные условия вознаграждения и конструкции разделения риска.
    out_of_scope:
      - Управление вознаграждением на стадии задания (BC-4330.40)
      - Общефирменная стратегия ценообразования (BC-290)
  BC-4360.50.10:
    name: Разработка структуры вознаграждения привлечения
    description: |
      Разработка структур вознаграждения по вариантам: почасовой, фиксированный, с потолком, условный и основанный на результате.
  BC-4360.50.20:
    name: Моделирование рентабельности привлечения
    description: |
      Моделирование рентабельности привлечения при различных сценариях укомплектования, вознаграждения и риска.
  BC-4360.50.30:
    name: Утверждение ценообразования привлечения
    description: |
      Внутреннее утверждение ценообразования привлечения по порогам скидок, маржи и риска.
  BC-4360.60:
    name: Анализ побед и поражений в привлечении
    description: |
      Структурированный дебриф результатов привлечений, аналитика коэффициента побед и фиксация выводов в практику привлечений и предложений.
  BC-4360.60.10:
    name: Дебриф результата привлечения
    description: |
      Внутренние и клиентские дебрифы результатов привлечений, включая оценку конкурентов.
  BC-4360.60.20:
    name: Аналитика коэффициента побед
    description: |
      Аналитика коэффициента побед по практике, клиенту, типу возможности и руководителю привлечения.
  BC-4360.60.30:
    name: Фиксация уроков привлечений
    description: |
      Фиксация уроков привлечений и обратной связи в плейбуки привлечений и обучение.

# Регистрация актов гражданского состояния и удостоверение личности (ru) — translations for L1-civil-records-identity-registration-management.yaml
locale: ru
source: L1-civil-records-identity-registration-management.yaml
entries:
  BC-3290:
    name: Регистрация актов гражданского состояния и удостоверение личности
    description: |
      Авторитетная регистрация и хранение гражданских и нормативных документов, включая актовые записи, национальные удостоверения личности, реестры предприятий и юридических лиц, а также земельный кадастр, вместе с аутентификацией, раскрытием информации и средствами защиты конфиденциальности.
  BC-3290.10:
    name: Управление актами гражданского состояния
    description: |
      Регистрация актовых событий, включая рождение, смерть, бракосочетание, регистрацию партнёрства и развод.
    in_scope:
      - Регистрация рождений, смертей, браков и разводов
      - Выдача свидетельств о событиях
      - Извлечение статистики актовых записей
    out_of_scope:
      - Присвоение национального идентификационного номера (относится к национальной идентификационной регистрации)
  BC-3290.10.10:
    name: Регистрация рождений
    description: |
      Регистрация рождений и выдача свидетельств о рождении.
  BC-3290.10.20:
    name: Регистрация смертей
    description: |
      Регистрация смертей и выдача свидетельств о смерти.
  BC-3290.10.30:
    name: Регистрация браков и партнёрств
    description: |
      Регистрация браков и гражданских партнёрств и выдача свидетельств.
  BC-3290.10.40:
    name: Регистрация разводов и расторжений
    description: |
      Регистрация разводов, расторжений брака и окончательных решений суда.
  BC-3290.20:
    name: Национальная идентификационная регистрация
    description: |
      Создание, ведение и аутентификация базовых национальных идентификационных записей и документов.
  BC-3290.20.10:
    name: Идентификационная регистрация
    description: |
      Регистрация граждан и резидентов в национальной системе идентификации.
  BC-3290.20.20:
    name: Сбор биометрических данных и дедупликация
    description: |
      Сбор, дедупликация и сопоставление биометрических идентификаторов.
  BC-3290.20.30:
    name: Выдача удостоверяющих документов
    description: |
      Изготовление и выдача национальных удостоверений личности и цифровых документов.
  BC-3290.20.40:
    name: Обновление личных данных и жизненный цикл
    description: |
      Обновление атрибутов личности, жизненных событий и перевыдача документов.
  BC-3290.30:
    name: Управление реестром предприятий и юридических лиц
    description: |
      Регистрация компаний, партнёрств, организаций и иных юридических лиц и ведение авторитетных данных.
  BC-3290.30.10:
    name: Регистрация юридических лиц
    description: |
      Регистрация компаний, партнёрств, благотворительных организаций и иных юридических лиц.
  BC-3290.30.20:
    name: Обработка ежегодных отчётов
    description: |
      Приём и обработка годовых отчётов, счетов и документов директоров.
  BC-3290.30.30:
    name: Управление реестром бенефициарного владения
    description: |
      Ведение раскрытия сведений о бенефициарном владении и контроле.
  BC-3290.30.40:
    name: Ликвидация и исключение юридических лиц
    description: |
      Исключение из реестра, ликвидация и восстановление юридических лиц.
  BC-3290.40:
    name: Управление земельным и кадастровым реестром
    description: |
      Регистрация прав собственности на землю, сервитутов, обременений и кадастровых участков и ведение авторитетных земельных записей.
  BC-3290.40.10:
    name: Регистрация прав собственности
    description: |
      Регистрация прав собственности на землю, сделок и имущественных прав.
  BC-3290.40.20:
    name: Фиксация обременений и залогов
    description: |
      Фиксация ипотек, сервитутов и иных обременений.
  BC-3290.40.30:
    name: Ведение кадастровых съёмок
    description: |
      Ведение границ кадастровых участков и материалов съёмок.
  BC-3290.50:
    name: Аутентификация документов и апостиль
    description: |
      Аутентификация публичных документов для внутреннего и международного использования, включая услуги апостиля в соответствии с Гаагской конвенцией.
  BC-3290.50.10:
    name: Аутентификация документов
    description: |
      Аутентификация публичных документов для юридического и административного использования.
  BC-3290.50.20:
    name: Выдача апостиля
    description: |
      Выдача апостилей в соответствии с Гаагской конвенцией 1961 года.
  BC-3290.50.30:
    name: Координация нотариальных услуг
    description: |
      Координация нотариальных услуг, предоставляемых государством.
  BC-3290.60:
    name: Раскрытие записей и конфиденциальность
    description: |
      Контролируемое раскрытие, редактирование и управление конфиденциальностью гражданских и нормативных документов.
  BC-3290.60.10:
    name: Публичные поисковые сервисы
    description: |
      Предоставление общедоступных поисковых и сертификационных сервисов по гражданским реестрам.
  BC-3290.60.20:
    name: Обработка ограниченных запросов на раскрытие
    description: |
      Обработка ограниченных запросов на раскрытие, включая усыновление, защиту свидетелей и грифы безопасности.
  BC-3290.60.30:
    name: Конфиденциальность и редактирование документов
    description: |
      Применение средств защиты конфиденциальности и редактирование гражданских документов перед раскрытием.

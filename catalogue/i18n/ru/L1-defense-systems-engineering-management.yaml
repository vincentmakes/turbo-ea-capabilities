# Управление системной инженерией в оборонном секторе (ru) — translations for L1-defense-systems-engineering-management.yaml
locale: ru
source: L1-defense-systems-engineering-management.yaml
entries:
  BC-1770:
    name: Управление системной инженерией в оборонном секторе
    description: |
      Системная инженерия по MIL-STD: управление требованиями, архитектура, верификация/валидация, управление конфигурацией и интеграция.
  BC-1770.10:
    name: Управление инженерией требований в оборонном секторе
    description: |
      Формирование требований, их декомпозиция и прослеживаемость.
  BC-1770.10.10:
    name: Формирование требований заинтересованных сторон
    description: |
      Формирование потребностей заинтересованных сторон и оперативных требований.
  BC-1770.10.20:
    name: Декомпозиция системных требований
    description: |
      Декомпозиция системных требований до уровня подсистем.
  BC-1770.10.30:
    name: Прослеживаемость требований
    description: |
      Двунаправленная прослеживаемость требований до проектных решений и испытаний.
  BC-1770.10.40:
    name: Планирование верификации требований
    description: |
      Определение методов верификации и критериев приёмки.
  BC-1770.20:
    name: Управление архитектурой оборонных систем
    description: |
      Архитектура систем, модели и базовые решения.
  BC-1770.20.10:
    name: Моделирование оперативной и системной архитектуры
    description: |
      Моделирование оперативной и системной архитектуры (DoDAF/MoDAF).
  BC-1770.20.20:
    name: Анализ компромиссных решений архитектуры
    description: |
      Анализ компромиссных решений между вариантами архитектуры.
  BC-1770.20.30:
    name: Управление базовой архитектурой
    description: |
      Определение и управление базовыми решениями архитектуры.
  BC-1770.30:
    name: Управление определением интерфейсов в оборонных системах
    description: |
      Управление интерфейсами, документы управления интерфейсами и планы управления интерфейсами.
  BC-1770.30.10:
    name: Идентификация интерфейсов
    description: |
      Идентификация внутренних и внешних интерфейсов системы.
  BC-1770.30.20:
    name: Управление документами управления интерфейсами
    description: |
      Подготовка и управление документами ICD и IRS.
  BC-1770.30.30:
    name: Верификация интерфейсов
    description: |
      Верификация соответствия интерфейсов в ходе интеграции.
  BC-1770.40:
    name: Управление верификацией и валидацией оборонных систем
    description: |
      Планирование V&V, его выполнение и сертификация.
  BC-1770.40.10:
    name: Планирование V&V
    description: |
      Стратегия и планирование верификации и валидации.
  BC-1770.40.20:
    name: Проведение V&V
    description: |
      Проведение V&V: анализы, демонстрации, инспекции и испытания.
  BC-1770.40.30:
    name: Отчётность о результатах V&V
    description: |
      Отчётность о результатах V&V и выявленных несоответствиях.
  BC-1770.50:
    name: Управление конфигурацией оборонных систем
    description: |
      Идентификация конфигурации, управление изменениями, учёт статуса и аудиты.
  BC-1770.50.10:
    name: Идентификация конфигурации оборонных систем
    description: |
      Идентификация конфигурации по MIL-HDBK-61.
  BC-1770.50.20:
    name: Управление изменениями конфигурации оборонных систем
    description: |
      Управление изменениями конфигурации: ECP, RFD, DD-1694.
  BC-1770.50.30:
    name: Учёт статуса конфигурации оборонных систем
    description: |
      Учёт статуса конфигурации и отчётность.
  BC-1770.50.40:
    name: Аудиты конфигурации
    description: |
      Функциональные и физические аудиты конфигурации.
  BC-1770.60:
    name: Управление интеграцией оборонных систем
    description: |
      Интеграция подсистем, интегрированные испытания и интеграция в систему систем.
  BC-1770.60.10:
    name: Проведение интеграции подсистем
    description: |
      Проведение этапов интеграции подсистем.
  BC-1770.60.20:
    name: Проведение интегрированных испытаний
    description: |
      Проведение интегрированных испытаний в лабораторных и полевых условиях.
  BC-1770.60.30:
    name: Интеграция в систему систем
    description: |
      Интеграция в более широкую систему систем и объединённые архитектуры.

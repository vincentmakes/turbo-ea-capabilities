# Администрирование полисов (ru) — translations for L1-policy-administration-management.yaml
locale: ru
source: L1-policy-administration-management.yaml
entries:
  BC-2140:
    name: Администрирование полисов
    description: |
      Выдача полисов, оформление дополнений, корректировки в течение срока действия,
      возобновление, аннулирование, просрочка, восстановление, управление документами
      и администрирование групповых и генеральных полисов по действующим страховым договорам.
  BC-2140.10:
    name: Управление выдачей полисов
    description: |
      Формирование, сборка и активация новых страховых договоров и сопутствующих документов.
  BC-2140.10.10:
    name: Формирование документов полиса
    description: |
      Создание документов полиса на основе шаблонов продуктов и согласованных условий.
  BC-2140.10.20:
    name: Сборка расписания и формулировок полиса
    description: |
      Составление расписаний полиса, формулировок и дополнений в единый договор.
  BC-2140.10.30:
    name: Активация полиса
    description: |
      Активация новых полисов и уведомление нижестоящих систем.
  BC-2140.20:
    name: Дополнения и корректировки полиса
    description: |
      Приём, тарификация, согласование и выдача дополнений и корректировок в течение срока действия полиса.
  BC-2140.20.10:
    name: Приём заявок на дополнения
    description: |
      Приём заявок на внесение дополнений от страхователей и страховых посредников.
  BC-2140.20.20:
    name: Тарификация и согласование дополнений
    description: |
      Расчёт стоимости дополнений и их согласование с андеррайтерами при необходимости.
  BC-2140.20.30:
    name: Выдача и уведомление о дополнениях
    description: |
      Выдача документов о дополнениях и уведомление страхователя.
  BC-2140.30:
    name: Управление возобновлением полисов
    description: |
      Оценка права на возобновление, пересчёт страховой премии, формирование предложений и обработка отказов.
  BC-2140.30.10:
    name: Оценка права на возобновление
    description: |
      Оценка права на возобновление на основе опыта убытков и правил андеррайтинга.
  BC-2140.30.20:
    name: Пересчёт премии при возобновлении
    description: |
      Пересчёт премий по возобновляемым полисам в соответствии с текущими тарифами и опытом.
  BC-2140.30.30:
    name: Формирование предложений о возобновлении
    description: |
      Формирование и рассылка предложений о возобновлении страхователям.
  BC-2140.30.40:
    name: Обработка отказов от возобновления
    description: |
      Обработка отказов от возобновления, включая сроки уведомления и взаимодействие с регуляторами.
  BC-2140.40:
    name: Аннулирование и просрочка полисов
    description: |
      Обработка аннулирования, корректировка страховой премии, просрочка и восстановление полисов.
  BC-2140.40.10:
    name: Обработка заявок на аннулирование
    description: |
      Обработка заявок на аннулирование от страхователей, посредников или страховщика.
  BC-2140.40.20:
    name: Расчёт пропорционального и краткосрочного возврата
    description: |
      Расчёт корректировок страховой премии при аннулировании на пропорциональной и краткосрочной основе.
  BC-2140.40.30:
    name: Обработка просрочки
    description: |
      Обработка просрочки по неоплате и уведомление страхователя.
  BC-2140.40.40:
    name: Восстановление полиса
    description: |
      Восстановление просроченных или аннулированных полисов при прохождении андеррайтинговых проверок.
  BC-2140.50:
    name: Управление документами и записями полиса
    description: |
      Репозиторий документов полиса, хранение регуляторных записей и журналы аудита полисов.
  BC-2140.50.10:
    name: Репозиторий документов полиса
    description: |
      Хранение документов полиса и сопутствующей корреспонденции.
  BC-2140.50.20:
    name: Хранение регуляторных записей
    description: |
      Хранение записей полиса в соответствии с требованиями страхового регулирования.
  BC-2140.50.30:
    name: Поддержание журнала аудита полиса
    description: |
      Ведение неизменяемых журналов аудита изменений и решений по полису.
  BC-2140.60:
    name: Администрирование групповых и генеральных полисов
    description: |
      Настройка групповых полисов, ведение сертификатов и циклы возобновления группы.
  BC-2140.60.10:
    name: Настройка группового полиса
    description: |
      Настройка групповых и генеральных страховых договоров для работодателей и аффинити-схем.
  BC-2140.60.20:
    name: Ведение участников и сертификатов
    description: |
      Ведение участников группы, сертификатов и данных иждивенцев.
  BC-2140.60.30:
    name: Управление циклом возобновления группы
    description: |
      Управление циклами возобновления группового полиса, пересчётом премии и повторной регистрацией участников.

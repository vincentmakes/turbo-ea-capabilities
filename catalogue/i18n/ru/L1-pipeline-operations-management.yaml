# Трубопроводные операции (ru) — translations for L1-pipeline-operations-management.yaml
locale: ru
source: L1-pipeline-operations-management.yaml
entries:
  BC-3060:
    name: Трубопроводные операции
    description: |
      Эксплуатация, обеспечение целостности и коммерческое управление сборными и магистральными углеводородными трубопроводами: диспетчеризация, внутритрубная инспекция, обнаружение утечек, планирование и номинации, тарифное администрирование.
  BC-3060.10:
    name: Диспетчерское управление трубопроводами
    description: |
      Диспетчеризация диспетчерского центра и управление SCADA жидкостных и газовых трубопроводов.
  BC-3060.10.10:
    name: Диспетчеризация трубопровода
    description: |
      Круглосуточная диспетчеризация трубопроводных операций.
  BC-3060.10.20:
    name: Операции SCADA
    description: |
      Эксплуатация систем SCADA трубопроводов и полевой телеметрии.
  BC-3060.10.30:
    name: Гидравлическое моделирование трубопровода
    description: |
      Гидравлическое моделирование режимов потока в трубопроводе в реальном времени и автономном режиме.
  BC-3060.10.40:
    name: Управление тренажёром операторов
    description: |
      Сопровождение тренажёров для обучения диспетчеров трубопроводов согласно регуляторным требованиям.
  BC-3060.20:
    name: Управление целостностью трубопровода
    description: |
      Внутритрубная инспекция, катодная защита и оценка дефектов для обеспечения целостности трубопроводов.
  BC-3060.20.10:
    name: Внутритрубная инспекция
    description: |
      Кампании внутритрубной инспекции умными поршнями для контроля целостности трубопроводов.
  BC-3060.20.20:
    name: Управление катодной защитой
    description: |
      Проектирование, эксплуатация и обследование катодной защиты трубопроводов.
  BC-3060.20.30:
    name: Оценка дефектов трубопровода
    description: |
      Инженерная оценка критичности дефектов потери металла и трещиноподобных дефектов.
  BC-3060.20.40:
    name: Патрулирование трассы трубопровода
    description: |
      Воздушное и наземное патрулирование трасс трубопроводов.
  BC-3060.30:
    name: Обнаружение утечек и мониторинг трубопровода
    description: |
      Вычислительные и внешние системы обнаружения утечек и мониторинг трубопровода.
  BC-3060.30.10:
    name: Вычислительное обнаружение утечек
    description: |
      Системы обнаружения утечек в реальном времени на основе переходных моделей и статистические системы.
  BC-3060.30.20:
    name: Внешнее обнаружение утечек
    description: |
      Волоконно-оптические, акустические и паровые системы внешнего обнаружения утечек.
  BC-3060.30.30:
    name: Воздушные и пешие обследования
    description: |
      Регулярные воздушные и пешие обследования коридоров трубопроводов.
  BC-3060.40:
    name: Планирование и номинации по трубопроводу
    description: |
      Управление заявками на мощность, последовательность партий и управление линейным наполнением для транспортируемых объёмов.
  BC-3060.40.10:
    name: Управление заявками на мощность
    description: |
      Приём, подтверждение и планирование заявок грузоотправителей.
  BC-3060.40.20:
    name: Последовательность партий
    description: |
      Последовательность многопродуктовых партий в жидкостных трубопроводах.
  BC-3060.40.30:
    name: Управление линейным наполнением
    description: |
      Управление собственностью на линейное наполнение и позициями запасов по трубопроводам.
  BC-3060.50:
    name: Управление тарифами трубопровода
    description: |
      Подача и администрирование регулируемых и договорных тарифов, выставление счетов грузоотправителям и расчёт дисбалансов.
  BC-3060.50.10:
    name: Подача и ведение тарифов
    description: |
      Подача и ведение тарифов трубопроводов в регулирующих органах.
  BC-3060.50.20:
    name: Выставление счетов грузоотправителям
    description: |
      Расчёт и выставление транспортных счетов грузоотправителям.
  BC-3060.50.30:
    name: Расчёт дисбалансов
    description: |
      Урегулирование операционных дисбалансов между грузоотправителями.
  BC-3060.60:
    name: Строительство и ремонт трубопроводов
    description: |
      Эксплуатационный ремонт, операции горячего тэппинга и координация замены магистральных и сборных трубопроводов.
  BC-3060.60.10:
    name: Координация замены трубопровода
    description: |
      Координация замены участков трубопровода и перекладки.
  BC-3060.60.20:
    name: Эксплуатационный ремонт
    description: |
      Ремонт в эксплуатации с использованием композитных муфт, манжет и наплавки.
  BC-3060.60.30:
    name: Операции горячего тэппинга
    description: |
      Операции горячего тэппинга и стоппелирования для врезки в трубопроводы под давлением.

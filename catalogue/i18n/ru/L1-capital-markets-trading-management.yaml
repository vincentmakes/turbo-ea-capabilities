# Управление торговлей на рынках капитала (ru) — translations for L1-capital-markets-trading-management.yaml
locale: ru
source: L1-capital-markets-trading-management.yaml
entries:
  BC-1370:
    name: Управление торговлей на рынках капитала
    description: |
      Трейдинг фронт-офиса, маркет-мейкинг, управление позициями, продажи и торговля.
  BC-1370.10:
    name: Управление маркет-мейкингом
    description: |
      Маркет-мейкинг по классам активов.
  BC-1370.10.10:
    name: Формирование котировок
    description: |
      Формирование котировок на покупку и продажу на рынках.
  BC-1370.10.20:
    name: Управление портфелем маркет-мейкера
    description: |
      Управление портфелем маркет-мейкера и позицией риска.
  BC-1370.10.30:
    name: Ценовой механизм маркет-мейкера
    description: |
      Работа ценового механизма и управление параметрами.
  BC-1370.20:
    name: Управление торговыми позициями
    description: |
      Торговые позиции, атрибуция P&L.
  BC-1370.20.10:
    name: Ведение позиций в режиме реального времени
    description: |
      Отслеживание позиций торгового портфеля в режиме реального времени.
  BC-1370.20.20:
    name: Расчёт торгового P&L
    description: |
      Расчёт торгового P&L по деск-подразделениям.
  BC-1370.20.30:
    name: Атрибуционный анализ P&L
    description: |
      Атрибуция P&L по факторам риска, времени и трейдерам.
  BC-1370.30:
    name: Управление торговыми заявками
    description: |
      Приём, исполнение, интеллектуальная маршрутизация заявок, наилучшее исполнение.
  BC-1370.30.10:
    name: Приём торговых заявок
    description: |
      Приём и валидация клиентских и проприетарных заявок.
  BC-1370.30.20:
    name: Интеллектуальная маршрутизация заявок
    description: |
      Интеллектуальная маршрутизация заявок по площадкам для наилучшего исполнения.
  BC-1370.30.30:
    name: Мониторинг качества исполнения
    description: |
      Мониторинг качества исполнения и аналитика наилучшего исполнения.
  BC-1370.30.40:
    name: Управление жизненным циклом заявки
    description: |
      Жизненный цикл заявки, включая изменения и отмены.
  BC-1370.40:
    name: Управление алгоритмической торговлей
    description: |
      Алгоритмические стратегии, бэктестинг, соответствие требованиям.
  BC-1370.40.10:
    name: Разработка алгоритмических стратегий
    description: |
      Разработка и сертификация алгоритмических стратегий.
  BC-1370.40.20:
    name: Бэктестинг алгоритмов
    description: |
      Бэктестинг и симуляция торговых алгоритмов.
  BC-1370.40.30:
    name: Контроль алгоритмической торговли
    description: |
      Предторговый и операционный контроль алгоритмической торговли.
  BC-1370.50:
    name: Управление продажами и трейдингом
    description: |
      Клиентские продающие деск-подразделения, голосовая и электронная торговля.
  BC-1370.50.10:
    name: Операции клиентских продающих деск-подразделений
    description: |
      Работа голосовых продающих деск-подразделений для институциональных клиентов.
  BC-1370.50.20:
    name: Операции электронной торговли
    description: |
      Работа платформ электронной торговли и подключений.
  BC-1370.50.30:
    name: Предторговое исследование и ценообразование
    description: |
      Предторговые исследования, ориентировочное ценообразование и поддержка структурирования.
  BC-1370.60:
    name: Управление торговым комплаенсом и наблюдением
    description: |
      Наблюдение за торговлей, обнаружение рыночных злоупотреблений, MiFID II.
  BC-1370.60.10:
    name: Наблюдение за торговлей
    description: |
      Наблюдение за торговлей и обнаружение подозрительных паттернов.
  BC-1370.60.20:
    name: Обнаружение рыночных злоупотреблений
    description: |
      Обнаружение рыночных злоупотреблений, включая инсайдерскую торговлю и манипулирование рынком.
  BC-1370.60.30:
    name: Наблюдение за коммуникациями
    description: |
      Наблюдение за коммуникациями трейдеров и голосовыми переговорами.
  BC-1370.60.40:
    name: Регуляторная отчётность по сделкам
    description: |
      Регуляторная отчётность по сделкам и транзакциям (MiFIR, EMIR, SFTR).

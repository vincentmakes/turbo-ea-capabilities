# Управление операциями SaaS-платформы (ru) — translations for L1-saas-platform-operations-management.yaml
locale: ru
source: L1-saas-platform-operations-management.yaml
entries:
  BC-4220:
    name: Управление операциями SaaS-платформы
    description: |
      Надёжность сервиса, наблюдаемость, дежурное реагирование, управление мощностью, производительностью и аварийным восстановлением мультиарендного SaaS-сервиса.
  BC-4220.10:
    name: Инженерия надёжности сервиса
    description: |
      Определение и управление индикаторами уровня сервиса, целевыми показателями уровня сервиса и бюджетами ошибок для SaaS-сервиса.
    in_scope:
      - Дисциплина SLI / SLO / бюджета ошибок для работающего продукта
    out_of_scope:
      - Клиентские обязательства по SLA (входит в Управление доверием и соответствием SaaS)
      - Внутренние IT-уровни сервиса (входит в Управление информационными технологиями)
  BC-4220.10.10:
    name: Определение индикаторов уровня сервиса
    description: |
      Определение индикаторов уровня сервиса, измеряющих клиентский опыт от работы сервисов.
  BC-4220.10.20:
    name: Управление целевыми показателями уровня сервиса
    description: |
      Установка, ревью и пересмотр целевых показателей уровня сервиса по сервисам.
  BC-4220.10.30:
    name: Управление бюджетом ошибок
    description: |
      Управление бюджетами ошибок и политикой, регулирующей их расходование.
  BC-4220.20:
    name: Управление наблюдаемостью
    description: |
      Логи, метрики, трассировки и синтетический мониторинг, делающие работающий сервис понятным в продуктиве.
  BC-4220.20.10:
    name: Управление логированием приложений
    description: |
      Управление конвенциями логирования, конвейерами и хранением логов приложений.
  BC-4220.20.20:
    name: Управление конвейером метрик
    description: |
      Эксплуатация конвейеров приёма, хранения и запросов метрик.
  BC-4220.20.30:
    name: Распределённая трассировка
    description: |
      Сквозная распределённая трассировка между сервисами для расследования проблем в продуктиве.
  BC-4220.20.40:
    name: Синтетический мониторинг
    description: |
      Синтетические зонды, моделирующие критически важные пользовательские сценарии снаружи сервиса.
  BC-4220.30:
    name: Управление реагированием на инциденты
    description: |
      Дежурное реагирование, обнаружение инцидентов, координация и коммуникация с клиентами во время производственных инцидентов.
  BC-4220.30.10:
    name: Управление графиком дежурств
    description: |
      Определение и управление графиками дежурств по продуктовым командам.
  BC-4220.30.20:
    name: Обнаружение инцидентов
    description: |
      Обнаружение производственных инцидентов по телеметрии и внешним сигналам.
  BC-4220.30.30:
    name: Координация реагирования на инциденты
    description: |
      Координация реагирования на инциденты: роли, коммуникации и решения в ходе инцидента.
  BC-4220.30.40:
    name: Коммуникация с клиентами при инцидентах
    description: |
      Коммуникация с затронутыми клиентами в ходе и после инцидентов.
  BC-4220.40:
    name: Постморием и улучшение надёжности
    description: |
      Подготовка постмориемов и отслеживание элементов действий по надёжности для накопления уроков со временем.
  BC-4220.40.10:
    name: Подготовка постморием
    description: |
      Бесконфликтная подготовка постмориемов после инцидентов и значимых почти-промахов.
  BC-4220.40.20:
    name: Отслеживание действий по надёжности
    description: |
      Отслеживание закрытия элементов действий по надёжности по командам.
  BC-4220.40.30:
    name: Анализ трендов надёжности
    description: |
      Анализ трендов надёжности по сервисам и временным горизонтам.
  BC-4220.50:
    name: Управление мощностью и производительностью
    description: |
      Прогнозирование мощности, политики автомасштабирования и нагрузочное тестирование SaaS-сервиса.
  BC-4220.50.10:
    name: Прогнозирование мощности
    description: |
      Прогнозирование спроса на мощность по сервисам и регионам.
  BC-4220.50.20:
    name: Управление политиками автомасштабирования
    description: |
      Определение и настройка политик автомасштабирования для сервисов продукта.
  BC-4220.50.30:
    name: Нагрузочное тестирование
    description: |
      Нагрузочное, стресс- и длительное тестирование работающего сервиса.
  BC-4220.60:
    name: Аварийное восстановление и устойчивость
    description: |
      Резервное копирование и восстановление, оркестрация отказоустойчивости и учения по аварийному восстановлению SaaS-сервиса.
  BC-4220.60.10:
    name: Управление резервным копированием и восстановлением
    description: |
      Политика резервного копирования, выполнение и валидация восстановления для хранилищ данных сервиса.
  BC-4220.60.20:
    name: Оркестрация отказоустойчивости
    description: |
      Оркестрация отказоустойчивости между зонами доступности и регионами.
  BC-4220.60.30:
    name: Управление учениями по аварийному восстановлению
    description: |
      Планирование и проведение учений по аварийному восстановлению и игровых дней.

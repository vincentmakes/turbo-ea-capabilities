# Институциональное развитие и работа с выпускниками (ru) — translations for L1-institutional-advancement-alumni-management.yaml
locale: ru
source: L1-institutional-advancement-alumni-management.yaml
entries:
  BC-4800:
    name: Институциональное развитие и работа с выпускниками
    description: |
      Взаимодействие с сообществами выпускников, работа с донорами и
      управление фандрайзинговыми кампаниями, пожертвованиями,
      попечительством и отчётностью перед донорами по эндаументам.
  BC-4800.10:
    name: Взаимодействие с выпускниками
    description: |
      Взаимодействие с сообществами выпускников посредством программ,
      мероприятий и коммуникаций, поддерживающих долгосрочные связи с
      учебным заведением.
    in_scope:
      - Деятельность сообщества выпускников
      - Мероприятия и встречи выпускников
      - Коммуникации с выпускниками
    out_of_scope:
      - Карьерные службы для действующих студентов (охватываются поддержкой и благополучием студентов)
  BC-4800.10.10:
    name: Деятельность ассоциаций выпускников
    description: |
      Деятельность ассоциаций выпускников, региональных отделений и
      онлайн-сообществ.
  BC-4800.10.20:
    name: Мероприятия и встречи выпускников
    description: |
      Планирование и проведение мероприятий и встреч выпускников.
  BC-4800.10.30:
    name: Коммуникации с выпускниками
    description: |
      Редакционные и коммуникационные каналы для аудитории выпускников.
  BC-4800.20:
    name: Управление отношениями с донорами
    description: |
      Выявление, развитие и управление отношениями с потенциальными и
      действующими донорами.
    in_scope:
      - Изучение потенциальных доноров и их выявление
      - Развитие отношений с донорами и привлечение пожертвований
      - Управление отношениями с крупными донорами
    out_of_scope:
      - Общие операции CRM (охватываются межотраслевым управлением взаимоотношениями с клиентами)
  BC-4800.20.10:
    name: Изучение и выявление потенциальных доноров
    description: |
      Изучение и выявление потенциальных доноров учебного заведения.
  BC-4800.20.20:
    name: Развитие отношений и привлечение донора
    description: |
      Развитие отношений с донорами и привлечение пожертвований.
  BC-4800.20.30:
    name: Управление отношениями с крупными донорами
    description: |
      Индивидуальное управление отношениями с крупными донорами.
  BC-4800.30:
    name: Управление фандрайзинговыми кампаниями
    description: |
      Планирование и проведение фандрайзинговых кампаний по ежегодным,
      капитальным и цифровым каналам.
    in_scope:
      - Кампании ежегодного сбора средств
      - Управление капитальными кампаниями
      - Краудфандинг и пиринговые кампании
    out_of_scope:
      - Маркетинговые кампании, не связанные с фандрайзингом (охватываются межотраслевым управлением маркетингом)
  BC-4800.30.10:
    name: Кампании ежегодного сбора средств
    description: |
      Проведение кампаний ежегодного сбора средств и регулярных
      пожертвований.
  BC-4800.30.20:
    name: Управление капитальными кампаниями
    description: |
      Управление многолетними капитальными кампаниями.
  BC-4800.30.30:
    name: Краудфандинг и пиринговые кампании
    description: |
      Проведение краудфандинговых и пиринговых фандрайзинговых кампаний.
  BC-4800.40:
    name: Администрирование пожертвований и обязательств
    description: |
      Получение, учёт и администрирование пожертвований и обязательств,
      включая инструменты планируемых пожертвований.
    in_scope:
      - Получение и обработка пожертвований
      - Отслеживание обязательств
      - Администрирование планируемых и отложенных пожертвований
    out_of_scope:
      - Общая дебиторская задолженность (охватывается межотраслевым финансовым управлением)
  BC-4800.40.10:
    name: Получение и обработка пожертвований
    description: |
      Получение и обработка наличных, чеков, онлайн-платежей и
      натуральных пожертвований.
  BC-4800.40.20:
    name: Отслеживание обязательств
    description: |
      Отслеживание обязательств по пожертвованиям и графиков платежей.
  BC-4800.40.30:
    name: Администрирование планируемых пожертвований
    description: |
      Администрирование завещательных отказов, благотворительных фондов
      и иных инструментов планируемых пожертвований.
  BC-4800.50:
    name: Попечительство и признание доноров
    description: |
      Попечительство над отношениями с донорами посредством признания,
      поощрения и постоянного взаимодействия с донорами именных фондов.
    in_scope:
      - Подтверждение пожертвований
      - Программы признания доноров
      - Попечительство над эндаументными фондами
    out_of_scope:
      - Коммуникации по связям с общественностью (охватываются межотраслевым управлением корпоративными коммуникациями)
  BC-4800.50.10:
    name: Подтверждение пожертвований
    description: |
      Подтверждение получения пожертвований и обязательств от доноров.
  BC-4800.50.20:
    name: Программы признания доноров
    description: |
      Реализация программ признания доноров и донорских обществ.
  BC-4800.50.30:
    name: Попечительство над эндаументными фондами
    description: |
      Попечительство над донорами именных и эндаументных фондов.
  BC-4800.60:
    name: Отчётность перед донорами по эндаументам
    description: |
      Отчётность перед донорами об использовании, результатах и
      воздействии целевых и эндаументных фондов.
    in_scope:
      - Отчётность об использовании целевых фондов
      - Отчётность о доходности именных эндаументных фондов
      - Отчётность о воздействии для доноров
    out_of_scope:
      - Институциональная финансовая отчётность (охватывается межотраслевым финансовым управлением)
      - Управление инвестициями эндаументного фонда (охватывается межотраслевым управлением казначейством)
  BC-4800.60.10:
    name: Отчётность об использовании целевых фондов
    description: |
      Отчётность об использовании целевых и донорских фондов.
  BC-4800.60.20:
    name: Отчётность о доходности именных фондов
    description: |
      Отчётность о доходности именных эндаументных фондов для их
      доноров.
  BC-4800.60.30:
    name: Отчётность о воздействии для доноров
    description: |
      Подготовка нарративных отчётов о воздействии и результатах для
      доноров.

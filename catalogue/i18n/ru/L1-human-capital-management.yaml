# Управление человеческим капиталом (ru) — translations for L1-human-capital-management.yaml
locale: ru
source: L1-human-capital-management.yaml
entries:
  BC-300:
    name: Управление человеческим капиталом
    description: |
      Полный жизненный цикл сотрудника. Также широко известно как управление человеческими ресурсами.
  BC-300.10:
    name: Управление привлечением талантов
    description: |
      Поиск, подбор, найм и адаптация персонала.
  BC-300.10.10:
    name: Поиск кандидатов
    description: |
      Привлечение кандидатов через каналы, рефералы и воронки талантов.
  BC-300.10.20:
    name: Отбор и оценка кандидатов
    description: |
      Первичный отбор кандидатов, оценки и управление интервью.
  BC-300.10.30:
    name: Управление офферами и наймом
    description: |
      Формирование оффера, переговоры, проверка биографии и заключение трудового договора.
  BC-300.10.40:
    name: Адаптация сотрудников
    description: |
      Предстартовые мероприятия, первый рабочий день и программы адаптации.
  BC-300.10.50:
    name: Управление брендом работодателя
    description: |
      Ценностное предложение работодателя, кампании по продвижению бренда и репутация.
  BC-300.20:
    name: Управление талантами
    description: |
      Управление результативностью, планирование преемственности, карьерное развитие.
  BC-300.20.10:
    name: Управление результативностью
    description: |
      Постановка целей, оценки результативности и циклы обратной связи.
  BC-300.20.20:
    name: Планирование преемственности
    description: |
      Выявление и развитие кандидатов-преемников на ключевые должности.
  BC-300.20.30:
    name: Карьерное развитие и внутренняя мобильность
    description: |
      Карьерные пути, внутренняя мобильность и планирование развития.
  BC-300.20.40:
    name: Оценка и калибровка талантов
    description: |
      Сессии оценки талантов, калибровка и оценки по матрице «девяти ящиков».
  BC-300.20.50:
    name: Развитие лидерства
    description: |
      Пул лидеров, программы развития руководителей и коучинг.
  BC-300.30:
    name: Управление компенсациями и льготами
    description: |
      Структуры вознаграждения, бонусы, акционерные программы, администрирование льгот.
  BC-300.30.10:
    name: Архитектура должностей и грейдирование
    description: |
      Каталог должностей, уровни и грейдовые структуры.
  BC-300.30.20:
    name: Управление базовым вознаграждением
    description: |
      Вилки заработной платы, бенчмаркинг по рынку и циклы пересмотра оплаты труда.
  BC-300.30.30:
    name: Управление переменным вознаграждением и стимулированием
    description: |
      Администрирование бонусов, торговых стимулов и планов краткосрочного премирования.
  BC-300.30.40:
    name: Администрирование акционерных и долгосрочных программ
    description: |
      Акционерные планы, RSU, опционы и планы долгосрочного стимулирования.
  BC-300.30.50:
    name: Администрирование льгот
    description: |
      Администрирование медицинских, пенсионных и иных льгот для сотрудников.
  BC-300.40:
    name: Управление обучением и развитием
    description: |
      Обучение, развитие компетенций, сертификации.
  BC-300.40.10:
    name: Анализ потребностей в обучении
    description: |
      Выявление пробелов в навыках и потребностей в обучении по функциям.
  BC-300.40.20:
    name: Курирование учебного контента
    description: |
      Подбор и создание внутреннего и стороннего учебного контента.
  BC-300.40.30:
    name: Проведение и администрирование обучения
    description: |
      Проведение и отслеживание тренингов, аудиторных и цифровых форматов обучения.
  BC-300.40.40:
    name: Управление навыками и сертификациями
    description: |
      Инвентаризация навыков, компетенции и отслеживание сертификатов.
  BC-300.40.50:
    name: Оценка эффективности обучения
    description: |
      Оценка влияния обучения и ROI инвестиций в обучение.
  BC-300.50:
    name: Управление кадровым планированием
    description: |
      Стратегическое планирование спроса и предложения рабочей силы.
  BC-300.50.10:
    name: Прогнозирование потребности в персонале
    description: |
      Прогнозирование потребности в персонале по компетенциям, ролям и локациям.
  BC-300.50.20:
    name: Анализ предложения рабочей силы
    description: |
      Анализ внутренних источников, текучести кадров и рынка труда.
  BC-300.50.30:
    name: Разработка стратегического кадрового плана
    description: |
      Многолетние стратегические кадровые планы и сценарии.
  BC-300.50.40:
    name: Планирование и контроль численности персонала
    description: |
      Операционное бюджетирование численности и процедуры согласования.
  BC-300.60:
    name: Управление опытом сотрудников
    description: |
      Вовлечённость, внутренние коммуникации, рабочий опыт.
  BC-300.60.10:
    name: Измерение вовлечённости сотрудников
    description: |
      Опросы вовлечённости, пульс-опросы и программы прослушивания.
  BC-300.60.20:
    name: Проектирование пути сотрудника
    description: |
      Проектирование ключевых моментов и карт пути сотрудника.
  BC-300.60.30:
    name: Благополучие на рабочем месте
    description: |
      Программы ментального, физического и финансового благополучия.
  BC-300.60.40:
    name: Признание и вознаграждение
    description: |
      Программы признания и нефинансового вознаграждения.
  BC-300.70:
    name: Управление HR-операциями
    description: |
      Личные дела сотрудников, расчёт заработной платы, предоставление HR-сервисов.
  BC-300.70.10:
    name: Управление мастер-данными сотрудников
    description: |
      Личные дела, кадровые события и целостность мастер-данных сотрудников.
  BC-300.70.20:
    name: Расчёт заработной платы
    description: |
      Начисление заработной платы, обязательные удержания и распределение расчётных листков.
  BC-300.70.30:
    name: Управление рабочим временем и отсутствиями
    description: |
      Учёт рабочего времени, отпусков и управление отсутствиями.
  BC-300.70.40:
    name: HR-сервисный стол и управление обращениями
    description: |
      HR-сервисный стол, управление обращениями и обработка запросов первой линии.
  BC-300.70.50:
    name: HR-аналитика и отчётность
    description: |
      Кадровая аналитика, дашборды и законодательная HR-отчётность.
  BC-300.80:
    name: Управление трудовыми и производственными отношениями
    description: |
      Производственные советы, профсоюзы, трудовые споры, трудовое законодательство.
  BC-300.80.10:
    name: Коллективные переговоры и взаимодействие с профсоюзами
    description: |
      Коллективные переговоры, соглашения и профсоюзные отношения.
  BC-300.80.20:
    name: Производственные советы и представительство сотрудников
    description: |
      Консультации с производственными советами и органами представительства сотрудников.
  BC-300.80.30:
    name: Управление трудовыми спорами и дисциплиной
    description: |
      Рассмотрение трудовых споров, дисциплинарных дел и расследований.
  BC-300.80.40:
    name: Соответствие требованиям трудового законодательства
    description: |
      Соблюдение трудового законодательства, норм рабочего времени и трудовых стандартов.
  BC-300.90:
    name: Управление разнообразием, равенством и инклюзивностью
    description: |
      Стратегия, программы и отчётность в области DEI.
  BC-300.90.10:
    name: Стратегия и управление в области DEI
    description: |
      Стратегия DEI, спонсорство и структуры управления.
  BC-300.90.20:
    name: Инклюзивные практики работы с талантами
    description: |
      Инклюзивные практики поиска, найма и карьерного продвижения.
  BC-300.90.30:
    name: Реализация программ DEI
    description: |
      Ресурсные группы сотрудников, повышение осведомлённости и программы DEI.
  BC-300.90.40:
    name: Равенство в оплате труда и DEI-отчётность
    description: |
      Анализ равенства в оплате труда и показатели и раскрытия в области DEI.

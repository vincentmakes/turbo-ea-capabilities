# Управление платежами и картами (ru) — translations for L1-payments-card-management.yaml
locale: ru
source: L1-payments-card-management.yaml
entries:
  BC-1340:
    name: Управление платежами и картами
    description: |
      Инициирование, обработка, клиринг/расчёт платежей, выпуск карт и обработка карточных транзакций.
  BC-1340.10:
    name: Управление инициированием платежей
    description: |
      Приём, валидация и авторизация платёжных поручений.
  BC-1340.10.10:
    name: Приём платёжных поручений
    description: |
      Приём платёжных поручений по различным каналам.
  BC-1340.10.20:
    name: Валидация платежей
    description: |
      Валидация платёжных поручений и реквизитов получателя.
  BC-1340.10.30:
    name: Авторизация платежей
    description: |
      Авторизация, аутентификация и применение SCA.
  BC-1340.10.40:
    name: Предварительное уведомление о платеже
    description: |
      Предварительное уведомление о платежах и подтверждение получателя.
  BC-1340.20:
    name: Управление обработкой платежей
    description: |
      Обработка, маршрутизация, форматирование платежей, ISO 20022.
  BC-1340.20.10:
    name: Обогащение и форматирование платежей
    description: |
      Обогащение и форматирование платёжных сообщений по ISO 20022.
  BC-1340.20.20:
    name: Маршрутизация платежей
    description: |
      Маршрутизация платежей по соответствующим платёжным рельсам и банкам-корреспондентам.
  BC-1340.20.30:
    name: Проверка платежей по санкционным спискам
    description: |
      Проверка платежей по санкционным спискам и спискам ограниченных лиц.
  BC-1340.20.40:
    name: Расследование платежей
    description: |
      Расследование неисполненных, возвращённых и оспариваемых платежей.
  BC-1340.30:
    name: Управление клирингом и расчётами
    description: |
      Внутренний клиринг — ACH, BACS, SEPA, FPS — и расчёты.
  BC-1340.30.10:
    name: Клиринг ACH и пакетный клиринг
    description: |
      Проведение операций в системах ACH, BACS и пакетного клиринга.
  BC-1340.30.20:
    name: Операции клиринга SEPA
    description: |
      Операции кредитного перевода SEPA и прямого дебетования SEPA.
  BC-1340.30.30:
    name: RTGS и нетто-расчёты
    description: |
      Расчёты в системе RTGS и отложенные нетто-расчёты.
  BC-1340.30.40:
    name: Сверка ностро и востро
    description: |
      Сверка счетов ностро/востро и урегулирование расхождений.
  BC-1340.40:
    name: Управление трансграничными платежами
    description: |
      Международные платежи, корреспондентский банкинг, конвертация валюты.
  BC-1340.40.10:
    name: Управление корреспондентским банкингом
    description: |
      Корреспондентские банковские отношения и управление RMA.
  BC-1340.40.20:
    name: Маршрутизация трансграничных платежей
    description: |
      Маршрутизация трансграничных платежей через SWIFT и альтернативные рельсы.
  BC-1340.40.30:
    name: Конвертация валюты для платежей
    description: |
      Конвертация валюты, получение курсов и ценообразование для платежей.
  BC-1340.40.40:
    name: Отслеживание SWIFT GPI
    description: |
      Отслеживание статуса SWIFT GPI и прозрачность для клиентов.
  BC-1340.50:
    name: Управление платежами в режиме реального времени
    description: |
      Рельсы мгновенных платежей.
  BC-1340.50.10:
    name: Операции схем мгновенных платежей
    description: |
      Операции FPS, SCT Inst и других схем мгновенных платежей.
  BC-1340.50.20:
    name: Операции запроса на оплату
    description: |
      Обмен сообщениями «запрос на оплату» и управление жизненным циклом.
  BC-1340.50.30:
    name: Управление ликвидностью мгновенных платежей
    description: |
      Управление ликвидностью для круглосуточных рельсов мгновенных платежей.
  BC-1340.60:
    name: Управление выпуском карт
    description: |
      Производство, персонализация, доставка и активация карт.
  BC-1340.60.10:
    name: Производство и персонализация карт
    description: |
      Производство, тиснение и персонализация карт.
  BC-1340.60.20:
    name: Отправка и доставка карт
    description: |
      Отправка пластиковых карт и доставка PIN-кодов.
  BC-1340.60.30:
    name: Активация карт
    description: |
      Процессы активации карт и управления PIN-кодами.
  BC-1340.60.40:
    name: Выпуск цифровых карт и привязка к кошелькам
    description: |
      Выпуск цифровых карт и привязка к кошелькам (токенизация).
  BC-1340.70:
    name: Управление обработкой карточных транзакций
    description: |
      Коммутация, авторизация, противодействие мошенничеству, чарджбэки.
  BC-1340.70.10:
    name: Коммутация авторизации карт
    description: |
      Авторизационная коммутация и маршрутизация в режиме реального времени.
  BC-1340.70.20:
    name: Противодействие карточному мошенничеству
    description: |
      Скрининг карточных транзакций на мошенничество в реальном времени.
  BC-1340.70.30:
    name: Расчёт и обмен интерчейнджем по картам
    description: |
      Расчёт, интерчейндж и клиринг с платёжными схемами.
  BC-1340.70.40:
    name: Управление чарджбэками и спорами
    description: |
      Обработка чарджбэков и урегулирование споров с платёжными схемами.

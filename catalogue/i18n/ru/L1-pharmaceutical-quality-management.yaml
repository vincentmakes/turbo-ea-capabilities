# Управление качеством в фармацевтике (ru) — translations for L1-pharmaceutical-quality-management.yaml
locale: ru
source: L1-pharmaceutical-quality-management.yaml
entries:
  BC-1560:
    name: Управление качеством в фармацевтике
    description: |
      Системы качества GxP, отклонения/CAPA, управление изменениями и выпуск серий. Обеспечивает соответствие регуляторным требованиям на всех этапах производства.
  BC-1560.10:
    name: Управление соответствием GMP
    description: |
      Система соответствия GMP и готовность к регуляторным инспекциям.
  BC-1560.10.10:
    name: Система менеджмента качества GMP
    description: |
      Поддержание системы менеджмента качества в соответствии с ICH Q10.
  BC-1560.10.20:
    name: Готовность к инспекциям GMP
    description: |
      Готовность к инспекциям FDA, EMA и PMDA.
  BC-1560.10.30:
    name: Программа аудита GMP
    description: |
      Программа внутренних аудитов GMP.
  BC-1560.20:
    name: Управление контролем качества GxP
    description: |
      Лаборатории контроля качества, аналитические испытания и испытания на стабильность.
  BC-1560.20.10:
    name: Операции лаборатории контроля качества
    description: |
      Функционирование лабораторий контроля качества GMP.
  BC-1560.20.20:
    name: Передача аналитических методик
    description: |
      Передача аналитических методик на площадки контроля качества.
  BC-1560.20.30:
    name: Испытания на стабильность
    description: |
      Испытания на стабильность в соответствии с ICH Q1.
  BC-1560.20.40:
    name: Расследование несоответствующих результатов
    description: |
      Расследование результатов, выходящих за пределы спецификации.
  BC-1560.30:
    name: Управление обеспечением качества GxP
    description: |
      Проверка качества, проверка серийных записей и надзор за производством.
  BC-1560.30.10:
    name: Проверка серийных записей
    description: |
      Проверка исполненных серийных записей службой обеспечения качества.
  BC-1560.30.20:
    name: Управление документацией GxP
    description: |
      Управление контролируемой документацией в соответствии с требованиями GxP.
  BC-1560.30.30:
    name: Надзор за операциями со стороны ОК
    description: |
      Непосредственный производственный надзор со стороны отдела обеспечения качества.
  BC-1560.40:
    name: Управление отклонениями и CAPA
    description: |
      Обработка отклонений, управление CAPA и проверка эффективности мер.
  BC-1560.40.10:
    name: Обработка отклонений GxP
    description: |
      Фиксация, расследование и закрытие отклонений GxP.
  BC-1560.40.20:
    name: Управление CAPA в GxP
    description: |
      Управление CAPA с анализом коренных причин.
  BC-1560.40.30:
    name: Верификация эффективности CAPA
    description: |
      Верификация эффективности внедрённых корректирующих и предупреждающих действий.
  BC-1560.50:
    name: Управление изменениями GxP
    description: |
      Управление изменениями GxP и оценка их влияния на качество.
  BC-1560.50.10:
    name: Регистрация запросов на изменение GxP
    description: |
      Регистрация и классификация запросов на изменение GxP.
  BC-1560.50.20:
    name: Оценка влияния изменений GxP
    description: |
      Оценка влияния изменений GxP на качество продукта.
  BC-1560.50.30:
    name: Отслеживание внедрения изменений GxP
    description: |
      Отслеживание внедрения одобренных изменений GxP.
  BC-1560.60:
    name: Управление качеством поставщиков фармацевтической отрасли
    description: |
      Квалификация поставщиков, аудиты и соглашения о качестве.
  BC-1560.60.10:
    name: Квалификация поставщиков GMP
    description: |
      Квалификация поставщиков материалов и услуг для GMP-производства.
  BC-1560.60.20:
    name: Аудит поставщиков GMP
    description: |
      Аудиты GMP-соответствия поставщиков на их площадках.
  BC-1560.60.30:
    name: Управление соглашениями о качестве
    description: |
      Согласование и сопровождение соглашений о качестве с поставщиками.
  BC-1560.70:
    name: Управление выпуском серий
    description: |
      Выпуск серий уполномоченным лицом и сертификация серий.
  BC-1560.70.10:
    name: Решение о статусе серии
    description: |
      Принятие решения о статусе произведённых серий.
  BC-1560.70.20:
    name: Сертификация уполномоченным лицом
    description: |
      Сертификация уполномоченным лицом согласно EU Annex 16.
  BC-1560.70.30:
    name: Координация выпуска на рынок
    description: |
      Координация выпуска продукции на рынок в различных регионах.
  BC-1560.80:
    name: Управление ежегодным обзором качества продукции
    description: |
      Ежегодный обзор качества продукции (APQR/APR) и анализ тенденций качества.
  BC-1560.80.10:
    name: Подготовка APQR
    description: |
      Подготовка ежегодных обзоров качества продукции.
  BC-1560.80.20:
    name: Анализ тенденций качества продукции
    description: |
      Анализ тенденций показателей качества продукции за период.
  BC-1560.80.30:
    name: Отслеживание действий по результатам APQR
    description: |
      Отслеживание действий, вытекающих из заключений ежегодного обзора качества.

# Управление операциями услуг мобильности (ru) — translations for L1-mobility-services-operations-management.yaml
locale: ru
source: L1-mobility-services-operations-management.yaml
entries:
  BC-3490:
    name: Управление операциями услуг мобильности
    description: |
      Операции шеринговых и мобильных сервисов по запросу — поездки по вызову,
      каршеринг и микромобильность, агрегация MaaS — включая каталог сервисов,
      операции поездок, ребалансировку парка, операции водителей и пассажиров,
      динамическое ценообразование, интеграцию партнёров и взаимодействие с
      городами и регуляторами.
  BC-3490.10:
    name: Управление каталогом услуг мобильности
    description: |
      Определение типов сервисов мобильности, тарифных планов
      и зон охвата.
  BC-3490.10.10:
    name: Определение типов сервисов
    description: |
      Определение типов сервисов, таких как поездки «точка-точка»,
      свободное парение, стационарные и совместные поездки.
  BC-3490.10.20:
    name: Конфигурация тарифных планов
    description: |
      Конфигурация базовых тарифов, ценообразования по времени и
      расстоянию, а также членских планов.
  BC-3490.10.30:
    name: Управление геозонами и зонами покрытия
    description: |
      Управление операционными геозонами, запретными зонами
      и зонами покрытия.
  BC-3490.20:
    name: Операции поездок и бронирования
    description: |
      Приём, сопоставление, диспетчеризация и управление жизненным
      циклом бронирований и поездок в мобильных сервисах.
  BC-3490.20.10:
    name: Приём бронирований поездок
    description: |
      Приём бронирований поездок через приложения, веб
      и партнёрские каналы.
  BC-3490.20.20:
    name: Сопоставление и диспетчеризация поездок
    description: |
      Сопоставление пассажиров с транспортными средствами или водителями
      и диспетчеризация подтверждённых поездок.
  BC-3490.20.30:
    name: Управление жизненным циклом поездки
    description: |
      Управление жизненным циклом текущих поездок, включая отмену,
      перемаршрутизацию и завершение.
  BC-3490.30:
    name: Операции шерингового парка
    description: |
      Операционное управление шеринговым парком, включая ребалансировку,
      обслуживание на месте и контроль ущерба.
    in_scope:
      - Ребалансировка транспортных средств по зонам и станциям
      - Уличная уборка, зарядка и заправка
      - Управление ущербом и потерями шеринговых транспортных средств
    out_of_scope:
      - Корпоративный учёт активов автопарка (BC-2430)
      - Операции зарядных станций ЭМ (BC-3480)
  BC-3490.30.10:
    name: Операции ребалансировки транспортных средств
    description: |
      Ребалансировка шеринговых транспортных средств по зонам,
      станциям и горячим точкам спроса.
  BC-3490.30.20:
    name: Координация уборки и зарядки транспортных средств
    description: |
      Координация полевой уборки, зарядки и заправки
      транспортных средств.
  BC-3490.30.30:
    name: Управление ущербом и потерями транспортных средств
    description: |
      Управление оценкой ущерба, маршрутизацией ремонта и возмещением
      потерь для шеринговых транспортных средств.
  BC-3490.40:
    name: Операции водителей и поставщиков
    description: |
      Онбординг, соответствие требованиям, расчёты и управление
      эффективностью водителей и других поставщиков услуг.
  BC-3490.40.10:
    name: Онбординг и соответствие водителей
    description: |
      Онбординг водителей, включая проверку лицензий, проверку биографических
      данных и постоянное соответствие требованиям.
  BC-3490.40.20:
    name: Заработок и расчёты водителей
    description: |
      Расчёт и выплата заработка, чаевых и поощрений водителям.
  BC-3490.40.30:
    name: Управление эффективностью водителей
    description: |
      Управление эффективностью водителей, включая рейтинги,
      коучинг и деактивацию.
  BC-3490.50:
    name: Операции пассажиров
    description: |
      Онбординг, поддержка и операции доверия и безопасности для
      пассажиров и конечных клиентов услуг мобильности.
  BC-3490.50.10:
    name: Онбординг и идентификация пассажиров
    description: |
      Онбординг пассажиров, включая верификацию личности,
      способ оплаты и согласие.
  BC-3490.50.20:
    name: Операции поддержки пассажиров
    description: |
      Поддержка пассажиров до поездки, во время и после поездки.
  BC-3490.50.30:
    name: Управление безопасностью и доверием пассажиров
    description: |
      Операции доверия и безопасности, включая обработку инцидентов,
      предотвращение злоупотреблений и функции безопасности.
  BC-3490.60:
    name: Динамическое ценообразование и управление спросом
    description: |
      Прогнозирование спроса и функционирование динамического ценообразования,
      надбавок и рекламных движков для услуг мобильности.
  BC-3490.60.10:
    name: Прогнозирование спроса
    description: |
      Краткосрочное прогнозирование спроса по зоне, времени
      и типу сервиса.
  BC-3490.60.20:
    name: Операции движка динамического ценообразования
    description: |
      Функционирование движков динамического ценообразования и надбавок,
      включая ограждения цен и аудит.
  BC-3490.60.30:
    name: Операции акций и поощрений
    description: |
      Функционирование акций и поощрений для пассажиров и водителей
      в рамках кампаний.
  BC-3490.70:
    name: Мультимодальная агрегация и партнёрские операции
    description: |
      Агрегация партнёров MaaS, составление мультимодальных поездок
      и межоператорские расчёты между партнёрами по мобильности.
  BC-3490.70.10:
    name: Онбординг партнёров MaaS
    description: |
      Онбординг партнёров общественного транспорта, поездок по вызову
      и микромобильности на платформу MaaS.
  BC-3490.70.20:
    name: Составление мультимодальных поездок
    description: |
      Составление мультимодальных поездок, объединяющих общественный
      транспорт и мобильность по запросу.
  BC-3490.70.30:
    name: Межоператорские расчёты
    description: |
      Расчёт выручки и сборов между агрегаторами MaaS
      и базовыми операторами мобильности.
  BC-3490.80:
    name: Регуляторные и городские операции мобильности
    description: |
      Взаимодействие с городами и регуляторами по разрешениям,
      обмену данными и операциям парковки на тротуаре.
  BC-3490.80.10:
    name: Управление городскими разрешениями и авторизациями
    description: |
      Управление городскими операционными разрешениями, ограничениями
      по парку и авторизациями в юрисдикциях.
  BC-3490.80.20:
    name: Обмен операционными данными с городами
    description: |
      Обмен операционными данными с городами по MDS, GBFS
      и эквивалентным спецификациям.
  BC-3490.80.30:
    name: Координация тротуарных и парковочных зон
    description: |
      Координация доступа к тротуарам, парковки и зон ожидания
      с городскими властями.

# Управление строительством (ru) — translations for L1-construction-management.yaml
locale: ru
source: L1-construction-management.yaml
entries:
  BC-1150:
    name: Управление строительством
    description: |
      Строительный надзор и исполнение работ (для EPC-компаний).
  BC-1150.10:
    name: Управление планированием строительства
    description: |
      Последовательность строительных работ, методы, генеральные графики.
  BC-1150.10.10:
    name: Методология строительства
    description: |
      Определение методов и последовательности строительных работ.
  BC-1150.10.20:
    name: Генеральный график строительства
    description: |
      Генеральный график строительства и краткосрочные планы.
  BC-1150.10.30:
    name: Планирование ресурсов строительства
    description: |
      Планирование численности персонала, оборудования и материалов для строительства.
  BC-1150.10.40:
    name: План исполнения строительства
    description: |
      План исполнения проекта, охватывающий стратегию строительства.
  BC-1150.20:
    name: Управление мобилизацией и организацией площадки
    description: |
      Организация площадки, временные сооружения, логистика.
  BC-1150.20.10:
    name: Организация строительной площадки
    description: |
      Устройство временных сооружений, офисов и объектов жизнеобеспечения.
  BC-1150.20.20:
    name: Планирование логистики площадки
    description: |
      Планирование подъездных путей, зон складирования и обработки материалов.
  BC-1150.20.30:
    name: Мобилизация строительной техники
    description: |
      Мобилизация кранов, машин и строительного оборудования.
  BC-1150.30:
    name: Управление строительным надзором
    description: |
      Надзор на площадке, управление рабочими фронтами, ежедневные операции.
  BC-1150.30.10:
    name: Ежедневные операции на площадке
    description: |
      Ежедневная координация на площадке, инструктажи и исполнение работ.
  BC-1150.30.20:
    name: Управление рабочими фронтами
    description: |
      Определение и продвижение строительных рабочих фронтов.
  BC-1150.30.30:
    name: Соблюдение разрешений и методологии
    description: |
      Соблюдение разрешений и утверждённых методических указаний.
  BC-1150.40:
    name: Управление субподрядчиками
    description: |
      Выбор, надзор, оценка эффективности и сертификация оплаты субподрядчиков.
  BC-1150.40.10:
    name: Выбор субподрядчиков
    description: |
      Предварительная квалификация и выбор строительных субподрядчиков.
  BC-1150.40.20:
    name: Надзор за субподрядчиками
    description: |
      Площадочный надзор за производительностью и соответствием субподрядчиков.
  BC-1150.40.30:
    name: Сертификация платежей
    description: |
      Обмер и сертификация платежей субподрядчикам.
  BC-1150.40.40:
    name: Управление изменениями субподрядчиков
    description: |
      Управление изменениями объёмов и претензиями субподрядчиков.
  BC-1150.50:
    name: Управление качеством строительства
    description: |
      Обеспечение и контроль качества на площадке, проверки, контрольные и наблюдательные точки.
  BC-1150.50.10:
    name: Планы контроля и испытаний на площадке
    description: |
      Разработка ITP, контрольных и наблюдательных точек и графиков проверок.
  BC-1150.50.20:
    name: Контроль качества на площадке
    description: |
      Проведение контроля качества и испытаний на площадке.
  BC-1150.50.30:
    name: Управление несоответствиями и дефектными ведомостями
    description: |
      Извещения о несоответствиях и закрытие дефектных ведомостей.
  BC-1150.60:
    name: Управление прогрессом строительства
    description: |
      Измерение прогресса, освоенный объём, анализ отклонений.
  BC-1150.60.10:
    name: Измерение прогресса строительства
    description: |
      Объёмное измерение прогресса строительства на площадке.
  BC-1150.60.20:
    name: Отчётность по освоенному объёму
    description: |
      Анализ освоенного объёма и отчётность о производительности проекта.
  BC-1150.60.30:
    name: Анализ отклонений от графика и стоимости
    description: |
      Анализ отклонений и корректирующие меры.
  BC-1150.70:
    name: Управление охраной труда и безопасностью на площадке
    description: |
      Безопасность на площадке, наряд-допуск, управление опасностями, аварийное реагирование.
  BC-1150.70.10:
    name: Планирование охраны труда и безопасности на площадке
    description: |
      Планы ОТиБ и оценки рисков для площадки.
  BC-1150.70.20:
    name: Наряд-допуск на площадке
    description: |
      Наряд-допуск и оформление разрешений на огневые работы.
  BC-1150.70.30:
    name: Проверки и аудиты безопасности на площадке
    description: |
      Проверки, аудиты безопасности и поведенческие наблюдения.
  BC-1150.70.40:
    name: Аварийное реагирование на площадке
    description: |
      Планы аварийного реагирования, учения и управление инцидентами.

# Управление продажами (ru) — translations for L1-sales-management.yaml
locale: ru
source: L1-sales-management.yaml
entries:
  BC-410:
    name: Управление продажами
    description: |
      Деятельность от лида до заказа — работа с аккаунтами, воронка продаж, сделки, квотирование.
  BC-410.10:
    name: Управление стратегией продаж
    description: |
      Модель охвата рынка, сегментирование, планирование продаж.
  BC-410.10.10:
    name: Проектирование модели охвата продаж
    description: |
      Определение сегментов продаж, территорий и моделей охвата.
  BC-410.10.20:
    name: Назначение территорий и аккаунтов
    description: |
      Проектирование территорий, назначение аккаунтов и балансировка.
  BC-410.10.30:
    name: Установка целевых показателей продаж
    description: |
      Установка плановых показателей и квот продаж сверху вниз и снизу вверх.
  BC-410.10.40:
    name: Планирование мощностей продаж
    description: |
      Планирование мощности, скорости выхода на результат и численности команды продаж.
  BC-410.20:
    name: Управление аккаунтами
    description: |
      Управление стратегическими и ключевыми аккаунтами.
  BC-410.20.10:
    name: Планирование аккаунта
    description: |
      Стратегические планы аккаунта и анализ незадействованных возможностей.
  BC-410.20.20:
    name: Управление ключевыми аккаунтами
    description: |
      Корпоративное управление и исполнительное спонсорство ключевых аккаунтов.
  BC-410.20.30:
    name: Развитие отношений с аккаунтом
    description: |
      Картирование отношений и взаимодействие с заинтересованными сторонами аккаунта.
  BC-410.20.40:
    name: Мониторинг состояния аккаунта
    description: |
      Метрики здоровья аккаунта, карты показателей и мониторинг рисков продления.
  BC-410.30:
    name: Управление возможностями и воронкой продаж
    description: |
      Жизненный цикл лидов, возможностей и сделок.
  BC-410.30.10:
    name: Квалификация и передача лидов
    description: |
      Квалификация, оценка и передача лидов из маркетинга.
  BC-410.30.20:
    name: Управление возможностями
    description: |
      Создание, квалификация и продвижение возможностей по этапам воронки.
  BC-410.30.30:
    name: Стратегия и сопровождение сделки
    description: |
      Стратегическое сопровождение сделки, планы победы и ревью сделок.
  BC-410.30.40:
    name: Прогнозирование воронки продаж
    description: |
      Покрытие воронки, взвешенный прогноз и уровни достоверности.
  BC-410.40:
    name: Управление квотированием и конфигурацией
    description: |
      CPQ — конфигурация, цена, квота.
  BC-410.40.10:
    name: Конфигурация продукта
    description: |
      Конфигурация продукта и решения с правилами и ограничениями.
  BC-410.40.20:
    name: Формирование коммерческого предложения
    description: |
      Формирование готовых к отправке клиенту коммерческих предложений.
  BC-410.40.30:
    name: Процедура согласования коммерческого предложения
    description: |
      Процедуры согласования скидок и нестандартных условий.
  BC-410.40.40:
    name: Конвертация предложения в договор и заказ
    description: |
      Конвертация принятых предложений в заказы и договоры.
  BC-410.50:
    name: Управление операциями продаж
    description: |
      Процесс продаж, инструменты, поддержка продаж.
  BC-410.50.10:
    name: Управление процессом и методологией продаж
    description: |
      Определение и развитие процесса и методологии продаж.
  BC-410.50.20:
    name: Технологии и инструменты продаж
    description: |
      Администрирование и интеграция CRM и инструментов продаж.
  BC-410.50.30:
    name: Поддержка продаж
    description: |
      Плейбуки продаж, контент для поддержки и сертификация.
  BC-410.50.40:
    name: Данные и гигиена продаж
    description: |
      Качество данных CRM, управление и программы обеспечения качества.
  BC-410.60:
    name: Управление продажами через каналы
    description: |
      Косвенные каналы, дистрибьюторы, реселлеры.
  BC-410.60.10:
    name: Рекрутинг партнёров по каналу
    description: |
      Рекрутинг и адаптация дистрибьюторов, реселлеров и агентов.
  BC-410.60.20:
    name: Развитие партнёров по каналу
    description: |
      Обучение, сертификация и поддержка партнёров по каналу.
  BC-410.60.30:
    name: Управление партнёрской программой
    description: |
      Уровни партнёрской программы, стимулирование и правила взаимодействия.
  BC-410.60.40:
    name: Управление результативностью партнёров
    description: |
      Отслеживание продаж партнёрами и показателей их результативности.
  BC-410.70:
    name: Управление результативностью продаж
    description: |
      Планы вознаграждения, управление квотами, аналитика продаж.
  BC-410.70.10:
    name: Проектирование планов мотивации продавцов
    description: |
      Разработка планов переменного вознаграждения, акселераторов и SPIF.
  BC-410.70.20:
    name: Управление квотами и зачётом
    description: |
      Распределение квот, правила зачёта и перенос остатков.
  BC-410.70.30:
    name: Расчёт комиссионного вознаграждения
    description: |
      Расчёт, проверка и выплата комиссионных вознаграждений.
  BC-410.70.40:
    name: Аналитика результативности продаж
    description: |
      Анализ побед/поражений, производительности и результативности продавцов.

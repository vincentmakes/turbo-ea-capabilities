# Управление эффективностью зданий (ru) — translations for L1-building-performance-management.yaml
locale: ru
source: L1-building-performance-management.yaml
entries:
  BC-2070:
    name: Управление эффективностью зданий
    description: |
      Непрерывная, управляемая данными оптимизация эффективности зданий — измерение и верификация энергопотребления (IPMVP / ASHRAE Guideline 14), обнаружение неисправностей и диагностика, энергетическая аналитика и аналитика качества воздуха, управление откликом на спрос и взаимодействие с сетью, отслеживание углеродного следа и показателей устойчивости, а также периодическая отчётность для собственников зданий.
    in_scope:
      - Формирование базовой линии M&V, расчёт экономии и корректировка
      - Библиотеки правил FDD и текущий триаж выявленных неисправностей
      - Бенчмаркинг энергопотребления здания, атрибуция, обнаружение аномалий и прогнозирование
      - "Аналитика качества микроклимата: тепловые, воздушные, акустические и световые показатели"
      - Управление откликом на спрос и работой в режиме сетевого взаимодействия
      - Операционный углеродный след, распределение возобновляемой энергии и ESG-показатели на уровне здания
      - Информационные панели для собственника, периодическая отчётность и брифинги для заинтересованных сторон
    out_of_scope:
      - Пусконаладка и FPT в ходе проектной пусконаладки (BC-2050)
      - Выполнение полевого сервиса (BC-2060)
      - Корпоративная стратегия устойчивого развития и отчётность (BC-740)
      - Проектирование оборудования ОВКВ (BC-2000) и инженерия продуктов BAS (BC-2010)
  BC-2070.10:
    name: Измерение и верификация энергопотребления
    description: |
      Формирование базовых линий, расчёт экономии и корректировка энергетических характеристик по IPMVP / ASHRAE Guideline 14.
  BC-2070.10.10:
    name: Моделирование базовых линий
    description: |
      Моделирование энергетических базовых линий, на основе которых измеряется экономия.
  BC-2070.10.20:
    name: Разработка плана M&V
    description: |
      Разработка планов измерения и верификации в соответствии с признанными протоколами.
  BC-2070.10.30:
    name: Расчёт экономии энергии
    description: |
      Расчёт экономии энергии относительно базовой линии.
  BC-2070.10.40:
    name: Корректировка и нормализация
    description: |
      Корректировка и нормализация результатов M&V с учётом климата и заполняемости.
  BC-2070.20:
    name: Операции обнаружения и диагностики неисправностей
    description: |
      Операции с библиотеками правил FDD и текущий триаж обнаруженных неисправностей.
  BC-2070.20.10:
    name: Управление библиотекой правил FDD
    description: |
      Сопровождение библиотек правил обнаружения и диагностики неисправностей.
  BC-2070.20.20:
    name: Триаж и приоритизация неисправностей
    description: |
      Триаж и приоритизация обнаруженных неисправностей по степени влияния.
  BC-2070.20.30:
    name: Диагностический анализ первопричин
    description: |
      Диагностический анализ для выявления первопричин обнаруженных неисправностей.
  BC-2070.20.40:
    name: Настройка FDD для снижения ложных срабатываний
    description: |
      Настройка правил FDD для снижения частоты ложных срабатываний сигнализации.
  BC-2070.30:
    name: Аналитика энергетических характеристик
    description: |
      Аналитика потребления энергии по портфелю зданий.
  BC-2070.30.10:
    name: Бенчмаркинг и сравнение с аналогами
    description: |
      Бенчмаркинг энергетических характеристик здания относительно аналогов.
  BC-2070.30.20:
    name: Атрибуция потребления энергии
    description: |
      Атрибуция потребления энергии по системам, зонам и нагрузкам.
  BC-2070.30.30:
    name: Обнаружение энергетических аномалий
    description: |
      Обнаружение аномалий в структуре потребления энергии.
  BC-2070.30.40:
    name: Прогнозирование и постановка целей
    description: |
      Прогнозирование будущего энергопотребления и постановка целей по улучшению.
  BC-2070.40:
    name: Аналитика качества микроклимата
    description: |
      Аналитика показателей качества микроклимата: тепловой комфорт, воздух, акустика и освещение.
  BC-2070.40.10:
    name: Аналитика теплового комфорта
    description: |
      Аналитика теплового комфорта по критериям ASHRAE 55 и аналогичным стандартам.
  BC-2070.40.20:
    name: Аналитика качества воздуха
    description: |
      Аналитика качества внутреннего воздуха по критериям ASHRAE 62.1 и аналогичным стандартам.
  BC-2070.40.30:
    name: Акустическая и световая аналитика
    description: |
      Аналитика акустических и световых характеристик с точки зрения комфорта обитателей.
  BC-2070.40.40:
    name: Корреляция обратной связи с обитателями
    description: |
      Корреляция обратной связи от обитателей с измеренными параметрами среды.
  BC-2070.50:
    name: Управление откликом на спрос и взаимодействием с сетью
    description: |
      Управление поведением здания в режиме сетевого взаимодействия и участием в программах отклика на спрос.
  BC-2070.50.10:
    name: Регистрация в программах отклика на спрос
    description: |
      Регистрация зданий в программах отклика на спрос.
  BC-2070.50.20:
    name: Выполнение ограничения нагрузки
    description: |
      Выполнение мероприятий по ограничению нагрузки согласно договорным обязательствам.
  BC-2070.50.30:
    name: Операции здания в режиме сетевого взаимодействия
    description: |
      Операции зданий с сетевым взаимодействием.
  BC-2070.50.40:
    name: Реагирование на тарифы и ценообразование
    description: |
      Реагирование систем здания на дифференцированные и динамические тарифы.
  BC-2070.60:
    name: Отслеживание углеродного следа и устойчивого развития
    description: |
      Учёт операционного углеродного следа и отслеживание показателей устойчивого развития на уровне здания.
  BC-2070.60.10:
    name: Учёт операционного углеродного следа
    description: |
      Учёт операционных выбросов углерода на уровне здания.
  BC-2070.60.20:
    name: Распределение возобновляемой энергии
    description: |
      Распределение местной и договорной возобновляемой энергии между зданиями.
  BC-2070.60.30:
    name: ESG-показатели на уровне здания
    description: |
      Расчёт ESG-показателей на уровне здания для портфельной отчётности.
  BC-2070.60.40:
    name: Отслеживание соответствия экологической сертификации
    description: |
      Отслеживание соответствия критериям сертификации «зелёных» зданий.
  BC-2070.70:
    name: Управление рекомендациями по повышению эффективности
    description: |
      Выявление и управление возможностями повышения эффективности и обоснованиями экономии.
  BC-2070.70.10:
    name: Выявление возможностей
    description: |
      Выявление возможностей повышения эффективности по результатам аналитики.
  BC-2070.70.20:
    name: Бизнес-обоснование экономии
    description: |
      Разработка бизнес-обоснований рекомендуемых улучшений.
  BC-2070.70.30:
    name: Приоритизация рекомендаций
    description: |
      Приоритизация рекомендаций по портфелю зданий.
  BC-2070.70.40:
    name: Отслеживание реализации
    description: |
      Отслеживание реализации принятых рекомендаций.
  BC-2070.80:
    name: Операции отчётности и информационных панелей
    description: |
      Информационные панели для собственника, периодические отчёты и регуляторная отчётность о характеристиках.
  BC-2070.80.10:
    name: Операции информационных панелей для собственника
    description: |
      Эксплуатация информационных панелей характеристик для собственника здания.
  BC-2070.80.20:
    name: Периодическая отчётность о характеристиках
    description: |
      Подготовка периодических отчётов о характеристиках для заказчиков.
  BC-2070.80.30:
    name: Регуляторная отчётность о характеристиках здания
    description: |
      Отчётность о характеристиках здания для регуляторных программ (например, обязательный бенчмаркинг).
  BC-2070.80.40:
    name: Брифинги для заинтересованных сторон
    description: |
      Брифинги для арендаторов, инвесторов и заинтересованных сторон о характеристиках здания.

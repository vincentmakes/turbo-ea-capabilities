# Управление абонентами телекома (ru) — translations for L1-telecom-subscriber-management.yaml
locale: ru
source: L1-telecom-subscriber-management.yaml
entries:
  BC-2640:
    name: Управление абонентами телекома
    description: |
      Управление идентификаторами абонентов, жизненным циклом SIM и eSIM,
      нумерацией, переносимостью номеров, идентификаторами устройств,
      аутентификацией и авторизацией в мобильных и фиксированных сетях.
  BC-2640.10:
    name: Управление идентификаторами абонентов
    description: |
      Управление жизненным циклом идентификаторов и профилей абонентов
      на уровне данных абонентов.
  BC-2640.10.10:
    name: Провизионирование IMSI
    description: |
      Выделение и провизионирование IMSI и аналогичных идентификаторов
      в хранилищах данных абонентов.
  BC-2640.10.20:
    name: Управление профилями абонентов
    description: |
      Управление записями профилей абонентов в HLR, HSS, UDM
      и аналогичных системах.
  BC-2640.10.30:
    name: Отзыв идентификаторов абонентов
    description: |
      Отзыв идентификаторов абонентов при расторжении, мошенничестве
      или по запросу регулятора.
  BC-2640.20:
    name: Управление жизненным циклом SIM и eSIM
    description: |
      Управление жизненным циклом физических SIM-карт и профилей eSIM,
      включая персонализацию, дистрибуцию, замену и восстановление.
  BC-2640.20.10:
    name: Провизионирование физических SIM-карт
    description: |
      Персонализация и дистрибуция физических SIM-карт.
  BC-2640.20.20:
    name: Управление профилями eSIM
    description: |
      Управление профилями eSIM через SM-DP+, SM-SR и аналогичные платформы.
  BC-2640.20.30:
    name: Замена и восстановление профилей
    description: |
      Замена и восстановление профилей SIM и eSIM абонентов,
      включая процессы защиты от мошенничества.
  BC-2640.30:
    name: Управление ресурсами нумерации
    description: |
      Управление ресурсами телефонной нумерации, предоставленными регуляторами,
      и их присвоение сервисам.
  BC-2640.30.10:
    name: Распределение блоков номеров
    description: |
      Получение и распределение блоков номеров от регулятора во внутренний
      инвентарь.
  BC-2640.30.20:
    name: Управление инвентарём номеров
    description: |
      Управление доступными, зарезервированными, присвоенными и карантинными
      номерами инвентаря.
  BC-2640.30.30:
    name: Резервирование и возврат номеров
    description: |
      Резервирование номеров для заказов и возврат неиспользованных номеров
      в пул или регулятору.
  BC-2640.40:
    name: Управление переносимостью номеров
    description: |
      Входящая и исходящая мобильная и фиксированная переносимость номеров,
      а также ведение справочных данных маршрутизации.
  BC-2640.40.10:
    name: Управление входящим переносом номеров
    description: |
      Обработка запросов на входящий перенос номеров от других операторов.
  BC-2640.40.20:
    name: Управление исходящим переносом номеров
    description: |
      Обработка запросов на исходящий перенос номеров к другим операторам.
  BC-2640.40.30:
    name: Ведение справочника маршрутизации переносимости
    description: |
      Ведение данных маршрутизации переносимости, включая ENUM и центральные
      справочные базы данных.
  BC-2640.50:
    name: Управление идентификаторами устройств
    description: |
      Регистрация и контроль идентификаторов устройств для проверки
      права на сервис и внесения в чёрный список украденных устройств.
  BC-2640.50.10:
    name: Регистрация IMEI
    description: |
      Регистрация IMEI устройств с привязкой к абонентам и проверка
      права на сервис.
  BC-2640.50.20:
    name: Ведение реестра идентификаторов оборудования
    description: |
      Ведение данных EIR для устройств из белого, серого и чёрного списков.
  BC-2640.50.30:
    name: Внесение украденных устройств в чёрный список
    description: |
      Внесение украденных и утерянных устройств в чёрный список
      во взаимодействии с отраслевыми реестрами и правоохранительными органами.
  BC-2640.60:
    name: Аутентификация и авторизация абонентов
    description: |
      Аутентификация, авторизация и учёт абонентов и устройств
      в различных технологиях доступа.
  BC-2640.60.10:
    name: Аутентификация абонентов
    description: |
      Аутентификация абонентов в мобильных, фиксированных и Wi-Fi сетях
      доступа по протоколам AAA.
  BC-2640.60.20:
    name: Управление политиками авторизации
    description: |
      Управление правилами авторизации сервисов и политиками
      для каждого абонента и устройства.
  BC-2640.60.30:
    name: Управление учётными записями AAA
    description: |
      Формирование и управление учётными записями AAA для нижестоящего
      биллинга и аналитики.

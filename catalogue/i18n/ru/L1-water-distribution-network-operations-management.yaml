# Управление операциями водораспределительных сетей (ru) — translations for L1-water-distribution-network-operations-management.yaml
locale: ru
source: L1-water-distribution-network-operations-management.yaml
entries:
  BC-3880:
    name: Управление операциями водораспределительных сетей
    description: |
      Эксплуатация магистральных и распределительных водоводов,
      транспортирующих очищенную воду потребителям — управление гидравликой
      и давлением, контроль потерь, качество воды в сети, ремонт и обновление
      водоводов, а также подключение новых потребителей.
  BC-3880.10:
    name: Управление распределительной сетью
    description: |
      Круглосуточная диспетчерская служба системы
      водоснабжения с использованием телеметрии, гидравлических моделей и SCADA.
  BC-3880.10.10:
    name: Операции SCADA водораспределения
    description: |
      Диспетчерское управление насосными и напорными активами
      по сети в реальном времени.
  BC-3880.10.20:
    name: Операции гидравлических моделей
    description: |
      Эксплуатация онлайн и офлайн гидравлических моделей
      для принятия сетевых решений.
  BC-3880.10.30:
    name: Надзор за сетевой телеметрией
    description: |
      Надзор за телеметрией на ГЗВ, задвижках
      и напорных точках.
  BC-3880.20:
    name: Операции магистральных водоводов и насосных станций
    description: |
      Эксплуатация магистральных водоводов, насосных станций
      и межзональных переток, включая подкачку и гашение гидроударов.
  BC-3880.20.10:
    name: Операции насосных станций
    description: |
      Эксплуатация и оптимизация энергопотребления
      распределительных насосных станций.
  BC-3880.20.20:
    name: Операции магистральных водоводов
    description: |
      Эксплуатация, управление задвижками и гашение гидроударов
      на магистральных водоводах.
  BC-3880.20.30:
    name: Операции межзональных переток
    description: |
      Эксплуатация межзональных переток и транзитных подач
      между ресурсными зонами.
  BC-3880.30:
    name: Управление потерями воды
    description: |
      Активный и пассивный контроль потерь на ГЗВ
      с использованием анализа притока, акустического обнаружения
      и полевых работ по обнаружению утечек.
    in_scope:
      - Анализ притока и минимального ночного расхода ГЗВ
      - Акустическое обнаружение утечек
      - Полевые работы по поиску и ликвидации утечек
    out_of_scope:
      - Капитальные программы замены водоводов (BC-3900.50)
      - Утечки на домовом вводе потребителя (BC-3910.60)
  BC-3880.30.10:
    name: Анализ ГЗВ
    description: |
      Анализ притока ГЗВ и минимального ночного расхода
      для локализации утечек.
  BC-3880.30.20:
    name: Акустическое обнаружение утечек
    description: |
      Акустическое прозвучивание, корреляция и сканирование
      шумовыми логгерами для локализации утечек.
  BC-3880.30.30:
    name: Операции поиска и ликвидации утечек
    description: |
      Полевые работы по поиску и ликвидации утечек
      в соответствии с целевыми сроками ремонта.
  BC-3880.30.40:
    name: Отчётность о потерях воды
    description: |
      Отчётность о потерях воды против регуляторных
      и метрик водного баланса IWA.
  BC-3880.40:
    name: Управление давлением
    description: |
      Оптимизация давления в распределительной сети
      по зонам регулирования для снижения потерь и числа порывов.
  BC-3880.40.10:
    name: Конфигурация зон давления
    description: |
      Настройка зон регулирования давления
      и уставок РДД.
  BC-3880.40.20:
    name: Расширенное управление давлением
    description: |
      Эксплуатация дистанционно управляемых и модулируемых
      регуляторов давления.
  BC-3880.40.30:
    name: Управление переходными давлениями
    description: |
      Анализ гидроударов и смягчение переходных процессов
      в распределительных сетях.
  BC-3880.50:
    name: Операции качества воды в сети
    description: |
      Надзор за качеством воды в сети — остаточный хлор,
      пожелтение воды, запах и вкус — и операции по устранению нарушений.
  BC-3880.50.10:
    name: Надзор за остаточным хлором в сети
    description: |
      Надзор за остаточным хлором по сети
      и дозирование при дохлорировании.
  BC-3880.50.20:
    name: Контроль пожелтения и осадка
    description: |
      Промывка и ледяная подача для управления
      жалобами на пожелтение воды.
  BC-3880.50.30:
    name: Операции сетевого отбора проб
    description: |
      Законодательный отбор проб у кранов потребителей
      и точек подачи.
  BC-3880.60:
    name: Ремонт и обновление водоводов
    description: |
      Аварийный ремонт порывов и дефектов стыков,
      а также оперативная реализация программ обновления водоводов.
  BC-3880.60.10:
    name: Реагирование на порывы водоводов
    description: |
      Реагирование, изоляция и ремонт порывов водоводов
      по целевым показателям потребителе-минут отключения.
  BC-3880.60.20:
    name: Ремонт домовых вводов
    description: |
      Ремонт соединительных и домовых вводных труб
      между магистралью и запорным краном.
  BC-3880.60.30:
    name: Полевые работы по обновлению водоводов
    description: |
      Полевое выполнение программ обновления и реабилитации
      водоводов, включая бестраншейные методы.
  BC-3880.70:
    name: Операции подключения новых водопотребителей
    description: |
      Реализация новых водопроводных подключений
      для бытовых, коммерческих и потребителей-застройщиков.
  BC-3880.70.10:
    name: Оценка заявок на новое подключение
    description: |
      Техническая оценка заявок на подключение
      и обеспечение сервисом застройщиков.
  BC-3880.70.20:
    name: Операции монтажа подключений
    description: |
      Монтаж соединительных труб, фиттингов
      и счётчиков потребителей.
  BC-3880.70.30:
    name: Ввод подключений в работу
    description: |
      Ввод в работу, промывка и обеззараживание
      новых подключений перед использованием.

# Управление производственными операциями горного предприятия (ru) — translations for L1-mine-production-operations-management.yaml
locale: ru
source: L1-mine-production-operations-management.yaml
entries:
  BC-4430:
    name: Управление производственными операциями горного предприятия
    description: |
      Ведение горных работ посредством циклов бурение–взрыв–погрузка–транспортировка,
      подземной добычи из очистных блоков, оперативного контроля качества руды,
      управления горным давлением, вентиляции и водоотлива при открытой и
      подземной разработке.

  BC-4430.10:
    name: Буровзрывные работы
    description: |
      Производственное бурение, заряжание, инициирование и анализ
      эффективности взрывных работ при открытой и подземной разработке.
    in_scope:
      - Бурение производственных взрывных скважин
      - Заряжание и инициирование
      - Анализ гранулометрии и смещения горной массы после взрыва
    out_of_scope:
      - Разведочное бурение (BC-4400.30)
      - Проектирование буровзрывных паспортов (BC-4420.40.30)

  BC-4430.10.10:
    name: Бурение производственных скважин
    description: |
      Бурение взрывных скважин в соответствии с утверждённым буровзрывным
      паспортом.

  BC-4430.10.20:
    name: Заряжание взрывчатыми веществами
    description: |
      Загрузка взрывчатых веществ и средств инициирования в скважины.

  BC-4430.10.30:
    name: Инициирование взрыва и допуск персонала
    description: |
      Монтаж взрывной сети, эвакуация, инициирование взрыва и
      последующий допуск персонала в забой.

  BC-4430.10.40:
    name: Анализ эффективности взрыва
    description: |
      Анализ гранулометрии, смещения горной массы и параметров сейсмического
      воздействия выполненных взрывов.

  BC-4430.20:
    name: Погрузка и транспортировка горной массы
    description: |
      Погрузка, транспортировка и диспетчеризация горной массы от забоя
      до обогатительной фабрики или отвала.

  BC-4430.20.10:
    name: Работа экскаваторов и погрузчиков
    description: |
      Эксплуатация механических лопат, гидравлических экскаваторов и
      колёсных погрузчиков.

  BC-4430.20.20:
    name: Автотранспортная откатка
    description: |
      Эксплуатация карьерных самосвалов и систем троллейвозной откатки.

  BC-4430.20.30:
    name: Диспетчеризация и телематика горного флота
    description: |
      Диспетчеризация, назначение и управление производительностью горного
      флота в режиме реального времени.

  BC-4430.20.40:
    name: Учёт и сверка материальных потоков
    description: |
      Сверка объёмов перемещённой горной массы по данным маркшейдерской
      съёмки, диспетчерской системы и сальдо рудных складов.

  BC-4430.30:
    name: Подземные производственные работы
    description: |
      Проходка выработок, добыча из очистных блоков, закладка и
      внутрирудничный транспорт при подземной разработке.

  BC-4430.30.10:
    name: Проходка горных выработок
    description: |
      Проведение подземных выработок — подготовительных, нарезных и
      инфраструктурных.

  BC-4430.30.20:
    name: Добыча руды из очистных блоков
    description: |
      Взрывная отбойка и выпуск руды из подземных очистных блоков.

  BC-4430.30.30:
    name: Закладка выработанного пространства
    description: |
      Размещение твердеющей или породной закладки в отработанных
      очистных блоках.

  BC-4430.30.40:
    name: Внутрирудничный транспорт
    description: |
      Эксплуатация подземных конвейеров, рудоспусков и клетевого
      подъёма.

  BC-4430.40:
    name: Оперативный контроль качества руды
    description: |
      Оперативное разделение руды и породы посредством опробования,
      определения рудных блоков и управления маршрутизацией в забое.

  BC-4430.40.10:
    name: Опробование при добыче
    description: |
      Отбор проб взорванной горной массы и обнажений для определения
      содержания на стадии добычи.

  BC-4430.40.20:
    name: Определение рудных блоков
    description: |
      Оконтуривание рудных блоков для краткосрочного планирования добычи.

  BC-4430.40.30:
    name: Маркировка границ руда–порода
    description: |
      Полевая маркировка контактов руды и пустой породы для машинистов
      экскаваторов и погрузчиков.

  BC-4430.40.40:
    name: Распределение добытой горной массы по складам
    description: |
      Распределение добытой горной массы между рудными и забалансовыми
      складами.

  BC-4430.50:
    name: Геомеханический контроль и мониторинг
    description: |
      Оперативный геомеханический контроль посредством мониторинга и
      реагирования по триггерным уровням на откосах и в подземных
      выработках.

  BC-4430.50.10:
    name: Мониторинг устойчивости откосов
    description: |
      Непрерывный мониторинг бортов карьера с применением радаров,
      отражателей и инклинометров.

  BC-4430.50.20:
    name: Установка горно-технического крепления
    description: |
      Монтаж анкерного, сетчатого, набрызгбетонного и канатного
      крепления подземных выработок.

  BC-4430.50.30:
    name: Сейсмический мониторинг подземных выработок
    description: |
      Микросейсмический мониторинг подземных выработок для управления
      горным давлением и предупреждения горных ударов.

  BC-4430.50.40:
    name: Реагирование по триггерным уровням мониторинга
    description: |
      Выполнение планов реагирования при превышении пороговых значений
      геотехнического мониторинга.

  BC-4430.60:
    name: Вентиляция рудника и контроль атмосферы
    description: |
      Эксплуатация систем главного и вспомогательного проветривания,
      мониторинг параметров рудничной атмосферы.

  BC-4430.60.10:
    name: Главное проветривание
    description: |
      Эксплуатация главных поверхностных и подземных вентиляторных
      установок и вентиляционных сетей.

  BC-4430.60.20:
    name: Вспомогательное (местное) проветривание
    description: |
      Эксплуатация вспомогательных вентиляторов и вентиляционных труб
      у рабочих забоев.

  BC-4430.60.30:
    name: Мониторинг рудничной атмосферы
    description: |
      Непрерывный и периодический контроль запылённости, загазованности
      и содержания кислорода в рудничной атмосфере.

  BC-4430.60.40:
    name: Управление дизельными выхлопными газами
    description: |
      Управление концентрацией дизельных выхлопных газов на рабочих
      местах подземных горных работ.

  BC-4430.70:
    name: Водоотлив рудника
    description: |
      Эксплуатация систем водоотлива карьера и подземных горных выработок,
      а также насосных станций.

  BC-4430.70.10:
    name: Карьерный водоотлив
    description: |
      Эксплуатация внутрикарьерного водоотлива и перидренажных скважин
      по периметру карьера.

  BC-4430.70.20:
    name: Подземный водоотлив
    description: |
      Эксплуатация подземных водосборников, насосов и водоотливной
      арматуры.

  BC-4430.70.30:
    name: Эксплуатация насосных станций
    description: |
      Эксплуатация и техническое обслуживание стационарных насосных
      станций и нагнетательных трубопроводов.


# Управление жизненным циклом подписки (ru) — translations for L1-subscription-lifecycle-management.yaml
locale: ru
source: L1-subscription-lifecycle-management.yaml
entries:
  BC-4240:
    name: Управление жизненным циклом подписки
    description: |
      Разработка тарифных планов и прав доступа, контрактование подписок, подготовка, изменение, продление, отмена и применение прав доступа в рантайме на протяжении коммерческого жизненного цикла SaaS.
  BC-4240.10:
    name: Разработка тарифных планов и прав доступа
    description: |
      Определение тарифных планов, прав доступа к функциям и правил, регулирующих право клиентов на тот или иной план.
    in_scope:
      - Каталог тарифных планов и ограничение доступа к функциям
      - Правила права на тарифный план
    out_of_scope:
      - Стратегия ценообразования и управление прайс-листами (входит в Управление ценообразованием)
  BC-4240.10.10:
    name: Определение каталога тарифных планов
    description: |
      Определение каталога тарифных планов, включая уровни и содержание планов.
  BC-4240.10.20:
    name: Определение прав доступа к функциям
    description: |
      Определение прав доступа к функциям, привязанных к тарифным планам, дополнениям и кастомным контрактам.
  BC-4240.10.30:
    name: Правила права на тарифный план
    description: |
      Правила, определяющие право клиентов и вариантов использования на каждый тарифный план.
  BC-4240.20:
    name: Контрактование подписок
    description: |
      Управление коммерческими предложениями, формирование форм заказов и хранение контрактных документов подписок.
  BC-4240.20.10:
    name: Управление коммерческими предложениями по подписке
    description: |
      Формирование и ведение коммерческих предложений по подписке в ходе процесса продаж.
  BC-4240.20.20:
    name: Формирование форм заказов
    description: |
      Формирование форм заказов, отражающих согласованные условия для новых и существующих клиентов.
  BC-4240.20.30:
    name: Хранение контракта подписки
    description: |
      Хранение и сохранение исполненных контрактных документов и ключевых условий подписки.
  BC-4240.30:
    name: Подготовка подписки
    description: |
      Активация сервиса для новых подписок, включая конвертацию пробного периода в платный и массовую подготовку мест.
  BC-4240.30.10:
    name: Первоначальная подготовка
    description: |
      Первоначальная подготовка прав доступа к сервису при начале подписки.
  BC-4240.30.20:
    name: Конвертация пробного периода
    description: |
      Конвертация пробных учётных записей в платные подписки.
  BC-4240.30.30:
    name: Массовая подготовка мест
    description: |
      Массовая подготовка мест для корпоративных подписок.
  BC-4240.40:
    name: Изменение подписки
    description: |
      Изменения действующих подписок, включая апгрейды, даунгрейды, корректировку мест и активацию дополнений.
  BC-4240.40.10:
    name: Управление апгрейдами тарифного плана
    description: |
      Обработка инициированных клиентом и системой апгрейдов тарифного плана.
  BC-4240.40.20:
    name: Управление даунгрейдами тарифного плана
    description: |
      Обработка даунгрейдов тарифного плана, включая влияние на права доступа и данные.
  BC-4240.40.30:
    name: Корректировка мест
    description: |
      Корректировка количества мест в активных подписках.
  BC-4240.40.40:
    name: Активация дополнений
    description: |
      Активация опциональных прав доступа к дополнениям в активных подписках.
  BC-4240.50:
    name: Управление продлениями
    description: |
      Прогнозирование, обработка и согласование продлений подписок в автоматическом и ручном режимах.
  BC-4240.50.10:
    name: Прогнозирование продлений
    description: |
      Прогнозирование предстоящих продлений и ожидаемых результатов.
  BC-4240.50.20:
    name: Обработка автоматических продлений
    description: |
      Обработка автоматических продлений подписки в соответствии с условиями контракта.
  BC-4240.50.30:
    name: Поддержка переговоров о продлении
    description: |
      Поддержка переговоров о продлении: данные, ценообразование и пакеты изменения условий.
  BC-4240.60:
    name: Отмена и прекращение подписки
    description: |
      Добровольная отмена, принудительное прекращение и сворачивание сервиса для уходящих клиентов.
  BC-4240.60.10:
    name: Обработка отмены подписки
    description: |
      Обработка инициированных клиентом отмен подписки.
  BC-4240.60.20:
    name: Принудительное прекращение
    description: |
      Прекращение сервиса за неоплату, нарушение контракта или истечение срока.
  BC-4240.60.30:
    name: Координация сворачивания сервиса
    description: |
      Координированное сворачивание сервиса, включая экспорт данных и передачу задач удаления.
  BC-4240.70:
    name: Применение прав доступа
    description: |
      Разрешение и применение в рантайме прав доступа по подписке с аудит-следом решений.
  BC-4240.70.10:
    name: Разрешение прав доступа
    description: |
      Разрешение эффективных прав доступа по подписке, аккаунту и пользователю.
  BC-4240.70.20:
    name: Применение шлюзов прав доступа
    description: |
      Рантайм-ограничение функций и квот в соответствии с разрешёнными правами доступа.
  BC-4240.70.30:
    name: Аудит-след прав доступа
    description: |
      Запись аудиторского уровня об изменениях прав доступа и решениях шлюзов.

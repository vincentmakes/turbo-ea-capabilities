# Управление аудиторией и зрителями (ru) — translations for L1-audience-viewer-management.yaml
locale: ru
source: L1-audience-viewer-management.yaml
entries:
  BC-3750:
    name: Управление аудиторией и зрителями
    description: |
      Идентификация зрителей, подписки и права, многоустройственная
      аутентификация, вовлечённость и удержание, а также родительский контроль
      для прямых потребительских контентных сервисов на платформах OTT, IPTV и платного телевидения.
  BC-3750.10:
    name: Управление идентификацией зрителей
    description: |
      Подготовка и управление аккаунтами зрителей, домашними
      конструктами и федерированной идентификацией в сервисах.
  BC-3750.10.10:
    name: Подготовка аккаунтов зрителей
    description: |
      Создание и жизненный цикл аккаунтов зрителей,
      включая слияние и разделение аккаунтов.
  BC-3750.10.20:
    name: Управление домашними аккаунтами и профилями
    description: |
      Управление домашними конструктами и пользовательскими
      профилями внутри общих аккаунтов.
  BC-3750.10.30:
    name: Федерация идентификаторов
    description: |
      Федерация идентификации зрителей с операторскими,
      ритейлерными и сторонними провайдерами идентификации.
  BC-3750.20:
    name: Управление подписками и правами
    description: |
      Жизненный цикл подписок зрителей и записей прав,
      управляющих доступом к контентным сервисам и уровням.
  BC-3750.20.10:
    name: Зачисление в тарифный план
    description: |
      Зачисление зрителей в подписные, транзакционные
      и поддерживаемые рекламой планы.
  BC-3750.20.20:
    name: Предоставление и отзыв прав
    description: |
      Предоставление и отзыв прав на контент на основании
      подписок, покупок и партнёрских пакетов.
  BC-3750.20.30:
    name: Права на одновременные потоки
    description: |
      Управление одновременными потоками и количеством устройств
      на аккаунте на основе прав.
  BC-3750.30:
    name: Многоустройственная аутентификация
    description: |
      Аутентификация зрителей на парке устройств, включая
      потоки TV-Everywhere с операторскими провайдерами идентификации.
  BC-3750.30.10:
    name: Регистрация устройств
    description: |
      Регистрация и отмена регистрации устройств
      к аккаунтам зрителей.
  BC-3750.30.20:
    name: Управление аутентифицированными сессиями
    description: |
      Управление аутентифицированными сессиями воспроизведения
      и жизненным циклом токенов на устройствах.
  BC-3750.30.30:
    name: Аутентификация TV-Everywhere
    description: |
      Аутентификация подписчиков платного телевидения
      против операторских провайдеров идентификации для OTT-прав.
  BC-3750.40:
    name: Управление вовлечённостью и удержанием зрителей
    description: |
      Моделирование, проектирование пути и вмешательство для роста
      вовлечённости и снижения оттока в прямых потребительских сервисах.
  BC-3750.40.10:
    name: Моделирование привычек просмотра
    description: |
      Моделирование привычек, состояния просмотра и аффинитета
      зрителей для принятия решений о вовлечённости.
  BC-3750.40.20:
    name: Управление программами возврата и удержания
    description: |
      Проектирование и выполнение программ сохранения, возврата
      и удержания для зрителей в зоне риска и ушедших.
  BC-3750.40.30:
    name: Управление путями онбординга и активации
    description: |
      Пути онбординга новых зрителей и стимулирования
      первого значимого просмотра.
  BC-3750.50:
    name: Родительский контроль и ограничения профилей
    description: |
      Настройка и соблюдение ограничений контента на уровне
      профилей, PIN-блокировки и ограничений времени просмотра.
  BC-3750.50.10:
    name: Ограничение контента на уровне профиля
    description: |
      Ограничение контента на уровне профиля по возрастному
      рейтингу, категории и настраиваемым спискам блокировки.
  BC-3750.50.20:
    name: Управление PIN и блокировкой
    description: |
      Управление PIN, блокировкой профиля и покупки
      на устройствах и поверхностях.
  BC-3750.50.30:
    name: Настройка ограничений времени просмотра
    description: |
      Настройка ограничений времени просмотра, дейпарт-ограничений
      и экранного времени.

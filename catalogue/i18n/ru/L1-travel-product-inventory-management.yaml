# Туристический продукт и инвентарь (ru) — translations for L1-travel-product-inventory-management.yaml
locale: ru
source: L1-travel-product-inventory-management.yaml
entries:
  BC-4000:
    name: Туристический продукт и инвентарь
    description: |
      Основное определение, структурирование и управление запасами бронируемых туристических продуктов — номеров, тарифов, пакетов, дополнительных услуг, аттракций, а также таксономии и контента, описывающего их, — вне зависимости от каналов продажи.
    in_scope:
      - Типы номеров, тарифные планы и коды пакетов для размещения
      - Тарифные семейства авиабилетов, брендированные тарифы и правила тарификации
      - Пакетные маршруты (статические и динамические) и каталоги дополнительных услуг
      - Пулы инвентаря, аллотменты и буферы для овербукинга
      - Мастер-данные продуктов, контент и изображения
    out_of_scope:
      - Настройка дистрибуции по каналам (BC-4010)
      - Жизненный цикл бронирований (BC-4020)
      - Стратегия ценообразования и управление доходностью (BC-4030)
  BC-4000.10:
    name: Управление продуктом размещения
    description: |
      Определение продуктов размещения: типов номеров, тарифных планов, кодов пакетов и таксономии объектов размещения на уровне предприятия.
  BC-4000.10.10:
    name: Определение типов номеров и классов инвентаря
    description: |
      Определение типов номеров, категорий люксов и классов инвентаря, образующих основу продукта размещения.
  BC-4000.10.20:
    name: Определение тарифных планов и кодов
    description: |
      Определение тарифных планов, кодов тарифов и их атрибутов: условий возврата, предоплаты и условий включения.
  BC-4000.10.30:
    name: Статус жизненного цикла продукта размещения
    description: |
      Управление статусом жизненного цикла продуктов размещения от предложения до активации, приостановки и вывода.
  BC-4000.10.40:
    name: Формирование пакетов размещения
    description: |
      Создание пакетов размещения, объединяющих проживание с завтраком, парковкой и другими включёнными услугами.
  BC-4000.20:
    name: Управление авиапродуктом
    description: |
      Определение тарифных семейств авиакомпаний, атрибутов брендированных тарифов, правил тарификации и сопоставлений для кодшерных и интерлайн-маршрутов.
  BC-4000.20.10:
    name: Определение тарифных семейств
    description: |
      Определение тарифных семейств, кабин и тарифных бакетов для поиска и контроля инвентаря.
  BC-4000.20.20:
    name: Управление атрибутами брендированных тарифов
    description: |
      Управление атрибутами брендированных тарифов: нормы провоза багажа, выбор места и доступ в залы ожидания.
  BC-4000.20.30:
    name: Составление правил тарификации
    description: |
      Разработка правил тарификации: условия раннего бронирования, минимальный срок пребывания, комбинируемость и штрафы за изменение.
  BC-4000.20.40:
    name: Маппинг кодшерных и интерлайн-продуктов
    description: |
      Сопоставление продуктов авиакомпаний-партнёров с собственными тарифными семействами для кодшерной и интерлайн-дистрибуции.
  BC-4000.30:
    name: Управление турами и пакетными продуктами
    description: |
      Определение пакетных маршрутов, многосегментных туристических продуктов и сопоставлений компонентов для динамического пакетирования.
  BC-4000.30.10:
    name: Определение статических пакетных продуктов
    description: |
      Определение фиксированных пакетов, объединяющих компоненты в единый продаваемый продукт.
  BC-4000.30.20:
    name: Маппинг компонентов динамических пакетов
    description: |
      Сопоставление компонентов для динамического пакетирования, при котором путешественник самостоятельно собирает рейс, отель и дополнительные услуги.
  BC-4000.30.30:
    name: Версионирование пакетных продуктов
    description: |
      Управление версиями пакетных продуктов по сезонам, циклам каталогов и релизам функций.
  BC-4000.30.40:
    name: Календарь отправлений пакетного тура
    description: |
      Определение календарей отправлений, запретных дат и сезонных окон для пакетных туров.
  BC-4000.40:
    name: Управление дополнительными и сопутствующими продуктами
    description: |
      Определение дополнительных продуктов: питание, багаж, трансферы, аттракции, спа и наземное обслуживание.
  BC-4000.40.10:
    name: Определение каталога дополнительных услуг
    description: |
      Формирование каталога дополнительных услуг с категориями, вариантами и условиями применимости.
  BC-4000.40.20:
    name: Правила пакетирования дополнительных услуг
    description: |
      Правила объединения дополнительных услуг с основными туристическими продуктами и между собой.
  BC-4000.40.30:
    name: Правила перекрёстных продаж
    description: |
      Правила, определяющие возможность перекрёстных продаж дополнительных услуг с основными продуктами в конкретных каналах.
  BC-4000.40.40:
    name: Управление жизненным циклом дополнительных услуг
    description: |
      Управление жизненным циклом дополнительных услуг от запуска до прекращения, включая ограниченные по времени предложения.
  BC-4000.50:
    name: Распределение туристического инвентаря
    description: |
      Определение и контроль пулов инвентаря, блоков, аллотментов и правил резервирования по туристическим продуктам.
  BC-4000.50.10:
    name: Определение пулов инвентаря
    description: |
      Определение пулов инвентаря на уровне объекта, флота или продукта как основы для распределения.
  BC-4000.50.20:
    name: Распределение аллотментов и блоков
    description: |
      Выделение аллотментов и блоков для каналов, партнёров и туроператоров.
  BC-4000.50.30:
    name: Правила резервирования и защиты классов
    description: |
      Правила защиты инвентаря для определённых сегментов, каналов или участников программы лояльности.
  BC-4000.50.40:
    name: Настройка буферов овербукинга
    description: |
      Настройка буферов овербукинга с учётом ожидаемых показателей неявок и отмен.
  BC-4000.60:
    name: Управление мастер-данными туристического продукта
    description: |
      Контроль таксономии продуктов, классификаций, стандартов атрибутов и целостности идентификаторов в мастер-данных туристических продуктов.
  BC-4000.60.10:
    name: Стандарты атрибутов продукта
    description: |
      Стандарты атрибутов продуктов для единой семантики в системах и каналах.
  BC-4000.60.20:
    name: Классификация и тегирование продуктов
    description: |
      Классификация и тегирование продуктов по таксономиям для поиска, мерчандайзинга и отчётности.
  BC-4000.60.30:
    name: Статус жизненного цикла мастер-продукта
    description: |
      Мастер-статус жизненного цикла продуктов, охватывающий подтипы и согласующий изменения дочерних статусов.
  BC-4000.60.40:
    name: Управление идентификаторами продуктов
    description: |
      Управление каноническими идентификаторами продуктов и разрешение коллизий и дубликатов.
  BC-4000.70:
    name: Управление контентом и изображениями туристических продуктов
    description: |
      Создание и управление описательным контентом, изображениями, мультимедиа и записями о рейтингах и сертификациях туристических продуктов.
  BC-4000.70.10:
    name: Создание описательного контента
    description: |
      Разработка развёрнутых и кратких описаний туристических продуктов.
  BC-4000.70.20:
    name: Управление изображениями и мультимедиа
    description: |
      Управление фото, видео и 360-градусными мультимедиаактивами для туристических продуктов.
  BC-4000.70.30:
    name: Записи о звёздных рейтингах и сертификациях
    description: |
      Ведение данных о звёздных рейтингах, сторонних сертификатах и знаках качества для туристических продуктов.
  BC-4000.70.40:
    name: Локализация контента
    description: |
      Перевод и адаптация контента продукта для поддерживаемых рынков и языков.

# Управление проектной инженерией (ru) — translations for L1-project-engineering-management.yaml
locale: ru
source: L1-project-engineering-management.yaml
entries:
  BC-1110:
    name: Управление проектной инженерией
    description: |
      Инженерное обеспечение проектов от стадии FEED до передачи объекта.
  BC-1110.10:
    name: Управление планированием проектной инженерии
    description: |
      Инженерная иерархическая структура работ, реестр результатов, графики инженерных работ.
  BC-1110.10.10:
    name: Определение инженерной ИСР
    description: |
      Инженерная иерархическая структура работ и разбивка по дисциплинам.
  BC-1110.10.20:
    name: Реестр инженерных результатов
    description: |
      Реестр результатов, ответственные и целевые даты.
  BC-1110.10.30:
    name: Разработка инженерного графика
    description: |
      Инженерный график с учётом межидисциплинарных зависимостей.
  BC-1110.10.40:
    name: Нагрузка ресурсами инженерии
    description: |
      Прогнозирование трудозатрат инженеров и нагрузка ресурсами.
  BC-1110.20:
    name: Управление исполнением проектной инженерии
    description: |
      Надзор за многодисциплинарным исполнением инженерных работ и отчётность.
  BC-1110.20.10:
    name: Измерение прогресса инженерных работ
    description: |
      Измерение прогресса по инженерным результатам и освоенный объём.
  BC-1110.20.20:
    name: Контроль трудозатрат инженеров
    description: |
      Отслеживание и прогнозирование расходования трудозатрат инженеров.
  BC-1110.20.30:
    name: Координационные совещания по инженерии
    description: |
      Межидисциплинарная координация инженерных работ и еженедельная отчётность.
  BC-1110.20.40:
    name: Повышение производительности инженерии
    description: |
      Инициативы по повышению производительности, включая автоматизацию проектирования и повторное использование.
  BC-1110.30:
    name: Управление инженерными изменениями
    description: |
      Запросы на изменения, оценка технического влияния, контроль базовых версий.
  BC-1110.30.10:
    name: Регистрация запросов на инженерные изменения
    description: |
      Регистрация и классификация запросов на инженерные изменения.
  BC-1110.30.20:
    name: Оценка технического влияния
    description: |
      Многидисциплинарная оценка технического влияния изменений.
  BC-1110.30.30:
    name: Контроль базовых версий инженерии
    description: |
      Управление базовыми версиями инженерии и элементами конфигурации.
  BC-1110.30.40:
    name: Согласование и реализация инженерных изменений
    description: |
      Советы по согласованию изменений и отслеживание реализации.
  BC-1110.40:
    name: Управление интерфейсами
    description: |
      Внутренние и внешние технические интерфейсы, координация заинтересованных сторон.
  BC-1110.40.10:
    name: Выявление и регистрация интерфейсов
    description: |
      Выявление и регистрация технических интерфейсов.
  BC-1110.40.20:
    name: Управление интерфейсными соглашениями
    description: |
      Интерфейсные соглашения со сторонами и критерии приёмки.
  BC-1110.40.30:
    name: Мониторинг и закрытие интерфейсов
    description: |
      Мониторинг поставки результатов по интерфейсам и формальное закрытие.
  BC-1110.50:
    name: Управление качеством проектной инженерии
    description: |
      Обеспечение и контроль качества инженерии, техническое обеспечение, экспертные проверки, аудиты.
  BC-1110.50.10:
    name: Управление программой обеспечения качества инженерии
    description: |
      Согласование программы обеспечения качества инженерии с ISO 9001.
  BC-1110.50.20:
    name: Дисциплинарная экспертная проверка
    description: |
      Экспертная проверка инженерных результатов в рамках дисциплины.
  BC-1110.50.30:
    name: Технический аудит инженерии
    description: |
      Независимые технические аудиты и проверки достоверности.
  BC-1110.50.40:
    name: Извлечённые уроки в области инженерии
    description: |
      Фиксация и распространение извлечённых уроков в области инженерии.
  BC-1110.60:
    name: Управление техническими рисками и проблемами проекта
    description: |
      Технические риски, технические проблемы, отслеживание мер по снижению риска.
  BC-1110.60.10:
    name: Выявление технических рисков
    description: |
      Выявление технических и инженерных рисков.
  BC-1110.60.20:
    name: Оценка технических рисков
    description: |
      Оценка вероятности и влияния технических рисков.
  BC-1110.60.30:
    name: Урегулирование технических проблем
    description: |
      Отслеживание и урегулирование технических проблем с назначением ответственных.
  BC-1110.60.40:
    name: Отслеживание мер по снижению технических рисков
    description: |
      Отслеживание мер по снижению рисков и остаточных рисков.

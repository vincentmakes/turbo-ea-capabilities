# Экспедирование грузов и брокерские услуги (ru) — translations for L1-freight-forwarding-brokerage-management.yaml
locale: ru
source: L1-freight-forwarding-brokerage-management.yaml
entries:
  BC-2450:
    name: Управление экспедированием грузов и брокерскими услугами
    description: |
      Организация перевозок от имени грузоотправителей в качестве экспедитора,
      NVOCC, грузового брокера или таможенного брокера, включая мультимодальную
      координацию и операции в сети партнёров.
  BC-2450.10:
    name: Управление котировками для грузоотправителей
    description: |
      Приём запросов на котировки от грузоотправителей и выставление тарифов экспедитора
      по видам транспорта и перевозчикам.
    in_scope:
      - Поиск тарифов у нескольких перевозчиков по запросам грузоотправителей
      - Отслеживание действительности котировок и подтверждений
    out_of_scope:
      - Управление тарифными картами на стороне перевозчика (BC-2520)
  BC-2450.10.10:
    name: Приём запросов на котировки
    description: |
      Приём запросов на котировки от грузоотправителей по разным каналам.
  BC-2450.10.20:
    name: Поиск тарифов у нескольких перевозчиков
    description: |
      Поиск и сравнение тарифов у базовых перевозчиков.
  BC-2450.10.30:
    name: Выставление котировки и контроль действительности
    description: |
      Выставление обязательных и индикативных котировок и отслеживание их действительности.
  BC-2450.20:
    name: Управление закупками у перевозчиков и распределением
    description: |
      Бронирование ёмкости у базовых перевозчиков и управление
      распределением по перевозчикам и расходами.
  BC-2450.20.10:
    name: Выбор перевозчика
    description: |
      Выбор базового перевозчика для каждой отправки.
  BC-2450.20.20:
    name: Оформление бронирования у перевозчика
    description: |
      Бронирование ёмкости у выбранных перевозчиков.
  BC-2450.20.30:
    name: Оптимизация расходов на распределение
    description: |
      Оптимизация расходов экспедитора на распределение по перевозчикам.
  BC-2450.30:
    name: Мультимодальная координация экспедирования
    description: |
      Координация многоплечных мультимодальных перевозок, включая консолидацию,
      деконсолидацию и хаус-коносаменты.
  BC-2450.30.10:
    name: Выдача хаус-коносамента
    description: |
      Выдача хаус-коносаментов экспедитора для грузоотправителей.
  BC-2450.30.20:
    name: Координация многоплечных перевозок
    description: |
      Координация многоплечных перевозок через разных перевозчиков и виды транспорта.
  BC-2450.30.30:
    name: Консолидация и деконсолидация
    description: |
      Консолидация грузов в пункте отправления и деконсолидация в пункте назначения.
  BC-2450.40:
    name: Управление таможенным брокерским обслуживанием
    description: |
      Оказание услуг таможенного брокера от имени импортёров и экспортёров.
  BC-2450.40.10:
    name: Подготовка таможенных деклараций
    description: |
      Подготовка таможенных деклараций от имени клиентов.
  BC-2450.40.20:
    name: Расчёт пошлин и налогов
    description: |
      Расчёт и оплата пошлин и косвенных налогов для клиентов.
  BC-2450.40.30:
    name: Отслеживание статуса брокерского обслуживания
    description: |
      Отслеживание хода брокерского обслуживания и урегулирование исключений.
  BC-2450.50:
    name: Координация в сети экспедиторов
    description: |
      Координация с агентами в пунктах отправления, назначения и партнёрами в
      сети экспедиторов, включая межофисные расчёты.
  BC-2450.50.10:
    name: Координация с агентами в пунктах отправления и назначения
    description: |
      Координация деятельности с агентами в пунктах отправления и назначения.
  BC-2450.50.20:
    name: Межофисные расчёты
    description: |
      Межофисные и межагентские расчёты по выручке и расходам на экспедирование.
  BC-2450.50.30:
    name: Управление качеством услуг партнёров-агентов
    description: |
      Управление качеством услуг и соблюдением стандартов агентами-партнёрами.

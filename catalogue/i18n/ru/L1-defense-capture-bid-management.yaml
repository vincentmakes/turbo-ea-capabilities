# Управление участием в тендерах оборонных контрактов (ru) — translations for L1-defense-capture-bid-management.yaml
locale: ru
source: L1-defense-capture-bid-management.yaml
entries:
  BC-1750:
    name: Управление участием в тендерах оборонных контрактов
    description: |
      Управление процессом захвата контракта, сбор информации о заказчике, разработка заявок/предложений для оборонных контрактов.
  BC-1750.10:
    name: Управление захватом контракта
    description: |
      Деятельность до выхода RFP, формирование позиции заказчика, разработка стратегии победы.
  BC-1750.10.10:
    name: Выявление возможностей
    description: |
      Выявление оборонных возможностей и перспективных контрактов.
  BC-1750.10.20:
    name: Формирование позиции заказчика
    description: |
      Формирование позиции заказчика и влияние на требования до выхода RFP.
  BC-1750.10.30:
    name: Разработка стратегии победы
    description: |
      Разработка стратегии победы, тем и отличительных факторов.
  BC-1750.10.40:
    name: Анализ конкурентной среды
    description: |
      Анализ с позиции конкурентов и анализ конкурентной среды.
  BC-1750.20:
    name: Управление разведкой по заказчику оборонного контракта
    description: |
      Отношения с заказчиком, сбор информации о требованиях и бюджетах.
  BC-1750.20.10:
    name: Картирование организации заказчика
    description: |
      Картирование организаций заказчика и ключевых заинтересованных сторон.
  BC-1750.20.20:
    name: Сбор информации о бюджетах и закупках
    description: |
      Сбор информации о бюджетах, циклах закупок и приоритетах.
  BC-1750.20.30:
    name: Сбор информации о требованиях
    description: |
      Сбор информации о формирующихся требованиях заказчика.
  BC-1750.30:
    name: Управление тендером оборонного контракта
    description: |
      Решение об участии/отказе от участия, управление тендером и ресурсы.
  BC-1750.30.10:
    name: Решение об участии в тендере
    description: |
      Управление процессом принятия решения об участии/отказе от участия в тендере.
  BC-1750.30.20:
    name: Ресурсное обеспечение тендера
    description: |
      Распределение ресурсов и финансирование на подготовку тендерных предложений.
  BC-1750.30.30:
    name: Управление рисками тендера
    description: |
      Выявление рисков тендера и управление ими.
  BC-1750.40:
    name: Управление тендерным предложением оборонного контракта
    description: |
      Составление предложения, контрольные проверки и подготовка предложения к подаче.
  BC-1750.40.10:
    name: Составление тендерного предложения
    description: |
      Составление томов оборонного тендерного предложения.
  BC-1750.40.20:
    name: Проведение поэтапных проверок предложения
    description: |
      Поэтапные проверки предложения (розовая, красная, золотая) и итоговая проверка.
  BC-1750.40.30:
    name: Подготовка и подача предложения
    description: |
      Подготовка и своевременная подача тендерных предложений.
  BC-1750.40.40:
    name: Верификация соответствия предложения
    description: |
      Верификация соответствия требованиям RFP и инструкциям.
  BC-1750.50:
    name: Управление стратегией объединения и субподряда
    description: |
      Соглашения о кооперации, выбор субподрядчиков для тендеров.
  BC-1750.50.10:
    name: Определение стратегии объединения
    description: |
      Определение стратегии объединения и соотношения основного подрядчика и субподрядчиков.
  BC-1750.50.20:
    name: Переговоры о соглашениях об объединении
    description: |
      Переговоры и заключение соглашений об объединении и соглашений о неразглашении.
  BC-1750.50.30:
    name: Выбор субподрядчиков для тендера
    description: |
      Выбор субподрядчиков и партнёров из малого бизнеса для тендера.

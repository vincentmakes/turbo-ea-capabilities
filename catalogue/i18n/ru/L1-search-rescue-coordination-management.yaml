# Управление координацией поиска и спасения (ru) — translations for L1-search-rescue-coordination-management.yaml
locale: ru
source: L1-search-rescue-coordination-management.yaml
entries:
  BC-1260:
    name: Управление координацией поиска и спасения
    description: |
      Оповещение для поиска и спасения, координация со спасательными центрами, обработка сигналов аварийных маяков.
  BC-1260.10:
    name: Управление оповещением для поиска и спасения
    description: |
      Фазы тревоги — неопределённость, тревога, бедствие.
  BC-1260.10.10:
    name: Обработка фазы неопределённости
    description: |
      Выявление и обработка фазы неопределённости INCERFA.
  BC-1260.10.20:
    name: Обработка фазы тревоги
    description: |
      Обработка фазы тревоги ALERFA и эскалация.
  BC-1260.10.30:
    name: Обработка фазы бедствия
    description: |
      Обработка фазы бедствия DETRESFA и инициирование поисково-спасательных работ.
  BC-1260.20:
    name: Управление координацией поиска и спасения
    description: |
      Координация со спасательными координационными центрами.
  BC-1260.20.10:
    name: Связь со спасательными координационными центрами
    description: |
      Взаимодействие с национальными и региональными спасательными координационными центрами.
  BC-1260.20.20:
    name: Координация поисково-спасательных миссий
    description: |
      Координация ресурсов и средств поисково-спасательных операций.
  BC-1260.20.30:
    name: Трансграничная координация поиска и спасения
    description: |
      Трансграничная координация поисково-спасательных операций.
  BC-1260.30:
    name: Управление связью при поиске и спасении
    description: |
      Сети связи для поиска и спасения, координационные каналы.
  BC-1260.30.10:
    name: Операции голосовой связи при поиске и спасении
    description: |
      Эксплуатация голосовых каналов и частот поиска и спасения.
  BC-1260.30.20:
    name: Операции цифровой связи при поиске и спасении
    description: |
      Эксплуатация сетей передачи данных и обмена сообщениями при поиске и спасении.
  BC-1260.40:
    name: Управление аварийными радиомаяками
    description: |
      Обработка активаций ELT/EPIRB/PLB, интерфейс с COSPAS-SARSAT.
  BC-1260.40.10:
    name: Обработка активаций аварийных радиомаяков
    description: |
      Обнаружение и обработка активаций аварийных радиомаяков ELT.
  BC-1260.40.20:
    name: Операции интерфейса с COSPAS-SARSAT
    description: |
      Взаимодействие с центрами управления миссиями COSPAS-SARSAT.
  BC-1260.40.30:
    name: Координация регистрации маяков
    description: |
      Координация с национальными реестрами аварийных маяков.

# Финансовое управление (ru) — translations for L1-financial-management.yaml
locale: ru
source: L1-financial-management.yaml
entries:
  BC-200:
    name: Финансовое управление
    description: |
      Бухгалтерский учёт, контроллинг, законодательная и управленческая отчётность, бюджетирование.
  BC-200.10:
    name: Управление главной книгой
    description: |
      План счетов, журнальные проводки, закрытие периода.
  BC-200.10.10:
    name: Управление планом счетов
    description: |
      Определение и управление планом счетов и иерархиями счетов.
  BC-200.10.20:
    name: Обработка журнальных проводок
    description: |
      Ручные и автоматические журнальные проводки с процедурами согласования.
  BC-200.10.30:
    name: Внутригрупповой учёт
    description: |
      Внутригрупповые операции, элиминации и выверки.
  BC-200.10.40:
    name: Закрытие периода
    description: |
      Календарь закрытия периода, начисления и подтверждения закрытия.
  BC-200.10.50:
    name: Выверка счетов
    description: |
      Выверка и подтверждение балансовых счетов.
  BC-200.20:
    name: Управление кредиторской задолженностью
    description: |
      Обработка счетов к оплате, платежи, учёт расчётов с поставщиками.
  BC-200.20.10:
    name: Получение и проверка счетов поставщиков
    description: |
      Получение, регистрация и трёхстороннее сопоставление счетов поставщиков.
  BC-200.20.20:
    name: Проведение платёжных рейсов
    description: |
      Планирование и проведение платёжных рейсов поставщикам.
  BC-200.20.30:
    name: Управление финансовыми мастер-данными поставщиков
    description: |
      Финансовые мастер-данные поставщиков, банковские реквизиты и налоговые атрибуты.
  BC-200.20.40:
    name: Обработка командировочных расходов
    description: |
      Регистрация, согласование и возмещение командировочных расходов сотрудников.
  BC-200.20.50:
    name: Выверка субсчёта кредиторской задолженности
    description: |
      Выверка выписок поставщиков и субсчёта кредиторской задолженности.
  BC-200.30:
    name: Управление дебиторской задолженностью
    description: |
      Выставление счетов клиентам, инкассация, зачисление платежей.
  BC-200.30.10:
    name: Выставление счетов клиентам
    description: |
      Формирование и направление счетов и кредит-нот клиентам.
  BC-200.30.20:
    name: Зачисление платежей
    description: |
      Сопоставление входящих платежей клиентов с открытой дебиторской задолженностью.
  BC-200.30.30:
    name: Управление инкассацией
    description: |
      Досудебные процедуры взыскания, стратегия инкассации и работа с просроченной задолженностью.
  BC-200.30.40:
    name: Кредитный риск и лимиты клиентов
    description: |
      Оценка кредитоспособности клиентов, установка лимитов и блокировки отгрузки.
  BC-200.30.50:
    name: Управление спорами и корректировками
    description: |
      Расследование и урегулирование споров по счетам и корректировок.
  BC-200.40:
    name: Учёт основных средств
    description: |
      Реестры активов, амортизация, обесценение.
  BC-200.40.10:
    name: Ведение реестра основных средств
    description: |
      Капитализация, классификация и учёт основных средств.
  BC-200.40.20:
    name: Амортизация
    description: |
      Методы амортизации, графики и проводки.
  BC-200.40.30:
    name: Обесценение и переоценка активов
    description: |
      Тестирование на обесценение и переоценка активов по МСФО или местным GAAP.
  BC-200.40.40:
    name: Учёт выбытия активов
    description: |
      Учёт списания, продажи и ликвидации основных средств.
  BC-200.50:
    name: Управление производственным учётом
    description: |
      Объекты затрат, распределение затрат, нормативная калькуляция.
  BC-200.50.10:
    name: Управление объектами и центрами затрат
    description: |
      Определение центров затрат, внутренних заказов и проектных объектов затрат.
  BC-200.50.20:
    name: Нормативная калькуляция
    description: |
      Установка нормативной стоимости, анализ отклонений и переоценка.
  BC-200.50.30:
    name: Распределение и поглощение затрат
    description: |
      Циклы распределения затрат, базы распределения и поглощение накладных расходов.
  BC-200.50.40:
    name: Калькуляция себестоимости продуктов и услуг
    description: |
      Калькуляция себестоимости продуктов, услуг и проектов.
  BC-200.60:
    name: Управление финансовой отчётностью
    description: |
      Внутренняя финансовая отчётность и консолидация.
  BC-200.60.10:
    name: Финансовая консолидация
    description: |
      Консолидация юридических лиц, включая элиминации и трансляцию иностранных валют.
  BC-200.60.20:
    name: Внутренняя финансовая отчётность
    description: |
      Подготовка внутренних отчётов о прибылях и убытках, балансового отчёта и отчёта о движении денежных средств.
  BC-200.60.30:
    name: Сегментная и управленческая отчётность
    description: |
      Сегментная отчётность и отчётность в разрезе управленческих представлений.
  BC-200.60.40:
    name: Подготовка финансовых раскрытий
    description: |
      Составление примечаний и раскрытий к финансовой отчётности.
  BC-200.70:
    name: Законодательная и регуляторная отчётность
    description: |
      Финансовая отчётность в соответствии с законодательством, регуляторные финансовые представления.
  BC-200.70.10:
    name: Подготовка законодательной финансовой отчётности
    description: |
      Составление финансовой отчётности юридических лиц в соответствии с законодательством.
  BC-200.70.20:
    name: Регуляторные финансовые представления
    description: |
      Отраслевые регуляторные финансовые отчёты и пруденциальные представления.
  BC-200.70.30:
    name: Координация внешнего аудита
    description: |
      Взаимодействие с внешними аудиторами и управление аудиторскими материалами.
  BC-200.70.40:
    name: Отчётность об устойчивом развитии и нефинансовая отчётность
    description: |
      Нефинансовые и ESG-раскрытия (например, CSRD, IFRS S1/S2).

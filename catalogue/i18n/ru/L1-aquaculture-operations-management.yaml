# Управление аквакультурой (ru) — translations for L1-aquaculture-operations-management.yaml
locale: ru
source: L1-aquaculture-operations-management.yaml
entries:
  BC-3520:
    name: Управление аквакультурой
    description: |
      Производство фермерских водных видов — закупка маточного стада и зарыбление,
      кормление, качество воды, здоровье животных, операции в садках и прудах,
      уборка и экологическое соответствие для рыбы, моллюсков и водных растений.
  BC-3520.10:
    name: Закупка поголовья и операции зарыбления
    description: |
      Источники маточного стада, операции рыбоводного завода и
      зарыбление молодью в системы доращивания.
  BC-3520.10.10:
    name: Закупка маточного стада
    description: |
      Поиск и карантин маточного стада для производства
      на рыбоводном заводе.
  BC-3520.10.20:
    name: Операции рыбоводного завода
    description: |
      Инкубация икры, выращивание личинок и производство
      молоди на рыбоводных заводах.
  BC-3520.10.30:
    name: Операции зарыбления молодью
    description: |
      Зарыбление молодью в садки, пруды и бассейны
      для доращивания.
  BC-3520.20:
    name: Операции кормления в аквакультуре
    description: |
      Планирование кормления, раздача и мониторинг
      кормовых коэффициентов для фермерских водных видов.
  BC-3520.20.10:
    name: Планирование нормы кормления
    description: |
      Планирование нормы кормления по виду, стадии жизни
      и температуре воды.
  BC-3520.20.20:
    name: Операции раздачи корма
    description: |
      Ручная, механическая и автоматизированная раздача корма
      в садках и прудах.
  BC-3520.20.30:
    name: Мониторинг кормовых коэффициентов
    description: |
      Мониторинг кормового коэффициента относительно
      планов кормления.
  BC-3520.30:
    name: Управление качеством воды
    description: |
      Непрерывный мониторинг качества воды, оксигенация и
      очистка в проточных и рециркуляционных системах аквакультуры.
    in_scope:
      - Мониторинг растворённого кислорода и температуры
      - Аэрационные и оксигенационные операции
      - Очистка и рециркуляция воды
  BC-3520.30.10:
    name: Мониторинг качества воды
    description: |
      Мониторинг растворённого кислорода, температуры,
      солёности и pH в реальном времени.
  BC-3520.30.20:
    name: Аэрационные и оксигенационные операции
    description: |
      Функционирование систем аэрации и инжекции кислорода.
  BC-3520.30.30:
    name: Очистка и рециркуляция воды
    description: |
      Механическая, биологическая и УФ-очистка воды
      в рециркуляционных системах.
  BC-3520.40:
    name: Управление здоровьем водных животных
    description: |
      Надзор за болезнями, лечение, биобезопасность и запись
      смертности для фермерских водных видов.
  BC-3520.40.10:
    name: Надзор за болезнями водных животных
    description: |
      Надзор за патогенами, паразитами и болезнями,
      подлежащими обязательному уведомлению.
  BC-3520.40.20:
    name: Операции лечения в аквакультуре
    description: |
      Водные и купочные лечебные операции, включая
      борьбу с морскими вшами.
  BC-3520.40.30:
    name: Биобезопасность аквакультуры
    description: |
      Биобезопасность на площадке, дезинфекция оборудования
      и контроль передвижения.
  BC-3520.40.40:
    name: Запись смертности
    description: |
      Ежедневная запись смертности, классификация
      и управление утилизацией.
  BC-3520.50:
    name: Операции в садках и прудах
    description: |
      Повседневное функционирование и сохранение целостности садков,
      клеток и прудов, включая защиту от хищников и борьбу с обрастанием.
  BC-3520.50.10:
    name: Осмотр сетей и клеток
    description: |
      Плановый осмотр сетей, клеток и швартовых конструкций
      на целостность.
  BC-3520.50.20:
    name: Защита от хищников и предотвращение побегов
    description: |
      Меры отпугивания хищников и предотвращения побегов.
  BC-3520.50.30:
    name: Антиобрастающие операции
    description: |
      Очистка сетей и антиобрастающие операции
      на подводной инфраструктуре.
  BC-3520.60:
    name: Операции сбора урожая в аквакультуре
    description: |
      Предуборочный отбор образцов, проведение уборки и живое
      хранение для переработки или отправки на живой рынок.
  BC-3520.60.10:
    name: Предуборочный отбор образцов
    description: |
      Предуборочный отбор образцов по размеру, качеству и остаткам.
  BC-3520.60.20:
    name: Проведение уборки урожая
    description: |
      Скопление, откачка, оглушение и проведение уборки.
  BC-3520.60.30:
    name: Живое хранение и перевозка
    description: |
      Живое хранение и перевозка живым транспортом или танкером
      на переработку или рынок.
  BC-3520.70:
    name: Экологическое соответствие аквакультуры
    description: |
      Экологический мониторинг и отчётность на уровне площадки,
      требуемые лицензиями и схемами сертификации.
  BC-3520.70.10:
    name: Экологический мониторинг площадки
    description: |
      Экологический мониторинг площадки по условиям лицензии.
  BC-3520.70.20:
    name: Отчётность о стоках
    description: |
      Отчётность о сбросе питательных веществ и стоков регуляторам.
  BC-3520.70.30:
    name: Оценка воздействия на бентос
    description: |
      Обследования воздействия на бентос и отслеживание
      рекультивации под садками.

# Управление релизами и развёртыванием программного обеспечения (ru) — translations for L1-software-release-deployment-management.yaml
locale: ru
source: L1-software-release-deployment-management.yaml
entries:
  BC-4210:
    name: Управление релизами и развёртыванием программного обеспечения
    description: |
      Непрерывная интеграция, управление средами, релизная инженерия, флаги функций и поэтапное развёртывание SaaS-продуктов в продуктивную среду.
  BC-4210.10:
    name: Управление непрерывной интеграцией
    description: |
      Конвейеры сборки, производство артефактов и применение политик конвейера для поддержания непрерывной сборки интегрированного продукта.
  BC-4210.10.10:
    name: Управление конвейерами сборки
    description: |
      Определение и эксплуатация автоматизированных конвейеров сборки для компонентов продукта.
  BC-4210.10.20:
    name: Управление репозиторием артефактов
    description: |
      Хранение, хранение и доступ к артефактам сборки и пакетам зависимостей.
  BC-4210.10.30:
    name: Применение политик конвейера
    description: |
      Применение обязательных шлюзов качества, безопасности и происхождения артефактов в конвейерах.
  BC-4210.20:
    name: Управление средами
    description: |
      Подготовка и управление не-продуктивными средами для разработки, интеграции и предпродуктивной валидации.
  BC-4210.20.10:
    name: Подготовка сред
    description: |
      Подготовка не-продуктивных сред в соответствии с потребностями разработки и валидации.
  BC-4210.20.20:
    name: Конфигурирование сред
    description: |
      Конфигурирование не-продуктивных сред для обеспечения паритета с продуктивной средой, где это необходимо.
  BC-4210.20.30:
    name: Управление данными сред
    description: |
      Подготовка, маскировка и обновление данных в не-продуктивных средах.
  BC-4210.30:
    name: Управление релизной инженерией
    description: |
      Каденция, версионирование, ветвление и практика релизных заметок для выпусков программного обеспечения.
  BC-4210.30.10:
    name: Управление каденцией релизов
    description: |
      Определение и управление каденцией релизов по продуктовым направлениям.
  BC-4210.30.20:
    name: Версионирование и ветвление
    description: |
      Схема версионирования и стратегия ветвления для продуктовых релизов.
  BC-4210.30.30:
    name: Подготовка релизных заметок
    description: |
      Подготовка клиентских и операторских релизных заметок для каждого релиза.
  BC-4210.40:
    name: Оркестрация развёртывания
    description: |
      Стратегии безопасной поставки изменений программного обеспечения в продуктив с контролируемым радиусом поражения.
  BC-4210.40.10:
    name: Поэтапное развёртывание
    description: |
      Постепенное развёртывание релизов для расширяющихся когорт арендаторов или пользователей.
  BC-4210.40.20:
    name: Канарочное развёртывание
    description: |
      Развёртывание релизов на небольшую канарочную выборку с автоматической оценкой работоспособности.
  BC-4210.40.30:
    name: Сине-зелёное развёртывание
    description: |
      Развёртывание в параллельных средах с переключением трафика для минимизации простоя при изменениях.
  BC-4210.40.40:
    name: Координация отката
    description: |
      Координированный откат релизов при неблагоприятных сигналах.
  BC-4210.50:
    name: Управление флагами функций
    description: |
      Жизненный цикл и рантайм-управление флагами функций для разделения развёртывания и релиза, а также таргетинга функций на когорты.
    in_scope:
      - Создание, выведение и аудит флагов функций
      - Правила таргетинга
    out_of_scope:
      - Методология экспериментов и принятие решений (входит в Управление телеметрией и экспериментами)
  BC-4210.50.10:
    name: Жизненный цикл флагов функций
    description: |
      Жизненный цикл флагов функций от создания до выведения из эксплуатации.
  BC-4210.50.20:
    name: Управление правилами таргетинга
    description: |
      Определение правил таргетинга, определяющих, какие субъекты получают вариант флага.
  BC-4210.50.30:
    name: Управление гигиеной флагов
    description: |
      Практика гигиены флагов: выведение устаревших флагов и предотвращение накопления мёртвого условного кода.
  BC-4210.60:
    name: Управление конфигурацией и секретами
    description: |
      Управление рантайм-конфигурационными значениями и секретами, используемыми сервисами продукта.
  BC-4210.60.10:
    name: Управление рантайм-конфигурацией
    description: |
      Хранение, распространение и аудит рантайм-конфигурационных значений.
  BC-4210.60.20:
    name: Управление жизненным циклом секретов
    description: |
      Выдача, ротация и отзыв секретов, используемых сервисами продукта.
  BC-4210.70:
    name: Авторизация изменений в продуктивной среде
    description: |
      Предразвёртывательный ревью, управление окнами развёртывания и авторизация доступа людей к продуктиву.
  BC-4210.70.10:
    name: Предразвёртывательный ревью
    description: |
      Ревью и утверждение изменений перед развёртыванием в продуктивную среду.
  BC-4210.70.20:
    name: Управление окнами развёртывания
    description: |
      Управление допустимыми окнами развёртывания и заморозками.
  BC-4210.70.30:
    name: Авторизация доступа к продуктиву
    description: |
      Авторизация, выдача по запросу (just-in-time) и аудит доступа людей к продуктивным системам.

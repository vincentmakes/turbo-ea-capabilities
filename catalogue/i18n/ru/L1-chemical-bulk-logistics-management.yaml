# Логистика химических грузов насыпью/наливом (ru) — translations for L1-chemical-bulk-logistics-management.yaml
locale: ru
source: L1-chemical-bulk-logistics-management.yaml
entries:
  BC-4680:
    name: Логистика химических грузов насыпью/наливом
    description: |
      Перевалка насыпных химических грузов на объектах резервуарных парков,
      в автомобильном, железнодорожном, морском, трубопроводном транспорте
      и на складах, включая соответствующие операции с опасными грузами,
      толлинг и коммерческое измерение при передаче в хранение.
  BC-4680.10:
    name: Хранение наливных продуктов и операции резервуарных парков
    description: |
      Эксплуатация крупных резервуаров и резервуарных парков, включая
      распределение, очистку и согласование потерь.
  BC-4680.10.10:
    name: Управление запасами резервуарных парков
    description: |
      Управление запасами в атмосферных и работающих под давлением
      резервуарных парках.
  BC-4680.10.20:
    name: Распределение резервуаров и маршрутизация
    description: |
      Закрепление резервуаров за продуктами и маршрутизация входящих и
      исходящих потоков.
  BC-4680.10.30:
    name: Координация очистки резервуаров
    description: |
      Координация очистки резервуаров при смене продуктов.
  BC-4680.10.40:
    name: Согласование потерь в резервуарных парках
    description: |
      Согласование физических потерь в резервуарных парках.
  BC-4680.20:
    name: Логистика автоцистерн и ISO-контейнеров
    description: |
      Эксплуатация парка автоцистерн и ISO-контейнеров, включая операции
      наливных эстакад и очистку контейнеров.
  BC-4680.20.10:
    name: Планирование рейсов автоцистерн
    description: |
      Планирование рейсов автоцистерн и распределения мест погрузки.
  BC-4680.20.20:
    name: Управление парком ISO-контейнеров
    description: |
      Управление парком ISO-контейнеров, включая их позиционирование и
      повторное использование.
  BC-4680.20.30:
    name: Операции наливных эстакад
    description: |
      Эксплуатация наливных эстакад для отправки автомобильным транспортом
      и в ISO-контейнерах.
  BC-4680.20.40:
    name: Координация очистки контейнеров
    description: |
      Координация утверждённой очистки контейнеров между загрузками.
  BC-4680.30:
    name: Логистика железнодорожных цистерн
    description: |
      Распределение, погрузка, разгрузка и координация технического
      обслуживания железнодорожных цистерн.
  BC-4680.30.10:
    name: Распределение железнодорожных цистерн
    description: |
      Закрепление железнодорожных цистерн за продуктами и маршрутами.
  BC-4680.30.20:
    name: Операции погрузки и разгрузки железнодорожных цистерн
    description: |
      Эксплуатация стояков налива и слива железнодорожных цистерн.
  BC-4680.30.30:
    name: Координация технического обслуживания железнодорожных цистерн
    description: |
      Координация технического обслуживания и квалификации железнодорожных
      цистерн по всему парку.
  BC-4680.40:
    name: Морская логистика насыпных химических грузов
    description: |
      Морская логистика для партионных и химических танкеров, включая
      фрахтование, погрузку и укладку груза.
  BC-4680.40.10:
    name: Координация фрахтования химических танкеров
    description: |
      Координация фрахтования химических и партионных танкеров.
  BC-4680.40.20:
    name: Морские операции налива и слива
    description: |
      Эксплуатация морских терминалов налива и слива.
  BC-4680.40.30:
    name: Планирование укладки грузов партионных танкеров
    description: |
      Планирование размещения совместимых партионных грузов на химических
      танкерах.
  BC-4680.50:
    name: Координация трубопроводных перемещений
    description: |
      Номинация, последовательность и координация передачи в хранение при
      трубопроводных перемещениях насыпных химикатов.
  BC-4680.50.10:
    name: Управление номинацией трубопроводных перемещений
    description: |
      Номинация трубопроводных перемещений у операторов и контрагентов.
  BC-4680.50.20:
    name: Последовательность партий в трубопроводах
    description: |
      Планирование последовательности партий с управлением зонами смешения.
  BC-4680.50.30:
    name: Координация коммерческой передачи по трубопроводу
    description: |
      Координация коммерческой передачи на точках закачки и отбора из
      трубопровода.
  BC-4680.60:
    name: Складские операции с опасными грузами
    description: |
      Приём, сегрегация и хранение опасных химических фасованных товаров
      на соответствующих требованиям складах.
  BC-4680.60.10:
    name: Приём опасных грузов на склад и размещение
    description: |
      Приём и размещение опасных фасованных химикатов.
  BC-4680.60.20:
    name: Управление сегрегацией химических грузов
    description: |
      Управление соблюдением требований сегрегации химических грузов при
      складировании.
  BC-4680.60.30:
    name: Операции хранения в бочках и МКР
    description: |
      Операции хранения в бочках и средних контейнерах для сыпучих материалов.
  BC-4680.70:
    name: Координация толлинга и стороннего производства
    description: |
      Координация толлингового производства на объектах третьих сторон,
      включая согласование толлинговых материалов.
  BC-4680.70.10:
    name: Выбор и квалификация толлера
    description: |
      Выбор и квалификация партнёров по толлинговому производству.
  BC-4680.70.20:
    name: Планирование толлингового производства
    description: |
      Планирование толлинговых кампаний на объектах третьих сторон.
  BC-4680.70.30:
    name: Согласование толлинговых материалов
    description: |
      Согласование входящих и исходящих материалов при толлинговом
      производстве.
  BC-4680.80:
    name: Коммерческое измерение насыпных грузов при передаче в хранение
    description: |
      Измерение объёма, массы и отбор проб на интерфейсах коммерческой
      передачи.
  BC-4680.80.10:
    name: Измерение объёма и массы
    description: |
      Калиброванное измерение объёма и массы в точках коммерческой передачи.
  BC-4680.80.20:
    name: Координация отбора проб
    description: |
      Координация представительного отбора проб при коммерческой передаче.
  BC-4680.80.30:
    name: Документирование коммерческой передачи
    description: |
      Оформление и хранение документации по коммерческой передаче.

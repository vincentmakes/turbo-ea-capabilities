# Управление диспетчеризацией и балансированием энергосистемы (ru) — translations for L1-grid-control-balancing-management.yaml
locale: ru
source: L1-grid-control-balancing-management.yaml
entries:
  BC-3830:
    name: Управление диспетчеризацией и балансированием энергосистемы
    description: |
      Функция системного оператора объединённой энергосистемы — балансирование
      генерации и нагрузки в реальном времени, управление частотой и напряжением,
      резервы и вспомогательные услуги, оперативное планирование, межсистемная
      координация и готовность к чёрному старту.
  BC-3830.10:
    name: Системные операции в реальном времени
    description: |
      Непрерывный надзор и управление системной генерацией,
      нагрузкой и перетоками для поддержания надёжной работы.
  BC-3830.10.10:
    name: Ситуационная осведомлённость о системе
    description: |
      Непрерывный мониторинг генерации, нагрузки и резервов
      послеаварийной надёжности из диспетчерского центра.
  BC-3830.10.20:
    name: Анализ послеаварийных ситуаций в реальном времени
    description: |
      Анализ послеаварийных ситуаций N-1 и N-1-1 в реальном
      времени с запуском корректирующих действий.
  BC-3830.10.30:
    name: Выдача оперативных распоряжений
    description: |
      Выдача оперативных распоряжений балансопоставщикам
      и ТСО.
  BC-3830.20:
    name: Управление частотой и напряжением
    description: |
      Активное регулирование частоты и напряжения через
      автоматическое регулирование генерации и выдачу реактивной мощности.
  BC-3830.20.10:
    name: Автоматическое регулирование генерации
    description: |
      Диспетчеризация АРГ и управление ошибкой
      регулирования зоны для регулирования частоты.
  BC-3830.20.20:
    name: Диспетчеризация реактивной мощности
    description: |
      Диспетчеризация реактивных источников для поддержания
      профиля напряжения по энергосистеме.
  BC-3830.20.30:
    name: Управление инерцией и частотным откликом
    description: |
      Управление инерцией, быстрым частотным откликом
      и статическими характеристиками генераторов.
  BC-3830.30:
    name: Оперативное планирование
    description: |
      Суточный и внутрисуточный анализ надёжности системы,
      оценка остановов и планирование оперативных резервов.
  BC-3830.30.10:
    name: Суточный анализ надёжности
    description: |
      Надёжностное ограниченное управление коммитментом блоков
      и анализ послеаварийных ситуаций для операционного дня.
  BC-3830.30.20:
    name: Внутрисуточное перераспределение нагрузки
    description: |
      Внутрисуточное перераспределение генерации и нагрузки
      при уточнении прогнозов.
  BC-3830.30.30:
    name: Сезонная оценка оперативного резерва
    description: |
      Сезонная оценка резерва мощности и обеспеченности.
  BC-3830.40:
    name: Резервы и вспомогательные услуги
    description: |
      Закупка и активация оперативных резервов и вспомогательных
      услуг, включая частотные, напряжённые и инерционные продукты.
  BC-3830.40.10:
    name: Закупка резервов
    description: |
      Закупка продуктов первичного, вторичного
      и третичного регулирования.
  BC-3830.40.20:
    name: Активация вспомогательных услуг
    description: |
      Активация и диспетчеризация поставщиков
      вспомогательных услуг.
  BC-3830.40.30:
    name: Мониторинг производительности резервов
    description: |
      Мониторинг производительности и доступности
      поставщиков резервов.
  BC-3830.50:
    name: Операции балансирования и расчётов небалансов
    description: |
      Расчёт и уведомление системным оператором объёмов
      и цен небалансов для балансопоставщиков.
  BC-3830.50.10:
    name: Агрегирование измеренных объёмов
    description: |
      Агрегирование измеренных объёмов
      по балансопоставщикам.
  BC-3830.50.20:
    name: Расчёт цен небаланса
    description: |
      Расчёт системных цен небаланса
      по рыночным правилам.
  BC-3830.50.30:
    name: Уведомление балансопоставщиков о расчётах
    description: |
      Уведомление балансопоставщиков об объёмах
      небалансов и платежах.
  BC-3830.60:
    name: Межсистемная координация
    description: |
      Координация перетоков по межсистемным связям, перераспределения
      нагрузки и обеспечения надёжности с соседними ТСО и РСК.
  BC-3830.60.10:
    name: Планирование перетоков по межсистемным связям
    description: |
      Планирование физических и коммерческих перетоков
      по межсистемным связям.
  BC-3830.60.20:
    name: Координированный расчёт пропускной способности
    description: |
      Координированный расчёт пропускной способности
      по торговым зонам с соседними ТСО.
  BC-3830.60.30:
    name: Межсистемное перераспределение и контрторговля
    description: |
      Межсистемное перераспределение нагрузки и контрторговля
      для снятия перегрузок.
  BC-3830.70:
    name: Чёрный старт и планирование восстановления
    description: |
      Обслуживание договоров чёрного старта, планов восстановления
      и учений по восстановлению после полного или частичного распада системы.
  BC-3830.70.10:
    name: Управление договорами чёрного старта
    description: |
      Закупка и надзор за договорами
      на услугу чёрного старта.
  BC-3830.70.20:
    name: Обслуживание плана восстановления системы
    description: |
      Обслуживание последовательностей восстановления
      и планов островного режима.
  BC-3830.70.30:
    name: Учения и тренировки по восстановлению
    description: |
      Учения диспетчеров и межсистемные тренировки по восстановлению
      с разбором результатов.

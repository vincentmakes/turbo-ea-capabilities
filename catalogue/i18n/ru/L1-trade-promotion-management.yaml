# Управление торговыми акциями (ru) — translations for L1-trade-promotion-management.yaml
locale: ru
source: L1-trade-promotion-management.yaml
entries:
  BC-2360:
    name: Управление торговыми акциями
    description: |
      Дисциплина потребительских товаров по торговым инвестициям с розничными клиентами —
      совместные бизнес-планы, бюджетирование торговых расходов, проведение промо-мероприятий
      в магазинах, управление вычетами и измерение прироста продаж после акции.
  BC-2360.10:
    name: Стратегия и планирование торговых акций
    description: |
      Годовая стратегия торговых акций, планирование инвестиций по клиентам
      и совместные бизнес-планы, согласованные с розничными клиентами.
    in_scope:
      - Годовой календарь торговых акций
      - Совместные бизнес-планы по клиентам
      - Стратегия по слотинговым и листинговым сборам
  BC-2360.10.10:
    name: Разработка годового торгового плана
    description: |
      Разработка годового плана торговых акций и календаря мероприятий.
  BC-2360.10.20:
    name: Совместное бизнес-планирование с клиентами
    description: |
      Совместное бизнес-планирование со стратегическими розничными клиентами.
  BC-2360.10.30:
    name: Стратегия слотинговых и листинговых сборов
    description: |
      Стратегия и переговоры по слотинговым и листинговым сборам для новых позиций.
  BC-2360.20:
    name: Управление бюджетом торговых расходов
    description: |
      Бюджетирование торговых расходов, начисления, распределение по клиентам
      и финансовый контроль торговых инвестиций.
  BC-2360.20.10:
    name: Бюджетирование торговых расходов
    description: |
      Бюджетирование торговых расходов по клиентам, брендам и мероприятиям.
  BC-2360.20.20:
    name: Управление начислениями торговых расходов
    description: |
      Начисление обязательств по торговым расходам по клиентам и мероприятиям.
  BC-2360.20.30:
    name: Распределение торговых расходов
    description: |
      Распределение бюджетов торговых расходов по клиентам, регионам и мероприятиям.
  BC-2360.20.40:
    name: Финансовый контроль торговых расходов
    description: |
      Финансовый контроль торговых расходов, включая лимиты согласования.
  BC-2360.30:
    name: Управление проведением промо-мероприятий
    description: |
      Проведение промо-мероприятий в магазинах и онлайн, включая аудиты
      «идеального магазина» и активацию полевых команд.
  BC-2360.30.10:
    name: Организация мероприятия с клиентом
    description: |
      Организация промо-мероприятий с розничным клиентом, включая согласование макетов и прогнозов.
  BC-2360.30.20:
    name: Активация в торговом зале и оформление дисплеев
    description: |
      Активация промо-дисплеев, торцов полок и дополнительных мест продаж в магазине.
  BC-2360.30.30:
    name: Проведение аудита идеального магазина
    description: |
      Полевое проведение аудитов «идеального магазина» и проверок с помощью распознавания изображений.
  BC-2360.30.40:
    name: Активация полевых торговых команд
    description: |
      Активация полевых торговых команд для обеспечения проведения мероприятий.
  BC-2360.40:
    name: Управление вычетами и претензиями
    description: |
      Валидация, оспаривание и урегулирование клиентских вычетов и промо-претензий
      по счетам-фактурам.
    in_scope:
      - Приём вычетов и сопоставление с мероприятиями
      - Валидация согласованных условий
      - Урегулирование споров и взыскание
    out_of_scope:
      - Общее взыскание дебиторской задолженности (BC-200)
  BC-2360.40.10:
    name: Приём и сопоставление вычетов
    description: |
      Приём клиентских вычетов и их сопоставление с промо-мероприятиями.
  BC-2360.40.20:
    name: Валидация вычетов
    description: |
      Валидация вычетов относительно согласованных условий, объёмов и цен.
  BC-2360.40.30:
    name: Урегулирование споров и взыскание
    description: |
      Урегулирование споров с клиентами и взыскание необоснованных вычетов.
  BC-2360.50:
    name: Измерение эффективности торговых акций
    description: |
      Измерение промо-прироста, анализ базовых и инкрементальных продаж
      и ROI по мероприятиям, клиентам и брендам.
  BC-2360.50.10:
    name: Измерение базовых продаж и прироста
    description: |
      Измерение базовых продаж и инкрементального прироста от промо-мероприятий.
  BC-2360.50.20:
    name: Анализ ROI торговых акций
    description: |
      Анализ рентабельности торговых акций по мероприятиям, клиентам и брендам.
  BC-2360.50.30:
    name: Анализ каннибализации и перетягивания спроса
    description: |
      Анализ эффектов каннибализации и перетягивания спроса от промо-акций.

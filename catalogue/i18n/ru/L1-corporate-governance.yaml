# Корпоративное управление (ru) — translations for L1-corporate-governance.yaml
locale: ru
source: L1-corporate-governance.yaml
entries:
  BC-110:
    name: Корпоративное управление
    description: |
      Процессы управления советом директоров, комитетами и акционерами.
  BC-110.10:
    name: Управление советом директоров и комитетами
    description: |
      Состав совета директоров, заседания, комитеты, материалы.
  BC-110.10.10:
    name: Управление составом совета директоров
    description: |
      Назначение, преемственность, независимость директоров и матрица компетенций.
  BC-110.10.20:
    name: Администрирование заседаний совета
    description: |
      Повестки дня, материалы, протоколы и резолюции заседаний совета директоров.
  BC-110.10.30:
    name: Деятельность комитетов
    description: |
      Работа комитетов по аудиту, рискам, вознаграждениям и назначениям.
  BC-110.10.40:
    name: Введение в должность и обучение директоров
    description: |
      Вводный инструктаж, непрерывное обучение и оценка эффективности совета директоров.
  BC-110.20:
    name: Управление акционерным капиталом и акционерами
    description: |
      Структура капитала, реестр акционеров, права акционеров.
  BC-110.20.10:
    name: Ведение реестра акционеров
    description: |
      Ведение реестра участников и записей о бенефициарном владении.
  BC-110.20.20:
    name: Управление собраниями акционеров
    description: |
      Созыв годовых и внеочередных общих собраний, уведомления, голосование и резолюции.
  BC-110.20.30:
    name: Администрирование дивидендов и распределений
    description: |
      Объявление дивидендов, выплаты и распределение капитала.
  BC-110.20.40:
    name: Управление структурой акционерного капитала
    description: |
      Классы акций, увеличение капитала, обратный выкуп акций и дробление акций.
  BC-110.30:
    name: Управление корпоративным секретариатом
    description: |
      Регуляторные подачи, корпоративные записи, формальности.
  BC-110.30.10:
    name: Администрирование регуляторных подач
    description: |
      Подача документов в реестры компаний и корпоративные органы.
  BC-110.30.20:
    name: Управление корпоративными записями
    description: |
      Ведение уставных книг, реестров и корпоративных архивов.
  BC-110.30.30:
    name: Администрирование корпоративных резолюций
    description: |
      Подготовка, исполнение и регистрация решений совета директоров и акционеров.
  BC-110.40:
    name: Управление дочерними обществами и юридическими лицами
    description: |
      Структура юридических лиц, управление в рамках группы.
  BC-110.40.10:
    name: Управление жизненным циклом юридических лиц
    description: |
      Учреждение, реструктуризация, перевод в состояние покоя и ликвидация юридических лиц.
  BC-110.40.20:
    name: Управление групповой структурой
    description: |
      Ведение и надзор за организационной схемой юридических лиц и цепочками владения.
  BC-110.40.30:
    name: Стандарты управления дочерними обществами
    description: |
      Единые стандарты корпоративного управления для дочерних обществ группы.
  BC-110.40.40:
    name: Соответствие требованиям иностранных юрисдикций
    description: |
      Соблюдение требований местного законодательства и корпоративного управления для иностранных дочерних обществ.
  BC-110.50:
    name: Управление делегированием полномочий
    description: |
      Матрицы полномочий, делегирование, права подписи.
  BC-110.50.10:
    name: Структура делегирования полномочий
    description: |
      Уровни полномочий, пороги одобрения и иерархии делегирования.
  BC-110.50.20:
    name: Администрирование права подписи
    description: |
      Списки уполномоченных подписантов, доверенности и банковские мандаты.
  BC-110.50.30:
    name: Мониторинг соблюдения делегирования
    description: |
      Контроль соответствия принимаемых решений делегированным лимитам полномочий.

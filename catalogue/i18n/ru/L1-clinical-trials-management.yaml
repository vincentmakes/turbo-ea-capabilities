# Управление клиническими испытаниями (ru) — translations for L1-clinical-trials-management.yaml
locale: ru
source: L1-clinical-trials-management.yaml
entries:
  BC-1520:
    name: Управление клиническими испытаниями
    description: |
      Планирование, проведение и мониторинг клинических исследований.
  BC-1520.10:
    name: Управление дизайном клинических испытаний
    description: |
      Дизайн протокола, статистическая методология, конечные точки.
  BC-1520.10.10:
    name: Разработка клинического протокола
    description: |
      Разработка протоколов клинических исследований.
  BC-1520.10.20:
    name: Определение статистического плана анализа
    description: |
      Статистическая методология и разработка плана анализа.
  BC-1520.10.30:
    name: Определение конечных точек и исходов
    description: |
      Определение первичных, вторичных и исследовательских конечных точек.
  BC-1520.10.40:
    name: Управление адаптивным дизайном
    description: |
      Дизайн адаптивных и платформенных исследований.
  BC-1520.20:
    name: Управление центрами клинических испытаний
    description: |
      Выбор, активация и надзор за центрами.
  BC-1520.20.10:
    name: Выявление и оценка выполнимости центров
    description: |
      Выявление и оценка осуществимости исследовательских центров.
  BC-1520.20.20:
    name: Активация центра
    description: |
      Активация центра, включая этику, регуляторное одобрение и контрактацию.
  BC-1520.20.30:
    name: Обучение исследователей и персонала центра
    description: |
      Проведение обучения исследователей и персонала центра.
  BC-1520.20.40:
    name: Управление результативностью центра
    description: |
      Отслеживание результативности центра и принятие корректирующих мер.
  BC-1520.30:
    name: Управление субъектами клинических испытаний
    description: |
      Набор, скрининг, удержание субъектов, информированное согласие.
  BC-1520.30.10:
    name: Набор субъектов исследования
    description: |
      Набор субъектов, включая цифровые каналы рекрутинга.
  BC-1520.30.20:
    name: Управление информированным согласием
    description: |
      Получение информированного согласия и электронного согласия.
  BC-1520.30.30:
    name: Скрининг и включение субъектов
    description: |
      Скрининг и включение по критериям включения/исключения.
  BC-1520.30.40:
    name: Удержание субъектов исследования
    description: |
      Стратегии удержания и вовлечение пациентов.
  BC-1520.40:
    name: Управление клиническими данными
    description: |
      EDC, сбор данных, управление запросами, блокировка базы данных.
  BC-1520.40.10:
    name: Управление EDC и CRF
    description: |
      Система электронного сбора данных и разработка CRF.
  BC-1520.40.20:
    name: Управление запросами клинических данных
    description: |
      Формирование запросов, разрешение несоответствий и очистка данных.
  BC-1520.40.30:
    name: Стандартизация клинических данных
    description: |
      Стандартизация данных по CDISC SDTM/ADaM.
  BC-1520.40.40:
    name: Блокировка базы данных и архивирование
    description: |
      Блокировка базы данных, архивирование и подготовка пакета для подачи.
  BC-1520.50:
    name: Управление мониторингом клинических испытаний
    description: |
      Мониторинг центров, риск-ориентированный мониторинг, аудиты.
  BC-1520.50.10:
    name: Очный мониторинг
    description: |
      Очная проверка исходных данных и визиты мониторинга.
  BC-1520.50.20:
    name: Централизованный и риск-ориентированный мониторинг
    description: |
      Программы централизованного и риск-ориентированного мониторинга.
  BC-1520.50.30:
    name: Аудиты качества клинических испытаний
    description: |
      GCP-аудиты исследований, центров и поставщиков.
  BC-1520.60:
    name: Управление снабжением клинических испытаний
    description: |
      Поставка IMP, распределение, рандомизация, учёт препарата.
  BC-1520.60.10:
    name: Производство и упаковка IMP
    description: |
      Производство и упаковка исследуемых лекарственных препаратов.
  BC-1520.60.20:
    name: Дистрибуция IMP и операции депо
    description: |
      Операции депо и глобальная дистрибуция IMP.
  BC-1520.60.30:
    name: Рандомизация и операции IRT
    description: |
      Рандомизация через IRT/IWRS и управление снабжением исследования.
  BC-1520.60.40:
    name: Учёт и выверка IMP
    description: |
      Учёт IMP, возврат и уничтожение.
  BC-1520.70:
    name: Управление клиническим аутсорсингом и CRO
    description: |
      Выбор CRO, контрактация, надзор.
  BC-1520.70.10:
    name: Выбор и контрактация CRO
    description: |
      Выбор, определение объёма работ и контрактация CRO.
  BC-1520.70.20:
    name: Надзор за результативностью CRO
    description: |
      Надзор спонсора за результативностью и KPI CRO.
  BC-1520.70.30:
    name: Надзор за качеством поставщиков
    description: |
      Надзор за качеством клинических поставщиков и лабораторий.

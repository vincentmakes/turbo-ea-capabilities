# Переработка продуктов питания и напитков (ru) — translations for L1-food-beverage-processing-operations-management.yaml
locale: ru
source: L1-food-beverage-processing-operations-management.yaml
entries:
  BC-3580:
    name: Переработка продуктов питания и напитков
    description: |
      Промышленное производство продуктов питания и напитков — приёмка сырья,
      первичная и вторичная переработка, упаковка, холодовая цепь, санитария,
      производство кормов и рекуперация побочных продуктов в мясной, молочной,
      мукомольной, пивоваренной, хлебопекарной промышленности и свежей нарезке.
  BC-3580.10:
    name: Приёмка и контроль сырья
    description: |
      Приёмка, органолептические и лабораторные испытания и
      принятие решений о принятии партий сельскохозяйственного сырья.
  BC-3580.10.10:
    name: Приёмка сырья
    description: |
      Приёмка скота, молока, зерна, фруктов и овощного сырья.
  BC-3580.10.20:
    name: Органолептические и качественные испытания сырья
    description: |
      Органолептические и лабораторные испытания
      входящего сырья.
  BC-3580.10.30:
    name: Принятие решений о приёмке партий
    description: |
      Решения о принятии, отклонении
      и реклассификации партий.
  BC-3580.20:
    name: Операции первичной переработки
    description: |
      Первый этап преобразования сельскохозяйственного сырья — убой и
      разделка, сепарация молока, помол и подготовка продукции.
    in_scope:
      - Убой и разделка туш
      - Приёмка и сепарация молока
      - Помол зерна и переработка масличных
      - Подготовка фруктов и овощей
    out_of_scope:
      - Общие производственные операции (BC-1010)
  BC-3580.20.10:
    name: Убой и разделка туш
    description: |
      Убой, разделка и охлаждение туш скота и птицы.
  BC-3580.20.20:
    name: Приёмка и сепарация молока
    description: |
      Приёмка, нормализация и операции сепарации молока.
  BC-3580.20.30:
    name: Помол зерна и переработка масличных
    description: |
      Помол зерна и переработка масличных, включая отжим
      и экстракцию растворителем.
  BC-3580.20.40:
    name: Подготовка фруктов и овощей
    description: |
      Мойка, чистка, нарезка и бланширование
      фруктов и овощей.
  BC-3580.30:
    name: Операции вторичной переработки
    description: |
      Смешивание, термическая обработка, ферментация и концентрирование
      для производства готовых продуктов питания и напитков.
  BC-3580.30.10:
    name: Операции смешивания и купажирования
    description: |
      Смешивание и купажирование рецептур продуктов
      питания и напитков.
  BC-3580.30.20:
    name: Варка и термическая обработка
    description: |
      Варка, пастеризация и стерилизация.
  BC-3580.30.30:
    name: Операции ферментации и пивоварения
    description: |
      Ферментация, пивоварение и выдержка напитков
      и кисломолочных продуктов.
  BC-3580.30.40:
    name: Операции сушки и концентрирования
    description: |
      Распылительная сушка, выпаривание и концентрирование
      жидких продуктов.
  BC-3580.40:
    name: Операции упаковки и фасовки
    description: |
      Фасовка, герметизация, маркировка и палетирование
      готовой продукции.
  BC-3580.40.10:
    name: Операции фасовки и герметизации
    description: |
      Фасовка и герметизация бутылок, банок, пакетов
      и жёстких контейнеров.
  BC-3580.40.20:
    name: Операции маркировки
    description: |
      Нанесение этикеток, маркировка датой и нанесение
      защиты от вскрытия.
  BC-3580.40.30:
    name: Формирование коробов и палетирование
    description: |
      Формирование коробов, термоусадочная упаковка
      и палетирование готовой продукции.
  BC-3580.50:
    name: Операции холодовой цепи производства
    description: |
      Внутризаводская холодильная цепь, замораживание и мониторинг
      холодовой цепи на производственных и упаковочных линиях.
  BC-3580.50.10:
    name: Операции охлаждения и замораживания
    description: |
      Функционирование внутризаводских холодильников, шоковых
      и туннельных морозильников.
  BC-3580.50.20:
    name: Мониторинг холодовой цепи внутри завода
    description: |
      Мониторинг холодовой цепи по внутризаводским зонам
      и холодильным камерам.
  BC-3580.60:
    name: Санитарные операции и контроль аллергенов
    description: |
      Безразборная мойка, контроль замены аллергенов и программы
      экологического мониторинга для безопасности продукции.
    in_scope:
      - Программы безразборной мойки
      - Валидация замены аллергенов
      - Экологический мониторинг патогенов
    out_of_scope:
      - Программы безопасности пищевых продуктов на стороне розницы (BC-2380.10)
  BC-3580.60.10:
    name: Операции безразборной мойки
    description: |
      Выполнение и валидация безразборной мойки при смене продукта.
  BC-3580.60.20:
    name: Контроль замены аллергенов
    description: |
      Контроль замены аллергенов и верификационный смыв.
  BC-3580.60.30:
    name: Программы экологического мониторинга
    description: |
      Экологический мониторинг патогенов по заводским зонам.
  BC-3580.70:
    name: Производство кормов для животных
    description: |
      Производство смешанных кормов, включая приёмку ингредиентов,
      смешивание, гранулирование и производство медикаментозных кормов.
  BC-3580.70.10:
    name: Приёмка кормовых ингредиентов
    description: |
      Приёмка зерна, белковых шротов и добавок
      на кормовых заводах.
  BC-3580.70.20:
    name: Смешивание и гранулирование корма
    description: |
      Смешивание и гранулирование смешанных кормов
      по рецептурам рациона.
  BC-3580.70.30:
    name: Производство медикаментозных кормов
    description: |
      Производство медикаментозных кормов по рецепту
      с контролем переноса остатков.
  BC-3580.80:
    name: Управление побочными и совместными продуктами
    description: |
      Рекуперация и направление технологических побочных и совместных
      продуктов, таких как рендеринг, сыворотка и дробина.
  BC-3580.80.10:
    name: Операции рендеринга
    description: |
      Рендеринг побочных продуктов мясопереработки
      в жир и муку.
  BC-3580.80.20:
    name: Рекуперация сыворотки и пермеата
    description: |
      Рекуперация потоков сыворотки и пермеата
      при переработке молока.
  BC-3580.80.30:
    name: Рекуперация дробины
    description: |
      Рекуперация и направление пивоваренной и дистилляционной
      дробины.

# Государственные закупки и контрактование (ru) — translations for L1-public-procurement-contracting-management.yaml
locale: ru
source: L1-public-procurement-contracting-management.yaml
entries:
  BC-3270:
    name: Государственные закупки и контрактование
    description: |
      Государственные закупки и контрактование по режимам FAR/DFARS и директив ЕС о закупках, включая планирование закупок, размещение заказов, выбор поставщиков, заключение и администрирование контрактов, управление показателями поставщиков, обжалование и социально-экономические программы.
  BC-3270.10:
    name: Планирование закупок
    description: |
      Формирование стратегии закупок, маркетинговые исследования и планирование государственных закупок.
    in_scope:
      - Маркетинговые исследования и консолидация потребностей
      - Выбор стратегии и метода закупки
      - Подготовка независимых правительственных оценок стоимости
    out_of_scope:
      - Межотраслевые стратегии закупок для негосударственных организаций (относится к управлению закупками)
  BC-3270.10.10:
    name: Маркетинговые исследования
    description: |
      Исследование рынка поставщиков, возможностей и ценообразования для формирования требований.
  BC-3270.10.20:
    name: Стратегия закупки
    description: |
      Выбор метода контрактования, инструмента и подхода к конкуренции.
  BC-3270.10.30:
    name: Независимая оценка стоимости
    description: |
      Подготовка независимых правительственных оценок стоимости и резервирования бюджета.
  BC-3270.10.40:
    name: Разработка спецификаций и технических заданий
    description: |
      Разработка спецификаций, технических заданий и требований к показателям работ.
  BC-3270.20:
    name: Управление тендерной документацией
    description: |
      Выпуск тендерной документации, включая запросы о предложениях, приглашения на торги и запросы о котировках, поправки и вопросы участников.
  BC-3270.20.10:
    name: Подготовка тендерной документации
    description: |
      Подготовка запросов о предложениях, приглашений на торги, запросов о котировках и тендерной документации.
  BC-3270.20.20:
    name: Публикация тендерной документации
    description: |
      Публикация тендерной документации на официальных информационных системах и порталах типа OJEU/SAM.gov.
  BC-3270.20.30:
    name: Обработка вопросов участников
    description: |
      Обработка вопросов участников, поправок и разъяснений в период проведения тендера.
  BC-3270.20.40:
    name: Предторговая конференция
    description: |
      Проведение предторговых конференций и выездных осмотров.
  BC-3270.30:
    name: Выбор поставщиков и оценка предложений
    description: |
      Приём, оценка и отбор заявок и предложений по опубликованным критериям.
  BC-3270.30.10:
    name: Приём заявок и предложений
    description: |
      Приём, регистрация и обеспечение сохранности заявок и предложений.
  BC-3270.30.20:
    name: Техническая оценка
    description: |
      Техническая оценка предложений по заявленным критериям.
  BC-3270.30.30:
    name: Анализ цен и затрат
    description: |
      Анализ обоснованности цен и реалистичности затрат по предложениям.
  BC-3270.30.40:
    name: Определение добросовестности
    description: |
      Определение добросовестности подрядчика, финансовых возможностей и деловой репутации.
  BC-3270.40:
    name: Заключение и оформление контракта
    description: |
      Решение об отборе победителя, уведомление об итогах, брифинг и оформление контракта, включая подписание.
  BC-3270.40.10:
    name: Решение об отборе
    description: |
      Решение о присуждении контракта и документирование выбора поставщика.
  BC-3270.40.20:
    name: Уведомление о присуждении и брифинг
    description: |
      Уведомление о присуждении, уведомление неудачных участников и проведение брифинга.
  BC-3270.40.30:
    name: Подписание контракта и принятие обязательств
    description: |
      Подписание контрактных документов и принятие финансовых обязательств.
  BC-3270.50:
    name: Администрирование и изменение контракта
    description: |
      Повседневное администрирование контракта, включая изменения, претензии и надзор контрактного офицера.
  BC-3270.50.10:
    name: Приём результатов работ
    description: |
      Инспекция и приём результатов работ в соответствии с требованиями контракта.
  BC-3270.50.20:
    name: Изменение контракта
    description: |
      Выпуск изменений контракта, дополнительных соглашений и опционов.
  BC-3270.50.30:
    name: Рассмотрение претензий по контракту
    description: |
      Приём и рассмотрение претензий подрядчика и справедливых корректировок.
  BC-3270.50.40:
    name: Закрытие контракта
    description: |
      Окончательное принятие, снятие обязательств и физическое и административное закрытие контракта.
  BC-3270.60:
    name: Управление показателями поставщиков
    description: |
      Фиксация прошлых показателей, отстранение и приостановление, отслеживание добросовестности подрядчиков.
  BC-3270.60.10:
    name: Фиксация прошлых показателей
    description: |
      Фиксация оценок прошлых показателей подрядчиков в государственных базах данных.
  BC-3270.60.20:
    name: Администрирование приостановления и отстранения
    description: |
      Администрирование процедур приостановления и отстранения подрядчиков.
  BC-3270.60.30:
    name: Мониторинг добросовестности подрядчика
    description: |
      Текущий мониторинг добросовестности подрядчика и финансовых возможностей.
  BC-3270.70:
    name: Обжалование и урегулирование споров
    description: |
      Приём и рассмотрение протестов на торги и контрактных споров через административные и судебные каналы.
  BC-3270.70.10:
    name: Рассмотрение протестов на торги
    description: |
      Рассмотрение протестов на торги до и после присуждения контракта.
  BC-3270.70.20:
    name: Урегулирование контрактных споров
    description: |
      Административное и судебное урегулирование контрактных споров.
  BC-3270.70.30:
    name: Альтернативное разрешение споров
    description: |
      Медиация, арбитраж и альтернативное разрешение контрактных споров.
  BC-3270.80:
    name: Администрирование резервирования и социально-экономических программ
    description: |
      Администрирование преференций и квот в закупках для малого бизнеса, предприятий меньшинств, предприятий, принадлежащих женщинам, и других социально-экономических программ.
  BC-3270.80.10:
    name: Определение применимости резервирования
    description: |
      Определение применимости резервирования для малого бизнеса и социально-экономических программ.
  BC-3270.80.20:
    name: Надзор за планами субподрядов
    description: |
      Надзор за планами и отчётами о субподрядах с малым бизнесом.
  BC-3270.80.30:
    name: Отчётность по социально-экономическим показателям
    description: |
      Отслеживание и отчётность по целевым показателям и достижениям социально-экономических закупок.

# Промышленная безопасность нефтегазовых объектов (ru) — translations for L1-petroleum-process-safety-management.yaml
locale: ru
source: L1-petroleum-process-safety-management.yaml
entries:
  BC-3050:
    name: Промышленная безопасность нефтегазовых объектов
    description: |
      Предотвращение крупных аварий на объектах обращения с углеводородами: анализ опасностей, механическая целостность оборудования под давлением, обеспечение безопасности критических элементов, операционные процедуры, отчётность о показателях и аварийное реагирование.
  BC-3050.10:
    name: Анализ опасностей технологических процессов
    description: |
      Структурированное выявление и анализ крупных производственных опасностей на протяжении жизненного цикла актива.
    in_scope:
      - HAZID, HAZOP, LOPA и анализ галстука-бабочки
      - Количественная оценка риска
    out_of_scope:
      - Оценка рисков личной безопасности (BC-730)
  BC-3050.10.10:
    name: HAZOP-исследования
    description: |
      Исследования опасностей и работоспособности на новых и модифицированных объектах.
  BC-3050.10.20:
    name: HAZID-исследования
    description: |
      Исследования по выявлению опасностей на ранних стадиях концепции и проектирования.
  BC-3050.10.30:
    name: LOPA-исследования
    description: |
      Анализ уровней защиты для определения уровней полноты безопасности.
  BC-3050.10.40:
    name: Анализ «галстук-бабочка»
    description: |
      Анализ «галстук-бабочка» для картирования барьеров против сценариев крупных аварий.
  BC-3050.20:
    name: Управление механической целостностью
    description: |
      Инспекция и обеспечение целостности оборудования под давлением и предохранительных устройств.
  BC-3050.20.10:
    name: Инспекция сосудов под давлением
    description: |
      Риск-ориентированная инспекция сосудов под давлением по API 510.
  BC-3050.20.20:
    name: Инспекция целостности трубопроводов
    description: |
      Инспекция технологических трубопроводов и трубопроводов по API 570 и ASME B31G.
  BC-3050.20.30:
    name: Инспекция резервуаров
    description: |
      Инспекция атмосферных и напорных резервуаров по API 653.
  BC-3050.20.40:
    name: Управление устройствами защиты от давления
    description: |
      Расчёт, испытание и управление жизненным циклом предохранительных клапанов и разрывных мембран.
  BC-3050.30:
    name: Управление критически важными элементами безопасности
    description: |
      Выявление критически важных элементов безопасности и обеспечение их производительности, а также ведение паспорта безопасности.
  BC-3050.30.10:
    name: Выявление критически важных элементов безопасности
    description: |
      Выявление КВЭ по анализу крупных производственных опасностей.
  BC-3050.30.20:
    name: Определение стандартов производительности
    description: |
      Определение стандартов производительности для каждого КВЭ.
  BC-3050.30.30:
    name: Верификация производительности критически важных элементов
    description: |
      Верификация производительности КВЭ по установленным стандартам.
  BC-3050.30.40:
    name: Ведение паспорта безопасности
    description: |
      Ведение паспортов безопасности установок и их представление регуляторам.
  BC-3050.40:
    name: Операционные процедуры промышленной безопасности
    description: |
      Разработка, проверка и определение рабочих диапазонов для критических процедур промышленной безопасности.
  BC-3050.40.10:
    name: Разработка операционных процедур
    description: |
      Разработка операционных процедур, критических для промышленной безопасности.
  BC-3050.40.20:
    name: Проверка и обновление процедур
    description: |
      Периодическая проверка и обновление процедур промышленной безопасности.
  BC-3050.40.30:
    name: Определение рабочего диапазона
    description: |
      Определение безопасных рабочих диапазонов для технологических установок.
  BC-3050.50:
    name: Управление изменениями в системе промышленной безопасности
    description: |
      Надзор за изменениями установок, процедур и персонала, включая проверку безопасности перед пуском.
  BC-3050.50.10:
    name: Рассмотрение запросов на изменения PSM
    description: |
      Рассмотрение запросов на изменения, влияющих на PSM, по стандартам безопасности.
  BC-3050.50.20:
    name: Проверка безопасности перед пуском
    description: |
      Проверки безопасности перед пуском новых и модифицированных объектов.
  BC-3050.50.30:
    name: Управление временными изменениями
    description: |
      Управление временными технологическими изменениями в течение санкционированного периода.
  BC-3050.60:
    name: Управление показателями промышленной безопасности
    description: |
      Отслеживание и отчётность по опережающим и запаздывающим показателям промышленной безопасности согласно API RP 754.
  BC-3050.60.10:
    name: Отчётность по событиям промышленной безопасности 1 и 2 уровня
    description: |
      Фиксация и отчётность событий промышленной безопасности 1 и 2 уровня.
  BC-3050.60.20:
    name: Мониторинг опережающих индикаторов
    description: |
      Мониторинг опережающих индикаторов промышленной безопасности 3 и 4 уровня.
  BC-3050.60.30:
    name: Отчётность по КПЭ промышленной безопасности
    description: |
      Внешняя и внутренняя отчётность по КПЭ промышленной безопасности.
  BC-3050.70:
    name: Готовность к аварийным ситуациям и реагирование
    description: |
      Планирование аварийного реагирования, проведение учений и координация ликвидации разливов при крупных авариях.
  BC-3050.70.10:
    name: Планирование аварийного реагирования
    description: |
      Разработка и актуализация планов аварийного реагирования объекта и корпоративного уровня.
  BC-3050.70.20:
    name: Координация учений и тренировок
    description: |
      Координация учений по аварийному реагированию и тренировок по крупным инцидентам.
  BC-3050.70.30:
    name: Координация ликвидации разливов
    description: |
      Координация операций по ликвидации разливов нефти и химических веществ.
  BC-3050.70.40:
    name: Координация взаимопомощи
    description: |
      Координация взаимопомощи с отраслевыми кооперативами аварийного реагирования.

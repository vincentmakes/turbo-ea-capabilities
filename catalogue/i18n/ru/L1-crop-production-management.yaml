# Растениеводство (ru) — translations for L1-crop-production-management.yaml
locale: ru
source: L1-crop-production-management.yaml
entries:
  BC-3500:
    name: Растениеводство
    description: |
      Полевые операции растениеводства — планирование систем возделывания,
      подготовка почвы, посев, питание, защита растений, орошение, мониторинг
      и прогнозирование урожайности для зерновых, садовых и специальных культур.
  BC-3500.10:
    name: Планирование системы земледелия
    description: |
      Многосезонное планирование севооборотов, распределения полей, сроков
      сева и выбора сортов по портфелю хозяйства.
    in_scope:
      - Разработка севооборота
      - Распределение культур по полям
      - Планирование сроков сева
      - Выбор сортов и гибридов
    out_of_scope:
      - Проведение сортовых испытаний (BC-3530.60)
      - Агрономические предписания (BC-3530.20)
  BC-3500.10.10:
    name: Планирование севооборота
    description: |
      Многолетнее планирование севооборота с учётом здоровья почвы,
      рыночного спроса и циклов вредителей.
  BC-3500.10.20:
    name: Планирование распределения полей
    description: |
      Распределение культур по конкретным полям и участкам
      на посевной сезон.
  BC-3500.10.30:
    name: Планирование сроков сева
    description: |
      Планирование оптимальных сроков сева по культуре, сорту
      и агроклиматической зоне.
  BC-3500.10.40:
    name: Выбор сортов и гибридов
    description: |
      Выбор сортов и гибридов на посевной сезон по агрономическим
      и рыночным критериям.
  BC-3500.20:
    name: Операции подготовки почвы
    description: |
      Обработка почвы, формирование гряд и предпосевное внесение поправок
      для создания пригодного семенного ложа.
  BC-3500.20.10:
    name: Операции обработки почвы
    description: |
      Классическая, минимальная и нулевая обработка поля.
  BC-3500.20.20:
    name: Операции формирования гряд
    description: |
      Нарезка гряд, гребней и мульчирование для садовых
      и пропашных культур.
  BC-3500.20.30:
    name: Предпосевное внесение почвенных поправок
    description: |
      Внесение предпосевных поправок, таких как известь, гипс
      и органическое вещество.
  BC-3500.30:
    name: Операции посева и посадки
    description: |
      Размещение семян и рассады, включая решения о пересеве
      и формирование густоты стояния растений.
  BC-3500.30.10:
    name: Окончательная подготовка семенного ложа
    description: |
      Финальная подготовка семенного ложа непосредственно перед посевом.
  BC-3500.30.20:
    name: Посев и посадка рассады
    description: |
      Механическое и ручное размещение семян и рассады в поле.
  BC-3500.30.30:
    name: Операции пересева и заполнения пробелов
    description: |
      Пересев и заполнение пробелов при неудавшемся первоначальном
      формировании густоты стояния.
  BC-3500.40:
    name: Операции питания культур
    description: |
      Внутрисезонная подача питательных веществ твёрдыми, жидкими,
      листовыми и фертигационными методами.
  BC-3500.40.10:
    name: Внесение твёрдых удобрений
    description: |
      Разбросное, лентовое и дифференцированное внесение твёрдых удобрений.
  BC-3500.40.20:
    name: Листовое питание
    description: |
      Листовое внесение макро- и микроэлементов в период вегетации.
  BC-3500.40.30:
    name: Операции фертигации
    description: |
      Подача питательных веществ через ирригационные системы,
      включая инжекцию и контроль дозирования.
  BC-3500.50:
    name: Операции защиты культур
    description: |
      Применение химических, биологических и механических мер
      защиты растений и ведение сопутствующих записей.
    in_scope:
      - Применение пестицидов и гербицидов
      - Применение препаратов биологического контроля
      - Механическая и термическая борьба с сорняками
      - Записи о применении опрыскивателей
    out_of_scope:
      - Планирование ИПМ (BC-3530.30)
      - Мониторинг соответствия МДУ (BC-3590.50)
  BC-3500.50.10:
    name: Операции применения пестицидов
    description: |
      Наземное и воздушное применение пестицидов,
      включая управление дрейфом опрыскивателя.
  BC-3500.50.20:
    name: Применение средств биологического контроля
    description: |
      Выпуск агентов биологического контроля и биопестицидных препаратов.
  BC-3500.50.30:
    name: Механическая и термическая борьба с сорняками
    description: |
      Механическая и термическая борьба с сорняками, включая
      культивирование и огневую прополку.
  BC-3500.50.40:
    name: Регистрация применения опрыскивателей
    description: |
      Полевые записи об опрыскивании: препарат, норма, погода и оператор.
  BC-3500.60:
    name: Операции орошения
    description: |
      Повседневное планирование, применение и дренажные решения,
      управляющие водным режимом культур.
  BC-3500.60.10:
    name: Планирование орошения
    description: |
      Планирование орошения на основе влажности почвы и потребности культур.
  BC-3500.60.20:
    name: Операции подачи воды для орошения
    description: |
      Подача воды для орошения дождевальными, капельными
      и поверхностными системами.
  BC-3500.60.30:
    name: Операции полевого дренажа
    description: |
      Поверхностные и подземные дренажные операции и регулирование уровня грунтовых вод.
  BC-3500.70:
    name: Мониторинг и разведка посевов
    description: |
      Полевой мониторинг состояния культур, давления вредителей и фенологии
      методами разведки, датчиков и дистанционного зондирования.
  BC-3500.70.10:
    name: Операции полевой разведки
    description: |
      Ручные обходы разведки для оценки вредителей, болезней
      и состояния посевов.
  BC-3500.70.20:
    name: Надзор за вредителями и болезнями
    description: |
      Ловушечный и сенсорный мониторинг давления вредителей и болезней.
  BC-3500.70.30:
    name: Отслеживание фенологии культур
    description: |
      Отслеживание фаз роста, суммы активных температур
      и фенологических вех.
  BC-3500.70.40:
    name: Дистанционный мониторинг посевов
    description: |
      Мониторинг состояния посевов спутниковыми, дроновыми
      и проксимальными датчиками.
  BC-3500.80:
    name: Прогнозирование урожайности культур
    description: |
      Внутрисезонная и предуборочная оценка урожайности для
      коммерческого планирования, логистики и снабжения.
  BC-3500.80.10:
    name: Внутрисезонная оценка урожайности
    description: |
      Среднесезонные прогнозы урожайности по индексам культур
      и полевым измерениям.
  BC-3500.80.20:
    name: Предуборочное прогнозирование урожайности
    description: |
      Предуборочные прогнозы урожайности для планирования
      уборки, хранения и коммерческих закупок.

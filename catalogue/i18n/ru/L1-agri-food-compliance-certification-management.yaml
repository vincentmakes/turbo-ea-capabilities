# Агропродовольственное соответствие и сертификация (ru) — translations for L1-agri-food-compliance-certification-management.yaml
locale: ru
source: L1-agri-food-compliance-certification-management.yaml
entries:
  BC-3590:
    name: Агропродовольственное соответствие и сертификация
    description: |
      Отраслевые программы соответствия и сертификации — сертификация хозяйств,
      органическая, благополучие животных, географические указания, соответствие
      МДУ, идентификация скота и записи прослеживаемости до ворот хозяйства,
      отдельные от общего управления соответствием и качеством.
  BC-3590.10:
    name: Управление фермерской сертификацией
    description: |
      Управление программами сертификации хозяйств, включая
      GlobalG.A.P., LEAF Marque и эквивалентные национальные схемы.
    in_scope:
      - GlobalG.A.P. и эквивалентное подтверждение фермы
      - Участие в LEAF Marque
      - Координация аудитов и корректирующих действий
    out_of_scope:
      - Общее управление качеством (BC-720)
      - Программы безопасности пищевых продуктов на стороне розницы (BC-2380.10)
  BC-3590.10.10:
    name: Программы сертификации GlobalG.A.P.
    description: |
      Управление сертификацией GlobalG.A.P. IFA, аквакультуры
      и животноводства.
  BC-3590.10.20:
    name: LEAF Marque и эквивалентные программы
    description: |
      Участие в LEAF Marque и эквивалентных национальных
      схемах подтверждения.
  BC-3590.10.30:
    name: Координация аудитов хозяйства
    description: |
      Координация аудитов сертификации хозяйств
      и отслеживание корректирующих действий.
  BC-3590.20:
    name: Управление органической сертификацией
    description: |
      Управление органической сертификацией по USDA NOP, Регламенту ЕС
      об органическом земледелии, JAS Organic и эквивалентным режимам.
  BC-3590.20.10:
    name: Записи соответствия органическому стандарту
    description: |
      Записи соответствия применимому органическому стандарту.
  BC-3590.20.20:
    name: Координация органических инспекций
    description: |
      Координация инспекций и аудитов органической сертификации.
  BC-3590.20.30:
    name: Авторизация органических ресурсов
    description: |
      Верификация того, что ресурсы авторизованы
      в соответствии с применимым органическим стандартом.
  BC-3590.30:
    name: Сертификация благополучия животных
    description: |
      Аудиторские программы по благополучию животных, запись результатов
      благополучия и соответствие отраслевым и ассурансовым стандартам благополучия.
  BC-3590.30.10:
    name: Аудиторские программы благополучия животных
    description: |
      Внутренние и сторонние аудиторские программы
      по благополучию животных.
  BC-3590.30.20:
    name: Запись показателей благополучия
    description: |
      Запись показателей результатов благополучия
      по животноводческим объектам.
  BC-3590.30.30:
    name: Соответствие стандартам благополучия
    description: |
      Свидетельства соответствия отраслевым и ассурансовым
      стандартам благополучия.
  BC-3590.40:
    name: Географические указания и происхождение
    description: |
      Записи и верификация, подтверждающие защищённое наименование места
      происхождения, географические указания и заявления о происхождении.
  BC-3590.40.10:
    name: Записи о заявлениях происхождения
    description: |
      Записи, обосновывающие заявления о происхождении, породе
      и провенансе.
  BC-3590.40.20:
    name: Соответствие географическим указаниям
    description: |
      Соответствие ЗНП, ЗГУ и эквивалентным
      географическим указаниям.
  BC-3590.40.30:
    name: Верификация происхождения
    description: |
      Верификация происхождения с использованием документальных,
      изотопных и ДНК-методов.
  BC-3590.50:
    name: Управление остатками пестицидов и МДУ
    description: |
      Отбор образцов на остатки, соответствие МДУ и соблюдение
      сроков ожидания на целевых рынках.
  BC-3590.50.10:
    name: Программы отбора образцов на остатки
    description: |
      Программы отбора образцов на остатки пестицидов
      по культурам и партиям.
  BC-3590.50.20:
    name: Мониторинг соответствия МДУ
    description: |
      Мониторинг соответствия расписаниям МДУ
      на целевых рынках.
  BC-3590.50.30:
    name: Соблюдение сроков ожидания
    description: |
      Соблюдение предуборочных и молочных
      сроков ожидания.
  BC-3590.60:
    name: Идентификация и передвижение скота
    description: |
      Маркировка идентификации животных, разрешения на перемещение
      и трансграничная санитарная сертификация скота и аквакультуры.
    in_scope:
      - Установленная идентификация животных
      - Запись разрешений на перемещение
      - Трансграничная санитарная сертификация
    out_of_scope:
      - Общее управление соответствием (BC-130)
  BC-3590.60.10:
    name: Маркировка идентификации животных
    description: |
      Установленная маркировка идентификации животных,
      включая ЭИД и ушные бирки.
  BC-3590.60.20:
    name: Запись разрешений на перемещение
    description: |
      Запись установленных разрешений на перемещение
      и внутрихозяйственных журналов перемещений.
  BC-3590.60.30:
    name: Трансграничная санитарная сертификация
    description: |
      Трансграничная санитарная сертификация,
      включая регистрацию в TRACES NT.
  BC-3590.70:
    name: Записи прослеживаемости до ворот хозяйства
    description: |
      Записи прослеживаемости поле–партия, животное–туша и вход–выход,
      закрепляющие последующие следы EPCIS и хранения цепочки.
  BC-3590.70.10:
    name: Прослеживаемость поля до партии
    description: |
      Прослеживаемость, связывающая полевые операции
      с убранными партиями.
  BC-3590.70.20:
    name: Прослеживаемость животного до туши
    description: |
      Прослеживаемость, связывающая отдельных животных
      с тушами и отрубами.
  BC-3590.70.30:
    name: Запись прослеживаемости ресурс–продукт
    description: |
      Записи, связывающие применённые ресурсы
      с полученными партиями продукции.

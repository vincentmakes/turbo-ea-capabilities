# Агроэкологическое природопользование (ru) — translations for L1-agri-environmental-stewardship-management.yaml
locale: ru
source: L1-agri-environmental-stewardship-management.yaml
entries:
  BC-3600:
    name: Агроэкологическое природопользование
    description: |
      Природопользование на ферме — здоровье почвы, водопользование,
      биоразнообразие, управление сельскохозяйственными парниковыми газами,
      программы почвенного углерода, регенеративные практики и участие
      в агроэкологических схемах в дополнение к корпоративной устойчивости.
  BC-3600.10:
    name: Управление здоровьем почвы
    description: |
      Управление органическим веществом почвы, сидеральными культурами
      и борьбой с эрозией на пахотных землях.
  BC-3600.10.10:
    name: Мониторинг органического углерода почвы
    description: |
      Периодический мониторинг органического углерода
      почвы по полям.
  BC-3600.10.20:
    name: Программы сидеральных культур
    description: |
      Программы сидеральных культур для поддержания
      почвенного покрова и биоты.
  BC-3600.10.30:
    name: Программы борьбы с эрозией
    description: |
      Программы борьбы с эрозией, включая контурную обработку,
      террасирование и буферные полосы.
  BC-3600.20:
    name: Водопользование в хозяйстве
    description: |
      Эффективность водопользования, защита прибрежных зон
      и управление качеством дренажных вод на уровне хозяйства.
    in_scope:
      - Мониторинг эффективности водопользования
      - Защита прибрежных зон и водотоков
      - Управление качеством дренажа
    out_of_scope:
      - Корпоративное раскрытие данных о воде (BC-740)
      - Планирование орошения (BC-3500.60.10)
  BC-3600.20.10:
    name: Мониторинг эффективности водопользования
    description: |
      Мониторинг эффективности водопользования
      по культуре и полю.
  BC-3600.20.20:
    name: Защита прибрежных зон и водотоков
    description: |
      Защита прибрежных зон и внутрихозяйственных водотоков.
  BC-3600.20.30:
    name: Управление качеством дренажа
    description: |
      Управление качеством дренажных вод
      и потерями питательных веществ.
  BC-3600.30:
    name: Биоразнообразие и среда обитания
    description: |
      Управление биоразнообразием в хозяйстве, включая запись мест
      обитания, охрану опылителей и буферные полевые полосы.
  BC-3600.30.10:
    name: Запись мест обитания в хозяйстве
    description: |
      Запись мест обитания и особенностей биоразнообразия
      в хозяйстве.
  BC-3600.30.20:
    name: Охрана опылителей
    description: |
      Практики в пользу опылителей, включая цветочные полосы
      и пороги ИУВ.
  BC-3600.30.30:
    name: Управление буферными зонами
    description: |
      Управление буферными зонами по краям полей
      и вдоль водотоков.
  BC-3600.40:
    name: Управление сельскохозяйственными ПГ
    description: |
      Количественная оценка и снижение парниковых газов хозяйства,
      включая кишечный метан, закись азота и CO2 на ферме.
  BC-3600.40.10:
    name: Программы снижения кишечного метана
    description: |
      Программы снижения кишечного метана
      жвачных животных.
  BC-3600.40.20:
    name: Программы снижения закиси азота
    description: |
      Снижение закиси азота через эффективность
      азотопользования и сроки внесения.
  BC-3600.40.30:
    name: Инвентаризация выбросов хозяйства
    description: |
      Инвентаризация выбросов ПГ на уровне хозяйства
      для раскрытия данных.
  BC-3600.50:
    name: Программы почвенного углерода и углеродных кредитов
    description: |
      Базовые измерения почвенного углерода, проектирование углеродных
      кредитных проектов и записи выдачи по признанным методологиям.
  BC-3600.50.10:
    name: Базовые измерения почвенного углерода
    description: |
      Базовые измерения почвенного углерода
      при зачислении в проект.
  BC-3600.50.20:
    name: Проектирование углеродных кредитных проектов
    description: |
      Проектирование по методологиям Verra, Gold Standard
      и эквивалентным.
  BC-3600.50.30:
    name: Записи выдачи углеродных кредитов
    description: |
      Записи выдачи, аннулирования кредитов
      и распределения по бенефициарам.
  BC-3600.60:
    name: Управление регенеративными практиками
    description: |
      Внедрение и запись регенеративных практик, включая сокращение
      обработки почвы, интеграцию и агролесомелиорацию.
  BC-3600.60.10:
    name: Программы нулевой и минимальной обработки
    description: |
      Внедрение и отслеживание программ нулевой
      и минимальной обработки почвы.
  BC-3600.60.20:
    name: Интегрированные растениеводческо-животноводческие операции
    description: |
      Интеграция растениеводства и животноводства
      для кругооборота питательных веществ.
  BC-3600.60.30:
    name: Записи агролесомелиоративных практик
    description: |
      Записи об агролесомелиоративных посадках
      и сильвопасторальных системах.
  BC-3600.70:
    name: Участие в агроэкологических схемах
    description: |
      Участие в эко-схемах ОСП, природоохранных программах NRCS
      и эквивалентных агроэкологических схемах выплат.
  BC-3600.70.10:
    name: Участие в эко-схемах ОСП
    description: |
      Участие в эко-схемах ОСП ЕС
      и требованиях кондициональности.
  BC-3600.70.20:
    name: Участие в природоохранных программах
    description: |
      Участие в EQIP, CSP USDA NRCS
      и эквивалентных программах.
  BC-3600.70.30:
    name: Сверка агроэкологических выплат
    description: |
      Сверка агроэкологических выплат против
      обязательств по схеме.

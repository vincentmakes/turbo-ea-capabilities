# Программирование и планирование эфира (ru) — translations for L1-programming-scheduling-management.yaml
locale: ru
source: L1-programming-scheduling-management.yaml
entries:
  BC-3730:
    name: Программирование и планирование эфира
    description: |
      Линейное планирование эфирной сетки, управление электронным
      программным гидом, кураторство каталога по запросу, вещательные
      плейлисты и монтажная связка, а также согласование спроса
      на программы с запасами прав и приобретениями.
  BC-3730.10:
    name: Линейное планирование эфира
    description: |
      Долгосрочное, тактическое и оперативное планирование
      линейных каналов и потоков.
  BC-3730.10.10:
    name: Долгосрочное планирование сетки
    description: |
      Многоквартальные и сезонные планы сетки,
      согласованные с окнами прав и аудиторной стратегией.
  BC-3730.10.20:
    name: Тактическое формирование сетки
    description: |
      Составление сетки на неделю вещания
      до уровня программ и рекламных блоков.
  BC-3730.10.30:
    name: Управление изменениями сетки
    description: |
      Контролируемое управление поздними и аварийными
      изменениями сетки с уведомлением вниз по цепочке.
  BC-3730.20:
    name: Управление электронным программным гидом
    description: |
      Разработка, распространение и обновление данных ЭПГ
      операторам и потребительским устройствам.
  BC-3730.20.10:
    name: Разработка данных ЭПГ
    description: |
      Разработка названий, синопсисов, рейтингов и метаданных
      событий ЭПГ для публикации.
  BC-3730.20.20:
    name: Распространение ЭПГ операторам
    description: |
      Распространение фидов ЭПГ операторам платформ,
      агрегаторам и потребительским устройствам.
  BC-3730.20.30:
    name: Управление обновлениями ЭПГ в реальном времени
    description: |
      Обновления данных ЭПГ в реальном времени для перетяжек,
      спорта и экстренных новостей.
  BC-3730.30:
    name: Кураторство каталога по запросу
    description: |
      Кураторство названий, коллекций и правил персонализации
      на поверхностях по запросу и стриминга.
  BC-3730.30.10:
    name: Отбор и кураторство названий
    description: |
      Отбор и редакционное оформление названий в каталоге
      по запросу с учётом территориальной доступности.
  BC-3730.30.20:
    name: Управление редакционными коллекциями
    description: |
      Разработка и жизненный цикл редакционных коллекций,
      тем и рядов, предлагаемых зрителям.
  BC-3730.30.30:
    name: Разработка правил персонализации
    description: |
      Разработка бизнес-правил, управляющих персонализацией
      вместе с рекомендациями машинного обучения.
  BC-3730.40:
    name: Управление плейлистами и монтажной связкой
    description: |
      Создание вещательных плейлистов и монтажной связки
      для линейных и круглосуточных стриминговых каналов.
  BC-3730.40.10:
    name: Создание вещательного плейлиста
    description: |
      Создание временно́го вещательного плейлиста
      для плейаута с рекламными блоками и заставками.
  BC-3730.40.20:
    name: Управление монтажной связкой и стыками
    description: |
      Разработка и управление монтажными объявлениями,
      заставками и пакетами стыков.
  BC-3730.40.30:
    name: Управление нормативными вставками
    description: |
      Применение нормативных правок и вставок версий
      для целевого канала и временно́го слота.
  BC-3730.50:
    name: Планирование слотов для приобретений
    description: |
      Трансляция спроса на слоты в списки желаний для приобретений
      и согласование приобретённых прав с потребностями сетки.
  BC-3730.50.10:
    name: Планирование спроса на слоты
    description: |
      Количественная оценка спроса на слоты по жанру, дейпарту
      и целевой аудитории на горизонте планирования.
  BC-3730.50.20:
    name: Управление списками желаний приобретений
    description: |
      Список желаний по названиям, форматам и пакетам,
      приоритизированным для заполнения выявленных слотов.
  BC-3730.50.30:
    name: Согласование программирования с правами
    description: |
      Согласование запрограммированных показов с удерживаемыми
      правами, прокатами и потреблением окна.

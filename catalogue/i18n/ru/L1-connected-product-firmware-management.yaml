# Управление подключёнными продуктами и встроенным ПО (ru) — translations for L1-connected-product-firmware-management.yaml
locale: ru
source: L1-connected-product-firmware-management.yaml
entries:
  BC-1950:
    name: Управление подключёнными продуктами и встроенным ПО
    description: |
      Операционный жизненный цикл подключённой электротехнической продукции в полевых условиях: идентификация устройств, сборка и выпуск прошивки, обновления OTA, телеметрия, кибербезопасность продуктов, операции IIoT-платформы.
  BC-1950.10:
    name: Управление идентификацией и предоставлением устройств
    description: |
      Выпуск и жизненный цикл идентификаторов устройств и криптографических учётных данных.
  BC-1950.10.10:
    name: Выпуск идентификаторов устройств
    description: |
      Выпуск уникальных идентификаторов устройств при производстве.
  BC-1950.10.20:
    name: Предоставление криптографических ключей
    description: |
      Предоставление криптографических ключей устройствам.
  BC-1950.10.30:
    name: Подключение устройств к платформе
    description: |
      Подключение устройств к платформе подключённых продуктов.
  BC-1950.10.40:
    name: Вывод устройств из эксплуатации
    description: |
      Вывод из эксплуатации и отзыв учётных данных для выведенных устройств.
  BC-1950.20:
    name: Управление сборкой и выпуском встроенного ПО
    description: |
      Конвейеры сборки, согласование выпуска, подписание и инвентаризация версий производственного встроенного ПО.
  BC-1950.20.10:
    name: Управление конвейером сборки встроенного ПО
    description: |
      Функционирование конвейеров сборки и непрерывной интеграции встроенного ПО.
  BC-1950.20.20:
    name: Согласование выпуска встроенного ПО
    description: |
      Поэтапное согласование выпусков встроенного ПО для развёртывания.
  BC-1950.20.30:
    name: Подписание и защита целостности встроенного ПО
    description: |
      Подписание кода и защита целостности артефактов встроенного ПО.
  BC-1950.20.40:
    name: Инвентаризация версий встроенного ПО
    description: |
      Инвентаризация версий встроенного ПО, развёрнутых в установленной базе.
  BC-1950.30:
    name: Управление обновлениями по воздуху (OTA)
    description: |
      Планирование, выполнение и откат обновлений встроенного ПО по воздуху.
  BC-1950.30.10:
    name: Планирование кампаний OTA
    description: |
      Планирование кампаний OTA и когорт развёртывания.
  BC-1950.30.20:
    name: Выполнение развёртывания OTA
    description: |
      Выполнение развёртываний OTA и отслеживание прогресса.
  BC-1950.30.30:
    name: Управление откатом OTA
    description: |
      Откат неудачных обновлений OTA до заведомо работоспособных версий.
  BC-1950.30.40:
    name: Верификация совместимости OTA
    description: |
      Верификация совместимости встроенного ПО перед выпуском OTA.
  BC-1950.40:
    name: Управление телеметрией и подключением устройств
    description: |
      Приём телеметрии, состояние подключения, маршрутизация и управление операторами сотовой связи или SIM.
  BC-1950.40.10:
    name: Операции приёма телеметрии
    description: |
      Приём телеметрии устройств в хранилища платформы.
  BC-1950.40.20:
    name: Мониторинг состояния подключения
    description: |
      Мониторинг состояния подключения и доступности устройств.
  BC-1950.40.30:
    name: Маршрутизация телеметрических данных
    description: |
      Маршрутизация телеметрии к нижестоящим потребителям и аналитическим системам.
  BC-1950.40.40:
    name: Управление сотовыми операторами и SIM
    description: |
      Управление отношениями с сотовыми операторами и инвентаризацией SIM-карт.
  BC-1950.50:
    name: Управление кибербезопасностью подключённых продуктов
    description: |
      Кибербезопасность продуктов: угрозы, уязвимости, защищённая загрузка и соответствие требованиям.
  BC-1950.50.10:
    name: Моделирование угроз продукту
    description: |
      Моделирование угроз для конструкций подключённых продуктов.
  BC-1950.50.20:
    name: Раскрытие уязвимостей и реагирование
    description: |
      Скоординированное раскрытие и реагирование на уязвимости продуктов.
  BC-1950.50.30:
    name: Защищённая загрузка и аттестация
    description: |
      Механизмы защищённой загрузки и аттестации устройств.
  BC-1950.50.40:
    name: Соответствие кибербезопасности продуктов
    description: |
      Соответствие подключённых продуктов требованиям IEC 62443 и аналогичных режимов.
  BC-1950.60:
    name: Операции платформы подключённых продуктов
    description: |
      Функционирование IIoT-платформы, лежащей в основе подключённых продуктов.
  BC-1950.60.10:
    name: Управление тенантами IIoT-платформы
    description: |
      Подключение тенантов и обеспечение их изоляции на IIoT-платформе.
  BC-1950.60.20:
    name: Мощность и производительность платформы
    description: |
      Планирование мощности и управление производительностью платформы.
  BC-1950.60.30:
    name: Интеграционные сервисы платформы
    description: |
      Интеграция платформы с корпоративными и клиентскими системами.
  BC-1950.60.40:
    name: Жизненный цикл API платформы
    description: |
      Жизненный цикл API и SDK, предоставляемых платформой.
  BC-1950.70:
    name: Управление операциями граничных устройств и шлюзов
    description: |
      Функционирование граничных приложений и шлюзовых устройств в полевых условиях.
  BC-1950.70.10:
    name: Развёртывание граничных приложений
    description: |
      Развёртывание граничных приложений на шлюзах и контроллерах.
  BC-1950.70.20:
    name: Управление конфигурацией шлюзов
    description: |
      Управление конфигурацией полевых шлюзовых устройств.
  BC-1950.70.30:
    name: Мониторинг работоспособности граничных устройств
    description: |
      Мониторинг работоспособности граничных устройств и приложений.

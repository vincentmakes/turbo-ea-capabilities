# Управление цепочкой поставок (ru) — translations for L1-supply-chain-management.yaml
locale: ru
source: L1-supply-chain-management.yaml
entries:
  BC-520:
    name: Управление цепочкой поставок
    description: |
      Сквозное планирование, оркестрация и исполнение цепочки поставок.
  BC-520.10:
    name: Управление планированием спроса
    description: |
      Прогнозирование спроса, статистическое и консенсусное планирование.
  BC-520.10.10:
    name: Статистическое прогнозирование спроса
    description: |
      Прогнозы спроса на основе статистики и машинного обучения.
  BC-520.10.20:
    name: Консенсусное планирование спроса
    description: |
      Кросс-функциональное согласование плана спроса, включая корректировки от продаж.
  BC-520.10.30:
    name: Планирование спроса на новые продукты
    description: |
      Планирование спроса при запуске новых продуктов и снятии с производства.
  BC-520.10.40:
    name: Сенсинг и формирование спроса
    description: |
      Краткосрочный сенсинг и инициативы по формированию спроса.
  BC-520.20:
    name: Управление планированием поставок
    description: |
      Планирование сети поставок, балансировка по источникам.
  BC-520.20.10:
    name: Планирование сети поставок
    description: |
      Многоуровневое планирование сети поставок по заводам и распределительным центрам.
  BC-520.20.20:
    name: Формирование производственного плана
    description: |
      Формирование главного производственного расписания по производственным площадкам.
  BC-520.20.30:
    name: Распределение поставок
    description: |
      Распределение ограниченных поставок по регионам и клиентам.
  BC-520.20.40:
    name: Балансировка источников поставок
    description: |
      Балансировка между несколькими источниками поставок и двойным sourcing'ом.
  BC-520.30:
    name: Управление продажами и операционным планированием
    description: |
      S&OP/IBP, кросс-функциональное согласование.
  BC-520.30.10:
    name: Управление циклом S&OP
    description: |
      Оркестрация ежемесячного цикла S&OP/IBP и периодичность встреч.
  BC-520.30.20:
    name: Обзор спроса
    description: |
      Кросс-функциональный обзор плана спроса без ограничений.
  BC-520.30.30:
    name: Обзор поставок
    description: |
      Обзор реализуемости поставок и ограничений в цикле S&OP.
  BC-520.30.40:
    name: Интегрированное согласование и S&OP на уровне руководства
    description: |
      Интегрированное согласование и встречи руководства для принятия решений.
  BC-520.40:
    name: Управление выполнением заказов
    description: |
      Подтверждение заказов, распределение, оркестрация выполнения.
  BC-520.40.10:
    name: Подтверждение и доступность к обещанию
    description: |
      Подтверждение заказов на основе ATP/CTP по поставкам и мощностям.
  BC-520.40.20:
    name: Оркестрация заказов
    description: |
      Оркестрация выполнения заказов по узлам и каналам.
  BC-520.40.30:
    name: Отслеживание заказов и видимость
    description: |
      Сквозной статус и видимость отгрузок по заказам.
  BC-520.40.40:
    name: Возвраты и обратная логистика
    description: |
      Авторизация возвратов, обратная логистика и маршрутизация восстановления.
  BC-520.50:
    name: Управление логистическими операциями
    description: |
      Транспортировка, складские операции в рамках цепочки поставок.
  BC-520.50.10:
    name: Планирование транспортировки
    description: |
      Выбор вида транспорта, маршрутизация и планирование загрузки.
  BC-520.50.20:
    name: Управление перевозчиками
    description: |
      Выбор перевозчиков, договоры и управление результативностью.
  BC-520.50.30:
    name: Складские операции
    description: |
      Приёмка, размещение, отбор, упаковка и отгрузка.
  BC-520.50.40:
    name: Международные операции и таможня
    description: |
      Трансграничные перемещения, таможенное оформление и торговое соответствие.
  BC-520.50.50:
    name: Операции доставки последней мили
    description: |
      Маршрутизация доставки последней мили, управление временными окнами и подтверждение доставки.
  BC-520.60:
    name: Управление рисками цепочки поставок
    description: |
      Сбои цепочки поставок, видимость, устойчивость.
  BC-520.60.10:
    name: Сквозная видимость цепочки поставок
    description: |
      Многоуровневая видимость по поставщикам, запасам и отгрузкам.
  BC-520.60.20:
    name: Обнаружение сбоев и реагирование
    description: |
      Обнаружение сбоев и оркестрированные меры реагирования.
  BC-520.60.30:
    name: Проектирование устойчивости цепочки поставок
    description: |
      Проектирование сети для обеспечения устойчивости, включая двойной sourcing и буферные запасы.
  BC-520.60.40:
    name: Соответствие требованиям цепочки поставок
    description: |
      Соответствие требованиям due diligence цепочки поставок и торговым нормативным актам.

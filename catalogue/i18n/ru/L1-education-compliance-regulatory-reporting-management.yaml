# Соответствие требованиям и регуляторная отчётность в образовании (ru) — translations for L1-education-compliance-regulatory-reporting-management.yaml
locale: ru
source: L1-education-compliance-regulatory-reporting-management.yaml
entries:
  BC-4810:
    name: Соответствие требованиям и регуляторная отчётность в образовании
    description: |
      Соответствие специфическим регуляторным требованиям образовательного
      сектора и обязательная отчётность, включая конфиденциальность
      данных студентов, режимы гражданских прав, законодательные
      обязательства специального образования, визовое соответствие
      иностранных студентов и соответствие требованиям государственного
      финансирования. Дополняет межотраслевое управление соответствием
      общим регуляторным обязательствам.
  BC-4810.10:
    name: Соответствие требованиям конфиденциальности данных студентов
    description: |
      Соответствие отраслевым режимам конфиденциальности данных студентов,
      включая FERPA, COPPA и эквивалентные режимы.
    in_scope:
      - Операционное соответствие FERPA
      - Операционное соответствие COPPA
      - Управление соглашениями об обмене данными студентов
    out_of_scope:
      - Общая защита данных (охватывается межотраслевым управлением информацией и данными)
  BC-4810.10.10:
    name: Операционное соответствие FERPA
    description: |
      Повседневное соответствие FERPA, включая согласия и раскрытие
      информации.
  BC-4810.10.20:
    name: Операционное соответствие COPPA
    description: |
      Соответствие COPPA для сервисов, предназначенных для детей до
      13 лет.
  BC-4810.10.30:
    name: Управление соглашениями об обмене данными
    description: |
      Согласование и управление соглашениями об обмене данными студентов
      с поставщиками.
  BC-4810.20:
    name: Обязательная статистическая отчётность в образовании
    description: |
      Представление обязательной образовательной статистики и отчётности
      о результатах в национальные, региональные и местные органы власти.
    in_scope:
      - Представление национальной статистики (например, IPEDS, HESA)
      - Отчётность перед государственными и местными органами образования
      - Раскрытие информации о финансировании и результатах
    out_of_scope:
      - Внутренняя отчётность об эффективности (охватывается управлением академическим качеством и аккредитацией)
  BC-4810.20.10:
    name: Представление национальной статистики
    description: |
      Представление отчётности в национальные агентства образовательной
      статистики.
  BC-4810.20.20:
    name: Отчётность перед органами образования
    description: |
      Отчётность перед региональными и местными органами управления
      образованием.
  BC-4810.20.30:
    name: Раскрытие информации о финансировании и результатах
    description: |
      Публичное раскрытие информации об использовании финансирования и
      показателях деятельности в сфере образования.
  BC-4810.30:
    name: Соответствие нормам гражданских прав
    description: |
      Соответствие образовательным режимам гражданских прав, включая
      Раздел IX, Раздел 504 и ADA в академическом контексте.
    in_scope:
      - Расследование и отчётность по Разделу IX
      - Соответствие Разделу 504 / ADA
      - Правоприменение по политике недискриминации
    out_of_scope:
      - Повседневные приспособления (охватываются поддержкой и благополучием студентов)
  BC-4810.30.10:
    name: Расследование и отчётность по Разделу IX
    description: |
      Приём жалоб, расследование, слушания и обязательная отчётность
      по Разделу IX.
  BC-4810.30.20:
    name: Соответствие Разделу 504 / ADA
    description: |
      Соответствие Разделу 504 и ADA в академическом и приёмном
      контексте.
  BC-4810.30.30:
    name: Правоприменение по недискриминации
    description: |
      Правоприменение по политике недискриминации в образовании и
      рассмотрение жалоб.
  BC-4810.40:
    name: Соответствие требованиям специального образования
    description: |
      Соответствие законодательным режимам специального образования,
      охватывающим школьников и детей раннего возраста.
    in_scope:
      - Соответствие Части B IDEA
      - Соответствие Части C IDEA / программам ранней помощи
      - Эквивалентное законодательное соответствие SEN/ALN
    out_of_scope:
      - Оказание услуг специального образования (охватывается поддержкой и благополучием студентов)
  BC-4810.40.10:
    name: Соответствие Части B IDEA
    description: |
      Законодательное соответствие Части B IDEA для специального
      образования школьного возраста.
  BC-4810.40.20:
    name: Соответствие Части C IDEA и программам ранней помощи
    description: |
      Соответствие Части C IDEA для услуг ранней помощи.
  BC-4810.40.30:
    name: Законодательное соответствие SEN и ALN
    description: |
      Эквивалентное законодательное соответствие SEN, ALN и инклюзивному
      образованию за пределами США.
  BC-4810.50:
    name: Соответствие требованиям для иностранных студентов
    description: |
      Соответствие требованиям спонсорства виз и обязательный учёт
      иностранных студентов в рамках режимов SEVIS и студенческого
      маршрута Великобритании.
    in_scope:
      - Операционное соответствие SEVIS / I-20
      - Отчётность по студенческим визам (студенческий маршрут Великобритании и аналоги)
      - Учёт и отчётность по иностранным студентам
    out_of_scope:
      - Первичное оформление документов для спонсорства виз (охватывается управлением набором и зачислением студентов)
  BC-4810.50.10:
    name: Операционное соответствие SEVIS / I-20
    description: |
      Повседневное соответствие SEVIS и I-20 для студентов,
      спонсируемых в США.
  BC-4810.50.20:
    name: Отчётность по студенческим визам
    description: |
      Обязательная отчётность о студентах, находящихся под спонсорством,
      в рамках визовых режимов за пределами США.
  BC-4810.50.30:
    name: Учёт иностранных студентов
    description: |
      Учёт статуса, посещаемости и адреса иностранных студентов в
      соответствии со спонсорскими обязательствами.
  BC-4810.60:
    name: Соответствие требованиям Раздела IV и государственного финансирования
    description: |
      Соответствие режимам государственной помощи студентам и
      образовательного финансирования, включая Раздел IV в США и
      эквивалентные режимы в других странах.
    in_scope:
      - Соответствие требованиям права на получение и выплату средств по Разделу IV
      - Возврат средств и сверка помощи
      - Реагирование на аудит государственного финансирования
    out_of_scope:
      - Присвоение предложений финансовой помощи (охватывается управлением набором и зачислением студентов)
  BC-4810.60.10:
    name: Соответствие праву на получение и выплату средств по Разделу IV
    description: |
      Соответствие институциональным требованиям права на участие и
      выплату студенческой помощи по Разделу IV.
  BC-4810.60.20:
    name: Возврат средств и сверка помощи
    description: |
      Сверка и возврат незаработанной помощи в соответствии с режимами
      финансирования.
  BC-4810.60.30:
    name: Реагирование на аудит государственного финансирования
    description: |
      Реагирование на аудиты и проверки государственной студенческой
      помощи и образовательного финансирования.

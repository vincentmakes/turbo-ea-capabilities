# Управление водными ресурсами (ru) — translations for L1-water-resource-management.yaml
locale: ru
source: L1-water-resource-management.yaml
entries:
  BC-3860:
    name: Управление водными ресурсами
    description: |
      Устойчивое управление источниками сырой воды — защита водосборов
      и источников, водозабор и хранение сырой воды, долгосрочное планирование
      ресурсов, управление засухой и ограничениями, соответствие лицензиям на водозабор
      и сети мониторинга поверхностных и подземных вод.
  BC-3860.10:
    name: Защита водосборов и источников
    description: |
      Защита водосборных бассейнов через взаимодействие с заинтересованными
      сторонами, меры землепользования и оценку риска источников.
  BC-3860.10.10:
    name: Оценка риска водосбора
    description: |
      Оценка риска водосборного бассейна для источников питьевой воды
      по принципам Плана водной безопасности ВОЗ.
  BC-3860.10.20:
    name: Управление зонами охраны источников
    description: |
      Обозначение и управление зонами охраны подземных
      и поверхностных источников водоснабжения.
  BC-3860.10.30:
    name: Взаимодействие с заинтересованными сторонами водосбора
    description: |
      Взаимодействие с землевладельцами, регуляторами
      и фермерами по мерам водосбора.
  BC-3860.20:
    name: Операции водозабора сырой воды
    description: |
      Ежедневная эксплуатация водозаборных сооружений, отводов
      из рек и скважин подземных вод для водоочистных станций.
  BC-3860.20.10:
    name: Операции поверхностных водозаборов
    description: |
      Эксплуатация речных и водохранилищных водозаборов,
      включая сетки и насосы.
  BC-3860.20.20:
    name: Операции скважин подземных вод
    description: |
      Эксплуатация и управление дебитом скважин
      и водозаборных полей.
  BC-3860.20.30:
    name: Операции насосных станций сырой воды
    description: |
      Перекачка сырой воды на водоочистные станции
      и в акведуки.
  BC-3860.30:
    name: Операции хранения сырой воды
    description: |
      Эксплуатация водохранилищ, плотин и предварительных
      ёмкостей, включая надзор за безопасностью плотины.
  BC-3860.30.10:
    name: Операции уровнями водохранилищ
    description: |
      Управление кривой эксплуатации регулирующих
      и балансирующих водохранилищ.
  BC-3860.30.20:
    name: Надзор за безопасностью плотины
    description: |
      Надзор и инспекция плотин в соответствии
      с установленными режимами безопасности плотин.
  BC-3860.30.30:
    name: Операции качества воды в водохранилище
    description: |
      Надзор и управление качеством сырой воды,
      включая цветение водорослей.
  BC-3860.40:
    name: Планирование водных ресурсов
    description: |
      Долгосрочное планирование водных ресурсов и спроса, включая
      баланс спроса и предложения, климатическую корректировку и выбор вариантов.
  BC-3860.40.10:
    name: Прогнозирование баланса спроса и предложения
    description: |
      Долгосрочное прогнозирование спроса и предложения
      по ресурсным зонам.
  BC-3860.40.20:
    name: Оценка вариантов ресурсов
    description: |
      Оценка вариантов новых источников, переброски воды
      и мер управления спросом.
  BC-3860.40.30:
    name: Климатическая корректировка ресурсов
    description: |
      Корректировка запасов ресурсов и спроса
      для климатических сценариев.
  BC-3860.50:
    name: Управление засухой и ограничениями
    description: |
      Введение планов по засухе и ограничений водоснабжения
      по триггерам засухи, потребительским ограничениям
      и аварийным разрешениям на водозабор.
  BC-3860.50.10:
    name: Мониторинг триггеров засухи
    description: |
      Мониторинг триггеров засухи по водохранилищам,
      рекам и подземным водам.
  BC-3860.50.20:
    name: Операции ограничений при засухе
    description: |
      Введение и отмена ограничений
      на водопотребление потребителями.
  BC-3860.50.30:
    name: Управление разрешениями и ордерами на водозабор
    description: |
      Обращение и исполнение разрешений и ордеров
      на водозабор, утверждённых регуляторами.
  BC-3860.60:
    name: Соответствие лицензиям на водозабор
    description: |
      Администрирование лицензий на водозабор и отчётность
      о соответствии по объёму, срокам и экологическим условиям.
  BC-3860.60.10:
    name: Администрирование лицензий на водозабор
    description: |
      Ведение портфеля лицензий на водозабор
      и реестра условий.
  BC-3860.60.20:
    name: Отчётность по объёмам водозабора
    description: |
      Отчётность об объёмах водозабора и соблюдении
      условий лицензии.
  BC-3860.60.30:
    name: Соблюдение расходов поддержания
    description: |
      Мониторинг расходов поддержания и условий экологических
      расходов при водозаборе.
  BC-3860.70:
    name: Гидрометрический мониторинг
    description: |
      Эксплуатация сетей мониторинга поверхностных и подземных вод,
      обеспечивающих входные данные для планирования ресурсов.
  BC-3860.70.10:
    name: Мониторинг поверхностных вод
    description: |
      Эксплуатация сетей мониторинга речного стока,
      уровней и осадков.
  BC-3860.70.20:
    name: Мониторинг уровня подземных вод
    description: |
      Эксплуатация сетей наблюдательных скважин
      подземных вод.
  BC-3860.70.30:
    name: Управление качеством гидрометрических данных
    description: |
      Контроль качества и управление кривыми расходов
      для гидрометрических данных.

# Управление операциями по управлению капиталом (ru) — translations for L1-wealth-management-operations-management.yaml
locale: ru
source: L1-wealth-management-operations-management.yaml
entries:
  BC-1390:
    name: Управление операциями по управлению капиталом
    description: |
      Инвестиционное консультирование, дискреционное управление портфелем, отчётность для клиентов, соответствие требованиям.
  BC-1390.10:
    name: Управление инвестиционным консультированием
    description: |
      Консультационные мандаты, формирование рекомендаций.
  BC-1390.10.10:
    name: Привлечение по консультационному мандату
    description: |
      Привлечение по консультационным мандатам и заключение клиентских соглашений.
  BC-1390.10.20:
    name: Формирование инвестиционных рекомендаций
    description: |
      Формирование персонализированных инвестиционных рекомендаций.
  BC-1390.10.30:
    name: Управление инвестиционными предложениями
    description: |
      Подготовка и согласование инвестиционных предложений.
  BC-1390.20:
    name: Дискреционное управление портфелем
    description: |
      Дискреционные мандаты, построение портфеля.
  BC-1390.20.10:
    name: Открытие дискреционного мандата
    description: |
      Открытие дискреционных мандатов и оформление IPS-документации.
  BC-1390.20.20:
    name: Построение портфеля
    description: |
      Построение портфеля и распределение активов.
  BC-1390.20.30:
    name: Ребалансировка портфеля
    description: |
      Ребалансировка дискреционных портфелей по эталонной модели.
  BC-1390.20.40:
    name: Исполнение сделок по мандатам
    description: |
      Исполнение сделок от имени дискреционных мандатов.
  BC-1390.30:
    name: Управление отчётностью для клиентов
    description: |
      Клиентские выписки, отчёты о результатах.
  BC-1390.30.10:
    name: Периодические клиентские выписки
    description: |
      Подготовка периодических выписок и оценок портфелей клиентов.
  BC-1390.30.20:
    name: Отчёты о результатах и операциях
    description: |
      Отчёты о результатах, операциях и налоговые отчёты для клиентов.
  BC-1390.30.30:
    name: Регуляторные раскрытия информации клиентам
    description: |
      Раскрытие информации о расходах и сборах по MiFID II и иные регуляторные раскрытия.
  BC-1390.40:
    name: Управление измерением эффективности
    description: |
      Атрибуция результатов, сравнение с бенчмарком.
  BC-1390.40.10:
    name: Расчёт результатов портфеля
    description: |
      Расчёт TWR, MWR и иных показателей доходности.
  BC-1390.40.20:
    name: Атрибуционный анализ результатов
    description: |
      Атрибуционный анализ по методу Бринсона и на основе факторов.
  BC-1390.40.30:
    name: Сравнение с бенчмарком и аналогами
    description: |
      Сравнение результатов портфеля с бенчмарками и аналогами.
  BC-1390.50:
    name: Управление пригодностью и приемлемостью
    description: |
      Проверки пригодности и приемлемости по MiFID и аналогичным требованиям.
  BC-1390.50.10:
    name: Профилирование риска клиента
    description: |
      Профилирование склонности к риску и риск-ёмкости клиентов.
  BC-1390.50.20:
    name: Оценка пригодности
    description: |
      Оценка пригодности инвестиционных советов и дискреционных портфелей.
  BC-1390.50.30:
    name: Оценка приемлемости
    description: |
      Проверки приемлемости для транзакций с продуктами, исполняемыми без консультаций.
  BC-1390.50.40:
    name: Фиксация предпочтений в области устойчивого развития
    description: |
      Фиксация и интеграция предпочтений клиентов в области устойчивого развития.

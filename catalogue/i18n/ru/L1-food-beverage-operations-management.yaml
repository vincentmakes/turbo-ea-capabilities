# Управление службой питания и напитков (ru) — translations for L1-food-beverage-operations-management.yaml
locale: ru
source: L1-food-beverage-operations-management.yaml
entries:
  BC-4070:
    name: Управление службой питания и напитков
    description: |
      Управление службами питания и напитков в ресторанах, барах, обслуживании в номерах, банкетных залах и кухнях — разработка рецептур и инжиниринг меню, закупки, производство, обслуживание, гигиена и соответствие требованиям пищевой безопасности.
    in_scope:
      - Управление меню и рецептурами с данными об аллергенах и питательной ценности
      - Закупки F&B, управление баром и инвентарём
      - Планирование кухонного производства и работа линии
      - Ресторанное обслуживание, обслуживание в номерах и банкетов
      - Операции HACCP и пищевой безопасности
    out_of_scope:
      - Инженерная служба объекта (BC-4060.30)
      - Составление банкетных заказов и групповые продажи (BC-4110)
      - Операции бортового питания круизных судов (BC-4090)
  BC-4070.10:
    name: Инжиниринг меню и управление рецептурами
    description: |
      Разработка меню и рецептур: спецификации, декларации аллергенов и питательной ценности, расчёт себестоимости и управление версиями.
  BC-4070.10.10:
    name: Управление рецептурами и спецификациями
    description: |
      Управление рецептурами, субрецептами и спецификациями продуктов по всем торговым точкам.
  BC-4070.10.20:
    name: Декларация аллергенов и питательной ценности
    description: |
      Декларирование аллергенов и питательной ценности блюд меню в соответствии с требованиями законодательства.
  BC-4070.10.30:
    name: Расчёт себестоимости и инжиниринг маржи
    description: |
      Расчёт себестоимости рецептур и инжиниринг маржи меню относительно целевой стоимости продуктов питания.
  BC-4070.10.40:
    name: Версионирование и внедрение меню
    description: |
      Управление версиями и внедрение меню по сезонам, торговым точкам и рынкам.
  BC-4070.20:
    name: Закупки и инвентарь F&B
    description: |
      Снабжение продуктами питания и напитками, управление запасами бара, пополнение до минимального остатка и анализ отклонений теории от факта.
  BC-4070.20.10:
    name: Подбор поставщиков F&B
    description: |
      Подбор поставщиков продуктов и напитков, согласование условий контрактов.
  BC-4070.20.20:
    name: Управление инвентарём напитков и бара
    description: |
      Управление запасами напитков и бара, включая отслеживание сроков и ротацию.
  BC-4070.20.30:
    name: Управление минимальным запасом и пополнением
    description: |
      Управление минимальными запасами и циклами пополнения по торговым точкам.
  BC-4070.20.40:
    name: Анализ отклонений теории от факта
    description: |
      Анализ отклонений теоретической и фактической стоимости продуктов и напитков с выявлением причин.
  BC-4070.30:
    name: Операции кухонного производства
    description: |
      Управление кухонным производством: планирование, работа линии, сервировка и контроль себестоимости.
  BC-4070.30.10:
    name: Планирование производства и предварительная подготовка
    description: |
      Планирование производственных циклов кухни и предварительная подготовка перед сервисом.
  BC-4070.30.20:
    name: Операции линии и сервисного производства
    description: |
      Живое производство на линии и координация раздачи в сервисные периоды.
  BC-4070.30.30:
    name: Сервировка и контроль качества
    description: |
      Сервировка и контроль качества на раздаче перед подачей гостям.
  BC-4070.30.40:
    name: Управление себестоимостью кухни
    description: |
      Управление себестоимостью продуктов: проверка выхода и учёт отходов.
  BC-4070.40:
    name: Операции обслуживания в ресторанах и торговых точках
    description: |
      Сервисные операции в ресторанах и торговых точках: бронирование, рассадка, управление чеками и сброс зала.
  BC-4070.40.10:
    name: Управление бронированием и рассадкой
    description: |
      Управление бронированием, рассадкой и листом ожидания по торговым точкам.
  BC-4070.40.20:
    name: Управление чеками и темпом обслуживания
    description: |
      Управление количеством посадочных мест и темпом обслуживания в сервисные периоды.
  BC-4070.40.30:
    name: Обслуживание у столика
    description: |
      Обслуживание у столика: принятие заказов, стандарты сервиса и подача счёта.
  BC-4070.40.40:
    name: Закрытие и сброс торговой точки
    description: |
      Закрытие торговой точки, инкассация и подготовка к следующему сервисному периоду.
  BC-4070.50:
    name: Обслуживание в номерах и мини-бар
    description: |
      Приём заказов и доставка в номер, пополнение мини-бара и подарочные операции.
  BC-4070.50.10:
    name: Приём заказов в номер
    description: |
      Приём заказов в номер по телефону, приложению и другим каналам.
  BC-4070.50.20:
    name: Операции доставки в номер
    description: |
      Доставка заказов в номер в установленные нормами времени.
  BC-4070.50.30:
    name: Операции пополнения мини-бара
    description: |
      Пополнение мини-бара и учёт потребления.
  BC-4070.50.40:
    name: Операции amenity и приветственных подарков
    description: |
      Управление комплиментами в номере и приветственными подарками для VIP и признанных гостей.
  BC-4070.60:
    name: Банкетные и кейтеринговые операции
    description: |
      Банкетные и кейтеринговые операции: расстановка, сервис, выездной кейтеринг и обслуживание напитками на мероприятиях.
  BC-4070.60.10:
    name: Расстановка и сброс банкетного зала
    description: |
      Расстановка, смена и сброс банкетных залов между последовательными мероприятиями.
  BC-4070.60.20:
    name: Операции порционного и шведского стола
    description: |
      Сервисные операции для порционного, шведского стола и семейного обслуживания на банкетах.
  BC-4070.60.30:
    name: Операции выездного кейтеринга
    description: |
      Обеспечение кейтеринговых услуг за пределами основного объекта.
  BC-4070.60.40:
    name: Операции с напитками на банкете
    description: |
      Сервис напитков на банкетных мероприятиях, включая установку бара и учёт потребления.
  BC-4070.70:
    name: Гигиена и операции пищевой безопасности F&B
    description: |
      Операции гигиены и пищевой безопасности: выполнение плана HACCP, контроль температуры, управление аллергенами и обработка инцидентов.
  BC-4070.70.10:
    name: Выполнение плана HACCP
    description: |
      Исполнение планов HACCP на этапах приёмки, хранения, подготовки, тепловой обработки и хранения готовых блюд.
  BC-4070.70.20:
    name: Контроль температуры и холодовой цепи
    description: |
      Контроль температуры и целостности холодовой цепи при хранении и подаче F&B.
  BC-4070.70.30:
    name: Меры по предотвращению контакта с аллергенами
    description: |
      Управление мерами по предотвращению контакта с аллергенами при приёмке, подготовке и сервисе.
  BC-4070.70.40:
    name: Обработка инцидентов пищевой безопасности
    description: |
      Управление инцидентами пищевой безопасности, включая подозрения на пищевое отравление.

# Управление медицинскими вопросами (ru) — translations for L1-medical-affairs-management.yaml
locale: ru
source: L1-medical-affairs-management.yaml
entries:
  BC-1580:
    name: Управление медицинскими вопросами
    description: |
      Научный обмен с медицинскими работниками, ключевыми лидерами мнений, медицинскими научными представителями и генерация данных реальной практики.
  BC-1580.10:
    name: Управление медицинской стратегией
    description: |
      Медицинская стратегия, научная платформа и план генерации доказательств.
  BC-1580.10.10:
    name: Определение научной платформы
    description: |
      Определение научной платформы и ключевых сообщений.
  BC-1580.10.20:
    name: Планирование генерации доказательств
    description: |
      Планирование генерации доказательств, включая спонсируемые исследователями исследования и исследования в реальной практике.
  BC-1580.10.30:
    name: Медицинское планирование жизненного цикла
    description: |
      Медицинский план жизненного цикла для каждого препарата.
  BC-1580.20:
    name: Управление взаимодействием с KOL и медработниками
    description: |
      Взаимодействие с ключевыми лидерами мнений и медицинскими работниками.
  BC-1580.20.10:
    name: Картирование и профилирование KOL
    description: |
      Выявление и профилирование ключевых лидерами мнений.
  BC-1580.20.20:
    name: Управление экспертными советами медработников
    description: |
      Организация и проведение экспертных советов медицинских работников.
  BC-1580.20.30:
    name: Отслеживание научных взаимодействий
    description: |
      Отслеживание научных взаимодействий и контактов.
  BC-1580.30:
    name: Управление медицинской информацией
    description: |
      Обработка запросов на медицинскую информацию и подготовка ответов.
  BC-1580.30.10:
    name: Приём запросов на медицинскую информацию
    description: |
      Многоканальный приём запросов на медицинскую информацию.
  BC-1580.30.20:
    name: Библиотека стандартных ответов
    description: |
      Ведение библиотеки стандартных ответных документов.
  BC-1580.30.30:
    name: Подготовка индивидуальных медицинских ответов
    description: |
      Подготовка индивидуальных ответов на медицинские запросы.
  BC-1580.40:
    name: Управление медицинскими коммуникациями
    description: |
      Публикации, конгрессовая стратегия и научные коммуникации.
  BC-1580.40.10:
    name: Планирование публикаций
    description: |
      Планирование публикаций в соответствии с GPP3 и ICMJE.
  BC-1580.40.20:
    name: Подготовка научных рукописей
    description: |
      Написание и подача научных рукописей.
  BC-1580.40.30:
    name: Управление конгрессами и симпозиумами
    description: |
      Конгрессовая стратегия, подготовка тезисов и организация симпозиумов.
  BC-1580.50:
    name: Управление спонсируемыми исследователями исследованиями
    description: |
      Программы исследований, инициированных исследователями, и спонсируемых ими работ.
  BC-1580.50.10:
    name: Управление программой ISS
    description: |
      Управление программами исследований, инициированных исследователями.
  BC-1580.50.20:
    name: Рецензирование протоколов ISS
    description: |
      Рецензирование и принятие решений по протоколам исследований, инициированных исследователями.
  BC-1580.50.30:
    name: Финансирование и поддержка ISS
    description: |
      Финансирование и поддержка исследователей, инициирующих исследования.
  BC-1580.60:
    name: Управление медицинским образованием
    description: |
      Непрерывное медицинское образование, гранты и образовательные программы.
  BC-1580.60.10:
    name: Гранты на независимое медицинское образование
    description: |
      Присуждение грантов для независимого медицинского образования.
  BC-1580.60.20:
    name: Промоционное медицинское образование
    description: |
      Программы промоционного медицинского образования.
  BC-1580.60.30:
    name: Разработка образовательного контента
    description: |
      Разработка аккредитованного образовательного контента.
  BC-1580.70:
    name: Управление операциями медицинских научных представителей
    description: |
      Полевые операции медицинских научных представителей (MSL), планирование и оценка результатов.
  BC-1580.70.10:
    name: Территориальное планирование и таргетинг MSL
    description: |
      Проектирование территорий MSL и таргетинг KOL.
  BC-1580.70.20:
    name: Планирование активности MSL
    description: |
      Планирование активности и визитов MSL.
  BC-1580.70.30:
    name: Оценка результативности MSL
    description: |
      Оценка результатов MSL, сбор инсайтов и отчётность.

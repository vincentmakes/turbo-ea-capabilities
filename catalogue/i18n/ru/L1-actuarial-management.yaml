# Актуарное управление (ru) — translations for L1-actuarial-management.yaml
locale: ru
source: L1-actuarial-management.yaml
entries:
  BC-2180:
    name: Актуарное управление
    description: |
      Модели тарификации, резервирование, исследования опыта, моделирование капитала и платёжеспособности,
      поддержка актуарной отчётности по IFRS 17 и моделирование катастрофических событий.
  BC-2180.10:
    name: Актуарная тарификация
    description: |
      Моделирование стоимости убытков, анализ достаточности тарифов, расчёт тарифных показаний и поддержка документации по утверждению тарифов.
  BC-2180.10.10:
    name: Моделирование стоимости убытков
    description: |
      Моделирование стоимости убытков по сегментам, рискам и видам покрытия.
  BC-2180.10.20:
    name: Анализ достаточности тарифов
    description: |
      Анализ достаточности тарифов относительно ожидаемых убытков и расходных нагрузок.
  BC-2180.10.30:
    name: Подготовка тарифных показаний
    description: |
      Подготовка тарифных показаний для продуктовых и тарифных комитетов.
  BC-2180.10.40:
    name: Поддержка документации по утверждению тарифов
    description: |
      Подготовка актуарных меморандумов и приложений для поддержки заявок на утверждение тарифов.
  BC-2180.20:
    name: Актуарное резервирование
    description: |
      Треугольники убытков, оценка IBNR, резервирование ULAE и ALAE, а также документация по согласованию резервов.
  BC-2180.20.10:
    name: Треугольники убытков и развитие
    description: |
      Построение треугольников убытков и выбор коэффициентов развития.
  BC-2180.20.20:
    name: Оценка IBNR
    description: |
      Оценка резервов IBNR по портфелям.
  BC-2180.20.30:
    name: Резервирование ULAE и ALAE
    description: |
      Резервирование нераспределённых и распределённых расходов на урегулирование убытков.
  BC-2180.20.40:
    name: Документация по согласованию резервов
    description: |
      Подготовка документации для резервного комитета и актуарных заключений.
  BC-2180.30:
    name: Моделирование капитала и платёжеспособности
    description: |
      Разработка внутренней модели капитала, расчёт по стандартной формуле, аллокация капитала и поддержка ORSA.
  BC-2180.30.10:
    name: Разработка внутренней модели капитала
    description: |
      Разработка и поддержка внутренних моделей капитала для оценки платёжеспособности и рейтинга.
  BC-2180.30.20:
    name: Расчёт по стандартной формуле
    description: |
      Расчёт стандартной формулы Solvency II и эквивалентных регуляторных показателей капитала.
  BC-2180.30.30:
    name: Аллокация капитала
    description: |
      Распределение требуемого капитала по бизнес-направлениям и сегментам.
  BC-2180.30.40:
    name: Поддержка моделирования ORSA
    description: |
      Актуарная поддержка проведения собственной оценки рисков и платёжеспособности.
  BC-2180.40:
    name: Исследования опыта и управление допущениями
    description: |
      Исследования смертности, долголетия, расторжений, сохраняемости и заболеваемости, а также управление актуарными допущениями.
  BC-2180.40.10:
    name: Исследования смертности и долголетия
    description: |
      Исследования опыта смертности и долголетия для портфелей по страхованию жизни и пенсионным схемам.
  BC-2180.40.20:
    name: Исследования расторжений и сохраняемости
    description: |
      Исследования опыта расторжений и сохраняемости по когортам продуктов.
  BC-2180.40.30:
    name: Исследования заболеваемости и частоты убытков
    description: |
      Исследования опыта заболеваемости и частоты убытков для направлений здоровья и защиты.
  BC-2180.40.40:
    name: Управление и согласование актуарных допущений
    description: |
      Управление и согласование актуарных допущений, используемых в тарификации, резервировании и отчётности.
  BC-2180.50:
    name: Поддержка актуарной отчётности по IFRS 17
    description: |
      Контрактная сервисная маржа, корректировка риска, формирование когорт и подготовка раскрытий по IFRS 17.
  BC-2180.50.10:
    name: Расчёт CSM и корректировки риска
    description: |
      Расчёт контрактной сервисной маржи и корректировки риска для целей IFRS 17.
  BC-2180.50.20:
    name: Формирование когорт и групп
    description: |
      Формирование групп страховых договоров и ежегодных когорт.
  BC-2180.50.30:
    name: Подготовка раскрытий по IFRS 17
    description: |
      Подготовка актуарных исходных данных для раскрытий и сверок по IFRS 17.
  BC-2180.60:
    name: Катастрофическое моделирование
    description: |
      Управление поставщиками CAT-моделей, подготовка данных о подверженности риску, расчёт PML и AAL, а также валидация моделей.
  BC-2180.60.10:
    name: Управление поставщиками CAT-моделей
    description: |
      Выбор поставщиков катастрофических моделей и управление лицензионными портфелями.
  BC-2180.60.20:
    name: Подготовка данных о подверженности риску
    description: |
      Подготовка и нормализация данных о подверженности риску для запуска CAT-моделей.
  BC-2180.60.30:
    name: Расчёт PML и AAL
    description: |
      Расчёт вероятностного максимального убытка и среднегодового убытка.
  BC-2180.60.40:
    name: Валидация и корректировка CAT-моделей
    description: |
      Валидация и экспертная корректировка результатов катастрофических моделей.

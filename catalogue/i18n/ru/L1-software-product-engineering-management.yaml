# Управление разработкой программных продуктов (ru) — translations for L1-software-product-engineering-management.yaml
locale: ru
source: L1-software-product-engineering-management.yaml
entries:
  BC-4200:
    name: Управление разработкой программных продуктов
    description: |
      Исследование, спецификация, проектирование, реализация, код-ревью и обеспечение качества SaaS-продуктов — от идеи до готовой к релизу сборки.
  BC-4200.10:
    name: Управление продуктовым исследованием и бэклогом
    description: |
      Исследование возможностей, генерация идей, валидация и ведение бэклога, преобразующих рыночные и клиентские сигналы в приоритизированный объём работ.
    in_scope:
      - Пользовательские и рыночные исследования
      - Грумминг и приоритизация бэклога
      - Определение и обновление роадмапа
    out_of_scope:
      - Количественная продуктовая аналитика (входит в Управление телеметрией и экспериментами)
      - Маркетинговая генерация спроса
  BC-4200.10.10:
    name: Пользовательское исследование
    description: |
      Генеративное и оценочное исследование с пользователями для выявления потребностей, точек трения и готовности платить.
  BC-4200.10.20:
    name: Грумминг бэклога
    description: |
      Непрерывный грумминг продуктового бэклога, включая оценку, декомпозицию и переприоритизацию.
  BC-4200.10.30:
    name: Определение роадмапа
    description: |
      Определение и периодическое обновление продуктового роадмапа и тематических инвестиционных направлений.
  BC-4200.10.40:
    name: Синтез обратной связи клиентов
    description: |
      Синтез входящей обратной связи из поддержки, успеха, продаж и сообщества в actionable продуктовые сигналы.
  BC-4200.20:
    name: Управление спецификациями продукта
    description: |
      Фиксация предполагаемого поведения, ограничений и критериев приёмки для предсказуемого выполнения инженерных работ.
    in_scope:
      - Функциональные и нефункциональные спецификации
      - Критерии приёмки
    out_of_scope:
      - Визуальное и интерактивное проектирование (входит в Управление дизайном программного обеспечения)
  BC-4200.20.10:
    name: Функциональная спецификация
    description: |
      Спецификация предполагаемого поведения и пользователь-видимых результатов для функций и возможностей.
  BC-4200.20.20:
    name: Нефункциональная спецификация
    description: |
      Спецификация нефункциональных требований: доступность, задержка, пропускная способность и профиль безопасности.
  BC-4200.20.30:
    name: Определение критериев приёмки
    description: |
      Определение тестируемых критериев приёмки, фиксирующих понятие «готово» для функций и историй.
  BC-4200.30:
    name: Управление дизайном программного обеспечения
    description: |
      Проектирование пользовательского опыта, системная архитектура и дизайн доступности программных продуктов на основе единых дизайн-систем.
  BC-4200.30.10:
    name: Проектирование пользовательского опыта
    description: |
      Взаимодействие, информационная архитектура и визуальный дизайн продуктовых поверхностей.
  BC-4200.30.20:
    name: Системное проектирование
    description: |
      Архитектурное проектирование программных компонентов, сервисов, потоков данных и внешних интерфейсов.
  BC-4200.30.30:
    name: Управление дизайн-системой
    description: |
      Управление единой дизайн-системой, включая компоненты, токены и руководство по использованию.
  BC-4200.30.40:
    name: Дизайн доступности
    description: |
      Соответствие стандартам доступности на всех продуктовых поверхностях при проектировании.
  BC-4200.40:
    name: Управление конструированием программного обеспечения
    description: |
      Практика реализации, включая управление исходным кодом, код-ревью и совместные практики программирования.
  BC-4200.40.10:
    name: Управление исходным кодом
    description: |
      Управление репозиториями исходного кода, политикой ветвления и владением кодом.
  BC-4200.40.20:
    name: Практика код-ревью
    description: |
      Рецензирование изменений кода коллегами на соответствие инженерным и требованиям безопасности.
  BC-4200.40.30:
    name: Практика парного и группового программирования
    description: |
      Совместные практики программирования для обмена знаниями и повышения качества отдельных работ.
  BC-4200.50:
    name: Инженерия качества программного обеспечения
    description: |
      Стратегия тестирования, управление автотестами и управление дефектами для программных продуктов.
    in_scope:
      - Автоматизированное модульное, интеграционное и сквозное тестирование продукта
      - Триаж и устранение дефектов
    out_of_scope:
      - Корпоративная система менеджмента качества (входит в Управление качеством)
      - Нагрузочное и нагрузочное тестирование работающего сервиса (входит в Управление операциями SaaS-платформы)
  BC-4200.50.10:
    name: Определение стратегии тестирования
    description: |
      Определение стратегии тестирования на уровнях модульного, интеграционного, сквозного и исследовательского тестирования.
  BC-4200.50.20:
    name: Управление автотестами
    description: |
      Управление автотестами: покрытие, нестабильность и время выполнения.
  BC-4200.50.30:
    name: Триаж и устранение дефектов
    description: |
      Триаж и устранение дефектов, выявленных в продукте.
  BC-4200.50.40:
    name: Управление регрессионным покрытием
    description: |
      Управление регрессионным покрытием по мере эволюции продуктовой поверхности.
  BC-4200.60:
    name: Управление открытым исходным кодом
    description: |
      Использование входящего открытого кода, внешние вклады и артефакты цепочки поставок для встроенного в продукт программного обеспечения с открытым исходным кодом.
  BC-4200.60.10:
    name: Соответствие требованиям входящего открытого кода
    description: |
      Соответствие лицензиям входящего открытого кода и обязательствам по уведомлениям.
  BC-4200.60.20:
    name: Внешние вклады в открытый исходный код
    description: |
      Управление внешними вкладами в проекты с открытым исходным кодом.
  BC-4200.60.30:
    name: Управление перечнем программных компонентов
    description: |
      Генерация, распространение и ведение перечней программных компонентов (SBOM) в стандартных форматах.
  BC-4200.70:
    name: Управление инженерной производительностью
    description: |
      Внутренние платформы разработчиков, инструментарий и измерение инженерной эффективности для поддержания устойчивой производительности поставки.
  BC-4200.70.10:
    name: Управление инструментарием разработчиков
    description: |
      Выбор и управление инструментарием разработчиков в инженерной организации.
  BC-4200.70.20:
    name: Управление внутренней платформой разработчиков
    description: |
      Эксплуатация внутренних платформ, абстрагирующих инфраструктуру и потоки работ для инженеров.
  BC-4200.70.30:
    name: Метрики инженерной эффективности
    description: |
      Измерение инженерной эффективности с помощью метрик поставки и опыта разработчиков.

# Омологация и одобрение типа транспортного средства (ru) — translations for L1-vehicle-homologation-type-approval-management.yaml
locale: ru
source: L1-vehicle-homologation-type-approval-management.yaml
entries:
  BC-3420:
    name: Омологация и одобрение типа транспортного средства
    description: |
      Регуляторная сертификация транспортных средств и основных компонентов
      на рынках — одобрение типа ТС UNECE WP.29, самосертификация FMVSS,
      региональные одобрения (CCC, KS, MLIT), омологация эмиссий и энергии,
      краш-испытания и потребительские рейтинги, аудиты соответствия производства.
  BC-3420.10:
    name: Стратегия и планирование одобрения типа ТС
    description: |
      Межрыночная стратегия омологации и её планирование, включая взаимодействие
      с органами по одобрению и выполнение планов омологации.
  BC-3420.10.10:
    name: Стратегия одобрения на рынке
    description: |
      Стратегия одобрения типа ТС и сертификации на целевых рынках
      в различных регуляторных режимах.
  BC-3420.10.20:
    name: Управление планом омологации
    description: |
      Управление планами омологации программы, результатами
      и вехами на уровне программы.
  BC-3420.10.30:
    name: Взаимодействие с органами по одобрению
    description: |
      Взаимодействие с органами по одобрению типа ТС и техническими
      службами в различных юрисдикциях.
  BC-3420.20:
    name: Подача заявок на одобрение типа ТС
    description: |
      Подготовка и подача досье на одобрение типа ТС и самосертификацию
      в режимах UNECE, FMVSS и региональных.
  BC-3420.20.10:
    name: Управление досье одобрения UNECE
    description: |
      Подготовка, подача и ведение досье одобрения типа ТС UNECE WP.29
      для всего транспортного средства.
  BC-3420.20.20:
    name: Управление самосертификацией FMVSS
    description: |
      Управление доказательной базой самосертификации по FMVSS / 49 CFR 571
      в Соединённых Штатах.
  BC-3420.20.30:
    name: Управление региональными заявками
    description: |
      Управление заявками для CCC, KS, MLIT, GCC и других региональных
      режимов одобрения транспортных средств.
  BC-3420.20.40:
    name: Управление изменениями и расширениями одобрения
    description: |
      Управление вариациями, расширениями и пересмотрами одобрений
      на протяжении жизненного цикла транспортного средства.
  BC-3420.30:
    name: Омологация эмиссий и расхода энергии
    description: |
      Омологация выбросов транспортных средств, расхода энергии и запаса
      хода ЭТС по WLTP, RDE, EPA, CARB, Китаю и эквивалентным режимам.
  BC-3420.30.10:
    name: Проведение циклов испытаний выбросов
    description: |
      Проведение циклов испытаний выбросов и экономии топлива
      WLTP, FTP-75, китайских и других нормативных.
  BC-3420.30.20:
    name: Соответствие выбросам при реальном движении
    description: |
      Кампании испытаний выбросов при реальном движении и демонстрация
      соответствия для эксплуатационного соответствия.
  BC-3420.30.30:
    name: Отчётность по CO2 и расходу топлива
    description: |
      Регуляторная отчётность по CO2 и расходу топлива согласно правилам
      по флотам CO2 ЕС, CAFE и эквивалентам.
  BC-3420.30.40:
    name: Омологация запаса хода и эффективности ЭТС
    description: |
      Омологация запаса хода, расхода энергии и метрик зарядки
      электрических транспортных средств на рынках.
  BC-3420.40:
    name: Омологация по краш-безопасности и защите пассажиров
    description: |
      Регуляторная омологация краш-испытаний, защиты пассажиров и
      пешеходов наряду с потребительскими рейтинговыми программами.
  BC-3420.40.10:
    name: Управление программой краш-испытаний
    description: |
      Планирование и проведение нормативных краш-испытаний
      и омологационных кампаний.
  BC-3420.40.20:
    name: Одобрение систем удержания
    description: |
      Одобрение ремней безопасности, подушек безопасности и анкеров
      крепления детских удерживающих устройств в различных регуляторных режимах.
  BC-3420.40.30:
    name: Одобрение защиты пешеходов
    description: |
      Омологация защиты пешеходов и уязвимых участников дорожного движения
      по UNECE GTR 9 и эквивалентам.
  BC-3420.40.40:
    name: Управление программой NCAP
    description: |
      Управление программами потребительских краш-рейтингов, включая
      Euro NCAP, IIHS, NHTSA NCAP и региональные NCAP.
  BC-3420.50:
    name: Функциональное и кибернетическое одобрение
    description: |
      Деятельность по одобрению типа ТС, специфичная для UN R155 по
      кибербезопасности, UN R156 по обновлениям ПО и UN R157 по ALKS/ADS.
    in_scope:
      - Аудиты CSMS и одобрение типа ТС
      - Аудиты SUMS и одобрение типа ТС
      - Регуляторные подачи по ALKS/ADS
    out_of_scope:
      - Инженерные работы по кибербезопасности (BC-3400.80)
      - Операции SOC транспортных средств (BC-3460.60)
  BC-3420.50.10:
    name: Управление одобрением типа CSMS
    description: |
      Одобрение типа ТС системы управления кибербезопасностью по UN R155,
      включая подготовку к аудиту и надзор.
  BC-3420.50.20:
    name: Управление одобрением типа SUMS
    description: |
      Одобрение типа ТС системы управления обновлениями ПО по UN R156,
      включая подготовку к аудиту и надзор.
  BC-3420.50.30:
    name: Управление одобрением ALKS и ADS
    description: |
      Регуляторные подачи для систем автоматического удержания в полосе
      и более широких систем автоматизированного вождения по UN R157 и новым нормам.
  BC-3420.60:
    name: Одобрение типа компонентов и систем
    description: |
      Одобрение типа компонентов для таких систем, как освещение, ЭМС,
      шины и тормоза, необходимое для одобрения всего транспортного средства.
  BC-3420.60.10:
    name: Одобрение освещения и сигнализации
    description: |
      Одобрение фар, сигнальных устройств
      и систем адаптивного освещения.
  BC-3420.60.20:
    name: Одобрение ЭМС
    description: |
      Одобрение электромагнитной совместимости транспортного средства
      и электронных узлов по UN R10.
  BC-3420.60.30:
    name: Одобрение шин и колёс
    description: |
      Одобрение шин и колёс и маркировка по режимам UNECE
      и региональным режимам.
  BC-3420.60.40:
    name: Одобрение тормозных и рулевых компонентов
    description: |
      Одобрение компонентов тормозной и рулевой систем по UN R13/R13H,
      R79 и эквивалентам.
  BC-3420.70:
    name: Управление соответствием производства
    description: |
      Аудиты соответствия производства и постоянная верификация
      производственных образцов относительно утверждённых спецификаций.
  BC-3420.70.10:
    name: Управление аудитами CoP
    description: |
      Управление аудитами соответствия производства органами по одобрению
      и техническими службами.
  BC-3420.70.20:
    name: Верификация производственных образцов
    description: |
      Верификация производственных образцов на соответствие
      спецификациям и допускам утверждённого типа.
  BC-3420.70.30:
    name: Надзор за эксплуатационным соответствием
    description: |
      Испытания и надзор за эксплуатационным соответствием для
      подтверждения продолжающегося соблюдения требований после запуска.

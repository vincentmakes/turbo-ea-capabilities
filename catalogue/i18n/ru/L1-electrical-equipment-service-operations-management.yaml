# Управление сервисными операциями электрооборудования (ru) — translations for L1-electrical-equipment-service-operations-management.yaml
locale: ru
source: L1-electrical-equipment-service-operations-management.yaml
entries:
  BC-1960:
    name: Управление сервисными операциями электрооборудования
    description: |
      Сервис, организуемый производителем на поставленном оборудовании: обследование площадки, FAT и SAT, включение, настройки защит, управление конфигурацией установленного оборудования, модернизация, контракты на основе показателей эффективности и мониторинг состояния.
  BC-1960.10:
    name: Обследование площадки и предпуско-наладочная инженерия
    description: |
      Обследование площадки и инженерная подготовка перед вводом оборудования в эксплуатацию.
  BC-1960.10.10:
    name: Проведение обследования площадки
    description: |
      Проведение обследований площадки для фиксации фактического состояния.
  BC-1960.10.20:
    name: Оценка готовности площадки
    description: |
      Оценка готовности площадки к поставке и включению оборудования.
  BC-1960.10.30:
    name: Предпуско-наладочные инженерные исследования
    description: |
      Инженерные исследования перед пуском, включая координацию и заземление.
  BC-1960.20:
    name: Координация заводских приёмочных испытаний
    description: |
      Планирование и проведение заводских приёмочных испытаний в присутствии заказчика.
  BC-1960.20.10:
    name: Составление плана FAT
    description: |
      Составление планов FAT в соответствии с договорными требованиями.
  BC-1960.20.20:
    name: Координация присутствия на FAT
    description: |
      Координация присутствия заказчика и органа по сертификации на FAT.
  BC-1960.20.30:
    name: Управление перечнем замечаний FAT
    description: |
      Отслеживание и закрытие замечаний, выявленных в ходе FAT.
  BC-1960.30:
    name: Управление объектовыми приёмочными испытаниями и включением
    description: |
      Объектовые приёмочные испытания, включение и надзор за начальной эксплуатацией.
  BC-1960.30.10:
    name: Проведение объектовых приёмочных испытаний
    description: |
      Проведение объектовых приёмочных испытаний установленного оборудования.
  BC-1960.30.20:
    name: Выполнение процедуры включения
    description: |
      Контролируемое включение оборудования в соответствии с процедурами переключений.
  BC-1960.30.30:
    name: Надзор за начальной эксплуатацией
    description: |
      Надзор за начальной эксплуатацией и прогоном на надёжность.
  BC-1960.30.40:
    name: Приёмо-сдаточная документация
    description: |
      Формирование приёмо-сдаточного досье и исполнительной документации.
  BC-1960.40:
    name: Управление настройками защиты и управления
    description: |
      Разработка и применение настроек защиты и управления на установленном оборудовании.
  BC-1960.40.10:
    name: Исследование координации защит
    description: |
      Исследования координации защитных устройств в установленной сети.
  BC-1960.40.20:
    name: Расчёт уставок реле
    description: |
      Расчёт уставок реле защиты.
  BC-1960.40.30:
    name: Загрузка и верификация уставок
    description: |
      Загрузка файлов уставок в реле и верификация на объекте.
  BC-1960.50:
    name: Управление конфигурацией установленного оборудования
    description: |
      Ведение данных об установленной конфигурации по всей мировой базе.
  BC-1960.50.10:
    name: Реестр установленного оборудования
    description: |
      Реестр установленного оборудования по серийным номерам, объектам и заказчикам.
  BC-1960.50.20:
    name: Фиксация исполнительной конфигурации
    description: |
      Фиксация исполнительной конфигурации при вводе в эксплуатацию.
  BC-1960.50.30:
    name: Записи о модификациях установленного оборудования
    description: |
      Записи о модификациях установленного оборудования после ввода в эксплуатацию.
  BC-1960.60:
    name: Сервис по модернизации и дооснащению оборудования
    description: |
      Инженерное обеспечение и выполнение модернизации и дооснащения установленного оборудования.
  BC-1960.60.10:
    name: Инженерное обеспечение модернизации
    description: |
      Инженерное проектирование пакетов модернизации и дооснащения.
  BC-1960.60.20:
    name: Выполнение модернизации
    description: |
      Выполнение работ по модернизации и установке дооснащения на объекте.
  BC-1960.60.30:
    name: Валидация после модернизации
    description: |
      Валидационные испытания после проведения модернизации.
  BC-1960.70:
    name: Операции сервисных контрактов на основе показателей эффективности
    description: |
      Выполнение сервисных контрактов на основе показателей и результатов.
  BC-1960.70.10:
    name: Выполнение сервисного контракта на основе показателей
    description: |
      Выполнение сервисных обязательств на основе показателей эффективности.
  BC-1960.70.20:
    name: Отчётность по результатам уровня сервиса
    description: |
      Отчётность о достигнутых результатах и показателях уровня сервиса.
  BC-1960.70.30:
    name: Операции механизма разделения рисков
    description: |
      Выполнение механизмов бонусов и штрафов при разделении рисков.
  BC-1960.80:
    name: Предоставление услуг мониторинга состояния
    description: |
      Предоставление услуг дистанционного мониторинга состояния и прогнозной аналитики.
  BC-1960.80.10:
    name: Операции дистанционного мониторинга состояния
    description: |
      Работа центра дистанционного мониторинга состояния установленного оборудования.
  BC-1960.80.20:
    name: Предоставление диагностических инсайтов
    description: |
      Предоставление диагностических инсайтов заказчикам.
  BC-1960.80.30:
    name: Рекомендации по прогнозному техническому обслуживанию
    description: |
      Рекомендации по прогнозному техническому обслуживанию установленного оборудования.

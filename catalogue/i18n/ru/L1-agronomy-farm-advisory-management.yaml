# Агрономическое консультирование (ru) — translations for L1-agronomy-farm-advisory-management.yaml
locale: ru
source: L1-agronomy-farm-advisory-management.yaml
entries:
  BC-3530:
    name: Агрономическое консультирование
    description: |
      Почвенное тестирование, планирование питания и защиты растений,
      интегрированная защита от вредителей, сортовые рекомендации,
      консультационные услуги и управление полевыми испытаниями,
      переводящие агрономическую науку в полевые решения.
  BC-3530.10:
    name: Почвенное тестирование и анализ
    description: |
      Отбор образцов, лабораторный анализ и интерпретация почвенных
      тестов для принятия решений по питанию и поправкам.
  BC-3530.10.10:
    name: Операции почвенного зондирования
    description: |
      Почвенное зондирование по сетке, зональным и составным методам.
  BC-3530.10.20:
    name: Интерпретация результатов почвенного теста
    description: |
      Интерпретация результатов почвенного теста с учётом
      требований культур.
  BC-3530.10.30:
    name: Отслеживание показателей здоровья почвы
    description: |
      Отслеживание показателей здоровья почвы по полям
      с течением времени.
  BC-3530.20:
    name: Планирование управления питанием
    description: |
      Расчёт потребностей культуры в питательных веществах и создание
      карт дифференцированного внесения в соответствии с 4R-управлением.
    in_scope:
      - Расчёт потребностей в питательных веществах
      - Создание карт дифференцированного внесения
      - Запись соответствия 4R
    out_of_scope:
      - Внесение удобрений (BC-3500.40)
      - Программы углерода почвы (BC-3600.50)
  BC-3530.20.10:
    name: Расчёт потребностей в питательных веществах
    description: |
      Расчёт потребностей в питательных веществах по культуре,
      целевой урожайности и полю.
  BC-3530.20.20:
    name: Создание карт дифференцированного внесения
    description: |
      Создание карт дифференцированного внесения
      для удобрений и поправок.
  BC-3530.20.30:
    name: Запись соответствия 4R
    description: |
      Запись правильного источника, нормы, времени и места
      в соответствии с 4R-управлением.
  BC-3530.30:
    name: Планирование защиты культур
    description: |
      Оценка рисков, планирование интегрированной защиты от вредителей,
      разработка программы обработок и стратегия управления резистентностью.
  BC-3530.30.10:
    name: Оценка рисков вредителей и болезней
    description: |
      Оценка рисков вредителей и болезней с использованием прогнозов
      и полевой информации.
  BC-3530.30.20:
    name: Планирование интегрированной защиты от вредителей
    description: |
      Планирование ИПМ, объединяющей агротехнические, биологические
      и химические меры.
  BC-3530.30.30:
    name: Разработка программы обработок
    description: |
      Разработка сезонной программы обработок с балансированием
      эффективности, остатков и стоимости.
  BC-3530.30.40:
    name: Планирование управления резистентностью
    description: |
      Планирование управления резистентностью пестицидов
      по механизмам действия.
  BC-3530.40:
    name: Сортовые и гибридные рекомендации
    description: |
      Анализ данных сортовых испытаний и выдача адаптированных
      к местным условиям сортовых и гибридных рекомендаций.
  BC-3530.40.10:
    name: Анализ результатов сортовых испытаний
    description: |
      Статистический анализ результатов сортовых испытаний
      по площадкам и сезонам.
  BC-3530.40.20:
    name: Местные сортовые рекомендации
    description: |
      Выдача сортовых и гибридных рекомендаций по зоне
      и целевому использованию.
  BC-3530.50:
    name: Агрономические консультационные услуги
    description: |
      Выездные консультационные визиты, рекомендации на основе
      поддержки принятия решений и обучение агрономами-профессионалами.
  BC-3530.50.10:
    name: Проведение полевых консультационных визитов
    description: |
      Выездные консультационные визиты и передача рекомендаций.
  BC-3530.50.20:
    name: Рекомендации на основе поддержки принятия решений
    description: |
      Использование инструментов поддержки принятия решений
      для выдачи агрономических рекомендаций.
  BC-3530.50.30:
    name: Проведение обучения агропроизводителей
    description: |
      Проведение обучающих мероприятий и полевых дней.
  BC-3530.60:
    name: Управление полевыми испытаниями
    description: |
      Разработка, проведение и анализ повторных полевых испытаний
      для оценки агрономии, сортов и продуктов.
  BC-3530.60.10:
    name: Разработка плана испытаний
    description: |
      Статистический дизайн повторных и демонстрационных испытаний.
  BC-3530.60.20:
    name: Проведение испытаний и сбор данных
    description: |
      Полевое проведение испытаний и стандартизированный сбор данных.
  BC-3530.60.30:
    name: Анализ результатов испытаний
    description: |
      Статистический анализ результатов испытаний
      и отчётность для спонсоров.

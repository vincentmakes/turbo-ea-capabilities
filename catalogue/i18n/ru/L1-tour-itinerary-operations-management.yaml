# Управление туристическими маршрутами (ru) — translations for L1-tour-itinerary-operations-management.yaml
locale: ru
source: L1-tour-itinerary-operations-management.yaml
entries:
  BC-4100:
    name: Управление туристическими маршрутами
    description: |
      Операционная деятельность туроператора и компании по управлению направлениями — формирование турпродукта и контрактование поставщиков, принятие решений о вылете, доставка услуг гидами и сопровождающими, логистика в направлении, координация поставщиков, восстановление маршрутов и оформление документов путешественников.
    in_scope:
      - Формирование турпродукта и контрактование поставщиков
      - Пороговые значения заполняемости и решения о проведении/отмене вылета
      - Назначение, инструктаж и оценка работы гидов во время тура
      - Трансферы и экскурсии по направлению
      - Оперативное изменение маршрутов и восстановление при форс-мажоре
      - Оформление туристической документации и выдача ваучеров
    out_of_scope:
      - Определение мастер-продукта и пула инвентаря (BC-4000.30)
      - Жизненный цикл бронирования (BC-4020)
      - Операции круизных рейсов (BC-4090)
  BC-4100.10:
    name: Формирование и контрактование турпродукта
    description: |
      Формирование турпродуктов, контрактование поставщиков, калькуляция, маршрутизация и статус жизненного цикла по туристическим брендам.
  BC-4100.10.10:
    name: Контрактование поставщиков и переговоры об аллотментах
    description: |
      Контрактование поставщиков размещения, транспорта и активностей, включая переговоры об аллотментах.
  BC-4100.10.20:
    name: Калькуляция тура и маржинальный анализ
    description: |
      Калькуляция турпродуктов и формирование маржи относительно целевых продажных цен.
  BC-4100.10.30:
    name: Составление маршрута и прокладка пути
    description: |
      Составление маршрутов и прокладка пути по направлениям и компонентам поставщиков.
  BC-4100.10.40:
    name: Статус жизненного цикла турпродукта
    description: |
      Статус жизненного цикла турпродуктов от концепции и пилота до архивирования.
  BC-4100.20:
    name: Управление вылетами
    description: |
      Принятие решений о вылетах с учётом минимального порога участников, аллокации, консолидации брендов и отмены или замены.
  BC-4100.20.10:
    name: Пороговое решение о проведении или отмене вылета
    description: |
      Принятие решений о проведении запланированных вылетов на основе минимального порога участников.
  BC-4100.20.20:
    name: Аллокация вылетов и высвобождение инвентаря
    description: |
      Решения об аллокации мест и высвобождении инвентаря по вылетам.
  BC-4100.20.30:
    name: Консолидация вылетов по брендам
    description: |
      Консолидация низкорентабельных вылетов по дочерним брендам или партнёрским операторам.
  BC-4100.20.40:
    name: Отмена и замена вылетов
    description: |
      Отмена нерентабельных вылетов и перевод на альтернативные даты вылета.
  BC-4100.30:
    name: Операции гидов и сопровождающих
    description: |
      Назначение, инструктаж, оценка эффективности и координация местных гидов при проведении туров.
  BC-4100.30.10:
    name: Назначение гидов и туристических директоров
    description: |
      Назначение гидов и туристических директоров на вылеты с учётом языковых и маршрутных требований.
  BC-4100.30.20:
    name: Предтуровый инструктаж и управление сценарием
    description: |
      Предтуровый инструктаж команды сопровождающих и управление сценариями и контентом маршрута.
  BC-4100.30.30:
    name: Мониторинг работы гидов во время тура
    description: |
      Мониторинг работы гидов в ходе тура на основе отзывов гостей и отчётов сопровождающих.
  BC-4100.30.40:
    name: Координация местных гидов
    description: |
      Координация местных гидов в направлениях с учётом городских и объектовых требований.
  BC-4100.40:
    name: Логистика и трансферы в направлении
    description: |
      Логистика в направлении: автобусные и транспортные услуги, трансферы аэропорт/отель, однодневные экскурсии и продажа билетов на активности.
  BC-4100.40.10:
    name: Автобусная и транспортная логистика
    description: |
      Логистика автобусных и транспортных услуг по маршруту.
  BC-4100.40.20:
    name: Трансферы аэропорт и отель
    description: |
      Организация трансферов аэропорт/отель для туристов.
  BC-4100.40.30:
    name: Операции однодневных экскурсий
    description: |
      Проведение однодневных экскурсий в рамках многодневных маршрутов.
  BC-4100.40.40:
    name: Операции продажи билетов на активности и аттракции
    description: |
      Продажа билетов на активности и аттракции, включая распределение временных слотов.
  BC-4100.50:
    name: Координация туристических поставщиков
    description: |
      Координация с компаниями по управлению направлениями, поставщиками размещения и активностей при операционном исполнении.
  BC-4100.50.10:
    name: Координация с DMC и местными операторами
    description: |
      Координация с компаниями по управлению направлениями и местными операторами, оказывающими туристические услуги.
  BC-4100.50.20:
    name: Координация поставщиков размещения
    description: |
      Координация с поставщиками размещения по размещению, времени заезда и специальным запросам.
  BC-4100.50.30:
    name: Координация поставщиков аттракций и активностей
    description: |
      Координация с поставщиками аттракций и активностей: доступ, вместимость и специальные условия.
  BC-4100.50.40:
    name: Операции оценки эффективности поставщиков
    description: |
      Операционная оценка эффективности туристических поставщиков на основе отзывов сопровождающих и опыта путешественников.
  BC-4100.60:
    name: Изменение и восстановление маршрутов
    description: |
      Оперативное изменение туристических маршрутов и восстановление при нарушениях, включая форс-мажор и изменения по инициативе путешественника.
  BC-4100.60.10:
    name: Оперативное изменение маршрута
    description: |
      Оперативное изменение маршрутов во время проведения тура в связи с операционными обстоятельствами.
  BC-4100.60.20:
    name: Восстановление маршрута при форс-мажоре
    description: |
      Восстановление маршрутов при форс-мажорных обстоятельствах: погода, забастовки и политические волнения.
  BC-4100.60.30:
    name: Изменение маршрута по инициативе путешественника
    description: |
      Обработка изменений по инициативе путешественника, влияющих на бронирования у поставщиков.
  BC-4100.60.40:
    name: Определение компенсации при восстановлении
    description: |
      Определение компенсации после изменений маршрута, включая возврат средств и жест доброй воли.
  BC-4100.70:
    name: Туристическая документация для клиентов
    description: |
      Выдача и переоформление финальных туристических документов, ваучеров, предотъездной информации и тур-специфических коммуникаций с путешественниками.
  BC-4100.70.10:
    name: Выдача финальных туристических документов
    description: |
      Выдача финальных туристических документов, включая окончательный маршрут и контакты для экстренной связи.
  BC-4100.70.20:
    name: Выдача ваучеров и сервисных документов
    description: |
      Выдача ваучеров и сервисных документов для предъявления у поставщиков.
  BC-4100.70.30:
    name: Предотъездный информационный пакет
    description: |
      Подготовка предотъездных информационных пакетов, включая рекомендации по здоровью, визовым требованиям и сборам.
  BC-4100.70.40:
    name: Переоформление туристических документов
    description: |
      Переоформление документов после изменений маршрута и данных путешественника.

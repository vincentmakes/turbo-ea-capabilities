# Управление оборонными программами (ru) — translations for L1-defense-programme-management.yaml
locale: ru
source: L1-defense-programme-management.yaml
entries:
  BC-1760:
    name: Управление оборонными программами
    description: |
      Реализация крупных программ, управление освоенным объёмом, управление программой и субподрядчиками.
  BC-1760.10:
    name: Управление приобретением в рамках программы
    description: |
      Стратегия приобретения, планирование программы и контрольные проверки по вехам.
  BC-1760.10.10:
    name: Определение стратегии приобретения
    description: |
      Определение стратегии приобретения в соответствии с DoD 5000 или эквивалентными стандартами.
  BC-1760.10.20:
    name: Планирование программы и базовое расписание
    description: |
      Планирование программы и базовое интегрированное главное расписание.
  BC-1760.10.30:
    name: Контрольные проверки по вехам
    description: |
      Подготовка и проведение контрольных проверок по ключевым вехам.
  BC-1760.20:
    name: Управление освоенным объёмом программы
    description: |
      Метод освоенного объёма, стоимостные и плановые показатели, базовый анализ.
  BC-1760.20.10:
    name: Функционирование системы освоенного объёма
    description: |
      Функционирование системы освоенного объёма, соответствующей EIA-748.
  BC-1760.20.20:
    name: Комплексный базовый анализ
    description: |
      Проведение комплексных базовых анализов с заказчиком.
  BC-1760.20.30:
    name: Анализ стоимостных и плановых показателей
    description: |
      Анализ метрик CV, SV, CPI, SPI и тенденций.
  BC-1760.20.40:
    name: Прогнозирование расчётной стоимости при завершении
    description: |
      Прогнозирование EAC и анализ индекса выполнения оставшейся работы.
  BC-1760.30:
    name: Управление стоимостью и ценообразованием программы
    description: |
      Стандарты учёта затрат, ценообразование для государственных контрактов.
  BC-1760.30.10:
    name: Соответствие стандартам учёта затрат
    description: |
      Соответствие стандартам учёта затрат (CAS).
  BC-1760.30.20:
    name: Ценообразование государственных контрактов
    description: |
      Ценообразование государственных контрактов в соответствии с FAR/DFARS.
  BC-1760.30.30:
    name: Оценка стоимости программы
    description: |
      Оценка стоимости программы и документирование обоснований.
  BC-1760.30.40:
    name: Управление накладными нормами
    description: |
      Расчёт норм накладных расходов и переговоры с государством.
  BC-1760.40:
    name: Управление взаимодействием с государственным заказчиком
    description: |
      Взаимоотношения с государственным заказчиком, взаимодействие с контрактными офицерами.
  BC-1760.40.10:
    name: Взаимодействие с контрактными офицерами
    description: |
      Взаимодействие с контрактными офицерами и представителями контрактных офицеров.
  BC-1760.40.20:
    name: Взаимодействие с офисом программы
    description: |
      Взаимодействие с государственными офисами программ и PMO.
  BC-1760.40.30:
    name: Отчётность и обзоры для заказчика
    description: |
      Периодическая отчётность для заказчика и обзоры управления программой.
  BC-1760.50:
    name: Управление субподрядчиками оборонных контрактов
    description: |
      Цепочка поставок для оборонного сектора, обязательные требования и планы малого бизнеса.
  BC-1760.50.10:
    name: Выбор и присуждение субподряда
    description: |
      Выбор и присуждение контрактов субподрядчикам для оборонных проектов.
  BC-1760.50.20:
    name: Администрирование обязательных условий контракта
    description: |
      Администрирование обязательных условий FAR/DFARS для субподрядчиков.
  BC-1760.50.30:
    name: Управление результативностью субподрядчиков
    description: |
      Контроль результативности и надзор за субподрядчиками.
  BC-1760.50.40:
    name: Управление планом малого бизнеса
    description: |
      Исполнение плана субподряда с малым бизнесом и отчётность.
  BC-1760.60:
    name: Управление жизненным циклом программы
    description: |
      Управление жизненным циклом в соответствии с DoD 5000 или эквивалентами, контрольные вехи.
  BC-1760.60.10:
    name: Управление фазами жизненного цикла
    description: |
      Управление фазами жизненного цикла программы в соответствии с DoD 5000 или эквивалентами.
  BC-1760.60.20:
    name: Управление рисками программы
    description: |
      Управление рисками и возможностями на уровне программы.
  BC-1760.60.30:
    name: Завершение программы и переход
    description: |
      Завершение программы, переход и закрытие контракта.

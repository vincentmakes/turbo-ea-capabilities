# Управление закупками (ru) — translations for L1-procurement-management.yaml
locale: ru
source: L1-procurement-management.yaml
entries:
  BC-500:
    name: Управление закупками
    description: |
      Sourcing, заключение договоров, закупки, операции P2P.
  BC-500.10:
    name: Управление sourcing'ом
    description: |
      Стратегический sourcing, RFx-процедуры, выбор поставщиков.
  BC-500.10.10:
    name: Определение стратегии sourcing'а
    description: |
      Определение стратегии sourcing'а по категориям и рынкам.
  BC-500.10.20:
    name: Проведение RFx-процедур
    description: |
      Подготовка, выпуск и оценка запросов RFI, RFQ и RFP.
  BC-500.10.30:
    name: Переговоры с поставщиками
    description: |
      Коммерческие и договорные переговоры с отобранными поставщиками.
  BC-500.10.40:
    name: Выбор и утверждение поставщика
    description: |
      Окончательный выбор поставщика, решение об утверждении и уведомление.
  BC-500.10.50:
    name: Операции обратного аукциона
    description: |
      Организация, проведение и подведение итогов электронного аукциона.
  BC-500.20:
    name: Управление закупочными договорами
    description: |
      Закупочные договоры, условия, жизненный цикл.
  BC-500.20.10:
    name: Разработка закупочных договоров и шаблонов
    description: |
      Шаблоны закупочных договоров, условия и сборники позиций.
  BC-500.20.20:
    name: Согласование и исполнение договора
    description: |
      Процедуры согласования, подписание и исполнение закупочных договоров.
  BC-500.20.30:
    name: Мониторинг исполнения договора
    description: |
      Контроль закупок у договорных поставщиков по согласованным ценам.
  BC-500.20.40:
    name: Пролонгация и пересмотр договора
    description: |
      Управление циклом пролонгации и пересмотр закупочных договоров.
  BC-500.30:
    name: Управление заказами на закупку
    description: |
      Создание, согласование и исполнение заказов на закупку.
  BC-500.30.10:
    name: Создание заказа на закупку
    description: |
      Формирование заказов на закупку из заявок, договоров или каталогов.
  BC-500.30.20:
    name: Согласование заказа на закупку
    description: |
      Пороговые процедуры согласования заказов на закупку.
  BC-500.30.30:
    name: Подтверждение и изменение заказа
    description: |
      Подтверждение поставщиком и управление изменениями заказа.
  BC-500.30.40:
    name: Закрытие заказа на закупку
    description: |
      Завершение получения, сопоставление со счётом и закрытие заказа.
  BC-500.40:
    name: Управление операциями «заявка — оплата»
    description: |
      Ежедневные операции P2P, заявки, получение товаров.
  BC-500.40.10:
    name: Управление заявками
    description: |
      Приём, согласование и конвертация заявок на закупку.
  BC-500.40.20:
    name: Управление каталогами и punch-out
    description: |
      Внутренние каталоги и punch-out поставщика для самостоятельных закупок.
  BC-500.40.30:
    name: Приёмка товаров и услуг
    description: |
      Регистрация приходных ордеров и актов приёмки услуг.
  BC-500.40.40:
    name: Сопоставление и выверка счетов
    description: |
      Двустороннее и трёхстороннее сопоставление счетов с заказами и приходными ордерами.
  BC-500.40.50:
    name: Служба поддержки P2P и поддержка закупщиков
    description: |
      Поддержка закупщиков и поставщиков при проведении P2P-операций.
  BC-500.50:
    name: Управление категориями закупок
    description: |
      Стратегия категорий, анализ расходов по категориям.
  BC-500.50.10:
    name: Разработка стратегии категории
    description: |
      Многолетняя стратегия категории и оценка рынка поставщиков.
  BC-500.50.20:
    name: Управление результативностью категории
    description: |
      Отслеживание KPI, экономия и создание ценности по категориям.
  BC-500.50.30:
    name: Агрегирование и стандартизация потребности
    description: |
      Консолидация потребности и стандартизация спецификаций по бизнес-единицам.
  BC-500.50.40:
    name: Sourcing инноваций по категориям
    description: |
      Выявление инноваций на рынках поставщиков.
  BC-500.60:
    name: Управление анализом закупочных расходов
    description: |
      Видимость расходов, отчётность, отслеживание экономии.
  BC-500.60.10:
    name: Агрегирование и очистка данных о расходах
    description: |
      Агрегирование, очистка и классификация данных о расходах предприятия.
  BC-500.60.20:
    name: Отчётность и аналитика расходов
    description: |
      Аналитика расходов, дашборды и выявление управляемых расходов.
  BC-500.60.30:
    name: Отслеживание и валидация экономии
    description: |
      Регистрация, валидация и отчётность об экономии от закупок.
  BC-500.60.40:
    name: Управление хвостовыми расходами
    description: |
      Выявление и рационализация хвостовых расходов.

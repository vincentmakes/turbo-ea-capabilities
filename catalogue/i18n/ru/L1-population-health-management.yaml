# Здоровье населения (ru) — translations for L1-population-health-management.yaml
locale: ru
source: L1-population-health-management.yaml
entries:
  BC-2880:
    name: Здоровье населения
    description: |
      Стратификация рисков, профилактическая помощь, управление хроническими заболеваниями, операции по ценностно-ориентированной помощи, управление панелями и прикреплением, а также популяционная аналитика для прикреплённых и рисковых популяций.
  BC-2880.10:
    name: Стратификация и выявление рисков
    description: |
      Прогностическое моделирование и выявление популяций с нарастающим риском и пробелами в помощи.
  BC-2880.10.10:
    name: Прогностическое моделирование рисков
    description: |
      Разработка и применение прогностических моделей рисков по стоимости и клиническим исходам.
  BC-2880.10.20:
    name: Выявление пациентов с нарастающим риском
    description: |
      Выявление пациентов с нарастающим риском для раннего вмешательства.
  BC-2880.10.30:
    name: Определение когорт
    description: |
      Определение и ведение клинических когорт для популяционных программ.
  BC-2880.10.40:
    name: Выявление пробелов в помощи
    description: |
      Выявление доказательных пробелов в помощи по популяциям.
  BC-2880.20:
    name: Профилактическая помощь и укрепление здоровья
    description: |
      Программы скрининга, иммунизации, оценки рисков для здоровья и велнес-коучинга.
  BC-2880.20.10:
    name: Охват профилактическими обследованиями
    description: |
      Охват населения доказательными профилактическими обследованиями.
  BC-2880.20.20:
    name: Программы иммунизации
    description: |
      Программы иммунизации взрослых и детей.
  BC-2880.20.30:
    name: Оценка рисков для здоровья
    description: |
      Проведение оценки рисков для здоровья и последующее наблюдение.
  BC-2880.20.40:
    name: Велнес-коучинг
    description: |
      Программы коучинга по здоровому образу жизни и благополучию.
  BC-2880.30:
    name: Управление хроническими заболеваниями
    description: |
      Болезнь-специфические программы ведения основных хронических заболеваний.
  BC-2880.30.10:
    name: Программы ведения диабета
    description: |
      Программы ведения диабета, включая обучение и дистанционный мониторинг.
  BC-2880.30.20:
    name: Программы ведения сердечно-сосудистых заболеваний
    description: |
      Программы ведения сердечно-сосудистых заболеваний и гипертонии.
  BC-2880.30.30:
    name: Интеграция психиатрической помощи
    description: |
      Интеграция психиатрической помощи в первичную и хроническую медицинскую помощь.
  BC-2880.30.40:
    name: Программы ведения лёгочных заболеваний
    description: |
      Программы ведения бронхиальной астмы, хронической обструктивной болезни лёгких и заболеваний органов дыхания.
  BC-2880.40:
    name: Операции по ценностно-ориентированной помощи
    description: |
      Операции по программам ответственной помощи, пакетной оплаты и ценностно-ориентированным контрактам.
  BC-2880.40.10:
    name: Операции ответственной помощи
    description: |
      Операции организаций ответственной помощи и программ разделения экономии.
  BC-2880.40.20:
    name: Операции пакетной оплаты
    description: |
      Операции по поддержке программ эпизодической пакетной оплаты.
  BC-2880.40.30:
    name: Отслеживание качественных показателей
    description: |
      Отслеживание качественных показателей по требованиям ценностно-ориентированных программ.
  BC-2880.40.40:
    name: Сверка разделённой экономии
    description: |
      Сверка расчётов по разделённой экономии и рисковым соглашениям со страховщиками.
  BC-2880.50:
    name: Управление панелями и прикреплением пациентов
    description: |
      Прикрепление пациентов к врачам, размер панели, отслеживание непрерывности и сверка атрибуции.
  BC-2880.50.10:
    name: Прикрепление пациентов к врачу
    description: |
      Прикрепление пациентов к врачам первичной помощи и командам.
  BC-2880.50.20:
    name: Управление размером панели
    description: |
      Управление размером, составом и мощностью панели.
  BC-2880.50.30:
    name: Отслеживание непрерывности помощи
    description: |
      Отслеживание показателей непрерывности помощи по панелям.
  BC-2880.50.40:
    name: Сверка атрибуции
    description: |
      Сверка списков атрибуции страховщиков с внутренними данными панели.
  BC-2880.60:
    name: Популяционная аналитика и отчётность
    description: |
      Популяционная аналитика по справедливости, результатам качественных программ, стоимости, утилизации и бенчмаркингу исходов.
  BC-2880.60.10:
    name: Аналитика здоровой справедливости
    description: |
      Аналитика различий, социальных детерминант и исходов справедливости.
  BC-2880.60.20:
    name: Отчётность по качественным программам
    description: |
      Отчётность по качественным программам, таким как звёздные рейтинги и показатели качества.
  BC-2880.60.30:
    name: Аналитика стоимости и утилизации
    description: |
      Аналитика стоимости, утилизации и предотвратимых расходов.
  BC-2880.60.40:
    name: Бенчмаркинг клинических исходов
    description: |
      Бенчмаркинг клинических исходов по партнёрским и национальным наборам данных.

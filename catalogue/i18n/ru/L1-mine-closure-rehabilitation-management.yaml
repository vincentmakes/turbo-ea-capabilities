# Закрытие рудников и рекультивация земель (ru) — translations for L1-mine-closure-rehabilitation-management.yaml
locale: ru
source: L1-mine-closure-rehabilitation-management.yaml
entries:
  BC-4470:
    name: Закрытие рудников и рекультивация земель
    description: |
      Планирование закрытия, финансовое обеспечение, поэтапная рекультивация,
      вывод из эксплуатации и управление землями и инфраструктурой горнодобывающих
      предприятий после прекращения работ.
  BC-4470.10:
    name: Планирование закрытия
    description: |
      Разработка концептуальных и детальных планов закрытия с привлечением
      заинтересованных сторон и получением одобрения регуляторов.
    in_scope:
      - Концептуальные планы закрытия и планы на весь срок службы актива
      - Детальные пересмотры планов закрытия перед прекращением работ
      - Консультации с регуляторами и сообществами по вопросам закрытия
    out_of_scope:
      - Инструменты финансового обеспечения (BC-4470.20)
  BC-4470.10.10:
    name: Разработка концептуального плана закрытия
    description: |
      Разработка концептуальных планов закрытия на ранних стадиях проекта.
  BC-4470.10.20:
    name: Разработка детального плана закрытия
    description: |
      Разработка детальных планов закрытия для утверждения регуляторами перед
      прекращением деятельности.
  BC-4470.10.30:
    name: Взаимодействие с заинтересованными сторонами по закрытию
    description: |
      Взаимодействие с регуляторами, сообществами и традиционными владельцами
      по вопросам результатов закрытия.
  BC-4470.20:
    name: Финансовое обеспечение закрытия
    description: |
      Оценка затрат, управление инструментами финансового обеспечения и учёт
      резервов на ликвидацию.
  BC-4470.20.10:
    name: Оценка затрат на закрытие
    description: |
      Оценка затрат на закрытие, охватывающая рекультивацию, вывод из эксплуатации
      и мероприятия после закрытия.
  BC-4470.20.20:
    name: Управление инструментами финансового обеспечения
    description: |
      Управление облигациями, гарантиями и поручительными инструментами,
      представленными регуляторам.
  BC-4470.20.30:
    name: Учёт резервов на ликвидацию
    description: |
      Периодическая переоценка и признание резервов на ликвидацию в финансовой
      отчётности.
  BC-4470.30:
    name: Операционная поэтапная рекультивация
    description: |
      Одновременная рекультивация нарушенных земель в ходе эксплуатации,
      включая формирование рельефа, восстановление растительности и
      восстановление водотоков.
  BC-4470.30.10:
    name: Формирование рельефа
    description: |
      Придание устойчивых профилей закрытия отвалам, бортам карьеров и
      хвостохранилищам.
  BC-4470.30.20:
    name: Восстановление почвенного покрова и растительности
    description: |
      Возврат складированного плодородного слоя почвы и создание покрова из
      аборигенной растительности.
  BC-4470.30.30:
    name: Восстановление водотоков
    description: |
      Восстановление естественных и искусственных водотоков на рекультивированных
      землях.
  BC-4470.30.40:
    name: Поэтапный вывод инфраструктуры из эксплуатации
    description: |
      Поэтапный вывод из эксплуатации избыточной производственной инфраструктуры
      в ходе работы предприятия.
  BC-4470.40:
    name: Демонтаж горного объекта
    description: |
      Демонтаж в конце срока эксплуатации, продажа активов и расчистка
      территории после прекращения работ.
  BC-4470.40.10:
    name: Демонтаж технологического оборудования
    description: |
      Демонтаж обогатительного оборудования, горной инфраструктуры и наземных
      сооружений.
  BC-4470.40.20:
    name: Ликвидация и утилизация активов
    description: |
      Реализация, утилизация или передача горного и перерабатывающего оборудования
      при выводе из эксплуатации.
  BC-4470.40.30:
    name: Работы по расчистке территории
    description: |
      Расчистка загрязнённых почв, нефтепродуктов и складированных материалов
      при выводе из эксплуатации.
  BC-4470.50:
    name: Управление объектом после закрытия
    description: |
      Долгосрочный мониторинг, передача и управление унаследованными
      обязательствами после прекращения деятельности.
  BC-4470.50.10:
    name: Долгосрочный экологический мониторинг
    description: |
      Проведение долгосрочных программ мониторинга водных ресурсов, геотехнических
      параметров и состояния растительности.
  BC-4470.50.20:
    name: Управление передачей и отказом от прав
    description: |
      Управление процессами передачи земель, прекращения аренды и
      официального одобрения регуляторов.
  BC-4470.50.30:
    name: Учёт унаследованных экологических обязательств
    description: |
      Учёт и раскрытие информации об остаточных унаследованных экологических
      обязательствах.

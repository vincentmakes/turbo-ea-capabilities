# Урегулирование страховых убытков (ru) — translations for L1-insurance-claims-management.yaml
locale: ru
source: L1-insurance-claims-management.yaml
entries:
  BC-2160:
    name: Урегулирование страховых убытков
    description: |
      Первичное уведомление об убытке, сортировка, расследование, резервирование, урегулирование,
      выплата, взыскание и суброгация, судебные разбирательства, выявление мошенничества и реагирование
      на катастрофические события по всем видам страхования.
  BC-2160.10:
    name: Управление первичным уведомлением об убытке
    description: |
      Многоканальный приём первичных уведомлений, проверка покрытия, регистрация и подтверждение.
  BC-2160.10.10:
    name: Многоканальный приём уведомлений об убытке
    description: |
      Приём первичных уведомлений об убытке по телефону, цифровым каналам, через брокеров и IoT.
  BC-2160.10.20:
    name: Первичная проверка страхового покрытия
    description: |
      Проверка того, что убыток подпадает под страховое покрытие на дату его наступления.
  BC-2160.10.30:
    name: Регистрация убытка
    description: |
      Регистрация новых убытков и присвоение идентификаторов дел.
  BC-2160.10.40:
    name: Подтверждение и информирование
    description: |
      Первоначальное подтверждение для заявителя и текущее информирование о статусе убытка.
  BC-2160.20:
    name: Сортировка и сегментация убытков
    description: |
      Оценка тяжести, маршрутизация по ускоренной схеме, назначение регулировщика и направление к специалистам.
  BC-2160.20.10:
    name: Оценка тяжести и сложности убытка
    description: |
      Оценка тяжести и сложности убытка для принятия решений о маршрутизации.
  BC-2160.20.20:
    name: Маршрутизация ускоренной обработки
    description: |
      Направление убытков с низкой степенью тяжести по схеме ускоренной обработки.
  BC-2160.20.30:
    name: Назначение регулировщика убытков
    description: |
      Назначение убытков регулировщикам с учётом квалификации, загруженности и географии.
  BC-2160.20.40:
    name: Маршрутизация к специалистам и юридическим службам
    description: |
      Направление сложных, специализированных и судебных убытков в специализированные группы.
  BC-2160.30:
    name: Расследование и урегулирование убытков
    description: |
      Выездное и камеральное урегулирование, оценка ущерба, определение ответственности и консультации экспертов.
  BC-2160.30.10:
    name: Выездное и камеральное урегулирование
    description: |
      Выездное и камеральное урегулирование убытков, включая выезды на место.
  BC-2160.30.20:
    name: Оценка ущерба и потерь
    description: |
      Оценка ущерба, размера потерь и объёма ремонта или замены.
  BC-2160.30.30:
    name: Определение ответственности
    description: |
      Определение ответственности и страховых выплат по убыткам третьих лиц.
  BC-2160.30.40:
    name: Консультации профильных экспертов
    description: |
      Консультации с оценщиками, инженерами, медицинскими экспертами и судебными бухгалтерами.
  BC-2160.40:
    name: Управление резервами по убыткам
    description: |
      Первоначальное установление резервов, пересмотр и координация по IBNR.
  BC-2160.40.10:
    name: Первоначальное установление резерва
    description: |
      Установление первоначального резерва по зарегистрированным убыткам.
  BC-2160.40.20:
    name: Пересмотр резерва
    description: |
      Периодический пересмотр резервов по мере поступления новой информации.
  BC-2160.40.30:
    name: Координация IBNR с актуарным подразделением
    description: |
      Взаимодействие с актуарным подразделением по IBNR-резервам на уровне портфеля.
  BC-2160.50:
    name: Урегулирование и выплата убытков
    description: |
      Переговоры об урегулировании, выплата возмещения и расходов, реализация остатков и суброгация.
  BC-2160.50.10:
    name: Переговоры об урегулировании убытка
    description: |
      Переговоры о сумме урегулирования со страхователями и третьими лицами.
  BC-2160.50.20:
    name: Выплата страхового возмещения
    description: |
      Выплата страхового возмещения застрахованным лицам и третьим сторонам.
  BC-2160.50.30:
    name: Выплата расходов по убыткам
    description: |
      Выплата ALAE и ULAE — распределённых и нераспределённых расходов на урегулирование убытков.
  BC-2160.50.40:
    name: Реализация остатков
    description: |
      Реализация и возмещение остаточной стоимости по урегулированным убыткам.
  BC-2160.50.50:
    name: Взыскание и суброгация
    description: |
      Взыскание с третьих лиц и других страховщиков и суброгация против них.
  BC-2160.60:
    name: Управление судебными разбирательствами по убыткам
    description: |
      Стратегия судебных разбирательств, координация защитных адвокатов и отслеживание судебных расходов.
  BC-2160.60.10:
    name: Стратегия судебных разбирательств
    description: |
      Определение стратегии по спорным убыткам и принятие решений об урегулировании или судебном процессе.
  BC-2160.60.20:
    name: Координация защитных адвокатов
    description: |
      Координация с привлечёнными и назначенными защитными адвокатами.
  BC-2160.60.30:
    name: Отслеживание судебных расходов
    description: |
      Отслеживание судебных расходов относительно тарифов и бюджетов.
  BC-2160.70:
    name: Управление мошенничеством и специальными расследованиями
    description: |
      Выявление подозрительных убытков, расследование специальными подразделениями, направление в правоохранительные органы и противомошеннический анализ.
  BC-2160.70.10:
    name: Выявление подозрительных убытков
    description: |
      Выявление подозрительных убытков с помощью правил, моделей и индикаторов риска.
  BC-2160.70.20:
    name: Расследование специальным подразделением
    description: |
      Работа специального следственного подразделения по предполагаемым мошенническим убыткам.
  BC-2160.70.30:
    name: Передача мошенничества в правоохранительные органы
    description: |
      Направление дел о мошенничестве в правоохранительные органы и отраслевые реестры.
  BC-2160.70.40:
    name: Противомошеннический анализ
    description: |
      Противомошеннический анализ портфелей убытков и сетевой анализ.
  BC-2160.80:
    name: Управление катастрофическими убытками
    description: |
      Активация при катастрофическом событии, наращивание мощностей, отслеживание катастрофических убытков и координация восстановления.
  BC-2160.80.10:
    name: Активация катастрофического реагирования
    description: |
      Активация процедур реагирования на катастрофы при объявленных событиях.
  BC-2160.80.20:
    name: Мобилизация дополнительных мощностей
    description: |
      Мобилизация дополнительных регулировщиков, подрядчиков и ресурсов контакт-центра.
  BC-2160.80.30:
    name: Сортировка и отслеживание катастрофических убытков
    description: |
      Сортировка и отслеживание убытков с катастрофическим кодом до момента урегулирования.
  BC-2160.80.40:
    name: Координация возмещения ущерба при катастрофе
    description: |
      Координация возмещений по перестрахованию и пулу при катастрофических событиях.

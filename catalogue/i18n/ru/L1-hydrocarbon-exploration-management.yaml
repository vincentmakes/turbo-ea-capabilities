# Геологоразведочные работы на углеводороды (ru) — translations for L1-hydrocarbon-exploration-management.yaml
locale: ru
source: L1-hydrocarbon-exploration-management.yaml
entries:
  BC-3000:
    name: Геологоразведочные работы на углеводороды
    description: |
      Выявление и получение новых углеводородных ресурсов: геофизические съёмки, оценка бассейнов и перспективных объектов, получение лицензий и концессий, решения по разведочному бурению.
  BC-3000.10:
    name: Управление геофизическими съёмками
    description: |
      Получение, обработка и интерпретация сейсмических и несейсмических геофизических данных для геологического изображения недр.
    in_scope:
      - Сейсмические съёмки 2D и 3D
      - Обработка и переработка сейсмических данных
      - Сейсмическая интерпретация для генерации перспективных объектов
    out_of_scope:
      - Геомоделирование резервуарного масштаба для разрабатываемых активов (BC-3010)
  BC-3000.10.10:
    name: Трёхмерная сейсмическая съёмка
    description: |
      Морская, наземная и придонная 3D сейсмическая съёмка.
  BC-3000.10.20:
    name: Двухмерная сейсмическая съёмка
    description: |
      Рекогносцировочная 2D сейсмическая съёмка.
  BC-3000.10.30:
    name: Несейсмическая геофизическая съёмка
    description: |
      Гравиметрическая, магнитная, электромагнитная и иные несейсмические съёмки.
  BC-3000.10.40:
    name: Обработка сейсмических данных
    description: |
      Предстековая и постстековая обработка, глубинная миграция и переработка сейсмических данных.
  BC-3000.10.50:
    name: Интерпретация сейсмических данных
    description: |
      Структурная и стратиграфическая интерпретация сейсмических объёмов для генерации перспективных объектов.
  BC-3000.20:
    name: Оценка бассейнов и перспективных объектов
    description: |
      Анализ нефтегазовых систем, картирование игровых трендов и оценка риска и объёмов разведочных объектов.
    in_scope:
      - Моделирование нефтегазовых систем
      - Инвентарь и ранжирование перспективных объектов
      - Вероятностная оценка объёмов
    out_of_scope:
      - Классификация запасов открытых объёмов (BC-3010.30)
  BC-3000.20.10:
    name: Анализ нефтегазовых систем
    description: |
      Анализ нефтематеринских пород, коллекторов, покрышек, ловушек и времени формирования для квалификации нефтегазовых систем.
  BC-3000.20.20:
    name: Картирование игровых трендов
    description: |
      Картирование региональных игровых трендов и зон общего риска по акватории.
  BC-3000.20.30:
    name: Управление инвентарём перспективных объектов
    description: |
      Ведение ранжированного инвентаря перспективных объектов и лидов и их зрелости.
  BC-3000.20.40:
    name: Оценка рисков перспективных объектов
    description: |
      Вероятностная оценка геологических шансов успеха перспективных объектов.
  BC-3000.20.50:
    name: Оценка объёмов
    description: |
      Вероятностная доразведочная оценка начальных и извлекаемых объёмов.
  BC-3000.30:
    name: Получение лицензий и концессий
    description: |
      Получение разведочных площадей через лицензионные раунды, прямые переговоры и фарминговые сделки.
    in_scope:
      - Скрининг и участие в лицензионных раундах
      - Подача заявок на концессии и соглашения о разделе продукции
      - Переговоры по фарм-ин и фарм-аут
    out_of_scope:
      - Отслеживание текущих лицензионных обязательств (BC-3110.40)
  BC-3000.30.10:
    name: Скрининг лицензионных раундов
    description: |
      Скрининг лицензионных раундов принимающих правительств для принятия решений об участии.
  BC-3000.30.20:
    name: Конкурсные заявки на концессии
    description: |
      Подготовка и подача конкурентных заявок на концессии и соглашения о разделе продукции.
  BC-3000.30.30:
    name: Переговоры по фарм-ин и фарм-аут
    description: |
      Переговоры по сделкам фарм-ин, фарм-аут и обмену площадями.
  BC-3000.30.40:
    name: Управление портфелем площадей
    description: |
      Ведение портфеля разведочных площадей и решения по рационализации.
  BC-3000.40:
    name: Управление программой разведочного бурения
    description: |
      Определение, утверждение и послескважинная оценка программ поисково-разведочного бурения.
  BC-3000.40.10:
    name: Определение программы разведочных скважин
    description: |
      Определение задач и последовательности поисковых и оценочных скважин.
  BC-3000.40.20:
    name: Утверждение поисковых скважин
    description: |
      Внутреннее и партнёрское согласование бурения поисковых скважин.
  BC-3000.40.30:
    name: Управление программой оценочных скважин
    description: |
      Управление программой оценочных скважин после открытия.
  BC-3000.40.40:
    name: Послескважинная оценка
    description: |
      Послескважинная геологическая оценка и фиксация выводов для инвентаря объектов.
  BC-3000.50:
    name: Управление разведочным портфелем
    description: |
      Стратегическое управление разведочным портфелем по географиям, игровым трендам и классам риска.
  BC-3000.50.10:
    name: Определение разведочной стратегии
    description: |
      Определение разведочной стратегии по бассейнам, игровым трендам и классам риска.
  BC-3000.50.20:
    name: Распределение разведочных инвестиций
    description: |
      Распределение разведочного капитала по географиям и типам игровых трендов.
  BC-3000.50.30:
    name: Отслеживание разведочных показателей
    description: |
      Отслеживание поисковой стоимости ресурса, коэффициентов успешности и прироста ресурсной базы.
  BC-3000.60:
    name: Отчётность об открытиях
    description: |
      Уведомление об открытиях принимающих правительств, партнёров и рынков капитала, отслеживание зрелости ресурсов до принятия инвестиционного решения по разработке.
  BC-3000.60.10:
    name: Уведомление об открытиях
    description: |
      Уведомление принимающих правительств, партнёров и раскрытие рынкам капитала.
  BC-3000.60.20:
    name: Отслеживание зрелости ресурсов
    description: |
      Отслеживание условных ресурсов от открытия до принятия инвестиционного решения.

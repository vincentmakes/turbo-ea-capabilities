# Управление выставлением счетов и выручкой по подпискам (ru) — translations for L1-subscription-billing-revenue-management.yaml
locale: ru
source: L1-subscription-billing-revenue-management.yaml
entries:
  BC-4250:
    name: Управление выставлением счетов и выручкой по подпискам
    description: |
      Учёт потребления, тарификация, выставление счетов, работа с должниками, признание выручки по подпискам, налогообложение подписок и аналитика повторяющейся выручки для коммерческой модели SaaS.
  BC-4250.10:
    name: Учёт потребления
    description: |
      Приём и агрегирование событий потребления для последующей тарификации и аналитики.
  BC-4250.10.10:
    name: Приём событий потребления
    description: |
      Приём событий потребления из сервисов продукта в конвейер учёта.
  BC-4250.10.20:
    name: Агрегирование потребления
    description: |
      Агрегирование событий потребления в оплачиваемые объёмы по арендатору и счётчику.
  BC-4250.10.30:
    name: Сверка учтённых объёмов
    description: |
      Сверка учтённых объёмов с источником истины и клиентскими счётчиками.
  BC-4250.20:
    name: Тарификация и начисление
    description: |
      Применение тарифов подписки, тарифов на потребление, пропорций и скидок для расчёта начислений.
  BC-4250.20.10:
    name: Тарификация подписки
    description: |
      Расчёт регулярных начислений по подписке за расчётный период.
  BC-4250.20.20:
    name: Тарификация потребления
    description: |
      Расчёт начислений за потребление на основе учтённых объёмов и тарифов.
  BC-4250.20.30:
    name: Расчёт пропорций
    description: |
      Расчёт пропорциональных начислений при изменениях в середине расчётного периода.
  BC-4250.20.40:
    name: Применение скидок
    description: |
      Применение согласованных скидок и кредитов к рассчитанным начислениям.
  BC-4250.30:
    name: Управление счетами и выписками
    description: |
      Формирование, доставка и корректировка счетов, а также обработка биллинговых споров клиентов.
  BC-4250.30.10:
    name: Формирование счёта
    description: |
      Формирование счетов из тарифицированных начислений и условий контракта.
  BC-4250.30.20:
    name: Доставка счёта
    description: |
      Доставка счетов клиентам через портал, электронную почту и партнёрские каналы.
  BC-4250.30.30:
    name: Корректировка счёта
    description: |
      Корректировка счетов по кредитам, ошибкам и контрактным отклонениям.
  BC-4250.30.40:
    name: Обработка биллинговых споров клиентов
    description: |
      Триаж и урегулирование биллинговых споров клиентов.
  BC-4250.40:
    name: Взыскание платежей и работа с должниками
    description: |
      Управление платёжными методами, авторизация платежей, работа с должниками и восстановление непроизвольного оттока.
  BC-4250.40.10:
    name: Управление платёжными методами
    description: |
      Сбор и управление платёжными методами и токенами клиентов.
  BC-4250.40.20:
    name: Авторизация платежей
    description: |
      Авторизация и списание регулярных платежей через платёжные процессоры.
  BC-4250.40.30:
    name: Рабочий процесс по работе с должниками
    description: |
      Автоматизированные последовательности работы с должниками при неудачных платежах и просроченных балансах.
  BC-4250.40.40:
    name: Восстановление непроизвольного оттока
    description: |
      Восстановление подписок, утраченных из-за истёкших карт, жёстких отказов и аналогичных сбоев платежей.
  BC-4250.50:
    name: Признание выручки по подпискам
    description: |
      Идентификация обязанностей по исполнению и управление графиками выручки в соответствии с ASC 606 / IFRS 15.
  BC-4250.50.10:
    name: Идентификация обязанностей по исполнению
    description: |
      Идентификация отдельных обязанностей по исполнению из контрактов на подписку.
  BC-4250.50.20:
    name: Управление графиком выручки
    description: |
      Формирование и ведение графиков признания выручки на протяжении срока контракта.
  BC-4250.50.30:
    name: Сверка отложенной выручки
    description: |
      Сверка остатков отложенной выручки с выставленными и признанными суммами.
  BC-4250.60:
    name: Управление налогами по подпискам
    description: |
      Определение налоговых юрисдикций, расчёт и обработка налоговых освобождений по регулярным и поводным начислениям.
  BC-4250.60.10:
    name: Определение налоговой юрисдикции
    description: |
      Определение применимых налоговых юрисдикций по клиенту и начислению.
  BC-4250.60.20:
    name: Расчёт налогов по подпискам
    description: |
      Расчёт косвенных налогов на начисления по подпискам и потреблению.
  BC-4250.60.30:
    name: Обработка налоговых освобождений
    description: |
      Сбор и применение сертификатов налоговых освобождений клиентов.
  BC-4250.70:
    name: Аналитика выручки по подпискам
    description: |
      Расчёт и анализ метрик здоровья повторяющейся выручки, включая ARR, MRR, NRR, GRR и когортные представления.
  BC-4250.70.10:
    name: Расчёт ARR и MRR
    description: |
      Расчёт годовой и ежемесячной повторяющейся выручки из состояния подписок.
  BC-4250.70.20:
    name: Анализ чистого и валового удержания
    description: |
      Анализ чистого и валового удержания выручки по когортам клиентов.
  BC-4250.70.30:
    name: Когортный анализ выручки
    description: |
      Когортный анализ динамики выручки и удержания.

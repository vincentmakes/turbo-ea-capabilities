# Управление банковским обслуживанием клиентов (ru) — translations for L1-banking-customer-management.yaml
locale: ru
source: L1-banking-customer-management.yaml
entries:
  BC-1300:
    name: Управление банковским обслуживанием клиентов
    description: |
      Привлечение клиентов, KYC/CDD, обслуживание, доступ к каналам для банковских клиентов.
  BC-1300.10:
    name: Управление привлечением клиентов
    description: |
      Открытие счёта, верификация личности, активация счёта.
  BC-1300.10.10:
    name: Приём заявления
    description: |
      Приём данных заявления нового клиента и на открытие счёта.
  BC-1300.10.20:
    name: Верификация личности
    description: |
      Верификация личности, включая проверку документов и биометрические проверки.
  BC-1300.10.30:
    name: Открытие и активация счёта
    description: |
      Открытие счетов, продуктов и активация доступа к каналам.
  BC-1300.10.40:
    name: Информирование о статусе привлечения
    description: |
      Информирование клиента о статусе привлечения и следующих шагах.
  BC-1300.20:
    name: Управление KYC и должной осмотрительностью в отношении клиента
    description: |
      KYC, CDD, EDD, периодический пересмотр, проверка на наличие статуса политически значимого лица.
  BC-1300.20.10:
    name: Присвоение риск-рейтинга клиенту
    description: |
      Присвоение риск-рейтинга клиентам на основе AML-факторов риска.
  BC-1300.20.20:
    name: Сбор KYC-документов
    description: |
      Сбор и проверка KYC-документации.
  BC-1300.20.30:
    name: Проверка по санкционным спискам и спискам PEP
    description: |
      Проверка по санкционным спискам, спискам политически значимых лиц и базам данных негативных публикаций.
  BC-1300.20.40:
    name: Углублённая проверка клиента
    description: |
      EDD для клиентов с высоким риском и сложными структурами.
  BC-1300.20.50:
    name: Периодический пересмотр KYC
    description: |
      Периодический пересмотр и обновление KYC-информации о клиенте.
  BC-1300.30:
    name: Управление обслуживанием клиентов
    description: |
      Ежедневные запросы на обслуживание, ведение счётов.
  BC-1300.30.10:
    name: Ведение счёта
    description: |
      Ведение счёта, включая лимиты, подписантов и адреса.
  BC-1300.30.20:
    name: Обработка запросов на обслуживание
    description: |
      Обработка запросов на обслуживание и инструкций клиентов.
  BC-1300.30.30:
    name: Предоставление выписок и документов
    description: |
      Предоставление выписок, справок и документов клиентов.
  BC-1300.30.40:
    name: Управление закрытием клиентского счёта
    description: |
      Прекращение обслуживания клиента и закрытие клиентских отношений.
  BC-1300.40:
    name: Управление информацией о клиентах
    description: |
      Данные клиентов, согласия, предпочтения, единая запись клиента.
  BC-1300.40.10:
    name: Ведение профиля клиента
    description: |
      Ведение профиля клиента и демографических данных.
  BC-1300.40.20:
    name: Управление информацией о бенефициарных владельцах
    description: |
      Сбор и ведение информации о бенефициарных владельцах.
  BC-1300.40.30:
    name: Управление согласиями клиентов
    description: |
      Фиксация и обеспечение маркетинговых согласий и согласий на обмен данными.
  BC-1300.40.40:
    name: Управление единой записью клиента
    description: |
      Ведение единой записи клиента в разных системах.
  BC-1300.50:
    name: Управление банковскими каналами
    description: |
      Операции каналов: отделение, ATM, онлайн, мобильный, телефония.
  BC-1300.50.10:
    name: Операции канала отделений
    description: |
      Работа физического канала отделений и кассового обслуживания.
  BC-1300.50.20:
    name: Операции ATM и самообслуживания
    description: |
      Эксплуатация устройств ATM, киосков и терминалов самообслуживания.
  BC-1300.50.30:
    name: Операции цифровых каналов
    description: |
      Операции каналов онлайн- и мобильного банкинга.
  BC-1300.50.40:
    name: Операции телефонного канала
    description: |
      Операции каналов телефонного банкинга и голосовой аутентификации.
  BC-1300.50.50:
    name: Операции открытого банкинга и API-канала
    description: |
      Операции API открытого банкинга и доступа третьих сторон.

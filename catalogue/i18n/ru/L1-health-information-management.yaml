# Медицинская информация (ru) — translations for L1-health-information-management.yaml
locale: ru
source: L1-health-information-management.yaml
entries:
  BC-2900:
    name: Медицинская информация
    description: |
      Мастер-индекс пациентов, производственное кодирование, раскрытие информации, жизненный цикл медицинской карты, подача в клинические регистры и операции по интероперабельности здравоохранения для организации-провайдера.
  BC-2900.10:
    name: Управление мастер-индексом пациентов
    description: |
      Управление мастер-индексом пациентов и разрешение дублирующих и наложенных записей.
  BC-2900.10.10:
    name: Ведение мастер-индекса пациентов
    description: |
      Ежедневное ведение корпоративного мастер-индекса пациентов.
  BC-2900.10.20:
    name: Разрешение дублей
    description: |
      Выявление и разрешение дублирующих и наложенных записей пациентов.
  BC-2900.10.30:
    name: Алгоритмы сопоставления пациентов
    description: |
      Настройка и оптимизация алгоритмов сопоставления пациентов.
  BC-2900.10.40:
    name: Перекрёстная ссылка идентификаторов
    description: |
      Перекрёстная ссылка идентификаторов пациентов между аффилированными организациями и биржами.
  BC-2900.20:
    name: Производственное кодирование
    description: |
      Производственное кодирование стационарных и амбулаторных визитов, включая аудит и управление отставанием.
  BC-2900.20.10:
    name: Производственное кодирование стационарных случаев
    description: |
      Производственный рабочий процесс и распределение стационарного кодирования.
  BC-2900.20.20:
    name: Производственное кодирование амбулаторных случаев
    description: |
      Производственный рабочий процесс амбулаторного кодирования.
  BC-2900.20.30:
    name: Управление отставанием по кодированию
    description: |
      Управление отставанием по выписке-без-финального-счёта и кодированию.
  BC-2900.20.40:
    name: Аудит кодировщиков
    description: |
      Внутренний аудит точности кодировщиков и обратная связь.
  BC-2900.30:
    name: Раскрытие медицинской информации
    description: |
      Приём, валидация и исполнение запросов на охраняемую медицинскую информацию.
  BC-2900.30.10:
    name: Приём запросов на информацию
    description: |
      Приём запросов пациентов, страховщиков, юридических и медицинских лиц на медицинскую информацию.
  BC-2900.30.20:
    name: Валидация разрешений
    description: |
      Валидация разрешений и допустимых раскрытий по нормам защиты персональных данных.
  BC-2900.30.30:
    name: Отслеживание раскрытий
    description: |
      Отслеживание раскрытий охраняемой медицинской информации для учёта.
  BC-2900.30.40:
    name: Повестки и юридические запросы
    description: |
      Обработка повесток, судебных решений и юридических запросов медицинских записей.
  BC-2900.40:
    name: Жизненный цикл медицинской карты
    description: |
      Управление жизненным циклом медицинских карт от создания до хранения и уничтожения.
  BC-2900.40.10:
    name: Закрытие визита
    description: |
      Верификация и отслеживание предпосылок закрытия визита.
  BC-2900.40.20:
    name: Отслеживание заполнения карт
    description: |
      Отслеживание просроченного заполнения карт и последующий контакт с врачом.
  BC-2900.40.30:
    name: Планирование хранения записей
    description: |
      Планирование хранения медицинских записей согласно регуляторным требованиям.
  BC-2900.40.40:
    name: Уничтожение медицинских карт
    description: |
      Санкционированное уничтожение медицинских карт по истечении срока хранения.
  BC-2900.50:
    name: Клинические регистры и подача данных
    description: |
      Подача данных в болезнь-специфические, онкологические, травматологические и качественные регистры.
  BC-2900.50.10:
    name: Подача в регистры заболеваний
    description: |
      Подача данных в регистры общественного здравоохранения и заболеваний.
  BC-2900.50.20:
    name: Операции онкологического регистра
    description: |
      Абстракция и подача данных в онкологический регистр.
  BC-2900.50.30:
    name: Операции травматологического регистра
    description: |
      Абстракция и подача данных в травматологический регистр.
  BC-2900.50.40:
    name: Подача в качественные регистры
    description: |
      Подача данных в специализированные качественные регистры для клинических исследований и бенчмаркинга.
  BC-2900.60:
    name: Операции по интероперабельности здравоохранения
    description: |
      Эксплуатация подключений к биржам медицинской информации, FHIR-эндпоинтов, обмена данными по инициативе пациента и реестра провайдеров.
  BC-2900.60.10:
    name: Операции биржи медицинской информации
    description: |
      Операции входящих и исходящих подключений к бирже медицинской информации.
  BC-2900.60.20:
    name: Управление FHIR-эндпоинтами
    description: |
      Управление FHIR-эндпоинтами для интеграции приложений и партнёров.
  BC-2900.60.30:
    name: Обмен данными по инициативе пациента
    description: |
      Направленный обмен медицинской информацией со сторонними приложениями по инициативе пациента.
  BC-2900.60.40:
    name: Ведение реестра провайдеров
    description: |
      Ведение данных реестра провайдеров для внутренних и внешних потребителей.

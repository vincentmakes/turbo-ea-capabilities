# Ответственное обращение с химической продукцией (ru) — translations for L1-chemical-product-stewardship-management.yaml
locale: ru
source: L1-chemical-product-stewardship-management.yaml
entries:
  BC-4650:
    name: Ответственное обращение с химической продукцией
    description: |
      Классификация и маркировка по опасности, составление паспортов безопасности,
      сценарии воздействия, программы по веществам, вызывающим озабоченность,
      и информирование потребителей об опасностях на протяжении жизненного цикла
      химической продукции.
  BC-4650.10:
    name: Классификация и маркировка по опасности
    description: |
      GHS-классификация веществ и смесей и разработка совместимых этикеток.
  BC-4650.10.10:
    name: GHS-классификация
    description: |
      Классификация веществ по схеме опасностей ООН GHS.
  BC-4650.10.20:
    name: Классификация смесей
    description: |
      Классификация смесей с использованием принципов экстраполяции и
      испытательных данных.
  BC-4650.10.30:
    name: Разработка пиктограмм и этикеток
    description: |
      Разработка GHS-совместимых пиктограмм, сигнальных слов и макетов этикеток.
  BC-4650.10.40:
    name: Локализация многоязычных этикеток
    description: |
      Перевод и локализация этикеток для рынков назначения.
  BC-4650.20:
    name: Управление паспортами безопасности
    description: |
      Составление, проверка и распространение паспортов безопасности, включая
      расширенные ПБ для последующих пользователей.
  BC-4650.20.10:
    name: Составление паспортов безопасности
    description: |
      Составление паспортов безопасности в 16-разделовом формате.
  BC-4650.20.20:
    name: Проверка и обновление паспортов безопасности
    description: |
      Проверка и обновление ПБ с учётом новых данных и изменений нормативных
      требований.
  BC-4650.20.30:
    name: Управление распространением паспортов безопасности
    description: |
      Распространение ПБ покупателям и партнёрам в цепочке поставок.
  BC-4650.20.40:
    name: Управление расширенными паспортами безопасности
    description: |
      Управление приложениями к расширенным ПБ со сценариями воздействия.
  BC-4650.30:
    name: Управление сценариями воздействия
    description: |
      Разработка и поддержание сценариев воздействия на работников,
      потребителей и окружающую среду для зарегистрированных веществ.
  BC-4650.30.10:
    name: Разработка сценариев воздействия на работников
    description: |
      Разработка сценариев воздействия на работников при типичных условиях
      применения.
  BC-4650.30.20:
    name: Разработка сценариев воздействия на потребителей
    description: |
      Разработка сценариев воздействия на потребителей при применении конечного
      продукта.
  BC-4650.30.30:
    name: Разработка сценариев воздействия на окружающую среду
    description: |
      Разработка сценариев выброса в окружающую среду на протяжении жизненного
      цикла.
  BC-4650.40:
    name: Управление веществами, вызывающими озабоченность
    description: |
      Идентификация, замена и отслеживание ограничений по веществам, вызывающим
      очень высокую озабоченность, в продуктовом портфеле.
  BC-4650.40.10:
    name: Управление перечнем SVHC
    description: |
      Ведение перечня присутствия SVHC в продуктовом портфеле.
  BC-4650.40.20:
    name: Управление программой замены веществ
    description: |
      Программное управление инициативами по замене веществ на более безопасные.
  BC-4650.40.30:
    name: Ведение списка ограниченных веществ
    description: |
      Ведение внутренних списков ограниченных веществ и списков, установленных
      покупателями.
  BC-4650.50:
    name: Информирование потребителей об опасностях
    description: |
      Исходящее информирование покупателей и последующих пользователей об
      опасностях.
  BC-4650.50.10:
    name: Уведомления покупателей о стюардшипе
    description: |
      Уведомление покупателей об изменениях, имеющих значение для ответственного
      обращения с продукцией.
  BC-4650.50.20:
    name: Разработка обучающих материалов по опасностям
    description: |
      Разработка учебных материалов по безопасному обращению и применению.
  BC-4650.50.30:
    name: Обработка запросов последующих пользователей
    description: |
      Обработка запросов о стюардшипе от последующих пользователей.
  BC-4650.60:
    name: Стюардшип жизненного цикла продукта
    description: |
      Стюардшип жизненного цикла химической продукции, включая вопросы утилизации,
      переработки и повторного использования.
  BC-4650.60.10:
    name: Ведение профилей опасностей продукта
    description: |
      Ведение сводных профилей опасностей по каждому продукту.
  BC-4650.60.20:
    name: Координация стюардшипа конца жизненного цикла
    description: |
      Координация схем возврата и стюардшипа на конце жизненного цикла.
  BC-4650.60.30:
    name: Оценка возможности переработки и повторного использования
    description: |
      Оценка возможности переработки и повторного использования химической
      продукции.

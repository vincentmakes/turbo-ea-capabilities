# Управление распределёнными энергоресурсами (ru) — translations for L1-distributed-energy-resource-management.yaml
locale: ru
source: L1-distributed-energy-resource-management.yaml
entries:
  BC-3840:
    name: Управление распределёнными энергоресурсами
    description: |
      Ввод в работу, агрегирование и операционная координация
      распределённых энергоресурсов, подключённых к распределительной сети —
      крышные солнечные панели, накопители «за счётчиком», управление спросом,
      зарядка электромобилей и микросети — и их участие в оптовых рынках
      и рынках гибкости.
  BC-3840.10:
    name: Регистрация и ввод в работу ВРЭ
    description: |
      Регистрация распределённых энергоресурсов, техническая
      квалификация и приёмка присоединения по IEEE 1547 / требованиям
      ЕС к генераторам.
  BC-3840.10.10:
    name: Оценка заявок на присоединение ВРЭ
    description: |
      Оценка заявок на присоединение ВРЭ
      против принимающей мощности.
  BC-3840.10.20:
    name: Техническая квалификация ВРЭ
    description: |
      Типовые испытания и натурная верификация
      мощности и защит ВРЭ.
  BC-3840.10.30:
    name: Ведение реестра ВРЭ
    description: |
      Ведение реестра подключённых активов ВРЭ
      и их характеристик.
  BC-3840.20:
    name: Операции виртуальной электростанции
    description: |
      Агрегирование и диспетчеризация распределённых ресурсов
      как единого субъекта на оптовом и балансирующем рынках.
  BC-3840.20.10:
    name: Управление портфелем ВЭС
    description: |
      Формирование и ребалансировка портфеля ВЭС
      по классам активов.
  BC-3840.20.20:
    name: Диспетчерские операции ВЭС
    description: |
      Диспетчерские инструкции в реальном времени
      по агрегированным активам ВРЭ.
  BC-3840.20.30:
    name: Расчёты производительности ВЭС
    description: |
      Расчёты производительности ВЭС против рыночных
      и двусторонних обязательств.
  BC-3840.30:
    name: Операции управления спросом
    description: |
      Привлечение, диспетчеризация и расчёты программ
      управления спросом для бытовых, коммерческих и промышленных потребителей.
  BC-3840.30.10:
    name: Зачисление в программу УС
    description: |
      Зачисление потребителей и управление согласием
      на участие в программах управления спросом.
  BC-3840.30.20:
    name: Диспетчеризация событий УС
    description: |
      Диспетчеризация событий и инструкций по снижению нагрузки
      участвующим потребителям.
  BC-3840.30.30:
    name: Верификация исполнения УС
    description: |
      Верификация выполнения управления спросом
      против базовых потреблений.
  BC-3840.40:
    name: Управление интеграцией электромобилей в сеть
    description: |
      Управление взаимодействием зарядки электромобилей
      с сетью, включая управляемую зарядку, V2G и тарифы ЭМ.
  BC-3840.40.10:
    name: Операции управляемой зарядки
    description: |
      Эксплуатация управляемых и умных схем зарядки
      для парков ЭМ и частных домовладений.
  BC-3840.40.20:
    name: Координация Vehicle-to-Grid
    description: |
      Координация двунаправленного разряда V2G
      в сеть или за счётчиком.
  BC-3840.40.30:
    name: Анализ принимающей мощности ЭМ
    description: |
      Анализ принимающей мощности фидеров
      для проникновения зарядки электромобилей.
  BC-3840.50:
    name: Координация накопителей «за счётчиком»
    description: |
      Координация участия аккумуляторных накопителей «за счётчиком»
      в программах энергоснабжения и сетевых услугах.
  BC-3840.50.10:
    name: Зачисление аккумуляторов BTM
    description: |
      Зачисление и управление согласием на участие
      аккумуляторов BTM.
  BC-3840.50.20:
    name: Диспетчеризация накопителей BTM
    description: |
      Диспетчерские инструкции для накопителей
      «за счётчиком».
  BC-3840.50.30:
    name: Отслеживание производительности накопителей BTM
    description: |
      Отслеживание выполнения аккумуляторами BTM
      обязательств перед энергоснабжением.
  BC-3840.60:
    name: Прогнозирование ВРЭ
    description: |
      Краткосрочное прогнозирование распределённой генерации
      и гибкой нагрузки для системного оператора и рыночных графиков.
  BC-3840.60.10:
    name: Прогнозирование солнечной генерации BTM
    description: |
      Прогнозирование генерации солнечных панелей BTM
      на уровне фидера и зоны.
  BC-3840.60.20:
    name: Прогнозирование гибкой нагрузки
    description: |
      Прогнозирование профилей зарядки ЭМ
      и гибкой нагрузки.
  BC-3840.60.30:
    name: Мониторинг качества прогнозов ВРЭ
    description: |
      Мониторинг систематической ошибки и качества прогнозов
      против фактических данных.
  BC-3840.70:
    name: Операции микросетей
    description: |
      Эксплуатация коммунальных и потребительских микросетей,
      включая режимы подключения и островного режима.
  BC-3840.70.10:
    name: Операции контроллера микросети
    description: |
      Эксплуатация контроллеров микросети и диспетчеризация
      внутренних ресурсов.
  BC-3840.70.20:
    name: Операции перехода в островной режим
    description: |
      Плановые и аварийные переходы между режимом
      подключения и островным режимом.
  BC-3840.70.30:
    name: Учения по устойчивости микросети
    description: |
      Учения по устойчивости и тренировки бесшовного перехода
      для микросетей критических нагрузок.

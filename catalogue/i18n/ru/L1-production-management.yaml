# Управление производством (ru) — translations for L1-production-management.yaml
locale: ru
source: L1-production-management.yaml
entries:
  BC-1000:
    name: Управление производством
    description: |
      Производство физических товаров — планирование, диспетчирование и исполнение на уровне предприятия.
  BC-1000.10:
    name: Управление производственной стратегией
    description: |
      Производственный след, стратегия «производить/покупать», стратегия мощностей.
  BC-1000.10.10:
    name: Стратегия производственного присутствия
    description: |
      Долгосрочная стратегия производственного присутствия и определение роли производственных площадок.
  BC-1000.10.20:
    name: Стратегия «производить или покупать»
    description: |
      Стратегия «производить или покупать» и аутсорсинга по продуктовым линейкам.
  BC-1000.10.30:
    name: Стратегия производственных мощностей
    description: |
      Долгосрочная стратегия производственных мощностей и планирование капитальных расширений.
  BC-1000.10.40:
    name: Проектирование производственной операционной модели
    description: |
      Проектирование производственной операционной модели и управления.
  BC-1000.20:
    name: Управление производственным планированием
    description: |
      Главное производственное расписание, среднесрочное планирование (недели-месяцы).
  BC-1000.20.10:
    name: Составление главного производственного расписания
    description: |
      Формирование главного производственного расписания по заводам.
  BC-1000.20.20:
    name: Укрупнённое планирование мощностей
    description: |
      Укрупнённая проверка мощностей по главному расписанию.
  BC-1000.20.30:
    name: Среднесрочное производственное планирование
    description: |
      Еженедельное и ежемесячное планирование производства по линиям.
  BC-1000.20.40:
    name: Выверка производственного плана
    description: |
      Выверка производственного плана с поставками и спросом.
  BC-1000.30:
    name: Управление производственным диспетчированием
    description: |
      Детальное диспетчирование, секвенирование (часы-дни).
  BC-1000.30.10:
    name: Детальное диспетчирование с учётом конечных мощностей
    description: |
      Диспетчирование с учётом конечных мощностей на уровне машин и линий.
  BC-1000.30.20:
    name: Оптимизация последовательности
    description: |
      Оптимизация последовательности для минимизации переналадок и потерь.
  BC-1000.30.30:
    name: Мониторинг соблюдения расписания
    description: |
      Мониторинг соблюдения расписания и перепланирование.
  BC-1000.30.40:
    name: Запуск производственных заказов
    description: |
      Запуск производственных заказов на производственный участок.
  BC-1000.40:
    name: Управление производственным исполнением
    description: |
      Надзор за исполнением, диспетчирование, управление в реальном времени.
  BC-1000.40.10:
    name: Диспетчирование производственных заказов
    description: |
      Диспетчирование заказов на рабочие центры.
  BC-1000.40.20:
    name: Отслеживание статуса производства
    description: |
      Отслеживание статуса производственных заказов в реальном времени.
  BC-1000.40.30:
    name: Управление производственными отклонениями
    description: |
      Обработка производственных отклонений и эскалаций.
  BC-1000.40.40:
    name: Закрытие производственных заказов
    description: |
      Подтверждение, расчёт и закрытие производственных заказов.
  BC-1000.50:
    name: Управление производственной результативностью
    description: |
      OEE, пропускная способность, выход, производственные KPI.
  BC-1000.50.10:
    name: Измерение OEE
    description: |
      Измерение и отчётность об общей эффективности оборудования.
  BC-1000.50.20:
    name: Анализ пропускной способности и выхода
    description: |
      Анализ пропускной способности, выхода и выхода с первого прохода.
  BC-1000.50.30:
    name: Анализ простоев и потерь
    description: |
      Классификация простоев и анализ дерева потерь.
  BC-1000.50.40:
    name: Отчётность о производственной результативности
    description: |
      Отчётность о результативности завода и бенчмаркинг.
  BC-1000.60:
    name: Управление производственными затратами
    description: |
      Нормативная стоимость, производственные отклонения, анализ затрат.
  BC-1000.60.10:
    name: Установка нормативной стоимости
    description: |
      Установка и переоценка нормативной стоимости произведённых позиций.
  BC-1000.60.20:
    name: Анализ производственных отклонений
    description: |
      Анализ материальных, трудовых и накладных отклонений.
  BC-1000.60.30:
    name: Отчётность о производственных затратах
    description: |
      Периодическая отчётность о производственных затратах и бенчмаркинг.

# Управление проектированием (ru) — translations for L1-design-management.yaml
locale: ru
source: L1-design-management.yaml
entries:
  BC-1120:
    name: Управление проектированием
    description: |
      Жизненный цикл инженерного проектирования — от концепции до детального проектирования и верификации.
  BC-1120.10:
    name: Управление концептуальным проектированием
    description: |
      Концептуальные исследования, технико-экономическое обоснование, анализ вариантов, предпроектная проработка.
  BC-1120.10.10:
    name: Определение концептуального исследования
    description: |
      Объём концептуального исследования, основы проектирования и допущения.
  BC-1120.10.20:
    name: Анализ технико-экономической выполнимости
    description: |
      Технический, календарный и экономический анализ выполнимости.
  BC-1120.10.30:
    name: Анализ и выбор вариантов
    description: |
      Многокритериальный анализ вариантов и выбор концепции.
  BC-1120.20:
    name: Управление базовым инженерным проектированием
    description: |
      FEED, базовое проектирование, определение объёма и стоимости.
  BC-1120.20.10:
    name: Базовое инженерное проектирование
    description: |
      Базовое проектирование технологических, механических и электротехнических дисциплин.
  BC-1120.20.20:
    name: Сметное планирование стоимости и сроков FEED
    description: |
      Оценки класса 3/класса 2 стоимости и сроков по результатам FEED.
  BC-1120.20.30:
    name: Подготовка результатов FEED
    description: |
      Подготовка результатов FEED и основ проектирования.
  BC-1120.30:
    name: Управление детальным проектированием
    description: |
      Детальное проектирование, рабочие чертежи, спецификации, ведомости объёмов работ.
  BC-1120.30.10:
    name: Детальные инженерные расчёты
    description: |
      Детальные расчёты и анализы по дисциплинам.
  BC-1120.30.20:
    name: Разработка рабочей документации
    description: |
      Разработка чертежей, выданных для строительства.
  BC-1120.30.30:
    name: Разработка детальных спецификаций
    description: |
      Разработка детальных спецификаций оборудования и материалов.
  BC-1120.30.40:
    name: Составление ведомостей объёмов работ
    description: |
      Составление и ведение ведомостей объёмов работ для закупок и строительства.
  BC-1120.40:
    name: Управление проверкой и верификацией проектирования
    description: |
      HAZOP, проверки проектирования, верификация, валидация.
  BC-1120.40.10:
    name: Проведение HAZOP и HAZID
    description: |
      Идентификация опасностей и проведение HAZOP-сессий.
  BC-1120.40.20:
    name: Стадийные проверки проектирования
    description: |
      Стадийные проверки проектирования (30%, 60%, 90%).
  BC-1120.40.30:
    name: Верификация проектирования
    description: |
      Верификация проектирования на соответствие требованиям и стандартам.
  BC-1120.40.40:
    name: Валидация проектирования
    description: |
      Валидация проектирования на соответствие целевому применению и потребностям клиента.
  BC-1120.50:
    name: Управление программным обеспечением САПР
    description: |
      Инструменты САПР/САПР-анализа, трёхмерное моделирование, BIM, цифровая среда проектирования.
  BC-1120.50.10:
    name: Управление стандартами САПР
    description: |
      Стандарты САПР, схемы слоёв и библиотеки шаблонов.
  BC-1120.50.20:
    name: Управление трёхмерными моделями
    description: |
      Управление интегрированными трёхмерными моделями по дисциплинам.
  BC-1120.50.30:
    name: Управление средой BIM
    description: |
      Общая среда данных BIM и соответствие ISO 19650.
  BC-1120.50.40:
    name: Администрирование инженерного программного обеспечения
    description: |
      Администрирование и лицензирование инженерных программных инструментов.
  BC-1120.60:
    name: Управление многодисциплинарной координацией проектирования
    description: |
      Межидисциплинарная координация, обнаружение коллизий, управление интегрированными моделями.
  BC-1120.60.10:
    name: Обнаружение коллизий
    description: |
      Обнаружение коллизий в трёхмерных моделях по дисциплинам.
  BC-1120.60.20:
    name: Координация интегрированной модели
    description: |
      Координация интегрированных многодисциплинарных моделей.
  BC-1120.60.30:
    name: Устранение проблем проектирования
    description: |
      Устранение проблем координации при проектировании.
metadata:
  status: draft

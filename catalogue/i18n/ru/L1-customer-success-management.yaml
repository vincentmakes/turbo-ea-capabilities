# Управление клиентским успехом (ru) — translations for L1-customer-success-management.yaml
locale: ru
source: L1-customer-success-management.yaml
entries:
  BC-4260:
    name: Управление клиентским успехом
    description: |
      Онбординг клиентов, принятие продукта, мониторинг здоровья, удержание, развитие, адвокация и привлечение референсных клиентов — в отличие от реактивной клиентской поддержки.
  BC-4260.10:
    name: Онбординг и активация клиентов
    description: |
      Структурированный онбординг новых клиентов к первой ценности и контрольным точкам активации.
    in_scope:
      - Планы онбординга, кик-оф и отслеживание времени до ценности
    out_of_scope:
      - Техническая подготовка арендаторов (входит в Управление арендаторами SaaS)
      - Подготовка подписки (входит в Управление жизненным циклом подписки)
  BC-4260.10.10:
    name: Определение плана онбординга
    description: |
      Определение планов онбординга, адаптированных к сегменту и сценарию использования.
  BC-4260.10.20:
    name: Отслеживание контрольных точек активации
    description: |
      Отслеживание контрольных точек активации относительно целевых показателей времени до ценности.
  BC-4260.10.30:
    name: Координация внедрения
    description: |
      Координация мероприятий по внедрению на стороне клиента и взаимодействия с партнёрами.
  BC-4260.20:
    name: Управление принятием продукта
    description: |
      Программы для повышения принятия функций и охвата использования по клиентской базе.
  BC-4260.20.10:
    name: Разработка программы принятия продукта
    description: |
      Разработка структурированных программ принятия продукта для сегментов, продуктов и персонажей.
  BC-4260.20.20:
    name: Выполнение кампаний принятия
    description: |
      Выполнение кампаний принятия с внутрипродуктовыми и внешними точками контакта.
  BC-4260.20.30:
    name: Развитие опытных пользователей
    description: |
      Развитие опытных пользователей и внутренних чемпионов со стороны клиента.
  BC-4260.30:
    name: Управление здоровьем клиентов
    description: |
      Моделирование и мониторинг здоровья клиентов для предвидения рисков и выработки мер реагирования.
  BC-4260.30.10:
    name: Моделирование оценки здоровья клиентов
    description: |
      Моделирование оценок здоровья клиентов на основе продуктовых, поддержки и коммерческих сигналов.
  BC-4260.30.20:
    name: Мониторинг сигналов риска
    description: |
      Мониторинг сигналов риска по клиентской базе.
  BC-4260.30.30:
    name: Вмешательство в аккаунты под угрозой
    description: |
      Скоординированное вмешательство в аккаунты, идентифицированные как находящиеся под угрозой.
  BC-4260.40:
    name: Взаимодействие в жизненном цикле клиента
    description: |
      Регулярные точки контакта жизненного цикла: бизнес-ревью, исполнительное спонсорство и совместное планирование успеха.
  BC-4260.40.10:
    name: Управление квартальными бизнес-ревью
    description: |
      Планирование и проведение регулярных бизнес-ревью с клиентами.
  BC-4260.40.20:
    name: Программа исполнительного спонсорства
    description: |
      Организация пар исполнительных спонсоров между провайдером и клиентом.
  BC-4260.40.30:
    name: Ведение планов успеха
    description: |
      Ведение совместных планов успеха с зафиксированными результатами и контрольными точками клиента.
  BC-4260.50:
    name: Адвокация удержания и продления
    description: |
      Адвокация и вмешательство, сфокусированные на процессе продления, включая сохранение клиентов и прогнозирование продлений.
  BC-4260.50.10:
    name: Снижение рисков продления
    description: |
      Снижение выявленных рисков продления до даты продления.
  BC-4260.50.20:
    name: Выполнение программы сохранения клиентов
    description: |
      Выполнение программ сохранения клиентов для аккаунтов, намеревающихся отменить подписку.
  BC-4260.50.30:
    name: Подача прогноза продлений
    description: |
      Подача прогнозов продлений на основе сигналов здоровья и вовлечённости.
  BC-4260.60:
    name: Адвокация развития и кросс-продаж
    description: |
      Выявление и квалификация возможностей развития и координация с продажами для кросс-продаж.
  BC-4260.60.10:
    name: Выявление возможностей развития
    description: |
      Выявление возможностей развития из сигналов использования и вовлечённости.
  BC-4260.60.20:
    name: Квалификация апсейлов
    description: |
      Квалификация возможностей апсейла до взаимодействия с продажами.
  BC-4260.60.30:
    name: Координация кросс-продаж
    description: |
      Координация с продажами по процессам кросс-продаж по клиентской базе.
  BC-4260.70:
    name: Адвокация клиентов и работа с референсами
    description: |
      Привлечение референсов, разработка кейс-стади и структурированное измерение настроений клиентов.
  BC-4260.70.10:
    name: Управление реферальной программой
    description: |
      Управление реферальной программой клиентов, включая согласие, управление и использование.
  BC-4260.70.20:
    name: Разработка кейс-стади
    description: |
      Разработка кейс-стади клиентов в сотрудничестве с маркетингом.
  BC-4260.70.30:
    name: Программа опроса NPS
    description: |
      Управление программами опросов NPS и аналогичными программами измерения настроений клиентов.

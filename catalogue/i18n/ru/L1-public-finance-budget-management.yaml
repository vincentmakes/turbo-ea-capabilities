# Государственные финансы и бюджет (ru) — translations for L1-public-finance-budget-management.yaml
locale: ru
source: L1-public-finance-budget-management.yaml
entries:
  BC-3280:
    name: Государственные финансы и бюджет
    description: |
      Формирование государственного бюджета, исполнение ассигнований, бухгалтерский учёт государственных фондов, управление государственным долгом, казначейские операции и бюджетная отчётность по стандартам IPSAS.
  BC-3280.10:
    name: Формирование бюджета
    description: |
      Подготовка ежегодных и многолетних бюджетов, включая предельные объёмы, программное бюджетирование и представление законодательному органу.
    in_scope:
      - Макроэкономическое и фискальное прогнозирование
      - Программное бюджетирование и бюджетирование «с нуля»
      - Представление бюджета законодательному органу
    out_of_scope:
      - Корпоративное финансовое планирование и управленческий учёт (относится к финансовому планированию и анализу)
  BC-3280.10.10:
    name: Макроэкономическое и фискальное прогнозирование
    description: |
      Прогнозирование совокупных доходов и расходов и макроэкономических фискальных сценариев.
  BC-3280.10.20:
    name: Установление бюджетных предельных значений
    description: |
      Установление предельных значений бюджетов ведомств и программ в рамках фискального конверта.
  BC-3280.10.30:
    name: Подготовка программного бюджета
    description: |
      Подготовка программных и результативных бюджетов расходующими ведомствами.
  BC-3280.10.40:
    name: Представление бюджета законодательному органу
    description: |
      Составление и представление исполнительного бюджета законодательному органу.
  BC-3280.20:
    name: Исполнение ассигнований
    description: |
      Распределение, квотирование, принятие обязательств и расходование ассигнованных средств в соответствии с бюджетным законодательством.
  BC-3280.20.10:
    name: Распределение и квотирование
    description: |
      Квотирование и распределение ассигнований расходующим ведомствам.
  BC-3280.20.20:
    name: Фиксация обязательств и принятых обязательств
    description: |
      Фиксация обязательств и принятых обязательств по ассигнованиям.
  BC-3280.20.30:
    name: Обработка расходов и выплат
    description: |
      Обработка расходов и выплат по обязательным обязательствам.
  BC-3280.20.40:
    name: Перераспределение и переброска средств
    description: |
      Администрирование перераспределения, переброски средств и корректировок законодательных полномочий.
  BC-3280.30:
    name: Бухгалтерский учёт государственных фондов
    description: |
      Бухгалтерский учёт государственных фондов, включая общий, специальные, доверительные и оборотные фонды по IPSAS или национальным эквивалентам.
  BC-3280.30.10:
    name: Ведение структуры фондов
    description: |
      Ведение структуры государственных фондов и плана счетов.
  BC-3280.30.20:
    name: Учёт на уровне фондов
    description: |
      Проведение и сверка транзакций по общим, специальным, доверительным и оборотным фондам.
  BC-3280.30.30:
    name: Межведомственные расчёты
    description: |
      Расчёт и сверка межведомственных переводов и возмещаемых соглашений.
  BC-3280.40:
    name: Управление государственным долгом
    description: |
      Выпуск, обслуживание и управление рисками суверенных и субсуверенных долговых инструментов.
  BC-3280.40.10:
    name: Стратегия долга и планирование выпуска
    description: |
      Разработка долговой стратегии и календарей выпуска по инструментам и срокам погашения.
  BC-3280.40.20:
    name: Операции по выпуску долга
    description: |
      Аукционный, синдикационный и прямой выпуск государственных долговых инструментов.
  BC-3280.40.30:
    name: Обслуживание долга
    description: |
      Выплата купонов, процентов и основного долга держателям.
  BC-3280.40.40:
    name: Управление рисками долгового портфеля
    description: |
      Управление валютным, процентным и рефинансирующим риском в долговом портфеле.
  BC-3280.50:
    name: Кассовые и казначейские операции
    description: |
      Управление государственными денежными средствами, операции единого казначейского счёта и обработка платежей и поступлений от имени ведомств.
  BC-3280.50.10:
    name: Прогнозирование кассы
    description: |
      Ежедневное и скользящее прогнозирование денежных потоков государства.
  BC-3280.50.20:
    name: Операции единого казначейского счёта
    description: |
      Работа единого казначейского счёта и консолидированных банковских договорённостей.
  BC-3280.50.30:
    name: Операции по государственным платежам
    description: |
      Выплата государственных платежей от имени расходующих ведомств.
  BC-3280.50.40:
    name: Обработка государственных поступлений
    description: |
      Обработка входящих государственных поступлений и зачисление на счета ведомств.
  BC-3280.60:
    name: Фискальная отчётность и раскрытие информации
    description: |
      Промежуточная и годовая фискальная отчётность, финансовая отчётность по IPSAS и статистическая отчётность по COFOG/GFSM.
  BC-3280.60.10:
    name: Промежуточная фискальная отчётность
    description: |
      Подготовка ежемесячных и квартальных фискальных отчётов по сравнению с бюджетом.
  BC-3280.60.20:
    name: Подготовка финансовой отчётности по IPSAS
    description: |
      Подготовка консолидированной государственной и ведомственной финансовой отчётности по IPSAS.
  BC-3280.60.30:
    name: Статистическая отчётность по GFSM и COFOG
    description: |
      Составление фискальной статистики по классификациям МВФ GFSM и COFOG.
  BC-3280.60.40:
    name: Открытое раскрытие расходов
    description: |
      Публикация данных о расходах, транзакциях и исполнении бюджета в открытом формате.

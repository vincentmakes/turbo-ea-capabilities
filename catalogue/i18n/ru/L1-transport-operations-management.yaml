# Управление транспортными операциями (ru) — translations for L1-transport-operations-management.yaml
locale: ru
source: L1-transport-operations-management.yaml
entries:
  BC-2420:
    name: Управление транспортными операциями
    description: |
      Мультимодальное выполнение транспортных перевозок от забора груза через магистральные
      маршруты, дрейдж и доставку последней мили, включая реагирование на операционные нарушения.
  BC-2420.10:
    name: Управление диспетчеризацией
    description: |
      Назначение грузов, водителей, экипажей и оборудования для плановых и
      внеплановых транспортных перевозок.
    in_scope:
      - Назначение груза водителю и транспортному средству
      - Инструкции по позиционированию оборудования
    out_of_scope:
      - Составление графика работы водителей до диспетчеризации (BC-2440)
      - Распределение ёмкости по контрактам (BC-2400.20)
  BC-2420.10.10:
    name: Назначение груза
    description: |
      Назначение грузов на транспортные средства, суда, авиарейсы или железнодорожные маршруты.
  BC-2420.10.20:
    name: Диспетчеризация водителей и экипажей
    description: |
      Направление квалифицированных водителей и экипажей к назначенным грузам.
  BC-2420.10.30:
    name: Диспетчеризация оборудования
    description: |
      Позиционирование контейнеров, трейлеров и ULD для назначенных перевозок.
  BC-2420.20:
    name: Управление магистральными перевозками
    description: |
      Дальнее перемещение груза между узлами, терминалами и шлюзами по всем видам транспорта.
  BC-2420.20.10:
    name: Автомобильные магистральные перевозки
    description: |
      Дальнее грузовое автоперевозки между узлами и терминалами.
  BC-2420.20.20:
    name: Железнодорожные магистральные перевозки
    description: |
      Эксплуатация грузовых поездов и блок-поездов.
  BC-2420.20.30:
    name: Морские магистральные перевозки
    description: |
      Судоходные операции между портами, включая перевалочные участки.
  BC-2420.20.40:
    name: Авиационные магистральные перевозки
    description: |
      Эксплуатация грузовых авиарейсов и фрахтерных сервисов между аэропортами.
  BC-2420.30:
    name: Управление забором груза и дрейдж-операциями
    description: |
      Первичный забор груза у грузоотправителей и короткие дрейдж-рейсы между
      терминалами, дворами и внутренними пунктами.
  BC-2420.30.10:
    name: Операции забора груза
    description: |
      Забор груза у грузоотправителей и консолидаторов.
  BC-2420.30.20:
    name: Контейнерные дрейдж-операции
    description: |
      Дрейдж контейнеров между портовыми терминалами, железнодорожными рампами и внутренними депо.
  BC-2420.30.30:
    name: Перемещение порожнего оборудования
    description: |
      Перемещение порожних контейнеров, трейлеров и ULD между депо.
  BC-2420.40:
    name: Управление доставкой последней мили
    description: |
      Доставка последнего участка грузополучателям, включая маршрутизацию,
      выполнение и подтверждение доставки.
  BC-2420.40.10:
    name: Маршрутизация последней мили
    description: |
      Маршрутизация и последовательность остановок доставки и временных окон.
  BC-2420.40.20:
    name: Выполнение доставки клиенту
    description: |
      Доставка на объект, получение подписи и передача грузополучателю.
  BC-2420.40.30:
    name: Подтверждение доставки
    description: |
      Захват и хранение записей о подтверждении доставки.
  BC-2420.40.40:
    name: Обработка исключений при доставке
    description: |
      Обработка отказов, несостоявшихся доставок и повторных попыток.
  BC-2420.50:
    name: Управление операционными нарушениями
    description: |
      Выявление текущих операционных нарушений и оркестровка восстановительных мер.
  BC-2420.50.10:
    name: Выявление операционных инцидентов
    description: |
      Выявление поломок, погодных условий, задержек в портах и прочих нарушений.
  BC-2420.50.20:
    name: Перемаршрутизация и восстановление
    description: |
      Перемаршрутизация груза и восстановление нарушенных сервисов.
  BC-2420.50.30:
    name: Восстановление сервиса
    description: |
      Восстановление штатного расписания и выполнение обязательств перед клиентами.
  BC-2420.60:
    name: Управление операционной эффективностью
    description: |
      Операционное измерение своевременности, транзитного времени и соблюдения уровня сервиса.
  BC-2420.60.10:
    name: Отслеживание своевременности
    description: |
      Отслеживание своевременности забора, отправки, прибытия и доставки.
  BC-2420.60.20:
    name: Мониторинг транзитного времени
    description: |
      Мониторинг фактического транзитного времени в сравнении с согласованным.
  BC-2420.60.30:
    name: Отчётность по операционным KPI
    description: |
      Отчётность по операционным KPI для внутренних и внешних заинтересованных сторон.

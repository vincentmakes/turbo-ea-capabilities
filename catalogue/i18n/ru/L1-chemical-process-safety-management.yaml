# Промышленная безопасность химических процессов (ru) — translations for L1-chemical-process-safety-management.yaml
locale: ru
source: L1-chemical-process-safety-management.yaml
entries:
  BC-4640:
    name: Промышленная безопасность химических процессов
    description: |
      Предотвращение крупных аварий в реакционных, пожароопасных и токсичных
      химических процессах — анализ опасностей, техническая целостность,
      системы приборной безопасности, реакционные и горючие опасности,
      отчётность о показателях и аварийное реагирование.
  BC-4640.10:
    name: Анализ опасностей технологического процесса
    description: |
      Структурированная идентификация и анализ крупных производственных
      опасностей на протяжении жизненного цикла актива.
    in_scope:
      - HAZID, HAZOP, LOPA и анализ методом «бабочки»
      - Количественная оценка риска
    out_of_scope:
      - Оценка рисков личной безопасности (BC-730)
  BC-4640.10.10:
    name: Исследования HAZOP
    description: |
      Исследования опасности и работоспособности для новых и модернизируемых
      объектов.
  BC-4640.10.20:
    name: Исследования HAZID
    description: |
      Исследования идентификации опасностей на ранних стадиях концепции и
      проектирования.
  BC-4640.10.30:
    name: Исследования LOPA
    description: |
      Анализ слоёв защиты для определения уровней полноты безопасности.
  BC-4640.10.40:
    name: Анализ методом «бабочки»
    description: |
      Анализ «бабочки» для отображения барьеров перед крупными аварийными
      сценариями.
  BC-4640.10.50:
    name: Количественная оценка риска
    description: |
      Количественная оценка риска сценариев крупных производственных аварий.
  BC-4640.20:
    name: Управление технической целостностью
    description: |
      Инспекция и управление целостностью оборудования, работающего под
      давлением, и предохранительных устройств.
  BC-4640.20.10:
    name: Инспекция сосудов под давлением
    description: |
      Инспекция сосудов под давлением на основе рисков в соответствии с API 510.
  BC-4640.20.20:
    name: Инспекция целостности технологических трубопроводов
    description: |
      Инспекция технологических трубопроводов в соответствии с API 570 и
      ASME B31.3.
  BC-4640.20.30:
    name: Инспекция резервуаров-хранилищ
    description: |
      Инспекция атмосферных и работающих под давлением резервуаров в
      соответствии с API 653.
  BC-4640.20.40:
    name: Управление предохранительными устройствами
    description: |
      Подбор, испытание и управление жизненным циклом предохранительных
      клапанов и разрывных мембран.
  BC-4640.20.50:
    name: Целостность атмосферных вентов и факельных систем
    description: |
      Обеспечение целостности атмосферных вентов, скрубберов и факельных
      систем.
  BC-4640.30:
    name: Управление системами приборной безопасности
    description: |
      Управление жизненным циклом функциональной безопасности систем приборной
      безопасности в соответствии с IEC 61511.
  BC-4640.30.10:
    name: Определение уровней полноты безопасности
    description: |
      Определение уровней полноты безопасности для защитных функций.
  BC-4640.30.20:
    name: Верификация функций безопасности
    description: |
      Верификация того, что спроектированные SIF соответствуют требуемому SIL.
  BC-4640.30.30:
    name: Контрольное испытание SIS
    description: |
      Периодические контрольные испытания систем приборной безопасности.
  BC-4640.30.40:
    name: Оценка функциональной безопасности
    description: |
      Оценки функциональной безопасности на контрольных точках жизненного цикла.
  BC-4640.40:
    name: Управление реакционными и горючими опасностями
    description: |
      Идентификация и контроль опасностей реакционной химии, тепловых разгонов,
      горючей пыли и источников зажигания.
  BC-4640.40.10:
    name: Оценка риска реакционной химии
    description: |
      Оценка рисков реакционной химии, включая несовместимость веществ.
  BC-4640.40.20:
    name: Предотвращение тепловых разгонов
    description: |
      Предотвращение и снижение последствий тепловых разгонов экзотермических
      реакций.
  BC-4640.40.30:
    name: Контроль опасностей горючей пыли
    description: |
      Контроль опасностей горючей пыли в соответствии с NFPA 654.
  BC-4640.40.40:
    name: Контроль статического электричества и источников зажигания
    description: |
      Контроль электростатических и иных источников зажигания в технологических
      зонах.
  BC-4640.50:
    name: Управление изменениями в системе промышленной безопасности
    description: |
      Управление изменениями в рамках промышленной безопасности установки,
      процедур и персонала, включая предпусковую проверку безопасности.
  BC-4640.50.10:
    name: Рассмотрение запросов на изменения в системе управления промышленной безопасностью
    description: |
      Рассмотрение запросов на изменения, влияющих на промышленную безопасность,
      относительно стандартов опасностей.
  BC-4640.50.20:
    name: Предпусковая проверка безопасности
    description: |
      Предпусковые проверки безопасности для новых и модернизированных объектов.
  BC-4640.50.30:
    name: Управление временными изменениями
    description: |
      Управление временными технологическими изменениями в рамках
      разрешённого периода.
  BC-4640.60:
    name: Управление показателями промышленной безопасности
    description: |
      Отслеживание и отчётность по опережающим и запаздывающим показателям
      промышленной безопасности.
  BC-4640.60.10:
    name: Отчётность о событиях промышленной безопасности 1 и 2 уровней
    description: |
      Регистрация и отчётность о событиях промышленной безопасности 1 и 2
      уровней.
  BC-4640.60.20:
    name: Мониторинг опережающих показателей
    description: |
      Мониторинг опережающих показателей промышленной безопасности 3 и 4
      уровней.
  BC-4640.60.30:
    name: Отчётность по КПЭ промышленной безопасности
    description: |
      Внешняя и внутренняя отчётность по КПЭ промышленной безопасности.
  BC-4640.70:
    name: Аварийная готовность и реагирование
    description: |
      Планирование аварийного реагирования, проведение учений и координация
      реагирования на токсические выбросы в условиях крупных аварий.
  BC-4640.70.10:
    name: Планирование аварийного реагирования
    description: |
      Разработка и актуализация планов аварийного реагирования для объектов
      и корпоративного уровня.
  BC-4640.70.20:
    name: Координация учений и тренировок
    description: |
      Координация противоаварийных учений и тренировок по крупным инцидентам.
  BC-4640.70.30:
    name: Координация реагирования на токсические выбросы
    description: |
      Координация реагирования на токсические и пожароопасные выбросы.
  BC-4640.70.40:
    name: Координация взаимной помощи
    description: |
      Координация взаимной помощи с отраслевыми кооперативами реагирования.
  BC-4640.80:
    name: Рабочие инструкции промышленной безопасности
    description: |
      Разработка, проверка и определение операционных конвертов для процедур,
      критически важных для промышленной безопасности.
  BC-4640.80.10:
    name: Разработка критически важных инструкций по безопасности
    description: |
      Разработка рабочих инструкций, критически важных для промышленной
      безопасности.
  BC-4640.80.20:
    name: Определение операционного конверта
    description: |
      Определение безопасных операционных конвертов для технологических узлов.
  BC-4640.80.30:
    name: Периодический пересмотр инструкций
    description: |
      Периодический пересмотр и обновление инструкций по промышленной
      безопасности.

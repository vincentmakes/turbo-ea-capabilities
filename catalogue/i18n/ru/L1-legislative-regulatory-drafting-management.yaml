# Разработка законодательных и нормативных актов (ru) — translations for L1-legislative-regulatory-drafting-management.yaml
locale: ru
source: L1-legislative-regulatory-drafting-management.yaml
entries:
  BC-3210:
    name: Разработка законодательных и нормативных актов
    description: |
      Подготовка, юридическая проверка, оценка воздействия, координация парламентского или законодательного процесса и кодификация первичного законодательства, вторичных нормативных актов, подзаконных актов и указов.
  BC-3210.10:
    name: Законодательное нормотворчество
    description: |
      Подготовка первичного законодательства, законопроектов и поправок парламентскими советниками или законодательными экспертами.
    in_scope:
      - Подготовка законопроектов и поправок
      - Обработка инструкций по разработке
      - Подготовка на доступном языке и двуязычная подготовка
    out_of_scope:
      - Нормативные акты и подзаконные акты (относится к нормативному нормотворчеству)
  BC-3210.10.10:
    name: Приём инструкций по разработке
    description: |
      Получение и уточнение инструкций по разработке от спонсоров в области политики и министерства.
  BC-3210.10.20:
    name: Подготовка законопроектов и поправок
    description: |
      Подготовка законопроектов, поправок и сопутствующих положений.
  BC-3210.10.30:
    name: Контроль качества нормотворчества
    description: |
      Проверка старшим советником проектов законодательных актов на ясность, согласованность и эффект.
  BC-3210.20:
    name: Нормативное нормотворчество
    description: |
      Подготовка вторичных нормативных актов, подзаконных актов, указов и административных правил.
  BC-3210.20.10:
    name: Подготовка нормативных актов и подзаконных актов
    description: |
      Подготовка нормативных актов и подзаконных актов во исполнение основного законодательства.
  BC-3210.20.20:
    name: Подготовка указов
    description: |
      Подготовка указов, декретов и прокламаций.
  BC-3210.20.30:
    name: Подготовка административных правил
    description: |
      Подготовка административных правил и уведомлений органов власти.
  BC-3210.30:
    name: Юридическая проверка и конституционное соответствие
    description: |
      Юридическая экспертиза проектов нормативных актов на соответствие конституционным требованиям, правам человека и международному праву.
  BC-3210.30.10:
    name: Проверка конституционного соответствия
    description: |
      Проверка проектов актов на соответствие конституционным полномочиям, правам и ограничениям.
  BC-3210.30.20:
    name: Оценка совместимости с правами человека
    description: |
      Оценка совместимости с договорами и хартиями в области прав человека.
  BC-3210.30.30:
    name: Проверка соответствия нормам международного права
    description: |
      Проверка проектов актов на соответствие договорным и наднациональным обязательствам.
  BC-3210.40:
    name: Оценка регулятивного воздействия
    description: |
      Оценка ожидаемых затрат, выгод и распределительных эффектов предлагаемых нормативных актов в соответствии с принципами ОЭСР по улучшению регулирования.
  BC-3210.40.10:
    name: Определение масштаба оценки воздействия
    description: |
      Определение масштаба оценок регулятивного воздействия и соразмерности.
  BC-3210.40.20:
    name: Анализ затрат и выгод
    description: |
      Количественная оценка регулятивных затрат и выгод, включая бремя соблюдения требований.
  BC-3210.40.30:
    name: Тест воздействия на малый бизнес и МСП
    description: |
      Оценка несоразмерного воздействия на малый бизнес и МСП.
  BC-3210.40.40:
    name: Публикация оценки воздействия
    description: |
      Публикация оценок воздействия вместе с нормативным актом и подтверждающими доказательствами.
  BC-3210.50:
    name: Координация законодательного процесса
    description: |
      Координация парламентского или законодательного рассмотрения законопроектов, включая свидетельства для комитетов, поправки и королевское утверждение или промульгацию.
  BC-3210.50.10:
    name: Взаимодействие с парламентом
    description: |
      Взаимодействие с парламентскими или законодательными органами по правительственным законопроектам.
  BC-3210.50.20:
    name: Подготовка доказательной базы для комитетов
    description: |
      Подготовка доказательств, брифингов и свидетелей для законодательных комитетов.
  BC-3210.50.30:
    name: Отслеживание поправок
    description: |
      Отслеживание и оценка законодательных поправок на различных стадиях.
  BC-3210.50.40:
    name: Координация промульгации и королевского утверждения
    description: |
      Координация окончательной промульгации, королевского утверждения или подписи исполнительной власти.
  BC-3210.60:
    name: Правовая кодификация и публикация
    description: |
      Компиляция, консолидация, публикация в официальном вестнике и ведение законодательных и нормативных текстов.
  BC-3210.60.10:
    name: Публикация в официальном вестнике
    description: |
      Публикация принятых актов в официальном вестнике или журнале.
  BC-3210.60.20:
    name: Консолидация и кодификация
    description: |
      Консолидация поправок и кодификация в сборниках законодательства.
  BC-3210.60.30:
    name: Ведение правовых текстов
    description: |
      Постоянное ведение и машиночитаемая публикация законодательных и нормативных текстов.

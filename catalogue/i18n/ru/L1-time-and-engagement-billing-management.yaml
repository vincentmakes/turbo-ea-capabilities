# Управление учётом времени и биллингом задания (ru) — translations for L1-time-and-engagement-billing-management.yaml
locale: ru
source: L1-time-and-engagement-billing-management.yaml
entries:
  BC-4330:
    name: Управление учётом времени и биллингом задания
    description: |
      Учёт времени, незавершённое производство, условия вознаграждения, выставление счетов, реализация и контроль списаний по биллинговым заданиям, а также управление клиентскими трастовыми счетами и авансовыми платежами, специфическими для юридической практики.
  BC-4330.10:
    name: Управление хронометражом
    description: |
      Сбор, валидация и подача записей о рабочем времени специалистов с нарративными деталями на уровне задания и задачи.
  BC-4330.10.10:
    name: Внесение записей о времени
    description: |
      Ежедневное внесение биллингового и небиллингового времени с детализацией по заданию, задаче и виду деятельности.
  BC-4330.10.20:
    name: Управление качеством нарративов учёта времени
    description: |
      Контроль качества нарративов учёта времени на соответствие требованиям биллинговых инструкций клиента и электронного биллинга.
  BC-4330.10.30:
    name: Подача и утверждение записей о времени
    description: |
      Подача, утверждение руководителем и блокировка записей о времени.
  BC-4330.20:
    name: Управление расходами задания
    description: |
      Сбор и аллокация расходов по заданию: судебные сборы, экспертные гонорары, командировочные расходы и печать для последующего предъявления клиенту.
  BC-4330.20.10:
    name: Сбор расходов
    description: |
      Внесение расходов в дело задания для последующего возмещения.
  BC-4330.20.20:
    name: Ревью возместимости расходов
    description: |
      Ревью возместимости расходов в соответствии с письмом о задании и биллинговыми инструкциями клиента.
  BC-4330.20.30:
    name: Начисление расходов на задание
    description: |
      Аллокация утверждённых расходов в НЗП задания для последующего выставления счёта.
  BC-4330.30:
    name: Управление незавершённым производством
    description: |
      Отслеживание остатков невыставленного НЗП, старения и решений о повышении/снижении оценки перед выставлением счёта.
  BC-4330.30.10:
    name: Отслеживание НЗП
    description: |
      Отслеживание невыставленного НЗП в реальном времени по заданию, партнёру и практике.
  BC-4330.30.20:
    name: Анализ старения НЗП
    description: |
      Анализ старения невыставленного НЗП и эскалация устаревших остатков.
  BC-4330.30.30:
    name: Принятие решений о повышении/снижении оценки НЗП
    description: |
      Принятие партнёром решений о повышении и снижении оценки НЗП, а также отсрочках перед выставлением счёта.
  BC-4330.40:
    name: Управление условиями вознаграждения
    description: |
      Ведение структур вознаграждения на уровне задания: почасовые ставки, альтернативные условия вознаграждения, фиксированные гонорары, гонорары успеха и авансовые платежи.
  BC-4330.40.10:
    name: Ведение тарифных карт
    description: |
      Ведение стандартных, клиентских и задание-специфических почасовых тарифных карт.
  BC-4330.40.20:
    name: Настройка альтернативных условий вознаграждения
    description: |
      Настройка условий фиксированного, с потолком, успеха, условного и авансового вознаграждения по каждому заданию.
  BC-4330.40.30:
    name: Управление скидками и объёмным ценообразованием
    description: |
      Применение согласованных скидок и объёмного ценообразования по портфелю заданий клиента.
  BC-4330.50:
    name: Управление формированием счетов
    description: |
      Формирование счетов по заданиям, форматирование нарративов и соответствие требованиям к формату электронного биллинга клиента.
  BC-4330.50.10:
    name: Подготовка проформы счёта
    description: |
      Подготовка и ревью партнёром проформ счетов перед финальной выдачей.
  BC-4330.50.20:
    name: Выдача финального счёта
    description: |
      Выдача финальных счетов по заданию, включая нарратив, расходы и налог.
  BC-4330.50.30:
    name: Соответствие требованиям электронного биллинга клиента
    description: |
      Соответствие требованиям электронного биллинга клиента, включая LEDES, коды задач UTBMS и подачу через клиентский портал.
  BC-4330.50.40:
    name: Соблюдение биллинговых инструкций клиента
    description: |
      Применение биллинговых инструкций клиента по времени, ставкам и расходам.
  BC-4330.60:
    name: Управление реализацией задания
    description: |
      Отслеживание коэффициентов реализации «выставлено/получено» и «стандарт/выставлено», списаний и рентабельности задания.
  BC-4330.60.10:
    name: Отслеживание реализации стандарт/выставлено
    description: |
      Отслеживание стандартного НЗП относительно выставленной суммы для выявления утечки выручки.
  BC-4330.60.20:
    name: Отслеживание реализации выставлено/получено
    description: |
      Отслеживание выставленной суммы относительно полученных денежных средств, включая резервирование безнадёжных долгов.
  BC-4330.60.30:
    name: Отчётность о рентабельности задания
    description: |
      Отчётность о рентабельности по заданию, партнёру и практике с использованием реализованной выручки и прямых затрат.
  BC-4330.60.40:
    name: Утверждение списаний и анализ причин
    description: |
      Процесс утверждения и анализ коренных причин списаний НЗП и дебиторской задолженности.
  BC-4330.70:
    name: Управление клиентскими трастовыми счетами и авансовыми платежами
    description: |
      Управление клиентскими трастовыми средствами, IOLTA-счетами и остатками авансовых платежей со специфическими требованиями к обособленности и сверке, применимыми в юридической практике.
    in_scope:
      - Операции по клиентскому трастовому счёту
      - Отслеживание остатков авансовых платежей
      - Сверка и отчётность по трастовому счёту
    out_of_scope:
      - Общее казначейство фирмы (BC-180)
  BC-4330.70.10:
    name: Операции по клиентскому трастовому счёту
    description: |
      Ведение обособленных клиентских трастовых счетов, включая приходы и расходы от имени клиента.
  BC-4330.70.20:
    name: Управление остатками авансовых платежей
    description: |
      Отслеживание остатков авансовых платежей клиентов и триггеров пополнения.
  BC-4330.70.30:
    name: Трастовая сверка и отчётность
    description: |
      Трёхсторонняя сверка трастовых регистров и уставная или отраслевая отчётность по трастовым остаткам.

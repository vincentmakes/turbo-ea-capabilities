# Управление кредитованием (ru) — translations for L1-credit-lending-management.yaml
locale: ru
source: L1-credit-lending-management.yaml
entries:
  BC-1320:
    name: Управление кредитованием
    description: |
      Выдача кредитов, андеррайтинг, обслуживание займов, взыскание задолженности, управление портфелем.
  BC-1320.10:
    name: Управление выдачей кредитов
    description: |
      Приём кредитных заявок, предварительный скрининг, процессы выдачи.
  BC-1320.10.10:
    name: Приём кредитной заявки
    description: |
      Приём кредитных заявок по различным каналам.
  BC-1320.10.20:
    name: Предварительный скрининг и оценка доступности
    description: |
      Предварительный скрининг, оценка доступности и платёжеспособности.
  BC-1320.10.30:
    name: Оркестрация процесса выдачи кредита
    description: |
      Оркестрация процессов выдачи кредитов и SLA.
  BC-1320.10.40:
    name: Сбор документов для выдачи кредита
    description: |
      Сбор и проверка подтверждающих документов для выдачи кредита.
  BC-1320.20:
    name: Управление андеррайтингом и принятием кредитных решений
    description: |
      Андеррайтинг, финансовый анализ, принятие решений, делегированные полномочия.
  BC-1320.20.10:
    name: Оценка кредитного риска
    description: |
      Оценка кредитного риска заявителей и подверженностей.
  BC-1320.20.20:
    name: Распределение и анализ финансовой отчётности
    description: |
      Раскладка финансовой отчётности и анализ коэффициентов.
  BC-1320.20.30:
    name: Принятие кредитных решений
    description: |
      Скоринговые системы и экспертное принятие кредитных решений.
  BC-1320.20.40:
    name: Утверждение кредита и делегированные полномочия
    description: |
      Корпоративное управление утверждением кредита и применение делегированных полномочий.
  BC-1320.20.50:
    name: Оценка и управление обеспечением
    description: |
      Идентификация, оценка обеспечения и оформление залоговых прав.
  BC-1320.30:
    name: Управление обслуживанием кредита
    description: |
      Обслуживание займов, платежи, изменение графика, модификации.
  BC-1320.30.10:
    name: Выдача кредита
    description: |
      Выдача и управление выборкой кредита.
  BC-1320.30.20:
    name: Обработка погашений
    description: |
      Составление графика, обработка и выверка погашений.
  BC-1320.30.30:
    name: Модификация кредита
    description: |
      Изменение условий кредита, реструктуризация и рефинансирование.
  BC-1320.30.40:
    name: Досрочное погашение и закрытие кредита
    description: |
      Досрочное погашение, выдача справки о закрытии и операции по закрытию кредита.
  BC-1320.40:
    name: Управление взысканием и возвратом долгов
    description: |
      Взыскание задолженности, реструктуризация, операции по возврату, работа с проблемными кредитами.
  BC-1320.40.10:
    name: Взыскание на ранних стадиях просрочки
    description: |
      Управление ранними просрочками и напоминания.
  BC-1320.40.20:
    name: Взыскание на поздних стадиях просрочки
    description: |
      Взыскание на поздних стадиях и направление в суд.
  BC-1320.40.30:
    name: Реструктуризация и отсрочка платежей
    description: |
      Предложения по реструктуризации, отсрочке платежей и поддержке заёмщиков в трудной ситуации.
  BC-1320.40.40:
    name: Возврат долга и списание
    description: |
      Операции по возврату долга, списание и постсписочные мероприятия.
  BC-1320.40.50:
    name: Работа с проблемными кредитами
    description: |
      Работа с неработающими кредитами, их продажа и секьюритизация.
  BC-1320.50:
    name: Управление кредитным портфелем
    description: |
      Аналитика портфеля, оптимизация, управление капиталом.
  BC-1320.50.10:
    name: Аналитика рисков портфеля
    description: |
      Аналитика портфеля, включая когортный анализ, концентрацию и стресс-тестирование.
  BC-1320.50.20:
    name: Оптимизация портфеля
    description: |
      Оптимизация структуры портфеля, ценообразования и соотношения риска и доходности.
  BC-1320.50.30:
    name: Управление капиталом кредитного портфеля
    description: |
      Управление капиталом кредитных портфелей в соответствии с правилами Базеля.
  BC-1320.50.40:
    name: Отчётность по портфелю
    description: |
      Отчётность по портфелю для риск-комитетов и регуляторов.
  BC-1320.60:
    name: Управление моделированием кредитных рисков
    description: |
      Модели PD/LGD/EAD, IRB, оценка ECL по IFRS 9.
  BC-1320.60.10:
    name: Разработка моделей PD/LGD/EAD
    description: |
      Разработка моделей вероятности дефолта, убытка при дефолте и подверженности при дефолте.
  BC-1320.60.20:
    name: Моделирование ECL по IFRS 9
    description: |
      Разработка и эксплуатация модели ожидаемых кредитных убытков по IFRS 9.
  BC-1320.60.30:
    name: Валидация моделей
    description: |
      Независимая валидация моделей кредитных рисков.
  BC-1320.60.40:
    name: Мониторинг моделей
    description: |
      Постоянный мониторинг работы и перекалибровка моделей.

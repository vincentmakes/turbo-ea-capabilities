# Управление исследованиями и научной деятельностью (ru) — translations for L1-research-scholarship-management.yaml
locale: ru
source: L1-research-scholarship-management.yaml
entries:
  BC-4780:
    name: Управление исследованиями и научной деятельностью
    description: |
      Управление исследовательской миссией учебного заведения, охватывающее
      стратегию портфеля, жизненный цикл грантов, надзор за этикой и
      добросовестностью, научные публикации, исследовательское сотрудничество
      и оценку воздействия.
  BC-4780.10:
    name: Портфель и стратегия исследований
    description: |
      Стратегическое формирование исследовательского портфеля учебного
      заведения по тематическим направлениям, центрам и вложениям в
      развитие компетенций.
    in_scope:
      - Стратегия исследовательских тематик и центров
      - Планирование инвестиций в исследовательскую базу
      - Отчётность по результатам исследований
    out_of_scope:
      - Общее управление портфелем проектов (охватывается межотраслевым управлением портфелем проектов)
  BC-4780.10.10:
    name: Стратегия исследовательских тематик и центров
    description: |
      Стратегия развития исследовательских тематик, центров и институтов.
  BC-4780.10.20:
    name: Планирование исследовательских инвестиций
    description: |
      Планирование инвестиций в исследовательскую базу, включая
      инфраструктуру и кадры.
  BC-4780.10.30:
    name: Отчётность по результатам исследований
    description: |
      Внутренняя и внешняя отчётность по результатам исследовательской
      деятельности.
  BC-4780.20:
    name: Управление грантами на исследования
    description: |
      Сквозное управление исследовательскими грантами и договорами —
      от выявления возможностей до постгрантового администрирования.
    in_scope:
      - Выявление грантовых возможностей
      - Разработка предложений до присвоения гранта
      - Грантовое администрирование после присвоения
    out_of_scope:
      - Общее финансовое управление (охватывается межотраслевым финансовым управлением)
  BC-4780.20.10:
    name: Выявление грантовых возможностей
    description: |
      Выявление грантовых и финансовых возможностей для исследователей.
  BC-4780.20.20:
    name: Разработка заявок на грант
    description: |
      Разработка заявок на гранты, смет и пакетов документов для подачи.
  BC-4780.20.30:
    name: Постгрантовое администрирование
    description: |
      Администрирование полученных грантов, включая отчётность и
      соблюдение условий.
  BC-4780.30:
    name: Надзор за этикой и добросовестностью исследований
    description: |
      Независимый надзор за этикой и добросовестностью исследований,
      включая рецензирование исследований с участием людей и животных и
      расследование нарушений.
    in_scope:
      - Рецензирование исследований с участием людей (IRB/REC)
      - Надзор за исследованиями с участием животных (IACUC/AWERB)
      - Расследование нарушений добросовестности исследований
    out_of_scope:
      - Дела об академических нарушениях в оценивании (охватываются управлением оцениванием и экзаменами)
  BC-4780.30.10:
    name: Рецензирование исследований с участием людей
    description: |
      Независимое рецензирование исследований, в которых участвуют люди
      в качестве испытуемых.
  BC-4780.30.20:
    name: Надзор за исследованиями с участием животных
    description: |
      Надзор за исследованиями, в которых участвуют животные в качестве
      испытуемых.
  BC-4780.30.30:
    name: Расследование нарушений добросовестности
    description: |
      Расследование обвинений в нарушении добросовестности исследований.
  BC-4780.40:
    name: Управление научными публикациями и выходными данными
    description: |
      Учёт и сопровождение научных публикаций, включая отслеживание
      публикаций, открытый доступ и управление постоянными
      идентификаторами.
    in_scope:
      - Отслеживание публикаций
      - Управление открытым доступом и репозиторием
      - Управление постоянными идентификаторами (ORCID, DOI)
    out_of_scope:
      - Коммерциализация интеллектуальной собственности (охватывается межотраслевым управлением интеллектуальной собственностью)
  BC-4780.40.10:
    name: Отслеживание публикаций
    description: |
      Отслеживание публикаций и научных выходных данных исследователей.
  BC-4780.40.20:
    name: Управление открытым доступом и репозиторием
    description: |
      Управление публикациями в открытом доступе и институциональными
      репозиториями.
  BC-4780.40.30:
    name: Управление постоянными идентификаторами
    description: |
      Управление постоянными идентификаторами исследователей и научных
      результатов.
  BC-4780.50:
    name: Управление научным сотрудничеством и партнёрством
    description: |
      Установление и осуществление научных партнёрств с академическими
      учреждениями, промышленностью и международными партнёрами.
    in_scope:
      - Межинституциональные соглашения о сотрудничестве
      - Партнёрство с промышленностью в области исследований
      - Международное научное сотрудничество
    out_of_scope:
      - Отношения с коммерческими поставщиками (охватываются межотраслевым управлением поставщиками)
  BC-4780.50.10:
    name: Межинституциональные исследовательские соглашения
    description: |
      Управление соглашениями о сотрудничестве с другими учебными
      заведениями.
  BC-4780.50.20:
    name: Промышленное исследовательское партнёрство
    description: |
      Управление партнёрством с промышленностью и спонсируемыми
      исследованиями.
  BC-4780.50.30:
    name: Международное научное сотрудничество
    description: |
      Установление и осуществление международного научного
      сотрудничества.
  BC-4780.60:
    name: Оценка воздействия исследований
    description: |
      Оценка воздействия исследований на основе кейсов, библиометрии и
      участия в национальных оценочных мероприятиях.
    in_scope:
      - Кейсы воздействия исследований
      - Библиометрический и альтметрический анализ
      - Представление материалов для национальной оценки исследований (например, REF)
    out_of_scope:
      - Проверки академической аккредитации (охватываются управлением академическим качеством и аккредитацией)
  BC-4780.60.10:
    name: Кейсы воздействия исследований
    description: |
      Подготовка кейсов, демонстрирующих воздействие исследований.
  BC-4780.60.20:
    name: Библиометрический и альтметрический анализ
    description: |
      Библиометрический и альтметрический анализ научных результатов и
      охвата аудитории.
  BC-4780.60.30:
    name: Представление данных для национальной оценки
    description: |
      Подготовка материалов для национальных оценочных мероприятий в
      области исследований.
metadata:
  status: draft
  reviewer: pending

# Управление каталогом телеком-продуктов (ru) — translations for L1-telecom-product-catalogue-management.yaml
locale: ru
source: L1-telecom-product-catalogue-management.yaml
entries:
  BC-2650:
    name: Управление каталогом телеком-продуктов
    description: |
      Проектирование, конфигурирование, управление жизненным циклом и
      публикация телеком-продуктов, тарифов, планов, пакетов и акций
      для потребительского, корпоративного и оптового сегментов.
  BC-2650.10:
    name: Проектирование продуктовых предложений
    description: |
      Разработка новых коммерческих предложений, включая функции,
      условия участия и структуры ценообразования.
  BC-2650.10.10:
    name: Спецификация предложения
    description: |
      Определение состава предложения, функций и клиентских условий.
  BC-2650.10.20:
    name: Техническая реализуемость продукта
    description: |
      Подтверждение технической реализуемости предложения в целевых сетях
      и на платформах.
  BC-2650.10.30:
    name: Разработка ценовых уровней
    description: |
      Разработка ценовых уровней, условий участия и структур контрактов
      для предложения.
  BC-2650.20:
    name: Управление тарифами и планами
    description: |
      Определение и управление жизненным циклом тарифов, периодических платежей
      и политик разумного использования, лежащих в основе предложений.
  BC-2650.20.10:
    name: Определение тарифов на использование
    description: |
      Определение тарифов на событие и единицу использования по типу сервиса
      и юрисдикции.
  BC-2650.20.20:
    name: Определение периодических платежей
    description: |
      Определение периодических платежей, ежемесячных абонентских плат
      и контрактных начислений.
  BC-2650.20.30:
    name: Управление политиками разумного использования
    description: |
      Определение и управление жизненным циклом политик разумного и
      допустимого использования для безлимитных и высоконагрузочных планов.
  BC-2650.30:
    name: Управление пакетами и акциями
    description: |
      Формирование состава многопродуктовых пакетов и правил акций,
      ограниченных по времени.
  BC-2650.30.10:
    name: Формирование пакетов услуг
    description: |
      Формирование многосервисных пакетов, включающих мобильную связь,
      фиксированные сети, контент и устройства.
  BC-2650.30.20:
    name: Правила участия в акциях
    description: |
      Определение правил участия клиентов и предложений в акциях.
  BC-2650.30.30:
    name: Правила суммирования скидок
    description: |
      Правила применения нескольких скидок и акций к одному аккаунту.
  BC-2650.40:
    name: Публикация продуктового каталога
    description: |
      Публикация версий каталога в каналах и у партнёров с контролем версий
      и региональными вариантами.
  BC-2650.40.10:
    name: Многоканальная публикация каталога
    description: |
      Публикация контента каталога в розничных, цифровых, контактно-центровых
      и партнёрских каналах.
  BC-2650.40.20:
    name: Контроль версий каталога
    description: |
      Контроль версий контента каталога, включая даты вступления в силу
      и откат.
  BC-2650.40.30:
    name: Управление региональными вариантами каталога
    description: |
      Управление региональными и брендовыми вариантами каталога
      из единого мастер-каталога.
  BC-2650.50:
    name: Управление жизненным циклом телеком-продуктов
    description: |
      Управление жизненным циклом предложений от запуска через модификацию,
      завершение продаж и дедовщину.
  BC-2650.50.10:
    name: Запуск предложения
    description: |
      Координация запуска новых предложений в системах, каналах и регионах.
  BC-2650.50.20:
    name: Изменение предложения
    description: |
      Контролируемое изменение действующих предложений и миграция существующих
      абонентов при необходимости.
  BC-2650.50.30:
    name: Вывод предложения из продажи и дедовщина
    description: |
      Вывод предложений из продажи с сохранением условий для существующих
      абонентов на ранее действовавших тарифах.
metadata:
  status: draft
  reviewer: pending

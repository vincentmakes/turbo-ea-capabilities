# Уборка и послеуборочная обработка (ru) — translations for L1-harvest-post-harvest-operations-management.yaml
locale: ru
source: L1-harvest-post-harvest-operations-management.yaml
entries:
  BC-3560:
    name: Уборка и послеуборочная обработка
    description: |
      Планирование и проведение уборки, полевое и послеуборочное
      кондиционирование, хранение на ферме, сортировка и упаковка,
      а также входная приёмка в следующем звене агропродовольственной цепи.
  BC-3560.10:
    name: Планирование и организация уборки
    description: |
      Планирование сроков уборки, организация бригад и техники,
      координация уборочной логистики по полям и культурам.
  BC-3560.10.10:
    name: Планирование сроков уборки
    description: |
      Полевое планирование сроков уборки по зрелости и погоде.
  BC-3560.10.20:
    name: Организация уборочных бригад и техники
    description: |
      Организация работы уборочных бригад, подрядчиков и техники.
  BC-3560.10.30:
    name: Координация уборочной логистики
    description: |
      Координация работы грузовиков, контейнеров и прицепов
      на активных уборочных фронтах.
  BC-3560.20:
    name: Полевые операции уборки
    description: |
      Механическая и ручная уборка, включая полевую сортировку
      и полевую перегрузку.
  BC-3560.20.10:
    name: Механическая уборка
    description: |
      Комбайновая, косилочно-плющильная и специализированная
      механическая уборка.
  BC-3560.20.20:
    name: Ручная уборка
    description: |
      Ручной и выборочный сбор садовых культур.
  BC-3560.20.30:
    name: Полевая сортировка
    description: |
      Полевая сортировка и обрезка убранной продукции.
  BC-3560.30:
    name: Послеуборочное кондиционирование
    description: |
      Сушка, охлаждение, лечение и обеззараживание убранной
      продукции для стабилизации перед хранением или переработкой.
    in_scope:
      - Сушка зерна и семян
      - Предварительное охлаждение садовой продукции
      - Лечение корнеплодов и луковых культур
      - Полевая очистка и обеззараживание
  BC-3560.30.10:
    name: Операции сушки
    description: |
      Сушка зерна, семян и корма до безопасной влажности.
  BC-3560.30.20:
    name: Операции охлаждения и предварительного охлаждения
    description: |
      Гидро-, вакуумное и воздушное предварительное охлаждение
      садовой продукции.
  BC-3560.30.30:
    name: Операции лечения
    description: |
      Лечение картофеля, лука, батата и аналогичных культур.
  BC-3560.30.40:
    name: Очистка и обеззараживание
    description: |
      Очистка и обеззараживание убранной продукции
      перед хранением.
  BC-3560.40:
    name: Операции хранения на ферме
    description: |
      Функционирование ферменных бункеров, силосов и холодных складов,
      включая аэрацию и борьбу с вредителями запасов.
  BC-3560.40.10:
    name: Управление бункерами и силосами
    description: |
      Загрузка, мониторинг и разгрузка зерновых бункеров и силосов.
  BC-3560.40.20:
    name: Операции холодного хранения
    description: |
      Функционирование ферменных холодильных и
      газорегулируемых складов.
  BC-3560.40.30:
    name: Аэрация хранимого зерна
    description: |
      Управление аэрацией хранимого зерна для поддержания
      температуры и влажности.
  BC-3560.40.40:
    name: Борьба с вредителями запасов
    description: |
      Мониторинг и обработка от насекомых и грызунов
      на складах.
  BC-3560.50:
    name: Сортировка и упаковка продукции
    description: |
      Сортировка, упаковочные операции и маркировка партий
      для последующего перемещения.
  BC-3560.50.10:
    name: Операции контроля качества при сортировке
    description: |
      Сортировка продукции по размеру, цвету и дефектам.
  BC-3560.50.20:
    name: Операции упаковочного цеха
    description: |
      Линейные операции упаковочного цеха, включая мойку,
      воскование и упаковку.
  BC-3560.50.30:
    name: Идентификация и маркировка партий
    description: |
      Присвоение идентификаторов партий, серий и GS1
      и печать этикеток.
  BC-3560.60:
    name: Входная приёмка на переработку
    description: |
      Координация входной приёмки с фермы или агрегатора
      на площадки переработчика или покупателя.
  BC-3560.60.10:
    name: Организация приёма грузовиков
    description: |
      Организация и приём входящих грузовиков
      у ворот переработчика.
  BC-3560.60.20:
    name: Отбор образцов при приёмке
    description: |
      Входной отбор образцов партий зерна, скота,
      молока и продукции.
  BC-3560.60.30:
    name: Контроль качества при приёмке
    description: |
      Контроль качества входящих партий для
      принятия решений о приёмке и ценообразовании.

# Налоговое управление (ru) — translations for L1-tax-management.yaml
locale: ru
source: L1-tax-management.yaml
entries:
  BC-220:
    name: Налоговое управление
    description: |
      Планирование, соответствие требованиям и отчётность по прямым и косвенным налогам.
  BC-220.10:
    name: Управление прямыми налогами
    description: |
      Планирование, соответствие требованиям и подача деклараций по налогу на прибыль.
  BC-220.10.10:
    name: Резервирование налога на прибыль
    description: |
      Расчёт текущих и отложенных налогов и формирование налогового резерва.
  BC-220.10.20:
    name: Подача деклараций по налогу на прибыль
    description: |
      Подготовка и представление налоговых деклараций по налогу на прибыль организаций.
  BC-220.10.30:
    name: Управление налогом у источника выплаты
    description: |
      Определение, уплата и сертификация налога у источника выплаты.
  BC-220.10.40:
    name: Управление налоговыми убытками и кредитами
    description: |
      Использование, мониторинг и прогнозирование налоговых убытков и кредитов.
  BC-220.20:
    name: Управление косвенными налогами
    description: |
      НДС, налог на товары и услуги, налог с продаж, таможенные пошлины.
  BC-220.20.10:
    name: Определение НДС и налога на товары и услуги
    description: |
      Присвоение налоговых кодов, определение места поставки и расчёт косвенных налогов.
  BC-220.20.20:
    name: Подача деклараций по косвенным налогам
    description: |
      Подготовка и представление деклараций по НДС, налогу на товары и услуги и налогу с продаж.
  BC-220.20.30:
    name: Электронное выставление счетов и отчётность в реальном времени
    description: |
      Электронное выставление счетов и онлайн-отчётность в налоговые органы.
  BC-220.20.40:
    name: Управление таможенными и акцизными пошлинами
    description: |
      Таможенная оценка, классификация товаров и администрирование акцизных сборов.
  BC-220.30:
    name: Управление трансфертным ценообразованием
    description: |
      Политика, документация и защита в области трансфертного ценообразования.
  BC-220.30.10:
    name: Установление политики трансфертного ценообразования
    description: |
      Определение политики трансфертного ценообразования в соответствии с руководящими принципами ОЭСР.
  BC-220.30.20:
    name: Документация по трансфертному ценообразованию
    description: |
      Основной файл, локальный файл и страновая отчётность.
  BC-220.30.30:
    name: Операции по внутригрупповым начислениям
    description: |
      Расчёт, выставление счетов и расчёт по внутригрупповым начислениям.
  BC-220.30.40:
    name: Защита позиции по трансфертному ценообразованию
    description: |
      Защита при налоговых проверках, предварительные соглашения о ценообразовании и взаимосогласительные процедуры.
  BC-220.40:
    name: Налоговая отчётность и соответствие требованиям
    description: |
      Налоговые декларации, законодательные налоговые раскрытия.
  BC-220.40.10:
    name: Налоговый учёт и раскрытие информации
    description: |
      Налоговые раскрытия в финансовой отчётности и анализ эффективной налоговой ставки.
  BC-220.40.20:
    name: Налоговый календарь соответствия
    description: |
      Глобальный календарь налоговой отчётности и отслеживание обязательств.
  BC-220.40.30:
    name: Страновая отчётность
    description: |
      Представление страновой отчётности по правилам BEPS ОЭСР.
  BC-220.40.40:
    name: Налоговые данные и выверка
    description: |
      Извлечение налоговых данных, выверка и сверка пробного баланса с декларацией.
  BC-220.50:
    name: Налоговое планирование и консультирование
    description: |
      Налоговое структурирование, консультирование, споры с налоговыми органами.
  BC-220.50.10:
    name: Стратегическое налоговое планирование
    description: |
      Налогово-эффективное структурирование операций, финансирования и цепочек поставок.
  BC-220.50.20:
    name: Налоговое консультирование по сделкам
    description: |
      Налоговый due diligence и структурирование сделок M&A и реорганизаций.
  BC-220.50.30:
    name: Управление налоговыми спорами
    description: |
      Налоговые проверки, спорные вопросы и разрешение налоговых споров.
  BC-220.50.40:
    name: Налоговые риски и управление
    description: |
      Фреймворк налоговых рисков, контроли и раскрытия налоговой стратегии.

# Управление медиаактивами (ru) — translations for L1-media-asset-management.yaml
locale: ru
source: L1-media-asset-management.yaml
entries:
  BC-3710:
    name: Управление медиаактивами
    description: |
      Приём, каталогизация, хранение, трансформация, архивное сохранение
      и управление идентификаторами медиаактивов на протяжении жизненного
      цикла контента от производства до дистрибуции.
  BC-3710.10:
    name: Приём активов и контроль качества
    description: |
      Ввод исходного материала в платформу активов с техническим
      и редакционным контролем качества перед дальнейшим использованием.
  BC-3710.10.10:
    name: Приём исходных активов
    description: |
      Приём исходных файлов и захват с плёнки или фида
      в платформу активов.
  BC-3710.10.20:
    name: Инспекция контроля качества
    description: |
      Автоматизированная и операторская инспекция QC
      на дефекты изображения, аудио и метаданных.
  BC-3710.10.30:
    name: Валидация технического соответствия
    description: |
      Валидация по спецификациям поставки, включая формат,
      частоту кадров, громкость и соответствие сигнала.
  BC-3710.20:
    name: Каталогизация метаданных
    description: |
      Разработка и кураторство описательных, технических и правовых
      метаданных, делающих активы обнаруживаемыми и пригодными к использованию.
  BC-3710.20.10:
    name: Разработка описательных метаданных
    description: |
      Каталогизация названий, синопсисов, авторов и редакционных
      атрибутов по контролируемой схеме.
  BC-3710.20.20:
    name: Захват технических метаданных
    description: |
      Извлечение и хранение технических метаданных уровня
      эссенции, контейнера и сигнала.
  BC-3710.20.30:
    name: Связывание правовых метаданных
    description: |
      Связывание записей активов с правовыми записями,
      охватывающими территорию, окно и ограничения платформы.
  BC-3710.20.40:
    name: Управление таксономией и контролируемым словарём
    description: |
      Управление таксономиями, жанрами и контролируемыми
      словарями, используемыми в каталоге.
  BC-3710.30:
    name: Хранение и уровни хранения активов
    description: |
      Многоуровневое хранение медиаактивов в онлайн, ближайшем
      и архивном уровнях для балансировки задержки доступа и затрат.
  BC-3710.30.10:
    name: Онлайн-хранение активов
    description: |
      Высокопроизводительное хранилище для активов,
      находящихся в активном производстве и дистрибуции.
  BC-3710.30.20:
    name: Управление ближайшим и архивным уровнями
    description: |
      Перемещение активов по жизненному циклу в ближний
      и архивный уровни с уровнями обслуживания восстановления.
  BC-3710.30.30:
    name: Оптимизация затрат на хранение
    description: |
      Оптимизация политики уровней хранения, дедупликации
      и сокращения объёма активов.
  BC-3710.40:
    name: Транскодирование и конвертация форматов
    description: |
      Создание промежуточных и дистрибуционных рендиций
      через конвейеры транскодирования и упаковки.
  BC-3710.40.10:
    name: Создание мезанин-мастеров
    description: |
      Создание высококачественных мезанин-мастеров как промежуточных
      для последующих дистрибуционных кодировок.
  BC-3710.40.20:
    name: Кодирование дистрибуционных форматов
    description: |
      Кодирование дистрибуционных рендиций для вещательных,
      OTT и партнёрских спецификаций поставки.
  BC-3710.40.30:
    name: Упаковка адаптивного битрейта
    description: |
      Упаковка лестниц адаптивного битрейта для потоковой
      передачи HLS, MPEG-DASH и CMAF.
  BC-3710.50:
    name: Долгосрочное архивирование и сохранение
    description: |
      Долгосрочное сохранение мастеров и исторических активов,
      включая реставрацию устаревших материалов.
  BC-3710.50.10:
    name: Каталогизация архива
    description: |
      Каталогизация долгосрочных архивных фондов, включая записи
      устаревших носителей и физических элементов.
  BC-3710.50.20:
    name: Миграция для сохранения
    description: |
      Периодическая миграция архивных материалов между поколениями
      хранилищ для предотвращения устаревания форматов и носителей.
  BC-3710.50.30:
    name: Реставрация и ремастеринг
    description: |
      Реставрация изображения и аудио, ремастеринг устаревших
      материалов до современных стандартов поставки.
  BC-3710.60:
    name: Управление идентификаторами и версиями контента
    description: |
      Присвоение и отслеживание идентификаторов контента и записей
      версий, уникально описывающих каждую редакцию и рендицию.
  BC-3710.60.10:
    name: Присвоение идентификаторов контента
    description: |
      Присвоение внутренних и реестровых идентификаторов
      (EIDR, ISAN, ISRC, ISWC) произведениям и рендициям.
  BC-3710.60.20:
    name: Управление версиями и историей редакций
    description: |
      Отслеживание истории редакций, языковых, регуляторных
      и платформенных версий относительно родительских мастеров.
  BC-3710.60.30:
    name: Кросс-референсное сопоставление идентификаторов
    description: |
      Кросс-референсное сопоставление внутренних идентификаторов
      с партнёрскими, ритейлерными и реестровыми идентификаторами.

# Управление операциями водоподготовки (ru) — translations for L1-water-treatment-operations-management.yaml
locale: ru
source: L1-water-treatment-operations-management.yaml
entries:
  BC-3870:
    name: Управление операциями водоподготовки
    description: |
      Производство питьевой воды на водоочистных станциях — управление
      технологическим процессом, обеспечение качества питьевой воды, управление
      химическими реагентами, хранение очищенной воды и управление шламами
      согласно нормативам питьевой воды и принципам Плана водной безопасности ВОЗ.
  BC-3870.10:
    name: Операции водоочистных станций
    description: |
      Ежедневная эксплуатация водоочистных станций
      с подачей воды в соответствии со спецификациями.
  BC-3870.10.10:
    name: Сменная эксплуатация водоочистных станций
    description: |
      Сменная эксплуатация станций традиционной
      и мембранной очистки.
  BC-3870.10.20:
    name: Планирование производительности очистки
    description: |
      Планирование выхода очищенной воды против распределительного
      спроса и состояния накопителей.
  BC-3870.10.30:
    name: Отчётность о производительности станций
    description: |
      Отчётность о производительности, энергопотреблении
      и показателях эффективности станций.
  BC-3870.20:
    name: Управление технологическим процессом очистки
    description: |
      Управление технологическими процессами очистки — коагуляцией,
      фильтрацией, обеззараживанием и глубокой очисткой — по данным
      онлайн-мониторинга качества.
  BC-3870.20.10:
    name: Управление коагуляцией и осветлением
    description: |
      Управление дозированием коагулянта, флокуляцией
      и работой осветлителей.
  BC-3870.20.20:
    name: Управление процессом фильтрации
    description: |
      Управление ступенями фильтрации скорой, медленной
      и мембранной.
  BC-3870.20.30:
    name: Управление процессом обеззараживания
    description: |
      Управление хлорированием, УФ, озонированием
      и процессами глубокого обеззараживания.
  BC-3870.20.40:
    name: Управление процессом глубокой очистки
    description: |
      Управление ступенями GAC, ионного обмена
      и передовых методов окисления.
  BC-3870.30:
    name: Операции качества питьевой воды
    description: |
      Отбор проб, лабораторный анализ, онлайн-надзор
      и отчётность о соответствии качества питьевой воды.
    in_scope:
      - Законодательный отбор проб питьевой воды
      - Лабораторный анализ микробиологических и химических параметров
      - Реагирование на инциденты с питьевой водой
    out_of_scope:
      - Качество воды в распределительной сети (BC-3880.50)
      - Качество стоков сточных вод (BC-3890.70)
  BC-3870.30.10:
    name: Законодательная программа отбора проб
    description: |
      Реализация законодательных программ отбора проб питьевой воды
      на станциях и точках водоснабжения.
  BC-3870.30.20:
    name: Онлайн-мониторинг очищенной воды
    description: |
      Онлайн-мониторинг мутности, остаточного хлора
      и других параметров очищенной воды.
  BC-3870.30.30:
    name: Реагирование на инциденты с питьевой водой
    description: |
      Расследование и устранение инцидентов и превышений
      показателей качества питьевой воды.
  BC-3870.30.40:
    name: Отчётность о качестве питьевой воды
    description: |
      Законодательная отчётность регуляторам питьевой воды
      (DWI, EPA, аналоги).
  BC-3870.40:
    name: Управление реагентами для очистки
    description: |
      Операционное управление реагентами для очистки,
      включая запасы, дозирование и безопасность обращения.
  BC-3870.40.10:
    name: Операции запасов реагентов
    description: |
      Управление запасами реагентов
      для очистки на станциях.
  BC-3870.40.20:
    name: Операции дозирования реагентов
    description: |
      Эксплуатация и калибровка дозирующих систем
      реагентов для очистки.
  BC-3870.40.30:
    name: Безопасность обращения с реагентами
    description: |
      Безопасное обращение с реагентами, контроль COSHH
      и DSEAR на площадке.
  BC-3870.50:
    name: Операции резервуаров очищенной воды
    description: |
      Эксплуатация регулирующих резервуаров, контактных бассейнов
      и водонапорных башен для подачи воды в распределительную сеть.
  BC-3870.50.10:
    name: Операции резервуаров чистой воды
    description: |
      Эксплуатация, управление уровнями и оборачиваемостью
      резервуаров чистой воды.
  BC-3870.50.20:
    name: Операции контактных бассейнов
    description: |
      Эксплуатация контактных бассейнов обеззараживания
      для требуемых значений CT.
  BC-3870.50.30:
    name: Инспекция резервуаров чистой воды
    description: |
      Внутренняя инспекция и промывка резервуаров
      для хранения очищенной воды.
  BC-3870.60:
    name: Управление шламами водоподготовки
    description: |
      Эксплуатация побочных потоков водоподготовки — шламы
      осветлителей, промывные воды фильтров и отработанные среды —
      и выбор пути их утилизации.
  BC-3870.60.10:
    name: Операции с шламом осветлителей
    description: |
      Эксплуатация уплотнения и обезвоживания шлама
      на станциях водоподготовки.
  BC-3870.60.20:
    name: Восстановление промывных вод фильтров
    description: |
      Восстановление и возврат или утилизация
      промывных вод фильтров.
  BC-3870.60.30:
    name: Утилизация отработанных сред
    description: |
      Замена и утилизация отработанных фильтрующих
      сред и ионообменных смол.

# Учёт страховых премий (ru) — translations for L1-premium-accounting-management.yaml
locale: ru
source: L1-premium-accounting-management.yaml
entries:
  BC-2150:
    name: Учёт страховых премий
    description: |
      Выставление счетов по премиям, сбор денежных средств, урегулирование счетов брокеров
      и комиссионных вознаграждений, резервирование премий и механизмы начисления,
      взыскание задолженностей и учёт налогов на страховые премии.
  BC-2150.10:
    name: Управление выставлением счетов по премиям
    description: |
      Формирование счетов-фактур, составление графиков рассрочки, маршрутизация выставления счетов и корректировки.
  BC-2150.10.10:
    name: Формирование счетов по премиям
    description: |
      Формирование счетов по страховым премиям и выписок в соответствии с циклом выставления счетов.
  BC-2150.10.20:
    name: Настройка графика рассрочки
    description: |
      Настройка графиков рассрочки страховой премии и финансовых сборов.
  BC-2150.10.30:
    name: Маршрутизация прямого и агентского выставления счетов
    description: |
      Маршрутизация выставления счетов между прямыми и агентскими схемами.
  BC-2150.10.40:
    name: Корректировка счёта и кредит-нота
    description: |
      Оформление корректировок счётов и кредит-нот после дополнений и аннулирований.
  BC-2150.20:
    name: Управление сбором премий
    description: |
      Получение и разнесение платежей, операции по регулярным платежам, возвраты и обработка локбокс-поступлений.
  BC-2150.20.10:
    name: Получение и разнесение платежей
    description: |
      Получение платежей по страховым премиям и разнесение их на счета полисов.
  BC-2150.20.20:
    name: Операции по прямому дебету и регулярным платежам
    description: |
      Обслуживание схем прямого дебета, регулярных карточных платежей и постоянных поручений.
  BC-2150.20.30:
    name: Обработка возвратов страховых премий
    description: |
      Обработка возвратов страховых премий после дополнений и аннулирований.
  BC-2150.20.40:
    name: Локбокс и распределение наличных
    description: |
      Получение через локбокс, распределение наличных и обработка исключений.
  BC-2150.30:
    name: Урегулирование счетов брокеров и агентов
    description: |
      Формирование выписок для агентов, урегулирование премий за вычетом комиссии и сверка трастовых счетов.
  BC-2150.30.10:
    name: Формирование выписок для агентов
    description: |
      Формирование выписок по премиям и комиссионным для страховых агентов.
  BC-2150.30.20:
    name: Урегулирование премии за вычетом комиссии
    description: |
      Урегулирование премии за вычетом комиссионного вознаграждения с агентами и от агентов.
  BC-2150.30.30:
    name: Сверка трастового счёта агента
    description: |
      Сверка трастовых счетов агентов и остатков на счетах IBA.
  BC-2150.40:
    name: Управление резервами и начислением премий
    description: |
      Расчёт незаработанной премии, признание заработанной премии и отслеживание отложенных аквизиционных расходов.
  BC-2150.40.10:
    name: Расчёт незаработанной премии
    description: |
      Расчёт резерва незаработанных премий по действующим полисам.
  BC-2150.40.20:
    name: Признание заработанной премии
    description: |
      Признание заработанной страховой премии за отчётный период.
  BC-2150.40.30:
    name: Отслеживание отложенных аквизиционных расходов
    description: |
      Отслеживание отложенных аквизиционных расходов (DAC) по когортам продуктов.
  BC-2150.50:
    name: Управление взысканием задолженностей
    description: |
      Мониторинг просроченной дебиторской задолженности, операции по взысканию, аннулирование за неоплату и списание безнадёжных долгов.
  BC-2150.50.10:
    name: Мониторинг просроченной дебиторской задолженности
    description: |
      Мониторинг просроченных задолженностей по страховым премиям страхователей и агентов.
  BC-2150.50.20:
    name: Операции по взысканию задолженностей
    description: |
      Уведомления об изъятии средств, напоминания и переписка по задолженностям.
  BC-2150.50.30:
    name: Обработка аннулирования за неоплату
    description: |
      Инициирование процессов аннулирования при неоплаченной страховой премии.
  BC-2150.50.40:
    name: Списание безнадёжных долгов
    description: |
      Согласование и проведение списаний безнадёжных долгов по неинкассируемым страховым премиям.
  BC-2150.60:
    name: Учёт налогов и сборов
    description: |
      Расчёт налога на страховые премии, сбор гербового сбора и обязательных взносов, а также поддержка подачи налоговых деклараций.
  BC-2150.60.10:
    name: Расчёт налога на страховые премии
    description: |
      Расчёт налога на страховые премии по юрисдикциям и видам продуктов.
  BC-2150.60.20:
    name: Сбор гербового сбора и обязательных взносов
    description: |
      Сбор и перечисление гербовых сборов и законодательно установленных взносов.
  BC-2150.60.30:
    name: Поддержка подачи налоговых деклараций
    description: |
      Подготовка исходных данных и выверок для налоговых деклараций по страховым премиям.

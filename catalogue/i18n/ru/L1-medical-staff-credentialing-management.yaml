# Аттестация медицинского персонала (ru) — translations for L1-medical-staff-credentialing-management.yaml
locale: ru
source: L1-medical-staff-credentialing-management.yaml
entries:
  BC-2890:
    name: Аттестация медицинского персонала
    description: |
      Аттестация и привилегирование врачей, оценка деятельности и экспертная проверка, управление медицинским персоналом, зачисление провайдеров и программы здоровья врачей.
  BC-2890.10:
    name: Аттестация врачей
    description: |
      Первичная и непрерывная аттестация врачей, включая верификацию из первичных источников.
  BC-2890.10.10:
    name: Приём заявлений
    description: |
      Приём и проверка полноты заявлений на аттестацию.
  BC-2890.10.20:
    name: Верификация из первичных источников
    description: |
      Верификация образования, подготовки, лицензий и рекомендаций из первичных источников.
  BC-2890.10.30:
    name: Ведение аттестационного досье
    description: |
      Ведение и аудит аттестационных досье и подтверждающих документов.
  BC-2890.10.40:
    name: Переаттестация
    description: |
      Периодическая переаттестация действующего медицинского персонала и врачей смежных специальностей.
  BC-2890.20:
    name: Управление привилегиями
    description: |
      Определение, предоставление и продление клинических привилегий.
  BC-2890.20.10:
    name: Определение привилегий
    description: |
      Определение и ведение перечня привилегий по отделениям и специальностям.
  BC-2890.20.20:
    name: Первичное присвоение привилегий
    description: |
      Предоставление первоначальных клинических привилегий новым врачам.
  BC-2890.20.30:
    name: Продление привилегий
    description: |
      Периодическое продление клинических привилегий на основе данных о деятельности и компетентности.
  BC-2890.20.40:
    name: Управление специализированными привилегиями
    description: |
      Управление запросами на специализированные, расширенные и процедурные привилегии.
  BC-2890.30:
    name: Оценка деятельности и экспертная проверка
    description: |
      Непрерывная и целевая оценка профессиональной деятельности и экспертная проверка врачей.
  BC-2890.30.10:
    name: Непрерывная оценка деятельности
    description: |
      Непрерывная оценка профессиональной деятельности по специфичным для специальности показателям.
  BC-2890.30.20:
    name: Целевая оценка деятельности
    description: |
      Целевая оценка профессиональной деятельности при выявлении сигналов или при наличии новых привилегий.
  BC-2890.30.30:
    name: Экспертная проверка клинических случаев
    description: |
      Структурированная экспертная проверка клинических случаев с последствиями для деятельности врача.
  BC-2890.30.40:
    name: Отчётность по деятельности врачей
    description: |
      Отчётность о деятельности врачей в комитеты медицинского персонала и отдельным специалистам.
  BC-2890.40:
    name: Управление медицинским персоналом
    description: |
      Управление медицинским персоналом, включая устав, исполнительный комитет и операции отделений.
  BC-2890.40.10:
    name: Ведение устава
    description: |
      Ведение и изменение устава и правил медицинского персонала.
  BC-2890.40.20:
    name: Поддержка медицинского исполнительного комитета
    description: |
      Операционное и аналитическое сопровождение медицинского исполнительного комитета.
  BC-2890.40.30:
    name: Операции отделенческих комитетов
    description: |
      Операции отделенческих, секционных и постоянных комитетов.
  BC-2890.40.40:
    name: Поддержка выборов руководства
    description: |
      Поддержка выдвижения и выборов руководства медицинского персонала.
  BC-2890.50:
    name: Управление зачислением провайдеров
    description: |
      Зачисление провайдеров в страховые сети и государственные программы.
  BC-2890.50.10:
    name: Зачисление в страховые сети
    description: |
      Зачисление провайдеров в коммерческие страховые сети.
  BC-2890.50.20:
    name: Ведение централизованного репозитория аттестации
    description: |
      Ведение централизованных аттестационных данных провайдеров, передаваемых страховщикам.
  BC-2890.50.30:
    name: Зачисление в государственные программы
    description: |
      Зачисление провайдеров в государственные страховые программы.
  BC-2890.50.40:
    name: Отслеживание перезачисления
    description: |
      Отслеживание и своевременная обработка циклов перезачисления провайдеров.
  BC-2890.60:
    name: Здоровье и благополучие врачей
    description: |
      Программы поддержки здоровья врачей, профилактики выгорания и конфиденциальной помощи.
  BC-2890.60.10:
    name: Управление недееспособными врачами
    description: |
      Выявление, интервенция и мониторинг недееспособных врачей.
  BC-2890.60.20:
    name: Операции программ благополучия
    description: |
      Реализация программ благополучия и устойчивости врачей.
  BC-2890.60.30:
    name: Надзор за выгоранием
    description: |
      Надзор за показателями выгорания и благополучия врачей.
  BC-2890.60.40:
    name: Конфиденциальные ресурсы поддержки
    description: |
      Конфиденциальные ресурсы психологической помощи, поддержки коллег и консультирования врачей.

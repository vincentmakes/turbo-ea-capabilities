# Программа лояльности (ru) — translations for L1-travel-loyalty-programme-management.yaml
locale: ru
source: L1-travel-loyalty-programme-management.yaml
entries:
  BC-4050:
    name: Программа лояльности путешественников
    description: |
      Разработка и управление программами лояльности для путешественников — архитектура уровней, движки начисления и списания баллов, партнёрские накопления, управление статусами и коммуникации с участниками.
    in_scope:
      - Архитектура уровней программы и каталог привилегий
      - Движки начисления и списания, включая партнёрское накопление
      - Квалификация на уровень, удержание и правила мягкого снижения
      - Коммуникации с участниками и операции знакового признания
    out_of_scope:
      - Профиль и идентификация гостя (BC-4040)
      - Предоставление признания на объекте (BC-4040.40)
      - Исполнение маркетинговых каналов (BC-410)
  BC-4050.10:
    name: Дизайн программы лояльности
    description: |
      Разработка архитектуры программы, включая структуру уровней, каталог привилегий, параметры начисления и правила программы.
  BC-4050.10.10:
    name: Архитектура уровней программы
    description: |
      Архитектура уровней лояльности, включая пороговые значения, привилегии и правила перехода.
  BC-4050.10.20:
    name: Каталог привилегий участников
    description: |
      Каталог привилегий для участников на продуктовых и партнёрских площадках.
  BC-4050.10.30:
    name: Определение ставок и коэффициентов начисления
    description: |
      Определение базовых ставок начисления и коэффициентов для уровней и продуктов.
  BC-4050.10.40:
    name: Управление условиями программы
    description: |
      Управление правилами и условиями программы, включая варианты для разных юрисдикций.
  BC-4050.20:
    name: Операции движка начисления баллов лояльности
    description: |
      Работа движка начисления за пребывание, перелёты, траты у партнёров, промобонусы и претензии на пропущенные начисления.
  BC-4050.20.10:
    name: Обработка начислений за проживание и перелёты
    description: |
      Обработка событий начисления за пребывание, перелёты и завершённые туры.
  BC-4050.20.20:
    name: Обработка начислений за траты у партнёров
    description: |
      Обработка событий начисления по кобрендинговым картам и розничным тратам у партнёров.
  BC-4050.20.30:
    name: Начисление промобонусов
    description: |
      Начисление промобонусов в соответствии с правилами кампаний.
  BC-4050.20.40:
    name: Обработка претензий на пропущенные начисления
    description: |
      Обработка претензий на пропущенные начисления и ретроактивные корректировки.
  BC-4050.30:
    name: Операции движка списания и погашения баллов
    description: |
      Управление потоками погашения, включая доступность наград, комбинированную оплату наличными и баллами и урегулирование инвентаря.
  BC-4050.30.10:
    name: Расчёт доступности наград
    description: |
      Расчёт доступности наград с учётом доходного инвентаря и правил защиты.
  BC-4050.30.20:
    name: Бронирование по программе награждения
    description: |
      Бронирование по программе наград в собственном и партнёрском инвентаре.
  BC-4050.30.30:
    name: Комбинированное погашение наличными и баллами
    description: |
      Потоки погашения с совмещением оплаты наличными и баллами для одного бронирования.
  BC-4050.30.40:
    name: Урегулирование инвентаря при погашении
    description: |
      Урегулирование потребления инвентаря при погашении между брендом и партнёрскими реестрами.
  BC-4050.40:
    name: Управление статусами уровней
    description: |
      Квалификация, повышение, понижение уровня, программы сопоставления статусов и правила мягкого снижения.
  BC-4050.40.10:
    name: Отслеживание квалификации на уровень
    description: |
      Отслеживание квалификационной активности относительно пороговых значений уровней в течение программного года.
  BC-4050.40.20:
    name: Операции повышения и понижения уровня
    description: |
      Операции повышения, понижения и повторной квалификации участников на периодических границах.
  BC-4050.40.30:
    name: Программы сопоставления статусов и челленджи
    description: |
      Управление программами сопоставления статусов и испытательными программами для целевого привлечения.
  BC-4050.40.40:
    name: Правила мягкого снижения уровня
    description: |
      Правила удержания, смягчающие потерю уровня для высокоценных участников.
  BC-4050.50:
    name: Управление партнёрской программой лояльности
    description: |
      Управление партнёрами программы лояльности: кредитные карты, розница и авиагостиничные партнёры — от подключения до урегулирования.
  BC-4050.50.10:
    name: Подключение и заключение договоров с партнёрами
    description: |
      Подключение новых партнёров программы лояльности, включая due diligence и интеграцию.
  BC-4050.50.20:
    name: Настройка ставок начисления для партнёров
    description: |
      Настройка ставок начисления и бонусных структур для каждого партнёра лояльности.
  BC-4050.50.30:
    name: Урегулирование и сверка с партнёрами
    description: |
      Урегулирование и сверка начисленных партнёрами баллов и сборов за начисление.
  BC-4050.50.40:
    name: Управление производительностью партнёров
    description: |
      Управление производительностью партнёров лояльности по договорным KPI.
  BC-4050.60:
    name: Коммуникации и программы признания участников
    description: |
      Коммуникации с участниками, признание знаковых событий и сюрпризное поощрение на протяжении жизненного цикла лояльности.
  BC-4050.60.10:
    name: Жизненные коммуникации с участниками
    description: |
      Коммуникации с участниками на этапах welcome, активности и реактивации.
  BC-4050.60.20:
    name: Признание знаковых событий и годовщин
    description: |
      Признание знаковых достижений, юбилеев членства и повышений уровней.
  BC-4050.60.30:
    name: Операции сюрпризного поощрения
    description: |
      Управление сюрпризными поощрениями, инициируемыми поведением участника или сервисными событиями.
  BC-4050.60.40:
    name: Формирование выписок участников
    description: |
      Формирование выписок участников с балансом, активностью и прогрессом к уровню.

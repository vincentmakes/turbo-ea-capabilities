# Взаимодействие с сообществами и социальная ответственность в горнодобывающей отрасли (ru) — translations for L1-mining-community-social-performance-management.yaml
locale: ru
source: L1-mining-community-social-performance-management.yaml
entries:
  BC-4500:
    name: Взаимодействие с сообществами и социальная ответственность в горнодобывающей отрасли
    description: |
      Поддержание социальной лицензии на деятельность посредством взаимодействия
      с принимающими сообществами, коренными и традиционными владельцами,
      переселения и доступа к земле, общественных инвестиций, локального
      содержания, прав человека и отчётности по социальным показателям.
  BC-4500.10:
    name: Взаимодействие с принимающими сообществами
    description: |
      Идентификация, консультации и работа с жалобами принимающих сообществ,
      затронутых горнодобывающей деятельностью.
    in_scope:
      - Идентификация и картографирование заинтересованных сторон
      - Программы консультаций с сообществами
      - Механизмы рассмотрения жалоб сообществ
    out_of_scope:
      - Взаимодействие с коренными народами (BC-4500.20)
      - Переселение (BC-4500.30)
  BC-4500.10.10:
    name: Картографирование заинтересованных сторон сообщества
    description: |
      Идентификация и картографирование заинтересованных сторон в зоне влияния
      горнодобывающей деятельности.
  BC-4500.10.20:
    name: Программа консультаций с сообществом
    description: |
      Проведение структурированных форумов и раскрытие информации в рамках
      консультаций с сообществами.
  BC-4500.10.30:
    name: Рассмотрение жалоб сообщества
    description: |
      Работа с жалобами сообщества в соответствии с критериями эффективности
      Руководящих принципов ООН.
  BC-4500.20:
    name: Взаимодействие с коренными народами и традиционными владельцами
    description: |
      Взаимодействие с коренными народами и традиционными владельцами по
      вопросам права коренных народов на землю, культурного наследия и
      соглашений о разделе выгод.
  BC-4500.20.10:
    name: Взаимодействие по вопросам прав коренных народов на землю
    description: |
      Взаимодействие по вопросам права коренных народов на землю и
      обычных земельных прав, затрагивающих горнодобывающую деятельность.
  BC-4500.20.20:
    name: Управление культурным наследием
    description: |
      Идентификация, защита и управление объектами и ценностями
      культурного наследия.
  BC-4500.20.30:
    name: Администрирование соглашений о землепользовании коренных народов
    description: |
      Администрирование соглашений о землепользовании и разделе выгод с
      коренными народами и традиционными владельцами.
  BC-4500.30:
    name: Управление переселением и доступом к земле
    description: |
      Отчуждение земли, вынужденное переселение и восстановление средств к
      существованию для людей, затронутых проектом.
  BC-4500.30.10:
    name: Переговоры по отчуждению земли
    description: |
      Переговоры о добровольном отчуждении земли для горнодобывающих и
      сопутствующих объектов инфраструктуры.
  BC-4500.30.20:
    name: Планирование вынужденного переселения
    description: |
      Планирование вынужденного переселения в соответствии со стандартами
      производительности IFC и эквивалентными режимами.
  BC-4500.30.30:
    name: Реализация плана действий по переселению
    description: |
      Реализация планов действий по переселению для домохозяйств,
      затронутых проектом.
  BC-4500.30.40:
    name: Программы восстановления средств к существованию
    description: |
      Реализация программ восстановления средств к существованию для
      перемещённых домохозяйств и принимающих сообществ.
  BC-4500.40:
    name: Инвестиции в сообщества и развитие
    description: |
      Разработка и реализация программ инвестиций в сообщества и совместное
      финансирование местной инфраструктуры и проектов развития.
  BC-4500.40.10:
    name: Разработка программ инвестиций в сообщества
    description: |
      Разработка многолетних программ инвестиций в сообщества, согласованных
      с местными планами развития.
  BC-4500.40.20:
    name: Совместное инвестирование в местную инфраструктуру
    description: |
      Совместное инвестирование в дороги, водоснабжение, электроснабжение
      и социальную инфраструктуру для принимающих сообществ.
  BC-4500.40.30:
    name: Реализация проектов развития сообщества
    description: |
      Реализация проектов развития сообщества в области здравоохранения,
      образования и средств к существованию.
  BC-4500.50:
    name: Управление местным содержанием и закупками
    description: |
      Развитие местных поставщиков, программы местной занятости и отчётность
      по обязательствам в части местного содержания.
  BC-4500.50.10:
    name: Развитие местных поставщиков
    description: |
      Развитие и наращивание потенциала местных поставщиков, в том числе
      принадлежащих коренным народам.
  BC-4500.50.20:
    name: Управление программами местной занятости
    description: |
      Управление программами местной занятости, обучения и ученичества для
      работников принимающих сообществ.
  BC-4500.50.30:
    name: Отчётность по местному содержанию
    description: |
      Отчётность об исполнении обязательств по местному содержанию перед
      принимающим правительством и по контрактам.
  BC-4500.60:
    name: Управление правами человека и безопасностью
    description: |
      Комплексная проверка в области прав человека, соблюдение Добровольных
      принципов безопасности и прав человека и надзор за деятельностью
      поставщиков охранных услуг.
  BC-4500.60.10:
    name: Комплексная проверка в области прав человека
    description: |
      Оценка воздействия на права человека на уровне объекта и комплексная
      проверка в соответствии с Руководящими принципами ООН.
  BC-4500.60.20:
    name: Соблюдение добровольных принципов
    description: |
      Соблюдение Добровольных принципов безопасности и прав человека в сфере
      охранной деятельности.
  BC-4500.60.30:
    name: Надзор за поведением поставщиков охранных услуг
    description: |
      Надзор за поведением государственных и частных поставщиков охранных
      услуг вблизи горных объектов.
  BC-4500.70:
    name: Отчётность по социальным показателям
    description: |
      Отслеживание показателей социальной деятельности, оценка социального
      воздействия и внешнее раскрытие информации о социальных результатах.
  BC-4500.70.10:
    name: Отслеживание показателей социальной деятельности
    description: |
      Отслеживание показателей социальной деятельности по объектам и
      инвестициям.
  BC-4500.70.20:
    name: Оценка социального воздействия
    description: |
      Периодическая оценка социального воздействия горнодобывающей деятельности
      на принимающие сообщества.
  BC-4500.70.30:
    name: Внешнее раскрытие информации о социальных результатах
    description: |
      Внешнее раскрытие информации о социальных показателях в отчётах по
      устойчивому развитию и регуляторных документах.

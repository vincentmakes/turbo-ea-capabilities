# Управление отношениями с инвесторами (ru) — translations for L1-investor-relations-management.yaml
locale: ru
source: L1-investor-relations-management.yaml
entries:
  BC-240:
    name: Управление отношениями с инвесторами
    description: |
      Коммуникации с акционерами, аналитиками и рынками капитала.
  BC-240.10:
    name: Коммуникации с рынками капитала
    description: |
      Стратегия IR, инвестиционный кейс, дни рынков капитала.
  BC-240.10.10:
    name: Стратегия IR и инвестиционный кейс
    description: |
      Определение стратегии отношений с инвесторами и инвестиционного кейса.
  BC-240.10.20:
    name: Управление днями рынков капитала
    description: |
      Планирование и проведение мероприятий для инвесторов и дней рынков капитала.
  BC-240.10.30:
    name: Управление раскрытием информации для инвесторов
    description: |
      Контроль за раскрытием информации, справедливое раскрытие и сообщение о существенных событиях.
  BC-240.10.40:
    name: Коммуникации об ESG и устойчивом развитии
    description: |
      ESG-нарратив для рынков капитала и взаимодействие с рейтинговыми агентствами.
  BC-240.20:
    name: Управление циклом отчётности о прибыли
    description: |
      Квартальные релизы о прибыли, звонки с аналитиками, транскрипты.
  BC-240.20.10:
    name: Подготовка пресс-релизов о прибыли
    description: |
      Составление и выпуск пресс-релизов о финансовых результатах.
  BC-240.20.20:
    name: Управление звонками с аналитиками
    description: |
      Скрипты, подготовка к вопросам и проведение звонков с аналитиками.
  BC-240.20.30:
    name: Управление консенсус-прогнозами и гайденсом
    description: |
      Мониторинг консенсус-прогнозов и предоставление гайденса.
  BC-240.30:
    name: Управление взаимодействием с акционерами
    description: |
      Годовые общие собрания, встречи с акционерами, работа с розничными инвесторами.
  BC-240.30.10:
    name: Взаимодействие с институциональными инвесторами
    description: |
      Роуд-шоу, индивидуальные встречи и постоянный диалог с институциональными инвесторами.
  BC-240.30.20:
    name: Взаимодействие с розничными акционерами
    description: |
      Коммуникации с розничными акционерами и программы привлечения.
  BC-240.30.30:
    name: Координация годового общего собрания
    description: |
      Вклад IR в логистику, материалы и вопросы годового общего собрания.
  BC-240.30.40:
    name: Взаимодействие с прокси-советниками и ESG-инвесторами
    description: |
      Взаимодействие с прокси-советниками и инвесторами, ориентированными на корпоративное управление.
  BC-240.40:
    name: Управление отношениями с аналитиками
    description: |
      Взаимодействие с аналитиками на стороне продавцов и покупателей.
  BC-240.40.10:
    name: Управление аналитическим покрытием на стороне продавцов
    description: |
      Развитие покрытия, обзор моделей и взаимодействие с аналитиками.
  BC-240.40.20:
    name: Таргетирование инвесторов на стороне покупателей
    description: |
      Выявление и таргетирование инвесторов на стороне покупателей.
  BC-240.40.30:
    name: Исследования восприятия инвесторами
    description: |
      Исследования восприятия и опросы инвесторов об отношении к компании.

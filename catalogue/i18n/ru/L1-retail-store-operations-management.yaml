# Управление магазинами розничной торговли (ru) — translations for L1-retail-store-operations-management.yaml
locale: ru
source: L1-retail-store-operations-management.yaml
entries:
  BC-2310:
    name: Управление магазинами розничной торговли
    description: |
      Повседневная работа физических розничных магазинов — процедуры открытия и закрытия,
      исполнение задач в торговом зале, управление персоналом, аудиты, уход за торговым
      оборудованием и стабильное обеспечение стандартов формата магазина.
  BC-2310.10:
    name: Открытие и закрытие магазина
    description: |
      Ежедневные процедуры открытия и закрытия магазина, включая подготовку кассовых ящиков,
      итоговую сверку и передачу смены.
  BC-2310.10.10:
    name: Выполнение процедуры открытия магазина
    description: |
      Выполнение процедур открытия магазина, включая проверку готовности.
  BC-2310.10.20:
    name: Выполнение процедуры закрытия магазина
    description: |
      Процедуры закрытия магазина в конце дня, включая сверку и обеспечение безопасности.
  BC-2310.10.30:
    name: Управление передачей смены
    description: |
      Передача смены между командами с передачей задач и инцидентов.
  BC-2310.20:
    name: Управление исполнением задач в торговом зале
    description: |
      Исполнение задач по мерчандайзингу, акциям, вывескам и пополнению запасов
      на уровне магазина, чтобы магазин соответствовал плану головного офиса.
    in_scope:
      - Управление задачами для сотрудников магазина
      - Исполнение планограмм и вывесок
      - Пополнение полок из складского запаса
    out_of_scope:
      - Разработка планограмм (BC-2300.30.10)
  BC-2310.20.10:
    name: Управление задачами в магазине
    description: |
      Распределение и отслеживание операционных задач для команд магазина.
  BC-2310.20.20:
    name: Исполнение планограмм и вывесок
    description: |
      Исполнение планограмм, вывесок и промо-оформления в торговом зале.
  BC-2310.20.30:
    name: Пополнение запасов в торговом зале
    description: |
      Пополнение полок из складского помещения и подсобного склада.
  BC-2310.20.40:
    name: Операции складского помещения
    description: |
      Приёмка, организация и управление товарными запасами в складском помещении.
  BC-2310.30:
    name: Управление персоналом магазина
    description: |
      Составление графиков работы, почасовое планирование и управление эффективностью сотрудников магазина.
    in_scope:
      - Почасовые прогнозы трудозатрат на основе трафика и продаж
      - Составление графиков смен и учёт рабочего времени
      - Управление и коучинг сотрудников на уровне магазина
    out_of_scope:
      - Корпоративное управление человеческим капиталом (BC-300)
  BC-2310.30.10:
    name: Прогнозирование потребности в персонале
    description: |
      Прогнозирование почасовой потребности в персонале по магазину и отделу.
  BC-2310.30.20:
    name: Составление графиков смен
    description: |
      Составление графиков смен с соблюдением принципа справедливости и трудового законодательства.
  BC-2310.30.30:
    name: Учёт рабочего времени
    description: |
      Фиксация входа и выхода и управление исключениями.
  BC-2310.30.40:
    name: Коучинг и управление эффективностью сотрудников
    description: |
      Коучинг, признание заслуг и управление эффективностью сотрудников магазина.
  BC-2310.40:
    name: Аудит и комплаенс магазина
    description: |
      Операционные аудиты, проверки соответствия стандартам, тайные покупатели и соблюдение
      магазином брендовых и операционных стандартов.
  BC-2310.40.10:
    name: Программа операционных аудитов
    description: |
      Программа операционных аудитов и проверок соответствия стандартам магазина.
  BC-2310.40.20:
    name: Программа тайных покупателей
    description: |
      Программа тайных покупателей для оценки качества обслуживания клиентов.
  BC-2310.40.30:
    name: Соответствие стандартам магазина
    description: |
      Соответствие магазина брендовым, санитарным и операционным стандартам.
  BC-2310.50:
    name: Управление обслуживанием активов магазина
    description: |
      Обслуживание торгового оборудования, технических средств, холодильного оборудования
      и поддержание чистоты в магазине для обеспечения готовности к торговле.
  BC-2310.50.10:
    name: Техническое обслуживание торгового оборудования
    description: |
      Техническое обслуживание витрин, стеллажей и оборудования в магазине.
  BC-2310.50.20:
    name: Управление бесперебойной работой холодильного оборудования
    description: |
      Мониторинг и обеспечение бесперебойной работы холодильного оборудования в продуктовом ритейле.
  BC-2310.50.30:
    name: Санитарное состояние магазина
    description: |
      Процедуры поддержания чистоты, порядка и санитарного состояния торгового зала.
  BC-2310.60:
    name: Управление форматом и впечатлениями от магазина
    description: |
      Определение и поддержание стандартов формата магазина, включая модель обслуживания,
      внешний вид и клиентский путь.
  BC-2310.60.10:
    name: Стандарты формата магазина
    description: |
      Стандарты для каждого формата магазина, охватывающие планировку, обслуживание и атмосферу.
  BC-2310.60.20:
    name: Дизайн клиентского опыта в магазине
    description: |
      Проектирование клиентского пути и сервисных взаимодействий в торговом зале.
  BC-2310.60.30:
    name: Планирование обновления концепции магазина
    description: |
      Планирование обновлений концепции магазина и пилотных запусков.

# Управление отслеживанием отправлений (ru) — translations for L1-shipment-visibility-tracking-management.yaml
locale: ru
source: L1-shipment-visibility-tracking-management.yaml
entries:
  BC-2510:
    name: Управление видимостью и отслеживанием отправлений
    description: |
      Сквозная видимость отправлений посредством захвата событий, определения статуса,
      прогнозирования ETA, оповещений об исключениях и операций диспетчерского центра.
  BC-2510.10:
    name: Управление захватом событий и статусом
    description: |
      Захват событий по отправлениям от перевозчиков, IoT и операционных систем,
      а также трансляция в канонические статусы.
    in_scope:
      - Обработка событий EDI 214, IFTSTA и EPCIS
      - Захват событий IoT и телематики
    out_of_scope:
      - Телематика для состояния активов (BC-2430.40)
  BC-2510.10.10:
    name: Обработка событий перевозчика
    description: |
      Обработка событий от перевозчика через EDI и API.
  BC-2510.10.20:
    name: Захват событий IoT и телематики
    description: |
      Захват событий IoT и телематики на уровне груза.
  BC-2510.10.30:
    name: Захват обновлений статуса вручную
    description: |
      Захват обновлений статуса вручную от водителей, агентов и партнёров.
  BC-2510.20:
    name: Управление отслеживанием отправлений
    description: |
      Разрешение статуса отправлений по участкам, видам транспорта и партнёрам
      с доставкой на внутренние и клиентские поверхности отслеживания.
  BC-2510.20.10:
    name: Разрешение статуса отправления
    description: |
      Определение канонического статуса отправления из исходных событий.
  BC-2510.20.20:
    name: Сшивка многоплечных маршрутов
    description: |
      Объединение многоплечных, многоперевозчиковых маршрутов в единый трек.
  BC-2510.20.30:
    name: Эксплуатация публичного портала отслеживания
    description: |
      Эксплуатация публичных порталов отслеживания и клиентских API.
  BC-2510.30:
    name: Управление прогнозированием ETA
    description: |
      Расчёт и постоянное уточнение расчётного времени прибытия.
  BC-2510.30.10:
    name: Расчёт ETA
    description: |
      Детерминистический расчёт ETA на основе расписаний и контрольных точек.
  BC-2510.30.20:
    name: Предиктивное моделирование ETA
    description: |
      Предиктивное моделирование ETA с использованием исторических и контекстных данных.
  BC-2510.30.30:
    name: Оповещение об отклонениях ETA
    description: |
      Оповещение о существенных отклонениях ETA от согласованного значения.
  BC-2510.40:
    name: Управление исключениями и оповещениями
    description: |
      Выявление операционных исключений, уведомление заинтересованных сторон
      и отслеживание устранения исключений.
  BC-2510.40.10:
    name: Выявление исключений
    description: |
      Выявление операционных исключений на основе правил и моделей.
  BC-2510.40.20:
    name: Уведомление заинтересованных сторон
    description: |
      Уведомление клиентов, операционных команд и партнёров.
  BC-2510.40.30:
    name: Отслеживание устранения исключений
    description: |
      Отслеживание сортировки исключений, назначения ответственного и закрытия.
  BC-2510.50:
    name: Управление диспетчерским центром
    description: |
      Сквозная видимость, мониторинг эффективности и координация
      проактивных вмешательств по перевозчикам и партнёрам.
  BC-2510.50.10:
    name: Панель сквозной видимости
    description: |
      Эксплуатация панелей сквозной видимости по всей сети.
  BC-2510.50.20:
    name: Мониторинг эффективности перевозчиков
    description: |
      Мониторинг эффективности перевозчиков и партнёров.
  BC-2510.50.30:
    name: Координация проактивных вмешательств
    description: |
      Координация проактивных вмешательств для выполнения обязательств.

# Управление соответствием требованиям (ru) — translations for L1-compliance-management.yaml
locale: ru
source: L1-compliance-management.yaml
entries:
  BC-130:
    name: Управление соответствием требованиям
    description: |
      Обеспечение соблюдения законодательства, нормативных актов и внутренних политик.
  BC-130.10:
    name: Управление регуляторным соответствием
    description: |
      Соответствие отраслевым нормативным требованиям.
  BC-130.10.10:
    name: Управление реестром нормативных требований
    description: |
      Реестр применимых нормативных актов и обязательств в различных юрисдикциях.
  BC-130.10.20:
    name: Мониторинг регуляторных изменений
    description: |
      Сканирование горизонта регуляторных изменений и оценка их воздействия.
  BC-130.10.30:
    name: Оценка риска несоответствия требованиям
    description: |
      Оценка риска несоответствия по бизнес-направлениям, географии и продуктам.
  BC-130.10.40:
    name: Мониторинг и тестирование соответствия
    description: |
      План мониторинга соответствия, тестирование контролей и отчётность.
  BC-130.10.50:
    name: Управление взаимодействием с регуляторами
    description: |
      Уведомления регуляторов, проверки и отслеживание устранения замечаний.
  BC-130.20:
    name: Управление политиками
    description: |
      Жизненный цикл политик: разработка, утверждение, подтверждение, вывод из обращения.
  BC-130.20.10:
    name: Разработка политик
    description: |
      Составление и актуализация корпоративных политик и стандартов.
  BC-130.20.20:
    name: Утверждение и публикация политик
    description: |
      Корпоративное одобрение и контролируемая публикация политик.
  BC-130.20.30:
    name: Подтверждение ознакомления с политиками
    description: |
      Подтверждение ознакомления с политиками сотрудниками и третьими сторонами.
  BC-130.20.40:
    name: Управление исключениями из политик
    description: |
      Регистрация и утверждение исключений и отступлений от политик.
  BC-130.30:
    name: Управление этикой и деловым поведением
    description: |
      Кодекс поведения, этика, программы информирования о нарушениях.
  BC-130.30.10:
    name: Администрирование кодекса поведения
    description: |
      Поддержание и внедрение корпоративного кодекса поведения.
  BC-130.30.20:
    name: Управление конфликтами интересов
    description: |
      Раскрытие и урегулирование личных и организационных конфликтов интересов.
  BC-130.30.30:
    name: Управление информированием о нарушениях
    description: |
      Каналы сообщений, приём, сортировка и защита информаторов.
  BC-130.30.40:
    name: Расследование нарушений поведения
    description: |
      Расследование предполагаемых нарушений и ведение дисциплинарных дел.
  BC-130.40:
    name: Управление противодействием взяточничеству и коррупции
    description: |
      Программы ABC, due diligence третьих сторон, подарки и гостеприимство.
  BC-130.40.10:
    name: Управление программой противодействия коррупции
    description: |
      Разработка программы противодействия взяточничеству и коррупции в соответствии с FCPA и UKBA.
  BC-130.40.20:
    name: Due diligence добросовестности третьих сторон
    description: |
      Проверка добросовестности и текущий мониторинг посредников.
  BC-130.40.30:
    name: Управление подарками, гостеприимством и спонсорством
    description: |
      Предварительное одобрение и реестры подарков, мероприятий по гостеприимству и спонсорства.
  BC-130.40.40:
    name: Обучение и повышение осведомлённости в сфере ABC
    description: |
      Целевое обучение и коммуникации по требованиям противодействия взяточничеству.
  BC-130.50:
    name: Управление конфиденциальностью и защитой данных
    description: |
      Соответствие требованиям GDPR и аналогичных актов, права субъектов данных, конфиденциальность по умолчанию.
  BC-130.50.10:
    name: Управление программой конфиденциальности
    description: |
      Фреймворк конфиденциальности, функция ответственного по защите данных и механизмы подотчётности.
  BC-130.50.20:
    name: Управление реестром операций по обработке данных
    description: |
      Ведение реестра операций по обработке персональных данных и потоков данных.
  BC-130.50.30:
    name: Оценка воздействия на защиту данных
    description: |
      DPIA и проверки конфиденциальности по принципу «privacy by design» для новых операций обработки.
  BC-130.50.40:
    name: Обработка запросов субъектов данных
    description: |
      Приём и выполнение запросов на доступ, исправление и удаление данных.
  BC-130.50.50:
    name: Управление инцидентами с персональными данными
    description: |
      Обнаружение, уведомление и устранение последствий утечек персональных данных.

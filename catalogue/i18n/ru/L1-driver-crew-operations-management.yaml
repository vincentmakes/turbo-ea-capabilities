# Управление водителями и экипажами (ru) — translations for L1-driver-crew-operations-management.yaml
locale: ru
source: L1-driver-crew-operations-management.yaml
entries:
  BC-2440:
    name: Управление водителями и экипажами
    description: |
      Квалификация, составление расписания дежурств, соблюдение норм рабочего времени,
      управление усталостью и эффективность водителей и экипажей по автомобильным,
      железнодорожным, морским и воздушным видам транспорта.
  BC-2440.10:
    name: Управление квалификацией водителей и экипажей
    description: |
      Ведение лицензий, допусков, квалификаций и медицинских документов
      водителей и экипажей.
    in_scope:
      - CDL, STCW, ATPL и аналогичные профессиональные квалификации
      - Медицинские справки о пригодности к работе
    out_of_scope:
      - Общие кадровые данные и расчёт заработной платы (BC-300)
      - Квалификация авиадиспетчеров (BC-1290)
  BC-2440.10.10:
    name: Отслеживание лицензий и допусков
    description: |
      Отслеживание профессиональных лицензий, допусков и сроков их истечения.
  BC-2440.10.20:
    name: Управление видовыми квалификациями
    description: |
      Управление видовыми квалификациями, такими как допуски STCW и
      типовые квалификации воздушных судов.
  BC-2440.10.30:
    name: Медицинская сертификация
    description: |
      Периодическая медицинская сертификация для оперативного персонала.
  BC-2440.20:
    name: Управление составлением расписания
    description: |
      Разработка суточных нарядов, вахтенных систем и расстановки экипажей
      с учётом сервисных и нормативных ограничений.
  BC-2440.20.10:
    name: Планирование суточных нарядов
    description: |
      Планирование суточных нарядов по базам, депо и рейсам.
  BC-2440.20.20:
    name: Расстановка экипажей и ротация
    description: |
      Расстановка и ротация экипажей по многодневным или многосегментным рейсам.
  BC-2440.20.30:
    name: Управление резервным дежурством
    description: |
      Резервное дежурство, дежурство по вызову и прочие дежурные схемы.
  BC-2440.30:
    name: Управление нормами рабочего времени и усталостью
    description: |
      Соблюдение норм рабочего времени и эксплуатация систем управления рисками усталости.
  BC-2440.30.10:
    name: Соблюдение норм рабочего времени
    description: |
      Регистрация и соблюдение лимитов рабочего времени через тахограф, ELD и аналоги.
  BC-2440.30.20:
    name: Управление рисками усталости
    description: |
      Эксплуатация систем управления рисками усталости и биоматематическое моделирование.
  BC-2440.30.30:
    name: Соблюдение норм отдыха
    description: |
      Соблюдение обязательного времени отдыха, стоянок и недельных ограничений.
  BC-2440.40:
    name: Управление эффективностью водителей и экипажей
    description: |
      Оценка эффективности, коучинг и обработка нарушений водителей и экипажей.
  BC-2440.40.10:
    name: Оценка эффективности водителей и экипажей
    description: |
      Оценка оперативного персонала по KPI в области безопасности, расхода топлива и сервиса.
  BC-2440.40.20:
    name: Коучинг и регулярное обучение
    description: |
      Коучинг, повторные курсы и корректирующее обучение.
  BC-2440.40.30:
    name: Управление инцидентами и нарушениями
    description: |
      Отслеживание и урегулирование операционных инцидентов и нарушений правил.
  BC-2440.50:
    name: Управление командировками и проживанием экипажей
    description: |
      Перемещения экипажей, проживание и логистика смены для морских,
      авиационных и железнодорожных ротаций.
  BC-2440.50.10:
    name: Бронирование командировок экипажей
    description: |
      Бронирование позиционных перелётов для ротации экипажей.
  BC-2440.50.20:
    name: Управление проживанием экипажей
    description: |
      Гостиничное обеспечение и управление проживанием при стоянках и ротациях.
  BC-2440.50.30:
    name: Координация смены экипажей
    description: |
      Координация смены экипажей в портах, аэропортах и депо.

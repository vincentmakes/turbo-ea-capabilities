# Инвестиции страховой компании (ru) — translations for L1-insurance-investment-management.yaml
locale: ru
source: L1-insurance-investment-management.yaml
entries:
  BC-2200:
    name: Управление инвестициями страховой компании
    description: |
      Управление активами для обеспечения страховых обязательств страховщиком-инвестором —
      инвестиционная политика, управление активами и пассивами, стратегическое и тактическое
      распределение активов, надзор за управляющими, инвестиционный риск и комплаенс, а также
      инвестиционная отчётность.
  BC-2200.10:
    name: Управление инвестиционной политикой и стратегией
    description: |
      Инвестиционный меморандум, определение мандатов и интеграция ESG-инвестиционной политики.
  BC-2200.10.10:
    name: Актуализация инвестиционного меморандума
    description: |
      Актуализация инвестиционного меморандума и соблюдение принципа добросовестного инвестора.
  BC-2200.10.20:
    name: Определение инвестиционных мандатов
    description: |
      Определение инвестиционных мандатов по портфелям, бизнес-направлениям и профилю риска.
  BC-2200.10.30:
    name: Интеграция ESG-инвестиционной политики
    description: |
      Интеграция ESG и политики активного владения в инвестиционные мандаты.
  BC-2200.20:
    name: Управление активами и пассивами
    description: |
      Моделирование ALM и согласование денежных потоков, мониторинг дюрации и выпуклости, а также определение объёма ликвидного буфера.
  BC-2200.20.10:
    name: Моделирование ALM и согласование денежных потоков
    description: |
      Моделирование ALM и согласование денежных потоков активов со страховыми обязательствами.
  BC-2200.20.20:
    name: Мониторинг дюрации и выпуклости
    description: |
      Мониторинг разрывов дюрации и выпуклости между активами и пассивами.
  BC-2200.20.30:
    name: Определение размера ликвидного буфера
    description: |
      Определение объёма ликвидных буферов для покрытия ожидаемых и стрессовых выплат по убыткам.
  BC-2200.30:
    name: Стратегическое и тактическое распределение активов
    description: |
      Решения по стратегическому и тактическому распределению активов и ребалансировке.
  BC-2200.30.10:
    name: Определение стратегического распределения активов
    description: |
      Определение долгосрочного стратегического распределения активов по классам активов.
  BC-2200.30.20:
    name: Тактические решения по распределению активов
    description: |
      Тактические решения по распределению в рамках стратегических диапазонов.
  BC-2200.30.30:
    name: Ребалансировка распределения активов
    description: |
      Периодическая и событийная ребалансировка к целевым значениям распределения.
  BC-2200.40:
    name: Надзор за инвестиционными мандатами и управляющими
    description: |
      Отбор внешних управляющих, мониторинг соблюдения мандатов, оценка результатов и надзор за вознаграждениями.
  BC-2200.40.10:
    name: Отбор внешних управляющих
    description: |
      Отбор и привлечение внешних инвестиционных управляющих.
  BC-2200.40.20:
    name: Мониторинг соблюдения мандатов
    description: |
      Мониторинг соблюдения мандатов и обработка нарушений.
  BC-2200.40.30:
    name: Оценка результатов управляющих
    description: |
      Периодическая оценка результатов деятельности внешних инвестиционных управляющих.
  BC-2200.40.40:
    name: Надзор за вознаграждениями управляющих
    description: |
      Надзор за вознаграждениями управляющих и оценка соотношения цена-качество.
  BC-2200.50:
    name: Мониторинг инвестиционного риска и комплаенса
    description: |
      Мониторинг инвестиционных лимитов, лимитов контрагентов и эмитентов, а также соответствия активов требованиям Solvency II.
  BC-2200.50.10:
    name: Мониторинг инвестиционных лимитов
    description: |
      Мониторинг инвестиционных лимитов по классам активов и факторам риска.
  BC-2200.50.20:
    name: Мониторинг лимитов контрагентов и эмитентов
    description: |
      Мониторинг концентрации и лимитов подверженности риску контрагентов и эмитентов.
  BC-2200.50.30:
    name: Мониторинг соответствия активов требованиям Solvency II
    description: |
      Мониторинг соответствия активов требованиям Solvency II и аналогичным нормам.
  BC-2200.60:
    name: Инвестиционная результативность и отчётность
    description: |
      Измерение результативности, атрибуция и инвестиционная отчётность для совета директоров и регулятора.
  BC-2200.60.10:
    name: Измерение эффективности портфеля
    description: |
      Измерение эффективности портфеля относительно бенчмарков и обязательств.
  BC-2200.60.20:
    name: Анализ вклада в результативность
    description: |
      Анализ вклада в результативность по распределению, отбору активов и валютным позициям.
  BC-2200.60.30:
    name: Инвестиционная отчётность для совета и регулятора
    description: |
      Подготовка инвестиционной отчётности для совета директоров, ALCO и регулятора.

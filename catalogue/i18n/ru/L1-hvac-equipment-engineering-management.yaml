# Управление инженерией оборудования систем ОВКВ (ru) — translations for L1-hvac-equipment-engineering-management.yaml
locale: ru
source: L1-hvac-equipment-engineering-management.yaml
entries:
  BC-2000:
    name: Управление инженерией оборудования систем ОВКВ
    description: |
      Механическая, холодильная и теплогидравлическая инженерия оборудования ОВКВ: чиллеры, тепловые насосы, приточные установки, кондиционеры кровельного исполнения, VRF, фанкойлы, оконечные устройства — вплоть до верификации рабочих характеристик и подготовки к рейтинговым испытаниям AHRI/Eurovent.
    in_scope:
      - Проектирование холодильных циклов и циклов тепловых насосов
      - Инженерия теплообменников и змеевиков
      - Инженерия воздухоперемещающего и гидравлического оборудования
      - Инженерия компрессоров, приводов и бортовых систем управления
      - Акустическая, вибрационная и верификация рабочих характеристик на уровне оборудования
    out_of_scope:
      - Выбор и интеграция систем на уровне проекта (BC-2020)
      - Инженерия продуктов контроллеров BAS (BC-2010)
      - Подача документов на типовую сертификацию и лицензирование знаков (BC-2030)
      - Операционный учёт хладагентов (BC-2040)
  BC-2000.10:
    name: Инженерия холодильного цикла
    description: |
      Инженерия циклов парокомпрессионного охлаждения, абсорбционных и теплонасосных циклов для оборудования ОВКВ.
  BC-2000.10.10:
    name: Проектирование парокомпрессионного цикла
    description: |
      Проектирование парокомпрессионных холодильных циклов для охлаждающего и нагревательного оборудования.
  BC-2000.10.20:
    name: Проектирование абсорбционного цикла
    description: |
      Проектирование абсорбционных чиллеров и тепловых насосов.
  BC-2000.10.30:
    name: Проектирование цикла теплового насоса
    description: |
      Проектирование обратимых циклов тепловых насосов: воздушные, водяные и грунтовые источники.
  BC-2000.10.40:
    name: Инженерия выбора хладагента
    description: |
      Выбор хладагентов с учётом термодинамики, нормативных требований, ПГП и воспламеняемости.
  BC-2000.10.50:
    name: Оптимизация рабочих характеристик цикла
    description: |
      Оптимизация характеристик цикла при номинальных и частичных нагрузках.
  BC-2000.20:
    name: Инженерия теплообмена и змеевиков
    description: |
      Инженерия испарителей, конденсаторов, рекуперативных роторов и пластинчатых/кожухотрубных теплообменников для оборудования ОВКВ.
  BC-2000.20.10:
    name: Проектирование испарительных змеевиков
    description: |
      Проектирование испарительных змеевиков с ламельными трубами и микроканальных змеевиков.
  BC-2000.20.20:
    name: Проектирование конденсаторных змеевиков
    description: |
      Проектирование воздушных и водяных конденсаторных змеевиков.
  BC-2000.20.30:
    name: Проектирование систем рекуперации теплоты воздух — воздух
    description: |
      Проектирование роторных рекуператоров, пластинчатых теплообменников и контуров с теплоносителем.
  BC-2000.20.40:
    name: Проектирование паяных пластинчатых и кожухотрубных теплообменников
    description: |
      Проектирование паяных пластинчатых и кожухотрубных теплообменников для гидравлических и холодильных нагрузок.
  BC-2000.20.50:
    name: Инженерия материалов и покрытий змеевиков
    description: |
      Выбор металлургии змеевика и защитных покрытий для эксплуатационной долговечности.
  BC-2000.30:
    name: Инженерия воздухоперемещающего оборудования
    description: |
      Инженерия вентиляторов, воздуходувок, приточных установок, заслонок и фильтрационных узлов.
  BC-2000.30.10:
    name: Проектирование центробежных вентиляторов
    description: |
      Аэродинамическое и механическое проектирование центробежных вентиляторов.
  BC-2000.30.20:
    name: Проектирование осевых и пробковых вентиляторов
    description: |
      Аэродинамическое и механическое проектирование осевых и пробковых вентиляторов.
  BC-2000.30.30:
    name: Инженерия приточных установок
    description: |
      Инженерия секций, корпуса и воздушного потока модульных приточных установок.
  BC-2000.30.40:
    name: Инженерия заслонок и жалюзи
    description: |
      Инженерия регулирующих заслонок, противопожарных дымовых заслонок и ветрозащитных жалюзи.
  BC-2000.30.50:
    name: Инженерия систем фильтрации
    description: |
      Инженерия секций фильтрации частиц, газовой фазы и HEPA-фильтрации.
  BC-2000.40:
    name: Инженерия гидравлических и жидкостных систем
    description: |
      Инженерия насосов, трубопроводов, гидравлических контуров и вспомогательного оборудования в составе оборудования ОВКВ.
  BC-2000.40.10:
    name: Инженерия насосов
    description: |
      Выбор и интеграция циркуляционных и консольных насосов в насосные станции.
  BC-2000.40.20:
    name: Проектирование трубопроводов и коллекторов
    description: |
      Проектирование внутренних трубопроводов, коллекторов и распределительных узлов пакетного оборудования.
  BC-2000.40.30:
    name: Инженерия контуров холодной и горячей воды
    description: |
      Инженерия интегрированных контуров холодной и горячей воды на уровне оборудования.
  BC-2000.40.40:
    name: Инженерия гидравлической арматуры
    description: |
      Инженерия расширительных баков, сепараторов воздуха и фильтров в составе пакетной арматуры.
  BC-2000.50:
    name: Инженерия компрессоров и приводов
    description: |
      Инженерия семейств компрессоров и приводов для них.
  BC-2000.50.10:
    name: Инженерия спиральных компрессоров
    description: |
      Инженерия спиральных компрессоров для лёгкого коммерческого оборудования.
  BC-2000.50.20:
    name: Инженерия винтовых компрессоров
    description: |
      Инженерия винтовых компрессоров для коммерческих и промышленных чиллеров.
  BC-2000.50.30:
    name: Инженерия центробежных компрессоров
    description: |
      Инженерия центробежных компрессоров для крупнотоннажных чиллеров.
  BC-2000.50.40:
    name: Инженерия поршневых компрессоров
    description: |
      Инженерия поршневых компрессоров для тепловых насосов и холодильных установок.
  BC-2000.50.50:
    name: Интеграция регулируемых приводов
    description: |
      Интеграция регулируемых приводов с компрессорами и вентиляторами ОВКВ.
  BC-2000.60:
    name: Акустическая и вибрационная инженерия оборудования ОВКВ
    description: |
      Акустическая, вибрационная и шумовая инженерия на уровне оборудования.
  BC-2000.60.10:
    name: Моделирование звуковой мощности
    description: |
      Моделирование звуковой мощности и звукового давления оборудования ОВКВ.
  BC-2000.60.20:
    name: Проектирование виброизоляции
    description: |
      Проектирование виброизоляции компрессоров, вентиляторов и насосов.
  BC-2000.60.30:
    name: Инженерия акустических кожухов
    description: |
      Инженерия акустических кожухов и глушителей, интегрированных с оборудованием.
  BC-2000.60.40:
    name: Психоакустическая настройка характеристик
    description: |
      Настройка субъективно воспринимаемого качества звука сверх агрегированных показателей звуковой мощности.
  BC-2000.70:
    name: Инженерия управления оборудованием и встроенных систем
    description: |
      Инженерия бортовых контроллеров оборудования, встроенного ПО и стеков связи в составе оборудования ОВКВ.
  BC-2000.70.10:
    name: Инженерия бортовых контроллеров
    description: |
      Инженерия контроллеров оборудования и блочных контроллеров.
  BC-2000.70.20:
    name: Инженерия встроенного ПО оборудования
    description: |
      Разработка встроенного ПО для оборудования ОВКВ, включая блочные контроллеры и приводы.
  BC-2000.70.30:
    name: Инженерия связи «умного» оборудования
    description: |
      Инженерия связи оборудования с BAS, включая BACnet и Modbus.
  BC-2000.70.40:
    name: Инженерия диагностической логики оборудования
    description: |
      Инженерия бортовой диагностики, сигнализации и логики кодов неисправностей.
  BC-2000.80:
    name: Верификация и испытания оборудования ОВКВ
    description: |
      Верификация рабочих характеристик оборудования, проведение рейтинговых испытаний AHRI/Eurovent и испытания на долговечность.
  BC-2000.80.10:
    name: Испытания в психрометрической камере
    description: |
      Испытания оборудования ОВКВ в психрометрических камерах в контролируемых условиях.
  BC-2000.80.20:
    name: Проведение стандартных рейтинговых испытаний
    description: |
      Проведение стандартизированных рейтинговых испытаний оборудования ОВКВ.
  BC-2000.80.30:
    name: Верификация тепловых характеристик
    description: |
      Верификация производительности, КПД, IPLV и других показателей тепловых характеристик.
  BC-2000.80.40:
    name: Испытания на долговечность и надёжность
    description: |
      Испытания на долговечность, ускоренный ресурс и надёжность оборудования ОВКВ.
  BC-2000.80.50:
    name: Составление планов испытаний оборудования
    description: |
      Составление планов верификационных и квалификационных испытаний на уровне оборудования.

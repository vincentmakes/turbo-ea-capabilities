# Управление спектром и частотами (ru) — translations for L1-spectrum-frequency-management.yaml
locale: ru
source: L1-spectrum-frequency-management.yaml
entries:
  BC-2670:
    name: Управление спектром и частотами
    description: |
      Управление спектральным портфелем оператора — получение и продление
      лицензий, частотное планирование и координация, управление помехами
      и операции по совместному использованию спектра.
  BC-2670.10:
    name: Управление спектральным портфелем
    description: |
      Ведение реестра спектральных активов и надзор за стратегическими
      решениями в области спектра.
  BC-2670.10.10:
    name: Реестр спектральных активов
    description: |
      Ведение авторитетного реестра спектральных активов оператора
      по диапазонам, географии и лицензиям.
  BC-2670.10.20:
    name: Оценка стоимости спектра
    description: |
      Оценка стоимости спектральных активов для финансовых решений,
      M&A и участия в аукционах.
  BC-2670.10.30:
    name: Торговля спектром
    description: |
      Приобретение, отчуждение и аренда спектральных прав с другими
      операторами там, где это разрешено регуляторами.
  BC-2670.20:
    name: Управление лицензиями на спектр
    description: |
      Сквозное управление лицензиями на спектр от участия в аукционах
      до продления и отчётности о соответствии требованиям.
  BC-2670.20.10:
    name: Получение лицензий на спектр
    description: |
      Участие в аукционах, конкурсах на получение лицензий и двусторонних
      распределениях спектра.
  BC-2670.20.20:
    name: Продление лицензий на спектр
    description: |
      Управление продлением лицензий на спектр по срокам истечения.
  BC-2670.20.30:
    name: Отчётность о соответствии лицензионным условиям
    description: |
      Отчётность о соблюдении условий лицензий на спектр, включая обязательства
      по покрытию и развёртыванию.
  BC-2670.30:
    name: Частотное планирование и координация
    description: |
      Распределение каналов и частот сетевым элементам и координация
      с соседними пользователями.
  BC-2670.30.10:
    name: Назначение частот ячейкам
    description: |
      Назначение частот и PCI отдельным радиоячейкам.
  BC-2670.30.20:
    name: Планирование каналов
    description: |
      Планирование назначения каналов для радиодоступа и микроволновых
      радиорелейных линий.
  BC-2670.30.30:
    name: Планирование отношений соседства
    description: |
      Определение отношений соседства для управления хендоверами
      и помехами.
  BC-2670.40:
    name: Управление помехами спектра
    description: |
      Обнаружение, расследование и устранение вредоносных помех спектра
      во взаимодействии с регуляторами.
  BC-2670.40.10:
    name: Обнаружение помех
    description: |
      Обнаружение вредоносных помех из внутренних и внешних источников.
  BC-2670.40.20:
    name: Устранение помех
    description: |
      Расследование и устранение выявленных случаев помех.
  BC-2670.40.30:
    name: Взаимодействие с регулятором
    description: |
      Взаимодействие с национальными регуляторами по межлицензионным помехам
      и правоприменению.
  BC-2670.50:
    name: Управление совместным использованием спектра
    description: |
      Эксплуатация режимов динамического совместного использования спектра
      и совместного доступа, таких как CBRS.
  BC-2670.50.10:
    name: Динамическое совместное использование спектра
    description: |
      Эксплуатация совместного использования в стиле DSS для нескольких
      радиотехнологий в одном диапазоне.
  BC-2670.50.20:
    name: Координация совместного доступа
    description: |
      Взаимодействие с платформами совместного доступа, такими как SAS и AFC,
      для получения разрешений на каналы.
  BC-2670.50.30:
    name: Координация вторичного использования
    description: |
      Взаимодействие с первичными лицензиатами и действующими пользователями
      в режимах вторичного использования спектра.

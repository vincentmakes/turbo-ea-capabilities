# Управление минеральными ресурсами и запасами (ru) — translations for L1-mineral-resource-reserve-management.yaml
locale: ru
source: L1-mineral-resource-reserve-management.yaml
entries:
  BC-4410:
    name: Управление минеральными ресурсами и запасами
    description: |
      Геологическое моделирование, геостатистическая оценка, классификация, управление компетентными лицами и публичная отчётность по минеральным ресурсам и рудным запасам в соответствии с кодексами семейства CRIRSCO.
  BC-4410.10:
    name: Геологическое моделирование
    description: |
      Построение трёхмерных геологических моделей литологии, структур, изменений и доменов минерализации как исходных данных для оценки ресурсов.
    in_scope:
      - Литологическое и стратиграфическое моделирование
      - Структурное моделирование и моделирование разломов
      - Каркасное моделирование доменов минерализации
    out_of_scope:
      - Контуры карьеров и проектирование блоков (BC-4420.40)
  BC-4410.10.10:
    name: Литологическое моделирование
    description: |
      Трёхмерное моделирование литологических и стратиграфических единиц по данным документирования скважин.
  BC-4410.10.20:
    name: Структурное моделирование
    description: |
      Моделирование разломов, складок и зон сдвига, контролирующих геометрию минерализации.
  BC-4410.10.30:
    name: Моделирование доменов минерализации
    description: |
      Каркасное моделирование оболочек минерализации и доменов содержаний, используемых в качестве границ оценки.
  BC-4410.10.40:
    name: Неявное моделирование
    description: |
      Рабочие процессы неявного и быстрообновляемого геологического моделирования для итеративного уточнения модели.
  BC-4410.20:
    name: Оценка ресурсов
    description: |
      Геостатистическая оценка содержания и тоннажа в блочные модели и классификация оценённого материала как Предполагаемые, Обозначенные или Измеренные ресурсы согласно кодексам публичной отчётности.
  BC-4410.20.10:
    name: Геостатистическая оценка
    description: |
      Вариографический и кригинговый анализ или оценка на основе моделирования содержаний в блочные модели.
  BC-4410.20.20:
    name: Построение блочных моделей
    description: |
      Построение и заполнение регуляризованных блочных моделей для последующего планирования.
  BC-4410.20.30:
    name: Валидация оценки
    description: |
      Статистическая и визуальная валидация оценённых содержаний по сравнению с данными проб.
  BC-4410.20.40:
    name: Классификация ресурсов
    description: |
      Классификация оценённой минерализации в категории Предполагаемые, Обозначенные и Измеренные ресурсы.
  BC-4410.30:
    name: Оценка запасов
    description: |
      Применение горнотехнических, металлургических, экономических и прочих корректирующих факторов для конвертации Обозначенных и Измеренных ресурсов в Вероятные и Доказанные рудные запасы.
  BC-4410.30.10:
    name: Применение корректирующих факторов
    description: |
      Применение горнотехнических, металлургических, инфраструктурных и экономических корректирующих факторов к ресурсам.
  BC-4410.30.20:
    name: Определение бортового содержания
    description: |
      Расчёт бортовых содержаний для подтверждения запасов при заданных ценах и затратах.
  BC-4410.30.30:
    name: Моделирование добычного извлечения и разубоживания
    description: |
      Моделирование добычного извлечения, разубоживания и краевых эффектов применительно к балансовым ресурсам.
  BC-4410.30.40:
    name: Классификация рудных запасов
    description: |
      Классификация рудных запасов в категории Вероятные и Доказанные.
  BC-4410.40:
    name: Управление компетентными лицами
    description: |
      Управление компетентными и квалифицированными лицами, принимающими ответственность за заявления о ресурсах и запасах согласно кодексам публичной отчётности.
  BC-4410.40.10:
    name: Подписание компетентным лицом
    description: |
      Ревью и подписание заявлений о ресурсах и запасах компетентным или квалифицированным лицом.
  BC-4410.40.20:
    name: Внутренний ревью ресурсов
    description: |
      Внутренний коллегиальный и технический ревью оценок ресурсов и запасов.
  BC-4410.40.30:
    name: Координация внешнего аудита ресурсов
    description: |
      Координация независимых сторонних аудитов ресурсов и запасов.
  BC-4410.50:
    name: Публичная отчётность по ресурсам и запасам
    description: |
      Подготовка и раскрытие публичных заявлений о минеральных ресурсах и рудных запасах, требуемых биржевыми регуляторами и листинговыми правилами.
  BC-4410.50.10:
    name: Подготовка заявления о ресурсах
    description: |
      Подготовка публичных заявлений о минеральных ресурсах в соответствии с кодексами семейства CRIRSCO.
  BC-4410.50.20:
    name: Подготовка заявления о запасах
    description: |
      Подготовка публичных заявлений о рудных запасах в соответствии с кодексами семейства CRIRSCO.
  BC-4410.50.30:
    name: Ежегодное обновление заявления о запасах
    description: |
      Ежегодное обновление заявлений о ресурсах и запасах с учётом отработки и новых оценок.
  BC-4410.50.40:
    name: Координация независимого технического отчёта
    description: |
      Координация технических отчётов квалифицированных лиц для рынков капитала, транзакций и событий раскрытия.
  BC-4410.60:
    name: Согласование ресурсов
    description: |
      Согласование оценённых ресурсов и запасов с опробованием на контроле качества, питанием установки и металлопроизводством для оценки качества модели.
  BC-4410.60.10:
    name: Согласование шахта-мельница
    description: |
      Согласование добытых тоннажей и содержаний с питанием установки и извлечённым металлом.
  BC-4410.60.20:
    name: Отслеживание отработки ресурсов
    description: |
      Отслеживание отработки ресурсов и запасов вследствие горнодобывательной деятельности.
  BC-4410.60.30:
    name: Анализ качества модели
    description: |
      Анализ качества ресурсной модели относительно фактических данных для совершенствования будущих оценок.

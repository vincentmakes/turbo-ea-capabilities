# Управление клиентскими проектами (ru) — translations for L1-client-engagement-management.yaml
locale: ru
source: L1-client-engagement-management.yaml
entries:
  BC-4300:
    name: Управление клиентскими проектами
    description: |
      Жизненный цикл приёма клиентов и проектов, скоупинг, мобилизация, управление изменениями, закрытие и текущее управление клиентскими отношениями в рамках юридических консультаций, advisory-проектов и аудиторских заданий.
  BC-4300.10:
    name: Управление приёмом клиентов
    description: |
      Приём новых клиентских отношений, включая KYC, AML-скрининг, проверки санкций и PEP, а также верификацию бенефициарных владельцев до принятия любого задания.
    in_scope:
      - KYC нового клиента и AML-разрешение
      - Скрининг санкций и PEP для потенциальных клиентов
      - Проверки бенефициарного владения и источника средств
      - Периодическое обновление KYC-досье клиентов
    out_of_scope:
      - Оценка независимости и конфликтов (BC-4350)
      - Специфический риск задания (BC-4300.20)
  BC-4300.10.10:
    name: Сбор KYC клиента
    description: |
      Сбор идентификационных данных, бенефициарного владения и информации об источнике средств для потенциальных и существующих клиентов.
  BC-4300.10.20:
    name: Скрининг санкций и PEP клиента
    description: |
      Скрининг клиентов и бенефициарных владельцев по спискам санкций, PEP и неблагоприятных СМИ.
  BC-4300.10.30:
    name: Оценка риска клиента
    description: |
      Оценка риска клиентских отношений для определения глубины due diligence и частоты ревью.
  BC-4300.10.40:
    name: Периодическое обновление KYC клиента
    description: |
      Обновление KYC, владения и оценок риска клиентов по установленному циклу.
  BC-4300.20:
    name: Управление принятием задания
    description: |
      Процесс принятия или отклонения конкретного задания на основе разрешения независимости и конфликтов, оценки мощности, ценовой целесообразности и специфического риска задания.
    in_scope:
      - Оценка риска задания
      - Проверка мощности и компетенций
      - Принятие решения о выполнении задания
    out_of_scope:
      - Существенные проверки независимости и конфликтов (BC-4350)
      - Деятельность по привлечению и предложениям (BC-4360)
  BC-4300.20.10:
    name: Оценка риска задания
    description: |
      Оценка специфического риска задания, включая сложность предмета, добросовестность клиента и взыскаемость вознаграждения.
  BC-4300.20.20:
    name: Проверка мощности и компетенций
    description: |
      Подтверждение наличия у фирмы технических компетенций и ресурсной мощности для выполнения задания.
  BC-4300.20.30:
    name: Принятие решения о выполнении задания
    description: |
      Решение партнёра-руководителя о выполнении задания, объединяющее риск, конфликты, независимость, мощность и коммерческие соображения.
  BC-4300.30:
    name: Управление скоупом и условиями задания
    description: |
      Определение скоупа задания, результатов, допущений, условий вознаграждения и письма о задании или договора на обслуживание.
    in_scope:
      - Определение скоупа услуг
      - Разработка структуры вознаграждения и условий
      - Выпуск письма о задании или договора на обслуживание
    out_of_scope:
      - Стратегия ценообразования на уровне фирмы (BC-4360.50)
      - Предложение на стадии привлечения (BC-4360.30)
  BC-4300.30.10:
    name: Определение скоупа задания
    description: |
      Определение услуг, результатов, допущений, исключений и зависимостей для задания.
  BC-4300.30.20:
    name: Подготовка письма о задании
    description: |
      Подготовка писем о задании и договоров на обслуживание в соответствии с шаблонами фирмы и применимыми профессиональными стандартами.
  BC-4300.30.30:
    name: Переговоры об условиях задания
    description: |
      Переговоры с клиентом об условиях задания, включая ограничение ответственности, применимое право и порядок разрешения споров.
  BC-4300.30.40:
    name: Подписание письма о задании
    description: |
      Подписание, контрподпись и хранение исполненных писем о задании как предварительное условие мобилизации.
  BC-4300.40:
    name: Управление мобилизацией задания
    description: |
      Операционное развёртывание принятого задания: формирование команды, кик-оф, безопасный доступ к данным и настройка инфраструктуры задания.
  BC-4300.40.10:
    name: Формирование команды задания
    description: |
      Идентификация и подтверждение ролей партнёра, менеджера и сотрудника в команде задания.
  BC-4300.40.20:
    name: Управление кик-офом задания
    description: |
      Внутренние и клиентские встречи кик-офа, инструктажные материалы и подтверждение целей и методов работы.
  BC-4300.40.30:
    name: Настройка доступа к данным задания
    description: |
      Подготовка защищённых дата-румов, клиентских порталов и учётных данных доступа для задания.
  BC-4300.40.40:
    name: Настройка инфраструктуры задания
    description: |
      Настройка кодов задания, структуры выставления счетов и нумерации дел в системах практики фирмы.
  BC-4300.50:
    name: Управление изменениями задания
    description: |
      Контроль изменений скоупа, вознаграждения, сроков или состава команды после подписания письма о задании.
  BC-4300.50.10:
    name: Обработка запросов на изменение скоупа
    description: |
      Сбор, оценка и принятие решений по запросам на изменение скоупа от клиента или команды задания.
  BC-4300.50.20:
    name: Утверждение изменений вознаграждения
    description: |
      Процесс утверждения корректировок вознаграждения, дополнительных договоров на обслуживание и авторизаций внеплановых работ.
  BC-4300.50.30:
    name: Поправки к письму о задании
    description: |
      Выпуск и подписание поправок и дополнительных соглашений, отражающих утверждённые изменения задания.
  BC-4300.60:
    name: Управление закрытием задания
    description: |
      Завершение выполненных заданий: передача результатов, хранение рабочих материалов, финальный биллинговый триггер и дебриф.
  BC-4300.60.10:
    name: Управление передачей результатов
    description: |
      Финальная передача отчётов, заключений и рабочих продуктов клиенту с соответствующим сопроводительным письмом.
  BC-4300.60.20:
    name: Настройка хранения дела задания
    description: |
      Закрытие дела задания и конфигурирование политик хранения, извлечения и уничтожения.
  BC-4300.60.30:
    name: Дебриф задания и извлечение уроков
    description: |
      Пост-проектный ревью с командой задания для фиксации извлечённых уроков и действий по улучшению.
  BC-4300.60.40:
    name: Коммуникация закрытия с клиентом
    description: |
      Закрывающая коммуникация с клиентом, включая финальный отчёт, опрос удовлетворённости и планирование последующего взаимодействия.
  BC-4300.70:
    name: Управление клиентскими отношениями
    description: |
      Текущее управление стратегическими клиентскими отношениями: ответственность партнёра по отношениям, планирование клиентского аккаунта и кросс-практическая координация.
    in_scope:
      - Назначение партнёра по отношениям
      - Планирование клиентского аккаунта по нескольким заданиям
      - Отслеживание удовлетворённости клиента
    out_of_scope:
      - Деятельность по привлечению и предложениям (BC-4360)
      - Общий CRM (BC-3060)
  BC-4300.70.10:
    name: Назначение партнёра по отношениям
    description: |
      Назначение и ротация ведущего партнёра по отношениям для каждого стратегического клиента.
  BC-4300.70.20:
    name: Планирование клиентского аккаунта
    description: |
      Планирование аккаунта по портфелю заданий с одним клиентом, включая цели по доле кошелька и отношениям.
  BC-4300.70.30:
    name: Отслеживание удовлетворённости клиента
    description: |
      Сбор обратной связи клиента, NPS или аналогичных метрик и эскалация сигналов неудовлетворённости.
  BC-4300.70.40:
    name: Кросс-практическая координация клиента
    description: |
      Координация между практическими группами и географиями, обслуживающими общего клиента.

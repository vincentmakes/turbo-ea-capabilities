# Набор и приём студентов (ru) — translations for L1-student-recruitment-admissions-management.yaml
locale: ru
source: L1-student-recruitment-admissions-management.yaml
entries:
  BC-4710:
    name: Набор и приём студентов
    description: |
      Сквозное привлечение, обработка заявлений, принятие решений и зачисление
      потенциальных студентов, включая предложения финансовой помощи и работу
      с иностранными абитуриентами.
  BC-4710.10:
    name: Охват потенциальных студентов и набор
    description: |
      Исходящий набор потенциальных студентов через кампании, мероприятия
      и деятельность по генерации лидов.
    in_scope:
      - Кампании по набору и обработка входящих запросов
      - Дни открытых дверей, ярмарки и посещения кампуса
      - Привлечение потенциальных студентов и работа с лидами
    out_of_scope:
      - Общий маркетинг бренда учебного заведения (охватывается общеотраслевым маркетингом)
  BC-4710.10.10:
    name: Кампании по набору студентов
    description: |
      Планирование и проведение кампаний по набору студентов по всем каналам.
  BC-4710.10.20:
    name: Дни открытых дверей и экскурсии по кампусу
    description: |
      Проведение дней открытых дверей, ознакомительных мероприятий и визитов
      потенциальных студентов.
  BC-4710.10.30:
    name: Управление лидами потенциальных студентов
    description: |
      Привлечение, развитие и квалификация лидов потенциальных студентов.
  BC-4710.20:
    name: Управление заявлениями
    description: |
      Приём и обработка заявлений от потенциальных студентов, включая
      подтверждающие документы и коммуникацию с абитуриентами.
    in_scope:
      - Приём заявлений и проверка их полноты
      - Проверка документов и рекомендаций
      - Информирование о статусе заявления
    out_of_scope:
      - Решение о зачислении (охватывается разделом «Принятие решений о зачислении»)
  BC-4710.20.10:
    name: Приём и проверка заявлений
    description: |
      Приём и проверка полноты заявлений по всем каналам.
  BC-4710.20.20:
    name: Проверка подтверждающих документов
    description: |
      Проверка академических справок, рекомендаций и подтверждающих документов.
  BC-4710.20.30:
    name: Информирование о статусе заявления
    description: |
      Информирование абитуриентов о ходе рассмотрения заявления.
  BC-4710.30:
    name: Принятие решений о зачислении
    description: |
      Оценка, рейтингование, рассмотрение комиссией и вынесение решений о
      зачислении в соответствии с опубликованными требованиями.
    in_scope:
      - Оценка и рейтингование абитуриентов
      - Рассмотрение приёмной комиссией
      - Вынесение решений о зачислении
    out_of_scope:
      - Присвоение финансовой помощи (охватывается разделом «Финансовая помощь»)
  BC-4710.30.10:
    name: Оценка и рейтингование абитуриентов
    description: |
      Оценка и рейтингование абитуриентов по критериям поступления.
  BC-4710.30.20:
    name: Рассмотрение приёмной комиссией
    description: |
      Рассмотрение спорных и конкурентных заявлений комиссией или экспертной
      группой.
  BC-4710.30.30:
    name: Вынесение решений о зачислении
    description: |
      Вынесение решений о зачислении, условном зачислении, включении в лист
      ожидания и отказе.
  BC-4710.40:
    name: Финансовая помощь и стипендии
    description: |
      Определение, присвоение и выплата финансовой помощи, стипендий,
      грантов и субсидий для обеспечения доступности образования.
    in_scope:
      - Оценка права на финансовую помощь
      - Администрирование стипендий
      - Выплата субсидий и грантов
    out_of_scope:
      - Соответствие требованиям Title IV и государственного финансирования (охватывается регуляторной отчётностью)
  BC-4710.40.10:
    name: Оценка права на финансовую помощь
    description: |
      Оценка права на финансовую помощь по нуждаемости и заслугам.
  BC-4710.40.20:
    name: Администрирование стипендий
    description: |
      Администрирование стипендиальных присвоений из внутренних и внешних
      источников.
  BC-4710.40.30:
    name: Выплата субсидий и грантов
    description: |
      Выплата субсидий, грантов и поддержки по оплате обучения.
  BC-4710.50:
    name: Конвертация предложений в зачисление
    description: |
      Конвертация предложений о зачислении в подтверждённые записи, включая
      обработку принятия, предзачислительное сопровождение и аналитику.
    in_scope:
      - Отслеживание принятия предложений
      - Предзачислительное сопровождение
      - Аналитика конверсии
    out_of_scope:
      - Активное зачисление и регистрация (охватываются разделом «Зачисление и ведение документации»)
  BC-4710.50.10:
    name: Выдача предложений и отслеживание принятия
    description: |
      Выдача предложений и отслеживание принятия, отказа и отсрочки.
  BC-4710.50.20:
    name: Предзачислительное сопровождение
    description: |
      Выполнение задач сопровождения принятыми студентами до официального
      зачисления.
  BC-4710.50.30:
    name: Аналитика конверсии
    description: |
      Аналитика конверсии предложений и показателей зачисления.
  BC-4710.60:
    name: Управление международным приёмом
    description: |
      Специализированная работа с иностранными абитуриентами, включая
      нострификацию, оценку языковой подготовки и документацию для
      визовой поддержки.
    in_scope:
      - Нострификация иностранных документов об образовании
      - Оценка уровня владения английским языком
      - Оформление документов для визовой поддержки
    out_of_scope:
      - Текущий визовый контроль зачисленных студентов (охватывается регуляторной отчётностью)
  BC-4710.60.10:
    name: Нострификация иностранных документов
    description: |
      Оценка иностранных академических документов на предмет соответствия
      отечественным эквивалентам.
  BC-4710.60.20:
    name: Оценка уровня владения английским языком
    description: |
      Оценка уровня владения английским языком для абитуриентов-неносителей.
  BC-4710.60.30:
    name: Документация для визовой поддержки
    description: |
      Оформление документов для визовой поддержки (например, I-20, CAS)
      принятым студентам.
metadata:
  status: draft
  reviewer: pending

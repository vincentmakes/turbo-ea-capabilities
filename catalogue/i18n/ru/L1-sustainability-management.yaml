# Управление устойчивым развитием (ru) — translations for L1-sustainability-management.yaml
locale: ru
source: L1-sustainability-management.yaml
entries:
  BC-740:
    name: Управление устойчивым развитием
    description: |
      ESG-стратегия, климат, цикличная экономика, отчётность об устойчивом развитии.
  BC-740.10:
    name: Управление ESG-стратегией и отчётностью
    description: |
      ESG-стратегия, существенность, отчёты об устойчивом развитии.
  BC-740.10.10:
    name: Разработка ESG-стратегии
    description: |
      ESG-стратегия, амбиции и интеграция с бизнес-стратегией.
  BC-740.10.20:
    name: Оценка существенности
    description: |
      Единая и двойная оценка существенности по ESRS/GRI.
  BC-740.10.30:
    name: Отчётность и раскрытие информации об устойчивом развитии
    description: |
      Подготовка отчётов и раскрытий об устойчивом развитии (CSRD, IFRS S1/S2, GRI).
  BC-740.10.40:
    name: Управление данными ESG и верификация
    description: |
      Сбор данных ESG, контроли и внешняя верификация.
  BC-740.20:
    name: Управление климатом и углеродным следом
    description: |
      Углеродный след, декарбонизация, климатические раскрытия.
  BC-740.20.10:
    name: Управление реестром ПГ
    description: |
      Реестр парниковых газов 1-го, 2-го и 3-го охватов по стандарту GHG Protocol.
  BC-740.20.20:
    name: Управление дорожной картой декарбонизации
    description: |
      Научно обоснованные цели и планирование дорожной карты декарбонизации.
  BC-740.20.30:
    name: Анализ климатических рисков и сценариев
    description: |
      Физические и переходные климатические риски и сценарии по стандарту TCFD.
  BC-740.20.40:
    name: Управление углеродными кредитами и компенсациями
    description: |
      Закупка и использование углеродных кредитов и компенсаций.
  BC-740.20.50:
    name: Закупка возобновляемой энергии
    description: |
      Долгосрочные соглашения о покупке электроэнергии, зелёные сертификаты и закупка ВИЭ.
  BC-740.30:
    name: Управление цикличной экономикой
    description: |
      Цикличность, сокращение отходов, программы возврата.
  BC-740.30.10:
    name: Цикличный дизайн продукта
    description: |
      Проектирование для ремонта, повторного использования, переработки и сокращения материалов.
  BC-740.30.20:
    name: Программы возврата и повторного использования
    description: |
      Программы возврата, восстановления и перепродажи продукции клиентами.
  BC-740.30.30:
    name: Переработка и рекуперация материалов
    description: |
      Программы переработки и повторное использование рекуперированных материалов.
  BC-740.30.40:
    name: Экологичность упаковки
    description: |
      Разработка экологичной упаковки и соответствие требованиям EPR.
  BC-740.40:
    name: Управление устойчивыми закупками
    description: |
      Устойчивая цепочка поставок, этичные закупки.
  BC-740.40.10:
    name: Стандарты устойчивого развития для поставщиков
    description: |
      Кодекс поведения поставщика и стандарты устойчивого развития.
  BC-740.40.20:
    name: ESG-оценка поставщиков
    description: |
      ESG-рейтинги, аудиты и оценки поставщиков.
  BC-740.40.30:
    name: Due diligence в области прав человека
    description: |
      Due diligence в области прав человека и современного рабства в цепочках поставок.
  BC-740.40.40:
    name: Ответственные закупки сырья
    description: |
      Ответственные закупки конфликтных минералов, древесины и сырьевых товаров.
  BC-740.50:
    name: Взаимодействие заинтересованных сторон в сфере устойчивого развития
    description: |
      Взаимодействие с НКО, сообществами и ESG-рейтинговыми агентствами.
  BC-740.50.10:
    name: Взаимодействие с НКО и гражданским обществом
    description: |
      Взаимодействие с НКО и гражданским обществом по вопросам устойчивого развития.
  BC-740.50.20:
    name: Инвестиции в сообщества
    description: |
      Инвестиции в сообщества, благотворительность и программы социального воздействия.
  BC-740.50.30:
    name: Взаимодействие с ESG-рейтинговыми агентствами
    description: |
      Взаимодействие с ESG-рейтинговыми агентствами и индексами устойчивого развития.
  BC-740.50.40:
    name: Государственная политика и адвокатирование
    description: |
      Адвокатирование государственной политики в области устойчивого развития.

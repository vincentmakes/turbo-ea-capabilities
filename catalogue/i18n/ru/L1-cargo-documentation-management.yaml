# Управление грузовой документацией (ru) — translations for L1-cargo-documentation-management.yaml
locale: ru
source: L1-cargo-documentation-management.yaml
entries:
  BC-2500:
    name: Управление грузовой документацией
    description: |
      Выдача, обмен и управление жизненным циклом грузовых документов, включая
      коносаменты, авиагрузовые накладные, автомобильные и железнодорожные накладные,
      манифесты и их электронные эквиваленты.
  BC-2500.10:
    name: Управление коносаментами
    description: |
      Выдача, сдача и управление морскими и речными коносаментами
      в ордерной и именной формах.
    in_scope:
      - Мастер- и хаус-коносаменты
      - Ордерные, именные варианты и морские накладные
    out_of_scope:
      - Обработка аккредитивов в рамках торгового финансирования (BC-1360)
  BC-2500.10.10:
    name: Выдача коносамента
    description: |
      Выдача мастер- и хаус-коносаментов.
  BC-2500.10.20:
    name: Сдача и высвобождение коносамента
    description: |
      Телекс-релиз, сдача и высвобождение груза по коносаменту.
  BC-2500.10.30:
    name: Варианты ордерных и именных коносаментов
    description: |
      Выдача ордерных, именных и морских накладных.
  BC-2500.20:
    name: Управление авиагрузовыми накладными
    description: |
      Выдача и управление мастер- и хаус-авиагрузовыми накладными, включая e-AWB.
  BC-2500.20.10:
    name: Выдача мастер-авиагрузовой накладной
    description: |
      Выдача мастер-авиагрузовых накладных авиаперевозчиками.
  BC-2500.20.20:
    name: Выдача хаус-авиагрузовой накладной
    description: |
      Выдача хаус-авиагрузовых накладных экспедиторами и консолидаторами.
  BC-2500.20.30:
    name: Конвертация и ведение e-AWB
    description: |
      Конвертация бумажных AWB в e-AWB и управление жизненным циклом.
  BC-2500.30:
    name: Управление автомобильными и железнодорожными накладными
    description: |
      Выдача и управление автомобильными и железнодорожными накладными
      по конвенциям CMR и CIM/SMGS.
  BC-2500.30.10:
    name: Выдача накладной CMR
    description: |
      Выдача накладных CMR для международных автомобильных перевозок.
  BC-2500.30.20:
    name: Выдача накладных CIM и SMGS
    description: |
      Выдача накладных CIM и SMGS для международных железнодорожных перевозок.
  BC-2500.30.30:
    name: Выдача внутренних накладных
    description: |
      Выдача национальных внутренних накладных и накладных на доставку.
  BC-2500.40:
    name: Управление манифестами и грузовыми декларациями
    description: |
      Подача грузовых манифестов и предварительных грузовых деклараций в таможенные органы,
      терминалы и партнёрам-перевозчикам.
  BC-2500.40.10:
    name: Подача входящего манифеста
    description: |
      Подача входящих манифестов в терминалы и таможенные органы.
  BC-2500.40.20:
    name: Подача исходящего манифеста
    description: |
      Подача исходящих манифестов в терминалы и таможенные органы.
  BC-2500.40.30:
    name: Предварительная отчётность о прибытии груза
    description: |
      Предварительная отчётность по режимам ICS2 и CBP ACE.
  BC-2500.50:
    name: Управление электронной документацией
    description: |
      Эксплуатация платформ электронных транспортных документов, включая eBL и ONE Record.
  BC-2500.50.10:
    name: Операции с электронным коносаментом
    description: |
      Эксплуатация платформ электронных коносаментов.
  BC-2500.50.20:
    name: Операции e-AWB и ONE Record
    description: |
      Эксплуатация e-AWB и обменов данными ONE Record.
  BC-2500.50.30:
    name: Обмен и верификация документов
    description: |
      Межсторонний обмен документами и верификация электронных подписей и печатей.
metadata:

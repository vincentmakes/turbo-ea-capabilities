# Управление компетентностью авиадиспетчеров (ru) — translations for L1-air-traffic-controller-competency-management.yaml
locale: ru
source: L1-air-traffic-controller-competency-management.yaml
entries:
  BC-1290:
    name: Управление компетентностью авиадиспетчеров
    description: |
      Начальная, боевая и периодическая подготовка, лицензирование и оценка компетентности диспетчеров.
  BC-1290.10:
    name: Управление начальной подготовкой
    description: |
      Подготовка ab-initio, базовая и рейтинговая подготовка (как правило, в учебном центре).
  BC-1290.10.10:
    name: Программа первоначальной подготовки
    description: |
      Первоначальная подготовка диспетчеров управления воздушным движением, включая базовый этап.
  BC-1290.10.20:
    name: Рейтинговая подготовка
    description: |
      Подготовка по специализации (ACC, APP, ADC, OCN).
  BC-1290.10.30:
    name: Оценка начальной подготовки
    description: |
      Экзамены и оценки в ходе начальной подготовки.
  BC-1290.20:
    name: Управление подготовкой в учебном подразделении
    description: |
      Подготовка на рабочем месте в операционном подразделении.
  BC-1290.20.10:
    name: Определение плана подготовки в учебном подразделении
    description: |
      Разработка планов подготовки в учебном подразделении для перехода диспетчеров.
  BC-1290.20.20:
    name: Проведение подготовки на рабочем месте
    description: |
      Проведение подготовки на рабочем месте инструкторами по подготовке на рабочем месте.
  BC-1290.20.30:
    name: Валидация подготовки в учебном подразделении
    description: |
      Валидация допуска по завершении подготовки в учебном подразделении.
  BC-1290.30:
    name: Управление периодической подготовкой
    description: |
      Повторяющаяся, конверсионная подготовка, подготовка к аварийным и нестандартным ситуациям.
  BC-1290.30.10:
    name: Повторяющаяся подготовка
    description: |
      Периодическая повторяющаяся подготовка для лицензированных диспетчеров.
  BC-1290.30.20:
    name: Конверсионная подготовка
    description: |
      Конверсионная подготовка по новым процедурам, системам или секторам.
  BC-1290.30.30:
    name: Подготовка к аварийным и нестандартным ситуациям
    description: |
      Подготовка к аварийным, нештатным и нестандартным ситуациям.
  BC-1290.40:
    name: Управление оценкой компетентности
    description: |
      Периодические оценки компетентности, проверки в линии, валидация.
  BC-1290.40.10:
    name: Поддержание схемы компетентности
    description: |
      Определение и поддержание схемы компетентности.
  BC-1290.40.20:
    name: Проведение оценки компетентности
    description: |
      Проведение периодических оценок компетентности и проверок в линии.
  BC-1290.40.30:
    name: Управление записями о компетентности
    description: |
      Управление записями об оценках компетентности и сроках их действия.
  BC-1290.50:
    name: Управление лицензированием и допусками
    description: |
      Лицензирование диспетчеров управления воздушным движением, рейтинги, допуски, администрирование медицинской годности.
  BC-1290.50.10:
    name: Выдача лицензий диспетчеров
    description: |
      Выдача и продление лицензий и рейтингов диспетчеров УВД.
  BC-1290.50.20:
    name: Администрирование допусков
    description: |
      Администрирование допусков для подразделений и языковых допусков.
  BC-1290.50.30:
    name: Администрирование медицинской годности
    description: |
      Администрирование медицинской годности 3-го класса для диспетчеров.
  BC-1290.60:
    name: Управление операциями тренажёра
    description: |
      Тренажёры УВД, разработка сценариев, операции имитаторов пилотов.
  BC-1290.60.10:
    name: Проектирование сценариев тренажёра
    description: |
      Разработка сценариев и упражнений для тренажёрной подготовки.
  BC-1290.60.20:
    name: Операции имитаторов пилотов
    description: |
      Управление позициями имитаторов пилотов в ходе упражнений.
  BC-1290.60.30:
    name: Техническое обслуживание и конфигурирование тренажёра
    description: |
      Техническое обслуживание и конфигурирование тренажёров УВД.

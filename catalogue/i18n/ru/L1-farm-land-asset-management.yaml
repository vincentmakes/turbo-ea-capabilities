# Сельскохозяйственные угодья и активы (ru) — translations for L1-farm-land-asset-management.yaml
locale: ru
source: L1-farm-land-asset-management.yaml
entries:
  BC-3540:
    name: Сельскохозяйственные угодья и активы
    description: |
      Записи о праве владения и аренде земли, управление полями и
      участками, телеметрия техники и оборудования, ирригационная
      инфраструктура, фермерские постройки и энергетические активы хозяйства.
  BC-3540.10:
    name: Управление правом владения и арендой земли
    description: |
      Записи о праве собственности, сервитутах и аренде,
      подтверждающие права операционного пользования по портфелю хозяйства.
    in_scope:
      - Записи о праве и виде владения
      - Администрирование договоров аренды
      - Записи о сервитутах и правах доступа
    out_of_scope:
      - Корпоративная недвижимость (BC-1410)
  BC-3540.10.10:
    name: Записи о праве собственности и виде владения
    description: |
      Записи о собственном, арендном и обычном видах владения
      по портфелю хозяйства.
  BC-3540.10.20:
    name: Администрирование договоров аренды
    description: |
      Администрирование договоров аренды сельскохозяйственных
      угодий и их продлений.
  BC-3540.10.30:
    name: Управление земельными сервитутами
    description: |
      Управление сервитутами доступа, правами проезда
      и охранными сервитутами.
  BC-3540.20:
    name: Управление полями и участками
    description: |
      Записи о границах полей, история полей и зонирование
      продуктивности на уровне поля и участка.
  BC-3540.20.10:
    name: Запись границ полей
    description: |
      Съёмка и ведение границ полей в фермерских ГИС-системах.
  BC-3540.20.20:
    name: Записи истории полей
    description: |
      Многолетние записи истории полей по культурам,
      вводимым ресурсам и урожайности.
  BC-3540.20.30:
    name: Зонирование продуктивности полей
    description: |
      Зонирование продуктивности и выделение зон управления
      внутри полей.
  BC-3540.30:
    name: Управление техникой хозяйства
    description: |
      Инвентарь техники хозяйства, полевые операции, телеметрия
      ISOBUS и договорённости об использовании техники.
  BC-3540.30.10:
    name: Инвентарь техники хозяйства
    description: |
      Инвентаризация тракторов, навесного оборудования
      и самоходной техники.
  BC-3540.30.20:
    name: Полевые операции техники
    description: |
      Повседневное полевое использование техники
      и распределение операторов.
  BC-3540.30.30:
    name: Интеграция телеметрии ISOBUS
    description: |
      Интеграция телеметрии совместимой с ISOBUS техники
      с системами управления хозяйством.
  BC-3540.30.40:
    name: Совместное использование и подрядные работы
    description: |
      Договорённости о совместном использовании техники,
      подрядчиках и специализированных операторах.
  BC-3540.40:
    name: Управление ирригационной инфраструктурой
    description: |
      Жизненный цикл ирригационных систем, водных квот
      и технического обслуживания ирригационной инфраструктуры.
  BC-3540.40.10:
    name: Проектирование ирригационной системы
    description: |
      Проектирование и расчёт производительности
      ирригационных систем хозяйства.
  BC-3540.40.20:
    name: Соответствие водным квотам
    description: |
      Соответствие квотам на поверхностные и подземные воды
      и учёт водопотребления.
  BC-3540.40.30:
    name: Техническое обслуживание ирригационной инфраструктуры
    description: |
      Техническое обслуживание насосов, магистральных труб,
      боковых и эмиттеров.
  BC-3540.50:
    name: Управление постройками и дворами хозяйства
    description: |
      Функционирование и содержание складских построек,
      животноводческих помещений, дворов и дорог хозяйства.
  BC-3540.50.10:
    name: Операции складских построек
    description: |
      Функционирование складов для зерна, сена и химикатов.
  BC-3540.50.20:
    name: Операции животноводческих помещений
    description: |
      Функционирование и управление подстилкой
      в животноводческих помещениях.
  BC-3540.50.30:
    name: Техническое обслуживание дворов и дорог
    description: |
      Техническое обслуживание дворов хозяйства, дорог
      и скотопрогонных сооружений.
  BC-3540.60:
    name: Управление энергетикой хозяйства
    description: |
      Производство энергии в хозяйстве, координация закупок
      топлива и энергии и запись энергопотребления.
  BC-3540.60.10:
    name: Производство энергии в хозяйстве
    description: |
      Производство солнечной, ветровой и биогазовой
      энергии в хозяйстве.
  BC-3540.60.20:
    name: Координация закупок топлива и энергии
    description: |
      Координация закупок топлива, электроэнергии
      и газа для хозяйства.
  BC-3540.60.30:
    name: Запись энергопотребления
    description: |
      Запись энергопотребления хозяйства по видам
      деятельности и активам.

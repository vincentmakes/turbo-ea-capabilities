# Управление квалификацией электротехнической продукции (ru) — translations for L1-electrical-product-qualification-management.yaml
locale: ru
source: L1-electrical-product-qualification-management.yaml
entries:
  BC-1920:
    name: Управление квалификацией электротехнической продукции
    description: |
      Организация типовых испытаний на представительных образцах: диэлектрические испытания, испытания на короткое замыкание, EMC, климатические, механические и испытания на долговечность — включая работу аккредитованных лабораторий.
  BC-1920.10:
    name: Управление планами и спецификациями испытаний
    description: |
      Составление и согласование планов и спецификаций испытаний на основе стандартов на продукцию.
  BC-1920.10.10:
    name: Составление спецификаций испытаний
    description: |
      Составление детальных спецификаций испытаний.
  BC-1920.10.20:
    name: Согласование планов испытаний
    description: |
      Согласование планов испытаний инженерными, качественными и сертификационными службами.
  BC-1920.10.30:
    name: Распределение образцов для испытаний
    description: |
      Распределение и хранение представительных образцов для испытаний.
  BC-1920.10.40:
    name: Ведение процедур испытаний
    description: |
      Ведение и пересмотр стандартных процедур испытаний.
  BC-1920.20:
    name: Диэлектрические испытания и испытания высоким напряжением
    description: |
      Испытания изоляции, диэлектрической прочности, частичных разрядов и испытания импульсным напряжением.
  BC-1920.20.10:
    name: Испытание сопротивления изоляции
    description: |
      Измерение сопротивления изоляции в заданных условиях.
  BC-1920.20.20:
    name: Испытание диэлектрической прочности
    description: |
      Испытания диэлектрической прочности переменным и постоянным напряжением при заданных уровнях нагрузки.
  BC-1920.20.30:
    name: Измерение частичных разрядов
    description: |
      Измерение частичных разрядов в системах изоляции.
  BC-1920.20.40:
    name: Испытание импульсным напряжением
    description: |
      Испытания грозозащитной и коммутационной импульсной прочности.
  BC-1920.30:
    name: Испытания на короткое замыкание и коммутацию
    description: |
      Верификация характеристик при коротком замыкании и коммутации в условиях нормируемых токов повреждения.
  BC-1920.30.10:
    name: Испытание коммутационной способности при включении
    description: |
      Верификация коммутационной способности при включении в нормируемое короткое замыкание.
  BC-1920.30.20:
    name: Испытание коммутационной способности при отключении
    description: |
      Верификация коммутационной способности при нормируемых токах повреждения.
  BC-1920.30.30:
    name: Испытание коммутационной выносливости
    description: |
      Механическая и электрическая выносливость при повторной коммутации.
  BC-1920.30.40:
    name: Испытание дугового замыкания
    description: |
      Испытания дугостойкости и дуговой вспышки.
  BC-1920.40:
    name: Испытания EMC и EMI
    description: |
      Испытания проводимых и излучаемых помех, а также помехоустойчивости.
  BC-1920.40.10:
    name: Испытание проводимых помех
    description: |
      Измерение проводимых помех по цепям питания и сигнальным цепям.
  BC-1920.40.20:
    name: Испытание излучаемых помех
    description: |
      Измерение излучаемых электромагнитных помех.
  BC-1920.40.30:
    name: Испытание помехоустойчивости EMC
    description: |
      Верификация помехоустойчивости к проводимым и излучаемым помехам.
  BC-1920.40.40:
    name: Испытание помехоустойчивости к ESD и выбросам напряжения
    description: |
      Испытания помехоустойчивости к электростатическому разряду и выбросам напряжения.
  BC-1920.50:
    name: Климатические и экологические испытания
    description: |
      Климатические, коррозионные, влагозащитные и испытания на воздействие окружающей среды.
  BC-1920.50.10:
    name: Термоциклирование и климатические испытания
    description: |
      Термоциклирование, испытания при постоянной температуре и влажности.
  BC-1920.50.20:
    name: Испытание в солевом тумане и на коррозию
    description: |
      Испытания в солевом тумане и в агрессивной атмосфере.
  BC-1920.50.30:
    name: Испытание степени защиты IP
    description: |
      Верификация степени защиты от пыли и воды.
  BC-1920.50.40:
    name: Испытание на воздействие солнечного и ультрафиолетового излучения
    description: |
      Испытания на воздействие солнечного и ультрафиолетового излучения.
  BC-1920.60:
    name: Механические испытания и испытания на вибрацию
    description: |
      Испытания на вибрацию, удар, механическую выносливость и сейсмическую квалификацию.
  BC-1920.60.10:
    name: Испытания на вибрацию и удар
    description: |
      Испытания на синусоидальную, случайную вибрацию и ударные нагрузки.
  BC-1920.60.20:
    name: Испытание механической выносливости
    description: |
      Механическая выносливость при эксплуатационном циклировании.
  BC-1920.60.30:
    name: Испытание на падение и удар
    description: |
      Испытания на падение, свободное падение и удар продуктов и упаковки.
  BC-1920.60.40:
    name: Сейсмическая квалификация
    description: |
      Сейсмическая квалификация оборудования для электростанций и подстанций.
  BC-1920.70:
    name: Ускоренные испытания на долговечность и надёжность
    description: |
      Ускоренные испытания на долговечность, скрининг и демонстрация надёжности.
  BC-1920.70.10:
    name: Высокоускоренные испытания на долговечность
    description: |
      HALT для выявления запасов прочности конструкции ступенчатым нагружением.
  BC-1920.70.20:
    name: Высокоускоренный скрининг при производстве
    description: |
      HASS — производственный скрининг для выявления скрытых дефектов.
  BC-1920.70.30:
    name: Демонстрационные испытания надёжности
    description: |
      Демонстрационные испытания соответствия целевым показателям надёжности.
  BC-1920.70.40:
    name: Испытания прогрева
    description: |
      Испытания под напряжением для ускорения ранних отказов.
  BC-1920.80:
    name: Управление операциями испытательной лаборатории
    description: |
      Функционирование аккредитованных собственных испытательных лабораторий.
  BC-1920.80.10:
    name: Аккредитация испытательной лаборатории
    description: |
      Поддержание объёма аккредитации ISO/IEC 17025.
  BC-1920.80.20:
    name: Калибровка испытательного оборудования
    description: |
      Калибровка и прослеживаемость испытательного оборудования.
  BC-1920.80.30:
    name: Управление данными и протоколами испытаний
    description: |
      Долгосрочное управление данными и протоколами испытаний.
  BC-1920.80.40:
    name: Межлабораторные сравнения
    description: |
      Сравнительные испытания профессиональной компетентности между лабораториями.

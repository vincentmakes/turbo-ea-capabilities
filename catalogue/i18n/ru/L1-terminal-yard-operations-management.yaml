# Операции на терминале и грузовом дворе (ru) — translations for L1-terminal-yard-operations-management.yaml
locale: ru
source: L1-terminal-yard-operations-management.yaml
entries:
  BC-2470:
    name: Управление операциями на терминале и грузовом дворе
    description: |
      Эксплуатация портовых, интермодальных, железнодорожных и авиагрузовых терминалов,
      включая обработку судов и воздушных судов, управление грузовым двором, воротами
      и терминальным оборудованием.
  BC-2470.10:
    name: Управление обработкой судов и воздушных судов
    description: |
      Постановка у причала, обработка на перроне и погрузка или выгрузка грузов
      на судах и воздушных судах в терминалах.
    in_scope:
      - Грузовые операции у причала и на перроне
      - Планирование укладки на интерфейсе с терминалом
    out_of_scope:
      - Бортовые операции во время рейса (BC-2420.20)
  BC-2470.10.10:
    name: Постановка судна у причала и укладка груза
    description: |
      Швартовка и планирование укладки грузов на судне в порту.
  BC-2470.10.20:
    name: Обработка воздушного судна на перроне
    description: |
      Обслуживание на перроне и погрузка или выгрузка воздушных судов.
  BC-2470.10.30:
    name: Операции погрузки и выгрузки груза
    description: |
      Погрузка и выгрузка контейнеров, ULD и генерального груза.
  BC-2470.20:
    name: Управление грузовым двором и штабелями
    description: |
      Распределение и перемещение контейнеров, трейлеров и железнодорожных вагонов
      на территории грузового двора и в штабелях.
  BC-2470.20.10:
    name: Распределение мест на грузовом дворе
    description: |
      Распределение мест на грузовом дворе для входящих и исходящих единиц.
  BC-2470.20.20:
    name: Планирование штабелирования контейнеров
    description: |
      Планирование штабелирования для оптимизации перестановок и подготовки к погрузке.
  BC-2470.20.30:
    name: Управление рефрижераторными и опасными штабелями
    description: |
      Специализированное управление штабелями для рефрижераторных подключений
      и опасных грузов.
  BC-2470.30:
    name: Управление воротными операциями
    description: |
      Воротные операции для грузовых автомобилей и железнодорожных составов,
      включая предварительное оформление, въезд и выезд.
  BC-2470.30.10:
    name: Операции въездных ворот
    description: |
      Приём входящих грузовых автомобилей и железнодорожных вагонов у ворот терминала.
  BC-2470.30.20:
    name: Операции выездных ворот
    description: |
      Выпуск исходящих грузовых автомобилей и железнодорожных вагонов из ворот терминала.
  BC-2470.30.30:
    name: Предварительное оформление и управление записью
    description: |
      Управление удостоверением личности, документами и окнами записи на въезд.
  BC-2470.40:
    name: Управление терминальным оборудованием
    description: |
      Эксплуатация и обслуживание терминального перегрузочного оборудования:
      кранов, RTG, ричстакеров и наземного оборудования.
  BC-2470.40.10:
    name: Эксплуатация кранов и RTG
    description: |
      Эксплуатация корабельных кранов, RTG и козловых кранов.
  BC-2470.40.20:
    name: Эксплуатация наземного оборудования
    description: |
      Эксплуатация наземного оборудования: тягачей, тележек и погрузчиков.
  BC-2470.40.30:
    name: Техническое обслуживание терминального оборудования
    description: |
      Техническое обслуживание и ремонт терминального перегрузочного оборудования.
  BC-2470.50:
    name: Управление интермодальными перевалками
    description: |
      Перевалка грузов и единиц между видами транспорта в интермодальных узлах,
      таких как железнодорожно-автомобильные дворы и авиагрузовые интерлайн-станции.
  BC-2470.50.10:
    name: Обмен на железнодорожном дворе
    description: |
      Обмен вагонами и интермодальными единицами между железнодорожными операторами.
  BC-2470.50.20:
    name: Операции перевалки грузовик-железная дорога
    description: |
      Перевалка контейнеров и трейлеров между грузовым автотранспортом и железной дорогой.
  BC-2470.50.30:
    name: Авиагрузовый интерлайн
    description: |
      Интерлайн грузов между авиаперевозчиками в узловых аэропортах.
  BC-2470.60:
    name: Управление ёмкостью и эффективностью терминала
    description: |
      Измерение и улучшение производительности терминала, простоя и пропускной способности.
  BC-2470.60.10:
    name: Производительность у причала и стоянки
    description: |
      Измерение производительности у причала судна и стоянки воздушного судна.
  BC-2470.60.20:
    name: Управление простоем контейнеров
    description: |
      Управление временем простоя контейнеров и риском демерреджа.
  BC-2470.60.30:
    name: Отчётность о пропускной способности терминала
    description: |
      Отчётность о пропускной способности терминала по видам транспорта и типам единиц.

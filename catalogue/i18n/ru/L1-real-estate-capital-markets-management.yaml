# Управление рынками капитала в сфере недвижимости (ru) — translations for L1-real-estate-capital-markets-management.yaml
locale: ru
source: L1-real-estate-capital-markets-management.yaml
entries:
  BC-4980:
    name: Управление рынками капитала в сфере недвижимости
    description: |
      Специфическая для недвижимости дисциплина рынков долгового и
      акционерного капитала — привлечение старшего, мезонинного,
      строительного и промежуточного долга, обслуживание кредитов и
      управление активами, структурирование CMBS и CRE CLO,
      программы акционерного капитала СП, публичное привлечение
      капитала REIT, рефинансирование и рекапитализация, управление
      рисками кредитного портфеля CRE. Отличается от общего
      банковского кредитования (BC-1320) и корпоративного казначейства
      (BC-210) — привязан к конвенциям обеспечения в недвижимости,
      отчётности IRP и ковенантам DSCR / LTV.
    in_scope:
      - Привлечение старшего, мезонинного, строительного и промежуточного кредита
      - Принятие кредита, мониторинг ковенантов, модификация и специальное обслуживание
      - Формирование пулов CMBS и CRE CLO, структурирование и отчётность IRP
      - Привлечение акционерного капитала СП, структурирование промоут и водопада, отчётность для партнёров
      - Публичный / частный акционерный капитал REIT, долг, программы ATM и политика дивидендов
      - Исполнение рефинансирования и рекапитализации
      - Концентрация, стресс-тестирование и резервирование кредитного портфеля CRE
    out_of_scope:
      - Общее банковское кредитование (BC-1320)
      - Общая торговля на рынках капитала (BC-1370)
      - Формирование фондов и привлечение капитала LP (BC-4910)
      - Исполнение приобретательных сделок (BC-4930)
  BC-4980.10:
    name: Привлечение долгового финансирования под недвижимость
    description: |
      Привлечение старшего, мезонинного, строительного и промежуточного
      долга под недвижимость на основе андеррайтинга актива и спонсора.
  BC-4980.10.10:
    name: Привлечение ипотечного кредита
    description: |
      Привлечение старших ипотечных кредитов под действующие активы.
  BC-4980.10.20:
    name: Привлечение строительного и промежуточного кредита
    description: |
      Привлечение строительных и промежуточных кредитов для
      девелоперских и переходных активов.
  BC-4980.10.30:
    name: Привлечение мезонинного долга и привилегированного капитала
    description: |
      Привлечение мезонинного долга и привилегированного акционерного
      капитала в структуре капитала.
  BC-4980.10.40:
    name: Переговоры по термшиту и обязательству
    description: |
      Переговоры по термшитам и письмам об обязательстве с
      заёмщиками и спонсорами.
  BC-4980.20:
    name: Обслуживание долга по недвижимости и управление активами
    description: |
      Принятие и обслуживание кредитов CRE, проактивный мониторинг,
      модификация и реструктуризация при необходимости.
  BC-4980.20.10:
    name: Принятие кредита и настройка обслуживания
    description: |
      Принятие новых кредитов CRE на платформу обслуживания и
      настройка потоков платежей и отчётности.
  BC-4980.20.20:
    name: Мониторинг ковенантов и DSCR
    description: |
      Постоянный мониторинг ковенантов кредитного договора, DSCR и
      LTV относительно триггеров.
  BC-4980.20.30:
    name: Модификация кредита и реструктуризация
    description: |
      Переговоры по модификациям и реструктуризации кредитов по
      проблемным активам.
  BC-4980.20.40:
    name: Координация специального обслуживания
    description: |
      Координация со специальными сервисерами по дефолтным и
      предполагающим дефолт кредитам в секьюритизациях.
  BC-4980.30:
    name: Управление CMBS и секьюритизацией
    description: |
      Агрегация кредитных пулов, структурирование сделок CMBS и
      CRE CLO и текущая отчётность IRP для инвесторов.
  BC-4980.30.10:
    name: Агрегация кредитных пулов
    description: |
      Агрегация кредитных пулов, пригодных для секьюритизации.
  BC-4980.30.20:
    name: Структурирование секьюритизации
    description: |
      Структурирование сделок CMBS и CRE CLO, включая транширование
      и рейтингование.
  BC-4980.30.30:
    name: Отчётность IRP для инвесторов
    description: |
      Отчётность для инвесторов в соответствии с пакетом отчётности
      CREFC IRP.
  BC-4980.30.40:
    name: Координация с доверительным управляющим и сервисером
    description: |
      Координация с доверительными управляющими, главными сервисерами
      и рейтинговыми агентствами по действующим сделкам.
  BC-4980.40:
    name: Управление СП и акционерными партнёрами
    description: |
      Привлечение акционерного капитала СП, структурирование промоут
      и водопадного распределения и текущая отчётность и распределения
      для партнёров.
  BC-4980.40.10:
    name: Привлечение акционерного капитала СП
    description: |
      Привлечение акционерного капитала совместных предприятий от
      институциональных и HNW партнёров.
  BC-4980.40.20:
    name: Структурирование промоут и водопада
    description: |
      Структурирование промоут, хёрдлов и водопадного распределения
      в соглашениях о партнёрстве СП.
  BC-4980.40.30:
    name: Отчётность и распределения для партнёров СП
    description: |
      Отчётность для партнёров СП и исполнение договорных
      распределений.
  BC-4980.50:
    name: Управление рынками капитала REIT
    description: |
      Выпуск публичного и частного акционерного и долгового капитала
      REIT, программы ATM и управление политикой дивидендов.
  BC-4980.50.10:
    name: Выпуск акционерного капитала публичного REIT
    description: |
      Выпуск акционерного капитала REIT через дополнительные эмиссии
      и частные размещения.
  BC-4980.50.20:
    name: Выпуск долга и облигаций REIT
    description: |
      Выпуск необеспеченного долга, облигаций и конвертируемых нот
      REIT.
  BC-4980.50.30:
    name: Управление программой ATM
    description: |
      Управление программами размещения акций по рыночной цене,
      включая темпирование и раскрытие информации.
  BC-4980.50.40:
    name: Управление политикой дивидендов
    description: |
      Управление политикой дивидендов REIT в соответствии с
      требованиями к распределению и AFFO.
  BC-4980.60:
    name: Управление рефинансированием и рекапитализацией
    description: |
      Проактивное рефинансирование и рекапитализация структур
      капитала действующих активов в течение срока владения.
  BC-4980.60.10:
    name: Стратегия и темпирование рефинансирования
    description: |
      Разработка стратегии рефинансирования и темпирования
      погашений по портфелю.
  BC-4980.60.20:
    name: Исполнение рефинансирования
    description: |
      Исполнение сделок по рефинансированию отдельных активов и
      пулов.
  BC-4980.60.30:
    name: Реструктуризация при рекапитализации
    description: |
      Реструктуризация структур капитала через рекапитализацию
      партнёра или вливания акционерного капитала.
  BC-4980.70:
    name: Управление рисками кредитного портфеля недвижимости
    description: |
      Мониторинг концентрации, стресс-тестирование, резервирование
      убытков и управление наблюдательным списком по кредитным
      портфелям CRE.
  BC-4980.70.10:
    name: Мониторинг концентрации LTV / DSCR
    description: |
      Мониторинг концентрации LTV и DSCR по кредитному портфелю
      CRE.
  BC-4980.70.20:
    name: Стресс-тестирование кредитного портфеля CRE
    description: |
      Стресс-тестирование кредитного портфеля CRE при шоках
      процентных ставок, вакантности и стоимости.
  BC-4980.70.30:
    name: Резервирование убытков CECL / IFRS 9 по CRE
    description: |
      Резервирование убытков по портфелю CRE в рамках CECL и
      IFRS 9 на основе ожидаемых кредитных потерь.
  BC-4980.70.40:
    name: Наблюдательный список и мониторинг дефолтов
    description: |
      Ведение наблюдательного списка и отслеживание дефолтных
      кредитов по портфелю.

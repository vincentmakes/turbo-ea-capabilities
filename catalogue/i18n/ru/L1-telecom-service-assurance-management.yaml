# Управление качеством телеком-сервисов (ru) — translations for L1-telecom-service-assurance-management.yaml
locale: ru
source: L1-telecom-service-assurance-management.yaml
entries:
  BC-2630:
    name: Управление качеством телеком-сервисов
    description: |
      Управление производительностью, качеством, инцидентами и клиентским
      опытом на уровне сервиса относительно взятых обязательств на основе
      eTOM, ITU-T E.800 и TM Forum SLA Open API.
  BC-2630.10:
    name: Управление уровнем сервиса
    description: |
      Определение, мониторинг, отчётность и обработка нарушений соглашений
      об уровне обслуживания с клиентами и партнёрами.
  BC-2630.10.10:
    name: Определение уровня сервиса
    description: |
      Определение целевых показателей SLA, метрик и методов измерения
      для каждого предложения.
  BC-2630.10.20:
    name: Мониторинг уровня сервиса
    description: |
      Мониторинг измеренных показателей сервиса относительно обязательств SLA.
  BC-2630.10.30:
    name: Отчётность по уровню сервиса
    description: |
      Отчётность о результатах SLA для клиентов, партнёров и внутренних
      заинтересованных сторон.
  BC-2630.10.40:
    name: Управление нарушениями SLA
    description: |
      Обработка нарушений SLA, включая расчёт кредитов и устранение
      последствий для клиента.
  BC-2630.20:
    name: Мониторинг производительности сервиса
    description: |
      Непрерывный мониторинг сквозных KPI сервиса и индикаторов клиентского
      опыта для обнаружения деградации.
  BC-2630.20.10:
    name: Мониторинг сквозных KPI сервиса
    description: |
      Мониторинг сквозных KPI сервиса, агрегированных по базовым сетевым
      доменам.
  BC-2630.20.20:
    name: Мониторинг индикаторов клиентского опыта
    description: |
      Мониторинг индикаторов типа QoE, отражающих воспринимаемое клиентом
      качество сервиса.
  BC-2630.20.30:
    name: Обнаружение деградации сервиса
    description: |
      Раннее обнаружение паттернов деградации сервиса до их влияния
      на клиентов.
  BC-2630.30:
    name: Управление инцидентами, влияющими на клиентов
    description: |
      Сквозное управление инцидентами, влияющими на клиентов: обнаружение,
      уведомление, эскалация и разбор.
  BC-2630.30.10:
    name: Обнаружение клиентских инцидентов
    description: |
      Обнаружение инцидентов, влияющих на одного или нескольких клиентов,
      по сетевым и клиентским сигналам.
  BC-2630.30.20:
    name: Уведомление клиентов об инцидентах
    description: |
      Уведомление пострадавших клиентов и каналов о статусе, ETA
      и временных обходных решениях.
  BC-2630.30.30:
    name: Эскалация инцидентов
    description: |
      Эскалация инцидентов, влияющих на клиентов, согласно политикам
      серьёзности и длительности.
  BC-2630.30.40:
    name: Постинцидентный разбор
    description: |
      Структурированный разбор значимых клиентских инцидентов для выработки
      корректирующих мер.
  BC-2630.40:
    name: Управление качеством сервиса
    description: |
      Измерение, моделирование и отчётность по качеству сервиса и клиентскому
      опыту, включая отчётность для регуляторов.
  BC-2630.40.10:
    name: Измерение качества обслуживания
    description: |
      Измерение параметров QoS: задержки, потерь, джиттера и пропускной
      способности по сервису.
  BC-2630.40.20:
    name: Моделирование качества клиентского опыта
    description: |
      Моделирование воспринимаемого клиентом качества опыта по сетевым
      и поведенческим сигналам.
  BC-2630.40.30:
    name: Отчётность по качеству сервиса
    description: |
      Отчётность по метрикам качества сервиса для внутренних заинтересованных
      сторон и регуляторов.
  BC-2630.50:
    name: Координация восстановления сервиса
    description: |
      Координация действий по восстановлению, временных обходных решений и
      валидации восстановления для деградировавших сервисов.
  BC-2630.50.10:
    name: Рабочий процесс восстановления сервиса
    description: |
      Оркестрация задач восстановления в сетевых и полевых командах.
  BC-2630.50.20:
    name: Координация временных обходных решений
    description: |
      Координация временных обходных маршрутов и решений при длительных
      нарушениях сервиса.
  BC-2630.50.30:
    name: Валидация восстановления сервиса
    description: |
      Подтверждение восстановления сервиса до базового уровня и отсутствия
      влияния на клиентов.
  BC-2630.60:
    name: Управление клиентским опытом
    description: |
      Измерение клиентского опыта в связи с сервисными событиями и
      проактивное взаимодействие для снижения неудовлетворённости.
  BC-2630.60.10:
    name: Измерение NPS по сервисным событиям
    description: |
      Измерение удовлетворённости клиентов и NPS в контексте событий,
      влияющих на сервис.
  BC-2630.60.20:
    name: Выявление риска оттока
    description: |
      Выявление клиентов с повышенным риском оттока после сервисных инцидентов.
  BC-2630.60.30:
    name: Проактивное взаимодействие с клиентами
    description: |
      Проактивное обращение к пострадавшим клиентам с извинениями, кредитами
      и предложениями для удержания.

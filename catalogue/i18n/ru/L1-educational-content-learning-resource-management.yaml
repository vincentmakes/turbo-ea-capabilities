# Управление образовательным контентом и учебными ресурсами (ru) — translations for L1-educational-content-learning-resource-management.yaml
locale: ru
source: L1-educational-content-learning-resource-management.yaml
entries:
  BC-4790:
    name: Управление образовательным контентом и учебными ресурсами
    description: |
      Создание, каталогизация, лицензирование и доставка образовательного
      контента и учебных ресурсов, используемых в обучении, включая
      учебные материалы, цифровые учебные объекты, открытые
      образовательные ресурсы, библиотечные фонды и учебники.
  BC-4790.10:
    name: Создание и производство учебных материалов
    description: |
      Педагогическое проектирование и производство учебных материалов,
      включая мультимедийный контент и составление учебных пакетов.
    in_scope:
      - Педагогическое проектирование
      - Производство мультимедийного контента
      - Составление учебных пакетов
    out_of_scope:
      - Проведение учебных занятий (охватывается организацией учебного процесса)
  BC-4790.10.10:
    name: Педагогическое проектирование
    description: |
      Педагогическое проектирование курсов, модулей и учебного опыта.
  BC-4790.10.20:
    name: Производство мультимедийного контента
    description: |
      Производство видео-, аудио- и интерактивного мультимедийного
      учебного контента.
  BC-4790.10.30:
    name: Составление учебных пакетов
    description: |
      Составление учебных пакетов и обучающих наборов для доставки.
  BC-4790.20:
    name: Каталог цифровых учебных объектов
    description: |
      Каталогизация, версионирование и повторное использование цифровых
      учебных объектов в рамках программ и форматов обучения.
    in_scope:
      - Каталогизация учебных объектов и метаданные
      - Версионирование учебных объектов
      - Поиск и повторное использование объектов
    out_of_scope:
      - Операционная доставка через LMS (охватывается организацией учебного процесса)
  BC-4790.20.10:
    name: Каталогизация учебных объектов и метаданные
    description: |
      Каталогизация учебных объектов и метаданных в соответствии со
      стандартами интероперабельности.
  BC-4790.20.20:
    name: Версионирование учебных объектов
    description: |
      Версионирование и управление жизненным циклом учебных объектов.
  BC-4790.20.30:
    name: Поиск и повторное использование объектов
    description: |
      Поиск и повторное использование учебных объектов в разных курсах
      и дисциплинах.
  BC-4790.30:
    name: Управление открытыми образовательными ресурсами
    description: |
      Поиск, лицензирование и предоставление открытых образовательных
      ресурсов (ОЭР), используемых в обучении.
    in_scope:
      - Поиск и курирование ОЭР
      - Соответствие лицензиям ОЭР
      - Вклад в экосистему ОЭР и обмен ресурсами
    out_of_scope:
      - Закупка коммерческих учебников (охватывается закупкой учебников и учебных материалов)
  BC-4790.30.10:
    name: Поиск и курирование ОЭР
    description: |
      Поиск и курирование открытых образовательных ресурсов для
      институционального использования.
  BC-4790.30.20:
    name: Соответствие лицензиям ОЭР
    description: |
      Соблюдение лицензий ОЭР (например, Creative Commons) при
      использовании и повторном использовании.
  BC-4790.30.30:
    name: Вклад в экосистему ОЭР и обмен
    description: |
      Передача созданного учреждением контента в экосистему открытых
      образовательных ресурсов.
  BC-4790.40:
    name: Библиотечные и информационные ресурсы
    description: |
      Комплектование библиотечного фонда, управление списками для чтения
      и поддержка информационной грамотности в учебной и исследовательской
      деятельности.
    in_scope:
      - Комплектование фонда
      - Управление списками для чтения и резервным фондом
      - Поддержка информационной грамотности
    out_of_scope:
      - Деятельность публичных библиотек вне образовательного контекста
  BC-4790.40.10:
    name: Комплектование библиотечного фонда
    description: |
      Комплектование печатных и электронных библиотечных фондов.
  BC-4790.40.20:
    name: Управление списками для чтения и резервным фондом
    description: |
      Управление учебными списками для чтения и резервными фондами
      курсов.
  BC-4790.40.30:
    name: Поддержка информационной грамотности
    description: |
      Поддержка и обучение в области информационной грамотности и
      навыков работы с источниками.
  BC-4790.50:
    name: Лицензирование контента и управление правами
    description: |
      Лицензирование, очистка авторских прав и управление
      образовательными исключениями для использования стороннего контента
      в обучении.
    in_scope:
      - Лицензирование образовательного контента
      - Очистка авторских прав
      - Управление добросовестным использованием и образовательными исключениями
    out_of_scope:
      - Институциональная интеллектуальная собственность (охватывается межотраслевым управлением интеллектуальной собственностью)
  BC-4790.50.10:
    name: Лицензирование образовательного контента
    description: |
      Лицензирование стороннего контента для образовательного
      использования.
  BC-4790.50.20:
    name: Очистка авторских прав
    description: |
      Получение разрешений на использование контента в обучении и
      оценивании.
  BC-4790.50.30:
    name: Управление образовательными исключениями
    description: |
      Управление добросовестным использованием, честным обращением и
      образовательными исключениями авторского права.
  BC-4790.60:
    name: Закупка учебников и учебных материалов
    description: |
      Определение требований и закупка учебников и учебных материалов,
      включая программы доступных материалов.
    in_scope:
      - Определение обязательной литературы
      - Закупка учебников
      - Программы доступных материалов (например, инклюзивный доступ)
    out_of_scope:
      - Общие закупки (охватываются межотраслевым управлением закупками)
  BC-4790.60.10:
    name: Определение обязательной литературы
    description: |
      Определение обязательной и рекомендованной литературы для курсов.
  BC-4790.60.20:
    name: Закупка учебников
    description: |
      Закупка учебников и учебных материалов для курсов.
  BC-4790.60.30:
    name: Программа доступных материалов
    description: |
      Реализация программ доступных материалов и инклюзивного доступа.

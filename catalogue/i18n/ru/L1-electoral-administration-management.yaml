# Избирательное администрирование (ru) — translations for L1-electoral-administration-management.yaml
locale: ru
source: L1-electoral-administration-management.yaml
entries:
  BC-3330:
    name: Избирательное администрирование
    description: |
      Администрирование выборов, включая регистрацию избирателей, управление избирательными округами, регистрацию кандидатов и партий, разработку и производство бюллетеней, работу избирательных участков, подсчёт голосов и подведение итогов, а также раскрытие данных о финансировании избирательных кампаний.
  BC-3330.10:
    name: Управление регистрацией избирателей
    description: |
      Ведение авторитетных избирательных списков, включая регистрацию, изменение адреса и актуализацию списков.
    in_scope:
      - Регистрация и перерегистрация избирателей
      - Актуализация избирательных списков
      - Верификация права голосовать
    out_of_scope:
      - Регистрация актов гражданского состояния (относится к управлению гражданскими записями и регистрации личности)
  BC-3330.10.10:
    name: Регистрация избирателей
    description: |
      Регистрация правомочных избирателей в избирательных списках по различным каналам.
  BC-3330.10.20:
    name: Актуализация избирательных списков
    description: |
      Актуализация списков, включая изменения адреса, исключение умерших и обработку дубликатов.
  BC-3330.10.30:
    name: Верификация права голосовать
    description: |
      Верификация права голосовать по критериям гражданства, возраста и места жительства.
  BC-3330.10.40:
    name: Информирование избирателей
    description: |
      Предоставление удостоверений избирателей, информации о месте голосования и образовательных материалов для избирателей.
  BC-3330.20:
    name: Управление избирательными округами
    description: |
      Ведение избирательных округов, географии избирательных участков и циклов перенарезки округов.
  BC-3330.20.10:
    name: Ведение избирательных округов
    description: |
      Ведение границ избирательных округов и избирательных единиц.
  BC-3330.20.20:
    name: Определение избирательных участков
    description: |
      Определение, оценка доступности и публикация информации об избирательных участках.
  BC-3330.20.30:
    name: Координация перенарезки округов
    description: |
      Координация законодательной перенарезки округов и циклов работы избирательных комиссий.
  BC-3330.30:
    name: Регистрация кандидатов и партий
    description: |
      Регистрация политических партий, кандидатов, документов на выдвижение и доступ к бюллетеням.
  BC-3330.30.10:
    name: Регистрация политических партий
    description: |
      Регистрация и признание политических партий и их обозначений.
  BC-3330.30.20:
    name: Подача документов о выдвижении кандидатов
    description: |
      Приём и верификация документов о выдвижении кандидатов и установленных законом деклараций.
  BC-3330.30.30:
    name: Определение доступа к бюллетеням
    description: |
      Определение доступа к бюллетеням, включая требования к подписям и квалификационные пороги.
  BC-3330.40:
    name: Разработка и производство бюллетеней
    description: |
      Разработка, компоновка, обеспечение доступности, перевод и производство бюллетеней в бумажном и электронном форматах.
  BC-3330.40.10:
    name: Разработка макета бюллетеней
    description: |
      Разработка и компоновка бюллетеней с учётом ясности, доступности и языкового охвата.
  BC-3330.40.20:
    name: Перевод бюллетеней и обеспечение доступности
    description: |
      Подготовка переведённых бюллетеней и доступных форматов для избирателей с ограниченными возможностями.
  BC-3330.40.30:
    name: Производство и распределение бюллетеней
    description: |
      Печать, программирование и безопасное распределение бумажных и электронных бюллетеней.
  BC-3330.50:
    name: Работа избирательных участков
    description: |
      Работа избирательных участков в день выборов, включая управление членами избирательных комиссий, регистрацию избирателей и голосование по стандартам VVSG.
  BC-3330.50.10:
    name: Управление членами избирательных комиссий
    description: |
      Набор, обучение и развёртывание членов избирательных комиссий и должностных лиц.
  BC-3330.50.20:
    name: Регистрация избирателей на участке
    description: |
      Регистрация избирателей, верификация личности и выдача бюллетеней на избирательном участке.
  BC-3330.50.30:
    name: Голосование на участке
    description: |
      Голосование на участке на бумаге или на оборудовании, сертифицированном по VVSG.
  BC-3330.50.40:
    name: Операции заочного и дистанционного голосования
    description: |
      Операции по обеспечению голосования по открепительным удостоверениям, по почте и из-за рубежа.
  BC-3330.60:
    name: Подсчёт голосов и подведение итогов
    description: |
      Подсчёт бюллетеней, суммирование итогов, проверки и удостоверение результатов выборов.
  BC-3330.60.10:
    name: Подсчёт голосов
    description: |
      Подсчёт бумажных и электронных бюллетеней в соответствии с установленными законом процедурами.
  BC-3330.60.20:
    name: Суммирование и публикация итогов
    description: |
      Суммирование итогов по избирательным участкам и публикация для общественности.
  BC-3330.60.30:
    name: Послевыборная проверка
    description: |
      Проверка с учётом рисков и послевыборный аудит итогов голосования и оборудования.
  BC-3330.60.40:
    name: Удостоверение итогов выборов
    description: |
      Официальное удостоверение итогов выборов и объявление избранных должностных лиц.
  BC-3330.70:
    name: Раскрытие данных о финансировании кампаний
    description: |
      Регистрация политических комитетов, раскрытие данных о пожертвованиях и расходах, контроль соблюдения ограничений.
  BC-3330.70.10:
    name: Регистрация политических комитетов
    description: |
      Регистрация политических комитетов, партий и структур типа PAC.
  BC-3330.70.20:
    name: Отчётность о пожертвованиях и расходах
    description: |
      Приём, валидация и публикация раскрытия сведений о пожертвованиях и расходах.
  BC-3330.70.30:
    name: Правоприменение в сфере финансирования кампаний
    description: |
      Расследование и правоприменение по нарушениям ограничений и требований раскрытия в сфере финансирования кампаний.

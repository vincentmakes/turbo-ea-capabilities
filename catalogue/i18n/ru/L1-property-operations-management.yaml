# Управление объектами размещения (ru) — translations for L1-property-operations-management.yaml
locale: ru
source: L1-property-operations-management.yaml
entries:
  BC-4060:
    name: Управление объектами размещения
    description: |
      Ежедневное управление отелями, курортами и апартаментами с обслуживанием — стойка регистрации, хозяйственная служба, инженерная служба, консьерж, безопасность, устойчивое развитие и соблюдение стандартов бренда и качества.
    in_scope:
      - Операции стойки регистрации и заезд/выезд
      - Хозяйственная служба и бюро находок
      - Инженерная служба и техническое обслуживание
      - Консьерж, швейцар, вейлет и трансфер гостей
      - Безопасность, пожарная безопасность и жизнеобеспечение, обработка инцидентов
      - Операции устойчивого развития на уровне объекта
      - Аудит стандартов бренда и соответствие качеству
    out_of_scope:
      - Операции питания и напитков (BC-4070)
      - Управление групповыми блоками и проведение мероприятий (BC-4110)
      - Корпоративная стратегия устойчивого развития (BC-740)
  BC-4060.10:
    name: Операции стойки регистрации
    description: |
      Управление стойкой регистрации: подготовка к заезду, регистрация, назначение номеров, выезд, оплата фолио и выдача ключей.
  BC-4060.10.10:
    name: Подготовка к заезду
    description: |
      Подготовительные мероприятия перед заездом: отчёты о заездах, назначение номеров и подготовка amenity.
  BC-4060.10.20:
    name: Операции регистрации на стойке
    description: |
      Регистрация гостей через стойку, мобильное приложение и киоск.
  BC-4060.10.30:
    name: Назначение номера и апгрейд
    description: |
      Назначение номеров и апгрейды, включая платные и бесплатные.
  BC-4060.10.40:
    name: Выезд и оплата фолио
    description: |
      Операции выезда гостей и оплата гостиничного фолио.
  BC-4060.10.50:
    name: Выдача ключей и учётных данных доступа
    description: |
      Выдача и аннулирование физических и цифровых ключей от номера и учётных данных доступа.
  BC-4060.20:
    name: Операции хозяйственной службы
    description: |
      Уборка гостевых номеров, вечерний сервис, генеральная уборка и управление бюро находок по всему объекту.
  BC-4060.20.10:
    name: Ежедневная уборка
    description: |
      Ежедневная уборка номеров с проживающими и освобождёнными номеров по стандартам объекта.
  BC-4060.20.20:
    name: Вечерний сервис и уборка текущего проживания
    description: |
      Вечерний сервис и уборка для проживающих гостей.
  BC-4060.20.30:
    name: Генеральная уборка и работа с нефункциональными номерами
    description: |
      Проведение генеральных уборок и управление номерами, выведенными из эксплуатации или ремонта.
  BC-4060.20.40:
    name: Операции бюро находок
    description: |
      Регистрация, хранение и возврат забытых вещей гостям на уровне объекта.
  BC-4060.30:
    name: Инженерная служба и техническое обслуживание
    description: |
      Инженерные и ремонтные работы: плановое, аварийное обслуживание, капитальный ремонт и инспекции соответствия.
  BC-4060.30.10:
    name: Плановое техническое обслуживание
    description: |
      Плановое техническое обслуживание по графику и данным состояния оборудования.
  BC-4060.30.20:
    name: Аварийное техническое обслуживание
    description: |
      Аварийное обслуживание по обращениям гостей и данным инспекций.
  BC-4060.30.30:
    name: Замена активов и ремонт
    description: |
      Замена и реконструкция активов объекта: номера, общественные зоны и подсобные помещения.
  BC-4060.30.40:
    name: Инспекции инженерного соответствия
    description: |
      Инспекции систем пожарной сигнализации, жизнеобеспечения, лифтов и систем под давлением.
  BC-4060.40:
    name: Консьерж и гостевое обслуживание
    description: |
      Услуги консьержа, швейцара, вейлет-парковки и трансферов для гостей на всех этапах пребывания.
  BC-4060.40.10:
    name: Информационные и бронирующие услуги консьержа
    description: |
      Услуги консьержа: информация о направлении, бронирование ресторанов и мероприятий.
  BC-4060.40.20:
    name: Операции швейцара и работа с багажом
    description: |
      Обработка и хранение багажа, доставка в номер и из номера.
  BC-4060.40.30:
    name: Операции вейлет-парковки
    description: |
      Услуги вейлет-парковки и работа с автомобилями у въезда на объект.
  BC-4060.40.40:
    name: Координация транспорта гостей
    description: |
      Организация наземного транспорта для гостей: шаттл отеля и заказ автомобилей.
  BC-4060.50:
    name: Безопасность и охрана объекта
    description: |
      Видеонаблюдение, пожарная безопасность, эвакуация и управление инцидентами на объекте.
  BC-4060.50.10:
    name: Видеонаблюдение на объекте
    description: |
      Наблюдение за общественными и операционными зонами, включая мониторинг и проверку записей.
  BC-4060.50.20:
    name: Пожарная безопасность и жизнеобеспечение
    description: |
      Обслуживание систем пожарной безопасности и жизнеобеспечения, проведение учений и проверки готовности оборудования.
  BC-4060.50.30:
    name: Операции экстренной эвакуации
    description: |
      Проведение аварийной эвакуации и управление инцидентами на объекте.
  BC-4060.50.40:
    name: Обработка инцидентов с гостями
    description: |
      Управление инцидентами в сфере безопасности, кражами и происшествиями с гостями на объекте.
  BC-4060.60:
    name: Операции устойчивого развития на объекте
    description: |
      Управление потреблением энергии, воды, отходами и программами повторного использования белья на уровне объекта.
    in_scope:
      - Измерение и мониторинг потребления на объекте
      - Программы повторного использования и управления отходами на объекте
    out_of_scope:
      - Корпоративная стратегия устойчивого развития (BC-740)
  BC-4060.60.10:
    name: Операции энергетических систем объекта
    description: |
      Управление энергетическими системами объекта и мониторинг потребления относительно целевых показателей.
  BC-4060.60.20:
    name: Управление водными ресурсами
    description: |
      Управление потреблением воды на объекте, включая выявление утечек и меры по повторному использованию.
  BC-4060.60.30:
    name: Обращение с отходами и вторичная переработка
    description: |
      Раздельный сбор отходов, переработка и программы работы с пищевыми отходами на объекте.
  BC-4060.60.40:
    name: Программы повторного использования белья и полотенец
    description: |
      Управление программами повторного использования белья и полотенец и механизмами участия гостей.
  BC-4060.70:
    name: Аудит качества и стандарты бренда объекта
    description: |
      Аудит соответствия объекта стандартам бренда и операционным стандартам, программы тайных гостей и управление восстановлением сервиса.
  BC-4060.70.10:
    name: Операции аудита стандартов бренда
    description: |
      Аудит соответствия объекта стандартам бренда и операционным стандартам.
  BC-4060.70.20:
    name: Операции программы тайного гостя
    description: |
      Управление программами тайных гостей для оценки гостевого опыта по сценарным маршрутам.
  BC-4060.70.30:
    name: Регистрация мер по восстановлению сервиса
    description: |
      Регистрация мер по восстановлению сервиса на объекте, включая компенсации и последующее взаимодействие.
  BC-4060.70.40:
    name: Закрытие замечаний по качеству
    description: |
      Закрытие замечаний аудита и обратной связи по планам улучшения качества.

# Управление биллингом и доходами телекома (ru) — translations for L1-telecom-billing-revenue-management.yaml
locale: ru
source: L1-telecom-billing-revenue-management.yaml
entries:
  BC-2660:
    name: Управление биллингом и доходами телекома
    description: |
      Медиация, тарификация, расчёт, биллинг, представление счетов, взыскание
      задолженности, обеспечение выручки и обработка телекоммуникационных налогов
      и надбавок для услуг с предоплатой, с постоплатой и конвергентных сервисов.
  BC-2660.10:
    name: Управление медиацией использования
    description: |
      Сбор, нормализация и маршрутизация записей об использовании от сетевых
      элементов в системы тарификации и биллинга.
  BC-2660.10.10:
    name: Сбор CDR
    description: |
      Сбор записей о вызовах, сеансах и событиях (CDR) от сетевых элементов
      и источников IPDR.
  BC-2660.10.20:
    name: Обогащение CDR
    description: |
      Обогащение CDR данными об абоненте, тарифе и справочной информацией,
      необходимой для нижестоящих систем.
  BC-2660.10.30:
    name: Дедупликация CDR
    description: |
      Обнаружение и удаление дублирующихся записей об использовании.
  BC-2660.10.40:
    name: Конвертация форматов CDR
    description: |
      Конвертация форматов CDR между источниками сбора и потребителями
      нижестоящих систем.
  BC-2660.20:
    name: Управление тарификацией и рейтингом
    description: |
      Онлайн- и офлайн-тарификация, рейтинг, управление балансом и пополнение
      для предоплатных и постоплатных моделей.
  BC-2660.20.10:
    name: Управление онлайн-тарификацией
    description: |
      Тарификация сеансов и событий в режиме реального времени по балансу
      и политике абонента.
  BC-2660.20.20:
    name: Управление офлайн-тарификацией
    description: |
      Офлайн-рейтинг записей об использовании и событиях для постоплатного
      биллинга.
  BC-2660.20.30:
    name: Управление балансом
    description: |
      Управление основным и выделенным балансами абонента, аккумуляторами
      и квотами.
  BC-2660.20.40:
    name: Управление ваучерами и пополнением
    description: |
      Выпуск, дистрибуция и погашение ваучеров и электронных пополнений.
  BC-2660.30:
    name: Управление операциями биллинга
    description: |
      Выполнение биллинговых циклов, расчёт счетов и управление
      корректировками и исправлениями.
  BC-2660.30.10:
    name: Выполнение биллинговых циклов
    description: |
      Выполнение плановых биллинговых циклов и внеплановых расчётов.
  BC-2660.30.20:
    name: Расчёт счетов
    description: |
      Расчёт начислений, налогов и корректировок по всем компонентам аккаунта.
  BC-2660.30.30:
    name: Корректировка счетов
    description: |
      Применение утверждённых корректировок к счетам, включая кредиты
      и отмены.
  BC-2660.30.40:
    name: Исправление счетов
    description: |
      Исправление некорректных счетов путём перевыставления или компенсирующих
      корректировок.
  BC-2660.40:
    name: Управление представлением и запросами по счетам
    description: |
      Многоформатное представление счетов и урегулирование запросов
      и споров клиентов.
  BC-2660.40.10:
    name: Представление счетов
    description: |
      Подготовка и рассылка счетов в бумажном, PDF и цифровом форматах.
  BC-2660.40.20:
    name: Детализированные запросы по счетам
    description: |
      Обработка детализированных запросов и инициирование споров клиентами.
  BC-2660.40.30:
    name: Разъяснение счетов
    description: |
      Разъяснение и визуализация компонентов счёта для клиентов
      и агентов поддержки.
  BC-2660.50:
    name: Управление взысканием задолженности телекома
    description: |
      Специфичные для телекома процессы напоминания о долге, приостановки,
      отключения и взыскания задолженности.
  BC-2660.50.10:
    name: Процесс напоминания о задолженности
    description: |
      Многоступенчатый процесс напоминания о задолженности для просроченных
      постоплатных аккаунтов.
  BC-2660.50.20:
    name: Приостановка и отключение сервисов
    description: |
      Мягкая приостановка, жёсткое отключение и повторная активация сервисов
      при неоплаченных балансах.
  BC-2660.50.30:
    name: Координация взыскания долгов
    description: |
      Взаимодействие с внутренними и сторонними агентствами по взысканию
      задолженности.
  BC-2660.60:
    name: Управление обеспечением выручки
    description: |
      Выявление, оценка и устранение утечек выручки по всей цепочке дохода.
  BC-2660.60.10:
    name: Обнаружение утечек выручки
    description: |
      Обнаружение утечек между сетевым использованием, медиацией, тарификацией,
      биллингом и бухгалтерским учётом.
  BC-2660.60.20:
    name: Верификация точности биллинга
    description: |
      Выборочная и исчерпывающая верификация точности счетов
      по исходным событиям.
  BC-2660.60.30:
    name: Сверка сети с биллингом
    description: |
      Сквозная сверка событий, зафиксированных сетью, с выставленными
      счетами.
  BC-2660.70:
    name: Управление налогами и надбавками телекома
    description: |
      Расчёт и перечисление телекоммуникационных налогов, надбавок
      и регуляторных сборов.
  BC-2660.70.10:
    name: Надбавка универсального сервисного фонда
    description: |
      Расчёт, биллинг и перечисление взносов в универсальный сервисный фонд.
  BC-2660.70.20:
    name: Акцизный налог на телекоммуникации
    description: |
      Расчёт и перечисление акцизных и специфичных для телекома налогов
      на связь.
  BC-2660.70.30:
    name: Начисление регуляторных сборов
    description: |
      Начисление и перечисление периодических регуляторных сборов,
      привязанных к числу абонентов и объёму выручки.

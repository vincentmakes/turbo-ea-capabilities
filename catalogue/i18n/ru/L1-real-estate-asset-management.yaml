# Управление активами в сфере недвижимости (ru) — translations for L1-real-estate-asset-management.yaml
locale: ru
source: L1-real-estate-asset-management.yaml
entries:
  BC-4920:
    name: Управление активами в сфере недвижимости
    description: |
      Сопровождение действующих активов со стороны владельца в течение
      срока владения — реализация бизнес-плана, мониторинг результатов,
      приоритизация капвложений, репозиционирование, траектория
      устойчивого развития, риск актива и оптимизация налога на
      имущество / операционных расходов. Связывает инвесторский
      взгляд (BC-4910) с управлением объектом на местах (BC-4940).
    in_scope:
      - Бизнес-план по отдельному активу и решения о владении / продаже
      - Мониторинг финансовых, арендных и операционных показателей актива
      - Планирование, приоритизация и надзор за исполнением программы капвложений
      - Репозиционирование, конверсия и реализация стратегии добавленной стоимости
      - Траектория декарбонизации актива и ESG-сертификация
      - Мониторинг рисков актива (физических, климатических, рыночных, кредита арендатора)
      - Оспаривание налога на имущество, анализ операционных расходов и аудит возмещения CAM
    out_of_scope:
      - Построение портфеля фонда / инвестора (BC-4910)
      - Повседневные операции и ордера на работы (BC-4940)
      - Сделки по приобретению и продаже (BC-4930)
      - Абстрагирование аренды и индексация арендной платы (BC-4950)
  BC-4920.10:
    name: Управление бизнес-планом актива
    description: |
      Разработка и обновление бизнес-планов по отдельным активам в
      соответствии с мандатом фонда, горизонтом владения и тезисом
      создания стоимости.
  BC-4920.10.10:
    name: Разработка бизнес-плана актива
    description: |
      Разработка бизнес-плана по отдельному активу, охватывающего
      тезис, драйверы стоимости и горизонт владения.
  BC-4920.10.20:
    name: Анализ владения или продажи
    description: |
      Анализ экономики владения и продажи и рекомендация инвестиционному
      комитету.
  BC-4920.10.30:
    name: Ежегодное обновление плана
    description: |
      Ежегодное обновление бизнес-планов актива по фактическим данным
      и пересмотренному рыночному прогнозу.
  BC-4920.20:
    name: Мониторинг результатов актива
    description: |
      Мониторинг финансовых, арендных и операционных показателей на
      уровне актива в сравнении с бизнес-планом.
  BC-4920.20.10:
    name: Отслеживание финансовых показателей актива
    description: |
      Отслеживание NOI, денежного потока и доходности в сравнении с
      бюджетом и бизнес-планом.
  BC-4920.20.20:
    name: Отслеживание арендных и операционных показателей
    description: |
      Отслеживание заполняемости, арендованного процента,
      средневзвешенного срока аренды и арендной платы в сравнении с
      рынком.
  BC-4920.20.30:
    name: Отслеживание операционных KPI
    description: |
      Отслеживание операционных KPI по бесперебойности работы,
      жалобам, энергоинтенсивности и числу посетителей.
  BC-4920.20.40:
    name: Анализ отклонений и обновление прогноза
    description: |
      Анализ отклонений фактических данных от плана и обновление
      прогноза и предположений о выходе.
  BC-4920.30:
    name: Управление программой капвложений
    description: |
      Планирование, приоритизация и надзор за исполнением программ
      капвложений по активу и портфелю.
  BC-4920.30.10:
    name: Планирование программы капвложений
    description: |
      Многолетнее планирование программы капвложений по активу и
      портфелю.
  BC-4920.30.20:
    name: Приоритизация и согласование капвложений
    description: |
      Приоритизация и согласование проектов капвложений по критериям
      ROI и риска.
  BC-4920.30.30:
    name: Надзор за исполнением капвложений
    description: |
      Надзор за исполнением проектов капвложений, включая выплаты и
      достижение контрольных точек.
  BC-4920.30.40:
    name: Сверка результатов капвложений
    description: |
      Сверка фактических результатов капвложений с ожидаемым приростом
      стоимости и улучшением NOI.
  BC-4920.40:
    name: Репозиционирование и стратегия добавленной стоимости
    description: |
      Разработка и реализация стратегий репозиционирования, конверсии
      и состава арендаторов, меняющих использование актива или профиль
      доходов.
  BC-4920.40.10:
    name: Разработка стратегии репозиционирования
    description: |
      Разработка стратегии репозиционирования, включая целевой рынок
      и ценностное предложение.
  BC-4920.40.20:
    name: Программы конверсии и перепрофилирования
    description: |
      Программы конверсии активов между использованиями (офис в жильё,
      ретейл в смешанное использование).
  BC-4920.40.30:
    name: Стратегия состава арендаторов
    description: |
      Разработка и реализация стратегии состава арендаторов для
      ретейловых и многофункциональных активов.
  BC-4920.50:
    name: Управление устойчивостью и ESG на уровне актива
    description: |
      Траектория декарбонизации актива, управление энергоинтенсивностью,
      сертификации и подача в GRESB.
  BC-4920.50.10:
    name: Траектория декарбонизации актива
    description: |
      Разработка траектории декарбонизации актива в соответствии с
      CRREM и руководством SBTi для зданий.
  BC-4920.50.20:
    name: Управление энерго- и водоинтенсивностью
    description: |
      Управление энерго- и водоинтенсивностью актива в сравнении с
      целевыми показателями.
  BC-4920.50.30:
    name: Сертификация ESG актива (LEED / BREEAM / WELL)
    description: |
      Получение и поддержание сертификатов LEED, BREEAM, WELL и
      Fitwel на уровне актива.
  BC-4920.50.40:
    name: Подача данных GRESB по активу
    description: |
      Подготовка и представление данных на уровне актива для оценки
      GRESB.
  BC-4920.60:
    name: Управление рисками актива
    description: |
      Мониторинг физических, климатических, рыночных и кредитных
      рисков арендаторов, а также достаточности страхования на
      уровне актива.
  BC-4920.60.10:
    name: Оценка физических и климатических рисков
    description: |
      Оценка физических и климатических рисков актива, включая
      подтопление, пожарную опасность и перегрев.
  BC-4920.60.20:
    name: Мониторинг кредитного риска арендаторов
    description: |
      Мониторинг кредитоспособности арендаторов и риска неоплаты
      аренды по активу и портфелю.
  BC-4920.60.30:
    name: Мониторинг рыночного риска
    description: |
      Мониторинг драйверов рыночного риска, включая движение
      капставок, пайплайн предложения и динамику арендных ставок.
  BC-4920.60.40:
    name: Анализ достаточности страхования
    description: |
      Периодическая проверка достаточности страхования имущества и
      ответственности относительно стоимости актива и рисков.
  BC-4920.70:
    name: Оптимизация налога на имущество и операционных расходов
    description: |
      Управление оценками по налогу на имущество, анализ
      операционных расходов, аудит возмещения CAM и оптимизация
      тарифов на коммунальные услуги по объектам недвижимости.
  BC-4920.70.10:
    name: Оценка и оспаривание налога на имущество
    description: |
      Проверка и оспаривание оценок по налогу на имущество с
      использованием сравнительных данных.
  BC-4920.70.20:
    name: Анализ операционных расходов
    description: |
      Периодический анализ операционных расходов для бенчмаркинга и
      выявления возможностей снижения.
  BC-4920.70.30:
    name: Аудит возмещения CAM
    description: |
      Аудит возмещения CAM и сервисных сборов с арендаторов в
      соответствии с правами по аренде.
  BC-4920.70.40:
    name: Оптимизация тарифов на коммунальные услуги
    description: |
      Оптимизация закупок коммунальных услуг, тарифов и платы за
      мощность по портфелю.

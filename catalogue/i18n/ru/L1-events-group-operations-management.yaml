# Управление мероприятиями и групповыми операциями (ru) — translations for L1-events-group-operations-management.yaml
locale: ru
source: L1-events-group-operations-management.yaml
entries:
  BC-4110:
    name: Управление мероприятиями и групповыми операциями
    description: |
      Организация деловых встреч, инсентив-поездок, конференций, выставок и банкетных мероприятий на площадках гостиничного бизнеса — включая групповые продажи, распределение функциональных залов, исполнение банкетных заказов, управление групповым блоком номеров, аудиовизуальное и продакшн-обеспечение, выставление счетов и пост-событийную отчётность.
    in_scope:
      - Групповые лиды, контрактование и ценообразование
      - Распределение функциональных залов и урегулирование конфликтов
      - Составление и исполнение банкетного заказа
      - Контракт на блок номеров, списки размещения и отчётность по выборке
      - Аудиовизуальное обеспечение, постановка и организация гибридных мероприятий
      - Выставление счёта по мастер-аккаунту и финальный расчёт
      - Отчётность по соотношению блок/выборка и пост-событийной эффективности
    out_of_scope:
      - Корпоративный событийный маркетинг (BC-410)
      - Кухонное производство и пищевая безопасность банкетов (BC-4070)
      - Регистрация на стойке для групповых заездов (BC-4060.10)
  BC-4110.10:
    name: Управление групповыми и событийными продажами
    description: |
      Квалификация групповых лидов, операции по предложениям и контрактам, ценовые уступки и пайплайн-отчётность по групповому бизнесу.
  BC-4110.10.10:
    name: Квалификация групповых лидов
    description: |
      Квалификация входящих групповых лидов по критериям направления, площади и тарифа.
  BC-4110.10.20:
    name: Групповые предложения и контракты
    description: |
      Подготовка коммерческих предложений и заключение договоров на групповые мероприятия.
  BC-4110.10.30:
    name: Групповое ценообразование и управление уступками
    description: |
      Управление групповым ценообразованием и переговорами об уступках в соответствии с ценовыми ориентирами.
  BC-4110.10.40:
    name: Пайплайн-отчётность по группам
    description: |
      Отчётность по групповому пайплайну продаж и конверсии по стадиям.
  BC-4110.20:
    name: Управление залами и событийным дневником
    description: |
      Определение и распределение инвентаря функциональных залов, урегулирование конфликтов, планирование расстановки и вместимости.
  BC-4110.20.10:
    name: Определение инвентаря функциональных залов
    description: |
      Определение инвентаря функциональных залов, включая вместимость, виды расстановки и совмещаемые помещения.
  BC-4110.20.20:
    name: Бронирование и распределение залов
    description: |
      Бронирование и распределение функциональных залов по подтверждённым и предварительным мероприятиям.
  BC-4110.20.30:
    name: Урегулирование конфликтов по залам
    description: |
      Урегулирование конфликтов при пересекающихся заявках и зависимостях смежных залов.
  BC-4110.20.40:
    name: Планирование расстановки и вместимости
    description: |
      Планирование видов расстановки и вместимости для каждого мероприятия с учётом норм пожарной безопасности и доступности.
  BC-4110.30:
    name: Исполнение банкетных заказов
    description: |
      Составление банкетных заказов, их распределение операционным командам, исполнение установки/обслуживания/сноса и обработка изменений заказов.
  BC-4110.30.10:
    name: Составление банкетного заказа
    description: |
      Составление банкетных заказов с детализацией F&B, AV, расстановки и тайминга.
  BC-4110.30.20:
    name: Распределение и инструктаж по банкетному заказу
    description: |
      Распределение банкетных заказов операционным командам и инструктаж исполнителей.
  BC-4110.30.30:
    name: Операции установки, обслуживания и сноса
    description: |
      Операции установки, обслуживания и сноса в соответствии с банкетным заказом и тайминг-планом мероприятия.
  BC-4110.30.40:
    name: Операции изменений банкетного заказа
    description: |
      Обработка изменений банкетных заказов, включая экстренные изменения требований.
  BC-4110.40:
    name: Управление групповым блоком номеров и списком размещения
    description: |
      Конфигурирование контрактов на групповой блок номеров, операции со списками размещения, управление датой отсечки, смывом и отчётность по выборке на уровне мероприятия.
  BC-4110.40.10:
    name: Конфигурирование блокового контракта
    description: |
      Конфигурирование условий блокового контракта в операционных системах для мероприятия.
  BC-4110.40.20:
    name: Операции со списками размещения
    description: |
      Операции со списками размещения: обновления, специальные запросы и последовательность заезда.
  BC-4110.40.30:
    name: Операции отсечки и смыва блока
    description: |
      Операции отсечки и смыва для высвобождения неиспользованного блочного инвентаря в открытую продажу.
  BC-4110.40.40:
    name: Отчётность по выборке блока
    description: |
      Отчётность по выборке блока относительно контракта для целей учёта выручки и эффективности.
  BC-4110.50:
    name: Аудиовизуальные и продакшн-операции
    description: |
      Аудиовизуальные и продакшн-операции: собственный AV, постановка, гибридный стриминг и координация внешних поставщиков.
  BC-4110.50.10:
    name: Собственные AV-операции
    description: |
      Эксплуатация собственного AV-оборудования и команды для мероприятий.
  BC-4110.50.20:
    name: Постановочные и декорационные операции
    description: |
      Постановочные работы и сценография для мероприятий, включая декоративные и риггинговые элементы.
  BC-4110.50.30:
    name: Онлайн-трансляция и операции гибридных мероприятий
    description: |
      Организация онлайн-трансляции и проведение гибридных мероприятий для удалённой и очной аудитории.
  BC-4110.50.40:
    name: Координация внешних AV-поставщиков
    description: |
      Координация внешних AV-поставщиков с учётом требований площадки и страхования.
  BC-4110.60:
    name: Выставление счетов и управление мастер-аккаунтом
    description: |
      Открытие мастер-аккаунтов, индивидуальные и инцидентальные счета, авансы и финальный расчёт и сверка по мероприятию.
  BC-4110.60.10:
    name: Открытие мастер-аккаунта
    description: |
      Открытие мастер-аккаунтов мероприятия и настройка правил маршрутизации для оплачиваемых позиций.
  BC-4110.60.20:
    name: Индивидуальные и инцидентальные счета
    description: |
      Выставление индивидуальных и инцидентальных счетов участникам сверх мастер-аккаунта.
  BC-4110.60.30:
    name: Управление авансами и предоплатами
    description: |
      Управление авансами и предоплатами по контрольным точкам мероприятия.
  BC-4110.60.40:
    name: Финальный расчёт и сверка по мероприятию
    description: |
      Финальный расчёт и сверка мастер-аккаунта мероприятия с контрактом и фактическим потреблением.
  BC-4110.70:
    name: Отчётность об эффективности и пост-событийная аналитика
    description: |
      Отчётность об эффективности групповых мероприятий: соотношение блок/выборка, финансовые результаты, обратная связь участников и отслеживание продлений.
  BC-4110.70.10:
    name: Отчётность блок/выборка
    description: |
      Отчётность по соотношению блок/выборка для завершённых мероприятий.
  BC-4110.70.20:
    name: Отчётность о финансовой эффективности мероприятия
    description: |
      Отчётность о финансовой эффективности мероприятия относительно бюджета и прогноза.
  BC-4110.70.30:
    name: Сбор обратной связи участников
    description: |
      Сбор обратной связи участников через пост-событийные опросы и живые сигналы.
  BC-4110.70.40:
    name: Отслеживание повторных бронирований и продлений
    description: |
      Отслеживание пайплайна повторных бронирований и возможностей продления по завершённым мероприятиям.

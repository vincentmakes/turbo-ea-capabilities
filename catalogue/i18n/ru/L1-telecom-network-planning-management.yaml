# Планирование телекоммуникационных сетей (ru) — translations for L1-telecom-network-planning-management.yaml
locale: ru
source: L1-telecom-network-planning-management.yaml
entries:
  BC-2610:
    name: Планирование телекоммуникационных сетей
    description: |
      Долгосрочное проектирование и размерение фиксированных, мобильных и IP-сетей —
      прогнозирование спроса, планирование покрытия и ёмкости, определение эволюции
      технологий, составление плана развёртывания объектов и координация вывода
      устаревших сетей из эксплуатации.
  BC-2610.10:
    name: Прогнозирование сетевого спроса
    description: |
      Долгосрочное прогнозирование спроса абонентов, трафика и сервисов
      для принятия решений по покрытию и ёмкости.
  BC-2610.10.10:
    name: Прогнозирование роста абонентской базы
    description: |
      Прогнозирование численности абонентов по сегментам, технологиям
      и географии.
  BC-2610.10.20:
    name: Прогнозирование трафика
    description: |
      Прогнозирование объёмов голосового, данных, видео и сигнализационного
      трафика по доменам и ячейкам.
  BC-2610.10.30:
    name: Моделирование сервисного спроса
    description: |
      Моделирование спроса на новые и развивающиеся сервисы для обоснования
      планов ёмкости и функциональных дорожных карт.
  BC-2610.20:
    name: Планирование покрытия сети
    description: |
      Планирование целевых показателей географического покрытия и отказоустойчивости
      для радио-, оптоволоконных и транспортных сетей.
  BC-2610.20.10:
    name: Планирование радиопокрытия
    description: |
      Определение задач радиопокрытия и моделирование распространения сигнала
      по диапазонам и технологиям.
  BC-2610.20.20:
    name: Планирование волоконного покрытия
    description: |
      Планирование охвата оптоволоконной сетью, количества подключаемых домов
      и размещения узлов доступа.
  BC-2610.20.30:
    name: Планирование резервирования и отказоустойчивости
    description: |
      Проектирование маршрутного разнообразия, географического резервирования
      и целевых показателей отказоустойчивости.
  BC-2610.30:
    name: Планирование ёмкости сети
    description: |
      Размерение ёмкости в сегментах радиодоступа, ядра и транспорта
      для удовлетворения прогнозируемого спроса при заданных показателях
      производительности.
  BC-2610.30.10:
    name: Планирование ёмкости радиодоступа
    description: |
      Размерение ёмкости ячеек, секторов и несущих в сети радиодоступа.
  BC-2610.30.20:
    name: Планирование ёмкости ядра сети
    description: |
      Размерение ёмкости функций мобильного и фиксированного ядра сети
      и хранилищ данных абонентов.
  BC-2610.30.30:
    name: Планирование ёмкости транспорта
    description: |
      Размерение ёмкости транспорта фронтхол, бэкхол, метро и агрегации.
  BC-2610.30.40:
    name: Планирование ёмкости IP-магистрали
    description: |
      Размерение ёмкости IP-магистрали, пиринговых и транзитных каналов.
  BC-2610.40:
    name: Планирование эволюции сетевых технологий
    description: |
      Определение многолетней технологической дорожной карты сети и
      архитектурной эволюции.
  BC-2610.40.10:
    name: Формирование технологической дорожной карты
    description: |
      Разработка многолетней дорожной карты эволюции технологий радио,
      транспорта и ядра.
  BC-2610.40.20:
    name: Архитектурная эволюция сети
    description: |
      Архитектурная трансформация к целевым эталонным архитектурам,
      таким как облачное ядро и Open RAN.
  BC-2610.40.30:
    name: Выбор технологий поставщиков
    description: |
      Оценка и выбор вендорских технологий для новых сетевых доменов
      и циклов обновления.
  BC-2610.50:
    name: Планирование сетевых объектов
    description: |
      Определение, обследование, согласование и составление плана развёртывания
      новых сетевых объектов.
  BC-2610.50.10:
    name: Идентификация объектов
    description: |
      Определение кандидатных объектов по критериям покрытия, ёмкости
      и наличия бэкхола.
  BC-2610.50.20:
    name: Радиочастотное обследование объектов
    description: |
      Обследование кандидатных объектов на предмет RF-характеристик,
      конструктивной пригодности и помех.
  BC-2610.50.30:
    name: Координация разрешений на строительство
    description: |
      Координация внутренних согласований, разрешений на строительство
      и зонирования для новых объектов.
  BC-2610.50.40:
    name: Составление графика развёртывания
    description: |
      Составление графика и последовательности строительства объектов
      с учётом капитальных вложений, возможностей поставщиков и обязательств
      по покрытию.
  BC-2610.60:
    name: Планирование вывода сети из эксплуатации
    description: |
      Планирование вывода устаревшей сети, миграции клиентов
      и ликвидации активов.
  BC-2610.60.10:
    name: Планирование демонтажа устаревшей сети
    description: |
      Планирование организованного демонтажа устаревших сетевых элементов
      и связанных активов.
  BC-2610.60.20:
    name: Планирование миграции клиентов
    description: |
      Планирование миграции клиентов с выводимых технологий на целевые
      платформы.
  BC-2610.60.30:
    name: Планирование завершения работы технологий
    description: |
      Определение контрольных точек завершения работы технологий, уведомлений
      регуляторов и событий окончательного отключения.

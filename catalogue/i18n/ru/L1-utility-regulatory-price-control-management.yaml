# Регулирование цен (ru) — translations for L1-utility-regulatory-price-control-management.yaml
locale: ru
source: L1-utility-regulatory-price-control-management.yaml
entries:
  BC-3920:
    name: Регулирование цен в коммунальной сфере
    description: |
      Взаимодействие с регуляторами коммунальной отрасли и управление режимами ценового контроля — отношения с регуляторами, подготовка заявок, проектирование тарифных структур, регуляторная отчётность, обязательства по уровню сервиса, регуляторное распределение затрат, а также обязательства по всеобщему обслуживанию и доступности услуг.
  BC-3920.10:
    name: Взаимодействие с регулятором
    description: |
      Ежедневное управление отношениями и информационными потоками с отраслевыми регуляторами и органами по защите потребителей.
  BC-3920.10.10:
    name: Управление перепиской с регулятором
    description: |
      Обработка входящей и исходящей корреспонденции и запросов на предоставление информации от регуляторов.
  BC-3920.10.20:
    name: Ответы на регуляторные консультации
    description: |
      Подготовка и направление ответов на регуляторные консультации.
  BC-3920.10.30:
    name: Участие в регуляторных слушаниях
    description: |
      Участие в регуляторных слушаниях, технических конференциях и форумах заинтересованных сторон.
  BC-3920.20:
    name: Управление заявками на ценовой контроль
    description: |
      Комплексная подготовка, подача и согласование многолетних бизнес-планов в рамках ценового контроля или тарифных дел.
    in_scope:
      - Составление бизнес-плана (RIIO, PR, тарифное дело)
      - Сравнительный анализ затрат и моделирование совокупных расходов
      - Согласование допустимой выручки и целевых показателей
    out_of_scope:
      - Внутреннее инвестиционное планирование (BC-3900.40)
      - Участие в оптовых рынках (BC-3850)
  BC-3920.20.10:
    name: Подготовка бизнес-плана
    description: |
      Подготовка бизнес-планов ценового контроля (RIIO, PR и аналогичных).
  BC-3920.20.20:
    name: Сравнительный анализ затрат и моделирование
    description: |
      Бенчмаркинг затрат и моделирование совокупных расходов на основе регуляторных и отраслевых данных.
  BC-3920.20.30:
    name: Согласование допустимой выручки
    description: |
      Переговоры о допустимой выручке, целевых показателях и параметрах стимулов с регулятором.
  BC-3920.30:
    name: Проектирование тарифных структур
    description: |
      Разработка регулируемых тарифных структур — плата за энергию, сетевой тариф и постоянная плата — для бытовых, коммерческих и промышленных потребителей.
  BC-3920.30.10:
    name: Проектирование тарифа на пользование сетью
    description: |
      Разработка тарифов на пользование распределительными и передающими сетями.
  BC-3920.30.20:
    name: Разработка розничных тарифных расписаний
    description: |
      Разработка розничных тарифных расписаний, включая дифференцированные по времени суток и сезонные структуры.
  BC-3920.30.30:
    name: Методология платы за подключение
    description: |
      Методология платы за подключение и управление границей оспариваемых и неоспариваемых работ.
  BC-3920.40:
    name: Регуляторная отчётность
    description: |
      Периодическая статутная отчётность перед отраслевыми регуляторами, включая ежегодные отчёты о производительности, регуляторные счета и промежуточные представления.
  BC-3920.40.10:
    name: Ежегодная отчётность о производительности
    description: |
      Составление и подача ежегодных отчётов о производительности регуляторам.
  BC-3920.40.20:
    name: Подготовка регуляторных счетов
    description: |
      Подготовка регуляторных счетов в соответствии с регуляторными бухгалтерскими инструкциями.
  BC-3920.40.30:
    name: Внеплановые регуляторные представления
    description: |
      Разовая передача данных на порталы регуляторов и ответы на запросы информации.
  BC-3920.50:
    name: Управление обязательствами по уровню сервиса
    description: |
      Отслеживание и администрирование стимулов, определённых регулятором для достижения целевых показателей.
  BC-3920.50.10:
    name: Мониторинг стимулов за выполнение целевых показателей
    description: |
      Отслеживание ODI, обязательств по производительности и накопленных стимулов.
  BC-3920.50.20:
    name: Администрирование гарантированных стандартов обслуживания
    description: |
      Администрирование выплат потребителям по гарантированным стандартам обслуживания.
  BC-3920.50.30:
    name: Расчёт регуляторных штрафов
    description: |
      Расчёт регуляторных штрафов и вознаграждений по производительности.
  BC-3920.60:
    name: Регуляторное распределение затрат
    description: |
      Распределение затрат между регулируемыми и нерегулируемыми бизнес-единицами и по категориям ценового контроля в соответствии с методологией распределения.
  BC-3920.60.10:
    name: Ведение методологии распределения затрат
    description: |
      Поддержание методологии распределения затрат, одобренной регулятором.
  BC-3920.60.20:
    name: Разделение регулируемых и нерегулируемых затрат
    description: |
      Периодическое применение коэффициентов разделения затрат между регулируемой и нерегулируемой деятельностью.
  BC-3920.60.30:
    name: Классификация капитальных и операционных затрат
    description: |
      Отнесение расходов к капитальным или операционным в соответствии с регуляторными определениями.
  BC-3920.70:
    name: Управление обязательствами по всеобщему обслуживанию и доступности
    description: |
      Реализация программ всеобщего обслуживания и схем доступности, а также программ борьбы с энергетической и водной бедностью.
  BC-3920.70.10:
    name: Исполнение обязательств всеобщего обслуживания
    description: |
      Выполнение требований обязательств по всеобщему обслуживанию для розничных потребителей.
  BC-3920.70.20:
    name: Программы борьбы с энергетической и водной бедностью
    description: |
      Реализация программ по снижению энергетической и водной бедности.
  BC-3920.70.30:
    name: Отчётность по схемам доступности услуг
    description: |
      Представление отчётности об исполнении схем доступности регулятору и государственным органам.
metadata:

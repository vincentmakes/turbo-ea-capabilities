# Управление хвостами и отходами горного производства (ru) — translations for L1-tailings-mine-waste-management.yaml
locale: ru
source: L1-tailings-mine-waste-management.yaml
entries:
  BC-4460:
    name: Управление хвостами и отходами горного производства
    description: |
      Управление жизненным циклом хвостохранилищ, отвалов вскрышных и
      вмещающих пород, шахтных вод и опасных отходов горного производства
      в соответствии с Глобальным отраслевым стандартом управления хвостами
      (GISTM) и эквивалентными регуляторными режимами.

  BC-4460.10:
    name: Инженерия хвостохранилищ
    description: |
      Проектирование и долгосрочное планирование хвостохранилищ, включая
      выбор площадки, строительство дамбы и проектирование, согласованное
      с планом ликвидации.
    in_scope:
      - Выбор площадки и концептуальное проектирование
      - Проектирование наращивания и строительства дамбы
      - Планирование намыва и моделирование пляжа
    out_of_scope:
      - Оперативный намыв хвостов (BC-4460.20)
      - Инструментальный мониторинг хвостохранилищ (BC-4460.30)

  BC-4460.10.10:
    name: Выбор площадки хвостохранилища
    description: |
      Многокритериальный выбор площадки и анализ альтернатив для новых
      и расширяемых хвостохранилищ.

  BC-4460.10.20:
    name: Инженерия строительства дамбы
    description: |
      Проектирование и контроль качества строительства дамб хвостохранилищ.

  BC-4460.10.30:
    name: Планирование намыва хвостов
    description: |
      Планирование последовательности намыва, формирования пляжа и
      расположения прудка-отстойника.

  BC-4460.10.40:
    name: Проектирование с учётом ликвидации
    description: |
      Проектирование хвостохранилищ, согласованное с долгосрочной ликвидацией
      и формированием безопасного финального рельефа.

  BC-4460.20:
    name: Операции хвостохранилищ
    description: |
      Оперативный намыв хвостов в хранилища, включая пульповый, пастовый
      и фильтрованный транспорт хвостов и оборотное водоснабжение.

  BC-4460.20.10:
    name: Транспортировка хвостовой пульпы
    description: |
      Эксплуатация трубопроводов, насосных станций и распределительных
      систем хвостовой пульпы.

  BC-4460.20.20:
    name: Намыв хвостов
    description: |
      Оперативный намыв хвостов в хранилище в соответствии с планом намыва.

  BC-4460.20.30:
    name: Оборотное водоснабжение хвостохранилища
    description: |
      Возврат декантируемых и фильтрационных вод хвостохранилища для
      повторного использования.

  BC-4460.20.40:
    name: Операции фильтрованных хвостов и сухой укладки
    description: |
      Эксплуатация установок фильтрации хвостов и сухой укладки в отвалы.

  BC-4460.30:
    name: Надзор за хвостохранилищами и безопасность дамб
    description: |
      Наблюдение, управление и аварийная готовность хвостохранилищ в
      соответствии с GISTM и эквивалентными режимами безопасности дамб.

  BC-4460.30.10:
    name: Геотехнический инструментальный мониторинг
    description: |
      Мониторинг пьезометров, инклинометров и марок на сооружениях
      хвостохранилищ.

  BC-4460.30.20:
    name: Координация независимого ревью хвостохранилищ
    description: |
      Привлечение и координация независимых экспертных советов и инженеров
      ответственного надзора хвостохранилищ.

  BC-4460.30.30:
    name: Аварийная готовность хвостохранилищ
    description: |
      Планирование аварийной готовности и реагирования при сценариях
      прорыва дамбы хвостохранилища.

  BC-4460.30.40:
    name: Отчётность о соответствии стандартам хвостохранилищ
    description: |
      Отчётность о соответствии Глобальному отраслевому стандарту управления
      хвостами и требованиям эквивалентных регуляторов.

  BC-4460.40:
    name: Управление отвалами вскрышных пород
    description: |
      Характеристика и оперативное управление отвалами вскрышных пород,
      включая контроль кислотного и металлсодержащего дренажа.

  BC-4460.40.10:
    name: Геохимическая характеристика вскрышных пород
    description: |
      Геохимическая характеристика вскрышных пород для оценки потенциала
      кислотного и металлсодержащего дренажа.

  BC-4460.40.20:
    name: Операции отвалов вскрышных пород
    description: |
      Оперативное складирование вскрышных пород в инженерные отвалы и
      зоны обратной засыпки.

  BC-4460.40.30:
    name: Управление кислотным и металлсодержащим дренажем
    description: |
      Предотвращение, улавливание и очистка кислотного и металлсодержащего
      дренажа с отвалов и рудных складов.

  BC-4460.50:
    name: Управление шахтными водами
    description: |
      Водный баланс в масштабе всей площадки, очистка шахтных вод и
      соблюдение нормативов сброса.

  BC-4460.50.10:
    name: Оперативное управление водным балансом рудника
    description: |
      Оперативное управление водными балансами карьерных, подземных и
      технологических водных систем площадки.

  BC-4460.50.20:
    name: Очистка шахтных вод
    description: |
      Эксплуатация установок известкования, обратного осмоса и
      биологической очистки шахтных вод.

  BC-4460.50.30:
    name: Мониторинг соответствия нормативам сброса воды
    description: |
      Мониторинг и отчётность по сбросу воды в соответствии с условиями
      экологического разрешения.

  BC-4460.60:
    name: Управление опасными отходами горного производства
    description: |
      Управление отходами технологических реагентов, цианидсодержащими
      отходами и остатками тяжёлых металлов.

  BC-4460.60.10:
    name: Утилизация отработанных реагентов
    description: |
      Утилизация отработанных технологических реагентов и загрязнённой тары.

  BC-4460.60.20:
    name: Управление цианидсодержащими отходами
    description: |
      Детоксикация и управление цианидсодержащими хвостами и технологическими
      остатками.

  BC-4460.60.30:
    name: Управление отходами ртути и тяжёлых металлов
    description: |
      Управление остатками ртути, мышьяка и других тяжёлых металлов,
      образующихся при обогащении и рафинировании.


# Управление хвостами и горнодобывающими отходами (ru) — translations for L1-tailings-mine-waste-management.yaml
locale: ru
source: L1-tailings-mine-waste-management.yaml
entries:
  BC-4460:
    name: Управление хвостами и горнодобывающими отходами
    description: |
      Управление на протяжении всего жизненного цикла хвостохранилищами,
      отвалами вскрышных пород, шахтными водами и опасными горнодобывающими
      отходами в соответствии с Глобальным отраслевым стандартом управления
      хвостохранилищами (GISTM) и требованиями национального законодательства.

  BC-4460.10:
    name: Инженерное проектирование хвостохранилищ
    description: |
      Инженерное проектирование и жизненный цикл хвостохранилищ, включая
      выбор площадки, строительство дамб и проектирование с учётом
      требований ликвидации.
    in_scope:
      - Выбор площадки и концептуальное проектирование
      - Строительство и реконструкция дамб-ограждений
      - Планирование намыва хвостов и формирования пляжа
    out_of_scope:
      - Эксплуатационное складирование хвостов (BC-4460.20)
      - Мониторинг хвостохранилищ (BC-4460.30)

  BC-4460.10.10:
    name: Выбор площадки для хвостохранилища
    description: |
      Многокритериальный выбор площадки и анализ альтернатив для новых
      и расширяемых хвостохранилищ.

  BC-4460.10.20:
    name: Строительство дамбы-ограждения
    description: |
      Инженерное проектирование и контроль качества строительства
      ограждающих дамб хвостохранилища.

  BC-4460.10.30:
    name: Планирование намыва хвостов
    description: |
      Планирование последовательности намыва, формирования пляжа и
      положения прудка-отстойника.

  BC-4460.10.40:
    name: Проектирование хвостохранилища с учётом ликвидации
    description: |
      Проектирование хвостохранилища с ориентацией на долгосрочную
      ликвидацию и безопасный конечный рельеф.

  BC-4460.20:
    name: Эксплуатация хвостохранилища
    description: |
      Оперативная укладка хвостов в хвостохранилище, включая транспортировку
      пульпы, пастовых и отфильтрованных хвостов и возврат воды.

  BC-4460.20.10:
    name: Транспортировка пульпы хвостов
    description: |
      Эксплуатация трубопроводов, насосных станций и распределительных
      систем транспортировки хвостовой пульпы.

  BC-4460.20.20:
    name: Намыв хвостов
    description: |
      Оперативная укладка хвостов в хвостохранилище в соответствии
      с утверждённым планом намыва.

  BC-4460.20.30:
    name: Возврат осветлённой воды из хвостохранилища
    description: |
      Сбор и возврат декантата и фильтрационных вод хвостохранилища
      для повторного использования в производстве.

  BC-4460.20.40:
    name: Сухое складирование отфильтрованных хвостов
    description: |
      Эксплуатация установок фильтрации хвостов и укладка сухих хвостов
      в отвал.

  BC-4460.30:
    name: Мониторинг хвостохранилища и безопасность дамбы
    description: |
      Наблюдение, управление и аварийная готовность хвостохранилища
      в соответствии со стандартом GISTM и требованиями к безопасности
      гидротехнических сооружений.

  BC-4460.30.10:
    name: Мониторинг геотехнических приборов
    description: |
      Контроль показаний пьезометров, инклинометров и марок дамбы
      хвостохранилища.

  BC-4460.30.20:
    name: Организация независимого контроля хвостохранилища
    description: |
      Привлечение и координация независимых технических инспекционных
      комитетов и ответственных проектировщиков.

  BC-4460.30.30:
    name: Аварийная готовность хвостохранилища
    description: |
      Планирование мероприятий по аварийной готовности и ликвидации
      последствий в случае прорыва дамбы хвостохранилища.

  BC-4460.30.40:
    name: Отчётность о соответствии отраслевым стандартам
    description: |
      Подготовка отчётности о соответствии требованиям GISTM
      и надзорных органов.

  BC-4460.40:
    name: Управление вскрышными породами
    description: |
      Геохимическая характеристика и оперативное управление отвалами
      вскрышных пород, включая контроль кислотного и металлосодержащего
      дренажа.

  BC-4460.40.10:
    name: Геохимическая характеристика вскрышных пород
    description: |
      Геохимические испытания вскрышных пород на потенциал кислотного
      и металлосодержащего дренажа.

  BC-4460.40.20:
    name: Эксплуатация отвалов вскрышных пород
    description: |
      Оперативная отсыпка вскрышных пород в проектные отвалы и зоны
      закладки.

  BC-4460.40.30:
    name: Управление кислотным и металлосодержащим дренажом
    description: |
      Предотвращение, сбор и очистка кислотного и металлосодержащего
      дренажа со складов вскрышных пород и рудных складов.

  BC-4460.50:
    name: Управление шахтными водами
    description: |
      Общий водный баланс объекта, очистка и соответствие нормативам
      водосброса.

  BC-4460.50.10:
    name: Оперативный водный баланс рудника
    description: |
      Оперативное управление водным балансом карьера, подземных горных
      выработок и технологических водосистем.

  BC-4460.50.20:
    name: Очистка шахтных вод
    description: |
      Эксплуатация известкового, обратноосмотического и биологического
      методов очистки шахтных вод.

  BC-4460.50.30:
    name: Мониторинг соответствия нормативам водосброса
    description: |
      Мониторинг и подготовка отчётности по водосбросу в соответствии
      с условиями экологической лицензии.

  BC-4460.60:
    name: Управление опасными горнодобывающими отходами
    description: |
      Управление отходами реагентов, цианидсодержащими отходами и
      отходами с высоким содержанием тяжёлых металлов.

  BC-4460.60.10:
    name: Утилизация отработанных реагентов
    description: |
      Утилизация отработанных технологических реагентов и загрязнённой
      тары.

  BC-4460.60.20:
    name: Управление цианидсодержащими отходами
    description: |
      Детоксикация и управление цианидсодержащими хвостами и
      технологическими осадками.

  BC-4460.60.30:
    name: Управление отходами ртути и тяжёлых металлов
    description: |
      Управление отходами, содержащими ртуть, мышьяк и прочие тяжёлые
      металлы, от процессов переработки и рафинирования.


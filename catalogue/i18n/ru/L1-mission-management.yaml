entries:
  BC-1700:
    name: Управление выполнением задач
    description: |
      Планирование задач, управление и контроль, выполнение задач и разбор результатов.
  BC-1700.10:
    name: Управление планированием задач
    description: |
      Планирование целей задачи, маршрутов, целей поражения и сил.
  BC-1700.10.10:
    name: Определение целей задачи
    description: |
      Определение целей задачи и замысла командира.
  BC-1700.10.20:
    name: Планирование сил и средств
    description: |
      Планирование состава сил и распределения средств.
  BC-1700.10.30:
    name: Планирование маршрутов и целей поражения
    description: |
      Планирование маршрутов и выбор целей поражения.
  BC-1700.10.40:
    name: Оценка рисков задачи
    description: |
      Оперативная оценка рисков и подтверждение правил ведения боевых действий.
  BC-1700.10.50:
    name: Подготовка приказа на выполнение задачи
    description: |
      Подготовка приказов на выполнение задачи и документации по постановке задач.
  BC-1700.20:
    name: Управление операциями командования и управления
    description: |
      Операции командования и управления, ситуационная осведомлённость и поддержка принятия решений.
  BC-1700.20.10:
    name: Управление общей оперативной обстановкой
    description: |
      Ведение единой оперативной обстановки.
  BC-1700.20.20:
    name: Поддержка тактического принятия решений
    description: |
      Инструменты поддержки принятия тактических решений и рекомендации.
  BC-1700.20.30:
    name: Управление связью для КиУ
    description: |
      Сети связи для командования и управления и тактический обмен сообщениями.
  BC-1700.20.40:
    name: Межэшелонная координация
    description: |
      Координация на оперативном и тактическом уровнях.
  BC-1700.30:
    name: Управление выполнением задачи
    description: |
      Выполнение задачи в режиме реального времени, тактическое управление.
  BC-1700.30.10:
    name: Координация тактического выполнения
    description: |
      Координация тактического выполнения задачи в режиме реального времени.
  BC-1700.30.20:
    name: Динамическое перенацеливание
    description: |
      Динамическое перенацеливание и повторное планирование в ходе выполнения задачи.
  BC-1700.30.30:
    name: Оценка результатов задачи
    description: |
      Оценка результатов задачи в реальном времени и оценка ущерба от боевых действий.
  BC-1700.40:
    name: Управление учениями и моделированием задач
    description: |
      Учения по отработке задач и обучение на основе моделирования.
  BC-1700.40.10:
    name: Проектирование учений по отработке задач
    description: |
      Проектирование учений по отработке боевых задач.
  BC-1700.40.20:
    name: Живое, виртуальное и конструктивное моделирование
    description: |
      Управление средой моделирования LVC.
  BC-1700.40.30:
    name: Оценка результатов учений
    description: |
      Оценка результатов подразделений в ходе учений.
  BC-1700.50:
    name: Управление разбором задач и извлечёнными уроками
    description: |
      Разбор полётов, анализ после выполнения задачи и фиксация извлечённых уроков.
  BC-1700.50.10:
    name: Проведение разбора задачи
    description: |
      Проведение разборов задач и анализа действий после выполнения.
  BC-1700.50.20:
    name: Фиксация извлечённых уроков
    description: |
      Фиксация и систематизация извлечённых уроков.
  BC-1700.50.30:
    name: Отслеживание внедрения улучшений
    description: |
      Отслеживание внедрения выявленных улучшений.

# Управление поставщиками (ru) — translations for L1-supplier-management.yaml
locale: ru
source: L1-supplier-management.yaml
entries:
  BC-510:
    name: Управление поставщиками
    description: |
      Квалификация, управление результативностью, рисками и отношениями с поставщиками.
  BC-510.10:
    name: Управление подключением поставщиков
    description: |
      Квалификация, регистрация, due diligence.
  BC-510.10.10:
    name: Регистрация поставщика
    description: |
      Регистрация идентификационных данных, банковских реквизитов и налоговой информации поставщика.
  BC-510.10.20:
    name: Квалификация и предварительная проверка поставщика
    description: |
      Проверка компетенций, финансового состояния и соответствия требованиям новых поставщиков.
  BC-510.10.30:
    name: Due diligence поставщика
    description: |
      Проверка санкций, ABC, ESG и добросовестности поставщиков.
  BC-510.10.40:
    name: Управление мастер-данными поставщика
    description: |
      Поддержание мастер-данных поставщика и управление изменениями жизненного цикла.
  BC-510.20:
    name: Управление результативностью поставщика
    description: |
      Карты показателей поставщика, управление SLA.
  BC-510.20.10:
    name: Карты показателей и KPI поставщика
    description: |
      Определение и отслеживание карт показателей результативности поставщика.
  BC-510.20.20:
    name: Управление соглашениями об уровне обслуживания
    description: |
      Определение, мониторинг и обеспечение выполнения SLA.
  BC-510.20.30:
    name: Аудит и инспекция поставщика
    description: |
      Выездные аудиты и инспекции компетенций и качества поставщика.
  BC-510.20.40:
    name: Управление проблемами и CAPA поставщика
    description: |
      Регистрация проблем, корректирующие и предупреждающие действия с поставщиками.
  BC-510.30:
    name: Управление рисками поставщиков
    description: |
      Финансовые, ESG, геополитические и кибер-риски поставщиков.
  BC-510.30.10:
    name: Мониторинг финансового риска поставщика
    description: |
      Мониторинг финансового состояния и кредитного риска поставщика.
  BC-510.30.20:
    name: ESG и риск устойчивого развития поставщика
    description: |
      ESG, права человека и риск современного рабства в цепочке поставок.
  BC-510.30.30:
    name: Кибер и ИТ-риски поставщика
    description: |
      Оценка и мониторинг кибер и ИТ-рисков третьих сторон.
  BC-510.30.40:
    name: Геополитические и концентрационные риски поставщика
    description: |
      Геополитические, страновые и концентрационные риски в цепочке поставок.
  BC-510.40:
    name: Управление развитием поставщиков
    description: |
      Развитие компетенций, программы совершенствования поставщиков.
  BC-510.40.10:
    name: Развитие компетенций поставщика
    description: |
      Совместное развитие компетенций, обучение и передача технологий.
  BC-510.40.20:
    name: Программа поддержки разнообразия поставщиков
    description: |
      Выявление и развитие поставщиков из числа представителей меньшинств и малого бизнеса.
  BC-510.40.30:
    name: Программа инноваций поставщиков
    description: |
      Программы по привлечению инноваций и совместной разработке с поставщиками.
  BC-510.50:
    name: Управление отношениями с поставщиками
    description: |
      Стратегические отношения с поставщиками, управленческие форумы.
  BC-510.50.10:
    name: Стратегическая сегментация поставщиков
    description: |
      Сегментация поставщиков по критичности и ценности.
  BC-510.50.20:
    name: Взаимодействие с поставщиками на уровне руководства
    description: |
      Исполнительное спонсорство и стратегические встречи со стратегическими поставщиками.
  BC-510.50.30:
    name: Совместное бизнес-планирование
    description: |
      Совместное бизнес-планирование и создание ценности со стратегическими поставщиками.
  BC-510.50.40:
    name: Портал и коллаборация с поставщиками
    description: |
      Портал поставщика, самообслуживание и платформы для совместной работы.

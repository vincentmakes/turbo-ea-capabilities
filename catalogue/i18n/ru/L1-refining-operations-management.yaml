# Нефтеперерабатывающие операции (ru) — translations for L1-refining-operations-management.yaml
locale: ru
source: L1-refining-operations-management.yaml
entries:
  BC-3080:
    name: Нефтеперерабатывающие операции
    description: |
      Эксплуатация нефтеперерабатывающих заводов: атмосферная и вакуумная дистилляция, конверсионные процессы, облагораживание, смешение, экономика нефтеперерабатывающего завода, управление катализаторами и координация остановочного ремонта.
  BC-3080.10:
    name: Операции атмосферной перегонки нефти
    description: |
      Эксплуатация атмосферных и вакуумных колонн и переключение нефтяной смеси.
  BC-3080.10.10:
    name: Операции атмосферной перегонки
    description: |
      Эксплуатация атмосферных колонн перегонки нефти и предварительных отпарных секций.
  BC-3080.10.20:
    name: Операции вакуумной перегонки
    description: |
      Эксплуатация вакуумных колонн и систем верхнего погона.
  BC-3080.10.30:
    name: Переключение нефтяной смеси
    description: |
      Оперативное управление изменениями состава нефти и переключениями смеси.
  BC-3080.20:
    name: Операции конверсионных установок
    description: |
      Эксплуатация каталитического крекинга, гидрокрекинга, коксования и риформинга.
  BC-3080.20.10:
    name: Операции установки каталитического крекинга
    description: |
      Эксплуатация установок каталитического крекинга с псевдоожиженным слоем и регенераторов.
  BC-3080.20.20:
    name: Операции гидрокрекинга
    description: |
      Эксплуатация одноступенчатых и двухступенчатых гидрокрекинговых установок.
  BC-3080.20.30:
    name: Операции коксования
    description: |
      Эксплуатация установок замедленного коксования, флюид-коксования и флексикоксера.
  BC-3080.20.40:
    name: Операции риформинга
    description: |
      Эксплуатация каталитических риформеров для производства октана и ароматики.
  BC-3080.30:
    name: Операции гидроочистки и гидропереработки
    description: |
      Эксплуатация установок гидроочистки, извлечения серы и облагораживания продуктов.
  BC-3080.30.10:
    name: Операции гидроочистки
    description: |
      Эксплуатация установок гидроочистки нафты, дистиллятов и газойля.
  BC-3080.30.20:
    name: Операции установок извлечения серы и очистки хвостовых газов
    description: |
      Эксплуатация установок извлечения серы и очистки хвостовых газов.
  BC-3080.30.30:
    name: Операции облагораживания
    description: |
      Эксплуатация каустических и адсорбционных установок облагораживания продуктов.
  BC-3080.40:
    name: Операции смешения нефтепродуктов
    description: |
      Поточное и резервуарное смешение готовых нефтепродуктов до технических условий.
  BC-3080.40.10:
    name: Смешение бензина
    description: |
      Многокомпонентное смешение бензина по марочным характеристикам.
  BC-3080.40.20:
    name: Смешение дистиллятов
    description: |
      Смешение дизельного топлива и керосина, включая добавление биотоплива.
  BC-3080.40.30:
    name: Смешение судового топлива
    description: |
      Смешение морского бункерного топлива по спецификациям ISO 8217.
  BC-3080.40.40:
    name: Смешение по спецификации
    description: |
      Оптимизация спецификации в реальном времени и выдача сертификатов качества.
  BC-3080.50:
    name: Планирование и экономика нефтеперерабатывающего завода
    description: |
      Выбор нефти на основе линейного программирования, оптимизация маржи и отчётность о выходе продукции.
  BC-3080.50.10:
    name: Линейно-программное моделирование
    description: |
      Разработка и расчёт LP-моделей НПЗ для планирования и экономики.
  BC-3080.50.20:
    name: Экономика выбора нефти
    description: |
      Экономическая оценка кандидатных закупок нефти и вариантов смеси.
  BC-3080.50.30:
    name: Оптимизация маржи
    description: |
      Краткосрочная оптимизация операционной маржи и перепланирование.
  BC-3080.50.40:
    name: Отчётность о выходе продукции
    description: |
      Отчётность о фактическом выходе продукции по сравнению с планом и бенчмарком.
  BC-3080.60:
    name: Управление катализаторами и химикатами НПЗ
    description: |
      Управление жизненным циклом технологических катализаторов и запасами химикатов НПЗ.
  BC-3080.60.10:
    name: Управление жизненным циклом катализатора
    description: |
      Планирование загрузки катализатора, мониторинг в эксплуатации и замена.
  BC-3080.60.20:
    name: Координация регенерации катализатора
    description: |
      Координация кампаний по регенерации катализатора in situ и ex situ.
  BC-3080.60.30:
    name: Управление запасами химикатов НПЗ
    description: |
      Управление запасами и потреблением технологических химикатов.
  BC-3080.70:
    name: Координация остановочного ремонта
    description: |
      Координация объёма работ, графика и исполнения крупных остановочных ремонтов НПЗ.
  BC-3080.70.10:
    name: Управление объёмом работ при остановочном ремонте
    description: |
      Определение и заморозка объёма работ, включая процедуру оспаривания.
  BC-3080.70.20:
    name: Управление графиком остановочного ремонта
    description: |
      Детальное планирование и контроль хода остановочного ремонта.
  BC-3080.70.30:
    name: Координация остановки и пуска
    description: |
      Последовательная остановка, дегазация и координация пуска установок.

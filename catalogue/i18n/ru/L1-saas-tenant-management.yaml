# Управление арендаторами SaaS (ru) — translations for L1-saas-tenant-management.yaml
locale: ru
source: L1-saas-tenant-management.yaml
entries:
  BC-4230:
    name: Управление арендаторами SaaS
    description: |
      Подготовка, конфигурирование, изоляция, размещение по регионам, федерация идентичности и экспорт данных арендаторов в мультиарендном сервисе.
  BC-4230.10:
    name: Подготовка и жизненный цикл арендатора
    description: |
      Создание, приостановка, вывод из эксплуатации и миграция арендаторов в мультиарендном флоте.
  BC-4230.10.10:
    name: Подготовка арендатора
    description: |
      Создание новых арендаторов и выделение связанных ресурсов.
  BC-4230.10.20:
    name: Приостановка арендатора
    description: |
      Приостановка арендаторов за неоплату, нарушения или контрактные причины.
  BC-4230.10.30:
    name: Вывод арендатора из эксплуатации
    description: |
      Вывод арендаторов из эксплуатации, включая удаление или передачу данных по контракту.
  BC-4230.10.40:
    name: Миграция арендатора
    description: |
      Миграция арендаторов между кластерами, шардами или регионами.
  BC-4230.20:
    name: Управление конфигурацией арендатора
    description: |
      Конфигурирование функций, брендинга и ограничений на уровне арендатора сверх базовой конфигурации общего продукта.
  BC-4230.20.10:
    name: Конфигурирование функций на уровне арендатора
    description: |
      Конфигурирование опций функций на уровне арендатора.
  BC-4230.20.20:
    name: Управление брендингом арендатора
    description: |
      Брендинг на уровне арендатора: логотипы, цвета и пользовательские домены.
  BC-4230.20.30:
    name: Управление ограничениями арендатора
    description: |
      Конфигурирование ограничений на уровне арендатора: квоты и потолки частоты запросов.
  BC-4230.30:
    name: Управление изоляцией арендаторов
    description: |
      Механизмы поддержания логической и физической изоляции между арендаторами в данных, вычислениях и путях доступа.
  BC-4230.30.10:
    name: Изоляция данных арендатора
    description: |
      Изоляция данных арендатора через партиционирование, шифрование и ограничение области доступа.
  BC-4230.30.20:
    name: Изоляция вычислений арендатора
    description: |
      Изоляция рабочих нагрузок арендатора через выделенные или ограниченные вычислительные границы.
  BC-4230.30.30:
    name: Предотвращение межарендаторского доступа
    description: |
      Контроль и мониторинг, предотвращающие утечку данных и идентичности между арендаторами.
  BC-4230.40:
    name: Размещение данных и регионального присутствия
    description: |
      Назначение арендаторов в регионы, применение обязательств по размещению данных и управление политикой межрегиональной репликации.
  BC-4230.40.10:
    name: Назначение арендатора в регион
    description: |
      Назначение арендаторов в регионы в соответствии с контрактом и нормативными требованиями.
  BC-4230.40.20:
    name: Применение требований к размещению данных
    description: |
      Применение границ размещения данных в рантайме.
  BC-4230.40.30:
    name: Политика межрегиональной репликации
    description: |
      Политика межрегиональной репликации для обеспечения устойчивости и доступа.
  BC-4230.50:
    name: Федерация идентичности арендатора
    description: |
      Федерация провайдеров идентичности арендатора и жизненный цикл учётных записей пользователей арендатора через единый вход и SCIM.
  BC-4230.50.10:
    name: Конфигурирование единого входа арендатора
    description: |
      Конфигурирование единого входа между провайдерами идентичности арендатора и сервисом.
  BC-4230.50.20:
    name: Подготовка пользователей через SCIM
    description: |
      Жизненный цикл учётных записей пользователей арендатора через SCIM или аналогичные протоколы подготовки.
  BC-4230.50.30:
    name: Подключение провайдера идентичности арендатора
    description: |
      Подключение и валидация провайдеров идентичности арендатора.
  BC-4230.60:
    name: Управление резервным копированием и экспортом данных арендатора
    description: |
      Возможности экспорта, удаления и восстановления данных арендатора, предоставляемые арендаторам и администраторам.
  BC-4230.60.10:
    name: Экспорт данных арендатора
    description: |
      Экспорт данных арендатора в машиночитаемом формате по запросу или контракту.
  BC-4230.60.20:
    name: Удаление данных арендатора
    description: |
      Верифицируемое удаление данных арендатора при отмене подписки или запросе.
  BC-4230.60.30:
    name: Восстановление резервной копии арендатора
    description: |
      Восстановление данных арендатора из резервной копии по запросу арендатора или оператора.

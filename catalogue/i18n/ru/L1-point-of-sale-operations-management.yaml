# Управление операциями в торговых точках (ru) — translations for L1-point-of-sale-operations-management.yaml
locale: ru
source: L1-point-of-sale-operations-management.yaml
entries:
  BC-2320:
    name: Управление операциями в торговых точках
    description: |
      Клиентский транзакционный уровень розничной торговли — оформление продаж, приём платёжных
      средств, возвраты и возмещения, работа с наличными, настройка POS-систем и
      непрерывность работы кассового узла при сбоях.
  BC-2320.10:
    name: Управление транзакциями продаж
    description: |
      Регистрация потребительских транзакций, включая формирование корзины, сканирование,
      применение акций, расчёт налогов и выдачу цифровых чеков.
    in_scope:
      - Формирование корзины и сканирование товаров
      - Применение акций и программы лояльности на кассе
      - Расчёт налогов и выдача бумажных или цифровых чеков
    out_of_scope:
      - Разработка акций (BC-440.30)
      - Оформление заказов в интернет-магазине (BC-2330)
  BC-2320.10.10:
    name: Сканирование товаров и формирование корзины
    description: |
      Сканирование товаров и формирование корзины на кассе, включая весовые товары.
  BC-2320.10.20:
    name: Применение акций и программы лояльности
    description: |
      Применение акций, купонов и бонусов по программе лояльности в процессе продажи.
  BC-2320.10.30:
    name: Расчёт налога с продаж и НДС
    description: |
      Расчёт налога с продаж, НДС и юрисдикционных правил на кассе.
  BC-2320.10.40:
    name: Выдача чека и цифрового чека
    description: |
      Выдача бумажных и цифровых чеков, включая привязку к учётной записи покупателя.
  BC-2320.20:
    name: Управление приёмом платёжных средств
    description: |
      Приём платёжных средств на кассе, включая EMV, бесконтактную оплату, мобильные кошельки,
      подарочные карты и альтернативные способы оплаты, при соблюдении требований PCI-DSS.
  BC-2320.20.10:
    name: Приём карточных и бесконтактных платежей
    description: |
      Приём платежей EMV, бесконтактных и мобильных кошельков на розничных кассах.
  BC-2320.20.20:
    name: Приём наличных и чеков
    description: |
      Приём наличных, монет и чеков с обработкой номиналов.
  BC-2320.20.30:
    name: Приём подарочных карт и предоплаченных инструментов
    description: |
      Приём и выдача подарочных карт и предоплаченных платёжных инструментов.
  BC-2320.20.40:
    name: Приём альтернативных способов оплаты
    description: |
      Приём оплаты в рассрочку, по QR-коду и других альтернативных способов.
  BC-2320.20.50:
    name: Соблюдение требований PCI-DSS
    description: |
      Обработка данных держателей карт на кассе в соответствии с требованиями PCI-DSS.
  BC-2320.30:
    name: Управление возвратами, возмещениями и обменами
    description: |
      Обработка потребительских возвратов, возмещений и обменов товаров в магазине,
      включая возврат на первоначальный счёт, магазинный кредит и межканальные случаи.
    in_scope:
      - Потребительские возвраты и возмещения в магазине
      - Оформление магазинных кредитов и обменов
      - Приём онлайн-заказов к возврату в магазин
    out_of_scope:
      - Обратная логистика в распределительный центр (BC-520.40.40)
  BC-2320.30.10:
    name: Приём потребительских возвратов
    description: |
      Приём потребительских возвратов на кассе в соответствии с политикой возвратов.
  BC-2320.30.20:
    name: Выдача возмещений и магазинного кредита
    description: |
      Возврат средств на первоначальный счёт или выдача магазинного кредита.
  BC-2320.30.30:
    name: Обработка транзакций обмена
    description: |
      Обработка равнозначных и неравнозначных обменов с выверкой цен.
  BC-2320.30.40:
    name: Обработка межканальных возвратов
    description: |
      Приём в магазине заказов, оформленных в других каналах, для возврата.
  BC-2320.40:
    name: Работа с наличными и платёжными средствами
    description: |
      Процедуры работы с кассовым ящиком, сейфом, инкассацией и итоговой сверкой,
      обеспечивающие сохранность кассовой выручки.
  BC-2320.40.10:
    name: Управление кассовым ящиком
    description: |
      Открытие, контроль и сверка кассовых ящиков.
  BC-2320.40.20:
    name: Операции с магазинным сейфом
    description: |
      Управление сейфом, промежуточные изъятия и подготовка к инкассации.
  BC-2320.40.30:
    name: Итоговая сверка платёжных средств
    description: |
      Сверка всех платёжных средств с данными POS-системы в конце дня.
  BC-2320.40.40:
    name: Подготовка банковского депозита
    description: |
      Подготовка банковского депозита и передача инкассатору.
  BC-2320.50:
    name: Управление настройкой POS-систем
    description: |
      Настройка видов оплаты, налоговых правил, акционной логики, периферийного
      оборудования и параметров кассы по торговой сети.
  BC-2320.50.10:
    name: Настройка видов оплаты
    description: |
      Настройка принимаемых видов оплаты, лимитов и маршрутизации по магазину.
  BC-2320.50.20:
    name: Настройка налоговых правил
    description: |
      Настройка налоговых правил и юрисдикционных переопределений по магазину.
  BC-2320.50.30:
    name: Настройка акционного механизма
    description: |
      Настройка акционного движка POS и правил приоритизации предложений.
  BC-2320.50.40:
    name: Настройка периферийного оборудования POS
    description: |
      Настройка весов, сканеров, принтеров и PIN-падов на кассе.
  BC-2320.60:
    name: Устойчивость POS и работа в автономном режиме
    description: |
      Непрерывность работы кассового узла при сбоях связи или системы, включая
      автономный режим, отложенную передачу данных и управление очередью.
  BC-2320.60.10:
    name: Работа POS в автономном режиме
    description: |
      Продолжение работы POS-системы при потере связи.
  BC-2320.60.20:
    name: Отложенная передача транзакций
    description: |
      Сохранение и передача автономных транзакций при восстановлении связи.
  BC-2320.60.30:
    name: Управление очередью при сбое
    description: |
      Управление очередью покупателей при сбое кассовых систем.

# Бронирование (ru) — translations for L1-reservation-booking-management.yaml
locale: ru
source: L1-reservation-booking-management.yaml
entries:
  BC-4020:
    name: Бронирование и резервирование
    description: |
      Жизненный цикл бронирования, PNR и гостиничного фолио — оформление, изменение, отмена, групповые блоки, подтверждения, платежи и повторное бронирование при нарушении расписания — вне зависимости от канала оформления.
    in_scope:
      - Оформление бронирований — одиночных, многопассажирских и многокомпонентных маршрутов
      - Изменения бронирований, отмены и право на возврат
      - Групповые блоки, списки размещения, дата закрытия и выборка
      - Выдача подтверждений, ваучеров и электронных билетов
      - Платежи на уровне бронирования и урегулирование BSP/ARC
      - Переоформление при изменении расписания и IROPS
    out_of_scope:
      - Управление каналами и паритетом (BC-4010)
      - Движки ценообразования и управление доходностью (BC-4030)
      - Операционные решения по воздушным судам и экипажам (BC-4080.60)
  BC-4020.10:
    name: Оформление бронирования
    description: |
      Оформление бронирований по простым и сложным туристическим маршрутам из любого канала или агентства.
  BC-4020.10.10:
    name: Оформление единичного маршрута
    description: |
      Оформление бронирований с одним маршрутом: размещение в одном отеле или один перелёт.
  BC-4020.10.20:
    name: Оформление многопассажирского бронирования
    description: |
      Оформление многопассажирских или многогостевых бронирований с общими сегментами маршрута.
  BC-4020.10.30:
    name: Оформление многокомпонентного бронирования
    description: |
      Оформление многокомпонентных бронирований, включающих перелёты, отели, дополнительные услуги и наземное обслуживание.
  BC-4020.10.40:
    name: Оформление агентских бронирований
    description: |
      Оформление бронирований, сделанных розничными и корпоративными агентами от имени путешественников.
  BC-4020.20:
    name: Изменение и отмена бронирования
    description: |
      Добровольное изменение и отмена бронирований, включая сборы за изменение, право на возврат и операции переоформления.
  BC-4020.20.10:
    name: Управление изменением бронирования
    description: |
      Управление добровольными изменениями бронирований: дат, продуктов и данных путешественников.
  BC-4020.20.20:
    name: Управление отменой бронирования
    description: |
      Управление добровольными отменами и возвратом инвентаря в общий пул.
  BC-4020.20.30:
    name: Определение права на возврат и расчёт суммы
    description: |
      Определение права на возврат и расчёт возвращаемых сумм, включая штрафы.
  BC-4020.20.40:
    name: Добровольное переоформление
    description: |
      Обработка добровольного переоформления, включая доплату за разницу в тарифе и переоформление документов.
  BC-4020.30:
    name: Управление групповыми блоками
    description: |
      Управление групповыми блоками против договорного инвентаря — создание блоков, списки размещения, дата закрытия и отслеживание выборки.
    in_scope:
      - Жизненный цикл блока от договора до вымывания и финальной выборки
      - Ввод и обновление списков размещения
    out_of_scope:
      - Заключение групповых договоров продаж (BC-4110.10)
      - Исполнение банкетных заказов (BC-4110.30)
  BC-4020.30.10:
    name: Создание группового блока
    description: |
      Создание групповых блоков, отражающих договорной инвентарь и ценовые обязательства.
  BC-4020.30.20:
    name: Управление списком размещения
    description: |
      Управление списками размещения с привязкой отдельных путешественников к блочному инвентарю.
  BC-4020.30.30:
    name: Управление датой закрытия группы
    description: |
      Управление датами закрытия блока и возвратом невостребованного инвентаря в свободную продажу.
  BC-4020.30.40:
    name: Отслеживание групповой выборки
    description: |
      Отслеживание групповой выборки относительно договора для признания выручки и прогнозирования.
  BC-4020.40:
    name: Подтверждение и документирование бронирований
    description: |
      Выдача подтверждений бронирований, ваучеров, электронных билетов и маршрутных документов путешественникам и агентам.
  BC-4020.40.10:
    name: Формирование подтверждения бронирования
    description: |
      Формирование и рассылка подтверждений бронирований по всем каналам уведомления.
  BC-4020.40.20:
    name: Выдача ваучеров и документов
    description: |
      Выдача ваучеров и сервисных документов для компонентов отеля, тура и активностей.
  BC-4020.40.30:
    name: Выдача и переоформление электронных билетов
    description: |
      Выдача и переоформление авиаэлектронных билетов, включая обновление статуса купонов.
  BC-4020.40.40:
    name: Рассылка маршрутных документов
    description: |
      Рассылка маршрутных документов путешественникам, агентам и интегрированным системам управления поездками.
  BC-4020.50:
    name: Управление предварительными удержаниями и листом ожидания
    description: |
      Управление предварительными удержаниями, листами ожидания и конверсиями при ограниченной доступности или необходимости ожидания оплаты.
  BC-4020.50.10:
    name: Управление предварительными удержаниями
    description: |
      Управление предварительными удержаниями с контролируемыми сроками оплаты.
  BC-4020.50.20:
    name: Внесение в лист ожидания и расстановка приоритетов
    description: |
      Фиксация запросов в лист ожидания и правила приоритизации при появлении доступного инвентаря.
  BC-4020.50.30:
    name: Конверсия листа ожидания
    description: |
      Перевод запросов из листа ожидания в подтверждённые бронирования при освобождении инвентаря.
  BC-4020.50.40:
    name: Управление истечением удержания
    description: |
      Управление истечением удержаний и автоматическим возвратом инвентаря.
  BC-4020.60:
    name: Оплата и урегулирование бронирований
    description: |
      Платежи на уровне бронирования, депозиты, захват платежей и урегулирование с партнёрами, включая BSP и ARC.
  BC-4020.60.10:
    name: Депозиты и предавторизация бронирований
    description: |
      Получение депозитов и предавторизаций карт в соответствии с депозитными и гарантийными политиками.
  BC-4020.60.20:
    name: Захват платежей по бронированию
    description: |
      Фиксация платежей по платёжным инструментам на уровне бронирования в точках соответствия.
  BC-4020.60.30:
    name: Операции урегулирования BSP и ARC
    description: |
      Урегулирование агентских бронирований через BSP, ARC и аналогичные расчётные системы.
  BC-4020.60.40:
    name: Расчёт и выплата комиссий
    description: |
      Расчёт и выплата комиссий агентам и дистрибутивным партнёрам.
  BC-4020.70:
    name: Переоформление при нарушениях расписания
    description: |
      Переоформление бронирований, затронутых изменениями расписания, отменами и массовыми нарушениями, включая уведомления и определение права на компенсацию.
    in_scope:
      - Переоформление при изменении расписания
      - Массовое переоформление при нарушениях (IROPS, погодные условия, форс-мажор)
      - Право на компенсацию согласно перевозчику и потребительским нормам
    out_of_scope:
      - Операционные решения по воздушным судам, экипажам и диспетчеризации (BC-4080.60)
      - Восстановление туристических маршрутов (BC-4100.60)
  BC-4020.70.10:
    name: Переоформление при изменении расписания
    description: |
      Переоформление бронирований, затронутых опубликованными изменениями расписания, с предложением вариантов путешественникам.
  BC-4020.70.20:
    name: Массовое переоформление при нарушениях
    description: |
      Переоформление большого числа бронирований при погодных условиях, IROPS или форс-мажорных событиях.
  BC-4020.70.30:
    name: Определение права на компенсацию
    description: |
      Определение права на компенсацию согласно политике перевозчика и применимым нормам о правах пассажиров.
  BC-4020.70.40:
    name: Коммуникации при переоформлении
    description: |
      Исходящие уведомления затронутым путешественникам и агентам в ходе переоформления.
metadata:

# Вывод из эксплуатации и ликвидация скважин (ru) — translations for L1-decommissioning-abandonment-management.yaml
locale: ru
source: L1-decommissioning-abandonment-management.yaml
entries:
  BC-3120:
    name: Вывод из эксплуатации и ликвидация скважин
    description: |
      Управление объектами нефтяной отрасли на завершающей стадии: ликвидация скважин, демонтаж наземных сооружений, вывод из эксплуатации трубопроводов, восстановление территории, резервирование под ликвидационные обязательства и постпроектный мониторинг.
  BC-3120.10:
    name: Операции по ликвидации скважин
    description: |
      Проектирование и проведение кампаний по постоянной ликвидации скважин.
    in_scope:
      - Проектирование P&A и верификация барьеров
      - Операции по ликвидации скважин
      - Отрезка и извлечение устьевого оборудования и кондуктора
    out_of_scope:
      - Мониторинг целостности действующих скважин (BC-3020.50)
  BC-3120.10.10:
    name: Проектирование ликвидации скважин
    description: |
      Проектирование конфигураций постоянных барьеров при ликвидации скважин.
  BC-3120.10.20:
    name: Исполнение ликвидации скважин
    description: |
      Цементирование, установка пробок и верификация барьеров при ликвидации скважин.
  BC-3120.10.30:
    name: Отрезка и извлечение устьевого оборудования
    description: |
      Отрезка и извлечение устьевого оборудования, кондукторов и обсадных колонн.
  BC-3120.20:
    name: Демонтаж наземных сооружений
    description: |
      Вывод из эксплуатации, демонтаж и вывоз наземных и подводных установок добычи и транспортировки.
  BC-3120.20.10:
    name: Планирование демонтажа верхних строений
    description: |
      Проектирование демонтажа верхних строений и методологии обратного монтажа.
  BC-3120.20.20:
    name: Исполнение демонтажа верхних строений
    description: |
      Демонтаж верхних строений единым подъёмом, модульный или поэлементный.
  BC-3120.20.30:
    name: Подъём подводного оборудования
    description: |
      Подъём подводных фонтанных арматур, манифольдов, шлангокабелей и гибких трубопроводов.
  BC-3120.30:
    name: Вывод из эксплуатации трубопроводов
    description: |
      Вывод из эксплуатации, демонтаж или консервация избыточных трубопроводов.
  BC-3120.30.10:
    name: Промывка и очистка трубопровода
    description: |
      Промывка, очистка и инертизация трубопроводов перед выводом из эксплуатации.
  BC-3120.30.20:
    name: Выбор варианта вывода трубопровода из эксплуатации
    description: |
      Сравнительная оценка демонтажа трубопровода или консервации на месте.
  BC-3120.30.30:
    name: Исполнение вывода трубопровода из эксплуатации
    description: |
      Демонтаж, разрезка и подъём или консервация трубопроводов на месте.
  BC-3120.40:
    name: Рекультивация и восстановление территории
    description: |
      Рекультивация наземных и морских участков, ремедиация почвы и донных отложений, а также верификация очистки морского дна.
  BC-3120.40.10:
    name: Ремедиация почвы и донных отложений
    description: |
      Ремедиация загрязнённых почв и донных отложений на выведенных из эксплуатации объектах.
  BC-3120.40.20:
    name: Восстановление растительности
    description: |
      Восстановление растительного покрова и рельефа на наземных объектах.
  BC-3120.40.30:
    name: Очистка морского дна
    description: |
      Верификация очистки морского дна и подъём упавших предметов.
  BC-3120.50:
    name: Управление ликвидационными обязательствами
    description: |
      Оценка затрат, резервирование и предоставление обеспечения по ликвидационным обязательствам.
  BC-3120.50.10:
    name: Оценка затрат на ликвидацию
    description: |
      Вероятностная оценка затрат на демонтаж и ликвидацию.
  BC-3120.50.20:
    name: Резервирование под ликвидацию
    description: |
      Ведение резервов под ликвидацию в соответствии со стандартами бухгалтерского учёта.
  BC-3120.50.30:
    name: Предоставление обеспечения по ликвидации
    description: |
      Предоставление и продление обеспечения по ликвидации принимающим правительствам.
  BC-3120.60:
    name: Постпроектный мониторинг
    description: |
      Долгосрочный экологический мониторинг и отслеживание остаточных обязательств после закрытия объекта.
  BC-3120.60.10:
    name: Долгосрочный экологический мониторинг
    description: |
      Долгосрочный мониторинг подземных вод, почвы и морской среды.
  BC-3120.60.20:
    name: Отслеживание остаточных обязательств
    description: |
      Отслеживание остаточных обязательств и гарантий после закрытия объекта.

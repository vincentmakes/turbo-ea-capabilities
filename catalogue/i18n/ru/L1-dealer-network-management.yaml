# Управление дилерской сетью (ru) — translations for L1-dealer-network-management.yaml
locale: ru
source: L1-dealer-network-management.yaml
entries:
  BC-3430:
    name: Управление дилерской сетью
    description: |
      Управление сетью франшизных или авторизованных дилеров — назначения,
      соглашения, стандарты бренда и объектов, результативность, обучение
      и развитие сети в рамках Регламента ЕС о блочном освобождении и эквивалентных
      правил розничной торговли.
  BC-3430.10:
    name: Стратегия и планирование дилерской сети
    description: |
      Стратегическое планирование присутствия дилеров, форматов, охвата
      и стандартов бренда на рынках.
  BC-3430.10.10:
    name: Планирование охвата рынка и сети
    description: |
      Анализ пробелов в охвате рынка и определение целевого
      присутствия дилеров по территориям.
  BC-3430.10.20:
    name: Оптимизация присутствия дилеров
    description: |
      Оптимизация существующего присутствия дилеров, включая
      консолидацию, перемещение и расширение мощностей.
  BC-3430.10.30:
    name: Определение форматов и стандартов бренда
    description: |
      Определение форматов дилерских объектов, розничных концепций
      и стандартов фирменного стиля.
  BC-3430.20:
    name: Управление назначением и соглашениями дилеров
    description: |
      Подключение, заключение соглашений и прекращение деятельности дилеров,
      включая управление территориальными и брендовыми правами.
  BC-3430.20.10:
    name: Рассмотрение заявок дилеров
    description: |
      Приём и проверка заявок дилеров, включая финансовую,
      юридическую и операционную должную осмотрительность.
  BC-3430.20.20:
    name: Разработка и заключение дилерских соглашений
    description: |
      Разработка, согласование и заключение дилерских соглашений
      в соответствии с применимым антимонопольным законодательством.
  BC-3430.20.30:
    name: Управление территориальными и брендовыми правами
    description: |
      Распределение и управление территориальными и брендовыми правами,
      включая определение зон ответственности.
  BC-3430.20.40:
    name: Управление прекращением дилерской деятельности
    description: |
      Управление прекращением деятельности дилера, поэтапным выводом
      и переуступкой территории.
  BC-3430.30:
    name: Стандарты и соответствие дилеров
    description: |
      Поддержание и аудит стандартов бренда, объектов и операций
      по всей дилерской сети.
  BC-3430.30.10:
    name: Управление стандартами бренда и объектов
    description: |
      Поддержание стандартов бренда, объектов и клиентского
      опыта для соответствия дилеров.
  BC-3430.30.20:
    name: Аудит соответствия дилеров
    description: |
      Периодический аудит дилеров на соответствие стандартам
      бренда, продаж и послепродажного обслуживания.
  BC-3430.30.30:
    name: Управление корректирующими действиями
    description: |
      Управление планами корректирующих действий для несоответствующих
      дилеров до их закрытия.
  BC-3430.40:
    name: Управление эффективностью дилеров
    description: |
      Измерение и повышение коммерческой и операционной эффективности
      дилеров через системы показателей и поощрительные программы.
  BC-3430.40.10:
    name: Управление системой показателей дилеров
    description: |
      Определение и функционирование системы показателей дилеров
      по продажам, послепродажному обслуживанию и клиентскому опыту.
  BC-3430.40.20:
    name: Обзоры продаж и послепродажного обслуживания
    description: |
      Периодические обзоры результативности дилеров и совместное
      бизнес-планирование с региональными менеджерами.
  BC-3430.40.30:
    name: Управление поощрительными программами дилеров
    description: |
      Разработка и функционирование бонусных, маржинальных и
      поощрительных программ для дилеров.
  BC-3430.50:
    name: Финансирование дилеров и управление флорпланом
    description: |
      Финансирование оптового запаса дилеров и управление дебиторской
      задолженностью и программами поддержки оборотного капитала.
    in_scope:
      - Администрирование оптового флорплана
      - Мониторинг кредитных лимитов и рисков дилеров
      - Поддержка оборотного капитала дилеров от OEM
    out_of_scope:
      - Розничное кредитование через кэптивный автофинанс (в рамках корпоративного кредитования)
  BC-3430.50.10:
    name: Администрирование оптового флорплана
    description: |
      Администрирование оптового флорпланового финансирования
      для запасов транспортных средств дилеров.
  BC-3430.50.20:
    name: Управление кредитом и дебиторской задолженностью дилеров
    description: |
      Управление кредитными лимитами, просроченной дебиторской
      задолженностью и взысканием задолженностей дилеров.
  BC-3430.50.30:
    name: Поддержка оборотного капитала дилеров
    description: |
      Поддержка оборотного капитала дилеров от OEM, финансирование
      запасных частей и сезонные программы помощи.
  BC-3430.60:
    name: Обучение и сертификация дилеров
    description: |
      Обучение и сертификация персонала дилеров в области продаж,
      послепродажного обслуживания и управления.
  BC-3430.60.10:
    name: Сертификация специалистов по продажам дилера
    description: |
      Сертификация консультантов по продажам дилера по продукту,
      бренду и стандартам клиентского опыта.
  BC-3430.60.20:
    name: Сертификация сервисных техников дилера
    description: |
      Сертификация сервисных техников дилера по диагностике,
      ремонту и процедурам EV/HV.
  BC-3430.60.30:
    name: Развитие менеджмента дилеров
    description: |
      Программы развития лидерства и менеджмента для
      руководителей дилерских предприятий и начальников отделов.
  BC-3430.70:
    name: Операции систем и данных дилеров
    description: |
      Функционирование систем, ориентированных на дилеров, и потоков данных,
      связывающих дилеров с коммерческими, техническими и отчётными платформами OEM.
  BC-3430.70.10:
    name: Интеграция систем управления дилерами
    description: |
      Интеграция систем управления дилерами с опорными системами
      OEM по заказам, запасным частям, гарантии и отчётности.
  BC-3430.70.20:
    name: Управление основными данными дилеров
    description: |
      Ведение основных данных дилеров, включая торговые точки,
      контакты и полномочия.
  BC-3430.70.30:
    name: Отчётность и аналитика дилеров
    description: |
      Отчётность, бенчмаркинг и аналитика на уровне дилера
      по коммерческим и операционным показателям.

# Управление выполнением авиарейсов (ru) — translations for L1-airline-flight-operations-management.yaml
locale: ru
source: L1-airline-flight-operations-management.yaml
entries:
  BC-4080:
    name: Управление выполнением авиарейсов
    description: |
      Планирование расписания, маршрутизация воздушных судов, планирование экипажей, диспетчеризация, управление гейтами и оборотом, устранение последствий IROPS и отчётность по производительности и безопасности полётов для авиакомпаний.
    in_scope:
      - Планирование расписания полётов, координация слотов и пересадочные узлы
      - Маршрутизация воздушных судов, назначение хвостовых номеров и ведение MEL
      - Формирование экипажных пар, составление ростеров и соблюдение FTL
      - Диспетчеризация рейсов и управление операциями
      - Распределение гейтов и координация оборота
      - Операционные решения при нарушениях (IROPS) по воздушным судам и экипажам
      - Отчётность по производительности полётов и событиям безопасности
    out_of_scope:
      - Управление воздушным движением (BC-1700)
      - Переоформление пассажиров на уровне бронирований (BC-4020.70)
      - Обработка грузовых рейсов (BC-3270)
  BC-4080.10:
    name: Планирование расписания полётов
    description: |
      Составление и публикация расписания авиакомпании, охватывающего сеть маршрутов, слоты и пересадочные узлы.
  BC-4080.10.10:
    name: Определение сети маршрутов
    description: |
      Определение сети и маршрутного плана с учётом спроса и планов флота.
  BC-4080.10.20:
    name: Координация слотов и аэропортов
    description: |
      Координация аэропортовых слотов и ограничений, включая планирование по стандартам IATA WSG.
  BC-4080.10.30:
    name: Составление и публикация расписания
    description: |
      Формирование опубликованного расписания и публикация файла SSIM для дистрибьюторов.
  BC-4080.10.40:
    name: Оптимизация пересадочных узлов
    description: |
      Оптимизация пересадочных узлов в хабах и минимального времени пересадки.
  BC-4080.20:
    name: Маршрутизация и назначение бортовых номеров
    description: |
      Формирование чередований воздушных судов, назначение хвостовых номеров, операции обмена, координация слотов ТО и ведение MEL.
  BC-4080.20.10:
    name: Планирование чередований флота
    description: |
      Планирование чередований флота по сети с балансированием налёта часов и циклов.
  BC-4080.20.20:
    name: Назначение хвостовых номеров и обмены
    description: |
      Назначение конкретных бортов на рейсы и выполнение тактических обменов.
  BC-4080.20.30:
    name: Координация слотов технического обслуживания ВС
    description: |
      Координация слотов ТО и перегонных рейсов с расписанием.
  BC-4080.20.40:
    name: Ведение перечня минимального оборудования (MEL)
    description: |
      Отслеживание отсрочек по MEL относительно сроков действия и операционного влияния.
  BC-4080.30:
    name: Планирование и составление ростеров экипажей
    description: |
      Планирование кабинных и бортовых экипажей: формирование пар, торги на предпочтения, отслеживание квалификации и соблюдение FTL.
  BC-4080.30.10:
    name: Формирование экипажных пар
    description: |
      Формирование экипажных пар по расписанию с соблюдением норм лётного законодательства.
  BC-4080.30.20:
    name: Торги на предпочтения и составление ростеров
    description: |
      Управление процессом торгов и составление ростеров для лётного и кабинного экипажей.
  BC-4080.30.30:
    name: Отслеживание квалификации и допусков экипажей
    description: |
      Отслеживание квалификации, действительности и допусков членов экипажей.
  BC-4080.30.40:
    name: Соблюдение норм рабочего и лётного времени
    description: |
      Соблюдение норм FTL и рабочего времени на этапах планирования и выполнения.
  BC-4080.40:
    name: Диспетчеризация рейсов и управление операциями
    description: |
      Подготовка операционных планов полётов, решения по заправке, брифинги по метеообстановке и NOTAM, принятие решений в центре управления операциями.
  BC-4080.40.10:
    name: Подготовка плана полёта
    description: |
      Составление операционных планов полётов с маршрутом, эшелоном и расчётным временем.
  BC-4080.40.20:
    name: Расчёт операционного количества топлива
    description: |
      Расчёт операционного запаса топлива, включая резервы, непредвиденные расходы и дополнительные запасы.
  BC-4080.40.30:
    name: Брифинг по метеообстановке и NOTAM
    description: |
      Подготовка и доведение до экипажей и диспетчеров брифингов по метеообстановке и NOTAM.
  BC-4080.40.40:
    name: Принятие решений в центре управления операциями
    description: |
      Принятие решений в ЦУО при задержках, вынужденных посадках и вариантах восстановления.
  BC-4080.50:
    name: Операции на гейтах и при обороте ВС
    description: |
      Планирование гейтов и координация оборота в аэропортах, включая отталкивание и управление задержками на перроне.
  BC-4080.50.10:
    name: Распределение гейтов и стоянок
    description: |
      Распределение гейтов и стоянок по операционному дню.
  BC-4080.50.20:
    name: Координация оборота
    description: |
      Оперативная координация оборота: кейтеринг, заправка и посадка.
  BC-4080.50.30:
    name: Операции отталкивания и выпуска
    description: |
      Отталкивание, выпуск и координация руления со стоянки.
  BC-4080.50.40:
    name: Управление задержками на перроне
    description: |
      Управление задержками на перроне в соответствии с нормативными ограничениями и обязательствами по обслуживанию пассажиров.
  BC-4080.60:
    name: Управление нарушениями расписания и IROPS
    description: |
      Принятие операционных решений при нарушениях расписания: вынужденные посадки, массовые отмены, восстановление экипажей и координация переоформления пассажиров.
    in_scope:
      - Принятие решений о вынужденных посадках и отменах
      - Восстановление экипажей при нарушениях и назначение резервных
      - Координация с переоформлением пассажиров (BC-4020.70)
    out_of_scope:
      - Переоформление пассажиров и определение компенсации (BC-4020.70)
  BC-4080.60.10:
    name: Принятие решений о вынужденной посадке
    description: |
      Операции по принятию решений и выполнению вынужденных посадок в рейсе и до вылета.
  BC-4080.60.20:
    name: Операции восстановления при массовых отменах
    description: |
      Восстановительные операции при массовых отменах: воздушные суда, экипажи и слоты.
  BC-4080.60.30:
    name: Восстановление экипажей при нарушениях
    description: |
      Восстановление ростеров экипажей при нарушениях, включая назначение резервных.
  BC-4080.60.40:
    name: Координация переоформления пассажиров
    description: |
      Координация с командами переоформления пассажиров по вариантам и приоритетам восстановления.
  BC-4080.70:
    name: Отчётность по производительности рейсов и безопасности
    description: |
      Отчётность по производительности рейсов, KPI пунктуальности, авиационной безопасности и оперативным данным.
  BC-4080.70.10:
    name: Отчётность по пунктуальности
    description: |
      Отчётность по пунктуальности и кодам задержек по сети.
  BC-4080.70.20:
    name: Регистрация авиационных донесений о безопасности
    description: |
      Сбор и первичная обработка авиационных донесений о безопасности от экипажей и персонала.
  BC-4080.70.30:
    name: Поддержка расследований авиационной безопасности
    description: |
      Поддержка расследований авиационной безопасности, сбор данных и реализация корректирующих мер.
  BC-4080.70.40:
    name: Фиды аналитики полётных данных
    description: |
      Передача аналитики полётных данных в программы анализа безопасности и операций.

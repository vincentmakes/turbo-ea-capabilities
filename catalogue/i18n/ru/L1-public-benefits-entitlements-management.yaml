# Государственные льготы и социальные выплаты (ru) — translations for L1-public-benefits-entitlements-management.yaml
locale: ru
source: L1-public-benefits-entitlements-management.yaml
entries:
  BC-3230:
    name: Государственные льготы и социальные выплаты
    description: |
      Разработка, определение права на получение, расчёт, выплата, мониторинг и взыскание социальных пособий и установленных законом льгот, включая пенсии, пособия по безработице, инвалидности, семейные пособия и продовольственную помощь.
  BC-3230.10:
    name: Проектирование и настройка льготных программ
    description: |
      Настройка установленных законом льготных программ, включая правила права на получение, формулы расчёта выплат и операционные параметры.
    in_scope:
      - Настройка правил права на получение
      - Настройка формул расчёта и ставок выплат
      - Управление параметрами программы и индексацией
    out_of_scope:
      - Разработка основного законодательства (относится к управлению законодательной и нормативной деятельностью)
  BC-3230.10.10:
    name: Настройка правил права на получение
    description: |
      Кодификация установленных законом правил права на получение в машиноисполняемой форме.
  BC-3230.10.20:
    name: Настройка формул и ставок выплат
    description: |
      Настройка формул расчёта выплат, ставок и предельных значений.
  BC-3230.10.30:
    name: Индексация параметров программы
    description: |
      Периодическая индексация и корректировка параметров программы с учётом инфляции или изменений заработной платы.
  BC-3230.20:
    name: Определение права на получение
    description: |
      Определение права заявителей на получение льгот, включая проверку нуждаемости, категориальное право и состав домохозяйства.
  BC-3230.20.10:
    name: Приём заявлений
    description: |
      Приём заявлений на получение льгот по различным каналам, включая цифровые, очные и с помощником.
  BC-3230.20.20:
    name: Проверка нуждаемости
    description: |
      Проверка доходов, активов и условий проживания домохозяйства на соответствие пороговым значениям программы.
  BC-3230.20.30:
    name: Верификация категориального права
    description: |
      Верификация категориальных оснований, таких как возраст, инвалидность или семейное положение.
  BC-3230.20.40:
    name: Решение о праве на получение и уведомление
    description: |
      Фиксация решения и уведомление заявителей о результатах определения права на получение.
  BC-3230.30:
    name: Расчёт и назначение выплат
    description: |
      Расчёт размеров выплат, оценка страхового стажа и выдача назначений на получение льгот.
  BC-3230.30.10:
    name: Оценка страхового стажа
    description: |
      Оценка страхового стажа для страховых льгот, таких как пенсии и пособия по безработице.
  BC-3230.30.20:
    name: Расчёт размера выплат
    description: |
      Расчёт размеров выплат, включая доплаты, вычеты и поэтапное снижение.
  BC-3230.30.30:
    name: Оформление назначения
    description: |
      Оформление и фиксация назначений на получение льгот и уведомлений о назначении.
  BC-3230.40:
    name: Операции по выплате льгот
    description: |
      Периодическая выплата льгот через различные платёжные каналы и сверка с назначениями.
  BC-3230.40.10:
    name: Управление графиком выплат
    description: |
      Ведение графиков выплат, периодичности и производственных календарей.
  BC-3230.40.20:
    name: Исполнение платежей
    description: |
      Исполнение платёжных циклов через банковские, предоплаченные карты, чековые и натуральные каналы.
  BC-3230.40.30:
    name: Сверка выплат
    description: |
      Сверка выплат с назначениями и банковскими подтверждениями.
  BC-3230.40.40:
    name: Распределение натуральных льгот
    description: |
      Распределение натуральных льгот, таких как талоны на продовольствие и электронные трансферы льгот.
  BC-3230.50:
    name: Мониторинг получателей и непрерывное определение права
    description: |
      Текущий мониторинг обстоятельств получателей и периодическое переопределение продолжающегося права.
  BC-3230.50.10:
    name: Фиксация изменений обстоятельств
    description: |
      Фиксация и обработка сообщаемых и выявляемых изменений обстоятельств получателей.
  BC-3230.50.20:
    name: Периодическое переопределение права
    description: |
      Периодическое переопределение права и размера выплат.
  BC-3230.50.30:
    name: Мониторинг соответствия условиям
    description: |
      Мониторинг соответствия получателей условиям, таким как поиск работы или прохождение обучения.
  BC-3230.60:
    name: Управление переплатами и взысканием
    description: |
      Выявление, расчёт и взыскание переплат и неправомерных выплат льгот.
  BC-3230.60.10:
    name: Выявление переплат
    description: |
      Выявление переплат методами сверки, сопоставления данных и проверок.
  BC-3230.60.20:
    name: Разработка планов взыскания
    description: |
      Разработка планов взыскания, включая рассрочки, удержания и списания.
  BC-3230.60.30:
    name: Операции по взысканию задолженности
    description: |
      Взыскание задолженностей путём удержаний, судебного иска и зачётов.
  BC-3230.70:
    name: Расследование мошенничества с льготами
    description: |
      Выявление, расследование и рассмотрение дел о мошенничестве с льготами.
  BC-3230.70.10:
    name: Выявление риска мошенничества
    description: |
      Риск-ориентированное выявление подозрительного мошенничества с использованием аналитики и разведывательных данных.
  BC-3230.70.20:
    name: Расследование дел о мошенничестве
    description: |
      Расследование подозрительных случаев мошенничества, включая сбор доказательств и опросы.
  BC-3230.70.30:
    name: Санкции за мошенничество и направление в суд
    description: |
      Применение санкций за подтверждённое мошенничество и передача материалов в суд при необходимости.

# Программа создания транспортного средства (ru) — translations for L1-vehicle-programme-management.yaml
locale: ru
source: L1-vehicle-programme-management.yaml
entries:
  BC-3410:
    name: Программа создания транспортного средства
    description: |
      Многолетнее управление программой создания транспортного средства: концепция,
      стадийные ворота, стратегия платформы и вариантов, а также контроль стоимости,
      массы и сроков от начала до окончания производства.
  BC-3410.10:
    name: Определение и инициация программы
    description: |
      Определение концепции, бизнес-кейс, устав программы и разрешение на
      реализацию новых программ и производных транспортных средств.
    in_scope:
      - Утверждение устава программы и бизнес-кейса
      - Определение концепции и позиционирования транспортного средства
      - Согласование стратегии платформы и переноса компонентов
    out_of_scope:
      - Детальная разработка подсистем транспортного средства (BC-3400)
      - Корпоративное управление портфелем проектов (BC-900)
  BC-3410.10.10:
    name: Устав программы и бизнес-кейс
    description: |
      Устав программы готовности к утверждению, финансовый бизнес-кейс
      и разрешение на инвестиции.
  BC-3410.10.20:
    name: Определение концепции транспортного средства
    description: |
      Концепция транспортного средства, позиционирование, определение потребительского
      пакета и высокоуровневые целевые параметры.
  BC-3410.10.30:
    name: Согласование стратегии платформы
    description: |
      Согласование программ с дорожными картами платформ, решениями о переносе
      компонентов и стратегиями общих модулей.
  BC-3410.10.40:
    name: Стадийные ворота утверждения программы
    description: |
      Начальные ворота утверждения программы, включая бюджет, сроки
      и обязательства по ресурсам.
  BC-3410.20:
    name: Стадийное управление программой
    description: |
      Функционирование стадийной модели программы транспортного средства с
      рассмотрением вех, обеспечением результатов и контролем рисков и проблем.
  BC-3410.20.10:
    name: Планирование вех программы
    description: |
      Планирование вех программы от PT и PVS до SOP
      и окончания производства.
  BC-3410.20.20:
    name: Проведение ворот проверки
    description: |
      Проведение стадийных проверок, включая оценку результатов
      и решения «пройти / задержать».
  BC-3410.20.30:
    name: Управление рисками и проблемами программы
    description: |
      Выявление, эскалация и снижение рисков и критических проблем программы.
  BC-3410.20.40:
    name: Оценка зрелости программы
    description: |
      Оценка зрелости программы по критериям готовности разработки,
      производства и поставщиков.
  BC-3410.30:
    name: Управление стоимостью программы
    description: |
      Установление и отслеживание целевых показателей стоимости программы
      по спецификации материалов, оснастке, инвестициям и резервам на гарантию.
  BC-3410.30.10:
    name: Установление целевых показателей стоимости
    description: |
      Установление целевых показателей стоимости программы, включая оболочки
      BoM, переработки и инвестиций.
  BC-3410.30.20:
    name: Отслеживание стоимости BoM
    description: |
      Отслеживание стоимости BoM транспортного средства, коммерческих
      предложений поставщиков и решений по содержанию.
  BC-3410.30.30:
    name: Прогнозирование переменных и постоянных затрат
    description: |
      Прогнозирование переменных и постоянных затрат программы
      на этапах запуска и стабильного производства.
  BC-3410.30.40:
    name: Отслеживание инициатив снижения затрат
    description: |
      Отслеживание инициатив снижения затрат, разработки ценности
      и их реализации относительно целевых показателей.
  BC-3410.40:
    name: Отслеживание массы и параметров программы
    description: |
      Отслеживание массы, характеристик и других параметров транспортного
      средства относительно целевых показателей и разрешение компромиссов.
  BC-3410.40.10:
    name: Отслеживание массы транспортного средства
    description: |
      Отслеживание накопления массы по системам и резервов
      относительно весовых целевых показателей программы.
  BC-3410.40.20:
    name: Отслеживание параметрических показателей
    description: |
      Отслеживание параметрических показателей и резервов программы
      относительно целевых значений.
  BC-3410.40.30:
    name: Отчётность о соответствии целевым показателям
    description: |
      Отчётность о статусе соответствия целевым показателям для
      руководства программой и управляющих комитетов.
  BC-3410.50:
    name: Планирование вариантов и производных
    description: |
      Планирование вариантов комплектации, оснащения, региональных
      и специальных серий на протяжении жизненного цикла программы.
  BC-3410.50.10:
    name: Планирование комплектаций и вариантов оснащения
    description: |
      Планирование уровней комплектации, опций и стандартного оснащения
      по рынкам и сегментам.
  BC-3410.50.20:
    name: Планирование региональных производных
    description: |
      Планирование региональных производных с учётом рыночных кузовов,
      трансмиссий и содержания функций.
  BC-3410.50.30:
    name: Планирование специальных серий
    description: |
      Планирование специальных изданий, ограниченных серий и
      производных на базе автоспорта.
  BC-3410.60:
    name: Координация запуска и завершения производства
    description: |
      Координация готовности к SOP, наращивания производства и вывода
      при EOP на заводах и в сетях поставщиков.
  BC-3410.60.10:
    name: Координация готовности к SOP
    description: |
      Координация критериев готовности разработки, поставщиков, завода
      и послепродажного обслуживания к SOP.
  BC-3410.60.20:
    name: Планирование наращивания производства
    description: |
      Планирование кривых наращивания производства, выпуска предсерийных
      партий и объёмов раннего запуска.
  BC-3410.60.30:
    name: Координация вывода EOP
    description: |
      Координация сроков окончания производства, последних закупок
      и планов дораспродажи остатков.
  BC-3410.70:
    name: Отчётность о результатах программы
    description: |
      Отчётность о статусе программы, решениях и результатах после запуска
      для управляющих комитетов и исполнительного руководства.
  BC-3410.70.10:
    name: Периодическая отчётность о статусе программы
    description: |
      Периодическая отчётность о статусе программы по стоимости,
      срокам, качеству и рискам.
  BC-3410.70.20:
    name: Поддержка управляющего комитета программы
    description: |
      Подготовка и сопровождение заседаний управляющего комитета
      и обзоров исполнительного руководства.
  BC-3410.70.30:
    name: Послезапускной обзор программы
    description: |
      Послезапускные обзоры с фиксацией уроков и передачей
      их в инициацию последующих программ.

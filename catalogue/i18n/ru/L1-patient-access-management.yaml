# Доступ пациентов к медицинской помощи (ru) — translations for L1-patient-access-management.yaml
locale: ru
source: L1-patient-access-management.yaml
entries:
  BC-2800:
    name: Доступ пациентов к медицинской помощи
    description: |
      Предварительный приём, планирование, регистрация, верификация страховых прав, финансовое консультирование, госпитализация, переводы и выписки в стационарных, амбулаторных, поликлинических и экстренных условиях.
  BC-2800.10:
    name: Управление расписанием и записью на приём
    description: |
      Планирование врачебных ресурсов, запись на приём, управление листом ожидания и проактивные напоминания для оптимизации загрузки.
  BC-2800.10.10:
    name: Оптимизация расписания врача
    description: |
      Оптимизация расписания врачей, кабинетов и оборудования по шаблонам и наложениям.
  BC-2800.10.20:
    name: Запись на приём
    description: |
      Запись на приём по инициативе пациента или направляющего врача по различным каналам.
  BC-2800.10.30:
    name: Управление листом ожидания
    description: |
      Ведение и приоритизация листа ожидания на приёмы и процедуры.
  BC-2800.10.40:
    name: Напоминания о приёме и снижение неявок
    description: |
      Многоканальные напоминания, подтверждения и меры по снижению неявок.
  BC-2800.20:
    name: Управление регистрацией пациентов
    description: |
      Сбор и ведение демографических, идентификационных данных и данных о согласии, необходимых для регистрации пациента на приём.
  BC-2800.20.10:
    name: Сбор демографических данных
    description: |
      Сбор демографических данных пациента при регистрации.
  BC-2800.20.20:
    name: Верификация личности пациента
    description: |
      Верификация личности пациента с использованием документов и биометрических проверок.
  BC-2800.20.30:
    name: Получение согласий и разрешений
    description: |
      Получение согласий на лечение, финансовых и информационных разрешений.
  BC-2800.20.40:
    name: Управление идентификаторами пациента
    description: |
      Присвоение и ведение номеров медицинских карт и корпоративных идентификаторов пациента.
  BC-2800.30:
    name: Верификация прав и льгот
    description: |
      Верификация страхового покрытия, льгот и требований к авторизации до оказания услуг.
  BC-2800.30.10:
    name: Верификация страхового покрытия
    description: |
      Проверка наличия активного страхового покрытия и деталей полиса.
  BC-2800.30.20:
    name: Определение льгот
    description: |
      Определение льгот пациента, франшизы, доплат и лимитов покрытия.
  BC-2800.30.30:
    name: Управление предварительной авторизацией
    description: |
      Подача, отслеживание и сопровождение запросов на предварительную авторизацию у страховщиков.
  BC-2800.30.40:
    name: Запрос прав в режиме реального времени
    description: |
      Электронный запрос прав и льгот в реальном времени через системы страховщиков.
  BC-2800.40:
    name: Финансовое консультирование и оценка стоимости
    description: |
      Финансовое консультирование пациентов, оценка расходов из кармана и зачисление в программы финансовой помощи или схемы самостоятельной оплаты.
  BC-2800.40.10:
    name: Оценка финансовых возможностей пациента
    description: |
      Оценка финансовых возможностей пациента и вариантов оплаты.
  BC-2800.40.20:
    name: Оценка стоимости услуг
    description: |
      Формирование оценок расходов из кармана и общей стоимости запланированных услуг.
  BC-2800.40.30:
    name: Благотворительная помощь и финансовое содействие
    description: |
      Определение права на благотворительную медицинскую помощь и зачисление в программы финансового содействия.
  BC-2800.40.40:
    name: Оформление самостоятельной оплаты
    description: |
      Оформление договорённостей о самостоятельной оплате, предоплат и рассрочек.
  BC-2800.50:
    name: Управление госпитализацией, переводами и выписками
    description: |
      Оперативное управление плановой госпитализацией, межучрежденческими переводами, распределением коек и фиксацией диспозиции при выписке.
  BC-2800.50.10:
    name: Плановая и экстренная госпитализация
    description: |
      Госпитализация пациентов из плановых и внеплановых источников.
  BC-2800.50.20:
    name: Межучрежденческий перевод
    description: |
      Координация переводов пациентов между учреждениями и уровнями помощи.
  BC-2800.50.30:
    name: Распределение коек
    description: |
      Назначение и перераспределение стационарных коек с учётом тяжести состояния, изоляции и мощностей.
  BC-2800.50.40:
    name: Фиксация диспозиции при выписке
    description: |
      Фиксация диспозиции при выписке, постстационарного устройства и пункта назначения перевода.
  BC-2800.60:
    name: Управление предсервисной готовностью
    description: |
      Предпроцедурный допуск, верификация документации и подготовительные действия пациента до оказания услуг.
  BC-2800.60.10:
    name: Предпроцедурный допуск
    description: |
      Клинический и анестезиологический допуск к плановым процедурам.
  BC-2800.60.20:
    name: Верификация необходимой документации
    description: |
      Проверка наличия направлений, согласий и документации по истории болезни и физикальному осмотру.
  BC-2800.60.30:
    name: Предварительный контакт с пациентом
    description: |
      Предварительный контакт с пациентом для заполнения форм, сбора анамнеза и предварительной регистрации.
  BC-2800.60.40:
    name: Инструкции по подготовке пациента
    description: |
      Передача пациентам инструкций по подготовке к процедуре и визиту.

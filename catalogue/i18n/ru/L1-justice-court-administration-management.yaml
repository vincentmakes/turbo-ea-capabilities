# Правосудие и судебное администрирование (ru) — translations for L1-justice-court-administration-management.yaml
locale: ru
source: L1-justice-court-administration-management.yaml
entries:
  BC-3320:
    name: Правосудие и судебное администрирование
    description: |
      Судебное администрирование, включая регистрацию дел, ведение реестра и планирование, проведение заседаний и судебных процессов, приведение в исполнение приговоров и судебных актов, исполнение наказаний и содержание под стражей, условно-досрочное освобождение и пробация, а также доступ к материалам судебных дел.
  BC-3320.10:
    name: Регистрация и возбуждение дел
    description: |
      Подача гражданских, уголовных, семейных и административных дел, включая электронную подачу, оценку сборов и первичную классификацию дел.
    in_scope:
      - Подача гражданских и уголовных дел
      - Электронная подача и приём документов
      - Оценка судебных сборов
    out_of_scope:
      - Рассмотрение протестов на торги по закупкам (относится к управлению государственными закупками и контрактованием)
  BC-3320.10.10:
    name: Возбуждение дел
    description: |
      Приём жалоб, обвинений и вводных документов для возбуждения дел.
  BC-3320.10.20:
    name: Электронная подача документов в суд
    description: |
      Электронная подача судебных документов сторонами и юристами.
  BC-3320.10.30:
    name: Классификация и нумерация дел
    description: |
      Классификация дел по типу, отделению и присвоение номеров дел.
  BC-3320.10.40:
    name: Оценка судебных сборов
    description: |
      Оценка, взыскание и освобождение от оплаты судебных сборов за подачу документов и ходатайств.
  BC-3320.20:
    name: Управление реестром и расписанием суда
    description: |
      Ведение судебных реестров, составление календаря и назначение дел, заседаний и судебных процессов судьями.
  BC-3320.20.10:
    name: Ведение реестра
    description: |
      Ведение основного реестра и реестра по отделениям с хронологией событий по делам.
  BC-3320.20.20:
    name: Планирование заседаний и процессов
    description: |
      Планирование заседаний, судебных процессов и календарей ходатайств по залам суда и судьям.
  BC-3320.20.30:
    name: Назначение дел судьям
    description: |
      Назначение дел судьям и ротация по отделениям.
  BC-3320.20.40:
    name: Обработка ходатайств об отложении
    description: |
      Рассмотрение ходатайств об отложении и перенесении заседаний и перепланирование.
  BC-3320.30:
    name: Операции слушаний и судебных процессов
    description: |
      Операционная поддержка слушаний и судебных процессов, включая управление жюри, логистику залов суда и услуги переводчиков.
  BC-3320.30.10:
    name: Управление жюри присяжных
    description: |
      Вызов, отбор, квалификация присяжных и администрирование их службы.
  BC-3320.30.20:
    name: Операции зала суда
    description: |
      Логистика зала суда, координация охраны и аудио-видеозапись.
  BC-3320.30.30:
    name: Услуги судебных переводчиков
    description: |
      Предоставление услуг судебных переводчиков и перевода документов.
  BC-3320.30.40:
    name: Поддержка свидетелей и жертв
    description: |
      Поддержка свидетелей и жертв преступлений и координация специальных мер.
  BC-3320.40:
    name: Вынесение приговоров и исполнение судебных актов
    description: |
      Фиксация судебных решений и приговоров, штрафы и возмещение ущерба, исполнение судебных актов.
  BC-3320.40.10:
    name: Фиксация судебных решений и приговоров
    description: |
      Фиксация судебных решений, приговоров и распорядительных актов.
  BC-3320.40.20:
    name: Администрирование штрафов и возмещения ущерба
    description: |
      Администрирование штрафов, постановлений о возмещении ущерба и компенсации жертвам.
  BC-3320.40.30:
    name: Принудительное исполнение гражданских решений
    description: |
      Принудительное исполнение гражданских решений через судебные приказы, обращение взыскания и изъятие.
  BC-3320.40.40:
    name: Выдача судебных ордеров
    description: |
      Выдача ордеров на арест, судебных ордеров и ордеров на обыск по судебным решениям.
  BC-3320.50:
    name: Исполнение наказаний и содержание под стражей
    description: |
      Администрирование содержания под стражей лиц в предварительном заключении и осуждённых в следственных изоляторах и тюрьмах.
  BC-3320.50.10:
    name: Приём и регистрация заключённых
    description: |
      Приём, регистрация и классификация риска заключённых при поступлении.
  BC-3320.50.20:
    name: Операции содержания под стражей
    description: |
      Повседневные операции содержания под стражей, включая управление численностью и перемещения.
  BC-3320.50.30:
    name: Координация медицинской помощи заключённым
    description: |
      Координация медицинской помощи, психиатрической помощи и наркологических услуг заключённым.
  BC-3320.50.40:
    name: Программы исправления и реабилитации
    description: |
      Администрирование образовательных, профессиональных и реабилитационных программ в местах лишения свободы.
  BC-3320.60:
    name: Управление пробацией и условно-досрочным освобождением
    description: |
      Надзор за осуждёнными по пробации, условно-досрочно освобождёнными и освобождёнными с условием.
  BC-3320.60.10:
    name: Предварительное расследование перед вынесением приговора
    description: |
      Доклады о предварительном расследовании и оценка риска и потребностей для суда.
  BC-3320.60.20:
    name: Надзор в обществе
    description: |
      Повседневный надзор за осуждёнными в обществе.
  BC-3320.60.30:
    name: Администрирование заседаний по условно-досрочному освобождению
    description: |
      Администрирование заседаний комиссии по условно-досрочному освобождению и решений об освобождении с условием.
  BC-3320.60.40:
    name: Обработка нарушений и отзыв условий
    description: |
      Рассмотрение нарушений условий надзора и отзыв освобождения.
  BC-3320.70:
    name: Судебные документы и общественный доступ
    description: |
      Ведение судебных документов и обеспечение общественного доступа с учётом опечатывания, редактирования и законодательных ограничений.
  BC-3320.70.10:
    name: Ведение судебных документов
    description: |
      Ведение авторитетных судебных документов и материалов дел.
  BC-3320.70.20:
    name: Общественный доступ и сервисы типа PACER
    description: |
      Обеспечение общественного доступа к судебным документам через сервисы типа PACER.
  BC-3320.70.30:
    name: Опечатывание и уничтожение записей
    description: |
      Обработка судебных актов об опечатывании, уничтожении записей и подавлении сведений.

# Оценивание и проведение экзаменов (ru) — translations for L1-assessment-examinations-management.yaml
locale: ru
source: L1-assessment-examinations-management.yaml
entries:
  BC-4740:
    name: Оценивание и проведение экзаменов
    description: |
      Разработка, проведение, оценка, модерация и аттестация по результатам
      испытаний, подтверждающих образовательные достижения студентов, включая
      контроль академической добросовестности.
  BC-4740.10:
    name: Разработка заданий и банки вопросов
    description: |
      Разработка оценочных инструментов и ведение откалиброванных банков
      вопросов для последовательного и надёжного оценивания.
    in_scope:
      - Определение концепции оценивания
      - Разработка и калибровка заданий
      - Ведение банка вопросов
    out_of_scope:
      - Разработка силлабуса на уровне курса (охватывается управлением учебным планом)
  BC-4740.10.10:
    name: Определение концепции оценивания
    description: |
      Определение концепций оценивания и весовых коэффициентов относительно
      образовательных результатов.
  BC-4740.10.20:
    name: Разработка и калибровка заданий
    description: |
      Составление и статистическая калибровка оценочных заданий.
  BC-4740.10.30:
    name: Ведение банка вопросов
    description: |
      Ведение защищённых банков вопросов по версиям и циклам использования.
  BC-4740.20:
    name: Организация экзаменов
    description: |
      Операционная организация очных и онлайн-экзаменов, включая составление
      расписания, надзор и дистанционное прокторство.
    in_scope:
      - Составление расписания экзаменов
      - Организация экзаменационных аудиторий и надзор
      - Онлайн- и дистанционное прокторство
    out_of_scope:
      - Текущее аудиторное оценивание (охватывается организацией учебного процесса)
  BC-4740.20.10:
    name: Составление расписания экзаменов
    description: |
      Составление расписания экзаменов по учебным группам, аудиториям и
      форматам.
  BC-4740.20.20:
    name: Организация аудиторий и надзор
    description: |
      Организация аудиторий и надзор за проведением очных экзаменов.
  BC-4740.20.30:
    name: Онлайн- и дистанционное прокторство
    description: |
      Организация онлайн- и дистанционного прокторства при проведении
      онлайн-экзаменов.
  BC-4740.30:
    name: Проверка и выставление оценок
    description: |
      Проверка работ студентов и вычисление оценок, включая двойную и
      анонимную проверку, а также правила агрегации баллов.
    in_scope:
      - Применение схем проверки
      - Двойная и анонимная проверка
      - Агрегация и расчёт оценок
    out_of_scope:
      - Ведение авторитетных журналов оценок (охватывается зачислением студентов)
  BC-4740.30.10:
    name: Применение схем проверки
    description: |
      Применение схем проверки и рубрик к работам студентов.
  BC-4740.30.20:
    name: Двойная и анонимная проверка
    description: |
      Проведение двойной и анонимной проверки работ.
  BC-4740.30.30:
    name: Агрегация и расчёт оценок
    description: |
      Агрегация и расчёт составных баллов в итоговые оценки.
  BC-4740.40:
    name: Модерация и экзаменационные комиссии
    description: |
      Внутренняя модерация, участие внешних экзаменаторов и принятие решений
      экзаменационными комиссиями по присвоению и переводу.
    in_scope:
      - Внутренняя модерация
      - Координация внешних экзаменаторов
      - Принятие решений экзаменационными комиссиями
    out_of_scope:
      - Проверка на уровне программы (охватывается академическим качеством)
  BC-4740.40.10:
    name: Внутренняя модерация
    description: |
      Внутренняя модерация решений по проверке среди проверяющих и учебных
      групп.
  BC-4740.40.20:
    name: Координация внешних экзаменаторов
    description: |
      Координация внешних экзаменаторов и циклов их отчётности.
  BC-4740.40.30:
    name: Принятие решений экзаменационными комиссиями
    description: |
      Принятие экзаменационными комиссиями решений о результатах, переводе
      и присвоении.
  BC-4740.50:
    name: Присвоение и выдача документов
    description: |
      Публикация результатов и выдача документов об образовании, включая
      рассмотрение апелляций.
    in_scope:
      - Публикация результатов
      - Выдача свидетельств и дипломов
      - Рассмотрение апелляций
    out_of_scope:
      - Верифицируемые электронные удостоверения (охватываются зачислением студентов)
  BC-4740.50.10:
    name: Публикация результатов
    description: |
      Публикация предварительных и утверждённых результатов для студентов.
  BC-4740.50.20:
    name: Выдача свидетельств и дипломов
    description: |
      Выдача свидетельств и дипломов, подтверждающих присвоение квалификаций.
  BC-4740.50.30:
    name: Рассмотрение апелляций
    description: |
      Рассмотрение апелляций студентов по результатам оценивания.
  BC-4740.60:
    name: Управление академической добросовестностью
    description: |
      Выявление, расследование и устранение академических нарушений, включая
      плагиат и контрактное списывание.
    in_scope:
      - Выявление плагиата
      - Расследование нарушений
      - Санкции и меры по исправлению
    out_of_scope:
      - Нарушения исследовательской этики (охватываются научной деятельностью)
  BC-4740.60.10:
    name: Выявление плагиата
    description: |
      Выявление плагиата и контрактного списывания в представленных работах.
  BC-4740.60.20:
    name: Расследование нарушений
    description: |
      Расследование случаев подозрения в академических нарушениях.
  BC-4740.60.30:
    name: Санкции и меры по исправлению
    description: |
      Применение санкций и мер по исправлению ситуации при подтверждённых
      нарушениях.
metadata:
  status: draft
  reviewer: pending

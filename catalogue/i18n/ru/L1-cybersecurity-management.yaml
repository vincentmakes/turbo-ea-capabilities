# Управление кибербезопасностью (ru) — translations for L1-cybersecurity-management.yaml
locale: ru
source: L1-cybersecurity-management.yaml
entries:
  BC-620:
    name: Управление кибербезопасностью
    description: |
      Стратегия безопасности, контроли, управление идентификацией и реагирование на угрозы.
  BC-620.10:
    name: Управление стратегией и корпоративным управлением в сфере безопасности
    description: |
      Стратегия безопасности, политики, фреймворки, GRC.
  BC-620.10.10:
    name: Разработка стратегии безопасности
    description: |
      Многолетняя стратегия кибербезопасности, согласованная с бизнес-рисками.
  BC-620.10.20:
    name: Политики и стандарты безопасности
    description: |
      Политики и стандарты безопасности, согласованные с NIST CSF и ISO 27001.
  BC-620.10.30:
    name: Управление рисками безопасности
    description: |
      Выявление, оценка и обработка киберрисков.
  BC-620.10.40:
    name: Управление соответствием требованиям безопасности
    description: |
      Соответствие киберрегуляторным требованиям (DORA, NIS2, отраслевые).
  BC-620.10.50:
    name: Метрики безопасности и отчётность
    description: |
      KPI безопасности, дашборды и отчётность для совета директоров.
  BC-620.20:
    name: Управление идентификацией и доступом
    description: |
      IAM, PAM, федерация, процессы приёма/перевода/увольнения сотрудников.
  BC-620.20.10:
    name: Управление жизненным циклом идентификаций
    description: |
      Процессы приёма, перевода и увольнения сотрудников и предоставление идентификаций.
  BC-620.20.20:
    name: Управление доступом и аутентификация
    description: |
      Аутентификация, MFA, единый вход и федерация.
  BC-620.20.30:
    name: Управление привилегированным доступом
    description: |
      PAM, доступ «точно в срок» и мониторинг привилегированных сессий.
  BC-620.20.40:
    name: Управление доступом и его пересертификация
    description: |
      Проверки доступа, разделение обязанностей и пересертификация.
  BC-620.20.50:
    name: Управление идентификацией клиентов
    description: |
      CIAM для внешних клиентов, партнёров и потребителей.
  BC-620.30:
    name: Управление обнаружением угроз и реагированием
    description: |
      SOC, SIEM, реагирование на инциденты.
  BC-620.30.10:
    name: Мониторинг безопасности и операции SIEM
    description: |
      SIEM, SOAR и мониторинг телеметрии безопасности.
  BC-620.30.20:
    name: Охота на угрозы
    description: |
      Проактивный поиск угроз на основе гипотез.
  BC-620.30.30:
    name: Разведка киберугроз
    description: |
      Сбор, анализ и распространение данных о киберугрозах.
  BC-620.30.40:
    name: Реагирование на киберинциденты
    description: |
      Обнаружение, сдерживание, ликвидация и восстановление после киберинцидентов.
  BC-620.30.50:
    name: Цифровая криминалистика
    description: |
      Криминалистический сбор и анализ данных в поддержку расследований инцидентов и судебных разбирательств.
  BC-620.40:
    name: Управление уязвимостями
    description: |
      Сканирование уязвимостей, патчинг, устранение.
  BC-620.40.10:
    name: Сканирование уязвимостей
    description: |
      Аутентифицированное и неаутентифицированное сканирование инфраструктуры.
  BC-620.40.20:
    name: Сортировка и приоритизация уязвимостей
    description: |
      Приоритизация уязвимостей для устранения на основе рисков.
  BC-620.40.30:
    name: Управление патчингом и устранением уязвимостей
    description: |
      Координация патчинга и устранения уязвимостей с ответственными владельцами.
  BC-620.40.40:
    name: Тестирование на проникновение и red team
    description: |
      Тесты на проникновение, red team учения и симуляция атак противника.
  BC-620.50:
    name: Управление архитектурой безопасности
    description: |
      Безопасный дизайн, паттерны безопасности, концепция Zero Trust.
  BC-620.50.10:
    name: Паттерны архитектуры безопасности
    description: |
      Эталонные паттерны безопасности и многократно используемые контроли.
  BC-620.50.20:
    name: Архитектура Zero Trust
    description: |
      Принципы Zero Trust, микросегментация и применение политик.
  BC-620.50.30:
    name: Инженерия безопасности приложений
    description: |
      Практики безопасного проектирования, SAST, DAST и моделирование угроз.
  BC-620.50.40:
    name: Архитектура облачной безопасности
    description: |
      Базовые конфигурации облачной безопасности, CSPM и проектирование нативных облачных контролей.
  BC-620.50.50:
    name: Криптография и управление ключами
    description: |
      Криптографические стандарты, управление ключами и операции PKI.
  BC-620.60:
    name: Управление осведомлённостью в сфере безопасности
    description: |
      Тренинги по осведомлённости, фишинговые симуляции, культура безопасности.
  BC-620.60.10:
    name: Тренинги по осведомлённости в сфере безопасности
    description: |
      Ежегодные и ролевые тренинги по осведомлённости в сфере безопасности.
  BC-620.60.20:
    name: Фишинговые симуляции
    description: |
      Фишинговые симуляции и последующий коучинг.
  BC-620.60.30:
    name: Программа культуры безопасности
    description: |
      Программы изменения культуры и сети чемпионов безопасности.
  BC-620.60.40:
    name: Коммуникации в сфере безопасности
    description: |
      Оповещения, рекомендации и коммуникации с заинтересованными сторонами по вопросам безопасности.

# Управление безопасностью полётов (ru) — translations for L1-aviation-safety-management.yaml
locale: ru
source: L1-aviation-safety-management.yaml
entries:
  BC-1280:
    name: Управление безопасностью полётов
    description: |
      Система управления безопасностью, оценка рисков, справедливая культура, расследование авиационных событий.
  BC-1280.10:
    name: Управление системой управления безопасностью
    description: |
      Структура SMS, политика безопасности, цели безопасности, корпоративное управление безопасностью.
  BC-1280.10.10:
    name: Политика и цели безопасности
    description: |
      Разработка политики безопасности и целей безопасности.
  BC-1280.10.20:
    name: Управление структурой SMS
    description: |
      Поддержание структуры SMS в соответствии с Приложением 19 ICAO.
  BC-1280.10.30:
    name: Корпоративное управление и ответственность за безопасность
    description: |
      Комитеты по безопасности и механизмы ответственного менеджера.
  BC-1280.10.40:
    name: Управление ресурсами безопасности
    description: |
      Выделение ресурсов для функции обеспечения безопасности.
  BC-1280.20:
    name: Управление оценкой рисков безопасности
    description: |
      Выявление опасностей, оценка рисков, снижение рисков.
  BC-1280.20.10:
    name: Выявление опасностей
    description: |
      Проактивное и реактивное выявление опасностей.
  BC-1280.20.20:
    name: Оценка рисков безопасности
    description: |
      Оценка вероятности и серьёзности рисков безопасности.
  BC-1280.20.30:
    name: Снижение рисков безопасности
    description: |
      Разработка и отслеживание мер по снижению рисков безопасности.
  BC-1280.20.40:
    name: Оценка безопасности изменений
    description: |
      Оценка безопасности операционных и технических изменений.
  BC-1280.30:
    name: Управление справедливой культурой и отчётностью
    description: |
      Конфиденциальная отчётность, справедливая культура, добровольное сообщение о событиях.
  BC-1280.30.10:
    name: Программа справедливой культуры
    description: |
      Программа справедливой культуры и защита лиц, подавших сообщения.
  BC-1280.30.20:
    name: Добровольное сообщение о событиях
    description: |
      Добровольные и конфиденциальные каналы сообщения о событиях.
  BC-1280.30.30:
    name: Обязательное сообщение о событиях
    description: |
      Обязательное сообщение о событиях в органы регулирования.
  BC-1280.40:
    name: Управление расследованием событий
    description: |
      Внутренние расследования, анализ первопричин, извлечённые уроки.
  BC-1280.40.10:
    name: Внутреннее расследование событий
    description: |
      Внутреннее расследование авиационных событий безопасности.
  BC-1280.40.20:
    name: Анализ первопричин
    description: |
      Анализ первопричин событий и способствующих факторов.
  BC-1280.40.30:
    name: Уроки, извлечённые по результатам расследований
    description: |
      Фиксация и распространение уроков безопасности, извлечённых по результатам расследований.
  BC-1280.50:
    name: Управление мониторингом показателей безопасности
    description: |
      SPI, SPT, информационные панели показателей безопасности, отчётность для регуляторов.
  BC-1280.50.10:
    name: Управление показателями безопасности
    description: |
      Определение и отслеживание SPI и SPT.
  BC-1280.50.20:
    name: Анализ тенденций безопасности
    description: |
      Анализ тенденций событий и показателей SPI.
  BC-1280.50.30:
    name: Отчётность по безопасности для регулятора
    description: |
      Периодическая отчётность о показателях безопасности в орган гражданской авиации.
  BC-1280.60:
    name: Управление продвижением безопасности
    description: |
      Программы культуры безопасности, обучение, информированность, коммуникации.
  BC-1280.60.10:
    name: Программа культуры безопасности
    description: |
      Опросы культуры безопасности и программы улучшения.
  BC-1280.60.20:
    name: Обучение безопасности
    description: |
      Проведение обучения безопасности и повторяющегося обучения SMS.
  BC-1280.60.30:
    name: Коммуникации по безопасности
    description: |
      Коммуникации по безопасности, бюллетени и кампании по повышению осведомлённости.

# Реализация и маркетинг минеральной продукции (ru) — translations for L1-mineral-product-marketing-management.yaml
locale: ru
source: L1-mineral-product-marketing-management.yaml
entries:
  BC-4480:
    name: Реализация и маркетинг минеральной продукции
    description: |
      Продажи, офтейк, переговоры по ставкам переработки и аффинажа,
      урегулирование предварительного ценообразования, координация логистики
      и управление торговыми рисками по концентратам, промежуточным продуктам
      и готовым металлам.
  BC-4480.10:
    name: Продажи концентратов и металлов
    description: |
      Исполнение спотовых и долгосрочных продаж, а также планирование
      распределения объёмов между покупателями по концентратам и готовым металлам.
    in_scope:
      - Спотовые и долгосрочные контрактные продажи
      - Планирование распределения продукции по горнодобывающим предприятиям и аффинажным заводам
    out_of_scope:
      - Расчёты в рамках предварительного ценообразования (BC-4480.40)
  BC-4480.10.10:
    name: Исполнение спотовых продаж
    description: |
      Исполнение спотовых продаж концентратов и металлов трейдерам и конечным
      покупателям.
  BC-4480.10.20:
    name: Управление долгосрочными контрактами
    description: |
      Управление многолетними долгосрочными контрактами на продажу концентратов
      и металлов.
  BC-4480.10.30:
    name: Планирование распределения продукции по покупателям
    description: |
      Распределение доступного объёма производства между покупателями и
      контрактами.
  BC-4480.20:
    name: Управление офтейк-соглашениями
    description: |
      Переговоры и текущее администрирование офтейк-соглашений, включая
      стриминговые и роялти-офтейки.
  BC-4480.20.10:
    name: Согласование офтейк-контрактов
    description: |
      Коммерческие и юридические переговоры по офтейк- и стриминговым
      соглашениям.
  BC-4480.20.20:
    name: Номинация объёмов по офтейку
    description: |
      Номинация объёмов офтейка в счёт законтрактованных прав.
  BC-4480.20.30:
    name: Мониторинг исполнения офтейка
    description: |
      Мониторинг поставок, качества продукции и исполнения обязательств
      контрагентами по офтейку.
  BC-4480.30:
    name: Переговоры по ставкам переработки и аффинажа
    description: |
      Ежегодные эталонные и двусторонние переговоры по ставкам переработки и
      аффинажа, а также по штрафным условиям по концентрату.
  BC-4480.30.10:
    name: Ежегодные переговоры по эталонным ставкам
    description: |
      Ежегодные переговоры по эталонным ставкам переработки и аффинажа с
      плавильными заводами и покупателями.
  BC-4480.30.20:
    name: Контроль расчётов по ставкам переработки
    description: |
      Отслеживание расчётов по ставкам переработки и аффинажа относительно
      эталонных и контрактных условий.
  BC-4480.30.30:
    name: Управление штрафными элементами
    description: |
      Управление условиями штрафных элементов по мышьяку, сурьме, фтору и
      другим вредным примесям.
  BC-4480.40:
    name: Предварительное ценообразование и окончательные расчёты
    description: |
      Управление котировочными периодами, предварительное выставление счетов,
      расчёт окончательных платежей и координация хеджирования для ценового
      содержания металлов.
  BC-4480.40.10:
    name: Управление котировочными периодами
    description: |
      Управление котировочными периодами, определяющими окончательное
      ценообразование партий.
  BC-4480.40.20:
    name: Выставление предварительных счетов
    description: |
      Выставление предварительных счетов при отгрузке на основе расчётных
      анализов и цен.
  BC-4480.40.30:
    name: Расчёт окончательного платежа
    description: |
      Окончательный расчёт по партиям с использованием арбитражных анализов
      и средних цен котировочного периода.
  BC-4480.40.40:
    name: Координация хеджирования
    description: |
      Взаимодействие с казначейскими программами хеджирования по
      предварительно оценённому металлу.
  BC-4480.50:
    name: Координация логистики минеральной продукции
    description: |
      Номинация судов для навалочных грузов, управление складскими варрантами,
      отбор проб при разгрузке и соответствие регуляторным требованиям к
      навалочным грузам.
  BC-4480.50.10:
    name: Номинация навалочных судов
    description: |
      Номинация судов, железнодорожных составов и барж для перевозки
      концентратов и руды.
  BC-4480.50.20:
    name: Управление складскими варрантами
    description: |
      Управление варрантами биржевых складов LME и других бирж на запасы
      готовых металлов.
  BC-4480.50.30:
    name: Отбор проб концентрата при разгрузке
    description: |
      Координация независимого отбора проб и анализа в портах разгрузки.
  BC-4480.50.40:
    name: Соответствие правилам перевозки навалочных грузов
    description: |
      Соответствие Кодексу МКМПНГ ИМО и эквивалентным правилам перевозки
      твёрдых навалочных грузов.
  BC-4480.60:
    name: Управление торговыми рисками по металлам
    description: |
      Управление ценовыми, кредитными и документарными рисками контрагентов
      в маркетинговой книге.
  BC-4480.60.10:
    name: Мониторинг ценовых позиций
    description: |
      Мониторинг оценённых и неоценённых металлических позиций в
      маркетинговой книге.
  BC-4480.60.20:
    name: Управление кредитным риском контрагентов
    description: |
      Оценка кредитоспособности контрагентов, лимиты и мониторинг экспозиции
      по торговым партнёрам.
  BC-4480.60.30:
    name: Подтверждение и документирование сделок
    description: |
      Подтверждение, документирование и хранение торговых тикетов и контрактов.

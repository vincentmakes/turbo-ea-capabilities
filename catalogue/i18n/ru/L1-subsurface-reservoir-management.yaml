# Недра / пласт (ru) — translations for L1-subsurface-reservoir-management.yaml
locale: ru
source: L1-subsurface-reservoir-management.yaml
entries:
  BC-3010:
    name: Недра / пласт
    description: |
      Геолого-промысловые науки и разработка пластов на протяжении жизненного цикла добывающего актива: характеризация, симуляция, классификация запасов и ресурсов, стратегия разработки и проектирование улучшенного извлечения.
  BC-3010.10:
    name: Управление подземной геологией
    description: |
      Статическое описание недр посредством геологического моделирования, петрофизики и структурной интерпретации добывающих активов.
  BC-3010.10.10:
    name: Геологическое моделирование
    description: |
      Создание и обновление статических геологических и фациальных моделей.
  BC-3010.10.20:
    name: Петрофизический анализ
    description: |
      Анализ кривых ГИС, интеграция керна и петрофизическая оценка пластов.
  BC-3010.10.30:
    name: Структурная интерпретация
    description: |
      Структурная интерпретация и интерпретация разломных систем добывающих активов.
  BC-3010.10.40:
    name: Обновление геомодели
    description: |
      Обновление геомоделей с учётом новых данных скважин, сейсмики и добычи.
  BC-3010.20:
    name: Разработка пластов
    description: |
      Анализ динамического поведения пласта: симуляция, PVT, материальный баланс и гидродинамические исследования.
    in_scope:
      - Симуляция пласта и история адаптации
      - PVT и анализ свойств флюидов
      - Анализ гидродинамических исследований скважин
    out_of_scope:
      - Кривые падения и прогноз добычи (BC-3010.50)
  BC-3010.20.10:
    name: Характеризация пласта
    description: |
      Комплексная статическая и динамическая характеризация пластов.
  BC-3010.20.20:
    name: Симуляция пласта
    description: |
      Численная симуляция пласта, история адаптации и генерация прогнозов.
  BC-3010.20.30:
    name: PVT и анализ флюидов
    description: |
      Отбор проб PVT, лабораторный анализ и моделирование свойств флюидов.
  BC-3010.20.40:
    name: Анализ материального баланса
    description: |
      Анализ материального баланса для оценки начальных запасов и механизмов вытеснения.
  BC-3010.20.50:
    name: Анализ гидродинамических исследований
    description: |
      Анализ гидродинамических исследований скважин и интерпретация переходных процессов давления.
  BC-3010.30:
    name: Управление запасами и ресурсами
    description: |
      Оценка, классификация и внешний учёт запасов нефти и газа и условных ресурсов согласно SPE-PRMS и требованиям SEC.
  BC-3010.30.10:
    name: Оценка запасов
    description: |
      Детерминистическая и вероятностная оценка запасов нефти и газа.
  BC-3010.30.20:
    name: Классификация запасов
    description: |
      Классификация запасов и ресурсов по категориям SPE-PRMS.
  BC-3010.30.30:
    name: Постановка запасов на учёт
    description: |
      Годовая постановка запасов на учёт для раскрытия по SEC и эквивалентным регуляторным требованиям.
  BC-3010.30.40:
    name: Координация аудита запасов
    description: |
      Координация внутреннего и третьесторонних аудитов запасов.
  BC-3010.40:
    name: Планирование разработки месторождения
    description: |
      Выбор концепции, стратегия разработки и составление проекта разработки от открытия до принятия инвестиционного решения.
  BC-3010.40.10:
    name: Выбор концепции
    description: |
      Геологически обоснованный выбор концепции для новых разрабатываемых месторождений.
  BC-3010.40.20:
    name: Составление проекта разработки
    description: |
      Составление проекта разработки для согласования с регулятором и партнёрами.
  BC-3010.40.30:
    name: Определение стратегии разработки
    description: |
      Определение стратегии разработки пласта, включая дренаж и число скважин.
  BC-3010.40.40:
    name: Оценка геологических рисков
    description: |
      Оценка неопределённости в недрах и её коммерческого влияния на решения по разработке.
  BC-3010.50:
    name: Прогнозирование добычи
    description: |
      Формирование и согласование прогнозов добычи для планирования активов, бизнеса и запасов.
  BC-3010.50.10:
    name: Анализ кривых падения
    description: |
      Анализ кривых падения для прогноза добычи скважин и месторождений.
  BC-3010.50.20:
    name: Формирование прогнозов добычи
    description: |
      Формирование прогнозов добычи с учётом ограничений скважин, пласта и объектов.
  BC-3010.50.30:
    name: Сверка прогнозов
    description: |
      Сверка геологических прогнозов с фактическими данными производственного учёта.
  BC-3010.60:
    name: Управление улучшенным и интенсифицированным извлечением
    description: |
      Проектирование и мониторинг вторичных и третичных методов извлечения: закачка воды, газа и МУН.
  BC-3010.60.10:
    name: Проектирование вторичных методов извлечения
    description: |
      Проектирование схем заводнения и закачки газа для вторичного извлечения.
  BC-3010.60.20:
    name: Проектирование третичных методов извлечения
    description: |
      Проектирование химических, тепловых и смешивающихся методов увеличения нефтеотдачи.
  BC-3010.60.30:
    name: Мониторинг системы закачки
    description: |
      Мониторинг и оптимизация схем закачки и коэффициента замещения объёма.

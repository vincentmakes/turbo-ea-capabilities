# Управление информацией о продукте (ru) — translations for L1-product-information-management.yaml
locale: ru
source: L1-product-information-management.yaml
entries:
  BC-2370:
    name: Управление информацией о продукте
    description: |
      Авторитетные атрибуты товаров, маркетинговый контент и готовые к публикации
      в каналах данные о продукте — от создания товарной позиции до синхронизации через
      GS1/GDSN и многоканальной синдикации до готовности контента.
  BC-2370.10:
    name: Управление основными данными о товарах
    description: |
      Основные атрибуты, GTIN, иерархии и таксономия товаров, формирующие
      канонический реестр продукта в масштабах предприятия.
    in_scope:
      - Создание товарных позиций и ведение атрибутов
      - Идентификация GTIN, GLN и упаковочных уровней
      - Таксономия и классификация продуктов (например, GS1 GPC)
    out_of_scope:
      - Общее управление мастер-данными (BC-610)
  BC-2370.10.10:
    name: Создание и атрибутирование товарных позиций
    description: |
      Создание карточек товаров и наполнение значений атрибутов.
  BC-2370.10.20:
    name: Присвоение GTIN и идентификаторов
    description: |
      Присвоение GTIN и идентификаторов упаковочных уровней по правилам GS1.
  BC-2370.10.30:
    name: Иерархия и таксономия продуктов
    description: |
      Ведение иерархии и таксономии продуктов (например, GS1 GPC).
  BC-2370.10.40:
    name: Статус и жизненный цикл товарной позиции
    description: |
      Отслеживание состояний жизненного цикла товара от концепции до снятия с продажи.
  BC-2370.20:
    name: Управление созданием контента о продукте
    description: |
      Создание маркетинговых текстов, фотографий, видео и мультимедиа,
      превращающих карточку товара в пригодный для продажи потребительский продукт.
  BC-2370.20.10:
    name: Создание маркетинговых текстов
    description: |
      Написание заголовков, описаний и продающих текстов по каналам.
  BC-2370.20.20:
    name: Производство фото и видео продукта
    description: |
      Производство продуктовой фотографии, lifestyle-снимков и видео.
  BC-2370.20.30:
    name: Производство мультимедийных и 3D-активов
    description: |
      Производство 360-градусных, AR и 3D-активов продукта.
  BC-2370.20.40:
    name: Перевод и локализация контента
    description: |
      Перевод и локализация контента о продукте для целевых рынков.
  BC-2370.30:
    name: Управление синдикацией по каналам
    description: |
      Публикация контента о продукте в собственных каналах, фидах ритейлеров,
      маркетплейсах и торговым партнёрам с адаптацией под канал.
  BC-2370.30.10:
    name: Публикация в собственных каналах
    description: |
      Публикация контента на собственных веб-, мобильных и магазинных каналах.
  BC-2370.30.20:
    name: Синдикация фидов на маркетплейсы
    description: |
      Синдикация фидов на сторонние маркетплейсы и агрегаторы.
  BC-2370.30.30:
    name: Каталог EDI 832 для ритейлеров
    description: |
      Предоставление продуктовых каталогов EDI 832 торговым партнёрам-ритейлерам.
  BC-2370.40:
    name: Управление синхронизацией через GS1/GDSN
    description: |
      Синхронизация основных данных о продукте с торговыми партнёрами через
      пулы данных GDSN, регистрацию участников и подписки получателей.
  BC-2370.40.10:
    name: Операции пула данных GDSN
    description: |
      Работа с пулом данных GDSN и управление отправками.
  BC-2370.40.20:
    name: Регистрация участников и получателей
    description: |
      Регистрация участников и подписок получателей в GDSN.
  BC-2370.40.30:
    name: Управление исключениями синхронизации GDSN
    description: |
      Обработка исключений синхронизации GDSN и расхождений с торговыми партнёрами.
  BC-2370.50:
    name: Управление качеством контента о продукте
    description: |
      Оценка готовности контента, измерение полноты и валидация
      на соответствие стандартам качества конкретного канала.
  BC-2370.50.10:
    name: Оценка полноты контента
    description: |
      Оценка полноты контента по требованиям готовности к каналу.
  BC-2370.50.20:
    name: Валидация и комплаенс контента
    description: |
      Валидация контента по регуляторным и канальным правилам.
  BC-2370.50.30:
    name: Устранение проблем с качеством контента
    description: |
      Рабочий процесс устранения проблем для позиций, не прошедших проверки качества контента.
metadata:
  status: draft
  reviewer: pending

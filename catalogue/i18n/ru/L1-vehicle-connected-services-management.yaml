# Управление услугами подключённых транспортных средств (ru) — translations for L1-vehicle-connected-services-management.yaml
locale: ru
source: L1-vehicle-connected-services-management.yaml
entries:
  BC-3460:
    name: Управление услугами подключённых транспортных средств
    description: |
      Функционирование услуг подключённых транспортных средств — платформа
      подключения, OTA-обновления ПО, встроенные приложения и подписки,
      платформа данных транспортных средств, V2X-сервисы, операции кибербезопасности
      и поддержка клиентов подключённых сервисов.
  BC-3460.10:
    name: Операции платформы подключения транспортных средств
    description: |
      Функционирование бортового подключения, предоставление SIM и
      телеметрической платформы транспортное средство — облако.
  BC-3460.10.10:
    name: Предоставление SIM и подключения транспортных средств
    description: |
      Предоставление встроенного SIM-подключения и роуминга
      операторов для подключённых транспортных средств.
  BC-3460.10.20:
    name: Операции сети подключения
    description: |
      Функционирование магистрали подключения, поддерживающей сервисы
      транспортных средств, включая резервирование и качество обслуживания.
  BC-3460.10.30:
    name: Операции телеметрии транспортное средство — облако
    description: |
      Функционирование телеметрических конвейеров от бортовых агентов
      до облачных платформ.
  BC-3460.20:
    name: Операции OTA-обновлений ПО
    description: |
      Функционирование OTA-кампаний обновления ПО в соответствии с
      UN R156 и системой управления обновлениями ПО.
  BC-3460.20.10:
    name: Планирование OTA-кампаний
    description: |
      Планирование OTA-кампаний обновления ПО, включая охват,
      критерии и стратегию развёртывания.
  BC-3460.20.20:
    name: Распространение OTA-пакетов
    description: |
      Распространение подписанных OTA-пакетов на транспортные средства
      и оркестрация установки по ЭБУ.
  BC-3460.20.30:
    name: Управление откатом и восстановлением OTA
    description: |
      Управление откатом OTA, восстановлением и реагированием на полевые
      инциденты при сбоях обновления.
  BC-3460.30:
    name: Управление встроенными приложениями и подписками
    description: |
      Функционирование магазина встроенных приложений, жизненного цикла
      подписок и платёжных сервисов в транспортном средстве.
  BC-3460.30.10:
    name: Управление каталогом подключённых сервисов
    description: |
      Ведение каталога подключённых сервисов и встроенных приложений,
      предлагаемых клиентам.
  BC-3460.30.20:
    name: Управление жизненным циклом подписок
    description: |
      Управление жизненным циклом клиентских подписок на подключённые
      и функции по запросу.
  BC-3460.30.30:
    name: Операции встроенных платежей
    description: |
      Функционирование встроенных платежей, токенизации
      и расчётов по транзакциям.
  BC-3460.40:
    name: Операции платформы данных транспортных средств
    description: |
      Функционирование платформы данных транспортных средств — приём,
      хранение, обмен и управление согласием для внутренних и сторонних сценариев.
    in_scope:
      - Приём и хранение данных транспортных средств
      - API обмена данными транспортных средств с внутренними и партнёрскими потребителями
      - Управление конфиденциальностью и согласием для данных транспортных средств
    out_of_scope:
      - Общее корпоративное управление данными (в корпоративных данных и ИТ)
      - Разработка обоснования функциональной безопасности (BC-3400.80)
  BC-3460.40.10:
    name: Приём и хранение данных транспортных средств
    description: |
      Приём, нормализация и хранение телеметрии и событийных данных
      транспортных средств в масштабах парка.
  BC-3460.40.20:
    name: Обмен данными транспортных средств и управление API
    description: |
      Предоставление API данных транспортных средств внутренним командам,
      дилерам и внешним партнёрам на основе соглашений об обмене данными.
  BC-3460.40.30:
    name: Конфиденциальность и управление согласием для данных транспортных средств
    description: |
      Управление согласием клиентов, предпочтениями и средствами контроля
      конфиденциальности для данных транспортных средств.
  BC-3460.50:
    name: V2X и кооперативные услуги мобильности
    description: |
      Функционирование V2X-сервисов сообщений и кооперативных услуг
      мобильности с инфраструктурой и другими транспортными средствами.
  BC-3460.50.10:
    name: Операции V2I-сервисов
    description: |
      Функционирование сервисов транспортное средство — инфраструктура,
      таких как данные о фазах сигнала, предупреждения о дорожных работах и оплата проезда.
  BC-3460.50.20:
    name: Операции V2V-сообщений
    description: |
      Функционирование сервисов сообщений транспортное средство — транспортное
      средство и каналов широковещания по SAE J2735 и эквивалентам.
  BC-3460.50.30:
    name: Операции кооперативного информирования
    description: |
      Функционирование сервисов кооперативного информирования, предупреждения
      об опасностях и платунирования для смешанных парков.
  BC-3460.60:
    name: Операции кибербезопасности транспортных средств
    description: |
      Оперативный мониторинг кибербезопасности подключённого парка
      и реагирование на киберинциденты транспортных средств.
  BC-3460.60.10:
    name: Обнаружение угроз транспортным средствам
    description: |
      Обнаружение киберугроз и аномального поведения
      в подключённом парке транспортных средств.
  BC-3460.60.20:
    name: Реагирование на инциденты кибербезопасности транспортных средств
    description: |
      Реагирование на киберинциденты транспортных средств, включая
      локализацию, устранение и уведомление клиентов.
  BC-3460.60.30:
    name: Операции SOC транспортных средств
    description: |
      Функционирование центра оперативной безопасности транспортных
      средств и поддерживающих телеметрических конвейеров.
  BC-3460.70:
    name: Клиентские операции подключённых сервисов
    description: |
      Клиентские операции по подключённым сервисам, включая поддержку
      активации, разрешение проблем и управление аккаунтами.
  BC-3460.70.10:
    name: Поддержка активации подключённых сервисов
    description: |
      Поддержка клиентов при активации, переносе и деактивации
      подключённых сервисов.
  BC-3460.70.20:
    name: Разрешение проблем с подключёнными сервисами
    description: |
      Разрешение сообщённых клиентами проблем с подключёнными сервисами
      через контакт-центр, дилерские и самообслуживающие каналы.
  BC-3460.70.30:
    name: Управление аккаунтами подключённых сервисов
    description: |
      Управление аккаунтами клиентов подключённых сервисов, идентификацией
      и привязкой прав к транспортным средствам.

# Управление дистрибуцией страховых продуктов (ru) — translations for L1-insurance-distribution-management.yaml
locale: ru
source: L1-insurance-distribution-management.yaml
entries:
  BC-2110:
    name: Управление дистрибуцией страховых продуктов
    description: |
      Взаимодействие с продьюсерами, брокерами, агентами, MGA и прямыми каналами, включая назначения, комиссионные, лицензирование, делегированные полномочия, а также поток котировок и заявок в андеррайтинг.
  BC-2110.10:
    name: Управление продьюсерами и посредниками
    description: |
      Подключение, иерархия, отслеживание показателей и прекращение отношений с продьюсерами и посредниками.
  BC-2110.10.10:
    name: Подключение продьюсеров
    description: |
      Подключение продьюсеров, посредников, брокеров и MGA.
  BC-2110.10.20:
    name: Иерархия и учётные записи продьюсеров
    description: |
      Ведение иерархии продьюсеров, структур учётных записей и контактных данных.
  BC-2110.10.30:
    name: Отслеживание показателей продьюсеров
    description: |
      Отслеживание объёма производства, коэффициента убыточности и рентабельности продьюсеров.
  BC-2110.10.40:
    name: Прекращение отношений с продьюсерами
    description: |
      Прекращение отношений с продьюсерами, урегулирование действующих портфелей и окончательные расчёты.
  BC-2110.20:
    name: Управление лицензированием и назначением продьюсеров
    description: |
      Верификация лицензий, юрисдикционные назначения, непрерывное образование и соответствие продьюсеров требованиям.
  BC-2110.20.10:
    name: Верификация лицензий
    description: |
      Верификация лицензий продьюсеров по государственным и юрисдикционным реестрам.
  BC-2110.20.20:
    name: Управление юрисдикционными назначениями
    description: |
      Управление государственными и юрисдикционными назначениями, прекращениями и продлениями.
  BC-2110.20.30:
    name: Отслеживание непрерывного образования
    description: |
      Отслеживание кредитов непрерывного образования продьюсеров и права на продление.
  BC-2110.20.40:
    name: Мониторинг соответствия продьюсеров
    description: |
      Мониторинг поведения продьюсеров, жалоб и дисциплинарных мер.
  BC-2110.30:
    name: Управление комиссионными и стимулированием
    description: |
      Конфигурация комиссионных сеток, расчёт, переопределения и бонусы, а также формирование выписок.
  BC-2110.30.10:
    name: Конфигурация комиссионных сеток
    description: |
      Конфигурация комиссионных сеток и ставок по продукту и продьюсеру.
  BC-2110.30.20:
    name: Расчёт комиссионных
    description: |
      Расчёт комиссионных по событиям начисления премии, включая сторнирование при расторжении.
  BC-2110.30.30:
    name: Расчёт переопределений и бонусов
    description: |
      Расчёт переопределений, распределения прибыли и поощрительных бонусов.
  BC-2110.30.40:
    name: Формирование комиссионных выписок
    description: |
      Формирование и рассылка комиссионных выписок продьюсерам.
  BC-2110.40:
    name: Управление каналами дистрибуции
    description: |
      Операции агентских, брокерских, прямых цифровых, bancassurance, аффинити-каналов и агрегаторов.
  BC-2110.40.10:
    name: Операции агентского канала
    description: |
      Операции связанных и независимых агентских каналов.
  BC-2110.40.20:
    name: Операции брокерского канала
    description: |
      Операции брокерских и оптовых брокерских каналов.
  BC-2110.40.30:
    name: Операции прямого цифрового канала
    description: |
      Операции прямых цифровых каналов страхования для клиентов.
  BC-2110.40.40:
    name: Операции bancassurance и аффинити-каналов
    description: |
      Операции партнёрств bancassurance и каналов для аффинити-групп.
  BC-2110.40.50:
    name: Операции агрегаторов и сравнительных платформ
    description: |
      Операции каналов агрегаторов и сайтов сравнения цен.
  BC-2110.50:
    name: Управление делегированными полномочиями
    description: |
      Настройка полномочий ковероудержателей, мониторинг показателей, приём бордеро и аудит полномочий.
  BC-2110.50.10:
    name: Настройка делегированных полномочий
    description: |
      Настройка полномочий на связывание и соглашений о делегированном андеррайтинге.
  BC-2110.50.20:
    name: Мониторинг показателей ковероудержателей
    description: |
      Мониторинг андеррайтинговых показателей ковероудержателей и соблюдения полномочий.
  BC-2110.50.30:
    name: Приём и сверка бордеро
    description: |
      Приём, загрузка и сверка бордеро по премиям и убыткам.
  BC-2110.50.40:
    name: Аудит и отзыв полномочий
    description: |
      Аудит операций ковероудержателей и отзыв полномочий на связывание при необходимости.
  BC-2110.60:
    name: Управление котировками и заявками
    description: |
      Приём заявок, формирование котировок, сравнение и отслеживание конверсии котировки в полис.
  BC-2110.60.10:
    name: Приём заявок
    description: |
      Приём страховых заявок по каналам и брокерским порталам.
  BC-2110.60.20:
    name: Формирование котировок
    description: |
      Формирование страховых котировок на основе конфигурации продуктов и тарификации.
  BC-2110.60.30:
    name: Сравнение котировок и встречные предложения
    description: |
      Мультистраховое сравнение котировок и обработка встречных предложений.
  BC-2110.60.40:
    name: Отслеживание конверсии котировки в полис
    description: |
      Отслеживание коэффициентов конверсии котировок в полисы и причин неконверсии.

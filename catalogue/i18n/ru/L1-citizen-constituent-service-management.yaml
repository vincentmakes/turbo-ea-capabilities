# Обслуживание граждан и избирателей (ru) — translations for L1-citizen-constituent-service-management.yaml
locale: ru
source: L1-citizen-constituent-service-management.yaml
entries:
  BC-3220:
    name: Обслуживание граждан и избирателей
    description: |
      Многоканальное оказание государственных услуг гражданам, резидентам и избирателям, включая аутентификацию личности, управление делами, обработку запросов, рассмотрение апелляций и гражданское взаимодействие.
  BC-3220.10:
    name: Операции каналов обслуживания
    description: |
      Работа очных, телефонных, почтовых, цифровых и мобильных каналов, через которые граждане получают доступ к государственным услугам.
    in_scope:
      - Многофункциональные центры и очные пункты обслуживания
      - Каналы контакт-центра и телефонии
      - Цифровые порталы и мобильные приложения
      - Почтовые и бумажные каналы
    out_of_scope:
      - Верификация личности гражданина (относится к идентификации и аутентификации граждан)
  BC-3220.10.10:
    name: Операции многофункциональных центров
    description: |
      Работа очных центров обслуживания и единых окон между ведомствами.
  BC-3220.10.20:
    name: Операции контакт-центра
    description: |
      Работа многоведомственных телефонных контакт-центров и чат-каналов.
  BC-3220.10.30:
    name: Работа цифрового портала услуг
    description: |
      Работа цифровых порталов государственных услуг и мобильных приложений для граждан.
  BC-3220.10.40:
    name: Обеспечение доступности услуг
    description: |
      Обеспечение доступности каналов обслуживания по WCAG и Section 508 и поддержка вспомогательных технологий.
  BC-3220.20:
    name: Идентификация и аутентификация граждан
    description: |
      Создание и верификация цифровых удостоверений граждан, учётных данных и уровней гарантий для доступа к государственным услугам.
  BC-3220.20.10:
    name: Подтверждение личности
    description: |
      Подтверждение личности в соответствии с уровнями IAL по NIST 800-63 или уровнями гарантий eIDAS.
  BC-3220.20.20:
    name: Выпуск учётных данных
    description: |
      Выпуск аутентификаторов и учётных данных для доступа к государственным услугам.
  BC-3220.20.30:
    name: Операции аутентификации
    description: |
      Повседневная аутентификация граждан при доступе к государственным услугам.
  BC-3220.20.40:
    name: Федерация и трансграничное доверие
    description: |
      Федерация идентификации между ведомствами и трансграничное доверие по eIDAS или аналогичным стандартам.
  BC-3220.30:
    name: Управление делами граждан
    description: |
      Управление полным жизненным циклом дел по взаимодействию граждан с различными ведомствами и программами.
  BC-3220.30.10:
    name: Регистрация и сортировка дел
    description: |
      Регистрация, классификация и сортировка дел граждан.
  BC-3220.30.20:
    name: Маршрутизация и назначение дел
    description: |
      Маршрутизация дел к сотрудникам и ведомствам по юрисдикции и правилам.
  BC-3220.30.30:
    name: Ведение и разрешение дел
    description: |
      Ведение дел через рабочие процессы обслуживания до их разрешения.
  BC-3220.30.40:
    name: Закрытие и проверка качества дел
    description: |
      Закрытие, проверка качества и доработка завершённых дел.
  BC-3220.40:
    name: Обработка запросов на услуги и обращений
    description: |
      Обработка обращений, запросов, жалоб и запросов на доступ к информации по всем каналам.
  BC-3220.40.10:
    name: Обработка общих обращений
    description: |
      Обработка общих обращений и информационных запросов.
  BC-3220.40.20:
    name: Рассмотрение жалоб
    description: |
      Приём, рассмотрение и разрешение жалоб граждан.
  BC-3220.40.30:
    name: Обработка запросов на свободу информации
    description: |
      Обработка запросов на свободу информации и доступ к документам.
  BC-3220.50:
    name: Управление апелляциями и омбудсменом
    description: |
      Независимая административная проверка решений ведомств, включая апелляции, трибуналы и расследования омбудсмена.
  BC-3220.50.10:
    name: Приём административных апелляций
    description: |
      Приём и валидация административных апелляций на решения ведомств.
  BC-3220.50.20:
    name: Слушание и вынесение решения по апелляции
    description: |
      Рассмотрение апелляций и вынесение решений проверяющими органами.
  BC-3220.50.30:
    name: Расследование омбудсмена
    description: |
      Независимое расследование омбудсменом жалоб на ненадлежащее администрирование.
  BC-3220.60:
    name: Гражданское взаимодействие и участие
    description: |
      Двустороннее взаимодействие с гражданами через платформы участия, петиции и каналы обратной связи.
  BC-3220.60.10:
    name: Обработка петиций и гражданских инициатив
    description: |
      Приём, валидация и ответ на петиции и инициативы граждан.
  BC-3220.60.20:
    name: Работа партисипаторных платформ
    description: |
      Работа платформ партисипаторного бюджетирования, совещательных платформ и совместного творчества.
  BC-3220.60.30:
    name: Измерение удовлетворённости граждан
    description: |
      Измерение удовлетворённости граждан, доверия и опыта использования услуг.

# Управление страховыми продуктами (ru) — translations for L1-insurance-product-management.yaml
locale: ru
source: L1-insurance-product-management.yaml
entries:
  BC-2100:
    name: Управление страховыми продуктами
    description: |
      Фабрика страховых продуктов — определение покрытий, условий, тарифных таблиц, пакетных продуктов и жизненного цикла для страхования жизни, имущества и ответственности, здоровья и специальных рисков, включая структуры программных продуктов и продуктов с передачей полномочий, применяемые на рынках с делегированными полномочиями.
  BC-2100.10:
    name: Управление каталогом страховых продуктов
    description: |
      Каталог страховых продуктов, основные данные, библиотека покрытий и форм, документация о раскрытии информации и публикация каталога.
  BC-2100.10.10:
    name: Управление основными данными продуктов
    description: |
      Ведение основных данных страховых продуктов и иерархий продуктов.
  BC-2100.10.20:
    name: Библиотека покрытий и полисных форм
    description: |
      Ведение стандартизированных определений покрытий, полисных форм и библиотеки аддендумов.
  BC-2100.10.30:
    name: Документация о раскрытии информации по продукту
    description: |
      Подготовка и ведение документов о раскрытии информации по продуктам и ключевых информационных листов.
  BC-2100.10.40:
    name: Публикация каталога страховых продуктов
    description: |
      Публикация каталога страховых продуктов по каналам и партнёрам.
  BC-2100.20:
    name: Конфигурация тарификации и ценообразования продуктов
    description: |
      Конфигурация алгоритмов тарификации, факторов, зафилированных тарифов, скидок и надбавок.
  BC-2100.20.10:
    name: Конфигурация алгоритмов тарификации
    description: |
      Конфигурация алгоритмов тарификации и моделей ценообразования страховых продуктов.
  BC-2100.20.20:
    name: Ведение тарифных факторов и переменных
    description: |
      Ведение тарифных факторов, таблиц и переменных тарификации.
  BC-2100.20.30:
    name: Управление зафилированными тарифами
    description: |
      Управление зафилированными тарифами, отклонениями и утверждениями по юрисдикциям.
  BC-2100.20.40:
    name: Конфигурация скидок и надбавок
    description: |
      Конфигурация скидок по страховой премии, надбавок и кредитных программ.
  BC-2100.30:
    name: Конфигурация правил допустимости и андеррайтинга продуктов
    description: |
      Конфигурация допустимости, андеррайтинговых руководств, а также правил направления и отказа, встроенных в продукт.
  BC-2100.30.10:
    name: Конфигурация правил допустимости
    description: |
      Конфигурация правил допустимости клиентов и рисков по продукту.
  BC-2100.30.20:
    name: Кодирование андеррайтинговых руководств
    description: |
      Кодирование андеррайтинговых руководств в конфигурацию продукта.
  BC-2100.30.30:
    name: Конфигурация правил направления и отказа
    description: |
      Конфигурация автоматизированных правил направления и отказа по продукту.
  BC-2100.40:
    name: Управление жизненным циклом страховых продуктов
    description: |
      Вывод нового продукта, регуляторная подача документов, готовность к запуску, анализ показателей и вывод из обращения.
  BC-2100.40.10:
    name: Концепция нового продукта
    description: |
      Определение концепции новых страховых продуктов и управление продуктовым комитетом.
  BC-2100.40.20:
    name: Подача и утверждение продукта
    description: |
      Регуляторная подача страховых продуктов и отслеживание утверждений по юрисдикциям.
  BC-2100.40.30:
    name: Готовность к запуску продукта
    description: |
      Операционная и канальная готовность к запуску страховых продуктов.
  BC-2100.40.40:
    name: Анализ показателей продукта
    description: |
      Периодический анализ показателей продуктов и соотношения ценности для денег.
  BC-2100.40.50:
    name: Вывод и замена продукта
    description: |
      Вывод из обращения, замена и миграция страхователей на продукты-преемники.
  BC-2100.50:
    name: Управление пакетированием страховых продуктов
    description: |
      Многолинейные пакеты, пакетные продукты и отслеживание показателей пакетов.
  BC-2100.50.10:
    name: Определение многолинейных пакетов
    description: |
      Определение многолинейных пакетов продуктов и правил их формирования.
  BC-2100.50.20:
    name: Конфигурация правил допустимости пакетов
    description: |
      Правила допустимости и квалификации для пакетов страховых продуктов.
  BC-2100.50.30:
    name: Отслеживание показателей пакетов
    description: |
      Отслеживание охвата пакетами, удержания и экономики.
  BC-2100.60:
    name: Управление специальными и программными продуктами
    description: |
      Определение программного бизнеса, полномочий ковероудержателей и библиотека специальных формулировок.
  BC-2100.60.10:
    name: Определение программы
    description: |
      Определение программного бизнеса и продуктовых структур с полномочием на связывание.
  BC-2100.60.20:
    name: Полномочия ковероудержателей по продукту
    description: |
      Определение объёма продуктов и полномочий, предоставляемых ковероудержателям.
  BC-2100.60.30:
    name: Библиотека специальных формулировок и аддендумов
    description: |
      Библиотека специальных формулировок, рукописных аддендумов и рыночных оговорок.

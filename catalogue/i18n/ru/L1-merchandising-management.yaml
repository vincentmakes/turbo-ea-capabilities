# Управление мерчандайзингом (ru) — translations for L1-merchandising-management.yaml
locale: ru
source: L1-merchandising-management.yaml
entries:
  BC-2300:
    name: Управление мерчандайзингом
    description: |
      Решения по ассортименту, категориям, торговому пространству, закупкам, собственным торговым маркам
      и уценке, определяющие, какие продукты продаются потребителям, где и в каком ассортименте.
  BC-2300.10:
    name: Планирование ассортимента
    description: |
      Архитектура ассортимента, количество позиций и планы ассортимента по кластерам магазинов,
      преобразующие стратегию в конкретные SKU для каждой точки продаж.
    in_scope:
      - Архитектура ассортимента и структура «эконом-стандарт-премиум»
      - Планы ассортимента по кластерам и каналам
      - Ввод новых позиций и слоты для снятия с продажи
    out_of_scope:
      - Общее управление жизненным циклом продукта (BC-820)
      - Прогнозирование спроса (BC-520.10)
  BC-2300.10.10:
    name: Определение архитектуры ассортимента
    description: |
      Определение архитектуры ассортимента, уровней и структуры «эконом-стандарт-премиум» по категориям.
  BC-2300.10.20:
    name: Планирование ассортимента по кластерам магазинов
    description: |
      Планы ассортимента, адаптированные к кластерам магазинов по торговой зоне и потребительскому спросу.
  BC-2300.10.30:
    name: Оптимизация количества позиций
    description: |
      Оптимизация количества SKU по категории для баланса разнообразия, сложности и маржи.
  BC-2300.10.40:
    name: Планирование ввода новых позиций
    description: |
      Размещение и включение в ассортимент новых позиций с учётом периодичности и решений о замене.
  BC-2300.10.50:
    name: Планирование снятия позиций
    description: |
      Решения о выводе позиций из ассортимента, выборе замен и порядке работы со снятыми товарами.
  BC-2300.20:
    name: Управление категориями
    description: |
      Стратегия категорий, определение ролей и управление эффективностью при подходе к каждой
      категории как к самостоятельному бизнесу согласно практике CGF/ECR.
    in_scope:
      - Стратегия категорий и определение ролей
      - Эффективность категорий и сбалансированные показатели
      - Сотрудничество с поставщиками в роли капитана категории
  BC-2300.20.10:
    name: Определение стратегии категории
    description: |
      Определение стратегии категории, целевого покупателя и конкурентного позиционирования.
  BC-2300.20.20:
    name: Присвоение роли категории
    description: |
      Присвоение категориям ролей: целевая, регулярная, удобная или сезонная.
  BC-2300.20.30:
    name: Анализ эффективности категорий
    description: |
      Показатели категорий, доли рынка, рост и анализ маржи.
  BC-2300.20.40:
    name: Взаимодействие с капитаном категории
    description: |
      Взаимодействие с поставщиками-капитанами категорий при соблюдении информационных барьеров.
  BC-2300.30:
    name: Управление торговым пространством и планограммами
    description: |
      Распределение торговой и стеллажной площади, планограммы и расположение торгового оборудования,
      переводящие план ассортимента на физическую или цифровую полку.
  BC-2300.30.10:
    name: Разработка планограммы
    description: |
      Разработка планограмм по категориям, кластерам магазинов и типам оборудования.
  BC-2300.30.20:
    name: Распределение стеллажного пространства
    description: |
      Распределение стеллажного пространства по категориям и брендам в соответствии с показателями.
  BC-2300.30.30:
    name: Расположение торгового оборудования и зонирование
    description: |
      Зонирование торгового зала и расстановка оборудования для поддержки смежного размещения и покупательского потока.
  BC-2300.30.40:
    name: Отслеживание соблюдения планограммы
    description: |
      Отслеживание соблюдения планограмм с помощью аудитов магазинов и систем распознавания изображений.
  BC-2300.40:
    name: Закупки и управление открытым заказом
    description: |
      Планирование открытого заказа, исполнение закупочного плана и распределение по магазинам,
      преобразующие план ассортимента в заказы поставщикам.
    in_scope:
      - Бюджеты открытого заказа по отделам и сезонам
      - Исполнение закупочных планов с поставщиками
      - Распределение полученных товаров по магазинам
    out_of_scope:
      - Общие закупки (BC-500)
  BC-2300.40.10:
    name: Планирование открытого заказа
    description: |
      Бюджетирование открытого заказа по отделам, классам и сезонам.
  BC-2300.40.20:
    name: Исполнение закупочного плана
    description: |
      Исполнение закупочных планов с поставщиками, включая выбор стилей и SKU.
  BC-2300.40.30:
    name: Распределение по магазинам и каналам
    description: |
      Распределение полученных товаров по магазинам и каналам по атрибутам и показателям.
  BC-2300.40.40:
    name: Управление пополняющими закупками
    description: |
      Решения о пополняющих закупках для базовых и никогда не заканчивающихся позиций.
  BC-2300.50:
    name: Управление разработкой СТМ
    description: |
      Стратегия, спецификация, поиск поставщиков и управление брендом собственных торговых марок.
  BC-2300.50.10:
    name: Стратегия собственной торговой марки
    description: |
      Стратегия портфеля СТМ и уровневая структура по собственным брендам.
  BC-2300.50.20:
    name: Спецификация продуктов СТМ
    description: |
      Технические требования к продуктам, задания на упаковку и стандарты качества для собственных брендов.
  BC-2300.50.30:
    name: Поиск поставщиков для СТМ
    description: |
      Поиск контрактных производителей и контрактных упаковщиков для производства СТМ.
  BC-2300.50.40:
    name: Управление брендом СТМ
    description: |
      Управление идентичностью, упаковкой и капиталом собственного бренда.
  BC-2300.60:
    name: Управление уценкой и реализацией остатков
    description: |
      Решения о периодичности уценки, распродажах и реализации остатков для вывода из
      оборота избыточных и устаревших товаров.
    in_scope:
      - Решения о глубине и периодичности уценки
      - Планы распродаж конца сезона
      - Реализация через аутлеты, ликвидация, пожертвование и уничтожение
    out_of_scope:
      - Текущие изменения цен (BC-440.20.20)
      - Промоскидки (BC-440.30)
  BC-2300.60.10:
    name: Стратегия уценки
    description: |
      Стратегия глубины, периодичности и сроков уценки по категориям.
  BC-2300.60.20:
    name: Планирование распродаж конца сезона
    description: |
      Планы распродаж конца сезона и управление ценами выхода.
  BC-2300.60.30:
    name: Маршрутизация остатков
    description: |
      Направление остатков товаров в аутлеты, на ликвидацию, для пожертвования или уничтожения.

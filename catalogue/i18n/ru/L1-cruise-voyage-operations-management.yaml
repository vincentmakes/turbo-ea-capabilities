# Управление круизными рейсами (ru) — translations for L1-cruise-voyage-operations-management.yaml
locale: ru
source: L1-cruise-voyage-operations-management.yaml
entries:
  BC-4090:
    name: Управление круизными рейсами
    description: |
      Операционное управление круизными рейсами — планирование маршрутов, операции в портах и береговые экскурсии, обслуживание кают и гостевые программы, мостиковые и машинные операции, посадка и высадка, санитарный контроль — в соответствии с международными требованиями морской безопасности.
    in_scope:
      - Разработка и развёртывание маршрутов рейсов
      - Операции в портах, тендерные операции, продажа и доставка береговых экскурсий
      - Обслуживание кают, гостевые программы и сервисные операции на борту
      - Мостиковые, машинные и палубные операции
      - Операции посадки и высадки пассажиров
      - Санитарный контроль на борту
    out_of_scope:
      - Продажи и дистрибуция круизных продуктов (BC-4010, BC-4020)
      - Управление отелями на суше (BC-4060)
  BC-4090.10:
    name: Планирование маршрутов рейсов
    description: |
      Планирование маршрутов рейсов, развёртывание, репозиционирование и решения о замене маршрутов.
  BC-4090.10.10:
    name: Разработка и развёртывание маршрутов
    description: |
      Разработка круизных маршрутов и назначение судов на сезоны развёртывания.
  BC-4090.10.20:
    name: Планирование репозиционирования и чартерных рейсов
    description: |
      Планирование репозиционирующих рейсов и чартерных развёртываний между сезонами.
  BC-4090.10.30:
    name: Последовательность заходов в порты
    description: |
      Определение последовательности заходов в порты с учётом приливов, времени стоянки и партнёрских соглашений.
  BC-4090.10.40:
    name: Изменение и замена маршрутов
    description: |
      Оперативное изменение и замена маршрутов в связи с погодными, медицинскими или геополитическими событиями.
  BC-4090.20:
    name: Операции в портах и береговые экскурсии
    description: |
      Операции при заходах в порты, включая разворот, тендерные операции, каталог, продажи и доставку береговых экскурсий.
  BC-4090.20.10:
    name: Операции разворота в порту
    description: |
      Координация операций разворота в порту, включая снабжение, работу с отходами и смену экипажа.
  BC-4090.20.20:
    name: Тендерные операции
    description: |
      Организация тендерного сообщения с судами на якорных стоянках.
  BC-4090.20.30:
    name: Каталог и продажа береговых экскурсий
    description: |
      Формирование каталога и продажа береговых экскурсий гостям через предрейсовые и бортовые каналы.
  BC-4090.20.40:
    name: Координация доставки береговых экскурсий
    description: |
      Координация доставки береговых экскурсий, включая передачу местным операторам и учёт гостей.
  BC-4090.30:
    name: Операции по каютам и каютам класса люкс
    description: |
      Бортовые операции по каютам и каютам класса люкс, включая оборот, назначение, апгрейд и специализированный сервис.
  BC-4090.30.10:
    name: Операции оборота кают
    description: |
      Оборот кают в дни посадки и смены гостей.
  BC-4090.30.20:
    name: Назначение кают и апгрейды
    description: |
      Назначение кают и реализация решений об апгрейде до и во время рейса.
  BC-4090.30.30:
    name: Техническое обслуживание кают
    description: |
      Техническое обслуживание систем и отделки кают в ходе рейса.
  BC-4090.30.40:
    name: Сервисные операции в каютах класса люкс
    description: |
      Сервисные операции для кают класса люкс с услугами дворецкого.
  BC-4090.40:
    name: Бортовые гостевые программы
    description: |
      Бортовые развлекательные программы, активности, детские клубы и операции специализированных залов в ходе рейса.
  BC-4090.40.10:
    name: Операции развлекательных программ
    description: |
      Организация театральных, лаунж и хедлайнерских развлекательных программ на борту.
  BC-4090.40.20:
    name: Операции активностей и просветительских программ
    description: |
      Организация программ активностей и просвещения, включая лекции, мастер-классы и спорт.
  BC-4090.40.30:
    name: Детские и молодёжные программы
    description: |
      Организация детских и молодёжных программ с возрастными активностями и надзором.
  BC-4090.40.40:
    name: Бронирование специализированных залов
    description: |
      Бортовое бронирование специализированных ресторанов, спа и билетных мероприятий.
  BC-4090.50:
    name: Мостиковые и машинные операции
    description: |
      Мостиковые и машинные операции: навигация, движение, портовая документация и координация снабжения.
  BC-4090.50.10:
    name: Мостиковые и навигационные операции
    description: |
      Вахтенное несение и навигационные операции в ходе рейса.
  BC-4090.50.20:
    name: Операции машинного отделения и движителей
    description: |
      Вахтенное несение в машинном отделении и управление движителями.
  BC-4090.50.30:
    name: Портовая документация и оформление
    description: |
      Подготовка портовых документов и управление государственным и таможенным контролем.
  BC-4090.50.40:
    name: Координация бункеровки и снабжения
    description: |
      Координация бункеровки и снабжения при заходах в порты.
  BC-4090.60:
    name: Посадка и высадка пассажиров
    description: |
      Операции посадки и высадки, включая предпосадочную проверку документов, таможенное оформление и работу с багажом.
  BC-4090.60.10:
    name: Предпосадочная проверка документов
    description: |
      Проверка проездных документов и медицинских деклараций гостей перед посадкой.
  BC-4090.60.20:
    name: Операции потока посадки
    description: |
      Организация потоков посадки от терминала до судна в рамках распределённых окон прибытия.
  BC-4090.60.30:
    name: Высадка и таможенное оформление
    description: |
      Организация потоков высадки, включая таможенный и иммиграционный контроль в порту.
  BC-4090.60.40:
    name: Операции с багажом на борту
    description: |
      Управление потоком багажа при посадке, доставке в каюты и высадке.
  BC-4090.70:
    name: Санитарный контроль на круизном судне
    description: |
      Санитарные операции на борту: готовность к инспекциям, выявление и ликвидация вспышек заболеваний, санитарный контроль воды и бассейнов.
  BC-4090.70.10:
    name: Готовность к санитарным инспекциям
    description: |
      Поддержание готовности к инспекциям по VSP, USPH и аналогичным режимам.
  BC-4090.70.20:
    name: Выявление вспышек заболеваний на борту
    description: |
      Выявление желудочно-кишечных и респираторных вспышек через бортовой эпидемиологический надзор.
  BC-4090.70.30:
    name: Операции реагирования на вспышки
    description: |
      Противоэпидемические мероприятия при вспышках, включая локализацию и отчётность.
  BC-4090.70.40:
    name: Санитарный контроль питьевой воды и бассейнов
    description: |
      Санитарный контроль систем питьевой воды и рекреационных водных систем на борту.

# Финансовое планирование и анализ (ru) — translations for L1-financial-planning-analysis.yaml
locale: ru
source: L1-financial-planning-analysis.yaml
entries:
  BC-230:
    name: Финансовое планирование и анализ
    description: |
      Прогнозирование, планирование, анализ результативности и управленческая отчётность.
  BC-230.10:
    name: Управление бюджетированием
    description: |
      Годовой бюджетный процесс и консолидация.
  BC-230.10.10:
    name: Бюджетный календарь и управление процессом
    description: |
      Бюджетный календарь, шаблоны и управление бюджетным процессом.
  BC-230.10.20:
    name: Установка целевых показателей сверху вниз
    description: |
      Определение финансовых целевых показателей сверху вниз в соответствии со стратегией.
  BC-230.10.30:
    name: Формирование бюджета снизу вверх
    description: |
      Бюджетирование снизу вверх по центрам затрат, проектам и продуктам.
  BC-230.10.40:
    name: Консолидация и утверждение бюджета
    description: |
      Групповая консолидация, итерации и окончательное утверждение бюджета.
  BC-230.20:
    name: Управление прогнозированием
    description: |
      Скользящие прогнозы, сценарное планирование.
  BC-230.20.10:
    name: Формирование скользящих прогнозов
    description: |
      Скользящие прогнозы выручки, затрат и денежных потоков с ежемесячной или ежеквартальной периодичностью.
  BC-230.20.20:
    name: Прогнозирование на основе факторов
    description: |
      Применение операционных факторов для прогнозирования финансовых результатов.
  BC-230.20.30:
    name: Сценарное и чувствительностное моделирование
    description: |
      Многосценарное прогнозирование и анализ чувствительности.
  BC-230.20.40:
    name: Отслеживание точности прогнозов
    description: |
      Отслеживание и повышение точности прогнозов по статьям.
  BC-230.30:
    name: Управленческая отчётность
    description: |
      Периодическая управленческая отчётность, KPI, дашборды.
  BC-230.30.10:
    name: Отчётность для исполнительных органов и совета директоров
    description: |
      Исполнительные дашборды и отчёты о результативности для совета директоров.
  BC-230.30.20:
    name: Отчётность по бизнес-единицам
    description: |
      Отчётность в разрезе бизнес-единиц, сегментов и продуктовых линеек.
  BC-230.30.30:
    name: Определение и управление KPI
    description: |
      Таксономия KPI, определения и управление системой показателей.
  BC-230.30.40:
    name: Самостоятельная аналитика для руководства
    description: |
      Обеспечение инструментами самостоятельной аналитики для финансовых бизнес-партнёров.
  BC-230.40:
    name: Управление анализом результативности
    description: |
      Анализ отклонений, прибыльности и детальный анализ.
  BC-230.40.10:
    name: Анализ отклонений план-факт
    description: |
      Анализ отклонений между фактическими данными, бюджетом и прогнозом.
  BC-230.40.20:
    name: Анализ прибыльности
    description: |
      Анализ прибыльности по клиентам, продуктам и каналам.
  BC-230.40.30:
    name: Аналитика затрат и эффективности
    description: |
      Анализ факторов затрат, коэффициентов эффективности и бенчмаркинг.
  BC-230.40.40:
    name: Анализ оборотного капитала
    description: |
      Анализ оборачиваемости дебиторской задолженности, кредиторской задолженности и запасов.
  BC-230.50:
    name: Управление бизнес-кейсами
    description: |
      Разработка, оценка и постфактная проверка бизнес-кейсов.
  BC-230.50.10:
    name: Разработка бизнес-кейсов
    description: |
      Стандартизированные шаблоны и методологии для разработки бизнес-кейсов.
  BC-230.50.20:
    name: Оценка инвестиций
    description: |
      NPV, IRR, срок окупаемости и качественная оценка инвестиций.
  BC-230.50.30:
    name: Управление распределением капитала
    description: |
      Комитеты по согласованию капитальных вложений, пороги и приоритизация.
  BC-230.50.40:
    name: Отслеживание реализации выгод
    description: |
      Постфактные проверки и отслеживание реализованных выгод.

# Академическое качество и аккредитация (ru) — translations for L1-academic-quality-accreditation-management.yaml
locale: ru
source: L1-academic-quality-accreditation-management.yaml
entries:
  BC-4750:
    name: Академическое качество и аккредитация
    description: |
      Внутреннее и внешнее обеспечение качества академических программ и
      учебного заведения, включая проверку, аккредитацию, управление
      стандартами, обратную связь со студентами и непрерывное улучшение.
  BC-4750.10:
    name: Проверка и валидация программ
    description: |
      Валидация новых программ и периодическая ревалидация в соответствии с
      институциональными и внешними академическими стандартами.
    in_scope:
      - Валидация новых программ
      - Периодический пересмотр программ
      - Ревалидация программ
    out_of_scope:
      - Контрольные точки утверждения программ (охватываются управлением учебным планом)
  BC-4750.10.10:
    name: Валидация новых программ
    description: |
      Валидация новых программ на соответствие академическим стандартам
      качества.
  BC-4750.10.20:
    name: Периодический пересмотр программ
    description: |
      Периодическая проверка качества действующих программ и их результатов.
  BC-4750.10.30:
    name: Ревалидация программ
    description: |
      Ревалидация программ по окончании цикла валидации.
  BC-4750.20:
    name: Институциональная самооценка
    description: |
      Самооценка деятельности учебного заведения по стандартам качества и
      сравнительный анализ с коллегами.
    in_scope:
      - Подготовка отчётов о самооценке
      - Сравнительный анализ показателей качества
      - Стратегическое планирование качества
    out_of_scope:
      - Внешние визиты по аккредитации (охватываются координацией аккредитации)
  BC-4750.20.10:
    name: Подготовка отчётов о самооценке
    description: |
      Подготовка институциональных отчётов о самооценке.
  BC-4750.20.20:
    name: Сравнительный анализ показателей качества
    description: |
      Сравнительный анализ показателей качества с аналогичными учебными
      заведениями.
  BC-4750.20.30:
    name: Стратегическое планирование качества
    description: |
      Стратегическое планирование приоритетов и инвестиций в качество
      академической деятельности.
  BC-4750.30:
    name: Координация внешней аккредитации и аудита
    description: |
      Координация с внешними аккредитационными органами и регуляторами
      качества, включая визиты, инспекции и реагирование на результаты.
    in_scope:
      - Взаимодействие с аккредитационными органами
      - Координация визитов и инспекций
      - Реагирование на результаты аккредитации и отслеживание условий
    out_of_scope:
      - Обязательная регуляторная отчётность (охватывается регуляторным соответствием в образовании)
  BC-4750.30.10:
    name: Взаимодействие с аккредитационными органами
    description: |
      Взаимодействие и управление представлением документов в аккредитационные
      органы.
  BC-4750.30.20:
    name: Координация визитов и инспекций
    description: |
      Координация визитов аккредиторов и организационных вопросов инспекций.
  BC-4750.30.30:
    name: Реагирование на результаты аккредитации
    description: |
      Реагирование на результаты аккредитации, условия и рекомендации.
  BC-4750.40:
    name: Управление рамкой стандартов качества
    description: |
      Принятие, картографирование и поддержание академических стандартов
      качества и институциональной политики качества.
    in_scope:
      - Принятие и поддержание стандартов (например, ESG, ABET, AACSB)
      - Разработка политики качества
      - Картографирование стандартов качества на операционную практику
    out_of_scope:
      - Ежедневные операции аудита (охватываются управлением внутренним аудитом)
  BC-4750.40.10:
    name: Принятие и поддержание стандартов
    description: |
      Принятие и поддержание внешних стандартов качества во всём учебном
      заведении.
  BC-4750.40.20:
    name: Разработка политики качества
    description: |
      Разработка и поддержание институциональной политики качества.
  BC-4750.40.30:
    name: Картографирование стандартов качества
    description: |
      Картографирование стандартов качества на операционные процессы и
      контроль.
  BC-4750.50:
    name: Обратная связь со студентами и оценка модулей
    description: |
      Сбор, анализ и замыкание контура по обратной связи со студентами на
      уровне модулей, программ и учебного заведения.
    in_scope:
      - Опросы по оценке модулей
      - Национальные и межинституциональные опросы
      - Анализ обратной связи и замыкание контура
    out_of_scope:
      - Аналитика удовлетворённости вне академического контекста
  BC-4750.50.10:
    name: Опросы по оценке модулей
    description: |
      Проведение опросов для оценки модулей.
  BC-4750.50.20:
    name: Участие в национальных и межинституциональных опросах
    description: |
      Участие в национальных и межинституциональных опросах студентов.
  BC-4750.50.30:
    name: Анализ обратной связи и замыкание контура
    description: |
      Анализ обратной связи и видимое замыкание контура со студентами.
  BC-4750.60:
    name: Непрерывное улучшение и отслеживание мероприятий
    description: |
      Выявление, планирование и отслеживание мероприятий по улучшению
      качества по результатам проверок, аккредитации и обратной связи.
    in_scope:
      - Планирование мероприятий по улучшению
      - Отслеживание реализации мероприятий
      - Репозиторий извлечённых уроков
    out_of_scope:
      - Общие методы улучшения процессов (охватываются управлением качеством)
  BC-4750.60.10:
    name: Планирование мероприятий по улучшению
    description: |
      Планирование мероприятий по улучшению академического качества.
  BC-4750.60.20:
    name: Отслеживание реализации мероприятий
    description: |
      Отслеживание статуса и эффективности мероприятий по качеству.
  BC-4750.60.30:
    name: Репозиторий извлечённых уроков
    description: |
      Систематизация извлечённых уроков по результатам проверок и циклов
      аккредитации.

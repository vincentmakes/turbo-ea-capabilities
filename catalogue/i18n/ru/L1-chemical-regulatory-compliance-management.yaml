# Регуляторное соответствие в химической отрасли (ru) — translations for L1-chemical-regulatory-compliance-management.yaml
locale: ru
source: L1-chemical-regulatory-compliance-management.yaml
entries:
  BC-4660:
    name: Регуляторное соответствие в химической отрасли
    description: |
      Регистрация веществ, досье, разрешения, ограничения, включение в реестры
      и контроль импорта/экспорта в соответствии с REACH, TSCA, K-REACH,
      КХО и эквивалентными режимами.
  BC-4660.10:
    name: Управление регистрацией веществ
    description: |
      Регистрация веществ в основных мировых реестрах химических веществ.
  BC-4660.10.10:
    name: Управление регистрацией REACH
    description: |
      Управление регистрациями REACH, включая SIEF и совместные представления.
  BC-4660.10.20:
    name: Уведомление TSCA и внесение в реестр
    description: |
      Уведомление о предпроизводственном использовании и внесение в реестр TSCA.
  BC-4660.10.30:
    name: Уведомление по K-REACH и режимам АТР
    description: |
      Уведомление в соответствии с K-REACH, китайскими, японскими и иными
      азиатско-тихоокеанскими режимами.
  BC-4660.10.40:
    name: Управление уведомлениями по полимерам
    description: |
      Управление уведомлениями и изъятиями из-под действия требований для
      полимерных веществ.
  BC-4660.20:
    name: Управление разрешениями и ограничениями
    description: |
      Соблюдение требований по разрешениям, ограничениям и контролю
      возникающих ограничений для веществ.
  BC-4660.20.10:
    name: Заявка на разрешение в рамках REACH
    description: |
      Подготовка и подача заявок на разрешение в соответствии с Приложением
      XIV к REACH.
  BC-4660.20.20:
    name: Соблюдение ограничений REACH
    description: |
      Соблюдение ограничений, указанных в Приложении XVII к REACH.
  BC-4660.20.30:
    name: Отслеживание списка кандидатов SVHC
    description: |
      Отслеживание обновлений списка кандидатов SVHC и анализ воздействия.
  BC-4660.20.40:
    name: Управление ограничениями по PFAS и возникающими ограничениями
    description: |
      Управление ограничениями по PFAS, микропластикам и иным возникающим
      ограничениям.
  BC-4660.30:
    name: Управление регуляторными досье
    description: |
      Составление и поддержание регуляторных досье в формате IUCLID и
      эквивалентных форматах.
  BC-4660.30.10:
    name: Управление досье IUCLID
    description: |
      Составление и поддержание досье в системе IUCLID 6.
  BC-4660.30.20:
    name: Подготовка отчётов по химической безопасности
    description: |
      Подготовка отчётов по химической безопасности в соответствии с
      Приложением I к REACH.
  BC-4660.30.30:
    name: Ведение профиля идентичности вещества
    description: |
      Ведение профилей идентичности вещества и аналитических подтверждений.
  BC-4660.40:
    name: Управление включением в реестры
    description: |
      Управление включением веществ в EINECS, EC и национальные реестры
      химических веществ.
  BC-4660.40.10:
    name: Управление номерами EINECS и EC
    description: |
      Управление присвоением и обновлением номеров EINECS и EC.
  BC-4660.40.20:
    name: Уведомление о новых веществах
    description: |
      Уведомление национальных реестров о новых веществах.
  BC-4660.40.30:
    name: Сверка с национальными реестрами
    description: |
      Сверка портфеля с национальными реестрами химических веществ.
  BC-4660.50:
    name: Контроль химического импорта и экспорта
    description: |
      Соблюдение международных норм контроля химической торговли, включая
      КХО, прекурсоры наркотиков, двойное применение и ПИС.
  BC-4660.50.10:
    name: Соблюдение требований расписаний КХО
    description: |
      Соблюдение требований декларирования и лицензирования по расписаниям
      1, 2 и 3 ОЗХО.
  BC-4660.50.20:
    name: Контроль прекурсоров наркотиков
    description: |
      Соблюдение требований МККН и национальных режимов контроля прекурсоров
      наркотиков.
  BC-4660.50.30:
    name: Лицензирование экспорта продукции двойного применения
    description: |
      Лицензирование и проверка конечного использования при экспорте химической
      продукции двойного применения.
  BC-4660.50.40:
    name: Соблюдение принципа предварительного обоснованного согласия
    description: |
      Соблюдение режима предварительного обоснованного согласия Роттердамской
      конвенции.
  BC-4660.60:
    name: Мониторинг и анализ регуляторных изменений
    description: |
      Мониторинг и оценка воздействия развивающегося химического законодательства
      на рынках.
  BC-4660.60.10:
    name: Мониторинг горизонта регуляторных изменений
    description: |
      Мониторинг ожидаемых и новых химических нормативных требований.
  BC-4660.60.20:
    name: Оценка воздействия регуляторных изменений
    description: |
      Оценка воздействия регуляторных изменений на портфель и деятельность.
  BC-4660.60.30:
    name: Взаимодействие с отраслевыми ассоциациями
    description: |
      Взаимодействие с Cefic, ACC и эквивалентными отраслевыми объединениями.
  BC-4660.70:
    name: Взаимодействие с регуляторами и подача документов
    description: |
      Взаимодействие с регуляторными органами, включая представление документов,
      запросы и инспекции.
  BC-4660.70.10:
    name: Подготовка материалов для регуляторов
    description: |
      Подготовка материалов для ECHA, EPA и эквивалентных регуляторных органов.
  BC-4660.70.20:
    name: Ответы на запросы регуляторов
    description: |
      Ответы на запросы регуляторов по досье и регистрациям.
  BC-4660.70.30:
    name: Готовность к инспекциям
    description: |
      Поддержание готовности к инспекциям и аудитам регуляторов.

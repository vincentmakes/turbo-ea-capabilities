# Оказание клинической помощи (ru) — translations for L1-clinical-care-delivery-management.yaml
locale: ru
source: L1-clinical-care-delivery-management.yaml
entries:
  BC-2810:
    name: Оказание клинической помощи
    description: |
      Оказание непосредственной клинической помощи в стационарных, амбулаторных, экстренных, хирургических, акушерских, психиатрических, реабилитационных условиях и на дому.
  BC-2810.10:
    name: Оказание стационарной помощи
    description: |
      Оказание острой, промежуточной и интенсивной стационарной помощи, включая осмотр, обходы, уход у постели и операции интенсивной терапии.
  BC-2810.10.10:
    name: Осмотр при поступлении
    description: |
      Сбор анамнеза, физикальный и сестринский осмотр, скрининг рисков при поступлении.
  BC-2810.10.20:
    name: Клинические обходы
    description: |
      Мультидисциплинарные клинические обходы и планирование ухода у постели пациента.
  BC-2810.10.30:
    name: Уход у постели пациента
    description: |
      Непосредственный сестринский и клинический уход у постели, включая поддержку повседневной деятельности.
  BC-2810.10.40:
    name: Операции интенсивной терапии
    description: |
      Операции интенсивной терапии, включая уход с ИВЛ, гемодинамический мониторинг и непрерывный контроль состояния.
  BC-2810.20:
    name: Оказание амбулаторной помощи
    description: |
      Оказание амбулаторных, телемедицинских и поликлинических процедурных и лечебных услуг в клинических и дневных стационарах.
  BC-2810.20.10:
    name: Проведение амбулаторного визита
    description: |
      Проведение офисных и клинических визитов, включая первичные и специализированные консультации.
  BC-2810.20.20:
    name: Выполнение амбулаторных процедур
    description: |
      Выполнение дневных и амбулаторных процедур, включая малую хирургию и инфузии.
  BC-2810.20.30:
    name: Телемедицинские приёмы
    description: |
      Проведение синхронных и асинхронных телемедицинских приёмов.
  BC-2810.20.40:
    name: Проведение амбулаторного лечения
    description: |
      Проведение амбулаторного лечения — химиотерапии, диализа, инфузий.
  BC-2810.30:
    name: Оказание экстренной помощи
    description: |
      Проведение сортировки, стабилизации, реагирования на травму и принятия решений о дальнейшей тактике в приёмном отделении.
  BC-2810.30.10:
    name: Сортировка в приёмном отделении
    description: |
      Сортировка и определение тяжести состояния пациентов, поступивших в приёмное отделение.
  BC-2810.30.20:
    name: Экстренная стабилизация
    description: |
      Первичный осмотр, реанимация и стабилизация остро больных и травмированных пациентов.
  BC-2810.30.30:
    name: Реагирование на травму
    description: |
      Активация травматологической бригады, её реагирование и повреждение-контролирующая помощь при тяжёлых травмах.
  BC-2810.30.40:
    name: Диспозиция из приёмного отделения
    description: |
      Принятие решений о дальнейшей тактике: госпитализация, перевод, наблюдение или выписка из приёмного отделения.
  BC-2810.40:
    name: Хирургическая и процедурная помощь
    description: |
      Предоперационный, интраоперационный и послеоперационный уход при хирургических и интервенционных процедурах в операционных и процедурных блоках.
  BC-2810.40.10:
    name: Предоперационный уход
    description: |
      Предоперационная оценка, оптимизация и уход в предоперационной зоне.
  BC-2810.40.20:
    name: Интраоперационное ведение
    description: |
      Интраоперационный хирургический, анестезиологический уход и уход циркулирующей медсестры.
  BC-2810.40.30:
    name: Послеанестезиологический уход
    description: |
      Восстановление в палате пробуждения и оценка готовности к выписке.
  BC-2810.40.40:
    name: Эндоскопия и интервенционные процедуры
    description: |
      Выполнение эндоскопических, интервенционно-радиологических и интервенционно-кардиологических процедур.
  BC-2810.50:
    name: Акушерская и неонатальная помощь
    description: |
      Антенатальная, интранатальная, постнатальная помощь и уход за новорождёнными в акушерских и неонатальных службах.
  BC-2810.50.10:
    name: Антенатальный уход
    description: |
      Пренатальная оценка, скрининг и антенатальные госпитализации.
  BC-2810.50.20:
    name: Интранатальный уход
    description: |
      Ведение родов, включая кесарево сечение и оперативные роды.
  BC-2810.50.30:
    name: Послеродовой уход
    description: |
      Послеродовое восстановление матери, поддержка грудного вскармливания и обучение.
  BC-2810.50.40:
    name: Уход за новорождёнными
    description: |
      Уход в палате новорождённых, скрининг и оказание помощи в неонатальном отделении интенсивной терапии.
  BC-2810.60:
    name: Психиатрическая помощь
    description: |
      Психиатрическая помощь: психиатрическая оценка, стационарные психиатрические отделения, амбулаторная психотерапия и лечение зависимостей.
  BC-2810.60.10:
    name: Психиатрическая оценка
    description: |
      Психиатрическая и психологическая оценка и кризисная интервенция.
  BC-2810.60.20:
    name: Стационарная психиатрическая помощь
    description: |
      Стационарная психиатрическая помощь, включая средовую терапию и фармакотерапию.
  BC-2810.60.30:
    name: Амбулаторная психотерапия
    description: |
      Амбулаторная психотерапия, групповая терапия и программы частичной госпитализации.
  BC-2810.60.40:
    name: Лечение зависимостей
    description: |
      Детоксикация, медикаментозно-ассистированное лечение и реабилитация при расстройствах, связанных с употреблением психоактивных веществ.
  BC-2810.70:
    name: Реабилитация и терапевтические услуги
    description: |
      Физиотерапия, трудотерапия, речевая терапия и кардиопульмональная реабилитация в стационарных и амбулаторных условиях.
  BC-2810.70.10:
    name: Физиотерапия
    description: |
      Физиотерапевтическая оценка и лечение в стационарных и амбулаторных условиях.
  BC-2810.70.20:
    name: Трудотерапия
    description: |
      Трудотерапевтическая оценка и лечение, направленные на функциональную независимость.
  BC-2810.70.30:
    name: Логопедия
    description: |
      Речевая, языковая и дисфагологическая терапия.
  BC-2810.70.40:
    name: Кардиологическая и пульмональная реабилитация
    description: |
      Проведение программ кардиологической и пульмональной реабилитации.
  BC-2810.80:
    name: Домашняя и общественная помощь
    description: |
      Помощь, оказываемая на дому или по месту жительства пациента, включая визиты медсестры, хосписную помощь и дистанционный мониторинг.
  BC-2810.80.10:
    name: Визиты патронажной медсестры
    description: |
      Квалифицированные патронажные визиты, включая сестринский уход и терапию на дому.
  BC-2810.80.20:
    name: Хосписная и паллиативная помощь на дому
    description: |
      Уход в конце жизни и паллиативная помощь, оказываемая на дому.
  BC-2810.80.30:
    name: Визиты общественного медицинского работника
    description: |
      Визиты общественного медицинского работника и программы охвата населения.
  BC-2810.80.40:
    name: Дистанционный мониторинг пациентов
    description: |
      Услуги дистанционного мониторинга для хронических и постстационарных пациентов.

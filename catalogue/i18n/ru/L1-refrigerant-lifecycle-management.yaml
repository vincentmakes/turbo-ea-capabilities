# Управление жизненным циклом хладагентов (ru) — translations for L1-refrigerant-lifecycle-management.yaml
locale: ru
source: L1-refrigerant-lifecycle-management.yaml
entries:
  BC-2040:
    name: Управление жизненным циклом хладагентов
    description: |
      Операционный жизненный цикл хладагентов по всей установленной базе — закупки и запасы, учёт заправки, рекуперация и рекламация, управление утечками, регуляторная отчётность по F-Gas / EPA Section 608 / Кигальской поправке, сертификация специалистов, переход на новые хладагенты и утилизация.
    in_scope:
      - Закупка, распределение и хранение хладагентов
      - Учёт заправки на уровне актива и сверка по материальному балансу
      - Полевая рекуперация, рекламация и контроль качества рекламированного хладагента
      - Обнаружение утечек, их устранение и регуляторная отчётность о нормах утечек
      - Сертификация специалистов по обращению с хладагентами и отслеживание компетентности
      - Дорожные карты перехода на новые хладагенты и вывода из обращения
      - Уничтожение с истёкшим сроком службы и сертифицированная утилизация
    out_of_scope:
      - Разрешения на хладагенты на уровне продукта при сертификации (BC-2030)
      - Выбор холодильного цикла и хладагента при проектировании оборудования (BC-2000)
      - Общее соответствие требованиям охраны окружающей среды, не связанное с хладагентами (BC-740)
  BC-2040.10:
    name: Закупки и управление запасами хладагентов
    description: |
      Закупка, распределение, хранение и сверка запасов хладагентов по всем операционным площадкам.
  BC-2040.10.10:
    name: Закупка хладагентов
    description: |
      Закупка хладагентов у утверждённых поставщиков.
  BC-2040.10.20:
    name: Управление распределением квот
    description: |
      Распределение регуляторных квот между бизнес-единицами и рынками.
  BC-2040.10.30:
    name: Хранение и обращение с хладагентами
    description: |
      Хранение и обращение с баллонами хладагентов согласно правилам безопасности и охраны окружающей среды.
  BC-2040.10.40:
    name: Сверка запасов хладагентов
    description: |
      Периодическая сверка запасов хладагентов по площадкам и полевым запасам.
  BC-2040.20:
    name: Учёт заправки хладагентом
    description: |
      Учёт заправки, дозаправки и аудита баланса хладагентов на уровне актива.
  BC-2040.20.10:
    name: Записи о заправке по активам
    description: |
      Записи об установленной заправке хладагента по единицам оборудования.
  BC-2040.20.20:
    name: Регистрация дозаправок
    description: |
      Регистрация дозаправок и дополнительных заправок по событиям обслуживания оборудования.
  BC-2040.20.30:
    name: Аудит точности учёта заправки
    description: |
      Аудит точности учёта заправки по всей установленной базе.
  BC-2040.20.40:
    name: Сверка по материальному балансу
    description: |
      Сверка по материальному балансу: закупленный, использованный, рекуперированный и утилизированный хладагент.
  BC-2040.30:
    name: Операции рекуперации и рекламации хладагентов
    description: |
      Полевая рекуперация и последующая рекламация хладагента для повторного использования.
  BC-2040.30.10:
    name: Операции полевой рекуперации
    description: |
      Рекуперация хладагента на месте из оборудования, находящегося на обслуживании.
  BC-2040.30.20:
    name: Рекламация хладагента
    description: |
      Переработка рекуперированного хладагента до требований к первичному продукту.
  BC-2040.30.30:
    name: Верификация качества рекламированного хладагента
    description: |
      Верификация качества рекламированного хладагента перед повторным использованием.
  BC-2040.30.40:
    name: Управление банком рекуперированных хладагентов
    description: |
      Управление банком хладагентов, содержащим рекламированный продукт для повторного использования.
  BC-2040.40:
    name: Управление утечками хладагентов
    description: |
      Обнаружение, устранение и отчётность об утечках хладагентов по всей установленной базе.
  BC-2040.40.10:
    name: Мониторинг обнаружения утечек
    description: |
      Непрерывный и периодический мониторинг утечек оборудования.
  BC-2040.40.20:
    name: Процесс устранения утечек
    description: |
      Процесс диагностики и устранения выявленных утечек.
  BC-2040.40.30:
    name: Отчётность о нормах утечек
    description: |
      Отчётность о нормах утечек относительно нормативных порогов.
  BC-2040.40.40:
    name: Анализ проблемных зон утечек
    description: |
      Анализ повторяющихся проблемных зон утечек для изменения оборудования или процессов.
  BC-2040.50:
    name: Регуляторная отчётность по хладагентам
    description: |
      Регуляторная отчётность об использовании хладагентов, утечках, рекуперации и раскрытии информации о веществах.
  BC-2040.50.10:
    name: Ежегодная отчётность по F-Gas
    description: |
      Ежегодная отчётность в соответствии с регламентом ЕС по F-Gas.
  BC-2040.50.20:
    name: Национальная отчётность по хладагентам
    description: |
      Отчётность по национальным программам учёта хладагентов (например, отчётность EPA в США).
  BC-2040.50.30:
    name: Отчётность по Кигальской поправке и Монреальскому протоколу
    description: |
      Отчётность по обязательствам Кигальской поправки и Монреальского протокола.
  BC-2040.50.40:
    name: Раскрытие информации об инвентаре веществ
    description: |
      Раскрытие информации об инвентаре веществ регуляторам и заинтересованным сторонам.
  BC-2040.60:
    name: Управление сертификацией специалистов по хладагентам
    description: |
      Управление сертификатами, лицензиями и компетентностью специалистов по обращению с хладагентами.
  BC-2040.60.10:
    name: Записи о сертификации специалистов
    description: |
      Записи о сертификатах специалистов по хладагентам.
  BC-2040.60.20:
    name: Отслеживание продления сертификатов
    description: |
      Отслеживание предстоящих продлений сертификатов.
  BC-2040.60.30:
    name: Национальные лицензии на обращение с хладагентами
    description: |
      Управление национальными лицензиями на обращение с хладагентами (EPA Section 608, категории F-Gas).
  BC-2040.60.40:
    name: Верификация компетентности
    description: |
      Периодическая верификация компетентности специалистов, работающих с хладагентами.
  BC-2040.70:
    name: Управление выводом хладагентов и переходом
    description: |
      Стратегическое управление выводом хладагентов из обращения и дорожными картами перехода для заказчиков.
  BC-2040.70.10:
    name: Дорожная карта замены хладагентов
    description: |
      Дорожная карта замены выводимых хладагентов альтернативами с меньшим GWP.
  BC-2040.70.20:
    name: Планирование конвертации при ретрофите
    description: |
      Планирование конвертации установленного оборудования на альтернативные хладагенты.
  BC-2040.70.30:
    name: Коммуникация с заказчиками о переходе
    description: |
      Информирование заказчиков о переходе на новые хладагенты и сроках.
  BC-2040.70.40:
    name: Управление рисками вывода из обращения
    description: |
      Управление рисками поставок, регуляторными и репутационными рисками в период вывода хладагентов.
  BC-2040.80:
    name: Утилизация хладагентов с истёкшим сроком службы
    description: |
      Уничтожение и сертифицированная утилизация хладагентов, непригодных для повторного использования.
  BC-2040.80.10:
    name: Координация уничтожения
    description: |
      Координация с утверждёнными объектами уничтожения.
  BC-2040.80.20:
    name: Аудиторский след сертифицированной утилизации
    description: |
      Ведение аудиторского следа, подтверждающего сертифицированную утилизацию.
  BC-2040.80.30:
    name: Рекуперация хладагента из активов в конце срока службы
    description: |
      Рекуперация хладагента из активов, достигших конца срока службы, до утилизации.
  BC-2040.80.40:
    name: Управление поставщиками утилизации
    description: |
      Управление утверждёнными поставщиками утилизации и программой аудита.

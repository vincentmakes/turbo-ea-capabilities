# Соответствие требованиям и регуляторное управление в недвижимости (ru) — translations for L1-real-estate-compliance-regulatory-management.yaml
locale: ru
source: L1-real-estate-compliance-regulatory-management.yaml
entries:
  BC-4990:
    name: Соответствие требованиям и регуляторное управление в недвижимости
    description: |
      Дисциплина соответствия специфическим регуляторным режимам
      недвижимости, дополняющим общее корпоративное управление
      соответствием, — лицензирование брокеров и агентов, справедливое
      жильё и недискриминация, ПОД/ФТ в недвижимости и бенефициарное
      владение, раскрытие информации при расчёте и ипотеке (RESPA /
      TRID), энергоэффективность зданий, регулирование арендных
      отношений, регулирование кондоминиумов / ТСЖ / стратата и
      соответствие фондов и советников.
    in_scope:
      - Поддержание лицензий брокерской компании и агентов
      - Соответствие Закону о справедливом жилье, Закону о равенстве, ECOA
      - ПОД/ФТ в недвижимости, бенефициарное владение, санкции и отчётность SAR
      - Соответствие RESPA, TRID и раскрытие аффилированных бизнес-договорённостей
      - Раскрытие информации об энергоэффективности зданий и соответствие MEES
      - Стабилизация арендной платы, уведомления о выселении, хранение залога, регистрация краткосрочной аренды
      - Раскрытие информации спонсором кондоминиума / ТСЖ / стратата и правила резервных фондов
      - Соответствие фондов и советников по AIFMD, ELTIF и Закону об инвестиционных советниках
    out_of_scope:
      - Корпоративное управление соответствием (BC-130)
      - Режимы кибербезопасности и конфиденциальности (BC-620)
      - Общий ПОД/ФТ по небанковским организациям (BC-1400)
      - Налоговое администрирование (BC-220)
  BC-4990.10:
    name: Соответствие лицензионным требованиям брокеров и агентов
    description: |
      Соответствие режимам лицензирования брокеров и агентов,
      включая поддержание лицензий компании, непрерывное обучение и
      надзор ответственного брокера.
  BC-4990.10.10:
    name: Поддержание лицензий компании
    description: |
      Поддержание лицензий брокерской компании в регионах
      деятельности.
  BC-4990.10.20:
    name: Лицензирование агентов и непрерывное обучение
    description: |
      Учёт индивидуальных лицензий агентов и требований к
      непрерывному обучению.
  BC-4990.10.30:
    name: Надзор ответственного брокера
    description: |
      Надзор ответственного брокера за регулируемой деятельностью
      компании.
  BC-4990.10.40:
    name: Продление лицензий и ответы на аудит
    description: |
      Продление лицензий и ответы на аудиты и проверки регуляторов.
  BC-4990.20:
    name: Соответствие требованиям справедливого жилья и недискриминации
    description: |
      Соответствие Закону о справедливом жилье, Закону о равенстве,
      ECOA и эквивалентным режимам недискриминации в арендных,
      продажных и кредитных точках контакта.
  BC-4990.20.10:
    name: Поддержание политики справедливого жилья
    description: |
      Поддержание политик справедливого жилья и стандартных
      операционных процедур.
  BC-4990.20.20:
    name: Проверка рекламы и источников финансирования
    description: |
      Проверка рекламных материалов и правил об источниках
      финансирования на соответствие ограничениям по защищённым
      категориям.
  BC-4990.20.30:
    name: Рассмотрение жалоб на дискриминацию
    description: |
      Рассмотрение жалоб на жилищную дискриминацию и запросов
      регуляторов.
  BC-4990.20.40:
    name: Обучение и аттестация по справедливому жилью
    description: |
      Обучение и аттестация агентов и сотрудников по обязательствам
      в сфере справедливого жилья.
  BC-4990.30:
    name: Соответствие ПОД/ФТ и санкционным требованиям в недвижимости
    description: |
      Соответствие специфическим правилам ПОД/ФТ в недвижимости,
      включая ГТО FinCEN, Правило FinCEN о жилой недвижимости,
      обязательства AMLD 5/6 для нефинансовых организаций и
      отчётность о бенефициарном владении.
  BC-4990.30.10:
    name: Сбор данных о бенефициарном владении
    description: |
      Сбор и верификация данных о бенефициарном владении сторонами
      сделок с недвижимостью.
  BC-4990.30.20:
    name: Санкционная проверка и проверка ПЭП в недвижимости
    description: |
      Проверка сторон сделок по санкционным, ПЭП и
      неблагоприятным медиа-спискам.
  BC-4990.30.30:
    name: Отчётность о подозрительных операциях в недвижимости
    description: |
      Подача отчётов о подозрительных операциях по подпадающим под
      регулирование сделкам с недвижимостью.
  BC-4990.30.40:
    name: Аудит ПОД/ФТ и проверки регуляторов
    description: |
      Ответы на аудиты ПОД/ФТ и проверки регуляторов по программам
      ПОД/ФТ в недвижимости.
  BC-4990.40:
    name: Соответствие требованиям к расчёту и ипотечному раскрытию
    description: |
      Соответствие правилам RESPA и TRID о расчёте и ипотечном
      раскрытии в США и эквивалентным региональным режимам.
  BC-4990.40.10:
    name: Подготовка оценки кредита и заключительного раскрытия
    description: |
      Подготовка документов TRID «Оценка кредита» и «Заключительное
      раскрытие» в установленные сроки.
  BC-4990.40.20:
    name: Раскрытие аффилированных бизнес-договорённостей
    description: |
      Раскрытие аффилированных бизнес-договорённостей в требуемых
      точках транзакции.
  BC-4990.40.30:
    name: Соответствие требованиям к расчётным услугам
    description: |
      Соответствие правилам о направлении к поставщикам расчётных
      услуг и запретам Раздела 8.
  BC-4990.40.40:
    name: Ответы на аудит RESPA
    description: |
      Ответы на проверки CFPB и государственных регуляторов по
      соответствию RESPA.
  BC-4990.50:
    name: Соответствие требованиям к энергоэффективности зданий
    description: |
      Соответствие EPC, MEES, стандартам эффективности зданий и
      законам о бенчмаркинге (например, Local Law 97, EPBD).
  BC-4990.50.10:
    name: Соответствие EPC и энергетическому рейтингу
    description: |
      Получение и регистрация сертификатов энергоэффективности и
      аналогов.
  BC-4990.50.20:
    name: Соответствие минимальным стандартам энергоэффективности (MEES)
    description: |
      Соответствие минимальным стандартам энергоэффективности для
      сдаваемых и продаваемых объектов.
  BC-4990.50.30:
    name: Раскрытие данных о бенчмаркинге энергопотребления (LL97 / BPS)
    description: |
      Раскрытие данных по городским ордонансам о бенчмаркинге
      энергопотребления и стандартам эффективности зданий.
  BC-4990.50.40:
    name: Соответствие отчётности по EPBD ЕС
    description: |
      Соответствие требованиям отчётности и сертификации Директивы
      ЕС об энергетической эффективности зданий.
  BC-4990.60:
    name: Соответствие требованиям регулирования арендных отношений
    description: |
      Соответствие режимам контроля / стабилизации арендной платы,
      уведомлений о выселении, законодательного хранения залога и
      регистрации краткосрочной аренды.
  BC-4990.60.10:
    name: Соответствие контролю и стабилизации арендной платы
    description: |
      Соответствие режимам контроля и стабилизации арендной платы
      по регулируемым объектам.
  BC-4990.60.20:
    name: Соответствие требованиям к уведомлению и процедуре выселения
    description: |
      Соответствие законодательным требованиям к уведомлению и
      процедуре выселения.
  BC-4990.60.30:
    name: Законодательное хранение залогового депозита
    description: |
      Законодательное хранение залоговых депозитов, включая
      эскроу, начисление процентов и правила возврата.
  BC-4990.60.40:
    name: Соответствие регистрации краткосрочной аренды
    description: |
      Соответствие требованиям регистрации и правилам работы
      краткосрочной аренды в регулируемых городах.
  BC-4990.70:
    name: Соответствие требованиям регулирования кондоминиумов, ТСЖ и стратата
    description: |
      Соответствие регуляторным режимам кондоминиумов, ТСЖ,
      управляющих компаний и стратата, включая раскрытие информации
      спонсором и правила резервных фондов.
  BC-4990.70.10:
    name: Раскрытие информации спонсором кондоминиума / стратата
    description: |
      Обязательства по раскрытию информации спонсором в рамках
      регулирования кондоминиума и стратата.
  BC-4990.70.20:
    name: Регистрация ТСЖ и управляющей компании
    description: |
      Регистрация и текущая подача документов для организаций ТСЖ и
      управляющих компаний.
  BC-4990.70.30:
    name: Соответствие раскрытию резервного фонда
    description: |
      Соответствие требованиям к исследованию и раскрытию резервного
      фонда.
  BC-4990.70.40:
    name: Соответствие требованиям к справке при перепродаже
    description: |
      Выдача справок при перепродаже и сопутствующего раскрытия
      информации при продаже квартир в кондоминиуме и ТСЖ.
  BC-4990.80:
    name: Соответствие требованиям регулирования фондов и советников
    description: |
      Соответствие AIFMD, ELTIF, Закону США об инвестиционных
      советниках и эквивалентным режимам регулирования фондов и
      советников в сфере управления фондами недвижимости.
  BC-4990.80.10:
    name: Регистрация советника фонда
    description: |
      Поддержание регистраций и авторизаций советников и управляющих
      фондов.
  BC-4990.80.20:
    name: Соответствие отчётности AIFMD / ELTIF
    description: |
      Соответствие обязательствам по отчётности AIFMD Приложение IV
      и ELTIF.
  BC-4990.80.30:
    name: Маркетинг и трансграничные уведомления
    description: |
      Соответствие режимам уведомлений о трансграничном маркетинге
      фондов.
  BC-4990.80.40:
    name: Аудит и проверки регуляторов фондов
    description: |
      Ответы на аудиты и проверки регуляторов фондов в разных
      юрисдикциях.

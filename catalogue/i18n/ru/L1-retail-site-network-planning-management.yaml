# Планирование сети магазинов (ru) — translations for L1-retail-site-network-planning-management.yaml
locale: ru
source: L1-retail-site-network-planning-management.yaml
entries:
  BC-2350:
    name: Планирование сети магазинов
    description: |
      Выбор, масштабирование и управление жизненным циклом физической розничной сети —
      анализ торговых зон, выбор формата, определение незаполненных ниш и
      решения по жизненному циклу каждого магазина.
  BC-2350.10:
    name: Анализ торговой зоны и зоны охвата
    description: |
      Определение зон охвата, микроанализ пешеходного потока и демографии,
      а также оценка плотности конкурентов для потенциальных и действующих объектов.
  BC-2350.10.10:
    name: Определение зоны охвата
    description: |
      Определение зон охвата на основе времени езды, плотности населения и барьеров.
  BC-2350.10.20:
    name: Демографический микроанализ
    description: |
      Детальный демографический и поведенческий анализ зон охвата.
  BC-2350.10.30:
    name: Анализ пешеходного потока и мобильности
    description: |
      Анализ пешеходного потока, данных о мобильности и интенсивности пешеходного трафика.
  BC-2350.10.40:
    name: Анализ плотности конкурентов
    description: |
      Анализ плотности конкурентов и доли в торговой зоне.
  BC-2350.20:
    name: Управление выбором формата магазина
    description: |
      Выбор подходящего формата магазина — гипермаркет, супермаркет, магазин у дома,
      специализированный, тёмный склад — для данной торговой зоны и стратегии.
    in_scope:
      - Выбор формата по торговой зоне и потребительской миссии
      - Структура форматного портфеля сети
      - Масштабирование и площадь магазина по формату
    out_of_scope:
      - Детальный дизайн интерьера магазина (BC-2310.60)
  BC-2350.20.10:
    name: Выбор формата по торговой зоне
    description: |
      Выбор формата магазина по торговой зоне на основе потребительской миссии.
  BC-2350.20.20:
    name: Масштабирование и площадь формата
    description: |
      Определение площади торгового зала, подсобных помещений и общей площади по формату.
  BC-2350.20.30:
    name: Планирование форматного портфеля сети
    description: |
      Планирование форматного состава сети и переходов между форматами.
  BC-2350.30:
    name: Оптимизация размера сети
    description: |
      Оптимизация размера сети путём выявления незаполненных ниш, анализа
      каннибализации и общего охвата рынка.
  BC-2350.30.10:
    name: Выявление незаполненных ниш
    description: |
      Выявление неохваченных торговых зон и возможностей для открытия магазинов.
  BC-2350.30.20:
    name: Моделирование каннибализации
    description: |
      Моделирование влияния нового магазина на продажи существующих.
  BC-2350.30.30:
    name: Оптимизация охвата и доступности
    description: |
      Оптимизация охвата и доступности на целевом рынке.
  BC-2350.40:
    name: Управление жизненным циклом магазина
    description: |
      Решения по жизненному циклу каждого магазина — переезд, ремонт, изменение
      формата или закрытие на основе показателей и изменений торговой зоны.
  BC-2350.40.10:
    name: Диагностика эффективности магазина
    description: |
      Диагностика неэффективных магазинов, включая изменения торговой зоны.
  BC-2350.40.20:
    name: Решения о переезде и реконструкции магазина
    description: |
      Решения о переезде или реконструкции магазинов в сравнении с альтернативами.
  BC-2350.40.30:
    name: Принятие решений о закрытии магазина
    description: |
      Принятие решений о закрытии магазина с учётом влияния на заинтересованные стороны и товарные запасы.
  BC-2350.50:
    name: Управление розничными заданиями на поиск объектов
    description: |
      Розничные задания по недвижимости, передаваемые корпоративным командам
      по работе с недвижимостью для приобретения, аренды и выхода.
    in_scope:
      - Розничные задания по объектам
      - Передача корпоративному отделу по недвижимости (BC-710.20)
      - Розничные задания по выходу (например, торговые ограничения)
    out_of_scope:
      - Переговоры об аренде и администрирование (BC-710.20, BC-710.30)
  BC-2350.50.10:
    name: Составление розничного задания на объект
    description: |
      Составление розничного задания на объект с указанием требований к формату и соседству.
  BC-2350.50.20:
    name: Составление розничного задания на выход
    description: |
      Составление розничного задания на выход, включая позицию по торговым ограничениям.

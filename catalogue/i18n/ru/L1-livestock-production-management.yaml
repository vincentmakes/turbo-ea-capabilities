# Животноводство (ru) — translations for L1-livestock-production-management.yaml
locale: ru
source: L1-livestock-production-management.yaml
entries:
  BC-3510:
    name: Животноводство
    description: |
      Производство наземных животных на ферме — планирование стада и поголовья,
      разведение, кормление, здоровье, благополучие, отёл/опорос, запись показателей
      роста и готовность к убою для крупного рогатого скота, овец, свиней и птицы.
  BC-3510.10:
    name: Планирование стада и поголовья
    description: |
      Планирование поголовья, ремонта и производственного цикла
      по видам животных.
  BC-3510.10.10:
    name: Планирование нагрузки на пастбище
    description: |
      Решения о нагрузке на пастбище с учётом доступности корма
      и несущей способности.
  BC-3510.10.20:
    name: Планирование ремонтного поголовья
    description: |
      Планирование нормы ремонта для племенного поголовья
      и несущих стад.
  BC-3510.10.30:
    name: Планирование производственного цикла
    description: |
      Календарное планирование производственных циклов, включая
      групповые опоросы и сезонные отёлы.
  BC-3510.20:
    name: Управление разведением животных
    description: |
      Генетический отбор, спаривание, осеменение, запись родословных
      и отслеживание показателей разведения.
    in_scope:
      - Решения по генетическому и признаковому отбору
      - Естественное спаривание и искусственное осеменение
      - Запись родословной и родительства
      - Оценка племенной ценности
  BC-3510.20.10:
    name: Решения по генетическому отбору
    description: |
      Отбор племенного поголовья по оценке племенной ценности
      и целевым признакам.
  BC-3510.20.20:
    name: Операции спаривания и осеменения
    description: |
      Естественное спаривание, искусственное осеменение
      и трансплантация эмбрионов.
  BC-3510.20.30:
    name: Запись родословной и родительства
    description: |
      Запись родословной, родительства и регистрации
      в племенных книгах.
  BC-3510.20.40:
    name: Оценка показателей разведения
    description: |
      Оценка результатов разведения и обновление оценок
      племенной ценности.
  BC-3510.30:
    name: Управление питанием животных
    description: |
      Составление рационов, раздача корма, управление пастбищным
      выпасом и учёт кормоотдачи по классам скота.
  BC-3510.30.10:
    name: Составление рационов кормления
    description: |
      Составление рационов наименьшей стоимости под требования
      вида и стадии.
  BC-3510.30.20:
    name: Раздача и доставка корма
    description: |
      Ежедневная раздача, смешивание и доставка корма
      в загоны, сараи и загоны.
  BC-3510.30.30:
    name: Управление пастбищным выпасом
    description: |
      Управление ротационным и непрерывным выпасом
      и мониторинг пастбищного остатка.
  BC-3510.30.40:
    name: Учёт кормоотдачи
    description: |
      Учёт кормоотдачи и среднесуточных приростов.
  BC-3510.40:
    name: Управление здоровьем животных
    description: |
      Ветеринарное лечение, вакцинация, борьба с паразитами,
      надзор за болезнями и контроль сроков ожидания.
    in_scope:
      - Записи о ветеринарном лечении
      - Программы вакцинации и борьбы с паразитами
      - Надзор за болезнями, подлежащими обязательному уведомлению
      - Отслеживание сроков ожидания для лекарственных средств
    out_of_scope:
      - Аудиты благополучия животных (BC-3510.50)
      - Мониторинг остатков по МДУ (BC-3590.50)
  BC-3510.40.10:
    name: Записи о ветеринарном лечении
    description: |
      Запись ветеринарного лечения, рецептов и результатов.
  BC-3510.40.20:
    name: Выполнение программ вакцинации
    description: |
      Выполнение программ вакцинации стада и поголовья.
  BC-3510.40.30:
    name: Программы борьбы с паразитами
    description: |
      Программы контроля внутренних и внешних паразитов
      и управление резистентностью.
  BC-3510.40.40:
    name: Надзор за болезнями и отчётность
    description: |
      Надзор и обязательная отчётность о болезнях, подлежащих
      уведомлению, и зоонозах.
  BC-3510.40.50:
    name: Управление сроками ожидания
    description: |
      Отслеживание сроков ожидания для ветеринарных препаратов
      и кормовых добавок.
  BC-3510.50:
    name: Управление благополучием животных
    description: |
      Повседневные практики благополучия, касающиеся содержания,
      обращения и мониторинга благополучия по стандартам сертификации.
  BC-3510.50.10:
    name: Условия содержания и плотность поголовья
    description: |
      Управление содержанием, вентиляцией и плотностью поголовья
      по видам животных.
  BC-3510.50.20:
    name: Стандарты обращения с животными
    description: |
      Стандарты обращения с минимальным стрессом и зоотехнии.
  BC-3510.50.30:
    name: Мониторинг показателей благополучия
    description: |
      Измерение показателей благополучия и фермерские
      проверки благополучия.
  BC-3510.60:
    name: Операции воспроизводства и отёла/опороса
    description: |
      Операции выявления охоты, отёла/опороса и ухода за новорождёнными
      по видам: КРС, МРС, свиньи и птица.
  BC-3510.60.10:
    name: Операции выявления охоты
    description: |
      Выявление охоты наблюдением, датчиками
      и программами синхронизации.
  BC-3510.60.20:
    name: Операции отёла/опороса
    description: |
      Операции отёла, окота, опороса, вывода цыплят
      и оказание помощи.
  BC-3510.60.30:
    name: Операции ухода за новорождёнными
    description: |
      Кормление новорождённых, управление молозивом
      и ранний уход.
  BC-3510.70:
    name: Запись роста и продуктивности
    description: |
      Запись показателей роста, молока, яйценоскости и убойных качеств
      для принятия производственных и племенных решений.
  BC-3510.70.10:
    name: Запись прироста живой массы
    description: |
      Периодическое взвешивание и запись среднесуточных приростов.
  BC-3510.70.20:
    name: Запись удоя
    description: |
      Запись удоя и состава молока по коровам и
      в групповых ёмкостях.
  BC-3510.70.30:
    name: Запись яйценоскости
    description: |
      Ежедневная запись яйценоскости по корпусу и стаду.
  BC-3510.70.40:
    name: Отслеживание убойных качеств
    description: |
      Отслеживание выхода туш, классификации и показателей
      отрубов.
  BC-3510.80:
    name: Готовность к убою и диспетчеризация
    description: |
      Отбор откормленных животных и координация отправки на
      бойни, включая документацию на перемещение.
  BC-3510.80.10:
    name: Предубойный отбор
    description: |
      Отбор откормленных животных по весу, упитанности
      и контрактным спецификациям.
  BC-3510.80.20:
    name: Документация на перемещение животных
    description: |
      Документация на перемещение и передача информации
      о пищевой цепи.
  BC-3510.80.30:
    name: Координация отправки на бойню
    description: |
      Координация отправки и транспортировки с фермы на бойню.
metadata:
  status: draft

    description: |
      Предварительная квалификация подрядчиков, инструктаж и надзор за безопасностью на объекте.
  BC-730.30:
    name: Управление охраной окружающей среды
    description: |
      Выбросы, вода, отходы, экологическое соответствие.
  BC-730.30.10:
    name: Оценка экологических аспектов и воздействий
    description: |
      Идентификация экологических аспектов и оценка воздействий.
  BC-730.30.20:
    name: Управление выбросами
    description: |
      Управление выбросами в атмосферу, ПГ и загрязняющих веществ на объектах.
  BC-730.30.30:
    name: Управление водопотреблением и сточными водами
    description: |
      Водопотребление, очистка сточных вод и управление сбросами.
  BC-730.30.40:
    name: Управление отходами
    description: |
      Управление опасными и неопасными отходами и их утилизация.
  BC-730.30.50:
    name: Сохранение биоразнообразия и земельный менеджмент
    description: |
      Деятельность по сохранению биоразнообразия, землепользованию и рекультивации.
  BC-730.40:
    name: Управление инцидентами и расследованиями
    description: |
      ОТиОС-инциденты, ситуации «почти произошло», расследования.
  BC-730.40.10:
    name: Регистрация инцидентов и ситуаций «почти произошло»
    description: |
      Регистрация и классификация ОТиОС-инцидентов и ситуаций «почти произошло».
  BC-730.40.20:
    name: Расследование ОТиОС-инцидентов
    description: |
      Методология расследования, анализ первопричин и извлечённые уроки.
  BC-730.40.30:
    name: Аварийная готовность и реагирование
    description: |
      Аварийные планы объектов, тренировки и координация реагирования.
  BC-730.40.40:
    name: Управление безопасностью технологических процессов
    description: |
      Опасности технологических процессов, управление изменениями и контроль крупных аварийных опасностей.
  BC-730.50:
    name: Соответствие требованиям ОТиОС и отчётность
    description: |
      Регуляторная отчётность ОТиОС, аудиты.
  BC-730.50.10:
    name: Регуляторное соответствие ОТиОС
    description: |
      Выявление и отслеживание регуляторных обязательств в сфере ОТиОС.
  BC-730.50.20:
    name: Аудит и инспекции ОТиОС
    description: |
      Внутренние и внешние ОТиОС-аудиты и инспекции.
  BC-730.50.30:
    name: Отчётность о результативности ОТиОС
    description: |
      Отслеживание KPI ОТиОС и управленческая отчётность (TRIR, LTIFR).
  BC-730.50.40:
    name: Сертификация системы менеджмента ОТиОС
    description: |
      Сертификация системы менеджмента по ISO 45001 / ISO 14001.

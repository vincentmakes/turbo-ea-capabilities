# Управление охраной здоровья, безопасностью и экологией (ru) — translations for L1-health-safety-environment-management.yaml
locale: ru
source: L1-health-safety-environment-management.yaml
entries:
  BC-730:
    name: Управление охраной здоровья, безопасностью и экологией
    description: |
      Политика ОТиОС, инциденты, безопасность на объектах, охрана здоровья на производстве.
  BC-730.10:
    name: Управление охраной здоровья на производстве
    description: |
      Охрана здоровья на производстве, эргономика, благополучие.
  BC-730.10.10:
    name: Медицинский мониторинг
    description: |
      Периодический медицинский мониторинг для групп работников с повышенным риском.
  BC-730.10.20:
    name: Эргономика и гигиена труда
    description: |
      Эргономические оценки и программы охраны здоровья на рабочем месте.
  BC-730.10.30:
    name: Мониторинг условий труда
    description: |
      Мониторинг шума, пыли, химических и биологических воздействий.
  BC-730.10.40:
    name: Программы благополучия сотрудников
    description: |
      Программы ментального, физического и социального благополучия.
  BC-730.20:
    name: Управление безопасностью
    description: |
      Безопасность на рабочем месте, поведенческая безопасность, СИЗ.
  BC-730.20.10:
    name: Выявление опасностей и оценка рисков
    description: |
      Выявление опасностей и оценка рисков для работ и объектов.
  BC-730.20.20:
    name: Наряды-допуски и безопасные системы работы
    description: |
      Наряды-допуски, изоляция и безопасные системы работы.
  BC-730.20.30:
    name: Управление средствами индивидуальной защиты
    description: |
      Выбор, выдача, обучение и проверка СИЗ.
  BC-730.20.40:
    name: Программа поведенческой безопасности
    description: |
      Поведенческие наблюдения за безопасностью, инспекции руководства и коучинг.
  BC-730.20.50:

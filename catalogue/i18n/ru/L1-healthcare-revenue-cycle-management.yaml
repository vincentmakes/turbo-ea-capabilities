# Цикл доходов в здравоохранении (ru) — translations for L1-healthcare-revenue-cycle-management.yaml
locale: ru
source: L1-healthcare-revenue-cycle-management.yaml
entries:
  BC-2870:
    name: Цикл доходов в здравоохранении
    description: |
      Регистрация услуг и управление прейскурантом, медицинское кодирование, формирование и подача счетов, управление отказами и апелляциями, разноска платежей, финансовые услуги для пациентов и управление договорами со страховщиками.
  BC-2870.10:
    name: Регистрация услуг и управление прейскурантом
    description: |
      Регистрация клинических услуг и ведение прейскуранта по всем службам.
  BC-2870.10.10:
    name: Регистрация услуг
    description: |
      Регистрация услуг из клинической документации и вспомогательных систем.
  BC-2870.10.20:
    name: Ведение прейскуранта
    description: |
      Ведение позиций прейскуранта, кодов и цен.
  BC-2870.10.30:
    name: Сверка услуг
    description: |
      Сверка ожидаемых и зарегистрированных услуг по подразделениям.
  BC-2870.10.40:
    name: Аудит услуг
    description: |
      Внутренний и внешний аудит точности и полноты зарегистрированных услуг.
  BC-2870.20:
    name: Управление медицинским кодированием
    description: |
      Производственное кодирование стационарных, амбулаторных и гонорарных визитов и аудит соответствия.
  BC-2870.20.10:
    name: Стационарное кодирование
    description: |
      Кодирование стационарных визитов по методологии диагностически-связанных групп.
  BC-2870.20.20:
    name: Амбулаторное кодирование
    description: |
      Кодирование амбулаторных визитов по методологии амбулаторных платёжных классификаций.
  BC-2870.20.30:
    name: Кодирование гонорарных услуг
    description: |
      Кодирование гонорарных услуг с использованием процедурных кодов и кодов оценки и управления.
  BC-2870.20.40:
    name: Аудит и соответствие кодирования
    description: |
      Программы аудита, соответствия и обучения по кодированию.
  BC-2870.30:
    name: Формирование и подача счетов
    description: |
      Формирование, корректировка, подача и отслеживание счетов страховщикам.
  BC-2870.30.10:
    name: Корректировка и проверка счетов
    description: |
      Применение предотгрузочных корректировок и правил проверки счетов.
  BC-2870.30.20:
    name: Подача счетов
    description: |
      Электронная подача счетов страховщикам и клиринговым центрам.
  BC-2870.30.30:
    name: Запрос статуса счёта
    description: |
      Электронный и ручной запрос статуса счёта и последующее сопровождение.
  BC-2870.30.40:
    name: Последовательность координации страховок
    description: |
      Последовательная подача первичных, вторичных и третичных счетов разным страховщикам.
  BC-2870.40:
    name: Управление отказами и апелляциями
    description: |
      Сортировка, апелляция и предотвращение отказов страховщиков и недоплат.
  BC-2870.40.10:
    name: Сортировка отказов
    description: |
      Сортировка и маршрутизация отказанных счетов по причине и вероятности возврата.
  BC-2870.40.20:
    name: Составление и подача апелляций
    description: |
      Составление и подача клинических и технических апелляций.
  BC-2870.40.30:
    name: Анализ недоплат
    description: |
      Выявление и возврат недоплат страховщиков по договорным ставкам.
  BC-2870.40.40:
    name: Аналитика предотвращения отказов
    description: |
      Аналитика коренных причин для предотвращения повторных отказов.
  BC-2870.50:
    name: Разноска платежей и сверка со страховщиками
    description: |
      Разноска страховых и пациентских платежей и сверка с ожидаемым возмещением.
  BC-2870.50.10:
    name: Разноска страховых выплат
    description: |
      Разноска и сверка электронных уведомлений о страховых выплатах.
  BC-2870.50.20:
    name: Разноска пациентских платежей
    description: |
      Разноска пациентских платежей по различным каналам.
  BC-2870.50.30:
    name: Применение договорных корректировок
    description: |
      Применение договорных корректировок на основе соглашений со страховщиками.
  BC-2870.50.40:
    name: Урегулирование неприменённых платежей
    description: |
      Урегулирование и разнесение неопознанных и неприменённых платежей.
  BC-2870.60:
    name: Финансовые услуги для пациентов
    description: |
      Выставление счетов пациентам, взыскание задолженности, планы оплаты и передача в безнадёжные долги.
  BC-2870.60.10:
    name: Формирование выписок пациентов
    description: |
      Формирование выписок пациентам по бумажным и цифровым каналам.
  BC-2870.60.20:
    name: Взыскание с пациентов
    description: |
      Операции по взысканию задолженности с самоплательщиков и работа с должниками.
  BC-2870.60.30:
    name: Управление планами оплаты
    description: |
      Оформление и управление планами рассрочки оплаты.
  BC-2870.60.40:
    name: Передача в безнадёжные долги
    description: |
      Передача и управление счетами в коллекторских агентствах.
  BC-2870.70:
    name: Управление договорами со страховщиками
    description: |
      Моделирование, поддержка переговоров, анализ отклонений и мониторинг договоров со страховщиками.
  BC-2870.70.10:
    name: Моделирование договоров
    description: |
      Моделирование условий договоров со страховщиками и методологий возмещения.
  BC-2870.70.20:
    name: Анализ отклонений возмещения
    description: |
      Анализ отклонений между договорным и фактическим возмещением.
  BC-2870.70.30:
    name: Поддержка переговоров по договорам
    description: |
      Аналитическое и операционное сопровождение переговоров по договорам со страховщиками.
  BC-2870.70.40:
    name: Мониторинг деятельности страховщиков
    description: |
      Постоянный мониторинг деятельности страховщиков по договорным SLA.

# Управление качеством заданий (ru) — translations for L1-engagement-quality-management.yaml
locale: ru
source: L1-engagement-quality-management.yaml
entries:
  BC-4340:
    name: Управление качеством заданий
    description: |
      Система менеджмента качества на уровне фирмы, ревью качества заданий, ревью дел, технические консультации, мониторинг и реагирование на внешние проверки практики по профессиональным заданиям.
  BC-4340.10:
    name: Система менеджмента качества фирмы
    description: |
      Разработка, внедрение и функционирование системы менеджмента качества на уровне фирмы в соответствии с ISQM 1 и аналогичными режимами.
  BC-4340.10.10:
    name: Оценка рисков качества
    description: |
      Выявление и оценка рисков качества по заданиям и операциям фирмы.
  BC-4340.10.20:
    name: Разработка мер реагирования на риски качества
    description: |
      Разработка политик и процедур, реагирующих на выявленные риски качества.
  BC-4340.10.30:
    name: Управление качеством и ответственность
    description: |
      Распределение ответственности за СМК управляющему партнёру, руководству по качеству и партнёрам задания.
  BC-4340.10.40:
    name: Ежегодная оценка СМК
    description: |
      Ежегодная оценка операционной эффективности системы менеджмента качества фирмы.
  BC-4340.20:
    name: Ревью качества задания
    description: |
      Независимый ревью качества задания (EQR) ревьюером, не вовлечённым иным образом в задание, выполняемый до выпуска отчёта по заданиям, соответствующим риск-критериям или регуляторным триггерам.
  BC-4340.20.10:
    name: Оценка права на EQR и триггеры
    description: |
      Выявление заданий, требующих EQR, на основе регуляторных, риск-критериев или триггеров политики фирмы.
  BC-4340.20.20:
    name: Назначение EQ-ревьюера
    description: |
      Назначение квалифицированных независимых EQ-ревьюеров на соответствующие задания.
  BC-4340.20.30:
    name: Выполнение EQR и утверждение
    description: |
      Выполнение процедур EQR и утверждение как предварительное условие выпуска результатов.
  BC-4340.30:
    name: Ревью дел задания
    description: |
      Постфактные горячие и холодные ревью дел по выборке завершённых дел для оценки соответствия методологии фирмы и профессиональным стандартам.
  BC-4340.30.10:
    name: Горячий ревью дела
    description: |
      Предварительный ревью дела по выбранным заданиям, где требуется дополнительная уверенность в соответствии.
  BC-4340.30.20:
    name: Холодный ревью дела
    description: |
      Ретроспективный постфактный ревью дела на выборочной основе для оценки соответствия методологии и качества.
  BC-4340.30.30:
    name: Принятие решений по результатам ревью дела
    description: |
      Принятие решений по результатам ревью дела, включая устранение нарушений, обучение и обратную связь с партнёром задания.
  BC-4340.40:
    name: Управление техническими консультациями
    description: |
      Обязательные и факультативные технические консультации по сложным вопросам задания с национальным офисом, техническими или специализированными функциями.
  BC-4340.40.10:
    name: Обязательные технические консультации
    description: |
      Консультации, требуемые политикой фирмы по определённым сложным ситуациям: непрерывность деятельности, риск мошенничества или новые вопросы.
  BC-4340.40.20:
    name: Факультативные технические консультации
    description: |
      Консультации по усмотрению команды задания по сложным техническим вопросам.
  BC-4340.40.30:
    name: Документирование технических консультаций
    description: |
      Документирование запросов на консультацию, данных рекомендаций и достигнутых выводов в деле задания.
  BC-4340.50:
    name: Мониторинг и устранение недостатков качества
    description: |
      Текущие мониторинговые мероприятия, анализ коренных причин недостатков качества и программы устранения.
  BC-4340.50.10:
    name: Мониторинг индикаторов качества
    description: |
      Мониторинг опережающих и отстающих индикаторов качества по портфелю заданий.
  BC-4340.50.20:
    name: Анализ коренных причин недостатков
    description: |
      Анализ коренных причин выявленных недостатков качества и системных выводов.
  BC-4340.50.30:
    name: Управление корректирующими мероприятиями
    description: |
      Определение, выполнение и проверка корректирующих мероприятий по результатам мониторинга и проверок.
  BC-4340.60:
    name: Управление реагированием на проверку практики
    description: |
      Координация реагирования на внешние проверки практики регуляторами и органами надзора: PCAOB, FRC, IAASA, ICAEW и аналогичными режимами.
  BC-4340.60.10:
    name: Координация выбора дел для проверки
    description: |
      Координация выбора дел и запросов информации от инспекционных органов.
  BC-4340.60.20:
    name: Ответ на выводы проверки
    description: |
      Подготовка и подача официальных ответов на выводы проверки и требуемые планы корректирующих мероприятий.
  BC-4340.60.30:
    name: Коммуникация результатов проверки
    description: |
      Внутренняя и, при необходимости, внешняя коммуникация результатов проверки.

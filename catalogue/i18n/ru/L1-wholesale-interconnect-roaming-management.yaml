# Управление оптовыми, интерконнект и роуминговыми сервисами (ru) — translations for L1-wholesale-interconnect-roaming-management.yaml
locale: ru
source: L1-wholesale-interconnect-roaming-management.yaml
entries:
  BC-2680:
    name: Управление оптовыми, интерконнект и роуминговыми сервисами
    description: |
      Оптовые телекоммуникационные сервисы для других операторов и партнёров —
      оптовые продукты и ценообразование, партнёрства с MVNO и MVNE,
      интерконнект и пиринг, отношения с роуминговыми партнёрами, межоператорские
      расчёты и долгосрочные ёмкостные договорённости IRU и тёмного волокна.
  BC-2680.10:
    name: Управление оптовыми продуктами и ценообразованием
    description: |
      Определение, ценообразование и коммерческие переговоры по оптовым
      предложениям для операторов, MVNO и крупных партнёров.
  BC-2680.10.10:
    name: Разработка оптовых тарифов
    description: |
      Разработка оптовых тарифов на голос, данные, обмен сообщениями
      и ёмкостные продукты.
  BC-2680.10.20:
    name: Публикация оптовых предложений
    description: |
      Публикация оптовых предложений в партнёрских каналах и обязательных
      справочных предложений для регуляторов.
  BC-2680.10.30:
    name: Коммерческие переговоры по оптовым сделкам
    description: |
      Двусторонние коммерческие переговоры по оптовым соглашениям
      и индивидуальным условиям.
  BC-2680.20:
    name: Управление партнёрствами MVNO и MVNE
    description: |
      Подключение и текущее управление партнёрами MVNO и MVNE, включая
      BSS-интеграцию и коммерческое управление.
  BC-2680.20.10:
    name: Подключение MVNO
    description: |
      Подключение новых партнёров MVNO и MVNE по критериям коммерческой,
      регуляторной и технической готовности.
  BC-2680.20.20:
    name: BSS-интеграция MVNO
    description: |
      Интеграция партнёров MVNO с хост-BSS для провизионирования,
      рейтинга и отчётности.
  BC-2680.20.30:
    name: Коммерческое управление MVNO
    description: |
      Текущее коммерческое управление, обзоры эффективности и управление
      выходом партнёров MVNO.
  BC-2680.30:
    name: Управление соглашениями об интерконнекте
    description: |
      Управление договорённостями о голосовом и IP-интерконнекте, включая
      пиринг и транзит.
  BC-2680.30.10:
    name: Управление пиринговыми соглашениями
    description: |
      Управление соглашениями об IP-пиринге и связанными коммерческими
      и операционными условиями.
  BC-2680.30.20:
    name: Управление транзитными соглашениями
    description: |
      Управление соглашениями о голосовом и IP-транзите с вышестоящими
      провайдерами.
  BC-2680.30.30:
    name: Измерение объёмов обмена трафиком
    description: |
      Измерение объёмов трафика, обмениваемого с пиринговыми и транзитными
      партнёрами, для расчётов и инжиниринга.
  BC-2680.40:
    name: Управление роуминговыми партнёрами
    description: |
      Установление и эксплуатация роуминговых отношений с международными
      партнёрскими сетями.
  BC-2680.40.10:
    name: Управление роуминговыми соглашениями
    description: |
      Переговоры и управление жизненным циклом двусторонних роуминговых
      соглашений.
  BC-2680.40.20:
    name: Обмен TAP-файлами
    description: |
      Обмен TAP-файлами с роуминговыми партнёрами для расчётов
      по использованию.
  BC-2680.40.30:
    name: Подключение роуминговых партнёров
    description: |
      Техническое и коммерческое подключение новых роуминговых партнёров,
      включая тестирование IREG и TADIG.
  BC-2680.50:
    name: Управление межоператорскими расчётами
    description: |
      Расчёты по межоператорскому использованию и урегулирование споров
      по роумингу и интерконнекту.
  BC-2680.50.10:
    name: Расчёты TAP и NRTRDE
    description: |
      Расчёты по роумингу на основе TAP и записей NRTRDE в режиме, близком
      к реальному времени.
  BC-2680.50.20:
    name: Биллинг интерконнекта
    description: |
      Выставление счетов партнёрам по интерконнекту за завершение,
      инициирование и транзит трафика.
  BC-2680.50.30:
    name: Урегулирование расчётных споров
    description: |
      Урегулирование споров по межоператорским расчётным ведомостям.
  BC-2680.50.40:
    name: Сверка межоператорских расчётов
    description: |
      Сверка записей межоператорских расчётов с внутренним учётом
      и казначейством.
  BC-2680.60:
    name: Управление оптовой ёмкостью и IRU
    description: |
      Долгосрочные оптовые договорённости по ёмкости, включая неотчуждаемые
      права пользования и аренду тёмного волокна.
  BC-2680.60.10:
    name: Управление неотчуждаемыми правами пользования
    description: |
      Продажа и покупка неотчуждаемых прав пользования на дальнемагистральных
      и подводных ёмкостях.
  BC-2680.60.20:
    name: Управление тёмным волокном
    description: |
      Аренда и управление волоконными нитями тёмного волокна
      в отношениях с партнёрами.
  BC-2680.60.30:
    name: Управление арендой ёмкости
    description: |
      Управление периодическими договорами аренды ёмкости на метро-,
      дальнемагистральных и подводных маршрутах.

# Управление доступом на рынок и возмещением расходов (ru) — translations for L1-market-access-reimbursement-management.yaml
locale: ru
source: L1-market-access-reimbursement-management.yaml
entries:
  BC-1600:
    name: Управление доступом на рынок и возмещением расходов
    description: |
      Стратегия работы с плательщиками, фармакоэкономические исследования, подача заявок на ценообразование/возмещение, тендеры и государственное ценообразование.
  BC-1600.10:
    name: Управление стратегией работы с плательщиками
    description: |
      Взаимодействие с плательщиками, анализ рынка плательщиков и разработка ценностного предложения.
  BC-1600.10.10:
    name: Анализ рынка плательщиков
    description: |
      Анализ рынка плательщиков и органов принятия решений.
  BC-1600.10.20:
    name: Разработка ценностного предложения для плательщиков
    description: |
      Разработка ценностных предложений, ориентированных на плательщиков.
  BC-1600.10.30:
    name: Операции по взаимодействию с плательщиками
    description: |
      Операционное взаимодействие с плательщиками и менеджерами по работе с ключевыми счетами.
  BC-1600.20:
    name: Управление фармакоэкономическими исследованиями
    description: |
      Фармакоэкономические исследования, анализ эффективности затрат и реальные данные для плательщиков.
  BC-1600.20.10:
    name: Моделирование эффективности затрат
    description: |
      Моделирование эффективности затрат и бюджетного влияния.
  BC-1600.20.20:
    name: Проведение фармакоэкономических исследований
    description: |
      Проведение фармакоэкономических исследований и экономических анализов.
  BC-1600.20.30:
    name: Данные реальной практики для доступа на рынок
    description: |
      Генерация данных реальной практики для обоснования перед плательщиками.
  BC-1600.20.40:
    name: Косвенное сравнение методов лечения
    description: |
      Косвенное сравнение методов лечения и сетевой метаанализ.
  BC-1600.30:
    name: Управление подачей заявок на ценообразование и возмещение расходов
    description: |
      Досье по ценообразованию, заявки на оценку HTA, регистрационные документы для возмещения.
  BC-1600.30.10:
    name: Подготовка досье HTA
    description: |
      Подготовка досье HTA для NICE, IQWiG, HAS, CADTH.
  BC-1600.30.20:
    name: Подача документов на возмещение расходов
    description: |
      Подача документов на возмещение расходов и заявок на ценообразование.
  BC-1600.30.30:
    name: Переговоры и апелляции HTA
    description: |
      Переговоры по HTA, подготовка ответов и апелляции.
  BC-1600.40:
    name: Управление тендерами и государственным ценообразованием
    description: |
      Государственные тендеры, тендерное ценообразование и государственные закупки.
  BC-1600.40.10:
    name: Управление тендерными заявками
    description: |

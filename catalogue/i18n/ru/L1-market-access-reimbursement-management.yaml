  BC-1600.40.30:
    name: Администрирование скидок и рибейтов
    description: |
      Администрирование нормативных скидок и рибейтов.
  BC-1600.50:
    name: Управление программами доступа для пациентов
    description: |
      Программы помощи пациентам и поддержки соплатежей.

# Инженерная разработка транспортных средств (ru) — translations for L1-vehicle-engineering-management.yaml
locale: ru
source: L1-vehicle-engineering-management.yaml
entries:
  BC-3400:
    name: Инженерная разработка транспортных средств
    description: |
      Комплексная инженерная разработка транспортного средства: кузов, шасси, силовой агрегат
      (ДВС, электро, топливные элементы), электронная архитектура, встроенное ПО, функциональная
      безопасность, кибербезопасность и SOTIF в рамках IATF 16949, ISO 26262, ISO/SAE 21434,
      ISO 21448, Automotive SPICE и AUTOSAR.
  BC-3400.10:
    name: Управление архитектурой транспортного средства
    description: |
      Целостная архитектура транспортного средства, компоновка, целевые значения параметров
      и декомпозиция платформы / вариантов как основа всей последующей разработки.
    in_scope:
      - Целевые значения параметров и разрешение компромиссов
      - Компоновка и зональное разделение транспортного средства
      - Выбор архитектуры платформы и модулей
    out_of_scope:
      - Управление стадийными воротами программы (BC-3410)
      - Детальная разработка на уровне компонентов (по дисциплинарным L2)
  BC-3400.10.10:
    name: Целевые значения параметров транспортного средства
    description: |
      Определение целевых показателей производительности, комфорта, безопасности,
      эффективности и фирменных характеристик и разрешение компромиссов между ними.
  BC-3400.10.20:
    name: Компоновка и пакетирование транспортного средства
    description: |
      Целостная компоновка транспортного средства, размещение пассажиров и багажа,
      определение базовых точек и зональное распределение.
  BC-3400.10.30:
    name: Определение архитектуры платформы
    description: |
      Определение общих платформ транспортных средств, унифицированных модулей и
      стратегий переноса компонентов между программами.
  BC-3400.10.40:
    name: Модульная и вариантная архитектура
    description: |
      Модульная и вариантная стратегия, обеспечивающая производство производных кузовов,
      трансмиссий и комплектаций на единой архитектурной основе.
  BC-3400.20:
    name: Разработка силового агрегата
    description: |
      Разработка систем привода с двигателями внутреннего сгорания, электрических и с
      топливными элементами, включая трансмиссии, трансмиссионную линию и системы хранения энергии.
  BC-3400.20.10:
    name: Разработка ДВС-агрегата
    description: |
      Разработка двигателей внутреннего сгорания, топливных систем, систем нейтрализации
      выхлопных газов и соответствующей калибровки.
  BC-3400.20.20:
    name: Разработка электрического силового агрегата
    description: |
      Разработка электроприводных устройств, инверторов, зарядной электроники
      и интеграция с высоковольтной системой.
  BC-3400.20.30:
    name: Разработка аккумуляторной системы
    description: |
      Разработка тяговых аккумуляторных ячеек, модулей, батарейных пакетов, BMS
      и систем термоуправления.
  BC-3400.20.40:
    name: Разработка системы топливных элементов
    description: |
      Разработка систем хранения водорода, стека топливных элементов, вспомогательного
      оборудования и интеграции в транспортное средство.
  BC-3400.20.50:
    name: Разработка трансмиссии и трансмиссионной линии
    description: |
      Разработка трансмиссий, осей, карданных валов и компонентов
      трансмиссионной линии с векторным управлением крутящим моментом.
  BC-3400.30:
    name: Разработка шасси и динамики транспортного средства
    description: |
      Разработка систем подвески, рулевого управления, торможения, колёс и шин
      и их интегрированное динамическое поведение.
  BC-3400.30.10:
    name: Разработка подвески и рулевого управления
    description: |
      Разработка геометрии подвески, амортизаторов, пружин и систем
      рулевого управления, включая управление по проводам.
  BC-3400.30.20:
    name: Разработка тормозной системы
    description: |
      Разработка основных тормозов, рекуперативного торможения и
      систем управления тормозами.
  BC-3400.30.30:
    name: Настройка динамики транспортного средства
    description: |
      Настройка плавности хода, управляемости, устойчивости и тягового
      контроля для достижения целевых динамических параметров.
  BC-3400.30.40:
    name: Разработка колёс и шин
    description: |
      Разработка и выбор колёс и шин, включая TPMS и компромиссы
      между эффективностью и характеристиками.
  BC-3400.40:
    name: Разработка кузова и внешних элементов
    description: |
      Разработка кузова в белом, проёмов, остекления, внешней отделки, освещения
      и аэродинамических поверхностей.
  BC-3400.40.10:
    name: Разработка кузова в белом
    description: |
      Разработка несущего кузова, стратегии соединений
      и силовых путей при столкновении.
  BC-3400.40.20:
    name: Разработка проёмов и остекления
    description: |
      Разработка дверей, капотов, подъёмных крышек, раздвижных проёмов
      и систем остекления.
  BC-3400.40.30:
    name: Разработка внешней отделки и освещения
    description: |
      Разработка внешней отделки, эмблем и систем внешнего освещения,
      включая архитектуру фар и сигнальных огней.
  BC-3400.40.40:
    name: Разработка аэродинамики
    description: |
      Разработка аэродинамической формы, баланс сопротивления и подъёмной силы,
      управление потоком под днищем.
  BC-3400.50:
    name: Разработка интерьера и систем комфорта
    description: |
      Разработка сидений, удерживающих устройств, интерьерной отделки, поверхностей HMI,
      климат-контроля и акустических / NVH характеристик.
  BC-3400.50.10:
    name: Разработка сидений и удерживающих устройств
    description: |
      Разработка сидений, ремней безопасности, подушек безопасности
      и других удерживающих устройств для пассажиров.
  BC-3400.50.20:
    name: Разработка интерьера и HMI
    description: |
      Разработка приборной панели, консоли, потолочного покрытия и
      физических / цифровых поверхностей HMI.
  BC-3400.50.30:
    name: Разработка климат-контроля
    description: |
      Разработка HVAC, хладагентов, теплового насоса и систем
      термоуправления аккумулятора и салона.
  BC-3400.50.40:
    name: Разработка акустики и NVH
    description: |
      Инженерная проработка и настройка акустики, вибрации и жёсткости
      по всему транспортному средству.
  BC-3400.60:
    name: Разработка электронной архитектуры
    description: |
      Разработка электронной топологии транспортного средства, внутренних сетей,
      распределения питания и аппаратного обеспечения ЭБУ.
  BC-3400.60.10:
    name: Определение электронной топологии
    description: |
      Определение E/E-топологии транспортного средства, включая доменные, зональные
      и централизованные вычислительные архитектуры.
  BC-3400.60.20:
    name: Разработка внутренних сетей транспортного средства
    description: |
      Разработка CAN, CAN-FD, LIN, FlexRay, Automotive Ethernet
      и смежных внутренних коммуникационных сетей.
  BC-3400.60.30:
    name: Разработка кабельной сети и распределения питания
    description: |
      Разработка жгутов проводов, соединителей, а также высоко- и
      низковольтного распределения питания.
  BC-3400.60.40:
    name: Разработка аппаратного обеспечения ЭБУ
    description: |
      Разработка аппаратного обеспечения электронных блоков управления,
      полупроводников и конструкций PCB по стандартам AEC-Q.
  BC-3400.70:
    name: Разработка программного обеспечения транспортного средства
    description: |
      Разработка встроенного ПО, автомобильных программных платформ и
      операционных систем транспортного средства в соответствии с AUTOSAR и Automotive SPICE.
  BC-3400.70.10:
    name: Разработка встроенного ПО
    description: |
      Разработка встроенного ПО уровня ЭБУ, включая драйверы
      устройств и базовые программные компоненты.
  BC-3400.70.20:
    name: Разработка платформы AUTOSAR
    description: |
      Разработка конфигураций и интеграция платформ
      AUTOSAR Classic и Adaptive.
  BC-3400.70.30:
    name: Разработка операционной системы транспортного средства
    description: |
      Разработка высокопроизводительных операционных систем транспортного средства,
      гипервизоров и промежуточного ПО для программно-определяемых автомобилей.
  BC-3400.70.40:
    name: Интеграция ПО и управление сборкой
    description: |
      Интеграция, сборка и управление циклами выпуска ПО транспортного
      средства по всем ЭБУ и доменам.
  BC-3400.80:
    name: Разработка функциональной безопасности и кибербезопасности
    description: |
      Инженерные дисциплины, обеспечивающие безопасность критичных функций
      и подключённого транспортного средства на основе ISO 26262, ISO/SAE 21434 и ISO 21448.
    in_scope:
      - Разработка обоснования безопасности (ISO 26262)
      - Инженерия кибербезопасности (ISO/SAE 21434)
      - Анализ и валидация SOTIF (ISO 21448)
      - HARA, FMEA-MSR и TARA
    out_of_scope:
      - Оперативный SOC транспортных средств и реагирование на инциденты (BC-3460.60)
      - Подача заявок на одобрение типа ТС по UN R155/R156 (BC-3420.50)
  BC-3400.80.10:
    name: Управление обоснованием функциональной безопасности
    description: |
      Разработка и сопровождение аргументов безопасности по ISO 26262,
      распределение ASIL и доказательная база обоснования безопасности.
  BC-3400.80.20:
    name: Инженерия кибербезопасности автомобиля
    description: |
      Инженерные работы по кибербезопасности в соответствии с ISO/SAE 21434,
      включая TARA, защищённое проектирование и жизненный цикл безопасной разработки.
  BC-3400.80.30:
    name: Разработка SOTIF
    description: |
      Анализ и валидация безопасности реализованной функциональности
      для ADAS и функций автоматизированного вождения по ISO 21448.
  BC-3400.80.40:
    name: Анализ опасностей и рисков
    description: |
      HARA, FMEA-MSR и другие систематические анализы опасностей,
      формирующие требования к безопасности и защите.
  BC-3400.90:
    name: Управление верификацией и валидацией транспортного средства
    description: |
      Верификация и валидация конструкции транспортного средства, подсистем и
      компонентов посредством виртуальных, стендовых и физических испытаний.
  BC-3400.90.10:
    name: Виртуальная валидация
    description: |
      CAE-, MIL/SIL/HIL- и цифровой двойник-основанная виртуальная верификация
      поведения транспортного средства и подсистем.
  BC-3400.90.20:
    name: Испытания компонентов и подсистем
    description: |
      Стендовые испытания компонентов и подсистем на соответствие
      инженерным техническим условиям.
  BC-3400.90.30:
    name: Комплексные испытания транспортного средства
    description: |
      Комплексные испытания транспортного средства на испытательных полигонах
      и общих дорогах в контролируемых условиях.
  BC-3400.90.40:
    name: Испытания на долговечность и надёжность
    description: |
      Ускоренные и коррелированные с потребительскими условиями испытания
      на долговечность и надёжность компонентов и всего транспортного средства.
  BC-3400.90.50:
    name: Краш-испытания и защита пассажиров
    description: |
      Инженерные краш-испытания и испытания защиты пассажиров
      в поддержку нормативных и потребительских рейтинговых требований.

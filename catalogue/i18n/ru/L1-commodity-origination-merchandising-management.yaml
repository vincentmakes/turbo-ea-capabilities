# Закупка и торговля сельскохозяйственным сырьём (ru) — translations for L1-commodity-origination-merchandising-management.yaml
locale: ru
source: L1-commodity-origination-merchandising-management.yaml
entries:
  BC-3570:
    name: Закупка и торговля сельскохозяйственным сырьём
    description: |
      Программы закупок у агропроизводителей, контрактация сырьевых товаров,
      весовые и весовые операции и отбор образцов, физические позиции по запасам,
      наличные и базисные торги, хеджирование и расчёты по зерну, масличным,
      мягким, животноводческим и молочным товарам.
  BC-3570.10:
    name: Управление программами закупок
    description: |
      Контрактация агропроизводителей, управление отношениями с производителями
      и прогнозирование закупок для формирования книги поставок.
  BC-3570.10.10:
    name: Программы контрактации агропроизводителей
    description: |
      Разработка и реализация программ контрактации
      агропроизводителей по регионам.
  BC-3570.10.20:
    name: Управление отношениями с производителями
    description: |
      Управление отношениями с производителями, отличное
      от общей CRM.
  BC-3570.10.30:
    name: Прогнозирование закупок
    description: |
      Прогнозирование ожидаемых объёмов закупок
      по регионам и культурам.
  BC-3570.20:
    name: Управление товарными контрактами
    description: |
      Выпуск и отслеживание исполнения форвардных, производственных
      и контрактов с отложенным ценообразованием.
    in_scope:
      - Форвардные контракты с агропроизводителями и контрагентами
      - Производственные контракты с качественными спецификациями
      - Отслеживание исполнения контрактов
    out_of_scope:
      - Общее управление юридическими контрактами (BC-150)
  BC-3570.20.10:
    name: Выпуск форвардных контрактов
    description: |
      Выпуск форвардных контрактов с фиксированной ценой и базисом.
  BC-3570.20.20:
    name: Управление производственными контрактами
    description: |
      Управление производственными контрактами с качественными
      и поставочными спецификациями.
  BC-3570.20.30:
    name: Отслеживание исполнения контрактов
    description: |
      Отслеживание поставленных тонн против исполнения контракта.
  BC-3570.30:
    name: Весовые операции и отбор образцов при приёмке
    description: |
      Весовые операции, качественный отбор образцов и сортировка,
      расчёт приёмного расчёта в месте приёмки.
  BC-3570.30.10:
    name: Весовые операции
    description: |
      Входящие и исходящие весовые операции и квитирование.
  BC-3570.30.20:
    name: Качественный отбор образцов и сортировка
    description: |
      Приёмный отбор образцов и сортировка по торговым
      спецификациям.
  BC-3570.30.30:
    name: Расчёт приёмного расчёта
    description: |
      Расчёт скидок и премий на основе сорта при приёмке.
  BC-3570.40:
    name: Управление позициями по товарным запасам
    description: |
      Отслеживание физических товарных позиций, решений о смешении
      и транзитных позиций по сети.
  BC-3570.40.10:
    name: Отслеживание физических позиций
    description: |
      Отслеживание длинных и коротких физических позиций
      по площадке и сорту.
  BC-3570.40.20:
    name: Решения по смешению для качества
    description: |
      Решения по смешению для выполнения контрактных
      качественных спецификаций.
  BC-3570.40.30:
    name: Отслеживание транзитных позиций
    description: |
      Отслеживание позиций в пути морским, железнодорожным
      и автомобильным транспортом.
  BC-3570.50:
    name: Операции товарной торговли
    description: |
      Наличные и базисные торги, исполнение спотовых продаж и
      управление межтоварными спредами по физическим товарным книгам.
  BC-3570.50.10:
    name: Наличные и базисные торги
    description: |
      Торговля наличными и базисными позициями
      по физическим товарам.
  BC-3570.50.20:
    name: Исполнение спотовых продаж
    description: |
      Исполнение спотовых продаж переработчикам и экспортёрам.
  BC-3570.50.30:
    name: Управление межтоварными спредами
    description: |
      Управление межтоварными спредами, такими как
      маржа переработки масличных и нефти.
  BC-3570.60:
    name: Хеджирование и управление рисковыми позициями
    description: |
      Исполнение и сверка фьючерсных и опционных хеджей
      против физических товарных позиций.
  BC-3570.60.10:
    name: Исполнение фьючерсного хеджирования
    description: |
      Исполнение фьючерсных хеджей на регулируемых биржах.
  BC-3570.60.20:
    name: Исполнение опционного хеджирования
    description: |
      Исполнение опционных хеджей для управления ценовыми рисками.
  BC-3570.60.30:
    name: Сверка хеджевых позиций
    description: |
      Сверка хеджевых позиций с базовыми физическими рисками.
  BC-3570.70:
    name: Расчёты и ценообразование по товарам
    description: |
      Окончательное ценообразование, выпуск расчётных ведомостей
      и разрешение претензий по качеству с контрагентами.
  BC-3570.70.10:
    name: Окончательное ценообразование и расчёт скидок
    description: |
      Окончательное ценообразование с применением скидок
      и премий за сорт.
  BC-3570.70.20:
    name: Выпуск расчётных ведомостей
    description: |
      Выпуск расчётных ведомостей агропроизводителям
      и контрагентам.
  BC-3570.70.30:
    name: Разрешение претензий по качеству
    description: |
      Разрешение претензий по качеству с агропроизводителями,
      покупателями и арбитражными органами.

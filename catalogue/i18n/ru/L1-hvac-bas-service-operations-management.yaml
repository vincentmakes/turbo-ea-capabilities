  BC-2060.30.40:
    name: Аварийное реагирование на утечку хладагента
    description: |
      Аварийное реагирование на выбросы хладагента и крупные утечки.
  BC-2060.40:
    name: Перепрограммирование BAS и программный сервис
    description: |
      Программный сервис установленного BAS — обновления последовательностей, обновление встроенного ПО и изменения конфигурации.
  BC-2060.40.10:
    name: Развёртывание обновлённых последовательностей
    description: |

# Управление сервисными операциями ОВКВ и BAS (ru) — translations for L1-hvac-bas-service-operations-management.yaml
locale: ru
source: L1-hvac-bas-service-operations-management.yaml
entries:
  BC-2060:
    name: Управление сервисными операциями ОВКВ и BAS
    description: |
      Сервис, организуемый ОЕМ и подрядчиками, на установленном оборудовании ОВКВ и BAS — управление конфигурацией установленной базы, плановое и реактивное техническое обслуживание, перепрограммирование BAS и программный сервис, ретрофит и модернизация оборудования, контракты на основе показателей эффективности и дистанционный подключённый сервис.
    in_scope:
      - Реестр конфигурации установленного оборудования и BAS
      - Выполнение контрактов на плановое техническое обслуживание и реактивный/аварийный сервис
      - Перепрограммирование BAS, обновление встроенного ПО и операции резервного копирования/восстановления
      - Выполнение ретрофита и модернизации установленного оборудования ОВКВ
      - Контракты на основе показателей и результатов
      - Дистанционный подключённый сервис и операции диагностического центра
      - Управление SLA и удовлетворённостью заказчиков
    out_of_scope:
      - Межотраслевой полевой сервис общего характера (BC-1050) и запасные части (BC-1060)
      - Пусконаладка и выполнение CX (BC-2050)
      - Закупки хладагентов и отчётность (BC-2040)
      - Инженерия продуктов оборудования ОВКВ (BC-2000)
  BC-2060.10:
    name: Управление конфигурацией установленной базы
    description: |
      Ведение данных о конфигурации «как установлено» и «как обслуживается» по всей мировой установленной базе.
  BC-2060.10.10:
    name: Реестр активов оборудования
    description: |
      Реестр установленного оборудования ОВКВ по серийным номерам, объектам и заказчикам.
  BC-2060.10.20:
    name: Реестр конфигурации BAS
    description: |
      Реестр конфигураций BAS, контроллеров, точек и последовательностей в эксплуатации.
  BC-2060.10.30:
    name: Записи об обслуживаемой конфигурации
    description: |
      Записи о конфигурации «как обслуживается» после каждого события обслуживания.
  BC-2060.10.40:
    name: Записи о модификациях установленной базы
    description: |
      Записи о модификациях установленного оборудования и BAS после передачи объекта.
  BC-2060.20:
    name: Операции планового технического обслуживания
    description: |
      Выполнение планового технического обслуживания по контракту.
  BC-2060.20.10:
    name: Выполнение контракта на техническое обслуживание
    description: |
      Выполнение планового технического обслуживания в рамках contracted scope.
  BC-2060.20.20:
    name: Маршрутизация плановых выездов
    description: |
      Маршрутизация и диспетчеризация плановых сервисных выездов.
  BC-2060.20.30:
    name: Сервис фильтров и ремней
    description: |
      Плановая замена фильтров, ремней и расходных материалов.
  BC-2060.20.40:
    name: Сервис хладагента и змеевиков
    description: |
      Плановая дозаправка хладагента и очистка змеевиков.
  BC-2060.20.50:
    name: Отчётность о выполнении технического обслуживания
    description: |
      Отчётность о выполнении планового технического обслуживания для заказчиков.
  BC-2060.30:
    name: Операции реактивного и аварийного сервиса
    description: |
      Реактивный и внеурочный аварийный сервис на установленном оборудовании.
  BC-2060.30.10:
    name: Триаж сервисных заявок
    description: |
      Триаж входящих сервисных заявок по срочности и компетенции.
  BC-2060.30.20:
    name: Аварийная диспетчеризация
    description: |

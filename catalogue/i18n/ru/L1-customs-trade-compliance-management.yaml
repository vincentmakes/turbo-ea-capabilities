# Таможенное и торговое соответствие (ru) — translations for L1-customs-trade-compliance-management.yaml
locale: ru
source: L1-customs-trade-compliance-management.yaml
entries:
  BC-2480:
    name: Управление таможенным и торговым соответствием
    description: |
      Соответствие таможенным, санкционным, происхождения и режимам уполномоченных
      экономических операторов для трансграничных перевозок, включая определение
      пошлин и косвенных налогов.
  BC-2480.10:
    name: Управление тарифной классификацией
    description: |
      Определение и ведение кодов HS для торгуемых товаров.
    in_scope:
      - Определение HS code по товару и отправке
      - Обязательные тарифные информации о классификации
    out_of_scope:
      - Проверка санкций и сторон (BC-2480.40)
  BC-2480.10.10:
    name: Определение HS code
    description: |
      Определение HS code по товару и отправке.
  BC-2480.10.20:
    name: Управление классификационными решениями
    description: |
      Подача заявок и управление обязательными тарифными решениями.
  BC-2480.10.30:
    name: Ведение базы данных классификаций
    description: |
      Ведение основных баз данных классификации торгуемых товаров.
  BC-2480.20:
    name: Управление таможенными декларациями
    description: |
      Подача импортных, экспортных и транзитных деклараций в таможенные органы.
  BC-2480.20.10:
    name: Подача импортной декларации
    description: |
      Подготовка и подача импортных деклараций.
  BC-2480.20.20:
    name: Подача экспортной декларации
    description: |
      Подготовка и подача экспортных деклараций.
  BC-2480.20.30:
    name: Управление транзитными декларациями
    description: |
      Подача и снятие транзитных деклараций, включая TIR и NCTS.
  BC-2480.30:
    name: Управление происхождением и соглашениями о свободной торговле
    description: |
      Определение и подтверждение преференциального происхождения товаров
      в рамках соглашений о свободной торговле.
  BC-2480.30.10:
    name: Определение происхождения
    description: |
      Определение преференциального и непреференциального происхождения товаров.
  BC-2480.30.20:
    name: Документация для квалификации по СТС
    description: |
      Выдача и управление сертификатами происхождения по соглашениям о свободной торговле.
  BC-2480.30.30:
    name: Журнал аудита происхождения
    description: |
      Ведение документального подтверждения для аудитов происхождения.
  BC-2480.40:
    name: Управление санкциями и проверкой нежелательных сторон
    description: |
      Проверка сторон, судов и товаров по санкционным спискам и спискам нежелательных сторон.
  BC-2480.40.10:
    name: Проверка сторон и судов
    description: |
      Проверка клиентов, грузополучателей и транспортных средств по санкционным спискам.
  BC-2480.40.20:
    name: Управление санкционными списками
    description: |
      Ведение сводных санкционных списков и списков нежелательных сторон.
  BC-2480.40.30:
    name: Обработка задержаний и разрешений
    description: |
      Обработка совпадений при проверке, задержаний и авторизованных разрешений.
  BC-2480.50:
    name: Управление программами уполномоченных операторов
    description: |
      Подача заявок, поддержание и аудит программ уполномоченных операторов,
      таких как AEO и C-TPAT.
  BC-2480.50.10:
    name: Подача заявки на AEO и поддержание статуса
    description: |
      Подача заявки на получение статуса AEO и текущее поддержание программы.
  BC-2480.50.20:
    name: Управление программой C-TPAT
    description: |
      Регистрация в C-TPAT и соответствие минимальным требованиям безопасности.
  BC-2480.50.30:
    name: Координация таможенных аудитов
    description: |
      Координация таможенных проверок и аудитов уполномоченных операторов.
  BC-2480.60:
    name: Управление пошлинами и косвенными налогами
    description: |
      Определение, уплата и возврат пошлин, косвенных налогов и
      возвратов пошлин при трансграничных перевозках.
  BC-2480.60.10:
    name: Расчёт пошлин
    description: |
      Расчёт пошлин, подлежащих уплате при импорте и экспорте.
  BC-2480.60.20:
    name: Определение косвенных налогов
    description: |
      Определение НДС, GST и акцизов при трансграничных операциях.
  BC-2480.60.30:
    name: Возврат и компенсация пошлин
    description: |
      Возврат пошлин через режимы возврата, приостановления и компенсации.
metadata:

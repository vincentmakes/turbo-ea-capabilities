# Торговля и сбыт углеводородов (ru) — translations for L1-hydrocarbon-trading-marketing-management.yaml
locale: ru
source: L1-hydrocarbon-trading-marketing-management.yaml
entries:
  BC-3090:
    name: Торговля и сбыт углеводородов
    description: |
      Физическая и бумажная торговля сырой нефтью, нефтепродуктами, природным газом и СПГ; управление товарными рисками; расчёт и комплаенс по сделкам; маркетинг по долгосрочным контрактам и фрахтование в интересах трейдинга.
  BC-3090.10:
    name: Операции физической торговли
    description: |
      Торговые столы физической торговли сырой нефтью, нефтепродуктами, природным газом и СПГ.
  BC-3090.10.10:
    name: Торговля сырой нефтью
    description: |
      Физическая торговля марками сырой нефти на региональных рынках.
  BC-3090.10.20:
    name: Торговля нефтепродуктами
    description: |
      Физическая торговля бензином, дистиллятами, авиакеросином, мазутом и ШФЛУ.
  BC-3090.10.30:
    name: Торговля природным газом
    description: |
      Физическая торговля трубопроводным природным газом через хабы.
  BC-3090.10.40:
    name: Торговля СПГ
    description: |
      Физическая торговля партиями СПГ, включая перенаправление и перегрузочные сделки.
  BC-3090.20:
    name: Торговля деривативами и бумажная торговля
    description: |
      Торговля биржевыми и внебиржевыми деривативами в целях хеджирования и проприетарного позиционирования.
  BC-3090.20.10:
    name: Торговля фьючерсами и опционами
    description: |
      Торговля биржевыми фьючерсами и опционами на энергетические товары.
  BC-3090.20.20:
    name: Свопы и хеджирующие сделки
    description: |
      Внебиржевая торговля свопами для ценового и базисного хеджирования.
  BC-3090.20.30:
    name: Управление экспозицией товарных индексов
    description: |
      Управление экспозицией к инструментам товарных индексов.
  BC-3090.30:
    name: Управление торговыми рисками
    description: |
      Управление рисками позиций, кредитным риском контрагента и товарным VaR в торговой деятельности.
  BC-3090.30.10:
    name: Управление позиционным риском
    description: |
      Мониторинг позиций относительно утверждённых торговых мандатов и лимитов.
  BC-3090.30.20:
    name: Переоценка по рынку
    description: |
      Ежедневная переоценка торговых позиций и кривых по рыночной стоимости.
  BC-3090.30.30:
    name: Управление кредитным риском контрагента
    description: |
      Установление лимитов кредитного риска контрагента и отслеживание экспозиции в торговой деятельности.
  BC-3090.30.40:
    name: Расчёт товарного VaR
    description: |
      Расчёт стоимости под риском и стресс-сценариев для товарных портфелей.
  BC-3090.40:
    name: Подтверждение и расчёт сделок
    description: |
      Регистрация сделок, подтверждение и постторговый расчёт и сверка.
  BC-3090.40.10:
    name: Регистрация сделок
    description: |
      Регистрация заключённых сделок из фронт-офиса в торговых системах.
  BC-3090.40.20:
    name: Подтверждение сделок
    description: |
      Выпуск и сверка подтверждений сделок с контрагентами.
  BC-3090.40.30:
    name: Расчёты по сделкам
    description: |
      Денежный и физический расчёт по сделкам до истечения срока.
  BC-3090.40.40:
    name: Сверка сделок
    description: |
      Сверка сделок с записями брокера, биржи и контрагента.
  BC-3090.50:
    name: Управление торговым комплаенсом
    description: |
      Санкционный скрининг, мониторинг рыночного поведения и регуляторная отчётность по торговле энергоносителями.
  BC-3090.50.10:
    name: Санкционный скрининг
    description: |
      Досделочный и постсделочный санкционный скрининг контрагентов и партий груза.
  BC-3090.50.20:
    name: Мониторинг рыночного поведения
    description: |
      Мониторинг торгового поведения на соответствие стандартам против манипулирования рынком (REMIT, Dodd-Frank).
  BC-3090.50.30:
    name: Регуляторная отчётность по сделкам
    description: |
      Отчётность по сделкам в регулирующие органы в соответствии с REMIT, EMIR и Dodd-Frank.
  BC-3090.60:
    name: Маркетинг и управление долгосрочными контрактами
    description: |
      Управление долгосрочными договорами купли-продажи и программами отгрузки с покупателями.
  BC-3090.60.10:
    name: Переговоры по долгосрочным контрактам
    description: |
      Переговоры по долгосрочным договорам купли-продажи с нефтепереработчиками и энергетическими компаниями.
  BC-3090.60.20:
    name: Управление программами отгрузки
    description: |
      Управление ежемесячными и квартальными программами отгрузки по долгосрочным контрактам.
  BC-3090.60.30:
    name: Управление распределением между покупателями
    description: |
      Распределение ограниченных объёмов поставок между контрактными и спотовыми покупателями.
  BC-3090.70:
    name: Фрахтование для трейдинга
    description: |
      Рейсовый и тайм-чартер и управление демереджем в интересах торговых позиций.
  BC-3090.70.10:
    name: Рейсовый чартер
    description: |
      Рейсовый чартер танкеров и газовозов для торговых партий груза.
  BC-3090.70.20:
    name: Тайм-чартер
    description: |
      Тайм-чартер и оптимизация судовых позиций.
  BC-3090.70.30:
    name: Управление демереджем и сталийным временем
    description: |
      Расчёт и урегулирование претензий по демереджу и сталийному времени.

# Добыча углеводородов (ru) — translations for L1-hydrocarbon-production-operations-management.yaml
locale: ru
source: L1-hydrocarbon-production-operations-management.yaml
entries:
  BC-3030:
    name: Добыча углеводородов
    description: |
      Эксплуатация наземных объектов от устья скважины до точки экспорта: сепарация, подготовка, механизированная добыча, обеспечение потока, мониторинг добычи и поддержание пластового давления.
  BC-3030.10:
    name: Управление устьевыми операциями
    description: |
      Ежедневная эксплуатация устьевого оборудования, управление штуцерами и гидродинамические исследования скважин.
  BC-3030.10.10:
    name: Мониторинг устья скважины
    description: |
      Непрерывный мониторинг давления, температуры и расходных параметров на устье скважины.
  BC-3030.10.20:
    name: Управление устьевыми штуцерами
    description: |
      Регулировка наземных штуцеров для управления дебитом и депрессией.
  BC-3030.10.30:
    name: Гидродинамические исследования скважин
    description: |
      Плановые и мониторинговые гидродинамические исследования для распределения добычи и пластовых данных.
  BC-3030.20:
    name: Операции сепарации и подготовки нефти
    description: |
      Эксплуатация наземных объектов для сепарации нефти-воды-газа, стабилизации нефти, подготовки попутной воды и кондиционирования газа.
  BC-3030.20.10:
    name: Сепарация нефти, воды и газа
    description: |
      Трёхфазная сепарация добываемых флюидов на наземных объектах.
  BC-3030.20.20:
    name: Стабилизация нефти
    description: |
      Стабилизация добываемой нефти до экспортных характеристик.
  BC-3030.20.30:
    name: Подготовка попутно добываемой воды
    description: |
      Подготовка попутно добываемой воды для закачки или сброса.
  BC-3030.20.40:
    name: Осушка и очистка газа
    description: |
      Промысловая осушка и очистка попутного газа.
  BC-3030.30:
    name: Управление механизированной добычей
    description: |
      Выбор, эксплуатация и оптимизация систем механизированной добычи.
  BC-3030.30.10:
    name: Газлифтные операции
    description: |
      Непрерывный и периодический газлифт и мониторинг.
  BC-3030.30.20:
    name: Операции с электроцентробежными насосами
    description: |
      Эксплуатация, мониторинг и управление наработкой ЭЦН.
  BC-3030.30.30:
    name: Операции штанговых насосных установок
    description: |
      Эксплуатация и динамометрирование штанговых насосных установок.
  BC-3030.30.40:
    name: Оптимизация механизированной добычи
    description: |
      Межметодная оптимизация выбора и параметров механизированной добычи.
  BC-3030.40:
    name: Оптимизация и мониторинг добычи
    description: |
      Мониторинг в реальном времени и оптимизация дебита, узких мест и производительности скважин относительно прогноза.
  BC-3030.40.10:
    name: Мониторинг добычи в реальном времени
    description: |
      Мониторинг добычи скважин и месторождений в реальном времени из операционных центров.
  BC-3030.40.20:
    name: Диагностика производительности скважин
    description: |
      Диагностический анализ недостаточно работающих скважин и рекомендации по восстановлению.
  BC-3030.40.30:
    name: Учёт потерь добычи
    description: |
      Категоризация и отчётность о потерях добычи относительно потенциала.
  BC-3030.40.40:
    name: Выявление узких мест
    description: |
      Выявление системных узких мест в пласте, скважинах и наземных объектах.
  BC-3030.50:
    name: Управление обеспечением потока
    description: |
      Предотвращение и управление проблемами обеспечения потока: гидраты, АСПО, асфальтены, эрозионно-коррозионные отложения в добывающих системах.
  BC-3030.50.10:
    name: Управление гидратами
    description: |
      Предотвращение и ликвидация гидратов в шлейфах и райзерах.
  BC-3030.50.20:
    name: Управление АСПО и асфальтенами
    description: |
      Предотвращение и ликвидация отложений АСПО и асфальтенов.
  BC-3030.50.30:
    name: Мониторинг эрозии и коррозии
    description: |
      Мониторинг эрозии и коррозии в добывающих шлейфах и оборудовании.
  BC-3030.50.40:
    name: Операции пигинга
    description: |
      Операционный пигинг шлейфов для очистки и диагностики.
  BC-3030.60:
    name: Управление промысловыми химикатами
    description: |
      Выбор, дозирование и мониторинг эффективности промысловых химикатов.
  BC-3030.60.10:
    name: Выбор и дозирование химикатов
    description: |
      Стратегия выбора и дозирования промысловых химикатов на уровне скважин и объектов.
  BC-3030.60.20:
    name: Управление ингибиторами коррозии
    description: |
      Применение и мониторинг программ ингибирования коррозии.
  BC-3030.60.30:
    name: Управление ингибиторами солеотложений
    description: |
      Управление задавками и непрерывной закачкой ингибиторов солеотложений.
  BC-3030.70:
    name: Операции по поддержанию пластового давления
    description: |
      Эксплуатация систем водо- и газозакачки и отслеживание коэффициента замещения объёма.
  BC-3030.70.10:
    name: Операции закачки воды
    description: |
      Эксплуатация установок подготовки воды для закачки и нагнетательных скважин.
  BC-3030.70.20:
    name: Операции закачки газа
    description: |
      Эксплуатация компрессорных установок и нагнетательных скважин закачки газа.
  BC-3030.70.30:
    name: Отслеживание коэффициента замещения объёма
    description: |
      Отслеживание коэффициентов замещения объёма по добывающим активам.

# Управление клиентским сервисом (ru) — translations for L1-customer-service-management.yaml
locale: ru
source: L1-customer-service-management.yaml
entries:
  BC-430:
    name: Управление клиентским сервисом
    description: |
      Обработка запросов, жалобы, поддержка, операции контакт-центра.
  BC-430.10:
    name: Управление запросами клиентов
    description: |
      Входящие обращения, маршрутизация, разрешение.
  BC-430.10.10:
    name: Приём и маршрутизация обращений
    description: |
      Многоканальный приём, классификация и маршрутизация обращений.
  BC-430.10.20:
    name: Управление обращениями
    description: |
      Создание, отслеживание владения и разрешение обращений.
  BC-430.10.30:
    name: Выполнение сервисных запросов
    description: |
      Выполнение стандартных сервисных запросов и изменений по аккаунту.
  BC-430.10.40:
    name: Управление эскалацией
    description: |
      Маршруты эскалации, правила серьёзности и работа с обострёнными обращениями.
  BC-430.20:
    name: Управление жалобами и проблемами
    description: |
      Регистрация жалоб, анализ первопричин, разрешение.
  BC-430.20.10:
    name: Регистрация и подтверждение жалоб
    description: |
      Регистрация, подтверждение и сортировка жалоб клиентов.
  BC-430.20.20:
    name: Расследование и урегулирование жалоб
    description: |
      Расследование, возмещение и урегулирование жалоб.
  BC-430.20.30:
    name: Анализ первопричин
    description: |
      Анализ первопричин и выявление трендов по жалобам.
  BC-430.20.40:
    name: Регуляторная отчётность по жалобам
    description: |
      Регуляторная отчётность по жалобам и рассмотрение дел омбудсменом.
  BC-430.30:
    name: Управление операциями контакт-центра
    description: |
      Функционирование контакт-центра, управление персоналом, телефония.
  BC-430.30.10:
    name: Управление персоналом контакт-центра
    description: |
      Прогнозирование, составление расписания и соблюдение режима в работе контакт-центра.
  BC-430.30.20:
    name: Маршрутизация обращений и IVR
    description: |
      Проектирование IVR, маршрутизация по навыкам и оркестрация каналов.
  BC-430.30.30:
    name: Мониторинг качества и коучинг
    description: |
      Мониторинг качества звонков, оценка и коучинг операторов.
  BC-430.30.40:
    name: Отчётность о результативности контакт-центра
    description: |
      Уровень сервиса, среднее время обработки, показатель первичного решения и операционная отчётность.
  BC-430.40:
    name: Управление самообслуживанием
    description: |
      FAQ, база знаний, чат-боты, порталы самообслуживания.
  BC-430.40.10:
    name: Управление базой знаний
    description: |
      Создание и ведение клиентских материалов базы знаний.
  BC-430.40.20:
    name: Управление порталом самообслуживания
    description: |
      Порталы самообслуживания и функции управления аккаунтом.
  BC-430.40.30:
    name: Управление разговорным ИИ
    description: |
      Проектирование, обучение и операции чат-ботов и голосовых ботов.
  BC-430.40.40:
    name: Управление поддержкой сообщества
    description: |
      Модерация сообщества пользователей и одноранговая поддержка.
  BC-430.50:
    name: Управление обратной связью от клиентов
    description: |
      Опросы, NPS, программы голоса клиента.
  BC-430.50.10:
    name: Программа голоса клиента
    description: |
      Структурированная программа голоса клиента по точкам контакта.
  BC-430.50.20:
    name: Управление опросами клиентов
    description: |
      Проектирование, распространение и анализ опросов NPS, CSAT, CES.
  BC-430.50.30:
    name: Обратная связь с замкнутым контуром
    description: |
      Последующая работа с критиками и меры по восстановлению отношений.
  BC-430.50.40:
    name: Отчётность об инсайтах клиентов
    description: |
      Отчётность о клиентских инсайтах для продуктовых, операционных команд и руководства.

# Химическое производство (ru) — translations for L1-chemical-manufacturing-operations-management.yaml
locale: ru
source: L1-chemical-manufacturing-operations-management.yaml
entries:
  BC-4620:
    name: Химическое производство
    description: |
      Повседневная эксплуатация реакционных, разделительных, полимеризационных
      и неорганических технологических установок, включая мониторинг катализаторов,
      планирование производства и координацию плановых ремонтов.
  BC-4620.10:
    name: Реакционные единичные операции
    description: |
      Эксплуатация непрерывных, периодических, каталитических и электрохимических
      реакторных систем.
  BC-4620.10.10:
    name: Эксплуатация непрерывных реакторов
    description: |
      Эксплуатация непрерывных реакторов с мешалкой и идеального вытеснения.
  BC-4620.10.20:
    name: Эксплуатация периодических реакторов
    description: |
      Эксплуатация периодических и полупериодических реакторов по утверждённым
      рецептурам.
  BC-4620.10.30:
    name: Эксплуатация каталитических реакторов
    description: |
      Эксплуатация реакторов с неподвижным и псевдоожиженным слоем катализатора.
  BC-4620.10.40:
    name: Эксплуатация фотохимических и электрохимических реакторов
    description: |
      Эксплуатация фотохимических, электрохимических и плазменных реакторов.
  BC-4620.20:
    name: Разделительные единичные операции
    description: |
      Эксплуатация ректификационных, кристаллизационных, фильтрационных,
      сушильных и мембранных разделительных установок.
  BC-4620.20.10:
    name: Ректификационные операции
    description: |
      Эксплуатация тарельчатых и насадочных ректификационных колонн.
  BC-4620.20.20:
    name: Кристаллизационные операции
    description: |
      Эксплуатация охлаждающих, испарительных и реакционных кристаллизаторов.
  BC-4620.20.30:
    name: Фильтрация и разделение твёрдое тело-жидкость
    description: |
      Эксплуатация центрифуг, фильтр-прессов и вакуумных барабанных фильтров.
  BC-4620.20.40:
    name: Сушильные операции
    description: |
      Эксплуатация кипящего слоя, распылительных и контактных сушилок.
  BC-4620.20.50:
    name: Мембранные разделительные операции
    description: |
      Эксплуатация мембран обратного осмоса, ультрафильтрации и первапорации.
  BC-4620.30:
    name: Полимеризационные операции
    description: |
      Эксплуатация массовой, растворной, суспензионной, эмульсионной
      полимеризации и последующего компаундирования полимеров.
  BC-4620.30.10:
    name: Массовые полимеризационные операции
    description: |
      Эксплуатация реакторов массовой и объёмной полимеризации.
  BC-4620.30.20:
    name: Растворная полимеризация
    description: |
      Эксплуатация процессов растворной полимеризации.
  BC-4620.30.30:
    name: Суспензионная и эмульсионная полимеризация
    description: |
      Эксплуатация реакторов суспензионной и эмульсионной полимеризации.
  BC-4620.30.40:
    name: Компаундирование полимеров
    description: |
      Компаундирование полимеров с добавками методом расплавного смешения.
  BC-4620.40:
    name: Неорганические и электрохимические операции
    description: |
      Эксплуатация хлор-щелочного, электролизного, кальцинационного и иных
      процессов неорганического синтеза.
  BC-4620.40.10:
    name: Эксплуатация хлор-щелочных электролизёров
    description: |
      Эксплуатация ртутьсвободных мембранных и диафрагменных хлор-щелочных
      электролизёров.
  BC-4620.40.20:
    name: Электролизные операции
    description: |
      Эксплуатация электролизёров для получения металлов и газов.
  BC-4620.40.30:
    name: Кальцинационные и обжиговые операции
    description: |
      Эксплуатация вращающихся печей, реакторов с псевдоожиженным слоем и
      кальцинаторов.
  BC-4620.40.40:
    name: Операции неорганического синтеза
    description: |
      Эксплуатация установок неорганического синтеза, включая осаждение и
      выщелачивание.
  BC-4620.50:
    name: Управление жизненным циклом катализаторов и химических реагентов
    description: |
      Выбор, мониторинг, регенерация и учёт технологических катализаторов
      и химических реагентов.
  BC-4620.50.10:
    name: Выбор и загрузка катализаторов
    description: |
      Выбор и загрузка катализаторов для реакторов с неподвижным и
      псевдоожиженным слоем.
  BC-4620.50.20:
    name: Мониторинг активности катализаторов
    description: |
      Мониторинг активности и селективности катализаторов в ходе эксплуатации.
  BC-4620.50.30:
    name: Координация регенерации катализаторов
    description: |
      Координация кампаний по регенерации катализаторов in situ и ex situ.
  BC-4620.50.40:
    name: Управление запасами химических реагентов
    description: |
      Управление запасами и расходом растворителей, добавок и технологических
      реагентов.
  BC-4620.60:
    name: Управление процессом и оперативное исполнение
    description: |
      Повседневное выполнение операций с места и из операторской, включая
      мониторинг операционного конверта.
  BC-4620.60.10:
    name: Проведение обходов оборудования
    description: |
      Проведение структурированных обходов и полевых проверок операторами.
  BC-4620.60.20:
    name: Операции на консоли DCS
    description: |
      Работа на консоли, включая реагирование на сигнализацию и
      диспетчерское управление.
  BC-4620.60.30:
    name: Управление сменами
    description: |
      Структурированная передача смен и проверка операционных журналов.
  BC-4620.60.40:
    name: Мониторинг операционного конверта
    description: |
      Мониторинг безопасного и качественного операционного конверта в реальном
      времени.
  BC-4620.70:
    name: Координация планового ремонта установки
    description: |
      Координация объёма, графика и исполнения плановых ремонтов химических
      установок.
  BC-4620.70.10:
    name: Управление объёмом планового ремонта
    description: |
      Определение и фиксирование объёма планового ремонта, включая процедуру
      согласования.
  BC-4620.70.20:
    name: Управление графиком планового ремонта
    description: |
      Детальное планирование графика ремонта и контроль хода работ.
  BC-4620.70.30:
    name: Координация останова и пуска
    description: |
      Последовательный останов, дегазация и координация пуска технологических
      узлов.
  BC-4620.80:
    name: Планирование химического производства
    description: |
      Планирование производства на кампанийной и непрерывной основе, а также
      планирование переключений.
  BC-4620.80.10:
    name: Планирование кампаний
    description: |
      Планирование многопродуктовых кампаний на общих активах.
  BC-4620.80.20:
    name: Последовательность производства
    description: |
      Планирование последовательности выпуска продуктов для минимизации
      переходов и потерь выхода.
  BC-4620.80.30:
    name: Планирование переключений
    description: |
      Планирование и координация переходов между марками и продуктами.

# Перестрахование (ru) — translations for L1-reinsurance-management.yaml
locale: ru
source: L1-reinsurance-management.yaml
entries:
  BC-2170:
    name: Управление перестрахованием
    description: |
      Цедированное и принятое перестрахование — разработка договоров, факультативное размещение,
      бордеро, возмещение убытков, учёт и управление рисками перестраховочных контрагентов.
  BC-2170.10:
    name: Разработка программы цедированного перестрахования
    description: |
      Анализ потребности в перестраховании, структурирование программы и координация с перестраховочными брокерами.
  BC-2170.10.10:
    name: Анализ потребности в перестраховании
    description: |
      Анализ потребностей в перестраховании на основе портфеля, аппетита к риску и ограничений капитала.
  BC-2170.10.20:
    name: Стратегия договорного и факультативного перестрахования
    description: |
      Стратегия по выбору между договорным и факультативным цессированием, пропорциональными и непропорциональными структурами.
  BC-2170.10.30:
    name: Структурирование программы
    description: |
      Структурирование программ перестрахования, слоёв и собственного удержания.
  BC-2170.10.40:
    name: Координация с перестраховочными брокерами
    description: |
      Взаимодействие с перестраховочными брокерами по размещению и возобновлению договоров.
  BC-2170.20:
    name: Администрирование договорного перестрахования
    description: |
      Подключение договоров, расчёт и цессирование премий, подготовка бордеро и возмещение убытков по договорам.
  BC-2170.20.10:
    name: Подключение и возобновление договоров
    description: |
      Подключение и возобновление договоров перестрахования и слип-размещений.
  BC-2170.20.20:
    name: Расчёт и цессирование договорной премии
    description: |
      Расчёт договорных премий и их цессирование участвующим перестраховщикам.
  BC-2170.20.30:
    name: Подготовка договорного бордеро
    description: |
      Подготовка бордеро по договорным премиям и убыткам в соответствии с рыночной практикой.
  BC-2170.20.40:
    name: Возмещение договорных убытков
    description: |
      Получение возмещений по договорным убыткам от перестраховщиков.
  BC-2170.30:
    name: Администрирование факультативного перестрахования
    description: |
      Факультативная подача рисков, отслеживание размещения, урегулирование премий и убытков.
  BC-2170.30.10:
    name: Факультативная подача рисков
    description: |
      Подача индивидуальных рисков для факультативного размещения.
  BC-2170.30.20:
    name: Отслеживание факультативного размещения
    description: |
      Отслеживание подписей и долей факультативного размещения у перестраховщиков.
  BC-2170.30.30:
    name: Урегулирование факультативных премий и убытков
    description: |
      Урегулирование факультативных премий и возмещений по убыткам.
  BC-2170.40:
    name: Управление принятым перестрахованием
    description: |
      Андеррайтинг входящих рисков, учёт премий, урегулирование убытков и координация ретроцессии.
  BC-2170.40.10:
    name: Андеррайтинг входящих предложений
    description: |
      Андеррайтинг входящих перестраховочных предложений и принятие рисков.
  BC-2170.40.20:
    name: Учёт входящих премий
    description: |
      Учёт входящих перестраховочных премий и корректировок.
  BC-2170.40.30:
    name: Урегулирование входящих убытков
    description: |
      Урегулирование входящих перестраховочных убытков и возмещений.
  BC-2170.40.40:
    name: Координация ретроцессии
    description: |
      Координация ретроцессии к перестраховщикам второго уровня.
  BC-2170.50:
    name: Учёт и урегулирование перестрахования
    description: |
      Учёт цессирования, отслеживание возмещений, сверка выписок контрагентов и управление залоговым обеспечением.
  BC-2170.50.10:
    name: Учёт цессирования и премий
    description: |
      Учёт цедированных премий, комиссий и корректировок.
  BC-2170.50.20:
    name: Отслеживание дебиторской задолженности по перестрахованию
    description: |
      Отслеживание дебиторской задолженности по перестрахованию по выплаченным и незакрытым убыткам.
  BC-2170.50.30:
    name: Сверка выписок перестраховщиков
    description: |
      Сверка выписок перестраховщиков и урегулирование разногласий.
  BC-2170.50.40:
    name: Управление залоговым обеспечением контрагентов
    description: |
      Управление аккредитивами, трастовыми фондами и залоговым обеспечением от перестраховщиков.
  BC-2170.60:
    name: Управление риском контрагента по перестрахованию
    description: |
      Оценка кредитоспособности перестраховщиков, мониторинг лимитов контрагентов и снижение риска дефолта.
  BC-2170.60.10:
    name: Оценка кредитоспособности перестраховщиков
    description: |
      Оценка кредитоспособности и финансовой устойчивости перестраховочных контрагентов.
  BC-2170.60.20:
    name: Мониторинг концентрации и лимитов контрагентов
    description: |
      Мониторинг лимитов концентрации и подверженности риску контрагентов.
  BC-2170.60.30:
    name: Снижение риска дефолта перестраховщика
    description: |
      Меры по снижению риска при понижении рейтинга или дефолте перестраховщика.

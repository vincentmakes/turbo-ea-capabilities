# Управление корпоративной недвижимостью (ru) — translations for L1-corporate-real-estate-management.yaml
locale: ru
source: L1-corporate-real-estate-management.yaml
entries:
  BC-710:
    name: Управление корпоративной недвижимостью
    description: |
      Портфель недвижимости, аренда, сделки, планирование пространства.
  BC-710.10:
    name: Стратегия и управление портфелем недвижимости
    description: |
      Стратегия в области недвижимости, формирование портфеля, планирование присутствия.
  BC-710.10.10:
    name: Разработка стратегии в области недвижимости
    description: |
      Многолетняя стратегия в области недвижимости, согласованная с потребностями бизнеса.
  BC-710.10.20:
    name: Планирование присутствия в недвижимости
    description: |
      Планирование присутствия, стратегия локаций и анализ консолидации.
  BC-710.10.30:
    name: Управление результативностью объектов
    description: |
      Отслеживание затрат, использования и результативности по каждому объекту.
  BC-710.10.40:
    name: Управление рисками в области недвижимости
    description: |
      Рыночные, страновые и контрагентские риски в сфере недвижимости.
  BC-710.20:
    name: Управление приобретением и выбытием недвижимости
    description: |
      Приобретения, выбытия, выходы из объектов.
  BC-710.20.10:
    name: Приобретение недвижимости
    description: |
      Приобретение объектов в собственность и аренду, включая due diligence.
  BC-710.20.20:
    name: Выбытие и выход из объектов недвижимости
    description: |
      Продажа, субаренда и выход из объектов недвижимости и договоров аренды.
  BC-710.20.30:
    name: Выбор площадки и переговоры
    description: |
      Анализ локаций, выбор площадки и переговоры по аренде.
  BC-710.30:
    name: Управление арендой
    description: |
      Жизненный цикл аренды, учёт, опционы.
  BC-710.30.10:
    name: Управление арендной документацией
    description: |
      Ведение договоров аренды, аннотаций и ключевых условий.
  BC-710.30.20:
    name: Учёт аренды
    description: |
      Учёт аренды по МСФО 16 / ASC 842.
  BC-710.30.30:
    name: Платежи и выверка по аренде
    description: |
      Арендные, эксплуатационные и CAM-платежи и выверка.
  BC-710.30.40:
    name: Управление опционами и продлением аренды
    description: |
      Отслеживание и исполнение арендных опционов, разрывов и продлений.
  BC-710.40:
    name: Управление стратегией рабочей среды
    description: |
      Концепции рабочей среды, гибридная работа, стандарты дизайна.
  BC-710.40.10:
    name: Проектирование концепции рабочего места
    description: |
      Определение концепций рабочего места, включая деятельностно-ориентированные офисы.
  BC-710.40.20:
    name: Стандарты дизайна рабочего места
    description: |
      Руководства по дизайну, стандарты отделки и брендовые стандарты для рабочих мест.
  BC-710.40.30:
    name: Внедрение политики гибридной работы
    description: |
      Внедрение моделей гибридной работы и соответствующего пространства.
  BC-710.40.40:
    name: Измерение опыта рабочей среды
    description: |
      Измерение опыта и удовлетворённости рабочим местом.

entries:
  BC-1230:
    name: Управление аэронавигационной информацией
    description: |
      Сборники аэронавигационной информации (AIP), NOTAM, аэронавигационные базы данных, картография, цифровые AIM-сервисы.
  BC-1230.10:
    name: Управление сборниками аэронавигационной информации
    description: |
      AIP, цикл AIRAC, поправки, дополнения.
  BC-1230.10.10:
    name: Подготовка AIP
    description: |
      Подготовка сборника аэронавигационной информации.
  BC-1230.10.20:
    name: Управление циклом AIRAC
    description: |
      Управление циклом AIRAC и датами вступления в силу.
  BC-1230.10.30:
    name: Выпуск поправок и дополнений к AIP
    description: |
      Выпуск поправок и дополнений к AIP.
  BC-1230.20:
    name: Управление NOTAM
    description: |
      Составление, публикация, распространение и аннулирование NOTAM.
  BC-1230.20.10:
    name: Составление NOTAM
    description: |
      Составление и подготовка текстов NOTAM.
  BC-1230.20.20:
    name: Публикация и распространение NOTAM
    description: |
      Публикация и распространение через AFTN/AMHS.
  BC-1230.20.30:
    name: Управление жизненным циклом NOTAM
    description: |
      Управление жизненным циклом, включая замену и аннулирование.
  BC-1230.30:
    name: Управление аэронавигационными базами данных
    description: |
      Целостность аэронавигационных данных, прослеживаемость, соответствие AIRAC, качество данных.
  BC-1230.30.10:
    name: Создание аэронавигационных данных
    description: |
      Создание и фиксация аэронавигационных данных в соответствии с Приложением 15 ICAO.
  BC-1230.30.20:
    name: Управление качеством аэронавигационных данных
    description: |
      Контроль качества данных, точность, целостность и разрешение.
  BC-1230.30.30:
    name: Распространение аэронавигационных данных
    description: |
      Распространение аэронавигационных данных пользователям и инструментам.
  BC-1230.30.40:
    name: Прослеживаемость данных и аудит
    description: |
      Прослеживаемость происхождения аэронавигационных данных и аудит.
  BC-1230.40:
    name: Управление картографией и проектированием процедур
    description: |
      Аэронавигационные карты, схемы инструментального захода на посадку, проектирование процедур PBN.
  BC-1230.40.10:
    name: Подготовка аэронавигационных карт
    description: |
      Подготовка карт для воздушных трасс, районов аэродромов и аэродромных схем.
  BC-1230.40.20:
    name: Проектирование схем инструментальных полётов
    description: |
      Проектирование SID, STAR и схем инструментального захода на посадку.
  BC-1230.40.30:
    name: Проектирование процедур навигации по характеристикам
    description: |
      Проектирование процедур PBN, включая RNP и RNAV.
  BC-1230.40.40:
    name: Валидация и утверждение процедур
    description: |
      Валидация процедур, лётная проверка и регуляторное утверждение.
  BC-1230.50:
    name: Управление цифровыми AIM-сервисами
    description: |
      Цифровые информационные продукты, сервисы SWIM, машиночитаемые AIM-данные.
  BC-1230.50.10:
    name: Управление цифровыми информационными продуктами
    description: |
      Управление цифровыми AIM-продуктами (на основе AIXM).
  BC-1230.50.20:
    name: Предоставление сервисов SWIM
    description: |
      Предоставление сервисов общесистемного управления информацией (SWIM).
  BC-1230.50.30:
    name: Распространение машиночитаемых AIM-данных
    description: |
      Распространение машиночитаемых AIM-данных подписчикам.

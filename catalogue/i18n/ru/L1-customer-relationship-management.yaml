# Управление отношениями с клиентами (ru) — translations for L1-customer-relationship-management.yaml
locale: ru
source: L1-customer-relationship-management.yaml
entries:
  BC-420:
    name: Управление отношениями с клиентами
    description: |
      Клиентские данные, сегментирование, жизненный цикл, программы лояльности.
  BC-420.10:
    name: Управление клиентскими данными
    description: |
      Клиентские мастер-данные, идентификация, единая запись.
  BC-420.10.10:
    name: Управление мастер-данными клиентов
    description: |
      Создание, поддержание и управление мастер-записями клиентов.
  BC-420.10.20:
    name: Идентификация клиентов
    description: |
      Сопоставление, слияние и дедупликация клиентских записей.
  BC-420.10.30:
    name: Управление согласиями и предпочтениями
    description: |
      Получение и соблюдение маркетинговых согласий и предпочтений клиентов.
  BC-420.10.40:
    name: Единый профиль клиента
    description: |
      Агрегированный профиль клиента по продуктам, каналам и взаимодействиям.
  BC-420.20:
    name: Управление сегментированием клиентов
    description: |
      Сегменты, персоны, стратегии работы.
  BC-420.20.10:
    name: Поведенческое сегментирование
    description: |
      Сегментирование на основе поведения, RFM и сигналов вовлечённости.
  BC-420.20.20:
    name: Сегментирование по ценности
    description: |
      Сегментирование по жизненной ценности клиента и прибыльности.
  BC-420.20.30:
    name: Разработка клиентских персон
    description: |
      Определение персон и целевых клиентских архетипов.
  BC-420.20.40:
    name: Определение стратегий работы с сегментами
    description: |
      Дифференцированные стратегии работы по сегментам.
  BC-420.30:
    name: Управление жизненным циклом клиента
    description: |
      Привлечение, развитие, удержание, возврат клиентов.
  BC-420.30.10:
    name: Управление привлечением клиентов
    description: |
      Кампании по привлечению, конверсия и оркестрация адаптации.
  BC-420.30.20:
    name: Развитие клиентов и кросс-продажи
    description: |
      Программы кросс-продаж, апсейла и расширения клиентской базы.
  BC-420.30.30:
    name: Управление удержанием клиентов
    description: |
      Прогнозирование оттока, предложения по удержанию и службы спасения клиентов.
  BC-420.30.40:
    name: Управление возвратом клиентов
    description: |
      Кампании по возврату и реактивация неактивных клиентов.
  BC-420.40:
    name: Управление программами лояльности и удержания
    description: |
      Программы лояльности, инициативы по удержанию клиентов.
  BC-420.40.10:
    name: Проектирование программы лояльности
    description: |
      Проектирование структуры, уровней и преимуществ программы лояльности.
  BC-420.40.20:
    name: Операции программы лояльности
    description: |
      Начисление, списание баллов и обслуживание участников программы лояльности.
  BC-420.40.30:
    name: Управление обязательствами по лояльности
    description: |
      Учёт и управление обязательствами по программе лояльности и их погашение.
  BC-420.40.40:
    name: Управление партнёрской экосистемой лояльности
    description: |
      Интеграция партнёров, погашение вознаграждений и коалиционные соглашения.

# Поддержка и благополучие студентов (ru) — translations for L1-student-support-wellbeing-management.yaml
locale: ru
source: L1-student-support-wellbeing-management.yaml
entries:
  BC-4770:
    name: Поддержка и благополучие студентов
    description: |
      Неучебные услуги, поддерживающие академическую успешность и благополучие
      студентов, включая академическое консультирование, психологическую помощь,
      доступность и специальные образовательные условия, карьерные службы и
      пасторское попечение.
  BC-4770.10:
    name: Академическое консультирование
    description: |
      Консультирование студентов по планированию программы, выбору курсов и
      академическому продвижению, включая поддержку студентов группы риска.
    in_scope:
      - Консультирование по планированию программы
      - Консультирование студентов группы риска
      - Поддержка студентов на академической задолженности
    out_of_scope:
      - Карьерное консультирование (охватывается карьерными службами)
      - Психологическое консультирование (охватывается психологической службой)
  BC-4770.10.10:
    name: Консультирование по планированию программы
    description: |
      Консультирование по структуре программы, выбору курсов и траектории
      выпуска.
  BC-4770.10.20:
    name: Консультирование студентов группы риска
    description: |
      Целенаправленное консультирование студентов, выявленных как академически
      неуспевающие.
  BC-4770.10.30:
    name: Поддержка студентов на академической задолженности
    description: |
      Структурированная поддержка студентов с академическими задолженностями.
  BC-4770.20:
    name: Психологическое консультирование и психическое здоровье
    description: |
      Оказание услуг по оценке психического здоровья, консультированию и
      кризисному реагированию студентам.
    in_scope:
      - Оценка и сортировка по психическому здоровью
      - Проведение консультаций
      - Координация кризисного реагирования
    out_of_scope:
      - Клиническая медицинская помощь за рамками консультирования
  BC-4770.20.10:
    name: Оценка и сортировка по психическому здоровью
    description: |
      Первоначальная оценка и сортировка по потребностям психического
      здоровья студентов.
  BC-4770.20.20:
    name: Проведение консультаций
    description: |
      Проведение индивидуальных и групповых консультаций.
  BC-4770.20.30:
    name: Координация кризисного реагирования
    description: |
      Координация кризисного реагирования и направление к внешним
      специалистам.
  BC-4770.30:
    name: Службы по инвалидности и доступности
    description: |
      Определение и предоставление разумных приспособлений для студентов с
      инвалидностью и обеспечение вспомогательными технологиями.
    in_scope:
      - Проверка документации по инвалидности
      - Предоставление разумных приспособлений
      - Поддержка вспомогательными технологиями
    out_of_scope:
      - Специальные образовательные программы для К-12 (охватываются специальным образованием)
      - Отчётность о соблюдении гражданских прав (охватывается регуляторным соответствием)
  BC-4770.30.10:
    name: Проверка документации по инвалидности
    description: |
      Проверка документации, подтверждающей запросы на приспособления.
  BC-4770.30.20:
    name: Предоставление разумных приспособлений
    description: |
      Предоставление академических приспособлений и условий оценивания.
  BC-4770.30.30:
    name: Поддержка вспомогательными технологиями
    description: |
      Предоставление и поддержка вспомогательных технологий студентам.
  BC-4770.40:
    name: Специальное образование
    description: |
      Законодательно установленные услуги специального образования,
      предоставляемые преимущественно в системе К-12, включая индивидуальные
      образовательные программы и сопутствующие услуги.
    in_scope:
      - Разработка индивидуальных образовательных программ (ИОП)
      - Предоставление специализированных инструкций
      - Координация сопутствующих услуг (логопедия, трудотерапия, физиотерапия)
    out_of_scope:
      - Приспособления в системе высшего образования (охватываются службами по инвалидности)
  BC-4770.40.10:
    name: Разработка индивидуальных образовательных программ
    description: |
      Разработка ИОП и эквивалентных индивидуальных планов.
  BC-4770.40.20:
    name: Специализированные инструкции
    description: |
      Предоставление специализированных инструкций студентам с выявленными
      потребностями.
  BC-4770.40.30:
    name: Координация сопутствующих услуг
    description: |
      Координация сопутствующих услуг: логопедии, трудотерапии и
      физиотерапии.
  BC-4770.50:
    name: Карьерные службы и трудоустройство
    description: |
      Карьерное консультирование, содействие в поиске стажировок и работы,
      управление отношениями с работодателями для поддержки перехода
      студентов к трудоустройству.
    in_scope:
      - Карьерное консультирование
      - Содействие в поиске стажировок и практик
      - Отношения с работодателями и организация найма на площадке
    out_of_scope:
      - Надзор за зачётными стажировками (охватывается организацией учебного процесса)
  BC-4770.50.10:
    name: Карьерное консультирование
    description: |
      Карьерное консультирование и планирование для студентов и недавних
      выпускников.
  BC-4770.50.20:
    name: Содействие в поиске стажировок
    description: |
      Содействие в поиске стажировок и возможностей рабочего опыта.
  BC-4770.50.30:
    name: Отношения с работодателями и организация найма на площадке
    description: |
      Управление отношениями с работодателями и организация мероприятий по
      найму на площадке учебного заведения.
  BC-4770.60:
    name: Пасторское попечение и благополучие студентов
    description: |
      Пасторское попечение, наставничество, поддержка в вопросах поведения
      и программы благополучия.
    in_scope:
      - Пасторское попечение и наставничество
      - Поддержка в вопросах поведения и дисциплины
      - Программы благополучия
    out_of_scope:
      - Правоприменительные действия по гражданским правам (охватываются регуляторным соответствием)
  BC-4770.60.10:
    name: Пасторское попечение и наставничество
    description: |
      Пасторское попечение и наставничество студентов тьюторами и специальным
      персоналом.
  BC-4770.60.20:
    name: Поддержка в вопросах поведения и дисциплины
    description: |
      Поддержка в дисциплинарных процессах в отношении студентов.
  BC-4770.60.30:
    name: Программы благополучия
    description: |
      Реализация институциональных программ и кампаний по благополучию.

# Управление функциональной безопасностью и надёжностью (ru) — translations for L1-functional-safety-reliability-management.yaml
locale: ru
source: L1-functional-safety-reliability-management.yaml
entries:
  BC-1970:
    name: Управление функциональной безопасностью и надёжностью
    description: |
      Анализ функциональной безопасности продуктов (IEC 61508/61511/13849, ISO 26262) и инженерия надёжности — в отличие от общего управления качеством и выполнения производственных испытаний.
  BC-1970.10:
    name: Управление анализом функциональной безопасности
    description: |
      Анализ опасностей, рисков и концепции безопасности для электрических продуктов, связанных с безопасностью.
  BC-1970.10.10:
    name: Анализ опасностей и рисков
    description: |
      Идентификация опасностей и анализ рисков для продуктов, связанных с безопасностью.
  BC-1970.10.20:
    name: Определение концепции безопасности
    description: |
      Определение функциональной и технической концепции безопасности.
  BC-1970.10.30:
    name: Распределение требований безопасности
    description: |
      Распределение требований безопасности по подсистемам и компонентам.
  BC-1970.10.40:
    name: Подготовка обоснования безопасности
    description: |
      Подготовка обоснований безопасности для выпуска продукта.
  BC-1970.20:
    name: Определение уровня полноты безопасности
    description: |
      Установка целевых уровней полноты по IEC 61508, ISO 26262 и ISO 13849.
  BC-1970.20.10:
    name: Установка целевых уровней SIL
    description: |
      Определение уровней полноты безопасности (SIL) по IEC 61508.
  BC-1970.20.20:
    name: Декомпозиция ASIL
    description: |
      Декомпозиция уровней ASIL для автомобильной электроники, связанной с безопасностью.
  BC-1970.20.30:
    name: Определение уровня производительности
    description: |
      Определение уровней производительности по ISO 13849.
  BC-1970.30:
    name: Управление инженерией надёжности
    description: |
      Определение требований к надёжности, прогнозирование, распределение и планирование роста.
  BC-1970.30.10:
    name: Определение требований к надёжности
    description: |
      Определение требований к надёжности в соответствии с профилями применения.
  BC-1970.30.20:
    name: Прогнозное моделирование надёжности
    description: |
      Прогнозное моделирование методами подсчёта деталей и нагрузочными методами.
  BC-1970.30.30:
    name: Распределение надёжности
    description: |
      Нисходящее распределение бюджетов надёжности по подсистемам.
  BC-1970.30.40:
    name: Планирование роста надёжности
    description: |
      Планирование роста надёжности и корректирующих мероприятий.
  BC-1970.40:
    name: Анализ разрядки компонентов и нагрузочный анализ
    description: |
      Анализ электрических, тепловых и механических нагрузок и применение коэффициентов разрядки.
  BC-1970.40.10:
    name: Электрическая разрядка компонентов
    description: |
      Применение правил электрической разрядки к компонентам.
  BC-1970.40.20:
    name: Тепловая разрядка
    description: |
      Тепловой анализ разрядки компонентов в условиях эксплуатации.
  BC-1970.40.30:
    name: Анализ механических нагрузок
    description: |
      Анализ механических нагрузок и усталости компонентов.
  BC-1970.50:
    name: Анализ режимов отказа
    description: |
      Конструкторский и технологический FMEA, критичностный анализ FMECA.
  BC-1970.50.10:
    name: Конструкторский FMEA
    description: |
      Анализ видов, последствий и причин отказов конструкции продуктов.
  BC-1970.50.20:
    name: Технологический FMEA
    description: |
      Анализ видов, последствий и причин отказов производственного процесса.
  BC-1970.50.30:
    name: Критичностный анализ FMECA
    description: |
      Критичностный анализ, дополняющий результаты FMEA.
  BC-1970.60:
    name: Управление полевыми отказами и ростом надёжности
    description: |
      Сбор и анализ данных о полевых отказах для роста надёжности.
  BC-1970.60.10:
    name: Сбор данных о полевых отказах
    description: |
      Сбор данных об отказах из установленной базы.
  BC-1970.60.20:
    name: Анализ тенденций режимов отказа
    description: |
      Анализ тенденций наблюдаемых режимов отказа.
  BC-1970.60.30:
    name: Отслеживание роста надёжности
    description: |
      Отслеживание роста надёжности по поколениям продуктов.
  BC-1970.70:
    name: Координация сертификации функциональной безопасности
    description: |
      Взаимодействие с независимыми оценщиками и органами сертификации функциональной безопасности.
  BC-1970.70.10:
    name: Взаимодействие с оценщиком функциональной безопасности
    description: |
      Взаимодействие с независимыми оценщиками функциональной безопасности.
  BC-1970.70.20:
    name: Подача документов на сертификацию безопасности
    description: |
      Подача досье по функциональной безопасности для сертификации.
  BC-1970.70.30:
    name: Надзор за функциональной безопасностью
    description: |
      Периодические надзорные аудиты процессов функциональной безопасности.

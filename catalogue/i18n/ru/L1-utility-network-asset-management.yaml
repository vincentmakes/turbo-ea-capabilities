# Активы коммунальной инфраструктуры (ru) — translations for L1-utility-network-asset-management.yaml
locale: ru
source: L1-utility-network-asset-management.yaml
entries:
  BC-3900:
    name: Активы коммунальной инфраструктуры
    description: |
      Управление жизненным циклом долгосрочных инфраструктурных активов коммунальных сетей — электроснабжения, газоснабжения, водоснабжения и водоотведения — включая реестр активов, контроль состояния и эксплуатационной пригодности, оценку рисков и критичности, инвестиционное планирование с учётом регулируемой базы активов, программы обновления, отчётность о производительности и геопространственные записи о сети.
  BC-3900.10:
    name: Управление реестром активов
    description: |
      Ведение реестра коммунальных активов как единого источника достоверных данных о сетевых объектах и их иерархических взаимосвязях.
  BC-3900.10.10:
    name: Управление мастер-данными активов
    description: |
      Контроль атрибутов и классификации мастер-данных активов.
  BC-3900.10.20:
    name: Ведение иерархии активов
    description: |
      Поддержание функциональных и физических иерархий для сетевых активов.
  BC-3900.10.30:
    name: Сверка реестра активов
    description: |
      Согласование реестра активов, ГИС и операционных систем.
  BC-3900.20:
    name: Мониторинг состояния и пригодности активов
    description: |
      Техническое обследование, испытания и онлайн-мониторинг состояния активов для оценки их технического здоровья и расстановки приоритетов.
  BC-3900.20.10:
    name: Программа технических обследований
    description: |
      Циклические программы обследования основного оборудования и сетевых активов.
  BC-3900.20.20:
    name: Онлайн-мониторинг состояния
    description: |
      Непрерывный мониторинг трансформаторов, кабелей и вращающегося оборудования.
  BC-3900.20.30:
    name: Оценка технического здоровья активов
    description: |
      Расчёт индексов технического здоровья активов на основе данных обследований, испытаний и эксплуатации.
  BC-3900.30:
    name: Оценка рисков и критичности активов
    description: |
      Количественная оценка рисков активов с учётом вероятности отказа, последствий и критичности для расстановки приоритетов вмешательств.
  BC-3900.30.10:
    name: Оценка критичности активов
    description: |
      Оценка критичности коммунальных активов по влиянию на сеть и общество.
  BC-3900.30.20:
    name: Моделирование вероятности отказов
    description: |
      Статистическое и основанное на состоянии моделирование вероятности отказа.
  BC-3900.30.30:
    name: Монетизированный расчёт рисков
    description: |
      Расчёт монетизированного риска в соответствии с нормативными методиками анализа затрат и выгод.
  BC-3900.40:
    name: Инвестиционное планирование активов
    description: |
      Долгосрочное и синхронизированное с контрольными параметрами цен инвестиционное планирование по категориям сетей для регулируемых и нерегулируемых программ.
    in_scope:
      - Разработка многолетних капитальных и совокупных затратных планов
      - Анализ затрат и выгод по сетевым вмешательствам
      - Приоритизация инвестиционного портфеля
    out_of_scope:
      - Межотраслевое управление проектным портфелем (BC-900)
      - Планирование выручки на стороне тарифов (BC-3920.30)
  BC-3900.40.10:
    name: Капитальное инвестиционное планирование
    description: |
      Многолетнее планирование сетевых капиталовложений по классам активов.
  BC-3900.40.20:
    name: Анализ затрат и выгод
    description: |
      Оценка инвестиционных вариантов в соответствии с нормативными критериями.
  BC-3900.40.30:
    name: Приоритизация инвестиционного портфеля
    description: |
      Межкатегориальная приоритизация портфеля при ограниченных капитальных и ресурсных возможностях.
  BC-3900.50:
    name: Планирование обновления и замены активов
    description: |
      Программное планирование обновления, замены и вывода из эксплуатации активов, достигших конца срока службы.
  BC-3900.50.10:
    name: Прогнозирование конца срока службы
    description: |
      Прогнозирование конца срока службы активов по классам и возрастным группам.
  BC-3900.50.20:
    name: Разработка программы обновления
    description: |
      Разработка многолетних программ обновления по категориям и географии активов.
  BC-3900.50.30:
    name: Планирование вывода из эксплуатации
    description: |
      Планирование работ по выводу из эксплуатации, консервации и восстановлению.
  BC-3900.60:
    name: Отчётность о производительности активов
    description: |
      Отчётность о производительности активов и совокупных затратах в сравнении с нормативными и внутренними целевыми показателями.
  BC-3900.60.10:
    name: Отчётность по KPI сетевой производительности
    description: |
      Отчётность по SAIDI, SAIFI, потерям и аналогичным сетевым KPI.
  BC-3900.60.20:
    name: Отчётность о совокупных затратах
    description: |
      Отчётность о совокупных расходах в сравнении с нормативами ценового контроля.
  BC-3900.60.30:
    name: Анализ тенденций отказов активов
    description: |
      Анализ динамики отказов активов и эффективности вмешательств.
  BC-3900.70:
    name: Управление ГИС и сетевой документацией
    description: |
      Геопространственные данные о сетевых активах — схемы, трубопроводы, коллекторы и точки подключения — и их интеграция с операционными системами.
  BC-3900.70.10:
    name: Ведение сетевой ГИС-документации
    description: |
      Поддержание ГИС-записей о топологии сети и расположении активов.
  BC-3900.70.20:
    name: Занесение исполнительной документации
    description: |
      Внесение изменений «как построено» из строительных и ремонтных проектов в ГИС.
  BC-3900.70.30:
    name: Поиск данных о подземных активах
    description: |
      Предоставление сведений о подземных коммунальных объектах по запросам сторонних подрядчиков.

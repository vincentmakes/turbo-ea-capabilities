# Координация медицинской помощи (ru) — translations for L1-care-coordination-management.yaml
locale: ru
source: L1-care-coordination-management.yaml
entries:
  BC-2820:
    name: Координация медицинской помощи
    description: |
      Координация помощи между провайдерами, условиями и во времени: направления, ведение случаев, переходы помощи, планирование выписки, управление утилизацией и связь с сообществом.
  BC-2820.10:
    name: Управление направлениями
    description: |
      Сквозное управление направлениями пациентов от получения заявки до подбора специалиста, отслеживания и закрытия.
  BC-2820.10.10:
    name: Оформление направления
    description: |
      Оформление направлений от направляющих врачей с необходимым клиническим контекстом.
  BC-2820.10.20:
    name: Подбор специалиста
    description: |
      Подбор специалистов по направлениям с учётом клинической потребности, сети и доступности.
  BC-2820.10.30:
    name: Отслеживание направлений
    description: |
      Отслеживание статуса направления, записи и выполнения по всей сети.
  BC-2820.10.40:
    name: Закрытие направления
    description: |
      Закрытие направлений с обратной связью от консультанта направившему врачу.
  BC-2820.20:
    name: Ведение случая и управление помощью
    description: |
      Выявление, планирование и проведение вмешательств по ведению случаев для пациентов высокого риска и сложных пациентов.
  BC-2820.20.10:
    name: Стратификация случаев
    description: |
      Распределение пациентов по уровням ведения случаев на основе клинических и социальных рисков.
  BC-2820.20.20:
    name: Разработка плана помощи
    description: |
      Разработка индивидуальных планов помощи с целями, ориентированными на пациента.
  BC-2820.20.30:
    name: Реализация плана помощи
    description: |
      Реализация и непрерывная переоценка вмешательств по плану помощи.
  BC-2820.20.40:
    name: Назначение координатора помощи
    description: |
      Назначение и управление нагрузкой координаторов помощи и навигаторов.
  BC-2820.30:
    name: Планирование выписки
    description: |
      Планирование безопасной выписки из стационара, включая оценку потребностей, постстационарное устройство и обучение пациента.
  BC-2820.30.10:
    name: Оценка потребностей при выписке
    description: |
      Мультидисциплинарная оценка клинических и социальных потребностей после выписки.
  BC-2820.30.20:
    name: Разработка плана выписки
    description: |
      Разработка планов выписки, включая услуги, оборудование и последующее наблюдение.
  BC-2820.30.30:
    name: Постстационарное устройство
    description: |
      Устройство пациентов в учреждения квалифицированного сестринского ухода, реабилитации и патронажной помощи.
  BC-2820.30.40:
    name: Обучение при выписке
    description: |
      Обучение пациента и ухаживающего лица инструкциям при выписке, лекарственным препаратам и признакам ухудшения.
  BC-2820.40:
    name: Переходы помощи
    description: |
      Координация переходов пациентов между провайдерами и условиями для обеспечения непрерывности, безопасности и ответственности за исходы.
  BC-2820.40.10:
    name: Коммуникация при передаче помощи
    description: |
      Структурированная передача информации между провайдерами и командами в точках перехода помощи.
  BC-2820.40.20:
    name: Сверка лекарственных препаратов при переходах
    description: |
      Сверка лекарственных препаратов при переходах помощи.
  BC-2820.40.30:
    name: Запись на повторный приём
    description: |
      Запись на приёмы после выписки и после визита.
  BC-2820.40.40:
    name: Отслеживание исходов переходов
    description: |
      Отслеживание показателей повторной госпитализации, осложнений и исходов при переходах помощи.
  BC-2820.50:
    name: Управление утилизацией
    description: |
      Проверка и контроль госпитализаций, продолжающегося пребывания и длительности госпитализации по критериям медицинской необходимости.
  BC-2820.50.10:
    name: Проверка госпитализации
    description: |
      Проверка медицинской необходимости госпитализации и статуса стационарного лечения в сравнении с наблюдением.
  BC-2820.50.20:
    name: Проверка продолжающегося пребывания
    description: |
      Периодическая проверка продолжения стационарного лечения по критериям.
  BC-2820.50.30:
    name: Оптимизация длительности госпитализации
    description: |
      Оптимизация длительности госпитализации путём выявления и устранения барьеров.
  BC-2820.50.40:
    name: Отслеживание предотвратимых дней
    description: |
      Фиксация и анализ предотвратимых стационарных дней и их коренных причин.
  BC-2820.60:
    name: Социальные детерминанты и связь с сообществом
    description: |
      Выявление социальных детерминант здоровья и направление в ресурсы сообщества для поддержки клинических исходов.
  BC-2820.60.10:
    name: Скрининг социальных потребностей
    description: |
      Скрининг на предмет жилищных, продовольственных, транспортных и иных социальных потребностей.
  BC-2820.60.20:
    name: Направление к ресурсам сообщества
    description: |
      Направление к ресурсам сообщества для удовлетворения выявленных социальных потребностей.
  BC-2820.60.30:
    name: Документирование социальных детерминант
    description: |
      Структурированное документирование социальных детерминант в медицинской карте.
  BC-2820.60.40:
    name: Отслеживание направлений по замкнутому циклу
    description: |
      Отслеживание общественных направлений по замкнутому циклу до исхода и разрешения.

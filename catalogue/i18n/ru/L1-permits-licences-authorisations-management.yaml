# Разрешения, лицензии и согласования (ru) — translations for L1-permits-licences-authorisations-management.yaml
locale: ru
source: L1-permits-licences-authorisations-management.yaml
entries:
  BC-3240:
    name: Разрешения, лицензии и согласования
    description: |
      Выдача, продление, приостановление, отзыв и ведение реестра разрешений, лицензий и согласований, выдаваемых государством физическим лицам, организациям и на виды деятельности, включая профессиональные, экологические, а также разрешения на операционную деятельность.
  BC-3240.10:
    name: Приём и сортировка заявлений
    description: |
      Приём, проверка полноты и сортировка заявлений на получение разрешений, лицензий и согласований.
  BC-3240.10.10:
    name: Подача заявлений
    description: |
      Многоканальная подача заявлений на получение разрешений и лицензий.
  BC-3240.10.20:
    name: Проверка полноты заявлений
    description: |
      Проверка полноты представленных документов и соответствия документальным требованиям.
  BC-3240.10.30:
    name: Маршрутизация заявлений
    description: |
      Направление заявлений в соответствующий лицензирующий орган и рецензенту.
  BC-3240.10.40:
    name: Оценка и взимание сборов
    description: |
      Оценка и взимание установленных законом сборов за подачу заявлений и лицензирование.
  BC-3240.20:
    name: Оценка права и квалификации
    description: |
      Оценка пригодности, квалификации заявителя и установленных законом критериев для запрашиваемого разрешения.
  BC-3240.20.10:
    name: Оценка деловой репутации
    description: |
      Оценка пригодности, добросовестности и дисквалифицирующей истории заявителя.
  BC-3240.20.20:
    name: Верификация квалификации
    description: |
      Верификация квалификации, компетенций и предварительных требований для получения лицензии.
  BC-3240.20.30:
    name: Координация проверки биографических данных
    description: |
      Координация проверки биографических данных, судимостей и проверок безопасности при необходимости.
  BC-3240.20.40:
    name: Оценка общественных интересов
    description: |
      Оценка установленных законом критериев общественного интереса, экологических требований или требований землепользования.
  BC-3240.30:
    name: Операции по выдаче и продлению
    description: |
      Принятие решений, выдача и продление разрешений, лицензий и согласований с указанием условий, срока и учётных данных.
  BC-3240.30.10:
    name: Лицензионное решение
    description: |
      Принятие решений о выдаче, отказе или условной выдаче разрешений и лицензий.
  BC-3240.30.20:
    name: Выдача учётных данных
    description: |
      Изготовление и выдача физических и цифровых лицензионных документов.
  BC-3240.30.30:
    name: Обработка продлений
    description: |
      Обработка заявлений на продление и проверки сохранения права.
  BC-3240.30.40:
    name: Обработка изменений и дополнений
    description: |
      Обработка изменений, дополнений и корректировок условий.
  BC-3240.40:
    name: Инспекция и верификация соответствия
    description: |
      Инспекция, проверка и верификация соответствия лицензиата условиям разрешений и установленным законом обязательствам.
  BC-3240.40.10:
    name: Планирование инспекций
    description: |
      Риск-ориентированное планирование и составление графика проверок соответствия.
  BC-3240.40.20:
    name: Проведение полевых инспекций
    description: |
      Проведение выездных проверок и фиксация доказательств.
  BC-3240.40.30:
    name: Проверка отчётов о соответствии
    description: |
      Проверка обязательных отчётов о соответствии и самосертификаций лицензиатов.
  BC-3240.50:
    name: Приостановление, отзыв и санкции
    description: |
      Принудительные меры, включая предупреждения, приостановление, отзыв, гражданские штрафы и санкции для несоответствующих лицензиатов.
  BC-3240.50.10:
    name: Расследование нарушений
    description: |
      Расследование подозреваемых нарушений условий лицензии.
  BC-3240.50.20:
    name: Решение о принудительных мерах
    description: |
      Принятие решений о принудительных мерах от предупреждений до отзыва лицензии.
  BC-3240.50.30:
    name: Выдача гражданских штрафов
    description: |
      Выдача, фиксация и взыскание гражданских штрафов.
  BC-3240.50.40:
    name: Исполнение приостановления и отзыва
    description: |
      Исполнение приказов о приостановлении и отзыве и изъятие лицензионных документов.
  BC-3240.60:
    name: Ведение реестра лицензий
    description: |
      Ведение и публичное раскрытие реестров выданных, приостановленных и отозванных разрешений и лицензий.
  BC-3240.60.10:
    name: Ведение реестра
    description: |
      Ведение авторитетных реестров лицензий и разрешений.
  BC-3240.60.20:
    name: Публичное раскрытие реестра
    description: |
      Публикация общедоступных реестров и поисковых сервисов.
  BC-3240.60.30:
    name: Сервисы верификации реестра
    description: |
      Предоставление сервисов верификации учётных данных доверяющим сторонам.

# Расчёты по грузоперевозкам (ru) — translations for L1-freight-billing-settlement-management.yaml
locale: ru
source: L1-freight-billing-settlement-management.yaml
entries:
  BC-2530:
    name: Управление расчётами по грузоперевозкам
    description: |
      Выставление грузовых счетов, аудит и оплата счетов перевозчиков, интерлайновые
      и пул-расчёты, грузовые претензии и учёт грузовой выручки.
  BC-2530.10:
    name: Управление грузовым выставлением счетов
    description: |
      Формирование и рассылка грузовых, вспомогательных и счетов самовыставления клиентам.
    in_scope:
      - Формирование грузовых счетов
      - Сверка при самовыставлении счетов клиентами
    out_of_scope:
      - Общие процессы дебиторской задолженности (BC-200)
      - Стратегия ценообразования для клиентов (BC-440)
  BC-2530.10.10:
    name: Формирование грузовых счетов
    description: |
      Формирование грузовых счетов по выполненным перевозкам.
  BC-2530.10.20:
    name: Формирование счетов по дополнительным услугам
    description: |
      Формирование счетов по дополнительным услугам и надбавкам.
  BC-2530.10.30:
    name: Координация самовыставления счетов клиентами
    description: |
      Сверка выписок при самовыставлении счетов клиентами с данными об отправках.
  BC-2530.20:
    name: Управление аудитом и оплатой счетов перевозчиков
    description: |
      Аудит счетов перевозчиков и выполнение платежей грузоотправителями и экспедиторами.
  BC-2530.20.10:
    name: Аудит счетов перевозчиков
    description: |
      Аудит счетов перевозчиков по контрактам, тарифам и отправкам.
  BC-2530.20.20:
    name: Досетевая и постаудитная сверка
    description: |
      Досетевая и постаудитная сверка счетов перевозчиков.
  BC-2530.20.30:
    name: Выполнение платежей перевозчикам
    description: |
      Выполнение платежей перевозчикам и отчётность по ремиттансу.
  BC-2530.30:
    name: Управление интерлайновыми и многоперевозчиковыми расчётами
    description: |
      Расчёты выручки и расходов между интерлайновыми партнёрами, альянсами
      и подразделениями экспедиторов.
  BC-2530.30.10:
    name: Расчёт пропорциональной доли интерлайна
    description: |
      Расчёт пропорциональной доли интерлайновой выручки между партнёрами.
  BC-2530.30.20:
    name: Расчёты через IATA CASS
    description: |
      Проведение расчётов через систему IATA CASS для авиагрузоперевозок.
  BC-2530.30.30:
    name: Межофисные расчёты
    description: |
      Межофисные расчёты выручки и расходов экспедитора.
  BC-2530.40:
    name: Управление грузовыми претензиями
    description: |
      Приём, оценка и урегулирование грузовых претензий в рамках транспортных
      конвенций об ответственности.
  BC-2530.40.10:
    name: Приём и подтверждение претензии
    description: |
      Приём и подтверждение претензий по утрате и повреждению груза.
  BC-2530.40.20:
    name: Оценка ответственности
    description: |
      Оценка ответственности перевозчика по Гаагско-Висбийским правилам,
      Монреальской конвенции, CMR и COTIF.
  BC-2530.40.30:
    name: Урегулирование претензий и выплата
    description: |
      Урегулирование принятых претензий и выплата клиентам.
  BC-2530.40.40:
    name: Регресс и суброгация по претензиям
    description: |
      Регресс к базовым перевозчикам и суброгация к страховщикам.
  BC-2530.50:
    name: Управление учётом грузовой выручки
    description: |
      Признание, отслеживание и отчётность по грузовой выручке, включая
      невыставленные и отложенные позиции.
  BC-2530.50.10:
    name: Признание грузовой выручки
    description: |
      Признание грузовой выручки в соответствии с применимыми стандартами бухгалтерского учёта.
  BC-2530.50.20:
    name: Отслеживание невыставленной выручки
    description: |
      Отслеживание невыставленной и начисленной грузовой выручки.
  BC-2530.50.30:
    name: Отчётность по грузовой выручке
    description: |
      Отчётность по грузовой выручке для финансовых и коммерческих подразделений.

# Химические исследования и разработка процессов (ru) — translations for L1-chemical-research-process-development-management.yaml
locale: ru
source: L1-chemical-research-process-development-management.yaml
entries:
  BC-4600:
    name: Химические исследования и разработка процессов
    description: |
      Открытие новых молекул и маршрутов синтеза, разработка процессов в
      лабораторном масштабе, управление опытной установкой и масштабирование
      до коммерческого производства химической продукции.
  BC-4600.10:
    name: Открытие молекул и маршрутов синтеза
    description: |
      Идентификация целевых молекул и выбор жизнеспособных маршрутов синтеза
      для новых и действующих химических продуктов.
  BC-4600.10.10:
    name: Идентификация целевых молекул
    description: |
      Идентификация молекул-кандидатов в соответствии с прикладными задачами.
  BC-4600.10.20:
    name: Ретросинтетический анализ
    description: |
      Компьютерный и экспертный ретросинтетический анализ маршрутов синтеза.
  BC-4600.10.30:
    name: Скрининг катализаторов и реагентов
    description: |
      Высокопроизводительный и целенаправленный скрининг катализаторов и
      реагентов.
  BC-4600.10.40:
    name: Оценка и выбор маршрута синтеза
    description: |
      Многокритериальная оценка маршрутов-кандидатов по выходу, стоимости,
      безопасности и экологичности.
  BC-4600.20:
    name: Исследование кинетики и термодинамики реакций
    description: |
      Получение кинетических и термодинамических данных, необходимых для
      моделирования и проектирования химических процессов.
  BC-4600.20.10:
    name: Измерение кинетики реакций
    description: |
      Измерение скоростей реакций и констант скоростей в контролируемых
      условиях.
  BC-4600.20.20:
    name: Измерение термодинамических свойств
    description: |
      Определение энтальпии, энтропии и теплоёмкости реагентов и продуктов.
  BC-4600.20.30:
    name: Исследования фазового равновесия
    description: |
      Эксперименты по равновесию пар-жидкость, жидкость-жидкость и твёрдое
      тело-жидкость.
  BC-4600.20.40:
    name: Разработка кинетических моделей
    description: |
      Подгонка и валидация кинетических моделей по экспериментальным данным.
  BC-4600.30:
    name: Разработка и оптимизация процессов
    description: |
      Лабораторная разработка и оптимизация режимов работы химических процессов
      перед проведением опытных испытаний.
  BC-4600.30.10:
    name: Планирование лабораторных экспериментов
    description: |
      Проектирование экспериментов в лабораторном масштабе для исследования
      поведения процесса.
  BC-4600.30.20:
    name: Оптимизация параметров процесса
    description: |
      Оптимизация температуры, давления, времени пребывания и стехиометрии.
  BC-4600.30.30:
    name: Повышение выхода и селективности
    description: |
      Повышение выхода и селективности методами реакционной инженерии.
  BC-4600.30.40:
    name: Выбор растворительной системы
    description: |
      Выбор и оптимизация растворительных систем с учётом показателей и охраны
      труда.
  BC-4600.40:
    name: Управление опытной установкой
    description: |
      Планирование, проведение и анализ опытных кампаний для снижения рисков
      коммерческого масштабирования.
  BC-4600.40.10:
    name: Планирование опытных кампаний
    description: |
      Планирование кампаний на опытной установке, включая цели и материальные
      балансы.
  BC-4600.40.20:
    name: Проведение опытных испытаний
    description: |
      Проведение опытных испытаний в репрезентативных технологических условиях.
  BC-4600.40.30:
    name: Анализ данных опытной установки
    description: |
      Анализ данных опытной установки для уточнения кинетических моделей и
      моделей выхода.
  BC-4600.40.40:
    name: Управление активами опытной установки
    description: |
      Управление жизненным циклом оборудования и приборов опытной установки.
  BC-4600.50:
    name: Управление масштабированием процессов
    description: |
      Перевод процессов из опытного масштаба в валидированные коммерческие
      технологические регламенты.
  BC-4600.50.10:
    name: Моделирование масштабирования
    description: |
      Применение анализа подобия и CFD для моделирования эффектов масштабирования.
  BC-4600.50.20:
    name: Валидация на демонстрационной установке
    description: |
      Эксплуатация демонстрационных установок для проверки допущений
      масштабирования.
  BC-4600.50.30:
    name: Разработка коммерческого регламента процесса
    description: |
      Финализация коммерческого базиса процесса, готового к FEED.
  BC-4600.60:
    name: Скрининг промышленных опасностей
    description: |
      Ранний скрининг реакционных, термических и пылевых опасностей на стадиях
      исследований и разработки.
  BC-4600.60.10:
    name: Скрининг реакционных опасностей
    description: |
      Скрининг реакционных опасностей с помощью ДСК, ARC и калориметрии
      Кальве.
  BC-4600.60.20:
    name: Испытания на термическую стабильность
    description: |
      Определение начала термического разложения и склонности к разгону.
  BC-4600.60.30:
    name: Характеризация пылевых опасностей
    description: |
      Характеризация опасностей горючей пыли, включая Kst и MIE.
  BC-4600.70:
    name: Управление знаниями и данными НИОКР
    description: |
      Сбор и хранение знаний в области НИОКР, записей экспериментов и массивов
      технологических данных.
  BC-4600.70.10:
    name: Управление электронными лабораторными журналами
    description: |
      Эксплуатация электронных лабораторных журналов для химических НИОКР.
  BC-4600.70.20:
    name: Управление репозиторием технологических знаний
    description: |
      Систематизация технологических знаний на стадиях открытия, разработки
      и масштабирования.
  BC-4600.70.30:
    name: Систематизация данных НИОКР
    description: |
      Систематизация, хранение и повторное использование структурированных
      данных экспериментов НИОКР.

# Организация учебного процесса (ru) — translations for L1-teaching-learning-operations-management.yaml
locale: ru
source: L1-teaching-learning-operations-management.yaml
entries:
  BC-4730:
    name: Организация учебного процесса
    description: |
      Повседневная организация обучения, охватывающая аудиторное и
      дистанционное преподавание, платформы образовательной среды,
      практику и стажировки, дополнительные занятия и отслеживание
      посещаемости.
  BC-4730.10:
    name: Проведение аудиторных занятий
    description: |
      Очное преподавание в форматах лекций, семинаров, лабораторных,
      студийных, практических и консультационных занятий.
    in_scope:
      - Проведение лекций и семинаров
      - Лабораторные и студийные занятия
      - Практикумы и консультации
    out_of_scope:
      - Дистанционное обучение (охватывается разделом «Онлайн- и дистанционное обучение»)
  BC-4730.10.10:
    name: Проведение лекций и семинаров
    description: |
      Проведение лекций для больших групп и семинарских занятий.
  BC-4730.10.20:
    name: Лабораторные и студийные занятия
    description: |
      Проведение лабораторных и студийных практических занятий.
  BC-4730.10.30:
    name: Практикумы и консультации
    description: |
      Проведение групповых практикумов и индивидуальных консультаций.
  BC-4730.20:
    name: Онлайн- и дистанционное обучение
    description: |
      Синхронное, асинхронное и смешанное онлайн- и дистанционное
      преподавание.
    in_scope:
      - Синхронные онлайн-занятия
      - Асинхронная доставка курсов
      - Смешанное обучение
    out_of_scope:
      - Разработка онлайн-учебных материалов (охватывается управлением образовательным контентом)
  BC-4730.20.10:
    name: Синхронные онлайн-занятия
    description: |
      Живые онлайн-занятия под руководством преподавателя.
  BC-4730.20.20:
    name: Асинхронная доставка курсов
    description: |
      Самостоятельное асинхронное прохождение курсов в структурированном
      темпе.
  BC-4730.20.30:
    name: Смешанное обучение
    description: |
      Доставка курсов с сочетанием очных и онлайн-форматов.
  BC-4730.30:
    name: Управление образовательной средой
    description: |
      Эксплуатация систем управления обучением, платформ виртуальных классов
      и интеграция инструментов обучения.
    in_scope:
      - Операции системы управления обучением (LMS)
      - Операции платформ виртуальных классов
      - Интеграция LTI и учебных инструментов
    out_of_scope:
      - Общая ИТ-инфраструктура (охватывается общеотраслевым управлением ИТ)
  BC-4730.30.10:
    name: Операции системы управления обучением
    description: |
      Работа институциональной системы управления обучением.
  BC-4730.30.20:
    name: Операции платформ виртуальных классов
    description: |
      Работа виртуальных классов и конференц-платформ для преподавания.
  BC-4730.30.30:
    name: Интеграция учебных инструментов
    description: |
      Интеграция сторонних учебных инструментов через LTI и эквивалентные
      стандарты.
  BC-4730.40:
    name: Практика, клинические и полевые стажировки
    description: |
      Организация учебной работы с включением в производственный процесс,
      включая координацию стажировок, наставничество и отслеживание
      обязательных часов.
    in_scope:
      - Координация с базами стажировок
      - Клиническое наставничество и наставничество на практике
      - Отслеживание часов и журналов практики
    out_of_scope:
      - Трудоустройство после выпуска (охватывается поддержкой и благополучием студентов)
  BC-4730.40.10:
    name: Координация с базами стажировок
    description: |
      Координация с внешними базами практики и принимающими организациями.
  BC-4730.40.20:
    name: Клиническое наставничество и наставничество на практике
    description: |
      Наставничество за студентами на клинических, профессиональных и
      производственных практиках.
  BC-4730.40.30:
    name: Отслеживание часов и журналов практики
    description: |
      Отслеживание часов, компетенций и записей в журналах практики.
  BC-4730.50:
    name: Тьюторство и дополнительные занятия
    description: |
      Тьюторство, взаимообучение и дополнительные академические занятия,
      дополняющие основное преподавание.
    in_scope:
      - Система взаимного тьюторства
      - Семинары по академическим навыкам
      - Предметное тьюторство
    out_of_scope:
      - Академическое консультирование по планированию программы (охватывается поддержкой студентов)
  BC-4730.50.10:
    name: Система взаимного тьюторства
    description: |
      Работа схем взаимного тьюторства и академической поддержки.
  BC-4730.50.20:
    name: Семинары по академическим навыкам
    description: |
      Проведение межпредметных семинаров по академическим навыкам.
  BC-4730.50.30:
    name: Предметное тьюторство
    description: |
      Предметное тьюторство, предоставляемое преподавателями, кафедрами или
      специализированными службами.
  BC-4730.60:
    name: Отслеживание посещаемости и вовлечённости
    description: |
      Фиксация и мониторинг посещаемости студентов и вовлечённости обучающихся
      с триггерами для вмешательства при выявлении рисков.
    in_scope:
      - Фиксация посещаемости
      - Мониторинг вовлечённости обучающихся
      - Ранние предупреждения и триггеры вмешательства
    out_of_scope:
      - Психолого-педагогическое сопровождение (охватывается поддержкой и благополучием студентов)
  BC-4730.60.10:
    name: Фиксация посещаемости
    description: |
      Фиксация посещаемости студентов на учебных мероприятиях.
  BC-4730.60.20:
    name: Мониторинг вовлечённости обучающихся
    description: |
      Мониторинг цифровых и поведенческих сигналов вовлечённости.
  BC-4730.60.30:
    name: Раннее предупреждение и вмешательство
    description: |
      Активация флагов раннего предупреждения и маршрутизация в службы
      поддержки.

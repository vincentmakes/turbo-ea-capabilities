# Учебный план и программа (ru) — translations for L1-curriculum-programme-management.yaml
locale: ru
source: L1-curriculum-programme-management.yaml
entries:
  BC-4700:
    name: Учебный план и программа
    description: |
      Определение, структурирование, управление и непрерывное совершенствование
      академических программ, курсов, модулей, квалификаций и лежащих в их
      основе образовательных результатов.
  BC-4700.10:
    name: Архитектура программы
    description: |
      Определение структуры программы, уровня квалификации, кредитной нагрузки
      и планируемых результатов обучения академических присвоений.
    in_scope:
      - Определение структуры и траектории программы
      - Структура присвоения квалификаций и зачётных единиц
      - Планируемые результаты обучения на уровне программы
    out_of_scope:
      - Составление силлабуса на уровне курса (охватывается разделом «Проектирование курсов и модулей»)
      - Результаты внешней аккредитации (охватываются разделом «Академическое качество и аккредитация»)
  BC-4700.10.10:
    name: Определение программы
    description: |
      Определение цели программы, целевой аудитории, требований к поступлению
      и структурной формы.
  BC-4700.10.20:
    name: Структурирование квалификаций и зачётных единиц
    description: |
      Структурирование присвоений, кредитных значений и накопительных
      квалификационных траекторий.
  BC-4700.10.30:
    name: Определение образовательных результатов
    description: |
      Формулирование планируемых образовательных результатов на уровне
      программы и курса.
  BC-4700.20:
    name: Проектирование курсов и модулей
    description: |
      Разработка и описание отдельных курсов, модулей и учебных единиц,
      составляющих академические программы.
    in_scope:
      - Спецификации курсов и описания модулей
      - Составление и утверждение силлабуса
      - Учебные цели на уровне единиц и планы оценивания
    out_of_scope:
      - Производство учебных материалов (охватывается разделом «Управление образовательным контентом»)
  BC-4700.20.10:
    name: Спецификация курса
    description: |
      Составление и утверждение официальных спецификаций и описаний курсов.
  BC-4700.20.20:
    name: Проектирование модулей и учебных единиц
    description: |
      Проектирование модулей и учебных единиц внутри курсов.
  BC-4700.20.30:
    name: Составление силлабуса
    description: |
      Составление силлабусов с указанием содержания, методов и видов оценивания.
  BC-4700.30:
    name: Картографирование и согласование учебного плана
    description: |
      Отображение содержания учебного плана на компетентностные рамки,
      квалификационные рамки и траектории профессионального развития.
    in_scope:
      - Картографирование компетенций в учебный план
      - Согласование с ISCED, EQF, NQF и эквивалентными рамками
      - Картографирование на профессиональные траектории
    out_of_scope:
      - Индивидуальные достижения обучающегося (охватываются разделом «Оценивание и экзамены»)
  BC-4700.30.10:
    name: Согласование с компетентностными рамками
    description: |
      Согласование учебного плана с определёнными компетентностными рамками.
  BC-4700.30.20:
    name: Картографирование на квалификационные рамки
    description: |
      Картографирование квалификаций на ISCED, EQF, NQF и аналогичные
      референтные рамки.
  BC-4700.30.30:
    name: Картографирование на профессиональные траектории
    description: |
      Картографирование учебного плана на профессиональные и карьерные
      траектории.
  BC-4700.40:
    name: Управление каталогом программ
    description: |
      Составление, ведение версий и публикация институционального каталога
      программ и курсов для потенциальных и действующих обучающихся.
    in_scope:
      - Составление и редакционный процесс каталога
      - Версионирование каталога и управление датами вступления в силу
      - Внутренняя и публичная публикация каталога
    out_of_scope:
      - Рекламные материалы для набора студентов (охватываются разделом «Набор и приём студентов»)
  BC-4700.40.10:
    name: Составление каталога
    description: |
      Составление записей каталога для программ, курсов и модулей.
  BC-4700.40.20:
    name: Версионирование и управление датами каталога
    description: |
      Управление версиями и датами вступления в силу записей каталога.
  BC-4700.40.30:
    name: Публикация каталога
    description: |
      Внутренняя и публичная публикация каталога программ и курсов.
  BC-4700.50:
    name: Утверждение и управление программами
    description: |
      Внутренние и внешние процедуры утверждения для новых, изменяемых и
      закрываемых программ.
    in_scope:
      - Внутреннее академическое утверждение и управление
      - Утверждение внешним регулятором и профессиональным органом
      - Приостановление программы и плановое закрытие
    out_of_scope:
      - Текущий пересмотр учебного плана (охватывается разделом «Пересмотр и непрерывное совершенствование»)
      - Циклическая аккредитация (охватывается разделом «Академическое качество и аккредитация»)
  BC-4700.50.10:
    name: Внутреннее утверждение программы
    description: |
      Внутреннее академическое утверждение новых и изменяемых программ.
  BC-4700.50.20:
    name: Внешнее утверждение программы
    description: |
      Утверждение программы внешним регулятором, министерством или
      профессиональным органом.
  BC-4700.50.30:
    name: Приостановление и закрытие программы
    description: |
      Плановое приостановление, дообучение и закрытие программ.
  BC-4700.60:
    name: Пересмотр и непрерывное совершенствование учебного плана
    description: |
      Периодический пересмотр и совершенствование содержания учебного плана
      на основе результатов, обратной связи и внешних требований.
    in_scope:
      - Периодические циклы пересмотра учебного плана
      - Обратная связь от заинтересованных сторон, работодателей и студентов
      - Отслеживание внедрения изменений учебного плана
    out_of_scope:
      - Проверки качества программ (охватываются разделом «Академическое качество и аккредитация»)
  BC-4700.60.10:
    name: Периодический пересмотр учебного плана
    description: |
      Циклический пересмотр эффективности и актуальности учебного плана.
  BC-4700.60.20:
    name: Обратная связь заинтересованных сторон
    description: |
      Сбор мнений студентов, работодателей и консультативных советов для
      проектирования учебного плана.
  BC-4700.60.30:
    name: Внедрение изменений учебного плана
    description: |
      Отслеживание и внедрение утверждённых изменений учебного плана.

# Переработка газа / СПГ (ru) — translations for L1-gas-processing-lng-operations-management.yaml
locale: ru
source: L1-gas-processing-lng-operations-management.yaml
entries:
  BC-3070:
    name: Переработка газа / СПГ
    description: |
      Эксплуатация установок подготовки газа, фракционирования ШФЛУ, сжижения СПГ, налива и отгрузки, регазификации и управление качеством газа в газоперерабатывающих цепочках.
  BC-3070.10:
    name: Операции газоперерабатывающего завода
    description: |
      Эксплуатация установок приёма, подготовки, осушки и извлечения серы на газоперерабатывающих заводах.
  BC-3070.10.10:
    name: Приём и подготовка газа
    description: |
      Приём, сепарация жидкостных пробок и подготовка входного потока газа.
  BC-3070.10.20:
    name: Операции кислотной очистки газа
    description: |
      Аминовые и физические сольвентные операции кислотной очистки газа.
  BC-3070.10.30:
    name: Операции осушки газа
    description: |
      Гликолевая и молекулярно-ситовая осушка природного газа.
  BC-3070.10.40:
    name: Операции извлечения серы
    description: |
      Операции установок Клауса и очистки хвостовых газов для извлечения серы.
  BC-3070.20:
    name: Операции фракционирования ШФЛУ
    description: |
      Эксплуатация деметанизаторов, деэтанизаторов и последующих ректификационных колонн для производства этана, пропана, бутана и природного бензина.
  BC-3070.20.10:
    name: Операции деметанизатора
    description: |
      Эксплуатация криогенных деметанизирующих колонн для извлечения этана.
  BC-3070.20.20:
    name: Операции деэтанизатора и депропанизатора
    description: |
      Эксплуатация деэтанизирующих, депропанизирующих и дебутанизирующих колонн.
  BC-3070.20.30:
    name: Операции хранения ШФЛУ
    description: |
      Эксплуатация напорного и холодильного хранения ШФЛУ.
  BC-3070.30:
    name: Операции сжижения СПГ
    description: |
      Эксплуатация сжижающих линий, холодильных циклов и резервуаров СПГ.
  BC-3070.30.10:
    name: Операции холодильного цикла
    description: |
      Эксплуатация смешанных холодильных и каскадных контуров охлаждения.
  BC-3070.30.20:
    name: Операции линий СПГ
    description: |
      Эксплуатация линий сжижения СПГ от начала до конца.
  BC-3070.30.30:
    name: Операции резервуаров СПГ
    description: |
      Эксплуатация криогенных резервуаров СПГ, включая предотвращение роллинга.
  BC-3070.40:
    name: Операции налива и отгрузки СПГ
    description: |
      Налив судов, охлаждение грузовых танков и испарительная подача по трубопроводу на заводах по сжижению.
  BC-3070.40.10:
    name: Налив судов СПГ
    description: |
      Операции налива судов на экспортных причалах СПГ.
  BC-3070.40.20:
    name: Испарительная подача
    description: |
      Испарительная подача и трубопроводный экспорт с объектов сжижения.
  BC-3070.40.30:
    name: Координация охлаждения трюмов
    description: |
      Координация охлаждения танков газовозов перед наливом.
  BC-3070.50:
    name: Операции регазификации СПГ
    description: |
      Эксплуатация импортных СПГ-терминалов: газификация, регулирование давления подачи и работа с отпарным газом.
  BC-3070.50.10:
    name: Операции газификаторов
    description: |
      Эксплуатация открытых стеллажных, субмерсионных и кожухотрубных газификаторов.
  BC-3070.50.20:
    name: Регулирование давления подачи
    description: |
      Регулирование давления подачи и подача в газовую сеть с импортных терминалов.
  BC-3070.50.30:
    name: Работа с отпарным газом
    description: |
      Повторное сжижение или сжигание отпарного газа из резервуаров.
  BC-3070.60:
    name: Управление качеством газа
    description: |
      Соответствие требованиям к качеству трубопроводного и СПГ-газа и работа с некондиционными потоками.
  BC-3070.60.10:
    name: Мониторинг соответствия спецификациям
    description: |
      Непрерывный мониторинг соответствия спецификациям трубопроводного и СПГ-газа.
  BC-3070.60.20:
    name: Отбор проб и анализ газа
    description: |
      Регулярный отбор проб газа, хроматография и оформление сертификатов.
  BC-3070.60.30:
    name: Работа с некондиционным газом
    description: |
      Маршрутизация, смешение и переработка некондиционных газовых потоков.

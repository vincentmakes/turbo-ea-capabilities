# Хозяйственное обеспечение (ru) — translations for L1-facilities-management.yaml
locale: ru
source: L1-facilities-management.yaml
entries:
  BC-700:
    name: Хозяйственное обеспечение
    description: |
      Инженерные системы зданий, рабочая среда, жёсткое и мягкое FM.
  BC-700.10:
    name: Управление рабочим пространством
    description: |
      Ресепшен, почта, сервисы рабочей среды.
  BC-700.10.10:
    name: Ресепшен и управление посетителями
    description: |
      Предварительная регистрация посетителей, ресепшен и пропускной контроль.
  BC-700.10.20:
    name: Почтовые и курьерские услуги
    description: |
      Входящая и исходящая корреспонденция, посылки и внутренняя рассылка.
  BC-700.10.30:
    name: Консьерж-служба и служба поддержки рабочего места
    description: |
      Консьерж рабочего места, служба поддержки и обработка сервисных запросов.
  BC-700.10.40:
    name: Услуги переговорных комнат и мероприятий
    description: |
      Бронирование переговорных комнат, настройка аудиовизуального оборудования и поддержка мероприятий.
  BC-700.20:
    name: Жёсткое управление объектами
    description: |
      Инженерные системы зданий — HVAC, электрика, сантехника, конструктивные элементы.
  BC-700.20.10:
    name: Операции систем HVAC
    description: |
      Эксплуатация и техническое обслуживание систем отопления, вентиляции и кондиционирования.
  BC-700.20.20:
    name: Операции электрических систем
    description: |
      Эксплуатация и техническое обслуживание электрических систем зданий.
  BC-700.20.30:
    name: Операции механических и сантехнических систем
    description: |
      Эксплуатация механических, сантехнических и водопроводных систем.
  BC-700.20.40:
    name: Техническое обслуживание строительных конструкций
    description: |
      Обслуживание конструктивных элементов, ограждающих конструкций и фасадов.
  BC-700.20.50:
    name: Управление энергопотреблением здания
    description: |
      Мониторинг и оптимизация энергопотребления зданий.
  BC-700.30:
    name: Мягкое управление объектами
    description: |
      Уборка, кейтеринг, охрана, благоустройство.
  BC-700.30.10:
    name: Услуги уборки
    description: |
      Ежедневная уборка, генеральная уборка и санитарно-гигиенические услуги.
  BC-700.30.20:
    name: Кейтеринг и питание
    description: |
      Корпоративный кейтеринг, вендинг и услуги гостеприимства.
  BC-700.30.30:
    name: Операции физической охраны
    description: |
      Охрана, патрулирование, CCTV и операции контроля доступа.
  BC-700.30.40:
    name: Благоустройство территории
    description: |
      Обслуживание территории, ландшафтный дизайн и внешние зоны.
  BC-700.30.50:
    name: Услуги управления отходами
    description: |
      Сбор, сортировка и переработка отходов на объектах.
  BC-700.40:
    name: Управление пространством
    description: |
      Планирование пространства, управление занятостью, переезды.
  BC-700.40.10:
    name: Планирование пространства
    description: |
      Планирование пространства, распределение и стековое планирование.
  BC-700.40.20:
    name: Мониторинг занятости
    description: |
      Датчики занятости, аналитика использования и прогнозирование.
  BC-700.40.30:
    name: Управление переездами
    description: |
      Планирование и исполнение переездов и перестановок.
  BC-700.40.40:
    name: Бронирование рабочих мест и горячие столы
    description: |
      Платформы бронирования рабочих мест и операции гибридного рабочего места.
  BC-700.50:
    name: Управление охраной труда и безопасностью объектов
    description: |
      Безопасность зданий, пожарная безопасность, аварийные системы.
  BC-700.50.10:
    name: Управление пожарной безопасностью
    description: |
      Системы обнаружения и тушения пожара, эвакуационные тренировки.
  BC-700.50.20:
    name: Координация аварийного реагирования
    description: |
      Аварийное реагирование на объекте и координация первой помощи.
  BC-700.50.30:
    name: Управление нарядами-допусками
    description: |
      Управление нарядами-допусками для опасных работ на объекте.
  BC-700.50.40:
    name: Соответствие законодательным требованиям к зданиям
    description: |
      Законодательные проверки и сертификации в области безопасности зданий.

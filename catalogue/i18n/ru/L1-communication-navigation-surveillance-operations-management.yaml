# Управление операциями CNS (ru) — translations for L1-communication-navigation-surveillance-operations-management.yaml
locale: ru
source: L1-communication-navigation-surveillance-operations-management.yaml
entries:
  BC-1240:
    name: Управление операциями связи, навигации и наблюдения
    description: |
      Инфраструктура CNS — голосовая и цифровая связь, навигационные средства, радиолокация/ADS-B/мультилатерация.
  BC-1240.10:
    name: Управление системами голосовой связи
    description: |
      Связь «воздух — земля», голосовые системы диспетчер — пилот, связь «земля — земля».
  BC-1240.10.10:
    name: Операции голосовой связи «воздух — земля»
    description: |
      Эксплуатация радиотелефонной связи «воздух — земля».
  BC-1240.10.20:
    name: Операции голосовой связи «земля — земля»
    description: |
      Эксплуатация межцентровых и межсекторных голосовых каналов.
  BC-1240.10.30:
    name: Запись и воспроизведение переговоров
    description: |
      Запись и воспроизведение оперативных переговоров в целях безопасности и аудита.
  BC-1240.20:
    name: Управление каналами передачи данных
    description: |
      Каналы CPDLC, ADS-C, FANS, ATN.
  BC-1240.20.10:
    name: Операции CPDLC
    description: |
      Эксплуатация системы передачи данных диспетчер — пилот CPDLC.
  BC-1240.20.20:
    name: Операции ADS-C
    description: |
      Эксплуатация автоматического зависимого наблюдения по контракту ADS-C.
  BC-1240.20.30:
    name: Операции сети ATN и FANS
    description: |
      Операции сети передачи данных ATN и FANS.
  BC-1240.30:
    name: Управление навигационными средствами
    description: |
      Навигационные сервисы на основе VOR, DME, ILS, GNSS.
  BC-1240.30.10:
    name: Операции VOR и DME
    description: |
      Эксплуатация и техническое обслуживание маяков VOR и DME.
  BC-1240.30.20:
    name: Операции ILS
    description: |
      Эксплуатация и техническое обслуживание систем ILS.
  BC-1240.30.30:
    name: Навигационный сервис на основе GNSS
    description: |
      Предоставление навигационных сервисов GNSS, SBAS и GBAS.
  BC-1240.30.40:
    name: Лётная инспекция
    description: |
      Периодическая лётная проверка навигационных средств.
  BC-1240.40:
    name: Управление системами наблюдения
    description: |
      Первичный радиолокатор, вторичный радиолокатор, ADS-B, мультилатерация.
  BC-1240.40.10:
    name: Операции первичного обзорного радиолокатора
    description: |
      Эксплуатация систем первичного обзорного радиолокатора.
  BC-1240.40.20:
    name: Операции вторичного обзорного радиолокатора
    description: |
      Эксплуатация систем ВОР Mode S и традиционных Mode A/C.
  BC-1240.40.30:
    name: Операции наблюдения ADS-B
    description: |
      Эксплуатация наземных станций ADS-B и обработка данных.
  BC-1240.40.40:
    name: Операции мультилатерации
    description: |
      Эксплуатация систем наблюдения WAM/MLAT.
  BC-1240.40.50:
    name: Слияние данных наблюдения
    description: |
      Слияние источников данных наблюдения для отображения в УВД.
  BC-1240.50:
    name: Управление техническим обслуживанием инфраструктуры CNS
    description: |
      Полевое обслуживание оборудования CNS, калибровка, лётная инспекция.
  BC-1240.50.10:
    name: Плановое обслуживание оборудования CNS
    description: |
      Плановое техническое обслуживание оборудования CNS.
  BC-1240.50.20:
    name: Корректирующее обслуживание оборудования CNS
    description: |
      Корректирующее техническое обслуживание и устранение неисправностей оборудования CNS.
  BC-1240.50.30:
    name: Калибровка оборудования CNS
    description: |
      Калибровка и юстировка оборудования CNS.
  BC-1240.50.40:
    name: Управление запасными частями CNS
    description: |
      Запасы и поставки запасных частей и расходных материалов CNS.
  BC-1240.60:
    name: Управление частотным спектром
    description: |
      Распределение аэронавигационных частот, координация, управление помехами.
  BC-1240.60.10:
    name: Распределение частот
    description: |
      Распределение аэронавигационных частот по службам.
  BC-1240.60.20:
    name: Координация частот
    description: |
      Трансграничная и межслужебная координация частот.
  BC-1240.60.30:
    name: Обнаружение и устранение помех
    description: |
      Обнаружение и устранение инцидентов с частотными помехами.

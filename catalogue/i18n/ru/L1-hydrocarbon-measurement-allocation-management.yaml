# Учёт и распределение углеводородов (ru) — translations for L1-hydrocarbon-measurement-allocation-management.yaml
locale: ru
source: L1-hydrocarbon-measurement-allocation-management.yaml
entries:
  BC-3040:
    name: Учёт и распределение углеводородов
    description: |
      Коммерческий учёт и распределение добытых углеводородов: приборный учёт при передаче права собственности, распределение между пластами и совладельцами, производственный учёт, листы эксплуатационных расходов и расследование потерь и отклонений.
  BC-3040.10:
    name: Коммерческий и приборный учёт при передаче права собственности
    description: |
      Эксплуатация, поверка и обеспечение качества приборов коммерческого учёта в точках передачи права собственности.
  BC-3040.10.10:
    name: Эксплуатация коммерческих приборов учёта
    description: |
      Ежедневная эксплуатация коммерческих жидкостных и газовых счётчиков.
  BC-3040.10.20:
    name: Поверка и калибровка счётчиков
    description: |
      Периодическая поверка и калибровка коммерческих приборов учёта.
  BC-3040.10.30:
    name: Документация при передаче права собственности
    description: |
      Выдача и обмен коммерческими актами о передаче и сертификатами качества.
  BC-3040.10.40:
    name: Расследование неточностей измерений
    description: |
      Расследование и устранение предполагаемых погрешностей измерений.
  BC-3040.20:
    name: Распределение добычи
    description: |
      Распределение измеренных объёмов по скважинам, пластам и совладельцам.
  BC-3040.20.10:
    name: Распределение по скважинам
    description: |
      Распределение продукции объектов добычи по скважинам-вкладчикам.
  BC-3040.20.20:
    name: Распределение по пластам
    description: |
      Распределение по совместно разрабатываемым пластам и залежам.
  BC-3040.20.30:
    name: Распределение между совладельцами
    description: |
      Распределение объёмов добычи между участниками с рабочей долей.
  BC-3040.20.40:
    name: Сверка распределения
    description: |
      Сверка результатов распределения с данными измерений, гидродинамических исследований и учёта.
  BC-3040.30:
    name: Производственный учёт
    description: |
      Ежедневная отчётность о добыче, материальный баланс углеводородов и закрытие месячного производственного учёта.
  BC-3040.30.10:
    name: Ежедневная отчётность о добыче
    description: |
      Ежедневная отчётность об объёмах добычи внутренним и внешним заинтересованным сторонам.
  BC-3040.30.20:
    name: Материальный баланс углеводородов
    description: |
      Сквозной материальный баланс углеводородов по добывающим системам.
  BC-3040.30.30:
    name: Закрытие производственного учёта
    description: |
      Месячное закрытие книг производственного учёта и передача данных в финансовые системы.
  BC-3040.40:
    name: Управление листами эксплуатационных расходов
    description: |
      Подготовка листов эксплуатационных расходов, расчёт роялти и отчётность по налогам на добычу.
  BC-3040.40.10:
    name: Подготовка листов эксплуатационных расходов
    description: |
      Подготовка отчётов по эксплуатационным расходам для участников с рабочей долей.
  BC-3040.40.20:
    name: Расчёт объёмов роялти
    description: |
      Расчёт объёмов и стоимости для владельцев роялти на уровне лицензионного участка.
  BC-3040.40.30:
    name: Отчётность по налогам на добычу
    description: |
      Отчётность по налогам на добычу и северным налогам в налоговые органы.
  BC-3040.50:
    name: Анализ потерь и отклонений
    description: |
      Расследование отклонений измерений, событий потерь и дисбалансов углеводородных запасов.
  BC-3040.50.10:
    name: Анализ отклонений измерений
    description: |
      Анализ отклонений измерений относительно допустимых диапазонов.
  BC-3040.50.20:
    name: Расследование потерь
    description: |
      Расследование неучтённых потерь между точками измерений.
  BC-3040.50.30:
    name: Сверка углеводородных запасов
    description: |
      Сверка физических углеводородных запасов с учётными данными.

# Управление казначейством (ru) — translations for L1-treasury-management.yaml
locale: ru
source: L1-treasury-management.yaml
entries:
  BC-210:
    name: Управление казначейством
    description: |
      Управление денежными средствами, ликвидностью, финансированием и рыночными рисками.
  BC-210.10:
    name: Управление денежными средствами
    description: |
      Позиционирование денежных средств, пулинг, внутригрупповое финансирование.
  BC-210.10.10:
    name: Мониторинг кассовой позиции
    description: |
      Ежедневный мониторинг кассовых позиций по юридическим лицам и валютам.
  BC-210.10.20:
    name: Операции денежного пулинга
    description: |
      Номинальный и физический денежный пулинг в рамках группы.
  BC-210.10.30:
    name: Внутригрупповое финансирование
    description: |
      Внутригрупповые займы, внутренний банк и внутригрупповые расчёты.
  BC-210.10.40:
    name: Управление краткосрочными инвестициями
    description: |
      Операции денежного рынка и краткосрочного инвестирования денежных средств.
  BC-210.20:
    name: Управление ликвидностью
    description: |
      Прогнозирование ликвидности, стресс-тестирование, планы финансирования.
  BC-210.20.10:
    name: Прогнозирование денежных потоков
    description: |
      Краткосрочные, среднесрочные и долгосрочные прогнозы денежных потоков.
  BC-210.20.20:
    name: Мониторинг риска ликвидности
    description: |
      Коэффициенты ликвидности, буферы и индикаторы раннего предупреждения.
  BC-210.20.30:
    name: Стресс-тестирование ликвидности
    description: |
      Стресс-тестирование достаточности ликвидности в неблагоприятных сценариях.
  BC-210.20.40:
    name: Планирование экстренного финансирования
    description: |
      Планы экстренного финансирования и подтверждённые ликвидные резервы.
  BC-210.30:
    name: Управление привлечением средств и долгом
    description: |
      Выпуск долговых инструментов, управление кредитными линиями, ковенанты.
  BC-210.30.10:
    name: Выпуск долговых инструментов
    description: |
      Выпуск облигаций, коммерческих бумаг и частное размещение.
  BC-210.30.20:
    name: Управление банковскими кредитами и кредитными линиями
    description: |
      Переговоры и администрирование кредитных линий и двусторонних кредитов.
  BC-210.30.30:
    name: Обслуживание долга
    description: |
      Планирование и проведение выплат процентов, основного долга и комиссий.
  BC-210.30.40:
    name: Управление ковенантами и кредитным рейтингом
    description: |
      Мониторинг ковенантов и отношения с рейтинговыми агентствами.
  BC-210.40:
    name: Управление иностранными валютами
    description: |
      Валютные риски, хеджирование, расчёты.
  BC-210.40.10:
    name: Выявление валютных рисков
    description: |
      Идентификация и количественная оценка валютных позиций по юридическим лицам.
  BC-210.40.20:
    name: Исполнение валютного хеджирования
    description: |
      Заключение сделок с форвардами, свопами и опционами на иностранную валюту.
  BC-210.40.30:
    name: Расчёты и подтверждение валютных сделок
    description: |
      Расчёты, подтверждение и выверка валютных операций.
  BC-210.40.40:
    name: Управление трансляционным риском
    description: |
      Хеджирование чистых инвестиций и трансляционных рисков.
  BC-210.50:
    name: Управление процентным риском
    description: |
      Процентные риски, стратегии хеджирования.
  BC-210.50.10:
    name: Измерение процентного риска
    description: |
      Измерение чувствительности к процентным ставкам по балансу.
  BC-210.50.20:
    name: Хеджирование процентного риска
    description: |
      Заключение процентных свопов, кэпов и других производных инструментов.
  BC-210.50.30:
    name: Учёт хеджирования
    description: |
      Документирование хеджирования, тестирование эффективности и учёт по МСФО 9.
  BC-210.60:
    name: Управление банковскими отношениями
    description: |
      Структура банковских счетов, управление банковскими партнёрами.
  BC-210.60.10:
    name: Управление жизненным циклом банковских счетов
    description: |
      Открытие, изменение и закрытие банковских счетов.
  BC-210.60.20:
    name: Управление банковскими мандатами и подписантами
    description: |
      Списки банковских подписантов, мандаты и изменения полномочий.
  BC-210.60.30:
    name: Закупка банковских услуг
    description: |
      Отбор и заключение договоров с банковскими партнёрами и сервисными провайдерами.
  BC-210.60.40:
    name: Управление банковскими комиссиями и качеством сервиса
    description: |
      Мониторинг банковских комиссий, качества сервиса и аналитика.

# Управление рисками предприятия (ru) — translations for L1-enterprise-risk-management.yaml
locale: ru
source: L1-enterprise-risk-management.yaml
entries:
  BC-120:
    name: Управление рисками предприятия
    description: |
      Выявление, оценка, снижение и мониторинг рисков на уровне предприятия.
  BC-120.10:
    name: Управление риск-аппетитом и риск-фреймворком
    description: |
      Таксономия рисков, фреймворк, риск-аппетит и допустимые уровни риска.
  BC-120.10.10:
    name: Управление таксономией рисков
    description: |
      Определение и поддержание корпоративной таксономии и категорий рисков.
  BC-120.10.20:
    name: Определение риск-аппетита
    description: |
      Декларации о риск-аппетите и пороги допустимости рисков, утверждённые советом директоров.
  BC-120.10.30:
    name: Управление политиками и стандартами в области рисков
    description: |
      Корпоративные политики, стандарты и методологии управления рисками.
  BC-120.10.40:
    name: Управление культурой рисков
    description: |
      Оценка культуры риска, программы повышения осведомлённости и ответственности.
  BC-120.20:
    name: Идентификация и оценка рисков
    description: |
      Выявление, оценка, ранжирование и приоритизация рисков.
  BC-120.20.10:
    name: Идентификация рисков
    description: |
      Воркшопы, сканирование и сбор данных для выявления новых и возникающих рисков.
  BC-120.20.20:
    name: Анализ и оценка рисков
    description: |
      Анализ вероятности, воздействия, скорости реализации и соотношения присущего и остаточного рисков.
  BC-120.20.30:
    name: Сценарный и стресс-анализ
    description: |
      Перспективный сценарный, стресс- и обратный стресс-анализ.
  BC-120.20.40:
    name: Мониторинг возникающих рисков
    description: |
      Сканирование горизонта для выявления возникающих рисков и слабых сигналов.
  BC-120.30:
    name: Управление обработкой рисков
    description: |
      Решения по снижению, передаче, избеганию и принятию рисков.
  BC-120.30.10:
    name: Планирование мероприятий по снижению рисков
    description: |
      Определение мероприятий по снижению рисков, ответственных лиц и целевых дат.
  BC-120.30.20:
    name: Управление передачей рисков
    description: |
      Передача рисков через страхование, договоры и хеджирование.
  BC-120.30.30:
    name: Управление принятием рисков
    description: |
      Формальное принятие остаточных рисков, превышающих риск-аппетит, с соответствующими одобрениями.
  BC-120.30.40:
    name: Проектирование и оценка эффективности контролей
    description: |
      Определение и оценка эффективности контролей рисков.
  BC-120.40:
    name: Мониторинг и отчётность по рискам
    description: |
      Индикаторы рисков, дашборды, отчётность для органов управления.
  BC-120.40.10:
    name: Управление ключевыми индикаторами рисков
    description: |
      Определение, установка порогов и отслеживание ключевых индикаторов рисков.
  BC-120.40.20:
    name: Учёт рисковых событий и потерь
    description: |
      Регистрация операционных рисковых событий, случаев «почти произошло» и потерь.
  BC-120.40.30:
    name: Отчётность по рискам и дашборды
    description: |
      Периодическая отчётность для исполнительного комитета, совета директоров и комитета по рискам.
  BC-120.40.40:
    name: Агрегирование и анализ концентрации рисков
    description: |
      Агрегирование рисков по всему предприятию и анализ концентрации рисков.
  BC-120.50:
    name: Управление корпоративным страхованием
    description: |
      Приобретение и управление корпоративными страховыми программами.
  BC-120.50.10:
    name: Проектирование страховой программы
    description: |
      Стратегия страхового покрытия, удержание рисков и лимиты по видам страхования.
  BC-120.50.20:
    name: Размещение и пролонгация страхования
    description: |
      Управление брокерами, размещение на рынке и пролонгация страховых полисов.
  BC-120.50.30:
    name: Управление страховыми претензиями
    description: |
      Уведомление, урегулирование и возмещение по корпоративным страховым претензиям.
  BC-120.50.40:
    name: Управление кэптивным страхованием
    description: |
      Функционирование и управление кэптивными страховыми структурами.

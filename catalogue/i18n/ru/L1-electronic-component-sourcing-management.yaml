# Управление закупкой электронных компонентов (ru) — translations for L1-electronic-component-sourcing-management.yaml
locale: ru
source: L1-electronic-component-sourcing-management.yaml
entries:
  BC-1930:
    name: Управление закупкой электронных компонентов
    description: |
      Закупка и управление жизненным циклом электронных компонентов: утверждённые списки поставщиков, управление устареванием, распределение при дефиците, предотвращение контрафакта, квалификация и данные о составе веществ.
  BC-1930.10:
    name: Управление утверждёнными поставщиками
    description: |
      Ведение утверждённых источников компонентов, альтернатив и перекрёстных ссылок.
  BC-1930.10.10:
    name: Управление предпочтительным перечнем деталей
    description: |
      Ведение перечней предпочтительных компонентов с инженерным согласованием.
  BC-1930.10.20:
    name: Квалификация альтернативных источников
    description: |
      Квалификация / аттестация альтернативных источников компонентов.
  BC-1930.10.30:
    name: Управление перекрёстными ссылками
    description: |
      Сопоставление эквивалентных компонентов от разных производителей.
  BC-1930.20:
    name: Управление жизненным циклом и устареванием компонентов
    description: |
      Отслеживание статуса жизненного цикла компонентов и управление событиями устаревания.
  BC-1930.20.10:
    name: Сортировка уведомлений об изменении продукции
    description: |
      Сортировка и оценка влияния уведомлений поставщиков об изменении продукции.
  BC-1930.20.20:
    name: Сортировка уведомлений о прекращении производства
    description: |
      Сортировка уведомлений о прекращении производства и их влияния на ведомости материалов.
  BC-1930.20.30:
    name: Решение о закупке последней партии
    description: |
      Принятие решений о количестве последних партий и буферных запасов.
  BC-1930.20.40:
    name: Прогнозирование жизненного цикла компонентов
    description: |
      Прогнозирование стадий жизненного цикла компонентов по всей ведомости материалов.
  BC-1930.30:
    name: Управление распределением полупроводников
    description: |
      Управление распределением полупроводников в условиях дефицита.
  BC-1930.30.10:
    name: Управление прогнозом для распределения
    description: |
      Прогнозирование спроса для позиционирования в рамках распределения у поставщика.
  BC-1930.30.20:
    name: Переговоры о доле в распределении поставщика
    description: |
      Переговоры о доле в распределении с поставщиками полупроводников.
  BC-1930.30.30:
    name: Приоритизация спроса при распределении
    description: |
      Внутренняя приоритизация распределённых поставок между линейками продуктов.
  BC-1930.40:
    name: Предотвращение контрафактных компонентов
    description: |
      Выявление и предотвращение контрафактных электронных компонентов в цепочке поставок.
  BC-1930.40.10:
    name: Оценка риска контрафакта
    description: |
      Оценка риска контрафакта в каналах закупки.
  BC-1930.40.20:
    name: Аутентификация входящих компонентов
    description: |
      Аутентификация и инспекция входящих компонентов.
  BC-1930.40.30:
    name: Прослеживаемость цепочки поставщиков
    description: |
      Прослеживаемость компонентов до авторизованных производителей.
  BC-1930.50:
    name: Квалификация электронных компонентов
    description: |
      Квалификация / аттестация электронных компонентов для производственного использования.
  BC-1930.50.10:
    name: Инспекция первого образца
    description: |
      Инспекция первого образца компонентов по спецификациям.
  BC-1930.50.20:
    name: Квалификация надёжности компонентов
    description: |
      Квалификация / аттестация надёжности компонентов по профилям применения.
  BC-1930.50.30:
    name: Автомобильная квалификация AEC-Q
    description: |
      Квалификация / аттестация компонентов по профилям нагрузок AEC-Q100 / AEC-Q200.
  BC-1930.50.40:
    name: Квалификация полупроводников JEDEC
    description: |
      Квалификация / аттестация полупроводников по стандартам JEDEC.
  BC-1930.60:
    name: Управление дистрибьюторами и брокерами
    description: |
      Управление каналами авторизованных дистрибьюторов и брокеров.
  BC-1930.60.10:
    name: Онбординг авторизованных дистрибьюторов
    description: |
      Подключение авторизованных дистрибьюторов электронных компонентов.
  BC-1930.60.20:
    name: Оценка риска брокерских источников
    description: |
      Оценка риска закупки у независимых брокеров.
  BC-1930.60.30:
    name: Периодический анализ дистрибьюторов
    description: |
      Периодический анализ результативности и соответствия дистрибьюторов.
  BC-1930.70:
    name: Управление данными о соответствии компонентов
    description: |
      Сбор и сопровождение данных о составе веществ и соответствии компонентов.
  BC-1930.70.10:
    name: Сбор данных о составе веществ
    description: |
      Сбор данных о составе веществ от поставщиков компонентов.
  BC-1930.70.20:
    name: Данные о плавильщиках конфликтных минералов
    description: |
      Сбор данных о плавильщиках для проведения надлежащей проверки конфликтных минералов.
  BC-1930.70.30:
    name: Отслеживание REACH SVHC
    description: |
      Отслеживание веществ, вызывающих очень высокую озабоченность (REACH SVHC), на уровне компонентов.

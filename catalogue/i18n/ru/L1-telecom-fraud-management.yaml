# Управление мошенничеством в телекоме (ru) — translations for L1-telecom-fraud-management.yaml
locale: ru
source: L1-telecom-fraud-management.yaml
entries:
  BC-2690:
    name: Управление мошенничеством в телекоме
    description: |
      Обнаружение, расследование, предотвращение, возмещение ущерба и
      межоператорская отчётность по специфичным для телекома видам мошенничества —
      мошенничеству при регистрации, IRSF, Wangiri, SIM-swap, обходным схемам
      и схемам разделения выручки — на основе руководства GSMA.
  BC-2690.10:
    name: Обнаружение телеком-мошенничества
    description: |
      Обнаружение паттернов телеком-мошенничества в режиме реального и
      близкого к реальному времени в голосовом, дата- и сигнализационном
      трафике.
  BC-2690.10.10:
    name: Обнаружение мошенничества при регистрации
    description: |
      Обнаружение мошеннического получения сервисов с использованием
      похищенных или фабрикованных личностей.
  BC-2690.10.20:
    name: Обнаружение IRSF
    description: |
      Обнаружение паттернов трафика IRSF, раздувающих расчёты
      для премиум-направлений.
  BC-2690.10.30:
    name: Обнаружение Wangiri
    description: |
      Обнаружение паттернов мошенничества с обратным звонком Wangiri
      и связанных номерных диапазонов.
  BC-2690.10.40:
    name: Обнаружение мошеннического SIM-swap
    description: |
      Обнаружение мошеннических попыток замены SIM и eSIM и последующего
      захвата аккаунта.
  BC-2690.10.50:
    name: Обнаружение обходных схем
    description: |
      Обнаружение SIM-box и других обходных схем, наносящих ущерб доходам
      от интерконнекта.
  BC-2690.20:
    name: Расследование телеком-мошенничества
    description: |
      Ведение дел по выявленным фактам мошенничества, сохранение доказательств
      и взаимодействие с правоохранительными органами.
  BC-2690.20.10:
    name: Расследование дел о мошенничестве
    description: |
      Структурированное расследование выявленных дел о мошенничестве
      до получения результата.
  BC-2690.20.20:
    name: Сбор доказательств
    description: |
      Криминалистический сбор и сохранение доказательств для поддержки
      расследований мошенничества.
  BC-2690.20.30:
    name: Взаимодействие с правоохранительными органами
    description: |
      Взаимодействие с правоохранительными органами по переданным делам
      о мошенничестве.
  BC-2690.30:
    name: Контроль предотвращения телеком-мошенничества
    description: |
      Превентивные меры контроля — правила, ограничения частоты, усиление
      аутентификации и чёрные списки — применяемые к живому трафику.
  BC-2690.30.10:
    name: Управление правилами обнаружения мошенничества
    description: |
      Разработка и настройка наборов правил реального времени, используемых
      платформами управления мошенничеством.
  BC-2690.30.20:
    name: Управление ограничениями частоты
    description: |
      Ограничения по частоте использования, пополнений и изменений
      для снижения подверженности мошенничеству.
  BC-2690.30.30:
    name: Усиление аутентификации
    description: |
      Повышение уровня аутентификации для высокорисковых транзакций
      и действий в самообслуживании.
  BC-2690.30.40:
    name: Управление чёрными списками мошенничества
    description: |
      Ведение чёрных списков, связанных с мошенничеством, для номеров,
      диапазонов, устройств и идентификаторов.
  BC-2690.40:
    name: Возмещение ущерба от телеком-мошенничества
    description: |
      Возврат мошеннических начислений, безнадёжной задолженности и активов
      при подтверждённом факте мошенничества.
  BC-2690.40.10:
    name: Возврат мошеннических начислений
    description: |
      Возврат начислений, образованных в результате подтверждённого
      мошенничества.
  BC-2690.40.20:
    name: Взыскание безнадёжной задолженности
    description: |
      Взыскание безнадёжной задолженности, связанной с мошенничеством
      при регистрации и захватом аккаунта.
  BC-2690.40.30:
    name: Возврат активов
    description: |
      Возврат устройств, SIM-карт и других активов, связанных
      с мошенническими заказами.
  BC-2690.50:
    name: Межоператорская отчётность по мошенничеству
    description: |
      Обмен разведывательными данными о мошенничестве в отрасли и отчётность
      перед регуляторами при необходимости.
  BC-2690.50.10:
    name: Отраслевой обмен данными о мошенничестве
    description: |
      Участие в отраслевых каналах обмена данными о мошенничестве,
      таких как форум GSMA по мошенничеству.
  BC-2690.50.20:
    name: Отчётность перед регулятором о мошенничестве
    description: |
      Отчётность об инцидентах мошенничества и совокупном ущербе перед
      регуляторами при наличии соответствующего обязательства.
  BC-2690.50.30:
    name: Межоператорная передача дел о мошенничестве
    description: |
      Передача подозрительной мошеннической активности операторам-инициаторам
      или операторам-терминаторам для совместных действий.

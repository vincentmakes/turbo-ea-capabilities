# Управление операциями генерации электроэнергии (ru) — translations for L1-power-generation-operations-management.yaml
locale: ru
source: L1-power-generation-operations-management.yaml
entries:
  BC-3800:
    name: Управление операциями генерации электроэнергии
    description: |
      Эксплуатация генерирующего парка — тепловых, ядерных,
      гидроэлектрических, ветровых, солнечных и накопительных активов —
      включая диспетчеризацию и планирование, эксплуатацию по технологии,
      управление топливом и выбросами, а также управление производительностью парка.
  BC-3800.10:
    name: Диспетчеризация и планирование генерации
    description: |
      Коммитмент блоков, диспетчерские инструкции и краткосрочные
      графики генерирующего парка против номинаций системного оператора
      и рыночных позиций.
  BC-3800.10.10:
    name: Коммитмент блоков
    description: |
      Суточный и внутрисуточный отбор генерирующих блоков для работы.
  BC-3800.10.20:
    name: Экономическая диспетчеризация
    description: |
      Диспетчеризация введённых блоков по порядку нагрузки
      в реальном времени.
  BC-3800.10.30:
    name: Координация плановых остановок
    description: |
      Координация плановых и вынужденных остановок блоков
      с системным оператором и рыночными графиками.
  BC-3800.20:
    name: Операции тепловых электростанций
    description: |
      Ежедневная эксплуатация угольных, газовых и мазутных
      электростанций, включая парогазовые и когенерационные установки.
    in_scope:
      - Эксплуатация котлов и турбин
      - Контроль теплового КПД и эффективности
      - Управление горением
    out_of_scope:
      - Эксплуатация ядерных электростанций (BC-3800.40)
      - Эксплуатация возобновляемых электростанций (BC-3800.50)
  BC-3800.20.10:
    name: Операции котельного оборудования
    description: |
      Эксплуатация парогенерирующего оборудования
      и управление горением.
  BC-3800.20.20:
    name: Операции паровых турбин
    description: |
      Эксплуатация паровых турбин и конденсатно-питательных систем.
  BC-3800.20.30:
    name: Операции газовых турбин
    description: |
      Эксплуатация газовых турбин открытого
      и комбинированного цикла.
  BC-3800.20.40:
    name: Операции теплоснабжения и когенерации
    description: |
      Эксплуатация когенерационных установок, поставляющих
      электроэнергию и технологическое или районное тепло.
  BC-3800.30:
    name: Операции гидроэлектростанций
    description: |
      Эксплуатация обычных, гидроаккумулирующих и русловых
      ГЭС, включая управление плотиной и водными путями.
  BC-3800.30.10:
    name: Операции гидроагрегатов
    description: |
      Пуск-останов, регулирование и управление нагрузкой
      генерирующих гидроагрегатов.
  BC-3800.30.20:
    name: Управление уровнем водохранилища
    description: |
      Диспетчеризация уровня водохранилища против энергетических,
      паводковых и экологических ограничений.
  BC-3800.30.30:
    name: Операции циклирования гидроаккумулирующих ГЭС
    description: |
      Насосный и генерационный циклы
      гидроаккумулирующих электростанций.
  BC-3800.30.40:
    name: Надзор за безопасностью плотины
    description: |
      Надзор за конструктивным поведением и фильтрацией
      плотины по критериям безопасности.
  BC-3800.40:
    name: Операции ядерных электростанций
    description: |
      Эксплуатация ядерных электростанций — управление реактором,
      перегрузка топлива и радиационный надзор под условиями лицензии.
  BC-3800.40.10:
    name: Операции реактора
    description: |
      Управление реактором, управление реактивностью
      и работа в режиме регулирования нагрузки.
  BC-3800.40.20:
    name: Операции по перегрузке топлива
    description: |
      Планирование и проведение перегрузок топлива
      и основных ремонтных остановок.
  BC-3800.40.30:
    name: Радиационный надзор
    description: |
      Надзор за радиационными выбросами
      и дозами персонала против установленных пределов.
  BC-3800.40.40:
    name: Операции бассейна выдержки ОЯТ
    description: |
      Эксплуатация и надзор за охлаждением
      и инвентарём бассейна выдержки.
  BC-3800.50:
    name: Операции возобновляемых источников
    description: |
      Эксплуатация ветровых, солнечных и других переменных
      возобновляемых активов, включая ограничение и прогнозирование.
  BC-3800.50.10:
    name: Операции ветропарков
    description: |
      Эксплуатация наземных и морских ветропарков
      и управление доступностью турбин.
  BC-3800.50.20:
    name: Операции солнечных электростанций
    description: |
      Эксплуатация крупных солнечных электростанций
      и мониторинг строк.
  BC-3800.50.30:
    name: Операции ограничения ВИЭ
    description: |
      Выполнение инструкций по ограничению системного оператора
      для переменных возобновляемых источников.
  BC-3800.50.40:
    name: Прогнозирование выработки ВИЭ
    description: |
      Краткосрочное прогнозирование ветровой и солнечной выработки
      для диспетчеризации и торговли.
  BC-3800.60:
    name: Операции систем накопления энергии
    description: |
      Эксплуатация крупных аккумуляторных и других накопителей энергии,
      включая управление состоянием заряда и циклирование.
  BC-3800.60.10:
    name: Операции аккумуляторных хранилищ
    description: |
      Эксплуатация и управление состоянием заряда
      крупных аккумуляторных установок.
  BC-3800.60.20:
    name: Оптимизация циклов накопления
    description: |
      Оптимизация циклов заряда-разряда против стопок
      энергетической и вспомогательной ценности.
  BC-3800.60.30:
    name: Отслеживание деградации накопителей
    description: |
      Отслеживание КПД цикла и снижения ёмкости
      аккумуляторных активов.
  BC-3800.70:
    name: Управление производительностью генерации
    description: |
      Надзор за доступностью, теплотворным КПД, коэффициентом
      использования мощности и частотой вынужденных остановов.
  BC-3800.70.10:
    name: Отчётность о доступности и надёжности
    description: |
      Отчётность, согласованная с GADS, об эквивалентной доступности
      и статистике вынужденных остановов.
  BC-3800.70.20:
    name: Отслеживание теплового КПД
    description: |
      Отслеживание теплового КПД против проектных
      и контрактных целевых показателей.
  BC-3800.70.30:
    name: Отслеживание коэффициента использования мощности
    description: |
      Отслеживание коэффициента использования мощности
      и надёжной мощности.
  BC-3800.80:
    name: Управление топливом и выбросами
    description: |
      Управление топливными ресурсами, запасами и продуктами
      сгорания, включая мониторинг выбросов в атмосферу и CO2.
  BC-3800.80.10:
    name: Операции топливных складов
    description: |
      Операции топливных складов угля, мазута и биомассы
      и управление запасами.
  BC-3800.80.20:
    name: Номинации поставок газа
    description: |
      Номинации газопроводного газа и балансировка
      для газовой генерации.
  BC-3800.80.30:
    name: Мониторинг выбросов в атмосферу
    description: |
      Непрерывный мониторинг выбросов NOx, SOx,
      твёрдых частиц и отчётность.
  BC-3800.80.40:
    name: Сверка CO2 и квот на выбросы
    description: |
      Сверка выбросов CO2 со сданными квотами
      в рамках схем торговли выбросами.
  BC-3800.80.50:
    name: Операции с золой и остатками горения
    description: |
      Обращение и утилизация летучей золы, шлака
      и остатков сероочистки.

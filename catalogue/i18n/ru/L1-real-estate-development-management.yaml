# Девелопмент недвижимости (ru) — translations for L1-real-estate-development-management.yaml
locale: ru
source: L1-real-estate-development-management.yaml
entries:
  BC-4900:
    name: Девелопмент недвижимости
    description: |
      Инициирование, оценка целесообразности, получение разрешений,
      финансирование и контроль реализации проектов нового строительства
      и крупной реконструкции недвижимости в коммерческом и жилом
      секторах. Дисциплина со стороны девелопера, охватывающая работу
      до начала строительства (площадка, разрешения, программа,
      девелоперское финансирование) и после его завершения
      (предварительная аренда, стабилизация).
    in_scope:
      - Поиск площадок, анализ рынка и отслеживание портфеля проектов
      - Анализ наилучшего использования и технико-экономическое обоснование по проформе
      - Зонирование, разрешения, согласование планировки, строительные разрешения
      - Разработка мастер-плана и концептуальный дизайн под контролем девелопера
      - Структурирование девелоперского финансирования, включая долевое участие в СП и строительный кредит
      - Мониторинг строительства со стороны владельца, управление изменениями и контроль реализации
      - Предварительная аренда, открытие и заполнение до стабилизированной заполняемости
    out_of_scope:
      - Строительное производство генподрядчиком (BC-1150)
      - Приобретение действующих активов (BC-4930)
      - Бизнес-планы и капвложения для действующих активов (BC-4920)
      - Девелопмент для собственного использования корпоративным арендатором (BC-710)
  BC-4900.10:
    name: Портфель девелопмента и поиск площадок
    description: |
      Инициирование девелоперских возможностей через анализ рынка,
      прямой поиск площадок, привлечение внебиржевых сделок и
      отслеживание портфеля по инвестиционным критериям.
  BC-4900.10.10:
    name: Анализ рынка и субрынка
    description: |
      Анализ динамики метрополии, субрынка и микролокации для
      определения направлений девелопмента.
  BC-4900.10.20:
    name: Выявление и поиск площадок
    description: |
      Выявление площадок для девелопмента через листинговые каналы,
      брокерские сети и скрининг данных об участках.
  BC-4900.10.30:
    name: Привлечение внебиржевых сделок
    description: |
      Развитие внебиржевых возможностей через работу с собственниками
      земли и проприетарные сети.
  BC-4900.10.40:
    name: Отслеживание портфеля проектов
    description: |
      Отслеживание девелоперских возможностей через контрольные точки и
      фильтры инвестиционных критериев.
  BC-4900.20:
    name: Анализ целесообразности девелопмента
    description: |
      Оценка целесообразности девелоперских возможностей по площадке,
      программе и финансовым параметрам.
  BC-4900.20.10:
    name: Анализ наилучшего использования
    description: |
      Анализ законодательно разрешённого, физически возможного и
      финансово целесообразного использования для потенциальной площадки.
  BC-4900.20.20:
    name: Программные и объёмно-пространственные исследования
    description: |
      Исследования функциональной программы и объёмов застройки для
      проверки девелоперской оболочки и выхода.
  BC-4900.20.30:
    name: Моделирование по девелоперской проформе
    description: |
      Построение девелоперской проформы, охватывающей затраты, доходы и
      доходность без рычага и с рычагом.
  BC-4900.20.40:
    name: Андеррайтинг приобретения земли
    description: |
      Андеррайтинг цены и структуры приобретения земли по результатам
      оценки целесообразности.
  BC-4900.30:
    name: Согласование землепользования и разрешения
    description: |
      Получение прав землепользования, согласования планировки,
      экологических разрешений и строительных разрешений, необходимых
      для строительства.
  BC-4900.30.10:
    name: Стратегия зонирования и землепользования
    description: |
      Стратегия и исполнение по изменению зонирования, поправкам к
      картам землепользования и бонусам плотности.
  BC-4900.30.20:
    name: Получение согласования планировки и отклонений
    description: |
      Получение согласования планировки, отклонений и специальных
      разрешений перед органами планирования.
  BC-4900.30.30:
    name: Экологическая экспертиза (NEPA / EIA)
    description: |
      Экологическая экспертиза в рамках NEPA, EIA или эквивалентных
      региональных режимов, включая оценку воздействия и меры
      снижения рисков.
  BC-4900.30.40:
    name: Строительные разрешения и согласования
    description: |
      Подача заявок и получение строительных разрешений и торговых
      согласований, необходимых для начала строительства.
  BC-4900.30.50:
    name: Взаимодействие с сообществом и заинтересованными сторонами
    description: |
      Взаимодействие с муниципальными советами, соседями и
      политическими заинтересованными сторонами для получения
      разрешений.
  BC-4900.40:
    name: Управление программой девелопмента
    description: |
      Управление программой девелопмента на уровне плана, бюджета,
      рисков и отчётности перед заинтересованными сторонами на
      протяжении жизненного цикла.
  BC-4900.40.10:
    name: Управление графиком девелопмента
    description: |
      Разработка и отслеживание сводного графика девелопмента от
      закрытия сделки по земле до стабилизации.
  BC-4900.40.20:
    name: Контроль бюджета девелопмента
    description: |
      Контроль совокупного бюджета затрат на девелопмент, включая
      прямые, косвенные, финансовые расходы и резерв.
  BC-4900.40.30:
    name: Управление рисками и резервами девелопмента
    description: |
      Выявление, оценка и управление рисками программы и использованием
      резервов.
  BC-4900.40.40:
    name: Отчётность перед заинтересованными сторонами
    description: |
      Отчётность о ходе девелопмента для инвесторов, кредиторов и
      внутренних органов управления.
  BC-4900.50:
    name: Управление мастер-планированием и концептуальным дизайном
    description: |
      Разработка долгосрочных мастер-планов и надзор за стадиями
      концептуального и схематического дизайна в соответствии с
      намерениями девелопера.
  BC-4900.50.10:
    name: Разработка мастер-плана
    description: |
      Разработка мастер-планов для многофазных и многоучастковых
      девелоперских проектов, включая очерёдность.
  BC-4900.50.20:
    name: Надзор за концептуальным и схематическим дизайном
    description: |
      Надзор со стороны владельца за концептуальными и схематическими
      проектными решениями архитектора в соответствии с техническим
      заданием.
  BC-4900.50.30:
    name: Управление стандартами дизайна
    description: |
      Управление стандартами дизайна и корпоративными стандартами
      девелопера в консультантских командах.
  BC-4900.50.40:
    name: Определение требований по устойчивому развитию
    description: |
      Определение требований по устойчивому развитию и сертификации
      (LEED, BREEAM, WELL, NABERS) для проекта.
  BC-4900.60:
    name: Структурирование девелоперского финансирования
    description: |
      Структурирование акционерного, долгового и стимулирующего
      капитала, необходимого для финансирования девелопмента до
      завершения.
  BC-4900.60.10:
    name: Капитализация акционерного капитала
    description: |
      Привлечение и закрытие спонсорского и партнёрского акционерного
      капитала для девелоперского проекта.
  BC-4900.60.20:
    name: Привлечение строительного кредита
    description: |
      Привлечение строительных и мостовых кредитов под девелоперскую
      проформу.
  BC-4900.60.30:
    name: Государственные стимулы и налоговые льготы
    description: |
      Получение государственных стимулов — TIF, PILOT, LIHTC и
      программ налоговых кредитов на историческую реставрацию.
  BC-4900.60.40:
    name: Структурирование совместного предприятия
    description: |
      Структурирование механизмов совместных предприятий, промоут и
      условий водопадного распределения для девелоперских партнёров.
  BC-4900.70:
    name: Надзор за строительством
    description: |
      Надзор со стороны владельца за строительным производством
      генподрядчиком и субподрядчиками, при делегировании исполнения
      строительной функции (BC-1150).
  BC-4900.70.10:
    name: Выбор подрядчика и заключение договоров
    description: |
      Выбор генподрядчиков и ключевых субподрядчиков и заключение с
      ними договоров на девелоперский проект.
  BC-4900.70.20:
    name: Мониторинг строительства со стороны владельца
    description: |
      Мониторинг хода строительства, выплат и качества со стороны
      владельца в процессе реализации.
  BC-4900.70.30:
    name: Управление изменениями в объёме работ
    description: |
      Управление изменениями в объёме работ, изменениями сметы и
      использованием резервов бюджета.
  BC-4900.70.40:
    name: Надзор за качеством и безопасностью
    description: |
      Надзор за качеством строительства и показателями безопасности
      в соответствии с требованиями девелопера и нормами.
  BC-4900.80:
    name: Управление предварительной арендой и стабилизацией
    description: |
      Предварительная аренда, координация открытия и выход завершённого
      актива на стабилизированную заполняемость и результаты.
  BC-4900.80.10:
    name: Координация предварительной аренды
    description: |
      Координация кампаний предварительной аренды до завершения
      строительства.
  BC-4900.80.20:
    name: Координация открытия и первых заездов
    description: |
      Координация открытия здания, первых заездов и операционной
      передачи.
  BC-4900.80.30:
    name: Отслеживание показателей стабилизации
    description: |
      Отслеживание темпов сдачи в аренду и операционных показателей
      относительно проформы стабилизации.
  BC-4900.80.40:
    name: Устранение дефектов и замечаний
    description: |
      Устранение замечаний, скрытых дефектов и гарантийных претензий
      подрядчиков после передачи.

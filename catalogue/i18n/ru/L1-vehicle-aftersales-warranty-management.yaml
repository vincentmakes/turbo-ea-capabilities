# Послепродажное обслуживание и гарантия транспортных средств (ru) — translations for L1-vehicle-aftersales-warranty-management.yaml
locale: ru
source: L1-vehicle-aftersales-warranty-management.yaml
entries:
  BC-3450:
    name: Послепродажное обслуживание и гарантия транспортных средств
    description: |
      Послепродажные операции на стороне OEM — гарантийные операции и
      разрешение споров, управление отзывами и сервисными кампаниями,
      техническая сервисная информация, поддержка клиентов и инженерная
      обратная связь на основе законов Magnuson-Moss, правил ЕС о продажах
      и режимов отзыва NHTSA/ЕС.
  BC-3450.10:
    name: Управление гарантийной политикой и претензиями
    description: |
      Определение гарантийной политики и урегулирование гарантийных
      претензий дилеров, включая возмещение от поставщиков.
  BC-3450.10.10:
    name: Определение гарантийной политики
    description: |
      Определение условий, сроков, охвата и исключений гарантии
      по рынкам и продуктовым линейкам.
  BC-3450.10.20:
    name: Урегулирование гарантийных претензий
    description: |
      Урегулирование гарантийных претензий дилеров, включая нормы
      трудозатрат и валидацию запасных частей.
  BC-3450.10.30:
    name: Управление доброй воли и уступками
    description: |
      Управление ремонтами по доброй воле, уступками и продлениями
      гарантии для поддержания лояльности клиентов.
  BC-3450.10.40:
    name: Управление возмещением от поставщиков
    description: |
      Возмещение гарантийных затрат от ответственных поставщиков
      в рамках соглашений о распределении гарантийных затрат.
  BC-3450.20:
    name: Управление сервисными кампаниями и отзывами
    description: |
      Сквозное управление отзывами по соображениям безопасности и
      несвязанными с безопасностью сервисными кампаниями, включая уведомления и отслеживание завершения.
  BC-3450.20.10:
    name: Решение об отзыве и уведомление
    description: |
      Принятие решений и установленное законом уведомление об отзывах
      по соображениям безопасности органам и владельцам.
  BC-3450.20.20:
    name: Планирование сервисных кампаний
    description: |
      Планирование сервисных кампаний, включая определение устранения,
      обеспечение запасными частями и инструкции для дилеров.
  BC-3450.20.30:
    name: Управление уведомлением владельцев
    description: |
      Идентификация и уведомление владельцев затронутых транспортных средств
      почтой, электронной почтой и встроенными каналами.
  BC-3450.20.40:
    name: Отслеживание завершения кампании
    description: |
      Отслеживание показателей завершения отзывов и кампаний
      и обязательств регуляторной отчётности.
  BC-3450.30:
    name: Управление технической сервисной информацией
    description: |
      Разработка и распространение процедур ремонта, технических бюллетеней
      и диагностической информации для дилерской сервисной сети.
  BC-3450.30.10:
    name: Разработка процедур ремонта
    description: |
      Разработка процедур ремонта транспортных средств, взрыв-схем
      и данных по моментам затяжки/усилиям зажима.
  BC-3450.30.20:
    name: Управление техническими сервисными бюллетенями
    description: |
      Разработка, выпуск и управление жизненным циклом
      технических сервисных бюллетеней.
  BC-3450.30.30:
    name: Управление библиотекой диагностических кодов неисправностей
    description: |
      Ведение библиотек DTC, диагностических деревьев и связанного
      контента для ведомой диагностики.
  BC-3450.30.40:
    name: Спецификация сервисного инструмента
    description: |
      Спецификация специальных инструментов и оборудования дилерского
      сервиса для выполнения сервисных операций.
  BC-3450.40:
    name: Диагностика и телематические сервисные операции
    description: |
      Операции OEM, поддерживающие подключённую диагностику, удалённые
      диагностические данные и экосистемы диагностических инструментов дилеров.
  BC-3450.40.10:
    name: Операции удалённой диагностики транспортных средств
    description: |
      Функционирование сервисов удалённой диагностики состояния
      транспортных средств в поддержку дилерского сервиса.
  BC-3450.40.20:
    name: Управление обновлением диагностических инструментов
    description: |
      Управление ПО диагностических инструментов дилеров, калибровочными
      данными и доступом по безопасности.
  BC-3450.40.30:
    name: Агрегирование сервисных данных
    description: |
      Агрегирование и анализ данных о сервисных событиях от
      дилеров и подключённых транспортных средств.
  BC-3450.50:
    name: Клиентская помощь и операции на дороге
    description: |
      Брендированные OEM сервисы помощи клиентам, включая помощь на дороге,
      замену транспортного средства и репатриацию.
  BC-3450.50.10:
    name: Операции помощи на дороге
    description: |
      Функционирование брендированной OEM помощи на дороге
      при поломке и дорожных происшествиях.
  BC-3450.50.20:
    name: Координация транспортной замены
    description: |
      Координация предоставления замещающего транспорта клиентам
      во время ремонта или поломки.
  BC-3450.50.30:
    name: Координация репатриации транспортного средства
    description: |
      Координация репатриации транспортных средств после
      происшествий за рубежом или поломки на большом расстоянии.
  BC-3450.60:
    name: Координация логистики запасных частей послепродажного обслуживания
    description: |
      Координация с цепочкой поставок послепродажных запасных частей
      для удовлетворения сервисного спроса дилеров и нужд отзывов.
    in_scope:
      - Координация спроса и поставки запасных частей с дилерами
      - Экстренный заказ критических запасных частей при выходе транспортного средства из строя
      - Распределение запасных частей для отзыва по дилерской сети
    out_of_scope:
      - Каталог запасных частей и ценообразование (BC-1060)
      - Складирование и физическое распределение запасных частей (BC-1060)
  BC-3450.60.10:
    name: Координация спроса на запасные части с дилерами
    description: |
      Координация видимости спроса на запасные части у дилеров
      и сигналов пополнения в цепочку поставок запасных частей.
  BC-3450.60.20:
    name: Управление экстренными заказами критических запасных частей
    description: |
      Экстренный заказ критических запасных частей при выходе транспортного
      средства из строя и в высокоприоритетных клиентских случаях.
  BC-3450.60.30:
    name: Распределение запасных частей для отзыва
    description: |
      Распределение дефицитных запасных частей для отзыва дилерам
      и рынкам исходя из приоритетов затронутого парка.
  BC-3450.70:
    name: Обратная связь по послепродажному обслуживанию и качеству
    description: |
      Анализ тенденций отказов в поле и обратной связи от клиентов,
      а также направление проблем обратно в разработку и производство.
  BC-3450.70.10:
    name: Анализ тенденций отказов в поле
    description: |
      Анализ данных гарантии и сервисных событий для выявления тенденций
      отказов и возникающих проблем в поле.
  BC-3450.70.20:
    name: Управление голосом клиента в послепродажном обслуживании
    description: |
      Сбор и анализ голоса клиента в послепродажном обслуживании,
      включая опросы и обратную связь, записанную дилерами.
  BC-3450.70.30:
    name: Управление инженерной обратной связью
    description: |
      Передача проблем полевого качества в разработку для
      устранения, исправления и извлечения уроков.
metadata:
  status: draft
  reviewer: pending

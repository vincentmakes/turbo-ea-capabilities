# Управление арендой недвижимости (ru) — translations for L1-real-estate-leasing-management.yaml
locale: ru
source: L1-real-estate-leasing-management.yaml
entries:
  BC-4950:
    name: Управление арендой недвижимости
    description: |
      Арендная деятельность со стороны арендодателя по коммерческим,
      торговым и жилым площадям на протяжении всего жизненного цикла
      аренды — ценообразование, маркетинг, работа с потенциальными
      арендаторами, проверка заявок, переговоры и исполнение,
      администрирование договоров, продление и удержание арендаторов,
      окончание аренды. Отличается от аренды корпоративным
      арендатором (BC-710) и брокерских услуг (BC-4960).
    in_scope:
      - Стратегия запрашиваемой арендной платы и уступок
      - Маркетинг вакансий, листинги и показы
      - Обработка входящих запросов и квалификация потенциальных арендаторов
      - Сбор заявок, проверка арендаторов и отказы в соответствии с законодательством о справедливом жилье
      - Термшит аренды, составление, подписание и работа с залогом
      - Абстрагирование договоров, индексация и отслеживание опций со стороны арендодателя
      - Программы продления и удержания арендаторов
      - Выезд, ущерб имуществу и финальный расчёт при окончании аренды
    out_of_scope:
      - Администрирование аренды корпоративным арендатором (BC-710)
      - Брокерское представительство как бизнес-направление (BC-4960)
      - Эксплуатация объекта в период аренды (BC-4940)
      - Регулирование арендной платы и позиция по соответствию требованиям (BC-4990)
  BC-4950.10:
    name: Стратегия и ценообразование аренды
    description: |
      Определение стратегии запрашиваемой арендной платы, пакетов
      уступок, целевого состава арендаторов и сравнение арендной
      ставки актива с рынком.
  BC-4950.10.10:
    name: Стратегия запрашиваемой арендной платы и уступок
    description: |
      Определение уровней запрашиваемой арендной платы и пакетов
      уступок по активу и типу помещения.
  BC-4950.10.20:
    name: Стратегия целевого состава арендаторов
    description: |
      Определение целевого состава арендаторов и кредитного качества
      для актива.
  BC-4950.10.30:
    name: Бенчмаркинг рыночной арендной платы
    description: |
      Периодический бенчмаркинг действующих и запрашиваемых
      арендных ставок относительно рыночных данных.
  BC-4950.20:
    name: Маркетинг вакансий и листинг
    description: |
      Маркетинг свободных площадей через листинговый контент,
      синдикацию каналов и показы на объекте.
  BC-4950.20.10:
    name: Создание листингового контента
    description: |
      Создание листингового контента, включая фотографии, планы
      этажей и виртуальные туры.
  BC-4950.20.20:
    name: Управление листинговыми каналами и синдикацией
    description: |
      Управление распространением листингов на порталы, MLS и
      партнёрские каналы.
  BC-4950.20.30:
    name: Туры и показы вакантных помещений
    description: |
      Организация туров по вакантным помещениям и самостоятельных
      показов на объекте.
  BC-4950.30:
    name: Работа с потенциальными арендаторами и запросами
    description: |
      Сбор, квалификация и последующая работа с входящими арендными
      запросами и потенциальными арендаторами.
  BC-4950.30.10:
    name: Сбор и маршрутизация запросов
    description: |
      Сбор арендных запросов по всем каналам и маршрутизация к
      нужной команде объекта.
  BC-4950.30.20:
    name: Квалификация потенциальных арендаторов
    description: |
      Квалификация потенциальных арендаторов по целевому
      использованию, кредитоспособности и соответствию помещению.
  BC-4950.30.30:
    name: Планирование просмотров и последующая работа
    description: |
      Планирование просмотров и последующая работа с потенциальными
      арендаторами после показа.
  BC-4950.40:
    name: Заявки и проверка арендаторов
    description: |
      Сбор заявок арендаторов и проведение проверок кредитоспособности,
      личности и рекомендаций в соответствии с нормами справедливого
      жилья.
  BC-4950.40.10:
    name: Приём заявок
    description: |
      Приём заявок арендаторов и подтверждающей документации.
  BC-4950.40.20:
    name: Проверка кредитоспособности и рекомендаций
    description: |
      Проведение проверки кредитоспособности и рекомендаций от
      арендодателей и работодателей.
  BC-4950.40.30:
    name: Проверка личности и права на аренду
    description: |
      Проверка личности и права на аренду / проживание в
      соответствии с требованиями юрисдикции.
  BC-4950.40.40:
    name: Обработка отказов по закону о справедливом жилье
    description: |
      Обработка решений об отказе в заявке в соответствии с
      требованиями о справедливом жилье и уведомлении об отказе.
  BC-4950.50:
    name: Переговоры и исполнение договора аренды
    description: |
      Переговоры по термшитам аренды, составление, управление
      редактурой, исполнение и получение залога и гарантий.
  BC-4950.50.10:
    name: Переговоры по термшиту аренды
    description: |
      Переговоры по термшитам аренды, включая ставку, срок, опции и
      стимулы.
  BC-4950.50.20:
    name: Составление договора и управление редактурой
    description: |
      Составление договоров аренды и управление циклами редактуры с
      юридическим консультантом арендатора.
  BC-4950.50.30:
    name: Подписание и исполнение договора аренды
    description: |
      Подписание и исполнение договора аренды и сопутствующих
      документов.
  BC-4950.50.40:
    name: Получение залога и гарантий
    description: |
      Получение залоговых депозитов, аккредитивов и личных или
      корпоративных гарантий.
  BC-4950.60:
    name: Администрирование договоров аренды со стороны арендодателя
    description: |
      Администрирование аннотаций договоров, индексации арендной
      платы, отслеживания опций и мониторинга соответствия условиям
      аренды в течение срока.
  BC-4950.60.10:
    name: Абстрагирование договоров аренды
    description: |
      Абстрагирование исполненных договоров аренды в структурированные
      записи ключевых условий.
  BC-4950.60.20:
    name: Индексация арендной платы и отслеживание эскалаций
    description: |
      Отслеживание и применение эскалаций арендной платы, включая
      индексные и ступенчатые условия.
  BC-4950.60.30:
    name: Отслеживание опций, брейков и продлений
    description: |
      Отслеживание опций арендатора и арендодателя, дат брейка и
      окон продления.
  BC-4950.60.40:
    name: Мониторинг соответствия условиям аренды
    description: |
      Мониторинг соответствия арендатора ковенантам договора аренды
      по использованию, перепланировке и отчётности.
  BC-4950.70:
    name: Управление продлением и удержанием арендаторов
    description: |
      Проактивное управление пайплайном продлений, переговоры по
      условиям и программы удержания действующих арендаторов.
  BC-4950.70.10:
    name: Управление пайплайном продлений
    description: |
      Управление пайплайном продлений по календарю истечения сроков
      и целевым показателям удержания.
  BC-4950.70.20:
    name: Переговоры по условиям продления
    description: |
      Переговоры по условиям продления, включая ставку, срок и
      стимулы.
  BC-4950.70.30:
    name: Программы удержания арендаторов
    description: |
      Реализация программ удержания, включая работу с арендаторами и
      предложение стимулов.
  BC-4950.80:
    name: Управление выездом и прекращением аренды
    description: |
      Управление уведомлением арендатора, сдачей помещения, ущербом
      имуществу, восстановлением, возвратом залога и финальным
      расчётом при окончании аренды.
  BC-4950.80.10:
    name: Обработка уведомлений и сдачи помещения
    description: |
      Обработка уведомлений об окончании аренды и сдачи помещений.
  BC-4950.80.20:
    name: Оценка ущерба и восстановления
    description: |
      Оценка ущерба имуществу и обязательств арендатора по
      восстановлению согласно договору аренды.
  BC-4950.80.30:
    name: Возврат залогового депозита
    description: |
      Возврат залоговых депозитов с учётом удержаний в соответствии
      с законодательством и договором аренды.
  BC-4950.80.40:
    name: Финальный расчёт при окончании аренды
    description: |
      Финальный расчёт арендной платы, возмещений и кредитов по
      окончании аренды.

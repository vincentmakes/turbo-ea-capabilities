# Управление производственными операциями (ru) — translations for L1-manufacturing-operations-management.yaml
locale: ru
source: L1-manufacturing-operations-management.yaml
entries:
  BC-1010:
    name: Управление производственными операциями
    description: |
      Выполнение операций на цеховом уровне, управление рабочими заданиями и операциями MES.
  BC-1010.10:
    name: Управление рабочими заданиями
    description: |
      Создание, выпуск, отслеживание и закрытие рабочих заданий.
  BC-1010.10.10:
    name: Создание рабочих заданий
    description: |
      Формирование рабочих заданий на основе производственных заказов, спецификаций и маршрутов.
  BC-1010.10.20:
    name: Выпуск рабочих заданий
    description: |
      Передача рабочих заданий в цех с проверкой наличия материалов.
  BC-1010.10.30:
    name: Подтверждение рабочих заданий
    description: |
      Подтверждение выполненных операций, количеств и времени по рабочим заданиям.
  BC-1010.10.40:
    name: Закрытие рабочих заданий
    description: |
      Окончательное закрытие и расчёт рабочих заданий.
  BC-1010.20:
    name: Управление исполнением цеха
    description: |
      Управление цеховым производством, исполнение MES.
  BC-1010.20.10:
    name: Управление описанием производства
    description: |
      Описание производства по стандарту ISA-95 для продуктов и процессов.
  BC-1010.20.20:
    name: Управление производственными ресурсами
    description: |
      Управление доступностью и возможностями производственных ресурсов.
  BC-1010.20.30:
    name: Координация исполнения производства
    description: |
      Координация исполнения в режиме реального времени между рабочими центрами.
  BC-1010.20.40:
    name: Отслеживание и генеалогия производства
    description: |
      Генеалогия партий, серий и изделий, а также записи о фактическом исполнении.
  BC-1010.30:
    name: Управление операциями оборудования
    description: |
      Наладка, эксплуатация, переналадка и мониторинг оборудования.
  BC-1010.30.10:
    name: Наладка и переналадка оборудования
    description: |
      Наладка оборудования, переналадка методом SMED и квалификация.
  BC-1010.30.20:
    name: Эксплуатация оборудования
    description: |
      Управление работой оборудования, контроль параметров и надзор за процессом.
  BC-1010.30.30:
    name: Мониторинг оборудования
    description: |
      Мониторинг состояния и работы оборудования в режиме реального времени.
  BC-1010.40:
    name: Управление поддержкой операторов
    description: |
      Рабочие инструкции, цифровое андон и поддержка операторов.
  BC-1010.40.10:
    name: Предоставление цифровых рабочих инструкций
    description: |
      Доставка цифровых рабочих инструкций на рабочее место.
  BC-1010.40.20:
    name: Управление андон и эскалацией
    description: |
      Сигналы андон, эскалация и поддержка операторов.
  BC-1010.40.30:
    name: Квалификация и допуск операторов
    description: |
      Сертификация операторов и допуск к выполнению задач.
  BC-1010.50:
    name: Управление обработкой материалов
    description: |
      Внутреннее перемещение материалов, комплектация и подача к линиям.
  BC-1010.50.10:
    name: Пополнение материалов у линии
    description: |
      Пополнение материалов у производственных линий точно в срок по системе «молочный маршрут».
  BC-1010.50.20:
    name: Комплектация материалов
    description: |
      Комплектация и предварительная сборка компонентов для производственных линий.
  BC-1010.50.30:
    name: Внутреннее перемещение материалов
    description: |
      Внутренняя логистика и транспортировка между операциями.
  BC-1010.60:
    name: Управление сбором производственных данных
    description: |
      Данные датчиков и оборудования, интеграция ОТ с ИТ.
  BC-1010.60.10:
    name: Сбор данных оборудования
    description: |
      Сбор сигналов и технологических данных от оборудования.
  BC-1010.60.20:
    name: Интеграция датчиков и IoT
    description: |
      Интеграция датчиков и IIoT-устройств на производственном участке.
  BC-1010.60.30:
    name: Интеграция данных ОТ и ИТ
    description: |
      Интеграция данных ОТ с ИТ-системами в соответствии с ISA-95.
  BC-1010.60.40:
    name: Эксплуатация историка производственных данных
    description: |
      Захват и доступ к данным временных рядов на основе историка.
  BC-1010.70:
    name: Управление производительностью производства
    description: |
      Производительность в режиме реального времени, анализ простоев и микроостановок.
  BC-1010.70.10:
    name: Мониторинг производительности в реальном времени
    description: |
      Мониторинг OEE и KPI производственного участка в режиме реального времени.
  BC-1010.70.20:
    name: Анализ микроостановок
    description: |
      Анализ микроостановок и повторяющихся потерь.
  BC-1010.70.30:
    name: Отчётность при передаче смены
    description: |
      Структурированные отчёты о передаче смены и цифровые доски.
  BC-1010.70.40:
    name: Обнаружение аномалий производства
    description: |
      Обнаружение аномалий и оповещение по данным производства.

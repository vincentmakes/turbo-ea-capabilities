# Управление инженерными дисциплинами (ru) — translations for L1-engineering-discipline-management.yaml
locale: ru
source: L1-engineering-discipline-management.yaml
entries:
  BC-1100:
    name: Управление инженерными дисциплинами
    description: |
      Многодисциплинарные инженерные компетенции — механика, электротехника, гражданское строительство, технологические процессы, контрольно-измерительные приборы, трубопроводы.
  BC-1100.10:
    name: Управление механической инженерией
    description: |
      Компетенции механической дисциплины — оборудование, вращающиеся машины, механические системы.
  BC-1100.10.10:
    name: Инженерное проектирование статического оборудования
    description: |
      Проектирование сосудов давления, теплообменников и другого статического оборудования.
  BC-1100.10.20:
    name: Инженерное проектирование вращающегося оборудования
    description: |
      Инженерное проектирование насосов, компрессоров, турбин и вращающихся машин.
  BC-1100.10.30:
    name: Проектирование систем HVAC
    description: |
      Проектирование и анализ систем HVAC.
  BC-1100.10.40:
    name: Инженерия материалов и сварочные технологии
    description: |
      Выбор материалов, сварочные спецификации и антикоррозионное проектирование.
  BC-1100.20:
    name: Управление электротехнической инженерией
    description: |
      Электроснабжение, электрическое распределение, управляющая электротехника.
  BC-1100.20.10:
    name: Проектирование систем электроснабжения
    description: |
      Проектирование систем электроснабжения высокого и среднего напряжения.
  BC-1100.20.20:
    name: Проектирование электрических распределительных сетей
    description: |
      Низковольтное распределение, распределительные щиты и ведомости нагрузок.
  BC-1100.20.30:
    name: Спецификация электрического оборудования
    description: |
      Спецификация двигателей, трансформаторов и электрического оборудования.
  BC-1100.20.40:
    name: Проектирование заземления и молниезащиты
    description: |
      Проектирование заземления, эквипотенциального соединения и молниезащиты.
  BC-1100.30:
    name: Управление гражданской и строительной инженерией
    description: |
      Гражданские работы, металлоконструкции, бетон, фундаменты, геотехника.
  BC-1100.30.10:
    name: Проектирование металлоконструкций
    description: |
      Проектирование стальных конструкций и узлов.
  BC-1100.30.20:
    name: Проектирование бетонных конструкций и фундаментов
    description: |
      Проектирование бетонных конструкций, фундаментов и армирования.
  BC-1100.30.30:
    name: Геотехническая инженерия
    description: |
      Геотехнические изыскания и инженерия оснований.
  BC-1100.30.40:
    name: Проектирование площадочных гражданских работ
    description: |
      Проектирование вертикальной планировки, водоотведения и площадочной гражданской инфраструктуры.
  BC-1100.40:
    name: Управление технологической инженерией
    description: |
      Проектирование технологических процессов, моделирование, P&ID, материальные и энергетические балансы, гидравлика.
  BC-1100.40.10:
    name: Моделирование и симуляция технологических процессов
    description: |
      Стационарное и динамическое моделирование технологических процессов.
  BC-1100.40.20:
    name: Разработка P&ID и PFD
    description: |
      Принципиальные технологические схемы и схемы трубопроводов с контрольно-измерительными приборами.
  BC-1100.40.30:
    name: Инженерия материальных и энергетических балансов
    description: |
      Тепловые и материальные балансы, расчёт технологического оборудования.
  BC-1100.40.40:
    name: Инженерия технологической безопасности
    description: |
      Системы сброса давления и факельные системы, классификация SIL и технологическая безопасность.
  BC-1100.50:
    name: Управление инженерией КИПиА
    description: |
      Полевые контрольно-измерительные приборы, автоматизация, инженерия систем управления.
  BC-1100.50.10:
    name: Инженерия полевых контрольно-измерительных приборов
    description: |
      Спецификация полевых датчиков, преобразователей и исполнительных механизмов.
  BC-1100.50.20:
    name: Проектирование систем управления
    description: |
      Архитектура DCS и PLC, проектирование контуров управления.
  BC-1100.50.30:
    name: Проектирование систем противоаварийной защиты
    description: |
      Проектирование SIS по IEC 61511 и верификация SIL.
  BC-1100.50.40:
    name: Инженерия программного обеспечения автоматизации
    description: |
      Конфигурирование логики управления и разработка ПО автоматизации.
  BC-1100.60:
    name: Управление трубопроводной инженерией
    description: |
      Проектирование трубопроводов, компоновки, изометрические чертежи, расчёт на прочность, выбор материалов.
  BC-1100.60.10:
    name: Проектирование компоновки трубопроводов
    description: |
      Общие виды трубопроводов и трёхмерная компоновка.
  BC-1100.60.20:
    name: Расчёт трубопроводов на прочность
    description: |
      Расчёт трубопроводов на прочность и проектирование опор.
  BC-1100.60.30:
    name: Выбор материалов для трубопроводов
    description: |
      Классы трубопроводных материалов, прокладки, арматура и изоляция.
  BC-1100.60.40:
    name: Разработка изометрических чертежей
    description: |
      Разработка изометрических чертежей трубопроводов и спецификаций материалов.
  BC-1100.70:
    name: Управление ресурсами и компетенциями дисциплин
    description: |
      Дисциплинарные пулы ресурсов, системы компетенций, технические карьерные пути.
  BC-1100.70.10:
    name: Управление пулом инженерных ресурсов
    description: |
      Распределение дисциплинарных ресурсов по проектам.
  BC-1100.70.20:
    name: Система компетенций инженеров
    description: |
      Дисциплинарные системы компетенций и матрицы навыков.
  BC-1100.70.30:
    name: Управление техническим карьерным путём
    description: |
      Технические карьерные лестницы и развитие инженеров до статуса дипломированного специалиста.
  BC-1100.70.40:
    name: Управление инженерными знаниями
    description: |
      Обмен инженерными знаниями, сообщества практики и извлечённые уроки.

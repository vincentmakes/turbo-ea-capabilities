# Управление сетевыми операциями телекома (ru) — translations for L1-telecom-network-operations-management.yaml
locale: ru
source: L1-telecom-network-operations-management.yaml
entries:
  BC-2600:
    name: Управление сетевыми операциями телекома
    description: |
      Повседневная эксплуатация фиксированных, мобильных и IP-сетей в сегментах
      радиодоступа, ядра, транспорта и граничных узлов — охватывает управление
      отказами, конфигурацией, производительностью, инвентарём, изменениями,
      операционной безопасностью и полевой координацией на основе TMN FCAPS и eTOM.
  BC-2600.10:
    name: Управление сетевыми отказами
    description: |
      Обнаружение, корреляция, тикетинг, восстановление и анализ первопричин
      сетевых отказов в сегментах доступа, ядра и транспорта.
  BC-2600.10.10:
    name: Корреляция сигналов тревоги
    description: |
      Корреляция и дедупликация сигналов тревоги сети в режиме реального времени
      с формированием обработанных событий.
  BC-2600.10.20:
    name: Управление тикетами неисправностей
    description: |
      Управление жизненным циклом тикетов сетевых неисправностей от создания
      до закрытия.
  BC-2600.10.30:
    name: Управление сетевыми авариями
    description: |
      Координация реагирования, коммуникаций и действий по восстановлению
      при крупных сетевых авариях.
  BC-2600.10.40:
    name: Анализ первопричин
    description: |
      Структурированное расследование повторяющихся и крупных отказов для
      выявления и устранения коренных причин.
  BC-2600.20:
    name: Управление сетевой конфигурацией
    description: |
      Определение и соблюдение стандартов конфигурации сетевых элементов
      и контролируемое внедрение изменений конфигурации.
  BC-2600.20.10:
    name: Управление эталонной конфигурацией
    description: |
      Определение и поддержание утверждённых базовых конфигураций
      по типу и роли сетевого элемента.
  BC-2600.20.20:
    name: Управление сетевыми параметрами
    description: |
      Управление жизненным циклом настраиваемых сетевых параметров
      и допустимых диапазонов их значений.
  BC-2600.20.30:
    name: Управление образами программного обеспечения
    description: |
      Хранение и контроль версий программных образов и встроенного ПО
      сетевых элементов.
  BC-2600.20.40:
    name: Автоматизированное развёртывание конфигураций
    description: |
      Инструментальное развёртывание утверждённых изменений конфигурации
      в масштабе с верификацией и откатом.
  BC-2600.30:
    name: Управление производительностью сети
    description: |
      Непрерывный сбор и анализ счётчиков производительности и KPI сети
      для обнаружения и предупреждения деградации.
  BC-2600.30.10:
    name: Сбор сетевых KPI
    description: |
      Сбор и хранение счётчиков производительности и KPI на уровне
      элементов и сети.
  BC-2600.30.20:
    name: Мониторинг порогов производительности
    description: |
      Мониторинг KPI производительности относительно инженерных пороговых
      значений и SLA.
  BC-2600.30.30:
    name: Мониторинг утилизации ёмкости
    description: |
      Отслеживание утилизации ресурсов по отношению к проектной ёмкости
      для выявления условий, близких к насыщению.
  BC-2600.30.40:
    name: Корреляция с клиентским опытом
    description: |
      Корреляция показателей производительности сети с индикаторами
      клиентского опыта для выявления влияющих на сервис условий.
  BC-2600.40:
    name: Управление сетевым инвентарём
    description: |
      Авторитетная запись логических и физических сетевых ресурсов и их
      взаимосвязей, поддерживаемая в актуальном состоянии путём сверки.
  BC-2600.40.10:
    name: Логический инвентарь сети
    description: |
      Авторитетная запись логических ресурсов: сервисов, цепей, назначений
      IP/VLAN и путей передачи.
  BC-2600.40.20:
    name: Физический инвентарь сети
    description: |
      Авторитетная запись физических активов: узлов, плат, портов,
      оптоволокна, кабельной канализации и антенн.
  BC-2600.40.30:
    name: Сверка инвентаря
    description: |
      Сверка записей инвентаря с данными обнаружения, проектной документации
      и полевых обследований.
  BC-2600.40.40:
    name: Обнаружение сетевых ресурсов
    description: |
      Автоматическое обнаружение развёрнутых сетевых элементов и их состояния.
  BC-2600.50:
    name: Управление изменениями и релизами сети
    description: |
      Планирование, согласование, выполнение, верификация и откат изменений
      живых сетевых элементов и сервисов.
  BC-2600.50.10:
    name: Планирование сетевых изменений
    description: |
      Планирование и оценка рисков сетевых изменений, включая окна воздействия.
  BC-2600.50.20:
    name: Реализация сетевых изменений
    description: |
      Контролируемое выполнение утверждённых сетевых изменений в плановых окнах.
  BC-2600.50.30:
    name: Верификация изменений
    description: |
      Постизменённая верификация того, что сеть находится в ожидаемом состоянии
      и работает в пределах допуска.
  BC-2600.50.40:
    name: Откат изменений
    description: |
      Отмена изменений, не прошедших верификацию или вызвавших недопустимое
      воздействие.
  BC-2600.60:
    name: Операционная безопасность сети
    description: |
      Специфичный для телекоммуникационных сетей мониторинг безопасности и
      реагирование, охватывающие домены сигнализации, транспорта и ядра сети,
      в дополнение к корпоративной кибербезопасности.
  BC-2600.60.10:
    name: Мониторинг сетевых угроз
    description: |
      Мониторинг сетей сигнализации, транспорта и ядра на предмет аномальной
      и вредоносной активности.
  BC-2600.60.20:
    name: Защита от DDoS
    description: |
      Обнаружение и нейтрализация объёмных и протокольных атак отказа
      в обслуживании на сетевые и клиентские конечные точки.
  BC-2600.60.30:
    name: Управление доступом к сети
    description: |
      Обеспечение административного и машинного контроля доступа
      к сетевым элементам.
  BC-2600.60.40:
    name: Реагирование на сетевые инциденты безопасности
    description: |
      Локализация, ликвидация и восстановление после подтверждённых
      инцидентов сетевой безопасности.
  BC-2600.70:
    name: Координация полевых операций
    description: |
      Диспетчеризация, контроль выполнения и координация доступа на объекты
      для полевых работ по сети.
  BC-2600.70.10:
    name: Диспетчеризация полевых нарядов
    description: |
      Назначение сетевых нарядов внутренним и подрядным полевым бригадам.
  BC-2600.70.20:
    name: Выполнение рабочих процедур
    description: |
      Контроль выполнения утверждённых рабочих процедур на живых сетевых
      элементах.
  BC-2600.70.30:
    name: Координация доступа на объект
    description: |
      Координация физического доступа на сетевые объекты, включая
      сопровождение, разрешения и меры безопасности.
  BC-2600.80:
    name: Управление оптимизацией сети
    description: |
      Непрерывная настройка сетевых элементов и путей передачи трафика
      для максимизации производительности, ёмкости и клиентского опыта.
  BC-2600.80.10:
    name: Оптимизация радиодоступа
    description: |
      Настройка параметров радиодоступа, отношений соседства и конфигурации
      антенн.
  BC-2600.80.20:
    name: Оптимизация транспорта
    description: |
      Настройка путей транспортной сети, распределения ёмкости и
      качества обслуживания.
  BC-2600.80.30:
    name: Инжиниринг трафика
    description: |
      Управление маршрутизацией IP и транспортного трафика в сети для
      обеспечения производительности, снижения затрат и отказоустойчивости.
  BC-2600.80.40:
    name: Замкнутая автоматизация
    description: |
      Автоматизированные циклы обнаружения-решения-действия для непрерывной
      оптимизации сети без ручного вмешательства.

# Управление независимостью и конфликтами (ru) — translations for L1-independence-and-conflicts-management.yaml
locale: ru
source: L1-independence-and-conflicts-management.yaml
entries:
  BC-4350:
    name: Управление независимостью и конфликтами
    description: |
      Независимость аудитора, профессиональные конфликты интересов, операционные информационные барьеры, декларации личных интересов и разрешение на принятие и продолжение задания, специфические для профессиональных сервисных фирм.
  BC-4350.10:
    name: Управление независимостью аудитора
    description: |
      Применение правил независимости аудиторской фирмы, включая запрещённые услуги, ротацию партнёров, ограничения по зависимости от гонораров и PIE-специфические требования.
  BC-4350.10.10:
    name: Идентификация аудиторских клиентов
    description: |
      Выявление и ведение перечня ограниченных аудиторских клиентов, включая аффилированных лиц и бенефициарные отношения.
  BC-4350.10.20:
    name: Предварительное разрешение запрещённых услуг
    description: |
      Предварительное разрешение неаудиторских услуг аудиторским клиентам по спискам запрещённых услуг.
  BC-4350.10.30:
    name: Управление ротацией аудиторских партнёров
    description: |
      Отслеживание ротации и обеспечение соблюдения требований для партнёров задания и EQR-партнёров по аудиторским клиентам.
  BC-4350.10.40:
    name: Мониторинг гонорарной зависимости
    description: |
      Мониторинг аудиторских и общих гонораров относительно дохода фирмы для выявления угроз гонорарной зависимости.
  BC-4350.20:
    name: Управление конфликтами интересов
    description: |
      Выявление, оценка и урегулирование конфликтов интересов между заданиями, клиентами, а также между интересами клиента и фирмы.
  BC-4350.20.10:
    name: Поиск и выявление конфликтов
    description: |
      Поиск клиентских и дельных записей для выявления потенциальных конфликтов по перспективным заданиям.
  BC-4350.20.20:
    name: Оценка и классификация конфликтов
    description: |
      Оценка выявленных конфликтов по политике фирмы и профессиональным правилам для определения категории конфликта и порядка его урегулирования.
  BC-4350.20.30:
    name: Урегулирование конфликтов и управление отказами
    description: |
      Урегулирование конфликтов, включая получение информированного согласия, отказов и отклонения задания, если применимо.
  BC-4350.30:
    name: Управление информационными барьерами
    description: |
      Разработка, развёртывание и функционирование информационных барьеров и процедур скрининга для деликатных заданий.
  BC-4350.30.10:
    name: Разработка информационного барьера
    description: |
      Определение скоупа барьера, скрининговых сотрудников и физических или системных контролей для задания.
  BC-4350.30.20:
    name: Развёртывание информационного барьера
    description: |
      Операционное развёртывание ограничений доступа в документах, электронной почте и системах практики.
  BC-4350.30.30:
    name: Обнаружение и реагирование на нарушения барьера
    description: |
      Обнаружение и реагирование на потенциальные или фактические нарушения барьера, включая эскалацию и устранение.
  BC-4350.40:
    name: Управление личными интересами и отношениями
    description: |
      Сбор, декларирование и мониторинг личных финансовых интересов, семейных связей и предшествующей занятости, которые могут угрожать независимости или создавать конфликты.
  BC-4350.40.10:
    name: Декларирование личных инвестиций
    description: |
      Сбор и ведение деклараций личных инвестиций партнёров и сотрудников в отношении списка ограниченных организаций.
  BC-4350.40.20:
    name: Декларирование семейных и близких связей
    description: |
      Сбор деклараций, охватывающих близких родственников и иные близкие связи, имеющие значение для независимости.
  BC-4350.40.30:
    name: Отслеживание предшествующей занятости и периодов охлаждения
    description: |
      Отслеживание предшествующей занятости у аудиторских клиентов и периодов охлаждения до участия в задании.
  BC-4350.50:
    name: Разрешение на принятие задания
    description: |
      Рабочий процесс, объединяющий разрешения независимости, конфликтов и добросовестности в единый вклад в принятие задания.
  BC-4350.50.10:
    name: Координация рабочего процесса разрешений
    description: |
      Оркестрация разрешений независимости, конфликтов и AML, необходимых перед принятием задания.
  BC-4350.50.20:
    name: Фиксация решений по разрешениям
    description: |
      Фиксация решений по разрешениям, условий и обоснований в деле задания.
  BC-4350.50.30:
    name: Управление повторным разрешением при продолжении задания
    description: |
      Периодическое повторное разрешение независимости и конфликтов по продолжающимся заданиям и регулярным аудиторским отношениям.
  BC-4350.60:
    name: Мониторинг независимости и конфликтов
    description: |
      Текущий мониторинг состояния независимости и конфликтов в ходе выполнения задания и по портфелю заданий.
  BC-4350.60.10:
    name: Мониторинг новых услуг аудиторским клиентам
    description: |
      Мониторинг новых услуг, предлагаемых существующим аудиторским клиентам, на предмет запрещённых услуг.
  BC-4350.60.20:
    name: Ведение списка ограниченных организаций
    description: |
      Ведение и распространение списка ограниченных организаций и связанных уведомлений для специалистов.
  BC-4350.60.30:
    name: Расследование нарушений независимости
    description: |
      Расследование и отчётность о предполагаемых или фактических нарушениях независимости и корректирующие мероприятия.

# Техническое обслуживание оборудования (ru) — translations for L1-plant-maintenance-management.yaml
locale: ru
source: L1-plant-maintenance-management.yaml
entries:
  BC-1030:
    name: Техническое обслуживание оборудования
    description: |
      Планово-предупредительное, предиктивное и корректирующее техническое обслуживание производственных объектов и оборудования.
  BC-1030.10:
    name: Управление стратегией технического обслуживания
    description: |
      Стратегия технического обслуживания по классам активов, RCM.
  BC-1030.10.10:
    name: Анализ надёжности как основа технического обслуживания
    description: |
      RCM-анализ для определения стратегий технического обслуживания по классам активов.
  BC-1030.10.20:
    name: Разработка планов технического обслуживания
    description: |
      Формирование планов, задач и периодичности технического обслуживания.
  BC-1030.10.30:
    name: Управление стандартами технического обслуживания
    description: |
      Процедуры, стандарты и лучшие практики технического обслуживания.
  BC-1030.20:
    name: Управление планово-предупредительным обслуживанием
    description: |
      Планы ППО, планирование и исполнение.
  BC-1030.20.10:
    name: Управление расписанием ППО
    description: |
      Формирование и управление расписанием планово-предупредительного обслуживания.
  BC-1030.20.20:
    name: Исполнение ППО
    description: |
      Выполнение задач планово-предупредительного обслуживания и проверка исполнения.
  BC-1030.20.30:
    name: Контроль соблюдения ППО
    description: |
      Отслеживание соблюдения регламентов ППО и просроченных задач.
  BC-1030.30:
    name: Управление корректирующим обслуживанием
    description: |
      Реагирование на аварийные отказы, проведение ремонтов.
  BC-1030.30.10:
    name: Реагирование на аварийные остановки
    description: |
      Первичное реагирование на аварийные отказы и внеплановые события.
  BC-1030.30.20:
    name: Выполнение ремонта оборудования
    description: |
      Проведение корректирующего ремонта и проверка качества исполнения.
  BC-1030.30.30:
    name: Анализ отказов и отчётность
    description: |
      Анализ первопричин отказов и составление отчётов по результатам корректирующих работ.
  BC-1030.40:
    name: Управление предиктивным обслуживанием
    description: |
      Обслуживание на основе технического состояния и прогностической аналитики.
  BC-1030.40.10:
    name: Мониторинг технического состояния
    description: |
      Вибродиагностика, термография, анализ масла и акустический контроль состояния оборудования.
  BC-1030.40.20:
    name: Прогностическое моделирование отказов
    description: |
      Прогнозирование отказов с использованием методов машинного обучения.
  BC-1030.40.30:
    name: Формирование предписывающих мер по обслуживанию
    description: |
      Формирование предписывающих действий по техническому обслуживанию на основе прогнозов.
  BC-1030.50:
    name: Управление нарядами на техническое обслуживание
    description: |
      Жизненный цикл нарядов на техническое обслуживание.
  BC-1030.50.10:
    name: Регистрация уведомлений о техническом обслуживании
    description: |
      Приём и регистрация уведомлений и заявок на техническое обслуживание.
  BC-1030.50.20:
    name: Планирование нарядов на техническое обслуживание
    description: |
      Планирование нарядов с учётом ресурсов и запасных частей.
  BC-1030.50.30:
    name: Исполнение нарядов на техническое обслуживание
    description: |
      Выполнение и подтверждение нарядов на техническое обслуживание.
  BC-1030.50.40:
    name: Закрытие нарядов на техническое обслуживание
    description: |
      Закрытие, расчёт и ведение записей по нарядам на техническое обслуживание.
  BC-1030.60:
    name: Управление запасами запасных частей для ТО
    description: |
      Хранение и использование запасных частей MRO.
  BC-1030.60.10:
    name: Стратегия запасов MRO
    description: |
      Стратегия запасов и уровни хранения запасных частей MRO.
  BC-1030.60.20:
    name: Закупка запасных частей MRO
    description: |
      Закупка запасных частей и расходных материалов MRO.
  BC-1030.60.30:
    name: Операции склада MRO
    description: |
      Складские операции, включая выдачу и возврат запасных частей MRO.
  BC-1030.60.40:
    name: Управление критическими запасными частями
    description: |
      Выявление и управление критическими и страховыми запасными частями.
  BC-1030.70:
    name: Управление надёжностью оборудования
    description: |
      Инженерия надёжности, анализ отказов, MTBF/MTTR.
  BC-1030.70.10:
    name: Анализ надёжности оборудования
    description: |
      Анализ надёжности (FMEA, FTA, RBD) критически важных активов.
  BC-1030.70.20:
    name: Отслеживание MTBF и MTTR
    description: |
      Отслеживание среднего времени между отказами и среднего времени ремонта.
  BC-1030.70.30:
    name: Программы повышения надёжности
    description: |
      Программы повышения надёжности активов с высокой частотой отказов.

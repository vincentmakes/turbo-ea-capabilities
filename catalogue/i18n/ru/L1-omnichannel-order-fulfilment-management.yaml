# Омниканальное выполнение заказов (ru) — translations for L1-omnichannel-order-fulfilment-management.yaml
locale: ru
source: L1-omnichannel-order-fulfilment-management.yaml
entries:
  BC-2330:
    name: Управление омниканальным выполнением заказов
    description: |
      Межканальная оркестровка потребительских заказов — приём в любом канале,
      подтверждение исполнения из любого узла и доставка через магазин, распределительный
      центр, маркетплейс, прямую поставку от поставщика или партнёра последней мили.
  BC-2330.10:
    name: Управление маршрутизацией по каналам
    description: |
      Единое представление потребительских заказов по каналам, правила маршрутизации
      и согласованный статус через цифровые, магазинные и маркетплейс-каналы.
    in_scope:
      - Правила маршрутизации по каналам и выбор узла исполнения
      - Единый обзор заказов по каналам
      - Экономика канального микса и компромиссы стоимости исполнения
    out_of_scope:
      - Общее выполнение заказов (BC-520.40)
  BC-2330.10.10:
    name: Управление правилами маршрутизации по каналам
    description: |
      Определение правил маршрутизации для выбора узла исполнения по стоимости и уровню сервиса.
  BC-2330.10.20:
    name: Межканальный обзор заказов
    description: |
      Единое представление заказов, статусов и истории по каналам.
  BC-2330.10.30:
    name: Экономика канального микса
    description: |
      Анализ удельной экономики по каналам и маршрутам исполнения.
  BC-2330.20:
    name: Управление операциями самовывоза
    description: |
      Операции «купи онлайн — забери в магазине», у обочины и в постаматах,
      связывающие цифровые заказы с физическими точками выдачи.
  BC-2330.20.10:
    name: Сбор и упаковка заказов в магазине
    description: |
      Сбор и упаковка онлайн-заказов сотрудниками магазина.
  BC-2330.20.20:
    name: Передача заказа покупателю
    description: |
      Передача заказа покупателю с проверкой личности и обработкой исключений.
  BC-2330.20.30:
    name: Выдача заказов у обочины и через постаматы
    description: |
      Операции передачи заказов у обочины и через постаматы.
  BC-2330.30:
    name: Управление распределённым выполнением заказов
    description: |
      Отправка из магазина, тёмного склада и прямая поставка от поставщика
      из распределённого пула запасов покупателям.
    in_scope:
      - Операции отправки из магазина
      - Операции тёмных магазинов и мини-фулфилмент-центров
      - Оркестровка прямых поставок от поставщиков
  BC-2330.30.10:
    name: Операции отправки из магазина
    description: |
      Сбор, упаковка и отправка онлайн-заказов из физических магазинов.
  BC-2330.30.20:
    name: Операции тёмных магазинов и мини-фулфилмент-центров
    description: |
      Работа тёмных магазинов и мини-фулфилмент-центров для выполнения цифровых заказов.
  BC-2330.30.30:
    name: Оркестровка прямых поставок от поставщиков
    description: |
      Оркестровка прямых поставок от поставщиков, включая маршрутизацию заказов и отслеживание.
  BC-2330.40:
    name: Управление операциями продавца на маркетплейсе
    description: |
      Операции ритейлера-продавца на сторонних маркетплейсах и управление
      сторонними продавцами на собственном маркетплейсе.
  BC-2330.40.10:
    name: Управление листингами на маркетплейсе
    description: |
      Размещение товаров на сторонних маркетплейсах, включая адаптацию контента.
  BC-2330.40.20:
    name: Приём заказов с маркетплейса
    description: |
      Приём и трансформация заказов с маркетплейса в систему обработки заказов.
  BC-2330.40.30:
    name: Подключение сторонних продавцов
    description: |
      Подключение сторонних продавцов к собственному маркетплейсу ритейлера.
  BC-2330.40.40:
    name: Управление эффективностью сторонних продавцов
    description: |
      Управление качеством обслуживания и соблюдением политики сторонними продавцами.
  BC-2330.50:
    name: Управление временными слотами доставки
    description: |
      Бронирование потребительских слотов доставки, ценообразование временных окон
      и координация отправки курьеров для доставки на дом.
  BC-2330.50.10:
    name: Бронирование слота доставки
    description: |
      Бронирование потребителем слотов доставки с учётом доступности и вместимости.
  BC-2330.50.20:
    name: Ценообразование временных окон
    description: |
      Динамическое ценообразование временных окон доставки по спросу и плотности маршрутов.
  BC-2330.50.30:
    name: Координация отправки курьеров
    description: |
      Координация отправки с собственными и сторонними курьерами последней мили.

# Управление опасными грузами (ru) — translations for L1-dangerous-goods-management.yaml
locale: ru
source: L1-dangerous-goods-management.yaml
entries:
  BC-2490:
    name: Управление опасными грузами
    description: |
      Приём, документирование, обработка, обучение и реагирование на инциденты при
      перевозках опасных грузов по автомобильным, железнодорожным, морским и воздушным
      маршрутам согласно требованиям IMDG, IATA DGR, ADR и RID.
  BC-2490.10:
    name: Управление приёмом опасных грузов
    description: |
      Предварительная проверка отправок опасных грузов по модальным правилам
      и принятие решения о допуске.
    in_scope:
      - Проверка декларации грузоотправителя
      - Проверки совместимости, разделения и количества
    out_of_scope:
      - Таможенные ограничения на опасные вещества (BC-2480)
      - Грузовые претензии по повреждённым опасным грузам (BC-2530.40)
  BC-2490.10.10:
    name: Проверка декларации грузоотправителя
    description: |
      Проверка деклараций об опасных грузах от грузоотправителя и сопроводительной документации.
  BC-2490.10.20:
    name: Проверка совместимости и разделения
    description: |
      Проверки совместимости, разделения и количества согласно модальным правилам.
  BC-2490.10.30:
    name: Решение о допуске и подтверждение
    description: |
      Принятие решения о допуске, одобрение или отказ в приёме опасных грузов.
  BC-2490.20:
    name: Управление документацией по опасным грузам
    description: |
      Выдача и ведение деклараций об опасных грузах, NOTOC и мультимодальной документации.
  BC-2490.20.10:
    name: Выдача декларации об опасных грузах
    description: |
      Выдача деклараций опасных грузов по IMDG, DGR, ADR и RID.
  BC-2490.20.20:
    name: Подготовка NOTOC и манифеста
    description: |
      Подготовка уведомления командиру воздушного судна и манифеста опасных грузов.
  BC-2490.20.30:
    name: Сверка мультимодальной документации
    description: |
      Сверка документов по опасным грузам при смене вида транспорта.
  BC-2490.30:
    name: Управление обработкой и размещением опасных грузов
    description: |
      Соблюдение требований к физической обработке и размещению опасных грузов.
  BC-2490.30.10:
    name: Соблюдение норм разделения и размещения
    description: |
      Соблюдение норм разделения и размещения на борту, на палубе и на складе.
  BC-2490.30.20:
    name: Хранение в ограниченных зонах
    description: |
      Хранение опасных грузов в ограниченных, вентилируемых и ограждённых зонах.
  BC-2490.30.30:
    name: Применение специального оборудования для обработки
    description: |
      Применение специализированного оборудования для обработки опасных грузов и средств индивидуальной защиты.
  BC-2490.40:
    name: Управление обучением и компетентностью по опасным грузам
    description: |
      Первоначальное и повторное обучение, оценка компетентности и ведение записей
      для персонала, работающего с опасными грузами.
  BC-2490.40.10:
    name: Первоначальное обучение по опасным грузам
    description: |
      Первоначальное обучение по опасным грузам согласно требованиям модальных органов.
  BC-2490.40.20:
    name: Повторное обучение по опасным грузам
    description: |
      Регулярное и повторное обучение по опасным грузам.
  BC-2490.40.30:
    name: Ведение записей о компетентности
    description: |
      Ведение записей о компетентности в области опасных грузов и доказательств для аудитов.
  BC-2490.50:
    name: Управление инцидентами с опасными грузами
    description: |
      Выявление, реагирование, уведомление и отчётность по инцидентам
      и разливам опасных грузов.
  BC-2490.50.10:
    name: Выявление инцидентов с опасными грузами
    description: |
      Выявление инцидентов с опасными грузами при обработке и перевозке.
  BC-2490.50.20:
    name: Реагирование на разлив и выброс опасных грузов
    description: |
      Локализация разлива, реагирование на выброс и дезактивация.
  BC-2490.50.30:
    name: Уведомление органов власти и отчётность
    description: |
      Уведомление компетентных органов и отчётность по инцидентам с опасными грузами.
metadata:
  status: draft
  reviewer: pending

# Продажи рекламы и рекламные операции (ru) — translations for L1-advertising-sales-operations-management.yaml
locale: ru
source: L1-advertising-sales-operations-management.yaml
entries:
  BC-3760:
    name: Продажи рекламы и рекламные операции
    description: |
      Инвентаризация, прямые и программатик-продажи, размещение рекламы
      и принятие решений, контроль бренд-безопасности и качества инвентаря,
      а также отчётность по доходам для рекламного бизнеса на линейных,
      цифровых и CTV-поверхностях.
  BC-3760.10:
    name: Управление рекламным инвентарём
    description: |
      Прогнозирование, распределение и резервирование рекламного
      инвентаря на линейных и цифровых поверхностях.
  BC-3760.10.10:
    name: Прогнозирование доступных мест
    description: |
      Прогнозирование доступных показов, GRP и аудиторных
      позиций по горизонту инвентаря.
  BC-3760.10.20:
    name: Распределение инвентаря
    description: |
      Распределение инвентаря между прямыми, программатик
      и внутренними пулами по поверхностям.
  BC-3760.10.30:
    name: Резервирование и удержание инвентаря
    description: |
      Резервирование и удержание инвентаря для обязательных сделок,
      спонсорства и ключевых событий.
  BC-3760.20:
    name: Управление прямыми рекламными продажами
    description: |
      Прямая продажа рекламного инвентаря через спонсорство,
      аптфронт и заказы на размещение.
  BC-3760.20.10:
    name: Продажи спонсорства
    description: |
      Конвейер и заключение сделок по спонсорству
      и интеграциям.
  BC-3760.20.20:
    name: Аптфронт и скаттер продажи
    description: |
      Продажи линейного и цифрового инвентаря
      на аптфронт и скаттер рынке.
  BC-3760.20.30:
    name: Заказы на размещение и линейные спот-продажи
    description: |
      Приём заказов на размещение и линейное бронирование спотов
      по плану доступных мест.
  BC-3760.30:
    name: Управление программатик-продажами
    description: |
      Настройка и эксплуатация программатик-аукционов, частных
      торговых площадок и интеграций цепочки поставок.
  BC-3760.30.10:
    name: Настройка аукционов
    description: |
      Настройка аукционных полов, deal ID и права
      на участие участников по инвентарю.
  BC-3760.30.20:
    name: Управление сделками частного рынка
    description: |
      Разработка и жизненный цикл программатик-гарантированных
      и частных рыночных сделок с покупателями.
  BC-3760.30.30:
    name: Интеграция header bidding и SSP
    description: |
      Интеграция партнёров по header bidding и SSP
      по поверхностям.
  BC-3760.40:
    name: Размещение рекламы и операции
    description: |
      Приём и контроль качества креативов, принятие решений
      и вставка рекламы, планирование спотов по линейным и цифровым блокам.
  BC-3760.40.10:
    name: Приём и QC креативов
    description: |
      Приём и контроль качества рекламных креативов
      по техническим и политическим требованиям.
  BC-3760.40.20:
    name: Принятие решений и вставка рекламы
    description: |
      Принятие решений о том, какую рекламу показывать, и вставка
      в линейные блоки, на сервере или на клиенте.
  BC-3760.40.30:
    name: Планирование спотов
    description: |
      Составление графика позиционирования линейных спотов
      и оптимизация структуры блоков.
  BC-3760.50:
    name: Бренд-безопасность и качество инвентаря
    description: |
      Классификация инвентаря по бренд-безопасности, обнаружение
      недействительного трафика и тегирование пригодности для таргетинга.
  BC-3760.50.10:
    name: Классификация бренд-безопасности
    description: |
      Классификация контентных поверхностей по системам бренд-безопасности
      и пригодности.
  BC-3760.50.20:
    name: Обнаружение недействительного трафика
    description: |
      Обнаружение и исключение недействительного трафика
      в собственном и партнёрском инвентаре.
  BC-3760.50.30:
    name: Тегирование пригодности
    description: |
      Тегирование контентных поверхностей атрибутами пригодности
      и контекстуальными атрибутами для таргетинга.
  BC-3760.60:
    name: Отчётность по рекламным доходам
    description: |
      Отчётность о доставке кампаний, сверка компенсаций и
      выставление счетов и расчёты с рекламодателями.
  BC-3760.60.10:
    name: Отчётность о доставке кампании
    description: |
      Отчётность о доставке и темпе кампании по целям
      на поверхностях и по метрикам.
  BC-3760.60.20:
    name: Компенсации и сверка
    description: |
      Сверка доставленных показов с заказанными,
      с обработкой компенсаций и кредит-ноут.
  BC-3760.60.30:
    name: Выставление счетов и расчёты с рекламодателями
    description: |
      Выставление счетов рекламодателям и агентствам,
      расчёты по агентским скидкам и комиссиям.

# Торговля энергией и расчёты (ru) — translations for L1-energy-trading-settlement-management.yaml
locale: ru
source: L1-energy-trading-settlement-management.yaml
entries:
  BC-3850:
    name: Торговля энергией и расчёты
    description: |
      Оптовая торговля электроэнергией, газом и экологическими
      товарами — участие в суточном, внутрисуточном и балансирующем
      рынках, управление энергетическими рисками, планирование
      и номинации, участие в рынках мощности и бэк-офисные расчёты
      под режимами REMIT/EMIR/Додд-Фрэнка.
  BC-3850.10:
    name: Оптовая торговля электроэнергией
    description: |
      Торговля физической и финансовой электроэнергией во фронт-офисе
      на суточных, внутрисуточных и форвардных рынках.
  BC-3850.10.10:
    name: Торговля на суточном рынке
    description: |
      Подача и управление заявками
      на суточном рынке.
  BC-3850.10.20:
    name: Торговля на внутрисуточном рынке
    description: |
      Непрерывная и аукционная внутрисуточная торговля
      при изменении позиций.
  BC-3850.10.30:
    name: Форвардная и двусторонняя торговля
    description: |
      Форвардная физическая и двусторонняя внебиржевая торговля
      для хеджирования и оригинации.
  BC-3850.10.40:
    name: Торговля трансграничной пропускной способностью
    description: |
      Торговля продуктами трансграничной пропускной способности
      межсистемных связей.
  BC-3850.20:
    name: Управление энергетическими рисками
    description: |
      Надзор за рыночными, кредитными и операционными рисками
      торгового портфеля с администрированием лимитов и стресс-тестированием.
    in_scope:
      - Расчёт VaR и рисковой стоимости прибыли
      - Управление кредитными лимитами контрагентов
      - Тестирование эффективности хеджирования
    out_of_scope:
      - Корпоративное управление рисками (BC-120)
      - Кредитный риск по розничным потребителям (BC-3910)
  BC-3850.20.10:
    name: Надзор за рыночным риском
    description: |
      Надзор за VaR, рисковой стоимостью прибыли
      и подверженностью торговой книги.
  BC-3850.20.20:
    name: Управление кредитным риском контрагентов
    description: |
      Кредитные лимиты контрагентов, залоговое обеспечение
      и мониторинг подверженности.
  BC-3850.20.30:
    name: Управление программой хеджирования
    description: |
      Разработка и выполнение программ хеджирования
      против топливной и ценовой подверженности.
  BC-3850.30:
    name: Управление позициями и планирование
    description: |
      Агрегирование торговых и физических позиций и подача
      графиков и номинаций системным и трубопроводным операторам.
  BC-3850.30.10:
    name: Агрегирование торговых позиций
    description: |
      Агрегирование позиций по продуктам, книгам
      и контрагентам.
  BC-3850.30.20:
    name: Подача графиков электроэнергии
    description: |
      Подача физических графиков электроэнергии
      ТСО и балансопоставщикам.
  BC-3850.30.30:
    name: Подача газовых номинаций
    description: |
      Подача газовых номинаций и перебалансировки
      по магистральным газопроводам.
  BC-3850.40:
    name: Участие в рынке мощности
    description: |
      Участие в механизмах рынка мощности и обеспечения
      надёжности, включая стратегию аукциона, квалификацию
      и мониторинг поставки.
  BC-3850.40.10:
    name: Стратегия аукциона мощности
    description: |
      Стратегия и подготовка заявок
      на аукционах рынка мощности.
  BC-3850.40.20:
    name: Квалификация поставщика мощности
    description: |
      Квалификация активов и управление коэффициентами дератинга
      для продуктов мощности.
  BC-3850.40.30:
    name: Мониторинг поставки мощности
    description: |
      Мониторинг поставки мощности в стрессовых событиях
      и подверженности штрафным санкциям.
  BC-3850.50:
    name: Торговля экологическими товарами
    description: |
      Торговля и сдача углеродных квот, возобновляемых сертификатов,
      гарантий происхождения и белых сертификатов.
  BC-3850.50.10:
    name: Торговля углеродными квотами
    description: |
      Торговля EUA, CCA и другими регуляторными
      углеродными квотами.
  BC-3850.50.20:
    name: Торговля сертификатами ВИЭ
    description: |
      Торговля RECs, ROCs и гарантиями происхождения.
  BC-3850.50.30:
    name: Операции с белыми сертификатами
    description: |
      Торговля и сдача белых сертификатов
      энергоэффективности.
  BC-3850.60:
    name: Операции по расчётам сделок
    description: |
      Подтверждение, расчёт, выставление счетов и управление
      денежными средствами бэк-офиса по оптовым энергетическим сделкам.
  BC-3850.60.10:
    name: Подтверждение сделок
    description: |
      Исходящие и входящие подтверждения сделок
      и разрешение расхождений.
  BC-3850.60.20:
    name: Расчёт платежей
    description: |
      Расчёт физических и финансовых сумм расчётов
      по договору.
  BC-3850.60.30:
    name: Выставление счетов и управление денежными средствами
    description: |
      Выставление счетов, платежи и сверка
      по денежным потокам оптовых сделок.
  BC-3850.70:
    name: Регуляторная отчётность по сделкам
    description: |
      Регуляторная отчётность по оптовым энергетическим операциям
      под режимами REMIT, EMIR, MiFID II и Додд-Фрэнка.
  BC-3850.70.10:
    name: Транзакционная отчётность REMIT
    description: |
      Отчётность таблиц 1 и 2 по оптовым энергетическим
      операциям в ACER.
  BC-3850.70.20:
    name: Отчётность EMIR и Додд-Фрэнка
    description: |
      Отчётность по деривативным сделкам в репозитории
      под EMIR и Додд-Фрэнком.
  BC-3850.70.30:
    name: Раскрытие инсайдерской информации
    description: |
      Раскрытие инсайдерской информации
      согласно статье 4 REMIT.

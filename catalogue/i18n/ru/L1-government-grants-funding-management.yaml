# Государственные субсидии и финансирование (ru) — translations for L1-government-grants-funding-management.yaml
locale: ru
source: L1-government-grants-funding-management.yaml
entries:
  BC-3260:
    name: Государственные субсидии и финансирование
    description: |
      Присуждение и администрирование конкурсных и формульных грантов и государственного финансирования организациям, сообществам и физическим лицам, включая объявление конкурса, рассмотрение заявлений, присуждение, мониторинг и завершение проекта.
  BC-3260.10:
    name: Проектирование грантовых программ
    description: |
      Разработка грантовых программ, включая цели, критерии права, формулы финансирования и критерии оценки.
  BC-3260.10.10:
    name: Определение целей программы
    description: |
      Определение целей грантовой программы, ожидаемых результатов и теории изменений.
  BC-3260.10.20:
    name: Моделирование распределения финансирования
    description: |
      Моделирование распределения финансирования, включая формульный, конкурсный и долевой дизайн.
  BC-3260.10.30:
    name: Установление критериев оценки
    description: |
      Установление критериев независимой экспертизы и оценки для отбора грантов.
  BC-3260.20:
    name: Управление объявлениями конкурса
    description: |
      Публикация возможностей финансирования, уведомлений о наличии финансирования и документации конкурса.
  BC-3260.20.10:
    name: Публикация грантовых конкурсов
    description: |
      Публикация объявлений о грантах, уведомлений о доступном финансировании и документации конкурса.
  BC-3260.20.20:
    name: Информирование и поддержка заявителей
    description: |
      Информационные мероприятия, сессии и поддержка заявителей по грантовым программам.
  BC-3260.20.30:
    name: Обработка вопросов до присуждения
    description: |
      Обработка вопросов и разъяснений от потенциальных заявителей до присуждения.
  BC-3260.30:
    name: Приём и рассмотрение заявлений
    description: |
      Приём, проверка и независимая экспертиза грантовых заявлений, включая экспертную панель и оценку.
  BC-3260.30.10:
    name: Подача заявлений
    description: |
      Подача и приём грантовых заявлений и подтверждающей документации.
  BC-3260.30.20:
    name: Проверка права на участие
    description: |
      Проверка заявлений на соответствие критериям права и пороговым требованиям.
  BC-3260.30.30:
    name: Независимая экспертиза и оценка
    description: |
      Экспертная панель, оценка и ранжирование заявлений по опубликованным критериям.
  BC-3260.30.40:
    name: Управление экспертами и конфликтами интересов
    description: |
      Привлечение экспертов и управление конфликтами интересов.
  BC-3260.40:
    name: Присуждение и решение о финансировании
    description: |
      Решения о присуждении, выдача грантовых соглашений и обязательство финансирования перед получателями.
  BC-3260.40.10:
    name: Отбор лауреатов
    description: |
      Окончательный отбор поддержанных заявлений и размеров финансирования.
  BC-3260.40.20:
    name: Выдача грантового соглашения
    description: |
      Составление и заключение грантовых соглашений и условий предоставления.
  BC-3260.40.30:
    name: Обязательство и настройка выплат
    description: |
      Принятие обязательства по финансированию и настройка графиков выплат.
  BC-3260.50:
    name: Мониторинг получателей и отчётность
    description: |
      Мониторинг показателей получателей грантов, финансовой отчётности и соблюдения условий гранта.
  BC-3260.50.10:
    name: Проверка отчётов о показателях
    description: |
      Проверка отчётов получателей о результатах и прогрессе по контрольным точкам.
  BC-3260.50.20:
    name: Проверка финансовых отчётов
    description: |
      Проверка финансовых отчётов получателей и запросов на выплату.
  BC-3260.50.30:
    name: Мониторинг на местах и верификация
    description: |
      Выездные визиты и верификация деятельности получателей и результатов.
  BC-3260.50.40:
    name: Надзор за субполучателями
    description: |
      Надзор за соглашениями о передаче средств и субполучателями.
  BC-3260.60:
    name: Завершение гранта и урегулирование аудита
    description: |
      Финальная отчётность, завершение проекта, урегулирование аудита и взыскание неправомерно использованных средств.
  BC-3260.60.10:
    name: Приём финального отчёта и результатов
    description: |
      Приём финальных отчётов и результатов по завершении программы.
  BC-3260.60.20:
    name: Урегулирование единого аудита и комплаенс-аудита
    description: |
      Урегулирование выводов единого аудита и комплаенс-аудита в отношении получателей грантов.
  BC-3260.60.30:
    name: Взыскание неправомерно использованных средств
    description: |
      Взыскание неправомерно использованных расходов и незавершённых остатков при закрытии проекта.

# Складские операции (ru) — translations for L1-warehousing-operations-management.yaml
locale: ru
source: L1-warehousing-operations-management.yaml
entries:
  BC-2460:
    name: Управление складскими операциями
    description: |
      Эксплуатация сторонних складов и распределительных центров, включая
      входящие операции, хранение, исходящие операции, услуги с добавленной
      стоимостью и обратную логистику.
  BC-2460.10:
    name: Управление входящими операциями
    description: |
      Приёмка, проверка и размещение товаров, поступающих на склад.
    in_scope:
      - Обработка уведомлений о предстоящей отгрузке (ASN)
      - Входной контроль и размещение товаров
    out_of_scope:
      - Исходящая отправка (BC-2460.30)
      - Управление запасами на стороне грузоотправителя (BC-530)
  BC-2460.10.10:
    name: Планирование предварительной приёмки
    description: |
      Обработка ASN, планирование погрузочно-разгрузочных ворот и планирование ресурсов для приёмки.
  BC-2460.10.20:
    name: Приёмка и входной контроль товаров
    description: |
      Физическая приёмка и проверка входящих товаров.
  BC-2460.10.30:
    name: Размещение и распределение по местам хранения
    description: |
      Размещение принятых товаров и распределение по местам хранения.
  BC-2460.20:
    name: Управление хранением и складскими запасами
    description: |
      Операции хранения на складе, включая слоттинг, выборочные инвентаризации
      и хранение в особых условиях.
  BC-2460.20.10:
    name: Слоттинг и управление местами хранения
    description: |
      Решения по слоттингу и ведению мест хранения.
  BC-2460.20.20:
    name: Выборочные инвентаризации и сверка
    description: |
      Выборочные инвентаризации, сверка запасов и корректировка.
  BC-2460.20.30:
    name: Отслеживание партий, серийных номеров и серий
    description: |
      Отслеживание атрибутов партий, серийных номеров и серий хранимых товаров.
  BC-2460.20.40:
    name: Хранение в холодовой цепи и особых условиях
    description: |
      Эксплуатация температурно-контролируемых, опасных и таможенных складов.
  BC-2460.30:
    name: Управление исходящими операциями
    description: |
      Отбор, упаковка, маркировка и отправка исходящих отправлений.
  BC-2460.30.10:
    name: Операции отбора заказов
    description: |
      Отбор заказов с применением пакетной, волновой и зональной стратегий.
  BC-2460.30.20:
    name: Упаковка и маркировка
    description: |
      Упаковка, маркировка и подготовка отгрузочных документов.
  BC-2460.30.30:
    name: Отправка и погрузка
    description: |
      Погрузка исходящих транспортных средств и подтверждение отправки.
  BC-2460.40:
    name: Управление услугами с добавленной стоимостью
    description: |
      Услуги с добавленной стоимостью непосредственно на складе: комплектование,
      совместная упаковка, маркировка и конфигурирование.
  BC-2460.40.10:
    name: Услуги комплектования и сборки
    description: |
      Комплектование, подсборка и формирование комплектов на складе.
  BC-2460.40.20:
    name: Совместная упаковка и перемаркировка
    description: |
      Услуги совместной упаковки, переупаковки и перемаркировки.
  BC-2460.40.30:
    name: Отложенная конфигурация продукта
    description: |
      Позднее конфигурирование и отложенная сборка продуктов.
  BC-2460.50:
    name: Управление возвратными и обратными операциями
    description: |
      Приёмка, сортировка и утилизация возвращённых товаров и потоков обратной логистики.
  BC-2460.50.10:
    name: Приёмка и сортировка возвратов
    description: |
      Приёмка и сортировка возвращённых товаров.
  BC-2460.50.20:
    name: Восстановление и утилизация
    description: |
      Восстановление, переупаковка и решения по утилизации.
  BC-2460.50.30:
    name: Утилизация при обратной логистике
    description: |
      Утилизация, переработка и уничтожение невосстанавливаемых возвратов.
  BC-2460.60:
    name: Управление ресурсами склада
    description: |
      Управление трудовыми ресурсами, оборудованием для погрузочно-разгрузочных работ
      и ёмкостью ворот и слотов на складе.
  BC-2460.60.10:
    name: Планирование трудовых ресурсов и производительность
    description: |
      Планирование смен, распределение задач и отслеживание производительности.
  BC-2460.60.20:
    name: Эксплуатация погрузочно-разгрузочного оборудования
    description: |
      Эксплуатация, распределение и обслуживание погрузчиков, конвейеров и AGV.
  BC-2460.60.30:
    name: Планирование докового и слотового расписания
    description: |
      Планирование входящих и исходящих слотов на погрузочно-разгрузочных воротах.
  BC-2460.70:
    name: Управление эффективностью склада
    description: |
      Измерение KPI по уровню сервиса, точности и производительности склада.
  BC-2460.70.10:
    name: Отслеживание KPI цикла заказа
    description: |
      Отслеживание KPI по циклу заказа, уровню комплектации и точности.
  BC-2460.70.20:
    name: Отчётность по точности инвентаризации
    description: |
      Отчётность по точности инвентаризации и потерям.
  BC-2460.70.30:
    name: Отчётность по производительности
    description: |
      Отчётность по пропускной способности, единицам в час и бенчмаркам производительности.

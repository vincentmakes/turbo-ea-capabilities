# Выездное обслуживание (ru) — translations for L1-field-service-management.yaml
locale: ru
source: L1-field-service-management.yaml
entries:
  BC-1050:
    name: Выездное обслуживание
    description: |
      Сервисное обслуживание установленного парка оборудования, выездные техники, ремонт и ввод в эксплуатацию на объектах клиентов.
  BC-1050.10:
    name: Управление сервисными заявками
    description: |
      Приём, сортировка и квалификация сервисных заявок.
  BC-1050.10.10:
    name: Приём сервисных заявок
    description: |
      Многоканальный приём сервисных заявок от клиентов.
  BC-1050.10.20:
    name: Сортировка сервисных заявок
    description: |
      Сортировка, классификация и маршрутизация сервисных заявок.
  BC-1050.10.30:
    name: Удалённая диагностика и устранение неисправностей
    description: |
      Удалённая диагностика и решение проблем с первого обращения.
  BC-1050.20:
    name: Управление диспетчеризацией сервиса
    description: |
      Планирование, маршрутизация и диспетчеризация техников.
  BC-1050.20.10:
    name: Планирование работы техников
    description: |
      Планирование расстановки техников по квалификации и доступности.
  BC-1050.20.20:
    name: Оптимизация маршрутов
    description: |
      Оптимизация маршрутов и перемещений при сервисных визитах.
  BC-1050.20.30:
    name: Исполнение диспетчеризации
    description: |
      Диспетчеризация и перераспределение сервисных заданий в режиме реального времени.
  BC-1050.30:
    name: Управление исполнением сервиса
    description: |
      Выполнение сервиса на объекте, документирование.
  BC-1050.30.10:
    name: Оказание услуг на объекте
    description: |
      Выполнение сервисных задач по наряду на объекте клиента.
  BC-1050.30.20:
    name: Захват сервисной документации
    description: |
      Фиксация заметок, фотографий и подписей по сервису.
  BC-1050.30.30:
    name: Управление приёмкой клиентом
    description: |
      Подписание акта приёма и подтверждение завершённого сервиса клиентом.
  BC-1050.40:
    name: Управление сервисными запасными частями
    description: |
      Запасные части в полевых условиях, запасы на выездном транспорте, пополнение.
  BC-1050.40.10:
    name: Управление запасами на выездном транспорте
    description: |
      Определение и управление запасами на выездных автомобилях и форпостах.
  BC-1050.40.20:
    name: Пополнение сервисных запасных частей
    description: |
      Пополнение форпостных складов и запасов техников.
  BC-1050.40.30:
    name: Возврат сервисных запасных частей
    description: |
      Возврат неиспользованных, дефектных или подлежащих ремонту деталей из поля.
  BC-1050.50:
    name: Управление сервисными контрактами
    description: |
      Сервисные соглашения, SLA и права на обслуживание.
  BC-1050.50.10:
    name: Разработка сервисных соглашений
    description: |
      Разработка сервисных контрактов, уровней обслуживания и условий.
  BC-1050.50.20:
    name: Управление правами на обслуживание
    description: |
      Проверка прав на обслуживание при подаче заявки и диспетчеризации.
  BC-1050.50.30:
    name: Продление сервисных контрактов
    description: |
      Продление и индексация сервисных контрактов.
  BC-1050.50.40:
    name: Выставление счётов за сервис
    description: |
      Выставление счётов за сервисные контракты и работы по факту затрат.
  BC-1050.60:
    name: Управление эффективностью выездного обслуживания
    description: |
      Устранение неисправности с первого выезда, время реакции, NPS, производительность техников.
  BC-1050.60.10:
    name: Отслеживание устранения с первого выезда
    description: |
      Измерение и улучшение показателя устранения неисправности с первого выезда.
  BC-1050.60.20:
    name: Отслеживание времени реакции и устранения
    description: |
      Отслеживание времени реакции и устранения неисправностей по SLA.
  BC-1050.60.30:
    name: Отчётность о производительности техников
    description: |
      Отчётность об использовании, «полезном времени» и производительности техников.
  BC-1050.60.40:
    name: NPS и удовлетворённость сервисом
    description: |
      Измерение NPS и удовлетворённости клиентов сервисом.
metadata:

# Управление операциями плавки и рафинирования (ru) — translations for L1-smelting-refining-operations-management.yaml
locale: ru
source: L1-smelting-refining-operations-management.yaml
entries:
  BC-4450:
    name: Управление операциями плавки и рафинирования
    description: |
      Пирометаллургическое и электрохимическое рафинирование концентратов
      и промежуточных продуктов в металл, пригодный для поставки на LME или
      соответствующий техническим условиям, включая извлечение попутных
      металлов, переработку отходящих газов и металлургический учёт.

  BC-4450.10:
    name: Приём и усреднение концентрата
    description: |
      Отбор проб при приёмке, усреднение шихты и управление запасами
      концентратов, поступающих на металлургический комплекс.
    in_scope:
      - Отбор проб и анализ при приёмке
      - Усреднение шихты плавки
      - Управление запасами на складе концентрата
    out_of_scope:
      - Коммерческий расчёт за концентрат (BC-4480.40)

  BC-4450.10.10:
    name: Опробование концентрата при приёмке
    description: |
      Отбор проб и анализ концентратов, поступающих от сторонних рудников
      и собственных предприятий.

  BC-4450.10.20:
    name: Усреднение шихты плавки
    description: |
      Усреднение концентратов для достижения целевых показателей содержания
      и примесей в шихте плавки.

  BC-4450.10.30:
    name: Управление запасами концентрата
    description: |
      Управление запасами концентрата на открытых и закрытых складах
      и в силосах.

  BC-4450.20:
    name: Пирометаллургические операции
    description: |
      Обжиг, плавка, конвертирование и обращение со шлаком при переработке
      сульфидных и оксидных концентратов.

  BC-4450.20.10:
    name: Операции обжига
    description: |
      Эксплуатация печей кипящего слоя и многоподовых печей для окисления
      сульфидов.

  BC-4450.20.20:
    name: Операции плавильных печей
    description: |
      Эксплуатация взвешенной плавки, электродуговых и барботажных
      плавильных печей.

  BC-4450.20.30:
    name: Операции конвертеров
    description: |
      Эксплуатация конвертеров Пирса–Смита, поворотных и непрерывных
      конвертеров.

  BC-4450.20.40:
    name: Обращение со шлаком
    description: |
      Выпуск, грануляция, обеднение и утилизация шлака печей и конвертеров.

  BC-4450.30:
    name: Операции электролитического рафинирования
    description: |
      Операции электролиза и электрорафинирования в электролизных цехах
      с получением катодного металла.

  BC-4450.30.10:
    name: Операции электролиза
    description: |
      Эксплуатация электролизных ванн для получения катода из выщелоченного
      электролита.

  BC-4450.30.20:
    name: Операции электрорафинирования
    description: |
      Эксплуатация электролизных ванн для получения высокочистого катода
      из анодов.

  BC-4450.30.30:
    name: Съём и обращение с катодом
    description: |
      Съём, промывка, взвешивание и упаковка катода для продажи или
      последующего литья.

  BC-4450.40:
    name: Извлечение попутных металлов
    description: |
      Извлечение драгоценных и второстепенных металлов из анодных шламов,
      пылей и попутных потоков.

  BC-4450.40.10:
    name: Переработка анодных шламов
    description: |
      Переработка анодных шламов электрорафинирования для извлечения
      драгоценных металлов.

  BC-4450.40.20:
    name: Рафинирование драгоценных металлов
    description: |
      Рафинирование золота, серебра и металлов платиновой группы до слитков
      или порошка-губки.

  BC-4450.40.30:
    name: Извлечение попутных продуктов
    description: |
      Извлечение селена, теллура, серной кислоты и других попутных продуктов.

  BC-4450.50:
    name: Разливочное отделение и доводка продукции
    description: |
      Литьё, маркировка и контроль качества готовой металлопродукции
      в соответствии с коммерческими техническими условиями.

  BC-4450.50.10:
    name: Операции литья
    description: |
      Литьё слитков, чушек, заготовок, плит и профилей из жидкого металла.

  BC-4450.50.20:
    name: Маркировка и брендирование продукции
    description: |
      Нанесение маркировки, штамповки и фирменного знака на литую продукцию
      для обеспечения прослеживаемости и допуска на биржу.

  BC-4450.50.30:
    name: Контроль качества готовой металлопродукции
    description: |
      Инспекция и сертификация готового металла на соответствие техническим
      условиям и требованиям регистрации на бирже.

  BC-4450.60:
    name: Операции цеха отходящих газов и сернокислотного завода
    description: |
      Очистка отходящих газов плавки, работа сернокислотного завода и
      мониторинг выбросов через трубу.

  BC-4450.60.10:
    name: Очистка отходящих газов
    description: |
      Эксплуатация электрофильтров, скрубберов и охладителей для очистки
      отходящих газов плавки.

  BC-4450.60.20:
    name: Операции сернокислотного завода
    description: |
      Эксплуатация сернокислотных заводов по методу двойного контактирования
      и двойной абсорбции на отходящих газах плавки.

  BC-4450.60.30:
    name: Мониторинг выбросов через трубу
    description: |
      Непрерывный контроль выбросов диоксида серы, пыли и металлов
      через дымовую трубу.

  BC-4450.70:
    name: Металлургический учёт плавильного завода
    description: |
      Металлургический баланс, расчётные анализы и толлинговый учёт по
      всему металлургическому комплексу.

  BC-4450.70.10:
    name: Металлургический баланс и расчётные анализы
    description: |
      Периодическая балансовая сверка металла и расчётные анализы для
      отгружаемой продукции.

  BC-4450.70.20:
    name: Отчётность по извлечению и потерям
    description: |
      Отчётность по металлургическому извлечению и потерям по всем
      переделам завода и рафинировочного производства.

  BC-4450.70.30:
    name: Толлинговый учёт
    description: |
      Учёт давальческой переработки концентратов третьих сторон и
      металла, принадлежащего клиентам.


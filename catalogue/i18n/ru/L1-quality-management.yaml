# Управление качеством (ru) — translations for L1-quality-management.yaml
locale: ru
source: L1-quality-management.yaml
entries:
  BC-720:
    name: Управление качеством
    description: |
      Стратегия качества, обеспечение и контроль качества всех результатов деятельности предприятия.
  BC-720.10:
    name: Управление стратегией и политикой качества
    description: |
      Политика качества, стандарты, фреймворк.
  BC-720.10.10:
    name: Управление политикой и руководством по качеству
    description: |
      Руководство по качеству и политики, согласованные с ISO 9001 и отраслевыми стандартами.
  BC-720.10.20:
    name: Установка целей в области качества
    description: |
      Определение целей, KPI и целевых показателей качества.
  BC-720.10.30:
    name: Управление системой менеджмента качества
    description: |
      Управление областью применения, структурой и ответственностью СМК.
  BC-720.10.40:
    name: Управление рисками качества
    description: |
      Выявление, оценка и обработка рисков качества.
  BC-720.20:
    name: Управление обеспечением качества
    description: |
      Системы качества, аудиты, сертификация (ISO 9001 и др.).
  BC-720.20.10:
    name: Внутренние аудиты качества
    description: |
      Планирование и проведение внутренних аудитов качества.
  BC-720.20.20:
    name: Управление внешней сертификацией
    description: |
      Управление сертификацией по ISO 9001 и другим стандартам и надзорными аудитами.
  BC-720.20.30:
    name: Валидация и квалификация процессов
    description: |
      Валидация и квалификация процессов и оборудования.
  BC-720.20.40:
    name: Управление документацией и записями
    description: |
      Контролируемые документы, записи и архив качества.
  BC-720.30:
    name: Управление контролем качества
    description: |
      Инспекции, испытания, критерии приёмки.
  BC-720.30.10:
    name: Планирование инспекций
    description: |
      Планы инспекций, выборка и критерии приёмки.
  BC-720.30.20:
    name: Контроль качества в процессе производства
    description: |
      Контроль в процессе производства, измерения и статистическое управление процессами.
  BC-720.30.30:
    name: Финальная инспекция и выпуск
    description: |
      Финальная инспекция, выпуск партии и оформление сертификатов.
  BC-720.30.40:
    name: Управление калибровкой
    description: |
      Калибровка измерительного и испытательного оборудования.
  BC-720.40:
    name: Управление несоответствиями
    description: |
      Акты несоответствия, отклонения, CAPA.
  BC-720.40.10:
    name: Регистрация несоответствий
    description: |
      Регистрация и классификация несоответствий и отклонений.
  BC-720.40.20:
    name: Распределение и сдерживание
    description: |
      Распределение несоответствующей продукции и меры по сдерживанию.
  BC-720.40.30:
    name: Корректирующие и предупреждающие действия
    description: |
      Процесс CAPA, включая анализ первопричин и проверку результативности.
  BC-720.40.40:
    name: Управление изменениями
    description: |
      Управление изменениями, влияющими на качество.
  BC-720.50:
    name: Управление непрерывным совершенствованием
    description: |
      Бережливое производство, шесть сигм, кайдзен, программы улучшений.
  BC-720.50.10:
    name: Управление идеями по улучшению
    description: |
      Сбор, оценка и приоритизация идей по улучшению.
  BC-720.50.20:
    name: Реализация проектов Lean и Six Sigma
    description: |
      Методология и реализация проектов бережливого производства и шести сигм.
  BC-720.50.30:
    name: Коучинг по непрерывному совершенствованию
    description: |
      Коучинг и развитие компетенций в области методов непрерывного совершенствования.
  BC-720.50.40:
    name: Отслеживание реализации выгод
    description: |
      Отслеживание и верификация выгод проектов непрерывного совершенствования.
  BC-720.60:
    name: Управление качеством для клиентов
    description: |
      Жалобы клиентов на качество, возвраты, полевое качество.
  BC-720.60.10:
    name: Работа с жалобами клиентов по качеству
    description: |
      Приём, расследование и ответ на жалобы клиентов по качеству.
  BC-720.60.20:
    name: Анализ отказов в эксплуатации
    description: |
      Анализ отказов в эксплуатации и гарантийных возвратов.
  BC-720.60.30:
    name: Отзыв продукции и уведомление клиентов
    description: |
      Координация отзыва продукции и уведомление клиентов.
  BC-720.60.40:
    name: Отчётность о качестве для клиентов
    description: |
      Отчёты по качеству и карты показателей для клиентов.

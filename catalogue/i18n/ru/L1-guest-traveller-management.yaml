# Гость / Путешественник (ru) — translations for L1-guest-traveller-management.yaml
locale: ru
source: L1-guest-traveller-management.yaml
entries:
  BC-4040:
    name: Управление профилем гостя и путешественника
    description: |
      Управление единым профилем гостя и путешественника на уровне предприятия — идентификация, предпочтения, согласие, программы признания, сегментация и данные о проездных документах/соответствии требованиям.
    in_scope:
      - Единый профиль и идентификация гостя и путешественника
      - Предпочтения, диетические требования и потребности в доступности
      - Согласие, маркетинговые разрешения и права субъектов данных
      - Сигналы программ признания и предоставление статуса уровня
      - Сегментация гостей и аналитика пожизненной ценности
      - Проездные документы, APIS и данные скрининга по стоп-листам
    out_of_scope:
      - Движки начисления и списания баллов лояльности (BC-4050)
      - Выполнение регистрации на стойке (BC-4060.10)
      - Общеотраслевые CRM-операции (BC-400)
  BC-4040.10:
    name: Управление профилем и идентификацией гостя
    description: |
      Создание, дедупликация и верификация идентификационных данных единого профиля гостя в системах бронирования и операций.
  BC-4040.10.10:
    name: Создание профиля гостя
    description: |
      Создание профилей гостей из любого канала или точки контакта.
  BC-4040.10.20:
    name: Дедупликация профилей гостей
    description: |
      Дедупликация профилей гостей с помощью детерминированного и вероятностного сопоставления.
  BC-4040.10.30:
    name: Верификация личности гостя
    description: |
      Верификация личности гостя при высокоценных или регулируемых взаимодействиях.
  BC-4040.10.40:
    name: Объединение профилей и управление приоритетами
    description: |
      Объединение дублирующихся профилей и разрешение конфликтов атрибутов.
  BC-4040.20:
    name: Управление предпочтениями и персонализацией
    description: |
      Сбор и управление предпочтениями гостей по размещению, питанию, доступности и правилами персонализации.
  BC-4040.20.10:
    name: Сбор предпочтений по размещению
    description: |
      Сбор предпочтений по типу кровати, этажу и времени заезда.
  BC-4040.20.20:
    name: Управление диетическими и аллергенными предпочтениями
    description: |
      Управление диетическими, религиозными и аллергенными предпочтениями для питания и бортового обслуживания.
  BC-4040.20.30:
    name: Управление требованиями по доступности
    description: |
      Управление требованиями по доступности и потребностями в специальной помощи на всех точках контакта.
  BC-4040.20.40:
    name: Определение правил персонализации
    description: |
      Определение правил персонализации, применяющих предпочтения к взаимодействиям в сфере обслуживания и мерчандайзинга.
  BC-4040.30:
    name: Управление согласием и конфиденциальностью гостя
    description: |
      Управление согласием гостей, маркетинговыми разрешениями, правами субъектов данных и трансграничной передачей туристических данных.
  BC-4040.30.10:
    name: Сбор и управление согласием
    description: |
      Сбор и постоянное управление записями о согласии по целям и каналам.
  BC-4040.30.20:
    name: Управление маркетинговыми разрешениями
    description: |
      Управление маркетинговыми разрешениями, включая согласие и отказ по каналам.
  BC-4040.30.30:
    name: Обработка запросов субъектов данных
    description: |
      Обработка запросов на доступ, переносимость, исправление и удаление персональных данных.
  BC-4040.30.40:
    name: Соответствие требованиям трансграничной передачи данных
    description: |
      Соответствие требованиям трансграничной передачи данных о путешественниках и гостях.
  BC-4040.40:
    name: Программы признания и предоставление статуса
    description: |
      Доведение сигналов программ признания и статуса уровня до операционных команд для единообразного обслуживания.
    in_scope:
      - Подготовка признания до заезда и на объекте
      - Регистрация и завершение предоставления признания
    out_of_scope:
      - Дизайн программы лояльности и начисление/списание (BC-4050)
  BC-4040.40.10:
    name: Подготовка признания до заезда
    description: |
      Информирование операционных команд об ожиданиях признания до заезда гостя.
  BC-4040.40.20:
    name: Предоставление признания на объекте
    description: |
      Предоставление признания на стойке, в ресторане и у консьержа во время пребывания гостя.
  BC-4040.40.30:
    name: Регистрация событий признания
    description: |
      Регистрация событий предоставления признания для аудита сервиса и обратной связи.
  BC-4040.40.40:
    name: Отчётность о завершении признания
    description: |
      Отчётность о процентах завершения признания относительно запланированных сигналов.
  BC-4040.50:
    name: Управление сегментацией и аналитикой гостей
    description: |
      Определение сегментов гостей, моделирование пожизненной ценности и оттока, формирование когортной и поведенческой аналитики.
  BC-4040.50.10:
    name: Определение сегментов гостей
    description: |
      Определение и ведение сегментов гостей для маркетинга и мерчандайзинга.
  BC-4040.50.20:
    name: Моделирование пожизненной ценности
    description: |
      Моделирование пожизненной ценности гостя как вводных данных для решений об инвестициях и признании.
  BC-4040.50.30:
    name: Анализ оттока и удержания гостей
    description: |
      Анализ причин оттока гостей и возможностей удержания по сегментам.
  BC-4040.50.40:
    name: Когортная и поведенческая аналитика
    description: |
      Формирование когортной и поведенческой аналитики на основе событий бронирования, пребывания и вовлечённости.
  BC-4040.60:
    name: Управление документами и данными соответствия путешественника
    description: |
      Управление проездными документами, APIS, визами и данными скрининга по стоп-листам для выполнения обязательств по перевозке и пограничному контролю.
  BC-4040.60.10:
    name: Сбор проездных документов
    description: |
      Сбор данных паспортов, удостоверений личности и виз для проверки права на перевозку.
  BC-4040.60.20:
    name: Передача APIS и предварительных сведений о пассажирах
    description: |
      Передача APIS и предварительных сведений о пассажирах в органы пограничного контроля.
  BC-4040.60.30:
    name: Справочная информация о праве на визу и ESTA
    description: |
      Справочные проверки по визовым, ESTA и аналогичным требованиям.
  BC-4040.60.40:
    name: Скрининг по программе Secure Flight и стоп-листам
    description: |
      Скрининг путешественников по программе Secure Flight и аналогичным запретительным и наблюдательным спискам.

# Управление ресурсами профессионального персонала (ru) — translations for L1-professional-workforce-resourcing-management.yaml
locale: ru
source: L1-professional-workforce-resourcing-management.yaml
entries:
  BC-4320:
    name: Управление ресурсами профессионального персонала
    description: |
      Аллокация, утилизация, леверидж и управление незадействованным персоналом по портфелю заданий. Отличается от общего управления человеческим капиталом — сосредоточено на биллинговом персонале как основном ресурсе поставки фирмы.
  BC-4320.10:
    name: Прогнозирование спроса на ресурсы
    description: |
      Прогнозирование спроса на биллинговые ресурсы на основе пайплайна заданий, подтверждённых заданий и допущений роста.
  BC-4320.10.10:
    name: Прогнозирование спроса на основе пайплайна
    description: |
      Прогноз спроса на ресурсы, производный из пайплайна привлечения, взвешенного по вероятности выигрыша.
  BC-4320.10.20:
    name: Планирование спроса по подтверждённым заданиям
    description: |
      Планирование ресурсного спроса по принятым заданиям с подтверждённым скоупом и сроками.
  BC-4320.10.30:
    name: Агрегирование спроса по навыкам
    description: |
      Агрегирование прогнозного спроса по навыкам, специализации, языкам и допускам.
  BC-4320.20:
    name: Управление укомплектованием заданий
    description: |
      Аллокация конкретных специалистов на роли в заданиях с балансированием потребностей задания, индивидуального развития и целей утилизации.
  BC-4320.20.10:
    name: Обработка ресурсных запросов задания
    description: |
      Сбор и триаж ресурсных запросов задания относительно доступных специалистов.
  BC-4320.20.20:
    name: Управление решениями по укомплектованию
    description: |
      Принятие решений по аллокации с балансированием соответствия заданию, потребностей развития и партнёрских предпочтений.
  BC-4320.20.30:
    name: Подтверждение и уведомление о решениях по укомплектованию
    description: |
      Подтверждение решений по укомплектованию руководству задания и назначенным специалистам.
  BC-4320.30:
    name: Соответствие навыков и специализаций
    description: |
      Ведение профилей навыков специалистов и соответствие профилей требованиям задания.
  BC-4320.30.10:
    name: Ведение профиля навыков специалиста
    description: |
      Сбор и актуализация навыков, квалификаций, языков и отраслевого опыта каждого специалиста.
  BC-4320.30.20:
    name: Определение требований к навыкам задания
    description: |
      Определение требований к навыкам, специализации и допускам по ролям задания.
  BC-4320.30.30:
    name: Подбор по навыкам
    description: |
      Подбор специалистов на роли задания по навыкам, специализации и доступности.
  BC-4320.40:
    name: Управление утилизацией
    description: |
      Отслеживание и управление биллинговой утилизацией относительно фирменных и индивидуальных целей, включая аналитику производительности.
  BC-4320.40.10:
    name: Установка целей утилизации
    description: |
      Установка целей биллинговой утилизации по грейду, практике и специалисту.
  BC-4320.40.20:
    name: Отслеживание утилизации
    description: |
      Ежедневное отслеживание биллинговых часов, небиллинговых часов и отсутствий.
  BC-4320.40.30:
    name: Устранение отклонений утилизации
    description: |
      Выявление и устранение ситуаций, когда специалисты значительно ниже или выше целей утилизации.
  BC-4320.50:
    name: Управление незадействованным персоналом
    description: |
      Управление незаллоцированной биллинговой мощностью: планирование наращивания, использование незадействованного персонала для небиллинговых работ и проактивное перераспределение.
  BC-4320.50.10:
    name: Управление видимостью незадействованного персонала
    description: |
      Видимость доступной мощности по грейду, навыкам и местонахождению.
  BC-4320.50.20:
    name: Аллокация активностей незадействованного персонала
    description: |
      Аллокация времени незадействованного персонала на развитие, поддержку предложений, методологические работы или обучение.
  BC-4320.50.30:
    name: Меры по сокращению незадействованного персонала
    description: |
      Проактивное перераспределение, командирование или корректировка мощности при превышении целевого уровня незадействованного персонала.
  BC-4320.60:
    name: Кросс-офисное и трансграничное распределение ресурсов
    description: |
      Координация совместного использования ресурсов между офисами, практиками и странами, включая командирования и глобальную мобильность биллингового персонала.
  BC-4320.60.10:
    name: Кросс-офисное заимствование ресурсов
    description: |
      Временное заимствование и предоставление специалистов между офисами.
  BC-4320.60.20:
    name: Управление международными командированиями
    description: |
      Долгосрочные международные командирования специалистов между офисами фирмы или юрисдикциями сети.
  BC-4320.60.30:
    name: Межофисное начисление и расчёт затрат
    description: |
      Операционный расчёт кросс-офисных начислений времени и затрат по совместным заданиям.
  BC-4320.70:
    name: Управление левериджем задания
    description: |
      Управление соотношением партнёр/персонал на заданиях с балансированием экономики, качества и развития.
  BC-4320.70.10:
    name: Моделирование левериджа задания
    description: |
      Моделирование соотношения партнёр, менеджер, старший и младший специалист по типу задания.
  BC-4320.70.20:
    name: Мониторинг отклонений левериджа
    description: |
      Мониторинг фактического левериджа относительно целевого и анализ причин отклонений.
  BC-4320.70.30:
    name: Аналитика здоровья пирамиды
    description: |
      Аналитика здоровья грейдовой пирамиды, скорости продвижения и влияния оттока на леверидж.

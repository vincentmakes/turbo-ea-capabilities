# Управление производственной инженерией (ru) — translations for L1-manufacturing-engineering-management.yaml
locale: ru
source: L1-manufacturing-engineering-management.yaml
entries:
  BC-1020:
    name: Управление производственной инженерией
    description: |
      Технологическая инженерия, оснастка, проектирование оборудования и промышленное освоение производства.
  BC-1020.10:
    name: Управление технологическим проектированием
    description: |
      Проектирование производственных процессов, маршрутов и рабочих инструкций.
  BC-1020.10.10:
    name: Проектирование процессов и маршрутов
    description: |
      Определение производственных маршрутов и технологических шагов.
  BC-1020.10.20:
    name: Разработка рабочих инструкций
    description: |
      Разработка стандартных рабочих инструкций и визуальных руководств.
  BC-1020.10.30:
    name: Валидация процессов
    description: |
      Валидация производственных процессов и исследование воспроизводимости.
  BC-1020.10.40:
    name: Управление изменениями процессов
    description: |
      Контроль изменений производственных процессов и маршрутов.
  BC-1020.20:
    name: Управление инструментом и оснасткой
    description: |
      Жизненный цикл инструментов, кондукторов и приспособлений.
  BC-1020.20.10:
    name: Проектирование оснастки
    description: |
      Проектирование инструментов, кондукторов и приспособлений для производства.
  BC-1020.20.20:
    name: Закупка и изготовление оснастки
    description: |
      Закупка, изготовление и валидация оснастки.
  BC-1020.20.30:
    name: Техническое обслуживание и контроль оснастки
    description: |
      Техническое обслуживание, контроль и восстановление производственной оснастки.
  BC-1020.20.40:
    name: Управление запасами оснастки
    description: |
      Управление инструментальной кладовой и прослеживаемостью.
  BC-1020.30:
    name: Управление инженерным обеспечением оборудования
    description: |
      Спецификации, квалификация и модернизация оборудования.
  BC-1020.30.10:
    name: Спецификация оборудования
    description: |
      Разработка пользовательских и функциональных спецификаций производственного оборудования.
  BC-1020.30.20:
    name: Квалификация оборудования
    description: |
      Квалификация производственного оборудования IQ, OQ, PQ.
  BC-1020.30.30:
    name: Управление модернизацией оборудования
    description: |
      Инженерные изменения и модернизация установленного оборудования.
  BC-1020.40:
    name: Управление промышленным освоением
    description: |
      Передача из НИОКР в производство, наращивание выпуска.
  BC-1020.40.10:
    name: Управление передачей в производство
    description: |
      Передача продукции из НИОКР или опытного производства в серийное.
  BC-1020.40.20:
    name: Опытное и предсерийное производство
    description: |
      Изготовление предсерийных и опытных партий, накопление опыта.
  BC-1020.40.30:
    name: Управление наращиванием производства
    description: |
      Выход на номинальные объёмы и показатели качества производства.
  BC-1020.50:
    name: Управление производственными методами
    description: |
      Методы, хронометраж, эргономика.
  BC-1020.50.10:
    name: Хронометраж и методное нормирование
    description: |
      Хронометраж, МТМ и установление норм времени.
  BC-1020.50.20:
    name: Эргономика рабочего места
    description: |
      Эргономическое проектирование рабочих мест и операций.
  BC-1020.50.30:
    name: Определение стандартной работы
    description: |
      Разработка стандартной работы и оптимальной последовательности операций.
  BC-1020.60:
    name: Управление непрерывным совершенствованием производства
    description: |
      Кайдзен производственных процессов, бережливые преобразования.
  BC-1020.60.10:
    name: Проведение кайдзен-мероприятий
    description: |
      Проведение кайдзен-мероприятий по производственным процессам.
  BC-1020.60.20:
    name: Управление бережливыми преобразованиями
    description: |
      Комплексные программы бережливых преобразований на производственных площадках.
  BC-1020.60.30:
    name: Картирование потока создания ценности
    description: |
      Картирование текущего и будущего состояния потока создания ценности.
  BC-1020.60.40:
    name: Развитие компетенций в области НСС
    description: |
      Развитие компетенций и наставничество в области методов непрерывного совершенствования.

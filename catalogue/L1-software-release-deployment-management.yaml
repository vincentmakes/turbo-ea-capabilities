        children: []
      - id: BC-4210.40.40
        name: Rollback Coordination
        level: 3
        industry: Software & Technology
        description: |
          Coordinated rollback of releases on adverse signals.
        children: []
  - id: BC-4210.50
    name: Feature Flag Management
    level: 2
    industry: Software & Technology
    description: |

# Academic Quality & Accreditation Management
id: BC-4750
name: "Academic Quality & Accreditation Management"
level: 1
industry: Education
description: |
  Internal and external quality assurance of academic programmes and the
  institution, including review, accreditation, standards-framework
  management, student feedback, and continuous improvement.
references:
  - https://www.chea.org/
  - https://www.qaa.ac.uk/
  - https://www.teqsa.gov.au/
  - https://www.enqa.eu/
  - https://www.aacsb.edu/
  - https://www.abet.org/
children:
  - id: BC-4750.10
    name: "Programme Review & Validation"
    level: 2
    industry: Education
    description: |
      Validation of new programmes and periodic re-validation against
      institutional and external academic standards.
    in_scope:
      - New programme validation
      - Periodic programme review
      - Programme re-validation
    out_of_scope:
      - Programme approval gates (covered under Curriculum & Programme Management)
    children:
      - id: BC-4750.10.10
        name: New Programme Validation
        level: 3
        industry: Education
        description: |
          Validation of new programmes against academic and quality standards.
        children: []
      - id: BC-4750.10.20
        name: Periodic Programme Review
        level: 3
        industry: Education
        description: |
          Periodic quality review of running programmes and their outcomes.
        children: []
      - id: BC-4750.10.30
        name: Programme Re-Validation
        level: 3
        industry: Education
        description: |
          Re-validation of programmes at the end of validation cycles.
        children: []
  - id: BC-4750.20
    name: Institutional Self-Assessment
    level: 2
    industry: Education
    description: |
      Self-evaluation of institutional performance against quality standards
      and benchmarking with peer institutions.
    in_scope:
      - Self-evaluation report production
      - Quality indicator benchmarking
      - Strategic quality planning
    out_of_scope:
      - External accreditation visits (covered under External Accreditation & Audit Coordination)
    children:
      - id: BC-4750.20.10
        name: Self-Evaluation Report Production
        level: 3
        industry: Education
        description: |
          Production of institutional self-evaluation reports.
        children: []
      - id: BC-4750.20.20
        name: Quality Indicator Benchmarking
        level: 3
        industry: Education
        description: |
          Benchmarking of quality indicators against peer institutions.
        children: []
      - id: BC-4750.20.30
        name: Strategic Quality Planning
        level: 3
        industry: Education
        description: |
          Strategic planning of academic quality priorities and investments.
        children: []
  - id: BC-4750.30
    name: "External Accreditation & Audit Coordination"
    level: 2
    industry: Education
    description: |
      Coordination with external accreditation bodies and quality regulators,
      including site visits, inspections, and outcome response.
    in_scope:
      - Accreditation body engagement
      - Site visit and inspection coordination
      - Accreditation outcome response and conditions tracking
    out_of_scope:
      - Statutory regulatory reporting (covered under Education Compliance & Regulatory Reporting Management)
    children:
      - id: BC-4750.30.10
        name: Accreditation Body Engagement
        level: 3
        industry: Education
        description: |
          Engagement and submission management with accreditation bodies.
        children: []
      - id: BC-4750.30.20
        name: "Site Visit & Inspection Coordination"
        level: 3
        industry: Education
        description: |
          Coordination of accreditor site visits and inspection logistics.
        children: []
      - id: BC-4750.30.30
        name: Accreditation Outcome Response
        level: 3
        industry: Education
        description: |
          Response to accreditation outcomes, conditions, and recommendations.
        children: []
  - id: BC-4750.40
    name: Quality Standards Framework Management
    level: 2
    industry: Education
    description: |
      Adoption, mapping, and maintenance of academic quality standards and
      institutional quality policy.
    in_scope:
      - Standards adoption and maintenance (e.g. ESG, ABET, AACSB)
      - Quality policy authoring
      - Mapping of quality standards into operating practice
    out_of_scope:
      - Day-to-day audit operations (covered under Cross-Industry Internal Audit Management)
    children:
      - id: BC-4750.40.10
        name: "Standards Adoption & Maintenance"
        level: 3
        industry: Education
        description: |
          Adoption and maintenance of external quality standards across the institution.
        children: []
      - id: BC-4750.40.20
        name: Quality Policy Authoring
        level: 3
        industry: Education
        description: |
          Authoring and maintenance of institutional quality policy.
        children: []
      - id: BC-4750.40.30
        name: Quality Standards Mapping
        level: 3
        industry: Education
        description: |
          Mapping of quality standards into operational processes and controls.
        children: []
  - id: BC-4750.50
    name: "Student Feedback & Module Evaluation"
    level: 2
    industry: Education
    description: |
      Collection, analysis, and closing-the-loop on student feedback at module,
      programme, and institutional levels.
    in_scope:
      - Module evaluation survey operations
      - National and cross-institutional surveys (e.g. NSS, NSSE)
      - Feedback analysis and closing-the-loop
    out_of_scope:
      - Customer-style satisfaction analytics outside the academic context (covered under Cross-Industry Customer Service Management)
    children:
      - id: BC-4750.50.10
        name: Module Evaluation Survey Operations
        level: 3
        industry: Education
        description: |
          Operation of module-level evaluation surveys.
        children: []
      - id: BC-4750.50.20
        name: "National & Cross-Institutional Survey Participation"
        level: 3
        industry: Education
        description: |
          Participation in national and cross-institutional student surveys.
        children: []
      - id: BC-4750.50.30
        name: Feedback Analysis and Closing-the-Loop
        level: 3
        industry: Education
        description: |
          Analysis of feedback and visible closing-the-loop with students.
        children: []
  - id: BC-4750.60
    name: "Continuous Improvement & Action Tracking"
    level: 2
    industry: Education
    description: |
      Identification, planning, and tracking of quality-improvement actions
      arising from review, accreditation, and feedback.
    in_scope:
      - Improvement action planning
      - Action implementation tracking
      - Lessons-learned repository
    out_of_scope:
      - Generic process-improvement methods (covered under Cross-Industry Quality Management)
    children:
      - id: BC-4750.60.10
        name: Improvement Action Planning
        level: 3
        industry: Education
        description: |
          Planning of academic quality improvement actions.
        children: []
      - id: BC-4750.60.20
        name: Action Implementation Tracking
        level: 3
        industry: Education
        description: |
          Tracking of implementation status and effectiveness of quality actions.
        children: []
      - id: BC-4750.60.30
        name: Lessons-Learned Repository
        level: 3
        industry: Education
        description: |
          Curation of lessons learned from quality reviews and accreditation cycles.
        children: []

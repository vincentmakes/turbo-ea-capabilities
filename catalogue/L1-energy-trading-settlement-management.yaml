# Energy Trading & Settlement Management
id: BC-3850
name: Energy Trading & Settlement Management
level: 1
industry: Power & Water Utilities
description: |
  Wholesale trading of power, gas, and environmental commodities —
  market participation across day-ahead, intraday, and balancing
  timeframes, energy risk management, scheduling and nominations,
  capacity-market participation, and back-office settlement and
  regulatory reporting under REMIT / EMIR / Dodd-Frank regimes.
references:
  - https://www.acer.europa.eu/remit
  - https://www.ferc.gov/industries-data/electric/electric-power-markets
  - https://www.entsoe.eu/network_codes/cacm/
  - https://www.iso.org/standard/64976.html
children:
  - id: BC-3850.10
    name: Wholesale Power Trading
    level: 2
    industry: Power & Water Utilities
    description: |
      Front-office trading of physical and financial power across
      day-ahead, intraday, and forward markets.
    children:
      - id: BC-3850.10.10
        name: Day-Ahead Market Trading
        level: 3
        description: |
          Submission and management of day-ahead market bids and offers.
        children: []
      - id: BC-3850.10.20
        name: Intraday Market Trading
        level: 3
        description: |
          Continuous and auction-based intraday trading against position changes.
        children: []
      - id: BC-3850.10.30
        name: Forward & Bilateral Trading
        level: 3
        description: |
          Forward physical and bilateral OTC trading for hedging and origination.
        children: []
      - id: BC-3850.10.40
        name: Cross-Border Capacity Trading
        level: 3
        description: |
          Trading of cross-border interconnector capacity products.
        children: []
  - id: BC-3850.20
    name: Energy Risk Management
    level: 2
    industry: Power & Water Utilities
    description: |
      Market, credit, and operational risk surveillance of the trading
      portfolio with limit administration and stress testing.
    in_scope:
      - VaR and earnings-at-risk calculation
      - Counterparty credit limit management
      - Hedge effectiveness testing
    out_of_scope:
      - Enterprise risk management (BC-120)
      - Credit risk on retail customers (BC-3910)
    children:
      - id: BC-3850.20.10
        name: Market Risk Surveillance
        level: 3
        description: |
          VaR, earnings-at-risk, and exposure surveillance of the trading book.
        children: []
      - id: BC-3850.20.20
        name: Counterparty Credit Risk Management
        level: 3
        description: |
          Counterparty credit limits, collateral, and exposure monitoring.
        children: []
      - id: BC-3850.20.30
        name: Hedge Programme Management
        level: 3
        description: |
          Design and execution of hedging programmes against fuel and power exposure.
        children: []

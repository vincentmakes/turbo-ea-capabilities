# Hydrocarbon Measurement & Allocation Management
id: BC-3040
name: "Hydrocarbon Measurement & Allocation Management"
level: 1
industry: "Oil & Gas"
description: |
  Fiscal-quality measurement and allocation of produced hydrocarbons -
  custody-transfer metering, allocation across reservoirs and joint
  owners, production accounting, lease operating statements, and
  loss-and-variance investigation.
references:

# Mine Closure & Rehabilitation Management
id: BC-4470
name: "Mine Closure & Rehabilitation Management"
level: 1
industry: "Mining & Metals"
description: |
  Closure planning, financial provisioning, progressive rehabilitation,
  decommissioning, and post-closure stewardship of mining lands and
  infrastructure.
references:
  - https://www.icmm.com/en-gb/our-principles/mining-principles
  - https://www.icmm.com/closure-maturity-framework
  - https://environment.ec.europa.eu/topics/waste-and-recycling/mining-waste_en
children:
  - id: BC-4470.10
    name: Closure Planning
    level: 2
    industry: "Mining & Metals"
    description: |
      Conceptual through detailed closure plan development with stakeholder
      engagement and regulator approval.
    in_scope:
      - Conceptual and life-of-asset closure plans
      - Detailed closure plan revisions ahead of cessation
      - Regulator and community closure consultation
    out_of_scope:
      - Financial provisioning instruments (BC-4470.20)
    children:
      - id: BC-4470.10.10
        name: Conceptual Closure Plan Development
        level: 3
        industry: "Mining & Metals"
        description: |
          Development of conceptual closure plans during early project
          stages.
        children: []
      - id: BC-4470.10.20
        name: Detailed Closure Plan Development
        level: 3
        industry: "Mining & Metals"
        description: |
          Development of detailed closure plans for regulator approval
          ahead of cessation.
        children: []
      - id: BC-4470.10.30
        name: Stakeholder Closure Engagement
        level: 3
        industry: "Mining & Metals"
        description: |
          Engagement of regulators, communities, and traditional owners on
          closure outcomes.
        children: []
  - id: BC-4470.20
    name: Closure Financial Provisioning
    level: 2
    industry: "Mining & Metals"
    description: |
      Cost estimation, financial assurance instrument management, and
      accounting of closure provisions.
    children:
      - id: BC-4470.20.10
        name: Closure Cost Estimation
        level: 3
        industry: "Mining & Metals"
        description: |
          Estimation of closure cost across rehabilitation, decommissioning,
          and post-closure activities.
        children: []
      - id: BC-4470.20.20
        name: Financial Assurance Instrument Management
        level: 3
        industry: "Mining & Metals"
        description: |
          Management of bonds, guarantees, and surety instruments lodged
          with regulators.
        children: []
      - id: BC-4470.20.30
        name: Closure Provision Accounting
        level: 3
        industry: "Mining & Metals"
        description: |
          Periodic remeasurement and recognition of closure provisions in
          the financial statements.
        children: []
  - id: BC-4470.30
    name: Progressive Rehabilitation Operations
    level: 2
    industry: "Mining & Metals"
    description: |
      Concurrent rehabilitation of disturbed land alongside operations,
      including landform shaping, revegetation, and watercourse
      reinstatement.
    children:
      - id: BC-4470.30.10
        name: Landform Reshaping
        level: 3
        industry: "Mining & Metals"
        description: |
          Reshaping of waste dumps, pit walls, and tailings landforms to
          stable closure profiles.
        children: []
      - id: BC-4470.30.20
        name: "Topsoil Replacement & Revegetation"
        level: 3
        industry: "Mining & Metals"
        description: |
          Replacement of stockpiled topsoil and establishment of native
          vegetation cover.
        children: []
      - id: BC-4470.30.30
        name: Watercourse Reinstatement
        level: 3
        industry: "Mining & Metals"
        description: |
          Reinstatement of natural and constructed watercourses across
          rehabilitated land.
        children: []
      - id: BC-4470.30.40
        name: Infrastructure Decommissioning
        level: 3
        industry: "Mining & Metals"
        description: |
          Progressive decommissioning of redundant operational
          infrastructure during operations.
        children: []
  - id: BC-4470.40
    name: Mine Site Decommissioning
    level: 2
    industry: "Mining & Metals"
    description: |
      End-of-life dismantling, asset disposal, and site clean-up at
      cessation of operations.
    children:
      - id: BC-4470.40.10
        name: Plant Dismantling
        level: 3
        industry: "Mining & Metals"
        description: |
          Dismantling of process plant, mining infrastructure, and surface
          buildings.
        children: []
      - id: BC-4470.40.20
        name: "Asset Disposal & Salvage"
        level: 3
        industry: "Mining & Metals"
        description: |
          Disposal, salvage, or transfer of mining and processing assets
          at decommissioning.
        children: []
      - id: BC-4470.40.30
        name: Site Clean-Up Operations
        level: 3
        industry: "Mining & Metals"
        description: |
          Clean-up of contaminated soils, hydrocarbons, and stored
          materials at decommissioning.
        children: []
  - id: BC-4470.50
    name: Post-Closure Stewardship
    level: 2
    industry: "Mining & Metals"
    description: |
      Long-term monitoring, relinquishment, and management of legacy
      liabilities after operational cessation.
    children:
      - id: BC-4470.50.10
        name: Long-Term Monitoring Operations
        level: 3
        industry: "Mining & Metals"
        description: |
          Operation of long-term water, geotechnical, and revegetation
          monitoring programmes.
        children: []
      - id: BC-4470.50.20
        name: "Relinquishment & Surrender Management"
        level: 3
        industry: "Mining & Metals"
        description: |
          Management of land relinquishment, lease surrender, and
          regulatory sign-off.
        children: []
      - id: BC-4470.50.30
        name: Legacy Liability Tracking
        level: 3
        industry: "Mining & Metals"
        description: |
          Tracking and disclosure of retained legacy environmental
          liabilities.
        children: []

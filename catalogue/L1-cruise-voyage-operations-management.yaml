# Cruise Voyage Operations Management
id: BC-4090
name: Cruise Voyage Operations Management
level: 1
industry: "Travel & Hospitality"
description: |
  Operation of cruise voyages — itinerary planning, port and shore
  excursion operations, onboard cabin and guest programmes, marine and
  bridge operations, embarkation, and shipboard health and sanitation —
  delivered against international maritime safety regulation.
references:
  - https://cruising.org/
  - https://www.imo.org/
  - https://www.cdc.gov/nceh/vsp/
in_scope:
  - Voyage itinerary design and deployment
  - Port turn, tendering, and shore excursion sales and delivery
  - Onboard cabin, programme, and guest service operations
  - Marine, bridge, and engine-room operations
  - Embarkation and disembarkation operations
  - Onboard health and sanitation operations
out_of_scope:
  - Cruise sales and distribution (BC-4010, BC-4020)
  - Property-based hotel operations (BC-4060)

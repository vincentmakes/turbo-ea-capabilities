# Telecom Network Operations Management
id: BC-2600
name: Telecom Network Operations Management
level: 1
industry: Telecommunications
description: |
  Day-to-day operation of fixed, mobile, and IP networks across radio access,
  core, transport, and edge — covering fault, configuration, performance,
  inventory, change, security operations, and field coordination, anchored on
  TMN FCAPS and eTOM Resource Management & Operations.
references:
  - https://www.itu.int/rec/T-REC-M.3400
  - https://www.tmforum.org/oda/business/process-framework-etom/
  - https://www.3gpp.org/specifications-technologies
  - https://www.etsi.org/technologies/zero-touch-network-service-management

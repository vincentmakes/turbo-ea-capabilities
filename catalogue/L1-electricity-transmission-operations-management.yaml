# Electricity Transmission Operations Management
id: BC-3810
name: Electricity Transmission Operations Management
level: 1
industry: Power & Water Utilities
description: |
  Operation of the high-voltage transmission grid — control-room
  dispatch, switching, line and substation operations, outage
  coordination, protection, and physical and cyber security of the
  bulk-electric system.
references:
  - https://www.nerc.com/pa/Stand/Pages/CIPStandards.aspx
  - https://www.nerc.com/pa/Stand/Pages/ReliabilityStandardsUnitedStates.aspx
  - https://www.entsoe.eu/network_codes/
  - https://webstore.iec.ch/publication/6028
children:
  - id: BC-3810.10
    name: Transmission Control Operations
    level: 2
    industry: Power & Water Utilities
    description: |
      24/7 control-room operation of the transmission network using
      EMS / SCADA, situational awareness, and contingency analysis.
    children:
      - id: BC-3810.10.10
        name: EMS Operations
        level: 3
        description: |
          Operation of the energy management system, state estimator, and contingency analysis tools.
        children: []
      - id: BC-3810.10.20
        name: Transmission SCADA Operations
        level: 3
        description: |
          Real-time SCADA acquisition and supervisory control of transmission assets.
        children: []
      - id: BC-3810.10.30
        name: Transmission Operator Logbook Management
        level: 3
        description: |
          Maintenance of operator logbooks, shift handovers, and operating-event records.
        children: []
  - id: BC-3810.20
    name: Transmission Switching & Isolation
    level: 2
    industry: Power & Water Utilities
    description: |
      Planning and execution of switching, isolation, and live-line
      access operations on the transmission system.
    children:
      - id: BC-3810.20.10
        name: Switching Programme Preparation
        level: 3
        description: |
          Preparation and verification of switching programmes for planned work.
        children: []
      - id: BC-3810.20.20
        name: Permit-to-Work Issuance
        level: 3
        description: |
          Issuance and control of permits-to-work and sanctions-for-test on transmission plant.
        children: []
      - id: BC-3810.20.30
        name: Live-Line & Live-Working Operations
        level: 3
        description: |
          Coordination of live-line and live-working access on energised circuits.
        children: []
  - id: BC-3810.30
    name: Transmission Line Operations
    level: 2
    industry: Power & Water Utilities
    description: |
      Operation, inspection, and live work of overhead lines, towers,
      and underground transmission cables.
    children:
      - id: BC-3810.30.10
        name: Overhead Line Inspection
        level: 3
        description: |
          Routine, climbing, and aerial inspections of overhead transmission lines.
        children: []
      - id: BC-3810.30.20
        name: Underground Cable Operations
        level: 3
        description: |
          Operation, partial-discharge surveillance, and joint-bay management of HV cables.
        children: []
      - id: BC-3810.30.30
        name: Right-of-Way & Vegetation Clearance
        level: 3
        description: |
          Vegetation clearance and right-of-way maintenance to NERC FAC-003 / equivalent standards.
        children: []
      - id: BC-3810.30.40
        name: Transmission Tower Maintenance
        level: 3
        description: |
          Painting, foundation, and structural integrity work on transmission towers.
        children: []
  - id: BC-3810.40
    name: Substation Operations
    level: 2
    industry: Power & Water Utilities
    description: |
      Operation and surveillance of HV substations, transformers,
      switchgear, and reactive-compensation plant.
    children:
      - id: BC-3810.40.10
        name: Power Transformer Operations
        level: 3
        description: |
          Surveillance, dissolved-gas analysis, and tap-change operation of HV transformers.
        children: []
      - id: BC-3810.40.20
        name: Switchgear Operations
        level: 3
        description: |
          Operation and condition surveillance of HV circuit breakers and disconnectors.
        children: []
      - id: BC-3810.40.30
        name: Reactive Compensation Operations
        level: 3
        description: |
          Operation of capacitor banks, reactors, SVCs, and STATCOMs for reactive support.
        children: []
      - id: BC-3810.40.40
        name: HVDC Converter Station Operations
        level: 3
        description: |
          Operation of HVDC converter stations and DC interconnector control.
        children: []
  - id: BC-3810.50

# Health Information Management
id: BC-2900
name: Health Information Management
level: 1
industry: Healthcare Providers
description: |
  Master patient index, coding operations, release of information, health
  record lifecycle, clinical registry submissions, and healthcare
  interoperability operations for the provider organisation.
references:
  - https://www.ahima.org/
  - https://www.healthit.gov/
  - https://www.hl7.org/fhir/
  - https://www.ihe.net/

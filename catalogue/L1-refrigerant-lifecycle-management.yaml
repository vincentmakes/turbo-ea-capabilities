# Refrigerant Lifecycle Management
id: BC-2040
name: Refrigerant Lifecycle Management
level: 1
industry: "HVAC & Building Automation Systems"
description: |
  Operational lifecycle of refrigerants across the installed base — procurement and inventory,
  charge accounting, recovery and reclaim, leak management, regulatory reporting under
  F-Gas / EPA Section 608 / Kigali Amendment, technician certification, phase-out transitions,
  and end-of-life disposition.
in_scope:
  - Procurement, allocation, and storage of refrigerants
  - Asset-level charge accounting and mass-balance reconciliation
  - Field recovery, reclaim, and recycled-refrigerant quality control
  - Leak detection, repair, and regulatory rate reporting
  - Technician handling certification and competency tracking
  - Refrigerant transition and phase-out roadmaps
  - End-of-life destruction and certified disposal
out_of_scope:
  - Product-level refrigerant approvals during certification (BC-2030)
  - Refrigerant cycle and selection during equipment design (BC-2000)
  - General environmental compliance not specific to refrigerants (BC-740)

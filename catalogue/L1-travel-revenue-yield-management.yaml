# Travel Revenue & Yield Management
id: BC-4030
name: "Travel Revenue & Yield Management"
level: 1
industry: "Travel & Hospitality"
description: |
  Demand forecasting, dynamic pricing, inventory controls, and yield
  decisions that maximise revenue across travel products — distinct from
  product master, distribution wiring, and reservation lifecycle.
references:
  - https://www.ahla.com/usali
  - https://hedna.org/
  - https://opentravel.org/
in_scope:
  - Unconstrained demand and pickup-pace forecasting
  - Pricing and rate-strategy management (BAR, fare class, season)
  - Booking limits, length-of-stay restrictions, overbooking, nesting
  - Competitive rate intelligence and market positioning
  - Promotion and discount mechanics
  - Revenue performance reporting (RevPAR, RevPAX, ADR, yield)
out_of_scope:
  - Product master definition (BC-4000)
  - Channel-specific bidding on metasearch (BC-4010.40.20)
  - Group sales contracting (BC-4110.10)
children:

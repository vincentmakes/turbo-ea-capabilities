# Property Management Operations
id: BC-4940
name: Property Management Operations
level: 1
industry: Real Estate
description: |
  Landlord and property-manager-side operation of commercial, retail,
  and multi-family residential buildings — building services, vendor
  and contract management, work orders, tenant services during
  occupancy, security and life safety, energy / sustainability, and
  property accounting including CAM reconciliation. Distinct from
  hotel property operations (BC-4060) and corporate-occupier facilities
  (BC-700).
references:
  - https://www.iso.org/standard/68021.html
  - https://www.irem.org/
  - https://www.bomi.org/
  - https://www.bomainternational.org/
in_scope:
  - Day-to-day building operations including BMS and common areas
  - Preventive, reactive, and statutory maintenance
  - Vendor and service contract management (janitorial, security, landscaping)
  - Tenant move-in / move-out and fit-out coordination
  - Property security, fire / life safety, and incident response
  - Property energy, water, waste, and indoor environment
  - Property accounting, tenant billing, and operating reporting
  - CAM and service-charge reconciliation
out_of_scope:
  - Hotel and resort property operations (BC-4060)
  - Corporate occupier facilities for own use (BC-700)
  - Standing-asset business plans and capex strategy (BC-4920)
  - Tenant acquisition and lease execution (BC-4950)

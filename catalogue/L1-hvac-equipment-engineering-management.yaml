# HVAC Equipment Engineering Management
id: BC-2000
name: HVAC Equipment Engineering Management
level: 1
industry: "HVAC & Building Automation Systems"
description: |
  Mechanical, refrigeration, and thermo-fluid product engineering of HVAC equipment —
  chillers, heat pumps, AHUs, RTUs, VRF, fan coils, terminal units — through to
  performance verification and AHRI/Eurovent rating-test readiness.
in_scope:
  - Refrigeration cycle and heat-pump cycle design
  - Heat exchanger and coil engineering
  - Air-moving and hydronic equipment engineering
  - Compressor, drive, and onboard control engineering
  - Acoustic, vibration, and equipment-level performance verification
out_of_scope:
  - Project-level system selection and integration (BC-2020)
  - BAS controller product engineering (BC-2010)
  - Type-certification submissions and mark licensing (BC-2030)
  - Operational refrigerant accounting (BC-2040)
children:

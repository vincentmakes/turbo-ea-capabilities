# Food & Beverage Operations Management
id: BC-4070
name: "Food & Beverage Operations Management"
level: 1
industry: "Travel & Hospitality"
description: |
  Operation of food and beverage services across restaurant, bar,
  in-room dining, banqueting, and kitchen disciplines — covering recipe
  and menu engineering, procurement, kitchen production, service,
  hygiene, and food-safety compliance.
references:
  - https://www.ahla.com/usali
  - https://htng.org/
  - https://www.fao.org/fao-who-codexalimentarius/en/
in_scope:
  - Menu and recipe management with allergen and nutrition data
  - F&B procurement, beverage cellar, and inventory operations
  - Kitchen production planning and line execution
  - Restaurant, in-room dining, and banquet service operations
  - HACCP and food-safety operations
out_of_scope:
  - Property-level engineering (BC-4060.30)
  - Banquet event order origination and group sales (BC-4110)
  - Cruise onboard galley operations under ship-specific frameworks (BC-4090)

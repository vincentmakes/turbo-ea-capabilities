# Healthcare Revenue Cycle Management
id: BC-2870
name: Healthcare Revenue Cycle Management
level: 1
industry: Healthcare Providers
description: |
  Charge capture and chargemaster, medical coding, claim production and
  submission, denials and appeals, cash posting, patient financial services,
  and payer contract management for provider organisations.
references:
  - https://www.cms.gov/medicare/billing
  - https://www.ahima.org/
  - https://www.aapc.com/
  - https://x12.org/
  - https://www.hfma.org/

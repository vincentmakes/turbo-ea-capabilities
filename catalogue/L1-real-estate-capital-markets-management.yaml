# Real Estate Capital Markets Management
id: BC-4980
name: Real Estate Capital Markets Management
level: 1
industry: Real Estate
description: |
  Real-estate-specific debt and equity capital markets discipline —
  origination of senior, mezz, construction, and bridge debt; loan
  servicing and asset management; CMBS and CRE CLO structuring; JV
  equity programmes; REIT public capital raising; refinancing and
  recapitalisation; and CRE loan portfolio risk management. Distinct
  from generic banking credit (BC-1320) and corporate treasury
  (BC-210) — anchored on RE collateral conventions, IRP reporting,
  and DSCR / LTV covenants.
references:
  - https://www.crefc.org/cre/content/standards/investor_reporting_package__irp__9_3_overview.aspx
  - https://www.reit.com/
  - https://www.epra.com/
  - https://www.alta.org/
in_scope:
  - Senior, mezzanine, construction, and bridge loan origination
  - Loan boarding, covenant monitoring, modification, and special servicing
  - CMBS and CRE CLO pooling, structuring, and IRP reporting
  - JV equity sourcing, promote and waterfall structuring, partner reporting
  - REIT public / private equity, debt, ATM programmes, and dividend policy
  - Refinancing and recapitalisation execution
  - CRE loan portfolio concentration, stress testing, and reserving
out_of_scope:
  - Generic banking credit and lending (BC-1320)
  - Generic capital markets trading (BC-1370)
  - Fund formation and LP capital raising (BC-4910)
  - Acquisition transaction execution (BC-4930)

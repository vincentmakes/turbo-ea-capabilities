        children: []
      - id: BC-4490.50.30
        name: Royalty Disclosure Reporting
        level: 3
        industry: "Mining & Metals"
        description: |
          Disclosure of royalty payments to investors, regulators, and
          affected communities.
        children: []
  - id: BC-4490.60
    name: Extractive Transparency Reporting
    level: 2
    industry: "Mining & Metals"
    description: |

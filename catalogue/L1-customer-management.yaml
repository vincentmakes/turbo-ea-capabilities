    name: Customer Order Management
    level: 2
    description: |
      Ability to capture, validate, and fulfil customer orders end-to-end.
    children:
      - id: BC-3.2.1
        name: Order Capture
        level: 3
        description: |
          Ability to record a customer's request to purchase across any
          channel.
        children: []
      - id: BC-3.2.2
        name: Order Validation
        level: 3
        description: |

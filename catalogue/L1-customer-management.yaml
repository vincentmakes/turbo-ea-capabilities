    name: Customer Acquisition
    level: 2
    description: |
      Ability to attract prospects and convert them into customers.
    aliases: [customer-attraction]
    children:
      - id: BC-3.1.1
        name: Lead Capture
        level: 3
        description: |
          Ability to register potential customer interest from any channel.
        children: []
      - id: BC-3.1.2
        name: Lead Qualification
        level: 3
        description: |
          Ability to assess a lead's fit and intent prior to active sales

# Smelting & Refining Operations Management
id: BC-4450
name: "Smelting & Refining Operations Management"
level: 1
industry: "Mining & Metals"
description: |
  Pyrometallurgical and electrochemical refining of concentrates and
  intermediates into LME-deliverable or specification metal, including
  by-product recovery, off-gas treatment, and metallurgical accounting.
references:
  - https://www.lme.com/en/About/Responsibility/Responsible-sourcing
  - https://www.icmm.com/en-gb/our-principles/mining-principles
  - https://www.astm.org/
  - https://www.ausimm.com/
children:
  - id: BC-4450.10
    name: "Concentrate Receipt & Blending"
    level: 2
    industry: "Mining & Metals"
    description: |
      Receipt sampling, feed blending, and inventory management of
      concentrates entering the smelter complex.
    in_scope:
      - Receipt sampling and assay
      - Smelter feed blending
      - Concentrate yard inventory
    out_of_scope:
      - Concentrate sales settlement (BC-4480.40)
    children:
      - id: BC-4450.10.10
        name: Concentrate Sampling on Receipt
        level: 3
        industry: "Mining & Metals"
        description: |
          Sampling and assay of concentrates received from third-party and
          captive mines.
        children: []
      - id: BC-4450.10.20
        name: Smelter Feed Blending
        level: 3
        industry: "Mining & Metals"
        description: |
          Blending of concentrates to meet smelter feed grade and impurity
          targets.
        children: []
      - id: BC-4450.10.30
        name: Concentrate Inventory Management
        level: 3
        industry: "Mining & Metals"
        description: |
          Yard, shed, and silo inventory management of concentrate stocks.
        children: []
  - id: BC-4450.20
    name: Pyrometallurgical Operations
    level: 2
    industry: "Mining & Metals"
    description: |
      Roasting, smelting, converting, and slag handling of sulphide and
      oxide concentrates.
    children:
      - id: BC-4450.20.10
        name: Roasting Operations
        level: 3
        industry: "Mining & Metals"
        description: |
          Operation of fluid-bed and multiple-hearth roasters for sulphide
          oxidation.
        children: []
      - id: BC-4450.20.20
        name: Smelting Furnace Operations
        level: 3
        industry: "Mining & Metals"
        description: |
          Operation of flash, electric, and bath smelting furnaces.
        children: []
      - id: BC-4450.20.30
        name: Converter Operations
        level: 3
        industry: "Mining & Metals"
        description: |
          Operation of Peirce-Smith, top-blown rotary, and continuous
          converters.
        children: []
      - id: BC-4450.20.40
        name: Slag Handling
        level: 3
        industry: "Mining & Metals"
        description: |
          Tapping, granulation, cleaning, and disposition of furnace and
          converter slag.
        children: []
  - id: BC-4450.30
    name: Electrolytic Refining Operations
    level: 2
    industry: "Mining & Metals"
    description: |
      Electrowinning and electrorefining tankhouse operations producing
      cathode metal.
    children:
      - id: BC-4450.30.10
        name: Electrowinning Operations
        level: 3
        industry: "Mining & Metals"
        description: |
          Operation of electrowinning cells producing cathode from leach
          electrolyte.
        children: []
      - id: BC-4450.30.20
        name: Electrorefining Tankhouse Operations
        level: 3
        industry: "Mining & Metals"
        description: |
          Operation of electrorefining cells producing high-purity cathode
          from anodes.
        children: []
      - id: BC-4450.30.30
        name: "Cathode Stripping & Handling"
        level: 3
        industry: "Mining & Metals"
        description: |
          Stripping, washing, weighing, and bundling of cathode for sale or
          downstream casting.
        children: []
  - id: BC-4450.40
    name: By-Product Metals Recovery
    level: 2
    industry: "Mining & Metals"
    description: |
      Recovery of precious and minor metals from anode slimes, dusts, and

        children: []
      - id: BC-4450.40.20
        name: Precious Metals Refining
        level: 3
        industry: "Mining & Metals"
        description: |
          Refining of gold, silver, and platinum-group metals to bullion or
          sponge.
        children: []
      - id: BC-4450.40.30
        name: By-Product Stream Recovery
        level: 3
        industry: "Mining & Metals"
        description: |
          Recovery of selenium, tellurium, sulphuric acid, and other
          by-product streams.
        children: []
  - id: BC-4450.50
    name: "Cast House & Product Finishing"
    level: 2
    industry: "Mining & Metals"

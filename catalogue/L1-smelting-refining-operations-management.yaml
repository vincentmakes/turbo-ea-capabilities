        children: []
  - id: BC-4450.60
    name: "Smelter Off-Gas & Acid Plant Operations"
    level: 2
    industry: "Mining & Metals"
    description: |
      Cleaning of smelter off-gas, sulphuric acid plant operations, and
      stack emissions monitoring.
    children:
      - id: BC-4450.60.10
        name: Off-Gas Cleaning
        level: 3
        industry: "Mining & Metals"
        description: |
          Operation of electrostatic precipitators, scrubbers, and cooling

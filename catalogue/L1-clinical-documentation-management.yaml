# Clinical Documentation Management
id: BC-2830
name: Clinical Documentation Management
level: 1
industry: Healthcare Providers
description: |
  Clinician documentation, computerised order entry, results review,
  decision support, documentation improvement, and EHR-mediated workflow
  underpinning the active record of patient care.
references:
  - https://www.hl7.org/fhir/
  - https://www.healthit.gov/
  - https://acdis.org/
  - https://www.himss.org/

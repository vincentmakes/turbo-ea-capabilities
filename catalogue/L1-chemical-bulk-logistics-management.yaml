# Chemical Bulk Logistics Management
id: BC-4480
name: Chemical Bulk Logistics Management
level: 1
industry: Chemicals
description: |
  Bulk chemical handling across tank farm, road, rail, marine, pipeline,
  and warehousing modes - including hazmat-compliant operations,
  tolling, and bulk custody-transfer measurement. Distinct from
  cross-industry Supply Chain (BC-520) and Transportation L1s, which
  cover generic and multi-modal freight at the network level.
references:
  - https://unece.org/transport/dangerous-goods/adr
  - https://www.imo.org/en/OurWork/Safety/Pages/DangerousGoods-default.aspx

        children: []
      - id: BC-4800.50.30
        name: Endowed Fund Stewardship
        level: 3
        industry: Education
        description: |
          Stewardship of donors of endowed and named funds.
        children: []
  - id: BC-4800.60
    name: Endowment-Related Donor Reporting
    level: 2
    industry: Education
    description: |
      Reporting to donors on the use, performance, and impact of restricted
      and endowed funds.
    in_scope:
      - Restricted fund use reporting
      - Named endowment performance reporting
      - Donor impact reporting
    out_of_scope:
      - Institutional financial reporting (covered under Cross-Industry Financial Management)
      - Endowment investment management itself (covered under Cross-Industry Treasury Management)
    children:

# Institutional Advancement & Alumni Management
id: BC-4800
name: "Institutional Advancement & Alumni Management"
level: 1
industry: Education
description: |
  Engagement with alumni communities, cultivation of donors, and management
  of fundraising campaigns, gifts, stewardship, and endowment-related donor
  reporting.
references:
  - https://www.case.org/
  - https://www.imsglobal.org/spec/clr
children:
  - id: BC-4800.10
    name: Alumni Engagement
    level: 2
    industry: Education
    description: |
      Engagement of alumni communities through programmes, events, and
      communications that sustain lifelong relationships with the institution.
    in_scope:
      - Alumni community operations
      - Alumni events and reunions
      - Alumni communications
    out_of_scope:
      - Career services for current students (covered under Student Support & Wellbeing Management)
    children:
      - id: BC-4800.10.10
        name: Alumni Community Operations
        level: 3
        industry: Education
        description: |
          Operation of alumni associations, chapters, and online communities.
        children: []
      - id: BC-4800.10.20
        name: "Alumni Events & Reunions"
        level: 3
        industry: Education
        description: |
          Planning and delivery of alumni events and reunions.
        children: []
      - id: BC-4800.10.30
        name: Alumni Communications
        level: 3
        industry: Education
        description: |
          Editorial and communications channels for alumni audiences.
        children: []
  - id: BC-4800.20
    name: Donor Relationship Management
    level: 2
    industry: Education
    description: |
      Identification, cultivation, and relationship management of prospective
      and existing donors.
    in_scope:
      - Prospect research and identification
      - Donor cultivation and solicitation
      - Major gift relationship management
    out_of_scope:
      - Generic CRM operations (covered under Cross-Industry Customer Relationship Management)
    children:
      - id: BC-4800.20.10
        name: "Prospect Research & Identification"
        level: 3
        industry: Education
        description: |
          Prospect research and identification of donor prospects.
        children: []
      - id: BC-4800.20.20
        name: "Donor Cultivation & Solicitation"
        level: 3
        industry: Education
        description: |
          Cultivation and solicitation of donor support.
        children: []
      - id: BC-4800.20.30
        name: Major Gift Relationship Management
        level: 3
        industry: Education
        description: |
          Bespoke relationship management for major-gift donors.
        children: []
  - id: BC-4800.30
    name: Fundraising Campaign Management
    level: 2
    industry: Education
    description: |
      Planning and operation of fundraising campaigns across annual giving,
      capital, and digital channels.
    in_scope:
      - Annual giving campaigns
      - Capital campaign management
      - Crowdfunding and peer-to-peer campaigns
    out_of_scope:
      - Marketing campaigns unrelated to fundraising (covered under Cross-Industry Marketing Management)
    children:
      - id: BC-4800.30.10
        name: Annual Giving Campaigns
        level: 3
        industry: Education
        description: |
          Operation of annual giving and recurring-gift campaigns.
        children: []
      - id: BC-4800.30.20
        name: Capital Campaign Management
        level: 3
        industry: Education
        description: |
          Management of multi-year capital campaigns.
        children: []
      - id: BC-4800.30.30
        name: "Crowdfunding & Peer-to-Peer Campaigns"
        level: 3
        industry: Education
        description: |
          Operation of crowdfunding and peer-to-peer fundraising campaigns.
        children: []
  - id: BC-4800.40
    name: "Gift & Pledge Administration"
    level: 2
    industry: Education
    description: |
      Receipt, recording, and administration of gifts and pledges including
      planned giving instruments.
    in_scope:
      - Gift receipt and processing
      - Pledge tracking
      - Planned and deferred gift administration
    out_of_scope:
      - General accounts receivable (covered under Cross-Industry Financial Management)
    children:
      - id: BC-4800.40.10
        name: "Gift Receipt & Processing"
        level: 3
        industry: Education
        description: |
          Receipt and processing of cash, cheque, online, and in-kind gifts.
        children: []
      - id: BC-4800.40.20
        name: Pledge Tracking
        level: 3
        industry: Education
        description: |
          Tracking of pledges and pledge-payment schedules.
        children: []
      - id: BC-4800.40.30
        name: "Planned & Deferred Gift Administration"
        level: 3
        industry: Education
        description: |
          Administration of bequests, charitable trusts, and other planned-giving instruments.
        children: []
  - id: BC-4800.50
    name: "Stewardship & Recognition"
    level: 2
    industry: Education
    description: |
      Stewardship of donor relationships through acknowledgement, recognition,
      and ongoing engagement of named-fund donors.
    in_scope:
      - Donor acknowledgement
      - Donor recognition programmes
      - Endowed-fund stewardship
    out_of_scope:
      - Public-relations communications (covered under Cross-Industry Corporate Communications Management)
    children:
      - id: BC-4800.50.10
        name: Donor Acknowledgement
        level: 3
        industry: Education
        description: |
          Acknowledgement of donor gifts and pledges.
        children: []
      - id: BC-4800.50.20

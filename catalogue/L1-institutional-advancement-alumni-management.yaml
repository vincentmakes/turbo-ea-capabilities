        children: []
      - id: BC-4800.60.20
        name: Named Endowment Performance Reporting
        level: 3
        industry: Education
        description: |
          Performance reporting for named endowed funds to their donors.
        children: []
      - id: BC-4800.60.30
        name: Donor Impact Reporting

        children: []
      - id: BC-3220.40.30
        name: Freedom of Information Request Handling
        level: 3
        industry: Public Sector & Government
        description: |
          Processing of freedom-of-information and access-to-records requests.
        children: []
  - id: BC-3220.50
    name: "Appeals & Ombudsman Management"
    level: 2
    industry: Public Sector & Government
    description: |
      Independent administrative review of agency decisions including appeals,

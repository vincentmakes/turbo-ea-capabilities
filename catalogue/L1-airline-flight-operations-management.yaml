# Airline Flight Operations Management
id: BC-4080
name: Airline Flight Operations Management
level: 1
industry: "Travel & Hospitality"
description: |
  Schedule planning, aircraft routing, crew planning, dispatch, gate and
  turnaround coordination, IROPS recovery, and flight performance and
  safety reporting for airline carriers.
references:
  - https://www.iata.org/
  - https://www.icao.int/
  - https://www.eurocontrol.int/
in_scope:
  - Flight schedule planning, slot coordination, and connection banks
  - Aircraft routing, tail assignment, and MEL tracking
  - Crew pairing, rostering, and FTL compliance
  - Flight dispatch and operations control
  - Gate allocation and turnaround coordination
  - Operational disruption (IROPS) decisions on aircraft and crew
  - Flight performance and safety-event reporting
out_of_scope:
  - Air traffic control by ANSPs (BC-1700)
  - Passenger reaccommodation flow at booking level (BC-4020.70)
  - Cargo flight handling (BC-3270)
children:

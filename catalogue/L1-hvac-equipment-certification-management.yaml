# HVAC Equipment Certification Management
id: BC-2030
name: HVAC Equipment Certification Management
level: 1
industry: "HVAC & Building Automation Systems"
description: |
  Multi-jurisdiction HVAC product certification — performance certification (AHRI, Eurovent),
  safety listing (UL, CSA, IEC 60335-2-40, CE marking), refrigerant approvals (F-Gas, EPA SNAP),
  and energy-efficiency labelling (ENERGY STAR, EU Ecodesign / ErP, MEPS) — through to mark
  licensing, label compliance, and standards surveillance.
in_scope:
  - Certification strategy and roadmap across markets
  - Performance certification submissions and rating publication
  - Equipment safety listing and CE conformity assessment
  - Refrigerant regulatory approval at product level
  - Energy & efficiency label registration and compliance
  - Mark licensing, label artwork compliance, and standards surveillance
out_of_scope:
  - Operational refrigerant accounting on installed equipment (BC-2040)
  - Generic electrical/electronic product certification (BC-1910)
  - Field non-conformance investigation arising from service (BC-2060)

# Public Finance & Budget Management
id: BC-3280
name: "Public Finance & Budget Management"
level: 1
industry: Public Sector & Government
description: |
  Public-sector budget formulation, appropriations execution, government
  fund accounting, public debt management, treasury operations, and IPSAS-
  aligned fiscal reporting and disclosure.
references:
  - https://www.ipsasb.org/
  - https://www.imf.org/en/Topics/fiscal-policies/government-finance-statistics
  - https://www.intosai.org/
  - https://www.oecd.org/governance/budgeting/
children:
  - id: BC-3280.10
    name: Budget Formulation
    level: 2
    industry: Public Sector & Government
    description: |
      Preparation of annual and multi-year budgets including ceilings,
      programme budgeting, and submission to legislative authority.
    in_scope:
      - Macro-fiscal forecasting
      - Programme budgeting and zero-based budgeting
      - Budget submission to legislature
    out_of_scope:
      - Corporate FP&A and management accounting (covered by Financial Planning & Analysis)
    children:
      - id: BC-3280.10.10
        name: Macro-Fiscal Forecasting
        level: 3
        industry: Public Sector & Government
        description: |
          Forecasting of revenue and expenditure aggregates and macro-fiscal scenarios.
        children: []
      - id: BC-3280.10.20
        name: Budget Ceiling Setting
        level: 3
        industry: Public Sector & Government
        description: |
          Setting of agency and programme budget ceilings within fiscal envelope.
        children: []
      - id: BC-3280.10.30
        name: Programme Budget Preparation
        level: 3
        industry: Public Sector & Government
        description: |
          Preparation of programme and performance budgets by spending agencies.
        children: []
      - id: BC-3280.10.40
        name: Budget Submission to Legislature
        level: 3
        industry: Public Sector & Government
        description: |
          Compilation and submission of executive budget to the legislature.
        children: []
  - id: BC-3280.20
    name: Appropriations Execution
    level: 2
    industry: Public Sector & Government
    description: |
      Allotment, apportionment, commitment, obligation, and outlay of
      appropriated funds in line with appropriations law.
    children:
      - id: BC-3280.20.10
        name: Allotment and Apportionment
        level: 3
        industry: Public Sector & Government
        description: |
          Apportionment and allotment of appropriations to spending agencies.
        children: []
      - id: BC-3280.20.20
        name: Commitment and Obligation Recording
        level: 3
        industry: Public Sector & Government
        description: |
          Recording of commitments and obligations against appropriations.
        children: []
      - id: BC-3280.20.30
        name: Expenditure and Outlay Processing
        level: 3
        industry: Public Sector & Government
        description: |
          Processing of expenditures and outlays against obligated funds.
        children: []
      - id: BC-3280.20.40
        name: Reprogramming and Transfer Authority
        level: 3
        industry: Public Sector & Government
        description: |
          Administration of reprogramming, transfers, and statutory authority adjustments.
        children: []
  - id: BC-3280.30
    name: Government Fund Accounting
    level: 2
    industry: Public Sector & Government
    description: |
      Accounting for government funds including general fund, special funds,
      trust funds, and revolving funds under IPSAS or national equivalents.
    children:
      - id: BC-3280.30.10
        name: Fund Structure Maintenance
        level: 3
        industry: Public Sector & Government
        description: |
          Maintenance of government fund structures and chart of accounts.
        children: []
      - id: BC-3280.30.20
        name: Fund-Level Accounting
        level: 3
        industry: Public Sector & Government
        description: |
          Posting and reconciliation of transactions across general, special, trust, and revolving funds.
        children: []
      - id: BC-3280.30.30
        name: Inter-Agency Settlement
        level: 3
        industry: Public Sector & Government
        description: |
          Settlement and reconciliation of inter-agency transfers and reimbursable agreements.
        children: []
  - id: BC-3280.40
    name: Public Debt Management
    level: 2
    industry: Public Sector & Government
    description: |
      Issuance, servicing, and risk management of sovereign and sub-sovereign
      debt instruments.
    children:
      - id: BC-3280.40.10
        name: Debt Strategy and Issuance Planning
        level: 3
        industry: Public Sector & Government
        description: |
          Setting of debt strategy and issuance calendars across instruments and tenors.
        children: []
      - id: BC-3280.40.20
        name: Debt Issuance Operations
        level: 3
        industry: Public Sector & Government
        description: |
          Auction, syndication, and direct issuance of government debt instruments.
        children: []
      - id: BC-3280.40.30
        name: Debt Servicing
        level: 3
        industry: Public Sector & Government
        description: |
          Coupon, interest, and principal repayment to debt holders.
        children: []
      - id: BC-3280.40.40
        name: Debt Portfolio Risk Management
        level: 3
        industry: Public Sector & Government
        description: |
          Management of currency, interest-rate, and refinancing risk in the debt portfolio.
        children: []
  - id: BC-3280.50
    name: Cash and Treasury Operations
    level: 2
    industry: Public Sector & Government
    description: |
      Government cash management, single-treasury-account operations, and
      payments and receipts processing on behalf of agencies.
    children:
      - id: BC-3280.50.10
        name: Cash Forecasting
        level: 3
        industry: Public Sector & Government
        description: |
          Daily and rolling forecasting of government cash flows.
        children: []
      - id: BC-3280.50.20
        name: Treasury Single Account Operations
        level: 3
        industry: Public Sector & Government
        description: |
          Operation of treasury single account and consolidated banking arrangements.
        children: []
      - id: BC-3280.50.30
        name: Government Payments Operations
        level: 3
        industry: Public Sector & Government
        description: |
          Disbursement of government payments on behalf of spending agencies.
        children: []
      - id: BC-3280.50.40
        name: Government Receipts Processing
        level: 3
        industry: Public Sector & Government
        description: |
          Processing of inbound government receipts and crediting to agencies.
        children: []
  - id: BC-3280.60
    name: Fiscal Reporting and Disclosure
    level: 2
    industry: Public Sector & Government
    description: |
      In-year and end-of-year fiscal reports, IPSAS financial statements, and
      COFOG / GFSM statistical reporting.
    children:
      - id: BC-3280.60.10
        name: In-Year Fiscal Reporting
        level: 3
        industry: Public Sector & Government
        description: |
          Production of monthly and quarterly fiscal reports against budget.
        children: []
      - id: BC-3280.60.20
        name: IPSAS Financial Statement Production
        level: 3
        industry: Public Sector & Government
        description: |
          Preparation of whole-of-government and entity IPSAS financial statements.
        children: []
      - id: BC-3280.60.30
        name: GFSM and COFOG Statistical Reporting
        level: 3
        industry: Public Sector & Government
        description: |
          Compilation of fiscal statistics under IMF GFSM and COFOG classifications.
        children: []
      - id: BC-3280.60.40
        name: Open Spending Disclosure
        level: 3
        industry: Public Sector & Government
        description: |
          Open-data publication of expenditure, transactions, and budget execution.
        children: []

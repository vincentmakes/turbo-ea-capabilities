# Water Treatment Operations Management
id: BC-3870
name: Water Treatment Operations Management
level: 1
industry: Power & Water Utilities
description: |
  Production of potable water at treatment works — process operation,
  drinking-water quality assurance, treatment-chemical management,
  treated-water storage, and management of treatment residuals against
  drinking-water regulations and WHO Water Safety Plan principles.
references:
  - https://www.iso.org/standard/37251.html
  - https://www.who.int/teams/environment-climate-change-and-health/water-sanitation-and-health/water-safety-and-quality/drinking-water-quality-guidelines
  - https://www.awwa.org/Publications/Standards
  - https://eur-lex.europa.eu/eli/dir/2020/2184/oj
children:

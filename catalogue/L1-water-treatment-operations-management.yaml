        children: []
  - id: BC-3870.30
    name: Drinking Water Quality Operations
    level: 2
    industry: Power & Water Utilities
    description: |
      Sampling, laboratory analysis, online surveillance, and
      regulatory reporting of drinking-water quality compliance.
    in_scope:
      - Statutory drinking-water sampling
      - Laboratory analysis of microbiological and chemical parameters
      - Drinking-water quality incident response
    out_of_scope:
      - Distribution-network water quality (BC-3880.50)
      - Wastewater effluent quality (BC-3890.70)
    children:
      - id: BC-3870.30.10
        name: Statutory Sampling Programme
        level: 3
        description: |
          Operation of statutory drinking-water sampling programmes at treatment works and supply points.
        children: []
      - id: BC-3870.30.20
        name: Treated Water Online Monitoring
        level: 3
        description: |
          Online monitoring of treated-water turbidity, chlorine residual, and other parameters.
        children: []
      - id: BC-3870.30.30
        name: Drinking Water Incident Response
        level: 3
        description: |
          Investigation and remediation of drinking-water quality incidents and exceedances.
        children: []
      - id: BC-3870.30.40
        name: Drinking Water Quality Reporting
        level: 3
        description: |
          Statutory reporting to drinking-water regulators (DWI, EPA, equivalents).
        children: []

# Professional Workforce Resourcing Management
id: BC-4320
name: Professional Workforce Resourcing Management
level: 1
industry: Professional Services
description: |
  Allocation, utilisation, leverage, and bench management of billable
  professionals across the engagement portfolio. Distinct from generic
  Human Capital Management — focused on the billable workforce as the
  firm's primary delivery resource.
references:
  - https://www.spiresearch.com/professional-services-maturity-benchmark/

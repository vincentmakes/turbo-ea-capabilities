# Building Automation System Engineering Management
id: BC-2010
name: Building Automation System Engineering Management
level: 1
industry: "HVAC & Building Automation Systems"
description: |
  Product engineering of BAS controllers, field devices, supervisor software,
  reusable control sequence libraries, communication protocol stacks, semantic
  data models, and BAS cybersecurity — anchored on ISO 16484 / ASHRAE 135 (BACnet)
  and ASHRAE Guideline 36.
in_scope:
  - Application-specific BAS controller and field-device product engineering
  - Supervisor server, alarm, and trend-historian software engineering
  - Reusable sequence-of-operation libraries (Guideline 36 and advanced control)
  - BACnet, KNX, LonWorks, Modbus, DALI, OPC UA, MQTT protocol stacks
  - Brick / Haystack semantic data modelling
  - Secure-by-design BAS controllers and BAS-network cybersecurity
out_of_scope:
  - Generic electronic product engineering covered by BC-1900
  - Project-level points lists and sequence customisation (BC-2020)
  - HVAC mechanical equipment engineering (BC-2000)
  - Site commissioning and service operations (BC-2050, BC-2060)

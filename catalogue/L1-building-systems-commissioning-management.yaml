# Building Systems Commissioning Management
id: BC-2050
name: Building Systems Commissioning Management
level: 1
industry: "HVAC & Building Automation Systems"
description: |
  Commissioning of HVAC and BAS systems as a deliverable service — initial commissioning,
  retrocommissioning, recommissioning, and monitoring-based commissioning. Anchored on
  ASHRAE Guideline 0 / Guideline 1.1 total building commissioning process.
in_scope:
  - Owner's project requirements and basis-of-design review
  - Pre-functional installation verification and start-up inspection
  - Functional performance testing of HVAC and BAS systems
  - Sequence-of-operation verification and integrated systems testing
  - Retrocommissioning, recommissioning, and monitoring-based commissioning
  - Cx documentation, systems manuals, and owner training delivery
out_of_scope:
  - Project-level engineering integration design (BC-2020)
  - Ongoing service operations after handover (BC-2060)
  - Generic engineering-project commissioning of capital plant (BC-1160)

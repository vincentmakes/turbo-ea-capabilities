# Chemical Process Safety Management
id: BC-4440
name: Chemical Process Safety Management
level: 1
industry: Chemicals
description: |
  Prevention of major-accident hazards in reactive, flammable, and toxic
  chemical processes - process hazard analysis, mechanical integrity,
  safety instrumented systems, reactive and combustible hazards,
  performance reporting, and emergency response. Distinct from
  cross-industry HSE management (BC-730), which retains occupational
  health, environment, and personal-safety scope.
references:
  - https://www.osha.gov/process-safety-management
  - https://www.aiche.org/ccps
  - https://environment.ec.europa.eu/topics/industrial-emissions-and-safety/major-accident-hazards-seveso_en
  - https://webstore.iec.ch/publication/61289
children:
  - id: BC-4440.10
    name: Process Hazard Analysis
    level: 2
    industry: Chemicals
    description: |
      Structured identification and analysis of major-accident hazards
      across the asset life cycle.
    in_scope:
      - HAZID, HAZOP, LOPA, and bow-tie analysis
      - Quantitative risk assessment
    out_of_scope:
      - Personal safety risk assessment (BC-730)
    children:
      - id: BC-4440.10.10
        name: HAZOP Studies
        level: 3
        industry: Chemicals
        description: |
          Hazard and Operability studies on new and modified facilities.
        children: []
      - id: BC-4440.10.20
        name: HAZID Studies
        level: 3
        industry: Chemicals
        description: |
          Hazard Identification studies during early concept and design phases.
        children: []
      - id: BC-4440.10.30
        name: LOPA Studies
        level: 3
        industry: Chemicals
        description: |
          Layer-of-Protection Analysis to define safety integrity levels.
        children: []
      - id: BC-4440.10.40
        name: Bow-Tie Analysis
        level: 3
        industry: Chemicals
        description: |
          Bow-tie analysis to map barriers against major accident scenarios.
        children: []
      - id: BC-4440.10.50
        name: Quantitative Risk Assessment
        level: 3
        industry: Chemicals
        description: |
          Quantitative risk assessment of major-accident hazard scenarios.
        children: []
  - id: BC-4440.20
    name: Mechanical Integrity Management
    level: 2
    industry: Chemicals
    description: |

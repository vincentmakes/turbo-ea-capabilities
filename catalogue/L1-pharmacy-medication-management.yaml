# Pharmacy & Medication Management
id: BC-2850
name: "Pharmacy & Medication Management"
level: 1
industry: Healthcare Providers
description: |
  Provider-side pharmacy operations including formulary, inpatient and
  outpatient dispensing, medication administration and reconciliation,
  controlled-substance stewardship, and pharmacy clinical services.
references:
  - https://www.ashp.org/
  - https://www.ncpdp.org/
  - https://www.usp.org/healthcare-quality-safety
  - https://www.deadiversion.usdoj.gov/
  - https://www.fda.gov/drugs
children:
  - id: BC-2850.10
    name: Formulary Management
    level: 2
    industry: Healthcare Providers
    description: |
      Management of the medication formulary, therapeutic interchange, and
      drug-shortage response.
    children:
      - id: BC-2850.10.10
        name: Formulary Decision Making
        level: 3
        industry: Healthcare Providers
        description: |
          Evidence-based formulary inclusion, exclusion, and tier decisions.
        children: []
      - id: BC-2850.10.20
        name: Therapeutic Interchange
        level: 3
        industry: Healthcare Providers
        description: |
          Therapeutic interchange protocol management and execution.
        children: []
      - id: BC-2850.10.30
        name: "Pharmacy & Therapeutics Committee Support"
        level: 3
        industry: Healthcare Providers
        description: |

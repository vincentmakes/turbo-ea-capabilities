# Programming & Scheduling Management
id: BC-3730
name: "Programming & Scheduling Management"
level: 1
industry: "Media, Entertainment & Telecom Content"
description: |
  Linear channel scheduling, electronic programme guide management, on-demand
  catalogue curation, transmission playlist and continuity, and reconciliation
  of programming demand to rights and acquisition pipelines.
references:
  - https://www.dvb.org/standards
  - https://www.atsc.org/atsc-standards/
  - https://www.ebu.ch/guides/open/Pages/EBU-Tech-3293.aspx
children:
  - id: BC-3730.10
    name: Linear Channel Scheduling
    level: 2
    industry: "Media, Entertainment & Telecom Content"
    description: |
      Long-range, tactical, and change scheduling of linear channels and
      streams.
    children:
      - id: BC-3730.10.10
        name: Long-Range Schedule Planning
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Multi-quarter and seasonal schedule plans aligned with rights windows
          and audience strategy.
        children: []
      - id: BC-3730.10.20
        name: Tactical Schedule Build
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Week-of-air schedule build down to programme and break level.
        children: []
      - id: BC-3730.10.30
        name: Schedule Change Management
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Controlled handling of late and emergency schedule changes with
          downstream notification.
        children: []
  - id: BC-3730.20
    name: Electronic Programme Guide Management
    level: 2
    industry: "Media, Entertainment & Telecom Content"
    description: |
      Authoring, distribution, and update of electronic programme guide data
      to operators and consumer devices.
    children:
      - id: BC-3730.20.10
        name: EPG Data Authoring
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Authoring of EPG titles, synopses, ratings, and event metadata for
          publication.
        children: []
      - id: BC-3730.20.20
        name: EPG Distribution to Operators
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Distribution of EPG feeds to platform operators, aggregators, and
          consumer device platforms.
        children: []
      - id: BC-3730.20.30
        name: EPG Realtime Update Management
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Realtime updates to EPG data for live overruns, sport, and breaking
          news.
        children: []
  - id: BC-3730.30
    name: On-Demand Catalogue Curation
    level: 2
    industry: "Media, Entertainment & Telecom Content"
    description: |
      Curation of titles, collections, and personalisation rules across
      on-demand and streaming surfaces.
    children:
      - id: BC-3730.30.10
        name: "Title Selection & Curation"
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Selection and editorial framing of titles in the on-demand catalogue
          including territorial availability.
        children: []
      - id: BC-3730.30.20
        name: Editorial Collection Management
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Authoring and lifecycle of editorial collections, themes, and rows
          surfaced to viewers.
        children: []
      - id: BC-3730.30.30
        name: Personalisation Rule Authoring
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Authoring of business rules that govern personalisation alongside
          machine-learning recommendations.
        children: []
  - id: BC-3730.40
    name: "Playlist & Continuity Management"
    level: 2
    industry: "Media, Entertainment & Telecom Content"
    description: |
      Build of transmission playlists and on-air continuity for linear and
      24/7 streaming channels.
    children:
      - id: BC-3730.40.10
        name: Transmission Playlist Build
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Build of timed transmission playlists for playout including breaks
          and inter-stitial elements.
        children: []
      - id: BC-3730.40.20
        name: "Continuity & Junction Management"
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Authoring and management of continuity announcements, idents, and
          junction packages.
        children: []
      - id: BC-3730.40.30
        name: "Compliance Cut & Insertion Management"
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Application of compliance cuts and version inserts required for the
          target channel and time slot.
        children: []
  - id: BC-3730.50
    name: Programme Acquisition Slot Planning
    level: 2
    industry: "Media, Entertainment & Telecom Content"
    description: |
      Translation of programming slot demand into acquisition wishlists and
      reconciliation of acquired rights to schedule needs.
    children:
      - id: BC-3730.50.10
        name: Slot Demand Planning
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Quantification of slot demand by genre, daypart, and audience target
          across the schedule horizon.
        children: []
      - id: BC-3730.50.20
        name: Acquisition Wishlist Management
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Wishlist of titles, formats, and packages prioritised for acquisition
          to fill identified slots.
        children: []
      - id: BC-3730.50.30
        name: Programming-to-Rights Reconciliation
        level: 3
        industry: "Media, Entertainment & Telecom Content"
        description: |
          Reconciliation of programmed plays to held rights, runs, and window
          consumption.
        children: []

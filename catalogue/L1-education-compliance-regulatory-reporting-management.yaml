  - id: BC-4810.50
    name: International Student Compliance
    level: 2
    industry: Education
    description: |
      Visa-sponsorship compliance and statutory tracking of international
      students under regimes such as SEVIS and the UK Student Route.
    in_scope:
      - SEVIS / I-20 compliance operations
      - Student visa reporting (UK Student Route, equivalents)
      - International student tracking and reporting
    out_of_scope:
      - Initial visa-sponsorship documentation issuance (covered under Student Recruitment & Admissions Management)
    children:
      - id: BC-4810.50.10
        name: "SEVIS / I-20 Compliance Operations"
        level: 3
        industry: Education
        description: |

# Education Compliance & Regulatory Reporting Management
id: BC-4810
name: "Education Compliance & Regulatory Reporting Management"
level: 1
industry: Education
description: |
  Education-sector-specific regulatory compliance and statutory reporting,
  including student-data privacy, civil-rights regimes, special-education
  statutory obligations, international-student visa compliance, and public-
  funding compliance. Sits alongside Cross-Industry Compliance Management
  for general regulatory obligations.
references:
  - https://www2.ed.gov/policy/gen/guid/fpco/ferpa/index.html
  - https://www.ftc.gov/legal-library/browse/rules/childrens-online-privacy-protection-rule-coppa
  - https://nces.ed.gov/ipeds/
  - https://www.hesa.ac.uk/
  - https://sites.ed.gov/idea/
  - https://www2.ed.gov/about/offices/list/ocr/index.html
  - https://www.ice.gov/sevis
children:
  - id: BC-4810.10
    name: Student Data Privacy Compliance
    level: 2
    industry: Education
    description: |
      Compliance with sector-specific student-data privacy regimes including
      FERPA, COPPA, and equivalent regimes.
    in_scope:
      - FERPA compliance operations
      - COPPA compliance operations
      - Student data sharing agreement management
    out_of_scope:
      - General data protection (covered under Cross-Industry Information & Data Management)
    children:
      - id: BC-4810.10.10
        name: FERPA Compliance Operations
        level: 3
        industry: Education
        description: |
          Day-to-day FERPA compliance, consents, and disclosures.
        children: []
      - id: BC-4810.10.20
        name: COPPA Compliance Operations
        level: 3
        industry: Education
        description: |
          COPPA compliance for services aimed at children under 13.
        children: []
      - id: BC-4810.10.30
        name: Student Data Sharing Agreement Management
        level: 3
        industry: Education
        description: |
          Negotiation and management of student-data sharing agreements with vendors.
        children: []
  - id: BC-4810.20
    name: Statutory Education Reporting
    level: 2
    industry: Education
    description: |
      Submission of statutory education statistics and performance returns
      to national, state, and local authorities.
    in_scope:
      - National statistics submission (e.g. IPEDS, HESA)
      - State and local education authority returns
      - Funding and performance disclosure
    out_of_scope:
      - Internal performance reporting (covered under Academic Quality & Accreditation Management)
    children:
      - id: BC-4810.20.10
        name: National Statistics Submission
        level: 3
        industry: Education
        description: |
          Submission of returns to national education statistics agencies.
        children: []
      - id: BC-4810.20.20
        name: "State & Local Education Authority Returns"
        level: 3
        industry: Education
        description: |
          Returns to state, provincial, and local education authorities.
        children: []
      - id: BC-4810.20.30
        name: "Funding & Performance Disclosure"
        level: 3
        industry: Education
        description: |
          Public disclosure of funding use and education performance metrics.
        children: []
  - id: BC-4810.30
    name: Civil Rights Compliance
    level: 2
    industry: Education
    description: |
      Compliance with education-specific civil-rights regimes including
      Title IX, Section 504, and ADA in the academic context.
    in_scope:
      - Title IX investigation and reporting
      - Section 504 / ADA compliance
      - Non-discrimination policy enforcement
    out_of_scope:
      - Day-to-day accommodations (covered under Student Support & Wellbeing Management)
    children:
      - id: BC-4810.30.10
        name: "Title IX Investigation & Reporting"
        level: 3
        industry: Education
        description: |
          Title IX intake, investigation, hearing, and statutory reporting.
        children: []
      - id: BC-4810.30.20
        name: "Section 504 / ADA Compliance"
        level: 3
        industry: Education
        description: |
          Section 504 and ADA compliance in the academic and admissions context.
        children: []
      - id: BC-4810.30.30
        name: Non-Discrimination Policy Enforcement
        level: 3
        industry: Education
        description: |
          Enforcement of education non-discrimination policies and complaints handling.
        children: []
  - id: BC-4810.40
    name: Special Education Compliance
    level: 2
    industry: Education
    description: |
      Compliance with statutory special-education regimes covering school-age
      and early-intervention populations.
    in_scope:
      - IDEA Part B compliance
      - IDEA Part C / early-intervention compliance
      - Equivalent SEN/ALN statutory compliance
    out_of_scope:
      - Delivery of special-education services (covered under Student Support & Wellbeing Management)
    children:

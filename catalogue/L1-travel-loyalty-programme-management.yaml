# Travel Loyalty Programme Management
id: BC-4050
name: Travel Loyalty Programme Management
level: 1
industry: "Travel & Hospitality"
description: |
  Design and operation of traveller loyalty programmes — tier
  architecture, earn and burn engines, partner accruals, status
  management, and member communications — independent of the underlying
  guest record and channel platforms.
references:
  - https://htng.org/
  - https://opentravel.org/
  - https://www.iata.org/
in_scope:
  - Programme tier architecture and benefit catalogue
  - Earn and burn engines, including partner accrual
  - Tier qualification, retention, and soft-landing
  - Member communications and milestone recognition operations
out_of_scope:
  - Guest profile and identity (BC-4040)
  - On-property recognition delivery (BC-4040.40)
  - Marketing channel execution (BC-410)

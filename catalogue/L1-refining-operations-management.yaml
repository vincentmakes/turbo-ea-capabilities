# Refining Operations Management
id: BC-3080
name: Refining Operations Management
level: 1
industry: "Oil & Gas"
description: |
  Operation of crude oil refineries - distillation, conversion,
  treating, blending, refinery economics, catalyst management, and
  turnaround coordination.
references:
  - https://www.api.org/products-and-services/standards
  - https://www.iso.org/standard/67773.html
  - https://www.osha.gov/process-safety-management
children:

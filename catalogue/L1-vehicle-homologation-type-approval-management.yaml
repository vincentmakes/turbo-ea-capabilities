# Vehicle Homologation & Type Approval Management
id: BC-3420
name: "Vehicle Homologation & Type Approval Management"
level: 1
industry: "Automotive & Mobility"
description: |
  Regulatory certification of vehicles and major components across markets —
  UNECE WP.29 type approval, FMVSS self-certification, regional approvals
  (CCC, KS, MLIT), emissions and energy homologation, crash and consumer
  rating programmes, and conformity-of-production audits.
references:
  - https://unece.org/transport/vehicle-regulations
  - https://eur-lex.europa.eu/eli/reg/2018/858/oj
  - https://www.ecfr.gov/current/title-49/subtitle-B/chapter-V/part-571
  - https://www.euroncap.com/en
  - https://www.iihs.org/

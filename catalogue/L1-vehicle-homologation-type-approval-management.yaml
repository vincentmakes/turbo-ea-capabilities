  - id: BC-3420.50
    name: Functional and Cyber Approval
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Type approval activities specific to UN R155 cybersecurity, UN R156
      software updates, and UN R157 ALKS / ADS, complementing the engineering
      activities under Vehicle Engineering Management.
    in_scope:
      - CSMS audits and type approval
      - SUMS audits and type approval
      - ALKS / ADS regulatory submissions
    out_of_scope:
      - Cybersecurity engineering activities (BC-3400.80)
      - Vehicle SOC operations (BC-3460.60)
    children:
      - id: BC-3420.50.10
        name: CSMS Type Approval Management
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Type approval of the cybersecurity management system per UN R155
          including audit preparation and surveillance.
        children: []
      - id: BC-3420.50.20
        name: SUMS Type Approval Management
        level: 3
        industry: "Automotive & Mobility"
        description: |

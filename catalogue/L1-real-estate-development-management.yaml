# Real Estate Development Management
id: BC-4900
name: Real Estate Development Management
level: 1
industry: Real Estate
description: |
  Origination, feasibility, entitlement, financing, and delivery oversight
  for new-build and major-redevelopment real-estate projects across
  commercial and residential sectors. Owner-side discipline that brackets
  generic construction execution (BC-1150) with the upstream (site,
  entitlement, programme, dev finance) and downstream (lease-up,
  stabilisation) work specific to real-estate development.
references:
  - https://www.rics.org/profession-standards
  - https://www.iccsafe.org/
  - https://www.usgbc.org/leed
  - https://breeam.com/
  - https://www.fhwa.dot.gov/environment/nepa/
in_scope:
  - Site sourcing, market analysis, and pipeline tracking
  - Highest-and-best-use and pro-forma feasibility
  - Zoning, entitlements, planning consent, building permits
  - Master planning and concept design oversight
  - Development finance structuring including JV equity and construction debt
  - Owner-side construction monitoring, change orders, and delivery oversight
  - Pre-leasing, opening, and lease-up to stabilised occupancy
out_of_scope:
  - Construction execution by GC and trades (BC-1150)
  - Acquisition of standing assets (BC-4930)
  - Standing-asset business plans and capex (BC-4920)
  - Corporate occupier development for own use (BC-710)

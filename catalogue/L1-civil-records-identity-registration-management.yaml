# Civil Records & Identity Registration Management
id: BC-3290
name: "Civil Records & Identity Registration Management"
level: 1
industry: Public Sector & Government
description: |
  Authoritative registration and stewardship of civil and statutory records
  including vital events, national identity, business and entity registries,
  and land cadastre, together with authentication, disclosure, and privacy
  controls.
references:
  - https://unstats.un.org/unsd/demographic-social/crvs/
  - https://pages.nist.gov/800-63-3/
  - https://www.eid.as/
children:
  - id: BC-3290.10
    name: Vital Records Management
    level: 2
    industry: Public Sector & Government
    description: |
      Registration of vital events including births, deaths, marriages, civil
      partnerships, and divorces.
    in_scope:
      - Birth, death, marriage, and divorce registration
      - Vital events certification
      - Vital statistics extraction
    out_of_scope:
      - National identity number issuance (covered under National Identity Registration)
    children:
      - id: BC-3290.10.10
        name: Birth Registration
        level: 3
        industry: Public Sector & Government
        description: |
          Registration of births and issuance of birth certificates.
        children: []
      - id: BC-3290.10.20
        name: Death Registration
        level: 3
        industry: Public Sector & Government
        description: |
          Registration of deaths and issuance of death certificates.
        children: []
      - id: BC-3290.10.30
        name: Marriage and Civil Partnership Registration
        level: 3
        industry: Public Sector & Government
        description: |
          Registration of marriages and civil partnerships and certificate issuance.
        children: []
      - id: BC-3290.10.40
        name: Divorce and Annulment Registration
        level: 3
        industry: Public Sector & Government
        description: |
          Registration of divorces, annulments, and decree absolutes.
        children: []
  - id: BC-3290.20
    name: National Identity Registration
    level: 2
    industry: Public Sector & Government
    description: |

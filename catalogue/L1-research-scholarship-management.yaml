# Research & Scholarship Management
id: BC-4780
name: "Research & Scholarship Management"
level: 1
industry: Education
description: |
  Higher-education research mission management covering portfolio strategy,
  grant lifecycle, ethics and integrity oversight, scholarly output, research
  collaboration, and impact assessment.
references:
  - https://www.hhs.gov/ohrp/regulations-and-policy/index.html
  - https://orcid.org/
  - https://www.doi.org/
  - https://www.hesa.ac.uk/
  - https://www.coalition-s.org/
children:
  - id: BC-4780.10
    name: "Research Portfolio & Strategy"
    level: 2
    industry: Education
    description: |
      Strategic shaping of the institution's research portfolio across themes,
      centres, and capability investments.
    in_scope:
      - Research theme and centre strategy
      - Research capability investment planning
      - Research performance reporting
    out_of_scope:
      - Generic project portfolio management (covered under Cross-Industry Project Portfolio Management)
    children:
      - id: BC-4780.10.10
        name: "Research Theme & Centre Strategy"
        level: 3
        industry: Education
        description: |
          Strategy for research themes, centres, and institutes.
        children: []
      - id: BC-4780.10.20
        name: Research Capability Investment Planning
        level: 3
        industry: Education
        description: |
          Planning of research capability investments including infrastructure and personnel.
        children: []
      - id: BC-4780.10.30
        name: Research Performance Reporting
        level: 3
        industry: Education
        description: |
          Internal and external reporting of research performance.
        children: []
  - id: BC-4780.20
    name: Research Grant Management
    level: 2
    industry: Education
    description: |
      End-to-end management of research grants and contracts, from
      opportunity identification through post-award administration.
    in_scope:
      - Grant opportunity identification
      - Pre-award proposal development
      - Post-award grant administration
    out_of_scope:
      - General financial management (covered under Cross-Industry Financial Management)
    children:
      - id: BC-4780.20.10
        name: Grant Opportunity Identification
        level: 3
        industry: Education
        description: |
          Identification of grant and funding opportunities for researchers.
        children: []
      - id: BC-4780.20.20
        name: Pre-Award Proposal Development
        level: 3
        industry: Education
        description: |
          Development of grant proposals, costings, and submission packages.
        children: []
      - id: BC-4780.20.30
        name: Post-Award Grant Administration
        level: 3
        industry: Education
        description: |
          Post-award administration of awarded grants including reporting and compliance.
        children: []
  - id: BC-4780.30
    name: "Research Ethics & Integrity Oversight"
    level: 2
    industry: Education
    description: |
      Independent oversight of research ethics and integrity, including human
      and animal research review and misconduct investigation.
    in_scope:
      - Human subjects research review (IRB/REC)
      - Animal research oversight (IACUC/AWERB)
      - Research misconduct investigation
    out_of_scope:
      - Academic-misconduct (assessment) cases (covered under Assessment & Examinations Management)
    children:
      - id: BC-4780.30.10
        name: Human Subjects Research Review
        level: 3
        industry: Education
        description: |
          Independent review of research involving human subjects.
        children: []
      - id: BC-4780.30.20
        name: Animal Research Oversight
        level: 3
        industry: Education
        description: |
          Oversight of research involving animal subjects.
        children: []
      - id: BC-4780.30.30
        name: Research Misconduct Investigation
        level: 3
        industry: Education
        description: |
          Investigation of allegations of research misconduct.
        children: []
  - id: BC-4780.40
    name: "Scholarly Output & Publication Management"
    level: 2
    industry: Education
    description: |
      Tracking and stewardship of scholarly output including publications,
      open access, and persistent identifiers.
    in_scope:
      - Publication tracking
      - Open-access and repository management
      - Persistent identifier management (ORCID, DOI)
    out_of_scope:
      - Intellectual property commercialisation (covered under Cross-Industry Intellectual Property Management)
    children:
      - id: BC-4780.40.10
        name: Publication Tracking
        level: 3
        industry: Education
        description: |
          Tracking of researcher publications and outputs.
        children: []
      - id: BC-4780.40.20
        name: "Open-Access & Repository Management"
        level: 3
        industry: Education
        description: |
          Management of open-access publishing and institutional repositories.
        children: []
      - id: BC-4780.40.30
        name: Persistent Identifier Management
        level: 3
        industry: Education
        description: |
          Management of researcher and output persistent identifiers.
        children: []
  - id: BC-4780.50
    name: "Research Collaboration & Partnership Management"
    level: 2
    industry: Education
    description: |
      Establishment and operation of research partnerships across academia,
      industry, and international collaborators.
    in_scope:
      - Inter-institutional research agreements
      - Industry research partnerships
      - International research collaboration
    out_of_scope:
      - Commercial supplier relationships (covered under Cross-Industry Supplier Management)
    children:
      - id: BC-4780.50.10
        name: Inter-Institutional Research Agreement Management
        level: 3
        industry: Education
        description: |
          Management of research agreements with peer institutions.
        children: []
      - id: BC-4780.50.20
        name: Industry Research Partnership Management
        level: 3
        industry: Education
        description: |
          Management of industry research partnerships and sponsored research.
        children: []
      - id: BC-4780.50.30
        name: International Research Collaboration
        level: 3
        industry: Education
        description: |
          Establishment and operation of international research collaborations.
        children: []
  - id: BC-4780.60
    name: "Research Impact & Assessment"
    level: 2
    industry: Education
    description: |
      Assessment of research impact through case studies, bibliometrics, and
      participation in national research-assessment exercises.
    in_scope:
      - Research impact case studies
      - Bibliometric and altmetric analysis
      - National research assessment submission (e.g. REF)
    out_of_scope:
      - Academic accreditation reviews (covered under Academic Quality & Accreditation Management)
    children:
      - id: BC-4780.60.10
        name: Research Impact Case Studies
        level: 3
        industry: Education
        description: |
          Development of research impact case studies.
        children: []
      - id: BC-4780.60.20
        name: "Bibliometric & Altmetric Analysis"
        level: 3
        industry: Education
        description: |
          Bibliometric and altmetric analysis of research output and reach.
        children: []
      - id: BC-4780.60.30
        name: National Research Assessment Submission
        level: 3
        industry: Education
        description: |
          Submission to national research-assessment exercises.
        children: []

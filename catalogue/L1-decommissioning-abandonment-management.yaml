        name: Topsides Removal Execution
        level: 3
        industry: "Oil & Gas"
        description: |
          Execution of single-lift, modular, or piece-small topsides removal.
        children: []
      - id: BC-3120.20.30
        name: Subsea Equipment Recovery
        level: 3
        industry: "Oil & Gas"
        description: |
          Recovery of subsea trees, manifolds, jumpers, and umbilicals.
        children: []
  - id: BC-3120.30
    name: Pipeline Decommissioning
    level: 2
    industry: "Oil & Gas"
    description: |

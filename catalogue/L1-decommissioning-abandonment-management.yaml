# Decommissioning & Abandonment Management
id: BC-3120
name: "Decommissioning & Abandonment Management"
level: 1
industry: "Oil & Gas"
description: |
  Late-life management of petroleum assets - well plug and abandonment,
  facility decommissioning, pipeline decommissioning, site restoration,
  decommissioning liability provisioning, and post-closure monitoring.
references:
  - https://www.iogp.org/
  - https://www.api.org/products-and-services/standards
  - https://www.iso.org/standard/61788.html
children:
  - id: BC-3120.10
    name: "Well Plug & Abandonment Operations"
    level: 2
    industry: "Oil & Gas"
    description: |
      Design and execution of permanent well plug and abandonment campaigns.
    in_scope:
      - P&A design and barrier verification
      - Plug-and-abandon execution operations
      - Wellhead and conductor severance and recovery
    out_of_scope:
      - Producing-well integrity surveillance (BC-3020.50)
    children:
      - id: BC-3120.10.10
        name: "Plug & Abandonment Design"
        level: 3
        industry: "Oil & Gas"
        description: |
          Design of permanent barrier configurations for well abandonment.
        children: []
      - id: BC-3120.10.20
        name: "Plug & Abandonment Execution"
        level: 3
        industry: "Oil & Gas"
        description: |
          Execution of cementing, plug placement, and barrier verification operations.
        children: []
      - id: BC-3120.10.30
        name: "Wellhead Severance & Recovery"
        level: 3
        industry: "Oil & Gas"
        description: |
          Severance and recovery of wellheads, conductors, and casing strings.
        children: []
  - id: BC-3120.20
    name: Surface Facility Decommissioning
    level: 2
    industry: "Oil & Gas"
    description: |

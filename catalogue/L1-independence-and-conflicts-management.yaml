# Independence and Conflicts Management
id: BC-4350
name: Independence and Conflicts Management
level: 1
industry: Professional Services
description: |
  Auditor independence, professional conflicts of interest, ethical-wall
  operation, personal interest declarations, and engagement acceptance and
  continuance clearance distinctive to professional services firms.
references:
  - https://www.ifac.org/who-we-are/our-purpose/iesba-code-ethics
  - https://www.americanbar.org/groups/professional_responsibility/publications/model_rules_of_professional_conduct/
  - https://www.aicpa-cima.com/resources/landing/code-of-professional-conduct
  - https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32014R0537
children:
  - id: BC-4350.10
    name: Auditor Independence Management
    level: 2
    industry: Professional Services
    description: |
      Application of audit-firm independence rules including prohibited
      services, partner rotation, fee-dependence limits, and PIE-specific
      requirements.
    children:
      - id: BC-4350.10.10
        name: Audit Client Identification
        level: 3
        industry: Professional Services
        description: |
          Identification and maintenance of the population of restricted
          audit clients including affiliates and beneficial relationships.
        children: []
      - id: BC-4350.10.20
        name: Prohibited Service Pre-Clearance
        level: 3
        industry: Professional Services
        description: |
          Pre-clearance of non-audit services to audit clients against
          prohibited-services lists.
        children: []
      - id: BC-4350.10.30
        name: Audit Partner Rotation Management
        level: 3
        industry: Professional Services
        description: |
          Rotation tracking and enforcement for engagement partners and
          EQR partners on audit clients.
        children: []
      - id: BC-4350.10.40
        name: Fee Dependence Monitoring
        level: 3
        industry: Professional Services
        description: |
          Monitoring of audit and total fees relative to firm income to
          identify fee-dependence threats.
        children: []
  - id: BC-4350.20
    name: Conflicts of Interest Management
    level: 2
    industry: Professional Services
    description: |
      Identification, evaluation, and resolution of conflicts of interest
      between engagements, between clients, and between client and firm
      interests.
    children:
      - id: BC-4350.20.10
        name: Conflict Search and Identification
        level: 3
        industry: Professional Services
        description: |
          Searching of client and matter records to identify potential
          conflicts on prospective engagements.
        children: []
      - id: BC-4350.20.20
        name: Conflict Evaluation and Categorisation
        level: 3
        industry: Professional Services
        description: |
          Evaluation of identified conflicts against firm policy and
          professional rules to determine conflict category and treatment.
        children: []
      - id: BC-4350.20.30
        name: Conflict Resolution and Waiver Management
        level: 3
        industry: Professional Services
        description: |
          Resolution of conflicts including obtaining informed consent,
          waivers, and engagement declination as appropriate.
        children: []
  - id: BC-4350.30
    name: Information Barrier Management
    level: 2
    industry: Professional Services
    description: |
      Design, deployment, and operation of ethical walls, information
      barriers, and screening arrangements for sensitive engagements.
    children:
      - id: BC-4350.30.10
        name: Information Barrier Design
        level: 3
        industry: Professional Services
        description: |
          Definition of barrier scope, screened personnel, and physical or
          system controls for an engagement.
        children: []
      - id: BC-4350.30.20
        name: Information Barrier Deployment
        level: 3
        industry: Professional Services
        description: |
          Operational deployment of access restrictions in document, email,
          and practice systems.
        children: []
      - id: BC-4350.30.30
        name: Barrier Breach Detection and Response
        level: 3
        industry: Professional Services
        description: |
          Detection and response to potential or actual barrier breaches
          including escalation and remediation.
        children: []
  - id: BC-4350.40
    name: Personal Interest and Relationship Management
    level: 2
    industry: Professional Services
    description: |
      Capture, declaration, and monitoring of personal financial interests,
      family relationships, and prior employment that may threaten
      independence or create conflicts.
    children:
      - id: BC-4350.40.10
        name: Personal Investment Declaration
        level: 3
        industry: Professional Services
        description: |
          Capture and maintenance of partner and staff personal investment
          declarations against the restricted-entities list.
        children: []
      - id: BC-4350.40.20
        name: Family and Close-Association Declaration
        level: 3
        industry: Professional Services
        description: |
          Capture of declarations covering close family members and other
          close associations relevant to independence.
        children: []
      - id: BC-4350.40.30
        name: Prior Employment and Cooling-Off Tracking
        level: 3
        industry: Professional Services
        description: |
          Tracking of prior employment with audit clients and cooling-off
          periods before engagement involvement.
        children: []
  - id: BC-4350.50
    name: Engagement Acceptance Clearance
    level: 2
    industry: Professional Services
    description: |
      Workflow combining independence, conflicts, and integrity clearances
      into a single decision input feeding engagement acceptance.
    children:
      - id: BC-4350.50.10
        name: Clearance Workflow Coordination
        level: 3
        industry: Professional Services
        description: |
          Orchestration of independence, conflicts, and AML clearances
          required before engagement acceptance.
        children: []
      - id: BC-4350.50.20
        name: Clearance Decision Recording
        level: 3
        industry: Professional Services
        description: |
          Recording of clearance decisions, conditions, and rationale on
          the engagement file.
        children: []
      - id: BC-4350.50.30
        name: Continuance Re-Clearance Management
        level: 3
        industry: Professional Services
        description: |
          Periodic re-clearance of independence and conflicts on continuing
          engagements and recurring audit relationships.
        children: []
  - id: BC-4350.60
    name: Independence and Conflicts Monitoring
    level: 2
    industry: Professional Services
    description: |
      Ongoing monitoring of independence and conflicts posture during
      engagement execution and across the engagement portfolio.
    children:
      - id: BC-4350.60.10
        name: New-Service-to-Audit-Client Surveillance
        level: 3
        industry: Professional Services
        description: |
          Surveillance of new services proposed to existing audit clients
          for prohibited-service exposure.
        children: []
      - id: BC-4350.60.20
        name: Restricted-Entity List Maintenance
        level: 3
        industry: Professional Services
        description: |
          Maintenance and distribution of the restricted-entities list and
          related advisories to professionals.
        children: []
      - id: BC-4350.60.30
        name: Independence Breach Investigation
        level: 3
        industry: Professional Services
        description: |
          Investigation and reporting of suspected or actual independence
          breaches and remedial action.
        children: []

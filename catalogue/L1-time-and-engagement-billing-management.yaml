# Time and Engagement Billing Management
id: BC-4330
name: Time and Engagement Billing Management
level: 1
industry: Professional Services
description: |
  Time capture, work-in-progress, fee arrangements, invoicing, realisation,
  and write-off control for chargeable engagements, plus client trust and
  retainer fund management distinctive to legal practice.
references:
  - https://www.americanbar.org/groups/professional_responsibility/publications/model_rules_of_professional_conduct/
children:
  - id: BC-4330.10
    name: Timekeeping Management
    level: 2
    industry: Professional Services
    description: |
      Capture, validation, and submission of professional time entries with
      narrative detail at engagement and task level.
    children:
      - id: BC-4330.10.10
        name: Time Entry Capture
        level: 3
        industry: Professional Services
        description: |
          Day-to-day entry of chargeable and non-chargeable time at
          engagement, task, and activity granularity.
        children: []
      - id: BC-4330.10.20
        name: Time Narrative Quality Management
        level: 3
        industry: Professional Services
        description: |
          Quality control on time narratives to meet client billing-guideline
          and e-billing requirements.
        children: []
      - id: BC-4330.10.30
        name: Time Submission and Approval
        level: 3
        industry: Professional Services
        description: |
          Submission, supervisor approval, and lock-down of time records.
        children: []
  - id: BC-4330.20
    name: Engagement Disbursement Management
    level: 2
    industry: Professional Services
    description: |
      Capture and allocation of engagement-related disbursements such as
      court filing fees, expert fees, travel, and printing for onward
      billing to the client.
    children:
      - id: BC-4330.20.10
        name: Disbursement Capture
        level: 3
        industry: Professional Services
        description: |
          Capture of disbursements against the engagement file for onward
          recovery.
        children: []
      - id: BC-4330.20.20
        name: Disbursement Recoverability Review
        level: 3
        industry: Professional Services
        description: |
          Review of disbursement recoverability against engagement letter
          and client billing guidelines.
        children: []
      - id: BC-4330.20.30
        name: Disbursement Recharge to Engagement
        level: 3
        industry: Professional Services
        description: |
          Allocation of approved disbursements to the engagement WIP for
          onward invoicing.
        children: []
  - id: BC-4330.30
    name: Work in Progress Management
    level: 2
    industry: Professional Services
    description: |
      Tracking of unbilled work-in-progress balances, ageing, and decisions
      on write-up or write-down before invoicing.
    children:
      - id: BC-4330.30.10
        name: WIP Tracking
        level: 3
        industry: Professional Services
        description: |
          Real-time tracking of unbilled WIP by engagement, partner, and
          practice.
        children: []
      - id: BC-4330.30.20
        name: WIP Ageing Analysis
        level: 3
        industry: Professional Services
        description: |
          Ageing analysis of unbilled WIP and escalation of stale balances.
        children: []
      - id: BC-4330.30.30
        name: WIP Write-Up and Write-Down Decisioning
        level: 3
        industry: Professional Services
        description: |
          Partner-level decisioning on WIP write-ups, write-downs, and
          deferrals before billing.
        children: []
  - id: BC-4330.40
    name: Fee Arrangement Management
    level: 2
    industry: Professional Services
    description: |
      Maintenance of engagement-level fee structures including hourly rate
      cards, alternative fee arrangements, fixed fees, success fees, and
      retainers.
    children:
      - id: BC-4330.40.10
        name: Rate Card Maintenance
        level: 3
        industry: Professional Services
        description: |
          Maintenance of standard, client-specific, and engagement-specific
          hourly rate cards.
        children: []
      - id: BC-4330.40.20
        name: Alternative Fee Arrangement Setup
        level: 3
        industry: Professional Services
        description: |
          Setup of fixed-fee, capped-fee, success-fee, contingency, and
          retainer fee arrangements per engagement.
        children: []
      - id: BC-4330.40.30
        name: Fee Discount and Volume Pricing Management
        level: 3
        industry: Professional Services
        description: |
          Application of agreed fee discounts and volume pricing across the
          client's portfolio of engagements.
        children: []
  - id: BC-4330.50
    name: Invoice Generation Management
    level: 2
    industry: Professional Services
    description: |
      Production of engagement invoices, narrative formatting, and
      compliance with client e-billing format requirements.
    children:
      - id: BC-4330.50.10
        name: Pro Forma Invoice Preparation
        level: 3
        industry: Professional Services
        description: |
          Preparation and partner review of pro forma invoices before final
          issuance.
        children: []
      - id: BC-4330.50.20
        name: Final Invoice Issuance
        level: 3
        industry: Professional Services
        description: |
          Issuance of final engagement invoices including narrative,
          disbursements, and tax.
        children: []
      - id: BC-4330.50.30
        name: Client E-Billing Format Compliance
        level: 3
        industry: Professional Services
        description: |
          Compliance with client e-billing requirements including LEDES,
          UTBMS task codes, and client-portal submission.
        children: []
      - id: BC-4330.50.40
        name: Client Billing Guideline Adherence
        level: 3
        industry: Professional Services
        description: |
          Application of client outside-counsel billing guidelines on time,
          rates, and disbursements.
        children: []
  - id: BC-4330.60
    name: Engagement Realisation Management
    level: 2
    industry: Professional Services
    description: |
      Tracking of billed-to-collected and standard-to-billed realisation
      ratios, write-offs, and engagement profitability.
    children:
      - id: BC-4330.60.10
        name: Standard-to-Billed Realisation Tracking
        level: 3
        industry: Professional Services
        description: |
          Tracking of standard-rate WIP versus billed amount to surface
          revenue leakage.
        children: []
      - id: BC-4330.60.20
        name: Billed-to-Collected Realisation Tracking
        level: 3
        industry: Professional Services
        description: |
          Tracking of billed amount versus collected cash including bad-debt
          provisioning.
        children: []
      - id: BC-4330.60.30
        name: Engagement Profitability Reporting
        level: 3
        industry: Professional Services
        description: |
          Reporting of profitability per engagement, partner, and practice
          using realised revenue and direct cost.
        children: []
      - id: BC-4330.60.40
        name: Write-Off Approval and Analysis
        level: 3
        industry: Professional Services
        description: |
          Approval workflow and root-cause analysis of WIP and AR write-offs.
        children: []
  - id: BC-4330.70
    name: Client Trust and Retainer Fund Management
    level: 2
    industry: Professional Services
    description: |
      Management of client funds held on trust, IOLTA-type accounts, and
      retainer balances, with distinctive segregation and reconciliation
      requirements applicable to legal practice.
    in_scope:
      - Client trust account operations
      - Retainer balance tracking
      - Trust account reconciliation and reporting
    out_of_scope:
      - Firm general treasury (BC-180)
    children:
      - id: BC-4330.70.10
        name: Client Trust Account Operations
        level: 3
        industry: Professional Services
        description: |
          Operation of segregated client trust accounts including receipts
          and disbursements on behalf of the client.
        children: []
      - id: BC-4330.70.20
        name: Retainer Balance Management
        level: 3
        industry: Professional Services
        description: |
          Tracking of client retainer balances and replenishment triggers.
        children: []
      - id: BC-4330.70.30
        name: Trust Reconciliation and Reporting
        level: 3
        industry: Professional Services
        description: |
          Three-way reconciliation of trust ledgers and statutory or
          professional-body reporting on trust balances.
        children: []

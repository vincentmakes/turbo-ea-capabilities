# HVAC & BAS Service Operations Management
id: BC-2060
name: "HVAC & BAS Service Operations Management"
level: 1
industry: "HVAC & Building Automation Systems"
description: |
  OEM-led and contractor-led service on installed HVAC equipment and BAS — installed-base
  configuration management, preventive and reactive maintenance, BAS reprogramming and
  software service, equipment retrofit and modernisation, performance-based service
  contracts, and remote connected service.
in_scope:
  - Installed-base equipment and BAS configuration registry
  - Preventive maintenance contract delivery and reactive/emergency service
  - BAS reprogramming, firmware upgrades, and backup/restore operations
  - Retrofit and modernisation execution on installed HVAC equipment
  - Performance-based and outcome-based service contracts
  - Remote connected service and diagnostic-centre operations
  - Service-level agreement and customer satisfaction management
out_of_scope:
  - Cross-industry generic field service (BC-1050) and spare parts (BC-1060)
  - Project commissioning and Cx delivery (BC-2050)
  - Refrigerant procurement and reporting (BC-2040)
  - HVAC equipment product engineering (BC-2000)

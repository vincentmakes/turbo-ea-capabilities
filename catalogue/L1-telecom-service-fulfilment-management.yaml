# Telecom Service Fulfilment Management
id: BC-2620
name: Telecom Service Fulfilment Management
level: 1
industry: Telecommunications
description: |
  Service order capture, decomposition, provisioning, activation, acceptance,
  and customer-premises installation across consumer, enterprise, and wholesale
  services — anchored on eTOM Service Fulfilment and TM Forum Open APIs.
references:
  - https://www.tmforum.org/oda/business/process-framework-etom/
  - https://www.tmforum.org/oda/open-apis/
  - https://www.etsi.org/technologies/nfv
children:
  - id: BC-2620.10
    name: Service Order Capture
    level: 2
    industry: Telecommunications
    description: |
      Multi-channel capture of service orders with feasibility and credit
      checks prior to submission.
    children:
      - id: BC-2620.10.10
        name: Omnichannel Order Capture
        level: 3
        industry: Telecommunications
        description: |
          Capture of service orders across retail, digital, contact-centre, and
          partner channels.
        children: []
      - id: BC-2620.10.20
        name: Service Feasibility Check
        level: 3
        industry: Telecommunications
        description: |
          Address-, coverage-, and resource-level feasibility checks against
          requested services.
        children: []
      - id: BC-2620.10.30
        name: "Credit & Risk Gating"
        level: 3
        industry: Telecommunications
        description: |
          Credit assessment and fraud-risk gating before order acceptance.
        children: []
      - id: BC-2620.10.40
        name: Order Submission
        level: 3
        industry: Telecommunications
        description: |
          Validation, persistence, and downstream submission of accepted
          service orders.
        children: []
  - id: BC-2620.20
    name: Service Order Decomposition
    level: 2
    industry: Telecommunications
    description: |
      Decomposition of customer-facing orders into resource-facing work and
      sequencing of dependencies.
    children:
      - id: BC-2620.20.10
        name: Service-to-Resource Decomposition
        level: 3
        industry: Telecommunications
        description: |
          Decomposition of customer-facing services into resource-facing
          services and elements.
        children: []
      - id: BC-2620.20.20
        name: Work Order Generation
        level: 3
        industry: Telecommunications
        description: |
          Generation of network and field work orders from decomposed service
          orders.
        children: []
      - id: BC-2620.20.30
        name: Dependency Sequencing
        level: 3
        industry: Telecommunications
        description: |
          Sequencing of dependent work across network domains to deliver an
          end-to-end service.
        children: []
  - id: BC-2620.30
    name: Service Provisioning
    level: 2
    industry: Telecommunications
    description: |
      Allocation of network resources and orchestration of configuration

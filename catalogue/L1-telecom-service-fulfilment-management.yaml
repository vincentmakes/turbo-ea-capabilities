    children:
      - id: BC-2620.30.10
        name: Network Resource Allocation
        level: 3
        industry: Telecommunications
        description: |
          Allocation of bandwidth, ports, IP addresses, and other resources to
          a specific service instance.
        children: []
      - id: BC-2620.30.20
        name: Service Orchestration
        level: 3
        industry: Telecommunications
        description: |
          Orchestrated execution of provisioning steps across physical and
          virtualised network functions.
        children: []
      - id: BC-2620.30.30
        name: Configuration Push
        level: 3
        industry: Telecommunications
        description: |
          Application of service-specific configuration to target network
          elements.
        children: []
  - id: BC-2620.40
    name: Service Activation
    level: 2
    industry: Telecommunications
    description: |

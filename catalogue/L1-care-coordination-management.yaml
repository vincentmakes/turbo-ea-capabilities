# Care Coordination Management
id: BC-2820
name: Care Coordination Management
level: 1
industry: Healthcare Providers
description: |
  Coordination of care across providers, settings, and time including
  referrals, case management, transitions of care, discharge planning,
  utilisation management, and social-determinant linkage.
references:
  - https://www.cms.gov/medicare/quality/value-based-programs
  - https://www.ncqa.org/programs/health-care-providers-practices/patient-centered-medical-home-pcmh/
  - https://www.acmaweb.org/
  - https://www.ihi.org/Topics/Transitions-of-Care
children:
  - id: BC-2820.10
    name: Referral Management
    level: 2
    industry: Healthcare Providers
    description: |
      End-to-end management of patient referrals from order capture through
      specialist match, tracking, and closure.
    children:

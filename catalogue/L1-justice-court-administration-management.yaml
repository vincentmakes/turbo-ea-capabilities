      - id: BC-3320.50.20
        name: Custody Operations
        level: 3
        industry: Public Sector & Government
        description: |
          Day-to-day custody operations including population management and movements.
        children: []
      - id: BC-3320.50.30
        name: Inmate Healthcare Coordination
        level: 3
        industry: Public Sector & Government
        description: |
          Coordination of inmate healthcare, mental-health, and addiction services.
        children: []
      - id: BC-3320.50.40
        name: Inmate Programmes and Rehabilitation
        level: 3
        industry: Public Sector & Government
        description: |
          Education, vocational, and rehabilitation programme administration in custody.
        children: []
  - id: BC-3320.60
    name: Probation and Parole Management
    level: 2
    industry: Public Sector & Government
    description: |

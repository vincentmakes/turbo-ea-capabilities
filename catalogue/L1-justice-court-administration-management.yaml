      - id: BC-3320.60.20
        name: Community Supervision
        level: 3
        industry: Public Sector & Government
        description: |
          Day-to-day supervision of offenders in the community.
        children: []
      - id: BC-3320.60.30
        name: Parole Hearing Administration
        level: 3
        industry: Public Sector & Government
        description: |
          Administration of parole board hearings and conditional release decisions.
        children: []
      - id: BC-3320.60.40
        name: Violation and Revocation Handling
        level: 3
        industry: Public Sector & Government
        description: |
          Handling of supervision violations and revocation proceedings.
        children: []
  - id: BC-3320.70
    name: Court Records and Public Access
    level: 2
    industry: Public Sector & Government
    description: |
      Maintenance of court records and provision of public access subject to

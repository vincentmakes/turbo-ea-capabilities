        children: []
      - id: BC-3400.90.50
        name: Crash and Occupant Protection Testing
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Engineering crash and occupant-protection tests in support of
          regulatory and consumer-rating requirements.
        children: []

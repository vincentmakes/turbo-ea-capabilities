      - id: BC-3400.90.20
        name: Component and Subsystem Testing
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Bench and rig testing of components and subsystems against
          engineering specifications.
        children: []
      - id: BC-3400.90.30
        name: Vehicle Integration Testing
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Whole-vehicle integration testing on proving grounds and public

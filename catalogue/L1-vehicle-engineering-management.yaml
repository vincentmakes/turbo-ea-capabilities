  - id: BC-3400.80
    name: Functional Safety and Cybersecurity Engineering
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Engineering disciplines that secure safety-critical and connected
      vehicle behaviour, anchored on ISO 26262, ISO/SAE 21434, and ISO 21448.
    in_scope:
      - Functional safety case authoring (ISO 26262)
      - Cybersecurity engineering (ISO/SAE 21434)
      - SOTIF analysis and validation (ISO 21448)
      - HARA, FMEA-MSR, and TARA
    out_of_scope:
      - Operational vehicle SOC and incident response (BC-3460.60)
      - Type approval submissions for UN R155 / R156 (BC-3420.50)
    children:
      - id: BC-3400.80.10
        name: Functional Safety Case Management
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Authoring and maintenance of ISO 26262 safety cases, ASIL allocation,
          and safety argument evidence.
        children: []
      - id: BC-3400.80.20
        name: Automotive Cybersecurity Engineering
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Cybersecurity engineering activities aligned with ISO/SAE 21434,
          including TARA, secure design, and secure development lifecycle.
        children: []
      - id: BC-3400.80.30
        name: SOTIF Engineering
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Analysis and validation of safety of the intended functionality for
          ADAS and automated-driving features per ISO 21448.
        children: []
      - id: BC-3400.80.40
        name: Hazard and Risk Analysis
        level: 3
        industry: "Automotive & Mobility"
        description: |
          HARA, FMEA-MSR, and other systematic hazard analyses driving safety
          and security requirements.
        children: []
  - id: BC-3400.90

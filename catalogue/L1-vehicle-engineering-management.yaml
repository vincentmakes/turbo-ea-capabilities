# Vehicle Engineering Management
id: BC-3400
name: Vehicle Engineering Management
level: 1
industry: "Automotive & Mobility"
description: |
  Whole-vehicle engineering across body, chassis, powertrain (ICE, electric,
  fuel cell), electrical / electronic architecture, embedded software,
  functional safety, cybersecurity, and SOTIF, anchored on IATF 16949,
  ISO 26262, ISO/SAE 21434, ISO 21448, Automotive SPICE, and AUTOSAR.
references:
  - https://www.iatfglobaloversight.org/iatf-169492016/
  - https://www.iso.org/standard/68383.html
  - https://www.iso.org/standard/70918.html
  - https://www.iso.org/standard/77490.html
  - https://www.autosar.org/
  - https://vda-qmc.de/en/automotive-spice/
children:
  - id: BC-3400.10
    name: Vehicle Architecture Management
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Whole-vehicle architecture, packaging, attribute target setting, and
      platform / variant decomposition that frame all downstream engineering.
    in_scope:
      - Vehicle attribute targets and trade-off resolution
      - Vehicle packaging, layout, and zonal definition
      - Platform and module architecture choices
    out_of_scope:
      - Programme stage-gate governance (BC-3410)
      - Detailed component-level engineering (covered under discipline-specific L2s)
    children:
      - id: BC-3400.10.10
        name: Vehicle Attribute Target Setting
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Definition of vehicle-level performance, comfort, safety, efficiency,
          and brand-attribute targets and their trade-off resolution.
        children: []
      - id: BC-3400.10.20
        name: Vehicle Packaging and Layout
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Whole-vehicle packaging, occupant and luggage layout, hard-point
          definition, and zonal allocation.
        children: []
      - id: BC-3400.10.30
        name: Platform Architecture Definition
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Definition of shared vehicle platforms, common modules, and
          carry-over strategies across programmes.
        children: []
      - id: BC-3400.10.40
        name: Module and Variant Architecture
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Modular and variant strategy enabling derivative bodies, drivetrains,
          and trim levels off a common architecture.
        children: []

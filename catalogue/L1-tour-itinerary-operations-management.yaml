# Tour & Itinerary Operations Management
id: BC-4100
name: "Tour & Itinerary Operations Management"
level: 1
industry: "Travel & Hospitality"
description: |
  Operation of tour operator and destination-management activities —
  product assembly and supplier contracting, departure decisioning,
  guide and escort delivery, in-destination logistics, supplier
  coordination, itinerary recovery, and traveller documentation.
references:
  - https://opentravel.org/
  - https://www.gstcouncil.org/
  - https://eur-lex.europa.eu/eli/dir/2015/2302/oj
in_scope:
  - Tour product assembly and supplier contracting
  - Departure threshold and go/no-go decisions
  - Guide assignment, briefing, and on-tour performance
  - In-destination transfers and day-tour delivery
  - Live itinerary modification and force-majeure recovery
  - Tour customer documentation and voucher issuance
out_of_scope:
  - Tour product master and inventory pool definition (BC-4000.30)
  - Reservation and booking lifecycle (BC-4020)
  - Cruise voyage operations (BC-4090)
children:

        industry: "Oil & Gas"
        description: |
          Spot and term procurement of marine fuels for the fleet.
        children: []
      - id: BC-3100.50.20
        name: Bunker Quality Assurance
        level: 3
        industry: "Oil & Gas"
        description: |
          Sampling, testing, and dispute management of supplied bunkers.
        children: []

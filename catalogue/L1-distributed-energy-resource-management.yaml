# Distributed Energy Resource Management
id: BC-3840
name: Distributed Energy Resource Management
level: 1
industry: Power & Water Utilities
description: |
  Onboarding, aggregation, and operational coordination of
  distributed energy resources connected to the distribution grid —
  rooftop solar, behind-the-meter storage, demand response, EV
  charging, and microgrids — and their participation in wholesale and
  flexibility markets.
references:
  - https://standards.ieee.org/ieee/1547/5915/
  - https://www.ferc.gov/news-events/news/explainer-fercs-final-rule-distributed-energy-resources-order-no-2222
  - https://www.iso.org/standard/79504.html
children:
  - id: BC-3840.10
    name: DER Registration & Onboarding
    level: 2
    industry: Power & Water Utilities
    description: |
      Registration of distributed energy resources, technical
      qualification, and connection acceptance under IEEE 1547 / EU
      Requirements for Generators rules.
    children:
      - id: BC-3840.10.10
        name: DER Application Assessment
        level: 3
        description: |
          Assessment of DER connection applications against hosting capacity.
        children: []
      - id: BC-3840.10.20
        name: DER Technical Qualification
        level: 3
        description: |
          Type-test and on-site verification of DER capability and protections.
        children: []
      - id: BC-3840.10.30
        name: DER Registry Maintenance
        level: 3
        description: |
          Maintenance of the registry of connected DER assets and capabilities.
        children: []

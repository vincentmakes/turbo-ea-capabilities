# Legislative & Regulatory Drafting Management
id: BC-3210
name: "Legislative & Regulatory Drafting Management"
level: 1
industry: Public Sector & Government
description: |
  Drafting, legal review, impact assessment, parliamentary or legislative
  process coordination, and codification of primary legislation, secondary
  regulations, statutory instruments, and executive orders.
references:
  - https://www.oecd.org/regreform/regulatory-policy/
  - https://eur-lex.europa.eu/
  - https://www.uscode.house.gov/
children:
  - id: BC-3210.10
    name: Legislative Drafting
    level: 2
    industry: Public Sector & Government
    description: |
      Drafting of primary legislation, bills, and amendments by parliamentary
      counsel or legislative drafters.
    in_scope:
      - Bill and amendment drafting
      - Drafting instruction handling
      - Plain-language and bilingual drafting
    out_of_scope:
      - Regulations and statutory instruments (covered by Regulatory Drafting)
    children:
      - id: BC-3210.10.10
        name: Drafting Instruction Intake
        level: 3
        industry: Public Sector & Government
        description: |
          Receipt and clarification of drafting instructions from policy and ministerial sponsors.
        children: []
      - id: BC-3210.10.20
        name: Bill and Amendment Drafting
        level: 3
        industry: Public Sector & Government
        description: |
          Drafting of bills, amendments, and consequential provisions.
        children: []
      - id: BC-3210.10.30
        name: Drafting Quality Review
        level: 3
        industry: Public Sector & Government
        description: |
          Senior counsel review of draft legislation for clarity, consistency, and effect.
        children: []
  - id: BC-3210.20
    name: Regulatory Drafting
    level: 2
    industry: Public Sector & Government
    description: |
      Drafting of secondary regulations, statutory instruments, executive
      orders, and administrative rules.
    children:
      - id: BC-3210.20.10
        name: Regulation and Statutory Instrument Drafting
        level: 3
        industry: Public Sector & Government
        description: |
          Drafting of regulations and statutory instruments under enabling legislation.
        children: []
      - id: BC-3210.20.20
        name: Executive Order Drafting
        level: 3
        industry: Public Sector & Government
        description: |
          Drafting of executive orders, decrees, and proclamations.
        children: []
      - id: BC-3210.20.30
        name: Administrative Rule Drafting
        level: 3
        industry: Public Sector & Government
        description: |
          Drafting of agency administrative rules and notices.
        children: []
  - id: BC-3210.30
    name: Legal Review and Constitutional Compliance
    level: 2
    industry: Public Sector & Government
    description: |
      Legal vetting of draft instruments for constitutional, human-rights, and
      international-law compliance.
    children:
      - id: BC-3210.30.10
        name: Constitutional Compliance Review
        level: 3
        industry: Public Sector & Government
        description: |
          Review of drafts against constitutional powers, rights, and limitations.
        children: []
      - id: BC-3210.30.20
        name: Human Rights Compatibility Assessment
        level: 3
        industry: Public Sector & Government
        description: |
          Assessment of compatibility with human-rights treaties and charters.
        children: []
      - id: BC-3210.30.30
        name: International Law Conformity Review
        level: 3
        industry: Public Sector & Government
        description: |
          Review of drafts for conformity with treaty and supranational obligations.
        children: []
  - id: BC-3210.40
    name: Regulatory Impact Assessment
    level: 2
    industry: Public Sector & Government
    description: |
      Assessment of expected costs, benefits, and distributional effects of
      proposed instruments per OECD better-regulation principles.
    children:
      - id: BC-3210.40.10
        name: Impact Scoping
        level: 3
        industry: Public Sector & Government
        description: |
          Scoping of regulatory impact assessments and proportionality determination.
        children: []
      - id: BC-3210.40.20
        name: Cost-Benefit Analysis
        level: 3
        industry: Public Sector & Government
        description: |
          Quantification of regulatory costs and benefits including compliance burden.
        children: []
      - id: BC-3210.40.30
        name: Small Business and SME Test
        level: 3
        industry: Public Sector & Government
        description: |
          Assessment of disproportionate impacts on small businesses and SMEs.
        children: []
      - id: BC-3210.40.40
        name: Impact Assessment Publication
        level: 3
        industry: Public Sector & Government
        description: |
          Publication of impact assessments alongside the instrument and supporting evidence.
        children: []
  - id: BC-3210.50
    name: Legislative Process Coordination
    level: 2
    industry: Public Sector & Government
    description: |
      Coordination of the parliamentary or legislative passage of bills,
      including committee evidence, amendments, and royal assent or
      promulgation.
    children:
      - id: BC-3210.50.10
        name: Parliamentary Liaison
        level: 3
        industry: Public Sector & Government
        description: |
          Liaison with parliamentary or legislative bodies on government bills.
        children: []
      - id: BC-3210.50.20
        name: Committee Evidence Preparation
        level: 3
        industry: Public Sector & Government
        description: |
          Preparation of evidence, briefings, and witnesses for legislative committees.
        children: []
      - id: BC-3210.50.30
        name: Amendment Tracking
        level: 3
        industry: Public Sector & Government
        description: |
          Tracking and assessment of legislative amendments through stages.
        children: []
      - id: BC-3210.50.40
        name: Promulgation and Royal Assent Coordination
        level: 3
        industry: Public Sector & Government
        description: |
          Coordination of final promulgation, royal assent, or executive signature.
        children: []
  - id: BC-3210.60
    name: Legal Codification and Publication
    level: 2
    industry: Public Sector & Government
    description: |
      Compilation, consolidation, official gazette publication, and
      maintenance of statutory and regulatory texts.
    children:
      - id: BC-3210.60.10
        name: Official Gazette Publication
        level: 3
        industry: Public Sector & Government
        description: |
          Publication of enacted instruments in the official gazette or journal.
        children: []
      - id: BC-3210.60.20
        name: Consolidation and Codification
        level: 3
        industry: Public Sector & Government
        description: |
          Consolidation of amendments and codification into statutory codes.
        children: []
      - id: BC-3210.60.30
        name: Legal Text Maintenance
        level: 3
        industry: Public Sector & Government
        description: |
          Ongoing maintenance and machine-readable publication of statutory and regulatory texts.
        children: []

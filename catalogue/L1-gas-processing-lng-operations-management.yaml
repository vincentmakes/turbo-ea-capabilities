# Gas Processing & LNG Operations Management
id: BC-3070
name: "Gas Processing & LNG Operations Management"
level: 1
industry: "Oil & Gas"
description: |
  Operation of gas treatment, NGL fractionation, LNG liquefaction,
  loading and send-out, regasification, and gas quality assurance
  across midstream gas value chains.
references:
  - https://www.api.org/products-and-services/standards
  - https://www.iso.org/standard/43797.html
  - https://giignl.org/
children:
  - id: BC-3070.10
    name: Gas Plant Operations
    level: 2
    industry: "Oil & Gas"
    description: |
      Operation of inlet receipt, treating, dehydration, and sulphur-recovery facilities at gas processing plants.
    children:
      - id: BC-3070.10.10
        name: "Gas Receipt & Inlet Management"
        level: 3
        industry: "Oil & Gas"
        description: |
          Receipt, slug catching, and inlet conditioning of feed gas.
        children: []
      - id: BC-3070.10.20
        name: Acid Gas Treating Operations
        level: 3
        industry: "Oil & Gas"
        description: |
          Amine and physical solvent acid gas treating operations.
        children: []
      - id: BC-3070.10.30
        name: Gas Dehydration Operations
        level: 3
        industry: "Oil & Gas"
        description: |
          Glycol and molecular sieve dehydration of natural gas.
        children: []
      - id: BC-3070.10.40
        name: Sulphur Recovery Operations
        level: 3
        industry: "Oil & Gas"
        description: |
          Claus and tail-gas treating operations for sulphur recovery.
        children: []
  - id: BC-3070.20
    name: NGL Fractionation Operations
    level: 2
    industry: "Oil & Gas"

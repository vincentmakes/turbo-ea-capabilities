# Vehicle Programme Management
id: BC-3410
name: Vehicle Programme Management
level: 1
industry: "Automotive & Mobility"
description: |
  Multi-year vehicle programme governance covering concept, stage-gate
  milestones, platform and variant strategy, and programme-level cost,
  weight, and timing through start-of-production and end-of-production.
references:
  - https://www.aiag.org/quality
  - https://www.iatfglobaloversight.org/iatf-169492016/
  - https://vda-qmc.de/en/
children:
  - id: BC-3410.10
    name: Programme Definition and Initiation
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Concept definition, business case, programme charter, and approval to
      proceed for new vehicle and derivative programmes.
    in_scope:
      - Programme charter and business-case approval
      - Vehicle concept and positioning definition
      - Platform and carry-over strategy alignment
    out_of_scope:
      - Detailed engineering of vehicle subsystems (BC-3400)
      - Enterprise project portfolio governance (BC-900)
    children:
      - id: BC-3410.10.10
        name: Programme Charter and Business Case
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Approval-grade programme charter, financial business case, and
          investment authorisation.
        children: []
      - id: BC-3410.10.20
        name: Vehicle Concept Definition
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Vehicle concept, positioning, customer-pack definition, and
          high-level attribute targets.
        children: []
      - id: BC-3410.10.30
        name: Platform Strategy Alignment
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Alignment of programmes with platform roadmaps, carry-over decisions,
          and shared-module strategies.
        children: []
      - id: BC-3410.10.40
        name: Programme Approval Gating
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Initial programme approval gates including budget, timing, and
          resource commitments.
        children: []
  - id: BC-3410.20
    name: Programme Stage-Gate Governance
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Operation of the vehicle programme stage-gate model with milestone
      reviews, deliverable assurance, and risk and issue control.
    children:
      - id: BC-3410.20.10
        name: Milestone Planning
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Planning of programme milestones from PT and PVS through SOP and
          end-of-production.
        children: []
      - id: BC-3410.20.20
        name: Gate Review Execution
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Execution of stage-gate reviews including deliverable assessment
          and pass / hold decisions.
        children: []
      - id: BC-3410.20.30
        name: Programme Risk and Issue Management
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Identification, escalation, and mitigation of programme risks and
          critical issues.
        children: []
      - id: BC-3410.20.40
        name: Programme Maturity Assessment
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Assessment of programme maturity against engineering, manufacturing,
          and supplier readiness criteria.
        children: []
  - id: BC-3410.30
    name: Programme Cost Management
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Setting and tracking of programme cost targets across bill-of-material,
      tooling, investment, and warranty provisions.
    children:
      - id: BC-3410.30.10
        name: Programme Cost Target Setting
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Setting of programme cost targets including BoM, conversion, and
          investment envelopes.
        children: []
      - id: BC-3410.30.20
        name: Bill-of-Material Cost Tracking
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Tracking of vehicle BoM cost, supplier quotations, and content
          decisions.
        children: []
      - id: BC-3410.30.30
        name: Variable and Fixed Cost Forecasting
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Forecasting of programme variable and fixed costs across launch and
          steady-state phases.
        children: []
      - id: BC-3410.30.40
        name: Cost-Reduction Workout Tracking
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Tracking of cost-reduction initiatives, value engineering, and
          their realisation against targets.
        children: []
  - id: BC-3410.40
    name: Programme Weight and Attribute Tracking
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Tracking of vehicle weight, performance, and other attributes against

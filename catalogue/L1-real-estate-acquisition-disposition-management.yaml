# Real Estate Acquisition & Disposition Management
id: BC-4930
name: "Real Estate Acquisition & Disposition Management"
level: 1
industry: Real Estate
description: |
  Transaction discipline covering sourcing, underwriting, due diligence,
  structuring, negotiation, closing, and post-closing onboarding for
  real-estate acquisitions and dispositions across direct, portfolio,
  and entity-level deals.
references:
  - https://www.oscre.org/standards
  - https://www.alta.org/
  - https://www.astm.org/standards/e1527
  - https://www.rics.org/profession-standards
in_scope:
  - Acquisition lead sourcing and broker management
  - Underwriting (DCF, comparables, sensitivity, scenario)
  - Physical, environmental, title, lease, and financial due diligence
  - Bid strategy, LOI, PSA, and tax / vehicle structuring
  - Escrow, closing, settlement statement, and recording
  - Disposition strategy, sales marketing, buyer selection
  - Post-acquisition data and contract onboarding
out_of_scope:
  - Investment committee governance and fund mandates (BC-4910)
  - Standing-asset business plans (BC-4920)
  - Construction draws and lender covenant monitoring (BC-4980)
  - Brokerage as a service line (BC-4960)

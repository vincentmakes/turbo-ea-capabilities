# Chemical Process Engineering Management
id: BC-4610
name: Chemical Process Engineering Management
level: 1
industry: Chemicals
description: |
  Process design, mass and energy balance engineering, simulation,
  equipment specification, and front-end engineering for chemical plants
  and revamps. Distinct from cross-industry Engineering Discipline
  Management (BC-1100), which retains generic engineering disciplines.
references:
  - https://www.asme.org/codes-standards/find-codes-standards/bpvc-section-viii-rules-construction-pressure-vessels-division-1
  - https://www.asme.org/codes-standards/find-codes-standards/b31-3-process-piping
  - https://webstore.iec.ch/publication/61289
children:
  - id: BC-4610.10
    name: Process Flowsheet Design
    level: 2
    industry: Chemicals
    description: |
      Development of block flow, process flow, and piping and
      instrumentation diagrams for chemical processes.
    children:
      - id: BC-4610.10.10
        name: Block Flow Diagram Development
        level: 3
        industry: Chemicals
        description: |
          Authoring of block flow diagrams for early process definition.
        children: []
      - id: BC-4610.10.20
        name: Process Flow Diagram Development
        level: 3
        industry: Chemicals
        description: |
          Authoring of process flow diagrams with stream conditions and properties.
        children: []
      - id: BC-4610.10.30
        name: "Piping & Instrumentation Diagram Development"
        level: 3
        industry: Chemicals
        description: |
          Authoring and revision of P&IDs for chemical process units.
        children: []
      - id: BC-4610.10.40
        name: Utility Flow Diagram Development
        level: 3
        industry: Chemicals
        description: |
          Authoring of utility flow diagrams covering steam, cooling water, and inert gas.
        children: []
  - id: BC-4610.20
    name: "Reactor & Separation Sizing"
    level: 2
    industry: Chemicals
    description: |
      Sizing of reactors and separation equipment based on kinetics,
      thermodynamics, and unit-operation principles.
    children:
      - id: BC-4610.20.10
        name: Reactor Design
        level: 3
        industry: Chemicals
        description: |
          Sizing and configuration of CSTR, PFR, and fixed-bed reactors.
        children: []
      - id: BC-4610.20.20
        name: Distillation Column Design
        level: 3
        industry: Chemicals
        description: |
          Design of trayed and packed distillation columns including internals.
        children: []
      - id: BC-4610.20.30
        name: Heat Exchanger Network Design
        level: 3
        industry: Chemicals
        description: |
          Pinch and exchanger network design for energy integration.
        children: []
      - id: BC-4610.20.40
        name: "Crystalliser & Filter Sizing"
        level: 3
        industry: Chemicals
        description: |
          Sizing of crystallisers, centrifuges, and filtration equipment.
        children: []
  - id: BC-4610.30
    name: "Mass & Energy Balance Engineering"
    level: 2
    industry: Chemicals
    description: |
      Closure of overall and unit-level mass and energy balances and
      utility demand estimation.
    children:
      - id: BC-4610.30.10
        name: Mass Balance Calculation
        level: 3
        industry: Chemicals
        description: |
          Calculation and reconciliation of plant and unit mass balances.
        children: []
      - id: BC-4610.30.20
        name: Energy Balance Calculation
        level: 3
        industry: Chemicals
        description: |
          Calculation of energy balances across reactors, exchangers, and utilities.
        children: []
      - id: BC-4610.30.30
        name: Utility Demand Estimation
        level: 3
        industry: Chemicals
        description: |
          Estimation of steam, power, cooling water, and inert gas demand.
        children: []
  - id: BC-4610.40
    name: Process Simulation Management
    level: 2
    industry: Chemicals
    description: |
      Build and maintenance of steady-state and dynamic process
      simulations supporting design and operations.
    children:
      - id: BC-4610.40.10
        name: Steady-State Process Simulation
        level: 3
        industry: Chemicals
        description: |
          Build and run of steady-state simulators for design and analysis.
        children: []
      - id: BC-4610.40.20
        name: Dynamic Process Simulation
        level: 3
        industry: Chemicals
        description: |
          Build and run of dynamic simulators for control and safety studies.
        children: []
      - id: BC-4610.40.30
        name: Simulation Model Validation
        level: 3
        industry: Chemicals
        description: |
          Validation of simulation models against plant or pilot data.
        children: []
  - id: BC-4610.50

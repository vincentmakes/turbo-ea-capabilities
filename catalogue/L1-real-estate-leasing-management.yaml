# Real Estate Leasing Management
id: BC-4950
name: Real Estate Leasing Management
level: 1
industry: Real Estate
description: |
  Landlord-side leasing of commercial, retail, and residential space
  across the lease lifecycle — pricing, marketing, prospect handling,
  application screening, negotiation and execution, lease administration,
  renewal and retention, and end-of-tenancy. Distinct from corporate
  occupier leasing (BC-710) and brokerage as a service line (BC-4960).
references:
  - https://www.reso.org/data-dictionary/
  - https://www.oscre.org/standards
  - https://www.iso.org/standard/68021.html
in_scope:
  - Asking rent and concession strategy
  - Vacancy marketing, listings, and showings
  - Inbound prospect handling and qualification
  - Tenant application capture, screening, and fair-housing-compliant adverse action
  - Lease term-sheet, drafting, signature, and security deposit handling
  - Landlord-side lease abstracting, indexation, and option tracking
  - Renewal pursuits and retention programmes
  - Move-out, dilapidations, and end-of-tenancy accounting
out_of_scope:
  - Corporate occupier lease administration on the tenant side (BC-710)
  - Brokerage representation as a service line (BC-4960)
  - Property operations during occupancy (BC-4940)
  - Rent regulation and tenancy compliance posture (BC-4990)

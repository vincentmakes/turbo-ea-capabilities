        children: []
      - id: BC-2700.20.30
        name: "Lawful Interception Audit & Access Control"
        level: 3
        industry: Telecommunications
        description: |
          Access control and audit of LI activity to prevent unauthorised use.
        children: []
  - id: BC-2700.30
    name: Telecommunications Data Retention Management
    level: 2
    industry: Telecommunications
    description: |
      Capture, secure storage, and authorised release of retained

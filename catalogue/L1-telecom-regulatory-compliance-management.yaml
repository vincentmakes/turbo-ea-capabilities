        name: Retained Data Capture
        level: 3
        industry: Telecommunications
        description: |
          Capture of communications data subject to retention obligations.
        children: []
      - id: BC-2700.30.20
        name: Retained Data Access Workflow
        level: 3
        industry: Telecommunications
        description: |
          Authorised-request workflow for access to retained data by competent
          authorities.
        children: []
      - id: BC-2700.30.30
        name: Retained Data Purge
        level: 3
        industry: Telecommunications
        description: |
          Purge of retained data on expiry of retention periods.
        children: []

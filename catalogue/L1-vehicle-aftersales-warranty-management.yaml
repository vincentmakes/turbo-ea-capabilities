  - id: BC-3450.60
    name: Aftersales Parts Logistics Coordination
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Coordination with the aftermarket parts supply chain to support dealer
      service demand and recall remedies.
    in_scope:
      - Parts demand and supply coordination with dealers
      - Critical parts expedite for vehicle-off-road events
      - Recall parts allocation across dealer networks
    out_of_scope:
      - Spare parts catalogue and pricing (BC-1060 Spare Parts & Aftermarket Management)
      - Parts warehousing and physical distribution operations (BC-1060)
    children:

# Vehicle Aftersales & Warranty Management
id: BC-3450
name: "Vehicle Aftersales & Warranty Management"
level: 1
industry: "Automotive & Mobility"
description: |
  OEM-side aftersales — warranty operations and adjudication, recall and
  service-campaign management, technical service information, customer
  assistance, and the engineering feedback loop, anchored on Magnuson-Moss,
  EU consumer-sales rules, and NHTSA / EU recall regimes.
references:
  - https://www.law.cornell.edu/uscode/text/15/chapter-50
  - https://www.nhtsa.gov/recalls
  - https://www.ecfr.gov/current/title-49/subtitle-B/chapter-V/part-573
  - https://eur-lex.europa.eu/eli/dir/2019/771/oj

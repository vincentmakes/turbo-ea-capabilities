# Chemical Product Stewardship Management
id: BC-4450
name: Chemical Product Stewardship Management
level: 1
industry: Chemicals
description: |
  Hazard classification and labelling, safety data sheet authoring,
  exposure scenarios, substance-of-concern programmes, and customer
  hazard communication across the chemical product life cycle.
references:
  - https://unece.org/transport/dangerous-goods/ghs
  - https://echa.europa.eu/regulations/clp/understanding-clp
  - https://icca-chem.org/responsible-care/
children:
  - id: BC-4450.10
    name: "Hazard Classification & Labelling"
    level: 2
    industry: Chemicals
    description: |
      GHS classification of substances and mixtures and design of
      compliant labels.
    children:
      - id: BC-4450.10.10
        name: GHS Classification
        level: 3
        industry: Chemicals
        description: |
          Classification of substances under the UN GHS hazard scheme.
        children: []
      - id: BC-4450.10.20
        name: Mixture Classification
        level: 3
        industry: Chemicals
        description: |
          Classification of mixtures using bridging principles and test data.
        children: []
      - id: BC-4450.10.30
        name: "Hazard Pictogram & Label Design"
        level: 3
        industry: Chemicals
        description: |
          Design of GHS-compliant pictograms, signal words, and label artwork.
        children: []
      - id: BC-4450.10.40
        name: Multilingual Label Localisation
        level: 3
        industry: Chemicals
        description: |
          Translation and localisation of labels for destination markets.
        children: []
  - id: BC-4450.20
    name: Safety Data Sheet Management
    level: 2
    industry: Chemicals
    description: |
      Authoring, review, and distribution of safety data sheets including
      extended SDS for downstream users.
    children:
      - id: BC-4450.20.10
        name: SDS Authoring
        level: 3
        industry: Chemicals
        description: |
          Authoring of safety data sheets in the 16-section format.
        children: []
      - id: BC-4450.20.20
        name: "SDS Review & Update"
        level: 3
        industry: Chemicals
        description: |
          Review and update of SDSs against new data and regulatory changes.
        children: []
      - id: BC-4450.20.30
        name: SDS Distribution Management
        level: 3
        industry: Chemicals
        description: |
          Distribution of SDSs to customers and supply-chain partners.
        children: []
      - id: BC-4450.20.40
        name: Extended SDS Management
        level: 3
        industry: Chemicals
        description: |
          Management of extended SDS annexes carrying exposure scenarios.
        children: []
  - id: BC-4450.30
    name: Exposure Scenario Management
    level: 2
    industry: Chemicals
    description: |
      Development and maintenance of worker, consumer, and environmental
      exposure scenarios for registered substances.
    children:
      - id: BC-4450.30.10
        name: Worker Exposure Scenario Development
        level: 3
        industry: Chemicals
        description: |
          Development of worker exposure scenarios under typical use conditions.
        children: []
      - id: BC-4450.30.20
        name: Consumer Exposure Scenario Development
        level: 3
        industry: Chemicals
        description: |
          Development of consumer exposure scenarios for end-product uses.
        children: []
      - id: BC-4450.30.30
        name: Environmental Release Scenario Development
        level: 3
        industry: Chemicals
        description: |
          Development of environmental release scenarios across the lifecycle.
        children: []
  - id: BC-4450.40
    name: Substance-of-Concern Management
    level: 2
    industry: Chemicals
    description: |
      Identification, substitution, and restriction tracking of
      substances of very high concern across the product portfolio.
    children:
      - id: BC-4450.40.10
        name: SVHC Inventory Management
        level: 3
        industry: Chemicals
        description: |
          Maintenance of the inventory of SVHC presence across the portfolio.
        children: []
      - id: BC-4450.40.20
        name: Substance Substitution Programme Management
        level: 3
        industry: Chemicals
        description: |
          Programme management of safer-substance substitution initiatives.
        children: []
      - id: BC-4450.40.30
        name: Restricted Substance List Maintenance
        level: 3
        industry: Chemicals
        description: |
          Maintenance of internal restricted-substance lists and customer-imposed lists.
        children: []
  - id: BC-4450.50
    name: Customer Hazard Communication
    level: 2
    industry: Chemicals
    description: |
      Outbound communication of hazard information to customers and
      downstream users.
    children:
      - id: BC-4450.50.10
        name: Customer Stewardship Notification
        level: 3
        industry: Chemicals
        description: |
          Notification of customers on stewardship-relevant changes.
        children: []
      - id: BC-4450.50.20
        name: Hazard Training Material Production
        level: 3
        industry: Chemicals
        description: |
          Production of training materials covering safe handling and use.
        children: []
      - id: BC-4450.50.30
        name: Downstream User Enquiry Handling
        level: 3
        industry: Chemicals
        description: |
          Handling of stewardship enquiries from downstream users.
        children: []
  - id: BC-4450.60
    name: Product Lifecycle Stewardship
    level: 2
    industry: Chemicals
    description: |
      Lifecycle stewardship of chemical products including end-of-life,
      recyclability, and reuse considerations.
    children:
      - id: BC-4450.60.10
        name: Product Hazard Profile Maintenance
        level: 3
        industry: Chemicals
        description: |
          Maintenance of consolidated hazard profiles per product.
        children: []
      - id: BC-4450.60.20
        name: End-of-Life Stewardship Coordination
        level: 3
        industry: Chemicals
        description: |
          Coordination of take-back and end-of-life stewardship arrangements.
        children: []
      - id: BC-4450.60.30
        name: "Recyclability & Reuse Assessment"
        level: 3
        industry: Chemicals
        description: |
          Assessment of recyclability and reuse potential of chemical products.
        children: []

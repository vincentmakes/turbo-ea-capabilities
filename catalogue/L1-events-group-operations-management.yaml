# Events & Group Operations Management
id: BC-4110
name: "Events & Group Operations Management"
level: 1
industry: "Travel & Hospitality"
description: |
  Operation of meetings, incentives, conferences, exhibitions, and
  banqueting events at hospitality venues — including group sales,
  function-space allocation, banquet event order execution, group
  room-block management, AV and production, billing, and post-event
  reporting.
references:
  - https://www.ahla.com/usali
  - https://htng.org/
  - https://www.iccaworld.org/
in_scope:
  - Group lead, contracting, and pricing
  - Function-space allocation and conflict resolution
  - Banquet event order authoring and execution
  - Group room-block contract, list, and pickup
  - AV, staging, and hybrid event production
  - Master account billing and final settlement
  - Block-vs-pickup and post-event performance reporting
out_of_scope:
  - Generic enterprise event marketing (BC-410)
  - Banquet kitchen production and food safety (BC-4070)
  - Front office check-in for group arrivals (BC-4060.10)

# Building Performance Management
id: BC-2070
name: Building Performance Management
level: 1
industry: "HVAC & Building Automation Systems"
description: |
  Continuous, data-driven optimisation of building performance — energy measurement and
  verification (IPMVP / ASHRAE Guideline 14), fault detection and diagnostics, energy and
  IAQ analytics, demand-response and grid interaction, carbon and sustainability tracking,
  and ongoing performance reporting to building owners.
in_scope:
  - Energy M&V baselining, savings calculation, and adjustment
  - FDD rule libraries and ongoing fault triage
  - Building energy benchmarking, attribution, anomaly detection, and forecasting
  - Indoor environmental quality analytics for thermal, air, acoustic, and lighting outcomes
  - Demand response and grid-interactive operations
  - Operational carbon, renewable allocation, and ESG building-level metrics
  - Owner-facing dashboards, periodic reporting, and stakeholder briefings
out_of_scope:
  - Cx and FPT during project commissioning (BC-2050)
  - Field service execution (BC-2060)
  - Enterprise sustainability strategy and reporting (BC-740)
  - HVAC equipment design (BC-2000) and BAS product engineering (BC-2010)

# Content Distribution & Delivery Management
id: BC-3740
name: "Content Distribution & Delivery Management"
level: 1
industry: "Media, Entertainment & Telecom Content"
description: |
  Linear broadcast, OTT and streaming delivery, content delivery network
  operations, IPTV and multicast, content protection, and syndication and
  affiliate distribution of content to consumer-facing surfaces and partners.
references:
  - https://dashif.org/
  - https://www.atsc.org/atsc-standards/
  - https://www.dvb.org/standards
  - https://hbbtv.org/
  - https://www.smpte.org/standards
  - https://www.3gpp.org/specifications-technologies

    name: Bulk Chemical Trading
    level: 2
    industry: Chemicals
    description: |
      Spot and term trading of bulk commodity chemicals on physical
      markets.
    children:
      - id: BC-4690.10.10
        name: Spot Cargo Trading
        level: 3
        industry: Chemicals
        description: |
          Trading of spot cargoes against prevailing market prices.
        children: []

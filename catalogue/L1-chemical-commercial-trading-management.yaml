# Chemical Commercial & Trading Management
id: BC-4690
name: "Chemical Commercial & Trading Management"
level: 1
industry: Chemicals
description: |
  Bulk and specialty chemical trading, supply-and-demand balance
  management, feedstock sourcing, hedging, long-term offtake, and
  price-index referencing. Distinct from cross-industry Sales (BC-410)
  and Pricing (BC-440), which cover enterprise sales and pricing
  disciplines.
references:
  - https://www.cefic.org/
children:

# Spectrum & Frequency Management
id: BC-2670
name: "Spectrum & Frequency Management"
level: 1
industry: Telecommunications
description: |
  Stewardship of the operator's spectrum portfolio — licence acquisition and
  renewal, frequency planning and coordination, interference management, and
  shared-access spectrum operations.
references:
  - https://www.itu.int/pub/R-REG-RR
  - https://www.gsma.com/spectrum/
children:
  - id: BC-2670.10
    name: Spectrum Portfolio Management
    level: 2
    industry: Telecommunications
    description: |
      Maintenance of the spectrum holdings register and oversight of strategic
      spectrum decisions.
    children:
      - id: BC-2670.10.10
        name: Spectrum Holdings Register
        level: 3
        industry: Telecommunications
        description: |
          Maintenance of the operator's authoritative register of spectrum
          holdings by band, geography, and licence.
        children: []
      - id: BC-2670.10.20
        name: Spectrum Valuation
        level: 3
        industry: Telecommunications
        description: |
          Valuation of spectrum holdings for financial, M&A, and auction
          decisions.
        children: []
      - id: BC-2670.10.30
        name: Spectrum Trading
        level: 3
        industry: Telecommunications
        description: |
          Acquisition, disposal, and lease of spectrum rights with other
          operators where regulators permit.
        children: []
  - id: BC-2670.20
    name: Spectrum Licence Management
    level: 2
    industry: Telecommunications
    description: |
      End-to-end management of spectrum licences from auction participation to
      renewal and compliance reporting.
    children:
      - id: BC-2670.20.10
        name: Spectrum Licence Acquisition
        level: 3
        industry: Telecommunications
        description: |
          Participation in spectrum auctions, beauty contests, and bilateral
          allocations.
        children: []
      - id: BC-2670.20.20
        name: Spectrum Licence Renewal
        level: 3
        industry: Telecommunications
        description: |
          Renewal management of spectrum licences against expiry calendars.
        children: []
      - id: BC-2670.20.30
        name: Licence Compliance Reporting
        level: 3
        industry: Telecommunications
        description: |
          Reporting against spectrum licence conditions including coverage and
          rollout obligations.
        children: []
  - id: BC-2670.30
    name: "Frequency Planning & Coordination"
    level: 2
    industry: Telecommunications
    description: |
      Allocation of channels and frequencies to network elements and
      coordination with neighbouring users.
    children:
      - id: BC-2670.30.10
        name: Cell Frequency Assignment
        level: 3
        industry: Telecommunications
        description: |
          Assignment of frequencies and PCIs to individual radio cells.
        children: []
      - id: BC-2670.30.20
        name: Channel Planning
        level: 3
        industry: Telecommunications
        description: |
          Planning of channel assignments across radio access and microwave
          links.
        children: []
      - id: BC-2670.30.30
        name: Neighbour Cell Planning
        level: 3
        industry: Telecommunications
        description: |
          Definition of neighbour relations to manage handovers and
          interference.
        children: []
  - id: BC-2670.40
    name: Spectrum Interference Management
    level: 2
    industry: Telecommunications
    description: |
      Detection, investigation, and resolution of harmful spectrum
      interference, in coordination with regulators.
    children:
      - id: BC-2670.40.10
        name: Interference Detection
        level: 3
        industry: Telecommunications
        description: |
          Detection of harmful interference from internal and external sources.
        children: []
      - id: BC-2670.40.20
        name: Interference Resolution
        level: 3
        industry: Telecommunications
        description: |
          Investigation and resolution of identified interference cases.
        children: []
      - id: BC-2670.40.30
        name: Regulator Coordination
        level: 3
        industry: Telecommunications
        description: |
          Coordination with national regulators on cross-licensee interference
          and enforcement.
        children: []
  - id: BC-2670.50
    name: Spectrum Sharing Management
    level: 2
    industry: Telecommunications
    description: |
      Operation of dynamic spectrum sharing and shared-access regimes such as
      CBRS.
    children:
      - id: BC-2670.50.10
        name: Dynamic Spectrum Sharing
        level: 3
        industry: Telecommunications
        description: |
          Operation of DSS-style sharing across radio technologies on the same
          band.
        children: []
      - id: BC-2670.50.20
        name: Shared-Access Coordination
        level: 3
        industry: Telecommunications
        description: |
          Coordination with shared-access platforms such as SAS and AFC to
          obtain channel grants.
        children: []
      - id: BC-2670.50.30
        name: Secondary-Use Coordination
        level: 3
        industry: Telecommunications
        description: |
          Coordination with primary licensees and incumbents in secondary-use
          regimes.
        children: []

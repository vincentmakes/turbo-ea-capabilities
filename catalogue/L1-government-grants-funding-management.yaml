# Government Grants & Funding Management
id: BC-3260
name: "Government Grants & Funding Management"
level: 1
industry: Public Sector & Government
description: |
  Award and administration of competitive and formula grants and government
  funding to organisations, communities, and individuals, including
  solicitation, application review, award, monitoring, and closeout.
references:
  - https://www.grants.gov/
  - https://commission.europa.eu/funding-tenders_en
  - https://www.intosai.org/
children:
  - id: BC-3260.10
    name: Grant Programme Design
    level: 2
    industry: Public Sector & Government
    description: |
      Design of grant programmes including objectives, eligibility, funding
      formulae, and evaluation criteria.
    children:
      - id: BC-3260.10.10
        name: Programme Objectives Definition
        level: 3
        industry: Public Sector & Government
        description: |
          Definition of grant programme objectives, outcomes, and theory of change.
        children: []
      - id: BC-3260.10.20
        name: Funding Allocation Modelling
        level: 3
        industry: Public Sector & Government
        description: |
          Modelling of funding allocations including formula, competitive, and matched-funding designs.
        children: []
      - id: BC-3260.10.30
        name: Evaluation Criteria Setting
        level: 3
        industry: Public Sector & Government
        description: |
          Setting of merit-review and evaluation criteria for grant selection.
        children: []
  - id: BC-3260.20
    name: Solicitation and Notice Management
    level: 2
    industry: Public Sector & Government
    description: |

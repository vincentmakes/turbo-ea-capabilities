      - id: BC-3260.20.30
        name: Pre-Award Question Handling
        level: 3
        industry: Public Sector & Government
        description: |
          Handling of pre-award questions and clarifications from prospective applicants.
        children: []
  - id: BC-3260.30
    name: "Application Intake & Review"
    level: 2
    industry: Public Sector & Government
    description: |
      Receipt, screening, and merit review of grant applications including

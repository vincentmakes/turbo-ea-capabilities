# Travel Product & Inventory Management
id: BC-4000
name: "Travel Product & Inventory Management"
level: 1
industry: "Travel & Hospitality"
description: |
  Master definition, structure, and inventory control of bookable travel
  products — rooms, fares, packages, ancillaries, attractions, and the
  taxonomy and content that describe them — independent of the channels
  through which they are sold.
references:
  - https://opentravel.org/
  - https://htng.org/
  - https://www.iata.org/en/programs/airline-distribution/ndc/
  - https://hedna.org/
  - https://www.iso.org/standard/31812.html
in_scope:
  - Lodging room types, rate plans, and package codes
  - Air fare families, branded fares, and fare rules
  - Packaged itineraries (static and dynamic) and ancillary catalogues
  - Inventory pools, allotments, and over-booking buffers
  - Product master data, content, and imagery
out_of_scope:
  - Channel-specific distribution wiring (BC-4010)
  - Reservation lifecycle and bookings (BC-4020)
  - Pricing strategy and yield decisions (BC-4030)
children:

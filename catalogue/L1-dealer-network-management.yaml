# Dealer Network Management
id: BC-3430
name: Dealer Network Management
level: 1
industry: "Automotive & Mobility"
description: |
  Governance of the franchised or authorised dealer network — appointments,
  agreements, brand and facility standards, performance, training, and
  network development under EU Block Exemption and equivalent retail rules.
references:
  - https://eur-lex.europa.eu/legal-content/EN/ALL/?uri=CELEX:32010R0461
  - https://www.nada.org/
children:
  - id: BC-3430.10
    name: Dealer Network Strategy and Planning
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Strategic planning of dealer footprint, format, coverage, and brand
      standards across markets.
    children:
      - id: BC-3430.10.10
        name: Market and Network Coverage Planning
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Analysis of market coverage gaps and definition of target dealer
          footprint by area.
        children: []

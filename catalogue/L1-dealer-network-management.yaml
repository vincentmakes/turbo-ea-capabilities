        name: Dealer Footprint Optimisation
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Optimisation of the existing dealer footprint including
          consolidation, relocation, and capacity expansion.
        children: []
      - id: BC-3430.10.30
        name: Network Format and Brand Standards Definition
        level: 3
        industry: "Automotive & Mobility"
        description: |

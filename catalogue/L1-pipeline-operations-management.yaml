# Pipeline Operations Management
id: BC-3060
name: Pipeline Operations Management
level: 1
industry: "Oil & Gas"
description: |
  Operation, integrity, and commercial management of hydrocarbon
  gathering and transmission pipelines - control-room dispatch, in-line
  inspection, leak detection, scheduling and nominations, and tariff
  administration.
references:
  - https://www.asme.org/codes-standards/find-codes-standards/b31-4-pipeline-transportation-systems-liquids-slurries
  - https://www.asme.org/codes-standards/find-codes-standards/b31-8-gas-transmission-distribution-piping-systems
  - https://www.api.org/products-and-services/standards

        level: 3
        industry: "Transportation & Logistics"
        description: |
          Pre-audit and post-audit reconciliation of carrier invoices.
        children: []
      - id: BC-2530.20.30
        name: Carrier Payment Execution
        level: 3
        industry: "Transportation & Logistics"
        description: |
          Execution of carrier payments and remittance reporting.
        children: []

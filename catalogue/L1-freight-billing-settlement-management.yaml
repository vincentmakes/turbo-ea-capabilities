# Freight Billing & Settlement Management
id: BC-2530
name: "Freight Billing & Settlement Management"
level: 1
industry: "Transportation & Logistics"
description: |
  Issuance of freight invoices, audit and payment of carrier invoices,
  interline and pool settlement, cargo claims, and freight revenue accounting.
children:
  - id: BC-2530.10
    name: Freight Invoicing Management
    level: 2
    industry: "Transportation & Logistics"
    description: |
      Generation and distribution of freight, accessorial, and self-billing
      invoices to customers.
    in_scope:
      - Freight invoice generation
      - Customer self-billing reconciliation
    out_of_scope:
      - Generic accounts-receivable processes (BC-200)
      - Customer pricing strategy (BC-440)
    children:
      - id: BC-2530.10.10
        name: Freight Invoice Generation
        level: 3
        industry: "Transportation & Logistics"
        description: |
          Generation of freight invoices from completed movements.
        children: []
      - id: BC-2530.10.20
        name: Accessorial Invoice Generation
        level: 3
        industry: "Transportation & Logistics"
        description: |
          Generation of accessorial and surcharge invoices.
        children: []
      - id: BC-2530.10.30
        name: Customer Self-Billing Coordination
        level: 3
        industry: "Transportation & Logistics"
        description: |
          Reconciliation of customer self-billing statements against shipments.
        children: []
  - id: BC-2530.20
    name: Freight Audit and Payment Management
    level: 2
    industry: "Transportation & Logistics"
    description: |

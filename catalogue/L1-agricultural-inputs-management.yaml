    children:
      - id: BC-3550.40.10
        name: Feed Ingredient Sourcing
        level: 3
        description: |
          Sourcing of cereals, protein meals, and forage ingredients.
        children: []
      - id: BC-3550.40.20
        name: Premix and Additive Management
        level: 3
        description: |
          Premix, mineral, and feed-additive procurement and inventory.
        children: []
      - id: BC-3550.40.30
        name: Feed Inventory and Ration Tracking
        level: 3
        description: |
          On-farm feed inventory and ration-use tracking.
        children: []
  - id: BC-3550.50
    name: Veterinary Medicine Inputs Management
    level: 2

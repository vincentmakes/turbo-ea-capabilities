# Autonomous Driving Operations Management
id: BC-3470
name: Autonomous Driving Operations Management
level: 1
industry: "Automotive & Mobility"
description: |
  Operational running of automated-driving fleets — operational design domain
  governance, scenario libraries, ADS safety case, simulation and on-road
  validation, teleoperation, and engagement with regulators on permits and
  incident reporting, anchored on ISO 21448, SAE J3016, and UN R157.
references:
  - https://www.sae.org/standards/content/j3016_202104/
  - https://unece.org/transport/documents/2021/03/standards/un-regulation-no-157-automated-lane-keeping-systems-alks
  - https://www.iso.org/standard/77490.html
children:
  - id: BC-3470.10
    name: Operational Design Domain Governance
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Definition, conformance monitoring, and lifecycle management of the
      operational design domain for each automated-driving feature.
    children:
      - id: BC-3470.10.10
        name: ODD Definition Management
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Definition of the operational design domain including geographic,
          environmental, and behavioural boundaries.
        children: []
      - id: BC-3470.10.20
        name: ODD Conformance Monitoring
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Monitoring of in-service ODD conformance and detection of operation
          outside the defined domain.
        children: []
      - id: BC-3470.10.30
        name: ODD Boundary Update Management
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Management of ODD expansions and restrictions over the lifecycle
          including approval and deployment.
        children: []
  - id: BC-3470.20
    name: Driving Scenario and Test Catalogue Management
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Curation of the driving scenario library and test catalogue used for
      design, simulation, and validation of automated-driving systems.
    children:
      - id: BC-3470.20.10
        name: Scenario Library Curation
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Curation of structured scenario libraries used for ADS design and
          validation.
        children: []
      - id: BC-3470.20.20
        name: Edge-Case Capture and Triage
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Capture, triage, and prioritisation of edge cases observed in
          simulation, on test fleets, and in service.
        children: []
      - id: BC-3470.20.30
        name: Scenario Coverage Reporting
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Reporting of scenario coverage and residual gaps against ODD
          requirements.
        children: []
  - id: BC-3470.30
    name: Autonomous Fleet Operations
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Day-to-day operations of test, pilot, and commercial automated-driving
      fleets including dispatch, health, and turnaround.
    in_scope:
      - Autonomous vehicle dispatch and routing
      - Fleet health monitoring and ground-truth telemetry
      - Charging, cleaning, and turnaround coordination
    out_of_scope:
      - Rider-facing booking and pricing for shared-mobility services (BC-3490)
      - Vehicle engineering and software development (BC-3400)
    children:
      - id: BC-3470.30.10
        name: Autonomous Vehicle Dispatch Operations
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Dispatch and routing of autonomous vehicles for test, pilot, and
          commercial missions.
        children: []
      - id: BC-3470.30.20
        name: Autonomous Fleet Health Monitoring
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Real-time health monitoring of autonomous fleets including sensor
          calibration and software status.
        children: []
      - id: BC-3470.30.30
        name: Autonomous Vehicle Charging and Cleaning Coordination
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Coordination of charging, cleaning, and turnaround activities for
          autonomous fleets at depots.
        children: []

        children: []
      - id: BC-2180.40.40
        name: Assumption Governance and Sign-Off
        level: 3
        industry: Insurance
        description: |
          Governance and sign-off of actuarial assumptions used in pricing, reserving, and reporting.
        children: []
  - id: BC-2180.50

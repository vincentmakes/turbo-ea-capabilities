# Travel Distribution & Channel Management
id: BC-4010
name: "Travel Distribution & Channel Management"
level: 1
industry: "Travel & Hospitality"
description: |
  Management of how travel products are distributed and merchandised across
  direct, GDS, OTA, wholesaler, and metasearch channels — including channel
  connectivity, content syndication, and rate-and-availability parity.
references:
  - https://opentravel.org/
  - https://hedna.org/
  - https://www.iata.org/en/programs/airline-distribution/ndc/
  - https://htng.org/
in_scope:
  - Direct, GDS, OTA, wholesaler, and metasearch channel operations
  - Channel-manager hub operations and content syndication
  - Rate and availability parity policy and enforcement
out_of_scope:
  - Product master and inventory pool definition (BC-4000)
  - Reservation lifecycle (BC-4020)
  - Pricing and yield decisions (BC-4030)

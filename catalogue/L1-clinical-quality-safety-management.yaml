# Clinical Quality & Safety Management
id: BC-2840
name: "Clinical Quality & Safety Management"
level: 1
industry: Healthcare Providers
description: |
  Patient safety event management, infection prevention and control,
  clinical outcomes measurement, accreditation readiness, clinical risk and
  liability, and quality improvement programmes specific to clinical care.
references:
  - https://www.jointcommission.org/
  - https://www.cdc.gov/nhsn/
  - https://www.ahrq.gov/cpi/about/index.html
  - https://www.ihi.org/
  - https://www.ncqa.org/hedis/

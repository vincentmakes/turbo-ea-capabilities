# Curriculum & Programme Management
id: BC-4700
name: "Curriculum & Programme Management"
level: 1
industry: Education
description: |
  Definition, structuring, governance, and continuous improvement of academic
  programmes, courses, modules, qualifications, and the learning outcomes
  underpinning them.
references:
  - https://uis.unesco.org/en/topic/international-standard-classification-education-isced
  - https://europa.eu/europass/en/european-qualifications-framework-eqf
  - https://www.imsglobal.org/spec/case
  - https://ceds.ed.gov/
children:
  - id: BC-4700.10
    name: Programme Architecture
    level: 2
    industry: Education
    description: |
      Definition of programme structure, qualification level, credit weighting,
      and the intended learning outcomes of academic awards.
    in_scope:
      - Programme structure and pathway definition
      - Award and qualification credentialing structure
      - Programme-level intended learning outcomes
    out_of_scope:
      - Course-level syllabus authoring (covered under Course & Module Design)
      - External accreditation outcomes (covered under Academic Quality & Accreditation Management)
    children:
      - id: BC-4700.10.10
        name: Programme Definition
        level: 3
        industry: Education
        description: |
          Definition of programme purpose, target cohort, entry requirements, and structural shape.
        children: []
      - id: BC-4700.10.20
        name: "Qualification & Credential Structuring"
        level: 3
        industry: Education
        description: |
          Structuring of awards, credit values, and stackable credential pathways.
        children: []
      - id: BC-4700.10.30
        name: Learning Outcome Definition
        level: 3
        industry: Education
        description: |
          Articulation of programme- and course-level intended learning outcomes.
        children: []
  - id: BC-4700.20
    name: "Course & Module Design"
    level: 2
    industry: Education
    description: |
      Specification and authoring of individual courses, modules, and units of
      learning that compose academic programmes.
    in_scope:
      - Course specifications and module descriptors
      - Syllabus authoring and approval
      - Unit-level learning objectives and assessment plans
    out_of_scope:
      - Production of teaching materials (covered under Educational Content & Learning Resource Management)
    children:
      - id: BC-4700.20.10
        name: Course Specification
        level: 3
        industry: Education
        description: |
          Authoring and approval of formal course specifications and descriptors.
        children: []
      - id: BC-4700.20.20
        name: "Module & Unit Design"
        level: 3
        industry: Education
        description: |
          Design of modules and learning units within courses.
        children: []
      - id: BC-4700.20.30
        name: Syllabus Authoring
        level: 3
        industry: Education
        description: |
          Authoring of syllabi setting out content, methods, and assessments per offering.
        children: []
  - id: BC-4700.30
    name: "Curriculum Mapping & Alignment"
    level: 2
    industry: Education
    description: |
      Mapping of curriculum content to competency frameworks, qualification
      frameworks, and downstream skill or career pathways.
    in_scope:
      - Competency-to-curriculum mapping
      - Alignment to ISCED, EQF, NQF and equivalent frameworks
      - Skill and career pathway mapping
    out_of_scope:
      - Individual learner skill attainment (covered under Assessment & Examinations Management)
    children:
      - id: BC-4700.30.10
        name: Competency Framework Alignment
        level: 3
        industry: Education
        description: |
          Alignment of curriculum to defined competency frameworks (e.g. CASE).
        children: []
      - id: BC-4700.30.20
        name: Qualification Framework Mapping
        level: 3
        industry: Education
        description: |
          Mapping of qualifications to ISCED, EQF, NQF, and similar reference frameworks.
        children: []
      - id: BC-4700.30.30
        name: "Skill & Career Pathway Mapping"
        level: 3
        industry: Education
        description: |
          Mapping of curriculum to occupational, professional, and career pathways.
        children: []
  - id: BC-4700.40
    name: Programme Catalogue Management
    level: 2
    industry: Education
    description: |
      Authoring, versioning, and publication of the institutional catalogue of
      programmes and courses available to prospective and current learners.
    in_scope:
      - Catalogue authoring and editorial workflow
      - Catalogue versioning and effective dating
      - Internal and public catalogue publication
    out_of_scope:
      - Recruitment marketing materials (covered under Student Recruitment & Admissions Management)
    children:
      - id: BC-4700.40.10
        name: Catalogue Authoring
        level: 3
        industry: Education
        description: |
          Authoring of catalogue entries for programmes, courses, and modules.
        children: []
      - id: BC-4700.40.20
        name: "Catalogue Versioning & Effective Dating"
        level: 3
        industry: Education
        description: |
          Version control and effective-date management for catalogue entries.
        children: []
      - id: BC-4700.40.30
        name: Catalogue Publication
        level: 3
        industry: Education
        description: |
          Internal and public publication of the programme and course catalogue.
        children: []
  - id: BC-4700.50
    name: "Programme Approval & Governance"
    level: 2
    industry: Education
    description: |
      Internal and external approval pathways for new, modified, and retired
      programmes, including suspension and closure decisions.
    in_scope:
      - Internal academic approval and governance
      - External regulator and professional-body approval
      - Programme suspension and orderly closure
    out_of_scope:
      - Day-to-day curriculum review (covered under Curriculum Review & Continuous Improvement)
      - Cyclical accreditation (covered under Academic Quality & Accreditation Management)
    children:
      - id: BC-4700.50.10
        name: Internal Programme Approval
        level: 3
        industry: Education
        description: |
          Internal academic approval of new and modified programmes.
        children: []
      - id: BC-4700.50.20
        name: External Programme Approval
        level: 3
        industry: Education
        description: |
          External regulator, ministry, or professional-body programme approval.
        children: []
      - id: BC-4700.50.30
        name: "Programme Suspension & Closure"
        level: 3
        industry: Education
        description: |
          Orderly suspension, teach-out, and closure of programmes.
        children: []
  - id: BC-4700.60
    name: "Curriculum Review & Continuous Improvement"
    level: 2
    industry: Education
    description: |
      Periodic review and improvement of curriculum content based on outcomes,
      stakeholder input, and external requirements.
    in_scope:
      - Periodic curriculum review cycles
      - Stakeholder, employer, and student input
      - Curriculum change implementation tracking
    out_of_scope:
      - Quality assurance reviews of programmes (covered under Academic Quality & Accreditation Management)
    children:
      - id: BC-4700.60.10
        name: Periodic Curriculum Review
        level: 3
        industry: Education
        description: |
          Cyclical review of curriculum effectiveness and relevance.
        children: []
      - id: BC-4700.60.20
        name: Stakeholder Curriculum Input
        level: 3
        industry: Education
        description: |
          Capture of student, employer, and advisory-board input into curriculum design.
        children: []
      - id: BC-4700.60.30
        name: Curriculum Change Implementation
        level: 3
        industry: Education
        description: |
          Tracking and implementation of approved curriculum changes.
        children: []

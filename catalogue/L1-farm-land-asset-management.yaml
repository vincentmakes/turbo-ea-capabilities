# Farm Land & Asset Management
id: BC-3540
name: "Farm Land & Asset Management"
level: 1
industry: Agriculture & Food Production
description: |
  Land tenure and lease records, field and parcel management, on-farm
  equipment and machinery telemetry, irrigation infrastructure, farm
  buildings, and on-farm energy assets.
references:
  - https://www.iso.org/standard/57556.html
  - https://www.aef-online.org/about-us/isobus.html
  - https://www.fao.org/tenure/voluntary-guidelines/en/
children:
  - id: BC-3540.10
    name: Land Tenure and Lease Management
    level: 2
    industry: Agriculture & Food Production
    description: |
      Records of land title, tenure, leases, and easements supporting
      operating rights across the farm portfolio.
    in_scope:
      - Title and tenure records
      - Lease agreement administration
      - Easement and access right records
    out_of_scope:
      - Corporate real estate (BC-1410)
    children:
      - id: BC-3540.10.10
        name: Land Title and Tenure Records
        level: 3
        description: |
          Records of freehold, leasehold, and customary tenure across the farm portfolio.
        children: []
      - id: BC-3540.10.20
        name: Lease Agreement Administration
        level: 3
        description: |
          Administration of farm lease agreements and renewals.
        children: []
      - id: BC-3540.10.30
        name: Land Easement Management
        level: 3
        description: |
          Management of access easements, rights of way, and conservation easements.
        children: []
  - id: BC-3540.20
    name: Field and Parcel Management
    level: 2
    industry: Agriculture & Food Production
    description: |
      Field boundary records, field history, and productivity zoning at
      field and parcel level.
    children:
      - id: BC-3540.20.10
        name: Field Boundary Recording
        level: 3
        description: |
          Field boundary capture and maintenance in farm GIS systems.
        children: []
      - id: BC-3540.20.20
        name: Field History Records
        level: 3
        description: |
          Multi-year field history records of crops, inputs, and yields.
        children: []
      - id: BC-3540.20.30
        name: Field Productivity Zoning
        level: 3
        description: |
          Productivity zoning and management-zone delineation within fields.
        children: []
  - id: BC-3540.30
    name: Farm Equipment Management
    level: 2
    industry: Agriculture & Food Production
    description: |

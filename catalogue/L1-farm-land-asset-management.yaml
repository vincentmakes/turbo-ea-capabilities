        children: []
      - id: BC-3540.30.20
        name: In-Field Machinery Operations
        level: 3
        description: |
          Day-to-day in-field machinery deployment and operator allocation.
        children: []
      - id: BC-3540.30.30
        name: ISOBUS Telemetry Integration
        level: 3
        description: |

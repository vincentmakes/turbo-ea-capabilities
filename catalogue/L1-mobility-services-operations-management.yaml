        children: []
  - id: BC-3490.30
    name: Shared Fleet Operations
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Operational handling of the shared fleet including rebalancing, on-site
      servicing, and damage control.
    in_scope:
      - Vehicle rebalancing across zones and stations
      - On-street cleaning, charging, and refuelling
      - Damage and loss management for shared vehicles
    out_of_scope:
      - Generic corporate fleet asset accounting (BC-2430)
      - EV charging-station operations (BC-3480)
    children:
      - id: BC-3490.30.10
        name: Vehicle Rebalancing Operations
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Rebalancing of shared vehicles across zones, stations, and demand

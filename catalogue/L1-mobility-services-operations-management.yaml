# Mobility Services Operations Management
id: BC-3490
name: Mobility Services Operations Management
level: 1
industry: "Automotive & Mobility"
description: |
  Operations of shared and on-demand mobility services — ride-hailing, car
  and micromobility sharing, and Mobility-as-a-Service aggregation —
  including service catalogue, trip operations, fleet rebalancing, driver
  and rider operations, dynamic pricing, partner integration, and city /
  regulator engagement.
references:
  - https://gtfs.org/
  - https://gbfs.mobilitydata.org/
  - https://maas-alliance.eu/
children:
  - id: BC-3490.10
    name: Mobility Service Catalogue Management
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Definition of mobility service types, pricing plans, and geographic
      coverage zones.
    children:
      - id: BC-3490.10.10
        name: Service Type Definition
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Definition of service types such as point-to-point, free-floating,
          station-based, and pooled rides.
        children: []
      - id: BC-3490.10.20
        name: Service Pricing Plan Configuration
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Configuration of base fares, time and distance pricing, and
          membership plans.
        children: []
      - id: BC-3490.10.30
        name: Service Geofence and Coverage Management
        level: 3
        industry: "Automotive & Mobility"
        description: |
          Management of operational geofences, no-go zones, and coverage
          areas.
        children: []

    children:
      - id: BC-2420.60.10
        name: On-Time Performance Tracking
        level: 3
        industry: "Transportation & Logistics"
        description: |
          Tracking of on-time pickup, departure, arrival, and delivery.
        children: []
      - id: BC-2420.60.20
        name: Transit Time Monitoring
        level: 3
        industry: "Transportation & Logistics"
        description: |
          Monitoring of actual vs committed transit times.
        children: []
      - id: BC-2420.60.30
        name: Operational KPI Reporting
        level: 3
        industry: "Transportation & Logistics"
        description: |
          Reporting of operational KPIs to internal and external stakeholders.
        children: []

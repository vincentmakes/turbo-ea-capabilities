    children:
      - id: BC-2420.50.10
        name: Operational Incident Detection
        level: 3
        industry: "Transportation & Logistics"
        description: |
          Detection of breakdowns, weather, port delays, and other disruptions.
        children: []
      - id: BC-2420.50.20
        name: Reroute and Recovery
        level: 3
        industry: "Transportation & Logistics"
        description: |
          Rerouting of cargo and recovery of disrupted services.
        children: []
      - id: BC-2420.50.30
        name: Service Restoration
        level: 3
        industry: "Transportation & Logistics"
        description: |
          Restoration of normal schedules and customer commitments.
        children: []
  - id: BC-2420.60
    name: Operational Performance Management
    level: 2
    industry: "Transportation & Logistics"
    description: |
      Operational measurement of on-time performance, transit times, and

  - id: BC-4380.30
    name: Continuing Professional Development Management
    level: 2
    industry: Professional Services
    description: |
      Planning, delivery, and evidencing of continuing professional
      development (CPD/CPE) hours required by professional bodies and
      firm policy.
    in_scope:

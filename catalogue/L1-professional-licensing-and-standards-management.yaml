# Professional Licensing and Standards Management
id: BC-4380
name: Professional Licensing and Standards Management
level: 1
industry: Professional Services
description: |
  Firm and individual licensure, professional-body filings, continuing
  professional development, adoption of new professional standards, and
  professional conduct investigation distinctive to professional services
  firms.
references:
  - https://www.ifac.org/who-we-are/our-purpose/iesba-code-ethics
  - https://www.iaasb.org/standards-pronouncements
  - https://www.iso.org/standard/52993.html
children:
  - id: BC-4380.10
    name: Firm Licensing and Registration Management
    level: 2
    industry: Professional Services
    description: |
      Maintenance of firm-level professional licences and registrations
      with audit oversight bodies, bar regulators, and equivalent
      authorities across jurisdictions.
    children:
      - id: BC-4380.10.10
        name: Firm Registration Maintenance
        level: 3
        industry: Professional Services
        description: |
          Maintenance of firm registrations such as PCAOB, FRC RSB, ICAEW
          firm registration, SRA recognised body, and ABS authorisations.
        children: []
      - id: BC-4380.10.20
        name: Firm Licence Renewal Management
        level: 3
        industry: Professional Services
        description: |
          Periodic renewal filings, fee payments, and supporting
          declarations for firm licences.
        children: []
      - id: BC-4380.10.30
        name: Cross-Jurisdiction Licence Coordination
        level: 3
        industry: Professional Services
        description: |
          Coordination of firm licensing across member-firm networks and
          jurisdictions.
        children: []

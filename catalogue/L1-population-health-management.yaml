# Population Health Management
id: BC-2880
name: Population Health Management
level: 1
industry: Healthcare Providers
description: |
  Risk stratification, preventive care, chronic disease management,
  value-based care operations, panel and empanelment management, and
  population analytics for attributed and at-risk populations.
references:
  - https://www.cms.gov/medicare/quality/value-based-programs
  - https://www.ncqa.org/hedis/
  - https://www.ahrq.gov/cpi/
  - https://www.cdc.gov/chronicdisease/

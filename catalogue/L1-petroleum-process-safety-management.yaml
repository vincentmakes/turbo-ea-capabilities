        name: LOPA Studies
        level: 3
        industry: "Oil & Gas"
        description: |
          Layer-of-Protection Analysis to define safety integrity levels.
        children: []
      - id: BC-3050.10.40
        name: Bow-Tie Analysis
        level: 3
        industry: "Oil & Gas"
        description: |

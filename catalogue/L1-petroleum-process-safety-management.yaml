# Petroleum Process Safety Management
id: BC-3050
name: Petroleum Process Safety Management
level: 1
industry: "Oil & Gas"
description: |
  Prevention of major-accident hazards in hydrocarbon-handling
  installations - process hazard analysis, mechanical integrity of
  pressure systems, safety-critical element assurance, operating
  procedures, performance reporting, and emergency response. Distinct
  from cross-industry HSE management (BC-730), which retains
  occupational health, environment, and personal-safety scope.
references:
  - https://www.osha.gov/process-safety-management
  - https://www.api.org/oil-and-natural-gas/health-and-safety/process-safety
  - https://www.iogp.org/
  - https://www.iso.org/standard/61788.html
children:
  - id: BC-3050.10
    name: Process Hazard Analysis
    level: 2
    industry: "Oil & Gas"
    description: |
      Structured identification and analysis of major-accident hazards
      across the asset life cycle.
    in_scope:
      - HAZID, HAZOP, LOPA, and bow-tie analysis
      - Quantitative risk assessment
    out_of_scope:
      - Personal safety risk assessment (BC-730)
    children:
      - id: BC-3050.10.10
        name: HAZOP Studies
        level: 3
        industry: "Oil & Gas"
        description: |
          Hazard and Operability studies on new and modified facilities.
        children: []
      - id: BC-3050.10.20
        name: HAZID Studies
        level: 3
        industry: "Oil & Gas"

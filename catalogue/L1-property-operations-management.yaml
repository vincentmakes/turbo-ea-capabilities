# Property Operations Management
id: BC-4060
name: Property Operations Management
level: 1
industry: "Travel & Hospitality"
description: |
  Day-to-day operation of hotels, resorts, and serviced-accommodation
  properties — front office, housekeeping, engineering, concierge,
  security, sustainability, and adherence to brand and quality standards.
references:
  - https://www.ahla.com/usali
  - https://htng.org/
  - https://www.greenkey.global/
  - https://earthcheck.org/
  - https://www.gstcouncil.org/
in_scope:
  - Front office operations and check-in / check-out
  - Housekeeping and lost-and-found
  - Property engineering and maintenance
  - Concierge, bell, valet, and guest transport
  - Property security, fire-life-safety, and incident handling
  - Property-level sustainability operations
  - Brand standard audit and quality conformance
out_of_scope:
  - Food & Beverage operations (BC-4070)
  - Group block and event execution (BC-4110)
  - Enterprise sustainability strategy (BC-740)

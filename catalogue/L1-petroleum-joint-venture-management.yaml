# Petroleum Joint Venture Management
id: BC-3110
name: Petroleum Joint Venture Management
level: 1
industry: "Oil & Gas"
description: |
  Administration of upstream joint operating agreements, concessions,
  and production sharing contracts - operating committees, AFE
  approvals, joint-interest billing, cash calls, license obligations,
  and partner and host-government reporting.
references:
  - https://www.aipn.org/
  - https://www.iogp.org/
  - https://www.spe.org/en/industry/petroleum-resources-management-system-2018/

  governance, partner apps, software-marketplace listings, and outbound
  webhook subscriptions for the SaaS ecosystem.
references:
  - https://spec.openapis.org/
  - https://www.asyncapi.com/
  - https://datatracker.ietf.org/doc/html/rfc6749

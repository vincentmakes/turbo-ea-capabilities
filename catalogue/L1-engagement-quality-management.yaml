# Engagement Quality Management
id: BC-4340
name: Engagement Quality Management
level: 1
industry: Professional Services
description: |
  Firm-level quality management system, engagement quality reviews, file
  reviews, technical consultation, monitoring, and external practice
  inspection response across professional services engagements.
references:
  - https://www.iaasb.org/standards-pronouncements
  - https://pcaobus.org/oversight/standards/auditing-standards
  - https://www.aicpa-cima.com/professional-insights/download/aicpa-quality-management-standards
children:
  - id: BC-4340.10
    name: Firm Quality Management System
    level: 2
    industry: Professional Services
    description: |
      Design, implementation, and operation of the firm-level quality
      management system aligned to ISQM 1 and equivalent regimes.
    children:
      - id: BC-4340.10.10
        name: Quality Risk Assessment
        level: 3
        industry: Professional Services
        description: |
          Identification and assessment of quality risks across the firm's
          engagements and operations.
        children: []
      - id: BC-4340.10.20
        name: Quality Response Design
        level: 3
        industry: Professional Services
        description: |
          Design of policies and procedures responding to identified
          quality risks.
        children: []
      - id: BC-4340.10.30
        name: Quality Governance and Accountability
        level: 3
        industry: Professional Services
        description: |
          Allocation of accountability for the QMS to managing partner,
          quality leadership, and engagement partners.
        children: []
      - id: BC-4340.10.40
        name: Annual QMS Evaluation
        level: 3
        industry: Professional Services
        description: |
          Annual evaluation of the operating effectiveness of the firm's
          quality management system.
        children: []
  - id: BC-4340.20
    name: Engagement Quality Review
    level: 2
    industry: Professional Services
    description: |
      Independent engagement quality review (EQR) by a reviewer not
      otherwise involved in the engagement, performed before report release
      on engagements meeting risk or regulatory triggers.
    children:
      - id: BC-4340.20.10
        name: EQR Eligibility and Trigger Assessment
        level: 3
        industry: Professional Services
        description: |
          Identification of engagements requiring EQR based on regulatory,
          risk, or firm-policy triggers.
        children: []
      - id: BC-4340.20.20
        name: EQ Reviewer Assignment
        level: 3
        industry: Professional Services
        description: |
          Assignment of qualified, independent EQ reviewers to triggered
          engagements.
        children: []
      - id: BC-4340.20.30
        name: EQR Execution and Sign-Off
        level: 3
        industry: Professional Services
        description: |
          Execution of EQR procedures and sign-off as a precondition for
          deliverable release.
        children: []
  - id: BC-4340.30
    name: Engagement File Review
    level: 2
    industry: Professional Services
    description: |
      Post-issuance hot and cold file reviews on a sample of completed
      engagement files to assess compliance with firm methodology and
      professional standards.
    children:
      - id: BC-4340.30.10
        name: Hot File Review
        level: 3
        industry: Professional Services
        description: |
          Pre-issuance file review on selected engagements where additional
          assurance over compliance is required.
        children: []
      - id: BC-4340.30.20
        name: Cold File Review
        level: 3
        industry: Professional Services
        description: |
          Post-issuance retrospective file review on a sampled basis to
          assess methodology compliance and quality.
        children: []
      - id: BC-4340.30.30
        name: File Review Finding Disposition
        level: 3
        industry: Professional Services
        description: |
          Disposition of file review findings including remediation,
          training implications, and engagement-partner feedback.
        children: []
  - id: BC-4340.40
    name: Technical Consultation Management
    level: 2
    industry: Professional Services
    description: |
      Mandatory and elective technical consultation on complex engagement
      matters with national-office, technical, or specialist functions.
    children:
      - id: BC-4340.40.10
        name: Mandatory Technical Consultation
        level: 3
        industry: Professional Services
        description: |
          Consultation required by firm policy on defined complex
          situations such as going-concern, fraud risk, or novel matters.
        children: []
      - id: BC-4340.40.20
        name: Elective Technical Consultation
        level: 3
        industry: Professional Services
        description: |
          Discretionary consultation requested by the engagement team on
          complex technical issues.
        children: []
      - id: BC-4340.40.30
        name: Technical Consultation Documentation
        level: 3
        industry: Professional Services
        description: |
          Documentation of consultation requests, advice given, and
          conclusions reached on the engagement file.
        children: []
  - id: BC-4340.50
    name: Quality Monitoring and Remediation
    level: 2
    industry: Professional Services
    description: |
      Ongoing monitoring activities, root-cause analysis of quality
      deficiencies, and remediation programmes.
    children:
      - id: BC-4340.50.10
        name: Quality Indicator Monitoring
        level: 3
        industry: Professional Services
        description: |
          Monitoring of leading and lagging quality indicators across the
          engagement portfolio.
        children: []
      - id: BC-4340.50.20
        name: Deficiency Root-Cause Analysis
        level: 3
        industry: Professional Services
        description: |
          Root-cause analysis of identified quality deficiencies and
          systemic findings.
        children: []
      - id: BC-4340.50.30
        name: Remediation Action Management
        level: 3
        industry: Professional Services
        description: |
          Definition, execution, and verification of remediation actions
          arising from monitoring and inspections.
        children: []
  - id: BC-4340.60
    name: Practice Inspection Response Management
    level: 2
    industry: Professional Services
    description: |
      Coordination of responses to external practice inspections by
      regulators and oversight bodies such as PCAOB, FRC, IAASA, ICAEW,
      and equivalent regimes.
    children:
      - id: BC-4340.60.10
        name: Inspection File Selection Coordination
        level: 3
        industry: Professional Services
        description: |
          Coordination of file selections and information requests from
          inspecting bodies.
        children: []
      - id: BC-4340.60.20
        name: Inspection Finding Response
        level: 3
        industry: Professional Services
        description: |
          Drafting and submission of formal responses to inspection
          findings and required remedial action plans.
        children: []
      - id: BC-4340.60.30
        name: Inspection Outcome Communication
        level: 3
        industry: Professional Services
        description: |
          Internal and, where required, external communication of
          inspection outcomes.
        children: []

# Educator Workforce Management
id: BC-4760
name: Educator Workforce Management
level: 1
industry: Education
description: |
  Lifecycle management of academic and teaching staff specific to education,
  covering recruitment, credentialing, tenure and promotion, teaching-load
  allocation, professional development, and adjunct/sessional management.
  Sits alongside Cross-Industry Human Capital Management for general HR.
references:
  - https://www.aacsb.edu/
  - https://www.abet.org/
  - https://www.qaa.ac.uk/
  - https://www.imsglobal.org/spec/case

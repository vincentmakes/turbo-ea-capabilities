# Real Estate Asset Management
id: BC-4920
name: Real Estate Asset Management
level: 1
industry: Real Estate
description: |
  Owner-side stewardship of standing real-estate assets across the hold
  period — business plan execution, performance monitoring, capex
  prioritisation, repositioning, sustainability pathway, asset risk, and
  property tax / OpEx optimisation. Bridges the investor view (BC-4910)
  with on-the-ground property operations (BC-4940).
references:
  - https://www.gresb.com/
  - https://www.crrem.eu/
  - https://www.bomi.org/
  - https://www.ncreif.org/
in_scope:
  - Per-asset business plan and hold/sell decisions
  - Asset financial, leasing, and operational performance monitoring
  - Capex programme planning, prioritisation, and execution oversight
  - Repositioning, conversion, and value-add execution
  - Asset-level decarbonisation pathway and ESG certification
  - Asset risk monitoring (physical, climate, market, tenant credit)
  - Property tax appeals, OpEx review, and CAM recovery audit
out_of_scope:
  - Fund / investor portfolio construction (BC-4910)
  - Day-to-day property operations and work orders (BC-4940)
  - Acquisition or disposition transactions (BC-4930)
  - Lease abstracting and rent escalation (BC-4950)

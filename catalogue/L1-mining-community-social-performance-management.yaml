      conduct.
    children:
      - id: BC-4500.60.10
        name: Human Rights Due Diligence
        level: 3
        industry: "Mining & Metals"
        description: |
          Site-level human rights impact assessment and due diligence per
          UN Guiding Principles.
        children: []
      - id: BC-4500.60.20
        name: Voluntary Principles Compliance
        level: 3
        industry: "Mining & Metals"
        description: |
          Compliance with the Voluntary Principles on Security and Human
          Rights across security operations.
        children: []
      - id: BC-4500.60.30
        name: Security Provider Conduct Oversight
        level: 3
        industry: "Mining & Metals"
        description: |
          Oversight of public and private security provider conduct around
          mine sites.
        children: []
  - id: BC-4500.70
    name: Social Performance Reporting
    level: 2
    industry: "Mining & Metals"
    description: |
      Tracking of social performance indicators, social impact assessment,
      and external disclosure of social performance.
    children:
      - id: BC-4500.70.10
        name: Social Performance Indicator Tracking
        level: 3
        industry: "Mining & Metals"
        description: |
          Tracking of social performance indicators across operations and
          investments.
        children: []
      - id: BC-4500.70.20
        name: Social Impact Assessment
        level: 3
        industry: "Mining & Metals"
        description: |
          Periodic social impact assessment of mining operations on host

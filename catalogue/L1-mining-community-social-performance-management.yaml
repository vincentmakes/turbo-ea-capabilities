# Mining Community & Social Performance Management
id: BC-4500
name: "Mining Community & Social Performance Management"
level: 1
industry: "Mining & Metals"
description: |
  Maintenance of social licence to operate through engagement with host
  communities, indigenous and traditional owners, resettlement and land
  access, community investment, local content, human rights, and social
  performance reporting.
references:
  - https://www.icmm.com/en-gb/our-principles/mining-principles
  - https://www.voluntaryprinciples.org/
  - https://eiti.org/
  - https://www.ifc.org/en/insights-reports/2012/publications-handbook-pps
children:
  - id: BC-4500.10
    name: Host Community Engagement
    level: 2
    industry: "Mining & Metals"
    description: |
      Identification, consultation, and grievance handling with host
      communities affected by mining operations.
    in_scope:
      - Stakeholder identification and mapping
      - Community consultation programmes
      - Community grievance mechanisms
    out_of_scope:
      - Indigenous-specific engagement (BC-4500.20)
      - Resettlement (BC-4500.30)
    children:
      - id: BC-4500.10.10
        name: Community Stakeholder Mapping
        level: 3
        industry: "Mining & Metals"
        description: |
          Identification and mapping of stakeholders in the area of mining
          influence.
        children: []
      - id: BC-4500.10.20
        name: Community Consultation Programme
        level: 3
        industry: "Mining & Metals"
        description: |
          Operation of structured community consultation forums and
          information disclosure.
        children: []
      - id: BC-4500.10.30
        name: Community Grievance Handling
        level: 3
        industry: "Mining & Metals"
        description: |
          Operational community grievance mechanism aligned with the UN
          Guiding Principles effectiveness criteria.
        children: []
  - id: BC-4500.20
    name: "Indigenous & Traditional Owner Engagement"
    level: 2
    industry: "Mining & Metals"
    description: |
      Engagement with indigenous and traditional-owner groups including
      native title, cultural heritage, and benefit-sharing agreements.
    children:
      - id: BC-4500.20.10
        name: "Native Title & Land Rights Engagement"
        level: 3
        industry: "Mining & Metals"
        description: |
          Engagement on native title and customary land rights affecting
          mining operations.
        children: []
      - id: BC-4500.20.20
        name: Cultural Heritage Management
        level: 3
        industry: "Mining & Metals"
        description: |
          Identification, protection, and management of cultural heritage
          sites and values.
        children: []
      - id: BC-4500.20.30
        name: Indigenous Land Use Agreement Administration
        level: 3
        industry: "Mining & Metals"
        description: |
          Administration of indigenous land use and benefit-sharing
          agreements.
        children: []
  - id: BC-4500.30
    name: "Resettlement & Land Access Management"
    level: 2
    industry: "Mining & Metals"
    description: |
      Land acquisition, involuntary resettlement, and livelihood
      restoration for project-affected people.
    children:
      - id: BC-4500.30.10
        name: Land Acquisition Negotiation
        level: 3
        industry: "Mining & Metals"
        description: |
          Negotiation of voluntary land acquisitions for mining and
          associated infrastructure.
        children: []
      - id: BC-4500.30.20
        name: Involuntary Resettlement Planning
        level: 3
        industry: "Mining & Metals"
        description: |
          Planning of involuntary resettlement aligned to IFC Performance
          Standards and equivalent regimes.
        children: []
      - id: BC-4500.30.30
        name: Resettlement Action Plan Implementation
        level: 3
        industry: "Mining & Metals"
        description: |
          Implementation of resettlement action plans for project-affected
          households.
        children: []
      - id: BC-4500.30.40
        name: Livelihood Restoration Programme Operations
        level: 3
        industry: "Mining & Metals"
        description: |
          Operation of livelihood restoration programmes for displaced
          households and host communities.
        children: []
  - id: BC-4500.40
    name: "Community Investment & Development"
    level: 2
    industry: "Mining & Metals"
    description: |
      Design and delivery of community investment programmes and
      co-investment in local infrastructure and development projects.
    children:
      - id: BC-4500.40.10
        name: Community Investment Programme Design
        level: 3
        industry: "Mining & Metals"
        description: |
          Design of multi-year community investment programmes aligned to
          local development plans.
        children: []
      - id: BC-4500.40.20
        name: Local Infrastructure Co-Investment
        level: 3
        industry: "Mining & Metals"
        description: |
          Co-investment in roads, water, power, and social infrastructure
          shared with host communities.
        children: []
      - id: BC-4500.40.30
        name: Community Development Project Delivery
        level: 3
        industry: "Mining & Metals"
        description: |
          Delivery of community development projects in health, education,
          and livelihoods.
        children: []
  - id: BC-4500.50
    name: "Local Content & Procurement Management"
    level: 2
    industry: "Mining & Metals"
    description: |
      Local supplier development, local employment programmes, and
      reporting against local content commitments.
    children:
      - id: BC-4500.50.10
        name: Local Supplier Development
        level: 3
        industry: "Mining & Metals"
        description: |
          Development and capability uplift of local and indigenous-owned
          suppliers.
        children: []
      - id: BC-4500.50.20
        name: Local Employment Programme Management
        level: 3
        industry: "Mining & Metals"
        description: |
          Management of local employment, training, and apprenticeship
          programmes for host-community workers.
        children: []
      - id: BC-4500.50.30
        name: Local Content Reporting
        level: 3
        industry: "Mining & Metals"
        description: |
          Reporting against host-government and contractual local content
          commitments.
        children: []
  - id: BC-4500.60
    name: "Human Rights & Security Management"
    level: 2
    industry: "Mining & Metals"
    description: |
      Human rights due diligence, alignment with the Voluntary Principles

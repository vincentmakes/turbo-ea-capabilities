    children:
      - id: BC-2610.60.10
        name: Legacy Network Decommissioning Planning
        level: 3
        industry: Telecommunications
        description: |
          Planning of orderly decommissioning of legacy network elements and
          associated assets.
        children: []
      - id: BC-2610.60.20
        name: Customer Migration Planning
        level: 3
        industry: Telecommunications
        description: |
          Planning of customer migration off retiring technologies onto target
          platforms.
        children: []
      - id: BC-2610.60.30
        name: Technology Sunset Planning
        level: 3
        industry: Telecommunications
        description: |
          Definition of technology sunset milestones, regulatory notifications,
          and final shut-down events.
        children: []

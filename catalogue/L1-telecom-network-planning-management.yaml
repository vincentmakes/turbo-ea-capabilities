        children: []
      - id: BC-2610.50.40
        name: Rollout Scheduling
        level: 3
        industry: Telecommunications
        description: |
          Scheduling and sequencing of site builds against capex, supplier, and
          coverage commitments.
        children: []
  - id: BC-2610.60
    name: Network End-of-Life Planning
    level: 2
    industry: Telecommunications
    description: |
      Planning of legacy network sunset, customer migration, and asset

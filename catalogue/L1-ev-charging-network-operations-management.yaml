    name: Charging Site Planning and Deployment
    level: 2
    industry: "Automotive & Mobility"
    description: |
      Site selection, permitting, grid connection, and physical deployment
      of charging infrastructure.
    children:
      - id: BC-3480.10.10
        name: Charging Site Selection
        level: 3
        industry: "Automotive & Mobility"
        description: |

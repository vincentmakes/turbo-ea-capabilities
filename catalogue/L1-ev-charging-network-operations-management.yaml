# EV Charging Network Operations Management
id: BC-3480
name: EV Charging Network Operations Management
level: 1
industry: "Automotive & Mobility"
description: |
  Operations of EV charging networks for charge-point operators and
  e-mobility service providers — site planning, charge-point operations,
  energy and tariff management, customer and roaming operations, billing
  and settlement, charger maintenance, and grid-service participation.
references:
  - https://www.openchargealliance.org/protocols/ocpp/
  - https://evroaming.org/ocpi/
  - https://www.iso.org/standard/77845.html
children:

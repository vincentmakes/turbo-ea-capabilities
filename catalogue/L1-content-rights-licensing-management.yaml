# Content Rights & Licensing Management
id: BC-3720
name: "Content Rights & Licensing Management"
level: 1
industry: "Media, Entertainment & Telecom Content"
description: |
  Acquisition, inventory, outbound licensing, sports and music rights,
  royalty inflows, and clearance and chain-of-title for audiovisual,
  audio, and editorial content.
references:
  - https://www.eidr.org/
  - https://www.ddex.net/
  - https://www.cisac.org/
  - https://www.movielabs.com/
  - https://www.iso.org/standard/63840.html

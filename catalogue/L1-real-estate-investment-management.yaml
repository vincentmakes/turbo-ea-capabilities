# Real Estate Investment Management
id: BC-4910
name: Real Estate Investment Management
level: 1
industry: Real Estate
description: |
  Investment-house and fund-side discipline of strategy, capital raising,
  pipeline, decision governance, portfolio construction, investor
  relations, and fund-level performance for real-estate investment
  vehicles including REITs, non-listed funds, separate accounts, and
  joint-venture programmes.
references:
  - https://www.inrev.org/standards
  - https://www.ncreif.org/
  - https://www.epra.com/finance/financial-reporting
  - https://www.reit.com/
  - https://www.gresb.com/nl-en/
in_scope:
  - Fund / mandate definition and investment policy
  - Capital raising, fund formation, and subscription
  - Investment pipeline and deal sourcing across direct and indirect channels
  - Investment committee governance and approval conditions
  - Portfolio construction, allocation, and rebalancing
  - LP reporting, capital calls, distributions, and INREV/NCREIF/EPRA submission
  - NAV computation, performance attribution, and waterfall calculations
out_of_scope:
  - Per-asset business plans and capex (BC-4920)
  - Acquisition and disposition transaction execution (BC-4930)
  - Debt and equity capital markets execution (BC-4980)
  - Generic enterprise treasury and Investor Relations (BC-210, BC-240)
children:

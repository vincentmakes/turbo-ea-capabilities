# Real Estate Valuation & Appraisal Management
id: BC-4970
name: "Real Estate Valuation & Appraisal Management"
level: 1
industry: Real Estate
description: |
  Appraisal and valuation discipline for real-estate assets and
  portfolios — engagement intake, subject inspection, comparable data
  curation, application of sales / income / cost approaches, reporting
  and sign-off, recurring portfolio mark-to-market, and quality
  assurance compliant with USPAP, RICS Red Book, and IVS.
references:
  - https://www.appraisalfoundation.org/imis/TAF/Standards/USPAP.aspx
  - https://www.rics.org/profession-standards/rics-standards-and-guidance/sector-standards/valuation-standards
  - https://www.ivsc.org/
  - https://ipmsc.org/
in_scope:
  - Engagement intake, scoping, conflict checks, and fee letters
  - Subject property inspection and IPMS-compliant measurement
  - Comparable transaction and yield benchmark curation
  - Sales comparison, income capitalisation, DCF, and cost approaches
  - Red Book / USPAP-compliant report drafting and sign-off
  - Recurring portfolio mark-to-market and lender collateral revaluation
  - Internal QA sampling, peer review, and audit response
out_of_scope:
  - Acquisition underwriting by principals (BC-4930)
  - NAV computation at fund level (BC-4910)
  - Property tax assessment appeals (BC-4920)
  - Broker opinion of value as a brokerage product (BC-4960)

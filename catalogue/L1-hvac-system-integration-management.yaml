# HVAC System Integration Management
id: BC-2020
name: HVAC System Integration Management
level: 1
industry: "HVAC & Building Automation Systems"
description: |
  Project-level engineering of integrated HVAC and BAS solutions for a specific building —
  load calculation, equipment selection, schematic design, BAS points list and architecture,
  sequence-of-operation authoring, BIM/MEP coordination, project specifications, submittal
  management, and field engineering support.
in_scope:
  - Building-specific load calculations and equipment selection
  - Mechanical, hydronic, and refrigerant schematic design at project scale
  - BAS points lists, network topology, and panel layout for projects
  - Project-specific sequence-of-operation authoring
  - BIM coordination, project specifications, and submittal management
out_of_scope:
  - Equipment product engineering (BC-2000) and BAS product engineering (BC-2010)
  - Cross-discipline MEP discipline practice (BC-1100)
  - Commissioning service delivery (BC-2050)
  - Generic engineering project management (BC-1110)

# Specialty Formulation & Blending Management
id: BC-4630
name: "Specialty Formulation & Blending Management"
level: 1
industry: Chemicals
description: |
  Formulation, blending, compounding, filling, and finishing of
  specialty chemical products including coatings, adhesives,
  agro-formulations, lubricants, surfactants, and fine chemicals.
references:

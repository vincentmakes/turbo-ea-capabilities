# Practice Pursuit and Proposal Management
id: BC-4360
name: Practice Pursuit and Proposal Management
level: 1
industry: Professional Services
description: |
  Pursuit-stage activities for professional services firms — opportunity
  qualification, pursuit strategy, proposal and pitch development, fee
  modelling, and win/loss analysis — distinct from generic Sales Management.
references:
  - https://www.spiresearch.com/professional-services-maturity-benchmark/
children:
  - id: BC-4360.10
    name: Opportunity Qualification Management
    level: 2
    industry: Professional Services
    description: |
      Qualification of inbound and outbound pursuit opportunities for
      strategic fit, deliverability, and commercial attractiveness.
    children:
      - id: BC-4360.10.10
        name: Opportunity Capture
        level: 3
        industry: Professional Services
        description: |
          Capture of pursuit opportunities from RFPs, referrals, and
          relationship-driven origination.
        children: []
      - id: BC-4360.10.20
        name: Opportunity Qualification Scoring
        level: 3
        industry: Professional Services

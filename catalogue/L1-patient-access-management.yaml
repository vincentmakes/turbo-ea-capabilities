# Patient Access Management
id: BC-2800
name: Patient Access Management
level: 1
industry: Healthcare Providers
description: |
  Pre-encounter intake, scheduling, registration, eligibility verification,
  financial counselling, admissions, transfers and discharges across inpatient,
  outpatient, ambulatory, and emergency settings.
references:
  - https://www.hl7.org/fhir/
  - https://x12.org/
  - https://www.himss.org/
  - https://www.cms.gov/
children:
  - id: BC-2800.10
    name: "Scheduling & Appointment Management"
    level: 2
    industry: Healthcare Providers
    description: |
      Provider and resource scheduling, appointment booking, waitlist
      management, and proactive reminders to optimise capacity utilisation.
    children:
      - id: BC-2800.10.10
        name: Provider Schedule Optimisation

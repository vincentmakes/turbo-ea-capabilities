# Public Procurement & Contracting Management
id: BC-3270
name: "Public Procurement & Contracting Management"
level: 1
industry: Public Sector & Government
description: |
  Public-sector procurement and contracting under FAR / DFARS and EU
  Procurement Directive regimes including acquisition planning, solicitation,
  source selection, contract award and administration, vendor performance,
  protests, and socio-economic programmes.
references:
  - https://www.acquisition.gov/far
  - https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32014L0024
  - https://www.sba.gov/federal-contracting
children:
  - id: BC-3270.10
    name: Acquisition Planning
    level: 2
    industry: Public Sector & Government
    description: |
      Acquisition strategy formulation, market research, and planning of
      public procurements.
    in_scope:
      - Market research and demand consolidation
      - Acquisition strategy and method selection
      - Independent government cost estimate preparation
    out_of_scope:
      - Cross-industry sourcing strategy for non-governmental procurement (covered by Procurement Management)
    children:
      - id: BC-3270.10.10
        name: Market Research
        level: 3
        industry: Public Sector & Government
        description: |
          Market research on supply base, capability, and pricing for the requirement.
        children: []
      - id: BC-3270.10.20
        name: Acquisition Strategy
        level: 3
        industry: Public Sector & Government
        description: |
          Selection of contracting method, vehicle, and competition approach.
        children: []
      - id: BC-3270.10.30
        name: Independent Cost Estimate
        level: 3
        industry: Public Sector & Government
        description: |
          Preparation of independent government cost estimates and budget reservations.
        children: []
      - id: BC-3270.10.40
        name: Specification and Statement of Work Development
        level: 3
        industry: Public Sector & Government
        description: |
          Development of specifications, statements of work, and performance work statements.
        children: []

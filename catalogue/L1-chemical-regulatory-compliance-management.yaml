# Chemical Regulatory Compliance Management
id: BC-4660
name: Chemical Regulatory Compliance Management
level: 1
industry: Chemicals
description: |
  Substance registration, dossiers, authorisations, restrictions,
  inventory listings, and import/export controls under REACH, TSCA,
  K-REACH, CWC, and equivalent regimes. Distinct from cross-industry
  Compliance Management (BC-130), which covers enterprise policy
  compliance.
references:
  - https://echa.europa.eu/regulations/reach/understanding-reach
  - https://www.epa.gov/laws-regulations/summary-toxic-substances-control-act
  - https://iuclid6.echa.europa.eu/
  - https://www.opcw.org/chemical-weapons-convention
children:
  - id: BC-4660.10
    name: Substance Registration Management
    level: 2
    industry: Chemicals
    description: |
      Registration of substances under the principal global chemical
      inventory regimes.
    children:
      - id: BC-4660.10.10
        name: REACH Registration Management
        level: 3
        industry: Chemicals
        description: |
          Management of REACH registrations including SIEF and joint submission.
        children: []
      - id: BC-4660.10.20
        name: "TSCA PMN & Inventory Notification"
        level: 3
        industry: Chemicals
        description: |
          Pre-manufacture notification and TSCA inventory notification.
        children: []
      - id: BC-4660.10.30
        name: "K-REACH & Asia-Pacific Notification"
        level: 3
        industry: Chemicals
        description: |
          Notification under K-REACH, China, Japan, and other Asia-Pacific regimes.
        children: []
      - id: BC-4660.10.40
        name: Polymer Notification Management
        level: 3
        industry: Chemicals
        description: |
          Notification and exemption management for polymer substances.
        children: []
  - id: BC-4660.20
    name: "Authorisation & Restriction Management"
    level: 2
    industry: Chemicals
    description: |
      Compliance with authorisation, restriction, and emerging substance
      controls.
    children:
      - id: BC-4660.20.10
        name: REACH Authorisation Application
        level: 3
        industry: Chemicals
        description: |
          Preparation and submission of REACH Annex XIV authorisation applications.
        children: []
      - id: BC-4660.20.20
        name: REACH Restriction Compliance
        level: 3
        industry: Chemicals
        description: |
          Compliance with REACH Annex XVII restriction entries.
        children: []
      - id: BC-4660.20.30
        name: SVHC Candidate List Tracking
        level: 3
        industry: Chemicals
        description: |
          Tracking of SVHC candidate list updates and impact analysis.
        children: []
      - id: BC-4660.20.40
        name: "PFAS & Emerging Restriction Management"
        level: 3
        industry: Chemicals
        description: |
          Management of PFAS, microplastics, and other emerging restrictions.
        children: []
  - id: BC-4660.30
    name: Regulatory Dossier Management
    level: 2
    industry: Chemicals
    description: |
      Authoring and maintenance of regulatory dossiers in IUCLID and

# Wholesale, Interconnect & Roaming Management
id: BC-2680
name: "Wholesale, Interconnect & Roaming Management"
level: 1
industry: Telecommunications
description: |
  Wholesale telecom services to other operators and partners — wholesale
  product and pricing, MVNO and MVNE partnerships, interconnect and peering,
  roaming partner relationships, inter-operator settlement, and capacity
  arrangements such as IRU and dark fibre.
references:
  - https://www.gsma.com/services/roaming/
  - https://www.mef.net/
  - https://www.tmforum.org/oda/business/process-framework-etom/

# Public Policy Management
id: BC-3200
name: Public Policy Management
level: 1
industry: Public Sector & Government
description: |
  Formulation, analysis, decision support, implementation coordination, and
  evaluation of public policy across the policy cycle, anchored on evidence,
  stakeholder consultation, and impact assessment.
references:
  - https://www.oecd.org/governance/digital-government/
  - https://www.oecd.org/gov/recommendation-on-public-service-leadership-and-capability.htm
  - https://www.opengovpartnership.org/
children:
  - id: BC-3200.10
    name: Policy Agenda Setting
    level: 2
    industry: Public Sector & Government
    description: |
      Identification, prioritisation, and mandate intake of policy issues
      requiring government attention.
    in_scope:
      - Issue identification and horizon scanning
      - Ministerial and political mandate intake
      - Policy prioritisation and agenda management
    out_of_scope:
      - Drafting of legislation or regulations (covered by Legislative & Regulatory Drafting Management)
      - Cabinet decision execution (covered under Policy Decision Support)
    children:
      - id: BC-3200.10.10
        name: Policy Issue Identification
        level: 3
        industry: Public Sector & Government
        description: |
          Identification of emerging issues and policy problems through horizon scanning and stakeholder signals.
        children: []
      - id: BC-3200.10.20
        name: Political Mandate Intake
        level: 3
        industry: Public Sector & Government
        description: |
          Capture and structuring of political and ministerial mandates into policy work programmes.
        children: []
      - id: BC-3200.10.30
        name: Policy Prioritisation
        level: 3
        industry: Public Sector & Government
        description: |
          Prioritisation of competing policy issues against capacity, urgency, and government commitments.
        children: []
  - id: BC-3200.20
    name: Policy Options Analysis
    level: 2
    industry: Public Sector & Government
    description: |
      Evidence review, modelling, and comparative analysis of policy options
      including cost, impact, and feasibility.
    in_scope:
      - Evidence and literature review
      - Cost-benefit and economic modelling
      - Comparative options appraisal
      - Distributional and equity analysis
    out_of_scope:
      - Regulatory Impact Assessment for draft instruments (covered by Legislative & Regulatory Drafting Management)
    children:
      - id: BC-3200.20.10
        name: Evidence and Literature Review
        level: 3
        industry: Public Sector & Government
        description: |
          Systematic gathering and synthesis of evidence informing policy options.
        children: []
      - id: BC-3200.20.20
        name: Policy Modelling and Forecasting
        level: 3
        industry: Public Sector & Government
        description: |
          Quantitative modelling, microsimulation, and forecasting of policy outcomes.
        children: []
      - id: BC-3200.20.30
        name: Options Appraisal
        level: 3
        industry: Public Sector & Government
        description: |
          Comparative appraisal of policy options against objectives and constraints.
        children: []
      - id: BC-3200.20.40
        name: Distributional and Equity Analysis
        level: 3
        industry: Public Sector & Government
        description: |
          Analysis of distributional effects and equity impacts across population groups.
        children: []
  - id: BC-3200.30
    name: Stakeholder and Public Consultation
    level: 2
    industry: Public Sector & Government
    description: |
      Design, delivery, and analysis of consultations with stakeholders, the
      public, and intergovernmental partners on policy proposals.
    children:
      - id: BC-3200.30.10
        name: Consultation Design
        level: 3
        industry: Public Sector & Government
        description: |
          Design of consultation strategies, instruments, and reach plans.
        children: []
      - id: BC-3200.30.20
        name: Consultation Delivery
        level: 3
        industry: Public Sector & Government
        description: |
          Operation of consultation channels including online portals, hearings, and workshops.
        children: []
      - id: BC-3200.30.30
        name: Consultation Response Analysis
        level: 3
        industry: Public Sector & Government
        description: |
          Coding, analysis, and synthesis of consultation responses.
        children: []
      - id: BC-3200.30.40
        name: Intergovernmental Coordination
        level: 3
        industry: Public Sector & Government
        description: |
          Coordination with subnational and international partners on shared policy.
        children: []
  - id: BC-3200.40
    name: Policy Decision Support
    level: 2
    industry: Public Sector & Government
    description: |
      Preparation of cabinet, ministerial, and executive decision artefacts
      including briefings, decision memos, and recommendations.
    children:
      - id: BC-3200.40.10
        name: Briefing Preparation
        level: 3
        industry: Public Sector & Government
        description: |
          Preparation of ministerial and executive briefings on policy matters.
        children: []
      - id: BC-3200.40.20
        name: Cabinet Submission Management
        level: 3
        industry: Public Sector & Government
        description: |
          Drafting and coordination of cabinet, executive, or council submissions.
        children: []
      - id: BC-3200.40.30
        name: Decision Recording and Communication
        level: 3
        industry: Public Sector & Government
        description: |
          Recording of decisions, dissemination of outcomes, and tasking of implementing entities.
        children: []
  - id: BC-3200.50
    name: Policy Implementation Coordination
    level: 2
    industry: Public Sector & Government
    description: |
      Coordination of cross-agency policy implementation including programme
      design, sequencing, and delivery oversight.
    children:
      - id: BC-3200.50.10
        name: Implementation Planning
        level: 3
        industry: Public Sector & Government
        description: |
          Conversion of policy decisions into implementation plans, milestones, and accountabilities.
        children: []
      - id: BC-3200.50.20
        name: Cross-Agency Coordination
        level: 3
        industry: Public Sector & Government
        description: |
          Coordination of implementing agencies and joint delivery arrangements.
        children: []
      - id: BC-3200.50.30
        name: Implementation Tracking
        level: 3
        industry: Public Sector & Government
        description: |
          Tracking of policy implementation progress against commitments and deadlines.
        children: []
  - id: BC-3200.60
    name: Policy Evaluation and Review
    level: 2
    industry: Public Sector & Government
    description: |
      Ex-post evaluation, sunset and post-implementation reviews, and feedback
      into the policy cycle.
    children:
      - id: BC-3200.60.10
        name: Outcome and Impact Evaluation
        level: 3
        industry: Public Sector & Government
        description: |
          Evaluation of policy outcomes and impacts against intended objectives.
        children: []
      - id: BC-3200.60.20
        name: Sunset and Post-Implementation Review
        level: 3
        industry: Public Sector & Government
        description: |
          Statutory and discretionary reviews of policies and instruments at defined intervals.
        children: []
      - id: BC-3200.60.30
        name: Lessons Learned Capture
        level: 3
        industry: Public Sector & Government
        description: |
          Capture and dissemination of lessons learned for future policy cycles.
        children: []

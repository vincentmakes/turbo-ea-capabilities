# Telecom Fraud Management
id: BC-2690
name: Telecom Fraud Management
level: 1
industry: Telecommunications
description: |
  Detection, investigation, prevention, recovery, and cross-operator reporting
  of telecom-specific fraud — subscription fraud, IRSF, Wangiri, SIM-swap,
  bypass, and revenue-share schemes — anchored on GSMA fraud guidance.
references:
  - https://www.gsma.com/security/security-features/fraud-and-security/
  - https://www.itu.int/rec/T-REC-D.193
children:
  - id: BC-2690.10
    name: Telecom Fraud Detection
    level: 2
    industry: Telecommunications
    description: |
      Real-time and near-real-time detection of telecom-specific fraud
      patterns across voice, data, and signalling traffic.
    children:
      - id: BC-2690.10.10
        name: Subscription Fraud Detection
        level: 3
        industry: Telecommunications
        description: |
          Detection of fraudulent acquisition of services using stolen or
          fabricated identities.
        children: []
      - id: BC-2690.10.20
        name: International Revenue Share Fraud Detection
        level: 3
        industry: Telecommunications
        description: |
          Detection of IRSF traffic patterns inflating settlement to premium
          destinations.
        children: []
      - id: BC-2690.10.30
        name: Wangiri Detection
        level: 3
        industry: Telecommunications
        description: |
          Detection of Wangiri callback-fraud patterns and associated number
          ranges.
        children: []
      - id: BC-2690.10.40
        name: SIM-Swap Detection
        level: 3
        industry: Telecommunications
        description: |
          Detection of fraudulent SIM and eSIM swap attempts and downstream
          account takeover.
        children: []
      - id: BC-2690.10.50
        name: Bypass Fraud Detection
        level: 3
        industry: Telecommunications
        description: |
          Detection of SIM-box and other bypass schemes that defraud
          interconnect revenues.
        children: []
  - id: BC-2690.20
    name: Telecom Fraud Investigation
    level: 2
    industry: Telecommunications
    description: |
      Casework on detected fraud, evidence preservation, and law-enforcement
      liaison.
    children:
      - id: BC-2690.20.10
        name: Fraud Case Investigation
        level: 3
        industry: Telecommunications
        description: |
          Structured investigation of detected fraud cases through to outcome.
        children: []
      - id: BC-2690.20.20
        name: Evidence Collection
        level: 3
        industry: Telecommunications
        description: |
          Forensic collection and preservation of evidence supporting fraud
          investigations.
        children: []
      - id: BC-2690.20.30
        name: Law Enforcement Liaison
        level: 3
        industry: Telecommunications
        description: |
          Liaison with law-enforcement agencies on referred fraud cases.
        children: []
  - id: BC-2690.30
    name: Telecom Fraud Prevention Controls
    level: 2
    industry: Telecommunications
    description: |
      Preventive controls — rules, velocity limits, authentication uplift,
      and blacklists — operated against live traffic.
    children:
      - id: BC-2690.30.10
        name: Real-Time Fraud Rules Management
        level: 3
        industry: Telecommunications
        description: |
          Authoring and tuning of real-time rule sets used by fraud-management
          platforms.
        children: []
      - id: BC-2690.30.20
        name: Velocity Control Management
        level: 3
        industry: Telecommunications
        description: |
          Velocity-based controls on usage, recharges, and changes to limit
          fraud exposure.
        children: []
      - id: BC-2690.30.30
        name: Authentication Uplift
        level: 3
        industry: Telecommunications
        description: |
          Step-up authentication of high-risk transactions and self-care
          actions.
        children: []
      - id: BC-2690.30.40
        name: Fraud Blacklist Management
        level: 3
        industry: Telecommunications
        description: |
          Maintenance of fraud-related blacklists for numbers, ranges, devices,
          and identities.
        children: []
  - id: BC-2690.40
    name: Telecom Fraud Loss Recovery
    level: 2
    industry: Telecommunications
    description: |
      Recovery of fraudulent charges, bad debt, and assets where fraud is
      confirmed.
    children:
      - id: BC-2690.40.10
        name: Fraudulent Charge Recovery
        level: 3
        industry: Telecommunications
        description: |
          Recovery of charges generated by confirmed fraudulent activity.
        children: []
      - id: BC-2690.40.20
        name: Bad Debt Recovery
        level: 3
        industry: Telecommunications
        description: |
          Recovery of bad debt associated with subscription and account-takeover
          fraud.
        children: []
      - id: BC-2690.40.30
        name: Asset Recovery
        level: 3
        industry: Telecommunications
        description: |
          Recovery of devices, SIMs, and other assets connected to fraudulent
          orders.
        children: []
  - id: BC-2690.50
    name: Cross-Operator Fraud Reporting
    level: 2
    industry: Telecommunications
    description: |
      Sharing of fraud intelligence across the industry and reporting to
      regulators where required.
    children:
      - id: BC-2690.50.10
        name: Industry Fraud Intelligence Sharing
        level: 3
        industry: Telecommunications
        description: |
          Contribution to and consumption of industry fraud-intelligence
          channels such as GSMA fraud forum.
        children: []
      - id: BC-2690.50.20
        name: Regulator Fraud Reporting
        level: 3
        industry: Telecommunications
        description: |
          Reporting of fraud incidents and aggregate exposure to regulators
          where mandated.
        children: []
      - id: BC-2690.50.30
        name: Inter-Operator Fraud Referral
        level: 3
        industry: Telecommunications
        description: |
          Referral of suspected fraudulent activity to originating or
          terminating operators for joint action.
        children: []

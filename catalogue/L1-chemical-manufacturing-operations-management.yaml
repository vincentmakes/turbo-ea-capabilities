# Chemical Manufacturing Operations Management
id: BC-4620
name: Chemical Manufacturing Operations Management
level: 1
industry: Chemicals
description: |
  Day-to-day operation of reaction, separation, polymerisation, and
  inorganic process plants - including catalyst surveillance, production
  scheduling, and turnaround coordination.
references:
  - https://www.iso.org/standard/57308.html
  - https://www.aiche.org/ccps

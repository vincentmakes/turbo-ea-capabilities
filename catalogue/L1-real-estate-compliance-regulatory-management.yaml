# Real Estate Compliance & Regulatory Management
id: BC-4990
name: "Real Estate Compliance & Regulatory Management"
level: 1
industry: Real Estate
description: |
  Compliance discipline for the real-estate-specific regulatory regimes
  that overlay generic enterprise compliance — broker / agent
  licensing, fair-housing and anti-discrimination, real-estate AML and
  beneficial ownership, settlement and mortgage disclosure (RESPA /
  TRID), building energy performance, tenancy and rent regulation,
  condo / HOA / strata regulation, and fund / adviser regulation.
references:
  - https://www.nar.realtor/about-nar/governing-documents/code-of-ethics
  - https://www.fincen.gov/news/news-releases/fincen-issues-final-rule-combating-illicit-finance-residential-real-estate
  - https://www.consumerfinance.gov/rules-policy/regulations/1024/
  - https://www.hud.gov/program_offices/fair_housing_equal_opp/fair_housing_act_overview
  - https://www.gov.uk/guidance/domestic-private-rented-property-minimum-energy-efficiency-standard-landlord-guidance
in_scope:
  - Brokerage firm and agent licensing maintenance
  - Fair Housing Act, Equality Act, ECOA conformance
  - Real-estate AML, beneficial ownership, sanctions, and SAR reporting
  - RESPA, TRID, and Section 8 affiliated business disclosure
  - Building energy performance disclosure and MEES compliance
  - Rent stabilisation, eviction notice, deposit handling, STR registration
  - Condo / HOA / strata sponsor and reserve disclosures
  - AIFMD, ELTIF, and Investment Advisers Act fund / adviser compliance
out_of_scope:
  - Enterprise compliance management (BC-130)
  - Cybersecurity and privacy regimes (BC-620)
  - Generic financial-crime AML across non-RE businesses (BC-1400)
  - Tax administration (BC-220)

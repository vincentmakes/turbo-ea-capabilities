# Client Engagement Management
id: BC-4300
name: Client Engagement Management
level: 1
industry: Professional Services
description: |
  Lifecycle of client and engagement intake, scoping, mobilisation, change
  control, closure, and ongoing client stewardship across legal matters,
  advisory engagements, and audit and assurance engagements.
references:
  - https://www.ifac.org/who-we-are/our-purpose/iesba-code-ethics
  - https://www.iaasb.org/standards-pronouncements
  - https://www.fatf-gafi.org/en/publications/Fatfrecommendations/Fatf-recommendations.html
children:
  - id: BC-4300.10
    name: Client Acceptance Management
    level: 2
    industry: Professional Services
    description: |
      Take-on of new client relationships, including KYC, AML screening,
      sanctions and PEP checks, and beneficial ownership verification before
      any engagement is accepted.
    in_scope:
      - New client KYC and AML clearance
      - Sanctions and PEP screening on prospective clients
      - Beneficial ownership and source-of-funds checks
      - Periodic refresh of client KYC files
    out_of_scope:
      - Independence and conflicts assessment (BC-4350)
      - Engagement-specific risk acceptance (BC-4300.20)
    children:
      - id: BC-4300.10.10
        name: Client KYC Capture
        level: 3
        industry: Professional Services
        description: |
          Capture of identification, beneficial ownership, and source-of-funds
          information for prospective and existing clients.
        children: []
      - id: BC-4300.10.20
        name: Client Sanctions and PEP Screening
        level: 3
        industry: Professional Services
        description: |
          Screening of clients and beneficial owners against sanctions, PEP,
          and adverse-media lists.
        children: []
      - id: BC-4300.10.30
        name: Client Risk Rating
        level: 3
        industry: Professional Services
        description: |
          Risk rating of the client relationship to drive due diligence depth
          and review cadence.
        children: []
      - id: BC-4300.10.40
        name: Periodic Client Due Diligence Refresh
        level: 3
        industry: Professional Services
        description: |
          Refresh of client KYC, ownership, and risk ratings on a defined cycle.
        children: []
  - id: BC-4300.20
    name: Engagement Acceptance Management
    level: 2
    industry: Professional Services
    description: |
      Decision workflow to accept or decline a specific engagement, drawing
      on independence and conflicts clearance, capacity assessment, fee
      feasibility, and engagement-specific risk evaluation.
    in_scope:
      - Engagement risk assessment
      - Capacity and capability check
      - Engagement go/no-go decisioning
    out_of_scope:
      - Independence and conflicts substantive checks (BC-4350)
      - Pursuit and proposal activity (BC-4360)
    children:
      - id: BC-4300.20.10
        name: Engagement Risk Assessment
        level: 3
        industry: Professional Services
        description: |
          Assessment of engagement-specific risk including subject-matter
          complexity, client integrity, and fee recoverability.
        children: []
      - id: BC-4300.20.20
        name: Capacity and Capability Check
        level: 3
        industry: Professional Services
        description: |
          Confirmation that the firm has the technical capability and
          resourcing capacity to deliver the engagement.
        children: []
      - id: BC-4300.20.30
        name: Engagement Go-No-Go Decisioning
        level: 3
        industry: Professional Services
        description: |
          Partner-level go/no-go decision integrating risk, conflicts,
          independence, capacity, and commercial inputs.
        children: []
  - id: BC-4300.30
    name: Engagement Scoping and Terms Management
    level: 2
    industry: Professional Services
    description: |
      Definition of engagement scope, deliverables, assumptions, fee terms,
      and engagement letter or retainer agreement.
    in_scope:
      - Scope of services definition
      - Fee structure and terms drafting
      - Engagement letter or retainer agreement issuance
    out_of_scope:
      - Pricing strategy at the firm level (BC-4360.50)
      - Pursuit-stage proposal (BC-4360.30)
    children:
      - id: BC-4300.30.10
        name: Engagement Scope Definition
        level: 3
        industry: Professional Services
        description: |
          Definition of services, deliverables, assumptions, exclusions, and
          dependencies for the engagement.
        children: []
      - id: BC-4300.30.20
        name: Engagement Letter Drafting
        level: 3
        industry: Professional Services
        description: |
          Drafting of engagement letters and retainer agreements aligned to
          firm templates and applicable professional standards.
        children: []
      - id: BC-4300.30.30
        name: Engagement Terms Negotiation
        level: 3
        industry: Professional Services
        description: |
          Negotiation of engagement terms with the client, including
          liability caps, governing law, and dispute resolution clauses.
        children: []
      - id: BC-4300.30.40
        name: Engagement Letter Execution
        level: 3
        industry: Professional Services
        description: |
          Signature, countersignature, and storage of executed engagement
          letters as a precondition for engagement mobilisation.
        children: []
  - id: BC-4300.40
    name: Engagement Mobilisation Management
    level: 2
    industry: Professional Services
    description: |
      Operational stand-up of an accepted engagement including team
      formation, kickoff, secure data access, and engagement infrastructure
      setup.
    children:
      - id: BC-4300.40.10
        name: Engagement Team Formation
        level: 3
        industry: Professional Services
        description: |
          Identification and confirmation of partner, manager, and staff
          roles on the engagement team.
        children: []
      - id: BC-4300.40.20
        name: Engagement Kickoff Management
        level: 3
        industry: Professional Services
        description: |
          Internal and client-facing kickoff meetings, briefing materials,

        children: []
      - id: BC-4300.40.30
        name: Engagement Data Access Setup
        level: 3
        industry: Professional Services
        description: |
          Provisioning of secure data rooms, client portals, and access
          credentials specific to the engagement.
        children: []
      - id: BC-4300.40.40
        name: Engagement Infrastructure Setup
        level: 3
        industry: Professional Services
        description: |
          Setup of engagement codes, billing structures, and matter
          numbering in the firm's practice systems.
        children: []
